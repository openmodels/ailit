Drivers of Risk:
  2: The drivers of risk include solar irradiance, ambient temperature, atmospheric
    conditions (clouds, aerosols, pollutants, and dust), terrain effects (albedo,
    snow), extreme weather events (wildfires, hailstorms, solar eclipses), and long-term
    irradiance changes driven by climate change and air pollutants.
  4: Solar irradiance directly impacts electricity output from PV modules, varying
    with time, location, climate, season, and topography.
  5: Spectral distribution of solar irradiance impacts PV module performance, with
    Average Photon Energy (APE) being a key metric; Environmental factors like air
    mass, cloud cover, and water content influence APE.
  6: Irradiance and ambient air temperature significantly impact solar PV output.
  7: Temperature elevation at the module surface routinely exceeding standard test
    conditions (STC).
  8: Elevated temperatures impact solar PV cell performance, reducing efficiency and
    accelerating degradation.
  10: Dust, as illustrated by global maps of aerosol optical thickness (Fig. 13) and
    dust emissions/deposition (Fig. 14).
  11: Dust accumulation (influenced by location, dust type, and environmental factors)
    and humidity.
  12: 'Wind: Increases efficiency by cooling modules, especially during peak sunlight
    hours; reduces soiling by blowing away accumulation of dust and snow; can deposit
    dust or snow; keeps particles airborne, causing light scattering; extreme winds
    can compromise structural security, requiring adequate design margins.'
  13: The drivers of risk identified are snow accumulation on modules, temperature,
    humidity, and climate change impacts like increased wildfires and hailstorms.
  14: Hurricanes and hailstorms impact solar PV systems, causing structural and electrical
    damage.
  15: Increased humidity, frequency of wildfires, hailstorms, rising temperatures,
    increased cloud cover, and solar eclipses are noted as drivers impacting solar
    PV performance.
  16: Solar irradiance, temperature, cloud cover, dust and pollutants, snow cover,
    albedo, and extreme weather events
Evaluation overview:
  2: This paper provides an overview of factors affecting solar photovoltaic (PV)
    output.
  4: No relevant information
  5: No relevant information
  7: Evaluates the impact of temperature on solar PV module power output and efficiency.
  10: No relevant information
  11: The page discusses the impact of dust and humidity on solar PV power output
    and efficiency.
  12: No relevant information
  13: The paper provides an overview of the impact of snow cover on solar PV modules,
    highlighting energy loss due to snow accumulation and the influence of snow on
    solar irradiance and energy generation.
  15: The page evaluates the impact of solar eclipses on solar PV systems, particularly
    focusing on capacity factors as a measure of productivity.
  16: Solar PV performance
Highlights:
  2: Optimizing PV systems for diverse climates and mitigating environmental impacts
    on productivity is important to the continued success of solar photovoltaics.
  4: Increased solar irradiance reduces parasitic resistance losses. Irradiance has
    a linear effect on current and log-linear effect on voltage.
  5: "Blue-rich spectra improve the performance of a-Si:H and a-Si:H/\u03BC c-Si:H\
    \ modules as APE increases, but negatively affect CIGS modules. Cell temperatures\
    \ correlate more strongly with irradiation than ambient air temperature."
  6: Efficiency and performance ratio of solar cells decrease with increasing irradiance
    intensity.
  7: Power output decreases near-linearly with temperature; temperature has a stronger
    effect on open-circuit voltage than on short-circuit current; different PV technologies
    exhibit varying temperature coefficients for power, voltage, and current.
  8: CdTe solar cells have lower temperature coefficients, making them more performance-stable
    in hot climates.
  10: "Cleaning is a major operating expense in desert regions, but can increase PV\
    \ capacity factors by 50\u2013100 % even if only performed quarterly."
  11: Dust and humidity negatively impact solar PV efficiency. Various cleaning methods
    exist, each with advantages and disadvantages.
  12: Wind can both increase and decrease solar PV efficiency.
  13: Key highlights include the link between snow cover and energy generation, detailing
    how snow and albedo impact solar PV performance, losses due to snow accumulation,
    and the effect of climate change on extreme events impacting PV systems.
  14: Hurricanes can disrupt power generation, but resilient systems like Babcock
    Ranch maintained power during Hurricane Ian.
  15: Cloud characteristics and humidity are significant factors affecting solar irradiance.
    Solar eclipses can lead to significant reductions in solar PV productivity, especially
    in regions with high PV installations.
  16: Solar irradiance is the most significant factor affecting PV performance, with
    the strongest impact near the equator.
Methodology:
  2: The paper is a comprehensive review of the effects of environmental factors on
    solar PV output. It considers geographic and temporal variability. The results
    are applicable to diverse climates and evolving environmental contexts.
  4: Parameters are measured using the STC and PTC standards.  The daily average capacity
    factor is summarized over 30 years.
  5: APE is the ratio of integrated irradiance to photon flux density. Module operating
    temperature is determined by the balance of heat generation and heat loss to the
    environment.
  7: Analysis of I-V and P-V curves at different temperatures at a constant irradiance
    intensity, and statistical analysis of temperature coefficients from a large database
    of commercially available solar PV modules. Results are applicable to commercially
    available solar PV modules.
  8: Nominal Operating Cell Temperature (NOCT) provides a standardized test to assess
    PV module temperature under specific conditions.
  10: 'Cleaning methods can be classified under four broad categories: (i) mechanical,
    (ii) self-cleaning, (iii) electrostatic, and (iv) natural. The choice of cleaning
    method depends on dust particle size.'
  11: The page reviews various methods for cleaning PV modules, including natural,
    mechanical, self-cleaning, and electrostatic techniques. The humidity section
    presents a general inverse relationship between humidity and solar PV power output.
  12: "Maps are based on measurements averaged over the months of June, July and August\
    \ 2014\u20132024 for summer, and December, January and February 2014\u20132024\
    \ for winter."
More Notes:
  2: The review highlights the need for tailored strategies to maintain performance
    in varied and evolving environmental contexts. The pledged tripling of global
    renewable energy capacity by 2030 means rapid growth of solar PV.
  4: "The Earth\u2019s elliptical orbit around the sun also causes minor annual fluctuations\
    \ in solar insolation."
  5: The geographical variation in global horizontal irradiance (GHI) is shown in
    Figure 4. Figure 5 illustrates the effect of different irradiance intensities
    on solar cell I-V and P-V curves. Heat production by solar PV farms can raise
    the surrounding temperature.
  7: The paper references the CEC database [17] and another study [39] where much
    of the analysis was apparently conducted.
  8: Passive and active cooling methods can mitigate the effects of elevated cell
    temperatures and improve module performance.
  10: The paper references figures illustrating global aerosol optical thickness and
    dust emission/deposition patterns. The study period for aerosol optical thickness
    is January 2019 to December 2023.
  11: The paper briefly mentions a potential positive impact of dust in reducing large-angle
    reflections, increasing radiation capture. It also mentions that increased humidity
    can improve module efficiency by lowering its temperature.
  12: The effect of wind on solar PV farms depends on factors such as module placement
    (edge vs. interior), array spacing, and presence of fences.
  13: The paper also discusses the effects of albedo on energy generation and the
    regional variability of snow cover impacts on PV systems.
  16: The paper focuses on environmental factors influencing solar PV output and discusses
    their mitigation strategies.
Quantitative material:
  2: "Module efficiency decreases by 0.4\u20130.5% per degree Celsius increase in\
    \ temperature. Atmospheric conditions can reduce electricity output by up to 60%."
  4: Solar cell efficiency initially rises, plateauing around 600 W/m2 before declining
    slightly up to 1000 W/m2.
  5: "A typical PV module converts 6\u201320 % of incident sunlight into electricity."
  6: Real-world power delivery from solar modules can deviate by up to 10% due to
    temperature effects.
  7: Temperature coefficients for maximum power production, open-circuit voltage,
    and short-circuit current, aggregated by cell technology (CdTe, CIGS, Mono-cSi,
    Multi-cSi, Thin film) from 21,000 commercially-available solar PV modules.
  8: "The degradation rate of PV modules approximately doubles for every 10 \xB0C\
    \ increase in operating temperature."
  10: "Dust cleaning can increase PV capacity factors by 50\u2013100 % even if only\
    \ performed quarterly."
  11: Self-cleaning coatings can achieve a cleaning efficiency of 72% without extra
    components or water. Wave motion techniques can potentially eliminate 80% of dust
    in 2 minutes. Electrostatic dust cleaning reduced power loss from 5.9% to 4.6%
    in Jordan. Transparent self-cleaning dust shields removed 90% of dust in under
    30 minutes.
  12: "Wind increases module temperature by 0.94 \u25E6C (reference to other study)."
  13: "Quantitative information includes energy loss data due to snow accumulation,\
    \ with specific losses noted: 5% to 34% in Michigan, US, and up to 40% in Russia;\
    \ increased daily output losses by 6\u201319% due to reduced module tilt in Utah,\
    \ US."
  14: The 8 April 2024 solar eclipse affected up to approximately 70 GW of capacity,
    compared to less than 10 GW on 21 August 2017.
  15: The capacity factor of PV systems can fluctuate significantly, reaching up to
    60% during non-eclipse days. A 10% rise in atmospheric water vapor is reported
    to reduce GHI by 0.5%.
  16: "Higher temperatures reduce PV efficiency, with a typical 0.4\u20130.5 % loss\
    \ per 1 \u25E6C increase; Dust accumulation can reduce efficiency by up to 60\
    \ % in desert regions"
