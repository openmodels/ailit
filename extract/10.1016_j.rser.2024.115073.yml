  13: "\nEvaluation overview: \"Snow cover has complex effects on PV generation due\
    \ to the interaction of snow lying on the modules and reflected light from surrounding\
    \ snow-covered surfaces [190]. Although solar irradiance can penetrate through\
    \ snow [191], modules receive markedly lower irradiance with increasing snow depth,\
    \ lowering power output [192].\" Drivers of Risk: \"Module tilt is the most influential\
    \ factor in determining energy loss due to snow cover [197,198]. Reducing module\
    \ tilt from 40\u25E6to 30\u25E6in Utah, US (a high snowfall area) increased daily\
    \ output losses by 6\u201319% [197]. Climate change is increasing the frequency\
    \ and scale of wildfires globally [209\u2013211].\" Quantitative material: \"\
    Energy losses from snow cover in Munich, Germany amount to 0.3\u20132.7% [196],\
    \ whereas in Russia losses exceed 40% with 4 mm thick snow coverage [192]. Reducing\
    \ module tilt from 45\u25E6to 0\u25E6(lying horizontally) in Michigan, US increased\
    \ annual energy loss from 5% to 34% due to snow coverage [199].\" Highlights:\
    \ \"Fresh snow has a high albedo, reflecting 96\u201398% of solar irradiance in\
    \ the visible and near-UV range and ~80% across the full spectrum [180,181]. Even\
    \ snow-covered panels can receive incoming irradiance, and the heat generated\
    \ by PV modules is sufficient for snow to begin melting [190] at temperatures\
    \ as low as \03\xB0C.\" More Notes: \"The increased reflection from higher albedo\
    \ surfaces increases the insolation incident on solar modules, leading to increased\
    \ energy generation [186]. Wildfires produce large quantities of aerosols that\
    \ reduce solar PV performance by blocking sunlight. In California, where solar\
    \ power provides nearly 20% of electricity, the extreme wildfires in September\
    \ 2020 reduced solar energy production by 30% [212].\"\n"
