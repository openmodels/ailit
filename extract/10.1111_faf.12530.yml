Highlights:
  3: Chinook salmon stocks exhibit different ocean distributions and responses to
    SST variation. Future projections predict substantial ocean redistribution without
    a simple poleward shift.
  6: Chinook salmon's broad distributions and long-distance migrations make surveys
    for abundance and distribution challenging.
  7: The study provides a large-scale, integrated estimate of how Chinook salmon ocean
    distributions of individual stocks respond to variations in ocean conditions.
    The study also examines the relationship between climate scenarios and abundance
    to project abundance estimates and understand how aggregate Chinook salmon availability
    is projected to change among ocean regions.
  8: The model tracks the abundance of fish from the spring of age 2 to fall of age
    6, encompassing 19 seasonal time steps and 17 ocean regions, focusing on the distribution
    of fish during the summer season (June-July).
  10: Allows comparisons of SST association among stocks, uses predicted temperatures
    to evaluate future distributions
  11: Predicted spatial distributions for each of the focal Chinook salmon stocks
    were generated based on temperature anomalies. Total stock abundance (hatchery
    and non-hatchery produced fish) is used as a metric.
  12: Summer and fall SST patterns exhibit a trough in the southern portion of the
    range along the coast of northern California.
  13: "Future average ocean conditions during the summer are generally comparable\
    \ to extreme El Ni\xF1o events observed since 1982. By 2070 most average temperature\
    \ anomalies are expected to exceed SST observed since 1982, especially in the\
    \ northern portion of the range. Klamath and Columbia river stocks shifted north\
    \ in a warm year (1997) relative to a cool year (2008)."
  14: "There are stock-specific patterns of loss and gain in ocean distribution with\
    \ projections showing divergence from cooler years and similarities to strong\
    \ El Ni\xF1o years; northern British Columbia is expected to be stable or increase."
  16: Predicted shifts indicate increased abundance in central California and northern
    British Columbia, while regions like northern California and Washington may see
    a decline, affecting fisheries and predator-prey interactions.
  17: The study suggests integrating ocean distribution information into fisheries
    management scenarios in a warming ocean. It provides a framework to link freshwater
    productivity and hatchery practices to ocean distribution and availability in
    future research.
  18: There is not a fundamental, physiologically driven SST that universally predicts
