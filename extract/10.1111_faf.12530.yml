    \ MEN, NCA)."
  13: "Source material here.\nWhile projected temperatures uniformly increase for\
    \ all four future years, no future average temperature is beyond the range of\
    \ observed temperature deviations between 1982 and 2015 (Fig. 1C). Future average\
    \ ocean conditions during the summer are generally comparable to extremeElNi\u02DC\
    no events observed since 1982 (e.g. 1983, 1997; see NOAA, 2020), though by 2070\
    \ most average temperature anomalies are expected to exceed SST observed since\
    \ 1982 especially in the northern portion of the range (Fig. 1). As SSTs are driven\
    \ in part by basin-scale oceanographic processes, historical temperature deviations\
    \ are spatially synchronous with a coastwide median pairwise correlations of 0.47\
    \ and some adjacent ocean regions having correlations of greater than 0.90 (Fig.\
    \ S3.4). The estimation model converged and mixed well (\u02C6R convergence diagnostics:\
    \ \u02C6R < 1.01 for all parameters; Gelman & Rubin, 1992; Vehtari et al., 2020).\
    \ This is a large model, incorporating over 756,000 observations of presence/absence\
    \ and 47,000 of positive CWT recoveries. In future scenarios (including and beyond\
    \ 2070), individual years are expected to signi\uFB01cantly exceed the range of\
    \ historically observed SST anomalies. There were di\uFB00erences in summer ocean\
    \ distribution between cool (e.g. 2008) and warm (e.g. 1997) years (Fig. 3). For\
    \ the Klamath (NCA), and four Columbia river stocks (LCOL, MCOL, SNAK, URB), ocean\
    \ distributions shifted north in a warm year (1997) relative to a cool year (2008;\
    \ see also Fig. 1).\n"
  14: "Source material here.\nAggregate abundance across these six focal stocks may\
    \ shift in response to projected oceanic conditions. On average these stocks contribute\
    \ about 1.2 million maturing adults a year (sd = 0.52 million; range 0.50 - 2.33\
    \ million). Future predicted average summer ocean distribution for 2030 and 2070\
    \ appear generally similar to the distribution of a strong El Ni\xF1o year (1997;\
    \ Fig. 3). We combined historical abundance estimates of spawning Chinook salmon\
    \ with predicted changes in ocean distribution to understand how aggregate abundance\
    \ across these six focal stocks may shift in response to projected oceanic conditions.\
    \ Among stocks, the median weighted mean SST ranged nearly 2.7 C from 9.5 C for\
    \ the URB stock to 12.2 C for SFB (Fig. 4). Within a given stock, the weighted\
    \ mean SST among years varied from 1.7 C (SNAK; maximum weighted SST minus minimum\
    \ weighted SST) up to 3.1 C (NCA) among years. Ocean regions that have decreased\
    \ abundance for one stock generally show an increase for one or more other stocks.\
    \ Notable exceptions are northern British Columbia, which are predicted to remain\
    \ stable or increase for all stocks, and northern California which is predicted\
    \ to decrease. For all stocks, future predicted average summer ocean distribution\
    \ for 2030 and 2070 appear generally similar to the distribution of a strongElNi\xF1\
    o year (1997).\n"
  15: " \nSource material here.\n\"Discussion\nWe integrated disparate data sources\
    \ spanning over 25 degrees of latitude and 40 years to provide estimates of stock-specific\
    \ ocean distribution for Chinook salmon and how ocean distributions will shift\
    \ with SST. Our results show that individual stocks vary substantially in their\
    \ current distribution, have stock-specific relationships to SST, and respond\
    \ meaningfully to observed historical SST variation.\" (Lines 375-378)\n\n\"After\
    \ accounting for differences in relative abundances as well as the covariation\
    \ among stocks in maturing adult abundance (see Supplement S4), we predict in\
    \ 2050 aggregate abundance for these six stocks will increase or remain largely\
    \ unchanged in northern British Columbia and Alaska (changes of 33[23, 49], and\
    \ -6[-14, 0.5] thousand fish, respectively, median[interquartile range]). This\
    \ is a median change of 16% and -2% over current conditions, respectively.\" (Lines\
    \ 362-365)\n\n\"These changes occur primarily because of the southerly distributional\
    \ shift of the abundant SFB stock. While Oregon and southern British Columbia\
    \ are predicted to be largely unchanged (both change less than 10%), Washington\
    \ is predicted to decline substantially (-26[-36, -19] thousand, -24%).\" (Lines\
    \ 368-370)\n\n\"Our results show that individual stocks vary substantially...\
    \ and respond meaningfully to observed historical SST variation. However, estimated\
    \ responses to SST are not uniform in direction or magnitude, with one stock (SFB)\
    \ estimated to shift distribution southward in response to SST warming while another\
    \ (MCOL) shifted strongly northward and a third (URB) showed a minimal response\
    \ to SST.\" (Lines 377-381)\n"
  16: 'Source material here.

    We predict that changes in the distribution of Chinook will result in differential
    availability of Chinook salmon to resource users in the future. (lines 384-385)

    Predicted shifts in ocean distributions will result in changing availability of
    Chinook salmon to ocean fisheries. (line 408)


    the predicted shifts in abundance are not straightforward, with both northern
    ocean regions (northern British Columbia) and southern ocean regions (central
    California) predicted to have increased abundance while in between there are ocean
    regions of predicted decline (northern California, Washington), and others with
    almost no change (Oregon, southern British Columbia, Alaska). (lines 390-393)


    Predicted changes in abundance can be substantial for an individual ocean region
    (in some cases an approximate 25% change over current abundances). (lines 393-394)


    For example, the predicted divergence between SFB and NCA may make it easier to
    target abundant SFB when NCA are rare, or vice versa. (lines 413-414)

    However, the predicted distributional shifts may create new problems as well.
    (line 414)


    We emphasize that our results are not inclusive of all Chinook salmon populations
    present in these waters and so are not a complete picture of all Chinook salmon
    in these waters, but they do represent a majority of individuals in many ocean
    fisheries (see below) and suggest that individual shifts in stock ocean distribution
    will translate to substantial shifts in aggregate abundance. Compiling information
    on additional Chinook salmon groups ... is a major direction for future work.
    (lines 402-407)

