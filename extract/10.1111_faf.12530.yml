  12: "Source material: Importantly, this estimate includes multiple age-classes and\
    \ represents only the \uFB01sh that would mature...We then apportioned each stock\u2019\
    s total abundance among the di\uFB00erent ocean regions using the estimated proportional\
    \ distribution (the\u03B8s) corresponding to the current average (T = 0) and future\
    \ SST for 2030, 2050, and 2070...the summer and fall patterns exhibit a notable\
    \ trough in SST in the southern portion of the range. Additionally, we plot the\
    \ summer temperature deviations from 1982-2015 for each ocean region and the projected\
    \ temperatures for the ten year average deviation (\xB11 SD) for 2030, 2050, 2070,\
    \ and 2090 derived. We then used estimates of annual ocean exploitation rates\
    \ to expand in-river population size to the beginning of the summer season (June\
    \ 1) to match our ocean distribution model...We then apportioned each stock\u2019\
    s total abundance among the di\uFB00erent ocean regions using the estimated proportional\
    \ distribution (the\u03B8s) corresponding to the current average (T = 0) and future\
    \ SST for 2030, 2050, and 2070. We drew 1,000 samples from the posterior distribution\
    \ of \u03B8 and 1,000 draws from the abundance distribution to propagate the uncertainty\
    \ in distribution and abundance for each stock. We summarized both the proportional\
    \ change in abundance for each stock and the overall change in predicted aggregate\
    \ abundance. The summer and fall patterns exhibit a notable trough in SST in the\
