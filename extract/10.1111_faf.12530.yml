Methodology:
  3: The analysis uses a new spatio-temporal model to estimate the ocean distribution
    of Chinook salmon stocks from California to British Columbia over 40 years, with
    future projections based on SST changes.
  6: Relies on tag recoveries from fisheries to estimate distributions; notes complications
    due to varying fisheries efforts and the lack of systematic surveys.
  7: The study uses a Bayesian state-space model to track the spatio-temporal population
    dynamics of tagged Chinook salmon. The model incorporates data on recapture rates
    of coded wire tagged (CWT) Chinook salmon from fisheries across California to
    Alaska. The analysis uses future projections of ocean temperature to generate
    predictions of ocean distribution.
  8: The study uses a model that accounts for abundance of CWT groups, ocean distribution
    of CWT groups, fishery effort, and sampling rates for CWTs to infer biological
    processes, applicable to Chinook salmon from 16 origin regions between 1979 and
    2015.
  10: Uses the OISST dataset to derive season-specific temperature series for each
    ocean region. Supplements data for the Salish Sea with direct observations of
    SST. Calculates an anomaly for each ocean region-season combination. Estimates
    a coefficient for each stock-ocean region-season to determine how proportional
    occurrence in ocean regions varies with SST.
  11: "Uses the MPI45 model to project future SST (years 2025\u20132100) and calculates\
    \ temperature anomalies relative to the 1982\u20132005 period. Adjusts for differences\
    \ in reference periods. Combines distribution estimates with stock-specific abundance\
    \ estimates from PFMC and CTC, which are based on different assumptions from the\
    \ model used here."
  12: The study uses a joint distribution of abundances across stocks to account for
    covariation, apportions each stock's abundance among ocean regions using estimated
    proportional distributions corresponding to current and future SST, and propagates
    uncertainty using 1,000 samples from posterior distributions. The analysis is
    applicable to projections for 2030, 2050, 2070, and 2090.
  13: Population dynamics model used to estimate ocean distribution as a function
    of SST from 1982-2015.
  14: The analysis uses historical abundance estimates combined with predicted changes
    in ocean distribution, alongside SST impacts, to model and predict future distributions
    for 2030 and 2070.
  17: The study uses simulations, assuming constant stock abundance based on 1983-present
    data to isolate the effects of ocean climate on distribution. It acknowledges
    limitations related to this assumption and dependence on hatchery-origin fish
    data.
  18: The study uses observed relationships between SST and abundance to project distribution
    under future ocean conditions. The results show stock-specific differences in
    distribution, suggesting that species-level analyses may yield errant projections.
  24: Ocean simulations using the Max Planck Institute Ocean Model (MPIOM) (Jungclaus
    et al., 2013)
  26: Projected marine heatwaves.
  30: Projected distribution is derived from the MPI45 global circulation model, evaluating
    distribution across historical and projected SST conditions.
  31: Analysis of temperature data from 1950 to 2020 for specific coastal locations
    (NSEAK, NBC, CBC, etc.) along the west coast of the U.S. and part of Canada, assessing
    seasonal variations and long-term trends.
  32: The page shows statistical data analysis with line graphs and shaded areas potentially
    representing confidence intervals, used to analyse the proportionate trends, but
    further details on the methodology is not present.
  35: The analysis projects abundance to 2050 using unspecified methods.
