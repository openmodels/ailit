Drivers of Risk:
  3: Changes in sea surface temperatures (SST) are impacting the spatial distribution
    of Chinook salmon.
  6: Shifts in ocean distribution could be driven by changes in distribution of fisheries
    effort or true environmental changes.
  7: Sea surface temperatures (SST).
  8: Changes in the spatial distribution of fish in relation to sea surface temperatures
    (SST) are impacting outcomes.
  10: The paper evaluates the impact of sea surface temperature (SST) anomalies on
    the ocean distribution of different stocks.
  11: Changes in sea surface temperature (SST) are impacting the distribution and
    abundance of Chinook salmon.
  12: Changes in sea surface temperature (SST) are identified as impacting the distribution
    of salmon, with notable troughs in SST during summer and fall specifically in
    northern California regions.
  13: "Projected sea surface temperatures (SSTs) uniformly increase for all four future\
    \ years, with temperatures comparable to extreme El Ni\xF1o events."
  14: "Summer sea surface temperature (SST), specifically changes and variability\
    \ in SST driven by climate change and El Ni\xF1o events."
  15: Sea Surface Temperature (SST) changes are impacting the ocean distribution of
    Chinook salmon stocks.
  16: The drivers of risk include changes in ocean distributions due to environmental
    conditions such as coastal upwelling and temperature shifts.
  17: Predicted shifts stem from ocean climate and the complexities of various fishing
    sectors and management bodies.
  18: Changes in oceanographic conditions, particularly variations in SST, impact
    the distribution of Chinook salmon stocks.
  24: Mentions climate change, warm anomalies in the Pacific Ocean, and watershed-scale
    climate influences. Specific drivers include water temperature and flow for salmon.
  25: "Changing central Pacific El Ni\xF1os, climate change impacting salmon survival\
    \ and migration."
  26: Marine heatwaves are identified as a driver of ecological impact (Oliver et
    al., 2019).
  30: Summer sea surface temperature anomalies and their projected changes impact
    the distribution and abundance of Chinook salmon.
  35: No specific shocks or changes impacting the outcomes are mentioned.
Evaluation overview:
  3: This page evaluates the ocean distribution of major fall-run Chinook salmon stocks
    in response to ocean climate change, with a focus on spatial distribution shifts.
  6: No independent survey spans the entire oceanic range of any salmon species, complicating
    abundance and distribution assessments.
  7: Chinook salmon ocean distributions and abundance, stock-specific responses to
    climate conditions.
  8: The paper provides an overview of evaluating Chinook salmon mortality before
    age 2, fishing mortality, spatial distribution in relation to SST, and age-specific
    maturation loss.
  11: Changes in SST may shift the abundance of Chinook salmon among ocean regions.
  12: The paper does not provide a concrete overview of outcomes like mortality or
    productivity loss on this page.
  14: Aggregate abundance across six focal stocks of Chinook salmon.
  15: The paper evaluates the distributional shifts and abundance changes of Chinook
    salmon stocks in different geographic regions based on ocean conditions.
  16: The paper evaluates predicted changes in the distribution and abundance of Chinook
    salmon among various ocean regions.
  17: The paper suggests the importance of integrating ocean distribution information
    for future management scenarios in a warming ocean.
  18: The paper evaluates the relationship between sea surface temperature (SST) and
    the abundance and distribution of Chinook salmon.
  24: The papers focus on the productivity, fisheries, and populations of marine species
    like salmon, killer whales, and pollock.
  25: The studies examine survival rates and migration timing of North American and
    Southeast Alaskan salmon, and adaptive potential of Pacific salmon challenged
    by climate change.
  26: Several papers address impacts on salmon including declines in body size (Oke
    et al. 2020), timing of seaward migration (Otero et al. 2014), and responses to
    CO2-induced aquatic acidification (Ou et al. 2015).
  30: Projected distribution and abundance of Chinook salmon under various summer
    sea surface temperature conditions.
  35: The image provides data on fish abundance trends across different regions over
    time.
Highlights:
  3: Different stocks of Chinook salmon have distinct ocean distributions and associations
    with SST; predicted shifts in ocean distribution due to SST changes don't follow
    a simple poleward shift and vary by region.
  6: Historical shifts in fisheries effort driven by changes in conservation status
    or hatchery practices complicate the identification of true distribution changes.
  7: The study provides a large-scale, integrated estimate of how Chinook salmon ocean
    distributions respond to variation in ocean conditions and projects abundance
    changes under different climate scenarios.
  8: The study focuses on six key Chinook salmon stocks contributing to major fisheries,
    detailing results for fall-run Chinook salmon in California's Central Valley,
    Klamath basin, and the Columbia River.
  11: The study predicts spatial distributions of Chinook salmon stocks based on projected
    temperature anomalies. It combines distribution estimates with stock-specific
    abundance estimates to understand how SST changes may affect salmon abundance
    in different ocean regions.
  12: The paper indicates a notable SST spatial trend inversion in summer and fall,
    showing declining temperatures from northern California along the coast.
  13: Differences in summer ocean distribution observed between cool and warm years,
    with northern shifts in ocean distributions for some stocks during warm years.
  14: Ocean regions that have decreased abundance for one stock generally show an
    increase for one or more other stocks.
  15: Individual stocks show varying distribution responses to SST; SFB stock shifts
    southward, MCOL shifts northward, and URB shows minimal response.
  16: Key highlights include projected regional variations in Chinook salmon abundance
    and the implications for fisheries, with increases in central California and northern
    British Columbia, and decreases in northern California and Washington.
  17: Future management scenarios should consider oceanographic effects on Chinook
    salmon distribution.
  18: It suggests that a species-level analysis ignoring stock-specific differences
    could result in inaccurate projections of Chinook salmon distribution changes
    under future climate conditions.
  24: The persistence of warm anomalies in the Pacific Ocean and the effect of climate
    on salmon populations are highlighted.
  25: Key outcomes include reduced stability of salmon survival rates, shifts in migration
    timing, and adaptive challenges for Pacific salmon due to climate change.
  26: Climate change is linked to distribution shifts in marine fishes (Perry et al.,
    2005) and marine taxa tracking local climate velocities (Pinsky et al., 2013).
  30: Estimated proportional change in summer ocean distribution for Chinook stocks
    and projected change in cumulative abundance by 2050.
  35: Notable growth in fish abundance in Southern Columbia; Alaska shows the highest
    abundance in bar graph.
Methodology:
  3: A spatio-temporal model is used to estimate the ocean distribution of Chinook
    salmon stocks over 40 years, using data from tagged individuals and future SST
    projections (2030-2090).
  6: The difficulty in assessing Chinook salmon distribution comes from relying on
    recoveries of tagged fish caught in fisheries and spatial patterns of aggregate
    fisheries catch.
  7: A Bayesian state-space model tracks the spatio-temporal population dynamics of
    1,400 tagged groups of Chinook salmon from 16 origins between 1979 and 2015. Recapture
    rates of coded wire tagged (CWT) Chinook salmon from fisheries are used to estimate
    model parameters.
  8: The analysis is performed using a model that accounts for the ocean region, season,
    fishery efforts, and CWT recoveries to infer biological processes, tracking fish
    abundance from age 2 to 6 across 19 seasonal time steps and 17 ocean regions.
  10: A global circulation model (GCM), Max Planck Institut Earth System Model, is
    used to predict future SST under the RCP4.5 scenario.
  11: "SST data from the MPI45 model (years 2025\u20132100) is used to project temperature\
    \ anomalies relative to a 1982-2005 baseline. Offsets were applied to account\
    \ for differences in reference periods. Stock-specific abundance is estimated\
    \ using data from the Pacific Fisheries Management Council (PFMC) and the Pacific\
    \ Salmon Commission\u2019s Chinook Technical Committee (CTC)."
  12: The analysis uses estimates of annual ocean exploitation rates and SST data
    to estimate salmon distributions across different ocean regions for current and
    future conditions, summarizing changes in salmon abundance.
  13: Population dynamics model converged and mixed well with over 756,000 observations
    of presence/absence and 47,000 positive CWT recoveries analyzed.
  14: Predictions are made for average summer ocean distribution in 2030 and 2070.
  15: The analysis integrates data over 25 degrees of latitude and 40 years to estimate
    stock-specific ocean distribution and how these distributions shift with SST changes.
  16: The analysis involves modeling shifts in Chinook salmon ocean distribution and
    predicting future abundance in different regions.
  17: The model assumes the abundance of focal stocks is represented by recent decades
    to isolate climate-driven shifts.
  18: The analysis uses SST as a covariate in models estimating Chinook salmon ocean
    distribution, while acknowledging limitations due to stock-specific variability.
  24: Includes modeling of ocean systems and analysis of fisheries impacts.
  26: R Core Team (2019) provides an environment for statistical computing.
  30: Analysis of historical and projected summer sea surface temperatures and their
    effects on Chinook salmon distribution using the MPI45 global circulation model.
  35: Projections and visualizations depict changes in fish stock abundance through
    2050.
More Notes:
  6: No studies mentioned on this page can definitively confirm shifts in distribution
    due to climate change; current methods and data are limited.
  7: The model extends and improves a previous ocean distribution model by adding
    20 years of recovery data, accommodating annual variation in distribution, and
    linking ocean distributions to observed SST.
  8: Data includes information from 1,400 hatchery-stage-year groups consisting of
    various origin regions ranging from California to southern British Columbia.
  11: The MPI45 scenario was considered the most likely. The study addressed missing
    Salish Sea data by using the average predicted offset from other ocean regions.
  12: This page doesn't provide direct information on specific climate impacts like
    mortality or productivity loss but focuses on temperature-induced distribution
    changes.
  16: The study emphasizes that it does not cover all Chinook salmon populations and
    suggests the need for further research on distributional shifts.
  18: The paper identifies the need for more diverse oceanographic variables beyond
    SST to improve distribution models for Chinook salmon.
  24: Many of these entries are reference list entries, so the actual details of the
    studies would need to be reviewed to obtain specific values and complete methods.
  25: Limited specific methodological details or quantitative results are presented
    on this page.
  35: The regions display varied fish abundance patterns, with Southern Columbia and
    Alaska noting significant changes.
Quantitative material:
  7: "Stock- and year-specific estimates of ocean distribution; estimates of each\
    \ stock\u2019s association with SST; abundance estimates; projections of aggregate\
    \ Chinook salmon availability among ocean regions."
  8: Quantitative data presented include the release of 353 million Chinook salmon
    between 1978 and 2010, and an estimated 1.3 million recovered CWT tags between
    1979 and 2015.
  11: Predicted average temperature anomalies for each season-ocean region are summarized
    in ten-year blocks centered on 2030, 2050, 2070, and 2090.
  12: The analysis involves plotting summer temperature deviations from 1982-2015
    and projected temperatures for future periods such as 2030, 2050, 2070, and 2090.
  13: By 2070, most average temperature anomalies are expected to exceed SSTs observed
    since 1982, especially in the northern portion of the range.
  14: Average these stocks contribute about 1.2 million maturing adults a year (sd
    = 0.52 million; range 0.50 - 2.33 million).
  15: Predicted changes in Chinook salmon abundance by 2050 include a 16% increase
    in northern British Columbia, a 2% decrease in Alaska, a 21% increase in central
    California, a 33% decrease in northern California, and a 24% decrease in Washington.
  16: Predicted changes in abundance by approximately 25% over current levels for
    individual ocean regions are reported.
  18: The weighted mean SST varied among Chinook salmon stocks by 2.7 degrees Celsius.
  24: Includes specific years for warm anomalies (2014-16) and quantitative data within
    the linked papers (e.g., percentage changes in salmon populations).
  26: Projected marine heatwave impacts are mentioned, suggesting quantitative projections
    in Oliver et al. (2019).
  30: "Projected mean \xB1 1SD anomalies for ten-year periods centered on 2030, 2050,\
    \ 2070, and 2090."
  35: The heatmap shows proportional changes, with Southern Columbia having a growth
    value of 0.23.
sourcematerial:
  3: "Source material here.\n- Evaluation overview: \"To understand a prominent anadromous\
    \ species\u2019 response to ocean climate, we use a new spatio-temporal model\
    \ jointly estimating the ocean distribution of all major fall-run Chinook salmon\
    \ (Oncorhynchus tshawytscha, Salmonidae) stocks from California to British Columbia\
    \ over 40 years.\" (Lines 23-25)\n- Drivers of Risk: \"Predicted aggregate distributional\
    \ changes do not follow a simple, poleward shift...Distribution shifts have implications\
    \ for both major fisheries and marine mammal predators of Chinook salmon.\" (Lines\
    \ 31-34)\n- Methodology: \"We model hundreds of millions of tagged individuals...Using\
    \ future (2030-2090) SST projections to model focal stocks of fisheries importance\
    \ we predict substantial ocean re-distribution in response to SST change.\" (Lines\
    \ 26-30)\n- Highlights: \"Different stocks have fundamentally different ocean\
    \ distributions, distinct associations with sea surface temperature (SST), and\
    \ contrasting distributional responses to historical ocean SST variation.\" (Lines\
    \ 26-28)\n"
  6: " \nEvaluation overview: \"To our knowledge, no systematic survey spans the entire\
    \ oceanic range of any salmon species. The absence of fishery-independent surveys\
    \ can greatly complicate the estimation of distributional shifts.\" (lines 98-100)\n\
    \nDrivers of Risk: \"Specifically, any shifts in the patterns of tag recoveries\
    \ could be caused by either a true shift in ocean distribution or changes to the\
    \ location and intensity of fisheries.\" (lines 108-109)\n\nMethodology: \"Existing\
    \ rigorous descriptions of ocean distribution are dependent upon recoveries of\
    \ tagged fish captured in fisheries...Other estimates of ocean distribution for\
    \ salmon occur at the species-level and rely on the spatial patterns of aggregate\
    \ fisheries catch.\" (lines 100-103)\n\nHighlights: \"Historical shifts in fisheries\
    \ effort have largely been driven by changes in Chinook salmon availability \u2013\
    \ either as a result of changes to the conservation status of some populations\
    \ or shifts in hatchery practices for some regions.\" (lines 110-112)\n\nMore\
    \ Notes: \"Previous studies have indicated a lack of annual variation in broad-scale\
    \ Chinook salmon ocean distributions, suggesting little potential for distributions\
    \ to shift in response to future climate change.\" (lines 114-116)\n"
  7: "Source material here:\nEvaluation overview: \"Here, we provide a large-scale,\
    \ integrated estimate of how Chinook salmon ocean distributions of individual\
    \ stocks respond to a variation in ocean conditions... we examine the relationship\
    \ between climate scenarios and abundance to project abundance estimates...\"\n\
    Drivers of Risk: \"...linking ocean distributions to observed sea surface temperatures\
    \ (SST)...\"\nQuantitative material: \"...stock- and year-specific estimates of\
    \ ocean distribution...estimates of each stock\u2019s association with SST...abundance\
    \ estimates...projections of aggregate Chinook salmon availability is projected\
    \ to change among ocean regions.\"\nMethodology: \"We constructed a Bayesian state-space\
    \ model to track the spatio-temporal population dynamics...We use data on the\
    \ recapture of coded wire tagged (CWT) Chinook salmon...to estimate the parameters\
    \ of the model...\"\nHighlights: \"Here, we provide a large-scale, integrated\
    \ estimate of how Chinook salmon ocean distributions of individual stocks respond\
    \ to a variation in ocean conditions...we examine the relationship between climate\
    \ scenarios and abundance to project abundance estimates...\"\nMore Notes: \"\
    Our model extends and improves an ocean distribution model...by adding 20 years\
    \ of recovery data, accommodating annual variation in distribution, and linking\
    \ ocean distributions to observed sea surface temperatures (SST).\"\n"
  8: " \nOur model uses the ocean region, season, and fishery where recovery occurred\
    \ as well as information about the fisheries effort and catch sampling for CWT\
    \ to infer four main biological processes: 1) the mortality of juvenile fish prior\
    \ to spring of age 2; 2) fishing mortality by age and ocean region from each fleet;\
    \ 3) the spatial distribution of fish in the ocean and relationship between SST\
    \ and ocean distribution; and 4) the age-specific loss of fish from the ocean\
    \ due to maturation. (Lines 166-171)\n\nThe spatial distribution of fish in the\
    \ ocean and relationship between SST and ocean distribution (Line 169)\n\nThese\
    \ 1,400 hatchery-stage-year groups (hereafter release groups) can include more\
    \ than one CWT tag code and represent a total of 353 million Chinook salmon released\
    \ between 1978 and 2010 (brood years 1977 to 2009; Tables S2.2, S2.3) and recovered\
    \ in the ocean between 1979 and 2015 (an estimated 1.3 million recovered tags).\
    \ (Lines 158-161)\n\nWe track the abundance of fish from the spring of age 2 (defined\
    \ as calendar year minus brood year) to fall of age 6, encompassing 19 seasonal\
    \ time steps and 17 ocean regions. (Lines 171-172)\n\nWe focus on six stocks with\
    \ the largest number of tagged fish in our dataset that contribute disproportionately\
    \ to the major Chinook salmon fisheries along the west coast of North America.\
    \ We detail results for fall-run Chinook salmon from California\u2019s Central\
    \ Valley (hereafter \u201CSFB\u201D), the Klamath basin in northern California\
    \ (\u201CNCA\u201D), the lower Columbia River fall-run Chinook (\u201CLCOL\u201D\
    ; also known as \u201Ctules\u201D), the bright run from the middle Columbia River\
    \ (\u201CMCOL\u201D), the upriver bright run from the Columbia River (\u201CURB\u201D\
    ). (Lines 177-181)\n\nThese 1,400 hatchery-stage-year groups (hereafter release\
    \ groups) can include more than one CWT tag code... Chinook salmon originating\
    \ from different rivers are known to have distinct ocean distributions. (Lines\
    \ 158-162)\n"
  10: "plaintext\nDrivers of Risk: \"this deviation on ocean distribution.\" (lines\
    \ 218-219)\nMethodology: \"Speci\uFB01cally, we used the Optimum Interpolation\
    \ Sea Surface Temperature (OISST) dataset to derive season speci\uFB01c temperature\
    \ series for each ocean region from 1982 to 2015\" (lines 210-211)\nMethodology:\
    \ \"we supplemented our data with direct observations of SST in those ocean regions\
    \ (see Supplement S3)\" (lines 212-213)\nMethodology: \"The anomalies,Tl,s,c,\
    \ are the deviation from average SST and therefore\u03C8r,l,sTl,s,c determined\
    \ the e\uFB00ect of this deviation on ocean distribution. This form is very \uFB02\
    exible. Even though it is linear in terms, it allows many possible relationships\
    \ between proportional distribution and SST.\" (lines 218-220)\nMethodology: \"\
    We used a global circulation model (GCM) - the medium resolution Max Planck Institut\
    \ Earth System Model (Giorgetta et al., 2013; Jungclaus et al., 2013) - to provide\
    \ predicted temperatures for SST for each season and ocean region.\" (lines 228-229)\n"
