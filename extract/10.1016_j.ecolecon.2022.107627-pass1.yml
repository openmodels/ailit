Drivers of Risk:
  2: The dry spells co-occur with drought, heat waves, aridity, and their combined
    effects impact crop yields.
  3: Dry spells, longer-term water stress (aridity, multi-month or multi-year droughts,
    low annual precipitation), and simultaneously co-occurring stressors.
  4: Combined dry and hot weather and their potential interactions are drivers of
    risk for agricultural outcomes.
  5: Dry spells and their interaction with heat waves, drought, and aridity are analyzed
    as drivers impacting crop production growth.
  6: The primary driver of risk is the occurrence of dry spells, defined as the number
    of abnormally dry days that are preceded by at least a certain number of other
    dry days.
  7: Abnormally dry days, specifically during the hottest 90 days of the year, are
    a driver.
  8: Heat waves and joint exposure to dry spells and heat waves are considered risk
    drivers.
  9: "Drought (using Standardized Precipitation-Evaporation Index (SPEI)), average\
    \ temperature, annual precipitation, aridity (FAO\u2019s aridity index), irrigation"
  10: Water stress, heat stress, heat wave days, dry spell days, drought level (SPEI),
    prevailing climate regimes, trends, and punctuated weather events.
  11: Exposure to dry spells, particularly in more arid regions and during drier years,
    impacts the growth in crop production.
  12: Dry spells (DS), heat waves (HW), and drought (D)
  13: Exposure to both dry spells and heat waves, both simultaneously and co-located,
    impacts outcomes.
  14: Dry spells and heat waves are identified as factors impacting agricultural productivity.
  17: Dry spells extending beyond 28 days during the hottest part of the year negatively
    impact growth in the FAO CPI.
  18: The primary drivers of risk examined are dry spells and heat waves.
  19: Dry spell days, heat wave days, aridity index
  20: Dry spells (presumably a period of sustained dryness).
  21: "Dry spell days, annual water deficits (SPEI \u2264 0), aridity (aridity index\
    \ \u2264 0.65), heat wave days"
  22: Dry spells, low soil moisture (proxied by 'green water'), drought (low SPEI),
    aridity, heat wave days.
  23: Heat waves and dry spells.
  24: Dry spells (number, duration, and fraction of crop area affected).
  26: Green water anomalies, extreme dry and wet spells (duration and timing), heat
    waves, temperature, drought, drought and heat stress combination, anthropogenic
    warming
  27: Climate change, climate extremes, drought, heat stress, water stress, uneven
    precipitation distributions.
  31: Climate extremes such as heat waves, drought, and water excess are impacting
    crop yields.
  32: Temperature and precipitation
  33: The relationship between heat stress and water stress over time, with specific
    focus on dry spell days and heat wave days.
  35: "Dry spell exposure, Drought (SPEI \u2264 0), Aridity (Aridity Index)"
  36: The page identifies dry spells, heat waves, drought (SPEI), mean temperature,
    and total precipitation as drivers impacting growth in FAO CPI.
  37: Dry spell days and heat wave days are identified as key drivers.
  38: Additional dry spell days during extended dry periods with accompanying heat
    waves are examined as the potential shock affecting outcomes.
  41: Shocks of dry spell days in combination with different durations of heat waves
    are evaluated.
  42: Dry spell days are a driver of risk.
  43: Dry spell day (minimum duration of 28 days).
  44: The impact outcomes are influenced by dry spells lasting different durations.
  45: Dry spell day.
  46: Dry spells and drought, evaluated with country-level aridity and SPEI.
  47: Impact of additional dry spell days during spells of 28 days or more when accounting
    for heat wave days and SPEI levels.
Evaluation overview:
  2: The study provides an overview of the impact of 4-5 week dry spells on global
    crop production.
  3: This paper focuses on the impact of dry spells (prolonged periods of abnormally
    low precipitation) on agriculture.
  4: The page discusses potential interactions between dry spells and temperature
    stress on agricultural outcomes.
  5: The paper evaluates the impact of dry spells on the growth of aggregate crop
    production globally and their interaction with co-occurring stressors like heat
    waves, drought, or aridity.
  6: The paper evaluates the production consequences of dry spells on crop outputs,
    focusing on value-weighted net crop production outside of agriculture.
  9: Not applicable
  10: Growth in crop production
  11: This page does not explicitly provide an overview of the outcome, but it suggests
    a focus on growth in crop production.
  12: Growth rate in the FAO CPI (country-level food production growth)
  14: The page discusses evaluating the impact of irrigation on agricultural outcomes,
    specifically on cereal yield under dry spells.
  17: The paper evaluates the impact of dry spells on growth in the FAO CPI.
  18: The paper evaluates the impact of dry spells on growth in crop production.
  19: Crop damage/growth in crop production
  20: Growth in FAO CPI and growth in cereal yields are being evaluated.
  21: Growth in crop production
  22: Crop production.
  23: Crop production on an annual, national scale.
  24: Crop exposure to abnormally high temperature or abnormally low precipitation.
  26: Crop yield, economic production, water withdrawals for irrigation, plant vulnerabilities
  27: Agricultural impacts (e.g., farmland values, crop yields).
  31: The impact of climate extremes like heat waves and drought on US crop yields.
  32: European crop yields
  35: Crop production growth
  36: The page does not provide a comprehensive overview of the outcome being evaluated
    but mentions the effect of climatic factors on the growth in FAO CPI.
  37: The specific outcome being evaluated is not explicitly stated on this page,
    but the table explores the impacts of dry spells and heat waves, suggesting the
    outcome is sensitive to these climate stressors.
  38: The analysis evaluates the impacts of additional dry spell days on cereal yield
    and the FAO CPI, allowing variations with aridity, drought, and irrigation.
  42: The paper assesses the growth effect of dry spells.
  43: Estimated effect of an additional dry spell day on an unspecified outcome related
    to agriculture, fisheries, and forestry, possibly value added per capita.
  45: Growth in the FAO CPI (crop production index).
  46: No specific outcome, such as mortality or productivity loss, is mentioned.
Highlights:
  2: Losses in crop yields due to dry spells are concentrated in areas not equipped
    for irrigation, suggesting adaptation can mitigate impacts.
  3: "Understanding the impacts of dry spells on agriculture is likely to grow in\
    \ importance due to links between dry spell occurrence and climate change, and\
    \ the potential contribution of dry spells to recent \u2018flash droughts\u2019\
    ."
  9: Not applicable
  10: Exposures to water stress and heat stress are related and evolving. The prevalence
    of heat wave days and dry spell days is different in arid vs less arid countries.
    Drought has a relationship with the number of dry spell days. Observations with
    high numbers of heat wave days are more common when SPEI is below zero. Exposure
    to dry spells, heat waves, and drought conditions is changing through time.
  11: Exposure to dry spells is negatively correlated with growth in crop production,
    particularly in more arid regions and during drier years.
  12: The primary interest is in quantifying the effect of dry spells on the FAO CPI
    growth rate.
  14: The analysis aims to differentiate the impact of irrigation by focusing on cereal
    yields, potentially isolating the effects of irrigation on mitigating dry spell
    impacts.
  16: The study focuses on the impact of an additional day in a dry spell of at least
    28 days, finding significant negative effects on crop production.
  17: The direct effects of dry spells are evident, with indirect effects being quite
    small.
  18: The main results indicate negative effects of extended dry spells on crop production
    growth; these effects are robust across different model specifications.
  19: "Dry spell days are less damaging when heat waves occur in the same year. Compounding\
    \ effect of joint exposure to dry spells and heat waves is only observed for 12+\
    \ day heat waves. The effects of dry spells are more damaging in more arid locations\
    \ (aridity index \u2264 0.65)."
  20: "Dry spells are primarily damaging in countries and years in which an aggregate\
    \ annual water deficit (12-month SPEI \u2264 0) occurs; Dry spells are damaging\
    \ when they occur in cells with less area equipped for irrigation."
  21: Dry spell days have a modest average direct effect on growth in crop production.
    Dry spells are more damaging in locations with annual water deficits or that are
    arid. Dry spells appear less harmful when occurring during the same year as heat
    wave days. Dry spells are less damaging in areas more equipped for irrigation.
  22: Short-term water stress (dry spells) is more damaging when longer-term water
    stress (drought or aridity) is present. There is an absence of an interactive
    effect of dry spell days and heat wave days when they occur simultaneously.
  23: Heat and water stress likely have non-additive effects on crops, specifically
    when dry spells and heat waves occur in the same year. Dry spell and heat wave
    variables may embed some joint exposure effects.
  24: Irrigation helps reduce the effects of dry spells, consistent with findings
    from other drought studies.
  26: Underappreciated plant vulnerabilities to heat waves, anthropogenic warming
    has increased drought risk in California, drought and heat stress combination
    impact on crop yield and yield components, temperature shocks and economic growth
  27: Potential benefits from innovations to reduce heat and water stress (Hendricks,
    2018), drought impacts on agriculture (Kuwayama et al., 2019), uneven precipitation
    distributions impacting crop yields (Fishman, 2016).
  31: Wheat yield loss is attributable to climate extremes like heat waves, drought,
    and water excess at multiple scales.
  32: Bivariate return periods of temperature and precipitation explain a large fraction
    of European crop yields.
  33: The 2016 plot shows a more pronounced increase in dry spell and heat wave days
    in more arid countries compared to 1979.
  34: "Important outcomes include mean dry spell days of 7+ days at 18.33 days, and\
    \ mean average temperature at 22.43\xB0C."
  35: "Dry spell exposure is generally negatively correlated with crop production\
    \ growth. The negative correlation is stronger under drought conditions (SPEI\
    \ \u2264 0) and in areas with an aridity index below the median."
  36: Noteworthy outcomes include significant negative effects of heat wave days on
    the growth in FAO CPI and notable coefficients for dry spell day impacts when
    dry spells meet specified durations.
  37: The impact of dry spells and heat waves varies depending on the duration of
    heat waves. The interaction between dry spell days and heat wave days is statistically
    significant in many cases. The joint exposure to dry spells and heat waves (DSHW)
    can have significant, sometimes negative, impacts.
  38: The negative effect on cereal yield is lessened with more irrigation, and dry
    spell days have a mixed impact on the FAO CPI, depending on aridity and drought
    conditions.
  41: Longer dry spells combined with longer heat waves result in more significant
    negative effects, with the highest significance at 12 days heat wave and 35 days
    dry spell durations.
  42: Current-year dry spell days have a statistically significant negative impact
    on the outcome (at the p<0.05 level), while the one-year lag has a statistically
    significant positive impact in some specifications (at the p<0.1 and p<0.05 levels).
    The p-value for the test of the null hypothesis that the sum of dry spell coefficients
    is zero is generally high (above 0.27), suggesting a potential level effect of
    dry spells, but little or no long-run growth effect.
  43: Additional dry spell days generally have a negative and statistically significant
    impact (at least at the 5% level) on the outcome variable across most model specifications.
  45: Focusing on the hottest part of the year (90 or 120 days) shows a larger negative
    effect of dry spell days on crop growth than considering the full year.
  46: "Dry spells have negative effects in areas below median aridity and during drought\
    \ conditions (SPEI \u2264 0)."
Methodology:
  2: Analysis is based on a global panel of daily precipitation and temperature data
    from 1979 to 2016, considering multi-timescale and multi-stressor perspectives.
  3: The paper emphasizes the need to account for simultaneously co-occurring stressors
    when studying the effects of dry spells on agriculture, as these stressors can
    trigger different and interacting stress responses in plants.
  5: The analysis uses a panel dataset from 1979-2016 to evaluate the impact of dry
    spell exposure and related stressors on crop production; secondary analyses examine
    the role of irrigation in mitigating these effects.
  6: The analysis uses a variable called 'number of dry spell days' to measure the
    persistence of dry spells, and examines daily precipitation data from 1979 to
    2016 from the Climate Prediction Center.
  7: Dry spell days are aggregated to spatially weighted averages using cropland area
    according to EARTHSTAT data.
  8: Variables are constructed based on effect modifiers such as drought, aridity,
    and irrigation, with grid cells assigned to groups based on modifier values.
  9: Data on longer-run water stress, average temperature, annual precipitation, aridity,
    and irrigation are assembled to complete the dataset. SPEI is calculated using
    12-month averages or using months prior to the hottest 90 days. The aridity index
    is defined as the ratio of precipitation and average annual potential evapotranspiration.
    Irrigation data provides an estimated fraction of the area irrigated per pixel
    (circa 2005). National weighted exposure is constructed using the same spatial
    weighting scheme as for the dry spell variable.
  10: Examines the relationship between exposure to environmental stressors and growth
    in crop production, adjusting for agricultural value added per capita. Focuses
    on dry spells and heat waves as relatively rare events.
  11: The analysis involves fixed effects models relating growth in the FAO CPI to
    dry spell exposure, with consideration of aridity and wetness levels.
  12: Linear regression model with country and year fixed effects. Includes covariates
    such as temperature, precipitation, and country-specific time trends. Distributed
    lag models are used in the appendix to assess the persistence of dry spell effects.
  13: The analysis uses statistical models to capture impacts of dry spells and heat
    waves, including the effects of drought and aridity on these stressors within
    country-level variations.
  14: The analysis involves comparing dry spell days and heat wave days for more irrigated
    (MI) and less irrigated (LI) areas, with a focus on cereal yields. Spatial aggregation
    weights are adjusted for cereal crops.
  15: Bias in parameter estimation is mitigated by the two-step nature of sequential
    g-estimation compared to ordinary least squares.
  16: Growth in agricultural value added per capita is examined as an alternative
    outcome.
  17: The analysis estimates the direct effect of dry spells by adjusting for annual
    precipitation and conditioning on drought.
  18: The analysis involves robustness checks with various covariates, polynomial
    trends, alternate outcomes, and sequential g-estimation, focusing on the controlled
    direct effect of dry spells.
  19: Regression analysis of the effects of dry spells and heat waves on crop production,
    considering interactive effects and simultaneous exposure. Dry spells are defined
    based on the hottest 90 days of the year, with a sensitivity analysis using the
    hottest 120 days or the full year.
  20: Regression analysis (g-estimation) is used to evaluate how the effects of dry
    spells vary with national drought levels; The analysis is applicable to grid cells
    that are more arid (aridity index > 0.65) or are experiencing a relative water
    surplus (12-month SPEI > 0); Also uses cross-country variation in national aridity
    or drought.
  21: The study uses statistical estimates to analyze the relationship between dry
    spells and crop production, considering factors like water deficits, aridity,
    heat waves, and irrigation.
  23: Analysis is based on globally gridded temperature and precipitation data. Enforces
    a single threshold and minimum duration for each stressor.
  24: Statistical models are used to assess the impact of dry spells on crop exposure,
    but they assume equivalence in impact among changes in the number, duration, and
    fraction of crop area affected by dry spells.
  27: Ricardian models of farmland values (Fezzi & Bateman, 2015), spatially aggregated
    projections (Fischer et al., 2013), US Drought Monitor (Kuwayama et al., 2019).
  33: Uses scatter plots to visually compare heat and water stress through drought
    index (SPEI) and dry spell days; evaluates differences between more and less arid
    countries.
  35: The analysis computes correlations between within-country demeaned FAO CPI growth
    rates and within-country demeaned dry spell days for 28+ day dry spells using
    panel bootstrap with 1000 replicates. The analysis is performed for different
    water stress conditions based on SPEI and aridity index.
  36: The analysis estimates effects using a regression model, possibly including
    fixed effects and trends, specifically focused on the direct effect on growth
    in FAO CPI from additional days in dry spells.
  37: "The analysis uses regression (Equation 2) to estimate the effects of dry spell\
    \ days, heat wave days, their interaction, and joint exposure days. Standard errors\
    \ are clustered at the country level. Different minimum durations are used to\
    \ define heat waves (3+, 6+, 9+, 12+ day heat waves). The analysis focuses on\
    \ 28+ day dry spells. Within each pair of columns, the first column imposes \u03B1\
    4 = 0 to reflect a typical interaction term approach, while the second column\
    \ estimates \u03B14."
  38: The effects of a dry spell day are estimated by allowing variation with aridity,
    drought, and irrigation, evaluated using spatial weights to aggregate, with standard
    errors clustered at the country level.
  39: Distributed lag models and split-sample estimates are used to analyze dry spells,
    aridity, and drought.
  40: The demediation step involves removing estimates of all terms involving drought
    and recentering observed values of drought around a target level of the SPEI to
    analyze direct effects of dry spells.
  41: Analysis uses Equation (1) from the main text to estimate effects with standard
    errors clustered at the country level.
  42: The analysis uses a distributed lag model (variants of equation (1) from the
    main text) to estimate the effect of dry spell days, heat wave days, drought,
    temperature, and precipitation (and their squares) on the outcome. Standard errors
    are clustered at the country level. The models successively introduce additional
    lags from 1 to 5 years.
  43: The analysis uses variants of a baseline specification (equation (1) in the
    main text). The models include adjustments for temporal weighting using cropped
    area, SPEI, temperature bins, polynomial terms for precipitation and temperature,
    country-specific trends, lagged environmental variables, and lagged economic variables.
    Standard errors are clustered at the country level. The number of observations
    ranges from 3153 to 4072.
  44: Analysis is performed using sequential g-estimation with 95% confidence intervals
    calculated via panel bootstrap.
  45: 'Variants of equation (1) are used to estimate the effect of a dry spell day
    on growth in the FAO CPI. Dry spell and heat wave variables are constructed using
    different subsets of days in the year: the hottest 90 days, the hottest 120 days,
    and all days in the year. Days are weighted temporally by the cropped area in
    a cell in the month when a dry spell occurs, relative to the maximum area in that
    cell in any month, using the MIRCA2000 dataset. Standard errors are clustered
    at the country level.'
  46: Analysis using split-sample and interaction terms with country-level aridity
    and SPEI, considering heat wave days and dry spells.
  47: Uses sequential g-estimation to account for the influence of dry spells on the
    12-month SPEI, with confidence intervals obtained via panel bootstrap.
More Notes:
  4: The paper emphasizes the complexity and interdependence of dry spells and heat
    stress, suggesting a need for a comprehensive analysis.
  9: "The study uses a variety of climate and irrigation data sources, including the\
    \ Climate Prediction Center, FAO\u2019s AQUASTAT database, and the Climate Research\
    \ Unit\u2019s CL 2.0 Global Climate Dataset."
  10: The CPC dataset is the basis for analysis of the included countries. The analysis
    must account for prevailing climate regimes, trends, and droughts when isolating
    the effects of punctuated weather events.
  12: The analysis attempts to distinguish between transitory and persistent impacts
    of dry spells, finding evidence that the direct effects are transitory. The model
    also explores potential interactive effects between dry spells and heat waves.
  15: Inference for sequential g-estimation involves bootstrapping both stages to
    account for clustering.
  19: The definition of dry spells focusing on the hottest part of the year may embed
    the effect of heat. Results are sensitive to the definition of dry spells (90
    vs. 120 days).
  20: The paper suggests that irrigation might lead to higher-value crops and yields,
    so losses from dry spells could have larger effects on the FAO CPI in irrigated
    areas. The analysis modifies the specification to mitigate potential effects of
    irrigation on crop choice and baseline productivity.
  21: The study acknowledges that the heterogeneity observed regarding irrigation
    is consistent with the potential for irrigation to facilitate adaptation, but
    the analysis is not necessarily causal.
  23: The analysis acknowledges limitations related to data resolution (gridded vs.
    farm-level) and simplification of crop tolerances to temperature and precipitation
    extremes.
  24: The analysis uses a static view of areas equipped for irrigation and lacks data
    on within-season irrigation water use. Endogeneity of irrigation use presents
    statistical challenges.
  37: The dependent variable is not specified. The coefficients in the table seem
    small but could represent changes in small units of whatever is being measured.
    The joint exposure term (DSHW) is only estimated in the second column of each
    pair.
  40: The paper describes a model with interaction terms for dry spells and drought
    and a demediated outcome for controlled direct effect estimation.
  43: The outcome variable is not explicitly defined beyond its relation to value
    added per capita in agriculture, fisheries, and forestry, except in column (11)
    where the log of value added per capita in agriculture, fisheries, and forestry
    is used as an alternate outcome.
  45: The analysis considers a 28+ day dry spell and 9+ day heat wave.
  46: No additional notes applicable; outcomes focused on dry spell effects.
Quantitative material:
  9: Not applicable
  10: Uses a dataset of 118 countries excluding Sub-Saharan Africa.
  11: The page mentions a significant negative correlation between growth rates in
    the FAO CPI and exposure to dry spells, but specific quantitative percentages
    or changes are not provided.
  12: "The model aims to quantify the marginal direct effect of an additional dry\
    \ spell day (\U0001D6FD1) on the growth rate of the FAO CPI."
  17: Each additional dry spell day beyond 28 days is associated with approximately
    0.1 percentage point lower growth in the FAO CPI.
  19: The effect of heat waves on crop damage is an order of magnitude larger than
    the interaction between dry spells and heat waves.
  20: Effect sizes are discussed for FAO CPI growth under different conditions.
  21: Dry spell days exhibit a modest average direct effect on growth in crop production.
  23: Find strong evidence of non-additivity when dry spells and heat waves occur
    in the same year.
  26: Global non-linear effect of temperature on economic production
  27: Percent changes in yield variability due to drought (Hlavinka et al., 2009).
  33: Data from scatter plots showing the number of dry spell and heat wave days,
    with measurements of short-term and medium-term water stress in 1979 and 2016.
  34: Summary statistics provided for variables such as dry spell days, heat wave
    days, drought, aridity index, irrigation, average temperature, and annual precipitation.
  35: Correlations between dry spell exposure and crop production growth under different
    water stress conditions are provided, including mean correlations and 95% confidence
    intervals. For example, the mean correlation for all data is -0.045 with a 95%
    confidence interval of (-0.087, -0.004).
  36: Provides baseline model estimates indicating the impact of climatic factors
    such as dry spells, heat waves, drought (SPEI), mean temperature, and total precipitation
    on growth in FAO CPI, with coefficients and significance levels included.
  37: The table provides coefficient estimates for dry spell days, heat wave days,
    their interaction, and joint exposure days, along with standard errors and significance
    levels (p<0.01, p<0.05, p<0.1).
  38: The study provides coefficients showing effects of dry spell days on metrics
    like FAO CPI and cereal yield, with differences contingent on aridity, drought,
    and irrigation.
  41: Estimated marginal effects of an additional dry spell day are provided for different
    minimum durations of dry spells and heat waves.
  42: A table (Table A2) provides coefficient estimates and standard errors for the
    impact of current and lagged dry spell days on an unspecified outcome, with p-values
    for the null hypothesis that the sum of dry spell coefficients is zero.  Estimates
    include coefficients for dry spell days in the current year and lags up to 5 years.
  43: The table presents coefficients for the impact of a dry spell day ranging from
    -0.0007 to -0.0014, with standard errors generally around 0.0005-0.0007. Significance
    levels are indicated by *, **, and ***.
  44: Provides quantitative estimates for the controlled direct effect of an additional
    dry spell day, showing effects ranging from -0.0003 to -0.0013 for minimum dry
    spell durations of 7+ to 35+ days.
  45: An additional dry spell day has a negative effect on growth in the FAO CPI.
    With unweighted data, the effect is -0.0012 (p<0.05) when considering the hottest
    90 days, -0.0007 (p<0.1) when considering the hottest 120 days, and -0.0001 when
    considering the full year. With monthly crop area weighted data (MIRCA2000), the
    effect is -0.0013 (p<0.1) when considering the hottest 90 days, -0.0007 when considering
    the hottest 120 days, and -0.0002 when considering the full year.
  46: "Effects of dry spell days: -0.0010 for below median aridity, 0.0002 for above\
    \ median, -0.0017 for SPEI \u2264 0, 1E-6 for SPEI > 0."
  47: Tables provide coefficients showing variation in dry spell effects across different
    SPEI levels, with values ranging from -0.0017 to -0.0005.
sourcematerial:
  2: 'yaml

    Evaluation overview: "Using a global panel of daily precipitation and temperature
    from 1979 to 2016, we provide evidence that 4-5 week dry spells that occur during
    the hottest part of the year depress growth in crop production."

    Drivers of Risk: "Because dry spells often co-occur with drought and heat waves,
    understanding the effects of dry spells and heat waves requires a multi-timescale
    and multi-stressor perspective."

    Methodology: "Using a global panel of daily precipitation and temperature from
    1979 to 2016, we provide evidence that 4-5 week dry spells that occur during the
    hottest part of the year depress growth in crop production."

    Highlights: "After accounting for productivity and crop choice, losses in yields
    from dry spells are concentrated in areas that are not equipped for irrigation,
    suggesting a possible role of adaptation in dampening the effects of dry spells."

    '
  3: "Water plays a key role in several aspects of most economies, with especially\
    \ acute effects on food production...Understanding the effects of dry spells on\
    \ agriculture requires accounting for simultaneously co-occurring stressors, which\
    \ may trigger different and interacting stress responses in plants...dry spell\
    \ occurrence is likely correlated with aridity, multi-month or multi-year droughts,\
    \ or low annual precipitation...links between dry spell occurrence and climate\
    \ change ... and the potential contribution of dry spells to recent \u2018flash\
    \ droughts\u2019 indicate that understanding the impacts of dry spells on agriculture\
    \ is only likely to grow in importance."
  4: The page discusses potential interactions between dry spells and temperature
    stress on agricultural outcomes. Combined dry and hot weather and their potential
    interactions are drivers of risk for agricultural outcomes. The importance of
    these interrelationships is only heightened by the already increasing frequency
    of drought under climate change. Despite growing evidence of these biophysical
    mechanisms, we know less about how short-term exposure to joint water and heat
    stress ultimately influences agricultural output.
  5: "  \nSource material here: extreme heat and longer-term water stress to influence\
    \ crop production would complement this growing body of knowledge. Within this\
    \ context, we ask whether dry spells impact growth in aggregate crop production\
    \ across the globe and how those effects are modified by co-occurring stressors.\
    \ Based on prior work mentioned above, we hypothesize that dry spells should lower\
    \ growth in crop production, with effects that are larger in magnitude when dry\
    \ spells co-occur with heat waves, drought, or aridity. To address our question,\
    \ we analyze a panel dataset spanning 1979-2016 that relates aggregate crop production\
    \ in a country and year to exposure to dry spells and several related environmental\
    \ stressors. Our statistical approach isolates country-specific dry spell exposure\
    \ anomalies, and the range of specifications we estimate allow us to probe relationships\
    \ between and joint effects of water and heat stress across timescales. Further,\
    \ because irrigation can partly decouple rainfall from water availability, in\
    \ secondary analyses we investigate whether irrigation availability moderates\
    \ the effects of dry spells on growth in crop production.\n"
  6: 'yaml

    Evaluation overview: "of crops produced in a country and year that are not used
    as seed and feed, expressed as an index relative to the country-specific average
    of that quantity over 2014-2016...This lack of price response allows us to isolate
    the production consequences of dry spells, which are the focus of our analysis...capturing
    value-weighted net crop production available for use outside of agriculture."

    Drivers of Risk: "Our focal dry spell variable, which we refer to as the number
    of dry spell days, is the number of abnormally dry days (defined below) in a country
    and year that were preceded by at least j-1 others."

    Methodology: "To operationalize our dry spell variable, we begin with daily precipitation
    totals from the Climate Prediction Center (CPC) spanning 1979 to 2016, gridded
    to 0.5-degree latitude and"

    '
  7: "  \nThose data are compiled by the Climate Prediction Center (CPC) using raw\
    \ observations from the Global Telecommunications System (GTS), resulting in a\
    \ total of approximately 980 million gridded observations. For each grid cell\
    \ and day, we classify the day as abnormally dry if precipitation falls at or\
    \ below a cell- and day-specific threshold defining an abnormally dry day. We\
    \ define that threshold to be 1.5 standard deviations below mean precipitation\
    \ for a grid cell and day of year (or zero if that threshold would be negative),\
    \ with both the mean and standard deviation calculated using a 31-day window centered\
    \ around the focal day across all years in the dataset. We then identify sequences\
    \ of abnormally dry days and count how many abnormally dry days are preceded by\
    \ at least j-1 others; we call such days dry spell days. In our main analysis,\
    \ we only consider abnormally dry days that occur in the historically hottest\
    \ 90 days in each grid cell in order to facilitate examination of dry spells and\
