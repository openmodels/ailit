  14: 'Source material here: Finally, we examine a series of models that provide suggestive
    evidence of how irrigation may dampen the impact of dry spells. We first adopt
    the approach just described for drought and aridity, but where we separately quantify
    dry spell days and heat wave days for cells in a country classified as more irrigated
    (MI) or less irrigated (LI) (see Section 2.1). ... Farmers with access to irrigation
    may engage in many different farming practices, including growing higher value
    crops or selecting crops or varietals that are more productive but also more susceptible
    to water stress ... we redefine our outcome to be growth in cereal yield in order
    to focus on a set of crops that are more homogenous in value. ... The resulting
    dry spell variables index the average volume of cereals exposed to dry spells,
    so that differences across irrigated and non-irrigated areas should come closer
    to capturing dry-spell-mitigating effects of available irrigation.'
  15: "yaml\nMethodology: \"For our main results, we estimate models (1)-(5) using\
    \ ordinary least squares after removing country and year fixed effects by demeaning\
    \ (\u201Cwithin\u201D estimator).\"\nMethodology: \"Inference uses clustered standard\
    \ errors that allow for arbitrary autocorrelation and heteroskedasticity at the\
    \ country level.\"\nMethodology: \"To address this concern, in robustness checks\
    \ we employ sequential g-estimation (see, e.g., Acharya et al., 2016). This approach\
    \ estimates controlled direct effects in the presence of a mediating variable\
    \ and proceeds in two stages.\"\nMethodology: \"In the first stage, equation (1)\
    \ is estimated to establish the contribution of the mediator (drought) to the\
    \ outcome. The estimated mediator effect is then subtracted from the dependent\
    \ variable to obtain a demediated outcome upon which the direct effect of dry\
    \ spells is estimated in a second stage.\"\nMethodology: \"The key difference\
    \ between sequential g-estimation and typical ordinary least squares estimation\
    \ of (1) is that the two-step nature of sequential g-estimation avoids bias in\
    \ \U0001D6FD\u03021 if the relationship between drought and CPI growth is confounded\
    \ by omitted variables.\"\nMore Notes: \"Given the generated nature of the outcome\
    \ in the second stage, we conduct inference by bootstrapping both stages at the\
    \ panel unit level to account for potential clustering.\"\n"
  16: To examine the robustness of our main dry spell estimates, we estimate a series
    of alternative specifications. In separate specifications, we adjust for the lagged
    log of agricultural output per capita (to allow for convergence effects) and lagged
    dry spell and heat wave effects (to allow for multi-year impacts). We allow more
    flexibility in how annual temperature and precipitation exposure affect crop production,
    first adding cubic and quartic terms for temperature and precipitation, then separately
    employing counts of days in temperature bins rather than an annual mean temperature.
    We also examine linear and cubic (rather than quadratic) per-country time trends
    as alternate ways to adjust for smoothly changing, unobserved time-varying confounders.
    We consider variants of our focal dry spell and heat wave variables in which exposure
    within the year is weighted by the fraction of a grid cell that is cropped in
    any given month, using the MIRCA2000 data described earlier. Doing so lets us
    narrow in on dry spell exposure during the growing season, which may or may not
    coincide with the 90 hottest days in a location. As an alternative to sequential
    g-estimation for dealing with the potential influence of dry spells on drought,
    we consider SPEI measured just prior to the first of the hottest 90 days on which
    we focus. Finally, we examine growth in agricultural value added per capita as
    an alternative outcome. We present a series of results exploring the effects of
    dry spells on growth in crop production. We focus on the effects of an additional
    day in a dry spell at least 28 days long (j=28), which is when we begin to see
    significant negative effects of dry spell days, though we present results for
    other minimum durations.
  17: Each additional dry spell day beyond 28 days that occurs during the historically
    hottest part of the year is associated with approximately 0.1 percentage point
