  10: 'Source material here.

    "We briefly describe several patterns in exposure to environmental stressors and
    how growth in crop production varies with that exposure."

    "First, exposures to water stress and heat stress across several timescales are
    clearly related and evolving (Fig. 1)."

    "The prevalence of heat wave days and dry spell days is substantially different
    in the 59 more arid (below median aridity index; red) countries in our sample
    and the 59 less arid (above median aridity index; blue) countries."

    "The same is true of drought, with a clear relationship between the number of
    dry spell days (y-axis) and drought level (x-axis) in arid countries, especially
    at the end of our sample (right plot)."

    "Observations with high numbers of heat wave days (dot size) also appear to be
    more common when the SPEI is below zero."

    "Finally, comparing the left and right panels of Figure 1 suggests exposure to
    dry spells, heat waves, and drought conditions is changing through time."

    "Thus, our analysis must account for the effects of prevailing climate regimes,
    trends, and droughts when attempting to isolate the effects of punctuated weather
    events."

    "Our final dataset includes 118 countries. We exclude countries in Sub-Saharan
    Africa due to concerns over the spatial coverage, reporting frequency, and reliability
    of the stations on which the CPC dataset is based."

