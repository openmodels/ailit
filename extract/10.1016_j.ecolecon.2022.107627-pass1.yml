  45: 'Notes: Estimates and standard errors of the effect of an additional dry spell
    day on growth in the FAO CPI using variants of equation (1) for a 28+ day dry
    spell and 9+ day heat wave in which we construct our dry spell and heat wave variables
    using different subsets of days in the year. Column 1 uses the historically hottest
    90 days in a grid cell, corresponding to our focal estimates in the main text.
    Column 2 relaxes that restriction to the hottest 120 days in a grid cell, and
    column 3 uses all days in the year. Columns 4-6 repeat those restrictions, but
    weight days temporally by the cropped area in a cell in the month when a dry spell
    occurs (relative to the maximum area in that cell in any month) using the MIRCA2000
    dataset. Standard errors are clustered at the country level. ***: p<0.01, **:
    p<0.05, *: p<0.1.'
