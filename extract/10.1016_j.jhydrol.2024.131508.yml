Drivers of Risk:
  1: Urban floods resulting from rainfall (pluvial flood)
Evaluation overview:
  1: No relevant information
Highlights:
  1: Developed a Near Real-Time flood mapping system with high-resolution (10-meter)
    for detailed flood extent predictions.
Methodology:
  1: Developed a deep learning model (U-Net) for predicting near-real time urban flood
    extents using a CNN network. Used daily rainfall and Sentinel-1 imagery for the
    period 2014-2023. Integrated terrain-related spatial data. Ground truthing was
    performed. AxisGISPro 3.0.3 is used for preprocessing tasks to produce raster
    maps and flood inventory maps.
More Notes:
  1: No relevant information
Quantitative material:
  1: 'Model demonstrates an accurate prediction capability with a Ground Truth Index
    of 84.05%. Input Data Sensitivity Analysis: Slope + HSG + Imperviousness + Rainfall:
