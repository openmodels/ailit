Drivers of Risk:
  1: Declining CO2 fertilization effect (CFE) trend is correlated with changing nutrient
    concentrations and availability of soil water.
  2: Potential decrease in light-saturated photosynthesis per 100 ppm CO2 is highlighted
    as a key factor.
  5: Water availability, soil N availability, nutrient constraints, climate-driven
    changes.
Evaluation overview:
  1: The paper evaluates the global decline of CO2 fertilization effects on vegetation
    photosynthesis and its implication on climate feedbacks.
  2: The analysis evaluates the declining trend of terrestrial carbon cycle efficiency,
    represented by the parameter b, over the period from 1982 to 2015.
  5: Terrestrial photosynthesis and land carbon uptake.
Highlights:
  1: Declining trend in CFE suggests a weakening negative feedback on climate systems
    and increased societal dependence on climate mitigation strategies.
  2: A consistent and significant decline in the global parameter b, indicating a
    decrease in carbon use efficiency globally, with larger declines noted in grasslands
    and cold climate zones.
  5: Terrestrial photosynthesis may not increase as much as models project, potentially
    reducing the potential of land-based climate mitigation.
Methodology:
  1: Analysis is conducted using multiple long-term satellite- and ground-based datasets
    to show declining CFE across most terrestrial regions.
  2: Analysis is performed using linear and nonlinear multiple regression approaches
    on global data derived from satellite GPP proxies and terrestrial carbon cycle
    models with findings applied globally from 1982 to 2015.
  5: Using a moving window of 15 years, terrestrial water storage (TWS) data was used
    to represent water availability in arid, temperate, and dry tropical climate zones.
    The sensitivity of GPP to TWS was observed.
More Notes:
  5: There is a significant and spatially extensive decline in CFE (carbon fertilization
    effect), implying a substantial reduction of the positive effects of increasing
    atmospheric CO2 on terrestrial carbon uptake.
Quantitative material:
  1: The paper states CFEs accounted for ~70% of global greening trends and up to
    60% of the current terrestrial carbon sink but notes a decline from 1982 to 2015.
  2: "The analysis provides quantitative information, such as a global median decline\
    \ of -0.92 \xB1 0.12% in b per 100 ppm CO2 per year with p < 0.01."
  5: "Satellite GPP proxies exhibited significantly increasing trends for arid (2.93\
    \ \xB1 0.38% year\u22121), temperate (2.12 \xB1 0.39% year\u22121), and dry tropical\
    \ (2.30 \xB1 0.57% year\u22121) ecosystems."
sourcematerial:
  1: "  \n\"The enhanced vegetation productivity driven by increased concentrations\
    \ of carbon dioxide (CO2) [i.e., the CO2 fertilization effect (CFE)] sustains\
    \ an important negative feedback on climate warming, but the temporal dynamics\
    \ of CFE remain unclear.\"  \n\"Using multiple long-term satellite- and ground-based\
    \ datasets, we showed that global CFE has declined across most terrestrial regions\
    \ of the globe from 1982 to 2015, correlating well with changing nutrient concentrations\
    \ and availability of soil water.\"  \n\"Current carbon cycle models also demonstrate\
    \ a declining CFE trend, albeit one substantially weaker than that from the global\
    \ observations.\"  \n\"This declining trend in the forcing of terrestrial carbon\
    \ sinks by increasing amounts of atmospheric CO2 implies a weakening negative\
    \ feedback on the climatic system and increased societal dependence on future\
    \ strategies to mitigate climate warming.\"  \n\"Process-based models of the terrestrial\
    \ carbon cycle have indicated that CFE accounts for ~70% of the increasing global\
    \ trend in foliar area, i.e., global greening, and up to 60% of the current terrestrial\
    \ carbon sink.\"\n"
  2: "The analysis evaluates the declining trend of terrestrial carbon cycle efficiency,\
    \ represented by the parameter b, over the period from 1982 to 2015. [Quotes]\
    \ Linear and nonlinear multiple regression approaches were used to estimate b\
    \ from satellite GPP proxies at each pixel across the globe (12, 13, 20). Fig.\
    \ 1. Declining trend of global b. Temporal dynamics of b for three satellite GPP\
    \ proxies with 15-year moving windows during 1982 to 2015. [Evidence] The y-axis\
    \ represents \u03B2 (% per 100 ppm\u207B\xB9). ... The black dashed line indicates\
    \ a trend with the equation Y = -0.92X + 27.4 and an R\xB2 value of 0.75, p <\
    \ 0.01. ... The global median during 1982 to 2015 was 16.1 \xB1 11.5% 100 ppm\u207B\
    \xB9 and found that b significantly decreased at a rate of -0.92 \xB1 0.12% 100\
    \ ppm\u207B\xB9 year\u207B\xB9 (p <0.01) (Fig. 1A). [Quotes] The analysis provides\
    \ quantitative information, such as a global median decline of -0.92 \xB1 0.12%\
    \ in b per 100 ppm CO2 per year with p < 0.01. [Evidence] We next calculated the\
    \ time series of b with 15-year moving windows during 1982 to 2015. ... Pixels\
    \ with large land-cover changes were excluded from the analyses ... during 1982\
    \ to 2015 was 16.1 \xB1 11.5% 100 ppm\u207B\xB9 (fig. S7). ... found that b significantly\
    \ decreased ... (Fig. 1A). This decrease was also evident after excluding the\
    \ crop areas (fig. S9). Across the global median of the declining trend in b,\
    \ grasslands and plants in cold climate zones exhibited a larger declining trend\
    \ of b. [Quotes] The decreases in b across all the climate zones and vegetation\
    \ types were notable (fig. S10). Compared with the global median of the declining\
    \ trend in b, grasslands and plants in cold climate zones exhibited a larger declining\
    \ trend of b."
  5: "Source material here.\nEvaluation overview: \"Ultimately, these results indicate\
    \ that terrestrial photosynthesis may not increase as much as models project,\"\
    \ ... \"This finding implies that GPP and consequently land carbon uptake are\
    \ more sensitive to the variations in water availability than assumed by the TRENDY\
    \ models.\"\n\nDrivers of Risk: \"The progressive N limitation theory, the soil\
    \ N availability for plant growth may be expected to diminish over time,\" ...\
    \ \"Moreover, complex interactive effects between nutrients and water supply may\
    \ also have impacts on CFE.\"\n\nQuantitative material: \"Satellite GPP proxies\
    \ exhibited significantly increasing trends for arid (2.93 \xB1 0.38% year\u2212\
    1), temperate (2.12 \xB1 0.39% year\u22121), and dry tropical (2.30 \xB1 0.57%\
    \ year\u22121) ecosystems (Fig. 4).\"\n\nMethodology: \"We used the terrestrial\
    \ water storage (TWS) data to represent the availability of water to plants and\
    \ selected arid, temperate, and dry tropical climate zones as the research areas...\
    \ using a moving window of 15 years.\"\n\nHighlights: \"Ultimately, these results\
    \ indicate that terrestrial photosynthesis may not increase as much as models\
    \ project, possibly reducing the potential of land-based climate mitigation.\"\
    \n\nMore Notes: \"Our analyses showed a significant and spatially extensive decline\
    \ in b, which implies a substantial reduction of the positive effects of increasing\
    \ atmospheric CO2 on terrestrial carbon uptake.\"\n"
