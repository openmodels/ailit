Drivers of Risk:
  3: Increase in the frequency and intensity of high-impact and extreme weather and
    climate events, urbanization, and demographic shifts.
  4: The paper identifies a warming climate as a driver of increased extremes in heat,
    drought, rainfall, wildfire, tropical cyclone intensity, and flooding. It also
    mentions nonclimatic global trends like biodiversity loss, unsustainable consumption
    of natural resources, degradation of ecosystems, human demographic shifts, social
    and economic inequalities, and a pandemic.
  5: The increase in the number of weather-related loss events indicates changes such
    as more frequent climatological, hydrological, and meteorological events impacting
    outcomes.
  6: The reliance on 'just in time' manufacturing processes increases the need for
    accurate weather forecasts.
  7: Increasing stakeholder and customer demand and need for tailored and seamless
    weather and climate forecasting drives the innovation cycle. Technological advancements
    and the combination of technologies also present challenges.
  12: Shocks or changes like the demand for accurate high-resolution forecasts across
    different time scales for transportation needs in manufacturing industries.
  13: Rapidly changing phenomena such as convection that can produce large local errors
    and significant errors downstream on the jet stream
  16: Increases in observational datasets, movement of NWEP systems to ensembles operating
    at high resolution, attempts to observe and predict more components of the Earth
    system.
  18: Weather and climate extremes and high-impact events are noted as significant
    drivers impacting the poor and those living in low-income nations.
Evaluation overview:
  4: The paper discusses extreme weather events and their impacts, particularly focusing
    on flooding risks.
  5: No evaluation outcome such as mortality or productivity loss is provided.
  7: The paper focuses on weather and climate forecasting, specifically tailored and
    seamless forecasting that is localized, timely, precise, and accurate. It implicitly
    evaluates the ability of the public, private, and academic sectors to innovate
    and provide these forecasts.
  12: Operational weather forecasting improvements have been extended to lead times
    beyond 10 days for certain weather events like midlatitude snowstorms in North
    America.
  13: No relevant information
  16: No relevant information
  18: The page discusses the enhancement of resilience to weather and climate extremes
    and their impacts, focusing on education, training, and societal needs.
Highlights:
  3: Challenges in advancing weather and climate forecasting, the role of technological
    innovations, private sector involvement, and the need for improved cooperation
    between sectors.
  4: The paper highlights the increase in extreme weather events and the disproportionate
    impact of flooding on low-income nations and marginalized populations.
  5: There is a significant increase in the total number of registered weather-related
    loss events from 1980-1985 to 2013-2018.
  6: The paper highlights a growing demand and need for localized and accurate weather
    and climate information and services due to demographic and technological changes.
  7: The paper identifies technological trends and possible impediments to progress
    in weather and climate forecasting.
  12: Need for coordination between public and private sectors, along with academia,
    to improve forecasting skill; promotion of policies for free and open data sharing
    to enhance forecasting; increasing demand for weather-driven decision support
    tools.
  13: Significant outstanding challenges remain in terms of weather and climate predictive
    skill related to midlatitude weather regime transitions, teleconnections, sea
    ice prediction, precipitation and circulation changes, deep-ocean circulation,
    convective precipitation, and closure of the water and energy cycle.
  14: ML can improve the utilization of observing systems, advance data assimilation,
    improve subgrid parameterizations, enhance postprocessing, estimate impacts, improve
    nowcasting and rainfall estimation, detect severe weather, and detect regimes
    where forecast failures are more likely.
  16: Big data challenges will pose a key dilemma for NWEP and society. Local models
    may appear to be a waste without adding value to freely available high-resolution
    global models. Downscaling global ensemble data using AI is valuable for national
    impact sectors, especially low-income countries. Cloud-based NEWP systems offer
    a sustainable and cost-effective approach. Maintaining national observing networks
    in low-income countries is paramount.
  18: The paper highlights the importance of inclusive public, private, and academic
    partnerships in advancing weather forecasting and climate prediction capabilities.
Methodology:
  5: The data is sourced from the Munich Re, NatCatSERVICE, utilizing their online
    data access tools with results for periods 1980-1985 and 2013-2018.
  7: The paper summarizes the views, knowledge, and expertise of a group of scientists
    and practitioners from the public, private, and academic sectors under the leadership
    of WMO.
  13: Mentions use of ensembles to represent uncertainty in initial state and model
    processes; improved utilization of polarimetric radar measurements as models move
    to kilometer scale; taking advantage of novel new measurement strategies such
    as crowd-sourced data (e.g., Hintz et al. 2019), rainfall from cell phone tower
    attenuation (e.g., Overeem et al. 2013)
  14: This paper discusses the potential of Artificial Intelligence (AI) and Machine
    Learning (ML) techniques to advance weather and climate forecasting across various
    time scales, from nowcasting to climate resiliency. It emphasizes the importance
    of interdisciplinary collaboration and private-public partnerships for successful
    implementation. It mentions using ML to improve data assimilation, incorporate
    complex subgrid physical parameterizations, and enhance postprocessing of numerical
    variables.
  16: Downscaling forecast data from global ensembles into useful products, including
    the use of AI. Implementing NEWP systems with postprocessing, production, and
    visualization in the cloud. Stabilizing national observing networks in low-income
    countries.
More Notes:
  5: No additional notes from this page.
  7: The paper emphasizes the importance of engagement across public, private, and
    academic sectors in the innovation cycle, including research and development,
    operation, and service.
  12: The paper emphasizes the necessity of clear communication and collaboration
    between sectors to meet growing demand for precise weather forecasts, which is
    crucial for decision-making.
  13: Focuses on research and development challenges in numerical weather prediction
    (NEWP) and climate modeling. It also mentions the challenge of balancing open
    data versus protecting commercial licensing.
  14: The page highlights the availability of open-source AI and ML frameworks and
    the potential for small- and medium-sized enterprises to develop successful applications
    with readily available meteorological data. It mentions the importance of WMO
    involvement and international collaborations in advancing weather and climate
    forecasting.
  16: Mentions the importance of partnerships between private, public, and academic
    sectors.
  19: This page provides funding information, data availability statements, and author
    information, but lacks direct climate impact information. It mainly focuses on
    acknowledgements.
Quantitative material:
  4: The paper states that 19% of the world's population (1.47 billion people) face
    substantial risk of a 1-in-100-year flooding event, and that ~587 million people
    who face substantial risks from flooding are living on less than $5.5 (U.S. dollars)
    per day.
  5: The analysis provides quantitative data on the total number of registered weather-related
    loss events, increasing from 1,383 during 1980-1985 to 4,020 in 2013-2018.
  13: No relevant information
  16: 10^7 observations are incorporated each day into operational weather prediction
    systems that produce 10 TB of model output per day.
sourcematerial:
  3: 'Source material: Societies are facing an increase in the frequency and intensit
    y of high-impact and extreme weather and climate events. These extremes together
    with exponential population growth and demographic shifts (e.g., urbanization,
    increase in coastal populations) are increasing the detrimental societal and economic
    impact of hazardous weather and climate events. This ar ticle discusses the challenges
    faced in accelerating advances in weather and climate forecasting and proposes
    a vision for key actions needed across the private, public, and academic sectors.
    ... Technological innovations are also leading to an evolving and growing role
    of the private sector in the weather and climate enterprise. ... Actions will
    be based on a model of improved cooperation bet ween the public, private, and
    academic sectors.'
  4: "Source material: One challenge facing society as evidenced in daily news headlines\
    \ is the increase in extreme weather events with, for example, in 2021, record-breaking\
    \ cold in the U.S. Southern Great Plains, heat in the Pacific Northwest followed\
    \ by wildfires, devastating flooding in Europe, Canada, Australia, and China,\
    \ and rain-induced landslides in India. The AR6 report concludes that a warming\
    \ climate plays a role in increasing extremes in heat, drought, rainfall, wildfire,\
    \ tropical cyclone intensity, and flooding. Currently, 19% of the world\u2019\
    s population (1.47 billion people) face substantial risk of a 1-in-100-year flooding\
    \ event. While extremes in the climate system have a devastating effect on populations\
    \ across the world, the impacts often fall disproportionately on low-income nations\
    \ and marginalized populations as ~587 million people who face substantial risks\
    \ from flooding are living on less than $5.5 (U.S. dollars) per day. The need\
    \ for improved weather and climate forecasts is also driven by this increase in\
    \ extremes occurring against a backdrop of nonclimatic global trends that include\
    \ biodiversity loss, unsustainable consumption of natural resources, degradation\
    \ of ecosystems, human demographic shifts including rapid urbanization, social\
    \ and economic inequalities, and a pandemic."
  5: 'Map Illustration: Displays a global map with colored dots indicating different
    types of weather-related loss events. Total registered events: 1,383 (1980-1985),
    Total registered events: 4,020 (2013-2018). There is a significant increase in
    the total number of registered weather-related loss events from 1980-1985 to 2013-2018,
    indicating a change in the frequency or reporting of these events over time. Major
    weather- and climate-related loss events from the Munich Re, NatCatService, 2019
    database plotted utilizing their online data access tools.'
  6: "The importance of weather and climate risk\u2013based decision-making to society\
    \ is also\nincreasing substantially with population growth and demographic shifts\
    \ that include urbanization and movement to coastlines. [...] These trends mean\
    \ more people, assets, and essential services [...] are exposed and vulnerable\
    \ to weather, climate, water, ocean, and even space hazards.\nAnother driving\
    \ force for the NEWP enterprise results from our global 'just in time' manufacturing\
    \ process that increasingly requires accurate, timely, and high-resolution forecasts\
    \ of both detrimental events and routine day-to-day variations. [...] These economic\
    \ drivers have resulted in a growth in private sector companies providing targeted\
    \ forecasts of weather variations from the time scale of minutes to climate risk\
    \ and resiliency information spanning decades into the future. [...] Such debates\
    \ shape high demand and need for better weather and climate information and for\
    \ services addressing the risks and socioeconomic impacts of the weather, climate,\
    \ and water hazards."
  7: "yaml\n\"Evaluation overview\": \"The important drivers of the innovation cycle\
    \ are highly qualified personnel, computational and observational infrastructures...\
    \ and increasing stakeholder and customer demand and need... for tailored and\
    \ seamless weather and climate forecasting (localized, timely, precise, and accurate).\"\
    \n\"Drivers of Risk\": \"Increasing stakeholder and customer demand and need (on\
    \ the circumference of the figure) for tailored and seamless weather and climate\
    \ forecasting... Stakeholders engaged in all three components will have to make\
    \ strategic choices in the coming years, and some will struggle to keep up as\
    \ technologies continue to combine and advance, and new ways of doing business\
    \ appear quickly.\"\n\"Methodology\": \"This paper summarizes the v iews, k nowledge,\
    \ and expertise of a group of scientists and practitioners from the public, private,\
    \ and academic sectors that was produced under the leadership of WMO.\"\n\"Highlights\"\
    : \"Instead, we st r ive to improve t he understanding of t he ongoing R& D and\
    \ to iden- tif y technological trends, and any possible impediments to progress.\"\
    \n\"More Notes\": \"The innovation cycle: the public\u2013private\u2013academic\
    \ engagement challenge... Note that each sector can make contributions to the\
    \ various components (i.e., research and development, operations, and service).\"\
    \n"
