  13: 'Research and development... components (i.e., sea surface temperature, soil
    moisture, snow cover, sea ice) that can aid predictive skill (Krishnamurthy 2019)
    and highly nonlinear, rapidly changing phenomena such as convection that can produce
    both large local errors and significant errors downstream on the jet stream due
    to the modification of Rossby wave packets (e.g., Rodwell et al. 2018)... Efforts
    to advance predictive skill include increasing high-performance computing (HPC)
    capacity; improving observational instrumentation providing more accurate data
    with higher temporal and spatial resolutions;... as models move to kilometer scale
    (Zhang et al. 2019), and more effective data assimilation methods; and use of
    ensembles to represent uncertainty in the initial state and model processes...
    Some predictability, dynamical, and physical modeling challenges... Significant
    outstanding challenges remain in terms of weather and climate predictive skill:...
    Midlatitude weather regime transitions... Teleconnections between tropical phenomena...
    Seasonal-scale sea ice cover and thickness predictions... Large-scale patterns
    of precipitation and midlatitude circulation changes... Deep-ocean circulation
    and ice sheet sensitivity... Convective precipitation beyond the short range...
    Closure of the water and energy cycle... Model and data assimilation shortcomings
    include the following... Major uncertainties associated with parameterizations...
    Insufficient and incomplete treatment of systematic and random errors in data
    assimilation and ensembles... Source: WMO (2015)'
  14: " \ncatalyzing innovations in numerical prediction system design like artificial\
    \ intelligence (AI) and machine learning (ML) techniques to help advance observing\
    \ and prediction strategies... Since these approaches could prove valuable to\
    \ forecasting on time scales from nowcasting to climate resiliency with benefits\
    \ to both the public and private sectors, collaboration across the private, public,\
    \ and academic sectors would prove beneficial.\n\n... potential major breakthroughs\
    \ from ML... ML will lead to significant progress over the whole range of \u201C\
    classical\u201D modeling, data assimilation and postprocessing algorithms in the\
    \ coming decade.\n\nCurrent and future research topics and potential advantages\
    \ of utilizing ML include the following: ... Improve the utilization of observing\
    \ systems... Advance the ability to input information from complex observing systems\
    \ into models\u2019 data assimilation... Help better estimate model and observation\
    \ errors in data assimilation... Allow incorporation of further complex subgrid\
    \ physical parameterizations... Advance postprocessing of numerical variables...\
    \ Estimate impacts by combining ML, model output, and further observations...\
    \ Advance nowcasting and improve rainfall estimation... Use of ML approaches to\
    \ detect and forecast severe weather... Detect regimes where forecast failures\
    \ are more likely to occur...\n\nA wide range of open-source AI and ML frameworks\
    \ (e.g., TensorFlow and PyTorch)... If meteorological data are readily available,\
    \ small- and medium-sized enterprises can develop successful applications... The\
    \ WMO has been effective in involvement in broad collaborative R&D topics relevant\
    \ to advancing NEWP... \n"
  16: "Source material here.\nChallenges of big data are noted with respect to transporting,\
    \ storing, and utilizing large datasets. The text mentions that \"10^7 observations\
    \ are incorporated each day into operational weather prediction systems that produce\
    \ 10 TB of model output per day,\" indicating extensive data handling requirements.\
    \ The scope of changes impacting risk includes \"increases in observational datasets,\
    \ movement of NWEP systems to ensembles operating at high resolutions (1\u2013\
    3 km), and attempts to observe and predict more components of the Earth system.\"\
    \ Methodologically, approaches like \"downscaling forecast data from the global\
    \ ensembles into useful products, including the use of AI,\" and implementing\
    \ NEWP systems \"with postprocessing, production, and visualization in the cloud,\"\
    \ are discussed. The highlights mention big data as a key dilemma and how \"local\
    \ models may appear to be a waste without adding value to freely available high-resolution\
    \ global models.\" The text emphasizes the importance of advanced planning and\
    \ change management for the shift to utilizing global ensemble data and cloud-based\
    \ solutions as well as stabilizing \"national observing networks in low-income\
    \ countries,\" which is described as \"of paramount importance.\" Lastly, it notes\
    \ the value of fostering partnerships between sectors and deals with ensuring\
    \ \"long-term maintenance to provide standard-quality observational data.\"\n"
  18: "yaml\n\"Evaluation overview\": \"...cooperation bet ween t he pr ivate, public,\
    \ a nd academic sectors a lso g reat ly cont r ibutes to long-term advances in\
    \ the NEW P enterprise and training the next generation. ... Most of these goals\
    \ have links with the changing environment\u2014climate change, water resources,\
