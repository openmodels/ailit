Drivers of Risk:
  2: The paper discusses the impact of temperature fluctuations and weather extremes
    on economic activity. It also mentions the importance of considering average climate
    conditions on the marginal response to weather.
  3: The main drivers of risk identified are temperature shocks and long-run temperature
    levels.
  6: The drivers of risk examined include annual mean temperature and annual total
    precipitation, along with geographic variables like distance to navigable rivers,
    coasts, altitude, and oil/gas reserves. Temperature projections for 2015-2099
    under RCP 8.5 are also used.
  7: Temperature increases are identified as a significant driver impacting GRP, whereas
    precipitation changes are largely insignificant.
  8: "Annual changes in temperature (\u0394 T) and precipitation (\u0394 P), including\
    \ their lagged values and interaction effects, impact GRP."
  9: Changes in temperature and precipitation are analyzed as drivers impacting economic
    outcomes.
  10: Annual average temperature increase is the primary shock impacting regional
    economic growth.
  11: Changes in temperature and precipitation levels over 10-year periods.
  12: Changes in long-term climate conditions (temperature and precipitation); Cumulative
    oil and gas production; Distance to coast and rivers; Altitude.
  13: Global warming is the primary driver evaluated, impacting regions variably depending
    on temperature increases.
  14: The outcomes are influenced by warming scenarios, specifically under the RCP
    8.5 high greenhouse gas emissions pathway.
  15: The primary driver of risk assessed is future temperature increases under a
    business-as-usual warming scenario.
  16: Shocks include increases in global mean surface temperature affecting global
    GDP.
  17: Temperature change; Temperature level
  18: Temperature fluctuations impact economic outcomes, with increases in temperature
    influencing GRP differently in cold and hot regions.
Evaluation overview:
  2: This paper aims to improve damage estimates by using a panel of subnational GDP
    data.
  3: The paper provides evidence on how Gross Regional Product (GRP) responds to short-term
    weather shocks and long-run climatic changes.
  6: This paper evaluates the impact of climate variables on economic activity, specifically
    annual Gross Regional Product (GRP).
  7: The outcome being evaluated is the effect of temperature and precipitation changes
    on Gross Regional Product (GRP).
  8: The paper evaluates the impact of annual weather changes on annual changes in
    log Gross Regional Product (GRP).
  9: The paper evaluates the impact of temperature increases on Gross Regional Product
    (GRP) and tests for long-term effects on economic growth.
  10: Impact of temperature change on regional economic growth is evaluated.
  11: Effect of changes in 10-year average weather on economic growth measured as
    changes in log GRP.
  12: Impacts of climate change (temperature and precipitation) on Gross Regional
    Product (GRP).
  13: Analysis of global gross regional product (GRP) reductions due to climate impacts
    by 2099 under the RCP 8.5 warming scenario.
  14: The analysis evaluates projected GDP losses by the year 2100 under the RCP 8.5
    scenario across various regions.
  15: The page discusses GRP (Gross Regional Product) losses under different warming
    scenarios, focusing on regions with the lowest baseline GRP levels.
  16: The page discusses the impact of temperature increases on global GDP and how
    these changes are modeled through damage functions.
  17: "GRP losses of a 1\u25E6 C temperature increase"
  18: The paper evaluates the impact of climate change on economic productivity, focusing
    on gross regional product (GRP) changes.
Highlights:
  3: Key findings include that marginal effects of temperature increase are higher
    than assumed in most Integrated Assessment Models (IAMs), with hot regions being
    more affected by further warming.
  4: The study highlights the importance of differentiating between temperature effects
    and temperature change effects in understanding growth dynamics.
  7: A significant negative effect of temperature increase on GRP is identified across
    all model variants.
  8: "Significant negative marginal effect of temperature increases on GRP at high\
    \ average temperatures; optimal average temperature level for minimizing losses\
    \ ranges between 5\xB0C and 10\xB0C."
  9: Marginal effects of temperature increases on GRP are found to be higher than
    previously reported, but no evidence of long-term growth effects from climate
    conditions is present in long-difference models.
  10: "Temperature coe\uFB03cient is stable across decades and significant; temperature\
    \ increase negatively affects GRP."
  11: Non-linear relationship observed in extreme temperature bins and a u-shaped
    pattern for precipitation impacts on GRP.
  12: End-of-century GRP losses under a business-as-usual scenario are projected to
    be 6-8% using cross-sectional estimates, and 11-14% using panel estimates.
  13: Damages from the panel model are larger than those from the cross-sectional
    model; colder regions benefit while hotter regions lose disproportionately.
  14: Regions in central and northern Africa face the highest GDP losses, while parts
    of western Europe may experience minimal or negligible GDP loss.
  15: Results indicate that damages are notably higher than those used in the DICE
    model, up to a factor of two or more; the optimal carbon price suggested is significantly
    higher than earlier estimates.
  16: The study suggests that temperature increases have permanent effects on output
    levels, though not on long-run balanced growth rates of the economy, differing
    from some other studies which suggest long-run growth rate impacts.
  17: Projected losses are about twice as large when computed based on the panel regression
    estimates instead of on their cross-sectional equivalent, suggesting that short-term
    weather shocks have a larger effect on economic output than long-term climate
    changes, possibly due to adaptation.
  18: Increased temperatures lead to increased GRP in cold regions and decreased GRP
    in hot regions; significant output losses are projected by 2099 under high-warming
    scenarios.
Methodology:
  2: The paper uses a panel of subnational GDP data to depict local weather and climate
    conditions across the globe.
  3: The paper uses a conceptual framework based on a stylized Ramsey-type growth
    model to assess the economic impacts of climate change across different time scales.
  4: Region-specific polynomial time trends and region/year fixed effects are used
    to control for slow-moving regional changes and global covariate shocks.
  6: The analysis uses climate and economic data at the subnational level for 1900-2014,
    aggregated from gridded climate data (CRU TS v3.23) to regional levels. Temperature
    projections are derived from ISIMIP data. A two-step algorithm is used to assign
    climate information to regions, especially for regions smaller than the grid cell
    resolution.
  7: Annual panel model regression is used with variants of model (6), and marginal
    effects are specifically determined for temperature changes.
  8: Uses panel regression models with various specifications over the period 1900-2014
    across multiple regions and countries to assess effects.
  9: The analysis uses multiple regression models with contemporaneous and lagged
    temperature changes, long-difference models over 10-year periods, and cross-sectional
    models with fixed effects and interaction terms.
  10: Temperature and GRP data aggregated to 10-year intervals; analysis includes
    different 10-year periods with varying geographical data coverage.
  11: Long-difference regression models comparing different time periods to assess
    the economic impact of climate variables.
  12: Cross-sectional regression analysis using aggregated climate and GRP data in
    10-year intervals; projections of future GRP losses based on historic climate-GRP
    relationships. Business-as-usual scenario for future warming is used, consistent
    with the highest greenhouse gas concentration trajectory considered by the IPCC.
    Region-specific baseline population and economic growth are considered using Shared
    Socio-economic Pathway 2. The time periods used were 1955-1964, 1965-1974, 1975-1984,
    1985-1994, 1995-2004, and 2005-2014.
  13: Cross-sectional and panel models are used to assess long-term climate conditions;
    panel models include an interaction term for variability across regions.
  14: Uses a cross-sectional regression model to derive log-linear damage functions
    and panel-based estimates for regional GDP changes, incorporating temperature
    sensitivities and varying impacts depending on initial temperature levels.
  15: The methodology integrates cross-sectional and panel data analyses to estimate
    global damage functions and their impacts, and it utilizes the DICE-2016 model
    to calculate the social cost of carbon.
  16: Analysis uses reduced-form damage functions based on panel and cross-sectional
    regression results to estimate impacts on global GDP and the social cost of carbon.
  17: "Annual panel models and cross-sectional models were used to estimate the effect\
    \ of a 1\u25E6 C temperature increase on reductions of economic output."
  18: The analysis employs a stylized growth model with cross-sectional and panel
    data approaches to assess climate-economy relationships.
More Notes:
  6: Structural break dummy variables were included to account for changes in data
    sources. The paper also mentions using ERA5 re-analysis data as a robustness check.
  12: Precipitation coefficients were mostly insignificant and therefore disregarded
    in projections; Standard errors are clustered at the country level.
  13: Climate damages show pronounced correlation with baseline GRP, affecting poorer
    regions more strongly under the baseline SSP2 scenario.
  14: Analysis indicates that GDP damages depend on the length of warming periods
    and are regionally differentiated by initial temperature levels.
  17: "The study only covers impacts on labor productivity, land productivity (agricultural\
    \ yields) and depreciation of capital. Non-market damages such as loss of life,\
    \ con\uFB02icts and violence, biodiversity and ecosystem damages, and damages\
    \ due to sea level rise are excluded."
Quantitative material:
  6: The average annual per-capita growth in USD is 7%. The within-region standard
    deviation (SD_w) of growth is 3 times larger than the between-region standard
    deviation (SD_b).
  7: The change in per-capita growth rate and the marginal effect of temperature increase
    on GRP are quantified.
  8: "Marginal effects of temperature increases, such as a 1\xB0C increase in a hot\
    \ region decreasing GRP by about 3%."
  9: "The text mentions a temperature increase of only 0.46\xB0C on average between\
    \ periods considered and standard deviations for temperature and precipitation\
    \ changes."
  10: "A one-degree temperature increase reduces GRP by 2\u20134%."
  11: "Regions with an average temperature of 20-24\xB0C have approximately 28% lower\
    \ GRP, and regions with 24-28\xB0C see a 35% lower GRP compared to reference bins."
  12: 'Cross-sectional regression results showing the effect of changes in long-term
    climate conditions on the log of Gross Regional Product. Examples include: T (temperature)
    coefficient of -0.0230 (p < 0.10) in one period, and projected GRP losses of about
    6-8% at the end of the century under a business-as-usual climate change scenario
    compared to a no warming scenario from cross-sectional estimates, and 11-14% from
    panel estimates'
  13: Global GRP reduction ranges from 6.6% to 14.2% based on different assessment
    methodologies.
  14: "Quantifies GDP loss as a percentage, with regions experiencing losses up to\
    \ and over 20% under a warming scenario of 3.5\xB0C by 2099."
  15: Quantitative analysis shows that projected GRP changes range from -0.3 to 0.3
    in log terms.
  16: Social cost of carbon estimates are provided for various years (2020, 2030,
    2050, 2100) based on different damage functions; for example, $73 to $142 per
    tCO2 in 2020 depending on the model used.
  17: "Temperature change (preferred; 1 lag) leads to 0.8% loss at 10 \u25E6 C and\
    \ 3.5% loss at 25 \u25E6 C temperature; Temperature level (0 lag) leads to 0.5%\
    \ loss at 10 \u25E6 C and 2.6% loss at 25 \u25E6 C temperature; Temperature level\
    \ (5 lags) leads to 2.4% loss at 10 \u25E6 C and 2.6% loss at 25 \u25E6 C temperature;\
    \ Cross-sectional models result in 2.0\u20134.3% loss"
  18: "A 1\xB0C temperature increase in hot regions (annual mean temperature of 25\xB0\
    C) is projected to reduce GRP by about 3.5%."
sourcematerial:
  2: "Source material here.\n\"This paper aims to fill these research gaps by using\
    \ a panel of subnational GDP data \u2013 Gross Regional Product (GRP) \u2013 that\
    \ allows the depiction of local weather as well as climate conditions on various\
    \ time scales across the globe (covering more than 1500 regions).\"\n\"This paper\
    \ aims to improve these damage estimates by using a panel of subnational GDP data...\"\
    \n\"The strength of fixed effects panel regression techniques lies in their ability\
    \ to avoid the omitted variable bias.\"\n\"The differentiation between short-term\
    \ impacts, extreme events and long-term impacts is important, as economies and\
    \ societies may be better equipped to respond to long-term changes than to short-term\
    \ changes or to extreme events by investing in adaptation.\"\n"
  3: "  \n\"We \uFB01nd strong and robust evidence that GRP responds to annual temperature\
    \ shocks as well as long-run temperature levels (climate).\"\n\n\"Our framework\
    \ uses a stylized Ramsey-type growth model where changes in weather variables\
    \ affect the productivity level of the entire economy and the growth rate of labor\
    \ productivity.\"\n\n\"We provide further evidence that marginal effects of temperature\
    \ increase are much higher than assumed in most Integrated Assessment Models (IAMs).\
    \ In particular, hot regions are more strongly affected by further warming than\
    \ cooler regions.\"\n"
  4: 'Source material here: The analysis employs an annual panel model using a linearization
    of temperature and precipitation effects in a regression model to evaluate effects
    on per-capita growth rate. Region-specific polynomial time trends and region/year
    fixed effects are used to control for slow-moving regional changes and global
    covariate shocks. The model differentiates between immediate weather shocks and
    transitory/long-run growth effects, considering annual mean temperature levels
    and total precipitation. The study highlights the importance of differentiating
    between temperature effects and temperature change effects in understanding growth
    dynamics.'
  6: "yaml\nEvaluation overview: \"We use annual Gross Regional Product (or related\
    \ data) as a measure of economic activity on the regional level.\"\nDrivers of\
    \ Risk: \"For the climate variables, we use gridded climate data at 0.5 \u25E6\
    \ resolution from the Climate Research Unit of the University of East Anglia (CRU\
    \ TS v3.23; Harris et al., 2014)... Temperature projections for 2015\u20132099\
    \ in accordance with the Representative Concentration Pathway 8.5 (business-as-usual\
    \ scenario (Van Vuuren et al., 2011)) are derived from the climate data set of\
    \ the Intersectoral Impact Model Intercomparison Project (ISIMIP (Warszawski et\
    \ al., 2014)).\"\nQuantitative material: \"Average annual per-capita growth in\
    \ USD is 7%... The high variability of growth is mainly driven by the large volatility\
    \ of economic growth over time as the within-region standard deviation, SD_w,\
    \ is 3 times larger than the between-region standard deviation, SD_b.\"\nMethodology:\
    \ \"We use climate and economic data at the subnational level for the years 1900\u2013\
    2014... We aggregate these gridded data to the region level by computing area-weighted\
    \ averages... In order to ensure a precise assignment of CRU climate information\
    \ to regions \u2013 in particular if a region is smaller than a 0.5\u25E6 grid\
    \ cell or lies only partly within it \u2013 we apply a two-step algorithm... Temperature\
    \ projections for 2015\u20132099 in accordance with the Representative Concentration\
    \ Pathway 8.5... are derived from the climate data set of the Intersectoral Impact\
    \ Model Intercomparison Project (ISIMIP... These projections, at 0.5\u25E6 resolution,\
    \ originate from different climate models and were bias-corrected (Hempel et al.,\
    \ 2013) to ensure long-term statistical agreement with observational data from\
    \ the WATCH database (Weedon et al., 2011).\"\nMore Notes: \"We included structural\
    \ break dummy variables for each of these changes in data sources... We provide\
    \ a robustness check using re-analysis data from the recently released ERA5 data\
    \ set...\"\n"
  7: "Evaluation overview: \"Results for variants (1)\u2013(6) of Eq. (6) are shown\
    \ in Table 4... the effect of precipitation changes on GRP is largely insignificant.\
    \ We find, however, a significant negative effect of a temperature increase on\
    \ GRP.\"\n\nDrivers of Risk: \"a significant negative effect of a temperature\
    \ increase on GRP\" and \"the effect of precipitation changes on GRP is largely\
    \ insignificant.\"\n\nQuantitative material: \"Per-capita growth rate ... Mean\
    \ 0.070 SD 0.158\" and \"the marginal effects are determined differently... For\
    \ specification (2), marginal effects are analytically given by \U0001D6FE1 +\
    \ 2\U0001D6FE2 T.\"\n\nMethodology: \"We first run regression model (6), exploiting\
    \ the annual panel structure of our data.\"\n\nHighlights: \"We find, however,\
    \ a significant negative effect of a temperature increase on GRP. This can be\
    \ seen by determining the marginal effect of a change in temperature.\"\n\n"
  8: "  \n\"The paper evaluates the impact of annual weather changes on annual changes\
    \ in log Gross Regional Product (GRP).\"  \n\n\"Panel model results for the effect\
    \ of annual weather (changes) on annual changes of log Gross Regional Product.\"\
    \n\n\"Annual changes in temperature (\u0394 T) and precipitation (\u0394 P), including\
    \ their lagged values and interaction effects, impact GRP.\"  \n\n\"For the nonlinear\
    \ panel model variants (2)\u2013(6), we can compute an optimal annual average\
    \ temperature level...and amounts to 2.6%\u20133.7%. Hence, a temperature increase\
    \ of 1\xB0C in a hot region decreases GRP by about 3%.\"  \n\n\"Uses panel regression\
    \ models with various specifications over the period 1900-2014 across multiple\
    \ regions and countries to assess effects.\"  \n\n\"Panel regression results.\"\
    \  \n\n\"Marginal effects of temperature increases, such as a 1\xB0C increase\
    \ in a hot region decreasing GRP by about 3%.\"  \n\n\"Hence, a temperature increase\
    \ of 1\xB0C in a hot region decreases GRP by about 3%.\"\n\n\"Optimal average\
    \ temperature level for minimizing losses ranges between 5\xB0C and 10\xB0C.\"\
    \  \n\n\"...to an optimal annual average temperature level which ranges between\
    \ 5 \xB0C and 10 \xB0C.\"  \n"
  9: "In variants (3)\u2013(6) we consider contemporaneous and one-year lagged \u0394\
    \ T. We run regressions (2) and (5) with different cumulative lag structures...\
    \ This suggests that transitory effects comprise up to two years and that they\
    \ become weaker (and statistically insignificant) over time. Overall, models (5)\u2013\
    (6) have the highest explanatory power... Even though we do not find evidence\
    \ for persistent growth effects, our preferred model specification reports higher\
    \ marginal effects of temperature increases on GRP than Burke et al. (2015) (Fig.\
    \ 1). Second, we use long-difference models (7) to investigate whether the results\
    \ from the annual panel model translate to longer time scales... We find no evidence\
    \ that a change in 10-year average temperature affects growth since the respective\
    \ coefficients as well as the marginal effects are insignificant across all model\
    \ specifications... With regards to precipitation, model specifications (1) and\
    \ (2) show significant effects for the interaction term \u0394 Pi \xB7 Pi,t-1.\
    \ ... Accounting for convergence growth effects... More likely, however, is that\
    \ the temperature change between the two periods considered was too small: Comparing\
    \ the periods 2005\u20132014 and 1985\u20131994, temperature increased by only\
    \ 0.46\xB0C..."
  10: "plaintext\nEvaluation overview: \"Marginal effect of temperature (change) on\
    \ economic growth.\"\n\nDrivers of Risk: \"One degree of temperature increase\
    \ reduces GRP by 2\u20134%.\"\n\nQuantitative material: \"One degree of temperature\
    \ increase reduces GRP by 2\u20134%.\"\n\nMethodology: \"Climate and GRP data\
    \ are aggregated to 10-year intervals with 2005\u20132014 as reference period\
    \ because data coverage is largest for that period.\"\n\nHighlights: \"Over all\
    \ decades, the temperature coe\uFB03cient is remarkably stable and, except for\
    \ the earliest period (1955\u20131964), significant at the 10%-level.\"\n"
  11: "Source material here.\n- Evaluation overview: \"Long-difference model results\
    \ on the effect of a change in 10-year average weather on economic growth (changes\
    \ in log GRP between the two periods).\"\n- Drivers of Risk: \"Table 5 ... gives\
    \ coefficients for model variants that compare 1995-2004 to 2005-2014 ... changes\
    \ in temperature and precipitation only.\"\n- Quantitative material: \"Regions\
    \ with hot climate tend to have lower GRP. For example, in regions with an average\
    \ temperature of 20-24\xB0C, GRP is approximately 28% lower than in the reference\
    \ temperature bin. In regions with 24\xB0C-28\xB0C, the difference amounts to\
    \ 35% lower gross regional product.\"\n- Methodology: \"Long-difference regression\
    \ ... 10-year average weather on economic growth ... columns (1)\u2013(3) ...\
    \ columns (4)\u2013(6) ... model variants ... Specifying changes from 1985 to\
    \ 1994 to 2005\u20132014.\"\n- Highlights: \"A strong non-linear relationship\
    \ is not observed except for extreme temperature bins ... With respect to precipitation,\
    \ we find a u-shaped pattern implying high GRP in very dry and in very wet regions.\"\
    \n"
  12: " \n\"Cross-sectional regression results on the effect of changes in long-term\
    \ climate conditions on the log of Gross Regional Product.\" \n\n\"Under past\
    \ and future warming. For future warming, we consider a business-as-usual scenario,\
    \ i.e. a scenario in line with the highest greenhouse gas concentration trajectory\
    \ considered by the Intergovernmental Panel on Climate Change (IPCC) in its latest\
    \ report\"\n\n\"Projected GRP losses under past and future warming.\"\n\n\"As\
    \ the precipitation coefficients from our empirical models are mostly insignificant,\
    \ we disregard the effect of precipitation.\"\n\n\"Losses are highest if regional\
    \ impacts are weighted by population projections (14.2%) and lowest when the surface\
    \ weighting scheme is applied (11.2%).\"\n\n\"Using the cross-sectional estimates\
    \ gives GRP losses of about 6-8% at the end of the century compared to a no warming\
    \ scenario.\"\n\n\"Cross-sectional regression results showing: T (temperature)\
    \ coefficient of -0.0230 (p < 0.10).\"\n\n\"Temperature and precipitation coefficients.\"\
    \n\n\"In order to generate globally aggregated impacts, we use region-specific\
    \ baseline population growth and economic growth in line with the \u2018middle-of-the-road\u2019\
    \ socio-economic development pathway adopted in the latest IPCC report (i.e. Shared\
    \ Socioeconomic Pathway 2)\"\n\n\"Distance coast -0.113*** / Altitude -0.183**\"\
    \n\n\"This corresponds to our preferred specification (5) in Table 4.\"\n\n\"\
    Standard errors clustered at country level.\"\n"
  13: "Upper panels show results of cross-sectional regression when average temperature\
    \ and precipitation levels in 2005\u20132014 are binned. Global warming and global\
    \ GRP reductions (in %) in 2099 for the RCP 8.5 warming scenario. On a globally\
    \ aggregated level, damages inferred from the annual panel model are hence larger\
    \ than those from the cross-sectional model on long-term climate conditions. The\
    \ interaction term in the panel approach leads to a strong diversification of\
    \ impacts: cold regions benefit from warming whereas hot regions lose disproportionately.\
    \ It is worth mentioning that this heterogeneity of climate damages is in both\
    \ cases correlated to baseline GRP, with a pronounced correlation for the panel\
    \ estimate. Hence, poorer regions tend to suffer stronger from global warming."
  14: "M. Kalkuhl and L. Wenz Journal of Environmental Economics and Management 103\
    \ (2020) 102360 Fig. 3. Losses in Gross Regional Product (GRP) in 2099 under a\
    \ business-as-usual warming scenario (RCP-8.5). Countries are colored according\
    \ to the percentage change by which GRP would be reduced in 2099 if average warming\
    \ from now until then was in the order of 3.5 \u25E6 C compared to a scenario\
    \ with no additional warming from 2015 to 2019 on. Red denotes highest losses\
    \ (more than 20% reduction in GRP) whereas blue indicates that regions bene\uFB01\
    t. ... The cross-sectional regression model implies a log-linear damage function,\
    \ giving a change in GRP... ...with \u0303yi the baseline GRP level in i assuming\
    \ no further warming, \U0001D70Fi the total warming in region i, and \U0001D6FE\
    \ the estimated coe\uFB03cient... Deriving a global GDP-damage function from the\
    \ panel-based estimate is less straight-forward... ...implies regional GDP changes...\
    \ with \U0001D6FC the sum of the estimated coe\uFB03cients of annual temperature\
    \ change over all lags... Importantly, damages here are a quadratic function of\
    \ the warming level and they depend on the initial temperature level Ti,0 in region\
    \ i because marginal damages differ among hot and cold regions in the panel regression...\
    \ ...If the damage of a one-year warming t = 1 is considered, the quadratic term\
    \ vanishes and we can infer the GRP effect directly from the panel regression...\
    \ The image is a color-coded map displaying projected GDP loss by the year 2100\
    \ under the RCP 8.5 climate scenario. The map covers parts of Europe, Africa,\
    \ Asia, and the Middle East. Different shades represent varying levels of GDP\
    \ impact: Dark Red: Indicates the highest level of GDP loss, prominently covering\
    \ regions in central and northern Africa. ... Blue: Represents minimal or negligible\
    \ GDP loss, visible in parts of western Europe..."
  15: "Source material here.\nEvaluation overview: \"Fig. 4. GRP losses in 2099 under\
    \ business-as-usual warming scenario are highest in poor countries. Scatter plots\
    \ show that projected losses at the end of the century are on average highest\
    \ in those regions that have the lowest baseline GRP levels.\"\nDrivers of Risk:\
    \ \"If we employed an econometric speci\uFB01cation that is quadratic in temperature\
    \ levels..., damages would increase exponentially with the length of the considered\
    \ time horizon... A warming by 2 \xB0C that occurs over 10 years would cause much\
    \ smaller GDP losses than the same warming occurring over 100 years.\"\nQuantitative\
    \ material: \"Changes in log GRP in 2099 under the RCP8-5 warming scenario (y-axis)\
    \ were computed based on panel and cross-sectional estimates.\"\nMethodology:\
    \ \"We integrate the damage functions derived in the previous section into the\
    \ recent DICE-2016 model, calculate the social cost of carbon (SCC) and compare\
    \ these updated SCC numbers to the original estimates provided by Nordhaus (2018).\"\
    \nHighlights: \"Our panel based damage functions imply that the optimal carbon\
    \ price in 2020 is almost four times higher as assessed by Nordhaus in the 2018\
    \ study... The panel based damages do not differ substantially for an output-weighted\
    \ or population-weighted calibration of the reduced-form damage function. They\
    \ exceed the DICE damages by a factor of two or more.\"\n"
  16: "  \nEvaluation overview: \"Reduced-form damage functions map increases in global\
    \ mean surface temperature to changes in global GDP...\"  \nDrivers of Risk: \"\
    Reduced-form damage functions map increases in global mean surface temperature\
    \ to changes in global GDP...\"  \nQuantitative material: \"Estimates for the\
    \ social cost of carbon (in $/tCO2, in 2010-US$) based on different damage functions...\
    \ DICE-2016R (Nordhaus) 2020: 37... Based on cross-sectional estimate 2020: 73...\
    \ Based on panel estimate (output-weighted) 2020: 132... Based on panel estimate\
    \ (population-weighted) 2020: 142.\"  \nMethodology: \"The damage function derived\
    \ from the cross-sectional results... our SCC estimates only include direct total\
    \ factor productivity (TFP) impacts of changes in temperature and abstract from\
    \ other important climate impacts...\"  \nHighlights: \"We find strong evidence\
    \ that output levels are affected after a one-time temperature increase... Our\
    \ conclusion is therefore different than Burke et al. (2015) who conclude that\
    \ also long-run growth rates could be affected by temperature changes.\"  \n"
  17: "Dell et al. (2012) 1\u20131.3% for poor countries, no significant effect for\
    \ full sample ... Our study: temperature change (preferred; 1 lag) 0.8% at 10\
    \ \u25E6 C and 3.5% at 25 \u25E6 C temperature ... Our study: temperature level\
    \ (0 lag) 0.5% at 10 \u25E6 C and 2.6% at 25 \u25E6 C temperature ... When looking\
    \ at globally aggregated GRP losses, we find that projected losses are about twice\
    \ as large when computed based on the panel regression estimates instead of on\
    \ their cross-sectional equivalent. ... our estimates only refer to the effect\
    \ of (historic) temperature and precipitation variability on GDP. That is, they\
    \ primarily cover impacts on labor productivity, land productivity (agricultural\
    \ yields) and depreciation of capital. Non-market damages such as loss of life,\
    \ conflicts and violence, biodiversity and ecosystem damages are not captured\
    \ ... Cross-sectional models: Dell et al. (2009) 1.2\u20131.9% for Latin American\
    \ municipalities ... Our study 2.0\u20134.3% ... suggest that growth rates are\
    \ not permanently affected. ... One important aspect to consider ... are dynamic\
    \ equilibrium effects that take place over the long-run.\"\n"
  18: "Source material here.\n\"The paper evaluates the impact of climate change on\
    \ economic productivity, focusing on gross regional product (GRP) changes... Consistent\
    \ with existing evidence on labor productivity and agricultural yields, we find\
    \ strong evidence that changes in annual mean temperatures affect economic output\
    \ in a non-linear way. Increases in temperature tend to increase gross regional\
    \ product (GRP) in cold regions (where annual mean temperature is below 5 \xB0\
    C) and reduce GRP in hot regions.\"\n\n\"Temperature fluctuations impact economic\
    \ outcomes, with increases in temperature influencing GRP differently in cold\
    \ and hot regions... Consistent with existing evidence on labor productivity and\
    \ agricultural yields, we find strong evidence that changes in annual mean temperatures\
    \ affect economic output in a non-linear way.\"\n\n\"A 1\xB0C temperature increase\
    \ in hot regions (annual mean temperature of 25\xB0C) is projected to reduce GRP\
    \ by about 3.5%... This loss is considerable: a 1 \xB0C temperature increase in\
    \ a region with an annual mean temperature of 25 \xB0C reduces GRP by about 3.5%\
    \ in that region.\"\n\n\"The analysis employs a stylized growth model with cross-sectional\
    \ and panel data approaches to assess climate-economy relationships... Our analysis\
    \ adds to this research as follows: Using a stylized growth model, we illustrate\
    \ how weather shocks and changes in climate conditions affect economic output\
    \ and growth rates.\"\n\n\"Increased temperatures lead to increased GRP in cold\
    \ regions and decreased GRP in hot regions; significant output losses are projected\
    \ by 2099 under high-warming scenarios... Applying the panel and cross-sectional\
    \ results to projected warming levels for a high-warming scenario, we project\
    \ considerable production losses, around 7\u201314% in the year 2099 compared\
    \ to a scenario of no further warming. In tropical regions, output losses of up\
    \ to 20% are possible.\"\n"
