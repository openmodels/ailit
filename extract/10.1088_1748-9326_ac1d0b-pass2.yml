  27: " \nEvaluation overview: \"An annual decay of 3% or higher greatly reduces the\
    \ estimated marginal damages of CO2 emissions, especially later in the model horizon\
    \ for the regions with the highest temperatures, when the highest climate change-induced\
    \ economic damages are reached...\"\nDrivers of Risk: \"...possible that the increased\
    \ economic damages due to climate change will trigger a rise in adaptation efforts...\"\
    \nQuantitative material: \"...If damage persistence decreases by 4%\u20135% per\
    \ year, the SCCO2 equals $305\u2013312 which is virtually identical to the SCCO2\
    \ for the default PAGE-ICE model with no persistence...\"\nMethodology: \"...using\
    \ historical data to calibrate our estimate of damage persistence and extrapolating\
    \ it into the distant future...we explore the theoretical possibility that damage\
    \ persistence (\u03C1) decays exponentially over time...\"\nHighlights: \"...A\
    \ decay rate of 1% or 2% counterintuitively increases the SCCO2 compared to our\
    \ default with zero decay from $3372 to $6595 or $4094 respectively...\"\n"
  28: "yaml\nEvaluation overview: No relevant information\nDrivers of Risk: \"Local\
    \ interannual mean temperature variability. Annual standard deviations are calculated\
    \ over 11 year detrended periods.\"\nQuantitative material: \"The local change\
    \ between the two time periods is shown in percentages. Table C2 displays regression\
    \ models of temperature, showing autocorrelation levels of over 0.3.\"\nMethodology:\
    \ \"A 30-year running window is used for linear detrending to remove the global\
    \ warming signal, before the standard deviation is calculated. To find the level\
    \ of interannual variability per region, we apply a land-sea mask to the coarse\
    \ HadCRUT4 grid, followed by multiplying with the cosine of the latitude. Consequently,\
    \ annual mean temperatures are calculated for the PAGE-ICE regions by spatial\
    \ aggregation. We use column (5) from table C2 as a basis for decomposing annual\
    \ temperature variability into autocorrelation, smooth trends, and random variability.\"\
    \nHighlights: \"We find strongly positive changes over the tropics, especially\
    \ over Amazonia, whilst we see little increases in variability over Europe. Nonetheless,\
    \ even for a longer timeseries analysis, we do not find global or PAGE-ICE region-specific\
    \ evidence that justifies increasing or decreasing temperature variability with\
    \ rising global temperatures in simulations.\"\nMore Notes: \"The Ilyas et al\
    \ (2017) dataset is used. We use the results for the period 1986\u20132015, which\
    \ are found in table C1.\"\n"
