  5: "Source material here: To allow for modeling annual temperature anomalies, the\
    \ inputs to the temperature and GDP modules of PAGE are annualized by a combination\
    \ of exponential interpolation for population, sea-level rise, and abatement costs,\
    \ and linear interpolation for GDP growth rates. Annualized temperatures are subsequently\
    \ used for calculating the damages on an annual basis for the non-market, market,\
    \ and discontinuity modules. Sea-level rise and consequent damages are modeled\
    \ to depend on the global climatic mean temperatures modeled in PAGE-ICE, rather\
    \ than annual mean temperatures. There is no strong evidence for the increase\
    \ or decrease in global annual temperature variability with global mean temperature\
    \ increases (Huntingford et al 2013, Sippel et al 2015). Therefore, we model the\
    \ magnitude of interannual temperature variability to be constant over time, based\
    \ on the analysis of regional means in a recent spatially complete dataset (Ilyas\
    \ et al 2017) that is suitable for the analysis of temperature variability...\
    \ We model global (1a) and regional (1b) temperature variability as follows: Tg,t+1\u223C\
    N (\u03B1 g+ \u03B2 g\u0398 gt+ \u03B3 gTt,\u03C32g) (1a) Tr,t+1\u223CN (\u03B1\
    \ r+ \u03B2 rTrt+ \u03B3 gTg,t+1,\u03C32r) (1b)... With autoregression, we fit\
    \ all parameters to historical temperatures using least-squares regression, and\
    \ applying a LOESS of global temperatures as \u0398 gt"
