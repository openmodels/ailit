  8: "  \nSource material here.\n\nBoth current temperature-induced economic damages\
    \ and the persistence of damages are derived from historical data which do not\
    \ show an increase in resilience to temperature shocks over time (Burke et al\
    \ 2015, Burke and Emerick 2016).\n\nAs a result, our approach implicitly assumes\
    \ that future adaptation will remain at the levels observed hitherto for economic\
    \ damages. Yet, while there is no clear evidence for adaptation to the market\
    \ impacts of climate change, it seems unlikely that countries would not invest\
    \ considerable resources in reducing the lasting effects of temperature increases\
    \ if actual damages in the (far) future were as big as simulated.\n\nTherefore,\
    \ we further explore the effects of adaptation reducing the damage persistence\
    \ by a constant annual rate, similar to Moore and Diaz (2015). As figure 4 shows,\
    \ if current persistence is around 50% (as suggested by the mean of our empirical\
    \ distribution), then the level of persistence would need to decrease by more\
    \ than 2% per year via adaptation efforts to reduce the model\u2019s SCCO2 to\
    \ below $2500.\n\nAdding variability also widens the SCCO2 uncertainty ranges.\
    \ Most of the additional spread of the Monte Carlo runs producing SCCO2 estimates\
    \ of zero, meaning that the methodological decision behind PAGE-ICE\u2019s damage\
    \ cap increasingly dominates the model results.\n\nWe first implement stochastic\
    \ annual regional temperatures to the base PAGE-ICE model, and then extend this\
    \ to the version with persistent climate damages. Variability produces small changes\
    \ in the means and medians of SCCO2 distributions for all RCP-SSP scenario combinations\
    \ (figures 5 and 6), with a mean increase of $21 (6.5%) for SSP2-4.5. Accountfor\
    \ temperature anomalies in model runs leads to a widening of realized temperature\
    \ ranges, leading to more extreme annual temperatures occurring more frequently,\
    \ both in the near term and in the long run (figures 5(a) and (b)).\n\nSubstantial\
    \ increase in the SCCO2 is primarily driven by the adverse implications for the\
    \ Global South. Therefore, the resulting SCCO2 is very similar if only lower-income\
    \ regions are assumed to suffer from persistent economic damages (appendix B.5).\n"
  10: 'Source material: Temperature anomalies to an annual version of PAGE with constant
    damage persistence [...] The inclusion of permafrost thawing and surface albedo
    feedbacks [...] Alternative climate and socioeconomic scenarios [...] projected
    climate forcing and subsequent impacts [...] climate change-induced damages. The
    inclusion of permafrost thawing and surface albedo feedbacks is shown to lead
    to a relatively small increase in the SCCO2 for SSP2-4.5, with modest distributional
    effects. Consideration of temperature anomalies shows that internal variability
    in the climate system can lead to increases in SCCO2 estimates. Introducing the
    temperature anomalies to an annual version of PAGE [...] For all the PAGE-ICE-based
    model specifications [...] Due to data limitations, this study used a global model
    of damage persistence with no regional disaggregation. Our results show that determining
    the level of persistence of economic damages is one of the most important factors
    in calculating the SCCO2 [...] It further indicates that considering annual temperature
    anomalies lead to large increases in uncertainty about the risks of climate change.
    [...] that the assumption of zero persistence in CB-IAMs should be subject to
    increased scrutiny in order to avoid considerable bias in SCCO2 estimates. suggesting
    that the mean estimate for the SCCO2 may have been strongly underestimated. [...]
    future research should in particular focus on advancing the understanding of growth
    effects in the Global South and on tackling them. Our findings corroborate that
    economic uncertainty is larger than climate science uncertainty in climate-economy
    system analysis.'
