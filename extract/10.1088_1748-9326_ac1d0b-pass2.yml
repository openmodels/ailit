Highlights:
  2: PAGE-ICE yields SCCO2 values about two times higher than PAGE09 because of its
    climate and economic updates. Economy feedbacks demonstrate a manifold increase
    in the SCCO2 resulting from an empirically derived estimate of partially persistent
    economic damages. Impacts of climate change are large if future adaptation does
    not exceed historical trends.
  4: The PAGE-ICE model includes a more detailed representation of CO2 and CH4 sinks,
    permafrost carbon feedback, the effect of sea ice and land snow decline on surface
    albedo, and a fat-tailed distribution of sea-level rise, as well as interannual
    temperature variability. Market damages are now calculated based on absolute temperature,
    and the model includes the possibility of persistent climate-induced damages,
    which in turn affects GDP pathways and scales emissions accordingly.
  5: Models annual temperature anomalies; Magnitude of interannual temperature variability
    is modeled to be constant over time; Sea-level rise and damages depend on global
    climatic mean temperatures.
  6: The mean SCCO2 in PAGE-ICE is double the value for PAGE09, almost entirely attributable
    to increased social costs in the Global South. Regional empirical damage estimates
    in PAGE-ICE allow for benefits of global warming in cooler regions and higher
    damages in warmer regions. Damage persistence significantly affects global GDP
    and its regional distribution.
  7: The total climate damages in PAGE being capped can lead to a decrease in the
    SCCO2 as damages exceed the predefined limit.
  8: Adaptation reducing damage persistence can significantly impact SCCO2 estimates.
    Annual temperature variability widens the SCCO2 uncertainty ranges and leads to
    higher mean damages.
  10: Damage persistence is one of the most important factors in calculating the SCCO2.
    Considering annual temperature anomalies leads to large increases in uncertainty
    about the risks of climate change. Assuming zero persistence in CB-IAMs should
    be subject to increased scrutiny in order to avoid considerable bias in SCCO2
    estimates.
  14: The largest positive impact is from a decrease in the tolerable temperature
    for a discontinuity, increasing SCCO2 by $617.53. Other significant drivers include
    transient climate response and time preference.
  15: "Presents the parameters \u03B4 and \u03B2 for projecting population and GDP\
    \ per capita under SSPs 1-5, which are crucial for downscaling climate impacts\
    \ assessments."
  16: The paper presents SCCO2 estimates under different SSPs and model specifications.
    The PAGE model variants consider different approaches to modeling temperature
    variability and growth effects. The introduction of persistence of damages might
    cause economic collapse of some regions.
  17: Demonstrates sensitivity of damage estimates to the level of equity weighting
    and adjustments for consumption levels to prevent infinite equity-weighted damages.
  19: The persistence of climate damage is uncertain and sensitive to the number of
    temperature lags included in the regression model. The choice of lag structure
    significantly impacts the estimated persistence, ranging from 52.8% with one lag
    to potentially much lower values with more lags. Additional lags may introduce
    noise and widen confidence intervals.
  20: Presents coefficients for temperature variables that factor into estimates of
    damage persistence.  Calculates implied persistence for the 3 year, 5 year, and
    10 year filtered climate variables.
  23: Results suggest there might not be clear evidence for applying heterogeneous
    persistence of climate damages across regions in the model.
  24: "The research investigates the impact of temperature on GDPpc growth, focusing\
    \ on countries with GDPpc below the median. The study examines different temperature\
    \ lag structures, calculating resulting \u03C1 values. Point estimates for the\
    \ lower-income subsample range between 73.29% and 112.45% for different filter\
    \ periods."
  25: Regions with lower GDP per capita are more affected by temperature persistence,
    influencing overall social costs of carbon dioxide (SCCO2) calculations.
  27: With a decay rate of 4%-5%, the SCCO2 becomes almost identical to the default
    model with no persistence; a 1%-2% decay rate unexpectedly increases SCCO2 compared
    to the default.
  28: Finds strongly positive changes in interannual temperature variability over
    the tropics, especially Amazonia, post-1986. Sees little increase in variability
    over Europe. Does not find global or PAGE-ICE region-specific evidence that justifies
    increasing or decreasing temperature variability with rising global temperatures
    in simulations.
  29: Residual temperature variation is assumed to be uncorrelated across regions
    after accounting for Global Mean Surface Temperature (GMST) and regional auto-regression.
  30: The models in Table C2, combining year, CO2, LOESS, and lagged GMST, explain
    up to 86.2% of the variance in GMST. An alternative temperature variability model
    is explored without autoregression.
  34: No relevant information
Methodology:
  2: Cost-benefit integrated assessment models, PAGE-ICE model, PAGE09 model.
  4: The PAGE-ICE model is used to estimate the SCCO2 by running the model twice,
    once with the specified emission pathway and once with an added CO2 pulse. The
    SCCO2 is calculated as the difference in global equity-weighted damages between
    those two runs divided by the pulse size, discounted to the base year (2015).
    The model uses Monte Carlo sampling of over 150 parameter distributions.
  5: Annualized temperatures are used for calculating damages on an annual basis for
    non-market, market, and discontinuity modules. Sea-level rise damages depend on
    global climatic mean temperatures. The magnitude of interannual temperature variability
    is modeled as constant over time, based on analysis of regional means in Ilyas
    et al (2017). Global and regional temperature variability modeled using normal
    distributions with parameters estimated from historical temperatures using least-squares
    regression and LOESS.
  6: Uses the PAGE-ICE model under the SSP2-4.5 scenario with Monte Carlo simulations.
    Breaks down changes from PAGE09 to PAGE-ICE into key steps. Estimates damage persistence
    using panel regression analysis of historical temperature and GDP data.
  7: Incorporates growth effects into the PAGE-ICE model for SSP2-RCP4.5, using both
    fixed values of damage persistence (0%-100%) and an empirically derived persistence
    distribution from Burke et al. (2015).
  8: The PAGE-ICE model is used with Monte Carlo simulations. The effect of adaptation
    reducing damage persistence is explored by a constant annual rate. The results
    are applicable to different SSP-RCP scenarios. Stochastic annual regional temperatures
    are implemented.
  10: Uses the PAGE model and PAGE-ICE model with variations to assess the Social
    Cost of Carbon (SCCO2). The analysis is based on different Shared Socioeconomic
    Pathways (SSPs) and examines the effects of climate feedbacks, temperature variability,
    and damage persistence on SCCO2 estimates. The study used a global model of damage
    persistence without regional disaggregation.
  11: 'The PAGE model is run twice: once with an emissions scenario, and again with
    the same scenario plus a CO2 pulse in the first timestep (2020). Future population
    and income levels are estimated by fitting and extrapolating SSP data using a
    model based on growth rates, convergence, and decay.'
  14: The analysis uses the PAGE-ICE model for SSP2-4.5 in a deterministic run, evaluating
    impacts by adjusting individual parameters while holding others constant.
  15: Presents parameters used in a population and income extension model. The model
    projects population and per capita GDP under different Shared Socioeconomic Pathways
    (SSPs).
  16: The SCCO2 values are derived from 50,000 Monte Carlo runs. The alternative variability
    model features regional temperatures that vary independently and includes observational
    uncertainties on the standard deviations. They introduce a persistence parameter
    into a parameterized growth system where GDP at time t is related to GDP at t-1
    and a growth rate term that is reduced by some share (rho) of economic damages
    from the previous time step. A subsistence bound is introduced at a per capita
    consumption level equaling the World Bank threshold for extreme poverty and equity
    weighting is limited to damages less than or equal to 99% of consumption.
  17: Introduces boundaries in the equity-weighting process by assuming limits on
    per capita consumption and utilizing logistic convergence paths to address numerical
    infeasibility.
  19: Uses a lagged regression model (Burke et al, 2015) to estimate damage persistence
    as the ratio of long-run to immediate marginal impacts as temperature goes to
    (minus) infinity. Also explores an alternative approach using a Butterworth low-pass
    filter on climate variables, similar to Bastien-Olvera and Moore (2021).
  20: Baseline regression model based on Burke et al (2015) with various numbers of
    temperature and precipitation lags, country and year fixed effects, and country-specific
    time trends.  Temperature and precipitation observations are low-pass filtered
    for minimum periodicities of 3, 5, and 10 years.
  21: Monte Carlo simulations using 5000 bootstrap samples from country clusters
  23: The analysis uses regression of GDP per capita growth on low-pass filtered climate
    variables with clustered standard errors at the country level; subsamples by income
    levels are analyzed separately.
  24: Baseline regression model based on Burke et al. (2015) for countries with GDPpc
    below the median, with varying numbers of temperature lags (up to 5). The model
    includes precipitation, country and year fixed effects, and country-specific time
    trends. Following Burke et al. (2015), models with k temperature lags also feature
    k precipitation lags.
  25: The analysis uses a regression model with temperature lags, country-specific
    time trends, and fixed effects, based on data provided by Burke et al. (2015).
  26: The study regresses GDP per capita growth on low-pass filtered climate variables,
    using data from Burke et al. (2015), with separate analyses for countries below
    and above the GDP per capita median. Standard errors are clustered at the country
    level, and percentiles are estimated via 5000 cluster bootstrap samples. Statistical
    significance is indicated with asterisks.
  27: The analysis uses historical data to calibrate estimates of damage persistence
    and apply it to future scenarios through a Monte Carlo approach, exploring exponential
    decay of damage persistence.
  28: Calculates annual standard deviations over 11-year detrended periods before
    and after 1986. Uses a 30-year running window for linear detrending. Spatial aggregation
    is performed for PAGE-ICE regions. Applies a land-sea mask and cosine of latitude
    weighting. Autoregressive temperature model decomposing variability into autocorrelation,
    smooth trends (LOESS), and random variability.
  29: "The paper uses a two-step process to add autocorrelated temperatures to PAGE-ICE,\
    \ modeling global temperature (RTgt) as a function of past global temperature\
    \ (PTgt), autoregression terms (\u03B1g, \u03B2g, \u03B3g), and a standard error\
    \ (\u03C3g). Regional temperatures (RTLrt) are modeled similarly, using a regional\
    \ amplification factor (AFr)."
  30: Table C2 uses regression models to predict annual GMST with different combinations
    of Year, CO2 concentration, LOESS of observed GMST, and lagged GMST. Equation
    C1a and C1b propose alternative temperature models without autoregression.
  34: No relevant information
More Notes:
  4: The model has been translated into the Mimi modeling framework. Results are provided
    for a selection of scenarios across climate outcomes and socioeconomic developments,
    based on the Tier 1 scenarios of ScenarioMIP (SSP1-1.9, SSP1-2.6, SSP5-8.5, and
    SSP2 combined with RCP4.5).
  6: Changing the order of introducing changes can lead to minor changes in the values
    presented. A significant portion of GDP damages persists as impacts on growth,
    particularly in Africa, South Asia, and Latin America.
  8: The damage cap in the PAGE-ICE model increasingly dominates results when there
    is a combination of high persistence and low-to-no adaptation.
  10: The paper suggests that previous SCCO2 results may have underestimated damages
    in the Global South. It also highlights the need for a better understanding of
    growth effects in the Global South and for tackling them. Economic uncertainty
    is larger than climate science uncertainty in climate-economy system analysis.
  11: The authors perform a sensitivity analysis of the SCCO2, and extend the SSP
    timeseries.
  15: The parameters provided appear to be for use in projecting future socio-economic
    conditions rather than directly evaluating climate impacts. The figure caption
    indicates projections out to 2100.
  16: "The alternative emissions pathway (PAGE09 staying below 1.5\xB0C) results in\
    \ slightly higher SCCO2 estimates. Extreme Monte Carlo draws for persistence cause\
    \ numerical issues in a handful of model runs, reducing the effective Monte Carlo\
    \ sample size by less than 0.1%, but does not affect their main results for SSP2-4.5.\
    \ The exact distribution of persistence is unknown, so has been specified in various\
    \ ways."
  19: "The ratio of marginal impacts (damage persistence) is numerically unstable\
    \ near 13\xB0C due to the denominator (immediate marginal impact) approaching\
    \ zero."
  20: Mentions discarding countries with less than twice the minimum periodicity of
    temperature/precipitation observations.
  24: "The authors calculate persistence estimates (\u03C1) and report t-statistics\
    \ for coefficients. The asterisk notation indicates statistical significance levels\
    \ (p < 0.05, p < 0.01, p < 0.001)."
  28: "The study uses longer records compared to some previous studies. The results\
    \ for the period 1986\u20132015 from table C1 and column (5) from table C2 are\
    \ used in model specifications. The Ilyas et al (2017) dataset is used."
  29: The regions used in PAGE are chosen for economic coherence rather than climatological
    distinctness, and the paper tests this assumption by looking at the correlation
    in model errors across regions.
  30: The paper explores auto-correlation in temperature data and the effects of alternative
    temperature variability model specifications.
  34: No relevant information
Quantitative material:
  2: PAGE-ICE yields SCCO2 values about two times higher [than PAGE09], including
    an estimate of interannual temperature variability increases the width of the
    SCCO2 distribution.
  4: "The paper uses a 75 Gt pulse size in the first time period of PAGE-ICE (mid-2017\u2013\
    2025), representing an annual pulse size of 10 GtCO2. Equity weighting of damages\
    \ uses a mean (minimum, maximum) elasticity of marginal utility of consumption\
    \ of 1.17 (0.1\u20132.0), and damages are discounted using a pure time preference\
    \ rate of 1.03% (0.5%, 2.0%)."
  5: Models global (1a) and regional (1b) temperature variability using equations
    that include variables for realized annual temperature, mean temperature prior
    to variability, standard deviation of internal variability, and global/regional
    subscripts.
  6: "PAGE09 SCCO2: $158 in 2020 ($2015 USD). AR5 Updates increase SCCO2 to $217.\
    \ Long-tailed SLR increases SCCO2 to $228. Permafrost feedback increases SCCO2\
    \ to $244. Surface Albedo Decline reduces SCCO2 to $239. Updated Discontinuity\
    \ reduces SCCO2 to $213. 2300 Horizon increases SCCO2 to $239. Baseline income\
    \ levels increase SCCO2 to $245. GDP p.c. Convergence increases SCCO2 to $281.\
    \ PAGE-ICE final SCCO2: $307. Uncertainty range for PAGE-ICE: $147\u2013$349 (interquartile\
    \ range), $82\u2013$831 (5%-95%)."
  7: The 'India+', 'Africa+', and 'Latin America' regions reach income levels associated
    with extreme poverty in 12%, 11% and 4% of Monte Carlo simulations, respectively.
  8: If current persistence is around 50%, a decrease of more than 2% per year via
    adaptation is needed to reduce the model's SCCO2 to below $2500.
  10: The inclusion of permafrost thawing and surface albedo feedbacks leads to a
    relatively small increase in the SCCO2 for SSP2-4.5, with modest distributional
    effects. Consideration of temperature anomalies shows that internal variability
    in the climate system can lead to increases in SCCO2 estimates.
  11: The SCCO2 is estimated based on an annual pulse size of 10 Gt of CO2 in model
    year 2020, totaling a 75 Gt CO2 pulse over the period modeled.
  14: Quantitative impacts on SCCO2 are provided, showing changes in 2020 SCCO2 in
    dollars when parameters are increased or decreased by one standard deviation.
  15: "Provides parameters (\u03B4 and \u03B2) for population and GDP per capita extension\
    \ models for SSPs 1-5."
  16: "Table A4 provides mean (25th\u201375th [5th\u201395th] percentile) SCCO2 values\
    \ based on 50000 Monte Carlo runs for different SSPs and PAGE model variants,\
    \ with values given in unspecified currency units. Examples include: SSP1-1.9:\
    \ 48 (14\u201350 [5\u2013121]); SSP2-4.5: 129 (31\u2013115 [13\u2013323]); SSP5-8.5:\
    \ 140 (35\u2013138 [14\u2013430]) for the PAGE09 model. Some values are marked\
    \ with asterisks indicating SCCO2 values of zero or numerical issues."
  17: Sets a consumption threshold based on World Bank's extreme poverty threshold
    of $1.90/day from 2011, converted for the model to $740.65 per year.
  19: "Damage persistence equals 52.8% of the immediate impact using one temperature\
    \ lag. Including a second lag would strongly reduce a point estimate to 27.8%.\
    \ A model with four lags suggests a persistence of only 10.3%. A second lag would\
    \ extend the 90% confidence interval for \u03C1 to \u221241%."
  20: "Coefficients for temperature and temperature squared variables, \u03C1 (persistence),\
    \ 5th and 95th Monte Carlo percentiles for persistence"
  21: "Lines represent the Monte Carlo mean values, while the shaded areas represent\
    \ the 5th\u201395th percentile."
  23: The coefficients for temperature and temperature squared under various filters
    are provided; e.g., unfiltered temperature impact is 0.012933 with a t-statistic
    of 3.41.
  24: "Table B3 provides coefficients for temperature and temperature squared variables\
    \ (including lagged versions) in a regression model of GDP per capita (GDPpc)\
    \ growth for countries with GDPpc below the median. It also gives the 'Resulting\
    \ \u03C1', 5th and 95th Monte Carlo percentiles, N, BIC and LL for each model."
  25: The regression model's temperature coefficient is around 0.0085 with various
    lags showing different impacts on GDP growth; resulting persistence percentages
    and Monte Carlo percentiles are provided.
  26: The tables present regression coefficients for temperature and temperature squared
    on GDP per capita growth, along with t-statistics, BIC, log-likelihood (ll), resulting
    rho values, and 5th and 95th percentiles estimated via cluster bootstrap samples.
  27: Different decay rates of damage persistence (3%, 4%-5%, 1%-2%) impact SCCO2
    estimates, with a decay rate of 3% or higher greatly reducing estimated marginal
    damages.
  28: Percentage change in local interannual mean temperature variability between
    pre-1986 and post-1986 periods. Regression models of temperature showing autocorrelation
    levels.
  29: "Table C1 provides standard deviations (in \xB0C) of annual spatially aggregated\
    \ mean temperature variability for 1986-2015 for various regions (EU, Russia+,\
    \ USA, China+, India+, Africa and Middle East, Latin America, OtherOECD, Global),\
    \ broken down into 'Variability of median local temperatures', 'Variability of\
    \ mean local temperatures', and 'Uncertainty in observations'."
  30: Table C2 shows R2 values ranging from 0.652 to 0.862 for models predicting GMST.
  34: No relevant information
