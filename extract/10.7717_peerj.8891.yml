    \ rates of 0.48 to 15.60 tCO 2eq acre \u22121 yr\u22121, pre-tax cash flows ranging\
    \ from $230,000 to $16,380,000 across project time-series are calculated...\n\n\
    ...theDirectMeasurementForestCarbonProtocol TM isbasedonstandardized methodsfordirectdeterminationofnetecosystemexchange(NEE)ofCO\
