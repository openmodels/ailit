Highlights:
  1: The Direct Measurement Forest Carbon Protocol aims to create economic incentives
    to reverse deforestation, offering up to 5x revenue for voluntary offsets, and
    can assist in managing global warming.
  2: Claims that NEE (Net Ecosystem Exchange) measurement can improve multinational
    policy applications such as the Paris Agreement and the United Nations Reducing
    Emissions from Deforestation and Degradation, by avoiding unsupported claims of
    emission reduction, fraud, and forest conservation policy failure.
  3: The paper compares landowner benefits and incentives between the DMFCP and traditional
    estimation-based protocols, as well as the associated uncertainties.
  4: The DMFCP aims to quantify and track forest carbon sequestration, enabling the
    creation and sale of carbon credits on voluntary and compliance markets.
  6: Illustrates a carbon credit system with positive and negative NEE indicating
    GHG source or sequestration.
  7: Extrapolated NEE values were combined with carbon prices ranging from $5 to $36
    tCO2eq to explore pre-tax revenue scenarios.
  8: Ankasa Resource Reserve is designated as a global priority conservation area,
    with high Genetic Heat Index scores indicating significant genetic rarity.
  11: The page highlights that both HF and AP sites showed negative annual NEE values,
    indicating active forest carbon sequestration and generation of carbon credits
    over the observed intervals.
  14: The key outcome is to determine if a carbon offset project is truly net positive,
    achieving real and additional carbon reductions.
  16: Uncertainties in NEE are addressed through harmonizing protocols and error corrections,
    with standardized methods being emphasized for improving the estimation accuracy.
  17: Ankasa Park experienced consistently greater carbon sequestration compared to
    Harvard Forest, despite potential caveats regarding tropical forests.
  18: Landowner revenue associated with forest carbon management is highly sensitive
    to carbon price and payment structure, with Case 2 (upfront payment plus royalty)
    generally resulting in higher pre-tax cash flow than Case 1 (upfront payment only).
  19: The Harvard Forest site shows consistently higher cash flow compared to Ankasa
    Park across all sequestration rates; cash flow is also significantly affected
    by carbon product type and pricing.
  21: The DMFCP provides a financial incentive for landowners to engage in reforestation
    and forest management to promote carbon benefits and sustainable forestry.
  22: The estimation protocols lack direct comparison with CO2 measurements and peer
    review, limiting scientific acceptance and highlighting the need for peer-reviewed
    non-NEE based methods.
  23: DMFCP provides upfront and annualized payments to landowners, simplifies the
    carbon protocol process, eliminates baseline estimation, tests for additionality,
    and multiyear invalidation periods, and provides near-real-time NEE data.
  24: Ton-year accounting method used by the DMFCP allows a wider range of forest
    project types and intervals, as it does not impose an artificial time horizon
    for tree growth.
  26: "DMFCP can address the ~0.9 billion hectares of restorable landscapes. It offers\
    \ a viable approach to retain the Earth\u2019s natural protective capacity to\
    \ sequester atmospheric CO2."
  41: No relevant information
Methodology:
  1: The analysis utilizes the Direct Measurement Forest Carbon Protocol, which employs
    standardized methods for determining net ecosystem exchange of CO2 using eddy
    covariance and is applicable in diverse forest types.
  2: Argues that current forest carbon offset estimation relies on infrequent forest
    mensuration (6-12 years) coupled with tree growth simulation models.
  3: The DMFCP (Direct Measurement Forest Carbon Protocol) uses direct, in-situ measurement
    of vertical gross forest CO2 fluxes to determine net forest carbon sequestration
    or net ecosystem exchange (NEE).
  4: The Direct Measurement Forest Carbon Protocol (DMFCP) uses a Sensor Network (SoS)
    and Global Monitoring Platform (GMP) to measure gross vertical fluxes of carbon
    in forest ecosystems. The system involves in situ measurement of forest carbon
    gross fluxes (GPP, Reco) which are designated as Physical Carbon.
  6: Direct field measurement of NEE for CO2, CH4, and N2O using SoS and GMPs; includes
    ex-ante annual accreditation and exit strategies after 10 years.
  7: NEE data for a single tower for each site was accessed from online data sources
    and transformed into tones carbon dioxide equivalent per acre per year.
  8: The Ankasa Park eddy covariance tower was used for data collection, equipped
    with an open path CO2 analyzer, and operated as part of the CarboAfrica project
    from 2011 to 2014.
  14: The methodology involves various checks and standards, including additionality
    tests, baseline validation, third-party verification, and invalidation protocols.
    Measurements of NEE (Net Ecosystem Exchange) are used. Baseline points are compared
    to actual results; negative flux indicates carbon production.
  16: The analysis involves using eddy covariance data, standardized protocols, and
    addressing errors in measurement methodology to estimate Net Ecosystem Exchange
    (NEE) and integration in climate models.
  17: Analysis based on Net Ecosystem Exchange (NEE) data from Harvard Forest and
    Ankasa Park from 1995 to 2015.
  18: 'Extrapolations of measured local NEE to 100,000 acres (40,469 hectares) multiplied
    by the annual NEE record for each site (HF and AP). Two cases are considered:
    a single upfront payment (Case 1) or an upfront payment plus annual royalty on
    sales (Case 2).'
  19: The analysis uses continuous eddy covariance measurements for NEE to determine
    forest carbon metrics and extrapolation of historical data to 100,000 acres to
    project cash flows.
  21: The page discusses the importance of long-term CO2 measurement for understanding
    annual changes in NEE and creating forest carbon financial products.
  22: The paper discusses the use of open-source and commercial eddy covariance processing
    software to harmonize data treatment, including uncertainties for CO2 and CH4
    flux.
  23: This paper describes and promotes the Direct Measurement of Forest Carbon Protocol
    (DMFCP) as an alternative to traditional forest carbon protocols (e.g., CARB,
    CAR, ACR, VERRA, CDM). DMFCP involves direct measurement of CO2 flux to determine
    Net Ecosystem Exchange (NEE).  It contrasts this with traditional methods that
    use proxies and modeling.
  24: The DMFCP NEE measurements provide diagnostics for when a project switches from
    carbon negative to carbon positive.
  26: The DMFCP (a commercial standardized measurement-to-monetization system for
    determining Net Ecosystem Exchange (NEE)) is described. NEE enables creation of
    verified forest carbon financial products. The SoS and GMP components of DMFCP
    can be applied to GHGs across large-scales and diverse locations. The DMFCP normalizes
    forest emission reduction determinations.
