    \ require lengthy periods (e.g., 2\u20135 years) of fee-based project certification\
    \ and registration prior topayment,limitinglandownerparticipation( Kerchner&Keeton,2015\
    \ ;K\xF6hl,Neupane& Mundhenk,2020 ). In contrast, the DMFCP process can provide\
    \ an upfront payment and annualized payment ... TheDMFCPembodiedintheSoSandGMPobviatesthreefeaturesintrinsictotraditional\
    \ protocolsincludingeliminationofbaselineestimation(#11),testsforadditionality(#12),\
    \ and a multiyear invalidation period (#13) ... In contrast, the DMFCP results\
    \ in near-real time (30-minute average of 10 Hz measurements) NEE time series\
    \ and trends ( Dou&Yang,2018 ), obviating reliance on uncertain project scenarios\
    \ and an impractical prediction of future emissions against possible forest disturbance.\"\
