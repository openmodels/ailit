Drivers of Risk:
  2: Future natural hazards are affected by climactic conditions such as rising sea
    levels and changes in storm intensity and frequency.
  5: Unplanned/informal modifications, maintenance/degradation challenges, environment-induced
    deterioration, accumulation of damage due to cascading hazard events (e.g., aftershocks),
    socioeconomic conditions, and policy decisions.
  8: Increasing human populations, relentless urbanization, and significantly different
    climactic conditions are driving risks.
  9: Various hazards such as floods, fires, and earthquakes are analyzed as potential
    threats.
Evaluation overview:
  2: No direct overview of specific outcomes like mortality or productivity loss is
    provided on this page.
  5: Physical vulnerability of infrastructure, specifically the tendency of exposed
    assets to suffer adverse effects when impacted by natural hazards.
  8: This paper reviews state-of-the-art approaches to future natural-hazard risk
    quantification, including methodologies to model future hazards, exposure, and
    (physical) vulnerability. It documents ways in which future risk has been measured,
    such as in terms of asset damage, business interruption, welfare losses, and travel-time
    delays.
  9: The page focuses on assessing future natural hazards with a stakeholder-driven
    risk modeling framework.
Highlights:
  2: Emphasis on the need for future-focused risk assessments to inform spatial planning
    and risk-prevention measures.
  5: "Dynamic increases in structural vulnerability may be driven by informal structural\
    \ modifications, environment-induced deterioration, and accumulation of damage\
    \ due to cascading hazard events. These increases can be offset by vulnerability\
    \ adaptation measures (shifting the vulnerability curves to the right), many of\
    \ which may be broadly categorized as \u201Cclimate adaptation engineering\u201D\
    \ approaches."
  7: Bouwer (2013) presented a framework for modeling future natural-hazard risk by
    accounting for the dynamic nature of hazard, vulnerability, and exposure.
  8: There are significant obstacles to quantifying future natural-hazard risk for
    management and mitigation purposes, including substantial uncertainty and the
    lack of a standard end-to-end future risk modeling framework.
  9: The framework integrates stakeholder participation and feedback into calculating
    weighted risk metrics for an overall risk assessment.
Methodology:
  2: The analysis discusses modeling of future natural hazard risks based on climate
    models and scenarios of possible future emissions.
  3: The analysis is performed by integrating emission scenarios with climate models,
    downscaling these models for finer resolution, and generating specific climate-related
    events to calculate their local intensities.
  5: Framework for modelling the time-dependent earthquake fragility (i.e., the probability
    of collapse) of incrementally expanding construction using Markov chains to quantify
    the probability of residential buildings transitioning to a new state with more
    stories.
  7: Current best practice is to average climate projections across all models in
    an ensemble, a method that may not be optimal.
  8: The paper reviews existing methods and highlights the need for consistent risk-quantification
    procedures. It suggests leveraging existing tools (e.g., related to multi-criteria
    decision-making and multi-hazard theories) that have been successfully adopted
    for risk quantification in other contexts.
  9: A stakeholder-centered approach for risk modeling that accounts for multiple
    hazards, diverse risk metrics, and stakeholder perspectives; involving a feedback
    loop for dynamic assessment.
More Notes:
  2: No additional notes specific to the paper's contribution identified.
  5: The figure (Fig. 3) illustrates sample changes in the vulnerability of a structure
    through time, from T1 to T3, showing that T3 requires the least hazard intensity
    for damage.
