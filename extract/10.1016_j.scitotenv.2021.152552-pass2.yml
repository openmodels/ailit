  2: null
  3: "The page describes a methodological approach for modeling future climate-related\
    \ hazards, stating: \"Information on possible scenarios of future emissions are\
    \ combined with climate models that are then appropriately downscaled to provide\
    \ \uFB01ner resolution data for hazard analysis in the region of interest. The\
    \ downscaled climate models are used to simulate values for dynamic weather variables,\
    \ from which hazardous events can be derived. Then, local intensities associated\
    \ with these events are calculated.\""
  5: "G. Cremen et al., Science of the Total Environment 817 (2022) 152552: \"Vulnerability\
    \ is broadly defined as 'the characteristics and circumstances of a community,\
    \ system or asset that make it susceptible to the damaging effects of a hazard'...\
    \ Risk assessment methods account for the future vulnerability of physical infrastructure\
    \ to natural hazards from two main perspectives... unplanned/informal modifications\
    \ or maintenance/degradation challenges, whereas the second focuses on the reduction\
    \ in vulnerability that can be achieved by adapting infrastructure to future conditions\
    \ (see Fig. 3)\"; \"Markov chains were leveraged to quantify the probability of\
    \ residential buildings transitioning to a new state with more stories\"; \"Dynamic\
    \ increases in structural vulnerability may be driven by informal structural modifications,\
    \ environment-induced deterioration, and accumulation of damage due to cascading\
    \ hazard events (e.g., aftershocks). These increases can be offset by vulnerability\
    \ adaptation measures (shifting the vulnerability curves to the right), many of\
    \ which may be broadly categorized as \u201Cclimate adaptation engineering\u201D\
    \ approaches.\""
  7: " \nOne of the main challenges to modelling future risk that has been identi\uFB01\
    \ ed in the literature is the signi\uFB01 cant inherent uncertainty in each of\
    \ these components of tomorrow's risk (e.g., Hemmati et al., 2020). This means\
    \ that current best practice is to average climate projections across all models\
    \ in an ensemble, which may not be optimal (Gleckler et al., 2008). Despite clear\
    \ and numerous efforts to model individual risk components associated with future\
    \ natural-hazard events, there remains a lack of a commonly accepted analytical\
    \ framework for complete end-to-end risk quanti\uFB01 cation. This is re\uFB02\
    \ ected in the wide range of inconsistent approaches found in the literature for\
    \ calculating future loss projections, which incorporate various degrees of complexity\
    \ (e.g., Jurgilevich et al., 2017). For example, Bouwer (2013) presented a framework\
    \ for modelling future natural-hazard risk (see Fig. 4), which accounted for the\
    \ dynamic nature of hazard (via climate change and natural weather variability),\
    \ vulnerability (via socioeconomic change and adaptation measures), and exposure\
    \ (via temporal adjustments to population and economic growth).\n"
  8: " \nEvaluation overview: \"This paper has reviewed state-of-the-art approaches\
    \ to future natural-hazard risk quantification, including various methodologies\
    \ that have been developed to model tomorrow's hazards, exposure, and (physical)\
    \ vulnerability. We have also documented diverse ways in which future risk has\
    \ been measured, such as in terms of asset damage, business interruption, welfare\
    \ losses, and travel-time delays.\"\n\nDrivers of Risk: \"Modelling and quantifying\
    \ tomorrow's risks from natural hazards is becoming ever more critical as we face\
    \ an uncertain future of increasing human populations, relentless urbanisation,\
    \ and significantly different climactic conditions.\"\n\nMethodology: \"Our Review\
    \ has revealed that while there have been numerous efforts to model the individual\
    \ components of future natural-hazard risk, some significant obstacles to quantifying\
    \ this risk for management and mitigation purposes still remain.\" and \"we can\
    \ readily improve our current assessments of tomorrow's natural-hazard risks,\
    \ by leveraging existing tools (e.g., related to multi-criteria decision-making\
    \ and multi-hazard theories) that have been successfully adopted for risk quantification\
    \ in other contexts.\"\n\nHighlights: \"Our Review has revealed that while there\
    \ have been numerous efforts to model the individual components of future natural-hazard\
    \ risk, some significant obstacles to quantifying this risk for management and\
    \ mitigation purposes still remain.\" and \"it is clear that there is some work\
    \ to do before future risks from natural hazards can be quantified in a manner\
    \ that is meaningful for the important decisions that need to be made as our world\
    \ keeps changing.\"\n"
  9: "Source material: Outline of a proposed idealised stakeholder-centred end-to-end\
    \ risk modelling framework for future natural hazards. The conventional risk assessment\
    \ approach is advanced to account for: (1) multiple hazards; (2) a \uFB02exible\
    \ suite of risk metrics that can account for both socio-economic and technical\
    \ networks; and (3) stakeholder perspectives and priorities towards different\
    \ dimensions of risk. Feedback loops to the risk calculations (including exposure\
    \ inputs and the vulnerability component) enable stakeholder perspectives, plans,\
    \ and priorities to be accounted for in the \uFB01nal quanti\uFB01cation and selection\
    \ of risk metrics. Multi-Hazard Simulation (Left): Shows various hazard icons,\
    \ including floods, fires, and earthquakes, indicating analyzed threats."
  10: '

    G. Cremen et al. Science of the Total Environment 817 (2022) 152552

