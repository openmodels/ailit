    0.026ms\01year\01)considerablylargerthantheoffshoretrend(\00.011ms\01year\01)....forthenearshoreregion,theRH\
    \ trendispositiveandsignificant(0.057%year\01)...WhiletheSSTdataarefromtheUKMetOffice'sHadleyCenter,atmospheric\
    \ windsandhumidityarefromNCEP\u2010DOEIIreanalysis....period1979\u20132020.TheparametershavebeenaveragedoverthemonthsofJune\u2010\
    OctoberintheNorthernHemisphereand December\u2010AprilintheSouthernHemisphere.Thisindicatesthatourfindingsarenotsensitivetospecificdatasources.\""
  7: "Source material here: We have shown a significant rise in the average intensification\
    \ rate of nearshore TCs on a global scale during 1979\u20132020, and this increase\
    \ is likely driven by an interplay of various environmental changes occurring\
    \ over the same time frame. The parameters have been averaged over the months\
    \ of June\u2013October in the Northern Hemisphere and December\u2013April in the\
    \ Southern Hemisphere. The trend values and the p\u2010values for statistical\
    \ significance, based on the Student's t\u2010test, are shown in the figure legends."
  8: "Source material here.\nThe historical period covers the years 1979\u20132014,\
    \ while the future period spans 2015\u20132050. Probability distributions of TC\
    \ intensification rates based on HighResMIP suggest that in the nearshore region\
    \ TCs will continue to strengthen faster in the future climate. The mean intensification\
    \ rate for the historical period of 1979\u20132014 is -0.07kt 6-hr\u207B\xB9,\
    \ and it increases to 0.03kt 6-hr\u207B\xB9 for the future period of 2015\u2013\
    2050. Further, there are increases in mean intensification rate in all coastal\
    \ areas except near the west coast of Mexico and the Australian coast, and in\
    \ those basins where there is an increase, the change in the nearshore region\
    \ is greater than in the offshore region. The future climate is based on the \u201C\
    SSP585\u201D emissions scenario in which the radiative forcing of greenhouse gases\
    \ is expected to reach 8.5Wm\u207B\xB2 by the end of 21st century. TC track data\
    \ are obtained from five fully coupled climate models belonging to HighResMIP.\
    \ We used a distance threshold of \u223C3\xB0 to identify \u201Cnearshore\u201D\
    \ regions. Further sensitivity analysis with a varying distance threshold shows\
    \ that our results are not overly sensitive to this parameter.\n"
  9: "Source material: \"increasing anthropogenic forcing is likely contributing to\
    \ a relatively more favorable nearshore environment for TC intensification. Trends\
    \ are computed over the 72\u2010year period 1979\u20132050 and under the SSP585\
    \ emissions scenario... near the US, East Asian and South Asian coasts, there\
    \ are substantial decreasing trends in VWS of about -0.01 to -0.02 m/s per year.\
    \ we computed multi\u2010model ensemble mean trends in SST, VWS and RH based on\
    \ the same HighResMIP models... To address this, we examine projected long\u2010\
    term trends in VWS using a larger multi\u2010model ensemble including 15 CMIP6\
    \ models under the SSP585 emissions scenario... we performed a set of idealized\
    \ numerical sensitivity experiments with a nonlinear SWM... our analysis of multiple\
    \ observations and multi\u2010model ensembles indicates that a stronger decrease\
    \ in VWS and a larger increase in RH near the coast relative to offshore regions\
    \ are responsible for the greater increase in nearshore TC intensification.\""
