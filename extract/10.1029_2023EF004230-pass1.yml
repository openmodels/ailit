    \nMore Notes: \"locationsthatarewithin3\xB0ofthecoastlineareconsidered\u201Cnearshore\u201D\
    andtheotherlocationsaretreatedas\u201Coffshore.\u201D...TCtrackdataarebasedonIBTrACS(Knappetal.,2010).\"\
    \n"
  5: "The paper evaluates changes in mean nearshore and offshore tropical cyclone\
    \ (TC) intensification rates for major coastlines of the world over the period\
    \ 1979\u20132020. Shifts are observed toward higher values of intensification\
    \ for the second half of the 42-year period. The study examines the evolution\
    \ of large-scale environmental parameters such as sea surface temperature (SST),\
    \ vertical wind shear (VWS), and relative humidity (RH) that play critical roles\
    \ in TC intensification. Quantitatively, the global mean nearshore TC intensification\
    \ rate increased from 0.37 kt 6-hr\u207B\xB9 during 1979\u20131999 to 1.15 kt\
    \ 6-hr\u207B\xB9 for the period 2000\u20132020, and the rate of SST warming in\
    \ both nearshore and offshore regions is about 0.014\xB0C year\u207B\xB9. Methodologically,\
    \ TC track data from IBTrACS is used for analysis, with sub-sampling to maintain\
    \ statistically similar distributions of storm initial intensity and translation\
    \ speed for two periods. Best track data is compared with geostationary satellite\
    \ image data to confirm robustness. A statistically significant increase in nearshore\
    \ TC intensification rate is observed for the later period (2000\u20132020), with\
    \ stronger intensification near coasts compared to offshore regions. The results\
    \ suggest that the changes in TC intensification rates are consistent with trends\
    \ in SST, VWS, and RH across different regions."
