Drivers of Risk:
  1: Increases in relative humidity, decreases in vertical wind shear, amplified warming
    in the upper troposphere, and changes in heating patterns.
  2: Rapid intensification of TCs shortly before landfall is identified as a significant
    threat to coastal communities due to warming climate conditions.
  3: VWS changes in the nearshore regions of the Northern Hemisphere; Anomalous basic
    state, diabatic heating, and transient forcing
  4: "Changes in global 24-hour tropical cyclone (TC) intensification rates nearshore\
    \ between the periods 1979\u20131999 and 2000\u20132020."
  5: The study examines the evolution of large-scale environmental parameters such
    as sea surface temperature (SST), vertical wind shear (VWS), and relative humidity
    (RH) that play critical roles in TC intensification.
  6: Changes in Sea Surface Temperature (SST), Vertical Wind Shear (VWS), and Relative
    Humidity (RH) are impacting the likelihood of storm development.
  7: Environmental parameter changes such as SST, WAS, and RH are impacting the intensification
    of nearshore tropical cyclones on a global scale.
  8: The changes are driven by projected future climate conditions under the SSP585
    emissions scenario.
  9: Increasing anthropogenic forcing contributing to a more favorable nearshore environment
    for tropical cyclone (TC) intensification.
  10: Changes in diabatic heating and basic atmospheric states are dominant in shaping
    the spatial pattern of vertical wind shear response over the Northern Hemisphere,
    while the contribution of anomalous transient forcing is small.
  11: "Anomalous heating forced by anthropogenic warming impacts vertical wind shear\
    \ (VWS) along the US coast and Mexican west coast. Anomalous heating also affects\
    \ VWS in various regions of Asia, contributing to a decrease near Taiwan and the\
    \ southeastern coast of China but strengthening it over northeast Asia and the\
    \ northern Indian Ocean. Altered zonal mean basic state is acting to decrease\
    \ VWS over Northeast Asia and the North Indian Ocean, while simultaneously causing\
    \ a slight increase in shear near 40\xB0N over North America. Enhanced static\
    \ stability plays a crucial role in reducing the VWS across Northeast Asia and\
    \ the North Indian Ocean."
  12: "Heightened nearshore intensification rate of landfalling TCs, stronger winds\
    \ and heavier precipitation produced by landfalling TCs, decrease in vertical\
    \ wind shear (VWS) near coastal areas, enhanced tropical upper\u2010level warming."
Evaluation overview:
  1: Coastal damages from tropical cyclones (TCs)
  2: The study examines observed and projected changes in nearshore tropical cyclone
    (TC) intensification and their large-scale environmental impacts over historical
    and future periods.
  3: No relevant information
  5: "The paper evaluates changes in mean nearshore and offshore tropical cyclone\
    \ (TC) intensification rates for major coastlines of the world over the period\
    \ 1979\u20132020."
  7: The analysis evaluates trends in sea surface temperature (SST), wind at surface
    (WAS), and relative humidity (RH) as they relate to tropical cyclone (TC) intensification.
  8: The paper evaluates changes in nearshore tropical cyclone (TC) intensification
    rates.
  10: No relevant information
  11: No relevant information
  12: Economic losses, fatalities, and property damages during the late 21st century
    are likely to increase due to TCs striking coastal areas combined with anticipated
    growth of coastal population and wealth.
Highlights:
  1: Nearshore TC intensification rates have increased over the period 1979-2020 and
    are projected to continue to increase with decreasing wind shear playing a crucial
    role.
  2: The study indicates an increase in TC rapid intensification events, particularly
    in nearshore regions, both observed historically and projected into the future.
  3: No relevant information
  4: "Noticeable changes in nearshore TC intensification rates are observed between\
    \ the periods 1979\u20131999 and 2000\u20132020."
  5: "A statistically significant increase in nearshore TC intensification rate is\
    \ observed for the later period (2000\u20132020), with stronger intensification\
    \ near coasts compared to offshore regions."
  6: The large-scale environment has become more favorable for storm development in
    nearshore than offshore regions; findings are consistent across different datasets.
  7: Increases in nearshore TC intensification rates have been significantly linked
    to changes in SST, WAS, and RH.
  8: Projected future climate indicates that nearshore TCs will intensify faster,
    with significant increases in mean intensification rate in all coastal areas except
    the west coast of Mexico and Australia.
  9: Nearshore intensification of TCs is increasing due to greater decrease in VWS
    and larger increase in RH near the coast compared to offshore regions.
  10: The SWM can reproduce the overall spatial pattern of VWS changes, particularly
    over coastal areas characterized by decreasing VWS.
  11: Anthropogenic warming affects vertical wind shear (VWS) differently in various
    regions. Enhanced static stability is a crucial factor in reducing VWS across
    Northeast Asia and the North Indian Ocean.
  12: Nearshore intensification rate of TCs has implications for populations living
    in coastal regions, operational forecasters, and decision makers.
Methodology:
  1: Analysis of observations, atmospheric reanalyses, and high-resolution climate
    model simulations; idealized numerical experiments with an intermediate complexity
    model
  2: "The analysis uses historical TC track data from IBTrACS and ADT\u2010HURSAT\
    \ to estimate intensification rates, and employs climate model simulations from\
    \ HighResMIP and ScenarioMIP to project future changes."
  3: "Uses the Stationary Wave Model (SWM), a dry dynamical core of the NOAA/GFDL\
    \ spectral model, with R30 horizontal resolution and 24 vertical sigma layers,\
    \ to conduct numerical sensitivity experiments. Simulates for 100 days, averaging\
    \ results from days 31 to 100. Performs five independent integrations using the\
    \ SWM, including a control experiment (CTRL) for 2015\u20132034 and a 'Future'\
    \ experiment for 2081\u20132100. Examines individual contributions of anomalous\
    \ basic state, diabatic heating, and transient forcing. Estimates TC intensification\
    \ rate as the linear regression coefficient of storm maximum wind speed over five\
    \ successive 6-hr track locations. Nearshore is defined as within 3\xB0 or 200\
    \ nautical miles of the coastline. Monte Carlo method used to estimate uncertainty\
    \ in probability distributions of TC intensification rates."
  4: A Student's t-test is used to test the statistical significance of differences
    in means of TC intensification rates; data sub-sampled for similar storm states
    across periods; error bars estimated using Monte Carlo method.
  5: TC track data from IBTrACS is used for analysis, with sub-sampling to maintain
    statistically similar distributions of storm initial intensity and translation
    speed for two periods. Best track data is compared with geostationary satellite
    image data to confirm robustness.
  6: "Analysis uses SST data from UK's Hadley Center and atmospheric data from NCEP-DOE\
    \ II reanalysis; results are applicable for the period 1979\u20132020 averaged\
    \ over specific seasonal periods in hemispheres."
  7: Trends were analyzed using historical data averaging across specific months in
    Northern and Southern Hemispheres and employing statistical significance tests.
  8: "Analysis uses TC track data from five fully coupled climate models part of HighResMIP,\
    \ focusing on nearshore regions 3\xB0 from coastlines, with sensitivity analyses\
    \ conducted for varying distance thresholds."
  9: Analysis uses multi-model ensemble mean trends in SST, VWS, and RH based on HighResMIP
    models and additional CMIP6 models under SSP585 emissions scenario; idealized
    numerical sensitivity experiments with a nonlinear SWM to examine projected trends
    in VWS.
  10: "The analysis uses CMIP6 models and a Stationary Wave Model (SWM) to project\
    \ changes in vertical wind shear (VWS) between the near-future (2015\u20132034)\
    \ and late 21st century (2081\u20132100) periods under the SSP585 emissions scenario.\
    \ The contributions of anomalous heating, zonal-mean basic state, and transient\
    \ forcing to changes in VWS are also examined. Statistical significance is assessed\
    \ using the Student's t-test."
  11: The analysis uses climate models to project changes in heating patterns and
    circulation responses. A sensitivity experiment was conducted to investigate the
    impact of increased warming in the upper troposphere on shear changes.
  12: Analysis is based on IBTrACS TC track data, ADT-HURSAT TC track data, Hadley
    SST data, NCEP-DOE II reanalysis, ERA5 reanalysis, HighResMIP TC track data, CMIP6
    data, and SWM simulations.
More Notes:
  1: The study focuses on nearshore tropical cyclone intensification, an area with
    limited prior research at the global scale.
  3: The study uses several CMIP6 and HighResMIP models. Synoptic eddies are not explicitly
    simulated by the SWM, but their aggregated effects are considered as a fixed forcing
    term.
  4: "The analysis uses TC track data from IBTrACS and considers locations within\
    \ 3\xB0 of the coastline as 'nearshore'."
  5: The results suggest that the changes in TC intensification rates are consistent
    with trends in SST, VWS, and RH across different regions.
  10: The SWM overestimates the shear increase in the central-to-eastern tropical
    Pacific and northern Eurasia, which are far from the US and Asian coastal areas
    of interest.
  11: The meridional tripole-like pattern of VWS change over the Asian continent and
    the western North Pacific is mainly driven by the formation of a heat-induced
    stationary baroclinic Rossby wave.
Quantitative material:
  1: "Global mean TC intensification rate increase of about 3 kt per 24-hr in regions\
    \ close to the coast over the historical period 1979\u20132020."
  3: "Distance within approximately 3\xB0 or about 200 nautical miles of the coastline;\
    \ Global mean translation speed of about 4.8 ms-1; d\u22643.0\xB0, 35kt\u2264\
    w\u226475kt, 3ms-1\u2264t\u226410ms-1 (nearshore TC track locations thresholds);\
    \ US East and Gulf coasts(10\xB0N\u201345\xB0N,100\xB0W\u201320\xB0W), Mexican\
    \ west coast (10\xB0N\u201345\xB0N,140\xB0W\u2013100\xB0W), East Asian coast (10\xB0\
    N\u201345\xB0N,100\xB0E-180\xB0E), South Asian coast (10\xB0N\u201330\xB0N,50\xB0\
    E-100\xB0E), Southeast African coast (30\xB0"
  4: "Probability distributions and differences in TC intensification rates between\
    \ the initial period (1979\u20131999) and the later period (2000\u20132020)."
  5: "The global mean nearshore TC intensification rate increased from 0.37 kt 6-hr\u207B\
    \xB9 during 1979\u20131999 to 1.15 kt 6-hr\u207B\xB9 for the period 2000\u2013\
    2020. The rate of SST warming in both nearshore and offshore regions is about\
    \ 0.014\xB0C year\u207B\xB9."
  6: Negative trend in VWS nearshore is -0.026 ms^-1 year^-1, while offshore is -0.011
    ms^-1 year^-1; positive RH trend nearshore is 0.057% year^-1.
  7: "The analysis provides quantitative trends for coastal SST increase (0.014 \xB0\
    C/year), offshore SST increase (0.004 \xB0C/year), coastal WAS decrease (-0.026\
    \ m/s/year), offshore WAS decrease (-0.005 m/s/year), coastal RH increase (0.057%/year),\
    \ and offshore RH increase (0.011%/year)."
  8: "Mean intensification rate for the historical period (1979\u20132014) is -0.07\
    \ kt 6-hr\u207B\xB9, increasing to 0.03 kt 6-hr\u207B\xB9 for the future period\
    \ (2015\u20132050). Changes are insignificant near the west coast of Mexico and\
    \ Australian coast."
  9: "Trends in SST, VWS, and RH computed over 1979\u20132050 under SSP585 scenario,\
    \ with substantial decreasing trends in VWS of about -0.01 to -0.02 m/s per year\
    \ near the US, East Asian, and South Asian coasts."
  10: "The pattern correlation coefficient of VWS changes between the CMIP6 ensemble\
    \ mean and the SWM's solution is 0.63 over the northern tropical-extratropical\
    \ (0\xB0\u201360\xB0N) oceans."
  11: No relevant information
  12: Mean nearshore TC intensification rate may have increased for Philippines and
    Madagascar.
