    \ More Notes: However,fewstudiesexplorednearshorestormintensificationanditsresponsetoclimatechangeattheglobalscale.\n"
  2: "Source material: \"In this study, we examine observed changes in nearshore TC\
    \ intensification and the large\u2010scale environment over the historical period,\
    \ project changes into the future using climate model simulations and delve into\
    \ the responsible mechanisms using idealized numerical modelexperiments. TCs that\
    \ undergo rapid intensification shortly before landfall pose a major threat to\
    \ coastal communities, and theory suggests such events are expected to become\
    \ more frequent and severe as the climate continues to warm. TC track data obtained\
    \ from the InternationalBestTrackArchiveforClimateStewardship (IBTrACS) are used\
    \ to estimate 24\u2010hr TC intensification rates... TC track data are obtained\
    \ for five fully coupled climate models belonging to the HighResolutionModel IntercomparisonProject\
    \ (HighResMIP) and used to compute projected changes in TC intensification rates...monthly\
    \ meandata from15 climatemodels,whicharepartoftheScenarioModelIntercomparisonProject\
    \ (ScenarioMIP)...are utilized to project future trends in VWS. In a recent study,\
    \ Y. Lietal.(2023) conducted a global analysis, revealing a notablerise in the\
    \ frequency of rapid intensification events within coastal regions.\""
  3: "Source material here.\nTo better understand projected VWS changes in the nearshore\
    \ regions of the Northern Hemisphere, we apply a time-dependent, primitive equation\
    \ anomaly model to conduct numerical sensitivity experiments. The Stationary Wave\
    \ Model (SWM) used in this study is the dry dynamical core of the NOAA/GFDL spectral\
    \ model, with R30 horizontal resolution and 24 vertical sigma layers.\n\nOur control\
    \ experiment (CTRL) solves deviations in surface pressure, three-dimensional temperature,\
    \ and winds from the zonally symmetric climate during the near-future period of\
    \ 2015\u20132034. The experiment that simulates the steady, zonally asymmetric\
    \ circulation response to the imposed forcings superimposed on a zonal-mean basic\
    \ state during the late 21st century (2081\u20132100) is referred to as \u201C\
    Future.\u201D Additionally, we investigate the individual contributions of the\
    \ anomalous basic state, diabatic heating, and transient forcing to the projected\
    \ response in VWS through a series of sensitivity runs, labeled as: CTRL+\u0394\
    BS, CTRL+\u0394DH, and CTRL+\u0394TranF, respectively.\n\nFor computing trends\
    \ in environmental parameters, the domains used for the various coastlines are\
    \ as follows: US East and Gulf coasts (10\xB0N\u201345\xB0N,100\xB0W\u201320\xB0\
    W), Mexican west coast (10\xB0N\u201345\xB0N,140\xB0W\u2013100\xB0W)...\n\nWe\
    \ define \u201Cnearshore\u201D as a distance within approximately 3\xB0 or about\
    \ 200 nautical miles of the coastline (Balaguru et al., 2022). Besides being a\
    \ definition adopted by the United Nations for economic reasons, this is the approximate\
    \ distance traveled by a TC in a day, based on the global mean translation speed\
    \ of about 4.8 ms-1 (Yamaguchi et al., 2020). In addition to using a \u201Cdistance\
    \ from the coast threshold,\u201D we also use thresholds for wind and translation\
    \ speeds to sub-sample data. This is to ensure that distributions of storm state\
    \ for the two comparative periods are statistically similar.\n\nFor all probability\
    \ distributions of TC intensification rates, uncertainty or error bars are estimated\
    \ based on the \u201CMonte Carlo\u201D method of repeated random sampling. From\
    \ a given distribution, we randomly select approximately half of the samples to\
    \ generate a Probability Distribution Function (PDF), a process that is repeated\
    \ a thousand times.\n"
