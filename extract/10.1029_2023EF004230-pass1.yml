  12: "`\nThe results from our study have profound implications for populations living\
    \ in coastal regions, operational forecasters, and decisionmakers. Under global\
    \ warming, a heightened nearshore intensification rate implies a potential strengthening\
    \ of landfalling TCs' destructive capacity, primarily determined by their maximum\
    \ intensity and inner\u2010coreprecipitation(Hsuetal.,2021). ChangesinthesefactorsarecloselyassociatedwiththeintensificationrateofTCs\
    \ withincoastalregions(Chihetal.,2023; Hsuetal.,2021; R. C. Lietal.,2017; Park\
    \ etal.,2014). ThestrongerwindsandheavierprecipitationproducedbylandfallingTCs\
    \ canexacerbatetheim- pactsofstormsurgeandincreasetheriskofcoastalflooding(Timmermansetal.,2017,\
    \ 2018; Woodruff etal.,2013). Combinedwithanticipatedgrowthofcoastalpopulationandwealth,TCs\
    \ strikingcoastalareasare likelytoresultinmoresubstantialeconomiclosses,fatalities,andpropertydamagesduringthelate21stcentury\
    \ (Huetal.,2023; Huangetal.,2022). Inourstudy,weonlyconsideredthecoastlinesofmajorcontinental\
    \ landmassesaffectedbyTCs as\u201Cnearshore.\u201DHowever,severalislandregionsacrosstheworldremainvulnerable\
    \ tothedisastrouseffectsoflandfallingTCs.Forinstance,anexaminationofobservedTC\
    \ datatorPhilippinesand MadagascarindicatesthatthemeannearshoreTC intensificationratemayalsohaveincreasedforthoseregions\
    \ (FigureS12 inSupportingInformationS1). FuturestudiesfocusingonchangingnearshoreTC\
    \ intensificationfor suchregions,includingtheresponsiblemechanisms,areneeded.\
    \ Inexaminingthelarge\u2010scalecirculationchangescontributingtoenhancedTC intensification,weobservea\
    \ significantroleplayedbythedecreaseinVWS nearcoastalareas,bothoverthehistoricalperiodaswellasin\
    \ futureprojections(Figure3 andFigureS7 inSupportingInformationS1). ThisispartlybecausetheUS\
    \ coastlines aresituatedinthesubtropics(about20\xB0N\u201345\xB0N)wherechangesindiabaticheatingacttoreduceVWS.\
    \ Also,the nearshoreregionsovertheNorthwestPacificandtheNorthIndianOceanarelocatedontheeasternandsouthern\
    \ flanksoftheAsianmonsoonanticyclone,respectively.Here,theweakeningoftheanticycloniccirculationnear\
    \ theTibetanPlateau(FigureS11inSupportingInformationS1) caneffectivelyreduceVWS\
    \ (Ma& Yu,2014; C. Wang& Wang,2021; Zangetal.,2023). Paststudiessuggestedthatapolewardshiftoftheextratropical\
    \ westerliescoulddecreaseVWS andpotentiallyincreaseTC risknearthepopulatedmidlatituderegionsinAsia\
    \ andNorthAmerica(Kossinetal.,2014; Leeetal.,2019). Nevertheless,ourSWM experimentsrevealthatthe\
    \ primaryfactorresponsibleforreducingshearoverNortheastAsiaistheenhancedtropicalupper\u2010\
    levelwarming (Figure5dandFigureS9binSupportingInformationS1). Additionally,inter\u2010\
    basinchangesindiabaticheating areshowntoplayacriticalroleincontributingtotheweakenedVWS\
    \ alongtheUS coastlines(Figure5cand FigureS9ainSupportingInformationS1). Satellitemeasurementshaverevealedthattheupperatmospherehasbeenwarmingatafasterratethanthe\
