  16: " \nThe page discusses crop yield anomalies and responses to climatic conditions,\
    \ focusing on crop functional richness and species diversity: \"Crop functional\
    \ richness, not species diversity, was the main driver of yield benefits\" and\
    \ \"Increasing crop functional richness enhanced yield anomalies, and hence yields,\
    \ with no sign of decline, for all crops under high temperature and irrespective\
    \ of precipitation.\"\n\nWarming reduces yields across crops, with varying dependencies\
    \ on precipitation levels for different crops and climatic conditions: \"Warming\
    \ reduced yields in all crops irrespective of CRD and precipitation.\"\n\nThe\
    \ analysis uses statistical models to evaluate yield responses to historical climatic\
    \ conditions, although with low explained variation due to experimental design\
    \ and geographical variability: \"The statistical models had a low degree of explained\
    \ variation... This prevents us from predicting future year-to-year yields, but\
    \ the significant effects on yield anomalies of CRD and climatic conditions over\
    \ the whole duration of the experiments allow for robust conclusions on CRD-yield\
    \ responses to historical climatic conditions.\"\n\nIncreasing crop functional\
    \ richness enhances yield anomalies and compensates for yield reductions from\
    \ detrimental climatic conditions in monocultures and low diversity rotations:\
    \ \"Functional richness steadily compensated yield reductions from detrimental\
    \ climatic conditions occurring in monocultures and low diversity rotations.\"\
    \n\nThere is an emphasis on the complexity of interactions between crop diversity,\
    \ climatic conditions, and yields, with functional richness being more beneficial\
    \ than species diversity in some contexts: \"The decline in small grain yields\
    \ at high species diversity, but not at high functional richness, is likely the\
    \ result of the choice of sown crops... increasing CRD through functional richness\
    \ might be more effective than species diversity in providing functional traits\
    \ that promote yield.\"\n"
