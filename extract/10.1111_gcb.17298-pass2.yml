Drivers of Risk:
  3: Adverse climatic conditions impacting grain yields include anomalous warm conditions,
    long and warm dry spells, and anomalous wet or dry conditions.
  5: Anomalies in average temperature and precipitation, and via the occurrence of
    dry spells
  6: Changes in average maximum daily temperature, cumulated precipitation, number
    of consecutive dry days, and temperature during dry days impact yield anomalies.
  7: Yield anomalies are influenced by species diversity, season temperature anomalies
    (T), cumulative precipitation anomalies (P), consecutive dry spells (CDD), and
    temperature during dry spells (TDD).
  12: Growing season average daily maximum temperature anomalies (T), cumulated precipitation
    anomalies (P), the highest number of consecutive dry days (CDD), and average temperatures
    during that period (TDD).
  13: Intra-seasonal climatic conditions (anomalies in Cooling Degree Days (CDD) and
    Thermal Degree Days (TDD)), warming temperatures, changes in precipitation, and
    the length and temperature of dry spells.
  15: Anomalies of consecutive dry days (CDD) and average temperatures during that
    period (TDD) are considered drivers of risk.
  16: Warming reduces yields in all crops irrespective of CRD and precipitation. Increasing
    precipitation reduces yields in spring cereals, but increases them in maize, and
    has no effect in winter small grains, irrespective of CRD.
  20: Rainfall, Drought, Temperature, Heat
  21: Climate change, climate extremes (droughts), irrigation, and greenhouse gas
    footprints are considered drivers of risk.
Evaluation overview:
  3: The paper evaluates how crop rotational diversity (CRD) can mitigate grain yield
    losses due to climate conditions.
  5: Yield losses due to detrimental climatic conditions, and grain yield benefits
    from increasing crop rotation diversity (CRD)
  6: The evaluation focuses on yield anomalies of winter and spring small grains and
    maize in relation to climatic indices.
  7: The page evaluates yield anomalies of different crops in response to species
    diversity and climatic conditions.
  12: Model-predicted yield difference from baseline yield anomaly for spring small
    grains, winter small grains, and maize.
  13: The study evaluates the impact of climate conditions on crop yields (maize,
    spring small grains, winter small grains) under varying levels of species diversity
    in agricultural systems.
  15: Model-predicted yield difference from baseline yield anomaly is evaluated for
    spring small grains, winter small grains, and maize.
  16: The paper evaluates crop yields and yield anomalies in response to climatic
    conditions and crop rotation diversity (CRD).
  20: Yield, Crop Production, Crop Performance
  21: Impacts on crop yields, land productivity, and soil health are evaluated.
Highlights:
  3: Species-diverse and functionally rich rotations more than compensate yield losses
    from adverse climatic conditions; adding a single functional group or crop species
    counteracted yield losses from substantial climatic changes.
  5: Yield data of the individual crops refer to grain dry matter. To reduce yield
    variability due to crop species and geographic location, we considered yield anomalies
    as mean-centred yield data
  7: Yield benefits from species diversity are reduced by adverse climatic conditions,
    and specific climate factors like temperature and dry spells significantly impact
    crop yields.
  12: Species diversity can provide yield benefits, but the magnitude of the benefit
    depends on growing season conditions. High-yielding conditions result in higher
    benefits from species diversity, while low-yielding conditions reduce these benefits.
    The benefit depends on temperature, precipitation and drought conditions, specific
    to the crop, time, and location.
  13: Species diversity can compensate for yield losses in monocultures caused by
    warming, precipitation anomalies, and changes in the length of dry spells. The
    yield-maximizing species diversity changes with climatic conditions. Warming had
    a stronger negative effect on small grain yields for species diversity from 2
    to 5 for spring grains and from 2 to 6 for winter grains.
  15: Increasing crop rotation diversity (CRD) can provide grain yield benefits comparable
    with improved climatic conditions. Yields increased over time at the CRD that
    maximized yields.
  16: Increasing crop functional richness enhanced yield anomalies. The yield-maximizing
    species diversity for small grains depended on climatic conditions and indicator
    crop.
  21: Crop rotational diversity can enhance cereal yields and mitigate climate-induced
    grain yield losses; Systems with greater perenniality and crop diversity enhance
    soil biological health; Crop diversification reinforces soil microbiome functions
    and soil health; Improved temperature response functions reduce uncertainty of
    crop yield projections.
Methodology:
  5: "Analysis of long-term experiments (LTEs) (10\u201363 years) with different crop\
    \ rotations, considering yield anomalies (mean-centered yield data). Two indices\
    \ to measure CRD: species diversity (D) and functional richness (FR)."
  6: Yield anomalies are analyzed using mixed-effect models with continuous species
    diversity and categorical functional richness as key factors, including interactions
    with climatic indices.
  7: The analysis uses mixed-effects statistical models fitted in R, assessing yield
    responses to changes in climatic and species diversity variables. Outliers were
    identified and handled, model multicollinearity was checked, and model robustness
    was tested through site removal.
  12: The analysis is based on fitted Equation (2). Baseline yield anomaly is set
    to deviations from the site- and crop-specific local mean of the monoculture under
    long-term average of T and P (or CDD and TDD) at t=15 years. The model predicts
    yield differences from baseline yield anomaly as a function of species diversity,
    growing season temperature and precipitation anomalies, number of consecutive
    dry days (CDD) and average temperatures during that period.
  13: The study uses a model to predict crop yields under different climate scenarios
    and levels of species diversity. The results are presented for Year 15, comparing
    yields to those of a monoculture under long-term average temperature and precipitation.
  15: The analysis is based on fitted Equation (3) and considers different quartiles
    of CDD and TDD. Baseline of yield anomaly is set to the anomaly of a rotation
    with functional richness 1 under long-term average of CDD and TDD at t=15 years.
  16: The analysis uses statistical models applied to long-term experiments (LTEs),
    considering experimental design, geographical location, and variable treatment
    outcomes. The analysis looked at rotations with species diversity 4-6.
  21: Studies use a variety of methods, including reviews, experimental designs, and
    modeling to assess the impacts of climate and management practices on agricultural
    outcomes; Results are applicable on various time scales and locations.
More Notes:
  5: The study restricts analyses to experiments in place for at least 10 years and
    selects experiments where all crop rotations received similar treatments or adaptive
    management was applied.
  15: The benefits of CRD for crop performance are likely mediated by changes to soil
    properties and ecosystem functioning. The benefits of CRD to grain yields under
    warming likely resulted from a combination of mechanisms, including enhancing
    soil structure, increasing water availability, and mitigating heat stress.
  16: The effect of CRD on small grain yield could also depend on the crop sequence,
    but this was not investigated. The decline in small grain yields at high species
    diversity, but not at high functional richness, is likely the result of the choice
    of sown crops.
Quantitative material:
  3: Adding three crop species to monocultures under detrimental climatic conditions
    can exceed the average yield of monocultures by up to 553 kg/ha under non-detrimental
    conditions.
  5: Dataset comprised 21 LTEs in Europe and 11 in North America, for a total of 941
    site-year combinations, 117 rotations and 27,402 observations
  12: Maximum yield benefits attainable via species diversity under high-yielding
    seasonal conditions for small grains were 508 kg/ha (95% CI [274, 742]) and 973
    kg/ha (95% CI [701, 1244]) for spring and winter small grains, respectively. Under
    low-yielding conditions, these benefits were reduced to 393 kg/ha (95% CI [148,
    637]) and 722 kg/ha (95% CI [431, 1013]) for spring and winter small grains, respectively.
    For maize, maximum yield benefits attainable via species diversity were 1601 kg/ha
    (95% CI [1268, 1935]) under high-yielding conditions. Low-yielding conditions
    reduced the maximum yield benefits attainable via species diversity to 1368 kg/ha
    (95% CI [1026, 1710]).
  15: Figure 4 shows yield difference (t/ha) vs. functional richness for different
    CDD and TDD quartiles, with 95% confidence intervals. CDD values of -6.11, 0,
    and 3.73 days are used for spring small grains; -6.24, 0, and 3.99 days for winter
    small grains; and -4.53, 0, and 3.71 days for maize.
  16: The statistical models had a low degree of explained variation (marginal R^2).
