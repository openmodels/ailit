Drivers of Risk:
  3: Adverse climatic conditions such as anomalous warm conditions, long and warm
    dry spells, and anomalous wet or dry conditions are impacting grain yields.
  4: Changes in climate conditions, such as high temperatures, low precipitation,
    and excessive precipitation, are impacting crop productivity.
  5: Explores how changes in temperature and precipitation anomalies, including the
    occurrence of dry spells, impact crop yields.
  6: The analysis considers climatic indices, including seasonal temperature and precipitation
    anomalies, and intra-seasonal indices like the longest dry spell and its temperature.
  7: The shocks or changes impacting yields are temperature anomalies (T), precipitation
    anomalies (P), consecutive dry spells (CDD), and temperature during dry spells
    (TDD).
  12: The outcomes are impacted by growing season temperature anomalies, cumulative
    precipitation anomalies, consecutive dry days, and average temperatures during
    dry periods.
  13: Changes in temperature degree days (TDD) and consecutive dry days (CDD) are
    identified as major drivers impacting yield outcomes.
  15: Changes in climatic conditions, such as consecutive dry days (CDD) and temperature
    deviations, impact crop yields.
  16: Warming reduces yields across crops, with varying dependencies on precipitation
    levels for different crops and climatic conditions.
  18: The study acknowledges using the E-OBS dataset, Copernicus Climate Change Service,
    and Livneh daily CONUS near-surface gridded meteorological and derived hydrometeorological
    data, suggesting an analysis of climate impacts.
  20: Identified drivers include temperature (high temperature, heat stress), drought,
    rainfall (excessive rainfall), and evaporative demand.
  21: Climate extremes impacting crop yields, with some focus on drought conditions
    affecting biodiversity effects on productivity.
Evaluation overview:
  3: Diversified crop rotations can reduce grain yield losses from adverse climatic
    conditions under climate change.
  4: The paper provides an overview of how climate change affects crop yields, focusing
    on crop rotation diversification as a mitigation strategy.
  5: Focuses on crop yield outcomes under varying climatic and crop rotation conditions.
  6: Yield anomalies, particularly for winter and spring small grains and maize, are
    being evaluated.
  7: This study evaluates yield anomalies (and hence yields) of maize and small grains.
  12: The paper evaluates model-predicted yield differences for spring small grains,
    winter small grains, and maize under different climate conditions and species
    diversity.
  13: The paper evaluates the impact of species diversity on crop yield benefits and
    the ability to compensate for warming-induced yield losses in monocultures.
  15: The paper evaluates the impact of crop rotational diversity (CRD) on grain yields
    of small grain cereals and maize under various climatic conditions.
  16: The page discusses crop yield anomalies and responses to climatic conditions,
    focusing on crop functional richness and species diversity.
  18: The study evaluates crop yield data.
  20: This page primarily focuses on crop yields, particularly maize, soybean, and
    wheat, evaluating their productivity.
  21: Crop yields and soil health impacts are evaluated, particularly in relation
    to climate extremes and agricultural practices.
Highlights:
  3: Species-diverse and functionally rich rotations can more than compensate for
    yield losses due to adverse climatic conditions.
  4: Increased crop rotation diversity can enhance yields and provide resilience against
    detrimental climatic conditions.
  5: Findings suggest benefits of crop rotation diversity (CRD) in mitigating yield
    losses and enhancing yields under detrimental climatic conditions.
  6: The analysis suggests combining seasonal and intra-seasonal climatic indices
    to explain yield variations.
  7: With fixed climatic conditions, yield anomalies of small grains generally increased
    from low to intermediate species diversity and declined at higher levels of diversity.
    For maize, yields increased up to the maximum species diversity in the dataset.
    With fixed CRD, yields increased with decreasing growing season temperature anomalies.
    Decreasing cumulated precipitation anomalies reduced yields of maize, had little
    effect on winter small grains, and was beneficial for spring small grains. Increasing
    anomalies of consecutive dry spells and temperature during dry spells reduced
    yields for maize and winter small grain cereals and had little effect on spring
    small grain cereals. The strength and shape of the relationship between CRD and
    grain yield anomalies depended on climatic conditions and their interaction, and
    on the indicator crop.
  12: The key outcome is the potential yield benefits attainable through species diversity,
    under various climatic conditions, measured in kg/ha.
  13: Species diversity increases can buffer yield losses caused by warming and other
    climate anomalies, with different crops responding in diverse ways to TDD and
    CDD changes.
  15: Increasing CRD provides grain yield benefits comparable with improved climatic
    conditions, enhancing yields under all growing conditions.
  16: Increasing crop functional richness enhances yield anomalies and compensates
    for yield reductions from detrimental climatic conditions in monocultures and
    low diversity rotations.
  20: 'Key findings include: the impact of rainfall on maize yield loss, the sensitivity
    of maize yield to drought, the role of crop diversity in pest control and soil
    health, and the effects of temperature and drought on crop yields.'
  21: Increasing crop rotational diversity is posited to enhance cereal yields and
    mitigate climate-induced grain yield losses; biodiversity effects on crops are
    more pronounced during drought years.
Methodology:
  4: The analysis considers yields under different climatic conditions and crop rotation
    diversity, and discusses adaptations of cropping systems to climate change.
  5: Uses long-term experiments (LTEs) in Europe and North America, measuring crop
    yield anomalies against long-term averages and assessing crop rotation diversity
    with specific indices.
  6: Statistical mixed-effect models are used, with climatic indices and crop rotational
    diversity as fixed factors, and spatial, temporal, and design factors as random
    variables.
  7: "Mixed-effects statistical models were fitted using the \u201Clme4\u201D package\
    \ in R. Model assumptions were checked using the \u201CDHARMa\u201D package. Multi-collinearity\
    \ was tested using the \u201Ccar\u201D package. Predicted yields were calculated\
    \ using the \u201Cggeffects\u201D package, setting time at t = 15 years. Model\
    \ trends and marginal means were calculated using the \u201Cemmeans\u201D package,\
    \ setting time at t = 15 years."
  12: The analysis uses model predictions based on fitted equations considering species
    diversity and climatic anomalies; results are specific to yields at an arbitrary
    15-year mark.
  13: Analysis uses a model to simulate crop yields under varying conditions of TDD,
    CDD, and species diversity, focusing on differences from monoculture baselines.
  15: The analysis is based on model-predicted yield differences using a fitted equation,
    examining the effects of CRD and climatic variables over a set period.
  16: The analysis uses statistical models to evaluate yield responses to historical
    climatic conditions, although with low explained variation due to experimental
    design and geographical variability.
  18: The study uses long-term experiments (LTEs) from various locations (Sweden,
    Scotland, Spain, Poland, Rothamsted) and data from e-RA database. Modeling and
    statistical analysis are used (MuMIn package in R).
  20: Studies employ long-term multi-location trials, analysis of microbial feedbacks,
    analysis of crop rotations, and statistical computing with R.
  21: The page references studies that analyze crop yield projections and the effects
    of climate extremes using improved temperature response functions.
More Notes:
  13: The page discusses the interplay between species diversity and monoculture under
    climate anomalies, stressing species diversity as a way to mitigate negative impacts.
  16: There is an emphasis on the complexity of interactions between crop diversity,
    climatic conditions, and yields, with functional richness being more beneficial
    than species diversity in some contexts.
  21: The page includes a variety of studies relevant to agriculture and climate,
    focusing on crop rotation, climate impact on yields, and soil health.
Quantitative material:
  3: Under detrimental climatic conditions, adding three crop species to monocultures
    resulted in maize yield benefits exceeding the average yield of monocultures by
    up to 553 kg/ha.
  7: "The study assesses yield responses to a 1.5\xB0C increase in temperature anomaly.\
    \ It uses the first and third quartiles to define high and low variability of\
    \ P and CDD, using a threshold of 10cm for P and 10 days for CDD. It also uses\
    \ the rounded averages of the first quartiles above/below zero as reference deviations.\
    \ We detected 3.2% outlier observations when running the first model on maize\
    \ and 0.13% outliers when running it on spring small grains, and no outliers when\
    \ running any of the models on winter small grains."
  12: Quantitative yield differences are presented, such as maximum yield benefits
    of 508 kg/ha for spring grains and 973 kg/ha for winter grains under specific
    climatic conditions.
  13: "Quantitative results include specific yield reductions or benefits such as\
    \ maize yield reduction of 486 kg/ha at a 1.5\xB0C increase in temperature, and\
    \ gain of 1000 kg/ha at maximum species diversity."
  15: Model predictions indicate yield anomalies from baseline due to variations in
    functional richness and climatic factors, but no specific percent changes are
    provided.
  18: The yield data used are available at https://doi.org/10.5878/8af1-0q60
  20: Mentions percentage changes in crop yield variability explained by climate variation.
  21: No specific quantitative material is provided on this page; references to studies
    with quantitative outcomes are included.
sourcematerial:
  3: "Source material here. Abstract: Diversified crop rotations have been suggested\
    \ to reduce grain yield losses from the adverse climatic conditions increasingly\
    \ common under climate change. Nevertheless, the potential for climate change\
    \ adaptation of different crop rotational diversity (CRD) remains undetermined.\
    \ We quantified how climatic conditions affect small grain and maize yields under\
    \ different CRDs in 32 long-term (10\u201363 years) field experiments across Europe\
    \ and North America. Species-diverse and functionally rich rotations more than\
    \ compensated yield losses from anomalous warm conditions, long and warm dry spells,\
    \ as well as from anomalous wet (for small grains) or dry (for maize) conditions.\
    \ Adding a single functional group or crop species to monocultures counteracted\
    \ yield losses from substantial changes in climatic conditions. The benefits of\
    \ a further increase in CRD are comparable with those of improved climatic conditions.\
    \ For instance, the maize yield benefits of adding three crop species to monocultures\
    \ under detrimental climatic conditions exceeded the average yield of monocultures\
    \ by up to 553 kg/ha under non-detrimental climatic conditions. Increased crop\
    \ functional richness improved yields under high temperature, irrespective of\
    \ precipitation."
  4: 'yaml

    Evaluation overview: "Climate change negatively affects crop production...Diversifying
    rotations with functionally distinct crops is an adaptation of cropping systems
    to global warming and changes in precipitation."

    Drivers of Risk: "Growing season temperature is increasing and, in some regions,
    precipitation is becoming more intense and interspersed with more frequent and
    longer dry spells...Both high temperature and low precipitation can independently
    or simultaneously lower crop productivity...High precipitation can reduce crop
    yields through waterlogging and lodging."

    Methodology: "To evaluate the effects of increasing CRD on crop yields in relation
    to climatic conditions and over time, we collected meteorological and grain yield
    data of spring and winter small grains, and maize"

    Highlights: "Indeed, higher crop rotation diversity (CRD) reduced maize yield
    losses in unfavourable years in several North American long-term experiments...
    the benefits of a diverse rotation to small grain cereal yields were especially
    high during dry years in seven long-term experiments across Europe"

