  5: " \nEvaluation overview: \" define detrimental climatic conditions as seasonal\
    \ or shorter-term conditions that reduce monoculture yields below local averages.\"\
    \n\nDrivers of Risk: \" We characterized growing season conditions both via anomalies\
    \ in average temperature and precipitation, and via the occurrence of dry spells.\"\
    \n\nMethodology: \" Our dataset comprised 21 LTEs in Europe and 11 in North America,\
    \ ... considered yield anomalies as mean-centered yield data obtained by subtracting\
    \ the indicator crop-specific long-term mean yield from individual yield observations\
    \ at each LTE.\"\n\nHighlights: \"Our findings could support designing climate-resilient\
    \ cropping systems.\"\n"
  6: "yaml\nEvaluation overview: \"We explored how yield anomalies of winter and spring\
    \ small grains and maize var y with CRD, and pairs of climatic indices via two\
    \ sets of mixed-effect models.\"\nDrivers of Risk: \"To summarize the growing\
    \ conditions, we considered two sets of climatic indices: (i) growing season climatic\
    \ indices, represented by average maximum daily temperature and cumulated precipitation\
    \ during each growing season, and (ii) intra-seasonal climatic indices, quantifying\
    \ potentially short but detrimental conditions expected to become more common.\
    \ As intra-seasonal climatic indices, we chose length of the longest dry spell...and\
    \ their average maximum temperature.\"\nMethodology: \"We explored how yield anomalies\
    \ of winter and spring small grains and maize var y with CRD, and pairs of climatic\
    \ indices via two sets of mixed-effect models. In the first set of models, CRD\
    \ was represented by the continuous species diversity D, in the second set of\
    \ models as categorical functional richness FR. Beyond CRD, additional fixed factors\
    \ were as follows: years since the beginning of the experiment (t: continuous),\
    \ climatic index 1 (X1: T or TDD) and climatic index 2 ( X 2: P or CDD ). For\
    \ all models, as random factors, we used calendar year of sampling (year: categorical)\
    \ and the variable \u201CGroup\u201D nested within LTE to account for variation\
    \ relative to spatial, temporal and design dependence.\"\nHighlights: \"We included\
    \ intra-seasonal climatic indices because averaging climatic conditions over entire\
    \ growing seasons potentially exclude short-term damaging events (Troy et al.,\
    \ 2015).\"\n"
  7: "Source material here.\nEvaluation overview: \"With fixed climatic conditions,\
    \ yield anomalies (and hence yields) of small grains generally increased from\
