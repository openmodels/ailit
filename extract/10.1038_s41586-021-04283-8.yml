Drivers of Risk:
  1: Increases in the number of wet days and in extreme daily rainfall, in addition
    to responding nonlinearly to the total annual and to the standardized monthly
    deviations of rainfall.
  2: Changes in total annual rainfall, monthly rainfall deviations, the number of
    wet days, and extreme daily rainfall are identified as drivers impacting economic
    growth rates.
  3: Shocks impacting outcomes include changes in annual total rainfall, monthly rainfall
    deviations, number of wet days, and extreme daily rainfall.
  4: The paper identifies extreme daily rainfall and the number of wet days as key
    drivers impacting economic outcomes.
  5: Changes in extreme daily rainfall and the number of wet days impacting economic
    growth.
  6: Annual total rainfall, monthly rainfall deviations, number of wet days, and measure
    of extreme daily rainfall.
  7: Extreme daily rainfall impacts annual mean temperature and subnational growth
    rates.
  8: Annual total rainfall; monthly rainfall deviations; number of wet days; extreme
    daily rainfall
  9: Changes in annual total rainfall, monthly rainfall deviations, number of wet
    days, and extreme daily rainfall events are potential drivers of risk.
  10: Changes in total annual rainfall, monthly rainfall deviations, number of wet
    days, and extreme daily rainfall are impacting economic growth outcomes.
  11: Changes in rainfall, including total annual rainfall, monthly rainfall deviations,
    number of wet days, and extreme daily rainfall.
  12: Daily temperature variability (T_var), Annual mean temperature (T_mean), changes
    in temperature and rainfall, Annual rainfall, Monthly rainfall deviations, Number
    of wet days, Extreme daily rainfall
Evaluation overview:
  1: Economic growth rates
  2: The analysis focuses on assessing the marginal effects of different rainfall
    measures on economic production and growth rates.
  3: The outcome being evaluated is the effect of rainfall shocks on economic growth
    rates.
  4: The page assesses the effect of rainfall variability on economic growth rates,
    focusing on the number of wet days, extreme daily rainfall, and negative monthly
    rainfall deviations.
  5: The analysis evaluates the economic effects of rainfall changes on sectoral economic
    output and national income categories.
  6: Subnational per-capita growth rates are being evaluated.
  8: No relevant information
  9: No relevant information
  10: The graphs provide an overview of the impact of different climate factors on
    economic growth for rich and poor countries.
  11: Sectoral growth in agriculture, manufacturing, and services.
  12: Economic growth rates
Highlights:
  1: High-income nations and the services and manufacturing sectors are most strongly
    hindered by both measures of daily rainfall. Anthropogenic intensification of
    daily rainfall extremes will have negative global economic consequences.
  2: 'Four distinct effects on economic production are identified: quadratic effects
    of total annual rainfall and monthly deviations, economic impact from increases
    in the number of wet days, and reductions in growth rates due to extreme daily
    rainfall.'
  3: The analysis finds that while greater rainfall could be beneficial, this is not
    the case if it leads to an increased number of wet days or extreme daily rainfall.
  4: The effect of rainfall is strongest in winter and autumn, showing persistence
    in economic impacts during these seasons, but not rebound effects.
  5: Extreme daily rainfall and increased wet days are adverse for economic growth,
    especially in high-income countries and the manufacturing and services sectors.
  6: "Identifies statistically significant effects from two measures: the number of\
    \ wet days RD(1 mm)x,y and the measure of extreme daily rainfall RD\u02C6(99.9%)x,y.\
    \ Notes a quadratic effect of the number of wet days."
  8: The maps show spatial distributions of the historical means of the four rainfall
    measures (annual total, monthly deviations, number of wet days, extreme daily
    rainfall) for the period 1979-2019, showing, for example, high total rainfall
    and extreme daily rainfall in the Amazon Basin, parts of Central Africa, and Southeast
    Asia.
  9: Illustrates the spatial distribution of historical variability in annual total
    rainfall, monthly rainfall deviations, number of wet days, and extreme daily rainfall
    events, highlighting regions with the highest variability in each measure.
  10: The differentiation in economic response to rainfall between rich and poor countries
    is a key finding, as illustrated by distinct lines on the graphs.
  11: The impact of different aspects of rainfall (total amount, monthly deviations,
    wet days, extreme rainfall) on the growth rates of agriculture, manufacturing,
    and service sectors are quantified and visualized.
  12: The table displays coefficient estimates and standard errors for various temperature
    and rainfall variables impacting economic growth rates, with significance levels
    indicated.
Methodology:
  1: "Uses a global panel of subnational economic output for 1,554 regions worldwide\
    \ over the past 40 years; assesses higher-order moments of the annual distribution\
    \ of daily rainfall; counts both the number of days and the amount of rainfall\
    \ on days falling above a wide range of critical thresholds to flexibly identify\
    \ different possible impact channels; uses thresholds that are either constants\
    \ or as percentiles of the historical distribution (1979\u20132019) of local daily\
    \ rainfall; calculates the total annual rainfall and standardized monthly rainfall\
    \ anomalies; climate data is surface precipitation rate from the European Centre\
    \ for Medium-Range Weather Forecasts Reanalysis 5 (ERA-5)."
  2: The analysis utilizes fixed-effects panel regression models to estimate the effects
    of within-region changes in climate variables on economic outcomes, accounting
    for unattended regional and global factors.
  3: "The analysis uses region-specific marginal effects and standard deviations of\
    \ rainfall measures, considering historical variability over the period 1979\u2013\
    2019, to evaluate impacts on economic growth."
  4: The analysis stratifies data by national income and sector, evaluates seasonal
    impacts, and assesses spatial heterogeneity using regional estimates and historical
    climate data.
  5: Effects of rainfall changes are assessed separately on sectoral economic output
    and income categories, using a regression model to consider interactions with
    regional income levels.
  6: Uses fixed-effects panel regression models to estimate relationships between
    changes in annual climate measures and subnational per-capita growth rates, including
    regional and yearly fixed effects.
  7: Analysis performed using regression equations that include controls for day-to-day
    temperature variability and assess heterogeneity of rainfall effects by income
    with nonlinear effects and marginal effects evaluated at sample means.
  8: "Analysis uses historical (1979\u20132019) rainfall data to calculate means for\
    \ four different measures: annual total rainfall, monthly rainfall deviations,\
    \ number of wet days, and extreme daily rainfall (defined by exceeding the 99.9th\
    \ percentile)."
  9: Calculates the standard deviation of annual rainfall values over the period 1979-2019
    for different rainfall measures. Results are applicable to understanding historical
    rainfall variability during this specific period.
  11: Economic responses to rainfall are estimated separately for the agricultural,
    manufacturing, and service sectors. The analysis involves plotting marginal effects
    on growth rates against different rainfall parameters, with confidence intervals
    shown.
  12: Econometric specification with errors clustered regionally and nationally; Analysis
    of the effects of temperature and rainfall changes on economic growth rates
More Notes:
  3: The findings suggest that rainfall measures are best evaluated together to capture
    their independent and additive effects, and they stress the importance of considering
    other climate variables like temperature.
  4: The study extrapolates marginal effects to assess impacts outside the economic
    sample, finding the largest historical impacts from wet days and negative monthly
    rainfall deviations.
  6: Uses ERA-5 reanalysis of historical observations, Multi-Source Weighted-Ensemble
    Precipitation v.1.2 (MSWEP), and the Princeton Global Meteorological Forcing dataset
    (PGF) for climate data.
  8: The monthly rainfall deviations are weighted by the annual sum of anomalies of
    monthly rainfall from their climatological means, which are defined as zero mean.
  9: The maps show global patterns of rainfall variability. The extreme rainfall is
    measured in units of historical standard deviations.
  11: The histograms in the background of each plot provide context on the distribution
    of the rainfall or temperature variables used in the analysis.
  12: The analysis includes lagged and differenced variables (D, L prefixes) to capture
    temporal effects; Interactions between variables (e.g., D.L.T.mean:L.T.mean, Extreme
    daily rainfall:T_mean) are also considered.
Quantitative material:
  1: Economic growth rates are reduced by increases in the number of wet days and
    in extreme daily rainfall.
  2: Quantitative analysis includes the impact of a 1-standard deviation increase
    in total annual rainfall, monthly rainfall deviations, number of wet days, and
    extreme daily rainfall on economic growth rates, with data from over 30,000 observations.
  3: 'The paper provides quantitative estimates of the historical effect on economic
    growth rates from a 1-standard deviation shock in rainfall measures: annual total
    rainfall (0.83), monthly rainfall deviations (-1.11), number of wet days (-1.35),
    and extreme daily rainfall (-0.36).'
  4: The page includes estimates of changes in economic growth rates due to a 1-standard
    deviation shock in rainfall measures, presented in effect size (% points).
  5: Poor countries show 62% greater sensitivity to annual total rainfall; rich countries
    show 47% greater sensitivity to the number of wet days.
  6: "Calculates measures of rainfall at different thresholds (0.1, 0.3, 1, 3, 10,\
    \ 20, 30, 50, 70, 80 and 90 mm d\u22121 or at the 50th, 70th, 80th, 90th, 95th,\
    \ 99th and 99.9th percentiles)."
  7: The regression coefficients describe percentage-point effects on subnational
    growth rates of a one unit increase in each rainfall measure.
  8: Historical means (1979-2019) of four rainfall measures presented as maps showing
    global distribution.
  9: Provides historical variability (standard deviation over 1979-2019) for four
    rainfall measures (annual total, monthly deviations, wet days, extreme daily)
    with illustrated values using a color scale.
  10: The analysis displays marginal effects on growth rates due to various climate
    variables, shown as lines with confidence intervals.
  11: Marginal effects on growth rates are presented as percentage increases related
    to various rainfall metrics (total annual rainfall, monthly rainfall deviations,
    number of wet days, and annual mean temperature).
  12: 'Regression coefficients representing the %-point effect on growth rates per
    unit increase in the given measure; Observations: 3001; R-squared: 0.29; Adjusted
    R-squared: 0.20'
sourcematerial:
  1: "yaml\nEvaluation overview: \"economic growth rates are reduced by increases\
    \ in the number of wet days and in extreme daily rainfall\"\nDrivers of Risk:\
    \ \"economic growth rates are reduced by increases in the number of wet days and\
    \ in extreme daily rainfall, in addition to responding nonlinearly to the total\
    \ annual and to the standardized monthly deviations of rainfall.\"\nQuantitative\
    \ material: \"economic growth rates are reduced by increases in the number of\
    \ wet days and in extreme daily rainfall\"\nMethodology: \"Here, using a global\
    \ panel of subnational economic output for 1,554 regions worldwide over the past\
    \ 40 years, we show that economic growth rates are reduced by increases in the\
    \ number of wet days and in extreme daily rainfall, in addition to responding\
    \ nonlinearly to the total annual and to the standardized monthly deviations of\
    \ rainfall. Furthermore, high-income nations and the ser vices and manufacturing\
    \ sectors are most strongly hindered by both measures of daily rainfall, complementing\
    \ previous work that emphasized the beneficial effects of additional total annual\
    \ rainfall in low-income, agriculturally dependent economies4,7. By assessing\
    \ the distribution of rainfall at multiple timescales and the effects on different\
    \ sectors, we uncover channels through which climatic conditions can affect the\
    \ economy. These results suggest that anthropogenic intensification of daily rainfall\
    \ extremes8\u2013 10 will have negative global economic consequences that require\
    \ further assessment by those who wish to evaluate the costs of anthropogenic\
    \ climate change. We count both the number of days and the amount of rainfall\
    \ on days falling above a wide range of critical thresholds to flexibly identify\
    \ different possible impact channels. Thresholds are set either as constants or\
    \ as percentiles of the historical distribution (1979\u20132019) of local daily\
    \ rainfall (Methods). Furthermore, we calculate the total annual rainfall and\
    \ standardized monthly rainfall anomalies to assess the results of previous studies\
    \ and their relation to the daily measures introduced here. Our primar y source\
    \ of climate data is the surface precipitation rate from the European Centre for\
    \ Medium-Range Weather Forecasts Reanalysis 5 (ERA-5) of historical obser vations\"\
    \nHighlights: \"high-income nations and the ser vices and manufacturing sectors\
    \ are most strongly hindered by both measures of daily rainfall. These results\
    \ suggest that anthropogenic intensification of daily rainfall extremes8\u2013\
    \ 10 will have negative global economic consequences\"\n"
  2: "Source material here: Assessing the distribution of daily rainfall across a\
    \ range of thresholds, we identify four distinct effects on economic production.\
    \ First, we find that increases in the number of days with rainfall exceeding\
    \ 1\u2009mm result in strong reductions in growth rates (Fig. 2c, Extended Data\
    \ Table 1)... Second, we find that increases in extreme daily rainfall cause further\
    \ reductions in growth rates (Fig. 2d, Extended Data Table 1). The marginal effects\
    \ of a 1-s.d. increase in the total annual rainfall, as a function of total annual\
    \ rainfall. b, The effects of standardized monthly deviations of rainfall (an\
    \ annual sum of anomalies of monthly rainfall from their climatological means...marginal\
    \ effects of a 1-s.d. increase in the number of wet days, as a function of the\
    \ number of wet days. d, The marginal effects of a 1-s.d. increase in extreme\
    \ daily rainfall (the annual sum of rainfall on days exceeding the 99.9th percentile\
    \ of the historical distribution (1979\u20132019)), as a function of the annual\
    \ mean temperature. We then apply fixed-effects panel regression models to estimate\
    \ the effect of these aspects of the distribution of daily rainfall on economic\
    \ production. This approach uses within-region changes in climate variables from\
    \ one year to the next to assess their impact on economic outcomes. As such, it\
    \ allows us to account for unobserved differences between regions, contemporaneous\
    \ global shocks and regional time trends (Methods), strengthening the identification\
    \ of causal effects between changes in rainfall and economic production. Assessing\
    \ the distribution of daily rainfall across a range of thresholds, we identify\
    \ four distinct effects on economic production. Confirming previous studies, we\
    \ identify quadratic effects of both total annual rainfall4 and monthly rainfall\
    \ deviations5 on economic growth rates.... First, we find that increases in the\
    \ number of days with rainfall exceeding 1\u2009mm result in strong reductions\
    \ in growth rates... Second, we find that increases in extreme daily rainfall\
    \ cause further reductions in growth rates.\n"
  3: "Source material here.\nEvaluation overview: The section discusses the effect\
    \ on economic growth rates of a 1-standard deviation shock in each of the four\
    \ rainfall measures, highlighting the evaluation of economic impact from climatic\
    \ shocks.\nDrivers of Risk: The document outlines drivers like shocks in annual\
    \ total rainfall, monthly rainfall deviations, number of wet days, and extreme\
    \ daily rainfall as impacting economic growth rates.\nQuantitative material: Quantitative\
    \ estimates are provided in terms of economic growth rate changes resulting from\
    \ a 1-s.d. shock in each rainfall measure, with specific figures given for each\
    \ measure.\nMethodology: The evaluation discusses using region-specific marginal\
    \ effects and considering historical variability over the period 1979\u20132019\
    \ for analysis.\nHighlights: The paper emphasizes that while greater rainfall\
    \ might have benefits, it can also have negative implications if it results in\
    \ increased wet days or extreme rainfall.\nMore Notes: The paper mentions the\
    \ necessity of including all rainfall measures to capture independent and additive\
    \ effects and highlights the need to consider other climate factors like temperature\
    \ in the analysis.\n"
  4: Extreme daily rainfall, number of wet days, and negative monthly rainfall deviations
    are identified as drivers of changes in economic growth rates, with estimated
    percentage point changes for a 1-standard deviation shock. Methodology includes
    stratifying data by income and sector, assessing seasonal and spatial heterogeneity,
    and extrapolating historical impacts using regional estimates. Key findings highlight
    stronger rainfall effects in winter and autumn, persistence in economic impacts
    without rebound effects, and largest historical impacts due to wet days and negative
    deviations.
  5: "  \nEvaluation overview: \"To shed light on the impact channels associated with\
    \ these measures, we re-assess their effects separately on sectoral economic output\
    \ and on the above- and below-median national income countries of our dataset.\"\
    \n\nDrivers of Risk: \"Increases in extreme daily rainfall and the number of wet\
    \ days are adverse for economic growth, particularly in high-income countries\
    \ and via the manufacturing and services sectors.\"\n\nQuantitative material:\
    \ \"However, poor countries show greater sensitivity to the annual total rainfall\
    \ (+62%, with respect to the other income group), whereas rich countries show\
    \ greater sensitivity to the number of wet days (+47%).\"\n\nMethodology: \"Owing\
    \ to the interdependence between the effects of the annual total and the monthly\
    \ rainfall deviations, we assess their effects separately... the economic response\
    \ to changes in the number of wet days shows a strong, nonlinear dependence on\
    \ the regional income level when accounted for as an interaction term in the regression\
    \ model.\"\n\nHighlights: \"Increases in extreme daily rainfall and the number\
    \ of wet days are adverse for economic growth, particularly in high-income countries\
    \ and via the manufacturing and services sectors.\"\n"
  6: "  \nEvaluation overview: \"Subnational economic data on macro-economic output\
    \ per capita are obtained from DoSE \u2014the Database of Subnational Economic\
    \ output made publicly available by the Mercator Research Institute on Global\
    \ Commons and Climate Change (MCC) and the Potsdam Institute for Climate Impact\
    \ Research (PIK) 3,33. ... subnational per-capita growth rates are estimated as\
    \ the first difference of the logarithm of gross regional product per capita.\"\
    \n\nDrivers of Risk: \"Climate measures ... include annual total rainfall, RA\
    \ r,y, and monthly rainfall deviations, RMr,y quadratically... We then separately\
    \ include each of the 36 threshold measures of the distribution of daily rainfall.\
    \ We identify statistically significant effects from two measures: the number\
    \ of wet days RD(1\u2009mm)x,y and the measure of extreme daily rainfall RD\u02C6\
    \ (99.9%)x,y.\"\n\nQuantitative material: \"We calculate multiple measures of\
    \ the annual distribution of daily rainfall at the grid-cell level. These include\
    \ annual and monthly totals, and measures in relation to a number of critical\
    \ thresholds. Critical thresholds are set at a 0.1, 0.3, 1, 3, 10, 20, 30, 50,\
    \ 70, 80 and 90 mm d\u22121, or at the 50th, 70th, 80th, 90th, 95th, 99th and\
    \ 99.9th percentiles of the historical (1979\u20132019) distribution of daily\
    \ rainfall at the grid-cell level.\"\n\nMethodology: \"We use fixed-effects panel\
    \ regression models to estimate relationships between changes in annual climate\
    \ measures, and subnational per-capita growth rates, g r,y. In our baseline estimations,\
    \ we include regional, \u03BC, r and yearly, \u03B7 y, fixed effects.\"\n\nHighlights:\
    \ \"We identify statistically significant effects from two measures: the number\
    \ of wet days RD(1\u2009mm)x,y and the measure of extreme daily rainfall RD\u02C6\
    \ (99.9%)x,y. We note a quadratic effect of the number of wet days.\"\n\nMore\
    \ Notes: \"We use the surface precipitation rate and the 2-m air temperature from\
    \ the ERA-5 reanalysis of historical observations as our primary climate data...\
    \ In addition, we use the surface precipitation rate from the Multi-Source Weighted-Ensemble\
    \ Precipitation v.1.2 (MSWEP), at the same temporal and spatial resolution...\
    \ and the Princeton Global Meteorological Forcing dataset (PGF) at a daily timescale.\"\
    \n"
