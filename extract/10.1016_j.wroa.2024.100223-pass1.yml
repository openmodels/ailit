  1: "Source material here:\nEvaluation overview: \"This paper utilises a custom-built\
    \ dynamic multisectoral model to assess the socio-economic impacts at a macro-level\
    \ of temporary water scarcity.\"\nDrivers of Risk: \"Climate change will exacerbate\
    \ water stress and water scarcity (IPCC, 2023). Water scarcity refers to periods\
    \ of reduced water availability, often caused by factors such as insufficient\
    \ rainfall or drought. On the other hand, water stress occurs when there is high\
    \ consumption of water relative to its availability (Kummu et al., 2016).\"\n\
    Quantitative material: \"Sector-specific analyses shed light on the potential\
    \ negative impacts of water scarcity on sectors like agriculture, food, and electricity\
    \ production and distribution. Yet, the analysis also reveals that certain sectors\
    \ can benefit from competitiveness effects, which can mitigate the adverse economic\
    \ implications of water scarcity.\"\nMethodology: \"This paper utilises a custom-built\
    \ dynamic multisectoral model to assess the socio-economic impacts at a macro-level\
    \ of temporary water scarcity. Specifically, the model incorporates often overlooked\
    \ factors such as behavioural and resilience aspects.\"\nHighlights: \"The analysis\
    \ shows how firms\u2019 foresight, or lack thereof, impacts their response to\
    \ water scarcity and the subsequent impact on the economy. The policy recommendations\
    \ arising from this research emphasise the promotion of anticipation and preparedness\
    \ among firms. It is crucial to prioritise resilience-building measures in all\
    \ sectors, whether they directly rely on water or not. However, it should be noted\
    \ that these sectors may contribute to a catch-up effect on water use. Yet, the\
    \ analysis also reveals that certain sectors can benefit from competitiveness\
    \ effects, which can mitigate the adverse economic implications of water scarcity.\"\
    \nMore Notes: \"This paper specifically focuses on resilience in relation to the\
    \ economy\u2019s capacity to recover after a disturbance, with a particular\"\n"
