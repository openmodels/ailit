Drivers of Risk:
  1: Climate change driven water scarcity, insufficient rainfall, drought, high consumption
    of water relative to its availability.
  2: Temporary water scarcity events, specifically single (May) and concurring (May
    and August) month-long events with the August event being more severe.
  3: Temporal water scarcity events are the shocks impacting the economic outcomes
    in the scenarios.
  4: Water scarcity due to assumed drought conditions impacts economic outcomes.
  5: The analysis focuses on the impact of investment behaviors and water scarcity
    events on economic sectors.
  6: Water scarcity events are assumed for May and August, impacting water efficiency.
  7: Temporal water scarcity events are impacting economic metrics.
  8: Temporal water scarcity event
  9: The primary driver of risk discussed is reduced freshwater availability, leading
    to negative impacts on various industries.
Evaluation overview:
  1: Socio-economic impacts at a macro-level of temporary water scarcity.
  2: Macro-level socio-economic impacts of water scarcity, including GDP, investment,
    employment, and water use.
  3: The evaluation examines the impacts on GDP, investment, employment, and water
    use during temporal water scarcity events in two scenarios.
  4: The evaluation focuses on the economic impacts of water scarcity on GDP, employment,
    and water use across different sectors.
  5: The page provides an overview of sector-specific impacts on GDP, employment,
    and water use during temporal water scarcity events, analyzed through a heat map
    visualization.
  6: No specific overview of outcomes like mortality or productivity loss is provided
    on this page.
  7: The analysis provides an overview of impacts on GDP, employment, and water use
    during temporal water scarcity events.
  8: Evaluates impacts on GDP, employment, and water use.
  9: The paper evaluates the impacts of freshwater scarcity on GDP, employment, and
    water usage across industrial sectors.
Highlights:
  1: "Firms\u2019 foresight, or lack thereof, impacts their response to water scarcity\
    \ and the subsequent impact on the economy; resilience-building measures in all\
    \ sectors should be prioritised; certain sectors can benefit from competitiveness\
    \ effects; those sectors may contribute to a catch-up effect on water use."
  2: Different investment behaviors impact the macro-economy during and after periods
    of temporary water scarcity. Myopic expectations lead to GDP and employment declines.
    Proactive measures and investment strategies are important for mitigating climate
    change impacts.
  3: Scenario 1 shows a 0.38% fall in GDP, 0.37% fall in employment, 0.45% fall in
    investment, and 0.6% reduction in water use; Scenario 2 shows a 0.89% fall in
    GDP, 0.86% fall in employment, 1.04% fall in investment, and 1.39% reduction in
    water use.
  4: Industries like agriculture, food, and electricity suffer negative impacts, whereas
    sectors like motor vehicles experience positive competitiveness effects despite
    increased water usage.
  5: Sectors like agriculture show negative impacts in many metrics, particularly
    regarding water use during scarcity events.
  6: No specific important outcomes or conclusions are highlighted on this page.
  7: Increase in economic openness tends to decrease negative GDP impacts but increases
    negative employment impacts; perfect foresight scenarios perform better under
    water scarcity.
  8: Agriculture, forestry & fishing sector experiences the largest percentage change
    impacts on GDP, employment, and water use. Impacts vary across sectors and investment
    behavior models.
  9: Agriculture experiences the most significant negative impact due to its high
    reliance on freshwater, while electrical manufacturing and vehicle manufacturing
    see positive impacts due to decreased relative prices.
Methodology:
  1: Utilizes a custom-built dynamic multisectoral model to assess the socio-economic
    impacts at a macro-level of temporary water scarcity; incorporates behavioural
    and resilience aspects.
  2: Uses the DEMACRO-ESS, a general equilibrium (CGE) model focused on Germany, to
    simulate the impact of water scarcity under different investment behavior specifications
    (perfect foresight, myopic expectations, imperfect foresight). Results are presented
    as time path adjustments for key variables and summarized for selected time periods.
  3: Different investment behavior models (myopic, imperfect foresight, and perfect
    foresight) in DEMACRO-ESS simulations are used to analyze the impact of water
    scarcity.
  4: The analysis uses a dynamic multi-sectoral CGE model, DEMACRO-ESS, which incorporates
    perfect, myopic, and imperfect investment foresight models to simulate reactions
    to water scarcity events.
  5: The analysis employs a DEMACRO-ESS simulation using computable general equilibrium
    models incorporating nested production functions with CES and Leontief structures.
  6: Analysis involves reducing water efficiency in a modeling framework to simulate
    water scarcity, considering labor market and investment behavior with different
    foresight assumptions.
  7: The analysis uses the DEMARCO-ESS model with sensitivity analysis on Armington
    trade elasticity to assess impacts of water scarcity with different levels of
    economic openness and investment behavior.
  8: Uses DEMACRO-ESS simulation results to model different investment behaviour specifications
    (Myopic, Imperfect foresight, Perfect foresight) under water scarcity.
  9: 'The analysis uses DEMARCO-ESS simulation results to assess sectoral impacts
    under different investment behavior scenarios: Myopic, Imperfect foresight, and
    Perfect foresight.'
More Notes:
  1: "The paper focuses on resilience in relation to the economy\u2019s capacity to\
    \ recover after a disturbance."
  2: The model incorporates ecosystem services (ESS) and an imperfectly competitive
    labor market. The qualitative findings and policy recommendations have relevance
    for other countries and regions as well as Germany.
  3: Results show differences in the timing and magnitude of impacts and recovery
    across scenarios and investment behavior models.
  4: The paper emphasizes the importance of investment foresight in mitigating negative
    effects and supporting economic resilience to water scarcity.
  6: Simulations are carried out using three investment behavior models, resulting
    in six comprehensive sets of simulation results.
  8: The analysis focuses on cumulative percentage changes rather than absolute values.
    The results are specific to a temporal water scarcity event and the DEMACRO-ESS
    model.
  9: The impacts of water scarcity extend beyond high water-consuming industries,
    affecting those indirectly reliant on agricultural output.
Quantitative material:
  1: Sector-specific analyses shed light on the potential negative impacts of water
    scarcity on sectors like agriculture, food, and electricity production and distribution;
    reveals that certain sectors can benefit from competitiveness effects, which can
    mitigate the adverse economic implications of water scarcity.
  2: A myopic expectations model leads to a decrease of 0.14% in GDP and a 0.17% decline
    in employment during a water scarcity event.
  3: The analysis provides percentage changes from the base year for GDP, investment,
    employment, and water use for two scenarios.
  4: No specific quantitative information is produced on this page; references to
    quantitative results are made, directing to Appendices B and C for detailed data.
  5: No specific quantitative changes are provided in this excerpt, but it refers
    to quantitative results available in appendices.
  6: 30% decrease in water efficiency in May and 35% in August during the water scarcity
    scenarios.
  7: Table A1 provides percentage changes in GDP, employment, and water use for different
    scenarios and Armington elasticities.
  8: Provides cumulative percentage change impacts across all simulation periods for
    GDP, employment, and water use in various sectors.
  9: The paper provides cumulative percentage change impacts on GDP, employment, and
    water use for different sectors under various investment behaviors during a water
    scarcity event.
