  6: "Source material here.\n- \"To assess the economic resilience to water scarcity,\
    \ two fictitious scenarios are assumed. In the first scenario, a month-long water\
    \ scarcity event is assumed, lasting the entirety of May in a given year. In the\
    \ second scenario, concurring water scarcity events are assumed to occur in both\
    \ May (repeating the first scenario) and August (also lasting the entire month),\
    \ with the latter being more severe.\"\n- \"In the modelling analysis, these scenarios\
    \ are incorporated by introducing reduction in water efficiency, \u03C8W,i, in\
    \ Eq. (1) for the respective months.\"\n- \"Specifically, in the first scenario,\
    \ a 30% decrease in water efficiency during the month of May is assumed. Similarly,\
    \ in the second scenario, water efficiency is again reduced by the same percentage\
    \ in May and by 35% in August.\"\n- \"These simulations are carried out using\
    \ the three investment behaviour models, resulting in a total of six comprehensive\
    \ sets of simulation results.\"\n- \"In all simulations the labour force is fixed,\
    \ but employment is variable over time, the unemployment rate can change, and\
    \ labour is mobile across sectors.\"\n- \"That is firms base their expected future\
    \ output on a linear extension of previous output of n periods such that: [equations\
    \ omitted for brevity].\"\n"
