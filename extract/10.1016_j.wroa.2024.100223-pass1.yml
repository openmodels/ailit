    Evaluation overview: "The focus of the analysis is to identify the effects that
    varying levels of investment foresight may have on economic resilience, incorporating
    often overlooked factors such as behavioural aspects. ... Sector-specific analyses
    shed light on the potential negative impacts of water scarcity."

    Drivers of Risk: "The agriculture sector (denoted in red) experiences significant
    adverse effects, as expected, due to its direct dependence on water availability.
    The food, and the electricity production and distribution sectors (in orange)
    are also substantially affected by the assumed drought conditions in the two scenarios."

    Quantitative material: "The corresponding quantitative results are given in Appendices
    B and C."

    Methodology: "The analysis presented in this paper is based on a custom built
    dynamic multi-sectoral CGE model, called DEMACRO-ESS. The model is based on the
    AMOS CGE modelling framework and incorporates (neo) Keynesian characteristics...
    by implementing aspects of resilience via the investment foresight closures."

    Highlights: "The agriculture sector, due to its direct dependence on water availability,
    experiences substantial adverse effects in all scenarios. Additionally, the food
    and the electricity sectors are also significantly affected. However, certain
    sectors, such as the motor vehicles and related activities, exhibit positive effects
    due to competitiveness (trade) effects, resulting in increased output and employment.
    Nonetheless, these sectors contribute to a catching-up effect in terms of water
    usage."

    More Notes: "Policymakers should prioritise promoting anticipation and preparedness
    among firms, as those with some level of foresight perform better during water
    scarcity events. It is crucial for these activities to cover all sectors, regardless
    of their direct reliance on water. Additionally, establishing policies that prioritise
    enhancing resilience, especially in water-dependent sectors, is recommended."

