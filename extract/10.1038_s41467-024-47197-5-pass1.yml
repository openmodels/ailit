    \ of acute extreme heat exposure (TMAX95).\n\nThe three key drivers in\uFB02uencing\
    \ the future climate-related risks posed to human health, namely total population\
    \ growth, demographic changes in the age structure, and heat exposure will evolve\
    \ following context-speci\uFB01c, and potentially heterogeneous, trends55. Historical\
    \ vs. 2050 for SSPs 1(26), 2(45), 3(70), and 5(85), CMIP6 global climate models\
    \ (GCMs) (hot models70 excluded) range; multi-model median in bold lines.\n\n\
    The average 95th percentile of the maximum temperature distribution increases\
