    \ Degree Days (panels A, B), Person Hot\n"
  5: "Source material here: Fig. 3 | Regional and age-group-speci\uFB01c trends in\
    \ the cumulative and intensity days with TMAX95 > 37.5 \xB0C, age strati\uFB01\
    cation, faceted by region, difference of acute exposure of population groups:\
    \ 2020\u20132050. Top row: global trends; lower rows: regional trends. Panel (A):\
    \ GCM uncertainty range for the count of individuals exposed to a given CDD exposure\
    \ level, age strati\uFB01cation, faceted by region, difference between SSP2(45)\
    \ and current population. Panel (B): GCM uncertainty range for the count of individuals\
    \ exposed to a given number of annual Days (panels C, D), and Person Degrees (panels\
    \ E, F) in the SSPs 1(26), 2(45), 3(70), and 5(85) scenarios across six continents.\
    \ Since space aggregation in geographically large regions might hide subregional\
    \ climate and socio-demographic heterogeneities, decomposition results at the\
    \ country level are presented in the SI Appendix in Figs. SI-23\u2013SI-37. Cumulative\
    \ heat exposure of older individuals (PDDs) will at least triplicate in all continents\
    \ by 2050, irrespective of the scenario considered. Climate change will be the\
    \ prevailing mechanism of change in more temperate nations of Europe and North\
    \ America. Population aging will be the de\uFB01ning driver of future exposure\
    \ in the warmer countries of Africa, Asia, and South America. Africa is also the\
    \ region where total population growth will have the largest impact. If absolute\
    \ exposure is measured in terms of people, Asia will experience levels of older\
    \ adult heat exposure nearly four times higher than the other regions put together\
    \ due both to its large, aging population and hot climate. Some countries within\
    \ the same macro-region (e.g. Japan and India in Asia) can show common large increases\
    \ in total heat exposure, despite great differences in their population structure\
    \ in the 1994\u20132014 period (see Figs. SI-23\u2013SI-37). Older adults cumulative\
    \ heat exposure in other regions will also grow robustly, despite being signi\uFB01\
    cantly smaller in absolute terms. Figures SI-19\u2013SI-21 in the SI Appendix\
    \ present similar \uFB01gures for SSP1(26), 3(70). and 5(85)."
