  2: "Source material here.\n- Evaluation overview: \"Heat exposure impacts on older\
    \ individuals: global trends and distribution.\"\n- Drivers of Risk: \"For cumulative\
    \ exposures, we use annual cooling degree days (CDDs) above the 24\xB0C threshold.\
    \ For acute exposures metrics, we use the annual count of hot days (#HDs: days\
    \ with maximum temperature exceeding 37.5\xB0C) and the 95th percentile of the\
    \ 20 y daily maximum temperature distribution (TMAX95).\"\n- Quantitative material:\
    \ \"Our gridded population projections are benchmarked against previous region-specific\
    \ modeling work to assess their consistency (see Methods). We develop temperature\
    \ exposure metrics at the same spatial resolution.\"\n- Methodology: \"Combine\
    \ them with temperature projections from the Coupled Model Intercomparison Project\
    \ Phase 6 (CMIP6) downscaled, bias-corrected model output... compute the geographic\
    \ intersection of current (2020) and projected mid-century (2050) changes in global\
    \ and regional populations of adults age 69+, and chronic and acute heat exposures.\"\
    \n- Highlights: \"Figure 1 visualises bivariate global maps of the fraction of\
    \ population aged 69+, the average yearly Cooling Degree Day exposure (CDDs),\
    \ the temperatures corresponding to the 95th percentile of local extreme heat\
    \ exposure (TMAX95).\"\n- More Notes: \"Understanding the geographic overlap of\
    \ these trends is thus critically important.\"\n"
  3: "Source material here.\nEvaluation overview: The figure show that, by the year\
    \ 2050, the global heat-exposed population aged 69+ is projected to grow considerably.\
    \ [...] as a result of a warmer climate and an older global population.\nDrivers\
    \ of Risk: As a result of a warmer climate and an older global population, Population\
    \ Degree Days (PDDs [...]).\nQuantitative material: The figure shows that, by\
    \ the year 2050, the global heat-exposed population aged 69+ is projected to grow\
    \ [...] increase by 0.16\u20130.23 billion for #HDs, 0.18\u20130.25 billion for\
    \ TMAX95 and 0.23\u20130.32 billion for CDDs, respectively [...]. [...] from the\
    \ current 203 billion to about 778\u20131008 billion in 2050, with [...] this\
    \ growth concentrated in Asia [...].\nMethodology: Note that solid lines represent\
    \ CMIP6 General Circulation Models (GCMs) median, and light lines describe each\
    \ GCM individually. [...], comparing current demographics and historical climate\
    \ with two SSP-RCP evolutions by the year 2050 [...]. [...] Here the box plot\
    \ range also includes the CMIP6 GCMs range, thus incorporating the climate model\
    \ uncertainty. \nHighlights: Increases in age 69+ populations are observed in\
    \ all regions, consistent with past studies of global population aging, but they\
    \ are concentrated in high CDDs levels in primarily low-income nations in the\
    \ Global South, concentrated in Africa, Asia, and South America. Conversely, older\
    \ individuals increase in higher-income nations of the Global North including\
    \ North America and Europe. [...] more than 23% of the global population aged\
    \ 69+ is projected to be living in climates with TMAX95 > 37.5 C \xB0 in 2050\
    \ compared to 14% in 2020, [...]\n"
