    \ the largest changes in exposure, with the average number of hot days (#HDs)\
    \ increasing from 0 to 3, and number of CDDs more than tripling.\n\nHistorical\
    \ vs. 2050 for SSPs 1(26), 2(45), 3(70), and 5(85), CMIP6 global climate models\
    \ (GCMs) (hot models70 excluded) range; multi-model median in bold lines. Panels\
    \ (B, D, F): boxplots of region-speci\uFB01c older individuals-weighted exposure\
