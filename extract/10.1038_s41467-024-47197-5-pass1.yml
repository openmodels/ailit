Drivers of Risk:
  1: The key drivers include climate change and the increasing frequency, intensity,
    and duration of heat spells.
  2: "Annual Cooling Degree Days (CDDs) above 24\xB0C, annual count of hot days exceeding\
    \ 37.5\xB0C (#HDs), and the 95th percentile of the 20-year daily maximum temperature\
    \ distribution (TMAX95)."
  3: The drivers identified include a warming climate and demographic changes, specifically
    population aging.
  4: 'The drivers are total population growth, changes in the age structure, and heat
    exposure (CDDs, #HD, TMAX95) under different SSP scenarios (SSP1(26), SSP2(45),
    SSP3(70), SSP5(85)).'
  5: Climate change, population growth, and population aging are identified as key
    drivers of future heat exposure.
  6: The primary drivers of risk are changes in climate (historical and projected
    under SSP2-4.5 and SSP5-8.5 scenarios) leading to increased heat exposure, as
    well as demographic changes, particularly the aging of the population.
  7: Rising heat exposures contribute to increased demands for social and health services,
    particularly in areas with aging populations.
  8: Urban heat island effect, climate change-driven enhancement of heat extremes,
    and aging populations are identified as factors impacting older adults.
  9: "Cooling degree days (CDD), 20-year average 95th percentile of daily maximum\
    \ temperatures (TMax95th), and 20-year average count of days with a dry bulb maximum\
    \ temperature of 37.5\xB0 C (#HD)."
  12: Heat exposure and increasing temperatures, particularly during heat waves, are
    noted as primary drivers of mortality and morbidity outcomes.
Evaluation overview:
  1: The paper provides an overview of the global projections of heat exposure among
    older adults, with a focus on physical health and mortality risks.
  2: Heat exposure impacts on older individuals (age 69+).
  3: The paper evaluates the future acute heat exposure of the global population,
    particularly focusing on populations aged 69+ and their exposure to climate conditions
    exceeding critical thresholds.
  4: Age 69+ heat exposures are evaluated, focusing on exposure to Cooling Degree
    Days (CDDs), Hot Days (#HD), and extreme heat (TMAX95).
  5: "Focuses on exposure to heat, quantified as Cooling Degree Days (CDD), Heating\
    \ Degree Days (HD), and days with maximum temperature above 37.5\xB0C (TMAX95),\
    \ but also mentions cumulative heat exposure (PDDs)."
  6: The paper evaluates heat exposure, specifically focusing on older adults.
  7: The paper evaluates exposure to heat through metrics such as Billion Person Degree
    Days (PDDs) and Billion Person Hot Days (PHDs), assessing regional and global
    impact.
  8: The paper highlights the increased vulnerability of populations of older adults
    to heat extremes, emphasizing the need to consider their distinctive needs in
    adaptation solutions.
  9: "Individuals\u2019 cumulative (chronic) heat exposure, intensity of individuals\u2019\
    \ acute exposure to heat extremes, and frequency of acute \u201Cextreme hot days\u201D\
    \ exposure."
  12: This page summarizes various studies on heat-related mortality and morbidity,
    particularly in elderly populations and under climate change scenarios.
Highlights:
  1: "By mid-century, an additional 177\u2013246 million older adults will be exposed\
    \ to dangerous acute heat; effects are most severe in Asia and Africa."
  2: "The paper presents bivariate global maps of the fraction of the population aged\
    \ 69+, the average yearly Cooling Degree Day exposure (CDDs), and the temperatures\
    \ corresponding to the 95th percentile of local extreme heat exposure (TMAX95)\
    \ for the current climate (2020) and circa 2050, SSP2(45). It also shows annual\
    \ days with TMAX > 37.5\xB0C (#HD)."
  3: "Future heat exposure will be highly heterogeneous across regions and age groups,\
    \ with significant increases in heat exposure expected particularly in low-income\
    \ regions; more than 23% of the global population aged 69+ might experience climates\
    \ with TMAX95 > 37.5\xB0C by 2050, up from 14% in 2020."
  4: Older individuals in Europe face some of the largest changes in heat exposure,
    with the number of hot days and CDDs increasing significantly.
  5: Older adults in Asia will experience nearly four times higher levels of heat
    exposure compared to other regions due to a large, aging population and hot climate.
    Cumulative heat exposure of older individuals (PDDs) will at least triplicate
    in all continents by 2050, irrespective of the scenario considered.
  6: Climate change has a strong impact on the frequency of acute heat exposure, but
    a relatively negligible impact on the burden of the intensity of acute exposures.
    Projected acceleration of both chronic and acute heat exposures of older adults
    raises a serious concern for global public health.
  7: Aging populations and rising heat exposures are key challenges, necessitating
    novel policy interventions to mitigate the impact on social and health services.
  8: The future size and distribution of elderly populations remain uncertain; integration
    of adaptation solutions must consider the socio-economic and health challenges
    of older adults.
  9: Projected elderly population in 2050 closely aligns with estimates from ref.
    77 for the United States, while it has a more significant bias in relation to
    the estimates of ref. 78. For China, observe a more significant absolute difference
    for all scenarios, which, however, given the very large population size of the
    country, results in moderate total and local percentage errors. India SSP2 shows
    relatively good consistency.
  12: The page highlights the heightened vulnerability of elderly populations to heat-related
    mortality and morbidity outcomes due to climate change.
Methodology:
  1: The analysis combines age-stratified demographic projections with downscaled
    temperature projections to mid-century.
  2: The analysis constructs global gridded age-stratified demographic projections,
    benchmarks them against previous region-specific model and age-structuring work,
    and combines them with CMIP6 temperature projections. It computes the geographic
    intersection of current (2020) and projected mid-century (2050) changes in global
    and regional populations of adults age 69+ and chronic and acute heat exposures.
  3: The analysis uses CMIP6 General Circulation Models (GCMs) and scenarios of SSP-RCP
    up to 2050, incorporating climate model uncertainty and socio-demographic projections.
  4: 'CMIP6 global climate models are used to project heat exposures under different
    SSPs for historical vs. 2050. 69+ population-weighted exposure is calculated for
    CDDs, #HD, and TMAX95. ''Hot models'' are excluded.'
  5: Uses climate model projections (GCMs) under different Shared Socioeconomic Pathways
    (SSPs) to project future heat exposure, factoring in age stratification and regional
    differences. The analysis decomposes results at the country level.
  6: The analysis uses climate scenarios (SSP2-4.5 and SSP5-8.5) to project future
    heat exposure under current demographics. The results are applicable for the years
    represented by the scenarios, specifically looking at changes from historical
    climate to 2050.
  8: The analysis combines gridded population estimates with age-stratified data to
    project future sub-national demographics and assess exposure to climate impacts.
  9: "Computes CDD based on a temperature threshold of 24\xB0C, TMAX95th based on\
    \ each grid cell\u2019s 20-year distribution of daily maximum temperatures, and\
    \ #HD based on each grid cell\u2019s 20-year distribution of daily maximum temperatures,\
    \ considering a threshold maximum temperature TMAX\u22C6 =37.5\xB0C. Applies calculations\
    \ to current and future climate epochs/SSP scenarios. Compares downscaled elderly\
    \ population data to previous projection studies using metrics of APE and MAPE."
  12: This page references numerous studies employing systematic reviews, meta-analyses,
    and modeling projections related to climate scenarios.
More Notes:
  2: The study focuses on the geographic intersection of aging and heat exposure.
  4: "The study identifies critical thresholds of 1200 CDDs/yr and 37.5\xB0C as dangerous\
    \ temperatures even under short exposure. Rapid population growth in Africa and\
    \ Asia is noted, while Europe's 69+ population share will almost double by 2050.\
    \ The analysis decomposes the overall future change in exposure in terms of Person\
    \ Degree Days and Person Hot Days."
  5: "SI Appendix provides country-level results (Figs. SI-23\u2013SI-37) and similar\
    \ figures for SSP1(26), 3(70). and 5(85). The study considers Africa, Asia, South\
    \ America, Europe, and North America separately. Population growth has the largest\
    \ impact in Africa, whereas climate change will be the prevailing mechanism of\
    \ change in more temperate nations of Europe and North America. Population aging\
    \ will be the defining driver of future exposure in warmer countries."
  6: Table SI-1 reports figures for scenarios SSP1(26) and 3(70). The intensity of
    acute exposures is mostly affected by the shift in the age structure of population
    in areas where extreme temperatures are already high.
  12: The page comprises references with a specific focus on the impacts of heat and
    projected risks due to climate change across various regions and contexts.
Quantitative material:
  1: "Findings indicate that chronic exposure to heat doubles across all warming scenarios,\
    \ with >23% of the global population aged 69+ exposed to daily maximum temperatures\
    \ exceeding 37.5 \xB0C."
  2: 'The paper uses gridded age-stratified demographic projections and CMIP6 downscaled,
    bias-corrected model output to quantify chronic exposure to high average temperatures
    and the frequency and intensity of acute exposure to extreme high temperatures
    for different age groups across the world. It also uses metrics like CDDs, #HDs,
    and TMAX95.'
  3: Provides projections such as individuals aged 69+ in Asia reaching between 588-748
    million by 2050, a threefold increase; global heat-exposed population aged 69+
    projected to increase by 0.16-0.23 billion for hot days and 0.18-0.25 billion
    for TMAX95 under different scenarios; Population Degree Days (PDDs) for age 69+
    expected to increase from 203 billion to about 778-1008 billion by 2050.
  4: "The average 95th percentile of the maximum temperature distribution increases\
    \ by at least 1\xB0C in all regions and scenarios. The number of CDDs in Europe\
    \ more than triples. The average number of hot days (#HDs) in Europe increase\
    \ from 0 to 3."
  5: Projects changes in the number of individuals exposed to given CDD, HD, and TMAX95
    exposure levels under different SSP scenarios (SSP1(26), 2(45), 3(70), and 5(85))
    for the years 2020-2050, presenting results as GCM uncertainty ranges. Projects
    older individuals' cumulative heat exposure will at least triplicate in all continents
    by 2050, irrespective of the scenario considered.
  6: "The table provides quantitative data on several heat exposure metrics, including\
    \ Cooling Degree Days (CDD24), days exceeding 95\xB0F (TMAX95), number of hot\
    \ days (#HDs), Potential Degree Days (PDDs), Potential Hot Days (PHDs), and the\
    \ 95th percentile of daily maximum temperature (PD95s), for different regions\
    \ (Africa, Asia, Australia, Europe, N. America, S. America, World) under historical\
    \ climate and future climate scenarios (SSP2-4.5 and SSP5-8.5). Data is provided\
    \ as the median and interquartile range."
  7: Quantitative data on exposure to heat is broken down by region and scenario,
    with metrics including Billion Person Degree Days, Billion Person Hot Days, and
    Person Degrees at the 95th percentile.
  9: Calculates cumulative population degree days (PDD), acute population degrees
    at the 95th percentile (PD95), and population exposure metrics based on grid-cell
    population, older adults fraction, and meteorological indicators.
  12: No specific quantitative information or percentages are provided directly by
    this page of the article.
