Drivers of Risk:
  1: Sea level rise caused by anthropogenic climate change, specifically in the context
    of Hurricane Sandy.
  2: Anthropogenic sea level rise (ASLR) due to climate change.
  3: Sea level rise is attributed to anthropogenic climate change, with scenarios
    comparing stable, cooling, and historically observed temperatures.
  4: Anthropogenic sea-level-rise (ASLR) impacts coastal flood damages during tropical
    cyclones like Hurricane Sandy.
  5: ASLR contributes to increased flooding extent and depth, impacting new areas
    and thus driving risk.
  6: The primary drivers of risk are sea level rise (including contributions from
    glaciers, ice sheets, thermal expansion, and ocean dynamics), and storm events
    like Hurricane Sandy.
  7: Floods resulting from sea level rise (ASLR) during Hurricane Sandy.
Evaluation overview:
  1: Economic damage and the number of people affected by flooding.
  2: The flood impacts of cyclonic coastal storms, specifically damages from Hurricane
    Sandy.
  3: This page provides an overview of changes in global mean sea level (GMSL) attributable
    to anthropogenic climate change from 1900 to 2012.
  4: Damages in New York, New Jersey, and Connecticut following Sandy are evaluated
    in terms of repair, response, and restoration costs.
  5: The paper evaluates the impacts of anthropogenic sea level rise (ASLR) on population,
    housing, and property damage in regions like the Tri-State Area and New York.
  6: The paper evaluates the additional exposure and damage of Hurricane Sandy driven
    by anthropogenic sea level rise (ASLR).
  7: Property damage is calculated using the standard HAZUS-MH method from the U.S.
    Federal Emergency Management Agency.
Highlights:
  1: A significant portion of the economic damage from Hurricane Sandy ($8.1B) and
    the number of people affected by flooding (71,000) can be attributed to sea level
    rise caused by anthropogenic climate change.
  2: Human-caused sea level rise contributed to damages associated with Hurricane
    Sandy and will increasingly aggravate damages in the future as sea levels continue
    to rise. Climate-mediated ASLR drove multi-billions of dollars of damage from
    Hurricane Sandy.
  3: The page highlights the consistency of modeled historical sea level rise with
    observations, and estimates the anthropogenic contributions to GMSL rise.
  4: "Total ensemble ASLR is found to amount to $1.5B ($0.9B\u2013$2.5B) in damages\
    \ for New York City."
  5: The study shows that ASLR significantly increases exposure to flooding and damage,
    affecting additional populations and housing units, with median estimates of observed
    sea level rise exceeding modeled estimates in some cases.
  6: The study quantifies the anthropogenic climate damages from past coastal storms
    and aims to improve estimates of the costs of climate change more broadly.
  7: The paper estimates the fraction of damages attributable to ASLR and applies
    this fraction to total state-reported costs to estimate attributable dollar value
    damages, distributing state totals among counties in proportion to modeled damages.
Methodology:
  1: The study simulates water levels and damage under different sea level scenarios
    (actual vs. lower sea levels corresponding to estimates of attributable sea level
    rise) to quantify the effect of anthropogenic sea level rise on Hurricane Sandy's
    impact. The approach is suggested for impact assessments of other past and future
    coastal storms.
  2: "Builds on recent research to develop multi-method estimates for global and New\
    \ York-area ASLR through 2012. Employs a high-resolution dynamic flood model and\
    \ spatially varying error correction to simulate Sandy\u2019s peak flood. Compares\
    \ results under actual vs. counterfactual conditions with lower baseline sea levels\
    \ to estimate total attributable costs. Uses both reconstructed sea-level-rise\
    \ budgets and semi-empirical models of sea level as a function of global mean\
    \ temperature."
  3: The analysis uses semi-empirical modeling, counterfactual scenarios, and CMIP5
    simulations to estimate anthropogenic sea level rise.
  4: Hydrodynamic modeling with spatial bias correction is used to simulate flooding
    under different sea levels to estimate damages attributable to ASLR.
  5: The analysis uses hydrodynamic simulation, spatial bias correction, and flood-depth-based
    assessment methodologies; results are also validated with independent methodologies.
  6: The study employs a budget approach to downscale semi-empirical results, attributing
    sea level rise to different components and developing high, central, and low attribution
    scenarios based on literature estimates. It also uses a semi-empirical model to
    relate the rate of global mean sea-level change to global mean temperature. The
    study uses CMIP5 climate models with both historical and natural-forcing-only
    experiments to estimate attributable sea level rise.
  7: Hydrodynamic flood simulations are performed using the U.S. Army Corps of Engineers
    Coastal Storm Modeling System (CSTORM-MS).  Property damage is calculated using
    depth-damage curves based on flood depth and building type.
  9: "The authors used the U.S. DOE\u2019s Program for Climate Model Diagnosis and\
    \ Intercomparison which provides coordinating support and led the development\
    \ of software infrastructure in partnership with the Global Organization for Earth\
    \ System Science Portals."
More Notes:
  7: The analysis focuses on relative damages among simulated floods starting from
    slightly different baseline sea levels, aligning with the depth-emphasis of the
    HAZUS-MH model.
Quantitative material:
  1: "Approximately $8.1B ($4.7B\u2013$14.0B, 5th\u201395th percentiles) of Sandy\u2019\
    s damages are attributable to climate-mediated anthropogenic sea level rise. Flood\
    \ area extension affected 71 (40\u2013131) thousand additional people."
  2: "Global mean sea level increased 17.9 \xB1 4.5 cm (1\u03C3) over 1900\u20132012.\
    \ Median ASLR for New York is 87%, 91%, and 92% of median global ASLR under low-,\
    \ central- and high-attribution scenarios, respectively. Under the central scenario,\
    \ 9.8 cm (6.4\u201313.7 cm) of global mean sea level rise and 8.9 cm (5.2\u2013\
    13.1 cm) of New York-area rise are attributable to human causes mediated by climate\
    \ change (Table 1)."
  3: "Quantitative estimates of sea level rise attributable to anthropogenic climate\
    \ change for various scenarios are provided, e.g., 7.0 cm (low attribution) to\
    \ 12.6 cm (high attribution) from 1900\u20132012."
  4: "13% (7.5\u201323%) of Sandy damages in the tri-state area are attributed to\
    \ climate-mediated ASLR, amounting to $8.1B ($4.7B\u2013$14B)."
  5: "ASLR exposed an additional 71,000 (40\u2013131,000) people and 36,000 (21\u2013\
    66,000) housing units in the tri-state area; property damage estimates are given\
    \ as 13.0% (Tri-State) and 13.3% (New York)."
  6: "The paper estimates ASLR during the period of the study to be at least 12.3\u2013\
    13.4 cm."
  7: The raw model results have a bias of -1.2 cm and root mean square error (RMSE)
    of 35.5 cm which are reduced to -0.1 cm and 22.3 cm, respectively, after a spatial
    bias correction.
sourcematerial:
  1: "In 2012, Hurricane Sandy hit the East Coast of the United States, creating widespread\
    \ coastal flooding and over $60 billion in reported economic damage. The potential\
    \ influence of climate change on the storm itself has been debated, but sea level\
    \ rise driven by anthropogenic climate change more clearly contributed to damages.\
    \ To quantify this effect, here we simulate water levels and damage both as they\
    \ occurred and as they would have occurred across a range of lower sea levels\
    \ corresponding to different estimates of attributable sea level rise. We find\
    \ that approximately $8.1B ($4.7B\u2013$14.0B, 5th\u201395th percentiles) of Sandy\u2019\
    s damages are attributable to climate-mediated anthropogenic sea level rise, as\
    \ is extension of the flood area to affect 71 (40\u2013131) thousand additional\
    \ people. The same general approach demonstrated here may be applied to impact\
    \ assessments for other past and future coastal storms."
  2: "Source material here. Anthopogenic component of sea level rise is quantifiably\
    \ attributable to climate change, amplifying the flood impacts of cyclonic coastal\
    \ storms. Global mean sea level increased 17.9 \xB1 4.5 cm (1\u03C3) over 1900\u2013\
    2012... We find that across the full range of our estimates, climate-mediated\
    \ ASLR drove multi-billions of dollars of damage from Hurricane Sandy. The New\
    \ York City area rise attributable to human causes mediated by climate change\
    \ is 8.9 cm (5.2\u201313.1 cm)...We employ largely independent approaches for\
    \ attributing rise based either on reconstructed sea-level-rise budgets or on\
    \ semi-empirical models of sea level as a function of global mean temperature.\
    \ Here, we investigate how much of the more than $60 billion in damages from Hurricane\
    \ Sandy can be linked to climate-related anthropogenic sea level rise (ASLR)...\
    \ builds on recent research to develop multi-method estimates for global and New\
    \ York-area ASLR through 2012."
  3: "Source material here.\nThe page provides an overview of changes in global mean\
    \ sea level (GMSL) attributable to anthropogenic climate change from 1900 to 2012:\
    \ \"monitorered and attributable changes in global mean sea level (GMSL) from\
    \ 1900 to 2012\". \n\nSea level rise is attributed to anthropogenic climate change,\
    \ with scenarios comparing stable, cooling, and historically observed temperatures:\
    \ \"Estimates of anthropogenic sea level rise (ASLR), based on differences between\
    \ matching scenarios: HadCRUT4 vs. stable or cooling temperatures, and historical\
    \ vs. natural CMIP5 simulations\". \n\nQuantitative estimates of sea level rise\
    \ attributable to anthropogenic climate change for various scenarios are provided,\
    \ e.g., 7.0 cm (low attribution) to 12.6 cm (high attribution) from 1900\u2013\
    2012: \"Estimates of sea level rise attributable to anthropogenic climate change\
    \ for 1900\u20132012 in cm.\" \n\nThe analysis uses semi-empirical modeling, counterfactual\
    \ scenarios, and CMIP5 simulations to estimate anthropogenic sea level rise: \"\
    K16 used a four-part methodology [...] they modeled global sea level under two\
    \ different counterfactual twentieth-century global temperature scenarios.\"\n\
    \u201CThe analysis uses semi-empirical modeling, counterfactual scenarios, and\
    \ CMIP5 simulations to estimate anthropogenic sea level rise: We apply the same\
    \ methodology through, employing global mean temperature pathways from CMIP5 models.\"\
    \n"
  4: "Source material here. Damages. New York, New Jersey, and Connecticut collectively\
    \ reported more than $62.5 billion in repair, response, and restoration costs...so\
    \ nearly all Sandy costs can be treated as coastal flood damages. Based on total\
    \ ensemble estimates for ASLR, 13% (7.5\u201323%) of Sandy damages in the tri-state\
    \ area are attributable to climate-mediated anthropogenic sea level rise, amounting\
    \ to $8.1B ($4.7B\u2013$14B)...Hydrodynamic simulation, spatial bias correction,\
    \ and damage modeling are used...New York City, the sum of five New York counties,\
    \ saw $1.5B ($0.9B\u2013$2.5B) in damages attributable to total ensemble ASLR.\n"
  5: null
  6: "`\n\"Evaluation overview\": \"simulate coastal water levels, \uFB02ooding, and\
    \ damage in New York, New Jersey, and Connecticut, both as they occurred, and\
    \ as they would have occurred across a range of lower sea levels corresponding\
    \ to different estimates of attributable sea-level rise.\"\n\n\"Drivers of Risk\"\
    : \"additional exposure and damage of Hurricane Sandy driven by sea level rise\
    \ associated with anthropogenic climate change.\"\n\n\"Quantitative material\"\
    : \"gest minimum (\uFB01rst percentile) values of 1.1 and 1.2 mm/yr for anthropogenic\
    \ sea level rise over the century before Sandy for NE America44 and for New York\
    \ City27, corresponding to at least 12.3\u201313.4 cm of ASLR.\"\n\n\"Methodology\"\
    : \"budget approach... attribal fractions... develop three attribution scenarios:\
    \ high, central, and low\" and \"semi-empirical sea level model relates the rate\
    \ of global mean sea-level change dh/dt to global mean temperature T.\" \n\n\"\
    Highlights\": \"may be applied to other past and future coastal storms to estimate\
    \ sea-level-linked anthropogenic climate damages from those events and improve\
    \ estimates of the costs of climate change more broadly.\"\n"
  7: "yaml\nEvaluation overview: \"Property damage is calculated using the standard\
    \ HAZUS-MH method from the U.S. Federal Emergency Management Agency68, using the\
    \ same approach as utilized in ref. 69, which is described in detail in their\
    \ supplementary information.\"\nDrivers of Risk: \"Flood modeling. Hydrodynamic\
    \ \uFB02ood simulations are performed using the U.S. Army Corps of Engineers Coastal\
    \ Storm Modeling System (CSTORM-MS)53, exactly as performed for the North Atlantic\
    \ Coastal Comprehensive Study54 except using pre-2012 topography and bathymetry.\"\
    \ \"The Sandy historical run is implemented with a mean sea level offset of +10\
    \ cm...The ensemble of counterfactual runs includes mean sea level perturbations,\
    \ relative to the historical run, of \u221224, \u221220, \u221216, \u221214, \u2212\
    12, \u221210, \u22128, and \u22124 cm. This captures a broad range of possible\
    \ uncertainty in ASLR...\"\nQuantitative material: \"raw model results have a\
    \ bias of \u22121.2 cm and root mean square error (RMSE) of 35.5 cm. However,\
    \ there is a clear spatial correlation to the error (Supplementary Fig. 2, left\
    \ panel)...The resulting bias-corrected modeled maximum water levels have a reduced\
    \ mean bias of \u22120.1 cm and RMSE of 22.3 cm, and the error \uFB01eld has no\
    \ visible spatial correlation remaining (Supplementary Fig. 2, right panel).\"\
    \nMethodology: \"Hydrodynamic \uFB02ood simulations are performed using the U.S.\
    \ Army Corps of Engineers Coastal Storm Modeling System (CSTORM-MS)53...Property\
    \ damage is calculated using the standard HAZUS-MH method from the U.S. Federal\
    \ Emergency Management Agency68...In short, the damage calculation is based on\
    \ depth-damage curves, which denote the vulnerability of a speci\uFB01c asset\
    \ to different \uFB02ood depths...\"\nHighlights: \"Following ref. 15, we do not\
    \ interpret modeled damages directly, but rather use them to estimate the fraction\
    \ of damages attributable to ASLR. We then apply the fraction against total state-reported\
    \ costs to develop dollar value estimates of attributable damages. We distribute\
    \ state totals among counties in proportion to counties\u2019 modeled damages.\"\
    \nMore Notes: \"However, meticulous absolute damage estimates are not essential\
    \ to our analysis; rather, we aim to estimate relative damages among simulated\
    \ \uFB02oods starting from slightly different baseline sea levels, and this goal\
    \ aligns well with the emphasis on depth in the HAZUS-MH model.\"\n"
  9: "The authors used the U.S. DOE\u2019s Program for Climate Model Diagnosis and\
    \ Intercomparison which provides coordinating support and led the development\
    \ of software infrastructure in partnership with the Global Organization for Earth\
    \ System Science Portals.\n\nBenjamin Strauss, Scott Kulp, and Maya Buchanan were\
    \ supported by the Kresge Foundation and the George and Estelle Sands Foundation.\
    \ Benjamin Strauss, Robert Kopp, Scott Kulp, and Daniel Gilford were supported\
    \ by NSF grant ICER-1663807 and NASA grant 80NSSC17K0698. Philip Orton was supported\
    \ by NOAA award NA15OAR4310147 and NSF award 1855037. We thank Andrew Cox at Oceanweather\
    \ Inc. for providing their meteorological reanalysis data for Hurricane Sandy,\
    \ Chris Schubert, and Tom Suro (USGS) for providing data and interpretive guidance\
    \ concerning maximum \uFB02ood elevations. We thank Michael Oppenheimer for thoughtful\
    \ comments on the manuscript. We acknowledge the World Climate Research Programme\u2019\
    s Working Group on Coupled Modeling, which is responsible for CMIP, and we thank\
    \ the climate modeling groups (listed in Supplementary Table 5) for producing\
    \ and making available their model output."
