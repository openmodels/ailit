Evaluation overview:
  6: The page discusses the impact on discounted net benefits based on different discount
    rates and time horizons for a constant flow of $1000 USD per annum.
  7: The paper discusses the impact of extending the time horizon in cost-benefit
    analysis of public projects, particularly those with environmental benefits or
    costs, such as climate mitigation or adaptation projects.
Highlights:
  1: The time horizon of analysis can have a considerable impact on results, potentially
    more so than the discount rate.
  4: Long-term time horizons are critical for accurately capturing welfare impacts
    of projects, especially environmental ones like climate adaptation and emissions
    mitigation, to avoid bias towards current generation's consumption preferences.
  6: The paper demonstrates that lower discount rates significantly increase the present
    value of long-term benefits, aligning with examples like moving from a 7% to a
    1.4% discount rate increases net benefits by 79.07%.
  7: Extending the time horizon from 25 to 50 years at a constant 3% discount rate
    shows a greater impact on cost-benefit analysis results than reducing the discount
    rate to 1.4% or even to zero over a shorter period.
Methodology:
  1: The paper discusses the importance of setting a long-term time horizon (100+
    years) for cost-benefit analysis in projects with long-term environmental effects,
    such as climate change and ecosystem damages.
  4: CBA requires consideration of projects' impacts on welfare beyond just financial
    analysis, incorporating potential environmental externalities.
  6: Analysis uses different constant annual social discount rates (7%, 5%, 3%, 1.4%,
    and 0%) to evaluate the net benefits over up to 120 years.
  7: The paper advocates for longer time horizons in cost-benefit analysis to adequately
    account for long-term environmental benefits and avoided damages, suggesting that
    these may be more impactful than lowering discount rates.
More Notes:
  7: The analysis criticizes the use of short time horizons as introducing potential
    pessimism bias for environmentally beneficial projects and optimism bias for environmentally
    damaging ones, by failing to capture long-term impacts.
Quantitative material:
  6: Quantitative data is provided in Table 2, showing net benefits increasing significantly
    with lower discount rates over different time horizons.
sourcematerial:
  1: The paper states, "The issue of the time horizon of analysis is frequently overlooked.
    The framing of the time horizon has major implications, as environmental costs
    and benefits often accrue in the long-term." It further demonstrates that "the
    time horizon can have a considerable impact on results, even more substantial
    than the discount rate." It is also mentioned that "for projects with long-term
    environmental effects, such as those related to air pollution, climate change
    and ecosystem damages, it is recommended to use timescales of 100+ years for economic
    evaluation of the impact."
  4: 'The analysis emphasizes the importance of considering long-term time horizons
    in cost-benefit analysis (CBA) to capture environmental costs and benefits over
    multi-century timescales: "It is particularly pertinent for emissions mitigation
    and climate adaptation projects, which may have high initial capital investment,
    but generate long-term streams of benefits." "Theoretically, the welfare impact
    horizon, in terms of flow of costs and benefits, has a far longer timespan than
    either financial analysis, or indeed technical analysis, as the impacts are essentially
    infinite."


    Long-term time horizons are critical for accurately capturing welfare impacts
    of projects, especially environmental ones like climate adaptation and emissions
    mitigation, to avoid bias towards current generation''s consumption preferences:
    "A projects impacts could be direct and immediate, such as the safety and efficiency
    benefits of a rail transport project. However, there are also delays and inertia
    in some of the most important costs and benefits... impacts do not always present
    immediately, and... may even outlive the technical life of the project."


    CBA requires consideration of projects'' impacts on welfare beyond just financial
    analysis, incorporating potential environmental externalities: "In the practical
    process of implementing a CBA, the time horizon needs consideration early, at
    the scoping and screening stage. It is at this stage that the potential effects
    on the environment are identified, characterized and quantified, in advance of
    the economic evaluation."'
  6: '

    Evaluation overview: "Effect of time horizon and discount rates on constant long-term
    flow of $1000 USD per annum."

    Quantitative material: "Table 2\nEffect of time horizon and discount rates on
    constant long-term flow of $1000\nUSD per annum."

    Methodology: "To quantify the actual impact of the variety of the time horizons
    discussed above, the example of a constant annual benefit flow of $1000 is projected
    up to 120 years, in line with Quinet et al. To value these future benefits in
    the present, Social Discount rates of three, five and seven per cent, similar
    to the Congressional Budget Office (2003), are applied in a constant form. Added
    to this is a 1.4% discount rate, as applied to climate change by Stern (2007),
    and presented in Fig. 1."

    Highlights: "Over a 25-year period, moving from 7%, as the risky rate on private
    returns in the US, to their regulatory appraisal rate of 3%,15 increases net benefits
    by $5,723, or by 48.84%. Moving to the Stern discount rate of 1.4, or a zero discount
    rate, increases the discounted net benefits to $20,985 and $25,000 respectively.
    The estimated net benefits, are therefore increased by 79.07% and 93.92%, when
    moving to these lower discount rates, from the risky private discount rate of
    seven."

    '
  7: "The impact of the time horizon, in the case of the low single digit discount\
    \ rates, is even more significant than further reducing the discount rates. A\
    \ constant 3% rate extended from 25 to 50 years, has more impact on the results\
    \ than moving from 3% to 1.4%, or even to a zero discount rate. This has major\
    \ significance. [...] Moving to longer time horizons of analysis, to account for\
    \ more complete long-term impacts on welfare. [...] Shorter time horizons truncate\
    \ the necessary inclusion of long-term flows in the analysis. This is particularly\
    \ important for projects which generate damages, including through greenhouse\
    \ gas emissions [...]. Public investment projects, that seek improvement often\
    \ involve high up-front capital investments, with benefits to welfare spread out\
    \ over the long, and very long-term [...] this variety of challenges, a review\
    \ of Ireland developed what it termed a \u2018CBA sustainability package,\u2019\
    \ [...] These address the \u2018technical building blocks\u2019 of CBA and point\
    \ towards: a wider scope of costs and benefits [...]. The consequences of time\
    \ horizon length, for the economic analysis of public policies and projects, are\
    \ therefore defining. [...] Longer time horizons are required for the economic\
    \ analysis of environmental benefits, and avoided damages. [...] The work of Flyvberg\
    \ [...] a \u2018pessimism bias\u2019 for environmentally beneficial projects,\
    \ and an \u2018optimism bias\u2019 for those that are environmentally damaging.\
    \ This will occur where there is a failure to adequately include environmental\
    \ costs and benefits, through applying shorter, more financially-defined time\
    \ horizons."
