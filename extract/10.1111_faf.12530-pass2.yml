sourcematerial:
  3: 'Source material here: Species that migrate long distances or between distinct
    habitats [...] will lead to errant predictions of spatial distribution. Using
    future (2030-2090) SST projections to model focal stocks of fisheries importance
    we predict substantial ocean re-distribution in response to SST change. Predicted
    aggregate distributional changes do not follow a simple, poleward shift. Instead,
    we predict net movement into some ocean regions (British Columbia, central California)
    but net movement out of others (northern California, Washington). Distribution
    shifts have implications for both major fisheries and marine mammal predators
    of Chinook salmon. We focus on the consequences of spatial changes in ocean distribution,
    but our approach provides a general structure to link marine and freshwater components
    of anadromous species under climate change. We use a new spatio-temporal model
    jointly estimating the ocean distribution of all major fall-run Chinook salmon
    (Oncorhynchus tshawytscha, Salmonidae) stocks from California to British Columbia
    over 40 years. We model hundreds of millions of tagged individuals, finding that
    different stocks have fundamentally different ocean distributions, distinct associations
    with sea surface temperature (SST), and contrasting distributional responses to
    historical ocean SST variation.'
  6: '`

    simply shift their marine habitat in response to ocean conditions and therefore
    they may be particularly susceptible to climatic changes...analyses conducted
    at the species-level will therefore confound changes in ocean distribution with
    both the covariation in abundance among component salmon stocks...Fisheries for
    Chinook salmon predominantly target a subset of stocks from particular river systems
    and so aggregate measures of Chinook salmon catch are not reliable indicators
    of coast-wide abundance or distribution... previous studies have indicated a lack
    of annual variation in broad-scale Chinook salmon ocean distributions... However,
    estimates of ocean habitat based on thermal tolerance have suggested strong changes
    to suitable ocean habitat in a warming ocean across the north Pacific Ocean...study
    of a single stock distributed along the California and Oregon coasts showed a
    relationship between fishery contact rates and water temperature... Existing rigorous
    descriptions of ocean distribution are dependent upon recoveries of tagged fish
    captured in fisheries... To our knowledge, no systematic survey spans the entire
    oceanic range of any salmon species...

    '
  7: "Source material here: 124 Here, we provide a large-scale, integrated estimate\
    \ of how Chinook salmon ocean distributions of individual stocks respond to a\
    \ variation in ocean conditions. 131 We then use future projections of the ocean\
    \ temperature to generate predictions of ocean distribution for six of the largest\
    \ fall-run Chinook salmon stocks, and provide estimates of each stock\u2019s association\
    \ with SST. 138 We present an overview of the model and data here with an emphasis\
    \ on the specific methods relevant for estimating spatial distributions. 141 We\
    \ constructed a Bayesian state-space model to track the spatio-temporal population\
    \ dynamics of 1,400 tagged groups of Chinook salmon representing fish from 16\
    \ distinct origins between 1979 and 2015."
