  16: "yaml\nEvaluation overview: \"Chinook salmon support major commercial, charter,\
    \ and recreational \uFB02eets across their range as well as being a major prey\
    \ item for marine mammal predators... Predicted shifts in ocean distributions\
    \ will result in changing availability of Chinook salmon to ocean \uFB01sheries.\"\
    \nDrivers of Risk: \"We predict that changes in the distribution of Chinook will\
    \ result in di\uFB00erential availability of Chinook salmon to resource users\
    \ in the future.\"\nQuantitative material: \"Predicted changes in abundance can\
    \ be substantial for an individual ocean region (in some cases an approximate\
    \ 25% change over current abundances).\"\nMethodology: \"We emphasize that our\
    \ results are not inclusive of all Chinook salmon populations present in these\
    \ waters and so are not a complete picture of all Chinook salmon in these waters,\
    \ but they do represent a majority of individuals in many ocean \uFB01sheries\
    \ (see below) and suggest that individual shifts in stock ocean distribution will\
    \ translate to substantial shifts in aggregate abundance.\"\nHighlights: \"We\
    \ show that predicted shifts in abundance are not straightforward, with both northern\
    \ ocean regions (northern British Columbia) and southern ocean regions (central\
    \ California) predicted to have increased abundance while in between there are\
    \ ocean regions of predicted decline (northern California, Washington), and others\
    \ with almost no change (Oregon, southern British Columbia, Alaska).\"\nMore Notes:\
    \ \"Major commercial \uFB01sheries exist in each state and province and di\uFB00\
    erent permits are required to participate in \uFB01sheries in di\uFB00erent states\
    \ and provinces; \uFB01shers cannot easily relocate from, say, Washington to British\
    \ Columbia or from California to Washington to track shifting Chinook salmon abundance.\"\
    \n"
