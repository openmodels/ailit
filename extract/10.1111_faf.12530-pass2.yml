  18: "\nOur results also have general implications for estimating suitable or optimal\
    \ habitat based on observed relationships between SST and abundance and for projecting\
    \ distributional change under oceanographic change. Many studies attempt to identify\
    \ the relationship between SST and estimates of abundance which use this relationship\
    \ to project distribution under future ocean conditions (e.g. Abdul-Aziz et al.,\
    \ 2011; Cheung et al., 2010; Cheung & Fr\xF6licher, 2020). SST is one of the main\
    \ oceanographic covariates used in such analyses (e.g. Hazen et al., 2018; Rogers\
    \ et al., 2019). We show that the weighted mean SST varied among stocks by 2.7\
    \ C, suggesting there is not a fundamental, physiologically driven SST that universally\
    \ predicts Chinook salmon abundance and occurrence. Conducting a species-level\
    \ analysis that ignores stock-specific differences in distribution (e.g. Abdul-Aziz\
    \ et al., 2011; Cheung & Fr\xF6licher, 2020) would yield errant projections of\
    \ future distribution. SST may not be a particularly good descriptor of the true\
    \ environmental signal they are tracking. We anticipate using alternative environmental\
    \ covariates in or different mathematical forms for equation 2 to improve estimates\
    \ of Chinook salmon ocean distribution. Retrospective analyses of ocean biogeochemical\
    \ models may be useful in expanding the suite of variables available to ocean\
    \ distributions and environmental variables as they have in other ocean regions\
    \ (e.g. Fernandes et al., 2020).\n"
  23: "\n566   https://doi.org/10.1007/s10109-011-0154-8\n567   Finstad,    A.   G.,\
