Methodology:
  3: Uses a new spatio-temporal model jointly estimating the ocean distribution of
    all major fall-run Chinook salmon stocks from California to British Columbia over
    40 years; Uses future (2030-2090) SST projections
  6: The analysis relies on recoveries of tagged fish captured in fisheries and discusses
    potential confounding factors in identifying distributional shifts.
  7: A Bayesian state-space model is constructed to track the spatio-temporal population
    dynamics of tagged groups of Chinook salmon, using data on recapture of coded
    wire tagged salmon and incorporating uncertainty explicitly.
  8: The model uses ocean region, season, and fishery where recovery occurred as well
    as information about the fisheries effort and catch sampling for CWT to infer
    biological processes.
  10: Proportional occurrence in ocean regions is made to vary with sea surface temperature
    via a specified model.
  11: Predictions for the Salish Sea regions are derived by using the average predicted
    offset from other ocean regions.
  12: The study uses a joint distribution of abundances across salmon stocks to account
    for covariation in abundance. It apportions each stock's total abundance among
    different ocean regions based on estimated proportional distribution corresponding
    to current and future SST. The analysis draws 1,000 samples from the posterior
    distribution of the proportion and 1,000 draws from the abundance distribution
    to propagate uncertainty. The analysis is applicable to the years 2030, 2050,
    and 2070.
  13: A population dynamics model was used to estimate ocean distribution as a function
    of SST. The model was applied to six focal stocks.
  14: Processes combine historical abundance estimates with predicted changes in ocean
    distribution to analyze shifts under future SST conditions.
  15: Integrated data sources spanning over 25 degrees of latitude and 40 years. Married
    stock-specific distributions with future temperature projections and estimates
    of abundance to predict distributional shifts.
  16: Modeling of Chinook salmon distribution changes based on ocean conditions, not
    inclusive of all Chinook salmon populations.
  17: The analysis assumes the abundance of salmon stocks is represented by abundance
    in recent decades (1983 to present) to isolate the effects of ocean climate. The
    model depends on data from hatchery-origin fish.
  18: Examines the relationship between SST and Chinook salmon abundance to project
    distribution under future ocean conditions; finds that using stock-specific distributions
    is more accurate than species-level analysis.
