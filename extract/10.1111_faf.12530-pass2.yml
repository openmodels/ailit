Quantitative material:
  3: Predicted substantial ocean re-distribution in response to SST change. Predicted
    aggregate distributional changes do not follow a simple, poleward shift. Predict
    net movement into some ocean regions (British Columbia, central California) but
    net movement out of others (northern California, Washington).
  10: Uses SST anomaly data (deviation from average SST) to determine the effect of
    this deviation on ocean distribution.
  11: Predicted average temperature anomalies are calculated for each season-ocean
    region in ten-year blocks centered on 2030, 2050, 2070, and 2090. The paper uses
    stock-specific abundance estimates from PFMC and CTC.
  12: The paper projects proportional changes in salmon abundance for each stock and
    overall change in aggregate abundance for 2030, 2050, and 2070.
  13: "Coastwide median pairwise correlations of 0.47 between historical temperature\
    \ deviations, with some adjacent ocean regions having correlations greater than\
    \ 0.90. Future average ocean conditions during the summer are generally comparable\
    \ to extreme El Ni\xF1o events observed since 1982, though by 2070 most average\
    \ temperature anomalies are expected to exceed SST observed since 1982 especially\
    \ in the northern portion of the range. "
  14: Median weighted mean SST ranges nearly 2.7 C from 9.5 C to 12.2 C among stocks.
    Within a given stock, the weighted mean SST among years varied from 1.7 C up to
    3.1 C. Six stocks contribute about 1.2 million maturing adults a year (sd = 0.52
    million; range 0.50 - 2.33 million).
  15: 'Quantitative predictions are provided for changes in abundance: increases in
    central California by 21%, decreases in northern California by 33%, and a potential
    decline in Washington by 24%.'
  16: Predicted changes in abundance can be approximately 25% over current levels
    for certain regions.
