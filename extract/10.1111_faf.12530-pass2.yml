Methodology:
  3: Uses a new spatio-temporal model jointly estimating the ocean distribution of
    all major fall-run Chinook salmon stocks from California to British Columbia over
    40 years. Models hundreds of millions of tagged individuals.
  6: The page critiques methods used to estimate salmon ocean distribution, including
    reliance on fisheries data and species-level analyses, and highlights the limitations
    of these approaches due to confounding factors like fisheries effort and stock
    abundance.
  7: Analysis is performed using a Bayesian state-space model to track spatio-temporal
    population dynamics from 1979 to 2015, using recapture data of tagged Chinook
    salmon across various fisheries.
  10: Uses Optimum Interpolation Sea Surface Temperature (OISST) dataset (1982-2015)
    to derive season-specific temperature series for ocean regions, supplementing
    with direct observations for the Salish Sea. Calculates anomalies by subtracting
    the among-year mean. Predicts future SST using the Max Planck Institut Earth System
    Model (MPI-ESM-MR) under the RCP4.5 scenario to project ocean distributions.
  11: "The study uses sea surface temperature (SST) projections from the MPI45 model\
    \ (years 2025-2100) and compares them to SST from 1982-2005 to create temperature\
    \ anomalies.  The study combines distribution estimates with annual abundance\
    \ estimates for spawning or in-river returns of focal stocks. They used information\
    \ from the Paci\uFB01c Fisheries Management Council (PFMC) or from the Paci\uFB01\
    c Salmon Commission\u2019s Chinook Technical Committee (CTC)."
  12: "The paper uses a joint distribution of abundances across stocks and apportions\
    \ each stock's abundance among different ocean regions using estimated proportional\
    \ distribution based on current and future SST. The analysis uses 1,000 samples\
    \ from the posterior distribution of \u03B8 and 1,000 draws from the abundance\
    \ distribution. The data used is OISST data from 1982-2015 and projected temperatures\
    \ for 2030, 2050, 2070, and 2090."
  13: A population dynamics model was used, incorporating over 756,000 observations
    of presence/absence and 47,000 of positive CWT recoveries. The model estimated
    distributional variation as a function of SST.
  14: Historical abundance estimates of spawning Chinook salmon are combined with
    predicted changes in ocean distribution to understand how aggregate abundance
    may shift in response to projected oceanic conditions; analysis based on SST from
    1982-2015 and projections for 2030 and 2070.
  15: The analysis integrates data over 25 degrees of latitude and 40 years, combining
    stock-specific distributions with SST projections to predict future shifts.
  17: The analysis is based on simulations assuming the abundance of focal stocks
    is represented by recent decades' values and uses data from hatchery-origin fish.
  18: The analysis uses sea surface temperature (SST) deviations as covariates in
    their models to estimate Chinook salmon ocean distribution.
