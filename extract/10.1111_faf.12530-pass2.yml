Highlights:
  3: Different stocks have fundamentally different ocean distributions, distinct associations
    with sea surface temperature (SST), and contrasting distributional responses to
    historical ocean SST variation.
  6: The page suggests that historical studies indicate little annual variation in
    broad-scale Chinook salmon ocean distributions, but thermal tolerance models suggest
    strong changes to suitable ocean habitat in a warming ocean.
  10: Calculates a weighted mean SST to characterize the SST associated with each
    stock in each year, using proportional distribution as weights. This allows comparison
    of SST association among stocks.
  12: Summer and fall SST patterns exhibit a trough in the southern portion of the
    range along the coast of northern California.
  13: Ocean distributions shifted north in warm years (1997) relative to cool years
    (2008) for Klamath (NCA) and four Columbia River stocks (LCOL, MCOL, SNAK, URB).
    The six stocks broadly followed their average distribution with a constrained
    amount of variability in response to SST.
  14: "Future average summer ocean distribution for all stocks in 2030 and 2070 appears\
    \ generally similar to the distribution of a strong El Ni\xF1o year (1997). Northern\
    \ British Columbia is predicted to remain stable or increase for all stocks, and\
    \ northern California is predicted to decrease. Ocean regions have stock-speci\uFB01\
    c patterns of loss and gain in their ocean distribution."
  15: Key outcomes show varied stock-specific responses to SST; for example, the SFB
    stock shifts southward, MCOL shifts northward, and URB shows minimal response.
  16: Shifting distributions will affect availability of Chinook salmon to fisheries,
    impacting fishing practices.
  17: The paper highlights the potential need for integrating ocean distribution information
    in fishery management scenarios in a warming ocean.
  18: The study indicates that stock-specific differences in ocean distribution should
    not be ignored when projecting future distributions as it may lead to errors.
