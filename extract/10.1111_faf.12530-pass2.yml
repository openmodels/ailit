  10: "Source material here.\nSpeci\uFB01cally, we used the Optimum Interpolation\
    \ Sea Surface Temperature (OISST) dataset to derive season speci\uFB01c temperature\
    \ series for each ocean region from 1982 to 2015 (Banzon et al., 2016; Reynolds\
    \ et al., 2007). OISST did not provide reasonable temperature estimates for the\
    \ Salish Sea, so we supplemented our data with direct observations of SST in those\
    \ ocean regions (see Supplement S3).\nWe used a global circulation model (GCM)\
    \ - the medium resolution Max Planck Institut Earth System Model (Giorgetta et\
    \ al., 2013; Jungclaus et al., 2013) - to provide predicted temperatures for SST\
    \ for each season and ocean region. We used predictions from the RCP45 scenario\
    \ (hereafter MPI45; see Edenhofer et al., 2014) and mapped predictions to our\
    \ 14 ocean regions outside the Salish Sea (see Supplement S3).\nWe calculated\
    \ an anomaly for each ocean region-season combination by subtracting the among\
    \ year mean so that each ocean region(l)-season(s)-calendar year(c) combination,Tl,s,c,\
    \ had a time-series average of zero (Fig. 1).\nWe estimated a coe\uFB03cient for\
    \ each stock-ocean region-season,\u03C8r,l,s, and therefore made proportional\
    \ occurrence in ocean regions vary with SST,\n"
  11: "Source material: We calculated season-ocean region means of SST from the 1982\u2013\
    2005 period from the M PI45 and then di\uFB00er-enced that mean from the future\
    \ projections in the MPI45 model (years 2025\u20132100) to produce temperature\
    \ anomalies for each season-ocean region. We then summarized predicted average\
    \ temperature anomalies for each season-ocean region in ten-year blocks centered\
    \ on 2030, 2050, 2070, and 2090. To understand how changes in SST may shift the\
    \ abundance of Chinook salmon among ocean regions, we needed to combine our estimates\
    \ of distributions (the proportion of the total ocean population of each stock\
    \ in each ocean region) with estimates of stock-speci\uFB01c abundance. After\
    \ examin-ing the predictions for the non-Salish Sea ocean regions, we elected\
    \ to use the average predicted o\uFB00set from these 14 regions as the o\uFB00\
    set for each of the three Salish Sea regions. To understand how changes in SST\
    \ may shift the abundance of Chinook salmon among ocean regions."
  12: "Source material here.\n- \"To estimate ocean region-specific abundances, we\
    \ first drew abundances from each stock from a joint distribution of abundances\
    \ across stocks, to account for the observed covariation in abundance among stocks\
    \ (Supplement S4). We then apportioned each stock\u2019s total abundance among\
    \ the different ocean regions using the estimated proportional distribution (the\u03B8\
    s) corresponding to the current average (T = 0) and future SST for 2030, 2050,\
    \ and 2070.\" (Methodology)\n- \"We summarized both the proportional change in\
    \ abundance for each stock and the overall change in predicted aggregate abundance.\"\
    \ (Quantitative material)\n- \"Oceanography: We illustrate latitudinal patterns\
    \ in ocean temperature by season from OISST data for our 14 ocean regions (1982-2015;\
    \ excluding the three Salish Sea regions: SJDF, PUSO, SGEO; Fig. 1). Of particular\
    \ interest is that while the winter and spring seasons show the expected spatial\
    \ trend - declining SST from south to north - the summer and fall patterns exhibit\
    \ a notable trough in SST in the southern portion of the range along the coast\
    \ of northern California (regions MEN, NCA).\" (Highlights)\n"
