More Notes:
  3: The study focuses on the consequences of spatial changes in ocean distribution,
    linking marine and freshwater components of anadromous species under climate change.
    The study predicts distributional changes for focal stocks of fisheries importance
    using future (2030-2090) SST projections.
  10: The analysis focuses on 14 ocean regions (excluding the Salish Sea when using
    the global circulation model). The study uses the RCP4.5 scenario as it is considered
    a likely future of global carbon emissions.
  14: Predictions for 2070 are more uncertain than for 2030 because the SSTs are predicted
    to mostly exceed the observed range of temperatures from 1982-2015.
  17: The study notes the complexity of managing Chinook salmon due to the involvement
    of various management bodies and the lack of explicit ocean distribution models
    in current management.
  18: SST may not be the best descriptor of the true environmental signal Chinook
    salmon are tracking; other variables such as temperature, salinity, and productivity
    might be more relevant.
