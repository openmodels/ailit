Highlights:
  3: Different Chinook salmon stocks have fundamentally different ocean distributions,
    distinct associations with SST, and contrasting distributional responses to historical
    ocean SST variation; Predicted aggregate distributional changes do not follow
    a simple, poleward shift; Distribution shifts have implications for both major
    fisheries and marine mammal predators of Chinook salmon
  6: Potential for shifts in Chinook salmon distributions due to climate change, but
    historical data suggest little annual variation in broad-scale distributions.
  8: The model accounts for all processes affecting CWT recoveries simultaneously
    for all ocean regions and seasons.
  12: Summer and fall SST patterns exhibit a notable trough in SST in the southern
    portion of the range along the coast of northern California.
  13: "Future average ocean conditions during the summer are generally comparable\
    \ to extreme El Ni\xF1o events observed since 1982. In warm years, ocean distributions\
    \ of several fish stocks shifted north relative to cool years."
  14: Northern British Columbia is predicted to remain stable or increase in fish
    stock, while northern California is expected to decrease.
  15: Individual stocks vary substantially in their current distribution, have stock-specific
    relationships to SST, and respond meaningfully to observed historical SST variation.
    Estimated responses to SST are not uniform in direction or magnitude, with some
    stocks shifting southward, some northward, and some showing minimal response.
    Southerly distribution shift of the abundant SFB stock.
  16: Chinook salmon abundance is predicted to increase in northern (northern British
    Columbia) and southern (central California) ocean regions, while declining in
    between (northern California, Washington), with almost no change in others (Oregon,
    southern British Columbia, Alaska).
  17: Integrating ocean distribution information into fisheries management is warranted
    in a warming ocean. The model provides a framework that can link changes in freshwater
    productivity and hatchery practices to ocean distribution and availability.
  18: Stock-specific differences in Chinook salmon distribution suggest that a single
    SST value does not universally predict abundance; species-level analysis can lead
    to errant projections of future distribution; SST may not be the best descriptor
    of environmental conditions influencing salmon distribution.
