Drivers of Risk:
  1: Increasing demand for space heating and cooling driven by factors like affluence
    and climate conditions.
  4: Local climate conditions are highlighted as impacting building U-values, with
    colder regions such as OECD and Reforming Economies projected to have lower U-values
    due to higher heating demand.
  5: Local climate characteristics impact heating and cooling demand; transitions
    from fans to air-conditioning drive cooling demand increase.
  6: Both warming and climate policy changes impact energy demand and emissions, with
    increased appliance and building efficiency investments.
  7: Changes in cooling and heating technologies and building insulation impact energy
    demand and emissions.
  8: Heating and cooling demand, local climate characteristics (warmer regions may
    not benefit significantly from marginal insulation improvements).
  9: The paper identifies factors such as extreme weather events and the heat island
    effect as stressors that may impact residential energy demand.
  10: Examines how regions with higher space heating demand benefit from improved
    insulation and electrification of heating.
Evaluation overview:
  1: Evaluation of energy efficiency improvement and technology choice for emissions
    reduction in the residential sector.
  4: The paper evaluates the development of building stocks and insulation efficiency
    in different regions, focusing on final energy use and emissions.
  5: Focuses on changes in residential floorspace and building envelope efficiency
    over time in various regions.
  6: The paper evaluates energy demand and emissions for residential heating and cooling
    under different climate scenarios.
  7: This paper evaluates energy demand and emissions in the residential sector, considering
    factors like heating, cooling, cooking, and appliances.
  8: No relevant information
  9: The paper provides insights on the potential role of technology and energy efficiency
    decisions in reducing energy demand and emissions from residential heating and
    cooling.
  10: Discusses the balance between improvements in heating/cooling efficiency and
    building envelope efficiency, emphasizing energy cost implications for the residential
    sector.
Highlights:
  1: Direct residential emissions are nearly eliminated by 2100 through combined measures.
  2: The study investigates the interplay between building envelope efficiency improvement,
    heating/cooling technology choice, and investment in rooftop PV.
  3: Investments in insulation and rooftop PV are more competitive in regions with
    higher electricity costs and irradiance, and for wealthier households with lower
    discount rates.
  4: Investments in building envelope efficiency are increasing over time, particularly
    in the OECD and Asia. The greatest differences between Baseline and 2/C14 C scenarios
    occur in colder regions due to their climate conditions.
  5: Cooling demand is projected to increase significantly in Asia, the Middle East
    & Africa, and Latin America due to rising incomes and air-conditioning adoption.
  6: "The 2\xB0C scenario leads to a significant reduction in final energy demand\
    \ for both heating and cooling compared to the Baseline."
  7: Neither insulation nor technology change dominates energy and emission mitigation
    efforts; an equilibrium is reached where improved heating/cooling efficiency and
    building envelope efficiency are applied. Electrification of heating in OECD,
    Reforming Economies, and Asia leads to steep declines in direct emissions. More
    efficient air-conditioning units in warmer regions play a very important role.
  8: Decarbonization of the residential sectors depends on a synergistic use of both
    improvements in thermal insulation and technological improvements in heating and
    cooling. Renovations lead to a modest improvement on total energy demand, particularly
    in the OECD.
  9: Fuel switching accounts for more than half of emission reduction, and the paper
    emphasizes the importance of investments in efficient building envelopes and the
    transition to electrified heating in reducing direct emissions in the buildings
    sector.
  10: Improved heating/cooling efficiency and building envelope efficiency reduce
    energy demand, benefiting richer households more due to their ability to invest
    in efficiency measures and rooftop PV.
Methodology:
  1: Analysis using a regional energy system model with explicit representation of
    residential energy use and building stocks.
  2: The model explicitly represents 26 world regions with different climatic and
    socio-economic conditions, as well as five income quantiles.
  3: Energy demand is modeled based on floor space, heating/cooling degree days, population,
    and historical data on energy usage and building efficiency, with projections
    linked to changes in these factors.
  4: Regional projections are made using the IMAGE model, with scenarios assessing
    the impact of carbon prices and insulation on energy use and emissions across
    six aggregated regions.
  6: "The analysis compares energy demand and emissions under a Baseline scenario\
    \ and a 2\xB0C warming scenario."
  7: The analysis is performed using the TIMER-REMG model, part of the IMAGE (IAM),
    which is a recursive system-dynamic model. The model projects energy demand and
    emissions in the residential sector until 2100.
  8: The TIMER-REMG model was calibrated to reflect historic (1971-2018) data on final
    regional residential final energy demand. Floorspace, household size, appliance
    and air-conditioning ownership, and heating fuel demand are calibrated for each
    region and income level, subject to data availability.
  9: The analysis is performed using the updated TIMER-REMG model that incorporates
    building-stock turnover, regional climate characteristics, and economic decision
    making.
More Notes:
  6: "Under the 2\xB0C scenario, heating from fossil fuels is completely phased out,\
    \ and direct emissions drop to near zero due to electrification."
  8: The results show projections for secondary energy demands and emissions related
    to heating and cooling across various global regions from 2020 to 2050 under various
    scenarios, including baseline, renovation/insulation effects, and mitigation strategies.
Quantitative material:
  1: Projected global heating demand decreases by 27% by 2050 and 66% by 2100; cooling
    demand increases by 176% by 2050 and 286% by 2100.
  4: Projected U-values for Canada and Russia are expected to reach below 0.5 W/m2/K
    by 2100. Global renovation investments in 2030 are 127.7 B$ in the 2/C14 C scenario
    compared to 106.9 B$ in the Baseline.
  5: Annual investments in residential building envelope efficiency improvements and
    renovation rates are detailed for multiple regions and scenarios.
  6: "The 2\xB0C scenario shows heating demand falling by 18% and 53% in 2050 and\
    \ 2100, respectively, compared to the Baseline. Cooling demand falls by 5% and\
    \ 46%."
  7: The use of electricity, district heating, or hydrogen as heating fuels can more
    than double direct emissions by 2100 in the Baseline scenario. In the 2/C14 C
    scenario, indirect emissions can go negative after 2050 due to renewables and
    bioenergy with carbon capture and storage. Insulation in new buildings accounts
    for most of the reduction in secondary energy demand.
  8: Energy demand can be reduced from current levels through the use of advanced
    technologies. The extent of required insulation improvements depends on local
    climate. In the Dutch building sector, increasing the insulation levels of the
    entire stock would lead to a reduction in heating demand between 7 and 27%.
  9: "Investments in insulation are expected to increase to more than $450 billion\
    \ per year by 2050, with global heating demand expected to decrease by 27% by\
    \ 2050 and 66% by 2100 in a 2\xB0C scenario."
  10: Notes potential for households to become net producers of 8 EJ/yr of electricity
    in 2050, increasing to 40 EJ/yr in 2100.
sourcematerial:
  1: " \n\"The residential sector currently accounts for one \uFB01fth of global energy\
    \ use and corresponding greenhouse gas emissions, largely driven by increasing\
    \ demand for space heating and cooling. ...This sector in long-term decarbonization\
    \ pathways is explored. The projections show that in a 2/C14 C sce-nario, global\
    \ heating demand is expected to decrease from current levels by 27% and 66% by\
    \ 2050 and 2100, respectively. However, due to increasing af\uFB02uence in warmer\
    \ regions, cooling demand is expected to increase by 176% and 286% respectively.\
    \ Yet, direct residential emissions are almost eliminated by 2100 by combining\
    \ increased envelope ef\uFB01ciency and advanced heating technologies in a synergistic\
    \ manner...\"\n"
  2: "The analysis uses an updated version of the TIMER energy system model, which\
    \ forms the energy system component of the IMAGE Integrated Assessment Model (IAM)\
    \ [19]. TIMER is a recursive dynamic energy system model representing the global\
    \ energy system, projecting developments in energy supply, conversion, and demand\
    \ [20,21]. [...] For the residential sector, a stylized bottom-up sub-model (REMG)\
    \ uses the above drivers to project changes in household size, \uFB02oorspace,\
    \ and the \uFB01nal energy demand for \uFB01ve end-use functions: cooking, lighting,\
    \ space heating, space cooling, water heating, and appliances. The model has an\
    \ explicit representation of 26 world regions with different climatic and socio-economic\
    \ conditions, as well as \uFB01ve income quantiles for urban and rural households.\
    \ Thus, TIMER-REMG captures the different energy use characteristics and investment\
    \ motivations of 260 representative households. [...] The present study a techno-economic\
    \ analysis of the global residential sector and its long-term pathways consistent\
    \ with the Paris Agreement for different world regions was conducted. Using the\
    \ recursive dynamic energy system model TIMER (part of the IMAGE 3.2 IAM) the\
    \ interplay between - and adoption of - three key mitigation measures: building\
    \ envelope ef\uFB01ciency improvement, heating/cooling technology choice, and\
    \ investment in rooftop PV was investigated. [...] Thus, the model is able to\
    \ appropriately represent the drivers and constraints of ef\uFB01ciency improvements\
    \ in the residential sector, the implications of building stock legacy, socioeconomic\
    \ and climate conditions, and the interaction with the remaining energy system."
  3: "text\nusing a multinomial logit function. Regional climate characteristics affect\
    \ both the techno-economic parameters of insulation levels... These supply curves\
    \ allow for a household investment decision to either buy electricity from the\
    \ grid or invest in a PV system. A multinomial logit equation was used to determine\
    \ the share of residential electricity demand... Space heating demand is modeled\
    \ as a function of \uFB02oorspace (m2/capita), population (capita), and heating\
    \ degree days (HDD)... The useful heating demand intensity (kJ/m2/HDD) was calibrated\
    \ to historic U-values and energy use for space heating. Its future development\
    \ was linked to the improvements in building envelope ef\uFB01ciency... investing\
    \ in rooftop PV bene\uFB01ts from larger households, locations with higher irradiation,\
    \ higher electricity demand, relatively higher costs of grid-based electricity,\
    \ and lower discount rates enjoyed by wealthier households... Accordingly, these\
    \ additional costs increase the competitiveness of higher insulation levels due\
    \ to their lower heating/cooling demands.\n"
  4: "Source material here.\nEvaluation overview: \"This paper focuses on results\
    \ concerning \uFB01nal energy use per year (EJ) and emissions (GtCO2/yr).\"\n\
    Drivers of Risk: \"The projections also show the importance of local climate conditions.\
    \ While there is some long-term convergence of regional U-values, colder regions\
    \ (OECD, Reforming Economies) are projected to have lower values... as heating\
    \ demand forms a significant financial burden.\"\nQuantitative material: \"Canada\
    \ and Russia reach U-values below 0.5 W/m2/K by 2100, which is typically regarded\
    \ as a very high efficiency building envelope... Global investments in renovation\
    \ are projected to be 127.7 B$ in 2030 (i.e. a 19% increase compared to the Baseline)\
    \ ...\"\nMethodology: \"Regional definitions are provided in the Supplementary\
    \ Material. Numerical results across 26 regions are available in the Supplementary\
    \ Data.\"\nHighlights: \"In the 2/C14 C scenario, cumulative investments in insulation\
    \ in renovations and new constructions increases across all regions... The greatest\
    \ difference between the Baseline and 2/C14 C scenarios are in the OECD and Reforming\
    \ Economies regions. This is because of their colder climates and higher household\
    \ expenditures.\"\n"
  5: "yaml\nEvaluation overview: \"Changes in residential \uFB02oorspace over the\
    \ projection period (left axis), and changes in building envelope ef\uFB01 ciency\
    \ (U-value, right axis) in Baseline and 2/C14 C scenarios.\"\nDrivers of Risk:\
    \ \"As expected, total heating and cooling demand depends a lot on local climate\
    \ characteristics...Combined with growing \uFB02oorspace, Latin America e due\
    \ to increasing incomes and overall \uFB02oorspace...This is due to the expectation\
    \ that the many households in these regions will reach household expenditures\
    \ which will allow them to transition from the use of fans to larger air-conditioning\
    \ units to meet their cooling demands.\"\nQuantitative material: \"Table 2 Annual\
    \ investemtens in residential building envelope ef\uFB01 ciency (renovations and\
    \ new buildings) and average renovation rates. Investments for renovations only\
    \ shown in brackets...lists specific investment amounts.\"\nHighlights: \"Contrastingly,\
    \ cooling demand is projected to increase across all regions, with the increase\
    \ being particularly pronounced in Asia, the Middle East and Africa, and Latin\
    \ America.\"\n"
  6: "Source material: In the 2/C14 C scenario, \uFB01nal energy demand for both heating\
    \ and cooling drops signi\uFB01cantly compared to the Baseline. Emission prices\
    \ also drive fuel switching towards cleaner and more ef\uFB01cient heating fuels,\
    \ particularly electric resistance heaters and heat pumps, further driving down\
    \ \uFB01nal energy demand. Compared to \uFB01nal energy demand today, in the 2/C14\
    \ C scenario global heating demand is expected to decrease by 27% and 66% by 2050\
    \ and 2100 respectively. On the other hand, cooling demand is expected to increase\
    \ by 176% and 286% respectively, but lower than the projected increase in the\
    \ absence of climate policy. Since in the 2/C14 C scenario long-term heating is\
    \ almost completely electri\uFB01ed (with some use of district heat or hydrogen),\
    \ direct emissions drop to near zero. "
