Drivers of Risk:
  1: Increasing demand for space heating and cooling, increasing affluence in warmer
    regions
  2: Climatic conditions across 26 world regions
  3: Regional climate characteristics affect the techno-economic parameters of insulation
    levels, as well as heating/cooling costs. Cooling demand is a function of cooling
    degree days (CDDs).
  4: Local climate conditions, with colder regions facing a higher financial burden
    for heating.
  5: Local climate characteristics influence heating and cooling demand.
  6: The primary driver of risk is climate change, specifically the impact on heating
    and cooling demands due to changing temperatures and local climatic conditions.
    Emission prices also act as a driver, influencing fuel switching and efficiency
    improvements.
  7: The paper highlights that increased temperatures lead to a larger increase in
    residential floorspace in the Middle East and Africa, and Asia, which benefit
    more from improved insulation in new buildings.
  8: Changes impacting outcomes include energy demand increases and the effects of
    renovations and mitigations through insulation and technological advancements.
  9: Regional climate characteristics, extreme weather events, heat island effect.
  10: Emission prices, space heating demand, cooling demand, household expenditures,
    solar irradiation.
Evaluation overview:
  1: Residential energy use and corresponding greenhouse gas emissions
  2: No relevant information
  3: No relevant information
  4: The paper focuses on final energy use per year and emissions from residential
    sectors across six aggregated regions.
  5: No relevant information
  6: This study evaluates the impact of climate change scenarios on final energy demand
    for residential heating and cooling and associated direct emissions.
  7: No relevant information
  8: The page provides an overview of energy use and emissions related to heating
    and cooling, focusing on mitigation strategies through insulation and technology
    improvements.
  9: Residential energy demand and emissions from heating and cooling.
  10: Energy use and emissions of the residential sector.
Highlights:
  1: Increased envelope efficiency and advanced heating technologies can synergistically
    reduce residential emissions. Combining these measures with rooftop PV can lead
    to net-zero energy demand for many household types. Residential sector strategies
    vary across local climate, socio-economic, and building stock characteristics.
  2: The residential energy demand module (TIMER-REMG) explicitly accounts for development
    of residential building stocks, socio-economic heterogeneity of households, and
    climatic conditions across 26 world regions.
  3: All scenarios assume the same climate, thus climate feedbacks on energy demand
    and supply do not differ across scenarios, isolating economic effects of climate
    policy.
  4: Greatest improvements in building U-values projected in Asia and the Middle East
    & Africa due to initial inefficiencies and increased floorspace.
  5: Cooling demand is projected to increase across all regions, particularly in Asia,
    the Middle East and Africa, and Latin America, due to increased household expenditures
    allowing a transition to air conditioning.
  6: "Under the 2\xB0C scenario, global heating demand is projected to significantly\
    \ decrease while cooling demand increases, but at a lower rate than without climate\
    \ policy. Direct emissions from heating are expected to drop to near zero due\
    \ to the phasing out of fossil fuels and electrification."
  7: Increased insulation in new buildings accounts for most of the reduction in secondary
    energy demand on a global scale. The model highlights that neither insulation
    nor technology change dominates energy and emission mitigation efforts, but rather
    an equilibrium is reached.
  8: Key outcomes include the finding that complete decarbonization of the residential
    sector is achievable through increased electrification and decarbonization of
    electricity supply.
  9: Investments in insulation reduce residential heating and cooling energy demand.
    Fuel switching accounts for more than half of the emission reduction. Regions
    projected to increase their residential floorspace risk getting locked-in into
    poor infrastructure if efficient building investments are not made early on. Meeting
    strict emission targets requires near-complete decarbonization of the buildings
    sector.
  10: Regions with greater space heating demand benefit more from insulation and electrification
    of heating. Warmer regions are expected to have an increasing final energy demand
    as unfulfilled cooling demand is met. Richest households benefit most from investing
    in efficiency measures and rooftop PV, potentially exacerbating economic inequalities.
Methodology:
  1: A regional energy system model with an explicit representation of residential
    energy use and building stocks is used to explore the contribution of this sector
    in long-term decarbonization pathways.
  2: 'A techno-economic analysis of the global residential sector and its long-term
    pathways consistent with the Paris Agreement for different world regions was conducted.
    Using the recursive dynamic energy system model TIMER the interplay between -
    and adoption of - three key mitigation measures: building envelope efficiency
    improvement, heating/cooling technology choice, and investment in rooftop PV was
    investigated.'
  3: Projections of useful energy demand for space heating and cooling were based
    on a methodology developed in previous papers. Space heating demand is modeled
    as a function of floorspace, population, and heating degree days (HDD). Cooling
    demand is a function of population, cooling degree days (CDDs), and cooling intensity.
    A multinomial logit function is used to determine the share of residential electricity
    demand met by rooftop PV.
  4: Scenario analysis using models of carbon pricing, technology choice, and construction/renovation
    trends for energy efficiency.
  5: The analysis projects final energy demand for heating and cooling under Baseline
    and 2/C14 C scenarios, considering electricity available from residential rooftop
    PV and emissions from residential heating and cooling (excluding indirect emissions).
  6: "The analysis projects future energy demand and emissions under a baseline scenario\
    \ and a 2\xB0C warming scenario (2/C14 C), considering emission prices and technological\
    \ advancements. The projections cover the period up to 2100."
  7: This paper presents an updated version of the TIMER-REMG model, part of the IMAGE
    (IAM).
  9: Uses the updated TIMER-REMG model, including building-stock turnover and economic
    decision-making. Scenarios include a 'no policy' baseline and a scenario meeting
    a 2/C target via a globally uniform price on GHG emissions. The model explicitly
    models construction and decommissioning of building stocks.
  10: "Model projections are used to assess the impact of efficiency improvements,\
    \ fuel switching, and rooftop PV adoption on residential sector energy use and\
    \ emissions under a 2\xB0C scenario, with the model accounting for total energy\
    \ and land use greenhouse gas emissions. The model considers the interactions\
    \ between building envelope efficiency and heating/cooling efficiency."
More Notes:
  2: The model includes six insulation levels representing different use of thermally
    resistant materials on walls, windows, floors, and roofs, each with capital costs
    and thermal conductivity scaled for regional climate characteristics.
  3: The model includes a dynamic representation of residential rooftop PV including
    their potential, investments, and dispatch.
  4: The paper studies the development of building stocks and their impact on energy
    efficiency and emissions.
  5: "Figure 1 shows projected changes in residential floorspace and building envelope\
    \ efficiency (U-value) over time for Baseline and 2/C14 C scenarios across different\
    \ regions. The 2\xB0C scenario shows a slightly faster decline in U-value (better\
    \ insulation) compared to the baseline."
  6: The study highlights the importance of emission prices in driving building efficiency
    improvements and fuel switching towards cleaner energy sources. The impact of
    climate change and policy varies across different regions (Global, OECD, Reforming
    Economies, Asia, Middle East & Africa, and Latin America). Rooftop PV electricity
    generation is considered as a negative demand.
  7: The use of the TIMER-REMG model introduces methodological issues, including data
    requirements and associated uncertainty. Investments in building envelope efficiency
    are most sensitive to assumptions on the shape of the representative household.
  9: The model does not include the tenant-landlord effect, assumes automatic reduction
    in energy demand from efficient appliances, and lacks social dynamics of technology
    adoption. The analysis highlights the differentiation between poor and rich households
    concerning their energy demand and mitigation capacity.
  10: The paper highlights the importance of power grids and electricity storage technologies
    to manage the increased mismatch and variability of supply and demand from prosumer
    households.
Quantitative material:
  1: Global heating demand is expected to decrease from current levels by 27% and
    66% by 2050 and 2100, respectively. Cooling demand is expected to increase by
    176% and 286% respectively. Direct residential emissions are almost eliminated
    by 2100.
  2: The model projects the adoption of different mitigation measures and how they
    influence the energy demand and emissions of the residential sector in the 21st
    century, as well as their contribution to meeting the Paris Agreement.
  3: Uses RCP2.6 climate target, representing a 2/C14 C global mean temperature increase
    by 2100.
  4: Global residential floorspace is expected to triple over the 21st century with
    most growth in Asia and the Middle East & Africa.
  5: Table 2 provides annual investments in residential building envelope efficiency
    (renovations and new buildings) and average renovation rates for Baseline and
    2/C14 C scenarios across different regions (OECD, Reforming Economies, Asia, Middle
    East & Africa, Latin America) for years 2030, 2050, and 2100.  Renovation rates
    are also provided for 2020-2050 and 2020-2100.
  6: Cooling demand is expected to increase by 176% and 286% respectively, but lower
    than the projected increase in the absence of climate policy.
  8: Quantitative projections include significant potential reductions in energy use
    and emissions due to renovations, although specific values are not detailed on
    this page.
  9: Heating demand is expected to decrease by 27% and 66% by 2050 and 2100 respectively
    in the 2/C target scenario; cooling demand is expected to increase by 176% and
    286% respectively in the same scenario. Global residential heating reduces its
    direct emissions by 90% in the 2/C scenario.
  10: Households produce 8 EJ/yr of electricity in 2050, increasing to 40 EJ/yr in
    2100 in the mitigation scenario.
