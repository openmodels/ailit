  10: Source material here. Improved heating/cooling efficiency and building envelope
    efficiency reduce total final energy demand and direct emissions. The equilibrium
    reached sees improved levels of both efficiencies applied, but neither to their
    maximum level. Regions with greater space heating demand benefit more from insulation
    and electrification of heating. The model projects households produce 8 EJ/yr
    of electricity in 2050, increasing to 40 EJ/yr in 2100 in the mitigation scenario.
    The richest households benefit from efficiency measures and rooftop PV due to
    their greater ability to invest and their larger floor-space, whereas poorer households
    may face difficulties investing in such technologies, exacerbating economic inequalities.
