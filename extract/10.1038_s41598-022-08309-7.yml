sourcematerial:
  2: "Source material here.\n\"Here we investigated how the plant response to climate\
    \ change affects forage quality and subsequent rumen fermentation.\"\n\"This \u201C\
    stress memory\u201D effect was investigated by screening ten forage grass varieties\
    \ in five differing climate scenarios, including current climate (2020), future\
    \ climate (2050), or future climate plus flooding, drought or heat shock.\"\n\"\
    All varieties consistently showed decreased digestibility linked to decreased\
    \ methane production as a result of drought or an acute flood treatment.\"\n\"\
    Models of near future climate change (2050) predict increases in temperature,\
    \ CO2, precipitation and altered weather systems which will produce stress responses\
    \ in field crops.\"\n\"These results indicate that efforts to breed future forage\
    \ varieties should target tolerance of acute stress rather than long term climate.\"\
    \n"
  3: "Source material here.\n\nEvaluation overview: \"The aim of this work was therefore\
    \ to determine how responses to the growth environment, including \u201Cstress\
    \ memory\u201D may affect the subsequent forage degradation in the rumen and,\
    \ therefore, to understand how ruminant feeding strategies might be affected by\
    \ climate change.\"\n\nDrivers of Risk: \"Plants respond to abiotic and biotic\
    \ stresses by physiological, biochemical, metabolic and molecular mechanisms23.\
    \ Previous studies have focussed on the characterisation of physiological changes\
    \ of forage plant varieties under climate change conditions. For example, elevated\
    \ levels of CO2 have been shown to improve the rate of photosynthesis in plants24\
    \ and alleviate the effects of drought stress by conserving water, increasing\
    \ carbon fixation and increasing fructan accumulation25. However high temperatures\
    \ have been shown to inhibit photosynthesis26 by altering the structure of chloroplasts\
    \ and by inactivating chloroplast enzymes through oxidative stress27. Drought\
    \ stress has also been shown to affect water soluble carbohydrate (WSC) levels....During\
    \ flooding oxidative pathways within the plant move towards fermentation30 and\
    \ CO2 levels within plants can become reduced...\"\n\nMethodology: \"Plant material.\
    \ Ten different current commercial varieties of forage grasses (Table\_1) were\
    \ grown for 3 months in five different climate scenarios, replicated three times\
    \ at 1-week intervals. Studies on these plant materials were undertaken in compliance\
    \ with local and national regulations. Climate conditions were simulated in growth\
    \ chambers and consisted of present-day conditions and future potential climate\
    \ scenarios as described by Ref.38 (Table\_2).\"\n\nHighlights: \"Despite extensive\
    \ study of responses of crop and forage species to adverse environmental conditions,\
    \ there has been relatively little research into how forage adaptation to climate\
    \ change will affect ruminant production systems, and the appropriateness of current\
    \ and future forage varieties for animal production in the future....Hence an\
    \ active response may have important effects on rumen fermentation efficiency\
    \ and subsequently host nutrient uptake in addition to direct effects of climate\
    \ on the chemical composition of the forage.\"\n"
