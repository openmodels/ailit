  5: 'Source material here.

    Evaluation overview: "Effect of growth conditions on physiological characteristics
    of grass varieties at harvest. Overall, the grass varieties were clearly affected
    by the climate scenarios imposed during growth, indicating that the extent of
    the stress imposed was sufficient to elicit a physiological response."


    Drivers of Risk: "Mean biomass values for grasses in each climate scenario (control
    2020, control 2050, 2050 + flood, 2050 + drought and 2050 + heat shock) were 14.4
    g, 10.2 g, 8.6 g, 6.0 g and 5.8 g DM respectively."


    Quantitative material: "Mean biomass values for grasses in each climate scenario
    (control 2020, control 2050, 2050 + flood, 2050 + drought and 2050 + heat shock)
    were 14.4 g, 10.2 g, 8.6 g, 6.0 g and 5.8 g DM respectively (SD = 3.61)."


    Methodology: "Data analysis was conducted in R version 3.6.0 using RStudio. Packages
    agricolae, car, ggplot2, lsmeans and rcompanion were used. All data were analysed
    using 2-way ANOVA, further using Tukey mean separation, with the exception of
    the gas production data."


    Highlights: "There was a significant effect of grass variety on water-soluble
    carbohydrate (WSC) (P = 0.030), with Aber Niche having a higher (P=0.031) WSC
    compared to Aber Root, although there were no differences amongst any of the other
    grass varieties."

    '
