  10: '"Evaluation overview": "Growth of these grasses under different climate conditions
    was shown to have an impact on fermentation."


    "Drivers of Risk": "Chlorophyll levels were highest in the control 2020 scenario
    and the lowest in grasses subjected to heat shock and flood climate scenarios,
    indicating that photosynthesis was affected by both these treatments."


    "Quantitative material": "Chlorophyll measurements can also indicate how photosynthesis
    is affected during stress."


    "Methodology": "The clustering of the FTIR data based on treatment further indicates
    that the treatments were sufficient to elicit a response."


    "Highlights": "It is suggested that the plant response to climate has a consequence
    for the activity of the rumen microbiota; altering the nutrient provision to the
    colonising microbiota affects colonisation community profiles and in consequence,
    forage degradation parameters."

    '
  11: "Source material here.\nThe effects of pre-harvest climate scenarios on rumen\
    \ fermentation are in agreement with previous work indicating that plants have\
    \ a \u2018stress memory\u2019 or \u2018defence priming\u2019 and that stress responses\
    \ are influenced by previous exposure... The analysis of loss of dry matter (DM)\
    \ and amount of gas (CO2 and CH4) produced as a result of fermentation of the\
    \ grass feed indicated that the growth conditions could affect how the grasses\
    \ would be digested by the animal. Flood had the greatest effect in reducing total\
    \ gas production, compared to both the control climate scenario for 2020 and 2050...\
    \ The in vitro DMD values observed in this study for control 2020 are typical\
    \ of those expected in high quality pastures for ruminants... Interestingly, methane\
    \ levels were lower from fermentative grasses that had been previously subjected\
    \ to flood, drought or heat shock compared to the 2020 and 2050 controls... Despite\
    \ efforts to keep the replicates as consistent as possible, rumen fluid is affected\
    \ by diet, health, time since last feed and stochastic changes in microbiota although\
    \ here animals were on the same diet, fed at the same time, and rumen fluid was\
    \ also collected at the same time...\n"
  12: "  \nSource material here.\n  \n- Evaluation overview: \"Here we have investigated\
    \ the former, to explore whether forage growth under an altered climate would\
    \ produce legacy effects in forage that would impact on rumen fermentation when\
    \ ingested. ... Notably acute flood and drought caused decreased digestibility\
    \ in those forages.\"\n\n- Drivers of Risk: \"Notably acute flood and drought\
    \ caused decreased digestibility in those forages. As these conditions are predicted\
    \ to increase in frequency over the next decades, unless addressed this will have\
    \ a limiting effect on production efficiency.\"\n\n- Highlights: \"Notably acute\
    \ flood and drought caused decreased digestibility in those forages. As these\
    \ conditions are predicted to increase in frequency over the next decades, unless\
    \ addressed this will have a limiting effect on production efficiency. ... Forage\
    \ breeding strategies should consider response to future as well as current climates\
    \ to ensure economic and environmental sustainability of production.\"\n"
