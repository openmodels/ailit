    as affected by climate change scenario... Raw data points are overlaid on boxplots...
    Lower case letters indicate significant difference based on ls means with Tukey
    adjustment (P <0.05)."

    Methodology: "DFA analysis of liquid (A) and pellet (B) FTIR as affected for each
    climate scenario at the end of 48-h fermentation... Lower case letters indicate
    significant difference based on ls means with Tukey adjustment (P <0.05)."

    Highlights: "Climate scenario affected fermentation profiles of all the parameters
    analysed (P < 0.001; Table 4)... Acetate production was lowest (P < 0.05) in 2050
    + drought compared to all other climate scenarios, whereas propionate concentration
    was highest (P < 0.05) in control 2020 with decreasing values for control 2050,
    2050 + heat shock, 2050 + drought and 2050 + flood respectively."

