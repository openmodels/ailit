    Methodology: Discriminant functional analysis (DFA) of Fourier Transform infra-red
    spectroscopy (FTIR) spectra to deter- mine differences in the plant chemistry
    at har vest showed no clustering by grass variety. However, clustering was obser
    ved for climate scenario, with heat shock FTIR spectra differing from all remaining
    scenarios except drought (Fig. 1). Total cumulative gas production measurements
    were taken 48 h from the start of the in vitro rumen fermentation experiments.

    Highlights: However, clustering was obser ved for climate scenario, with heat
    shock FTIR spectra differing from all remaining scenarios except drought (Fig.
    1). pair wise comparisons showed that the flooding treatment produced significantly
    less gas than the 2020 controls (P = 0.014), 2050 controls (P = 0.038) and the
    heat shock treatment (P=0.016) (Fig. 2A).

