    Methodology: "Random forest analysis correctly classified at least 66% of samples
    in each climate scenario, despite only partial separation on the MDS plot." This
    indicates the use of random forest classification for analyzing VOC profiles.

    Highlights: "Climate scenario is a significant predictor of VOC profiles; random
    forest analysis correctly classified at least 66% of samples in each climate scenario."
    This highlights the successful classification of samples based on climate scenarios.

