  7: Climate change scenario significantly affected DMD with future scenarios, flood,
    drought and heat shock, being significantly less than control 2020. VFA production
    was lower in drought, flood, and heat shock treatments compared to control 2020.
    Ammonia concentration was lowest in control 2020 and control 2050 compared to
    all other climate scenarios. Acetate production was lowest in 2050 + drought.
    Propionate concentration was highest in control 2020 with decreasing values for
    control 2050, 2050 + heat shock, 2050 + drought and 2050 + flood respectively.
    Butyrate concentration was highest in control 2020 and 2050 + drought and lowest
    in 2050 + flood and 2050 + heat shock with an intermediate value for control 2050.
    The acetate to propionate ratio (C2:C3) was lowest in control 2020 and 2050 +
    drought and highest in 2050 + flood with intermediate values for control 2050
    and 2050 + heat shock.
