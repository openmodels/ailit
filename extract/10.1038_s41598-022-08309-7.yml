Highlights:
  2: All varieties consistently showed decreased digestibility linked to decreased
    methane production as a result of drought or an acute flood treatment. There was
    little effect of elevated temperature or CO2 compared with controls (2020).
  3: "Responses to the growth environment, including \u201Cstress memory\u201D may\
    \ affect the subsequent forage degradation in the rumen and, therefore, to understand\
    \ how ruminant feeding strategies might be affected by climate change."
  5: Grass physiological characteristics such as Fv/Fm ratio, chlorophyll, and crude
    protein showed no significant variety effect, but there were differences in water-soluble
    carbohydrate and fibre values among grass varieties.
  6: Climate scenarios significantly affect crude protein, WSC, chlorophyll, Fv/Fm
    ratio, NDF, ADF, and ADL. Heat shock FTIR spectra differ from most other scenarios,
    except drought. Flooding reduces gas production compared to controls and heat
    shock. Drought reduces CO2 and methane production compared to heat shock and control
    2020.
  7: Climate change scenarios significantly affected fermentation profiles and dry
    matter degradation. Drought, flood, and heat shock generally resulted in lower
    VFA production and altered gas production profiles.
  8: Climate scenario was a significant predictor of VOC profiles. Random forest analysis
    correctly classified at least 66% of samples in each climate scenario. Only 25
    of the most discriminatory compounds were sufficient for classification.
  9: Sulphurous compounds are the most abundant group, followed by alkenes, and the
    study highlights an increase in acids and a decrease in alkenes in future scenarios
    compared to present day controls.
  10: Growth of grasses under different climate conditions impacts rumen fermentation,
    likely due to changes in forage chemistry from acclimation and plant stress responses.
    Heat shock conditions resulted in reduced chlorophyll and Fv/Fm, indicating high
    levels of stress.
  12: The study found that acute flood and drought conditions caused decreased digestibility
    in forages, which could limit production efficiency.
Methodology:
  2: Ten forage grass varieties were screened in five differing climate scenarios,
    including current climate (2020), future climate (2050), or future climate plus
    flooding, drought or heat shock.
  3: Ten different current commercial varieties of forage grasses were grown for 3
    months in five different climate scenarios, replicated three times at 1-week intervals.
    Climate conditions were simulated in growth chambers and consisted of present-day
    conditions and future potential climate scenarios as described by Ref.38 (Table
    2).
  5: Analysis was conducted using R software, employing statistical methods like 2-way
    ANOVA, general linear models, and multivariate linear model. Data were also visualized
    using heat trees and multi-dimensional scaling.
  6: The analysis uses statistical methods (ls means with Tukey adjustment) to determine
    significant differences in grass nutritional components across climate scenarios.
    Discriminant functional analysis (DFA) of FTIR spectra was used to determine differences
    in plant chemistry. In vitro rumen fermentation experiments were also conducted.
  7: Fermentation was conducted for 48 hours. DFA (Discriminant Function Analysis)
    was performed on liquid and pellet FTIR data. Statistical significance was determined
    using ls means with Tukey adjustment (P < 0.05).
  8: Random forest classification was used to analyze volatile organic compound (VOC)
    samples under different climate scenarios (control, drought, flood, heat shock).
    Analysis was performed on samples after 24 hours of incubation. MDS ordination
    was used to visualize VOC profile differences.
  9: The study uses random forest classification with up to 100,000 trees to determine
    important chemical compounds for discriminating between climate scenarios.
  10: VOC profiles were compared for grass varieties exposed to rumen fluid under
    different climate scenarios. Chlorophyll levels and Fv/Fm (a measure of photosystem
    II efficiency) were measured. FTIR data was used for clustering based on treatment.
More Notes:
  3: The study investigates how forage adaptation to climate change affects ruminant
    production, focusing on stress memory and rumen degradation.
  7: The effects of climate scenarios on total gas production, CO2 production, and
    methane production are visualized in Figure 2. Figure 3 shows the DFA analysis
    of liquid and pellet FTIR as affected for each climate scenario.
  8: The study also investigated the impact of biological replicates and grass varieties,
    but found that grass varieties could not be separated from each other.
  12: The paper suggests that forage breeding strategies should consider response
    to both current and future climate conditions to ensure economic and environmental
    sustainability.
