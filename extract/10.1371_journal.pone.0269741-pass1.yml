  5: 'Source material here.

    The analysis tracks changes and trends in the built environment, particularly
    in areas exposed to sea level rise and hurricanes: "Relying on...assessments of
    changes and trends in the built environment at local and regional scales."


    Sea level rise and hurricanes in coastal areas are the primary shocks affecting
    the outcomes: "In order to track the development of areas at risk of coastal hazards,
    we use SLR zones as areas at high risk of hazards...more likely to be impacted
    by coastal storms and hurricanes."


    The study relies on high-quality data from the ZTRAX database and NOAA Sea Level
    Rise dataset to assess development in areas at risk of coastal hazards, employing
    state-level datasets and exclusion criteria for low-quality data areas: "Relying
    on the best quality data available in the ZTRAX database (>95% data completeness)
    precludes all coastal counties in Louisiana and restricts other counties...We
    employ the NOAA Sea Level Rise dataset...to determine the boundaries of the 3
    feet and 6 feet zones."


    Despite excluding some data from certain regions, the study shows significant
    growth in the Southeast''s built environment, indicating high confidence in the
    methodological approach: "Even with excluding Louisiana and a few counties in
    Florida and South Carolina, we still find massive growth in the Southeast over
    recent decades with this more conservative approach. Therefore, we have more confidence
    in the findings."

