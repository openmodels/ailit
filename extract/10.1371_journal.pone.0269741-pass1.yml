  12: 'plaintext

    "Absolute exposure increased across the entire study period, slowing between 1970
    and 1980, with the South Atlantic surpassing both the Northeast and Pacific in
    total number of structures in the SLR zone. Hurricane impacted areas are denser
    and more developed than unaffected areas. While relative exposure remained steady
    or began to decrease, the absolute number of structures in SLR zones increased
    across all divisions. We construct this analysis by dividing coastal MSAs in two
    parts: the area inside and the area outside of the 6-foot SLR zone. We then stack
    these locations and their ZTRAX attributes based on 5-year time steps from 1900
    to 2015. Using these data, we estimate a series of two-way fixed effect panel
    regression models. Measures exposed to more intense cyclonic activity tend to
    have higher proportions of built-up land and higher structure density."

