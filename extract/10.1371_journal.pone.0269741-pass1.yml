Evaluation overview:
  2: This paper examines the exposure of the U.S. coastal built environment to natural
    hazards and explores how hurricane exposure relates to historical development.
  3: Exposure to sea level rise and hurricanes
  4: No relevant information
  5: The analysis tracks changes and trends in the built environment, particularly
    in areas exposed to sea level rise and hurricanes.
  7: The paper provides an overview of development trends along the U.S. coastline,
    focusing on exposure to sea level rise and hurricanes.
  11: Exposure to sea level rise and hurricanes, focusing on built environment (structures).
  13: The analysis evaluates the impact of hurricanes and sea level rise (SLR) zones
    on urban development metrics such as share of built-up land, structure density,
    and total structures.
  14: This study evaluates the relationship between sea-level rise exposure, hurricane
    activity, and the built environment (share of built-up land, structure density,
    and total structures).
  16: Exposure to sea level rise and hurricanes in coastal communities
  17: Built environment vulnerability to sea level rise and hurricanes.
  19: Structures
Highlights:
  2: This is the first fine-scale nationwide analysis of the exposure of the coastal
    built environment to hazards over the twentieth century, contributing to understanding
    how hurricanes have influenced urban spatial development.
  3: Examines critical land transitions to inform the measurement of exposure of the
    built environment over the past century. Shows spatial distribution of when first
    structure was built.
  4: No relevant information
  5: Despite excluding some data from certain regions, the study shows significant
    growth in the Southeast's built environment, indicating high confidence in the
    methodological approach.
  7: Significant growth in structures along the coastline occurred post-1950 with
    a transition to higher levels of densification post-1980; regions differ in development
    patterns, with older areas having higher density.
  9: SLR zones and coastal MSAs are denser, more developed, and have higher expansion
    rates than other areas; notable expansion and densification post-1950, especially
    in flood zones.
  10: The Pacific U.S. had high growth rates after 1950, and despite increases in
    density, the West South Central region remains lower in structure density and
    percent of sea level rise zone developed.
  11: Southeast has high growth in developed SLR zones later in the 20th century.
    Western Gulf coastline developed rapidly after 1950 but remains less developed
    than Northeast, Pacific, and Southeast, potentially making it a hotspot for new
    building and land-use transitions in the future. Coastlines are more developed
    than inland areas, though the addition of new buildings has slowed in recent decades.
    Florida and the South Atlantic division are shown to have high exposure, particularly
    in the 6 feet SLR zone (Fig. 5).
  12: Hurricane-impacted areas are denser and more developed; SLR zones with intense
    cyclonic activity have higher built-up land and structure density.
  13: The results indicate that MSAs affected by hurricanes are denser and more developed
    than those not affected, with significant differences noted for SLR zones.
  14: Hurricane activity is associated with significantly higher rates of building
    in terms of built area and structure density. The impact of storms on the built-up
    share of land is largely concentrated in the SLR zones.
  16: Areas at risk of hurricane impacts are more highly developed than those that
    are not.
  17: Older structures are a potential indicator of elevated vulnerability due to
    lack of adaptation in building codes. Building age, density, and development patterns
    influence exposure and vulnerability.
  18: Gulf Coast divisions still have scope to restrict hazardous area development
    to reduce future exposure and costs.
  19: Compares the number of structures across datasets.
Methodology:
  2: The analysis uses gridded historical settlement data from the Zillow ZTRAX database
    and overlays it with NOAA-defined sea level rise zones to study urban development
    patterns in coastal regions of the U.S. from pre-1900 to 2015.
  3: "Investigates trends of urban expansion into coastal areas at risk of sea level\
    \ rise and compares them with more inland areas. Uses measures including built-up\
    \ property density, coastal land development, and the age of buildings across\
    \ sea level rise zones. Uses Zillow\u2019s ZTRAX dataset and historical settlement\
    \ layers in HISDAC-US."
  4: "The paper uses the ZTRAX database to create new settlement data products (HISDAC-US)\
    \ covering the time period 1810\u20132010. Built-up intensity is calculated as\
    \ the sum of gross indoor area of all built structures in a grid cell at a given\
    \ year. Data integration methods were applied at 250-meter spatial resolution\
    \ and 5-year temporal resolution. The gridded datasets were resampled to a spatial\
    \ resolution of 50 meters."
  5: The study relies on high-quality data from the ZTRAX database and NOAA Sea Level
    Rise dataset to assess development in areas at risk of coastal hazards, employing
    state-level datasets and exclusion criteria for low-quality data areas.
  7: The analysis measures shifts in built-up areas over time, expansion by increase
    in built grid cells, and a densification measure by the ratio of added structures
    to added developed grid cells.
  9: Urban expansion and structure density are measured using the built-up properties
    data layer; analysis compares Micro- and Metropolitan Statistical Areas (MSAs)
    by density, developed area, and expansion rates over time.
  10: Trends in the 6 feet sea level rise zone are analyzed using historical coastal
    development characteristics and structure density measures.
  11: Compares the total number of buildings and the percentage of buildings inside
    SLR zones across MSAs and Census Divisions from 1900 to 2015.
  12: Two-way fixed effect panel regression models used to analyze historical building
    patterns and hurricane trends.
  13: The analysis uses regression models with dependent variables measured in 2015
    across multiple metropolitan statistical areas (MSAs), accounting for storm severity
    and historical hurricane data.
  14: "Panel regression analysis from 1900\u20132015 is used. The models include fixed\
    \ effects for year, MSA (Metropolitan Statistical Area), and year x census division."
  16: Identifies increasingly dense SLR zones in areas affected by hurricanes in recent
    decades.
  17: Uses HISDAC-US data to analyze the age of structures and development patterns
    at fine spatial scales. Applicable to understanding vulnerability in coastal areas
    due to outdated building practices.
  18: The analysis uses a new settlement data compilation to understand the evolution
    of exposure along coastlines.
  19: Regression analysis from 1900-2015 (with MSA-Year fixed effects) using ZTRAX
    data, excluding states and MSAs with >50% of grid cells with low quality data
    (grid cell year built missingness < 5%).
More Notes:
  3: Figure 1 shows sea level rise zones across the conterminous US by Census Division,
    with the 6 feet SLR zones displayed in blue. Inset (b) shows historical development
    areas. Data is available through open licenses for U.S. government datasets or
    a CC0 license.
  4: 'The paper mentions two types of error in the ZTRAX database: commission errors
    (structures reported that do not exist) and omission errors (structures exist
    that are not reported).'
  7: Coastal development is higher in SLR zones compared to inland areas; regional
    trends show variability in expansion and densification.
  11: Distinguishes between densification- and sprawl-based development trajectories
    along the coast. Data are from open-license U.S. government datasets.
  14: The study finds a negative, but not statistically significant, effect of hurricane
    activity on structure count at a national level, but the negative impact is larger
    in hurricane-hit areas; potentially indicating more dense urban landscapes in
    hurricane-prone areas. Standard errors are clustered at the MSA scale.
  16: The South Atlantic and Florida are adding structures at high rates and have
    a larger relative exposure despite being at high risk of natural hazards. Post-hurricane
    development is associated with increased built environment exposure to coastal
    hazards.
  17: Fine-resolution analysis requires careful consideration of data completeness.
    Nature-based approaches for risk reduction are an option in some locations. Adaptation
    along saturated coastlines is necessary for future exposure and risk reduction.
  19: The analysis uses the Zillow Transaction and Assessment Dataset (ZTRAX).
