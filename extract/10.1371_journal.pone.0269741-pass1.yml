  2: "Source material here.\n- \"This paper leverages new multi-temporal data on building\
    \ patterns, the Historical Settlement Data Compilation for the U.S. (HISDAC-US)\
    \ [22, 23], across all major coastal communities in the United States from 1900\
    \ to 2015.\"\n- \"Reducing coastal risk to natural hazards requires advanced local\
    \ adaptation strategies with respect to the built environment.\"\n- \"This is\
    \ the first fine-scale nationwide analysis of the exposure of the coastal built\
    \ environment to hazards over the twentieth century.\"\n- \"We address this question\
    \ by undertaking a century-long analysis of urbanization encompassing both passive\
    \ differences in regional building patterns between coastal and non-coastal places,\
    \ and explicit responses to hazardous conditions (hurricane events).\"\n- \"Using\
    \ gridded historical settlement data layers derived from Zillow\u2019s ZTRAX database\
    \ [35], the Historical Settlement Data Compilation of the United States [22, 23],\
    \ we analyze built-up property records across coastal regions of the U.S. from\
    \ pre-1900 to 2015. Overlaying this data with sea level rise zones from the National\
    \ Oceanic and Atmospheric Administration.\"\n"
  3: " \nEvaluation overview: 'This analysis covers sea level rise zones (3 feet /\
    \ 0.91 meters and 6 feet / 1.83 meters) across the conterminous United States\
    \ and by Census Division.'\nDrivers of Risk: 'We investigate the trends of urban\
    \ expansion into coastal areas at risk of sea level rise.'\nQuantitative material:\
    \ 'Analysis covers sea level rise zones (3 feet / 0.91 meters and 6 feet / 1.83\
    \ meters).'\nMethodology: 'We use measures including built-up property density,\
    \ coastal land development, and the age of buildings across sea level rise zones\
    \ to investigate critical land transitions that inform the measurement of exposure\
    \ of the built environment over the past century. Zillow\u2019s ZTRAX database\
    \ contains unique data on housing transactions, home values, rental estimates,\
    \ spatial location, home- and property-related information.'\nHighlights: 'Illustrates\
    \ the historical development of cities, such as Houston, displayed in the inset...\
    \ examine critical land transitions to inform the measurement of exposure of the\
    \ built environment over the past century.'\nMore Notes: 'All data used in figure\
    \ available through an open license for U.S. government datasets or through a\
    \ CC0 license.' \n"
