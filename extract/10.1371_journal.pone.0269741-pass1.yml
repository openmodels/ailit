  7: The paper reports a 446% increase in structures and a 220% increase in developed
    land area along the U.S. coastline between 1950 and 2000.
  9: Graphs show rising urban density, increasing densification rates, growth in developed
    area percentage, and changing expansion rates from 1900 to 2000.
  10: Analysis includes metrics such as density, densification, percent developed,
    and expansion across regional trends from 1900 to 2010.
  11: Percentage of buildings in SLR zones within MSAs (Fig 5A, 5B); Total number
