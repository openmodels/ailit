Drivers of Risk:
  1: Increases in the number of wet days and in extreme daily rainfall, total annual
    rainfall, and standardized monthly deviations of rainfall.
  4: Extreme daily rainfall, Number of wet days, Monthly positive rainfall deviations,
    Monthly negative rainfall deviations, Annual total rainfall.
  6: "Annual total rainfall, monthly rainfall deviations, number of wet days (RD(1\
    \ mm)x,y), and a measure of extreme daily rainfall RD\u02C6(99.9%)x,y."
  7: "Extreme daily rainfall (RA, RD(1mm), R\u02C6D(99.9%)) and temperature variability\
    \ are impacting subnational growth rates."
  8: Annual total rainfall, monthly rainfall deviations, number of wet days, and extreme
    daily rainfall are identified as factors.
  9: No relevant information.
  10: Changes in total annual rainfall, monthly rainfall deviations, number of wet
    days, and extreme daily rainfall.
  11: The drivers of risk evaluated include total annual rainfall, monthly rainfall
    deviations, number of wet days, and extreme daily rainfall.
  12: Temperature variability, mean temperature, and rainfall are the key factors
    examined for their impact on economic growth.
Evaluation overview:
  1: Economic growth rates.
  4: Effect on economic growth rates.
  6: Subnational per-capita growth rates (estimated as the first difference of the
    logarithm of gross regional product per capita)
  7: Subnational growth rates are being evaluated.
  8: This provides an overview of rainfall patterns, which could be related to impacts
    like flooding, drought, or agricultural productivity.
  9: No relevant information.
  10: Differentiated economic response of rich and poor groups to changes in rainfall.
  11: The paper evaluates the economic impacts of changes in rainfall on sectoral
    growth, specifically the agricultural, manufacturing, and services sectors.
  12: The analysis evaluates economic growth rates in relation to changes in temperature
    and rainfall.
Highlights:
  1: High-income nations and the service and manufacturing sectors are most strongly
    hindered by both measures of daily rainfall. Anthropogenic intensification of
    daily rainfall extremes will have negative global economic consequences.
  4: Effects of rainfall are strongest in winter and autumn, showing little response
    in summer and spring; a seasonal economic vulnerability is suggested. Some persistence
    in the effect of the annual total and number of wet days. Impacts from the number
    of wet days and negative monthly rainfall deviations have been largest. Impacts
    from total annual and extreme daily rainfall show greater regional heterogeneity.
  6: "The paper identifies a quadratic effect of the number of wet days and a dependence\
    \ of the effect on extreme daily rainfall (RD\u02C6(99.9%)x,y) on subnational\
    \ per-capita growth rates."
  7: The study assesses the heterogeneity of rainfall effects on subnational growth
    rates by income level and finds that considering a nonlinear effect considerably
    increases the statistical power of the model.
  8: Higher annual rainfall is concentrated in tropical regions; monthly rainfall
    deviations exist; some regions have high numbers of wet days; and there are levels
    of extreme rainfall events.
  9: Regions in Southeast Asia, Africa, and South America show high variability in
    rainfall measures.
  10: Distinct patterns and varying effects of weather conditions on growth rates
    between 'Rich' and 'Poor' species.
  11: The page highlights the differential impacts of rainfall changes on growth rates
    across the agricultural, manufacturing, and services sectors.
  12: Key variables such as temperature variability and rainfall deviations have significant
    coefficients with respective levels of statistical significance indicated.
Methodology:
  1: "A global panel of subnational economic output for 1,554 regions worldwide over\
    \ the past 40 years is analyzed. The study assesses higher-order moments of the\
    \ annual distribution of daily rainfall in conjunction with subnational economic\
    \ output. Thresholds are set either as constants or as percentiles of the historical\
    \ distribution (1979\u20132019) of local daily rainfall. The total annual rainfall\
    \ and standardized monthly rainfall anomalies are calculated."
  4: Panel data analysis, partitioning data based on national income per capita and
    assessing sector-specific economic output, using distributed lag models to assess
    persistence of climate impacts. Examination of regional estimates of marginal
    effects multiplied by historical standard deviation of rainfall measures. Uses
    data from 1979-2019. Analysis repeated with and without accounting for regional-specific
    time trends.
  6: Fixed-effects panel regression models are used to estimate relationships between
    changes in annual climate measures and subnational per-capita growth rates. Regional
    and yearly fixed effects are included. Region-specific linear or quadratic time
    trends are included in some specifications. The models use data from 1901-2014
    for economic output, and different time spans (1948-2019) for climate data, depending
    on the source.
  7: A regression equation (equation 5) is used to assess the impact of rainfall measures
    and temperature variability on subnational growth rates. Heterogeneity of rainfall
    effects is assessed by partitioning nations by income level.
  8: Analysis is based on historical data from 1979-2019. The extreme daily rainfall
    measure sums rainfall exceeding the 99.9th percentile of the historical distribution.
  9: Analysis based on historical variability of different measures of rainfall.
  12: The analysis uses econometric regression with errors clustered both regionally
    and nationally to evaluate the impact of climatic variables on growth rates.
More Notes:
  1: Climate data is primarily from the ERA-5 reanalysis.
  4: The study assesses the spatial heterogeneity in the magnitude of historical impacts
    from rainfall, extrapolating economic impacts to regions outside the economic
    sample. Figures 3 and 4, and supplementary materials, are referenced.
  7: The ERA-5 climate data and economic production data used are publicly available.
  8: The analysis uses a weighted annual sum of anomalies for monthly rainfall deviations.
    Maps are used to visually represent the data.
  9: No relevant information.
Quantitative material:
  1: Economic growth rates are reduced by increases in the number of wet days and
    in extreme daily rainfall, in addition to responding nonlinearly to the total
    annual and to the standardized monthly deviations of rainfall.
  4: Effect on economic growth rates of a 1-s.d. shock (% points) based on rainfall
    measures, with confidence intervals.
  6: "The paper identifies statistically significant effects from two measures: the\
    \ number of wet days RD(1 mm)x,y and the measure of extreme daily rainfall RD\u02C6\
    (99.9%)x,y.  There is a quadratic effect of the number of wet days."
  7: "The regression coefficients (\u03B1x in equation 5) describe the percentage-point\
    \ effect on subnational growth rates of a one unit increase in each rainfall measure."
  8: Provides historical (1979-2019) means for annual total rainfall (mm), monthly
    rainfall deviations, number of wet days, and the annual sum of rainfall on days
    exceeding the 99.9th percentile.
  9: Includes historical standard deviation data on rainfall measures from 1979 to
    2019.
  10: Graphs display marginal effects on growth rates, with separate curves for 'Rich'
    and 'Poor' species indicating differentiated impacts.
  11: The analysis includes the marginal effects of rainfall changes on growth rates,
    represented as percent increases.
  12: Regression coefficients for temperature and rainfall indicate their percent-point
    effect per unit increase; standard errors and significance levels are provided.
