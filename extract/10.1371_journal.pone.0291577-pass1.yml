Drivers of Risk:
  1: Climate change impacts on crop yields and restrictions on agricultural trade
    are identified as drivers impacting the outcomes.
  2: Shocks impacting outcomes include constrained cereal trade (zero cereal import
    dependency strategy) and climate change impacts on crop yields.
  4: Climate change impacts on crop yields are considered, using climate outputs from
    the Hadley Centre Global Environmental Model under RCP8.5.
  5: Global zero cereal import dependency and climate change, particularly their impact
    on crop yield, are evaluated as primary drivers.
  6: Climate change impacts yields.
  7: The paper identifies global trade restrictions and climate change as key drivers
    impacting cereal trade, consumption, and land allocation.
  8: The key risks driving changes include climate change impacts and trade perturbations.
  11: Shocks or changes impacting the outcomes include constrained cereal trade and
    climate change impacts.
  12: Climate change impacts (CC) and trade constraints (IC) are the primary drivers
    of risk, affecting crop yields, production, and trade patterns.
  13: Climate change and trade perturbations (specifically import dependency constraints)
    are identified as drivers of risk.
  14: Climate change impacts on crop yields, global cereal import dependency constraints
  15: Climate change impacts on crop yields and global zero cereal import dependency.
  16: No relevant information
Evaluation overview:
  1: The study evaluates the impacts of constrained cereal trade and climate change
    on agriculture, bioenergy, and water systems.
  2: The paper evaluates the impacts of constrained cereal trade and climate change
    on multi-sector outcomes including crop production and consumption, exports, imports,
    crop prices, caloric consumption, agricultural revenue, net trade revenue, food
    expenditure share of income, irrigation water consumption, and crop-based ethanol
    production.
  4: The page evaluates the impact of zero cereal import dependency and climate change
    on agriculture, bioenergy, and water resources.
  5: The paper evaluates the interactions of cereal trade constraints and climate
    change impacts on agricultural systems, focusing on cereal production, consumption,
    and trade.
  6: This paper evaluates impacts on agriculture, bioenergy, and water availability
    due to cereal trade constraints and climate change.
  7: The paper evaluates the impact of global cereal trade restrictions and climate
    change on import, consumption, and land allocation for cereal production from
    2020 to 2050.
  8: The page provides insight into changes in cereal production, consumption, and
    trade impacted by climate change and trade constraints by 2050.
  11: The table provides an overview of various agricultural outcomes in the USA by
    2050, including import dependency ratio, production, consumption, exports, imports,
    net trade revenue, crop producers' revenue, caloric consumption, food expenditures,
    irrigation water consumption, and ethanol production.
  12: This paper evaluates the impact of constrained cereal trade and climate change
    on agriculture, bioenergy, and water resources, focusing on variables like production,
    consumption, trade, and revenue related to cereals and non-cereal crops.
  13: The paper evaluates the impact of constrained cereal trade and climate change
    on agriculture, bioenergy, and water, focusing on trade revenue, producer's revenue,
    consumer's food expenditure, caloric consumption, and water consumption.
  14: Agriculture, bioenergy, and water implications of constrained cereal trade and
    climate change impacts
  15: Agriculture, bioenergy, and water systems are evaluated in terms of production,
    consumption, trade, and resource use.
  16: No relevant information
Highlights:
  1: Regions experience larger changes in cereal consumption due to cereal import
    dependency constraints rather than due to climate change impacts; trade perturbations
    and climate change have varying regional effects.
  2: Decreased participation in global markets due to zero cereal import dependency
    strategy leads to decreases in total cereal production and consumption at the
    global scale. Climate change and reduced international trade both impact production
    and consumption of cereals, with trade having a stronger effect in most regions.
  4: The study explores outcomes like changes in crop land allocation, production,
    trade, and consumption under cereal import constraints and climate change.
  5: Global cereal trade decreases significantly under the zero cereal import dependency
    scenario, yet total cereal production and consumption decrease only slightly by
    3.1%-4.1% from 2025 to 2050.
  6: Climate change and import dependency constraints both negatively impact global
    cereal consumption, with a roughly additive effect when combined. Import dependency
    constraint decreases land allocated to cereal production, while climate change
    increases the need for land allocation.
  7: The USA and Brazil, as major cereal exporters, show a decrease in cereal export
    under global trade restrictions scenarios; Middle East and Western Africa face
    the largest decrease in cereal import.
  8: Climate-induced trade perturbations have a significant impact on production and
    consumption, with the USA exhibiting notable changes.
  11: Most significant outcomes include major declines in cereal exports and net trade
    revenue under certain scenarios, as well as changes in irrigation water consumption
    and ethanol production related to corn usage.
  12: Constrained cereal trade leads to decreased cereal consumption and increased
    non-cereal consumption in the Middle East. Climate change (CC) generally increases
    non-cereal crop yields in the Middle East, leading to increased production and
    consumption but decreased imports.
  13: Constrained cereal trade and climate change significantly impact trade revenue,
    producer revenue, consumer food expenditure, caloric consumption, and water consumption
    differently depending on whether regions are net importers or exporters and how
    crop yields are affected by climate change. The USA experiences a decrease in
    net export revenue from cereals in ID, while the Middle East sees a reduction
    in cereal net import expenditures. Trade perturbations have a small effect on
    staple caloric consumption. Food expenditure share increases in the Middle East
    but decreases in the USA in some scenarios.
  14: Climate change and trade constraints impact crop consumption, irrigation water
    consumption, and ethanol production differently across regions. Trade can mitigate
    negative impacts on crop yields from climate change in some regions (e.g., Middle
    East). The elimination of corn ethanol production in the Middle East in ID is
    due to regional scarcity of cereal crops.
  15: Import dependency constraints have a larger overall impact than climate change
    on cereal production and consumption, but climate change has an important role
    in some regions, such as the USA. Reducing import dependence can increase susceptibility
    to domestic shocks like drought or floods. Climate change and import dependency
    constraints can amplify each other, such as in total irrigation water consumption
    in the Middle East, which increases by 21% and 0.7% under import dependency and
    climate change scenarios respectively, but 22% under combined scenario.
  16: No relevant information
Methodology:
  1: The analysis introduces systematic perturbations to study human (agricultural
    trade restrictions) and physical (climate impacts on crop yields) interactions
    independently and in combination.
  2: Analysis is performed using the Global Change Analysis Model (GCAM v5.3), a global
    integrated model of socioeconomic, energy, land, and water systems, evaluating
    interactions between trade patterns and climate change impacts from 2015 to 2050.
  3: GCAM models 11 aggregate crop commodities, including four cereal commodities
    (corn, rice, wheat, and other grains), and projects regional exports and imports
    through a global trading pool.
  4: Analysis uses the Global Change Assessment Model (GCAM) to evaluate outcomes
    under a global zero cereal import dependency, incorporating climate change impacts
    on crop yields through a multiplier.
  5: Four scenarios are evaluated using the GCAM model with 5-year time steps up to
    2050, analyzing the effects of zero cereal import dependency and climate change
    on crop yields.
  6: The analysis uses the GCAM model. The base year for the model is 2015, and projections
    are made to 2050. The analysis considers scenarios with climate change, import
    dependency constraints, and a combination of both.
  12: The analysis uses a model to simulate the impacts of climate change and trade
    constraints on agricultural production and trade in the Middle East, with a specific
    focus on the year 2050.
  13: The analysis uses scenarios including a reference frame (RF), import dependency
    scenario (ID), climate change scenario (CC) and integrated climate change and
    import dependency constraint scenario (IC) to study the impacts on agriculture,
    bioenergy, and water sectors.
  14: Evaluates the individual and combined impacts of climate change and trade constraints
    on sectoral outcomes through 2050 using global cereal import dependency constraints.
  15: The study uses modeling to alter trade patterns and climate impacts and evaluate
    synergies and tradeoffs.
  16: States the authors involved in the methodology, indicating collaboration but
    not specifics on methods.
More Notes:
  4: The paper integrates crop yield impacts from the Agricultural Model Intercomparison
    and Improvement Project and uses Persephone to process climate impact data.
  6: The analysis focuses on the impact of climate change and import dependency constraints
    on global cereal markets and land use.
  12: The analysis includes scenarios representing climate change impacts (CC), trade
    constraints (ID), and a combination of both (IC), with results compared to a reference
    scenario (RF). The table focuses on the Middle East and provides data for cereals,
    non-cereals, and all crops combined.
  13: The Middle East data appears to show changes to net import expenditures, not
    revenues.
  16: The page provides author contributions, supporting information, and references
    but lacks specific analysis details or results on the page itself.
Quantitative material:
  1: The study reports a ~50% decrease in global trade of cereals and a 4% decrease
    in cereal production and consumption by 2050 under import dependency constraints;
    global irrigation water consumption increases by 3%, and corn ethanol production
    decreases by 7%.
  5: "The change in cereal import dependency ratio (CIDR) between 2015 and 2050 is\
    \ within \xB114 percentage points for most regions, with a decrease of cereal\
    \ imports to nearly half of the trade quantity in the reference scenario by 2025."
  6: Global cereal consumption decreases by about 3.5% in 2050 due to climate change
    (CC) compared to a reference future (RF). The import dependency constraint (ID)
    has a similar impact. The combined impact of import dependency constraint and
    climate change (IC) reduces global cereal consumption by roughly 7.5%. Import
    dependency constraint decreases global land allocated to cereal crops by 3.6%
    on average.
  7: The paper provides quantitative data showing changes in cereal import, consumption,
    and land allocation under different scenarios from 2020 to 2050.
  8: Quantitative changes include a -12% decrease in USA cereal production and a +9%
    increase in consumption under specific CIDR conditions by 2050.
  11: The table includes quantitative data with percent changes for key variables
    in the USA by 2050, comparing RF, ID, CC, and IC scenarios across various agricultural
    metrics.
  12: The table provides quantitative estimates for various key variables in 2050
    for the Middle East, including percentage changes compared to a reference scenario
    (RF) for production, consumption, exports, imports, net trade revenue, crop producers'
    revenue, caloric consumption, food expenditure, irrigation water consumption,
    and ethanol production.
  13: 'The analysis presents quantitative information such as: a roughly 50% loss
    in total crop export revenue for the USA relative to RF (reference frame) in ID
    (import dependency scenario); roughly 30% total loss in trade revenue in CC (climate
    change scenario); nearly 75% loss in trade revenue in IC (integrated climate change
    and import dependency constraint scenario); 94% reduction in cereal net import
    expenditures in the Middle East in ID; -18% change in USA producer revenue from
    cereals, -94% change in USA trade revenue, 8% decrease in irrigation water in
    the USA, and 21% increase in the Middle East.'
  14: Cereal crop consumption decreases in USA and Brazil; irrigation water consumption
    changes in Middle East smaller than in ID; increase in irrigation water for non-cereal
    crops in USA in CC is larger than the decrease in ID; corn ethanol production
    changes in Middle East (-14% in CC, -96% in ID) and USA (-18% in CC, 11% in ID)
  15: Global trade quantity of cereals decreases to almost half of the baseline under
    zero cereal import dependency.
  16: No relevant information
sourcematerial:
  1: 'Source material here.

    "The study evaluates the impacts of constrained cereal trade and climate change
    on agriculture, bioenergy, and water systems." - "International trade increases
    connections and dependencies between countries, weaving a network of global supply
    chains. Agricultural commodity trade has implications for crop producers, consumers,
    crop prices, water and land uses, and other human systems."


    "Climate change impacts on crop yields and restrictions on agricultural trade
    are identified as drivers impacting the outcomes." - "We introduce systematic
    perturbations in two dimensions, one human (restrictions on agricultural trade)
    and the other physical (climate impacts on crop yields)."


    "The study reports a ~50% decrease in global trade of cereals and a 4% decrease
    in cereal production and consumption by 2050 under import dependency constraints;
    global irrigation water consumption increases by 3%, and corn ethanol production
    decreases by 7%." - "In the scenario where all regions ensure an import dependency
    ratio of zero, the global trade of cereals decreases ~50% in 2050 compared to
    the baseline, with smaller decreases in cereal production and consumption (4%).
    The changes in trade also impact water and bioenergy: global irrigation water
    consumption increases 3% and corn ethanol production decreases 7% in 2050."


    "The analysis introduces systematic perturbations to study human (agricultural
    trade restrictions) and physical (climate impacts on crop yields) interactions
    independently and in combination." - "We introduce systematic perturbations in
    two dimensions, one human (restrictions on agricultural trade) and the other physical
    (climate impacts on crop yields). We explore these independently and in combination
    to distinguish the consequences of individual perturbation and interactive effects
    in long-term projections."


    "Regions experience larger changes in cereal consumption due to cereal import
    dependency constraints rather than due to climate change impacts; trade perturbations
    and climate change have varying regional effects." - "We show that most regions
    experience larger changes in cereal consumption due to cereal import dependency
    constraints than due to the impacts of climate change on agricultural yields."

