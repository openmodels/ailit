  14: 'Source material: "Agriculture,bioenergy, and water implications of constrained
    cereal trade and climate change impacts consumption decreases for cereal crops
    and increases for non-cereal crops in both the USA and Brazil, although the magnitude
    of change is much smaller in the Middle East than USA. Additionally, in the Middle
    East, the changes in irrigation water consumption in CC is much smaller than in
    ID, as international trade is able to mitigate some of the negative impacts on
    crop yields from climate change. Therefore, in IC, the change of irrigation water
    consumption is similar to ID given its dominant effects in the Middle East. In
    contrast, in the USA, the increase in irrigation water for non-cereal crops in
    CC is much larger in magnitude than the decrease in ID, resulting in an increase
    in irrigation water for non-cereal crops in IC. Results for irrigation water consumption
    across all regions are shown in S6 Fig in S1 File. Ethanol production. While CC
    has a similar percent change impact on corn ethanol production in the Middle East
    and USA, -14% and -18%, respectively, ID results in very different impacts, with
    a 96% decrease in Middle East and an 11% increase in USA. Note, though, that the
    corn ethanol production in the Middle East in 2050 is very small in RF, with <15%
    of the corn ethanol production of the USA. However, the magnitude of change in
    corn ethanol production in the Middle East in ID relative to RF is greater than
    the change in USA (Tables 1 and 2). The near complete elimination of corn ethanol
    in the Middle East in ID is due to the regional scarcity of cereal crops and a
    more elastic demand for ethanol than food. In contrast, in the USA, a major corn
    exporter, corn ethanol becomes relatively more competitive compared to other liquid
    fuels domestically due to the decrease in global demand for corn in ID. In general,
    in regions where corn ethanol is available, cereal net importers in RF reduce
    corn ethanol production in ID while the cereal net exporters increase corn ethanol
    production (S7 Fig in S1 File)."'
