  2: "Source material here.\n\"The paper evaluates the impacts of constrained cereal\
    \ trade and climate change on multi-sector outcomes including crop production\
    \ and consumption, exports, imports, crop prices, caloric consumption, agricultural\
    \ revenue, net trade revenue, food expenditure share of income, irrigation water\
    \ consumption, and crop-based ethanol production.\"\n\n\"To better understand\
    \ the interactions of non-linear and globally coupled agricultural-bioenergy-water\
    \ systems under the broader economy, and in response to agricultural trade and\
    \ climate change impacts, we introduce systematic perturbations to a global integrated\
    \ human-Earth system model in two dimensions.\"\n\n\"Decreased participation in\
    \ global markets due to all regions implementing a zero cereal import dependency\
    \ strategy leads to decreases in total cereal production and consumption at the\
    \ global scale.\"\n\n\"The impact of reduced international trade on production\
    \ and consumption of cereals is stronger than climate change in most regions.\"\
    \n\n\"We use the Global Change Analysis Model [GCAM v5.3; 23], a global, fully\
    \ integrated model of the socioeconomic, energy, land, and water systems, to disentangle\
    \ the individual roles of national and regional engagement in global markets and\
    \ climate change and the non-linear interactions between these two systems over\
    \ the period of 2015\u20132050.\"\n"
