  8: 'Source material: "For example, Australia_NZ, with a RF CIDR of -307% in 2050,
    shows changes in domestic cereal production and consumption of approximately -50%
    and +100%, respectively, in ID in 2050... Comparatively, the USA with a CIDR of
    -23% shows a -12% and +9% change in cereal production and consumption, respectively."
    "While climate change can influence production and consumption changes in some
    regions, the impact of the trade perturbations is generally larger... the USA,
    for which the changes for production and consumption in 2050 in CC, -10.6% and
    -9.0%, respectively, are comparable in magnitude to the production and consumption
    changes in ID, -11.8% and +8.9%, respectively... These changes are approximately
    additive in IC, where the increase in cereal consumption in ID is offset by the
    decrease in CC." "Regional prices of cereal crops... rise in regions with RF CIDR>0%
    (Western Europe, North Africa, and East Asia)."'
