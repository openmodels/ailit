  5: In most developing countries, practitioners traditionally used varying growth
    media such as perlite mixtures, peat moss, or bare soil to cultivate mini potato
    tubers. The most significant limitation of using soil as a growing medium is the
    difficulty in managing weeds and disease prevalence [11]. Transition from a soil-based
    to a soilless production system Drought, unpredictable weather, contaminated water
    sources, and undernutrition crops compelled producers to look for alternatives
    to soil-based agriculture (Table 1). In response, soilless agriculture, a revolutionary
    crop cultivation method, has been adopted by growers for the past few decades
    to overcome the shortcomings faced by soil-based cultivation [16]. In comparison
    to soil-based cultivation, the soilless technique is considered safer since it
    contains fewer or no soil-borne pathogens and pests. Hydroponics, a soilless system,
    has recently attracted researchers to overcome the limitations faced in traditional
    soil-based cultivation since it can be used for the production of crops irrespective
    of soil environment. Hydroponic systems, other than providing disease-free mini
    tubers, can provide multifold yield of seed potato as compared to the conventional
    methods [13, 14]. The paper interprets two factors (nutrients and substrate) that
    have been extensively studied but still need more investigation since this information
    is crucial for enhancing nutrient acquisition management in soilless systems.
    Additionally, smart agriculture may make it possible for farmers to use cutting-edge
    technologies like artificial intelligence (AI), nanoparticles (NPs), plant growth-promoting
    rhizobacteria (PGPR), and aeroponics [15].
