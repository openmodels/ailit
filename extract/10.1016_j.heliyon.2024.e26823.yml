  10: "Ebb and flow system is affordable, enhances nutrient recirculation, and requires\
    \ low maintenance. It is the preferred choice for growing celery and melons. The\
    \ primary limitations include the formation of root rot and crop loss due to technical\
    \ failure. In addition, it is easily prone to algal growth. [...] The evaporation\
    \ rate was 50 \u2013 70 % less in the nutrient wick when compared with other systems.\
    \ [...] DWC is a modified hydroponic system with an air stone, reservoir, air\
    \ pump, tubing, and floating platform. [...] Fong and Ulrich first conducted a\
    \ deep water cultivation study on potato cultivation. [...] DWC produced the highest\
    \ number of tubers but the least total tuber weight/plant among the three systems."
  11: 'plaintext

    The system is reliable and cheap, and an air pump uninterruptedly supplies oxygen
    to the crop root zone. A simple experimental setup in plastic boxes, glass basins,
    ice boxes, and fish ponds is enough for crop cultivation. Deep water cultivation
    is best suited for producing cherry tomatoes, cucumber, Chinese cabbage, lettuce,
    spinach, and radish NFT technique requires only a thin layer of solution at the
    bottom of a deep tank (a "film" in actuality; Figure 2e). Consequently, the lower
    half of the roots will receive food and water, while the upper half will be allowed
    to breathe. In terms of tubers/plant number in single and staggered harvest, the
    NFT system performed better statistically. In a single harvest the number of tubers
    in hydroponically grown seed potato plants was 147% higher than the bed and pot
    systems. Even in the staggered harvest, an increase of 286% in tubers was observed
    in the hydroponic plants as compared to the ones grown in beds. Denali plant trays
    produced 2,850 and 2,800 g of fresh tuber weight, respectively. Tican [30] compared
    mini-tuber development in two industrial substrates (perlite and expanded clay)
    and two hydroponic systems (wilma and NFT). The NFT was observed having positive
    results in terms of minituberization, mini-tuber number and weight.

