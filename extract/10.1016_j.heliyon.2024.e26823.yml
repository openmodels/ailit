Highlights:
  2: No relevant information
  3: Hydroponics offers a promising solution to the problem of insufficient access
    to high-quality potato seed stock and can provide better yield and crop productivity
    by saving water, energy, and space.
  4: Hydroponics offers better control over nutrients, more efficient water use, and
    suitability for areas with poor soil. Mini tuber production is a key approach
    for rapid potato seed multiplication.
  5: Soilless agriculture, particularly hydroponics, can potentially provide disease-free
    mini-tubers and multifold yield of seed potatoes compared to conventional methods.
    It also allows for accurate control of the root environment, improving production
    and quality.
  8: Perlite + peat moss (1:2) and Jeju scoria + peat moss (1:2) were the most suitable
    for seed tuber development and growth using a wick culture technique.
  11: The NFT hydroponic system significantly outperformed traditional methods in
    potato seed tuber production.
  12: NFT hydroponics enhances recirculation of excess solution of nutrients, aids
    in proper oxygen supply, is economical, minimizes land usage, labor and fertilizers,
    has minimal water consumption, and is climate resistant, suitable for smaller
    and fast-growing plants; Aeroponics provides highly oxygenated nutrients to the
    plants.
  13: Aeroponic systems can produce significantly more mini-tubers per plant compared
    to other methods, but high temperatures in lowland regions can limit their effectiveness.
    Plant density also influences tuber production in aeroponic systems.
  14: Aeroponics farming requires less water and no soil, making it a potentially
    valuable technique for crop production in hostile environments and possibly in
    extraterrestrial colonies and on sailing ships.
  16: Nanoparticles can be used to reduce the impacts of temperature, salt, and drought
    stress on plants by enhancing their tolerance to these stresses.
  17: Silver nanoparticles (AgNPs) or silver nitrate (AgNO3) increased growth parameters
    in potato plants. Foliar-sprayed silicon nanoparticles increased crop output under
    stress conditions including salinity, toxic heavy metals, and drought. Nanoparticle
    Si yielded superior results compared to ionized Si, increasing photosynthetic
    and biochemical indices, and improving water use efficiency.
  19: The hydroponics/aeroponic system is the most promising method for mass-producing
    mini tubers in any environment that humans can access, i.e., land, water, or space.
  32: Horizontal wicks showed better seed potato growth than vertical wicks. Aeroponic
    system provided higher productivity and less cost of tuber production per meter
    square. Deep-water culture was observed producing the highest number of small
    tubers compared to the rest.
  33: NFT system had a higher number of tuber number and tuber weight per plant. Aeroponics
    system produced two to five times more tubers per plant than the conventional
    system. Aeroponic system exhibited the best results and Monalisa cultivar showed
    higher fresh yield
  34: Agata and Monalisa cultivars were evaluated in a hydroponic system with multiple
    harvests involved, while other cultivars were grown with harvests in 95 days.
  35: Aeroponic systems significantly increased mini-tuber production compared to
    conventional systems and other tested methods.
