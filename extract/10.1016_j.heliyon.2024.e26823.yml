  14: "Source material here.\nAeroponics farming requires less water and no soil,\
    \ so it is a prudent option for promoting mini tuber production in challenging\
    \ potato cultivation environments, such as deserts, cold steep terrains, and coastal\
    \ regions. Mini potato tubers grown in an aeroponic system can either be transported\
    \ to an adjacent open field, or the technique can be utilized for crop production\
    \ in hostile environments. Aeroponics systems don't need fertile land to be installed,\
    \ and closer plant spacing is possible. This has led to the emergence of intriguing\
    \ ideas about growing crops on space stations, sailing ships, and extraterrestrial\
    \ colonies (lines 15-21).\n\nIn Uganda, Kakuhenzire et al. [35] found that aeroponics\
    \ increased potato mini tuber output by 8.5 times than the conventional cultivation\
    \ (lines 3-4).\n\nIn another study, Calori et al. [33] studied the role of electrical\
    \ conductivity (EC) on nutrient intake and growth of Agata and Asterix potato\
    \ varieties. Potato seedlings were seeded in phenolic foam and then aeroponically.\
    \ To follow tuber initiations, air temperature, growth cycle, shoot development,\
    \ and mini tuber output of both cultivars during different seasons, electrical\
    \ conductivities (1, 2, 3, and 4 dS m-1) and planting densities (25, 44, 66, and\
    \ 100 plants m-2) were evaluated. Both cultivars had optimal ECs below 2.1 and\
    \ 1.7 dS m-1, respectively (lines 6-11). \n"
  15: " \nIndustrialization is changing the face of agricultural advancements just\
    \ as it does to the rest of society. As a result of hydroponics technology, it\
    \ is possible to produce food crops in harsh environments such as hilly areas\
    \ too high to cultivate, concrete school playgrounds, and arctic settlements.\
    \ Beyond staple crops and vegetables, hydroponics may also produce specialty crops\
    \ like salad leaves, spices, and ornamental plants in urban locations where land\
    \ prices have replaced conventional farming [68]. Since the hydroponics system\
    \ utilizes only water and nutrient solution without the involvement of soil, any\
    \ failure or problem in the nutrient distribution, water pump, or nozzle clogging\
    \ will lead to rapid death of the growing plants. Special attention is required\
    \ to ensure real-time monitoring of the growth and development of the plant.\n"
