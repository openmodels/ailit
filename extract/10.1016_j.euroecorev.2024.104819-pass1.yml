  28: "Climate change produces peak GDP regional losses under our \u2018\u2018high\
    \ damage scenario\u2019\u2019, ranging as high as 43.9 percent in the case of\
    \ India. They exceed 30 percent for SSA, SLA, MENA, BRA, and SAP. For the US,\
    \ losses peak at 17.1 percent. In contrast, for Russia and Canada, climate change\
    \ is good news. Under BAU, Russia\u2019s and Canada\u2019s peak output gains are\
    \ 3.9 percent and 2.6 percent, respectively. These BAU reductions in output take\
    \ decades, but not millennia. India\u2019s peak loss of over two-fifths of its\
    \ output occurs in 2200. For our high-damage case, the UWIL carbon tax starts\
    \ at $ 91.4 per ton of CO2, rising, in real terms, at roughly 1.5 percent per\
    \ year. This policy dramatically reduces global and region-specific climate damage.\
    \ It also materially shortens the duration of fossil fuel usage by approximately\
    \ 130 years. Rather than increasing by as much as 3.7 degrees Celsius under BAU,\
    \ the peak temperature rise under UWIL policy is 2.1 degrees. Peak global damages\
    \ under UWIL are 9.2 percent of the planet\u2019s GDP. For India, the worst-hit\
    \ region under BAU, damages peak at 27.5 percent of GDP under UWIL versus 43.9\
    \ percent under BAU. We show that a compensatory carbon tax policy can achieve\
    \ a win-win for all cohorts regardless of their place or time of birth. Indeed,\
    \ carbon taxation coupled with region- and generation-specific positive or negative\
    \ transfers can achieve a uniform welfare gain. Absent policy, potential losses\
    \ to future generations are substantial. This study is supported by the Swiss\
    \ National Science Foundation (SNF) and the Russian Science Foundation."
