  25: " \nAs expected, the BAU infinite coal reserves scenario shows significantly\
    \ higher coal usage, particularly during years 50 through 100. This increases\
    \ carbon damages between years 75 and 300 by an additional 2.8% of global GDP.\
    \ However, optimal policy is not invariant to assumptions about coal\u2019s supply.\
    \ Optimal policy simply adjusts to our alternative conditions effecting a sharp\
    \ reduction in coal use notwithstanding its perfectly elastic supply. Indeed,\
    \ the use of coal under optimal UWI policy differs little in the two cases. Interestingly,\
    \ the UWI gain in the infinite reserve scenario is 5.5% versus 4.3% in the baseline\
    \ scenario. Since damages under BAU are higher when coal supply is in infinite\
    \ supply, the carbon externality is larger. This implies a larger proportional\
    \ payoff from mitigating carbon emissions.\n\nThe optimal tax in the first period\
    \ is reduced to $83.6 per ton of CO2 compared to $87.5 per ton in the baseline\
    \ specification, and over the 100-year horizon, the optimal tax decreases to $448\
    \ per ton compared to $543 per ton in the baseline.\n\nHow sensitive are our results\
    \ to assuming that clean energy can immediately perfectly substitute for dirty\
    \ energy? As indicated, we address by considering gradual transitions from imperfect\
    \ to perfect substitutability. Specifically, we assume that the final energy input\
    \ used to produce output is, as indicated in Eq.(46), CES in clean and dirty energy\
    \ with their elasticity of substitution, \u0303\U0001D462\U0001D461, rising at\
    \ different rates over the next three centuries.\n\nAs expected, slower green-for-dirty\
    \ substitutability leads to significantly higher dirty energy usage in the short\
    \ and medium terms. This is particularly true for coal. Slower substitutability\
    \ entails larger carbon damages. In the low-substitution case, they are roughly\
    \ 12 percent greater at the end of this century and for several centuries thereafter.\
    \ Interestingly, in all scenarios with imperfect substitution between clean and\
    \ dirty energy sources, the UWI gain is roughly 4.8 percent of GDP. Thus, the\
    \ assumption of infinite coal reserves increases the gains from climate policy,\
    \ while imperfect substitutability reduces them. The trajectory of the optimal\
    \ tax in the case of low substitutability turns out to be the lowest. The optimal\
    \ tax in the first period turns out to be $81.5 per ton in the first period and\
    \ $272 per ton after 100 years.\n\nIn considering carbon tax policy in a given\
    \ subset of regions (i.e., climate clubs), we tax the use of dirty energy in all\
    \ subset regions but now redistribute all carbon tax revenues to households in\
    \ participating regions in proportion to their populations. Fig.11 shows the effect\
    \ of a regional $100 carbon tax on global emissions. In addition to a global tax,\
    \ we also consider a tax only in CHI, JSHK, GRB, WEU, and the US and taxes only\
    \ in the US, only in CHI, only in JSHK, and only in WEU and GBR. As the figure\
    \ shows, taxes levied in only a single region have limited effects, even if that\
    \ region is China. A $100 Chinese-only carbon tax, with a 1.5 percent growth rate,\
    \ lowers initial global emissions by roughly one-sixth. In contrast, a $100 carbon\
    \ tax, growing at 1.5 percent annually but levied only in the US, only in Western\
    \ Europe, or only in JSHK, has almost no effect on global emissions.\n"
