    \ by coupling it to a climate emulator (cf. Section 3.4) and by adding an extra\
    \ region. Table 1 lists the model\u2019s 18 regions and their acronyms...The World\
    \ Bank\u2019s Development Indicators (WDI) is a primary data source, providing,\
    \ in particular, 2017 GDP values. These are used to calibrate the 2017 levels\
    \ of regional TFP. Energy consumption/usage data come from the US Energy Information\
    \ Administration (EIA)...The EIA data let us calibrate the region-specific CES\
    \ production functions specified in Eq. (46). As in Hillebrand and Hillebrand\
    \ (2020), we assume an elasticity of substitution between oil, coal, and gas of\
    \ \U0001D462 = 2...We measure the share parameters, \U0001D705\U0001D442,\U0001D705\
