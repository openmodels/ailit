  14: "Source material here.\n\"We consider higher damages in regions that incur losses\
    \ from global warming. At the same time, we assume only moderate gains for regions\
    \ that incur gains from global warming.\"\n\"According to our model, absent carbon\
    \ policy, the planet\u2019s average temperature will rise by 3.7 to 4.4 degrees\
    \ Celsius over the next 200 years.\"\n\"In the 6x damage scenario, global damages\
    \ peak at almost 17 percent of world output. However, India\u2019s damages reach\
    \ over 40 percent of GDP by 2200, with this percentage output loss persisting\
    \ for more than a century. For the US, China, and Japan/South Korea/Hong Kong,\
    \ the year 2200 damages exceed 16 percent of output with no improvement and, in\
    \ some cases, worsening over the following 100 years. Russia and Canada\u2019\
    s climate gains peak above 3.9 percent and 2.6 percent of GDP, respectively.\"\
    \n\"Fig. 2. Alternative calibrations of \u2018\u2018Krusell\u2013Smith\u2019\u2019\
    -type productivity functions as a function of temperature, measured in \uF0B0\
    C. The 2x, 4x, and 6x cases/scenarios reference our low-, medium-, and high-damage\
    \ scenarios.\"\n\"This section first presents BAU results for our different damage-function\
    \ specifications. Next, we consider alternative carbon policies, assuming all\
    \ regions levy annual carbon taxes equal to each year\u2019s global SCC.\"\n\"\
    As indicated, damages under BAU can be extraordinarily large for the world as\
    \ a whole, but particularly for specific regions. For example, in the 6x damage\
    \ scenario, global damages peak at almost 17 percent of world output. However,\
    \ India\u2019s damages reach over 40 percent of GDP by 2200, with this percentage\
    \ output loss persisting for more than a century.\"\n\"Planetary warming under\
    \ BAU benefits Russia and Canada, whose temperatures rise between 2.8 and 3.8\
    \ degrees and 2.7 and 3.6 degrees compared to pre-industrial levels (cf.Fig.8),\
    \ respectively. This reflects their initial (2017) very low average temperatures\
    \ \u2014 temperatures far too low to achieve peak productivity.\"\n\"Paradoxically,\
    \ global mean BAU temperature increases are significantly higher in the (1x and\
    \ 2x) low damage cases because lower damages mean higher GDP and, thus, higher\
    \ emissions. Despite the higher rise in global temperature, global and regional\
    \ damages are lower in these cases thanks to their more benign damage functions.\"\
    \n\"Note that only the right side of the productivity function shifts. In short,\
    \ we consider higher damages in regions that incur losses from global warming.\"\
    \n"
