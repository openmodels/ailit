sourcematerial:
  1: "Source material here. Climate change will impact current and future generations\
    \ in different regions very differently. This paper develops the first large-scale,\
    \ annually calibrated, multi-region, overlapping generations model of climate\
    \ change and carbon policy. It features region-specific temperature and damage\
    \ functions with the phased impact of emissions on global and regional temperature\
    \ calibrated to the latest scientific evidence. Absent policy, climate change\
    \ may, under high-damage scenarios, dramatically reduce GDP in most regions, with\
    \ India, Brazil, and the South Asian Pacific suffering long-term catastrophic\
    \ damages. Carbon taxation, coupled with region- and generation-specific transfers,\
    \ can both correct the carbon externality and raise the welfare of all current\
    \ and future agents across all regions by 4.3 percent. The impact on the use and\
    \ duration of fossil fuels is dramatic as is the reduction in the path of global\
    \ emissions. However, achieving completely uniform welfare gains leaves future\
    \ generations in particular regions facing exceptionally high compensatory payments.\
    \ Fortunately, a carbon tax-cum redistribution policy that limits this burden\
    \ for any generation in any region to less than 10 percent, measured on a consumption-equivalent\
    \ basis, can deliver a 4.0 percent or higher welfare gain for all peoplekind \u2014\
    \ present and future. However, carbon taxes set through time, at carbon\u2019\
    s marginal social cost, do far too little to mitigate climate change unless all\
    \ major emitters, particularly China, adopt them and do so immediately."
  2: "Source material\nThis paper develops a large-scale, multi-region, overlapping\
    \ generations (OLG) model to study climate change\u2019s cumulative damage to\
    \ global and regional output as well as carbon taxation\u2019s mitigation potential.\
    \ Our model features 18 regions inhabited by 80 overlapping, selfish generations.\
    \ Each region\u2019s demographic conditions and projections are closely calibrated\
    \ to UN data. Output is produced with capital, labor, and a time-varying combination\
    \ of dirty and clean energy. Dirty energy comprises oil, gas, and coal, each of\
    \ whose extraction is subject to increasing costs. Clean energy is produced with\
    \ capital, labor, and a fixed factor that proxies for regional limits on green-energy\
    \ production. Our equations connect carbon emissions to atmospheric carbon concentration\
    \ and, thereby, mean global temperature in accordance with the latest climate\
    \ science and projections. For the U.S., the reduction in 2100 GDP is 13.9 percent\
    \ without the UWI policy and 8.0 percent with it. For India, the hardest hit region,\
    \ our optimal UWI carbon tax limits the percentage decline in end-of-century output\
    \ from 38.5 percent to 26.2 percent. Hence, rather than experiencing a 14 percent\
    \ drop in global output by 2100, compared to its level absent climate change,\
    \ global output is only about 9 percent smaller. For Canada, which benefits from\
    \ climate change, climate change will raise GDP in 2100 by 2.5 percent. The UWI\
    \ policy reduces Canada\u2019s 2100 GDP by 0.6 percent relative to its no climate-change\
    \ level. Yet, carbon taxation, coupled with the appropriate interregional and\
    \ intergenerational redistribution, can substantially limit the damage while making\
    \ everyone, across space and time, equally better off. We implement this policy\
    \ for a range of damage functions, but focus on a worst-case scenario.\n"
  3: "Source material here.\nThe paper evaluates the impact of climate change on GDP\
    \ levels and consumption, with a focus on regional variations: \"Inourhigh-damagebaselinescenario,theincreaseintheplanet\u2019\
    smeansurfacetemperaturethrough2100, absentpolicy,isapproximately3.1degreesCelsius.\"\
    \ This highlights a global evaluation of climate impact focusing on temperature\
    \ increase and its resultant GDP impacts across regions.\n\nThe primary drivers\
    \ of risk are carbon emissions leading to increases in global mean surface temperature\
    \ and resulting region-specific damages impacting production: \"Climate change\
    \ lowers their 2100 GDP levels by 38.6, 33.4, 33.0, and 30.9 percent, respectively.\
    \ As for global GDP, its 2100 value is reduced by 14.7 percent.\"\n\nQuantitative\
    \ material describing significant impacts: \"Under a high-damage baseline scenario,\
    \ the increase in the planet\u2019s mean surface temperature through 2100, absent\
    \ policy, is approximately 3.1 degrees Celsius....Global GDP will be reduced by\
    \ 14.7 percent.\" It also mentions significant reduction in fossil fuel usage\
    \ due to optimal UWI policy: \"optimal UWI policy ends all dirty energy usage\
    \ by 2103 and dramatically reduces cumulative (2017 through fossil fuel\u2019\
    s end date) oil, gas, and coal consumption by 84.4 percent, 86.2 percent, and\
    \ 98.1 percent, respectively, limiting the rise in the global mean surface temperature\
    \ to 2.1 degrees Celsius.\"\n\nMethodology involving IAM and pattern scaling which\
    \ are crucial for the study: \"Our study builds what we believe is the first large-scale\
    \ OLG integrated assessment model (IAM) with region-specific emissions and damages...based\
    \ on a climate-science technique called \u2018pattern scaling\u2019.\"\n\nHighlights\
    \ include the partially mitigated impacts on GDP losses and carbon taxes' potential:\
    \ \"Global carbon taxation can significantly mitigate losses from climate change...limit\
    \ peak global damages by 44.3 percent.\"\n\nMore Notes, including negative impacts\
    \ turning into positives for certain geographical locations and the wide exploration\
    \ of carbon tax policies: \"Canada and Russia, whoseGDPlevelsin2100 are 2.5 percent\
    \ and 3.6 percent higher...The paper explores different carbon tax policies (UWI,\
    \ UWIF, UWIL) and their distributional effects across generations and regions.\"\
    \n"
  7: "Source material: L. Kotlikoff et al.; One way to handle this issue is to assume\
    \ a gradual increase in the degree of clean and dirty energy substitutability,\
    \ with the two forms of energy ultimately becoming perfect substitutes.; Dirty\
    \ energy producers, indexed by their energy-type, \U0001D440 \u2208 {\U0001D442\
    ,\U0001D43A,\uE22F }, have finite energy reserves, \U0001D445\U0001D440\U0001D461\
    . The costs of extracting these reserves are increasing in the cumulative amounts\
    \ extracted.; Although short- and medium-term use of dirty energy, particularly\
    \ coal, is greater the slower the transition to full substitutability, the optimal\
    \ paths of carbon taxation and UWI welfare gains are barely changed.; On the other\
    \ hand, the price of the dirty energy composite, \U0001D45D\U0001D437\U0001D467\
    ,\U0001D461, can exceed the price at which energy demand is fully met by clean\
    \ energy. When this occurs in a given region, there is no demand for the dirty\
    \ energy composite, and the use of fossil fuels ends."
