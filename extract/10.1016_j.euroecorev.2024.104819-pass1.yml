Highlights:
  1: Carbon taxation, coupled with region- and generation-specific transfers, can
    correct the carbon externality and raise the welfare of all current and future
    agents across all regions. Achieving completely uniform welfare gains leaves future
    generations in particular regions facing exceptionally high compensatory payments.
  2: Carbon taxation coupled with redistribution can significantly reduce the damage
    from climate change while improving welfare uniformly across regions and generations.
  3: Global carbon taxation can significantly mitigate losses from climate change,
    but atmospheric carbon concentration is already so high that the optimal UWI carbon
    tax policy can only limit peak global damages by 44.3 percent.
  7: Short- and medium-term use of dirty energy, particularly coal, is greater the
    slower the transition to full substitutability, but the optimal paths of carbon
    taxation and UWI welfare gains are barely changed. When the price of dirty energy
    exceeds the price at which energy demand is fully met by clean energy, there is
    no demand for the dirty energy composite, and the use of fossil fuels ends.
  10: "Larger values of the parameters \U0001D710+ and \U0001D710\u2212 indicate higher\
    \ costs for deviations from the optimal temperature, leading to higher regional\
    \ climate damages."
  12: The US emissions are significantly higher despite its relatively larger GDP,
    indicating less energy efficiency.
  14: Absent carbon policy, the planet's average temperature will rise by 3.7 to 4.4
    degrees Celsius over the next 200 years. Damages can be extraordinarily large,
    with India experiencing output losses exceeding 40% of GDP by 2200 under high
    damage scenarios. Russia and Canada may experience gains.
  15: Global peak GDP loss in the 6x case is close to 17 percent; higher damages limit
    output and emissions.
  16: Optimal tax rates are sensitive to the damage function; redistributive policies
    can lead to larger welfare gains across all generations but can impose significant
    future consumption sacrifices on certain regions.
  17: "Optimal carbon taxes cannot be determined without deciding on the distribution\
    \ of efficiency gains from taxing carbon; A simple, time-invariant growth in the\
    \ carbon tax suffices to produce the vast majority of any policy\u2019s welfare\
    \ impacts; UWI makes everyone better off but at a high net tax cost to low-income\
    \ regions; UWIL caps net taxes on future generations and leads to welfare gains\
    \ for region-specific generations not subject to the limit."
  18: Regions that never hit the 10 percent limit have a slightly lower welfare gain
    of 4.0 percent under UWIL policy compared to the uniform UWI gain. Some future
    generations enjoy much larger welfare gains under UWIL.
  19: The reduction of emissions is substantial and essentially identical with or
    without the sharing of net welfare gains across region-specific generations.
  20: The figure shows the total CO2 emissions for different policies as a function
    of years since 2017.
  22: Optimal carbon taxes can have significant economic implications, requiring compensations
    to current generations to avoid welfare losses.
  24: China is projected to eclipse the US economically with or without a carbon policy.
    The US economic hegemony ends, and the path to that end is essentially independent
    of carbon damage and carbon policy. India stands to lose the most from climate
    change, but carbon policy has a significant impact on its share of global GDP.
  25: Optimal policy adjusts to changes in coal supply, effecting a sharp reduction
    in coal use even with perfectly elastic supply; The carbon externality is larger
    when coal supply is infinite, implying a larger proportional payoff from mitigating
    carbon emissions; Slower green-for-dirty substitutability leads to significantly
    higher dirty energy usage and larger carbon damages; Assuming infinite coal reserves
    increases the gains from climate policy, while imperfect substitutability reduces
    them; Taxes levied in only a single region have limited effects, even if that
    region is China, unless that region has coal-intensive dirty energy.
  26: Partial participation of regions in emissions reductions leads to ineffective
    outcomes, with significant SCC only in China and the US despite large projected
    damages in other regions.
  27: Global carbon taxation is necessary; delayed carbon tax reduces welfare gains
    and increases emissions.
  28: Absent policy, climate change leads to substantial GDP losses in many regions,
    particularly India, SSA, SLA, MENA, BRA, and SAP, but benefits Russia and Canada;
    A compensatory carbon tax policy (UWIL) can achieve welfare gains while reducing
    climate damage.
  30: The social cost of carbon generally increases with higher CO2 concentration
    multiples and over time. There are regional variations in the social cost of carbon.
    Some regions (RUS, CND, EEU) have negative social costs of carbon.
  32: Determination of the optimal global carbon tax rate path.
  33: The social cost of carbon varies significantly by region, emission scenario,
    mitigation policy, and time horizon. The global social cost of carbon generally
    increases over time and with higher emission scenarios.
Methodology:
  1: Large-scale, annually calibrated, multi-region, overlapping generations model
    of climate change and carbon policy with region-specific temperature and damage
    functions. Impact of emissions on global and regional temperature is calibrated
    to the latest scientific evidence.
  2: The model incorporates regional demographic conditions, atmospheric carbon emissions,
    and temperature projections and evaluates carbon taxation accompanied by interregional
    and intergenerational transfers.
  3: The study uses a large-scale overlapping generations (OLG) integrated assessment
    model (IAM) with region-specific emissions and damages. It employs 'pattern scaling'
    to determine region-specific temperatures. It also handles feedbacks between temperature,
    damages, production, and emissions.
  7: The paper develops a model with clean and dirty energy sources, including oil,
    gas, and coal. The model incorporates the substitutability between clean and dirty
    energy and considers different paths to perfect substitutability. The model also
    includes equations for cost minimization and the constraint that dirty-energy
    consumption is non-negative. The extraction costs of dirty energy increase as
    reserves approach zero.
  8: "The analysis involves the use of economic modeling with Kuhn\u2013Tucker conditions\
    \ and Lagrange multipliers to evaluate the impact of carbon taxes and carbon-policy-related\
    \ debts on energy producers and households."
  9: The paper models climate evolution using a functional form based on DICE (Nordhaus,
    2017) but with parameterization from Folini et al. (2024). It models the carbon
    cycle with three reservoirs (atmosphere, upper ocean, lower ocean), and uses pattern
    scaling to infer regional temperatures from global temperatures.
  10: A climate-economic model is employed to calculate TFP as a function of regional
    temperature deviations from an optimal temperature, T*.
  11: The elasticity of substitution between oil, coal, and gas is set at 2, based
    on previous studies.
  12: Energy consumption as a share of GDP is used as a measure to calculate region-specific
    contributions of energy to output.
  13: The analysis uses univariate regressions to calculate regional productivity
    growth rates, with assumptions for post-2100 growth and clean energy productivity
    parameters.
  14: "Uses a Krusell-Smith-type productivity function, calibrated with low, medium,\
    \ and high damage scenarios (2x, 4x, and 6x, respectively) based on different\
    \ values of  \U0001D710+ .  The model simulates BAU and alternative carbon policies,\
    \ including those with and without transfers or welfare restrictions."
  15: The analysis uses a climate emulator calibrated according to the multi-model
    mean of CMIP5 simulations; BAU emissions fall between the RCP6.0 and RCP4.5 scenarios.
  16: The analysis models carbon policies with and without transfers, assessing impacts
    using different damage specifications and providing SCC-determined carbon-tax
    paths.
  17: Simulation model using various carbon tax and transfer schemes (No Transfers,
    UWI, UWIF, UWIL, BAU) to assess the impacts of different levels of CO2 damage
    (1x, 2x, 4x, 6x) on various economic and climate outcomes.  Results are applicable
    to understanding the economic implications of different carbon taxation and transfer
    policies.
  18: Analysis based on 'UWIL policy'
  19: The analysis focuses on carbon tax policies using a 6x damage specification
    and evaluates the effects on emissions and damages.
  20: The analysis examines the impact of different policies on total CO2 emissions
    over time, under a 6x damage specification.
  21: The x-axis references the year of birth for the 6x damage specification, and
    year 0 is 2017.
  22: The analysis includes the computation of optimal carbon taxes and their economic
    implications, particularly regarding net transfers to cohorts by year of birth.
  24: The analysis projects GDP shares under different climate scenarios and carbon
    policies. Applicability is tied to the specific model assumptions, particularly
    the 6x damage scenario and the effectiveness of the 'optimal' carbon policy. The
    time horizon extends to 2150.
  25: "The model uses a CES function to represent the substitutability of clean and\
    \ dirty energy with an elasticity of substitution, \u0303\U0001D462\U0001D461\
    , rising at different rates over the next three centuries, eventually becoming\
    \ perfectly substitutable; Scenarios are run under different assumptions about\
    \ the rate of increase in the elasticity of substitution and the extent of global\
    \ participation."
  27: Analysis considers effects of various carbon tax coalitions and timing on welfare
    gains and emissions.
  28: The study uses a model to assess the economic impacts of climate change under
    a Business-as-Usual (BAU) scenario and various policy interventions, including
    compensatory carbon tax policies (UWI, UWIF, UWIL). The analysis considers region-
    and generation-specific transfers and taxes.
  29: The analysis employs a recursive solution algorithm and backward induction to
    solve a series of nonlinear equations for projecting economic and energy-related
    variables under different carbon tax scenarios.
  30: The table presents the social cost of carbon under different scenarios, without
    explicitly describing the underlying model or methodology.
  32: Solving a model with a carbon tax path and Lump-Sum Redistribution Authority
    (LSRA) to derive the largest UWI carbon tax policy. The model considers regional
    productivity in final output and clean energy production sectors, regional land
    and labor supply, world capital supply, reserves of oil, gas, and coal, and next-period
    Lagrange multipliers for dirty energy reserves extraction dynamics. The optimal
    global carbon tax rate path is determined numerically through an iterative process
    involving guessing welfare changes, updating transfers, and adjusting the guess
    based on the present value of transfers.
  33: The table presents model outputs of social cost of carbon under different scenarios;
    the specific methodology used to generate these numbers is not contained in the
    snippet.
  34: 'The paper describes an iterative process to find the optimal carbon tax: (1)
    guess the optimal carbon tax based on the Social Cost of Carbon (SCC) in the Business
    As Usual (BAU) scenario; (2) find the LSRA solution for a given tax path; (3)
    calculate the new equilibrium SCC path and update the carbon tax path; (4) iterate
    until convergence.'
More Notes:
  1: "India, Brazil, and the South Asian Pacific are expected to suffer long-term\
    \ catastrophic damages absent policy. Carbon taxes set through time, at carbon\u2019\
    s marginal social cost, do far too little to mitigate climate change unless all\
    \ major emitters, particularly China, adopt them and do so immediately."
  3: The model incorporates negative damages (benefits) in some regions due to climate
    change, specifically Canada and Russia. The paper explores different carbon tax
    policies (UWI, UWIF, UWIL) and their distributional effects across generations
    and regions.
  7: The model incorporates energy reserves and increasing extraction costs, which
    are factors relevant for climate change impacts. The paper focuses on the energy
    sector, including trade, cost minimization, and energy production.
  14: Lower damages can lead to higher GDP and emissions, resulting in higher global
    mean temperature increases. Only the right side of the productivity function (related
    to warming) shifts, assuming moderate gains for regions with positive impacts.
  15: Under BAU, oil, gas, and coal production will end worldwide in 200 years, though
    the timing varies by region; by 2100, China and India account for almost 40 percent
    of world GDP.
  18: Carbon taxes are rebated to dirty-energy companies.
  24: The paper examines the sensitivity of the results to alternative assumptions
    regarding coal reserves (finite vs. infinite).
  25: No relevant information
  28: The paper emphasizes the importance of considering intergenerational equity
    and time consistency in climate policy design. The study is funded by the Swiss
