Quantitative material:
  1: Climate change may dramatically reduce GDP in most regions under high-damage
    scenarios; Carbon taxation can raise welfare of all current and future agents
    across all regions by 4.3 percent; A carbon tax-cum redistribution policy that
    limits burden to less than 10 percent can deliver a 4.0 percent or higher welfare
    gain
  2: Canada's GDP increases by 2.5% due to climate change, but UWI policy reduces
    this by 0.6% relative to no climate-change scenario.
  3: "Under a high-damage baseline scenario, the increase in the planet\u2019s mean\
    \ surface temperature through 2100, absent policy, is approximately 3.1 degrees\
    \ Celsius. India, the South Asian Pacific, Sub-Saharan Africa, the Middle East\
    \ and North Africa will see their 2100 GDP levels reduced by 38.6, 33.4, 33.0,\
    \ and 30.9 percent, respectively. Global GDP will be reduced by 14.7 percent.\
    \ Optimal UWI policy ends all dirty energy usage by 2103 and dramatically reduces\
    \ cumulative (2017 through fossil fuel\u2019s end date) oil, gas, and coal consumption\
    \ by 84.4 percent, 86.2 percent, and 98.1 percent, respectively, limiting the\
    \ rise in the global mean surface temperature to 2.1 degrees Celsius. Peak global\
    \ GDP loss declines from 16.7 percent to 9.3 percent. The optimal UWI gain is\
    \ 4.3 percent, measured as a consumption compensating variation."
  7: No relevant information
  12: U.S. GDP is one-fifth larger than that of Western Europe, but its emissions
