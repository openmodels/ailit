  13: " \nTable4presents these productivity rates relative to the US productivity\
    \ growth rate. The depicted productivity growth rate differentials are applied\
    \ through 2100. After 2100, we assume that productivity growth in all regions\
    \ equals the assumed fixed 1.56 percent US growth rate. As for productivity growth\
    \ in clean energy, we set it to generate a 0.5 percent per year decline in the\
    \ steady-state energy price. \nTo calibrate region-specific productivity growth\
    \ in final goods production, we rely on univariate, country-specific regressions\
