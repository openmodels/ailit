Drivers of Risk:
  1: The analysis identifies anthropogenic climate change, particularly changes in
    temperature and precipitation, as drivers impacting agricultural productivity.
  2: Global average annual temperature and annual precipitation
  3: The shocks impacting outcomes on this page are changes in green-season average
    temperature (T) and precipitation (P).
  4: Warmer temperatures during the green season, precipitation changes.
  5: Changes in temperature, particularly in warm and cool regions, are impacting
    agricultural productivity outcomes, with a focus on temperature variables like
    Tmax, Tmean, and Tmin.
  6: Anthropogenic Climate Change (ACC)
  7: Anthropogenic climate change, weather, climate
  8: Temperature and precipitation changes during the 'green season' (5-month period
    centred around the greenest month of the year) are the primary drivers considered.
    Models also consider 'brown' (dry) season. Uses historical weather data (1948-2016)
    and CMIP6 climate model simulations (1961-2020).
  9: The changes impacting the outcomes are driven by variations in temperature (Tmax,
    Tmin, Tmean), precipitation, and the presence of ACC as opposed to scenarios without
    ACC.
  13: Changes in green-season average temperature (T) and total precipitation (P)
    are impacting country-level agricultural productivity.
  17: Changes in green-season average temperature (T) and green-season total precipitation
    (P) are the drivers of risk.
  19: Changes in green-season average temperature (T) and green-season total precipitation
    (P).
  21: The shocks impacting the outcomes are changes in green-season average temperature
    (T) and green-season total precipitation (P).
  23: Changes in green-season temperature (T) and total precipitation (P) impact agricultural
    productivity.
  25: Changes in green-season average temperature and total precipitation are identified
    as impacting agricultural productivity.
  27: Green-season average temperature (T) and green-season total precipitation (P).
  28: Weather variables
Evaluation overview:
  1: The paper evaluates the historical influence of anthropogenic climate change
    (ACC) on global agricultural total factor productivity (TFP).
  2: Agricultural total factor productivity (TFP)
  3: This page provides an overview of the outcome being evaluated, which is agricultural
    Total Factor Productivity (TFP) growth.
  4: Impact of anthropogenic climate change (ACC) on global agricultural total factor
    productivity (TFP) growth.
  5: The paper evaluates the impact of anthropogenic climate change (ACC) on global
    agricultural productivity, specifically focusing on Total Factor Productivity
    (TFP) losses.
  6: Impact estimates for each region reflecting various sources of uncertainty; Impact
    for each country.
  7: Agricultural productivity growth, total factor productivity (TFP)
  8: Evaluates the impact of weather (temperature and precipitation) on agricultural
    Total Factor Productivity (TFP).
  9: The analysis evaluates the impact of anthropogenic climate change (ACC) on agricultural
    total factor productivity (TFP) growth globally and across different countries.
  13: The outcome being evaluated is the change in agricultural productivity in response
    to weather changes.
  17: Agricultural productivity, specifically country-level Total Factor Productivity
    (TFP), is being evaluated.
  19: Agricultural productivity, measured by country-level Total Factor Productivity
    (TFP).
  21: The outcome being evaluated is the response of agricultural productivity, specifically
    country-level total factor productivity (TFP), to changes in weather conditions.
  23: Response of agricultural productivity to weather changes evaluated through country-level
    total factor productivity (TFP).
  25: The page discusses the response of agricultural productivity via total factor
    productivity (TFP) to changes in weather variables such as temperature (T) and
    precipitation (P).
  27: Evaluates the response of agricultural productivity (country-level TFP - Total
    Factor Productivity) to changes in weather.
  28: Global impact of anthropogenic climate change
Highlights:
  1: The paper finds that ACC has not only reduced TFP but also increased the vulnerability
    of global agriculture to ongoing climate change.
  2: Average agricultural TFP has more than doubled since 1961, but there is wide
    cross-country variation.
  3: There is a robust relationship between agricultural TFP growth and weather changes,
    with green-season temperature and precipitation impacting productivity.
  4: Higher temperatures have become more damaging to TFP growth over time. ACC has
    significantly impacted global agricultural productivity, with a cumulative loss
    of approximately 20.8% between 1961 and 2020. The study finds no evidence that
    weather has a persistent effect on TFP growth.
  5: The study finds increased sensitivity to climate change in global agriculture
    over time and that exclusion of certain countries does not significantly alter
    baseline findings; substantial regional disparities in impacts are identified,
    particularly for warm regions.
  6: ACC is increasingly reducing agricultural output as we drift away from a climate
    system without human influences, cumulating into a detectable and sizeable impact
    as of 2020.
  7: Anthropogenic climate change has slowed global agricultural productivity growth;
    climate effects on US total agricultural productivity; climatic sensitivity of
    US agriculture linked to technological change and regional specialization.
  8: The study aims to derive the effect of anthropogenic climate change (ACC) on
    global agricultural TFP. The econometric model seeks to control for country-specific
    time trends and unobserved inputs to isolate the impact of weather on TFP.
  9: Most variations of the econometric models have little effect on the baseline
    result that ACC negatively impacts agricultural TFP, but using revenue regression
    weights and aggregating weather over 'green seasons' slightly increases the damage
    estimates.
  17: "The response of agricultural productivity to weather for 1962\u20131988 is\
    \ analyzed."
  19: Response functions are centered vertically so that the exposure-weighted marginal
    effect is zero.
  23: Baseline response of TFP to weather changes established with a focus on temperature
    and precipitation effects.
  27: Shows the response of country-level TFP to changes in green-season average temperature
    and total precipitation. Includes placebo checks to assess the robustness of the
    findings.
  28: Shows impact estimates for 298 model variations with confidence intervals; reduction
    in out-of-sample MSE relative to a model that excludes weather variables
Methodology:
  1: The analysis uses an econometric model linking country-level TFP growth with
    weather changes, incorporating temperature and precipitation as variables over
    the greenest month of the year.
  2: The analysis uses the Global Meteorological Forcing Dataset (GMFD) observations
    and CMIP6 (seven GCMs) to show the evolution of global average annual temperature
    and annual precipitation. Country-level growth in agricultural TFP is analyzed
    from 1961-2015.
  3: "The analysis uses response functions and placebo checks through random mismatch\
    \ and reshuffling of TFP and weather data by year or country; results are shown\
    \ as part of a 1962\u20132015 sample period."
  4: Econometric estimates are linked with counterfactual weather trajectories from
    CMIP6 climate experiments (with and without ACC) to derive the cumulative impact
    of ACC for each country since 1961. The analysis uses 10,000 reshuffled datasets
    for placebo checks. Models are also estimated based on the first (1962-1988) and
    second (1989-2015) halves of the sample period. The study also looks at different
    temperature variables, functional forms (cubic), and weighting by revenue.
  5: The analysis employs econometric models accounting for different functional forms,
    regression weights, aggregation weights, and heterogeneity; cross-validation was
    used, with variations tested on historical data from different temporal subsets.
  6: Econometric model based on climate uncertainty (from GCMs), econometric uncertainty
    (from the estimation) and specification uncertainty (from the choice of the econometric
    model); Analysis up to 2020.
  7: References total factor productivity estimation and analysis
  8: Uses an econometric model to regress changes in TFP on changes in green-season
    average temperature and precipitation, controlling for country and year fixed
    effects. Employs a bias-corrected spatial disaggregation (BCSD) approach to downscale
    climate model data. Block bootstrap estimation used to capture statistical uncertainty.
  9: The analysis uses econometric models, consisting of 296 variations, to assess
    the robustness of the impacts of weather variables on TFP, considering combinations
    of model specifications including temperature, precipitation, and different data
    aggregation methods, with results applicable from 1962 to 2020.
  13: The analysis uses response functions of changes in country-level TFP to changes
    in weather, with 500-year-by-region block bootstraps to establish confidence bands;
    includes placebo checks with reshuffled datasets.
  17: The analysis uses country-level TFP and weather data from 1962-1988. The response
    functions are centered vertically so that the exposure-weighted marginal effect
    is zero. Year-by-region block bootstraps are performed. Placebo checks are conducted
    by randomly reshuffling TFP and weather data by years and by country, generating
    10,000 reshuffled datasets.
  19: Analysis is performed for 1989-2015, with a baseline response function for 1962-2015
    also shown. Year-by-region and country block bootstraps (500 repetitions) are
    used for confidence intervals. Placebo checks involve randomly reshuffling TFP
    and weather data by year and by country.
  21: The analysis uses response functions and placebo checks involving reshuffling
    of TFP and weather data by years and by country, with confidence bands based on
    500 year-by-region block bootstraps.
  23: "Utilizes block bootstraps and reshuffling methods to assess response to weather\
    \ changes over 1989\u20132015, excluding 10% coldest countries."
  25: The analysis uses response functions and block bootstraps, with a placebo check
    involving random reshuffling of TFP and weather data.
  27: Uses data from 1989-2015. Employs year-by-region block bootstraps. Includes
    placebo checks involving randomly reshuffling TFP and weather data by years and
    by country. The response functions are centered vertically so that the exposure-weighted
    marginal effect is zero. Linear and quadratic T coefficients are estimated from
    reshuffled datasets.
  28: Econometric models; 10-fold cross-validation
More Notes:
  6: Estimates do not remove the direct effect that rising CO2 concentrations have
    on agricultural production or the presence of agricultural research or carbon-intensive
    inputs. TFP estimates are notoriously difficult to construct and require considerable
    background work, sometimes using imperfect data sources; Ignoring all measured
    inputs overstates ACC impacts.
  8: Irrigation water use is likely mismeasured in the TFP metric. Measurement error
    in TFP data is unlikely to be correlated with year-to-year weather changes.
  9: While the study focuses on TFP growth rates rather than levels, measurement error
    concerns are discussed, especially regarding the potential underestimation of
    short-term irrigation responses to adverse weather.
  17: The study compares the response function for 1962-1988 to the baseline response
    function for 1962-2015 (shown in dashed lines).
No relevant information:
  14: No relevant information
Quantitative material:
  1: The analysis finds that ACC has reduced global agricultural TFP by about 21%
    since 1961, with reductions more severe in warmer regions such as Africa and Latin
    America (~26-34%).
  2: Average agricultural TFP has more than doubled since 1961.
  3: The response functions of TFP growth to changes in temperature and precipitation
    show changes with 90% and 95% confidence intervals based on 500 year-by-region
    block bootstraps.
  4: "Cumulative impact of ACC on global agricultural TFP growth over 1961\u20132020\
    \ is about -20.8% (90% confidence interval -39.1% to -10.1%). The global TFP level\
    \ projected to be reached in 2020 with ACC would have been reached in 2013 without\
    \ ACC."
  5: The paper estimates a global mean impact of ACC of -16.9% in TFP with regional
    impacts as high as -34% in Africa; impacts vary across regions and time, with
    significant losses noted.
  6: Coloured bands represent 95%, 90% and 80% confidence intervals (CIs) that reflect
    climate uncertainty (from GCMs), econometric uncertainty (from the estimation)
    and specification uncertainty (from the choice of the econometric model). The
    colour in the map corresponds to the ensemble mean impact for each country based
    on these three sources of uncertainty.
  7: Mentions specific articles quantifying climate effects on agricultural productivity
    (e.g., Liang et al., 2017; Ortiz-Bobea et al., 2018)
  8: "Indicates a global TFP increase of 76% over 1961\u20132015 based on their approach,\
    \ compared to 71% from USDA data."
  9: The study computes cumulative impacts of ACC on global agricultural TFP growth
    since 1961 across 2,000 trajectories, showing impact distributions for all years
    between 1962 and 2020.
  17: "Response functions of changes in country-level TFP to changes in green-season\
    \ average T and total P are shown. The baseline response function for 1962\u2013\
    2015 is shown in dashed lines. 90% and 95% confidence bands are provided. The\
    \ country-level distribution of green-season average T is shown."
  19: Response functions of changes in country-level TFP to changes in green-season
    average T and P. 90 and 95% confidence bands are provided. Country-level distribution
    of green-season average T is shown.
  23: Confidence bands and distribution data presented, indicating the response of
    TFP to temperature and precipitation changes.
  25: The response functions are depicted with confidence bands, and distributions
    are presented, but this page does not specify precise quantitative percentages
    or changes.
  27: Presents response functions showing the relationship between changes in TFP
    and changes in temperature and precipitation, including confidence bands (90 and
    95%).
  28: "Average mean impact of -16.9 \xB1 5.9%"
sourcematerial:
  1: "  \nThe paper evaluates the historical influence of anthropogenic climate change\
    \ (ACC) on global agricultural total factor productivity (TFP).  \n\nResearch\
    \   to   date   on   the   historical   impact   of   ACC   focuses   overwhelmingly\
    \     on   yields   of   major   cereal   crops21\u201323 or on total gross domestic\
    \ product24. However, recent studies in this area are of limited value for assessing\
    \ overall agricultural productivity for the following reasons: (i) cereal crops\
    \ represent only about 20% of agriculture\u2019s global net production value (Extended\
    \ Data Fig. 1), (ii) variations in measures such as yield, could deviate from\
    \ changes in overall productivity if farmers also adjust inputs in response to\
    \ weather25\u201327 and (iii) growth and levels of total and agricultural GDP\
    \ diverge considerably in most countries28\u201330, and thus impacts of climate\
    \ change on total GDP could deviate considerably from agricultural impacts31,32.\
    \    \n\nThe analysis identifies anthropogenic climate change, particularly changes\
    \ in temperature and precipitation, as drivers impacting agricultural productivity.\
    \   \n\nWe develop a robust econometric model of weather effects on global agricultural\
    \ total factor productivity (TFP) and combine this model with counterfactual climate\
    \ scenarios to evaluate impacts of past climate trends on TFP. \n\nThe analysis\
    \ finds that ACC has reduced global agricultural TFP by about 21% since 1961.\n\
    \nOur baseline model indicates that ACC has reduced global agricultural TFP by\
    \ about 21% since 1961, a slowdown that is equivalent to losing the last 7 years\
    \ of productivity growth.  \n\nWith reductions more severe in warmer regions such\
    \ as Africa and Latin America (~26-34%).    \nThe effect is substantially more\
    \ severe (a reduction of ~26\u201334%) in warmer regions such as Africa and Latin\
    \ America and the Caribbean.\n\nThe analysis uses an econometric model linking\
    \ country-level TFP growth with weather changes, incorporating temperature and\
    \ precipitation as variables over the greenest month of the year.    \n\nWe quantify\
    \ the impact of ACC on global agricultural productivity since 1961 (ref. 34).\
    \ Instead of focusing on crop yield or agricultural output, we rely on a measure\
    \ of agricultural TFP. TFP measures aggregate output per unit of measured aggregate\
    \ input35\u201338. TFP thus captures interactions between output and input adjustments\
    \ that eluded earlier research. Here we rely on official TFP statistics, for which\
    \ agricultural output includes crops and livestock, while inputs encompass labour,\
    \ land, physical capital, and materials12.\n\nThe paper finds that ACC has not\
    \ only reduced TFP but also increased the vulnerability of global agriculture\
    \ to ongoing climate change.    \n\nWe also find that global agriculture has grown\
    \ more vulnerable to ongoing climate change.     \n"
  2: Source material here.
  3: "Source material here: Fig. 2 | Response of agricultural productivity to weather.\
    \ a,b, Response function of TFP growth to changes in green-season average T (a)\
    \ and P (b). Response functions are centred vertically so that the exposure-weighted\
    \ marginal effect is zero. The coloured bands represent 90% and 95% confidence\
    \ bands based on 500 year-by-region block bootstraps. The blue bars represent\
    \ the country-level distribution of green-season average T over the sample period\
    \ 1962\u20132015. The average green-season T is indicated for a select number\
    \ of large countries. c\u2013f, Results of placebo checks whereby TFP and weather\
    \ data are randomly mismatched or reshuffled by years (c,e) or country (d,f) where\
    \ the distribution represents the linear and quadratic T (c,d) or P (e,f) coefficients\
    \ based on 10,000 reshuffled datasets. We find a robust relationship between agricultural\
    \ TFP growth and weather changes (Fig. 2 and Supplementary Table 1)."
  4: "The temperature response function is roughly linear and downward sloping (Fig.\
    \ 2a), indicating that warmer temperatures over the green season are detrimental\
    \ to TFP growth. [...] A critical question for climate change adaptation is whether\
    \ agriculture is becoming more or less sensitive to climatic extremes. This would\
    \ be reflected empirically as changes over time in the response functions shown\
    \ in Fig. 2. We estimate a model based on the first (1962\u20131988) and second\
    \ (1989\u20132015) halves of the sample and find that the temperature response\
    \ function is noticeably steeper for the latter half. [...] We subsequently link\
    \ our econometric estimates with counterfactual weather trajectories from climate\
    \ experiments with and without ACC to derive the cumulative impact of ACC for\
    \ each country since 1961. [...] The cumulative impact of ACC on global agricultural\
    \ TFP growth over the 1961\u20132020 period is about \u221220.8% with a 90% confidence\
    \ interval between \u221239.1% and \u221210.1%. [...] Specifically, we find that\
    \ the global TFP level projected to be reached in 2020 in our world with ACC would\
    \ have been reached in 2013 in a world without ACC."
  5: " \nEvaluation overview justified by: \"The large negative impacts for Africa\
    \ seem particularly worrisome given the large portion of the population employed\
    \ in agriculture.\"\n\nDrivers of Risk justified by: \"year and find that those\
    \ models fit less well and point to noticeably smaller damage.\"\n\nQuantitative\
    \ material justified by: \"Our global results conceal sizeable regional and cross-country\
    \ disparities... the cumulative impact of ACC since 1961 is greater for warm regions\
    \ such as Africa (\u221234.0%).\"\n\nMethodology justified by: \"Impact estimates\
    \ for 96 model variations... relative to a model that excludes weather variables,\
    \ thus higher bars indicate better model fit.\"\n\nHighlights justified by: \"\
    Our global results conceal sizeable regional and cross-country disparities...\
    \ the cumulative impact of ACC since 1961 is greater for warm regions such as\
    \ Africa... Overall, these findings are consistent with some localized slowdowns\
    \ in agricultural productivity growth.\"\n"
  6: "  \n\"Impact estimates for each region reflecting various sources of uncertainty.\
    \ The coloured bands represent 95%, 90% and 80% confidence intervals (CIs) that\
    \ reflect climate uncertainty (from GCMs), econometric uncertainty (from the estimation)\
    \ and specification uncertainty (from the choice of the econometric model)...\
    \ The colour in the map corresponds to the ensemble mean impact for each country\
    \ based on these three sources of uncertainty.\"\n\"Our study suggests that ACC\
    \ is increasingly reducing agricultural output as we drift away from a climate\
    \ system without human influences, cumulating into a detectable and sizeable impact\
    \ as of 2020.\"\n\"For instance, our estimates do not remove the direct effect\
    \ that rising CO2 concentrations have on agricultural production or the presence\
    \ of agricultural research or carbon-intensive inputs. In addition, the reader\
    \ may be rightfully concerned about measurement error of our TFP metric. TFP estimates\
    \ are notoriously difficult to construct and require considerable background work,\
    \ sometimes using imperfect data sources... Moreover, the TFP metric we rely upon\
    \ likely mismeasures certain inputs, such as irrigation water use. Our own analysis\
    \ shows that ignoring all measured inputs overstates ACC impacts.\"\n"
