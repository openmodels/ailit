  9: "  \nEvaluation overview: \"Impact of ACC. We compute the impact of ACC on each\
    \ country\u2019s agricultural TFP growth...\"\nDrivers of Risk: \"We consider\
    \ all possible combinations of models along the following dimensions: (1) relies\
    \ on either Tmax, Tmin or Tmean, (2) includes or excludes precipitation,...\"\n\
    Quantitative material: \"Figure 3a shows the 2,000 trajectories of the cumulative\
    \ impact of ACC for all years in 1962\u20132020, as well as the distribution of\
    \ those impacts on 2020.\"\nMethodology: \"We conduct a systematic exploration\
    \ spanning 296 variations of the econometric model... Note that Fig. 4 shows a\
    \ subset of the models in the main text. We consider all possible combinations\
    \ of models along the following dimensions...\"\nHighlights: \"We find that most\
    \ of these variations have relatively little bearing on the baseline result presented\
    \ in Fig. 3. The adoption of revenue regression weights and a \u2018green season\u2019\
    \ for weather aggregation represent the two most consequential modeling choices...\"\
    \nMore Notes: \"Measurement error. Measurement error affects all econometric analyses,\
    \ and its consequences are well understood... Omitted or mismeasured variable\
    \ input adjustments in response to weather fluctuations could be problematic.\"\
    \n"
  13: The outcome being evaluated is the change in agricultural productivity in response
    to weather changes. Response function of changes in country-level TFP to changes
    in green-season average T. Response function of changes in country-level TFP to
    changes in green-season total P. Changes in green-season average temperature (T)
    and total precipitation (P) are impacting country-level agricultural productivity.
    Response function of changes in country-level TFP to changes in green-season average
    T. Response function of changes in country-level TFP to changes in green-season
    total P. The analysis uses response functions of changes in country-level TFP
    to changes in weather, with 500-year-by-region block bootstraps to establish confidence
    bands; includes placebo checks with reshuffled datasets. Response functions are
    centered vertically so that the exposure-weighted marginal effect is zero. The
    baseline response function with all countries is shown in dashed lines. The coloured
    bands represent 90 and 95% confidence bands based on 500 year-by-region block
    bootstraps. Panel shows the result of a placebo check whereby TFP and weather
    data are randomly mismatched or reshuffled by years. Same as previous panel but
    based on datasets reshuffled by country.
