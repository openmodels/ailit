    \ in country-level TFP to changes in green-season average T. Response functions\
    \ are centered vertically so that the exposure-weighted marginal effect is zero.\
    \ The baseline response function for 1962\u20132015 is shown in dashed lines.\
    \ The coloured bands represent 90 and 95% confidence bands based on 500 year-by-region\
    \ block bootstraps. The blue bars represent the country-level distribution of\
