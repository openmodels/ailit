  28: "Source material: Global impact of anthropogenic climate change under a wide\
    \ range of econometric models. The vertical bars directly below the impact estimates\
    \ represent the reduction in out-of-sample MSE of a 10-fold cross-validation (whereby\
    \ years of data are sampled together) relative to a model that excludes weather\
    \ variables. The red horizontal line and band represent the average mean impact\
    \ of the 288 models out of the 298 that do not exclude observations, plus and\
    \ minus a standard deviation (\u221216.9 \xB1 5.9%). Econometric models; 10-fold\
    \ cross-validation (whereby years of data are sampled together). The upper part\
    \ of the figure shows the impact estimates for 298 model variations. The vertical\
    \ lines around each estimate represent the 90 and 95% confidence intervals (in\
    \ light and dark colour, respectively)... The vertical bars directly below the\
    \ impact estimates represent the reduction in out-of-sample MSE of a 10-fold cross-validation\
    \ (whereby years of data are sampled together) relative to a model that excludes\
    \ weather variables."
