  1: "Source material: For the Blue Foods economy\u2014those sectors that gain value\
    \ from the biological productivity of the oceans such as fisheries and aquaculture\u2014\
    climate shocks pose an existential threat. Species range shifts, harmful algal\
    \ blooms, marine heatw a v es, lo w o xy gen e v ents, coral bleaching, and hurricanes\
    \ all present a serious economic risk to these industries, and yet there exist\
    \ few financial tools for managing these risks. We suggest that a con v ergence\
    \ of the insurance industry and marine sectors, fostered through collaboration\
    \ with go v ernments, academics, and NGOs will help usher in new forms of insurance,\
    \ such as ocean-index or parametric insurance. Designing financial tools to aid\
    \ risk management, such as insurance, for equitable resilience against marine\
    \ climate shocks will give coastal communities access to the necessary means for\
    \ reducing their sensitivity to climate shocks and improving their long-term adaptive\
    \ capacity. Currently, however, there is relatively little use of financial risk\
    \ management tools such as insurance, especially newer forms such as index or\
    \ parametric insurance, to help operators manage the impacts of marine-related\
    \ climate shocks on production in both aquaculture and wild-capture fisheries...In\
    \ land-based food production systems insurance is an omnipresent tool across several\
    \ social and economic contexts for improving food and income security."
  2: "Source material: \n\"The continued exposure to these shocks is a serious threat\
    \ to the maintenance of blue food supply chains and the associated food and income\
    \ security of those individuals that work in these industries. These risks can\
    \ dictate short- and long-term profitability, and ultimately solvency, across\
    \ the full range of blue-food sectors from artisanal fisheries to industrial fisheries\
    \ to transnational aquaculture firms... Marine climate shocks such as marine heatwaves\
    \ can impact this productivity, for example, by creating conditions where corals\
    \ bleach (d). ... Insurance maintains the capital reserves that blue-food actors\
    \ hold by reducing the volatility in income. This enables blue-food actors to\
    \ invest in the means to cope with future shocks. More specifically, insurance\
    \ does not simply provide access to financial assets\u2014insurance transfers\
    \ risk (Sethi, 2010 ), typically via an insurance contract between the actor experiencing\
    \ the realized risk (e.g. a farmer) and a different actor that can better absorb\
    \ the risk (i.e. an insurance firm). ... For example, a heatwave on land can result\
    \ in below-average yields simply because these are not good growing conditions\
    \ for the specific crop (Ummenhofer et al. 2009 ), and a marine heatwave might\
    \ have similar impacts on the catch per unit effort of fishers or the growth of\
    \ shellfish in an aquaculture operation. ... Specifically, moral hazard, adverse\
    \ selection, and the issue of accurately pricing risk (see the Table 1 for an\
    \ overview of terms relating to climate and financial risk). For the blue-foods\
    \ sectors, these challenges present themselves as major barriers to the use of\
    \ insurance as a tool for protecting coastal communities from climate shocks.\"\
    \n"
