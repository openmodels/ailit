Drivers of Risk:
  1: Species range shifts, harmful algal blooms, marine heat waves, low oxygen events,
    coral bleaching, and hurricanes.
  2: Climate shocks, specifically marine heatwaves, impacting biological productivity.
  4: Marine climate shocks, such as harmful algal blooms and hurricanes, impact fisheries
    and their economic stability.
  5: "Harmful algal blooms, disease outbreaks, changes in water quality, and extreme\
    \ weather events, specifically mentioning anomalously warm ocean conditions and\
    \ hurricanes. Also, El Ni\xF1o conditions and the positive phase of the Southern\
    \ Annular Mode."
  6: Climate shocks, specifically marine heatwaves, changes in ocean temperature,
    oxygen levels, and nutrient availability.
  7: Climate shocks impacting fisheries and aquaculture production, prolonged sea
    surface temperatures, storms, ocean temperature, oxygen levels, and disease risk.
  8: Climate shocks affecting coastal community livelihoods and blue food supply chains
  9: Marine climate shocks such as marine heatwaves and harmful algal blooms, and
    shifting spatial ranges of marine species due to climate change.
  10: Marine heat waves, hypoxic events, harmful algal blooms, climate shocks
Evaluation overview:
  1: Economic risk to blue foods sectors (fisheries and aquaculture) due to climate
    shocks affecting productivity.
  2: Impacts on blue food supply chains, food and income security, and profitability
    of blue-food sectors.
  4: The paper evaluates the outcome of marine climate shocks on fisheries, including
    economic losses and their adaptive capacity.
  5: Mortality and productivity loss in wild fisheries and aquaculture.
  6: Fishery and aquaculture production/revenue.
  7: Discusses insurance as a resilience mechanism against climate shocks affecting
    production in the fisheries and aquaculture sector.
  8: No relevant information
  10: Economic impacts of marine climate shocks on the blue-foods sector, fisheries,
    and aquaculture; resilience of coastal communities
Highlights:
  1: Financial tools like insurance can enhance the resilience of blue food supply
    chains and coastal communities to climate shocks.
  2: Climate shocks can impact the biological productivity underpinning operations,
    similar to how heatwaves on land impact crop yields.
  4: Insurance tools are suggested as a potential improvement over current disaster
    relief methods for quickly addressing financial impacts from marine disasters.
  5: Climate shocks can be detrimental to aquaculture operations even with insurance.
    Data scarcity and uncertainty in blue foods risk quantification hinder insurance
    effectiveness. Small-scale aquaculture operations in the Global South are typically
    uninsured.
  6: It is difficult to quantify the impacts of climate change on oceans at scales
    relevant to blue food production and attribute drops in fishery/aquaculture production
    to specific marine shocks. Insurance for fisheries faces challenges like moral
    hazard (untruthful claims, risk-seeking behaviors) and adverse selection (higher
    risk individuals more likely to buy insurance), which can lead to market failure.
  7: Parametric insurance offers reduced costs and more timely payouts compared to
    indemnity insurance, but faces challenges related to basis risk. Cooperative insurance
    models can leverage social norms to manage moral hazard and adverse selection.
  8: Governments can promote cooperative self-insurance and provide subsidies to increase
    resilience against marine climate shocks
  9: Insurance can provide economic resilience in the near term while supporting long-term
    planning. Over time, insurance can adjust to changing conditions via premiums,
    potentially offering faster adaptation compared to legislative reforms.
  10: Insurance can increase economic resilience in fisheries and aquaculture; financial
    risk management tools can incentivize sustainable practices; tying insurance to
    geographic regions/producer groups can encourage collective action and resource
    conservation; data availability, predictive analytics, and insurance policy design
    can give blue-food sectors access to financial risk management
Methodology:
  1: Suggests a convergence of the insurance industry and marine sectors, fostered
    through collaboration with governments, academics, and NGOs, to develop new forms
    of insurance like ocean-index or parametric insurance.
  2: The paper discusses the role of insurance in mitigating the financial risks associated
    with climate shocks in blue-food sectors.
  4: The paper reviews case studies of specific climate impacts on blue-food sectors,
    analyzing statistics and financial outcomes.
  5: Discusses insurance mechanisms, parametric insurance, and challenges in pricing
    risk due to data scarcity and uncertainty in blue food production.
  6: Discusses challenges in pricing risk and attributing production drops to specific
    marine shocks due to the complexity of ocean systems and the ability of fish to
    move and interact with other stressors.
  7: Discusses indemnity insurance and parametric insurance (index insurance) as approaches
    to mitigate risk. Also touches on cooperative or risk-pool insurance models, including
    Community-Based Fisheries Management (CBFM), co-management approaches, Individual
    Transferable Quotas (ITQs), and Territorial Use Rights for Fisheries (TURFs).
  8: No relevant information
  10: Proposes using insurance-based risk reduction approaches (specifically parametric
    insurance), drawing parallels with the agricultural sector
More Notes:
  1: Argues that insurance is currently underutilized in managing marine-related climate
    shocks compared to its use in land-based agriculture.
  2: The paper highlights challenges to insurance becoming a viable option in the
    blue-foods sectors, specifically moral hazard, adverse selection, and accurately
    pricing risk.
  5: Wild fisheries are a common pool resource, which presents challenges for insurance
    policies that are generally developed for private goods.
  6: Discusses the potential for insurance to exacerbate existing problems in poorly
    managed fisheries and the importance of sustainable fisheries management for insurance
    to be effective. The accuracy of ocean forecasts and the ability to predict fish
    population dynamics are improving and could be used in future insurance applications.
  7: Mentions the Caribbean Catastrophic Risk Insurance Facility (CCRIF) as an example
    of parametric insurance protecting fishing communities from storms. Highlights
    the R4 Rural Resilience Initiative as an example of a cooperative parametric insurance
    scheme. Notes the importance of trust and social capital for successful cooperative
    self-insurance.
  8: Marine tourism and recreational fisheries are affected by climate shocks, highlighting
    the importance of protecting diverse blue food industries
  9: Insurance may delay necessary shifts in occupation or location, potentially causing
    harm by propping up failing industries.
  10: Emphasis on the need for robust scientific data, analytic techniques, and inclusive
    stakeholder engagement in developing financial risk management tools
Quantitative material:
  4: In Puerto Rico, Hurricane Maria led to a 20% drop in commercial landings, with
    economic losses estimated at US$17.8 million.
  5: "An export loss of \u223CUS$800 million in Chilean aquaculture due to a harmful\
    \ algal bloom event in 2016."
  8: No relevant information
