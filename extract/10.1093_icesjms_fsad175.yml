    help give blue-food sectors that are reliant on the biological productivity of
    the oceans the necessary access to financial risk management tools for long-term
    survival and even prosperity under climate change...A unique strategy that we
    can perhaps learn from involves tying financial tools like parametric insurance
    to specific geographic regions and/or groups of producers."


