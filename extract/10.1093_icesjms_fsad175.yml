    Drivers of Risk: "In addition, the magnitude and frequency of certain climate
    shocks (e.g. marine heatwaves) are likely to increase non-linearly under climate
    change... Many marine species ranges are shifting spatially (Pinsky et al., 2020
    ), and at some point, certain species will no longer be found in areas that have
    been historically fished (Seldon et al., 2020 )."


    Highlights: "The key here is to implement insurance mechanisms that provide economic
    resilience in the near term, combined with support mechanisms for long-term planning...
    insurance helps people move to other sources of income or move into other fisheries...
    insurance premiums can also send a strong market signal that adaptation is required,
    which may be more rapid than legislative reform or direction."


    More Notes: "A related concern is that in the face of long-term climate change,
    insurance may serve to prop up failing industries... insurance may encourage fishers
    to continue working in this fishery rather than incentivizing a gradual shift
    away to a more viable alternative such a different local fishery."

