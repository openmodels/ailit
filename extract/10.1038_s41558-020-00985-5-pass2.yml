  2: Day-to-day temperature variability impacts regional growth; moderated by seasonal
    temperature differences.
  4: Day-to-day temperature variability
  5: The main driver discussed is the increase in day-to-day temperature variability.
  6: Day-to-day temperature variability
  9: Day-to-day temperature variability
  10: "The shock impacting the outcome is a 1\xB0C increase in day-to-day temperature\
    \ variability."
  12: Day-to-day temperature variability (1 degree increase)
Evaluation overview:
  1: Macro-economic growth
  2: The paper evaluates the impact of day-to-day temperature variability on regional
    economic growth rates.
  4: Reduction in regional growth rates
  5: This page discusses the impact of day-to-day temperature variability on regional
    economic growth, with a particular focus on differences between higher- and lower-income
    regions.
  6: Economic growth effects
  9: Economic growth
  10: The paper provides information on the impact of day-to-day temperature variability
    on regional economic growth rates.
  12: Regional growth rates
Highlights:
  1: Increases in day-to-day temperature variability reduce macro-economic growth
    independent of and in addition to changes in annual average temperature.
  2: Regions with smaller seasonal temperature differences, such as low-latitude and
    coastal areas, experience greater economic losses from temperature variability.
  4: The reduction in regional growth rates per extra degree of day-to-day temperature
    variability is larger in countries with lower GDP per capita. Day-to-day temperature
    variability in spring, summer, and autumn has significant effects on annual regional
    growth rates. Day-to-day temperature variability affects agricultural, manufacturing
    and services sectors approximately equally.
  5: Low-income regions face larger economic losses due to temperature variability,
    irrespective of latitude; higher income enables better adaptation; and persistence
    of negative impacts on growth is evident for at least two years following an initial
    temperature shock.
  6: "The effect of day-to-day temperature variability on macroeconomic growth thus\
    \ constitutes a previously unidentified impact channel of considerable magnitude\
    \ in the climate\u2013economy relationship."
  10: Regions with smaller seasonal temperature differences suffer greater economic
    losses from increased day-to-day temperature variability.
  12: The difference between the response of high- and low-income regions is not significant,
    although above-median income regions generally experience smaller marginal losses.
Methodology:
  1: Fixed-effects panel models, using observed day-to-day temperature variability
    with subnational economic data for 1,537 regions worldwide over 40 years.
  2: "Analysis uses fixed-effects panel regression models on approximately 29,000\
    \ year-region observations from 1979\u20132018, focusing on intra-monthly standard\
    \ deviations of daily temperatures and economic growth."
  4: "Regression models using degree days above 30\xB0C and 25\xB0C as additional\
    \ controls; robustness tests including different climate re-analysis datasets,\
    \ population-weighted climate data, region-specific time trends, and exclusion\
    \ of specific countries."
  5: The analysis uses data partitioned by median national income to separately evaluate
    impacts for above- and below-median income countries; it employs a distributed-lag
    model to assess the temporal persistence of temperature variability impacts.
  6: Econometric specification
  8: Data is partitioned by income for certain analyses, based on gross regional product
    per capita in 2008.
  9: Regression models are used; Economic output data are provided by M. Kalkuhl and
    his team
  12: Estimated for regions with below- and above-median regional income, using the
    partition shown in Extended Data Fig. 2b and models in Supplementary Table 9.
More Notes:
  2: Day-to-day temperature variability has an additional effect on economic growth
    independent of changes in annual average temperature.
  4: "The effect of day-to-day temperature variability is unaltered by including degree\
    \ days above 30\xB0C and 25\xB0C, suggesting that it reflects the inherently damaging\
    \ effects of greater variability. The effect of day-to-day temperature variability\
    \ in winter on annual regional growth rates is statistically insignificant and\
    \ of negligible magnitude, possibly due to adaptation."
  6: Spill-over effects may potentially attenuate or aggravate these effects, but
    a thorough assessment of their role requires explicit assessment of the trade,
    financial and infrastructure networks through which they may propagate and as
    such is beyond the scope of this work.
Quantitative material:
  1: An extra degree of variability results in a five percentage-point reduction in
    regional growth rates on average; highest vulnerability in low-latitude, low-income
    regions (12 percentage-point reduction).
  2: An extra degree Celsius of day-to-day temperature variability reduces regional
    growth rates by at least 5 percentage points.
  4: Marginal change in growth rate (percentage points) per extra degree of day-to-day
    temperature variability
  5: The analysis finds that marginal losses from increased temperature variability
    are larger in low-income regions compared to high-income regions, with losses
    dependent on the seasonal temperature difference.
  6: Translates to economic growth effects of approximately one percentage point under
    our central econometric specification
  10: "The page includes marginal effects of a 1\xB0C increase in day-to-day temperature\
    \ variability on economic growth rates, with 95% confidence intervals."
  12: Marginal effects of a 1 degree increase of day-to-day temperature variability
    on regional growth rates.
sourcematerial:
  1: 'Source material: Elevated annual average temperature has been found to impact
    macro-economic growth. Here we show that increases in seasonally adjusted day-to-day
    temperature variability reduce macro-economic growth independent of and in addition
    to changes in annual average temperature. Combining observed day-to-day temperature
    variability with subnational economic data for 1,537 regions worldwide over 40
    years in fixed-effects panel models, we find that an extra degree of variability
    results in a five percentage-point reduction in regional growth rates on average.
    The impact of day-to-day variability is modulated by seasonal temperature difference
    and income, resulting in highest vulnerability in low-latitude, low-income regions
    (12 percentage-point reduction).'
  2: "Source material: We find that day-to-day temperature variability has a negative\
    \ linear effect on regional growth rates. An extra degree Celsius of day-to-day\
    \ temperature variability in a given year and region reduces the regional growth\
    \ rate by at least five percentage points. Countries which experience smaller\
    \ seasonal temperature differences are affected more by a given change in day-to-day\
    \ temperature variability. This suggests that exposure to greater changes in temperature\
    \ over the course of the year cultivates resilience against day-to-day variability.\
    \ The effect of day-to-day variability and its interaction with the seasonal temperature\
    \ difference is significant and remarkably stable under the inclusion of various\
    \ other climate measures in the regression models. Importantly, the effect of\
    \ day-to-day temperature variability on regional growth rates is unaffected by\
    \ the inclusion of annual average temperature under all specifications. This implies\
    \ that it constitutes an additional effect to that of annual average temperature\
    \ already identified in previous studies. We find that the magnitude of the response\
    \ is modulated by the seasonal temperature difference. Analysis uses fixed-effects\
    \ panel regression models to exploit within-region changes of day-to-day temperature\
    \ variability and regional growth from one year to the next. We calculate our\
    \ measure from the European Centre for Medium-Range Weather Forecasts (ECMWF)\
    \ Reanalysis fifth generation (ERA5) climate data for the years 1979\u20132018\
    \ and combine it with a regional economic dataset, to yield roughly 29,000 year\u2013\
    region observations. For example, in regions of northern Russia or Canada, where\
    \ average monthly temperature varies by over 40 \xB0C within a year, losses per\
    \ extra degree of day-to-day temperature variability can be as small as three\
    \ percentage points. On the contrary, marginal losses can be greater than 10 percentage\
    \ points in regions of Colombia or Indonesia, where seasonal temperature differences\
    \ are less than 3 \xB0C. Marginal losses from an increase in day-to-day temperature\
    \ variability are largest in low-latitude and coastal regions as these regions\
    \ typically experience small seasonal temperature changes and are hence less resilient\
    \ to variability. The paper considers the intra-monthly standard deviation of\
    \ daily temperature a better measure of day-to-day variability and focuses on\
    \ variability away from seasonal expectations."
  4: "Source material here: the reduction in regional growth rates per extra degree\
    \ of day-to-day temperature variability (marginal change) is larger in countries\
    \ with lower GDP per capita (2017 values), since they tend to experience smaller\
    \ seasonal temperature differences ... we calculate the degree days above 30\xB0\
    C and 25\xB0C in different regions of our sample and include them in the regression\
    \ models as an additional control ... The effect of day-to-day temperature variability\
    \ is unaltered by the inclusion of these measures, suggesting that it predominantly\
    \ reflects the inherently damaging effects of greater variability in temperature\
    \ realizations ... Moreover, we find that day-to-day temperature variability in\
    \ spring, summer and autumn has significant effects of similar magnitudes on annual\
    \ regional growth rates ... Interestingly, the effect of day-to-day variability\
    \ in winter on annual regional growth rates is statistically insignificant and\
    \ of negligible magnitude ... We exploit the sectoral detail of our economic dataset\
    \ to show that the effects of day-to-day variability are approximately equal across\
    \ the agricultural, manufacturing and services sectors ... The inclusion of region-specific\
    \ time trends accounts for possible regional trends in economic growth and climate\
    \ ... The exclusion of the United States, China or major oil producers from the\
    \ dataset precludes the possibility that the effect is dominated by the response\
    \ of a particularly large economy or industry."
  5: "  \nSource material here.\n\nEvaluation overview: \"This page discusses the\
    \ impact of day-to-day temperature variability on regional economic growth, with\
    \ a particular focus on differences between higher- and lower-income regions.\"\
    \n- \"Marginal losses from an increase in day-to-day temperature variability are\
    \ generally larger for regions in low-income nations compared with those in higher-income\
    \ nations.\"\n- \"The negative impacts of day-to-day variability persist for at\
    \ least two years following the initial shock.\"\n\nDrivers of Risk: \"The main\
    \ driver discussed is the increase in day-to-day temperature variability.\"\n\
    - \"Marginal losses from an increase in day-to-day temperature variability.\"\n\
    \nQuantitative material: \"The analysis finds that marginal losses from increased\
    \ temperature variability are larger in low-income regions compared to high-income\
    \ regions, with losses dependent on the seasonal temperature difference.\"\n-\
    \ \"Marginal losses from an increase in day-to-day temperature variability are\
    \ generally larger for regions in low-income nations compared with those in higher-income\
    \ nations.\"\n- \"Regional marginal losses are dependent on the seasonal temperature\
    \ difference, but in regions with below-median national income, marginal losses\
    \ are generally larger than in their higher-income counterparts.\"\n\nMethodology:\
    \ \"The analysis uses data partitioned by median national income to separately\
    \ evaluate impacts for above- and below-median income countries; it employs a\
    \ distributed-lag model to assess the temporal persistence of temperature variability\
    \ impacts.\"\n- \"By partitioning our data on the basis of median national income\
    \ and re-evaluating the analysis separately on each dataset.\"\n- \"Following\
    \ recent econometric literature, we use a distributed-lag model to address this\
    \ question with regard to the effect of changes in day-to-day temperature variability\
    \ on economic growth.\"\n\nHighlights: \"Low-income regions face larger economic\
    \ losses due to temperature variability, irrespective of latitude; higher income\
    \ enables better adaptation; and persistence of negative impacts on growth is\
    \ evident for at least two years following an initial temperature shock.\"\n-\
    \ \"Marginal losses are generally larger for regions in low-income nations; this\
    \ is more pronounced in higher-latitude countries.\"\n- \"This suggests both that\
    \ higher income directly shields against day-to-day variability and that it facilitates\
    \ better adaptation.\"\n- \"The negative impacts of day-to-day variability persist\
    \ for at least two years following the initial shock.\"\n"
  6: "The effect of day-to-day temperature variability on macroeconomic growth thus\
    \ constitutes a previously unidentified impact channel of considerable magnitude\
    \ in the climate\u2013economy relationship. This should therefore be considered\
    \ by policymakers and climate and integrated assessment modellers who wish to\
    \ consider the broader effects of future climate change on the economy. Doing\
    \ so may have knock-on implications for the social cost of carbon and for determining\
    \ optimum levels of mitigation. This translates to economic growth effects of\
    \ approximately one percentage point under our central econometric specification\
    \ (Table 1, column (3)). Spill-over effects may potentially attenuate or aggravate\
    \ these effects, but a thorough assessment of their role requires explicit assessment\
    \ of the trade, financial and infrastructure networks through which they may propagate\
    \ (such as in refs. 54,55) and as such is beyond the scope of this work."
  8: "  \nMethodology: \"We apply fixed-effects panel regression models to estimate\
    \ the effect of the annual measure of day-to-day temperature variability... on\
    \ economic growth.\"\nMethodology: \"Our primary source of climate data is the\
    \ ERA5 re-analysis dataset... we also use the daily temperature at surface and\
    \ daily total precipitation from the WFDEI... and EWEMBI... datasets cover the\
    \ period 1979\u20132018.\"\nMethodology: \"Grid-cell monthly climate variables...\
    \ are then aggregated to the regional level. Regions are taken to be the highest\
    \ administrative unit within a country... rather than weighting by population.\"\
    \nMethodology: \"The resulting combination of economic and climate data yielded\
    \ 29,603 observations to be used in the regression models.\"\nMethodology: \"\
    To compare climate variables with macro-economic data, an assessment must be made\
    \ at the yearly level.\"\nMethodology: \"Regions are taken to be the highest administrative\
    \ unit within a country, as indicated in the GADM Database of Global Administrative\
    \ Areas.\"\nMethodology: \"As a measure of economic activity, we use data on economic\
    \ output at the subnational level, referred to as gross regional product.\"\n\
    Methodology: \"Data are partitioned into above- and below-median income on the\
    \ basis of national averages of gross regional product per capita in 2008.\"\n"
  9: "yaml\nEvaluation overview: \"Economic output data are provided by M. Kalkuhl\
    \ and his team at the Mercator Research Institute on Global Commons and Climate\
    \ Change.\"\nDrivers of Risk: \"A.L. proposed the climate measure.\" AND \"Kotz,\
    \ M. Data and code for the publication \u2018Day-to-day temperature variability\
    \ reduces economic growth\u2019\"\nMethodology: \"M. Kotz and L.W. designed the\
    \ regression models.\" AND \"Economic output data are provided by M. Kalkuhl and\
    \ his team at the Mercator Research Institute on Global Commons and Climate Change.\"\
    \n"
  10: "Marginal effects of a 1\xB0 Celsius increase of day-to-day temperature variability\
    \ on regional growth rates, as estimated by model (7) in Table 1. Regions which\
    \ are accustomed to smaller seasonal temperature differences suffer greater marginal\
    \ losses (greater negative marginal changes) from a 1 degree increase of day-to-day\
    \ temperature variability. 95% confidence intervals are shown shaded, and the\
    \ histograms show the distribution of the data used to estimate the model."
  12: 'Source material: "Extended Data Fig. 3 |Marginal effects of high and low-income
    regions. Marginal effects of a 1 degree increase of day-to-day temperature variability
    on regional growth rates, estimated for regions with below- and above-median regional
    income. When partitioned based on regional-income, the difference between the
    response of high- and low-income regions is not significant, although above-median
    income regions generally experience smaller marginal losses. The results shown
    here are based on the partition shown in Extended Data Fig. 2b and, and the models
    used to estimate the marginal effects are those shown in Supplementary Table 9."'
