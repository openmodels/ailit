Drivers of Risk:
  1: Climate change increasing heat exposures, global population aging
  2: "Chronic exposure to high average temperatures (using cooling degree days above\
    \ 24\xB0C) and acute exposure to extreme high temperatures (using annual count\
    \ of hot days > 37.5\xB0C and the 95th percentile of the 20-year daily maximum\
    \ temperature distribution)."
  3: The main drivers of risk discussed are the increase in the number of hot days,
    rising maximum temperatures, and demographic changes towards an aging population.
  4: Future climate-related risks are influenced by total population growth, demographic
    changes in the age structure, and heat exposure.
  5: Climate change and population aging are identified as the main drivers of increased
    heat exposure risks, particularly affecting older adults.
  6: Value changes in population age structure and climate scenarios SSP2(45) and
    5(85) affecting heat exposure determinants.
  7: Impacts on outcomes are driven by factors such as climate change, population
    growth, and aging populations, especially in areas with insufficient resources
    to deal with heat extremes.
  8: The main shock impacting outcomes is climate change-driven enhancement of the
    urban heat island effect and heat extremes.
  9: 'The meteorological indicators (CDD, TMax95th, #HD) vary by SSP scenario.'
  12: The primary driver identified is climate change, particularly rising temperatures,
    which increases heat exposure and related mortality risks among the elderly.
  13: No relevant information
Evaluation overview:
  1: Heat exposure of older adults
  2: No relevant information
  3: No explicit overview of the final outcomes like mortality or productivity loss
    is provided.
  5: The paper evaluates acute exposure impacts on population groups, specifically
    in terms of cumulative heat exposure and temperature thresholds.
  6: The paper evaluates the impacts of climate change on chronic and acute heat exposures
    among older adults.
  7: This page discusses the evaluation of exposure determinants to heat extremes,
    specifically focusing on Billion Person Degree Days (PDDs), Billion Person Hot
    Days (PHDs), and Billion Person Degrees (PD95th).
  8: The paper evaluates the effectiveness of adaptation measures in moderating morbidity
    and mortality risk due to climate impacts, particularly for older adults.
  9: "Population heat exposures are evaluated using cooling degree days (CDD), the\
    \ 20-year average 95th percentile of daily maximum temperatures (TMax95th), and\
    \ the 20-year average count of days with a dry bulb maximum temperature of 37.5\xB0\
    \ C (#HD)."
  12: The paper assesses heat-related mortality risk, particularly in relation to
    climate change predictions and population aging.
  13: No relevant information
Highlights:
  1: Chronic heat exposure doubles by mid-century, disproportionately impacting older
    adults, especially in Asia and Africa.
  2: 'Visualizes bivariate global maps of the fraction of the population aged 69+
    in the current climate and circa 2050 under SSP2, and their heat exposures (CDDs,
    TMAX95, #HD).'
  3: "The analysis projects a significant increase in the population aged 69+ exposed\
    \ to extreme heat, from a current 239 million in Asia to 588\u2013748 million\
    \ by 2050; the global heat-exposed population aged 69+ is projected to grow under\
    \ future climate scenarios."
  4: Older populations are exposed to increasing heat extremes, which may significantly
    raise energy use and costs, especially in regions with a growing older demographic.
  5: Climate change will be the prevailing mechanism of exposure change in Europe
    and North America, while population aging is the defining driver in warmer areas.
  6: Projected acceleration of both chronic and acute heat exposures raises health
    concerns for older adults due to their reduced capacity to thermoregulate.
  7: A key outcome is that areas with aging populations and rising heat exposures
    will face increased demand for social and health services, necessitating policy
    interventions.
  8: Older adults are disproportionately vulnerable to the effects of heat extremes
    due to health conditions, disabilities, and social factors. The study emphasizes
    the need to incorporate considerations for elderly populations in adaptation strategies.
  9: Projected elderly population in 2050 for the United States closely aligns with
    estimates from ref. 77, while it has a more significant bias in relation to the
    estimates of ref. 78.
  12: The study highlights the vulnerability of the elderly to heat-related mortality
    under climate change scenarios, with particular emphasis on how aging populations
    in specific regions, including the U.S., may be at increased risk as temperatures
    rise.
  13: No relevant information
Methodology:
  1: Combines age-stratified demographic projections with downscaled temperature projections
    to mid-century.
  2: Constructs global gridded age-stratified demographic projections for different
    population scenarios and combines them with temperature projections from CMIP6
    models to quantify chronic and acute heat exposure for different age groups across
    the world. Benchmarks population projections against previous region-specific
    models to assess consistency. Computes geographic intersection of current (2020)
    and projected mid-century (2050) changes in global and regional populations of
    adults age 69+, and chronic and acute heat exposures.
  3: The analysis uses socio-demographic and radiative forcing scenarios, specifically
    SSP-RCP combinations, to forecast changes by around the year 2050.
  4: Analysis is based on CMIP6 global climate models with exclusions of hot models,
    focusing on population-weighted exposures and critical heat thresholds.
  8: The analysis is performed using gridded age-stratified population data with population
    projections under five different SSP scenarios, relying on WorldPop data and open-source
    R software for projections.
  9: The study downscales demographic projections to 2050 and compares them to existing
    projections at sub-national spatial resolutions for several regions, including
    the US, EU, India, UK, and China. The comparison is based on metrics of APE and
    MAPE, besides reporting the total absolute error at different levels of spatial
    aggregation.
  12: The analysis uses projections and models to assess future heat-related mortality
    under different climate change scenarios, focusing on population aging and regional
    vulnerabilities.
  13: The experiments were conceived and the methodology designed by G.F. and I.S.W.;
    I.S.W. processed the climate data; G.F. conducted the experiments and generated
    the figures. G.F., I.S.W., E.D.C. and D.C. analysed the results and wrote the
    manuscript.
More Notes:
  1: Effects are most severe in Asia and Africa, which also have the lowest adaptive
    capacity. Facilitates regional heat risk assessments and inform public health
    decision-making.
  2: The study focuses on older adults (69+). The results are presented as global
    maps showing the intersection of aging populations and heat exposure.
  3: The paper highlights the differential regional and age group impacts, with larger
    cumulative exposure changes in Africa, Asia, and South America compared to North
    America and Europe.
  9: The limitation of the population projection approach is its assumption of geographically
    homogeneous, within-country trends by age stratum.
  13: This article is licensed under a Creative Commons Attribution 4.0 International
    License, which permits use, sharing, adaptation, distribution and reproduction
    in any medium or format, as long as appropriate credit is given.
Quantitative material:
  1: "Chronic exposure to heat doubles across all warming scenarios; >23% of the global\
    \ population aged 69+ will inhabit climates whose 95th percentile of daily maximum\
    \ temperature exceeds the critical threshold of 37.5 \xB0C, compared with 14%\
    \ today, exposing an additional 177\u2013246 million older adults to dangerous\
    \ acute heat."
  2: "Presents maps visualizing the fraction of the population aged 69+ exposed to\
    \ annual Cooling Degree Days (CDDs), the temperatures corresponding to the 95th\
    \ percentile of local extreme heat exposure (TMAX95), and annual days with TMAX\
    \ > 37.5\xB0C (#HD)."
  3: "There is quantitative information indicating a surge in the frequency of hot\
    \ days globally from 10 to 19\u201321 days/year and a rise in TMAX95 from 32\xB0\
    C to about 35\xB0C."
  4: 'Exposure metrics such as 69+ population-weighted CDDs, #HDs, and TMAX95 are
    considered; quantitative data on regional frequency distributions and cumulative
    distributions for various SSP scenarios are given.'
  5: Cumulative heat exposure of older individuals is projected to at least triplicate
    in all continents by 2050, irrespective of the scenario considered.
  6: Table 1 provides quantitative data on heat exposure determinants such as CDDs,
    PDDs, TMAX95, and more, under different scenarios including historical climate
    and projections for 2050.
  7: The analysis provides quantitative data on Billion Person Degree Days, Billion
    Person Hot Days, and Billion Person Degrees across different regions and scenarios.
  9: 'Formulas are provided for calculating CDD, TMAX95, and #HD for each grid cell.'
  12: No specific quantitative results are provided on this page; the page references
    various studies but does not give its own numeric conclusions.
  13: No relevant information
