    \ acute exposure to heat extremes. The third is the 20-year average count of days\
    \ with a dry bulb maximum temperature of 37.5\xB0 C (#HD), which indicates the\
    \ frequency of acute \u201Cextreme hot days\u201D exposure. We consider three\
