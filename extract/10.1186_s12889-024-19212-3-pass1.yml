  10: Nunfam et al., 2018 (36) identifies factors reducing thermal stress resilience
    such as pregnancy, lack of training about thermal stress risks, high heat exposures,
    heavy workload, and PPE use. Enhancing resilience includes occupational health
    guidelines, periodic rest, education, and ventilation improvements. Nunfam et
    al., 2019 (37) discusses workplace humidity, duration of working hours, and sun/heat
    radiation as contributing to thermal stress, with resilience boosted by climate
    change awareness, access to air conditioning, periodic rest, and access to drinking
    water and shade. Nunfam et al., 2020 (39) adds factors such as the use of caffeinated
    drinks, lack of compliance with heat stress guidelines, and poor managerial commitment.
    Enhancing resilience includes drinking cool water, wearing light-colored clothing,
    periodic rest, and training programs.
  11: 'Source material here: Factors that reduce thermal stress resilience include
    high ambient temperatures, heatwaves, solar radiation, U.V. radiation, high dynamic
    physical work, dehydration, poor ventilation and cooling system, and the use of
    inappropriate clothing and protective equipment. Factors that enhance thermal
    stress resilience include adaptive strategies, training, protective workplace
    policies, cooling interventions, and risk management strategies such as heat acclimatization
    and work-rest scheduling.'
  12: " \nimpacts of extreme heat. The prevalence of negative effects due to climate\
    \ change will intensify workers' health risks in future work scenarios... Broad\
    \ findings from these studies indicate that exposure to heatwaves and global warming\
    \ is linked to adverse health impacts on workers.\n\nFurthermore, several studies\
    \ underscore the need for sentinel effects and leading indicators to facilitate\
    \ surveillance of climate-related occupational heat stress effects, as well as\
    \ strategies and interventions for preventing the impact of climate change on\
    \ outdoor workers. Finally, the review identifies interventions and adaptation\
    \ strategies for outdoor workers, including the provision of accessible cool drinking\
    \ water, optimized work-rest schedules, the availability of proper resting shade,\
    \ training and awareness programs, self-paced work, and the use of supportive\
    \ protective equipment.\n\nThis systematic review provides a summary of evidence\
    \ published to date regarding strategies to enhance occupational heat stress resilience,\
    \ especially in hot outdoor workplaces. Despite variations in study design and\
    \ analytical approaches, the evidence presented in this systematic review consistently\
    \ highlights a strong association between thermal stress resulting from global\
    \ warming and occupational heat stress. Broad findings from these studies indicate\
    \ that exposure to heatwaves and global warming is linked to adverse health impacts\
    \ on workers.\n"
