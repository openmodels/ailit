Drivers of Risk:
  1: Root zone soil moisture departures from the pre-industrial climate variability
  2: Human activities such as greenhouse gas emissions, deforestation, aerosol pollution,
    and freshwater depletion modify root zone soil moisture.
  3: The study explores the impact of changing GHG emissions scenarios on soil moisture
    dynamics using SSP scenarios.
  4: The analysis identifies shifts in soil moisture content under future climate
    scenarios, particularly SSP5-8.5, indicating dry and wet departures from the pre-industrial
    baseline.
  5: "The paper identifies warming scenarios (SSP1\u20132.6 to SSP5\u20138.5) as drivers\
    \ of soil moisture changes, leading to more frequent wet and dry departures."
  6: Changes in total soil moisture content, differing climate scenarios (SSP1-2.6,
    SSP2-4.5, SSP3-7.0, and SSP5-8.5), warmer climate scenarios
  8: The primary drivers of risk are different SSP scenarios representing varying
    levels of warming and associated changes in precipitation and evaporation.
  9: The analysis focuses on the impacts of different SSP scenarios on soil moisture,
    examining wet and dry departures in different seasons.
  10: Some high-latitude regions tend to become drier in summer and wetter in winter.
  11: Changes in evaporative demand can reduce the effect of precipitation changes
    in some regions.
  12: Different SSP scenarios (SSP1-2.6, SSP2-4.5, SSP3-7.0, SSP5-8.5).
  13: The drivers of risk are emission trajectories represented by SSP1-2.6 and SSP3-7.0
    scenarios, leading to wet or dry departures in soil moisture.
  14: "Changes in total soil moisture; SSP scenarios (SSP1\u20132.6, SSP2\u20134.5,\
    \ SSP3\u20137.0, and SSP5\u20138.5); global warming."
  15: Changes in total soil moisture content due to different SSP scenarios (SSP1-2.6,
    SSP2-4.5, SSP3-7.0, SSP5-8.5) and seasons (Boreal Summer, Boreal Winter).
  16: Anthropogenic warming and land system change are identified as crucial drivers
    of transgressions of the planetary boundary of green water.
Evaluation overview:
  1: Earth system functions critical to an agriculture-based civilization
  2: "The paper evaluates the future climatic state of root zone soil moisture for\
    \ possible future climates (2021\u20132100)."
  3: The study evaluates changes in total soil moisture content as an indicator of
    alterations in regional hydrological cycles due to climate change.
  4: This page outlines changes in total soil moisture content as an evaluation of
    climate impacts.
  5: The paper assesses changes in soil moisture due to climate scenarios, analyzing
    the emergence of permanent dry or wet departures from historical baselines.
  6: No relevant information
  8: This study evaluates changes in root zone soil moisture under different SSP scenarios.
  9: The paper evaluates changes in soil moisture, specifically tracking deviations
    from baseline in different SSP scenarios.
  11: Root zone soil moisture departures.
  12: Root zone soil moisture departures from a PiControl baseline.
  13: This paper evaluates changes in root zone soil moisture, specifically looking
    at wet and dry departures from a baseline.
  14: Soil moisture changes relative to pre-industrial baseline (1850-like conditions)
    in different IPCC reference regions.
  15: Root zone soil moisture departures from pre-industrial variability.
  16: The paper evaluates land surface areas with permanent dry or wet departures
    under various SSP scenarios.
Highlights:
  1: Without climate policy, root zone soil moisture in over 25% of global land [may
    be] permanently beyond pre-industrial variability as early as 2050
  2: The study quantifies the global land area with soil moisture content departures
    and provides scenarios for the future status of the green water planetary boundary.
  3: The study identifies when and where the total soil moisture deviates permanently
    from pre-industrial levels, indicating changes in water availability and hydrological
    cycles.
  4: The most significant outcome is the projected long-term decline in soil moisture
    content under the SSP5-8.5 scenario, with a marked time of emergence around 2060.
  5: Key outcomes include projected permanent dry or wet departures in various regions,
    with the Mediterranean and parts of North and South America being particularly
    affected by drying, while some African and Asian regions expect wetting.
  6: Some regions show contrasting results between ensemble members, especially in
    Asia and northern North America; Frequency of models with monthly permanent departures
    increases in warmer climate scenarios; Some climate regions experience either
    a wet or dry permanent departure for all 12 months.
  8: A larger land area is predicted to have permanent wet departures compared to
    permanent dry departures based on the analysis of permanent departures. However,
    analysis of yearly mean soil moisture suggests more regions will become drier
    in higher warming scenarios, though this drying may not be permanent.
  9: "In SSP1\u20132.6 and SSP3\u20137.0, seasonal permanent wet and dry departures\
    \ are comparable, but there's a higher permanent dry departure in boreal summer\
    \ than in winter."
  10: Different climate regions show varying responses in soil moisture changes, with
    some consistently experiencing drying or wetting regardless of season.
  11: Model spread should not only be considered errors, but as such, it also reflects
    the wide range of potential futures given our limited understanding of the Earth
    system.
  12: ESMs have high uncertainties in some regions, such as the Sahel and the Amazon,
    affecting the reliability of regional projections. Land cover dynamics and changes,
    which are often prescribed in ESMs, can affect soil moisture and may not be fully
    captured. The percentage of regions with conflicting departure signals among ESMs
    can be as high as 37%.
  13: Soil moisture trends in some regions concur with expected impacts on agriculture
    (e.g., Southern Europe). Wet departures in very dry regions (e.g., the Sahara)
    may have limited implications due to low absolute changes.
  14: Remarkable drying in the Mediterranean, southern Africa, southern North America,
    and South America (except the region of south-eastern South America).
  15: Significant regional soil moisture departures are projected, with Asia showing
    lower agreement between models. Permanent wet departures increase with higher
    SSP scenarios.
  16: "Permanent departures in soil moisture are expected even under SSP1\u20132.6;\
    \ high-emission scenarios result in substantial drying in the Amazon and wetting\
    \ in Indian and western African monsoons."
Methodology:
  1: "Analysed root zone soil moisture departures from the pre-industrial climate\
    \ variability for a multi-model ensemble of 14 Earth system models (ESMs) in the\
    \ Coupled Model Intercomparison Project Phase 6 (CMIP6) in four climate scenarios\
    \ as defined by the shared socioeconomic pathways (SSPs) SSP1\u20132.6, SSP2\u2013\
    4.5, SSP3\u20137.0, and SSP5\u20138.5 between 2021 and 2100."
  2: "The analysis uses a CMIP6 multi-model ensemble with Pre-industrial Control (PiControl)\
    \ as a baseline and four scenarios of shared socioeconomic pathways: SSP1\u2013\
    2.6, SSP2\u20134.5, SSP3\u20137.0, and SSP5\u20138.5."
  3: The analysis uses CMIP6 data from 14 ESMs, comparing total soil moisture content
    under different SSP scenarios against a pre-industrial baseline to determine permanent
    changes.
  4: The analysis involves using climate model simulations to calculate changes in
    soil moisture content and identify times of emergence of permanent shifts from
    baseline conditions.
  5: Analysis compares deviations in soil moisture across various climate scenarios
    and regions using ensemble median results from multiple Earth System Models (ESMs).
  6: Uses ESMs (Earth System Models) under different SSPs (Shared Socioeconomic Pathways)
    to project soil moisture content changes; Analyzes monthly permanent departures
    in soil moisture.
  8: The analysis uses ESMs to project root zone soil moisture changes under different
    SSP scenarios and examines the time of emergence of wet and dry departures from
    pre-industrial conditions. The results are shown as a function of time between
    2020 and 2100.
  11: Analysis uses ESM projections. Model spread is not weighted based on performance
    or interdependence. Authors argue that model spread reflects a wide range of potential
    futures given our limited understanding of the Earth system, rather than being
    solely errors.
  12: Analysis of ESM (Earth System Model) simulations under different SSP scenarios
    from 2020 to 2100, compared against a PiControl baseline. Results are applicable
    globally.
  13: The analysis uses CMIP6 models and calculates departures from a PiControl baseline,
    defining permanence as no reversal until 2100. Spatial aggregation is performed
    using IPCC climate reference regions. The ECS values of some models are explicitly
    referenced. Results are reported as ensemble medians in some analyses.
  14: "Analysis of future (2021\u20132100) changes in total soil moisture using 14\
    \ ESMs in CMIP6 under four different SSP scenarios."
  15: Analysis based on ESM (Earth System Model) ensembles under different SSP scenarios,
    projecting soil moisture changes to 2100 relative to the PiControl (pre-industrial
    control) scenario.
  16: CMIP6 ESM data accessed from Earth System Grid Federation; analysis performed
    using Python programming environment.
More Notes:
  1: Permanent dry departures are most pronounced in Central America, southern Africa,
    the Mediterranean region, and most of South America, whereas permanent wet departures
    are most pronounced in south-eastern South America, northern Africa, and southern
    Asia.
  4: The paper delineates areas of wet and dry departures and quantifies changes as
    a percentage of ice-free land area.
  6: Study analyzes soil moisture content changes, which can impact agricultural productivity,
    water resources, and ecosystem health. The analysis considers a baseline 'PiControl
    scenario' and compares it to future projections under different SSPs.
  11: The analysis is subject to the uncertainty associated with the capacity of ESMs
    to project the water cycle.
  12: Model spread observed since CMIP5 remains a problem.
  13: The interpretation of results can differ when looking at ensemble means vs.
    medians. The estimation of the percentage of land area with departures is sensitive
    to extreme values and human impacts like irrigation. The time of emergence is
    sensitive to small fluctuations in soil moisture. The chosen time horizon of 2100
    may affect estimations of permanence.
  14: The agreement between the ESMs in regions with strong departure signals, wet
    or dry, is higher than the other regions.
  15: Figures S23 and S24 contain results for SSP2-4.5 and SSP5-8.5 scenarios.
Quantitative material:
  1: "Permanent departures (ensemble median) occur in about 10% of global ice-free\
    \ land areas in SSP1\u20132.6 and in 25% in SSP3\u20137.0 by 2050. By the end\
    \ of the 21st century, the occurrence of permanent departures in SSP1\u20132.6\
    \ increases to 34% and, in SSP3\u20137.0, to 45%."
  4: There is a downward trend in soil moisture content over time described, with
    specific reference to a 30-year mean and variability shown in percentile ranges
    under the SSP5-8.5 scenario.
  5: "The document provides quantitative assessments like the percentage change in\
    \ models projecting dry or wet departures; for example, 70% of models project\
    \ a dry departure for the Mediterranean in SSP1\u20132.6, increasing to nearly\
    \ 100% in SSP5\u20138.5."
  6: "Maps show the 80-year average values of regional monthly total soil moisture\
    \ content (kg/m\xB2); Maps show deviation of the yearly mean total soil moisture\
    \ content between 2071 and 2100 from the PiControl scenario"
  8: By the end of the 21st century, 22% of ice-free land in SSP1-2.6 experiences
    a wet departure and 28% a dry departure; 36% of ice-free land in SSP3-7.0 experiences
    a wet departure and 30% a dry departure. In 2050, SSP1-2.6 shows 5% wet and 4%
    dry departures, while SSP3-7.0 shows 14% wet and 11% dry departures.
  9: The paper discusses the number of months per year with soil moisture deviations
    under various SSPs and notes changes in both wet and dry conditions.
  10: The analysis provides the number of months in which there is a permanent departure
    from baseline variability across different climate models and regions.
  11: Figures 8 and 9 show large model spread (regarding water cycle projections).
  12: The monthly percentage of land area with soil moisture that exceeds the 95th
    percentile or goes below the 5th percentile of the PiControl baseline. The yearly
    percentage land area where there is permanent wet or dry departure from the PiControl
    baseline envelope. Up to 33% (SSP-3.70) to 37% (SSP-1.26) of regions globally
    have conflicting departure signals.
  13: The paper presents the percentage of land area with wet or dry departures in
    different scenarios, and the percentage of land area where these departures are
    considered permanent (until 2100).
  14: "By 2050, in the Mediterranean, 43% of the ESMs show permanent dry departure\
    \ in SSP1\u20132.6 and 57% in SSP3\u20137.0. By 2100, the percentages increase\
    \ to 70% in SSP1\u20132.6 and 100% in SSP3\u20137.0."
  15: "Percentage of land surface area with permanent wet departures from the pre-industrial\
    \ soil moisture variability is expected to be 15% in SSP1\u20132.6, 23% in SSP2\u2013\
    4.5, 28% in SSP3\u20137.0, and 34% in SSP5\u20138.5 by the end of the 21st century."
  16: Percentage of land with permanent dry departures for SSP scenarios ranges from
    17% to 26%; total soil moisture content in 33% of land is anticipated to permanently
    depart from pre-industrial variability by 2100.
sourcematerial:
  1: "Source material: Recently, it was proposed as the control variable for the green\
    \ water planetary boundary, suggesting that widespread and considerable deviations\
    \ from baseline variability now predispose Earth system functions critical to\
    \ an agriculture-based civilization to destabilization. However, the global extent\
    \ and severity of root zone soil moisture changes under future scenarios remain\
    \ to be scrutinized. Here, we analysed root zone soil moisture departures from\
    \ the pre-industrial climate variability for a multi-model ensemble of 14 Earth\
    \ system models (ESMs) in the Coupled Model Intercomparison Project Phase 6 (CMIP6)\
    \ in four climate scenarios as defined by the shared socioeconomic pathways (SSPs)\
    \ SSP1\u20132.6, SSP2\u20134.5, SSP3\u20137.0, and SSP5\u20138.5 between 2021\
    \ and 2100. In 2050, permanent departures (ensemble median) occur in about 10%\
    \ of global ice-free land areas in SSP1\u20132.6 and in 25% in SSP3\u20137.0.\
    \ By the end of the 21st century, the occurrence of permanent departures in SSP1\u2013\
    2.6 increases to 34% and, in SSP3\u20137.0, to 45%. Without climate policy, root\
    \ zone soil moisture in over 25% of global land [may be] permanently beyond pre-industrial\
    \ variability as early as 2050. Permanent dry departures (i.e. lower soil moisture\
    \ than pre-industrial variability) were found to be most pronounced in Central\
    \ America, southern Africa, the Mediterranean region, and most of South America,\
    \ whereas permanent wet departures are most pronounced in south-eastern South\
    \ America, northern Africa, and southern Asia.\"\n"
  2: "Evaluation overview: \"Root zone soil moisture is now substantially modified\
    \ by human activities... The goal of this study is to determine the future climatic\
    \ state of root zone soil moisture for possible future climates (2021\u20132100).\"\
    \ Drivers of Risk: \"Root zone soil moisture is now substantially modified by\
    \ human activities, such as greenhouse gas emissions, deforestation, aerosol pollution,\
    \ freshwater depletion, and their interactions.\" Methodology: \"The goal of this\
    \ study is to determine the future climatic state of root zone soil moisture for\
    \ possible future climates (2021\u20132100). Hereto we use a CMIP6 multi-model\
    \ ensemble of total soil moisture with the Pre-industrial Control (PiControl)\
    \ scenario as a baseline and four different future scenarios of shared socioeconomic\
    \ pathways (SSPs) combined with emission scenarios: SSP1\u20132.6, SSP2\u2013\
    4.5, SSP3\u20137.0, and SSP5\u20138.5.\" Highlights: \"we quantify the global\
    \ land area with soil moisture content departures, which provides scenarios for\
    \ the future status of the green water planetary boundary\""
  3: "yaml\nEvaluation overview: \"The total soil moisture content was studied on\
    \ a regional scale to better illustrate the effect of climate change on regional\
    \ hydrological cycles.\"\nDrivers of Risk: \"In this study, the total soil moisture\
    \ content in four different SSPs from the Scenario Model Intercomparison Project\
    \ (ScenarioMIP) was compared with the baseline...SSPs are scenarios used to generate\
    \ different radiative forcing pathways by estimating future greenhouse gas (GHG)\
    \ emissions and land use change scenarios...\"\nMethodology: \"Here, we use the\
    \ total soil moisture content from 14 different ESMs based on CMIP6 output...Each\
    \ ESM\u2019s 30-year average regional soil moisture content between 2071 and 2100\
    \ from each SSP (the shaded region in Fig.1b) was calculated and compared with\
    \ the 80-year average of the PiControl data (the shaded region in Fig.1a).\"\n\
    Highlights: \"The total soil moisture content of different SSPs between 2021 and\
    \ 2100 was compared with the PiControl baseline to determine whether and when\
    \ the deviation of the total soil moisture content from the baseline becomes permanent.\"\
    \n"
