  5: "Source material here.\n1. Evaluation overview: \"The paper focuses on deviations\
    \ in total soil moisture and the emergence of permanent departures from the PiControl\
    \ baseline. It examines the effects of different warming scenarios on regional\
    \ soil moisture changes.\"\n2. Drivers of Risk: \"In Fig. 3, it can be observed\
    \ that, when going from SSP1\u20132.6 to SSP5\u20138.5, the deviation of the total\
    \ soil moisture content from the baseline increases in most regions.\"\n3. Quantitative\
    \ material: \"The Mediterranean (MED) has the highest percentage of models with\
    \ a dry departure in SSP1\u20132.6 (approximately 70%), and the percentage of\
    \ models continues to increase to almost 100% as it approaches SSP5\u20138.5.\"\
    \n4. Methodology: \"Looking at the percentage of models that show a permanent\
    \ departure from the PiControl baseline (Fig. 5), we can observe a similar trend\
    \ to the deviation of total soil moisture content in Fig. 3.\"\n5. Highlights:\
    \ \"The Mediterranean become drier... NSA region with a decrease in total soil\
    \ moisture. In warmer scenarios... permanent dry departures around the middle\
    \ of this century.\"\n"
