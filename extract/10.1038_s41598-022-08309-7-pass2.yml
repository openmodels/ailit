    (control 2020, control 2050, 2050 + flood, 2050 + drought and 2050 + heat shock)
    were 14.4 g, 10.2 g, 8.6 g, 6.0 g and 5.8 g DM respectively (SD = 3.61). There
    was no significant effect of grass variety on Fv/Fm ratio (P=0.328), chlorophyll
    (P = 0.118) or crude protein (P = 0.702), with mean values of 0.79 (Fv/Fm), 8.86
    ug/mL and 23.8% respectively (Supplementary Table S1). However, there was a significant
    effect of grass variety on water-soluble carbohydrate (WSC) (P = 0.030)"

    Methodology: "Data analysis was conducted in R... all data were analysed using
    2-way ANOVA...modelled using a multivariate linear model (manylm)...Random Forest
    analysis was undertaken... Initial deconvolution and peak identification were
    carried out in AMDIS v2.72, using the NIST database v2.2 (2014)"

    Highlights: "Overall, the grass varieties were clearly affected by the climate
    scenarios imposed during growth...there was a significant effect of grass variety
    on water-soluble carbohydrate (WSC)"

