  2: Source material here.
  3: "Evaluation overview: The aim of this work was therefore to determine how responses\
    \ to the growth environment, including \u201Cstress memor y\u201D may affect the\
    \ subsequent forage degradation in the rumen and, therefore, to understand how\
    \ ruminant feeding strategies might be affected by climate change.\n\nDrivers\
    \ of Risk: Plants respond to abiotic and biotic stresses by physiological, biochemical,\
    \ metabolic and molecular mechanisms23. For example, elevated levels of CO2 have\
    \ been shown to improve the rate of photosynthesis in plants24 and alleviate the\
    \ effects of drought stress by conserving water. However high temperatures have\
    \ been shown to inhibit photosynthesis26 by altering the structure of chloroplasts\
    \ and by inactivating chloroplast enzymes through oxidative stress. ... During\
    \ flooding oxidative pathways within the plant move towards fermentation and CO2\
    \ levels within plants can become reduced.\n\nMethodology: Plant material. Ten\
    \ different current commercial varieties of forage grasses (Table 1) were grown\
    \ for 3  months in five different climate scenarios, replicated three times at\
    \ 1-week intervals. ... Climate conditions were simulated in growth chambers and\
    \ consisted of present-day conditions and future potential climate scenarios as\
    \ described by Ref.38 (Table 2)."
