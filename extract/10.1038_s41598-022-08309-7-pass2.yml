  10: " \nComparisons between VOC profiles from grass varieties exposed to rumen fluid,\
    \ broken down by climate scenario. Effects  of  climate  condition  of  grass\
    \  growth  on  rumen  fermentation. Growth of these grasses under different climate\
    \ conditions was shown to have an impact on fermentation.\n\nChlorophyll levels\
    \ were highest in the control 2020 scenario and the lowest in grasses subjected\
    \ to heat shock and flood climate scenarios, indicating that photosynthesis was\
    \ affected by both these treatments.\n\nAgain, the elevated CO2 imposed together\
    \ with the drought, as well as the short drought period may have mitigated the\
    \ negative effects on protein content. The clustering of the FTIR data based on\
    \ treatment further indicates that the treatments were sufficient to elicit a\
    \ response, and the separation of the heat-shocked material from the controls\
    \ fits with the reduced chlorophyll and Fv/Fm elicited for this treatment.\n\n\
    Node size is proportional to relative abundance for that class/compound. Relative\
    \ abundance is on an arbitrar y scale where each sample sums to 100. For ease\
    \ of viewing, compounds are only included if their relative abundance at least\
    \ doubled in at least one comparison.\n\nCompounds are classified into hierarchical\
    \ classes, and every node represents on the heat trees one compound or parent\
    \ class. Node colour is on a scale representing the mean abundance change between\
    \ conditions as a proportion of the total abundance of that compound.\n"
  11: 'Source material here: The reduced in vitro DMD caused by future climate scenarios,
    especially periods of flooding or drought, would lead to reduced animal performance
    and would require higher intakes to maintain the level of production... Flood
    had the greatest effect in reducing total gas production, compared to both the
    control climate scenario for 2020 and 2050... Based on the model-predicted data,
    the acetate: propionate ratio was 3.26 and the propionate: butyrate ratio was
    1.54... The in vitro gas production technique is a method for analysing fermentation
    of feeds by a rumen microbial inoculum... This suggests that breeding forage grasses
    for resilience to a future climate in which there are periods of flooding during
    the growth period may be important for maximising its nutritional value.'
  12: 'plaintext

    Evaluation overview: "It is currently not clear what the impact of climate change
    on rumen fermentation will be. Consideration of the effect of altered environmental
    conditions on both plant growth and animal physiology is required."


    Drivers of Risk: "Notably acute flood and drought caused decreased digestibility
    in those forages."


    Quantitative material: "Ethanol is also produced by microbial fermentation but
    is a minor component in the healthy rumen; it constituted on average 1.7% total
    area in the present samples."


    Methodology: "Here we have investigated the former, to explore whether forage
    growth under an altered climate would produce legacy effects in forage that would
    impact on rumen fermentation when ingested. Although there was relatively little
    variation between grass varieties, consistent effects due to growth under severe
    weather events were detected."


    Highlights: "The detection of VOCs associated with plant stress responses during
    fermentation is further evidence that post-ingestion plant metabolism is a component
    of the functional rumen system. Together, these data indicate that forage breeding
    strategies should consider response to future as well as current climates to ensure
    economic and environmental sustainability of production."


    More Notes: "Forage breeding strategies should consider response to future as
    well as current climates to ensure economic and environmental sustainability of
    production."

