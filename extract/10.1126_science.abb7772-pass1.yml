Drivers of Risk:
  1: Changes in nutrient concentrations and availability of soil water are impacting
    the CO2 fertilization effect.
  2: The primary driver of risk examined is changing CO2 concentrations, specifically
    its impact on vegetation productivity.
  3: 'The decline in GPP sensitivity (b) is likely due to two factors: the direct
    effect on foliar physiology and the indirect effect on Leaf Area Index (LAI).'
  4: Emerging nutrient limitations and imbalances, and changes in water availability.
  5: Water availability is a major driver, with variations influencing photosynthesis
    and carbon uptake.
  6: No relevant information
  7: Limiting effects of plant nutrients such as nitrogen and phosphorus impacting
    CFE.
Evaluation overview:
  1: The paper provides an overview of the decline in CO2 fertilization effects on
    vegetation photosynthesis, which is an important factor in global carbon cycle
    trends.
  2: This paper evaluates the temporal trend of 'b' (likely a metric related to carbon
    uptake) and its decline over time.
  3: The paper evaluates the global decline in the sensitivity of Gross Primary Productivity
    (GPP) to increasing atmospheric CO2.
  4: The paper discusses the declining trends in GPP response to CO2 concentration
    increases.
  5: The paper discusses the sensitivity of terrestrial photosynthesis (GPP) and carbon
    uptake to water availability across different climate zones.
  6: No relevant information
  7: Decline of CO2 fertilization effect on vegetation photosynthesis.
Highlights:
  1: The paper finds a declining trend in the CO2 fertilization effect on vegetation
    photosynthesis, with implications for the global carbon sink and climate system
    feedback.
  2: The global median of 'b' significantly decreased from 1982 to 2015. Grasslands
    and plants in cold climate zones exhibited a larger declining trend of 'b'.
  3: There is a robust and coherent decline in GPP sensitivity to CO2 across multiple
    independent observations; satellite and ground measurements indicate coherent
    declines in b globally.
  4: Ongoing decreases in GPP likely underestimated by models; potential mechanisms
    include nutrient limitations and sensitivity to water availability.
  5: GPP and carbon uptake are more sensitive to water availability than previously
    thought, potentially reducing land-based climate mitigation.
  6: "Supported by numerous funding bodies including European Union\u2019s Horizon\
    \ program, NASA, and others for climate research."
  7: Recent decline in the contribution of CO2 fertilization effect to vegetation
    photosynthesis.
Methodology:
  1: The analysis uses multiple long-term satellite- and ground-based datasets to
    study the temporal dynamics of CO2 fertilization effects on gross primary production
    (GPP).
  2: Linear and nonlinear multiple regression approaches were used to estimate 'b'
    from satellite GPP proxies. 15-year moving windows were used for temporal analysis
    from 1982 to 2015. The Mann-Kendall test was used to estimate the trend of b pixel
    by pixel.
  3: The analysis uses satellite GPP proxies, EC-LUE model, leaf area index time series,
    EC flux sites, and CCDAS for estimating and confirming trends.
  4: Uses regression approaches and a linear spatial mixed-effects model to evaluate
    trends and relationships.
  5: The analysis uses a multi-model mean of TRENDY GPP and satellite GPP proxies,
    examining a 15-year moving window and comparing various TWS products.
  6: Large collaboration and multi-disciplinary approach involving data from various
    sources, acknowledges contributions from multiple funding sources.
More Notes:
  2: The study compares observations and model outputs (TRENDY v6) to analyze the
    trend of 'b'. The supplementary materials contain additional details on data processing
    and analysis. Pixels with large land cover changes and eddy covariance flux towers
    were excluded from the analysis.
  6: The paper includes collaboration from a wide range of international institutions
    and acknowledges contributions and data from various sources.
Quantitative material:
  1: The analysis shows a global decline in CO2 fertilization effects on terrestrial
    regions from 1982 to 2015.
  3: "The global b estimated from satellite GPP proxies declined from 1982-1996 to\
    \ 2001-2015 with trends showing declines such as \u22120.70% 100 ppm\u22121 year\u2212\
    1 from EC flux sites and \u22120.62% 100 ppm\u22121 year\u22121 from CCDAS."
  4: "Declining trend of GPP per 100 ppm increase in CO2 is approximately \u22120.12%\
    \ 100 ppm\u22121 year\u22121; decline in foliar N and P concentrations at \u2212\
    0.24 \xB1 0.06% year\u22121 and \u22120.55 \xB1 0.06% year\u22121 respectively."
  5: "Provides quantitative trends in GPP sensitivities to terrestrial water storage\
    \ (TWS) in arid (2.93 \xB1 0.38% per year), temperate (2.12 \xB1 0.39% per year),\
    \ and dry tropical (2.30 \xB1 0.57% per year) ecosystems."
  6: No relevant information
sourcematerial:
  1: " \nThe enhanced vegetation productivity driven by increased concentrations of\
    \ carbon dioxide (CO2) [i.e., the CO2 fertilization effect (CFE)] sustains an\
    \ important negative feedback on climate warming, but the temporal dynamics of\
    \ CFE remain unclear. Using multiple long-term satellite- and ground-based datasets,\
    \ we showed that global CFE has declined across most terrestrial regions of the\
    \ globe from 1982 to 2015, correlating well with changing nutrient concentrations\
    \ and availability of soil water. Current carbon cycle models also demonstrate\
    \ a declining CFE trend...\n"
  2: "\nGlobal temporal trend of b from observations and models. Results showed that\
    \ the estimated b values for different vegetation physiology and biome types were\
    \ also aligned with experimental results (7), e.g., the b values of C4 plants\
    \ were much smaller than those of C3 plants (supplementary text S3 and fig. S8).\
    \ During 1982 to 2015 was 16.1 \xB1 11.5% 100 ppm\u22121, rate of \u22120.92 \xB1\
    \ 0.12% 100 ppm\u22121 year\u22121 (p <0.01), Spatial patterns of trends in b\
    \ derived from three datasets using 15-year moving windows, reported as the percentage\
    \ per 100 ppm per year. Linear and nonlinear multiple regression approaches were\
    \ used to estimate b from satellite GPP proxies at each pixel across the globe\
    \ (12, 13, 20). 15-year moving windows during 1982 to 2015. The Mann-Kendall test\
    \ was used to estimate the trend of b pixel by pixel, and the regions with black\
    \ dots indicate significant trends (p < 0.05). And found that b significantly\
    \ decreased at a rate of \u22120.92 \xB1 0.12% 100 ppm\u22121 year\u22121 (p <0.01)\
    \ (Fig. 1A). Grasslands and plants in cold climate zones exhibited a larger declining\
    \ trend of b. Ensemble of terrestrial carbon cycle models (TRENDY v6, trends and\
    \ drivers of the regional scale sources and sinks of carbon dioxide) (14). Pixels\
    \ with large land-cover changes were excluded from the analyses (supplementary\
    \ text S2 and fig. S6). Eddy covariance (EC) flux towers, from a light were excluded\
    \ from the analyses.\n"
  3: " \n\"Altogether, these results based on satellite observations of GPP proxies\
    \ suggest a significant declining trend in the response of GPP to increasing atmospheric\
    \ CO2.\"\n\n\"This divergence suggested that the decrease in b was likely due\
    \ to two factors: the direct effect on foliar physiology and the indirect effect\
    \ on LAI.\"\n\n\"Ground GPP estimates from EC flux sites also confirmed our findings,\
    \ by indicating an average declining rate of b at \u22120.70% 100 ppm\u22121 year\u2212\
    1.\"\n\n\"The geographic distribution of the temporal trends of b from satellite\
    \ GPP proxies... revealed that b decreased in ~86% of global lands.\"\n\n\"The\
    \ analysis uses satellite GPP proxies, EC-LUE model, leaf area index time series,\
    \ EC flux sites, and CCDAS for estimating and confirming trends.\"\n\n\"Spatial\
    \ pattern of the temporal trend of b across the globe... suggesting a robust and\
    \ coherent decline of b is consistent across multiple, independent observations.\"\
    \n"
  4: " \n\"Given that we defined b as the percent increase in GPP per 100-ppm increase\
    \ in CO2 and that the S1 simulations solely considered the CO2 effect... the ongoing\
    \ strong decrease in b inferred from satellite datasets is probably underestimated\
    \ by TRENDY models.\"\n\"Two possible non\u2013mutually exclusive hypotheses were\
    \ proposed to account for the declining b... (i) the increasing constraints on\
    \ vegetation productivity from emerging nutrient limitations and imbalances...\
    \ (ii) current models underestimated the sensitivity of terrestrial GPP to changes\
    \ in water availability.\"\n\"We found a general decrease in foliar N and P concentrations,\
    \ with mean values of \u22120.24 \xB1 0.06% year\u22121 and \u22120.55 \xB1 0.06%\
    \ year\u22121, respectively.\"\n\"The temporal trends of b remained unaltered,\
    \ with a value of approximately \u22120.12 \xB1 0.12% 100 ppm \u22121 year \u2212\
    1 for both TRENDY S2 and S3 simulations.\"\n\"We also used GPP from the TRENDY\
    \ S2 and S3 scenarios to estimate the trends in b by using the regression approaches.\"\
    \n\"Our findings are consistent with a recent study suggesting a general global\
    \ pattern of decreasing foliar N concentration.\"\n "
  5: "Source material: \"that terrestrial photosynthesis may not increase as much\
    \ as models project, possibly reducing the potential of land-based climate mitigation\"\
    ; \"We used the terrestrial water storage (TWS) data to represent the availability\
    \ of water to plants and selected arid, temperate, and dry tropical climate zones\
    \ as the research areas (fig. S35), as the GPP in these zones was found to be\
    \ highly sensitive to TWS (fig. S36).\"; \"satellite GPP proxies exhibited significantly\
    \ increasing trends for arid (2.93 \xB1 0.38% year\u22121), temperate (2.12 \xB1\
    \ 0.39% year\u22121), and dry tropical (2.30 \xB1 0.57% year\u22121) ecosystems\
    \ (Fig. 4).\"; \"using a moving window of 15 years (supplementary text S15). We\
    \ used the terrestrial water storage (TWS) data to represent the availability\
    \ of water to plants...whereas the TWS sensitivities derived from satellite GPP\
    \ proxies exhibited significantly increasing trends...divergent sensitivities\
    \ between satellite GPP proxies and TRENDY GPP were also confirmed when using\
    \ various TWS products (20)\"; \"This finding implies that GPP and consequently\
    \ land carbon uptake are more sensitive to the variations in water availability\
    \ than assumed by the TRENDY models, as previously suggested by several recent\
    \ studies (34, 35)....reducing the potential of land-based climate mitigation,\
    \ further accelerating global warming and exacerbating the efforts required for\
    \ m eeting climate targets.\""
