  2: 'Source material here: "Significant health outcomes, including morbidity and
    mortality for cardiovascular or respiratory cases, are commonly used to estimate
    the impacts of environmental pollution or potential benefits of climate mitigation
    policies. However, these routine health endpoints are more likely to occur in
    adults than children... Fetuses, infants, and children are uniquely vulnerable
    to air pollution and climate change... therefore, using adult health outcomes
    as the primary measure to evaluate the benefits of such policies is more common,
    and only a few adverse consequences for children have been considered... Extreme
    climatic events are also essential triggers of PTB, and LBW. A recent systematic
    review of high temperatures and adverse birth outcomes revealed that the relative
    risks due to high-temperature exposures ranged from 1.05 to 1.16-fold [23]...
    The incomplete evaluations of the impacts on children can severely underestimate
    the potential benefits of relevant policies and actions and undermine the determination
    of clean energy transition." '
  3: "Most human brain neurons start to grow starting before birth and continue into\
    \ early childhood and adulthood, which can set the stage for future health. Prenatal\
    \ environmental pollutants exposure may induce oxidative stress and neuroin\uFB02\
    ammation that disrupt the differentiation and organization of the fetal brain\
    \ and central nervous system (CNS) [28], causing permanent cognitive de\uFB01\
    cits and neurodevelopmental disorders diagnosed in childhood. Additionally, it\
    \ was proved that prenatal air pollutants exposure is linked with reduced intelligence\
    \ quotient (IQ), anxiety, depression, inattention of children, and autism spectrum\
    \ disorder (ASD) [29e31]. Besides, postnatal exposures can impair brain development\
    \ through similar mechanisms. Researchers found that reduced attention spans of\
    \ primary school students were associated with increased levels of daily ambient\
    \ traf\uFB01c-related air pollutants in Barcelona, Spain [32]. Therefore, the\
    \ prevalence of infectious diseases, including pneumonia, diarrhoea, malaria and\
    \ sepsis will increase among children. In many developing countries, children\
    \ under-5 years old are overwhelmingly affected by malnutrition [39]."
  4: "\nEvaluation overview: \"This section summarizes the human capital effects due\
    \ to climate change and air pollution, which are mainly mediated by children's\
    \ health damages, in terms of three dimensions: health (represented by mortality\
    \ and morbidity), cognitive ability (measured by IQ and education outcomes), and\
    \ non-cognitive/socio-emotional ability (including psychological characteristics\
    \ and behavioral tendencies).\"\nDrivers of Risk: \"Climate change can harm respiratory\
    \ health through multiple routes. First, extreme temperatures, including extreme\
    \ heat, extreme cold, and temperature variations, were observed to increase hospital\
    \ visits for asthma in childhood [41]. Second, the changed climate enhances the\
    \ severity and frequency of air pollution episodes and thereby directly and indirectly\
    \ causes many pulmonary diseases. Increased extreme weather events, including\
    \ heatwaves, wild\uFB01res, and dust storms, can contribute to elevated levels\
    \ of air pollutants such as PM, O3, and black carbon (BC), potentially exposing\
    \ plenty of children [9]. Third, most importantly, global warming has promoted\
    \ the growth of aeroallergens such as pollens and molds, which causes more respiratory\
    \ allergic diseases for children [41]. Recently, global warming is worsening some\
    \ extreme weather events, particularly hurricanes, and \uFB02ooding, which could\
    \ directly cause physical trauma or death for children. Moreover, climate change-related\
    \ droughts and sea-level rises may cause displacement, violence, and crime, further\
    \ threatening children's mental health in less developed and developing countries\
    \ [9].\"\nQuantitative material: \"During 1991e2018, approximately 37% of deaths\
    \ related to heat exposure due to anthropogenic climate change, and the increased\
    \ mortality is evident on every continent while burdens vary geographically [62].\"\
    \nMethodology: \"This section summarizes the human capital effects due to climate\
    \ change and air pollution, which are mainly mediated by children's health damages,\
    \ in terms of three dimensions: health (represented by mortality and morbidity),\
    \ cognitive ability (measured by IQ and education outcomes), and non-cognitive/socio-emotional\
    \ ability (including psychological characteristics and behavioral tendencies).\
    \ Pathways from child health impacts of climate change or air pollution to long-term\
    \ human capital are in Fig. 1.\"\nHighlights: \"Moreover, many early-life health\
    \ impairments associated with climate change or air pollution predict illness\
    \ or disability in adulthood [16,63]. Hence, climate change and air pollution\
    \ due to fossil fuel combustion may cause additional mortality or morbidity in\
    \ the long-term through their early-life health damages.\"\nMore Notes: \"Early\
    \ childhood has been considered a sensitive and critical period for human capital\
    \ development [52].\"\n"
  5: 'Source material here.

    Evaluation overview: "Cognition encompasses a range of complex neurological and
    psychological processes and is vital for individual earnings and economic productivity.
    Cognitive development occurs through many complex developmental processes...Currently,
    two broad but complementary constructsdintelligence quotient (IQ) scores and academic
    performance are generally used measures of cognition in previous research."


    Drivers of Risk: "PTB/LBW could have severe and long-term negative cognitive consequences...Climate-related
    undernutrition and infections will also impede cognitive development. A plausible
    mechanism indicated that prenatal/childhood infections might alter neurodevelopment
    which measured by IQ or school grades through inflammatory cytokines."


    Quantitative material: "A meta-analysis on IQ scores of children born preterm
    and at ages 5-16 years found that the average IQ scores of PTB-born children were
    11e12 points lower than peers born typically...Another meta-analysis focusing
    on LBW found similar reductions (10 points) in IQ scores of LBW children."


    Highlights: "Among multiple health damages of air pollution or climate change,
    PTB/LBW could have severe and long-term negative cognitive consequences...Academic
    achievement is another reflection of cognitive ability and can be significantly
    affected by early-life health damages due to air pollution and climate change."


    More Notes: "However, such profound effects of climate change or air pollution
    on children have not been comprehensively evaluated. These knowledge gaps must
    be filled with high-quality health-relevant data, so we call for a holistic assessment
    of the direct impacts of health damages on children, as well as the indirect impacts
    of long-term human capital and associated economic costs, to reflect the profound
    effects of fossil fuel combustion on current and subsequent generations."

    '
  6: Source material here. "Current health assessments mainly depend on the selected
    health outcomes of adults, such as mortality, and only very limited child health
    impacts are considered." "This paper provides a complete picture of the profound
    impacts of fossil fuel use on the current and future generations." "Fossil fuel
    combustion can cause multiple health effects on children, which can further affect
    a range of health, cognitive and non-cognitive outcomes." "Health professionals
    and policy makers are responsible for identifying children and pregnant women
    with relevant health consequences." "The paper emphasizes more empirical studies
    to clarify the relationships between environmental risks, child health and future
    human capital impacts." "The profound effects of fossil fuel use on human health
    and their future potential is essential to determine political will and policy
    development."
