Drivers of Risk:
  1: Fossil fuel-driven climate change and air pollution.
  2: Fossil fuel combustion is a major source of air pollution and climate change,
    impacting child health development over the life course.
  3: Risks are driven by climate change, including higher temperatures and extreme
    weather events such as storms and floods.
  4: The paper discusses extreme temperatures (heat and cold), temperature variations,
    air pollution (PM, O3, black carbon), aeroallergens (pollens and molds), hurricanes,
    and flooding as drivers of risk. Also droughts and sea-level rise.
  5: Climate change and air pollution are identified as key drivers impacting cognition
    and non-cognitive skills in children.
  6: Fossil fuel combustion leading to climate change and air pollution are identified
    as drivers impacting child health and human capital.
  7: No relevant information
Evaluation overview:
  1: Children's health and the associated losses of human capital due to fossil fuel
    combustion.
  2: Significant health outcomes related to fossil fuel combustion include morbidity
    and mortality, primarily in adults, while multi-stage effects on child health
    are under-researched.
  3: The impacts of environmental exposures from fossil fuel combustion on child health
    outcomes and associated human capital losses are evaluated.
  4: This paper reviews the impact of climate change and air pollution on human capital,
    focusing on health, cognitive ability, and non-cognitive/socio-emotional ability.
  5: The paper discusses the long-term cognitive and non-cognitive impacts of climate
    change and air pollution on children, leading to significant economic losses through
    impaired human capital.
  6: The paper discusses the impacts of fossil fuel combustion on children's health,
    human capital, and socio-economic outcomes.
  7: No relevant information
Highlights:
  1: Fossil fuel combustion can significantly impact the lifelong health and human
    capital for generations.
  2: The paper emphasizes underestimating children's health impacts and potential
    benefits of fossil fuel reduction, calling for a more holistic assessment.
  3: Prenatal and postnatal exposure to air pollutants correlate with neurodevelopmental
    disorders, reduced IQ, anxiety, depression, and autism spectrum disorder in children.
  4: Early-life health impairments associated with climate change or air pollution
    predict illness or disability in adulthood. Climate change and air pollution can
    cause additional mortality or morbidity in the long-term through early-life health
    damages.
  5: The severe and long-term cognitive impacts of climate-related PTB/LBW and their
    implications on education, income, employment, and psychological characteristics
    are underscored.
  6: The paper emphasizes the need for comprehensive assessments of child health impacts
    and long-term human capital effects due to fossil fuel use, including economic
    costs.
  7: No relevant information
Methodology:
  4: The paper reviews literature on the impacts of climate change and air pollution
    on children's health and long-term human capital development.
  7: No relevant information
More Notes:
  1: The paper calls for a more holistic assessment of the full range of impacts borne
    by children, including direct damages to children's health, losses of human capital,
    and associated economic costs.
  4: The paper highlights the importance of early childhood as a sensitive and critical
    period for human capital development.
  5: The paper calls for a holistic assessment of health impacts from climate change
    and air pollution, particularly on child development, to fill existing knowledge
    gaps.
  7: No relevant information
Quantitative material:
  1: No quantitative information on this page.
  2: Extreme high-temperature exposure associated with a 1.05 to 1.16-fold increase
    in adverse birth outcomes risk.
  4: Mentions that during 1991-2018, approximately 37% of deaths related to heat exposure
    were due to anthropogenic climate change.
  5: Meta-analyses show PTB-born children have average IQ scores 11-12 points lower,
    and LBW children have 10-point reductions in IQ scores.
  7: No relevant information
