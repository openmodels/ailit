sourcematerial:
  2: Source material here. How flooding affects home values can determine the path
    of economic recovery for communities and have lasting impacts on national and
    global financial systems. Yet, our understanding of how flood insurance, community
    risk perception, and past flooding events shape future housing prices (HPs) remains
    limited. To explore this, we used a socio-environmental (SE) model and studied
    the temporal impacts of flooding on mean housing values across 496 coastal census
    tracts of New York, Connecticut, and New Jersey, US, from 1970 to 2021. The modeling
    exercise demonstrated that the initial economic impact of Hurricane Sandy was
    largely absorbed by the National Flood Insurance Program (NFIP); however, the
    region then exhibited a long-term decline in home values, which was well described
    by an interrupted time series model. We found significant correlations between
    SE model parameters describing HP change and those describing tract-scale behaviors
    and perceptions, suggesting that the salience of past flooding events and NFIP
    participation may be important regional drivers of HPs. Tracts with greater post-flood
    change in active insurance policies exhibited larger decreases in mean home values
    than those with more stable NFIP participation.
  3: "Source material here: \"The economic losses and social disruption may happen\
    \ gradually, but they are likely to be greater in total than those experienced\
    \ in the housing crisis and Great Recession. ... Critical, there have been few\
    \ attempts to develop SE models to capture the effects of flooding events on future\
    \ HPs in years immediately following flooding events, which then support estimates\
    \ of future loss and risk perception conditioned on altered mean home values.\"\
    \ \n\n\"Our study focuses on coastal communities in New Jersey, New York, and\
    \ Connecticut, US that were impacted by Hurricane Sandy to understand if HP changes\
    \ observed across the region could be attributed to community-scale perceptions\
    \ of risk. We first estimated community perceptions of flooding with a SE model\
    \ applied to 496 census tracts.\"\n\n\"Across the northeastern US, there is evidence\
    \ that recent changes in coastal housing prices (HPs) have been driven more by\
    \ perceptions of risk rather than actual hazard regimes...\"\n"
