    Drivers of Risk: "The development of an SE model to predict time-varying HPs as
    a function of both external floods and community perceptions could substantially
    contribute to our understanding of socio-economic disparities in flood risk related
    to home value (Siders et al 2019 ) and the capacity for communities to recover
    (Ranasinghe 2020 )."

    Methodology: "We developed a SE model to assess the impact of floods on future
    HPs, which then feedbacks to the estimate of future flood loss. The model incorporates
    both precipitation and storm surge flood hazard and includes four HP response
    scenarios: (1) a model assuming no impact, and models assuming initial losses
    followed by (2) a sigmoid recovery, (3) anITSrecovery,and(4)aK-shapedrecovery."

    Highlights: "We found that the immediate impact of 2012 Hurricane Sandy on the
    housing market was largely absorbed by the NFIP; however, the region experienced
    a sustained decline in housing values afterwards."

