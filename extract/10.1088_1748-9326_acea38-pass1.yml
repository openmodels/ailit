Highlights:
  2: Tracts with significant changes in active insurance policies post-flood exhibited
    larger decreases in home values compared to those with stable NFIP participation.
  3: Recent changes in coastal housing prices are driven more by perceptions of risk
    rather than actual hazard regimes, particularly after Hurricane Sandy.
  5: The modified SE model shows a significant improvement in simulating flooding
    impacts after incorporating surge- and rainfall-driven flood effects.
  6: The ITS model showed a limited initial impact on housing prices followed by a
    steady decline post-flooding events, and it accurately represented flooding dynamics.
  7: The region is likely to experience more frequent flooding and economic loss.
    The SE model suggests that the immediate negative consequences of an isolated
    intense flooding event may continue to be absorbed by NFIP; however, predicted
    changes to the flooding regime may result in sustained decreases in property values.
  8: Increased NFIP participation may have driven down housing values over the next
    decade due to increased risk perceptions.
  9: Immediate impacts of 2012 Hurricane Sandy on housing markets were absorbed by
    NFIP, but there was a sustained decline in housing values thereafter.
Methodology:
  2: A socio-environmental model was used to analyze the impact of flooding on mean
    housing values across New York, Connecticut, and New Jersey from 1970 to 2021.
  3: The study uses a socio-environmental (SE) model applied to 496 census tracts
    in New Jersey, New York, and Connecticut to estimate community perceptions of
    flooding and validate against publicly available datasets.
  5: The analysis involves simulating time-varying housing patterns (HPs) using an
    enhanced SE model and comparing them to observed data using the Kling-Gupta Efficiency
    metric.
  6: The analysis uses an Integration of housing and SE models with calibration to
    observed NFIP claims, policies, population density, and mean HPs, applying Spearman's
    ranked correlation to explore relationships between model parameters.
  7: 'SE (System Dynamics) model is used to study the interaction between processes
    related to flood risk. Three specific housing price models are used: Sigmoid Recovery
