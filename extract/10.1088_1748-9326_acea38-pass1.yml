  6: "Source material here.\nDrivers of Risk: \"Each model simulated different HP\
    \ responses to flood events in 2011 (tropical storm Lee) and 2012 (hurricane Sandy).\"\
    \ Methodology: \"Calibration of the models to observed NFIP claims, policies,\
    \ population density, and mean HPs demonstrated that the ITS model provided the\
    \ most accurate representation of flooding dynamics... Through model calibration,\
    \ we estimated parameters related to community-scale flood behaviors... We examined\
    \ relationships between these calibrated model parameters to those parameters\
    \ describing temporal changes in the housing market using Spearman\u2019s ranked\
    \ correlation.\" Highlights: \"Calibration of the ITS model similarly reproduced\
    \ the case of a limited initial impact on HPs followed by a period in which HPs\
    \ steadily declined... demonstrated that the ITS model provided the most accurate\
    \ representation of flooding dynamics.\"\n"
