Drivers of Risk:
  1: The paper identifies anthropogenic warming and population growth as drivers of
    increased heat stress risk in the U.S.
  3: Changes in climate and population are identified as factors impacting heat-stress
    risks in each region of the continental United States (CONUS).
  4: 'Summer extreme HS severity corresponding to five different 40-year climate scenarios:
    present, RCP4.5 (near- and far-future), and RCP8.5 (near- and far-future).'
  5: Summer extreme Heat Stress (HS) events; Population exposure; 40-year Heat Stress
    Index (40YHI); Decadal trends in warm tail spread (WTS).
  7: The drivers of risk include changes in population and climate, specifically climate
    change scenarios RCP8.5 and RCP4.5 affecting heat stress exposure.
  8: The drivers of risk are increases in temperature and absolute humidity, with
    a focus on changes in the Heat Index (HI). The study specifically analyzes the
    impact of RCP8.5 emission scenarios.
  9: Changes in the spatial pattern of the 40YHI (a heat index) and trends in WTS
    (daily summer heat stress severity), radiative forcings in RCP4.5 scenarios.
  10: Changes in climate and population are identified as key drivers of risk, with
    scenario mappings indicating future impacts.
  11: The paper examines changes in population exposure to heat stress (HS) characteristics
    under climate scenarios, focusing on indicators 40YHI and WTS.
  12: Global-mean warming and population growth are identified as significant drivers
    of increased risk of PI from extreme HS.
Evaluation overview:
  1: The paper provides an overview of the potential impact of short-to-medium duration
    heat stress in the U.S., emphasizing increases in frequency, severity, and spatial
    extent, and it accounts for human morbidity and mortality.
  4: High-end heat stress (HS) severity, specifically the magnitude of the 40-year
    return value of the Heat Index (HI).
  5: Potential Impact (PI) of summer extreme Heat Stress (HS).
  8: The paper evaluates the severity of extreme heat stress (HS) as it relates to
    potential mortality rates.
  9: Changes in population exposure and extreme summer heat stress (HS) characteristics.
  10: The visualizations appear to assess climate, population, and interaction effects
    on a specific variable, likely related to environmental or health impacts, under
    various projected future scenarios.
  11: No specific outcome evaluation like mortality or productivity loss is explicitly
    overviewed on this page.
  12: The paper evaluates the risk of population increase (PI) from short and long
    duration extreme heat stress (HS).
Highlights:
  1: The paper concludes there will be a substantial increase in heat stress risk
    without aggressive mitigation, especially in the coastal Pacific Northwest, central
    California, and Great Lakes region.
  7: The analysis involves understanding the contributions of climate and population
    change on future heat stress exposure through heat index projections under different
    scenarios.
  8: Extreme heat stress is projected to intensify, particularly in the Gulf of Mexico,
    Southeast Atlantic coastal regions, and spread over the East, Midwest, and Great
    Plains under RCP8.5. The increases in heat stress in the Midwest and South may
    be more pronounced than increases in temperature alone suggest.
  9: Higher rate of increase in WTS across the Great Lakes in the RCP8.5 (far-future)
    scenario, indicating a greater potential for heat waves. Decreases in WTS trends
    likely in the far-future (relative to the near-future) in the RCP4.5 scenarios.
  11: A considerably larger population is likely to be exposed to severe 40YHI and
    increased summer extremes, with specific regional increases noted under the RCP8.5-SSP5
    scenario.
  12: The study finds a substantial increase in the risk of PI from extreme HS in
    several parts of the contiguous United States (CONUS), with notable increases
    in the Pacific Northwest, central California, Mid-west, and more than two times
    increase in regions like the Northeast, Southeastern Piedmont, coastal Pacific
    Northwest, and parts of Texas, Utah, and California due to population growth alone.
Methodology:
  1: The analysis uses observations, CMIP5 model ensemble climate projections, and
    historical and future population estimates, applying the IPCC risk framework.
  3: "The study calculates heat index (HI) using historical climate data and outputs\
    \ from nine global climate models in the CMIP5 experiment for RCP4.5 and RCP8.5\
    \ scenarios. It employs bias correction techniques, and data is regridded to 2\xB0\
    \ spatial resolution for consistency."
  4: A non-stationary Generalized Extreme Value (GEV) framework is applied to annual
    values of summer extreme HS severity for 1-, 3-, and 7-day HS events, based on
    block maxima of summer HI for historical (1980-2019), near-future (2020-2059),
    and far-future (2060-2099) time periods.
  5: Uses GEV models with Bayesian Information Criteria (BIC) and Likelihood Ratio
    Test (LRT) for model selection; Indicator-based assessment technique to determine
    a composite indicator for PI of HS; Combines population exposure with HS characteristics
    (40YHI and decadal trends in the spread of the warm tail) for five climate scenarios
    and three HS durations (1, 3, and 7 days); Assesses health risk using a non-stationary
    framework.
  6: PI changes for extreme heat stress are quantified using the risk ratio for the
    composite indicator.
  7: The analysis uses Relative Risk (RR) to investigate changes in heat stress exposure
    due to population and climate change, with one factor allowed to change while
    fixing the other.
  8: The study uses the daily maximum Heat Index (HI) to estimate the annual maximum
    magnitude of summer extreme HS severity, using 3- and 7-day rolling averages.
    Historical data is based on a reanalysis dataset, and future projections are based
    on the model-ensemble average from 9 CMIP5 global-climate models, bias-corrected.
  9: Analysis of climate scenarios and their impacts on population exposure to heat
    stress, focusing on changes in 40YHI and WTS. Results are applicable to near-future
    and far-future scenarios under different RCPs.
  11: Analysis is based on mean population estimates for near- and far-future scenarios
    under SSP2 and SSP5 pathways, considering RCP4.5 and RCP8.5 emissions.
More Notes:
  4: "Population estimates from SSP2 and SSP5 scenarios are used, aggregated to a\
    \ 2\xB0 grid resolution to match climate data."
  9: The spatial pattern of 40YHI matches 40YTx in the western CONUS, where humidity
    impact is negligible.
  11: Future risk of potential impact is investigated through relative risk (RR),
    with notable regional differences in the drivers of risk.
  12: The paper highlights the importance of considering population density by age
    group, underlying health conditions, and socioeconomic status to translate findings
    into adaptation and mitigation agendas.
Quantitative material:
  1: "The analysis suggests the potential impact of heat stress could more than double\
    \ across various U.S. regions, with a three-fold increase in some densely populated\
    \ areas by 2060\u20132099 under a high emissions scenario."
  4: Estimation of the 40-year return value of the HI (40YHI) with an annual probability
    of exceedance of only 0.025.
  5: Calculation of 40-years return values of annual extreme summer HS events; estimation
    of population exposure for short (1 day), medium (3 days), and long (7 days) HS
    events.
  8: "Projected increases in HS severity under RCP8.5 result in HI values up to 3.6\xB0\
    C (2.5\xB0C for 7-day average) and up to 6\xB0C (4.6\xB0C for 7-day average) warmer\
    \ than measured air temperature beyond mid-century. Areas exceeding 40.6\xB0C\
    \ are projected to intensify and expand significantly."
  9: Figures show probability density of 40YHI and population estimates, and decadal
    trends in WTS (summer annual maximum minus median) with associated population
    exposure.
  10: The maps and box plots provide visual representations of changes and risk factors,
    including a color scale from green to red for effect output and multiplier values
    noted as 'RR'.
  11: There is a more than 3x likely increase in risk of potential impact due to climate
    and population changes in specific U.S. regions under the RCP8.5-SSP5 scenario.
sourcematerial:
  1: "  \nSource material here.\n\nEvaluation overview: \"Globally, heat stress (HS)\
    \ is nearly certain to increase rapidly over the coming decades, characterized\
    \ by increased frequency, severity, and spatiotemporal extent of extreme temperature\
    \ and humidity.\" \"Heat stress has led to massive human morbidity and mortality\
    \ in recent years.\"\nDrivers of Risk: \"The contribution from climate change\
    \ alone more than doubles the impact in the coastal Pacific Northwest, central\
    \ California, and the Great Lakes region.\" \"In the coastal East and many parts\
    \ of the West, population growth alone is responsible for a large share of the\
    \ increases.\"\nQuantitative material: \"We find that the PI of short-to-medium\
    \ duration (1\u20137 days) HS events is likely to increase more than three-fold\
    \ across densely populated regions of the U.S. including the Northeast, Southeast\
    \ Piedmont, Midwest, and parts of the Desert Southwest by late this century (2060\u2013\
    2099) under the highest emissions scenario.\"\nMethodology: \"Using observations,\
    \ climate projections from the CMIP5 model ensemble, and historical and future\
    \ population estimates, we apply the IPCC risk framework to examine present and\
    \ projected future potential impact (PI) of summer heat stress for the contiguous\
    \ United States (CONUS) as a function of non-stationary HS characteristics and\
    \ population exposure.\"\nHighlights: \"The contribution from climate change alone\
    \ more than doubles the impact in the coastal Pacific Northwest, central California,\
    \ and the Great Lakes region, implying a substantial increase in HS risk without\
    \ aggressive mitigation efforts.\"\n"
  3: "Drivers of Risk: \"With its national scope and multi-part heat-stress representation,\
    \ our study's decomposition of the relative importance of climate and population\
    \ changes has important implications for identifying targeted strategies for limiting\
    \ total health risks in each region.\" Methodology: \"The HI was calculated based\
    \ on the algorithm discussed in Anderson G. Brooke et al., 2013 using daily maximum\
    \ air temperature (Tmax) and daily mean relative humidity (RH) data. Analysis\
    \ based on the model simulations was performed using outputs from nine global\
    \ climate models (GCMs; as listed in Table S1) participating in the CMIP5 experiment...\
    \ Changes in heat-stress impact were investigated using bias-corrected model output\
    \ for the RCP4.5 and RCP8.5 scenarios... To maintain spatial consistency across\
    \ the observations and the GCM simulations, all datasets were regridded and extracted\
    \ at 2\xB0 spatial resolutions within the CONUS region.\""
  4: "Estimation of return values quantifies the risk associated with a given climate\
    \ extreme...We define the High-end HS severity as the magnitude of the 40 years\
    \ return value of the HI... In our analysis, the 40YHI was estimated for every\
    \ grid cell, separately, based on a non-stationary GEV framework... Our analysis\
    \ is based on three time periods: historical (1980\u20132019), near-future (2020\u2013\
    2059), and far-future (2060\u20132099). For each time period-scenario combination,\
    \ the BM method was applied to generate 40-years samples of AM-HI at each grid\
    \ point location of the CONUS... five different 40 years climate scenarios, present,\
    \ RCP4.5 (near-, and far-future period), and RCP8.5 (near-, and far-future period),\
    \ separately... Gridded total population estimates for the future period are retrieved\
    \ from the Shared Socioeconomic Pathways (SSPs) (Jones et al., 2020) at 1/8th\
    \ degree resolution... Present and future population estimates are both aggregated\
    \ to a common 2\xB0 grid resolution to match the resolution of the climate data\
    \ set... by varying the scale of the distribution, it is possible to deal with\
    \ situations when the tail changes modestly relative to the mean of the distribution."
  5: 'Evaluation overview: "Our methodology for the estimation of PI of summer extreme
    HS builds on the IPCC''s conceptual framework of impacts, adaptations, and vulnerability
    assessment under climate change..." Drivers of Risk: "Here, the PI was estimated
    for the CONUS grid points by combining the indicator of population exposure with
    that of HS characteristics (40YHI and decadal trends in the spread of the warm
    tail)..." Quantitative material: "The model parameters associated with the best
    GEV models are subsequently used to calculate the 40-years return values of annual
    extreme summer HS events..." and "...population exposure for each duration category
    (short (1 day), medium (3 days), and long (7 days)) of HS events based on the
    mean of total population estimates..." Methodology: "...based on all possible
    combinations of the regression models in Equation 5, and Equation 6, along with
    the assumption of a constant shape parameter, a total of five candidate GEV models
    (Model-1, Model-2, Model-3, Model-4, and Model-5) were identified..." and "Here,
    the PI was estimated for the CONUS grid points by combining the indicator of population
    exposure with that of HS characteristics (40YHI and decadal trends in the spread
    of the warm tail), for five different climate scenarios and three different HS
    durations (1, 3, and 7 days). The composite indicator of PI was estimated by aggregation
    of these indicators..." and "Using a non-stationary framework aids in assessing
    the health risk from extreme heat events whose statistics change substantially
    with mean warming..."'
  6: 'yaml

    Methodology: "A decision matrix was formed based on the three selected indicator
    variables for each grid location of  the CONUS and each climate scenario."

    Methodology: "The composite indicator is estimated by a type of  combining of  indicators
    known as geometric aggregation of  normalized variables based on the decision
    matrix. Using equal weights (=1/3) assigned to each of  the indicators of  the
    decision matrix, we finally estimate the composite indicator for a grid location,
    i, and climate scenario, s as, (7)"

    Methodology: "To quantify the changes in PI of  extreme HS, we calculate the risk
    ratio (RR) for the composite indicator of PI, given as, (8)"

