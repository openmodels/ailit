  8: "\n\"The projected increases in HS severity in excess of 40.6\xB0C (indicated\
    \ as HS40.6, Figures 1a\u20131c ) give cause for alarm due to the high mortality\
    \ rates associated with conditions this severe (Matthews et al., 2017; Wehner\
    \ et al., 2016).\" \"Like other heat-stress metrics, HI exhibits a nonlinear sensitivity\
    \ toward changes in temperature and absolute humidity, governed by the rapid decrease\
    \ in physiological latent heat cooling capacity with a rise in vapor pressure\
    \ (Matthews et al., 2017; Meehl et al., 2012).\" \"Beyond mid-century, the CONUS-mean\
    \ 1day-HS (7days-HS) severity from climate-model projections based on RCP8.5 depict\
    \ a steady increase...\" \"Beyond mid-century, the CONUS-mean 1day-HS (7days-HS)\
    \ severity from climate-model projections based on RCP8.5 depict a steady increase\
    \ resulting in HI values up to 3.6\xB0C (2.5\xB0C), and up to 6\xB0C (4.6\xB0\
    C) warmer than the measured air temperature.\" \"In comparison to the present\
    \ climate, AM-HI exceeding 40.6\xB0C are not only expected to intensify further\
    \ over the Gulf of Mexico and Southeast Atlantic coastal regions, but also to\
    \ spread over the entire East, Midwest, and Great Plains under the RCP8.5 emission\
    \ scenario.\" \"For this study, we use the daily maximum HI (see Methods) to estimate\
    \ the annual maximum magnitude of summer extreme HS severity for short, medium\
    \ and long duration events. The severity for medium and longer duration events\
    \ is calculated as a 3- and 7-days rolling average of the daily values (referred\
    \ to hereafter as 3days-HS and 7days-HS).\" \"The gridded values of AM-HI (or\
    \ extreme annual HS severity) for CONUS are derived for the historical period\
    \ using a reanalysis data set (see Methods). Future extreme HS severity projections\
    \ are based on the model-ensemble average from 9 CMIP5 global-climate models (GCMs;\
    \ Table S1) [see Methods]. Model-computed HI values are additionally bias-corrected\
    \ (Wang & Chen, 2014), as described above.\" \"In comparison to the present climate,\
    \ AM-HI exceeding 40.6\xB0C are not only expected to intensify further over the\
    \ Gulf of Mexico and Southeast Atlantic coastal regions, but also to spread over\
    \ the entire East, Midwest, and Great Plains under the RCP8.5 emission scenario.\"\
    \ \"These spatial patterns additionally demonstrate that the relatively slower\
    \ recent rates of increases in extreme temperatures observed in the Midwest and\
    \ South partially disappear when the variable of interest is instead heat stress.\"\
    \ \"We investigate the extreme summer HS characteristics, such as 40YHI and trends\
    \ in WTS in the five different climate scenario time period combinations.\" \"\
    The geographical distribution of the 40YHI magnitudes is illustrated in Figure\
    \ S6.\"\n"
  9: "  \n\"Changes in Population Exposure and Extreme Summer HS Characteristics:\
    \ (a)\u2013(c) Data ellipses (or envelops) representing the probability density\
    \ function evaluated from the bivariate distribution of 40YHI and population estimates\
    \ for the CONUS in the five climate scenarios...\"\n\"...by investigating the\
    \ spatial patterns of its decadal trends (Figures S8a\u2013S8o). These trends\
    \ show a relatively higher rate of increase in WTS across the Great Lakes in the\
    \ RCP8.5 (far-future) scenario, apparent even for individual models...\"\n\"...bar\
    \ plots indicating the total population exposure to specific trend magnitudes.\
    \ Style of (a)\u2013(c) is inspired by (Zscheischler et al., 2018). Note that\
    \ the ellipses are approximations intended to show inter-scenario comparisons...\"\
    \ \n\"and suggest particular challenges for heat acclimation and adaptation in\
    \ this region...\"\n\"decreases may be connected to the representation of radiative\
    \ forcings in the RCP4.5 scenario that increases until the mid-21st century and\
    \ becomes stable thereafter...\"\n\"The spatial pattern of the 40YHI matches closely\
    \ to that of the 40YTx in the western CONUS, where the impact of humidity is negligible...\"\
    \n"
  10: The visualizations collectively assess climate, population, and interaction
    effects on a specific variable, likely related to environmental or health impacts,
    under various projected future scenarios. Panels (a), (e), (i), and (m) show the
    total effect of climate change in different future scenarios. Panels (d), (h),
    (l), and (p) display the interaction effects between climate and population. The
    image consists of a series of maps and charts related to climate effects across
    the United States under various scenarios. These maps help identify areas where
    both factors play a role. The visualizations assess climate, population, and interaction
    effects on a specific variable, under various projected future scenarios. The
    maps and charts use a color scale ranging from green (indicating a decrease) to
    red (indicating an increase) in the primary variable measured. The maps look at
    projected future impacts of climate change. The visualizations include maps, box
    plots, and color gradients to represent data on various projected future scenarios.
  11: " \nTo examine changes in population exposure, we used mean population estimates\
    \ for the near- and far-future periods under two socioeconomic pathways (SSP2,\
    \ and SSP5). These scenarios were selected based on the interaction of the moderate\
    \ (RCP4.5) and high (RCP8.5) levels of greenhouse gas emissions with the moderate\
    \ (SSP2) and the most unconstrained (SSP5) socio-economic pathways.\n\nA considerably\
    \ larger population is likely to be exposed to more severe 40YHI in future decades,\
    \ particularly under the RCP8.5-SSP5 scenario.\n\nMaps showing the RR for the\
    \ 1 day-HS (3 days-HS, and 7 days-HS) events indicate more than 3x likely increase\
    \ in risk of PI due to the total effect of climate and population changes in the\
    \ northern Midwest, coastal Pacific Northwest, central California, and northern\
    \ Utah under the RCP8.5-SSP5 emission scenario.\n\nThese simultaneous increases\
    \ in HS characteristics and population exposure indicate a likely amplification\
    \ in the PI of HS events over the CONUS in the RCP8.5-SSP5 scenario.\n\nFuture\
    \ changes in risk of PI are investigated based on the RR. The climate change effect\
    \ is greatest in central California, coastal Pacific Northwest, and the Great\
    \ Lakes.\n"
  12: Our findings indicate a substantial increase in the risk of PI from both short
    and long duration extreme HS in several parts of the CONUS. The possible increases
    noted over the Pacific Northwest, central California, and a major portion of Mid-west
    will most likely be dominated by global-mean warming. On the contrary, the risk
    of PI is likely to increase by more than two times due to population growth alone
    in the Northeast, Southeastern Piedmont, coastal Pacific Northwest, and parts
    of Texas, Utah, and California. Being based on severity and temporal variability
    relative to local climate, as well as changing population patterns, the integrated
    indicator for PI that we derive applies equally well across the CONUS, adding
    a new element to a growing literature on extreme-heat exposure. While our current
    analysis focuses entirely on the potential impact of HS, additional determinants
    of vulnerability such as population density by age group, underlying health conditions,
    and socioeconomic status are crucial and would help to translate these findings
    into tangible adaptation and mitigation agendas.
