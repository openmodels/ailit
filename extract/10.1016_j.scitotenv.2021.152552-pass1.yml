  1: "yaml\nEvaluation overview: \"Understanding and modelling future risks from natural\
    \ hazards is becoming increasingly crucial as the climate changes, human population\
    \ grows, asset wealth accumulates, and societies become more urbanised and interconnected.\"\
    \nDrivers of Risk: \"...explicitly examining work that has modelled and quanti\uFB01\
    \ ed the individual components that comprise tomorrow's risk, i.e., future natural\
    \ hazards affected by climate change, future exposure (e.g., in terms of population,\
    \ land use, and the built environment), and the evolving physical vulnerabilities\
    \ of the world's infrastructure.\"\nMethodology: \"This Review documents these\
    \ latter efforts, explicitly examining work that has modelled and quanti\uFB01\
    \ ed the individual components that comprise tomorrow's risk, i.e., future natural\
    \ hazards affected by climate change, future exposure (e.g., in terms of population,\
    \ land use, and the built environment), and the evolving physical vulnerabilities\
    \ of the world's infrastructure.\"\nHighlights: \"This need is recognised by the\
    \ 2015\u20132030 Sendai Framework for Disaster Risk Reduction, which emphasises\
    \ the importance of preparing for the disasters that our world may face tomorrow\
    \ through strategies/policies that aim to minimise uncontrolled development in\
    \ hazardous areas.\"\n"
  3: 'The page describes a typical methodological approach where "Information on possible
    scenarios of future emissions are combined with climate models that are then appropriately
    downscaled to provide finer resolution data for hazard analysis in the region
    of interest." It further details that downscaled climate models "are used to simulate
    values for dynamic weather variables, from which hazardous events can be derived."
    This supports the methodology section of the YAML dictionary. For drivers of risk,
    the explanation relates to "climate-related hazards" influenced "by future emissions
    scenarios and climate models downscaled for specific regions."

    '
  5: "yaml\nEvaluation overview: \"Vulnerability is broadly de\uFB01ned as \u201C\
    the characteristics and circumstances of a community, system or asset that make\
    \ it susceptible to the damaging effects of a hazard\u201D (UNISDR, 2009). We\
    \ particularly focus on physical vulnerability in this Review...Risk assessment\
    \ methods account for the future vulnerability of physical infrastructure to natural\
    \ hazards from two main perspectives. The \uFB01rst of these outlooks assumes\
    \ that vulnerability will increase in time as a result of unplanned/informal modi\uFB01\
    cations or maintenance/degradation challenges, whereas the second focuses on the\
    \ reduction in vulnerability that can be achieved by adapting infrastructure to\
    \ future conditions (see Fig. 3).\"\nDrivers of Risk: \"physical vulnerability...\
    \ the tendency of exposed elements (assets) to suffer adverse effects when impacted\
    \ by natural hazards (Cardona et al., 2012)...Dynamic increases in structural\
    \ vulnerability... may be driven by informal structural modi\uFB01cations, environment-induced\
    \ deterioration, and accumulation of damage due to cascading hazard events (e.g.,\
    \ aftershocks)...rising carbon dioxide levels associated with global warming will\
    \ increase the likelihood of carbonation-induced corrosion (Stewart et al., 2011).\"\
    \nMethodology: \"One of the foremost attempts to quantify dynamically increasing\
    \ building-level physical vulnerability is the work of Lallemant et al. (2017).\
    \ This study developed a framework for modelling the time-dependent earthquake\
    \ fragility (i.e., the probability of collapse) of incrementally expanding construction...Markov\
    \ chains were leveraged to quantify the probability of residential buildings transitioning\
    \ to a new state with more stories, and the framework was demonstrated by quantifying\
    \ dynamic projections of building collapses in Kathmandu valley, Nepal.\"\nHighlights:\
    \ \"Dynamic increases in structural vulnerability (as shown in the \uFB01gure)\
    \ may be driven by informal structural modi\uFB01cations, environment-induced\
    \ deterioration, and accumulation of damage due to cascading hazard events (e.g.,\
    \ aftershocks). These increases can be offset by vulnerability adaptation measures\
    \ (shifting the vulnerability curves to the right), many of which may be broadly\
    \ categorised as \u201Cclimate adaptation engineering\u201D approaches...This\
    \ study developed a framework for modelling the time-dependent earthquake fragility\
    \ (i.e., the probability of collapse) of incrementally expanding construction...Markov\
    \ chains were leveraged to quantify the probability of residential buildings transitioning\
    \ to a new state with more stories, and the framework was demonstrated by quantifying\
    \ dynamic projections of building collapses in Kathmandu valley, Nepal.\"\n"
  6: "Source material here.\nWork      that      has      focused      on      a \
    \     potential      reduction      in      the      future      vulnerability\
    \ of the built environment is often framed within the context of dynamically increasing\
    \ climate risks and termed \u201Cclimate adaptation\nengineering\u201D ... The\
    \ changing climate is generally likely to inflict more damage on engineering assets\
    \ in the future. ... Naumann et al. (2021) has accounted for adapted socioeconomic\
    \ vulnerability on the basis of GDP growth. ... Risk      metrics      act   \
    \   as      a      crucial      bridge      between      the      quantitative\
    \      risk      assessment and the decision-making process. ... Ryan and Stewart\
    \ (2017, 2020) considered the feasibility of reducing the vulnerability of Australian\
    \ power distribution networks to future climate impacts. ... The construction\
    \ of dikes has been assessed as an alternative flood-related vulnerability reduction\
    \ measure in a number of studies ... The Dynamic Interactive Vulnerability Assessment\
    \ (DIVA) tool has been leveraged to determine future risk in a number of studies.\n"
  7: "Source material here.\nDecision makers of today have a notable opportunity to\
    \ positively in\uFB02 uence the risks of tomorrow, through their choices on implementing\
    \ strate- gies/policies that control future risk drivers. However, the selection\
    \ of appropriate risk-management interventions strongly relies on our ability\
    \ to model tomorrow's risks from natural hazards, explicitly accounting for the\
    \ dynamic nature of hazard, exposure, and vulnerability. One of the main challenges\
    \ to modelling future risk that has been identi\uFB01 ed in the lit- erature is\
    \ the signi\uFB01 cant inherent uncertainty in each of these components of tomorrow's\
    \ risk. Some of the unknowns related to future risk, such as natural climate variability,\
    \ cannot be (completely) reduced with new knowledge. Epistemic (i.e., modelling)\
    \ un- certainties are captured by leveraging a combination (ensemble) of differ-\
    \ ent models in a given risk assessment, which poses its own dif\uFB01 culties.\
    \ For example, while general circulation models for climate have different levels\
    \ of skill in modelling climate variables, there is no generally accepted protocol\
    \ for ranking/aggregating models. This means that current best practice is to\
    \ average climate projections across all models in an ensemble, which may not\
    \ be optimal. In addition, these ensembles may not capture all potential versions\
    \ of the future. Further- more, the necessary downscaling of climate projections\
    \ ampli\uFB01 es their un- certainties because subgrid parameterisations (i.e.,\
    \ submodels) are only approximate, idealistic representations of complex physical\
    \ phenomena. Even if climate projections were well constrained, quantifying their\
    \ impact on future hazard would be hampered by a lack of data on extreme events.\
    \ Despite clear and numerous efforts to model individual risk components associated\
    \ with future natural-hazard events, there remains a lack of a com- monly accepted\
    \ analytical framework for complete end-to-end risk quanti- \uFB01 cation. This\
    \ is re\uFB02 ected in the wide range of inconsistent approaches found in the\
    \ literature for calculating future loss projections, which incor- porate various\
    \ degrees of complexity. We have focused our discus- sion here on hazard uncertainty\
    \ in particular, but note that this is even further exacerbated by comparable\
    \ unknowns in terms of future population, etc.\nDespite clear and numerous efforts\
    \ to model individual risk components associated with future natural-hazard events,\
    \ there remains a lack of a com- monly accepted analytical framework for complete\
    \ end-to-end risk quanti- \uFB01 cation. This is re\uFB02 ected in the wide range\
    \ of inconsistent approaches found in the literature for calculating future loss\
    \ projections, which incor- porate various degrees of complexity. To il- lustrate\
    \ this point, we take risk modelling for future tropical cyclones (hurricanes)\
    \ as an example. Some work in this area quanti\uFB01 ed cyclone losses under the\
    \ assumption that population dis- tribution, economic growth, and vulnerability\
    \ remain unchanged from 2010 conditions. Other studies accounted for the dynamic\
    \ variability of both hazard and exposure, but leveraged a static representation\
    \ of vulnerability. A more comprehensive approach was taken by Mendelsohn et al.,\
    \ who incorporated projected changes to all components of risk (hazard, exposure,\
    \ and vulnerability) into their predictions of future tropical cyclone damage.\
    \ Robust methodo- logical frameworks and protocols are required to overcome these\
    \ types of modelling inconsistencies.\n"
  8: "Source material: While the aforementioned frameworks help to facilitate comprehensive\
    \ assessments of future risk, they have some limitations... Modelling and quantifying\
    \ tomorrow's risks from natural hazards is becoming ever more critical as we face\
    \ an uncertain future of increasing human populations, relentless urbanisation,\
    \ and significantly different climactic conditions... This paper has reviewed\
    \ state-of-the-art approaches to future natural-hazard risk quantification...\
    \ Our Review has revealed that while there have been numerous efforts to model\
    \ the individual components of future natural-hazard risk, some significant obstacles\
    \ to quantifying this risk for management and mitigation purposes still remain.\
    \ These include the substantial uncertainty associated with future risk projections...\
    \ There is also a clear lack of a standard framework for end-to-end future risk\
    \ modelling that (1) captures multiple hazards; (2) accounts for network-level\
    \ disruptions in our increasingly interconnected societies; (3) incorporates a\
    \ broad set of risk metrics that, for instance, account for socioeconomic disparities;\
    \ and (4) facilitates the diverse perspectives of a wide set of stakeholders involved\
    \ in risk governance... Quanti\uFB01cation of these types of risks could bene\uFB01\
    t from more detailed datasets of future socio-economic projections than those\
    \ typically leveraged in current models."
  9: "   \nOutline of a proposed idealised stakeholder-centred end-to-end risk modelling\
    \ framework for future natural hazards. The conventional risk assessment approach...is\
    \ advanced to account for: (1) multiple hazards; (2) a \uFB02exible suite of risk\
    \ metrics that can account for both socio-economic and technical networks; and\
    \ (3) stakeholder perspectives and priorities towards different dimensions of\
    \ risk. Feedback loops to the risk calculations (including exposure inputs and\
    \ the vulnerability component) enable stakeholder perspectives, plans, and priorities\
    \ to be accounted for in the final quantification and selection of risk metrics.\
    \ \n"
