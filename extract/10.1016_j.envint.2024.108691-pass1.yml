  8: 'Source material here: offers a novel strategy for directly comparing temperature
    frequency-mortality associations across locations. We observed a greater reduction
    in mortality risk associated with an increase in frequency for cold temperatures
    compared to hot temperatures. This finding indicates that increasing the frequency
    of exposure to extreme cold temperatures leads to a greater reduction in mortality
    risk compared to increasing the frequency of exposure to extreme hot temperatures,
    implying that humans may be better adapted to extreme cold temperatures as extreme
    cold temperatures become more frequent. High-income countries exhibited the highest
    RR comparing the 10th percentile (less frequent) versus the 100th percentile (most
    frequent) of the normalized temperature frequency. Socioeconomic factors may contribute
    to the heterogeneity in temperature frequency-related mortality risks. Furthermore,
    in our study, the climate zone was also found to be an important determinant of
    frequency-related mortality risk.'
