  9: 'Source material here.

    Evaluation overview: "We developed a SE model to assess the impact of floods on
    future HPs, which then feedbacks to the estimate of future flood loss."

    Drivers of Risk: "The development of an SE model to predict time-varying HPs as
    a function of both external floods and community perceptions..."

    Quantitative material: "We found that the immediate impact of 2012 Hurricane Sandy
    on the housing market was largely absorbed by the NFIP; however, the region experienced
    a sustained decline in housing values afterwards."

    Methodology: "The model incorporates both precipitation and storm surge flood
    hazard and includes four HP response scenarios: (1) a model assuming no impact,
    and models assuming initial losses followed by (2) a sigmoid recovery, (3) an
    ITS recovery, and (4) a K-shaped recovery. The ITS recovery model best captured
    flooding dynamics in the study region."

    Highlights: "Simulating flood impacts on HPs significantly improved the simulations
    of both HPs and community awareness...Census tracts with greater change in insurance
    uptake following floods witnessed larger decreases in mean home values compared
    to those with more stable NFIP participation. These findings suggest that the
    memory of past flooding and participation in NFIP may be important regional drivers
    of future HPs."

    More Notes: "We observed trade-offs between KGEHP and loss (KGEL) (figure S8),
    indicating the models evaluated did not support simultaneously reproducing all
    aspects of the housing and NFIP system (figure S4)."

