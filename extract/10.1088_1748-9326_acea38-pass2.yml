  2: 'Source material here.

    The study evaluates how flooding affects home values and economic recovery in
    coastal communities, focusing on housing prices: "How flooding affects home values
    can determine the path of economic recovery for communities and have lasting impacts
    on national and global financial systems."


    Flooding events, including past disasters like Hurricane Sandy, are significant
    drivers impacting housing prices: "The initial economic impact of Hurricane Sandy
    was largely absorbed by the National Flood Insurance Program (NFIP); however,
    the region then exhibited a long-term decline in home values."


    The study identifies significant correlations between model parameters for housing
    price change and tract-scale behaviors, indicating changes in insurance policies
    lead to larger decreases in home values: "We found significant correlations between
    SE model parameters describing HP change and those describing tract-scale behaviors
    and perceptions... Tracts with greater post-flood change in active insurance policies
    exhibited larger decreases in mean home values than those with more stable NFIP
    participation."


    A socio-environmental model was used to study temporal impacts of flooding on
    housing values across coastal census tracts from 1970 to 2021: "To explore this,
    we used a socio-environmental (SE) model and studied the temporal impacts of flooding
    on mean housing values across 496 coastal census tracts of New York, Connecticut,
    and New Jersey, US, from 1970 to 2021."


    The National Flood Insurance Program largely absorbed Hurricane Sandy''s initial
    economic impact, but long-term home value declines were observed: "The initial
    economic impact of Hurricane Sandy was largely absorbed by the National Flood
    Insurance Program (NFIP); however, the region then exhibited a long-term decline
    in home values."

    '
  3: "  \nSource material here.\nrising sea levels and expanding flood plains \u2018\
    appear likely to destroy billions of dollars in property and to displace millions\
    \ of people...it is therefore crucial to examine how hazards interact with coastal\
    \ housing markets, which are in turn shaped by risk perceptions and community\
    \ responses...Evidence shows that home values are impacted by both past exposures\
    \ to flooding as well as perceptions of future risk...Hurricane Sandy caused the\
    \ highest storm surge within the period of record for several coastal tidal gauging\
    \ stations...In the immediate aftermath of Hurricane Sandy, the prices of impacted\
    \ properties initially decreased, possibly reflecting an updated objective understanding\
    \ of coastal flood risk, but then showed evidence of price recovery...\n"
  4: "Source material: This region has a documented history of flooding from storm\
    \ surge, riverine, and pluvial flooding... Reported NFIP claims in this year were\
    \ approximately $4.86 billion. From 1979 to 2021, the average annual number of\
    \ flood insurance claims submitted through NFIP in this region was 3,476 claims\
    \ with an average annual claim total of $112 million. We studied relationships\
    \ between HP dynamics and community awareness of flooding with a SE model... Following\
    \ Hurricane Sandy, the rate of new NFIP flood insurance policies decreased from\
    \ a maximum of 182,530 insurance policies held in 2013\u2013144,954 in 2021. The\
    \ image consists of two maps and two histograms... showing the spatial distributions\
    \ of mean annual average insurance claim within each tract and the 2020 total\
    \ value of homes within each tract.\"\n"
  5: "Source material here.\n\"For application to the study region, we modi- fied\
    \ this model to separate the effects of surge- and rainfall-driven flooding events,\
    \ which yielded a signi- ficant improvement in simulations across the study region\
    \ (figure S3).\"\n\n\"The SE model was also adapted to include three separate\
    \ approaches to simulating temporal changes in HPs due to flooding impacts: a\
    \ sigmoid recovery...an interrupted timeseries (ITS) recovery, and a K-shaped\
    \ recovery.\"\n\n\"We calibrated the SE model for each census tract individually\
    \ with data spanning 1970\u20132021.\"\n\n\"The difference between normalized\
    \ total annual NFIP claims and simulated L were summarized with the Kling-Gupta\
    \ Efficiency (KGEL).\"\n\n\"KGEL (equation 1), where r is the linear correlation\
    \ coefficient between simulated and observed values...\"\n\n\"KGEL was computed\
    \ between annual simulated awareness (A) and the normalized value of act- ive\
    \ NFIP policies. KGED was computed between simulated population density (D) and\
    \ normalized observed population density. KGEHP was computed between simulated\
    \ HPs and normalized observed HPs.\"\n\n\"The relative performance of each HP\
    \ model [was evaluated] through Mann Whitney U-tests comparing all KGE scores.\"\
    \n\n\"...models have predictive skill (Knobenet al2019).\"\n"
  6: "yaml\nEvaluation overview: \"Analysis is performed to estimate relationships\
    \ between HP dynamics and community perceptions of flooding.\" \nDrivers of Risk:\
    \ \"Each model simulated different HP responses to flood events in 2011 (tropical\
    \ storm Lee) and 2012 (hurricane Sandy).\"\nMethodology: \"Integration of housing\
    \ models into an SE model supports an exploration of relationships between housing\
    \ market values, external flooding hazards, and perceptions of future risk.\"\n\
    Highlights: \"The ITS model similarly reproduced the case of a limited initial\
    \ impact on HPs followed by a period in which HPs steadily declined.\"\n"
  7: The coastal communities of the study region remain highly vulnerable to flooding
    under climate change...Flood risk is the aggregation of compound flooding events...variations
    in community exposure and resilience...perception of flooding...and governance...Significant
    positive correlations between the SE model parameter describing changes community
    risk...In aggregate, the region is likely to experience more frequent flooding
    and economic loss...Annual timeseries of (a) NFIPreported flooding insurance claims
    and distributions of actual and simulated mean HPs across all census tracts for
    the (b) sigmoid recovery model, (c) ITS model, and (d) the K-shaped recovery model...The
    SE model developed in this research suggests that the immediate negative consequences
    of an isolated intense flooding event may continue to be absorbed by NFIP; however,
    predicted changes to the flooding regime may result in sustained decreases in
    property values.
  8: "Drivers of Risk: \"awareness in response to flooding losses...\" Highlights:\
    \ \"Both \xB5 A and \xB5 P are related to the lapse rate of NFIP policies in the\
    \ years after floods...possibly suggest that increases in the participation in\
    \ NFIP across the study region was driving short-term perceptions of increased\
