Drivers of Risk:
  2: Flooding events, including past disasters like Hurricane Sandy, are significant
    drivers impacting housing prices.
  3: Changes in perceptions of flood risk and proximity to flooding events, such as
    Hurricane Sandy, impact housing prices in coastal areas.
  4: The primary drivers of risk are flooding from storm surge, riverine, and pluvial
    flooding, with significant events including Hurricane Sandy.
  5: The analysis investigates the impact of surge- and rainfall-driven flooding events
    on housing and awareness.
  6: Flooding events, specifically those related to tropical storm Lee and Hurricane
    Sandy.
  7: Increased flooding events are a significant driver of risk affecting property
    values and community vulnerability.
  8: Shocks impacting outcomes include flooding losses and the associated perception
    changes.
  9: Precipitation and storm surge flood hazard; Community behavior and perceptions
    related to flood risk and insurance uptake.
Evaluation overview:
  2: The study evaluates how flooding affects home values and economic recovery in
    coastal communities, focusing on housing prices.
  4: The analysis evaluates the dynamics of flood impacts on housing prices and insurance
    claims within specific tracts in the northeastern U.S. due to flood events.
  5: The analysis evaluates the effectiveness of different HP models in predicting
    flooding impacts by comparing them with observed outcomes using the Kling-Gupta
    Efficiency (KGE) metric.
  6: The analysis evaluates the dynamics of housing prices (HPs) in response to flooding
    events.
  7: The analysis focuses on the economic impact of flooding, specifically on property
    values and how they relate to community perceptions of flood risk.
  9: Impact of floods on future house prices (HPs), which then feedbacks to the estimate
    of future flood loss.
Highlights:
  2: The National Flood Insurance Program largely absorbed Hurricane Sandy's initial
    economic impact, but long-term home value declines were observed.
  3: Recent changes in coastal housing prices have been driven more by perceptions
    of risk than actual hazard regimes; Hurricane Sandy's impact on housing prices
    was influenced by updated objective understanding of coastal flood risk.
  4: The study notes a decrease in new flood insurance policies following Hurricane
    Sandy and provides spatial distribution data of insurance claims and housing values.
  5: Significant improvement in model simulations of flooding by separating surge
    and rainfall effects in the study region.
  6: The study finds limited immediate impact on housing prices following flooding,
    with a steady decline in HPs after Hurricane Sandy.
  7: One significant finding is that immediate negative economic impacts of intense
    flooding may be absorbed by the NFIP, but there are concerns over long-term changes
    in the flood risk profile.
  8: There are correlations between NFIP participation and housing market values driven
    by perceptions of flood risk.
  9: Simulating flood impacts on HPs significantly improved the simulations of both
    HPs and community awareness. Significant correlations exist between model parameters
    representing changes in housing values post-floods and those describing community
    behavior and perceptions, particularly related to insurance uptake. Memory of
    past flooding and participation in NFIP may be important regional drivers of future
    HPs.
Methodology:
  2: A socio-environmental model was used to study temporal impacts of flooding on
    housing values across coastal census tracts from 1970 to 2021.
  3: Study focuses on coastal communities in New Jersey, New York, and Connecticut
    affected by Hurricane Sandy, using conceptual and numerical socio-environmental
    models to map relationships between flooding hazards, perceptions, actions, and
    economic losses.
  4: The study uses a System Dynamics (SE) model to simulate economic losses, population
    density, and community flood awareness in response to peak annual flood hazards.
  5: "The analysis involves adapting the SE model to assess the impact of flooding\
    \ events on housing density and awareness, separately using sigmoid, interrupted\
    \ time series, and K-shaped recovery models over the period 1970\u20132021."
  6: Analysis is performed using modeled relationships between housing prices, external
    flooding hazards, and perceptions of flood risk, using calibrated ITS model parameters.
  7: The page mentions the use of sigmoid recovery, interrupted time series, and K-shaped
    recovery models to analyze housing prices and their relation to insurance claims
    over time (1970-2020).
  9: 'Developed a SE (socio-economic) model to predict time-varying HPs. The model
    incorporates four HP response scenarios: no impact, sigmoid recovery, ITS recovery,
    and K-shaped recovery. The ITS recovery model best captured flooding dynamics
    in the study region.'
More Notes:
  9: Observed trade-offs between model performance in simulating house prices and
    flood loss, suggesting the model could not simultaneously reproduce all aspects
    of the housing and NFIP system.
Quantitative material:
  2: The study identifies significant correlations between model parameters for housing
    price change and tract-scale behaviors, indicating changes in insurance policies
    lead to larger decreases in home values.
  4: Data includes average insurance claims of $112 million annually and highest historical
    claims of $4.86 billion in 2012.
  5: Uses the Kling-Gupta Efficiency (KGE) metric to quantify the predictive skill
    of the models compared to observed data.
  7: The NFIP reported flooding insurance claims and simulated mean housing prices
    across census tracts are evaluated, though specific quantitative changes are not
    detailed on this page.
  9: The immediate impact of 2012 Hurricane Sandy on the housing market was largely
    absorbed by the NFIP; however, the region experienced a sustained decline in housing
    values afterwards.
