  16: "Source material: Theseanalysesshowthatanthropogenicwarmingandland system change\
    \ captured in the SSP scenarios constitute crucial drivers of transgression of\
    \ the planetary boundary of green water. The results show that the planetary boundary\
    \ of green water might be more transgressed than previously thought (Wang-Erlandsson\
    \ et al.,2022) and that the transgression will likely increase regardless of emission\
    \ trajectory. Even in the SSP1\u20132.6 trajectory in which the most vigorous\
    \ climate mitigation efforts take place, the total soil moisture content in 33%\
    \ of the ice-free land surface area is anticipated to permanently depart from\
    \ the pre-industrial variability by the end of the 21st century. In about 10%\
    \ of the land areas, permanent departures can be expected already by 2050. Hence,\
    \ even with global mitigation efforts, these results call for swift adaptation\
    \ to the new hydrological situation in several regions around the globe. However,\
    \ the transgressions will be considerably more serious and widespread in higher\
    \ emission scenarios (e.g. in SSP3\u20137.0, 25% land area with permanent departure),\
    \ pointing to the critical role of mitigation. Percentage of the land surface\
    \ area with permanent dry departures: 18% in SSP1\u20132.6, 17% in SSP2\u2013\
    4.5, 17.6% in SSP3\u20137.0, and 26% in SSP5\u20138.5. CMIP6 ESM data used in\
