Drivers of Risk:
  1: Climate change scenarios (SSP1-2.6, SSP2-4.5, SSP3-7.0, SSP5-8.5) contribute
    to changing soil moisture conditions.
  2: Changes in root zone soil moisture are primarily driven by greenhouse gas emissions,
    deforestation, aerosol pollution, and freshwater depletion.
  4: The primary driver of risk is the deviation of total soil moisture content from
    the PiControl baseline (climate conditions around 1850), leading to wet or dry
    departures. The SSP scenarios influence the extent of these departures.
  5: Changes in total soil moisture content due to varying warming scenarios (SSP1-2.6
    to SSP5-8.5).
  6: Changes in climate scenarios and models affect regional soil moisture content.
  7: Changes in soil moisture content due to climate change under different SSP scenarios.
  8: The drivers of risk are permanent wet or dry departures in root zone soil moisture
    under different SSP scenarios.
  9: Different SSP scenarios (SSP1-2.6, SSP2-4.5, SSP3-7.0, SSP5-8.5) impacting soil
    moisture, permanent wet and dry departures in boreal summer (JJA) and boreal winter
    (DJF).
  10: Drying and wetting of soils, resulting from changes in water balance terms (precipitation,
    runoff, and evaporation).
  11: Changes in evaporative demand and precipitation in various regions affect root
    zone soil moisture.
  12: The analysis highlights shifts in soil moisture, with projected wet and dry
    departures under varied SSP scenarios influenced by climate-related changes.
  13: Changes in soil moisture linked to climate scenarios (SSP1-2.6 and SSP3-7.0)
    are key drivers, influenced by effective climate sensitivity of models and feedback
    mechanisms.
  14: Impacts of global warming on soil moisture deviations are driving wet and dry
    departures in various regions.
  16: Anthropogenic warming and land system change captured in SSP scenarios.
Evaluation overview:
  1: The paper evaluates root zone soil moisture changes and their potential permanent
    departures from pre-industrial variability under different climate scenarios.
  2: "This study determines the future climatic state of root zone soil moisture for\
    \ possible future climates (2021\u20132100) using a CMIP6 multi-model ensemble."
  4: The paper evaluates the impact of climate change on root zone soil moisture,
    specifically looking at departures from a pre-industrial baseline.
  5: Soil moisture content changes and their impacts on regional drying and wetting
    patterns.
  6: The paper evaluates soil moisture content changes using multiple earth system
    models (ESMs).
  7: The paper evaluates changes in global soil moisture content from 2021 to 2100
    under different SSP scenarios.
  8: The study evaluates changes in root zone soil moisture.
  9: Root zone soil moisture departures from a PiControl baseline are evaluated.
  10: No relevant information
  12: The page provides an overview of the land area percentage changes in soil moisture
    extremes, indicating wet and dry departures from historical baselines under different
    climate scenarios.
  13: The paper evaluates the changes in root zone soil moisture, indicating potential
    impacts on land area with wet or dry departures by 2100 under different climate
    scenarios, SSP1-2.6 and SSP3-7.0.
  14: Predicts changes in soil moisture conditions in terms of permanent wet and dry
    departures from baseline conditions.
  16: Changes in root zone soil moisture, specifically departures from pre-industrial
    variability, both wet and dry.
Highlights:
  1: Permanent root zone soil moisture departures are projected to occur on over 25%
    of global land by 2050 without climate policy intervention.
  2: The study seeks to determine the 'time of emergence', which is the moment that
    soil moisture moves beyond and does not fall back within the envelope of baseline
    variability before 2100.
  4: The analysis highlights future deviations from the pre-industrial baseline in
    total soil moisture content and indicates a drying trend in the SSP5-8.5 scenario.
    It also considers the concept of the 'greenwater planetary boundary' using soil
    moisture departures.
  5: Warmer scenarios generally lead to increased drying in many regions of North
    and South America, southern Africa, and the Mediterranean; some regions in northern
    Africa, eastern Europe, and Asia become wetter as warming intensifies; the Mediterranean
    region is expected to experience the strongest signal for permanent dry departure;
    NEAF is expected to have the strongest signal for permanent wet departure.
  6: Regions, particularly in Asia and North America, are expected to experience contrasting
    changes in soil moisture by 2071-2100 compared to the baseline.
  7: Global land area with wet or dry soil moisture departures increases from 2021
    to 2100; varying impacts under SSP scenarios are shown.
  8: The trend of permanent wet departures is consistent with the warming trend, but
    this is not the case for permanent dry departures.
  9: "In both SSP1\u20132.6 and SSP3\u20137.0, seasonal permanent wet and dry departures\
    \ are comparable, but seasonal permanent dry departure remains higher in boreal\
    \ summer than in boreal winter. In SSP3-7.0, the land area with permanent wet\
    \ and dry departures in boreal summer is similar, but in winter, the land area\
    \ with wet departures is much larger than for dry departures."
  10: Some regions show a tendency to become drier in summer and wetter in winter.
  11: There is a significant variation in projections across different regions and
    models, and ensemble means are considered more accurate due to model independence.
  12: Key outcomes include significant model uncertainties in certain regions, and
    notable percentages of regions globally showing conflicting signals in future
    projections, particularly at higher northern latitudes.
  13: By 2100, SSP3-7.0 scenarios show more significant impacts on soil moisture departures
    compared to SSP1-2.6, with certain regions like the Sahara experiencing permanent
    wet departures.
  14: Significant drying in the Mediterranean, southern Africa, southern North America;
    wet departures in northern Africa, South Asia; increasing intensity of soil moisture
    changes with global warming.
  16: Even in SSP1-2.6, 33% of ice-free land surface area is anticipated to have permanently
    departed from pre-industrial soil moisture variability by the end of the 21st
    century; high emission scenarios lead to more severe transgressions (e.g., 25%
    land area with permanent departure in SSP3-7.0).
Methodology:
  1: Analysis based on a multi-model ensemble of 14 Earth system models in the Coupled
    Model Intercomparison Project Phase 6 (CMIP6) across four climate scenarios.
  2: The analysis uses a CMIP6 multi-model ensemble of total soil moisture with the
    Pre-industrial Control (Pi-Control) scenario as a baseline and four different
    future scenarios of shared socioeconomic pathways (SSPs).
  3: Net number of ESMs projecting a permanent departure in each region is calculated
    by subtracting models with permanent dry departure from those with a permanent
    wet departure.
  4: The methodology involves comparing total soil moisture content in SSP scenarios
    with a PiControl baseline to determine when permanent wet or dry departures occur.
    This includes calculating monthly and yearly departures, using rolling means,
    and aggregating land areas with permanent departures. It uses multiple ESMs and
    focuses on regional analysis.
  5: Analysis of ESM projections to determine deviations in soil moisture content
    from a pre-industrial baseline and time of emergence of permanent departures under
    different SSP scenarios; analysis of monthly departures from pre-industrial climate.
  6: Analysis uses climate models (e.g., IPSL-CM6A-LR, ACCESS-CM2, EC-Earth3, MIROC-ES2L)
    across different scenarios (e.g., SSP1-2.6 to SSP5-8.5) to evaluate soil moisture
    changes.
  7: The analysis uses SSP climate scenarios to evaluate soil moisture changes, considering
    departures above the 95th percentile or below the 5th percentile.
  8: The study analyzes the time of emergence of permanent wet or dry departures in
    root zone soil moisture in ESMs under different SSP scenarios.
  9: The analysis calculates regional ensemble means from the numbers of months with
    departures in each model. It compares seasonal mean land area with permanent wet
    and dry departures in boreal summer (JJA) and boreal winter (DJF).
  10: Analyzes root zone soil moisture departures under the SSP1-2.6 scenario, comparing
    model outputs to a PiControl baseline. The results depict the number of months
    with 'permanent departure' from the baseline, providing insights into long-term
    changes in soil moisture.
  11: Results take into account the large spread of models without weighting based
    on performance or interdependence.
  13: Analysis is based on spatial aggregation of climate reference regions, considering
    models with various effective climate sensitivity and utilizing ensemble medians
    for permanent departures.
  14: Analyzes future changes in soil moisture by comparing with a pre-industrial
    baseline using four climate scenarios (SSPs) and 14 Earth System Models from CMIP6.
  16: Analysis of CMIP6 ESM data to assess departures in root zone soil moisture under
    different SSP scenarios; considers both permanent and non-permanent departures.
More Notes:
  2: The study provides scenarios for the future status of the green water planetary
    boundary and focuses on highlighting specific regions.
  4: The paper uses the ACCESS-CM2 model as an example and specifically analyzes total
    soil moisture content. It distinguishes between total deviations and permanent
    deviations in soil moisture.
  5: The study observes inconsistency in departure patterns in directly neighboring
    regions, particularly in Asia.
  9: The images primarily concern temperature exceedances, a related but distinct
    topic. The manuscript also uses ESMs to generate soil moisture changes.
  10: The study acknowledges that a quantitative analysis of each water balance term
    (precipitation, runoff, and evaporation) was beyond the scope of the paper.
Quantitative material:
  1: "By 2050, permanent departures occur in about 10% of global ice-free land areas\
    \ in SSP1\u20132.6 and 25% in SSP3\u20137.0."
  2: The study quantifies the global land area with soil moisture content departures
    from the baseline variability.
  4: The analysis includes the percentage of ice-free land area with dry and wet departures
    from the Holocene baseline, as well as the range of PiControl total soil moisture
    content from different ESMs.
  5: Percentage of models showing permanent departure from PiControl baseline; number
    of months with permanent wet/dry departures; expected time of emergence for permanent
    departures (e.g., median expected time of emergence in MED ranging from 2045 to
    2075 for different SSPs).
  6: Maps depict deviations in soil moisture content from baseline, with ensemble
    medians showing areas with lower moisture in red and higher in blue.
  7: 'The bar chart indicates specific numbers of regions with increases and decreases
    in soil moisture: e.g., SSP1-2.6 has 27 regions with increases and 16 regions
    with decreases.'
  8: "For dry departures, 18% of the ice-free land having permanently less soil moisture\
    \ in SSP1\u20132.6 and 17.6% in SSP3\u20137.0."
  9: "The ensemble mean number of months in which the monthly regional total soil\
    \ moisture content deviates permanently from the PiControl baseline is quantified\
    \ for each SSP scenario. Number of months with dry departures is shown using red\
    \ shading. Number of months with wet departures is shown using blue shading. Comparison\
    \ of the seasonal mean land area with permanent wet and dry departures in boreal\
    \ summer (JJA) and boreal winter (DJF) for SSP1\u20132.6 and SSP3\u20137.0."
  10: The number of months in which there is a permanent departure from the PiControl
    baseline variability is quantified for selected climate reference regions.
  11: Graphs provide quantitative data such as the number of months with departures
    from the baseline across different climate models and regions.
  12: Quantitative data on the percentage of land area with soil moisture below the
    5th percentile or above the 95th percentile and persistent dry or wet departures
    is provided for various SSP scenarios.
  13: Graphs show the percentage of land area with wet or dry departures over time,
    with sharper increases under SSP3-7.0 compared to SSP1-2.6.
  14: 'Reports percentages of models projecting permanent dry departures: 43% to 100%
    in the Mediterranean by SSP scenario and timeframe; identifies clear and consistent
    increases in permanent wet and dry departures over time.'
  16: 'Percentage of land surface area with permanent dry departures: 18% in SSP1-2.6,
    17% in SSP2-4.5, 17.6% in SSP3-7.0, and 26% in SSP5-8.5.'
sourcematerial:
  1: "Source material here.\n1. Evaluation overview: \"Root zone soil moisture is\
    \ a key variable representing water cycle dynamics that strongly interact with\
    \ ecohydrological, atmospheric, and biogeochemical processes... Here, we analysed\
    \ root zone soil moisture departures from the pre-industrial climate variability...\"\
    \n2. Drivers of Risk: \"...a multi-model ensemble of 14 Earth system models (ESMs)\
    \ in the Coupled Model Intercomparison Project Phase 6 (CMIP6) in four climate\
    \ scenarios as defined by the shared socioeconomic pathways (SSPs) SSP1\u2013\
    2.6, SSP2\u20134.5, SSP3\u20137.0, and SSP5\u20138.5...\"\n3. Quantitative material:\
    \ \"...in 2050, permanent departures (ensemble median) occur in about 10% of global\
    \ ice-free land areas in SSP1\u20132.6 and in 25% in SSP3\u20137.0.\"\n4. Methodology:\
    \ \"...a multi-model ensemble of 14 Earth system models (ESMs) in the Coupled\
    \ Model Intercomparison Project Phase 6 (CMIP6) in four climate scenarios as defined\
    \ by the shared socioeconomic pathways (SSPs)...\"\n5. Highlights: \"Root zone\
    \ soil moisture in over 25% of global land permanently beyond pre-industrial variability\
    \ as early as 2050 without climate policy.\"\n"
  2: Source material here.
  3: "Source material here.\nHere, we use the total soil moisture content from 14\
    \ different ESMs based on CMIP6 output... SSPs used in this study are SSP1\u2013\
    2.6, SSP2\u20134.5, SSP3\u20137.0, and SSP5\u20138.5... SSP2\u20134.5 is roughly\
    \ on the current pathway of emission reductions... For our data ensemble, we selected\
    \ all ESMs that provided simulation outputs for both PiControl as well as all\
    \ four SSPs... Each ESM\u2019s 30-year average regional soil moisture content\
    \ between 2071 and 2100 from each SSP was calculated and compared with the 80-year\
    \ average of the PiControl data... The total soil moisture content of different\
    \ SSPs between 2021 and 2100 was compared with the PiControl baseline to determine\
    \ whether and when the deviation of the total soil moisture content from the baseline\
    \ becomes permanent... Permanent wet departure occurs if the yearly mean total\
    \ soil moisture content exceeds the 95th percentile and does not fall back within\
    \ the envelope of baseline variability before 2100, while permanent dry departure\
    \ occurs if the soil moisture content goes below the 5th percentile... If the\
    \ apparent permanent departure was after 2095, it was not classified as permanent\
    \ because we considered 2095 to be too close to the end of the studied time frame...\
    \ To visualize the results, the net number of ESMs that project a permanent departure\
    \ in each region was computed by subtracting the number of models with a permanent\
    \ dry departure from the number of models with a permanent wet departure.\n"
  4: 'Source material here: "The percentage of global ice-free land area in which
    root zone soil moisture departs from the Holocene baseline has been defined as
    the control variable for the greenwater planetary boundary. Determination of wet
    and dry departures. The vertical blue line indicates the time of emergence, i.e.
    a permanent wet or dry departure. Example data are from the monthly total soil
    moisture content in the region, north-western North America (NWN), from the ACCESS-CM2
    model. The analysis includes the percentage of ice-free land area with dry and
    wet departures from the Holocene baseline. First, the total land area of the ice-free
    climate regions, in which the monthly soil moisture content of the SSP scenario
    deviates from the PiControl baseline, was summed up for every model (including
    deviations that are not permanent). Second, this sum was expressed as a percentage
    of the total ice-free land area. Third, the median percentage of the ensemble
    was computed. The analysis highlights future deviations from the pre-industrial
    baseline in total soil moisture content and Figure 1. Illustration of the concepts
    used in this study. (a) Determination of the PiControl baseline (climate conditions
    around 1850). (b) Determination of wet and dry departures. Example data are from
    the monthly total soil moisture content in the region, north-western North America
    (NWN), from the ACCESS-CM2 model. Additionally, we also calculated the land area
    with soil moisture content departure that is permanent only, meaning only the
    land area with departures occurring after the time of emergence is included in
    the sum."'
  5: "Source material here:\n- \"In Fig. 3, it can be observed that, when going from\
    \ SSP1\u20132.6 to SSP5\u20138.5, the deviation of the total soil moisture content\
    \ from the baseline increases in most regions.\"\n- \"Warmer scenarios tend to\
    \ amplify the signal that is already seen in the moderate scenarios, with some\
    \ exceptions...\"\n- \"The percentage of models showing a permanent departure\
    \ from the PiControl baseline is higher in warmer scenarios.\"\n- \"The Mediterranean\
    \ (MED) has the highest percentage of models with a dry departure in SSP1\u2013\
    2.6 (approximately 70%), and the percentage of models continues to increase to\
    \ almost 100% as it approaches SSP5\u20138.5.\"\n- \"In SSP1\u20132.6, 7 months\
    \ (ensemble mean) in MED project a permanent dry departure by the end of the 21st\
    \ century. This increases to 11 months (ensemble mean) in SSP5\u20138.5.\"\n-\
    \ \"Figures 8 and 9 show the regional number of months with a permanent departure\
    \ in selected climate reference regions for each ESM in SSP1\u20132.6 and SSP3\u2013\
    7.0 respectively.\"\n- \"However, the number of months with a wet departure increases\
    \ in the northern part of Africa, with the most increase occurring in NEAF.\"\n\
    - \"The strongest signal for permanent dry departure is expected in MED, with\
    \ a median expected time of emergence ranging from 2045 to 2075 for the different\
    \ SSPs.\"\n"
  6: "The paper evaluates soil moisture content changes using multiple earth system\
    \ models (ESMs): \"Examples of 80-year average values of the regional monthly\
    \ total soil moisture content from the PiControl scenario in models...\" \n\n\
    Changes in climate scenarios and models affect regional soil moisture content:\
    \ \"In warmer climate scenarios, the frequency of models with monthly permanent\
    \ departures increases.\"\n\nMaps depict deviations in soil moisture content from\
    \ baseline, with ensemble medians showing areas with lower moisture in red and\
    \ higher in blue: \"Deviation of the yearly mean total soil moisture content between\
    \ 2071 and 2100 in each SSP from the PiControl scenario. The values depicted in\
    \ the maps are the ensemble medians. The regions with a lower soil moisture content\
    \ than the PiControl baseline are in red, while the regions with higher soil moisture\
    \ are in blue.\"\n\nAnalysis uses climate models (e.g., IPSL-CM6A-LR, ACCESS-CM2,\
    \ EC-Earth3, MIROC-ES2L) across different scenarios (e.g., SSP1-2.6 to SSP5-8.5)\
    \ to evaluate soil moisture changes: \"Examples of 80-year average values of the\
    \ regional monthly total soil moisture content from the PiControl scenario in\
    \ models IPSL-CM6A-LR(a),ACCESS-CM2(b),EC-Earth3(c),andMIROC-ES2L(d).\"\n\nRegions,\
    \ particularly in Asia and North America, are expected to experience contrasting\
    \ changes in soil moisture by 2071-2100 compared to the baseline: \"The regions\
    \ in Asia (e.g. from WSB to TIB in Figs.8a and9a) and the northern part of North\
    \ America show more contrasting results between ensemble members.\""
