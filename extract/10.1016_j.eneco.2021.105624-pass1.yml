  10: " \nEffects of climate change on per capita real GDP growth, 1960\u20132014.\n\
    we report the global income effects of climate change under the RCP 2.6 and RCP\
    \ 8.5 scenarios in Table 6.\n\nthe world could actually benefit from mitigation\
    \ policies in year 2030(compared\nto a reference case in which temperatures increase\
    \ according to their historical trends of 1960\u20132014), while limiting the\
    \ economic losses of climate change to 0.11 and 1.07 percent over the next 36\
    \ and 86 years, respectively.\n\na persistent above-norm increase in average global\
    \ temperature by 0.04 \u25E6C per year (based on RCP 8.5) leads to substantial\
    \ output losses, reducing real per capita output by 0.80, 2.51 and 7.22 percent\
    \ in 2030, 2050 and 2100, respectively.\n\nCan adaptation help offset these negative\
    \ income effects? Repeating the counterfactual exercise for different values of\
    \ m highlights the role of adaptation.\n\nThe shorter the m, the faster agents\
    \ treat higher temperatures as the new norm. Table 6 shows the effects of global\
    \ warming over time for various values of m. The results indicate that per-capita\
    \ output losses are lower for m = 20 but significantly higher if it takes longer\
    \ to adapt to climate change (m = 40).\n\narguethatwhileclimatechangeadaptationcouldreducethesenegative\
    \ economic effects, it is highly unlikely to offset them entirely. More forceful\
    \ mitigation policies are needed to limit the damage from climate change.\n\n\
    We report the real GDP per capita losses from global warming under the RCP 2.6\
    \ and RCP 8.5 scenarios, compared to the reference case...\n\nin the absence of\
    \ climate change policies (under the RCP 8.5 Scenario with m = 30 ), the percent\
    \ losses in per-capita incomes by 2100 are sizable, regardless of whether a country\
    \ is rich or poor, and hot or cold.\n\nTable 6 reports the real GDP per capita\
    \ losses for ... the United States, over various time horizons. \n\nFocusing on\
    \ the RCP 8.5 scenario (with m = 30 ) we observe that the losses vary between\
    \ 0.50 and 1.20 percent, 1.53 and 3.77 percent, and 4.35 and 10.52 percent in\
    \ 2030, 2050 and 2100, respectively; with a relatively large impact estimated\
    \ for the United States in 2100 \n\nThe results are reported in Table 7 for the\
    \ RCP 8.5 scenario and m = 30. As expected, the estimated GDP per capita losses\
    \ become significantly larger, almost doubling at the global level by 2100 to\
    \ 13.11 percent.\n\nThe shorter the m, the faster agents treat higher temperatures\
    \ as the new norm.\n\narguethatwhileclimatechangeadaptationcouldreducethesenegative\
    \ economic effects, it is highly unlikely to offset them entirely. More forceful\
    \ mitigation policies are needed to limit the damage from climate change.\n"
  11: " \nPersistent changes in temperature above time-varying norms has long-term\
    \ negative impacts on economic growth. If temperature deviates from its historical\
    \ norm by 0.01 \u25E6C annually for an extended period of time, long-term income\
    \ growth will be lower by 0.0543 percentage points per year. Furthermore, we illustrated\
    \ that these negative long-run growth effects are prevalent in all countries but\
    \ to different degrees across climates and income groups.\n\nKeeping the increase\
    \ in the global average temperature to below 2 degrees Celsius above pre-industrial\
    \ levels as agreed by 190 parties in Paris in December 2015, will reduce global\
    \ income by 1 percent by 2100. However, an increase in average global temperatures\
    \ of 0.04 \u25E6C (corresponding to the RCP 8.5 scenario, which assumes higher\
    \ greenhouse gas emissions in absence of climate change mitigation policies) reduces\
    \ world\u2019s real GDP per capita by 7 percent by 2100, with the size of these\
    \ income effects varying significantly across countries. The estimated global\
    \ per capita GDP losses under a high-emissions scenario with no policy action\
    \ (RCP8.5) would almost double if country-specific climate variability were to\
    \ rise commensurate to temperature increases in each country (with global income\
    \ losses amounting to 13 percent by 2100).\n\nOur heterogeneous panel data estimates\
    \ suggested a lower marginal weather effects in cold and/or rich countries (i.e.,\
    \ slope coefficients were smaller). Nevertheless, we find that income losses are\
    \ sizable even in cold climates either because they are warming up much faster\
    \ than temperate or hot regions or climate variability is becoming more pronounced\
    \ in line with faster temperature increases.\n"
