Drivers of Risk:
  1: Temperature deviations from long-term historical norms are identified as impacting
    economic outcomes, while precipitation changes do not show statistically significant
    effects.
  2: Deviations in temperature and precipitation from historical norms are considered
    as drivers affecting economic growth.
  3: Persistent global temperature increases and climate variability are identified
    as key drivers of economic growth impacts.
  5: The primary drivers assessed are persistent deviations in temperature above or
    below historical norms.
  6: The impact of temperature and precipitation deviations from historical norms
    on economic growth is examined, focusing on the temperature variable in Specification
    2 which removes precipitation variables.
  7: Temperature increases and weather shocks.
  8: Persistent increases in annual temperatures above their norms (or thresholds).
  9: Temperature relative to its historical norm.
  10: Temperature increases and climate variability.
  11: Persistent changes in temperature above time-varying norms
  12: Persistent increases in temperatures based on the RCP 2.6 and RCP 8.5 scenarios
  13: No relevant information
Evaluation overview:
  1: The study evaluates the long-term impact of climate change on economic activity,
    specifically per-capita real output growth, across countries.
  2: The analysis investigates the macroeconomic impacts of climate-driven weather
    changes on per capita GDP growth.
  3: The paper provides an overview of income growth loss due to persistent temperature
    changes attributed to climate change.
  5: The paper evaluates the long-term impacts of deviations in temperature and precipitation
    from historical norms on GDP per capita growth.
  6: The analysis evaluates the long-run effects of climate change on per capita real
    GDP growth from 1960 to 2014.
  7: Evaluates the long-run growth effects of weather shocks on economic outcomes,
    specifically per capita real GDP growth.
  8: Long-run effects of climate change on per capita real GDP growth of poor and
    hot countries.
  9: Per capita real GDP growth.
  10: Effects of climate change on per capita real GDP growth.
  11: Percent Loss in GDP per capita by 2100
  12: Percent loss in GDP per capita
  13: No relevant information
Highlights:
  1: Abiding by the Paris Agreement goals could reduce economic loss due to temperature
    increase from 7 percent to about 1 percent by 2100.
  2: Finds long-term negative effects on per capita GDP growth due to persistent weather
    shocks and emphasizes country- and time-specific climate thresholds.
  3: All countries face GDP per capita losses without climate change policies, varying
    by country's temperature pace and variability.
  5: Persistent deviations in temperature from historical norms have statistically
    significant negative effects on long-run GDP per capita growth.
  6: Significant negative impacts of temperature deviations from historical norms
    on per capita GDP growth are found, with coefficients becoming larger over time,
    indicating adaptation may not be keeping pace with climate change.
  7: The estimated coefficients of interactive terms for poor/rich and hot/cold countries
    are not statistically significant, suggesting no differential effects of climate
    change based on income or historical temperature, although this could be due to
    a lack of statistical power.
  8: Persistent temperature deviations from historical norms have a negative effect
    on long-run per capita GDP growth, especially when lagged world output growth
    is included. Negative growth effects of weather shocks may be less severe in cold
    climates compared to hot climates. Poor countries are disproportionately affected
    by weather shocks.
  9: The effects of temperature increase on per capita GDP are estimated for various
    country groups and model specifications.
  10: Climate change leads to substantial output losses, especially under RCP 8.5.
    Adaptation can reduce, but likely not offset, these losses. Climate variability
    significantly increases economic losses. The United States will face large impacts
    in the absence of mitigation efforts.
  11: Adaptation to climate change could reduce these negative long-run growth effects,
    it is highly unlikely to offset them entirely.
  12: Under RCP 8.5, by 2100, the United States could see a loss of 6.66% to 14.32%
    in GDP per capita (depending on 'm'). India could see losses of 6.37% to 13.39%
    under RCP 8.5 by 2100.
  13: No relevant information
Methodology:
  1: The analysis uses a stochastic growth model with a panel data set of 174 countries
    covering the years 1960 to 2014.
  2: Utilizes a theoretical growth model linking weather deviations to real output
    growth and incorporates half-panel Jackknife FE estimator to handle weak exogeneity
    and bias in panel data.
  3: The paper uses counterfactual exercises to evaluate cumulative income effects
    of temperature changes from 2015 to 2100.
  5: Uses a panel ARDL approach with half-panel Jackknife FE estimation to examine
    the impact of climate variables on GDP per capita growth, considering various
    lag orders and adaptation speeds.
  6: "The study uses fixed effects (FE) and half-panel Jackknife FE (HPJ-FE) methodologies\
    \ to estimate the impact of temperature and precipitation on GDP, with results\
    \ applicable from 1960\u20132014 using a range of 20 to 40 years historical data\
    \ for comparison."
  7: Uses ARDL specification, panel data models with interactive terms, and half-panel
    Jackknife Mean Group (HPJ-MG) estimator to analyze heterogeneous effects. Models
    include country fixed effects and lagged variables.
  8: The analysis uses a counterfactual approach based on an ARDL specification (equation
    1) to estimate the cumulative output per capita effects of temperature increases
    from 2015-2100. It compares output trajectories under a 'no change' scenario with
    counterfactual scenarios (RCP 2.6 and RCP 8.5) based on predicted temperature
    increases, using a historical trend as a baseline. The results use data from 1960-2014
    to estimate the impact of deviations from historical temperature norms on per
    capita real GDP growth.
  9: The models use the half-panel Jackknife mean-group estimator. Two specifications
    are tested. The first relates changes in real GDP per capita to country-specific
    effects, lagged changes in real GDP, and the change in temperature relative to
    its historical norm. The second specification adds a term for the change in world's
    real GDP per capita in the previous year. The 'historical norm' is calculated
    as the time-varying average temperature over the preceding *m* years. A counterfactual
    analysis is performed where country-specific changes in trend temperature are
    compared to the historical trend. It is assumed that temperature shocks are serially
    uncorrelated Gaussian random variables with zero means and variances.
  10: Uses data from 174 countries (1960-2014). Employs a half-panel Jackknife FE
    (HPJ-FE) procedure to estimate the effects of temperature deviations from historical
    norms on real GDP per capita growth. ARDL equation with temperature deviations
    as the climate variable. Compares RCP 2.6 and RCP 8.5 scenarios to a historical
    trend baseline.
  11: "Counterfactual exercises investigating output effects of annual increases in\
    \ temperatures under mitigated and unmitigated scenarios during 2015\u20132100."
  12: "The analysis considers persistent increases in temperatures under different\
    \ RCP scenarios and calculates PPP GDP weighted averages of \u0394\U0001D456\u210E\
    \ with \u210E = 16, 36, and 86 (corresponding to the year 2030, 2050, and 2100)."
  13: No relevant information
More Notes:
  7: The paper explores heterogeneity in the effects of temperature shocks across
    countries with different climates and income levels. It acknowledges the potential
    for adaptation to mitigate negative effects of climate change.
  8: The analysis accounts for potential interactions between global output trends
    and global climate conditions by including lagged world output growth as a regressor.
  9: Asterisks in Table 4 indicate statistical significance at the 1% (***), 5% (**),
    and 10% (*) levels.
  10: The study considers the role of adaptation by varying the 'm' parameter, which
    represents how quickly agents adapt to higher temperatures as the new norm.
  12: The variable 'm' is not explicitly defined, but appears to be a parameter in
    the model. There is a second table (Table 7) that reports the percent loss in
    GDP per capita under RCP 8.5 when considering climate variability.
  13: This page primarily lists references without providing new information or analysis
    relevant to direct climate impacts.
Quantitative material:
  1: "A persistent increase in average global temperature by 0.04\xB0C per year could\
    \ reduce world real GDP per capita by more than 7 percent by 2100."
  3: "Adapting to the Paris Agreement objective of 0.01\xB0C annual increase limits\
    \ income loss to 1.07 percent by 2100."
  5: "A 0.01 \u25E6C annual increase in temperature above its historical norm reduces\
    \ GDP per capita growth by approximately 0.0586 percentage points per year, while\
    \ a 0.01 \u25E6C annual decrease reduces it by approximately 0.0520 percentage\
    \ points per year."
  6: Tables 1 and 2 provide estimates of the long-run effects, with coefficients indicating
    significant negative impacts of temperature changes on GDP growth, with indicators
    of statistical significance at 1%, 5%, and 10% levels.
  7: Figure 4 shows rolling estimates of the long-run effects of temperature increases
    on per capita real GDP growth. Equation (2) and (3) present regression models
    used to analyze the effects of temperature changes on GDP growth, considering
    factors like poverty and historical temperature.
  8: "Table 3 reports coefficients (\u0302\U0001D703) on the change in the absolute\
    \ value of temperature deviations from historical norms (\u0303\U0001D447\U0001D456\
    \U0001D461(\U0001D45A)) and interactions with dummies for poor and hot countries,\
    \ with standard errors in parentheses. These coefficients estimate the impact\
    \ of temperature deviations on per capita real GDP growth. For example, the coefficient\
    \ -0.551** in Specification 3 (FE) suggests a statistically significant negative\
    \ impact."
  9: Table 4 shows mean group estimates of the long-run effects of climate change
    on per capita real GDP growth from 1960-2014. Values are provided for all 130
    countries, 'cold' countries (average temperature < 33rd percentile), 'temperate
    or hot' countries (average temperature >= 33rd percentile), poor (low-income developing
    countries), and rich (advanced economies and G20 emerging markets). Estimates
    are provided with and without including a term for the change in the world's real
    GDP per capita in year t-1, and with different historical norms (m=20, 30, 40).
  10: "Under RCP 8.5, persistent temperature increase of 0.04\xB0C per year leads\
    \ to real per capita output losses of 0.80%, 2.51%, and 7.22% in 2030, 2050, and\
    \ 2100, respectively. With no climate policies (RCP 8.5 and m=30), per-capita\
    \ income losses by 2100 are sizable. Under RCP 8.5 (m=30), losses vary between\
    \ 0.50-1.20%, 1.53-3.77%, and 4.35-10.52% in 2030, 2050, and 2100, respectively.\
    \ Adaptation (lower m) reduces per-capita output losses. Increased climate variability\
    \ can nearly double global GDP per capita losses by 2100 to 13.11 percent."
  11: Estimated global per capita GDP losses under a high-emissions scenario with
    no policy action (RCP8.5) would almost double if country-specific climate variability
    were to rise commensurate to temperature increases (with global income losses
    amounting to 13 percent by 2100).
  12: Provides percent loss in GDP per capita by 2030, 2050, and 2100 under RCP 2.6
    and RCP 8.5 for the World, China, European Union, India, Russia, and the United
    States. Values are given for different 'm' values (20, 30, and 40).
  13: No relevant information
sourcematerial:
  1: "We study the long-term impact of climate change on economic activity across\
    \ countries, using a stochastic growth model where productivity is affected by\
    \ deviations of temperature and precipitation from their long-term moving average\
    \ historical norms. Using a panel data set of 174 countries over the years 1960\
    \ to 2014, we find that per-capita real output growth is adversely affected by\
    \ persistent changes in the temperature above or below its historical norm, but\
    \ we do not obtain any statistically significant effects for changes in precipitation.\
    \ Our counterfactual analysis suggests that a persistent increase in average global\
    \ temperature by 0.04 \u25E6C per year, in the absence of mitigation policies,\
    \ reduces world real GDP per capita by more than 7 percent by 2100. On the other\
    \ hand, abiding by the Paris Agreement goals, thereby limiting the temperature\
    \ increase to 0.01 \u25E6C per annum, reduces the loss substantially to about\
    \ 1 percent."
  2: "Source material: This paper investigates the long-term macroeconomic effects\
    \ of weather patterns transformed by climate change across 174 countries over\
    \ the period 1960 to 2014...climate change, by shifting the long-term average\
    \ and variability of weather, could impact an economy\u2019s ability to grow in\
    \ the long-term...We focus on both of these issues and develop a theoretical growth\
    \ model that links deviations of temperature and precipitation (weather) from\
    \ their long-term moving-average historical norms (climate) to per capita real\
    \ output growth (Appendix A.1). Inourempiricalapplication,weallowfordynamicsandfeedbackef-fects\
    \ in the interconnections of climatic and macroeconomic variables...Secondly,\
    \ we use the half-panel Jackknife FE (HPJ-FE) estimator proposed inChudik et al.(2018)\
    \ to deal with the possible bias and size distortion of the commonly-used FE estimator\
    \ (given that \U0001D447\U0001D456\U0001D461is weakly exogenous). Our results\
    \ suggest that a series of positive (or negative) weather shocks has a long-term\
    \ negative effect on per capita GDP growth...Moreover, rather than assuming a\
    \ common climate threshold acrosscountries,weallowforcountry-specificandtime-varyingclimate\
    \ thresholds and also test for asymmetric effects."
  3: " \nSource material: Specifically, we show that if temperature rises (falls)\
    \ above (below) its historical norm by 0.01 \u25E6C annually for a long period\
    \ of time, income growth will be lower by 0.0543 percentage points per year...\
    \ we investigate the cumulative income effects of annual increases in temperatures\
    \ over the period 2015\u20132100... under a high-emission scenario or RCP 8.5...\
