  15: "yaml\nEvaluation overview: \"Projected losses at the end of the century are\
    \ on average highest in those regions that have the lowest baseline GRP levels.\"\
    \nDrivers of Risk: \"Because of the non-linear form and the heterogeneity in initial\
    \ temperature levels Ti,0 over regions, it is not possible to aggregate Eq. (11)\
    \ or Eq. (12)...\"\nQuantitative material: \"Changes in log GRP in 2099 under\
    \ the RCP8-5 warming scenario were computed based on panel and cross-sectional\
    \ estimates.\"\nMethodology: \"If we employed an econometric specification that\
    \ is quadratic in temperature levels...and determine the linear coefficient \u0303\
    \U0001D6FC.\"\nHighlights: \"Our panel based damage functions imply that the optimal\
    \ carbon price in 2020 is almost four times higher as assessed by Nordhaus in\
    \ the 2018 study.\"\n"
  16: "Source material\nIn this section, we compare our estimates to results of related\
    \ studies and discuss the implications for modeling climate damages in macroeconomic\
    \ and integrated assessment models. Reduced-form damage functions map increases\
    \ in global mean surface temperature to changes in global GDP (compared to zero\
    \ temperature increase). Social cost of carbon. Estimates for the social cost\
    \ of carbon (in $/tCO2, in 2010-US$) based on different damage functions. The\
    \ damage function derived from the cross-sectional results in SCC that are twice\
    \ as high in 2020 as those computed in Nordhaus (2018). Panel-based damage functions\
    \ were calibrated to replicate output- and population-weighted global damages\
    \ as given in Table 7, respectively. With respect to the cross-sectional analysis,\
    \ our results are of similar magnitude, but slightly higher than those reported\
    \ by related studies. We \uFB01nd strong evidence that output levels are affected\
    \ after a onetime temperature increase... but we do not \uFB01nd evidence that\
    \ the (long-run) balanced growth rate of the economy is affected. it is important\
    \ to keep in mind here that our SCC estimates only include direct total factor\
    \ productivity (TFP) impacts of changes in temperature and abstract from other\
    \ important climate impacts such as sea-level rise or non-market effects of temperature.\
    \ Marginal effects in our study tend to be slightly larger, in particular at higher\
    \ temperature levels, even if we use a comparable econometric speci\uFB01cation\
    \ that is based on temperature levels rather than temperature changes.\n"
