  18: "Source material here.\n\"We find strong evidence that changes in annual mean\
    \ temperatures affect economic output in a non-linear way.\" \"Increases in temperature\
    \ tend to increase gross regional product (GRP) in cold regions (where annual\
    \ mean temperature is below 5 \u25E6C) and reduce GRP in hot regions.\" \"A 1\
    \ \u25E6C temperature increase in a region with an annual mean temperature of\
    \ 25 \u25E6C, reduces GRP by about 3.5% in that region.\" \"We project considerable\
    \ production losses, around 7-14% in the year 2099 compared to a scenario of no\
    \ further warming. In tropical regions, output losses of up to 20% are possible.\"\
    \ \"Using a stylized growth model, we illustrate how weather shocks and changes\
    \ in climate conditions affect economic output and growth rates.\" \"By using\
    \ a comprehensive data set of economic activity at the subnational level with\
    \ almost global coverage, we empirically analyze the climate\u2013growth nexus\
    \ at various time scales.\" \"Our panel specification suggests that a permanent\
    \ increase in temperature will lead to a permanent loss in economic output in\
    \ hot regions.\" \"Note that non-market impacts and costs due to sea-level rise\
    \ are excluded from our damage estimates.\" \"We find no evidence that a unique\
    \ temperature increase changes the long-run growth rate of the economy.\"\n"
