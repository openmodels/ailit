  2: "Source material here.\nThis paper aims to fill these research gaps by using\
    \ a panel of subnational GDP data \u2013 Gross Regional Product (GRP) \u2013 that\
    \ allows the depiction of local weather as well as climate conditions on various\
    \ time scales across the globe (covering more than 1500 regions). We are therefore\
    \ able to address several of the shortcomings of previous analyses with respect\
    \ to regional scope, temporal scale and specific technical issues.\nCritically,\
    \ the implications for optimal climate policies and mitigation pathways are considerable\
    \ if the effect of weather shocks is persistent with permanently lower levels\
    \ of GDP or even lower GDP growth rates... Methodologically, existing analyses\
    \ on the impact of weather shocks on GDP have been criticized for ignoring the\
    \ effect of average climate conditions on the marginal response to weather and\
    \ for neglecting trends in climate variables...\nIn some cases, much higher economic\
    \ losses are predicted from anthropogenic warming than had been estimated by previous\
    \ studies using integrated assessment models.\n"
  3: "We \uFB01nd strong and robust evidence that GRP responds to annual temperatureshocks\
    \ as well as long-run temperature levels (climate). To illustrate economic impacts\
    \ of climate change on different time scales, we consider a stylized Ramsey-type\
    \ growth model where changes in weather variables affect the productivity level\
    \ of the entire economy and the growth rate of labor productivity. We provide\
    \ further evidence that marginal effects of tem-perature increase are much higher\
    \ than assumed in most Integrated Assessment Models (IAMs). In particular, hot\
    \ regions are more strongly affected by further warming than cooler regions."
  4: "Source material here.\nEvaluation overview: \"If productivity is reduced due\
    \ to a change in temperature, Y decreases unexpectedly... This temporary disinvestment\
    \ reduces GDP as well. However, the long-run growth rate of the economy is again\
    \ determined by gA(T) and will only change via the BGP-effect channel, i.e., if\
    \ gA(T) changes in temperature.\"\nDrivers of Risk: \"A sudden change in climate\
    \ conditions, \u0394T, affects contemporaneous growth rates;... prevailing climate\
    \ conditions T affect transitory and long-run growth (via F(T)).\"\nMethodology:\
    \ \"We take on the previous notation but define Ti,t =(Ti,t , Pi,t) as a vector\
    \ of annual mean temperature levels (in \u25E6 C) and annual total precipitation\
    \ values (in m) within year t at region i... Hence, the regression model, based\
    \ on Eq. (5), reads: gi,t = \U0001D6FC \u0394Ti,t + \U0001D6FD Ti,t\u0394Ti,t\
    \ + \U0001D6FE1 Ti,t + \U0001D6FE2 T2i,t + pi(t) + \U0001D6FFi + \U0001D707 t\
    \ + \U0001D700i,t.\"\nHighlights: \"Our approach emphasizes that differentiating\
    \ between temperature effects and temperature change effects can be crucial for\
    \ understanding growth dynamics.\"\n"
  5: " \n\"the transitory growth impact and the balanced growth path impact in Eq.\
    \ (4) are estimated jointly. It is therefore not possible to disentangle transitory\
    \ from permanent growth effects.\"\n\n\"We first determine average temperature\
    \ and precipitation levels for the decades 2005\u20132014, 1995\u20132004 and\
    \ 1985\u20131994 (referred to hereafter as climate conditions)...\"\n\n\"The coefficients\
    \ \u03B1 and \u03B2 estimate again how total productivity changes with climate\
    \ conditions.\"\n\n\"The annual panel model exploits only annual weather variability\
    \ (within regions)... One way to overcome these limitations is to use cross-sectional\
    \ regressions in growth rates over longer time intervals (long-difference model).\"\
    \n"
  6: "\n\"We use climate and economic data at the subnational level for the years\
    \ 1900\u20132014.\" \"We use annual Gross Regional Product (or related data) as\
    \ a measure of economic activity on the regional level.\" \"For the climate variables,\
    \ we use grid-ded climate data...from the Climate Research Unit...We aggregate\
    \ these gridded data to the region level...\" \"Temperature projections for 2015\u2013\
    2099 in accordance with the Representative Concentration Pathway 8.5...are derived\
    \ from the climate data set of the Intersectoral Impact Model Intercomparison\
    \ Project (ISIMIP...\" \"We include further geographical variables in our analysis\
    \ that stem from various sources. Distance to navigable rivers and distance to\
    \ coasts are taken from CIA World DataBank II. Altitude is obtained from the Global\
    \ Multi-resolution Terrain Elevation Data 2010 (GMTED2010). Data on cumulative\
    \ oil and gas reserves is based on USGS World Petroleum Assessment Data...\" \"\
    Average annual per-capita growth in USD is 7%. The high variability of growth\
    \ is mainly driven by the large volatility of economic growth over time as the\
    \ within-region standard deviation, SD_w, is 3 times larger than the between-region\
    \ standard deviation, SD_b.\" \"We here use bias-corrected grid cell-level projections\
    \ from the Princeton Earth System Model, GFDL-ESM2M, and aggregate them to the\
    \ region level by means of the algorithm described above.\" \"To this end, we\
    \ have assembled a unique data set spanning more than 1500 regions in 77 countries\
    \ worldwide and dating as far back as the early 1900s...\"\n"
  8: "  \nEvaluates the effect of annual weather changes on annual changes of log\
    \ Gross Regional Product (GRP).  \n    - \"Panel model results for the effect\
    \ of annual weather (changes) on annual changes of log Gross Regional Product.\"\
    \n\nAnnual mean temperature (T), annual total precipitation (P), changes in these\
    \ (\u0394T and \u0394P), and lagged effects (L).  \n    - \"Annual mean temperature\
    \ and annual total precipitation are denoted by T and P, respectively. \u0394\
    \ T and \u0394 P refer to annual changes in weather and L. indicates lagged effects.\"\
    \n\nA 1\xB0C temperature increase in a hot region decreases GRP by about 3%. \
    \ \n    - \"A temperature increase of 1 \xB0C in a hot region decreases GRP by\
    \ about 3%.\"\n\nOptimal annual average temperature level for minimizing losses\
    \ ranges between 5\xB0C and 10\xB0C.  \n    - \"For the nonlinear panel model\
    \ variants (2)\u2013(6), we can compute an optimal annual average temperature\
    \ level which ranges between 5 \xB0C and 10 \xB0C.\"\n\nPanel regression with\
    \ different variants. Includes fixed effects (region, year), regional trends (squared),\
    \ and standard errors clustered at the country level. Uses CRU data from 1900-2014\
    \ (some models use 1980-2014).  \n    - \"Panel model results\u2026 Columns refer\
    \ to different variants of the panel model\u2026\", \"Observations 35,257\u2026\
    Years 1900\u20132014\u2026Region, Year\u2026Country.\"\n\nTemperature increases\
    \ in hotter regions have significant negative impacts on GRP. Evidence for direct\
    \ productivity effects of temperature shocks.  \n    - \"At 10 \xB0C the marginal\
    \ effect is insignificant but at 25 \xB0C it is mostly significant (at 10% or\
    \ higher) and amounts to 2.6%\u20133.7%.\", \"Strong evidence for direct productivity\
    \ effects of temperature shocks.\"\n"
  9: "Source material here.\nEvaluation overview: \"This implies that hot years might\
    \ harm local economies even more than previously thought.\"\nDrivers of Risk:\
    \ \"We run regressions (2) and (5) with different cumulative lag structures, as\
    \ shown in Tab. S2 and Tab. S3 in the Supplementary Materials Appendix.\" \nQuantitative\
    \ material: \"Compered to regressions with zero lags, adding one-year lagged weather\
    \ changes increases R2-adjusted and BIC considerably but adding more lags has\
    \ only minor impacts on the two performance indicators.\"\nMethodology: \"We perform\
    \ a number of further robustness checks (see Tab. S4 and Fig. S6). Including country-year\
    \ fixed effects gives insignificant results for all coefficients as they absorb\
    \ a substantial amount of the annual climate variability.\"\nHighlights: \"Overall,\
    \ models (5)\u2013(6) have the highest explanatory power when comparing the adjusted\
    \ R2 and BIC values of all models. The difference between model (5) and model\
    \ (6) is very small. As quadratic temperature effects are insignificant, we consider\
    \ (5) as our preferred specification and use it for the later impact modeling.\"\
    \nMore Notes: \"We therefore chose a parsimonious lag structure with lagged annual\
    \ temperature for T and consider contemporaneous and lagged temperature changes\
    \ for \u0394T.\"\n"
  10: "yaml\nEvaluation overview: \"Marginal effect of temperature (change) on economic\
    \ growth.\" \"One degree of temperature increase reduces GRP by 2\u20134%.\"\n\
    Drivers of Risk: \"One degree of temperature increase reduces GRP by 2\u20134%.\"\
    \nQuantitative material: \"Over all decades, the temperature coe\uFB03cient is\
    \ remarkably stable and, except for the earliest period (1955\u20131964), signi\uFB01\
    cant at the 10%-level. One degree of temperature increase reduces GRP by 2\u2013\
    4%.\"\nMethodology: \"Climate and GRP data are aggregated to 10-year intervals\
    \ with 2005\u20132014 as reference period because data coverage is largest for\
    \ that period.\" \"Based on speci\uFB01cation (2) in Table 4.\"\nHighlights: \"\
    Over all decades, the temperature coe\uFB03cient is remarkably stable and, except\
    \ for the earliest period (1955\u20131964), signi\uFB01cant at the 10%-level.\
    \ One degree of temperature increase reduces GRP by 2\u20134%.\"\nMore Notes:\
    \ \"The temperature results are robust against the inclusion of geographical covariates\
    \ (columns 2\u20134), except for altitude (geography). Altitude is negatively\
    \ correlated with temperature. As mountainous regions are colder and more di\uFB03\
    cult to access, omitting altitude from the regression biases the temperature coe\uFB03\
    cient downward. Running the regression without country \uFB01xed effects leads\
    \ to much higher temperature coe\uFB03cients of about 0.1 (column 5).\"\n"
  11: " \nLong-difference model results on the effect of a change in 10-year average\
    \ weather on economic growth (changes in log GRP between the two periods)... change\
    \ from 1985 to 1994 to 2005\u20132014... columns (3) and (4) look at changes in\
    \ temperature and precipitation only... economic growth... \u0394 T... \u0394\
    \ P... Log initial GRP...  Cum Oil Gas... distance coast... distance river...\
    \ Altitude...\n\nusing 8\u201312 \u25E6C as reference temperature bin... in regions\
    \ with an average temperature of 20\u201324 \u25E6C, GRP is approximately 28%\
    \ lower than in the reference temperature bin... 24\u25E6 -28 \u25E6C, the difference\
    \ amounts to 35% lower gross regional product... u-shaped pattern implying high\
    \ GRP in very dry and in very wet regions...\n\ncountry fixed effects included.\
    \ standard errors clustered at country level... observations... no. countries...\
    \ R-squared adjusted... BIC... CRU data... estimated precipitation effects differ\
    \ to a larger extent but still show a similar pattern for ERA5.\n"
  12: Source material here.
  13: "\nEvaluation overview: \"On a globally aggregated level, damages inferred from\
    \ the annual panel model are hence larger than those from the cross-sectional\
    \ model on long-term climate conditions.\" Drivers of Risk: \"Temperature increase\
    \ from 2015 to 2019 to 2099 ( \u25E6 C)\" Quantitative material: \"Reduction in\
    \ global GRP based on cross-sectional estimate (%) 6.6 8.1 7.4 7.4 Reduction in\
    \ global GRP based on panel estimate (%) 11.4 11.2 13.4 14.2\" Methodology: \"\
    On a globally aggregated level, damages inferred from the annual panel model are\
    \ hence larger than those from the cross-sectional model on long-term climate\
    \ conditions.\" Highlights: \"Hence, poorer regions tend to suffer stronger from\
    \ global warming.\" More Notes: \"In the panel approach the interaction term leads\
    \ to a strong diversification of impacts: cold regions benefit from warming whereas\
    \ hot regions lose disproportionately.\"\n"
