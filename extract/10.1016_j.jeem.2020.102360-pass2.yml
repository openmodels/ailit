Drivers of Risk:
  1: Temperature increases are identified as a driver impacting productivity levels.
  2: The analysis considers weather and climate conditions on various timescales as
    drivers of risk.
  3: Temperature changes are considered as drivers, especially focusing on annual
    temperature shocks and long-run temperature changes.
  4: Climate change, particularly changes in temperature and precipitation levels,
    are identified as drivers impacting economic growth rates.
  5: Changes in average temperature and precipitation levels over different periods
    are evaluated as drivers impacting economic outcomes.
  6: "The drivers of risk are annual mean temperature and annual total precipitation.\
    \ Temperature projections for 2015\u20132099 under the RCP 8.5 scenario are also\
    \ used. Other geographical variables included are distance to navigable rivers,\
    \ distance to coasts, altitude, and cumulative oil and gas reserves."
  8: "Annual mean temperature (T), annual total precipitation (P), changes in these\
    \ (\u0394T and \u0394P), and lagged effects (L)."
  9: "Contemporaneous and lagged temperature changes (\u0394T), temperature levels\
    \ (T), precipitation changes (\u0394P), and precipitation levels (P)."
  10: "A 1\xB0C increase in annual average temperature reduces GRP by 2-4%."
  11: Changes in 10-year average weather (temperature and precipitation), initial
    GRP, cumulative oil and gas production (Cum Oil Gas), distance to coast (Distance
    coast), distance to river (Distance river), and altitude
  12: Changes in long-term climate conditions, specifically temperature (T) and precipitation
    (P).
  13: Global warming and its associated temperature increase are identified as the
    primary drivers of risk affecting GRP.
  14: "High greenhouse gas emissions leading to approximately 3.5\xB0C warming."
  15: Warming temperature levels and their non-linear effects across different regions.
  16: Temperature increases are the primary driver of risk impacting global GDP and
    carbon costs.
  17: Temperature increase
  18: Changes in annual mean temperatures.
Evaluation overview:
  1: The paper evaluates the impact of climate conditions on economic productivity,
    specifically Gross Regional Product (GRP).
  2: This paper aims to analyze the impacts of climate change on economic outcomes,
    specifically using Gross Regional Product (GRP) data.
  3: The paper evaluates economic impacts on Gross Regional Product (GRP) due to temperature
    shocks and long-term temperature levels.
  4: The paper discusses productivity loss in the context of reductions in economic
    output due to climate-induced changes in temperature, which affect GDP growth
    rates.
  5: The paper evaluates how climate conditions and their changes affect economic
    growth rates and productivity using different models.
  6: The paper evaluates the impact of climate on economic activity at the subnational
    level.
  8: Evaluates the effect of annual weather changes on annual changes of log Gross
    Regional Product (GRP).
  9: Impacts of temperature and precipitation changes on Gross Regional Product (GRP).
  10: The paper evaluates the impact of temperature change on regional economic growth.
  11: Economic growth (changes in log GRP between two periods)
  12: Gross Regional Product (GRP) losses due to climate change
  13: The page discusses the impact of global warming on global GRP reductions, assessing
    both a cross-sectional and panel approach.
  14: Projected economic and GDP losses in 2099/2100 under RCP 8.5 scenario.
  15: High GRP losses projected in poor countries by 2099 under a business-as-usual
    warming scenario.
  16: The paper discusses the impacts of temperature increases on global GDP and the
    social cost of carbon, specifically regarding direct total factor productivity
    impacts.
  17: "GRP losses of a 1\u25E6 C temperature increase"
  18: Economic output and growth rates, specifically Gross Regional Product (GRP).
Highlights:
  1: The paper finds no evidence of permanent growth rate impacts but robust evidence
    that temperature affects productivity levels.
  3: Findings suggest that temperature increases have stronger impacts on economic
    outcomes than previously assumed in most Integrated Assessment Models, with hot
    regions being more affected.
  4: The analysis differentiates between immediate climate effects and long-term effects
    on growth, emphasizing the importance of distinguishing temperature level effects
    from temperature change effects on economic growth.
  8: Temperature increases in hotter regions have significant negative impacts on
    GRP. Evidence for direct productivity effects of temperature shocks.
  9: "Models with lagged annual temperature have the highest explanatory power; temperature\
    \ increases have higher marginal effects on GRP than previously thought; long-difference\
    \ regressions do not provide evidence for long-run growth effects of climate conditions;\
    \ precipitation, model specifications show significant effects for the interaction\
    \ term \u0394Pi \xB7 Pi,t\u2212 1, yet the effect is not robust over time. "
  10: Stable negative impact of temperature increase on GRP over several decades,
    with a noted 2-4% reduction per degree increase.
  11: "Regions with hot climate tend to have lower GRP. In regions with an average\
    \ temperature of 20\u201324 \u25E6C, GRP is approximately 28% lower than in the\
    \ reference temperature bin (8\u201312 \u25E6C). In regions with 24\u25E6 -28\
    \ \u25E6C, the difference amounts to 35% lower gross regional product. A u-shaped\
    \ pattern is found for precipitation impacts, implying high GRP in very dry and\
    \ in very wet regions."
  12: Regions' annual GRP is projected to be reduced by around 6-14% in 2099 compared
    to a scenario with no additional warming from 2015-2019 onward, depending on the
    weighting method and regression model used.
  13: The panel model suggests that poorer regions suffer more from global warming,
    showing a pronounced correlation between baseline GRP and climate damages.
  14: Significant regional variations in economic impact, with highest losses in Africa
    and the Middle East and minimal losses or gains in parts of Canada and Scandinavia.
  15: Panel-based damage functions suggest higher social cost of carbon than estimated
    by Nordhaus (2018), with 2020 optimal carbon price being almost four times higher.
  16: The study finds strong evidence that output levels are permanently affected
    by temperature increases, but not the balanced growth rate of the economy.
  17: Technological change has not reduced the temperature sensitivity of economies.
  18: "Changes in annual mean temperatures affect economic output in a non-linear\
    \ way. Increases in temperature tend to increase GRP in cold regions (below 5\xB0\
    C) and reduce GRP in hot regions. Panel specification suggests a permanent temperature\
    \ increase leads to a permanent loss in economic output in hot regions."
Methodology:
  1: The analysis uses a novel data set with panel models, long-difference regressions,
    and cross-sectional regressions.
  2: The paper utilizes a panel of subnational GDP data (GRP) covering over 1500 regions
    to analyze the impacts of local weather and climate conditions. It aims to address
    shortcomings of previous analyses with respect to regional scope, temporal scale,
    and specific technical issues.
  3: The analysis uses a Ramsey-type growth model to differentiate between short-term
    weather shocks and long-term climate impacts on economic growth.
  4: The analysis employs an empirical regression model based on an annual panel model,
    considering both temperature and precipitation as variables, with terms capturing
    immediate effects of weather shocks and long-term growth impacts.
  5: The analysis is performed using multiple models including annual panel models,
    long-difference models, and cross-sectional models to evaluate growth impacts
    of climate conditions.
  6: "The study uses climate and economic data at the subnational level for the years\
    \ 1900\u20132014. Climate data is from the Climate Research Unit (CRU TS v3.23)\
    \ at 0.5-degree resolution, aggregated to regional level using area-weighted averages.\
    \ Temperature projections are derived from the climate data set of the Intersectoral\
    \ Impact Model Intercomparison Project (ISIMIP) at 0.5-degree resolution and bias-corrected.\
    \ Gross Regional Product (or related data) is used as a measure of economic activity."
  8: Panel regression with different variants. Includes fixed effects (region, year),
    regional trends (squared), and standard errors clustered at the country level.
    Uses CRU data from 1900-2014 (some models use 1980-2014).
  9: Panel regressions using contemporaneous and lagged temperature variables; long-difference
    models comparing 10-year periods; cross-sectional models. Annual panel model,
    10-year long difference model, and cross-sectional model used to assess effects.
  10: Analysis performed using regional data aggregated to 10-year intervals and specified
    models applied to evaluate temperature impacts.
  11: "Long-difference regression model is used to assess the effect of changes in\
    \ 10-year average weather on economic growth. Models compare 1995\u20132004 to\
    \ 2005\u20132014 and 1985 to 1994 to 2005\u20132014. Country fixed effects are\
    \ included, and standard errors are clustered at the country level. CRU data is\
    \ used."
  12: Cross-sectional regression analysis aggregating climate and GRP data to 10-year
    intervals. Future GRP losses are projected based on historical climate-GRP relationships
    and IPCC's business-as-usual scenario. Both panel and cross-sectional regression
    results are used for projections.
  13: The analysis uses both cross-sectional and panel models to estimate damages
    from global warming, with results differentiated by region and correlated to baseline
    GRP.
  14: Analysis based on both panel regression and cross-sectional regression models,
    estimating percentage changes in economic output due to temperature increases.
  15: Analysis uses panel and cross-sectional econometric specifications with quadratic
    temperature levels; discusses damage function integration into IAMs.
  16: The analysis uses reduced-form damage functions and applies panel and cross-sectional
    regression models.
  17: "Annual panel models and cross-sectional models are used to estimate the effect\
    \ of a 1 \u25E6 C temperature increase on reductions of economic output."
  18: Stylized growth model; regression models using a comprehensive subnational data
    set; panel and cross-sectional models.
More Notes:
  1: "The social cost of carbon from temperature-induced productivity losses is estimated\
    \ at 73\u2013142$/tCO2 in 2020, rising to 92\u2013181$/tCO2 in 2030."
  6: The study uses data from over 1500 regions in 77 countries worldwide.
  9: The preferred model specification includes contemporaneous and lagged temperature
    changes.
  10: Robustness checks indicate temperature results hold except in cases omitting
    altitude, and excluding country fixed effects increases temperature coefficient
    significantly.
  11: The paper tests for a non-linear relationship between GRP and climate by replacing
    temperature and precipitation with bins that encode whether a specific temperature
    or precipitation level holds for a region. Using ERA5 data instead of CRU data
    in the binned regression gives very similar results for the temperature effects.
  12: The precipitation coefficients from the empirical models are mostly insignificant,
    and therefore the effect of precipitation is disregarded in future projections.
  13: Heterogeneity in climate damages is noted, with cold regions possibly benefiting
    from warming while hot regions lose disproportionately.
  16: Estimates exclude impacts such as sea-level rise and non-market effects; results
    show more significant marginal effects at higher temperature levels compared to
    other similar studies.
  17: "Estimates only refer to the effect of (historic) temperature and precipitation\
    \ variability on GDP, primarily covering impacts on labor productivity, land productivity\
    \ (agricultural yields) and depreciation of capital. Non-market damages such as\
    \ loss of life, con\uFB02icts and violence, biodiversity and ecosystem damages\
    \ are not captured."
  18: The analysis excludes non-market impacts and costs due to sea-level rise. The
    paper finds no evidence that a unique temperature increase changes the long-run
    growth rate of the economy.
Quantitative material:
  1: "An increase in global mean surface temperature by about 3.5\xB0C by 2100 would\
    \ reduce global output by 7-14%."
  6: Average annual per-capita growth in USD is 7%. The within-region standard deviation
    of growth is 3 times larger than the between-region standard deviation.
  8: "Optimal annual average temperature level for minimizing losses ranges between\
    \ 5\xB0C and 10\xB0C."
  9: Adding one-year lagged weather changes increases R2-adjusted and BIC considerably
    compared to regressions with zero lags.
  10: Temperature coefficient is stable and significant at the 10%-level for each
    decade except 1955-1964, showing a 2-4% reduction in GRP.
  11: The table presents coefficients for long-difference model results on the effect
    of changes in 10-year average weather on economic growth. Includes R-squared adjusted
    values and BIC. Marginal effects (ME) at 10 and 25 degrees C are provided along
    with their standard errors (SE).
  12: Cross-sectional regression results show the effect of changes in long-term climate
    conditions on the log of Gross Regional Product, including coefficients for T,
    P, Cum Oil Gas, Distance coast, Distance river, and Altitude.
  13: Quantitative data includes expected reductions in global GRP by 2099 under RCP
    8.5 scenario, with values varying from 6.6% to 14.2% depending on the model and
    weighting scheme used.
  14: GRP would be reduced by more than 20% in regions with the darkest red color,
    with varying reductions in other regions.
  15: "Quadratic coefficient \u03B2 = -0.0018 used in damage function estimates; GRP\
    \ losses analyzed in scatter plots."
  16: Estimates of the social cost of carbon in $/tCO2 for years 2020, 2030, 2050,
    and 2100 and findings that social cost of carbon based on cross-sectional estimates
    are higher than DICE-2016R estimates.
  17: "2.0\u20134.3% loss based on cross-sectional model"
  18: "A 1\xB0C temperature increase in a region with an annual mean temperature of\
    \ 25\xB0C reduces GRP by about 3.5% in that region; projected production losses\
    \ of 7-14% in 2099 compared to a scenario of no further warming; output losses\
    \ of up to 20% in tropical regions are possible."
