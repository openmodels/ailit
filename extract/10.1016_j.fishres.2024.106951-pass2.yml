  15: The analysis focuses on the effects of thermal stress on groundfish populations
    and explores alternative models for future evaluations. Similarly, cumulative
    impacts of environmental variables on biological processes should be considered
    by future analyses. Measurement error associated with the environmental variables
    because they are proxies for the actual mechanisms driving the population dynamics.
    An alternative approach is to not link an environmental variable to a population
    parameter directly, but instead allow for annual parameter deviations. The set
    of the hypotheses considered in this paper is a subset of the possible number
    owing to an inability to make projections for all the environmental variables
    concerned. Environmental variables may provide an indices of these deviations.
