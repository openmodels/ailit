    Evaluation overview: "Consistent with previous studies, our results indicate declines
    in biomass and catch for EBS Pacific cod, will increase with future levels of
    climate warming, and basing catch limits on the null environmental model or MIROC
    ssp126 (and removing them from the population) is predicted to lead to population
    crash."

    Drivers of Risk: "Climate effects in the scenarios with the highest warming rates
    exceed the benefit of the harvest control rule by the end of the century (under
    GFDL, and MIROC ssp585 forcing scenarios)."

    Quantitative material: "However, setting catch limits based GFDF ssp585 generally
    keeps the stock above the threshold of 20% of unfished spawning biomass."

    Methodology: "The projections assume that the harvest in each year will exactly
    match the catch limit outcomes from the harvest control rules... Future work should
    consider the effects of feedback control and scope for climate adaptation using
    management strategy evaluation"

    Highlights: "Collectively, our method provides best practices for more fully quantifying
    uncertainty in climate-enhanced single-species assessment methods, and the results
    indicate tradeoffs in management"

