Drivers of Risk:
  1: Increases in temperature impacting weight-at-age and recruitment of Pacific cod.
  2: The paper examines environmental variables like temperature and ocean pH and
    their impacts on population parameters, reflecting the potential consequences
    of non-stationarity due to climate change.
  3: Uncertainty in environmental variable projections is a key concern, and climate
    scenarios are used to model future conditions impacting population parameters.
  4: The projections are influenced by various environmental indices and scenarios
    used historically and projected into the future.
  5: Sea surface temperature in summer and during the spawning season and ocean pH
    are noted as factors impacting Pacific cod recruitment.
  6: The analysis considers how economic factors related to fishing, such as net revenue,
    impact the fisheries management outcomes.
  7: Summer sea surface temperature (SST) impacts growth and recruitment, with higher
    temperatures leading to faster growth but lower expected recruitment.
  8: Summer sea surface temperature (SST) is identified as an environmental driver
    affecting recruitment, growth, and ultimately, spawning biomass. Climate change
    scenarios (ssp126, ssp585) also act as drivers.
  9: Summer sea surface temperature (SST) is a key driver impacting cod growth (L1.5)
    and recruitment. Different climate scenarios (ssp126 and ssp585 from CESM, GFDL,
    and MIROC models) lead to varying projections of SST and subsequent impacts on
    cod populations. Higher catches based on MIROC ssp126 can lead to population collapse.
  10: Increases in temperature negatively impact recruitment while increasing weight-at-age,
    ultimately leading to lower biomass and yields.
  11: The analysis considers environmental variables impacting growth and recruitment
    of Pacific cod, but these are not explicitly named on this page. The page mentions
    changes over time in natural mortality due to trophic interactions.
  12: Summer sea surface temperature (SST) impacting growth and recruitment is a driver
    of risk. Environmental scenarios and emission scenarios also act as drivers.
  13: The potential redistribution of Pacific cod spawning areas due to warming in
    the eastern Bering Sea.
  14: Temperature and pH impacting growth and recruitment of Pacific cod with increased
    metabolic demand and mortality linked to temperature rise.
  15: Thermal stress and cumulative environmental variables are identified as impacting
    groundfish populations.
  16: Climate warming is identified as a risk to biomass and catch limits, with projections
    highlighting that higher warming rates can negatively impact the effectiveness
    of harvest control rules.
Evaluation overview:
  1: Impacts of climate change on Pacific cod populations, specifically biomass and
    catch, and economic consequences (profits) for the fishery.
  2: The paper provides an overview of assessing and projecting the effects of environmental
    variables on the stock assessment of eastern Bering Sea (EBS) Pacific cod, focusing
    on biological parameters like the length of age-1.5 animals and mean recruitment.
  4: This paper focuses on projecting candidate catch series, incorporating uncertainty
    in choice of assessment structure, environmental variables, and model/emissions
    scenario.
  6: The paper evaluates the management advice for Eastern Bering Sea Pacific cod
    based on the North Pacific Fishery Management Council Tier 3 40-5 harvest control
    rule, focusing on achieving sustainable yields.
  7: Conservation-related performance metrics include the probability of spawning
    biomass dropping below 20% of unfished biomass and the probability of a 50% decline
    in abundance.
  8: The paper evaluates the impact of environmental factors on the spawning biomass
    and catches of Pacific cod in the eastern Bering Sea.
  9: The paper evaluates the impact of climate change (specifically sea surface temperature)
    on Pacific cod populations, focusing on spawning biomass and fishery profits.
  10: The analysis evaluates the impacts of environmental scenarios on spawning biomass
    and catch for Pacific cod.
  11: The paper evaluates the impact of environmental variables on Pacific cod populations
    in the Gulf of Alaska.
  12: The evaluation focuses on the impact of environmental scenarios and management
    strategies on spawning biomass relative to the unfished level for catch series.
  13: The analysis provides an overview of spawning biomass trends for EBS Pacific
    cod over time.
  14: Probability of spawning biomass dropping below threshold levels and relative
    profit based on catch time-series.
  15: The analysis focuses on the effects of thermal stress on groundfish populations
    and explores alternative models for future evaluations.
  16: The study indicates declines in biomass and catch for EBS Pacific cod will increase
    with future levels of climate warming, risking population crashes based on certain
    environmental models.
Highlights:
  1: Climate change (temperature increases) negatively impacts Pacific cod recruitment
    more than it positively impacts weight-at-age. Current harvest control rules may
    not be sufficient to conserve the stock under climate change. Using the most pessimistic
    climate scenario (GFDL ssp585) for setting catch limits may be a more sustainable
    approach.
  2: The inclusion of environmental variables in the stock assessment does not markedly
    impact the main outputs but provides insights into the future state's dependency
    on population parameter assumptions with environmental factors.
  3: 'The study integrates two approaches to quantify uncertainty: multiple stock
    assessment configurations and Bayesian posterior sampling of model parameters.'
  4: The paper emphasizes capturing parameter and model uncertainty, utilizing a flowchart
    for constructing and projecting candidate catch series with uncertainty.
  5: Environmental factors such as SST and ocean pH during the spawning season are
    relevant to Pacific cod recruitment and population dynamics.
  6: Consideration of an alternative harvest control rule to maximize net revenue
    instead of just biological sustainability, taking economic factors into account.
  7: Summer SST identified as the best environmental driver for both mean recruitment
    and growth potential, with a significant model fit using AIC criteria.
  8: Future spawning biomass of Pacific cod is projected to decline, potentially falling
    below target levels even under optimistic climate scenarios. Different assessment
    models contribute less uncertainty than different environmental scenarios.
  9: Environmental effects, particularly SST, will likely lead to lower cod production.
    Basing future catches on the environmental scenario that leads to the poorest
    outcomes (GFDL ssp585) keeps the stock generally above the threshold of 20% of
    unfished spawning biomass. Catch control rules that reduce catch limits in the
    face of reduced biomass provide benefits. MIROC ssp126 leads to population collapse
    because it is associated with the highest catches.
  10: Current harvest control rules may not conserve stock in scenarios with environmental
    changes and may lead to declines in biomass and catch.
  11: Model uncertainty for EBS Pacific cod is greater than reflected in the four
    assessment model configurations used for projections. Assessment model configuration
    is potentially as important, or more so, than the environmental scenario.
  12: There are differences in projected biomass and catch under different environmental
    models, even under the same emission scenario. Earth System Model uncertainty
    is important in resource analysis and management. Climate change signals differ
    significantly across models and emission scenarios in the longer-term future (after
    the mid-21st century).
  13: Spawning areas may expand in the southern region of the eastern Bering Sea with
    warming; however, there is low potential for spawning in the northern part.
  14: Need to update projections with climate-enhanced stock assessments and review
    consistency between environmental variables and population parameters.
  15: The inability to make projections for all environmental variables is a notable
    limitation of the analysis.
  16: Findings suggest certain models indicate threats of population crash, whereas
    other models show potential to maintain stock levels; variation in outcomes shows
    need for robust uncertainty quantification.
Methodology:
  1: A framework for conducting projections that allows for structural model uncertainty
    (in the structure of the population dynamics model, Earth System Models, and emission
    scenarios), process error in future recruitment, and uncertainty in the parameter
    estimates of the population dynamics model. Applied to Pacific cod in the eastern
    Bering Sea with projections based on a harvest control rule that attempts to maximize
    the difference between revenue and variable costs.
  2: Analysis involves using multiple stock assessment models and Earth System Models
    with emission scenarios, accounting for uncertainties in population dynamics and
    environmental variables, to project future stock and catch outcomes.
  3: The analysis involves stock assessments using a single-sex, age-structured population
    dynamics model with 21 age-classes for EBS Pacific cod, incorporating time-varying
    parameters and environmental variables.
  4: The analysis uses Bayesian sampling with the NUTS MCMC algorithm and involves
    constructing and projecting catch series based on historical data and future projections
    using environmental models.
  5: Analyses involve environmental models related to sea surface and bottom temperatures,
    ocean pH, and their relationship to Pacific cod population parameters.
  6: The analysis estimates parameters for different models of cod stock and recruitment
    dynamics, applying Bayesian analyses and variance settings, and develops an economic
    evaluation of harvest control rules through simulation and forecast models.
  7: Analysis involves projecting structural uncertainty using four assessment model
    configurations and six environmental scenarios, integrating parameter uncertainty
    through sampling posterior distributions.
  8: The analysis uses different assessment model configurations and climate scenarios
    to project future spawning biomass and catches. The analysis covers the time period
    1977-2022 for recruitment estimates.
  9: The analysis uses extended single-species models to project the future state
    of the Pacific cod stock and its fishery under different environmental scenarios
    and catch limits. The projections account for parameter uncertainty, future process
    error, and different assessment model configurations. Risks are quantified as
    the probability of dropping below 20% of unfished spawning biomass.
  11: The analysis uses assessment model configurations considered by the Scientific
    and Statistical Committee of the US North Pacific Fishery Management Council,
    focusing on a constant F harvest control rule. Projections assume recruitment
    is distributed about mean recruitment without stock-recruitment relationship.
  12: "The analysis uses assessment model configurations and environmental scenarios\
    \ to project biomass and catch. Model selection approaches were used to select\
    \ relationships between population parameters and environmental variables. The\
    \ applicability of results is tied to the time period of the model fitting, 1977\u2013\
    2022, and the specific Earth System Models and emission scenarios used."
  13: The analysis assumes stationarity in environmental conditions and recruitment
    and incorporates parameter uncertainty and process error in projections.
  14: Projections using best fit model that account for parameter uncertainty and
    process error.
  15: The analysis considers measurement error in environmental variables and recommends
    annual parameter deviations for future studies.
  16: Projections assume harvest matches catch limits from control rules and suggest
    incorporating climate adaptation using management strategy evaluation.
More Notes:
  6: Economic considerations include realized revenue per tonne of cod and daily fishing
    costs.
  8: The results depend on the choice of climate scenario (ssp126 vs. ssp585) and
    the application of harvest control rules (threshold vs. constant fishing mortality).
    The impact of different assessment model configurations on the projections is
    assessed.
  9: The choice of environmental scenario and catch limit strategy are key sources
    of uncertainty. The paper considers uncertainty in model parameters and future
    recruitment.
  11: The projections do not account for changes over time in natural mortality due
    to trophic interactions, or an underlying stock-recruitment relationship. The
    projections are based on one hypothesis related to which environmental variables
    determine growth and recruitment.
  12: The projections assume relationships between population parameters and environmental
    variables. The figures illustrate the time-trajectory of spawning biomass under
    different conditions (different climate effects and control rules).
  15: Environmental variables are not directly linked to population parameters due
    to measurement errors and are instead suggested to be indices of deviations.
Quantitative material:
  1: Temperature increases increase weight-at-age but reduce recruitment; negative
    effects on recruitment outweigh positive effects on weight-at-age; harvest control
    rules assuming no future environmental effects fail to conserve the stock; basing
    future catches on the GFDL ssp585 scenario generally keeps the stock above 20%
    of unfished spawning biomass and achieves long-term profits at or greater than
    those expected in the next ten years.
  2: "There is mention of an average landed catch of 200,000 t during 2013\u20132022\
    \ and its worth of USD 162 million annually, and specific management strategies\
    \ where the target fishing mortality corresponds to an equilibrium spawning biomass\
    \ of 40% of the unfished biomass."
  4: Bayesian sampling produces 5000 parameter vectors that are thinned by conducting
    projections, quantifying uncertainty in projections.
  6: "NR (F) is calculated as the difference between equilibrium revenue, and variable\
    \ costs of fishing, which includes estimated values \u0303p = 1,563 $/t and \u0303\
    c = 66,543 $/d."
  7: The best fit model indicates summer SST as a primary environmental variable;
    quantified through AIC weights showing its significance.
  8: "The paper presents R\xB2 values (0.168, 0.157, 0.157, 0.117) indicating the\
    \ relationship between estimated recruitments and SST-predicted values across\
    \ different models. Projections indicate that spawning biomass will likely fall\
    \ below 40% of the unfished level by the end of the projection period even under\
    \ optimistic scenarios. Under more pessimistic scenarios (GFDL ssp585, CESM ssp585),\
    \ the stock may drop below 20% of unfished spawning biomass."
  9: The distributions for profit percentages during the last 20 years of the projection
    period, expressed as a percentage of that during the first 10 years, have wide
    ranges, with medians at or above 100% for most strategies.
  11: The graphs show sea level projections from 1980-2100 under different scenarios
    and models.
  12: The figures show distributions of spawning biomass relative to unfished levels
    over time, with median values, 50% confidence intervals (light shading), and 90%
    confidence intervals (dark shading). Green and red lines represent 40% and 20%
    of the average unexplored biomass, respectively.
  13: The probability of being below 20% of unfished spawning biomass is visually
    represented in the upper right corner of the graph panels.
  15: No specific quantitative values or percent changes are provided on this page.
  16: Considers scenarios such as MIROC ssp126 leading to population crash, whereas
    setting catch limits based on GFDL ssp585 can keep stock above a specific biomass
    threshold.
sourcematerial:
  1: Capturing uncertainty when modelling environmental drivers of fish populations,
    with an illustrative application to Pacific Cod in the eastern Bering Sea... Decision
    makers are increasingly requesting that environmental and climate drivers be included
    in stock assessments... Increases in temperature are found to increase weight-at-age
    but reduce recruitment. However, the negative effects on recruitment outweigh
    the positive effects on weight-at-age... basing future catches on the environmental
    scenario that leads to the poorest outcomes (GFDL ssp585) generally keeps the
    stock above the threshold of 20% of unfished spawning biomass under most climate
    scenarios and also achieves long-term profits at or greater than those expected
    in the next ten years... A framework for conducting projections that allows for
    structural model uncertainty... and for uncertainty in the parameter estimates
    of the population dynamics model. We then apply the framework to data for Pacific
    cod... with projections based on a harvest control rule that attempts to maximize
    the difference between revenue and variable costs... the assumption of no future
    environmental effects on population parameters, fail to conserve the stock if
    the inferred catch limits are taken, which suggests that declines in biomass and
    catch will take place... However, the strategies... lead to much lower profits
    for the fishery, particularly over the long-term.
  2: 'markdown

    Source material: "This paper extends the stock assessment for EBS cod by allowing
    environmental variables to capture variation in two biological parameters driving
    the population dynamics (the length of age-1.5 animals, L1.5, and the mean recruitment).
    Consequently, the resulting projected catch series reflect the uncertainty related
    to the assessment model configuration as well as future climate conditions. We
    thus examine the future values of the associated environmental variables based
    on three Earth System Models with high and low emission scenarios as the basis
    for projections based on harvest control rules. The management advice for the
    stock is based on a sloped (or threshold) harvest control rule (Fig. 1) where
    the target fishing mortality currently corresponds to an equilibrium spawning
    biomass of 40% of the unfished spawning biomass. The inclusion of environmental
    variables does not markedly impact the main outputs of the assessment (e.g., time-trajectories
    of spawning biomass and recruitment) because these are determined primarily by
    the monitoring data."

    '
  3: "yaml\nMethodology: \"The actual stock assessment of EBS Pacific cod (Barbeaux\
    \ et al., 2022) is based on a single-sex age-structured population dynamics model\
    \ with 21 age-classes (ages 0\u2013 20+) and 121, 1-cm length-classes...The actual\
    \ assessment includes (penalized) deviations on some parameters that allow for\
    \ time-variation (Table 1) and this paper additionally considers the possibility\
    \ that parameters are related to environmental variables.\"\nDrivers of Risk:\
    \ \"A key source of uncertainty when making projections based on environmental\
    \ variables is how the environmental variables are to be projected...we use a\
    \ set of downscaled historical and future climate scenarios...The projections\
    \ of the climate-enhanced stock assessment are conducted for a set of harvest\
    \ control rules that set fully-selected fishing mortality (in principle by fleet)\
    \ based on stock status relative to reference points.\"\nHighlights: \"We thus\
    \ unify two approaches to quantifying uncertainty in stock assessments, namely\
    \ considering multiple stock assessment configurations and the uncertainty of\
    \ the parameters of an assessment given a model configuration.\"\n"
