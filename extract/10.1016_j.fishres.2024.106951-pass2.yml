    Evaluation overview: "The conservation-related performance metrics used to summarize
    the outcomes of the analyses were the probability of the spawning biomass dropping
    below 20% of the unfished spawning biomass (a threshold for conservation of Steller
    sea lions)... in 2050, 2075 and 2099, and the probability of a 50% decline in
    abundance by the end of the projection period..."


    Drivers of Risk: "The best fit model with environmental drivers implies that increasing
    sea surface temperature in summer... will lead to faster growth (larger L1.5)
    but lower expected recruitment."


    Quantitative material: "Of the models including environmental drivers, that which
    assumes that summer SST is related to the annual deviations in L1.5 and those
    in recruitment about mean recruitment leads to the lowest value for AIC (Model
    2; Table 2)."


    Methodology: "The first set of projections involved exploring structural uncertainty
    in the climate coupling by projecting the four assessment model configurations...
    for the six environmental scenarios... The third set of projections was focused
    on quantifying process and parameter uncertainty by sampling the posterior distributions
    for the 24 future states."


    Highlights: "Summer SST is the ''best'' environmental variable for both of these
    population parameters... Summer SST remains the ''best'' environmental variable
    when environmental variables drive both mean recruitment and L1.5."

