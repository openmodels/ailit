  5: "`\n\"The analyses consider models related to possible environmental drivers\
    \ of the population parameters for Pacific cod...\" \n\u2022L1.5 is related to\
    \ sea surface temperature (SST) in summer (June-August)... \n\"The deviations\
    \ in recruitment about mean recruitment... are related to sea surface or bottom\
    \ temperature during the spawning season of March and April (spring...)\"\n\"\
    The deviations in recruitment about mean recruitment are related to ocean pH (surface\
    \ and bottom) during the spawning season (March and April) in the southern Bering\
    \ Sea.\"\n\"This environmental model is considered because Hurst et al. (2019)\
    \ found some sensitivity of behaviour, growth, and lipid composition of larval\
    \ Pacific cod to CO2 levels.\"\n"
  6: "Source material here: \"The management advice for EBS Pacific cod is based on\
    \ the North Pacific Fishery Management Council Tier 3 40\u20135 harvest control\
    \ rule (North Pacific Fishery Management Council NPFMC, 2021). This harvest control\
    \ rule relates to achieving sustainable yields but does not explicitly account\
    \ for the economic factors associated with fishing that can be related to optimum\
    \ yield (OY) under the USA Magnuson-Stevens Act (16 U.S.C. \xA71802). We thus\
    \ considered a different harvest control rule that aimed to set the target fishing\
    \ mortality to that predicted to maximize net revenue (NR), the difference between\
    \ equilibrium revenue at a given price, and the variable costs of fishing, based\
    \ on the current productivity of the stock, that is FMEY: NR (F) = \u0303pC (F)\
    \ - \u03C7F where \u0303p is the price of 1 tonne of cod, C(F) is the equilibrium\
    \ catch... and \u03C7 is calculated... multiplied by variable costs per day of\
    \ fishing \u0303c. The unit price for cod caught in the eastern Bering Sea, \u0303\
    p =1,563, represents the real (2019) wholesale value of finished production per\
    \ tonne of retained catch ($/t). The daily cost parameter for cod caught in the\
    \ eastern Bering Sea, \u0303c = 66,543 real (2019) dollars per day ($/d), represents\
    \ the combined expenses of fishing. The specifications of the four assessment\
    \ model configurations... The parameters indicated by asterisks are fixed at their\
    \ MLEs for the Bayesian analyses.\""
