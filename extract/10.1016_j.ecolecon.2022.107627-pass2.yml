    number of heat wave days using a minimum heat wave duration of 9 days, and (ii)
    an interaction between the number of dry spell days and the 12-month SPEI. Estimates
    use sequential g-estimation to account for the potential influence of dry spells
    on the 12-month SPEI in a given year. Numbers in parentheses indicate 95% confidence
    intervals estimated via panel bootstrap; Table A7: Variation in dry spell effects
    with national SPEI using sequential g -estimation; SPEI = -2 -0.0017** (-0.0032,
    -0.0004); ***: p<0.01, **: p<0.05, *: p<0.1.'
