sourcematerial:
  2: Dry spells often co-occur with drought and heat waves...provide evidence that
    4-5 week dry spells that occur during the hottest part of the year depress growth
    in crop production. The effects of these extreme events are modified by existing
    drought, aridity, and by heat waves. After accounting for productivity and crop
    choice, losses in yields from dry spells are concentrated in areas that are not
    equipped for irrigation...Our findings, focused on punctuated events and multiple
    stressors, complement prior investigations focused solely on longer-term phenomena
    and those that study extreme heat or precipitation in isolation.
  4: 'Source material here.

    timescales may not only confound the relationship between dry spells and agricultural
    outcomes, but may also modify the effects of dry spells themselves. Further, dry
    spells may contribute to droughts, making it important to distinguish between
    direct and indirect effects of dry spells. Because combined dry and hot weather
    is growing more common, understanding potential interactions between dry spells
    and temperature stress is equally critical. Extreme heat can be detrimental to
    crops, whether occurring for a single day or several in a row during a heat wave.
    These effects and those of dry spells are very likely interdependent; plant ecophysiology
    suggests that dry spells could be more damaging when dry and hot weather coincide,
    and heat waves may increase plant susceptibility to later water stress. Despite
    growing evidence of these biophysical mechanisms, we know less about how short-term
    exposure to joint water and heat stress ultimately influences agricultural output.
    A multi-crop, global analysis of how dry spells interact with temperature stress
    aims to reflect realized impacts on farms around the world.

    '
  5: 'Source material here.

    extreme heat and longer-term water stress to influence crop production would complement
    this growing body of knowledge. Within this context, we ask whether dry spells
    impact growth in aggregate crop production across the globe and how those effects
    are modified by co-occurring stressors. Based on prior work mentioned above, we
    hypothesize that dry spells should lower growth in crop production, with effects
    that are larger in magnitude when dry spells co-occur with heat waves, drought,
    or aridity. To address our question, we analyze a panel dataset spanning 1979-2016
    that relates aggregate crop production in a country and year to exposure to dry
    spells and several related environmental stressors. Our statistical approach isolates
    country-specific dry spell exposure anomalies, and the range of specifications
    we estimate allow us to probe relationships between and joint effects of water
    and heat stress across timescales. Further, because irrigation can partly decouple
    rainfall from water availability, in secondary analyses we investigate whether
    irrigation availability moderates the effects of dry spells on growth in crop
    production. The remainder of this paper is organized as follows : Section 2 describes
    the dataset and suite of statistical analyses we conduct, Section 3 presents results,
    and Section 4 discusses those findings and their implications. 2. Methodology
    2.1 Dataset construction We analyze a country-by-year dataset relating year-to-year
    growth (%/year) in the FAO Crop Production Index (FAO CPI) to dry spell exposure
    and additional covariates, which we construct from gridded data (see below). The
    FAO CPI is a price-weighted sum of the quantities

    '
  6: 'yaml

    Evaluation overview: "of crops produced in a country and year that are not used
    as seed and feed, expressed as an index relative to the country-specific average
    of that quantity over 2014-2016...This lack of price response allows us to isolate
    the production consequences of dry spells, which are the focus of our analysis."

    Drivers of Risk: "Our focal dry spell variable, which we refer to as the number
    of dry spell days, is the number of abnormally dry days (defined below) in a country
    and year that were preceded by at least j-1 others."

    Methodology: "To operationalize our dry spell variable, we begin with daily precipitation
    totals from the Climate Prediction Center (CPC) spanning 1979 to 2016...We consider
    alternatives of j=7, 14, 21, 28, and 35 days."

    '
  7: 'Source material here.

    longitude cells.3 For each grid cell and day, we classify the day as abnormally
    dry if precipitation falls at or below a cell- and day-specific threshold defining
    an abnormally dry day. We define that threshold to be 1.5 standard deviations
    below mean precipitation for a grid cell and day of year (or zero if that threshold
    would be negative), with both the mean and standard deviation calculated using
    a 31-day window centered around the focal day across all years in the dataset.4
    We then identify sequences of abnormally dry days and count how many abnormally
    dry days are preceded by at least j-1 others; we call such days dry spell days.
    In our main analysis, we only consider abnormally dry days that occur in the historically
    hottest 90 days in each grid cell in order to facilitate examination of dry spells
    and heat waves. In supplementary analyses, we consider two variations on this
    approach. First, we consider abnormally dry days occurring during the hottest
    120 days or at any time of the year. Second, we construct weighted counts of dry
    spell days, where we weight dry spell days based on the fraction of the grid cell
    devoted to cropland in the month when the dry spell day occurs using the MIRCA2000
    dataset (Portmann et al., 2010). Doing so brings our cell-specific dry spell variable
    closer to quantifying crop exposure to dry spell days. The output of these steps
    is a count of dry spell days per grid cell. Since we require a single value per
    country, we construct a spatially weighted average of these cell-specific dry
    spell variables. In our main analyses, we weight by the percent of area in each
    cell that was devoted to cropland in 2000 according to EARTHSTAT (Ramankutty et
    al., 2008). In supplementary analyses focused on irrigation, we weight by the
    percent of area in each cell devoted to cereal crops.

    '
  8: "Both our heat wave variable and our metric capturing simultaneous dry spell\
    \ and heat wave exposure are defined analogously. For heat waves, we use daily\
    \ temperature maxima from the CPC and count heat wave days: abnormally hot days\
    \ preceded by at least k-1 others, focusing on k=3, 6, 9, and 12. Abnormally hot\
    \ days are those in which temperature is at least 1.5 standard deviations above\
    \ the mean for a grid cell and day of year. For joint exposure to dry spells and\
    \ heat waves, we count days that are both abnormally dry and abnormally hot and\
