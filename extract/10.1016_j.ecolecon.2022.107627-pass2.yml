  23: 'Source material: Zhu et al., 2022) suggest that heat and water stress likely
    have non-additive effects on crops. While we too document interactive effects
    (Table 4), we only find strong evidence of non-additivity when dry spells and
    heat waves occur in the same year, and not necessarily simultaneously. It could
    be that the rarity of the shorter-term events we study (heat waves and dry spells)
    combined with the country scale of our analysis leave us with insufficient statistical
    power to detect effects of true joint exposure. Alternatively, our dry spell and
    heat wave variables may already embed some of the joint exposure effects we seek
    to identify. After all, heat waves often occur during dry periods, and we focus
    on dry spells occurring during the hottest part of the year. Weaker results from
    models in which we consider dry spells in other parts of the year (Appendix Table
    A5) suggest that heat may play an important role in our main dry spell estimates
    (Table 3), leaving little scope for detection of distinct joint exposure effects.
    As with any analysis, ours has limitations, many of which present opportunities
    for future work. The globally gridded temperature and precipitation data on which
    our analysis is based is only an approximation to conditions experienced on individual
    farms. Temperatures may vary from the air to the surface to the soil, and microclimates
    may result in substantial heterogeneity in both temperature and precipitation
    on farms within a grid cell. Increasing density and reliability of weather stations
    as well as improvements in remote sensing alternatives may enable refined estimates
    in the future. In particular, we hope those improvements would enable reliable
    estimates of the impacts of dry spells in Sub-Saharan Africa, where our dataset
    shows clear shortcomings. Analyzing aggregate crop production on an annual, national
    scale also presents challenges. Crops likely have different tolerance for both
    temperature and precipitation extremes, while our analysis enforces a single threshold
    and minimum duration for each stressor.'
