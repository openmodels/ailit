Methodology:
  2: Global panel of daily precipitation and temperature from 1979 to 2016.
  4: Multi-crop, global analysis (unspecified details)
  5: The dataset is a country-by-year panel that examines year-to-year growth in the
    FAO Crop Production Index (CPI) against dry spell exposure.
  6: Dry spell variable is operationalized using daily precipitation data from the
    Climate Prediction Center spanning 1979 to 2016, considering dry spells of 7,
    14, 21, 28, and 35 days.
  7: Supplementary analyses consider weighting by cropland in the month of occurrence
    or at any time of the year, and by percent area devoted to cereal crops.
  8: Defines heat waves as abnormally hot days preceded by at least k-1 others. Abnormally
    hot days are those where temperature is at least 1.5 standard deviations above
    the mean. Joint exposure is defined as days that are both abnormally dry and hot,
    preceded by j-1 abnormally dry days and k-1 abnormally hot days. Uses spatial
    averaging for dry spells, heat waves, and joint exposure. Investigates effect
    heterogeneity by splitting cells into two groups based on drought (SPEI), aridity
    index, and irrigation, then computing dry spell, heat wave, and joint exposure
    variables separately for each group.
  9: Uses a 12-month SPEI and also considers SPEI averaged over months prior to the
    hottest 90 days. Aridity is calculated as the ratio of precipitation and average
    annual potential evapotranspiration using the Penman-Monteith Equation. National
    weighted exposure is constructed using the same spatial weighting scheme as for
    the dry spell variable.
  10: The analysis compares exposures to environmental stressors across 59 more arid
    and 59 less arid countries, excluding Sub-Saharan Africa due to data concerns.
  11: Fixed effects models are used to relate growth in the FAO CPI to dry spell exposure,
    considering different subsamples by aridity and SPEI.
  12: Uses a linear regression model with country and year fixed effects to analyze
    the impact on growth rate of FAO CPI, adjusting for temperature, precipitation,
    and time trends, with distributed lag models to assess transitory vs. persistent
    effects.
  13: "The study uses regression models (Equations 2, 3, and 4) with fixed effects\
    \ (\U0001D707\U0001D456, \U0001D719\U0001D461) to analyze the impact of dry spells\
    \ and heat waves, considering interactions with drought and aridity. The analysis\
    \ includes within-country differences in drought and aridity. An alternative approach\
    \ using country-level data is mentioned and performed in the Appendix."
  15: Ordinary least squares with country and year fixed effects, clustered standard
