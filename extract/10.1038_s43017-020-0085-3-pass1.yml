    \ fire, drought and climate change...Elevated atmospheric CO2 con- centrations\
    \ increase carbon assimilation...drought could negate any effects of carbon fertilization...Another\
    \ key area of uncertainty in future fire-regime predictions is the range of variability\
    \ and frequency of extreme fire events...\nQuantitative material: Fig. 5 | Conversion\
    \ of infrequently burned forest to a frequently burned, treeless state. Conversion\
    \ is associated with declines in carbon storage (sequestered C, top panel) and\
    \ annual global fire- induced emissions (emission rate, middle panel), assuming\
    \ that both above- ground and below- ground carbon are altered.\nMethodology:\
    \ Thus, regional-scale models are likely to have higher veracity than global models\
    \ because biophysical and socio- ecological controls...Fire, and its interactions,\
    \ remains poorly represented Earth- system models, and their performance struggles\
    \ with non- analogue, rapidly changing future climates...\nHighlights: In theory,\
    \ interactions between climate change, vegetation and fire could drive a runaway\
    \ feedback process in which entire landscapes are transformed...Ecosystems currently\
    \ located on the fringe of a bioclimatic niche (such as lower tree line forests)\
    \ and vegetation persisting in climate refugia or fire refugia are particularly\
    \ vulnerable to transformative fire regimes...The paucity of projections is partially\
    \ due to the substantial challenges and uncertainties inherent in coupling interdisciplinary\
    \ models...\nMore Notes: Thus, predicting \u2018black swan\u2019 extreme fire\
    \ events \u2014 which, by definition, have no historical precedent...Clearly,\
    \ capturing such specific combinations of climate events and human agency to predict\
    \ such an extreme event is beyond the capacities of current predictive models\
    \ of future fire activity...Fire regimes in the Anthropocene require adaptation\
    \ and effective management to promote environmental sustainability and reduce\
    \ greenhouse gas emissions...\n"
  10: " \n\"Adaptation and management strategies from densely forested areas to the\
    \ wildland\u2013urban interface, and at the building scale (inset). The intensity\
    \ of fire management changes proportionally with human population and economic\
    \ assets, with strategies ranging from allowing fires to burn in wilderness areas\
    \ to intensive management on the wildland\u2013urban interface.\"\n\"Adaptation\
    \ and management approaches must be tailored to specific environmental and socio-ecological\
    \ settings (Fig. 6), which we consider in flammable landscapes and the wildland\u2013\
    urban interface (WUI).\"\n\"Fuel management can involve broad-scale prescribed\
    \ burning, as it is a cost-effective method to reduce fuel loads and, hence, reduce\
    \ the risk of uncontrollable fires in frequently burned vegetation, such as savannah\
    \ and dry Pinus and Eucalyptus forests.\"\n\"To be effective, however, this approach\
    \ requires frequent burning because fuels rapidly reaccumulate.\"\n"
  11: "yaml\nEvaluation overview: Smoke from large-scale prescribed burning programmes\
    \ can cause death and hospitalization, which could potentially exceed the human-health\
    \ impact of the wildfires that these managed fires are intended to mitigate151.\
    \ The vulnerability of housing on the WUI reflects a constellation of socio-ecological\
    \ factors that amplifies fire risk, property damage, and loss of life 141, 164\u2013\
    166.\nDrivers of Risk: However, prescribed burning has significant constraints,\
    \ particularly owing to the potential for shrinking safe weather windows due to\
    \ climate change 148, and the effectiveness of prescribed burning in altering\
    \ wildfire behaviour sharply declines under extreme fire weather149. The WUI is\
    \ rapidly expanding as a result of growing urban populations 23, 141, 159, 160,\
    \ particularly in southern Australia, Europe, western North America, and southern\
    \ African fire-management agencies to disseminate advice and warning of fire danger\
    \ 176.\nQuantitative material: For example, smoke from the 2019\u20132020 Australian\
    \ bushfires is thought to have caused 417 deaths (much greater than the 33 recorded\
    \ direct fatalities) and several thousand hospitalizations for cardiovascular\
    \ and respiratory problems163. The US fire season in 2018 exceeded USD $3 billion\
    \ in suppression costs, largely owing to the reliance on fleets of specialized\
    \ aircraft 159, 161, 162 (Fig. 3c). China is a world leader in this approach,\
    \ establishing 364,000 km of green firebreaks to manage landscape fire 169.\n\
    Methodology: Nevertheless, fire-management approaches that combine traditional\
