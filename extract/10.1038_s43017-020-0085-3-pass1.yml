Drivers of Risk:
  2: Changes impacting fire activities include anthropogenic climate change altering
    precipitation patterns and increasing temperatures, leading to more frequent extreme
    fire events.
  4: Warmer, drier summers and earlier spring snowmelt are identified as drivers of
    increased area burned by vegetation fires.
  5: Changes in fire weather index, emissions, and ignition sources (lightning, unknown)
    are drivers impacting fire activity.
  6: "Anthropogenic climate change (increasing temperatures, lightning activity),\
    \ vegetation changes (agriculture, invasive species), deforestation, drought cycles\
    \ (El Ni\xF1o\u2013Southern Oscillation)"
  7: Climate-driven changes impacting fire-related outcomes through temperature increases
    and shifts in fire weather.
  8: Increased drought stress, altered biogeography, and reduced C storage are linked
    to changing fire regimes.
  9: Climate change (leading to changes in temperature and precipitation patterns),
    anthropogenic factors (ignitions, suppression, land management, deforestation),
    vegetation-fire feedbacks, elevated atmospheric CO2 concentrations, drought, extreme
    fire events.
  10: "Flammable landscapes and the wildland\u2013urban interface (WUI) are significant\
    \ sources of wildfire risk."
  11: Climate change shrinking safe weather windows for prescribed burning, extreme
    fire weather, growing urban populations expanding the WUI.
  12: Combined effects of changing climate and land-use patterns, past fire and logging
    disturbances.
  13: The paper discusses anthropogenic fire regimes and their interactions with various
    Earth systems like the hydrosphere and geosphere, potentially affecting water
    supply and quality.
  15: Climate change impacts on fire intensity and potential for large fires in the
    U.S.
  16: Discusses climate-driven risks to forests and fire risk due to climate change
    and land-use changes in Amazon forests.
Evaluation overview:
  2: The page provides an overview of the impacts of vegetation fires, including potential
    economic disasters, loss of property and life, and human health issues.
  3: The paper evaluates the impacts of vegetation fires on the biosphere, geosphere,
    hydrosphere, cryosphere, and atmosphere.
  4: The page provides an overview of fire activity, the increase in burned area,
    and fire regimes in the western USA and Canadian boreal forests.
  5: Vegetation-fire activity is evaluated based on metrics such as burned area, fire
    emissions, and fire weather index.
  6: Fire activity (frequency, severity, fire season length, burned area, fire occurrence)
  7: The page summarizes the projected changes in fire indicators such as fire activity,
    burned area, fire weather, and fire impacts.
  8: No relevant information
  9: Discusses changes in fire regimes, vegetation type, carbon storage, and fire-induced
    emissions.
  10: No relevant information.
  11: The human-health impact of smoke pollution (death and hospitalization). Vulnerability
    of housing on the WUI.
  12: The paper discusses the increasing flammability of landscapes and the risk of
    economically and ecologically destructive fires.
  13: This page does not provide an overview of specific outcomes being evaluated,
    such as mortality or productivity loss.
  15: No relevant information
  16: The paper discusses the implications of climate change and wildfire risks, potentially
    impacting mortality and environmental damage.
Highlights:
  2: Vegetation fires contribute significantly to global greenhouse gas emissions,
    and changing fire regimes can turn carbon sinks into carbon sources, accelerating
    climate change.
  3: Global fire activity shows regional-scale variation, climate change and anthropogenic
    drivers are important. Extreme fire events are characterized by anomalous fire
    behavior, high energy releases, rapid spread, large flame heights, massive emissions,
    prolonged duration, enormous geographical scale, and adverse effects. Area burned
    globally declined by around 25% between 1998 and 2015.
  4: There has been a significant increase in fire frequency and extent in the western
    USA and Canadian boreal forests, primarily due to regional temperature rises and
    drier conditions.
  5: Shows increasing vegetation fire activity in several regions, including Western
    USA, Canada, New South Wales, and others, evidenced by increased burned area,
    fire emissions, and prolonged fire weather conditions.
  6: Frequency or severity of fire weather, fire-season length, burned area and fire
    occurrence are increasing globally with future climate change; some regions may
    see no change or decreases in fire activity, but no papers support a widespread
    decrease in fire risk; extreme fire weather is projected to increase for much
    of the globe; increasing atmospheric temperatures will lead to more lightning
    activity.
  7: Projected increases in fire weather and fire activity across multiple global
    regions, particularly in mid- to high latitudes.
  8: Future fire activity is projected to increase in some regions but may see mixed
    changes in the western USA due to climate, vegetation, and land-use heterogeneity.
  9: Climate change, vegetation, and fire interactions can drive runaway feedback
    processes that transform landscapes. Ecosystems on the fringe of bioclimatic niches
    (e.g., lower treeline forests) and refugia are particularly vulnerable. Landscape-wide
    conversions from forests to grasslands/shrublands are possible. There is significant
    uncertainty in predicting extreme fire events.
  10: Different fire management strategies are applied according to the density of
    human population and economic assets, with strategies ranging from wilderness
    fire allowances to intensive management at the WUI.
  11: Prescribed burning has significant constraints, particularly due to climate
    change. Smoke from large-scale prescribed burning programmes can cause death and
    hospitalization, which could potentially exceed the human-health impact of the
    wildfires that these managed fires are intended to mitigate. Fire management should
    also draw on indigenous and local knowledge about fire regimes. The vulnerability
    of housing on the WUI reflects a constellation of socio-ecological factors that
    amplifies fire risk, property damage and loss of life.
  12: Large-scale reforestation must incorporate effective fire management; pyro-tornadoes
    and extreme fire phenomena are increasingly observed.
  13: Stresses the critical need for research and investment in sustainable and effective
    fire management strategies to adapt to changing fire regimes due to climate and
    human activity.
  15: Climate change increases the potential for very large fires and impacts fire
    suppression in the contiguous U.S., and wildfires could increase due to climate
    change by mid-21st century.
  16: Climate change increases the future fire risk, and there is a need for strategies
    to manage fire regimes and mitigate risks.
Methodology:
  4: Regional analyses of fire activity involve sedimentary charcoal records, natural
    archives, and official fire records.
  5: Analysis is performed using ERA5 reanalysis data for FWI, historical reconstructions,
    Monitoring Trends in Burn Severity (MTBS) data, and MODIS data for burned area.
    Data are bias-corrected using periods of overlap.
  6: Review of papers published since the Fifth Assessment Report of the Intergovernmental
    Panel on Climate Change, augmented with additional key papers; process-based coupled
    Earth System Models; statistical approaches (environmental-niche modelling).
  8: Discusses process-based mechanistic modeling that incorporates climate, CO2,
    vegetation, fire, land-use change, and ignitions.
  9: Discusses modeling future fire regimes, focusing on landscape-scale and regional
    models being better than global models. Mentions issues in coupling interdisciplinary
    models to predict extreme fire events.
  10: Adaptation and management strategies vary based on local conditions, with a
    focus on managing fire in densely forested areas and the WUI.
  11: Management approaches that combine traditional ecological and local fire knowledge
    with mainstream fire-management approaches and technologies must be developed
    to adapt to changing environmental conditions.
  13: Mentions the need for transdisciplinary research and methods to improve understanding
    and modeling of fire interactions across Earth systems and societies.
  15: Analysis based on climate change impacts and fire management studies.
  16: The analysis appears to draw upon a review of existing literature regarding
    climate change impacts and wildfire risks.
More Notes:
  5: The analysis covers different time periods for different regions, reflecting
    data availability and the specific characteristics of fire regimes in those areas.
  6: Simple attribution of fire increases to climate change is challenging because
    there are specific anthropogenic factors that shape regional fire activity.
  8: Highlights uncertainty in projections due to complex feedbacks in the Earth system
    and difficulty in representing human behavior in models.
  9: The paper emphasizes the difficulty of predicting extreme fire events due to
    the complexity of interactions between climate, human activities, and fire dynamics.
    Adaptation and effective management are needed to promote environmental sustainability
    and reduce greenhouse gas emissions.
  10: Fuel management, such as prescribed burning, is used to reduce wildfire risk
    but must be applied frequently to be effective.
  13: Emphasizes the lack of consistent data on the economic costs of wildfires, noting
    the importance of creating a global database for such information.
  15: No relevant information
  16: The paper emphasizes the importance of integrating climate action with sustainable
    development goals.
Quantitative material:
  2: Fire-related carbon emissions are about 2.2 Pg per year, accounting for approximately
    22% of global carbon emissions, with 65% from savannah and grassland fires and
    10% from temperate and boreal forest fires.
  4: Between 1972 and 2018, there was a 405% increase in total burned area in California;
    also, annual average burned area in Canada has almost tripled since 1959, from
    1 million ha to 2.8 million ha.
  5: "Presents linear trends in number of days exceeding a Fire Weather Index threshold,\
    \ annual fire emissions (TgC year\u207B\xB9), burned area (km\xB2), and fire-suppression\
    \ costs (billion US $)."
  6: Models show up to a 58% increase in global burned area by the end of the twenty-first
    century under stronger warming scenarios.
  7: Contains quantitative information on projected percent changes in fire weather
    index days exceeding the 95th percentile for various regions.
  8: "Projected 40-100% increase in burned area with 1.5\xB0C to 3\xB0C warming in\
    \ Mediterranean Europe."
  9: The figure shows a schematic of carbon storage (sequestered C) and fire-induced
    emissions changing with conversion of forests to grassland/shrubland.
  10: No relevant information.
  11: "The 2019\u20132020 Australian bushfires are thought to have caused 417 deaths\
    \ (much greater than the 33 recorded direct fatalities) and several thousand hospitalizations\
    \ for cardiovascular and respiratory problems. The US fire season in 2018 exceeded\
    \ USD $3 billion in suppression costs. China establishing 364,000 km of green\
    \ fire breaks."
  12: Estimated 37.7% reduction in non-CO2 emissions from 28,000 km2 of Eucalyptus
    savannah due to managed fire regimes.
  13: No specific quantitative information is provided on this page.
  15: No relevant information
  16: No specific quantitative data is presented in the text on this page.
