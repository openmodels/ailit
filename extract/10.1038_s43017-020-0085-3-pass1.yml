  12: 'Source material: The flammability of many landscapes is increasing because
    of the combined effects of changing climate and land-use patterns. [...] application
    of this approach to 28,000 km2 of Eucalyptus savannah in Arnhem Land has been
    estimated to have reduced accountable non-CO2 emissions by 37.7%. [...] The increased
    risk of economically and ecologically destructive fires can be reduced using planning
    and urban-design principles, combined with fuel management and fire management.
    [...] Reducing boreal forest fire requires a multipronged and international approach
    [...] There are increasing reports from frontline firefighters that the behavior
    of many wildfires lies well outside their experience and exhibit unusual characteristics,
    such as pyro-tornadoes. [...] Large-scale tree planting and natural-forest restoration
    has recently been suggested as pivotal to drawing down atmospheric CO2 [...] large
    expanses of young trees are particularly vulnerable to high-severity fires.'
  13: 'yaml

    Evaluation overview: "This page does not provide an overview of specific outcomes
    being evaluated, such as mortality or productivity loss. The text focuses on research
    needs and challenges rather than quantifying specific outcomes."

    Drivers of Risk: "The paper discusses anthropogenic fire regimes and their interactions
    with various Earth systems like the hydrosphere and geosphere, potentially affecting
    water supply and quality. ''As anthropogenic fire regimes are influenced by human
    activity... municipal and agricultural water supplies are often dependent on the
    deliver y of water of a consistent quality and quantity from fire-impacted vegetated
    watersheds207, so fire management of that vegetation must also consider potential
    outcomes on projected water storage and deliver y208.''"

    Quantitative material: "No specific quantitative information is provided on this
    page. The text primarily discusses the need for data collection and modeling improvements
    rather than presenting quantitative findings."

    Methodology: "Mentions the need for transdisciplinary research and methods to
    improve understanding and modeling of fire interactions across Earth systems and
    societies. ''Transdisciplinar y pyrogeographic research remains difficult to implement
    because of numerous intellectual and institutional barriers...A critical challenge
    for wildfire adaptation is the capacity to undertake transdisciplinary, applied
    research that is on the landscape scale and co- designed and funded by affected
    communities...''"

    Highlights: "Stresses the critical need for research and investment in sustainable
    and effective fire management strategies to adapt to changing fire regimes due
    to climate and human activity. ''Achieving sustainable stewardship of fire regimes
    requires acknowledging that fire is an inherent feature of the Earth system...Climate
    change and numerous other anthro - pogenic effects on fire regimes present a new,
    urgent challenge for effective human adaptation to vegetation fire.''"

    More Notes: "Emphasizes the lack of consistent data on the economic costs of wildfires,
    noting the importance of creating a global database for such information. ''A
    global database (similar in form to the Global Fire Atlas) on the economic costs
    of wildfire management and economics losses from fire disasters is required 55,
    as, presently, these data are only available for a few regions.''"

