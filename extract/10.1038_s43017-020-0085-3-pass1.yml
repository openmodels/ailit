  3: "Source material here.\nEvaluation overview: \"Fires have numerous direct and\
    \ indirect affects that impact the biosphere (including vegetation cover), geosphere\
    \ (including soil erosion), hydrosphere (including fluvial sediment and nutrient\
    \ transport), cryosphere (including soot fallout and changed albedo) and atmosphere\
    \ (including smoke pollution).\"\nDrivers of Risk: \"Reduced solar radiation\"\
    , \"Air pollution/increased aerosols\", \"Black carbon deposition\", \"Topography\
    \ controls severity\", \"Localized rainfall\", \"Erosion changes topography\"\
    , \"Altered soil colour/albedo\", \"Heat fracture\", \"Permafrost thaw/loss\"\
    , \"Pyric herbivory\", \"Indigenous burning\", \"Nitrogen deposition\", \"Phosphorus\
    \ deposition\", \"Sediment deposition\", \"Post-\uFB01re flooding\", \"Climate\
    \ change and anthropogenic drivers\" are mentioned as factors influencing fire\
    \ risk.\nQuantitative material: \"From 1979 to 2013, an average increase of 18.7%\
    \ in fire-weather-season length has been documented across global burnable lands.\"\
    \ \"Between 1998 and 2015, the area burned by vegetation fires globally declined\
    \ by around 25%, from over 500 Mha to less than 400 Mha annually.\"\nHighlights:\
    \ \"Despite these observational limitations, there is an emerging picture of changes\
    \ in global fire activity, which emphasizes the importance of regional-scale variation,\
    \ climate change and anthropogenic drivers.\" \"Extreme fire events are characterized\
    \ by some combination of the following: anomalous fire behaviour, involving extremely\
    \ high energy releases, very rapid rate of spread, very large flame heights; massive\
    \ emission of smoke and greenhouse gas pollution; prolonged duration of fires,\
    \ enormous geographical scale of burned areas, or both; fires causing unusually\
    \ adverse biological, atmospheric or geomorphological effects.\" \"MODIS burned\
    \ area record indicates that, between 1998 and 2015, the area burned by vegetation\
    \ fires globally declined by around 25%.\"\n"
  4: "  \n\"Between 1972 and 2018, there has been a 405% increase in total burned\
    \ area in California, and decadal burned area from 2003 to 2012 increased by 1,200%\
    \ in forests of the western USA, compared with 1973\u20131982.\"  \n\"Warmer,\
    \ drier summers and earlier spring snowmelt have increased the area burned from\
    \ vegetation fires, despite sustained investment in industrialized firefighting.\"\
    \  \n\"Annual average burned area in Canada has almost tripled since 1959 from\
    \ 1 million ha to 2.8 million ha.\"  \n\"Fire activity and regimes are controlled\
    \ by the interaction of biomass and climate, as well as human and natural ignitions.\"\
    \  \n\"Sedimentary charcoal records in the western USA show that, over the last\
    \ 3,000 years, fire activity was primarily controlled by temperature and drought.\"\
    \n"
  5: "Source material here. Linear trends in the number of days per year where the\
    \ Fire Weather Index (FWI) from ERA5 exceeded the local 95th percentile over the\
    \ period 1979\u20132019. Burned area in contiguous Western USA, 103 \xB0W to the\
    \ Pacific (1916\u20132018) and non-inflation-adjusted US federal fire-suppression\
    \ costs. Burned area based on historical reconstruction from 1916 to 1984, Monitoring\
    \ Trends in Burn Severity (MTBS) data for 1984\u20132017, and MODIS for 2018.\
    \ Data were bias corrected using periods of overlap to the reference MTBS record\
    \ (1984\u20132003 for reconstruction and MTBS, and 2001\u20132017 for MODIS).\
    \ Burned area in Canada (1959\u20132018). Burned area in New South Wales, Australia\
    \ (1979\u20131980 through 2019\u20132020 fire seasons) and number of pyrocumulonimbus\
    \ (PyroCb) in Australia. Burned area in Tasmania, Australia (1979\u20131980 through\
    \ 2018\u20132019 fire seasons) resulting from all ignitions (unknown and lightning).\
    \ Burned area in central Chile (1984\u20131985 through 2016\u20132017 fire seasons).\
    \ Fire emissions in Indonesia (1960\u20132019). Fire emissions from Brazilian\
    \ Amazonia (1960\u20132019). Shows increasing vegetation fire activity in several\
    \ regions, including Western USA, Canada, New South Wales, and others, evidenced\
    \ by increased burned area, fire emissions, and prolonged fire weather conditions.\
    \ Changes in fire weather index, emissions, and ignition sources (lightning, unknown)\
    \ are drivers impacting fire activity. Presents linear trends in number of days\
    \ exceeding a Fire Weather Index threshold, annual fire emissions (TgC year\u207B\
    \xB9), burned area (km\xB2), and fire-suppression costs (billion US $). The analysis\
    \ covers different time periods for different regions, reflecting data availability\
    \ and the specific characteristics of fire regimes in those areas."
  6: "Overall, there is general agreement amongst the studies that the frequency or\
    \ severity of fire weather, fire-season length, burned area and fire occurrence\
    \ are increasing globally with future climate change. However, the effect of climate\
    \ change is becoming apparent in the increasing numbers of extreme fire events.\
    \ These cases highlight the importance of factors other than (or in addition to)\
    \ climate change, such as vegetation changes related to agriculture or invasive\
    \ species, in fire regime change. Tropical deforestation fires is the strong interannual\
    \ variation in step with drought cycles, such as those caused by the El Ni\xF1\
    o\u2013Southern Oscillation. The models generally showed increases in global burned\
    \ area, albeit with substantial uncertainty, with some models showing a 58% increase\
    \ by the end of the twenty-first century under stronger warming scenarios. TAble\
    \ 1 summarizes the rapid-response review on projected changes in fire activity\
    \ by geographical region based on papers published since the Fifth Assessment\
    \ Report of the Intergovernmental Panel on Climate Change 103, augmented with\
    \ additional key papers discussed here. Approaches have been used to model future\
    \ changes in global fire activity ranging from the use of process-based coupled\
    \ Earth System Models to statistical approaches. A global analysis using 17 global\
    \ climate models suggests there will be a large increase in the occurrence of\
    \ extreme fire weather for much of the globe. There is also evidence that increasing\
    \ atmospheric temperatures will lead to more lightning activity, further adding\
    \ to fire activity in ignition-limited landscapes. Yet, simple attribution of\
    \ these increases to climate change is challenging because there are specific\
    \ factors, including anthropogenic ones, that shape regional fire activity."
