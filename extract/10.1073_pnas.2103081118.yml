Drivers of Risk:
  1: Climate tipping points like thawing permafrost, ice sheet disintegration, and
    changes in atmospheric circulation; rising temperatures and sea levels
  2: Tipping points related to carbon-cycle and temperature feedbacks (e.g., permafrost
    thaw, ocean methane hydrates), ice sheet disintegration (Greenland and West Antarctic
    Ice Sheet), and changes in large-scale circulation (Atlantic Meridional Overturning
    Circulation, Indian Summer Monsoon).
  3: Tipping points like permafrost carbon, ocean methane hydrates, SAF, Amazon forest,
    Greenland Ice Sheet (GIS), West Antarctic Ice Sheet (WAIS), AMOC, and Indian summer
    monsoon impact the SCC.
  4: Climate tipping points are identified as significant drivers impacting future
    economic risk and consumption per capita distributions.
  5: Tipping points, including disintegration of the Greenland and West Antarctic
    Ice Sheets (GIS and WAIS), permafrost carbon feedback, dissociation of ocean methane
    hydrates, and slowdown of the Atlantic Meridional Overturning Circulation (AMOC).
  6: Global mean surface temperature (GMST) and sea level rise (SLR) without tipping
    points are drivers of risk. The additional warming and SLR due to tipping points
    also drive risk, impacting damages.
  7: Specific tipping points include AMOC slowdown, SAF weakening, and Indian Summer
    Monsoon variability.
  8: The drivers of risk include permafrost carbon feedback, dissociation of ocean
    methane hydrates, Arctic sea ice loss, dieback of the Amazon rainforest, disintegration
    of the GIS and WAIS, and variability of the Indian summer monsoon. The slowdown
    of the AMOC also modulates the relationship between global and national mean surface
    temperatures.
  9: tipping points in the climate system
Evaluation overview:
  1: Economic impacts of climate tipping points
  2: The economic cost of emitting one additional ton of CO2, measured by the Social
    Cost of Carbon (SCC). Also considers impacts of climate change, such as those
    on ecosystems and human health.
  3: The page provides an overview of the increase in the Social Cost of Carbon (SCC)
    due to various climate tipping points.
  4: The page provides an overview of economic impacts of climate tipping points,
    focusing on changes in Social Cost of Carbon (SCC) and consumption per capita
    forecasts.
  5: Welfare changes normalized to global mean consumption per capita and the social
    cost of carbon (SCC).
  6: The paper models the economic impacts of climate tipping points, focusing on
    changes in world consumption per capita due to these tipping points.
  7: The analysis considers economic impacts of climate tipping points, focusing on
    social cost of carbon (SCC) and economic costs.
  8: This paper evaluates welfare and GDP per capita.
  9: Economic impacts of tipping points in the climate system
Highlights:
  1: Climate tipping points increase global economic risk and increase economic losses
    almost everywhere; the tipping points with the largest effects are dissociation
    of ocean methane hydrates and thawing permafrost
  2: Tipping points significantly increase the expected SCC, particularly dissociation
    of ocean methane hydrates and the permafrost carbon feedback. Some tipping points
    like AMOC slowdown and SAF reduce the expected SCC. The increase in SCC due to
    ice sheet disintegration may be underestimated.
  3: The SCC increases significantly due to combined tipping points, with positive
    and negative interactions affecting the overall increase.
  4: Tipping points are predicted to increase the SCC in almost all countries and
    significantly increase future consumption risk.
  5: "Disintegration of the GIS and WAIS primarily affects countries with low-lying\
    \ coastal populations. The permafrost carbon feedback, dissociation of ocean methane\
    \ hydrates, and the weakening SAF primarily affect temperature. AMOC slowdown\
    \ bene\uFB01ts Europe, while parts of central Asia see increased climate damages.\
    \ Tipping points increase the temperature response to GHG emissions over most\
    \ of the range of temperatures attained."
  6: The paper quantifies the additional warming, SLR, and damages resulting from
    climate tipping points under different emissions scenarios. The scatter plots
    visualize the relationship between these variables and the impact of tipping points.
  7: Economic costs from tipping points are spread relatively evenly and do not significantly
    affect inequality.
  8: The paper incorporates eight tipping modules into its model, corresponding to
    specific climate tipping points, and analyzes their impact on welfare and the
    SCC. Key tipping points include permafrost thaw, methane hydrate destabilization,
    Arctic sea ice loss, Amazon rainforest dieback, and ice sheet disintegration.
    It also includes analysis of Indian monsoon variability and AMOC changes.
Methodology:
  1: Meta-analytic integrated assessment model (IAM) with a modular structure; calibrated
    on detailed econometric evidence and simulation modeling; model includes national-level
    climate damages from rising temperatures and sea levels for 180 countries
  3: The analysis involves 10,000 Monte Carlo draws with a 0.1% trim, considering
    RCP4.5-SSP2 emissions, GDP/population growth, and various models for tipping points.
  4: The analysis uses a meta-analytic Integrated Assessment Model (IAM) with Monte
    Carlo simulations to estimate SCC and assess economic impacts of climate tipping
    points.
  5: Monte Carlo sample size is 10,000 with 0.1% trimmed. The analysis uses RCP4.5-SSP2
    emissions and GDP/population growth scenarios and considers the effect of eight
    tipping points on warming and sea level rise (SLR).
  6: The analysis uses 1,000 Monte Carlo simulations under RCP4.5 and RCP8.5 emissions
    scenarios, sampled on a decadal interval from 2020 to 2200. Nonlinear fits are
    used for temperature and damages, while a linear fit is used for SLR. The specification
    comprises Hope and Schaefer PCF, Whiteman et al. beta OMH, and IPSL AMOC hosing.
  7: Variability in the Indian Summer Monsoon is modeled to assess its impact on India's
    GDP.
  8: The SCC is estimated by running the model twice, once with and once without an
    additional pulse of emissions in 2020, and scaling the difference in welfare between
    the two runs per ton of CO2 emissions. Each run involves a Monte Carlo simulation
    with a sample size of 10,000.
More Notes:
  1: The method of structural meta-analysis means that future modeling of climate
    tipping points can be integrated with relative ease, and a reduced-form tipping
    points damage function is presented that could be incorporated in other IAMs.
  2: The literature synthesized may not cover all tipping points and misses possible
    impact channels and interactions, indicating a probable underestimate of the SCC
    increase.
  5: A reduced-form climate tipping point damage function is presented, which could
    be integrated in other Integrated Assessment Models (IAMs).
  6: The damage from tipping points is expressed as the change in world consumption
    per capita relative to a scenario without climate damages.
  7: Uncertainties exist in climate impacts and interactions between tipping points,
    as well as in broader climatic and economic assumptions.
  8: Model data are available on GitHub (https://github.com/openmodels/META-2021).
    The study uses an isoelastic utility function with an elasticity of marginal utility
    of consumption of 1.5 and a utilitarian social welfare functional with a constant
    pure rate of time preference of 1% in the main specification.
  9: This page is from a paper titled 'Economic impacts of tipping points in the climate
    system'. The listed references might be relevant for more details on specific
    aspects of the impacts.
Quantitative material:
  1: "Climate tipping points increase the social cost of carbon (SCC) by \u223C25%\
    \ in our main specification; an \u223C10% chance of climate tipping points more\
    \ than doubling the SCC"
  2: Combining all eight tipping points increases the expected SCC by 24.5%. Median
    percentage increase in the SCC from all tipping points combined is 18.8%, the
    75th percentile is 22.5%, and the 99.5th percentile is 132.2%. Dissociation of
    ocean methane hydrates increases the expected SCC by 13.1%, and the permafrost
    carbon feedback by 8.4%. Disintegration of the WAIS increases the expected SCC
    by 2.9%. Disintegration of the GIS increases the expected SCC by 1.8%. Variability
    of the Indian summer monsoon increases the expected SCC by 1.3%. Dieback of the
    Amazon rainforest leads to a modest 0.1% increase in the expected SCC. Slowdown
    of the AMOC reduces the expected SCC by 1.4%. The Surface Albedo Feedback (SAF)
    reduces the expected SCC by 1.7%.
  3: Quantitative information includes increases in the expected SCC, such as 24.5%
    for all TPs and 28.9% for all costly TPs.
  4: The analysis estimates a 42.8% expected increase in SCC due to climate tipping
    points, with detailed percentiles provided for SCC changes.
  5: "Tipping points reduce global consumption per capita by around 1% upon 3\u25E6\
    C warming and by around 1.4% upon 6\u25E6C warming, based on a second-order polynomial\
    \ \uFB01t of the data. In some runs, damages exceed 4%."
  6: The paper provides quantitative relationships between GMST change without tipping
    points and additional warming due to tipping points (y = 0.23x - 0.03x^2), SLR
    without tipping points and additional SLR due to tipping points (y = 0.61x + ),
    and GMST change without tipping points and additional tipping point changes (y
    = 0.48x - 0.04x^2).
  8: The paper estimates the Social Cost of Carbon (SCC).
sourcematerial:
  1: "  \nClimate scientists have long emphasized the importance of climate tipping\
    \ points like thawing permafrost, ice sheet disintegration, and changes in atmospheric\
    \ circulation. ... The model includes national-level climate damages from rising\
    \ temperatures and sea levels for 180 countries, calibrated on detailed econometric\
    \ evidence and simulation modeling. ... Collectively, climate tipping points increase\
    \ the social cost of carbon (SCC) by \u223C25% in our main specification. The\
    \ distribution is positively skewed, however. We estimate an\u223C10% chance of\
    \ climate tipping points more than doubling the SCC. Accordingly, climate tipping\
    \ points increase global economic risk. A spatial analysis shows that they increase\
    \ economic losses almost everywhere. The tipping points with the largest effects\
    \ are dissociation of ocean methane hydrates and thawing permafrost. Most of our\
    \ numbers are probable underestimates, given that some tipping points, tipping\
    \ point interactions, and impact channels have not been covered in the literature\
    \ so far; however, our method of structural meta-analysis means that future modeling\
    \ of climate tipping points can be integrated with relative ease, and we present\
    \ a reduced-form tipping points damage function that could be incorporated in\
    \ other IAMs.\n"
