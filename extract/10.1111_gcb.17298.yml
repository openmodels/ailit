  15: 'Source material here.

    The paper discusses the effect of crop rotation diversity (CRD) on grain yields,
    stating: "We expanded on this by explicitly considering climatic conditions and
    CRD levels... Yields increased over time and more so at the CRD that maximized
    yields."

    Regarding drivers of risk: "Increasing CRD can provide grain yield benefits comparable
    with improved climatic conditions, for example, decreasing temperature and length
    and temperature of dry spells for both small grains and maize, and increasing
    precipitation for maize."

    For quantitative material: "The maximum attainable yield via diversification under
    detrimental conditions exceeded the average yield of monocultures under favourable
    conditions."

    On methodology: "FIGURE 4 Model-predicted yield difference from baseline yield
    anomaly... model predictions within the first quartile, the long-term average
    and the third quartile of CDD."

    Highlighting findings: "These results confirm that species-diverse and functionally
    rich rotations enhance grain yields under all growing conditions."

