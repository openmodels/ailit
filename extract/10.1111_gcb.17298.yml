  3: "Source material here.\nEvaluation overview: \"Diversified crop rotations have\
    \ been suggested to reduce grain yield losses from the adverse climatic conditions\
    \ increasingly common under climate change.\"\nDrivers of Risk: \"Species-diverse\
    \ and functionally rich rotations more than compensated yield losses from anomalous\
    \ warm conditions, long and warm dry spells, as well as from anomalous wet (for\
    \ small grains) or dry (for maize) conditions.\"\nQuantitative material: \"For\
    \ instance, the maize yield benefits of adding three crop species to monocultures\
    \ under detrimental climatic conditions exceeded the average yield of monocultures\
    \ by up to 553\u2009kg/ha under non-detrimental climatic conditions.\"\nHighlights:\
    \ \"Species-diverse and functionally rich rotations more than compensated yield\
    \ losses\" and \"Increased crop functional richness improved yields under high\
    \ temperature, irrespective of precipitation.\"\n"
  4: "  \nClimate change negatively affects crop production... Both high temperature\
    \ and low precipitation can independently or simultaneously lower crop productivity...\
    \ High precipitation can reduce crop yields through waterlogging and lodging...\
    \ Crop yields can thus be negatively affected by both dry spells and excessive\
    \ precipitation... Even short periods of extreme conditions or co-occurring adverse\
    \ but not extreme growing conditions, like heat and water stress, can severely\
    \ reduce yields...\n\nConversely, yield benefits peaked at between two and four\
    \ crop species in the rotation, depending on climatic conditions and crop, and\
    \ declined at higher species diversity...\n\n...yield losses due to climate change...\
    \ increasing crop diversity by including more crops and/or cover crops in the\
    \ rotation could increase yields in several crops...\n\n...crop species diversity\
    \ could be adjusted to maximize yield benefits... Diversifying rotations with\
    \ functionally distinct crops is an adaptation of cropping systems to global warming\
    \ and changes in precipitation.\n\n...higher crop rotation diversity (CRD) reduced\
    \ maize yield losses in unfavourable years in several North American long-term\
    \ experiments...\n"
