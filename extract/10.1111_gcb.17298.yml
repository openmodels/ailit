  6: 'Source material here.

    We explored how yield anomalies of winter and spring small grains and maize vary
    with CRD, and pairs of climatic indices via two sets of mixed-effect models.


    To summarize the growing conditions, we considered two sets of climatic indices:
    (i) growing season climatic indices, represented by average maximum daily temperature
    and cumulated precipitation during each growing season, and (ii) intra-seasonal
    climatic indices, quantifying potentially short but detrimental conditions expected
    to become more common.


    We differentiated t and year to separate yield variations explained by technological
    improvements over time and legacy effects of rotations since their implementation,
    captured by t, from variations due to LTE-specific effects of sampling year on
    yield, captured by year.


    Temperature and precipitation can have compound effects on yield outcome. We therefore
    included the interaction between the climatic indices, X1: X2 (T:P or TDD:CDD),
    as a fixed effect. Further, we considered a quadratic dependence on the temperature
    index, X1^2, because several plant processes have an intermediate thermal optimum.

    '
  7: 'yaml

    Evaluation overview: "With fixed climatic conditions, yield anomalies (and hence
    yields) of small grains generally increased from low to intermediate species diversity
    (D; Equation 1) and declined at higher levels of diversity, while for maize yields
    increased up to the maximum species diversity present in the dataset (Figures
    1 and 2)."

    Drivers of Risk: "The relationship between CRD and grain yield anomalies depended
    on climatic conditions and their interaction, and on the indicator crop (Tables
    1 and 2)."

    Methodology: "The mixed-effects statistical models were fitted using the ''lme4''
    package version 1.1-26...in R version 4.1.0. The R statements are reported in
    the Supplementary Information...The model assumptions were checked by visual interpretation
    of the residual plots using the ''DHARMa'' package in R."

    Highlights: "With fixed climatic conditions, yield anomalies (and hence yields)
    of small grains generally increased from low to intermediate species diversity
    (D; Equation 1) and declined at higher levels of diversity, while for maize yields
    increased up to the maximum species diversity present in the dataset."

    '
