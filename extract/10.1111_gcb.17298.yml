    irrespective of precipitation."

    Highlights: "For winter small grains, the yield-maximizing species diversity decreased
    in warmer and drier conditions. Spring small grains showed the opposite pattern."

    Highlights: "For maize, the species diversity that maximized yields did not change
    across climatic conditions and coincided with the highest level included in the
    data."

    Highlights: "Warming reduced yields in all crops irrespective of CRD and precipitation."

