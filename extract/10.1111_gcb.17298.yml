    \ in the description: \"Model-predicted yield difference from baseline yield anomaly\
    \ for (a) spring small grains, (b) winter small grains and (c) maize, as a function\
    \ of species diversity, growing season average daily maximum temperature anomalies\
    \ (T) and cumulated precipitation anomalies (P) based on fitted Equation (2).\"\
    \n\nDrivers of Risk: This is captured through the study's consideration of climate\
    \ impacts, as indicated by: \"as a function of species diversity, growing season\
    \ average daily maximum temperature anomalies (T) and cumulated precipitation\
    \ anomalies (P)\" and \"the anomalies of the highest number of consecutive dry\
    \ days (CDD) and average temperatures during that period (TDD).\"\n\nQuantitative\
    \ material: The specific quantitative yields and benefits noted are: \"the largest\
    \ possible benefit of species diversity... reduced to 393 kg/ha... and 722 kg/ha\
    \ for spring and winter small grains respectively\" and \"for maize, the maximum\
    \ yield benefits attainable via species diversity... were 1601 kg/ha.\"\n\nMethodology:\
    \ The methodological approach is outlined as: \"Model-predicted yield difference...\
    \ based on fitted Equation (2)\" and the use of different quartiles for analysis\
    \ of climatic conditions: \"within the first quartile, the long-term average and\
    \ the third quartiles of CDD.\"\n\nHighlights: The key outcomes presented include:\
    \ \"the maximum yield benefits attainable via species diversity were 508 kg/ha...\
    \ and 973 kg/ha... for spring and winter small grains respectively... for maize,\
    \ the maximum yield benefits attainable... were 1601 kg/ha.\"\n"
  13: 'Source material here.

    The maximum yield benefits attainable via species diversity required higher species
    diversity to compensate monoculture yield losses...anomalies in CDD and TDD, in
    directions dependent on the indicator crop (Figure 2; Table 2). Maximum yield
    benefits attainable via species diversity for spring small grains increased with
    TDD...For winter small grains, the maximum yield benefits attainable via species
    diversity decreased as TDD increased under average and high CDD...For maize, the
    difference between monoculture yields and the maximum yield benefit attainable
    via species diversity decreased as CDD and TDD increased...Warming caused a yield
    reduction in monocultures that could be balanced by relatively small increases
    in species diversity (Figure 1)...Co-occurring warming and negative precipitation
    anomalies led to even higher yield losses than warming alone for maize...

