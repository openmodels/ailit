Methodology:
  3: The analysis involves quantifying the effects of climatic conditions on small
    grain and maize yields under different crop rotational diversities across 32 long-term
    field experiments in Europe and North America.
  4: The study collected meteorological and grain yield data of spring and winter
    small grains, and maize, to evaluate the effects of increasing Crop Rotation Diversity
    (CRD) on crop yields in relation to climatic conditions and over time.
  5: The analysis uses a dataset of 32 long-term experiments consisting of 21 in Europe
    and 11 in North America, totaling 941 site-year combinations, focusing on rain-fed
    crops and diverse crop rotations. It employs yield anomalies calculated as mean-centered
    yield data and considers both species diversity and functional richness as metrics
    for CRD.
  6: Mixed-effect models are used to analyze the relationship between yield anomalies
    and climatic indices, considering crop rotation diversity (CRD) as either a continuous
    variable (species diversity D) or a categorical variable (functional richness
    FR). The models account for temporal and spatial dependencies using random factors
    (year and 'Group' nested within LTE).
  7: Mixed-effects statistical models were used to analyze the data. The models considered
    fixed climatic conditions, species diversity, and climatic anomalies. Robustness
    was tested by removing one site at a time and repeating the analyses.
