  12: 'Source material here.

    Methodology: "We...examine the timing of local building activity with hurricane
    events. We do this through a within-metropolitan analysis of historical building
    patterns and hurricane trends. We construct this analysis by dividing coastal
    MSAs in two parts: the area inside and the area outside of the 6-foot SLR zone.
    We then stack these locations and their ZTRAX attributes based on 5-year time
    steps from 1900 to 2015 (24 observations per location within a metropolitan area).
    Using these data, we estimate a series of two-way fixed effect panel regression
    models."

    Drivers of Risk: "Absolute exposure increased across the entire study period...with
    the South Atlantic surpassing both the Northeast and Pacific in total number of
    structures in the SLR zone. Further, hurricane impacted areas are denser and more
    developed than unaffected areas."

    Highlights: "The South Atlantic region has the highest percentage of total MSA
    structures in the SLR zone...areas at highest risk of hurricanes, the South Atlantic,
    have higher exposure across both measures, showing that hurricane affected areas
    may be more developed than unaffected areas."

    Quantitative material: "Since about 1970, the percentage of total MSA structures
    in the SLR has dropped in the South Atlantic because of increasing addition of
    structures in inland areas."

