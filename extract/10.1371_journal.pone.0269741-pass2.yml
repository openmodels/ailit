Drivers of Risk:
  1: Sea level rise (SLR) and hurricanes are identified as key risks impacting coastal
    communities.
  2: Exposure to sea level rise and hurricanes are identified as key risks for coastal
    areas.
  3: Sea level rise (3 feet / 0.91 meters and 6 feet / 1.83 meters) and urban expansion
    into coastal areas.
  5: Exposure to sea level rise and hurricanes is a significant factor.
  6: Exposure to sea level rise and hurricanes
  7: Exposure to sea level rise and hurricanes is considered as a risk factor.
  8: Exposure to sea-level rise and hurricanes impacts urban areas.
  9: Exposure to sea level rise and hurricanes.
  10: Exposure to sea level rise and hurricanes.
  11: Development in coastal zones, particularly in SLR zones, is a driver of increased
    exposure to environmental changes like sea level rise.
  12: Shocks impacting outcomes include sea level rise and hurricanes, with the South
    Atlantic affected by both and showing higher exposure and development.
  13: Sea level rise and hurricanes (measured by total historical hits and wind speed)
    are the drivers of risk.
  14: Exposure to sea-level rise and hurricanes is impacting the built environment.
  15: Development along U.S. coastlines, expansion and densification of coastal settlements,
    sea level rise
  16: Exposure to sea level rise and hurricanes is a significant driver of risk for
    coastal communities, especially in the Sunbelt and Northeast regions.
  17: Older structures may indicate elevated vulnerability due to lack of adaptation
    in building codes and construction practices.
  18: Exposure to sea level rise and hurricanes due to denser and more intensely developed
    coastal built environments and increasing development along coastlines.
  19: Exposure to sea level rise and hurricanes is under analysis.
Evaluation overview:
  1: The paper evaluates the exposure to sea level rise (SLR) and hurricanes along
    the U.S. coastline through historical development.
  2: No specific outcome such as mortality or productivity loss is evaluated, but
    potential disruptive flooding impacts on $1.07 trillion worth of coastal wetlands
    by 2100 are estimated.
  3: Exposure to sea level rise and hurricanes impacting the built environment.
  6: No relevant information
  7: No relevant information
  9: No relevant information
  10: No relevant information
  11: The page evaluates exposure of U.S. metropolitan statistical areas (MSAs) to
    sea level rise (SLR) zones and discusses patterns in the built environment.
  13: Evaluates the impact of sea level rise (SLR) and hurricanes on built-up land,
    structure density, and total structures.
  15: Exposure to sea level rise and hurricanes
  16: The page does not provide a specific overview of the outcome being evaluated
    but discusses the exposure of structures to coastal hazards and hurricane impacts.
  18: The paper evaluates the exposure of coastal communities in the U.S. to natural
    hazards such as sea level rise and hurricanes, focusing on the built environment
    and development trends.
Highlights:
  1: SLR zones in the U.S. developed faster and continue to have higher structure
    density than non-coastal and inland areas; adaptation policies may become more
    important than protecting undeveloped land due to building saturation effects.
  2: The study highlights the localized nature of risk, with coastal areas being at
    greater risk and emphasizes the importance of local adaptation strategies to reduce
    coastal risk.
  3: Analysis examines land transitions that inform the measurement of exposure of
    the built environment over the past century.
  6: These hurricanes can be an early indicator (through storm surge) of future SLR
    conditions.
  7: Developed area and housing stock dramatically increased along the U.S. coastline,
    especially between 1950 and 2000. Coastal areas in SLR zones have higher structure
    density and have densified and expanded at higher rates than inland coastal areas.
    Coastal expansion slowed significantly after 1980, with densification becoming
    more prominent.
  8: Urbanization and higher construction density increase the exposure of areas to
    sea-level rise.
  9: SLR zones and coastal MSAs are denser, more developed, and have consistently
    higher rates of expansion than MSAs across the country as a whole.
  10: The Pacific U.S. had high rates of growth after 1950, converging to the already
    developed Northeast in built environment characteristics. The West South Central
    remains lower in density of structures and percent of SLR zone developed.
  11: Key findings show high exposure of built environments in areas like Florida
    and the South Atlantic, with significant trends of increased number of structures
    in SLR zones over time.
  12: The South Atlantic has the highest percentage of structures in sea level rise
    zones, and hurricane-impacted areas are more developed and dense than unaffected
    areas.
  13: MSAs affected by hurricanes are denser and more developed than those not affected.
    The study focuses on whether SLR zones experienced higher growth in building intensity
    following hurricanes. The authors find that the cumulative hurricane events relate
    to the structure density, and this relationship is consistent across different
    ways of measuring storms.
  14: Hurricane activity is associated with significantly higher rates of building
    in terms of proportion built area and structure density; however, fewer structures
    are found in SLR zones among hurricane-hit locations.
  15: Coastal building tends to expand with low-density construction early in development
    but has transitioned to densification from roughly 1980 on; increasing uniformity
    in exposure conditions across regions; coastal communities have similar exposure
    regardless of regional likelihood of hazard
  16: Development in hurricane-prone areas is increasing despite awareness of the
    inherent risks; post-hurricane development sees denser and larger structures being
    built in affected areas.
  17: Older coastal areas, particularly in the Northeast, were developed when housing
    codes and building techniques were less advanced or adaptive.
  18: Coastal communities have high exposure due to dense development, highlighting
    the need for adaptive building codes and development policies. The paper notes
    exposure growth has slowed due to saturation, and emphasizes the importance of
    protecting undeveloped coastal areas.
Methodology:
  1: The analysis leverages historical settlement data from the Historical Settlement
    Data Compilation for the U.S. (HISDAC-US) to examine building patterns within
    SLR zones over more than a century.
  2: "The analysis involves the use of gridded historical settlement data from Zillow\u2019\
    s ZTRAX database and overlays it with sea level rise zones from NOAA to evaluate\
    \ historical development patterns and exposure to hazards."
  3: "Investigates trends of urban expansion into coastal areas at risk of sea level\
    \ rise compared to inland areas. Uses measures including built-up property density,\
    \ coastal land development (expansion), and the age of buildings across sea level\
    \ rise zones. Utilizes Zillow\u2019s ZTRAX dataset and historical settlement layers\
    \ in HISDAC-US."
  4: The dataset is resampled to a 50-meter spatial resolution using a nearest neighbor
    technique for better integration with sea level rise zones.
  5: Uses Metropolitan and Micropolitan Statistical Areas (MSAs) to analyze settlement
    patterns in SLR zones.
  6: Defines Metropolitan Statistical Areas (MSAs) and Micropolitan Statistical Areas.  Identifies
    MSAs affected by hurricanes by intersecting MSAs with hurricane eye landfalls
    (within 20km). Excludes protected areas and wetlands from sea level rise zones.
    Calculates zonal statistics (number of structures, built interior area, built
    grid cells) for each SLR zone and MSA in 5-year increments from 1900 to 2015.
  7: The study analyzes the built-up proportion of areas over time, measuring expansion
    (increase in built grid cells) and densification (ratio of added structures to
    added developed grid cells) using high-quality settlement data. The analysis focuses
    on the continental U.S. coastline and uses grid cell data (250m resolution). The
    reported results primarily cover the period from 1950 to 2015.
  9: The study uses the BUPL data layer from HISDAC and U.S. government datasets to
    measure urban expansion and structure density in coastal areas from 1900 to 2000,
    focusing on 10-year increments.
  10: Trends in built environment characteristics are analyzed based on structure
    density, densification, proportion of the SLR zone developed, and expansion, calculated
    over 10-year time increments. Coastal MSAs are aggregated to Census Divisions.
  11: Analysis compares the number and percentage of structures in SLR zones across
    time and regions, focusing on absolute and relative exposure metrics.
  12: The analysis is performed using two-way fixed effect panel regression models,
    dividing coastal MSAs into areas inside and outside the 6-foot SLR zone, with
    data from 1900 to 2015.
  13: Six regressions were performed using the share of built-up land, structure density,
    and total structures as dependent variables and wind speed or total historical
    hits as independent variables. The analysis covers MSA zones within and out of
    SLR areas with varying hurricane impacts. Data from 2015 is used, and the models
    include a census division fixed effect. The HURDAT2 database is used for storm
    landfalls from 1900 to 2015.
  14: "The analysis uses a panel regression on cumulative storm hits from 1900\u2013\
    2015 across Metropolitan Statistical Areas (MSAs) with coastal areas."
  15: Analysis of coastal settlement development patterns, distinguishing between
    expansion and densification
  16: The paper appears to assess the exposure of built environments to natural hazards
    by examining the development density and construction trends in hurricane-prone
    areas.
  17: The analysis examines the age of structures and uses HISDAC-US data layers to
    determine built environment characteristics at fine spatial and temporal resolution.
  19: Used Zillow Transaction and Assessment Dataset (ZTRAX) with exclusions based
    on data quality; analysis covers period from 1900-2015 and includes MSA-Year fixed
    effects.
More Notes:
  2: The paper aims to link coastal conditions, specifically hurricane activity, to
    long-term spatial development of urban areas, and provides a century-long analysis
    of urbanization in coastal U.S. regions.
  3: Figure 1 illustrates sea level rise zones across the conterminous US and by Census
    Division, along with the spatial distribution of the year the first structure
    was built.
  6: Uses HURDAT2 hurricane database from 1900-2015.
  7: The study defines a '6-foot SLR zone' and finds that 35% of the land in this
    zone was developed in 2015, with a median construction year of 1975. Regional
    differences in development patterns (expansion vs. densification) are also mentioned,
    with older coastal areas in the Northeastern U.S. having developed earlier and
    exhibiting high density and developed area throughout the 20th century.
  9: The paper distinguishes between expansion (aerial growth of developed land) and
    structure density (addition of more or bigger structures to already developed
    areas) as two major drivers of urban development. Fort Meyers, FL is an example
    of high expansion within SLR zones, while Los Angeles, CA is an example of high
    growth of structure density within SLR zones.
  10: The paper analyzes how development patterns have changed over time in coastal
    areas potentially exposed to sea level rise, but does not project future changes.
    The analysis is based on historical data up to 2000. The figure caption states
    that 'Colors denote coastal MSAs aggregated to Census Divisions.' Which means
    that conclusions cannot necessarily be applied at the MSA or local level.
  13: The coefficient estimates are relative to a SLR zone with no storms. Low severity
    storms are defined as those with average max wind speeds < 100 mph, and high severity
    storms are those > 100 mph. Severe storm hits are defined as 5 or more storms
    since 1900, and less severe are 1-4 hits since 1900.
  15: Densification leads to increased exposure through added structures and square
    footage within SLR zones, but also possibly decreasing vulnerability through modern
    building codes; SLR zones were developed more intensely and faster than other
    urban areas.
  16: The effectiveness of building restrictions in disaster-prone areas varies, affecting
    future planning and adaptation efforts to climate change.
  18: The analysis stresses the importance of understanding interactions between the
    built environment and social systems for determining risk, and suggests future
    planning should focus on more sustainable coastal development.
Quantitative material:
  1: The paper notes that U.S. property at risk of coastal hazards and SLR is valued
    at over a trillion U.S. dollars.
  3: Analysis covers sea level rise zones (3 feet / 0.91 meters and 6 feet / 1.83
    meters).
  6: Proportion of grid cells developed (Built Area Proportion (BAP) = Ap/AT; where
    Ap is the number of built grid cells and AT is the total number of grid cells
    in the unit of analysis)
  7: 446% increase in structures and a 220% increase in developed land area along
    the U.S. coastline between 1950 and 2000.
  9: Graph c shows the percentage of grid cells developed within MSAs and SLR zones
    increasing from 1900 to 2000, with the flood zone 6 feet SLR increasing to nearly
    90% developed. Graph d shows the expansion of developed areas, peaking between
    1950 and 1970 and then decreasing.
  10: The graphs depict trends in structure density, densification, proportion of
    SLR zone developed, and expansion from 1900 to 2000 across different U.S. Census
    Divisions aggregated from coastal MSAs.
  11: The page provides quantitative measures of both the absolute and relative exposure
    of structures within SLR zones, depicted through maps and graphs.
  12: Since about 1970, the percentage of total MSA structures in the SLR zone has
    dropped in the South Atlantic.
  13: Coefficient estimates from regressions are presented, showing the relative impact
    of SLR zones with different storm severities compared to a SLR zone with no storms.
  14: Each one-unit increase in the accumulation of storms over time is associated
    with a 2.3 percentage point increase in share of built-up land.
  15: From roughly 1980 on, coastal building transitioned to densification
