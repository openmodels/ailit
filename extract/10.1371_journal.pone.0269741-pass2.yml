  18: 'Source material here.

    Exposure of coastal communities has led to staggering losses and damages from
    natural hazards, yet these coastal areas continue to grow in size and number of
    structures. We show that coastal communities have denser and more intensely developed
    built environments than more inland areas, leading to high exposure, regardless
    of probability of natural hazards. These findings have specific implications for
    the implementation of adaptive building codes and coastal development policies.
    The rate of exposure growth has slowed across all divisions, possibly due to saturation
    of coastal areas and decreasing availability of developable land. Our findings
    imply that protection of developable land, particularly in places that have not
    experienced expansion (i.e., the Gulf Coast), is critical to minimize exposure
    across our coastlines. In addition, these results reinforce the crucial need for
    adaptation in already saturated and dense coastal communities. Our research points
    to saturation along many parts of our coastline, where expansion has decreased
    and structure addition remained steady, thus resulting in high-density built environments.
    We are creating an environment where the number of people and the cost of natural
    disasters continue to grow within constrained areas where biophysical exposure
    is increasing. Through capitalizing on the spatial and temporal resolution of
    this new settlement data compilation, we begin to understand the evolution of
    exposure along the coast, how communities build and where they build, and how
    this knowledge can be used for planning ahead for more sustainable and resilient
    coastal communities.

