  4: "Using the ZTRAX database, our team created new settlement data products covering\
    \ the time period 1810\u20132010 (i.e., the HISDAC-US) and carried out an extensive\
    \ uncertainty study... These gridded data layers were created using data integration\
    \ methods at 250-meter spatial resolution and 5-year temporal resolution. In order\
    \ to better use the gridded datasets in combination with sea level rise zones,\
    \ we resample the data to smaller grid cell sizes. Using the 250-meter original\
    \ resolution, we resample the grid cells to a spatial resolution of 50 meters\
    \ with a nearest neighbor technique."
