    the country, continuously growing the exposure to natural hazards in these zones,
    Our analysis reveals two different ways how coastal settlements typically develop:
    expansion (the lateral growth of developed areas) and densification (the addition
    of structures to already developed areas), We anticipate increasing uniformity
    in exposure conditions over the years to come, Convergence creates coastal communities
    with similar exposure, a finding that shows the dense development of the United
    States coastlines regardless of regional likelihood of hazard, Regardless of the
    cause of contemporary growing densification along coastlines, this trend leads
    to two relevant outcomes: 1) Increasing exposure through added structures and
