  2: "Source material here. Evaluation overview: \"AllNationalWetlandsInventory database\
    \ worth approximately $1.07 trillion dollars, are at risk of disruptive flooding\
    \ by 2100.\" Drivers of Risk: \"Exposure to sea levelriseand hurricanes.\" Methodology:\
    \ \"Using gridded historical settlement data layers derived from Zillow\u2019\
    s ZTRAX database [35], the Historical Settlement Data Compilation of the United\
    \ States [22, 23], we analyze built-up property records across coastal regions\
    \ of the U.S. from pre-1900 to 2015. Overlaying this data with sea level rise\
    \ zones from the National Oceanic and Atmospheric Administration [33, 36].\" Highlights:\
    \ \"they are also highly localized and result in some coastal areas being at much\
    \ greater risk than others [12]. Reducing coastal risk to natural hazards requires\
    \ advanced local adaptation strategies.\" More Notes: \"we contribute to both\
    \ fronts by establishing a robust link between coastal conditions, specifically\
    \ hurricane activity, and the long-term spatial development of urban areas. Our\
    \ analysis sets to stage for further ambitious long-term work that contends with\
    \ the historical forces that have shaped our cities, and specifically incorporate\
    \ the role of human-hazard interactions as a central feature of that research.\""
