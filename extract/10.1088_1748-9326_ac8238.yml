  6: "Environ. Res. Lett.17(2022)084025 BBCael etal Figure3.Top: median (squares)\
    \ and interquartile range (errorbars) of damages projected under the socioeconomic\
    \ pathways SSP4-6.0 and SSP3-7.0 for the temperature-dependent feedback model\
    \ and the multi-model ensemble, in trillions of 2019USD. Damages are calculated\
    \ over the period 2020\u20132300, with the default 4.255% discount rate and Weitzman\
    \ damage function [25] from [10]. Bottom: u (i.e. ratio of structural vs. parametric\
    \ uncertainty) for economic damages using different damage functions (shape),\
    \ shared socioeconomic pathways (color), and discount rates (un/filled points),\
    \ versus the corresponding ratio of median multi-model versus \u03BBT model damage\
    \ estimates. u>1 in all cases, as shown by the dashed black line for u= 1. These\
    \ results demonstrate the importance of characterising structural uncertainty\
    \ for physical and economic projections of climate. While we have focused on arguably\
    \ the simplest representation of climate physics, even this single-equation energy-balance\
    \ model is used in a variety of applications for which structural uncertainty\
    \ has real physical and economic consequences."
