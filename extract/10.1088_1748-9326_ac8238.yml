Drivers of Risk:
  2: Increase in greenhouse gas concentrations resulting in radiative forcing
  3: Radiative forcing F resulting from greenhouse gases, aerosols, ozone precursors,
    land use change, and other anthropogenic influences
  5: The temperature-dependent feedback model suggests a dampening nonlinearity in
    the climate system, potentially underestimating future warming. Radiative forcing
    and climate feedbacks are also drivers.
  6: Drivers of risk include temperature changes and associated climate feedback mechanisms
    under different socioeconomic pathways.
Evaluation overview:
  2: No relevant information
  3: No relevant information
  5: The paper evaluates temperature projections and economic damages resulting from
    climate change.
  6: The paper focuses on economic damages projected under various socioeconomic pathways
    and how structural uncertainty impacts these projections.
  7: Structural uncertainty in reduced complexity climate models is evaluated for
    its impact on physical and socioeconomic projections.
Highlights:
  2: Structural uncertainty in climate projections is significant and dominates over
    parametric uncertainty and overall non-socioeconomic uncertainty in economic projections
    of climate change damages
  3: Physical structural uncertainty is substantial in climate economics calculations
    and climate projections, potentially underestimating reported uncertainties.
  4: The analysis delineates parametric uncertainty for each model structure and structural
    uncertainty over all predicted outcomes.
  5: "Structural uncertainty is dominant for temperature projections under SSP4-6.0\
    \ and SSP3-7.0. The sign of \u03BBT is well-constrained as positive, indicating\
    \ a dampening nonlinearity. Historical T observations are consistent with high-radiative\
    \ forcing and high-feedback parameter sets."
  6: Structural uncertainty is a significant factor in climate and economic projections,
    even with simple climate models.
  7: Structural uncertainty plays an important role in reduced complexity climate
    models' total uncertainty, which must be accounted for in physical projections,
    especially socioeconomic projections.
Methodology:
  2: Bayesian approach to quantify structural uncertainty using energy-balance model
    representations
  3: Quantifies structural uncertainty in a simple Energy Balance Model (EBM) using
    a computational Bayesian approach involving model specification, prior distributions,
    likelihood computations based on observations, and posterior distribution sampling
    for probabilistic projections.
  4: The importance of structural uncertainty is quantified by comparing the interquartile
    range of multi-model projections to those of the preferred model structure.
  5: The paper uses a statistical model to analyze climate feedbacks and projects
    future temperatures and economic damages. It considers different model structures
    and quantifies structural uncertainty. The analysis uses shared socioeconomic
    pathways (SSP4-6.0 and SSP3-7.0).
  6: The analysis uses a single-equation energy-balance model to evaluate structural
    uncertainty and its impact on economic and physical climate projections.
  7: The study considers single nonlinear terms at a time, exploring the sensitivity
    of model selection to changes in paleo-periods considered. It uses publicly available
    data from cited sources and the code is available on GitHub.
More Notes:
  2: Structural uncertainty is crucial to consider in integrated assessment models
    and climate projections
  3: The approach is generalisable to climate models with additional complexity.
  7: The authors suggest considering mixtures or combinations of nonlinearities, or
    a nonlinear term that accounts for the pattern effect.
