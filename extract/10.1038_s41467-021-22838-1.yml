Drivers of Risk:
  1: Sea level rise driven by anthropogenic climate change is identified as a driver
    of increased economic damages during Hurricane Sandy.
  2: The paper identifies anthropogenic sea level rise (ASLR) as a factor that contributed
    to multi-billions of dollars of damage from Hurricane Sandy.
  4: Shocks impacting outcomes include anthropogenic sea-level rise leading to increased
    flooding risks.
  5: The primary driver of risk evaluated in this paper is the anthropogenic sea level
    rise (ASLR) which contributes to flooding and flooding depth.
  6: Sea level rise associated with anthropogenic climate change, particularly focusing
    on attributable sea level rise (ASLR) components like Greenland ice sheet mass
    loss, Antarctic ice sheet mass loss, glacier melt, thermal expansion, and ocean
    dynamics.
  7: This study assesses flood damages during Hurricane Sandy under various sea-level-rise
    conditions, perturbing mean sea level in hydrodynamic flood simulations.
Evaluation overview:
  1: The study evaluates the economic damages from Hurricane Sandy attributable to
    sea level rise caused by anthropogenic climate change.
  2: The paper investigates the financial damages from Hurricane Sandy attributable
    to climate-related anthropogenic sea level rise (ASLR).
  4: The page provides an overview of damages due to flooding attributed to anthropogenic
    sea-level rise (ASLR) in the tri-state area during Hurricane Sandy.
  5: The paper evaluates the exposure and damage caused by anthropogenic sea level
    rise (ASLR) to people, housing units, and property in the tri-state area and New
    York City.
  6: Simulates coastal water levels, flooding, and damage in New York, New Jersey,
    and Connecticut, both as they occurred during Hurricane Sandy and as they would
    have occurred across a range of lower sea levels.
  7: Property damage is calculated using the standard HAZUS-MH method from the U.S.
    Federal Emergency Management Agency, based on depth-damage curves denoting vulnerability
    of assets to different flood depths.
Highlights:
  1: "The study finds that climate-mediated sea level rise contributed significantly\
    \ to the damages and expanded the flood area, affecting 71 (40\u2013131) thousand\
    \ additional people."
  2: Finds that human-caused sea level rise has contributed to past coastal flood
    damages and will increasingly exacerbate damages in the future.
  4: "New York City experienced $1.5B ($0.9B\u2013$2.5B) in damages attributable to\
    \ ASLR, demonstrating the significant impact of sea-level rise on storm-induced\
    \ flooding."
  5: Robustness of estimates is demonstrated by the consistency of ASLR results across
    independent methodologies, indicating a significant number of people and housing
    units exposed due to ASLR.
  6: Finds lower ASLR in New York than globally. Stresses the importance of including
    potential ASLR pre-dating 1900.
  7: The study aims to estimate relative damages among simulated floods starting from
    slightly different baseline sea levels, aligning with the depth-emphasis in the
    HAZUS-MH model, to estimate the fraction of damages attributable to ASLR.
Methodology:
  1: The analysis involves simulating water levels and damages both as they occurred
    and would have occurred at different sea levels attributable to anthropogenic
    climate change.
  2: "The paper uses high-resolution dynamic flood modeling to simulate Sandy\u2019\
    s peak flood as it occurred and under counterfactual conditions with lower baseline\
    \ sea levels."
  4: Hydrodynamic modeling, spatial bias correction, and damage modeling are used
    to estimate ASLR-attributable damages, with validation through simpler modeling
    approaches.
  5: The paper uses hydrodynamic simulation, spatial bias correction, and a flood-depth-based
    assessment to estimate impacts of ASLR, employing independent methodologies to
    ensure robust results.
  6: Utilizes a budget approach to downscale semi-empirical results. Develops sea
    level budgets for global mean and New York sea level rise from literature-derived
    estimates. Uses a semi-empirical sea level model (K16) relating rate of sea-level
    change to global mean temperature. Employs both stable and cooling counterfactual
    scenarios within the semi-empirical model. Compares paired historical and counterfactual
    temperature timeseries from CMIP5 models to estimate ASLR.
  7: Hydrodynamic flood simulations are performed using the U.S. Army Corps of Engineers
    Coastal Storm Modeling System (CSTORM-MS), including the ADCIRC and STWAVE wave
    models. Damage is calculated based on depth-damage curves for 33 building types
    available per census block from the HAZUS databases. Damages and exposures for
    precise amounts of ASLR are interpolated between results for various water levels
    (from 4, 8, 10, 12, 14, 16, 20, and 24 cm of ASLR).
More Notes:
  6: The approach assumes a similar underlying distribution of sea-level-rise components
    (glaciers, Greenland ice sheet outweighing Antarctic ice sheet) and a negligible
    contribution from ocean dynamics in differentiating New York-area sea level change
    from global change over the long term. The analysis uses CMIP5 models with both
    historical and natural-forcing-only experiments.
No relevant information:
  9: This page primarily contains reference citations, author contributions, acknowledgements,
    competing interests, additional information, and publishing information. It doesn't
    directly provide information relevant to the review categories based on the paper's
    analysis and results.
Quantitative material:
  1: "Approximately $8.1 billion ($4.7B\u2013$14.0B, 5th\u201395th percentiles) of\
    \ Hurricane Sandy's damages are attributable to climate-mediated sea level rise."
  2: Under the central scenario, 9.8 cm of global sea level rise and 8.9 cm for the
    New York area are attributable to human causes mediated by climate change.
  4: "ASLR contributed to 13% (7.5\u201323%) of Sandy damages in the tri-state area,\
    \ totaling $8.1B ($4.7B\u2013$14B)."
  5: The analysis quantifies exposure to ASLR with data on additional people (71 thousand),
    housing units (36 thousand), and property damage ($8.1 billion) attributable to
    ASLR.
  6: "Presents three attribution scenarios (high, central, and low) for different\
    \ sea level components, drawing from literature-based estimates (including +1\u03C3\
    , median, and -1\u03C3). Analyzes minimum values of 1.1 and 1.2 mm/yr for anthropogenic\
    \ sea level rise over the century before Sandy for NE America and NYC, respectively,\
    \ corresponding to at least 12.3-13.4 cm of ASLR for the study period."
  7: The raw model results have a bias of -1.2 cm and root mean square error (RMSE)
    of 35.5 cm. After spatial bias correction, the mean bias is reduced to -0.1 cm
    and RMSE to 22.3 cm.
sourcematerial:
  1: "Source material here: In 2012, Hurricane Sandy hit the East Coast of the United\
    \ States, creating widespread coastal \uFB02ooding and over $60 billion in reported\
    \ economic damage. The potential in\uFB02uence of climate change on the storm\
    \ itself has been debated, but sea level rise driven by anthropogenic climate\
    \ change more clearly contributed to damages. To quantify this effect, here we\
    \ simulate water levels and damage both as they occurred and as they would have\
    \ occurred across a range of lower sea levels corresponding to different estimates\
    \ of attributable sea level rise. We \uFB01nd that approximately $8.1B ($4.7B\u2013\
    $14.0B, 5th\u201395th percentiles) of Sandy\u2019s damages are attributable to\
    \ climate-mediated anthropogenic sea level rise, as is extension of the \uFB02\
    ood area to affect 71 (40\u2013131) thousand additional people."
  2: "Source material here.\nEvaluation overview: \"Here, we investigate how much\
    \ of the more than $60 billion in damages from Hurricane Sandy can be linked to\
    \ climate-related anthropogenic sea level rise (ASLR).\"\n\nDrivers of Risk: \"\
    Our study region is New York and the Atlantic coast of New Jersey\u2014together,\
    \ where most of the storm\u2019s damages took place\u2014plus Connecticut. We\
    \ find that across the full range of our estimates, climate-mediated ASLR drove\
    \ multi-billions of dollars of damage from Hurricane Sandy.\"\n\nQuantitative\
    \ material: \"Under the central scenario, which we take as approximating the most\
    \ likely range of values, 9.8 cm (6.4\u201313.7 cm) of global mean sea level rise\
    \ and 8.9 cm (5.2\u201313.1 cm) of New York-area rise are attributable to human\
    \ causes mediated by climate change.\"\n\nMethodology: \"To do so, we first build\
    \ on recent research to develop multi-method estimates for global and New York-area\
    \ ASLR through 2012, when Sandy took place. We employ a high-resolution dynamic\
    \ flood model and spatially varying error correction to simulate Sandy\u2019s\
    \ peak flood both as it occurred, and under counterfactual conditions with lower\
    \ baseline sea levels.\"\n\nHighlights: \"More broadly, this case study underscores\
    \ that human-caused sea level rise has contributed to damages associated with\
    \ other past coastal floods and will increasingly aggravate damages in the future\
    \ as sea levels continue to rise, driven by anthropogenic warming.\"\n"
