  6: "Source material here.\nSimulates coastal water levels, \uFB02ooding, and damage\
    \ in New York, New Jersey, and Connecticut, both as they occurred, and as they\
    \ would have occurred across a range of lower sea levels corresponding to different\
    \ estimates of attributable sea-level rise.\n\nSea level rise robustly linked\
    \ to climate change, providing a strong foundation for event and impact attribution...lower\
    \ ASLR in New York than globally might seem unlikely...recent analyses suggest\
    \ minimum (\uFB01rst percentile) values of 1.1 and 1.2 mm/yr for anthropogenic\
    \ sea level rise over the century before Sandy for NE America and for New York\
    \ City, corresponding to at least 12.3\u201313.4 cm of ASLR for the focal period\
    \ of the present study.\n\nWe simulate coastal water levels, \uFB02ooding, and\
    \ damage in New York, New Jersey, and Connecticut...The choice assumes a similar\
    \ underlying distribution of sea-level-rise components, with contributions from\
    \ glaciers and the Greenland ice sheet substantially outweighing ones from the\
    \ Antarctic ice sheet.\n\nDrawing heavily on the framework and analyses of ref.\
    \ 24, we build budgets of global mean and climate-linked New York sea level rise\
    \ from literature-derived estimates of each contributing component...Attributable\
    \ fractions for different components can span wide ranges...our low and high estimates\
    \ span a range of attribution from 0% to 100%...the semi-empirical sea level model\
    \ of K16 relates the rate of global mean sea-level change to global mean temperature.\n\
    \nFinds lower ASLR in New York than globally. Stresses the importance of including\
    \ potential ASLR predating 1900...more appropriate...the choice further assumes\
    \ a negligibly ocean dynamics in differentiating New York-area sea level change\
    \ from global change over the long term...because many of the historical test\
    \ runs end in 2010 and natural-forcing-only experiment, which includes only natural\
    \ forcing.\n"
  7: " \n\"Property damage is calculated using the standard HAZUS-MH method from the\
    \ U.S. Federal Emergency Management Agency, using the same approach as utilized\
    \ in ref. 69, which is described in detail in their supplementary information.\
    \ In short, the damage calculation is based on depth-damage curves, which denote\
    \ the vulnerability of a specific asset to different flood depths in the form\
    \ of a percentage of maximum flood damage (which is based on depreciated replacement\
    \ costs).\"\n\n\"We apply the same bias correction to our counterfactual simulations...\
    \ While correction does improve model accuracy, the effects on final results are\
    \ small.\"\n\n\"Hydrodynamic flood simulations are performed using the U.S. Army\
    \ Corps of Engineers Coastal Storm Modeling System (CSTORM-MS).\"\n\n\"Both depth-damage\
    \ curves and maximum damages are differentiated for 33 building types... Counts\
    \ of these building types are available per census block from the HAZUS databases...\
    \ interpolate between results for various water levels (from 4, 8, 10, 12, 14,\
    \ 16, 20, and 24 cm of ASLR).\"\n\n\"The study aims to estimate relative damages\
    \ among simulated floods starting from slightly different baseline sea levels,\
    \ and this goal aligns well with the emphasis on depth in the HAZUS-MH model.\"\
