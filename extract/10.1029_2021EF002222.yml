  8: "Source material: To project water consumption for thermoelectric generation\
    \ for each future year at the county level, net electric energy produced at freshwater\
    \ thermoelectric plants is projected in each county as is the rate of water consumption\
    \ (water consumed per unit of electricity produced) at freshwater thermoelectric\
    \ plants in the county. This is done by first projecting future growth in per-capita\
    \ electricity demand by state using EIA data in 2015 on thermoelectric generation\
    \ and consumption by state and sector, assuming the share of thermoelectric plants\
    \ is relatively constant into the future... Decreases in nuclear power and shifts\
    \ towards gas steam and renewable energy are likely to cause large decreases in\
    \ water withdrawals and consumption. The growth in per-capita demand is expected\
    \ to grow according to past trends but at a decaying rate due to gains in energy\
    \ efficiency and declines in manufacturing. The change in thermoelectric water\
    \ use needed to accommodate the increase in space-cooling with a rise in temperature\
    \ is computed by introducing a multiplier to represent the effect of the temperature\
    \ increase on the per-capita electricity consumption... The EIA projects that\
    \ by 2050 renewables would be as large as 31%, with natural gas accounting for\
    \ 39% of domestic electricity production, and coal will only be 12%... Nuclear\
    \ power generation is also expected to slowly fall from its current 19%\u2013\
    12%. To project water consumption for thermoelectric generation for each future\
    \ year at the county level...After the demand is projected at the energy region\
    \ level, demand is apportioned to each county based on the county's relative population.\
    \ Finally, water consumption rates are applied to the projected electricity demand\
    \ for freshwater thermoelectric generation to get projected water consumption\
    \ for thermoelectric generation by county. Impacts of temperature changes have\
    \ both short-term and long-term effects on electricity use...Factors for the short-term\
    \ effect and the combined effects are estimated at the WRR level...Short-term\
    \ effects are based on Sailor (2001), who estimates the percentage increase in\
    \ residential and commercial electricity consumption for annual temperature increases\
    \ for eight states... This suggests that projections here will provide a baseline\
    \ for future water use keeping with the status quo but will likely over-project\
    \ future water use for thermoelectric generation."
