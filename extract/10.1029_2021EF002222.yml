  15: 'plaintext

    Evaluation overview: "Since then, the USGS has released 2015 water use data allowing
    a comparison of their projections with the reported data. Across all watersheds
    in the United States, their A1B scenario projected about 20% more water withdrawn
    in 2015 than was reported by the USGS."


    Drivers of Risk: "These differences between projections and observed data represent
    economic shifts larger than those observed in historical data trends. Large declines
    in manufacturing led to reductions beyond what was expected in manufacturing centers
    of the U.S. In some places with heavy agricultural water use, droughts were met
    with increases in water use to protect crops while in other areas drought spurred
    larger reductions than projected."


    Quantitative material: "Across all watersheds in the United States, their A1B
    scenario projected about 20% more water withdrawn in 2015 than was reported by
    the USGS."


