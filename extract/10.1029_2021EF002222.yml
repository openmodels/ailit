Highlights:
  1: Dry regions may see up to a 235% increase in freshwater use under worst-case
    climate scenarios; climate change impacts on water use are larger than impacts
    from non-climate factors.
  3: Decreased water yield in the South and increased water yield in much of the western
    United States.
  7: A new approach to projecting water use at thermoelectric plants is introduced,
    utilizing EIA-reported data on fuel consumption and net electricity generation
    to model heat and water budgets of individual plants. The new USGS approach provides
    estimates of water consumption, as opposed to just estimates of water withdrawal.
  8: Projections will likely over-project future water use for thermoelectric generation
    due to decreases in nuclear power and shifts towards gas steam and renewable energy.
  9: Projected increase in domestic water use in southern and western U.S. due to
    population growth outpacing water use efficiency improvements.
  10: Growth in service and information industries, which use relatively little water,
    has outpaced manufacturing growth.
  11: Significant increases in thermoelectric water consumption projected, particularly
    in the South and Midwest; industrial water use changes driven by economic motives.
  12: Warm temperatures could significantly increase water usage for power generation
    and agriculture; irrigation water demands are rising in the eastern U.S., while
    the West faces competition for water resources.
  13: Agriculture is the dominant water use sector, so results vary more by climate
    model than SSP, especially under RCP 8.5. The Intermountain region sees large
    increases in water use, especially for livestock, with RCP 8.5 leading to nearly
    twice as high consumptive use in dry scenarios compared to wet scenarios. Under
    RCP 4.5, climate impacts are small, and total consumptive use falls in many regions.
  14: Under dry climate models, the South, Southeast, and Great Plains show decreases
    in water yield, while the western United States sees increases. Socioeconomic
    factors are the primary determinants of water use in the domestic sector. Aggregate
    impacts depend on which future the U.S. sees, with water use potentially decreasing
    or increasing significantly depending on the scenario. The driest parts of the
    country face the prospect of less water and higher demand.
  15: Projections did well overall, with significant overestimates in the Great Lakes
    and Ohio regions, and underestimates in Mid-Atlantic and Great Basin regions.
