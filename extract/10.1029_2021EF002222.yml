Quantitative material:
  1: Total consumptive water use projections range from an 8% decrease under the best-case
    scenario to a 235% increase under the worst-case scenario.
  3: Map visualizes percent changes in surface freshwater withdrawals across U.S counties.
  4: Withdrawal rates are calculated and attributed to specific water use sectors,
    individual or area-based metrics, e.g., gallons per person or gallons per acre.
