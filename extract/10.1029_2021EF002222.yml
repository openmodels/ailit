sourcematerial:
  1: Water use in the United States decreased 9% between 2010 and 2015, making 2015
    the lowest level of water use since before 1970 (Dieter et al., 2018). Between
    2005 and 2015, 64% of counties in the United States saw net decreases in surface
    water withdrawals (Figure 1). Decreases were especially widespread throughout
    the Great Plains. The decrease came despite population increases, in large part
    due to structural changes in the U.S. economy that favored less water-intensive
    industries and broad efficiency gains in household appliances, thermoelectric
    power generation, and agriculture irrigation. Projections are based on socioeconomic
    and climate scenarios from the Intergovernmental Panel on Climate Change Fifth
    Assessment Report. Scenarios are paired with five climate models from the downscaled
    Multivariate Adaptive Constructed Analogs (MACA). We find total consumptive water
    use will decrease by as much as 8% under the best-case scenario but increase by
    as much as 235% under the worst-case scenario. Results depend on both climate
    and socioeconomic changes, but because agriculture is the dominant use of water
    in most regions, climate change impacts overwhelm all other factors under hot
    and dry futures. For the wetter climate models, water use decreases even under
    the highest emissions levels and highest population growth rates. This study examines
    recent trends in freshwater use and makes projections in future freshwater use
    over the next 50 years. Projections are based on socioeconomic and climate scenarios
    from the Intergovernmental Panel on Climate Change Fifth Assessment Report (AR5;
    IPCC, 2014). The scenario approach uses plausible
  2: 'Source material here.

    "The study uses a combination of Representative Concentration Pathways (RCPs)
    and Shared Socioeconomic Pathways (SSPs) paired with five climate models from
    the MACA dataset for projections."

    "Our projections are based on extrapolating past trends of withdrawal rates (e.g.,
    water use per capita, irrigation depth) and applying those rates to projections
    of water-using units (population, acres irrigated)."

    "This study uses the CMIP5 convention where SSPs and RCPs are separate to examine
    the relative impacts of climate and socioeconomic forces and to be consistent
    with the approach used in the 2020 US Forest Service Resource Planning Act (RPA)
    Assessment, to which this study contributes."

    "Projections focus on four core scenarios shown in Figure 2 and described in Langner
    et al. (2020). The core scenarios are a combination of SSPs 1, 2, 3, and 5 and
    RCPs 4.5 and 8.5."

    "RCP 8.5 represents warmer global temperatures, and RCP 4.5 represents a less-warm
    future."

    "Economic and population growth are bound by the low-growth SSP3 pathway and high
    growth SSP5 pathway, with SSP1 and SSP2 representing moderate growth pathways."

