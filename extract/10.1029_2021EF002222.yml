  17: No relevant information
  18: The maps depict variation between wetter and drier conditions and cooler to
    warmer temperatures across the U.S., highlighting regional impacts of climate
    scenarios.
  19: Variations in potential evapotranspiration are shown depending on different
    climate regions and emissions pathways.
Methodology:
  1: Projections are made using scenarios from the IPCC Fifth Assessment Report, paired
    with five climate models from the MACA.
  2: Four core scenarios combine SSPs 1, 2, 3, and 5 with RCPs 4.5 and 8.5 to project
    socioeconomic and climate futures.
  3: Uses the VIC model and the Penman-Monteith equation to calculate potential evapotranspiration.
  4: The analysis builds on a previous model by improving spatial resolution to project
    water use at the county level and changes the way water use is modeled in the
    energy sector.
  5: Growth and decay rates are based on water withdrawal records from 1985 to 2015
    and are divided by eastern and western U.S. water resource regions.
  6: Consumptive use for most sectors is estimated based on USGS data from 1985 to
    1995, except for thermoelectric power, which uses different methods.
  7: Computes changes in water withdrawals based on changes in precipitation and potential
    evapotranspiration, with different approaches for domestic, irrigation, and thermoelectric
    uses. Thermoelectric freshwater use is projected using EIA data on fuel consumption
    and net electricity generation, modeling heat and water budgets of individual
    thermoelectric utility plants.
  8: Projects future growth in per-capita electricity demand by state using EIA data,
    assuming the share of thermoelectric plants is relatively constant. Projects water
    consumption based on projected electricity demand and water consumption rates.
    Accounts for electricity demand met by generation in another county by aggregating
    demand to NERC regions. Models temperature effects on electricity consumption
    using a multiplier and state-specific nonlinear regression equations based on
    past temperatures (1971-2000). Uses data from 1985 to 2015 to project future trends,
    but attenuates the growth rate.
  9: Uses historical data and regional climate projections to estimate changes in
    electricity and water use.
  10: No relevant information
  13: Projections are based on RCP and SSP scenarios; livestock water demand does
    not include climate effects. Analysis separates water withdrawals from consumptive
    use, noting regional variations in consumptive use rates.
  14: Climate models and socioeconomic scenarios are used to project future water
    use under different emission levels and population growth rates. Projections assume
    technology and the share of thermoelectric generation will remain near current
    levels.
  15: The comparison uses Brown et al.'s 2013 projections with USGS 2015 data, highlighting
    projection accuracy.
  16: Projections are based on Variable Infiltration Capacity (VIC) model findings
    at 4x4 km resolution for precipitation, water yield, and potential evapotranspiration
    under selected MACA models and RCPs.
  17: No detailed analysis or methodology provided on this specific page.
  19: The analysis uses maps showing spatial changes in potential evapotranspiration
    under two RCPs (4.5 and 8.5) for mid-century and end-century.
More Notes:
  7: Thermoelectric water use projections account for electricity generation and consumption
    across different basins and energy sources. The irrigation water use calculation
    assumes complete satisfaction of plant water requirements.
  10: Climate models differ significantly in areas of high uncertainty regarding water
    use projections.
  13: The West and parts of the Southeast see relatively large increases in water
