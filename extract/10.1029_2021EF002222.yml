  3: "The climate projections show high variability between models. In the South,\
    \ Southeast, and Great Plains, the dry climate model shows a decrease in water\
    \ yield. The wet and hot models show increases in water yield for these same regions.\
    \ The most consistent results across models are increases in precipitation and\
    \ yield for much of the western United States and decreases in water yield in\
    \ the South. Warmer temperatures in the South are projected to increase potential\
    \ evapotranspiration (PET) more than for any other region of the U.S. Higher rates\
    \ of PET amplify the effects of decreased precipitation in the South, leading\
    \ to further declines in water yield.\nFigure 1. Percent change in surface freshwater\
    \ withdrawals between 2005 and 2015 (data from Dieter et\_al.,\_ 2018).\nVIC uses\
    \ the Penman-Monteith equation to calculate potential evapotranspiration.\nDark\
    \ blue represents a decrease of more than 100%. Light blue indicates a decrease\
    \ of up to 25%. Light beige signifies minimal change, ranging from a slight decrease\
    \ to a slight increase. Light green represents an increase of up to 100%. Darker\
    \ green shows an increase of more than 100%. Much of the Western and Northern\
    \ regions of the U.S. are shaded in darker blues and light blues, indicating areas\
    \ with decreased percentages.\n"
  4: "  \n\"The model builds on Brown et al. (2013), to which this work improves the\
    \ spatial resolution of projections from water assessment subregions (ASRs) to\
    \ counties and makes substantial changes to the way water use is modeled in the\
    \ energy sector.\" \n\n\"The effects of future climate change are estimated based\
    \ on projections of annual or seasonal temperature, potential evapotranspiration,\
    \ and precipitation obtained from downscaled global climate model runs (Heidari\
    \ et al., 2020).\"\n\n\"Let [ ... ] index the set of water use sectors. Withdrawals\
    \ (W) in sector j, county y, at time t are computed as the product of water demand\
    \ units (U) and an estimate of withdrawal per demand unit, also called a withdrawal\
    \ rate ([ ... ]) (Table 2):\"\n\n\"A unit of demand, also called a water use driver,\
    \ could be a person for domestic use or an irrigated acre for agricultural use,\
    \ with the corresponding withdrawal rates measured in gallons per person and gallons\
    \ per acre, respectively.\"\n"
  5: "yaml\nMethodology: \"Projected future water withdrawal is calculated at the\
    \ county level, but the factors used to produce those estimates are specified\
    \ at larger spatial scales because the data for individual counties are sometimes\
    \ erratic\u2014perhaps because of annual weather f luctuations or errors in estimation\u2014\
    so that they do not appear to support estimation at the smaller spatial scale\
    \ (Brown et\_al.,\_           2013).\"\nMethodology: \"Extrapolation of past trends\
    \ in            is accomplished by applying an annual growth rate (        g),\
    \ based on data from recent years, along with corresponding decay in that growth\
    \ rate (d). The decay rate was chosen to attenuate the trend, leading gradually\
    \ toward a hypothesized equilibrium level (Brown et\_ al.,\_           2013).\"\
    \nMethodology: \"Divisions used to calculate growth and decay rates are specified\
    \ according to Water Resource Regions (WRR) (2-digit hydrological units); the\
    \ eastern division consists of WRRs 1\u20139 and the western division consists\
    \ of WRRs 10\u201318 (Figure\_          3). Projected future water withdrawal\
    \ is calculated at the county level, but the factors used to produce those estimates\
    \ are specified at larger spatial scales because the data for individual counties\
    \ are sometimes erratic\u2014perhaps because of annual weather f luctuations or\
    \ errors in estimation\u2014so that they do not appear to support estimation at\
    \ the smaller spatial scale (Brown et\_al.,\_           2013).\"\n"
  6: Two facts complicate the projection of livestock and aquaculture withdrawals
    using these methods. First, these categories consist of water use by several different
    animal species and kinds of aquaculture operations, and site-specific data on
    numbers of animals or areas and kinds of fish farms are not easily obtained. Without
    accounting for numbers of livestock animal units by species (on the range and
    then in feedlots and other confined areas) and the area of fish farm, there is
    no obvious summary unit of production. [...] For projecting future water withdrawals,
    the first fact (lack of data on-demand units) is accommodated by basing future
    withdrawals not on numbers of animals or area of fishponds but rather on the human
    population, as humans are the consumers of livestock products. [...] The second
    fact (spatial mismatch between production and consumption) is accommodated by
    computing total livestock and aquaculture withdrawals at the WRR spatial scale
    and then apportioning that total to individual counties based on the location
    of past withdrawals. Thus, the driver for livestock is the WRR population, and
    the withdrawal rate is gallons per person. [...] For most water use sectors, consumptive
    use proportions are adapted from USGS estimates for 1985, 1990, and 1995 [..]
    Because we rely on a new data source for thermoelectric power, the year 2020 estimate
    of per-capita electricity use is based solely on an extension from the 2015 estimate.
