Drivers of Risk:
  1: Sea-level rise, coral-reef degradation (due to climate change and other anthropogenic
    impacts), changes in waves and storms are impacting the ability of reefs to provide
    coastal protection. Loss of Acropora palmata is specifically mentioned.
  2: Key shocks impacting outcomes include reef degradation, sea-level rise, and coastal
    erosion.
  3: The paper identifies thermal stress events and Stony Coral Tissue-Loss Disease
    (SCTLD) as drivers of coral mortality and reduced growth. Climate-related mortality,
    and sea-level rise are also identified as risks.
  4: Sea-level rise, increased wave energy propagation across reefs, storm surge,
    and changes in reef elevation due to erosion.
  5: Sea-level rise, storm surge (10-year and 50-year storm scenarios), and coral
    reef erosion.
  6: Drivers of risk include climate change (leading to coral loss, SCTLD, and bleaching),
    episodic natural impacts like Hurricane Maria (physical erosion), sea-level rise,
    and storms.
  7: Sea-level rise, increased frequency of severe storms due to climate change, and
    bioerosion are identified as key drivers impacting reef accretion and coastal
    flooding.
  8: Sea-level rise and extreme weather events, such as storms, are impacting coastal
    communities and reef systems.
  9: Reef degradation and the ability of reefs to keep pace with future sea-level
    rise are the key drivers of risk.
  10: Drivers of risk include increased climate-change impacts, incorporating increased
    mortality rates, and sea-level rise. Storms are considered as a source of fragmentation,
    but not explicitly incorporated due to uncertainties.
Evaluation overview:
  1: The study evaluates the potential for coral reef restoration to mitigate coastal
    flooding as sea levels rise.
  2: The outcome being evaluated is the potential of coral restoration to enhance
    reef function and coastal protection at Buck Island Reef National Monument.
  3: This paper evaluates the potential impacts of restoring reef-building corals,
    specifically Acropora palmata and Pseudodiploria strigosa, on reef accretion potential
    at Buck Island Reef National Monument (BIRNM).
  4: The paper evaluates the potential for coral restoration (specifically increasing
    *Acropora palmata* cover) to improve reef elevation and reduce coastal flooding
    during storms under future sea-level rise scenarios.
  5: Coastal flooding potential around Buck Island due to sea-level rise and reef
    erosion.
  6: The study evaluates the reef accretion potential at Buck Island Reef National
    Monument (BIRNM) and its role in coastal protection, considering factors like
    coral loss and sea-level rise.
  7: The study evaluates the potential of coral reef restoration, specifically increasing
    Acropora palmata cover, to mitigate coastal flooding and keep pace with sea-level
    rise.
  8: The paper evaluates the impact of coral restoration on mitigating the effects
    of sea-level rise and coastal flooding by the end of the century.
  9: The study evaluates reef-accretion potential and the impact of restoring reef-building
    corals at BIRNM.
  10: This study evaluates the population survival rate and reef-accretion potential
    of A. palmata reefs under different scenarios of climate change impacts and restoration
    efforts.
Highlights:
  1: Restoration of Acropora palmata, if successful, could mitigate the most extreme
    impacts of coastal flooding by reversing projected trajectories of reef erosion
    and allowing reefs to keep pace with the ~0.5 m of sea-level rise expected by
    2100 under moderate carbon emissions reductions.
  2: Study suggests sea-level rise will be the primary driver of coastal flooding,
    but reef erosion contributes a measurable increase; successful coral restoration
    could mitigate impacts in combination with climate change mitigation.
  3: Coral restoration efforts, particularly with A. palmata, could significantly
    increase coral cover and reef-accretion potential, potentially allowing reefs
    to keep pace with low to intermediate-low sea-level rise projections until 2050.
    However, continued mortality, especially due to climate-related events, could
    reverse these gains by the end of the century.
  4: Coral restoration has the potential to significantly reduce coastal flooding
    during future storms by mitigating wave-driven increases in total water levels
    and promoting reef accretion.
  5: Sea-level rise is the most significant driver of increases in total water levels
    and flooding potential. Higher total water levels under all sea-level-rise scenarios
    are projected for the northern sector of the island, corresponding to the areas
    of greatest projected reef erosion.
  6: The southern reef crest is the only habitat with marginally positive reef-accretion
    potential. The study highlights the importance of physical erosion from storms,
    which was not explicitly considered in carbonate budgets. Restoration of *A. palmata*
    can help mitigate the impacts of future sea-level rise.
  7: Restoration of A. palmata can potentially mitigate coastal flooding and keep
    pace with sea-level rise under moderate emissions scenarios. The study demonstrates
    how restoration could help to mitigate reef degradation and coastal flooding in
    locations like BIRNM.
  8: Coral restoration has the potential to combat elevation loss, minimize climate
    change impacts, and could serve as a key component in the solutions portfolio
    for managing coastal protection.
  9: Restoration of A. palmata could significantly impact coastal-hazards protection
    and help reefs keep pace with sea-level rise.
  10: "The study suggests that models in south Florida may have underestimated net\
    \ reef erosion by ~1 mm y\u22121, and estimates historic carbonate production\
    \ by A. palmata at BIRNM at 16.48 kg CaCO3 m\u22122 y\u22121"
Methodology:
  1: The study combines coral-growth measurements and carbonate-budget assessments
    of reef-accretion potential at Buck Island Reef, U.S. Virgin Islands, with hydrodynamic
    modeling.
  2: The analysis uses census-based carbonate-budget models and hydrodynamic modeling,
    applied to assess reef-accretion potential and coastal flooding impacts at Buck
    Island.
  3: The analysis includes a coral-growth experiment conducted at BIRMN from 2019
    to 2021, measuring calcification rates and growth of A. palmata and Ps. strigosa.
    A population model was developed to project potential changes in A. palmata cover
    under various restoration and mortality scenarios until 2100. Carbonate-budget
    models are used to estimate reef-accretion potential.
  4: Carbonate budget models were used to project reef elevation change and accretion
    potential under different restoration scenarios and sea-level rise projections.
    Hydrodynamic modeling was used to assess total water levels during storms under
    various sea-level rise and reef elevation scenarios. The results are applicable
    to the reef-crest habitats at Buck Island Reef National Monument (BIRNM).
  5: Models project maximum total water levels at 2100 with projected reef erosion.
    The carbonate-budget models were used to project reef erosion. Maximum total water
    levels are plotted along the shoreline for different sea-level rise scenarios.
    Bioerosion rates incorporated in budgets based on in situ measurements.
  6: The study uses models to project future coastal flooding risk based on sea-level
    rise, storm scenarios, reef degradation, and coral restoration scenarios. Results
    are applicable until 2100.
  7: The study uses carbonate-budget and coral-growth models. The specific projections
    are directly applicable to the baseline ecological and geomorphic setting of BIRNM.
    The carbonate-budget models provide a starting point for assessing functional
    metrics like shoreline protection. They estimate how the omission of non-biological
    erosion could affect results by following the approach of Toth et al. (2022) and
    calculating a lower uncertainty on reef-accretion potential.
  8: The analysis is based on modeling and carbonate budget estimates from reef-census
    data and surveys of bioeroding species.
  9: Analysis involved using reef-accretion potential estimates, hydrodynamic models,
    and restoring A. palmata and Ps. strigosa to model changes in BIRNM reef.
  10: The study uses a model to project A. palmata population changes based on survival
    and fragmentation rates under different mortality scenarios, coupled with a carbonate
    budget model to estimate reef accretion potential. It uses the XBeach model, validated
    against observed wave data, to simulate hydrodynamics and water levels under different
    sea-level-rise and storm scenarios. The study's results are applicable to Buck
    Island Reef National Monument (BIRNM).
More Notes:
  1: The shallow reef-crest zone is responsible for the majority of wave dissipation
    over coral reefs and is the most important habitat for shoreline protection. The
    loss of Acropora palmata has fundamentally changed the structure and function
    of many western Atlantic reefs.
  2: The study highlights spatial variability in reef-accretion potential, with the
    southern reef crest showing higher positive values.
  3: The study emphasizes the importance of combining restoration efforts with local
    management, global carbon emission reductions, and the recovery of ecological
    processes for long-term coral reef health and resilience. The southern reef crest
    already has higher coral cover than other areas.
  5: The study area is Buck Island Reef National Monument (BIRNM).
  7: The study acknowledges uncertainties in reef-accretion potential and the efficacy
    of large-scale restoration amid ongoing disturbance. The specific projections
    are only directly applicable to the baseline ecological and geomorphic setting
    of BIRNM, but the overall conclusion is relevant for coral reefs throughout the
    western Atlantic. The study recognizes that high upfront costs of coral restoration
    could be balanced by the direct value of restoration to local communities and
    economies and the millions of dollars of damage to coastal infrastructure that
    could be avoided.
  10: The study acknowledges uncertainties in future storm climates and coral acclimation/adaptation,
    presenting a simplified version of reality. The reef-accretion potential is presented
    as an optimistic, maximum estimate.
Quantitative material:
  1: The study models coastal flooding under various coral-restoration, sea-level
    rise, and storm scenarios and suggests that Acropora palmata restoration could
    mitigate the most extreme impacts of coastal flooding, allowing reefs to keep
    pace with ~0.5 m of sea-level rise expected by 2100 with moderate carbon-emissions
    reductions.
  2: "Reef-accretion potential averaged -1.56 mm y\u22121 (\xB10.27 SE) across 54\
    \ sites, and 91% of sites showed decreases in elevation due to bioerosion averaging\
    \ -13.09 cm by 2100."
  5: "Reef-accretion potential averaging -1.56 mm y\u22121. Average carbonate production\
    \ by all species combined is now just 1.27 (\xB10.27) kg CaCO3 m\u22122 y\u2212\
    1. Reef erosion rate of -2.7 mm y\u22121 estimated from 1981-2014."
  6: "The southern reef crest is projected to maintain its present-day elevation by\
    \ 2100, while most reef zones at BIRNM are projected to lose 0.12-0.23 m of elevation\
    \ on average. Restoration could reduce total water levels by up to 0.81 m. *A.\
    \ palmata* colonies can grow as fast as sea-level rise, even under pessimistic\
    \ scenarios (up to 13.4 mm y\u22121 in St. Croix). Beach area on the western side\
    \ of the island has lost nearly 30% (0.88 ha) due to storm-driven erosion since\
    \ 1954. Successful near-term restoration (1.5-3.0 *A. palmata* individuals m\u2212\
    2 by 2030) could substantially increase coral cover and reef-accretion potential\
    \ until the end of the century."
  7: "Restoration (+30% A. palmata cover) could allow reef crest to keep pace with\
    \ ~0.5 m sea-level rise by 2100. This outcome would reduce total water levels\
    \ during storms by >10% (0.81 m) under higher sea-level-rise scenarios.  They\
    \ calculate a 3.08 mm y\u22121 offset from maximum Holocene reef accretion.  They\
    \ mention a restoration cost of ~$25 USD per A. palmata fragment."
  8: Restoration could increase reef elevation to match the lowest sea-level rise
    predictions (~0.30 m) and potentially avoid ~0.2 m increases in wave-driven water
    levels during storms; without restoration, erosion could lead to a 0.96 m rise
    in water levels under the SSP5-8.5 scenario.
  9: Projected potential change in percent cover of A. palmata in reef-crest habitats
    from outplanting 100,000, 250,000, and 500,000 colonies.
sourcematerial:
  1: "The study evaluates the potential for coral reef restoration to mitigate coastal\
    \ flooding as sea levels rise: \"The potential for coral reef restoration to mitigate\
    \ coastalfl ooding as sea levels rise\" and \"Here, we show how and whether coral\
    \ restoration could achieve the often-cited goal of reversing the impacts of coral-reef\
    \ degradation to preserve this essential function.\" \n\nSea-level rise, coral-reef\
    \ degradation (due to climate change and other anthropogenic impacts), changes\
    \ in waves and storms are impacting the ability of reefs to provide coastal protection:\
    \ \"The ability of reefs to protect coastlines from storm-drivenfl ooding hinges\
    \ on their capacity to keep pace with sea-level rise.\" and \"climate change is\
    \ jeopardizing the ability of reefs to continue to provide coastal protection\
    \ by causing coral-reef degradation4\u20136,sea-level rise7\u20139, and changes\
    \ in waves and storms10,11.\"\n\nThe study models coastal flooding under various\
    \ coral-restoration, sea-level rise, and storm scenarios and suggests that Acropora\
    \ palmata restoration could allow reefs to keep pace with ~0.5 m of sea-level\
    \ rise expected by 2100 with moderate carbon-emissions reductions: \"to quantify\
    \ future coastalfl ooding under various coral-restoration, sea-level rise, and\
    \ storm scenarios. Our results provide guidance on how restoration of Acropora\
    \ palmata, if successful, could mitigate the most extreme impacts of coastal flooding\
    \ by reversing projected trajectories of reef erosion and allowing reefs to keep\
    \ pace with the ~0.5 m of sea-level rise expected by 2100 with moderate carbon-emissions\
    \ reductions.\"\n\nThe study combines coral-growth measurements and carbonate-budget\
    \ assessments of reef-accretion potential at Buck Island Reef, U.S. Virgin Islands,\
    \ with hydrodynamic modeling: \"We combined coral-growth measurements and carbonate-budget\
    \ assessments of reef-accretion potential at Buck Island Reef, U.S. Virgin Islands,\
    \ with hydrodynamic modeling.\"\n\nRestoration of Acropora palmata, if successful,\
    \ could mitigate the most extreme impacts of coastal flooding by reversing projected\
    \ trajectories of reef erosion: \"Our results provide guidance on how restoration\
    \ of Acropora palmata, if successful, could mitigate the most extreme impacts\
    \ of coastal flooding by reversing projected trajectories of reef erosion.\"\n\
    \nThe shallow reef-crest zone is responsible for the majority of wave dissipation\
    \ over coral reefs and is the most important habitat for shoreline protection:\
    \ \"The shallow reef-crest zone is responsible for the majority of wave dissipation\
    \ over coral reefs and is, therefore, the most important habitat for shoreline\
    \ protection1,5,9.\" and \"Reefs whose vertical accretion lags rising sea level\
    \ may no longer maintain their role as protective barriers.\""
  2: "Source material here: Many coral-restoration efforts are now reaching a scale\
    \ at which they are expected to have positive impacts on reef function and ecosystem\
    \ services such as shoreline protection23;however,theabilityofcoral restoration\
    \ to achieve those broader goals has yet to be demonstrated. Carbonate-budget\
    \ studies provide a simpli\uFB01 ed model of the complex processes controlling\
    \ the modern accretion-erosion balance and a means for estimating how reef accretion\
    \ and, therefore, water depth, could change in response to the combined impacts\
    \ of reef degradation and sea-level rise in the future16,21. Based on our carbonate\
    \ budget reef census in 2016, reef-accretion potential varied between -5.31 and\
    \ 6.21 mm y\u2212 1 and averaged -1.56 mm y \u2212 1 (\xB10.27 standard error\
    \ [SE]) across 54 sites within shallow fore-reef, reef-crest, and back-reef habitats...bioerosion\
    \ was the dominant process at 91% of sites, with estimated decreases in elevation\
    \ due to reef erosion averaging -13.09 (\xB10.02) cm by 2100 Here, we \uFB01 rst\
    \ quantify spatial variability in reef-accretion potential \u2014a measure of\
    \ the maximum capacity for the vertical accretion of a reef\u2014using census-based\
    \ carbonate-budget models. We then use carbonate-budget models to examine whether\
    \ and how restoration of A. palmata onto the shallow reef crests at BIRNM could\
    \ help close the gap between the reef and rising sea level to mitigate coastal\uFB02\
    \ ooding impacts in the future. Finally, we use hydrodynamic modeling to determine\
    \ how projected changes in bathymetry from both reef ero- sion and restoration,\
    \ in combination with sea-level rise, could impact coastal \uFB02 ooding potential\
    \ during storms by 2100. We demonstrate that although sea-level rise will be the\
    \ primary driver of coastal \uFB02 ooding, reef erosion will result in a small,\
    \ but measurable, increase in \uFB02 ooding potential by the end of the century.\
    \ Our study also provides insight into how successful coral-reef restoration efforts\
    \ initiated within the present decade could, in combination with larger-scale\
    \ climate-change mitigation, reduce the impacts of sea-level rise and wave-driven\
    \ water levels on coral-reef-lined coasts like BIRNM. Only \uFB01 ve sites had\
    \ positive reef-accretion potential, and, on average, reef-accretion potential\
    \ was only positive on the southern reef crest (0.10 mm y\u2212 1 \xB1 1.20 SE\
    \ versus \u2264 -1.41 mm y\u2212 1 in all other zones). As a result, reef-accretion\
    \ potential in the southern sector was signi\uFB01 cantly higher than in the northern\
    \ sector"
  3: " \nEvaluation overview: \"Potential impacts of restoring reef-building corals...\
    \ Calci\uFB01cation rates of A. palmata ranged from 21.04 to 42.91 kg m\u2212\
    2 y\u22121, with an average of 29.07 kg m\u22122 y\u22121 (\xB11.26).\"\nDrivers\
    \ of Risk: \"14 of the 30 A. palmata colonies included in the experiment died\
    \ within days of transplantation due to the occurrence of an early thermal-stress\
    \ event... Stony coral tissue-loss disease (SCTLD) was just starting to impact\
    \ some colonies during the last time interval.\"\nQuantitative material: \"Calcification\
    \ rates of A. palmata ranged from 21.04 to 42.91 kg m\u22122 y\u22121, with an\
    \ average of 29.07 kg m\u22122 y\u22121... Model indicates that a single large-scale\
    \ restoration effort now could allow reefs at BIRNM to maintain high levels of\
    \ coral cover until around 2050... Calcification rates of Ps. strigosa ranged\
    \ from 7.96 to 21.31 kg m\u22122 y\u22121, with an average of 14.30 kg m\u2212\
    2 y\u22121.\"\nMethodology: \"During the coral-growth experiment we conducted\
    \ at BIRMN from 2019 to 2021...\" \"To evaluate how coral restoration could harness\
    \ the rapid growth of A. palmata, we first developed a simple population model...\"\
    \nHighlights: \"The model indicates that by the end of the century, the effects\
    \ of restoration in enhancing A. palmata cover would largely be reversed under\
    \ most of the modeled scenarios... Restoration now could allow reefs at BIRNM\
    \ to maintain high levels of coral cover until around 2050...\"\nMore Notes: \"\
    However, additional local management, global reduction of carbon emissions, and/or\
    \ the recovery of ecological processes like sexual reproduction... A single, large-scale\
    \ A. palmata outplanting effort before 2030 could result in increases in coral\
    \ cover on the reef crest at BIRNM for the next 20 years...\"\n"
  4: " \nCarbonate-budget models showing how increases in Acropora palmata through\
    \ restoration could improve the ability of reef-crest habitats at Buck Island\
    \ Reef National Monument (BIRNM) to keep pace with future sea-level rise... These\
    \ results indicate that if A. palmata cover could be increased by ~30%... the\
    \ reef could keep pace with Low to Intermediate-Low projections of relative sea-level\
    \ (RSL) rise... Coastal protection during storms... Modeled total water levels\u2014\
    which include the influence of tides, waves, and storm surge\u2014increase non-linearly\
    \ with rising sea level... substantial coral-restoration efforts (i.e., increasing\
    \ 30% A. palmata cover to \u2265 36% total cover) could promote reef accretion\
    \ and help narrow the gap between reef elevation and sea level by more than 0.5\
    \ m on average by 2100... Restoration could substantially reduce total water levels,\
    \ by up to 0.81 m (\xB10.03) on average, under intermediate-to-high sea-level\
    \ rise scenarios (i.e., 1.2\u20122.0 m by 2100)... Restoration therefore has the\
    \ potential to negate the wave-driven component associated with low-end sea-level-rise\
    \ scenarios.\n"
  5: "Source material here.\nEvaluation overview: \"The impact of sea-level rise and\
    \ coral-reef bathymetry on alongshore variation in total water levels and thus\
    \ coastal \uFB02ooding potential.\"\n\nDrivers of Risk: \"The capacity of coral\
    \ reefs to keep pace with sea-level rise is central to their ability to continue\
    \ to provide shoreline protection to coastal communities in the future... The\
    \ plots indicate that although sea-level will be the most signi\uFB01cant driver\
    \ of increases in total water levels and thus \uFB02ooding potential...\"\n\n\
    Quantitative material: \"Reef-accretion potential averaging -1.56 mm y\u22121...This\
    \ rate is only slightly lower than the erosion rate of -2.7 mm y\u22121 that Yates\
    \ et al. estimated from landscape-scale changes in seafloor elevation around Buck\
    \ Island from 1981\u20132014...average production by all species combined is now\
    \ an order of magnitude lower at just 1.27 (\xB10.27) kg CaCO3 m\u22122 y\u2212\
    1.\"\n\nMethodology: \"The top row (a, b) provides projections of maximum total\
    \ water levels at 2100 with projected reef erosion from the carbonate-budget models...The\
    \ carbonate-budget models under the process on most of the reef, with reef-accretion\
    \ potential averaging -1.56 mm y\u22121.\"\n\nHighlights: \"The plots indicate\
    \ that although sea-level will be the most signi\uFB01cant driver of increases\
    \ in total water levels and thus \uFB02ooding potential, higher total water levels\
    \ under all sea-level-rise scenarios are projected for the northern sector of\
    \ the island, corresponding to the areas of greatest projected reef erosion.\"\
    \n\nMore Notes: \"reef-building corals at BIRNM...Buck Island\"\n"
  6: "Source material: Although our results indicate that the southern reef crest\
    \ at BIRNM was maintaining its role as a coastal barrier at the time of our surveys\
    \ in 2016, its future role in providing coastal protection is precarious given\
    \ the inevitability of continuing coral loss from climate change and other episodic\
    \ natural and human impacts. Indeed, just one year after our surveys were completed,\
    \ Hurricane Maria passed ~60 km west of BIRNM as a Category-5 storm and caused\
    \ significant damage to southern reef habitats. SCTLD began to impact the reef\
    \ at BIRNM. Rising sea levels will be the dominant driver of future coastal-flooding\
    \ risk at BIRNM; the impacts of sea-level rise will be amplified by the diverging\
    \ patterns of geomorphic change. The southern reef crest is predicted to more-or-less\
    \ maintain its present-day elevation. Successful restoration could help mitigate\
    \ some of the impacts of future sea-level rise at Buck Island, by reducing total\
    \ water levels by up to 0.81 m. With growth rates of ~70 mm y\u22121 at BIRNM,\
    \ A. palmata colonies could grow as fast as sea-level rise under pessimistic scenarios,\
    \ up to 13.4 mm y\u22121 in St. Croix. The primary beach habitat on the western\
    \ side of the island has migrated to the south, and nearly 30% (0.88 ha) of the\
    \ total beach area has been lost due to storm-driven erosion. A significant effort\
    \ to restore A. palmata populations at BIRNM could result in substantial increases\
    \ in coral cover and reef-accretion potential until the end of the century. Models\
    \ indicate that, if successful, restoration efforts by 2030 could sustain these\
    \ increases. Overall, only the southern reef crest exhibited marginally positive\
    \ reef-accretion potential. This disturbance highlights the importance of physical\
    \ erosion from storms\u2014a process not considered explicitly in the carbonate\
    \ budgets. Restoration of a living barrier of A. palmata colonies could increase\
    \ wave breaking across the reef crest."
  7: "The study evaluates the potential of coral reef restoration, specifically increasing\
    \ Acropora palmata cover, to mitigate coastal flooding and keep pace with sea-level\
    \ rise: \"Our models indicate that...successful restoration (i.e., +30% A. palmata\
    \ cover) could allow the BIRNM reef crest to keep pace with sea-level rise to\
    \ 2100 (i.e., ~0.5 m; Fig.3). This outcome would reduce total water levels during\
    \ storms by >10% (0.81 m) under higher sea-level-rise scenarios...\"\n\nSea-level\
    \ rise, increased frequency of severe storms due to climate change, and bioerosion\
    \ are identified as key drivers impacting reef accretion and coastal flooding:\
    \ \"Given the prediction that climate change will increase the frequency of severe\
    \ storms11, the ability of coral reefs to mitigate the worst impacts of storms\
    \ will become increasingly important in the future.\"\n\nRestoration (+30% A.\
    \ palmata cover) could allow reef crest to keep pace with ~0.5 m sea-level rise\
    \ by 2100. This outcome would reduce total water levels during storms by >10%\
    \ (0.81 m) under higher sea-level-rise scenarios: \"...successful restoration\
    \ (i.e., +30% A. palmata cover) could allow the BIRNM reef crest to keep pace\
    \ with sea-level rise to 2100 (i.e., ~0.5 m; Fig.3). This outcome would reduce\
    \ total water levels during storms by >10% (0.81 m) under higher sea-level-rise\
    \ scenarios... They calculate a 3.08 mm y\u22121 offset from maximum Holocene\
    \ reef accretion. They mention a restoration cost of ~$25 USD per A. palmata fragment.\"\
    \n\nThe study uses carbonate-budget and coral-growth models. The specific projections\
    \ are directly applicable to the baseline ecological and geomorphic setting of\
    \ BIRNM: \"Our carbonate-budget and coral-growth models necessarily present a\
    \ simplified version of reality...The specific projections from our model are\
    \ only directly applicable to the baseline ecological and geomorphic setting of\
    \ BIRNM...\"\n\nRestoration of A. palmata can potentially mitigate coastal flooding\
    \ and keep pace with sea-level rise under moderate emissions scenarios: \"Our\
    \ models indicate that under that scenario significant and successful restoration\
    \ (i.e., +30% A. palmata cover) could allow the BIRNM reef crest to keep pace\
    \ with sea-level rise to 2100 (i.e., ~0.5 m; Fig.3).\"\n\nThe study acknowledges\
    \ uncertainties in reef-accretion potential and the efficacy of large-scale restoration\
    \ amid ongoing disturbance: \"Given both the uncertainties in reef-accretion potential\
    \ and in the overall efficacy of large-scale restoration amid a regime of ongoing\
    \ disturbance...\"\n"
  8: "The paper evaluates the impact of coral restoration on mitigating the effects\
    \ of sea-level rise and coastal flooding by the end of the century: \"whereas\
    \ coral restoration has the potential to minimize climate-change impacts, doing\
    \ nothing to combat erosion would amplify them.\"\n\nSea-level rise and extreme\
    \ weather events, such as storms, are impacting coastal communities and reef systems:\
    \ \"Coastal \uFB02ooding and erosion due to extreme weather events have significant\
    \ impacts on coastal communities globally, and those impacts are projected to\
    \ increase as sea-level rises over the coming century.\"\n\nRestoration could\
    \ increase reef elevation to match the lowest sea-level rise predictions (~0.30\
    \ m) and potentially avoid ~0.2 m increases in wave-driven water levels during\
    \ storms; without restoration, erosion could lead to a 0.96 m rise in water levels\
    \ under the SSP5-8.5 scenario: \"by increasing reef elevation, restoration could\
    \ keep water depths at the reef crest near the lowest predictions of sea-level\
    \ rise for the end of the century (i.e., ~0.30 m31) ... projected ~0.2 m increase\
    \ in wave-driven water levels during storms ... even under pessimistic emissions-reduction\
    \ scenarios.\"\n\nThe analysis is based on modeling and carbonate budget estimates\
    \ from reef-census data and surveys of bioeroding species: \"For each site, carbonate\
    \ budgets were estimated by analyzing reef-census data collected in July 2016,\
    \ following a modi\uFB01cation of Hubbard et al.37 and the ReefBudget v1 methodology.\"\
    \n\nCoral restoration has the potential to combat elevation loss, minimize climate\
    \ change impacts, and could serve as a key component in the solutions portfolio\
    \ for managing coastal protection: \"We conclude that restoration has the potential\
    \ to be more than a stop-gap measure: it can provide an important component of\
    \ the portfolio of solutions that communities and managers can draw from to support\
    \ the persistence of coral reefs and their function as coastal barriers into the\
    \ future.\"\n"
  9: 'Source material here.

