Drivers of Risk:
  1: Climate change, specifically as represented by representative concentration pathways
    (RCPs), impacts economic growth and income distribution across shared socioeconomic
    pathways (SSPs).
  3: Climate change impacts poverty through pathways like prices, assets, opportunities,
    and productivity.
  4: Climate change, weather volatility, temperature increases, precipitation anomalies,
    climate tipping points (Permafrost melt, ice sheet disintegration, and Amazon
    die-back).
  5: Temperature and precipitation variation affects income disparities, with agricultural
    activity being a significant channel for exacerbating inequality.
  8: The analysis considers different socioeconomic pathways (SSPs) with varying challenges
    to mitigation and adaptation as drivers of risk.
  9: The key drivers impacting outcomes are climate change scenarios, specifically
    different Representative Concentration Pathways (RCPs) and Shared Socioeconomic
    Pathways (SSPs).
  10: Different Shared Socioeconomic Pathways (SSPs) and Representative Concentration
    Pathways (RCPs) impacting poverty levels.
  11: Climate change, including the potential impact of tipping points.
  13: Primary drivers are economic production and fossil fuel use, as they contribute
    to climate change.
  15: The 'middle-of-the-road' scenario (SSP2-RCP 4.5) drives the risk.
  16: No specific drivers of risk identified on this page.
Evaluation overview:
  1: Poverty, specifically extreme poverty, is the outcome being evaluated.
  3: Climate change remains a significant challenge for future socioeconomic development,
    with many being pushed into poverty.
  4: Impact of climate change on productivity, poverty and inequality.
  8: The paper evaluates the impact of climate change on GDP per capita, income inequality
    (Gini index), population size, and extreme poverty.
  9: The page evaluates the impact of climate change on global economic growth and
    inequality.
  10: Effects of climate on global poverty measured in millions of people falling
    into poverty levels.
  11: The effect of climate change on poverty across different poverty thresholds
    ($1.90, $3.20, $5.50 per day).
  12: The page evaluates the cumulative effect of climate tipping points on global
    GDP and climate-attributable poverty thresholds.
  13: The evaluation focuses on the impact of climate change on poverty, specifically
    measuring people in extreme poverty who live on less than $1.90 per day.
  15: This study evaluates the impact of climate change on extreme poverty.
  16: No specific evaluation overview provided on this page.
Highlights:
  1: Forecasts of climate-driven poverty increases in this paper are lower than estimates
    made using bottom-up approaches. Tipping points are a significant threat to future
    socioeconomic development and drive significant increases in poverty across scenarios.
    Long-term effects of climate change on poverty could be mitigated with a sustained
    effort to improve income distribution.
  2: Balancing technology's role in economic growth and climate impact mitigation
    is crucial for addressing both climate change and human development challenges.
  3: Climate change has direct impacts on poverty via agricultural losses, yield reductions,
    and asset destruction from climate-related disasters.
  4: Climate change can increase inequalities between and within countries.
  5: Agricultural yields directly affect rural incomes and indirectly affect poor
    urban populations through food prices, increasing income inequality.
  8: Future levels of average per capita GDP increase most rapidly in SSP5. Scenarios
    with greater challenges to adaptation show lower long-term growth in per person
    economic production and consumption. Income distribution in the No Climate scenarios
    are the most unequal in worlds of high challenges to adaptation. SSP3 is the scenario
    with the greatest population growth.
  9: "Significant economic impacts are projected, with GDP reductions up to \u2212\
    3.2% by 2070, and a substantial increase in global inequality driven by temperature,\
    \ as indicated by changes in the global Gini index."
  10: SSP1-RCP 2.6 posits possible reduction to 4 million pushed into poverty by 2070
    with effective socio-economic and mitigation strategies; SSP3-RCP 6.0 shows highest
    increase to 130 million by 2070 with pessimistic assumptions.
  11: Climate change is projected to increase the number of people living in poverty,
    with the impact being more pronounced at lower income thresholds. Tipping points
    could further exacerbate the problem.
  12: Global income inequality improvements are needed to eliminate climate-induced
    poverty, requiring a 5% improvement through 2070 in an RCP 2.6 scenario.
  13: Significant uncertainty characterizes the future impact of climate change on
    human development, and human choices related to mitigation can reduce climate-induced
    poverty.
  15: Climate change (under SSP2-RCP 4.5) is projected to push an additional 40 million
    people into extreme poverty by 2050.
  16: No important outcomes highlighted on this page.
Methodology:
  1: The International Futures (IFs) model is used to project poverty across income
    thresholds for 175 countries through 2070, combining RCPs with economic growth
    and inequality series from the SSPs.
  2: The analysis focuses on macro-level relationships between climate change and
    human development, rather than micro-level dynamics.
  4: Uses a damage function to gauge economic losses from worsening climate conditions;
    operationalizes the impact of tipping points using findings from Dietz et al.
    (2021) across different socioeconomic development and temperature change combinations.
  5: The analysis uses SSPs, RCPs, and IFs to model economic production, income distribution,
    and population change for 175 countries from 2017 to 2070, utilizing temperature
    trajectories and damage functions to capture climate impacts.
  7: Poverty within the IFs model is calculated using a log-normal income distribution,
    adjusted annually for consumption changes and Gini index.
  8: The analysis uses SSP scenarios (SSP1, SSP2, SSP3, SSP4, SSP5) and the IFs scenario
    to project future trends in GDP, inequality, population, and poverty up to 2070,
    under both climate and no-climate scenarios.
  9: The analysis relies on the DICE model damage function to project the impact of
    climate change on global economic production.
  10: Analysis based on SSP and RCP scenarios projecting climate impacts on poverty
    without longitudinal error bands.
  11: The analysis uses integrated assessment models and Shared Socioeconomic Pathways
    (SSPs) combined with Representative Concentration Pathways (RCPs) to project future
    poverty levels under different climate scenarios. The analysis considers the potential
    impact of tipping points by incorporating additional shocks to simulate a worst-case
    scenario.
  12: The sensitivity of the IFs-RCP model to changes in the Gini coefficient for
    income inequality was tested to establish a relationship between inequality and
    climate-induced poverty.
  15: The analysis uses the IFs (International Futures) software platform, which includes
    poverty projections by income threshold and damage function sensitivity analysis.
    Replication instructions are available online.
  16: No details on methodology provided on this page.
More Notes:
  1: The study acknowledges the tension between fossil fuel-based economic development
    (which alleviates poverty) and climate change (which exacerbates it).
  10: The analysis focuses on additional poverty due to climate change compared to
    scenarios without climate impacts.
  16: No additional notes for this page.
No relevant information:
  18: This page consists of references, author affiliations, and publisher notes,
    and does not contain any information about the methodology, results, or evaluation
    of the paper itself.
Quantitative material:
  1: "Climate change-attributable extreme poverty will grow to 25 million people by\
    \ 2030 (range: 18 to 30), 40 million by 2050 (range: 9 to 78), and 32 million\
    \ by 2070 (range: 4 to 130). If climatic tipping points are passed, the climate-attributable\
    \ extreme poverty grows to 57 million people by 2030 (range: 40\u201372), 78 million\
    \ by 2050 (range: 18\u2013193), and 56 million by 2070 (range: 7\u2013306). A\
    \ 10% improvement of global income inequality (range: 5\u201315%) is required\
    \ to mitigate baseline effects of climate change on extreme poverty."
  4: If all tipping points are surpassed, the social cost of carbon will increase
    by about 25% by 2100.
  5: A 1% increase in temperature raises the Gini coefficient for income inequality
    by 0.5 points.
  7: RCP 8.5 results in a steady temperature increase reaching 22.4 degrees by 2070.
  8: By 2070, per capita GDP grows to $97.4 thousand USD in SSP5, $69.7 thousand USD
    in SSP1, $48.8 thousand in SSP2, $39.6 thousand in SSP4, and $25.8 thousand in
    SSP3. SSP3 population increases to 11.3 billion by 2070, while SSP1 and SSP5 populations
    decline.
  9: "The analysis provides quantitative information on GDP reduction due to climate\
    \ change, with cumulative economic impacts ranging from \u2212$1.1 trillion to\
    \ \u2212$344.1 trillion across different scenarios and years, and projected increases\
    \ in inequality as measured by changes in the global Gini index."
  10: 'Projected increase in poverty: SSP1-RCP 2.6 shows 9 million in poverty by 2050
    and 4 million by 2070; SSP3-RCP 6.0 shows 30 million by 2030, 78 million by 2050,
    and 130 million by 2070.'
  11: Table 4 provides the effect of climate on poverty across thresholds measured
    in millions in 2030, 2050, and 2070 under different scenarios (IFs-RCP 6.0, SSP1-RCP
    2.6, SSP2-RCP 4.5, SSP3-RCP 6.0, SSP4-RCP 6.0, SSP5-RCP 8.5). Fig. 4 shows the
    climate-attributable percent of the impoverished population in the IFs-RCP 6.0
    scenario across poverty thresholds. By 2070, nearly 40% of the population living
    on less than $1.90 per day will be attributable to climate change in an IFs-RCP
    6.0 scenario, nearly 30% for $3.20 per day, and nearly 20% for $5.50 per day.
  12: The table presents quantitative data on the cumulative effect of tipping points
    on global GDP measured in trillions of 2011 US$ across different scenarios for
    the years 2030, 2050, and 2070.
  13: Quantitative data includes scenarios that describe reductions in global income
    inequality by one, five, ten, fifteen, and twenty percent.
  15: The 'middle-of-the-road' scenario (SSP2-RCP 4.5) leads to an additional 40 million
    people in extreme poverty by 2050 relative to a world without climate change.
  16: No quantitative information is provided on this page.
sourcematerial:
  1: "Source material here.\nFossil fuel-based economic development both causes climate\
    \ change and contributes to poverty alleviation, creating tensions across societal\
    \ efforts to maintain growth, limit climate damage, and improve human development.\
    \ [...] to model how climate change may affect future poverty with the International\
    \ Futures (IFs) model, projecting poverty across income thresholds for 175 countries\
    \ through 2070. Central tendency scenarios with climate effects compared with\
    \ scenarios that do not model climate change show that climate change-attributable\
    \ extreme poverty will grow to 25 million people by 2030 (range: 18 to 30), 40\
    \ million by 2050 (range: 9 to 78), and 32 million by 2070 (range: 4 to 130) though\
    \ overall levels of global poverty decline. If climatic tipping points are passed,\
    \ the climate-attributable extreme poverty grows to 57 million people by 2030\
    \ (range: 40\u201372), 78 million by 2050 (range: 18\u2013193), and 56 million\
    \ by 2070 (range: 7\u2013306). To mitigate baseline effects of climate change\
    \ on extreme poverty, an improvement of global income inequality of 10% is required\
    \ (range: 5\u201315%). [...] This paper introduces scenarios that combine RCPs\
    \ with economic growth and inequality series from the SSPs, creating alternative\
    \ climate-informed socioeconomic projections. Forecasts of climate-driven poverty\
    \ increases in this paper are lower than estimates made using bottom-up approaches.\
    \ [...] Tipping points are a significant threat to future socioeconomic development\
    \ and drive significant increases in poverty across scenarios. [...] Long-term\
    \ effects of climate change on poverty could be mitigated with a sustained effort\
    \ to improve income distribution.\n"
  2: " \nThe manuscript introduces alternative scenarios using the International Futures\
    \ (IFs) modeling system. [...] representative concentration pathways (RCPs) that\
    \ rely on temperature change to drive outcomes. The general effect of climate\
    \ change on economic growth is captured using the DICE model damage function.\
    \ [...] We rely on both the IFs model\u2019s endogenous projections as well as\
    \ the shared socioeconomic pathways (SSPs). [...] Technology plays a cross-cutting\
    \ role in both amplifying the magnitude of climate change through increased economic\
    \ activity and potentially mitigating future greenhouse gas emissions.\n"
  3: 'yaml

    Evaluation overview: "The results of this analysis show that climate change will
    remain a significant challenge for future patterns of socioeconomic development,
    with tens of millions pushed into poverty because of climate change even in more
    optimistic scenario combinations."

    Drivers of Risk: "Hallegatte et al. (2016) focus on four pathways through which
    climate change impacts poverty: prices, assets, opportunities, and productivity."

    Highlights: "Climate change also has direct impacts on poverty via agricultural
    losses, reductions in yields, and destruction of assets from climate-related disasters
    and shocks, all of which contribute to the loss of income"

    '
  4: "Source material: Climate change and weather volatility have uneven impacts across\
    \ countries... While almost all climatic effects can contribute to rising inequality,\
    \ precipitation anomalies and rising temperatures lead to the most statistically\
    \ significant increases in income inequality within countries... Climate tipping\
    \ points are \u201Ccritical thresholds\u201D within natural systems that, once\
    \ surpassed, will cause irreversible damage characterized by feedback which is\
    \ uncertain and non-linear... Permafrost melt, ice sheet disintegration, and Amazon\
    \ die-back represent a few of the tipping points that threaten biodiversity and\
    \ human wellbeing through the collapse of ecosystem services. We capture the impact\
    \ of climate change on productivity via a damage function, which is a simplified\
    \ approach to gauge the economic losses from worsening climate conditions, such\
    \ as a rise in mean temperature... A study by Dietz et al. (2021) models the impact\
    \ of tipping points on the social cost of carbon (SCC) for 180 countries, finding\
    \ that if all tipping points are surpassed, the SCC will increase by about 25%\
    \ by 2100... We also use the findings from Dietz et al. (2021) to operationalize\
    \ the impact of tipping points in our analysis across all the alternative socioeconomic\
    \ development and temperature change combinations... Inequality is the second\
    \ driver of poverty explored in this paper. Some studies show that climate change\
    \ will increase inequalities between and within countries."
  5: "The study examines the extent to which temperature and precipitation variation\
    \ affected income disparities, identifying agricultural activity as one of the\
    \ most important channels through which climate change exacerbates inequality.\
    \ A 1% increase in temperature raises the Gini coefficient for income inequality\
    \ by 0.5 points on a 0\u2013100-point scale. We use SSPs, RCPs, and IFs to model\
    \ economic production, income distribution, and population change for 175 countries\
    \ from 2017 to 2070, a process that involves measuring temperature changes, damage\
    \ functions, and socioeconomic pathways. Depressed agricultural yields directly\
    \ affect rural income and likely affect poor urban populations indirectly by jeopardizing\
    \ their real income and consumption patterns via increased food prices."
  7: "Source material here.\nwithout climate effects to serve as a baseline that allows\
    \ us to capture the climate-attributable impact of each SSP-RCP and IFs-RCP scenario.\
    \ The IFs model includes a six-sector general equilibrium model of the economy\
    \ (Burgess et\_  al.  2023; Hughes et\_  al. 2019; Hughes et\_  al. 2021; Hughes\
    \ and Narayan 2021), which simulates production in each sector using Cobb-Douglas\
    \ type production functions that incorporate sector-specific labor (LABS), capital\
    \ (KS), total factor productivity (TEFF), and utilization factor (CAPUT). The\
    \ model initializes inter-sectoral flows with GTAP sectoral-flow data and uses\
    \ a set of input-output tables grouped by per capita income ranges to establish\
    \ sector-flow pathways as economies become more developed. Household income is\
    \ determined by labor earnings and business income, after adjustments for taxes\
    \ paid and transfers received, and this income can be used for consumption or\
    \ savings. The poverty calculation in IFs is based on the assumption of a log-normal\
    \ income distribution (Hughes et\_al. 2009; Moyer et\_al. 2022). This distribution\
    \ is updated annually based on changes in projected consumption and the Gini index\
    \ of inequality. Poverty rates are computed by determining the cumulative density\
    \ at the threshold consumption level (the threshold varies depending on the level\
    \ of poverty analyzed), and the poverty headcount is obtained by multiplying the\
    \ poverty rate by the population. RCP 2.6 has an increase of average global temperature\
    \ to 20.6 degrees centigrade by 2070. RCP 4.5 reaches a temperature of 21.4 degrees\
    \ by 2070, while RCP 6.0 reaches a temperature of 21.3 degrees by 2070. RCP 8.5\
    \ has a steady increase of average global temperature which reaches 22.4 by 2070.\n"
  8: "yaml\n\"Evaluation overview\": \"Each graph shows global forecasts for all No\
    \ Climate scenarios in solid lines for a GDP per capita at PPP measured in 2011\
    \ USD, b Gini index for income inequality measured on a 0\u20131 scale, c population\
    \ measured in millions, and d extreme poverty (less than $1.90 per day) measured\
    \ in millions.\"\n\"Drivers of Risk\": \"Future levels of average per capita GDP\
    \ increase most rapidly in SSP5, a world of high growth and investment and high\
    \ challenges to mitigation (Dellink et al. 2017). Income distribution in the No\
    \ Climate scenarios are the most unequal in worlds of high challenges to adaptation,\
    \ such as SSP3 and SSP4 (Rao et al. 2019). Scenarios with fewer challenges to\
    \ adaptation, such as SSP1 and SSP5, show much more equal distributions of resources.\"\
    \n\"Quantitative material\": \"By 2070, per capita GDP grows to $97.4 thousand\
    \ USD in SSP5...with SSP3 growing to $25.8 thousand USD by 2070...SSP3 is the\
    \ scenario with the greatest population growth, increasing to 11.3 billion by\
    \ 2070...Scenarios with much lower population growth\u2014SSP1 and SSP5\u2014\
    reflect global populations that are declining by 2070.\"\n\"Methodology\": \"\
    Each graph shows global forecasts for all No Climate scenarios in solid lines\
    \ for a GDP per capita...Dotted lines represent the same socioeconomic development\
    \ scenario with the impact from the most likely RCP combi-nation...Future levels\
    \ of average per capita GDP increase most rapidly in SSP5...\"\n\"Highlights\"\
    : \"Future levels of average per capita GDP increase most rapidly in SSP5...Scenarios\
    \ with greater challenges to adaptation show lower long-term growth in per person\
    \ economic production and consumption...Income distribution in the No Climate\
    \ scenarios are the most unequal in worlds of high challenges to adaptation...SSP3\
    \ is the scenario with the greatest population growth...\"\n"
  9: " \nThe page evaluates the impact of climate change on global economic growth\
    \ and inequality: \"4.1 Climate effects on economic growth and inequality...the\
    \ impact of climate change on global economic production is projected to reduce\
    \ GDP across all scenarios.\"\n\nThe key drivers impacting outcomes are climate\
    \ change scenarios, specifically different Representative Concentration Pathways\
    \ (RCPs) and Shared Socioeconomic Pathways (SSPs): \"According to the DICE model\
    \ damage function, the impact of climate change on global economic production\
    \ is projected... by 2030, the GDP reduction ranges... for 2030, 2050, and 2070\
    \ (Table 2).\"\n\nThe analysis provides quantitative information on GDP reduction\
    \ due to climate change... and projected increases in inequality...: \"By 2030,\
    \ the GDP reduction ranges from \u22120.2 to \u22120.6%, while by 2050, it ranges\
    \ from \u22120.8 to \u22121.5% and by 2070, the GDP reduction ranges from \u2212\
    0.8 to \u22123.2% (Table 2)... the increase in global inequality driven by temperature\
    \ is projected... (Table 3).\"\n\nThe analysis relies on the DICE model damage\
    \ function to project...: \"According to the DICE model damage function, the impact\
    \ of climate change on global economic production is projected...\"\n\nSignificant\
    \ economic impacts are projected, with GDP reductions up to \u22123.2% by 2070,\
    \ and a substantial increase in global inequality...: \"By 2030, the GDP reduction\
    \ ranges from \u22120.2 to \u22120.6%, while by 2050... and by 2070, the GDP reduction\
    \ ranges from \u22120.8 to \u22123.2% (Table 2)... The increase in global inequality\
    \ driven by temperature is projected...\"\n"
  10: "Source material here.\nEach graph shows the effect of climate on global poverty\
    \ measured in millions: a extreme poverty (less than $1.90 per day\u2014top left),\
    \ b poverty (less than $3.20 per day\u2014top right), and c moderate poverty (less\
    \ than $5.50 per day\u2014bottom left)\n\nFigure 3 displays the number of people\
    \ who are expected to fall into extreme poverty due to climate change in each\
    \ scenario.\n\nOn the other hand, the more pessimistic SSP3-RCP 6.0 scenario,\
    \ which models slow socioeconomic development and moderately high levels of emissions,\
    \ leads to an increase in the number of people in poverty by 30 million by 2030,\
    \ 78 million by 2050, and 130 million by 2070.\n\nSSP1-RCP 2.6 scenario, which\
    \ assumes improved socioeconomic development and low emissions, shows an increase\
    \ of 9 million people in poverty, a reduction from the level forecast for 2030.\
    \ This scenario suggests that if socioeconomic development and climate change\
    \ mitigation efforts are effectively balanced, the number of people pushed into\
    \ poverty by climate change could be as low as 4 million by 2070.\n\nThe uncertainty\
    \ treatment here does not use longitudinal error bands and instead considers the\
    \ broad assumptions made across SSP and RCP scenarios to reflect a broad treatment\
    \ of future uncertainty.\n\nThe phrase \u201Cpushed into extreme poverty\u201D\
    \ is used to highlight the marginal difference between the various climate scenarios\
    \ and a scenario where the climate impacts are not included.\n"
  11: 'Source material: The full range of results for the population pushed into poverty
    under different income thresholds is provided in Fig. 3 and Table 4. By 2070,
    nearly 40% of the population living on less than $1.90 per day will be attributable
    to climate change in an IFs-RCP 6.0 scenario. Previous analyses in this manuscript
    did not consider the potential impact of tipping points, which could have catastrophic
    effects on socioeconomic development. To address this, we incorporated additional
    shocks to simulate a worst-case scenario aligned with estimates from recent literature
    (Dietz et al. 2021). These tipping points are estimated to increase the number
    of people living in poverty across various income thresholds.'
