  13: 'Source material here.

    The paper mentions, "extreme poverty would be approximately ten percent globally.
    In the more extreme climate scenario of RCP 8.5, a fifteen percent reduction in
    income inequality would be necessary." This provides context for the evaluation
    overview and quantitative material regarding poverty rates and income inequality
    reductions.


    It states, "Economic production and fossil fuel use are the primary drivers of
    climate change," which explains the drivers of risk.


    For highlights, the following quotes are relevant: "We show that the future impact
    of climate change on human development is characterized by significant uncertainty
    and that human choices related to mitigation can significantly reduce the climate-induced
    burden on poverty."

