Drivers of Risk:
  1: Average temperature, daily temperature variability, total annual precipitation,
    the annual number of wet days, and extreme daily rainfall.
  2: Temperature and precipitation changes, specifically using first-differenced forms.
  3: Changes in all climate variables, with a focus on average temperature changes.
  4: "Changes in annual mean temperature, daily temperature variability, total annual\
    \ precipitation, the annual number of wet days (>1\u2009mm), and extreme daily\
    \ rainfall"
  6: Changes in climatic conditions, particularly average temperature, rainfall changes,
    day-to-day temperature variability
  7: Daily temperature
  8: Annual average temperature, daily temperature variability, total annual precipitation,
    the annual number of wet days, and extreme daily rainfall.
  9: Annual mean temperature (Tr,y), daily temperature variability, total annual precipitation,
    extreme daily precipitation, and number of wet days.
  10: The drivers of risk are changes in primary climate variables and their interaction
    terms, including temperature. The specific climate variables used are obtained
    from CMIP-6 climate model outputs.  The study also considers the influence of
    moderating variables representing long-term climatic conditions.
  11: Emission mitigation from the AR6 Scenario Explorer and Database hosted by IIASA.
  12: Annual mean temperature, daily temperature variability, total annual precipitation,
    the number of wet days, and extreme daily precipitation are identified as drivers
    impacting economic growth rates.
  13: Annual mean temperature, daily temperature variability, total annual precipitation,
    the number of wet days, and extreme annual precipitation are the climate variables
    considered as drivers.
  15: "Projected changes in climate variables including mean temperature, temperature\
    \ variability, total precipitation, wet days, and extreme precipitation from 1979\u2013\
    2019 to 2035\u20132065 under high-emission scenario SSP5-RCP8.5."
  16: Annual mean temperature, daily temperature variability, total annual precipitation,
    number of wet days, and extreme daily precipitation are considered as drivers.
  17: Extreme emission scenarios (RCP 2.6 and RCP8.5) are drivers impacting the outcome.
  18: The drivers of risk impacting macroeconomic growth include Average annual temperature,
    Daily temperature variability, Total annual precipitation, Number of wet days,
    and Extreme daily precipitation.
  20: Future climate change under RCP8.5 (implicitly, changes in climate variables).
Evaluation overview:
  1: Macroeconomic climate-change damages, specifically income reduction.
  2: Macroeconomic damages from physical climate change.
  3: The study evaluates projected reductions in per capita income due to changes
    in climate variables.
  4: Sub-national income per capita
  6: Economic damages resulting from climate change until 2049
  7: Income
  8: Impacts on macroeconomic output and economic growth rates.
  9: "Economic growth rates (\u0394lgrp) and level of output (lgrpr,y) are being evaluated\
    \ in relation to climate variables."
  10: The study constructs projections of future economic damage (specifically, changes
    in Gross Regional Product per capita or GRPpc) from climate change.
  11: Estimates of the aggregate costs of emission mitigation.
  12: Economic growth rates at the sub-national level are being evaluated for their
    sensitivity to climate variables.
  13: Economic growth is being evaluated.
  14: The analysis evaluates economic impacts in terms of changes in income per capita.
  16: Climate damages in 2049 are being evaluated.
  17: Committed damages are being evaluated.
  18: Macroeconomic growth is the outcome being evaluated.
  20: Economic damage from future climate change.
Highlights:
  1: The world economy is committed to a substantial income reduction in the near
    term, outweighing mitigation costs. Committed losses are projected for all regions
    except those at very high latitudes. The largest losses are committed at lower
    latitudes in regions with lower cumulative historical emissions and lower present-day
    income.
  2: "Committed damages comprise a permanent income reduction of 19% on average globally\
    \ (population-weighted average) in comparison with a baseline without climate-change\
    \ impacts (with a likely range of 11\u201329%)."
  3: Climate damages are considerably larger than mitigation costs. Damages from variability
    and extremes primarily arise through changes in average temperature.
  4: "Accounting for daily temperature variability causes the largest increase in\
    \ overall damages relative to frameworks that only consider changes in annual\
    \ average temperature (4.9 percentage points, likely range 2.4\u20138.7 percentage\
    \ points)."
  6: Damages are committed until mid-century and are already much larger than mitigation
    costs; accounting for spatial spillovers can amplify the overall magnitude and
    heterogeneity of impacts; projected damages are probably conservative by excluding
    spatial spillovers; assessment does not consider impacts from heatwaves, sea-level
    rise, tropical cyclones and tipping points, as well as non-market damages
  7: Ripple resonance amplifies economic welfare loss from weather extremes.
  8: Daily temperature variability, total annual precipitation, the number of wet
    days, and extreme daily rainfall have robustly identified impacts on macroeconomic
    output across different climate datasets, spatial aggregation schemes, specifications
    of regional time trends and error-clustering approaches.  These climate variables
    were identified as having independent effects on economic output.
  9: The persistence of climate impacts on economic growth rates is a key determinant
    of the long-term magnitude of damages. The paper argues that methods inferring
    persistence have typically used lagged climate variables. The chosen model specification
    is conservative with respect to the persistence of impacts and the magnitude of
    future damages.
  10: The method implicitly compares a future climate-change scenario to a no-climate-change
    baseline. The analysis produces an ensemble of future GRPpc trajectories, reflecting
    uncertainty in climate models, empirical models, and regression parameters.
  11: Estimates of mitigation costs begin in 2020 for one IAM, and in 2010 for two
    others, but the choice to begin comparison with damage estimates in 2020 is conservative.
  12: The figure shows the persistence of historical climate impacts on economic growth
    rates, demonstrating how different climate variables affect economic growth over
    time, moderated by other climate variables.
  13: Including four lags for precipitation variables and eight to ten lags for temperature
    variables does not lead to overfitting.
  14: The analysis shows a downward trend in income per capita across most regions
    due to climate damages and mitigation costs, with variations in projected impacts
    across different world regions.
  15: Significant increase in mean temperature globally; polar regions show increased
    temperature variability; general increase in total and extreme precipitation.
  16: "The contribution of different climate variables to the overall effects of an\
    \ increase in annual mean temperature of 1\xB0C is quantified. Empirical models\
    \ accounting for all climate variables are compared against those that only consider\
    \ annual mean temperature."
  17: Committed damages vary based on GDP and cumulative emissions, with central tendencies
    and distributions clearly marked.
  18: Several plausible physical mechanisms supported by empirical evidence exist
    for most climate variables impacting macroeconomic growth. The number of wet days
    impacts on economic growth are supported by empirical data, but lack specific
    references explaining this connection.
  20: This study projects substantially higher economic damages (61.6% by 2100 under
    RCP8.5) compared to other panel-based empirical studies (Burke et al. (2015),
    Kahn et al. (2019), Kalkuhl & Wenz (2020)).
Methodology:
  1: Empirical approach using data from 1,600 regions worldwide over the past 40 years,
    using fixed-effects panel regression models.
  2: Fixed-effects distributed lag models with up to ten lags for temperature and
    four for precipitation using first-differenced climate variables, combined with
    CMIP-6 climate models and a Monte Carlo procedure to estimate uncertainty. This
    produces projections of the exogenous impact of future climate conditions on the
    economy relative to socio-economic baselines.
  3: Empirical models of climate impacts on economic output are used with a robust
    lower bound on their persistence. Uncertainty is estimated using a Monte Carlo
    procedure, sampling from physical climate models, empirical models with different
    lags, and bootstrapped estimates of regression parameters.
  4: Empirical models, climate models, and model parameter uncertainty are used to
    estimate economic damages; Results diverge at the 5% level in 2049
  6: Empirical impact models, capping moderating variables at the 95th percentile
    of the historical distribution, spatial-lag model to assess spillovers
  7: Analysis focuses on the relationship between daily temperature and income in
    the US.
  8: Uses historical (1979-2019) daily temperature and precipitation data from the
    W5E5 database and future climate data (2015-2100) from CMIP-6 under RCP8.5 and
    RCP2.6 scenarios, bias-adjusted and statistically downscaled. Historical economic
    data are from the DOSE database. Future socio-economic data are from SSP2.  Calculates
    climate variables from the distribution of daily temperature and precipitation
    at the grid-cell level.
  9: Panel regression models with fixed effects and time trends are used to analyze
    the impact of climate on economic growth rates. Distributed lag models are employed
    to assess the persistence of climate impacts. The analysis uses area-weighting
    to aggregate grid-cell-level climate measures, GDPpc, and population to the level
    of the first administrative unit below the national level. The historical period
    used for calculating percentiles of precipitation is 1979-2019.
  11: Uses AR6 Scenarios Database World v1.1 for IAMs providing global GDP and population
    under SSP2 baseline and SSP2-RCP2.6.  Uses results from MESSAGE-GLOBIOM 1.0, REMIND-MAgPIE
    1.5, and AIM/GCE 2.0, beginning comparison with damage estimates in 2020.
  12: A panel-based fixed-effects distributed lag model is used to assess the effects
    of climate variables on sub-national economic growth rates, using first-differenced
    climate variables. The models use ten lags initially, with subsequent lags removed
    based on statistical significance and information criteria.
  13: A panel-based fixed-effects distributed lag model is used to estimate the effects
    of climate on economic growth using historical data. Lags are incrementally removed
    for one climate variable at a time. Bayesian and Akaike information criteria,
    within-region R^2, and the number of observations are used to determine optimal
    lag structures.
  14: Projections are made for separate empirical specifications, including preferred,
    pure growth, and pure level effects, under emission scenario RCP8.5.
  15: "Changes are expressed relative to historical variability, calculated as the\
    \ standard deviation of detrended climate variables over 1979\u20132019."
  16: Empirical models are used to estimate climate damages and marginal effects.
    Block-bootstrap resampling (1,000 resamples) from three different empirical models
    using eight, nine, or ten lags of temperature terms is performed to obtain confidence
    intervals.
  17: Quartiles are defined using a population weighting, as are the average committed
    damages across each quartile group. The analysis accounts for uncertainty arising
    from the choice of lags in the empirical models, uncertainty in the empirical
    model parameter estimates, as well as the climate model projections.
  18: The information presented is a summary of physical mechanisms linking climate
    variables to macroeconomic growth, supported by empirical evidence (except for
    the number of wet days).
  20: Uses fixed-effects panel regressions. Baseline specification without lags considered
    growth or level effects. Considers five climate variables with eight to ten lags.
More Notes:
  1: The study focuses on the near term to minimize uncertainties related to long-term
    projections.
  2: "The authors use a conservative approach by using first-differenced climate variables.\
    \ They argue that using climate variable levels constitutes a model prior of pure\
    \ growth effects, while using first differences constitutes a model prior of purely\
    \ level effects. By using first differences, their approach avoids assumptions\
    \ of infinite persistence of climate impacts on growth. They find statistically\
    \ significant climate impacts on economic growth with time lags of up to approximately\
    \ 8\u201310 years for temperature and up to approximately 4 years for precipitation.\
    \ Under a middle-of-the road scenario of future income development (SSP2), this\
    \ corresponds to global annual damages in 2049 of 38 trillion in 2005 international\
    \ dollars (likely range of 19\u201359 trillion 2005 international dollars)."
  4: Climate models may underestimate future changes in temperature variability and
    extreme precipitation.
  6: Adaptation may provide an opportunity to reduce committed damages.
  9: The paper includes region-specific linear time trends to exclude spurious correlations
    between climate and growth. The analysis allows for heterogeneous effects by interacting
    climate variables with historical average climatic conditions.
  11: Data availability is specified through URLs.
  12: The results are presented with error bars indicating 95% confidence intervals,
    and the models account for within-region effects by clustering standard errors
    by region. The Bayesian and Akaike information criteria are provided for the model.
  13: Extended Data Fig. 2 shows the results when removing lags from different climate
    variables.
  16: The analysis distinguishes between changes in annual mean temperature only and
    changes in annual mean temperature combined with other climate variables.
  17: Differences in committed damages are computed between the upper and lower quartiles
    when countries are ranked by GDP and cumulative historical emissions.
  20: The table compares 'This study' to other studies in terms of resolution, number
    of climate variables, baseline specification (growth or level effects), and number
    of lags.
Quantitative material:
  1: The world economy is committed to a 19% income reduction within the next 26 years
    independent of future emission choices (likely range of 11-29%). Accounting for
    additional climatic components raises estimates by approximately 50%.
  2: Projected global damages are statistically indistinguishable across the two most
    extreme emission scenarios until 2049 (at the 5% significance level).
  3: Projected income reductions under high and low emission scenarios (SSP5-RCP8.5
    and SSP2-RCP2.6 respectively) are shown with 34% and 10% confidence intervals.
    Median committed climate damages are larger than the median mitigation costs in
    2050 by a factor of approximately six (six trillion in 2005 international dollars).
  4: Estimates of the median projected reduction in sub-national income per capita
    across emission scenarios (SSP2-RCP2.6 and SSP2-RCP8.5)
  6: Projection of reductions in income of 19%
  8: Percentage change from the baseline is inconsequential based on the choice of
    socio-economic scenario.
  9: Equations (4), (5), (6), (7), (8), and (9) are presented, representing relationships
    between climate variables and economic growth rates.
  10: The analysis estimates time series of annual GRPpc growth-rate reductions due
    to future climate change.
  11: Global mitigation costs as the percentage difference in global per capita GDP
    between the SSP2 baseline and the SSP2-RCP2.6 emission scenario.
  12: "The analysis quantifies the effects of a 1\xB0C or one standard deviation increase\
    \ (for temperature and precipitation variables, respectively) at the lower quartile,\
    \ median, and upper quartile of moderating variables on economic growth rates."
  13: Information criteria show minima at approximately four lags for precipitation
    variables and ten to eight for temperature variables.
  14: The graphs provide projections of percentage changes in income per capita from
    2020 to 2100.
  15: Changes are expressed as a percentage of the historical variability of each
    measure, ranging from -300% to +300%.
  16: "Plot (a) shows the percentage reduction in damages by 2040 in dollars per capita\
    \ when accounting for different climate variables. Plot (b) shows the cumulative\
    \ marginal effect (% point per \xB0C) of all climate variables versus mean temperature\
    \ only."
  17: The y-axis represents the difference in committed damages between the upper
    and lower quartiles, measured in percentage points, ranging from -10 to 30.
  20: This study predicts 61.6% economic damage by 2100 under RCP8.5.
