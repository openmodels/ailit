  8: "Source material here: Historical daily 2-m temperature and precipitation totals\
    \ (in mm) are obtained for the period 1979\u20132019 from the W5E5 database...Notably,\
    \ these historical data have been used to bias-adjust future climate projections\
    \ from CMIP-6... Daily 2-m temperature and precipitation totals (in mm) are taken\
    \ from 21 climate models participating in CMIP-6 under a high (RCP8.5) and a low\
    \ (RCP2.6) greenhouse gas emission scenario from 2015 to 2100. The data have been\
    \ bias-adjusted and statistically downscaled... Historical economic data come\
    \ from the DOSE database of sub-national economic output...We follow previous\
    \ literature and assess real sub-national output per capita by first converting\
    \ values from local currencies to US dollars...and then account for US inflation...\
    \ Baseline gridded gross domestic product (GDP) and population data for the period\
    \ 2015\u20132100 are taken from the middle-of-the-road scenario SSP2...Population\
    \ data have been downscaled to a half-degree grid by the ISIMIP...which we then\
    \ aggregate to the sub-national level... ...we calculate an array of climate variables\
    \ for which substantial impacts on macroeconomic output have been identified empirically...\
    \ these studies have found evidence for independent impacts on economic growth\
    \ rates from annual average temperature, daily temperature variability, total\
    \ annual precipitation, the annual number of wet days and extreme daily rainfall."
