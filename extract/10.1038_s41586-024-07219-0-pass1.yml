  11: "yaml\nEvaluation overview: \"We obtain IPCC estimates of the aggregate costs\
    \ of emission mitigation from the AR6 Scenario Explorer and Database hosted by\
    \ IIASA... We then estimate global mitigation costs as the percentage difference\
    \ in global per capita GDP between the SSP2 baseline and the SSP2-RCP2.6 emission\
    \ scenario.\"\nDrivers of Risk: \"Specifically, we search the AR6 Scenarios Database\
    \ World v1.1 for IAMs that provided estimates of global GDP and population under\
    \ both a SSP2 baseline and a SSP2-RCP2.6 scenario to maintain consistency with\
    \ the socio-economic and emission scenarios of the climate damage projections.\"\
    \nQuantitative material: \"Mitigation costs are expressed as a percentage difference\
    \ in global per capita GDP... We find five IAMs that provide data for these scenarios...\
    \ Of these five IAMs, we use the results only from the first three that passed\
    \ the IPCC vetting procedure for reproducing historical emission and climate trajectories.\"\
    \nMethodology: \"The study uses IPCC estimates of emission mitigation costs from\
    \ the AR6 Scenario Explorer and Database hosted by IIASA... The analysis begins\
    \ comparison with damage estimates in 2020 to remain conservative, as earlier\
    \ mitigation costs in some IAMs are negligible...The mitigation cost estimates\
    \ before 2020 in these two IAMs are mostly negligible, and our choice to begin\
    \ comparison with damage estimates in 2020 is conservative with respect to the\
    \ relative weight of climate damages compared with mitigation costs for these\
    \ two IAMs.\"\nData availability: \"Data on economic production and ERA-5 climate\
    \ data are publicly available at https://doi.org /10.5281/zenodo.4681306 (ref.\
    \ 62)\_and https://www.ecmwf.int/en/forecasts/datasets/reanalysis-datasets/era5,\
    \ respectively. Data on mitigation costs are publicly available at https://data.ene.iiasa.ac.at/ar6/#/downloads.\
    \ Processed climate and economic data, as well as all other necessary data for\
    \ reproduction of the results, are available at the public repository https://doi.org\
    \ /10.5281/zenodo.10562951\_(ref. 63).\"\nCode availability: \"All code necessary\
    \ for reproduction of the results is available at the public repository https://doi.org\
    \ /10.5281/zenodo.10562951\_(ref. 63).\"\n"
  13: 'The study uses a panel-based fixed-effects distributed lag model to estimate
    the effects of climate on economic growth with ten lags for all climate variables.
    An incremental lag-selection procedure is used to remove lags from different climate
    variables, determining the optimal number of lags that avoid overfitting using
    Bayesian and Akaike information criteria.

    - Extended Data Fig. 2 | Incremental lag-selection procedure using information
    criteria...

    - Starting from a panel-based fixed-effects distributed lag model estimating the
    effects of climate on economic growth using the real historical data (as in equation
    (4)) with ten lags for all climate variables...


    Graphs and descriptions indicate that the optimal number of lags to include is
    approximately four for precipitation variables and eight to ten for temperature
    variables.

    - different rows show results when removing lags from different climate variables...

    - Information criteria show minima at approximately four lags for precipitation
    variables and ten to eight for temperature variables...


    The analysis suggests that including the specified number of lags does not lead
    to overfitting for the climate variables studied.

    - information criteria show minima...indicating that including these numbers of
    lags does not lead to overfitting.

