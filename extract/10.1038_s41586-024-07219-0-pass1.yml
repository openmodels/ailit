  18: 'The page from the paper states: "Extended Data Table 1 | A summary of several
    physical mechanisms that plausibly underlie the impact of the different climate
    variables on macroeconomic growth, with references to empirical evidence... This
    summary is not intended to be an exhaustive list of all mechanisms or references.
    In the case of most climate variables, several plausible physical mechanisms supported
    by empirical evidence exist." This provides context for the Evaluation overview,
    Drivers of Risk, Methodology, and Highlights categories.


    The table''s organization and details, such as "1. Average annual temperature
    - Physical mechanisms: Labor productivity and supply; agricultural productivity..."
    and similar entries for other climate variables, substantiate information for
    Drivers of Risk and Methodology.


    The note "The only exception here is the number of wet days, for which plausible
    mechanisms are listed but empirical evidence does not yet exist (as far as the
    authors are aware)." provides context for the More Notes category.


    The statement, "The use of the number of wet days in the main empirical models
    is therefore guided primarily by the empirical evidence indicating robust impacts
    on economic growth8," pertains to the Assessment Methodology.'
  19: "The evaluation focuses on identifying the \"historical effects of different\
    \ climate variables on sub-national economic growth rates in the period 1979\u2013\
    2019.\" The drivers of risk are identified as \"annual mean temperature (\\( \\\
    Delta T_{av,T_f} \\)), daily temperature variability (\\( \\Delta T_{cv,T_f} \\\
    )), total annual precipitation (\\( \\Delta P_{av,T_f} \\)), annual number of\
    \ wet days (\\( \\Delta P_{nwd,T_f} \\)), and precipitation extremes (\\( \\Delta\
    \ P_{ref,T_f} \\)).\" Quantitative material includes \"point estimates for the\
    \ effect of each climate variable and their interaction term on sub-national economic\
    \ growth rates (in percentage points).\" Methodology details note that the analysis\
    \ \"uses a regression model (equation 4) with ten lags for each climate variable.\"\
    \ Highlights mention that \"an interpretation of the significance of the effects\
    \ of a given climate variable requires an assessment of both the coefficient of\
    \ the climate variable itself as well as its interaction term.\" Additional notes\
    \ state \"The R2, within-region R2 (the R2 along the temporal dimension), Akaike\
    \ information criterion (AIC), Bayesian information criterion (BIC), and number\
    \ of observations are also shown.\""
