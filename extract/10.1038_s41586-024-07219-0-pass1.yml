  4: "The analysis estimates the median projected reduction in sub-national income\
    \ per capita across emission scenarios and climate models due to climate damages.\
    \ \u2014 \"Estimate s of the me dian proje c te d re duc tion in sub -national\
    \ income p er c apit a across emission scenar ios (S SP 2-RCP 2 .6 and  S SP 2-RCP8\
    \ . 5) as well as climate model, empir ic al model and model parameter uncertainty\
    \ in the ye ar in which climate damage s diverge at the 5% level (20 49,  as identif\
    \  ie d in Fig. 1).\"\n\nKey drivers include changes in annual mean temperature,\
    \ daily temperature variability, total annual precipitation, annual number of\
    \ wet days, and extreme daily rainfall. \u2014 \"arising separately from change\
    \ s in annual mean temperature (b), daily temperature variability ( c), total\
    \ annual precipitation (d), the annual number of wet days (>1\u2009mm) (e) and\
    \ extreme daily rainfall (f)\"\n\nProjected economic damages are approximately\
    \ 10 trillion international dollars for daily temperature variability and about\
    \ 1.2 trillion for precipitation-related impacts. \u2014 \"In terms of the relative\
    \ contributions of the different climatic compo- nents to overall damages, we\
    \ find that accounting for daily temperature variability causes the largest increase\
    \ in overall damages relative to empirical frameworks ... (4.9 percentage points,\
    \ likely range 2.4\u20138.7 percentage points, equivalent to approximately 10\
    \ trillion international dollars). Accounting for precipitation causes smaller\
    \ increases in overall dam ages, which are\u2014nevertheless\u2014equivalent to\
    \ approximately 1.2 trillion international dollars.\"\n\nAnalysis accounts for\
    \ sub-national economic impacts of climatic components, using various emission\
    \ scenarios (SSP 2-RCP 2.6 and SSP 2-RCP8.5) and considering uncertainty in model\
    \ parameters. \u2014 \"...across emission scenar ios (S SP 2-RCP 2 .6 and  S SP\
    \ 2-RCP8 . 5) as well as climate model, empir ic al model and model parameter\
    \ uncertainty... a, Impac t s ar ising from all climate var iable s... \"\n\n\
    Daily temperature variability causes the largest increase in overall economic\
    \ damages when compared to impacts from average temperature changes alone. \u2014\
    \ \"In terms of the relative contributions of the different climatic compo- nents\
    \ to overall damages, we find that accounting for daily temperature variability\
    \ causes the largest increase in overall damages relative to empirical frameworks\
    \ that only consider changes in annual average temperature (4.9 percentage points,\
    \ likely range 2.4\u20138.7 percentage points, equivalent to approximately 10\
    \ trillion international dollars).\"\n"
  6: " \nCompared with the fraction of variance explained by the empirical models\
    \ historically (<5%), the projection of reductions in income of 19% may seem large.\n\
    \nWe find that the economic damages resulting from climate change until 2049 are\
    \ those to which the world economy is already committed and that these greatly\
    \ outweigh the costs required to mitigate emissions in line with the 2\xB0C target\
    \ of the Paris Climate Agreement.\n\nDespite assessing several climatic components\
    \ from which economic impacts have recently been identified, this assessment of\
    \ aggregate climate damages should not be considered comprehensive. Important\
    \ channels such as impacts from heatwaves, sea-level rise, tropical cyclones and\
    \ tipping points, as well as non-market damages such as those to ecosystems and\
    \ human health, are not considered in these estimates.\n\nGiven the nonlinear\
    \ response of economic output to annual mean temperature, this is a conservative\
    \ choice that limits the magnitude of damages that we project.\n\nOur simple comparison\
    \ of the magnitude of damages and mitigation costs makes clear that this is primarily\
    \ because damages are indistinguishable across emissions scenarios\u2014that is,\
    \ committed\u2014until mid-century and that they are actually already much larger\
    \ than mitigation costs.\n\nMoreover, our main empirical analysis does not explicitly\
    \ evaluate the potential for impacts in local regions to produce effects that\
    \ \u2018spill over\u2019 into other regions. Such effects may further mitigate\
    \ or amplify the impacts we estimate. \n\nFor simplicity, and owing to the availability\
    \ of data, we compare damages to mitigation costs at the global level.\n\nAdaptation\
    \ may provide an opportunity to reduce them. Moreover, the strong divergence of\
    \ damages after mid-century reemphasizes the clear benefits of mitigation from\
    \ a purely economic perspective, as highlighted in previous studies.\n\nEmpirical\
    \ impact models are used for inference of plausibly causal climate impacts based\
    \ on observed data... We take explicit steps to limit out-of-sample extrapolation\
    \ by capping the moderating variables of the interaction terms at the 95th percentile\
    \ of the historical distribution. \n\nIn supplementary Fig. 14, we assess spillovers\
    \ from neighboring regions using a spatial-lag model.\n"
