Code availability:
  11: All code necessary for reproduction of the results is available at a public
    repository.
Data availability:
  11: Economic production and ERA-5 climate data are publicly available at the provided
    DOIs and URLs. Mitigation cost data are publicly available at the IIASA AR6 scenarios
    database. All processed data and code are available in a public repository.
Drivers of Risk:
  1: Temperature, precipitation, daily temperature variability, total annual precipitation,
    annual number of wet days, and extreme daily rainfall.
  2: Climate variables affecting economic growth include temperature and precipitation
    with significant effects identified at lags of up to 8-10 years for temperature
    and up to 4 years for precipitation.
  3: Changes in average temperature are highlighted as a primary driver of committed
    damages.
  4: Key drivers include changes in annual mean temperature, daily temperature variability,
    total annual precipitation, annual number of wet days, and extreme daily rainfall.
  6: Changes in average temperature, day-to-day temperature variability, rainfall
    changes, heatwaves, sea-level rise, tropical cyclones, and tipping points.
  7: The studies referenced involve shocks such as extreme weather, greenhouse forcing,
    precipitation extremes, and climate tipping points.
  8: The analysis identifies impacts on macroeconomic output from variables such as
    annual average temperature, daily temperature variability, total annual precipitation,
    the annual number of wet days, and extreme daily rainfall.
  9: Annual mean temperature, daily temperature variability, total annual precipitation,
    extreme daily precipitation
  10: Shocks include future climate change impacts resulting from changes in primary
    climate variables.
  11: The costs of emission mitigation are driven by different Integrated Assessment
    Models (IAMs) and their scenarios (SSP2 baseline vs. SSP2-RCP2.6).
  15: Shocks or changes impacting outcomes include changes in mean temperature, temperature
    variability, total precipitation, number of wet days, and extreme precipitation
    events from 1979-2019 to 2035-2065 under the high-emission scenario SSP5-RCP8.5.
  16: Annual mean temperature, daily temperature variability, total annual precipitation,
    number of wet days, extreme daily precipitation.
  17: Extreme emission scenarios (RCP2.6 and RCP8.5)
  18: Average annual temperature, Daily temperature variability, Total annual precipitation,
    Number of wet days, Extreme daily precipitation.
  19: 'The analysis considers the following climate variables: annual mean temperature,
    daily temperature variability, total annual precipitation, annual number of wet
    days, and precipitation extremes.'
  20: Climate variables (number unspecified but at least 1 and up to 5)
Evaluation overview:
  1: Macroeconomic climate-change damages, specifically income reduction.
  3: The page provides an overview of economic climate damages compared to mitigation
    costs, emphasizing projected reductions in income per capita due to climate changes.
  4: The analysis estimates the median projected reduction in sub-national income
    per capita across emission scenarios and climate models due to climate damages.
  6: Economic damages resulting from climate change until 2049.
  7: The paper provides a broad list of studies evaluating outcomes such as economic
    impacts of climate change, mortality consequences, and impacts on food supply
    chains.
  9: "Economic growth rates (\u0394lgrp)"
  10: The analysis constructs projections of future climate damages impacting gross
    regional product per capita (GRPpc) growth rates.
  11: Estimates of the aggregate costs of emission mitigation, measured as the percentage
    difference in global per capita GDP between an SSP2 baseline and an SSP2-RCP2.6
    emission scenario.
  14: The page evaluates the impact of climate change on economic growth, specifically
    the percentage change in income per capita relative to a baseline without climate
    impacts.
  16: "Climate damages in 2049 in GDP terms per capita; cumulative marginal effects\
    \ (percent per \xB0C)"
  17: Committed damages
  18: Macroeconomic growth.
  19: "The paper evaluates the effect of different climate variables on sub-national\
    \ economic growth rates in the period 1979\u20132019."
  20: Estimated economic damage from future climate change
Highlights:
  1: "The world is already committed to a 19% income reduction in the next 26 years\
    \ due to climate change, and these damages already outweigh the mitigation costs\
    \ required to limit global warming to 2 \xB0C by sixfold over this near-term time\
    \ frame."
  2: Projected global damages are statistically indistinguishable across the two most
    extreme emission scenarios until 2049.
  3: Damages are already larger than mitigation costs, and benefits of mitigation
    become apparent primarily after 2049.
  4: Daily temperature variability causes the largest increase in overall economic
    damages when compared to impacts from average temperature changes alone.
  6: Economic damages until 2049 are already committed and greatly outweigh mitigation
    costs; Damages are indistinguishable across emissions scenarios until mid-century;
    Missing impacts (e.g., sea-level rise, non-market damages) and spatial spillovers
    may lead to an underestimation of damages.
  7: Key outcomes include evidence of Arctic Amplification, shifts in national land
    use and food production, and evaluation of economic costs and losses due to climate-related
    factors.
  9: The persistence of climate impacts on economic growth rates is a key determinant
    of the long-term magnitude of damages; A framework is conservative with respect
    to the persistence of impacts and the magnitude of future damages; Naturally avoids
    assumptions of infinite persistence.
  10: The methodology accounts for changing vulnerability to climate shocks and uses
    moving averages for moderating variables.
  13: The analysis suggests that including the specified number of lags does not lead
    to overfitting for the climate variables studied.
  14: The analysis highlights the differences in climate impact across global regions
    and the relative magnitudes of pure growth, pure level, and specified climate
    damages over time.
  15: Significant increase in mean temperatures globally with considerable variability
    in precipitation patterns, including fewer wet days in northern regions and increased
    extreme precipitation events in some areas.
  16: "The contribution of different climate variables to the overall effects of an\
    \ increase in annual mean temperature of 1\xB0C on economic damages is quantified.\
    \ Cumulative marginal effects of temperature increases are estimated."
  17: Distribution of differences in committed damages between upper and lower quartiles
    based on GDP and cumulative historical emissions, across extreme emission scenarios.
  18: The table lists physical mechanisms through which different climate variables
    impact macroeconomic growth, along with references to empirical evidence.
  19: The significance of the effects of a given climate variable requires an assessment
    of both the coefficient of the climate variable itself as well as its interaction
    term, as visually represented in Extended Data Fig. 1.
  20: This study projects significantly higher economic damages (61.6% by 2100 under
    RCP8.5) compared to other listed studies.
Methodology:
  1: Uses recent empirical findings from more than 1,600 regions worldwide over the
    past 40 years to project sub-national damages from temperature and precipitation,
    including daily variability and extremes, employing fixed-effects panel regression
    models.
  2: Bias-adjusted climate models from CMIP-6 are used to project macroeconomic damages
    from climate change.
  3: The analysis involves a comparison of projected climate damages to mitigation
    costs using empirical models and Monte Carlo simulations to estimate uncertainties.
  4: Analysis accounts for sub-national economic impacts of climatic components, using
    various emission scenarios (SSP 2-RCP 2.6 and SSP 2-RCP8.5) and considering uncertainty
    in model parameters.
  6: Empirical impact models are used, limiting out-of-sample extrapolation by capping
    moderating variables at the 95th percentile of the historical distribution. A
    spatial-lag model is used to assess spillovers from neighboring regions.
  7: The studies utilize methodologies including cross-country analysis, spatial analysis,
    and working papers from economic research.
  8: Future socio-economic data are based on SSP2 scenario, with population and GDP
    data downscaled to a half-degree grid and aggregated to sub-national levels.
  9: Panel regression models with fixed effects and time trends to isolate exogenous
    variation; Uses lagged climate variables to evaluate the presence of delayed effects
    or catch-up dynamics; Area-weighting algorithm to aggregate grid-cell-level data
    to administrative units; Includes region-specific linear time trends; Estimates
    equations in first-differenced form.
  10: The analysis uses a fixed-effects regression model with spatial and temporal
    lags to evaluate climate impacts on GRPpc, applied to future climate change projections
    from CMIP-6 models.
  11: The study uses IPCC estimates of emission mitigation costs from the AR6 Scenario
    Explorer and Database hosted by IIASA. The analysis begins comparison with damage
    estimates in 2020 to remain conservative, as earlier mitigation costs in some
    IAMs are negligible. The results are applicable to scenarios SSP2 and SSP2-RCP2.6.
  13: An incremental lag-selection procedure is used to remove lags from different
    climate variables, determining the optimal number of lags that avoid overfitting
    using Bayesian and Akaike information criteria.
  14: 'Three empirical specifications are used for assessing climate impacts: preferred
    specification providing a lower bound of economic growth impact, pure growth effects
    without differencing or lagged variables, and pure level effects with differencing
    but no lagged terms.'
  15: The analysis estimates historical variability as the standard deviation of each
    detrended climate variable over the period 1979-2019.
  16: "Empirical models are used, with block-bootstrap resampling (1000 resamples)\
    \ from three different empirical models using eight, nine or ten lags of temperature\
    \ terms. Results in Panel (a) represent changes to overall effects of an increase\
    \ in annual mean temperature of 1 \xB0C. Results in Panel (b) are relative to\
    \ different baseline temperatures."
  17: Empirical models with uncertainty sampling (lags, parameter estimates, climate
    model projections); population weighting for quartile definition and averaging;
    IPCC likelihood classification.
  18: The table summarizes physical mechanisms that plausibly underlie the impact
    of different climate variables on macroeconomic growth. The authors are aware
    that in the case of most climate variables, several plausible physical mechanisms
    supported by empirical evidence exist.
  19: The analysis uses a regression model (equation 4) with ten lags for each climate
    variable. Standard errors are clustered by region.
  20: Fixed-effects panel regressions, baseline specification of level effects, number
    of lags eight-ten-four
More Notes:
  1: Committed losses are projected for all regions except those at very high latitudes.
    The largest losses are committed at lower latitudes in regions with lower cumulative
    historical emissions and lower present-day income.
  6: The paper compares damages to mitigation costs at the global level, hinting at
    national incentives for mitigation relevant to international climate policy. Adaptation
    may provide an opportunity to reduce committed damages. Strong divergence of damages
    after mid-century reemphasizes the benefits of mitigation.
  7: The paper references multiple studies, mainly focusing on economic evaluations,
    tipping points, and attributional impacts of climate change.
  9: The paper uses interactions of climate variables with historical average climatic
    conditions to reflect heterogenous effects. Mentions GADM database for administrative
    units. Focuses on level of output (lgrpr,y) depending on the level of a climate
    variable (Cr,y).
  10: The analysis considers spatial spillovers of climate impacts across regions
    using a spatial-lag model.
  16: The analysis distinguishes between models that include all climate variables
    and models that only include annual mean temperature. The effect of including
    other climate variables is examined.
  17: Quartiles are defined using population weighting. The analysis accounts for
    uncertainty in lags, parameter estimates, and climate model projections.
  18: Empirical evidence for the impact of the number of wet days on macroeconomic
    growth is, as far as the authors are aware, currently lacking.
  19: The R2, within-region R2, AIC, BIC, and number of observations are also reported
    to assess the model's goodness-of-fit.
Quantitative material:
  1: "The world economy is committed to an income reduction of 19% within the next\
    \ 26 years independent of future emission choices (relative to a baseline without\
    \ climate impacts, likely range of 11\u201329% accounting for physical climate\
    \ and empirical uncertainty)."
  2: Under a middle-of-the-road future income development scenario (SSP2), global
    annual damages in 2049 amount to 38 trillion in 2005 international dollars, with
    a likely range of 19-59 trillion.
  3: The page mentions a comparison where median committed climate damages are larger
    than median mitigation costs by a factor of approximately six.
  4: Projected economic damages are approximately 10 trillion international dollars
    for daily temperature variability and about 1.2 trillion for precipitation-related
    impacts.
  6: Projection of reductions in income of 19%.
  7: References include quantitative assessments like national land use shifts, economic
    impacts of tipping points, and valuation of climate change consequences.
  9: Regression equation (9) to test whether impacts on the growth rate persist any
    further than instantaneously.
  10: Quantitative projections include time series of annual GRPpc growth-rate reductions
    under various scenarios.
  11: Mitigation costs are expressed as a percentage difference in global per capita
    GDP. The analysis uses data from five IAMs, but only the results from MESSAGE-GLOBIOM
    1.0, REMIND-MAgPIE 1.5, and AIM/GCE 2.0 are used because they passed the IPCC
    vetting procedure.
  13: Graphs and descriptions indicate that the optimal number of lags to include
    is approximately four for precipitation variables and eight to ten for temperature
    variables.
  14: Line graphs provide projections of climate change impacts in terms of percentage
    change in income per capita from 2020 to 2100 under different scenarios and specifications.
  15: Changes in climate variables are expressed as a percentage of historical variability.
  16: "Panel (a) shows percentage reduction in damages by 2040 in GDP terms per capita\
    \ when considering different climate variables. Panel (b) shows cumulative marginal\
    \ effects (percent per \xB0C) of temperature increases."
  17: Percentage-point difference in committed damages between quartiles, median,
    10th and 90th percentiles.
  19: The table shows point estimates for the effect of each climate variable (and
    their interaction term) on sub-national economic growth rates in percentage points.
    Standard errors are provided in parentheses, along with significance levels (p
    < 0.05, p < 0.01, p < 0.001).
  20: 'Estimated economic damages under RCP8.5 by 2100: 61.6%'
sourcematerial:
  1: "Source material here: Global projections of macroeconomic climate-change damages\
    \ typically consider impacts from average annual and national temperatures over\
    \ long time horizons...Here we use recent empirical findings...to project sub-national\
    \ damages...find that the world economy is committed to an income reduction...Using\
    \ an empirical approach...we find that...These damages already outweigh the mitigation\
    \ costs...Committed damages arise predominantly through changes in average temperature,\
    \ but accounting for further climatic components raises estimates by approximately\
    \ 50% and leads to stronger regional heterogeneity....evidence for impacts on\
    \ sub-national economic growth from numerous components of the distribution of\
    \ daily temperature and precipitation...changing daily temperature variability,\
    \ total annual precipitation, the annual number of wet days and extreme daily\
    \ rainfall that occur in addition to those already identified from changing average\
    \ temperature....we find that the world economy is committed to an income reduction\
    \ of 19% within the next 26 years independent of future emission choices (relative\
    \ to a baseline without climate impacts, likely range of 11\u201329% accounting\
    \ for physical climate and empirical uncertainty). Here we use recent empirical\
    \ findings from more than 1,600 regions worldwide over the past 40 years to project\
    \ sub-national damages from temperature and precipitation, including daily variability\
    \ and extremes...Using fixed-effects panel regression models to control for potential\
    \ confounders, these studies exploit within-region variation in local temperature\
    \ and precipitation in a panel of more than 1,600 regions worldwide, comprising\
    \ climate and income data over the past 40 years, to identify the plausibly causal\
    \ effects of changes in several climate variables on economic productivity....we\
    \ find that the world economy is committed to an income reduction of 19% within\
    \ the next 26 years independent of future emission choices...These damages already\
    \ outweigh the mitigation costs required to limit global warming to 2 \xB0C by\
    \ sixfold over this near-term time frame...Committed losses are projected for\
    \ all regions except those at very high latitudes...The largest losses are committed\
    \ at lower latitudes in regions with lower cumulative historical emissions and\
    \ lower present-day income."
