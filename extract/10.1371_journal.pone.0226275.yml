  9: ' Valuing natural habitats for enhancing coastal resilience ... Reduction in
    flooding during Hurricane Sandy due to the presence of natural habitats (basemap
    source: ESRI [42,43]) ... Our results also suggest that the presence of natural
    habitats can reduce the flood elevation in the shoreline areas. ... Fig 3 is an
    example output from the ADCIRC+SWAN model showing simulated flooding with and
    without habitat present under current conditions and a Hurricane Sandy storm event.
    Depending on the storm event and sea level rise conditions, presence coastal wetlands
    and marshes in the JCNERR can lower the flood elevation by a maximum of 0.2 to
    0.4 meters. However, the averaged reduction in flood elevation and depth (elevation
    is ... relatively low and varies from 0.03 to 0.06m. Flood protection value of
    coastal marshes Results from the ecosystem service valuation suggest that presence
    of the natural habitats can reduce total property damage in the study area up
    to 13.8% under current conditions and up to 6.1% in future conditions considering
    the selected storm events ... The overall avoided damage by natural habitats during
    a single storm event can range from $8,500,000 to $13,000,000 under current conditions,
    while the value varies from $1,500,000 to $32,000,000 under 2050 conditions. The
    percentage changes are highest under the 50-year storm event for both temporal
    conditions. However, the flood protection value is highest in terms of absolute
    value for the 50-year storm and Hurricane Sandy under current conditions and 2050
    conditions, respectively. '
  10: 'Source material here.

    1. Evaluation overview: "The results show that the natural habitats can protect
    up to $13.1 and $32.1 million of residential property damage during the selected
    storm events in the study area in the current condition and the future scenario
    respectively..."

    2. Drivers of Risk: "...the value of protective services for both Sandy and the
    50-year storm increased in the SLR scenario, the value decreased for the 25-year
    storm."

    3. Quantitative material: "...the presence of natural habitats... 25-year storm...11.98%...50-year
    storm...13.79%...Sandy...0.36%... 2050 SLR Scenario... 25-year storm...1.23%...
    50-year storm... 6.05%... Sandy... 1.25%."

    4. Methodology: "...The place based analysis focused on the flood protection services
    by the coastal wetlands and marshes within and adjacent to the JCNERR to a cross-section
    of three coastal counties in New Jersey."

    5. Highlights: "...which suggests that the per square kilometer value of their
    flood protection services vary from a maximum of $53,000 to $138,000 under current
    and future conditions..."

    '
  11: Source material here.
  12: 'Source material here: "This study analyzed only the protection to residential
    structures" and "...vulnerable to storm surge and sea level rise" and "...extreme
    flooding events, sea level rise" and "...analysis of reduction in water level
    due to the presence of natural habitats" and "...natural habitats can reduce both
    storm surge flood depth and property damage" and "Furthermore, this study used
    the relative difference between two scenarios using the same model formulation
    to estimate the potential of natural habitats to relatively reduce flood depth.
    Thus, in our study, specific changes in model parameterization will not affect
    the analysis of reduction in water level due to the presence of natural habitats.
    A second limitation is that only three storm events were considered" and "The
    results of this study suggest that natural habitats can reduce both storm surge
    flood depth and property damage under current and future marsh conditions and
    under sea level rise. In particular, the natural habitats may offer better protection
    from relatively frequent, low intensity storms. These findings suggest that natural
    habitats can increase resilience in areas that are vulnerable to storm surge and
    sea level rise." and "Thus, our findings emphasize on primary data collection
    in coastal wetlands and marshes during storm events for improved quantification
    of their flood reduction capacity. A second limitation is that only three storm
    events were considered...This study analyzed only the protection to residential
    structures"'
