Drivers of Risk:
  1: Storm surge and sea level rise (SLR).
  2: Storm surge flooding, sea level rise (SLR), and changes in natural habitats (coastal
    wetlands and marshes) due to SLR.
  5: Coastal flooding from historical and synthetic storms, including Hurricane Sandy
    (2012), a 400-year storm event.
  7: Storm events, sea level rise (SLR), changes in land use/land cover (LULC).
  8: Sea level rise (SLR) and storms (25-year storm, 50-year storm, Sandy).
  9: Storm events and sea level rise conditions.
  10: The outcomes are impacted by storm events such as 25-year and 50-year storms,
    as well as Hurricane Sandy, and future scenarios with sea level rise (SLR).
  11: Storm surge flooding, sea level rise, storm characteristics (track, location,
    intensity), and changes in marsh area due to SLR.
  12: Storm surge, sea level rise and extreme flooding events are the drivers of risk
    analyzed.
Evaluation overview:
  1: Property damage from storm surge and sea level rise.
  2: Flood protection services provided by coastal wetlands and marshes adjacent to
    the Jacques Cousteau National Estuarine Research Reserve (JCNERR) to three coastal
    counties in New Jersey, focusing on the value of protected residential properties.
  7: Residential property flood damages.
  8: Reduction in flooding and property damage due to the presence of natural habitats.
  9: Reduction in flooding during Hurricane Sandy due to the presence of natural habitats.
  10: Provides an overview of the impact of natural habitats on property damage from
    storms, specifically focusing on flood protection services.
  11: Property damage from storm surge flooding is evaluated.
  12: Residential structures were evaluated for protection.
Highlights:
  1: Protecting and preserving natural habitats can contribute to enhance coastal
    resilience.
  2: Aims to integrate the natural variability of coastal storm surge and the impacts
    of SLR on natural habitats into the economic valuation of flood protection services.
  7: Natural habitats, specifically coastal wetlands and marshes, provide shoreline
    protection to residential properties by reducing flood damages. Sea level rise
    will cause wetlands and marshes to migrate inland and convert into tidal flats.
  8: Regularly-flooded marsh is projected to increase by 274.65%. Presence of natural
    habitats can reduce the number of residential parcels inundated, reduce mean parcel-level
    flood depths, and decrease mean proportional property damages under both current
    and future conditions.
  9: The presence of natural habitats can reduce flood elevation and property damage
    during storm events. The flood protection value is highest in terms of absolute
    value for the 50-year storm and Hurricane Sandy under current conditions and 2050
    conditions.
  10: Natural habitats can significantly reduce property damage, saving up to $32.1
    million; flood protection value per square kilometer varies under different storm
    conditions and future scenarios.
  11: Natural habitats, especially marshes, reduce property damage from storm surge,
    particularly during frequent, low-intensity storms.  SLR is predicted to cause
    marsh migration and a net loss of marsh area, while increasing tidal flats.
  12: Natural habitats can reduce both storm surge flood depth and property damage
    under current and future marsh conditions and under sea level rise, particularly
    from relatively frequent, low intensity storms. Natural habitats can increase
    resilience in areas vulnerable to storm surge and sea level rise.
Methodology:
  1: Used the Sea Level Affecting Marshes Model (SLAMM) to project the potential migration
    and habitat transformation in coastal marshes due to SLR in the year 2050.
  2: Uses a coupled version of the Advanced Circulation model (ADCIRC) and Simulating
    Waves Nearshore model (SWAN) to compute storm surge flooding for historical and
    synthetic storms. The Sea Level Affecting Marshes Model (SLAMM) is used to simulate
    changes in coastal wetlands and marshes due to SLR. Simulated flood depths are
    combined with parcel-level property data to compute flood damages. Flood protection
    services are quantified by the reduction in damages due to the presence of natural
    habitats.
  5: Utilized a storm surge and waves modeling approach considering various storm
    tracks in the coastal region of New Jersey.
  7: "The damages avoided method was applied using the ADCIRC+SWAN model. Flood elevations\
    \ for \u201Chabitat present\u201D and \u201Chabitat absent\u201D scenarios were\
    \ simulated. The difference in residential flood damages between these scenarios\
    \ was used to value the reduced damages provided by natural habitats. Flood damages\
    \ were estimated using depth-damage functions from the USACE, parcel level property\
    \ data from the New Jersey Department of Treasury, and mean flood depth from ADCIRC+SWAN.\
    \ Analysis focused on residential parcels and their \"improvement\" value. The\
    \ ArcStormSurge tool in ArcGIS was used."
  8: The study uses SLAMM to simulate land cover changes and ADCIRC+SWAN to model
    flood depths and property damage. Results are applicable to current conditions
    and future scenarios, including sea level rise. Statistical significance is assessed
    at the 95% confidence level.
  9: ADCIRC+SWAN model was used to simulate flooding with and without habitat present
    under current conditions and a Hurricane Sandy storm event.
  10: Focuses on flood protection services by coastal wetlands and marshes in New
    Jersey; includes current and future sea level rise scenarios.
  11: Hydrodynamic and wave model coupled to represent vegetation's impact on wave
    energy dissipation. SLAMM model used to address eco-geomorphic feedbacks in coastal
    marshes. Analysis considers different storm events and sea level rise scenarios.
  12: The study used the relative difference between two scenarios using the same
    model formulation to estimate the potential of natural habitats to reduce flood
    depth. Only three storm events were considered.
More Notes:
  2: The study focuses on a specific geographic region (New Jersey coastal counties)
    and aims to provide a more detailed and integrated analysis compared to previous
    studies by considering both storm surge dynamics and the impacts of sea level
    rise on coastal habitats.
  7: 'Two assumptions were made: 1) non-integer stories were rounded up, 2) properties
    were assumed to lack basements so the depth-damage functions for properties without
    basements were used.'
  8: 'The document presents two tables: Table 2 shows land cover change simulated
    by SLAMM, and Table 3 shows estimated flood depth and property damage changes
    from storm events under current and future scenarios.'
  11: Parcel-scale analysis is necessary to capture the spatial variation of property
    values when assessing the flood protection services of coastal wetlands and marshes.
    The model used may overestimate the vulnerability of marshes to SLR.
  12: The study emphasizes the need for primary data collection in coastal wetlands
    and marshes during storm events for improved quantification of their flood reduction
    capacity. The study acknowledges limitations from considering only three storm
    events, and analyzed only the protection to residential structures.
No relevant information:
  16: ''
Quantitative material:
  1: "Avoidance of up to $13.1 million and $32.1 million in residential property damage\
    \ in the selected coastal counties during the \u201850-year storm\u2019 simulation\
    \ and hurricane Sandy under current sea level conditions, and in the year \u2018\
    2050 SLR scenario\u2019, respectively."
  2: No specific quantitative results are presented on this page from the study itself,
    although it mentions the goal of estimating the value of flood protection services.
  7: Total marsh area is predicted to reduce by about 5.4% due to SLR and marsh migration;
    transitional salt marshes and irregularly flooded marshes are predicted to decrease
    by around 38% and 36%, respectively; assessed building values of the parcel population
    ranged from $15 to $5,690,000, with a mean of $151,898, and 80% of the buildings
    are valued at $200,000 or less.
  8: SLAMM simulated land cover change (%) under current and future scenarios; percent
    change in number of flooded parcels, mean parcel-level flood depth (m), and percent
    of property damage (mean) with and without habitats present for various storm
    events and SLR scenarios.
  9: Coastal wetlands and marshes in the JCNERR can lower the flood elevation by a
    maximum of 0.2 to 0.4 meters; averaged reduction in flood elevation and depth
    varies from 0.03 to 0.06m; natural habitats can reduce total property damage in
    the study area up to 13.8% under current conditions and up to 6.1% in future conditions;
    avoided damage by natural habitats during a single storm event can range from
    $8,500,000 to $13,000,000 under current conditions, while the value varies from
    $1,500,000 to $32,000,000 under 2050 conditions.
  10: Includes estimated property damages with and without natural habitats present
    and the associated avoided damages; provides percent changes indicating the economic
    value of habitats.
  11: Natural habitats reduce total property damage from storm surge flooding by 6.1%
    to 13.8%. Reduction in flood depth can be up to 0.2 to 0.4m. 5.4% loss of total
    marsh area is predicted by 2050 due to SLR. Tidal flats are predicted to increase
    nearly twenty-six-fold due to SLR.
  12: The analysis quantifies reduction in flood elevation and property damage due
    to the presence of natural habitats.
sourcematerial:
  1: "The paper describes an approach for evaluating \"property damage from storm\
    \ surge and sea level rise.\" It mentions that \"Storm surge and sea level rise\
    \ (SLR) are affecting coastal communities, properties, and ecosystems,\" which\
    \ serves as the drivers of risk. A key quantitative finding is that \"salt marshes\
    \ can reduce up to 14% of both the flood depth and property damage during relatively\
    \ low intensity storm events.\" Additionally, it reports on the \"avoidance of\
    \ up to $13.1 million and $32.1 million in residential property damage in the\
    \ selected coastal counties during the \u201850-year storm\u2019 simulation and\
    \ hurricane Sandy under current sea level conditions, and in the year \u20182050\
    \ SLR scenario\u2019, respectively.\" The methodology involved \"combined coastal\
    \ storm surge modeling and economic analysis to evaluate the role of natural habitats\
    \ in coastal flood protection,\" with a focus \"on a selected cross-section of\
    \ three coastal counties in New Jersey adjacent to the Jacques Cousteau National\
    \ Estuarine Research Reserve (JCNERR).\" The research also \"used the Sea Level\
    \ Affecting Marshes Model (SLAMM) to project the potential migration and habitat\
    \ transformation in coastal marshes due to SLR in the year 2050.\" One of the\
    \ highlights is that \"protecting and preserving natural habitats can contribute\
    \ to enhance coastal resilience.\"\n"
  2: "yaml\nEvaluation overview: 'Flood protection services provided by coastal wetlands\
    \ and marshes adjacent to the Jacques Cousteau National Estuarine Research Reserve\
    \ (JCNERR) to three coastal counties in New Jersey, focusing on the value of protected\
    \ residential properties.'\n  Evidence: 'The goal of our study was to estimate\
    \ the value of flood protection services provided by protected coastal wetlands\
    \ and marshes adjacent to the Jacques Cousteau National Estuarine Research Reserve\
    \ (JCNERR) to a cross-section of three coastal counties in New Jersey.'\n\nDrivers\
    \ of Risk: 'Storm surge flooding, sea level rise (SLR), and changes in natural\
    \ habitats (coastal wetlands and marshes) due to SLR.'\n  Evidence: 'Coastal flooding\
    \ from storm surge and SLR are already affecting coastal communities and ecosystems.'\n\
    \nQuantitative material: 'No specific quantitative results are presented on this\
    \ page from the study itself, although it mentions the goal of estimating the\
    \ value of flood protection services.'\n  Evidence: 'The simulated flood depths\
    \ were combined with publicly available parcel-level property data to compute\
    \ flood damages for the selected storms in both current and future conditions.'\n\
    \nMethodology: 'Uses a coupled version of the Advanced Circulation model (ADCIRC)\
    \ and Simulating Waves Nearshore model (SWAN) to compute storm surge flooding\
    \ for historical and synthetic storms. The Sea Level Affecting Marshes Model (SLAMM)\
    \ is used to simulate changes in coastal wetlands and marshes due to SLR. Simulated\
    \ flood depths are combined with parcel-level property data to compute flood damages.\
    \ Flood protection services are quantified by the reduction in damages due to\
    \ the presence of natural habitats.'\n  Evidence: 'The coupled version of the\
    \ Advanced Circulation model (ADCIRC) and Simulating Waves Nearshore model (SWAN)\
    \ was applied to compute the storm surge flooding for historical and synthetic\
    \ storms. The Sea Level Affecting Marshes Model (SLAMM) was used to simulate the\
    \ potential changes in the natural habitats, especially coastal wetlands and marshes,\
    \ due to SLR.'\n\nHighlights: 'Aims to integrate the natural variability of coastal\
    \ storm surge and the impacts of SLR on natural habitats into the economic valuation\
    \ of flood protection services.'\n  Evidence: 'The study aims to integrate the\
    \ natural variability of coastal storm surge and impacts of SLR on the natural\
    \ habitats into the economic valuation of the flood protection services.'\n\n\
    More Notes: 'The study focuses on a specific geographic region (New Jersey coastal\
    \ counties) and aims to provide a more detailed and integrated analysis compared\
    \ to previous studies by considering both storm surge dynamics and the impacts\
    \ of sea level rise on coastal habitats.'\n  Evidence: 'The goal of our study\
