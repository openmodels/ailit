  3: " \nThe paper evaluates the economic damages (in Trillion USD) associated with\
    \ different temperature trajectories and the willingness to pay to avoid inter-annual\
    \ temperature variability.  \n\n\"The deterministic damages as well as the 5\u2013\
    95% range for the damage distribution are noted along the axis. The risk premia\
    \ are included along the right edge, telling us what the canonical social planner...would\
    \ in principle be willing to pay to avoid inter-annual temperature variability,\
    \ measured both in current dollars and as a share of current global output.\"\n\
    \nThe primary drivers of risk are global mean temperature anomaly (\u0394T), different\
    \ Representative Concentration Pathways (RCPs), and inter-annual temperature variability.\
    \ Uncertainty about the equilibrium climate sensitivity (ECS) also plays a role.\n\
    \n\"Temperature trajectories produced by the deterministic model (in black) and\
    \ from a single run of the stochastic model (in colour) with forcings taken from\
    \ RCP8.5, 6.0, 4.5, and 2.6...One key parameter about which there is a great deal\
    \ of uncertainty is the equilibrium climate sensitivity (ECS), which is inversely\
    \ related to the feedback parameter \u03BB at double CO2.\"\n\nThe paper provides\
    \ quantitative estimates of damages (e.g., $32Tr for RCP8.5 at high temperatures),\
    \ risk premia (% of global output), and the 5-95% range for damage distribution.\
    \ For example, for RCP2.6, the risk premium is 4% of current global output, and\
    \ for RCP8.5 it is 40%.\n\n\"A social planner that knew to expect RCP8.5 forcings\
    \ would pay as much as $32 trillion, 40% of current output...If the social planner\
    \ knew to expect RCP2.6 forcings, for instance, she would today be willing to\
    \ pay up to $3 trillion to eliminate just the internal variability, which is roughly\
    \ 4% of current global output.\"\n\nThe analysis uses a deterministic model and\
    \ a stochastic model (with 10,000 temperature trajectories) to project temperature\
    \ changes and damages. The stochastic model incorporates internal climate variability.\
    \ A discount rate of 4.25% is used. Risk premia are calculated by evaluating the\
    \ difference between the expected utility of the deterministic trajectory and\
    \ that of the ensemble of stochastic trajectories.\n\n\"Temperature trajectories\
    \ produced by the deterministic model (in black) and from a single run of the\
    \ stochastic model...We assume C = 109 Jm\u22122K\u22121, \u03BB = 1.23 Wm\u2212\
    2K\u22121, and \u03C3 Q = 0.9375 \xD7 108 Wm\u22122s^1/2, to approximate historical\
    \ variability.\"  \n\n\"The risk premia are included along the right edge...calculated\
    \ by evaluating the difference between the expected utility of the deterministic\
    \ trajectory and that of the ensemble of stochastic trajectories.\"\n\nThe paper\
    \ highlights that risk premia (the willingness to pay to avoid temperature variability)\
    \ can be substantial, significantly higher than previously thought, due to the\
    \ interaction of epistemic and aleatory uncertainties. Epistemic uncertainty about\
    \ the climate's response can magnify the cost of inter-annual and multi-decadal\
    \ variability. Adding stochasticity will produce damage distributions with an\
    \ even fatter right tail than in the deterministic case.\n\n\"The effect of a\
    \ higher ECS on the variance of temperature would be weaker if a \uFB02uctuation\u2013\
    dissipation theorem applied, but it would not alter the fact that high draws become\
    \ disproportionately more costly. This implies that the addition of stochasticity\
    \ will produce damage distributions with an even fatter right tail than in the\
    \ deterministic case.\"\n\nThe paper distinguishes between risk premia and the\
    \ social cost of carbon (SCC). The risk premium measures the additional cost of\
    \ living with aleatory uncertainty, while the SCC measures the cost of releasing\
    \ one more tonne of CO2.\n\n\"It is worth making special note of the distinction\
    \ between the risk premia that we have estimated here and the marginal damage\
    \ caused by releasing an additional tonne of CO2, the so-called social cost of\
    \ carbon (SCC)...The SCC, by contrast, measures the cost of releasing just one\
    \ more tonne of CO2 within a stochastic or deterministic framework.\"\n"
  4: "Source material here.\nEvaluation overview: \"These damage estimates are substantial,\
    \ but it is worth noting that they are likely to be on the conservative side.\"\
    \nDrivers of Risk: \"This risk interaction effect arises because a high draw from\
    \ the ECS distribution produces both greater mean warming and greater variability,\
    \ which makes the high draws disproportionately more costly.\"\nQuantitative material:\
    \ \"Fig. 3 Aleatory uncertainty risk premia with and without underlying epistemic\
    \ uncertainty ... risk premium arising from an interaction between aleatory and\
    \ epistemic uncertainty ... For RCP8.5: 46Tr (58%).\"\nMethodology: \"To compute\
    \ these risk premia, we \uFB01rst obtain an ensemble of temperature trajectories\
    \ by solving the deterministic EBM for a distribution of values of the equilibrium\
    \ climate sensitivity (ECS).\"\nHighlights: \"What is new here is neither the\
    \ physics nor the economics\u2014both of which closely follow canonical models\
    \ in their respective \uFB01elds\u2014but we \uFB01nd that the careful combination\
    \ of insights from these two disciplines reveals trillions of dollars of previously\
    \ uncounted damages.\"\n"
