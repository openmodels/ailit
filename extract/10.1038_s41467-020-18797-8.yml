Drivers of Risk:
  2: Internal variability of global mean temperatures creates uncertainty in economic
    damages related to climate change.
  3: "The primary drivers of risk are global mean temperature anomaly (\u0394T), different\
    \ Representative Concentration Pathways (RCPs), and inter-annual temperature variability.\
    \ Uncertainty about the equilibrium climate sensitivity (ECS) also plays a role."
  4: High draw from the ECS distribution leading to greater mean warming and greater
    variability, resulting in more costly damages.
Evaluation overview:
  2: Provides an overview of economic consequences of temperature variability on climate
    damages.
  3: The paper evaluates the economic damages (in Trillion USD) associated with different
    temperature trajectories and the willingness to pay to avoid inter-annual temperature
    variability.
  4: The page discusses economic damages from climate change, focusing on the risk
    premia associated with aleatory and epistemic uncertainties.
Highlights:
  2: Adding realistic variability in global temperatures creates substantial uncertainty
    in future climate damages, indicating adaptation benefits may be greater than
    previously believed.
  3: The paper highlights that risk premia (the willingness to pay to avoid temperature
    variability) can be substantial, significantly higher than previously thought,
    due to the interaction of epistemic and aleatory uncertainties. Epistemic uncertainty
    about the climate's response can magnify the cost of inter-annual and multi-decadal
    variability. Adding stochasticity will produce damage distributions with an even
    fatter right tail than in the deterministic case.
  4: Findings suggest that the risk premia indicate greater economic damages from
    climate change than previously counted, due to the interaction between aleatory
    and epistemic uncertainties.
Methodology:
  2: Analysis extends deterministic models by incorporating realistic temperature
    variability and uses a stochastic model for forecasting economic damages.
  3: The analysis uses a deterministic model and a stochastic model (with 10,000 temperature
    trajectories) to project temperature changes and damages. The stochastic model
    incorporates internal climate variability. A discount rate of 4.25% is used. Risk
    premia are calculated by evaluating the difference between the expected utility
    of the deterministic trajectory and that of the ensemble of stochastic trajectories.
  4: Utilizes ensembles of temperature trajectories from deterministic and stochastic
    energy balance models, considering aleatory and epistemic uncertainties.
More Notes:
  3: The paper distinguishes between risk premia and the social cost of carbon (SCC).
    The risk premium measures the additional cost of living with aleatory uncertainty,
    while the SCC measures the cost of releasing one more tonne of CO2.
Quantitative material:
  2: Deterministic model forecasts $486 trillion in total damages for RCP8.5 scenario;
    stochastic model gives a 5% chance of damages exceeding $563 trillion.
  3: The paper provides quantitative estimates of damages (e.g., $32Tr for RCP8.5
    at high temperatures), risk premia (% of global output), and the 5-95% range for
    damage distribution. For example, for RCP2.6, the risk premium is 4% of current
    global output, and for RCP8.5 it is 40%.
  4: Risk premia evaluated across RCP scenarios, with values such as 46 trillion USD
    for RCP8.5, including an aleatory and epistemic interaction effect.
