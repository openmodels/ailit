  4: " \nGiven that we defined b as the percent increase in GPP per 100-ppm increase\
    \ in CO2...we found clear positive correlations between the models that included\
    \ C-N cycle interactions...The role of N limitation on b has been widely suggested\
    \ by experimental evidence...The second hypothesis to explain the divergence of\
    \ the b trend between the TRENDY models and the satellite-derived estimates stated\
    \ that these models underestimated the sensitivity of GPP to water availability...Using\
    \ 410 groups of ground-based foliar N and P observations...we found a general\
    \ decrease in foliar N and P concentrations, with mean values of \u22120.24 \xB1\
    \ 0.06% year\u22121 and \u22120.55 \xB1 0.06% year\u22121, respectively...To test\
    \ this hypothesis, we applied a linear spatial mixed-effects model... \n"
  5: "yaml\nEvaluation overview: \"Ultimately, these results indicate that terrestrial\
