  7: 'Source material here: One source of uncertainty in climate science is how the
    carbon fertilization effect (CFE) will contribute to mitigation of anthropogenic
    climate change. Wang et al. explored the temporal dynamics of CFE on vegetation
    photosynthesis at the global scale. There has been a decline over recent decades
    in the contribution of CFE to vegetation photosynthesis, perhaps owing to the
    limiting effects of plant nutrients such as nitrogen and phosphorus. This declining
    trend has not been adequately accounted for in carbon cycle models. CFE thus has
    limitations for long-term mitigation of climate change, and future warming might
    currently be underestimated.'
