    \ cold climate zones exhibited a larger declining trend of b'\"\nMore Notes: \"\
    b values for different vegetation physiology and biome types were aligned with\
    \ experimental results; Decreases in b across all the climate zones and vegetation\
    \ types were notable. Justification: 'Results showed that the estimated b values\
    \ for different vegetation physiology and biome types were also aligned with experimental\
    \ results (7), e.g., the b values of C4 plants were much smaller than those of\
