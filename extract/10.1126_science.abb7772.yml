    \ test was used to estimate the trend ofb pixel by pixel'\"\nHighlights: \"The\
    \ global median of b significantly decreased from 1982 to 2015. Grasslands and\
    \ plants in cold climate zones exhibited a larger declining trend of b. Justification:\
