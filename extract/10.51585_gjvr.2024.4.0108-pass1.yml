sourcematerial:
  1: " \nHeat stress (HS) is a major challenge to the poultry industry, especially\
    \ as global temperatures continue to rise due to climate change. Heat stress has\
    \ a negative effect on poultry by disrupting production sustainability, water\
    \ homeostasis, gut integrity, and meat quality, leading to economic losses and\
    \ welfare concerns. \nThis review consolidates current research on these issues\
    \ and explores potential strategies to mitigate the adverse effects of HS...When\
    \ the temperature rises, the metabolic processes of poultry are altered. HS results\
    \ in reduced feed intake, impaired growth, decreased egg production, and a decline\
    \ in overall health...\nNutritional interventions, environmental modifications,\
    \ e.g., ventilation systems and cooling techniques, as well as genetic approaches\
    \ are discussed as promising solutions to improve poultry resilience to HS. \n"
  3: "yaml\nEvaluation overview: \"Heat stress alters the expression of feeding and\
    \ drinking related hypothalamic neuropeptides as well as stress hormones (corticosterone),\
    \ leading to depressed feed intake, increased water consumption, increased FCR,\
    \ and reduced growth. Heat stress also alters tight junctions, desmosomes, adherens\
    \ junctions, and gap junction proteins, resulting in leaky gut syndrome and altered\
    \ digestibility. Heat stress affects meat quality and alters reproductive parameters\
    \ (egg quality, number, mass, etc.).\"\nDrivers of Risk: \"Heat stress is particularly\
    \ harmful to broilers, given their high metabolic activity and limited ability\
    \ to regulate body temperature through sweating, as they lack sweat glands.\"\n\
    Quantitative material: \"Studies have shown that water intake can increase by\
    \ 50% when the environmental temperature is higher than 30\xB0C (Renaudeau et\
    \ al., 2012).\"\nHighlights: \"sprinkler cooling systems have been observed to\
    \ reduce core body temperature in broilers caused by HS (Liang et al., 2020).\
    \ This is an innovative mitigation strategy that might be very beneficial for\
    \ poultry farming. Supplementary nutritional additives are another strategy that\
    \ should be taken into consideration.\"\n"
  4: Heat stress affects the gastrointestinal tract by impairing its function and
    structure...Thus, maintaining gut integrity during HS is critical for optimizing
    the health and productivity of broilers...The intestinal dysfunction caused by
    HS impairs nutrient absorption, which can lead to weight loss and reduced muscle
    mass in broiler chickens. Under HS, birds lose more water by means of panting
    and gastrointestinal tract (GI) losses than they do under thermoneutral conditions.
    Heat stress affects the gastrointestinal tract by impairing its function and structure.
    Under HS, the expression of intestinal heat-shock proteins, cytokines, and tight
    junction proteins is altered, resulting in LGS...Heat-stressed broiler chickens
    exhibit increased permeability in the ileum, along with a significant reduction
    in the expression of tight junction proteins, such as ZO-1 and occludin...The
    intestinal dysfunction caused by HS impairs nutrient absorption, which can lead
    to weight loss and reduced muscle mass in broiler chickens.
  5: 'Source material: Meat quality properties include water holding capacity, drip
    loss, shear force, cook loss, pH, shelf life, protein solubility, and fat content,
    all of which can be affected by HS. Some of the negative effects of HS on poultry
    meat quality include reduced water-holding capacity, pH, and increased drip loss,
    which in turn changes the normal taste, color, and texture of chicken meat. HS
    reduces feed intake and alters nutrient absorption and metabolism, leading to
    changes in muscle composition and meat quality.'
  6: 'yaml

    Evaluation overview: "The impact of HS on feed intake, water homeostasis, gut
    integrity, and meat quality highlights the need for effective mitigation strategies.
    HS reduces feed intake, disrupts the energy and nutrient supply necessary for
    optimal growth, and thereby leads to poor feed conversion ratios. This not only
    compromises growth performance but also has economic and environmental consequences,
    as poultry producers must use more resources to maintain production levels."

    Drivers of Risk: "As climate change continues to drive higher temperatures and
    more frequent HS events, the poultry industry must prioritize research and innovation
    to develop effective solutions."

    Highlights: "Nutritional interventions, such as electrolyte and antioxidant supplementation,
    play a key role in supporting physiological resilience. In addition, improving
    housing conditions through better ventilation, cooling systems, and environmental
    control can help reduce the thermal burden on birds. Genetic selection for heat
    tolerance also offers a long-term potential solution for reducing the susceptibility
    of broiler chickens to HS. Furthermore, the application of precision farming technologies
    can optimize the management of environmental conditions, ensuring that interventions
    are tailored to specific climate challenges."

