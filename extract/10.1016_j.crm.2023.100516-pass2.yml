  10: "Source material here. Both the number of days and nights exceeding their climatological\
    \ 90th percentile have increased, and so has the duration of heat waves. ... future\
    \ increases in GSAT can translate non-linearly into increases in length, intensity,\
    \ and associated impacts of heat extremes. ... 10-yr events are already 3 times\
    \ more frequent than during pre-industrial conditions, becoming about 4, 6 and\
    \ 9 times more frequent for 1.5\xB0C, 2\xB0C and 4\xB0C respectively. 50-yr events\
    \ are already 5 times more frequent, and would become about 9, 14 and 40 times\
    \ more frequent at those GWLs. ... Extreme cold: In general, for cold extremes,\
    \ changes go in the opposite direction, i.e., towards a decrease linearly (or\
    \ more strongly) as GSAT warms ... Heavy precipitation: increases in frequency\
    \ and intensity of heavy precipitation episodes has been detected ... it is projected\
    \ to become 1.5, 2 and 3 times more frequent for 1.5\xB0C, 2\xB0C and 4\xB0C respectively."
  11: "`\nEvaluation overview: \"Floods: Inland floods induced by heavy precipitation\
    \ are expected to produce increasing flooded area extent with increasing GWLs...\
    \ Droughts... have already be observed with increased frequency compared to pre-industrial\
