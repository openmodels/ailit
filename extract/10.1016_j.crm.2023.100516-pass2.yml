    \ has already increased because of global warming, and the global proportion of\
    \ the more intense Tropical Cyclones (TCs) has also likely increased...\"\n\n\
    Quantitative material: \"...an index describing drought conditions relevant to\
    \ a variety of managed and natural systems, including crop cultivation, is at\
