    \n\nHighlights: \"The rain intensity that accompanies these storms has already\
    \ increased because of global warming... events being now 1.7 times more frequent,\
    \ and projected to be 2,2.4 and 4 times more frequent at 1.5 \u25E6C, 2 \u25E6\
    C and 4 \u25E6C respectively. Intensity, here measured as a factor of the climatological\
    \ standard deviation (sd) of the drought metric utilized is already 0.3sd drier...\"\
    \n"
