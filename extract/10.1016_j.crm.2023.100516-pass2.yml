sourcematerial:
  2: "Source material: \"In this study we offer a representation \u2013 as systematic\
    \ as possible given current literature and assessments \u2013 of the future evolution\
    \ of the hazard components of RKRs. We identify the relevant hazards for each\
    \ RKR, based upon the WGII authors\u2019 assessment, and we report on their current\
    \ state and expected future changes in magnitude, intensity and/or frequency,\
    \ linking these changes to Global Warming Levels (GWLs) to the extent possible.\""
  3: "   \nDrivers of Risk: \"For some of these quantities - like regional trends\
    \ in oceanic and atmospheric temperature and precipitation, some heat and precipitation\
    \ extremes, permafrost thaw and Northern Hemisphere snow cover - a strong and\
    \ quantitative relationship with increasing GWLs has been identified.\"\n\nDrivers\
    \ of Risk: \"For others - like frequency and intensity of tropical cyclones and\
    \ extra-tropical storms, and fire weather - that link can only be described qualitatively.\"\
    \n\nDrivers of Risk: \"For some processes - like the behavior of ice sheets, or\
    \ changes in circulation dynamics - large uncertainties about the effects of different\
    \ GWLs remain, and for a few others - like ocean pH and air pollution - the composition\
    \ of the scenario of anthropogenic emissions is most relevant, rather than the\
    \ warming reached.\"\n\nMethodology: \"In this paper, we offer the limited but\
    \ necessary perspective of the physical climate science, by identifying climatic\
    \ impact-drivers (CIDs, Ranasinghe et al., 2021; Ruane et al., 2022) that have\
    \ the potential to become hazards relevant to the various risks constituting the\
    \ eight RKRs.\"\n\nMethodology: \"Once identified, the relation between the CIDs/hazards\
    \ and the magnitude of global warming is characterized and, where possible, quantified.\"\
    \n\nHighlights: \"In almost all cases, however, the basic message remains that\
    \ every small increment in CO2 concentration in the atmosphere and associated\
    \ warming will bring changes in climate phenomena that will contribute to increasing\
    \ risk of impacts on human and natural systems, in the absence of compensating\
    \ changes in these systems\u2019 exposure and vulnerability, and in the absence\
    \ of effective adaptation.\"\n\nHighlights: \"Our picture of the evolution of\
    \ RKR-relevant climatic impact-drivers complements and enriches the treatment\
    \ of RKRs in the other papers in at least two ways: by filling in their often\
    \ only cursory or limited representation of the physical climate aspects driving\
    \ impacts, and by providing a fuller representation of their future potential\
    \ evolution, an important component \u2013 if never the only one \u2013 of the\
    \ future evolution of risk severity.\"\n\nMore Notes: \"As a last introductory\
    \ note, on occasion in the paper we may use the terms CID and hazard interchangeably\
    \ as here we are concerned with drivers of risk, by definition detrimental and\
    \ therefore hazardous. We need to underline, however, that the CID framework has\
    \ deliberately chosen a neutral term (impact-driver) recognizing that climatic\
    \ changes may carry benefits and not only negative impacts (Ruane et al., 2022).\"\
    \n"
  5: 'Source material here: For example, as described in Ranasinghe et al. (2021),
    extreme heat can warp roads and airport runways, cause buckling of railways and
    require a lower take-off weight for aircraft; both energy transmission and energy
    production in plants that use stream water for cooling can be impaired by high
    air and water temperatures. At the other end of the spectrum, extreme cold temperatures,
    possibly with frequent freezing and refreezing episodes, can cause pipes to burst
    or damage roads. Inland flooding from heavy rains, or coastal flooding caused
    by gradual sea level rise in isolation or combined with storm surges, threatens
    roads and other transportation networks, and key infrastructure assets that are
    often located along river ways or in coastal areas. Winds from tropical or extratropical
    storms can damage buildings, and transportation and energy infrastructure. Other
    long-term trends besides those of sea level rise, like permafrost thaw, threaten
    the stability of buildings and infrastructure in high latitude or high altitude
    regions, and can favor the conditions for landslides. Economic impacts would be
    driven by hazards that endanger industries and laborers exposed to heat extremes,
    coastal flooding and storms. Livelihoods can be threatened for systems relying
    on agriculture, fisheries and other climate-sensitive activities exposed to shifting
    climatologies and more frequent and intense extremes. Extreme events triggering
    excessive heat and flooding are identified as hazards relevant to this risk. Drivers
    of risks to food security have been identified in extreme heat and precipitation
    events and droughts, but also in an increase in overall precipitation variability,
    and in changes in expected average precipitation and its geographic patterns.
    Compound extremes like concurrent heatwaves and droughts, and flooding events
    (for example by the convergence of pluvial flooding with coastal storm surge in
    a river estuary) are relevant to agricultural productivity. Last, food security
    also involves trade, transportation and access, therefore hazards relevant to
    RKR-C (Risks to critical physical infrastructure, network and services) are also
    relevant here. This RKR comprises risks from water-related hazards (floods and
    droughts) and induced by water quality deterioration. Again, it is the convergence
    of hazards with population exposure and vulnerability, often the result of both
    environmental conditions and safety and governance issues, that determines the
    evolution of these risks."

    '
  6: "Source material here.\n1. Evaluation overview: \"For these types of risks a\
    \ wide range of hazards related to the water cycle may be relevant, from changes\
    \ in the average patterns of precipitation causing stress on water availability,\
    \ to extreme precipitation events causing flooding and related damages, to severe\
    \ droughts. In addition, expected changes in snow cover and mass loss of glaciers\
    \ are hazards not only affecting water availability, whose quantity and duration\
    \ is in some region strongly dependent on snowfall magnitudes and timing, but\
    \ endangering ways of life, identity, and culture for the local population.\"\
    \ \"O\u2019Neill et al. (2022) defines the scope of this RKR as comprising 'risks\
    \ to peace within and among societies from armed conflict as well as risks to\
    \ low-agency human mobility within and across state borders, including the potential\
    \ for involuntarily immobile populations.'\"\n2. Drivers of Risk: \"From changes\
    \ in the average patterns of precipitation causing stress on water availability,\
    \ to extreme precipitation events causing flooding and related damages, to severe\
    \ droughts. In addition, expected changes in snow cover and mass loss of glaciers\
    \ are hazards...\" \"It is argued however that the increased frequency of extreme\
    \ events may exacerbate conditions leading to conflict, and even sea level rise\
    \ (SLR) linked to low warming can add to stress on a population...\" \"The warming\
    \ signal averaged over the Arctic region has already emerged from internal variability...\"\
    \n3. Quantitative material: \"The warming signal averaged over the Arctic region\
    \ has already emerged from internal variability (Forster et al., 2021), and is\
    \ projected to continue at a rate between 2 and 2.4 times faster than GSAT, over\
    \ the 21st century (Lee et al., 2021; Ranasinghe et al., 2021)\" \"We note here\
    \ that more recent work not assessed by the IPCC WGI report has found the Arctic\
    \ region warming at a rate close to 4 times faster than GSAT over the last 40\
    \ years (Rantanen et al., 2022).\"\n4. Methodology: \"In this section we characterize\
    \ current state and future changes in the hazards described in Section 2 as a\
    \ function of global warming levels (GWLs).\" \"Consistent with the treatment\
    \ of GWLs in the WGI report (IPCC, 2021a), we here define GWLs using Global Surface\
    \ Air Temperature (GSAT) warming with respect to the pre-industrial baseline of\
    \ 1850\u20131900.\" \"Specifically, Coupled Model Intercomparison Project Phase\
    \ 6 (CMIP6, Eyring et al. 2016) experiments run under a representative range of\
    \ uncertain future anthropogenic radiative forcing scenarios (for the most part,\
    \ ScenarioMIP experiments, O\u2019Neill et al., 2016; Tebaldi et al., 2021b) form\
    \ the basis of this particular assessment...\"\n5. Highlights: \"It is argued\
    \ however that the increased frequency of extreme events may exacerbate conditions\
    \ leading to conflict, and even sea level rise (SLR) linked to low warming can\
    \ add to stress on a population that could find its territory permanently submerged\
    \ or frequently flooded.\" \"Pattern scaling (Santer et al., 1990; Tebaldi and\
    \ Arblaster, 2014) can fairly accurately represent the scaling of at least basic\
    \ variables like mean temperature (and precipitation) with GWLs, showing which\
    \ regions of the world warm more or less than the global average, and which regions\
    \ will experience wetting rather than drying and by what percentage, per degree\
    \ of warming.\"\n6. More Notes: \"The use of GWLs circumvents the uncertainties\
    \ due to substantial differences between climate model responses to the same scenario\
    \ (Hausfather et al., 2022), but has the disadvantage of transferring the uncertainty\
    \ to the time dimension.\" \"Most of the relationships between hazard metrics\
    \ and GWLs here described have been identified and, when possible, quantified\
    \ on the basis of the behavior of climate model output.\"\n"
