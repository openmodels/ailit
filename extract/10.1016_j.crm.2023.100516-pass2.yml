  14: 'yaml

    Drivers of Risk: "Higher frequency of concurrent heatwaves and droughts, and of
    compound (sea level rise and storm-driven) flooding events have already been detected
    and higher frequencies with additional warming are expected of these specific
    compound extremes and, in general, of concurrent extremes in time and space"

    More Notes: "With this work we are offering a physical climate perspective on
    drivers of risk, i.e., we focus on the hazard component, aware that it is only
    one of multiple factors - including exposure, vulnerability and possible adaptation
    and mitigation responses - contributing to the ultimate outcome. In particular,
    we present a catalogue of climatic impact-drivers (CIDs) that, by having the potential
    to become hazards, can be expected to contribute to the severity of representative
    key risks (RKRs)."

    '
  15: 'Source material: This work shows that many of the hazards considered can be
    put in a direct, strong relationship with global temperature changes. This is
    the case for patterns of regional warming and mean precipitation change, sea surface
    temperature warming, snow cover, permafrost thawing, but also for several types
    of extreme events that have been associated with risks across all RKRs, like heat
    extremes, tropical cyclone intensity, marine heatwaves, droughts and fire weather,
    storm surges as results of winds and sea level rise combined. Other hazards, like
    SLR and glacier mass loss are in strong relation to warming, but present a lagged
    response. First, the relation may be fuzzy, and either wide ranges of future changes
    are associated to any given GSAT level, or only a qualitative direction of change
    may be described, as a function of GSAT. Second, while for some of these changes
    we can successfully decouple GWLs from specific GSAT trajectories (i.e., we can
    consider the behavior of hazards at different warming levels independently of
    the scenario, and therefore independently of the time when the level is reached
    and the shape of the trajectory followed to get there) this is not always the
    case. For some hazards, changes may be path-dependent or dependent on the mix
    of forcings contributing to the warming. Changes in exposure and vulnerability
    in the future need to be considered jointly with changes in climatic conditions
    to obtain a realistic assessment of future risk and possibly future opportunities
    that associated adaptation responses may present. This work is intended to present
    how these CIDs/hazards are expected to evolve as a function of global warming.
    This, we would argue, has value in itself, as physical climate outcomes are in
    themselves a cogent aspect of future scenarios. However, individual impacts are
    and will continue to be determined by the conditions of the system(s) affected
    in all their specificity and fine spatial and temporal details. Nevertheless,
    even accounting for the generalization and imprecision of drawing these relations
    between GSAT and individual hazards, we believe that our summary will facilitate
    a synthetic view of expected climate risk at increasing levels of warming. In
    this regard, the message that every increment of global warming matters is further
    substantiated and reinforced by this work. We have adopted here a global perspective
    on changing climatic impact-drivers to serve a synthetic assessment based on global
    warming levels rather than particular scenarios of emissions and therefore warming.'
