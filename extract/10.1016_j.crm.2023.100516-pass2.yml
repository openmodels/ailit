    \ in precipitation patterns and warming, which compound to increase frequency\
    \ and severity of drought episodes...\"\n\nDrivers of Risk: \"...a direct relation\
    \ between drought severity and frequency and GSAT warming. IPCC (2021) shows frequency\
    \ of 10-yr drought events having already increased... and will be 0.5sd, 0.6sd\
