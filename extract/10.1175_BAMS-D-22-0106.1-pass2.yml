Highlights:
  2: Examples like the cold snap in Texas and Hurricane Ian in 2022 underline how
    extreme weather events exacerbate food insecurity even in developed countries
    like the U.S.
  3: There is a call to action for the American Meteorological Society (AMS) community
    to engage more in addressing global food security by scaling up activities in
    monitoring and forecasting weather and climate phenomena affecting food security.
  4: Climate change impacts food security across all aspects of the food system (production,
    distribution, consumption).
  5: Atmospheric evaporative demand is highlighted as a crucial physical link between
