  7: "Source material here.\nHowever, in this paper we advance the concept that addressing\
    \ food security requires that the Earth system science community engage in food-security\
    \ monitoring and outlooks at multiple time horizons and spatial scales. ... On\
    \ regional and global scales, model- derived outputs and global land and ocean\
    \ data assimilation systems and reanalyses are widely available and commonly used\
    \ for estimating variables that the food-security community has traditionally\
    \ relied on ... Food security outlooks are based on the monitored and future states\
    \ of key variables in the Earth system, which draw on the expert interpretation\
    \ of a variety of forecasts. ... 6\u20139 months before a growing season: Although\
    \ forecast skill is low for many agricultural drivers at lead times longer than\
    \ 6 months, actionable information may be derived from the monitored state of\
    \ the climate and from understanding climatological characteristics leading up\
    \ to, and then during, the next growing season. For example, anomalously low soil\
    \ moisture prior to land preparation and planting may delay planting and crop\
    \ development, which can reduce yields. ... Within 6 months of a growing season:\
    \ The predictability of slowly varying modes of climate variability like El Ni\xF1\
    o\u2013Southern Oscillation (ENSO; FEWS NET 2020a,b) and the Indian Ocean dipole\
    \ (FEWS NET 2021) and their known effects on regional climates provide forecasts\
    \ of opportunity ... Within 3 months of and during a growing season: Expert interpretation\
    \ of monitored and forecast conditions is used to predict the most likely state\
    \ of agriculture drivers, and thereby capitalize on windows of opportunity of\
    \ more skillful forecasts. ... There is an increasing realization that prediction\
    \ skill on longer than weather time scales (>2 weeks) can leverage specific climate\
    \ phenomena ... These forecasts of opportunity are intermittent in time and have\
    \ spatially heterogeneous impacts on skill. ... Converting data into knowledge.\
    \ Food security\u2013relevant data are only useful if they are converted to information\
    \ and, eventually, to actionable wisdom to inform decisions across time and space\
    \ scales. \n"
  8: "Source material here: FEWS NET, which is managed and supported by the U.S. Agency\
    \ for International Development (USAID), provides early warning and analysis of\
    \ acute food insecurity to inform the proactive preposition of humanitarian aid.\
    \ Though many factors contribute to food security, the effect of weather and climate\
    \ is consistently important...NOAA provides forecasts,SB1 atmospheric forcing\
    \ data, and develops the knowledge base regarding the predictability of environmental\
    \ extremes that lead to food insecurity. While monitoring and forecasting the\
    \ climate variables that drive food security are crucial for developing decision-support\
    \ tools, these data must be integrated into the larger socioeconomic context...This\
    \ integration requires close interaction between not only physical and social\
    \ scientists but also stakeholders to codevelop food security decision-support\
    \ tools...Engagement with stakeholders is key for converting data into knowledge\
    \ and driving impact-based forecasts that address local needs and improve early\
    \ action. The FEWS NET model has guided programmed humanitarian assistance to\
    \ lessen the impacts of food insecurity since its creation in 1985. Engaging with\
    \ decision-makers, farmers, fishermen, and other stakeholders results in substantial\
    \ improvements in our understanding of atmospheric and climatic drivers. Its sister\
    \ process, the translation of user expertise to the research community [operations\
    \ to research (O2R)], is underprioritized...Climate forecasts are probabilistic\
    \ in nature, however, and expressed with some degree of uncertainty, requiring\
    \ adequate messaging for stakeholders\u2019 understanding of the forecasts and\
    \ confidence in their use to make decisions."
  9: "Source material here.\n\"Challenges in engaging with users and decision-makers.\
    \ Although beneficial to the re- search community, multiple challenges limit the\
    \ efficacy of O2R and R2O. A significant challenge is often ineffective communication,\
    \ which can prevent practitioners from being aware of available datasets or how\
    \ to effectively use them...This process has increasingly been recognized as key\
    \ and commonly referred to as 'coproduction' and is expanding within the humanitarian\
    \ world and in sustainability research.\" \n\"...communication between operationalists\
    \ and researchers is often limited during extreme events,...Knowledge exchange\
    \ and effective communication is critical before, during, and after extreme events\
    \ to foster an understanding of the lessons...Much of this knowledge needs to\
    \ be collaboratively derived and iterated between events.\"\n\"...Facing the challenges\
    \ in O2R\u2013R2O: The role of prototypes and testbeds...prototypes and testbeds\
    \ are important tools to support effective communication and knowledge transfer...Since\
    \ they are crafted as learning-by-doing enterprises, prototypes are also reversible\
    \ if participation or outcome trajectories are not developing as intended.\"\n"
  11: "  \n\"Models\u2014including weather, climate, and agricultural models\u2014\
    are crucial for food security applications... Models should also be better connected\
    \ to food-security applications, e.g., better linking dynamic agricultural conditions,\
    \ farm management, and information on responsive interventions into land surface\
    \ models and biogeochemical and Earth system models.\"\n\n\"Additionally, recent\
    \ methodological advancements have dramatically improved the ability to detect\
    \ and attribute the signature of anthropogenic climate change in extreme climate\
    \ events... There is tremendous potential in extending this approach into agricultural\
    \ impacts using combinations of crop models, land surface schemes, hydrologic\
    \ parameterizations, data-driven models, and historical bias-adjusted climate\
    \ datasets.\"\n\n\"Recent work has shown our ability to identify the proportion\
    \ of production anomalies attributable to climate conditions and long-term climate\
    \ changes.\"\n\n\"The development of historical counterfactual climate datasets\
    \ (representing recent climate without human climate changes) that are suitable\
    \ for agricultural modeling and analysis is a prerequisite for the direct detection\
    \ and attribution of human influences on the food system.\"\n\n\"The AMS plays\
    \ a crucial role in supporting the modeling and attribution of meteorological\
    \ and climate impacts by creating a space for discussion at conferences and engaging\
    \ with committees... However, the AMS should better link these discussions to\
    \ food security applications and encourage greater collaboration across the weather,\
    \ water, climate, and agriculture sectors.\"\n"
