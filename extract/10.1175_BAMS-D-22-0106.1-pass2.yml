  3: "yaml\nDrivers of Risk: \"For those communities that are already food-insecure,\
    \ climate change is a \u201Cthreat multiplier,\u201D threatening crop yields and\
    \ the food supply while also raising prices and reducing growers\u2019 incomes.\"\
    \nDrivers of Risk: \"The complex food system\u2014conceptualized as three simplified\
    \ components including the production, distribution, and consumption of food\u2014\
    is highly vulnerable to weather and climate phenomena such as droughts, floods,\
    \ heat waves, cold spells, and storm events (hail, snow, ice, wind, etc.).\"\n\
    Highlights: \"The article concludes w ith a call to action to the A MS communit\
    \ y to scale up engagement across the food system and embrace an interdisciplinar\
    \ y approach to break dow n the silos that stand in the way of addressing global\
    \ food secur it y.\"\n"
  4: "Source material here: Food production is highly dependent on climate drivers\
    \ including precipitation, temperature, evaporative demand, evapotranspiration,\
    \ and atmospheric carbon dioxide (CO2). Extreme weather events, in particular,\
    \ can have devastating impacts on crops and livestock and the effects of climate\
    \ change will increasingly strain food security. Rising global temperatures will\
    \ shift climate zones suitable for growing crops and increase health risks to\
    \ farm laborers who may have to reduce their working hours due to extreme heat\
    \ and humidity. Food production activities are also a major contributor to global\
    \ GHG emissions, particularly agricultural activities and land-use change, which\
    \ accounted for 71% of the GHG emissions that originated from the global food\
    \ system in 2015. Food distribution and supply networks are vulnerable to weather-\
    \ and climate-driven disruptions to the supply-chain infrastructure, which can\
    \ lead to food loss and waste and, consequently, higher food prices. Food distribution\
    \ also contributes to global GHG emissions, particularly through supply chain\
    \ activities (storage, processing, transport, etc.), which account for approximately\
    \ 5%\u201310% of the food system\u2019s total GHG emissions. Food consumption\
    \ is also affected by climate variables such as temperature and CO2 concentrations,\
    \ which influence biological processes that impact food quality and nutrition.\
    \ Food consumption choices also influence GHG emissions, with plant-based diets\
    \ associated with lower emissions than animal-based diets. Food loss and waste\
    \ accounted for 8%\u201310% of total, global anthropogenic GHG emissions in 2010\u2013\
    16. The key phenomena that weather and climate research and applications communities\
    \ seek to monitor, forecast, and project to support food security decisions are\
    \ climatological suitability conditions and meteorological and hydroclimatic extremes.\
    \ Agroclimatic information is derived from in situ observations or remotely sensed\
    \ platforms. Retrospective analyses (reanalyses), derived from assimilation of\
    \ observations into modeling frameworks, produce seamless spatial and temporal\
    \ datasets that fill in observational gaps. Direct application of agrometeorological\
    \ and agroclimatic information derives indices representing important agricultural\
    \ conditions that support food security decision-making frameworks. Additionally,\
    \ weather and climate data may be indirectly used at a variety of time frames\
    \ to create impacts assessment."
  5: "Source material here.\nThe page discusses food security as an outcome being\
    \ evaluated, specifically in relation to water availability and agricultural production:\
    \ \"Providing hydrometeorological, climatological, and agronomic support for food-security\
    \ monitoring requires data across time and space scales...\"\n\nChanges in precipitation,\
    \ temperature, and, more broadly, atmospheric evaporative demand are impacting\
    \ food security: \"While precipitation and temperature have long been the most\
    \ commonly estimated quantities, other physically relevant quantities are often\
    \ more useful... atmospheric evaporative demand represents a physical link between\
    \ plant physiology, water stress and/or availability, and atmospheric conditions...\"\
    \n\nLand-use changes due to agricultural expansion are also mentioned as drivers\
    \ of risk: \"At the global scale, the expansion of agriculture and consequent\
    \ land-use changes have altered land surface\u2013atmosphere interactions and\
    \ local-to-regional patterns of climate variability.\"\n\nThe paper mentions metrics\
    \ like the water requirement satisfaction index (WRSI) and standardized precipitation\
    \ evapotranspiration index (SPEI), suggesting a quantitative approach to assessing\
    \ water stress: \"...it is used as an input in such metrics as the water requirement\
    \ satisfaction index (WRSI) and standardized drought indices such as the standardized\
    \ precipitation evapotranspiration index (SPEI).\"\n\nThe paper discusses the\
    \ use of various models to assess the impact of climate on food security: \"...models,\
    \ water-stress models, agricultural water demand models, crop water requirements\
    \ models, genetic-by-environment models, or more comprehensive crop, livestock,\
    \ and socio-economic models...\"\n\nThe importance of balancing physical relevance\
    \ with data availability and predictability in model selection: \"The choice of\
    \ states and fluxes to be observed, modeled, or forecasted must strike a balance\
    \ between the competing demands of physical relevance to food security and the\
    \ observability, predictability, and availability of data.\"\n\nAtmospheric evaporative\
    \ demand is highlighted as a crucial physical link between plant physiology, water\
    \ stress, and atmospheric conditions: \"...demonstrates the power of implementing\
    \ an accurate, long-term reanalysis of evaporative demand in food-security monitoring...\"\
    \n\nThe need for data across time and space scales is emphasized: \"Providing\
    \ hydrometeorological, climatological, and agronomic support for food-security\
    \ monitoring requires data across time and space scales...\"\n\nThe paper emphasizes\
    \ the interconnectedness of the food system and the importance of considering\
    \ various stakeholders and their decision-making scales: \"The interconnected\
    \ food system can also buffer consumers and prices against regional heterogeneity\
    \ and extreme event risks via diverse production regions and well-established\
    \ value chains.\"\n"
