  13: 'Source material here: Across Africa, forecast-based financing (FbF) has been
    used in practice to anticipate potentially catastrophic drought and support resilience
    in the food system. 49 million are on the brink of famine due to ongoing conflict,
    economic consequences of the COVID-19 pandemic, and weather and climate shocks.
    Effective early warning enables early action and weather and climate information
    play crucial roles in supporting anticipatory humanitarian action that saves lives
    and livelihoods, reduces losses and damages, and enhances food security. For example,
    forecast-based financing is a form of humanitarian action that uses weather and
    climate forecasts and detailed risk analyses to release financial resources ahead
    of a disaster in order to enable early action (IFRC 2019). This approach, summarized
    in the FbF for droughts sidebar, has successfully been used in various contexts
    across the world to not only save lives and livelihoods, but also reduce losses
    and damages and support the resilience of local communities. In the context of
    sustainable development, a robust understanding of climate risk and uncertainty,
    integrated with local, traditional, and Indigenous knowledge, is key to successful
    food security interventions.'
  14: '

    As human-induced emissions continue to rise, climate change will lead to potentially
    unprecedented impacts on the global food system, jeopardizing food security and
    disproportionately affecting vulnerable communities. Actionable early warnings
    depend on reliable forecasts, yet predictability of precipitation, in particular,
    is low and there is a crucial need for further model development and research.
    Additionally, the most food insecure regions of the world are also often the most
    data sparse, which presents a significant challenge in monitoring, forecasting,
    and food system vulnerability mapping to inform decision-making. However, improving
    weather and climate science will not be enough. It will be necessary to take a
    systems-thinking approach that recognizes the risks to global food security are
    not independent, but are instead indivisible from socioeconomic and geopolitical
    challenges, often leading to cascading crises. Integration of the physical, economic,
    and behavioral sciences is crucial because no one discipline can address global
    food security alone; indeed, better linking meteorologists, climatologists, and
    agronomists with sustainable development practitioners, policymakers, and other
    users is essential to improve communication and knowledge exchanges.

