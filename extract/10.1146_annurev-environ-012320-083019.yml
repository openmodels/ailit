  17: "Source material here.\nLosses of marine biodiversity from ocean acidification\
    \ impacts on marine systems can also affect cultural services (199\u2013202)...Nearly\
    \ every study that identifies potential harm from ocean acidification to ecosystem\
    \ services also identifies possible interventions (Figure 4). There is consensus\
    \ across the scientific community that the foremost solution to ocean acidification\
    \ is to cut atmospheric CO2 emissions (14, 207\u2013211)...Adaptive management\
    \ of marine systems, where management interventions are implemented to achieve\
    \ particular ecosystem function goals, evaluated, and adjusted in response to\
    \ new information or cumulative effects of change, is often cited as a possible\
    \ intervention. Multi-stakeholder ocean planning, where shared objectives are\
    \ set and ocean uses are coordinated among interest groups, shows promise for\
    \ allowing many ocean uses to continue in a sustainable way...In coastal zones,\
    \ ocean acidification interacts with other anthropogenic and natural drivers such\
    \ as pollution, freshwater runoff, and coastal plankton blooms (215), but many\
    \ existing water quality regulatory policies can start to help address coastal\
    \ acidification locally (216)...Husbandry of captive or wild species also offers\
    \ intervention opportunities...The least well-developed group of interventions\
    \ involves increasing the adaptive capacity of human communities that depend on\
    \ marine resources.\n"
  18: " \nEvaluation overview: \"Major challenges remain, however, in understanding\
    \ the implications of the ongoing long-term, press perturbation of ocean acidification\
    \ for marine species, ocean biological communities and ecosystems, and the risks\
    \ to human communities that depend on marine resources and ecosystem services.\"\
    \nDrivers of Risk: \"Human CO2 emissions alter surface seawater acid-base chemistry\
    \ globally, with additional coastal acidification from nutrient pollution and\
    \ other factors.\"\nHighlights: \"Front-line risks to human communities have been\
    \ identified, including loss of shellfish harvests and decline in coastal protection\
    \ by coral reefs, and more risks are being investigated.\"\nHighlights: \"The\
    \ scientific study of seawater chemistry changes due to rising atmospheric CO2\
    \ and the sensitivity of marine life to elevated CO2 have advanced dramatically\
    \ in the past two decades. Efforts to understand the sensitivity of marine species\
    \ to projected future ocean acidification are delving into detailed characterization\
    \ and mechanisms of species sensitivity, consideration of acclimation and adaptation,\
    \ greater ecological relevance including consideration of multiple stressors,\
    \ and detection and attribution of the impacts for ocean ecosystems.\"\n"
  19: Acidification likely will impact aquaculture, fisheries, shoreline protection,
    and other valuable marine ecosystem services, resulting in vulnerabilities and
    risks to human communities, but interventions designed to address other issues
    (e.g., biodiversity loss, water quality, governance) may also help address harm
    from ocean acidification. The ultimate solution to ocean acidification involves
    global-scale reductions in human CO2 emissions, with local adaptation strategies
    also needed to minimize harm from the impacts that are inevitable. Enhanced monitoring
    of ocean acidification is possible by leveraging improved autonomous ocean platform
    and sensor, remote sensing, data analysis, and modeling technologies. Development
    and evaluation of adaptation solutions for ocean acidification are key priorities
    that will likely require coproduction of knowledge and close cooperation by scientists,
    resource managers, and stakeholders. Marine management strategies need updating
    to balance protection and sustainable human uses in the face of overlapping global-scale
    changes like acidification, warming, and oxygen loss.
