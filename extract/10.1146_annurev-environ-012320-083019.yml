Drivers of Risk:
  1: Rising atmospheric CO2 levels leading to increased seawater CO2 and inorganic
    carbon levels, reductions in pH, and changes in acid-base chemistry.
  3: Ocean acidification driven by increases in atmospheric CO2 caused by human activities
    and is projected to continue without deliberate climate mitigation.
  4: The primary driver of risk is the increase in atmospheric CO2 from fossil fuel
    combustion leading to ocean acidification. Coastal acidification is exacerbated
    by upwelling, excess nutrients/organic carbon inputs, and low-alkalinity freshwater
    fluxes.
  6: The main drivers of risk mentioned include high CO2 levels combined with low
    dissolved oxygen and elevated temperature, as well as variability in coastal carbonate
    chemistry.
  7: Ocean acidification, CO2 enrichment, multiple drivers of environmental change.
  8: High CO2 conditions, hypoxia due to low oxygen levels, and interactions with
    other changing ocean conditions.
  10: Ocean acidification is impacting the outcomes on marine habitats.
  11: Ocean acidification, warming, and increased stratification are the changes impacting
    marine microbial communities and food webs.
  13: Ocean acidification, alone and in conjunction with other stressors, is a driver
    of risk.
  14: Increased atmospheric carbon dioxide leading to ocean acidification.
  15: "Ocean acidification combined with erosion and other disturbances have lowered\
    \ the seafloor around carbonate platform environments in the Florida Keys, Caribbean,\
    \ and near Hawai\u2018i, accelerating the rate of relative sea-level rise and\
    \ endangering human safety and property."
  16: Ocean acidification, coastal disturbances (trampling, sedimentation, dredging,
    pollutants, poisons), climate-associated reef loss, reshuffling of species composition.
  17: Ocean acidification, ocean warming, oxygen loss, pollution, freshwater runoff,
    coastal plankton blooms, and redistribution of species across management boundaries.
  18: Human CO2 emissions altering surface seawater chemistry and nutrient pollution
    leading to coastal acidification are identified as drivers of risk.
  19: Ocean acidification, exacerbated by global CO2 emissions, is identified as a
    key driver of risk to marine environments and human communities.
  21: Ocean acidification and its interaction with seawater carbonate parameters (Hurd
    et al., 2019). Anthropogenic changes in the sensory landscape of marine animals
    (Nagelkerken et al., 2019). Elevated carbon dioxide and ocean acidification (Heuer
    and Grosell, 2014; Tresguerres and Hamilton, 2017; Cattano et al., 2018; Esbaugh,
    2018; Wang et al., 2018; Dutkiewicz et al., 2015).
  23: Ocean acidification is the primary driver of risk examined in various marine
    species, as evident from the studies of sea urchins, algae, and other marine organisms.
  24: Ocean acidification and climate change are identified as key drivers impacting
    marine ecosystems.
  29: Ocean acidification (204, 207, 208, 209, 211, 212, 213, 219) is a recurring
    driver, along with climate change (213, 224) and harmful algal blooms (223).
Evaluation overview:
  1: Discusses the widespread biological impacts of ocean acidification, including
    changes in organism physiology, population dynamics, communities, and ecosystems.
  3: The paper aims to provide a review of impacts related to ocean acidification
    including physiological processes and ecosystem-level dynamics.
  4: The page discusses the impact of ocean acidification on marine organisms that
    use calcium carbonate for shell and skeleton formation.
  6: This page provides an overview of the outcomes of species sensitivity to ocean
    acidification, indicating variations in growth rates, survival, and developmental
    impacts influenced by different environmental conditions.
  7: Studies generate information on how ocean global change will influence marine
    life.
  8: The page discusses the ecological relevance of experiments on ocean acidification
    and the direct and indirect impacts on marine ecosystems.
  10: General trends in community and ecosystem properties and processes in response
    to ocean acidification for seagrass meadows, coral reefs, other carbonate reef
    ecosystems, and pelagic food webs.
  11: This page provides an overview of ocean acidification's impact on marine ecosystems,
    including productivity and species interactions.
  13: Ecosystem services and the benefits that marine systems provide to human communities.
  14: Examines the impacts of ocean acidification on shellfish harvests and provisioning
    ecosystem services, including bivalve reproduction, survival of juvenile bivalves,
    maturation of adults, recruitment, harvestable biomass, maximum sustainable yield,
    and economic value of shellfish fisheries.
  15: "Potential economic and cultural losses of coral reef\u2013provided ecosystem\
    \ services\u2014coastal protection, habitat and biodiversity, fisheries, recreational\
    \ and tourism opportunities, and existence and amenity values\u2014have been considered\
    \ since the earliest days of ocean acidification research."
  16: Focuses on the impacts of ocean acidification on coastal systems, including
    vermetid and shellfish reefs, submerged aquatic vegetation, wetlands, mangroves,
    and biodiversity.
  17: Losses of marine biodiversity from ocean acidification impacts on marine systems
    affecting cultural services.
  18: The paper provides an overview of biological impacts and human community risks
    due to ocean acidification.
  19: The paper discusses the impacts of ocean acidification on aquaculture, fisheries,
    shoreline protection, and marine ecosystem services, highlighting vulnerabilities
    and risks to human communities.
  21: Ecological theory and community-level effects (Gaylord et al., 2015).
  23: The focus is on ocean acidification impacts, examining aspects like changes
    in calcification, adaptability, biogeography, and potential evolutionary changes
    in marine organisms.
  24: The page discusses various ecological outcomes such as shifts in ecosystem structure,
    species dominance, and food web dynamics linked to ocean acidification.
  29: Several papers discuss ecosystem services, particularly marine and coastal (205,
    217, 224, 225), and coral reef ecosystem services (214, 221, 225).
  32: No relevant information
Highlights:
  1: Many valuable ecosystem services, such as fisheries, aquaculture, and shoreline
    protection, are potentially at risk due to ocean acidification and related environmental
    stresses.
  4: Ocean acidification is occurring rapidly due to human CO2 emissions, and present-day
    CO2 levels have not been experienced for millions of years. The human-induced
    CO2 growth rate is much faster than during glacial-interglacial transitions.
  6: One highlight is the discovery of individuals or populations that are more resilient
    to high CO2 conditions. A variety of experimental strategies are being employed
    to project present versus future sensitivity.
  7: Information on ecosystem services could inform policy.
  8: The complexity of multiple changing ocean parameters makes it challenging to
    design relevant experiments.
  10: Altered behavior in marine consumers caused by ocean acidification can weaken
    predator-prey links, causing cascading effects on community structure and function.
  11: Ocean acidification could disrupt pelagic food webs via the proliferation of
    toxic algal blooms and may have already affected coral reefs by reducing the net
    calcification rate.
  13: Ocean acidification impacts on the Pacific oyster industry in the Pacific Northwest
    in the mid-2000s framed ocean acidification as a present-day concern with direct
    implications for businesses and coastal communities.
  14: Ocean acidification causes decreases in bivalve reproduction and survival. Economic
    losses for US and UK mollusk harvests are projected to be substantial.
  15: Ocean acidification, combined with erosion and other disturbances, can lower
    seafloors and endanger human safety and property. Loss of coral reefs is expected
    to significantly increase flood damage from storm events.
  16: Ocean acidification negatively affects vermetid and shellfish reefs, submerged
    aquatic vegetation, and biodiversity. Coastal systems like wetlands and mangroves
    can help mitigate ocean acidification by capturing carbon. Reduced biodiversity
    associated with acidified conditions decreases ecosystem resilience and compromises
    regulating services.
  17: The foremost solution to ocean acidification is to cut atmospheric CO2 emissions.
    Adaptive management of marine systems and multi-stakeholder ocean planning show
    promise. Existing water quality regulatory policies can help address coastal acidification
    locally. Husbandry of captive or wild species and increasing the adaptive capacity
    of human communities are also potential interventions.
  18: Seawater chemistry changes, species sensitivity to ocean acidification, and
    adaptation-focused interventions are critical areas of study.
  19: Global-scale reduction in CO2 emissions is necessary, and local adaptation strategies
    are needed to minimize harm; enhanced monitoring and development of adaptation
    solutions are key priorities.
  21: Systematic assessment of ocean-based mitigation and adaptation solutions to
    climate change (Gattuso et al., 2018). Synthesis covering marine fish respiratory
    acid-base, early-life, metabolic, reproductive, and neurosensory physiological
    impacts (Esbaugh, 2018). Authoritative guide to improve reproducibility and consistency
    of ocean acidification experiments and data across communities (Riebesell et al.,
    2010).
  24: Key outcomes include changes in community resilience, ecosystem shifts from
    coral to macroalgae dominance, and the emergence of winners and losers in phytoplankton
    communities due to ocean acidification.
Methodology:
  3: The review synthesizes knowledge from recent scientific literature, highlighting
    organismal, community, and ecosystem-level responses to ocean acidification.
  4: The page describes the chemical processes of ocean acidification, including the
    relationships between CO2, pH, DIC, alkalinity, temperature, salinity, and pressure.
  6: The analysis involves various experimental strategies to assess species sensitivity
    to acidification, considering issues like inference from short-term experiments,
    study subject selection, and treatment conditions.
  7: Mesocosm experiments including free ocean carbon-dioxide enrichment (FOCE), competition
    experiments, studies of acclimated species under acidification, long-term microevolution
    studies, multiple driver studies, and sites of CO2 natural enrichment such as
    CO2 seeps.
  8: Discusses the design of experiments regarding ocean acidification, highlighting
    a mechanistic, reductionist approach versus a scenario-based approach considering
    multiple factors.
  10: Trends are derived from studies of multiple-species experiments or observational
    studies in naturally acidified ecosystems.
  14: Models with simple CO2-damage relationships for all bivalves and time discounting
    are used to project economic losses. Studies with varying degrees of complexity
    have examined potential economic losses from shellfish harvest decreases. Timeframes
    vary depending on the study, with some looking out to 2100.
  17: The paper discusses interventions and adaptations based on a review of studies
    identifying potential harm from ocean acidification to ecosystem services. It
    also refers to adaptive management, multi-stakeholder ocean planning, husbandry
    of species, and increasing the adaptive capacity of human communities.
  24: The studies cited involve both experimental and observational analyses of marine
    ecosystems under different levels of CO2 and climate conditions.
  29: Participatory mapping of ecosystem services (206) and Bayesian networks for
    coral reef ecosystem services (225) are mentioned as methodologies.
  32: No relevant information
More Notes:
  6: The text discusses characterization of present vs. future species sensitivity,
    emphasizing the need to understand phenotypic plasticity and natural selection
    in responses to ocean acidification.
  7: Figure 2 is adapted from Boyd et al. (47) and originally developed by Riebesell
    & Gattuso (227).
  8: There is recognition of publication bias against negative results, affecting
    data representativeness.
  13: Detecting changes in ecosystem services and attributing them specifically to
    ocean acidification is challenging due to multiple stressors and adaptation.
  29: There's a focus on management and policy options related to ocean acidification
    (207, 215, 216), climate negotiations (210), and the role of marine protected
    areas (222) in resilience management.
  32: No relevant information
Quantitative material:
  4: Atmospheric CO2 is increasing by roughly 2 ppm/year or 0.5% per year. Surface
    ocean pH has dropped by approximately 0.1 units since the preindustrial era.
  7: Long-term (>400 generations) microevolution studies.
  14: "Models project 10\u201328% losses for both US and UK mollusk harvests annually."
  15: Without coastal protection from reefs, specifically, flood damages from 100-year
    storm events would nearly double, rising to $272 billion.
  16: "Oyster reefs provide an estimated value of $5,500\u2013$99,000 per hectare\
    \ per year via shoreline stabilization, habitat creation, and water filtration."
  21: Surface Ocean CO2 Atlas (SOCAT) multi-decade record of high-quality fCO2 data
    (Bakker et al., 2016).
  32: No relevant information
