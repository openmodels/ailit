  10: "  \nGeneral trends in community and ecosystem properties and processes in response\
    \ to ocean acidification for seagrass meadows, coral reefs, other carbonate reef\
    \ ecosystems, and pelagic food webs. \n\nTrends are primarily derived from studies\
    \ of multiple-species experiments or observational studies in naturally acidified\
    \ ecosystems.\n\nAltered behavior in marine consumers (e.g., predator avoidance)\
    \ caused by exposure to conditions of ocean acidification can also weaken predator-prey\
    \ links in marine food webs, causing cascading effects on community structure\
    \ and function (105).\n"
  11: 'Source material: Modeling work suggests that ocean acidification, warming,
    and increased stratification will drive changes in marine microbial community
    makeup...Ocean acidification could also disrupt pelagic food webs via the proliferation
    of toxic algal blooms...The persistence of coral reefs depends on the balance
    of net accretion (carbonate production minus dissolution) and bioerosion...Ocean
    acidification, warming, and increased stratification are the changes impacting
    marine microbial communities and food webs...Ocean acidification can either increase
    the toxicity of the harmful algae or increase the abundance of toxic bloom-forming
    species through altered competitive interactions...This suggests that coral reefs
    have already suffered declines in net calcification associated with ocean acidification.'
  13: "Source material here.\n5. RISKS TO HUMAN COMMUNITIES\nThe emergence of ocean\
    \ acidification impacts on the Pacific oyster industry in the Pacific Northwest\
    \ United States in the mid-2000s (144) immediately framed ocean acidification\
    \ as a present-day concern with direct implications for small and large businesses\
    \ and coastal communities. Since then, much ocean acidification research has focused\
    \ on economically, culturally, and ecologically important species. Other studies\
    \ have focused on how ocean acidification will ultimately alter the benefits that\
    \ marine systems provide to human communities (also called ecosystem services,\
    \ or nature\u2019s contributions to people).\nDetecting changes in ecosystem services\
    \ can be challenging, and attributing those changes to one long-term driver, such\
    \ as ocean acidification, is even more difficult. Moreover, human and natural\
    \ systems are constantly adapting and responding to ocean acidification in a multi-stressor\
    \ context, while the risk of harmful changes to ecosystem services from climate\
    \ change is increasing (145, 146).\n"
  14: "Source material here: Ocean acidification\u2019s potential effects on shellfish\
    \ harvests and provisioning ecosystem services became a research theme (148).\
    \ Ocean acidification causes decreases in bivalve reproduction, survival of juvenile\
    \ bivalves, or delayed maturation of adults and can alter recruitment, harvestable\
    \ biomass, maximum sustainable yield, and economic value of shellfish fisheries\
    \ (149). Impact pathway from increased atmospheric carbon dioxide (CO2) to changes\
    \ in social-ecological systems. Models with simple CO2-damage relationships for\
    \ all bivalves and time discounting have projected losses of approximately 10\u2013\
    28% losses for both US and UK mollusk harvests annually (148, 153). Models with\
    \ simple CO2-damage relationships for all bivalves...Studies with varying degrees\
    \ of complexity have examined potential economic losses from as-sociated shellfish\
    \ harvest decreases...US losses toward 2100 are estimated at $400 million USD\
    \ and global losses...from $6 billion to $100 billion USD annually. Ocean acidification\
    \ causes decreases in bivalve reproduction, survival of juvenile bivalves, or\
    \ delayed maturation of adults...Models with simple CO2-damage relationships for\
    \ all bivalves and time discounting have projected losses of approximately 10\u2013\
    28% losses for both US and UK mollusk harvests annually (148, 153)."
  15: "Source material here: Potential economic and cultural losses of coral reef\u2013\
    provided ecosystem services\u2014coastal protection, habitat and biodiversity,\
    \ fisheries, recreational and tourism opportunities, and existence and amenity\
    \ values\u2014have been considered since the earliest days of ocean acidification\
    \ research. Ocean acidification combined with erosion and other disturbances have\
    \ lowered the seafloor around carbonate platform environments in the Florida Keys,\
    \ Caribbean, and near Hawai\u2018i, accelerating the rate of relative sea-level\
    \ rise and endangering human safety and property. Without coastal protection from\
    \ reefs, specifically, flood damages from 100-year storm events would nearly double,\
    \ rising to $272 billion (173). Ocean acidification, combined with erosion and\
    \ other disturbances, can lower seafloors and endanger human safety and property.\
    \ Loss of coral reefs is expected to significantly increase flood damage from\
    \ storm events."
