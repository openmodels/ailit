  3: "yaml\nEvaluation overview: \"This review focuses on the rapidly expanding body\
    \ of knowledge on ocean acidification in the scientific literature over the past\
    \ decade...\"\nDrivers of Risk: \"Atmospheric CO2 and the concurrent ocean acidification\
    \ are projected to continue to rise through mid-century, if not longer, without\
    \ deliberate and decisive international action on climate mitigation and emissions\
    \ reductions.\"\nMethodology: \"It builds from numerous recent synthesis efforts\
    \ in journal special issues (10) and national and international scientific assessments\
    \ (11\u201314).\"\n"
  4: "Calcite: a less soluble mineral form of calcium carbonate used by marine organisms\
    \ in shell and skeleton formation via biomineralization\u2026 Ocean surface waters\
    \ exchange CO2 with the overlying atmosphere via physical gas transfer, and the\
    \ surface seawater partial pressure, pCO2, tends to track the growth of atmospheric\
    \ CO2 for much of the global ocean\u2026 As a result, surface pH and CO2\u2212\
    3 are declining\u2026 surface ocean pH is estimated to have dropped on average\
    \ globally by approximately 0.1 units from the preindustrial era to present\u2026\
    \ On a global scale, acidification of the surface ocean is occurring because of\
    \ the rapid rise in atmospheric CO2. Driven primarily by fossil fuel combustion\u2026\
    \ contemporary human CO2 emissions to the atmosphere of approximately 10 billion\
    \ metric tons of carbon per year result in an increase in atmospheric CO2 of roughly\
    \ 2 ppm/year or 0.5% per year\u2026 Present-day CO2 levels (\u223C410 ppm) have\
    \ not been experienced by life on Earth for several million years, and the human-induced\
    \ CO2 growth rate is nearly two orders of magnitude faster than what occurred\
    \ during the large glacial-interglacial transitions\u2026 More acidified ocean\
    \ conditions, found regionally due to natural processes and local human impacts,\
    \ are exacerbated by the global acidification signal driven by CO2 emissions.\
    \ Coastal upwelling systems typically have elevated CO2 and low O2 levels because\
    \ of the marine biological pump\u2026 Similar high CO2\u2013low O2 conditions\
    \ are found in many coastal and estuarine systems associated with excess nutrient\
    \ and organic carbon inputs from land sources. Coastal acidification can also\
    \ occur because of low-alkalinity freshwater fluxes from rivers, groundwater,\
    \ and ice melt."
  6: " \nEvaluation overview: \"As more detailed information on species sensitivity\
    \ to ocean acidification conditions becomes available, generalizations about patterns\
    \ in sensitivity are difficult to make... Negative additive effects typically\
    \ occur with simultaneous exposure to high CO2 and low dissolved oxygen... A trend\
    \ toward lower survival, slower growth, and development is also evident with simultaneous\
    \ exposure to high CO2 and elevated temperature (45).\"\n\nDrivers of Risk: \"\
    Similar to the marine heat wave events that punctuate the warming trend induced\
    \ by climate change, the impacts of acidification may first be witnessed in coastal\
    \ ecosystems that express more variability in carbonate chemistry and could episodically\
    \ move across biological thresholds of sensitivity... Negative additive effects\
    \ typically occur with simultaneous exposure to high CO2 and low dissolved oxygen\
    \ (44). A trend toward lower survival, slower growth, and development is also\
    \ evident with simultaneous exposure to high CO2 and elevated temperature (45).\"\
    \n\nMethodology: \"As Figure 2 shows, a variety of experimental strategies are\
    \ being used to characterize the sensitivity of species to acidification now and\
    \ in the future... Complementary approaches are needed because any one technique\
    \ is limited by issues related to drawing inferences from short-term experiments...\
    \ choices about treatment conditions and study subjects, logistics related to\
    \ engineering and animal husbandry, and other factors (35).\"\n\nHighlights: \"\
    Discovery of individuals or populations more resilient to high-CO2 conditions\
    \ has arisen by testing the repeatability within and between identical sensitivity\
    \ experiments (51, 52)... As Figure 2 shows, a variety of experimental strategies\
    \ are being used to characterize the sensitivity of species to acidification now\
    \ and in the future (46, 47).\"\n\nMore Notes: \"Although useful, this approach\
    \ does not necessarily yield information on how species in their future state\
    \ will react to changes in seawater carbonate chemistry as acidification progresses\
    \ in the environment. Predicting how marine populations will evolve in response\
    \ to climate change and ocean acidification requires consideration of the flexibility\
    \ of individuals in each generation to adjust to new environmental conditions\
    \ (i.e., phenotypic plasticity) and natural selection across environments (50).\"\
    \n"
  7: "plaintext\nEvaluation overview: 'Various types of studies generate information\
    \ about how ocean global change will influence marine life.'\nDrivers of Risk:\
    \ 'Studying populations living in naturally high-CO2 environments is another way\
    \ to explore whether long-term exposure to high CO2 can confer resistance to ocean\
    \ acidification.'\nQuantitative material: 'Figure 2...long-term (>400 generations)\
    \ microevolution studies.'\nMethodology: 'The cube, a visualization developed\
    \ by Riebesell & Gattuso (227), represents different scales of space and biological\
    \ organization, time, and drivers of environmental change. It depicts schematically\
    \ where information on ecosystem services that could inform policy would emerge\
    \ and where currently pursued types of research are located in time/space dimensions:\
    \ \u25CF1 mesocosms, including free ocean carbon-dioxide enrichment (FOCE) experiments;\
    \ \u25CF2 competition experiments; \u25CF3 typical acclimated species under acidification;\
    \ \u25CF4 long-term (>400 generations) microevolution studies; \u25CF5 multiple\
    \ driver studies; and \u25CF6 sites of CO2 natural enrichment such as CO2 seeps.'\n\
    Highlights: 'It depicts schematically where information on ecosystem services\
    \ that could inform policy would emerge and where currently pursued types of research\
    \ are located in time/space dimensions.'\nMore Notes: 'Figure adapted from Boyd\
    \ et al. (47) with permission of John Wiley and Sons and originally developed\
    \ by Riebesell & Gattuso (227).'\n"
  8: 'yaml

    Evaluation overview: "The ecological relevance of aspects of present-day experimental
    capabilities can be debated, and the resulting knowledge gaps limit our ability
    to project or model the potential direct and indirect impacts of acidification
    at the ecosystem level (49)."

    Drivers of Risk: "Elevated CO2 in coastal regions and the deep ocean typically
    co-occurs with low oxygen or hypoxia, both generated by respiration of organic
    matter (44)."

    Methodology: "Boyd et al. (47) describe two complementary paths: (a) a mechanistic,
    reductionist approach in which the influence of each aspect of ocean change is
    considered alone and then in conjunction with other aspects of ocean change; and
    (b) a scenario-based approach in which multiple variables are altered together
    to match future projections of ocean conditions."

    Highlights: "Designing research studies to tackle the complexity of multiple changing
    parameters, while still being logistically feasible and interpretable, is a challenge."

    More Notes: "Publication bias against sharing negative experimental results, that
    is cases with no or small CO2 effects, also may limit the representativeness of
    available data for synthesis and modeling (35)."

