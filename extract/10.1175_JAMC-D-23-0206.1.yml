  4: The Peak Over Threshold (POT) method was not used due to its high dependence
    on the threshold chosen and clustering distance. Model performance is rated using
    Pearson's r, RMSE, p value, and coefficient of determination (R2). A 30-km spatial
    aggregation is used for the 100-yr return periods.
  6: Discusses the importance of model accuracy, especially concerning tropical cyclones
    and monsoon impacts.
  8: "The 99th percentile of daily precipitation displayed large areas of greater\
    \ than 50% increase by the end of the twenty-first century in all seasons except\
    \ June\u2013August. Regions experiencing increased MCS precipitation resemble\
    \ areas with significant increases in the 99th percentile of daily precipitation."
  9: The estimation bias may be due to skewed extreme values and significant outliers
    when extracting extremes. The authors explicitly note an estimation bias related
    to the amount of input data.
  11: No relevant information
  13: The analysis focuses on eight climatologically unique cities; the specific cities
    are not listed on this page.
  14: Analysis includes results for eight climatologically unique cities.
  15: The increases in return period precipitation values have significant implications
    for infrastructure, especially considering structures currently under construction
    that assume historical values.
  17: The paper notes that future work could focus on sub-daily preciptation accumulations
    and a larger ensemble approach to discern future changes.
  18: All simulation data should be accessed through collaboration by contacting Gensini.
  19: This page primarily contains references. Without reading the cited papers, it's
    impossible to extract detailed information about their specific findings and methodologies.
