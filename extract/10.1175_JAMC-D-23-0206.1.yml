  2: "Source material\nEvaluation overview: \"Here, we use a novel dynamically downscaled\
    \ convection-permitting simulation to examine projected changes in extreme daily\
    \ precipitation throughout the CONUS during the twenty-first century.\"\n\nDrivers\
    \ of Risk: \"Highlighting the potential changes in future extreme precipitation\
    \ can inform stakeholders so that they may develop effective mitigation and adaptation\
    \ strategies to reduce impacts.\"\n\nQuantitative material: \"RCM simulations\
    \ were continuously integrated over a hydrologic year (1 October\u201330 September),\
    \ with reinitialization each 1 October. Simulated time periods include three 15-yr\
    \ epochs, with a historical (HIST) baseline (1990\u20132005) and two future epochs\
    \ (EOC; 2085\u20132100) using RCP4.5 (EOC4.5) and RCP8.5 (EOC8.5) future climate\
    \ scenarios.\"\n\nMethodology: \"Our RCM simulations were conducted with the Advanced\
    \ Research version of Weather Research and Forecasting (WRF) Model (WRF-ARW version\
    \ 4.1.2; Skamarock et al. 2019) configured with a horizontal grid spacing of 3.75\
    \ km and 51 vertical levels across the CONUS.\" ... \"Initial and lateral boundary\
    \ conditions input into the RCM stemmed from the Community Earth System Model\
    \ (CESM; Hurrell et al. 2013) GCM output, a participant in phase 5 of the Coupled\
    \ Model Intercomparison Project (CMIP5; Taylor et al. 2012). We used a version\
    \ of these data from Bruyere et al. (2014) that performed an additional regrid\
    \ and bias-correction using 1981\u20132005 ERA-Interim reanalysis (Dee et al.\
    \ 2011). Spectral nudging was used at 6-h intervals to large-scale (3 x;2y) features\
    \ for temperature T, speci\uFB01c humidity q, zonal wind speed u, meridional wind\
    \ speed y, and geopotential F above the planetary boundary layer.\"\n\nHighlights:\
    \ \"The model used herein allows for representation of regional climate change\
    \ of precipitation extremes closer to the local scales at which they occur (e.g.,\
    \ ~4-km horizontal grid spacing), which is of great interest to stakeholders.\"\
    \n\nMore Notes: \"Spatiotemporal changes in MCSs can have signi\uFB01cant socioeconomic\
    \ impacts since a large proportion of annual precipitation accumulation stems\
    \ from these events (e.g., Ashley et al. 2003; Schumacher and Johnson 2006; Stevenson\
    \ and Schumacher 2014; Feng et al. 2016; Prein et al. 2017; Haberlie and Ashley\
    \ 2019).\"\n"
  3: " \nExtreme precipitation changes over relatively short intervals are particularly\
    \ important due to their potential societal impacts, and given the many options,\
    \ it was important to choose the optimal definition that can be directly compared\
    \ to previous research and ensure relevance to those impacts.\nAnnual extreme\
    \ events can be used to determine the probability of 100-yr return period precipitation\
    \ values, which can then inform infrastructure design and mitigation efforts...\n\
    Extreme daily precipitation to be the 99th percentile of daily precipitation over\
    \ the entire epoch time series.\nDaily precipitation amounts analyzed herein are\
    \ derived from the Air Force Weather Agency (AFWA; Creighton et al. 2014) total\
    \ simulation precipitation accumulation variable archived at 15-min output intervals\
    \ (in mm)...\nTo compare HIST daily extreme precipitation to observations, we\
    \ use the Parameter-Elevation Regressions on Independent Slopes Model (PRISM;\
    \ Daly et al. 1994).\n...we implement univariate EVA using the Fisher\u2013Tippett\u2013\
    Gnedenko (Fisher and Tippett 1928; Gnedenko 1943) theorem with the daily precipitation\
    \ time series for the PRISM, HIST, EOC4.5, and EOC8.5 epochs...\nThese cities\
    \ are within eight climatologically unique CONUS cities for further analysis:\
    \ Albany, New York; Amarillo, Texas; Grand Junction, Colorado; Minneapolis, Minnesota;\
    \ Nashville, Tennessee; Phoenix, Arizona; Seattle, Washington; and Tallahassee,\
    \ Florida.\n"
  4: "Source Material: In comparing BM and POT methods for climate change impacts\
    \ on global \uFB02ood and extreme precipitation events...The return period (R;\
    \ Makkonen 2006) relates to the likelihood of a precipitation value occurring\
    \ within any given year. These PDFs are of the modeled extremes, not the entire\
    \ epoch time series, where each point has a value and associated probability to\
    \ further identify variability within the epochs.\nComparison of 1990\u20132005\
    \ PRISM and HIST mean and daily 99th percentile precipitation.\nTABLE 1. Comparison\
    \ of 1990\u20132005 PRISM and HIST mean and daily 99th percentile precipitation...Pearson\u2019\
    s r correlation for average annual precipitation between PRISM and HIST was found\
    \ to be 0.89 herein and 0.91 in Gensini et al. (2023), while the RMSE was found\
    \ to be 214.6 mm herein and 210 mm in Gensini et al. (2023) (Table 1).\nHere,\
    \ we use the BM technique since it creates a more stable model, whereas POT is\
    \ highly dependent on the threshold chosen...To avoid capturing seasonality, we\
    \ chose a BM block size of 1 year and extracted values for the model based on\
    \ the maximum 24-h precipitation value for each hydrologic year...Extracted extremes\
    \ were \uFB01t to a maximum likelihood estimate model and a right-skewed Gumbel\
    \ distribution...We used a 1000-iteration bootstrap sample to calculate the 95%\
    \ con\uFB01dence interval of the 2 \u2013500-yr return periods. Statistical signi\uFB01\
    cance was determined where the median EOC epoch return period precipitation value\
    \ was outside the 95% con\uFB01dence interval from the 1000-iteration bootstrap\
    \ sample for the HIST.\nDespite a few regional and seasonal biases, HIST daily\
    \ mean and extreme precipitation are compared favorably to PRISM...the right-skewed\
    \ Gumbel distribution had lower scores than the generalized extreme value distribution,\
    \ except for the HIST and EOC8.5 epochs for Seattle, Washing- ton (Fig. 3 in Stinnett\
    \ 2023)...The HIST 30-km mean return period daily precipitation values were closest\
    \ to NOAA Atlas 14 series...\nwhereas POT is highly dependent on the threshold\
    \ chosen and clustering distance, making the model more sensitive...Model statistics\
    \ such as Pearson\u2019s r, RMSE, p value, and co- e\uFB03cient of determination\
    \ (R2) were used to rate model per- formance...The spatial plots of the 100-yr\
    \ return periods of daily pre- cipitation values for the eight climatologically\
    \ unique cities were spatially aggregated to 30 km from the native 3.75-km horizontal\
    \ grid spacing..."
