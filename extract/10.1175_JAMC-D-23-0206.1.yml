Highlights:
  1: The analysis predicts statistically significant increases in extreme precipitation
    during certain seasons in the Midwest and Ohio Valley and decreases in the southern
    Great Plains.
  2: The model used here allows for representation of regional climate change of precipitation
    extremes closer to the local scales at which they occur
  3: Extreme precipitation changes over relatively short intervals are particularly
    important due to their potential societal impacts.
  4: HIST daily mean and extreme precipitation compare favorably to PRISM, despite
    some regional and seasonal biases.  The right-skewed Gumbel distribution had lower
    AIC scores than the generalized extreme value distribution, except for the HIST
    and EOC8.5 epochs for Seattle, Washington. HIST 30-km mean return period daily
    precipitation values were closest to NOAA Atlas 14 series, PRISM, and the native
    grid spacing data.
  5: HIST dataset shows significantly wetter biases in the Intermountain West and
    northern Great Plains; annual and seasonal correlations between datasets are high,
    with notable wet biases in specific regions and seasons.
  6: Western U.S. to experience significant decreases in extreme precipitation in
    certain seasons; Eastern U.S. shows highest extreme precipitation in the Midwest
    and Southeast.
  7: "Significant increases in extreme precipitation events in the Midwest and Ohio\
    \ Valley during March\u2013May in EOC8.5 scenario."
  8: "Significant increases in mean MCS precipitation in the Northeast into the Appalachian\
    \ Mountains (June\u2013August), Ohio Valley (December\u2013May), and Midwest (March\u2013\
    May and September\u2013November)."
  9: The modeled extremes at lower magnitudes showed reasonable estimations while
    there was an underestimation at the highest magnitudes in six of the eight cities.
  10: Model metrics indicate low RMSE values and admirable Pearson's r correlations
    for input simulation data across multiple cities.
  11: No relevant information
  12: The study found increased variability and a higher ceiling for precipitation
    extremes in several cities (Albany, Minneapolis, Nashville, Phoenix, and Tallahassee)
    under future climate scenarios. Most cities showed an increase in return period
    daily precipitation values in EOC scenarios compared to HIST. The Intermountain
    West, Midwest, Southeast, and Northeast all showed increases in the 100-yr return
    period daily precipitation.
  13: Presents probability density functions for daily precipitation extremes, allowing
    for comparison of frequency and intensity across different time periods and climate
    scenarios.
  14: Solid lines denote the median modeled return period. Dashed lines indicate the
    95% confidence interval (HIST is shaded).
  15: There were statistically significant increases in EOC8.5 for areas of the Intermountain
    West, Southwest, and Northeast while EOC4.5 displayed only sporadic areas of significant
    increases.
  16: RCMs permit explicit representations of hazardous convective weather, which
    is needed for resolving extreme daily precipitation. Results projected increasing
    values of extreme daily precipitation through the end of the twenty-first century
    for both RCP scenarios in many regions in the CONUS, such as the Northeast, Midwest,
    Southeast, and Pacific Northwest.
  17: Projected changes in extreme daily precipitation across various U.S. regions
    by the end of the century can impact societal aspects.
  20: No relevant information
Methodology:
  1: The study uses a convection-permitting regional climate model with historical
    and future scenarios under intermediate and pessimistic emissions.
  2: "Uses a novel dynamically downscaled convection-permitting simulation (WRF-ARW\
    \ version 4.1.2 with 3.75 km horizontal grid spacing) forced by CESM GCM output,\
    \ regridded and bias-corrected using ERA-Interim reanalysis. Spectral nudging\
    \ was used at 6-h intervals to large-scale features for temperature T, speci\uFB01\
    c humidity q, zonal wind speed u, meridional wind speed y ,and geopotential F\
    \ above the planetary boundary layer."
  3: "Daily precipitation amounts are derived from the Air Force Weather Agency (AFWA)\
    \ total simulation precipitation accumulation variable at 15-min output intervals.\
    \ The Parameter-Elevation Regressions on Independent Slopes Model (PRISM) data\
    \ is used to compare historical daily extreme precipitation to observations. Extreme\
    \ daily precipitation is defined as the 99th percentile of daily precipitation\
    \ over the entire epoch time series. Univariate EVA (Extreme Value Analysis) using\
    \ the Fisher\u2013Tippett\u2013Gnedenko theorem is implemented with the daily\
    \ precipitation time series."
  4: Extreme Value Analysis (EVA) is performed using the block maxima (BM) technique
    with a block size of 1 year. The maximum 24-h precipitation value for each hydrologic
    year is extracted and fitted to a right-skewed Gumbel distribution. A 1000-iteration
    bootstrap sample is used to calculate the 95% confidence interval of the 2-500
    year return periods.  Statistical significance is determined by checking if the
    median EOC epoch return period precipitation value is outside the 95% confidence
    interval from the HIST bootstrap sample.
  5: The analysis involves comparing the HIST and PRISM datasets for the 99th percentile
    of daily precipitation, using Pearson's r correlation and RMSE as metrics, with
    Mann-Whitney U test for statistical significance.
  6: Analysis compares historical data with RCP4.5 and RCP8.5 scenarios for 2085-2100,
    focusing on changes in the 99th percentile of daily precipitation.
  7: "Statistical significance determined using Mann\u2013Whitney U test with a false\
    \ discovery rate field significance of alpha = 0.1 to compare historical and projected\
    \ epochs."
  8: Compares historical precipitation data to projections under RCP4.5 and RCP8.5
    scenarios for March-May (MAM). Analyzes changes in mean MCS precipitation and
    the 99th percentile of daily precipitation.
  9: Extreme value analysis (EVA) is performed on WRF time series data. Q-Q plots
    are used to assess the goodness-of-fit between WRF data and modeled EVA distributions.
    The study acknowledges limitations due to the amount of input data (15 values),
    and addresses it by doubling the input data to 30 values.
  10: The analysis involves comparing historical climate data with future scenarios
    (EOC4.5 and EOC8.5) and visualizing differences using various mapping techniques.
  11: Q-Q plot of input WRF vs modeled EVA daily precipitation extreme values. Block
    size of 1 year resulting in 15 values for eight climatologically unique cities.
    Data from 1990-2005 PRISM, 1990-2005 HIST, 2085-2100 EOC4.5, and 2085-2100 EOC8.5
    epochs.
  12: The analysis uses Probability Density Functions (PDFs) and return period analysis
    to evaluate the variability and intensity of extreme daily precipitation. The
    results are applicable to the period 1990-2005 for PRISM and HIST data and 2085-2100
    for EOC4.5 and EOC8.5 scenarios, for eight climatologically unique cities in the
    US.
  13: Compares daily precipitation extremes using PRISM data (1990-2005) and HIST
    simulation data (1990-2005) with future projections EOC4.5 (2085-2100) and EOC8.5
    (2085-2100) simulation data for eight climatologically unique cities.
  14: Analysis uses a 1000-iteration bootstrap sample to calculate the 95% confidence
    interval.
  15: The study investigates changes in extreme daily precipitation, defined as the
    99th percentile value in a 24-h period, historically and in future simulations.
    They use a 1000-iteration bootstrap for each of eight climatologically unique
    cities to determine return periods (5-500 years) of daily precipitation for 1990-2005
    (PRISM and HIST) and 2085-2100 (EOC4.5 and EOC8.5).
  16: "Dynamically downscaled RCM dataset with two end-of-century (2085\u20132100)\
    \ epochs under pathways RCP4.5 and RCP8.5. The simulated HIST epoch (1990\u2013\
    2005) of extreme daily precipitation compared favorably with some slight biases\
    \ to an independent dataset of observations (PRISM)."
  18: Simulation output is available in netCDF format and stored on Argonne systems;
    users must contact coauthor Gensini for access.
  20: No relevant information
More Notes:
  2: "Spatiotemporal changes in MCSs can have signi\uFB01cant socioeconomic impacts\
    \ since a large proportion of annual precipitation accumulation stems from these\
    \ events"
  3: 'Eight climatologically unique CONUS cities are chosen for further analysis:
    Albany, New York; Amarillo, Texas; Grand Junction, Colorado; Minneapolis, Minnesota;
    Nashville, Tennessee; Phoenix, Arizona; Seattle, Washington; and Tallahassee,
