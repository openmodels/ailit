  6: "Source material here. We compared HIST to potential future climate scenarios\
    \ (EOC; 2085\u20132100) using RCP4.5 (EOC4.5) and RCP8.5 (EOC8.5) to assess future\
    \ changes in extreme precipitation. Therefore, changes in extreme precipitation\
    \ in these regions will have large implications for regional hydroclimate stability\
    \ and water scarcity in these climatologically arid regions. Many decreases in\
    \ the 99th percentile of daily precipitation had large negative percent differences\
    \ of 50% \u2013150% in the Southwest and Intermountain West... In HIST, the daily\
    \ 99th percentile precipitation values were generally less than 80 mm for most\
    \ CONUS locations. Results reveal the largest areas of statistically signi\uFB01\
    \ cant decreases in the 99th percentile of daily precipitation were in EOC8.5\
    \ in the Southwest (March\u2013May; Fig. 3e) and Intermountain West (June\u2013\
    August; Fig. 4e). The eastern CONUS (i.e., regions east of the Rocky Mountains)\
    \ showed the highest 99th percentile of daily precipitation in the Midwest and\
    \ Southeast in all seasons. The September\u2013November statistically sig- ni\uFB01\
    \ cant dry bias in the Southeast and along the Atlantic coast may be attributed\
    \ to poor model representation of tropical cyclone precipitation due to limited\
    \ model domain extent over the Gulf of Mexico and Atlantic Ocean (Figs. 1s,t).\
    \ It is important to note that caution should be used when interpreting PRISM\
    \ as ground truth during analysis since it has limitations, especially in regions\
    \ with limited station density and radar coverage."
