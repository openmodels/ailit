  10: "Source material here.\nThe analysis evaluates model metrics such as RMSE, r,\
    \ p, and R2 for assessing the empirical relationship between modeled EVA and input\
    \ WRF distributions. Reasonable model estimation of the input simulation data\
    \ is shown with lower values of p and RMSE, while r and R2 require a value closer\
    \ to one. RMSE values for each city were relatively low considering the limited\
    \ number of input extreme values and the underestimation at high precipitation\
    \ values for some epochs (Table 2). Similarly, an underestimation bias is seen\
    \ for Albany EOC8.5 and Seattle EOC8.5 (Figs. 6a,g and Table 2). The p values\
    \ for all cities were approximately zero and Pearson\u2019s r showed high correlation\
    \ with all cities greater than 0.9, with most epochs greater than 0.95 (Table\
    \ 2). Model metrics of r, p, RMSE, and R2 represent the empirical relationship\
    \ between the modeled EVA and input WRF distributions. The analysis involves comparing\
    \ historical climate data with future scenarios (EOC4.5 and EOC8.5) and visualizing\
    \ differences using various mapping techniques. The image consists of five maps\
    \ of the contiguous United States, labeled a) through e). Each map displays various\
    \ climate data with different color gradients. The RMSE is skewed by those two\
    \ highest magnitude precipitation values being more robustly underestimated and\
    \ using the Q\u2013Q plot gives the visual representation that the other 13 modeled\
    \ values performed well (Fig. 6h). Similarly, an underestimation bias is seen\
