Methodology:
  1: The framework connects valuations, expected returns, and characteristics to investor
    demands using investor-level holdings data.
  5: The analysis uses counterfactual asset reallocations to assess the impact on
    stock valuations and re-estimates cross-sectional valuation regressions with counterfactual
    prices.
  7: The paper designs counterfactuals to capture regulatory and stakeholder risks,
    computes asset prices, and assesses changes by using a framework for climate stress
    tests.
  8: The paper develops an instrumental variables shrinkage estimator to estimate
    investor-specific demand curves. It presents a two-period model with assets and
    investors, using CARA preferences. The model is intentionally stylized but meant
    to extend to a broad set of asset pricing models.
  9: This paper presents an asset pricing model where investors have potentially heterogenous
    beliefs and risk aversion, and it explores how environmental performance may be
    incorporated into investor preferences. It assumes ROEs follow a factor model.
  13: The paper develops an empirically tractable asset demand system to analyze heterogeneity
    in demand curves across investors, building on the work of Koijen and Yogo (2019).
    The model focuses on the top 90% of stocks by market capitalization to avoid being
    driven by micro-cap firms.
  16: Analysis uses firm income statements, balance sheets, Sustainalytics environmental
    scores, and a governance index constructed from entrenchment provisions. Quarterly
    sample begins in 2000 and ends in 2019, with a subsample from 2010-2019 due to
    data availability of environmental and governance scores.
  18: The study uses a panel regression of valuation ratios on characteristics, applying
    year fixed effects and cross-sectional standardization by quarter.
  19: The analysis estimates the asset demand system using standardized characteristics
    across quarters; assumes characteristics are exogenous to latent demand.
  20: The paper constructs an instrumental variable based on investors' investment
    mandates to address the endogeneity of prices to latent demand. It uses exogenous
    variation in these mandates to generate exogenous variation in demand, following
    Koijen and Yogo (2019). Specifically, the instrument relies on the investment
    universe (stocks held in the current or previous two years) and computes counterfactual
    prices when investors hold an equal-weighted portfolio of stocks in their universe.
  22: The robustness of the demand elasticity estimates is tested by expanding the
    window of the investment universe to include stocks held during a varying time
    frame.
  24: "Uses \u03BDx,et(n) as instruments instead of x1,t(n) in estimating the demand\
    \ curve."
  28: The analysis is performed by reallocating the assets of one group of investors
    to all others and measuring the impact on asset prices.
  30: Uses the valuation model of Cohen, Polk, and Vuolteenaho (2003) and Campbell,
    Polk, and Vuolteenaho (2009) to map changes in valuations to expected returns;
    assumes expected growth rates and expected returns are random walks.
  31: Analysis involves an estimated asset demand system to understand the impact
    of changes in investment strategies on valuation and investor welfare.
  32: "Decomposes investor portfolio deviations from the market portfolio due to elastic\
    \ demand, preference for characteristics, and latent demand; Computes portfolio\
    \ weights using a given combination of (\u03B20i,\u02C6\u03B21i, \u03F5it (n))\
    \ to decompose the active share of a given investor in a given quarter."
  34: "The impact on firm valuations is reported by regressing mbt(n) and the change\
    \ in mbCFt(n) \u2212 mbt(n) on firm characteristics in the last quarter of 2019."
  35: The methodology involves setting counterfactual scenarios to assess the impact
    of regulatory and stakeholder risks on asset demand; for example, changing the
    environmental score coefficient to simulate regulatory changes.
  37: Proposes a framework for climate stress tests and models impacts of carbon tax
    and physical damages.
  38: "The methodology includes estimating an asset demand system to analyze impacts\
    \ of trends in asset management on firm valuations and investors\u2019 welfare."
  40: The Engle et al. (2020) paper uses financial modeling to analyze how investors
    hedge against climate change news. The Chang et al. (2015) paper uses a regression
    discontinuity to estimate the effect of stock market indexing. The Egan et al.
    (2020) paper uses investor expectations from demand for index funds.
  46: Equity holdings data are from FactSet; data pertains to 2019 Q4.
  47: Analysis performed using regression models on environmental and governance data
    from 2010-2019 and 2000-2019; involves year fixed effects and standardized characteristics.
  49: Analysis uses firm-level data from FactSet, CRSP, and Compustat, with a sample
    period from 2000 to 2019, averaging quarterly values.
  51: The analysis uses regression to model log market-to-book ratios and changes
    in these ratios. Characteristics used as independent variables are standardized
    cross-sectionally by year. The data is end of year for 2019. Holdings data are
    from FactSet, and firm-level fundamentals are from CRSP and Compustat.
  52: Regression analysis on log market-to-book ratios using characteristics like
