    fraction, Lerner index, and market beta based on local MSCI index. Firm-level
    fundamentals from CRSP and Compustat, holdings data from FactSet.
  57: The sample runs from 2000 to 2019; Governance and Environment data begins in
    2010; Demand coefficients are multiplied by 100 except for LN mebe; The weighted
