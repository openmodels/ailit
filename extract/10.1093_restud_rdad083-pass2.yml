  38: "We use the estimated asset demand system to analyze the impact of two key trends\
    \ in the asset management industry on firm valuations and investors\u2019 welfare.\
    \ Hedge funds, per dollar of assets that they manage, have the largest impact\
    \ on prices. We find that foreign investors are particularly important for the\
    \ valuation of green firms, while small-active investment advisors for the valuation\
    \ of well-governed firms. Our methodology can easily be adopted to other characteristics,\
    \ and can be applied to individual institutional investors as well as groups of\
    \ institutions. We discuss how the second application can be used to develop 'climate-risk\
    \ stress tests' for a broader set of climate-related risks."
