sourcematerial:
  1: "We develop a new framework to quantitatively connect valuations, exp ected returns,\
    \ and characteristics to the demands of institutional investors and households.\
    \ Using investor-level holdings data, we estimate asset demand as a function of\
    \ prices and characteristics and quantify how p ortfolio tilts across investors\
    \ affects firm\u2019s valuation ratios...we use our mo del to assess climate-related\
    \ risks and find that increased demand for green firms would b enefit long- term\
    \ investors, banks, and passive investment advisors at the exp ense of hedge funds\
    \ and small-active investment advisors."
  5: "Source material here.\nscaled by the initial value of the aggregate stock market.\
    \ For example, we ask by what percent does the average stock price move if we\
    \ take BlackRock\u2019s assets and redistribute these assets to all other institutional\
    \ investors. Because BlackRock has certain portfolio tilts, this experiment would\
    \ lower the stock price along characteristics that BlackRock favors or for stocks\
    \ for which they have positive latent demand. The blue bars in Figure 1 summarize\
    \ the results. Hedge funds and investment advisors are particularly influential,\
    \ while long-term investors (i.e., pension funds and insurance companies), private\
    \ banking, and broker dealers have only a small impact. As shown by our theoretical\
    \ model, the impact of a given investor or group of investors depends on (i) the\
    \ investor\u2019s size, (ii) the elasticity of demand curves of other investors,\
    \ and (iii) the heterogeneity in demand curves. To adjust for size, we also compute\
    \ the repricing measure scaled by the total assets managed by a particular group.\
    \ The results are presented in the bottom panel of Figure 1. Per dollar of assets\
    \ managed, hedge funds and small-active investment advisors have the largest impact\
    \ on valuations. At the other end of the spectrum, we find that passive investment\
    \ advisors (both small and large) and long-term investors have a relatively small\
    \ impact on valuations. To understand how much different investors matter the\
    \ pricing of firm characteristics, we re-estimate the cross-sectional valuation\
    \ regression using the counterfactual prices and document how the regression coefficients\
    \ and residuals change. We consider the pricing of the environmental index as\
    \ an example. The baseline coefficient implies that a one standard deviation increase\
    \ in the index leads to a 17% increase in valuations. This number would drop to\
    \ 14% if we reallocate assets from foreign investors, while it would increase\
    \ to 21% if we reallocate assets from small-active investment advisors to the\
    \ other institutional investors. Thus, the estimates imply that foreign investors\
    \ help to lower the cost of capital for green firms in the US, conditional on\
    \ the other characteristics. This example illustrates how our methodology contributes\
    \ to the active ESG research agenda by showing which investors matter for the\
    \ pricing of ESG scores in the cross section of stocks.\n"
  7: 'Source material here.

    "Our fo cus is guided by a recent survey of Stro eb el and Wurgler (2021), which
    shows that the resp ondents consider regulatory risk as the main risk over the
    next five years, followed by ''stakeholder risk,'' which includes changing preferences
    of employees and customers. [...] We design two counterfactuals to capture regulatory
    risk for long-term investors (i.e., p ension funds and insurance companies) and
    to capture stakeholder risk. [...] These calculations show how our framework can
    b e used to develop and implement ''climate stress tests.'' [...] we find that
    long-term investors, banks, and passive investment advisors b enefit from the
    transition, while active investment advisors and hedge funds would exp erience
    a decline in AUM. [...] First, we develop a new framework to quantify how characteristics
    are priced in the cross section of valuations and exp ected returns through the
    p ortfolio choice of institutional investors and households."

    '
  8: "Source material here.\nEvaluation overview: \"which allows us to analyze welfare\
    \ implications.\"\nDrivers of Risk: \"Y1i represents other risk factors that impact\
    \ the investor such as benchmarking, outside income, and time-varying investment\
    \ opportunities.\"\nQuantitative material: \"Investors have constant absolute\
    \ risk aversion (CARA) preferences over wealth at time 1, max qi E [\u2212exp\
    \ (\u2212\u03B3iA1i + Y1i )].\"\nMethodology: \"we use our methodology to analyze\
    \ questions with policy relevance...we develop an instrumental variables shrinkage\
    \ estimator, which allows us to estimate investor-specific demand curves...We\
    \ consider a two-period model with time indexed by t = 0,1...The basic economic\
    \ insights extend to a broad set of asset pricing models.\"\nHighlights: \"we\
    \ use our methodology to analyze questions with policy relevance, such as the\
    \ transition from active to passive management and the pricing of climate-related\
    \ risks...We present a simple model to illustrate how we can measure the importance\
    \ of various investors in the price formation process.\"\n"
  9: "Source material here: We could extend the mo del of investor preferences to\
    \ directly add a \u201Ctaste\u201D for char- acteristics (Fama and French 2007\
    \ ). This mo del extension can b e particularly fitting for characteristics that\
    \ capture a firm\u2019s impact on the environment ( Pastor, Stambaugh, and Taylor\
    \ 2020; Pedersen, Fitzgibb ons, and Pomorski 2020 ). We define the return on equity\
    \ (ROE) for firm n as d1 (n) = D1 (n)B\u22121 0 (n).We assume that all investors\
    \ agree that ROEs follow a factor mo del, d1 = gi + \u03C1iF1 + \u03B71... For\
    \ this particular choice, the model\u2019s implications mimic those of a more\
    \ standard constant relative risk aversion (CRRA) utility model, while maintaining\
    \ the tractability of the CARA-normal model."
  13: The paper develops an empirically tractable asset demand system to analyze heterogeneity
    in demand curves across investors, building on the work of Koijen and Yogo (2019).
    We focus on the top 90% of stocks by market capitalization. In addition, we can
    measure how much investor k matters for the relation between long-horizon expected
    returns and characteristics, x. This calculation is accurate under the assumption
    that gR (x) does not change in the counterfactual, that is, that there are no
    real effects in response to the counterfactual investor flow. To relax this assumption,
    we would need to allow for corporate decisions regarding capital structure, investment,
    and payout policy. While this is an interesting extension to explore in future
    work, it is beyond the scope of this paper.
  16: '

    In 2019 Q4, the top 90% of total market capitalization is accounted for by only
    541 firms. The largest 57 firms already account for 50% of the total market capitalization.
    The largest 50% of firms account for only 34% of sales yet 46% of profits. For
    the environmental score, we rely on Sustainalytics. Sustainalytics provides industry-adjusted
    ratings, and environmental ratings therefore do not simply reflect differences
    across industries. Analysis uses firm income statements, balance sheets, Sustainalytics
    environmental scores, and a governance index constructed from entrenchment provisions.
    Quarterly sample begins in 2000 and ends in 2019, with a subsample from 2010-2019
    due to data availability of environmental and governance scores. As we cannot
    observe short positions at the investor-level, we estimate the model on long positions
    only. This results in a selected sample, but there is unfortunately little that
    we can do about this given data limitations.

    '
  18: "Source material: A one standard deviation increase in the environmental score\
    \ is asso ciated with a 17% increase in a firm\u2019s market-to-b o ok ratio,\
    \ all else equal. We find that a one standard deviation increase in the governance\
    \ score is asso ciated with an 10% lower valuation ratio. Recall that the governance\
    \ score is an entrenchment index, implying that higher values are asso ciated\
    \ with weaker governance. The study uses a panel regression of valuation ratios\
    \ on characteristics, applying year fixed effects and cross-sectional standardization\
    \ by quarter."
  19: "The analysis estimates the asset demand system as summarized by equations (10)\
    \ and (11), using standardized characteristics across quarters. For benchmark\
    \ results, it is assumed that characteristics are exogenous to latent demand:\
    \ Et [\u03F5i,t(n) |xt (n)] = 1."
  20: "We cannot simply estimate investors\u2019 demand curves using nonlinear least\
    \ squares, as latent demand is likely correlated with prices. To construct an\
    \ instrument, we follow Koijen and Yogo (2019) and use exogenous variation in\
    \ investors\u2019 investment mandates to generate exogenous variation in demand.\
    \ For our main estimation, we assume that any stock that the investor holds during\
    \ the current year, or any of the previous two years, is part of the choice set.\
    \ To construct an instrument that relies only on the investment universe, and\
    \ not the precise holdings within it, we compute counterfactual prices when investors\
    \ all hold an equal-weighted portfolio of the stocks in their universe."
  22: "Source material here.\n\"We determine the shrinkage parameter using cross-validation,\
    \ as is common practice in the machine learning literature...The shrinkage penalty\
    \ is selected to minimize the model\u2019s out-of-sample performance.\"\n\"The\
    \ robustness of our demand elasticity estimates to those assumptions...Koijen\
    \ and Yogo (2019) showed that the universe of stocks stabilizes if we expand the\
    \ window back in time and this motivated the three-year window. We now show that\
    \ our estimates are robust to varying the window, both back in time and into the\
    \ future.\"\n"
