  60: The aggregate active share is calculated as the AUM (Assets Under Management)
    weighted active share across all institutional investors. Active share is one-half
    times the sum of the absolute value of active weights, where active weights are
    portfolio weights minus market weights within the set of stocks held for each
    manager.
  63: Builds a panel of end-of-quarter equity holdings of US companies using FactSet
    13F holdings data from 2000 Q1 to 2019 Q4. Classifies institutions into types
    using FactSet's investor subtype. Constructs a Household sector so that total
    holdings of institutions and household are equal to each firms market cap. Splits
    investment advisors into four groups based on size and active share.
  65: Includes a discussion on modifying standard GMM moment conditions to impose
    a shrinkage penalty and choosing a shrinkage target.
  66: "If the estimated \u03B2i,0 exceeds 1, the first element of \u039Bi is set to\
    \ \u221E to impose \u03B20,i = 1."
  67: The analysis involves a Taylor expansion of moment conditions and uses an iterative
    procedure to converge on estimates using valuation regressions and earnings predictability
    regressions.
