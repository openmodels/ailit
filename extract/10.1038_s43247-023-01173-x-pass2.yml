  11: "Source material\nWe evaluate the hypothetical impact on in\uFB02ation which\
    \ future weather conditions under projected climate change would cause given our\
    \ empirical models. The shocks impacting the outcomes are future warming and extreme\
    \ temperature events. These impacts are then averaged over 30-year periods centered\
    \ on the future period in question (usually 2035 or 2060). To do so, we evaluate\
    \ the \uFB01rst terms pertaining to monthly average temperatures of Eq. 3 under\
    \ future temperature conditions. That is, we calculate future monthly average\
    \ national temperatures from the CMIP-6 models... and then apply these to the\
    \ \uFB01rst terms of Eq. 3 to calculate the impacts on in\uFB02ation... This procedure\
    \ is conducted separately for each of the 21 climate models in the CMIP-6 ensemble...\
    \ In Fig. 4 we assess the impacts of the 2022 extreme summer heat in Europe using\
    \ ERA-5 estimates of monthly temperatures in June, July and August...We further\
    \ assess how the impacts from such extremes could be ampli\uFB01ed under future\
    \ warming.\n"
