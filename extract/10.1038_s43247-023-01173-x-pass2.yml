Drivers of Risk:
  1: Higher temperatures and daily temperature variability, as well as extreme precipitation
    events, are driving changes in inflation.
  2: Shocks or changes impacting outcomes include average monthly temperatures, daily
    temperature variability, and other weather conditions affecting inflationary dynamics.
  3: Temperature shocks and extreme weather conditions are identified as primary drivers
    impacting inflation outcomes.
  5: Future climate change and increasing average temperatures are identified as drivers
    of inflation pressure.
  6: Increasing average temperatures, unpredictable hot extremes (summer heat extremes)
  7: The primary driver of risk discussed is the extreme summer heat in 2022 and the
    amplification of such impacts under future climate change scenarios.
  8: The primary driver of risk discussed is higher-than-normal temperatures, especially
    during the hot months and in hot countries, which are expected to create short-term
    rises in inflation.
  9: Changes in weather variables like average temperature deviations, temperature
    variability, and SPEI (Standardised Precipitation Evapotranspiration Indices)
    affecting dry and wet conditions.
  11: The shocks impacting the outcomes are future warming and extreme temperature
    events.
Evaluation overview:
  1: The study evaluates the impact of climate conditions on inflation rates, with
    a focus on consumer price indices.
  2: This page provides an overview of the impacts of climate change on inflation,
    focusing on how fluctuations in weather conditions, such as temperature and precipitation,
    affect inflation rates.
  3: The paper evaluates the impact of temperature shocks on food and headline inflation.
  5: The page evaluates the impact of average temperature conditions projected under
    future climate change on annual inflation rates, focusing on food and headline
    price aggregates.
  6: Food inflation
  7: The paper evaluates the impacts of the 2022 summer heat extreme on food and headline
    inflation in Europe.
  8: The paper evaluates the implications of climate-induced temperature increases
    on inflation, particularly focusing on their potential to alter inflation seasonality,
    increase inflation volatility, and place persistent pressures on inflation levels.
  9: The paper evaluates the impact of weather variables on national level inflation
    rates.
  11: The paper evaluates the potential impact of future weather conditions under
    projected climate change on inflation.
Highlights:
  1: The 2022 extreme summer heat increased food inflation in Europe by 0.43-0.93
    percentage points, which could be amplified by 30-50% by 2035 due to warming.
  2: Temperature increases cause nonlinear, persistent increases in food and headline
    inflation, with stronger impacts in hotter months and regions, and significant
    upward pressures on inflation from increased daily temperature variability.
  3: The study finds that fluctuations in average temperature cause significant effects
    on both food and headline inflation, consistent across high- and low-income countries.
  5: Key findings include greater inflationary pressure in higher latitudes during
    summer and implications for significant seasonal variation in food inflation.
  6: Future climate change is projected to amplify the magnitude of heat extremes
    and their impact on food inflation. Anomalous heat in Europe in 2022 caused a
    cumulative annual impact of 0.67 percentage-points on food inflation. There is
    projected amplification of seasonal variability across most of the global south
    and the USA, and reductions in seasonal variability across most of Europe (excluding
    Spain) and the higher northern latitudes.
  7: Future warming is expected to amplify the impact of heat extremes on inflation,
    with food inflation potentially increasing by 200% under the most pessimistic
    emission scenario by 2060.
  8: Temperature shocks are set to increase inflation volatility and alter inflation
    heterogeneity and seasonality, posing challenges to monetary policy and forecasting.
  9: The analysis interacts weather variables with average temperature levels to assess
    geographical and seasonal response heterogeneities.
  11: The study assesses the potential inflationary impacts of extreme summer temperatures
    and how these could be amplified under future climate warming scenarios.
Methodology:
  1: The analysis uses fixed-effects regressions on over 27,000 observations of monthly
    consumer price indices worldwide.
  2: The analysis uses high-resolution weather data combined with monthly price indices
    across 121 countries from 1996-2021, employing fixed-effects panel regression
    models to assess the impact of weather fluctuations on national month-on-month
    inflation rates.
  3: Analysis involves fixed-effects panel regressions using over 27,000 observations
    of monthly price indices and weather fluctuations from 1996-2021.
  5: The analysis is based on projections from 21 CMIP-6 climate models and uses monthly
    CPI data to assess pressures on inflation across different seasons and scenarios
    until 2035.
  6: Uses CMIP-6 climate model projections to estimate temperature conditions by 2035
    under a high-emission scenario. Empirical response functions are used to assess
    the impacts of temperature changes on inflation. The study combines future summer
    warming projections with historical temperatures to re-evaluate impacts.
  7: The analysis includes regionally aggregated impacts using population weighting,
    historical temperature data, and future projections based on CMIP-6 climate models
    under different SSP emission scenarios.
  8: The analysis uses granular climate data on a monthly basis and evaluates the
    regression coefficients pertaining to average temperatures for the hottest months,
    providing empirical results based on causal relationships inferred from empirical
    models.
  9: Fixed-effects panel regression models are applied to identify causal effects
    of weather changes on national inflation levels.
  11: The analysis uses CMIP-6 climate models to project future temperature changes,
    which are then applied to empirical models to evaluate potential impacts on inflation.
    The results are applicable to periods centered on future years, usually 2035 or
    2060.
More Notes:
  6: Analysis focuses on exogenous pressure on inflation arising from future weather
    conditions in the absence of historically unprecedented adaptation or policy response.
Quantitative material:
  1: Projected temperature increases for 2035 imply upwards pressures on food and
    headline inflation of 0.92-3.23 and 0.32-1.18 percentage-points per year on average
    globally.
  2: "Quantitative information produced includes findings like a cumulative effect\
    \ on food inflation of 0.17 percentage points over the following year from a 1\xB0\
    C increase in monthly temperature."
  3: "The analysis provides cumulative marginal effects of a 1\xB0C increase in temperature\
    \ on month-on-month inflation rates, with specific emphasis on baseline temperatures\
    \ of 12.0\xB0C, 21.0\xB0C, and 25.0\xB0C."
  5: The analysis estimates the future annual pressure on food and headline inflation
    under the SSP1-2.6 and SSP5-8.5 scenarios for 2035, with point estimates showing
    averages and error bars indicating standard deviation.
  6: "Estimates of monthly food inflation averaged across latitudinal bands under\
    \ a high-emission scenario (SSP5-8.5) by 2035, percentage change in the seasonal\
    \ variability of food inflation, cumulative annual impact of 0.67 percentage-points\
    \ (0.43\u20130.93 across empirical specifications) on food inflation and 0.34\
    \ percentage-points (0.18\u20130.41) on headline inflation in Europe due to the\
    \ 2022 heat wave."
  7: Quantitative estimates show that by 2035, under a high-emission scenario, food
    inflation in Europe increases by 1.0 percentage points and by 0.9 percentage points
    under a low-emission scenario, with further amplification by 2060.
  8: "An increase in temperature by 1.5\xB0C in the hottest months of the year is\
    \ predicted to have an impact of 0.49 percentage-points on inflation, and persistent\
    \ upward pressures on annual food inflation of 1-3 percentage-points per year\
    \ could result from temperatures projected for 2035."
  9: Combination of price and climate data results in 27,340 country-month observations
    across 121 countries.
  11: The analysis includes estimates of impacts on inflation from projected climate
    change, averaged over specific future periods (2035 or 2060).
sourcematerial:
  1: "Source material here.\nClimate impacts on economic productivity indicate that\
    \ climate change may threaten price stability. Here we apply \uFB01xed-effects\
    \ regressions to over 27,000 observations of monthly consumer price indices worldwide\
    \ to quantify the impacts of climate conditions on in\uFB02ation. Higher temperatures\
    \ increase food and headline in\uFB02ation persistently over 12 months in both\
    \ higher- and lower-income countries. Effects vary across seasons and regions\
    \ depending on climatic norms, with further impacts from daily temperature variability\
    \ and extreme precipitation. Evaluating these results under temperature increases\
    \ projected for 2035 implies upwards pressures on food and headline in\uFB02ation\
    \ of 0.92-3.23 and 0.32-1.18 percentage-points per-year respectively on average\
    \ globally (uncertainty range across emission scenarios, climate models and empirical\
    \ speci\uFB01cations). Pressures are largest at low latitudes and show strong\
    \ seasonality at high latitudes, peaking in summer. Finally, the 2022 extreme\
    \ summer heat increased food in\uFB02ation in Europe by 0.43-0.93 percentage-points\
    \ which warming projected for 2035 would amplify by 30-50%.\n"
  2: "Source material: \"Despite these advances, weather impacts on in\uFB02ation\
    \ and, in particular, the implications for in\uFB02ation risks under future climate\
    \ change, remain understudied. Advancing this understanding is crucial to a comprehensive\
    \ assessment of climate change risk because rising or unstable prices threaten\
    \ economic18,19 and human welfare20,21 as well as political stability22. We \uFB01\
    nd a rich response of in\uFB02ation in different price aggregates to \uFB02uctuations\
    \ in a variety of weather conditions (see Supplementary Fig. S1, Tables S2 and\
    \ S3). The strongest and most consistent signal arises from \uFB02uctuations in\
    \ average monthly temperatures (Fig. 1 and Supplementary Fig. S1a & f). Impacts\
    \ are strongest in the food price component (Fig. 1b and Supplementary Fig. S1f).\
    \ By using lagged weather variables, we further \uFB01nd that the impacts of a\
    \ 1 C increase in monthly temperature on the price level persist across the entire\
    \ 12 months following the initial shock (Fig. 1), causing a cumulative effect\
    \ on food in\uFB02ation of 0.17 percentage points over the following year (when\
    \ occurring in country-months with a temperature of 25 C, under our central speci\uFB01\
    cation shown in column 1 of Supplementary Tables S4 & S5 and Fig. 1a). We combine\
    \ measures of national exposure to different weather conditions, based on high-resolution\
    \ data from the European Centre for Medium-range Weather Forecast Reanalysis version\
    \ 5 (ERA5)32, with a dataset of monthly price indices for different aggregates\
    \ of goods and services across 121 countries of the developed and developing world\
    \ over the period 1996-2021 (see Supplementary Table S1 for summary statistics)33...Our\
    \ empirical framework quanti\uFB01es the plausibly causal effects of \uFB02uctuations\
    \ in historical weather conditions on national, month-on-month in\uFB02ation rates\
    \ (measured as the change in the logarithm of consumer price indices (CPI)) by\
    \ exploiting within-country variation using \uFB01xed-effects panel regression\
    \ models. Temperature increases cause nonlinear, persistent increases in food\
    \ and headline in\uFB02ation...We \uFB01nd signi\uFB01cant upwards pressures on\
    \ food and headline in\uFB02ation from increased variability (Supplementary Tables\
    \ S2 & S3, Fig. S1b & g).\""
  3: "yaml\nEvaluation overview: \"The results of \uFB01xed-effects panel regressions\
    \ from over 27,000 observations of monthly price indices and weather \uFB02uctuations\
    \ worldwide over the period 1996-2021 demonstrate persistent impacts on food (b)\
    \ and headline (c) prices.\"\nDrivers of Risk: \"A schematic outline of the mechanisms\
    \ via which temperature shocks may impact in\uFB02ation via agricultural productivity\
    \ and food prices.\"\nQuantitative material: \"Lines indicate the cumulative marginal\
    \ effects of a one-off 1\xB0C increase in monthly temperature on month-on-month\
    \ in\uFB02ation rates, evaluated at different baseline temperatures.\"\nMethodology:\
    \ \"The results of \uFB01xed-effects panel regressions from over 27,000 observations\
    \ of monthly price indices and weather \uFB02uctuations worldwide over the period\
    \ 1996-2021.\"\nHighlights: \"The fact that \uFB02uctuations of average temperature\
    \ cause equivalent impacts on in\uFB02ation in high- and low-income countries\
    \ suggests that historical adaptation to temperature increases via socioeconomic\
    \ development has been limited.\"\n"
  5: "The pressure on annual in\uFB02ation rates from the average temperature conditions\
    \ projected under future climate change. Maps of the pressure on annual national\
    \ in\uFB02ation in the food (a) and headline (b) price aggregates from the average\
    \ weather conditions expected by 2035 under a high-emission scenario (SSP585)\
    \ as estimated from the projections of CMIP-6 climate models. Impacts are estimated\
    \ accounting only for increasing average temperatures using the baseline empirical\
    \ speci\uFB01cation shown in column 1 of Supplementary Tables S4 & S5. Estimates\
    \ re\uFB02ect the exogenous pressure on in\uFB02ation arising from future weather\
    \ conditions in the absence of historically un-precedented adaptation, policy\
    \ response, and abstracting from any possible interactions with macroeconomic\
    \ developments (see text for discussion). The annual pressure on in\uFB02ation\
    \ aggregated across world regions (population weighted), at different time periods\
    \ under both a low (SSP126) and high (SSP585) emission scenario for food (c) and\
    \ headline (d) price aggregates. Point estimates show the average, and error bars\
    \ the standard deviation, of impacts as projected across the ensemble of 21 CMIP-6\
    \ climate models. Maps of the pressure on annual national in\uFB02ation in the\
    \ food (a) and headline (b) price aggregates from the average weather conditions\
    \ expected by 2035 under a high-emission scenario (SSP585) as estimated from the\
    \ projections of CMIP-6 climate models. The use of monthly CPI data allows us\
    \ to further assess how the estimated pressures on in\uFB02ation from future temperature\
    \ conditions under projected climate change are distributed across the year. Concerning\
    \ food in\uFB02ation, these impacts are fairly constant across seasons at low\
    \ latitudes but vary considerably across seasons in Northern mid-latitudes (20-40\
    \ N) where they can be more than twice as large in summer compared to winter (Fig.\
    \ 3a). At the highest latitudes (>40 N) upwards pressure in summer contrasts downwards\
    \ pressure in winter."
  6: 'Source material: '
  7: "Source material here.\nEvaluation overview: \"The cumulative annual impacts\
    \ on food (a) and headline (b) inflation from the observed temperatures of June,\
    \ July and August of 2022 across Europe.\"\n\nDrivers of Risk: \"The impacts of\
    \ the 2022 summer heat extreme on inflation in Europe, and the amplification of\
    \ such impacts under future climate change.\"\n\nQuantitative material: \"Impacts\
    \ on food inflation in Europe of 1.0 percentage-points (0.6\u20131.6, uncertainty\
    \ range across climate models and empirical specifications) in 2035 under a high-emission\
    \ scenario, or of 0.9 percentage-points (0.5\u20131.4) under a low-emission scenario.\"\
    \n\nMethodology: \"Regionally aggregated (using a population weighting) impacts\
    \ from the historical 2022 summer temperatures, as well as those impacts which\
    \ would result from an equivalent summer if amplified by future warming as projected\
    \ by CMIP-6 climate models (see methods) under future emission scenarios specified\
    \ by the SSPs.\"\n\nHighlights: \"By 2060, the amplification of such extreme impacts\
    \ would diverge under different emission scenarios, remaining at 1.1 percentage-points\
    \ (0.6\u20131.8) under the most optimistic scenario compared to 1.8 percentage-points\
    \ (1.0\u20133.2) under the most pessimistic scenario of emission mitigation, an\
    \ amplification of nearly 200%.\"\n"
  8: "Source material here.\n\"The paper evaluates the implications of climate-induced\
    \ temperature increases on inflation, particularly focusing on their potential\
    \ to alter inflation seasonality, increase inflation volatility, and place persistent\
    \ pressures on inflation levels.\" \n\n\"The primary driver of risk discussed\
    \ is higher-than-normal temperatures, especially during the hot months and in\
    \ hot countries, which are expected to create short-term rises in inflation.\"\
    \n\n\"An increase in temperature by 1.5\xB0C in the hottest months of the year\
    \ is predicted to have an impact of 0.49 percentage-points on inflation\"\n\n\"\
    persistent upward pressures on annual food inflation of 1-3 percentage-points\
    \ per year could result from temperatures projected for 2035.\"\n\n\"The analysis\
    \ uses granular climate data on a monthly basis and evaluates the regression coefficients\
    \ pertaining to average temperatures for the hottest months, providing empirical\
    \ results based on causal relationships inferred from empirical models.\"\n\n\"\
    Temperature shocks are set to increase inflation volatility and alter inflation\
    \ heterogeneity and seasonality, posing challenges to monetary policy and forecasting.\"\
    \n"
  9: 'Source material here.

    Evaluation overview: "Empirical framework for estimation of causal effects...
    apply fixed-effects panel regression models to identify the causal effects of
    changes in weather variables on national level inflation."

    Drivers of Risk: "Deviations of average temperature, d /C22T c;m , and temperature
    variability, d eT c;m , from their historical average (1990-2021) over the same
    calendar month are also calculated for use as dependent variables" and "We estimate
    SPEI at one, two-, three-, six- and twelve-month timescales to flexibly assess
    the impacts of shocks across these timescales."

    Quantitative material: "Combination of price and climate data results in 27,340
    country-month observations across 121 countries."

    Methodology: "We then apply fixed-effects panel regression models to identify
    the causal effects of changes in weather variables on national level inflation."

    Highlights: "The interaction with the average temperature level introduces a heterogeneity
    in the response to temperature shocks across both geographical locations and seasons."

