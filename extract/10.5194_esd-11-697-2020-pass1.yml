Drivers of Risk:
  1: Maintaining current NDCs leads to a reduction in GDP in tropical countries and
    long-term sea-level rise. Incremental NDC improvements do not lead to comparable
    reductions in climate impacts.
  2: The analysis links near-term mitigation efforts directly to climate impact projections
    up to 2100 and beyond.
  3: No relevant information
  4: The drivers of risk include temperature trajectories, GHG emissions, and global
    warming. Specific shocks include changes in the intensity of the hottest day in
    a year (TXx).
  5: Changes in GHG emissions leading to different warming scenarios, with focus on
    temperature increases and sea level rise.
  6: The page describes the risk drivers as changes in GHG emissions and their impact
    on GMT projections depending on the level of emission reductions.
  7: Impacts of climate change, including increased sea levels and maximum temperatures,
    are driven by different levels of mitigation ambition and global warming scenarios.
  8: The impact is driven by changes in maximum temperature extremes (TXx) and overall
    global mean temperature (GMT) increases.
  9: No relevant information
Evaluation overview:
  1: Global mean temperature increase by 2100, extreme temperature, long-term sea-level
    rise, and economic damages for vulnerable countries are evaluated.
  2: Projections for selected climate impacts (sea-level rise, extreme temperatures
    and economic damages).
  3: No relevant information
  4: The paper analyzes climate impacts using long-term sea-level rise, extreme hot
    days, and economic damages as indicators.
  5: Extreme temperature changes (hottest day of the year, TXx), and economic damages
    (GDP per capita reduction) are evaluated.
  6: This page provides an overview of the projected global GHG emissions and global
    mean temperature (GMT) outcomes under various emission reduction scenarios.
  7: The paper evaluates the impacts of climate change scenarios on global mean sea-level
    rise, annual maximum temperature increase, and GDP reductions for Least Developed
    Countries (LDCs).
  8: The document provides an overview of the impact of climate change on extreme
    temperatures and GDP per capita under different climate scenarios.
  9: No relevant information
Highlights:
  1: Incremental improvements in reduction targets are insufficient to align collective
    ambition with the goals of the Paris Agreement. A transformational increase in
    2030 ambition is required to achieve the goals of the Paris Agreement and avoid
    the worst impacts of climate change.
  3: The paper assesses the impact of incremental improvements to Nationally Determined
    Contributions (NDCs) on long-term temperature levels.
  4: The analysis aims to illustrate the implications of different temperature trajectories
    on climate impacts using sea-level rise, extreme hot days, and economic damages
    as indicators.
  5: "Current NDCs lead to substantial increases in extreme temperatures and sea level\
    \ rise. More ambitious emission reduction pathways (BE33, 1.5\xB0C consistent)\
    \ lead to lower increases in both extreme temperatures and sea level rise, and\
    \ lower GDP per capita reduction; damages are most pronounced in vulnerable regions\
    \ (Latin America, South Asia, LDCs, SIDS); The impact of small emitters is limited\
    \ unless larger emitters also increase ambition."
  6: "Improving NDCs incrementally up to 33% is insufficient to limit GMT increase\
    \ to 1.5\xB0C by 2100, with more significant impact seen if big emitters adopt\
    \ the ambitious targets."
  7: "Incremental ambition increases in climate targets are insufficient; significant\
    \ differences in impacts between scenarios, with the 1.5\xB0C scenario showing\
    \ considerably less increase in sea level and temperatures, and fewer GDP losses."
  8: Projected economic damages and temperature anomalies vary significantly across
    regions and are more severe under the NDC scenario by 2100, particularly for regions
    like SIDS and South Asia.
  9: "Need for transformational increase in 2030 ambitions to achieve 1.5\xB0C goal."
Methodology:
  1: "Assess outcomes of different scenarios of NDC updating that fall short of achieving\
    \ the 1.5\xB0C benchmark. Estimates for global mean temperature increase by 2100\
    \ for different incremental NDC update scenarios. Climate impacts are illustrated\
    \ under median scenarios."
  2: Combines analysis of mitigation targets by big emitters to climate impact projections.
    NDC pathways are assessed using the Climate Action Tracker (CAT) methodology,
    which estimates the collective result of current NDCs in global emissions.
  3: The constructed GHG emission pathways are used to derive probabilistic projections
    for the global mean temperature (GMT) with the reduced complexity carbon cycle
    and climate model MAGICC6.
  4: Long-term sea-level rise is projected using the MAGICC sea-level model emulating
    IPCC AR5 projections. Extreme hot day changes are analyzed using a time-slicing
    approach, averaging the hottest days (TXx) over 21-year periods corresponding
    to specific warming levels. Economic damages are calculated based on the historical
    relationship between GDP growth and temperature variability and projected future
    temperature changes. The MAGICC model is run from 1750 to 2300, with radiative
    forcing levels held constant at 2100 levels after that date.
  5: The paper applies downscaling factors to global mean temperature (GMT) differences
    from different scenarios to get local changes. Economic damages are assessed using
    a model by Burke et al. (2018). The time horizons are up to 2100 and 2300.
  6: Results are based on analysis of current Nationally Determined Contributions
    (NDC) and hypothetical emission reduction scenarios up to 33% applied to either
    big emitters or all countries, compared against observed temperature data.
  7: "Analysis compares impacts under current NDC, a 33% increase in NDC ambition,\
    \ and a 1.5\xB0C warming scenario for future years, such as 2100 and 2300."
  9: Assumes NDC contributions to LULUCF pathway drop by same percentage as other
    sectors.
More Notes:
  3: The 'current NDC' ambition reference scenario is a modified version of the 2018
    CAT Pledges & Targets pathway.
  9: No relevant information
Quantitative material:
  1: "Project a reduction in GDP in tropical countries of around 60% compared to a\
    \ no-climate-change scenario under current NDCs. Median long-term sea-level rise\
    \ of close to 2m in 2300 under current NDCs. Aggregated NDC ambition increase\
    \ of 33% in 2030 reduces climate impacts by less than half compared to limiting\
    \ warming to 1.5\xB0C."
  2: The paper explores different incremental global NDC update scenarios for 2030
    and the implied global mean temperature increase up to the end of the century.
  3: Incremental NDC improvement scenarios assume a 5%, 10%, 25% and 33% reduction
    in global GHG emission levels below the current NDC reference pathway by 2030.
  4: The analysis involves GDP loss percentages calculated for mid-century (2046-2065)
    and end-of-century (2081-2100) under different warming scenarios.
  5: "Under a 1.5\xB0C scenario, 50% of the land area TXx would increase by at least\
    \ 1.1\xB0C compared to 1986\u20132005 levels; For the BE33 scenario, half of the\
    \ land area would experience an increase in TXx of at least 1.8\xB0C; Global median\
    \ increase of TXx under NDC scenario is projected to be 2.7\xB0C above 1986\u2013\
    2005; 2100 GMSLR projections under the NDC reference scenario yield a median of\
    \ around 64cm (66% model range: 50 to 81cm); If major emitters increased their\
    \ NDC ambition by 33% (BE33), 2100 GMSLR would be around 54cm (43 to 68cm); A\
    \ 1.5\xB0C consistent ambition level shows a projected GMSLR of 45cm (36 to 57cm)\
    \ in 2100; Around 2050, GDP per capita reduction for selected country groups ranges\
    \ between 11% and 14% for the 1.5\xB0C pathway, between 14% and 17% for the BE33\
    \ scenario, and between 17% and 20% for the baseline pathway of the current NDCs."
  6: Quantitative projections include GHG emission levels in 2030 and GMT increase
    by 2100 for different scenarios, such as NDC reference scenario, 5%, 10%, 25%,
    and 33% emission reductions.
  7: "Provides projections for sea-level rise, temperature increase, and GDP reductions\
    \ under various scenarios; e.g., median global mean sea-level rise by 2100 is\
    \ 64 cm under current NDC and 45 cm under the 1.5\xB0C scenario."
  8: "There are quantitative estimates showing the percentage change in GDP per capita\
    \ under different temperature pathways, and the fraction of land area affected\
    \ by a TXx increase of at least 2\xB0C."
  9: Uncertainty of approximately 3 GtCO2/yr in global land-use emissions in 2030.
sourcematerial:
  1: "Current global mitigation ambition up to 2030 under the Paris Agreement, reflected\
    \ in the National Determined Contributions (NDCs), is insufficient to achieve\
    \ the agreement\u2019s 1.5\xB0C long-term temperature limit...Under the assumption\
    \ of maintaining ambition as reflected in current NDCs up to 2100 and beyond,\
    \ we project a reduction in the gross domestic product (GDP) in tropical countries\
    \ of around 60% compared to a no-climate-change scenario and median long-term\
    \ sea-level rise of close to 2m in 2300. About half of these impacts can be avoided\
    \ by limiting warming to 1.5\xB0C or below. Scenarios of more incremental NDC\
    \ improvements do not lead to comparable reductions in climate impacts. An increase\
    \ in aggregated NDC ambition of big emitters by 33% in 2030 does not reduce presented\
    \ climate impacts by more than about half compared to limiting warming to 1.5\xB0\
    C. Our results underscore that a transformational increase in 2030 ambition is\
    \ required to achieve the goals of the Paris Agreement and avoid the worst impacts\
    \ of climate change."
  2: "yaml\nEvaluation overview: \"We provide projections for selected climate impacts\
    \ (sea-level rise, extreme temperatures and economic damages) for current NDCs\
    \ and gradual reduction pathways in comparison with a 1.5\u25E6C pathway.\"\n\
    Drivers of Risk: \"We are thereby linking near-term mitigation efforts directly\
    \ to climate impact projections up to 2100 and beyond.\"\nQuantitative material:\
    \ \"In the following, we explore different incremental global NDC updates scenarios\
    \ for 2030 and the implied global mean temperature increase up to the end of the\
    \ century if a proportional level of mitigation effort is to continue throughout\
    \ the century.\"\nMethodology: \"The analysis presented here combines a range\
    \ of different approaches and methodologies ranging from an in-depth analysis\
    \ of mitigation targets by big emitters to climate impact projections...The analysis\
    \ of emission pathways builds on the methodology of the Climate Action Tracker\
    \ (CAT), which estimates the collective result of current NDCs in global emissions.\"\
    \n"
  3: "Source material here.\n- \"2030 global emission levels based on the CAT assessment\
    \ of current pledges (53GtCO2eq., national emissions, excluding 'land use, land-use\
    \ change and forestry' (LULUCF), international aviation and shipping emissions)\
    \ and policies can be estimated.\"\n- \"Based on the pathway extension, our 'current\
    \ NDC' ambition reference scenario would lead to a median global warming of 2.8\xB0\
    C in 2100.\"\n- \"Specifically, we assume a 5%, 10%, 25% and 33% reduction in\
    \ global GHG emission levels below the current NDC reference pathway by 2030.\"\
    \n- \"To create a current NDC ambition reference scenario for our analysis of\
    \ increased ambition beyond current NDCs.\"\n- \"create a number of NDC update\
    \ scenarios, which are meant to represent different increments of improvement\
    \ in ambition.\"\n"
  4: "yaml\nEvaluation overview: \"In order to illustrate the implications of different\
    \ temperature trajectories, we extend our analysis with additional climate impacts\
    \ for three selected pathways... we have chosen three exemplary impact indicators:\
    \ a time-lagged response (long-term sea-level rise), an extreme event indicator\
    \ (extreme hot days) and economic damages.\"\nDrivers of Risk: \"Global mean temperature\
    \ is an established metric that allows researchers to approximate a range of different\
    \ climate impacts... we present changes in hot extremes as land fraction distributions\
    \ of changes in the intensity of the hottest day in a year (TXx)...\"\nQuantitative\
    \ material: \"Expressed in terms of the gross domestic product (GDP), economic\
    \ damages are calculated... The impacts are calculated for midcentury (2046\u2013\
    2065) and end of century (2081\u20132100).\"\nMethodology: \"Global mean sea-level\
    \ rise (GMSLR) projections are generated with the MAGICC sea-level model... This\
    \ analysis is based on a time-slicing approach: for each model, a 21-year time\
    \ period is selected... Economic damages are calculated based on the methodology\
    \ by Burke et al.(2018)... The MAGICC model is run from 1750 to 2300 to also shed\
    \ light on longer-term impacts like global mean sea-level rise... radiative forcing\
    \ levels for the 22nd and 23rd centuries are held constant at 2100 levels for\
    \ all pathways...\"\nHighlights: \"In order to illustrate the implications of\
    \ different temperature trajectories, we extend our analysis with additional climate\
    \ impacts... to illustrate the relevance of these differences for a range of different\
    \ climate impacts, we have chosen three exemplary impact indicators...\"\n"
  5: "Source material here.\nEvaluation overview: \"Figure 3 shows the changes in\
    \ the hottest day in a year (TXx)... \nFor the BE33 scenario...economic damages\
    \ for selected vulnerable regions, grouped into \nfour categories based on their\
    \ geographical region or level of development: \nLatin America, South Asia, Least\
    \ Developed Countries (LDCs) and Small Island Developing \nStates (SIDS).\"\n\
    Drivers of Risk: \"scenarios in which emission reductions are limited to big emitters\
    \ only \nlead to higher warming levels...the importance of the contribution of\
    \ relatively small emitters \nthereby increases under scenarios of more ambitious\
    \ global ambition.\"\nQuantitative material: \"For the BE33 scenario, half of\
    \ the land area would experience \nan increase in TXx of at least 1.8\xB0C. In\
    \ this scenario, for 39% of the land area, a 2\xB0C \nincrease in TXx is projected...2100\
    \ GMSLR projections under the NDC reference scenario \nyield a median of around\
    \ 64cm (66% model range: 50 to 81cm)...compared to a no-climate-change \nscenario,\
    \ the estimated median reduction in GDP per capita around 2050 for the four country\
    \ \ngroups ranges between 11% and 14% for the 1.5\xB0C pathway, between 14% and\
    \ 17% for the \nBE33 scenario, and between 17% and 20% reduction for the baseline\
    \ pathway of the current NDCs.\"\nMethodology: \"Then we apply the median downscaling\
    \ factor of each model to the GMT differences \nof the selected scenarios to get\
    \ local changes in GMT.\"\nHighlights: \"The global median increase of TXx under\
    \ this scenario is projected to be \n2.7\xB0C above the 1986\u20132005 level...for\
    \ 2300, the stylized pathway extensions yield around 190cm \n(140 to 250cm) of\
    \ GMSLR under the NDC reference scenario...This result demonstrates that \ngetting\
    \ close to the Paris Agreement\u2019s long-term temperature goal will require\
    \ comparable \nlevels of action by all emitters, not just the largest.\"\n"
  6: "Source material here.\n\"We have provided a detailed analysis of the implied\
    \ consequences of present-day NDC ambition levels as well as incremental improvement\
    \ scenarios up to a 33% reduction relative to present-day NDC emission levels\
    \ in 2030.\"\n\n\"Table 1. Overview of the evaluated scenarios, including details\
    \ on projected global greenhouse gas emissions for the year 2030 and the projected\
    \ median increase in global mean temperature (GMT) for the year 2100 relative\
    \ to 1750.\"\n\n\"Scenarios for big emitters are labelled 'BE' and scenarios for\
    \ all countries using 'ALL'.\"\n\n\"In line with the 1.5\u25E6C special report\
    \ by Masson-Delmotte et al., we find that such gradual improvements are insufficient\
    \ to achieve the 1.5\u25E6C limit, which would require 2030 GHG emission levels\
    \ to be about halved compared to current NDCs.\"\n"
  7: "Evaluation overview justification: \"Selected climate impacts under different\
    \ scenarios of mitigation ambition: global mean sea-level rise, annual maximum\
    \ temperature increase, and GDP reductions for Least Developed Countries (LDCs).\"\
    \ Drivers of Risk justification: \"The implications of a lack of ambition towards\
    \ achieving beyond gradual improvements will therefore manifest in a broad range\
    \ of impacts beyond the limited set of impacts studied here.\" Quantitative material\
    \ justification: \"Median global mean sea-level rise relative to 1986\u20132005:\
    \ 2100, 64 cm under NDC, 54 cm with 33% ambition increase, 45 cm with 1.5\xB0\
    C scenario.\" Methodology justification: \"Our analysis does not aim at deriving\
    \ conclusions about the global impact of individual proposed NDC updates but rather\
    \ about the overall collective aggregate ambition increase needed.\" Highlights\
    \ justification: \"Even if big emitters increase their ambition level by a third,\
    \ this will only reduce about half the inferred impacts including for sea-level\
    \ rise, compared to what can be achieved by limiting warming to 1.5\xB0C.\""
