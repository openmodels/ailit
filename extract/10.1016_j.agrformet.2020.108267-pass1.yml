  6: "Source material: \"This study sought to understand the contribution of G, E\
    \ and GxE on the determination of total variation on winter survival of canola.\"\
    \ \"The original data set (n=23,225) was integrated with pre-dictions for MSc.\
    \ Only genotypes present at least once in each of poor, medium, and high meteorological\
    \ survival clusters were kept\" \"Only years with a CP (mean temperature below\
    \ 0o C) were kept, causing the number of years per site to vary between 19 and\
    \ 40. In this simulation step, the trained tree model was used to predict the\
    \ CP of each site-year (MSc) into a risk class (Sr), poor, medium, and high\"\
    \ \"Results from the analyses of variance components showed that G, E and GxE\
    \ explained 3%, 71%, and 7% of the variation in winter canola survival, respectively.\"\
    \ \"Mixed model analyses were solved using the function lmer from package lme4\
    \ (Bates et al., 2015). Tree models were developed using the function ctree (Hothorn\
    \ et al., 2006) included in the package partykit (Hothorn, 2015). Cluster analyses\
    \ were conducted using the functions kmeans included in the R package stats, with\
    \ Euclidean distance, and the final number of clusters was determined with the\
    \ function NbClust included in the package NbClust (Charrad et al., 2014).\" \"\
    log (S )= GSgi+MSc j+GSgMSc ij+E k +Eb kl +EG km + \u03B5ijklmn\" \"The effect\
    \ of GxE is twice as large as G indicating that GxE is an important determinant\
    \ of survival. However, the sum of both terms (10%) is just a small proportion\
    \ of the variation explained by E.\" \"Based on the pairwise comparison letter\
    \ separation result, four distinct genotype survival behaviors across meteorological\
    \ survival clusters were identified, hereafter referred to as genotype survival\
    \ group GSg.\" \"Only years with a CP (mean temperature below 0o C) were kept\""
  7: "Source material here.\nEvaluation overview: \"Overall, winter survival averaged\
    \ 84%, but ranged from 0 to 100%, indicating a broad range of variation.\"\nDrivers\
    \ of Risk: \"The most relevant variables classifying the CP of 190 site-years\
    \ into meteorological survival clusters and its specific binary splits of the\
    \ final tree model were in the order of importance from high to low: i) Colder\
    \ (5 days), ii) ncycle (24 cycles), iii) cET (465 mm cumulative ET), iv) meanWindchill\
    \ (-3.6\u25E6C), v) Colder_pct (3%), and vi) maxTmean (13.4\u25E6C).\"\nQuantitative\
    \ material: \"Winter survival averaged 84%, but ranged from 0 to 100%... survival\
    \ clusters were 0, 28, 48, and 27 for the poor; 50, 70, 82, and 36 for the medium;\
    \ and 83, 96, 100, and 127 for the high, respectively.\"\nMethodology: \"The conditional\
    \ inference tree classified site-year CPs into seven terminal nodes based on the\
    \ evaluation of meteorological variables... The leave-one-out cross-validation\
    \ procedure resulted in a model fit with overall accuracy of 58%. Accuracy for\
    \ the poor, medium, and high meteorological survival clusters were 48%, 40%, and\
    \ 60%, respectively.\"\nHighlights: \"The tolerant genotype survival group had\
    \ a significant greater survival (40%), while the other genotype survival groups\
    \ ranged from 17% to 19% survival.\"\n"
