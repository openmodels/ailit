    Evaluation overview: "This image is a decision tree diagram used to classify or
    predict meteorological survival clusters based on various weather conditions."

    Drivers of Risk: "Each branch reflects a decision rule, with certain weather conditions
    like ''Colder'', ''cCET'', ''ncycle'', ''maxTmean'', and ''meanWindchill''."

    Quantitative material: "Each pie chart represents a site with the slices representing
    the proportion of cold periods classified as high, medium, and poor meteorological
    survival clusters over a period of 40 years (1979-2019)."

    Methodology: "Conditional inference tree of canola meteorological survival clusters
    as explained by cold period-summarized meteorological variables from 190 sites-years
    classified into seven terminal nodes."

    Highlights: "Overall, this decision tree illustrates how different meteorological
    variables impact classification into survival clusters, providing a visual and
    analytical representation of decision paths and outcomes."

