    \ meteorological predictors (Table 2), to model meteorological survival class\
    \ MSc (n=190) as a function of meteorological factors using conditional inference\
    \ tree methodology. The modeling process included model parameterization and model\
    \ fitting. ... Leave-one-out cross-validation was conducted to estimate the model\
    \ performance metrics of overall and category-specific accuracy, sensitivity,\
    \ and specificity.\"\nQuantitative material: \"Table 3 Summary statistics for\
