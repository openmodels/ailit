  4: "Source material here.\nEvaluation overview: Solar irradiance [34] directly impacts\
    \ electricity output from PV modules, varying with time, location, climate, season,\
    \ and topography [35]. It affects PV cell performance characteristics, including\
    \ open-circuit voltage, short-circuit current, cell temperature, and efficiency\
    \ [28].\nDrivers of Risk: Both measures are important to PV system performance,\
    \ as fixed-tilt systems mainly depend on GHI [24], whereas tracking systems benefit\
    \ more from DNI [25]. The solar zenith angle (the angle between the sun and the\
    \ vertical) has the strongest influence irradiance levels [26].\nQuantitative\
    \ material: Solar cell efficiency initially rises, plateauing around 600 W/m2\
    \ before declining slightly up to 1000 W/m2. The performance ratio (normalised\
    \ efficiency) is relatively constant across all types of solar cell above 400\
    \ W/m2 but falls by 7\u20139% at 150 W/m2 [40].\nMethodology: Several works have\
    \ studied the effects of solar irradiance intensity on PV module performance [39,40].\
    \ Fig. 5 shows the solar module\u2019s current-voltage (I-V) and power-voltage\
    \ (P-V) curves as a function of irradiance.\nHighlights: Solar irradiance [34]\
    \ directly impacts electricity output from PV modules, varying with time, location,\
    \ climate, season, and topography [35]. Higher irradiance can impair performance,\
    \ especially in hotter climates (see Section 3) [37]. Irradiance has a linear\
    \ effect on current and log-linear effect on voltage.\nMore Notes: Solar cell\
    \ efficiency initially rises, plateauing around 600 W/m2 before declining slightly\
    \ up to 1000 W/m2. The performance ratio (normalised efficiency) is relatively\
    \ constant across all types of solar cell above 400 W/m2 but falls by 7\u2013\
    9% at 150 W/m2 [40]. Series resistance increases with falling irradiance, but\
    \ the absolute power loss from this is lessened by the current also being lower.\n"
  5: "Source material\nPV modules are sensitive to the spectral distribution of solar\
    \ irradiance [42]. The Average Photon Energy (APE) metric assesses the effect\
    \ of solar spectrum distribution on outdoor PV module performance [42]. ... APE\
    \ incorporates environmental factors like air mass, cloud cover, and water content\
    \ [44]. ... This heating effect means cell temperatures correlate more strongly\
    \ with irradiation than ambient air temperature [65,66], although higher ambient\
    \ temperatures hinder cooling and thus increase cell temperatures. A typical PV\
    \ module converts 6\u201320 % of incident sunlight into electricity [63], and\
    \ incoming solar irradiance that is not converted or reflected generates heat,\
    \ increasing the PV module\u2019s temperature [64]. The Average Photon Energy\
    \ (APE) metric assesses the effect of solar spectrum distribution on outdoor PV\
    \ module performance [42]. ... APE incorporates environmental factors like air\
    \ mass, cloud cover, and water content [44]. PV modules are sensitive to the spectral\
    \ distribution of solar irradiance [42]. ... Blue-rich spectra improve the performance\
    \ of hydrogenated amorphous silicon (a-Si:H) ... but negatively affect copper\
    \ indium gallium selenide sulphide (CIGS) modules [49]. ... Module operating temperature\
    \ is determined by the balance of heat generation and heat loss to the environment.\
    \ Despite its importance, spectral distribution, as reflected in APE, is often\
    \ overlooked in PV modules\u2019 performance assessment [59,60].\n"
  6: "\nEvaluation overview: 'Solar insolation and ambient air temperature are the\
    \ two main environmental factors affecting solar PV output [71].'\nDrivers of\
    \ Risk: 'Solar insolation and ambient air temperature are the two main environmental\
    \ factors affecting solar PV output [71]. Furthermore, solar modules at high temperature\
    \ experience more rapid degradation and lower lifetimes [69,70].'\nQuantitative\
    \ material: 'Real-world power delivery can deviate by up to 10 %.'\nHighlights:\
    \ 'Whereas irradiance has a stronger effect on current, temperature predominantly\
    \ affects voltage. Furthermore, solar modules at high temperature experience more\
    \ rapid degradation and lower lifetimes [69,70].'\nMore Notes: 'Fig. 6. Relationships\
    \ between irradiance and various operating parameters of solar cells [40]. (a)\
    \ shows the linear relationship for short-circuit current density, (b) shows the\
    \ logarithmic relationship for open-circuit voltage, (c) and (d) show the relationship\
    \ with efficiency and performance ratio. (e) shows series resistance (Rs) and\
    \ (f) shows shunt resistance (Rsh), which decrease with irradiance [40]. Lines\
    \ refer to a standard reference B-doped silicon crystal (Ref.), and compensated\
    \ silicon crystals created with electronic grade silicon doped with boron (C1)\
    \ and phosphorus (C2). Fig. 7. Spectral irradiance with different APE values.\
    \ Spectral irradiances in two wavelength bands with varying APE values: 350\u2013\
    1050 nm and 300\u20131300 nm. Total irradiances in these wavelength ranges were\
    \ 792 and 923 W/m2. APE: Average Photon Energy [47].'\n"
  7: "  \n\"The I-V and P-V characteristics in Fig. 9 demonstrate a slight increase\
    \ in short-circuit current and a large decrease in open-circuit voltage as temperature\
    \ rises, reducing power output and thus efficiency.\"  \n\n\"...power output decreases\
    \ near-linearly with temperature...\"\n\n\"Summary of the temperature coefficients\
    \ from 21,000 commercially-available solar PV modules, aggregated by cell technology.\"\
    \n\n\"Temperature Coefficient of Power (% per \xB0K)...CdTe: Shows a range with\
    \ the median slightly below 0%...CIGS: Wider spread with a median around -0.4%...Mono-Si:\
    \ Narrower spread; median approximately -0.4%...Multi-Si: Similar to Mono-Si but\
    \ slightly higher median...Thin Film: Broad spread with a higher median.\"\n\n\
    \"The image displays two line graphs representing the electrical performance of\
    \ a system, likely a photovoltaic module, at different temperatures.\"\n"
