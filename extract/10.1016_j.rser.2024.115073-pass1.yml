  12: " \nWind affects PV efficiency through cooling, soiling, and structural risk,\
    \ with complex interactions occurring between wind and PV systems. Wind increases\
    \ efficiency by cooling modules, especially during peak sunlight hours [168,169],\
    \ and reduces soiling by blowing away accumulation of dust and snow [131,170].\
    \ However, wind can also deposit dust or snow [118, 134], and keeps particles\
    \ airborne, causing light scattering [170]. Extreme winds conditions can compromise\
    \ structural security [171,172], requiring adequate design margins.\n"
  13: "Global warming is reducing the Earth\u2019s albedo, as ice melt replaces reflective\
    \ surfaces with darker sea or land surface, meaning less incoming irradiance is\
    \ reflected, thus contributing further to global warming [179].\n\nIn Michigan,\
    \ US increased annual energy loss from 5 % to 34 % due to snow coverage [199].\
    \ For obstructed systems, yearly energy losses remain at 30\u201334 %, regardless\
    \ of tilt angle [199].\n\nThe increased reflection from higher albedo surfaces\
    \ increases the insolation incident on solar modules, leading to increased energy\
    \ generation [186].\n\nModule tilt is the most influential factor in determining\
    \ energy loss due to snow cover [197,198]. Reducing module tilt from 40\u25E6\
    to 30\u25E6in Utah, US (a high snowfall area) increased daily output losses by\
    \ 6\u201319 % [197], and reducing module tilt from 45\u25E6to 0\u25E6(lying horizontally)\
    \ in Michigan, US increased annual energy loss from 5 % to 34 % due to snow coverage.\n\
    \nIn California, the extreme wildfires in September 2020 reduced solar energy\
    \ production by 30 % [212].\n\nSmoke from Canadian wildfires in June 2023 reduced\
    \ solar generation by up to 60 % in New England [213], and by 25 % in Mid-Atlantic\
    \ and Midwestern states [214].\n\nNew York was particularly affected, losing ~1.5\
    \ GW of solar production between 6 June and 7 June 2023 [214].\n\nEnergy losses\
    \ from snow cover in Munich, Germany amount to 0.3\u20132.7 % [196], whereas in\
    \ Russia losses exceed 40 % with 4 mm thick snow coverage [192].\n\nClimate change\
    \ is increasing the severity of hailstorms and expanding the areas of the world\
    \ affected [216\u2013218].\n\nWildfires produce large quantities of aerosols that\
    \ reduce solar PV performance by blocking sunlight.\n\nSnowfall significantly\
    \ affects solar PV modules, especially in regions with extended periods of snow\
    \ coverage including Canada, Russia, and northern US states. Snow cover has complex\
    \ effects on PV generation due to the interaction of snow lying on the modules\
    \ and reflected light from surrounding snow-covered surfaces [190]."
