    "Evaluation overview": "This caused significant impacts as Western Australia has
    a high share of rooftop solar PV systems, and no grid connections to other markets
    [239]. The impact on state-wide capacity factors is shown in Fig. 21 alongside
    the impact of the 2017 US eclipse."

    "Drivers of Risk": "Climate change will affect many of the factors that reduce
    solar PV performance, including increasing humidity and frequency of wildfires
    and hailstorms as discussed in the previous sections."

    "Quantitative material": "The impact on state-wide capacity factors is shown in
    Fig. 21, alongside the impact of the 2017 US eclipse."

    "Methodology": "Fig. 21. Average capacity factor of PV systems during total solar
    eclipses compared to their surrounding days in (a) Western Australia and (b) the
    United States. (a) shows state-wide capacity factors measured with 5-min resolution,
    aggregated across Western Australia. Data from APVI [242]. (b) shows the region-wide
    capacity factors measured with 1-h resolution, aggregated across Central Midwest
    states in yellow (Kansas, Missouri, Iowa, Illinois, and Indiana) and South-eastern
    states in orange (Kentucky, Tennessee, North Carolina, South Carolina, and Georgia)."

    "Highlights": "Should a similar occurrence transpire in regions with more concentrated
    PV capacity, such as California (42 GW installed) [240], or Japan (83 GW installed)
    [5], the impact on power system operations could be difficult to manage."

    "More Notes": "The next major eclipses that will affect solar PV production will
    be in Spain on 12 August 2026, Chile and Argentina on 6 February 2027, North Africa
    and Middle East countries on 2 August 2027, Indonesia and Australia on 22 July
    2028, and Northern China on 1 June 2030 [241]."

