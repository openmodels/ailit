  16: 'yaml

    Evaluation overview: "This review examined the many environmental factors that
    influence solar PV performance."

    Drivers of Risk: "solar irradiance, temperature, cloud cover, dust and pollutants,
    snow cover, albedo, and extreme weather events."

    Quantitative material: "The global decrease in aerosol loading, particularly SO2
    and black carbon emissions falling 0.13 %/yr, has been linked to the rise in solar
    irradiance of 0.1 %/yr from 1983 to 2001 [265]."

    Methodology: "Since the advent of the satellite era in the 1980s, more accurate
    aerosol concentration records have clarified the relationship between aerosol
    load and the observed increase in solar irradiance since the late 20th century
    [264]."

    Highlights: "This more direct evidence strongly indicates that aerosol load driving
    the decadal changes in solar irradiance, and so efforts to improve air quality
    such as reducing the SO2 limit on shipping fuel [271] will likely improve solar
    PV capacity factors in future [264]."

