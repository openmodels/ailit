  2: "yaml\nEvaluation overview: \"No relevant information\"\nDrivers of Risk: \"\
    The modern episode of GMSL rise began in the late nineteenth century, with most\
    \ of the twentieth century rise attributable to global warming and ice melt...humanity\
    \ looks to its coastlines not only for living space, food, and other resources\
    \ but also as a barometer of global climate changes that are causing rapidly escalating\
    \ social and economic impacts.\"\nQuantitative material: \"Sea level reached its\
    \ lowest point (~130 m below present) during the Last Glacial Maximum (ca. 27\u2013\
    20 thousand years before 1950 [ka]), episodically rose during the deglaciation\
    \ (ca. 20\u201311 ka) at rates that at times were in excess of 47 mm yr\u2013\
    1 (vs. modern rates of 3.2 mm yr \u20131), and progressively slowed during the\
    \ Early to Middle Holocene from ca. 11 ka until ~4 ka...Under moderate emissions\
    \ scenarios, GMSL is likely to rise 0.4\u20131.0 m in this century, with ancient\
    \ analogs suggesting a longer term (centennial to millennial scale) equilibrium\
    \ rise of ~10 m. Under higher emissions scenarios, twenty-first century GMSL will\
    \ rise greater than 2 m, and in the long term, tens of meters cannot be excluded.\"\
    \nMethodology: \"No relevant information\"\nHighlights: \"The state of Earth\u2019\
    s climate is reflected by the position of the shoreline globally, both in the\
    \ modern world as sea level inexorably rises and accelerates, and in ancient worlds\
    \ of vastly different sea levels...humanity looks to its coastlines...also as\
    \ a barometer of global climate changes that are causing rapidly escalating social\
    \ and economic impacts.\"\nMore Notes: \"Under moderate emissions scenarios, GMSL\
    \ is likely to rise 0.4\u20131.0 m in this century, with ancient analogs suggesting\
    \ a longer term (centennial to millennial scale) equilibrium rise of ~10 m.\"\n"
  3: "`\nSea level changes driven by ocean temperature fluctuations, land ice volume\
    \ changes, and changes in ocean basin volumes: \"GMSL variations are caused primarily\
    \ by changes in ocean temperature, changes in land ice volume, and changes in\
    \ the volumes of ocean basins.\"\n\nGreenland Ice Sheet, West Antarctic Ice Sheet,\
    \ East Antarctic Ice Sheet, and mountain glaciers and ice caps contain 7.4 m,\
    \ 5.6 m, 52 m, and <1 m of sea level equivalent, respectively: \"Today, the Greenland\
    \ Ice Sheet (GIS) contains 7.4 m of sea level equivalent; the West Antarctic Ice\
    \ Sheet (WAIS) contains 5.6 m of sea level equivalent, including the Antarctic\
    \ Peninsula; the East Antarctic Ice Sheet (EAIS) contains 52 m of sea level equivalent;\
    \ and mountain glaciers and ice caps contain <1 m of sea level equivalent (Morlighem\
    \ et al., 2019).\"\n\nSea level change measured using tide gauges and satellite\
    \ data; historical reconstruction uses proxies calibrated to time and MSL: \"\
    Sea level change is determined by measuring time (age) and height of water with\
    \ respect to datum levels. Instrumental measurements of RSL are based on data\
    \ from tide gauges with extensive global coverage after World War II and sparse\
    \ coverage dating back to the eighteenth century, and from satellites with global\
    \ coverage since 1993. For reconstruction of ancient sea level, proxies are calibrated\
    \ to time and MSL, with ages determined from radiometric data.\"\n\nAnthropocene\
    \ characterized by increased atmospheric CO2 from 280 ppm in 1850 to 414 ppm in\
    \ 2020, potentially reaching 600\u2013900 ppm this century: \"The yet-to-be formally\
    \ defined Anthropocene epoch can be partly characterized by human-induced modifications\
    \ of Earth\u2019s climate state due to changes in atmospheric CO2 concentrations\
    \ from 280 ppm in ~1850 to 414 ppm in 2020 CE, with current trends projected to\
    \ lead to 600\u2013900 ppm in this century in the absence of strong global climate\
    \ policy.\"\n"
  4: null
  5: "The solution to this enigma is that there were small (15\u201325 m sea level\
    \ equivalent or 25%\u201340% of modern volume), ephemeral ice sheets during the\
    \ Late Cretaceous to Eocene in the interior of Antarctica (Miller et al. 2005a;\
    \ We posit that sea level variations on the order of 15\xB110 m occurred as significant\
    \ ice sheets grew and decayed (A) Sea level obtained using benthic (Cibicidoides)\
    \ foraminiferal \u03B418Obenthic splice and \u03B418Oseawater using temperatures\
    \ from Mg/Ca records. Remarkable new data show marine-terminating glaciers existed\
    \ at the Sabrina Coast, adjacent to the Aurora Basin, Antarctica, by the Early\
    \ to Middle Eocene (Gulick et al., 2017) The sea level record older than 48 million\
    \ years is dashed because of uncertainties in the Mg/Ca record (Cramer et al.,\
    \ 2011). Mg/Ca seawater estimates are partly the source of uncertainties older\
    \ than 48 Ma, though the Mg/Ca record older than 48 Ma from Site 1209 is suspect\
    \ due to high variability (Cramer et al., 2011)."
  6: "The page discusses various episodes of sea level changes and their relationship\
    \ with climate variables and events. It describes sea level falls and rises in\
    \ the Middle to Late Eocene and into the Early Oligocene, focusing on changes\
    \ associated with intervals of global cooling and warming, changes in atmospheric\
    \ CO2, and other factors.\n\nFor Drivers of Risk, the text mentions: \"Changes\
    \ in atmospheric CO2, orbital cycles (precession, tilt, eccentricity), volcanism\
    \ (Columbia River basalts), and weathering are identified as drivers of sea level\
    \ change.\"\n\nFor Quantitative Material, specific sea level changes and cooling\
    \ events are described: \"Sea level falls of 15\u201330 m at ca. 49, 47.8, 46.9,\
    \ and 44.5 Ma; smaller falls (~10\u201320 m) at 43.6, 42.9, and 40.8 Ma; a major\
    \ rise of ~40 m at 40.1 Ma followed by a ~20 m drop at 39.5 Ma; sea level fell\
    \ 40 m at ca. 35 Ma. Sea level falls of 40-60 m in the Early Oligocene. Mi3a (14.8\
    \ Ma; ~30 m fall, ~0.7\xB0C cooling), Mi3 (13.8 Ma; ~50 m fall, ~1.2\xB0C cooling),\
    \ and Mi4 (12.8 Ma; 20\u201330 m sea level fall, ~1.0\xB0C cooling). From 12.8\
    \ until ca. 4.5 Ma, sea level change amplitudes were muted. Pliocene sea levels\
    \ stood ~22\xB110 m above present. Sea level at 3 Ma constrained to <20 m.\"\n\
    \nFor Methodology, the estimates are based on specific proxies: \"Sea level estimates\
    \ are based on \u03B418O-Mg/Ca-based estimates.\"\n\nFor Highlights, key results\
    \ are summarized as follows: \"The Middle to Late Eocene sea level record indicates\
    \ dynamic growth and collapse of moderately large ice sheets (0%\u201375% of modern\
    \ EAIS), controlled by the 1,200 kyr tilt cycle. A continental-scale EAIS developed\
    \ in the Icehouse Early Oligocene associated with Zone Oi1 (ca. 34 Ma). The amplitudes\
    \ of sea level change were muted from 12.8 until ca. 4.5 Ma. The Pliocene recorded\
    \ the last major warm period (4.5\u20133 Ma) when global mean surface temperatures\
    \ were 2\xB0\u20133\xB0C warmer than 1850 CE, CO2 was similar to 2020, and sea\
    \ levels stood ~22\xB110 m above present.\"\n"
  8: "Source material: \"Sea level reached its highest points of the last 780 kyr\
    \ in MIS 11 (9\xB13 m, ~405 kyr) and MIS 5 (7.5\xB11.5 m above present, ca 125\
