Quantitative material:
  2: "Global mean sea level (GMSL) rose at rates exceeding 47 mm yr\u20131 during\
    \ deglaciation and modern rates are 3.2 mm yr\u20131. Potential 21st-century GMSL\
    \ rise is 0.4-1.0 m under moderate emissions scenarios and greater than 2 m under\
    \ higher emissions scenarios."
  3: Greenland Ice Sheet, West Antarctic Ice Sheet, East Antarctic Ice Sheet, and
    mountain glaciers and ice caps contain 7.4 m, 5.6 m, 52 m, and <1 m of sea level
    equivalent, respectively.
  4: Amplitudes and rates of sea level change are provided, such as ice volume changes
    with an amplitude best estimate of 200 m and a rate up to 50,000 m/Myr.
  5: "Sea level variations on the order of 15\xB110 m associated with Antarctic ice\
    \ sheet dynamics."
  6: "Sea level falls of 15\u201330 m at ca. 49, 47.8, 46.9, and 44.5 Ma; smaller\
    \ falls (~10\u201320 m) at 43.6, 42.9, and 40.8 Ma; a major rise of ~40 m at 40.1\
    \ Ma followed by a ~20 m drop at 39.5 Ma; sea level fell 40 m at ca. 35 Ma. Sea\
    \ level falls of 40-60 m in the Early Oligocene. Mi3a (14.8 Ma; ~30 m fall, ~0.7\xB0\
    C cooling), Mi3 (13.8 Ma; ~50 m fall, ~1.2\xB0C cooling), and Mi4 (12.8 Ma; 20\u2013\
    30 m sea level fall, ~1.0\xB0C cooling). From 12.8 until ca. 4.5 Ma, sea level\
    \ change amplitudes were muted. Pliocene sea levels stood ~22\xB110 m above present.\
    \ Sea level at 3 Ma constrained to <20 m."
  8: "GMSL rise slowed to ~8 mm yr\u20131 in the Early Holocene (11.3\u20138.2 ka)\
    \ and progressively slowed to 2 mm yr\u20131 in the Middle Holocene (8.2\u2013\
    4.2 ka) and less than 1 mm yr\u20131 by 5 ka. Rate of sea level rise between 1900\
    \ and 2015 of 1.6 \xB1 0.4 mm yr\u20131 with acceleration beginning in the late\
    \ 1960s. The rate of sea level rise increased from 2.1 \xB1 0.1 mm yr\u20131 to\
    \ 3.4 \xB1 0.3 mm yr\u20131 from 1993 to 2015."
