Highlights:
  2: Sea level serves as a barometer of Earth's climate states, with historic variations
    providing insights into future risks and impacts on coastlines.
  3: "Anthropocene characterized by increased atmospheric CO2 from 280 ppm in 1850\
    \ to 414 ppm in 2020, potentially reaching 600\u2013900 ppm this century."
  4: "Convergence of stratigraphy and \u03B418O-Mg/Ca methods allows identification\
    \ of GMSL changes and inferences about mechanisms."
  5: New data indicates marine-terminating glaciers existed in Antarctica during the
    Early to Middle Eocene.
  6: "The Middle to Late Eocene sea level record indicates dynamic growth and collapse\
    \ of moderately large ice sheets (0%\u201375% of modern EAIS), controlled by the\
    \ 1,200 kyr tilt cycle. A continental-scale EAIS developed in the Icehouse Early\
    \ Oligocene associated with Zone Oi1 (ca. 34 Ma). The amplitudes of sea level\
    \ change were muted from 12.8 until ca. 4.5 Ma. The Pliocene recorded the last\
    \ major warm period (4.5\u20133 Ma) when global mean surface temperatures were\
    \ 2\xB0\u20133\xB0C warmer than 1850 CE, CO2 was similar to 2020, and sea levels\
    \ stood ~22\xB110 m above present."
  8: "The modern rise is not a remnant of deglaciation but rather due to anthropogenic\
    \ warming. The modern period of GMSL rise began in the late nineteenth century,\
    \ and the rate of rise over the twentieth century was the fastest in at least\
    \ 3,000 years. Simple extrapolation of the acceleration seen in the satellite\
    \ data predicts over 0.7 m of GMSL rise by 2100 and a ~12.5 mm yr\u20131 rate\
    \ of rise in 2100."
  10: No relevant information
