    \ analysis of satellite and tide gauge records by Dangendorf et al. (2019) shows\
    \ a 1.6 \xB1 0.4 mm yr\u20131 rate of sea level rise between 1900 and 2015...Using\
    \ nearly 30 years of satellite data (Nerem et al., 2010; Beckley et al., 2016),\
    \ a simple regression model...The modern rise is not a remnant of deglaciation\
    \ but rather due to anthropogenic warming...The modern period of GMSL rise began\
    \ in the late nineteenth century, and the rate of rise over the twentieth century\
