Drivers of Risk:
  1: Climate change impacts, particularly emphasizing the potential crossing of climatic
    tipping points, influence socioeconomic development and poverty levels.
  2: The manuscript focuses on temperature change as a driver of outcomes using representative
    concentration pathways (RCPs).
  4: Worsening climate conditions, such as a rise in mean temperature and climate
    tipping points.
  5: Temperature changes and varying precipitation levels are identified as impacting
    income inequality through agricultural activity.
  7: The page does not explicitly mention specific shocks or changes impacting outcomes,
    but focuses on temperature changes in different RCP scenarios.
  8: Scenarios with high challenges to adaptation, like SSP3 and SSP4, impact outcomes
    such as higher population growth and inequality.
  9: Climate change (temperature increases).
  10: Climate change, modeled through various SSP-RCP scenarios, including SSP1-RCP
    2.6, SSP3-RCP 6.0, and SSP5-RCP 8.5.
  11: Climate change (implied through different RCP scenarios) and socioeconomic development
    pathways (SSPs). Also incorporates the potential impact of tipping points.
  12: RCP scenarios plus surpassing tipping points, climate change, income inequality.
  13: Climate change, economic production, fossil fuel use, and income inequality.
  14: Key drivers include fossil fuel use leading to climate change and temperature
    increase, which in turn affects inequality and poverty.
  15: Climate change (SSP2-RCP 4.5)
  17: The page includes studies discussing impacts like climate variability and social
    inequality, but specific shocks or changes impacting outcomes are not detailed
    on this page.
Evaluation overview:
  1: The paper provides an overview of the effect of climate change on future poverty
    levels projected to the year 2070.
  2: This manuscript evaluates the impacts and uncertainties of climate change and
    poverty across different income levels.
  4: The impact of climate change on productivity via a damage function and the impact
    of tipping points on the social cost of carbon (SCC).
  5: The analysis assesses how temperature and precipitation variation affect income
    disparities, particularly through agricultural channels affecting both rural and
    urban populations.
  7: The page does not provide a clear overview of the specific outcomes being evaluated,
    such as mortality or productivity loss.
  8: Graphs provide an overview of projections for GDP per capita, income inequality,
    population growth, and vulnerability.
  9: Global economic growth and inequality (Gini coefficient).
  10: Global poverty measured in millions, specifically extreme poverty (less than
    $1.90 per day), poverty (less than $3.20 per day), and moderate poverty (less
    than $5.50 per day).
  11: The effect of climate change on poverty, measured as the number of people living
    below different income thresholds ($1.90, $3.20, $5.50 per day).
  12: The cumulative effect of tipping points on global GDP, and climate-attributable
    effect on global poverty.
  13: Global climate-attributable poverty (under $1.90 per day).
  14: No specific overview provided on outcomes like mortality or productivity loss;
    the focus is on broader socioeconomic impacts of technology and climate change.
  15: Extreme poverty
  17: The page references various studies related to climate impacts, such as labor
    productivity and socio-economic factors, but does not provide a concise evaluation
    overview of a specific study outcome.
Highlights:
  1: Macroeconomic projections suggest that climate change-attributable extreme poverty
    could be lower than bottom-up estimates, with tipping points posing significant
    threats to socioeconomic futures.
  2: The paper addresses the importance of balancing technology's role in socio-economic
    development and climate change.
  5: A key outcome is the link between temperature increase and rising income inequality,
    particularly through effects on agriculture.
  7: The page describes the simulation results for average global temperature increases
    for various RCP scenarios by 2070.
  8: SSP5 shows the highest GDP per capita growth; SSP3 shows the highest population
    growth and is associated with greater income inequality and vulnerability.
  9: "Climate change is projected to reduce global economic growth and increase global\
    \ inequality across all scenarios. The negative impact on global economic activity\
    \ is estimated at $1.1\u20136.9 trillion by 2030, $17\u201365.7 trillion by 2050,\
    \ and $78.8\u2013344.1 trillion by 2070 (cumulative). The increase in global inequality\
    \ driven by temperature is projected to range from 0.01 to 0.016 in 2030, 0.022\
    \ to 0.042 in 2050, and 0.023 to 0.074 in 2070."
  10: Climate change is projected to push millions more people into poverty, with
    the extent varying significantly depending on the socioeconomic and emissions
    pathway. SSP3-RCP 6.0 results in the largest increase in poverty, while SSP1-RCP
    2.6 suggests a potential for mitigation through balanced socioeconomic development
    and climate action.
  11: Climate change is projected to increase the number of people living in poverty.
    The proportion of people in poverty attributable to climate change decreases as
    the poverty threshold increases. Tipping points can have catastrophic effects
    on socioeconomic development and increase poverty.
  12: In an RCP 2.6 world, global income inequality would need to be improved by five
    percent through 2070 to eliminate climate-attributable poverty.
  13: Human choices related to mitigation can significantly reduce the climate-induced
    burden on poverty. Sustained efforts to improve income distribution can mitigate
    the long-term effects of climate change on poverty.
  14: Technological improvements can exacerbate fossil fuel emissions or mitigate
    through renewables; socioeconomic development needs to balance with climate change
    mitigation.
  15: Climate change, under the SSP2-RCP 4.5 scenario, is projected to push an additional
    40 million people into extreme poverty by 2050.
  17: No specific outcomes or highlights are extracted on this page, as it primarily
    lists references to other studies.
Methodology:
  1: The analysis uses the International Futures (IFs) model combining representative
    concentration pathways (RCPs) and shared socioeconomic pathways (SSPs) projections
    to estimate poverty across income thresholds for 175 countries through 2070.
  2: The study models the impact of climate change on economic growth using the DICE
    model damage function and on inequality using temperature change data from 2003
    to 2017.
  4: The paper uses a damage function approach to gauge the economic losses from worsening
    climate conditions.
  5: The analysis uses RCP temperature trajectories, damage functions, and tipping
    points to model economic activity impacts, drawing on data for 175 countries from
    2017 to 2070.
  7: The paper uses the IFs model, which includes a six-sector general equilibrium
    economic model, to analyze scenarios with and without forward linkages from temperature
    change to inequality or economic production.
  9: The analysis uses IFs (International Futures) model coupled with different Shared
    Socioeconomic Pathways (SSPs) and Representative Concentration Pathways (RCPs)
    to project economic growth and inequality. The DICE model damage function is also
    used. Results are applicable to the years 2030, 2050, and 2070.
  10: The analysis uses SSP and RCP scenarios to project the number of people falling
    into poverty due to climate change, providing estimates for 2030, 2050, and 2070.
    Uncertainty is treated by considering broad assumptions across SSP and RCP scenarios
    rather than using longitudinal error bands.
  11: Uses the IFs model to project poverty levels under different SSP-RCP scenarios,
    with and without considering climate tipping points. Results are applicable to
    2030, 2050, and 2070.
  12: The IFs-RCP model was used. Sensitivity analysis was performed exogenously changing
    the Gini coefficient for income inequality. Additional relationships between temperature
    change and income inequality were tested.
  13: Analysis of the impact of climate change on poverty across different countries
    and income thresholds using established macro-level relationships, SSP-RCP combinations,
    and the IFs model.
  14: The manuscript highlights the use of damage functions, historical data for inequality
    and temperature, and acknowledges limitations such as missing sectoral analysis
    and the inability to model planetary boundary shocks.
  15: The study uses the IFs (International Futures) software platform.
  17: The page references several studies but does not detail the methodologies used
    in analyses.
More Notes:
  7: The page describes the IFs model's method of incorporating domestic and international
    flows and poverty calculation based on a log-normal income distribution.
  10: The phrase 'pushed into extreme poverty' highlights the marginal difference
    between climate scenarios and a scenario without climate impacts, and does not
    suggest overall poverty rates are increasing.
  11: The paper also references figures and tables on other pages (Fig. 3, Table 5,
    Fig. 5) that are not available to examine within this excerpt.
  15: The authors declare no competing interests.
  17: The page is mostly a bibliography without detailed content from the studies
    themselves on this page.
No relevant information:
  18: This page is primarily a list of references and author affiliations, not the
    main body of the research paper. Therefore, it contains no relevant information
    regarding the evaluation overview, drivers of risk, quantitative material, methodology,
    or highlights of the analysis performed in the paper itself.
Quantitative material:
  1: Quantitative projections include climate change-attributable extreme poverty
    affecting 25 million people by 2030, 40 million by 2050, and 32 million by 2070,
    with scenarios predicting higher numbers if tipping points are crossed.
  4: This paper uses the findings from Dietz et al. (2021) to operationalize the impact
    of tipping points in our analysis across all the alternative socio-economic development
    and temperature change combinations.
  5: The study finds that a 1% increase in temperature raises the Gini coefficient
    for income inequality by 0.5 points.
  7: "There is quantitative information on projected average global temperature increases\
    \ by 2070 for different RCP scenarios (RCP 2.6: 20.6\xB0C, RCP 4.5: 21.4\xB0C,\
    \ RCP 6.0: 21.3\xB0C, RCP 8.5: 22.4\xB0C)."
  8: Quantitative projections include future GDP per capita, Gini index trends, population
    growth, and changes in vulnerability, with specific GDP growth figures provided
    for each SSP by 2070.
  9: By 2030, GDP reduction ranges from -0.2 to -0.6%; by 2050, -0.8 to -1.5%; by
    2070, -0.8 to -3.2%. Increase in global inequality ranges from 0.01 to 0.016 in
    2030, 0.022 to 0.042 in 2050, and 0.023 to 0.074 in 2070.
  10: "By 2030, the projected number of people pushed into extreme poverty ranges\
    \ from an additional 18\u201330 million. SSP3-RCP 6.0 leads to an increase in\
    \ the number of people in poverty by 30 million by 2030, 78 million by 2050, and\
    \ 130 million by 2070. SSP5-RCP 8.5 pushes an additional 24 million people into\
    \ poverty by 2030, 20 million into poverty by 2050, and 39 million into poverty\
    \ by 2070."
  11: Table 4 shows the estimated number of people (in millions) living below the
    specified poverty thresholds in 2030, 2050, and 2070 under different SSP-RCP combinations.  Figure
    4 shows the climate-attributable percentage of the impoverished population under
    the IFs-RCP 6.0 scenario for different poverty thresholds. By 2070, nearly 40%
    of the population living on less than $1.90 per day will be attributable to climate
    change in an IFs-RCP 6.0 scenario; nearly 30% at $3.20, and nearly 20% at $5.50.
  12: Table 5 provides the cumulative effect of tipping points on global GDP measured
    in trillions of 2011 US$ at market exchange rates for various RCP scenarios in
    2030, 2050, and 2070. For example, IFs-RCP 6.0 results in -$36.8T in 2030, -$326.1T
    in 2050, and -$1,112.0T in 2070. Figure 5 shows the climate-attributable effect
    of RCP scenarios plus surpassing tipping points on extreme, general, and moderate
    poverty (less than $1.90, $3.20, and $5.50 per day) measured in millions.
  13: Under RCP 8.5, a 15% reduction in income inequality would be necessary to offset
    climate-attributable poverty increases. Alternative scenarios with exogenous reductions
    in global income inequality of one, five, ten, fifteen, and twenty percent interpolated
    through 2070.
  15: SSP2-RCP 4.5 leads to an additional 40 million people in extreme poverty by
    2050 relative to a world without climate change.
  17: This page does not provide specific quantitative results from the analysis.
sourcematerial:
  1: "yaml\nEvaluation overview: \"While many studies explore key aspects of this\
    \ dilemma, few direct attention to the pathways from climate change through socioeconomic\
    \ development to the future of poverty... projecting poverty across income thresholds\
    \ for 175 countries through 2070.\"\nDrivers of Risk: \"If climatic tipping points\
    \ are passed, the climate-attributable extreme poverty grows to 57 million people\
    \ by 2030 (range: 40\u201372), 78 million by 2050 (range: 18\u2013193), and 56\
    \ million by 2070 (range: 7\u2013306).\"\nQuantitative material: \"Central tendency\
    \ scenarios with climate effects compared with scenarios that do not model climate\
    \ change show that climate change-attributable extreme poverty will grow to 25\
    \ million people by 2030 (range: 18 to 30), 40 million by 2050 (range: 9 to 78),\
    \ and 32 million by 2070 (range: 4 to 130) though overall levels of global poverty\
    \ decline.\"\nMethodology: \"We build on projections of global temperature change\
    \ (representative concentration pathways) and country-specific economic development\
    \ (economic growth and income distribution across the shared socioeconomic pathways)\
    \ to model how climate change may affect future poverty with the International\
    \ Futures (IFs) model, projecting poverty across income thresholds for 175 countries\
    \ through 2070.\"\nHighlights: \"Forecasts of climate-driven poverty increases\
    \ in this paper are lower than estimates made using bottom-up approaches, suggesting\
    \ that macro-level approaches miss dynamics related to prices and consumption\
    \ power...Tipping points are a significant threat to future socioeconomic development\
    \ and drive significant increases in poverty across scenarios.\"\n"
  2: "Source material here.\nEvaluation overview: \"This manuscript contributes to\
    \ our understanding of the impacts and uncertainties of climate change and poverty\
    \ across different income levels (Hallegatte et\_ al. 2016; Moyer et\_ al. 2022)\
    \ by introducing alternative scenarios using the International Futures (IFs) modeling\
    \ system (Hughes et\_ al. 2019).\"\nDrivers of Risk: \"The impact of climate change\
    \ is operational-ized using representative concentration pathways (RCPs) that\
    \ rely on temperature change to drive outcomes.\"\nMethodology: \"The analysis\
    \ uses the International Futures (IFs) modeling system and macro-level relationships\
    \ to evaluate climate change impacts.\"\nMethodology: \"The study models the impact\
    \ of climate change on economic growth using the DICE model damage function and\
    \ on inequality using temperature change data from 2003 to 2017.\"\nHighlights:\
    \ \"Balancing the role of technology as a driver of both socioeconomic development\
    \ and climate change will be crucial as humans try to balance competing crises\
    \ of climate change, pollution, and biodiversity loss with ongoing crises of poverty,\
    \ undernutrition, and civil conflict.\"\n"
  4: "Source material here. We capture the impact of climate change on productivity\
    \ via a damage function, which is a simplified approach to gauge the economic\
    \ losses from worsening climate conditions, such as a rise in mean temperature\
    \ (Wang and Teng 2022). ... We also use the findings from Dietz et\_al. (2021)\
    \ to operationalize the impact of tipping points in our analysis across all the\
    \ alternative socio-economic development and temperature change combinations.\
    \ Damage functions are critiqued from various perspectives, including for being\
    \ both too optimistic and pessimistic (Auffhammer  2018; Pindyck 2017)."
  5: "yaml\nEvaluation overview: \"The study by Paglialunga et al. (2022), which examines\
    \ over 150 countries between 2003 and 2017 to assess the extent to which temperature\
    \ and precipitation variation affected income disparities, identifying agricultural\
    \ activity as one of the most important channels through which climate change\
    \ exacerbates inequality, directly and indirectly.\"\nDrivers of Risk: \"We use\
    \ a study by Paglialunga et al. (2022), which examines over 150 countries between\
    \ 2003 and 2017 to assess the extent to which temperature and precipitation variation\
    \ affected income disparities, identifying agricultural activity as one of the\
    \ most important channels through which climate change exacerbates inequality,\
    \ directly and indirectly.\"\nQuantitative material: \"The study finds that a\
    \ 1% increase in temperature raises the Gini coefficient for income inequality\
    \ by 0.5 points on a 0\u2013100-point scale.\"\nMethodology: \"We use several\
    \ tools, including SSPs (O\u2019Neill et al. 2017), RCPs (van Vuuren et al. 2011),\
    \ and IFs (Hughes et al. 2019), to model economic production, income distribution,\
    \ and population change for 175 countries from 2017 to 2070, a process outlined\
    \ in Fig.\_ 1. We begin by using RCP temperature trajectories to measure median\
    \ temperature change relative to pre-industrial levels on a country basis using\
    \ a 10-year moving average. We then introduce damage functions (Diaz and Moore\
    \ 2017; Nordhaus 2018; Tol 2009) and tipping points (Dietz et al. 2021) to capture\
    \ the impacts of climate change on overall economic activity.\"\nHighlights: \"\
    While depressed agricultural yields directly affect rural income, they likely\
    \ affect poor urban populations indirectly by jeopardizing their real income and\
    \ consumption patterns via increased food prices (Paglialunga et al. 2022). The\
    \ study finds that a 1% increase in temperature raises the Gini coefficient for\
    \ income inequality by 0.5 points on a 0\u2013100-point scale.\"\n"
  7: 'The source material does not provide a clear overview of specific outcomes such
    as mortality or productivity loss, instead focusing on temperature changes across
    scenarios.

    The source mentions temperature changes as a context for the evaluation of scenarios.

    The paper provides projected global temperature increases for RCP scenarios: "RCP
    2.6 has an increase of average global temperature to 20.6 degrees centigrade by
    2070. RCP 4.5 reaches a temperature of 21.4 degrees by 2070, while RCP 6.0 reaches
    a temperature of 21.3 degrees by 2070. RCP 8.5 has a steady increase of average
    global temperature which reaches 22.4 by 2070."

    The page outlines the methodology by describing how the IFs model is used: "The
    IFs model includes a six-sector general equilibrium model of the economy...simulates
    production in each sector using Cobb-Douglas type production functions...Agents
    in the IFs model . . . optimize each annual time step on the path to equilibrium
    . . . The model incorporates both domestic flows among households, firms, and
    the government, as well as international trade, to represent the flows that go
    into sectoral stocks."

    The page describes the significance of the temperature results: "We begin by introducing
    the baseline behavior of scenarios across key indicators in Fig. 2 both with (dashed
    lines) and without forward linkages from temperature change to inequality or economic
    production (solid lines)."

    "The poverty calculation in IFs is based on the assumption of a log-normal income
    distribution (Hughes et al. 2009; Moyer et al. 2022). This distribution is updated
    annually based on changes in projected consumption and the Gini index of inequality."

    '
  8: "  \nEvaluation overview: \n- \"Each graph shows global forecasts for all No\
    \ Climate scenarios in solid lines for a GDP per capita at PPP measured in 2011\
    \ USD, b Gini index for income inequality measured on a 0\u20131 scale, c population\
    \ measured in millions, and d extreme poverty (less than $1.90 per day) measured\
    \ in millions.\"\n\nDrivers of Risk: \n- \"Scenarios with greater challenges to\
    \ adaptation show lower long-term growth in per person economic production and\
    \ consumption, with SSP4 growing to $39.6 thousand USD and SSP3 growing to $25.8\
    \ thousand USD by 2070.\"\n\nQuantitative material: \n- \"By 2070, per capita\
    \ GDP grows to $97.4 thousand USD, up from a 2017 value of $15.3 thousand.\"\n\
    - \"The Gini values [in scenarios such as SSP1 and SSP5] falling by nearly 20%\
    \ by the end of the time horizon.\"\n- \"SSP3 is the scenario with the greatest\
    \ population growth, increasing to 11.3 billion by 2070.\"\n\nHighlights: \n-\
    \ \"Future levels of average per capita GDP increase most rapidly in SSP5... with\
    \ average income increasing to $69.7 thousand USD by 2070.\"\n- \"Scenarios with\
    \ high challenges to adaptation show increases in global populations through 2070\
    \ (Samir and Lutz 2017). SSP3 is the scenario with the greatest population growth.\"\
    \n"
  9: "Source material here: Table 2 The effect of climate change on global economic\
    \ growth measured in cumulative trillions of 2011 US$ at market exchange rates\
    \ and in percent terms in parenthesis for 2030, 2050, and 2070; Table 3 The effect\
    \ of climate on global Gini measured on a 0\u20131 scale in absolute terms and\
    \ in percent change in parenthesis for 2030, 2050, and 2070; According to the\
    \ DICE model damage function, the impact of climate change on global economic\
    \ production is projected to reduce GDP across all scenarios.; The analysis uses\
    \ IFs (International Futures) model coupled with different Shared Socioeconomic\
    \ Pathways (SSPs) and Representative Concentration Pathways (RCPs) to project\
    \ economic growth and inequality. The DICE model damage function is also used.\
    \ Results are applicable to the years 2030, 2050, and 2070; In total, this represents\
    \ a significant reduction in overall cumulative economic activity, with the range\
    \ of negative impact estimated at $1.1\u20136.9 trillion by 2030, $17\u201365.7\
    \ trillion by 2050, and $78.8\u2013344.1 trillion by 2070. Table 3 presents the\
    \ impact of changing temperature on future levels of inequality. The increase\
    \ in global inequality driven by temperature is projected to range from 0.01 to\
    \ 0.016"
  10: "Source material here: Fig.3 Each graph shows the effect of climate on global\
    \ poverty measured in millions: a extreme poverty (less than $1.90 per day\u2014\
    top left), b poverty (less than $3.20 per day\u2014top right), and c moderate\
    \ poverty (less than $5.50 per day\u2014bottom left)  Figure 3 displays the number\
    \ of people who are expected to fall into extreme poverty due to climate change\
    \ in each scenario. By 2030...the SSP1-RCP 2.6 scenario... the more pessimistic\
    \ SSP3-RCP 6.0 scenario... the SSP5-RCP 8.5 scenario... By 2030, the projected\
    \ number of people pushed into extreme poverty ranges from an additional 18\u2013\
    30 million. On the other hand, the more pessimistic SSP3-RCP 6.0 scenario...leads\
    \ to an increase in the number of people in poverty by 30 million by 2030, 78\
    \ million by 2050, and 130 million by 2070. The SSP5-RCP 8.5 scenario pushes an\
    \ additional 24 million people into poverty by 2030, 20 million into poverty by\
    \ 2050, and 39 million into poverty by 2070. The uncertainty treatment here does\
    \ not use longitudinal error bands and instead considers the broad assumptions\
    \ made across SSP and RCP scenarios to reflect a broad treatment of future uncertainty.\
    \  Figure 3 displays the number of people who are expected to fall into extreme\
    \ poverty due to climate change in each scenario...the SSP3-RCP 6.0 scenario...leads\
    \ to an increase in the number of people in poverty... SSP1-RCP 2.6 scenario,\
    \ which assumes improved socioeconomic development and low emissions, shows...a\
    \ reduction from the level forecast for 2030. This scenario suggests that if socioeconomic\
    \ development and climate change mitigation efforts are effectively balanced...\
    \ The phrase \u201Cpushed into extreme poverty\u201D is used to highlight the\
    \ marginal difference between the various climate scenarios and a scenario where\
    \ the climate impacts are not included. This phrasing does not suggest that poverty\
    \ rates overall are increasing or decreasing."
  11: "The full range of results for the population pushed into poverty under different\
    \ income thresholds is provided in Fig.\_3 and Table\_4. These model results are\
    \ lower than results from Hallegatte et\_al. (2016), which produces a poverty\
    \ scenario using SSP4 and RCP 8.5 showing 122 million pushed into poverty because\
    \ of climate change from 2014 to 2030. Using the same period of time and scenario\
    \ assumptions, our SSP4-RCP 8.5 scenario without tipping points increases the\
    \ number of people in poverty by 48 million, and including tipping points increases\
    \ that number to 99 million. Future patterns of climate change will also increase\
    \ the share of the population living on lower income thresholds more than higher\
    \ income thresholds, as demonstrated in Fig.\_4. By 2070, nearly 40% of the population\
    \ living on less than $1.90 per day will be attributable to climate change in\
    \ an IFs-RCP 6.0 scenario. As we climb the income ladder, nearly 30% of the future\
    \ population living on less than $3.20 per day will be there due to climate change.\
    \ At the $5.50 threshold, nearly 20% will be climate change attributable. Previous\
    \ analyses in this manuscript did not consider the potential impact of tipping\
    \ points, which could have catastrophic effects on socioeconomic development.\
    \ To address this, we incorporated additional shocks to simulate a worst-case\
    \ scenario aligned with estimates from recent literature (Dietz et\_al. 2021).\
    \ Table\_5 presents the effect of exceeding tipping points on GDP levels over\
    \ time. These tipping points are estimated to increase the number of people living\
    \ in poverty across various income thresholds, as shown in Fig.\_5."
  12: "The cumulative effect of tipping points on global GDP measured in trillions\
    \ of 2011 US$ at market exchange rates... Table 5... SSP1-RCP 2.6 \u2212$41.5\
    \ \u2212$431.5 \u2212$1,644.0... The climate-attributable effect of RCP scenarios\
    \ plus surpassing tipping points... Fig. 5... The sensitivity of the IFs-RCP model\
    \ results to scenarios that exogenously changed the Gini coefficient for income\
    \ inequality... In an RCP 2.6 world, global income inequality would need to be\
    \ improved by five percent through 2070 to eliminate climate-attributable poverty."
  13: 'Source material: Fig.6 Global climate-attributable poverty (under $1.90 per
    day) for IFs-RCP scenario combinations minus IFs No Climate scenario with alternative
    scenarios that exogenously reduce global income inequality by one, five, ten,
    fifteen, and twenty percent interpolated through 2070... In the more extreme climate
    scenario of RCP 8.5, a fifteen percent reduction in income inequality would be
    necessary... This manuscript presents an analysis of the impact of climate change
    on poverty across different countries and income thresholds using established
    macro-level relationships... and presents a comprehensive range of SSP-RCP combinations
    helping to inform thinking about the relationship between economic development,
    climate change, and poverty... We show that the future impact of climate change
    on human development is characterized by significant uncertainty and that human
    choices related to mitigation can significantly reduce the climate-induced burden
    on poverty. We also demonstrate that sustained efforts to improve income distribution
    can mitigate the long-term effects of climate change on poverty... Economic production
    and fossil fuel use are the primary drivers of climate change...'
