Drivers of Risk:
  1: Increases in relative humidity and decreases in vertical wind shear are driving
    increased nearshore tropical cyclone intensification.
  2: Tropical cyclones undergoing rapid intensification shortly before landfall pose
    a major threat to coastal communities, and these events are expected to become
    more frequent and severe as the climate continues to warm.
  3: Changes in VWS (vertical wind shear) due to changes in surface pressure, three-dimensional
    temperature, winds, topography, diabatic heating, and transient eddies
  4: Changes in tropical cyclone intensification rates between nearshore regions over
    two different periods.
  5: Trends in observed sea surface temperatures (SST), vertical wind shear (VWS),
    and relative humidity (RH) affect nearshore tropical cyclone intensification.
  6: The changes in sea surface temperature (SST), vertical wind shear (VWS), and
    relative humidity (RH) are impacting storm development in the nearshore and offshore
    regions.
  7: Various environmental changes are driving the intensification of nearshore tropical
    cyclones (TCs).
  8: Nearshore Tropical Cyclone (TC) intensification rates.
  9: Increasing anthropogenic forcing is contributing to a more favorable nearshore
    environment for tropical cyclone intensification, likely due to changes in sea
    surface temperature (SST), vertical wind shear (VWS), and relative humidity (RH).
  10: Changes in vertical wind shear (VWS) are a driver of risk for tropical cyclone
    intensification.
  12: A heightened nearshore intensification rate implies a potential strengthening
    of landfalling TCs' destructive capacity.
Evaluation overview:
  2: The study examines observed changes in nearshore tropical cyclone (TC) intensification
    and the large-scale environment over a historical period and projects future changes
    using climate model simulations.
  3: TC intensification rate
  4: The page provides an overview of tropical cyclone (TC) intensification rates
    as a direct climate impact.
  5: No relevant information
  7: No relevant information
  8: No relevant information
  10: No relevant information
  12: Economic losses, fatalities, and property damages are likely to be more substantial
    during the late 21st century due to TCs.
Highlights:
  1: Nearshore tropical cyclone intensification will continue to rise under global
    warming, primarily due to projected decreases in vertical wind shear.
  2: The study indicates a rise in TC rapid intensification events and projects future
    changes based on climate models, highlighting coastal regions experiencing stronger
    intensification effects.
  4: Noticeable increase in nearshore TC intensification rates from 1979-1999 to 2000-2020
    period.
  5: Nearshore TC intensification rates have increased significantly, particularly
    along the US East and Gulf coasts.
  6: The large-scale environment has become more favorable for storm development in
    the nearshore region compared to the offshore region.
  7: "There has been a significant rise in the average intensification rate of nearshore\
    \ TCs on a global scale during 1979\u20132020."
  8: Probability distributions of TC intensification rates suggest that nearshore
    TCs will strengthen faster in the future climate. Increases in mean intensification
    rate in all coastal areas except near the west coast of Mexico and the Australian
    coast; change is greater in nearshore region than offshore region where increases
    occur. Changes in nearshore TC intensification rates are insignificant for the
    Mexican west and Australian coasts.
  9: The most significant increase in TC intensification occurs in proximity to coastlines,
    and a larger increase in nearshore RH and a decrease in VWS are primarily responsible
    for the greater nearshore TC intensification.
  10: Changes in diabatic heating and basic state are dominant in shaping the spatial
    pattern of shear response over the Northern Hemisphere, whereas the contribution
    of anomalous transient forcing is small.
  12: The decrease in VWS near coastal areas plays a significant role in enhanced
    TC intensification.
Methodology:
  1: The analysis uses a suite of observations and high-resolution climate model simulations,
    along with idealized numerical experiments with an intermediate complexity model.
  2: The analysis uses TC track data from IBTrACS and ADT-HURSAT for historical period
    evaluation; climate model simulations from HighResMIP and CMIP6's ScenarioMIP
    are used for future projections, with a focus on rapid intensification rates and
    environmental trends.
  3: 'Uses the Stationary Wave Model (SWM) to conduct numerical sensitivity experiments.
    TC intensification rate is estimated as the linear regression coefficient of the
    storm maximum wind speed over five successive 6-hr track locations. Monte Carlo
    method of repeated random sampling is used to estimate uncertainty. Considers
    two periods: near-future (2015-2034) and late 21st century (2081-2100).'
  4: Analysis compares nearshore TC intensification rates using satellite data from
    1979-2020 with Student's t-test and Monte Carlo error estimation.
  5: Used TC track data from IBTrACS and analyzed changes in mean intensification
    rates; tested statistical significance with Student's t-test.
  6: The analysis uses SST data from Hadley Center and atmospheric data from NCEP-DOE
    II reanalysis, averaged over specific months corresponding to storm seasons in
    both hemispheres.
  7: Trends in SST, vertical wind shear, and relative humidity are analyzed from 1979-2020,
    averaged over June-October in the Northern Hemisphere and December-April in the
    Southern Hemisphere, using Hadley SST and NCEP-DOE II atmospheric reanalysis data.
    TC intensification changes are computed based on simulations from HighResMIP.
  8: "TC track data from five fully coupled climate models belonging to HighResMIP.\
    \ Historical period: 1979\u20132014; future period: 2015\u20132050; SSP585 emissions\
    \ scenario. TC track data is subsampled to ensure statistically similar distributions\
    \ of TC initial intensity and translation speed. A distance threshold of ~3\xB0\
    \ identifies \u201Cnearshore\u201D regions."
  9: "Analysis is based on multi-model ensemble mean trends using HighResMIP models\
    \ and CMIP6 models, comparing historical simulations (1979\u20132014) and future\
    \ projections (2015\u20132050) under the SSP585 emissions scenario."
  10: The analysis uses 15 CMIP6 models under the SSP585 emissions scenario for the
    near-future (2015-2034) and late 21st century (2081-2100) periods. It also uses
    a Stationary Wave Model (SWM) to decompose the effects of anomalous heating, zonal-mean
    basic state, and transient forcing on VWS changes. Statistical significance is
    determined using a Student's t-test at the 95% level.
  12: The analysis is based are IBTraCSTC track data, ADT-HURSAT TC track data, HadleySST
    data, NCEP-DOE II reanalysis, ERA5 reanalysis, HighResMIPTC track data and CMIP6
    data. SWM simulations are used.
More Notes:
  3: "The SWM model has a horizontal resolution of roughly 2.25\xB0latitude \xD7 3.75\xB0\
    longitude and 24 vertical sigma layers. Synoptic eddies cannot be explicitly simulated\
    \ by the SWM, and their aggregated effects are considered as a fixed forcing term."
  4: Data are sub-sampled to ensure similar storm state distributions for both periods,
    focusing on changes in global nearshore TC intensification.
  5: Results are robust across different data sets, including homogenized satellite
    data.
  7: HighResMIP models simulate weaker changes in TC intensity compared to best track
    data, and are therefore only used for a qualitative assessment.
  8: "The mean intensification rate is weaker in HighResMIP relative to observations,\
    \ likely because of limitations simulating intense storms. The provided intensification\
    \ rates are not for direct comparison with observations. Locations where the intensity\
    \ of the TC is below \u201CTropical Storm\u201D strength (34kt) are excluded."
  10: The SWM overestimates the shear increase in the central-to-eastern tropical
    Pacific and northern Eurasia but reasonably reproduces the overall spatial pattern
    of VWS changes, particularly over the coastal areas characterized by decreasing
    VWS.
  12: The study only considered coastlines of major continental landmasses affected
    by TCs as 'nearshore.'
Quantitative material:
  1: Observations reveal a global mean tropical cyclone intensification rate increase
    of about 3 kt per 24-hour in regions close to the coast over the period 1979-2020.
  3: "Nearshore is defined as a distance within approximately 3\xB0 or about 200 nautical\
    \ miles of the coastline. Nearshore TC track locations are identified using the\
    \ following thresholds: d\u22643.0\xB0, 35kt\u2264w\u226475kt, 3ms\u207B\xB9\u2264\
    t\u226410ms\u207B\xB9. SWM simulations are run for 100 days, and the average from\
    \ days 31 to 100 is presented."
  4: Probability distributions and average intensification rates for 1979-1999 and
    2000-2020, with a statistically significant difference (p-value = 0.04).
  5: "The nearshore intensification rate increased to 1.15 kt 6-hr\u207B\xB9 from\
    \ 0.37 kt 6-hr\u207B\xB9 over the 1979\u20132020 period; regional variations show\
    \ larger increases nearshore than offshore."
  6: Nearshore VWS trend is -0.026 m/s per year and offshore VWS trend is -0.011 m/s
    per year; nearshore RH trend is 0.057% per year.
  7: "Coastal SST increased at 0.014 \xB0C per year (p=0.00) from 1979-2020; Offshore\
    \ SST increased at 0.006 \xB0C per year (p=0.00); Coastal wind shear decreased\
    \ at -0.026 m/s per year (p=0.00); Offshore wind shear decreased at -0.013 m/s\
    \ per year (p=0.03); Coastal relative humidity increased at 0.057% per year (p=0.00);\
    \ Offshore relative humidity increased at 0.011% per year (p=0.37)."
  8: Mean TC intensification rate for 1979-2014 is -0.07 kt 6-hr-1; increases to 0.03
    kt 6-hr-1 for 2015-2050.
  9: "The projected changes in mean nearshore and offshore tropical cyclone (TC) intensification\
    \ rates for various coastlines over 1979\u20132050 are presented, with statistically\
    \ significant increases in certain regions."
  10: "The pattern correlation coefficient of VWS changes between the CMIP6 ensemble\
    \ mean and the SWM's solution is 0.63 over the northern tropical-extratropical\
    \ (0\xB0\u201360\xB0N) oceans."
  12: Mean nearshore TC intensification rate may also have increased for Philippines
    and Madagascar (Figure S12 in Supporting Information S1).
sourcematerial:
  1: "yaml\nDrivers of Risk: \"Analysis of the observed large\u2010scale environment\
    \ shows that stronger decreases in vertical wind shear and larger increases in\
    \ relative humidity relative to the open oceans are responsible.\"\nQuantitative\
    \ material: \"Over the historical period 1979\u20132020, observations reveal a\
    \ global mean TC intensification rate increase of about 3 kt per 24\u2010hr in\
    \ regions close to the coast.\"\nMethodology: \"Here, we address this using a\
    \ suite of observations and numerical model simulations. Further, high\u2010resolution\
    \ climate model simulations suggest that nearshore TC intensification will continue\
    \ to rise under global warming. Idealized numerical experiments with an intermediate\
    \ complexity model reveal that decreasing shear near coastlines, driven by amplified\
    \ warming in the upper troposphere and changes in heating patterns, is the major\
    \ pathway for these projected increases in nearshore TC intensification.\"\nHighlights:\
    \ \"Further, high\u2010resolution climate models, which explicitly resolve TCs,\
    \ suggest that nearshore TC intensification will continue to increase in future.\
    \ These increases in coastal TC intensification rates can mainly be attributed\
    \ to stronger projected decreases in vertical wind shear.\"\n"
  2: "Source material here. TCs that undergo rapid intensification shortly before\
    \ landfall pose a major threat to coastal communities, and theory suggests such\
    \ events are expected to become more frequent and severe as the climate continues\
    \ to warm. In this study, we examine observed changes in nearshore TC intensification\
    \ and the large\u2010scale environment over the historical period, project changes\
    \ into the future using climate model simulations and delve into the responsible\
    \ mechanisms using idealized numerical model experiments. TC track data obtained\
    \ from the International Best Track Archive for Climate Stewardship (IBTrACS)\
    \ are used to estimate 24\u2010hr TC intensification rates for the 42\u2010year\
    \ period 1979\u20132020. Similarly, TC track data based on the Advanced Dvorak\
    \ Technique\u2010Hurricane Satellite record (ADT\u2010HURSAT) are also used to\
    \ compute TC intensification rates and validate the signal based on IBTrACS. TC\
    \ track data are obtained for five fully coupled climate models belonging to the\
    \ High Resolution Model Intercomparison Project (HighResMIP) and used to compute\
    \ projected changes in TC intensification rates. Tracks from the \u201Chist\u2010\
    1950\u201D simulations covering the 36\u2010year period 1979\u20132014, and tracks\
    \ from the \u201Chighres\u2010future\u201D simulations covering the 36\u2010year\
    \ period 2015\u20132050 are used. Furthermore, monthly mean data from 15 climate\
    \ models, which are part of the Scenario Model Intercomparison Project (ScenarioMIP)\u2014\
    a subset of the Coupled Model Intercomparison Project phase 6 (CMIP6), are utilized\
    \ to project future trends in VWS. This data is assessed for the 86\u2010year\
    \ time frame from 2015 to 2100, considering the \u201CSSP585\u201D emissions scenario.\
    \ The study indicates a rise in TC rapid intensification events and projects future\
    \ changes based on climate models, highlighting coastal regions experiencing stronger\
    \ intensification effects."
