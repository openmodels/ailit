  2: 'yaml

    Evaluation overview: "The study estimates the overall impact of global warming
    on adult obesity."

    Drivers of Risk: "Global warming could affect calorie intake by altering incomes,
    food prices, and consumption preferences, and could impact calorie expenditure
    by altering working hours, physical activity levels, and minimum calorie requirements."

    Methodology: "The analysis employs a panel model using data from 1975 to 2016
    for 152 countries, relying on year-to-year temperature fluctuations to identify
    the causal effect of warming on obesity."

    '
  3: "Source material here: The impact of global warming on obesity. The estimates\
    \ suggest that global warming significantly increased obesity rates...The marginal\
    \ effect on obesity of a 1 \u25E6 C increase in temperature. Global warming will\
    \ increase the number of obese adults worldwide by 89.9 million from 2016 to 2050.\
    \ The marginal effect on obesity of a 1 \u25E6 C increase in temperature ranged\
    \ from \u2212 0.56 to 1.87% across the 152 countries, with a population-weighted\
    \ average of 1.06%. Global warming could lead to an economic loss of US $276.6\
    \ billion by contributing to the rise of obesity worldwide. We employ four alternative\
    \ model settings to validate the estimated effect pattern of global warming on\
    \ obesity. To infer the effect of long-term adaptation, we also estimate a \u201C\
    long-difference\u201D model. The estimates suggest that global warming significantly\
    \ increased obesity rates in countries within temperate zones while reducing obesity\
    \ only in tropical countries. However, the long-term model suggests a larger,\
    \ rather than smaller, impact of warming on obesity in temperate zones, indicating\
    \ that adaptation cannot significantly offset the impact of warming on obesity.\
    \ Furthermore, we endeavor to explain the estimated impact of global warming on\
    \ obesity by examining six potential channels: income, food prices, minimum calorie\
    \ requirements, working hours, physical activity, and consumption preferences."
  4: 'Our findings suggest that obesity is an important pathway through which global
    warming can detrimentally affect human capital and economic outcomes. A substantial
    body of research indicates that obesity can have adverse effects such as diminishing
    physical and mental health, elevating the risk of premature death, impairing academic
    performance, impeding the development of socioemotional skills, limiting labor
    market opportunities, decreasing wages, increasing medical costs, and imposing
    other social burdens. By combining these findings with our estimated impact of
    global warming on obesity, it becomes evident that global warming could significantly
    reduce human capital and economic outcomes by increasing obesity.


    Our study differs from Trentinaglia et al. (2021) in at least four major aspects.
    First, we examine the effect of global warming on obesity (defined as a BMI exceeding
    30 kg/m2), while they focused on the effect of global warming on BMI... Second,
    we are able to identify both the short-run and long-run effects of warming based
    on different model settings, while they only examined the short-run effects...
    Finally, our study additionally examines the potential channels through which
    global warming affects obesity. To the best of our knowledge, our study is the
    first to directly examine the overall impact of warming on obesity based on long-run
    global data and to evaluate the potential of long-run adaptation in offsetting
    this impact.'
