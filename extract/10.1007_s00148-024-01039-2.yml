  9: "yaml\nEvaluation overview: \"The impact of global warming on obesity\"\nDrivers\
    \ of Risk: \"The baseline model captures the nonlinear effect of temperature through\
    \ the temperature polynomial...In robustness checks, we also measure temperature\
    \ using temperature bins, within-year temperature variation, seasonal mean temperature,\
    \ and positive temperature shocks.\" and \"...long-term temperature trends...\"\
    \nQuantitative material: Equation (5) and (6) are presented.\nMethodology: \"\
    The baseline model (1) primarily captures the short-run impact because it relies\
    \ on year-to-year temperature \uFB02uctuations to estimate the effect...To address\
    \ this concern, we follow the literature...in estimating a \u201Clong-difference\u201D\
    \ model that captures the long-run impact using long-term temperature trends.\"\
    \nHighlights: \"This model setting offers greater \uFB02exibility compared to\
    \ models that utilize a quadratic (e.g., Deschenes and Greenstone 2007) or piecewise\
    \ (e.g., Burke and Emerick 2016) temperature measure...As individuals have suf\uFB01\
    cient time to adapt to long-term temperature trends, the long-run model is better\
    \ suited to capture the bene\uFB01ts of adaptation.\"\n"
