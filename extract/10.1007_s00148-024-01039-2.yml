Highlights:
  1: Global warming has significantly increased obesity rates in countries located
    in temperate zones, while only causing a reduction in a small number of tropical
    countries.
  3: Global warming significantly increased obesity rates in temperate zones while
    reducing obesity in tropical countries. Adaptation cannot significantly offset
    the impact of warming on obesity.
  4: Global warming could detrimentally impact economic outcomes by increasing obesity,
    which has adverse effects on physical and mental health, labor market opportunities,
    wages, and other social burdens.
  6: No relevant information
  9: The study compares different modeling approaches for capturing the impact of
    temperature, including quadratic, piecewise, and temperature bin methods. It also
    addresses the potential for adaptation to long-term temperature trends.
  10: Warming has a significantly positive impact on the adult obesity rate.
  11: "The study finds a significant impact of temperature on obesity rates, with\
    \ positive effects in most countries but a reducing effect in tropical countries\
    \ with annual mean temperatures above 27\xB0C."
  13: The estimated effect on obesity remains relatively consistent across different
    robustness checks, suggesting a stable relationship between temperature and obesity.
  14: Temperature has a statistically significant impact on GDP per capita across
    different regions (Asia, Europe, Mediterranean, Eastern Americas). Effects are
    moderated by factors like GDP, schooling, and gender.
  15: GDP per capita reduces warming's impact on obesity in wealthier countries, whereas
    an older population and higher average schooling both increase the impact.
  16: Warming's effect on male obesity is roughly one-third larger than on female
    obesity.
  17: Males are more exposed to the impact of global warming on obesity. The impact
    on Africa and the Americas is smaller than the global average, while the impact
    on the Eastern Mediterranean and Asia is larger.
  18: Warming in high-temperature seasons significantly increases obesity, while low-temperature
    season warming has negligible effects.
  19: Higher temperatures and increased seasonal mean temperatures are associated
    with an increase in obesity rates.
  20: Warming of high-temperature seasons significantly raises obesity rates. The
    effect of temperature variation on obesity first increases with variation and
    then levels off at very high variation.
  21: Positive temperature shocks initially enhance and then reduce the adult obesity
    rate, consistent with the effect pattern of annual mean temperature.
  22: Global warming can influence calorie intake and expenditure which impacts obesity.
  23: Global warming tends to reduce income and increase food prices. Lower real income
    tends to reduce obesity in tropical zones but may increase it in temperate zones
    due to a shift towards cheaper, less healthy foods. Global warming may increase
    obesity through consumption preferences, reduced working hours, reduced physical
    activity, and lower minimum calorie requirements. Warming reduces the minimum
    calorie demand.
  24: Warming affects minimum calorie requirements, physical exercise, and calorie/fat
    intake. Minimum calorie demand and calorie/fat intake show a U-shaped relationship
    with temperature. Physical exercise generally decreases as temperature increases.
  25: Higher temperatures initially increase and then reduce obesity, with differences
    in estimated threshold temperatures between short-run and long-run models.
  26: Global warming is predicted to increase obesity in many countries, especially
    under a short-run model. The study estimates a significant increase in the number
    of obese individuals globally and a substantial economic loss due to this increase.
  27: The average impact of warming on obesity is an increase of 2.1 percentage points
    in temperate zones and a decrease of 2.8 percentage points in subtropical and
    tropical zones.
  28: Long-term adaptation may not significantly reduce the impact of global warming
    on obesity. The long-run model predicts a more positive impact on obesity in temperate
    zones but a more negative impact in subtropical and tropical zones.
  29: Global warming significantly increased obesity in most countries, except for
    a small number of tropical countries; long-term adaptation may not significantly
    mitigate the impact of global warming on obesity in temperate zones; substantial
    heterogeneity in the impact across countries with varying income levels, age structures,
    and education levels.
Methodology:
  2: The analysis employs a panel model using data from 1975 to 2016 for 152 countries,
    relying on year-to-year temperature fluctuations to identify the causal effect
    of warming on obesity.
  3: The study employs four alternative model settings to validate the estimated effect
    pattern of global warming on obesity, including a third-degree temperature polynomial,
    temperature bins, seasonal mean temperature, temperature variation, and temperature
    shocks. A 'long-difference' model is also used to infer the effect of long-term
    adaptation, relying on long-term temperature trends.
  4: The study identifies both short-run and long-run effects of global warming on
    obesity through different model settings and evaluates the extent of long-run
    adaptation in offsetting this impact using long-run global data.
  5: Analysis uses data from 1975 to 2016 for 152 countries, with climate data obtained
    from the Climatic Research Unit, using population-weighted averages for climate
    measures.
  6: Utilizes multi-model ensemble climate projections from the Coupled Model Intercomparison
    Project Phase 6 (CMIP6).
  7: The analysis uses a fixed effects panel model to compare the same country over
    time, estimating the causal effect of warming based on inter-annual temperature
    fluctuations. The baseline model includes country fixed effects, a polynomial
    of annual mean temperature, control variables, and country-specific time trends.
    The analysis focuses on climate change predictions from 2016 to 2050.
  8: Uses a country fixed effects model to identify the causal effect of temperature
    on obesity using year-to-year temperature fluctuations. A baseline model employs
    a J-degree temperature polynomial. Investigates the interaction between income
    (log GDP per capita) and the temperature polynomial to see how the effect of warming
    on obesity varies across countries with different incomes.
  10: "Compares a short-run model (year-to-year temperature variations) to a long-run\
    \ model (30-year temperature trends) from 1975 to 2016 for 152 countries. Uses\
    \ a long difference approach, calculating the difference between temperature averages\
    \ from 1945\u20131975 to 2016 to represent long-term temperature variation."
  11: The analysis uses different polynomial regression models to assess the relationship
    between temperature and obesity, with an additional model incorporating GDP as
    a moderating factor.
  13: Regression analysis with various controls (carbon emissions, crude death rate,
    year fixed effects) and population weighting methods. The robustness checks assess
    the sensitivity of the baseline estimates to different model specifications.
  14: Uses regression analysis with country observations and R-squared values reported.
    Includes interaction terms and considers heterogeneity. Mentions variables like
    Log of Adult GDP per capita, schooling and baseline adult age. The analysis spans
    from 1975.
  15: The analysis uses a linear model with country fixed effects and a vector of
    control variables, investigating moderating variables such as log GDP per capita,
    adult average age, and adult average years of schooling with their 1975 values.
  17: Regression analysis using temperature bins and country fixed effects, excluding
    regions to assess regional importance.
  18: Analysis involves a model with temperature bins and seasonal rankings based
    on country-specific monthly temperatures.
  19: The analysis uses models to estimate the effects of temperature across bins
    and seasons, with error terms clustered at the country level to account for variability.
  20: The analysis uses country fixed effects and a regression model to analyze the
    impact of seasonal temperatures and within-year temperature variation on obesity
    rates. The seasonal model uses a definition of four seasons, assuming temperature
    increases from season 1 to season 4. Temperature variation is calculated as the
    square root of the average of the squared differences between monthly mean temperatures
    and annual mean temperature.
  21: Uses a regression model (Eq. 13) to estimate the impact of positive temperature
    shocks on obesity.  Temperature shocks are defined as months exceeding one standard
    deviation above the long-run average for that month. A third-degree polynomial
    of the temperature shock measure is used in the model.
  22: "Response function of obesity to positive temperature shock is constructed based\
    \ on the estimates of \u03BBj from model (13). Positive temperature shocks are\
    \ defined as the months in each year with temperatures at least one standard deviation\
    \ above the long-run average for the same month. Confidence intervals are calculated\
    \ based on standard errors clustered at the country level."
  23: The analysis relies on findings from existing literature to infer the channels
    through which warming impacts obesity. The paper utilizes a modified version of
    a model to estimate the effects of temperature on minimum calorie demand, physical
    exercise, calorie intake, and fat intake.
  24: Uses modified versions of model (1) with different dependent variables. Employs
    both country-level and US state-level data. Long-run impact is based on model
    (6) with a third-degree temperature polynomial. Includes analysis of marginal
    effects, accounting for temperature and income interactions.
  25: Analysis is based on a long-run model using a third-degree temperature polynomial,
    with results applicable over a 30-year temperature trend.
  26: The predicted country-level impact of global warming on obesity by the year
    2050 is generated by combining the estimated country-level marginal effects with
    the projected temperature changes for each country from 2016 to 2050. This involves
    estimating nonlinear marginal effects of temperature on obesity, combining these
    effects with the mean temperature of each country to calculate the country-level
    marginal effect, and then multiplying the country-level marginal effects with
    the predicted warming in each country.
  27: Predicted impacts are based on estimated marginal effects combined with projected
    warming using the intermediate emissions scenario SSP2-4.5, focusing on short-run
    and long-run effects.
  28: The analysis compares short-run and long-run models to estimate the impact of
    global warming on obesity, accounting for adaptation, income changes, and cumulative
    effects over time. The difference between the two models is used to reflect the
    effect of adaptation.
  29: Estimates the causal effect of global warming on obesity using plausibly exogenous
    year-to-year temperature fluctuations; long-difference model used to infer long-term
    adaptation.
More Notes:
  1: Long-term adaptation may not significantly mitigate the impact of global warming
    on obesity in temperate zones.
  3: 'The study examines six potential channels through which warming impacts obesity:
    income, food prices, minimum calorie requirements, working hours, physical activity,
    and consumption preferences. The economic loss associated with global warming''s
    contribution to obesity could be US $276.6 billion.'
  6: Figure 1 shows the adult obesity rate in 1975 and 2016 in countries with varying
    income levels, with a positive correlation between GDP per capita and obesity
    rates. Figure 2 shows the distribution of the annual mean temperature across 152
    sampled countries, averaged from 1975 to 2016.
  10: 'The paper infers the effect of adaptation by comparing estimates from the short-run
    and long-run models. The baseline model uses a third-degree temperature polynomial. '
  13: The study explores the heterogeneity of the impact concerning income level,
    age structure, education level, gender, and geographic region (though the specifics
    are on subsequent pages). Within-country population migration has a minor effect
    on the estimated relationship.
  14: The page provides specific coefficients and standard errors from a regression
    model, which allows for a relatively detailed quantitative assessment of the relationship
    between temperature and GDP per capita.The column names are difficult to read.
  16: Countries with higher education levels experience a 0.25 percentage point higher
    marginal effect of warming on obesity.
  17: The study uses alternative temperature measures beyond average temperature to
    capture nonlinear effects and within-year variation.
  21: Analysis uses country-level clustered standard errors. The temperature shock
    measure ranges from 0 to 12.
  22: Macro-level factors such as changes in birth rates, death rates, and migration
    patterns also influence the overall obesity rate of society.
  24: The analysis distinguishes between short-run and long-run impacts and uses appendix
    tables (A.3, A.7) for variable definitions and point estimates.
  26: Analysis uses both a 'short-run' and 'long-run' model to predict impacts, with
    differing results. Appendices contain figures showing the predicted warming and
    impacts under different emissions scenarios.
  28: The paper suggests that the cumulative effect of warming outweighs the effect
    of adaptation in temperate zones, while reduced income in subtropical and tropical
    zones likely leads to long-term consumption changes affecting obesity. The finding
    that long-term adaptation may not significantly mitigate the impact of global
    warming on obesity calls for a more active role of the public sector.
  29: Study limitations include the lack of long-term sub-country data on obesity
    and a focus only on obesity, not other BMI categories.
Quantitative material:
  1: "A 1 \xB0C increase in the annual mean temperature would result in a worldwide\
    \ increase in obese adults of 79.7 million, or 12.3%."
  3: "Global warming will increase the number of obese adults worldwide by 89.9 million\
    \ from 2016 to 2050. A 1\xB0C increase in temperature ranged from -0.56 to 1.87%\
    \ across the 152 countries, with a population-weighted average of 1.06%."
  5: The paper includes a figure showing that the adult obesity rate significantly
    increased from 1975 to 2016 across 152 countries.
  6: Analysis uses multi-model ensemble climate projections.
  7: "The model estimates coefficients (\u03B1j and \u03B4) representing the causal\
    \ effect of temperature and control variables on obesity."
  8: Presents a formula (Z = sum(alpha_j * tem^j)) to illustrate the nonlinear effect
    of temperature on obesity.
  9: The page presents two regression equations (5 and 6) that model the relationship
    between temperature, income, and the outcome variable (presumably related to obesity).
  10: "The temperature coefficient \u03B1\u2032j is estimated."
  11: "Panel A of Fig. 4 shows a significantly positive impact of warming on adult\
    \ obesity rates for most countries, except for tropical countries with temperatures\
    \ above 27\xB0C, where it has a reducing effect."
  13: Graphs showing the relationship between annual mean temperature and obesity
    rate under different control scenarios.
  14: 'Provides coefficients and standard errors for regressions, including effects
    of temperature, temperature squared, and interactions on GDP per capita. Example:
    Asia 0.753***[0.121]'
  15: A one-unit increase in log GDP per capita reduces the impact of warming on obesity
    by 0.202 percentage points; a 1-year increase in adult average age raises it by
    0.026 percentage points; a 1-year increase in average schooling increases it by
    0.019 percentage points.
  16: "A 1\xB0C increase in annual mean temperature increases male obesity by 1.28\
    \ percentage points."
  17: Global warming increases the female obesity rate by 0.81 percentage points.
  18: Separate regression results showing coefficients for seasons 1 to 4 as -0.19,
    0.04, 0.70, and 0.82, respectively.
  19: Quantitative information is presented via a graph showing the marginal effect
    of temperature bins and seasonal temperatures on obesity rates in percentage points.
  20: The analysis uses a third-degree polynomial of temperature variation in a regression
    model to estimate the effect on obesity.
  21: "Presents response function of obesity to temperature variation. Temperature\
    \ variation defined according to Eq. (11). 95% confidence intervals are provided,\
    \ clustered at the country level. Figure 10 presents the response function of\
    \ obesity to positive temperature shocks, calculated based on the estimates of\
    \ \u03BBj from model (13)."
  22: Figure 10 shows that as the number of months with positive temperature shocks
    increases, the obesity rate tends to increase.
  24: Graphs showing the relationship between annual mean temperature and minimum
    calorie demand, physical exercise index, per capita calorie intake, and per capita
    fat intake.
  25: "The paper provides threshold temperatures where obesity rates first increase\
    \ and then decrease: 18.5\xB0C in the long-run model and 27.3\xB0C in the short-run\
    \ model."
  26: Short-run model predicts global warming will increase obesity in the majority
    of countries. 77 countries are expected to experience an impact greater than 1
    percentage point, 41 with an impact exceeding 2 percentage points, and 7 with
    an impact surpassing 3 percentage points. The population-weighted average impact
    of warming on obesity across 152 sample countries is 1.2 percentage points, which
    is statistically significant compared to the global obesity rate of 17.8% in 2016.
    Global warming will increase the number of obese individuals worldwide by 89.9
    million from 2016 to 2050, resulting in an economic loss of approximately $276.6
    billion. Long-run model indicates that global warming is likely to increase obesity
    in most countries from temperate zones while reducing obesity in most countries
    from subtropical and tropical zones.
  27: Global warming could result in 76.8 million more obese individuals in temperate
    zones and 106.9 million fewer obese individuals in subtropical and tropical zones.
  29: "A 1\xB0C rise in annual mean temperature would increase the number of obese\
    \ adults worldwide by 12.3%."
