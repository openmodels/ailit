    \ predicted warming, panel A of Fig. 14 presents the estimated short-run impact\
    \ of global warming. Likewise, by combining the estimated country-speci\uFB01\
    c marginal effects of warming based on the long-run model with the country-level\
    \ predicted warming, panel B of Fig. 14 presents the estimated long-run impact\
    \ of global warming. Finally, the difference between the estimated long-run and\
    \ short-run impacts, as reported in panel C of Fig. 14, captures the potential\
    \ for adaptation. However, besides adaptation, there are two other important determinants\
    \ of the difference between the short-run and long-run models. The first factor\
    \ is the variation in the impact due to income. Global warming tends to reduce\
    \ income in countries from the tropical and temperate zones (Dell et al. 2012;\
    \ Burke et al. 2015). Lower income may have a limited impact on obesity in the\
    \ short run if individuals can smooth consumption by using savings and borrowing.\
    \ However, lower income is likely to reduce obesity in poor countries in the long\
    \ run when consumption smoothing is infeasible. The second factor is the cumulative\
    \ effect over time. If the impact of warming on obesity accumulates over time,\
    \ the long-run impact could be larger than the short-run impact. Now we are prepared\
    \ to interpret the difference in the predicted impacts between the short-run and\
    \ long-run models. Panel C of Fig. 14 presents the contrast between the estimates\
    \ in panels A and B. It reveals that the long-run model predicts a more positive\
    \ impact in temperate zones but a more negative impact in subtropical and tropical\
    \ zones. This \uFB01nding suggests that long-term adaptation does not signi\uFB01\
    cantly reduce the impact of warming on obesity. If adaptation had a substantial\
    \ effect in reducing obesity, we would expect to observe a smaller positive impact\
    \ in temperate zones, not a larger one. The greater positive impact in temperate\
    \ zones suggests that the cumulative effect over time outweighs the effect of\
    \ adaptation. Conversely, the more negative impact in subtropical and tropical\
    \ zones likely re\uFB02ects that warming reduces income and, consequently, long-term\
    \ consumption in these economically disadvantaged areas. The \uFB01nding that\
    \ long-term adaptation may not signi\uFB01cantly mitigate the impact of global\
    \ warming on obesity calls for a more active role of the public sector in addressing\
    \ the effect of global warming on obesity through the channels highlighted in\
    \ Fig. 11. 5 Concluding remarks While obesity represents one of the most signi\uFB01\
