  23: Global warming tends to reduce income and increase food prices. In poorer countries
    in tropical zones, lower real income tends to reduce obesity by limiting consumption.
    In contrast, in wealthier countries located in temperate zones, lower real income
    often leads to an increase in obesity. Existing studies suggest that global warming
    is likely to increase obesity through the latter four channels, namely, consumption
    preferences, working hours, physical activity, and minimum calorie requirements.
    Since identifying the specific channels through which warming impacts obesity
    is beyond the scope of this study, we rely primarily on findings from existing
    literature to infer these channels. We utilize a modified version of model (1)
    to estimate the effects of temperature on minimum calorie demand, physical exercise,
    calorie intake, and fat intake. Consistent with the literature, we observe that
    warming reduces the minimum calorie demand.
