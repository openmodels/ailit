  29: "The impact of global warming on obesity, subsequently impacting human capital\
    \ and economic performance. Our study aims to address this gap in the literature.\
    \ We estimate the causal effect of global warming on obesity using plausibly exogenous\
    \ year-to-year temperature fluctuations. The estimates suggest that global warming\
    \ significantly increased obesity in most countries, with the exception of a small\
    \ number of tropical countries. We estimate that a 1\xB0C rise in annual mean\
    \ temperature would increase the number of obese adults worldwide by 12.3%. Moreover,\
    \ we identify substantial heterogeneity in the impact across countries in various\
    \ regions and with differing income levels, age structures, and education levels.\
    \ Finally, we infer the effect of long-term adaptation by comparing the baseline\
    \ model with a long-difference model. Our findings indicate that long-term adaptation\
    \ may not significantly mitigate the impact of global warming on obesity in temperate\
    \ zones. We conclude by highlighting two limitations of this study. First, due\
    \ to the lack of long-term sub-country data on obesity for most countries, we\
    \ are unable to provide a within-country analysis with a reasonably large sample\
    \ size... this study focuses explicitly on the effect of global warming on obesity."
