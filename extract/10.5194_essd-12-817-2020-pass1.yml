    total asset value and GDP per country into grid cell level asset exposure and
    GDP.
  4: This paper develops a gridded asset exposure dataset by disaggregating national
    wealth data. It utilizes gridded nightlights and population data to disaggregate
    produced capital, non-financial wealth (estimated from GDP and GDP-to-wealth ratio),
    and GDP itself. It also discusses the use of subnational GRP data to improve downscaling
    GDP in countries with regional economic differences.
