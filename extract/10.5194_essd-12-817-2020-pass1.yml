  6: "Source material here.\nQuantitative material: \"Total asset values in the dataset\
    \ sum up to 2.51\xD710^14 (251 trillion) current US dollars in 2014. The 140 countries\
    \ with produced capital data used as total asset value contribute USD 245 trillion\
    \ (97.6%) to the total asset exposure. The remaining 84 countries where asset\
    \ values were estimated from GDP and a GDP-to-wealth ratio instead contribute\
    \ the remaining USD 6 trillion.\"\n\nMethodology: \"We applied the LitPop methodology\
    \ with the exponents m=n=1 to compute gridded asset exposure data for 224 countries\
    \ and areas worldwide... To assess the disaggregation skill per country, three\
    \ skill metrics are computed from nGRP. The Pearson correlation coefficient rho\
    \ (Eq. 4) is computed... The slope of the linear regression conveys... Together,\
    \ rho and beta allow for an evaluation of the linear fit between modeled and reference\
    \ data... the root-mean-squared fraction (RMSF) is a relative error metric.\"\n\
    \nHighlights: \"For rho (Fig. 3a), Lit1Pop1 shows the best overall median of rho\
    \ (0.94) with the lowest interquartile range (IQR) of 0.09.\"\n"
  7: "\nMethodology: \"To obtain this dataset, national total asset values were disaggregated\
    \ proportional to the distribution of Lit1Pop1 for 224 countries and areas.\"\n\
    Methodology: \"The IQR is used here as a measure of variability of the skill metrics,\
    \ as it signifies the difference between the 25th and the 75th percentiles of\
    \ the resulting skill metric.\"\nMethodology: \"Based on the comparison of the\
    \ disaggregation skill with varying exponents m and n, there are two candidates\
    \ for the most adequate functionality: Lit1Pop1 (best \u03C1 and \u03B2) and Lit4\
    \ (best RMSF and best performance for n=0).\"\nQuantitative material: \"The IQR\
    \ is used here as a measure of variability of the skill metrics, as it signifies\
    \ the difference between the 25th and the 75th percentiles of the resulting skill\
    \ metric. The same holds for \u03B2 of Lit1Pop1 (median=1.03, IQR=0.12, Fig. 3b).\
    \ In contrast, \u03B2 is on average well below 1 for combinations exclusively\
    \ based on Lit (i.e., Litm).\"\nHighlights: \"Prioritizing a better distribution\
    \ of total values over relative performance, we conclude that Lit1Pop1 can be\
    \ considered the most adequate combination of Lit and Pop for the subnational\
    \ downscaling of GDP.\"\nHighlights: \"A value of \u03B2 below 1 indicates an\
    \ underestimation of the GRP of regions with relatively large GRP and an overestimation\
    \ of smaller regions. This can possibly be attributed to the saturation problem\
    \ of nightlight intensity data, given that large regions with relatively large\
    \ GRP usually accommodate more metropolitan areas where saturation occurs the\
    \ most.\"\nHighlights: \"The general exposure value level in the metropolitan\
    \ areas shown in Fig. 4 are largest for Lit1Pop1 (Fig. 4c), highlighting a larger\
    \ concentration of values in urban areas with this approach.\"\nDrivers of Risk:\
    \ \"Saturation and blooming in nightlight intensity data cause disaggregation\
    \ based on nightlights alone to misrepresent actual value distribution, especially\
    \ in urban areas.\"\n"
  8: "The skill metrics for the subnational disaggregation of GDP in the country Mexico\
    \ show low values of \u03C1 compared to most other countries for all tested values\
    \ of m and n... The disaggregation of GDP underestimates nGRP for the Mexico City\
    \ district while overestimating the value for M\xE9xico for all evaluated combinations\
    \ of m and n... modeled nGRP values of 11.2% (m=1) to 17.6% (m=5) for Litm, 20.8%\
    \ for Pop1, and 26.5% for Lit1Pop1... The last agreeing well with a combined reference\
    \ nGRP of 26.1%... The LitPop methodology allows for the creation of globally\
    \ consistent and spatially highly resolved estimates of gridded asset exposure\
    \ value. It disaggregates GDP using nightlight intensity and population data.\""
