    exposure data, distributing national GDP to subnational regions, and evaluated
    using Pearson correlation coefficient, slope, and root-mean-squared fraction (RMSF)
    metrics.
  7: Different combinations of nightlight and population data are explored to find
    the best disaggregation approach for representing gross regional product distribution.
