Quantitative material:
  4: The study provides gridded asset exposure data for 224 countries. For 140 countries
    produced capital for 2014 was used. For an additional 87 countries, total asset
    values were set to non-financial wealth. For 59 of the 87 countries, an average
    GDP-to-wealth ratio of 1.247 was applied.
  6: The total asset values in the dataset summed up to USD 251 trillion in 2014,
    with 140 countries contributing USD 245 trillion and the remaining 84 countries
    contributing USD 6 trillion.
  7: Skill metrics used include the median, interquartile range (IQR), and recession
    mean square factor (RMSF) with figures provided for different disaggregation methods.
  8: The paper reports model and reference normalized GDP (nGRP) values, including
    underestimation and overestimation in specific Mexican districts, with combined
    model nGRP values of 11.2% to 26.5% for different methods, and a reference nGRP
    of 26.1% for Mexico City and surrounding district.
  10: Asset exposure data is produced at a resolution of 30 arcsec for 224 countries.
  12: Includes data related to the gross regional product (GRP) of 14 countries, categorized
    by World Bank income groups.
  13: "Quantitative data on correlation coefficients (\u03C1), beta coefficients (\u03B2\
    ), and RMSF values for asset exposure across various countries including the USA."
  14: "The table presents median and interquartile range (IQR) values for three skill\
    \ metrics (\u03C1, \u03B2, RMSF) comparing modeled and reference nGRP (presumably\
    \ a measure of economic activity) across 14 countries. The metrics quantify the\
    \ fit between modeled and reference data for different asset exposure proxies\
    \ (Lit1Pop1, Lit1, Lit2, Lit3, Lit4, Lit5, Pop1, Pop2, Lit2Pop1, Lit3Pop1)."
Recommendations:
  11: Future research should focus on integrating more highly resolved population
    data and other ancillary data sources as they become globally available.
Regional Application:
  11: Regional validation can help inform the choice of appropriate downscaling functionality
    for different income groups and regions.
sourcematerial:
  1: "Source material here.\nOne of the challenges in globally consistent assessments\
    \ of physical climate risks is the fact that asset exposure data are either unavailable\
    \ or restricted to single countries or regions. We introduce a global high-resolution\
    \ asset exposure dataset responding to this challenge. The data are produced using\
    \ \u201Clit population\u201D (LitPop), a globally consistent methodology to disaggregate\
    \ asset value data proportional to a combination of nightlight intensity and geographical\
    \ population data.\n\nThe comparison for 14 industrialized and newly industrialized\
    \ countries shows that the disaggregation skill for GDP using nightlights or population\
    \ data alone is not as high as using a combination of both data types. The advantages\
    \ of LitPop are global consistency, scalability, openness, replicability, and\
    \ low entry threshold. The open-source LitPop methodology and the publicly available\
    \ asset exposure data offer value for manifold use cases, including globally consistent\
    \ economic disaster risk assessments and climate change adaptation studies, especially\
    \ for larger regions, yet at considerably high resolution.\n"
  2: The core functionality of the LitPop methodology is the spatial disaggregation
    of national total asset values to obtain a gridded asset exposure product. Gridded
    nightlight intensity (Sect. 2.2) and gridded population data (Sect. 2.3) are combined
    to compute a digital number at grid cell level. Physical asset stock values (i.e.,
    produced capital, Sect. 2.4.1) are then disaggregated proportionally to the digital
    number per grid cell (Sect. 2.5). This results in the gridded asset exposure dataset
    presented here. Information on input data, methodology, and the evaluation approach
    is provided in Sect.2. Subsequently, the resulting global asset exposure data
    are presented, and evaluation results are shown in Sect. 3. The advantages and
    limitations of the methodology are discussed in Sect. 4. Please refer to Sect.
    5 for data and code availability. The methodology is published on GitHub as part
    of the open-source event-based probabilistic impact model CLIMADA (CLIMate ADAptation)
    (Aznar-Siguan and Bresch, 2019; Bresch et al., 2019a) and archived in the ETH
    Data Archive (Bresch et al., 2019b). The resulting asset exposure dataset for
    224 countries is made available online at the ETH Research Repository (Eberenz
    et al., 2019). It is suitable to provide the globally consistent asset exposure
    base for modeling physical risks.
  3: The analysis uses a combination of satellite nightlight data and gridded population
    data to compute a gridded digital number, which is then used for disaggregating
    total asset value and GDP per country into grid cell level asset exposure and
    GDP.
