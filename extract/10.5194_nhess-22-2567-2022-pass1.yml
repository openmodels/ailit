  12: "yaml\nEvaluation overview: \"From our review, it is apparent that no country\
    \ has FRM that comprehensively addresses sustainability concerns (see Table 2).\
    \ However, these tend to be challenges of an operational rather than philosophical\
    \ nature, challenging the delivery of SFRM but not the principle. That is, there\
    \ is now widespread recognition of the need to address sustainability concerns\
    \ and embed sustainability principles into FRM policy and practice.\"\nDrivers\
    \ of Risk: \"These cities all feature in the top coastal cities at risk by the\
    \ 2050s (Hallegatte et al., 2013) because of not only their rapidly growing populations\
    \ and economies and developmental pressure but also rising \uFB02ood hazards from\
    \ climate change (i.e. more frequent storms, intensive rainfall, etc.).\"\nHighlights:\
    \ \"From our review, it is apparent that no country has FRMthatcomprehensivelyaddressessustainabilityconcerns\
    \ (see Table 2)... This problem is also seen in the USA (Rosenzweig and Solecki,\
    \ 2014).\"\n"
