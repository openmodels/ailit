  6: "In the USA, large populations are located along the banks of watercourses, lakes,\
    \ and coasts. [...] Population in coastal areas such as the states of Florida,\
    \ Virginia, New York, and New Jersey on the East Coast; Mississippi in the Midwest;\
    \ and California on the West Coast. Demand for development land remains high and,\
    \ along with climate change, is likely to increase flood risk, especially in coastal\
    \ areas. [...] As a result of this, the National Flood Insurance Act was signed\
    \ into law in 1968, which had a carrot-and-stick approach with the carrot being\
    \ the provision of flood insurance in communities that regulate the development\
    \ of the 100-year floodplain. This was followed in 1977 by Executive Order 11988\
    \ Floodplain Management, issued by President Carter. [...] Notably, the federal\
    \ government sought to share the financial burden of flooding and flood protection\
    \ with state governments and local communities. [...] From the Room for the River\
    \ engineering approaches: 'Each of these practices is aimed at increasing the\
    \ river\u2019s capacity to handle excess water, thereby reducing the risk of flooding.'"
  7: "Source material here.\n- \"Even with all of this, the federal management strategy\
    \ maintained a focus on hard-engineering solutions. Eventually, an impetus to\
    \ review the approach was seen in the 1993 Mississippi River flood, which led\
    \ to the river flooding over 1200km of the river\u2019s length and about 840000km2\
    \ in area, resulting in over USD15 billion in economic damage.\"\n- \"The subsequent\
    \ Galloway Report in 1994 proposed that development in the floodplain should be\
    \ avoided unless no alternative locations existed... Floodplains should be managed\
    \ as part of the natural ecosystem, with risk-based forecasting used to inform\
    \ flood management.\"\n- \"Further, the Federal Emergency Management Agency was\
    \ established in 1979 to coordinate all of the tasks associated with emergency\
    \ management, including mitigation and the National Flood Insurance Program (NFIP).\"\
    \n- \"The programme, the world\u2019s largest national flood insurance programme,\
    \ provides short- and long-term financial assistance to residents in flood zones.\"\
    \n- \"From the mid-1990s there were improvements in practices of (i) hydrological\
    \ data collection during and after floods, (ii) development and installation of\
    \ better instruments to evaluate coastal and river flood risk... and (iii) development\
    \ of hydrologic models for more precise flood monitoring and prediction...\"\n\
    - \"Since then, among other publicly available risk information sources, the NWS\
    \ has provided river level data with maps showing potentially flooded areas through\
    \ its Advanced Hydrologic Prediction System (AHPS)... and the United States Geological\
    \ Survey (USGS) monitors river levels and discharges for thousands of rivers nationwide.\"\
    \n"
  8: "Source material here.\nThe page primarily evaluates the effectiveness of flood\
    \ risk management strategies in the US, focusing on the National Flood Insurance\
    \ Program (NFIP) and post-disaster responses: \"The NFIP aims to provide flood\
    \ protection for property owners and discourage development in substantial risk\
    \ areas...has not happened for various reasons including subsidised insurance\
    \ rates for pre-existing structures and repetitive loss claims.\"\n\nThe paper\
    \ identifies sprawling development leading to wetland loss and increased impermeable\
    \ surfaces as factors exacerbating flood risk in Houston: \"Houston has exacerbated\
    \ its flood risk through fast, sprawling development that has led to substantial\
    \ loss of wetland storage, expansion of impermeable surfaces, and lack of related\
    \ investment in flood defence infrastructure.\"\n\nApproximately 50% of properties\
    \ in the designated 100-year floodplain in the US have flood insurance: \"only\
    \ approximately 50% of properties in the designated 100-year floodplain have flood\
    \ insurance\"\n\nThe NFIP has paid more than USD51 billion in flood claims since\
    \ 1978, costing taxpayers about USD200 million annually: \"the US Government Accountability\
    \ Office reports that losses cost the taxpayers about USD200 million annually\
    \ and that since 1978, the NFIP has paid more than USD51 billion in flood claims\"\
    \n\nJapan, intensive rainfall events (> 50mmh\u2212 1) have increased in frequency\
    \ by about 50%, and those > 100mmh\u2212 1 have more than doubled: \"Over the\
    \ last 30 years, intensive rainfall events (> 50mmh\u22121) have increased in\
    \ frequency by about 50%, and those > 100mmh\u22121 have more than doubled, and\
    \ this trend is expected to continue with climate change.\"\n\nThe US has adopted\
    \ a \"mixed-options\" approach to flood risk management, but faces challenges\
    \ with preparedness, planning, and cost sharing: \"These strategic actions...indicate\
    \ the USA has adopted a 'mixed-options' approach to dealing with rising flood\
    \ risk. However, the devastating Houston flood following the 2017 Hurricane Harvey\
    \ highlights that not all US cities are adequately prepared.\" \n\nJapan has experienced\
    \ frequent flood hazards, with rainfall events increasing significantly due to\
    \ climate change: \"Japan has flood hazards arising from typhoons, torrential\
    \ rains, snowmelt, and tsunami; and past floods have been associated with major\
    \ impacts... this trend is expected to continue with climate change.\"\n"
