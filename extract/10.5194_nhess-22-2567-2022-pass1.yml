  1: "Sustainable \uFB02ood risk management (SFRM) has become popular since the 1980s.\
    \ Many governmental and non-governmental organisations have been keen on implementing\
    \ the SFRM strategies by integrating social, ecological, and economic themes into\
    \ their \uFB02ood risk management (FRM) practices. However, the justi\uFB01cations\
    \ for SFRM are still somewhat embryonic, and it is not yet clear whether this\
    \ concept is in\uFB02uencing current policies in different countries. This paper\
    \ reviews the past and current \uFB02ood management experiences from \uFB02ood\
    \ defence to SFRM in four developed countries to highlight lessons for coastal\
    \ megacities in development. The paper explores recent strategies such as \u201C\
    Making Space for Water\u201D, Planning Policy Statement 25 (PPS25), and the National\
    \ Planning Policy Framework (NPPF) in the UK and \u201CRoom for the River\u201D\
    \ in the Netherlands, which were implemented to mitigate \uFB02ooding, integrate\
    \ FRM with sustainability concepts, and deliver sound FRM practice for future\
    \ generations. In this context, the United States has also established a National\
    \ Flood Insurance Program (NFIP), and in a different approach, Japan has developed\
    \ an advanced \uFB02ood warning and evacuation contingency system to prepare for\
    \ climatic extremes. These case studies give good lessons in achieving long-term\
    \ SFRM to deliver sound \uFB02ood management practices considering socio-economic\
    \ and environmental concerns. Most developing coastal megacities especially in\
    \ Asia are still heavily reliant on a traditional hard-engineering approach, which\
    \ may not be enough to mitigate substantial risks due to human factors (e.g. large\
    \ population, rapid socio-economic growth, subsidence from excessive groundwater\
    \ extraction) and natural factors (e.g. climate change including sea-level rise\
    \ and landsubsidence). It is clear that different countries and cities have their\
    \ interpretation of SFRM, but this paper explores how policymakers can adopt \u201C\
    mixed options\u201D to move towards long-term thinking about sustainability with\
    \ social, economic, and environmental considerations."
  2: "yaml\nDrivers of Risk: \"Flood hazard is increasing as climate change raises\
    \ sea surface temperature, driving oceanic thermal expansion and increasing the\
    \ intensity and frequency of precipitation events and natural land subsidence\"\
    \nDrivers of Risk: \"the assets exposed to \uFB02ood hazards, including people\
    \ and property, are growing through rapid land-use change, urbanisation, and economic\
    \ expansion\"\nMethodology: \"in this paper, we review FRM experience in four\
    \ economies which are at the front end in applying the FRM approach (the UK, the\
    \ Netherlands, the United States, and Japan)\"\nHighlights: \"Asian megacities\
    \ tend to rely on a one-dimensional, hard-engineering approach to protect against\
    \ \uFB02ooding\"\nHighlights: \"The paper also reviews the development of \uFB02\
    ood management practices in \uFB01ve selected Asian coastal cities (Jakarta, Indonesia;\
    \ Bangkok, Thailand; Ho Chi Minh City, Vietnam; Guangzhou,China;andShanghai,China)todemonstratethe\
    \ latest progress of FRM in these cities that are exposed to flooding from various\
    \ sources and to understand the implications of SFRM elsewhere for effectively\
    \ in\uFB02uencing their \uFB02ood management practices.\"\n"
  3: "yaml\nEvaluation overview: \"From the early part of the 20th century, clear\
    \ phases of \uFB02ood management history can be identi\uFB01ed in the UK...Thus,\
    \ FRM now seeks to prevent damage by reducing the exposure and vulnerability of\
    \ people and properties prone to \uFB02ooding. It is not possible to eliminate\
    \ \uFB02ood risk; hence FRM considers the costs and bene\uFB01ts of \uFB02ood\
    \ risk mitigation for society at large\"\nDrivers of Risk: \"This occurred as\
    \ policymakers realised it was increasingly dif\uFB01cult to defend against all\
    \ \uFB02ooding due to increasing climatic extremes (i.e. intensive precipitation)\
    \ whilst social and environmental concerns were also recognised as important.\"\
    \nMethodology: \"From the early part of the 20th century, clear phases of \uFB02\
    ood management history can be identi\uFB01ed in the UK...During the 1970s, the\
    \ UK government adopted cost\u2013bene\uFB01t appraisal (CBA) to evaluate drainage\
    \ projects...Thus, through the 1980s and 1990s, \uFB02ood defence was largely\
    \ driven by CBA that considered net bene\uFB01ts\"\nHighlights: \"Through the\
    \ 1980s a \u201C\uFB02ood management\u201D approach emerged, which emphasised\
    \ coping with \uFB02ooding rather than solely controlling \uFB02oods...In the\
    \ 2000s, the focus changed again to more explicitly consider \uFB02ood risk...An\
    \ important aspect of FRM is to manage \uFB02ood risk through engagement with\
    \ stakeholders more widely\"\nMore Notes: \"An important aspect of FRM is to manage\
    \ \uFB02ood risk through engagement with stakeholders more widely (e.g. households,\
    \ practitioners, politicians, \uFB02ood engineers, planners, and communities)\
    \ to identify multi-disciplinary perspectives and solutions\"\n"
