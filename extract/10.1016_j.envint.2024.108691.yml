  5: 'Y. Wu et al.

    Pooled cumulative associations between temperature frequency and all-cause mortality.
    The reference normalized frequency =1 was used to calculate relative risks.

    Table 1 shows the stratification results by climatic zones and socio-economic
    status. The temperate climates (C) exhibited the highest increase in mortality
    risk, with a percentage change of 14.79 (95 % CI: 13.61, 15.99); while the lowest
    increase in mortality was observed in the polar climates (E), with a corresponding
    change of 0.45 (95 % CI: 11.91, 12.50).

    Results for subgroups of each climate zone are shown in Table S2. After classifying
    countries by income level, the highest increase in mortality risk was observed
    for high-income countries, with a percentage change of 13.58 % (95 % CI: 12.56,
    14.61).'
