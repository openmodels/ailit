Quantitative material:
  1: The abstract mentions lifecycle assessments showing significant reductions in
    greenhouse gas emissions for EVs compared to internal combustion engine vehicles.
    It also refers to the International Energy Agency (IEA) projecting a 35% global
    market share for electric cars by 2030.
  2: Lifecycle emissions of a medium-size BEV are about half of those of an equivalent
    ICEV, and net avoided WTW GHG emissions from EV deployment are substantial.
  3: Net GHG emissions avoided by 2035 are significant under the STEPS scenario. Further
    reductions under APS scenario. NZE scenario shows the impact of net-zero emissions
    by 2050.
  9: "The paper presents frequency and relevance scores for various terms related\
    \ to EV adoption based on co-occurrence analysis using VOSviewer and Kullback\u2013\
    Leibler distance."
  16: Significant energy savings and cost efficiencies with EVs; Potential reductions
    in energy consumption and range anxiety; High feasibility for completing day trips
    with battery electric trucks; Improved energy efficiency and traffic flow.
  17: Provides numerical data on well-to-wheel efficiency, energy consumption and
    savings by vehicle type, and life cycle CO2 emissions influenced by the power
    generation mix.
  18: The paper provides quantitative LCCO2 emissions for ICEVs and BEVs in Beijing
    and Yunnan, with Beijing showing higher emissions for BEVs and Yunnan lower.
  19: In the United States, a surge in EV-related job announcements has linked 195,000
    direct jobs to EV manufacturing.
  21: No relevant information
  22: The paper includes detailed studies on emissions reductions and efficiency gains
    across various vehicle types and sectors, although specific quantitative outcomes
    are not detailed on this particular page.
  24: Manufacturing emissions for a 40kWh battery are estimated to be around 61kgCO2e/kWh,
    resulting in approximately 2.44 tonnes of CO2-equivalent emissions for the battery
    alone.
  25: Nissan Leaf lifecycle emissions are around 29 tonnes CO2-equivalent, comparable
    ICE vehicle emits approximately 57 tonnes CO2-equivalent over same distance. Mid-size
    BEV base case shows total lifecycle emissions of approximately 19 tCO2e, high-GHG
    minerals case increases this to about 21.1 tCO2e. ICEV exhibits a much higher
    total lifecycle emission of 41.9 tCO2e.
  26: BEVs sold in 2023 emit roughly half the GHG over their lifetime compared to
    ICEVs; BEVs in 2035 will have emissions about two-and-a-half times lower than
    ICEVs in the Stated Policies Scenario; BEVs in 2035 will have emissions over three
    times lower than ICEVs in the Announced Pledges Scenario; Well-to-tank emissions
    are expected to decrease significantly, by up to 75% in the Announced Pledges
    Scenario, due to cleaner electricity generation.
  28: 'Energy required for recycling one battery pack: 7.64 kWh (pyrometallurgical),
    7.76 kWh (hydrometallurgical); CO2 emissions per battery pack recycled: approximately
    0.224 kg CO2; Direct physical recycling shows potential for 37.2 kg CO2-eq/kWh
    and 32% reduction in emissions compared to traditional methods.'
  29: Silica-based tires emit approximately 11,639.36 kg CO2 eq per ton, a reduction
    of 526.78 kg CO2 eq compared to all-carbon black tires.
  30: By substituting carbon black with 25%, 50%, 75%, and 100% graphene, the emissions
    can be reduced by 5.92%, 11.62%, 17.76%, and 23.46%, respectively. Graphene can
    reduce the emissions of the carbon black component itself by up to 98.81%.
  33: No relevant information
  39: Reduces GHG emissions; improved urban air quality and noise reduction.
