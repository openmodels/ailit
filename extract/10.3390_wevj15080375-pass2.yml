Methodology:
  1: Comprehensive systematic review drawing from 88 peer-reviewed articles.
  4: Systematic review using the PRISMA methodology, bibliometric analysis, and thematic
    content analysis of existing studies. The literature search was completed in August
    2024 using the Scopus database.
  5: The study uses a literature review based on Scopus, focusing on journal articles
    published from 2019 to 2024. The PRISMA 2020 guidelines are followed. Keywords
    include 'Electric vehicle*', 'fleet electrification', 'management', 'operations',
    'Emission Reductions', 'sustainability', 'Organizational performance', and 'KPI'.
    Initial retrieval resulted in 802 papers, which were filtered based on publication
    year (2019-2024), language (English), and relevance to EV integration with sustainability
    and organizational strategy. This narrowed the selection to 130 studies.
  7: Bibliometric analysis using VOSviewer to map the field of EV adoption research.
    Content analysis of selected studies to identify key recurring themes, insights,
    and trends.
  8: The analysis uses VOSviewer for constructing and visualizing bibliometric networks,
    focusing on keyword co-occurrences to identify critical themes and relationships.
  12: Bibliometric analysis of keywords in EV research literature, including co-occurrence
    maps of author and index keywords using VOSviewer. Focuses on identifying prevailing
    topics and their interconnections.
  13: The analysis uses co-occurrence mapping of index keywords and countries of co-authorship
    to visualize relationships between different topics related to EV adoption and
    identify global collaboration. The criterion for inclusion in the country co-authorship
    map was at least four documents.
  14: The analysis uses document count, citations, and total link strength to rank
    countries and authors in EV adoption research. The analysis examines co-authorship
    to determine collaboration.
  15: The study analyzes 88 papers on EV adoption using a content analysis approach.
    The sources were identified using the Scopus database, including the main criteria
    of English-language, peer-reviewed journal articles, published between 2019 and
    2024.
  18: The analysis focuses on comparing lifecycle CO2 emissions of ICEVs and BEVs
    in different regions (Beijing and Yunnan, but this is illustrative) and assessing
    the economic ramifications and market dynamics of EV integration. The results
