sourcematerial:
  1: "The abstract states, \"Food security is a key pillar of environmental security\
    \ yet remains one of the world\u2019s greatest challenges. Its obverse, food insecurity,\
    \ negatively impacts health and well-being, drives mass migration, and undermines\
    \ national security and global sustainable development.\" This supports the evaluation\
    \ overview that the paper discusses the AMS's role in addressing food security\
    \ issues with broad environmental and societal impacts.\n\nThe paper mentions,\
    \ \"We examine 1) the interactions between weather, climate, and the food system\
    \ and how they influence food security.\" This provides context for identifying\
    \ weather and climate interactions as drivers of risk affecting food security.\n\
    \nThe conclusion notes, \"We conclude that, moving forward, the AMS community\
    \ is well-positioned to scale up its engagement across the global food system\
    \ to address existing scientific needs and technology gaps to improve global food\
    \ security.\" This aligns with the highlight about the AMS community's role in\
    \ addressing food security challenges.\n"
  2: " \nThe page discusses the impact of weather and climate events on food security,\
    \ highlighting how disruptions in the food system can lead to increased vulnerability\
    \ and inequity: \"The food system\u2014including the production, distribution,\
    \ and consumption of food\u2014is highly vulnerable to extreme weather and climate\
    \ events. The interactions between weather, climate, and the food system have\
    \ a significant impact on food security by affecting the availability, access,\
    \ utilization, and stability of food.\"\n\nExtreme weather and climate events,\
    \ such as droughts, cold snaps, hurricanes, and other severe weather events, are\
    \ impacting food security: \"The food system is highly vulnerable to extreme weather\
    \ and climate events... the interactions between weather, climate, and food security\
    \ can be traced through history... Today, devastating extreme weather events fueled\
    \ by a changing climate further exacerbate global food crises.\"\n\nThe page mentions\
    \ that 13.5 million U.S. households experienced food insecurity in 2021: \"An\
    \ estimated 13.5 million U.S. households experienced food insecurity in 2021 (USDA\
    \ 2022).\"\n\nThe analysis highlights how extreme weather exacerbates food insecurity,\
    \ with past examples cited like the impact of a cold snap in Texas and Hurricane\
    \ Ian, as well as historical instances like failed harvests and climate events\
    \ leading to social unrest: \"In February of that year [2021], one of the worst\
    \ cold snaps in Texas state history shocked the energy system, leading to supply\
    \ chain challenges and exacerbating food insecurity... In October 2022, Hurricane\
    \ Ian drove an increase in food insecurity...\"\n"
  3: "Source material here.\n\"communities most affected by food shocks are low income,\
    \ underrep- resented, and disproportionately impacted by extreme weather events\
    \ and climate change impacts\"\n\"complex food system\u2014conceptualized as three\
    \ simplif ied components including the production, distribution, and consumption\
    \ of food\u2014is highly v ulnerable to weather and cli- mate phenomena such as\
    \ droughts, f loods, heat waves, cold spells, and storm events\"\n\"The article\
    \ concludes w ith a call to action to the A MS communit y to scale up engagement\
    \ across the food system and embrace an interdisciplinar y approach to break dow\
    \ n the silos that stand in the way of addressing global food securit y.\"\n"
  5: "Source material here.\nThe data may be used in impact models (biological and\
    \ socioeconomic) across all time horizons\u2026 though this development is not\
    \ yet fully implemented in practice. The choice of states and fluxes to be observed,\
    \ modeled, or forecasted must strike a balance between the competing demands of\
    \ physical relevance to food security and the observability, predictability, and\
    \ availability of data.\n...atmospheric evaporative demand represents a physical\
    \ link between plant physiology, water stress and/or availability, and atmospheric\
    \ conditions and is therefore central to food-security monitoring...\n...demonstrates\
    \ the power of implementing an accurate, long-term reanalysis of evaporative demand\
    \ in food-security monitoring...\n...meteorological phenomena tend to have a strong\
    \ relationship between temporal and spatial scales... Weather and climate services\
    \ supporting food systems thus benefit from efforts to match models and information\
    \ sources with the spatiotemporal requirements of specific decision processes.\n"
  6: "yaml\n\"Evaluation overview\": \"Interacting spatiotemporal scales of meteorology\
    \ and agricultural decisions.\"\n\"Drivers of Risk\": \"At plant-to-field scales,\
    \ irrigation and plant breeding evince humanity\u2019s adaptations to climate\
    \ changes.\"\n\"Methodology\": \"Across these time and spatial scales, data must\
    \ be gathered that are physically and socially robust, including being timely,\
    \ relevant, accessible, accurate, usable, and useful.\"\n\"More Notes\": \"There\
    \ have long been efforts to incorporate climate change information into agriculture\
    \ and food security, particularly climate variability at the seasonal-to-interannual\
    \ range.\"\n"
  7: "Source material here.\nIn this paper we advance the concept that addressing\
    \ food security requires that the Earth system science community engage in food-security\
    \ monitoring and outlooks at multiple time horizons and spatial scales.\n\nOn\
    \ regional and global scales, model-derived outputs and global land and ocean\
    \ data assimilation systems and reanalyses are widely available and commonly used\
    \ for estimating variables that the food-security community has traditionally\
    \ relied on (e.g., drivers such as precipitation and temperature) to derive agricultural\
    \ metrics and indices.\n\nActionable information may be derived from the monitored\
    \ state of the climate and from understanding climatological characteristics leading\
    \ up to, and then during, the next growing season.\n\nThe predictability of slowly\
    \ varying modes of climate variability like El Ni\xF1o\u2013Southern Oscillation\
    \ (ENSO; FEWS NET 2020a,b) and the Indian Ocean dipole (FEWS NET 2021) and their\
    \ known effects on regional climates provide forecasts of opportunity.\n\nExpert\
    \ interpretation of monitored and forecast conditions is used to predict the most\
    \ likely state of agriculture drivers, and thereby capitalize on windows of opportunity\
    \ of more skillful forecasts.\n\nThere is an increasing realization that prediction\
    \ skill on longer than weather time scales (>2 weeks) can leverage specific climate\
    \ phenomena (e.g., the Madden\u2013Julian oscillation, disruptions of the stratospheric\
    \ polar vortex) or conditions for a predictable signal above the weather noise\
    \ but that are not captured in present climate change projections.\n\nConverting\
    \ data into knowledge. Food security\u2013relevant data are only useful if they\
    \ are converted to information and, eventually, to actionable wisdom to inform\
    \ decisions across time and space scales.\n"
  8: "Source material here.\nFEWS NET is an example of successful implementation of\
    \ food securit y early warning with robust stakeholder engagement through in-\n\
    stitutional commitments and interagenc y agreements. FEWS NET, which is managed\
    \ and suppor ted by the U.S. Agenc y for International\nDevelopment (USAID), provides\
    \ early warning and analysis of acute food insecurit y to inform the proac tive\
    \ preposition of humanitarian aid.\nThough many fac tors contribute to food securit\
    \ y, the ef fec t of weather and climate is consistently impor tant, and to that\
    \ end, forecast s and\nEar th system monitoring from NOA A, the U.S. Geological\
    \ Sur vey (USGS), the National Aeronautics and Space Administration (NA SA), the\n\
    U.S. Depar tment of Agriculture (USDA), and universit y collaborators play a critical\
    \ role.\nWhile monitoring and forecasting the climate variables that drive food\
    \ security are\ncrucial for developing decision-support tools, these data must\
    \ be integrated into the larger\nsocioeconomic context, including market prices,\
    \ consumption patterns, income, sanitation,\nhealthcare, governance, and policy.\
    \ This integration requires close interaction between\nnot only physical and social\
    \ scientists but also stakeholders to codevelop food securit y\ndecision-support\
    \ tools that are easy to understand, useful, usable, scalable, accurate, and\n\
    timely. Engagement with stakeholders is key for converting data into knowledge\
    \ and driv-\ning impact-based forecasts that address local needs and improve early\
    \ action. The FEWS\nNET, highlighted in the \u201CFEWS NET\u201D sidebar, is an\
    \ example of how integrated physical and\nsocioeconomic data and robust stakeholder\
    \ engagement have been used to support food\nsecurit y decision-mak ing.\n"
  9: "Source material here. A significant challenge is often ineffective communication,\
    \ which can prevent practitioners from being aware of available datasets or how\
    \ to effectively use them. On the other hand, researchers may not know the nuances\
    \ of the decision-making process, limiting their ability to connect users with\
    \ the correct products....This process has increasingly been recognized as key\
    \ and commonly referred to as \u201Ccoproduction\u201D and is expanding within\
    \ the humanitarian world and in sustainability research....For example, the oceanic\
    \ portion of the UN Sustainable Development Goals were developed through discussions\
    \ between scientific and business experts (Norstr\xF6m et al. 2020; Lokot and\
    \ Wake 2023)....Such framing is exemplified in the development of the evaporative\
    \ demand drought index (EDDI; Hobbins et al. 2016; McEvoy et al. 2016a): users\
    \ from regional and national drought-monitoring communities were engaged at the\
    \ beginning of the development of EDDI and during subsequent iterations of the\
    \ process. This codevelopment across the continental United States allowed for\
    \ an easier development of EDDI as a new tool to support food-security monitoring\
    \ in data-sparse regions by both FEWS NET and the U.S. Department of Agriculture\u2019\
    s Foreign Agricultural Service....The exchange of knowledge must also be sustainable,\
    \ equitable, and consistent\u2014a challenging prospect....However, this is in\
    \ contrast to current research and funding practices, which often embrace a unidirectional\
    \ approach of identifying what users want and how researchers can provide (Stokes\
    \ 1997). Instead, a broader scientific agenda is needed that requires a user-inspired\
    \ framing that advances both research and practices....Although there are many\
    \ challenges across the O2R and R2O nexus, prototypes and testbeds are important\
    \ tools to support effective communication and knowledge transfer."
  10: 'Methodology and Highlights: "A testbed offers the operational component of
    a prototype... establishing a framework to support both O2R and R2O on a consistent
    and regular basis." "Additionally, testbeds address the challenge of sustainable
    knowledge transfer by establishing a framework to support both O2R and R2O on
    a consistent and regular basis." "During extreme weather events... much needs
    to be in place before such events." "Establishing a humanitarian prototype for
    knowledge exchange within the food-security space could help ensure the operability
    of decision-support products, their verification and visualization, and the accessibility
    of data to users."'
  11: " \n  Evaluation overview: Models should also be better connected to food-security\
    \ applications, e.g., better linking dynamic agricultural conditions, farm management,\
    \ and information on responsive interventions into land surface models and biogeochemical\
    \ and Earth system models.\n  \n  Drivers of Risk: Systemic risks are interdependent\
    \ failures across a system that might lead to cascading events or a breakdown\
    \ of the entire system. Recent methodological advancements have dramatically improved\
    \ the ability to detect and attribute the signature of anthropogenic climate change\
    \ in extreme climate events.\n  \n  Quantitative material: Recent work has shown\
    \ our ability to identify the proportion of production anomalies attributable\
    \ to climate conditions and long-term climate changes.\n  \n  Methodology: Uses\
    \ combinations of crop models, land surface schemes, hydrologic parameterizations,\
    \ data-driven models, and historical bias-adjusted climate datasets.\n  \n  Highlights:\
    \ Improved ability to detect and attribute the signature of anthropogenic climate\
    \ change in extreme climate events and agricultural impacts. The AMS plays a crucial\
    \ role in supporting the modeling and attribution of meteorological and climate\
    \ impacts.\n  \n  More Notes: The AMS should better link these discussions to\
    \ food security applications and encourage greater collaboration across the weather,\
    \ water, climate, and agriculture sectors to ensure these advancements in science\
    \ are suitable for agricultural decision-making.\n"
  12: "Source material here.\nThe characteristics of systemic risks are clear during\
    \ droughts, which can act as a trigger for cascading events and feedback loops\
    \ that further exacerbate the initial hazard. The interdependence among compounding\
    \ hazards, such as heat waves and prolonged droughts, can generate different event\
    \ chains that, exacerbated by system vulnerabilities, can cause damage to different\
    \ exposed elements such as agricultural production, critical infrastructure, or\
    \ service networks. ... Cascading climate-related events, poverty, rapid urbanization,\
    \ weak governance, and the decline of ecosystems are threatening food security,\
    \ increasing disaster risk, and, at times, introducing new threats. ... In the\
    \ manifestation of risk, the level of societal vulnerability is unequal, with\
    \ a disproportionate impact on the poor and marginalized where the cost of the\
    \ resulting food insecurity is measured in terms of lives, livelihoods, and impoverishment.\
    \ ... Many food systems are currently in a transitional phase in which the former\
    \ dominant reliance on natural systems is being replaced by anthropogenic inputs\
    \ and drivers drawn from across the globe. Moving forward, there is a need to\
    \ analyze the dynamics and frequency of compound events occurring together in\
    \ a region, such as droughts, wildfires, and heat waves, as well as the likelihood\
    \ of failures occurring simultaneously in different regions\u2014so-called multibreadbasket\
    \ failures. Additionally, foresight scenarios and early warnings will be increasingly\
    \ important as changes in climate and socioeconomic systems may result in surprises\
    \ and rapid transitions.\n"
  13: 'Source material

    Across Africa, forecast-based financing (FbF) has been used in practice to anticipate
    potentially catastrophic drought and support resilience in the food system. Effective
    early warning enables early action and weather and climate information play crucial
    roles in supporting anticipatory humanitarian action that saves lives and livelihoods,
    reduces losses and damages, and enhances food security.


    49 million are on the brink of famine due to ongoing conflict, economic consequences
    of the COVID-19 pandemic, and weather and climate shocks. The impacts of weather
    and climate on the food system not only jeopardize food security, but also threaten
    to reverse sustainable development gains. These impacts are most prominent in
    vulnerable communities, which are disproportionately affected and often rely on
    rainfed agriculture for food and livelihoods.


    Tailored climate forecasts and vulnerability analyses triggered anticipatory actions,
    such as creating soil and water conservation structures, introducing drought-resistant
    seeds and training smallholder farmers on climate-smart agricultural practices.
    For example, forecast-based financing is a form of humanitarian action that uses
    weather and climate forecasts and detailed risk analyses to release financial
    resources ahead of a disaster in order to enable early action.


    This approach, summarized in the FbF for droughts sidebar, has successfully been
    used in various contexts across the world to not only save lives and livelihoods,
    but also reduce losses and damages and support the resilience of local communities.

    '
