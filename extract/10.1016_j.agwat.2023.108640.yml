sourcematerial:
  3: "Source material here.\nGlobal population growth and water scarcity are raising\
    \ concerns about agricultural systems\u2019 ability to meet future food, fuel,\
    \ feed, and fiber demands. Water productivity (WP), the ratio of crop production\
    \ to water use, is crucial for assessing agricultural resilience and sustainability.\n\
    \nGlobal food and water security are important issues at both local and global\
    \ scales... The increasing demand for food, fuel, feed, and fiber, coupled with\
    \ declining natural resources, is expected to further exacerbate the threat to\
    \ agricultural systems in the coming decades...\n\nIn this study, we used data\
    \ collected over a 20-year period (2001\u20132020) to investigate the interannual\
    \ variability in yield (Y), crop evapotranspiration (ET), and water productivity\
    \ (WP, ratio of Y and ET), and their response to management and climate in three\
    \ major cropping systems located in Eastern Nebraska: irrigated continuous maize,\
    \ irrigated maize-soybean rotation, and rainfed maize-soybean rotation.\n\nOur\
    \ results showed significant differences (p <0.05) in WP between irrigated and\
    \ rainfed sites, mainly attributed to variations in Y rather than ET, while there\
    \ was no significant effect of crop rotation on measured responses. WP was 18.4%\
    \ higher in irrigated maize in rotation relative to the rainfed site.\n\nVapor\
    \ pressure deficit was negatively correlated with Y in rainfed maize (R=\u2212\
    0.72, p <0.05) and therefore was considered a determinant in WP (R=\u22120.7,\
    \ p <0.05).\n"
  4: 'yaml

    Evaluation overview: "The primary objective of this study was to quantify and
    assess the differences in WP, Y, and ET among three major cropping systems in
    the Eastern Nebraska US Corn Belt..., and to investigate their response to management
    and interannual climate and water variability."

    Drivers of Risk: "We also analyzed the correlations between Y, ET and WP and the
    selected climatic and water-related variables to investigate the effect of inter-annual
    climate variability on WP and determine the drivers of its temporal variability."

    Methodology: "To accomplish this, we used data from three proximate monitored
    sites in Eastern Nebraska (US) with similar climate and edaphic properties. We
    calculated the Y, ET and WP in the three cropping systems and estimated changes
    related to management and crop rotation. We also analyzed the correlations between
    Y, ET and WP and the selected climatic and water-related variables."

    Highlights: "We hypothesized that higher WP will be observed in irrigated sites
    due to increased Y resulting from enhanced availability of water and nutrients
    through irrigation and crop rotation... In contrast, the rainfed site is expected
    to exhibit more efficient water use under limited water conditions through stomatal
    closure... but this may reduce crop photosynthetic activity and ultimately Y,
    contributing to lower WP."

    '
