  12: "Source material here.\nEvaluation overview: The findings of this study provide\
    \ valuable insights into the relationship between WP, Y, and ET with management\
    \ and climate variability in three major cropping systems in the midwestern U.S.\n\
    Drivers of Risk: In this study VPD was one of the main drivers of maize\u2019\
    s WP by reducing Y and consequently WP particularly in the rainfed site. VPD is\
    \ expected to increase in the upcoming decades due to a combination of temperature\
    \ rise and, depending on region, reduced relative humidity. In contrast, we found\
    \ that SWC was determinant in soybean\u2019s Y in both irrigated and rainfed systems.\n\
    Quantitative material: We found that irrigated maize systems had the highest WP\
    \ among the studied cropping systems with irrigated maize in rotation being the\
    \ most efficient system. Compared to rainfed systems, WP, Y, and ET were 18.4%,\
    \ 27.6% and 11.8%, respectively, higher in irrigated maize rotation and 7.4%,\
    \ 12.9%, and 5.1%, respectively, higher in irrigated soybean rotation. VPD was\
    \ the most important determinant of maize WP, with the highest effect on Y (correlation\
    \ R=0.7, p < 0.05), SWC showed the highest correlations with WP in irrigated (R=0.77,\
    \ p < 0.05) and rainfed (R=0.49, p > 0.05) soybean systems.\nMethodology: This\
    \ study revealed important insights related to management of maize and soybean\
    \ cropping systems in the midwestern US. We found that Y is the main driver of\
    \ the year-to-year variations in WP.\nHighlights: This study revealed important\
    \ insights related to management of maize and soybean cropping systems in the\
    \ midwestern US. We found that Y is the main driver of the year-to-year variations\
    \ in WP. VPD was the most important determinant of maize WP, with the highest\
    \ effect on Y. SWC was determinant in soybean\u2019s Y in both irrigated and rainfed\
    \ systems.\n"
