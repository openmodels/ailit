  3: Global population growth and water scarcity impacting agricultural systems.
  4: Interannual climate variability and water accessibility are identified as factors
    impacting WP, Y, and ET in cropping systems.
  5: Impact of water availability (irrigation vs. rainfed conditions) on maize-soybean
    rotations is being examined.
  6: The effects of climate variability on the studied variables were investigated
    using Pearson and Spearman's correlation coefficients.
  7: Differences in water input and soil water content between irrigated and rainfed
    sites impact crop productivity and water efficiency.
  8: No specific shocks or changes impacting outcomes are directly mentioned.
  10: Climate variability and management factors like water input, air temperature
    (TA), photosynthetic photon flux density (PPFD), vapor pressure deficit (VPD),
    and soil water content (SWC) impact yield and water productivity.
  11: Climate variability (temperature, vapor pressure deficit, photosynthetically
    active photon flux density, and soil water content) and management practices (water
    input, nitrogen fertilizer, planting density) affect water productivity.
  12: "Climate variability (VPD and SWC). VPD is expected to increase which may severely\
    \ decrease Y in rainfed maize systems and reduce its WP. SWC was determinant in\
    \ soybean\u2019s Y in both irrigated and rainfed systems."
