  6: "To understand differences between cropping systems and crops we obtained data\
    \ on gross primary production (GPP) for the period 2001\u20132014. GPP is estimated\
    \ from (Eq. 4)...NPP is always positive for carbon uptake...Note that...The data\
    \ was obtained from Ameriflux dataset...We examined the variations in means among\
    \ cropping systems across various variables...For soybean years, a T-test was\
    \ utilized...To study the effects of climate variability on the three studied\
    \ variables, Pearson and Spearman\u2019s correlation coefficients were implemented...PCA\
