  10: PCA for maize explains 73.1% of the variance with PC1 explaining 49.8% and PC2
    explaining 23.3%. PCA for soybean explains 70.4% of the variance.
  11: WP increased by 18.4% under irrigated maize rotation compared to rainfed rotation
    and by 7.2% when comparing irrigated continuous maize to irrigated maize in rotation.
  12: Irrigated maize systems had the highest WP. Compared to rainfed systems, WP,
    Y, and ET were 18.4%, 27.6% and 11.8%, respectively, higher in irrigated maize
    rotation and 7.4%, 12.9%, and 5.1%, respectively, higher in irrigated soybean
    rotation. VPD had the highest effect on maize Y (correlation R=0.7, p < 0.05).
    SWC showed the highest correlations with WP in irrigated (R=0.77, p < 0.05) and
    rainfed (R=0.49, p > 0.05) soybean systems. Expected decline in maize WP could
    reach 150% in irrigated systems and 54% in rainfed systems.
