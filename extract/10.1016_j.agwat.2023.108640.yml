    Evaluation overview: "...Average growing season crop cycle, climate conditions,
    and WI, for each of the three cropping systems, during the study period, are shown
    in Table 2...Significant differences were observed between irrigated and rainfed
    sites..."

    Drivers of Risk: "As a result of irrigation, SWC was significantly higher in the
    irrigated sites (~32%) than in the rainfed sites (~27%) for both crop types."

    Quantitative material: "...the average annual Y was 1.11 kg m-2 in the irrigated
    continuous site and increased to 1.17 kg m-2 (5.6%) under irrigated rotation,
    compared to 0.85 kg m-2 (decline by 23.5%) in rainfed rotation."

    Methodology: "A 95% confidence interval was selected to test the significance
    of p-value under the different statistical tests...For maize, the average annual
    Y was 1.11 kg m-2 in the irrigated continuous site and increased to 1.17 kg m-2
    (5.6%) under irrigated rotation..."

    Highlights: "In general, irrigated crops had a higher annual Y, ET, and WP compared
    to rainfed crops...For soybean, while the difference in Y was significant, differences
    in ET and WP were non-significant between irrigated and rainfed rotations."

