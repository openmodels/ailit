Evaluation overview:
  3: Long-term croplands water productivity in response to management and climate.
  4: The study quantifies and assesses the differences in Water Productivity (WP),
    yield (Y), and evapotranspiration (ET) among three major cropping systems in Eastern
    Nebraska, investigating their response to management and interannual climate and
    water variability.
  6: The study evaluates the differences in crop production (in terms of water productivity
    and gross primary production) between different cropping systems and their response
    to climate variability.
  7: The page evaluates the differences in crop productivity, water use, and efficiency
    between irrigated and rainfed cropping systems for maize and soybean.
  8: Assesses yield, evapotranspiration, and water productivity for maize and soybean
    across different irrigation conditions.
  10: The study evaluates yield (Y), evapotranspiration (ET), and water productivity
    (WP) of maize and soybean cropping systems.
  11: Evaluates changes in water productivity (WP) of maize and soybean under different
    irrigation and rotation systems.
  12: This study evaluates water productivity (WP), yield (Y), and evapotranspiration
    (ET) in maize and soybean cropping systems in the Midwestern U.S.
  14: No relevant information
Highlights:
  3: Significant differences in WP between irrigated and rainfed sites attributed
    to yield variations; Vapor pressure deficit negatively correlated with yield in
    rainfed maize.
  4: Higher WP is expected in irrigated sites due to enhanced availability of water
    and nutrients, while rainfed sites may show more efficient water use under limited
    conditions, yet this potentially reduces crop photosynthetic activity and yield.
  7: Irrigated crops demonstrated higher annual yield, evapotranspiration, and water
    productivity compared to rainfed crops. For maize, yield increases in irrigated
    systems were notable.
  8: Comparative data on irrigated and rainfed crops show significant differences
    in yield, ET, and WP, with irrigated conditions generally yielding better outcomes.
  10: WP was significantly correlated with yield but not with evapotranspiration (ET),
    and water input was identified as a significant factor influencing yield and water
    productivity in rainfed maize.
  11: Irrigated maize in rotation had higher water productivity than continuous irrigated
    maize and rainfed rotation maize. Climate variability, water input, vapor pressure
    deficit, and temperature are primary factors affecting maize water productivity.
    Yield is more determinant in year-to-year changes to water productivity than evapotranspiration.
  12: Y is the main driver of year-to-year variations in WP. VPD was the most important
    determinant of maize WP. SWC showed the highest correlations with WP in irrigated
    and rainfed soybean systems.
  14: No relevant information
Methodology:
  3: "Analysis performed using data collected over a 20-year period (2001\u20132020)\
    \ using Eddy Covariance technique to investigate yield, crop ET, and WP."
  4: The study uses long-term data (2001-2020) from three monitored sites in Eastern
    Nebraska (both irrigated and rainfed systems) along with Eddy Covariance measurements
    for data collection, and it calculates WP based on dry grain yield per unit of
    crop ET.
  5: Eddy Covariance (EC) flux measurements are used to estimate crop evapotranspiration
    (ET) between crop emergence and harvest.
  6: Crop productivity and ecosystem respiration are assessed using gross primary
    production derived from net ecosystem CO2 exchange and ecosystem respiration,
    with statistical analysis including ANOVA, Tukey's test, and PCA to analyze the
    data between 2001 and 2014.
  7: The study uses statistical tests to evaluate significance of variables affecting
    GPP and analyzes cropping system effects on productivity from 2001 to 2020.
  10: The analysis uses principal component analysis (PCA) and correlation analysis,
    focusing on two crop types and different cropping systems.
  11: 'Field scale and long-term observational data from ENREEC sites in the Midwestern
    US. PCA model used to analyze climate variables, yield, and evapotranspiration.
    Focus on three cropping systems: irrigated continuous maize, irrigated maize-soybean
    rotation, and rainfed maize-soybean rotation.'
  12: Analyzes the relationship between WP, Y, and ET with management and climate
    variability in three major cropping systems in the midwestern U.S.
  14: No relevant information
More Notes:
  11: The absence of replicates within years due to experimental cost and the complexity
    of techniques. Results emphasize considering climate variability and management
    when assessing water productivity, especially in rainfed systems.
  14: No relevant information
Quantitative material:
  3: WP was 18.4% higher in irrigated maize in rotation relative to the rainfed site.
  5: Quantitative data include irrigation levels, nitrogen fertilizer application,
    and plant densities for different field sites in Nebraska.
  7: "The study provides quantitative comparisons, such as maize yield being 1.11\
    \ kg/m\xB2 in irrigated continuous sites and 0.85 kg/m\xB2 in rainfed rotation,\
    \ highlighting a 23.5% decline."
  8: Provides annual means and standard deviations for yield (Y), evapotranspiration
    (ET), and water productivity (WP), with percentage changes for different irrigation
    conditions.
  10: Pearson's correlation between WP and Y was 0.9 for maize and 0.83 for soybean.
    Water input showed high correlation with WP (R=0.67) and Y (R=0.79) for rainfed
    sites.
  11: Irrigated maize in rotation had the highest WP (2.23 kg m-3) compared to irrigated
    continuous maize (2.08 kg m-3) and rainfed maize in rotation (1.82 kg m-3), with
    significant differences only observed between irrigated and rainfed systems. Soybean
    irrigated rotation WP = 0.81 kg m-3, rainfed rotation WP = 0.75 kg m-3. WP increased
    by 18.4% under irrigated maize rotation compared to rainfed rotation. The increase
    in WP was only 7.2% when comparing irrigated continuous maize to irrigated maize
    in rotation.
  12: Irrigated maize systems had the highest WP. Compared to rainfed systems, WP,
    Y, and ET were 18.4%, 27.6% and 11.8%, respectively, higher in irrigated maize
    rotation and 7.4%, 12.9%, and 5.1%, respectively, higher in irrigated soybean
    rotation. VPD correlation with Maize Y R=0.7, p < 0.05. SWC correlations with
    WP in irrigated soybean (R=0.77, p < 0.05) and rainfed soybean (R=0.49, p > 0.05)
    systems.
