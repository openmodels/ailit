Highlights:
  3: Significant differences in WP between irrigated and rainfed systems were mainly
    due to variations in yield rather than evapotranspiration.
  4: Higher WP observed in irrigated sites due to increased yield from enhanced water
    and nutrient availability, while rainfed sites exhibit more efficient water use
    under limited water conditions.
  6: The study examines variations in means among cropping systems, including maize
    and soybean treatments, across various variables. It investigates the effects
    of climate variability on three studied variables.
  7: Irrigation led to a higher yield and water productivity, and significantly higher
    soil water content; significant correlations were found between GPP and ET in
    specific sites and periods.
  8: Irrigated continuous maize had the highest yield and water productivity compared
    to rainfed maize.
  10: Water input (WI) showed the highest correlations with WP (R=0.67, p < 0.05,
    rainfed site) and Y (R=0.79, p < 0.05, rainfed site) in maize. WP was significantly
    correlated with Y but not with ET.
  11: Irrigated maize in rotation demonstrated the highest WP (2.23 kg m-3) compared
    to irrigated continuous maize and rainfed maize in rotation.
  12: Yield is the main driver of year-to-year variations in WP. VPD is the most important
    determinant of maize WP, while SWC is determinant in soybean yield in both irrigated
    and rainfed systems.
Methodology:
  3: "The study analyzes 20 years of data (2001\u20132020) using the Eddy Covariance\
    \ technique to assess the impact on crop yield and water use."
  4: The analysis uses long-term experimental data (20 years) of WP, Y, and ET from
    Eddy Covariance measurements across three cropping systems.
  5: "Analysis is performed using Eddy Covariance flux measurements to estimate crop\
    \ ET, focusing on the period between crop emergence and harvest, with data pulled\
    \ from the AmeriFlux BASE dataset for 2001\u20132020."
  6: Statistical analyses involved ANOVA and TukeyHSD for maize, and T-tests for soybean
    to compare cropping systems; Pearson and Spearman correlations to study climate
    variability effects; Principal Component Analysis (PCA) to study the variance
    between the three cropping systems.
  7: The analysis studied crop cycles within three cropping systems, using statistical
    testing with a 95% confidence interval to explore data over the 2001-2020 period.
  10: Principal component analysis (PCA) was used to study the effects of climate
    variables on Y, ET, and WP. Correlation analysis was used to study the net effect
    of climate and management (N fertilizer rate (Nf), Planting density (Pld), and
    water input (WI)) on cropping systems.
  11: The analysis combined field-scale and long-term observational data from ENREEC
    sites to evaluate major cropping systems, isolating management effects from climate
    variability.
  12: The study analyzes the relationship between WP, Y, and ET with management and
    climate variability in three major cropping systems in the midwestern U.S. The
    results are applicable to maize and soybean cropping systems in this region.
