    '
  10: 'The paper evaluates the economic value of flood protection services provided
    by coastal marshes, focusing on property damage avoidance during storm events.
    Results suggest that one square kilometer of natural habitats can reduce residential
    property damages in the study area from $34,000 to $53,000 per square kilometer
    under current conditions and from $7,000 to $138,000 per square kilometer under
    future conditions for the selected storm events.


    The analysis examines the impact of different storm scenarios and sea level rise
    (SLR) on property damage. The study focused on the flood protection services by
    the coastal wetlands and marshes in New Jersey.


    The analysis provides quantitative information on property damage and avoided
    damages due to natural habitats, reporting percent changes for various storm scenarios.
    For example, a 25-year storm under current scenarios shows property damage of
    $82,062,657 with natural habitats present, versus $91,894,099 without, yielding
    avoided damages of $9,831,442 and an 11.98% change.


    Natural habitats can protect up to $13.1 million under current conditions and
    $32.1 million in future scenarios, with per square kilometer flood protection
    services valued between $53,000 and $138,000. "The results show that the natural
    habitats can protect up to $13.1 and $32.1 million of residential property damage
    during the selected storm events in the study area in the current condition and
    the future scenario respectively."'
  11: 'Source material here.

    "Our results suggest that natural habitats can reduce total property damage from
    storm surge flooding by 6.1% to 13.8%."

    "The outcomes are impacted by storm conditions and sea level rise, and the presence
    of natural habitats reduces property damage."

    "These results could be due, in part, to the fact that each storm has unique characteristics
    and variation in flood protection by natural habitats depends on storms'' track,
    forward speed, and strength."

    "This indicates that a parcel-scale analysis is necessary to capture the spatial
    variation of property values when assessing the flood protection services of coastal
    wetlands and marshes."

    "The natural habitats in coastal areas may provide substantial flood protection
    during recurrent flooding events and act as the first line of defense in more
    extreme storm events like Sandy."

    "Marsh migration and transition will occur due to SLR by 2050, leading to a loss
    of 5.4% of the total marsh area in the study area."

    '
  12: Natural habitats provide several ecosystem services beyond flood protection.
    This study analyzed only the protection to residential structures, which suggests
    that these ecosystem service values are conservative estimates. The results of
    this study suggest that natural habitats can reduce both storm surge flood depth
    and property damage under current and future marsh conditions and under sea level
    rise. In particular, the natural habitats may offer better protection from relatively
    frequent, low intensity storms. These findings suggest that natural habitats can
    increase resilience in areas that are vulnerable to storm surge and sea level
    rise. In addition, the multidisciplinary framework presented in this study can
    assist natural resource managers and coastal landscape designers in the development
    of sustainable strategies to protect coastal communities, properties, and ecosystems
    from storm surge and sea level rise. There is also need for improved understanding
    about the biophysical interactions between natural habitats, extreme flooding
    events, sea level rise, and the sustainability of these natural ecosystems in
    the future. This study advances the current understanding of coastal ecosystem
    service valuation by analyzing the role of natural habitats for flood protection
    and enhancing coastal resilience.
