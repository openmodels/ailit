Drivers of Risk:
  1: Storm surge and sea level rise are affecting coastal communities, properties,
    and ecosystems.
  2: Coastal flooding due to storm surge and sea level rise (SLR).
  3: Coastal flooding and hurricane-driven wave effects are impacting coastal communities.
  4: The study area is vulnerable to coastal flood hazards from storm surge and sea
    level rise (SLR).
  5: Storm surges, including historical and synthetic storms like Hurricane Sandy
    and 25-year, 50-year storm scenarios, impact coastal flooding in New Jersey.
  6: Sea-level rise (SLR) is a key driver of risk affecting coastal resilience, specifically
    influencing marsh changes and conversions.
  7: Sea level rise (SLR), storms, future land use land cover (LULC) conditions, marsh
    migration.
  8: Changes impacting outcomes include flooding and sea-level rise scenarios.
  9: Storm events and sea level rise impact flooding and associated risks.
  10: The analysis examines the impact of different storm scenarios and sea level
    rise (SLR) on property damage.
  11: The outcomes are impacted by storm conditions, sea level rise (SLR), and the
    intensity and frequency of storms.
  12: Storm surge, sea level rise, extreme flooding events
  13: Hurricane surge flooding, sea-level rise, storm surge risk
Evaluation overview:
  1: Evaluates how natural habitats, like wetlands, reduce property damage from storm
    surge and sea level rise.
  2: Estimates the value of flood protection services provided by protected coastal
    wetlands and marshes in New Jersey.
  3: No relevant information
  5: The analysis focuses on enhancing coastal resilience through natural habitats,
    with storm surge impacts as a primary concern.
  7: Evaluates the ecosystem service of shoreline protection provided by coastal wetlands
    and marshes to residential properties by estimating avoided flood damages.
  8: The outcomes being evaluated include land cover change, reduction in flooding,
    parcel-level flood depths, and property damage.
  9: The paper evaluates the reduction in flooding and property damage due to the
    presence of natural coastal habitats during storm events.
  10: The paper evaluates the economic value of flood protection services provided
    by coastal marshes, focusing on property damage avoidance during storm events.
  11: The page evaluates the role of natural habitats like wetlands and marshes in
    reducing property damage from coastal storm surge flooding.
  12: Valuing natural habitats for enhancing coastal resilience
  13: Valuing natural habitats for enhancing coastal resilience
Highlights:
  1: Protecting and preserving natural habitats can enhance coastal resilience.
  2: Wetlands and marshes along the Jacques Cousteau National Estuarine Research Reserve
    can significantly reduce flood damages to residential properties.
  3: No relevant information
  7: Natural habitats, specifically coastal wetlands and marshes, provide shoreline
    protection to residential properties. Sea level rise is predicted to reduce total
    marsh area by approximately 5.4%, with larger decreases in transitional and irregularly
    flooded marshes.
  8: Natural habitats lead to up to 23.1% fewer residential parcels inundated under
    current conditions, up to 3.7% fewer under future conditions, and reductions in
    flood depths and property damages.
  9: Presence of coastal wetlands and marshes can lower flood elevation by 0.2 to
    0.4 meters and reduce property damage by $8.5 million to $13 million under current
    conditions.
  10: Natural habitats can protect up to $13.1 million under current conditions and
    $32.1 million in future scenarios, with per square kilometer flood protection
    services valued between $53,000 and $138,000.
  11: Natural habitats provide substantial flood protection, being more effective
    in frequent, lower intensity storms; SLR may lead to migration and reduction of
    marsh area by 2050.
  12: Natural habitats can reduce both storm surge flood depth and property damage
    under current and future marsh conditions and under sea level rise. Natural habitats
    may offer better protection from relatively frequent, low intensity storms. Ecosystem
    service values are conservative estimates because only protection to residential
    structures was analyzed.
Methodology:
  1: Combines coastal storm surge modeling and economic analysis to evaluate the role
    of natural habitats in coastal flood protection; uses ADCIRC+SWAN models and SLAMM
    for simulations and projections.
  2: Uses ADCIRC and SWAN models to compute storm surge flooding and SLAMM for simulating
    changes in natural habitats due to SLR.
  3: The study uses parcel-level property values for estimating avoided damages and
    accounts for storm wind-driven wave effects; incorporates SLR impacts on wetlands
    for future evaluation.
  4: The analysis is performed using a coupled version of the coastal hydrodynamic
    model ADCIRC and the nearshore waves model SWAN to simulate coastal flooding from
    storm surge and waves.
  5: The study applies storm surge and wave modeling in coastal New Jersey incorporating
    land cover effects via frictional parameters; SLAMM is used for projecting habitat
    changes due to sea level rise by 2050.
  6: The SLAMM model simulates changes in coastal ecosystems due to sea level rise,
    using inputs like land elevation, tidal data, salinity, accretion rates, and emissions
    scenarios.
  7: "The damages avoided method was applied. Flood elevations were simulated for\
    \ \u201Chabitat present\u201D and \u201Chabitat absent\u201D scenarios using the\
    \ ADCIRC+SWAN model. The difference in residential flood damages between these\
    \ scenarios was used as the value of reduced damages provided by the habitats.\
    \ Flood damages were estimated using depth-damage functions from the USACE, parcel\
    \ level property data from the New Jersey Department of Treasury, and mean flood\
    \ depth from ADCIRC+SWAN. ArcStormSurge tool in ArcGIS was used to create flood\
    \ elevation raster. A 10m resolution DEM was used to calculate flood depth. Properties\
    \ were included in the damage estimation only if the parcel centroid intersected\
    \ the flood depth raster. The analysis focused on residential parcels and their\
    \ associated improvement value as the parcel value. Assumptions were made on number\
    \ of stories and lack of basements."
  8: The analysis uses SLAMM simulations for land cover change and ADCIRC+SWAN for
    flood and property damage assessments.
  9: Analysis performed using the ADCIRC+SWAN model to simulate flooding with and
    without natural habitats during storm events.
  12: The study analyzed the protection natural habitats provide to residential structures
    using storm surge and wave models under current and future marsh conditions and
    under sea level rise. Only three storm events were considered. The analysis is
    applicable to coastal communities vulnerable to storm surge and sea level rise.
  13: The page describes the contributions of different authors to the conceptualization,
    data curation, formal analysis, funding acquisition, investigation, methodology,
    project administration, resources, software, supervision, validation, visualization,
    and writing of the paper.
More Notes:
  3: The study involves interdisciplinary collaboration with coastal engineers, marine
    and social scientists, and natural resources managers.
  12: Findings emphasize the need for primary data collection in coastal wetlands
    and marshes during storm events for improved quantification of their flood reduction
    capacity. There is also a need for improved understanding about the biophysical
    interactions between natural habitats, extreme flooding events, sea level rise,
    and the sustainability of these natural ecosystems in the future.
Quantitative material:
  1: Salt marshes can reduce up to 14% of both flood depth and property damage during
    low intensity storm events; avoidance of up to $13.1 and $32.1 million in property
    damage during a '50-year storm' and Hurricane Sandy, respectively.
  2: Marsh can reduce property flood losses by an average of 16% annually, according
    to a study conducted by Narayan et al.
  3: "The study incorporates wave setup, which contributed to 17% of peak water levels\
    \ during most hurricane events from 1988\u20132015."
  6: The total sea-level rise estimated by the SLAMM model for the study area is 0.1332
    meters by the year 2050.
  7: Suggests the total marsh area would reduce by about 5.4% due to SLR and marsh
    migration. Transitional salt marshes and irregularly flooded marshes are predicted
    to decrease by around 38% and 36%, respectively.
  8: Quantitative information includes percent changes in land cover types, reductions
    in flooded parcels, flood depths, and property damages under current and future
    conditions.
  9: Reduction in flood elevation and depth due to natural habitats averages from
    0.03 to 0.06 meters; property damage reduction can reach up to 13.8% under current
    conditions and up to 6.1% under future conditions.
  10: The analysis provides quantitative information on property damage and avoided
    damages due to natural habitats, reporting percent changes for various storm scenarios.
  11: The presence of natural habitats can reduce total property damage from storm
    surge flooding by 6.1% to 13.8%.
  12: The analysis used the relative difference between two scenarios using the same
    model formulation to estimate the potential of natural habitats to relatively
    reduce flood depth.
sourcematerial:
  1: " \n\"Storm surge and sea level rise are affecting coastal communities, properties,\
    \ and ecosystems. While coastal ecosystems, such as wetlands and marshes, have\
    \ the capacity to reduce the impacts of storm surge and coastal flooding, the\
    \ increasing rate of SLR can induce the transformation and migration of these\
    \ natural habitats. In this study, we combined coastal storm surge modeling and\
    \ economic analysis to evaluate the role of natural habitats in coastal flood\
    \ protection.\" \n\"We focused on a selected cross-section of three coastal counties\
    \ in New Jersey adjacent to the Jacques Cousteau National Estuarine Research Reserve...The\
    \ results indicate that this salt marshes can reduce up to 14% of both the flood\
    \ depth and property damage during relatively low intensity storm events...\"\n\
    \"Monetarily, this translates to the avoidance of up to $13.1 and $32.1 million\
    \ in residential property damage in the selected coastal counties during the \u2018\
    50-year storm\u2019 simulation and hurricane Sandy under current sea level conditions...\"\
    \n"
  2: 'Source material here.

    Coastal flooding from storm surge is a major concern for coastal communities worldwide,
    and is expected to increase with potential changes in storm climatology [...]
    The combined impacts of storm surge and SLR are expected to exacerbate [...] property
    damages in the coastal areas [9]. [...] Narayan et al. [35] also used high-resolution
    flood and loss models for 2,000 synthetic storm events to quantify the impacts
    of coastal wetlands on local annual flood losses in Barnegat Bay in Ocean County,
    New Jersey. The results of the study suggest that marsh can reduce property flood
    losses by an average of 16% annually. [...] The goal of our study was to estimate
    the value of flood protection services provided by protected coastal wetlands
    and marshes adjacent to the Jacques Cousteau National Estuarine Research Reserve
    (JCNERR) to a cross-section of three coastal counties in New Jersey. [...] The
    coupled version of the Advanced Circulation model (ADCIRC) and Simulating Waves
    Nearshore model (SWAN) was applied to compute the storm surge flooding for historical
    and synthetic storms. The Sea Level Affecting Marshes Model (SLAMM) was used to
    simulate the potential changes in natural habitats, especially coastal wetlands
    and marshes, due to SLR."

    '
  3: "Valuing natural habitats for enhancing coastal resilience that will not only\
    \ protect these communities, but also the ecosystems that can reduce the impacts\
    \ of coastal flooding. In order to implement these approaches, it is essential\
    \ to quantify the capacity and value of these natural habitats to protect communities\
    \ from recurrent coastal flooding. In addition, it is essential to work closely\
    \ with the coastal planners and natural resources area managers to integrate scientific\
    \ solutions into effective ecosystem management plans for the reservation and\
    \ conservation of the natural habitats [36]. This study improves upon the existing\
    \ literature in three ways. First, it uses parcel-level property values when estimating\
    \ avoided damages, which allowed for more spatially explicit results. Additionally,\
    \ it accounted for storm wind-driven wave effects, as wave setup can significantly\
    \ contribute to the increase in water levels due to hurricanes [37\u201339]. A\
    \ recent study [39] suggested that wave setup contributed to 17% of the peak water\
    \ level during most of the hurricane events during 1988\u20132015 in the US coast.\
    \ Second, this study incorporated SLR and its impacts on coastal wetlands and\
    \ marshes to provide a more realistic evaluation of the flood protection service\
    \ in future scenarios. Finally, in this study, an interdisciplinary team of coastal\
    \ engineers, marine and social scientists collaborated with natural resources\
    \ managers of the JC NERR to provide further insights on valuing natural habitats\
    \ for coastal resilience and support natural habitats restoration initiatives.\
    \ Materialsand methods Study area and Jacques Cousteau National Estuarine Research\
    \ Reserve The study area (Fig 1) includes the JCNERR and portions of three surrounding\
    \ counties: Ocean County, Burlington County, and Atlantic County. The JCNERR is\
    \ a protected area with more than 45,000 hectares of terrestrial and estuarine\
    \ ecosystems [40]. It is located along the"
  4: 'yaml

    Drivers of Risk: "More than 50% of the JCNERR is bounded by open water habitats,
    making the study area vulnerable to coastal flood hazards from storm surge and
    SLR."

    Methodology: "The coupled version of the coastal hydrodynamic model, ADCIRC, and
    the nearshore waves model, SWAN, was applied to the study area to simulate coastal
    flooding from storm surge and waves."

    '
  5: "The analysis focuses on enhancing coastal resilience through natural habitats,\
    \ with storm surge impacts as a primary concern. Although Manning\u2019s n parameterization\
    \ is suitable for storm surge modeling, improvement of model parameters and processes\
    \ is beyond the scope of our study. Protected area managers selected historical\
    \ and synthetic storms, such as Hurricane Sandy, demonstrating variations in coastal\
    \ flooding in the study area. SLAMM was applied to project potential changes in\
    \ natural habitats due to Sea Level Rise (SLR) in 2050 based on mid-century projections."
  6: 'Source material here: ...wave action, accretion rate, and the rate of SLR to
    model local changes in coastal ecosystems, such as wetland conversions... SLAMM
    estimated a total 0.1332m of SLR in the year 2050 for our study area. SLAMM uses
    coastal elevation, LULC, tidal and shoreline information, wave action, accretion
    rate, and the rate of SLR to model local changes in coastal ecosystems, such as
    wetland conversions...It applies different threshold values for tidal range, salinity,
    accretion and proximity to shoreline from previous literature [75] to determine
    whether coastal marshes can sustain their elevation relative to sea level or if
    they will migrate inland, convert into other land cover, or submerge under the
    sea.'
  7: "Valuing natural habitats for enhancing coastal resilience. Ecosystem service\
    \ valuation. The damages avoided method [23,35,92] was applied to value the ecosystem\
    \ service of shoreline protection to residential properties from natural habitats,\
    \ specifically coastal wetlands and marshes. The method considers value of the\
    \ protected properties as a measure of the flood protection services provided\
    \ by the natural habitats. For each storm event and for both current and future\
    \ LULC conditions, flood elevations for \u201Chabitat present\u201D and \u201C\
    habitat absent\u201D scenarios were simulated. In the \u201Chabitat absent\u201D\
    \ scenario, natural habitats were artificially replaced with open water in the\
    \ ADCIRC+SWAN model. The estimated difference in residential flood damages between\
    \ these two scenarios was used as the value of reduced, or avoided, damages provided\
    \ by the natural habitats. Flood damages were estimated using depth-damage functions\
    \ from the USACE [93], parcel level property data from the New Jersey Department\
    \ of Treasury [94], and mean flood depth from ADCIRC+SWAN. The simulated maximum\
    \ flood elevation due to each storm is incorporated into ArcGIS using the ArcStormSurge\
    \ [95] tool to create flood elevation raster for the study area. The flood depth\
    \ is then calculated by subtracting the land elevation values (from a 10m resolution\
    \ DEM for our area of interest) from the flood elevation raster. This analysis\
    \ focused on residential parcels and their associated \u201Cimprovement\u201D\
    \ value, which was used as the parcel value [96] for calculating monetary damages.\
    \ Improvement value refers to the value of \u201Cimprovements\u201D made to the\
    \ land which is usually the building value. Of the 111,866 residential parcels,\
    \ 92 were removed from the analysis because they had no information on assessed\
    \ value. An additional 7,847 parcels were removed because they had no information\
    \ on the number of stories or whether the building was split-level (inputs required\
    \ for the depth-damage functions). This resulted in a total residential parcel\
    \ population of 103,927 with the information required for analysis. Results from\
    \ SLAMM suggest the total marsh area, which includes transitional, regularly,\
    \ and irregularly flooded salt marshes, would reduce by about 5.4% in the study\
    \ area due to SLR and marsh migration (Table 2). For example, transitional salt\
    \ marshes and irregularly flooded marshes are predicted to decrease by around\
    \ 38% and 36%, respectively, and become regularly flooded salt marshes, which\
    \ increase considerably in the future."
  8: 'Source material: Table 2. SLAMM simulated land cover change within the study
    area... Reduction in flooding by natural habitats... According to the results
    from ADCIRC+SWAN, when natural habitats are present, up to 23.1% fewer residential
    parcels would be inundated under current conditions and up to 3.7% fewer under
    future conditions... reduce the mean parcel-level flood depths by a maximum of
    4.8% and 13.9% under current and future conditions respectively... mean proportional
    property damages can decrease up to 4.4% under current conditions and up to 4.0%
    under future conditions... The analysis uses SLAMM simulations for land cover
    change and ADCIRC+SWAN for flood and property damage assessments.'
  9: 'Source material here.

    Evaluation overview: "Our results also suggest that the presence of natural habitats
