  7: "text\nResilience Using Insurance of a climate shock on production...various\
    \ forms of indemnity insurance are presently available to the sector...parametric\
    \ insurance policies provide a payout from the insurer, triggered by an objective\
    \ measure of a correlate of losses (i.e. an environmental index). For example,\
    \ a parametric insurance policy would include an automated payout of some amount\
    \ to an insured party (i.e. a fisher or aquaculture operator) when some critical\
    \ environmental threshold is exceeded (e.g. prolonged sea surface temperatures\
    \ above some level)...Fisheries and aquaculture production is influenced by many\
    \ factors (e.g. ocean temperature, oxygen levels, and disease risk), and as a\
    \ result, so is revenue...Another form of insurance is parametric insurance (otherwise\
    \ known as index insurance; Maltby et al., 2022 ). Parametric insurance policies\
    \ provide a payout from the insurer, triggered by an objective measure of a correlate\
    \ of losses (i.e. an environmental index)...Various management regimes are specifically\
    \ designed to nurture cooperative behaviour among fishers. These frameworks facilitate\
    \ effective risk pooling and contribute to promoting sustainable resource management.\
    \ Key among these are Community-Based Fisheries Management (CBFM), co-management\
    \ approaches, Individual Transferable Quotas (ITQs), and Territorial Use Rights\
    \ for Fisheries (TURFs)...The advantages of parametric insurance over traditional\
    \ indemnity insurance are greatly reduced costs, as verification is not required,\
    \ and more timely payouts, as actual losses are not required to be verified post-event.\
    \ However, the main challenges with parametric insurance relate to the dimensionality\
    \ of the environmental index and its error with l osses\u2014this         is called\
    \ basis risk...First, as a cooperative, social norms can help manage issues relating\
    \ to moral hazard and adverse selection. Second, marrying an insurance policy\
    \ to existing social capital greatly increases the chance of up-take of the insurance\
    \ policy...The success of cooperative self-insurance relies heavily on the existence\
    \ of certain enabling conditions that smooth the way for the estab- lishment,\
    \ management, and long-term viability of these risk- sharing initiatives. Foremost\
    \ among these conditions are trust and social capital among fishers, which form\
