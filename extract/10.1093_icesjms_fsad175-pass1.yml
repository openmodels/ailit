sourcematerial:
  1: "Source material: \"For the Blue Foods economy\u2014those sectors that gain value\
    \ from the biological productivity of the oceans such as fisheries and aquaculture\u2014\
    climate shocks pose an existential threat. Species range shifts, harmful algal\
    \ blooms, marine heatwaves, low oxygen events, coral bleaching, and hurricanes\
    \ all present a serious economic risk to these industries... We suggest that a\
    \ convergence of the insurance industry and marine sectors, fostered through collaboration\
    \ with governments, academics, and NGOs will help usher in new forms of insurance,\
    \ such as ocean-index or parametric insurance. ...new risk-management tools have\
    \ the potential to help incentivize sustainable use of living marine resources,\
    \ as well as strengthening the economic resilience of coastal communities to climate\
    \ change. We argue that modern financial risk management tools, in particular\
    \ insurance (Beach and Viator, 2008), are central to our ability to bolster the\
    \ resilience of blue food supply chains and coastal communities, more broadly,\
    \ to climate shocks (Little et al. 2014, 2015).\""
  2: 'Source material here.

    Evaluation overview: "The continued exposure to these shocks is a serious threat
    to the maintenance of blue food supply chains and the associated food and income
    security of those individuals that work in these industries."


    Drivers of Risk: "Marine climate shocks such as marine heatwaves can impact productivity,
    for example, by creating conditions where corals bleach...a heatwave on land can
    result in below-average yields...and a marine heatwave might have similar impacts
    on the catch per unit effort of fishers or the growth of shellfish in an aquaculture
    operation."


    Highlights: "Insurance maintains the capital reserves that blue-food actors hold
    by reducing the volatility in income...enables blue-food actors to invest in the
    means to cope with future shocks...climate shocks have greater impacts on production
    and profit margins, and the overall adaptive capacity of coastal communities."

