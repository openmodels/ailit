    \ in direct revenue losses. For example, in 2015/2016, the highly important Dungeness\
    \ crab fishery on the United States west coast was closed due to a harmful al-\
    \ gal bloom, driven by a multi-year marine heatwave known as the \u201CBlob\u201D\
    \ (Cheung and Fr\xF6licher, 2020). The Dungeness crab fishery accounts for 26%\
    \ of all annual fishery revenue and supports > 25% of all commercial fishing vessels\
    \ in California alone. California Dungeness crab landings for the 2015\u201316\
    \ season reached only 52% of the average catch of the previous 5 years, with a\
    \ total value lost estimated at US$97.5 million (Jardine et al., 2020; Frankowicz,\
    \ 2021). Additionally, government disaster relief is now used regularly to help\
    \ mitigate the economic impacts of marine climate shocks. However, payments are\
    \ made many years after the event and cover only a fraction of the costs. In the\
    \ United States, there is a fear that the current approach to government disaster\
    \ relief for marine climate shocks will not work in the future (Bellquist et al.,\
    \ 2021). The development and uptake of effective insurance tools that overcome\
    \ issues relating to moral haz- ard, adverse selection, and risk pricing to transfer\
    \ risk and increase adaptive capacity in blue-food sectors is thus a critical\
    \ challenge and could offer a necessary improvement to gov- ernment disaster relief\
    \ for mitigating the impacts of marine climate shocks (Barange et al., 2018; Sainsbury\
    \ et al., 2019; Turner et al., 2020). For example, fisheries in Puerto Rico were\
    \ devastated by Hurri- cane Maria in September 2017 (Agar et al., 2020; Villegas\
    \ et al., 2021): the hurricane caused commercial landings to fall by 20% due to\
    \ the loss of productive assets and power for extended periods and reduced demand;\
    \ economic losses have been estimated at US$17.8 million; damaged fishing capital\
    \ (i.e., vessel, engine, and gear) and shoreside infrastructure accounted for\
    \ 51% of the losses and forgone fishing revenue the remaining 49%. It was not\
    \ until three years later (2021) that the US Federal Emergency Management Agency\
    \ (FEMA) announced that it would provide US$1.8 million in grants to fishers in\
    \ Puerto Rico to help cope with the impacts of the hur- ricane... Marine insurance\
    \ potentially provides an alternative mechanism (to federal disaster relief) to\
    \ reduce the vulnerability of these small fisheries to these shocks. Over the\
    \ period 1989\u20132020, 71 large-scale climate shocks have impacted fisheries\
    \ in the United States and been classified as federal disasters, amounting to\
    \ \u223C $3.2 billion (2019 USD) in direct revenue losses.\n"
  5: "These properties mean that fish stocks cannot be treated as private goods. [...]\
    \ Marine climate shocks can be detrimental to aquaculture operations even with\
    \ insurance. For example, in recent years, harmful algal blooms driven by anomalously\
    \ warm ocean conditions have led to large negative impacts on several large-scale\
    \ aquaculture operations. For example, in 2016, the convergence of extensive blooms\
    \ of two harmful algae species in Chile led to the most catastrophic event in\
    \ Chilean aquaculture to date. The event, known as the \u201CGodzilla-Red tide\u201D\
    , was linked to strong El Ni\xF1o conditions and the positive phase of the Southern\
    \ Annular Mode and caused the largest fish farm mortality ever recorded worldwide.\
    \ This resulted in an export loss of \u223CUS$800 million. [...] Most existing\
    \ insurance solutions are still used only by the larger aquaculture firms that\
    \ can afford the high premium rates. There remains a significant challenge for\
    \ most aquaculture operations worldwide, which typically are small-scale operations\
    \ in the Global South. [...] Addressing these constraints will require collaborative\
    \ efforts by stakeholders in the aquaculture industry, including producers, researchers,\
    \ government agencies, and insurers. Improved data collection, better biosecurity\
    \ measures, and the development of more resilient strains of fish and shellfish\
    \ could all help reduce risk and uncertainty, making it easier for insurers to\
    \ provide affordable coverage. Importantly, the development of innovative insurance\
    \ products, such as parametric insurance, which pays out when certain parameters\
    \ are met rather than requiring proof of loss, could also play a role in expanding\
    \ coverage options. [...] The absence of quality data with which to quantify and\
    \ price risk and methods to attribute a specified loss to a particular climate\
    \ shock is one such challenge. [...]"
