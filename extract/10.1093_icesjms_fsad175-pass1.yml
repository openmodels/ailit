  8: "Source material: Governments have a substantial role to play in promoting cooperative\
    \ self-insurance among fishers and creating an environment conducive to private\
    \ solutions for managing marine climate shocks. ... Marine tourism and recreational\
    \ fisheries are also important alternative or main livelihoods for people in coastal\
    \ communities, and they also rely on access to healthy and abundant marine species\
    \ and habitats. Disruption of tourist activities such as diving, fishing, whale\
    \ watching, and visits to seabird and marine mammal colonies can occur because\
    \ of marine extreme events. Coral bleaching because of marine heatwaves disrupted\
    \ national (e.g. the Seychelles) and regional (e.g. the Great Barrier Reef) economies,\
    \ with individual operators idle as tourist visitation was reduced. Cyclones damage\
    \ both habitats and infrastructure and disrupt tourism businesses for some time\
    \ after the event. ... Protecting the base of blue food supply chains using insurance\
    \ designed for climate shocks will help increase the resilience of entire blue\
    \ food supply chains, and hence the coastal communities more broadly defined,\
    \ to climate change. ... Insurance must be carefully designed to not reduce this\
    \ natural form of adaptive capacity and, thus, the diversity of employment in\
    \ coastal communities. ... Another role that the government can play is in the\
    \ provision of subsidies (M\xFCller et al., 2017 ). Premium prices for indemnity\
    \ or parametric insurance can be beyond what a potential purchaser could afford...\
    \ Government subsidy can support communities proactively by paying for (some fraction\
    \ of) premiums or offering tax credits, for example, rather than through retrospective\
    \ disaster relief say."
