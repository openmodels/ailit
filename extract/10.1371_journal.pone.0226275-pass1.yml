Drivers of Risk:
  1: Storm surge and sea level rise (SLR).
  2: Storm surge and sea level rise (SLR).
  5: Hurricane Sandy (2012), a 400-year storm event, was selected as the historical
    storm.
  6: Sea level rise (SLR) and wetland conversions and shoreline modifications due
    to SLR.
  7: Changes in natural habitats from sea level rise (SLR) and marsh migration are
    impacting flood protection services.
  8: Sea level rise (SLR), storms (25-year, 50-year, Sandy), changes in land cover.
  9: Storm events, such as Hurricane Sandy and potential future storm conditions,
    impacting flooding and property damage.
  10: The drivers of risk are coastal storms (25-year, 50-year, and Hurricane Sandy)
    and sea level rise (SLR) under current and future (2050) scenarios.
  11: Storm surge flooding and sea level rise are the primary drivers of risk examined
    in this study.
  12: Storm surge, sea level rise.
  16: No relevant information
Evaluation overview:
  1: Property damage from storm surge and sea level rise.
  2: Flood protection services provided by coastal wetlands and marshes.
  5: No relevant information
  7: The analysis evaluates the ecosystem service of shoreline protection to residential
    properties from natural habitats such as coastal wetlands and marshes.
  8: Reduction in flooding and property damage due to the presence of natural habitats.
  9: The analysis evaluates the reduction in flooding and property damage due to the
    presence of natural habitats during storm events.
  10: The study evaluates the value of natural habitats in providing flood protection
    services to residential properties.
  11: The paper evaluates the reduction in property damage due to the presence of
    wetlands and marshes during storm surge flooding.
  12: Reduction in flood depth and property damage due to natural habitats.
  16: No relevant information
Highlights:
  1: Protecting and preserving natural habitats can contribute to enhance coastal
    resilience.
  2: Aims to integrate the natural variability of coastal storm surge and impacts
    of SLR on natural habitats into the economic valuation of flood protection services.
  5: The study models storm surge and wave impacts on coastal areas, considering the
    influence of land cover types.
  6: The study attempts to predict the impact of SLR on coastal landscapes, focusing
    on the ability of coastal marshes to sustain their elevation or migrate.
  7: The study suggests that the decrease in certain marsh types and the increase
    of tidal flats due to SLR indicate potential inland migration and conversion of
    wetlands and marshes into tidal flat.
  8: The presence of natural habitats can reduce the number of inundated residential
    parcels, flood depths, and property damages during storm events under both current
    and future climate conditions.
  9: Natural habitats can reduce flood elevation by a maximum of 0.2 to 0.4 meters,
    and avoided damage can range from $8,500,000 to $13,000,000 under current conditions
    during a single storm event.
  10: The value of flood protection services provided by natural habitats varies from
    $53,000 to $138,000 per square kilometer under current and future conditions,
    respectively.
  11: Natural habitats provide substantial flood protection during recurrent flooding
    events. Marshes showed higher potential in the 25-year and 50-year storms than
    Hurricane Sandy, indicating higher efficacy of natural flood protection during
    relatively frequent, low-intensity storms.
  12: Natural habitats can reduce both storm surge flood depth and property damage
    under current and future marsh conditions and under sea level rise. Natural habitats
    may offer better protection from relatively frequent, low intensity storms. Natural
    habitats can increase resilience in areas that are vulnerable to storm surge and
    sea level rise.
  16: No relevant information
Methodology:
  1: Combined coastal storm surge modeling and economic analysis, using ADCIRC+SWAN
    to simulate flooding and SLAMM to project habitat transformation due to SLR. A
    counterfactual land cover approach (marshes converted to open water) was used
    to estimate flooding avoided due to natural habitats.
  2: Uses the coupled version of the Advanced Circulation model (ADCIRC) and Simulating
    Waves Nearshore model (SWAN) to compute storm surge flooding for historical and
    synthetic storms. The Sea Level Affecting Marshes Model (SLAMM) was used to simulate
    potential changes in natural habitats due to SLR. Simulated flood depths were
    combined with parcel-level property data to compute flood damages.
  5: The historical and synthetic storms were selected based on the recommendations
    by the protected area managers to capture variations in coastal flooding in the
    study area.
  6: Use of SLAMM model to simulate coastal ecosystem changes, with the model start
    date set to 2010 and using various input data on elevation and tidal information.
  7: The damages avoided method was applied, simulating 'habitat present' and 'habitat
    absent' scenarios to estimate flood damages; residential flood damages were estimated
    using depth-damage functions, property data, and flood elevations.
  8: SLAMM (Sea Level Affecting Marshes Model) simulates land cover change. ADCIRC+SWAN
    is used to model flooding. Results are applicable to the study area under current
    conditions and a future (2050) sea level rise scenario.
  9: The ADCIRC+SWAN model is used to simulate flooding with and without habitat presence
    under current and future storm conditions.
  10: A place-based analysis focused on flood protection services by coastal wetlands
    and marshes within and adjacent to the Jacques Cousteau National Estuarine Research
    Reserve (JCNERR) across three coastal counties in New Jersey.
  11: The analysis utilizes hydrodynamic and wave models. The SLAMM model is used
    to model marsh migration and transition under sea level rise.
  12: The study used the relative difference between two scenarios using the same
    model formulation to estimate the potential of natural habitats to relatively
    reduce flood depth. Three storm events were considered.
  16: No relevant information
More Notes:
  1: The study focuses on three coastal counties in New Jersey adjacent to the Jacques
    Cousteau National Estuarine Research Reserve (JCNERR).
  2: The study area is focused on the Jacques Cousteau National Estuarine Research
    Reserve (JCNERR) and three coastal counties in New Jersey.
  5: The study uses SLAMM to project potential changes in natural habitats due to
    SLR in the year 2050.
  6: The SLAMM model applied in this study is noted to have limitations and uncertainties,
    particularly in estimating marsh changes due to SLR.
  8: The authors state that some of the percent change values they compute are 'statistically
    significant' at the 95% confidence level, when habitat is present versus absent;
    this qualification is only explicitly applied to Table 3. The paper cites other
    tables that may be useful in the complete document.
  9: The map visually highlights the distribution of habitats like sandy regions in
    Ocean County, contributing to understanding their impact on coastal resilience.
  11: The study acknowledges a limitation in representing wave energy dissipation
    by vegetation, as the model doesn't account for different plant characteristics
    and their wave dissipation mechanisms.
  12: The study only analyzed the protection to residential structures, which suggests
    that these ecosystem service values are conservative estimates. The study emphasizes
    the need for primary data collection in coastal wetlands and marshes during storm
    events for improved quantification of their flood reduction capacity. There is
    also need for improved understanding about the biophysical interactions between
    natural habitats, extreme flooding events, sea level rise, and the sustainability
    of these natural ecosystems in the future.
  16: No relevant information
Quantitative material:
  1: Salt marshes can reduce up to 14% of both the flood depth and property damage
    during relatively low intensity storm events.
  2: Estimates the value of flood protection services based on the value of protected
    residential properties.
  5: "Two synthetic storms were selected from the US Army Corps of Engineers (USACE)\
    \ North Atlantic Coast Comprehensive Study (NACCS) storm database, with a 4% (\u201C\
    25-year storm\u201D) and 2% (\u201C50-year storm\u201D) respective probability\
    \ of occurrence in any given year."
  6: SLR estimation of 0.1332m by the year 2050 in the study area.
  7: The total marsh area is predicted to reduce by about 5.4% due to SLR and marsh
    migration.
  8: 'Table 2: Shows simulated land cover change (km^2 and %) under current and future
    scenarios, including increases in regularly-flooded marsh and tidal flats, and
    decreases in transitional salt marsh, riverine tidal open water, and irregularly
    flooded marsh. Table 3: Shows changes in number of flooded parcels, mean parcel-level
    flood depth (m), and percent of property damage (mean) with and without natural
    habitats under current and future (2050 SLR) scenarios. For example, under current
    conditions with natural habitats present, 23.13% fewer residential parcels would
    be inundated during a 25-year storm, flood depths are reduced by 4.76%, and property
    damage is reduced by 4.39%. With 2050 SLR, 1.32% fewer parcels would be flooded
    during a 25-year storm when habitats are present, depths decrease by 6.45%, and
    property damage decreases by 0.84%.'
  9: Reductions in flood elevation vary from 0.03m to 0.06m on average, while property
    damage reduction can be up to 13.8% under current conditions and up to 6.1% in
    future conditions.
  10: In the 2050 SLR scenario, the presence of natural habitats avoids 1.23% and
    6.05% of property damage in 25-year and 50-year storm scenarios, respectively.
    For Sandy, the avoidance is 0.36% and 1.25% for current and 2050 conditions, respectively.
  11: Natural habitats can reduce total property damage from storm surge flooding
    by 6.1% to 13.8%. A maximum of 0.2 to 0.4m reduction in flood depth is found due
    to the presence of natural habitats. There will be a loss of 5.4% of the total
    marsh area due to sea level rise by 2050 in the study area.
  12: The results also found large difference between maximum and average reduction
    in flood elevation due to presence of the natural habitats.
  16: No relevant information
sourcematerial:
  1: "  \n\"Storm surge and sea level rise (SLR) are affecting coastal communities,\
    \ properties, and ecosystems.\"\n\n\"In this study, we combined coastal storm\
    \ surge modeling and economic analysis to evaluate the role of natural habitats\
    \ in coastal flood protection.\"\n\n\"The results indicate that this saltmarshes\
    \ can reduce up to 14% of both the flood depth and property damage during relatively\
    \ low intensity storm events.\"\n\n\"In theselected coastal counties during the\
    \ \u201850-year storm\u2019 simulation and hurricane Sandy under current sea level\
    \ conditions, and in the year \u20182050 SLR scenario\u2019, respectively.\"\n\
    \n\"Protecting and preserving natural habitats can contribute to enhance coastal\
    \ resilience.\"\n\n\"We focused on a selected cross-section of three coastal counties\
    \ in New Jersey adjacent to the Jacques Cousteau National Estuarine Research Reserve\
    \ (JCNERR) that is protected by wetlands and marshes.\"\n"
  2: 'Source material here.

    Coastal flooding from storm surge is a major concern for coastal communities worldwide,
    and is expected to increase... SLR is also likely to affect natural habitats in
    coastal areas, such as wetlands and marshes... The goal of our study was to estimate
    the value of flood protection services provided by protected coastal wetlands
    and marshes... The coupled version of the Advanced Circulation model (ADCIRC)
    and Simulating Waves Nearshore model (SWAN) was applied to compute the storm surge
    flooding for historical and synthetic storms. The Sea Level Affecting Marshes
    Model (SLAMM) was used to simulate the potential changes in the natural habitats...
    The simulated flood depths were combined with publicly available parcel-level
    property data to compute flood damages for the selected storms... aims to integrate
    the natural variability of coastal storm surge and impacts of SLR on the natural
    habitats into the economic valuation of the flood protection services... to a
    cross-section of three coastal counties in New Jersey.

    '
  5: "Hurricane Sandy (2012), a 400-year storm event, was selected as the historical\
    \ storm as it is currently the most catastrophic storm event in the Mid-Atlantic\
    \ [71]. Two synthetic storms were selected from the US Army Corps of Engineers\
    \ (USACE) North Atlantic Coast Comprehensive Study (NACCS) storm database. The\
    \ NACCS developed an extensive database of synthetic storms based on observed\
    \ records of storm surge and meteorological data for historical storms events\
    \ along the US east coast from 1938 to 2013 [72]. Based on the storm surge and\
    \ wave characteristics within the study area, these synthetic storms have a 4%\
    \ (\u201C25-year storm\u201D) and 2% (\u201C50-year storm\u201D) respective probability\
    \ of occurrence in any given year [72]. The historical and synthetic storms were\
    \ selected based on the recommendations by the protected area managers to capture\
    \ variations in coastal flooding in the study area. other land cover is addressed\
    \ using the Garret\u2019s drag law [68]. Although the representation of vegetated\
    \ canopies through these frictional parameters, especially Manning\u2019s n, is\
    \ considered as a suitable practice for modeling storm surge in coastal landscape\
    \ [15,35,69,70], they do not explicitly account for vegetation heights, density\
    \ or diameter. SLAMM was applied to the study area to project potential changes\
    \ in natural habitats due to SLR in the year 2050."
  6: '`

    Drivers of Risk: "SLAMM estimated a total 0.1332m of SLR in the year 2050 for
    our study area," and "changes in coastal ecosystems, such as wetland conversions
    and shoreline modification, from long-term SLR."

    Quantitative material: "SLAMM estimated a total 0.1332m of SLR in the year 2050
    for our study area."

    Methodology: "SLAMM uses coastal elevation, LULC, tidal and shoreline information,
    wave action, accretion rate, and the rate of SLR to model local changes in coastal
    ecosystems."

    Highlights: "It should be noted that there are uncertainties and limitations in
    projecting both future SLR and coastal landscape or salt marshes response to the
    projected SLR."

    More Notes: "While SLAMM has been widely applied to estimate the potential impacts
    of SLR on coastal wetlands in the US, it is not the most robust modeling tool
    to predict marsh changes due to SLR."

    '
  7: 'Source material here: The analysis evaluates the ecosystem service of shoreline
    protection to residential properties from natural habitats, specifically coastal
    wetlands and marshes. Results from SLAMM suggest the total marsh area, which includes
    transitional, regularly, and irregularly flooded salt marshes, would reduce by
    about 5.4% in the study area due to SLR and marsh migration. The damages avoided
    method was applied to value the ecosystem service of shoreline protection by simulating
    "habitat present" and "habitat absent" scenarios. Flood damages were estimated
    using depth-damage functions from the USACE, parcel-level property data, and mean
    flood depth from ADCIRC+SWAN. The study suggests that the decrease in certain
    marsh types and the increase of tidal flats due to SLR indicate potential inland
    migration and conversion of wetlands and marshes into tidal flat.'
  8: " \nEvaluation overview: \"According to the results from ADCIRC+SWAN, when natural\
    \ habitats are present, up to 23.1% fewer residential parcels would be inundated\
    \ under current conditions and up to 3.7% fewer under future conditions (Table\
    \ 3). The presence of the natural habitats are also expected to reduce the mean\
    \ parcel-level flood depths by a maximum of 4.8% and 13.9% under current and future\
    \ conditions respectively. Additionally, the mean proportional property damages\
    \ can decrease up to 4.4% under current conditions and up to 4.0% under future\
    \ conditions due to the presence of the natural habitats.\"\n\nDrivers of Risk:\
    \ \"Reduction in flooding by natural habitats According to the results from ADCIRC+SWAN,\
    \ when natural habitats are present, up to 23.1% fewer residential parcels would\
    \ be inundated under current conditions and up to 3.7% fewer under future conditions\
    \ (Table 3).\"\n\nQuantitative material: \"When natural habitats are present,\
    \ up to 23.1% fewer residential parcels would be inundated under current conditions\
    \ and up to 3.7% fewer under future conditions (Table 3). The presence of the\
    \ natural habitats are also expected to reduce the mean parcel-level flood depths\
    \ by a maximum of 4.8% and 13.9% under current and future conditions respectively.\
    \ Additionally, the mean proportional property damages can decrease up to 4.4%\
    \ under current conditions and up to 4.0% under future conditions due to the presence\
    \ of the natural habitats. All of these rate of changes (percent change) are greatest.\"\
    \n\nMethodology: \"SLAMM simulated land cover change within the study area. Reduction\
    \ in flooding by natural habitats According to the results from ADCIRC+SWAN, when\
    \ natural habitats are present, up to 23.1% fewer residential parcels would be\
    \ inundated under current conditions and up to 3.7% fewer under future conditions\
    \ (Table 3).\"\n\nHighlights: \"When natural habitats are present, up to 23.1%\
    \ fewer residential parcels would be inundated under current conditions and up\
    \ to 3.7% fewer under future conditions (Table 3).\"\n\nMore Notes: \"Statistically\
    \ significant increase compared to habitat present scenario at the 95% confidence\
    \ level.\"\n"
  9: " \nResults from the ecosystem service valuation suggest that presence of the\
    \ natural habitats can reduce total property damage in the study area up to 13.8%\
    \ under current conditions and up to 6.1% in future conditions considering the\
    \ selected storm events... The presence of natural habitats can reduce the flood\
    \ elevation in the shoreline areas... Depending on the storm event and sea level\
    \ rise conditions, presence of coastal wetlands and marshes...can lower the flood\
    \ elevation by a maximum of 0.2 to 0.4 meters...the ADCIRC+SWAN model showing\
    \ simulated flooding with and without habitat present under current conditions\
    \ and a Hurricane Sandy storm event...\n"
  10: 'Source material

    The goal of this study was to estimate the value of flood protection services
    provided by natural habitats and provide insights on how these services may alter
    with SLR. Property Damage (Habitat Present), Property Damage (Habitat Absent),
    25-year storm, 50-year storm, Sandy, 2050 SLR Scenario. Results suggest that one
    square kilometer of natural habitats can reduce residential property damages in
    the study area from $34,000 to $53,000 per square kilometer under current conditions
    and from $7,000 to $138,000 per square kilometer under future conditions for the
    selected storm events. The results show that the natural habitats can protect
    up to $13.1 and $32.1 million of residential property damage during the selected
    storm events in the study area in the current condition and the future scenario
    respectively. $82,062,657, $91,894,099, $9,831,442, 11.98%, $94,888,388, $107,972,822,
    $13,084,434, 13.79%. $125,436,468, $126,980,226, $1,543,758, 1.23%, $329,190,819,
    $349,122,514, $19,931,695, 6.05%, $2,322,731,031, $2,331,067,963, $8,336,932,
    0.36%, $2,562,559,835, $2,594,648,892, $32,089,057, 1.25%. The place based analysis
    focused on the flood protection services by the coastal wetlands and marshes within
    and adjacent to the JCNERR to a cross-section of three coastal counties in New
    Jersey. suggests that the per square kilometer value of their flood protection
    services vary from a maximum of $53,000 to $138,000 under current and future conditions.

