sourcematerial:
  1: " \nOcean and coastal ecosystems also provide many important non-market services\
    \ including subsistence food provisioning, health benefits, shoreline protection,\
    \ climate regulation, conservation of marine biodiversity, and preservation of\
    \ cultural heritage. As climatic changes occur, these benefits or ecosystem services\
    \ may be significantly reduced. \nThe U.S. Exclusive Economic Zone (EEZ) encompasses\
    \ approximately 3.4 million square nautical miles of ocean and a coastline of\
    \ over 12,300 miles. Along with the Great Lakes, this vast area generates ~US\
    \ 370 billion of U.S. gross domestic product, 617 billion in sales and 2.6 million\
    \ jobs each year.\nThis article is part of a Special Issue on \u201CNational Indicators\
    \ of Climate Changes, Impacts, and Vulnerabilitys\u201D.\n"
  2: 'yaml

    Evaluation overview: "Here, we discuss a set of indicators designed in close collaboration
    with the U.S. National Climate Indicators System. Tracking the impacts via indicators
    will be essential to ensure long-term health of the marine environment and sustain
    the benefits to stakeholders who depend on marine ecosystem services."

    Drivers of Risk: "The effects of climate-related changes such as ocean warming,
    deoxygenation, acidification, coastal flooding, droughts, rising seas, and extreme
    weather can be far reaching and unpredictable given the complex relationships
    between physical, chemical, biological, and human variables within ocean and coastal
    ecosystems"

    Quantitative material: "The US exclusive economic zone (EEZ) encompasses approximately
    3.4 million square nautical miles of ocean and a coastline of over 12,300 miles...this
    vast area generates ~ US$370 billion of US grossdomestic product, $617 billion
    in sales, and 2.6 million jobs each year (NOAA2019)."

    Highlights: "This article describes indicators of ocean and coastal ecosystems
    that were identified in that process to help track climate-related processes and
    impacts in these important areas...Along with the Great Lakes, this vast area
    generates ~ US$370 billion of US grossdomestic product, $617 billion in sales,
    and 2.6 million jobs each year"

