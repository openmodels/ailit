  15: Developing and tracking indicators of climate change impacts in ocean and coastal
    ecosystems across the range of ecosystem services are needed to better understand,
    prepare for, and respond to these changes... Long-term monitoring efforts are
    critical to tracking impacts, providing early warning of impending changes, and
    making effective decisions in a changing world. ...Information on climate impacts
    in ocean and coastal ecosystems lags many other areas despite the significant
    ecosystem services provided by these systems. ...Already, some of the indicators
    described here are being used to inform fisheries management... For example, the
    Mid-Atlantic Fishery Management Council (MAFMC) is using some of the biological
    and social indicators as part of a stakeholder-driven risk assessment to help
    guide fishery management strategies... Finally, we recommend continued support
    for tracking existing indicators and increased funding for developing the new
    indicators needed to effectively track and respond to climate change impacts on
    US ocean and coastal systems.
