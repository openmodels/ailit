  4: "                                                                           \
    \                                                                            \
    \                                                  Climatic          Change\n\
    The ocean and coastal indicators described here are not meant to be directly causative.\
    \ Rather, they are based on a new conceptual model of intrinsic connections between\
    \ climate processes, physical attributes of the ocean itself, living organisms\
    \ that inhabit the ocean, and people that depend on the ocean and coasts. The\
    \ model describes, based on existing information and hypotheses, how these indicators\
    \ interactively support individuals and communities in meeting their social, economic,\
    \ subsistence, and cultural needs (Fig. 1). Throughout the development process,\
    \ the Oceans and Coasts Team (Team) emphasized identification of potential indicators\
    \ with robust science-based connections to anthropogenic climate change and pre-existing\
    \ time-series monitoring data. The goal was to identify a system that is flexible\
    \ and scalable such that individuals, communities, and the Nation can follow the\
    \ indicators to track ecological and societal changes. The indicator system described\
    \ here can also be used to recognize opportunities to mitigate against some long-term\
    \ changes and adapt to others, thus reducing impacts and increasing resilience.\n\
    Ecosystem services are defined very broadly as \u201Cthe benefits people obtain\
    \ from ecosystems\u201D (MEA 2005). The conceptual model above (Fig. 1) illustrates\
    \ the many regulatory services (e.g., climate regulation), supporting services\
    \ (e.g., primary productivity, habitat), provisioning\nservices, cultural services,\
    \ and related livelihoods associated with ocean and coastal systems. This model\
    \ framework identifies and categorizes various services provided by these ecosystems\
    \ as well as stressors impacting them, such as anthropogenic GHG emissions. \n"
  5: "Source material here.\nEvaluation overview: \"services (e.g., extractive activities\
    \ such as food fish or energy sources), and cultural services (e.g., native peoples\u2019\
    \ rituals, multi-generational fishing traditions, and nature tourism) provided\
    \ by oceans and coasts, as well as highlights economic and cultural livelihoods\
    \ through ocean-related jobs and activities.\"\n\nDrivers of Risk: \"For example,\
    \ human activities resulting in greenhouse gas (GHG) emissions influence the global\
    \ climate system and exert substantial pressures on the ocean and coastal environment,\
    \ including a rise in ocean temperatures. As a result, warming oceans may drive\
    \ poleward shifts in the geographic range of marine fish in search of preferred\
    \ temperatures.\"\n\nMethodology: \"The goal of the NCIS is to identify key points\
    \ along the ecosystem services pathway that may be impacted by climate change\
    \ and can provide an early warning of changes to come and, critically, how those\
    \ changes might reverberate through the other system components. Therefore, based\
    \ on this conceptual model, the Team attempted to identify representative indicators\
    \ that not only showed changes to specific services and benefits but also the\
    \ linkages between regulating, supporting, provisioning, and cultural services.\"\
    \n\nHighlights: \"Thus, climate change may require updating fishery management\
    \ practices as well as initiating activities designed to mitigate and/or adapt\
    \ to climate stressors.\"\n\nMore Notes: \"We looked for those indicators that\
    \ could be accurately measured and could function as the 'canary in the coal mine'\
    \ for larger-scale climatic shifts and anticipated changes to ocean ecosystem\
    \ services.\"\n"
  6: "yaml\nEvaluation overview: \"Based on assessment of existing literature, 21\
    \ indicators were identified that met the defined criteria, could provide valuable\
    \ information for tracking large-scale changes to the marine environment, and\
    \ addressed at least one of the ecosystem service categories within the conceptual\
    \ model\"\nDrivers of Risk: \"Oceans and coasts provide regulatory services through\
    \ their interactions with other earth systems (e.g., freshwater systems, terrestrial\
    \ systems, climate systems); see Fig. 1. For example, oceans and coasts help to\
    \ regulate global temperatures and circulation patterns, carbon capture and burial,\
    \ storm severity, and heat absorption. \"\nMethodology: \"To generate a list of\
    \ useful indicators for the NCIS, it was important to consider sub-national, national,\
    \ and global scales as well as temporal scales ranging from climatic (centuries),\
    \ to biotic (decades), and to time frames for resource decision-making (1\u2013\
    2 years).\" \"Based on assessment of existing literature, 21 indicators were identified\
    \ that met the defined criteria...\" \"We attempted to determine the stability\
    \ and longevity of each indicator dataset as well as institutional commitment\
    \ to continue monitoring efforts into the foreseeable future.\"\nHighlights: \"\
    Of the nine indicators recommended by the Team, four were selected for inclusion\
    \ in the pilot NCIS: sea surface temperature (SST), arctic sea ice extent, ocean\
    \ chlorophyll concentration, and sea level rise.\"\n"
  9: '

    In the open ocean, long-term declines in aragonite saturation state are directly
    caused by increases in atmospheric CO2 (Doney et al. 2020). Information on species
    sensitivity to OA conditions documented through laboratory experiments, modeling
    exercises, and limited field observations indicates that exposure to acidified
    conditions can increase coral bioerosion, change phytoplankton community composition,
    reduce recruitment of calcifying organisms, alter development and neurobiology
    of some fish species, and reorganize ecosystems (Kroeker et al. 2013; Busch and
    McElhany 2016; Marshall et al. 2017; Doo et al. 2020). These impacts will cascade
    into the tourism industry (reef diving), commercial fishery production (both bivalves
    and crustaceans), and subsistence use of reef fish, bivalves, and crustaceans
    (Doney et al. 2020). Communities where commercial or subsistence fishing depends
    largely on bivalves or crustaceans will be most heavily impacted (Mathis et al.
    2015; Ekstrom et al. 2015). But even smaller levels of dependence on bivalves
    or crustaceans may be critical to overall economic viability for some fishing
    communities (Colburn et al. 2016, Hodgson et al. 2018).'
  10: Source material here. changes in ocean temperature (sensu Pinsky et al. 2013;
    Thorson et al. 2017). Coral thermal stress describes the occurrence, duration,
    and magnitude of high SST events. As fish stock distributions change, the composition
    of ocean ecosystem communities also changes, thereby affecting predator/prey dynamics
    and competitive interactions. Coral reefs are areas of high biodiversity; they
    provide significant economic benefits through tourism and recreational and commercial
    fishing, protect coastlines from storm surges, and are focal points for subsistence
    fishing. This indicator was considered operational and added to the NCIS (renamed
    USGCRP Indicators Catalog 5) in 2020. This indicator is considered operational
    and slated for addition to subsequent iterations of the NCIS.
  11: " \nEvaluation overview: \"Indicators that assess the climate vulnerability\
    \ and social well-being of coastal communities, especially in relation to fishing,\
    \ are now available nationally and ready for inclusion.\"\n\nDrivers of Risk:\
    \ \"The nationally applicable indicator is sea level rise (SLR) risk for US coastal\
    \ county communities...Currently available for some states only includes sea level\
    \ rise risk and affected seafood businesses...\"\n\nMethodology: \"The indicators\
    \ are complex and composed of multiple indices, based primarily on data from the\
    \ US Census Bureau and the National Marine Fisheries Service (NMFS).\"\n\nHighlights:\
    \ \"Together these create an initial set of indices that can predict the vulnerability\
    \ of US communities to various components of climate.\"\n"
  12: Source material here. Climatic Change... Community social well-being indicators
    assess and track social factors that affect a community's ability to cope with
    climate or other types of change. Each of these indicators is composed of a set
    of indices which are themselves created from NMFS landings data, NMFS recreational
    fishing effort data, and/or publicly available US Census data... Social vulnerability
    indicators characterize pre-existing conditions that reflect states of susceptibility
    to harm, including differential access to resources... For example, a community
    with high social vulnerability (e.g., high poverty and/or a high cost of housing)
    could experience a decrease in affordable housing as sea level rises... Communities
    with high dependence on fishing and high social and/or high gentrification pressure
    vulnerability may be less resilient to the effects of climate change. For example,
    a community with social well-being vulnerabilities that is traditionally dependent
    on climate-vulnerable species may be more affected by fishery species range shifts
    due to climate change (e.g., increasing sea surface temperature, ocean acidification)...
    The community social well-being indicators identify vulnerable populations that
    may be less able to withstand and recover from climate change and socioeconomic
    impacts.
  13: Climatic Change improve existing indicators (especially for social and habitat
    categories, and for data overall at national to regional scales), and (3) research
    to develop additional indicators to adequately track and communicate climate impacts,
    risks, vulnerabilities, and preparedness in ocean and coastal systems. Improve
    existing indicators A useful indicator system for assessing climate change impacts
    on oceans and coasts will require a number of key steps, including reducing lags
    between data collection and indicator delivery, improving spatial and temporal
    representation of indicators, reducing the costs of indicator production (e.g.,
    new analyses or sampling methods), identifying directionality and thresholds,
    ensuring the indicators have measurable targets, and ensuring that decision-makers
    have the tools and ability to use the information. Subsistence fisheries Subsistence
    fisheries provide food security and cultural value to coastal communities, and
    generate revenue for local economies via purchases to support fishing activities
    and for government agencies via permit fees. Climate change has the potential
    to alter the abundance and distribution of living marine resources harvested in
    subsistence fisheries. Currently, data on subsistence fishing are lacking from
    nearly every region. We recommend continued support for data collection for current
    indicators, coupled with priority research funding directed toward developing
    new indicators. Further, it is key to have indicators with strongly supported
    data streams that are designed to be integrated into existing and planned future
    management efforts.
