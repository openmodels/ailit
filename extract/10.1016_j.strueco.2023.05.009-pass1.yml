    "More Notes": "To advance the establishment of adaptation plans for a potentially
    unpredictable future because of climate change, the identification of such key
    temperature thresholds is crucial (Hallegatte, 2009)... This is an econometric
    pitfall related to trended variables that can be addressed by introducing variable
    specification of temperature deviation from its respective historical norm to
    explore the long-run impacts of climate change on macro-economic output across
    countries."

