  7: "Source material here.\nEvaluation overview: \"The mechanism by which climate\
    \ impacts are modelled is critical as even the smallest growth effects would ultimately\
    \ outweigh large level effects... Moyer et al. (2014) simulated the impacts of\
    \ temperature on productivity growth using an IAM and discovered even a tiny growth\
    \ effect to have a significant effect on the optimal climate policy.\" \nDrivers\
    \ of Risk: \"Growth is impacted by (i) the short-run impact of a change in temperature\
    \ by the impact on the productivity level, (ii) a temporary impact on growth rate\
    \ to converge with the long-run growth rate of the economy, and (iii) the long-run\
    \ productivity growth rate.\"\nMethodology: \"To incorporate these growth shocks\
    \ into damage assessment in an IAM... Compared with the original DICE-2016 damage\
    \ function predictions, the authors determined that the social cost of carbon\
    \ is higher than three times higher when incorporating the damage function calibrated\
    \ by their empirical results into the DICE-2016.\"\nHighlights: \"The use of level\
    \ and growth effects to evaluate climate change impacts has given rise to a long-standing...\
    \ controversy in the literature... determining that enabling climate change to\
    \ directly shock GDP growth would greatly boost the optimal mitigation rate in\
    \ the near term.\"\nMore Notes: \"Modelling adaptation effects based on climate\
    \ econometrics is a profound and challenging research topic; however, it is one\
    \ of the least researched subfields in climate economics... a dearth of data regarding\
    \ the aggregated costs and benefits of adaptations.\"\n"
  8: "Source material here.\n\"In terms of functional forms, the choice of linear\
    \ or non-linear models significantly impacts the magnitude of damage estimates.\
    \ The linear specification is suitable for estimating short-run weather impacts\
    \ but it would result in a biased estimation of economic losses as it doesn\u2019\
    t take long-term adaptations into consideration.\"\n\"Furthermore, concerning\
    \ the reduced form of the temperature\u2013GDP relationship, this study provides\
    \ a careful review of the development of the specifications of the econometrics\
    \ model along historical lines.\"\n\"This potential improvement would reduce the\
    \ bias of projecting future climate impacts by climate econometrics models.\"\n\
    \"Based on new hybrid panel models including mixed characteristics of the above\
    \ model specifications, recent research trends have been distinguishing the impacts\
    \ of short-, medium- and long-run variations in weather and climate to further\
    \ capture the adaptation effects.\"\n\"We find that one of the reasons that climate\
    \ econometrics is an essentially academic pursuit is that such research can provide\
    \ empirical evidence for improving damage functions in IAMs.\"\n"
