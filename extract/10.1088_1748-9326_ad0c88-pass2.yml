  4: "yaml\nEvaluation overview: \"Gulf of Alaska sockeye salmon support a commercial\
    \ fishery with an average ex-vessel value of $64.4M USD during the last decade\
    \ [32 ], and are an important cultural, subsistence, and recreational resource...This\
    \ analysis followed four steps. First, we confirmed the negative relationship\
    \ between ocean warming and sockeye productivity [27 ] with a Bayesian regression\
    \ model relating catch to three-year running mean SST\"\nDrivers of Risk: \"Productivity\
    \ in this species (adult offspring per spawner) shows strong response to ocean\
    \ temperature at multiple life history stages, such that three-year running mean\
    \ SST is a better predictor of productivity than annual SST [25 ,27 ].\"\nQuantitative\
    \ material: \"All five regions, plus the overall North Pacific, have reached temperatures\
    \ that can be attributed to human activities with high confidence (i.e. FAR >\
    \ 0.98). In particular, North Pacific SST has effectively become fixed in an anthropogenic\
    \ state, with FAR\u2A7E 0.99 for three-year running mean SST since 2003, and for\
    \ annual SST since 2013 (figure 3).\"\nMethodology: \"The CMIP6 multi-model probability\
    \ of extreme events was estimated with a weighted Bayesian regression using annual\
    \ probability... Then we defined the probability density by resampling the multi-model\
    \ population of anomalies from each warming increment, weighting each model based\
    \ on the weighting criteria described above...Bayesian models were fit using Stan\
    \ 2.21.0 [ 34 ] and R 4.1.2 [ 35 ].\"\nHighlights: \"North Pacific SST has effectively\
    \ become fixed in an anthropogenic state, with FAR\u2A7E 0.99 for three-year running\
    \ mean SST since 2003, and for annual SST since 2013 (figure 3).\"\n"
