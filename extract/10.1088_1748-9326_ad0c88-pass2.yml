  2: "Source material here: This temporal context can be critical for effective adaptation\
    \ decision-making. For instance, relating declining productivity of fish stocks\
    \ to increasing human influence over regional temperatures may provide information\
    \ about declining fisheries sustainability, a critical adaptation challenge for\
    \ stakeholders [17]. Our overall objective is to use attribution time series to\
    \ measure changes in human influence on marine climate over time as an approach\
    \ for recognizing and understanding the impacts of human-induced climate change\
    \ on ecosystem services. Ocean warming has profound consequences for fisheries\
    \ production and other critical ecosystem services globally. For instance, we\
    \ apply EEA techniques to time series of sea surface temperature (SST) observations\
    \ for the North Pacific basin and five regional ecosystems during 1950\u20132022.\
    \ We calculated FAR and RR values for ERSSTv5 SST observations from 1950\u2013\
    2022. Model bias and non-independence may make the equal weighting of climate\
    \ models suboptimal, so we weighted CMIP6 models to reward model skill and independence.\
    \ Our specific goals are to: (1) build attribution time series to document the\
    \ evolution of human influence on North Pacific and regional SST; (2) evaluate\
    \ changes in the expected return time for extreme SST events (the warmest conditions\
    \ observed to date) in historical, current, and decadal-scale future climates\
    \ as an additional approach for illustrating the speed and magnitude of climate\
    \ change effects in the North Pacific; and (3) demonstrate the potential of attribution\
    \ statistics for contextualizing climate change and informing adaptation decision-making\
    \ by comparing outcomes for an ecosystem service (fisheries catch) under different\
    \ degrees of human influence on the climate."
