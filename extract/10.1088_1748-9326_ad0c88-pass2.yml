  8: "The page evaluates the impact of warming effects on the Gulf of Alaska sockeye\
    \ salmon commercial fishery, focusing on log commercial catch anomalies. Drivers\
    \ of Risk: \"Imposed shocks include sea surface temperature (SST) anomalies and\
    \ the fraction of attributable risk (FAR) due to anthropogenic warming. Highlights\
    \ the relationship between SST anomalies and catch anomalies, and provides RR\
    \ values indicating increased human-attributed temperature risks in the North\
    \ Pacific. Employs Bayesian regression to analyze the relationship between SST,\
    \ FAR, and catch anomalies, indicating periods with varied levels of anthropogenic\
    \ influence. Demonstrates a persistent trend of increasing human influence on\
    \ North Pacific climate, affecting SST and thereby sockeye salmon catches.\" In\
    \ the time since FAR values could first be distinguished from zero, the proportion\
    \ of risk that can be ascribed to human activities has grown from detectable to\
    \ overwhelming, as indicated by RR values on the order of 10^1\u201310^4 at the\
    \ regional scale (figure 4). The temporal evolution of climate change is often\
    \ quantified with time of emergence studies, and this approach has provided important\
    \ temporal context for adaptation and mitigation planning. The climate attribution\
    \ time series presented in this study provide a complementary perspective on the\
    \ evolution of human influence over North Pacific climate, based on evaluating\
    \ the growing evidence for human impacts on temperature."
  9: "yaml\nEvaluation overview: \"Rather than attempting to attribute changes to\
    \ fisheries catches using coupled biological-physical modeling, we use a \u2018\
    system-breaking\u2019 climate change event [21] to answer a more tractable adaptation\
    \ question: how has the performance of this fishery changed during higher temperatures\
    \ that are overwhelmingly likely to be the result of anthropogenic forcing?\"\n\
    Drivers of Risk: \"Results frame in this way may be one avenue to supporting stakeholders\
    \ in discounting past experience when evaluating current climate risk [15].\"\
    \ and \"Our results indicate that deleterious temperatures should be expected\
    \ as often as not in the current climate, and that temperatures that appear necessary\
    \ for healthy catches will become rare once North Pacific warming exceeds 1.5\
    \ \u25E6C.\"\nQuantitative material: \"In our case study, the system-breaking\
    \ event is the 1.4 SD decline in log-transformed sockeye salmon catch at temperatures\
    \ corresponding to FAR >= 0.98.\" and \"This result is consistent with the view\
    \ that contemporary surface temperatures have in many cases reached levels that\
    \ were impossible under preindustrial conditions [46].\"\nMethodology: \"Rather\
    \ than attempting to attribute changes to fisheries catches using coupled biological-physical\
    \ modeling, we use a \u2018system-breaking\u2019 climate change event [21] to\
    \ answer a more tractable adaptation question...We propose that using an attribution\
    \ statistic as an explanatory variable in an ecosystem services model, rather\
    \ than SST or a heatwave index, may provide valuable context for adaptation decision-making\
    \ [5\u20137].\" and \"This case study is made possible by the long history of\
    \ research establishing a causal link between SST and sockeye salmon productivity\
    \ [27, 33, 49, 50], which allows us to assign causality to the correlation between\
    \ FAR values and catches.\"\nHighlights: \"Our results also show that the evidence\
    \ for human influence on North Pacific temperatures is consistently stronger for\
    \ three-year running mean SST than for annual SST values.\" and \"The implications\
    \ of this growing human influence on climate risk for stakeholders is illustrated\
    \ by the rapid decline in expected return times for extreme SST anomalies (figure\
    \ 5).\" and \"Our results indicate that deleterious temperatures should be expected\
    \ as often as not in the current climate...\"\nMore Notes: \"Important uncertainties\
    \ must be kept in mind when evaluating our results. Most notably, global climate\
    \ models were not designed for regional-scale analysis [56].\" and \"Regional\
    \ SST is highly influenced by atmosphere-ocean interactions and circulation [57,\
    \ 58], and the ability of models to project these processes under thermodynamic\
    \ forcing is difficult to evaluate [54]. This is a limitation for most attribution\
    \ studies [20].\"\n"
