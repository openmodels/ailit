Drivers of Risk:
  1: Human influence on regional sea surface temperatures (SST).
  2: Ocean warming is identified as a major factor impacting fisheries production
    and ecosystem services in the North Pacific basin.
  3: Changes in sea surface temperatures in the North Pacific region are considered
    as a driver of risk.
  4: The primary driver of risk identified is ocean warming, specifically changes
    in sea surface temperature (SST) in the Gulf of Alaska.
  5: Human-induced climate change impacting sea surface temperature anomalies in the
    North Pacific and regional ecosystems.
  6: Changes in sea surface temperature (SST) anomalies due to human activities are
    impacting the outcomes, such as ecosystems and fisheries responses.
  7: North Pacific warming, specifically extreme annual SST events and exceeding a
    critical threshold of three-year running mean SST.
  8: Imposed shocks include sea surface temperature (SST) anomalies and the fraction
    of attributable risk (FAR) due to anthropogenic warming.
  9: Rising sea surface temperatures (SST) driven by anthropogenic forcing are the
    primary driver of risk, impacting sockeye salmon populations.
  10: Warming of the entire North Pacific
  13: Projected increases in sea surface temperature (SST) across various regions
    in the Pacific Ocean.
  14: No relevant information
Evaluation overview:
  1: Impacts of human-induced ocean warming on ecosystem services, specifically sockeye
    salmon fishery catches in the Gulf of Alaska.
  2: The paper aims to evaluate the changes in human influence on marine climate as
    an approach for understanding the impacts of human-induced climate change on ecosystem
    services, particularly fisheries.
  4: The analysis provides an overview of the impact of ocean warming on the productivity
    of the Gulf of Alaska sockeye salmon, highlighting its negative effect on fishery
    harvests.
  6: The paper provides an overview of the impact of human activities on sea surface
    temperature (SST) anomalies and their frequency, and the related impact on sockeye
    salmon catches.
  7: Changing climate risk for fisheries, focusing on sea surface temperature (SST)
    events.
  8: The page evaluates the impact of warming effects on the Gulf of Alaska sockeye
    salmon commercial fishery, focusing on log commercial catch anomalies.
  9: The paper evaluates the impact of anthropogenic forcing on North Pacific sockeye
    salmon fisheries.
  10: No relevant information
  14: No relevant information
Highlights:
  1: "Human influence on North Pacific ocean temperatures could first be detected\
    \ in the 1970s and grew until 2014\u20132020 showed overwhelming evidence of human\
    \ contribution. Temperatures have reached levels that were likely impossible in\
    \ the preindustrial climate at the basin scale. Strongest evidence for human influence\
    \ in the northernmost ecosystems (Eastern Bering Sea and Gulf of Alaska)."
  2: The paper's goal is to demonstrate how attribution statistics can be used to
    contextualize climate change and inform adaptation decision-making in relation
    to fisheries sustainability in various climate scenarios.
  4: North Pacific SST has effectively become fixed in an anthropogenic state since
    2003 for three-year running mean SST and since 2013 for annual SST, indicating
    significant human influence on warming.
  5: Arctic amplification contributes to significant SST anomalies in the North Pacific
    and Northeast Pacific ecosystems.
  6: "The Eastern Bering Sea experienced the largest annual SST anomaly of 5.08 SD,\
    \ and anomalies are projected to occur every \u2248 40 years in the current climate."
  7: "Temperatures at or above the threshold of 2.08 SD above pre-1950 SST were rare\
    \ to uncommon in historical climates but are close to the median value in the\
    \ current climate and are projected to represent cooler-than-normal conditions\
    \ at 1.5 \u25E6C\u20132.0 \u25E6C warming."
  8: Demonstrates a persistent trend of increasing human influence on North Pacific
    climate, affecting SST and thereby sockeye salmon catches.
  9: The paper concludes that anthropogenic influence on North Pacific temperatures
    is strong and that deleterious temperatures for sockeye salmon should be expected
    as often as not in the current climate. They also highlight the rapid increase
    in risk for events associated with fisheries failure.
  10: No relevant information
  11: Model weights showed a stronger effect of skill weight than independence weight,
    with varying model democratic tendencies across different North Pacific regions.
  13: The steepest increases in SST are projected to occur towards the end of the
    century.
  14: No relevant information
Methodology:
  1: Climate attribution techniques (Bayesian estimates of FAR and RR) applied to
    sea surface temperature time series (1950-2022) from five regional North Pacific
    ecosystems using 23 global climate models.
  2: The analysis utilizes Fraction of Attributable Risk (FAR) and Risk Ratio (RR)
    techniques, employing SST observations and CMIP6 model data from 1950 to 2022,
    and weights models based on skill and independence.
  3: The analysis uses CMIP6 models with SSP5-8.5 and SSP2-4.5 scenarios to evaluate
    sea surface temperature (SST) changes, weighting models based on bias, trend,
    variability, and autocorrelation.
  4: The analysis employs Bayesian regression models to evaluate the relationship
    between SST and sockeye productivity, utilizing CMIP6 model outputs and resampling
    techniques to derive probability densities.
  5: Utilizes CMIP6 model runs (Historical, SSP2-4.5, SSP5-8.5) and ERSSTv5 observations
    to assess SST anomalies and attributable risk.
  6: The analysis used Bayesian posteriors to determine when FAR values for SST could
    not be distinguished from zero with 95% credible intervals.
  7: "Multi-model estimates of Risk Ratio (RR) for annual and three-year running mean\
    \ SST with 95% credible intervals, 1950\u20132022. Historical, current, and short-term\
    \ future expectations for extreme annual SST events based on observed data (ERSSTv5)\
    \ and two CMIP6 emissions scenarios."
  8: Employs Bayesian regression to analyze the relationship between SST, FAR, and
    catch anomalies, indicating periods with varied levels of anthropogenic influence.
  10: "Calculates attribution statistics for North Pacific sea surface temperature\
    \ from 1950-2022. Defines \u2018present\u2019 conditions relative to estimated\
    \ warming of the entire North Pacific expected for the 15 year window centered\
    \ on the year of interest. Uses CMIP6 model outputs, weighted by skill and independence,\
    \ to calculate Fraction of Attributable Risk (FAR) and Risk Ratio (RR) values.\
    \ Skill and independence are based on bias in climatology, variability, autocorrelation,\
    \ and the trend in SST."
  11: "The analysis uses a perfect model setup to tune shape parameters \u03C3D and\
    \ \u03C3S and perform model weighting based on historical and projected sea surface\
    \ temperature (SST) trends."
  13: Use of CMIP6 models to project SST changes, using model weights indicated by
    varying line colors, and a perfect model setup to select shape parameters for
    weighting models in hindcasting and projecting warming rates.
  14: The paper uses skill weight, independence weight, and combined weight for weighting
    North Pacific warming hindcasts and projections.
More Notes:
  1: Attribution time series may be helpful indicators for better defining the human
    role in observed climate change impacts and may thus help researchers, managers,
    and stakeholders to better understand and plan for the effects of climate change.
  3: The study area includes specific named regions in the North Pacific, with a focus
    on analyzing temperature variations.
  7: The analysis focuses on the North Pacific Ocean and regional ecosystems (Eastern
    Bering Sea, Gulf of Alaska, British Columbia Coast, Northern California Current,
    Southern California Current). The paper shows a time series for risk ratios from
    1950-2022, and provides estimates of expected return times for SST anomalies under
    different warming scenarios.
  9: The paper acknowledges that global climate models may not be designed for regional-scale
    analysis. The ability of models to project atmosphere-ocean interactions is difficult
    to evaluate, which is a limitation for most attribution studies.
  10: "Model weighting criteria also reflect an ecological consideration as bias is\
    \ important because nonlinear biological responses to temperature make the actual\
    \ temperature (i.e. in \u25E6C), rather than the anomaly important; the trend\
    \ in SST describes the rate of change in the climate; interannual variability\
    \ and auto-correlation are important because the red noise in SST is an important\
    \ driver of fisheries variability"
  14: The ORCID ID for Michael A. Litzow is provided.
Quantitative material:
  1: "FAR (Fraction of Attributable Risk) and RR (Risk Ratio) values for North Pacific\
    \ SST. Regional SST values that were expected every 1000\u201310000 years in the\
    \ preindustrial climate are expected every 5\u201340 years in the current climate.\
    \ Sockeye salmon catches are 1.4 standard deviations below the long-term log mean\
    \ in years with FAR >= 0.98."
  2: The analysis calculates Fraction of Attributable Risk (FAR) and Risk Ratio (RR)
    to quantify human influence on sea surface temperature (SST) anomalies.
  3: The paper provides mean sea surface temperature data from 1854-2022 and uses
    a binomial Bayesian regression model to generate estimates for preindustrial and
    present conditions.
  4: Human activities have led to a high confidence attribution of SST changes, with
    FAR values exceeding 0.98 for the North Pacific and regional ecosystems for certain
    periods.
  5: Fraction of Attributable Risk (FAR) > 0.5 in Northern ecosystems for three-year
    running mean SST since 1984.
  6: "Declines in sockeye harvests were documented, with a reported decline of 1.4\
    \ SD in ln(catch) for high-FAR years (FAR \u2A7E 0.98), corresponding to a 39%\
    \ decline in raw catch."
  7: "FAR values in the high-anthropogenic state (FAR \u2A7E 0.98) correspond with\
    \ a critical threshold of three-year running mean SST 2.08 SD above the pre-1950\
    \ climatology."
  8: Highlights the relationship between SST anomalies and catch anomalies, and provides
    RR values indicating increased human-attributed temperature risks in the North
    Pacific.
  9: The paper finds that temperatures corresponding to a FAR (Fraction of Attributable
    Risk) >= 0.98 are associated with a 1.4 standard deviation decline in log-transformed
    sockeye salmon catch. Also finds that contemporary surface temperatures have in
    many cases reached levels that were impossible under preindustrial conditions.
  10: "The probability of a given anomaly for \u2018present\u2019 conditions was then\
    \ calculated as the proportion of anomalies equal to or greater than the observed\
    \ anomaly within the relevant span of North Pacific warming"
  11: Results show that at least 80% of 'true' values fall between the 10th and 90th
    quantiles of weighted prediction, except for the Southern California Current region
    which reached 79.3%.
  13: Predicted warming trends in SST are illustrated, with a noted increasing trend
    towards the end of the century from model simulations.
