  11: "Source material here.\nBased on the results of the perfect model setup, we\
    \ adopted a value of \u03C3S = 0.4 for all regions. Values of \u03C3D varied between\
    \ 1.16 and 1.84 for the different regions. All regions reached the desired threshold\
    \ of 80% of \u2018true\u2019 values falling between the 10th and 90th quantiles\
    \ of weighted prediction with these combinations except for the Southern California\
    \ Current, which reached 79.3%.\nModel weights in this approach are highly dependent\
    \ on the value of \u03C3D. Low values of \u03C3D can result in an overly precise\
    \ estimate based on only a few models, and large values of \u03C3D tend towards\
    \ model democracy. Model weighting results are generally less sensitive to \u03C3\
    S. We used a perfect model setup to tune the values of \u03C3D and \u03C3S to\
    \ achieve the desired precision in weighted model estimates.\nCombined weights\
    \ (wi) calculated using these shape parameters showed a stronger effect of skill\
    \ weight than independence weight. Normalized values of model weights (where a\
    \ weight of one corresponds to an unweighted model) showed the most tendency towards\
    \ model democracy for the North Pacific and Southern California Current, and the\
    \ strongest weighting for individual models in the British Columbia Coast. The\
    \ relationship between SST observations and modeled values by weight is plotted\
    \ in figure A4.\n"
