  13: "Source material here.\nStorm surges: Relative SLR compounds with storm surges\
    \ and coastal flooding from tropical (hurricane, typhoons) and extra-tropical\
    \ (mid-latitude, particularly winter-time) storms in increasing the size and reach\
    \ of episodic flooding events. Increased frequency in these compound flooding\
    \ events has been already detected (Seneviratne et al., 2021). A newer study (Tebaldi\
    \ et al., 2021c), not assessed by AR6 WGI, shows how changes in the return period\
    \ of current 100-yr events are extremely sensitive to warming of even just 1.5\
    \ \u25E6C, and the relative sea level rise that accompanies it by 2100. Accordingly,\
    \ a large percentage of coastal locations over the world\u2019s ice-free coastal\
    \ areas see the historical 100-yr event becoming an annual event by 2100, even\
    \ if warming is strongly limited. This is true in particular, but not exclusively,\
    \ of locations in the subtropics. \n...\nSea level rise: Gradual SLR has been\
    \ happening at an accelerated rate since the 19th century, with the past two decades\
    \ recording a rate almost double that of the preceding decades. Global-mean SLR\
    \ during the 20th century happened at a faster rate than over any preceding century\
    \ in at least the last 3,000 years. SLR depends on global warming in a complex\
    \ way, due to the long timescales over which GSAT warming translates in warming\
    \ of the ocean waters and melting of glaciers and ice-sheets. That lagged response\
    \ compels us to always associate GWLs to specific time periods for this CID. The\
    \ result is that until mid-century, SLR does not show a strong dependence on scenarios,\
    \ and will likely (that is, with at least 66 % probability) be between 0.15 and\
    \ 0.30 m. By 2100 the outcome will depend on the scenario more strongly, with\
    \ a rise of 0.44 m (0.34\u20130.59) for a GWL of 1.5 \u25E6C; 0.51 m (0.40\u2013\
    0.69) for a GWL of 2 \u25E6C; 0.61 m (0.50\u20130.81) for a GWL of 3 \u25E6C;\
    \ 0.70 m (0.58\u20130.92) for a GWL of 4 \u25E6C; and 0.81 m (0.69\u20131.05)\
    \ for a GWL of 5 \u25E6C. For warming levels in excess of 2 \u25E6C, ice sheet\
    \ behavior exhibits deep uncertainty, and substantially higher SLR may be possible.\
    \ For 5 \u25E6C of warming, ice sheet processes in which there is limited agreement\
    \ across modeling approaches and therefore low confidence could drive global mean\
    \ sea level rise approaching 2 m.\n"
  14: 'The paper focuses on the hazard component of risk, acknowledging that exposure,
    vulnerability, adaptation, and mitigation also contribute to the ultimate outcome.
    With this work we are offering a physical climate perspective on drivers of risk,
    i.e., we focus on the hazard component, aware that it is only one of multiple
    factors - including exposure, vulnerability and possible adaptation and mitigation
    responses - contributing to the ultimate outcome. In particular, we present a
    catalogue of climatic impact-drivers (CIDs) that, by having the potential to become
    hazards, can be expected to contribute to the severity of representative key risks
    (RKRs). The assumption is that the storm surges are enhanced by the amount of
    relative sea level rise experienced at that location by 2100, if global temperature
    reaches that GWL by that date. Surface ozone levels could respond linearly to
    GSAT increases but with differing effects depending on the ozone regime. In low
    pollution regions, decreases of 0.2 to 2 ppbv per degree of warming are expected.
    In high pollution regions, i.e. regions close to sources of ozone precursors,
    an increase of the same absolute magnitude is expected. The analysis identifies
    climatic impact-drivers (CIDs) that can become hazards and contribute to the severity
    of representative key risks (RKRs). The map shows the global warming level (GWL)
    at which a current 100-yr coastal flood event becomes an annual event, based on
    projections of relative sea level rise by 2100 at each location. Table 3 summarizes
    our findings. We distinguish cases where a quantitative relation was drawn (by
    a pink shade of the cells), where only a qualitative but robustly unidirectional
    relation was drawn (by a yellow shade), and cases where no such relation has been
    characterized (by a blue shade). The effects of future climate change on air pollution
    through changes in natural sources of pollution precursors remain very uncertain
    (Szopa et al., 2021). Extreme air pollution events can be favored by specific
    meteorological conditions (e.g. heatwaves, temperature inversions and atmospheric
    stagnation episodes) over highly polluted areas. These conditions are influenced
    by climate change, but the correlation between such meteorological conditions
    and high concentrations of ozone and PM2.5 have been shown to be regionally and
    metric dependent. '
  15: "  \n\"Evaluation overview\": \"physical climate outcomes are in themselves\
    \ a cogent aspect of future scenarios\" and \"Aspects of the physical climate\
    \ system that vary as a direct function of warming are for the most part aggregated\
    \ metrics, or coarse patterns\".\n\"Drivers of Risk\": \"hazards considered can\
    \ be put in a direct, strong relationship with global temperature changes\" and\
    \ \"patterns of regional warming and mean precipitation change, sea surface temperature\
    \ warming, snow cover, permafrost thawing,...heat extremes, tropical cyclone intensity,\
    \ marine heatwaves, droughts and fire weather, storm surges as results of winds\
    \ and sea level rise combined\".\n\"Methodology\": \"global perspective on changing\
    \ climatic impact-drivers to serve a synthetic assessment based on global warming\
    \ levels rather than particular scenarios of emissions and therefore warming\"\
    .\n\"Highlights\": \"this work shows that many of the hazards considered can be\
    \ put in a direct, strong relationship with global temperature changes\" and \"\
    the message that every increment of global warming matters (IPCC 2021a,b) is further\
    \ substantiated and reinforced by this work\".\n\"More Notes\": \"the hazard component\
    \ as only one of the determinants, sometimes not even the major one, of climate\
    \ risks\" and \"obtain a realistic assessment of future risk and possibly future\
    \ opportunities that associated adaptation responses may present\".\n"
