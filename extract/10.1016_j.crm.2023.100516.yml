sourcematerial:
  2: " \nDrivers of Risk: \"We identify the relevant hazards for each RKR, based upon\
    \ the WGII authors\u2019 assessment, and we report on their current state and\
    \ expected future changes in magnitude, intensity and/or frequency, linking these\
    \ changes to Global Warming Levels (GWLs) to the extent possible.\"\n\nMethodology:\
    \ \"In this study we offer a representation \u2013 as systematic as possible given\
    \ current literature and assessments \u2013 of the future evolution of the hazard\
    \ components of RKRs.\"\n"
  3: "Source material here.\nFor some of these quantities - like regional trends in\
    \ oceanic and atmospheric temperature and precipitation, some heat and precipitation\
    \ extremes, permafrost thaw and Northern Hemisphere snow cover - a strong and\
    \ quantitative relationship with increasing GWLs has been identified. For others\
    \ - like frequency and intensity of tropical cyclones and extra-tropical storms,\
    \ and fire weather - that link can only be described qualitatively. For some processes\
    \ - like the behavior of ice sheets, or changes in circulation dynamics - large\
    \ uncertainties about the effects of different GWLs remain, and for a few others\
    \ - like ocean pH and air pollution - the composition of the scenario of anthropogenic\
    \ emissions is most relevant, rather than the warming reached. In almost all cases,\
    \ however, the basic message remains that every small increment in CO2 concentration\
    \ in the atmosphere and associated warming will bring changes in climate phenomena\
    \ that will contribute to increasing risk of impacts on human and natural systems,\
    \ in the absence of compensating changes in these systems\u2019 exposure and vulnerability,\
    \ and in the absence of effective adaptation. In this paper, we offer the limited\
    \ but necessary perspective of the physical climate science, by identifying climatic\
    \ impact-drivers (CIDs, Ranasinghe et al., 2021; Ruane et al., 2022) that have\
    \ the potential to become hazards relevant to the various risks constituting the\
    \ eight RKRs. Once identified, the relation between the CIDs/hazards and the magnitude\
    \ of global warming is characterized and, where possible, quantified.\n"
  4: 'C. Tebaldi et al. 2.1. RKR-A: Risk to the integrity of low-lying coastal socio-ecological
    systems ... A wide range of potential hazards are relevant to this RKR. These
    may be gradual climatic changes like sea level rise, the warming of sea surface
    temperatures (SSTs), the thawing of permafrost in Arctic coastal regions, the
    decrease in extent and thickness of sea ice, ocean acidification. Alternatively,
    they may be episodic extreme events like marine heatwaves, storm surges, and winds
    from tropical and extratropical cyclones. Hazards can also compound, for example
    when storm surges are made higher by sea level rise. 2.2. RKR-B: Risk to terrestrial
    and ocean ecosystems ... Hazards discussed in Section 2.1, as relevant for RKR-A,
    such as SST warming, sea ice loss and ocean acidification are also relevant for
    ocean/coastal ecosystems as are tropical cyclones and marine heatwaves. Heat extremes
    (Seneviratne et al., 2021; Ranasinghe et al., 2021) on land or water (including
    marine heatwaves) can with time under increased warming exceed upper thermal limits
    for living organisms. ... Fire weather conditions conducive to wildfires are also
    significant drivers of this type of risk."

    '
