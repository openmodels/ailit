  6: "From the page of the paper:\n\nFor these types of risks a wide range of hazards\
    \ related to the water cycle may be relevant, from changes in the average patterns\
    \ of precipitation causing stress on water availability, to extreme precipitation\
    \ events causing flooding and related damages, to severe droughts. In addition,\
    \ expected changes in snow cover and mass loss of glaciers are hazards not only\
    \ affecting water availability, whose quantity and duration is in some region\
    \ strongly dependent on snowfall magnitudes and timing, but endangering ways of\
    \ life, identity, and culture for the local population.\n\nRisks to peace and\
    \ human mobility...increased frequency of extreme events may exacerbate conditions\
    \ leading to conflict, and even sea-level rise (SLR) linked to low warming can\
    \ add to stress on a population that could find its territory permanently submerged\
    \ or frequently flooded.\n\nWe will qualify, as needed, the actual metric(s) used\
    \ to describe the hazards...using Global Surface Air Temperature (GSAT) warming\
    \ with respect to the pre-industrial baseline of 1850\u20131900. GSAT is a model-derived\
    \ quantity based on globally averaging land and marine near-surface temperatures...\n\
    \nThe warming signal averaged over the Arctic region has already emerged from\
    \ internal variability...projected to continue at a rate between 2 and 2.4 times\
    \ faster than GSAT, over the 21st century...more recent work not assessed by the\
    \ IPCC WGI report has found the Arctic region warming at a rate close to 4 times\
    \ faster than GSAT over the last 40 years.\n"
  8: Summary of the expected behavior of CID/hazards relevant to the eight RKRs as
    a function of global surface air temperature (GSAT) warming. When possible, a
    quantitative relation is specified and those hazards are highlighted by pink shading;
    when only a direct, qualitative relation is assessed the cells are colored yellow;
    for those metrics with no robust relation with warming, cells are colored blue.
    When available, levels of confidence are those assigned by the IPCC AR6 WGI assessment,
    which constitutes the origin of the information presented here.
  9: "Source material here.\nglobal average SSTs will increase between 2 \u25E6C and\
    \ 4 \u25E6C under High warming (SSP5-8.5, reaching GWLS between 3.6 \u25E6C and\
    \ 6.9 \u25E6C); but only between 0.4 \u25E6C and 1.5 \u25E6C under Low warming\
    \ (SSP1-2.6, reaching GWLs between 1.3 \u25E6C and 2.8 \u25E6C) (see Fig. 2a).\
    \ Extreme heat: On the global scale, the frequency and intensity of heat extremes\
    \ have increased since the 1950s (corresponding to\nglobal average SSTs will increase\
    \ between 2 \u25E6C and 4 \u25E6C underHigh warming (SSP5-8.5, reaching GWLS between\
    \ 3.6 \u25E6C and 6.9 \u25E6C);\nbut only between 0.4 \u25E6C and 1.5 \u25E6C\
    \ under Low warming (SSP1-2.6, reaching GWLs between 1.3 \u25E6C and 2.8 \u25E6\
    C) (see Fig. 2a).\nThus, if one focuses on 2081\u20132100 outcomes,\nto happen\
    \ \u2013 globally averaged \u2013 at a rate of about 80 % that of GSAT warming.\n"
  10: " \nEvaluation overview: Both the number of days and nights exceeding their\
    \ climatological 90th percentile have increased, and so has the duration of heat\
    \ waves. These global trends are reflected in most regions of the world where\
    \ sufficient data are available for assessment.\nDrivers of Risk: Such a non-linear\
    \ relation is detectable starting at GWLs as low as 1.5 \u25E6C. But even those\
    \ metrics that have been shown to vary linearly in GSAT are projected to see changes\
    \ more than double the magnitude of GSAT warming (in the mid-latitudes) when not\
    \ larger (in the high-latitude regions).\nQuantitative material: 10-yr events\
    \ are already 3 times more frequent than during pre-industrial conditions, becoming\
    \ about 4, 6 and 9 times more frequent for 1.5 \u25E6C, 2 \u25E6C and 4 \u25E6\
    C respectively. 50-yr events are already 5 times more frequent, and would become\
    \ about 9, 14 and 40 times more frequent at those GWLs. The frequency of these\
    \ types of events is now already 30 % higher than during pre-Industrial conditions,\
    \ and it is projected to become 1.5, 2 and 3 times more frequent for 1.5 \u25E6\
    C, 2 \u25E6C and 4 \u25E6C respectively.\nMethodology: Pattern scaling (Santer\
    \ et al., 1990; Tebaldi and Arblaster, 2014) can fairly accurately represent also\
    \ the scaling of mean precipitation with GSAT showing which regions will experience\
    \ wetting rather than drying and by what percentage, per degree of GSAT warming.\n\
    Highlights: It is virtually certain that intense rare events will increase in\
    \ frequency over all continents for GWLs larger than 2 \u25E6C.\n"
  11: "Source material here. Floods: Inland floods induced by heavy precipitation\
    \ are expected to produce increasing flooded area extent... Droughts: Drought\
    \ events... Fire weather: Metrics specifically designed to characterize fire-conducive\
    \ conditions... ENSO variability... Tropical cyclones... Extra-tropical storms...\
    \ IPCC (2021) shows frequency of 10-yr drought events having already increased\
    \ and continuing to follow GSAT warming, with events being now 1.7 times more\
    \ frequent, and projected to be 2,2.4 and 4 times more frequent at 1.5 \u25E6\
    C, 2 \u25E6C and 4 \u25E6C respectively. Intensity, here measured as a factor\
    \ of the climatological standard deviation (sd) of the drought metric utilized\
    \ is already 0.3sd drier, and will be 0.5sd, 0.6sd and 1sd drier at those GWLs.\
    \ For drought, regional warming and corresponding effects on soil moisture drying\
    \ and land\u2013atmosphere feedbacks are especially relevant at local scales...\
    \ The rain intensity that accompanies these storms has already increased...Some\
    \ regions of the world are already seeing more likely occurrences of fire-weather,\
    \ and the direction of change will continue towards increased occurrence and severity\
    \ with GSAT warming.\"\n"
