Drivers of Risk:
  1: Urban floods resulting from rainfall (pluvial flood)
Evaluation overview:
  1: No relevant information
Highlights:
  1: Demonstrates an accurate prediction capability for urban flood mapping. Extended
    the model's application to develop a Near Real-Time flood mapping system. Achieved
    high-resolution (10-meter) flood extent predictions.
Methodology:
  1: Developed a deep learning model (U-Net) using CNN network to predict near-real
    time urban flood extents. Used daily rainfall and Sentinel-1 imagery from 2014-2023.
More Notes:
  1: The sensitivity analysis shows the importance of different input data combinations
    for model accuracy. Using all of the available data provides the best overall
    performance, while Rainfall provides the lowest performance.
Quantitative material:
  1: Ground Truth Index of 84.05%
