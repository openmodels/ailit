    \ S as a function of E and G survival classes and their interaction.\"\n\"In \
    \ step  1  we  modeled ... (step  7).\"\n\nHighlights: \"Highlights: A classification\
    \ tree is used to predict meteorological survival class based on meteorological\
    \ covariates (MSce).\"\n\"Using the classification tree was possible to predict\
    \ meteorological survival class based on meteorological covariates (MSce).\"\n\
    \nMore Notes: \"More Notes: The conditional inference tree methodology used in\
