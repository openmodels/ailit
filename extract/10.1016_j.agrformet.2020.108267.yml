  5: "M.A. Secchi et al. Fig. 2. Conditional inference tree of canola meteorological\
    \ survival clusters as explained by cold period-summarized meteorological variables\
    \ from 190 sites-years classified into seven terminal nodes. Terminal node bars\
    \ represent the proportion (left y-axis) of site-years within each meteorological\
    \ survival cluster (from left to right at each node: high, medium, and poor) at\
    \ that node. Fig. 3. US map with the sites included in the National Winter Canola\
    \ Variety Trial dataset. Each pie chart represents a site with the slices representing\
    \ the proportion of cold periods classified as high, medium, and poor meteorological\
    \ survival clusters over a period of 40 years (1979-2019). This image is a decision\
    \ tree diagram used for classification. Here's a step-by-step breakdown: 1. **Root\
    \ Node (Node 1):** - Decision based on the feature \"Colder\" with a threshold\
    \ of >5. - Splits into two branches: \"yes\" and \"no\". 2. **Left Branch from\
    \ Node 1:** - **Node 2:** - Feature \"cET\" with a threshold of \u2264464.5. -\
    \ Further splits into: - **Node 4:** - Feature \"Colder_pct\", threshold \u2264\
    0.029. - Results in terminal nodes (Node 8: High, Node 9: Medium). - **Node 5:**\
    \ - Feature \"maxTmean\", threshold \u226413.41. - Results in terminal nodes (Node\
    \ 10: High, Node 11: Medium). 3. **Right Branch from Node 1:** - **Node 11:**\
    \ - Feature \"nccycle\" with a threshold of \u226424. - Further splits into: -\
    \ **Node 12:** - Feature \"meanWindchill\", threshold \u2264-3.6. - Results in\
    \ terminal nodes (Node 16: Medium, Node 17: High). - **Node 13:** - Terminal node\
    \ for \"High\". 4. **Bar Graphs:** - Each terminal node has a bar graph showing\
    \ proportions for three categories: High (purple), Medium (blue), and Low (green).\
    \ 5. **General Information:** - \"N\" represents the number of instances or samples\
    \ at that node. - Statistical values (e.g., p-values) are shown at decision nodes,\
    \ indicating significance. - The diagram illustrates how the data is split at\
    \ each node based on the defined criteria, ultimately classifying samples into\
    \ different meteorological survival clusters. This decision tree helps in visualizing\
    \ how different features contribute to the classification of weather-related survival\
    \ clusters. The image is a map of the United States with overlaid pie charts representing\
    \ \"M. Survival Cluster\" data at various locations. The map uses latitude and\
    \ longitude as axes, and the states are outlined in gray. 1. **Pie Charts:** -\
    \ Each location on the map has a pie chart depicting three survival clusters.\
    \ - The clusters are labeled as High, Medium, and Poor. - Colors: - Green for\
    \ High - Purple for Medium - Blue for Poor - Pie chart sizes vary, indicating\
    \ differences in data proportions at each location. 2. **Map Features:** - A scale\
    \ bar at the bottom left shows distance in kilometers, ranging from 0 to 1000\
    \ km. - The map covers the contiguous United States. This map visually represents\
    \ the distribution of survival clusters across different regions, providing an\
    \ overview of variability in these clusters throughout the country."
  6: "Source material in the YAML response provided:\n\nEvaluation overview: \"Evaluates\
    \ winter survival of canola genotypes.\"\n  Justification: \"This study sought\
    \ to understand the contribution of G, E and GxE on the determination of total\
    \ variation on winter survival of canola.\"\n\nDrivers of Risk: \"Meteorological\
    \ survival clusters (poor, medium, high) based on mean temperature below 0\xB0\
    C, simulating cold pressure on Canola winter survival.\"\n  Justification: \"\
    Only years with a CP (mean temperature below 0o C) were kept, causing the number\
    \ of years per site to vary between 19 and 40. In this simulation step, the trained\
    \ tree model was used to predict the CP of each site-year (MSc) into a risk class\
    \ (Sr), poor, medium, and high, based on the simulation for all years for each\
    \ site.\"\n\nQuantitative material: \"G, E and GxE explained 3%, 71%, and 7% of\
    \ the variation in winter canola survival, respectively.\"\n  Justification: \"\
    Results from the analyses of variance components showed that G, E and GxE explained\
    \ 3%, 71%, and 7% of the variation in winter canola survival, respectively.\"\n\
    \nMethodology: \"Mixed-effect models were used to analyze survival, incorporating\
    \ fixed and random effects. Pairwise comparisons were performed using alpha=0.05.\
    \ Cluster analyses were also conducted.\"\n  Justification: \"In step 6, a mixed-effect\
    \ model was fitted to the data (equation 3)... Mixed model analyses were solved\
    \ using the function lmer from package lme4 (Bates et al., 2015). ... Cluster\
    \ analyses were conducted using the functions kmeans included in the R package\
    \ stats, with Euclidean distance, and the final number of clusters was determined\
    \ with the function NbClust included in the package NbClust (Charrad et al., 2014).\"\
    \n\nHighlights: \"Genotype-by-environment interaction (GxE) is an important determinant\
    \ of canola survival, although environment (E) explains the largest proportion\
    \ of variation.\"\n  Justification: \"The effect of GxE is twice as large as G\
    \ indicating that GxE is an important determinant of survival. However, the sum\
    \ of both terms (10%) is just a small proportion of the variation explained by\
    \ E.\"\n\nMore Notes: \"Identified four distinct genotype survival behaviors across\
    \ meteorological survival clusters: tolerant, semi-tolerant, semi-susceptible,\
    \ and susceptible.\"\n  Justification: \"Based on the pairwise comparison letter\
    \ separation result, four distinct genotype survival behaviors across meteorological\
    \ survival clusters were identified, hereafter referred to as genotype survival\
    \ group GSg.\"\n"
  8: "Source material here.\nUnderstanding the impact of meteorological factors on\
    \ survival of winter canola will help to define breeding and agronomic objectives\
    \ to close yield gaps... mapping meteorological risk for winter survival will...\
    \ improve overall diversity and sustainability.\n\nOur analysis of National Winter\
    \ Canola Variety Trial data indicated that during the winter period, the most\
    \ relevant meteorological variables affecting winter survival were related to\
    \ minimum temperature and its fluctuations.\n\nThere are three important outcomes\
    \ of this study. First, we found that the number of days with temperatures between\
    \ -10\xB0C and -15\xB0C, the number of cycles when the temperature fluctuates\
    \ above or below 0\xB0C, and wind chill temperature during the cold period were\
    \ the main meteorological variables that explained mean winter survival across\
    \ 190 site-years.\n\nSecond, we documented the potential to have near 100% winter\
    \ survival below 35\xB0N latitude in places where vernalization requirements could\
    \ be satisfied..\n\nThird, we found that most broadly-adapted genotypes were classified\
    \ as semi-tolerant (129) and semi-susceptible (56) to winter kill in the US.\n"
