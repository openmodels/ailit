Drivers of Risk:
  1: "Minimum temperature, fluctuating temperatures above and below 0\u25E6C, and\
    \ windchill during the cold period."
  2: Winter temperatures and precipitation are critical for effective winter survival
    of winter canola.
  3: "Daily minimum and maximum temperatures, precipitation, wind velocity, solar\
    \ radiation, vapor pressure deficit, and evapotranspiration. The cold period (CP),\
    \ defined as the period when temperatures were below 0\xB0C, is a key driver.\
    \ Derived variables like number of temperature cycles, slope of cumulative growing\
    \ degree days (GDD) vs. days after planting, and descriptors of mean temperature\
    \ and temperature range (DeltaT) are also considered."
  4: Meteorological variables during the cold period, including temperature-related
    metrics (minTmean, maxTmean, etc.), precipitation (cPrecip), evapotranspiration
    (cET), solar radiation (cSolar), vapor pressure deficit (cVPD), growing degree
    days (cGDD), wind (meanWind, meanWindchill), and the number of days and cycles
    within specific temperature ranges (Warmest, Coldest, etc.)
  5: Meteorological factors affecting canola survival are described, including features
    like 'Colder', 'cET', 'Colder_pct', 'maxTmean', 'nccycle', and 'meanWindchill'.
  6: "Meteorological survival clusters (poor, medium, high) based on mean temperature\
    \ below 0\xB0C, simulating cold pressure on Canola winter survival."
  8: Temperature fluctuations and de-acclimation during winter affect survival rates
    of winter canola.
Evaluation overview:
  1: Winter survival of canola (Brassica napus L.) plants.
  2: The study evaluates winter canola survival based on meteorological factors.
  3: Winter survival of canola, measured as the percentage of plants alive in spring
    relative to those present before winter.
  4: The outcome being evaluated is survival (S) of canola germplasm, expressed as
    a percentage.
  5: The page provides an overview of canola meteorological survival clusters as categorized
    by high, medium, and poor survival rates.
  6: Evaluates winter survival of canola genotypes.
  8: The paper provides insight into winter canola survival, focusing on meteorological
    factors that impact its success.
Highlights:
  1: "A large area south of 35\u25E6N latitude for the US was identified with greater\
    \ potential for overwintering success."
  2: A significant breeding effort has improved the winter hardiness of canola genotypes.
  3: This page describes the variables and methods used to characterize winter harshness
    and predict canola winter survival. It focuses on identifying the influence of
    environmental factors during the cold period.
  4: A classification tree is used to predict meteorological survival class based
    on meteorological covariates (MSce).
  5: Figures show how different meteorological conditions contribute to canola survival
    clusters across various U.S. locations, highlighting regional variability.
  6: Genotype-by-environment interaction (GxE) is an important determinant of canola
    survival, although environment (E) explains the largest proportion of variation.
  8: "Potential for near 100% winter survival below 35\xB0N latitude if vernalization\
    \ requirements are satisfied; most genotypes were semi-tolerant or semi-susceptible\
    \ to winter kill in the US."
Methodology:
  1: Regression tree analysis using National Winter Canola Variety Trials data from
    2003 until 2018 (190 site-years) and auxiliary meteorological data over the last
    40 years.
  2: The analysis uses historical meteorological data and the National Winter Canola
    Variety Trials from 2003 to 2018 across 94 unique sites.
  3: Daily weather data from Google Climate Engine (1979-2019) is used to characterize
    winter harshness, identify the beginning and end of the CP, build a model to predict
    meteorological survival clusters, and predict the probability of occurrence over
    40 years. Variance component analysis and mixed linear models are used to estimate
    the contribution of genotype, environment, and their interaction to winter survival.
  4: 'The study uses a multi-step process: (1) random-effect model, (2) mixed model,
    (3) cluster analysis of environment BLUEs for survival into poor, medium, and
    high groups using k-means, (4) modeling meteorological survival class (MSc) as
    a function of meteorological factors using conditional inference trees, (5) simulating
    meteorological survival class as a function of meteorological predictors to classify
    site-year combinations for risk level, (6) GxE analyses using meteorological survival
    class as predictors, (7) mixed model to model S as a function of E and G survival
    classes and their interaction.'
  5: The analysis employs a conditional inference tree to classify site-years into
    meteorological survival clusters; results are applicable over a 40-year period
    (1979-2019).
  6: Mixed-effect models were used to analyze survival, incorporating fixed and random
    effects. Pairwise comparisons were performed using alpha=0.05. Cluster analyses
    were also conducted.
More Notes:
  1: Identified four distinct genotype survival groups (tolerant, semi-tolerant, semi-susceptible,
    and susceptible) based on meteorological conditions.
  3: The analysis considers both the number of days within certain temperature ranges
    and the percentage of days relative to the total winter duration. The wind chill
    calculation formula is provided.
  4: The conditional inference tree methodology used in step 4 involves model parameterization
    with leave-one-out cross-validation to determine the best hyperparameters (maximum
    depth and alpha).
  6: 'Identified four distinct genotype survival behaviors across meteorological survival
    clusters: tolerant, semi-tolerant, semi-susceptible, and susceptible.'
Quantitative material:
  1: 'Cold periods across all site-years were classified into three clusters: cold
    periods with high (96%), medium (70%), and low (28%) average plant winter survival.'
  3: Includes counts and percentages of days falling into specific temperature and
    DeltaT categories, minimum, mean, and maximum values for temperature variables,
    cumulative precipitation, evapotranspiration, solar radiation, and vapor pressure
    deficit. Includes mean wind chill calculated using a specific formula.
  4: Table 3 provides summary statistics (minimum, mean, median, maximum, and coefficient
    of variation) for survival and various meteorological variables.
  5: "The diagram provides numerical thresholds for features used in classification,\
    \ e.g., 'Colder' >5, 'cET' \u2264464.5, with statistical values indicating significance\
    \ at nodes."
  6: G, E and GxE explained 3%, 71%, and 7% of the variation in winter canola survival,
    respectively.
  8: Primary meteorological variables affecting survival were minimum temperature,
    temperature fluctuations, and wind chill, impacting survival across 190 site-years.
sourcematerial:
  1: "Winter survival response of canola to meteorological variables and adaptative\
    \ areas for current canola germplasm in the United States\n\nEvaluation overview:\
    \ \"Canola stand establishment during the fall and plant survival over the winter\
    \ are critical to the success of this crop. The environment plays a key role influencing\
    \ survival,\"\n\nDrivers of Risk: \"A regression tree analysis indicated that\
    \ meteorological variables related to minimum temperature, fluctuating temperatures\
    \ above and below 0\u25E6C, and windchill during the cold period were the main\
    \ factors accounting for winter kill.\"\n\nQuantitative material: \"Cold periods\
    \ across all site-years were classified into three clusters: cold periods with\
    \ high (96%), medium (70%), and low (28%) average plant winter survival.\"\n\n\
    Methodology: \"A winter survival dataset was compiled from the National Winter\
    \ Canola Variety Trials from 2003 until 2018 (190 site-years) and auxiliary meteorological\
    \ data over the last 40 years. A regression tree analysis...\"\n\nHighlights:\
    \ \"For 94 US sites, the probabilities of these conditions were calculated and\
    \ summarized in a map that defined areas of adaptation: a large area south of\
    \ 35\u25E6N latitude for the US was identified with greater potential for overwintering\
    \ success.\"\n\nMore Notes: \"Based on the response under multiple meteorological\
    \ conditions, four distinct genotype survival groups were identified (tolerant,\
    \ semi-tolerant, semi-susceptible, and susceptible).\"\n"
  2: 'Source material here.

    The overall objective of this work is to determine the area of adaptation of current
    winter canola germplasm based on winter survival. Temperature and precipitation
    during the winter period are critical for effective winter survival. A large dataset
    compiled from the National Winter Canola Variety Trials (NWCVT), conducted from
    2003 to 2018 across 94 unique sites with auxiliary weather data for each site-year
    were assembled and analyzed. A significant breeding effort has increased the winter
    hardiness of canola genotypes.

    '
  3: "Source material here.\nWinter survival ratings were measured after dormancy\
    \ was completed, [...] Winter survival is a visual estimate of the percentage\
    \ of plants alive in spring relative to those present before the winter period\
    \ (Stamm et al., 2012).\nWeather dataset [...] Daily weather data were extracted\
    \ from Google Climate Engine (Huntington et al., 2017) for the period 1979-2019\
    \ (40 years) for each site. The variable set included daily minimum and maximum\
    \ temperatures (\u25E6C), precipitation (mm), wind velocity (m s\u22121), solar\
    \ radiation (W m\u22122), vapor pressure deficit (kPa), and evapotranspiration\
    \ (mm) calculated using alfalfa (Medicago sativa L.) as reference.\nTmean descriptors*\
    \ [...] DeltaT is the difference between maximum and minimum daily temperature,\
    \ in \u25E6C.\nWindchill calculations were performed following the equation presented\
    \ by Osczevski and Bluestein (2005).\nSecondary summarized meteorological variables\
    \ were calculated [...] All daily variables were summarized by averaging, summing,\
    \ extracting minimum and maximum values, or counting within the CP (Table 2).\n\
    Predictors [...] An example of the mean daily temperatures preceding, during,\
    \ and after the CP for the Manhattan, KS, 2010-2011 growing season is shown in\
    \ Fig. 1.\nAnalyses [...] A series of analyses divided into seven steps were conducted\
    \ to estimate the contribution of genotype (G), environment (E), and interaction\
    \ (GxE) to the overall variance for canola winter survival (S). Because S was\
    \ not normally distributed, we used a log transformation.\nTmean and DeltaT descriptors\
    \ were calculated both as the number of days during winter within a given conditional\
    \ statement, and as a percentage of this count in relation to total days of winter\
    \ duration.\nMean wind chill: 13.12 + 0.6215 \xD7 Tmean -11.37 \xD7 W0.16 + 0.3965\
    \ \xD7 Tmean \xD7 W0.16\nCumulative canola growing degree days: cGDD: SUM (Tmax\
    \ + Tmin)/2\n"
  4: "Source material\n\nEvaluation overview: \"Evaluation overview: The outcome being\
    \ evaluated is survival (S) of canola germplasm, expressed as a percentage.\"\n\
    \"Survival %\"\n\nDrivers of Risk: \"Drivers of Risk: Meteorological variables\
