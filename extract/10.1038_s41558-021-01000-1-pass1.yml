  28: "The upper part of the figure shows the impact estimates for 298 model variations.\
    \ The vertical lines around each estimate represent the 90 and 95% confidence\
    \ intervals (in light and dark colour, respectively) around the ensemble mean\
    \ estimate for a particular model. The red horizontal line and band represent\
    \ the average mean impact of the 288 models out of the 298 that do not exclude\
    \ observations, plus and minus a standard deviation (\u221216.9\u2009\xB1\u2009\
    5.9%). The vertical bars directly below the impact estimates represent the reduction\
    \ in out-of-sample MSE of a 10-fold cross-validation (whereby years of data are\
    \ sampled together) relative to a model that excludes weather variables. Thus,\
    \ higher bars indicate better model fit. ACC impacts for the baseline model, also\
    \ shown in Extended Data Fig. 3a, is highlighted in blue whereas alternative models\
    \ are shown in grey."
