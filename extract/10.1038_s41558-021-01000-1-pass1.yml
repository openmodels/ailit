Highlights:
  1: ACC has slowed global agricultural TFP growth, effectively losing 7 years of
    productivity growth. Warmer regions are more severely impacted. Global agriculture
    has grown more vulnerable to climate change.
  2: Average agricultural TFP has more than doubled since 1961, but there is wide
    cross-country variation in TFP growth rates.
  3: The study finds a robust relationship between agricultural TFP growth and weather
    changes, noting significant variation across countries and highlighting slower
    TFP growth in Sub-Saharan Africa.
  4: "Higher temperatures have become more damaging over time, particularly between\
    \ 1989\u20132015. The impact of ACC means global TFP in a world without ACC would\
    \ have been reached in 2013 instead of 2020."
  5: ACC has a negative impact on global average TFP. The impacts are larger for warmer
    regions like Africa and smaller for cooler regions. Ignoring input responses makes
    global impacts of ACC appear more severe. More recent data (1989-2015) points
    to larger damage.
  6: ACC is increasingly reducing agricultural output as of 2020.
  8: The paper highlights a 76% increase in global agricultural TFP attributed to
    weather and technology changes during the studied period.
  9: "The adoption of revenue regression weights and a \u2018green season\u2019 for\
    \ weather aggregation represent the two most consequential modeling choices, pointing\
    \ to slightly larger damage."
  11: The figure illustrates the composition of global agricultural production by
    showing the relative contributions of cereal crops, non-cereal crops, and livestock.
  13: The analysis distinguishes the effects on TFP by isolating the influence of
    the 10% coldest countries and includes confidence bands from bootstraps.
  15: Presents response functions of agricultural productivity to temperature and
    precipitation, with confidence bands.  It also performs placebo tests to assess
    the robustness of the findings.
  17: Analysis of agricultural productivity response to green-season temperature and
    precipitation changes over the period 1962-1988. Response functions are centered
    vertically so that the exposure-weighted marginal effect is zero.
  19: Provides response functions showing the relationship between green-season temperature/precipitation
    and agricultural productivity. Baseline response function for 1962-2015 is also
    shown.
  23: The paper examines how changes in green-season temperature and precipitation
    impact agricultural productivity (TFP) at the country level.
  27: Shows the response of agricultural productivity (TFP) to changes in temperature
    and precipitation during the green season for 1989-2015, excluding the 10% hottest
    countries. Conducts placebo tests to validate the relationship.
  28: The figure shows the impact estimates for 298 model variations with 90% and
    95% confidence intervals.
Methodology:
  1: Econometric model of weather effects on global agricultural TFP, combined with
    counterfactual climate scenarios. Model includes country-fixed and year-fixed
    effects, and uses a quadratic function of average temperature and total precipitation
    during the green season.
  2: Uses the Global Meteorological Forcing Dataset (GMFD) observations and CMIP6
    (seven GCMs) to model temperature and precipitation. Analyzes country-level agricultural
    TFP growth from 1961-2015.
  3: The analysis uses response functions and block bootstraps to assess the impact
    of temperature and precipitation on TFP growth, with placebo checks involving
    random mismatching of TFP and weather data.
  4: The analysis uses econometric models to link TFP growth with weather data and
    counterfactual weather trajectories from CMIP6 climate experiments to assess impacts
    of ACC.
  5: Econometric models with multiple variations (96) are used, with cross-validation
    to assess model fit. Models consider different temperature variables, functional
    forms (quadratic, cubic), weighting schemes (equal, revenue; cropland, cropland
    & pasture), growing season definitions (calendar year, green season), and heterogeneity
    assumptions (pooled, by latitude). Analysis performed on data from 1961-2015.
  6: The analysis accounts for econometric model uncertainties, uses TFP metrics,
    and considers measurement errors in its assessment of agricultural impacts.
  8: The analysis uses bias-corrected spatial disaggregation (BCSD) for weather data,
    and a regression model controlling for country and year fixed effects to analyze
    TFP changes.
  9: The impact of ACC is computed by subtracting the cumulative impact of a weather
    trajectory with ACC from a weather trajectory without ACC, using various GCMs.
    The study uses econometric modeling with numerous robustness checks (296 variations
    of the econometric model are explored). The methodology accounts for uncertainty
    from both the econometric model and the climate models. The paper uses data from
    1962-2015, then projects TFP trajectories for 2016-2020 based on average growth
    rates from 2006-2015. The models account for various factors, including whether
    temperature is measured by Tmax, Tmin, or Tmean; inclusion or exclusion of precipitation;
    quadratic or cubic functional forms for weather variables; equal or revenue regression
    weights; weather data aggregated over cropland or cropland and pasture; the calendar
    year or the 'green season' for aggregating weather conditions; a single global
    response function or separate response functions for three latitudinal regions;
    and country exclusions. Regional impacts are obtained by aggregating country-level
    impacts based on fixed revenue weights.
  11: The data is sourced from FAOSTAT (http://www.fao.org /faostat/en/#data/QV, accessed
    6/29/2020).
  13: The response function of TFP changes to temperature and precipitation changes
    was assessed, with data reshuffled randomly by years or countries for placebo
    checks.
  15: Uses country-level data. Response functions are centered so that the exposure-weighted
    marginal effect is zero. Confidence bands are based on 500 year-by-region block
    bootstraps. Placebo checks are performed by randomly mismatching TFP and weather
    data by years or countries using 10,000 reshuffled datasets.
  17: Regression analysis using country-level TFP and weather data from 1962-1988.
    Includes placebo checks involving random reshuffling of TFP and weather data by
    years and by country. Block bootstrapping is used to estimate confidence intervals.
  19: Regression analysis using data from 1989-2015 (and a baseline from 1962-2015).
    Bootstrapping (500 year-by-region block bootstraps) is used to generate confidence
    bands. Placebo checks involve randomly mismatching/reshuffling TFP and weather
    data by year and by country, with 10,000 reshuffled datasets.
  21: Uses response functions and placebo checks with reshuffled data to evaluate
    changes in Total Factor Productivity (TFP) based on temperature and precipitation
    changes.
  23: Analysis based on data from 1989-2015, excluding the 10% of coldest countries
    in one analysis. Employs year-by-region block bootstraps. Includes placebo checks
    where TFP and weather data are randomly mismatched by year and by country. Uses
    linear and quadratic T coefficients.
  25: Analysis uses response functions for TFP changes based on green-season temperatures
    and precipitation; includes placebo tests with reshuffled datasets.
  27: Uses year-by-region block bootstraps (500 iterations) to generate confidence
    bands. Performs placebo checks by randomly reshuffling TFP and weather data by
    year and by country (10,000 reshuffled datasets).
  28: Econometric models with 10-fold cross-validation (years of data sampled together);
    out-of-sample MSE reduction relative to a model excluding weather variables indicates
    model fit.
More Notes:
  5: Results are constructed by weighting econometric models based on how well they
    fit the data, so results reflect the econometric model uncertainty. The estimates
    should not be interpreted as the effect of a world without fossil fuels.
  6: Study suggests current agricultural research investments may be insufficient
    to maintain past productivity growth rates.
  9: The paper acknowledges potential measurement error in weather variables and TFP.
    They address the potential for omitted variable bias relating to irrigation. They
    also consider data restrictions including country exclusions and temporal subsets.
