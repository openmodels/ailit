sourcematerial:
  1: "Source material here. We develop a robust econometric model of weather effects\
    \ on global agricultural total factor productivity (TFP) and combine this model\
    \ with counterfactual climate scenarios to evaluate impacts of past climate trends\
    \ on TFP. Our baseline model indicates that ACC has reduced global agricultural\
    \ TFP by about 21% since 1961, a slowdown that is equivalent to losing the last\
    \ 7 years of productivity growth. The effect is substantially more severe (a reduction\
    \ of ~26\u201334%) in warmer regions such as Africa and Latin America and the\
    \ Caribbean. We also find that global agriculture has grown more vulnerable to\
    \ ongoing climate change. Our model characterizes f as a quadratic function of\
    \ average temperature (T) and total precipitation (P) over the 5-month period\
    \ centred around the greenest month of the year of each country or \u2018green\
    \ season\u2019. Country-fixed effect /uni03B1i controls for average country TFP\
    \ growth rates, and year-fixed effect /uni03B8t for global shocks common to all\
    \ nations."
  2: 'Source material: "Figure 1a shows that average agricultural TFP has more than
    doubled since 1961 but that there is wide cross-country variation. d,e, Evolution
    of global average annual temperature (d) and annual precipitation (e) of the Global
    Meteorological Forcing Dataset (GMFD) observations (circles). The golden band
    extends to the range of modelled variables from CMIP6 (seven GCMs). Simple averages
    of country-level variables are shown, thus small countries are over-represented."'
  3: "Source material here.\nEvaluation overview: \"Response of agricultural productivity\
    \ to weather. a,b, Response function of TFP growth to changes in green-season\
    \ average T (a) and P (b).\"\nDrivers of Risk: \"We find a robust relationship\
    \ between agricultural TFP growth and weather changes (Fig. 2 and Supplementary\
    \ Table 1).\"\nQuantitative material: \"The coloured bands represent 90% and 95%\
    \ confidence bands based on 500 year-by-region block bootstraps.\"\nMethodology:\
    \ \"Figures c\u2013f, Results of placebo checks whereby TFP and weather data are\
    \ randomly mismatched or reshuffled by years (c,e) or country (d,f).\"\nHighlights:\
    \ \"We also observe that TFP has grown much more slowly in certain countries,\
    \ particularly in Sub-Saharan Africa (Fig. 1c).\"\n"
  4: "  \nThe evaluation overview is drawn from: \"The cumulative impact of ACC on\
    \ global agricultural TFP growth over the 1961\u20132020 period...\"\n\nThe drivers\
    \ of risk are identified as: \"The temperature response function is roughly linear\
    \ and downward-sloping... warmer temperatures over the green season are detrimental\
    \ to TFP growth.\"\n\nThe quantitative information comes from: \"The cumulative\
    \ impact of ACC on global agricultural TFP growth over the 1961\u20132020 period\
    \ is about \u221220.8% with a 90% confidence interval between \u221239.1% and\
    \ \u221210.1%.\"\n\nThe methodology is outlined in: \"We subsequently link our\
    \ econometric estimates with counterfactual weather trajectories from climate\
    \ experiments with and without ACC...\"\n\nThe highlights are based on: \"This\
    \ indicates that higher temperatures have become more damaging... the global TFP\
    \ level projected to be reached in 2020 in our world with ACC would have been\
    \ reached in 2013 in a world without ACC...\"\n"
  5: "yaml\nEvaluation overview: \"Global impact of ACC for multiple econometric models.\
    \ Impact estimates for 96 model variations...Our global results conceal sizeable\
    \ regional and cross-country disparities...the cumulative impact of ACC since\
    \ 1961 is greater for warm regions...by analysing output rather than TFP...\"\n\
    Drivers of Risk: \"Temperature variable: Tmax, Tmean, Tmin...Our estimates should\
    \ not be interpreted as the effect of a world without fossil fuels. Agriculture\
    \ has benefitted tremendously from agricultural research and carbon-intensive\
    \ inputs that would not have been as available without fossil fuels. The counterfactual\
    \ in our study only removes the effect that fossil fuels and other anthropogenic\
    \ influences have on...\"\nQuantitative material: \"Overall, the 288 models that\
    \ do not exclude observations point to an average mean impact of \u221216.9% with\
    \ a standard deviation of 5.9%...Figure 5 shows that the cumulative impact of\
    \ ACC since 1961 is greater for warm regions such as Africa (\u221234.0%)...Supplementar\
    \ y Fig. 2 indicates that ACC would have reduced output by about 27.6% with a\
    \ 90% confidence inter val between \u221248.3% and \u221214.3%.\"\nMethodology:\
    \ \"Fig. 4 | Global impact of ACC for multiple econometric models. Impact estimates\
    \ for 96 model variations...Vertical bars directly below represent the reduction\
    \ in out-of-sample MSE of tenfold cross-validation (whereby years of data are\
    \ sampled together) relative to a model that excludes weather variables, thus\
    \ higher bars indicate better model fit...We also consider a model based on two\
    \ seasons...But allowing separate response functions for three equally sized latitudinal\
    \ groups of countries does not alter our findings...However, basing our analysis\
    \ on the latter part of the sample (1989\u20132015) points to even larger damage...\"\
    \nHighlights: \"Overall, the 288 models that do not exclude observations point\
    \ to an average mean impact of \u221216.9% with a standard deviation of 5.9%...Figure\
    \ 5 shows that the cumulative impact of ACC since 1961 is greater for warm regions\
    \ such as Africa (\u221234.0%)...This reflects our finding that the response function\
    \ is changing over time and suggests that global agriculture is growing increasingly\
    \ sensitive to ongoing climate change.\"\nMore Notes: \"Importantly, these regional\
    \ impacts are constructed by weighting econometric models based on how well they\
    \ fit the data, so results reflect the econometric model uncertainty (Methods)...Our\
    \ estimates should not be interpreted as the effect of a world without fossil\
    \ fuels.\"\n"
  6: "  \n\"The estimates do not remove the direct effect that rising CO2 concentrations\
    \ have on agricultural production...\"  \n\"Our study suggests that ACC is increasingly\
    \ reducing agricultural output as we drift away from a climate system without\
    \ human influences, cumulating into a detectable and sizeable impact as of 2020.\"\
    \  \n\"Given recent localized productivity slowdowns, the long lags in agricultural\
    \ research and the rapid pace of ACC, our findings raise the question of whether\
    \ current levels of investments in agricultural research are sufficient to sustain\
    \ twentieth-century rates of productivity growth in the twenty-first century.\"\
    \  \n\"The coloured bands represent 95%, 90% and 80% confidence intervals (CIs)\
    \ that reflect climate uncertainty (from GCMs), econometric uncertainty (from\
    \ the estimation) and specification uncertainty (from the choice of the econometric\
    \ model).\"  \n\"The TFP metric we rely upon likely mismeasures certain inputs...such\
    \ errors do not bias our econometric estimates but simply render them more imprecise.\"\
    \  \n"
  8: "Source material\nBy definition, TFP for country i at time t is Yit/Xit, so that\
    \ the percentage change in TFP for country i at time t is approximated as /uni0394ln\
    \ TFPit \xBC /uni0394ln\xF0Yit\xDE/C0/uni0394ln\xF0Xit\xDE\xBC/uni0394lnAit\xFE\
    /uni0394f\xF0Zit\xDE\xFE/uni0394lnUit: ... where Yit \xBC ef\xF0Zit\xDEAitXitUit,\
    \ where Y is aggregate agricultural output in country i and year t, I fit \xF0\
    Zit\xDE is the effect of weather Zit, Ait measures current technological knowledge\
    \ and Xit and Uit are observed and unobserved aggregate inputs, respectively.\
    \ ... For instance, our approach indicates a global TFP increase of 76% over 1961\u2013\
    2015 whereas the USDA indicates a 71% rise. ... To aggregate these modelled weather\
    \ trajectories to the country level using the same approach as above, we first\
    \ downscale these data from their native GCM grid to the GMFD grid using the bias-corrected\
    \ spatial disaggregation (BCSD) approach49. ... Empirically, our econometric models\
    \ seek to control for /uni0394ln Ait through country and year fixed effects (/uni03B1\
    \ and /uni03B8, respectively)... \n"
  9: " \nRobustness checks. A crucial concern in applied econometric analysis is that\
    \ baseline models proposed by researchers may not be robust to even small variations\
    \ in model specification or the underlying data... We conduct a systematic exploration\
    \ spanning 296 variations of the econometric model to assess the robustness of\
    \ our baseline finding... We compute the impact of ACC on each country\u2019s\
    \ agricultural TFP growth by subtracting the cumulative impact of a weather trajectory\
    \ with ACC for a given GCM from the cumulative impact of a weather trajectory\
    \ without ACC for the same GCM... The upper part of the figure shows the cumulative\
    \ impact of ACC on global agricultural TFP since 1961 for each one of these model\
    \ variations... We consider all possible combinations of models along the following\
    \ dimensions: (1) relies on either Tmax, Tmin or Tmean, (2) includes or excludes\
    \ precipitation, (3) adopts a quadratic or cubic functional form for all weather\
    \ variables, (4) relies on equal or revenue regression weights, (5) relies on\
    \ weather data aggregated over cropland or cropland and pasture, (6) relies on\
    \ the calendar year, the \u2018green season\u2019...This corresponds to 3 \xD7\
    \ 2 \xD7 2 \xD7 2 \xD7 2 \xD7 3 \xD7 2 = 288 variations of the model...The adoption\
    \ of revenue regression weights and a \u2018green season\u2019 for weather aggregation\
    \ represent the two most consequential modeling choices, pointing to slightly\
    \ larger damage... The methodology accounts for uncertainty from both the econometric\
    \ model and the climate models...To reflect the joint statistical uncertainty\
    \ from the econometric model and climate uncertainty arising from various GCMs\
    \ in CMIP6, we compute cumulative impacts of ACC for 2,000 random pairs of bootstrapped\
    \ coefficients...The paper uses data from 1962-2015, then projects TFP trajectories\
    \ for 2016-2020...Potential concern is measurement error in our independent weather\
    \ variables...\n"
