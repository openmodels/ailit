sourcematerial:
  3: 'Source material here.

    The results revealed that global agricultural productivity grew consistently at
    a rate of 0.44% p.a., driven by technological progress and mix-efficiency change,
    with negligible contributions from technical- and scale-efficiency changes ...
    Both long-term and short-term climatic factors and the natural production environment
    significantly reduce global agricultural productivity ...

    The projected increased level of future climate variability will significantly
    reduce future agricultural productivity.

    '
  4: " \n\"In other words, the global food production system requires TFP growth,\
    \ which will ensure increased productivity, while maintaining the sustainability\
    \ of the system and contributing towards poverty reduction [14\u201316].\" \n\n\
    \"Moreover, given the changing nature of climate and weather, concerns about their\
    \ effects on agriculture and livelihoods are increasing globally [17,18].\" \n\
    \n\"Abbott et al. [21] noted that the global spike in food prices during 2008\u2013\
    2009 was largely due to declining agricultural productivity and cereal crop failure\
    \ in food exporting economies, which are likely to be repeated more frequently\
    \ and with higher intensity in the future, owing to increasing anomalies in climate,\
    \ weather events, and other factors; thereby, threatening agricultural sustainability\
    \ [22,23].\"\n\n\"Increased TFP has implications beyond national boundaries and\
    \ can help in achieving internationally set development targets, including the\
    \ sustainable development goal (SGD).\"\n"
  6: "Source material here: Our study revealed three important insights and/or contributions\
    \ to the existing literature: (i) established linkages, including magnitude and\
    \ direction, amongst climate, production environment and socio-economic factors\
    \ with global agricultural productivity and its efficiency components; (ii) identified\
    \ synergies amongst agricultural productivity and various efficiency components;\
    \ and (iii) provided the magnitude and direction of agricultural TFP change from\
    \ future climate variabilities. We utilized the estimated values of TFP, technical-,\
    \ scale-, and mix-efficiency indices from Anik et al. [45], who applied O\u2019\
    Donnell\u2019s [51] F\xE4re\u2013Primont index (FPI) approach, and produced estimates\
    \ of TFP and its six finer components... covering a period of 45 years (1969\u2013\
    2013). Future studies focusing on the linkages between international trade, comparative\
    \ advantages of an individual country, and TFP growth in agriculture could unpack\
    \ new insights and knowledge on the subject matter. "
  7: "The analysis is performed using a multivariate Tobit model to identify determinants\
    \ influencing agricultural TFP and its efficiency components: \"we applied a multivariate\
    \ Tobit model (MVTOBIT) to identify the determinants/drivers jointly influencing\
    \ agricultural TFP and its efficiency components.\"\n\nFour equations are developed\
    \ for TFP change index and its output-oriented components: \"We developed four\
    \ equations for TFP change index (dTFP) and its output-oriented components: technical\
    \ efficiency change index (dOTE), scale efficiency change index (dOSE), and mix-efficiency\
    \ change index (dOME).\"\n\nFuture prediction of TFP is done using the STATA 16\
    \ software predict command, relying on historical data and assuming the same rate\
    \ of explanatory variable growth for future estimates: \"Using the parameter estimates\
    \ of the aforementioned MVTOBIT model, we predicted change in global agricultural\
    \ TFP up to 2033. The predict command available in STATA 16 software enables both\
    \ in-sample and out-of-sample forecasting.\"\n\nThe model forecasts changes in\
    \ global agricultural TFP up to 2033: \"we predicted change in global agricultural\
    \ TFP up to 2033.\"\n\nExplanatory variables for prediction are forecast using\
    \ an annual compound growth rate estimated from historical data: \"The out-of-sample\
    \ prediction process requires forecasting explanatory variables, which we did\
    \ for each country, using the annual compound growth rate estimated as the parameter\
    \ \u03B2 in lnY = \u03B1 + \u03B2t (where y is the relevant explanatory variable\
    \ and t is time) of the existing in-sample data.\"\n"
  8: 'The paper discusses the methodology involving four models: "In the second model
    (Model 2), to capture the impact of increased rainfall and temperature variabilities,
    we imposed a 1% additional change in total rainfall and mean temperature variabilities
    annually on top of the counterfactual model. In the third model (Model 3), we
    imposed a 0.1% additional change in LTP and LTT annually, on top of the counterfactual
    model." The methodology also assumes "the natural growth rate for all the explanatory
    variables, including climate variables" and describes how the analysis is performed:
    "In the final model (Model 4), we incorporated changes in Models 2 and 3, simultaneously,
    on top of the counterfactual model."'
  9: "The global TFP grew annually at a rate of 0.44%, and the estimated level was\
    \ 0.20. The global technical efficiency level was estimated at 0.91, scale efficiency\
    \ level at 0.97, mix-efficiency level at 0.78, residual scale efficiency level\
    \ at 0.37, and residual mix-efficiency level at 0.29, respectively. Table 2. Total\
    \ factor productivity and efficiency levels in global agriculture. TFP and Its\
    \ Components Geometric Mean Growth Rate (%) Max-TFP level 0.75 0.23 Technical\
    \ efficiency level 0.91 0.05 Scale efficiency level 0.97 0.04 Mix-efficiency level\
    \ 0.78 0.32 Residual scale efficiency level 0.37 0.19 Scale\u2013mix efficiency\
    \ level 0.29 0.55 Total factor productivity level 0.20 0.44."
  10: "Source material here.\nitsthreeef\uFB01ciencycomponents,i.e.,growthinTFPoranyofitscomponentsisassociated\
    \ withgrowth inanother component. Thesigns associated withthe timevariable implythat\
    \ technical-, scale-, and mix-ef\uFB01ciency grew signi\uFB01cantly over time.\n\
    \nTable 3. Geometric mean of TFP change and its components for different categories.\n\
    ...\nNote: * We conducted a one-way ANOVA test and found that the TFP change index\
    \ across all the categories was signi\uFB01cantly different at a 1% level of signi\uFB01\
    cance.\n\n3.2.1. Socio-Economic Factors Explaining TFP Growth and Its Components\n\
    The negative signs on the coef\uFB01cient of the Her\uFB01ndahl index of crop\
    \ diversi\uFB01cation implythatcropdiversi\uFB01cationpositivelycontributedtowardsTFPgrowth,technical-,and\
    \ mix-ef\uFB01ciencychanges. A1%increaseincropdiversityindexwillincreasethelikelihood\
    \ ofan increaseinTFP, technical-, scale-,and mix-ef\uFB01ciency by0.585%,0.031%,\
    \ and0.074%, respectively (Table4).\n\nTo understandwhether the growthin TFP andits\
    \ three components across countries belonging to different income classes is different,\
    \ countries were categorized into four income classes, following the World Bank\
    \ classi\uFB01cation. Except for the mix-ef\uFB01ciency changeindex,high-incomecountrieshadthehighestindexvaluescomparedtotheother\
    \ three income classes (Table3). However, the econometric analysis revealed that,\
    \ compared totheupper-middleincomecountries,low-incomecountriesattainedsigni\uFB01\
    cantlyhigher growthinTFPanditsthreecomponents,andthatthehigh-incomecountriesexperienced\
    \ signi\uFB01cantly higher technical- and scale-ef\uFB01ciency growth. However,\
    \ for low-middle income countries, the mix-ef\uFB01ciency change was signi\uFB01\
    cantly lower than for the upper-middle income countries (Table4).\n"
  11: 'Source material here.

    - The page includes quantitative results on the impact of various variables on
    Total Factor Productivity (TFP) change, as shown in the table entries such as
    "Spending 0.043 ***".

    - The drivers of risk such as "LTP 0.016, LTT -0.056 ***" and "Temperature variability
    -0.021 ***" reflect negative impacts of temperature and its variability on TFP
    change.

    - Marginal effects are included in the MVTOBIT analysis indicating "variables
    such as employment have positive coefficients in TFP change".

    - The methodology discussion includes terms like "MVTOBIT" indicating the use
    of a multivariate Tobit model with significance levels indicated by ***, **, and
    *."

    '
  12: "Source material here.\nWe incorporated four variables to represent climate\
    \ change: two of these are to capture the long-term change in climate, i.e., a\
    \ 30-year moving average of annual mean temperature (LTT) and annual total rainfall\
    \ (LTP), whereas the remaining two capture annual variations in total rainfall\
    \ and mean temperature. Among these four variables used to represent climate change,\
    \ except the LTP variable in the scale-efficiency equation, all coefficients have\
    \ negative signs, especially where the effect is significant. The estimated marginal\
    \ effects with the variable LTP imply that a 1% increase in LTP is associated\
    \ with a likelihood of 0.021% reduction and 0.004% increase in the technical-\
    \ and scale-efficiency change indices, respectively. We also found that a 1% increase\
    \ in LTT is associated with the likelihood of a 0.056%, 0.011%, and 0.013% decrease\
    \ in TFP, technical-, and mix-efficiency change indices, respectively, which is\
    \ in-line with Rahman and Anik\u2019s [58] findings about agriculture in Bangladesh.\
    \ Moreover, climatic vulnerability, in the form of increasing LTP and LTT, creates\
    \ risk and uncertainty, which can negatively contribute to efficiency. Annual\
    \ mean temperature and total rainfall variations have severe implications on agriculture,\
    \ as expected. Except for rainfall variation in the technical efficiency change\
    \ equation, both variables have a significant growth reducing role across equations,\
    \ with relatively higher marginal effects of variation in annual total rainfall\
    \ (Table 4). Increasing precipitation within the growing season may cause crop\
    \ loss, particularly in tropical and sub-tropical countries that are prone to\
    \ flood. Within a certain temperature range, crop growth is positively and linearly\
    \ related with temperature. However, beyond the base and the upper threshold temperature,\
    \ growth is affected, and the relationship is inverse for temperature between\
    \ optimum and a ceiling levels [59]. Increasing temperature in the growing season\
    \ has an adverse effect on yield [60]. Based on the mean elevation of the landscape,\
    \ the countries were divided into three categories, and countries belonging to\
    \ the medium elevation category had the highest level of TFP change, whereas the\
    \ high elevation countries had the highest technical-, scale-, and mix-efficiency\
    \ changes (Table 3). To further investigate the dynamics between land elevation\
    \ and agriculture performance, we included land elevation and squared land elevation\
    \ as explanatory variables and found a significant negative effect of both across\
    \ four equations. With increasing land elevation, TFP first increases. However,\
    \ as land elevation increases at an increasing rate, the TFP level then reduces.\
    \ A similar pattern was observed with the scale-efficiency change model. However,\
    \ the relationship was opposite for the technical- and mix-efficiency change models\
    \ (Table 4).\n"
  13: Based on weather regime, we classified the countries into three categories,
    and the descriptive statistics presented in Table3 show that the arid and semiarid
    region was the worst performing. The econometric analysis shows that, compared
    to the temperate zone, the likelihood of growth in TFP and its three efficiency
    components is significantly higher in the tropical and subtropical zone. Table5
    presents predicted TFP based on parameter estimates of the MVTOBIT model up to
    2033, under four different climatic scenarios. For all four models, the predicted
    TFP in 2033 is significantly higher compared to the baseline year of 2013, but
    the TFP increases more in the counterfactual model, where no additional climate
    variabilities are assumed. The bottom two rows of Table 5 show the mean differences
    in TFP between the counterfactual and other three models, which shows that with
    any additional climatic variabilities, the TFP reduces significantly from its
    natural rate of change, i.e., the counterfactual model. The estimated geometric
    mean of TFP change index implies that during the last four and half decades, global
    agricultural output increased at a higher rate than the input growth, which is
    an important and encouraging feature of this rate.
  14: "   \n\"The estimated less than unitary values for the three efficiency components\
    \ imply that global agriculture... failed to enhance technical efficiency to its\
    \ maximum level... Table 3.\"  \n\"Weather regime dummies significantly influence\
    \ changes in TFP and its three efficiency components... increasing temperature\
    \ [is] a major threat to agricultural production and yield [31,66].\"  \n\"Our\
    \ econometric analysis also confirmed a growth reducing role for both temperature\
    \ and rainfall variabilities (Table 4).\"  \n\"Although agricultural TFP will\
    \ increase in the future following past growth patterns, any additional changes\
    \ in climate are likely to have a significant growth-reducing role.\"  \n\"Globally\
    \ there has been a relatively low allocation to this sector, which is an unfortunate\
    \ trend, given the proven positive effect of investment in R&D in enhancing food\
    \ security and employment.\"\n"
  15: 'Source material here.

    Climatic variables have a robust effect across models, particularly the variation
    in annual mean temperature and annual total rainfall. Alarmingly, future TFP projections
    show that any incremental variabilities in climatic variables will have a further
    growth-reducing effect.

    '
  16: 'Source material here.

    "there is strong evidence that increasing temperature and volatility in climatic
    variables are adversely affecting TFP growth."

    "country and region-specific research and policies to mitigate and adapt to climate
    change should have topmost priority."

    "various climate-smart agricultural technologies are being developed and advocated,
    their adoption is subjected to several socio-economic, political, and institutional
    constraints."

    "Governments, alone, may not be capable of bringing about the required changes
    in the agricultural future; rather, international donors, development partners,
    and private sectors need to contribute as well."

