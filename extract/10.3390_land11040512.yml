  3: The study found that global agricultural productivity grew at a rate of 0.44%
    per annum.
  8: The analysis involves imposing a 1% additional change in total rainfall and mean
    temperature variabilities annually, and a 0.1% additional change in LTP and LTT
    annually.
  9: The paper reports that the global TFP grew annually at a rate of 0.44%, with
    various efficiency levels and growth rates detailed in Table 2.
  10: "The paper provides geometric means of TFP change and its components for different\
    \ country categories based on income, land elevation, weather regime, and geographic\
    \ location, expressed as index values (e.g., TFP Change Index of 0.851 for low\
    \ elevation countries).  It also mentions that a 1% increase in crop diversity\
    \ index will increase the likelihood of an increase in TFP, technical-, scale-,and\
    \ mix-ef\uFB01ciency by0.585%,0.031%, and0.074%, respectively."
  11: Quantitative estimates of marginal effects for various factors affecting TFP
    change and its components are provided (e.g., a 0.043 change for Spending under
    TFP Change Index).
  12: Effects of land elevation on TFP and efficiency changes, with higher elevation
    initially increasing TFP but later reducing it.
  13: Projected TFP changes from 2013 to 2033 range from +5.74% to +6.20% under different
    scenarios, with a significant mean difference compared to a counterfactual model
    with no additional climate variabilities.
