Drivers of Risk:
  1: Deviations of daily temperature from seasonal expectations impact macro-economic
    growth.
  2: Day-to-day temperature variability
  4: Day-to-day temperature variability is identified as a significant factor impacting
    regional growth rates, with more variability contributing to negative outcomes.
  5: Day-to-day temperature variability and its interaction with seasonal temperature
    differences are key drivers impacting growth rates.
  6: Day-to-day temperature variability.
  10: Changes in day-to-day temperature variability impact regional economic growth
    rates.
  12: Day-to-day temperature variability is the shock impacting regional growth rates.
Evaluation overview:
  1: The study evaluates the impact of day-to-day temperature variability on macro-economic
    growth.
  2: Regional economic growth rates
  4: The paper evaluates the impact of day-to-day temperature variability on annual
    regional growth rates and finds that larger variability has damaging effects on
    growth.
  5: Marginal losses from an increase in day-to-day temperature variability are larger
    for low-income regions, indicating a significant impact on economic growth.
  6: Economic growth.
  10: Marginal effects of day-to-day temperature variability on regional economic
    growth rates are evaluated.
  12: Marginal effects of day-to-day temperature variability on regional growth rates
    are evaluated.
Highlights:
  1: Day-to-day temperature variability reduces macro-economic growth independent
    of annual average temperature.
  2: Day-to-day temperature variability has a negative linear effect on regional growth
    rates; the magnitude of the response is modulated by the seasonal temperature
    difference; regions with smaller seasonal temperature differences are affected
    more by day-to-day temperature variability; effect is independent of changes in
    annual average temperature.
  4: The damaging effect of day-to-day temperature variability is consistent across
    agricultural, manufacturing, and services sectors, with significant impacts observed
    in spring, summer, and autumn.
  5: Low-income regions are more vulnerable to temperature variability due to income
    levels and lack of historical exposure, while high-income regions better adapt
    due to income and exposure.
  6: "The effect of day-to-day temperature variability on macroeconomic growth constitutes\
    \ a previously unidentified impact channel of considerable magnitude in the climate\u2013\
    economy relationship."
  10: Regions with smaller seasonal temperature differences experience greater economic
    losses from increased temperature variability.
  12: Higher income regions generally experience smaller marginal losses, though the
    difference with low-income regions is not significant.
Methodology:
  1: Combines observed day-to-day temperature variability with subnational economic
    data for 1,537 regions worldwide over 40 years in fixed-effects panel models.
  2: Fixed-effects panel regression models using regional economic data and ERA5 climate
    data (1979-2018); analysis at the regional level to increase statistical power
    and reduce weakening of climate and economic signals; controls for contemporaneous
    global shocks, omitted biases between regions, and region-specific trends.
  4: The analysis involves regression models controlling for frequency of heat-stress
    days and examining the impact on different economic sectors, supported by robustness
    tests across various datasets and regional aggregations.
  5: Analysis performed by partitioning data based on national income and using regression
    models to estimate marginal losses; results are applicable to varying income regions.
  6: Econometric specification. Applicable in the United States.
  8: Regression models include terms for temperature variability and interaction with
    average seasonal temperature differences.
More Notes:
  2: Suggests exposure to greater seasonal temperature changes cultivates resilience
    against day-to-day variability; marginal losses from day-to-day temperature variability
    are largest in low-latitude and coastal regions.
  6: Spill-over effects from regional effects to national growth rates may potentially
    attenuate or aggravate the direct effects.
Quantitative material:
  1: An extra degree of day-to-day temperature variability results in a five percentage-point
    reduction in regional growth rates on average.
  2: An extra degree Celsius of day-to-day temperature variability reduces the regional
    growth rate by at least five percentage points.
  4: Fig. 3 illustrates the reduction in regional growth rates per extra degree of
    day-to-day temperature variability, with a greater impact observed in countries
    with lower GDP per capita.
  5: Marginal change in growth rate is quantified in percentage points with respect
    to day-to-day temperature variability.
  6: "Day-to-day temperature variability has been 0.2\xB0C on average, translating\
    \ to economic growth effects of approximately one percentage point under their\
    \ central econometric specification."
  8: Marginal effects of changes in temperature variability on economic growth are
    calculated, dependent on seasonal temperature differences.
  10: "The analysis provides marginal effects of a 1\xB0C increase in day-to-day temperature\
    \ variability on growth rates."
sourcematerial:
  1: Elevated annual average temperature has been found to impact macro-economic growth.
    However, various fundamental elements of the economy are affected by deviations
    of daily temperature from seasonal expectations which are not well reflected in
    annual averages. Here we show that increases in seasonally adjusted day-to-day
    temperature variability reduce macro-economic growth... Combining observed day-to-day
    temperature variability with subnational economic data for 1,537 regions worldwide
    over 40 years in fixed-effects panel models, we find that an extra degree of variability
    results in a five percentage-point reduction in regional growth rates on average...
    Annual average temperature as well as degree days do not reflect the degree of
    variability in daily realizations of temperature... we test whether the degree
    of variability in realizations of temperature has an effect on macro-economic
    outcomes by assessing historical changes to economic data and day-to-day temperature
    variability on a global scale.
  2: "Source material here.\nWe find that day-to-day temperature variability has a\
    \ negative linear effect on regional growth rates. An extra degree Celsius of\
    \ day-to-day temperature variability in a given year and region reduces the regional\
    \ growth rate by at least five percentage points... Moreover, the dependence of\
    \ the effect on the seasonal temperature difference has strong implications for\
    \ its geographical distribution... Marginal losses from an increase in day-to-day\
    \ temperature variability are largest in low-latitude and coastal regions as these\
    \ regions typically experience small seasonal temperature changes and are hence\
    \ less resilient to variability in daily temperature... Importantly, the effect\
    \ of day-to-day temperature variability on regional growth rates is unaffected\
    \ by the inclusion of annual average temperature under all specifications... We\
    \ calculate our measure from the European Centre for Medium-Range Weather Forecasts\
    \ (ECMWF) Reanalysis fifth generation (ERA5) climate data for the years 1979\u2013\
    2018 and combine it with a regional economic dataset... By conducting our analysis\
    \ at the regional level, not only do we increase our statistical power, but we\
    \ also reduce the weakening of climate and economic signals that occurs by aggregating\
    \ over spatially heterogenous variables... We then apply fixed-effects panel regression\
    \ models to exploit within-region changes of day-to-day temperature variability\
    \ and regional growth from one year to the next... Specifically, countries which\
    \ experience smaller seasonal temperature differences are affected more by a given\
    \ change in day-to-day temperature variability.\n"
  4: 'Source material: "The reduction in regional growth rates per extra degree of
    day-to-day temperature variability (marginal change) is larger in countries with
    lower gDP per capita", "Moreover, we find that day-to-day temperature variability
    in spring, summer and autumn has significant effects of similar magnitudes on
    annual regional growth rates (Supplementary Table 2). This suggests that the effect
    of variability is independent of the proximity of the underlying temperature level
    to heat-stress thresholds, thereby providing further evidence that greater variability
    is inherently damaging", "Marginal change in growth rate (percentage points)",
    "We conduct a number of further robustness tests on the observed effect of day-to-day
    temperature variability. The use of different climate re-analysis datasets tests
    the consistency of the assimilation and interpolation techniques applied by re-analyses
    to the observational data (Supplementary Table 4). Weighting climate data by population
    rather than by area tests the sensitivity of the results to the regional aggregation
    of climate data (Supplementary Table 5). The inclusion of region-specific time
    trends accounts for possible regional trends in economic growth and climate (Supplementary
    Table 6).", "We exploit the sectoral detail of our economic dataset to show that
    the effects of day-to-day variability are approximately equal across the agricultural,
    manufacturing and services sectors (Supplementary Table 3). This suggests that
    a broad range of economic channels are sensitive to changes in day-to-day temperature
    variability."'
  5: "Source material here.\n    \"marginal losses from an increase in day-to-day\
    \ temperature variability are generally larger for regions in low-income nations\
    \ compared with those in higher-income nations.\"\n    \"Marginal change in growth\
    \ rate (percentage points)...\"\n    \"By partitioning our CAN data on the basis\
    \ of median national income and re-evaluating the analysis separately on each\
    \ dataset...\"\n    \"This provides some evidence that lower-income regions are\
    \ more vulnerable to increases in day-to-day temperature variability due to their\
    \ low income itself, in addition to their relative lack of exposure...\"\n   \
    \ \"Moreover, in higher-income regions the effect of day-to-day variability shows\
    \ a stronger response to the seasonal temperature difference...\"\n"
  6: "The effect of day-to-day temperature variability on macro-economic growth thus\
    \ constitutes a previously unidentified impact channel of considerable magnitude\
    \ in the climate\u2013economy relationship. [...] Doing so may have knock-on implications\
    \ for the social cost of carbon and for determining optimum levels of mitigation.\n\
    \nThis translates to economic growth effects of approximately one percentage point\
    \ under our central econometric specification (Table 1, column (3)).\n\nSpill-over\
    \ effects may potentially attenuate or aggravate these effects, but a thorough\
    \ assessment of their role requires explicit assessment of the trade, financial\
    \ and infrastructure networks through which they may propagate.\n"
  8: "Source material here.\n\"We apply fixed-effects panel regression models to estimate\
    \ the effect of the annual measure of day-to-day temperature variability ... on\
    \ economic growth.\"\n\"Our primary source of climate data is the ERA5 re-analysis\
    \ dataset ... also use the daily temperature at surface and daily total precipitation\
    \ from the WFDEI... and EWEMBI... reanalysis datasets.\"\n\"Regions are taken\
    \ to be the highest administrative unit within a country, as indicated in the\
    \ GADM Database of Global Administrative Areas.\"\n\"To compare climate variables\
    \ with macro-economic data, an assessment must be made at the yearly level.\"\n\
    \"As a measure of economic activity, we use data on economic output at the subnational\
    \ level, referred to as gross regional product, for 1,537 regions in 76 countries\
    \ spanning the years 1979\u20132018.\"\n\"For our main modelling specification,\
    \ we add a term that interacts day-to-day temperature variability with the average\
    \ seasonal temperature difference.\"\n\"The results of the different regression\
    \ model specifications are shown in the columns of Table 1. The estimated parameters...\
    \ yielded 29,603 observations...\"\n\"The marginal effect of a change in day-to-day\
    \ temperature variability is the change in the regional growth rates that we estimate\
    \ would occur from an increase in day-to-day temperature variability\"\n"
  10: "Source material: Extended Data Fig. 1 |Marginal effects of day-to-day temperature\
    \ variability on regional economic growth rates. Marginal effects of a 1\xB0 Celsius\
    \ increase of day-to-day temperature variability on regional growth rates, as\
    \ estimated by model (7) in Table 1. Regions which are accustomed to smaller seasonal\
    \ temperature differences suffer greater marginal losses (greater negative marginal\
    \ changes) from a 1 degree increase of day-to-day temperature variability. 95%\
    \ confidence intervals are shown shaded, and the histograms show the distribution\
    \ of the data used to estimate the model."
  12: 'Source material

    Marginal effects of a 1 degree increase of day-to-day temperature variability
    on regional growth rates, estimated for regions with below- and above-median regional
    income. When partitioned based on regional-income, the difference between the
    response of high- and low-income regions is not significant, although above-median
    income regions generally experience smaller marginal losses.

