  3: "Source material here: \"Sea level change is determined by mea- suring time (age)\
    \ and height of water with respect to datum levels. GMSL variations are caused\
    \ primarily (Figure 1) by changes in ocean tempera- ture (tens of centimeters\
    \ on annual to centennial timescales, with up to 10 m over the past 48 million\
    \ years due to cool- ing), changes in land ice volume (meter scale operating on\
    \ decadal to centennial scales and up to 200 m on astronomical timescales of ~20\
    \ thousand years [kyr] to 2,400 kyr), and changes in the volumes of ocean basins...The\
    \ yet-to-be formally defined Early Anthropocene epoch (Zalasiewicz, 2008) can\
    \ be partly characterized by human-induced modifications of Earth\u2019s climate\
    \ state due to changes in atmospheric CO2 concentrations from 280 ppm in ~1850\
    \ to 414 ppm in 2020 CE, with current trends projected to lead to 600\u2013900\
    \ ppm in this century in the absence of strong global climate policy (Riahi et\
    \ al., 2017; Meinshausen et al., 2020). Sea level change is determined by mea-\
    \ suring time (age) and height of water with respect to datum levels. We refer\
    \ sea level to the modern mean sea level (MSL) datum level (https://tidesandcurrents.noaa.gov/\
    \ datum_options.html). Instrumental mea- surements of RSL are based on data from\
    \ The yet-to-be formally defined Early Anthropocene epoch (Zalasiewicz, 2008)\
    \ can be partly characterized by human-induced modifications of Earth\u2019s climate\
    \ state.\""
  5: "Source material here.\n\"The solution to this enigma is that there were small\
    \ (15\u201325 m sea level equivalent or 25%\u201340% of modern volume), ephemeral\
    \ ice sheets during the Late Cretaceous to Eocene in the interior of Antarctica\
    \ (Miller et al. 2005a; Miller et al., 2020).\"\n\"We posit that sea level variations\
    \ on the order of 15\xB110 m occurred as significant ice sheets grew and decayed.\"\
    \n\"The sea level record older than 48 million years is dashed because of uncertainties\
    \ in the Mg/Ca record.\"\n\"Sea level obtained using benthic (Cibicidoides) foraminiferal\
    \ \u03B418Obenthic splice and \u03B418Oseawater using temperatures from Mg/Ca\
    \ records.\"\n\"(B) Comparison of smoothed sea level estimates from \u03B418O\
    \ and Mg/Ca (blue; obtained by interpolating to 20 kyr intervals and using a 49-point\
    \ Gaussian convolution filter, removing periods shorter than 490 kyr) with backstripped\
    \ (progressive accounting for the effects of compaction, loading, and thermal\
    \ subsidence) onshore New Jersey estimates.\"\n\"Significant ice sheets can exist\
    \ in regions of high Antarctic topography even while subtropical conditions persist\
    \ along the coast.\"\n\"The New Jersey estimates for the Early to Middle Eocene\
    \ were shifted by \u201350 m to compensate for long-term (2\u201310 million years)\
