Drivers of Risk:
  2: Climate variations, atmospheric CO2 levels, ice sheet dynamics, and tectonic
    processes are identified as primary drivers of GMSL changes.
  3: "Changes in ocean temperature, changes in land ice volume, changes in the volumes\
    \ of ocean basins, and human-induced modifications of Earth\u2019s climate state\
    \ due to changes in atmospheric CO2 concentrations."
  5: Changes in temperature and ice sheet volume drive sea level variations.
  8: Anthropogenic warming, specifically greenhouse gas emissions, is identified as
    a primary driver of modern GMSL rise. Other drivers include ocean warming, melting
    of ice sheets and mountain glaciers.
Evaluation overview:
  2: The paper provides an overview of changes in global mean sea level (GMSL) as
    an outcome of different climate states and their impact on shorelines.
  3: Sea level change.
  5: Sea level changes over the Cenozoic era (last 66 million years).
  8: This page discusses global mean sea level (GMSL) rise.
Highlights:
  2: "Significant GMSL rise is projected under moderate and high emissions scenarios,\
    \ suggesting possible rises of 0.4\u20131.0 m this century and long-term rises\
    \ of ~10 m or more, with greater than 2 m in the 21st century and tens of meters\
    \ in the long term under high emissions."
  3: GMSL variations are caused primarily by changes in ocean temperature, changes
    in land ice volume, and changes in the volumes of ocean basins.
  5: Significant ice sheets can exist in regions of high Antarctic topography even
    while subtropical conditions persist along the coast.
  8: Modern GMSL rise is primarily due to anthropogenic warming and is accelerating.
    Future sea level rise depends heavily on emissions pathways.
Methodology:
  2: Analysis based on geological and climatic studies, focusing on historical and
    ancient sea-level records.
  3: Sea level change is determined by measuring time (age) and height of water with
    respect to datum levels.
  5: "Sea level is estimated using benthic foraminiferal \u03B418O benthic splice\
    \ and \u03B418Oseawater using temperatures from Mg/Ca records. Sea level estimates\
    \ are also obtained using backstripped onshore New Jersey data. A 49-point Gaussian\
    \ convolution filter is applied to smooth the sea level estimates from \u03B4\
    18O and Mg/Ca records."
  8: The page references statistical analysis of satellite and tide gauge records,
    as well as simple regression models, to determine rates and accelerations of sea
    level rise. Mentions process modeling and use of ancient sea level analogs.
More Notes:
  3: "The Early Anthropocene epoch can be partly characterized by human-induced modifications\
    \ of Earth\u2019s climate state."
  5: "The sea level record older than 48 million years is dashed because of uncertainties\
    \ in the Mg/Ca record. The New Jersey estimates for the Early to Middle Eocene\
    \ were shifted by \u201350 m to compensate for long-term (2\u201310 million years)\
    \ effects that are likely due to changes in mantle dynamic topography."
  8: The page emphasizes that emissions to date have committed humanity to a world
    of sea level rise not seen for 3 million years.
Quantitative material:
  2: "Quantitative information includes past GMSL rises and falls, such as ~66 m of\
    \ rise during peak warm intervals, sea levels ~22\xB110 m above present in the\
    \ Pliocene, and a low of ~130 m below present during the Last Glacial Maximum."
  3: "CO2 concentrations from 280 ppm in ~1850 to 414 ppm in 2020 CE, with current\
    \ trends projected to lead to 600\u2013900 ppm in this century in the absence\
    \ of strong global climate policy."
  5: "Sea level variations on the order of 15 \xB1 10 m occurred as significant ice\
    \ sheets grew and decayed. Small (15\u201325 m sea level equivalent or 25%\u2013\
    40% of modern volume), ephemeral ice sheets existed during the Late Cretaceous\
    \ to Eocene in the interior of Antarctica."
  8: "The rate of sea level rise between 1900 and 2015 is stated as 1.6 \xB1 0.4 mm/yr.\
    \ The rate of sea level rise increased from 2.1 \xB1 0.1 mm/yr to 3.4 \xB1 0.3\
    \ mm/yr from 1993 to 2015. Simple extrapolation of the acceleration seen in satellite\
    \ data predicts over 0.7 m of GMSL rise by 2100 and a ~12.5 mm/yr rate of rise\
    \ in 2100."
