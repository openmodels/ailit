  8: "Source material: The Early Holocene (11.3\u20138.2 ka), GMSL rise slowed to\
    \ ~8 mm yr\u20131 and progressively slowed to 2 mm yr\u20131 in the Middle Holocene\
    \ (8.2\u20134.2 ka) and less than 1 mm yr\u20131 by 5 ka (Figure 3A; Lambeck et\
    \ al., 2014). The modern rise is not a remnant of deglaciation but rather due\
    \ to anthropogenic warming. GMSL today is driven primarily by ocean warming (~40%)\
    \ and the melting of ice sheets (~30%) and mountain glaciers (~20%) Statistical\
    \ analysis of satellite and tide gauge records by Dangendorf et al. (2019) shows\
    \ a 1.6 \xB1 0.4 mm yr \u20131 rate of sea level rise between 1900 and 2015, with\
    \ the current acceleration beginning in the late 1960s. The rate of sea level\
    \ rise increased from 2.1 \xB1 0.1 mm yr\u20131 to 3.4 \xB1 0.3 mm yr\u20131 from\
    \ 1993 to 2015 (Dangendorf et al., 2017). Simple extrapolation of the acceleration\
    \ seen in the satellite data (Nerem et al., 2010; Beckley, 2016) predicts over\
    \ 0.7 m of GMSL rise by 2100 (Figure 3D, thick black line) and a ~12.5 mm yr\u2013\
    1 rate of rise in 2100. Statistical analysis of satellite and tide gauge records...a\
    \ simple regression model...Both process modeling (Clark et al., 2016) and ancient\
    \ sea level analogs discussed here...The modern rise is not a remnant of deglaciation\
    \ but rather due to anthropogenic warming...human choices about emissions become\
    \ an increasingly important driver in the second half of this century and beyond.\
