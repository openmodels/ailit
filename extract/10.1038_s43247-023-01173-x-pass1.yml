Drivers of Risk:
  1: The key drivers of risk identified are higher temperatures, daily temperature
    variability, and extreme precipitation, which affect inflation.
  2: Shocks and changes impacting outcomes include fluctuations in average monthly
    temperatures, variability in daily temperatures, and seasonal and regional climate
    variations.
  3: Temperature shocks and extreme weather conditions, such as excess heat or precipitation,
    are identified as drivers impacting inflation.
  4: The drivers of risk include future warming, intensification of weather extremes,
    and anthropogenic greenhouse gas emissions.
  5: The primary driver of risk is increasing average temperatures under future climate
    change scenarios (SSP126 and SSP585) from CMIP-6 climate models.
  6: Shifts in average temperatures and unpredictable heat extremes are the main drivers
    impacting food inflation, affecting both the magnitude and seasonal variability.
  7: The primary driver of risk is extreme summer heat, with future climate change
    amplifying these impacts.
  8: Higher-than-normal temperatures, especially in hot months and countries, and
    future climate change leading to increased intensity of hot extremes.
  9: The paper examines the impact of deviations from historical climate conditions
    on economic factors, using temperature anomalies and precipitation extremes as
    key variables.
  10: Weather shocks, specifically changes like temperature, are examined for their
    impact on monthly inflation rates over the course of the following year.
  11: Future climate change leading to increased summer temperatures is identified
    as a driver of risk impacting inflation.
Evaluation overview:
  1: The paper evaluates the impact of climate conditions on inflation, focusing on
    economic productivity and price stability.
  2: This paper provides an assessment of the impacts of weather fluctuations on inflation,
    specifically examining historical and future conditions to predict welfare losses.
  3: This page evaluates the impact of temperature shocks on food and headline inflation.
  4: The paper evaluates the potential impact of future warming on inflation, specifically
    food inflation and headline inflation.
  5: The paper evaluates the impact of future average temperature conditions on annual
    national inflation rates for food and headline prices.
  6: This page evaluates the impact of future climate change on food inflation, particularly
    focusing on the seasonal variability and geographical distribution of inflation
    pressures by 2035.
  7: The paper evaluates the impact of summer heat extremes on food and headline inflation
    in Europe.
  8: The paper evaluates the impact of temperature on inflation, particularly food
    and headline inflation.
  10: The paper evaluates the impact of climate variables on monthly inflation rates,
    focusing on deviations from normal seasonal conditions.
  11: The paper evaluates the hypothetical impact on inflation caused by future weather
    conditions under projected climate change.
Highlights:
  1: The most important outcome is that climate change is likely to increase food
    and headline inflation, with the effects varying by region and season, and the
    strongest pressures at low latitudes.
  2: Temperature increases have nonlinear, persistent impacts on food and headline
    inflation, with more significant effects in hotter months or regions.
  3: Temperature increase impacts are consistent across different income levels and
    historical adaptation to temperature increases has been limited.
  4: Projected global warming will cause persistent upward pressures on inflation
    with considerable magnitudes in the coming decades, particularly impacting food
    inflation.
  5: The analysis finds seasonal heterogeneities in inflation pressures, with stronger
    upward pressures in summer and weaker or downward pressures in winter at higher
    latitudes. Impacts are fairly constant across seasons at low latitudes. The analysis
    finds that the distribution of baseline temperatures across seasons is an important
    factor in driving the seasonal signal at high latitudes, with the exception of
    Europe where more rapid warming in summer also contributes.
  6: Future climate change is projected to amplify seasonal variability of food inflation
    in most latitudinal bands and exacerbate inflationary pressures during unpredictable
    heat extremes, as demonstrated by the 2022 European summer heat example.
  7: Extreme heat events are already impacting inflation in Europe, and these impacts
    will be amplified by future warming. The amplification of impacts on food inflation
    by 2035 is estimated to be 30-50% due to climate change.
  8: Climate change is likely to alter inflation seasonality, increase inflation volatility
    and heterogeneity, and place persistent pressures on inflation levels. The inflationary
    impact of temperature shocks depends on baseline climatic conditions.
  10: Accounting for linear time trends in regression enhances the magnitude of estimated
    effects, indicating the removal of estimation biases; cumulative marginal effects
    are calculated to assess impact on prices from 1-unit climate shocks.
  11: The main outcome is the assessment of how future warming could amplify impacts
    on inflation from extreme summer temperatures.
Methodology:
  1: The study uses fixed-effects regressions on over 27,000 monthly consumer price
    index observations worldwide to determine impacts.
  2: The analysis uses fixed-effects panel regression models, employing high-resolution
    weather data and monthly price indices to explore response dynamics and heterogeneity
    of weather shock effects across seasons.
  3: Analysis conducted using fixed-effects panel regressions applied to over 27,000
    global observations of monthly price indices and weather fluctuations from 1996-2021;
    includes robustness tests and multiple statistical approaches.
  4: The analysis is based on empirical models using future climate projections from
    CMIP-6 under different emission scenarios (SSP), assessing temperature impacts
    on inflation without unprecedented adaptation or monetary policy response.
  5: The analysis uses an empirical specification to estimate the exogenous pressure
    on inflation arising from future weather conditions. It considers increasing average
    temperatures and uses baseline empirical specifications from Supplementary Tables
    S4 & S5. It abstracts from historically unprecedented adaptation, policy response,
    and macroeconomic interactions. The analysis uses monthly CPI data.
  6: The analysis uses temperature projections from the CMIP-6 climate models for
    the SSP585 scenario to assess future impacts on food inflation, incorporating
    ensemble estimates for various regions and the impact of 2022 summer extremes
    as a case study.
  7: The analysis projects future impacts using CMIP-6 climate models under different
    SSP emission scenarios. Impacts are regionally aggregated using population weighting.
  8: The analysis uses monthly, non-seasonally adjusted price data from 121 countries
    from 1996-2021 and estimates inflation rates as the first difference in the logarithm
    of consumer price indices (CPI). The estimates assume constancy in other factors
    which may be important for future developments of inflation.
  9: National-level exposure to climate changes is estimated using population-weighted
    averages from ISIMIP data.
  10: The analysis uses a dynamic panel model with country, date, and country-month
    fixed effects, and linear time-trends; it includes 11 lags for each weather variable
    and for inflation rates to assess both contemporaneous and delayed effects, with
    robustness tests involving Driscoll Kraay errors and World Bank inflation data.
  11: The analysis uses CMIP-6 models with population weighting, evaluates monthly
    average temperatures, and projects impacts on inflation using a specific equation
    with terms calculated from historical and future climate data.
More Notes:
  2: The study combines historical impacts with climate model projections to evaluate
    future climate change implications on inflation.
  5: Data on national administrative boundaries are obtained from the GADM database
    version 3.6. The study accounts only for increasing average temperatures.
  7: The paper acknowledges limitations in detecting the impact of precipitation changes
    on food prices due to the higher spatial variability of precipitation compared
    to temperature. They also mention that electricity prices show some consistent
    and persistent response to temperature increases.
  8: The paper suggests that central banks may need to make monetary policy decisions
    also in response to weather and climate shocks. Adaptation through unprecedented
    technological changes offers an opportunity to limit pressures on inflation in
    a changing climate.
Quantitative material:
  1: The analysis estimates upward pressures on food inflation of 0.92-3.23 percentage-points
    and headline inflation of 0.32-1.18 percentage-points per year globally by 2035.
  2: "The analysis shows a cumulative effect on food inflation of 0.17 percentage\
    \ points over a year, following a 1\xB0C increase in monthly temperature."
  3: "The analysis quantitatively shows the cumulative marginal effects of a 1\xB0\
    C increase in monthly temperature on inflation rates, evaluated over different\
    \ baseline temperatures."
  4: Quantitative estimates of inflationary pressures due to projected temperature
    conditions for 2035 are provided, including a range of 0.92-3.23 percentage points
    per year for food inflation, and 0.32-1.18 percentage points per year for headline
    inflation.
  5: The analysis projects the pressure on annual national inflation in food and headline
    price aggregates by 2035. It also provides point estimates (averages) and standard
    deviations of impacts across an ensemble of 21 CMIP-6 climate models.
  6: Quantitative estimates are provided for both the seasonal variability change
    (percentage change) and annual impact on food inflation during anomalous heat
    events, such as a 0.67 percentage-point impact from the 2022 summer heat in Europe.
  7: "By 2060, the amplification of such extreme impacts would diverge under different\
    \ emission scenarios, remaining at 1.1 percentage-points (0.6\u20131.8) under\
    \ the most optimistic scenario compared to 1.8 percentage-points (1.0\u20133.2)\
    \ under the most pessimistic scenario of emission mitigation, an amplification\
    \ of nearly 200%."
  8: "A 1.5\xB0C quarterly summer temperature increase leads to a 0.38%-points impact\
    \ on food inflation. A 1.5\xB0C temperature increase, evaluated at a baseline\
    \ of 23.5\xB0C, indicates an impact of 0.17%-points on inflation; persistent temperature\
    \ shock across all three months implies a 0.49%-points impact. Persistent upward\
    \ pressures on annual food inflation of 1-3 percentage-points per-year could result\
    \ from temperatures projected for 2035."
  11: Quantitative estimates of annual impacts on inflation from monthly temperature
    changes are provided, which also consider an uncertainty range based on different
    climate models and emission scenarios.
sourcematerial:
  1: "Source material:\nClimate impacts on economic productivity indicate that climate\
    \ change may threaten price stability. Higher temperatures increase food and headline\
    \ inflation persistently over 12 months in both higher- and lower-income countries.\
    \ Effects vary across seasons and regions depending on climatic norms, with further\
    \ impacts from daily temperature variability and extreme precipitation. Evaluating\
    \ these results under temperature increases projected for 2035 implies upwards\
    \ pressures on food and headline inflation of 0.92-3.23 and 0.32-1.18 percentage-points\
    \ per-year respectively on average globally (uncertainty range across emission\
    \ scenarios, climate models and empirical specifications). Here we apply \uFB01\
    xed-effects regressions to over 27,000 observations of monthly consumer price\
    \ indices worldwide to quantify the impacts of climate conditions on in\uFB02\
    ation. Pressures are largest at low latitudes and show strong seasonality at high\
    \ latitudes, peaking in summer. Finally, the 2022 extreme summer heat increased\
    \ food in\uFB02ation in Europe by 0.43-0.93 percentage-points which warming projected\
    \ for 2035 would amplify by 30-50%."
  2: "Source material here.\n- Evaluation overview: \"a comprehensive assessment of\
    \ the climatic risks on inflation\" and \"imply considerable welfare losses when\
    \ evaluated through both these micro-3,14,15 and macroeconomic impact channels10,11,16,17.\"\
    \n- Drivers of Risk: \"a rich response of inflation in different price aggregates\
    \ to fluctuations in a variety of weather conditions\" and \"non-linear impacts\
    \ of average temperature9\u201311, temperature variability12, and various aspects\
    \ of precipitation13 on aggregate economic output.\"\n- Quantitative material:\
    \ \"causing a cumulative effect on food inflation of 0.17 percentage points over\
    \ the following year (when occurring in country-months with a temperature of 25\
    \ C.\"\n- Methodology: \"Our empirical framework quantifies the plausibly causal\
    \ effects of fluctuations in historical weather conditions\" and \"using fixed-effects\
    \ panel regression models.\"\n- Highlights: \"Temperature increases cause nonlinear,\
    \ persistent increases in food and headline inflation.\"\n- More Notes: \"by combining\
    \ our results with projections from physical climate models we are able to assess\
    \ the implications of these impacts under the weather conditions projected with\
    \ future climate change.\"\n"
  3: "Source material here.\n\"This page evaluates the impact of temperature shocks\
    \ on food and headline inflation.\" - \"The cumulative marginal effect of temperature\
    \ shocks on food and headline inflation. a A schematic outline of the mechanisms\
    \ via which temperature shocks may impact inflation via agricultural productivity\
    \ and food prices.\"\n\n\"Temperature shocks and extreme weather conditions, such\
    \ as excess heat or precipitation, are identified as drivers impacting inflation.\"\
    \ - \"Excess wet conditions cause upwards impacts on food and headline prices...\
    \ Excess dry conditions have some significant upwards impacts when coinciding\
    \ with hot months or regions.\"\n\n\"The analysis quantitatively shows the cumulative\
    \ marginal effects of a 1\xB0C increase in monthly temperature on inflation rates,\
    \ evaluated over different baseline temperatures.\" - \"Lines indicate the cumulative\
    \ marginal effects of a one-off 1\xB0C increase in monthly temperature on month-on-month\
    \ inflation rates, evaluated at different baseline temperatures (colour) reflecting\
    \ the non-linearity of the response.\"\n\n\"Analysis conducted using fixed-effects\
    \ panel regressions applied to over 27,000 global observations of monthly price\
    \ indices and weather fluctuations from 1996-2021; includes robustness tests and\
    \ multiple statistical approaches.\" - \"The results of fixed-effects panel regressions\
    \ from over 27,000 observations of monthly price indices and weather fluctuations\
    \ worldwide over the period 1996-2021.\"\n\n\"Temperature increase impacts are\
    \ consistent across different income levels and historical adaptation to temperature\
    \ increases has been limited.\" - \"The fact that fluctuations of average temperature\
    \ cause equivalent impacts on inflation in high- and low-income countries suggests\
    \ that historical adaptation to temperature increases via socioeconomic development\
    \ has been limited.\"\n"
  4: "markdown\nEvaluation overview: \"the empirical evidence for the historical impacts\
    \ of weather shocks on inflation suggests that the ongoing warming and intensi\uFB01\
    cation of weather extremes and variability due to anthropogenic greenhouse gas\
    \ emissions may have consequences for future inflation.\", \"we evaluate the empirical\
    \ responses...for temperatures under projected future climate conditions.\", \"\
    Future warming to amplify pressures on inflation. The impacts...indicating potential\
    \ pressures on food inflation and headline inflation.\"\nDrivers of Risk: \"the\
    \ empirical evidence for the historical impacts of weather shocks on inflation\
    \ suggests that the ongoing warming and intensification of weather extremes and\
    \ variability due to anthropogenic greenhouse gas emissions may have consequences\
    \ for future inflation.\"\nQuantitative material: \"suggest upwards inflationary\
    \ pressures...on food inflation of 1.49\xB10.45 or 1.79\xB10.54 percentage-points\
    \ per year (p.p.p.y.)\", \"range of potential pressures on food inflation of 0.92-3.23\
    \ p.p.p.y. by 2035, and of 0.32-1.18 p.p.p.y. for headline inflation.\"\nMethodology:\
    \ \"we evaluate the empirical responses identi\uFB01ed above for temperatures\
    \ under projected future climate conditions...from an ensemble of 21 bias-adjusted\
    \ climate models from the Coupled Model Intercomparison Project Phase 6 (CMIP-6)\
    \ under different emission forcing scenarios from the Shared Socioeconomic Pathways\
    \ (SSP)\", \"As such, these results should be interpreted as the potential future\
    \ exogenous pressure on inflation from future climate conditions, based on the\
    \ causal relationships inferred with the empirical models, and assuming other\
    \ socioeconomic factors such as demographic developments and changes in the consumption\
    \ basket remain constant (principle of ceteris paribus).\"\nHighlights: \"We find\
    \ that the temperature conditions projected for 2035 under future warming imply\
    \ upwards inflationary pressures.\"\n"
  5: "Source material here.\nThe pressure on annual in\uFB02ation rates from the average\
    \ temperature conditions projected under future climate change. Maps of the pressure\
    \ on annual national in\uFB02ation in the food (a) and headline (b) price aggregates\
    \ from the average weather conditions expected by 2035 under a high-emission scenario\
    \ (SSP585) as estimated from the projections of CMIP-6 climate models. The annual\
    \ pressure on in\uFB02ation aggregated across world regions (population weighted),\
    \ at different time periods under both a low (SSP126) and high (SSP585) emission\
    \ scenario for food (c) and headline (d) price aggregates. Point estimates show\
    \ the average, and error bars the standard deviation, of impacts as projected\
    \ across the ensemble of 21 CMIP-6 climate models. Impacts are estimated accounting\
    \ only for increasing average temperatures using the baseline empirical speci\uFB01\
    cation shown in column 1 of Supplementary Tables S4 & S5. Estimates re\uFB02ect\
    \ the exogenous pressure on in\uFB02ation arising from future weather conditions\
    \ in the absence of historically un-precedented adaptation, policy response, and\
    \ abstracting from any possible interactions with macroeconomic developments (see\
    \ text for discussion). The use of monthly CPI data allows us to further assess\
    \ how the estimated pressures on in\uFB02ation from future temperature conditions\
    \ under projected climate change are distributed across the year. Concerning food\
    \ in\uFB02ation, these impacts are fairly constant across seasons at low latitudes\
    \ but vary considerably across sea-sons in Northern mid-latitudes (20-40 N) where\
    \ they can be more than twice as large in summer compared to winter (Fig. 3a).\
    \ At the highest latitudes (>40 N) upwards pressure in summer con-trasts downwards\
    \ pressure in winter. Large seasonal cycles of temperature at higher latitudes\
    \ lead to stronger upward pressures in summer contrasting weak or downward pressures\
    \ in winter, whereas less variable baseline temperatures throughout the year at\
    \ low-latitudes result in fairly constant impacts across seasons. These seasonally\
    \ heterogenous pressures would cause alterations to the usual seasonal cycle of\
    \ food in\uFB02ation. Data on national administrative boundaries are obtained\
    \ from the GADM database version 3.6 (https://gadm.org/). Impacts are estimated\
    \ accounting only for increasing average temperatures using the baseline empirical\
    \ speci\uFB01cation shown in column 1 of Supplementary Tables S4 & S5.\n"
