  9: 'The analysis uses ERA-5 reanalysis data for temperature and precipitation, with
    a 0.25-by-0.25-degree resolution, focusing on the years 1990-2021. This is evidenced
    by: "All data from ERA-5 is obtained on a regular 0.25-by-0.25-degree grid for
    the years 1990-2021." Furthermore, SPEI is calculated for one, two, three, six,
    and twelve-month timescales to assess impacts of climate shocks over different
    periods as stated: "We estimate SPEI at one, two-, three-, six- and twelve-month
    timescales to flexibly assess the impacts of shocks across these timescales."
    National-level exposure to climate changes is estimated using population-weighted
    averages from ISIMIP data, shown in the statement: "Monthly average temperature,
    temperature variability and the measure of daily precipitation extremes are aggregated
