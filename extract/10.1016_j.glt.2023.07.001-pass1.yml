Drivers of Risk:
  1: Fossil fuel-driven climate change and air pollution are identified as significant
    threats to human health and well-being.
  2: Fossil fuel combustion leading to air pollution (PM, O3, NO2) and climate change
    (including extreme climatic events, high temperatures, and intense rainfall).
  3: Environmental exposures including air pollution, climate change, fossil fuel
    combustion, and mental illness affecting child health.
  4: Climate change can harm respiratory health through extreme temperatures, increased
    severity and frequency of air pollution episodes (heatwaves, wildfires, dust storms
    increasing PM, O3, and black carbon), and increased aeroallergens. Air pollution
    exposure also negatively affects children's mental health. Extreme weather events,
    particularly hurricanes and flooding, cause physical trauma or death. Climate
    change-related droughts and sea-level rises may cause displacement, violence,
    and crime.
  5: The drivers of risk discussed on this page are high temperatures, air pollution,
    climate-related undernutrition, and infections.
Evaluation overview:
  1: The paper assesses the impact of fossil fuel combustion on children's health
    and the associated losses of human capital.
  2: Health impacts on children (from fetuses to adolescents) including adverse birth
    outcomes, effects on the neural system, malnutrition and infectious disease, respiratory
    effects, physical trauma and mental illness, due to air pollution and climate
    change with a life-course perspective.
  3: Evaluates health outcomes such as cognitive deficits, malnutrition, respiratory
    disease, and infectious disease in children due to environmental exposures.
  4: This paper provides an overview of the impacts of climate change and air pollution,
    mediated by children's health damages, on long-term human capital, considering
    health, cognitive ability, and non-cognitive/socio-emotional ability.
  5: This paper evaluates the impacts of climate change and air pollution on cognitive
    and non-cognitive ability, and subsequently on economic outcomes.
Highlights:
  1: Climate change and air pollution deteriorate children's health and affect human
    capital in adulthood through damaged early-life health.
  2: Children are uniquely vulnerable to air pollution and climate change. Maternal
    exposure to air pollutants (PM, O3, NO2) is significantly associated with adverse
    birth outcomes (PTB, LBW, SGA). Extreme climatic events are also essential triggers
    of PTB and LBW.
  3: Emphasizes the impact of prenatal and postnatal exposure to pollutants on children's
    neurodevelopment and overall health.
  4: Early-life health impairments associated with climate change or air pollution
    predict illness or disability in adulthood. PTB/LBW infants have higher risk for
    chronic diseases as adults.
  5: Climate change and air pollution can impact lifetime cognition through multiple
    health damages, and that early-life health damages can significantly affect childhood
    academic achievement.
Methodology:
  2: Review of scientific evidence to summarize major health effects on developing
    fetuses and children to reflect the impacts of fossil fuel combustion, from a
    life-course perspective.
More Notes:
  2: The paper argues that current assessments underestimate the health benefits of
    policies that reduce fossil fuel combustion, particularly for vulnerable groups
    like children. It advocates for a more holistic assessment of the impacts of fossil
    fuel burning on current and future human health and potential. The paper references
    the 'fetal origins hypothesis' suggesting health damages in fetuses and early
    childhood can impede lifetime development of human capital.
Quantitative material:
  2: Cord plasma insulin levels significantly increased by 15.8% for each SD increment
    in PM2.5 levels during the entire pregnancy and was most pronounced in the 2nd
    trimester. Relative risks due to high-temperature exposures ranged from 1.05-
    to 1.16-fold for adverse birth outcomes.
  4: ''
  5: Mentions meta-analyses finding that preterm birth (PTB) and low birth weight
    (LBW) are associated with IQ scores 10-12 points lower than those born typically.
sourcematerial:
  1: "The paper assesses the impact of fossil fuel combustion on children's health\
    \ and the associated losses of human capital. Fossil fuel-driven climate change\
    \ and air pollution are identified as significant threats to human health and\
    \ well-being [1]. The paper aims to summarize the current evidence on the health\
    \ effects of fossil fuel-driven air pollution and climate change on children and\
    \ their consequent effect on human capital stemming from these early health damages.\
    \ Climate change and air pollution deteriorate children's health and affect human\
    \ capital in adulthood through damaged early-life health. More than a century\
    \ of fossil fuel emissions has mainly led to the Earth's average surface temperature\
    \ increasing by approximately 1.1\xB0C14C since pre-industrial times [2]. The\
    \ Intergovernmental Panel on Climate Change (IPCC) has concluded that urgent action\
    \ is needed to limit global warming to 1.5\xB0C14C above pre-industrial levels.\
    \ To more fully assess the far-reaching effects of fossil fuel combustion on humanity,\
    \ it is necessary to gain an in-depth understanding of the full impact of fossil\
    \ fuels on human health and lifetime potential."
  2: "Source material here:\n\nHere, we summarize the scienti\uFB01c evidence of the\
    \ major health effects on developing fetuses and children to re\uFB02ect the impacts\
    \ of fossil fuel combustion (Fig. 1). This review discusses the current understanding\
    \ of children's health impacts from a life-course perspective in terms of how\
    \ air pollution and climate change may affect the development of children. These\
    \ include adverse birth outcomes that re\uFB02ect damages to the fetuses, effects\
    \ on the neural system whose development is dominant in the \uFB01rst year of\
    \ life, malnutrition and infectious disease which occur primarily in infancy,\
    \ respiratory effects commonly seen in young children, and physical trauma and\
    \ mental illness that adolescents are more likely to be affected. Fossil fuels,\
    \ the primary source of air pollution and climate change, represent approximately\
    \ eighty percent of the total primary energy supply [15]. Fossil fuel combustion\
    \ causes signi\uFB01cant health damage to the child born today through air pollution\
    \ and climate change. Adverse birth outcomes, including birth defects, preterm\
    \ birth (PTB), low birth weight (LBW), small for gestational age (SGA), and intrauterine\
    \ growth restriction (IUGR), are known risk factors for premature death and neurodevelopmental\
    \ disorders in children [16e18]. Maternal exposure to multiple air pollutants,\
    \ particularly particulate matter (PM), ozone (O3), and nitrogen dioxide (NO2),\
    \ has been signi\uFB01cantly associated with adverse birth outcomes, particularly\
    \ PTB, LBW, and small for gestational age (SGA) [4,19]. Recent evidence con\uFB01\
    rmed that cord plasma insulin levels signi\uFB01cantly increased by 15.8% for\
    \ each SD increment in PM2.5 levels during the entire pregnancy and was most pronounced\
    \ in the 2nd trimester [22]. A recent systematic review of high temperatures and\
    \ adverse birth outcomes revealed that the relative risks due to high-temperature\
    \ exposures ranged from 1.05 to 1.16-fold [23]. Evaluating the health and profound\
    \ effects of fossil fuel combustion on children still need to be improved in current\
    \ assessments, which leads to a severe underestimate of the health bene\uFB01\
    ts of this highly vulnerable group. A more holistic assessment of the impacts\
    \ of fossil fuel burning on current and future human health and potential is essential\
    \ for incentivizing policies to facilitate this transition. According to the \u201C\
    fetal origins hypothesis\u201D, health damages in fetuses and early childhood\
    \ can further impede the lifetime development of human capital [10,11], which\
    \ is vital to the fate of individuals and nations.\n"
  3: "Source material here.\n\nEvaluation overview: The text discusses various health\
    \ outcomes affecting children due to environmental exposures, such as cognitive\
    \ deficits, malnutrition, respiratory diseases, and infectious diseases. This\
    \ is observed in sections like, \"prenatal environmental pollutants exposure may\
    \ induce oxidative stress and neuroin\uFB02ammation that disrupt... causing permanent\
    \ cognitive deficits\" and \"the prevalence of infectious diseases, including\
    \ pneumonia, diarrhoea, malaria and sepsis will increase among children.\"\n\n\
    Drivers of Risk: The impact of various environmental exposures is discussed in\
    \ the context of child health. Relevant text includes \"pathways from fossil fuel\
    \ combustion to the possible impacts on child health outcomes\" and \"climate\
    \ change increases diseases, including malnutrition, diarrhoea, and malaria.\"\
    \n\nHighlights: The analysis emphasizes the significant impact of pollutants on\
    \ children's neurodevelopment and health. Justifications include: \"brain neurons\
    \ start to grow... exposure may induce oxidative stress and neuroin\uFB02ammation\
    \ that disrupt... causing permanent cognitive deficits\" and \"Children are more\
    \ vulnerable to breathing in polluted air because of the immune lungs\u2019 capacity\
    \ to detoxify air toxins.\"\n"
  4: "Source material here.\nClimate change can harm respiratory health through multiple\
    \ routes. First, extreme temperatures, including extreme heat, extreme cold, and\
    \ temperature variations, were observed to increase hospital visits for asthma\
    \ in childhood. [...] Changed climate enhances the severity and frequency of air\
    \ pollution episodes, thereby directly and indirectly causing many pulmonary diseases.\
    \ Increased extreme weather events, including heatwaves, wild\uFB01res, and dust\
    \ storms, can contribute to elevated levels of air pollutants such as PM, O3,\
    \ and black carbon (BC), potentially exposing plenty of children. [...] Global\
    \ warming has promoted the growth of aeroallergens such as pollens and molds,\
    \ which causes more respiratory allergic diseases for children.\n\nRecently, global\
    \ warming is worsening some extreme weather events, particularly hurricanes, and\
    \ \uFB02ooding, which could directly cause physical trauma or death for children.\
    \ [...] Climate change and related disaster worsen children's physical health\
    \ and cause chronic and severe mental health disorders. [...] Climate change-related\
    \ droughts and sea-level rises may cause displacement, violence, and crime, further\
    \ threatening children's mental health in less developed and developing countries.\n\
    \nThis section summarizes the human capital effects due to climate change and\
    \ air pollution, which are mainly mediated by children's health damages, in terms\
    \ of three dimensions: health (represented by mortality and morbidity), cognitive\
    \ ability (measured by IQ and education outcomes), and non-cognitive/socio-emotional\
    \ ability (including psychological characteristics and behavioral tendencies).\n\
    \nDuring 1991-2018, approximately 37% of deaths related to heat exposure due to\
    \ anthropogenic climate change, and the increased mortality is evident on every\
    \ continent while burdens vary geographically.\n\nMoreover, many early-life health\
    \ impairments associated with climate change or air pollution predict illness\
    \ or disability in adulthood. [...] PTB/LBW infants tend to have relatively immature\
    \ organs and impaired vascular growth later in life, thus having a higher risk\
    \ for an array of chronic diseases as adults.\n"
  5: "\nEvaluation overview: \"This paper evaluates the impacts of climate change\
    \ and air pollution on cognitive and non-cognitive ability, and subsequently on\
    \ economic outcomes.\"\nDrivers of Risk: \"tween early-life exposure to high temperatures\
    \ or air pollutants and cognition or education in adulthood [33,34], we could\
    \ still speculate that climate change or air pollution may in\uFB02uence lifetime\
    \ cognition through multiple health damages summarized above [10,71].... Climate-related\
    \ undernutrition and infections will also impede cognitive development.\"\nQuantitative\
    \ material: \"A meta-analysis on IQ scores of children born preterm and at ages\
    \ 5e16 years found that the average IQ scores of PTB-born children were 11e12\
    \ points lower than peers born typically [72]. Another meta-analysis focusing\
    \ on LBW found similar reductions (10 points) in IQ scores of LBW children [73].\"\
    \nHighlights: \"Although only a few studies explored associations between early-life\
    \ exposure to high temperatures or air pollutants and cognition or education in\
    \ adulthood [33,34], we could still speculate that climate change or air pollution\
    \ may in\uFB02uence lifetime cognition through multiple health damages summarized\
    \ above [10,71]....Academic achievement is another re\uFB02ection of cognitive\
    \ ability and can be signi\uFB01cantly affected by early-life health damages due\
    \ to air pollution and climate change.\"\n"
