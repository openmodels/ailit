  17: No relevant information
Evaluation overview:
  3: Ecological, economic and social impacts of invasive hematophagous arthropods,
    including their role as vectors of pathogens and parasites.
  4: The review examines the ecological, economic, and health impacts of invasive
    hematophagous arthropods.
  5: The overview relates to the dispersal and spread of various parasite vectors,
    like mosquitos and ticks, across the globe.
  7: Expansion and re-emergence of associated vector-borne diseases.
  8: Increased health risks due to zoonotic diseases, transmission, and disease vector
    population growth after the arrival of alien hematophagous arthropods.
  10: The paper discusses how climate change exacerbates the economic costs and health
    burden of hematophagous arthropods on human societies.
  11: Focuses on the economic and health impacts of invasive hematophagous arthropods
    that vector diseases, including nuisance biting, recreational and real estate
    value loss, productivity, income, tourism, blood-supply system, personal protection,
    and quality of life.
  14: Nuisances to wildlife in addition to health and economic concerns posed to human
    populations.
