Drivers of Risk:
  2: Climate change, land-use change, and intensive transportation of humans and goods
    are identified as impacting the spread of invasive hematophagous arthropods.
  3: Ongoing climate change assisting invasion rates and facilitating range-shifting
    species; increasing travel and trade; land-use changes; human pressures on the
    environment; socioeconomic factors facilitating transport and spread of alien
    species.
  4: Globalization and climate change are identified as drivers of hematophagous arthropod
    proliferations. Intensification of trade and agricultural practices, and decrease
    of forest cover are also considered drivers.
  5: Historical events like European colonization, the transatlantic slave trade,
    the Industrial Revolution, World War II, the intensification of intercontinental
    trade, and global warming are listed as potential drivers of the dispersal of
    these vectors.
  7: Long distance transport, livestock trade, human-made artificial habitats (e.g.,
    used tires, ornamental plants like lucky bamboo), increased air transport and
    traffic, international trade, anthropogenic environmental disturbances, global
    development projects like the Belt and Road Initiative.
  8: Climate warming leading to more favorable thermal niches for hematophagous arthropod
    development, especially at higher latitudes and altitudes.
  9: Time lags in the spread and impact of alien hematophagous arthropods as they
    transition to invasive species.
  10: Climate change promotes geographic expansion and increased abundance of hematophagous
    arthropods, increasing disease transmission risks.
  11: Climate change and urbanization, particularly urban environments with dumping
    sites, road deterioration, and polluted waters, increase the risk and impact of
    mosquito invasions.
  12: Environmental pollution, such as light pollution in urban areas, can alter the
    life cycle and phenology of mosquitoes, increasing their proliferation and epidemiological
    significance.
  14: Accelerated worldwide urbanization and interconnectivity support mosquito proliferation
    and adaptations to human-modified environments.
