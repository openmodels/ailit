sourcematerial:
  2: 'Source material: Today, several major vector-borne diseases, currently described
    as emerging or re-emerging, are expanding in a world dominated by climate change,
    land-use change and intensive transportation of humans and goods. Burgeoning urbanization,
    climate change and the urban heat island effect are likely to interact to favor
    invasive hematophagous arthropods and the diseases they can vector. To mitigate
    future invasions of hematophagous arthropods and novel disease outbreaks, stronger
    preventative monitoring and transboundary surveillance measures are urgently required.
    Our capacities to manage invasive hematophagous arthropods in a sustainable way
    for worldwide ecosystems can be improved by promoting interactions among experts
    of the health sector, stakeholders in environmental issues and policymakers (e.g.
    the One Health approach)...'
  3: "Source material: Invasive hematophagous arthropods (those that establish and\
    \ spread outside of their native range) can be major vectors of pathogens and\
    \ parasites to animal and human populations. When they spread outside their historical\
    \ range because of human activities, these blood-feeding arthropods, such as mosquitoes\
    \ and ticks, can have ecological, economic and social impacts. Ongoing climate\
    \ change may assist the invasion rates of alien species in addition to facilitating\
    \ range-shifting species expanding beyond their native range (the so-called \u2018\
    neo-native\u2019 species). It is important to bear in mind that changing climate\
    \ and increasing travel and trade are interactive forces driving establishment\
    \ success during introduction and making the invasiveness of alien hematophagous\
    \ arthropods after introduction even more likely. In parallel, the world\u2019\
    s economic growth and intensification of international trade and travel exacerbate\
    \ these threats by promoting the emergence of vector-borne diseases. Often, invasive\
    \ alien species have tremendous costs to national economies; this is particularly\
    \ true for invasive hematophagous arthropods, which are sources of extremely high\
    \ healthcare costs. Recent assessments estimated that the economic cost of invasive\
    \ alien species reached at least US$ 2.168 trillion over the last 4 decades. The\
    \ review examines the different actions and roles that invasive hematophagous\
    \ arthropods, vectors of disease, play in a rapidly changing world, considering\
    \ a range of socioeconomic and ecological contexts and case studies. The paper\
    \ emphasizes the need to compile information on the historical and social aspects\
    \ of hematophagous arthropod invasions to inform policymakers and prepare robust\
    \ risk mitigation strategies based on lessons learned and sound risk assessment.\
    \ Despite the known health threat of invasive hematophagous arthropods, and their\
    \ high diversity, our understanding of how global change will impact the population\
    \ dynamics of existing and emerging invaders\u2014and the epidemiology of the\
    \ diseases they might transmit\u2014remains poor."
  4: 'yaml

    Evaluation overview: "Second, we explore the ecological, economic and health impacts
    of these taxa, anticipating a higher competitive ability of invasive alien species
    over natives, marked risks to native species through disease vectoring and substantial
    economic costs to activity sectors such as healthcare."

    Drivers of Risk: "First, we consider past and present invasions of hematophagous
    arthropods, assuming that ongoing globalization and climate change will drive
    and accelerate further proliferations in the future." ... "The transport and arrival
    of alien organisms by humans greatly increased during the fifteenth and sixteenth
    centuries through intensification in commercial trade, agricultural practices,
    decrease of forest cover and of fallows [42]."

    Quantitative material: No relevant information

    Methodology: "In doing so, we construct a timeline of past disease vector invasions
    across hematophagous arthropod groups, considering individual species and socio-economic
    drivers."

    Highlights: "Particularly, this review provides a novel synthesis of the historical
    contexts underpinning hematophagous arthropod invasions, by amalgamating, for
    the first time, a chronology of arrivals and pathways for these species..."

    More Notes: "Importantly, this review focuses in scope on all invasive hematophagous
    arthropods...however, given the uneven research effort that is predominantly targeted
    towards a few species of mosquitoes and ticks, as well as the expertise of the
    current authors, these taxa are most prominently exemplified in this review."
    ... "by amalgamating, for the first time, a chronology of arrivals and pathways
    for these species"

    '
  5: ' '
  7: Source material here. "Epidemics of West Nile virus expansion and re-emergence
    of associated vector-borne diseases has also increased [58]." "Long distance transport
    and livestock trade facilitated tick translocations... the means of introduction
    of alien tick species differ from those of mosquitoes, which have a more complex
    aquatic life history stage." "In general, life history traits often assist the
    invasive potential... used tire exports from countries such as Japan have been
    responsible for the introduction of Ae. albopictus to countries such as the USA
    [61]." "Connectivity among cities, international trade and anthropogenic environmental
    disturbances are likely to increase in the future, providing novel opportunities
    and generating ecological conditions propitious for the expansion or new introduction
    of hematophagous arthropods." "The worldwide development in the trade of used
    tires since the 1950s, and of certain ornamental plants, such as lucky bamboo
    (Dracaena sanderiana) [2], have become the principal points of entry within Europe
    and other continents." "The 'Belt and Road Initiative' (BRI) proposed by China
    is a prominent example, as this unprecedented global development project may promote
    further invasions by hematophagous arthropods."
  8: Climate change is likely to worsen health risks by increasing zoonotic diseases,
    transmission and disease vector population growth after the arrival of alien hematophagous
    arthropods (e.g. Ae. albopictus and Ixodes ricinus). Climate warming may have
    a major role in fostering hematophagous arthropod invasions by increasing the
    number of favorable thermal niches for their development, including towards formerly
    cold and restrictive environments, such as at higher latitudes and altitudes.
    Iwamura et al. suggested an increasing global suitability for life cycle completion
    of +1.5% (in terms of periods suitable for mosquito development) per decade between
    1950 and 2000, with that trend predicted to accelerate and increase by +3.2% per
    decade, and even up to +4.4% per decade, by 2050.
  9: "  \n\"Aedes albopictus...has already extended its distribution range to all\
    \ temperate zones of the planet in response to global warming and the increase\
    \ in human-mediated trade and transport.\" \n\n\"Given that climate is expected\
    \ to warm at least by 3 \xB0C by 2100, cold-related stresses will disappear in\
    \ many habitats of the world, and Ae. albopictus will no longer have to go through\
    \ the winter diapause stage to survive.\"\n\n\"Furthermore, the increasing rates\
    \ of sea level rise caused by global warming will significantly increase the area\
    \ of coastal marshes by incursions inland; those coastal marshes are historical\
    \ habitats for mosquitoes and their expansion would thus foster their re-emergence\
    \ alongside diseases.\"\n\n\"Many alien hematophagous arthropods, currently introduced\
    \ but apparently not spreading or causing impact yet, will likely transition to\
    \ invasive species in the future, owing to the concept of invasion debts.\"\n\n\
    \"In this context, the assessment of population dynamics and distributions of\
    \ hematophagous arthropods is key, as this then allows development of reliable\
    \ predictions for the effects of climate change on disease transmission, and thus\
    \ robust estimates of the populations that are at highest epidemiological risks.\"\
    \n"
  10: "yaml\nEvaluation overview: \"The impact of hematophagous arthropods on human\
    \ societies is often assessed either as an economic cost (in monetary currency)\
    \ or in disability-adjusted life year (DALY), which represents the life expectancy\
    \ lost because of the burden of insect-borne diseases. ... Economic costs therefore\
    \ appear to be more straightforward to use for synthetic and applied purposes...\"\
    \nDrivers of Risk: \"In the tropics, malaria\u2014the most prevalent mosquito-borne\
    \ disease\u2014is becoming more prominent in the highlands of Ethiopia and Colombia\
    \ because of the upward range shift of Anopheles mosquitoes along elevational\
    \ gradients of mountainous ecosystems in recent decades... Warmer conditions will\
    \ likely increase mosquito populations and abundance, in turn increasing biting\
    \ rates.\"\nHighlights: \"Warmer conditions will likely increase mosquito populations\
    \ and abundance, in turn increasing biting rates. As incubation periods for the\
    \ parasites and viruses they carry are also temperature-dependent, climate change\
    \ will certainly contribute to a switch from occasional to frequent disease outbreaks\
    \ (for instance, malaria and dengue), in parallel to providing more regions where\
    \ the vectors and their associated diseases could arrive and spread.\"\n"
  11: 'markdown

    Evaluation overview: "Even aside from direct health costs, invasions by hematophagous
    arthropods can cause substantial impacts through nuisance biting that affects
    recreational and real estate values which yield an economic return [123]...not
    to mention the contribution of each disease to DALY, which seldom include monetary
    values [18]." Drivers of Risk: "Urbanization and heat islands Four and a half
    billion people currently live in cities...This represents a growing opportunity
    for the development of invasive mosquito populations [131, 132] due to: (i) human-generated
    dumping sites in both public and private spaces; (ii) the deterioration of roads;
    (iii) the pollution of surface and ground waters, which some arthropod disease
    vectors (e.g. Cx. pipiens) use as resources...With climate change likely to provide
    opportunity for new invasions and exacerbate current ones, future economic impacts
    from hematophagous arthropods that vector diseases will likely rise substantially."
    Quantitative material: "A recent modeling study using logistic response curves
    to resemble impact dynamics showed that for the Ae d e s genus, current management
    delays of 55 years have led to an additional cost of US$ 4.57 billion that could
    have been avoided...With climate change projections over the next 3 decades likely
    to increase the area occupied by current arthropod invaders by 18%, the need for
    better biosecurity control to mitigate hematophagous arthropod nuisance biting
    and disease has never been stronger [7]." Highlights: "Rapid response to eradicate
    invaders post-invasion as well as the implementation of effective biosecurity
    control pre-invasion...are up to ten times cheaper for mosquito-borne diseases
    than waiting and paying for accrued damages [120]...Mosquito communities in urban
    areas have also been shown to be less diverse, but also more abundant, being dominated
    by a few species that are adapted to develop effectively in artificial environments
    [135]...With climate change likely to provide opportunity for new invasions and
    exacerbate current ones, future economic impacts from hematophagous arthropods
    that vector diseases will likely rise substantially."

    '
  12: "Source material: For example, in Guangzhou (China), urbanization providing\
    \ human-made container habitats is ben-eficial to Ae. albopictus [147] in the\
    \ absence of domestic populations from Ae. aegypti. Conversely, the more heat-sensitive\
    \ species Ae. japonicus suffers from urbanization in Fukuoka city ( Japan) and\
    \ especially from the urban heat island effect [148]. In agricultural lands, the\
    \ fertilization of rice and veg-etable crops usually takes place in warm and sun-lit\
    \ waters, already propitious to the development of Anoph-eles and Cule x mosquitoes.\
    \ Importantly, NPK fertilizers (N for nitrogen, P for phosphorus and K for potassium)\
    \ strongly attract gravid females of mosquitoes searching for nutrient-rich oviposition\
    \ sites [154\u2013157]...the three minerals enhance the development of bacteria,\
    \ algae and fungi, increasing the food biomass of the breeding sites [158]. The\
    \ larvae of mosquitoes exploit this additional biomass to proliferate. The effects\
    \ of light pollution, i.e. artificial light at night in urban areas, on the life\
    \ cycle and physiology of mosquitoes and other hematophagous arthropods that vec-tor\
    \ diseases are also becoming a growing research topic, possibly further strengthening\
    \ the invasion potential of alien species. A recent study indeed evidenced the\
    \ altera-tion of the seasonal phenology of Cx. pipiens, whose females have prolonged\
    \ reproduction and biting sea-sons when exposed to urban light pollution [153],\
    \ thus increasing the proliferation of alien mosquitoes and their epidemiological\
    \ significance. Moreover, mathematical sim-ulations have evidenced that high unsealed\
    \ tank densities and the presence of non-compliant tanks can bolster the invasiveness\
    \ of the species by reducing habitat fragmen-tation [146]....Human environments\
    \ can also foster the potential evo-lution of sub-populations, exemplified by\
    \ the supposed \u201CLondon Underground\u201D subspecies of Cx. pipiens, with\
    \ surface and subterranean populations genetically distinct and displaying different\
    \ reproductive and feeding behav-iors [151] (but see [152])....The growing human\
    \ population requiring increased agri-cultural productivity will lead to increased\
    \ insecticide resistance and proliferation of mosquito populations associated\
    \ with these activities [140]."
  13: 'Source material: "As populations gain awareness of the adverse ecological and
    health effects of biocides, the increasingly ineffective insecticide treatments,
    which apply to mosquitoes that vector disease first and foremost [173, 174], are
    the subject of burgeoning protests...The worldwide invasion of hematophagous arthropods
    is a longstanding and pervasive problem, which is predicted to further increase
    with climate-change."'
  14: "yaml\n\"Evaluation overview\": \"Nuisances to wildlife, highlighting the importance\
    \ of placing the manage- ment of these arthropods in a wider biodiversity context,\
    \ i.e. by the consideration of a multispecies well\u2010being.\"\n\"Drivers of\
    \ Risk\": \"accelerated worldwide urbani- zation and interconnectivity, which\
    \ could further support mosquito proliferation and adaptations to human-modified\
    \ environments\"\n\"Highlights\": \"(2) Several hematophagous arthropods have\
    \ exhib- ited strong ecological niche shifts... Here, we alert decision-mak- ers\
    \ and politicians to the knowledge gaps and grow- ing risks posed by accelerated\
    \ worldwide urbani- zation and interconnectivity... (3) Surveillance systems and\
    \ strong political commit- ment are required to set-up and maintain proactive\
    \ disease prevention programs and preparedness for rapid responses to outbreaks...\
    \ (4) Finally, social-ethnological approaches represent a valuable perspective\
    \ for setting mitigation meas- ures aiming at improving health and environments\
    \ in the context of proliferations of hematophagous arthropods that vector diseases...\
    \ Beside the significant health and eco- nomic concerns posed to human populations,\
    \ our review demonstrates several nuisances to wildlife, highlighting the importance\
    \ of placing the manage- ment of these arthropods in a wider biodiversity context\"\
    \n\"More Notes\": \"The authors declare no competing interests.\"\n"
