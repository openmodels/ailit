  17: No relevant information
Highlights:
  2: Invasive hematophagous arthropods and associated diseases are likely to increase
    due to changing urban conditions and climate, necessitating stronger monitoring
    and prevention measures.
  3: Invasive hematophagous arthropods can be major vectors of pathogens and parasites,
    leading to ecological, economic, and health problems.
  4: The review provides a novel synthesis of the historical contexts underpinning
    hematophagous arthropod invasions.
  5: The figure highlights the global spread of various disease vectors (Aedes mosquitoes,
    Anopheles mosquitoes, Culex mosquitoes, ticks, fleas), linking their dispersal
    to historical events and trade routes.
  7: Human-mediated transport of livestock, used tires, ornamental plants, and military
    equipment have been responsible for the introduction and spread of invasive mosquito
    and tick species.
  8: Climate change may foster hematophagous arthropod invasions by increasing the
    number of favorable thermal niches, potentially expanding their range towards
    the poles and worsening health risks.
  9: Emerging tick-borne and mosquito-borne diseases are expected due to shifts in
    vector distribution.
  10: Warmer conditions under climate change will increase mosquito populations and
    biting rates, contributing to more frequent disease outbreaks.
  11: Early action and effective biosecurity control are more cost-effective than
    delayed responses; urbanization enhances the development of invasive mosquito
    populations; climate change is likely to exacerbate the spread and impact of disease-vectoring
    arthropods.
  12: Urbanization and human activities contribute to mosquito proliferation, pest
    resistance, and potential shifts in mosquito phenology and behavior.
  14: Knowledge gaps and growing risks posed by accelerated worldwide urbanization
    and interconnectivity could further support mosquito proliferation and adaptations
    to human-modified environments. Surveillance systems and strong political commitment
    are required to set up and maintain proactive disease prevention programs and
    preparedness for rapid responses to outbreaks. Social-ethnological approaches
    represent a valuable perspective for setting mitigation measures aiming at improving
    health and environments in the context of proliferations of hematophagous arthropods
    that vector diseases. Management of hematophagous arthropods needs to be placed
    in a wider biodiversity context.
