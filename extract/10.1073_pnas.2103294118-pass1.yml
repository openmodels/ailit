Drivers of Risk:
  1: The primary driver of risk is enhanced greenhouse gas concentrations, which affect
    the intramonthly variability of daily surface temperature.
  2: Changes in daily temperature variability in boreal winter (DJF), boreal summer
    (JJA), and across the year (annual).
  3: Changes in daily temperature variability due to greenhouse gas forcing, particularly
    under the SSP-585 (business-as-usual emissions) scenario.
  4: Changes in daily temperature variability, attributed to increasing greenhouse
    forcing, impact climate outcomes.
  5: Changes in daily temperature variability, mean surface temperature changes, anthropogenic
    greenhouse forcing, surface warming
  6: High-frequency climate system changes in daily temperature variability are impacting
    outcomes.
  7: Changes in daily temperature variability due to greenhouse forcing.
Evaluation overview:
  1: The paper evaluates the impact of changes in daily temperature variability on
    societal outcomes, including human health, agriculture, and economic growth.
  2: No relevant information
  3: No relevant information
  4: The page evaluates changes in daily temperature variability attributed to greenhouse
    forcing over historical and projected periods.
  5: No relevant information
  7: Impacts of temperature variability on mortality, mental health, and crop yields
    are mentioned (though not directly evaluated in this paper itself). Mentions economic
    growth affected by day-to-day temperature variability
Highlights:
  1: The paper identifies distinct global patterns in the change of intramonthly variability
    of daily surface temperature with rising greenhouse gas concentrations. Variability
    increases at low to mid latitudes and decreases at northern mid to high latitudes.
    These changes are attributable to enhanced greenhouse forcing.
  2: Latitudinal polarization in annual and DJF daily temperature variability is detected,
    with reductions at northern mid to high latitudes opposed by increases across
    continental land mass. For JJA, reductions across North America, the high Arctic,
    and parts of North Africa are opposed by increases elsewhere. Increases in daily
    temperature variability in European summer and across the tropics and wider Southern
    Hemisphere confirm previous climate model predictions.
  3: LFCA is used to identify externally forced signals, potentially with greater
    accuracy than ensemble averages, even with only single model realizations. Strong
    latitudinal dependence on patterns of change.
  4: A high degree of spatial similarity is noted between observed and projected changes
    in daily temperature variability, especially for annual and DJF periods.
  5: Historically observed global patterns of change in daily temperature variability
    are extremely unlikely to occur due to natural internal variability and are consistent
    with the expected response to anthropogenic greenhouse forcing in the annual,
    DJF, and JJA cases. Changes in daily temperature variability will depend not only
    on the extent of greenhouse gas forcing, but also on the true climate sensitivity.
    Global climate models underpredict the extent to which daily variability changes
    in response to greenhouse forcing and surface warming, suggesting that CMIP-6
    projections provide only a lower bound on how variability may change under future
    forcing scenarios. There is a robust scaling between surface warming and variability
    changes. There are latitudinal variations between increasing and decreasing temperature
    variability between models.
  6: Daily temperature variability changes are projected to have strong impacts on
    human and ecological systems; biggest increases in variability observed in low-latitude
    regions.
  7: The approach differs from optimal fingerprinting by detecting low-frequency patterns
    of change from observations and simulations separately, avoiding assumptions about
    the accuracy of climate models in simulating the true response to greenhouse forcing.
    Uses spatiotemporal covariance information to separate low-frequency signals from
    internal climate variability, which is less obscured by internal variability than
    methods based on linear trends.
Methodology:
  1: The paper uses reanalyses of historical observations and a multi-model ensemble
    from the Coupled Model Intercomparison Project Phase 6 (CMIP6).  A signal-to-noise-maximizing
    pattern-filtering technique is used to isolate the changes in daily temperature
    variability from internal climate variability.
  2: Low-frequency component analysis (LFCA), an extension of principal component
    analysis (PCA), is used to identify spatial patterns with coherent low-frequency
    temporal evolution. LFCA is applied to historical reanalyses of daily temperature
    variability. The NOAA 20th Century Reanalysis is the primary specification. Results
    are compared to ERA-5 reanalysis. Robustness is tested via alternative LFCA specifications
    and grid-cell linear trends.
  3: Uses a multimodel ensemble of 10 bias-corrected CMIP-6 models and applies Lowest-Frequency
    Component Analysis (LFCA) to identify forced signals from internal climate variability.
    Analysis covers 1950-2100 under historical and SSP-585 forcing. LFCA identifies
    monotonically increasing patterns of change from multidecadal climate variability.
  4: The analysis uses pattern-correlation statistics to attribute historical changes
    in temperature variability to greenhouse forcing, utilizing data from NOAA and
    the CMIP-6 ensemble.
  5: Changes in daily variability and mean temperature changes are estimated for each
    ensemble member from the lowest-frequency component identified with LFCA. Patterns
    of change are land-area averaged. Assesses whether daily variability and mean
    temperature changes covary across CMIP-6 models and forcing scenarios. Historically
    observed variability changes are compared to CMIP-6 ensemble given the historical
    level of warming (NOAA 20th Century Reanalysis used).
  6: Assessment of a multimodel ensemble of CMIP-6 climate models; LFCA method to
    identify low-frequency climate variability signals.
  7: Uses Low-Frequency Component Analysis (LFCA) to separate low-frequency signals
    from internal climate variability. Calculates pattern correlations between reanalyses
    and CMIP-6 ensemble under greenhouse forcing. Assesses the covariance of simulated
    per-decadal warming and variability changes across CMIP-6 models and forcing scenarios
    using least-squares linear regression. LFCA method is applied to reanalysis and
    CMIP-6 data.
More Notes:
  1: The study suggests that the equilibrium climate sensitivity will also play a
    role in determining the extent of future variability changes.
  2: The study aims to separate externally forced climate signals from internal multidecadal
    variability. The spatial patterns of change are largely consistent between the
    NOAA 20th Century Reanalysis and ERA-5.
  3: The analysis focuses on daily temperature variability, and finds the ensemble
    models represent historical daily temperature variability well. The study presents
    results for annual, boreal winter (DJF), and boreal summer (JJA) seasons.
  5: No relevant information
Quantitative material:
  1: Daily temperature variability is projected to increase by up to 100% at low latitudes
    and decrease by 40% at northern high latitudes by the end of the century under
    a business-as-usual emissions scenario. Mitigation of greenhouse gases can limit
    these changes.  Changes in daily variability exhibit strong covariation with warming
    across climate models.
  2: Increases and decreases of up to 40% and 20% over the past 65 years in daily
    temperature variability are reported.
  3: "Presents Interdecadal changes (1950\u20131960 to 2090\u20132100) due to the\
    \ lowest-frequency component of daily temperature variability."
  4: "Quantitative information on temperature change rates is shown, with a color\
    \ scale indicating temperature changes in \xB0C per decade."
  5: Similarity of historically observed response to forced response is significant
    at least at the 1% level in annual and DJF cases and at the 10% level in the JJA
    case using the centered pattern-correlation statistic (R). Similarity is unmatched
    in the CMIP-6 control runs in all seasons and, therefore, significant at least
    at the 0.24% level using the uncentered pattern-correlation statistic (C).
  6: Observed global changes in daily temperature variability of up to 40%, projected
    to change by a further 100% by the end of the century under a business-as-usual
    emissions scenario.
  7: Calculates centered (R) and uncentered (C) pattern correlation statistics. Uses
    500 years (300 for one model) of CMIP-6 control runs to assess significance of
    correlations. Calculates interdecadal changes between 1950-1960 and 2090-2100,
    and also between nonoverlapping decades separated by 25 years.
