  5: 'Source material here.

    Evaluation overview: Cumulative heat exposure of older individuals (PDDs) will
    at least triplicate in all continents by 2050, irrespective of the scenario considered.

    Drivers of Risk: Climate change will be the prevailing mechanism of change in
    more temperate nations of Europe and North America. Population aging will be the
    defining driver of future exposure in the warmer nations.

    Quantitative material: Cumulative heat exposure of older individuals (PDDs) will
    at least triplicate in all continents by 2050, irrespective of the scenario considered.

    Highlights: If absolute exposure is measured in terms of people, Asia will experience
    levels of older adult heat exposure nearly four times higher than the other regions
    put together due both to its large, aging population and hot climate.

