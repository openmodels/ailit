  1: "                                                                           \
    \          \nThe paper evaluates the heat exposure impact on older adults, focusing\
    \ on risks such as heat-related mortality: \"Climatechangehaspotentiallydireconsequencesforthehealthandwell-being\
    \ of older adults...Increases in the intensity, duration, and frequency of heat\
    \ spells pose direct threats to physical health and mortality risk, with especially\
    \ severe consequences for older adults, given their heightened susceptibility\
    \ to hyperthermia and common health conditions worsened by heat exposure such\
    \ as cardiovascular disease.\"\n\nThe main driver of risk identified is increasing\
    \ heat exposure due to climate change: \"Theglobalpopulationisagingatthesametimeasheatexposuresare\
    \ increasing due to climate change.\"\n\nThe study projects that by mid-century,\
    \ over 23% of the global population aged 69+ will be exposed to climates exceeding\
    \ 37.5\xB0C at the 95th percentile of daily maximum temperature, compared to 14%\
    \ today: \"Moreover, >23% of the global population aged 69+ will inhabit climates\
    \ whose 95th percentile of daily maximum temperature exceeds the critical threshold\
    \ of 37.5 \xB0C, compared with 14% today.\"\n\nThe analysis combines age-stratified\
    \ demographic projections with downscaled temperature data to mid-century: \"\
    Here we combine age-strati\uFB01 ed demographic projections with downscaled temperature\
    \ projections to mid-century...\"\n\nThe study highlights the severe effects of\
    \ chronic heat exposure on older adults, especially in Asia and Africa, with an\
    \ additional 177\u2013246 million older adults at risk: \"chronic exposure to\
    \ heat doubles across all warming scenarios... Effects are most severe in Asia\
    \ and Africa, which also have the lowest adaptive capacity. ...exposing an additional\
    \ 177\u2013246 million older adults to dangerous acute heat.\"\n"
  3: "Source material here. A north-south divide in terms of demographic composition\
    \ appears in most continents, with the exception of the Americas and Oceania,\
    \ where the distribution is less polarized. The maps reveal - in red - areas of\
    \ growing overlapping stress in both heat exposure and an aging population (parts\
    \ of the Americas, southern Europe, coastal China and several Southeast Asian\
    \ countries, and Australia), as well as - in yellow and shades of orange - areas\
    \ with strongly growing hot climate conditions but a relatively smaller demographic\
    \ pressure because of a younger population, and, \uFB01nally, areas where heat\
    \ exposure is and will remain more limited but the population is rapidly aging\
    \ (e.g. the northern parts of Asia and northern Europe).\nThe figures show that,\
    \ by the year 2050, the global heat-exposed population aged 69+ is projected to\
    \ grow considerably. If thresholds of 30 hot days per year, 37.5\xB0 C, and 1200\
    \ CDDs/yr (given the lack of critical CDD-related thresholds in the literature,\
    \ the value of 1200 CDDs/yr is de\uFB01ned as the mean number of CDDs in regions\
    \ where - under a historical climate - a TMAX95 > 37.5\xB0 C is recorded) are\
    \ considered as benchmark values for dangerous exposure (each represented by the\
    \ purple dashed vertical lines in panels A\u2013B and E\u2013F), then we estimate\
    \ exposed population aged 69+ to increase by 0.16\u20130.23 billion for #HDs,\
    \ 0.18\u20130.25 billion for TMAX95 and 0.23\u20130.32 billion for CDDs, respectively,\
    \ depending on the scenario considered. Based on the numbers summarised in Fig.\
    \ 2, we conclude that the share of the population aged 69+ will increase in all\
    \ continents, reaching the largest share in Europe (representing one-\uFB01fth\
    \ to almost one-quarter of the total population, depending on the SSP scenario).\
    \ Similarly, also in North America it may surge up to around one-\uFB01fth of\
    \ the total population.\nAs a result of a warmer climate and an older global population,\
    \ Population Degree Days (PDDs, namely the CDD exposure of all individuals aged\
    \ 69+) is projected to more than quadruple from the current 203 billion to about\
    \ 778\u20131008 billion in 2050, with the bulk of this growth concentrated in\
    \ Asia (where PDDs grow from about 150 to 588\u2013748 billion). Increases in\
    \ age 69+ populations are observed in all regions, consistent with past studies\
    \ of global population aging, but they are concentrated in high CDDs levels in\
    \ primarily low-income nations in the Global South, concentrated in Africa, Asia,\
    \ and South America. Conversely, older individuals increase in higher-income nations\
    \ of the Global North including North America and Europe is more centered in low\
    \ to intermediate CDD exposure levels. The largest cumulative exposure changes\
    \ are projected to occur in Africa (average elderly individual exposure growth\
    \ of about 195\u2013323 CDDs/yr), Asia (average growth of 312\u2013397 CDDs/yr),\
    \ South America (152\u2013270 CDDs/yr) and North America (120\u2013151 CDDs/yr).\
    \ For instance, more than 23% of the global population aged 69+ is projected to\
    \ be living in climates with TMAX95 > 37.5 \xB0C in 2050 compared to 14% in 2020,\
    \ an absolute increase of about 177\u2013246 million age 69+ individuals. Most\
    \ of these populations will be concentrated in Asia and Africa. Conversely, people\
    \ exposed to a TMAX95 < 37.5 \xB0C will remain mostly concentrated in Europe and\
    \ North America."
