  9: "The study evaluates population heat exposures by considering three meteorological\
    \ indicators: cooling degree days (CDD), the 20-year average 95th percentile of\
    \ daily maximum temperatures (TMax95th), and the 20-year average count of days\
    \ with a dry bulb maximum temperature of 37.5\xB0C (#HD). To measure individuals'\
    \ cumulative (chronic) heat exposure, CDD is computed based on a temperature threshold\
    \ of 24\xB0C. The article discusses APE and MAPE metrics to calculate the absolute\
    \ and relative differences when comparing different sources of population data.\
    \ The methodology involves computing age-, scenario-specific average growth factors\
    \ at the country level to adjust grid-cell level growth factors for each stratum.\
    \ The study also compares its projections with previous demographic studies across\
    \ different regional units to check for discrepancies, while noting that projections\
    \ apply to current and future climate epochs/SSP scenarios."
