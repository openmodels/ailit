  1: 'yaml

    Evaluation overview: "Climate econometric analysis of the relationship between
    temperature and gross domestic product (GDP) is increasingly being used to evaluate
    climate risks and understand economic impacts caused by climate change. We review
    the literature on growth and level effects (i.e., temperature rise respectively
    affects the growth and level of economic output)..."

    Drivers of Risk: "Climate econometric analysis of the relationship between temperature
    and gross domestic product (GDP) is increasingly being used to evaluate climate
    risks and understand economic impacts caused by climate change."

    Methodology: "The approach parameterises impacts in a reduced-form empirical model
    capturing the connection between climate and outcome; for example, temperature
    and GDP which are estimated referencing historical data to directly reflect real-world
    settings. Combing the cross-sectional and panel model would enable us to examine
    the economic impacts at different future times."

    Highlights: "Our findings show that estimates of damage through growth effects
    are generally much larger than those through level effects."

    '
  2: 'Source material here.

    "This study first identifies the critical differences between the growth and level
    effects of temperature and the determinants of them."

    "...estimating the relationship between temperature and GDP using the climate
    econometrics model can improve the accuracy..."

    "...this study reviews the development of climate econometric models and sorts
    out the characteristics of different model specifications of the temperature-GDP
    relationship..."

    "First, does temperature affect GDP level or growth?"

    "Future research should focus on developing climate econometrics models that incorporate
    or improve these variable forms..."

    "The literature review contributes significantly...suggests that future research
    should incorporate multiple model specifications of climate econometrics..."

    '
  3: Using growth or level effects to model the temperature-GDP relationship has been
    a controversial topic. The level effect assumes that temperature rises only temporarily
    affect the level of economic output, and once the temperature returns to the pre-warming
    value, the level effect disappears. In contrast, the growth effect assumes that
    temperature rise permanently affects economic output growth, and this effect will
    not disappear even if the temperature returns to the pre-warming value but will
    compound over time instead. [...] Some econometrics models directly aggregate
    related temperature to GDP levels. [...] As growth effect can cause permanent
    damage to the economy rather than just reducing output in a given year as level
    effect does, the damages compound over time for growth effect models, resulting
    in projected long-term economic damage of global warming that is orders of magnitude
    higher than conventional estimates. [...] As reflected in the examples above,
    previous research has not yet fully determined whether climate change has only
    a level or a growth effect; however, the two effects may simultaneously exist
    and could manifest at different future timing.
  4: "                                                                           \
    \                                                                            \
    \             \nstudies  have  examined  the  nexus between climate change and\
    \ the economy using linear model specifications. For example, ... the impacts\
    \ of annual average temperature ... on total production ...                  \
    \                   \n\n... examining spatiotemporal heterogeneity in climate\
    \ variables ... only developing country growth will be damaged by positive temperature\
    \ shocks.\n\n... annual temperature considerably impacts productivity levels.\
    \ Also, ... an inverted U-shaped temperature-GDP growth relationship ... , with\
    \ the threshold at 12.2 \xB0C.\n\n... summer heatwaves, prolonged cold spells,\
    \ higher temperatures ... impact on economic growth happen over shorter time frames.\n\
    \n... by concentrating on annual average temperature\u2014 ... danger of overlooking\
    \ the majority of extreme weather events ... suggesting that many climate-related\
    \ events which may have an impact on economic growth happen over shorter time\
    \ frames.\n\n... non-linear models have been modelled to capture the non-linear\
    \ relationships ... This approach allows the exploration of the marginal effects\
    \ of temperature ... highlighting the strengths over linear models.\n\n... Pretis\
    \ et al. (2018) introduced within-year monthly variables ... revealed that beyond\
    \ global non-linear temperature impacts, within-year variability ... had minimal\
    \ impact on economic growth.\n\n... It is essential to explore the impacts of\
    \ seasonal temperature when investigating how global warming affects GDP.\n\n\
    ... hybrid model includes both linear and non-linear models with interaction lag\
    \ terms... distinguish between short-term temperature shocks ... and long-term\
    \ climatic changes ...\n\n... seasonal temperatures impact the aggregate economic\
    \ output of the cities in China ... positive effects from cold seasonal temperatures\
    \ on economic growth.\n\n... suggests that examination of these seasonal variations\
    \ ... capture complex effect mechanisms ...\n"
  5: 'Source material here.

    Evaluation overview: This approach endeavours to uncover the non-linear effects
    of temperature on GDP.

    Drivers of Risk: For instance, several regressors to record the number of days
    per year that are inside defined temperature ranges... can be used to measure
    temperature.

    Methodology: Another variable specification, temperature bins, is defined by the
    frequencies at which the weather events fall into different bins... This specification
    requires high-resolution data since if data are aggregated across space or time
    before creating bins, extreme days could be averaged away... temperature trend
    included in the regression can cause biased estimation... by introducing variable
    specification of temperature deviation from its respective historical norm.

    Highlights: To advance the establishment of adaptation plans for a potentially
    unpredictable future because of climate change, the identification of such key
    temperature thresholds is crucial.

    More Notes: This is an econometric pitfall related to trended variables that can
    be addressed by introducing variable specification of temperature deviation from
    its respective historical norm.

