  7: '`

    Projections of future economic losses vary significantly depending on whether
    growth or level models are specified as growth effect shocks are considered to
    permanently damage the economy rather than temporarily reducing output in a given
    year as level effects do.


    ... Thus, an alternative for improving traditional damage functions is based on
    the recent empirical basis from a reduced-form temperature-GDP growth nexus...


    ... differentiate between short- and long-run effects as people and enterprises
    may adjust to long-run changes in the expected distribution of weather differently
    than they may to short-run...


    The mechanism by which climate impacts are modelled is critical as even the smallest
    growth effects would ultimately outweigh large level effects. Removing growth
    effects from the model would significantly reduce the potential economic losses
    from global warming.


    If this adaptation is significant, then the effect of weather change may not offer
    an appropriate analogue for the long-run effects of climate change.


    According to Dell et al. (2009) comparison of cross-sectional and panel data,
    adaptation mitigates the detrimental effects of temperature shocks by 50%.


    To overcome the bias estimation from extrapolation, future research should further
    refine the use of the long difference model (cross-sectional regressions)...


    Since GDP does not account for the monetized effects of temperature change on
    non-market sectors, future research should further enrich this limitation by exploring
    empirical links between climate change and biodiversity impacts, health losses
    and tipping points, and monetizing these climate impacts...


    The use of level and growth effects to evaluate climate change impacts has given
    rise to a long-standing and well-known controversy in the literature.


    Recent studies have led the trend to explore whether these two effects would both
    exist and how they manifest at different times, implying that future research
    should incorporate multiple model specifications of climate econometrics into
    a single model to distinguish between the two effects...

