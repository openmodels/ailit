Highlights:
  1: EV adoption leads to substantial reductions in greenhouse gas emissions.
  2: Adopting EVs plays a pivotal role in mitigating climate change impacts through
    significant reductions in greenhouse gas (GHG) emissions.
  3: EV adoption, coupled with grid decarbonization, can result in substantial GHG
    emissions savings, underscoring the necessity of adopting EVs in urban planning
    and policy-making to foster a sustainable transport model that aligns with climate
    targets.
  4: No relevant information
  7: The analysis highlights significant contributions, identifies new developments,
    and pinpoints geographical focuses in EV adoption research. It maps the broad-ranging
    effects of EV adoption across technology, policy, and market dynamics. The co-occurrence
    analysis identified 31 key terms from titles and abstracts related to EV adoption
    research.
  8: The co-occurrence maps highlight dominant terms like 'emission', 'strategy',
    and 'government', reflecting critical aspects of EV adoption, emission reduction,
    and policy developments. The map featuring 'electrification' highlights its pivotal
    role in sustainable transportation, connecting to 'transportation', 'framework',
    'infrastructure', and 'government'. China's role in the global EV market is also
    highlighted.
  11: The central theme is electric vehicles, particularly focusing on fleet operations,
    energy consumption, sustainability, and emissions control.
  12: Electric vehicle adoption is linked to sustainable practices, climate change
    mitigation, and energy strategy development
  13: Figure 8 highlights the relationships between various factors (like climate
    change, emissions control, and energy consumption) related to electric vehicle
    adoption. Figure 9 highlights the international scale of research on EV adoption
    and regional collaborations.
  14: The United States has the highest link strength in global collaborations. China
    leads in research volume and citations.
  15: The analysis highlights the interdisciplinary approach required to understand
    EV adoption, covering engineering, environmental science, and policy studies.
    It also identifies the journals most engaged with EV topics.
  16: EVs offer significant energy savings and cost efficiencies compared to ICEVs,
    especially in fleet settings. Optimizing operations for seasonal variations enhances
    economic viability. Targeted innovations in EV technology and management can have
    a profound impact on energy efficiency.
  17: Electric vehicles are recognized for superior operating efficiency and substantial
    energy savings compared to internal combustion engine vehicles (ICEVs).
  18: EVs exhibit substantial energy savings over internal combustion engine counterparts,
    particularly in smaller vehicle segments (two-wheelers and three-wheelers where
    savings can exceed 80%). The adoption of EVs presents an opportunity for significant
    cost savings and economic benefits across various sectors.
  19: Key outcomes include job creation due to EV manufacturing, the significant role
    of policies and infrastructure, and the reduction of GHG emissions and air pollution
    through EV adoption.
  20: Technological advancements are essential to fully leverage subsidies for EVs;
    subsidies alone are insufficient without concurrent technological support.
  21: The rise of electric transportation is reshaping the petroleum industry by reducing
    oil demand, prompting economic shifts, and contributing to environmental sustainability.
  22: EV adoption can lead to substantial reductions in carbon emissions, particularly
    for heavy-duty trucks, taxis, and buses.
  23: Tailored technological adoption of EVs is critical for achieving significant
    environmental improvements, meeting regulatory emissions targets, and fostering
    a sustainable operational model. EV adoption leads to CO2 mitigation, carbon footprint
    reductions, environmental benefits, and emissions cuts.
  24: EVs produce zero tailpipe emissions, leading to significant carbon savings compared
    to ICE vehicles; Nissan Leaf can save approximately 2 to 3 tonnes of CO2-equivalent
    annually.
  25: BEVs generally have lower lifecycle GHG emissions compared to ICE vehicles,
    even when considering variations in mineral extraction and processing emissions.
    The overall impact depends on the lifecycle stage balance, with BEVs having a
    higher impact during production but lower during operation.
  26: BEVs have significantly lower GHG emissions than ICEVs, and this difference
    will increase with grid decarbonization. Larger vehicles benefit substantially
    from electric powertrains in terms of GHG emissions.
  27: EVs offer significant environmental benefits, but these benefits are contingent
    on strategic considerations, local contexts, and technological advancements. Maximizing
    the advantages requires aligning EV deployment with local energy grid compositions
    and integrating EVs with renewable energy sources.
  28: Recycling EV batteries is energy-intensive and has environmental impacts. Pyrometallurgical
    recycling has high economic value but poor ecological value due to substantial
    GHG emissions. Hydrometallurgical recycling is less energy-intensive but produces
    toxic waste. Direct physical recycling shows the highest potential for reducing
    emissions but is still in the experimental stage. The electricity mix used for
    charging significantly affects the overall environmental impact of EVs. Renewable
    energy can significantly reduce the carbon footprint of both recycling and charging
    infrastructure.
  29: Direct physical recycling methods for EV batteries show high potential for emission
    reduction; Silica and graphene materials reduce the carbon footprint of tire manufacturing.
  30: Innovations in tire materials (graphene, silica) and advanced tire emission
    control strategies can significantly reduce the carbon footprint and particulate
    emissions associated with EV tires.
  31: The paper emphasizes the importance of advanced battery technologies and energy
    storage solutions, such as battery swap technology, routing algorithms considering
    battery health, predictive models for battery requirements, and deep learning
    for state of health estimation, in enhancing the operational dynamics, safety,
    reliability, and sustainability of EVs. The integration of supercapacitors with
    traditional batteries in hybrid energy storage systems (HESSs) is also highlighted
    as a promising solution for optimizing both power and energy density in EVs.
  32: Effective recycling minimizes the impact of mining activities, reducing habitat
    destruction, water pollution, and carbon emissions. It also decreases the volume
    of waste sent to landfills, promoting a circular economy.
  34: PV-powered EV charging systems can maximize energy utilization from PV arrays
    while minimizing inrush current transients and voltage fluctuations; FCEVs are
    competitive with conventional vehicles regarding range and refueling time, while
    offering significant environmental benefits, especially when utilizing green hydrogen;
    Strategic fleet electrification planning can integrate vehicle adoption with the
    development of charging infrastructure, offering both economic and environmental
    benefits.
  38: Key findings include the importance of integrated energy and transport policies,
    systemic benefits of fleet and charging management, and potential for emission
    reductions through electrification.
  40: Transition to electric mobility presents numerous benefits and opportunities,
    but realizing this potential fully requires coordinated efforts across technology,
    policy, and market domains.
Methodology:
  1: Comprehensive systematic review drawing from 88 peer-reviewed articles.
  4: Systematic review adhering to PRISMA 2020 guidelines using Scopus database for
    literature retrieval; search completed in August 2024.
  7: The paper uses bibliometric analysis with VOSviewer and content analysis of selected
    studies to map the field of EV adoption research, identify key themes, and geographical
    focuses. The bibliometric analysis uses a comprehensive dataset from Scopus and
    creates visualization maps using variably sized circles to represent concepts,
    authors, or studies. Co-occurrence analysis of titles and abstracts identifies
    core themes prevalent in the literature.
  8: The paper uses VOSviewer to construct and visualize bibliometric networks based
    on term co-occurrence. Node size reflects term frequency, and node proximity indicates
    the strength of the relationship. The analysis identifies key themes and connections
    related to EV adoption.
  11: Content analysis guided by keywords serves as a direct indicator of themes and
    trends in EV research.
  12: Keyword analysis and network visualization using VOSviewer to explore the thematic
    focus on EV adoption
  13: Analysis uses a visualization map generated for countries of co-authorship,
    requiring a country to be represented in at least four documents to be included;
    10 out of 39 countries met this threshold (Figure 9).
  14: The analysis examines EV adoption research by country, document count, citations,
    and total link strength, reflecting co-authorship connections. Authorship collaboration
    is analyzed through co-occurrence maps.
  15: A thematic analysis of 88 papers on EV adoption was conducted, using targeted
    searches within the original methodology to include additional relevant studies.
    The search strategy used the Scopus database and included English-language, peer-reviewed
    journal articles, published between 2019 and 2024.
  16: Advanced modeling tools, real-world operational data, and innovative vehicle
    operation strategies; use of AIMSUN software to model vehicle routes.
