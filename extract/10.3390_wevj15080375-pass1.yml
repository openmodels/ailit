  26: 'Source material here.

    The analysis demonstrates that BEVs, sold in 2023, emit roughly half the GHG over
    their lifetime compared to ICEVs. This trend continues to improve with grid decarbonization,
    as BEVs are projected to have significantly lower emissions by 2035. In the Stated
    Policies Scenario, BEVs in 2035 will have emissions about two-and-a-half times
    lower than ICEVs, and in the Announced Pledges Scenario, the difference increases
    to over three times. Well-to-tank emissions are expected to decrease significantly,
    by up to 75% in the Announced Pledges Scenario, due to cleaner electricity generation.

