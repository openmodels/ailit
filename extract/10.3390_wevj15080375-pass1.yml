  24: 'Source material here: EVs have become a pivotal solution for reducing carbon
    emissions in the transportation sector. Previous studies have shown that the environmental
    impact of EVs, like the Nissan Leaf, is significantly influenced by factors such
    as battery production, electricity grid composition, and vehicle usage patterns
    [100]. For instance, the production of a 40kWh battery for the Nissan Leaf contributes
    significantly to its initial carbon footprint. According to the IVL Swedish Environmental
    Research Institute, the emissions from battery production are estimated to be
    around 61kgCO2e/kWh[101], resulting in approximately 2.44 tonnes of CO2-equivalent
    emissions for the battery alone. Lifecycle assessment (LCA) is a comprehensive
    approach used to evaluate the environmental performance of vehicles from production
    to end-of-life. This methodology includes stages such as raw material extraction,
    manufacturing, use phase, and end-of-life. Moving on to the use-phase emissions,
    EVs like the Nissan Leaf produce zero tailpipe emissions, which is a significant
    advantage over ICE vehicles. The manufacturing phase of EVs like the Nissan Leaf
    typically results in higher GHG emissions compared to ICE vehicles, primarily
    due to the energy-intensive process of battery production.'
