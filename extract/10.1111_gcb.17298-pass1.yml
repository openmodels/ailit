Drivers of Risk:
  2: Rising summer average temperatures and increased humidity
  4: High temperature, low precipitation, short damaging events (heat waves, dry spells),
    and compounded weather events are impactful.
  5: Anomalies in average temperature and precipitation, and via the occurrence of
    dry spells; seasonal or shorter-term climatic conditions that reduce monoculture
    yields below local averages.
  6: Average maximum daily temperature, cumulated precipitation, length of the longest
    dry spell (maximum number of consecutive days with daily precipitation < 2 mm),
    and average maximum temperature during these dry days.
  7: Drivers of risk include decreased precipitation anomalies, increased dry spell
    length, and temperature anomalies.
  12: Growing season average daily maximum temperature anomalies (T), cumulated precipitation
    anomalies (P), the highest number of consecutive dry days (CDD), and average temperatures
    during that period (TDD).
  13: The drivers of risk include intra-seasonal climatic conditions, anomalies in
    Cumulative Degree Days (CDD) and Thermal Degree Days (TDD), warming temperatures,
    changes in precipitation, and length and temperature of dry spells.
  15: Climatic changes such as temperature increase, extended dry spells, and precipitation
    variability impact crop yields.
  16: Warming reduces yields in all crops irrespective of CRD and precipitation, with
    higher precipitation exacerbating yield reductions in winter small grains compared
    to spring small grains and maize.
  19: Increase in crop losses to insect pests due to warming climate (Deutsch et al.,
    2018)
  20: Excessive rainfall, extreme drought, high temperature, drought stress, and combined
    heat and drought are drivers impacting crop yields.
  21: No relevant information
Evaluation overview:
  2: Increase in heat-related mortality
  4: Crop yields are evaluated.
  5: Yield losses due to detrimental climatic conditions and grain yield benefits
    from increasing crop rotation diversity (CRD).
  6: Yield anomalies of winter and spring small grains and maize.
  7: The paper provides an overview of yield anomalies as the outcome being evaluated
    for different small grains and maize.
  12: Evaluates yield differences from baseline yield anomaly for spring small grains,
    winter small grains, and maize.
  13: The page evaluates the impact of species diversity in crop rotations on crop
    yields under different climatic conditions.
  15: The paper evaluates the impact of crop rotation diversification (CRD) on grain
    yield under varying climatic conditions.
  16: The paper evaluates yield benefits and responses to climatic conditions and
    crop rotation diversity (CRD) in crops across different climatic conditions.
  19: No relevant information
  20: Crop yield, specifically maize and soybean yields, and crop production are evaluated.
  21: No relevant information
Highlights:
  2: Urban populations in the Southeast are particularly vulnerable to increased heat-related
    mortality due to the combined effects of rising temperatures and the urban heat
    island effect.
  4: Increasing crop diversity by including more crops and/or cover crops in the rotation
    could increase yields. Crop rotation diversity (CRD) reduced maize yield losses
    in unfavorable years. Benefits of diverse rotation to small grain cereal yields
    were high during dry years. Yield benefits peaked at between two and four crop
    species in the rotation.
  5: The study explores how changes in grain yield across gradients of climatic conditions
    differ depending on whether functional richness or species diversity is used to
    characterize CRD. The aim is to support designing climate-resilient cropping systems.
  6: The study focuses on the effects of inter-annual variability of climatic indices
    on yield anomalies, removing the effects attributable to the local climate.
  7: Yield anomalies were increased by species diversity under fixed climatic conditions,
    although high species diversity levels decreased yield. Yield benefits changed
    in the presence of climatic variability such as dry spells and temperature anomalies.
  12: Species diversity can mitigate yield losses under various climatic conditions
    (different quartiles of temperature and precipitation) for spring small grains,
    winter small grains, and maize.
  13: Increasing species diversity can compensate for yield losses in monocultures
    caused by warming temperatures, precipitation anomalies, and longer dry spells.
    The yield-maximizing species diversity changes with climatic conditions. The compensatory
    effect of species diversity is maintained even in locations with high precipitation
    variability.
  15: The paper highlights that increasing CRD can enhance grain yields under both
    detrimental and favorable climatic conditions, potentially matching yield benefits
    of improved climatic conditions.
  16: Increasing crop functional richness enhances yields and compensates for reductions
    from adverse climatic conditions; species diversity effects on yield vary by climate
    and crop type.
  19: No relevant information
  20: Crop rotations can sustain cereal yields under a changing climate. Diversification
    improves cereal performance. Landscape-level crop diversity benefits biological
    pest control. Greater sensitivity to drought accompanies maize yield increase
    in the U.S. Midwest. Climate variation explains a third of global crop yield variability.
  21: No relevant information
Methodology:
  2: Statistical downscaling of climate models coupled with epidemiological data;
    applicable to urban areas in the Southeast US; projections are for the period
    2040-2060
  4: The study evaluates effects of crop rotation diversity (CRD) on crop yields in
    relation to climatic conditions and over time, collecting meteorological and grain
    yield data.
  5: The study uses data from 32 European and North American long-term experiments
    (LTEs) with 10-63 years of data. They analyse spring small grains, winter small
    grains and maize separately. Crop rotation diversity is measured using species
    diversity (modified Simpson's index) and functional richness (number of functional
    groups). The analysis accounts for variation relative to replicate and treatment
    effects.
  6: Mixed-effect models are used to explore how yield anomalies vary with crop rotation
    diversity (CRD) and pairs of climatic indices. Models are fitted separately for
    spring small grains, winter small grains, and maize. Statistical analyses use
    gridded meteorological data from E-OBS database for Europe and CONUS dataset for
    North America.
  7: The analysis uses mixed-effects statistical models with coefficients obtained
    from R using packages like 'lme4', 'DHARMa', 'car', and 'ggeffects'. Models were
    adjusted for multi-collinearity using Generalized Variance Inflation Factor (GVIF)
    and the robustness was tested by removing outlier sites.
  12: Uses a fitted equation (Equation 2) to predict yield difference from baseline
    yield anomaly as a function of species diversity, temperature and precipitation
    anomalies, consecutive dry days, and average temperatures during those dry periods.
    Results are shown at Year 15 of the experiment relative to monoculture baseline.
  13: The analysis uses a model to predict crop yields based on species diversity
    and climatic conditions at Year 15, considering long-term average temperature
    (T) and precipitation (P) as a baseline. The study considers different crop types
    (spring small grains, winter small grains, and maize).
  15: The analysis is conducted using model predictions based on fitted equations
    to assess yield differences due to CRD under different climatic conditions.
  19: No relevant information
  20: Studies use long-term multi-location trials, regression models, and analysis
    of crop rotations and functional crop diversity on farms to evaluate crop responses
    to climate and management practices. Livneh et al. (2015) use a spatially comprehensive,
    hydrometeorological dataset for Mexico, the U.S., and southern Canada from 1950-2013.
  21: No relevant information
More Notes:
  2: Considers acclimatization effects but does not account for adaptive measures
    like increased air conditioning use.
  5: LTEs included crop rotations ranging from continuous monocultures to up to six
    crop species grown in succession. Some experiments included fallow periods, cover
    crops, intercropping and undersowing.
  6: Growing season defined site-specifically for spring crops and maize based on
    planting and harvesting information. For winter crops, the growing season starts
    at the end of winter dormancy, as defined based on the rate of accumulation of
    growing degree days.
  12: The baseline is defined as the yield anomaly (deviations from site- and crop-specific
    local mean) of the monoculture under long-term average of T and P (or CDD and
    TDD) at t=15 years.
  19: No relevant information
  21: Several references are made to studies concerning climate change and agriculture,
    but no specific analysis results or methodology from this reference page content.
Quantitative material:
  2: A 15% increase in heat-related deaths is projected by 2050
  4: No quantitative information is available on this page.
  5: Yield anomalies are considered as mean-centred yield data obtained by subtracting
    the indicator crop-specific long-term mean yield from individual yield observations
    at each LTE.
  6: Equation (2) provides a mathematical model for yield as a function of species
    diversity (D), time (t), and climatic indices (X1 and X2).
  7: "Quantitative information includes the yield change in response to deviations\
    \ such as a 1.5\xB0C increase in temperature, and the impact on yield anomalies\
    \ under different climatic conditions and species diversity."
  12: Maximum yield benefits attainable via species diversity can range from 508 kg/ha
    to 1601 kg/ha depending on high/low yield conditions for small grains, and can
    be up to 1368 kg/ha for maize.
  15: Quantitative information includes yield anomalies in relation to the number
    of consecutive dry days (CDD) and temperature (TDD) for spring small grains, winter
    small grains, and maize.
  19: No relevant information
  20: Li et al. (2019) report that excessive rainfall leads to maize yield loss of
    a comparable magnitude to extreme drought in the United States.
  21: No relevant information
