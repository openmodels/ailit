Highlights:
  4: The paper suggests that higher crop rotation diversity tends to reduce yield
    losses in unfavorable years, and that crop diversity can enhance yield through
    functional richness and complementarity.
  5: Yield data analyzed to explore how changes in grain yield across gradients of
    climatic conditions differ depending on whether functional richness or species
    diversity is used to characterize CRD.
  6: Crop rotation diversity and climate indices both impact crop yields, and these
    interactions are not necessarily linear.
  7: The relationship between climate related diversity (CRD) and grain yield anomalies
    depended on climatic conditions and their interaction, and on the indicator crop.
  12: Species diversity can mitigate yield losses or enhance yield gains depending
    on temperature and precipitation conditions. The magnitude of these benefits varies
    by crop and the specific combination of temperature and precipitation anomalies.
  13: Increasing species diversity can compensate for yield losses in monocultures
    caused by warming and precipitation anomalies. The yield-maximizing species diversity
    shifts depending on climatic conditions (temperature, precipitation, length of
    dry spells). Warming-induced yield losses in monocultures can be balanced by relatively
    small increases in species diversity.
  15: Crop rotation diversity enhances grain yield under various climatic conditions,
    providing benefits comparable to improved climatic conditions.
  16: Increasing crop functional richness enhanced yield anomalies. Small grain yields
    were maximized at an intermediate species diversity of the crop rotation, with
    the optimal diversity depending on climatic conditions and the indicator crop.
  17: Diversifying crop rotations can decrease the vulnerability of cereal yields
    to detrimental climatic conditions. Rotations including two to three species or
    at least two functionally different groups compensated for monoculture yield losses
    in small grains and maize under detrimental climatic conditions. Increasing crop
    rotation diversity (CRD) provides insurance against more variable and uncertain
    climatic conditions.
  19: "Crop rotational complexity affects plant-soil nitrogen cycling during water\
    \ deficit (Bowles et al., 2022); Long-term crop-rotation diversification increases\
    \ agricultural resilience to adverse growing conditions (Bowles et al., 2020);\
    \ Severity of drought and heat wave crop losses tripled over the last five decades\
    \ in Europe (Br\xE1s et al., 2021); plant pathogen infection risk tracks global\
    \ crop yields under climate change (Chaloner et al., 2021)."
  20: Combining heat and drought suppresses maize and soybean yields, and coordination
    of evaporative demand and precipitation maximizes rainfed maize and soybean yields
    in the USA.
