  4: 'Source material here.

    Climate change negatively affects crop production... Both high temperature and
    low precipitation can independently or simultaneously lower crop productivity...
    Even short periods of extreme conditions or co-occurring adverse but not extreme
    growing conditions, like heat and water stress, can severely reduce yields...
    increasing crop diversity by including more crops and/or cover crops in the rotation
    could increase yields... Indeed, higher crop rotation diversity (CRD) reduced
    maize yield losses in unfavourable years... When explicitly taking into account
    growing season conditions, the benefits of a diverse rotation to small grain cereal
    yields were especially high during dry years... Conversely, yield benefits peaked
    at between two and four crop species in the rotation...

    '
  5: "Source material here: Our two main hypotheses were: (1) yield losses due to\
    \ detrimental climatic conditions are mitigated with increasing CRD, and (2) grain\
    \ yield benefits from increasing CRD are more pronounced under detrimental than\
    \ average or high-yielding climatic conditions. We characterized growing season\
    \ conditions both via anomalies in average temperature and precipitation, and\
    \ via the occurrence of dry spells. We define detrimental climatic conditions\
    \ as seasonal or shorter-term conditions that reduce monoculture yields below\
    \ local averages. Geographic location, we considered yield anomalies as mean-centred\
    \ yield data obtained by subtracting the indicator crop-specific long-term mean\
    \ yield from individual yield observations at each LTE. From 32 European and North\
    \ American long-term (10\u201363\u2009years) field experiments (LTEs) (Smith et\
    \ al., 2023)... We chose cereal crops as indicator crops because they are key\
    \ in human and animal nutrition... We analysed spring small grains, winter small\
    \ grains and maize separately... To capture different aspects of crop diversity\
    \ in the rotation... we considered two indices to measure CRD: (i) species diversity,\
    \ measured by a modified version of Simpson's reciprocal diversity index (D)...and\
    \ (ii) the count of functional groups present in the rotation, that is, \u201C\
    functional richness\u201D (FR) (Smith et al., 2023)... we combined them with replicates\
    \ into the variable \u201CGroup\u201D to simultaneously take into account the\
    \ variation relative to replicate and treatment effects. We also explored how\
    \ changes in grain yield across gradients of climatic conditions differ depending\
    \ on whether functional richness or species diversity is used to characterize\
    \ CRD. Our findings could support designing climate-resilient cropping systems.\
    \ Crop rotations ranged from continuous monocultures...to increasingly diverse\
    \ rotations, that is, up to six crop species grown in succession... Some experiments\
    \ also included a fallow period (7% of rotations), cover crops (28% of rotations)\
    \ and more than one crop grown during the same growing season, that is, intercropping\
    \ and undersowing (26% of rotations)."
