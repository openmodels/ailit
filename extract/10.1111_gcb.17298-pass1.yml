  16: 'Source material here.

    The paper evaluates yield benefits and responses to climatic conditions and crop
    rotation diversity (CRD) in crops across different climatic conditions: "The significant
    effects on yield anomalies of CRD and climatic conditions over the whole duration
    of the experiments allow for robust conclusions on CRD-yield responses to historical
    climatic conditions."


    Warming reduces yields in all crops irrespective of CRD and precipitation, with
    higher precipitation exacerbating yield reductions in winter small grains compared
    to spring small grains and maize: "Warming reduced yields in all crops irrespective
    of CRD and precipitation. At higher than average precipitation, the yield reductions
    from warming were higher in winter small grains than in spring small grains and
    maize, irrespective of CRD."


    Increasing crop functional richness enhances yields and compensates for reductions
    from adverse climatic conditions; species diversity effects on yield vary by climate
    and crop type: "Increasing crop functional richness enhanced yield anomalies,
    and hence yields, with no sign of decline, for all crops under high temperature
    and irrespective of precipitation. As such, functional richness steadily compensated
    yield reductions from detrimental climatic conditions occurring in monocultures
    and low diversity rotations."

