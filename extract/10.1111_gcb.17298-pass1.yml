    \ yields) of small grains generally increased from low to intermediate spe - cies\
    \ diversit y ( D; Equation 1) and declined at higher levels of diver - sity...\
    \ With fixed CRD, yields increased with decreas- ing growing season temperature\
    \ anomalies ( T, and hence tem- perature) in all indicator crops, whereas decreasing\
