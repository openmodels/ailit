More Notes:
  5: The study defines detrimental climatic conditions as seasonal or shorter-term
    conditions that reduce monoculture yields below local averages.
  6: The model accounts for temporal, spatial, and design dependence, with separate
    factors for the impact of technological improvement over time versus the effect
    of sampling year on yield. The timing of growing seasons often overlaps, meaning
    growing season climatic indices can be similarly distributed despite large differences
    in annual conditions.
  12: The figures present model-predicted yield differences from baseline yield anomaly
    as a function of species diversity, and temperature and precipitation anomalies,
    and highest number of consecutive dry days
  13: The specific effect of species diversity on yield depends on the crop type (spring
    small grains, winter small grains, maize). The paper includes confidence intervals
    for the yield changes.
  16: Crop sequences were heterogeneous across the LTEs, making it difficult to disentangle
    crop sequence effects from diversity effects.
  18: The page primarily provides acknowledgements, funding information, data availability
    statements, and author affiliations. The paper examines long-term experiments
    (LTEs) and their funding sources across multiple countries.
