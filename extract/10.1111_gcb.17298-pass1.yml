Methodology:
  4: The analysis involves the collection of meteorological and grain yield data for
    small grains and maize to determine the effects of crop rotation diversity in
    relation to climatic conditions.
  5: Analysis of long-term experiments (LTEs) with crop rotations, focusing on cereal
    crops (spring small grains, winter small grains, and maize). Yield anomalies were
    calculated by subtracting the indicator crop-specific long-term mean yield from
    individual yield observations at each LTE.
  6: Mixed-effect models are used to assess the impact of crop rotation diversity
    (CRD) and climatic indices on yield anomalies. Models are fitted separately for
    spring small grains, winter small grains, and maize, considering fixed and random
    factors. The analysis uses daily gridded meteorological data from E-OBS database
    (Europe) and CONUS dataset (North America) to calculate climatic indices. Climatic
    condition anomalies are used.
  12: Model predictions based on fitted Equation 2. Analysis considers the first quartile,
    long-term average, and third quartile of temperature and precipitation anomalies.
    Baseline is set to the yield anomaly of the monoculture under long-term average
    of T and P at t=15 years.
  13: The paper uses modeling to assess crop yields under different climatic conditions
    (varying temperature and precipitation) and levels of species diversity. It presents
    modeled yields relative to monoculture yields under long-term average temperature
    and precipitation at Year 15. The analysis is applicable to LTEs (Long Term Experiments)
    and considers anomalies in climate variables such as CDD and TDD.
  15: Model-predicted yield differences are assessed based on functional richness,
    CDD, and temperature anomalies.
  16: The analysis uses data from long-term experiments (LTEs) with variations in
    experimental design, geographical location, and variable treatment outcomes from
    year to year. It investigates the effects of crop rotation diversity (CRD) and
    climatic conditions on crop yields. The results are applicable to historical climatic
    conditions.
  17: Analysis based on primary data from 32 long-term experiments across Europe and
    North America examining crop rotations.
  18: The paper utilizes data from the E-OBS dataset, Copernicus Climate Change Service,
    ECA&D project, and Livneh daily CONUS near-surface gridded meteorological data.
  19: Meta-analyses, literature reviews, modeling, field experiments, statistical
    analysis of crop yield data.
