  18: "Source material: Generally, the warming trajectories are dependent on RCP scenarios...\
    \ regional population and GDP exposures. Motivated by the 2015 Paris Agreement\
    \ proposal, we quantify the changes in global drought bivariate magnitudes and\
    \ socioeconomic consequences in the 1.5 and 2.0\u25E6C warmer worlds, with climate\
    \ projected by the multi-model ensemble under three representative concentration\
    \ pathways (RCP2.6, RCP4.5, and RCP8.5). The drought characteristics are identified\
    \ using the SPEI combined with the run theory, and the changes in occurrence are\
    \ measured by both drought duration and severity, with the incorporation of the\
    \ copula functions and most likely realization method. The main conclusions are\
    \ summarized as follows... The means of SPEI-3 from the historical period to the\
    \ 1.5 and 2.0\u25E6C warmer worlds are projected to descend at a global scale,\
    \ while the standard deviation exhibits large increases. As the SPEI-3 follows\
    \ the normal distribution, these changes suggest that the distribution of SPEI-3\
    \ would shift towards the negative side with a flatter tendency, implying a more\
    \ severe drying condition in a future warming world. The drought duration is projected\
    \ to slowly prolong across 78% of the land surface, while the drought severity\
    \ shows a much more pronounced rise globally in the 1.5\u25E6C warming world.\
    \ Compared to the 1.5\u25E6C warming condition, there will be a further increase\
    \ in drought severity and a persistent lengthening in drought duration under the\
    \ additional 2.0\u25E6C warming level."
