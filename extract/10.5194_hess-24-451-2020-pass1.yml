Drivers of Risk:
  1: The primary driver of risk identified is climate warming due to greenhouse gas
    emissions, leading to increased frequency and persistence of droughts.
  3: "Projected increases in magnitude and socioeconomic exposure to global droughts\
    \ due to additional levels of warming (1.5 and 2.0\xB0C)."
  4: Changes in temperature and radiation fluxes (rsds, rsus, rlds, rlus)
  5: The study models the impact of droughts, specifically focusing on their duration
    and severity, in the context of climate warming.
  6: Rising temperatures, higher evaporative demands, and more frequent and persistent
    dry spells are the drivers of drought risk.
  7: "Projected temperature rise from 1.5\xB0C to 2.0\xB0C leading to increased drought\
    \ conditions."
  8: "Changes in the mean and standard deviation of the Standardized Precipitation\
    \ Evapotranspiration Index (SPEI) under different warming levels (1.5\u25E6C and\
    \ 2.0\u25E6C)."
  9: Increasing frequency and severity of droughts driven by global warming scenarios.
  10: "Projected increases in warming from 1.5\xB0C to 2.0\xB0C lead to more severe\
    \ droughts."
  11: The impacting changes include increased drought frequency and severity driven
    by climate warming, especially in tropical regions.
  12: Warming climates lead to increased drought frequency and potential evapotranspiration.
  13: "Changes in drought frequency, duration, and severity under different warming\
    \ levels (1.5\xB0C and 2.0\xB0C targets); potential evapotranspiration; rs (stomatal\
    \ resistance) scaling with CO2; leaf area increases."
  14: Increased severity and frequency of global droughts under different warming
    targets and SSP scenarios.
  15: Changes in drought risks, specifically focusing on a 50-year return period (RP(50))
    of drought events, with variations also explored for 20-year and 100-year drought
    events.
  16: Drought risks, population, and GDP contribute to exposure change.
  17: Increasing frequency and magnitude of droughts due to global warming scenarios.
  18: Changes in drought duration and severity, using the SPEI (Standardized Precipitation-Evapotranspiration
    Index).
  20: Droughts
Evaluation overview:
  1: "The paper evaluates the projected increases in magnitude and socioeconomic exposure\
    \ of global droughts in 1.5 and 2\xB0C warmer climates."
  4: Projected increases in magnitude and socioeconomic exposure of global droughts
  6: "The paper evaluates drought conditions and socioeconomic exposure to droughts\
    \ under 1.5\xB0C and 2.0\xB0C warming scenarios."
  7: The paper evaluates the impact of increased global warming on drought severity,
    duration, and frequency across various land areas.
  8: Drought severity and duration
  9: The page evaluates the socioeconomic exposure to increasing global drought risks
    by assessing drought-affected populations and GDP under warming scenarios.
  11: The paper provides an overview of drought risk outcomes such as frequency, duration,
    and severity of droughts globally, with specific socio-economic impacts on hotspot
    countries.
  12: Projected increases in global drought magnitude and socioeconomic exposure are
    evaluated.
  13: Drought risk changes
  14: Projected increases in population and GDP exposure to severe droughts in different
    warming scenarios.
  15: Drought risks and socioeconomic exposures to droughts are evaluated.
  17: "The outcome being evaluated is the magnitude and socioeconomic exposure of\
    \ global droughts between the 1.5\xB0C and 2.0\xB0C warming targets."
  18: "Global drought bivariate magnitudes and socioeconomic consequences in the 1.5\
    \ and 2.0\u25E6C warmer worlds are quantified."
  20: Projected increases in magnitude and socioeconomic exposure of global droughts
Highlights:
  1: "Limiting global warming to 1.5\xB0C mitigates drought impacts significantly\
    \ compared to 2\xB0C, with 75 countries' populations and GDP affected under 1.5\xB0\
    C and an additional 17 countries under 2\xB0C."
  2: There is consensus that with higher saturation thresholds and more intense and
    frequent dry spells driven by rising temperatures, drought conditions would considerably
    worsen in many regions of the world.
  4: "Illustrates projected temperature rise and associated uncertainty under different\
    \ climate pathways, focusing on limiting warming to 1.5\xB0C and 2.0\xB0C."
  6: Dryness is projected to intensify in a future warming world. Several regions
    experience compound increases in both drought severity and duration. Drought severity
    is projected to increase, while the duration will decrease in the tropics and
    high-latitude areas.
  7: Droughts will become more severe and longer in duration with more frequent extreme
    conditions under increased warming scenarios.
  8: "Droughts are projected to increase in frequency and severity across a large\
    \ majority of global landmasses under both 1.5\u25E6C and 2.0\u25E6C warming scenarios,\
    \ with substantial increases in many regions."
  9: "Large percentages of global population and GDP are projected to be exposed to\
    \ higher drought risks in a 1.5\xB0C warming scenario, with significant impacts\
    \ in low GDP and population density regions."
  10: "Spatial heterogeneity in drought exposure variations with some areas experiencing\
    \ decreased risk at 2.0\xB0C warming."
  11: "Tropical countries like Mexico and Brazil face significantly increased drought\
    \ risks, with up to 97% of their populations and GDPs potentially exposed in a\
    \ 1.5\xB0C warming scenario."
  12: "Limiting warming to 1.5\xB0C would significantly mitigate future drought risks\
    \ and socioeconomic exposures."
  13: The impact of rs on drought assessments deserves further studies but is beyond
    the scope of this study.
  14: Visual representation of the potential increase in socioeconomic exposure to
    severe droughts globally.
  15: Aggravated drought risks are projected globally, but the changing patterns exhibit
    large spatial variability. Regions with large projected changes generally display
    strong model agreement. 100% of the population in tropical regions like Brazil
    and Mexico would be affected by increasing drought risks.
  17: "88% of global land areas are exposed to increasing drought risks at both warming\
    \ levels; however, drought risks will double across 58% of landmasses at 1.5\xB0\
    C and 67% at 2.0\xB0C."
  18: "The means of SPEI-3 are projected to descend at a global scale, while the standard\
    \ deviation exhibits large increases from the historical period to the 1.5 and\
    \ 2.0\u25E6C warmer worlds. Drought severity shows a much more pronounced rise\
    \ globally in the 1.5\u25E6C warming world. Compared to the 1.5\u25E6C warming\
    \ condition, there will be a further increase in drought severity and a persistent\
    \ lengthening in drought duration under the additional 2.0\u25E6C warming level."
Methodology:
  1: The analysis uses a bivariate framework with the Standardized Precipitation Evapotranspiration
    Index (SPEI) and run theory, combined with climate scenarios from 13 CMIP5 models
    under RCP 2.6, RCP 4.5, and RCP 8.5 pathways. Copula functions model drought severity
    and duration.
  2: The analysis involves employing a set of ensemble simulations produced by coupled
    climate models, assessing drought conditions associated with different levels
    of global warming, and incorporating joint modeling of multiple drought features
    into impact assessments.
  3: Uses a bivariate drought impact assessment framework with copula functions to
    model drought severity and duration under warming scenarios; employs SPEI along
    with 13 CMIP5 GCM simulations under three RCP scenarios; uses multi-model ensemble
    mean of global temperatures to define warming periods.
  4: Uses 13 Global Climate Models (GCMs) listed in Table 1. PET is calculated using
    the Penman-Monteith approach. Analyzes projections under different Representative
    Concentration Pathways (RCPs).
  5: A bivariate approach is used to assess drought duration and severity, choosing
    the most likely scenario with the highest likelihood along the Tor-level isoline
    using the harmonic mean Newton method.
  6: "The study uses the Standardized Precipitation Evapotranspiration Index (SPEI-3)\
    \ to assess dryness. They recalculate joint occurrence frequencies of drought\
    \ events under future 1.5\xB0C and 2.0\xB0C warming conditions. Socioeconomic\
    \ exposure is assessed by recording population and GDP in areas with more severe\
    \ drought conditions. The analysis uses multi-model ensemble means to reduce model\
    \ bias and considers three RCPs and corresponding SSPs. The historical reference\
    \ period is 1976-2005."
  7: Analysis conducted using the Standardized Precipitation Evapotranspiration Index
    (SPEI) across multiple warming scenarios, with data visualized using maps and
    violin plots.
  8: "Copula-based approach to assess changes in drought severity and duration within\
    \ a bivariate framework under different warming levels (1.5\u25E6C and 2.0\u25E6\
    C). Uses the historical 50-year drought conditions as a baseline."
  9: "Drought projections combined with SSP-based population and GDP data are used\
    \ to estimate exposures, with results applicable in 1.5\xB0C and 2.0\xB0C warming\
    \ worlds."
  10: "The analysis projects changes in drought conditions using different climate\
    \ warming scenarios (1.5\xB0C vs 2.0\xB0C) and examines socioeconomic exposure."
  11: Analysis is performed by spatially aggregating mean changes in drought characteristics
    across grid cells, categorized under different RCP scenarios, to evaluate national
    scale impacts.
  12: "Potential evapotranspiration calculated using the reference crop Penman\u2013\
    Monteith model, assuming fixed surface resistance."
  13: Run theory is used with a threshold to identify drought events of varying severity.
    Bivariate frequency analysis is used to account for drought severity and duration.
    The traditional fixed rs method is used to calculate potential evapotranspiration.
    Results are compared with a threshold of -0.8 to assess robustness.
  15: The analysis calculates drought risks using the SPEI, considering different
    drought thresholds (-0.5 and -0.8), and examines the return periods of drought
    events. Socioeconomic exposures are based on the variations of drought risks,
    employing the same dynamic population and GDP pathways. The applicability timeframe
    is the "foreseeable warming future".
  16: "Exposure is defined as the number of people (GDP) being exposed to areas where\
    \ the bivariate drought risks increase under the warming climate; dynamic characteristics\
    \ are considered differences in population (and GDP) between the fixed 30-year\
    \ 1.5 and 2.0\u25E6C warming periods."
  17: Analysis uses multi-model ensembles to quantify climate and socioeconomic changes
    under scenarios SSP126, SSP245, and SSP585, with uncertainties measured by SPEI-3.
  18: The SPEI is combined with the run theory, and changes in occurrence are measured
    by both drought duration and severity, with the incorporation of the copula functions
    and most likely realization method. The analysis uses climate projected by the
    multi-model ensemble under three representative concentration pathways (RCP2.6,
    RCP4.5, and RCP8.5).
  20: The paper uses Hydrological Science Journal
More Notes:
  4: Lists the GCMs used in the study with their resolution and the institution that
    developed them.
  9: Drought-affected GDP and population exposures are highly correlated, with economically
    prosperous regions being more susceptible due to higher populations and immigration.
  13: The paper acknowledges that neglecting increasing rs may overestimate future
    drying conditions and drought risk changes.
  15: The study acknowledges substantial model uncertainty in drought projections
    for regions with small changing amplitudes. The study explores drought risks under
    different SPEI thresholds (-0.5 and -0.8), and various return periods (20, 50
    and 100 years) to understand risk variations caused by different extents of drought.
  17: Model uncertainty is significant, particularly over South America and Africa,
    affecting projected outcomes significantly.
No relevant information:
  22: No relevant information
Quantitative material:
  1: "In a 1.5\xB0C warmer world, 58% of global landmasses may experience a doubling\
    \ of historically significant 50-year droughts. An additional 9% of landmass would\
    \ experience severe drought under 2\xB0C warming."
  4: "Projected global mean temperatures when reaching 1.5 and 2.0\xB0C warming under\
    \ different RCPs (2.6, 4.5, and 8.5). Provides an equation for calculating Potential\
    \ Evapotranspiration (PET)."
  6: "Mean SPEI-3 decreases across 85% of the land areas in a 1.5\xB0C warmer world.\
    \ Drought duration is projected to slowly prolong with warming across 78% of the\
    \ land surface. Drought severity shows a much more pronounced rise globally, with\
    \ significant increases (exceeding 50%) over 46% of global landmasses. A progressive\
    \ descending change in mean values of SPEI-3 is observed across 58% of the land\
    \ surface with the global mean temperature increasing between 1.5 and 2.0\u25E6\
    C."
  7: "75% of the land surface is expected to experience increased drought severity;\
    \ over 35% of land areas will see a >10% increase in drought severity at 2.0\xB0\
    C compared to 1.5\xB0C."
  8: "9% increase in the world land areas subject to doubled drought frequency under\
    \ 2.0\u25E6C versus 1.5\u25E6C warming."
  9: "More than 67 (140) countries will have 100% (50%) of their populations and GDPs\
    \ exposed to more severe droughts under a 1.5\xB0C warming target."
  10: "More than 10 countries would experience a 30% increase in exposure between\
    \ 1.5\xB0C and 2.0\xB0C warming."
  11: The analysis provides quantitative projections, indicating more than 90% of
    the grid cells are projected to experience more frequent droughts in certain hotspot
    countries.
  12: Drought frequency in Brazil and Mexico projected to double relative to historical
    50-year droughts.
  13: "Projected changes in joint 50-year return periods of droughts between the 1.5\
    \ and 2.0\u25E6C warming targets; Threshold of -0.5 for drought identification;\
    \ Comparison of results using -0.8 threshold."
  14: Maps display fractional population and GDP exposure percentages under various
    SSPs.
  15: "The study quantifies changes in drought risks under different warming scenarios\
    \ (1.5\xB0C and 2.0\xB0C) and Shared Socioeconomic Pathways (SSPs), including\
    \ SSP1-2.6, SSP2-4.5, and SSP5-8.5. It also analyzes socioeconomic exposures using\
    \ dynamic population and GDP pathways."
  16: "Around 88% of global landmasses being exposed to increasing drought risks under\
    \ the 1.5\u25E6C warming climate."
  17: "Affected population and GDP at 1.5\xB0C warming is projected at 1386.9 million\
    \ people and USD 33311.1 billion, increasing to 1538.2 million people and USD\
    \ 72852.2 billion at 2.0\xB0C warming."
  18: Drought duration is projected to slowly prolong across 78% of the land surface.
sourcematerial:
  1: "yaml\nEvaluation overview: \"Projected increases in magnitude and socioeconomic\
    \ exposure of global droughts in 1.5 and 2\u25E6C warmer climates\"\nDrivers of\
    \ Risk: \"Climate warming mainly due to greenhouse gas emissions has altered the\
    \ global hydrological cycle and resulted in more frequent and persistent natural\
    \ hazards such as droughts\"\nQuantitative material: \"the historical 50-year\
    \ droughts may double across 58% of global landmasses in a 1.5\u25E6C warmer world,\
    \ while when the warming climbs up to 2.0\u25E6C, an additional 9% of world landmasses\
    \ would be exposed to such catastrophic drought deteriorations.\"\nMethodology:\
    \ \"The drought characteristics are identi\uFB01ed using the Standardized Precipitation\
    \ Evapotranspiration Index (SPEI) combined with the run theory, with the climate\
    \ scenarios projected by 13 Coupled ModelInter-comparisonProjectPhase5(CMIP5)globalclimate\
    \ models (GCMs) under three representative concentration pathways (RCP 2.6, RCP4.5\
    \ and RCP8.5). The copula functions and the most likely realization are incorporated\
    \ to model the joint distribution of drought severity and duration\"\nHighlights:\
    \ \"Our results demonstrate that limiting global warming to 1.5\u25E6C, compared\
    \ with 2\u25E6C warming, can perceptibly mitigate the drought impacts over major\
    \ regions of the world...More than 75 (73) countries\u2019 populations(GDP)willbecompletelyaffectedbyincreasing\
    \ droughtrisksunderthe1.5\u25E6Cwarming,whileanextra0.5\u25E6C warming will further\
    \ lead to an additional 17 countries sufferingfromanearlyunbearablesituation.\"\
    \n"
  2: 'Source material: To examine the sensitivity of drought risks with different
    warming targets, numerous approaches have emerged...More importantly, among existing
    global drought impact assessments, especially those targeting different warming
    levels proposed by the Paris Agreement, drought variables such as severity and
    duration are usually separately investigated through probability modeling and
    stochastic theories...Therefore, there is an urgent necessity to incorporate the
    joint modeling of multiple drought features into impact assessments. These prevailing
    tides of the literature almost reach a consensus that, with a higher saturation
    threshold and more intense and frequent dry spells driven by rising temperatures,
    drought conditions would considerably worsen in many regions of the world.'
  3: "Source material: \"In this study, under a bivariate framework, we quantify changes\
    \ in global drought conditions and socioeconomic exposure with additional levels\
    \ of 1.5 and 2.0\u25E6C warming.\" \"The copula functions and most likely realization\
    \ are incorporated to model the drought severity and duration concurrently, and\
    \ changes in the bivariate return period with global warming are systematically\
    \ investigated.\" \"drought exposures of populations and regional gross domestic\
    \ product (GDP) under different SSPs are assessed globally.\" \"The drought condition\
    \ is quantified with the SPEI developed by Vicente-Serrano et al. (2010)... GCMs\
    \ under three RCPs (RCP2.6, RCP4.5, and RCP8.5).\" \"the time periods for different\
    \ global warming levels are determined using the 30-year running mean of a multi-model\
    \ ensemble mean of global-mean surface air temperature.\" "
  4: "Source material: L. Gu et al.: Projected increases in magnitude and socioeconomic\
    \ exposure of global droughts. Table 1. Information about the 13 GCMs used in\
    \ this study. Figure 1. Projected global mean temperatures when reaching 1.5 and\
    \ 2.0\u25E6C warming. Rn=[rsds\u2212rsus\u2212(rlus\u2212rlds)]\xD7106\xD73600\xD7\
    24, where rsds and rsus (rlds and rlus) are surface downwelling and upwelling\
    \ shortwave \uFB02ux (surface downwelling and up-welling longwave \uFB02ux), respectively\
    \ (wm\u22122). The PET is \uFB01rst calculated using the Penman\u2013Monteith\
    \ approach. Both graphs illustrate the projected temperature rise and associated\
    \ uncertainty under different climate pathways, with a focus on limiting the warming\
    \ to 1.5\xB0C and 2.0\xB0C respectively."
  5: "yaml\nDrivers of Risk: \"This study jointly models drought duration (D) and\
    \ severity (S) via the copula function...To calculate the socioeconomic exposures\
    \ by droughts in different warming environments, we evaluate the change in drought\
    \ occurrence frequency in a bivariate context.\"\nMethodology: \"This study jointly\
    \ models drought duration (D) and severity (S) via the copula function...The widely\
    \ used Gamma distribution was adopted for \uFB01tting drought variables...and\
    \ we selected the Gumbel copula to model the joint distribution of drought duration\
    \ and severity.\"\nMethodology: \"After calculating the SPEI-3 for global terrestrial\
    \ grid cells, we derive the drought duration, intensity, and severity using the\
    \ run theory...A run with SPEI-3 that continuously stays below\u22120.5 is de\uFB01\
    ned as a drought event\"\nMethodology: \"In this paper, the most likely realization\
    \ method...is used to choose the drought scenario with the highest likelihood\
    \ along theTor-level isoline...the harmonic mean Newton method...is applied to\
    \ estimate the most likely realizations.\"\n"
  6: "yaml\nEvaluation overview: \"To evaluate socioeconomic implications of drought\
    \ with additional warming, we record the population and GDP in those areas with\
    \ more severe drought conditions and de\uFB01ne them as exposures by increasing\
    \ drought risks.\"\nDrivers of Risk: \"This may be attributed to higher evaporative\
    \ demands and more frequent and persistent dry spells associated with rising temperatures\
    \ (Naumann et al., 2018).\"\nQuantitative material: \"We \uFB01nd that mean SPEI-3\
    \ decreases at the global scale (across 85% of the land areas, excluding Antarctica)...\"\
    \ \"The drought duration is projected to slowly prolong with warming across 78%\
    \ of the land surface...\" \"The drought severity shows a much more pronounced\
    \ rise globally, with signi\uFB01cant increases (exceeding 50%) over 46% of global\
    \ landmasses.\" \"A progressive descending change in mean values of SPEI-3 is\
    \ observed across 58% of the land surface with the global mean temperature increasing\
    \ between 1.5 and 2.0\u25E6C...\"\nMethodology: \"We \uFB01rst examine changes\
    \ in the mean and standard deviation of SPEI-3 from the historical reference period\
    \ (1976\u20132005) to the 1.5\u25E6C warmer worlds (Fig. 2)...\" \"With the historical\
    \ 50-year bivariate quantiles, we can recalculate the joint occurrence frequency\
    \ under future additional 1.5 and 2.0\u25E6C warming conditions, respectively.\"\
    \ \"To evaluate socioeconomic implications of drought with additional warming,\
    \ we record the population and GDP in those areas with more severe drought conditions...\"\
    \ \"After estimating the socioeconomic exposures for each GCM simulation, we use\
    \ the multi-model ensemble mean as an indication for each grid cell to reduce\
    \ model bias.\" \"Note that we select three RCPs and corresponding SSPs under\
    \ two warming targets so that the analysis is performed on six scenarios.\"\n\
    Highlights: \"Overall, the climatic metric SPEI-3 shows a strong negative response\
    \ to the warming climate, suggesting that dryness will intensify in a future warming\
    \ world.\" \"Moreover, several regions experience compound increases (with strong\
    \ model agreement) in both drought severity and duration...\" \"In the tropics\
    \ and high-latitude areas, the drought severity is projected to increase, while\
    \ the duration will decrease.\"\n"
  7: "yaml\nEvaluation overview: \"When the global temperature rises from additional\
    \ 1.5 to 2.0\u25E6C warming, the world will experience more severe drought conditions...\"\
    \nDrivers of Risk: \"When the global temperature rises from additional 1.5 to\
    \ 2.0\u25E6C warming...\"\nQuantitative material: \"...a further increase in drought\
    \ severity accounting for 75% of the land surface...Comparing the 2.0\u25E6C to\
    \ the 1.5\u25E6C warming condition, the increase in drought severity is greater\
    \ than 10% over 35% of the land areas...\"\nMethodology: \"Projected changes in\
    \ the mean and standard deviation of the SPEI under the 1.5\u25E6C warming target...the\
    \ drought frequency based on SPEI-3 is also projected to pronouncedly lengthen\
    \ under three RCPs...the distributions comprise drought characteristics across\
    \ all land pixels of the multi-model ensemble mean results. The violin plots...consist\
    \ of a boxplot inside and an outside violin shape which displays the probability\
    \ distribution of drought characteristics.\"\nHighlights: \"...the drought severity\
    \ shows a more rapidly increasing rate than drought duration globally under the\
    \ 2.0\u25E6C warming world...extreme conditions are projected to occur more frequently\
    \ under warming climates.\"\n"
  8: "Source material: Generally, in regions with a substantial increase in drought\
    \ duration and severity (Fig. 5), the 50-year drought events exhibitarapidincreaseinoccurrencewithwarming.\
    \ More than 88% of global landmasses will be subject to more frequent historical\
    \ 50-year droughts, and the frequency of such severe droughts would double over\
    \ 58% of the global land surface. In regions with a ratio of less than 1.0, the\
    \ present drought events areprojected to occur more frequently underthehalf-degree\
    \ additional warming, which accounts for 71% of continental areas. additionally,\
    \ the frequency of the historical 50-year droughts would double across 67% of\
    \ the global landmasses under the 2.0\u25E6C warming level. That is, 9% increase\
    \ in the world land areas compares to the 1.5\u25E6C warming level (i.e., 58%).\
    \ Using the copula-based approach in Sect.2.4, we show the median projected change\
    \ in the historical 50-year drought conditions over multi-model ensembles under\
    \ a 1.5\u25E6C warming climate (Fig. 7). Projected changes in the mean and standard\
    \ deviation of the SPEI between the 1.5 and 2.0\u25E6C warming targets."
  9: "To understand the socioeconomic in\uFB02uences induced by in- creasing drought\
    \ risks (here de\uFB01ned as more frequent his- torical 50-year events), we combine\
    \ the drought projection withpopulationandGDPinformationbasedonSSPsandes- timate\
    \ exposures by droughts in the 1.5\xE3nd 2.0\u25E6C warmer worlds. Globally, three\
    \ SSPs suggest a consistent projection that large percentages of population and\
    \ GDP will be exposed to increasing drought risks. In more than 67 (140) countries,\
    \ 100% (50%) of both populations and GDPs are exposed to more severe droughts\
    \ under the 1.5\u25E6C warming target (Fig. 9). The two socioeconomic factors\
    \ of GDP and pop- ulation are highly correlated (O\u2019Neill et al., 2014). Econom-\
    \ ically prosperous regions are associated with higher popu- lation and immigration\
    \ (Fig. S1 in the Supplement); thus, the drought-affected GDP exposures usually\
    \ exhibit simi- lar changing patterns with the population."
  10: "L. Gu et al.: Projected increases in magnitude and socioeconomic exposure of\
    \ global droughts  The US and China are no longer the most drought-affected countries,\
    \ while 100% of the population and GDP in the Mexico, southern Europe, central\
    \ and southern Africa, and Mediterranean regions are projected to experience more\
    \ severe drought... More than 10 countries would experience a 30% increase in\
    \ population and GDP exposure if the global warming level increased from 1.5 to\
    \ 2.0\xB0C... These increases illustrate the benefit of holding global warming\
    \ to 1.5\xB0C instead of 2.0\xB0C... drought exposures for some countries (i.e.,\
    \ Canada) can be slightly decreased in the 2\xB0C warming level compared to the\
    \ 1.5\xB0C warming level... the spatial heterogeneity should be given attention,\
    \ especially when assessing the climate change impacts on extreme events at regional\
    \ or local scales... illustrate the consequences of limiting warming to 2.0\xB0\
    C above preindustrial levels, we also calculate the socioeconomic exposures under\
    \ three SSPs."
  11: "Source material here.\n- Evaluation overview: \"The large spatial variability\
    \ of drought risks and socioeconomic exposures under climate warming motivates\
    \ a more systematic and in-depth assessment on national scales, particularly for\
    \ the countries vulnerable to droughts.\"\n- Drivers of Risk: \"The increasing\
    \ drought risks are more profound in tropical regions (e.g., Mexico and Brazil)\
    \ than those over the high-latitude country (e.g., Canada).\"\n- Quantitative\
    \ material: \"The aggregated changes explicitly show a significant increase in\
    \ drought risks over these hotspot countries, with more than 90% of grid cells\
    \ projected to suffer from more frequent droughts.\"\n- Methodology: \"For assessment\
    \ at the national scale, spatially aggregating mean changes are more helpful than\
    \ per-grid cell changes for indicating the risk of a particular land fraction\
    \ being impacted by climate change.\"\n- Highlights: \"In a 1.5\xB0C warming world,\
    \ more than 85% of the grid cells (associated with around 65%\u201397% of the\
    \ national populations and GDPs) over Mexico and Brazil could be exposed to the\
    \ historical 50-year drought every 20 years.\"\n"
  12: "yaml\nEvaluation overview: \"L. Gu et al.: Projected increases in magnitude\
    \ and socioeconomic exposure of global droughts\"\nDrivers of Risk: \"Overall,\
    \ increasing drought risks under warming climates can cause major challenges for\
    \ sustainable development\"\nQuantitative material: \"More than 90% of the grid\
    \ cells (associated with around 90%\u2013100% of the national population and GDP)\
    \ across Brazil and Mexico will experience drought frequency double that of the\
    \ historical 50-year drought.\"\nMethodology: \"The reference crop Penman\u2013\
    Monteith model is employed to calculate potential evapotranspiration (and thus\
    \ SPEI) in the current study. In this process, surface resistance (rs) is \uFB01\
    xed to 70 s m\u22121.\"\nHighlights: \"limiting warming to 1.5\u25E6C would substantially\
    \ mitigate future drought risks and corresponding socioeconomic exposures.\"\n"
  13: "Source material here: Though the impact of rs on the drought assessments deserves\
    \ further studies, it is beyond the scope of this study. Therefore, the traditional\
    \ fixed rs method is used in this study to calculate potential evapotranspiration.\
    \ In the run theory, once the threshold (e.g., \u22120.5) is determined, drought\
    \ events with different severity magnitudes are identified and constitute a sample\
    \ for the selected time period. This sample contains different magnitudes in severity\
    \ and different lengths in the duration, therefore characterizing the distribution\
    \ of different levels of drought (ranging from the mild, moderate, to extreme\
    \ conditions). Projected changes in joint 50-year return periods of droughts between\
