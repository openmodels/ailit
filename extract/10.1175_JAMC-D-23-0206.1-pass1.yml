Drivers of Risk:
  1: Changes in extreme daily precipitation due to anthropogenic climate change are
    impacting outcomes.
  2: Projected changes in extreme daily precipitation throughout the CONTINENTAL US
    during the 21st century, potentially leading to more extreme conditions.
  5: Differences in precipitation patterns across regions and seasons, with wet biases
    noted in certain areas.
  6: Changes in extreme precipitation impact regional hydroclimate stability and water
    scarcity, particularly in arid regions.
  7: Extreme precipitation caused by tropical cyclones may be underestimated in both
    historical (HIST) and future (EOC) simulations.
  8: Areas of the Northeast and Midwest experience significant increases in MCS precipitation
    and daily precipitation extremes under future climate scenarios.
  9: The analysis examines changes in climate-related data (likely precipitation)
    during June-August (JJA) across different climate scenarios (HIST, EOC4.5, EOC8.5).
  10: Underestimation bias is observed for high precipitation values in various cities
    during certain epochs.
  11: No relevant information
  12: Variability and increased ceiling for precipitation extremes are indicated for
    Albany, Minneapolis, Nashville, Phoenix, and Tallahassee, with more variability
    expected in precipitation extremes by the end of the 21st century.
  13: Daily precipitation extremes.
  14: Daily precipitation
  15: Changes in return period precipitation values are impacting the outcomes, specifically
    in areas of the Intermountain West, Southwest, and Northeast.
  16: Changes in extreme daily precipitation under anthropogenic emissions scenarios
    RCP4.5 and RCP8.5.
  17: Changes in extreme daily precipitation across various regions of the CONUS potentially
    due to climate change.
  18: The shocks impacting outcomes are heavy precipitation amounts and supercells.
Evaluation overview:
  1: The study provides an overview of potential societal impacts of changes in extreme
    precipitation events, including agricultural productivity, property loss, and
    mortality.
  5: Compares the 99th percentile of daily precipitation between HIST and PRISM datasets
    annually and seasonally.
  9: No relevant information
  10: The page does not specifically mention an overview of evaluated outcomes such
    as mortality or productivity loss.
  11: No relevant information
  13: Probability density of daily precipitation extremes.
  14: No relevant information
  18: "The paper examines changing spatiotemporal patterns of 5- and 10-day Illinois\
    \ heavy precipitation amounts from 1900\u20132018 and the future of supercells\
    \ in the United States."
Highlights:
  1: Future scenarios project robust increases in extreme daily precipitation events
    in the Midwest and Ohio Valley, while decreases are projected for the southern
    Great Plains; increased variability in precipitation extremes across various cities
    by century's end.
  2: Model allows for representation of regional climate changes at local scales,
    which is of great interest to stakeholders.
  5: HIST dataset shows statistically significant wet bias compared to PRISM in specific
    regions, particularly during September-February in the Intermountain West and
    December-February in the northern Great Plains and Midwest.
  6: Largest decreases in the 99th percentile of daily precipitation are projected
    for the Southwest and Intermountain West in the EOC8.5 scenario, consistent with
    recent drought trends.
  7: "Significant increases in precipitation during March\u2013May in the Midwest\
    \ and Ohio Valley under EOC8.5 scenario."
  8: Significant increase in heavy precipitation events is projected, particularly
    concerning for regions affected by high-impact floods.
  9: The modeled extremes at lower magnitudes showed reasonable estimations across
    all cities, while at the highest magnitudes, underestimation was observed in six
    of the eight cities.
  10: "High Pearson\u2019s r values indicate strong correlation in distribution patterns\
    \ of modeled EVA across cities, though some biases at high precipitation values\
    \ are noted."
  11: Showcases modeled vs input precipitation values for different climate epochs
    and scenarios for eight cities.
  12: All cities displayed an increase in return period daily precipitation values
    over HIST in one or both EOC scenarios; EOC8.5 showed robust increases, while
    EOC4.5 had modest increases. The 100-year return period values showed widespread
    percent increases in EOC scenarios, with higher increases in EOC8.5.
  13: Presents probability density functions of daily precipitation extremes under
    different climate scenarios.
  14: Shows how return periods of daily precipitation are projected to change in the
    future (2085-2100) under two climate scenarios (EOC4.5 and EOC8.5) compared to
    the historical period (1990-2005) for eight climatologically unique cities.
  15: Statistically significant increases in 100-year return period precipitation
    values are found in EOC8.5, particularly in specified regions, impacting infrastructure
    assumptions.
  16: Projected increasing values of extreme daily precipitation for both RCP scenarios
    in many regions of the contiguous United States, including the Northeast, Midwest,
    Southeast, and Pacific Northwest.
  17: Increases in precipitation values for return periods greater than 25 years in
    both EOC scenarios for all cities examined except Seattle, potentially affecting
    societal vulnerabilities.
Methodology:
  1: "The analysis uses a dynamically downscaled, convection-permitting regional climate\
    \ model with a historical baseline (1990\u20132005) and future epochs (2085\u2013\
    2100) under different emissions scenarios."
  2: Simulations cover one historical baseline (1990-2005) and two future epochs (2085-2100)
    under RCP4.5 and RCP8.5 scenarios.
  5: "Utilizes Pearson\u2019s r correlation and RMSE to compare HIST and PRISM precipitation\
    \ data, with statistical significance tested using the Mann-Whitney U test."
  6: The paper compares historical data (HIST) with future climate scenarios (EOC)
    using RCP4.5 and RCP8.5 to assess future changes in extreme precipitation.
  7: Comparison of historical (1990-2005) and future (2085-2100) climates using two
    emission scenarios, EOC4.5 and EOC8.5, with statistical significance determined
    using the Mann-Whitney U test and a false discovery rate.
  9: Uses Q-Q plots to assess the goodness of fit between WRF time series and modeled
    extreme value analysis (EVA) distributions. The study extracts extremes of the
    dataset (15 values). The estimation bias is affected by the small amount of input
    data.
  10: Model metrics such as RMSE, r, and R2 are used to evaluate empirical relationships
    between modeled EVA and WRF distributions for historical and future climatic scenarios.
  11: "Analysis involves comparing extreme precipitation values using modeled EVA\
    \ and input WRF data for various epochs using Q\u2013Q plot."
  12: "Used PDFs and Q\u2013Q plots to detect variability in extreme daily precipitation\
    \ values; comparisons made with PRISM and HIST data for multiple US cities to\
    \ assess future scenarios (EOC4.5 and EOC8.5)."
  13: Comparison of precipitation extremes for 1990-2005 (PRISM and HIST) and 2085-2100
    (EOC4.5 and EOC8.5) epochs simulation data for eight climatologically unique cities.
  14: "Analysis of daily precipitation return periods for 1990\u20132005 (HIST), 2085\u2013\
    2100 EOC4.5, and 2085\u20132100 EOC8.5 epochs. Median modeled return periods are\
    \ shown with solid lines, and 95% confidence intervals (for HIST) are shown with\
    \ dashed lines, calculated using a 1000-iteration bootstrap sample."
  15: "Return periods of daily precipitation are analyzed for 1990\u20132005 and 2085\u2013\
    2100 for eight climatologically unique cities using a 1000-iteration bootstrap."
  16: "Analysis uses a convection-permitting dynamically downscaled RCM dataset for\
    \ two end-of-century epochs (2085\u20132100) under RCP4.5 and RCP8.5 scenarios."
  17: Evaluation of changes in daily precipitation using the 99th percentile as a
    measure, with scenarios EOC4.5 and EOC8.5 providing future projections of extreme
    precipitation.
  18: The Illinois heavy precipitation analysis spans from 1900-2018. The supercell
    analysis is a projection of the future.
  21: The paper seems to discuss the use of convection-permitting simulations for
    determining the historical and potential future climate of extreme daily precipitation
    over the contiguous United States.
More Notes:
  9: The estimation bias is attributed to skewed upper tail distributions and the
    relatively small sample size (15 values). Doubling the input data to 30 values
    may help to reduce estimation bias.
  10: The analysis focuses on precipitation estimation biases in city-specific scenarios
    (e.g., Tallahassee, Albany, Seattle) for past and future epochs.
  11: No relevant information
  13: The analysis focuses on eight climatologically unique cities, but the specific
    cities are not listed on this page.
  14: The analysis focuses on eight climatologically unique cities and presents results
    for two emissions scenarios, EOC4.5 and EOC8.5.
  21: The relevant analysis appears to focus on the changes in extreme daily precipitation
    using advanced modeling techniques as mentioned in the context of the paper.
No relevant information:
  20: No relevant information
Quantitative material:
  1: "Statistically significant increases in extreme precipitation during December\u2013\
    May across the Midwest and Ohio Valley and significant decreases in the southern\
    \ Great Plains during December\u2013February."
  5: 'Presents RMSE values for annual and seasonal 99th percentile precipitation:
    annual RMSE is 7.8 mm, seasonal RMSEs are 12.3 mm (DJF), 7.9 mm (MAM), 9.2 mm
    (JJA), and 8.9 mm (SON).'
  6: Decreases in the 99th percentile of daily precipitation show negative percent
    differences of 50%-150% in the Southwest and Intermountain West.
  7: "Statistically significant increases of up to 100% in the 99th percentile of\
    \ daily precipitation during September\u2013November in the Midwest and Ohio Valley\
    \ for EOC8.5 are reported."
  8: Regions like the Northeast, Ohio Valley, and Midwest see increases in daily precipitation
    extremes, with some areas experiencing more than 50% increase in the 99th percentile
    of daily precipitation by the end of the 21st century.
  9: "Provides data on absolute differences (\u0394 EOC4.5 - HIST, \u0394 EOC8.5 -\
    \ HIST) and percentage differences (% Difference EOC4.5 - HIST, % Difference EOC8.5\
    \ - HIST) between future climate scenarios and historical data, as visualized\
    \ in maps. States that the difference between the highest and third highest magnitude\
    \ extracted values can be approximately 100 mm in some epochs."
  10: Maps/show changes with color gradients for temperature differences between historical
    data and future scenarios (EOC4.5 and EOC8.5), including -20 to 20 for absolute
    changes and -30% to 30% for percentage differences.
  11: Quantitative plot comparing modeled and input precipitation extreme values for
    different epochs and climate scenarios.
  12: Percent changes above HIST in EOC scenarios for the 100-year return period daily
    precipitation values generally increased by 20% or greater, with over 50% increases
    shown in Albany, Minneapolis, and Nashville.
  13: Probability density (y axis) of daily precipitation (mm) extremes (x axis) for
    different time periods and scenarios.
  14: Return periods (years) of daily precipitation (mm) for different time periods
    and climate scenarios.
  15: National averages for percent change in 100-year return period precipitation
    values show an increase of 18% in EOC4.5 and 119.4% in EOC8.5.
  16: Projected increases in extreme daily precipitation, with examples such as the
    99th percentile daily precipitation value displaying increases greater than 20
    mm in the Ohio region.
  17: The 99th percentile changes in daily precipitation across the CONUS are detailed
    for four seasons with specific mm values and percentage changes across different
    regions.
  18: "The paper provides quantitative information on changing spatiotemporal patterns\
    \ of 5- and 10-day Illinois heavy precipitation amounts, for the period 1900\u2013\
    2018."
sourcematerial:
  1: "The potential for changes in extreme precipitation events due to anthropogenic\
    \ climate change may have significant societal impacts (e.g., agricultural productivity,\
    \ property loss, and mortality); Comparisons between HIST and the two EOC scenarios\
    \ for the 99th percentile of daily precipitation show statistically significant\
    \ increases during December\u2013May across the Midwest and Ohio Valley and statistically\
    \ significant decreases for the southern Great Plains during December\u2013February;\
    \ This project uses a dynamically downscaled, convection-permitting regional climate\
    \ model to investigate extreme daily precipitation in the CONUS. The simulation\
    \ output includes a historical (HIST) baseline (1990\u20132005) and two epochs\
    \ at the end of the twenty-first century (EOC; 2085\u20132100) under intermediate\
    \ and pessimistic emissions scenarios; Future scenarios project robust increases\
    \ in these events during some seasons for portions of the Midwest and Ohio Valley,\
    \ whereas the southern Great Plains are projected to experience decreases. Furthermore,\
    \ we find a notable increase in the variability of extreme daily precipitation\
    \ across various CONUS cities by the end of the twenty-first century."
  2: "Source material here.\nDrivers of Risk: \"could expand into the low- and midlatitudes\
    \ as higher greenhouse gas concentrations increase temperatures and alter sensible\
    \ and latent heat \uFB02uxes... These studies show a tendency for more extreme\
    \ conditions in many regions of the CONUS, yet the historical changes are relatively\
    \ small in comparison to late twenty-\uFB01rst century projections.\"\n\nMethodology:\
    \ \"Here, we use a novel dynamically downscaled convection-permitting simulation\
    \ to examine projected changes in extreme daily precipitation throughout the CONUS\
    \ during the twenty-\uFB01rst century. The model used herein allows for representation\
    \ of regional climate change of precipitation extremes closer to the local scales\
    \ at which they occur (e.g., 4-km horizontal grid spacing),\"\n\nMethodology:\
    \ \"Our RCM simulations were conducted with the Advanced Research version of Weather\
    \ Research and Forecasting (WRF) Model (WRF-ARW version 4.1.2; Skamarock et al.\
    \ 2019) con\uFB01gured with a horizontal grid spacing of 3.75 km and 51 vertical\
    \ levels across the CONUS.\"\n\nMethodology: \"Simulated time periods include\
    \ three 15-yr epochs, with a historical (HIST) baseline (1990\u20132005) and two\
    \ future epochs (EOC; 2085\u20132100) using RCP4.5 (EOC4.5) and RCP8.5 (EOC8.5)\
    \ future climate scenarios.\"\n\nHighlights: \"North America could experience\
    \ an increase in mesoscale convective system (MCS) frequency and a 15%\u201340%\
    \ increase in maximum precipitation rates due to a deeper layer permitting more\
    \ collision and coalescence.\"\n\nHighlights: \"Highlighting the potential changes\
    \ in future extreme precipitation can inform stakeholders so that they may develop\
    \ effective mitigation and adaptation strategies to reduce impacts.\"\n"
  5: null
  6: "Source material here.\n\"Therefore, changes in extreme precipitation in these\
    \ regions will have large implications for regional hydroclimate stability and\
    \ water scarcity in these climatologically arid regions.\"\n\"Most of these areas\
    \ of decrease in the 99th percentile of daily precipitation are consistent with\
    \ statistically significant decreases in mean seasonal precipitation in EOC8.5\
    \ as compared to HIST (Gensini et al. 2023). Many decreases in the 99th percentile\
    \ of daily precipitation had large negative percent differences of 50%-150% in\
    \ the Southwest and Intermountain West, consistent with the recent drought trends\
    \ in these regions.\"\n\"We compared HIST to potential future climate scenarios\
    \ (EOC; 2085\u20132100) using RCP4.5 (EOC4.5) and RCP8.5 (EOC8.5) to assess future\
    \ changes in extreme precipitation.\"\n\"Results reveal the largest areas of statistically\
    \ significant decreases in the 99th percentile of daily precipitation were in\
    \ EOC8.5 in the Southwest (March\u2013May; Fig. 3e) and Intermountain West (June\u2013\
    August; Fig. 4e).\"\n"
  7: "Source material here.\n\"extreme precipitation caused by tropical cyclones may\
    \ be underestimated in the HIST and EOC simulations.\"\n\"EOC8.5 seasonal mean\
    \ precipitation in the Midwest and Ohio Valley had statistically significant increases\
    \ in March\u2013May ... robust statistically significant increases of up to 100%\
    \ for the 99th percentile of daily precipitation during September\u2013November.\"\
    \n\"regions where a Mann\u2013Whitney U test determined statistically signi\uFB01\
