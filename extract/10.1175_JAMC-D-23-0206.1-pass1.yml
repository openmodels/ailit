  11: "`\nFIG.6.Q \u2013Q plot of the input WRF vs modeled EVA daily precipitation\
    \ (mm) extreme values for 1990\u20132005 PRISM (gray) and HIST (black) and 2085\u2013\
    2100 EOC4.5 (orange) and EOC8.5 (red) epochs with a block size of 1 year resulting\
    \ in 15 values for eight climatologically unique cities. The solid line shows\
    \ the 1:1 trend line, and dots show the values of the modeled EVA (x axis) and\
    \ input WRF (y axis) data.\n"
  12: "decrease in the peak probability density indicates more variability and typically\
    \ an increased ceiling for precipitation extremes. The PDFs further indicate the\
    \ potential for increased variability and a higher ceiling for extremes by the\
    \ end of the twenty-\uFB01rst century. ... the 100-yr return period of daily precipitation\
    \ values is often used in infrastructure design to reduce impacts and is similarly\
    \ used in determining insurance premiums for the National Flood Insurance Program\
    \ (NFIP) ... The percent change above HIST in the EOC scenarios for the 100-yr\
    \ return period of daily precipitation values varied for each city but was generally\
    \ 20% or greater, with very large (.50%) increases shown in Albany, Minneapolis,\
    \ and Nashville (Figs. 8a,d,e). Regionally, the percent increases in the 100-yr\
    \ return period of daily precipitation values in the EOC scenarios were approximately\
    \ 50%\u2013100% above the HIST epoch, with higher increases more widespread in\
    \ the EOC8.5 scenario. ... We used PDFs to detect the variability of the extreme\
    \ daily precipitation values in the epochs from extreme precipitation values extracted\
    \ for the EVA. ... Every climatologically unique city displayed an increase over\
    \ HIST in one or both EOC scenario return period daily precipitation values for\
    \ 25\u2013500 years... Overall, even with some biases in HIST EOC8.5 showed the\
    \ most robust increases from HIST for all return periods; EOC4.5 changes were\
    \ generally lower in magnitude but still showed modest increases."
