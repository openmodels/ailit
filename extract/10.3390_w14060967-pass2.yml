  20: The page lists multiple studies related to floods and their impacts, such as
    direct and indirect economic losses caused by floods (Tanoue et al., 2020) and
    flood-induced population displacements (Kakinuma et al., 2020). Studies like He
    et al. (2022) focus on quantification of flooding risks with global warming. This
    indicates evaluation of outcomes such as economic losses and population displacements
    related to flooding (Evaluation overview). Various studies on the list address
    global flood risk and the impacts of floods, showing floods as a driver of risk
    for economic and displacement outcomes (Drivers of Risk). While specific methodologies
    are not detailed, mentioned studies imply the use of modeling and global data
    frameworks (Methodology). The list references diverse studies exploring global
    river flood risk assessments, evolving databases of flood protection standards,
    and global flood vulnerability, among other topics, but does not detail their
    specific outcomes here (More Notes).
