Drivers of Risk:
  1: Changing world
  2: Biological invasions of hematophagous arthropods are driven by international
    trade, transportation, urbanization, climate change, and the urban heat island
    effect.
  3: Ongoing climate change, increasing travel and trade, land-use changes, socioeconomic
    factors.
  4: Land use change and intensification of trade and transport of goods and materials
    by sea, including the transport of livestock, impacted hematophagous arthropods.
  7: Long distance transport and livestock trade facilitated tick translocations.
  8: Climate warming may increase the number of favorable thermal niches for hematophagous
    arthropods, facilitating their invasions.
  9: Invasion debts concept implies a potential future proliferation of presently
    non-impactful alien hematophagous arthropods.
  10: Climate change promoting the geographic expansion of hematophagous arthropods
    and increasing temperatures likely contribute to more frequent disease outbreaks.
  11: Increased urbanization, climate change, and the presence of water storage containers
    in urban environments are noted as drivers increasing the habitat for and risk
    from invasive mosquito populations.
  12: Urbanization can be beneficial to Ae. albopictus but detrimental to Ae. japonicus
    and Ae. koreicus; the urban heat island effect can cause shifts in phenology and
    earlier seasonal population peaks; human population density can negatively affect
    Ae. koreicus abundances; NPK fertilizers attract gravid female mosquitoes and
    enhance food biomass for larvae; light pollution alters the seasonal phenology
    of Cx. pipiens.
  14: Accelerated worldwide urbanization and interconnectivity could support mosquito
    proliferation and adaptation to human-modified environments.
Evaluation overview:
  1: Invasive hematophagous arthropods and associated diseases
  3: Ecological, economic and social impacts of invasive hematophagous arthropods
    (vectors of pathogens and parasites).
  4: The review broadly examines the ecological, socioeconomic, and health impacts
    of invasive hematophagous arthropods.
  7: No relevant information
  10: Discusses the impact of hematophagous arthropods in terms of economic costs
    and disability-adjusted life years (DALY) due to insect-borne diseases.
  11: The paper discusses the potential for increased economic burdens and impacts
    on health, real estate, and recreational value due to hematophagous arthropod
    invasions, particularly mosquitoes.
Highlights:
  1: 'Open Access: This research has been made openly available by Queen''s academics
    and its Open Research team.'
  2: Stronger preventative monitoring and transboundary surveillance measures are
    needed to mitigate risks from invasive hematophagous arthropods and associated
    diseases.
  3: Invasive hematophagous arthropods can be major vectors of pathogens and parasites.
    Climate change and human activities facilitate their spread and establishment.
    There is a need to compile information on the historical and social aspects of
    hematophagous arthropod invasions to inform policymakers and prepare robust risk
    mitigation strategies.
  4: The review anticipates a higher competitive ability of invasive alien species
    over natives, marked risks to native species through disease vectoring and substantial
    economic costs to activity sectors such as healthcare.
  7: Human-made microhabitats have amplified translocation rates and establishment
    possibilities for mosquito species with adaptations like drought- and freeze-resistant
    eggs (e.g., Ae. albopictus).
  8: Climate change may worsen health risks by increasing zoonotic diseases due to
    expanding ranges of arthropod vectors.
  9: Warming climates may eliminate cold-related stresses, thereby enhancing mosquito
    survival and promoting disease risks.
  10: Economic costs of hematophagous insects are significant and more tangible for
    action by authorities; warmer conditions will likely increase mosquito populations
    and disease outbreaks.
  11: Early intervention and effective biosecurity are crucial as they are much cheaper
    than dealing with the accrued damages from mosquito invasions.
  12: Urbanization, agricultural practices (fertilizer use), and light pollution all
    influence mosquito populations and disease vector potential.
  14: Several hematophagous arthropods have exhibited strong ecological niche shifts
    during the invasion process.
Methodology:
  3: Review examines the different actions and roles that invasive hematophagous arthropods
    play in a rapidly changing world, considering socioeconomic and ecological contexts
    and case studies.
  4: The review constructs a timeline of past disease vector invasions across hematophagous
    arthropod groups, considering individual species and socioeconomic drivers.
  7: No relevant information
  9: Suggests modeling efforts for worldwide projections of vector-borne diseases
    considering future climate change scenarios.
  11: The study uses modeling with logistic response curves to evaluate the impact
    dynamics and associated costs of invasive mosquito populations.
More Notes:
  1: The paper discusses invasive hematophagous arthropods and associated diseases
    in the context of a changing world, which is relevant to climate impacts on human
    health. The mention of 'changing world' implies climate change as a potential
    driver.
  2: Collaborative approaches like the One Health approach are suggested to improve
    management of invasive hematophagous arthropods.
  7: Used tire exports and ornamental plants (e.g., lucky bamboo) are principal entry
    points for invasive mosquito species into new regions.
  13: This page focuses on the sociological and ecological aspects of invasive hematophagous
    arthropods (blood-feeding insects) and their management, rather than direct climate
    impacts. It discusses public perception, environmental concerns, and the need
    for integrated approaches to vector management.
