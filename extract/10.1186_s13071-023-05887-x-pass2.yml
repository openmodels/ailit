  8: 'Source material here.

    Climate warming may have a major role in fostering hematophagous arthropod invasions
    by increasing the number of favorable thermal niches for their development, including
    towards formerly cold and restrictive environments, such as at higher latitudes
    and altitudes. [...] As a consequence, climate change is likely to worsen health
    risks by increasing zoonotic diseases, transmission and disease vector population
    growth after the arrival of alien hematophagous arthropods.


    For the highly invasive yellow fever mosquito Ae. aegypti, Iwamura et al. [9]
    suggested an increasing global suitability for life cycle completion of +1.5%
    (in terms of periods suitable for mosquito development) per decade between 1950
    and 2000, with that trend predicted to accelerate and increase by +3.2% per decade,
    and even up to +4.4% per decade, by 2050.

    '
  9: Source material here.
  10: Climate change will worsen economic costs. The impact of hematophagous arthropods
    on human societies is often assessed either as an economic cost (in monetary currency)
    or in disability-adjusted life year (DALY), which represents the life expectancy
    lost because of the burden of insect-borne diseases... It is in fact the huge
    economic costs incurred by the spread of hematophagous insects that ironically
    provide powerful and more tangible metrics for actions by international authorities...
    Warmer conditions will likely increase mosquito populations and abundance, in
    turn increasing biting rates. As incubation periods for the parasites and viruses
    they carry are also temperature-dependent, climate change will certainly contribute
    to a switch from occasional to frequent disease outbreaks (for instance, malaria
    and dengue)... The existing knowledge reveals that only 15% of the economic costs
    incurred by hematophagous arthropods are devoted to their control (6% being of
    unknown use), the remaining being medical care (52%) or both medical care and
    control (27%)... Economic studies on invasive hematophagous arthropods revealed
    heterogeneous, either direct or indirect, cost figures worldwide... with dengue
    representing up to 84% of total health costs, the West Nile virus representing
    15% and Chikungunya and Zika together representing < 1%.
  11: 'Source material

    Even aside from direct health costs, invasions by hematophagous arthropods can
    cause substantial impacts through nuisance biting that affects recreational and
    real estate values which yield an economic return [123]. Urbanization and heat
    islands Four and a half billion people currently live in cities...This represents
    a growing opportunity for the development of invasive mosquito populations...With
    climate change projections over the next 3 decades likely to increase the area
    occupied by current arthropod invaders by 18%, the need for better biosecurity
    control to mitigate hematophagous arthropod nuisance biting and disease has never
    been stronger [7]. A recent modeling study using logistic response curves to resemble
    impact dynamics showed that for the Ae d e s genus, current management delays
    of 55 years have led to an additional cost of US$ 4.57 billion that could have
    been avoided. Rapid response to eradicate invaders post-invasion as well as the
    implementation of effective biosecurity control pre-invasion (i.e. biosurveillance
    and intensive monitoring) are up to ten times cheaper for mosquito-borne diseases
    than waiting and paying for accrued damages [120].

    '
