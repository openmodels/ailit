sourcematerial:
  1: Source material here.
  2: Source material here. Biological invasions have increased significantly with
    the tremendous growth of international trade and transport. Hematophagous arthropods
    can be vectors of infectious and potentially lethal pathogens and parasites, thus
    constituting a growing threat to humans. Today, several major vector-borne diseases
    are expanding in a world dominated by climate change, land-use change, and intensive
    transportation of humans and goods. Burgeoning urbanization, climate change, and
    the urban heat island effect are likely to interact to favor invasive hematophagous
    arthropods and the diseases they can vector. To mitigate future invasions of hematophagous
    arthropods and novel disease outbreaks, stronger preventative monitoring and transboundary
    surveillance measures are urgently required. Proactive approaches would reduce
    epidemiological and ecological risks and could save millions of lives and billions
    of dollars. Last, our capacities to manage invasive hematophagous arthropods can
    be improved by promoting interactions among experts of the health sector, stakeholders
    in environmental issues, and policymakers (e.g., the One Health approach).
  3: Invasive hematophagous arthropods [...] can have ecological, economic and social
    impacts. The pathogens they bear include [...] arboviruses [...] responsible for
    numerous widely distributed illnesses, such as dengue, yellow fever, chikungunya,
    Zika and West Nile viruses. As such, they give rise to major ecological, economic
    and health problems worldwide [...] require significant management and surveillance
    efforts. [...] Ongoing climate change may assist the invasion rates of alien species
    [...] changing climate and increasing travel and trade are interactive forces
    driving establishment success during introduction and making the invasiveness
    of alien hematophagous arthropods after introduction even more likely. [...] Recent
    assessments estimated that the economic cost of invasive alien species reached
    at least US$ 2.168 trillion over the last 4 decades [...] with that cause disease
    [...] aquatic and semi-aquatic invaders, with a total cost of potentially US$
    311 billion. [...] Review examines the different actions and roles that invasive
    hematophagous arthropods, vectors of disease, play in a rapidly changing world,
    considering a range of socioeconomic and ecological contexts and case studies.
    [...] There is an urgent need to compile information on the historical and social
    aspects of hematophagous arthropod invasions to inform policymakers and prepare
    robust risk mitigation strategies.
