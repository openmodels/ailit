  13: 'Source material here.

    The page discusses the socio-technical controversies related to mosquito management
    and the need for co-constructive and deliberative approaches. It mentions that
    the introduction of alien vector species, such as Ae. albopictus, has exposed
    populations to new epidemic risks and has led to shifts in public perception and
    management practices. There are concerns about the ecological and health effects
    of biocides, with increasing calls for consultation with local populations and
    the integration of environmental protection measures. Additionally, the paper
    highlights the intersection between environment and health in the context of vector
    management and the importance of considering biodiversity and environmental value
    pluralism. While it acknowledges the contribution of climate change to the spread
    of invasive vectors, the focus is more on the consequent societal dynamics and
    management strategies than on direct climate impacts.

    '
  14: 'Source material here.

    Accelerated worldwide urbanization and interconnectivity, which could further
    support mosquito proliferation and adaptations to human-modified environments.

    Social-ethnological approaches represent a valuable perspective for setting mitigation
    measures aiming at improving health and environments in the context of proliferations
    of hematophagous arthropods.

    Beside the significant health and economic concerns posed to human populations,
    our review demonstrates several nuisances to wildlife.

    Several hematophagous arthropods have exhibited strong ecological niche shifts,
    including niche inversion phenomenon, during the invasion process.

