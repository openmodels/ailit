  10: "Source material here: Impacts on ecosystem communities at local scales will\
    \ differ, as a range shift can represent a species\u2019 disappearance at one\
    \ end of its range and introduction at the other end; changes in ocean temperature\
    \ (sensu Pinsky et al. 2013; Thorson et al. 2017); changes in climate (Hare et\
    \ al. 2016); corals\u2019 sensitivity to climate change-related temperature increases\
    \ and ocean acidification (Hoegh-Guldberg et al. 2007; Gattuso et al. 2015, 2018);\
    \ NCIS (renamed USGCRP Indicators Catalog 5)in2020; Using survey data, shifts\
    \ can be measured as directional changes in range centroids; life history attributes\
    \ have been used to classify the potential for fish distributions to shift due\
    \ to changes in climate; As fish stock distributions change, the composition of\
    \ ocean ecosystem communities also changes, thereby affecting predator/prey dynamics\
    \ and competitive interactions; In addition, spatial distances between the new\
    \ stock range and the fishing communities who target those species may change,\
    \ affecting the costs of fishing, social networks, and subculture cohesion (Griffis\
    \ and Howard 2012); indicators of fish distribution are of great importance to\
    \ fishery managers and those who depend on living marine resources for their livelihoods\
    \ (re. Pinsky and Mantua 2014; Pinsky et al. 2018); Coral thermal stress describes\
    \ the occurrence, duration, and magnitude of high SST events that can result in\
    \ coral bleaching (Hoegh-Guldberg 2011; Heron et al. 2015;NOAACoral Reef Watch6).\
    \ This indicator is considered operational and slated for addition to subsequent\
    \ iterations of the NCIS."
  12: "Source material here. Community social well-being indicators assess and track\
    \ social factors that affect a community\u2019s ability to cope with climate or\
    \ other types of change. Social vulnerability indicators characterize pre-existing\
    \ conditions that reflect states of susceptibility to harm...Gentrification pressure\
    \ vulnerability indicators identify conditions that can affect the viability of\
    \ commercial and recreational working waterfronts...Fishing dependence indicators\
    \ identify the scale of commercial and/or recreational fishing in coastal communities.\
    \ Each of these indicators is composed of a set of indices (see Table 1) which\
    \ are themselves created from NMFS landings data, NMFS recreational fishing effort\
    \ data, and/or publicly available US Census data. Communities with high social\
    \ vulnerability and dependence on fishing may be less resilient to the effects\
    \ of climate change. For example, a community with social well-being vulnerabilities\
    \ that is traditionally dependent on climate-vulnerable species may be more affected\
    \ by fishery species range shifts due to climate change (e.g., increasing sea\
    \ surface temperature, ocean acidification)."
  13: 'Quote

    "The ability to track trends over time and space is critical to our understanding
    of rates and directions of change."

    "...research to develop additional indicators to adequately track and communicate
    climate impacts, risks, vulnerabilities, and preparedness in ocean and coastal
    systems."

    "A useful indicator system for assessing climate change impacts on oceans and
    coasts will require a number of key steps, including reducing lags between data
    collection and indicator delivery, improving spatial and temporal representation..."

    "...climate change has the potential to alter the abundance and distribution of
    living marine resources harvested in subsistence fisheries."

    "For example, recent research has resulted in new ways to characterize and track
    marine heat waves which could be a useful additional indicator of climate change
    impacts on ocean ecosystems..."

    "We recommend continued support for data collection for current indicators, coupled
    with priority research funding directed toward developing new indicators."

    "With additional research, these could be developed into robust indicators."

    "The current species distribution indicator tracks shifts in species distributions
    within fishery survey or governance areas. However, decision-makers also need
    information on species that are shifting across these boundaries..."

    '
  14: '"Healthy coral reef ecosystems support econom-ically and culturally valuable
    tourism industries. Climate change and ocean acidification will likely reduce
    the distribution and species diversity of most coral reef ecosystems." "Vibrio
    abundance is strongly linked to coastal water temperatures and salinity..." "Harmful
    algal blooms (HAB) are becoming more prevalent in coastal areas in their extent
    and distribution. These blooms are directly influenced by environmental conditions..."
    "...marine mammals can serve as effective sentinels for ecosystem change and emerging
    diseases." "...shorebird species use and migrate through a variety of habitats
    that are likely to be impacted by climate change..." "A program is needed to evaluate
    and establish robust, reliable, and systematic methods for monitoring changes
    in the frequency and spatial extent of HABs." "Data from existing networks, such
    as the NOAA National Marine Mammal Stranding Network, can be integrated with other
    ocean observing systems to understand the impacts of climate disruption on ocean
    health, reduce public health risks, and ensure sustainable development of coastal
    and ocean resources."'
  16: "  \nThe authors acknowledge support provided by A.C. Janetos, chair of the\
    \ Indicator Work Group under the National Climate Assessment and Development Advisory\
    \ Committee (NCADAC), and M.A. Kenney, director of the Indicator Research Team.\
    \ Kenney\u2019s team provided research and coordination support to the technical\
    \ team and M.D. Gerst worked with the authors to develop the conceptual model\
    \ (Fig. 1), both of whom were supported by National Oceanic and Atmospheric Administration\
    \ grant NA09NES4400006 and NA14NES4320003 (Cooperative Climate and Satellites-CICS)\
    \ at the University of Maryland/ESSIC. The authors also acknowledge numerous members\
    \ of the Oceans and Coastal Indicators Technical Team, whose work on internal\
    \ reports provided the foundation for this paper: Eleanora Babij, Suzanne Bricker,\
    \ Donald Cahoon, Enrique Curchitser, Joe DeVivo, Maria Dillard, Quay Dortch, Ben\xE9\
    t Duncan, Mark Eakin, Peter Edwards, Deborah Fauguire, Elizabeth Fly, Michael\
    \ Ford, Michelle Gierach, Stephen Gill, Jason Grear, Jawed Hameedi, Jon Hare,\
    \ David Legler, Alan Lewitus, Eric Lindstrom, Douglas Marcy, Laurie McGilvray,\
    \ Todd O\u2019Brien, Diane Stanitski, Susan-Marie Stedman, Richard Stumpf, Teri\
    \ Rowles, Valerie Termini, E. Robert Thieler, Eric Thunberg, Thomas Webler, Jordan\
    \ West, and Robert J. Wood.\n"
