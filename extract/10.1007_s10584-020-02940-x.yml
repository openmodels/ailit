Drivers of Risk:
  1: Climatic changes are identified as impacting the benefits or ecosystem services
    provided by ocean and coastal ecosystems.
  2: Ocean warming, deoxygenation, acidification, coastal flooding, droughts, rising
    seas, and extreme weather are discussed as impacting ocean and coastal communities.
  5: Human activities resulting in greenhouse gas emissions exert substantial pressures
    on the ocean and coastal environment, such as rising ocean temperatures and shifts
    in marine fish geographic ranges.
  6: The paper discusses climate-related changes impacting the ocean and coast, including
    sea surface temperature, arctic sea ice extent, ocean chlorophyll concentration,
    and sea level rise. It also mentions impacts on global temperatures and circulation
    patterns, carbon capture and burial, storm severity, and heat absorption.
  10: Changes in ocean temperature; changes in climate; climate change-related temperature
    increases and ocean acidification.
  12: Identified drivers include sea level rise, gentrification pressure, fishing
    dependence, and social vulnerability, such as high poverty and high cost of housing.
  13: Climate change alters the abundance and distribution of living marine resources
    harvested in subsistence fisheries. Marine heatwaves are identified as potential
    indicators of climate change impacts.
  14: Climate change and ocean acidification impacting coral reefs, coastal water
    temperatures affecting Vibrio outbreaks, environmental conditions influencing
    harmful algal blooms, and climate change affecting habitats used by shorebirds.
  16: No relevant information
Evaluation overview:
  1: The paper provides an overview of the ecosystem services offered by the U.S.
    Exclusive Economic Zone (EEZ) and their potential reduction due to climate change.
  2: No relevant information
  6: This paper discusses indicators for tracking large-scale changes to the marine
    environment and related ecosystem services.
  10: Impacts on ecosystem communities at local scales will differ; range shifts can
    represent species disappearance at one end of a range and introduction at the
    other.
  12: The paper discusses community social well-being indicators that assess social
    factors affecting a community's ability to cope with climate change and other
    changes.
  13: The paper discusses the need to track and communicate climate impacts, risks,
    vulnerabilities, and preparedness in ocean and coastal systems. It focuses on
    developing and improving indicators for assessing climate change impacts on these
    systems.
  14: The page discusses various impacts related to coral reef tourism, Vibrio outbreaks,
    harmful algal blooms, marine mammal morbidity and mortality, shorebird phenology
    and abundance, and ocean bottom temperature.
  16: No relevant information
Highlights:
  1: The importance of ocean and coastal ecosystems for non-market services, including
    subsistence food provisioning, health benefits, shoreline protection, climate
    regulation, conservation of marine biodiversity, and cultural heritage preservation,
    is emphasized, with potential reductions due to climate change.
  2: Oceans have absorbed 25% of anthropogenic carbon emissions and 84% of the heat
    since the Industrial Revolution.
  5: Climate change may necessitate updates to fishery management practices and activities
    designed to mitigate or adapt to climate stressors.
  6: The paper recommends several indicators for the pilot NCIS to track climate-related
    changes in the ocean and coast.
  10: Fish stock distributions change, impacting ocean ecosystem composition, predator/prey
    dynamics, and competitive interactions; Spatial distances between the new stock
    range and fishing communities may change, affecting costs of fishing, social networks,
    and subculture cohesion; Indicators of fish distribution are of great importance
    to fishery managers.
  12: Communities with high social vulnerability and dependence on fishing may be
    less resilient to the effects of climate change, such as fishery species range
    shifts due to increasing sea surface temperature and ocean acidification.
  13: The page highlights the need for consistent long-term monitoring and assessment
    of climate indicators to track trends. It emphasizes improving existing indicators
    and developing new ones to better understand and communicate climate impacts on
    ocean and coastal systems, including considering subsistence fisheries.
  14: Healthy coral reefs support valuable tourism; increased Vibrio and HABs linked
    to environmental conditions; marine mammals as sentinels for ecosystem change;
    shorebirds as integrators of global change.
  16: No relevant information
Methodology:
  2: Tracking impacts via indicators developed in collaboration with the U.S. National
    Climate Indicators System.
  5: The NCIS process involves identifying key points along the ecosystem services
    pathway impacted by climate change, using a conceptual model to identify representative
    indicators.
  6: The paper identifies indicators based on assessment of existing literature and
    defined criteria related to scalability, building on existing efforts, and communication.
  10: Uses survey data to measure shifts as directional changes in range centroids;
    Life history attributes are used to classify the potential for fish distributions
    to shift due to climate change.
  12: The analysis uses NMFS landings data, recreational fishing effort data, and
    US Census data to construct indicators of social vulnerability, gentrification
    pressure, and fishing dependence.
  13: The paper suggests improving existing indicators by reducing lags between data
    collection and indicator delivery, improving spatial and temporal representation,
    reducing costs of indicator production, identifying directionality and thresholds,
    ensuring measurable targets, and ensuring decision-makers can use the information.
    It also recommends developing new indicators through research on analytical methods
    and data collection strategies.
  14: The need for programs to evaluate and establish systematic methods for monitoring
    environmental changes and impacts, such as HAB frequency and distribution and
    integrating existing data networks.
  16: This paper involved a technical team and conceptual model development, with
    contributions from numerous members of the Oceans and Coastal Indicators Technical
    Team.
More Notes:
  2: No relevant information
  10: Mentions Coral thermal stress describing the occurrence, duration, and magnitude
    of high SST events that can result in coral bleaching. The paper notes this indicator
    is slated for addition to subsequent iterations of the NCIS.
  13: The current species distribution indicator tracks shifts within fishery survey
    or governance areas, but decision-makers also need information on species shifting
    *across* these boundaries. Lack of nation-wide information and/or monitoring is
    an impediment to developing new indicators.
  16: The paper was supported by the National Climate Assessment and Development Advisory
    Committee (NCADAC) and the National Oceanic and Atmospheric Administration. The
    paper focuses on oceans and coastal indicators.
Quantitative material:
  1: The U.S. EEZ generates approximately 3.4 million square nautical miles of ocean,
    contributes ~US 370 billion of U.S. gross domestic product, 617 billion in sales,
    and 2.6 million jobs each year.
  2: U.S. exclusive economic zone generates approximately $370 billion in GDP, $617
    billion in sales, and 2.6 million jobs yearly.
  6: The paper mentions 21 identified indicators, with 9 classified as operational
    and 4 selected for the pilot NCIS (sea surface temperature, arctic sea ice extent,
    ocean chlorophyll concentration, and sea level rise).
  10: NCIS (renamed USGCRP Indicators Catalog 5)in2020
  13: No quantitative information is explicitly provided on this page.
  16: No relevant information
