  2: 'Source material here.

    Drivers of Risk: "The effects of climate-related changes such as ocean warming,
    deoxygenation, acidification, coastal flooding, droughts, rising seas, and extreme
    weather can be far-reaching and unpredictable given the complex relationships
    between physical, chemical, biological, and human variables within ocean and coastal
    ecosystems..."


    Quantitative material: "The US exclusive economic zone (EEZ) encompasses approximately
    3.4 million square nautical miles of ocean and a coastline of over 12,300 miles.
    Along with the Great Lakes, this vast area generates ~ US$370 billion of US gross
    domestic product, $617 billion in sales, and 2.6 million jobs each year (NOAA
