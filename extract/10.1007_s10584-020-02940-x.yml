    Quantitative material: "The U.S. Exclusive Economic Zone (EEZ) encompasses approximately
    3.4 million square nautical miles of ocean and a coastline of over 12,300 miles.
    Along with the Great Lakes, this vast area generates ~US 370 billion of U.S. gross
    domestic product, 617 billion in sales and 2.6 million jobs each year."

    Highlights: "These ocean and coastal ecosystems also provide many important non-market
    services including subsistence food provisioning, health benefits, shoreline protection,
    climate regulation, conservation of marine biodiversity, and preservation of cultural
    heritage. As climatic changes occur, these benefits or ecosystem services may
    be significantly reduced."

