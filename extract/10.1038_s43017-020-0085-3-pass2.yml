Drivers of Risk:
  2: Anthropogenic climate change is altering precipitation patterns and increasing
    temperatures, resulting in more frequent extreme vegetation-fire events.
  3: The shocks and changes impacting the outcomes include reduced solar radiation,
    air pollution/increased aerosols, black carbon deposition, topography controls,
    localized rainfall, post-fire debris flow, permafrost thaw/loss, pyric herbivory,
    Indigenous burning, nitrogen deposition, phosphorus deposition, sediment deposition,
    climate change, drought, and anthropogenic drivers.
  4: Regional fire activities are influenced by warmer, drier summers, and earlier
    spring snowmelt.
  5: Increased fire weather index days; higher fire emissions and burned area in specific
    regions like Western USA and Canada.
  6: Increasing temperatures and anomalous fire-weather conditions, exacerbated by
    climate change, are impacting fire regimes.
  7: Changes in fire weather (e.g., Fire Weather Index), temperature increases.
  9: Climate change (leading to increased fire weather), vegetation changes (e.g.,
    shifts to more flammable grasslands), anthropogenic factors (e.g., ignitions,
    land management, logging), drought, elevated atmospheric CO2 concentrations, extreme
    fire events.
  10: Conductive heat/direct flames, Radiant heat, Convective heat, Embers/brands,
    Smoke/particulates/aerosols (all related to wildfires)
  11: Includes climate change shrinking safe weather windows for prescribed burns;
    socio-ecological factors in the WUI amplify fire risk.
  12: Changing climate, land-use patterns, past fire and logging disturbances are
    impacting fire risk.
  13: Anthropogenic fire regimes influenced by human activity and climate change are
    presented as risks impacting fire outcomes.
  14: The paper discusses how climate change is impacting fire regimes, including
    increased temperatures and shifts in the timing of spring.
  15: Climate change impacts on fire activity and fire weather, including projected
    future fire regimes and potential for very large fires.
Evaluation overview:
  2: The page discusses the economic impacts of fires, affecting life, property and
    human health and mentions potential for terrestrial carbon stores to become major
    greenhouse gas sources.
  3: The paper discusses factors influencing and impacted by vegetation fires and
    their effects on the biosphere, geosphere, hydrosphere, cryosphere, and atmosphere.
    It includes environmental impacts of the fires, such as degree of canopy damage
    and changes in global fire activity.
  5: No direct overview of outcomes like mortality or productivity loss is provided
    on this page.
  7: The table summarizes studies on future changes in fire indicators, including
    fire weather, burned area, and fire activity.
  8: This page evaluates changes in wildfire regimes, including burned area, fire
    intensity, vegetation trajectories, and ecological function.
  9: Discusses changes in fire regimes and their impact on ecosystems, carbon storage,
    and fire-induced emissions.
  10: No relevant information
  11: Discusses mortality and hospitalization due to biomass smoke from wildfires
    and prescribed burns.
  12: The flammability of many landscapes is increasing due to climate change and
    land-use patterns, leading to increased risk of economically and ecologically
    destructive fires.
  13: The page discusses the need for economic models to understand the full costs
    of fire disasters, including human health impacts.
  14: The paper provides an overview of the impacts of climate change on wildfire
    activity and emissions in various regions.
  15: No relevant information
Highlights:
  2: Large and frequent fires in boreal and tropical forests have the potential to
    cause terrestrial carbon stores to become major greenhouse gas sources, amplifying
    climate change.
  3: There is an emerging picture of changes in global fire activity that emphasizes
    the importance of regional-scale variation, climate change, and anthropogenic
    drivers. Extreme fire-weather conditions, drought, and fuel dryness are associated
    with extreme fire events.
  4: Since ~1980, warmer, drier seasons have increased area burned from vegetation
    fires despite industrial fire suppression efforts.
  5: Increased fire activity in Western USA and Canada, represented by burned area
    and federal fire-suppression costs over time.
  6: Fire seasons are lengthening, becoming more extreme, and associated with higher
    intensity fires leading to more economically destructive events.
  7: Global studies generally project an increase in fire weather. Regional studies
    (North America and Mediterranean Europe) examine changes in fire season length,
    extreme fire weather, and burned area. The boreal zone of Canada is expected to
    experience a doubling of burned area.
  9: Uncertainty in fire regime predictions arises from the complexity of climate-fire-vegetation
    interactions, anthropogenic factors, and difficulty in predicting extreme fire
    events; Runaway feedback loops between climate, vegetation, and fire can transform
    landscapes.
  10: Adaptation and management strategies for fire-prone landscapes vary from allowing
    fires to burn in wilderness areas to intensive management in the wildland-urban
    interface. Fuel management is key to reducing wildfire risk while conserving biodiversity
    and ecosystem services.
  11: Emphasizes the vulnerability of the WUI due to poor planning and ineffective
    fuel treatments; notes high mortality and hospitalizations from smoke pollution.
  12: Achieving better fire management requires addressing key research challenges,
    including describing regional fire regimes, determining fire causes (natural vs.
    anthropogenic), and understanding interactions between climate, weather, terrain,
    and fuel.
  13: The paper underlines the urgency of developing coordinated transdisciplinary
    research for fire-management strategies and stresses the importance of social
    science in understanding human-fire relationships and policy barriers.
  14: Climate change is increasing wildfire activity in regions such as the western
    US due to increased temperatures and changes in precipitation patterns.
  15: Decreasing fires in Mediterranean Europe; increasing high-latitude deciduous
    forests due to climate warming and fire.
Methodology:
  2: The paper reviews human-environmental interaction and shapes fire activity from
    the viewpoint of pyrogeography; prehistorical fire records rely on palaeoecological
    proxies such as dendrochronology and analysis of sedimentary charcoal; satellite
    imagery is currently used routinely to monitor fire activity (since 1970s).
  5: The analysis uses a historical fire reconstruction and data from satellites (MTBS,
    MODIS) to assess fire impact trends.
  6: "Analysis includes the use of process-based coupled Earth System Models with\
    \ integrated fire\u2013vegetation dynamics, statistical modeling approaches, and\
    \ environmental-niche modeling."
  7: "Summarizes findings from global, biome, and regional studies using various climate\
    \ models. Results applicable to future climate conditions, specifically with global\
    \ mean temperatures 2 \xB0C above pre- industrial levels versus 1981\u20132010."
  9: Discusses the use of regional-scale and global models to predict future fire
    regimes, comparative analyses of model outputs and observed patterns, and the
    limitations of Earth-system models in capturing non-analogue future climates.
  10: Adaptation and management approaches are tailored to specific environmental
    and socio-ecological settings. Fuel management involves broad-scale prescribed
    burning in frequently burned vegetation.
  12: "Calls for improved global and regional fire models to explore fire\u2013vegetation\u2013\
    atmosphere feedbacks, improved data acquisition and database assembly, and next\
    \ generation satellite imagery."
  13: The analysis emphasizes the necessity of transdisciplinary pyrogeographic research,
    integrating feedback processes across Earth systems, and necessitates data collection
    on fire activity and human population's socio-economic and cultural factors.
  14: Remote sensing data and climate model projections are used to examine the relationship
    between climate change and wildfire activity.
  15: No relevant information
More Notes:
  2: Detecting and predicting changes in fire activity is difficult due to relatively
    brief fire records, bioregional variability and human involvement.
  5: Historical and satellite data bias-corrected for consistency in trend analysis.
  6: Fire activity is not solely attributed to climate change, as factors like changes
    in vegetation due to agriculture or invasive species, and human settlement patterns
    also play significant roles.
  8: The figure (Fig. 4) illustrates relationships and feedbacks between climate,
    fire, and vegetation. The page also acknowledges uncertainty in projections due
    to feedbacks and human behavior.
  10: The intensity of fire management changes proportionally with human population
    and economic assets.
  12: Large-scale tree planting and natural-forest restoration requires effective
    and sustainable fire management.
  13: The document highlights intellectual and institutional barriers in performing
    transdisciplinary pyrogeographic research and the urgent need for investment in
    training and capacity building for effective wildfire management.
  14: The paper notes the role of human actions in modifying eco-climatic fire regimes
    and highlights several studies and analyses regarding the impact of climate on
    fire activity.
  15: Near-future forest vulnerability to drought and fire varies across the western
    United States.
Quantitative material:
  2: "Global mean carbon emissions due to fire were approximately 2.2 Pg per year\
    \ from 1997 to 2016, about 22% of contemporary global annual carbon emissions\
    \ from fossil fuel combustion; 65% are due to savannah and grassland fires, 10%\
    \ from temperate and boreal forest fires, Approximately 20% are associated with\
    \ clearing tropical rainforest; Vegetation fires burn an annual global average\
    \ of 400\u2013500 million hectares (Mha)."
  3: From 1979 to 2013, an average increase of 18.7% in fire-weather-season length
    has been documented across global burnable lands. Between 1998 and 2015, the area
    burned by vegetation fires globally declined by around 25%, from over 500 Mha
    to less than 400 Mha annually.
  4: Annual average burned-area in Canada has almost tripled since 1959 from 1 million
    ha to 2.8 million ha.
  5: Linear trends in Fire Weather Index days from 1979 to 2019; annual fire emissions
    data over Africa from 1997 to 2019.
  6: "The occurrence of extreme fire weather is projected to increase by almost 130%\
    \ for the Mediterranean and just under 40% for Alaska with a 2\xB0C rise in global\
    \ mean temperatures."
  7: "Mentions projected changes in Fire Weather Index days >95th percentile (e.g.,\
    \ +23.5 (129%) for Europe - Mediterranean, +15.5 (84.9%) for South America - Amazon,\
    \ +9 (49.3%) for Australia - Southeast Australia, +10.2 (55.9%) for North America\
    \ - Western USA, +9.2 (50.4%) for North America - Canada/boreal forest, and +7.1\
    \ (38.9%) for North America - Alaska. Also mentions doubling of burned area in\
    \ the boreal zone of Canada to 5 Mha year\u22121."
  8: "Projections suggest a 40\u2013100% increase in burned area with a 1.5 \xB0C\
    \ to 3 \xB0C warming in Mediterranean Europe."
  9: Mentions landscape-wide conversions leading to depletion of soil carbon stores,
    as seen in regrowth forests.
  10: 'Distance of exposure to wildfire impacts: 0.01 m to 1,000 km (Conductive heat/direct
    flames, Radiant heat, Convective heat, Embers/brands, Smoke/particulates/aerosols)'
  11: Notes US fire suppression costs in 2018 exceeded USD $3 billion.
  12: Managed fire regimes in Arnhem Land estimated to have reduced accountable non-CO2
    emissions by 37.7% relative to the decade prior to intervention across 28,000
    km2 of Eucalyptus savannah.
  14: Includes studies indicating increased wildfire activity in the western US and
    global fire emissions, but specific quantitative results are not attributed directly
    to this paper.
  15: No relevant information
