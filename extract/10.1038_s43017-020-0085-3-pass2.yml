  2: "Source material here.\nEvaluation overview: \"Such fires have major economic\
    \ impacts, affecting life, property and human health26\u201329, thus, it is important\
    \ to consider contemporary and future trends in fire activity to inform adaptation\
    \ and mitigation policies.\" \nDrivers of Risk: \"Currently, anthropogenic climate\
    \ change is altering precipitation patterns and increasing temperatures, resulting\
    \ in more frequent extreme vegetation-fire events23\u201325.\" \nQuantitative\
    \ material: \"Global mean carbon emissions due to fire were approximately 2.2\
    \ Pg per year from 1997 to 2016, about 22% of contemporary global annual carbon\
    \ emissions from fossil fuel combustion. Of fire-related emissions, about 65%\
    \ are due to savannah and grassland fires, and 10% from temperate and boreal forest\
    \ fires50. Approximately 20% are associated with clearing tropical rainforest\
    \ for pasture, plantations and agriculture.\" and \"Vegetation fires burn an annual\
    \ global average of 400\u2013500 million hectares (Mha)\".\nMethodology: \"In\
    \ this Review, we describe how human\u2013environmental interaction shapes fire\
    \ activity from the viewpoint of pyrogeography33.\" and \"Prehistorical fire records,\
    \ which are essential to understanding the fire history of infrequently burned\
    \ vegetation, rely on palaeoecological proxies such as dendrochronology and analysis\
    \ of sedimentary charcoal19,56\u201360.\" and \"Satellite imagery is currently\
    \ used routinely to monitor fire activity but only became available in the 1970s62.\"\
    \nHighlights: \"Large and frequent fires in boreal and tropical forests have the\
    \ potential to cause terrestrial carbon stores to become major greenhouse gas\
    \ sources, amplifying climate change.\"\nMore Notes: \"Detecting and predicting\
    \ changes in fire activity is difficult due to relatively brief fire records,\
    \ bioregional variability and human involvement.\"\n"
