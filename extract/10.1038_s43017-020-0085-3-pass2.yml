  12: 'This page discusses increasing landscape flammability and its ties to climate
    change and land-use patterns, noting "The flammability of many landscapes is increasing
    because of the combined effects of changing climate and land-use patterns." The
    paper evaluates risks associated with fires, emphasizing their destructive potential:
    "The increased risk of economically and ecologically destructive fires can be
    reduced using planning and urban-design principles, combined with fuel management
    and fire management." Quantitative data highlights a reduction in emissions: "application
    of this approach to 28,000 km2 of Eucalyptus savannah in Arnhem Land has been
    estimated to have reduced accountable non-CO2 emissions by 37.7% relative to emissions
    in the decade prior to the intervention." Methodological insights stress the need
    for improved models: "development of general ecological principles and evidence-based
    analysis of the effectiveness of fire-management and adaptation approaches." Highlights
    address essential research challenges, including fire causes: "Identifying the
    cause of fires, at the most basic level differentiating natural and anthropogenic
    ignitions, is also essential." Further, it touches on reforestation''s vulnerabilities:
    "Large-scale tree planting...must have effective and sustainable fire management."'
  13: '

    Economic models are essential to inform- ing investment in sustainable fire management
    and understanding the full costs of fire disasters, including human health impacts.
    As anthropogenic fire regimes are influenced by human activity, there is a considerable
    need for data collection to improve quantification and model - ling of fire activity
    and human populations...Climate change and numerous other anthro - pogenic effects
    on fire regimes present a new, urgent challenge for effective human adaptation
    to vegetation fire. Transdisciplinar y pyrogeographic research remains difficult
    to implement because of numerous intellectual and institutional barriers... integrating
    dynamic feedback processes across systems will be critical to predicting both
    consequences and beneficial outcomes of future anthropogenic fire regimes...there
    is a considerable need for data collection to improve quantification and model
    - ling of fire activity and human populations...Coordinated transdisciplinary
    research can lead to the development of fire- management strategies and avoid
    adverse economic and environmental impacts of fire disasters...Social science
    is critical in both understanding how contemporary societies relate to fire, smoke
    and fire- management strategies and identifying policy barriers, in order to establish
    pathways for transforming landscapes and achieving management objectives. Transdisciplinar
    y pyrogeographic research remains difficult to implement because of numerous intellectual
    and institutional barriers, such as the limited interac - tion between the humanities
    and physical sciences...Ongoing local, regional, national and international investment
    in training, institutional capacity building and fostering diversity amongst researchers
    and practitioners and their approaches is urgently required.

    '
