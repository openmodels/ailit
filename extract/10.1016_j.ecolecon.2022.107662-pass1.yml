Drivers of Risk:
  1: No relevant information
  2: Weather changes, specifically temperature increases and precipitation fluctuations,
    are impacting livestock production.
  3: Temperature changes and rainfall fluctuations are considered as drivers of risk.
  4: Climate change impacts include extreme heat, water scarcity, changes in precipitation
    patterns, and temperature rises.
  6: The analysis considers average temperature and total precipitation as drivers
    of risk.
  7: Temperature increases and changes in precipitation are identified as drivers
    impacting beef production.
  8: Temperature and precipitation changes (annual weather fluctuations).
  9: Temperature, temperature squared, precipitation, precipitation squared.
  10: Temperature changes (tropical and poor countries more affected), precipitation
    changes.
  11: Temperature and precipitation changes
Evaluation overview:
  1: No relevant information
  2: The paper evaluates the impact of weather fluctuations on global livestock production.
  3: This paper analyzes the impact of weather shocks on global livestock production.
  4: Assessment of the impact of climate change on livestock production, specifically
    focusing on cattle production.
  6: This paper evaluates the impact of climate change on animal production, measured
    in tonnes.
  7: The paper evaluates the impact of temperature and precipitation changes on beef
    production, particularly in hot, poor, and agriculture-dependent countries.
  8: Beef production (global).
  9: Impact of weather fluctuations on cereal production (yield and total production).
  10: This study evaluates the impact of weather fluctuations on global beef production.
  11: Aggregate impact on beef production (in logs)
Highlights:
  1: No relevant information
  2: Climate change is forecasted to reduce animal output by 20% in mid-century and
    an additional 40% by the end of the century, assuming historical levels of adaptation.
  3: Temperature changes have a robust negative effect on global livestock production,
    while rainfall fluctuations have a positive impact. The negative effect of temperature
    is more concentrated in hot, poor, and agricultural-dependent countries. Rainfall
    in the tropics can moderate temperature-caused adverse effects, while rainfall
    in temperate regions aggravates these adverse effects.
  4: Changes in climatic patterns affect livestock directly via health impacts and
    indirectly through availability of water and feed quality.
  6: "The impact of temperature on animal production is higher in tropical regions.\
    \ A 1\xB0C increase in temperature reduces animal production by 27% in poor countries\
    \ and 4% in rich countries."
  7: Temperature changes have more severe impacts in hot, poor, and agriculture-dependent
    regions; precipitation changes can mitigate some negative impacts of temperature
    rise on beef production.
  8: The impact of annual weather fluctuations on beef production is robust to various
    sensitivity tests. Sub-Saharan Africa (SSA) has a substantial impact, but excluding
    the region does not negate the general trend. Results are broadly similar when
    using a balanced panel dataset.
  9: Temperature and precipitation have statistically significant impacts on cereal
    yield and production. Impacts vary depending on whether countries are classified
    as 'tropical', 'poor', or 'agriculture-dependent'. The impacts of temperature
    are not linear, since both temperature and temperature squared are included in
    the regression model.
  10: Climate change affects livestock production and food security, with poor and
    agricultural-dependent countries in the tropics severely affected by warming.
    Warming dominates the effect of rainfall changes in the long term.
  11: Climate change is predicted to negatively impact beef production.
Methodology:
  1: No relevant information
  2: The analysis uses an established econometric strategy to examine country-level
    data on the relationship between weather changes and livestock production.
  3: Panel data analysis is used on a dataset of national livestock production and
    local weather fluctuations from 187 countries. The methodology accounts for omitted
    variable bias. The results are applicable to short-term weather shocks on livestock
    production.
  4: Analysis is performed using a reduced-form framework to assess the general pass-through
    effect of annual weather fluctuations on global livestock production.
  6: The paper uses an error-corrected model with adjustments for spatial (1000 km)
    and serial (3-year) correlation. The historical data spans 1961-2017. Predicted
    changes are for 2041-2060 and 2061-2100.
  7: The analysis involves estimating coefficients using a model with country fixed
    effects and region-specific trends, with standard errors adjusted for spatial
    and temporal correlation; data from 1961-2017 is used.
  8: "Separate regressions are estimated with country fixed effects and region-specific\
    \ trends, using data from 1961\u20132017. Standard errors are adjusted for spatial\
    \ (1,000km) and serial (3-years) correlation. Several robustness checks are performed\
    \ by modifying the sample (excluding outlier countries, excluding SSA, only SSA,\
    \ using a balanced panel)."
  9: "Panel data regression with country fixed effects and region-specific trends,\
    \ using data from 1961\u20132017. Standard errors are adjusted for spatial (1,000km)\
    \ and serial (3-years) correlation. Separate regressions are estimated for each\
    \ coefficient."
  10: The paper uses panel data from 1961 to 2017 and analyzes long differences and
    panel estimates. Projections extend to 2041-2060 and 2081-2100 using the ACCESS-ESM1.5
    model under SSP3-7.0 scenario.
  11: Panel data model; Long differences method to account for adaptation; Country-level
    analysis
More Notes:
  1: The page includes bibliographic and access information for the article, including
    DOI, publisher, and Creative Commons license.
  4: The analysis intends to evaluate the general impact of climate change factors
    on livestock production without detailing specific contributions of each factor.
  6: The weather and climate entries are cattle population adjusted. The analysis
    also uses cattle stock as a live animal indicator.
  8: 'The paper investigates a potential mechanism: how weather changes affect beef
    production via their impact on crop production.'
  10: The panel data method does not account for inter-annual tradeoffs farmers make.
  11: The model does not fully account for adaptation to climate change, although
    adaptive techniques did not dampen damage estimates. Real-world agricultural processes
    are more complex than represented in the models.
Quantitative material:
  1: No relevant information
  2: "A 1\xB0C increase in temperature leads to a 9.7% reduction in global beef production;\
    \ a marginal increase in annual precipitation leads to a 2.1% increase in beef\
    \ production in tropical countries but a 1.9% decrease in temperate countries."
  3: The paper finds that climate change will reduce animal output by a further 20%
    in the mid-century and an additional 40% by the end of the century.
  6: "The paper includes predicted changes in average temperature, total precipitation,\
    \ and log animal production for various regions under the SSP3.70 scenario for\
    \ medium-term (2041-2060) and long-term (2061-2100) horizons, showing both absolute\
    \ changes and percentage changes from historical figures. It also finds that a\
    \ 1\xB0C increase in temperature leads to a 9.7% reduction in beef production."
  7: "A 1\xB0C increase in temperature is four times more adverse in agriculture-dependent\
    \ countries compared to non-agricultural ones; a 1 mm increase in precipitation\
    \ leads to a 2.1% increase in beef production in tropical countries but a 1.9%\
    \ decrease in temperate countries."
  8: Table 3 presents coefficients from regressions, showing the impact of lagged
    temperature, lagged precipitation, log temperature, and weather interaction on
    beef production under different conditions (Aggregate, Tropical, Poor, Agriculture-dependent).
    For example, the coefficient for lagged temperature (aggregate) is -0.047, significant
    at the 1% level.
  9: Table 4 shows coefficients quantifying the impact of temperature and precipitation
    (and their squares) on cereal yield (ton/ha) and production (kg) for aggregate,
    tropical, poor, and agriculture-dependent countries. For example, a 1-degree Celsius
    increase in temperature is associated with a -0.0372 ton/ha change in yield for
    the aggregate countries.
  10: "A 1\xB0C increase in temperature leads to a 9.7% reduction in beef production\
    \ globally. Poorer countries experience a 27% reduction vs. 4% in higher-income\
    \ countries. An additional mm increase in annual precipitation leads to a 2.1%\
    \ increase in production in tropical countries and a 1.9% decrease in temperate\
    \ ones. Predicted climate change by 2070 would range from 11% loss in temperate\
    \ regions to 36% in tropical areas."
  11: "Maps represent aggregate (temperature + precipitation) impacts (as log changes)\
    \ from ACCESS-ESM1.5 for (a) mid-term climate change (2041-2060) and (b) long-run\
    \ climate change (2081-2100) under SSP3-7.0 scenario. Changes are relative to\
    \ a 1981\u20132010 baseline."
