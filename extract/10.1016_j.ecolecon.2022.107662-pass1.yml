  2: "Source material: \"Using country-level data and a variety of specifications,\
    \ we find that a 1 \u25E6C increase in temperature will lead to a 9.7% reduction\
    \ in global beef production on average. These adverse effects are amplified in\
    \ hot, poor, and agriculture-dependent countries. Besides, we find that a marginal\
    \ increase in annual precipitation would lead to a 2.1% increase in beef production\
    \ in tropical countries but a 1.9% decrease in temperate ones. Also, our forecasts\
    \ show that climate change will reduce animal output by a further 20% in the mid-century\
    \ and an additional 40% by the end of the century assuming no adaptation other\
    \ than the degree of adaptation observed in the historical period.\""
  3: Climate change in Africa particularly has drawn significant interest from researchers
    and policymakers due to the peculiar fragility of its economy, making adverse
    effects of climate change even more severe. Global warming affects several agro-related
    outcomes such as the increasing incidence and severity of droughts, floods, and
    other extreme weather events. This paper sheds more light on the effects of weather
    shocks on livestock... Our results show a robust negative effect of temperature
    changes on global livestock production and a positive impact of rainfall fluctuations.
    We offer further evidence that the effect of temperature is more concentrated
    in hot, poor, and agricultural-dependent countries. Also, we find that climate
    change will reduce animal output by a further 20% in the mid-century and an additional
    40% by the end of the century. Also, while the benefits of rainfall in the tropical
    regions moderate temperature-caused adverse effects, these adverse affects are
    further aggravated by rainfall in the temperate regions... This paper achieves
    this objective using a panel of national livestock production and local weather
    fluctuations from 187 countries. Empirically, we address some specific shortcomings
    in previous literature with respect to methodology, data, temporal and spatial
    scale. The methodology accounts for omitted variable bias; the spatial and temporal
    dimension of our dataset allows for substantial variation through which we can
    identify the effects of short-term weather shocks on livestock production... Notwithstanding
    the intuition from our results, it is important to note the following caveats.
    Our methodology does not account for adaptation... Given these two important caveats,
    our results should be seen as 'middle-of-the-road' estimates. Notwithstanding
    the caveats, our work is very informative and complements the growing literature
    that seeks to understand how climate change affects livestock production.
  4: 'Source material here: Our intention is not to quantitatively determine the individual
    contributions of each channel, rather we are employing a reduced-form framework
    to analyze the general pass-through effect of annual weather fluctuations on global
    livestock production. Climate change affects livestock directly by altering their
    reproduction processes, feed conversion ratio, and health via the emergence of
    new diseases (and the increase in the spread of existing ones). On the other hand,
    the indirect effects include climate impacts on the availability of water, the
    access to and quality of feed, as well as the likelihood of morbidity when disease
    does occur.'
