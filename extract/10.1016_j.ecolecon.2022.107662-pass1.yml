  10: "`\nEvaluation overview: \"This paper measures the impact of weather fluctuations\
    \ on global livestock production using panel data from 1961 to 2017.\"\n\nDrivers\
    \ of Risk: \"The main agent of predicted loss is future temperature and rainfall\
    \ changes in the tropical and temperate regions, respectively.\"\n\nQuantitative\
    \ material: \"The results show that, at the global level, a 1\xB0C increase in\
    \ temperature will lead to a 9.7% reduction in beef production on average... Poorer\
    \ countries would also experience a 27% reduction as opposed to 4% in countries\
    \ with higher income levels... an additional mm increase in annual precipitation\
    \ would lead to a 2.1% increase in production in tropical countries but a 1.9%\
    \ decrease in temperate ones... The projections indicate that the effects of climate\
    \ change by 2070 would range from 11% in temperate regions to 36% in tropical\
    \ areas.\"\n\nMethodology: \"This paper measures the impact of weather fluctuations\
    \ on global livestock production using panel data from 1961 to 2017... The entries\
    \ in the table are log changes from ACCESS-ESM1.5 for mid-term climate change\
    \ (Panel A) and long-run climate change (Panel B) under SSP3-7.0 scenario.\"\n\
    \nHighlights: \"An important message from this study is that climate change affects\
    \ livestock production and, consequently, food security... poor and agricultural-dependent\
    \ countries located in the tropics are severely affected by warming, notwithstanding\
    \ the positive effect of rainfall changes in such regions... climate change by\
    \ 2070 would range from 11% in temperate regions to 36% in tropical areas.\"\n\
    \nMore Notes: \"Some limitations to the study are as follow. The panel data method\
    \ do not account for inter-annual tradeoffs farmers make that may be affecting\
    \ the contemporaneous estimates presented in the paper.\"\n"
  11: "The maps represent aggregate (temperature + precipitation) impacts (as log\
    \ changes) from ACCESS-ESM1.5 for (a) mid-term climate change and (b) long-run\
    \ climate change under SSP3-7.0 scenario. Changes are relative to a 1981\u2013\
    2010 baseline. The panel data model does not account for adaptation to gradual\
    \ changes in climate. We expect farmers to take adaptive measures (such as migrating\
    \ animals to cool areas) in the face of climate change. Accounting for such adaptive\
    \ techniques using long differences method did not dampen the damage estimate\
    \ from our model. Although, we are careful to state that this absence of adaptation\
    \ should be considered with reference to our unit of observation, country-level.\
    \ There is tremendous heterogeneity in several channels through which climate\
    \ change affects animals productivity. It is practically difficult for any single\
    \ model to answer all the questions, prove all channels, or account for all uncertainties.\
    \ Therefore, this paper contributes to the climate econometrics and agricultural\
    \ economics literature that applies econometric techniques to understand the interaction\
    \ between weather factors and livestock production."
