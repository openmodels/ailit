  39: 'Source material

    Here we extended the modelling to a resolution of 30 arcseconds (hereafter, fine
    grids) to improve our approximation of biodiversity-dependent productivity. We
    obtained all records of trees and shrubs (hereafter, referred to as trees) from
    the Global Biodiversity Information Facility (doi.org/10.15468/dl.8u65om; as of
    July 22nd 2015), and then filtered out records with geographic location by referring
    to the database of Global Administrative Areas (www.gadm.org; as of August 3rd
    2015)3. To discard locations where species have been introduced, we excluded records
    from outside of their native ranges by referring to the Red List of Threatened
    Species (www.iucnredlist.org). For the present period, we obtained a dataset of
    19 bioclimatic variables, calculated from the monthly minimum temperature, maximum
    temperature, and precipitation at a resolution of fine grids downloaded from the
    WorldClim 1.4 (www.worldclim.org)5. Then, we obtained land-use variables at a
    resolution of fine grids from the MODIS (Moderate resolution Imaging Spectroradiometer)
    Land Cover Type for the year 2005 (glcf.umd.edu/data/lc). To avoid the effect
    of model inaccuracy from a small sample size, we limited our analysis to species
    that had 30 and more refined occurrence records4.

