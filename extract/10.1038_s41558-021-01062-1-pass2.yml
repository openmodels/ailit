  46: The analysis uses meta-analytical approaches, generalized additive models, and
    mixed models across SSP and GCM scenarios to assess biodiversity and productivity
    impacts of climate mitigation.
  47: "Summed up the reduction in productivity loss across all countries, under each\
    \ of SSPs and GCMs, using the equation global \u2211 (\u0394Pbaseline \u2013\u0394\
