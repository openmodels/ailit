sourcematerial:
  2: "  \n\"The global impacts of biodiversity loss and climate change are interlinked\
    \ but the feedbacks between them are rarely assessed. Areas with greater tree\
    \ diversity tend to be more productive, providing a greater carbon sink, and biodiversity\
    \ loss could reduce these natural C sinks. Here, we quantify how tree and shrub\
    \ species richness could affect biomass production at biome, national and regional\
    \ scales.\" \n\n\"We find that greenhouse gas mitigation could help maintain tree\
    \ diversity and thereby avoid a 9-39% reduction in terrestrial primary productivity\
    \ across differ biomes, which cold otherwise occur over the next 50 years.\"\n\
    \n\"Countries that will incur the greatest economic damages from climate change\
    \ stand to benefit the most from conservation of tree diversity and primary productivity,\
    \ which contributes to climate change mitigation. Our results emphasize an opportunity\
    \ for a triple win for climate, biodiversity and society...\"\n"
  4: Climate change mitigation is estimated to curtail productivity losses by approximately
    9-39% compared to the baseline scenario of unabated warming (Fig. 3). Overall,
    climate change mitigation efforts conserve the diversity of woody plant species
    and primary productivity, which contributes to carbon storage in terrestrial ecosystems.
    The alleviated loss of tree diversity and the resultant conservation of biodiversity-dependent
    productivity are especially substantial in colder and drier biomes compared to
    warmer and wetter biomes, likely because species in these biomes are often close
    to the edge of their climatic niche...This heterogeneity in the responses among
    regions is partly due to variation in the extent to which biodiversity is conserved
    when climate change is mitigated (Fig. 2; Extended Data Figs. 1-3). Further, warming
    could alter the strength of the diversity-productivity relationship, though this
    has not yet been well-studied in forests.
  5: 'Source material here.

    Evaluation overview: "Here, we obtained the absolute country-wide estimate of
    reductions in productivity loss due to climate mitigation efforts."

    Drivers of Risk: "countries with a high country-level social cost of carbon, which
    have the greatest incentive to mitigate climate change to avoid its economic damages,
    also tend to be the countries where climate change mitigation could greatly help
    maintain primary productivity by safeguarding tree diversity ..."

    Quantitative material: "We estimate that the possible conservation of biodiversity-dependent
    annual productivity by means of climate change mitigation corresponds to approximately
    4.9-6.7% of the present total NPP in the terrestrial areas analysed ..."

    Methodology: "we aggregated the regional heterogeneity into country-level estimates
    and considered how tree diversity effects on productivity at the country-level
    relate to the economic value of avoiding carbon emissions ... We compared these
