  48: The analysis uses MaxEnt models for predicting species distribution probability
    based on climate and land-use predictors, with data extending to 2015 and climate
    data averaged over 1960-1990.
  49: Species distribution models were created using MaxEnt v3.3, based on species
    occurrence records from GBIF (as of July 22nd 2015). Models used a bias background
