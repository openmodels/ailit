  42: " \nused models with CBI > 0 based on the 95 % confidence interval for the subsequent\
    \ analyses. To obtain a map of suitable habitat for each species under the current\
    \ conditions, the average value of the relative probability of occurrence calculated\
    \ by the 10-fold cross-validation was converted into a binary map. We applied\
    \ the average of the 90 % sensitivity threshold to minimize the false-negative\
    \ fractions and to avoid underestimating the suitable habitat area21. For the\
    \ future scenarios, a species\u2019 ability to disperse and track the shifting\
    \ climate, a crucial determinant of future potential for range shifts22,23, was\
    \ explicitly considered1. Because dispersal ability is strongly related to life-history\
    \ traits23, we collected information on life-history traits for all target species\
    \ and estimated dispersal distance for each species by the 2070s. Here dispersal\
    \ distance per generation was estimated from the formula based on an earlier work23;\
    \ we adopted \u2018group 5\u2019 formula in dispeRsal function, which requires\
    \ species-specific data for dispersal syndrome and growth form. For dispersal\
    \ syndrome, we compiled the database from various sources (details are found in\
    \ the Source Data of the earlier study1). For growth form, we obtained the data\
    \ from a database of The IUCN Red List of Threatened Species (www.iucnredlist.org).\
    \ Generation length was estimated according to growth form24. Based on the above\
    \ estimates, we obtained habitat maps for individual species. The possible changes\
    \ in areas hospitable to species under different future scenarios are described\
    \ in the earlier work1: briefly, the losses of suitable habitats due to the combined\
    \ effects of climate and land-use were estimated to be smaller in the mitigation\
    \ scenario than in the baseline scenario (e.g., approximately 17-28% and 22-36%\
    \ for the mitigation and baseline scenario, respectively, across a wide range\
    \ of organism groups). Species richness and productivity estimation For the calculations\
    \ below, we have mainly relied on \u201Cvegan\u201D25, \u201Cmobsim\"26, and \u201C\
    xgboost\u201D27 package of the R software28. We projected spatial distributions\
    \ of individual species for the year 2005 and 2070s at the spatial resolution\
    \ of 30 arcminutes (coarse grids; n = 32,670). For both periods, we obtained the\
    \ total number of species present in each coarse grid (hereafter, \u03B3-diversity).\
    \ For the former year, we also projected spatial distributions of individual species\
    \ at the spatial resolution of 30 arcseconds (fine grids; n = 115,426,714). Based\
    \ on these projections, we calculated changes in species richness at the scale\
    \ of fine grids (hereafter, \u03B1-diversity) from 2005 to 2070s for different\
    \ scenarios of climate and land-use changes. The reason why we conducted this\
    \ downscaling was that there could be a potential mismatch due to scaling issues29,30.\
    \ That is, changes in \u03B3-diversity are not universally proportional to those\
    \ in \u03B1-diversity across different coarse grains. Furthermore, we relied on\
    \ the values of the elasticity of substitution (\u03B8) of a previous study31.\
    \ Although assumed to be scale- independent, these estimates were developed based\
    \ on the forest inventory dataset collected at the local spatial scale. We thus\
    \ aimed to estimate the changes in productivity at this fine-scale. Here, we first\
    \ obtained species-area and endemics-area relationships (SARs and EARs, respectively)\
    \ for the year 2005 that were unique to each of the coarse grids; 50 sub-grids\
    \ were randomly chosen with 1 % intervals between the scales of the fine and coarse\
    \ grid to construct the curves26. If all fine grids were\n"
  43: "Source material justification:\nTo realize this, we first implemented two spatially\
    \ explicit simulations for species co-extinction and co-immigration. In an artificial\
    \ landscape with 3,600 homogeneous grids... we randomly draw between 5 and 80\
    \ species with total occurrence between 500 and 180,000 individuals, based on\
    \ a lognormal species abundance distribution (SAD) with randomly assigned parameters\
    \ \u03BC and \u03C3 of SADs reported in different biomes34-36. Here we defined\
    \ common species as abundant species that had an abundance rank of 25 % or below;\
    \ that is, in each simulation run, we randomly assigned species with the dominance\
    \ rank between 1 and the upper quartile as common species. For co-extinction simulation,\
    \ we randomly made some of (up to half of) these common species extinct from a\
    \ meta-community. ... For co-immigration simulation, we assumed that an artificial\
    \ meta-community resulted from additional immigration of both common and rare\
    \ species. We again randomly assigned some of (up to half) the species as common\
    \ and removed them from the meta-community to construct a pre-immigration... Other\
    \ rare species that were present in the same grid with these extinct common species\
    \ were also forced to extinction, assuming that these grids became no longer habitable\
    \ for any species because of possible climate and land-use change.\n"
  44: "Evaluation overview: We regressed the potential number of subordinate species\
    \ co-extinct and co-immigrated. These regressions allowed us to predict potential\
    \ \u03B3-diversity for the period of 2070s in each of the coarse grids. When we\
    \ observed extinctions of some species for the 2070s in a given coarse grid, we\
    \ converted this total number of species lost into a proportion of habitats that\
    \ was required for losing these species based on the unique EAR40.\n\nDrivers\
    \ of Risk: By comparing the number of widespread common species in each coarse\
    \ grid between the year of 2005 and 2070s, we obtained the number of common species\
    \ extinct or immigrated.\n\nQuantitative material: Overall, the regressions for\
    \ predicting the number of species co-extinct/co-immigrated showed reasonable\
    \ goodness of fit (R2 = 0.802 and 0.593 for species co-extinction and co-immigration,\
    \ respectively).\n\nMethodology: We repeated the above co-extinction and co-immigration\
    \ simulations 25,000 times, respectively. From that, we had an estimate of how\
    \ many rare species could be co-extinct or co-immigrated with common species in\
    \ these simulated meta-communities. Then we used a method of extreme gradient\
    \ boosting (XGBoost)27 to obtain machine learning regressions for predicting the\
    \ number of species co-extinct and co-immigrated based on other information described\
    \ above ... We assigned 5,000 and 20,000 results of the simulation runs for evaluation\
    \ and training, respectively.\n"
  45: "yaml\nEvaluation overview: \"parameters of the elasticity of substitution (\u03B8\
    ), which were estimated for forest biomes worldwide with a spatial resolution\
    \ of the coarse grids31; the elasticity of substitution can be used to estimate\
    \ forest productivity based on proportional changes in species richness of tree\
    \ species (i.e., \u03B1-diversity).\"\nDrivers of Risk: \"Based on these estimations,\
    \ we have obtained absolute changes in forest productivity (kg C m-2 yr-1) for\
    \ different scenarios of climate/land-use changes at the scale of fine grids.\"\
    \nQuantitative material: \"The \u03B8 values were estimated across the forested\
    \ biomes worldwide31, ranging between 0.198 and 0.299; a global mean was estimated\
    \ as 0.26 with a standard deviation of 0.09... In the terrestrial biomes analysed\
    \ here, the total NPP was approximately 43.78 Pg C yr-1.\"\nMethodology: \"We\
    \ used a net primary productivity (NPP) dataset estimated using the MODIS imagery43\
    \ for the year 2005... Here we assumed that all fine grids in a given coarse grid\
    \ showed the equivalent changes in productivity in a proportional scale, reflecting\
    \ the mean change in \u03B1-diversity expected to occur in that coarse grid...\
    \ Within the forested areas analysed in the previous study31, we summarized our\
    \ results at different spatial scales from local to the globe.\"\nHighlights:\
    \ \"Based on these estimations, we have obtained absolute changes in forest productivity\
    \ (kg C m-2 yr-1) for different scenarios of climate/land-use changes at the scale\
    \ of fine grids.\"\n"
  46: "yaml\nEvaluation overview: \"To quantify the effect sizes of mitigation efforts\
    \ on conservation of species and productivity, we calculated the reductions in\
    \ local-scale loss of species (\u0394SR) and productivity (\u0394P) as a log ratio\
    \ scale...\"\nQuantitative material: \"We used \u201CARPobservation\u201D47 package\
    \ of the R software28 to obtain log- response ratios and the associated 95% confidence\
    \ intervals for each of the combinations of SSP scenarios and GCMs.\"\nMethodology:\
    \ \"To ensemble results across the three GCMs, we adopted a meta-analytical approach;\
    \ we used \u201Cmetafor\u201D48 package to obtain global means and the associated\
    \ 95% confidence intervals for each SSP scenario...For each of the individual\
    \ combinations of SSPs and GCMs, we relied on a generalized additive model (GAM)\
    \ with the CSCC as an explanatory variable...To ensemble results across the GCMs,\
    \ we used a generalized additive mixed model (GAMM) with the GCMs as a random\
    \ effect and the CSCC as an explanatory variable.\"\nHighlights: \"To facilitate\
    \ interpretation, we multiplied -1 with the effect sizes and thereby positive\
    \ and negative values, respectively, indicate more and less effectiveness of climate\
    \ mitigation policy in reducing species loss and the associated productivity loss\"\
    \n"
  47: "Source material here.\nresults were affected by land area, using the GAMMs.\n\
    Lastly, we summed up the reduction in productivity loss across all countries,\
    \ under each of SSPs and GCMs. This gave us the estimate of global productivity\
    \ conservation, corresponding to the value, global \u2211 (\u0394Pbaseline \u2013\
    \u0394Pmitigation) (Fig. 6d). Caution is necessary to interpret the results. For\
    \ instance, although the values of global productivity conservation were similar\
    \ between SSP1 and SSP3 (Fig. 6d), these SSPs are based on contrasting assumptions\
    \ including those about deforestation and reforestation/afforestation10,13,14.\
    \ While substantial reforestation is expected in the SSP1 mitigation scenario,\
    \ the expansion of bioenergy crops at the expense of forest area is assumed to\
    \ occur in the SSP3 mitigation scenario. Also, little and large shrink of forest\
    \ areas is expected for the SSP1 and SSP3 baseline scenario, respectively. Likely\
    \ reflecting these contrasts, global \u0394Pbaseline and \u0394Pmitigation were\
    \ both relatively small (SSP1) and both relatively large (SSP3), resulting in\
    \ similar values of productivity conservation. Likewise, our estimations were\
    \ primarily based on a comparison between the baseline and mitigation scenarios.\n\
    Data availability The source data underlying figures (Supplementary Data 1-6)\
    \ are archived in the Dryad repository: https://doi.org/10.5061/dryad.vq83bk3s2.\n"
  48: 'Source material: "Objective: Transfer/Forecast; Target outputs: Map of potential
    suitable habitat; Taxon: Woody vascular plant species. Type of predictors: Climatic,
    land-use; Hypotheses: We used climate (annual trends, seasonality, and extreme
    or limiting factors) and land-use as important environmental predictor variables
    for tree and shrub species on the global scale. SDM algorithms: Algorithms: We
    fitted MaxEnt15 to occurrence data... Temporal extent/time period: Occurrence
    data extended to 2015. Climate data was based on the average of 1960-1990. Land
    use data was based on 2005."'
  49: Source material here.
  50: " \n\"Climate: We used 19 climatic variables from the WorldClim 1.4... Land-use:\
    \ [Fine-scale]: MODIS Land Cover Type for the year of 2005... Proportion of each\
    \ of the five land-use types (cropland, pasture, forest, other natural lands,\
    \ and settled land) based on AIM/PLUM output for 2005\" \n\n\"The model performance\
    \ was assessed using 10-fold cross-validation.\"\n\n\"For fine-scale, downloaded\
    \ 30 arcsecond data was used directly... For coarse-scale, a dataset was averaged\
    \ to a resolution of 30 arcminutes... applicable for the year 2005\"\n\n\"The\
    \ dataset at a resolution of 30 arcseconds was averaged to values at a resolution\
    \ of 30 arcminutes.\"\n"
  51: "  \nData processing: Climatic data for coarse-scale were calculated by using\
    \ the \u201Caggregate\u201D function [raster R package50] and \u201Cbiovars\u201D\
    \ function [dismo R package51]. Models and scenarios, and data sources: Climate:\
    \ We used climatic variables based on five of the General Circulation Models (GCMs)\
    \ included in the Fifth Coupled Model Inter-Comparison Project (CMIP5) experiment:\
    \ GFDL-CM39, HadGEM2-ES7, and MIROC-ESM-CHEM6, downloaded from the WorldClim.\
    \ Land-use: Changes in land use under the mitigation and baseline scenarios were\
    \ estimated by the AIM/CGE, a computable general equilibrium model representing\
    \ the entire global economy. The SSPs are based on five narratives describing\
    \ how socioeconomic factors may change over the next century, considering changes\
    \ in population, GDP, energy, emissions, and land use. These narratives are designed\
    \ to span a range of futures in terms of the degree of difficulty for mitigation\
    \ and adaptation to climate change.\n"
  52: "Source material: First, by using the five land-use and 19 bioclimatic variables,\
    \ we generated all the possible combinations (224\u2009=\u200916,777,216) of these\
    \ variables. We then excluded explanatory variables showing collinearity: (1)\
    \ we excluded the set of explanatory variables that include pairs of highly correlated\
    \ variables (Pearson\u2019s product moment correlation coefficient\u2009\u2265\
    \u2009|0.70|), and (2) we excluded those explanatory variables for which the variance\
    \ inflation factor value, which indicates the degree of collinearity between two\
    \ or more predictor variables, was \u2265 5. Temporal extent/time period: 2050s\
    \ and 2070s. For climatic data, we used the average of 2041-2060 for the 2050s\
    \ and the average of 2061-2080 for 2070s. Model settings: We conducted parameter\
    \ tuning for regularization parameters as we described in the \u201CModel workflow\u201D\
    \ section...Model settings for extrapolation: Predictions bounded by clamping\
    \ in MaxEnt. We calculated the mean probability of occurrence from 10 replicates.\
    \ We used the continuous Boyce index (CBI)20 calculated on 10-fold cross-validation,\
    \ to evaluate model quality for predictions based on presence-only data."
  53: "Source material: \"The probability of occurrence was converted into the binary\
    \ map by using the threshold (see section Threshold selection), then we calculated\
    \ the area of potentially suitable habitat. For each species, we discarded projected\
    \ suitable habitats if (1) they were beyond the current native regions recorded\
    \ in the IUCN species database, or (2) if they are on a landmass that has not\
    \ been connected to other landmasses with occurrence points since the last glacial\
    \ maximum period. To identify potential future habitats constrained by dispersal\
    \ distance, the estimated dispersal distance for each species was buffered. Dispersal\
    \ distance per generation was estimated from the formula based on Tamme, et al.\
    \ 23. We adopted the group 5 formula in the \u201CdispeRsal()\u201D function,\
    \ which requires species-specific data for the dispersal syndrome and growth form.\""
  55: "`\nSSP1 Sustainability \u2013 Taking the Green Road (Low challenges to mitigation\
    \ and adaptation): The world shifts gradually, but pervasively, toward a more\
    \ sustainable path, emphasizing more inclusive development that respects perceived\
    \ environmental boundaries. Management of the global commons slowly improves,\
    \ educational and health investments accelerate the demographic transition, and\
    \ the emphasis on economic growth shifts toward a broader emphasis on human well-being.\
    \ Driven by an increasing commitment to achieving development goals, inequality\
    \ is reduced both across and within countries. Consumption is oriented toward\
    \ low material growth and lower resource and energy intensity.\n\nSSP2 Middle\
    \ of the Road (Medium challenges to mitigation and adaptation): The world follows\
    \ a path in which social, economic, and technological trends do not shift markedly\
    \ from historical patterns. Development and income growth proceeds unevenly, with\
    \ some countries making relatively good progress while others fall short of expectations.\
    \ Global and national institutions work toward but make slow progress in achieving\
    \ sustainable development goals. Environmental systems experience degradation,\
    \ although there are some improvements and overall, the intensity of resource\
    \ and energy use declines. Global population growth is moderate and levels off\
    \ in the second half of the century. Income inequality persists or improves only\
    \ slowly and challenges to reducing vulnerability to societal and environmental\
    \ changes remain.\n\nSSP3 Regional Rivalry \u2013 A Rocky Road (High challenges\
    \ to mitigation and adaptation): A resurgent nationalism, concerns about competitiveness\
    \ and security, and regional conflicts push countries to increasingly focus on\
    \ domestic or, at most, regional issues. Policies shift over time to become increasingly\
    \ oriented toward national and regional security issues. Countries focus on achieving\
    \ energy and food security goals within their own regions at the expense of broader-based\
    \ development. Investments in education and technological development decline.\
    \ Economic development is slow, consumption is material-intensive, and inequalities\
    \ persist or worsen over time. Population growth is low in industrialized and\
    \ high in developing countries. A low international priority for addressing environmental\
    \ concerns leads to strong environmental degradation in some regions.\n\nSSP4\
    \ Inequality \u2013 A Road Divided (Low challenges to mitigation, high challenges\
    \ to adaptation): Highly unequal investments in human capital, combined with increasing\
    \ disparities in economic opportunity and political power, lead to increasing\
    \ inequalities and stratification both across and within countries. Over time,\
    \ a gap widens between an internationally connected society that contributes to\
    \ knowledge- and capital-intensive sectors of the global economy, and a fragmented\
    \ collection of lower-income, poorly educated societies that work in a labor intensive,\
    \ low-tech economy. Social cohesion degrades and conflict and unrest become increasingly\
    \ common. Technology development is high in the high-tech economy and sectors.\
    \ The globally connected energy sector diversifies, with investments in both carbon-intensive\
    \ fuels like coal\n"
  56: "Source material here.\nSSP5 Fossil-fueled Development \u2013 Taking the Highway\
    \ (High challenges to mitigation, low challenges to adaptation): This world places\
    \ increasing faith in competitive markets, innovation and participatory societies\
    \ to produce rapid technological progress and development of human capital as\
    \ the path to sustainable development. Global markets are increasingly integrated.\
    \ There are also strong investments in health, education, and institutions to\
    \ enhance human and social capital. At the same time, the push for economic and\
    \ social development is coupled with the exploitation of abundant fossil fuel\
    \ resources and the adoption of resource and energy intensive lifestyles around\
    \ the world. All these factors lead to rapid growth of the global economy, while\
    \ global population peaks and declines in the 21st century. Local environmental\
    \ problems like air pollution are successfully managed. There is faith in the\
    \ ability to effectively manage social and ecological systems, including by geo-engineering\
    \ if necessary.\n"
  57: 'Source material: The image contains two main sections, both showing world maps
    with data projections related to biodiversity and productivity changes by the
    year 2070. The map shows color-coded regions indicating changes in species richness.
    It describes two simulations conducted in 25,000 artificial landscapes. The simulations
    focus on species co-extinction and co-immigration. Beneath the maps, there is
    an explanation stating that the procedures were repeated for two representative
    concentration pathways (baseline and mitigation scenario) across five shared socioeconomic
    pathways (SSPs) in three global climate models (GCMs). The map projections display
    changes in species richness and productivity levels by the year 2070.'
  58: 'Source material: Supplementary Figure 1. Overall workflow to estimate changes
    in species richness and productivity by 2070s.'
