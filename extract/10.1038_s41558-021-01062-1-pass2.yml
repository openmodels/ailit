  41: 'Source material here.

    "We employed MaxEnt v3.315, a modelling approach that works well for cases in
    which only presence data are available and absence data are difficult to collect."

    "To incorporate sampling bias into MaxEnt, we took the bias background approach,
    which uses the prior information on the spatial distribution of survey effort
    to preselect background locations before running MaxEnt."

    "First, by using the five land-use and 19 bioclimatic variables, we generated
    all possible combinations of these explanatory variables. We then excluded explanatory
    variables showing collinearity. We selected the most parsimonious combination
    of explanatory variables based on the corrected Akaike information criterion (AICc)."

    "MaxEnt is capable of building complex nonlinear functions of explanatory variables
    by combining simple mathematical transformations of explanatory variables, or
    so-called features; it selects the features for each explanatory variable that
    contribute most to model fit using regularization."

    "We tested 31 regularization coefficients (from 0 to 15 at increments of 0.5)
    and chose the one for each species that maximized model fit under the given combination
    of explanatory variables selected, based on AICc."

    "We assessed model performance using the continuous Boyce index (CBI), which is
    used to evaluate model quality for predictions based on presence-only data."

    "Bioenergy crops and afforestation were merged into cropland and forests, respectively,
    as described in the previous work."

