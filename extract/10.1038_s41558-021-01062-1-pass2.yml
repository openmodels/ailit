  62: "\nSupplementary Figure 5. Maps showing the projected changes in tree diversity\
    \ under the baseline scenarios from 2005 to 2070s. Results are based on means\
    \ (left column) and standard errors (right column) of proportional changes (%)\
    \ in \u03B1-diversity (remaining species richness estimated at the fine grid-scale)\
    \ within each of the coarse grids from 2005 to 2070s, calculated across the three\
    \ General Circulation Models (GCMs) (n = 32,670 grids). Results are shown for\
    \ the five Shared Socioeconomic Pathways (SSPs). Results of individual GCMs are\
    \ shown in Extended Data Figure 2.\n"
