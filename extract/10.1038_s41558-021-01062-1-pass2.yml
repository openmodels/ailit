Methodology:
  2: The study quantifies how tree and shrub species richness affects biomass production
    at biome, national, and regional scales, projecting potential productivity losses
    over the next 50 years.
  5: The analysis aggregated regional heterogeneity into country-level estimates and
    related tree diversity effects on productivity to the economic value of avoiding
    carbon emissions. It compares these estimates with the country-level social cost
    of carbon.
  6: Models spatial distributions of tree species, but acknowledges limitations due
    to poorly described species and focuses on well-documented species.
  12: The page uses a schematic diagram and comparative diagrams to illustrate feedback
    loops between climate change, biodiversity, and carbon sequestration, projecting
    trends to the year 2100 under baseline and mitigation scenarios.
  13: "The analysis uses projections based on five SSPs and ensembles of three GCMs\
    \ to calculate mean \u03B1-diversity change across 32,670 coarse grids from 2005\
    \ to the 2070s."
  14: Effect sizes of productivity loss due to tree diversity were calculated at a
    local scale using ~115 million grids in 14 biomes, across five SSPs and three
    GCMs.
  15: The analysis sums biome-level effects of climate change mitigation on productivity
    loss from 2005 to 2070s across three GCMs for five SSPs.
  16: The analysis calculates local effect sizes of climate change mitigation across
    ~115 million grid cells, using various SSPs and GCMs, over the timeframe from
    2005 to the 2070s.
  17: Analysis uses a generalized additive mixed model to assess relationships with
    confidence intervals across different SSPs and GCMs.
  18: Bioclimatic variables for both present and future are calculated from monthly
    temperature and precipitation metrics, using data from WorldClim and land-use
    data from MODIS.
  19: Utilizes cross-validation and Boyce index for model performance evaluation.
  20: Projected spatial distributions of species at coarse and fine grid resolutions;
    used species-area relationships to calculate diversity changes.
  21: The analysis uses extreme gradient boosting for machine learning regressions,
    species distribution modeling, unique SARs and EARs, and MODIS imagery to estimate
    changes in species richness and forest productivity.
  22: The analysis uses net primary productivity values based on fine grid calculations,
    mixed-effects meta-regression to analyze biome-level effects, and a relationship
    calculation between country-level social cost of carbon and forest productivity
    loss under each SSP scenario.
  23: The analysis used a generalized additive model (GAM) and generalized additive
    mixed model (GAMM) with random effects to evaluate productivity conservation.
  27: Analysis involves the use of Shared Socioeconomic Pathways (SSPs) and General
    Circulation Models (GCMs) to project changes.
  28: Biome area changes are projected under different climate models. Species loss
    mitigation effectiveness is calculated based on socio-economic pathways relative
    to a baseline.
  29: Effect sizes are shown on a log ratio scale with corresponding confidence intervals
    for five Shared Socioeconomic Pathways and three General Circulation Models.
  30: The analysis involves projections at a local scale using multiple grids and
    evaluates five Shared Socioeconomic Pathways across three General Circulation
    Models.
  32: The analysis considers five Shared Socioeconomic Pathways (SSPs) and three General
    Circulation Models (GCMs) to evaluate reductions in productivity loss.
  33: The analysis estimates effect sizes at a local scale using about 115 million
    grid points per scenario, with results shown for five Shared Socioeconomic Pathways
    (SSPs) and three General Circulation Models (GCMs).
  34: "The analysis uses a generalized additive mixed model to estimate the relationships\
    \ between CSCC and \u0394P. Results are shown for five SSPs and three GCMs."
  35: Analysis is performed using different SSP scenarios and GCM models, with results
    applicable under these diverse future socioeconomic and climate conditions.
  39: Species distribution modeling was limited to species with 30 or more occurrence
    records to avoid inaccuracies from small sample sizes.
  40: The study employs the Shared Socioeconomic Pathways (SSPs) framework for projecting
    future land-use variables.
  41: Model performance assessed using the continuous Boyce index with a range between
    -1 and 1, using 10-fold cross-validation.
  42: "Projects spatial distributions of individual species for the years 2005 and\
    \ 2070s at spatial resolutions of 30 arcminutes (coarse grids) and 30 arcseconds\
    \ (fine grids).  Calculates changes in species richness at the scale of fine grids\
    \ (\u03B1-diversity) from 2005 to 2070s for different scenarios of climate and\
    \ land-use changes. Obtains species-area and endemics-area relationships (SARs\
    \ and EARs, respectively) for the year 2005 that were unique to each of the coarse\
