Highlights:
  2: Conservation of tree diversity can contribute to climate change mitigation and
    could lead to a triple win for climate, biodiversity, and society; countries that
    will incur the greatest economic damages from climate change stand to benefit
    the most from conservation of tree diversity and primary productivity.
  4: The effectiveness of mitigation efforts is spatially heterogeneous, with differing
    responses among biomes due to variability in biodiversity conservation.
  5: Countries with a high social cost of carbon tend to be the countries where climate
    change mitigation could greatly help maintain primary productivity by safeguarding
    tree diversity. The US and China have a great responsibility and opportunity to
    mitigate emissions by maintaining tree diversity. Brazil has the largest potential
    to benefit from climate mitigation efforts.
  6: Diverse forests are valuable for climate stabilization, and a dual focus on the
    quantity and quality (biodiversity) of forests is needed.
  8: "Protecting and leveraging ecosystem benefits contributed by the biodiversity\
    \ of the world\u2019s forests can create a triple win for climate, nature, and\
    \ society."
  12: The conservation and restoration of tree diversity could enhance a positive
