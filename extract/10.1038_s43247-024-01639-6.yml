Drivers of Risk:
  1: The increased risk of dengue transmission is driven by changes in climate, particularly
    temperature and humidity, along with urbanization and population growth.
  2: Climate-dependent variables, specifically temperature and humidity, are drivers
    of dengue transmission risk.
  3: Changes in temperature and relative humidity are assessed as drivers impacting
    dengue virus transmission suitability.
  4: Climate changes are impacting the suitability of regions for dengue virus transmission.
  5: Changes in climate suitability for Dengue virus (DENV) transmission, defined
    using climate suitability thresholds.
  6: Increased climate suitability for dengue virus transmission, largely due to shifts
    in temperature and relative humidity affecting mosquito-viral traits.
  7: The increase in the global population living in areas with high climate suitability
    for DENV transmission emphasizes the impact of population growth and urbanization
    in high-risk regions, particularly the Global South.
  9: Changes in climate and population impact the population living in areas suitable
    for dengue virus transmission.
Evaluation overview:
  1: The paper evaluates the increased population at risk of dengue virus transmission
    due to climate factors and population growth.
  2: Dengue virus transmission potential is evaluated.
  3: The study evaluates climate suitability changes for dengue virus transmission
    using Index P, a mechanistic measure based on temperature and relative humidity.
  4: "This page evaluates changes in land area and population with high climate suitability\
    \ for dengue virus transmission between 1979\u20131983 and 2018\u20132022."
  5: Dengue incidence and the proportion of the global population living in areas
    with high climate suitability for dengue transmission.
Highlights:
  1: The study finds an expansion of climate suitability for dengue in North America,
    East Asia, and the Mediterranean basin.
  2: Climate imposes major constraints in mosquito survival and viral propagation,
    and mechanistic models can define the geographical limits of transmission across
    both endemic and emerging areas. Models can capture intra-annual fluctuations
    in transmission potential.
  3: The study identifies significant regional changes in dengue transmission suitability,
    with changes in the distribution and extent of suitable areas for transmission
    across different regions.
  4: There is an increase in both land area and population with high climate suitability
    for dengue virus transmission, with notable expansion in tropical and subtropical
    regions.
  5: A significant increase in the proportion of the global population living in areas
    with high climate suitability for dengue transmission, primarily driven by changes
    in Africa and Asia. Population growth is responsible for a larger increase in
    the population living in high-risk areas than climate change alone, except in
    the Global North.
  6: Significant increase in climate suitability occurred globally for DENV transmission,
    with highest changes seen in high and very high-density areas and temperate climate
    zones experiencing the largest net change.
  7: There is a substantial increase in the global population living in areas with
    high climate suitability for DENV transmission, with significant differences in
    the driving processes between the Global South and Global North.
Methodology:
  2: Mechanistic and statistical (species distribution modeling) approaches are used
    to estimate dengue transmission potential based on climate variables. Mechanistic
    models quantify transmission potential, while statistical models estimate associations
    between climate variables and dengue/vector observations. Figure 1 shows average
    climate suitability between 1979 and 2022.
  3: Analysis uses Index P based on temperature and humidity data, evaluates trends
    from 1979 to 2022, and displays results using spatiotemporal maps.
  5: "The study examines changes in climate suitability for DENV transmission from\
    \ 1979 to 2022. It defines past climate suitability as the average from 1979 to\
    \ 1983 and present climate suitability as the average from 2018 to 2022. Long-term\
    \ trends in climate suitability are quantified using a seasonal Mann\u2013Kendall\
    \ test."
  6: Climate suitability measure incorporates effects of temperature and relative
    humidity on mosquito-viral traits, focusing on shifts from 1979-1983 to 2017-2022
    across various population densities, income groups, and climate zones.
  7: The study examines changes in climate suitability for DENV transmission from
    1979 to 2022, focusing on how these have been mediated by observed climate conditions
    and population changes.
  8: "The analysis uses demographic, economic, and climate zone categorizations to\
    \ contextualize data, with specific datasets obtained for population counts and\
    \ density, income groups categorized by World Bank criteria, and climate zones\
    \ by the K\xF6ppen\u2013Geiger system."
  9: The study uses Tobit models to estimate relationships between climate suitability
    (Index P) and DENV transmission, with a meta-analysis performed for country-level
    estimates. Long-term trends are assessed using a seasonal Mann-Kendall test, and
    autocorrelation is handled using a pre-whitening algorithm.
More Notes:
  2: The paper compares climate suitability and dengue incidence across municipalities/provinces/cantons
    in Brazil, Colombia, Costa Rica, Taiwan, Thailand, and Vietnam.
  5: The study also considers the independent contributions of climate change and
    population growth to the observed increase, finding that population growth has
    disproportionately occurred in areas with historically high climate suitability.
    They observed increases in climate suitability in the southern United States,
    northeastern Brazil, western and southern Africa, the Indian subcontinent, Southeast
    Asia, and coastal areas of continental Europe. Decreases in climate suitability
    were observed in northern Australia, parts of South America, and the northeast
    of Africa.
Quantitative material:
  1: The paper estimates a global increase of approximately 2.5 billion people living
    in areas with high climate suitability for dengue transmission from 1979 to 2022.
  2: Climate suitability is presented on the Index P scale, and yearly incidence is
    measured in cases per 100,000 population.
  3: "Maps depict quantitative changes in climate suitability for dengue transmission\
    \ globally from 1979\u20132022, using a color scale indicating increases or decreases."
  4: The analysis provides estimates of changes in land area and population affected
    by high climate suitability for dengue transmission, along with credible intervals.
  5: "The proportion of the global population living in high-risk areas increased\
    \ from 48.8% to 60.0% (\u0394 = 10.8 pp, 90% CI = 10.0\u201311.8) from 1979\u2013\
    1983 to 2018\u20132022, resulting in 2.5 billion more people living in areas with\
    \ high climate suitability for dengue transmission."
  6: Change in high suitability areas for dengue virus transmission increased by 7.7
    percentage points in high density areas and 15.5 percentage points in very high
    density areas globally; temperate climate zones saw an increase from 25.2% to
    30.5%.
  7: "Approximately 70% of the populations in Africa and Asia are currently living\
    \ in areas with a high risk of infection\u2014a roughly 15% increase relative\
    \ to four decades earlier."
  9: The analysis estimates the population changes in areas of high dengue transmission
    suitability between 1980 and 2020.
