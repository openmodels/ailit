  15: " \n\"many of the hazards considered can be put in a direct, strong relationship\
    \ with global temperature changes. This is the case for patterns of regional warming\
    \ and mean precipitation change, sea surface temperature warming, snow cover,\
    \ permafrost thawing, ... like heat extremes, tropical cyclone intensity, marine\
    \ heatwaves, droughts and fire weather, storm surges as results of winds and sea\
    \ level rise combined.\" \n\n\"We have adopted here a global perspective on changing\
    \ climatic impact-drivers to serve a synthetic assessment based on global warming\
    \ levels rather than particular scenarios of emissions\"\n\n\"In this regard,\
    \ the message that every increment of global warming matters ... is further substantiated\
    \ and reinforced by this work.\"\n\n\"climate risk is not a matter of changing\
    \ climatic impact-drivers (CIDs) only, but of the confrontation between changing\
    \ CIDs and changing socio-ecological conditions.\"\n"
