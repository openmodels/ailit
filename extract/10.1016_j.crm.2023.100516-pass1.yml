  13: "Sea ice: Arctic sea ice extent is already showing a decrease, in every month,\
    \ since 1970... A linear relation can be drawn between Arctic sea ice minimum\
    \ extent and GSAT warming, but there remain large uncertainties in the rate due\
    \ to internal variability and model differences (Fox-Kemper et al., 2021). ...\
    \ Glacier mass: Since 1850, glaciers are retreating and the current global mass\
    \ loss is unprecedented... Additional warming of 1.5 \u25E6C\u2013 2 \u25E6C would\
    \ allow only 50\u2013 60 % of glacier mass to remain... (Fox-Kemper et al., 2021;\
    \ Ranasinghe et al., 2021) (see Fig. 2b). ... SLR depends on global warming in\
    \ a complex way... until mid-century, SLR does not show a strong dependence on\
    \ scenarios, and will likely (that is, with at least 66 % probability) be between\
    \ 0.15 and 0.30 m. By 2100 the outcome will depend on the scenario more strongly,\
    \ with a rise of 0.44 m (0.34\u2013 0.59) for a GWL of 1.5 \u25E6C; 0.51 m (0.40\u2013\
    \ 0.69) for a GWL of 2 \u25E6C; ... Marine heatwaves... they are projected to\
    \ become 2-to-9 times more frequent under SSP1-2.6 (whose corresponding central\
    \ GWL at that time is close to 2 \u25E6C) and between 3 and 15 times more frequent\
    \ under SSP5-8.5 (whose corresponding central GWL at that time is close to 5 \u25E6\
    C) (Fox-Kemper et al., 2021; Ranasinghe et al., 2021) (see Fig. 2c, where we represent\
    \ these ranges of change corresponding to 2 \u25E6C and 5 \u25E6C). ... Ocean\
    \ acidification: If not related to warming per se, ocean acidification is a direct\
    \ consequence of increasing CO2 concentrations... Surface pH is currently at its\
    \ lowest (most acidic) level over at least the last 26,000 years, as a consequence\
    \ of a decline in the last 40 years at the rate of 0.017\u2013 0.027 pH units\
    \ per decade. ... Storm surges: Relative SLR compounds with storm surges and coastal\
    \ flooding... A newer study (Tebaldi et al., 2021c)... shows how changes in the\
    \ return period of current 100-yr events are extremely sensitive to warming of\
    \ even just 1.5 \u25E6C, and the relative sea level rise that accompanies it by\
    \ 2100... For warming levels in excess of 2 \u25E6C, ice sheet behavior exhibits\
    \ deep uncertainty, and substantially higher SLR may be possible."
  14: '"Evaluation overview": "With this work we are offering a physical climate perspective
    on drivers of risk, i.e., we focus on the hazard component, aware that it is only
    one of multiple factors - including exposure, vulnerability and possible adaptation
    and mitigation responses - contributing to the ultimate outcome."


    "Drivers of Risk": "However, the effects of future climate change on air pollution
    through changes in natural sources of pollution precursors (for example, by vegetation,
    fires, lightning) remain very uncertain... Extreme air pollution events can be
    favored by specific meteorological conditions (e.g. heatwaves, temperature inversions
    and atmospheric stagnation episodes) over highly polluted areas. These conditions
    are influenced by climate change, but the correlation between such meteorological
    conditions and high concentrations of ozone and PM2.5 have been shown to be regionally
    and metric dependent."


    "Highlights": "Higher frequency of concurrent heatwaves and droughts, and of compound
    (sea level rise and storm-driven) flooding events have already been detected and
    higher frequencies with additional warming are expected of these specific compound
    extremes and, in general, of concurrent extremes in time and space."

