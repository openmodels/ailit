Drivers of Risk:
  1: No relevant information
  2: Changing climate conditions
  3: Climatic impact-drivers (CIDs) include changes in temperature, precipitation,
    tropical cyclones, extra-tropical storms, fire weather, permafrost thaw, and Northern
    Hemisphere snow cover.
  4: General warming and precipitation changes pose stress on ecosystems, especially
    in limited area domains such as islands, mountains, and biodiversity hotspots.
  5: Extreme heat, cold temperatures, inland and coastal flooding, winds from storms,
    permafrost thaw, sea level rise, shifts in precipitation patterns, droughts, and
    changes in CO2 concentrations are identified as drivers of risk.
  6: Changes in precipitation patterns, extreme precipitation events, severe droughts,
    changes in snow cover, and mass loss of glaciers impacting water availability
    and local cultures.
  8: CID/hazards (Climate Impact Drivers) related to global surface air temperature
    (GSAT) warming.
  9: Globally averaged sea surface temperatures (SSTs)
  10: Increases in GSAT (Global Surface Air Temperature) warming, extreme heat, extreme
    cold, mean precipitation, heavy precipitation.
  11: Floods induced by heavy precipitation, increased frequency of droughts, fire
    weather conditions, changes in ENSO variability, increased rain intensity in tropical
    cyclones, extra-tropical storm impacts.
  12: Changes in global temperature levels are impacting outcomes such as Arctic warming,
    sea level rise, loss in permafrost and snow cover, and extreme weather event frequencies.
  13: Global warming levels (GWLs), increasing CO2 concentrations, relative sea level
    rise, and changes in frequency of tropical and extra-tropical storms are identified
    as key drivers of risk.
  14: Changes in natural sources of pollution precursors; climate change influences
    meteorological conditions favoring extreme air pollution events; higher frequency
    of compound extremes such as heatwaves, droughts, and flooding.
  15: Many hazards can be directly linked to global temperature changes, including
    regional warming, mean precipitation change, sea surface temperature warming,
    snow cover, permafrost thawing, heat extremes, tropical cyclone intensity, marine
    heatwaves, droughts, fire weather, and storm surges.
Evaluation overview:
  1: No relevant information
  2: Regional and sectoral key risks from climate change
  3: The paper enriches the representation of physical climate aspects driving impacts
    and their future potential evolution in climate risk frameworks.
  5: This section provides overviews of risk to critical physical infrastructure,
    living standards, human health, food security, and water security.
  6: No relevant information
  7: No relevant information
  8: Expected behavior of CID/hazards relevant to the eight RKRs (Key Risk Regions)
    as a function of global surface air temperature (GSAT) warming.
  9: 'Extreme heat: On the global scale, the frequency and intensity of heat extremes
    have increased since the 1950s.'
  10: No relevant information
  12: The page provides an overview of projected climate change impacts on Arctic
    warming, sea level rise, permafrost, glacier mass, snow cover, and event frequencies.
  13: This paper evaluates direct climate impacts focusing on sea level rise, storm
    surges, sea ice, glacier mass, marine heatwaves, ocean acidification, and air
    pollution weather.
  14: The paper focuses on the frequency changes of climatic impact-drivers (CIDs)
    that can become hazards, contributing to the severity of key risks.
  18: No relevant information
Highlights:
  1: No relevant information
  2: Offers a representation of the future evolution of the hazard components of RKRs
    as systematic as possible given current literature and assessments
  3: Every small increment in CO2 concentration and warming leads to changes in climate
    phenomena that increase risks on human and natural systems, particularly if no
    compensating changes are made in exposure, vulnerability, or adaptation.
  4: The paper identifies eight Representative Key Risks (RKRs) which include risks
    to coastal socio-ecological systems, terrestrial and ocean ecosystems, and critical
    infrastructure.
  5: Climate change threatens infrastructure, living standards, human health, food
    security, and water security through various hazards and vulnerabilities.
  6: The Arctic region is warming significantly faster than the global average, potentially
    affecting global climates.
  7: The page describes a table that identifies relevant climate impact-drivers/potential
    hazards for various Key Risks, based on the assessment of WG II authors.
  8: Summary of expected behavior of CID/hazards as a function of GSAT warming, specifying
    quantitative relations where possible.
  9: "Under a high warming scenario (SSP5-8.5), global average SSTs are projected\
    \ to increase by 2-4\xB0C between 2081 and 2100, while under a low warming scenario\
    \ (SSP1-2.6), the increase is projected to be 0.4-1.5\xB0C."
  10: Heat extremes increase non-linearly with GSAT warming, especially for rarer
    events. Heavy precipitation frequency and intensity have increased and will continue
    to increase, particularly in high latitudes. Changes in cold extremes are generally
    in the opposite direction of warming.
  11: Northern latitudes, especially the Arctic, show the most intense warming under
    climate change projections. Significant regional variations in precipitation changes
    are projected, with reduced precipitation in the Mediterranean and South America
    and increases in polar regions and parts of Asia and North America.
  12: Key outcomes include projected losses of permafrost volume and glacier mass,
    reduced snow cover, increased frequency and severity of extreme weather events,
    and sea level rise.
  13: "Even limiting warming to 1.5\xB0C, a large percentage of coastal locations\
    \ could see current 100-year flood events becoming annual events by 2100. Higher\
    \ warming levels lead to significantly greater sea level rise, glacier mass loss,\
    \ and more frequent and intense marine heatwaves. Ocean acidification is ongoing\
    \ and expected to continue unless emissions are dramatically reduced."
  14: Detection of higher frequency of compound (sea level rise and storm-driven)
    flooding events and concurrent heatwaves and droughts expected with additional
    warming.
  15: Every increment of global warming matters, and there is increased confidence
    in associating the behavior of hazards with warming, despite uncertainties.
Methodology:
  1: No relevant information
  2: Identifies relevant hazards for each Representative Key Risk (RKR) based on the
    IPCC WGII assessment and reports on current state and expected future changes.
  3: The paper builds upon IPCC AR6 WGI Chapter 12, compiling CID data and linking
    them to RKRs in WGII Chapter 16, by identifying CIDs relevant to RKRs and examining
    their relation to global warming levels.
  5: The paper identifies several Risk Knowledge Register (RKR) categories (RKR-C
    to RKR-G) and describes the hazards and conditions that contribute to each.
  6: Pattern scaling used to represent how mean temperature and precipitation scale
    with global warming levels (GWLs).
  8: The information presented is derived from the IPCC AR6 WGI assessment.
  9: The analysis appears to be based on SSP5-8.5 (High warming) and SSP1-2.6 (Low
    warming) scenarios, focusing on 2081-2100 outcomes.
  10: Pattern scaling is used to represent the scaling of mean precipitation with
    GSAT.
  11: The study uses normalized patterns of surface temperature and percent precipitation
    change based on CMIP6 models/scenarios, averaged results projected for the years
    2081-2100 relative to 1995-2014.
  13: The analysis relies on climate models and projections to assess the impacts
    of different global warming levels on various climate indicators. Timeframe is
    mostly focused on projections until 2100.
  15: The analysis adopts a global perspective on changing climatic impact-drivers,
    focusing on global warming levels rather than specific emissions scenarios.
More Notes:
  1: No relevant information
  2: Focus is on the hazard components of Representative Key Risks (RKRs) adopted
    by the IPCC WGII. The paper systematically assesses the evolution of these hazards,
    linking them to Global Warming Levels (GWLs).
  3: The CID framework is noted to use a neutral term recognizing that climatic changes
    may carry benefits and not just negative impacts, highlighting the importance
    of adaptation and context.
  5: The paper emphasizes the importance of considering vulnerability and exposure,
    in addition to hazards, when assessing climate risks.
  6: The analysis links GWLs and climate-induced hazards primarily through climate
    model outputs, specifically CMIP6 scenarios.
  7: CID types are organized as in Ranasinghe et al. (2021) and Ruane et al. (2022).
    Section 3 elaborates on CID/hazard metrics to relate them to global temperature
    change. Sections 2.1-2.8 describe CID/Hazards.
  8: Levels of confidence are those assigned by the IPCC AR6 WGI assessment. The table
    is continued on the next page.
  9: The rate of SST warming is stated to be about 80% of GSAT warming.
  10: The paper reports assessed changes in characteristics (globally averaged) of
    pre-industrial 10- or 50-yr events with a range of GWLs.
  13: "The paper notes deep uncertainty in ice sheet behavior for warming levels exceeding\
    \ 2\xB0C, which could lead to substantially higher sea level rise."
  15: The importance of considering the hazard component along with exposure and vulnerability
    to obtain a realistic assessment of future risk is emphasized.
  18: The references cover a range of climate impacts from extreme sea levels and
    drought to urban heating and air quality, indicating a broad scope of relevant
    information for the National Climate Assessment.
Quantitative material:
  1: No relevant information
  2: Links changes in magnitude, intensity and/or frequency to Global Warming Levels
    (GWLs) to the extent possible.
  3: The paper attempts to quantify relationships between CIDs and global warming
    levels, but no specific quantitative data is provided on this page.
  6: Warming in the Arctic region projected to be 2 to 2.4 times faster than GSAT
    over the 21st century.
  7: No relevant information
  8: Quantitative relations are specified for some hazards and highlighted by pink
    shading.
  9: "Global average SSTs will increase between 2 \xB0C and 4 \xB0C under High warming\
    \ (SSP5-8.5, reaching GWLS between 3.6 \xB0C and 6.9 \xB0C); but only between\
    \ 0.4 \xB0C and 1.5 \xB0C under Low warming (SSP1-2.6, reaching GWLs between 1.3\
    \ \xB0C and 2.8 \xB0C) (see Fig. 2a)."
  10: "Heat extremes: Non-linear increases detectable at GWLs as low as 1.5\xB0C;\
    \ metrics varying linearly with GSAT can see changes more than double the magnitude\
    \ of GSAT warming in mid-latitudes and even larger in high latitudes; frequency\
    \ of 10-year heat events are already 3 times more frequent than pre-industrial,\
    \ becoming 4, 6, and 9 times more frequent at 1.5\xB0C, 2\xB0C, and 4\xB0C respectively;\
    \ frequency of 50-year events are already 5 times more frequent, and would become\
    \ 9, 14 and 40 times more frequent at those GWLs; magnitude of both these events\
    \ are already 1.2\xB0C hotter on average, becoming 2\xB0C, 2.6\xB0C and 5\xB0\
    C hotter at those GWLs."
  11: "Drought events are now 1.7 times more frequent, and projected to be 2, 2.4,\
    \ and 4 times more frequent at 1.5\xB0C, 2\xB0C, and 4\xB0C respectively. Intensity\
    \ of droughts is already 0.3sd drier, projected to be 0.5sd, 0.6sd, and 1sd drier\
    \ at increasing GWLs. SPEI indicates current 9.4% probability of three months'\
    \ drought conditions; rises to 20% at 1.5\xB0C of warming, 35% at 2\xB0C, and\
    \ 60% at 4\xB0C of warming."
  12: Quantitative information includes percentage loss of permafrost volume, glacier
    mass, snow cover, and frequency changes of heatwaves and droughts.
  13: "Provides quantitative projections for sea level rise under different GWLs by\
    \ 2100 (e.g., 0.44 m for 1.5\xB0C GWL, 0.81 m for 5\xB0C GWL). Also includes projections\
    \ for glacier mass loss (e.g., 50-60% remaining under 1.5-2\xB0C warming), and\
    \ changes in the frequency of marine heatwaves (2-9 times more frequent under\
    \ SSP1-2.6, 3-15 times more frequent under SSP5-8.5 by end of century). Mentions\
    \ current rate of ocean pH decline (0.017-0.027 pH units per decade)."
sourcematerial:
  1: The provided page does not contain detailed content regarding the research findings
    or discussion relevant to the categories requested. It primarily includes publication
    details, author names, citation information, and descriptions of images, without
    substantive content regarding the study's evaluation overview, drivers of risk,
    quantitative material, methodology, highlights, or other specific notes.
  2: "Source material here:\n\nThe framework of Representative Key Risks (RKRs) has\
    \ been adopted by the Intergovernmental Panel on Climate Change Working Group\
    \ II (WGII) to categorize, assess and communicate a wide range of regional and\
    \ sectoral key risks from climate change. These are risks expected to become severe\
    \ due to the potentially detrimental convergence of changing climate conditions\
    \ with the exposure and vulnerability of human and natural systems. In this study\
    \ we offer a representation \u2013 as systematic as possible given current literature\
    \ and assessments \u2013 of the future evolution of the hazard components of RKRs.\
    \ We identify the relevant hazards for each RKR, based upon the WGII authors\u2019\
    \ assessment, and we report on their current state and expected future changes\
    \ in magnitude, intensity and/or frequency, linking these changes to Global Warming\
    \ Levels (GWLs) to the extent possible."
  3: "Source material\nOur picture of the evolution of RKR-relevant climatic impact-drivers\
    \ complements and enriches the treatment of RKRs in the other papers in at least\
    \ two ways: by filling in their often only cursory or limited representation of\
    \ the physical climate aspects driving impacts, and by providing a fuller representation\
    \ of their future potential evolution, an important component \u2013 if never\
    \ the only one \u2013 of the future evolution of risk severity. Once identified,\
    \ the relation between the CIDs/hazards and the magnitude of global warming is\
    \ characterized and, where possible, quantified. For some of these quantities\
    \ - like regional trends in oceanic and atmospheric temperature and precipitation,\
    \ some heat and precipitation ex- tremes, permafrost thaw and Northern Hemisphere\
    \ snow cover - a strong and quantitative relationship with increasing GWLs has\
    \ been identified. For others - like frequency and intensity of tropical cyclones\
    \ and extra-tropical storms, and fire weather - that link can only be described\
    \ quali- tatively. Our work in this paper rests upon the assessment published\
    \ as part of IPCC AR6 Working Group I (WGI) Chapter 12 \u2013 titled \u201CClimate\
    \ change information for regional impact and for risk assessment\u201D \u2013\
    \ a chapter that was conceived as facilitating linkages and consistency between\
    \ WGI and WGII. While the bulk of the chapter connects to the regional chapters\
    \ of the WGII report, the chapter\u2019s section titled \u201CA global perspective\
    \ on climatic impact-drivers\u201D (12.5) includes a cross-chapter box (Tebaldi\
    \ et al., 2021a) summarizing the current state and future projections of a set\
    \ of metrics describing hazards relevant to the assessment of Representative Key\
    \ Risks (RKRs) and Reasons For Concern (RFCs), i.e., aiming to connect specifically\
    \ to WGII chapter 16, \u201CKey risks across sectors and regions\u201D (O\u2019\
    Neill et al., 2022), and its synthetic view of climate-related risks. In almost\
    \ all cases, however, the basic message remains that every small increment in\
    \ CO2 concentration in the atmosphere and associated warming will bring changes\
    \ in climate phenomena that will contribute to increasing risk of impacts on human\
    \ and natural systems, in the absence of compensating changes in these systems\u2019\
    \ exposure and vulnerability, and in the absence of effective adaptation. We need\
    \ to underline, however, that the CID framework has deliberately chosen a neutral\
    \ term (impact-driver) recognizing that climatic changes may carry benefits and\
    \ not only negative impacts (Ruane et al., 2022). This is true in at least two\
    \ ways: what may be hazards for some actors or in some contexts may be construed\
    \ as opportunities for other actors or in other contexts...\n"
  4: "yaml\nDrivers of Risk: \"A wide range of potential hazards are relevant to this\
    \ RKR. These may be gradual climatic changes like sea level rise, the warming\
    \ of sea surface temperatures (SSTs), the thawing of permafrost in Arctic coastal\
    \ regions, the decrease in extent and thickness of sea ice, ocean acidification.\
    \ Alternatively, they may be episodic extreme events like marine heatwaves, storm\
    \ surges, and winds from tropical and extratropical cyclones. ... Hazards discussed\
    \ in Section 2.1, as relevant for RKR-A, such as SST warming, sea ice loss and\
    \ ocean acidification are also relevant for ocean/coastal ecosystems as are tropical\
    \ cyclones and marine heatwaves. Heat extremes (Seneviratne et al., 2021; Ranasinghe\
    \ et al., 2021) on land or water (including marine heatwaves) can with time under\
    \ increased warming exceed upper thermal limits for living organisms. ... In addition,\
    \ general patterns of warming and precipitation change (Douville et al., 2021;\
    \ Gulev et al., 2021; Guti\xB4errez et al., 2021; Lee et al., 2021; Ranasinghe\
    \ et al., 2021) and the pace at which they unfold can pose stresses on ecosystems\
    \ or individual species. Fire weather conditions conducive to wildfires are also\
    \ significant drivers of this type of risk. All these are particularly hazardous\
    \ when affecting limited area domains (islands, mountains, inland and marginal\
    \ seas, and biodiversity hotspots) by changing the suitability of regions for\
    \ species that have adapted to cooler and wetter (or drier) conditions and have\
    \ nowhere to go to regain them, demonstrating the critical role in determining\
    \ exposure of the physical environment other than climate conditions. ... The\
    \ most consequential hazards driving this type of risks are acute extreme events,\
    \ like cyclones, floods, droughts or fires, extreme precipitation and heat\"\n\
    Drivers of Risk: \"General patterns of warming and precipitation change (Douville\
    \ et al., 2021; Gulev et al., 2021; Guti\xB4errez et al., 2021; Lee et al., 2021;\
    \ Ranasinghe et al., 2021) and the pace at which they unfold can pose stresses\
    \ on ecosystems or individual species. Fire weather conditions conducive to wildfires\
    \ are also significant drivers of this type of risk. All these are particularly\
    \ hazardous when affecting limited area domains (islands, mountains, inland and\
    \ marginal seas, and biodiversity hotspots) by changing the suitability of regions\
    \ for species that have adapted to cooler and wetter (or drier) conditions and\
    \ have nowhere to go to regain them, demonstrating the critical role in determining\
    \ exposure of the physical environment other than climate conditions.\"\nHighlights:\
    \ \"Table 1 gives a snapshot view of the eight RKRs. ...  RKR-A risk to the integrity\
    \ of low-lying coastal socio-ecological systems; RKR-B risk to terrestrial and\
    \ ocean ecosystems; RKR-C risks associated with critical physical infrastructure,\
    \ networks, and services\"\n"
  5: " \nThe page provides the following information:\n\nEvaluation overview:\nFor\
    \ risk to critical physical infrastructure: \"extreme heat can warp roads and\
    \ airport runways, cause buckling of railways and require a lower take-off weight\
    \ for aircraft; both energy transmission and energy production in plants that\
    \ use stream water for cooling can be impaired by high air and water temperatures.\"\
    \nFor risk to living standards: \"This RKR comprises risks linked to economic\
    \ impacts at all scales, from Gross Domestic Product to individual livelihoods.\"\
    \nFor risk to human health: \"This RKR comprises risks of human mortality and\
    \ morbidity, with the assessment having a particular focus on heat-related mortality\
    \ and morbidity, and on water- and vector-borne diseases.\"\nFor risk to food\
    \ security: \"This RKR comprises risks of breakdown of food systems (relying on\
    \ land and/or ocean resources) thus engendering food insecurity because of threats\
    \ to crop, livestock, fishery and agroforestry production as well as the distribution\
    \ networks underlying international food markets.\"\nFor risk to water security:\
    \ \"This RKR comprises risks from water-related hazards (floods and droughts)\
    \ and induced by water quality deterioration.\"\n\nDrivers of Risk:\n\"Extreme\
    \ heat can warp roads and airport runways, cause buckling of railways and require\
    \ a lower take-off weight for aircraft; both energy transmission and energy production\
    \ in plants that use stream water for cooling can be impaired by high air and\
    \ water temperatures. At the other end of the spectrum, extreme cold temperatures,\
    \ possibly with frequent freezing and refreezing episodes, can cause pipes to\
    \ burst or damage roads. Inland flooding from heavy rains, or coastal flooding\
    \ caused by gradual sea level rise in isolation or combined with storm surges,\
    \ threatens roads and other transportation networks, and key infrastructure assets\
    \ that are often located along river ways or in coastal areas.\"\n\nMethodology:\
    \ \nThe section heading 'RKR-D: Risk to Living Standards' indicates a structured\
    \ approach and follows through similarly with other RKRs, such as RKR-E and RKR-F,\
    \ to assess risks. \"This RKR comprises risks [...] with the assessment having\
    \ a particular focus...\"\n\nHighlights:\nThere are numerous risks presented by\
    \ climate change spanning from infrastructure to public health to agriculture.\
    \ The text highlights these risks without prioritizing among them, suggesting\
    \ each is significant within its domain.\n\nMore Notes:\nReiterated importance\
    \ of vulnerability: \"Again, it is the convergence of hazards with population\
    \ exposure and vulnerability, often the result of both environmental conditions\
    \ and safety and governance issues, that determines the evolution of these risks.\"\
    \n"
  6: " \nFor these types of risks a wide range of hazards related to the water cycle\
    \ may be relevant, from changes in the average patterns of precipitation causing\
    \ stress on water availability, to extreme precipitation events causing flooding\
    \ and related damages, to severe droughts. In addition, expected changes in snow\
    \ cover and mass loss of glaciers are hazards not only affecting water availability,\
    \ whose quantity and duration is in some region strongly dependent on snowfall\
    \ magnitudes and timing, but endangering ways of life, identity, and culture for\
    \ the local population.\n\nWarming trend in the Arctic region: The warming signal\
    \ averaged over the Arctic region has already emerged from internal variability\
    \ (Forster et al., 2021), and is projected to continue at a rate between 2 and\
    \ 2.4 times faster than GSAT, over the 21st century...\n\nMean air temperature\
    \ warming patterns: Pattern scaling (Santer et al., 1990; Tebaldi and Arblaster,\
    \ 2014) can fairly accurately represent the scaling of at least basic variables\
    \ like mean temperature (and precipitation) with GWLs, showing which regions of\
    \ the world warm more or less than the global average...\n"
  7: "C. Tebaldi et al.\nTable 2\nA list of climatic impact-drivers/potential hazards\
    \ and their relevance (when the cell is filled) to the various RKRs. We use the\
    \ organization by CID type as in Ranasinghe et al. (2021) and Ruane et al. (2022)\
    \ then list CID/Hazards as described in the text of Sections 2.1-2.8. Section\
    \ 3 elaborates further on CID/hazard metrics, when necessary, to draw a relationship\
    \ to global temperature change. We note here that the judgment of relevance is\
    \ based on the WG II authors\u2019 assessment of \u201Ckey\u201D risks. Other\
    \ hazards are or could become relevant, but if the WG II assessment did not identify\
    \ them as drivers contributing to \u201Ckey\u201D risks, or chose to assess them\
    \ as relevant to one of the RKR explicitly but not to another that may be connected\
    \ to it, the corresponding cells are left blank (and the hazards are not discussed\
    \ in Sections 2.1-2.8)."
  8: 'Expected behavior of CID/hazards relevant to the eight RKRs as a function of
    global surface air temperature (GSAT) warming. When possible, a quantitative relation
    is specified...Cells are colored to indicate the type of relation: pink for quantitative,
    yellow for qualitative, and blue for no robust relation. When available, levels
    of confidence are those assigned by the IPCC AR6 WGI assessment, which constitutes
    the origin of the information presented here. (continued on next page)'
  9: "The text mentions that globally averaged sea surface temperatures (SSTs) are\
    \ expected to rise based on different warming scenarios, which relates to drivers\
    \ of risk. The analysis involves scenarios such as SSP5-8.5 for high warming and\
    \ SSP1-2.6 for low warming, assessing 2081-2100. Specific quantitative material\
    \ is provided: SSTs will increase between 2 \xB0C and 4 \xB0C under High warming,\
    \ and between 0.4 \xB0C and 1.5 \xB0C under Low warming. Also, highlights include\
    \ the projected increases of SSTs under both warming scenarios. The extreme heat\
    \ outcome refers to the increased frequency and intensity of heat extremes globally\
    \ since the 1950s. A note mentions the SST warming rate is about 80% of the GSAT\
    \ warming rate."
  10: "Source material here.\nBoth the number of days and nights exceeding their climatological\
    \ 90th percentile have increased, and so has the duration of heat waves. These\
    \ global trends are reflected in most regions of the world where sufficient data\
    \ are available for assessment. Because of their threshold response, future increases\
    \ in GSAT can translate non-linearly into increases in length, intensity, and\
    \ associated impacts of heat extremes, depending on the metrics of extreme considered.\
    \ Such a non-linear relation is detectable starting at GWLs as low as 1.5 \u25E6\
    C. But even those metrics that have been shown to vary linearly in GSAT are projected\
    \ to see changes more than double the magnitude of GSAT warming (in the mid-latitudes)\
    \ when not larger (in the high-latitude regions). When heat extremes are defined\
    \ as exceedances of thresholds, the relation with GSAT warming can become exponential.\
    \ IPCC (2021) reports assessed changes in characteristics (globally averaged)\
    \ of pre-industrial 10- or 50-yr events with a range of GWLs. While magnitudes\
    \ for both types and frequency for the less extreme events show a linear change\
    \ with warming, the frequency of the rarer events changes exponentially. 10-yr\
    \ events are already 3 times more frequent than during pre-industrial conditions,\
    \ becoming about 4, 6 and 9 times more frequent for 1.5 \u25E6C, 2 \u25E6C and\
    \ 4 \u25E6C respectively. 50-yr events are already 5 times more frequent, and\
    \ would become about 9, 14 and 40 times more frequent at those GWLs. The magnitude\
    \ of both these events has changed and will change similarly: they are already\
    \ 1.2 \u25E6C hotter on average, and will become about 2 \u25E6C, 2.6 \u25E6C\
    \ and 5 \u25E6C hotter at those GWLs (see Fig. 2a).\nExtreme cold: In general,\
    \ for cold extremes, changes go in the opposite direction, i.e., towards a decrease\
    \ linearly (or more strongly) as GSAT warms (see Fig. 2b). \nMean Precipitation:\
    \ Pattern scaling (Santer et al., 1990; Tebaldi and Arblaster, 2014) can fairly\
    \ accurately represent the scaling of mean precipitation with GSAT showing which\
    \ regions will experience wetting rather than drying and by what percentage, per\
    \ degree of GSAT warming.\nHeavy precipitation: In all regions where sufficient\
    \ data are available (both in quality and length), increases in frequency and\
    \ intensity of heavy precipitation episodes has been detected over the historical\
    \ record, and at the continental scale over North America, Europe and Asia. The\
    \ strongest signal is that of larger percentage increases over the high latitudes\
    \ of the Northern Hemisphere in all seasons, and in the mid-latitudes over the\
    \ cold season. Future warming will be accompanied by increases in precipitation\
    \ intensity, including precipitation associated to tropical cyclones. It is virtually\
    \ certain that intense rare events will increase in frequency over all continents\
    \ for GWLs larger than 2 \u25E6C. The increase in frequency does not happen evenly\
    \ across the range of rare events and is greater for rarer events. While the basic\
    \ thermodynamics of the Clausius-Clapeyron equation allows us to infer an increase\
    \ in heavy precipitation of 6\u2013 7 % per degree of warming at the global scale,\
    \ regional outcomes are often affected by changes in circulation in large measure\
    \ and can therefore manifest themselves as stronger or weaker changes. IPCC (2021)\
    \ also reports changes in characteristics (globally averaged) of pre-Industrial\
    \ 10-yr events. The frequency of these types of events is now already 30 % higher\
    \ than during pre-Industrial conditions, and it is projected to become 1.5, 2\
    \ and 3 times more frequent for 1.5 \u25E6C, 2 \u25E6C and 4 \u25E6C respectively.\
    \ The intensity of these events has increased by about 7 % and will increase further\
    \ becoming 10.5 %, 14 % and 30 % wetter at those GWLs.\n"
  11: "Source material here.\nFloods: Inland floods induced by heavy precipitation\
    \ are expected to produce increasing flooded area extent with increasing GWLs...\n\
    \nDroughts: Drought events...have already been observed with increased frequency\
    \ compared to pre-industrial times...frequency of 10-yr drought events having\
    \ already increased and continuing to follow GSAT warming, with events being now\
    \ 1.7 times more frequent, and projected to be 2, 2.4 and 4 times more frequent\
    \ at 1.5\xB0C, 2\xB0C and 4\xB0C respectively. Intensity...is already 0.3sd drier,\
