  84: Operationalising the IPCC Risk Framework The approach builds on the premise
    that the IPCC Risk Framework can be operationalised by modelling impacts of climate
    change for key indicators co-selected with stakeholders across a range of sectors,
    relating these impacts to impact thresholds and simulating the effectiveness of
    adaptation and mitigation in ameliorating key risks. To address these specific
    aims, a modelling methodology is being designed to ensure some commonality of
    approach between sectoral applications. This requires collective decisions to
    be agreed at an early stage of an assessment through a process of co-design across
    sectors and between researchers and stakeholders. Protocols can then be agreed
    that modellers can use to carry out the model simulations needed for addressing
    the major research questions.
  85: "Source material here.\nThe approach focuses on impacts in climate-sensitive\
    \ sectors (e.g. water resources, forestry, agriculture, human health and winter\
    \ recreation) and is built around simulations with a set of impact models. These\
    \ models should be capable of simulating relevant indicators for the selected\
    \ sectors and of incorporating options for adapting to climate change.\n...risk\
    \ (potential impact) is a function of the hazard posed by climate change (using\
    \ climate model projections, for example, based on representative concentration\
    \ pathways\u2014RCPs), which can be moderated through mitigation, and of vulnerabilities\
    \ (exposure, susceptibility and coping capacity) that are mediated by future socioeconomic\
    \ trends (based, for example, on shared socioeconomic pathways\u2014SSPs) and\
    \ can be adjusted through adaptation.\nThe method being applied for examining\
    \ changing risk and the urgency for adaptation across different sectors involves\
    \ the construction of impact response surfaces (IRSs) based on impact model simulations...IRSs\
    \ depict the response of an impact variable to changes in two explanatory variables\
    \ as a plotted surface...hence providing a systematic, \u201Cscenario-neutral\u201D\
    \ analysis of impacts that does not rely on the arbitrary and opportunistic use\
    \ of scenario simulations.\nThe IRS method has been increasingly applied during\
    \ the past decade for illustrating impact model sensitivity to climate variables\
    \ (e.g. temperature and precipitation) in sectors such as agriculture, hydrology\
    \ and ecosystems.\n"
