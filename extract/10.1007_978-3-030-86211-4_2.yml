  106: "yaml\nDrivers of Risk: \"Flood risk assessment and management are highly relevant\
    \ for advancing climate change adaptation, since \uFB02oods cause very large amounts\
    \ of material damage and casualties worldwide (Kundzewicz et al. 2014).\"\nMethodology:\
    \ \"Advancements in this respect are (1) the compilation and analysis of comprehensive\
    \ qualitative and quantitative data on \uFB02ood risk changes in case studies\
    \ following the paired event concept; (2) the integration of qualitative and quantitative\
    \ data into socio-hydrological models using Bayesian inference; and (3) the coupling\
    \ of hydrological \uFB02ood risk models with behaviour models in socio-hydrological\
    \ modelling systems.\"\nHighlights: \"These approaches are increasingly feasible\
    \ due to signi\uFB01cant improvements in computational power and data science.\"\
    \n"
  107: "Source material here.\nDrivers of Risk: \"There is general agreement that\
    \ \uFB02ood risk, as well as its components (hazard, exposure and vulnerability)\
    \ are dynamic, and should be treated as such (Vorogushyn et al. 2018).\" \"Due\
    \ to continuous feedbacks across the human\u2013\uFB02ood system, risk-based decision-making\
    \ requires understanding, quantifying and projecting changes in risk under an\
    \ integrated, systems framework (Barendrecht et al. 2020; Vorogushyn et al. 2018).\"\
    \n\nMethodology: \"In this regard, this review is focused on approaches to quantify\
    \ the temporal dynamics of risk and its drivers as well as to project \uFB02ood\
    \ risk changes in the future.\" \"Empirical \uFB02ood risk data on the micro-scale\
    \ in case studies, available from participatory studies, surveys, of\uFB01cial\
    \ statistics or open access data sources are valuable for gaining process understanding\
    \ in respect to the dynamics of risk (e.g. Sairam et al. 2019).\"\n\nHighlights:\
    \ \"Thus, state-of-the-art empirical data-driven knowledge and modelling methods\
    \ are discussed.\" \"Due to continuous feedbacks across the human\u2013\uFB02\
    ood system, risk-based decision-making requires understanding, quantifying and\
    \ projecting changes in risk under an integrated, systems framework (Barendrecht\
    \ et al. 2020; Vorogushyn et al. 2018).\"\n"
  108: "  \nEvaluation overview: \"A decrease in vulnerability seems to have occurred\
    \ at the global level since about 1980, which is reflected in decreasing mortality\
    \ and losses as a share of population and gross domestic product exposed to river\
    \ flooding (Jongman et al. 2015).\"\n\nDrivers of Risk: \"However, exposure and\
    \ vulnerability are largely influenced by human interventions such as flood protection\
    \ and their interaction and influence on risk can only be roughly accounted for\
    \ over time (Bouwer 2011). Vulnerability can also be negatively influenced by\
    \ changes in building materials, increasing dependence on critical infrastructure,\
    \ or changes in business processes... it seems that such constructions tend to\
    \ increase average building losses due to their high susceptibility to flooding\
    \ (Kreibich et al. 2019).\"\n\nHighlights: \"Such detailed case study-based analyses\
    \ revealed that vulnerability can be positively influenced by integrated flood\
    \ risk management, which complements structural protection with non-structural\
    \ solutions, e.g. private precaution, land-use planning and insurance (Kreibich\
    \ et al. 2017).\"\n\nMethodology: \"Since data-driven knowledge is limited to\
    \ inferences derived from past trends, modelling approaches are necessary for\
    \ projecting future trends or developing future scenarios for flood risk. Therefore,\
    \ modelling approaches that consider drivers of risk along with their interactions\
    \ and feedbacks are a necessary step forward for...\"\n"
  109: "Source material here.\n\"Analysis of eight paired \uFB02ood events showing\
    \ the difference in primary drivers of change in \uFB02ood risk and fatalities\
    \ and economic losses between the \uFB01rst \uFB02ood event, which serves as the\
    \ baseline, and the second event.\"\n\n\"Event Pairs and Years: Lists countries\
    \ and river systems with years of two comparative events. Examples include the\
    \ Rhine in Germany (1993/1995, 1998/2002) and the Ganges-Brahmaputra in Bangladesh\
    \ (1988, 1998). Intensity of Changes: Numbers indicate the intensity of changes\
    \ in million inhabitants affected, ranging from 2 to 38.\"\n\n\"Hazard Change\
    \ Due To: Pre-conditions (snow, soil moisture), Precipitation, Storage conditions,\
    \ Protection failure.\"\n\n\"Exposure Change Due To: Denoted as either increased\
    \ exposure or reduced exposure.\"\n\n\"Vulnerability Change Due To: Lack of awareness,\
    \ Lack of preparedness/insufficient coping capacity, Insufficient organizational\
    \ management.\"\n\n\"Damage: Outlines effects such as fatalities and monetary\
    \ damage.\"\n"
