  72: "Source material here: An emerging group of scholars is applying novel bottom-up\
    \ approaches that apply stress tests to analyse plausible combinations of stressors\
    \ that lead to the highest vulnerability...In Chap. 11 the use is demonstrated\
    \ of impact response surfaces to depict the modelled sensitivity of indicators\
    \ to climate and socioeconomic drivers across a plausible range of perturbations,\
    \ accounting for uncertainty where applicable. In Chap. 12 the need for better\
    \ quanti\uFB01cation of the hazard reducing effect of nature-based solutions,\
    \ in this case the mitigation of land slide risks by vegetation, is stressed.\
    \ As vegetation behaviour is dynamic in time and space, the effects on slope stability\
    \ are dif\uFB01cult to model. This dynamic behaviour is systematically discussed\
    \ in Chap. 14 for \uFB02ood risk analyses for different river basins, assessing\
    \ dynamic trends in hazard, exposure and vulnerability indicators. In Chaps. 15\
    \ and 16 its is nicely demonstrated how high resolution and quality climate and\
    \ hazard data are instrumental in climate and weather services to serve different\
    \ societal groups in urban areas and agriculture (insurance) when smartly combined\
    \ with user speci\uFB01c vulnerability information. Chapter 17 present a brief\
    \ critical review of determining factors for the quality of global \uFB02ood models\
    \ that are increasingly used. It is highlighted that all components, the model\
    \ of terrain elevations (DEM), the method used to estimate extreme \uFB02ows,\
    \ the de\uFB01nition of the river network and the numerical model to simulate\
    \ inundation determine overall quality of outcomes."
  73: "Under climate change conditions (i.e. sea-level rise and increased frequency\
    \ of extreme sea levels) and increasing human occupation, the consequences of\
    \ coastal storms will be ampli\uFB01ed if no adaptation actions are implemented.\
    \ [...] Storms impacting sandy coastal areas produce hazards such as erosion and\
    \ inundation that, in turn, promote risk to life and property damage in occupied\
    \ areas, and the alteration and/or fragmentation of habitats [...] Because of\
    \ climate change, Vousdoukas et al. (2018a) project an increase of the global\
    \ average 100-year extreme sea levels [...] In the next decades, SLR will likely\
    \ become the dominant driver in erosion/\uFB02ooding risk at coastal areas and\
    \ may escalate that risk by up to 300% over the next 3 decades [...]\n\nThis work\
    \ presents a generic approach to model disaster risk reduction measures at coastal\
    \ areas, including climate change effects. The proposed methodology is adaptable\
    \ to any coastal region and can be used to test (and improve) management options\
    \ at a broad number of coastal areas. It can also be used to de\uFB01ne a timeframe\
    \ for the implementation of the de\uFB01ned measures since not all risk reduction\
    \ measures, under a climate change scenario, need to be implemented at the same\
    \ time. [...] The selection of the best possible coastal management measures to\
    \ reduce risks at coastal areas, considering costs, effectiveness and acceptance,\
    \ will be mandatory in the future."
  74: "Source material here.\nThe paper discusses the impacts of coastal storms, including\
    \ coastal retreat and flooding. \"Coastal retreat and \uFB02ooding can be estimated\
    \ by using simple formulations or models.\"\n\nSea-level rise combined with shoreline\
    \ dynamics and coastal recession are identified as key drivers of risk. \"Considering\
    \ existing trends in shoreline dynamics, combined with coastal recession driven\
    \ by sea-level rise...\"\n\nThe analysis involves the use of models and approaches\
    \ to test DRR measures, using empirical formulations for overwash assessment and\
    \ bathtub approaches for coastal inundation. \"Coastal retreat and \uFB02ooding\
    \ can be estimated by using simple formulations or models. For overwash assessment,\
    \ the most commonly used method is to estimate runup using empirical formulations...\
    \ For coastal inundation, bathtub approaches are still often used...\"\n\nA significant\
    \ finding is the need for coastal authorities to implement Disaster Risk Reduction\
    \ and PMP measures, and the importance of designing effective adaptive measures\
    \ for densely populated coastal areas. \"With this view of the future, coastal\
    \ authorities need to assess the level of impact and the risk in their coastal\
    \ zones and implement tested and feasible Disaster Risk Reduction (DRR) and PMP\
    \ (prevention, mitigation and preparedness) measures... there is a need for the\
    \ design and implementation of effective adaptive measures.\"\n"
  75: "Process-based models, like XBeach (Roelvink et al. 2009), can be employed to\
    \ determine both coastal erosion and \uFB02ooding, for all regimes and with great\
    \ detail but requiring a higher level of computational complexity and available\
    \ data for model calibration. Process-based models reproduce the processes occurring\
    \ on coastal areas during a storm, containing the essential physics of dune erosion,\
    \ overwash, avalanching, swash, infragravity waves and wave groups. Inundation\
    \ models, such as LISFLOOD (Bates and De Roo et al. 2000), which account for lateral\
    \ connectivity and permeability, can also be used to better represent the inundation\
    \ area. Thus, the recommended models to determine the hazard associated with episodic\
    \ erosion and/or \uFB02ooding are open-source process-based nearshore storm impact\
    \ models such us XBeach (for erosion and overwash) or XBeach coupled with the\
    \ LISFLOOD (for marine \uFB02ooding). Process-based models make use of complex-modelling\
    \ techniques and require a high amount of data. They can be used on a stand-alone\
    \ basis, but are normally integrated within a more complex processing scheme that\
    \ includes data import from external sources, data processing, perform the runs,\
    \ data post-processing and simpli\uFB01cation and \uFB01nal results exportation.\
    \ They should take into consideration, on their implementation, the availability\
    \ of suitable regional data sources or forecast systems, the dominant physical\
    \ and morphological conditions that control the storm processes, the selected\
    \ onshore hazards to be modelled, and the selected receptors to be impacted. In\
    \ the case of modelling climate change, they must also take into consideration\
    \ the existence of adequate regional or local climate change predictions to be\
    \ incorporated as input values."
