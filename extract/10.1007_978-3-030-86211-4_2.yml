  167: "source\nThe effectiveness of different resilience options is evaluated in\
    \ terms of their costs and the benefits of avoiding direct and indirect risks\
    \ of failures. Climate adaptation assessment involves the consideration of changing\
    \ costs and benefits (avoided risks) over the life cycle of asset and network\
    \ management.\n\nA cost\u2013benefit analysis is done to estimate network asset\
    \ and location-specific benefit\u2013cost ratios (BCR) that help identify for\
    \ which options the avoided asset risks would be worth implementing (BCR \u2265\
    \ 1) and which options would be more expensive than the avoided risks (BCR < 1).\n\
    \nThe purpose of the methodology outlined above is to create an effective high-level\
    \ screening whereby the efficacy of different types of adaptation options can\
    \ be compared and locations and assets with high (or low) adaptation benefits\
    \ can be narrowed down for further investigation. Failures in one infrastructure\
    \ network can lead to failures in other interdependent networks.\n\nTo inform\
    \ decision-makers on how to prioritize investment decisions for adaptation planning,\
    \ a cost\u2013benefit analysis is done... The methodology is intended as a high-level\
    \ screening... At a country scale, where it is not possible to invest in every\
    \ asset to make it climate resilient, such information is useful for narrowing\
    \ down the locations of risks.\n"
