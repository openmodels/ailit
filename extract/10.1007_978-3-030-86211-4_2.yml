    to account for equity issues and identify high-risk areas and hotspots where adaptation
    limits may be reached first...Use bottom-up studies to understand where local
    capacities, preference and governance could be hindering the implementation of
    required (technical) adaptation measures, and assess the risk of residual losses
    and damages."

