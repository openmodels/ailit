  53: 'VanWerkhoven et al. (2008) showed that the sensitivity of the output of a widely
    used rainfall-runoff model (SAC-SMA) with respect to its parameters, changes strongly
    along a climatic gradient (defined by the aridity index: precipitation/potential
    evapotranspiration (P/PE)). Sensitivity indices (SI) for the model parameters
    (LZTWM, UFZWM, PFREE, LZFPM) show a strong correlation with the aridity index
    in relation to both high flows (RMSE) and low flows (TRMSE). This result suggests
    that dominant modelled processes change along a climatic gradient. Global sensitivity
    analysis is a valuable tool to complement any data- and performance-based validation
    strategy since it allows us to make the model and its simulations significantly
    more transparent. It is important to stress here that sensitivity analysis can
    be applied regardless of whether observations of the system response are available,
    thus making it very suitable for understanding the behaviour of models under potential
    future conditions.'
