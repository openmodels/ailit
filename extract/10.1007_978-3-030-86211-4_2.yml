  213: "Source material here.\nDynamics of Risk\nThe risk concept has become the major\
    \ basis for impact modelling and an essential part of assessing the performance\
    \ of adaptation measures. \u2026 Risk is determined not only by climate but to\
    \ a very large extent by socio-economic circumstances, which are location-specific;\n\
    Risk is dynamic because of variability and changes in climate, adding to the (monotonous)\
    \ changes and trends in socio-economic developments, and changes in human behaviour\
    \ and (autonomous) adaptive responses to climate risk. These dynamics need to\
    \ be considered, in order to more reliably project how adaptation measures will\
    \ perform over multi-decadal time horizons.\nExposure Change\nStudies into past\
    \ climatic impacts have highlighted that dynamics in exposure indeed play an important\
    \ role in shaping changes in risk over time, including increased exposure of people\
    \ and asset values driving up the losses from flooding and cyclone (wind) impacts.\n"
