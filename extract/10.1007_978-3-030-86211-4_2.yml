    \ and forest fires, are identified as risks impacting slope stability and potential\
    \ landslides. Climate change may alter the precipitation scheme dramatically in\
    \ many areas, with more intense rainfall combined with more dry periods. ... climate\
    \ change may also increase the frequency of droughts, which lead to tree mortality\
    \ and forest \uFB01res. Possible extreme events like these, which still imply\
    \ the vegetation, need to be studied with regard to the initiation of extreme\
    \ surface runoff and \uFB02ash \uFB02oods due to heavy rainfall.\nMethodology:\
    \ The study focuses on modeling the effects of vegetation on rainfall-induced\
    \ landslides, taking into account hydrological and mechanical reinforcement provided\
    \ by vegetation. This study on landslide modelling is focussed on addressing the\
    \ effects of vegetation on rainfall-induced landslides...the hydrological and\
    \ mechanical reinforcement provided by the vegetation on the soil properties are\
    \ classi\uFB01ed whether they are root-related or canopy-related.\nHighlights:\
    \ Emphasizes the need to model the time-spatial variation of vegetation effects\
    \ on slopes and highlights the necessity to study the risks posed by extreme events\
    \ like droughts and heavy rainfall leading to flash floods. there is a need to\
    \ consider time-spatial variation of vegetation effects on a slope (Stokes et\
    \ al. 2014)...Possible extreme events like these, which still imply the vegetation,\
    \ need to be studied with regard to the initiation of extreme surface runoff and\
    \ \uFB02ash \uFB02oods due to heavy rainfall.\n"
  99: 'The paper emphasizes that "the integrated assessment of impacts, adaptation
    and mitigation options under current and future climatic conditions requires a
    continuous long-term analysis of crop sequences to take into account carry-over
    effects as in real conditions."


    The text notes that "if simulations neglect processes and fluxes between growing
    seasons and potential carry-over effects related to agronomic management, the
    long-term sustainability of adaptation and mitigation strategies cannot be properly
    evaluated."


    The paper concludes by stating that "crop models require suitable experimental
    data to parameterize additional crops, which were so far not sufficiently investigated
    to cope with multiple opportunities in crop rotations."


    The abstract starts by noting that "diversification of crop rotations is considered
    as an option to increase the resilience of European crop production under climate
    change." '
  100: "yaml\nDrivers of Risk: \"increase of land temperature by ~1.5 \xB0C compared\
    \ to pre-industrial level, an increase of the frequency, intensity and duration\
    \ of heat waves\"\nDrivers of Risk: \"However, the probability of multiple adverse\
    \ climate events during a growing season including heavy rains and storms has\
    \ increased\"\nHighlights: \"Extended growing seasons facilitate the introduction\
    \ of new crops or the expansion to higher latitudes and altitudes.\"\nHighlights:\
    \ \"cropping systems have already been affected by climate change in terms of\
    \ higher yield variability and crop loss risk\"\nHighlights: \"Diversi\uFB01cation\
    \ of crop rotations is considered as one option to increase the resilience of\
    \ European crop production under climate change.\"\n"
  101: "Source material here.\nAgro-ecosystem models considering the complex interactions\
    \ in the atmosphere-plant\u2013soil system are essential tools to assess the impact\
    \ of projected climate change on various ecosystem services, including crop production,\
    \ environmental effects such as water use and pollution, GHG emissions, resource\
    \ use efficiency and long-term effects on soil properties, e.g. soil carbon stocks\
    \ and to evaluate potential adaptation options under these multiple aspects.\n\
    The majority of agricultural climate change impact assessment studies were focused\
    \ on few specific variables, mainly crop yields and considered only the main climatic\
    \ factors such as temperature (Asseng et al. 2015) or drought effects either solely\
    \ or in combination.\nModel results for wheat yields differed by 5.5\u201311.6%\
    \ among the three methods.\nKersebaum and Nendel (2014) analysed the effect of\
    \ using three different CO2 response functions in combination with a dynamic CO2\
    \ response of stomatal resistance within the model HERMES across 21 regions.\n\
    Their main advantage is the opportunity to conduct high number of simulations\
    \ under various site conditions.\nHowever, this approach has limitations, considering\
    \ that crop growth and yield are affected by the interactive impacts of multiple\
    \ climate change factors and biophysical processes.\nWebber et al. (2018b) suggested\
    \ to replace air temperature by simulated canopy temperature to consider the interaction\
    \ between heat and drought stress.\nMoreover, results showed a strong dependency\
    \ on site conditions (soil and groundwater level) regarding the vulnerability\
    \ against climate change.\n"
  102: "Source material here.\n\"yield reductions due to lodging were reported to\
    \ be 31\u201380% in wheat, 4\u201365% in barley, 37\u201340% in oats, 5\u2013\
    20% in maize and 5\u201384% in rice, lodging is usually not considered in commonly\
    \ used crop models.\"\n\"integrated assessment of impacts, adaptation and mitigation\
    \ options under current and future climatic conditions requires continuous long-term\
    \ simulations of crop sequences.\"\n\"most studies on climate change impact or\
    \ adaptation so far use single-year simulations and/or single crop assessments.\"\
    \n\"the performance of models regarding crop yields improved only slightly when\
    \ continuous simulation was used instead of annual resetting to standardized initial\
    \ conditions.\"\n\"This underlines the request... to extend research to crops\
    \ other than the main staple crops.\"\n"
  103: 'While data for model validation might be available from standard field trials,
    data requirements for model calibration are demanding since they require a high
    data density and proper description of the boundary and site conditions... Therefore,
    they are rarely available for crops beside the main staple crops. Also suitable
    data on crop failure following extreme events are rare since experiments are usually
    cancelled after such events. Crop responses to several abiotic stress factors
    are still not fully understood and multifactorial manipulative experiments are
    thus crucial for a proper model-based assessment of plants growth and development
    under current and expected future environmental conditions. This requires to evaluate
    model performance across different output variables beyond crop yield, e.g. soil
    water and nitrogen status and eventually severity of disease or pest damages.


    ...Crop losses by pest and diseases are rarely considered in crop models... However,
    following the roadmap of Donatelli et al. (2017) models are under development,
    which consider the interaction between crops and pests and diseases through the
    link between crop models and pest and disease models to cope with future changes
    of biotic pressures under climate change.'
