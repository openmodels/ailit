sourcematerial:
  5: The following page is primarily administrative and legal information about the
    book, including the editors, ISBN, open access license, copyright details, publisher
    information, and disclaimers. There is no substantive content related to climate
    impacts within this page.
  7: "In the last 20 years, the study on climate change adaptation has shown important\
    \ progress...a more theoretical-conceptual one, describing the multidimensional\
    \ challenges for adaptation assessment and the methodologies to address them.\
    \ More specifically, the book presents: results of an up-to-date overview of the\
    \ technical, financial, economic and non-monetary models and tools for climate\
    \ change hazards, exposure, vulnerability, and adaptation assessments...To do\
    \ so, the book presents the proceedings of a high-level expert workshop on adaptation\
    \ modelling, integrated with main results from the \u201CStudy on Adaptation Modelling\u201D\
    \ (SAM-PS)...Building on selected use-cases and representative case studies, it\
    \ also proposes practical approaches to conduct adaptation assessments as guidelines\
    \ for decision makers at different levels of governance. This book focuses on\
    \ an issue only marginally tackled by this literature: the still existing gap\
    \ between adaptation science and modelling and the possibility to effectively\
    \ access and exploit the information produced by policy making at different levels:\
    \ international, national and local."
  9: "The climate crisis already affects every place in Europe. Climate change is\
    \ happening today, so we have to build a more resilient tomorrow. ... unprecedented\
    \ forest fires and heatwaves above the Arctic Circle to devastating droughts in\
    \ the Mediterranean region, and from hurricanes ravaging EU outermost regions\
    \ to forests decimated by unprecedented bark beetle outbreaks in Central and Eastern\
    \ Europe. Slow onset events, such as desertification, loss of biodiversity, land\
    \ and ecosystem degradation, ocean acidification or sea level rise are similarly\
    \ destructive over the long term. ...\nBuilding on the 2013 Climate Change Adaptation\
    \ Strategy, the aim of the new strategy is to shift the focus from understanding\
    \ the problem to developing solutions and to move from planning to implementation.\
    \ ...\nClimate change has impacts at all levels of society and across all sectors\
    \ of the economy. More systemic adaptation includes the local level and vulnerable\n\
    communities, promotion of nature-based solutions, and topics such as fiscal policies.\
    \ ...\nAdaptation actions must be informed by robust data and risk assessment\
    \ tools that are available to all\u2014from families buying, building and renovating\
    \ homes to businesses in coastal regions or farmers planning their crops."
  10: "yaml\n\"Evaluation overview\": \"No relevant information\"\n\"Drivers of Risk\"\
    : \"for instance, in the nexus between climate hazards and socioeconomic vulnerability\
    \ and inequality\"\n\"Quantitative material\": \"No relevant information\"\n\"\
    Methodology\": \"undertook an elaborate study on adaptation modelling, i.e. the\
    \ technical, \uFB01nan-cial, economic and non-monetary analysis and modelling\
    \ of climate change hazards,risks, impacts, vulnerability and adaptation.\"\n\"\
    Highlights\": \"The overall objective is to support better informed decision-making\
    \ on adaptation. The Commission will support the development of rapid response\
    \ solutions for decision makers and enrich the toolbox for adaptation practitioners.\"\
    \n\"More Notes\": \"See above for source material.\"\n"
  11: The book describes all the activities carried out during the project in the
    frame of each project task. In detail, one of the main outcomes of the project
    is represented by a comprehensive review, which provided an up-to-date and forward-looking
    overview of the range of technical, financial, economic and non-monetary models
    and tools for hazards, risks, impacts, vulnerability and adaptation climate assessments.
    Based on the results of the desk review and accounting for a number of use case
    and specific case studies, the project team has worked at the proposal of a number
    of recommended approaches for modelling the climate-related risks and impacts
    and for analysing the effectiveness of suitable adaptation strategies. The overview
    provided not only the state of the art of the current knowledge on climate adaptation
    assessment methodologies, but it has also allowed highlighting the main research
    and policy gaps.
  13: 'Source material here. Workshop contributions support and enrich the initial
    reflections with specific examples on the relation between adaptation action and
    the policy dimension. Among the issues tackled there are: the role of uncertainty,
    the operationalization of climate proofing in policy making, the relation between
    adaptation and mitigation policies.'
  17: 'Source material here.

    Adaptation is moving from the theoretical to the applied, and this requires modelling
    that supports informed decision-making for implementation.

    Adaptation involves complex temporal dimensions, as it seeks to address impacts
    that vary dynamically and non-linearly over time. It also has to consider action
    against a background of high uncertainty.

    Adaptation involves a range of actions, at different aggregation scales. The benefits
    of this adaptation are often difficult to model, in quantitative terms, because
    it involves reductions in impacts that are sector-, location- and context-specific.
    Furthermore, adaptation involves a mix of types of interventions, including non-technical
    options such as capacity building that are more difficult to model, but which
    are critical for effective adaptation.

    '
