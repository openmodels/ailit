  134: "Source material here.\n- \"River networks that merge terrain derived rivers,\
    \ map data and surface water observations have only recently begun to emerge,\
    \ but should enable substantial improvements to GFM hydrography.\"\n- \"Perhaps\
    \ a more fundamental issue for GFMs is the parameterisation of river conveyance\
    \ capacity and specifically river depth and friction.\"\n- \"These are not observable\
    \ from satellite platforms and the conveyance capacity of rivers has been extensively\
    \ altered via levy construction and channel modification, for which data are often\
    \ poor or not openly available.\"\n- \"Inversion of river bathymetry from surface\
    \ water dynamics perhaps offers the greatest potential for a paradigm shift in\
    \ GFM hydrography, with the upcoming surface water and ocean topography satellite\
    \ mission providing the necessary data for the world\u2019s larger rivers.\"\n"
  135: "yaml\nMethodology: \"have simulated inundation over two-dimensional grids\
