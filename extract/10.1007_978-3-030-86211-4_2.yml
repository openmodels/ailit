  148: " \nMethods and models for water resource system simulation, risk analysis,\
    \ and decision analysis provide powerful tools for dealing with the challenge\
    \ of climate change in the water sector.\n\nSimulation models are at the heart\
    \ of these methods, and are widely used to improve understanding and assist decision-making\
    \ in water resource management.\n\nThis paper briefly reviews the application\
    \ of water resource system models for climate adaptation and sketches out some\
    \ areas for further improvement.\n"
  149: "Source material here.\nFaced with climate uncertainties, decision-makers may\
    \ despair at the prospect of having to make long-term choices about adaptation\
    \ and water infrastructure...we review a set of principles shared by these decision\
    \ analysis methods: First, they promote the notion of \uFB02exibility. Second,\
    \ they promote the notion of robustness. Third, they emphasize the importance\
    \ of exposing trade-offs...\n\nFlexibility is broadly interpreted as the ability\
    \ to switch or change a decision depending on what outcomes materialize. In practice,\
    \ this means recognizing the extent to which modi\uFB01cation of the operation\
    \ of infrastructure systems can yield very different outcomes or building less\
    \ infrastructure up front but enabling expansion in the future if needed.\n\n\
    A robust decision is a decision that performs acceptably well under a wide range\
    \ of plausible future conditions...This emphasis upon robustness is in principle\
    \ quite different to optimizing methods which focus on maximizing expected utility.\
    \ Promoting a notion of robustness means identifying options that perform acceptably\
    \ well (i.e., they satisfy a set of criteria) over the widest possible space of\
    \ possible futures and not that are optimal over a narrow set of conditions.\n\
    \nThe tools of multi-objective optimiza-tion are particularly powerful for exploring\
    \ trade-offs between different attributes of water resource systems. These enable\
    \ system states (e.g., in different possible future scenarios) to be presented\
    \ in terms of their performance with respect to multiple objectives.\n"
  150: " \nSimulation modelling is particularly powerful because of the capacity to\
    \ test and explore shocks and scenarios that have never happened, by subjecting\
    \ a simulator of a water resource system to those conditions 'in silico'.\n\n\
    Exploratory modelling, uses simulation models to ask \u2018what if \u2019 questions,\
    \ unravelling the implications of different assumptions and hypotheses about future\
    \ trends on water-related outcomes of concern.\n\nThe recent emphasis on decision-making\
    \ under uncertainty means that metrics that can be related to the principles of\
    \ flexibility and robustness are increasingly being applied (e.g., maximin, optimism\u2013\
    pessimism, max regret).\n\nSimulating a water resource system involves coupling\
    \ several different models (Hall et al. 2019): Climatic boundary conditions: Information\
    \ on climatic variables is a first key input to simulate water resource system\
    \ behaviour under climate change.\n\nUsing climate models as the \u2018upstream\u2019\
    \ boundary of a water system simulator is attractive because (i) it enables simulations\
    \ from climate models to be used and (ii) climate model outputs implicitly represent\
    \ spatial and temporal dependencies between the several climatic variables that\
    \ influence water resource systems.\n"
  151: "Source material here.\nDirect simulation of climatic boundary conditions is\
    \ based on sampling and perturbation of the statistical distribution of historical\
    \ observations. Hydrological models transform climatic inputs (notably rainfall)\
    \ into quantities of water that may be withdrawn from rivers and/or groundwater\
    \ at speci\uFB01ed locations, taking into account topographical and land-use characteristics.\
    \ Water resource system models simulate the functioning of the water supply infrastructure,\
    \ typically on daily or monthly timescales. System simulation models can represent\
    \ rules for withdrawal of water from water bodies, operation of storage (e.g.,\
    \ dams), and allocation of water to different users. Recent advances in smart\
    \ metering technology provide a promising avenue to advance residential water\
    \ demand modelling and thus signi\uFB01cantly improve the ability of water resource\
    \ system simulators to model users\u2019 response to restrictions and other demand-side\
    \ measures. Advances in economic analysis also allow for an improved understanding\
    \ and modelling of the impact of water use restrictions on multiple users. The\
    \ process illustrated above has been applied in London to adapt the city\u2019\
    s water supply system to the expected impacts of climate change and population\
    \ growth.\n"
  152: "Simulators of London\u2019s water systems show that if no action is taken,\
    \ London is indeed set to experience more frequent and severe water shortages\
    \ in the future as early as 2030...climate change complicates things further as\
    \ it will mean more frequent and intense droughts. Through the use of simulators,\
    \ water managers in London have identified aggressive demand management...However,\
    \ they have also identified options to augment supplies in the long-term. These\
    \ include recycling wastewater and transferring water from other parts of Southern\
    \ England. These options have been identified through the application of water\
    \ resource system simulators designed to optimize system performance along four\
    \ objectives: (1) least cost, (2) least environmental impact, (3) robustness,\
    \ and (4) least emissions... Technological advances, institutional innovations,\
    \ and behavioural change are some of the factors pushing the boundaries of water\
    \ resource system modelling. New data sources: The proliferation of sensors in\
    \ water resource systems is providing an opportunity to fill persistent data gaps.\
    \ For example, the introduction of smart water meters in homes is providing much\
    \ more precise information on the characteristics of water usage."
  153: "\"Evaluation overview\": \"This paper reviews some of the current and future\
    \ challenges and opportunities facing water resource system models for climate\
    \ adaptation.\"\n\n\"Drivers of Risk\": \"However, there is still less uptake\
    \ in practice than might be expected. This can be attributed to the approaches\
    \ being conceptually quite challenging and not always easy to align with existing\
