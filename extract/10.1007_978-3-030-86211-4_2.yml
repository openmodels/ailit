    \ income under a perfect forecast scenario quite different from the imperfect\
    \ forecast case\u2026 would bene\uFB01t from \u2018perfectly ef\uFB01cient\u2019\
    \ adverse selection\u2026 future droughts will have more negative impacts on many\
    \ economic activities, especially on agriculture\u2026 This modelling also shows\
