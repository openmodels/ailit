  228: The purpose of this work is to present an operational approach to include consideration
    of global change drivers (climatic, economic, social, etc.) in support to the
    design of local policies or investment plans. In both cases decision/policy makers
    typically have sets of plausible solutions and decisions to be taken in terms
    of choices among sets of plausible solutions with the best knowledge about the
    future dynamics of endogenous and exogenous system variables. Multi-criteria analysis
    coupled with uncertainty analysis can contribute with methodologically sound and
    operational solutions. This paper elaborates on a series of recent cases with
    the ambition to extract common elements for a general methodological framework.
    Common to most decision contexts in a medium term perspective typical of both
    investment decisions and adaptation policies is the prevalence of economic signals
    in the shorter term and of climatic signals in the longer term.
