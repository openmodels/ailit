  81: "yaml\nMethodology: \"The approach involves the construction of impact response\
    \ surfaces (IRSs) based on impact model simulations, using sectoral impact models\
    \ that are also capable of simulating some adaptation measures.\"\nMethodology:\
    \ \"(i) sensitivity\u2014examining the sensitivity of the sectors to changing\
    \ climate for readily observable indicators; (ii) urgency\u2014estimating risks\
    \ of approaching or exceeding critical thresholds of impact under alternative\
    \ scenarios as a basis for determining urgency of response; and (iii) response\u2014\
    determining the effectiveness of potential adaptation and mitigation responses.\"\
    \nMethodology: \"The approach focuses on impacts in climate-sensitive sectors,\
    \ such as water resources, forestry, agriculture or human health.\"\nMethodology:\
    \ \"We illustrate the types of analyses to be undertaken and their potential outputs\
    \ using two examples: risks of crop yield shortfall in Finland and impact risks\
    \ for water management in the Vale do Gaio reservoir, Portugal.\"\nHighlights:\
    \ \"Based on previous analyses such as these, we have identi\uFB01ed three challenges\
    \ requiring special attention in this new modelling exercise: (a) ensuring the\
    \ salience and credibility of the impact modelling conducted and outputs obtained,\
    \ through engagement with relevant stakeholders, (b) co-exploration of the capabilities\
    \ of current impact models and the need for improved representation of adaptation\
    \ and (c) co-identi\uFB01cation of critical thresholds for key impact indicators\
    \ and effective representation of uncertainties.\"\n"
