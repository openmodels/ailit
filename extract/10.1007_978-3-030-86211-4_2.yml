  174: "$521 billion/year in 2030 (World Resources Institute 2019). The combined effects\
    \ of growing water scarcity and \uFB02ood risk increasingly constrain decision-makers\
    \ to adopt new approaches and policies to the management of the human-modi\uFB01\
    ed water cycle. Critically, the dynamics of complex human\u2013water systems of\
    \ relevance for water policy design and implementation are characterized by positive\
    \ feedbacks, non-mechanistic dynamics and multiple equilibria leading to Knightian\
    \ or deep uncertainty, where it is not possible to identify all possible futures\
    \ (deep uncertainty type 2) or assign a probability to each identified possible\
    \ future (deep uncertainty type 1). Under deep uncertainty, standard decision-making\
    \ based on a complete probabilistic description of future conditions and optimization\
    \ of expected performance is no longer appropriate; instead, priority should be\
    \ given to robustness, through: (i) the avoidance of policies leading to unfavorable\
    \ contingencies that can be identified beforehand (classical robustness, which\
    \ addresses deep uncertainty type 1) (Marchau et al. 2019) and (ii) the avoidance\
    \ of path-dependent trajectories, so to enable future adaptation to unpredictable,\
    \ surprising, and potentially catastrophic (\u201Cblack swan\u201D) events that\
    \ are explainable only after they happen (adaptive robustness, which addresses\
    \ deep uncertainty type 2) (Garrick 2015). This research surveys recent advances\
    \ in (socio-)hydrology and (institutional) economics that contribute toward uncertainty\
    \ sampling and robust decision-making. I will argue that despite significant progress,\
    \ integration among disciplines remains weak and allows only for fractioned understanding\
    \ and partial representation of uncertainty. To bridge this gap, along these pages,\
    \ I develop a research agenda toward an interdisciplinary, replicable, and scalable\
    \ research framework integrating data and methods from (socio-)hydrology and economics\
    \ to quantify the broad socioeconomic and environmental implications of adaptation\
    \ policies in complex human\u2013water systems, and the uncertainty involved in\
    \ the process, so to allow stakeholders to explicitly trade-off incremental changes\
    \ in robustness with expected policy performance (e.g., cost-effectiveness)."
  175: "Navigating Deep Uncertainty Type 1: Modular Hierarchies for Multi-system Ensembles...\
    \ Exploratory modeling and analysis works as a prosthesis for the intellect, using\
    \ computational experiments representing the consequences of alternative sets\
    \ of feasible assumptions to discover the implications of a priori knowledge...\
    \ An ensemble of models can be used to sample uncertainty arising from parameter\
    \ and structural uncertainties. Economic and hydrologic sciences have been successful\
    \ at developing scientifically sound conceptual models capable of representing\
    \ the essence of critical systems within the human\u2013water conundrum."
  176: "Source material here.\nHowever, economics and hydrology have not been successful\
    \ at integrating human and water systems (Pande and Sivapalan 2017). Conventional\
    \ hydrologic (economic) models perceive pressures from human (water) systems,\
    \ if considered at all, as external forcings. Where socioeconomic and hydrologic\
    \ models interact in hydroeconomic models, responses to policy shocks or other\
    \ stimuli are typically assessed using an external economic sub-model, which is\
    \ subsequently integrated with the architecture of the hydrologic model through\
    \ piecewise equations. This offers the advantage of a more straightforward and\
    \ effective representation of causal relationships and interdependencies, while\
    \ reducing computational costs since shocks do not require to be represented separately\
    \ for each sub-model. Yet, such holistic models do not capture the interrelationships\
    \ or two-way feedbacks between human and water systems that shape adaptive responses\
    \ (Pande and Sivapalan 2017). As a result, the effects of policy- and climate-induced\
    \ adaptation and feedback responses between socioeconomic, land surface, and water\
    \ systems dynamics are still poorly understood. There is a basic need to better\
    \ understand the dynamics of complex adaptive human\u2013water systems and to\
    \ represent them in modeling tools that can be used to effectively inform policymakers.\
    \ To this end, the transformative discipline of socio-hydrology has called for\
    \ the development of integrated approaches that \u201Cexplicitly account for the\
    \ two-way feedbacks between human and water systems\u201D (Sivapalan et al. 2014).\
    \ Recent socio-hydrology-inspired science has explored feedback responses between\
    \ human (typically water users) and water systems (Essenfelder et al. 2018). In\
    \ parallel, economics has also developed new tools to explore feedback responses\
    \ in complex human\u2013human systems, notably between micro- and macro-economic\
    \ systems (Parrado et al. 2019). These contributions run standard models at each\
    \ system level independently in modules, which are de\uFB01ned as specialized,\
    \ self-contained mathematical elements that process information and generate outputs\
    \ and connect them through sets of protocols, which are de\uFB01ned as rules designed\
    \ to manage interrelationships (e.g. two-way feedbacks) between systems\u2019\
    \ modules (Csete and Doyle 2002). Modularity offers potentially higher detail\
    \ in the representation of each system, which can be independently developed and\
    \ adjusted. This makes possible the addition of non-linearity to each element\
    \ of the system, so that surprises are not so surprising and can be adequately\
    \ understood, and their repercussions transferred from one system to another.\
    \ While holistic models that use differential equations to capture as many systems\
    \ as possible in comprehensive numerical models have significant practical value\
    \ and continuing increases in computational power means, they can be systematically\
    \ upgraded and adjusted to more accurately represent observed responses in human\u2013\
    water systems, it is reasonable to say that \u201Cwe typically gain some understanding\
    \ of a complex system by relating its behavior to that of other, especially simpler,\
    \ systems\u201D (Held 2005). It is through hierarchies of systems of increasing\
    \ complexity, amenable to experimental manipulation that experimental sciences\
    \ such as biology have made steady progress in, e.g., deciphering the human genome.\
    \ Recently, climate research has put a stronger emphasis on model hierarchies\
    \ as a means to link the complexity of high-end holistic simulations with a deeper\
    \ understanding of the processes at work.\n"
  177: "The paper discusses the construction of protocol-based modular frameworks\
    \ to develop interdisciplinary modeling hierarchies that connect multiple systems\
    \ through two-way feedbacks.: \"I argue that recent advances in the construction\
    \ of protocol-based modular frameworks provide the backbone for the development\
    \ of interdisciplinary modeling hierarchies that connect multiple systems through\
    \ two-way feed-backs (multi-system hierarchy).\"\n\nThe modular hierarchies combined\
    \ with exploratory modeling and ensemble experiments aim to limit the impact of\
    \ modeling limitations by better representing models and scenarios across systems.:\
    \ \"We can explore ways to limit the impact of \u03B51 by adding and better representing\
    \ models and scenarios across systems. This is indeed the objective of combining\
    \ modular hierarchies with exploratory modeling and ensemble experiments.\""
  178: 'Source material here: The page discusses adaptive robustness and efficiency
    in institutions under deep uncertainty type 2, where future predictions are deemed
    impossible. The text identifies ''surprises'' and ''unforeseen shocks'' as factors
    impacting institutional effectiveness under deep uncertainty type 2. In addressing
    deep uncertainty type 2, the challenge is to strengthen adaptive robustness (Garrick
    2015). Adaptive robustness involves the removal of techno-institutional barriers
    that constrain our ability to take corrective action. Yet, past transaction costs
    can be used to draw valuable insights into the trends and future development of
    adaptively robust institutions.'
  179: "Source material here.\nit is reasonable to expect that institutions that have\
    \ proven to be adaptively efficient over long periods of time are more likely\
    \ to be adaptively robust in the future. ... Garrick (2015) associates adaptive\
    \ efficiency with \u201Cthree performance indicators: (1) how well the objective(s)\
    \ have been met (i.e. effectiveness); (2) the average public transaction costs\
    \ per unit of the met objective(s); and (3) total program budgets\u201D. For an\
    \ adaptively efficient institutional complex, these three performance targets\
    \ should be \u201Cincreasing, decreasing and sufficient\u201D, respectively (Garrick\
    \ 2015).\nAlthough recent research has monetized transaction costs of water policy\
    \ reform in South Africa, USA, and Australia, ... public transaction costs are\
    \ typically excluded from performance assessments ... In fact, transaction costs\
    \ remain \u201Ca black box concept\u201D for researchers.\n"
  183: "Source material\nAdaptation to climate change poses two recognized significant\
    \ types of risks to the private sector; (1) physical risks and (2) transitional\
    \ risks. As markets respond to climate-related policies and shifting demands from\
    \ customers and investors, opportunities as well as risks are presented. A very\
    \ recent and important policy development is the European Green Deal suggesting\
    \ the EU to reduce its emissions from 40 to 55% by 2030, and aiming to enable\
    \ European countries to meet their Paris Agreement targets. The shift required\
    \ for this transition highlights the challenges in terms of adapting business\
    \ models and decision-making tools, while also providing opportunities for innovation\
    \ and development in the private sector. Methods and guidances are considered,\
    \ with the ultimate goal being a harmonized methodology to create a detailed emissions\
    \ inventory and risk disclosure of a company\u2019s operations. It is suggested\
    \ that Environmentally Extended Input\u2013Output models initially be used as\
    \ a screening tool, in order to identify emission dense sectors. Process-based\
    \ LCA inventory data, collected through collaboration and transparency throughout\
    \ the value chain, can then be applied to increase the resolution of the decision-making\
    \ tool.\n"
  184: " \nassessment of the risks. There are several different types of risks associated\
    \ with climate change, it is, therefore, useful to split these into two large\
    \ recognized categories, namely; (1) transitional risks and (2) physical risks.\
    \ This paper addresses transitional risks with a focus on how they affect the\
    \ private sector. The aim of this paper is to point out some of the main challenges\
    \ facing the private sector in terms of adapting their decision-making and business\
    \ models to the current and future transitional climate risk while contributing\
    \ to a low-carbon economy and future. Transitional risks are systemic societal\
    \ responses to climate change induced by, e.g. governments, such as increasing\
    \ CO2 pricing and taxes, but also novel demands from, e.g. investors, customers\
    \ and the marketplace. The Task Force on Climate-Related Risk Disclosure (TCFD)\
    \ (2020) has outline three different types of transitional risks companies need\
    \ to assess as part of their analysis to comply with the TCFD recommendations\
    \ (Table 21.1).\nIt is important to note that transitional risks are not only\
    \ negative. To the diligent and responsible company, transitional risks represent\
    \ opportunities in the market, they can exploit via new market developments, improved\
    \ reputation and branding. From a corporate point of view, the transitional risk\
    \ climate change represents a significant disruption of the market, and they have\
    \ to adapt their business model to the new paradigm. The European Green Deal (EU\
    \ 2020a) is an example of a potentially significant transitional risk. One of\
    \ the objectives of the Green Deal is\n"
