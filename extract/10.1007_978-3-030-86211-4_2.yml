  112: "Source material here: The dynamic modelling of \uFB02ood risk considering\
    \ human\u2013\uFB02ood interactions is highly relevant for an effective \uFB02\
    ood risk management and as such for advancing climate change adaptation. Integrating\
    \ qualitative and quantitative data into socio-hydrological models supports the\
    \ simulation of real, long-term processes in human\u2013flood systems. Available\
    \ empirical data from recorded events can be used to calibrate and validate the\
    \ models. A promising approach is using Bayesian inferences in the modelling to\
    \ integrate qualitative and quantitative data...Coupling hydrological \uFB02ood\
    \ risk models with behaviour models in a socio- hydrological modelling system\
    \ captures the feedback processes across the human\u2013\uFB02ood systems. Important\
    \ recent advancements in quantifying human\u2013\uFB02ood dynamics and integrating\
    \ this knowledge into dynamic \uFB02ood risk modelling are the following...Thus,\
    \ we recommend to develop and use more process-based modelling systems based on\
    \ more detailed and comprehensive data also for large-scale \uFB02ood risk analyses."
  115: "Source material here.\nAbstract The Climate-\uFB01t.City service (https://www.climate-\uFB01\
    t.city) provides the best available scienti\uFB01c urban climate data and information\
    \ for public and private end users operating in cities. Within the Climate-\uFB01\
    t.City H2020 project, the bene\uFB01ts of urban climate information for end user\
    \ communities was demonstrated, considering services in diverse domains (Climate\
    \ and Health, Building Energy, Emergency Planning, Urban Planning, Active Mobility,\
    \ Tourism and Cultural Heritage) to improve decision-making and to help end users\
    \ to better address the consequences of climate.\n"
  116: "yaml\nEvaluation overview: \"The socio-economic impact assessment performed\
    \ in the Climate-\uFB01t.City project has demonstrated that, in all the cases,\
    \ there are actual and potential added values in terms of public service effectiveness,\
    \ economic impacts, policy innovation and social impacts. Further impact was also\
    \ revealed in terms of raising awareness by end users, policymakers and the general\
    \ public about climate change.\"\nDrivers of Risk: \"Urban areas are very vulnerable\
    \ to climate change impacts, because of the high concentration of people, infrastructure\
    \ and economic activity but also because cities tend to exacerbate climate extremes\
    \ such as heat waves and \uFB02ash \uFB02oods. In addition, the ongoing urban\
    \ expansion and the ageing of the urban population makes them particularly vulnerable...With\
    \ respect to water, the abundance of impermeable surfaces in cities leads to inundations\
    \ that are often far more intense than those occurring in rural areas\"\nQuantitative\
    \ material: No relevant information\nMethodology: \"In this paper, we will start\
    \ by describing how Climate-\uFB01t.City supports urban adaptation and its data\
    \ processing methodology\"\nHighlights: \"to establish a service that translates\
    \ the best available scienti\uFB01c urban climate data into relevant information\
    \ for public and private end users operating in cities... These diversi\uFB01\
    ed impacts offer a variegated landscape of sub-areas and stakeholders that are\
    \ touched upon by each climate service.\"\nMore Notes: \"to establish a service\
    \ that translates the best available scienti\uFB01c urban climate data into relevant\
    \ information for public and private end users operating in cities... In this\
    \ paper, we will start by describing how Climate-\uFB01t.City supports urban adaptation\
    \ and its data processing methodology (Sect. \u201CClimate-Fit.City Data\u201D\
    ) followed by a brief presentation of the Climate-\uFB01t.City service components\
    \ (Sect. \u201CClimate-Fit.City Services\u201D) and a brief re\uFB02exion on the\
    \ use of the Climate-\uFB01t.City data and services and the impacts that it generates\
    \ (Sect. \u201CConclusions\u201D).\"\n"
  118: "plaintext\n\"UrbClim focuses on heat stress and related meteorological variables\
    \ and indicators, while KU Leuven applies its rainfall downscaling statistics\
    \ methodology to focus on precipitation and \uFB02ooding.\"\n\n\"The urban boundary\
    \ layer climate model UrbClim is designed to cover individual cities and their\
    \ nearby surroundings at a very high spatial resolution.\"\n\n\"Urban climate\
    \ data (air temperature, humidity, wind speed) allows to derive urban maps for\
    \ climate hazards tailored to different sector needs such as heat wave days, cooling/heating\
    \ degree days, tropical nights, urban heat island intensities, temperature statistics,\
    \ etc.\"\n\n\"Urban climate data is further post-processed in combination with\
    \ 3D building and tree data into 1 m resolution human comfort indices for human\
    \ heat stress assessments at the scale of the urban agglomeration, around specific\
    \ urban locations (e.g. touristic sites, urban zoo, public squares).\"\n"
  119: "Source material here.\nHuman        activities        are        heavily \
    \       impacted        by        thermal        stress.        During       \
    \ extreme        heat        waves,\nthere           is           an         \
    \  uneven           ampli\uFB01cation           of           thermal         \
    \  discomfort           inside           the           cities           that \
    \          leads           to\neven            higher            impacts,    \
    \        increasing            human            mortality.            \nMoreover,\
    \            global            climate            projec-\ntions          consistently\
    \          point          towards          an          increase          of  \
    \        the          number,          duration          and          intensity\
    \          of\nheat             waves...\n Extreme              heat\ncauses \
    \             direct              impacts              on              human \
    \             health              due              to              increased \
    \             mortality,              discomfort              and\nmental    \
    \         illnesses             but             also             indirectly  \
    \           through             the             advance             of       \
    \      tropical             disease             vectors\nand                the\
    \                deterioration                of                air          \
    \      quality.                Moreover,                it                also\
    \                reduces                outdoor                and           \
    \     indoor\nlabour             productivity,             increases         \
    \    energy             consumption             for             air          \
    \   conditioning             (for             human\ncomfort         but     \
    \    also         to         avoid,         e.g.         server         and  \
    \       other         IT         infrastructure         overheating),        \
    \ deteri-\norates           transport           infrastructure           (e.g.\
    \           rail           buckling,           road           asphalt        \
    \   warps           and           melts)           and\nimpact          eco-systems.\
    \          Finally,          it          leads          to          lower    \
    \      agriculture          production,          makes          cooling\nof  \
    \      energy        production        more        dif\uFB01cult        and  \
    \      even        reduces        airfreight        cargo        (weight     \
    \   limit        at\ntake-off            is            reduced            in \
    \           case            of            very            warm            air\
    \            temperatures).\n...\nMore         details         about         the\
    \         generation         of         the         current         and      \
    \   future         primary         urban         climate\ndata         are   \
    \      documented         in         the         Climate-\uFB01t.City        \
    \ deliverable         5.2         (available         in         the         resource\n\
    section            of            the            project            website   \
    \         https://www.project.climate-\uFB01t.city/).            \nWithin    \
    \        Climate-\uFB01t.City,\ndemonstrations        have        been       \
    \ worked        out        on        the        impact        of        heat \
    \       for        active        mobility        (focus\non             cycling),\
    \             human             health             (heat\u2013health         \
    \    mortality),             building             energy             demand/indoor\n\
    comfort,           urban           spatial           planning           and  \
    \         urban           Zoo           management.\nBesides              the\
    \              heat              related              services,              Climate-\uFB01\
    t.City              also              demonstrated              the          \
    \    use              of\nurban      pluvial      \uFB02ooding      risk     \
    \ maps      for      climate      change      resilient      emergency      management.\
    \ \nFinally,             all             services             are            \
    \ co-designed             with             urban             end             users.\n"
  120: "Source material here.\n1. Drivers of Risk: \"Provides information on the sensitivity\
    \ of a city\u2019s bicycle traffic volume towards variations in meteorological\
    \ conditions.\" and \"The Urban Planning Service focuses on the influence of the\
    \ urban land use structure on the level and spatial distribution of heat stress\
    \ in urban areas.\"\n2. Methodology: \"Through modification of the input\u2013\
    land use layer, various city development scenarios can be simulated and the corresponding\
    \ distributions of the heat stress levels in the area of interest are modelled/re-calculated.\"\
    \ and \"Building Energy service support buildings design/maintenance to be better\
    \ adapted to the specific urban climate and future climates (indoor comfort) and\
    \ to lower energy consumption for heating/cooling. Meteonorm software (https://meteonorm.com/)\
    \ is upgraded in the Climate-fit.City project to include urban and climate change\
    \ effects.\"\n3. Highlights: \"The service aims at supporting climate-inclusive\
    \ bicycle traffic planning.\" and \"Various city development scenarios can be\
    \ simulated and the corresponding distributions of the heat stress levels in the\
    \ area of interest are modelled/re-calculated.\"\n4. More Notes: \"Climate-fit.City\
    \ services\" refers to bicycle traffic, zoo management, urban spatial planning,\
    \ and building energy services, all of which consider climate adaptation and future\
    \ climate impacts.\n"
