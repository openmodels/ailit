  130: "Source material here.\nYet, for much of the world, \uFB02ood hazard data are\
    \ absent or lack the accuracy and precision required for most practical applications,\
    \ including climate change impact assessment.\nThis opinion piece summarises recent\
    \ progress in the development of global \uFB02ood models (GFMs) in support of\
    \ \uFB02ood impact modelling and identi\uFB01es potential areas for model improvement\
    \ over the next 5\u201310 years. In summarising these advances, four key themes\
    \ emerge linked to topography, extreme \uFB02ow estimation, river network parameterisation\
    \ and numerical modelling of inundation.\nThe past decade has seen substantial\
    \ advances in the modelling of \uFB02ood inundation in data scarce areas along\
    \ with the emergence of global \uFB02ood models that could form the foundation\
    \ of global impact assessments."
  131: " \nclimate. The past decade has seen rapid advances in the modelling of \uFB02\
    ood hazards in data scarce areas where the traditional local scale engineering\
    \ approaches used in developed nations are not possible. Since it tends to be\
    \ possible to automate the production of such models, a focus on continental to\
    \ global scales applications has emerged. An example of the output from a GFM\
    \ can be seen in Fig. 15.1 where \uFB02ood depth is plotted for the region surrounding\
    \ Bangkok for a 1 in 100-year \uFB02ood hazard. Here, recent innovations in the\
    \ \uFB01eld of global \uFB02ood hazard mapping are reviewed with a steer as to\
    \ how these might support enhanced climate impact assessment.\n"
  132: "Source material: The ability of a GFM to estimate \uFB02ood hazard is broadly\
    \ contingent on four components, these are: The model of terrain elevations (DEM)....Below,\
    \ recent advances in each of these components are summarised...It is widely accepted\
    \ that airborne LiDAR data offer the most accurate terrain data for \uFB02ood\
    \ mapping...the latest revisions to these data seek to remove a multiple sources\
    \ of vertical errors including stripe noise, random errors, absolute bias, vegetation\
    \ bias and urban biases due to buildings (Yamazaki et al. 2017). The impact of\
    \ these error removal processes on the DEM can be substantial, as seen for the\
    \ example from the Mekong Delta in Fig. 15.2....Floods are shallow waves with\
    \ long wavelength and low amplitudes. As such, they are highly sensitive to the\
    \ terrain over which they \uFB02ow, which can both alter and block \uFB02ow pathways."
