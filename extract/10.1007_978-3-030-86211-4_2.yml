  124: "Source material: Abstract Sharing the burden of adaptation is key for the\
    \ agricultural sector in developing countries. ... This paper, we present weather-based\
    \ insurance schemes (WII), which are based on weather index objectively determined\
    \ for the speci\uFB01c agricultural region... For the agricultural sector in developing\
    \ countries, the losses will go from 3% under 1.5 \xB0C scenario to 7% under 2\
    \ \xB0C scenario (Masson-Delmotte et al. 2018). This anticipated information on\
    \ possible climate change-driven challenges... ... In this paper, we present weather-based\
    \ insurance schemes (WII), which are based on weather index objectively determined\
    \ for the speci\uFB01c agricultural region, and therefore the individual loss\
    \ assessment, which makes insurances too expensive, is not necessary. We present\
    \ the results of decisions based on perfect and imperfect weather forecasts and\
    \ conclude by offering insights in the difference of decision-making if a perfect\
    \ forecast might be available or not and the consequences for farmers income."
  125: " \n\"and climate-related risks for the agricultural sector are already jeopardizing\
    \ parts of the economy dependent on the agricultural outputs...\" \n\n\"A crop\
    \ insurance is one of the possible risks sharing mechanisms that might be implemented\
    \ to share the burden and be able to adapt to climate-related challenges.\"\n\n\
    \"In weather-based index insurance (WII) schemes, the payouts are based on weather\
    \ index objectively determined for the specific agricultural region, and therefore\
    \ the individual loss assessment is not necessary.\"\n\n\"We suggest that redistributing\
    \ the risk of agricultural failures through crop WII insurances is an appropriate\
    \ adaptation strategy that also might support SDG 2...\"\n\n\"Additionally, broad\
    \ implementation of weather insurance schemes would support not only SDG 2 on\
    \ zero hunger, but also SDG 10 on reducing inequalities and SDG 13 on climate\
    \ action...\"\n"
