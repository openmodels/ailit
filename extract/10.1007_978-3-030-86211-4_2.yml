  164: Advances in modeling infrastructure networks using a bottom-up approach focusing
    on data-rich representations of network attributes, resource flows, and socio-economic
    indicators. This would help inform adaptation planning objectives meant to improve
    systemic resilience. As the adverse effects of climate change are increasingly
    becoming unavoidable, calls for improving climate adaptation assessments have
    gathered interest at the global scale. Infrastructure policymakers and practitioners
    are now interested in understanding climate vulnerabilities and risks that capture
    the systemic nature of failure propagation seen across interconnected networks.
    This paper presents recent technical methodological and tool-based advances made
    in climate vulnerability, risk, and adaptation modeling of large-scale infrastructure
    networks. These methodologies adopt a bottom-up approach that focuses on creating
    data-rich representations of infrastructure network attributes, resource flows,
    and socio-economic indicators that are all used for quantifying direct and indirect
    risks to network assets exposed to extreme climate hazards at multiple scales.
    There is increasing evidence that climate change will increase variability of
    weather patterns, magnifying the severity of short-term shock events such as flooding,
    storms, heatwaves, while also extending long-term shock events such as droughts.
    Insights from different case studies are presented to show how such methodologies
    have been used in practice for informing different policy needs. The paper concludes
    by identifying the existing gaps and future opportunities for such bottom-up infrastructure
    network vulnerability, risk, and adaptation assessment methodologies.
  165: "Source material here.\nThe focus of this paper is on building data-driven\
    \ decision-making models and tools for evaluating the costs and bene\uFB01ts of\
    \ climate adaptation of infrastructure networks at different spatial scales. [...]\
    \ Among others, climate adaptation is becoming an important focus of national\
    \ and global infrastructure system planners, investors, and decision-makers who\
    \ are faced with new challenges of embedding adaptation planning into objectives\
    \ of managing sustainable development, economic prosperity, and demands of growing\
    \ population. [...] When it comes to infrastructures, some questions relevant\
    \ to informing climate adaptation include: (1) What are the key network locations\
    \ and assets exposed to current and future climate-change driven hazards? (2)\
    \ How do asset vulnerabilities and risks cascade across infrastructure networks?\
    \ [...] These methodologies and case studies are all from the experiences and\
    \ examples of work done in the Infrastructure Transition Research Consortium (ITRC\
    \ 2020), which aims to build data-driven models for the identification of spatial\
    \ network vulnerabilities and risks to support decision-making. [...] This paper\
    \ discusses how the above questions are being answered with generalized methodologies\
    \ supported by data-driven case studies in different countries and at the global\
    \ scale.\n"
  166: 'Source material here.

    Methodology: "The methodological steps toward a hybrid top-down and bottom-up
    climate vulnerability, risk, and adaptation assessment of infrastructure networks
    involve combining (Hall et al. 2019; Pant et al. 2020): (1) Climate hazard information
    that includes spatially correlated probabilities, magnitudes, and extents of hazard
    events under current and future climate scenarios; (2) spatial representations
    of network point and line assets to evaluate their exposures to various climate
    hazards; (3) direct vulnerability measures of the exposed network assets that
    quantifies the sensitivity of the assets to be damaged by varying severities of
    climate hazards; (4) network connectivity effects that capture how failures cascade
    from the directly damaged assets toward other assets either physically or through
    the flow of resources (goods, information, etc.); (5) indirect vulnerability measures
    that quantify the socio-economic effects resulting from disruptions of infrastructure
    network services in terms of numbers and monetary values attached to household
    and business customers; (6) further indirect vulnerability measures of impacts
    to the regional economic flows that quantify the effects of production and labour
    disruptions on the outputs of macroeconomic sectors; (7) measurements of risks
    as the product of the probabilities, exposures and direct and indirect vulnerabilities
    summed over all possible hazard and network failure and disruption scenarios;
    (8) quantifiable options for building resilience (to climate or any shock event)
    of individual assets and the networks that include, but are not limited to, upgrading
    existing design standards of assets to withstand more extreme shocks, incorporating
    backup options to substitute for disruptions of services provided from one network
    to another (e.g. electricity backup generators at railway stations), increasing
    network redundancy and rerouting"

    Drivers of Risk: "An example of such an approach is a global-scale assessment
    of lengths (in kilometers) and losses in asset damage costs (in US$) estimated
    for roads and railway assets exposed to multi-hazard risks (Koks et al. 2019)."

    Highlights: "Infrastructures operate as a ''system-of-systems'' of interdependent
    networks that are increasingly reliant on each other for services under normal
    working conditions, but which also create failure cascades from an originating
    asset toward the rest of the system-of-systems (Hall et al. 2019)."

