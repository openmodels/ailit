    Methodology: \"Adaptation is starting to happen in Europe. This provides a new\
    \ modelling challenge, as this existing adaptation needs to be integrated into\
    \ modelling baselines, in order to allow the analysis of the bene\uFB01ts of additional\
    \ action.\"\nHighlights: \"Very positively, the area of adaptation modelling is\
    \ evolving rapidly. Modelling studies are recognising and seeking to overcome\
    \ these challenges. The papers in this part discuss the above mentioned challenges\
    \ and identify or propose solutions to many of them.\"\nMore Notes: \"Adaptation\
    \ is governance- and problem-speci\uFB01c. Adaptation assessment, therefore, needs\
    \ to consider the wider policy landscape and other factors, not just climate,\
    \ and address multiple objectives. In the past, adaptation studies have somewhat\
    \ avoided these challenges by using stylised technical modelling to assess options.\
    \ Such studies are extremely valuable in raising awareness and providing early\
    \ policy-relevant information, but they do not provide the information for real-world\
    \ adaptation, especially for decision makers who need to act now (not in 2050).\"\
    \n"
  21: "\n\"Abstract This paper gives a targeted review on Integrated Assessment Models\
    \ (IAMs) with a focus on damage functions and adaptation modelling.\"\n\n\"Integrated\
    \ Assessment Models (IAMs) can be roughly distinguished according to their objective\
    \ as cross-sectoral optimization models (POMs) and economic assessment of climate\
    \ policies (PEMs) according to Toth (2005). The first are welfare-oriented optimal\
    \ growth or general equilibrium models; the second are numerical simulation models\
    \ for the cost minimization of climate policies in a partial or\u2014also\u2014\
    a general equilibrium framework.\"\n"
