    \ inaccuracy tend to bias simulations towards greater exposure estimates.\"\n"
  137: 'Source material here.

    This section describes a variety of models addressing the impacts of climate change
    and performance of adaptation measures on various economic sectors, productive
    assets or services, business operation and continuity and the environment. Climate
    emulator simulates effects of climate change which are used by dynamic vegetation
    models to assess the impacts on crop yields. A socio-economic land-use model simulates
    demand and trade of agricultural commodities, while adjusting commodity prices
    rather than assuming market equilibrium conditions. Water Resource System models
    are forced by climatic boundary conditions to simulate river and groundwater discharge.
    System simulation models represent rules for water withdrawal, storage and allocation
    of water across various users. Pulido-Velazquez et al. describe a combination
    of top-down and bottom-up approaches to assess climate change impacts at the local
    scale with vulnerability assessment and definition of socioeconomic scenarios.

    '
  138: "yaml\nMethodology: \"Pant reviews challenges and advancements in modelling\
    \ vulnerability of large-scale infrastructure networks... Better models need to\
    \ take into account the probabilities, often correlated, and the intensities of\
    \ weather- and climate-related extremes, networks\u2019 exposure and vulnerability\
    \ to these events, network connectivity through which the cascading effects are\
    \ propagated and effects of networks\u2019 disruption on society and economy.\
    \ Climate proo\uFB01ng of infrastructure systems includes revising design standards,\
    \ incorporating backup options to substitute for disrupted services, increasing\
    \ network redundancy, rerouting options and speeding up the recovery of damaged\
    \ assets.\"\nMethodology: \"P\xE9rez-Blanco describes an interdisciplinary, replicable\
    \ and scalable framework which combines methods developed in (socio-)hydrology\
    \ and economics to assess implications of adaptation policies in complex human-water\
    \ systems and control trade-offs between robustness of adaptation choices and\
    \ their performance.\"\nMethodology: \"Sanderson and Stridsland address transitional\
    \ risks as de\uFB01ned by the Task Force on Climate-Related Risk Disclosure (TCFD)\
    \ and which include risks associated with market and technology shifts, loss of\
    \ reputation and policy and legal challenges... For the latter can be addressed\
    \ by Environmentally Extended Input Output models, Life Cycle Assessments or a\
    \ combination of both (hybrid models).\"\nMethodology: \"Insurance and risk transfer\
    \ instruments can not only be used to provide protection against climate-related\
    \ damage and losses, they can be designed to reward individual or collective risk\
    \ reduction and adaptation to climate change. Scholer and Schuermans offer several\
    \ examples in which insurance can play an important role\"\n"
