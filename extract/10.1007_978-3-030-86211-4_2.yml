    Drivers of Risk: "Although, the observational evidence that climate change has
    an impact on extreme river flows is weak, with discharge trends rarely clear outside
    of catchments that have experienced substantial human modification."

    Methodology: "For extreme event simulation, it is necessary to estimate flows
    at ungauged sites using either regionalisation of extreme discharge observations
    from gauging stations or discharges simulated by a hydrological model over a long
    period."

    Methodology: "Estimating extreme flows from hydrological modelling is appealing
    because flow estimates can be made for any location and the models can be forced
    by either observed or simulated weather... However, substantial uncertainties
    in the forcing, model structure and parameterisation of large-scale hydrological
    models means that biases can be expected in flow simulation..."

    Highlights: "Although, the observational evidence that climate change has an impact
    on extreme river flows is weak... Considering climate impacts with this method
    is therefore difficult..."

    More Notes: "Nevertheless, a detailed intercomparison of GFMs based on the gauged
    and hydrological modelling methods have yet to be undertaken and numerous advancements
    in local scale modelling have yet to be applied at global scales."

