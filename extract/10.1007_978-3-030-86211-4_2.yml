  27: Socioeconomic studies on adaptation based on bottom-up approaches have been
    focusing mainly on local impacts of weather-related variations, thereby neglecting
    potential remote impacts. [...] By contrast, impact assessment studies using top-down
    approaches, such as multi-region, multi-sector computable general equilibrium
    (CGE) models, provide a consistent framework to capture potential remote impacts,
    which occur through cross-sectoral and cross-regional interactions. [...] Economic
    theory provides a formal link between descriptions of individual behaviour and
    economic drivers on the national level. This is the idea behind the macroeconomic
    model GRACE, which is based on a standard description of relationships between
    economic activities in countries and describes how they depend on the activities
    in other countries [...] Here we present main findings of our economic impact
    assessments of climate change and adaption modelling. [...] Attempts to consistently
    integrate lessons from studies of impacts and adaptation in a model that addresses
    cross-sectoral impacts indicate how important interdependencies across sectors
    are.
  28: The GRACE model is a global computable general equilibrium model, which uses
    data from the national accounts, collected by GTAP (Global Trade Analysis Project)
    data base. The GTAP database is used to calibrate the demand and production systems
    in the model. They thereby provide supply and demand functions (curves on the
    right), and the model finds the combination of prices and quantities under the
    assumption of market [...] can be used to assess the trade-offs between climate
    change mitigation and adaptation policies. The regional and sectoral aggregation
    is flexible depending on the scope and focus of a study.
  29: "Source material here.\nequilibrium, where supply equals demand. Economic growth\
    \ is driven by underlying changes in population (labour force), capital (investments\
    \ and technological change), availability of natural resources and impacts of\
    \ climate change.\n\nThe GRACE model confirms that without mitigation policies,\
    \ the impacts of climate change on economies can be large, which implies high\
