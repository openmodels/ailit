  88: 'The approach has an added advantage for regular risk assessments that it can
    be updated as new scenarios appear, without needing to re-run the underlying impact
    models. Conclusions and Recommendations: Based on previous analyses such as those
    illustrated above, we conclude that there are three challenges requiring special
    attention in this new model-based approach to risk assessment: (a) ensuring the
    salience and credibility of the impact modelling conducted and outputs obtained,
    through engagement with relevant stakeholders, (b) co-exploration of the capabilities
    of current impact models and the need for improved representation of adaptation
    and (c) co-identification of critical thresholds for key impact indicators and
    effective representation of uncertainties.'
  90: 'Source material here.

    Landslide risk management involves several activities, modelling being a required
    premise for most of them. Modelling of climate-induced landslides include both
    the analysis of the triggering process, i.e. static slope stability analysis and
    dynamic propagation (run-out) analysis. [...] The use of vegetation as NBS is
    increasingly being used for erosion protection and shallow landslide mitigation.
    [...] Even though there is an increasing activity in the geotechnical environment
    to incorporate the effects of vegetation in the modelling for quantifying the
    change in slope stability (i.e. calculate slope safety factor), the status is
    far from being at the level of traditional landslide modelling tools. More efforts
    are therefore needed in the years to come to demonstrate that the use of vegetation
    as a viable and effective measure in landslide risk mitigation management can
    be verified in a more quantifiable manner. [...] With the prospect of increasing
    rainfall duration and intensity in parts of Europe, the need for further development
    of modelling tools is evident.

    '
  91: " \nLandslide risk management in the context of climate change has been a profiled\
    \ study for more than a decade. Many studies have shown that a change in rainfall\
    \ duration and intensity will cause an increase in natural water-induced phenomena,\
    \ such as floods, soil erosion and landslides in large parts of Europe, with damaging\
    \ effects on people, infrastructure, housings and the environment. \nA premise\
    \ for sound landslide risk management is modelling of triggering and run-out phenomena,\
    \ to determine location and extent of potential landslides and thus the selection\
    \ of appropriate risk reduction measures.\nThe focus of the paper will be on modelling\
    \ of slope stability with the use of vegetation. \nThe thresholds for landslide\
    \ triggering are affected by long-term precipitations in areas that are covered\
    \ by deep deposits of fine-grained soils, while they are controlled by short-term\
    \ precipitations in areas with shallower deposits with coarse-grained soils. For\
    \ shallow landslides, the soil\u2013atmosphere interaction is a major factor influencing\
    \ the slope stability.\n"
  92: null
  93: " \n\"Climate change will cause a change of rainfall patterns and intensity\
    \ in large parts of Europe. This will lead to an increased probability for rainfall-induced\
    \ landslides with high destructive potential for exposed infrastructure.\"\n\"\
    NBS can represent a sustainable, efficient and cost-effective approach... to reduce\
    \ the societal risk associated with climate change and enhanced precipitation.\"\
    \n"
  94: "The major findings are that the use of vegetation for landslide protection\
    \ have two positive effects and one potential negative effect: (i) the strength\
    \ of the soil increases due to roots and binding of soil layers, (ii) the pore\
    \ water pressure is reduced due to plant\u2019s uptake and canopy cover, (iii)\
    \ vegetation may destabilize slopes in connection with strong winds (this is valid\
    \ only for trees). These are all effects that may be modelled, but as the studies\
    \ show there are a lot of uncertainties related to this aspect. Examples of challenges\
    \ with regard to modelling include the following: The undrained shear strength\
    \ depends on the type of roots, the position of the main roots network and the\
    \ season of the year. The effect of reduced soil water content and induced soil\
    \ suction is highly uncertain and can vary considerably from case to case, also\
    \ in relation to the distribution and vegetation density along the slope. Landslide\
    \ modelling when including the vegetation contribution in slope stability analyses\
    \ will be more complex, due to the coupled effect that they provide to the soil:\
    \ (i) hydrological, through the soil\u2013vegetation\u2013atmosphere interaction\
    \ and (ii) mechanical, through the root\u2013soil interaction."
  95: "Source material: precipitation events are often linked to the triggering of\
    \ landslides, but it is the change in pore water pressures that leads a slope\
    \ to fail ... The approach consists of two main parts: (i) hydrological modelling,\
    \ to assess the pore water pressure regime and (ii) slope stability modelling,\
    \ to assess the safety factor ... many soil parameters as well as hydraulic processes\
    \ (water \uFB02uxes) are function of the vegetation. A tentative to categorize\
    \ the effects of vegetation on the input data has been done on the base of whether\
    \ they are function of the root features (mostly density, architecture and depth)\
    \ or the canopy (type of aboveground vegetation)."
  97: "Source material here.\nEvaluation overview: No overview of specific outcomes\
