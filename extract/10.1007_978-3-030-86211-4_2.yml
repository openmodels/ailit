  31: " \nThe impacts to the local households gives a very different picture of the\
    \ vulnerability of people in the agricultural sector in Nepal than what comes\
    \ out of the macroeconomic analysis. The impacts differ also depending on the\
    \ size of the farms disposed by the different households. \n\nThe impacts of climate\
    \ change refer to the projection for Bamrang Khola in the climate projection for\
    \ Nepal used in the macroeconomic analysis indicating a reduction in the productivity\
    \ of land at two percent and health effects, which reduces the productivity of\
    \ work by 2.4 percent. \n\nThese impacts are disregarded in the macroeconomic\
    \ assessment. The second message is the difference between the estimated impacts\
    \ on the Nepalese economy in the macroeconomic assessment and the impacts to households\
    \ in the micro-based assessment, despite the attempt to base both on the same\
    \ description of the future.\n\nDescriptions of the sources of livelihood among\
    \ smallholders (e.g., consumption of own produced goods, products bought in market\
    \ and work time spent on own farm and outside the farm) were collected from interviews\
    \ of 60 households in Bamrang Khola village in Khotang district of Nepal (Aaheim\
    \ el al. 2017a).\n\nWhile GDP and consumption are reduced by approximately 0.25\
    \ percent in Nepal according to the macroeconomic analysis, sources of livelihood\
    \ for most of the smallholders are reduced by more than two percent, depending\
    \ on the size of the farm, according to the household study.\n\nFirst, the output\
    \ is constrained by the size of the farm. Second, there is a division between\
    \ food products sold in markets and food for the farmers\u2019 own consumption.\
    \ Third, farmers can work outside the farm to gain monetary income. Hence, their\
    \ consumption is partly based on market transactions.\n\nThe message from this\
    \ study is, firstly, that the constraints related to the farm size puts strong\
    \ limitations to adaptation in most of the farms. \n"
  32: "Source material here.\nAdaptation to Heat Stress Orlov et al. (2020) conducted\
    \ an economic impact assessment of heat-induced impacts on worker productivity\
    \ under RCP2.6 and RCP8.5. The authors implement autonomous adaptation in the\
    \ GRACE model, such as penetration of air conditioners and mechanization of outdoor\
    \ work in agriculture and construction, which were linked to different SSPs. Projections\
    \ of mechanization for different SSPs were extrapolated based on a regression\
    \ analysis, where the number of tractors per hectare was used as a proxy for mechanization\
    \ and GDP per capita as an explanatory variable. Results from model simulations\
    \ showed that under RCP8.5 by 2100, heat-induced reductions in worker productivity\
    \ lead to an average decline of 1.4% in GDP relative to the reference scenario\
    \ with no climate change (see Fig. 2.2). This is approximately 0.4 percentage\
    \ points less than when no autonomous mechanization is assumed.\nThe image is\
    \ a set of two line graphs displaying projected data from 2010 to 2100. These\
    \ graphs compare two scenarios: \"Hothaps\" on the left and \"ISO\" on the right.\
    \ Both graphs present the percentage change over time.\n\nCommon Elements:\n-\
    \ X-Axis (Horizontal): Represents the years from 2010 to 2100.\n- Y-Axis (Vertical):\
    \ Represents percentage change (negative values).\n- Lines and Shading: \n  -\
    \ Solid lines represent outcomes with \"mechanisation.\"\n  - Dashed lines represent\
    \ outcomes with \"no mechanisation.\"\n  - Two colors depict different Representative\
    \ Concentration Pathways (RCP): \n    - Green for RCP26\n    - Orange for RCP85\n\
    \  - Shaded areas around the lines illustrate uncertainty ranges.\n\nOverall,\
    \ both scenarios show a downward trend, with wider uncertainty under higher emissions\
    \ scenarios (RCP85). Mechanisation generally reduces the severity of decline in\
    \ both scenarios.\n"
  33: "yaml\nMethodology: \"Drawing from the results of above presented studies, we\
    \ emphasise the importance of adaption measures and policies to deal with adverse\
    \ climate-induced impacts...Furthermore, we identify several challenges for incorporating\
    \ adaptation into global macroeconomic models.\"\nMethodology: \"While most of\
    \ local studies on adaptation using bottom-up modelling approaches neglect potential\
    \ remote impacts, top-down economic models, such as CGE models, feature great\
    \ macroeconomic consistency and can capture cross-sectoral and cross-regional\
    \ interactions...However, due to modelling complexity, multi-region multi-sector\
    \ macroeconomic models are very aggregated and underly simpli\uFB01ed assumptions.\"\
    \nMethodology: \"The examples above show the potential for improving the linkages,\
    \ for instance, by informing the top-down modelling by re\uFB01ning the modelling\
    \ assumptions or damage functions with local insights from interviews or \uFB01\
    eld experiments.\"\nMethodology: \"To bridge the top-down/bottom-up divide in\
    \ adaptation modelling, more interdisciplinary studies involving the combination\
    \ of two approaches are needed.\"\nHighlights: \"Therefore, there is a big potential\
    \ in the complementarity of top-down and bottom-up approaches, which is not yet\
    \ fully realised.\"\nHighlights: \"Therefore, a better integration of proactive\
    \ adaptation under uncertainties into macroeconomic models is needed.\"\n"
