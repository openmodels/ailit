    \ drier\u2026 economic activities, especially on agriculture, which is, as mentioned\
    \ at the begin- ning, the most sensitive sector\u2026 the stochastic dynamics\
    \ of actual weather index were simulated with a stationary random process. However,\
    \ the climate is changing\u2026 By generalizing the proposed modelling scheme\
