    data.
  173: Focuses on robust decision-making under deep uncertainty, using a modeling
    hierarchy to assess policy performance and a longitudinal analysis of public transaction
    costs.
  174: The paper argues for the integration of socio-hydrology and economics to develop
    a research framework addressing deep uncertainty in human-water systems.
  175: The analysis uses exploratory modeling and multi-model ensembles to address
    deep uncertainty in complex human-water systems.
  176: The paper discusses different approaches to modeling human-water systems, including
    conventional hydro-economic models (which treat human systems as external forcings),
    holistic models, and modular approaches. It advocates for integrated approaches
    like socio-hydrology that explicitly account for the two-way feedbacks between
    human and water systems. It also suggests using model hierarchies to link the
    complexity of high-end simulations with a deeper understanding of the underlying
    processes.
  177: The paper discusses the construction of protocol-based modular frameworks to
    develop interdisciplinary modeling hierarchies that connect multiple systems through
    two-way feedbacks.
  178: This analysis focuses on evaluating institutions' adaptive robustness and efficiency
    amid deep uncertainty type 2, where future predictions are deemed impossible.
