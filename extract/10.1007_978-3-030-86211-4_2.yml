    "In this short note, we propose a systematic method of climate change impact and
    adaptation assessment designed to be conducted at national or sub-national scale
    within a risk framework."

    "Specifically, we seek to test the feasibility of applying impact models across
    sectors within a standard analytical framework for representing three aspects
    of potential relevance for policy: (i) sensitivity... (ii) urgency... (iii) response..."

    "By working with observable indicators, the approach is also amenable to long-term
    monitoring as well as evaluation of the success of adaptation, where this too
    can be simulated."

