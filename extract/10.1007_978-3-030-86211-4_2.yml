  58: "Source material here.\n\"By embracing the uncertainty, we are satis\uFB01cing\
    \ rather than optimising investments: some say we are seeking to minimize regret\
    \ or maximize resilience through robust decision making (Weaver et al. 2013).\
    \ Hence, robustness and resilience frameworks focus on testing decisions; climate\
    \ model information is applied much later in the work\uFB02ow to identify conditions\
    \ under which there may be trade-offs or even break-points in performance.\"\n\
    \n\"Robust decision making frameworks for adaptation option appraisal typically\
    \ comprise of four main elements. These are as follows: (1) portfolios of management\
    \ options; (2) models of the system being managed (including inputs and drivers\
    \ of change); (3) project performance metrics; and (4) options appraisal criteria.\"\
    \n\n\"Moreover, decision-centric frameworks are participatory and iterative in\
    \ ways that enable managers and analysts to reach a shared understanding of key\
    \ system vulnerabilities and adaptation goals.\"\n"
  59: "Source material here: Physical experiments or system models (see below) can\
    \ then be used to evaluate (i.e., stress test) how such measures or combinations\
    \ of measures perform under speci\uFB01ed scenarios of change. Finally, control\
    \ experiments or counterfactual simulations are needed to benchmark outcomes \u2018\
    with\u2019 versus \u2018without\u2019 adaptation. Field trials can be an effective\
    \ way of obtaining such evidence as well as demonstrating adaptations in practice\
    \ (Wilby et al. 2010). For instance, a hotter-drier climate change scenario might\
    \ imply vegetation die-back, wild\uFB01res, or more dust on snow episodes that\
    \ favour earlier snowmelt and more rapid rainfall-runoff."
