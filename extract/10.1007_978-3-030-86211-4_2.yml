    effects to understand the cascading failures and socio-economic impacts.
  167: "A cost\u2013benefit analysis is performed to prioritize investment decisions\
    \ for adaptation planning. This involves evaluating initial investment costs,\
    \ routine maintenance costs, and periodic maintenance costs over the asset's life\
    \ cycle. The methodology is intended as a high-level screening to compare adaptation\
    \ options and identify locations with high adaptation benefits. Case studies demonstrate\
    \ the application of the methodology to inform decision-makers about quantifiable\
    \ vulnerabilities and risks to infrastructure networks at the national scale."
