  141: "Source material here.\nthe global food system and socio-economic development\
    \ can be simulated over long-term predictions, thanks to the new combination of\
    \ multiple models into the Land System Modular Model (LandSyMM). LandSyMM takes\
    \ into account the impacts in changes in climate (i.e. temperature, precipitation,\
    \ atmospheric greenhouse gas concentrations) and land management on crop yields\
    \ with its implications for land allocation, food security and trade. \nThis new\
    \ coupled model integrates, over \uFB01ne spatial scale, the interactions between\
    \ commodities consumption, land use management, vegetation and climate into a\
    \ worldwide dynamic economic system.\nThis study offers an outline description\
    \ of the LandSyMM as well as the perspectives of uses for climate adaptation assessment.\n"
