  67: 'Source material: Adaptation consisted of a combination of changes of sowing
    dates, cultivar and water management. Simulating wheat responses to climate change.
    CERES-wheat crop model within DSSAT platform (Hoogenboom et al. 2019) was used
    for simulating wheat responses to climate change. Another option was supplementary
    irrigation, consisting of a single application of 40 mm at flowering. Ensemble
    modelling is a technique widely used in climate and also in agricultural projections,
    ideally, combining outputs from several climate models and crop models [...] estimating
    the joint uncertainty from climate and crop modelling. Application of the AOCK
    approach, which consists in defining study-specific disqualifying criteria to
    be part of the ensemble, prevents for including inconsistencies that affect ensemble
    results [...] This approach is able to provide insights and improve ensemble effectiveness.'
  68: "yaml\nMethodology: \"The analysis is performed as application of the multi-model\
    \ ensemble modelling, AOCK and IRS and ARS\"\nMethodology: \"Finally, we develop\
    \ an index of wide applicability for reducing the uncertainty, the so-called Ensemble\
    \ Outcome Agreement (EOA) to assessing the con\uFB01dence of the decisions taken\
    \ regarding a threshold level\"\nHighlights: \"As application of the multi-model\
    \ ensemble modelling, AOCK and IRS and ARS, recommendations for adaptation of\
    \ wheat in Spain were produced as shown in Table 3 of Ruiz-Ramos et al. (2018).\
