Highlights:
  7: Presents practical approaches to conduct adaptation assessments to guide decision
    makers at different governance levels.
  9: The strategy shifts the focus from understanding the problem of climate change
    to developing solutions and moving from planning to implementation.
  10: Emphasizes importance of adaptation modelling for informed decision-making;
    notes the EU's strategy for adaptation includes developing rapid response solutions
    and enhancing the toolbox for adaptation practitioners.
  11: The project aimed to highlight research and policy gaps in the field of climate
    adaptation assessment methodologies.
  17: Adaptation requires a mix of interventions, including non-technical options
    like capacity building, which are critical but difficult to model.
  18: Adaptation modeling is rapidly evolving, and papers in the discussion identify
    and propose solutions to challenges in this area.
  22: Recent IAM generations introduce climate catastrophes and aim to address criticisms
    of lack of transparency.
  27: The paper presents findings on economic impact assessments of climate change
    and adaptation modelling, highlighting interdependencies across sectors.
  29: RCP4.5 might represent an optimal global strategy for stabilizing long-term
    climate impacts but implies challenging increases in emission reduction costs.
  30: Adaptation in forest management and harvesting can lead to positive economic
    impacts on the value added from forests, even under climate change.
  31: The study highlights the strong limitations to adaptation due to farm size constraints
    and a noticeable reduction in livelihood sources for most smallholders, despite
    macroeconomic assessments indicating smaller impacts.
  32: Mechanization driven by economic growth can reduce the negative impacts of heat
    stress on worker productivity and GDP. The economic impacts are greater under
    RCP8.5 than under RCP2.6.
  33: There is a need for better integration of proactive adaptation under uncertainties
    into macroeconomic models.
  36: Climate services are seen as ever-green enablers of smarter, systemic, and timely
    climate action by informing decision-making across various sectors.
  37: Recommendations for climate services science, research and innovation grouped
    under setting standards, quality control, legal and ethical considerations, authoritative
    voice, knowledge transfer, capacity building, mainstreaming climate services,
    balancing science, research, innovation and market growth, and sustainable climate
    data sources.
  40: Emphasizes the importance of climate services in missions such as 'Accelerating
    the transition to a climate-prepared and resilient Europe', and acknowledges the
    increased understanding and accessibility of climate services.
  42: The page emphasizes the requirement for climate adaptation decision-making to
    be built on credible, relevant, and legitimate information.
  44: Dutch climate scenarios condense ~250 global/regional climate projections into
    four scenarios for stakeholders.
  45: Temperature increase with mild winters and hot summers becoming more common;
    increased winter precipitation, sea level rise impacting high sea levels, and
    variability in effects based on scenarios.
  46: Storyline approaches enrich the understanding of drivers, implications, and
    adaptation options of future climatic challenges.
  48: Global sensitivity analysis can enhance stakeholder confidence in model projections
    and adaptation strategies by demonstrating parameter control over model output,
    understanding output robustness to input uncertainties, and assessing changes
    in modeled processes with climatic conditions.
  50: Model parameters reflecting intervention levers must exert adequate control
    on model output.
  51: In the short and mid-term, the wave setup parameter dominates, suggesting its
    uncertainty is often neglected in coastal hazard assessments.
  52: The study finds that dominant drivers of coastal defense vulnerability change
    significantly over time, with global sea-level rise becoming the most dominant
    factor by 2100.
  53: Dominant modelled processes in rainfall-runoff models change along climatic
    gradients. Sensitivity analysis can be applied regardless of whether observations
    of the system response are available, thus making it suitable for understanding
    the behaviour of models under potential future conditions.
  54: Global sensitivity analysis strengthens confidence in climate change impact
    models.
  56: Stress-testing helps establish conditions under which there may be trade-offs
    between or even failure of project deliverables; robust decision-making frameworks
    are recommended for evaluating project performance; simple rules may help operationalize
    findings of trials.
  60: Shading can provide significant cooling benefits for river water temperatures,
    which is critical during heatwaves to prevent lethal/sub-lethal conditions for
    aquatic biota.
  61: Indicates modest adaptation benefits through narratives and stress-tests in
    water system management.
  62: Deep uncertainty about the future climate are not impediments to adaptation
    planning and options appraisal; Stress-testing can reveal the efficacy of adaptations,
    as well as key system vulnerabilities and residual risks; Portfolios of adaptation
    options and decision-relevant metrics should be co-produced by analysts.
  64: No relevant information
  65: Effective management of uncertainty can increase the applicability and assimilation
    of scientific results and reduce the probability of maladaptation.
  68: Using the EOA index, promising adaptation options with low confidence can be
    discarded in favor of those with more confidence.
  69: Early and standard sowing dates combined with standard and longer cultivars
    are recommended for adaptation and recovery under moderate perturbations with
    high confidence.
  71: The decomposition of risk is a helpful framework for understanding climate change
    impacts and adaptation.
  73: The selection of the best possible coastal management measures to reduce risks
    at coastal areas, considering costs, effectiveness and acceptance, will be mandatory
    in the future.
  74: A significant finding is the need for coastal authorities to implement Disaster
    Risk Reduction and PMP measures, and the importance of designing effective adaptive
    measures for densely populated coastal areas.
  76: The paper highlights the importance of simulating different DRR measures and
    their effectiveness in reducing risks through modeling under various conditions.
  77: Preparedness levels for coastal areas can be improved with early DRR assessments,
    allowing for optimal resource allocation and defining implementation timeframes
    for measures.
  78: "Importance of understanding vulnerability through historical damage analysis\
    \ and advocating for cost\u2013benefit analysis of DRR measures, including ecosystem\
    \ services."
  79: The paper emphasizes the need for integrating morphodynamic models, climate
    change predictions, and disaster risk reduction measures to optimize coastal management
    actions.
  81: 'Three challenges identified: ensuring salience and credibility through stakeholder
    engagement, exploring capabilities of current impact models, and co-identifying
    critical thresholds and uncertainties.'
  83: Four suggestions for improving climate change adaptation simulations include
    embracing scenario uncertainty, working with stakeholders, including positive
    adaptations, and considering adaptation alongside mitigation.
  85: IRSs are increasingly used to illustrate impact model sensitivity to climate
    variables like temperature and precipitation in various sectors.
  86: Adaptation measures can lower the likelihood of surpassing critical impact thresholds.
  87: "The paper highlights the large risks of in\uFB02ow decrease and increased risk\
    \ of water scarce conditions for the Vale do Gaio reservoir, as well as the potential\
    \ of switching to crops with smaller water demand to increase irrigated area,\
    \ albeit with enhanced sensitivity to rainfall changes. The paper also illustrates\
    \ that site-based risk assessment can be extended to national scale for crop yield\
    \ risk by constructing likelihood curves for representative sites in different\
    \ regions."
  90: The use of vegetation for landslide mitigation is increasing, but current modeling
    tools are not yet at the level of traditional landslide modeling and require further
    development.
  91: "Thresholds for landslide triggering are affected by long-term precipitations\
    \ in areas with deep deposits of \uFB01ne-grained soils, while they are controlled\
    \ by short-term precipitations in areas with shallower deposits with coarse-grained\
    \ soils. For shallow landslides, the soil\u2013atmosphere interaction is a major\
    \ factor in\uFB02uencing the slope stability."
  93: Nature-Based Solutions (NBS) can offer a sustainable, efficient, and cost-effective
    approach to mitigate the societal risks associated with climate change and enhanced
    precipitation.
  94: Vegetation can have both positive (increased soil strength, reduced pore water
    pressure) and negative (destabilization from strong winds) effects on landslide
    protection.
  95: Vegetation affects soil input data based on root features and canopy type, influencing
    hydraulic processes and soil parameters.
  97: Emphasizes the need to model the time-spatial variation of vegetation effects
    on slopes and highlights the necessity to study the risks posed by extreme events
    like droughts and heavy rainfall leading to flash floods.
  99: Crop models require suitable experimental data to parameterize additional crops
    for effective climate resilience modeling.
  100: Diversification of crop rotations is considered a strategy to increase resilience
    under climate change.
  101: The paper highlights the variability and uncertainty in model results, the
