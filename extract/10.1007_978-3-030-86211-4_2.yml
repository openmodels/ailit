  37: "Source material here.\nOver the past \uFB01ve years there have been some reviews\
    \ and shared perspectives on research and innovation gaps undertaken under various\
    \ guises. The following provides highlights of the results of three of these.\n\
    \nFollowing a stakeholder engagement workshop (November 2017) held at the request\
    \ of the European Commission (linked to the informal DG RTD European Climate Services\
    \ Roadmap Implementation Working Group), a position paper was prepared by Climateurope\
    \ (2018) summarising deliberations in the form of recommendations for climate\
    \ services science, research and innovation.\n\nThe main messages and advice were\
    \ grouped under the following:\n\x81 Setting standards, quality control, quality\
    \ assurance and evaluation [Linked to Roadmap Challenge 2].\n\x81 Legal and ethical\
    \ considerations [Linked to Roadmap Challenge 2].\n\x81 Authoritative voice [Linked\
    \ to Roadmap Challenge 2].\n\x81 Knowledge transfer/brokering, communication and\
    \ user engagement [Linked to Roadmap Challenge 2].\n\x81 Capacity building [Linked\
    \ to Roadmap Challenge 2].\n\x81 Mainstreaming climate services [Linked to Roadmap\
    \ Challenge 2 and Challenge 1].\n\x81 Balance between underpinning science, research,\
    \ innovation and market growth [balance investments across the three Roadmap challenges].\n\
    \x81 Sustainable climate data sources [Linked to Roadmap Challenge 2].\n\nAs indicated,\
    \ the resulting stakeholder assessment is consistent with aspects of the Roadmap\
    \ challenges and activities. The apparent focus of the identi\uFB01ed gaps suggests\
    \ that at that stage in time the engaged stakeholders (users, providers and researchers)\
    \ believed there was a need to continue efforts focusing on building the market\
    \ framework and also recognised the need to retain an appropriate balance in investments\
    \ that continued supporting the underpinning research and associated infrastructure,\
    \ in addition to supporting innovations. The highlighting of this latter area\
    \ was to some degree the result of concerns regarding the increasing focus on\
    \ innovations.\n\nClimateurope (2019) provides recommendations for the Horizon\
    \ Europe (HEUR) framework programme on research needs for climate modelling and\
    \ climate services. These recommendations were elaborated within Climateurope\
    \ by a group of European experts in climate modelling and climate services and\
    \ were prepared under the coordination of a small group of scientists from various\
    \ European research institutions participating in the project. Recommendations\
    \ directly related to climate services were presented as follows:\n\_\x81 Supporting\
    \ the formulation of adaptation strategies\u2014systematic availability of impact-oriented\
    \ projections and up-to-date near-term predictions downscaled to local scale,\
    \ process understanding, models and infrastructure, downscaling, along\n"
