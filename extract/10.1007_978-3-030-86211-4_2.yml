  237: "A. F. Fernandes and F. McGovern\nIntroduction\nThe Joint Programming Initiative\
    \ \u201CConnecting Climate Knowledge for Europe\u201D (JPI Climate) is an initiative\
    \ of EU Member States and Associated Countries, in cooperation with the European\
    \ Commission (EC). JPI Climate, comprised of representatives of ministries and\
    \ organisations for research funding, aims through its programme of activities\
    \ to connect research, performers and funders across Europe to promote the creation\
    \ of new knowledge in the natural and anthropogenic climate change domain that\
    \ is fundamental and relevant for decision support.\nJPI Climate\u2019s mission\
    \ is to align and inform strategies, instruments, resources and actors at national\
    \ and European levels by connecting the various research communities with research\
    \ funders and performing organisations, within and across European countries,\
    \ and beyond Europe.\nSince its establishment, JPI Climate has been at the centre\
    \ of pan-European investments in climate change research and in harnessing their\
    \ outcomes to inform effective responses by policymakers and practitioners. Ultimately,\
    \ these efforts are designed to underpin the European efforts in tackling climate\
    \ change.\nKey Projects\nTo date, JPI Climate has mobilised more than 100 million\
    \ EUR in research investments and has provided access to knowledge and expertise\
    \ across Europe and beyond. This has been possible with the support of its member\
    \ countries and the EC, and it has been done in partnership with other JPIs (such\
    \ as FACCE-JPI, JPI Oceans, JPI Urban Europe) and, at the global level, with the\
    \ Belmont Forum. A list of projects that have been (or are currently being) funded\
    \ by JPI Climate is available in the JPI Climate e-magazine (JPI Climate, 2019).\n\
    In 2013, JPI Climate published its \uFB01rst joint call for transnational collaborative\
    \ research projects aiming to provide support for top-quality research projects\
    \ on two topics: Societal Transformation in the Face of Climate Change and Russian\
    \ Arctic and Boreal Systems."
  238: "Source material here: Projects awarded under the \uFB01rst topic aimed to\
