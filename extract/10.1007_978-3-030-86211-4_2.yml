  127: "Source material:\n\"Our findings are based on a simple conceptual model for\
    \ WII. In particular, a simple power law was chosen to parameterize the dependence\
    \ of crop yield on the weather index. Also, the dynamics of both actual and forecasted\
    \ weather index was, somewhat arbitrarily, represented by a very simple random\
    \ process.\"\n\"The analysis of adverse selection is made for a hypothetical scenario\
    \ where only the policy buyers, but not the insurers, base their decision-making\
    \ on available weather index forecast. [...] As shown in Nadolnyak and Vedenov\
    \ (2013), in the latter case, adverse selection can be precluded by setting insurance\
    \ premiums on the basis of forecast-conditional calculations.\"\n\"Bringing more\
    \ realism to the model, in particular, adopting the crop yield parametrizations\
    \ from real-world \uFB01eld data, and deriving actual/forecasted weather indices\
    \ from observations/forecasts of weather and climate variables, is planned for\
    \ future research.\"\n"
  128: "Source material here.\nThe dynamics of individual producer\u2019s income are\
    \ shown in Fig. 14.2\u2026 Projections suggest that anthropogenic global warming\
