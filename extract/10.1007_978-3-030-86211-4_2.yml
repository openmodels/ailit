  143: "LandSyMM is being run at 0.5\xB0 spatial resolution. The dynamic global vegetation\
    \ model computes changes in crop yields at a given location, in response to climate\
    \ change, irrigation and fertilizer application. PLUM captures the relationship\
    \ for demand and trade of commodities. Changes in water resources as well as plant\
    \ requirement under future climates can drive adaptation responses in land management.\
    \ LandSyMM couples a dynamic global vegetation model, a climate system emulator\
    \ and a socio-economic land-use model."
  144: " \nMethodology: LandSyMM captures dietary requirements and preferences at\
    \ the country level and how consumption changes in response to income levels as\
    \ well as endogenous country level food commodity prices... it is possible to\
    \ implement policy levers such as international trade tariff barriers and agricultural\
    \ subsidies into the model to investigate their impacts.\nDrivers of Risk: study\
    \ the interactions between a country who might have suffered from shocks (e.g.\
    \ flood, drought, yield shocks, price shocks, pandemic and cyber-attacks) and\
    \ the rest of the world under growing climate change pressure. The changing risk\
