Drivers of Risk:
  4: Emission of greenhouse gases from energy and transport projects, air pollution
    from roads, decomposition of waste in landfills, climate change, and biodiversity
    loss.
Evaluation overview:
  2: The paper provides an overview of evolving responses to technical challenges
    in Cost-Benefit Analysis (CBA) relevant to evaluating climate and environmental
    impacts.
  4: The welfare impacts of public investments are evaluated based on the costs and
    benefits to society. Environmental externalities like air pollution, greenhouse
    gas emissions, climate change adaptation, and ecosystem service damage are considered.
  7: No relevant information
Highlights:
  1: The time horizon in economic evaluations can significantly impact results, potentially
    more so than the discount rate, especially for projects with long-term environmental
    effects.
  2: Emphasizes the necessity of integrating strong sustainability guidance from natural
    sciences into CBA and recognizing the limits of CBA in accounting for environmental
    and social impacts.
  3: Valuation studies on environmental services have increased, emphasizing co-benefits
    such as reduced air pollution from GHG mitigation projects, which can provide
    persuasive arguments for policymakers.
  4: Long time horizons are crucial for accurately estimating welfare impacts, and
    excessively discounting long-term impacts is considered ethically indefensible.
  5: The importance of extending time horizons in CBAs to include long-term impacts,
    especially those related to climate change, is emphasized. The paper references
    practices in different countries, indicating a trend towards longer timeframes
    for significant climate-related projects.
  6: Discounted net benefits are considerably affected by changing discount rates.
    Moving from a 7% discount rate to a 3% discount rate increases net benefits by
    48.84% over 25 years. Moving to a 1.4% or 0% discount rate increases discounted
    net benefits by 79.07% and 93.92%, respectively, compared to a 7% discount rate
    over 25 years.
Methodology:
  1: The paper discusses the importance of including long-term time horizons in cost-benefit
    analyses to account for environmental impacts, particularly for projects related
    to climate change and ecosystem damage.
  2: The paper reviews changes in applied CBA practices driven by sustainability science,
    focusing on the selection of time horizons, uncertainty, and discounting in public
    project and policy analysis.
  3: The analysis discusses changes in discount rates and the inclusion of co-benefits
    in cost-benefit analysis (CBA) for evaluating environmental projects, advocating
    for a 'dual discounting' approach for natural and social capital.
  4: Cost-benefit analysis (CBA) is used to assess the long-term impacts of projects,
    focusing on welfare impacts rather than just financial implications. Scenario
    approaches are recommended to explore key uncertainties in forecasting future
    costs and benefits.
  5: The analysis discusses the use of long-term time horizons in cost-benefit analysis
    (CBA) to adequately capture environmental costs and benefits.
  6: Social discount rates of 3%, 5%, and 7% are applied in a constant form. A 1.4%
    discount rate, as applied to climate change by Stern (2007), and a 0% discount
    rate are also explored.
More Notes:
  2: The importance of incorporating environmental and social externalities into economic
    analyses to ensure sustainable development paths and avoid lock-in to carbon-intensive
    infrastructure.
  3: The paper discusses the Total Economic Value (TEV) approach for comprehensive
    valuation of environmental impacts, and notes challenges in the applicability
    of CBA due to non-linear ecosystem changes.
  4: The time horizon for analysis can significantly affect the outcome of CBA results.
    The practical process of implementing a CBA should consider the time horizon early,
    at the scoping and screening stage.
  5: Emphasis on the need for using declining discount rates in long-term CBA to give
    weight to future impacts and generations.
  6: The time horizons detailed range from 10 years for productive industry, 25 years
    for roads and 30 years for rail, and these time horizons are financially defined
    rather than defined by the technical lifetime or by the impacts on welfare
  7: Advocates for longer time horizons (100+ years) for environmental impact assessment,
    depending on the environmental damage type.
Quantitative material:
  6: The effect of time horizon (25, 50, 100, 120 years) and discount rates (7%, 5%,
    3%, 1.4%, 0%) on a constant long-term flow of $1000 USD per annum is presented
    in Table 2, with resulting present values.
  7: A constant 3% rate extended from 25 to 50 years, has more impact on the results
    than moving from 3% to 1.4%, or even to a zero discount rate
