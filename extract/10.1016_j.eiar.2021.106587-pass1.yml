    Methodology: "The framing of the time horizon has major implications, as environmental
    costs and benefits often accrue in the long-term. ...For projects with long-term
    environmental effects, such as those related to air pollution, climate change
    and ecosystem damages, it is recommended to use timescales of 100+years for economic
    evaluation of the impact."

    Highlights: "It is demonstrated that the time horizon can have a considerable
    impact on results, even more substantial than the discount rate."

