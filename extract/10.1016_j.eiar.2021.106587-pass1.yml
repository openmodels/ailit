    Drivers of Risk: dependent on the type of environmental damage that a project
    leads to, including priority costs and benefits such as air pollution, greenhouse
    gas emissions, climate change and damages to ecosystems and the services they
    provide

    Quantitative material: A constant 3% rate extended from 25 to 50 years, has more
    impact on the results than moving from 3% to 1.4%, or even to a zero discount
    rate

    Methodology: The recent history of Cost-Benefit Analysis has established that
    CBA is not suitable for some questions, The process of implementing longer time
    horizons for significant environmental impacts, requires early consideration,
    during scoping and screening, to identity and quantify the environmental impacts

    Highlights: The consequences of time horizon length, for the economic analysis
    of public policies and projects, are therefore defining. These may be even greater
    than those in the now well-rehearsed debates on discounting that have unfolded
    in many economically advanced nations., This adds support to the conclusion that
    longer time horizons are required for the economic analysis of environmental benefits,
    and avoided damages.

    More Notes: It is recommended to consider time horizons of 100+  years, dependent
    on the type of environmental damage that a project leads to, including priority
    costs and benefits such as air pollution, greenhouse gas emissions, climate change
    and damages to ecosystems and the services they provide.

