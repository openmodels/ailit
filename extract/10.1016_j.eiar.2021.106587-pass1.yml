  3: "The paper discusses changes in discount rates and the inclusion of co-benefits\
    \ in CBA for evaluating environmental projects, advocating for a 'dual discounting'\
    \ approach for natural and social capital: \"Social discount rates are a key controversy\
    \ for CBA... The OECD note a general trend towards lower discount rates, declining\
    \ discounting and consideration of the need for 'dual discounting,'... longer\
    \ time horizons for selected OECD countries, adapted from OECD (2018).\" \n\n\
    Valuation studies on environmental services have increased, emphasizing co-benefits\
    \ such as reduced air pollution from GHG mitigation projects, which can provide\
    \ persuasive arguments for policymakers: \"Valuation studies on the benefits of\
    \ biodiversity, and on the services provided by different ecosystems, or ESS,\
    \ have been growing at an exponential rate... Reductions in damages from local\
    \ and regional air pollution tend to be the largest category of co-benefit that\
    \ arise with greenhouse gas mitigation...\"\n\nThe paper discusses the Total Economic\
    \ Value (TEV) approach for comprehensive valuation of environmental impacts, and\
    \ notes challenges in the applicability of CBA due to non-linear ecosystem changes:\
    \ \"The 'Total Economic Value' (TEV) approach...is useful as a comprehensive framework\
    \ for thinking...OECD (2018) explain that it is not possible to fully describe\
    \ the 'total value'...as ecosystems operate as interrelated 'complex adaptive\
    \ systems' (CAS), where they are greater than the sum of their parts.\""
  4: "\nEvaluation overview: `CBA seeks to understand the welfare impacts of public\
    \ investments due to the impacts of a project\u2019s flows. ... This will include\
    \ priority environmental externalities, such as air pollution and greenhouse gas\
    \ emissions, climate change adaptation and damage to ecosystems and the services\
    \ they provide.`\nDrivers of Risk: `the emission or avoidance of greenhouse gases\
    \ from energy and transport projects. ... Prominent examples include the health\
    \ impacts due to air pollution from roads projects ... The long-term impacts of\
    \ greenhouse gases released by human activities such as burning fossil fuels,\
    \ can continue as the impacts of climate change for centuries ... Permanent or\
    \ irreversible impacts on welfare and the economy include climate change damages\
    \ and biodiversity loss`\nMethodology: `If the analysis is to be a CBA rather\
    \ than an exchequer expenditure or financial analysis, it must theoretically capture\
    \ all future costs and benefits to welfare, a crucial principle for CBA is therefore\
    \ the application of long time horizons. ... Within CBA, the Dutch guidance specifically\
    \ recommends employing existing scenario studies and sensitivity analyses of key\
    \ uncertainties (CPB/PBL, 2013).`\nHighlights: `Ignoring or excessively discounting\
    \ the long-term impacts has been seen as ethically indefensible for many decades.`\n\
    More Notes: `The World Health Organisation (WHO) have observed the time horizon\
    \ of the analysis can significantly affect the outcome of results of CBA` `In\
    \ the practical process of implementing a CBA, the time horizon needs consideration\
    \ early, at the scoping and screening stage.`\n"
  5: "Source material here.\n\"The theoretical background is clear in the requirement\
    \ for long-term time horizons to capture long-term environmental costs and benefits,\
    \ a key question lies in what is practicable?\"\n\"In acknowledging that there\
    \ are long-term projects and long-term impacts, it further notes that in some\
    \ cases including \u2018significant assets\u2019 such as buildings and infrastructure,\
    \ up to 60 years are required. For significant costs and benefits such as those\
    \ related to climate change risks, even longer periods are required\"\n\"This\
    \ updated French national guidance adopted virtually all of the Quinet recommendations\
    \ for \u2018ecological transition\u2019 . Quinet noted the beginning of transitions\
    \ in society; \u201Ctransitions of various natures regarding ecology, global warming,\
    \ biology and the digital revolution,\u201D and that these transitions necessitate\
    \ a long term perspective to be applied.\"\n\"This allows determination of baseline\
    \ conditions, and the effects in the distant future year, when impacts become\
    \ \u2018structural in nature\u2019\"\n\"Declining discounting is itself a concept\
    \ derived from recognizing long-term impacts, and the value of future generations,\
    \ while cognizant of uncertainty\"\n"
