  2: "Source material: \"Armed with this exogenous measure, varying over time and\
    \ at the county level, we explore the dynamic employment effects of hurricanes\
    \ using local projections. Rico\u2019s counties by using the maximum wind speed\
    \ recorded in each county cell during each hurricane. First, after the \u2018\u2018\
    average\u2019\u2019 hurricane, employment falls on average by about 0.5% after\
    \ about six months. We also find an average increase in the number of unemployed,\
    \ with no significant changes to the labor force. Operationally, we regress the\
    \ cumulative change of our variables of interest (for instance, employment) on\
    \ our disaster shock variable at each horizon. Second, we find heterogeneous effects\
    \ across industries. In some industries, which we call the \u2018\u2018strengthened\
    \ industries\u2019\u2019, employment increases following a natural disaster. In\
    \ other industries, which we call \u2018\u2018weakened\u2019\u2019 industries,\
    \ employment decreases. Finally, while we do not test this formally, the heterogeneous\
    \ responses of employment to hurricanes across different industries suggest a\
    \ new concept of resilience: adaptability-driven employment resilience, defined\
    \ as the potential opportunity for workers to reallocate from the contracting\
    \ industries to the expanding ones in the aftermath of a natural disaster.\""
  3: " \nOur study differs from these papers in several aspects. First and foremost,\
    \ we evaluate the average labor market response of directly affected jurisdictions.\
    \ [...] Importantly, using in-migration implies that the authors exclusively focus\
    \ on the labor supply aspect of the shock in indirectly affected areas. This paper\
    \ seeks to be more general and is interested in the labor markets effects associated\
    \ with disaster damages, the direct need for rebuilding, and the resulting changes\
    \ in the industrial structure. Finally, we consider all of the counties in Puerto\
    \ Rico and all of the hurricanes that occurred over the sample period.\n\nInthisSectionweintroduceourmeasureofexposuretohurricanes,\
    \ obtainedusingsatellitedata,andthedataonPuertoRicanemployment dynamics taken\
    \ from the Bureau of Labor Statistics (BLS).\n\nFor each county that falls in\
    \ the vortex associated with a landmark \u210E, we use the HURRECON model (seeBoose\
    \ et al.,1994,2001,2004) to compute the sustained wind velocity at the county\u2019\
    s centroid, \U0001D464\U0001D450\u210E.\n\nMoreover,theuseofthisdetailedsetofindustries\
    \ allowsustounveiltheimportanceofinput\u2013outputlinkagesasadriving mechanism\
    \ of the employment effects of natural disasters.\n\nByfocusingonPuertoRico,w\
    \ e provide novel evidence on the short-run employment effects in a lower-income\
    \ setting, which has been understudie d.\n\nWe look at the storms\u2019 best tracks\
    \ in the Caribbean Sea over the period 1995\u20132017 to construct the maximum\
    \ wind speed associated with each hurricane \U0001D43B hittingPuertoRicancounty\
    \ \U0001D450,i.e.\U0001D464\U0001D450\U0001D43B.Abesttrackcontainsthefull historyofahurricane,withinformationat6-hourintervalsonlatitude,\
    \ longitude, date, and wind speed at its eye.\n"
  4: "Source material here.\nDrivers of Risk: \"Roughly 5% of our observations have\
    \ positive exposures to the disaster shock... our baseline specification includes\
    \ not only hurricanes but also tropical storms, i.e. events with windspeeds exceeding\
    \ 33 knots ... The cubic powers account for the force exerted by winds on physical\
    \ structures...\"\n\nQuantitative material: \"Table 1 Summary statistics of hurricane\
    \ exposures ... Monthly data: \U0001D446\U0001D450\U0001D461 ... Mean 0.004 Std.\
    \ dev. 0.057 ...\"\n\nMethodology: \"we construct a population-weighted centroid\
    \ for each of the 78 counties of Puerto Rico...Finally, we obtain one measure\
    \ of windspeed per county and hurricane by retaining the maximum windspeed to\
    \ which a county was exposed...index of exposure is obtained in the following\
    \ way: \U0001D446\U0001D450\U0001D461= \u2211 \U0001D465\U0001D450\U0001D43B\U0001D461\
    \ where \U0001D465\U0001D450\U0001D43B\U0001D461= (\U0001D464\U0001D450\U0001D43B\
    \U0001D461\u221233 )3 / (\U0001D464\U0001D45A\U0001D44E\U0001D465\u221233 )3 if\
    \ \U0001D464\U0001D450\U0001D43B\U0001D461> 33\"\n\nHighlights: \"Fig.1 shows\
    \ examples of our measure of exposure...the large extent of geographical and time\
    \ variation at our disposal for identification. Hurricane Jeanne, for instance,\
    \ mostly hit the western part of Puerto Rico...On the contrary, hurricanes Irene\
    \ and Maria hit the eastern part of the island much more severely.\"\n"
  5: "Source material here.\nEvaluation overview: \"\U0001D44B\U0001D450 represents\
    \ employment, unemployment, the labor force (for each county \U0001D450 at monthly\
    \ frequency) or the average weekly wage (for each county \U0001D450 at quarterly\
    \ frequency).\"\nDrivers of Risk: \"County exposure to hurricanes \u2014 Examples.\
    \ Note: The left panels show the best tracks of hurricanes Georges, Jeanne, Irene,\
    \ and Maria respectively. Each cross represents the position of the eye of the\
    \ hurricane at 6-hours intervals. All these four hurricanes made landfall in Puerto\
    \ Rico.\"\nQuantitative material: \"Color shades indicate positive exposures,\
    \ with darker shades displaying stronger exposures. [...] Labels: Indicate numbers\
    \ ranging from approximately 0.6848 to 18.3109.\"\nMethodology: \"First, we run\
    \ the following \U0001D458-step ahead panel predictive regressions: \U0001D6E5\
    \U0001D44B\U0001D450,\U0001D461+\U0001D458=  \U0001D6FC\U0001D458+\U0001D6FE\U0001D458\
    1\U0001D446\U0001D450\U0001D461+ \u2211\U0001D45D\U0001D6FD\U0001D45D\U0001D6E5\
    \U0001D44B\U0001D450,\U0001D461\u2212\U0001D45D+\U0001D6FF\U0001D461+\U0001D702\
    \U0001D450+\U0001D7161\U0001D450,\U0001D461+\U0001D458. [...] Our sample period\
    \ runs from 1995M1 to 2019M11.\"\nHighlights: \"The right panels zoom in on the\
    \ island and show, for each county, the values taken by the storm index \U0001D446\
    \U0001D450\U0001D461 during the month the hurricane stroke.\"\n"
  6: "Source material here.\nThe analysis uses panel data for 78 counties and 70 3-digits\
    \ industries over the period 1995\u20132017, focusing on county-by-industry level\
    \ variables and handling reported zeros through linear interpolation. \nFig. 2.\
    \ Storm exposure by county for \U0001D446\U0001D450\U0001D461> 0, monthly Data,1995\u2013\
    2017.\n"
  7: "  \nWe report impulse responses following a disaster shock...after the \u201C\
    average\u201D hurricane, employment falls on average by about 0.5% after about\
    \ six months. The effects are statistically significant.\n\nFinally, we explore\
    \ the dynamic employment effects across industries...our object of interest is\
    \ \U0001D6FE\U0001D458\U0001D456, representing the response of \U0001D44B\U0001D456\
    \ at horizon \U0001D458 to a disaster shock at time \U0001D461.\n\nFor the industry-level\
    \ regressions, we use Newey\u2013West corrected standard errors to account for\
    \ the potential presence of autocorrelation and heteroskedasticity.\n\nOur results\
    \ on employment are in line with the existing literature...While our results also\
    \ point towards a decline in employment, effects emerge only at the beginning\
    \ of the second quarter, peak after six months and disappear thereafter.\n"
  8: null
  9: "Dynamic effects of hurricanes at time \U0001D461 on employment at different\
    \ horizons exploiting industry\u2013time variation. The shock used to generate\
    \ these IRFs is the average hurricane over our sample, with value 0.084. Two industries\
    \ are classified as \"neutral\": NAICS 481 (\"Air transportation\") and NAICS\
    \ 483 (\"Water transportation\"). Two other industries are instead classified\
    \ as \"weakened\": NAICS 485 (\"Transit and ground passenger transportation\"\
    ) NAICS 487 (\"Scenic and sightseeing transportation\"). This particular example\
    \ shows the importance of using detailed industry data to better gauge the employment\
    \ effects of natural disasters. In Appendix E, we propose a Table where we report\
    \ the classification (S, N, or W) also for different time horizons (3, 6, 12,\
    \ 18, 24 months) for each industry, thus giving a simple way to better grasp the\
    \ dynamic employment effects of disaster shocks in each of the 70 industries."
  10: "\nDrivers of Risk: \"As discussed above, our results highlight the importance\
    \ of analyzing the employment response to hurricanes across detailed industries.\"\
    \nQuantitative material: \"find that after a short decline at the time of the\
    \ event, construction employment recovers and rises sharply within one year, reaching\
    \ levels about 1.2% higher than in the absence of the disaster.\"\nMethodology:\
    \ \"In order to check the robustness of our results, we experiment both with the\
    \ use of different measures of exposure to natural disasters and with a different\
    \ specification of the local projection. First, we increase the threshold from\
    \ 33 to 64 knots in Eq.(1). Second, we use a different way of computing the windspeed,\
    \ based on the classic formula of Deppermann(1947). ... To formally test this\
    \ hypothesis, we downloaded the 2020 BEA Input\u2013 Output table for the US at\
    \ NAICS-3 digits, and for each industry we computed the share of output sold to\
    \ the construction sectors.\"\nHighlights: \"a disaster shock generates a construction\
    \ boom and negatively affects retail, transport, and accommodation industries...\
    \ The construction boom, for instance, could trigger the increase in employment\
    \ in some of its important suppliers, such as the manufacturing of metals and\
    \ of furniture. ... We conclude that input\u2013output linkages are likely to\
    \ play a key role in the transmission of disaster shocks to employment across\
    \ different industries.\"\n"
  12: "Source material here.\nEvaluation overview: \"In this paper, we study the short-run,\
    \ dynamic employment effects of natural disasters.\"\nDrivers of Risk: \"Industry-Specific\
    \ Measure of Exposure to Hurricanes... industries may not be located close to\
    \ population centers... Instead, we compute here an industry-specific measure\
    \ of exposure to hurricanes.\"\nQuantitative material: \"Table 2 ... NAICS...\
    \ Amusements, gambling, and recreation - \u2212 1.30 ... Accommodation - \u2212\
    \ 2.39...\"\nMethodology: \"Using monthly data for 703-digits NAICS industries\
    \ and 78 Puerto Rican counties over the period 1995\u20132019... we compute here\
    \ an industry-specific measure of exposure to hurricanes.\"\nHighlights: \"We\
    \ find an average decline in employment following a disaster shock, which masks\
    \ an extensive heterogeneity at the industry level... adaptability-driven employment\
    \ resilience, defined as the potential opportunity for workers to reallocate from\
    \ the contracting industries to the expanding ones in the aftermath of a natural\
    \ disaster.\"\n"
