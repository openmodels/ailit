Highlights:
  1: "Employment falls by 0.5% on average after a hurricane. Employment responses\
    \ are heterogeneous across industries, with some industries experiencing increases\
    \ and others decreases. Input\u2013output linkages partly explain the heterogeneity\
    \ in employment responses."
  2: The study identifies heterogeneous employment effects across industries following
    hurricanes, with some industries experiencing employment increases and others
    decreases.
  3: The study provides novel evidence on the short-run employment effects of hurricanes
    in a lower-income setting (Puerto Rico), which has been understudied.
  4: Describes geographical and temporal variation in hurricane exposure across Puerto
    Rican counties; visual representation of exposure index showing variation for
    significant hurricanes.
  5: Maps indicate varying degrees of county hurricane exposure, suggesting geographical
    variations in impact.
  7: Employment effects from hurricanes are temporary, showing a decline peaking at
    six months and disappearing thereafter; some industries experience employment
    increases, while others see declines.
  8: No highlights specifically extracted as the full analysis outcomes are not detailed
    on this page.
  9: Using detailed industry data is important to better gauge the employment effects
    of natural disasters. Some industries are classified as strengthened, neutral,
    or weakened.
  10: The study finds construction booms after disasters and notes differential employment
    responses across industries, with some industries showing positive employment
    effects due to input-output linkages with construction.
  12: Finds average employment decline post-disaster, with sectoral heterogeneity;
    introduces concept of adaptability-driven employment resilience.
  14: Industry results for selected Transport Industries.
  17: Significant declines in the labor force were observed in many municipalities
    between 1995 and 2019, with some municipalities experiencing substantial decreases
    (e.g., Mayagez Municipio -45.33%, Lajas Municipio -48.87%, Aibonito Municipio
    -46.35%). Some municipalities experienced labor force growth during this period
    (e.g., Gurabo Municipio 53.70%).
  18: The total labor force across the municipalities listed has decreased by 11.1%
    from 1995 to 2019.
  20: Panel results including zeros. Shows dynamic effects of hurricanes on employment
    and average weekly wages at different horizons.
  21: The table shows the climate sensitivity classification of various industries
    based on different methodologies. For example, crop production (NAICS 111) and
    animal production (NAICS 112) are classified as highly weather-sensitive (WWWWW)
    across all methods and time horizons. Construction industries (NAICS 236, 237,
    238) are classified as SSSSS across all methods and time horizons. Utilities,
    Food Manufacturing, and Apparel manufacturing have different sensitivity rankings
    across the four methods.
  23: Dynamic effects of hurricanes on employment at different horizons in selected
    industries, using a 64-knot threshold.
  27: Dynamic effects of hurricanes on employment at different horizons for selected
    industries, unweighted by distance from geographical centroids.
  29: Dynamic effects of hurricanes on employment, average weekly wages, unemployed,
    and labor force at different horizons.
  30: Dynamic effects of hurricanes on employment at different horizons for selected
    industries.
Methodology:
  1: "Panel local projections using monthly data for 70 3-digits NAICS industries\
    \ and 78 Puerto Rican counties over the period 1995\u20132019."
  2: The analysis uses local projections to explore dynamic employment effects, regressing
    the cumulative change of variables of interest on the disaster shock variable
    at different horizons.
  3: The paper uses local projections to examine the dynamic effects of hurricanes
    on employment, considering all counties in Puerto Rico and all hurricanes occurring
    between 1995-2017. Wind speed at the county level obtained using satellite data
    from the National Oceanic and Atmospheric Administration (NOAA) Tropical Prediction
    Center.
  4: Constructs maximum wind speed measure for hurricane exposure per county using
    a population-weighted centroid; employs an index of exposure normalized with respect
    to observed maximum wind speed.
  5: Utilizes local projection methods with fixed effects, analyzing county-time and
    county-industry-time variations from data spanning 1995M1 to 2019M11.
  6: "The analysis uses panel data for 78 counties and 70 3-digits industries over\
    \ the period 1995\u20132017, focusing on county-by-industry level variables and\
    \ handling reported zeros through linear interpolation."
  7: "Analysis includes industry-level regressions with dynamic employment effects\
    \ explored across industries; Newey\u2013West corrected standard errors are used\
    \ for industry-level regressions."
  8: "The analysis uses dynamic effects of hurricanes exploiting county\u2013time\
    \ and county\u2013industry\u2013time variations, with and without linear interpolation,\
    \ and includes confidence bands at 95%."
  9: "Dynamic effects of hurricanes at time \U0001D461 on employment at different\
    \ horizons exploiting industry\u2013time variation; time period 1995-2019"
  10: The analysis involves examining employment responses across industries using
    input-output linkages and various robustness tests like wind speed threshold changes
    and centroid calculations.
  12: "Analysis uses monthly data for 703-digit NAICS industries from 1995\u20132019,\
    \ applying industry-specific measures of exposure to hurricanes."
  14: Exploiting industry-time variation
  19: "Panel results controlling for alternative sets of fixed effects; exploiting\
    \ county\u2013industry\u2013time variation without and with linear interpolation\
    \ using county*industry and time fixed effects, and county and industry*time fixed\
    \ effects."
  20: "Exploiting county-industry-time variation with and without linear interpolation\
    \ using county*industry and industry*time fixed effects. Dynamic effects of hurricanes\
    \ at time \U0001D461."
  21: 'The table classifies industries (NAICS codes provided) based on their sensitivity
    to climate impacts at different time horizons (3, 6, 12, 18, and 24 months). Four
    different classification methods are compared: Baseline model, 64-Knots threshold,
    Deppe formula, and Non-weighted centroids. Each method assigns a series of letters
    (W, N, S) for each time horizon, presumably representing different sensitivity
    levels (the paper does not clearly define what W, N and S stand for).'
  23: "Exploits industry\u2013time variation; Threshold is 64-knots."
  24: "Analysis involves county\u2013time and county\u2013industry\u2013time variation,\
    \ with and without linear interpolation."
  27: "Industry results with distance from geographical centroids (Unweighted). Dynamic\
    \ effects of hurricanes at time t on employment at different horizons exploiting\
    \ industry\u2013time variation."
  28: "Exploiting industry\u2013time variation; results shown with 95% confidence\
    \ bands."
  29: "Panel results controlling for lags and leads of exposure measure. Exploiting\
    \ county\u2013time variation and county\u2013industry\u2013time variation. Analysis\
    \ performed with and without linear interpolation."
  30: "Industry results controlling for lags and leads of exposure measure; exploiting\
    \ industry\u2013time variation; average industry employment over the period 1995\u2013\
    2017; confidence bands at 95%"
More Notes:
  1: The study uses high-frequency, detailed industry data from Puerto Rico to analyze
    the employment effects of hurricanes. The study examines outcomes up to two years
    post-hurricane.
  2: The paper introduces the concept of adaptability-driven employment resilience,
    which suggests opportunities for workers to reallocate between industries after
    natural disasters.
  3: The paper aims to unveil the importance of input-output linkages as a driving
    mechanism of the employment effects of natural disasters.
  8: The page discusses the classification of industries as strengthened, weakened,
    or neutral in terms of employment reaction to hurricanes.
  9: NAICS codes and descriptions are provided for several transportation industries
    and their disaster impact classifications (strengthened, neutral, weakened). Appendix
    E contains a table classifying industries (S, N, or W) for different time horizons
    (3, 6, 12, 18, 24 months).
  14: The numbers in parenthesis are average industry employment over the period 1995-2017.
  17: The data is specific to Puerto Rico municipalities. The table does not directly
    link climate change to labor force changes, but presents a demographic shift that
    may be relevant depending on what aspect of the national climate assessment is
    focused on.
  20: Shaded areas are confidence bands at 95%.
  21: The meaning of 'W', 'N', and 'S' is not explained, which makes interpreting
    the classification difficult. The paper's table does not include any quantification
    of impacts, only classifications of sensitivity. This is a table, it is not the
    main analysis of the paper. The table compares four different classification methods
    of industries (NAICS codes), so this table must be considered alongside other
    tables and results.
  23: The analysis examines employment impacts using a specific wind speed threshold
    (64 knots) for hurricanes.
  27: The analysis exploits industry-time variation and uses data from 1995-2017.
  29: Results presented are dynamic effects (impact at different times *after* the
    hurricane).
Quantitative material:
  1: After the 'average' hurricane, employment falls by 0.5% on average in Puerto
    Rico.
  2: The paper finds that after an average hurricane, employment falls on average
    by about 0.5% after about six months, with an average increase in the number of
    unemployed.
  3: The paper focuses on the short-run employment effects in Puerto Rico.
  4: "Provides summary statistics of hurricane exposures with a mean monthly storm\
    \ exposure (\U0001D446\U0001D450\U0001D461) of 0.004 and a standard deviation\
    \ of 0.057."
  5: Includes numerical labels on maps possibly representing varying levels of hurricane
    exposure impact.
  7: Employment falls on average by about 0.5% six months after an 'average' hurricane,
    with a significant increase in the number of unemployed.
  8: The shock used is the average hurricane with a value of 0.084.
  9: The shock used to generate these IRFs is the average hurricane over our sample,
    with value 0.084.
  10: Construction employment increases by about 1.2% within one year of a disaster.
  12: Industry-specific changes in employment with coefficients, e.g., Amusements
    (-1.30), Accommodation (-2.39).
  14: Dynamic effects of hurricanes on employment at different horizons, average industry
    employment over the period 1995-2017, confidence bands at 95%
  15: Quantitative information includes numerical data on people affected, total fatalities,
    and total damages caused by each hurricane.
  17: Data on labor force size in 1995, labor force share, and percentage change in
    labor force from 1995 to 2019 for various municipalities in Puerto Rico.
  18: Labor force changes from 1995 to 2019 are provided for specific municipios in
    Puerto Rico, including percentage changes.
  19: Dynamic effects of hurricanes on employment and average weekly wages at different
    horizons, with confidence bands at 95%
  20: "Dynamic effects of hurricane at time \U0001D461 on employment, average weekly\
    \ wages at different horizons"
  21: No relevant information
  23: "Dynamic effects of hurricanes on employment at different horizons; Average\
    \ industry employment over the period 1995\u20132017 is provided in parenthesis;\
    \ Confidence bands at 95% are shaded."
  27: "Dynamic effects of hurricanes on employment at different horizons exploiting\
    \ industry-time variation. Numbers in parenthesis represent the average industry\
    \ employment over the period 1995\u20132017. Shaded areas are confidence bands\
    \ at 95%."
  28: Dynamic effects of hurricanes at time t on employment at different horizons,
    industry-specific employment averages (1995-2017) are shown
  29: Dynamic effects on employment and average weekly wages at different horizons,
    confidence bands at 95%
  30: Dynamic effects of hurricanes at time t on employment at different horizons
