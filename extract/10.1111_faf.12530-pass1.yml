Highlights:
  3: The study finds fundamentally different ocean distributions and responses to
    SST variations among Chinook salmon stocks, predicting substantial ocean re-distribution
    in response to SST change with regional variances.
  5: The effects of a changing climate on the spatial distribution of anadromous fish
    in the ocean are poorly understood, despite potential significant consequences.
  7: Provides predictions of ocean distribution for six of the largest fall-run Chinook
    salmon stocks based on future ocean temperature projections.
  8: The focus is on stocks with the largest number of tagged fish contributing significantly
    to major Chinook fisheries on the west coast, emphasizing regions from California's
    Central Valley to the middle and upriver Columbia River.
  9: Chinook salmon distributions vary seasonally across 17 ocean regions, assumed
    to be smoother and more correlated in adjacent regions.
  10: The analysis predicts ocean distributions under future ocean conditions based
    on a global circulation model.
  12: Summer and fall SST patterns exhibit a notable trough in SST in the southern
    portion of the range along the coast of northern California.
  13: "Future average ocean conditions during the summer are generally comparable\
    \ to extreme El Ni\xF1o events observed since 1982. Some fish stocks (Klamath,\
    \ four Columbia River stocks) shift north in warm years relative to cool years.\
    \ URB stock showed the smallest distribution shifts in response to SST."
  14: Fish stocks show northward shifts or local redistributions due to SST changes;
    uncertainty increases for predictions beyond observed historical temperature ranges.
  15: A southerly distributional shift of the abundant SFB stock causes substantial
    changes; different stocks show varying responses to SST with some shifting southward
    and others northward.
  16: Central California may serve as a refuge due to productivity hotspots from coastal
    upwelling, despite overall declining coastal productivity.
  17: Integrating ocean distribution information into fisheries management is warranted
    for future management scenarios in a warming ocean. The model provides a framework
    to link changes in freshwater productivity and hatchery practices to ocean distribution
    and availability.
  18: SST may not be a universally good predictor of Chinook salmon abundance and
    occurrence due to stock-specific differences in distribution. Species-level analyses
    that ignore stock-specific differences in distribution would yield errant projections
    of future distribution.
  22: Climate change impacts for fisheries exacerbated by marine heatwaves, Redistribution
    of fisheries catch potential under climate change, Effects of warming climate
    and competition on Pacific salmon, Predicting effects of climate change on salmon
    populations, Signals of climate drivers in Chinook salmon survival, Rapid growth
    in early marine period improves salmon survival, Projecting changes in fish abundance
    and distribution in response to climate
  25: The adaptive potential of Pacific salmon under climate change and the ecological
    implications of changing hatchery practices are significant points discussed.
  30: Projected distribution changes and abundance shifts for Chinook salmon stocks
    in response to SST changes.
  31: The image presents an analysis of sea surface temperature variations, emphasizing
    geographical and temporal patterns.
  34: LCOL shows a higher median temperature compared to other categories, while URB
    has a lower median temperature.
Methodology:
  3: The analysis uses a new spatio-temporal model to jointly estimate the ocean distribution
    of Chinook salmon stocks over 40 years and applies SST projections for 2030-2090.
  4: The paper discusses various methods including Population Dynamics Model, Ocean
    Distribution Models, Stock-Specific Temperature Associations, Ocean Distributions
    in Future Ocean Conditions, and Population Size Estimates.
  7: Constructs a Bayesian state-space model to analyze spatio-temporal population
    dynamics of Chinook salmon using recapture data from 1979 to 2015.
  8: The model accounts for factors like abundance, ocean distribution, fishery effort,
    and sampling rate to infer biological processes, tracking fish from age 2 to 6,
    across 19 seasonal time steps and 17 ocean regions.
  9: Analysis conducted using R (v3.6.1) and statistical models implemented in Stan;
    ocean distribution models employ predictive process modeling.
  10: Uses the OISST dataset (1982-2015) to derive season-specific temperature series
    for ocean regions, supplementing with direct observations for the Salish Sea.
    A weighted mean SST is calculated using proportional distribution as weights to
    characterize the SST associated with each stock. Future SST predictions are obtained
    from the MPI45 GCM. Proportional occurrence in ocean regions vary with SST according
    to equation (2).
  11: Used MPI45 model projections of SST under RCP4.5 to generate temperature anomalies,
    adjusted for differences in reference period, and applied these to predict spatial
    distributions of Chinook salmon stocks. Stock-specific abundance estimates were
    obtained from PFMC and CTC.
  12: The study uses a model to apportion salmon abundance among 17 ocean regions
    based on current and future SST. The model considers covariation in abundance
    among different stocks. The analysis is applicable to projecting salmon abundance
    changes in 2030, 2050, and 2070.
  13: A population dynamics model was used to estimate distributional variation as
    a function of SST, using presence/absence and positive CWT (Coded Wire Tag) recoveries.
    The results are applicable to the six focal stocks of fish.
  14: Analysis used historical abundance estimates combined with predicted changes
    in ocean distribution to project changes in stock-specific ocean abundance.
  15: Analysis integrates disparate data sources over 25 degrees of latitude and 40
    years to estimate stock-specific ocean distribution and response to SST changes;
    applies these estimates to future temperature projections to predict distributional
    shifts.
  17: The study uses simulations to predict shifts in ocean distribution of Chinook
    salmon based on ocean climate. The simulations assume the abundance of focal stocks
    is represented by abundance in recent decades (1983 to present).
  18: Statistical modeling of Chinook salmon distribution using SST as a primary covariate,
    considering stock-specific differences. Retrospective analyses of ocean biogeochemical
    models may be useful in expanding the suite of variables available to ocean distributions.
  22: Bayesian life history model (Cunningham et al. 2018), Bayesian dynamic modeling
    for large space-time datasets (Finley et al. 2012), Life-cycle models of spring
    Chinook salmon (Crozier et al. 2008)
  24: Hu et al. (2017) discusses persistence and predictions of the warm anomaly in
    the northeastern Pacific ocean during 2014-16 using climate modeling.
  25: Various methodologies including genetic mixture analysis and evaluations of
    migratory tactics related to temperature-dependent variations.
  31: Analysis of sea surface temperatures through mapping, line graphs of seasonal
    temperature, and time series of temperature deviation.
