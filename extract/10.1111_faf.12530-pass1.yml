sourcematerial:
  3: "  \nSpecies   that   migrate   long   distances   or   between   distinct  \
    \ habitats   \u2013   e.   g.     anadromous   or   catadromous   \uFB01sh experience\
    \  the  consequences  of  climate  change  in  each  habitat  and  are  t herefore\
    \  particularly  at  risk  in a changing world. ...  To understand a prominent\
    \ anadromous species\u2019 response to ocean climate, we  use  a  new  spatio-temporal\
    \  model  jointly estimating the ocean distribution of all major fall-run Chinook\
    \ salmon  (Oncorhynchus  tshawytscha,  Salmonidae)  stocks from  California  to\
    \  British  Columbia  over  40  years. ... We model hundreds of millions of tagged\
    \ individuals, finding that  different stocks have fundamentally different ocean\
    \ distributions, distinct  associations   with   sea   surface   temperature \
    \  (SST),   and   contrasting distributional   responses   to   historical   ocean\
    \   SST   variation. ... Using  future  (2030-2090) SST  projections  to  model\
    \  focal  stocks  of  fisheries  importance  we  predict  substantial  ocean \
    \ re-distribution  in response  to  SST  change.  Predicted  aggregate  distributional\
    \  changes  do  not  follow  a  simple,  poleward  shift. Instead,   we  predict\
    \  net  movement  into  some  ocean  regions  (British  Columbia,  central  California)\
    \  but  net movement  out  of  others  (northern  California,  Washington). \n"
  4: Source material here.
  5: Global changes to environmental conditions have caused extensive changes in the
    distribution and abundance of species worldwide. [...] Anadromous fish species
    may be sensitive to climatic changes as their bipartite life-history forces them
    to respond to climatic changes in both the freshwater and marine environments.
    [...] The effects of a changing climate on the spatial distribution of anadromous
    fish in the ocean are poorly understood despite the fact that such shifts may
    have substantial consequences for both ecological communities and human economies.
  7: "\nHere, we provide a large-scale, integrated estimate of how Chinook salmon\
    \ ocean distributions of individual stocks respond to a variation in ocean conditions.\
    \ We construct a population dynamics model that includes all of the major fall-run\
    \ Chinook salmon in the northeastern Paci\uFB01c Ocean...and provide stock- and\
    \ year-speci\uFB01c estimates of ocean distribution. We then use future projections\
    \ of the ocean temperature to generate predictions of ocean distribution for six\
    \ of the largest fall-run Chinook salmon stocks, and provide estimates of each\
    \ stock\u2019s association with SST. We constructed a Bayesian state-space model\
    \ to track the spatio-temporal population dynamics of 1,400 tagged groups of Chinook\
    \ salmon representing \uFB01sh from 16 distinct origins between 1979 and 2015.\
    \ Our model extends and improves an ocean distribution model based on recoveries\
    \ of tagged Chinook salmon (Shelton et al., 2019) by adding 20 years of recovery\
    \ data, accommodating annual variation in distribution, and linking ocean distributions\
    \ to observed sea surface temperatures (SST).\n"
  8: "Our model uses the ocean region, season, and \uFB01shery where recovery occurred\
    \ as well as information about the \uFB01sheries e\uFB00ort and catch sampling\
    \ for CWT to infer four main biological processes: 1) the mortality of juvenile\
    \ \uFB01sh prior to spring of age 2; 2) \uFB01shing mortality by age and ocean\
    \ region from each \uFB02eet; 3) the spatial distribution of \uFB01sh in the ocean\
    \ and relationship between SST and ocean distribution; and 4) the age-speci\uFB01\
    c loss of \uFB01sh from the ocean due to maturation (salmon leaving the ocean\
    \ and returning to their streams of origin to spawn). Thus changes in any of these\
    \ four processes can a\uFB00ect CWT recoveries and our model accounts for all\
    \ of these processes simultaneously for all ocean regions and seasons (see Supplement\
    \ S1 for details). We track the abundance of \uFB01sh from the spring of age 2\
    \ (de\uFB01ned as calendar year minus brood year) to fall of age 6, encompassing\
    \ 19 seasonal time steps and 17 ocean regions (Fig. 1). While our model provides\
    \ estimates of biological parameters for \uFB01sh from all 16 origin regions (hereafter\
    \ \u201Cstocks\u201D), included in the model across all years, we focus on six\
    \ stocks with the largest number of tagged \uFB01sh in our dataset that contribute\
    \ disproportionately to the major Chinook salmon \uFB01sheries along the west\
    \ coast of North America...These 1,400 hatchery-stage-year groups (hereafter release\
    \ groups) can include more than one CWT tag code and represent a total of 353\
    \ million Chinook salmon released between 1978 and 2010 (brood years 1977 to 2009;\
    \ Tables S2.2, S2.3) and recovered in the ocean between 1979 and 2015 (an estimated\
    \ 1.3 million recovered tags). We detail results for fall-run Chinook salmon from\
    \ California\u2019s Central Valley (hereafter \u201CSFB\u201D), the Klamath basin\
    \ in northern California (\u201CNCA\u201D), the lower Columbia River fall-run\
    \ Chinook (\u201CLCOL\u201D; also known as \u201Ctules\u201D), the bright run\
    \ from the middle Columbia River (\u201CMCOL\u201D), the upriver bright run from\
    \ the Columbia River (\u201CURB\u201D), and the fall-run."
  9: "yaml\nEvaluation overview: \"Chinook salmon from the Snake River... providing\
    \ su\uFB03cient information to allow for robust inference about year-to-year patterns\
    \ in ocean distribution and abundance.\"\nMethodology: \"We conduct all of our\
    \ data analysis in R (v3.6.1) and implement the statistical models in Stan...\
    \ We use a dimension reduction technique known as predictive process modeling...\
    \ to impose a smoothness constraint...\"\nHighlights: \"Chinook salmon distributions\
    \ vary by season... We divide the coastal ocean into 17 ocean regions... Among\
    \ these ocean regions however, ocean distributions of Chinook salmon are assumed\
    \ to be smooth \u2013 adjacent region s are more similar in abundance than distant\
    \ regions, on average.\"\n"
  10: Specifically, we used the Optimum Interpolation Sea Surface Temperature (OISST)
    dataset to derive season specific temperature series for each ocean region from
    1982 to 2015. [...] We calculated an anomaly for each ocean region-season combination
    by subtracting the among year mean so that each ocean region-season-calendar year
    combination had a time-series average of zero. [...] We estimated a coefficient
    for each stock-ocean region-season, and therefore made proportional occurrence
    in ocean regions vary with SST. [...] We used a global circulation model (GCM)
    - the medium resolution Max Planck Institut Earth System Model - to provide predicted
    temperatures for SST for each season and ocean region. We used predictions from
    the RCP45 scenario. [...] We chose Representative Concentration Pathway (RCP)
    4.5 because it represents a likely future of global carbon emissions. [...] We
    calculated a weighted mean SST from the OISST data and our estimates of distribution.
    [...] We use our estimates of proportional distribution as weights and then summarize
    this weighted mean SST to describe the temperature association for each stock
    among years during the summer season.
  11: "yaml\nEvaluation overview: \"To understand how changes in SST may shift the\
    \ abundance of Chinook salmon among ocean regions, we needed to combine our estimates\
    \ of distributions (the proportion of the total ocean population of each stock\
    \ in each ocean region) with estimates of stock-speci\uFB01c abundance.\"\nDrivers\
    \ of Risk: \"We felt RCP4.5 represented the most likely scenario of the three,\
    \ given current circumstances and the fact that CO2 emissions are still rising...differenced\
    \ that mean from the future projections in the MPI45 model (years 2025\u20132100)\
    \ to produce temperature anomalies for each season-ocean region.\"\nQuantitative\
    \ material: \"We then summarized predicted average temperature anomalies for each\
    \ season-ocean region in ten-year blocks centered on 2030, 2050, 2070, and 2090...\"\
    \nMethodology: \"We calculated season-ocean region means of SST from the 1982\u2013\
    2005 period from the MPI45 and then differenced that mean from the future projections\
    \ in the MPI45 model (years 2025\u20132100) to produce temperature anomalies for\
    \ each season-ocean region...To marry output from these \uFB01sheries management\
    \ models to our distribution estimates, we \uFB01rst extracted estimates of total\
    \ in-river population size\"\n"
  12: "yaml\nEvaluation overview: \"To estimate ocean region-speci\uFB01c abundances,\
    \ we \uFB01rst drew abundances from each stock from a joint distribution of abundances\
    \ across stocks... We then apportioned each stock\u2019s total abundance among\
    \ the di\uFB00erent ocean regions using the estimated proportional distribution...\
    \ We summarized both the proportional change in abundance for each stock and the\
    \ overall change in predicted aggregate abundance.\"\nDrivers of Risk: \"using\
    \ the estimated proportional distribution (the \u03B8s) corresponding to the current\
    \ average (T = 0) and future SST for 2030, 2050, and 2070... the projected temperatures\
    \ for the ten year average deviation (\xB11 SD) for 2030, 2050, 2070, and 2090\"\
    \nQuantitative material: \"We drew 1,000 samples from the posterior distribution\
    \ of \u03B8 and 1,000 draws from the abundance distribution to propagate the uncertainty\
    \ in distribution and abundance for each stock. We summarized both the proportional\
    \ change in abundance for each stock and the overall change in predicted aggregate\
    \ abundance.\"\nMethodology: \"we \uFB01rst drew abundances from each stock from\
    \ a joint distribution of abundances across stocks, to account for the observed\
    \ covariation in abundance among stocks... We then apportioned each stock\u2019\
    s total abundance among the di\uFB00erent ocean regions using the estimated proportional\
    \ distribution (the\u03B8s) corresponding to the current average (T = 0) and future\
    \ SST for 2030, 2050, and 2070.\"\nHighlights: \"the summer and fall patterns\
    \ exhibit a notable trough in SST in the southern portion of the range along the\
    \ coast of northern California (regions MEN, NCA).\"\n"
  13: "`\nThe six focal stocks exhibited substantial di\uFB00erences in average ocean\
    \ distribution and the model estimated some distributional variation as a function\
    \ of SST (Fig. 2). As SSTs are driven in part by basin-scale oceanographic processes,\
    \ historical temperature deviations are spatially synchronous with a coastwide\
    \ median pairwise correlations of 0.47 and some adjacent ocean regions having\
    \ correlations of greater than 0.90 (Fig. S3.4). The estimation model converged\
    \ and mixed well (\u02C6R convergence diagnostics: \u02C6R < 1.01 for all parameters;\
    \ Gelman & Rubin, 1992; Vehtari et al., 2020). This is a large model, incorporating\
    \ over 756,000 observations of presence/absence and 47,000 of positive CWT recoveries.\
    \ All six stocks had individual ocean regions for which the proportion varied\
    \ by more than 5% among years. Future average ocean conditions during the summer\
    \ are generally comparable to extreme El Ni\xF1o events observed since 1982 (e.g.\
    \ 1983, 1997; see NOAA, 2020). There were di\uFB00erences in summer ocean distribution\
    \ between cool (e.g. 2008) and warm (e.g. 1997) years (Fig. 3). For the Klamath\
    \ (NCA), and four Columbia river stocks (LCOL, MCOL, SNAK, URB), ocean distributions\
    \ shifted north in a warm year (1997) relative to a cool year (2008; see also\
    \ Fig. 1). The URB stock showed the smallest distribution shifts in response to\
    \ SST. For clarity of plotting, we excluded the three Salish Sea ocean regions\
    \ in all distributional plots and focused on the ocean regions outside the Salish\
    \ Sea.\n"
  14: "yaml\nEvaluation overview: \"The page does not provide a detailed overview\
    \ of specific outcomes like mortality or productivity loss.\"\nDrivers of Risk:\
    \ \"Shifts in ocean regions due to changes in sea surface temperatures (SST) impact\
