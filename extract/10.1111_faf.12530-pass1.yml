Highlights:
  3: Different Chinook salmon stocks have distinct ocean distributions and responses
    to SST. Species-level estimates ignoring stock variation will lead to errant predictions.
    Redistribution does not follow a simple poleward shift, with net movement into
    some regions and out of others.
  6: The page highlights the difficulty in accurately assessing salmon distribution
    shifts due to the lack of comprehensive surveys and the confounding effects of
    fisheries effort and stock-specific abundance. It also notes conflicting evidence
    regarding the potential for salmon distributions to shift in response to climate
    change, with some studies suggesting limited annual variation and others indicating
    changes in suitable ocean habitat.
  7: The paper provides a large-scale, integrated estimate of how Chinook salmon ocean
    distributions of individual stocks respond to variation in ocean conditions. It
    links ocean distributions to observed sea surface temperatures (SST) and uses
    future projections of ocean temperature to generate predictions of ocean distribution
    and abundance for six of the largest fall-run Chinook salmon stocks.
  8: Model accounts for the simultaneous influence of fish abundance, ocean distribution,
    fishery effort, and fishery sampling rates on CWT recoveries.
  10: The study models and predicts the effect of SST deviations on ocean distribution
    of species and calculates a weighted mean SST associated with each stock.
  11: Predicted spatial distributions for each of the focal Chinook salmon stocks
    based on temperature anomalies. Estimated stock-specific abundances based on annual
    estimates of spawning or in-river returns.
  12: Summer and fall SST patterns exhibit a notable trough along the coast of northern
    California.
  13: "Future average ocean conditions during the summer are generally comparable\
    \ to extreme El Ni\xF1o events observed since 1982, though by 2070 most average\
    \ temperature anomalies are expected to exceed SST observed since 1982 especially\
    \ in the northern portion of the range. In warm years (e.g. 1997), ocean distributions\
    \ of Klamath and Columbia river stocks shifted north relative to cool years (e.g.\
    \ 2008)."
  14: "Future predicted average summer ocean distributions appear generally similar\
    \ to a strong El Ni\xF1o year (1997). Northern California is predicted to experience\
    \ decreased salmon abundance, while northern British Columbia is predicted to\
    \ remain stable or increase."
  15: Chinook salmon stocks respond differently to SST warming; the SFB stock shifts
    southward, MCOL stock shifts northward, and the URB stock shows minimal response.
    Significant distributional shifts are projected for 2050, with increases in northern
    British Columbia and central California and declines in northern California and
    Washington.
  16: Chinook salmon abundance is predicted to increase in northern British Columbia
    and central California, while decreasing in northern California and Washington.  Oregon,
    southern British Columbia, and Alaska are predicted to have almost no change.
    Shifts in ocean distributions will result in changing availability of Chinook
    salmon to ocean fisheries.
  17: Current fisheries management does not incorporate explicit ocean distribution
    models for Chinook salmon or include oceanographic effects on distribution. Integrating
    ocean distribution information should be considered for future management scenarios
    in a warming ocean.
  18: The study shows that SST may not universally predict Chinook salmon abundance
    and occurrence due to stock-specific differences in distribution. Ignoring these
    differences can lead to errant projections of future distribution.
