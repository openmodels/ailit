  10: The analysis focuses on ocean regions and SST impacts on stock distributions.
    The choice of RCP4.5 is justified as representing a 'likely future' of carbon
    emissions. The study uses a global circulation model (GCM) - the medium resolution
    Max Planck Institut Earth System Model (MPI-ESM-MR) to predict future temperatures.
  11: Focuses on ocean region temperature anomalies. Uses total stock abundance (hatchery
    and non-hatchery produced fish). The study used the average predicted offset from
    14 non-Salish Sea regions as the offset for each of the three Salish Sea regions
    due to a lack of predictions from the MPI45 model for the ocean regions in the
    Salish Sea.
  12: The analysis focuses on maturing adult salmon, not the entire ocean population.
    The 17 ocean regions are aggregated into smaller fishing/regulatory areas for
    analysis.
  14: The study focuses on Chinook salmon stocks. Predictions for 2070 are considered
    more uncertain than predictions for 2030 because SSTs are predicted to exceed
    the observed range from 1982-2015.
  15: Projections for 2030 and 2070 show similar patterns of change but differ in
    magnitude.
  16: The results are not inclusive of all Chinook salmon populations, but represent
    a majority of individuals in many ocean fisheries. Shifting distributions may
    have significant consequences on targeting specific Chinook populations for harvest.
  17: The study acknowledges limitations, including the assumption that stock abundance
    is represented by recent decades and dependence on hatchery-origin fish data.
  18: The authors suggest that the phenomena of stock-specific distribution may be
    more prevalent for anadromous species than strictly marine species.
