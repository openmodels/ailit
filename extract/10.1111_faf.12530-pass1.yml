  17: "Source material here.\n\"At present, no \uFB01sheries a\uFB00ecting salmon\
    \ incorporate explicit ocean distribution models for Chinook salmon or include\
    \ any oceanographic e\uFB00ects on distribution. Our work suggests that integrating\
    \ ocean distribution information warrants consideration for future management\
    \ scenarios in a warming ocean (Lewison et al., 2015).\"\n\"An important caveat\
    \ for our simulations is that we assume the abundance of the focal stocks is represented\
    \ by the abundance in recent decades (1983 to present). While this assumption\
    \ allows us to identify predicted shifts that stem solely from ocean climate...\"\
    \n\"Although Beacham et al. (2020) found \uFB01ne-scale di\uFB00erences in the\
    \ distributions of geographically proximate coho salmon (O. kisutch) populations,\
    \ they noted that Weitkamp and Neely (2002) did not \uFB01nd di\uFB00erences between\
    \ hatchery- and natural-origin coho salmon distributions at a resolution more\
    \ comparable to our study.\"\n\"Our model provides a framework that can be used\
    \ in the future to link changes in freshwater productivity and hatchery practices\
    \ to ocean distribution and availability.\"\n"
  18: "yaml\nEvaluation overview: \"Our results also have general implications for\
    \ estimating suitable or optimal habitat based on observed relationships between\
    \ SST and abundance and for projecting distributional change under oceanographic\
    \ change.\"\nDrivers of Risk: \"SST is one of the main oceanographic covariates\
    \ used in such analyses (e.g. Hazen et al., 2018; Rogers et al., 2019).\"\nQuantitative\
    \ material: \"We show that the weighted mean SST varied among stocks by 2.7 C,\
    \ suggesting there is not a fundamental, physiologically driven SST that universally\
    \ predicts Chinook salmon abundance and occurrence.\"\nMethodology: \"Many studies\
    \ attempt to identify the relationship between SST and estimates of abundance\
    \ which use this relationship to project distribution under future ocean conditions.\
    \ We anticipate using alternative environmental covariates in or di\uFB00erent\
    \ mathematical forms for equation 2 to improve estimates of Chinook salmon ocean\
    \ distribution.\"\nHighlights: \"Conducting a species-level analysis that ignores\
    \ stock-speci\uFB01c di\uFB00erences in distribution (e.g. Abdul-Aziz et al.,\
    \ 2011; Cheung & Fr\xF6licher, 2020) would yield errant projections of future\
    \ distribution. SST may not be a particularly good descriptor of the true environmental\
    \ signal they are tracking.\"\n"
