Methodology:
  3: Spatio-temporal model jointly estimating the ocean distribution of all major
    fall-run Chinook salmon stocks from California to British Columbia over 40 years,
    modeling hundreds of millions of tagged individuals.
  6: The page discusses limitations of using fisheries catch data and tag recoveries
    to assess salmon distribution shifts, highlighting the influence of fisheries
    effort. It also mentions studies using thermal tolerance to estimate suitable
    ocean habitat.
  7: A Bayesian state-space model is used to track the spatio-temporal population
    dynamics of 1,400 tagged groups of Chinook salmon from 16 distinct origins between
    1979 and 2015. Recapture data of coded wire tagged (CWT) Chinook salmon from fisheries
    from California to Alaska are used to estimate model parameters. Future projections
    of ocean temperature are then used to generate predictions of ocean distribution
    for six of the largest fall-run Chinook salmon stocks.
  8: Model uses ocean region, season, and fishery where recovery occurred, as well
    as information about fisheries effort and catch sampling for coded wire tags (CWT).
  10: The study uses OISST data (1982-2015) supplemented with direct observations
    in the Salish Sea to derive season-specific temperature series. It calculates
    SST anomalies and estimates proportional occurrence of species in ocean regions
    based on a formula (equation 2) involving SST and stock-specific coefficients.
    Future ocean conditions are predicted using the MPI-ESM-MR GCM under the RCP4.5
    scenario. The weighted mean SST, using proportional distribution as weights, is
    calculated to characterize the temperature association for each stock.
  11: Used MPI45 model projections (years 2025-2100) to produce temperature anomalies
    relative to the 1982-2005 period. Accounted for the difference in time frame by
    calculating an offset using OISST data. Combined distribution estimates with stock-specific
    abundance estimates from PFMC and CTC.
  12: "The study uses estimates of annual ocean exploitation rates and river fisheries\
    \ data to estimate salmon population size. It apportions each stock\u2019s total\
    \ abundance among ocean regions based on estimated proportional distribution (\u03B8\
    s) corresponding to current and future SST.  It uses OISST data from 1982-2015\
    \ to establish baseline temperature patterns."
  13: A population dynamics model was used, incorporating over 756,000 observations
    of presence/absence and 47,000 of positive CWT recoveries. The model estimates
    distributional variation as a function of SST.
  14: "Historical abundance estimates of spawning Chinook salmon were combined with\
    \ predicted changes in ocean distribution to project changes in aggregate abundance.\
    \ Summer ocean distribution for 2030 and 2070 are predicted based on SST, using\
    \ 1997 (strong El Ni\xF1o) as an analog.  The baseline period for average temperatures\
    \ is 1982-2015."
  15: The study integrates data on Chinook salmon stock-specific ocean distribution,
    relationships to SST, and future temperature projections to predict distributional
    shifts in aggregate abundance.
  16: Modeling effort predicting shifts in Chinook salmon distribution based on future
    climate conditions.
  17: The study uses simulations based on the abundance of focal stocks from 1983
    to present to predict shifts stemming from ocean climate. The model relies on
    data from hatchery-origin fish (CWT data) to make inferences about stocks consisting
    of both hatchery- and natural-origin fish.
  18: The study uses observed relationships between SST and abundance to project distribution
    under oceanographic change.
  23: Develops a dynamic ocean management tool.
  26: Methods include stock assessment, analysis of climate velocities, and studies
    of organism responses to climate change across oceans.
  27: Genetic stock identification (Satterthwaite et al., 2015), analysis of temporal
    patterns in ocean spatial distribution (Satterthwaite et al., 2013), and comparing
    inferred ocean distributions of genetically similar Chinook salmon stocks (Satterthwaite
    & O'Farrell, 2018) are used.
  30: Uses OISST and MPI45 global circulation model data to project SST anomalies.
    Estimates proportional distribution of salmon stocks based on summer ocean distribution
    under different climate scenarios (historical, warm/cool summers, and projected
    SST conditions). Analysis covers 1982-2015 for historical data and projects to
    2030, 2050, 2070, and 2090.
  33: 'The analysis uses density plots to visualize the distribution of proportions
