    \nMethodology: \"Analysis used historical abundance estimates combined with predicted\
    \ changes in ocean distribution to project changes in stock-specific ocean abundance.\"\
    \nHighlights: \"Fish stocks show northward shifts or local redistributions due\
    \ to SST changes; uncertainty increases for predictions beyond observed historical\
    \ temperature ranges.\"\nMore Notes: \"Predictions for 2070 hold more uncertainty\
    \ due to SST exceeding historical ranges.\"\nSource Material: \"324  \uFB01sh\
    \  shifting  one  ocean  region  north (a  shift  on  the  order  of  100-200\
    \  km). 331 Among stocks, the median weighted mean SST ranged nearly 2.7 C from\
    \ 9.5 C for the URB stock to 12.2 C for SFB (Fig. 4). 337 For all stocks, future\
    \ predicted average summer ocean distribution for 2030 and 2070 appear generally\
    \ similar to the distribution of a strongElNi\u02DCno year (1997; Fig. 3). 343\
    \ We combined historical abundance estimates of spawning Chinook salmon with predicted\
    \ changes in ocean distribution to understand how aggregate abundance across these\
    \ six focal stocks may shift in response to projected oceanic conditions. 325\
    \ more concentrated in the southernmost ocean regions (MONT and SFB), with accompanying\
    \ declines in 326 the northern California regions of MEN and NCA, and slightly\
    \ increasing in the northern edges of its range 341 are predicted to mostly exceed\
    \ the observed range of temperatures from 1982-2015, are more uncertain than 342\
    \ the predictions for 2030 which fall clearly in the range of observed SST deviations\
    \ (Fig. 1).\"\n"
  15: "Source material here: We integrated disparate data sources spanning over 25\
    \ degrees of latitude and 40 years to provide estimates of stock-speci\uFB01c\
    \ ocean distribution for Chinook salmon and how ocean distributions will shift\
    \ with SST. Our results show that individual stocks vary substantially in their\
    \ current distribution, have stock-speci\uFB01c relationships to SST, and respond\
    \ meaningfully to observed historical SST variation. We predict in 2050 aggregate\
    \ abundance for these six stocks will increase or remain largely unchanged in\
    \ northern British Columbia and Alaska (changes of 33[23, 49], and \u22126[\u2212\
    14, 0.5] thousand \uFB01sh, respectively, median[interquartile range]). This is\
    \ a median change of 16% and \u22122% over current conditions, respectively; Fig.\
    \ 5C). At the far southern extent of the area, there are substantial changes,\
    \ with predicted increases in central California (44[24, 74] thousand, +21%) and\
    \ declines in northern California (\u221262[\u221295, \u221240] thousand, \u2212\
    33%). Washington is predicted to decline substantially (\u221226[\u221236, \u2212\
    19] thousand, \u221224%). Finally, we married stock-speci\uFB01c distributions\
    \ with future temperature projections and estimates of abundance to predict distributional\
    \ shifts in aggregate. These changes occur primarily because of the southerly\
    \ distributional shift of the abundant SFB stock...responses to SST are not uniform\
    \ in direction or magnitude, with one stock (SFB) estimated to shift distribution\
    \ southward in response to SST warming while another (MCOL) shifted strongly northward."
