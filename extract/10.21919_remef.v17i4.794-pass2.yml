sourcematerial:
  1: "Source material here.\nThe impacts of climate change are global in scope and\
    \ unprecedented in scale, and the increasing frequency and severity of extreme\
    \ events, from rising temperatures, droughts, extreme rainfall, and rising sea\
    \ levels, have increased throughout North America. Without immediate action, adaptation\
    \ to climate change will be more difficult and costly, particularly for the most\
    \ vulnerable social groups and economic activities and ecosystems in the area.\
    \ In this article, we reflect on the evidence recently produced by the Working\
    \ Group 2 of the IPCC - the UN Intergovernmental Panel on Climate Change - in\
    \ relation to the North American region (Canada, USA, Mexico). The evaluation\
    \ methods of the information used for the report on \u201CImpacts, adaptation\
    \ and Vulnerability\u201D are based on impacts and adaptation assessments revised\
    \ in the available literature on the topic. We also seek to highlight their economic\
    \ and financial dimension for the North American region. In the future, it is\
    \ necessary to delve into the impacts of climate change at the subnational level\
    \ in the North American region and in Mexico.\n"
  3: 'yaml

    Evaluation overview: "Global warming has already caused extensive and dangerous
    alteration to nature and affected the life of millions of people in all regions
    of the planet."

    Drivers of Risk: "Climate change is a threat to human wellbeing and planetary
    health; growing number of climate-related disasters in all regions."

    Quantitative material: "Between 3.3 and 3.6 billion people live currently in regions
    and places with high vulnerability to climate change."

    Highlights: "Scientific evidence is unequivocal that climate change is a threat
    to human wellbeing and planetary health; IPCC highlights the small window of opportunity
    (approximately 10 years) to strengthen mitigation and adaptation responses."

    More Notes: "WGII highlights the concept of Climate Resilience Development (CRD)
    which combines adaptation and mitigation actions for sustainable development;
    importance of immediate and deep changes in human activities is emphasized."

    Observed impacts and projected risks on ecosystems and biodiversity indicate the
    support they provide to main human life and the economy in the planet is at risk.
    The growing number of climate related disasters in all regions are also an indicator
    of the threat to human life, the economy, and our lifestyles. One of the key messages
    in this report is that scientific evidence is inequivalve, climate change is a
    threat to human wellbeing and planetary health. The growing number of climate
    related disasters in all regions are also an indicator of the threat to human
    life, the economy, and our lifestyles. IPCC estimates that between 3.3 and 3.6
    billion people live currently in regions and places with high vulnerability to
    climate change. IPCC considers there is a small window of opportunity (approximately
    10 years) to strengthen and enhance responses to climate change both mitigation
    and adaptation. WGII highlights Climate Resilience Development (CRD) as an operational
    concept that combines adaptation and mitigation actions to enhance opportunities
    for sustainable development in the short-term and long-term. Changes needed to
    reduce the use of fossil fuels are needed in every sector of human activity (production
    and consumption patterns, lifestyles, land use, urban function, and form, etc.).
    These changes need to be deep and immediate but given the challenge to implement
    them it is essential to consider climate change impacts on ecosystems, biodiversity,
    and societies.

    '
  4: "  \n\"North America is a geographical region...one third of the global GHG emissions.\"\
    \ - Provides context for evaluation overview.\n\n\"Climate change is already being\
    \ observed in North America, including shifted rainfall patterns and dramatic\
    \ warming in the Arctic.\" - Supports the identification of drivers of risk.\n\
    \n\"The region has produced a greater share of greenhouse gas emissions over time\
    \ than any other continent and this is due mostly to the contribution of the US,\
    \ historically the world's largest single emitter of human-released greenhouse\
    \ gases and now the second-largest emitter after China.\" - Provides context for\
    \ more notes regarding North America's contribution to GHG emissions.  \n"
  5: "In North America, numerous impacts of climate change have already been seen...\
    \ The effects of climate change in North America are evident: sea level rise,\
    \ longer and more intense wildfire seasons, and disastrous droughts are among\
    \ effects that climate scientists have noticed. [...] However, it is important\
    \ to mention that there are uncertainties in determining \u201Cexactly how climate\
    \ change will affect North America and different world regions. [...] The report\
    \ noted that North America has seen severe damage to local economies, ecosystems,\
    \ and social systems from recent extreme weather, including floods, storms, droughts,\
    \ heat waves, and wildfires. Extreme weather events are happening with major frequency.\
    \ Indigenous people, urban areas will remain more vulnerable than others to climate-change\
    \ impacts. At the same time, coastal development and precipitations due to increased\
    \ storms and hurricanes will interact with climate change impacts to stress coastal\
    \ communities and habitats. Storm impacts are likely to be more severe, thanks\
    \ to rising sea levels, along the Atlantic and Gulf coasts. [...] Northern Mexico\
    \ could experience an increase in average annual temperatures of 3 to 4 degrees\
    \ Celsius ... Average temperatures in the country could rise by 1.5 to 2.5 degrees\
    \ Celsius."
  6: "Source material here. \"the average temperatures in Mexico have increased approximately\
    \ 0.85\xB0C above the registered climatological normal...Between 2015 and 2039,\
    \ the average annual temperature in the country is expected to have increased\
    \ by 1.5\xB0C and 2\xB0C in the north of the territory.\" \"Extreme events in\
    \ Mexico have also increased in the form of tropical storms, hurricanes, fires\
    \ and heat waves at different times of the year with much greater frequency and\
    \ intensity than in the past.\" \"These extreme hydrometeorological phenomena\
    \ create torrential rains, floods, and landslides with serious effects on populations\
    \ in rural and urban areas.\" \"Regarding agriculture and food security, there\
    \ are severe impacts: as a result of changes in both temperature and precipitation,\
    \ low yields are expected in crops such as: corn, sugar cane, sorghum, wheat,\
    \ rice, soybeans (5- 20% next decades and 80% by the end of the century). At the\
    \ end of the century, states such as Jalisco, the State of Mexico, Nayarit, Morelos,\
    \ Michoac\xE1n, Guerrero and Colima could lose between 30 and 40% of their seasonal\
    \ corn production yields.\" \"The issue of rising sea levels is also highlighted\
    \ as an alarming phenomenon...the three countries of North America can suffer\
    \ severe floods and its average level can rise between 20, 40 or even 60 centimeters\
    \ depending on the projections and the models used.\" \"In relation to the increase\
    \ in the concentration of carbon dioxide in the atmosphere, this has caused the\
    \ acidification of the oceans, especially on the Pacific coast, where a decrease\
    \ in pH of 0.5 has been observed, which can have serious consequences on the rates\
    \ of calcification and growth of corals, as well as in the generation of sargassum\
    \ and other marine pests that can affect tourism and coastal urban areas.\""
  12: "  \nSource material here.  \n- Evaluation overview: \"Evidence of the consequences\
    \ of climate related disasters in cities of North America is extensive. For example,\
    \ the direct economic costs of all extreme events reached 210-268 billion USD\
    \ in 2020.\"\n- Drivers of Risk: \"Population and the economy in North America\
    \ are concentrated in urban areas... A final topic to be considered is the issue\
    \ of Sea Level Rise (SLR) in the region: in the past 20 years, flooding has increased\
    \ on average by 233% only in the US.\"\n- Quantitative material: \"For example,\
    \ the direct economic costs of all extreme events reached 210-268 billion USD\
    \ in 2020... Even though the sea level has increased by 20 cm. since 1950, only\
    \ the previous 20 years account for roughly half of that (almost 8 cm.).\"\n-\
    \ Highlights: \"It is estimated that $90 trillion will be invested in new urban\
    \ development by 2030 (IPCC, 2022 Ch.6)... A number of these cities are vulnerable\
    \ to climate change.\"\n- More Notes: \"There is no specific data available for\
    \ North America but IPCC reports that globally $384 billion of climate finance\
    \ has been invested in urban areas per year in recent years, but this remains\
    \ at about 10% of financial resources needed for low-carbon and resilient urban\
    \ development.\"\n"
  13: Significant developments and improvements are taking place in North America
    related to financial resources to deal with climate change, but with significant
    regional differences. After the US re-joined the Paris Agreement under the current
    Biden presidency, a new set of investments and financial solutions may become
    available, but they still face challenges in US Congress and recently in the Supreme
    Court.
  14: '

    Evaluation overview: The article summarizes some of the relevant implications
    for the economy, social wellbeing, and ecosystems in the region.

    Drivers of Risk: High exposure or sensitivity to climate impacts in economic sectors
    mentioned above have experienced larger losses and adaptation costs.

    Highlights: Our assessment of the IPPC report suggests that system transformation
    to adapt to climate change are advancing slowly and unevenly in the region.

    Highlights: IPCC assesses with high confidence that extreme events have damaged
    economically important supply-chain infrastructure and disrupted regional and
    international trade, increased public expenditures on emergency and recovery response,
    and affected property and financial market

    Highlights: Unfortunately, immediate, and comprehensive adaptation actions in
    the region faces significant challenges. National administrations have had different
    approaches to climate change due to domestic circumstances, political constraints,
    and ideological positions.

    More Notes: It is also important to recognize that adaptation has received less
    attention than mitigation in national responses to climate change, particularly
    in the U.S. and Mexico,

    More Notes: Climate change policy at the national and subnational level has had
    ups and downs in recent administrations...The gap between adaptation planning
    and implementation is particularly evident in the local States and the very small
    number of municipal climate change action programs.

    '
  15: 'Source material: Despite declining yields in economic activities, aggravating
    conditions in social wellbeing, and increasing degradation of ecosystem caused
    by climate change, attention to adaptation continue to be limited, short-term
    focused, fragmented or even inexistent in many cases. Scientific evidence seems
    to have had limited impact in decision making by significant parts of the public,
    private and social sector. Recent studies suggest that high risk perception is
    in itself insufficient to motivate people to undertake adaptation and highlights
    the importance of strong institutions, financial resources, inclusive governance,
    and political leadership to support and expand local adaptation strategies. Evidence
    shows early adaptation actions have significant economic benefits for societies.
    The World Bank found that every $1 invested in resilient infrastructure in low-
    and middle-income countries yields $4 in net benefits. Responding to climate change
    will require significant behavioral changes in society, but a new approach to
    decision-making mainstreaming adaptation to climate change in development policies
    is an essential step.'
