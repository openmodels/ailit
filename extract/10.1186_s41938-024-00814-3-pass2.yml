  5: "  \n\"Intercropping of maize with legume crops, such as groundnut, beans and\
    \ soybeans, limited FAW damage by 31\u201330, and 21%, respectively...\"\n\n\"\
    Transgenic resistance is a powerful technique that involves genetically modif\
    \ ying plants to confer resistance against specific pests or diseases... One notable\
    \ example is the use of B. thuringiensis (Bt) technology... Transgenic resistance\
    \ has demonstrated great promise in controlling FAW, offering effective and targeted\
    \ pest management...\"\n"
  6: Parasitoids have demonstrated significant effectiveness in controlling FAW populations.
    [...] Larval parasitism rates varied from 5.1 to 38.8% and with up to 75% in some
    sites (Agboyi et al. 2020). Extensive surveys conducted across Western Africa
    (Ghana, Benin, Senegal), Eastern Africa (Ethiopia, Kenya, Tanzania) and Southern
    Africa (Zambia, Mozambique) have identified potential natural enemies of FAW.
    These surveys documented seventeen species of parasitoids within the order Hymenoptera
    and two species of Dipterans. [...] In Benin, ant species have been also observed
    to significantly reduce FAW abundance in maize cropping systems (Dassou et al.
    2021).
