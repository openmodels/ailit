    "Source material": "Integrated pest management (IPM) against FAW in the context
    of climate changes...Host resistance: a key component in IPM strategies...climate
    change becomes a major challenge to the agricultural sector, affecting host plant
    interactions, population dynamics, geographical distribution, activity of pests
    and efficacy of control methods (Sharma and Dhillon 2018) and subsequently affecting
    both crop production and food security...IPM is a science-based approach aimed
    at reducing the use of chemical pesticides for managing insects, weeds, plant
    diseases, etc., economically, safely and effectively by applying a variety of
    pest management methods (Guimapi et al. 2022). The focus is on the prevention,
    reduction and suppression of factors that lead to pest infestations (Helyer 2014)...ecosystem
    management must be planned by identifying pests from beneficial organisms, monitoring
    their effect on plants and the environment such as climate activities, weather
    variations, etc., and making action decisions based on threshold levels. This
    inclusive approach combines agro-ecological, biological, physical, mechanical,
    behavioral, and chemical methods....Native genetic resistance to FAW has emerged
    as a promising approach for managing this destructive insect pest...The International
    Maize and Wheat Improvement Center (CIMMYT) has played a central role in identifying
    and developing diverse genetic resources in maize, including improved germplasm
    with traits such as drought tolerance, high yield, nitrogen use efficiency, heat
    tolerance, disease resistance, and insect resistance."

