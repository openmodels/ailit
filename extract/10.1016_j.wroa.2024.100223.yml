  9: 'Source material here.

    The document evaluates the impact of water scarcity on GDP, employment, and water
    use across 25 industrial sectors. Results show that most industries experience
    negative impacts, with agriculture being the most heavily affected due to a decrease
    in freshwater availability negatively impacting crop growth and livestock farming.
    Industries such as chemical and pharmaceutical manufacturing, and electricity
    generation are also directly affected by reduced freshwater. Cumulative percentage
    change impacts on sectoral effects of GDP, employment, and water use under three
    investment behaviors: Myopic, Imperfect foresight, and Perfect foresight are provided.
    Analysis uses DEMACRO-ESS simulation results; evaluates industrial impacts based
    on varying investment behavior scenarios under conditions of temporal water scarcity.
    The agriculture sector is the most heavily affected, with GDP, employment, and
    water use impacts being notably severe.

    '
