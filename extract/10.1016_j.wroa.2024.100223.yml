Drivers of Risk:
  1: Water scarcity is driven by factors such as climate change, insufficient rainfall,
    or drought, which impact sectors including agriculture, food, and electricity
    production.
  2: Water scarcity events occurring in May and August serve as shocks impacting the
    outcomes.
  3: The shocks impacting the outcomes are temporal water scarcity events in two different
    scenarios.
  4: Varying levels of investment foresight in response to drought conditions/water
    scarcity.
  5: The drivers of risk are temporal water scarcity events (Scenarios 1 and 2).
  6: Month-long water scarcity events are assumed, lasting the entirety of May in
    a given year. Concurring water scarcity events are assumed to occur in both May
    and August (also lasting the entire month), with the latter being more severe.
  7: Water scarcity events influence GDP, employment, and water use.
  8: The page addresses a temporal water scarcity event as the shock impacting outcomes.
  9: The primary driver of risk is reduced freshwater availability impacting agriculture,
    chemical and pharmaceutical manufacturing, and electricity generation.
Evaluation overview:
  1: The paper provides a macro-level analysis of the socio-economic impacts of temporary
    water scarcity, focusing on investment foresight and economic resilience.
  2: The paper investigates the macro-level socio-economic impacts of water scarcity,
    focusing on tangible outcomes like GDP, investment, employment, and water use.
  3: The page provides an overview of the impacts on GDP, investment, employment,
    and water use during temporal water scarcity events.
  4: Economic resilience to water scarcity, measured by GDP, employment, and water
    use.
  5: This paper evaluates the sector effects on GDP, investment, and water use during
    temporal water scarcity events.
  6: Economic resilience to water scarcity is assessed.
  7: Impacts on GDP, employment, and water use during temporal water scarcity events
    are evaluated.
  8: The page provides cumulative percentage change impacts on sector effects of GDP,
    employment, and water use during a temporal water scarcity event.
  9: The document evaluates the impact of water scarcity on GDP, employment, and water
    use across 25 industrial sectors.
Highlights:
  1: Firms' foresight affects their response to water scarcity and this, in turn,
    influences the economy. Certain sectors may benefit from competitiveness effects,
    which can mitigate adverse economic impacts.
  2: The paper highlights the significance of proactive decision-making models and
    demonstrates how various investment strategies during water scarcity can influence
    sector-specific outcomes.
  3: In Scenario 1, a 0.38% fall in GDP, a 0.37% fall in employment, a 0.45% fall
    in investment, and a 0.6% reduction in water use are observed; in Scenario 2,
    a 0.89% fall in GDP, a 0.86% fall in employment, a 1.04% fall in investment, and
    a 1.39% reduction in water use are noted.
  4: Firms with some level of foresight perform better during water scarcity events.
    Agriculture, food, and electricity sectors are consistently negatively impacted
    by water scarcity. Some sectors benefit from competitiveness effects, mitigating
    contractionary impacts, but potentially increasing water use through catch-up
    effects. Policymakers should prioritize promoting anticipation and preparedness
    among firms and enhancing resilience in water-dependent sectors.
  5: Agriculture and other resource-intensive sectors show negative impacts in many
    metrics, particularly in water use, while service-related sectors often display
    more positive or neutral impacts.
  7: Higher economic openness tends to decrease GDP decline but worsen employment
    impacts; firms with perfect foresight mitigate negative impacts better than those
    with myopic or imperfect foresight.
  8: Significant impacts are observed in the Agriculture, forestry & fishing sector
    with up to a 14.3% decrease in GDP, 7.4% decrease in employment, and 15.7% decrease
    in water use.
  9: The agriculture sector is the most heavily affected, with GDP, employment, and
    water use impacts being notably severe.
Methodology:
  1: The analysis uses a dynamic multisectoral model incorporating behavioural and
    resilience aspects to assess the broader economic implications of water scarcity.
  2: The analysis uses the DEMACRO-ESS model, a general equilibrium model that evaluates
    how different investment behaviours (perfect foresight, myopic expectations, and
    imperfect foresight) impact the macro-economy during and after water scarcity.
  3: The analysis uses the DEMACRO-ESS simulation with different investment behavior
    model specifications (Myopic, Imperfect foresight, Perfect foresight).
  4: Uses a custom built dynamic multi-sectoral CGE model, called DEMACRO-ESS, parameterized
    on a 2020 Social Accounting Matrix (SAM) for Germany at monthly frequency.
  5: The analysis is performed using DEMACRO-ESS simulation and considers different
    investment behavior models (Myopic, Imperfect foresight, and Perfect foresight).
    The model uses multi-level production functions and includes water and land as
    natural capital. The model adopts a Constant Elasticity of Substitution (CES)
    technology with substitution elasticities equal to 0.3.
  6: A computable general equilibrium (CGE) model named AMOS is used to simulate the
    economic impacts of water scarcity, by reducing the water efficiency parameter
    in the model.
  7: A sensitivity analysis using the DEMARCO-ESS model is conducted with different
    Armington trade elasticities to account for varying levels of economic openness.
  9: Analysis uses DEMACRO-ESS simulation results; evaluates industrial impacts based
    on varying investment behavior scenarios under conditions of temporal water scarcity.
More Notes:
  2: The model's qualitative findings and policy recommendations have relevance beyond
    Germany, applicable to other countries and regions.
  3: Different investment behaviors result in varying impacts and recovery processes
    after the shocks, with imperfect foresight leading to slower recovery.
  4: The model incorporates behavioral aspects and considers system-wide implications
    of water scarcity. It acknowledges limitations due to parameters that are challenging
    to quantify, interpreting results as scenarios rather than precise predictions.
    A multi-country context would be valuable for assessing competitiveness effects.
  5: The model incorporates two types of water (green and blue) and three types of
    land capital (crops, pastures, and other).
  6: The labor force is fixed, but employment is variable, and labor is mobile across
    sectors. The paper considers perfect foresight, myopic, and imperfect foresight
    versions, resulting in six comprehensive sets of simulation results.
  8: 'The analysis uses different investment behavior model specifications: Myopic
    (MY), Imperfect foresight (IM), and Perfect foresight (PE).'
Quantitative material:
  2: A decrease of 0.14% in GDP and a 0.17% decline in employment were noted in response
    to water scarcity under the myopic expectations model.
  3: The paper provides percentage changes from the base year during drought periods,
    showing changes in GDP, investment, employment, and water use.
  4: Qualitative sectoral effects for GDP, employment, and water use are shown in
    Fig. 2; quantitative results are in Appendices B and C. Reports some sectors benefit
    from competitiveness effects, which can cushion the adverse economic implications
    of water scarcity.
  5: The figure refers to quantitative results in Appendices B and C. Equation (1)
    provides a formula for demand for total capital in sector i, based on demand for
    land and water. Elasticities of 2.7 and 0.3 are used for trade substitution and
    input substitution, respectively. A CES parameter value of 0.4 is used in splitting
    Water into its subcomponents.
  6: In the first scenario, a 30% decrease in water efficiency during the month of
    May is assumed. Similarly, in the second scenario, water efficiency is again reduced
    by the same percentage in May and by 35% in August.
  7: Cumulative percentage impacts on GDP, employment, and water use across time periods
    are given; varying Armington elasticities show changes in GDP from -0.4% to -0.36%
    and in employment from -0.34% to -0.39% for different economic openness levels.
  8: The table provides quantitative information in the form of cumulative percentage
    changes for GDP, employment, and water use in various sectors.
  9: 'Provides cumulative percentage change impacts on sectoral effects of GDP, employment,
    and water use under three investment behaviors: Myopic, Imperfect foresight, and
    Perfect foresight.'
sourcematerial:
  1: " \nRecognising the urgent need to address water scarcity resulting from climate\
    \ change, there is a growing push to enhance the resilience of water (and related)\
    \ systems. This paper utilises a custom-built dynamic multisectoral model to assess\
    \ the socio-economic impacts at a macro-level of temporary water scarcity... By\
    \ considering these key elements, a more comprehensive understanding of the system-wide\
    \ implications of water scarcity on the broader economy is provided. The analysis\
    \ shows how firms\u2019 foresight, or lack thereof, impacts their response to\
    \ water scarcity and the subsequent impact on the economy. Sector-specific analyses\
    \ shed light on the potential negative impacts of water scarcity on sectors like\
    \ agriculture, food, and electricity production and distribution. Yet, the analysis\
    \ also reveals that certain sectors can benefit from competitiveness effects,\
    \ which can mitigate the adverse economic implications of water scarcity. \nClimate\
    \ change will exacerbate water stress and water scarcity... Water scarcity refers\
    \ to periods of reduced water availability, often caused by factors such as insufficient\
    \ rainfall or drought... Agriculture, for instance, suffers from lower crop yields\
    \ due to insufficient soil moisture. Furthermore, lowered river discharges not\
    \ only affect electricity production in thermal, nuclear, and hydropower plants\
    \ but can also impact inland shipping by reducing water depth in rivers.\nthis\
    \ paper specifically focuses on resilience in relation to the economy\u2019s capacity\
    \ to recover after a disturbance, with a particular emphasis on the socio-economic\
    \ impacts at a macro-level and the effects that varying levels of investment foresight\
    \ may have on economic resilience.\n"
  2: 'A.G. Ross et al.

    The primary aim of this paper is to investigate how different invest- vestment
    behaviours, incorporating resilience behavioural characteris- tics, impact the
    macro-economy during and after periods of temporary water scarcity.

    ...

    This paper contributes to policy and literature by examining eco- nomic resilience
    and its implications for decision-making strategies by investigating the macro-level
    socio-economic impacts of water scarcity.

    ...

    Two scenarios are simulated to identify the system-wide resilience to water scarcity.
    In the first scenario, there is a single month-long water scarcity event in May.
    In the second scenario, both May and August experience continuous water scarcity
    throughout the entire month, with the August event being more severe.

    ...

    In the myopic expectations model, firms are not prepared for water scarcity and
    do not take any preventive measures. This leads to a decrease of 0.14% in GDP
    and a 0.17% decline in employment.

    ...

    In this section, the analysis utilises the DEMACRO-ESS model, a general equilibrium
    (CGE) model specifically focused on Germany.

    ...

    To accomplish this, three distinct investment model specifications are utilised:
    perfect foresight, myopic expectations, and imperfect foresight.

    ...

    The paper highlights the significance of taking proactive measures and quantifies
    the varying outcomes of investment strategies at the individual sector level.

    ...

    It is important to note that while the empirical model focuses on Germany, the
    qualitative findings and policy recommendations have relevance for other countries
    and regions as well.

    '
