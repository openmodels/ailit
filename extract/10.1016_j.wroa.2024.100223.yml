    \ that varying levels of investment foresight may have on economic resilience,\
    \ incorporating often overlooked factors such as behavioural aspects.\"\n- Quantitative\
    \ material includes: \"Fig. 2 provides an overview of qualitative sectoral effects\
    \ for GDP, employment, and water use across all simulation periods for the three\
    \ investment behaviour specifications for the two scenarios. The corresponding\
    \ quantitative results are given in Appendices B and C. The qualitative findings\
    \ depicted in Fig. 2 remain consistent across the two scenarios...\"\n- Methodology\
    \ is detailed in: \"The analysis presented in this paper is based on a custom\
    \ built dynamic multi-sectoral CGE model, called DEMACRO-ESS. The model is based\
    \ on the AMOS CGE modelling framework and incorporates (neo) Keynesian characteristics.\
    \ A full list of equations of the base models is given in Lecca et al. (2013)\
    \ and Ross et al. (2023). The DEMACRO-ESS model extends the DEMA-CRO model...by\
    \ considering in detail eco-systems services, specifically water and land; and\
    \ by implementing aspects of resilience via the investment foresight closures...The\
    \ SAM is at monthly frequency such that each simulation time period represents\
    \ a month.\"\n- Highlights are supported by: \"The main results of the analysis\
    \ can be summarised as follows. In the myopic expectations model, firms lack anticipation\
    \ of water scarcity. This results in a decline in GDP and employment during the\
    \ drought periods. However, over time, there is a gradual recovery of GDP...The\
    \ perfect foresight model shows that firms anticipate the water scarcity and there\
    \ is a slight decrease in economic activity before the drought occurs. While the\
    \ water scarcity does have a significant impact, the economy rapidly recovers\
    \ to initial levels. This indicates a high level of resilience to water scarcity\
    \ when foresight is incorporated into decision-making processes.\"\n- More Notes\
    \ are described as: \"The analysis highlights the impact of firms\u2019 foresight\
    \ or lack thereof on their response to water scarcity, as well as the subsequent\
    \ effects on the economy. Sector-specific analyses shed light on the potential\
    \ negative impacts of water scarcity. Additionally, the analysis reveals that\
    \ certain sectors might benefit from competitiveness effects, which can cushion\
    \ the adverse economic implications of water scarcity, although this may contribute\
    \ to increased water use via catch-up effects. Importantly, the analysis presents\
    \ both qualitative findings and quantifies the potential magnitude of these effects.\
    \ To improve the analysis, it would be valuable to extend it to a multi-country\
    \ context, especially considering the potential competitiveness effects.\"\n"
  5: "A.G. Ross et al.\nFig. 2.            Impact of different investment behaviour\
    \ models on sector effects of GDP, investment, and water use during temporal water\
    \ scarcity events (Scenarios 1 and 2): DEMACRO-ESS simulation results. Colour\
    \ legend: red - extremely negative effects, orange &              yellow - less\
    \ negative effects, light green - close to zero yet negative, green - positive\
    \ results. MY =  Myopic; IM = Imperfect foresight; PE =  Perfect foresight; GDP\
    \ = gross domestic product. The corresponding quantitative results are given \
    \ in Appendices  B  and C. \n\nLand  and  water\n     The     standard     production\
    \     function     of     the     DEMACRO     model     (Ross et al., 2023) is\
    \ extended in DEMACRO-ESS to include water and land as natural capital. This is\
    \ accomplished through a nested process, as illustrated in Fig. 3. Value added\
    \ is divided into labour and capital. Initially, the natural capital is separated\
    \ from capital and then further divided into water and land. The model incorporates\
    \ two types of water - green (Wg) and blue (Wb) - and three types of land capital\
    \ - crops (Tc), pastures (Tp), and other (To). Capital is determined by a CES\
    \ relationship between other capital and water:\n\nThe image is a heat map that\
    \ evaluates various sectors based on three criteria: GDP, Employment, and Water\
    \ Use across different time horizons (MY - Medium Year, IM - Immediate, PE - Permanent\
    \ Effect).\n- Agriculture and other resource-intensive sectors show negative impacts\
    \ in many metrics, particularly in water use.\n- Service-related sectors often\
    \ display more positive or neutral impacts across the metrics.\n\n1. **Top Level\
    \ (Output):**\n   - The top of the hierarchy is labeled \"Output\" with a Constant\
    \ Elasticity of Substitution (CES) parameter value of 0.3.\n\n5. **Branch from\
    \ W:**\n   - Under \"W,\" two branches split further:\n     - \"Wb\" \n     -\
    \ \"Wg\" \n   - There's a CES parameter value of 0.4 between \"W\" and its subcomponents.\n\
    \   \nThis diagram suggests a hierarchical production function where different\
    \ inputs combine at various levels of substitution elasticity to produce the final\
    \ output. The use of Leontief and CES functions indicates fixed and variable substitution\
    \ possibilities for different inputs.\n"
  6: "Source material here: To assess the economic resilience to water scarcity, two\
    \ fictitious scenarios are assumed. In the first scenario, a month-long water\
    \ scarcity event is assumed, lasting the entirety of May in a given year. In the\
    \ second scenario, concurring water scarcity events are assumed to occur in both\
    \ May (repeating the first scenario) and August (also lasting the entire month),\
    \ with the latter being more severe. Specifically, in the first scenario, a 30%\
    \ decrease in water efficiency during the month of May is assumed. Similarly,\
    \ in the second scenario, water efficiency is again reduced by the same percentage\
    \ in May and by 35% in August. In the modelling analysis, these scenarios are\
    \ incorporated by introducing reduction in water efficiency, \u03C8 W, in Eq.\
    \ (1) for the respective months \u2013 an approach commonly employed (Bekchanov\
    \ et al., 2017; Calzadilla et al., 2016). These simulations are carried out using\
    \ the three investment behaviour models, resulting in a total of six comprehensive\
    \ sets of simulation results. In all simulations the labour force is fixed, but\
    \ employment is variable over time, the unemployment rate can change, and labour\
    \ is mobile across sectors. These simulations are carried out using the three\
    \ investment behaviour models, resulting in a total of six comprehensive sets\
    \ of simulation results."
  7: " \nEvaluation overview: \"Impacts on GDP, employment, and water use during temporal\
    \ water scarcity events for Scenarios 1 and 2 with varying openness of the economy.\"\
    \n\nDrivers of Risk: \"Impacts on GDP, investment, employment, and water use during\
    \ temporal water scarcity events...\"\n\nQuantitative material: \"An economy that\
    \ is more open tends to have a positive effect on GDP and water usage, but a negative\
    \ impact on employment. When the Armington elasticity is set at 1.7, the negative\
    \ effect on GDP attributed to water scarcity is 0.4%, which decreases to 0.36%\
    \ with increased economic openness. However, the negative impacts on employment\
    \ increase from 0.34% to 0.39% under the same conditions.\"\n\nMethodology: \"\
    In the base DEMARCO-ESS model used for the simulations outlined in the main body\
    \ of the text, the Armington trade elasticity is set to 2.7. This parameter choice\
    \ is informed by empirical research conducted by Bajzik et al. (2020) ... due\
    \ to uncertainty... a sensitivity analysis is conducted... to ensure that the\
    \ main results remain valid under different levels of economic openness by varying\
    \ the Armington elasticity.\"\n\nHighlights: \"An economy that is more open tends\
    \ to have a positive effect on GDP and water usage, but a negative impact on employment...\
    \ Regardless of the level of economic openness, an economy characterised by firms\
    \ with perfect foresight performs better than both the myopic and imperfect foresight\
    \ scenarios in all simulations.\"\n"
