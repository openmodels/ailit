  11: "yaml\nEvaluation overview: \"The latter variable was calculated from the average\
    \ of each annual amplitude between the warmest and the coldest monthly mean temperature\
    \ for each year within the 30-year period. The daily mean apparent temperature\
    \ (AT) was derived for 2000 and for the climate prediction year 2099. This enables\
    \ to assess the frequency of days which show a daily ATmean exceeding the MMT\
    \ in each city, and to measure the magnitude of the MMT exceedance.\"\nDrivers\
    \ of Risk: \"We use the climate parameters daily mean temperature (tas) and the\
    \ daily mean humidity (hurs) to generate the daily mean dew point temperatures\
    \ (tdewp) for the prediction years 2000, and 2099...\" and \"...AT =\u2212 2.653\
    \ \u2212 (0.994 \xD7 T ) + (0.0153 \xD7 TD)...\"\nQuantitative material: \"The\
    \ RMSE of the re-calibrated model ranked at 3.2 \u25E6C while the RMSE of the\
    \ original model was 2.8 \u25E6C, this indicates only a minor penalty of using\
    \ coarser gridded climate data.\"\nMethodology: \"The methodology to estimate\
    \ the future MMT grounds on our previously established generalised multivariate\
    \ non-linear model to approximate the MMT for cities published in Krummenauer\
    \ et al.20. Our approach estimates the MMT for cities independently from daily\
    \ mortality records on the basis of a set of city-specific climatic, topographic\
    \ and socio-economic variables20. ... The model to determine MMTs established\
    \ in our previous study20 was adjusted for the use with the gridded historic and\
    \ projected climate data from the ISIMIP project.\"\nHighlights: \"We found that\
    \ the re-calibrated model using gridded climate data preserves the relative importance\
    \ of all independent variables as in Krummenauer et al.20 (see Supplementary Table\
    \ S3 of the Supplementary Methods and Discussion).\"\nMore Notes: \"The same 400\
    \ cities across all climate zones and world regions were used for model calibration\
    \ as in Krummenauer et al.20... A total of 13 independent variables reflecting\
    \ the topography (e.g. distance to coast, latitude) and socio-economy (e.g. health\
    \ expenditure, share of population above 65) were originally tested in their ability\
    \ in reproducing the observed MMT of the city.\"\n"
