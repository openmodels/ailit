  4: "Source material here. Systematic over view of the change in adaptation and exposure\
    \ for the city sample according to each RCP/SSP combination and the future socio-economic\
    \ level per SSP...To shed light on the principal drivers behind /Delta1MMT across\
    \ cities around the globe, we calculated the changes in each variable (climate\
    \ variables and GDP/capita) until 2100 and their respective isolated effects on\
    \ /Delta1MMT...For our city sample, SSP5 generates the highest future mean countr\
    \ y-based GDP/capita (Int$ 101 205) compared to the beginning of the centur y\
    \ (Int$ 9 849). The 2100 GDP/ capita related to SSP1 is less, but still comparatively\
    \ high (Int$ 63 346)...Under RCP2.6/SSP1, highest /Delta1MMTs are 7.2 C in Ostrava\
    \ and Brno (Czech Republic)...In a RCP8.5/SSP5 future, the highest adaptation\
    \ gain is a /Delta1MMT of 13 C in R\xE2mnicu V\xE2lcea (Romania)...Lower panel:\
    \ The 1991\u20132000 to 2090\u20132099 /Delta1EXD (orange boxes) in context of\
    \ /Delta1MMT (in-graph text annotations) for all possible RCP/SSP combinations...An\
    \ analysis of adaptation change for the scenario com-binations RCP2.6/SSP1 and\
    \ RCP8.5/SSP5 unveils regionally distinct change pattern of /Delta1MMT...Hence,\
    \ a large projected GDP/capita is an advantageous precondition for high adaptation...This\
    \ suggests a high GDP/capita does not automatically lead to a better bearable\
    \ situation regarding future heat and its related mortality for urban populations...Cities\
    \ in the northern hemisphere, especially in western Europe, show a larger /Delta1MMT\
    \ than subtropical and tropical cities or cities in the southern hemisphere."
  5: "Source material here.\nRCP8.5/SSP5 portrays higher increments in /Delta1MMT\
    \ than RCP2.6/SSP1, while the regional distribution of change pattern roughly\
    \ remains similar (Figs. 3a, 4a). However, completely different variable effects\
    \ dominate /Delta1 MMT in RCP8.5/SSP5 (Fig. 4b). The extensive effect of GDP/capita\
    \ on high /Delta1MMTs is either masked by an even larger climate influence or\
    \ conjoined by the climate effect. Few cities in northwestern Europe, in China\
    \ and in the southernmost latitudes remain whose large /Delta1MMT is uniquely\
    \ defined by socio-economic gains until 2100. In RCP8.5/SSP5 the changes in climate\
    \ variables until 2100 act as primary contributors to /Delta1MMT. Highest /Delta1\
    \ MMTs across Europe are driven by the 30-year mean temperature in the east and\
    \ additionally by the 30-year mean amplitude in southern Europe. In RCP8.5/SSP5,\
    \ the 30-year mean temperature dominates the /Delta1MMT in a larger share of cities.\
    \ Across African cities, Tmean30 is associated with rather low /Delta1MMTs. Especially\
    \ in a fossil-fuel-based future with rapid socio-economic growth as in RCP8.5/SSP5,\
    \ the adaptation to heat will largely be driven by a strong physiological acclimatisation\
    \ until 2100 and outweigh the already strong effect of economic growth. In a sustainable\
    \ prosperous future, the gain in wealth until 2100 is the primary contributor\
    \ to achieve heat adaptation. Changes in exposure. Comparing the two highlighted\
    \ scenario combinations regarding changes in exposure parameters until 2090\u2013\
    2099 across the cities reveals distinguished characteristics for /Delta1EXD and\
    \ /Delta1MAG. In RCP2.6/SSP1, EXD reductions until 2090\u20132099 are largest\
    \ with \u2212 140 EXD in the Chilean city Antofagasta, in Mossor\xF3 (Brazil,\
    \ /Delta1EXD \u2212 128), Coquimbo and La Serena (Chile) with /Delta1EXD of \u2212\
    \ 98 EXD. The maximum increase in EXD is projected for Jhang Maghiana (Pakistan,\
    \ /Delta1EXD + 40). Further Pakistani cities follow (Gojra /Delta1EXD + 38, Faisalabad\
    \ and Jaranwala, Sahiwal, and Okara /Delta1EXD + 3 7). RCP8.5/SSP5 yields more\
    \ extreme EXD changes than the sustainable scenario. Still, its mean /Delta1EXD\
    \ across the cities remain twice as high (Figs. 1d, 2). The largest /Delta1EXDs\
    \ reductions are \u2212 185 EXD in Antofagasta (Chile), \u2212 149 EXD in Coquimbo\
    \ and La Serena (Chile). Mossor\xF3 (Brasil), Copiap\xF3 (Chile), Downey (USA)\
    \ follow with \u2212 116, \u2212 109 and \u2212 104 EXD. The maximum EXD increase\
    \ for this scenario is a /Delta1EXD of + 92 EXD in Ciudad Obreg\xF3n (Mexico),\
    \ which exceeds the maximum increase in RCP2.6/SSP1 by factor 2.3. Further Pakistani\
    \ cities rank high in /Delta1EXD: Faisalabad and Jaranwala ( /Delta1EXD + 86),\
    \ Sahiwal, Okara and Bahawalnagar ( /Delta1EXD + 82).\n"
  6: "Source material: Changes in adaptation until 2100 and their primar y contributors\
    \ to /Delta1MMT in a RCP8.5/SSP5 future. /Delta1MMT 2000\u20132100 for RCP8.5/SSP5\
    \ for major world cities (a ). Contributions of the single variables\u2019 2000\u2013\
    2100 changes to /Delta1MMT 2000\u20132100 for RCP8.5/SSP5 (b ). (Map created in\
    \ R (version 3.6.2)28 using the tmap package (version 2.3-2)29). The global perspective\
    \ on /Delta1EXD shows prominent differences between the two highlighted scenario\
    \ combinations in southern European, North American, Subsaharan, Indian, and East\
    \ Asian cities, (Fig. 5). Here, in RCP2.6/SSP1, the negative /Delta1EXDs cause\
    \ reduced future EXD (\u2212 50 to 0 EXD) (Fig. 5a). In RCP8.5/SSP5, the positive\
    \ /Delta1EXDs will yield additional EXDs (0\u201350 EXD) in those cities until\
    \ 2090\u20132099 (Fig. 5b). Large scenario disparities are obvious in cities in\
    \ northwestern Mexico, Brazil, Pakistan, and India. In a fossil-fuel dependent\
    \ future, these cities will have to cope with 50 to 92 additional EXD until 2090\u2013\
    2099. In RCP2.6/SSP1 /Delta1EXD will be less in and even bring EXD reductions\
    \ in some of these cities (\u2212 50 to 0 EXD). In terms of /Delta1\u25E6MAG in\
    \ the sustainable scenario, the largest MAG decreases concern Copiap\xF3 (Chile)\
    \ with a /Delta1MAG of \u2212 3.5 C , Dunhuang (China, /Delta1MAG \u2212 3.2 C\
    \ ), Coquimbo and La Serena (Chile, /Delta1MAG \u2212 3 C ), Geermu (China, /Delta1MAG\
    \ \u2212 2.9 \u25E6C ). The maximum increments in /Delta1MAG are expected in Pakistan\
    \ (Fig. 6a): Chishtian Mandi (/Delta1MAG + 1.9 C ), Sahiwal, Okara, Bahawalnagar\
    \ and Kamalia (/Delta1MAG + 1.8 C ), and Gojra ( /Delta1MAG + 1.7 C ). Some of\
    \ these cities overlap with highest ranks in /Delta1EXD. Generally, for RCP2.6/SSP1\
    \ we record a /Delta1MAG between \u2212 2 and 0 C for most cities. Some cities\
    \ in the subtropics and tropics display a positive /Delta1MAG between 0 and 2\
    \ C until the future decade (Fig. 6a). MAG reductions in RCP8.5/SSP5 are more\
    \ extreme compared to the sustainable future. The mean of the RCP8.5/SSP5 /Delta1MAG\
    \ across the cities is still higher and positive (Supplementar y Fig. S1). Maximum\
    \ MAG reductions are projected in Copiap\xF3 and Antofagasta (Chile, /Delta1MAG\
    \ \u2212 4.4 C and \u2212 3.9 C , Geermu (China, /Delta1MAG \u2212 3.8 C ), Coquimbo\
    \ and La Serena (Chile, /Delta1 MAG \u2212 3.5 C ) and Dunhuang (China, /Delta1MAG\
    \ \u2212 3.2 C ). Maximum /Delta1MAG increments are obser ved in Bechar (Algeria,\
    \ /Delta1MAG + 5.4 C ), Karbala, al-Fallujah (Iraq) and Zambol (Iran) ( /Delta1MAG\
    \ +5 C ), ar-Ramadi and as- Samawah (Iraq, /Delta1MAG + 4.8 C ). RCP8.5/SSP5 conveys\
    \ an intensified situation concerning the extremes, while /Delta1MAG is still\
    \ small in many cities (Fig. 6b). Mainly cities in the Sahel, the Middle East\
    \ into Pakistan and India, in northern and southern Africa, in the Southwestern\
    \ USA and in northern Mexico show high increments in /Delta1 MAG (+ 2 C to +6\
    \ C ) until 2090\u20132099. Some severely exposed cities would profit from MAG\
