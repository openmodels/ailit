  7: "Source material here.\nMortality is mentioned as a potential outcome related\
    \ to heat exposure and adaptation. This suggests, in an ideal future without climate\
    \ change but high wealth-driven adaptation, exposure measures would be minimised\
    \ and a massive reduction in mortality could be expected. Against this ideal future,\
    \ RCP2.6/SSP1 constitutes a slight impairment leading to a higher mortality. RCP8.5/SSP5\
    \ signifies a substantial worsening of prospects because positive wealth effects\
    \ on adaptation are likely annihilated.\n\nIncreased heat exposure (EXD) and magnitude\
    \ (MAG) of heat events, influenced by RCP2.6/SSP1 and RCP8.5/SSP5 scenarios. No\
    \ EXD or MAG changes will concern 385 (10%) and 393 (10%) cities cities. These\
    \ findings imply that a lower forcing yields a larger reducing effect on the heat\
    \ exposure parameters for more cities due to a milder climate change. \n\nUnder\
    \ RCP8.5/SSP5, 1150 (30%) cities will experience additional EXD and 1459 (38%)\
    \ a larger MAG; 705 (18%) cities will face more than one fourth of the year being\
    \ EXD and 185 (5%) cities half the year being EXD; almost the entire year to be\
    \ EXD (> 350 EXD) for five cities. Under RCP2.6/SSP1, 224 (6%) cities will face\
    \ additional EXD and 338 (9%) a higher MAG; 3207 cities (84%) will profit from\
    \ less EXD and 3074 cities (80%) from a lower MAG. Sample size: 3820 cities.\n\
    \nAnalysis of future heat exposure frequency in 3820 major cities worldwide until\
    \ 2100 under RCP2.6/SSP1 and RCP8.5/SSP5 scenarios, comparing changes from 1991-2000\
    \ to 2090-2099. We aggregated the adaptation and exposure parameters across our\
    \ sample of 3 820 cities and provide their outcomes (P05, P95, Mean, Min and Max)\
    \ in Supplementary Table S2. Map created in R (version 3.6.2)28 using the tmap\
    \ package (version 2.3-2)29.\n\nRCP8.5/SSP5 leads to significantly more cities\
    \ experiencing increased heat exposure compared to RCP2.6/SSP1. Lower forcing\
    \ (RCP2.6/SSP1) yields a larger reducing effect on heat exposure. RCP2.6/SSP1\
    \ in contrast is associated with less cities experiencing aggravated exposure\
    \ changes until 2090\u20132099. High increases in heat exposure coincide with\
    \ small /Delta1MMTs in these regions (Fig. 7). Such circumstances are obvious\
    \ in Asian cities at the tip of the distribution in RCP2.6/SSP1, and in Asian\
    \ and African cities in RCP8.5/SSP5 (Fig. 7). This suggests these cities might\
    \ be prone to increases in mortality until 2100.\n"
  8: "For the first time, future adaptation and heat exposure for 3820 cities worldwide\
    \ have been assessed jointly. For the full spectrum of possible future climate\
    \ trajectories (RCPs 2.6, 4.5, 6.0 and 8.5) and socio-economic pathways (SSPs\
    \ 1\u20135) this analysis envisages potential adaptation and exposure changes\
    \ until 2100.\n\nConsidering that all options constitute an impairment against\
    \ an ideal future assuming no climate change and thus only minimal exposure, we\
    \ aimed to identify the least unfavourable choice for human health outcomes. We\
    \ contrasted two options of highest socio-economic development facilitating wealth-enabled\
    \ adaptation but diverging heat exposure.\n\nTable1. Number and share of cities\
    \ affected by changes in exposure from 1991\u20132000 to 2090\u20132099. Exposure\
    \ outcomes by indicator across the 3820 world cities comparing RCP2.6/SSP1 and\
    \ RCP8.5/SSP5.\n\nIndicators include days reduction in EXD, days increase in EXD,\
    \ no change in EXD, >25% of the year EXD, >50% of the year EXD, >350 EXD, reduction\
    \ in MAG [\xB0C], increase in MAG [\xB0C], no change in MAG."
