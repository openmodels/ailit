  5: "Globally, the proportion of land area with high climate suitability increased\
    \ from 38.4% to 39.5% (\u0394 = 1.1 percentage points, 90% credible interval (CI)\
    \ = 0.9\u20131.4)...Across the five countries, high climate suitability was associated\
    \ with a 11-fold (95% confidence interval = 4\u201336) greater dengue incidence\
    \ compared to low climate suitability...The proportion of the global population\
    \ living in high-risk areas increased from 48.8% to 60.0% (\u0394 = 10.8 pp, 90%\
    \ CI = 10.0\u201311.8) from 1979\u20131983 to 2018\u20132022...Next, we examined\
    \ how human population growth coincided with the changes in the land area with\
    \ high climate suitability...Globally, we found that population and climate effects\
    \ independently contributed 2.16 billion and 182 million more people in high-risk\
    \ areas...We examined how climate suitability for DENV transmission has changed\
    \ from 1979 to 2022...To quantify the effect of climate suitability on dengue\
    \ incidence, we fit a censored linear regression model for each country..."
  6: "Source material here.\nClimate change: \"Globally, the proportion of high and\
    \ very high density areas with high climate suitability for DENV transmission\
    \ increased from 58.5% to 66.2% (\u0394 = 7.7 pp, 90% CI = 4.7\u201313.0) and\
    \ from 48.1% to 63.6% (\u0394 = 15.5 pp, 90% CI = 14.1-\u201317.0), respectively.\"\
    \nPopulation density: \"Ae. aegypti prospers within densely-populated urban environments,\
    \ we examined how climate suitability changed in areas with different human population\
    \ density over the past 40 years.\"\nTemperature and humidity effects: \"In this\
    \ study, we used a dengue suitability measure that incorporates the effects of\
    \ temperature and relative humidity on mosquito-viral traits.\"\nNet change in\
    \ temperate zones: \"Interestingly, we found that temperate climate zones had\
    \ the largest net change, with an increase in the proportion of land area with\
    \ high climate suitability from 25.2% to 30.5% (\u0394 = 5.3 pp, 90% CI = 3.2\u2013\
    6.2).\"\nMosquito-viral traits and regional climate effects: \"Interestingly,\
    \ some regions, most notably Northern and Eastern Africa, were estimated to be\
    \ decreasing in climate suitability. This suggests that the increasingly dry and\
    \ warm conditions within and around this region may be negatively affecting mosquito-viral\
    \ traits, resulting in decreased overall climate suitability for DENV transmission.\"\
    \n"
  7: "Source material here.\nDrivers of Risk: \"Additionally, many epidemiological\
    \ studies from dengue-endemic areas in Southeast Asia have identified an association\
    \ between poor urban planning (i.e., limited water infrastructure and waste management)\
    \ and increased dengue transmission44,45. Hence, there is a need to more closely\
    \ examine the link between urban development in high density areas and climate-based\
    \ dengue risk.\"\n\nQuantitative material: \"approximately 70% of the populations\
    \ in Africa and Asia are currently living in areas with a high risk of infection\u2014\
    a roughly 15% increase relative to four decades earlier.\"\n\nMethodology: \"\
    Our model considers the empirical effects of temperature and humidity on transmission\
    \ suitability, but other factors including precipitation10,11, altitude46, urbanization44,\
    \ and vegetation10 could either constrain or favor local transmission.\"\n\nHighlights:\
    \ \"the increase in the proportion of high and very high human density areas with\
    \ high climate suitability has implications for how we understand the recent increase\
    \ in global dengue incidence... This rapid growth in the available host population\
    \ in climate-suitable areas emphasizes the increasing public health burden that\
    \ the Global South will face as DENV continues to spread to new areas.\"\n"
