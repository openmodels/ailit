Drivers of Risk:
  1: Climate change, urbanization, and population growth are impacting dengue virus
    transmission.
  2: Climate-dependent variables, particularly temperature and humidity, influence
    dengue transmission; specifically, warm and humid tropical regions favor transmission
    while temperate climates limit it.
  3: Changes in temperature and relative humidity are impacting the climate suitability
    for dengue virus transmission.
  5: Changes in climate suitability for DENV transmission from 1979 to 2022, specifically
    increases in the southern United States, northeastern Brazil, western and southern
    Africa, the Indian subcontinent, Southeast Asia, and coastal areas of continental
    Europe, and decreases in northern Australia, parts of South America, and the northeast
    of Africa.
  6: Climate change and population density increase dengue virus transmission suitability.
  7: "Climate suitability changes influenced by global phenomena like El Ni\xF1o,\
    \ urbanization, and industrial development increase DENV transmission risk."
  8: Monthly temperature and relative humidity
  9: Climate suitability for dengue virus transmission is assessed through changes
    in Index P, with a specific focus on high suitability areas.
  11: No relevant information
Evaluation overview:
  1: No relevant information
  2: Dengue virus transmission suitability is evaluated based on climate factors and
    incidence data.
  3: The paper evaluates changes in climate suitability for dengue virus transmission,
    assessing how climate factors contribute to dengue risk.
  5: Dengue incidence and climate suitability for dengue virus transmission.
  6: No relevant information
  8: Dengue transmission suitability
  11: No relevant information
Highlights:
  1: There is an expansion in climate suitability for dengue in North America, East
    Asia, and the Mediterranean basin, areas where dengue endemicity is not yet established.
  2: Climate imposes major constraints on mosquito survival and viral propagation,
    defining geographical limits of dengue transmission. Climate suitability for dengue
    virus transmission is higher in tropical and subtropical regions.
  3: The spatial distribution and population in areas with high climate suitability
    for dengue transmission have changed, with specific trends in regions like South
    America, Africa, and Asia.
  5: Population growth is a major driver of the increase in the population living
    in high-risk areas, but climate change also contributes.
  6: Temperate climate zones had the largest net change in dengue suitability area,
    increasing from 25.2% to 30.5%.
  7: Increased population growth in climate-suitable areas for DENV transmission poses
    a public health burden, especially in the Global South.
  8: Index P has been shown to be highly correlated with reported case data in several
    previous studies.
  11: No relevant information
Methodology:
  1: The analysis uses historical temperature and humidity data to estimate changes
    in dengue transmission suitability from 1979 to 2022.
  2: Mechanistic and statistical modeling approaches are used to assess dengue virus
    suitability based on climate and mosquito traits, including species distribution
    modeling. Mechanistic models define geographical transmission limits and capture
    intra-annual fluctuations. Statistical approaches rely on associations between
    climate variables and dengue or vector observations.
  3: Uses Index P, a mechanistic dengue suitability measure based on temperature and
    relative humidity at a spatial resolution of 360 arcseconds, to analyze global
    changes from 1979 to 2022.
  5: Quantified the effect of climate suitability on dengue incidence using a censored
    linear regression model for each country with mean annual incidence as the outcome,
    climate suitability as a binary independent variable, and population density and
    population size as covariates.
  6: Used dengue suitability measure incorporating temperature and humidity effects
    on mosquito-viral traits.
  7: The study models temperature and humidity effects on dengue transmission suitability
    but doesn't guarantee epidemic activity.
  8: "A mechanistic model of dengue transmission potential (Eq.1) is used to derive\
    \ Index P, based on relationships between DENV-Ae. aegypti traits and meteorological\
    \ variables. Model parameters are described by probability distributions. The\
    \ K\xF6ppen\u2013Geiger system was used to categorize pixels into climate zones.\
    \ The analysis considers demographic and economic data (population counts, population\
    \ density, income groups)."
  9: The analysis used a Tobit model to account for left censoring in dengue incidence
    data and a seasonal Mann-Kendall test to estimate long-term trends in climate
    suitability for dengue transmission. It involved aggregating data, dichotomizing
    Index P, and using a random effects model for country-level estimates.
  11: No relevant information
More Notes:
  1: No relevant information
  2: The study highlights the limitations of statistical approaches due to sparse
    reporting in low transmission areas and difficulty in capturing non-linear interactions
    between variables. Locally-specific parameter estimates have limited application
    to specific regions.
  6: Mosquito-viral traits are affected by increasingly dry and warm conditions in
    some regions, reducing suitability.
  8: Data on dengue case counts from multiple countries (Brazil, Thailand, Colombia,
    Costa Rica, Taiwan, Vietnam) is used for validation purposes.
  9: The page discusses the estimation of the independent effect of climate and population
    changes on the population living in high climate suitability areas for dengue.
  11: Mentions work on yellow fever and dengue fever risk, and climate extremes, which
    may be relevant based on the full content of the article. The authors declare
    no competing interests and no funding received for the research.
Quantitative material:
  1: The population in areas with high climate suitability for dengue has grown by
    approximately 2.5 billion globally.
  2: Climate suitability is presented on an Index P scale; comparison of mean annual
    incidence (cases per 100,000 population) in low and high climate suitability regions
    across several countries (Taiwan, Vietnam, Brazil, Colombia, Costa Rica, and Thailand)
    is performed.
  3: "The paper measures climate suitability changes using Index P over the period\
    \ 1979\u20132022; color-coded data shows specific ranges of change."
  5: "Across the five countries, high climate suitability was associated with a 11-fold\
    \ (95% confidence interval = 4\u201336) greater dengue incidence compared to low\
    \ climate suitability"
  6: "The proportion of high-density areas with high dengue suitability increased\
    \ from 58.5% to 66.2% globally (\u0394 = 7.7 pp, 90% CI = 4.7\u201313.0)."
  7: Approximately 70% of populations in Africa and Asia currently live in areas with
    high risk of infection, a 15% increase from four decades earlier.
  8: "Index P, a climate suitability index for DENV transmission, is calculated at\
    \ a spatial resolution of approximately 11 km at the equator and a temporal resolution\
    \ of 1 month (1979\u20132022)."
  9: "Climate suitability index for dengue (Index P) was measured for past (1979\u2013\
    1983) and present (2018\u20132022) periods to assess trends."
  11: No relevant information
sourcematerial:
  1: 'Source material here: Dengue virus transmission has increased over the last
    four decades seemingly due to changes in climate, urbanization and population
    growth. Using estimates of dengue transmission suitability based on historical
    temperature and humidity data, we examined how shifts in these climatic variables
    and human population growth have contributed to the change in the geographical
    distribution and size of the global population living in areas with high climate
    suitability from 1979 to 2022. Globally, we estimated that the population in areas
    with high climate suitability has grown by approximately 2.5 billion. We found
    an expansion in climate suitability in North America, East Asia and the Mediterranean
    basin, where with few exceptions, endemicity is not yet established.'
  2: " \nEvaluation overview: Does this provide an overview of the outcome being evaluated\
    \ (e.g., mortality, productivity loss)? - \"While improvements have been made\
    \ in the estimation of future dengue risk with modeling techniques, the extent\
    \ to which past environmental changes may have influenced the current geographical\
    \ limits and epidemic activity of DENV has received less attention.\"\n\nDrivers\
    \ of Risk: What shocks or changes are impacting the outcomes (e.g., summer temperatures,\
    \ floods)? - \"Collectively, these climate-dependent variables have favored dengue\
    \ transmission in warm and humid tropical regions and limited expansion into more\
    \ temperate climates beyond the equatorial zone.\"\n\nQuantitative material: Is\
    \ there quantitative information produced by the analysis on this page (e.g.,\
    \ percent changes)? - \"a Mean yearly incidence (cases per 100,000 population;\
    \ left panel) and mean annual climate suitability for dengue virus transmission\
    \ (right panel) across municipalities in Brazil ( n = 5570; 2000 \u20132014) and\
    \ Colombia (n = 1119; 2007\u20132017), respectively.\"\n\nMethodology: How is\
    \ the analysis performed and when are its results applicable? - \"Using this accumulated\
    \ experimental data on Aedes spp. mosquitoes, several studies have developed DENV\
    \ suitability measures that mechanistically model the interactions between climate\
    \ and mosquito-viral traits.\" / \"Mechanistic suitability measures vary in methodology\
    \ and interpretation, but virtually all proposed approaches aim at quantifying\
    \ transmission potential.\"\n\nHighlights: What are the most important outcomes\
    \ of the analysis? - \"Since climate imposes major constraints in mosquito survival\
    \ and viral propagation, these mechanistic models can be useful in defining the\
    \ geographical limits of transmission across both endemic and emerging areas.\"\
    \n\nMore Notes: Do you have any other notes? - \"This can be attributed to spare\
    \ reporting in areas where transmission is low and difficulty capturing the nonlinear\
    \ interactions between variables that mechanistically drive transmission.\"\n"
