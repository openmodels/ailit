Drivers of Risk:
  1: Climate change (temperature and precipitation changes); socioeconomic factors
    (population growth, economic shifts, efficiency gains)
  2: Future pathways for carbon forcing from RCPs and socio-economic conditions from
    SSPs are drivers of risk.
  3: Changes in precipitation, potential evapotranspiration (PET), and temperature.
  4: Projected changes in temperature, potential evapotranspiration (PET), and precipitation
    under various climate scenarios are drivers of risk impacting water use.
  6: Changes in precipitation and potential evapotranspiration are drivers of changes
    in per capita water withdrawals in the domestic sector.
  7: "Changes in effective precipitation (\u0394P\u2019) and potential evapotranspiration\
    \ (\u0394ETp) during the growing season are the key climate change drivers considered."
  8: Future growth in per-capita electricity demand, climate effects (temperature
    increase) on space-cooling electricity demand, shifts in electricity generation
    mix (coal, natural gas, renewables, nuclear).
  9: Increases in temperature impact electricity consumption and water use, with agricultural
    irrigation and thermoelectric power generation being significant water users.
  10: Climate change compounds the effects of population leading to more water use
    as households offset decreases in precipitation with increases in water withdrawals
    for outdoor use.
  11: Climate change impacts (decreased precipitation) and socioeconomic factors (GDP
    growth, energy efficiency improvements, adoption of different cooling technologies)
    are drivers of risk.
  12: Warmer temperatures associated with climate change are expected to increase
    water use for power generation and agriculture.
  13: The paper highlights how scenarios resulting from the Shared Socioeconomic Pathways
    (SSPs) and Representative Concentration Pathways (RCPs) influence consumptive
    water use, particularly noting scenarios like RCP 8.5 which impact water use projections.
  14: The outcomes are impacted by climate models showing variations in water yield,
    population growth, and technology in the energy sector.
  15: Shifts in economic trends and regional water use behaviors, such as changes
    in manufacturing and agricultural practices during droughts.
  16: This page does not specifically describe any shocks or changes impacting outcomes.
  17: Projected climate changes in the U.S. under scenarios RCP 4.5 and RCP 8.5 impacting
    precipitation patterns.
  19: Climate change under RCP 4.5 and RCP 8.5 scenarios
Evaluation overview:
  1: Freshwater use in the United States
  3: Water yield in various regions of the U.S.
  4: The page provides an overview of projected changes in water use across different
    sectors in the western United States.
  6: The paper evaluates future water withdrawals and consumptive use in the US, broken
    down by sector.
  7: The paper evaluates changes in domestic (DOM) and irrigation water withdrawals
    due to climate change, as well as thermoelectric freshwater use.
  8: Projecting future water consumption for thermoelectric generation at the county
    level.
  9: The paper evaluates changes in electricity consumption due to climate impacts
    and water withdrawal variations for different sectors.
  11: The page discusses changes in industrial and thermoelectric water consumption
    in the U.S.
  12: This paper evaluates changes in water use for thermoelectric power generation
    and agricultural irrigation in the United States.
  13: The paper provides an overview of water use and consumptive water use changes
    across various sectors in the U.S., focusing on irrigated agriculture, livestock,
    and aquaculture.
  14: This page evaluates the impact of climate and socioeconomic factors on water
    use in the U.S.
  15: Provides an overview of the comparison between 2015 water withdrawal projections
    and actual withdrawal data from USGS.
  16: No information regarding the overview of an outcome being evaluated, such as
    mortality or productivity loss, is provided on this page.
  19: Spatial changes in 30-year average of annual potential evapotranspiration in
    response to future climate change
Highlights:
  1: Dry regions see largest increases in freshwater use, with 8% decreases under
    best-case scenarios but 235% increases under worst-case scenarios; climate change
    impacts overwhelm all other factors under hot and dry futures.
  3: Warmer temperatures in the South are projected to increase potential evapotranspiration
    (PET) more than for any other region of the U.S., amplifying the effects of decreased
    precipitation and leading to further declines in water yield.
  6: The study projects desired water use without regard to water supply availability.
  7: A new approach using USGS estimates of thermoelectric water use is utilized and
    allows for estimating water consumption, as opposed to just water withdrawal.
  8: Decreases in nuclear power and shifts towards gas steam and renewable energy
    are likely to cause large decreases in water withdrawals and consumption. Projections
    here will provide a baseline for future water use keeping with the status quo
    but will likely over-project future water use for thermoelectric generation.
  9: Population growth in drier regions could outpace water efficiency improvements;
    electricity consumption changes due to temperature change measured using WRR-specific
    coefficients.
  10: Industrial water withdrawals are highest in urban areas and regions with large
    manufacturing industries, with declines due to improvements in water efficiency
    and structural economic changes.
  11: Industrial water use may decline under low-growth scenarios, but increase substantially
    in some regions under high-growth, especially where precipitation decreases. Thermoelectric
    water consumption is projected to increase significantly, especially in the South
    Atlantic-Gulf region.
  12: Thermoelectric water use could increase by up to an extra 6 billion gallons
    per day; irrigation depth national average decreased to nearly 2 feet per year
    in 2015.
  13: Agriculture is the dominant water use sector, and water use results vary more
    by climate model than by SSP under RCP 8.5; the Intermountain region faces significant
    changes in water use.
  14: Water use efficiency has improved; however, in the driest regions, higher demand
    and less water lead to potential shortages.
  15: Projections were most inaccurate for the Great Lakes and Ohio regions (overestimates)
    and the Mid-Atlantic and Great Basin regions (underestimates).
  16: Var5 shows the steepest increase in the projections, both in population and
    GDP indices.
  17: More intense shifts in precipitation patterns under RCP 8.5 by end-century,
    especially in the 'Dry' category.
  19: Maps visualize spatial changes in potential evapotranspiration across the U.S.
    under different climate scenarios (RCP 4.5 and RCP 8.5) for mid-century and end-century
Methodology:
  1: Projections are based on socioeconomic and climate scenarios from the Intergovernmental
    Panel on Climate Change Fifth Assessment Report. Scenarios are paired with five
    climate models from the downscaled Multivariate Adaptive Constructed Analogs (MACA).
    Projections made for the next 50 years.
  2: The study highlights where the status quo is unsustainable to identify necessary
    management actions.
  3: VIC (Variable Infiltration Capacity) land surface model is used, which calculates
    potential evapotranspiration using the Penman-Monteith equation. Water use projections
    are based on core scenarios (Langner et al., 2020) with different levels of future
    emissions and socioeconomic growth (Figure 2).
  4: The analysis improves spatial resolution of water use projections from subregions
    to counties; models water use withdrawals and consumptive use per sector using
    historical USGS data, considering effects of climate change using downscaled GCM
    runs.
  5: Estimations are computed from trends between 1985 to 2015, and are detailed at
    county levels, while larger spatial scales are used for certain factors due to
    potential data inconsistencies at smaller scales.
  6: Future livestock and aquaculture withdrawals are projected based on human population
    at the WRR spatial scale, apportioned to counties based on past withdrawals. The
    change in domestic sector withdrawals per capita due to climate change is a combination
    of the effects of changes in precipitation and potential evapotranspiration. Consumptive
    use is calculated using proportions at the state level based on USGS estimates
    from 1985, 1990, and 1995. Withdrawals in each sector are converted to consumptive
    use using withdrawals in each sector according to proportions at the state level.
  7: The change in irrigation withdrawals per acre is computed as a combination of
    changes in precipitation and potential evapotranspiration. A new approach to projecting
    water use at thermoelectric plants based on EIA data on fuel consumption and net
    electricity generation at 1,274 plants across the contiguous U.S. is described.
    This new approach uses separate functions for different electricity generation
    and cooling system types.
  8: Projects net electric energy produced at freshwater thermoelectric plants and
    water consumption rates at those plants. Uses EIA data (2015) on thermoelectric
    generation and consumption, assuming the share of thermoelectric plants is relatively
    constant into the future (though acknowledging this is a simplifying assumption).
    Growth in per-capita demand is expected to grow according to past trends (1985-2015)
    but at a decaying rate. Estimates of industrial and commercial electricity demand
    per unit of income and residential electricity demand per person are combined
    with population and income projections. Demand is aggregated up to the eight energy
    regions and then apportioned to each county based on relative population. Introduces
    a multiplier to represent the effect of the temperature increase on per-capita
    electricity consumption for space cooling. Short-term temperature effects are
    based on Sailor (2001).
  9: Coefficients for different WRRs used to compute changes in electricity consumption;
    population and water use projections made under different SSP scenarios.
  11: Projections of water use are based on scenarios of socioeconomic and climatic
    outcomes, extending to 2070.
  13: Projections are made based on different climate and socioeconomic scenarios,
    focusing on variations by SSP and RCP.
  15: Comparison involves a ratio of projections from Brown et al. to USGS data by
    water resource region, analyzed for accuracy.
  16: Analysis is based on projections from Wear and Prestemon (2019) and Heidari
    et al. (2020), using the Variable Infiltration Capacity model at a 4x4 km resolution
    for climate and water yield projections.
  19: Analysis uses 30-year averages of annual potential evapotranspiration, with
    projections for mid-century and end-century under RCP 4.5 and RCP 8.5
More Notes:
  3: The study uses climate projections with high variability between models. Figure
    2 displays the core scenarios used in water use projections, considering both
    future emissions and socioeconomic growth.
  6: The model focuses on domestic demand for livestock products, acknowledging that
    exports are influenced by trade policies beyond the scope of the study.
  8: The paper uses county-level data but acknowledges the need to account for electricity
    demand in one county being met by electricity generated in another, leading to
    aggregation at the energy region level.
  14: Water users have achieved significant efficiency gains, but future innovation
    must continue due to potential water supply constraints.
  16: No additional notes are offered specific to this page.
  19: 'Data used in the analysis will be archived in the US Forest Service Research
    Data Archive: https://www.fs.usda.gov/rds/archive/'
Quantitative material:
  1: Total consumptive water use will decrease by as much as 8% under the best-case
    scenario but increase by as much as 235% under the worst-case scenario.
  3: Percent change in surface freshwater withdrawals between 2005 and 2015 is shown
    in Figure 1. Climate projections show variability between models. Some models
    predict decreases in water yield in the South, Southeast, and Great Plains, while
    others predict increases. The most consistent result is increases in precipitation
    and yield for much of the western United States and decreases in water yield in
    the South.
  6: 11% of US domestic beef production was exported in 2020.
  7: "The paper provides equations to quantify the impact of climate change on irrigation\
    \ water withdrawals based on changes in precipitation and potential evapotranspiration.\
    \ Constants are also provided for calculating the change in DOM gallons per capita\
    \ per day withdrawn for a 1 cm increase in precipitation (\u03B7P = -1.415) and\
    \ potential evapotranspiration (\u03B7ETp = 0.778).  A constant of 0.0328 is given\
    \ for conversion of centimeters to feet."
  8: "EIA projects that by 2050 renewables would be as large as 31%, with natural\
    \ gas accounting for 39% of domestic electricity production, and coal will only\
    \ be 12%. Nuclear power generation is also expected to slowly fall from its current\
    \ 19%\u201312%. Estimates the percentage increase in residential and commercial\
    \ electricity consumption for annual temperature increases for eight states."
  9: Table 3 lists coefficients for calculating changes in electricity consumption;
    water use data includes a 10% decrease in domestic water use from 2005 to 2015.
  10: Industrial water withdrawals have been declining at an annualized rate of 1.8%
    since at least 1985.
  12: "Water use for power generation could increase by 20%\u201360%; agricultural\
    \ water use projected to increase from 116 billion gallons in 2015 to 134 billion\
    \ gallons in 2070."
  13: It projects a national consumptive water use change from a decrease of 8% in
    RCP 4.5 - SSP1 to an increase of 235% in RCP 8.5 - SSP 5.
  14: Water use changes from -8% under best-case to +235% under worst-case scenarios.
  15: A1B scenario projections were about 20% higher than actual USGS-reported water
    withdrawals for 2015.
  16: No specific quantitative information is produced by the analysis on this page.
  17: Percentage changes in annual precipitation with a range from less than -40%
    to more than 40%.
  19: Spatial changes in potential evapotranspiration visualized using color-coded
    maps with a scale ranging from less than -10 to greater than 10
