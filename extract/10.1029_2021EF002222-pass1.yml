    \ power generation across scenarios...4.4. Irrigation Irrigated agriculture accounts\
    \ for 42% of total freshwater withdrawals...Warmer temperatures associated with\
    \ climate change could increase water use for power generation by 20%\u201360%,\
    \ depending on the scenario...declines in precipitation due to climate change\
