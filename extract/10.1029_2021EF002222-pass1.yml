  9: 'Source material here.

    Evaluation overview: "The combined short-term plus long-term proportional increase
    in electricity consumption with an increase in temperature is:"

    Drivers of Risk: "In the West, supplemental irrigation is needed to meet the needs
    of crops and is the largest user of water in the West. In the East, agriculture
    uses less water than it does in the West because precipitation largely meets the
    needs of eastern agriculture; thermoelectric power generation, however, uses considerably
    more water than it does in the West."

    Quantitative material: "In 2015, domestic water use made up 9% of national withdrawals.
    Between 2005 and 2015, domestic water use decreased by 10%."

    Methodology: "Sailor and Pavlova (2003) estimated short-term and long-term residential
    electricity consumption changes for 12 cities located in four different states...
    This information was used to estimate the ratio of the total percent increase
    to a short-term percent increase. The ratios for the 12 cities were extended to
    the 18 WRRs in the contiguous United States by selecting cities or groups of cities
    that were considered most representative of the WRRs."

    Highlights: "Despite these increases, for low and moderate growth scenarios, most
    regions of the U.S. are expected to see declines or only modest increases in domestic
    water use (Figure 5). The exception is the southern and western parts of the U.S.
    In these regions, population growth is expected to outpace improvements in water
    use efficiency, leading to increases in domestic water use across all scenarios."

    '
  10: 'Source material: Climate change compounds the effects of population, leading
    to more water use as households offset decreases in precipitation with increases
    in water withdrawals for outdoor use. Industrial water withdrawals have been declining
    at an annualized rate of 1.8% since at least 1985. Industrial water withdrawals
    are highest in urban areas, regions with large manufacturing industries (like
    the Great Lakes region), and regions with heavy concentrations of paper production
    and petroleum refining (like the Southeast and Gulf regions). Declines in industrial
    water use are due to improvements in water efficiency within factories and structural
    changes throughout the U.S. economy.'
  11: Between 2005 and 2015, real GDP in manufacturing was essentially stagnant while
    the economy as a whole grew by 14%, and the information sector grew by 42%...
    These trends are expected to continue, leading to only modest increases in industrial
    water use for moderate growth scenarios and declines in industrial water use for
    the low growth scenario... Under the high growth scenario, however, both the northern
    and southern Great Plains see large increases in industrial water use. This is
    significant because those regions also see decreased precipitation... Thermoelectric
    consumptive water use is projected to see annual increases out to 2070, and per-capita
    electricity demand for thermoelectric power is projected to increase by at least
    150% for moderate growth scenarios and by over 400% for extreme cases. Thermoelectric
    water consumption is projected to rise from just under 2.5 billion gallons of
    water per day in 2015 to between 5 and 17 billion gallons per day, depending on
    the combination of socioeconomic and climatic outcomes. In 2015 the East accounted
    for roughly 74% of thermoelectric consumptive water use; by 2070, that share is
    expected to fall to 71% due to broader use of efficient cooling technologies in
    the East and faster growth in electricity demand in the West. The South Atlantic-Gulf
    region is expected to dominate the share of thermoelectric water consumption in
    the United States. Projections of water use are based on scenarios of socioeconomic
    and climatic outcomes, extending to 2070. Industrial water use may decline under
    low-growth scenarios, but increase substantially in some regions under high-growth,
    especially where precipitation decreases. Thermoelectric water consumption is
    projected to increase significantly, especially in the South Atlantic-Gulf region.
    Warziniack et al.
