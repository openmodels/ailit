  13: 'Source material here: In many sectors, water is withdrawn returns to the stream
    either as wastewater effluent or runoff. The portion that is not returned, and
    thus not available for downstream use, is called consumptive water use. The portion
    of withdrawals consumptively used vary by sector and region. In agriculture, for
    example, differences in crops and growing practices lead to a consumptive use
    rate of 77% in California and a consumptive use rate of 28% in Wyoming (Dieter
    et al., 2018). Nationally, total consumptive use is projected to decrease by as
    much as 8% in the RCP 4.5 - SSP1 scenario and increase by 235% in the RCP 8.5
    - SSP 5 scenario (Figure 10). Because agriculture is the dominant use of water
    in most regions, results often vary by climate model more than they do by SSP,
    particularly under RCP 8.5. In the Intermountain region, where irrigated agriculture
    makes up roughly 90% of consumptive use, RCP 8.5 projections lead to total consumptive
    use nearly twice as high in the dry scenario as in the wet scenario. Under RCP
    4.5, climate impacts are small and total consumptive use falls far from many regions.
    The West and parts of the Southeast see relatively large increases in water use
    for many of the scenarios. Increases are significant in the intermountain region,
    which has the largest amount of use among regions. The increase in the Intermountain
    west under all but the low growth scenario is larger than the total withdrawals
    in all other regions. This increase is a product of the amount of livestock raised
    in the region as well as the population growth projected in the region. Our projections
    of livestock water demand do not include climate effects, so only vary by SSP
    (Figure 9).'
  14: Climate models show a wide range of futures for the United States. Under dry
    climate models, the South, Southeast, and Great Plains show decreases in water
    yield... Models are relatively consistent in showing increases in water yield
    for much of the western United States and decreases in water yield for the South...
    Socioeconomic factors are the primary determinants of water use in the domestic
    sector... Future increases in energy-efficient technology are expected to outpace
    growth in income at the national level... Aggregate impacts of climate and socioeconomic
    changes depend on which future the U.S. sees... Under the best-case scenario,
