Drivers of Risk:
  1: "Sub-shelf melting, ice discharge, surface mass balance, Antarctic near-surface\
    \ warming exceeding +7.5\xB0C, increased surface runoff, melt-elevation feedback."
  2: Increased glacier flow due to warm and salty circumpolar deep water (CDW) inducing
    sub-shelf melt; increased surface runoff due to rising atmospheric temperatures;
    increased rainfall.
  3: Uncertainties in SMB and ocean-induced melt processes; atmospheric and oceanic
    projections inferred from CMIP6 under low and very high emission scenarios.
  4: Changes in oceanic and atmospheric boundary conditions (temperature, precipitation,
    salinity, sublimation) derived from CMIP5 and CMIP6 climate models under SSP 5-8.5
    and 1-2.6 scenarios
  5: "Uncertainties in ice\u2013ocean and ice\u2013atmosphere interactions"
  7: "Atmospheric present-day climatology (CLIM atm) from MARv3.11 and RACMO2.3p2;\
    \ Oceanic present-day climatology (CLIM ocn) from Jourdain et al. (2020) and Schmidtko\
    \ et al. (2014); CMIP6 GCM climate forcing from MRI-ESM2-0, UKESM1-0-LL, CESM2-WACCM,\
    \ and IPSL-CM6A-LR; Atmospheric lapse rate (\u03B3 atm); Thickness of the thermally-active\
    \ layer (d ice); Degree day factor for the melting of ice (K ice); Degree day\
    \ factor for the melting of snow (K snow); Sub-shelf melt parameterisation (M\
    \ param) using various models; Effective ice\u2013ocean heat flux (\u0393 eff)\
    \ using different parameters depending on the sub-shelf melt parameterization."
  8: Increase in sub-shelf melting is a driver of rapid grounded-ice mass losses,
    especially in the Amundsen Sea Sector and Aurora Basin.
  10: Projected retreat of Thwaites Glacier and grounding-line retreat in Siple Coast
    are identified as major drivers of mass loss.
  12: Shocks include changes in surface mass balance, subshelf melt, and calving under
    scenarios SSP1-2.6 and SSP5-8.5.
  13: Sub-shelf melt, snow accumulation, surface runoff, calving fluxes, oceanic and
    atmospheric drivers
  14: Considers the respective influences of oceanic and atmospheric forcings, melt-elevation
    feedback, and ice-shelf hydrofracturing on sea-level contribution.
  15: No relevant information
  16: Oceanic forcing is a primary driver of Antarctic mass loss during the 21st century;
    atmospheric forcing mitigates mass loss by increasing snow accumulation.
  17: Oceanic forcing triggers deep inland penetration of the grounding line; atmospheric
    forcing causes retreat close to ice sheet margins via melt-elevation feedback.
  18: "Near-surface warming in the Antarctic (90-60\xB0S) under SSP1-2.6 and SSP5-8.5\
    \ scenarios"
  19: The primary driver of risk is Antarctic near-surface warming, leading to increased
    surface runoff (melt and rainfall) which offsets snow accumulation.
  20: Ocean-driven retreat of Thwaites Glacier, highlighted as an impact on Antarctic
    ice loss.
  21: Ice-ocean and ice-atmosphere interactions, atmospheric warming leading to surface
    runoff, increased sub-shelf melt fluxes, enhanced snow accumulation on grounded
    ice (partly offset by enhanced meltwater runoff), and strong runoff fluxes on
    ice shelves.
  22: Freshwater input from ice shelves likely modifies ocean conditions creating
    a positive feedback loop by stratifying water column and trapping warm water below
    the sea surface.
  23: Impacts of high-emission pathway under SSP 5-8.5 on surface runoff and ice sheet
    dynamics.
  24: Changes in ice-sheet elevation and area, sliding laws, basal hydrology, spatial
    variability in Antarctic viscoelastic properties, and uncertainties in climate
    model projections influence outcomes.
  25: "The drivers of risk identified include ice\u2013ocean\u2013atmosphere interactions,\
    \ with a primary focus on ocean-driven short-term mass loss and atmospheric contributions\
    \ under high-emission scenarios."
  27: Potential risks are associated with changes in bedrock elevation due to changes
    in ice load, although specific shocks or changes are not detailed on this page.
  30: Thermal forcing (TF) at the ice-ocean interface influences sub-shelf melting.
  31: "Thermal forcing (\u27E8TF\u27E9draft \u2208 sector) averaged over ice shelves,\
    \ sector-specific temperature corrections (\u03B4T sector), and local slope (sin\
    \ \u03B8) near grounding lines are drivers of melt rates."
  33: Changes in Antarctic net mass balance, sub-shelf melt, iceberg calving, and
    surface mass balance over past decades.
  41: Warming of Antarctic waters
  42: Variable temperature thresholds of melt pond formation on Antarctic ice shelves.
Evaluation overview:
  1: Antarctic contribution to global mean sea-level rise
  2: Sea level rise due to Antarctic Ice Sheet (AIS) mass changes.
  3: Future trajectory of the Antarctic ice sheet until the end of the millennium.
  4: Ice sheet simulations and their impact on sea level commitment
  5: No relevant information
  7: No relevant information
  8: No relevant information
  10: The paper evaluates the future contribution of Antarctic mass loss to global
    mean sea-level rise (GMSLR) over the millennium.
  12: The paper examines the Antarctic ice sheet mass balance components and their
    potential contributions to sea-level rise until the year 2300.
  13: Global mean sea-level rise (GMSLR) due to Antarctic ice sheet changes
  14: Focuses on Antarctic contributions to global mean sea-level rise under the SSP5-8.5
    scenario until the year 3000.
  15: No relevant information
  17: No relevant information
  18: Antarctic surface mass balance components (total surface mass balance, snow
    accumulation, surface meltwater production, surface runoff, and rainfall) over
    the grounded ice sheet and the ice shelves
  19: The evaluation focuses on the Antarctic (surface) mass balance (SMB) and its
    impact on sea-level rise mitigation.
  20: Projections of the future sea-level contribution from the Antarctic ice sheet
    by the end of this century and by 2300 relative to 2015 are evaluated.
  21: Antarctic mass changes, specifically sub-shelf melt, calving, and surface mass
    balance fluxes.
  23: Comparison of surface runoff rates projected by Bayesian calibrated ensemble
    and specific climate models.
  24: The paper does not provide a direct overview of an outcome like mortality or
    productivity loss but focuses on Antarctic mass balance projections.
  25: The study evaluates the evolution of the Antarctic ice sheet until the end of
    the millennium.
  31: This study evaluates Antarctic melt rates.
  33: There is an overview of estimates of changes in Antarctic mass balance categories,
    assessing historical trends.
  41: Future climate response
Highlights:
  1: "Ocean is the primary driver of short-term Antarctic mass loss; atmosphere initially\
    \ plays a mitigating role through increased snowfall; under very high emissions,\
    \ the atmosphere becomes an amplifying driver of mass loss; a critical warming\
    \ threshold of +7.5\xB0C is identified; potential for complete collapse of the\
    \ West Antarctic ice sheet and significant grounding-line retreat in East Antarctica\
    \ under high emissions."
  2: The Antarctic ice sheet has been losing mass at an accelerating rate since the
    early 2000s. Future evolution of the AIS is highly uncertain, with models projecting
    both mass loss and mass gain depending on the scenario and model used. Surface
    runoff may significantly compensate for mass gain through snowfall under very
    high-emission scenarios but could also lead to ice-shelf thinning and collapse.
  3: Quantifies how uncertainties in ice-ocean and ice-atmosphere interactions translate
    into uncertainties in the projected behavior of the AIS.
  5: No relevant information
  7: This paper presents parameter uncertainty ranges used in an uncertainty analysis
    to drive ice-ocean and ice-atmosphere simulations.
  8: The calibrated ensemble reproduces historical trends in ice-sheet mass change
    and its drivers, reducing uncertainty in model hindcasts. Rapid grounded-ice mass
    losses are reproduced around the margins of the ice sheet, especially in the Amundsen
    Sea Sector and Aurora Basin, triggered by increased sub-shelf melting.
  10: Under high emissions (SSP5-8.5), a significant collapse of the West Antarctic
    ice sheet is expected between 2300 and 2500.
  12: Positive surface mass balance fluxes represent mass gains while positive subshelf
    melt and calving fluxes indicate mass losses; different scenarios show varied
    outcomes for WAIS and EAIS.
  13: Ocean-driven ice loss dominates in West Antarctica, while East Antarctica experiences
    mass gain due to increased snow accumulation in the 21st century. Under SSP5-8.5,
    the rate of GMSLR contribution increases beyond the 21st century due to decreasing
    SMB and increasing calving. During the 23rd century, surface runoff becomes the
    dominant driver of Antarctic mass loss, exceeding snow accumulation, particularly
    under the SSP5-8.5 scenario. Evolution of Antarctic mass loss can be characterized
    by distinct phases related to ocean forcing, SMB, and surface mass balance, but
    only the first phase may happen under SSP1-2.6.
  14: Identifies distinct patterns and median rates of contribution to GMSLR for the
    Antarctic, West Antarctic, and East Antarctic ice sheets.
  15: Ensemble mean grounding line and calving front positions are differentiated
    under various scenarios.
  16: Both atmospheric and oceanic forcings are sufficient to trigger a complete collapse
    of the West Antarctic Ice Sheet (WAIS) by the end of the millennium.
  17: Projected Antarctic mass loss under SSP5-8.5 is mainly driven by the combined
    effects of oceanic forcing and the melt-elevation feedback. Oceanic forcing is
    the primary trigger, with the atmosphere initially mitigating ice loss but transitioning
    to an amplifying driver by the end of the century. Hydrofracturing produces higher
    median rates of contribution to GMSLR, especially by the end of the century.
  18: Projections of Antarctic surface mass balance components and their sensitivity
    to warming. Provides data on snow accumulation, surface melt, runoff, and rainfall
    under different warming scenarios. Positive SMB, snow accumulation, and rainfall
    fluxes represent mass gains; positive surface melt and runoff fluxes represent
    mass losses.
  19: Increased warming leads to increased surface runoff, decreasing SMB which reduces
    mitigation of sea level rise. There are specific warming thresholds identified,
    for example, where SMB over the grounded ice starts to decrease compared to present
    day, or when surface runoff balances snow accumulation. The SMB strongly depends
    on the imposed climate forcing.
  20: Emission scenario has limited influence on Antarctic ice loss by the end of
    the century; committed long-term changes show more severe ice loss in West Antarctica
    than in East Antarctica.
  21: Rate of ice loss diverges between emission scenarios around 2060-2080, with
    accelerated ice-sheet retreat under a very high-emission scenario leading to a
    partial collapse of the WAIS by 2300. Surface runoff is projected to dominate
    Antarctic mass balance by the end of the 23rd century under a very high-emission
    scenario, potentially accelerating Antarctic mass loss due to ice-shelf collapse
    triggered by hydrofracturing.
  22: "Identifies potential threshold at +7.5\xB0C in near-surface warming over Antarctica,\
    \ affecting ice sheet mass balance due to increased surface runoff."
  23: Projected changes in surface runoff by end of century (2100) and to the year
    2300, highlighting shifts under SSP 5-8.5.
  24: The study emphasizes credible projections of future Antarctic mass balance despite
    significant uncertainties, highlighting the influence of structural limitations
    and uncertainty in model projections.
  25: "In high-emission scenarios, West Antarctic ice collapse is likely to occur\
    \ before the end of the millennium due to combined ice\u2013ocean and ice\u2013\
    atmosphere interactions, while East Antarctic will initially gain mass but will\
    \ experience ocean-driven mass loss by the next century under such conditions."
  26: The model's grounding line migration is shown to reproduce steady-state behavior
    at coarse resolution and simulates marine ice-sheet behavior in large-scale simulations.
    The grounding line implementation is similar to high-resolution models under buttressed
    conditions. The model produces responses to the loss of buttressing within the
    range of other ice-sheet models, even at coarser resolutions, and its overall
    behavior is in line with high-resolution models.
  27: Initialised ice sheet configurations are within the range of ISMIP6 models and
    match observations in terms of ice geometry, grounding-line position, and ice
    dynamics.
  31: Using present-day ocean temperature and salinity fields with temperature corrections
    derived from Jourdain et al. (2020) leads to lower calibration scores.
  33: The paper summarizes changes in Antarctic net mass balance and related processes
    over multiple decades using data from recent studies.
Methodology:
  1: Observationally-calibrated ice-sheet model, forced by a panel of CMIP6 climate
    models. Results applicable to short-term (by 2100) and long-term (by 2300 and
    3000) projections.
  2: Discusses model predictions of AIS evolution under different emissions scenarios,
    focusing on the balance between ocean-induced sub-shelf melt, snow accumulation,
    and surface runoff. Some models include hydrofracturing and marine ice cliff instability
    mechanisms.
  3: Uses the ice-sheet model Kori-ULB. Performs a Bayesian calibration of ensemble
    simulations by comparing model results with estimates of regional net mass balance
    from IMBIE. Uses atmospheric and oceanic projections inferred from a subset of
    models from CMIP6 under low and very high emission scenarios.
  4: Ice-sheet model simulations are initialized with an inverse simulation nudging
    towards present-day ice-sheet geometry. Atmospheric forcing is derived from monthly-averaged
    air temperature and sublimation anomalies and precipitation ratios. Oceanic forcing
    is derived from yearly-averaged temperature and salinity anomalies. Anomalies
    are added to reference fields representing present-day atmosphere and ocean climatologies.
  5: Use of a perturbed parameter ensemble with 100 distinct parameter vectors to
    explore ice-sheet interactions and climate forcings
  6: They normalise the likelihood scores to create weights for each ensemble member,
    with the aim of achieving a balanced distribution across different GCMs.
  7: Uncertainty analysis using Latin hypercube sampling to vary parameters governing
    ice-ocean and ice-atmosphere interactions.
  8: A Bayesian calibration of an ensemble is used, constrained by IMBIE observational
    data (Otosaka et al., 2023). The calibrated ensemble is assessed against spatially-aggregated
    estimates of ice-sheet net mass balance, surface mass balance, sub-shelf melting,
    and iceberg calving fluxes from recent studies. The analysis covers a historical
    period (past decades) and provides projections.
  10: The analysis uses a calibrated ensemble to evaluate future sea-level contributions
    based on emission scenarios SSP1-2.6 and SSP5-8.5.
  12: Calibrated probabilistic projections with a 5-year running average for main
    ice sheet mass balance components and surface mass balance components from 2015
    to 2300.
  13: Calibrated projections for SSP5-8.5 isolating different components of climate
    forcing, using 100-member ensembles of projections. SSP1-2.6 is also used for
    comparison.
  14: Uses a 100-member ensemble approach to separate influences of oceanic and atmospheric
    drivers on sea-level rise, with a focus on different time periods.
  15: Analysis combines both oceanic and atmospheric drivers and assesses their individual
    contributions to Antarctic ice thickness using a Bayesian calibrated mean ensemble.
  16: Sensitivity analyses include different combinations of atmospheric and oceanic
    forcings, along with considerations of melt-elevation feedback.
  17: Calibrated ensemble under atmospheric forcing alone is used to project sea-level
    contribution. The weakening of ice shelves by hydrofracturing is approximated
    following Pollard et al., 2015; DeConto and Pollard, 2016, under SSP5-8.5.
  18: Calibrated probabilistic projections, 5-year running average, Bayesian calibration
    using CMIP6 GCMs under SSP1-2.6 and 5-8.5
  19: "The analysis examines the relationship between SMB, snow accumulation, surface\
    \ runoff, and regional near-surface warming (90-60\xB0S) using GCM ensemble median\
    \ data. The results are applicable to the time period after 2100, with specific\
    \ projections extending to 2300."
  20: "Observationally-calibrated projections accounting for key uncertainties in\
    \ ice\u2013climate interactions, focusing on the long-term changes of the Antarctic\
    \ ice sheet in response to early-millennium warming."
  21: Calibrated ensemble simulations initialized to match observations, evaluated
    against spatially-aggregated estimates of ice-sheet mass balance components. Projections
    extend to 2300 under different emission scenarios, focusing on ice-ocean and ice-atmosphere
    interactions.
  22: Uses SSP5-8.5 and SSP1-2.6 scenarios; explores relationship between median SMB
    estimates and regional atmospheric warming imposed by GCMs; employs a PDD-based
    melt-and-runoff scheme evaluated against regional and general climate models.
  23: Utilizes Bayesian calibration with models such as CESM2 and CNRM-CM6 for projections;
    results applicable to future scenarios under high-emission pathway.
  24: "The analysis uses a single ice-sheet model calibrated with observations and\
    \ explores uncertainties in model parameters focusing on ice\u2013ocean\u2013\
    atmosphere interactions using a Bayesian calibration approach."
  25: The analysis uses observationally-calibrated projections based on an ensemble
    of simulations accounting for nine key uncertainties.
  26: The Kori-ULB model is a vertically-integrated, thermomechanical, hybrid ice-sheet/ice-shelf
    model using shallow-ice and shallow-shelf approximations for grounded ice, and
    only the shallow-shelf approximation for floating ice shelves. It incorporates
    melt-elevation feedback, bedrock deformation, sub-shelf melting, and calving.
    A flux condition is imposed at the grounding line. Basal sliding uses a Weertman
    sliding law. Calving depends on crevasse depths related to ice velocity divergence,
    accumulated strain, ice thickness, and surface liquid water availability. Input
    data includes ice-sheet geometry, bedrock topography, geothermal heat flux, near-surface
    air temperature, and precipitation.
  27: Near-surface temperatures are corrected for elevation changes using a vertical
    lapse rate.
  28: The PICO model employs a box parameterization for ice-shelf cavities, calculating
    melt rates based on ocean temperature and salinity using a buoyancy-driven advection
    approach.
  29: "This paper describes two models for basal melt rate parameterization under\
    \ ice shelves: a box model (PICO) and a plume model. The PICO model, described\
    \ in Reese et al. (2018a), uses a constant and uniform turbulent temperature exchange\
    \ velocity (\u03B3 \u22C6T) and the average properties of ocean water at the continental\
    \ shelf depth. The plume model, developed by Lazeroms et al. (2018, 2019), is\
    \ a two-dimensional formulation that emulates the one-dimensional plume model\
    \ developed by Jenkins (1991), using ambient temperature and salinity."
  30: 'Describes three different parameterizations for calculating sub-shelf melting:
    a complex model (referenced to Lazeroms et al., 2019), a local quadratic parameterization,
    and an ISMIP6 non-local quadratic parameterization.'
  31: "The study uses quadratic non-local parameterizations (with and without dependency\
    \ on local slope) and applies sector temperature corrections derived for MeanAnt\
    \ median \u03B30 values. These temperature corrections were derived using ocean\
    \ data from Jourdain et al. (2020), but also applied to present-day ocean temperature\
    \ and salinity fields."
  32: The study uses the Kori-ULB ice-sheet model to simulate Antarctic mass balance,
    with code available on GitHub and data on Zenodo.
  41: 'Presents ISMIP6Antarctica: a multi-model ensemble of ice sheet models'
  42: "Modelling the climate and surface mass balance of polar ice sheets using RACMO2\
    \ for Antarctica (1979\u20132016)."
More Notes:
  1: The study disentangles the drivers of future Antarctic ice loss.
  3: Acknowledges drawbacks of using GCM outputs directly for future Antarctic SMB
    due to coarse resolution and low sophistication in representing polar region physical
    processes. Addresses biases related to the melt-elevation feedback by determining
    surface melt and runoff within the ice-sheet model using a simplified melt-and-runoff
    model.
  5: The ensemble includes discrete inputs for present-day climatologies and continuous
    parameters capturing uncertainties in interactions and feedbacks
  7: "The effective ice\u2013ocean heat flux parameter \u0393 eff originally takes\
    \ a value within the range of [0 - 1] and is applied to the uncertainty range\
    \ of the parameter associated with M param."
  8: The calibrated ensemble provides more robustness to projections by better matching
    historical trends. The spread of the posterior distribution is reduced compared
    to the prior distribution.
  15: No relevant information
  17: The analysis focuses on hydrofracturing and does not include the marine ice
    cliff instability (MICI) mechanisms.
  18: Analysis considers both the grounded ice sheet and the ice shelves separately.
  21: The study acknowledges the absence of a water-routing scheme, potentially overestimating
    the risk of surface melt-induced destabilisation. They also acknowledge the lack
    of modeling for cascades of interacting melt pond hydrofracture events which may
    limit the speed of ice-shelf collapse through hydrofracture processes.
  24: The methodology acknowledges structural uncertainties and limitations with current
    resolution, noting that smaller bedrock features may be overlooked.
Quantitative material:
  1: Antarctic contribution to global mean sea-level rise by 2100 of 6 (-8 to 15)
    cm under a low-emission scenario and 5.5 (-10 to 16) cm under a very high-emission
    scenario; median global mean sea-level rise of 2.75 (6.95) m by 2300 (3000) under
    very high emissions; median global mean sea-level rise of 0.62 (1.85) m by 2300
    (3000) under a more sustainable pathway
  2: Predicts AIS mass loss in excess of one meter of global sea-level equivalent
    at the end of the 21st century (with multiple meters of potential additional sea-level
    rise in the centuries thereafter) according to one model, while other models suggest
    AIS mass gain.
  3: Model simulations are performed at a spatial resolution of 16 km.
  4: Simulations cover the period 1950-2300, with climate kept constant after 2300
    to investigate long-term impacts.
  5: No relevant information
  7: "Atmospheric lapse rate (\u03B3 atm): 5 - 12 \xB0C km-1; Thickness of the thermally-active\
    \ layer (d ice): 0 - 15 m; Degree day factor for the melting of ice (K ice): 4\
    \ - 12 w.e.mmPDD-1; Degree day factor for the melting of snow (K snow): 0 - 6\
    \ w.e.mmPDD-1; Effective ice\u2013ocean heat flux (\u0393 eff): \u03B3 \u22C6\
    T in M PICO: 0.1 - 10 \xD7 10-5 ms-1; C 1/2d \u0393 TS in M plume: 1 - 10 \xD7\
    \ 10-4; \u03B3T in M quad: 1 - 10 \xD7 10-4 ms-1; \u03B3 0 in M JD20: 1 - 4 \xD7\
    \ 10^4 myr-1; \u03B3 0 in M JD20s: 1 - 4 \xD7 10^6 myr-1"
  8: Table 2 presents observational constraints of Antarctic regional mass balance
    from IMBIE (Otosaka et al., 2023), including mass balance values and uncertainties
    in Gt/yr for West Antarctica, East Antarctica, and the Antarctic Peninsula for
    1992-1996, 1997-2001, 2002-2006, and 2007-2011.
  10: Quantitative projections include median sea-level contributions, e.g., GMSLR
    amounts to 2.75 (0.46 to 4.52) meters by 2300 under SSP5-8.5.
  12: Quantitative projections are provided showing medians and 5-95% probability
    intervals for mass balance components, with specific percentiles for the year
    2300.
  13: Sub-shelf melt fluxes reach maximum around 2150. Surface runoff reaches median
    fluxes of almost 6000 gigatons per year by 2300. Different sensitivities between
    West and East Antarctic ice sheets
  14: Presents the calibrated median contribution to GMSLR and provides percentiles
    [5,25,50,75,95] for ensemble results at 3000 and 2100.
  15: Mean ice thickness changes under SSP5-8.5 estimated using a 100-member ensemble
    for different forcing scenarios.
  17: Hydrofracturing leads to a median sea-level contribution increased by 60 cm
    at year 2300, and by 2.2 m at year 3000 compared with simulations that do not
    account for ice-shelf collapse through hydrofracturing.
  18: "Probabilistic projections of Antarctic surface mass balance components under\
    \ SSP5-8.5 until 2300, with medians and 5-95% probability intervals. Sensitivity\
    \ of future Antarctic surface mass balance to Antarctic near-surface warming over\
    \ 2015-2300. Bayesian calibrated median surface mass balance, snow accumulation\
    \ and surface runoff (Gtyr \u2212 1)."
  19: "By approximately 2140, the SMB over grounded ice becomes lower than its present-day\
    \ value. Surface runoff fluxes may reach 4000 Gt/yr by 2300. Warming of +2.5\xB0\
    C leads to a decrease in SMB over the ice shelves. At +7.5\xB0C, surface runoff\
    \ offsets snow accumulation on ice shelves, and beyond +9\xB0C the grounded SMB\
    \ no longer compensates for ice discharge. A negative SMB is projected under +15\xB0\
    C warming. +2.5\xB0C, +7.5\xB0C and +15\xB0C warming relative to present-day correspond\
    \ to +3.0\xB0C, +7.2\xB0C and +12.2\xB0C relative to pre-industrial."
  20: Projections indicate a sea-level rise range from -8 to 16 cm by the end of the
    century and from -0.26 to 1.56 m under SSP1-2.6, and from 0.46 to 4.52 m under
    SSP5-8.5 by 2300 relative to 2015.
  21: "Sub-shelf melt fluxes projected to reach about 5000 Gt yr\u22121 by the end\
    \ of the century."
  23: "Projections of surface runoff for years 2100 and 2300; ensemble median, 25-75%\
    \ and 5\u201395% probability intervals provided."
  24: There is no specific quantitative information provided on this page.
  25: "Quantitative estimates are mentioned, such as the threshold of Antarctic near-surface\
    \ warming exceeding +7.5\xB0C for significant surface runoff increases and the\
    \ influence of alternative structural error estimates changing projection intervals\
    \ by \xB15%."
  27: The root mean square error (RMSE) for ice thickness is around 50m and for ice
    surface velocity is around 100 meters per year.
  29: "The paper uses a range of 0.1 \xD7 10 \u2212 5 \u2212 10 \xD7 10 \u2212 5 ms\
    \ \u2212 1 for the effective heat exchange velocity (\u03B3 \u22C6T) in the PICO\
    \ model. The paper also uses equations (C2), (C3), and (C4) to compute melt rates\
    \ (m) in the plume model, which includes variables such as temperature (T), salinity\
    \ (S), and constants (e.g., \u03BB, Lf/cp)."
  30: "The effective thermal Stanton number (C^(1/2)d \u0393TS) is explored between\
    \ 1x10^-4 and 10x10^-4. The heat exchange velocity (\u03B3T) is varied within\
    \ the range of 1x10^-4 - 10x10^-4 ms^-1."
  31: "The study varies \u03B30 (an empirical effective heat transfer coefficient)\
    \ within the ranges of 1\xD710^4 - 4\xD710^4 and 1\xD710^6 - 4\xD710^6 myr^-1\
    \ for non-local quadratic parameterizations without and with dependency on the\
    \ local slope, respectively."
  33: Table provides quantitative estimates of changes in Antarctic mass balance for
