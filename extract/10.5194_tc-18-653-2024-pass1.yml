  42: Multi-centennial projections of global mean sea-level rise.
sourcematerial:
  1: "We use an observationally-calibrated ice-sheet model to investigate the future\
    \ trajectory of the Antarctic ice sheet related to uncertainties in the future\
    \ balance between sub-shelf melting and ice discharge on the one hand, and the\
    \ surface mass balance on the other. Our ensemble of simulations, forced by a\
    \ panel of CMIP6 climate models, suggests that the ocean will be the primary driver\
    \ of short-term Antarctic mass loss, initiating ice loss in West Antarctica already\
    \ during this century. The atmosphere initially plays a mitigating role through\
    \ increased snowfall, leading to an Antarctic contribution to global mean sea-level\
    \ rise by 2100 of 6(-8 to 15) cm under a low-emission scenario and 5.5(-10 to\
    \ 16) cm under a very high-emission scenario. However, under the very high-emission\
    \ pathway, the influence of the atmosphere shifts beyond the end of the century,\
    \ becoming an amplifying driver of mass loss as the ice sheet\u2019s surface mass\
    \ balance decreases. We show that this transition occurs when Antarctic near-surface\
    \ warming exceeds a critical threshold of +7.5\xB0C, at which the increase in\
    \ surface runoff outweighs the increase in snow accumulation, a signal that is\
    \ amplified by the melt\u2013elevation feedback. Therefore, under the very high-emission\
    \ scenario, oceanic and atmospheric drivers are projected to result in a complete\
    \ collapse of the West Antarctic ice sheet along with significant grounding-line\
    \ retreat in the marine basins of the East Antarctic ice sheet, leading to a median\
    \ global mean sea-level rise of 2.75 (6.95) m by 2300 (3000). Under a more sustainable\
    \ socio-economic pathway, we find that the Antarctic ice sheet may still contribute\
    \ to a median global mean sea-level rise of 0.62 (1.85) m by 2300 (3000)."
  2: 'Source material here: "...raising sea level by increased ice discharge..." and
    "...the Antarctic surface mass balance (SMB, the balance of accumulation through
    precipitation and ablation through erosion, sublimation and runoff at the ice
    sheet surface) is, via the accumulation of snow, the only potential negative contributor
    to sea-level rise..." "The observed acceleration of Antarctic outlet glaciers
    (essentially in West Antarctica and in some sectors of the East Antarctic ice
    sheet; Rignot et al., 2019) is concentrated in areas close to warm and salty circumpolar
    deep water (CDW), which induce strong sub-shelf melt rates." and "With rising
    atmospheric temperatures, future accumulation is expected to increase as a result
