  26: "TheKori-ULBmodelisavertically-integrated,thermomechanical,hybridice-sheet/ice-shelfmodelthatincorporatesessential\
    \ characteristics of ice-sheet thermomechanics and ice-stream flow, such as the\
    \ melt-elevation feedback, bedrock deformation, sub-shelf melting, and calving.\
    \ The ice flow is represented as a combination of the shallow-ice (SIA) and shallow-shelf\
    \ (SSA) approximations for grounded ice while only the shallow-shelf approximation\
    \ is applied for floating ice shelves (Bueler and Brown, 2009; Winkelmann et al.,\
    \ 2011).\nInordertoaccountforgrounding-linemigration,afluxcondition(relatedtotheicethicknessatthegroundingline;Schoof,\
    \ 2007) is imposed at the grounding line following the implementation by Pollard\
    \ and DeConto (2012a, 2020)... Basal sliding is introduced as a Weertman sliding\
    \ law, i.e., vb = \u2212 A b|\u03C4b|m \u2212 1\u03C4b, where \u03C4b is the basal\
    \ shear stress, vb the basal velocity, A b the basal sliding coefficient...\n\
    Calving at the ice front depends on the combined penetration depths of surface\
    \ and basal crevasses, relative to total ice thickness. The depths of the surface\
    \ and basal crevasses are parameterised as functions of the divergence of ice\
    \ velocity, the accumulated strain, the ice thickness, and (if desired) surface\
    \ liquid water availability, similar to Pollard et al. (2015) and DeConto and\
    \ Pollard (2016)... Prescribed input data include the present-day ice-sheet geometry\
    \ and bedrock topography from the Bedmachine dataset (Morlighem et al., 2019)\
    \ and the geothermal heat flux by Shapiro and Ritzwoller (2004). Present-day mean\
    \ near-surface air temperature and precipitation are obtained either from van\
    \ Wessem et al. (2018), based on the regional atmospheric climate model RACMO2.3p2,\
    \ or from Kittel et al. (2021)...\nPollard and DeConto (2020) demonstrate that\
    \ the algorithm gives similar results under buttressed conditions compared to\
    \ high-resolution models...\nFurthermore, multi-model ensemble estimates of future\
    \ ice-sheet response within ISMIP6 clearly demonstrate that the overall behaviour\
    \ of Kori-ULB is in line with results from the high-resolution models that participated\
    \ in the ensemble. "
