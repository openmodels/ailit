  10: "Source material here: The calibrated ensemble (posterior distributions) shows,\
    \ with the exception of the first half of this century, a positive contri-bution\
    \ to global mean sea-level rise (GMSLR) throughout the millennium (Figure 2a\u2013\
    c). The median rate of contribution to GMSLR becomes positive by around 2040 (Figure\
    \ 2c). Until the end of the century, the projected sea-level change shows no clear\
    \ dependence on the emission scenario, with median contributions to GMSLR of 6\
    \ (-8 to 15 \u2013 5\u201395 percentiles) cm under SSP1-2.6 and 5.5 (-10 to 16)\
    \ cm under SSP5-8.5 (Figure 2c). The Antarctic contribution to GMSLR maintains\
    \ a rate comparable to present day until a notable increase in the second half\
    \ of the century (Figure 2c). This acceleration in ice loss is likely caused by\
    \ the projected retreat of Thwaites Glacier, which is consistent across both emission\
    \ scenarios (Figure 2d\u2013f). Throughout the century, mass loss primarily occurs\
    \ in the Amundsen Sea Embayment under both socio-economic pathways (Figure 2d\u2013\
    f). Thepatternofmasslossunderbothemissionpathwaysstartstodivergeaftertheendofthecentury.Whilemasslossremains\
    \ essentially limited to the Amundsen Sea Embayment until the end of the millennium\
    \ under SSP1-2.6 (with some less likely exceptions; Figure 2e), the very high-emission\
    \ scenario (SSP5-8.5) exhibits an acceleration of mass loss in the Amundsen Sea\
    \ sector as well as the onset of grounding-line retreat in Siple Coast (Ross area).\
    \ Their combination results in a collapse of the West Antarctic ice sheet (WAIS)\
    \ under SSP5-8.5, which is expected to be completed between 2300 and 2500 (Figure\
    \ 2f). Additionally, early-millennium warming under the very high-emission pathway\
    \ likely commits the East Antarctic ice sheet to grounding-line retreat in its\
    \ marine basins, with a higher probability of retreat in the Wilkes basin than\
    \ in the Aurora basin by the end of the millennium (Figure 2f). Altogether, these\
    \ differences in the pattern of long-term mass loss result in diverging trajectories\
    \ of the projected contributions to global-mean sea level beyond the current century,\
    \ with significantly more mass loss projected under SSP5-8.5 than SSP1-2.6 over\
    \ the following centuries (Figure 2a,b): the contribution to GMSLR amounts to\
    \ 2.75 (0.46 to 4.52) m by the year 2300 and 6.95 (2.40 to 13.47) m by 3000 under\
    \ SSP5-8.5, compared with 0.62 (-0.26 to 1.56) m and 1.85 (-0.73 to 2.90) m under\
    \ SSP1-2.6 by 2300 and 3000, respectively (Figure 2a). Interestingly, a continued\
    \ retreatofThwaitesGlacierthroughoutthemillenniumisalsopredictedbythecalibratedensembleunderconstantpresent-day\
    \ climate conditions (Figure 2d), leading to a median sea-level contribution of\
    \ 2 (-6 to 9) cm by the end of this century, 0.20 (-0.17 to 1.21) m by 2300, and\
    \ 1.32 (-0.4 to 2.1) m by the end of the millennium. Overall, the spread in the\
    \ sea-level projections increases with time, especially under the very high-emission\
    \ scenario. The differences between the prior and posterior distributions are\
    \ shown in Figure S3. The spread of the posterior distribution is reduced compared\
    \ with the prior distribution, similar to the historical period, particularly\
    \ at shorter timescales."
  12: "The paper examines the Antarctic ice sheet mass balance components and their\
    \ potential contributions to sea-level rise until the year 2300. Note that the\
    \ ice-sheet net mass balance does not represent the sum of all mass balance components\
    \ but instead considers changes in volume above flotation and may therefore be\
    \ interpreted as the rate of mass change contributing to sea-level rise. Shocks\
    \ include changes in surface mass balance, subshelf melt, and calving under scenarios\
    \ SSP1-2.6 and SSP5-8.5. Positive SMB fluxes represent mass gains while positive\
    \ sub-shelf melt and calving fluxes represent mass losses. Calibrated probabilistic\
    \ projections with a 5-year running average for main ice sheet mass balance components\
    \ and surface mass balance components from 2015 to 2300. Evolution of the ensemble\
    \ projected main ice sheet mass balance components (a\u2013b) and surface mass\
    \ balance components (c\u2013d) for the 2015-2300 period under SSP1-2.6 (a,c)\
    \ and SSP5-8.5 (b,d). Quantitative projections are provided showing medians and\
    \ 5-95% probability intervals for mass balance components, with specific percentiles\
    \ for the year 2300. Solid lines and shaded regions show the medians and 5-95%\
    \ probability intervals (N=100 per SSP scenario), with 5-year running average\
    \ applied. Boxes and whiskers show [5,25,50,75,95] percentiles at year 2300. Positive\
    \ surface mass balance fluxes represent mass gains while positive subshelf melt\
    \ and calving fluxes indicate mass losses; different scenarios show varied outcomes\
    \ for WAIS and EAIS. The boxes and whiskers in e\u2013h show the evolution of\
    \ these mass balance components in the West Antarctic ice sheet (WAIS; e,g) and\
    \ in the East Antarctic ice sheet (EAIS; f,h) under SSP1-2.6 (e\u2013f) and SSP5-8.5\
    \ (g\u2013h) at years 2100, 2200 and 2300 (calculated as 5-year centered averages)."
