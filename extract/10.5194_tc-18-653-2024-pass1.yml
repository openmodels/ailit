  4: 'Source material here.

    Evaluation overview: "Our ice-sheet simulations begin in the year 1950 CE to allow
    comparisons with observations over the satellite era...after 2300, the climate
    is kept constant in time, allowing us to investigate the long-term impacts of
    early-millennium warming (often called sea-level commitment; Golledge et al.,
    2015)."

    Drivers of Risk: "Hindcasts of the behaviour of the AIS over the period 1950-2014
    are produced using changes in oceanic and atmospheric boundary conditions derived
    from the CMIP5 climate model NorESM1-M...As of the year 2015, changes in atmospheric
    and oceanic properties derived from a subset of CMIP6 climate models... are used
    as forcing until the year 2300... The forcing applied is derived from both the
    Shared Socioeconomic Pathways (SSP) 5-8.5 and 1-2.6 scenarios, to estimate the
    possible long-term (multi-centennial to millennial) ice-sheet response to a very
    wide range of climate forcing."

    Quantitative material: "Our ice-sheet simulations begin in the year 1950 CE...After
    2300, the climate is kept constant in time, allowing us to investigate the long-term
    impacts of early-millennium warming...The forcing applied is derived from both
    the Shared Socioeconomic Pathways (SSP) 5-8.5 and 1-2.6 scenarios, to estimate
    the possible long-term (multi-centennial to millennial) ice-sheet response..."

    Methodology: "Ice-sheet initial conditions are provided by an inverse simulation
    nudging towards present-day ice-sheet geometry...Hindcasts of the behaviour of
    the AIS over the period 1950-2014 are produced using changes in oceanic and atmospheric
    boundary conditions derived from the CMIP5 climate model NorESM1-M...Atmospheric
    forcing is derived in the form of monthly-averaged air temperature and sublimation
    anomalies as well as precipitation ratios...Oceanic forcing is derived in the
    form of yearly-averaged temperature and salinity anomalies...These anomalies are
    then added to reference fields (referred to as the present-day atmosphere and
    ocean climatologies) that are used as a baseline in the ice-sheet model..."

