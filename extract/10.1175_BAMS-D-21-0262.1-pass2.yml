  10: There has been an almost 40 -times increase in the horizontal resolution of
    global numerical weather prediction (NWP) models (from about 400 km in the early
    1960s to less than 10 km in 2020); in addition, regional fine-mesh models have
    reached 1 km in resolution. The role of the private sector in NEWP has evolved
    significantly... The private sector activities have also grown to include providing
    global satellite-based measurements, targeted high-resolution modeling, and climate
    risk products utilized by corporations and governments. The global observing system
    is changing, however, to include observations from CubeSat satellite systems,
    drones, vehicle-borne systems, microwave links, airborne Mode-S systems, social
    media hazard data, low-cost 3D printed weather stations, urban in situ and enhanced
    air quality systems, and other systems (e.g., Majumdar et al. 2021). To meet the
    growing demand and need for observations useful to NEWP within this changing observing
    system, the WMO has launched a new Unified Data Policy... urging for a clear commitment
    to free and unrestricted exchange of relevant data.
  12: " \nOperational weather forecasting based on numerical prediction systems has\
    \ continuously improved over the past few decades. The usefulness of NEWP forecasts\
    \ has been pushed to lead times beyond 10 days for some weather phenomena including\
    \ for high-impact events such as midlatitude snowstorms in North America.\n\n\
    However, the steady progress has been at a slower pace for some forecasted elements,\
    \ like quantitative precipitation, where more efforts are needed that span from\
    \ observational needs and model improvements to communication of forecasts.\n\n\
    Improved coordination and collaboration among the public and private sectors of\
    \ the weather and climate enterprise, with strong engagement of academia, will\
    \ accelerate the achievement of the vision for improving skill over the coming\
    \ decade.\n\nOn the policy side, prevailing free and open data sharing among countries\
    \ and institutions led by the WMO has facilitated progress including the establishment\
    \ of the Global Basic Observing Network (GBON).\n"
  13: 'since the Earth system contains both slowly varying components (i.e., sea surface
    temperature, soil moisture, snow cover, sea ice) that can aid predictive skill
    (Krishnamurthy 2019) and highly nonlinear, rapidly changing phenomena such as
    convection that can produce both large local errors and significant errors downstream
    on the jet stream due to the modification of Rossby wave packets. Efforts to advance
    predictive skill include increasing high-performance computing (HPC) capacity;
    improving observational instrumentation providing more accurate data with higher
    temporal and spatial resolutions; advanced dynamical cores and better representation
    of complex physical processes; better model initialization through the utilization
    of expanding satellite observations (e.g., both from government agencies and occultation
    and other observations from commercial vendors), taking advantage of novel new
    measurement strategies such as crowd-sourced data (e.g., Hintz et al. 2019), rainfall
    from cell phone tower attenuation (e.g., Overeem et al. 2013), and the improved
    utilization of polarimetric radar measurements as models move to kilometer scale
    (Zhang et al. 2019), and more effective data assimilation methods; and use of
    ensembles to represent uncertainty in the initial state and model processes. Significant
    outstanding challenges remain in terms of weather and climate predictive skill:
    Midlatitude weather regime transitions at the week 3 to week 4 time range, teleconnections
    between tropical phenomena (e.g., the Madden-Julian oscillation) and midlatitude
    synoptic-scale weather patterns at the monthly range, seasonal-scale sea ice cover
    and thickness predictions, and the different trends observed in the Arctic and
    Antarctic, large-scale patterns of precipitation and midlatitude circulation changes
    in climate change projections, deep-ocean circulation and ice sheet sensitivity
    to change in climate models, convective precipitation beyond the short range,
    and closure of the water and energy cycle.'
