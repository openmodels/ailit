  4: "\nOne challenge facing society as evidenced in daily news headlines is the increase\
    \ in extreme weather events...Subsequently, the AR6 report concludes that a warming\
    \ climate plays a role in increasing extremes in heat, drought, rainfall, wildfire,\
    \ tropical cyclone intensity, and flooding (IPCC 2021)...While extremes in the\
    \ climate system have a devastating effect on populations across the world, the\
    \ impacts often fall disproportionately on low-income nations and marginalized\
    \ populations...A statistical analysis from Munich Re\u2019s NatCatService 2019\
    \ database reveals that 1,383 weather-related natural disasters took place across\
    \ the globe from 1980 to 1985 and the number grew to 4,020 registered events from\
    \ 2013 to 2018...Currently, 19% of the world\u2019s population (1.47 billion people)\
    \ face substantial risk of a 1-in-100-yr flooding event (Rentschler and Salhab\
    \ 2020). While extremes in the climate system have a devastating effect on populations\
    \ across the world, the impacts often fall disproportionately on low-income nations\
    \ and marginalized populations as ~587 million people who face substantial risks\
    \ from flooding are living on less than $5.5 (U. S. dollars) per day (Rentschler\
    \ and Salhab 2020).The need for improved weather and climate forecasts is also\
    \ driven by this increase in extremes occurring against a backdrop of nonclimatic\
    \ global trends that include biodiversity loss, unsustainable consumption of natural\
    \ resources, degradation of ecosystems, human demographic shifts including rapid\
    \ urbanization, social and economic inequalities, and a pandemic (IPCC 2022).\n"
  5: "Source material: Major weather- and climate-related loss events from the Munich\
    \ Re, NatCatService, 2019 database plotted utilizing their online data access\
    \ tools. Types of Events: Small, medium, and large loss events (meteorological\
    \ events like storms; hydrological events like floods and mass movements). Climatological\
    \ events (extreme temperature, drought, fires). Event Count: 1,382 registered\
    \ events. Event Count: 4,020 registered events, indicating a significant increase\
    \ over time. For the periods (a) 1980\u201385 and (b) 2013\u201318. There is a\
    \ notable increase in the number of events from the earlier time period to the\
    \ more recent one. Both maps are sourced from Munich Re, NatCatSERVICE, 2019,\
    \ highlighting the increase in frequency and distribution of weather-related loss\
    \ events globally."
  6: "Source material: The trends in urbanization are dramatic as the year 1800 only\
    \ about 2% of the world\u2019s population lived in urban areas compared to ~55%\
    \ in 2018 and projections of 68% in 2050 with 2.25 billion more urban residents\
    \ added in Asia and Africa alone (United Nations 2019). The importance of weather\
    \ and climate risk\u2013based decision-making to society is also increasing substantially\
    \ with population growth and demographic shifts that include urbanization and\
    \ movement to coastlines...These trends mean more people, assets, and essential\
    \ services (e.g., power, water, transport, telecommunications, the internet) are\
    \ exposed and vulnerable to weather, climate, water, ocean, and even space hazards.\
    \ Majumdar et al. (2021) outlines the growing societal need for accurate and timely\
    \ forecasts of flooding, heat waves, and air pollution events in urban areas.\
    \ A survey of 1,000 global executives in 15 countries by the IBM Institute for\
    \ Business Value (IBV) in cooperation with Oxford Economics found that 93% of\
    \ the executives felt that improved insight into weather variations would positively\
    \ impact their revenue with estimates of growth in annual revenue exceeding $500\
    \ billion (U.S. dollars) (Orrell et al. 2018)."
  7: "Source material here: various stakeholders from public, private, and academic\
    \ sectors as shown in Fig. 2. The important drivers of the innovation cycle are\
    \ highly qualified personnel, computational and observational infrastructures\
    \ (in the middle of the figure), and increasing stakeholder and cus- tomer demand\
    \ and need (on the circumference of the figure) for tailored and seamless weather\
    \ and climate forecasting (localized, timely, precise, and accurate). Stakeholders\
    \ and customers can push clockwise new initiatives (Fig. 2) at different positions\
    \ in the innovation cycle: R&D, operation, and services. This paper will cover\
    \ these three components of the innovation cycle: infrastructure, R&D, and operation.\
    \ Stakeholders engaged in all three components will have to make strategic choices\
    \ in the coming years, and some will struggle to keep up as technologies continue\
    \ to combine and advance, and new ways of doing business appear quickly. This\
    \ paper summarizes the v iews, k nowledge, and expertise of a group of scientists\
    \ and practitioners from the public, private, and academic sectors that was produced\
    \ under the leadership of WMO (Brunet et al. 2021). Our summar y represents an\
    \ update of the vision described over a decade ago in Shapiro et al. (2010). In\
    \ addition, our approach of including input across these sectors allows us to\
    \ go beyond the scientific v ision described in Shapiro et al. (2010) through\
    \ increased knowledge of the needs of societ y and economy. We do not attempt\
    \ to dictate solutions to the many open questions on the f uture of weather and\
    \ climate forecast ing. Instead, we st r ive to improve t he understanding of\
    \ t he ongoing R& D and to iden- tif y technological trends, and any possible\
    \ impediments to progress. In this way, risks and Fig. 2. The innovation cycle:\
