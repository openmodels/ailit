  4: "Statistical analysis from Munich Re\u2019s NatCatService 2019 database reveals\
    \ that 1,383 weather-related natural disasters took place across the globe from\
    \ 1980 to 1985 and the number grew to 4,020 registered events from 2013 to 2018.\
    \ 19% of the world\u2019s population (1.47 billion people) face substantial risk\
    \ of a 1-in-100-yr flooding event, and ~587 million people who face substantial\
    \ risks from flooding are living on less than $5.5 (U.S. dollars) per day."
