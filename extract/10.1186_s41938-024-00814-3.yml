Drivers of Risk:
  1: Climate change is highlighted as a driver creating favorable conditions for the
    development of invasive pests like FAW.
  2: Climate change creates favorable conditions for the proliferation of the fall
    armyworm (FAW).
  3: Climate change is contributing to fall armyworm (FAW) migration and infestation
    patterns.
  4: Climate change affects host plant interactions, population dynamics, geographical
    distribution, activity of pests, and efficacy of control methods. Temperature
    variations influence the invasiveness, geographical distribution, phenology, natural
    enemies, crop damage level, and pest developmental length of FAW.
  6: No specific shocks or changes impacting the outcomes are mentioned on this page.
  8: The increasing threat of FAW and its impact influenced by environmental conditions
    and climate changes.
Evaluation overview:
  1: The paper evaluates the management strategies for fall armyworm (FAW) in the
    context of a changing climate, specifically focusing on crop yield losses caused
    by FAW.
  2: Climate change exacerbates the invasion of alien insects and affects agricultural
    productivity and plant growth.
  4: The page discusses the effectiveness of integrated pest management (IPM) strategies,
    host plant resistance, and other control methods against Fall Armyworm (FAW) in
    the context of climate change, affecting crop production and food security.
  6: The paper discusses biological control methods for pest management, specifically
    focusing on parasitoids, predators, and entomopathogenic fungi.
  7: Examines the efficacy of various biological control agents against the fall armyworm
    (FAW), specifically focusing on mortality rates.
  8: The paper highlights the integration of pest management techniques to manage
    FAW and its effects on crop production and food security.
Highlights:
  1: Significant progress has been made in implementing integrated pest management
    (IPM) strategies, integrating agro-ecological and biological approaches for FAW
    control.
  2: IPM strategies incorporating agro-ecological and biological methods are important
    for sustainable management of FAW.
  3: FAW does not enter diapause, which means it can maintain endemic populations
    in favorable climates.
  4: Native genetic resistance to FAW has emerged as a promising approach for managing
    this destructive insect pest. The International Maize and Wheat Improvement Center
    (CIMMYT) has identified genetic variation and the potential to breed native genetic
    resistance in cultivated plants.
  6: The introduction and release of parasitoids have been successful in controlling
    pest populations in newly invaded areas.
  7: Identifies species of Steinernema and Heterorhabditis achieving 100% FAW larval
    mortality and emphasizes the significance of Bacillus thuringiensis and baculoviruses
    in controlling FAW populations.
  8: Recommendations for a climate-responsive IPM strategy for FAW control, focusing
    on climate monitoring, resilient crop varieties, agro-ecological management, and
    biological control.
Methodology:
  4: The page reviews the principles of IPM and native genetic resistance to FAW.
  6: The paper references extensive surveys conducted in Western, Eastern, and Southern
    Africa to identify natural enemies of the FAW, including parasitoids, predators,
    and entomopathogens.
More Notes:
  1: The paper discusses the threat posed by the invasive FAW to global agriculture,
    with a focus on agro-ecological practices and biological control methods for long-term
    management.
  2: Previous pesticide-based pest control for FAW has proven ineffective and led
    to resistance.
  6: The paper provides specific examples of biological control agents observed in
    Africa for the FAW.
  8: The paper emphasizes a holistic, climate-responsive pest management approach
    and suggests integrating various strategies to manage FAW's impact on agriculture.
Quantitative material:
  1: FAW can cause yield losses of up to 80-100% in maize fields.
  6: Parasitism rates of up to 64% were observed in Niger, and larval parasitism rates
    varied from 5.1 to 75% in Ghana following the release of parasitoids.
  7: Presents specific mortality rates for FAW using different biological control
    agents, such as 92-96% efficacy for some isolates of Metarhizium anisopliae and
    79% for a strain of Beauveria bassiana.
sourcematerial:
  1: "  \nAmong invasive alien insects, fall armyworm (FAW) (Spodoptera frugiperda)\
    \ (JE Smith) (Lepidoptera: Noctuidae) has emerged as a major pest species, causing\
    \ significant yield losses in maize cropping outside his native range. Climate\
    \ change plays a crucial role in driving the invasion of these pests, creating\
    \ favorable conditions for their development, and negatively impacting global\
    \ biodiversity. Notably, FAW can cause substantial yield losses of up to 80\u2013\
    100% in maize fields, affecting all maize growth stages from seedling to cobbling.\
    \ Significant progress has been made in implementing integrated pest management\
    \ (IPM) strategies that integrate agro-ecological and biological approaches. These\
    \ pests can devastate crops, livestock, biodiversity and ecosystem functioning,\
    \ resulting in ecological damage and substantial economic losses. The review article\
    \ focuses on the compilation of IPM methods, combining agro-ecological practices\
    \ and biological control agents such as parasitoids and viruses, for the effective\
    \ management of FAW.\n"
  2: "Climate change exacerbates the invasion of alien insects and affects agricultural\
    \ productivity and plant growth: \"climate change plays a critical role in exacerbating\
    \ the invasion of alien insects by creating favorable conditions for their development\
    \ in new environments...climate change disrupts plant\u2013animal interactions,\
    \ compromises ecosystem resilience and increases plant stress and vulnerability\
    \ to insect infestations, ultimately resulting in decreased agricultural productivity\
    \ and plant growth.\"\n\nClimate change creates favorable conditions for the proliferation\
    \ of the fall armyworm (FAW): \"The findings by Ram\xEDrez-Cabral et al. (2020)\
    \ emphasize that climate change has the potential to exacerbate issues related\
    \ to the FAW by creating more favorable conditions for its proliferation.\"\n\n\
    IPM strategies incorporating agro-ecological and biological methods are important\
    \ for sustainable management of FAW: \"Integrated pest management (IPM) strategies\
    \ have emerged as a holistic and environmentally friendly approach that integrates\
    \ multiple techniques, including agro-ecological, biological and chemical methods.\"\
    \n\nPrevious pesticide-based pest control for FAW has proven ineffective and led\
    \ to resistance: \"In the past, using pesticides as the main pest control method\
    \ for FAW has proven ineffective and unsustainable...FAW quickly developed resistance\
    \ to many chemical compounds, making them less effective over time (CABI 2020).\""
  3: "Source material: \"climate change can have significant impacts on agri-food\
    \ systems; it can also cause biodiversity loss, thereby increasing food insecurity\
    \ risks... Factors such as wind patterns, crop availability and environmental\
    \ conditions such as temperature and humidity, which are crucial for the pest\u2019\
    s life cycle and reproduction, influence its spread... FAW has been reported in\
    \ over 40 African countries... displaying high adaptability to a wide range of\
    \ temperatures and geographical distributions... FAW cannot enter into diapause\
    \ in its life cycle (Huang et al. 2020). This is particularly relevant in sub-Saharan\
    \ countries where favorable conditions prevail throughout the year, leading to\
    \ endemic FAW populations.\""
  4: "  \n\"Climate change becomes a major challenge to the agricultural sector, affecting\
    \ host plant interactions, population dynamics, geographical distribution, activity\
    \ of pests and efficacy of control methods...subsequently affecting both crop\
    \ production and food security.\"\n\n\"The FAW has shown susceptibility to infection\
    \ by several entomopathogens, including Bacillus thuringiensis (Bt), Metarhizium\
    \ anisopliae, Beauveria bassiana and S. frugiperda multiple nucleopolyhedro virus\
    \ (SfMNPV). These pathogens have demonstrated their ability to infect and affect\
    \ FAW populations.\"\n\n\"Host resistance: a key component in IPM strategies...plays\
    \ an important role in controlling insect pest\u2019s damage by reducing their\
    \ ability to utilize plant species for food and reproduction.\"\n\n\"Native genetic\
    \ resistance to FAW has emerged as a promising approach for managing this destructive\
    \ insect pest. Between 1970 and 1990, the International Maize and Wheat Improvement\
    \ Center (CIMMYT) in Mexico identified genetic variation and the potential to\
    \ breed native genetic resistance in cultivated plants, including maize, to manage\
    \ various insect pests.\"\n"
  6: 'Source material here.

    Biological control involves utilizing living organisms to mitigate the population
    density and impact of specific pests, thereby minimizing damage and reducing pest
    abundance... These organisms play a crucial role in naturally regulating insect
    populations and can be classified into three groups: predators, parasitoids and
    entomopathogens, each playing a specific role in controlling pests...


    Parasitism rates of up to 64% were observed in Niger, following the release of
    T. remus in sorghum fields... In Ghana, larval parasitism rates varied from 5.1
    to 38.8% and with up to 75% in some sites...


    Extensive surveys conducted across Western Africa (Ghana, Benin, Senegal), Eastern
    Africa (Ethiopia, Kenya, Tanzania) and Southern Africa (Zambia, Mozambique) have
    identified potential natural enemies of FAW... Studies on the natural enemies
    of FAW reveal a great diversity of parasitoids worldwide...


    Before the invasion of the FAW in Africa, indigenous and non-indigenous lepidopteran
    pests... had already emerged as significant threats to maize production across
    the continent... making them viable candidates for augmentation and conservation
    biological control strategies... Parasitoids have demonstrated significant effectiveness
    in controlling FAW populations.

    '
  7: "yaml\nEvaluation overview: \"Akutse et al. (2019) tested 20 fungi against FAW,\
    \ finding an efficacy of 92\u201396% for some isolates of M. anisopliae. Shahzad\
    \ et al. (2021) observed a maximum efficacy of 79% for a strain of B. bassiana.\"\
    \nQuantitative material: \"Akutse et al. (2019) tested 20 fungi against FAW, finding\
    \ an efficacy of 92\u201396% for some isolates of M. anisopliae. Shahzad et al.\
    \ (2021) observed a maximum efficacy of 79% for a strain of B. bassiana. Romero-Arenas\
    \ et al. (2014) reported a 72.5% mortality rate with a native strain of M. anisopliae,\
    \ compared to 32.5% for a commercial strain. Andal\xF3 et al. (2010) demonstrated\
    \ 100% larval mortality with species of Steinernema and Heterorhabditis. Garcia\
    \ et al. (2008) found that 280 infective juveniles of Steinernema spp. were needed\
    \ to kill 100% of third-instar FAW larvae in Petri dishes, compared to 400 juveniles\
    \ of H. indica to achieve 75% mortality.\"\nHighlights: \"Species such as Heterorhabditis\
    \ bacteriophora, H. indica and Steinernema carpocapsae are environmentally friendly\
    \ alternatives to chemical pesticides...Andal\xF3 et al. (2010) demonstrated 100%\
    \ larval mortality with species of Steinernema and Heterorhabditis...Entomopathogenic\
    \ bacteria (EPB), such as Bacillus thuringiensis (Bt), play a crucial role in\
    \ the biological control of FAW...SfMNPV, in particular, is a widely used virus\
    \ candidate for FAW biological control.\"\n"
