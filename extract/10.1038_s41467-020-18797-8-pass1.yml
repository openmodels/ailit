Drivers of Risk:
  1: The analysis considers aleatory uncertainty, which is the irreducible uncertainty
    associated with random variability in temperature.
  2: "Annual global mean temperature (GMT) anomaly (\u0394T)."
  3: The paper discusses aleatory uncertainty in temperature trajectories and epistemic
    uncertainty about equilibrium climate sensitivity (ECS) as key drivers of risk.
  4: Persistent temperature extremes and autoregressive processes of climate variability
    are key drivers increasing economic damages.
Evaluation overview:
  1: The page provides an evaluation of the economic damages related to climate change
    due to temperature variability.
  2: Economic damages from climate change, measured as a share of global annual output.
  3: The paper evaluates the economic damages associated with temperature variability
    and climate damages under different RCP scenarios using deterministic and stochastic
    models.
  4: The page discusses the economic damages from climate change due to temperature
    variability and quantifies them in terms of risk premia associated with aleatory
    and epistemic uncertainty.
Highlights:
  1: The paper highlights that modest variability in temperature could imply substantial
    unrecognized economic damages.
  2: Adding realistic temperature variability creates substantial uncertainty in future
    damages, equivalent to trillions of dollars of previously unaccounted for economic
    costs of climate change.
  3: Risk premiums indicate substantial additional costs due to stochastic variability
    over deterministic projections; the stochastic model shows that higher ECS leads
    to greater mean warming and variability.
  4: The paper highlights that economic damages from temperature variability are likely
    to be higher than previous estimates, revealing trillions of dollars in uncounted
    damages.
Methodology:
  1: The paper introduces a method to account for aleatory uncertainty in a physically
    well-founded and tractable way.
  2: "Uses a stochastic model (equation provided) to simulate GMT, calibrating C,\
    \ \u03BB, and \u03C3\xB2Q to historical data. Then passes \u0394T through a non-linear\
    \ damage function. Damages are discounted and summed across future years."
  3: The analysis utilizes deterministic and stochastic temperature models and computes
    economic damages based on ensembles of temperature trajectories with a 4.25% discount
    rate.
  4: The analysis involves solving energy balance models for different values of equilibrium
    climate sensitivity (ECS) and comparing the expected utility of damages with varying
    levels of uncertainty.
More Notes:
  2: The paper suggests that the benefits of adaptation are much greater than previously
    believed due to the increased uncertainty in climate damages.
  4: The study suggests that the costs of climate change damages, primarily due to
    autocorrelation in temperature extremes, are larger than currently recognized,
    and adaptation benefits are underestimated.
Quantitative material:
  1: The analysis suggests that variability could result in trillions of dollars of
    previously unaccounted economic damages.
  2: Deterministic model forecasts $486 trillion in total damages for RCP8.5; stochastic
    model assigns a 5% chance to damages exceeding $563 trillion (16% higher). For
    RCP2.6, 5-95% range for stochastic model is (-30%, +52%) of the deterministic
    forecast of $30 trillion.
  3: 'Risk premiums, in trillions of USD and as a percentage of current global output,
    are provided for different RCP scenarios: $3 trillion (RCP2.6), $9 trillion (RCP4.5),
    $15 trillion (RCP6.0), $32 trillion (RCP8.5).'
  4: The risk premium amounts in trillion USD for different RCP scenarios are provided
    (e.g., RCP8.5 accounts for 46 trillion USD from aleatory and epistemic uncertainties
    combined).
sourcematerial:
  1: "The page discusses that \"[a] number of influential assessments of the economic\
    \ cost of climate change rely on just a small number of coupled climate\u2013\
    economy models\" and critiques these models for failing to account \"for the cost\
    \ of aleatory uncertainty\u2014the irreducible uncertainty that remains even when\
    \ the true parameter values are known.\" It claims that \"[w]e show how to account\
    \ for this second source of uncertainty in a physically well-founded and tractable\
    \ way\" and demonstrates that \"even modest variability implies trillions of dollars\
    \ of previously unaccounted for economic damages.\""
  2: "  \n\"To understand the economic consequences of this omission, start by noting\
    \ that the annual GMT anomaly, \u0394T, is the main input into the calculation\
    \ of the economic damages from climate change.\"  \n\n\"The deterministic model\
    \ forecasts $486 trillion in total damages for the forcing scenario RCP8.5, but\
    \ the stochastic model assigns a 5% chance to damages exceeding $563 trillion,\
    \ 16% higher than the deterministic forecast. The 5\u201395% range for the stochastic\
    \ model is (\u221213%, +16%) of the deterministic forecast. For RCP2.6, for instance,\
    \ the 5\u201395% range for the stochastic model is (\u221230%, +52%) of the deterministic\
    \ forecast of $30 trillion.\"  \n\n\"To capture this type of uncertainty, we have\
    \ to extend the standard deterministic model. The simplest physical model that\
    \ describes the stochastic behaviour of GMTs over time, and how this stochasticity\
    \ depends on the underlying physical parameters, can be written as follows:...\
    \ Figure 2 shows the different characteristics of the temperature time series\
    \ produced when C, \u03BB, and \u03C3\xB2Q are calibrated to historical data (Supplementary\
    \ Note 6), and also when \u03C3\xB2Q is set to zero, as in the deterministic model.\"\
    \  \n\n\"We show, next, that adding realistic variability in global temperature\
    \ in this way creates substantial uncertainty in future damages, equivalent to\
    \ trillions of dollars of previously unaccounted for economic costs of climate\
    \ change.\"  \n\n\"Our findings instead point to the conclusion that the benefits\
    \ of adaptation are much greater than previously believed.\"  \n"
  3: " \n\"The paper evaluates the economic damages associated with temperature variability\
    \ and climate damages under different RCP scenarios using deterministic and stochastic\
    \ models.\"  \n"
  4: "yaml\n\"Evaluation overview\": \"Adding temperature variability to a simple\
    \ integrated assessment model results in greater economic damages from climate\
    \ change. ... This plot shows what the canonical social planner would be willing\
    \ to pay to avoid aleatory uncertainty when there is also underlying epistemic\
    \ uncertainty.\"\n\"Drivers of Risk\": \"The climate system represented by Eq.\
    \ (1) is a continuous autoregressive process of the \uFB01rst order... It consequently\
    \ exhibits autocorrelation... More concretely, a country like Syria may be reasonably\
    \ successful at containing the damage of a 1-year or even 2-year drought, but\
    \ collapse under the weight of a 3-year drought, having far-reaching and disproportionate\
    \ consequences. The combination of anthropogenic forcing and autocorrelated natural\
    \ variability makes such severe droughts much more likely14.\"\n\"Quantitative\
    \ material\": \"RCP8.5 46Tr (58%) ... RCP6.0 31Tr (39%) ... RCP4.5 25Tr (31%)\
    \ ... RCP2.6 9Tr (11%)\"\n\"Methodology\": \"To compute these risk premia, we\
    \ \uFB01rst obtain an ensemble of temperature trajectories by solving the deterministic\
    \ EBM for a distribution of values of the equilibrium climate sensitivity (ECS).\
    \ We assume that the ECS is log-normally distributed with a most likely value\
    \ of 3 \xB0C and Pr(2 \u2264 ECS \u2264 4.5) = 0.66, in line with the IPCC\u2019\
    s fourth and \uFB01fth assessments...\"\n\"Highlights\": \"...we \uFB01nd that\
    \ the careful combination of insights from these two disciplines reveals trillions\
    \ of dollars of previously uncounted damages. ... These damage estimates are substantial,\
    \ but it is worth noting that they are likely to be on the conservative side.\"\
    \n\"More Notes\": \"The true cost of temperature variability is likely to be substantially\
    \ larger than we estimate here. ... The cost of adaptation is beyond the scope\
    \ of the present investigation, but our \uFB01ndings suggest that the bene\uFB01\
    ts are much greater than previously believed.\"\n"
