  9: "  \n\"The invasive coconut mite is considered an economically important pest\
    \ of coconut wherever it occurs.\" \n\n\"In the present study, we used the MaxEnt\
    \ model to predict the current and future distributions of A. guerreronis.\"\n\
    \n\"MaxEnt theory has several advantages over other SDMs because of its high predictive\
    \ power and, does not require absence records of the targeted species.\"\n\n\"\
    In our model, the environmental variables that had the strongest influence on\
    \ coconut mite habitat suitability in descending order of importance.\"\n\n\"\
    Our model performance was high, with an AUC value of more than 0.9, suggesting\
    \ that the model\u2019s predictions are reliable.\"\n\n\"High suitability (green)\
    \ areas are primarily located in tropical and subtropical regions, including parts\
    \ of South America, Sub-Saharan Africa, and Southeast Asia.\"\n\n\"The image consists\
    \ of two world maps, each showing the projected suitability of areas for a specific\
    \ purpose using a color-coded scheme.\"\n\n\"Top Map (2040 SSP5-8.5)\" and \"\
    Bottom Map (2060 SSP5-8.5)\" show projected distribution changes under the specified\
    \ scenario and time frames.\n"
  10: 'Source material: FIGURE 8 Exploring the effect of the data from Ghana importance
    were seasonality of temperature, annual average temperature, average variation
