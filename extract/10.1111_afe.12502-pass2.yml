  2: "Source material: Mite infestation can affect the export acceptability of coconut\
    \ fruits (Rezende et al., 2016). Coconut mite can be detected by a visible triangular\
    \ white spot on the fertilized nuts (Mariau, 1969), found along the edge of the\
    \ coconut \u2019s perianth. Mite infestations cause reductions in the yield of\
    \ copra, a premature drop of coconut, reduced coconut fibre length and tensile\
    \ strength, small deformed fruits, and result in a reduction in husk availability\
    \ (Alam & Islam, 2014; Aratchige et al., 2016; P. P. Kumar & Ramaraju, 2010; Naseema\
    \ Beevi et al., 2003; Wickramananda et al., 2007). The coconut mite Aceria guerreronis\
    \ Keifa (Acari: Eriophyidae), is an invasive pest that poses a serious threat\
    \ to the coconut industry worldwide (Navia et al., 2013). Climate change plays\
    \ an important role in the distribution of species leading to either expansion\
    \ or reduction of suitable habitats (Aidoo et al., 2019; Ajene et al., 2020; Sung\
    \ et al., 2018;Thomson et al., 2010; Vel\xE1squez-Tibat\xE1 et al., 2013). ...\
    \ Over the past 100 years, there has been a dramatic increase in the spread of\
    \ invasive species due to increased trade, tourism, transportation, and travel\
    \ (Hulme, 2009). Species distribution models (SDMs) employ computer algorithms\
    \ to predict the habitat suitability of a species across geographical space and\
    \ time based on environmental data. Such models are important tools to evaluate\
    \ the potential response of pests to climate change and have been useful at large\
    \ spatial and temporal scales. ... Although there are several SDM algorithm methods,\
    \ Maximum Entropy (MaxEnt) employs presence-only data to predict the distribution\
    \ of species based on the theory of maximum entropy (Phillips et al., 2005, 2006,\
    \ 2017). Attempts to reduce the adverse effects of warming on insect pests must\
    \ provide a deeper understanding of the response of individual species and the\
    \ complex ecological processes underlying their response (Lehmann et al., 2020)."
  3: "The study models and maps regions suitable for the coconut mite (A. guerreronis)\
    \ to inform quarantine measures and policy formulation. Therefore, for the first\
    \ time, we used MaxEnt to model and map regions suitable for coconut mites to\
    \ provide information for the implementation of quarantine measures and highlight\
    \ the need for policy formulation.\n\nClimatic data from WorldClim (19 bioclimatic\
    \ variables) ranging from 1970-2000, with a resolution of approximately 5 km.\
    \ The climatic data used for this study were gathered from the WorldClim environmental\
    \ database (http://www.worldclim.org/). These environmental variables have been\
    \ widely used for species distribution modelling (Fick & Hijmans, 2017; Hijmans\
    \ et al., 2005). The variables are mean climate values ranging from 1970 to 2000,\
    \ with a high resolution of 2.5 arc-min (\u2248 5 km at the equator).\n\nPearson's\
    \ correlation coefficients were calculated to filter environmental variables with\
    \ values greater/or equal to 0.7. In addition, we also consulted databases such\
    \ as Global Biodiversity Information Facility (GBIF; http://www.gbif.org) and\
    \ the Centre for Agriculture and Bioscience International (CABI; https://www.cabi.org/).\
    \ In case only localities were provided, Google Earth Pro was used to extract\
    \ the coordinates (i.e., latitudes and longitudes). Duplicate and fuzzy records\
    \ were manually removed from the data.\n\nMaxEnt was used to model the distribution\
    \ of coconut mites, adjusting default settings for resource types and regularization\
    \ multiplier (RM). The model uses linear, quadratic, product, threshold, and hinge\
    \ feature sets. Spatial autocorrelation was reduced using the R package spThin.\
    \ Occurrence points were filtered to be at least 5 km apart. Maximum Test Sensitivity\
    \ Plus Specificity (MTSPS) threshold was used to extract suitable and unsuitable\
    \ areas. The model for A. guerreronis was based on adjusting the default MaxEnt\
    \ settings for certain combinations of resource types and the regularization multiplier\
    \ (RM) (Jarnevich et al., 2015; Merow et al., 2013). We combined linear (L), quadratic\
    \ (Q), product (P), threshold (T), and hinge (H) feature sets, using automatic\
    \ feature selection plus RM = 1 to control the number of parameters and, therefore,\
    \ the complexity of the model for the species.\n\nThe study identifies regions\
    \ suitable for the coconut mite using MaxEnt modeling. We used ArcGIS version\
    \ 10.8 to prepare the MaxEnt outputs and generate suitable and unsuitable areas\
    \ for A. guerreronis. Therefore, for the first time, we used MaxEnt to model and\
    \ map regions suitable for coconut mites to provide information for the implementation\
    \ of quarantine measures and highlight the need for policy formulation.\n\nThe\
    \ climatic data used are mean climate values ranging from 1970 to 2000. Occurrence\
    \ data was collected from a nationwide survey in Ghana from April 2019 to February\
    \ 2021 and supplemented with literature search and online databases. These environmental\
    \ variables have been widely used for species distribution modelling (Fick & Hijmans,\
    \ 2017; Hijmans et al., 2005). The variables are mean climate values ranging from\
    \ 1970 to 2000, with a high resolution of 2.5 arc-min (\u2248 5 km at the equator)\
    \ (Ramos et al., 2018).\n"
