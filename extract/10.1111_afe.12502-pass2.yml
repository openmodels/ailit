  11: 'Source material: The page discusses the potential distribution of the coconut
    mite, A. guerreronis, influenced by climate change, stating that "climate suitable
    areas for A. guerreronis...are predicted to shift from now until 2060," with impacts
    being variable based on "geographical location, the country''s wealth, and farm
    management practices." Rising global temperatures are specified as a driver, with
    the text noting "Rising global temperatures will mean that regions that are at
    present unsuitable to coconut mites...will become suitable habitats from now until
    2040." The methodology is outlined by explaining that "In the present study, we
    used two socioeconomic pathways (SSPs 2.6 and 8.5) to predict the impact of climate
    change on species..." Highlights include that "predictions indicate an expansion
    of habitat suitability outside the known distribution of the pest...in regions
    such as Brazil, India, Australia, Nigeria, and Kenya." Furthermore, "the exact
    impact of climate change on invasive species like A. guerreronis may vary," emphasizing
    the variability due to location and conditions.'
