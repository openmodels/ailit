Drivers of Risk:
  1: The potential future distribution of Aceria guerreronis is affected by climate
    change, specifically under emission scenarios SSP1-2.6 and SSP5-8.5 in the context
    of the IPCC's sixth assessment report.
  2: An invasive species, coconut mite, poses a serious threat to the coconut industry
    worldwide. Climate change affects the distribution of species and invasive species
    spread due to increased trade and climate change.
  3: Climatic data from WorldClim (19 bioclimatic variables) ranging from 1970-2000,
    with a resolution of approximately 5 km.
  5: Seasonality of temperature, annual average temperature, average variation of
    daytime temperature, and annual precipitation.
  8: Shared socio-economic pathway (SSP2.6) of climate conditions
  9: Potential climate changes in tropical and subtropical regions, as modeled under
    the SSP5-8.5 scenario, which can impact the distribution of the coconut mite.
  10: Thermal parameters such as temperature seasonality, annual average temperature,
    and average daytime temperature variation are main factors affecting the potential
    distribution of Aceria guerreronis more than rainfall.
  11: Rising global temperatures and associated climatic changes may cause a shift
    in suitable habitats for A. guerreronis.
Evaluation overview:
  1: The paper evaluates the potential geographical distribution of the invasive coconut
    mite, Aceria guerreronis, which is a pest causing significant economic losses
    to coconut crops.
  2: Mite infestations cause reductions in the yield of copra, a premature drop of
    coconut, reduced coconut fiber length and tensile strength, small deformed fruits,
    and result in a reduction in husk availability.
  3: The study models and maps regions suitable for the coconut mite (A. guerreronis)
    to inform quarantine measures and policy formulation.
  5: No relevant information
  8: No relevant information
  9: The study does not specifically detail an outcome like mortality or productivity
    loss, but discusses the distribution of the coconut mite, an economically important
    pest of coconut plants.
  11: The page discusses the potential distribution of the coconut mite, A. guerreronis,
    influenced by climate change.
Highlights:
  1: The MaxEnt model predicts suitable habitats for Aceria guerreronis outside its
    present distribution in Oceania, Asia, Africa, and the Americas, with a decrease
    in habitat suitability from 2040 to 2060.
  2: The coconut mite is an invasive pest seriously threatening the coconut industry,
    leading to productivity losses in coconuts.
  3: The study identifies regions suitable for the coconut mite using MaxEnt modeling.
  4: The MaxEnt model showed satisfactory results with an AUC value of 0.975, indicating
    high model performance.
  5: The thermal conditions combined contributed 84.61% to the model, whereas rainfall
    conditions 15.38%. A. guerreronis distribution occurs in areas with a mean seasonality
    of temperature of about 149.67/C14C, precipitation seasonality of about 64.62%,
    average variation of daytime temperature close to 8.62/C14C, annual precipitation
    close to 1459 mm, and an annual average temperature around 25/C14C.
  8: Model predicts changes in habitat suitability for Aceria guerreronis by 2040
    and 2060 under SSP2.6, with shifts in suitable areas across continents. Predicted
    suitable areas varied depending on which occurrence records were used in the model.
  9: The model projects high suitability for the coconut mite in tropical and subtropical
    regions, indicating potential expansion into those areas by 2040 and 2060.
  10: Temperature influences the distribution and spread of the coconut mite, Aceria
    guerreronis, with significant suitability in parts of West and Central Africa,
    South America, and South Asia.
  11: Predictions indicate an expansion and contraction of habitat suitability for
    A. guerreronis, affecting regions such as Brazil, India, and Kenya differently
    by 2040.
Methodology:
  1: The analysis uses a machine learning algorithm based on maximum entropy (MaxEnt)
    to predict the potential global distribution of Aceria guerreronis for the 2040
    and 2060 periods.
  2: Species distribution models (SDMs), including Maximum Entropy (MaxEnt), are mentioned
    for predicting habitat suitability and distribution of species.
  3: MaxEnt was used to model the distribution of coconut mites, adjusting default
    settings for resource types and regularization multiplier (RM). The model uses
    linear, quadratic, product, threshold, and hinge feature sets. Spatial autocorrelation
    was reduced using the R package spThin. Occurrence points were filtered to be
    at least 5 km apart. Maximum Test Sensitivity Plus Specificity (MTSPS) threshold
    was used to extract suitable and unsuitable areas.
  4: Analysis was performed using the MaxEnt model based on 19 bioclimatic datasets,
    with 80% of the occurrences used as training data and 20% as testing data.
  5: MaxEnt generates response curves. Environmental variables were used to model
    the potential distribution of the coconut mite (A. guerreronis).
  8: Species distribution modeling of Aceria guerreronis suitability in 2040 and 2060
    under SSP2.6, using occurrence records from different geographic areas.
  9: The analysis uses the MaxEnt model to predict current and future distributions
    of the coconut mite A. guerreronis under the SSP5-8.5 climate conditions for 2040
    and 2060.
  11: The study uses bioclimatic variables and socioeconomic pathways (SSPs 2.6 and
    8.5) to predict the impact of climate change on A. guerreronis distribution until
    2060.
More Notes:
  2: This page describes the impacts of coconut mites and climate change on coconut
    agriculture, focusing on species distribution and pest impact.
  3: The climatic data used are mean climate values ranging from 1970 to 2000. Occurrence
    data was collected from a nationwide survey in Ghana from April 2019 to February
    2021 and supplemented with literature search and online databases.
  5: The paper provides specific temperature and precipitation values that correspond
    to the distribution and probability of the coconut mite.
  8: The model predicts a slight expansion of habitat suitability when Ghana occurrences
    are removed from the datasets. The prediction with only Ghana data was consistent
    with the known occurrence records of the pest in Ghana.
  9: The model's performance was considered high with an AUC value of more than 0.9,
    indicating reliable predictions.
  10: The analysis includes maps that visually represent the potential distribution
    and suitability of regions for the coconut mite, specifically highlighting coastal
    concentrations within Ghana.
  11: The impact of climate change on A. guerreronis will vary based on geographical
    location, wealth, and farming practices.
