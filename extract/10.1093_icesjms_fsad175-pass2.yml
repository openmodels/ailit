sourcematerial:
  1: 'Source material: Species range shifts, harmful algal blooms, marine heatw a
    v es, lo w o xy gen e v ents, coral bleaching, and hurricanes all present a serious
    economic risk to these industries... Currently, however, there is relatively little
    use of financial risk management tools such as insurance, especially newer forms
    such as index or parametric insurance, to help operators man-age the impacts of
    marine-related climate shocks on produc-tion in both aquaculture and wild-capture
    fisheries... We suggest that a con v ergence of the insurance industry and marine
    sectors, fostered through collaboration with go v ernments, academics, and NGOs
    will help usher in new forms of insurance, such as ocean-index or parametric insurance.'
  2: 'Source material here.

    Evaluation overview: "The continued exposure to these shocks is a serious threat
    to the maintenance of blue food supply chains and the associated food and income
    security of those individuals that work in these industries. These risks can dictate
    short- and long-term profitability, and ultimately solvency, across the full range
    of blue-food sectors from artisanal fisheries to industrial fisheries to transnational
    aquaculture firms."

    Drivers of Risk: "Illustration showing the parallels between climate shocks on
    land (a; drought) and marine climate shocks (b; marine heatwaves). Marine climate
    shocks such as marine heatwaves can impact this productivity, for example, by
    creating conditions where corals bleach."

    Methodology: "Insurance maintains the capital reserves that blue-food actors hold
    by reducing the volatility in income. This enables blue-food actors to invest
    in the means to cope with future shocks."

    Highlights: "Insurance...transfers risk..., typically via an insurance contract
    between the actor experiencing the realized risk and a different actor that can
    better absorb the risk...Insurance enables blue-food actors to invest in the means
    to cope with future shocks."

    More Notes: "...there are always several major challenges to overcome for insurance
    to become a viable option. Specifically, moral hazard, adverse selection, and
    the issue of accurately pricing risk. In the absence of insurance and thus the
    ability to transfer risk, climate shocks have greater impacts on production and
    profit margins, and the overall adaptive capacity of coastal communities."

    '
  4: "Source material here: actors is reduced and their sensitivity to climate shocks\
    \ increased; losses engendered by marine climate shocks result in less capital;\
    \ risk exposure increases due to climate change; accrued negative impacts of multiple\
    \ (and more extreme) climate shocks; government disaster relief is now used regularly\
    \ to help mitigate the economic impacts; payments are made many years after the\
    \ event and cover only a fraction of the costs; the current approach to government\
    \ disaster relief for marine climate shocks will not work in the future; California\
    \ Dungeness crab landings for the 2015\u201316 season reached only 52% of the\
    \ average catch, with a total value lost estimated at US$97.5 million; fisheries\
    \ in Puerto Rico were devastated by Hurricane Maria; commercial landings fell\
    \ by 20%; economic losses estimated at US$17.8 million; damaged fishing capital\
    \ accounted for 51% of the losses and forgone fishing revenue the remaining 49%;\
    \ the inefficiency and delay in federal emergency funding failed to reduce the\
    \ vulnerability; Marine insurance potentially provides an alternative mechanism\
    \ to reduce the vulnerability; marine disasters could be prepared for pro-actively\
    \ through insurance; financial support is maintained and the efficiency of the\
    \ two programmes; government relief can take a long time to materialize; financial\
    \ payouts from private insurance sources have the potential to be much timelier;\
    \ key differences between the two approaches are the scale at which financial\
    \ support is maintained and the efficiency."
  5: Source material here.
  6: "\nOne limitation is that observations of ocean properties such as temperature,\
    \ oxygen levels, and nutrient availability, and importantly, the climate shock\
    \ events themselves are simply not available for long enough periods and for all\
    \ locations. Teleconnections between spatially distant parts of the ocean and\
    \ the role of the atmosphere in driving these events are complex (Okamoto et al.\
    \ 2020), and it remains an active area of research to make accurate forecasts\
    \ of these events weeks to months ahead at spatial scales relevant to blue food\
    \ production from fisheries and aquaculture (Hobday et al., 2018 ). Insurance\
    \ solutions for fisheries and aquaculture that minimize the risk posed by marine\
    \ climate shocks could take many forms, including indemnity insurance and parametric\
    \ insurance. Indemnity insurance is the most common form of insurance... We argue\
    \ that it is only in marine regions where sustainable fisheries management exists\
    \ that insurance can be deployed to effectively achieve both economic and environmental\
    \ wins. In and around these issues specific to marine systems, insurance itself\
    \ has several core challenges, specifically moral hazard and adverse selection\
    \ (Mills, 2005; M\xFCller et al., 2017; see the Table 1 for a description of the\
    \ major terms used in financial risk management). The reduction or cessation of\
    \ fishing because of a climate shock may actually improve ecosystem health for\
    \ a short period of time (perhaps similarly to the 2020 pandemic; Bennett et al.,\
    \ 2020), however the chronic issues of overcapitalization and poor management\
    \ will persist.\n"
  7: The page discusses the contentious nature and costs involved in loss verification
    for indemnity insurance and the challenges with basis risk in parametric insurance,
    which affects its uptake in blue-food sectors. It notes that "Errors in the index-loss
    relationship can lead to situations where a payout is made because the environmental
    index was triggered but no losses occurred." This highlights the challenges with
    parametric insurance. The text also mentions, "Insurance cooperatives and mutual
    fund associations have several attractive aspects. First, as a cooperative, social
    norms can help manage issues relating to moral hazard and adverse selection."
    This underlines the benefits of cooperative risk-sharing mechanisms. Regarding
    future improvements, it states, "However, as fisheries and aquaculture productivity
    datasets and ocean observations grow, coupled with technology advances such as
    machine learning in environmental prediction... these index-loss relationships
    can be refined."
  8: 'Source material: "Marine tourism and recreational fisheries are also important
    alternative or main livelihoods for people in coastal communities, and they also
    rely on access to healthy and abundant marine species and habitats. Disruption
    of tourist activities such as diving, fishing, whale watching, and visits to seabird
    and marine mammal colonies can occur because of marine extreme events. Coral bleaching
    because of marine heatwaves disrupted national (e.g. the Seychelles) and regional
    (e.g. the Great Barrier Reef) economies... Governments have a substantial role
    to play in promoting cooperative self-insurance among fishers and creating an
    environment conducive to private solutions for managing marine climate shocks...Protecting
    the base of blue food supply chains using insurance designed for climate shocks
    will help increase the resilience of entire blue food supply chains, and hence
    the coastal communities more broadly defined, to climate change. Premium prices
    for indemnity or parametric insurance can be beyond what a potential purchaser
    could afford...Government subsidy can support communities proactively by paying
    for (some fraction of) premiums or offering tax credits, for example, rather than
    through retrospective disaster relief say."'
  9: "Resilience Using Insurance 2465 insured individual or entity, and it is commonplace\
    \ in most have a cost in its premium. Economic research is required to better\
    \ understand whether a higher frequency and lower delay in payments from insurance,\
    \ which comes at a cost, would be more attractive than infrequent and very delayed\
    \ disaster relief that is free. One benefit of the government being the insurer\
    \ is its scale. Marine climate shocks are correlated over large spatial scales,\
    \ and as such whole regions may be im- pacted at the same time. This challenge\
    \ can deplete the capital reserves of the insurer unless there is reinsurance.\
    \ Reinsurance is insurance for the insurer, and just like in agricultural insur-\
    \ ance around the world, reinsurance will have to play a central role in the development\
    \ and implementation of marine climate shock insurance. Implementation: from concept\
    \ to creation Given the current lack of insurance options to reduce risk from\
    \ extreme marine climate events, what is the pathway to implementation? We suggest\
    \ that several stages are likely re- quired before the goal is achieved\u2014\
    to improve the sustain- ability of the environment and the resource users (Figure\
    \ 2). The first stage is to provide insurance design concepts that would reduce\
    \ sensitivity, enhance adaptive capacity via risk management, and raise industry\
    \ awareness of these risk-based instruments. Demonstration opportunities can occur\
    \ in a sec- ond stage, perhaps taking advantage of pre-conditions, pol- icy windows,\
    \ or, at worst, clear evidence of threats or im- pacts such as an extreme climate\
    \ event. An increasing fre- quency of shocks such as repeated marine heatwaves\
    \ may provide additional impetus, and existing coping mechanisms for single shocks\
    \ may be overwhelmed. Preconditions may re- sult from recent technical advances,\
    \ including decentralized finance (DeFi) such as block chain and/or Web 3 (Sheth\
    \ and Subramanian 2019), or advances in the forecasting of extreme events. Social\
    \ characteristics of a region can also help, such as leadership and influence,\
    \ or an acceptability around climate change (vs. a culture of denial; Figure 2).\
    \ These demonstra- tions will require willing and interested users/purchasers\
    \ of insurance (e.g., fishers) or external support for a pilot project. Stage\
    \ 3 is to access or build an enabling pool of capital to support ongoing insurance\
    \ access. This might be provided by traditional insurance operators or by new\
    \ underwriters, such as NGOs or philanthropic organizations. Indeed, the role\
    \ of governments (e.g., as in the case of the Caribbean Catastro- phe Risk Insurance\
    \ Facility) and international agencies like the World Bank will be important here.\
    \ So too for reinsur- ance companies, who have already shown an interest in fi-\
    \ nancial risk management for the blue-foods sector (Swiss Re, 2017). Over time,\
    \ this will mature to a self-sustaining model that can adjust to changing conditions\
    \ and risk profiles via insurance premiums, as exists for terrestrial situations.\
    \ In the case that extreme events become too frequent to allow busi- ness to continue,\
    \ insurance premiums can also send a strong market signal that adaptation is required,\
    \ which may be more rapid than legislative reform or direction. These stages ulti-\
    \ mately result in reduced financial loss for resource users, such that both livelihoods\
    \ and environmental sustainability are im- proved. Insurance as a tool for sustainability\
