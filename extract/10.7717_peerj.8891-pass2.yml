  7: "A detailed review of the eddy covariance method, parameter values, data processing\
    \ codes and uncertainties for determination of NEE are not under study in this\
    \ work and have been reported in detail elsewhere. Uncertainties of up to 20%\
    \ of annual flux for a single NEE tower have been reported. NEE data for a single\
    \ tower for each site was accessed from online data sources and transformed into\
    \ tones carbon dioxide equivalent per acre per year (e.g., tCO2eq acre \u2212\
    1 yr\u22121). Simple addition of the values for each GHG for annual periods result\
    \ in a positive, negative or neutral GHG balance. Simple addition of the values\
    \ for each GHG for annual periods result in a positive, negative or neutral GHG\
    \ balance of \u223C1\u201310 km2 are used to extrapolate NEE to 100,000 acres\
    \ (40,469 hectares) to illustrate GHG balance. Extrapolated NEE values were combined\
    \ with carbon prices ranging from $5 to $36 tCO2eq to explore pre-tax revenue\
    \ scenarios including definition. The DMFCP process simplifies existing protocols\
    \ for forest carbon sequestration purposes only as single tower data for both\
    \ sites may not be representative of larger forest areas, discussed below. Standing\
    \ carbon inventory derived from biometric or remote sensing methods will be employed\
    \ to augment and cross-check project NEE data. The SoS and GMPs operate as an\
    \ integrated autonomous system to monitor, measure and transform GHG flux data\
    \ relative to local, regional and global reference materials for bulk and isotopic\
    \ composition, providing the basis for calculation of verified tradeable GHG financial\
    \ products that differentiate biogenic from anthropogenic net GHG fluxes."
  8: "Source material here.\nQuantitative material: 'Uncertainty for the corrected\
    \ AP 30-minute NEE data was reported as 0.20 \xB5 mol m \u22122 s\u22121 or 6.7%\
