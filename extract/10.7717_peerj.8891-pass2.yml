    value of offering a mix of products and pricing to maximize revenue''."

    '
  21: "Source material: 'The hypothetical financial structure and cases for pre-tax\
    \ revenue for landowners illustrate the potential impact of the DMFCP. Landowner\
    \ agreements and contracts could also specify options for aggregation of annual\
    \ data intervals to buffer extreme weather conditions(excluding catastrophic events\
    \ such as wildfire, multiyear drought, and hurricane). AP experienced the highest\
    \ NEE of the available record (\u221215.2 tCO2 acre\u22121 yr\u22121, 10.2 tC\
    \ ha \u22121 yr\u22121). The hypothetical financial structure and cases for pre-tax\
    \ revenue for landowners illustrate the potential impact of the DMFCP... Figure\
    \ 7 emphasizes the revenue potential of mixed forest carbon products incorporating\
    \ features of project biodiversity. Pre-tax revenue for mixed carbon products\
    \ and pricing is projected at up to $16,380,000 for the HF over the 24-year period.\
    \ The requirement for long term CO2 measurement cannot be understated for determination\
    \ of variance in annual changes of NEE and for creation of corresponding annual\
    \ forest carbon financial products resulting from NEE.'"
  22: "Source material here: Scale-up of eddy covariance flux tower data combined\
    \ with remote sensing data is under active study and directly relevant to developing\
    \ approaches for the SoS...SoS architecture and sensor placement details will\
    \ vary for each project addressing sources of uncertainty established by initial\
    \ survey and temporary placement of SoS platforms for evaluation. In addition,\
    \ the use of open source eddy covariance processing software such as ONEFlux (https://ameriflux.lbl.gov/data/download-data-oneflux-beta/;\
    \ seeSupplemental Information 1, Eddy Covariance) and commercial software (e.g.,\
    \ https://www.licor.com/env/products/eddy_covariance/software.html), applied uniformly\
    \ acrosstheSoSwouldharmonizedatatreatmentincludinguncertaintiesforCO2 and CH4\
    \ flux. Accepting NEE uncertainties (e.g., \u2018Methods\u2019 section), we argue\
    \ that the approach is a game-changerforcreationandverificationofforestcarbonfinancialproductscomparedto\
    \ estimationandmodelsimulation-basedprotocols. The anomalously low NEE for HF\
    \ year 2010 (\u22120.53 tCO2eq), associated with drought demonstrates the requirement\
    \ for ecosystem respiration measurement for NEE."
  23: "Source material: \"In addition to potential revenue for landowners, the DMFCP\
    \ simplifies the forest carbon protocol process compared to traditional approaches...\
    \ A summary of DMFCP protocol features and benefits to landowners is provided\
    \ in Table 1, with reference to Figs. 1 and 2. ...the insuperable differences\
    \ between direct measurement of CO2 versus the use of proxies (i.e., CO2 is not\
    \ directly observed at any time in the estimation protocol process)... Traditional\
    \ protocols (e.g., CARB, CAR, ACR, VERRA, CDM) require lengthy periods (e.g.,\
    \ 2\u20135 years) of fee-based project certification... In contrast, the DMFCP\
    \ process can provide an upfront payment and annualized payment... the DMFCP embodied\
    \ in the SoSandGMP obviates three features intrinsic to traditional protocols\
    \ including elimination of baseline estimation (#11), tests for additionality\
    \ (#12), and a multiyear invalidation period (#13) linked to compliance testing\
    \ and third-party verification (#14). Direct measurement establishes forest carbon\
    \ flux as either negative (e.g., CO2 sequestration), positive (e.g., CO2 efflux),\
    \ or zero (sequestration balances efflux)... the DMFCP results in near-real time\
    \ (30-minute average of 10 Hz measurements) NEE time series and trends... establishing\
    \ simple numerical additionality (Fig. 2B) rules for established private and public\
    \ lands...\""
  24: 'Source material here.

    The DMFCP employs a real-time wireless reporting and verification concept...with
    validation authority (#13). In contrast, third-party validation for CAR projects,
    for example, is based on desk and paper review of unobserved CO2 (e.g., proxies)...

    Once a project is in operation, a switch from carbon negative to carbon positive
    ecosystem function is key to project management...Traditional forest carbon protocols
    do not appear capable of determining when a forest project switches to net positive
    emissions...

    The DMFCP employs ton-year accounting, an IPCC recognized method that does not
    impose an artificial time horizon for tree growth...rapid set-up of the SoS direct
    measurement platform...

    Items 1 to 17 for existing protocols address two key factors favoring deforestation
    engagement: transaction requirements and liquidity...business development of forest
    carbon projects, as practiced according to traditional protocols, is overly cumbersome
    and lengthy...

    In addition, with the use of satellite imagery, illegal and non-conforming deforestation
    can be detected in near real-time...

    '
  25: Source material here. Traditionalforestcarbon protocols ( Kollmuss&Fussler,2015
    ) were developed for singular application to forests, incorporatingmethodologyemployedfortimbermanagementandprimarilyrestrictedto
    capturing above ground carbon. As a result, algorithms developed for forest CO
    2 are not readily applicable to other GHG species and diverse biospheric landscapes.
    Based on the comparisons, the insuperable shortcomings of traditional protocols
    do not provide data thatcontributetotheevolvingscienceofforestcarbonsequestration,climatechangestudies
    andrelatedmodeldevelopmentthatarewellestablishedinthegrowingNEEmethodology (Baldocchi,2019
    ). Climate change impacts on forest carbon storage are not included in project
    risk for estimation based protocols ( CaliforniaAirResourcesBoard,2015b ) even
    though soil carbon efflux over the 100-year required period is likely to respond
    to global warmingandchangesinprecipitation( Amundson&Biardeau,2018 ;Bond-Lambertyetal.,
    2018 ;Schlesinger&Amundson,2018 ). The estimation approach remains embedded in
    the United Nations Framework Convention on Climate Change (UNFCCC) ( UNFCCC, 2013
    ) that promulgated reporting of emissions based on estimation, rather than direct
    measurement,anapproachconstrainingadvancementofcarboncredittrading.According to
    the UNFCCC approach, estimates of greenhouse gas emissions are inventoried and
    multiplied by an emission factor to yield a national emission rate for each source
    and each greenhouse gas ( Cheewaphongphanetal.,2019 ; VanVuurenetal.,2009 )....
    The resulting estimation for national emission inventories, used by vendors and
    policy platforms (e.g., REDD+), are widely acknowledged as flawed and inaccurate
    ( Jonasetal.,2019 ; Pacalaetal.,2010 ).
