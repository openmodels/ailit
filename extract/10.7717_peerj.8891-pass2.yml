sourcematerial:
  1: "Source material: Forest carbon sequestration offsets are methodologically uncertain,\
    \ comprise a minor component of carbon markets, and do not effectively slow deforestation.\
    \ The objective of this study is to describe a commercial scale in situ measurement\
    \ approach for determination of net forest carbon sequestration projects, the\
    \ Direct Measurement Forest Carbon Protocol, to address forest carbon market uncertainties.\
    \ In contrast to protocols that rely on limited forest mensuration, growth simulation,\
    \ and exclusion of CO2 data, the Direct Measurement Forest Carbon Protocol is\
    \ based on standardized methods for direct determination of net ecosystem exchange\
    \ (NEE) of CO2 employing eddy covariance, a meteorological approach integrating\
    \ forest carbon fluxes. NEE is used here as the basis for quantifying the first\
    \ of its kind carbon financial products. The DMFCP differentiates physical, project\
    \ and financial carbon within a System-of-Systems (SoS) network architecture.\
    \ SoS sensor nodes, the Global Monitoring Platform, housing analyzers for CO2\
    \ isotopologues (e.g., 12CO2, 13CO2, 14CO2) and greenhouse gases are deployed\
    \ across the project landscape. The SoS standardizes and automates GMP measurement,\
    \ uncertainty and reporting functions creating diverse forest carbon portfolios\
    \ while reducing cost and investment risk in alignment with modern portfolio theory.\
    \ To illustrate SoS field deployment and operation, published annual NEE data\
    \ for a tropical (Ankasa Park, Ghana, Africa) and a deciduous forest (Harvard\
    \ Forest, Petersham, MA, USA) are used to forecast carbon revenue. Carbon pricing\
    \ scenarios are combined with historical in situ NEE annual time-series to extrapolate\
    \ pre-tax revenue for each project applied to 100,000 acres (40,469 hectares)\
    \ of surrounding land. Based on carbon pricing of $5 to $362 per ton CO2 equivalent\
    \ (tCO2eq) and observed NEE sequestration rates of 0.48 to 15.60 tCO2eq acre\u2212\
    1 yr\u22121, pre-tax cash flows ranging from $230,000 to $16,380,000 across project\
    \ time-series are calculated, up to 5\xD7 revenue for contemporary voluntary offsets,\
    \ demonstrating new economic incentives to reverse deforestation. The SoS concept\
    \ of operation and architecture, with engineering development, can be extended\
    \ to diverse gas species across terrestrial, aquatic, and oceanic ecosystems,\
    \ harmonizing voluntary and compliance market products worldwide to assist in\
    \ the management of global warming. The Direct Measurement Forest Carbon Protocol\
    \ reduces risk of methodologically uncertain offsets by providing direct, in situ\
    \ measurements.\""
  2: "yaml\nEvaluation overview: \"and as we argue here, uncertainty for forest carbon\
    \ sequestration( Dugumaetal., 2019 )....Multinational policy applications such\
    \ as the Paris Agreement and the United Nations Reducing Emissions from Deforestation\
    \ and Degradation, constrained by Kyoto Protocol era processes, will benefit from\
    \ NEE measurement avoiding unsupported claims of emission reduction, fraud, and\
    \ forest conservation policyfailure.\"\nDrivers of Risk: \"and as we argue here,\
    \ uncertainty for forest carbon sequestration...Invalidation risk for estimation\
    \ protocols stems from reliance on forest mensuration (e.g., timber survey) conducted\
    \ every 6 or 12 years\"\nQuantitative material: \"declining by \u223C72% from\
    \ 2011 to 2016 (Hamrick&Gallant,2017 ; MollyPeters-StanleyGonzalez&Yin,2013 ).\
    \ Discount pricing for forest carbon(e.g.,<$5tCO2eq 1,2017:<1$,2018)( Hamrick&Gallant,2018\
    \ ;Hamrick &Gallant,2017 ) results in limited ecological, social and economic\
    \ benefits of carbon trading to stakeholders due,in part,from risk of offset invalidation\
    \ intrinsic to estimation protocols.\"\nMethodology: \"Invalidation risk for estimation\
    \ protocols stems from reliance on forest mensuration (e.g., timber survey) conducted\
    \ every 6 or 12 years ( CaliforniaAirResourcesBoard,2015a ; Forest CarbonPartners,2013\
    \ ;Marlandetal.,2017 ) coupled with tree growth simulation models to infer annual\
    \ changes in net forest carbon offsets ( CaliforniaAirResourcesBoard, 2011 ;CaliforniaAirResourcesBoard,2014\
    \ ;CaliforniaAirResourcesBoard,2015b ;Climate\"\nHighlights: \"Estimation protocols\
    \ do not directly observe forest CO2 fluxes; terms for ecosystem photosynthesis\
    \ and respiration are absent unavoidably introducing uncertainty for annual net\
    \ forest carbon determination and monetization to carbon markets ( Dunlop, Winner&Smith,2019\
    \ ; Haya,2019 ; Marino,Mincheva&Doucett,2019 ). Invalidation risk for estimation\
    \ protocols stems from reliance on forest mensuration\"\n"
