    \ are available online from the Fluxnet (2015) quality-checked database (http://fluxnet.fluxdata.org/data/fluxnet2015-dataset/)\
    \ as annual NEE based on the gapfilled VUT_NEE_REF values (e.g., Wutzler et al.,\
    \ 2018). The NEE data are gap-filled, filtered and corrected for low friction\
    \ velocity periods that likely underestimate night time respiration (\u201CData\
    \ Processing\u2014Fluxdata, 2020a; ORNL DAAC, 0000; Nicolini, 2012).'\nHighlights:\
    \ 'The Ankasa Park (AP) eddy covariance tower (5\u25E617\u203200\u2032\u2032N\
    \ 2\u25E639\u203200\u2032\u2032W: GH-Ank) is located in a wet evergreen forest\
    \ in south-western Ghana (Fig. 3A) (Nicolini, 2012). The 62-meter-high AP tower\
