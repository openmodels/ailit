Methodology:
  1: The study uses the Direct Measurement Forest Carbon Protocol, employing eddy
    covariance to directly measure net ecosystem exchange of CO2, and projects carbon
    revenue using carbon pricing scenarios combined with historical NEE time-series
    data.
  2: The analysis uses forest mensuration (e.g., timber survey) conducted every 6
    or 12 years coupled with tree growth simulation models to infer annual changes
    in net forest carbon offsets.
  3: Linking direct measurement of net ecosystem exchange (NEE) of forest carbon fluxes
    with carbon market transactions in a Direct Measurement Forest Carbon Protocol
    (DMFCP).
  6: The methodology involves direct field measurement of NEE compared to a zero-emission
    baseline with regular annual accounting periods, third-party verification, and
    logging data in a registry.
  7: "NEE data from single towers is accessed online and transformed into tones carbon\
    \ dioxide equivalent per acre per year. Extrapolated NEE data (using footprints\
    \ of \u223C1\u201310 km2 to extrapolate NEE to 100,000 acres) is combined with\
    \ carbon prices to explore revenue scenarios. Standing carbon inventory derived\
    \ from biometric or remote sensing methods will be employed to augment and cross-check\
    \ project NEE data. A system monitors, measures, and transforms GHG flux data."
  8: NEE data used in this analysis are available online from the Fluxnet (2015) quality-checked
    database (http://fluxnet.fluxdata.org/data/fluxnet2015-dataset/) as annual NEE
    based on the gapfilled VUT_NEE_REF values. The NEE data are gap-filled, filtered
    and corrected for low friction velocity periods that likely underestimate night
    time respiration.
  11: The analysis is performed using the DMFCP (hardware and software components
    designed to function as an automated commercial field sensor network) to measure
    GHG fluxes and calculate verified tradeable GHG financial products. The time frame
    for the HF site is 24 years, and for the AP site it is 4 years.
  15: Protocols used require a 100-year permanence feature, but exit strategies are
    permitted with a high penalty.
  16: Up-scaling and harmonizing eddy covariance flux data with standardized protocols
    to address uncertainties in NEE data.
  17: Analysis of Net Ecosystem Exchange (NEE) time series data (1995-2014) at Harvard
    Forest and Ankasa Park, including calculation of annual NEE and cumulative NEE.
    Extrapolation of annual NEE across 100,000 acres to illustrate pre-tax cash flows.
  19: Continuous eddy covariance measurements are used to determine net ecosystem
    exchange (NEE) for forest carbon, providing standardized methods over estimation
    protocols.
  20: The analysis involves pooling portfolios of forest projects using near real-time
    NEE data and comparing financial returns across different carbon product scenarios.
  21: The paper uses hypothetical financial structures and cases for pre-tax revenue
    to illustrate the potential impact of the DMFCP. It projects revenue for mixed
    carbon products.
  22: It mentions the use of open source eddy covariance processing software like
    ONEFlux and commercial software to harmonize data treatment including uncertainties
    for CO2 and CH4 flux.
  23: The paper compares the features and benefits of the DMFCP with traditional protocols
    like CARB, CAR, ACR, VERRA, and CDM. It highlights differences in carbon accounting,
    payment structures, and time-to-revenue. The DMFCP uses direct measurement of
    CO2 to quantify NEE, while traditional methods use proxies.
  24: The paper contrasts DMFCP, which uses real-time wireless reporting and third-party
    inspection, with traditional protocols that rely on desk reviews of unobserved
    CO2 proxies.
  25: Describes how traditional protocols are limited by their singular application
    to forest CO2, not accounting for other GHG species or biospheric landscapes.
  26: The DMFCP comprises a commercial standardized measurement-to-monetization system
    for the determination of NEE, which enables the creation of verified forest carbon
    financial products.
