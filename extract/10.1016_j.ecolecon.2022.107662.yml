    \ First, we re-estimate Eq.(1) without inputs from SSA. Results from Row 6 are\
    \ quite similar in sign, significance, and size to the main estimates. Following,\
    \ we re-estimate the main equation with SSA dataset only and found broadly analogous\
    \ results, albeit with larger magnitudes than the baseline estimates as shown\
    \ in Row 7. Both results indicate that while the impact of weather changes on\
    \ SSA is huge, excluding the region does not cancel the general trend. Hence,\
    \ our results are robust to the inclusion or exclusion of the region. Although,\
    \ there is a marginal drop in the size of the estimates for temperature effect,\
    \ which is not unexpected since some observations (8% of the original data points)\
    \ were lost in the process of balancing the panel data. The effect of precipitation\
    \ changes, however, remains very stable. Summarily, the results from the various\
    \ sensitivity tests show that our baseline estimates that measure the impact of\
    \ annual weather fluctuations on beef production are robust. Therefore, large\
    \ deviations from the main estimates are unexpected. 4.3.1. Crop production Weather\
    \ fluctuations may influence beef output if they affect crop production via changes\
    \ in the quantity and quality of feed available for cattle. Although this impact\
    \ is more substantial in hot countries. Specifically, a 1 \u25E6C increase in\
    \ temperature is associated with a 3.7% drop in cereal yields. The impact is about\
    \ 3.4 percentage points higher in tropical countries."
