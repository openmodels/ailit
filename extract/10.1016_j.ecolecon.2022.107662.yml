  3: 'Source material here: This paper sheds more light on the effects of weather
    shocks on livestock... to identify the causal effects of weather variables, such
    as temperature and precipitation, on several economic outcomes, including agricultural
    output... Our results show a robust negative effect of temperature changes on
    global livestock production and a positive impact of rainfall fluctuations. We
    offer further evidence that the effect of temperature is more concentrated in
    hot, poor, and agricultural-dependent countries. Also, we find that climate change
    will reduce animal output by a further 20% in the mid-century and an additional
    40% by the end of the century... This paper achieves this objective using a panel
    of national livestock production and local weather fluctuations from 187 countries.
    Empirically, we address some specific shortcomings in previous literature with
    respect to methodology, data, temporal and spatial scale... Panel data models
    exploit the exogeneity of cross-time variations in weather to identify the causal
    effects of weather variables... Our results show a robust negative effect of temperature
    changes on global livestock production... We offer further evidence that the effect
    of temperature is more concentrated in hot, poor, and agricultural-dependent countries.
    Also, while the benefits of rainfall in the tropical regions moderate temperature-caused
    adverse effects, these adverse effects are further aggravated by rainfall in the
    temperate regions.'
