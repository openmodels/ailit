  22: "Source material here: Given the influence of surface melt and runoff on projected\
    \ mass loss, we assess the accuracy of our PDD-based melt-and-runoff scheme by\
    \ comparing our projections of surface runoff with outputs from both regional\
    \ (MAR; Kittel et al., 2021) and general (CESM2-WACCM; Dunmire et al., 2022) polar-oriented\
    \ climate models under an SSP5-8.5 scenario (Figure 7). However, recent studies\
    \ suggest that the input of freshwater from ice shelves in the ocean is also likely\
    \ to modify ocean conditions and may create a positive feedback loop by stratifying\
    \ the water column and trapping warm water below the sea surface. Notably, our\
    \ results support the findings from Kittel et al. (2021), suggesting the existence\
    \ of a threshold at +7.5\u25E6C in near-surface warming over Antarctica (which\
    \ may already be reached by the end of this century under SSP5-8.5; Figure S6).\
    \ This threshold results in reduced SMB for the grounded ice sheet due to a significant\
    \ increase in surface runoff. Notably, several simulations in our ensemble display\
    \ a partial collapse of the Larsen and George VI ice shelves by 2100 (Figure 7a),\
    \ which contributes to the lower median total runoff rates reproduced by the calibrated\
    \ ensemble as compared with MAR in the last decades of the 21st century. This\
    \ discrepancy may be attributed to the omission of the melt-albedo feedback (Zeitz\
    \ et al., 2021) in the PDD approach and the coarse spatial resolution of the GCMs\
    \ used for the climate forcing, which could contribute to the underestimation\
    \ of the runoff rates over the ice shelves."
