  33: "The page describes various estimates and uncertainties of changes in Antarctic\
    \ net mass balance, sub-shelf melt, iceberg calving, and surface mass balance\
    \ over past decades from recent satellite-based and modelling studies. This is\
    \ showcased in Table D1 with contributors including Otosaka et al., Rignot et\
    \ al., Bamber et al., Shepherd et al., Mart\xEDn-Espa\xF1ol et al., Depoorter\
    \ et al., Adusumilli et al., Liu et al., Mottram et al., and Lenaerts et al. It\
    \ includes values expressed in gigatonnes per year (Gtyr \u2212 1), such as the\
    \ net mass balance from Otosaka et al. (2023) during 1992-1996 as -70 Gtyr \u2212\
    \ 1 with an uncertainty of 40 Gtyr \u2212 1, highlighting past changes and demonstrating\
    \ quantitative results through defined periods with specific associated uncertainties.\
    \ The approach involves qualitative assessments using this data to evaluate the\
    \ behavior of calibrated ensemble models over historical periods. This context\
    \ provides necessary information for understanding the observed net changes and\
    \ loss from Antarctic ice, such as the significant increase in net mass loss as\
    \ seen from 2007-2011 in Otosaka et al. (2023) with -130 Gtyr \u2212 1."
