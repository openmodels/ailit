  25: "Althoughcalibrationprovidesmorerobustnesstoprojections,itisimportanttorecognizethatexploringadditionalsourcesof\
    \ uncertaintiesthathavenotbeenassessedherewilllikelyalterandbroadenthedistributionsoftheprojectionspresentedinthis\
    \ study(Edwardsetal.,2021).Similarly,alternativechoicesforthemagnitudeofthestructuralerror(andthereforediscrepancy\
    \ variance; see section 2.2) would also influence our calibrated projections.\
    \ As an illustration, estimating the structural error by multiplying the observational\
    \ error using a factor of 8 or 12 instead of 10 would change the main projection\
    \ 5\u201395% intervals by around \xB1   5% (Table S1). The sensitivity of the\
    \ posterior distribution of the Antarctic sea-level contribution at various discrepancy\
    \ variances is shown in Figure S11. We produced observationally-calibrated projections\
    \ of the evolution of the Antarctic ice sheet until the end of the millennium.\
    \ These projections are based on an ensemble of simulations that accounts for\
    \ nine key uncertainties in ice\u2013ocean\u2013atmosphere interactions. Our results\
    \ suggest that the ocean will be the primary driver of short-term mass loss, driving\
    \ ice loss in the West Antarctic ice sheet already in the 21st century. Under\
    \ a very high-emission scenario, we find that both the ocean and the atmosphere,whenconsideredindependently,havethepotentialtoleadtoacompletecollapseofWestAntarcticabytheendof\
    \ themillennium.However,thecombinedeffectsofice\u2013oceanandice\u2013atmosphereinteractionswilllikelycauseWAIScollapse\
    \ to occur earlier: initially triggered by the oceanic forcing, mass loss is then\
    \ further accelerated by the melt-elevation feedback as near-surface warming increases.\
    \ While the EAIS will, at first, experience mass gain due to increased snow accumulation,\
    \ ocean-driven mass loss will take over as of the beginning of the next century\
    \ under a very high-emission pathway, as the mitigatingroleofSMBdecreases.ThedecreaseinSMBisassociatedwithastrongincreaseinsurfacerunoffwithwarmingair\
    \ temperatures, a signal significantly amplified by the melt-elevation feedback.\
    \ More generally, this decrease in SMB seems to startwhenAntarcticnear-surfacewarmingexceeds+7.5\xB0\
    C,thethresholdatwhichtheincreaseinsurfacerunoffoutweighsthe increase in snow accumulation.\
    \ Reaching such a threshold may therefore be delayed under more sustainable socio-economic\
    \ pathways. If this threshold is not crossed, i.e., under the socio-economic pathway\
    \ SSP1-2.6, Antarctic mass loss would likely remain limited to the Amundsen Sea\
    \ Embayment region, where present-day climate conditions seem sufficient to commit\
    \ to a continuous retreat of Thwaites Glacier. Overall, future Antarctic mass\
    \ changes will likely be characterised by a transition in the primary driver of\
    \ mass loss, shifting from an ocean-driven to an atmospheric-driven contribution\
    \ of the AIS to GMSLR. The timing of this transition will be dictated by the trajectories\
    \ of future atmospheric warming."
  26: "The Kori-ULB model is a vertically-integrated, thermomechanical, hybrid ice-sheet/ice-shelf\
    \ model that incorporates essential characteristics of ice-sheet thermomechanics\
    \ and ice-stream flow, such as the melt-elevation feedback, bedrock deformation,\
    \ sub-shelf melting, and calving... The ice flow is represented as a combination\
    \ of the shallow-ice (SIA) and shallow-shelf (SSA) approximations for grounded\
    \ ice while only the shallow-shelf approximation is applied for floating ice shelves...\
    \ In order to account for grounding-line migration, a flux condition (related\
    \ to the ice thickness at the grounding line) is imposed... Basal sliding is introduced\
    \ as a Weertman sliding law, i.e., vb = \u2212 A b|\u03C4b|m \u2212 1\u03C4b,\
    \ where \u03C4b is the basal shear stress, vb the basal velocity, A b the basal\
    \ sliding coefficient... Basal melting underneath the floating ice shelves may\
    \ be determined by different sub-shelf melt parameterisation schemes... Calving\
    \ at the ice front depends on the combined penetration depths of surface and basal\
    \ crevasses, relative to total ice thickness. ... Prescribed input data include\
    \ the present-day ice-sheet geometry and bedrock topography from the Bedmachine\
    \ dataset and the geothermal heat flux by Shapiro and Ritzwoller (2004). Present-day\
    \ mean near-surface air temperature and precipitation are obtained either from\
    \ van Wessem et al. (2018) ... or from Kittel et al. (2021)."
  27: "Source material: MARv3.11. Near-surface temperatures are corrected for elevation\
    \ changes using a vertical lapse rate (Pollard and DeConto, 2012a). Changes in\
    \ bedrock elevation due to changes in ice load are modelled by the commonly used\
    \ Elastic Lithosphere\u2013Relaxed Asthenosphere (ELRA) model where the solid-Earth\
    \ system is approximated by a thin elastic lithosphere plate lying upon a relaxing\
    \ viscous asthenosphere (Brotchie and Silvester, 1969; Le Meur and Huybrechts,\
    \ 1996). Ice-sheet initial conditions and basal sliding coefficients are provided\
    \ by an inverse simulation following Pollard and DeConto (2012b), using surface\
    \ mass balance forcing for the year 1950 (anomalies for the period 1945-1955 respective\
    \ to the period 1995-2014 derived from CMIP5 NorESM1-M are added to a present-day\
    \ climatology for the 1995-2014 period provided by an RCM). To limit an initial\
    \ shock caused by the transition from the balance sub-shelf melt rates derived\
    \ during the transient nudging spin-up to the imposed sub-shelf melt parameterisation\
    \ scheme, a short 10-yr relaxation is run after the model initialisation, before\
    \ the historical simulation, using constant atmospheric and oceanic forcings for\
    \ the year 1950 (i.e., applying the relevant atmospheric and oceanic present-day\
    \ climatologies adjusted with 1945-1955 anomalies derived from NorESM1-M). Our\
    \ initial states are therefore considered as quasi-equilibrated states. The two\
    \ initialised ice sheet configurations resulting from the nudging spin-ups are\
    \ within the range of the ISMIP6 models (Seroussi et al., 2019), and well-match\
    \ observations in terms of ice geometry, grounding-line position, and ice dynamics\
    \ (Figures S8 and S9). In comparison to other ISMIP6 models, the root mean square\
    \ error (RMSE) is within the range for both ice thickness (RMSE \u223C 50m) and\
    \ ice surface velocity (RMSE \u223C 100m yr\u22121). At the beginning of every\
    \ year, monthly near-surface air temperatures and precipitation rates are used\
    \ as inputs to a positive degree-day (PDD) algorithm that calculates the surface\
    \ mass balance at the ice surface by capturing the fundamental physical processes\
    \ of surface melting of ice and refreezing versus runoff in the snow column (Huybrechts\
    \ and de Wolde, 1999; Seguinot, 2013)."
