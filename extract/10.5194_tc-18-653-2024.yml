sourcematerial:
  1: "Source material here.\nWe use an observationally-calibrated ice-sheet model\
    \ to investigate the future trajectory of the Antarctic ice sheet related to uncertainties\
    \ in the future balance between sub-shelf melting and ice discharge on the one\
    \ hand, and the surface mass balance on the other. Our ensemble of simulations,\
    \ forced by a panel of CMIP6 climate models, suggests that the ocean will be the\
    \ primary driver of short-term Antarctic mass loss, initiating ice loss in West\
    \ Antarctica already during this century. The atmosphere initially plays a mitigating\
    \ role through increased snowfall, leading to an Antarctic contribution to global\
    \ mean sea-level rise by 2100 of 6 (-8 to 15) cm under a low-emissions scenario\
    \ and 5.5 (-10 to 16) cm under a very high-emissions scenario. However, under\
    \ the very high-emission pathway, the influence of the atmosphere shifts beyond\
    \ the end of the century, becoming an amplifying driver of mass loss as the ice\
    \ sheet\u2019s surface mass balance decreases. We show that this transition occurs\
    \ when Antarctic near-surface warming exceeds a critical threshold of +7.5\xB0\
    C, at which the increase in surface runoff outweighs the increase in snow accumulation,\
    \ a signal that is amplified by the melt\u2013elevation feedback. Therefore, under\
    \ the very high-emission scenario, oceanic and atmospheric drivers are projected\
    \ to result in a complete collapse of the West Antarctic ice sheet along with\
    \ significant grounding-line retreat in the marine basins of the East Antarctic\
    \ ice sheet, leading to a median global mean sea-level rise of 2.75 (6.95) m by\
    \ 2300 (3000). Under a more sustainable socio-economic pathway, we find that the\
    \ Antarctic ice sheet may still contribute to a median global mean sea-level rise\
    \ of 0.62 (1.85) m by 2300 (3000). However, the rate of sea-level rise is significantly\
    \ reduced as mass loss is likely to remain confined to the Amundsen Sea Embayment,\
    \ where present-day climate conditions seem sufficient to commit to a continuous\
    \ retreat of Thwaites Glacier.\n"
  2: The observed acceleration of Antarctic outlet glaciers [...] is concentrated
    in areas close to warm and salty circumpolar deep water (CDW), which induce strong
    sub-shelf melt rates. With rising atmospheric temperatures, future accumulation
    is expected to increase as a result of enhanced snowfall associated with higher
    saturated vapour pressure [...] while surface runoff is currently a relatively
    minor contributor to mass loss in Antarctica [...] it is likely to significantly
    compensate for mass gain through snowfall under very high-emission scenarios.
    Specifically, whether the ice sheet is going to gain or lose mass by the end of
    the century remains unclear, especially under very high-emission scenarios. This
    uncertainty may notably be explained by the remaining unknowns in the long-term
    impacts of competing processes expected to increase in a warming climate (i.e.,
    ocean-induced sub-shelf melt, snow accumulation, and surface runoff) and their
    modulation of the future trajectory of the Antarctic ice sheet.
  3: Source material here.
  4: " \nThe analysis uses positive degree-day (PDD) schemes for calculating surface\
    \ melt (Line 91).\n\nSimple thermodynamic parameterization is used for refreezing\
    \ processes (Line 92).\n\nPhysically-based parameterizations for sub-shelf processes\
    \ to model the ice sheet dynamics are discussed (Line 98).\n\nThe study uses inverse\
    \ simulation to provide initial ice-sheet conditions (Line 102). \n\nHindcasts\
    \ AIS behavior from 1950-2014 using CMIP5 climate model NorESM1-M (Lines 105-107).\n\
    \nProjects future changes using a subset of CMIP6 models under SSP 5-8.5 and SSP\
    \ 1-2.6 scenarios until the year 2300 (Lines 107-109).\n\nClimate forcing is implemented\
    \ using anomalies based on 1995-2014 mean, with atmospheric forcing in the form\
    \ of temperature, sublimation anomalies, and precipitation ratios (Lines 116-118).\n\
    \nOceanic forcing is implemented as temperature and salinity anomalies (Line 120).\n\
    \nGaps in oceanic forcing data on the continental shelf are filled following Kreuzer\
    \ et al. (2021), utilizing anomalies added to reference climatologies for the\
    \ ice-sheet model (Line 120-125).\n\nChanges in atmospheric and oceanic properties\
    \ derived from climate model scenarios impact outcomes on ice sheet responses\
    \ (Lines 109-115).\n\nThe impact of dynamic ice-sheet topography on surface mass\
    \ balance is discussed through changes in precipitation, evaporation, and runoff\
    \ (Lines 95-96).\n"
