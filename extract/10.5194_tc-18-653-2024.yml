Methodology:
  1: Observationally-calibrated ice-sheet model, forced by a panel of CMIP6 climate
    models. Analysis extends to 2300 and 3000 for sea-level rise projections.
  3: "The analysis is performed using the Kori-ULB ice-sheet model, an ensemble of\
    \ simulations accounting for ice\u2013ocean and ice\u2013atmosphere interactions,\
    \ with Bayesian calibration based on past mass balance estimates."
  4: Gaps in oceanic forcing data on the continental shelf are filled using a methodology
    following Kreuzer et al. (2021), utilizing anomalies added to reference climatologies
    for the ice-sheet model.
  5: "A perturbed parameter ensemble including nine key parameters governing processes\
    \ at the ice\u2013ocean\u2013atmosphere boundary is designed. Latin hypercube\
    \ sampling is used to create 100 distinct parameter vectors. The ensemble includes\
    \ discrete inputs (initial state and climate forcing uncertainties) and continuous\
    \ parameters (ice\u2013atmosphere and ice\u2013ocean interactions). Historical\
    \ hindcast simulations (1950-2014) are performed, and the 100-member ensemble\
    \ is applied for both socio-economic pathways and under constant present-day climate\
    \ conditions. Additional projections were produced under SSP5-8.5."
  6: Structural error is estimated by multiplying the observational error by a factor
    of 10.
  7: Parameters of ice-ocean and ice-atmosphere interactions are analyzed using uncertainty
    analysis with Latin hypercube sampling values.
  8: The analysis uses a Bayesian calibration of an ensemble with observational constraints
    from the IMBIE project, focusing on historical trends in the Antarctic ice sheet's
    mass change and its drivers.
  9: The analysis uses a 100-member ensemble of simulations produced with Latin hypercube
    sampling; Bayesian calibration is applied to the simulations.
  11: The analysis involves a Bayesian calibrated ensemble with 100 simulations per
    SSP scenario, focusing on ice sheet grounding probabilities and sea-level rise
    contributions.
  12: The analysis uses a calibrated probabilistic projection for the Antarctic ice
    sheet mass balance under SSP1-2.6 and SSP5-8.5 scenarios, examining changes until
    2300.
  13: Calibrated projections for SSP5-8.5 isolating different components of the climate
    forcing, 100-member ensembles. Applies to 21st-23rd centuries.
  14: The analysis is performed using a 100-member ensemble experiment to separate
    influences of different drivers on sea-level changes.
  15: The analysis uses a Bayesian calibrated mean of a 100-member ensemble for specific
    experiments focusing on both oceanic and atmospheric drivers, as well as separately
    and with specific conditions.
  16: Various scenarios are considered including oceanic and atmospheric forcings
    separately and together, with and without the melt-elevation feedback; results
    are projected throughout the 21st century and beyond.
  17: The analysis uses a calibrated ensemble under SSP5-8.5, including projections
    with and without ice shelf collapse via hydrofracturing.
  18: Calibrated probabilistic projections using Bayesian methods, analyzed under
    SSP1-2.6 and SSP5-8.5 scenarios with comparison to CMIP6 GCM data.
  19: The analysis involves examining surface mass balance and its components in relation
    to regional near-surface warming using ensemble climate model projections.
  20: Projections are observationally-calibrated, considering key uncertainties in
    ice-climate interactions.
  21: The analysis involves simulations with an ice sheet model initialized to match
    observations, comparing against spatially aggregated historical estimates and
    exploring future changes under different emission scenarios.
  22: The analysis includes PDD-based melt-and-runoff projections compared against
    outputs from regional and general polar-oriented climate models under SSP5-8.5
    scenario.
  24: Relatively coarse spatial resolution of 16 km is used, which may overlook smaller
    bedrock irregularities and pinning points.
  25: The analysis uses observationally-calibrated projections based on simulations
    considering nine key uncertainties in ice-ocean-atmosphere interactions, with
    an examination of structural error impacts.
  26: The Kori-ULB model is a vertically-integrated, thermomechanical, hybrid ice-sheet/ice-shelf
    model using shallow-ice (SIA) and shallow-shelf (SSA) approximations for grounded
    ice and only SSA for floating ice shelves. It uses a flux condition at the grounding
    line and a Weertman sliding law for basal sliding. Sub-shelf melt is parameterized,
    and calving depends on crevasse depths. Prescribed inputs include ice-sheet geometry,
    bedrock topography, geothermal heat flux, near-surface air temperature, and precipitation.
  27: The positive degree-day (PDD) algorithm calculates surface mass balance based
    on near-surface air temperatures and precipitation.
  28: The PICO model is used for sub-shelf melt parameterization, simulating buoyancy-driven
    ocean water movement and melt rates based on temperatures and salinity transformations.
  29: The division into boxes for each ice shelf follows the approach of Reese et
    al. (2018a).
  32: The study uses the Kori-ULB ice-sheet model to simulate Antarctic mass balance.
    The specific model version, simulation outputs, and scripts are hosted on Zenodo
    (https://doi.org/10.5281/zenodo.8398772). The CMIP6 forcing data are accessible
    through the CMIP6 search interface (https://esgf-node.llnl.gov/search/cmip6/).
    MAR outputs are available on Zenodo (https://doi.org/10.5281/zenodo.4459259).
  33: The analysis on this page leverages satellite-based and modeling studies to
    assess past changes in Antarctic mass balances.
