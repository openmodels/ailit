Highlights:
  1: "Ocean will be the primary driver of short-term Antarctic mass loss, initiating\
    \ ice loss in West Antarctica already during this century. Atmosphere initially\
    \ plays a mitigating role through increased snowfall. Under the very high-emission\
    \ pathway, the influence of the atmosphere shifts beyond the end of the century,\
    \ becoming an amplifying driver of mass loss as the ice sheet\u2019s surface mass\
    \ balance decreases. Antarctic near-surface warming exceeds a critical threshold\
    \ of +7.5\xB0C, at which the increase in surface runoff outweighs the increase\
    \ in snow accumulation."
  2: The paper highlights competing processes impacting the Antarctic Ice Sheet, like
    ocean-induced sub-shelf melt, snow accumulation, and surface runoff.
  3: Calibrated projections extend to the end of the millennium using atmospheric
    and oceanic projections from CMIP6 under low and very high emission scenarios.
  5: The paper designs a parameter space in order for parameter ranges to be as wide
    as physically plausible to explore the uncertainty in ice-ocean and ice-atmosphere
    interactions
  7: No relevant information
  8: The calibrated ensemble reproduces historical ice-sheet mass change trends, effectively
    reducing model hindcast uncertainty and identifying rapid ice mass loss in specific
    regions.
  9: "The analysis provides a comparison of historical Antarctic ice-sheet mass change\
    \ with observations and highlights key uncertainties in ice\u2013ocean and ice\u2013\
    atmosphere interactions."
  10: Key outcomes include the anticipated collapse of the West Antarctic ice sheet
    under SSP5-8.5 between 2300 and 2500, leading to significant differences in sea-level
    rise contributions between emission scenarios over the millennium.
  11: Antarctic ice sheet contribution to sea-level rise varies between scenarios,
    with specific areas seeing increased risk of ungrounding.
  12: Key highlights include projections of ice sheet mass balance components and
    their contributions to sea-level rise, differentiated by SSP scenarios and comparing
    WAIS and EAIS.
  13: Ocean-driven ice loss dominates WAIS changes, while East Antarctica gains mass
    due to increased SMB in the 21st century. Under SSP5-8.5, ice loss is primarily
    driven by ocean melt until the end of the century, then by a decrease in SMB,
    and finally by surface mass balance during the 23rd century.
  16: Oceanic forcing alone can trigger significant mass loss from West and East Antarctica;
    melt-elevation feedback accelerates WAIS collapse; atmospheric forcing initially
    leads to mass gain but eventually contributes to sea-level rise by the end of
    the millennium.
  17: Oceanic forcing initially mitigated by enhanced snowfall; eventually, atmosphere
    amplifies mass loss. Hydrofracturing significantly accelerates grounding-line
    retreat and increases calving fluxes.
  18: Evolution and sensitivity of Antarctic surface mass balance to near-surface
    warming and its impact on mass gains and losses.
  19: "Antarctic surface mass balance decreases with warming above +7.5\xB0C, negatively\
    \ impacting ice shelf buttressing through enhanced surface runoff and hydrofracturing."
  20: West Antarctica is projected to experience more severe ice loss than East Antarctica
    under unabated warming.
  21: By the end of the century, surface mass balance over grounded ice increases
    due to stronger snowfall under SSP5-8.5, while strong runoff fluxes decrease it
    over ice shelves. There is a predicted transition from ocean-driven to atmospheric-driven
    Antarctic mass loss over the coming centuries.
  22: Under the SSP5-8.5 scenario, several simulations indicate partial collapse of
    Larsen and George VI ice shelves by 2100.
  24: Uncertainties exist due to single model reliance, incomplete model physics,
    and numerical method choices.
  25: Important outcomes indicate the ocean as the primary driver of short-term mass
    loss, and a potential transition from ocean-driven to atmospheric-driven mass
    loss.
