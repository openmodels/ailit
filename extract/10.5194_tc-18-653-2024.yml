Drivers of Risk:
  1: Sub-shelf melting, ice discharge, surface mass balance, ocean temperature, atmospheric
    temperature, snowfall, surface runoff, melt-elevation feedback.
  2: Surface runoff and enhanced snowfall under high-emission scenarios could affect
    Antarctic Ice Sheet mass balance.
  3: Future Antarctic mass loss uncertainty is driven by unknowns in the impacts of
    basal melting and changes in SMB.
  4: Changes in atmospheric and oceanic properties derived from climate model scenarios
    impact outcomes on ice sheet responses.
  5: "Uncertainty in the representation of present-day Antarctic climate (SMB and\
    \ air temperature), uncertainty in ocean present-day temperature and salinity\
    \ fields, uncertainty in imposed climate forcing (using a subset of CMIP6 climate\
    \ models), melt-elevation feedback, surface melt and runoff, ice\u2013ocean interactions\
    \ (i.e., sub-shelf melting), and the effective ice\u2013ocean heat flux."
  6: The analysis considers the impact of atmospheric and oceanic forcings and surface
    melt-driven hydrofracturing of ice shelves.
  7: No relevant information
  8: Substantial ice-shelf thinning and rapid grounded-ice mass losses are linked
    to increased sub-shelf melting, especially in areas like the Amundsen Sea Sector
    and Thwaites Glacier.
  9: Factors such as surface mass balance, sub-shelf melt fluxes, and dynamic ice
    loss (calving fluxes) are evaluated as drivers of sea-level rise.
  10: The projected increase in Antarctic ice mass loss is driven by the retreat of
    Thwaites Glacier, the Amundsen Sea Embayment, and the onset of grounding-line
    retreat in the Siple Coast and East Antarctic marine basins under high emission
    scenarios.
  11: Changes in ice grounding and surface mass balance of Antarctica under climate
    scenarios SSP1-2.6 and SSP5-8.5.
  12: Shocks impacting the Antarctic ice sheet mass balance include sub-shelf melt
    and calving under different SSP scenarios.
  13: Sub-shelf melt, snow accumulation, surface runoff, calving fluxes.
  14: The influences of oceanic and atmospheric forcings, melt-elevation feedback,
    and ice-shelf hydrofracturing on Antarctic contributions to GMSLR are assessed.
  15: The analysis investigates the contributions of oceanic and atmospheric forcing
    to projected Antarctic mass changes under a very high-emission pathway.
  16: The key drivers impacting the outcomes are oceanic forcing and atmospheric forcing,
    with oceanic forcing identified as the primary driver of Antarctic mass loss during
    the 21st century.
  17: Oceanic forcing and the melt-elevation feedback are primary drivers of Antarctic
    mass loss. Hydrofracturing of ice shelves further exacerbates mass loss.
  18: Factors impacting the Antarctic surface mass balance include near-surface warming
    and changes in snow accumulation, surface meltwater production, runoff, and rainfall.
  19: Increases in surface runoff, surface melt, rainfall, and near-surface warming
    in Antarctica contribute to changes in surface mass balance.
  20: Ocean-driven retreat of Thwaites Glacier triggered during historical period
    impacts ice loss.
  21: The drivers of risk include sub-shelf melt, calving, surface mass balance fluxes,
    atmospheric warming, and surface runoff.
  22: Shocks affecting outcomes include freshwater input from ice shelves modifying
    ocean conditions, potentially creating a positive feedback loop by stratifying
