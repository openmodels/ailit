  13: "Source material here.\nThe combined effects of changes in quantity and price\
    \ will impact other measures of well-being, including trade revenue, producer\u2019\
    s revenue, and consumer\u2019s food expenditure. The direction of these impacts,\
    \ and the extent to which climate change or trade perturbations impact regions\
    \ are dependent on whether regions are net importers or exporters and how the\
    \ yields of their major crops are expected to be affected by climate change. Net\
    \ trade revenue and producer revenue... The USA experiences a decrease in net\
    \ export revenue from cereals... resulting in a roughly 50% loss relative to RF.\
    \ In CC, trade revenue decreases for both cereal and non-cereal crops, but the\
    \ total loss, roughly 30%, is smaller than that in ID. The effects of the import\
    \ dependency constraint on USA producer revenue from cereals (-18%) are directionally\
    \ the same as trade revenue (-94%), though only one-fifth as large... Water consumption.\
    \ In the water sector, the distribution of irrigation water consumption changes\
    \ significantly, decreasing roughly 8% in the USA and increasing 21% in the Middle\
    \ East due to the impact of cereal import dependency constraints.\n"
  14: 'Source material here.

    - "Additionally, in the Middle East, the changes in irrigation water consumption
    in CC is much smaller than in ID, as international trade is able to mitigate some
    of the negative impacts on crop yields from climate change."

    - "In the USA, the increase in irrigation water for non-cereal crops in CC is
    much larger in magnitude than the decrease in ID, resulting in an increase in
    irrigation water for non-cereal crops in IC."

    - "While CC has a similar percent change impact on corn ethanol production in
    the Middle East and USA, -14% and -18%, respectively, ID results in very different
