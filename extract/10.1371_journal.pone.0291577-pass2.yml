  7: 'Source material: Agriculture,bioenergy, and water implications of constrained
    cereal tradeand climatechange impacts; To explore the regional differences, we
    select four representative regions to evaluate the results in more detail: USA,
    Brazil, Middle East, and Western Africa. USA and Brazil are major cereal exporters
    in 2015...while Middle East and Western Africa are major cereal importers...Climate
    change has a small effect on CIDR over the projection periods in the four selected
    regions. In 2050, the CIDR is 2 percentage points higher in CC than RF for USA
    and Western Africa; In 2050, the CIDR is 2 percentage points higher in CC than
    RF for USA and Western Africa...Fig 3 shows regional changes in cereal imports
    and exports in 2050 in ID compared to RF; For example, USA, Brazil, Argentina,
    and Australia_NZ, which are the major cereal exporters in RF, show the largest
    decrease in cereal export in ID due to global trade restrictions. Correspondingly,
    being the major cereal importers in RF, Middle East, Northern and Western Africa
    show the largest decrease in cereal import in ID...cereal importers in RF must
    increase cereal production in ID, with a resulting increase in price...leading
    to a decrease in consumption."

    '
  8: 'Source material here.

    Climate change can influence production and consumption changes in some regions,
    the impact of the trade perturbations is generally larger... One exception is
    the USA, for which the changes for production and consumption in 2050 in CC, -10.6%
    and -9.0%, respectively, are comparable in magnitude to the production and consumption
    changes in ID, -11.8% and +8.9%, respectively.


    Australia_NZ, with a RF CIDR of -307% in 2050, shows changes in domestic cereal
    production and consumption of approximately -50% and +100%, respectively, in ID
    in 2050. Comparatively, the USA with a CIDR of -23% shows a -12% and +9% change
    in cereal production and consumption, respectively.

