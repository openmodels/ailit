  9: The paper evaluates the impact of constrained cereal trade and climate change
    on domestic cereal production and consumption. The analysis considers the impact
    of climate change scenarios (CC) and trade constraint scenarios (ID, IC) compared
    to a reference scenario (RF). The analysis presents percent changes in domestic
    cereal production and consumption under different scenarios (ID, CC, IC) compared
    to a reference scenario (RF) in 2050. The bubble size in the scatter plots indicates
    the extent of cereal import dependency ratio (CIDR). The analysis uses scatter
    plots to visualize the relationship between domestic cereal production and consumption
    percentages under different scenarios. The results are applicable to the year
    2050. Regions with positive RF CIDR see production expand into more costly land,
    while regions not dependent on cereal imports have lower production and land contraction
    under the ID scenario. The cereal import dependency ratio (CIDR) is used as a
    proxy for regional vulnerability. Note that the y-axis in CC is on a smaller scale
    than ID and IC.
