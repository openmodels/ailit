Drivers of Risk:
  1: Restrictions on agricultural trade and the impacts of climate change on crop
    yields are the primary drivers evaluated.
  2: Climate change impacts on crop yields and changes in international trade patterns
    due to import dependency constraints.
  3: The study explores the impact of a global zero cereal import dependency constraint
    as a thought experiment to understand global trade restrictions' effect on multi-sector
    outcomes.
  4: The paper explores the impact of global zero cereal import dependency and climate
    change on crop yields.
  5: Climate change impact on crop yield for all GCAM crops across all GCAM regions
  6: Impact of cereal import dependency constraint and climate change on global cereal
    consumption and production.
  7: The analysis considers global trade restrictions and climate change as drivers
    impacting cereal trade, production, and consumption.
  8: Climate change and constrained cereal trade impact cereal production and consumption.
  9: The analysis considers the impact of climate change scenarios (CC) and trade
    constraint scenarios (ID, IC) compared to a reference scenario (RF).
  10: Changes in corn prices are driven by scenarios of import dependency constraints
    and climate change impacts on crop yields.
  11: Climate change impacts and trade constraints are the primary drivers affecting
    cereal production and trade outcomes.
  12: Impacts are driven by constraints on cereal trade and climate change conditions
    impacting regional cereal and non-cereal crop production, trade, and consumption.
  13: Impacts arise from constrained cereal trade, climate change impacts, and import
    dependency constraints.
  14: Climate change and constraints on global cereal trade are evaluated for their
    impact on multiple sectoral outcomes.
  15: Climate change impacts on crop yields, global zero cereal import dependency.
  16: The study considers climate change impacts and constrained cereal trade as drivers.
Evaluation overview:
  1: The paper evaluates the impact of constrained cereal trade and climate change
    on agriculture, bioenergy, and water systems.
  2: This paper evaluates the impacts of constrained cereal trade and climate change
    on agricultural productivity and related sectors.
  4: No specific overview of outcomes such as mortality or productivity loss is directly
    provided.
  5: No relevant information
  6: The paper evaluates the impact of cereal import dependency and climate change
    on global cereal consumption and land allocation.
  7: The page provides an overview of the impacts of constrained cereal trade and
    climate change on agriculture, bioenergy, and water implications.
  9: The paper evaluates the impact of constrained cereal trade and climate change
    on domestic cereal production and consumption.
  10: The paper evaluates regional corn price trends under different scenarios from
    2015 to 2050 in key regions including USA, Brazil, Middle East, and Western Africa.
  11: This page provides an overview of climate change impacts on cereal trade in
    the USA, examining production, consumption, exports, imports, and related trade
    revenues in 2050.
  12: The paper provides an overview of outcomes related to trade, production, consumption,
    and revenue changes for food crops in the Middle East as impacted by constrained
    cereal trade and climate change by 2050.
  13: Discusses the impacts on trade revenue, consumer's food expenditure, producer's
    revenue, caloric consumption, food expenditure share of income, and water consumption.
  15: The paper evaluates the impacts of constrained cereal trade and climate change
    on agriculture, bioenergy, and water systems.
  16: The paper examines the agriculture, bioenergy, and water implications of constrained
    cereal trade and climate change impacts.
Highlights:
  1: Most regions experience larger changes in cereal consumption due to import dependency
    constraints than due to climate change impacts on yields.
  2: Enforcement of zero import-dependency for cereal crops exacerbates climate change
    effects in regions with higher baseline import dependence, leading to rising domestic
    prices and declining consumption.
  4: The analysis focuses on the implications of zero cereal import dependency on
    domestic production and consumption, and the impacts of climate change on crop
    yields.
  5: Imposing zero cereal import dependency (ID) significantly decreases global cereal
    trade, but has a smaller impact on total cereal production and consumption. Climate
    change impacts on agricultural yields have a relatively small effect on global
    cereal import quantity compared to the import dependency constraint.
  6: The analysis shows negative impacts of climate change on crop yields globally,
    leading to changes in land allocation for cereal crops.
  7: Major cereal exporters (e.g., USA, Brazil) face decreased exports due to trade
    restrictions, while importers (e.g., Middle East, Western Africa) face reduced
    imports and higher prices, thus reducing consumption.
  8: Trade perturbations generally have a larger impact than climate change, except
    in the USA where impacts are comparable.
  9: Regions with positive RF CIDR see production expand into more costly land, while
    regions not dependent on cereal imports have lower production and land contraction
    under the ID scenario.
  10: Climate change has comparable effects on USA and Brazil prices, while in Middle
    East and Western Africa, import dependency impacts prices more than climate change.
  11: Cereal production is projected to decrease significantly by up to 20.4% under
    climate change impacts, while import dependency for cereals increases significantly
    by 54.7%.
  12: Key outcomes include significant changes in imports, exports, and net trade
    revenue for cereals, and impacts of trade constraints and climate change on crop
    production and consumption in the Middle East.
  13: Trade revenue decreases in all scenarios, with the USA experiencing significant
    impacts; caloric consumption effects are generally small; water consumption shifts
    significantly due to import dependency constraints.
  14: Climate change and import dependency scenarios impact corn ethanol production
    differently, with a near elimination in the Middle East and an increase in the
    USA due to regional differences in cereal crop availability and demand elasticity.
  15: Zero cereal import dependency has a larger impact than climate change on cereal
    production and consumption, although climate change has an important role in some
    regions like the USA; Import dependency constraints will also indirectly affect
    the production, consumption, and trade of non-cereal crops. Climate change and
    import dependency constraints can amplify each other, as seen in Middle East irrigation
    water consumption. Reducing import dependence could lower supply chain disruption
    risks but increase susceptibility to domestic shocks like drought or floods.
Methodology:
  1: 'The paper introduces systematic perturbations in two dimensions: restrictions
    on agricultural trade and climate impacts on crop yields, exploring these independently
    and in combination.'
  2: The analysis uses the Global Change Analysis Model (GCAM v5.3), a global integrated
    model, to assess the effects of systematic perturbations in international trade
    patterns and climate change impacts on crop yields from 2015 to 2050.
  3: GCAM is a market equilibrium model capturing economic decisions and dynamic interactions
    between multiple systems, operating from 1975 to 2100, covering 32 geopolitical
    regions overlaid with 235 water basins.
  4: The study uses the GCAM model with scenarios of global zero cereal import dependency
    and climate change impacts using climate data from the Hadley Centre Global Environmental
    Model under RCP8.5.
  5: 'Uses the GCAM model to explore the multi-sector dynamics of agriculture, bioenergy,
    and water under constrained cereal trade and climate change.  It considers four
    scenarios: Reference (RF), Import Dependency (ID) where zero cereal import dependency
    is imposed globally starting in 2025, Climate Change (CC) where climate change
    impacts are imposed starting in 2020, and Import Dependency under Climate Change
    (IC) which incorporates both.'
  9: The analysis uses scatter plots to visualize the relationship between domestic
    cereal production and consumption percentages under different scenarios. The results
    are applicable to the year 2050.
  10: Analyzes regional corn price trends using scenarios like RF (Reference Scenario),
    ID (Import Dependency scenario), CC (Climate Change scenario), and IC (Interdependent
    scenario).
  14: The analysis evaluates the individual and combined impacts of climate change
    and trade constraints on sectoral outcomes through 2050 using a specific scenario
    of global cereal import dependency constraints.
  15: The study models the effects of zero cereal import dependency across all regions
    and climate change impacts on crop yields, examining their combined effects. The
    climate change impacts used are long-term averages from a single climate model.
  16: The paper uses figures and tables in a supporting information file to present
    its results. The specific methods used include conceptualization, data curation,
    formal analysis, investigation, methodology development, project administration,
    resource management, software utilization, supervision, validation, visualization,
    and writing.
More Notes:
  4: No additional notes.
  5: The paper focuses on the interaction of trade constraints with climate change
    impacts rather than a comprehensive assessment of global climate change impacts.  The
    'zero cereal import dependency' scenario is presented as a thought experiment.
  9: The cereal import dependency ratio (CIDR) is used as a proxy for regional vulnerability.
  15: The study acknowledges that the modeled import dependency constraints are extreme
    and that the climate change impacts are based on long-term averages, not inter-annual
    variability.
Quantitative material:
  1: Climate change results in rising domestic prices and declining consumption of
    cereal crops; Global trade of cereals decreases by ~50% with smaller decreases
    in production and consumption (4%); Global irrigation water consumption increases
    3% and corn ethanol production decreases 7% by 2050.
  4: No quantitative information, such as percent changes, is provided on this specific
    page.
  5: "Global total import of cereals in ID and IC decreases to nearly half of the\
    \ trade quantity in RF in 2025, with larger decreases in later periods. Total\
    \ cereal production and consumption decrease only 3.1%-4.1% over the 2025\u2013\
    2050 period in ID"
  6: Global land allocated to cereal crops is reduced by 3.6% due to import dependency
    constraints.
  7: The analysis includes quantitative data on changes in global cereal import, consumption,
    and land allocation under different scenarios, indicating percent changes in CIDR
    and other metrics among regions.
  8: Australia/NZ shows -50% in cereal production and +100% in consumption by 2050
    in certain scenarios; USA shows -12% in production and +9% in consumption.
  9: The analysis presents percent changes in domestic cereal production and consumption
    under different scenarios (ID, CC, IC) compared to a reference scenario (RF) in
    2050. The bubble size in the scatter plots indicates the extent of cereal import
    dependency ratio (CIDR).
  10: USA and Brazil show a slight decrease, while Western Africa and the Middle East
    show price increases with Middle East notably high post-2030.
  11: The page includes quantitative data on percent changes in cereal and non-cereal
    production, consumption, exports, imports, and net trade revenue for various scenarios,
    including constraint trade and climate change impacts by 2050.
  12: The table presents percent changes in various metrics including production,
    imports, exports, consumption, and trade revenues for cereals and non-cereals
    in 2050 compared to a reference scenario.
  13: Reports percent changes such as a roughly 50% loss in total crop export revenue
    in ID relative to RF, a 30% decrease in trade revenue for both cereal and non-cereal
    crops in CC, and an 8% decrease in irrigation water consumption in the USA with
    a 21% increase in the Middle East.
  14: Corn ethanol production changes are quantified as -14% in the Middle East and
    -18% in the USA under climate change. In an import dependency scenario, it results
    in a 96% decrease in the Middle East and an 11% increase in the USA.
  15: Global trade quantity of cereals decreases to almost half under zero import
    dependency; total irrigation water consumption in the Middle East increases by
    21% under import dependency (ID) and 0.7% under climate change (CC), but 22% under
    both (IC).
sourcematerial:
  1: "Source material here.\n1. Evaluation overview: \"International trade increases\
    \ connections and dependencies between countries, weaving a network of global\
    \ supply chains. Agricultural commodity trade has implications for crop producers,\
    \ consumers, crop prices, water and land uses, and other human systems.\" \n2.\
    \ Drivers of Risk: \"To better understand the interactions of non-linear and globally\
    \ coupled agricultural-bioenergy-water systems under the broader economy, we introduce\
    \ systematic perturbations in two dimensions, one human (restrictions on agricultural\
    \ trade) and the other physical (climate impacts on crop yields).\"\n3. Quantitative\
    \ material: \"Climate change results in rising domestic prices and declining consumption\
    \ of cereal crops in general... cereal trade decreases ~50% in 2050 compared to\
    \ the baseline, with smaller decreases in cereal production and consumption (4%).\
    \ The changes in trade also impact water and bioenergy: global irrigation water\
    \ consumption increases 3% and corn ethanol production decreases 7% in 2050.\"\
    \n4. Methodology: \"We introduce systematic perturbations in two dimensions, one\
    \ human (restrictions on agricultural trade) and the other physical (climate impacts\
    \ on crop yields). We explore these independently and in combination to distinguish\
    \ the consequences of individual perturbation and interactive effects in long-term\
    \ projections.\"\n5. Highlights: \"We show that most regions experience larger\
    \ changes in cereal consumption due to cereal import dependency constraints than\
    \ due to the impacts of climate change on agricultural yields.\"\n"
  2: "Source material here.\n- Evaluation overview: \"Climate change impacts on crop\
    \ yields are heterogeneous across countries and regions, with the effect of changes\
    \ in one country transmitted to others via trade.\" \n- Drivers of Risk: \"Climate\
    \ change impacts on crop yields,\" \"Enforcement of a zero import-dependency for\
    \ cereal crops exacerbates the effects of climate change in regions with higher\
    \ baseline import dependence.\"\n- Methodology: \"We use the Global Change Analysis\
    \ Model [GCAM v5.3; 23], a global, fully integrated model of the socioeconomic,\
    \ energy, land, and water systems, to disentangle the individual roles of national\
    \ and regional engagement in global markets and climate change and the non-linear\
    \ interactions between these two systems over the period of 2015\u20132050.\"\n\
    - Highlights: \"Enforcement of a zero import-dependency for cereal crops exacerbates\
    \ the effects of climate change in regions with higher baseline import dependence,\"\
    \ \"with rising domestic prices and declining consumption of cereal crops in general.\"\
    \n"
  3: 'Source material here.

    "The study uses an open-source global-scale integrated model called GCAM version
    5.3, modified to explore impacts of constrained cereal trade and climate change
    on multi-sector outcomes." GCAM version 5.3, available at https://github.com/JGCRI/gcam-core/releases,
    is modified and employed in this study.


    "GCAM is a market equilibrium model capturing economic decisions and dynamic interactions
    between multiple systems, operating from 1975 to 2100, covering 32 geopolitical
    regions overlaid with 235 water basins." GCAM is an open-source global-scale integrated
    model that captures economic decisions and dynamic interactions between multiple
    systems... The model calibration periods span from 1975 to 2015.


    "The study explores the impact of a global zero cereal import dependency constraint
    as a thought experiment to understand global trade restrictions'' effect on multi-sector
    outcomes." We intentionally set the global zero cereal import dependency constraint
    as a thought experiment to explore the impact of global trade restrictions on
    multi-sector outcomes.

    '
  4: 'Source material: "Agriculture,bioenergy, and water implications of constrained
    cereal tradeand climatechange impacts...Climate change impacts on crop yields
    are also considered in combination with global zero cereal import dependency...The
    cereal import constraint in GCAM allows us to analyze a range of outcomes relative
    to the reference (i.e., without this constraint)... We use the global gridded
    climate outputs from the Hadley Centre Global Environmental Model [HadGEM; 28,
    29] under RCP8.5 and processed them through Persephone [30] to estimate the corresponding
    crop yield changes under the climate impact for all GCAM crops...we are able to
    analyze the spatial pattern of model outcomes (e.g., crop land allocation, crop
    production, global trade, and consumption) under the influence of global zero
    cereal import dependency and the associated economic changes for producers and
    consumers in each region. We also explore the implications for irri- gation water
    consumption and crop-based ethanol production"'
