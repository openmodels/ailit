    - "In general, in regions where corn ethanol is available, cereal net importers
    in RF reduce corn ethanol production in ID while the cereal net exporters increase
    corn ethanol production."

    - "To better understand how human and physical Earth systems interact around a
    changing climate and constraints on global trade, we evaluate the individual and
    combined impacts of these changes on multiple sectoral outcomes through 2050."

    - "The objective of this study is not to predict future climate impacts or trade
    patterns, but rather to explore how outcomes across multiple."

