  7: "yaml\nEvaluation overview: \"Property damage is calculated using the standard\
    \ HAZUS-MH method...Damage analysis. We create \uFB02ood maps using modeled, bias-corrected\
    \ water elevations and lidar-derived land elevation data...We assess the exposure\
    \ of land, population, and housing...\"\nDrivers of Risk: \"Damages and exposures\
    \ for precise amounts of ASLR (i.e., different percentiles of different budget-based,\
    \ semi-empirical, or integrated scenarios) are interpolated between results for\
    \ various water levels...Following ref. 15, we do not interpret modeled damages\
    \ directly, but rather use them to estimate the fraction of damages attributable\
    \ to ASLR.\"\nQuantitative material: \"In short, the damage calculation is based\
    \ on depth-damage curves, which denote the vulnerability of a speci\uFB01c asset\
    \ to different \uFB02ood depths in the form of a percentage of maximum \uFB02\
    ood damage...Figure 2 shows block-level differences in modeled damages for three\
    \ of these increments, each vs. actual sea level.\"\nMethodology: \"Hydrodynamic\
    \ \uFB02ood simulations are performed using the U.S. Army Corps of Engineers Coastal\
    \ Storm Modeling System (CSTORM-MS)...Both depth-damage curves and maximum damages\
    \ are differentiated for 33 building types...Therefore, we compute the mean inundation\
    \ depth for \uFB02ooded areas within each Census block, use this depth to compute\
    \ hypothetical full-block damage...\"\nHighlights: \"However, meticulous absolute\
    \ damage estimates are not essential to our analysis; rather, we aim to estimate\
    \ relative damages among simulated \uFB02oods starting from slightly different\
    \ baseline sea levels...A spatially coherent bias correction is utilized to correct\
    \ for this component (see Supplementary Methods). The resulting bias-corrected\
    \ modeled maximum water levels have a reduced mean bias of \u22120.1 cm and RMSE\
    \ of 22.3 cm...\"\nMore Notes: \"and attribution results for all 86 combinations,\
    \ as well as 43 summaries for each housing unit exposure, we assume uniform density\
    \ within each block...\"\n"
