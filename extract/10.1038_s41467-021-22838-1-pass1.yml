Drivers of Risk:
  1: Sea level rise driven by anthropogenic climate change is impacting the economic
    damages caused by Hurricane Sandy.
  3: Shocks impacting sea level rise include stable or cooling counterfactual scenarios
    compared to historical scenarios impacted by anthropogenic climate change.
  4: ASLR impacts on coastal flooding are the primary drivers of risk.
  5: Anthropogenic sea level rise (ASLR) is impacting flooding extents and depths.
  6: Sea level rise associated with anthropogenic climate change
  7: Sea level rise and its contribution to increased flood damages and exposure are
    the primary drivers of risk considered.
Evaluation overview:
  1: The article evaluates economic damages from Hurricane Sandy attributable to sea
    level rise due to anthropogenic climate change.
  3: The page provides an evaluation of changes in global mean sea level (GMSL) rise
    from 1900 to 2012.
  4: The paper evaluates damages attributable to anthropogenic sea level rise (ASLR)
    in New York, New Jersey, and Connecticut during Hurricane Sandy.
  5: Evaluates the impact of anthropogenic sea level rise (ASLR) on property damage
    and population exposure in the tri-state area.
  6: Simulates coastal water levels, flooding, and damage in New York, New Jersey,
    and Connecticut, both as they occurred, and as they would have occurred across
    a range of lower sea levels corresponding to different estimates of attributable
    sea-level rise.
  7: This page discusses the evaluation of flood damages and population exposure due
    to sea level rise in various simulations.
Highlights:
  1: The study finds substantial economic damages from Hurricane Sandy attributable
    to anthropogenic sea level rise and demonstrates a methodology that can be applied
    to other coastal storms.
  3: A key outcome is the estimate of sea level rise attributable to anthropogenic
    climate change, showing the differences across various scenarios and methodological
    approaches.
  4: "Estimated that $4.7B\u2013$14B of Sandy damages were due to ASLR; New York City\
    \ alone experienced $1.5B in damages from ASLR."
  5: ASLR increased flooding and property damages significantly; hydrodynamic simulation
    indicates notable areas would not have flooded under historical sea levels.
  6: The same general approach demonstrated here may be applied to other past and
    future coastal storms to estimate sea-level-linked anthropogenic climate damages
    and improve estimates of the costs of climate change more broadly. Sea level rise
    is robustly linked to climate change, providing a strong foundation for event
    and impact attribution.
  7: The analysis estimates relative flood damages among different sea level rise
    scenarios and applies bias correction to improve model accuracy.
Methodology:
  1: The analysis simulates water levels and damage as they occurred and as they would
    have occurred under lower sea levels, assessing the impact of anthropogenic sea
    level rise.
  3: The analysis uses semi-empirical models to estimate historical and counterfactual
    GMSL changes, comparing scenarios from observed temperature records and climate
    models (CMIP5).
  4: Uses hydrodynamic modeling and spatial bias correction to simulate flooding with
    different sea levels and estimates damages attributable to ASLR.
  5: Uses hydrodynamic modeling, spatial bias correction, and flood-depth-based assessment
    for evaluating ASLR impacts.
  6: 'Uses budget approach and semi-empirical models to estimate sea-level-linked
    anthropogenic climate damages from coastal storms. Develops three attribution
    scenarios: high, central, and low, based on literature estimates of attributable
    fractions.'
  7: Flood modeling is performed using the U.S. Army Corps of Engineers Coastal Storm
    Modeling System and hydrodynamic simulations with depth-damage curves for damage
    assessment.
More Notes:
  4: Maps show increased flood risk with sea level rise, reinforcing the study's damage
    estimates for various scenarios.
  6: The study focuses on the difference between two very similar floods, potentially
    limiting the generalizability of the findings to more extreme events.
  7: The paper assumes a uniform housing and population distribution within blocks
    for exposure assessment.
No relevant information:
  9: This page primarily contains references, acknowledgements, author contributions,
    competing interests, additional information, and licensing information. It does
    not contain any primary analysis or results directly related to climate impacts.
Quantitative material:
  1: "Approximately $8.1 billion ($4.7B\u2013$14.0B, 5th\u201395th percentiles) of\
    \ damages from Sandy are attributed to climate-mediated anthropogenic sea level\
    \ rise, affecting 71 (40\u2013131) thousand additional people."
  3: "Quantitative estimates of sea level rise attributable to anthropogenic climate\
    \ change from 1900\u20132012 are provided, with median and percentile ranges for\
    \ different scenarios."
  4: 13% of Sandy damages in the tri-state area are attributed to climate-mediated
    ASLR, leading to $8.1B in avoidable costs.
  5: ASLR exposed an additional 71,000 people and 36,000 housing units and caused
    13.0% of property damage in the tri-state area.
  6: Presents minimum (first percentile) values of 1.1 and 1.2 mm/yr for anthropogenic
    sea level rise over the century before Sandy for NE America and for New York City
  7: Quantitative estimates related to flood damages and inundation depths are calculated
    for different sea level rise scenarios.
sourcematerial:
  1: "Source material here: In 2012, Hurricane Sandy hit the East Coast of the United\
    \ States, creating widespread coastal flooding and over $60 billion in reported\
    \ economic damage. The potential influence of climate change on the storm itself\
    \ has been debated, but sea level rise driven by anthropogenic climate change\
    \ more clearly contributed to damages. To quantify this effect, here we simulate\
    \ water levels and damage both as they occurred and as they would have occurred\
    \ across a range of lower sea levels corresponding to different estimates of attributable\
    \ sea level rise. We find that approximately $8.1B ($4.7B\u2013$14.0B, 5th\u2013\
    95th percentiles) of Sandy\u2019s damages are attributable to climate-mediated\
    \ anthropogenic sea level rise, as is extension of the flood area to affect 71\
    \ (40\u2013131) thousand additional people. The same general approach demonstrated\
    \ here may be applied to impact assessments for other past and future coastal\
    \ storms."
  3: "Source material here.\nEvaluation overview: \"Semi-empirically modeled historical\
    \ GMSL estimates, based on global temperature timeseries...anthropogenic sea level\
    \ rise (ASLR), based on differences between matching scenarios: HadCRUT4 vs. stable\
    \ or cooling temperatures, and historical vs. natural CMIP5 simulations.\"\nDrivers\
    \ of Risk: \"Counterfactual GMSL estimates, from temperature-based stable or cooling\
    \ counterfactual scenarios, and from the CMIP5 natural scenario.\"\nQuantitative\
    \ material: \"Estimates of sea level rise attributable to anthropogenic climate\
    \ change for 1900\u20132012 in cm...Low attribution scenario 7.0 (4.1\u201310.4),\
    \ Medium attribution scenario 9.8 (6.4\u201313.7), High attribution scenario 12.6\
    \ (8.7\u201317.1)...\"\nMethodology: \"K16 used a four-part methodology...developed\
    \ a semi-empirical model for global mean sea level...hindcasted sea level under...counterfactual\
    \ twentieth-century global temperature scenarios...\"\nHighlights: \"Estimates\
    \ of anthropogenic sea level rise (ASLR), based on differences between matching\
    \ scenarios: HadCRUT4 vs. stable or cooling temperatures, and historical vs. natural\
    \ CMIP5 simulations...Because of the general consistency of results across major\
    \ approaches.\"\n"
  4: "Source material here.\nEvaluation overview: \"13% (7.5\u201323%) of Sandy damages\
    \ in the tri-state area are attributable to climate-mediated anthropogenic sea\
    \ level rise, amounting to $8.1B ($4.7B\u2013$14B).\"\nDrivers of Risk: \"Damages...were\
    \ $32.8 billion, $29.5 billion, and $360 million, respectively...so nearly all\
    \ Sandy costs can be treated as coastal flood damages.\"\nQuantitative material:\
    \ \"FEMA models indicate that wind caused less than 0.01% of damage in these states,\
    \ so nearly all Sandy costs can be treated as coastal flood damages34.\"\nMethodology:\
    \ \"We use hydrodynamic modeling and spatial bias correction to simulate Sandy\u2019\
    s flood...given lower sea levels (see the 'Methods' section).\"\nHighlights: \"\
    New York City, the sum of five New York counties, saw $1.5B ($0.9B\u2013$2.5B)\
    \ in damages attributable to total ensemble ASLR.\"\nMore Notes: \"The image is\
    \ a series of three maps showing the impact of different sea level rise scenarios\
    \ on a coastal area, likely New York City and surrounding regions. Each map represents\
    \ a different projected sea level rise.\"\n"
  5: "`\nexpected because increased exposure is a function only of the marginal increase\
    \ in \u2018\uFB02oodprint\u2019 affecting new areas, whereas greater \uFB02ood\
    \ depths are in effect across the full \uFB02ooded area and thus in\uFB02uence\
    \ volume and damage everywhere, as both are functions of depth (Fig. 3). We estimate\
    \ that in the tri-state area, total ensemble ASLR exposed an additional 71 (40\u2013\
    131) thousand more people and 36 (21\u201366) thousand more housing units, 9.2%\
    \ (5.3\u201317%) and 8.8% (5.0\u201316%, respectively (Table 2).\nRobust estimates\
    \ for attributable sea level rise comprise a critical element of this analysis.\
    \ We build con\uFB01dence by employing independent methodologies, a best practice\
    \ in current extreme event attribution science36,37, by characterizing the distributions\
    \ of all results, and by assessing their common ground. Con\uFB01dence also comes\
    \ from the consistent match between observations and budgeted/modeled total global\
    \ mean sea level rise under the different approaches. Each median estimate falls\
    \ within the 5th\u201395th percentile range for each other method and only the\
    \ HadCRUT4-based median is more than 1.2 cm (7%) away from the observed one (Supplementary\
    \ Table 1).\nEstimates for total climate-linked sea level rise in New York largely\
    \ overlap with observations as well, although not quite as robustly, with the\
    \ central estimate of observed rise exceeding other median estimates by 2.4\u2013\
    4.8 cm (14\u201334%) (Supplementary Table 2). This excess may stem from inadvertent\
    \ inclusion of some effects of land subsidence in the computation of the observed\
    \ sea level rise total, despite the deduction made for glacial isostatic adjustment.\
    \ The deduction may be biased low, or we may omit other causes of land subsidence\
    \ at The Battery, the tide gauge location used for water level observations. Non-attributable\
    \ short-term variability linked to ocean dynamics may also in\uFB02ate observations\
    \ (see below). If our budgeted and modeled estimates do in fact leave out a portion\
    \ of climate-linked local sea-level rise, and if a fraction of this omission represents\
    \ attributable rise, then this mismatch biases our overall estimates of ASLR and\
    \ associated damages low.\nOur global ASLR estimates are divided into two fully\
    \ inde- pendent sets based on sea-level-budget reconstruction and semi- empirical\
    \ modeling. Only the budget-based low-attribution esti- mate for ASLR appears\
    \ statistically distinct from other ASLR estimates. Medians for the other \uFB01\
    ve atomic approaches (two budget-based, three semi-empirical) all fall within\
    \ each other\u2019s 5th\u201395th percentile intervals, with just one partial\
    \ exception. (The range for the semi-empirical cooling scenario contains the med-\
    \ ian for the budget-based central-attribution scenario, but not vice versa.)\
    \ The 90% interval from the total ensemble encompasses all median estimates and\
    \ most 5th/95th percentiles, suggesting the total ensemble as constructed here\
    \ is a reasonable and robust singular characterization of ASLR.\nTable 2 Percentage\
    \ of and total property damage (total in $Billions) and population (thousands)\
    \ and housing exposure (thousands) attributable to anthropogenic sea level rise\
    \ (ASLR) as estimated using total ensemble ASLR and full modeling with hydrodynamic\
    \ simulation, spatial bias correction, and \uFB02ood-depth-based assessment of\
    \ property damage.\nAttributable to ASLR Percent 50th (5th\u201395th) 50th (5th\u2013\
    95th)\nTri-State Area Damage 13.0% (7.5\u201322.5%) $8.1 ($4.7\u2013$14.0) Population\
    \ 9.2% (5.3\u201317.1%) 70.6 (40.4\u2013131.0)\n"
