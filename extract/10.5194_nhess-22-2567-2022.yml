  14: 'F. K. S. Chan et al.: Comparison of sustainable flood risk management by four
    countries...These cities have experienced more floods, bringing greater urgency
    for governments to progress and consider wider socio-economic and environmental
    pillars in flood risk management...For example, the Shanghai authority acted to
    raise the flood protection level of coastal defence from a 1-in-100-year to 1-in-1000-year
    protection level during the early 2000s...During the 2000s, these coastal cities
    gradually moved to consider wider aspects of socio-economic risk and health issues
    in communities...'
  15: "Source material here.\nDrivers of Risk: \"Frequency, intensity, and magnitude\
    \ of storms (typhoons), intense rainfall events, and sea surges... Natural resource\
    \ extraction is also increasing flood hazard...\" \n\nHighlights: \"Confronted\
    \ with climate change, the existing levels of protection are not enough. There\
    \ is an urgency to improve flood protection standards with heavier investment\
    \ financially, but we also need to address social and environmental perspectives...\"\
    \n\nHighlights: \"...encourage Asian coastal cities to move further towards SFRM.\
    \ We have been using other global lessons and experiences (from four countries)\
    \ that have indicated ways forward on flood management.\"\n\nHighlights: \"...coping\
    \ strategies combine traditional engineering, soft engineering (e.g. SuDS), land-use\
    \ planning, working with rather than against nature, and social strategies that\
    \ recognize vulnerable communities and engage stakeholders in the co-production\
    \ of responses to flood risk.\"\n\nHighlights: \"A key impetus of the shift in\
    \ practice from flood protection and defence paradigms to SFRM has been a recognition\
    \ that the costs of traditional hard-engineering flood defences are increasingly\
    \ unaffordable...\"\n"
