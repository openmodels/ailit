sourcematerial:
  1: "Source material here: Sustainable \uFB02ood risk management (SFRM) has become\
    \ popular since the 1980s. Many governmental and non-governmental organisations\
    \ have been keen on implementing the SFRM strategies by integrating social, ecological,\
    \ and economic themes into their \uFB02ood risk management (FRM) practices. However,\
    \ the justi\uFB01cations for SFRM are still somewhat embryonic, and it is not\
    \ yet clear whether this concept is in\uFB02uencing current policies in different\
    \ countries. This paper reviews the past and current \uFB02ood management experiences\
    \ from \uFB02ood defence to SFRM in four developed countries to highlight lessons\
    \ for coastal megacities in development. The paper explores recent strategies\
    \ such as \u201CMaking Space for Water\u201D, Planning Policy Statement 25 (PPS25),\
    \ and the National Planning Policy Framework (NPPF) in the UK and \u201CRoom for\
    \ the River\u201D in the Netherlands, which were implemented to mitigate \uFB02\
    ooding, integrate FRM with sustainability concepts, and deliver sound FRM practice\
    \ for future generations. In this context, the United States has also established\
    \ a National Flood Insurance Program (NFIP), and in a different approach, Japan\
    \ has developed an advanced \uFB02ood warning and evacuation contingency system\
    \ to prepare for climatic extremes. These case studies give good lessons in achieving\
    \ long-term SFRM to deliver sound \uFB02ood management practices considering socio-economic\
    \ and environmental concerns. Most developing coastal megacities especially in\
    \ Asia are still heavily reliant on a traditional hard-engineering approach, which\
    \ may not be enough to mitigate substantial risks due to human factors (e.g. large\
    \ population, rapid socio-economic growth, subsidence from excessive groundwater\
    \ extraction) and natural factors (e.g. climate change including sea-level rise\
    \ and landsubsidence). It is clear that different countries and cities have their\
    \ interpretation of SFRM, but this paper explores how policymakers can adopt \u201C\
    mixed options\u201D to move towards long-term thinking about sustainability with\
    \ social, economic, and environmental considerations."
  2: "yaml\nDrivers of Risk: \"\uFB02ood hazard is increasing as climate change raises\
    \ sea surface temperature, driving oceanic thermal expansion and increasing the\
    \ intensity and frequency of precipitation events and natural land subsidence\"\
    \nDrivers of Risk: \"the assets exposed to \uFB02ood hazards, includingpeopleandproperty,aregrowingthroughrapidland-use\
    \ change, urbanisation, and economic expansion\"\nMethodology: \"in this paper,\
    \ we review FRM experience in four economies which are at the front end in applying\
    \ the FRM approach (the UK, the Netherlands, the United States, and Japan) (Sect.\
    \ 2). It additionally explores the wider concept of sustainable FRM (SFRM), which\
    \ extends the scope of FRM to consider wider social and environmental goals (Sect.\
    \ 3).\"\nMethodology: \"The paper also reviews the development of \uFB02ood management\
    \ practices in \uFB01ve selected Asian coastal cities (Jakarta, Indonesia; Bangkok,\
    \ Thailand; Ho Chi Minh City, Vietnam; Guangzhou,China;andShanghai,China)todemonstratethe\
    \ latest progress of FRM in these cities\"\nHighlights: \"Responses to \uFB02\
    ooding have historically developed through several distinct phases. Initially\
    \ (pre-1980s), responses were aimed at controlling and defending against \uFB02\
    oods by rely- ingon\u201Chard-engineeringsolutions\u201D\"\nHighlights: \"It additionally\
    \ explores the wider concept of sus- tainable FRM (SFRM), which extends the scope\
    \ of FRM to consider wider social and environmental goals\"\n"
  3: "Source material here.\n1. Drivers of Risk: \"This change in focus gave greater\
    \ attention to flood preparedness and public awareness through, for example, the\
    \ flood forecasting and warning systems that were developed across Europe. Such\
    \ changes have been the basis of further development of the FRM paradigm.\"\n\
    2. Methodology: \"In the 2000s, the focus changed again to more explicitly consider\
    \ flood risk (Plate, 2002), including the probability of a given flood hazard\
    \ (e.g. precipitation, storm frequency, sea-level rise)\u2026\"\n3. Highlights:\
    \ \"The emphasis had moved from protecting farmland to protecting a broader asset\
    \ base that underpinned economic growth. Thus, policymakers were keen on implementing\
    \ flood alleviation schemes and projects that defended people and property (homes\
    \ and businesses).\"\n4. More Notes: \"An important aspect of FRM is to manage\
    \ flood risk through engagement with stakeholders more widely (e.g. households,\
    \ practitioners, politicians, flood engineers, planners, and communities) to identify\
    \ multi-disciplinary perspectives and solutions (Pitt, 2008; Yang, 2020).\"\n"
  4: "Source material here.\nForecast \uFB02ood damage is currently GBP1.4 billion\
    \ annually but is expected to rise to as much as GBP27 billion by 2100 (Evans\
    \ et al., 2006).\n\nSurface water management plans (SWMPs) work alongside PPS25,\
    \ assessing \uFB02ood risk to inform local authority planning decisions, which\
    \ are now required to ensure that new development does not increase \uFB02ood\
    \ risk.\n\nUK \uFB02ood policy thus seeks to integrate FRM with land-use planning,\
    \ considering future development and \uFB02ood risk, which addresses social, economic,\
    \ and environmental criteria.\n"
  5: "yaml\nEvaluation overview: \"The United States of America (USA) regularly experiences\
    \ severe \uFB02ooding. According to the US National Weather Service (NWS), there\
    \ was an average of 87 deaths per year from \uFB02ooding between 1989 and 2018.\"\
    \nDrivers of Risk: \"Tropical cyclones are low-pressure systems that form over\
    \ warm tropical waters... Tropical cyclones are varied in their wind speed (storms,\
    \ cyclones, and hurricanes listed in ascending order).\"\nQuantitative material:\
    \ \"According to the US National Weather Service (NWS), there was an average of\
    \ 87 deaths per year from \uFB02ooding between 1989 and 2018...and 29 \uFB02ood\
    \ events during the same period that resulted in over USD1 billion in economic\
    \ losses, with an average event cost of USD4.3 million. This does not include\
    \ \uFB02ooding caused by tropical cyclones (42 during the same period with an\
    \ average event cost of USD21.9 billion).\"\nHighlights: \"The United States of\
    \ America (USA) regularly experiences severe \uFB02ooding.\"\n"
  6: In the USA, large populations are located along the banks of watercourses, lakes,
    and coasts. In coastal flood-prone areas of Florida, California, Texas, Louisiana,
    and New Jersey, populations have expanded greatly since the 1980s... Demand for
    development land remains high and, along with climate change, is likely to increase
    flood risk, especially in coastal areas. This image illustrates the engineering
    approaches used in the "Room for the River" project in the Netherlands...Here's
    a detailed description of each... The image uses simple diagrams to visualize
    these concepts, showing how each technique contributes to managing river water
    and preventing floods.
  7: "yaml\nDrivers of Risk: \"Eventually, an impetus to review the approach was seen\
    \ in the 1993 Mississippi River \uFB02ood, which led to the river \uFB02ooding\
    \ over 1200km of the river\u2019s length and about 840000km2 in area (Fig. 2),\
    \ resulting in over USD15 billion in economic damage.\"\nHighlights: \"The subsequent\
    \ Galloway Report in 1994 proposed that development in the \uFB02oodplain should\
    \ be avoided unless no alternative locations existed (Galloway et al., 1999),\
    \ similarly to MSW in the UK and Room for the River in the Netherlands, both described\
    \ above. Yet, while the report was in preparation, reconstruction of damaged and\
    \ breached levees was ongoing. However, the Galloway Report indicated that whilst\
    \ embankments and levees are important in protecting urban areas, they are insuf\uFB01\
    cient on their own. Floodplains should be managed as part of the natural ecosystem,\
    \ with risk-based forecasting used to inform \uFB02ood management.\"\n"
  8: "Source material here.\nThe NFIP aims to provide \uFB02ood protection for property\
    \ owners and discourage development in substantial risk areas by limiting access\
    \ to insurance. The NFIP is sponsored by the federal government, which also provides\
    \ insured residents with access to emergency \uFB01nancial relief aid should they\
    \ suffer \uFB02ood damage. [...] Congress originally intended that the NFIP be\
    \ supported by premiums, but this has not happened for various reasons including\
    \ subsidised insurance rates for pre-existing structures and repetitive loss claims\
    \ for many structures with no action to reduce their risk. Further, suf\uFB01\
    cient funding from Congress for \uFB02ood insurance risk map updates has not been\
    \ forthcoming even though many of the maps were created in the 1980s and thus\
    \ do not re\uFB02ect \uFB02oodplain changes over time, whether from upstream development\
    \ or climate change. [...] Houston has exacerbated its \uFB02ood risk through\
    \ fast, sprawling development that has led to substantial loss of wetland storage,\
    \ expansion of impermeable surfaces, and lack of related investment in \uFB02\
    ood defence infrastructure. [...] Over the last 30 years, intensive rainfall events\
    \ (> 50mmh\u2212 1) have increased in frequency by about 50%, and those > 100mmh\u2212\
    \ 1 have more than doubled. [...] While the USA has made important and successful\
    \ strides towards SFRM, more is needed to achieve its goals.\n"
