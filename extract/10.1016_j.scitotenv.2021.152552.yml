  9: 'Source material here. The paper outlines a proposed stakeholder-centered end-to-end
    risk modeling framework, illustrating an overview of risk assessment outcomes
    including socio-economic and network risks: "account for: (1) multiple hazards;
    (2) a flexible suite of risk metrics that can account for both socio-economic
    and technical networks; and (3) stakeholder perspectives and priorities towards
    different dimensions of risk." The paper identifies multiple hazards including
    fire, flood, and wind as key drivers of risk in the proposed framework: "Multi-Hazard
    Simulation: Features various hazard icons like fire, flood, and wind, representing
    the simulation of different potential risks." The analysis is performed using
    a new risk assessment approach that includes feedback loops to incorporate stakeholder
    perspectives, enabling a flexible selection of risk metrics: "Feedback loops to
    the risk calculations (including exposure inputs and the vulnerability component)
    enable stakeholder perspectives, plans, and priorities to be accounted for in
    the final quantification and selection of risk metrics." It advances conventional
    risk assessment by accounting for multiple hazards, flexible risk metrics, and
    stakeholder perspectives in risk quantification: "The conventional risk assessment
    approach...is advanced to account for: (1) multiple hazards; (2) a flexible suite
    of risk metrics...and (3) stakeholder perspectives and priorities..." The page
    focuses on a theoretical framework applicable to future natural hazards, suggesting
    an enhanced risk evaluation process: "Outline of a proposed idealised stakeholder-centred
    end-to-end risk modelling framework for future natural hazards."

    '
  10: 'This page is a list of references and does not contain any original research.

