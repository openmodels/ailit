  28: "Source material here. Recycling processes for EV batteries can be broadly categorized\
    \ into pyrometallurgical, hydrometallurgical, and direct physical methods, each\
    \ having distinct environmental impacts. Direct physical recycling, while still\
    \ in the experimental stage and not yet suitable for large-scale application,\
    \ shows the highest potential for reducing emissions, with approximately 37.2\
    \ kg CO2-eq/kWh, offering about a 32% reduction in emissions compared to traditional\
    \ methods [116]. In contrast, hydrometallurgical recycling, which uses chemical\
    \ leaching at lower temperatures, is less energy-intensive and generates fewer\
    \ emissions. This method has an overall environmental impact of \u22121.50\xD7\
    10\u221212 when recycling 1000 kg of batteries [115]. However, it does produce\
    \ a considerable amount of toxic waste and solutions, posing significant environmental\
    \ challenges. Pyrometallurgical recycling involves high-temperature processing,\
    \ often exceeding 1000 \xB0C, which is energy-intensive and results in significant\
    \ CO2 emissions. Specifically, this method produces approximately 2.17\xD710\u2212\
    11 in overall environmental impact when recycling 1000 kg of batteries, largely\
    \ due to the fossil fuel energy consumed during the process and the pyrolysis\
    \ of graphite anodes [115]. Although this method offers high economic value, its\
    \ ecological value is relatively poor due to its substantial GHG emissions."
