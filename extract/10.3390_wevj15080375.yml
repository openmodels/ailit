Methodology:
  1: Comprehensive systematic review drawing from 88 peer-reviewed articles.
  5: The selection process included rigorous screening and exclusion criteria to ensure
    studies addressed impacts of EV adoption on organizational performance, technological
    innovation, and sustainable infrastructure.
  6: The analysis involves manual screening of titles and abstracts by two independent
    reviewers, data extraction using structured Excel spreadsheets, and bibliometric
    analysis using VOSviewer software to create co-occurrence maps.
  7: The analysis uses bibliometric and content analysis, including a bibliometric
    analysis using VOSviewer to map EV adoption research and a co-occurrence map based
    on text data to identify core themes.
