    potential forEVs to drive substantial emissions savings as electricity grids continue
    to decarbonize. Moreover,ashighlightedbySergeyPaltsev,DeputyDirectoroftheMITJointProgram
    on the Science and Policy of Global Change, while EVs are more carbon-intensive
    to manufactureduetotheirlargelithium-ionbatteries, theycompensatebyoperatingmuch
    more cleanly under nearly any condition. For instance, a study from MIT showed
    that gasoline cars emit more than 350 grams of CO2 per mile driven over their
    lifetimes, while fullybattery-electric vehiclescreatejust 200g. Evenin regionsheavily
    relianton coal for electricity,EVs tendtoemit lesscarbon thangasolinecars overtheir
    lifetime [10]. These findings reinforce the significant long-term climate benefits
    of EVs. IntheSTEPSscenario,forexample,netGHGemissionsavoidedby2035aresignificant,
    underscoring the effectiveness of current policies. The APS scenario, which includes
    announced pledges, shows further reductions, and the NZE scenario highlights the
    impact of achieving net-zero emissions by 2050. These scenarios collectively demonstrate
    that EV adoption, coupledwith grid decarbonization, can resultin substantial GHG
    emissions savings. ThesebenefitsunderscorethenecessityofadoptingEVsinurbanplanningand
    policy-making to foster a sustainable transport model that aligns with climate
    targets [1].'
  5: "The analysis was performed by reviewing literature following PRISMA 2020 guidelines\
    \ with a focus on EV adoption from 2019 to 2024. Initial filtering based on publication\
    \ year (2019\u20132024) reduced the pool to 498 papers, reflecting a surge in\
    \ EV adoption research. Further refinement to include only English-language journal\
    \ articles narrowed it down to 312 papers. Next, we reviewed the titles and abstracts\
    \ of the remaining papers, narrowing our selection to 130 studies closely aligned\
    \ with our focus on the integration of EVs with sustainability and organizational\
    \ strategy. We applied strict exclusion criteria to ensure the included studies\
    \ comprehensively addressed the impact of EV adoption on organizational performance,\
    \ technological innovation, and sustainable infrastructure, excluding those that\
    \ solely focused on the technical aspects of EVs."
  6: "Two independent reviewers screened the titles and abstracts of the retrieved\
    \ articles using an Excel spreadsheet, marking each study as 'relevant' or 'not\
    \ relevant.' This manual approach, without the use of automated tools, enhanced\
    \ the rigor and reproducibility of our selection process. We employed VOSviewer\
    \ software for bibliometric analysis to create co-occurrence maps of key terms\
    \ from the titles and abstracts of the selected articles. Data collection targeted\
    \ four primary outcome dimensions to assess the comprehensive impacts of EV adoption:\
    \ environment, organizations, technology, and policy. \u2022 Environment: Focus\
    \ on GHG emissions, air quality improvements. \u2022 Organizations: Examination\
    \ of economic viability, energy efficiency. \u2022 Technology: Analysis of advancements\
    \ in battery technologies. \u2022 Policy: Assessment of policy frameworks, regulatory\
    \ impacts. "
