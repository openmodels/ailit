Drivers of Risk:
  1: Wildfire risk and severity in California have been impacted by climate change,
    the expansion of the wildland-urban interface, and fire management practices.
  2: Wildland fire-associated PM2.5 concentrations are the primary driver of risk.
  3: Wildfires are identified as the primary driver impacting PM2.5 concentrations
    in various regions of California.
  4: Wildland fire smoke is a significant driver of PM2.5-associated mortality impacts.
  5: Modeled wildland fire PM2.5 estimates
  6: Wildfires are the primary drivers impacting mortality outcomes due to PM2.5 exposure.
  7: Wildfires in California and their associated PM2.5 emissions are considered the
    primary drivers of risk analyzed in the study.
  10: The primary driver of risk discussed is exposure to PM2.5 produced by wildfires.
  11: Changes in PM2.5 concentration from wildland fire smoke are impacting mortality
    outcomes.
  12: Wildfire smoke (specifically fine particles from wildfire smoke).
  13: No relevant information
Evaluation overview:
  1: The analysis evaluates mortality attributable to PM2.5 exposure from wildland
    fires in California from 2008 to 2018.
  2: The paper evaluates premature deaths due to wildland fire-associated PM2.5 concentrations
    in California.
  3: The analysis evaluates mortality impacts and economic valuation due to PM2.5
    exposure from wildfires in California.
  4: Provides an overview of mortality outcomes attributable to wildfire-specific
    and undifferentiated PM2.5 in California from 2008 to 2018.
  5: Total deaths attributable to fire - only PM2.5
  6: The paper evaluates the economic valuation of mortality impacts from wildland
    fires using wildfire-specific dose-response values.
  7: The study reports on the long-term period of wildfire impacts in California,
    focusing on mortality impacts from fire-related PM2.5 exposure.
  9: The analysis characterizes the health impacts of PM2.5 from wildland fire smoke
    on the California population from 2008 to 2018, focusing on mortality outcomes.
  10: The page provides an overview of the mortality burden related to chronic exposure
    to wildfire-specific PM2.5 in California.
  11: The paper evaluates the mortality burden from exposure to PM2.5 due to wildland
    fire smoke in California, and estimates the total valuation of the health burden.
  12: Wildfire smoke impacts on respiratory health are evaluated.
  13: No relevant information
Highlights:
  1: The study suggests that wildfires account for a greater mortality and economic
    burden than indicated by earlier studies.
  2: Wildland fires contributed significantly to PM2.5 concentrations in California
    between 2008 and 2018, with fire-only PM2.5 contributing up to 49% of all PM2.5
    in some years.
  3: Regions in California, particularly rural areas in the north, experience PM2.5
    concentrations greater than the NAAQS due to wildfires, expanding areas affected
    by pollution.
  4: The highest number of deaths attributable to fire-only PM2.5 occurs in high population
    areas during major fire years like 2018.
  5: Modeled wildland fire-only PM2.5 estimates follow anticipated spatial and temporal
    trends with respect to the patterns of fire activity in the state.
  6: The study suggests a higher estimation of mortality than other studies due to
    the use of a specific dose-response value, and despite capping peak PM2.5 concentrations,
    impacts remain substantial.
  7: The study highlights the significance of using context-specific dose-response
    values and the increased toxicity of wildfire smoke in evaluating mortality impacts.
  9: Findings emphasize the substantial health and economic impacts from wildfires,
    indicating the importance of protecting diverse and vulnerable populations in
    fire-prone regions like California.
  10: The paper highlights potential increased toxicity of wildfire smoke and suggests
    the use of a new wildfire-specific PM2.5 chronic dose-response coefficient due
    to potential underestimation by undifferentiated models.
  13: No relevant information
Methodology:
  1: The study uses the Community Multiscale Air Quality modeling system to estimate
    wildland fire PM2.5 levels and applies a concentration-response function and a
    wildfire-specific dose-response coefficient to ZIP code-level mortality data.
  2: The study uses modeled wildland fire-associated PM2.5 concentrations, California
    Department of Public Health mortality data, and a calculated chronic dose-response
    coefficient for wildfire PM2.5 exposures and mortality to estimate premature deaths
    due to wildland fires over an 11-year period (2008-2018) in California.  The PM2.5
    concentrations are modeled at a 12-km grid scale.
  3: The analysis uses modeled PM2.5 concentrations and applies dose-response values
    specific to wildfire exposure to estimate mortality impacts.
  4: Mortality impacts estimated using wildfire-specific and undifferentiated chronic
    dose-response values.
  5: modeled wildland fire PM2.5 estimates at the 12-km grid scale for 2008 to 2018,
    estimate associated premature mortality using a chronic dose-response value for
    wildfire exposure, and calculate the associated economic valuation.
  6: The analysis uses ZIP code-level health data and a chronic wildfire-specific
    dose-response value over an 11-year period.
  7: The study uses 11 years of CMAQ data, employs a fire-specific dose-response function,
    and includes highly resolved health data at the ZIP code level to estimate mortality
    impacts.
  9: "The analysis applies CTM estimates of wildland fire PM2.5, using daily modeled\
    \ concentrations at a 12-km grid spatial resolution for California, estimated\
    \ using the U.S. EPA\u2019s CMAQ system."
  10: The analysis involves quantifying mortality burden using ZIP code level data
    and CMAQ data between 2008 to 2018, comparing observed and modeled PM2.5 concentrations,
    and developing a chronic wildfire-specific dose-response coefficient.
  11: Uses a Monte Carlo distribution to estimate dose-response values, calculates
    mortality burden using equations, applies EPA's value of a statistical life, and
    uses income growth factors and discount rates.
  12: Observational evidence from Southern California is used.
  13: The study uses ensemble-based deep learning to estimate PM2.5 over California
    utilizing multisource data, including wildfire smoke, with high spatiotemporal
    resolution. Results were applicable as of May 2024.
More Notes:
  5: The study uses CMAQ to model PM2.5 concentrations.
  7: The use of two exposure scenarios in evaluating the health impacts and a comparison
    between different dose-response values is noted.
  9: The approach assumes that particulate matter-associated health effects are proportional
    to total inhaled dose, and that toxicity is independent of the dosing regimen.
  13: No relevant information
Quantitative material:
  1: The analysis estimates 52,480 to 55,710 premature deaths attributable to wildland
    fire PM2.5 over the 11-year period, with an economic impact of $432 to $456 billion.
  2: Fire-only PM2.5 contributes between 6.9 and 49% of PM2.5 from all sources in
    California from 2008 to 2018. In 2008, 2017, and 2018, fire-only PM2.5 was responsible
    for almost half of all sources PM2.5.
  3: The total mortality burden from wildfire-related PM2.5 exposure ranges from ~1240
    deaths in 2010 to ~12,850 deaths in 2018, summing to ~55,710 deaths over an 11-year
    period.
  4: Wildlands fires are responsible for approximately 19% of PM2.5-associated deaths
    overall and up to 42% in high-fire years.
  5: These deaths account for nearly 19% of total deaths attributable to all sources
    PM2.5 in the state during this 11-year period.
  6: The paper estimates 12,150 to 12,850 premature deaths in California for 2018
    associated with wildfire PM2.5 exposure.
  7: The analysis estimates approximately more than 100,000 deaths attributable to
    fire-PM2.5 over the 11-year period.
  9: The study estimates that between 52,480 and 55,710 premature deaths are attributable
    to fire-only PM2.5 exposures, with an economic valuation of $432 billion to $456
    billion.
  10: The page mentions that there is a 0.35% variation between estimated and reported
    total deaths in state-level CDPH data.
  11: Estimates the economic valuation of health impacts using EPA's value of a statistical
    life ($8.7 million in 2015 dollars) and accounts for income growth and a 3% discount
    rate over an 11-year period.
  13: No relevant information
sourcematerial:
  1: "Source material\nEvaluation overview: \"Here, we quantified the mor tality burden\
    \ for PM2.5 exposure from California fires from 2008 to 2018...\"\nDrivers of\
    \ Risk: \"In California, wildfire risk and severity have grown... Climate change\
    \ (1\u20133), an expansion of the wildland-urban interface (4, 5), and questionable\
    \ wildfire-management practices emphasizing fire suppression have all contributed\
    \ to this increased risk (6).\"\nQuantitative material: \"We estimate a total\
    \ of 52,480 to 55,710 premature deaths are attributable to wildland fire PM2.5\
    \ over the 11-year period with respect to two exposure scenarios, equating to\
    \ an economic impact of $432 to $456 billion.\"\nMethodology: \"We used a concentration-response\
    \ function for PM2.5, applying ZIP code\u2013level mortality data and an estimated\
    \ wildfire-specific dose-response coefficient accounting for the likely toxicity\
    \ of wildfire smoke... Scholars use various methods for estimating air quality\
    \ during wildfires, including chemical transport models (CTMs), machine learning\
    \ algorithms, in situ monitoring data and satellite data, and combinations of\
    \ these tools and datasets (5, 8, 9, 11, 13\u201318).\"\nHighlights: \"These findings\
    \ extend evidence on climate-related health impacts, suggesting that wildfires\
    \ account for a greater mortality and economic burden than indicated by earlier\
    \ studies.\"\n"
  2: "yaml\nEvaluation overview: \"To bridge these knowledge gaps, we use modeled\
    \ wildland fire-associated PM2.5 concentrations, high-resolution California Department\
    \ of Public Health (CDPH) mortality data, and a calculated chronic dose-response\
    \ coefficient for wildfire PM2.5 exposures and mortality to estimate premature\
    \ deaths due to wildland fires over an 11-year period from 2008 to 2018.\"\nDrivers\
    \ of Risk: \"To bridge these knowledge gaps, we use modeled wildland fire-associated\
    \ PM2.5 concentrations, high-resolution California Department of Public Health\
    \ (CDPH) mortality data, and a calculated chronic dose-response coefficient for\
    \ wildfire PM2.5 exposures and mortality to estimate premature deaths due to wildland\
    \ fires over an 11-year period from 2008 to 2018.\"\nQuantitative material: \"\
    As shown in Table\_1, fire-only PM2.5 contributes between 6.9 and 49% of PM2.5\
    \ from all sources, depending on the severity of the fires in each particular\
    \ year. In 2008, 2017, and 2018, years where California fires burned between 1.5\
    \ million and nearly 2 million acres (35), fire-only PM2.5 was responsible for\
    \ almost half of all sources PM2.5.\"\nMethodology: \"To bridge these knowledge\
    \ gaps, we use modeled wildland fire-associated PM2.5 concentrations, high-resolution\
    \ California Department of Public Health (CDPH) mortality data, and a calculated\
    \ chronic dose-response coefficient for wildfire PM2.5 exposures and mortality\
    \ to estimate premature deaths due to wildland fires over an 11-year period from\
    \ 2008 to 2018.\" and \"Here, we present a summary of the temporal, spatial, and\
    \ overall distribution of the Community Multiscale Air Quality (CMAQ) modeled\
    \ PM2.5 concentrations at the 12-km grid scale.\"\nHighlights: \"As shown in Table\_\
    1, fire-only PM2.5 contributes between 6.9 and 49% of PM2.5 from all sources,\
    \ depending on the severity of the fires in each particular year. In 2008, 2017,\
    \ and 2018, years where California fires burned between 1.5 million and nearly\
    \ 2 million acres (35), fire-only PM2.5 was responsible for almost half of all\
    \ sources PM2.5.\"\n"
  3: "Source material here.\nEvaluation overview: \"The total mortality burden for\
    \ exposure to PM2.5 due to wildfires in California, estimated for two exposure\
    \ scenarios using a calculated chronic wildfire-specific dose-response value (\u03B2\
    \ WL), is presented in Fig. 2.\"\n\nDrivers of Risk: \"Most modeled concentrations\
    \ higher than the 35 \u03BCg/m3 NAAQS threshold over the 11-year period are due\
    \ to fire-only PM2.5... These fire-only sources are responsible for average concentrations\
    \ greater than the annual thresholds in several regions.\"\n\nQuantitative material:\
    \ \"Annual mortality impacts due to fire-only PM2.5 exposure range from a low\
    \ of ~1240 deaths (95% CI: 110 to 2370) in 2010 to a high of 12,850 (95% CI: 1150\
    \ to 23,730) in 2018;... This equates to a total of ~55,710 (95% CI: 4960 to 103,410)\
    \ for the base case over the 11-year period.\"\n\nMethodology: \"The chronic wildfire-specific\
    \ dose-response value applied here, \u03B2 WL, was derived to account for the\
    \ potential increased toxicity of wildfire smoke... We also present estimated\
    \ mortality impacts using an undifferentiated chronic PM2.5 dose-response value.\"\
    \n\nHighlights: \"These fire-only sources are responsible for average concentrations\
    \ greater than the annual thresholds in several regions and for multiple years\
    \ during the 11-year period... Generally, wildfire smoke appears to expand the\
    \ geographic areas affected by higher PM2.5.\" \n"
