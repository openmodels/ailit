  7: "Source material: This study has several strengths and presents a unique contribution\
    \ to the literature. The use of 11 years of CMAQ data enabled us to report on\
    \ a long-term period of wildfire impacts in California, with several high-fire\
    \ years with substantial impacts. The use of fire-only PM2.5 estimates from the\
    \ CMAQ model is a distinct strength of this study. Although recent machine learning\
    \ analyses have parsed out wildfire-specific PM2.5 at slightly more spatially\
    \ resolved levels than our 12-km grid [10 km (9) and ZIP code (15)], uncertainty\
    \ exists in these estimates due to a series of assumptions in the methodology.\
    \ Both studies intersect the Hazard Mapping System Fire and Smoke Product (HMS\
    \ Smoke) hand-drawn smoke plumes from satellite imagery with the various grids\
    \ as a primary method of identifying smoke days. The HMS Smoke product, however,\
    \ characterizes the density of smoke plumes in the atmospheric column and accordingly\
    \ is not precisely aligned with ground-level PM2.5 concentrations (57). Furthermore,\
    \ the studies characterize the fire-only concentrations using undifferentiated\
    \ PM2.5 concentrations (from all sources) and the binary smoke day classification,\
    \ which again requires several assumptions to extract fire-only PM2.5 using counterfactual\
    \ nonsmoke concentrations (9, 15). The CMAQ modeled estimates applied in this\
    \ study are subject to typical limitations associated with use of a CTM, but these\
    \ values are based on actual all sources and nonsmoke modeled PM2.5 and do not\
    \ involve the use of imputation. The use of highly resolved health data at the\
    \ ZIP code level is another key contribution of this study. Less spatially resolved\
    \ county-level mortality rates are used in BenMAP-CE (58) and many existing health\
    \ impact assessments, which can result in potential exposure misclassification,\
    \ as mentioned previously. We also apply a fire-specific dose-response coefficient\
    \ accounting for increased toxicity of wildfire smoke, which gives a first estimate\
    \ of chronic wildfire-specific mortality impacts. In addition, the inclusion of\
    \ two exposure scenarios enables us to evaluate the sensitivity of the magnitude\
    \ of health impacts to high PM2.5 concentrations from severe wildfire events.\
    \ The implications and sensitivity associated with the choice of wildfire smoke\
    \ exposure data and potential misclassification in relation to quantifying health\
    \ impacts have been discussed in recent studies (20, 54\u201356). Another analysis\
    \ that was focused on acute health impacts during the 2017 California wildfires\
    \ used varying dose-response values and exposure surfaces to test the sensitivity\
    \ of results (54). The authors found that there were no statistically significant\
    \ differences in results for the variation in either input, but the differing\
    \ magnitudes in outcomes resulting from the use of a range of dose-response values\
    \ supported the use of context-specific dose-response values, as we have applied\
    \ in this study (54). This variation in results between the base case and the\
    \ mod cap and the differing magnitudes of our findings with the wildfire-specific\
    \ versus undifferentiated dose-response value (Fig. 2) highlights several considerations\
    \ and challenges associated with using modeled data for health studies. The study\
    \ estimates approximately more than 100,000 deaths attributable to fire-PM2.5\
    \ over the 11-year period. We created a dose-response function that mathematically\
    \ combines dose-response functions from existing studies of long-term effects\
    \ from undifferentiated PM2.5 and acute studies of wildfire PM2.5 and enables\
    \ us to account for the potentially increased toxicity of wildfire smoke."
  9: "Source material here.\nEvaluation overview: \"In conclusion, this analysis characterizes\
    \ the harmful impacts of PM2.5 from wildland fire smoke on the health of the California\
    \ population during the 11-year period of 2008 to 2018.\"\nQuantitative material:\
    \ \"We estimate that between 52,480 and 55,710 premature deaths are attributable\
    \ to fire-only PM2.5 exposures, with an associated economic valuation of $432\
    \ billion to $456 billion.\"\nMethodology: \"This health impact analysis applies\
    \ CTM estimates of wildland fire PM2.5 to estimate mortality outcomes using high-resolution\
    \ health data... We used daily modeled PM2.5 concentrations for 2008 to 2018 for\
    \ the state of California at a 12-km grid spatial resolution, estimated using\
    \ the U.S. EPA\u2019s CMAQ (version 5.0.1 to 5.3) modeling system.\"\nHighlights:\
    \ \"These findings have direct implications for California, a state at the forefront\
    \ of climate policy development with many fire-prone regions and a diverse population\
    \ to protect.\"\nMore Notes: \"In sum, to estimate mortality impacts, we have\
    \ assumed that particulate matter-associated health effects from any source are\
    \ proportional to total inhaled dose of particles... Last, burden estimates are\
    \ independent of the differences in the shape of the concentration-response function\
    \ between undifferentiated PM2.5 and wildfire PM2.5, only depending on the magnitude\
    \ of the slope of the log-linear model used to capture toxicity in time series\
    \ studies.\"\n"
  10: "yaml\nEvaluation overview: \"We quantified the total mortality burden for exposure\
    \ to PM2.5 due to wildfires in California at the ZIP code level, using 11 years\
    \ of CMAQ data (2008 to 2018).\"\nDrivers of Risk: \"We quantified the total mortality\
    \ burden for exposure to PM2.5 due to wildfires in California at the ZIP code\
    \ level, using 11 years of CMAQ data (2008 to 2018).\"\nQuantitative material:\
    \ \"We compared our final death count to the total reported deaths in the state\
    \ (from the same CDPH data source) as a metric of quality assurance, and the total\
    \ estimates varied by less than 0.35%.\"\nMethodology: \"We quantified the total\
    \ mortality burden for exposure to PM2.5 due to wildfires in California at the\
    \ ZIP code level, using 11 years of CMAQ data (2008 to 2018). Based on the evaluation\
    \ of the modeled data shown in the Supplementar y Materials, we found that the\
    \ highest modeled fire- only PM2.5 values skew the correlations between the modeled\
    \ and observed concentrations; thus, there is more uncertainty associated with\
    \ those high concentrations. Therefore, we conducted two mortality analyses: (i)\
    \ base case, with no outliers removed, to characterize the potential impact of\
    \ extremely high wild- fire concentrations on mortality ; and (ii) mod cap, capping\
    \ fire- only PM2.5 concentrations falling outside of the 99.9th percentile of\
    \ modeled values (at 143 \u03BCg/m 3; see table\_S11), considering that the model\
    \ is expected to perform less reliably far outside of the dataset. Then, we developed\
    \ a wildfire- specific chronic dose- response coefficient (Eqs.\_ 1 and 2 and\
    \ see the Rationale for the dose- response function section in Discussion); the\
    \ term \u201Cchronic\u201D is also referred to as \u201Clong term\u201D by some\
    \ studies in the literature [e.g., Fann et\_ al. ( 32)].\"\nHighlights: \"Therefore,\
    \ the application of an undifferentiated dose- response value to wildland fire-\
    \ specific PM 2.5 exposures may underestimate mortality impacts. To address this\
    \ concern, and to avoid sta- tistical shortcomings (e.g., mortality displacement)\
    \ associated with quantifying mortality impacts from short- term, daily PM 2.5\
    \ exposures ( 93), we calculated a chronic dose- response value us- ing Eqs.\_\
    1 and 2 below, which account for potential added toxicity of wildfire smoke as\
    \ is suggested in several California- specific analyses (25, 36).\"\n"
  11: "Source material\nThen, we calculated the mortality burden from exposure to\
    \ PM2.5 due to wildland fire smoke in the state of California using Eq.\_3 below\
    \ (58) ... Last, we apply the EPA\u2019s value of a statistical life (VSL) to\
    \ these mortality impacts to estimate the total valuation of the health burden,\
    \ using Eq.\_4 below ... where \u03B2       WL is the result of Eq.\_2 (dose-\
    \                         response value), \u0394PM2.5ij represents the change\
    \ in PM2.5 concentration from wildland fire smoke in year i and ZIP code j ...\
    \ Last, we apply the EPA\u2019s value of a statistical life (VSL) to these mortality\
    \ impacts to estimate the total valuation of the health burden, using Eq.\_4 below\
    \ ... and V is the EPA\u2019s VSL, which is $8.7 million in 2015 dollars (inflation\
    \ year). We accounted for income growth to the year 2015 using publicly available\
    \ income growth factors used in the U.S. EPA\u2019s BenMAP- CE tool (58) because\
    \ changes in income can affect willingness to pay for reduced risk of mortality.\
    \ Last, we applied a 3% discount rate over the 11-year period to estimate the\
    \ net present value of our economic estimates (94) ... We used a Monte Carlo distribution\
    \ to estimate the final dose-                         response value used. We\
    \ calculated a 95% CI for the estimated dose-                        response\
    \ value. Then, we calculated the mortality burden from exposure to PM2.5 due to\
    \ wildland fire smoke in the state of California using Eq.\_3 below (58) ... Last,\
    \ we apply the EPA\u2019s value of a statistical life (VSL) to these mortality\
    \ impacts to estimate the total valuation of the health burden, using Eq.\_4 below\
    \ ... We accounted for income growth to the year 2015 using publicly available\
    \ income growth factors used in the U.S. EPA\u2019s BenMAP- CE tool (58) because\
    \ changes in income can affect will- ingness to pay for reduced risk of mortality.\
    \ Last, we applied a 3% discount rate over the 11-year period to estimate the\
    \ net present value of our economic estimates (94).\n"
