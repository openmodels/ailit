  220: "In this paper we present a conceptual framework for a climate risk assessment\
    \ based on the so-called impact chains. The method follows a general assessment\
    \ framework consistent with the IPCC AR5 concept on climate risk. This framework\
    \ has been developed by Eurac Research within the context of various projects\
    \ with the German Environment Agency and the German Gesellschaft f\xFCr Internationale\
    \ Zusammenarbeit (German Corporation for International Cooperation)\u2014GIZ.\
    \ It has been applied in almost twenty national climate risk assessments worldwide\
    \ (e.g., Burundi, Bangladesh, Thailand, Vietnam, Madagascar) and has been perceived\
    \ as (1) an appropriate means for risk analysis, (2) a useful tool for communication\
    \ of complex cause-effect relationships in climate change impacts and risks, and\
    \ (3) a great approach to identify entry points for adaptation measures. For an\
    \ operational risk assessment, impact chains serve as a basis for the selection\
    \ of appropriate models, indicators or guide more qualitative, expert-based assessments."
  221: "Source material: Responding to the current lack of frameworks and guidelines\
    \ for climate risk assessments, Eurac Research has created a conceptual framework\
    \ called climate impact chains together with various partners. Impact chains are\
    \ conceptual models based on cause-effect chains that include all major factors\
    \ and processes leading to speci\uFB01c climate risks in a speci\uFB01c context.\
    \ In the meanwhile, this framework has been applied in almost twenty national\
    \ climate risk assessments worldwide (e.g., Burundi, Bangladesh, Thailand, Vietnam,\
    \ Madagascar) and is proposed by the new ISO 14091 as one of the concepts for\
    \ climate risk assessments in the context of adaptation planning."
  222: "yaml\n\"Evaluation overview\": \"Impact chains are usually developed in a\
    \ participatory manner together with stakeholders and experts to create a commonly\
