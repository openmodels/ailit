    To identify future irrigation water demand in the Orb case study under climate
    change, we first defined future scenarios of land use changes through workshops.
    Agroclimatic simulation models were then used to determine the changes in irrigation
    needs. Future urban demand was also estimated using an econometric model, based
    on population, average household income, price, and climate. Local participation
    was key for developing an integrated vision of the evolution of agriculture and
    implications for water management in the context of the two SSPs and the climate
    change conditions corresponding to RCP 8.5.

    '
  161: The main contribution of this work is the development of a framework to identify
    adaptation options to climate change at the basin through the combination of a
    top-down (TD) approach to assess climate change impacts at the local scale with
    vulnerability assessment and definition of socioeconomic scenarios and adaptation
    options through participative methods (BU approach). The proposed "TD meets BU"
    approach provides a systematic and practical method for supporting the selection
    of adaptation measures at the basin by comprehensively integrating the goals of
    economic efficiency (through river basin optimization), social acceptability (through
    BU definition of scenarios and measures, and by addressing equity in cost allocation),
    environmental sustainability (through environmental constraints in water management),
    and robustness (testing robustness of adaptation portfolios across scenarios,
    and selecting robust/least-regret programs).
  164: 'Source material here: As the adverse effects of climate change are increasingly
    becoming unavoidable, calls for improving climate adaptation assessments have
    gathered interest at the global scale. Infrastructure policymakers and practitioners
    are now interested in understanding climate vulnerabilities and risks that capture
    the systemic nature of failure propagation seen across interconnected networks...
    There is increasing evidence that climate change will increase variability of
    weather patterns, magnifying the severity of short-term shock events such as flooding,
    storms, heatwaves, while also extending long-term shock events such as droughts...
    These methodologies adopt a bottom-up approach that focuses on creating data-rich
    representations of infrastructure network attributes, resource flows, and socio-economic
    indicators that are all used for quantifying direct and indirect risks to network
    assets exposed to extreme climate hazards at multiple scales... The paper presents
    recent technical methodological and tool-based advances made in climate vulnerability,
    risk, and adaptation modeling of large-scale infrastructure networks. Insights
    from different case studies are presented to show how such methodologies have
    been used in practice for informing different policy needs. The paper concludes
    by identifying the existing gaps and future opportunities for such bottom-up infrastructure
    network vulnerability, risk, and adaptation assessment methodologies.'
  165: "yaml\nEvaluation overview: \"The focus of this paper is on building data-driven\
    \ decision-making models and tools for evaluating the costs and bene\uFB01ts of\
    \ climate adaptation of infrastructure networks at different spatial scales.\"\
    \nDrivers of Risk: \"What are the key network locations and assets exposed to\
    \ current and future climate-change driven hazards?\"\nMethodology: \"This paper\
    \ discusses how the above questions are being answered with generalized methodologies\
    \ supported by data-driven case studies in different countries and at the global\
    \ scale.\"\nHighlights: \"Through these studies, the paper highlights the speci\uFB01\
    c issues, recent advances, and further opportunities in creating technical knowledge\
    \ to improve the information of climate adaptation modeling of infrastructure\
    \ networks.\"\nMore Notes: \"Methodologies for Evaluating Network Vulnerabilities,\
    \ Risks, and Adaptation\"\n"
  166: "Source material: The methodological steps toward a hybrid top-down and bottom-up\
    \ climate vulnerability, risk, and adaptation assessment of infrastructure networks\
    \ involve combining (Hall et al. 2019; Pant et al. 2020): (1) Climate hazard information\
    \ that includes spatially correlated probabilities, magnitudes, and extents of\
    \ hazard events under current and future climate scenarios; (2) spatial representations\
    \ of network point and line assets to evaluate their exposures to various climate\
    \ hazards; (3) direct vulnerability measures of the exposed network assets that\
    \ quantifies the sensitivity of the assets to be damaged by varying severities\
    \ of climate hazards... Infrastructures operate as a \u201Dsystem-of-systems\u201D\
    \ of interdependent networks that are increasingly reliant on each other for services\
    \ under normal working conditions, but which also create failure cascades from\
    \ an originating asset toward the rest of the system-of-systems (Hall et al. 2019).\
    \ Most climate vulnerability, risk, and adaptation analysis studies fail to capture\
    \ the sensitivities of cascading failure mechanisms across infrastructure networks\
    \ along with the sensitivities associated with weather and climate extremes....indirect\
    \ vulnerability measures that quantify the socio-economic effects resulting from\
    \ disruptions of infrastructure network services in terms of numbers and monetary\
    \ values attached to household and business customers; (6) further indirect vulnerability\
    \ measures of impacts to the regional economic flows that quantify the effects\
    \ of production and labour disruptions on the outputs of macroeconomic sectors..."
  167: "Source material here.\nThe effectiveness of different resilience options [...]\
    \ is evaluated in terms of their costs and the benefits of avoiding direct and\
    \ indirect risks of failures.\nClimate adaptation assessment involves the consideration\
    \ of changing costs and benefits (avoided risks) over the life cycle of asset\
    \ and network management.\nFrom all simulated failure events, nearly half (46%)\
    \ of the total disruptions could be attributed to network propagation effects\
    \ instead of disruptions attributed to the directly failed assets (Zorn et al.\
    \ 2020).\nIf failures were initiated in the electricity network, then about 40%\
    \ of failure events led to further disruptions to telecoms and at least one of\
    \ rail and water networks, which set up another sequence of failures where 20%\
    \ of failure events led to further electricity failures, and 5.7% to another order\
    \ of telecoms failures.\nBut if failures were initiated in the telecom network,\
    \ then only about 7.8% [resulted in further disruptions].\nA cost\u2013benefit\
    \ analysis is done to estimate network asset and location-specific benefit\u2013\
    cost ratios (BCR) that help identify for which options the avoided asset risks\
    \ would be worth implementing (BCR \u2265 1) and which options would be more expensive\
    \ than the avoided risks (BCR < 1).\nThe purpose of the methodology outlined above\
    \ is to create an effective high-level screening whereby the efficacy of different\
    \ types of adaptation options can be compared and locations and assets with high\
    \ (or low) adaptation benefits can be narrowed down for further investigation.\n\
    The costs over the lifetime include (1) Initial investment costs of adaptation\
    \ which are the one-time costs of a resilience option when it is implemented and\
    \ (2) costs of routine maintenance (assumed to apply every year) and periodic\
    \ maintenance (assumed to apply every few years) over the life cycle of the asset.\n\
    To understand the cascading nature of network failures, a recent study [...] in\
    \ New Zealand [...] showed that from all simulated failure events, nearly half\
    \ (46%) of the total disruptions could be attributed to network propagation effects\
    \ instead of disruptions attributed to the directly failed assets (Zorn et al.\
    \ 2020).\nAlso, recent analysis on infrastructure resilience in Great Britain\
    \ [...] showed that if failures were initiated in the electricity network, then\
    \ about 40% of failure events led to further disruptions to telecoms and at least\
    \ one of rail and water networks, which set up another sequence of failures where\
    \ 20% of failure events led to further electricity failures, and 5.7% to another\
    \ order of telecoms failures.\n"
  168: "  \n\"of network failures by 89%\u201394%. While they do not include any climate\
