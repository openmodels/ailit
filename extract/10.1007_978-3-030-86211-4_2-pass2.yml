    \ of predicted future climate scenarios (e.g. sea-level rise and extreme sea levels),\
    \ based on available projections at the regional or local scale...\"\n\"Quantitative\
    \ material\": \"For the effectiveness index ( Ie) Ferreira et al. (2019) proposed\
