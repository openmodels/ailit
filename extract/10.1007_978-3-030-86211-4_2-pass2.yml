  88: 'The approach has an added advantage for regular risk assessments that it can
    be updated as new scenarios appear, without needing to re-run the underlying impact
    models. ... The approach is currently being tested in five sectors at national
    scale in Finland (https://www.syke.fi/projects/adapt-first). ... Based on previous
    analyses such as those illustrated above, we conclude that there are three challenges
    requiring special attention in this new model-based approach to risk assessment:
    (a) ensuring the salience and credibility of the impact modelling conducted and
    outputs obtained, through engagement with relevant stakeholders, (b) co-exploration
    of the capabilities of current impact models and the need for improved representation
    of adaptation and (c) co-identification of critical thresholds for key impact
    indicators and effective representation of uncertainties.'
