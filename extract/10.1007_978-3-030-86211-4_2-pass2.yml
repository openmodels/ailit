  231: "The proposed approach is aimed in general at analysing alternative options\
    \ (plans, policies, projects) affected by climate risks ... Six main steps are\
    \ foreseen\u2014developed upon the framework ... depicted in the block diagram\
    \ ... The first step consist in the identification of the objectives of the actions\
    \ ... In the second step, stakeholders are involved ... to define the needs for\
    \ simulation models ... Fig. 26.2 Block diagram for the proposed approach ..."
  232: "Source material here. The definition of the conceptual model allows\u2014\
    in a third step\u2014to identify a set of plausible solutions to the given problem\
    \ and in the specific SES in question. In climate change applications, scenarios\
    \ try to represent the main driving forces deemed relevant so as to bring the\
    \ correct information into the selection of policies in response to climate changes.\
    \ Scenario development should be done by referring to the most important exogenous\
    \ variables identified in the first step of the approach. The development of participatory\
    \ scenarios is increasingly used to stimulate local actors to consider changes\
    \ that had not been contemplated previously, create integrated images of a future\
    \ that must be considered in continuous evolution and ensure that multiple skills\
    \ and subjective interpretations are taken into account. In the following\u2014\
    forth\u2014step, models are utilised, together with expert knowledge. In the transition\
    \ from the global to the local analysis phase (downscaling), many quantitative\
    \ methods based on mathematical models have been proposed. Participatory qualitative\
    \ scenarios are used to create new ideas and strategies, clarify the options and\
    \ identify future problems and opportunities, thus incorporating more points of\
    \ view. In the fifth step a classical multi-criteria analysis (MCA) is combined\
    \ with uncertainty analysis (UA), with which the multiple dimensions of the problem\
    \ are assessed through decision-relevant indicators. Numerous MCA matrices are\
    \ generated to approximate the performance of each alternative and create a range\
    \ of possible outlooks. The goal in scenario analysis is not to predict the future\
    \ but to gain a better understanding of possible future alternatives to be able\
    \ to assess how robust the different decisions or options can be within a wide\
    \ range of plausible futures."
  233: "The CART (Classi\uFB01cation and Regression Trees) algorithm here allows for\
    \ an identi\uFB01cation of critical score values able to overturn the \uFB01nal\
    \ ranking (step 6) to be shared with the involved actors. The combination of the\
    \ various components of the proposed methodology results in a comprehensive and\
    \ intuitive decision support system that helps the decision-maker to mitigate\
    \ the impacts of uncertainty and to increase the system\u2019s adaptation and\
    \ resilience to scenario changes, by identifying the most robust solution, which\
    \ is to be interpreted as the option that ranks best under most of the simulated\
    \ alternative scenarios. Moreover, climate change drivers must be considered jointly\
    \ with others and in particular with socio-economic ones."
  234: "Source material here: A combination of qualitative and quantitative modelling,\
    \ with multi-criteria analysis and data mining techniques, can signi\uFB01cantly\
    \ improve the potentials of modelling techniques alone. Hence, instead of following\
    \ the traditional path of assessing discrete and deterministic, or in some cases\
    \ probabilistic, values and searching for optimal solutions, decision-making for\
    \ climate change adaptation requires lying out all the conditions under which\
    \ plausible solutions may emerge and search for more robust options. Decision-makers\
    \ are thus informed about how far unknown future events led by various related\
    \ or isolated factors may in\uFB02uence their ability to adapt and cope with the\
    \ negative consequences and the positive opportunities that may arise."
