  224: 'Source material here.

    For an operational risk assessment, impact chains can serve as a backbone for
    the integration of various methods such as models, indicators or participatory
    data collection. The original approach of the Vulnerability Sourcebook...proposes
    an indicator-based approach to quantify each risk component... Indicators are
    transformed into a common, normative value scheme. Often, a more comprehensive,
    narrative aggregation of data and information collected along the factors and
    elements of an impact chain is a valid alternative. A typical final result is
    a report with detailed description of each single climate risk consisting of a
    mix of narrative information, graphs and maps with information on which underlying
    factors lead to a specific climate risk in the specific context, which of them
    are particularly relevant and could be an entry point for adaptation.

    '
  225: "  \n\"Impact chains can foster the discussion on adaptation demand already\
    \ in an early, qualitative stage of a risk assessment.\"  \n\"1. Hazard: - Heavy\
    \ precipitation: This is shown as the initial trigger for flooding.\"  \n\"Several\
    \ factors contribute to increased vulnerability in flooding situations: - Reduced\
    \ natural retention capacity: Linked to wetland degradation. - Lack of protected\
    \ forest areas: Linked to deforestation. - Lack of urban planning: Associated\
    \ consequences are addressed by capacity building and building elevated houses.\"\
    \n"
  226: "plaintext\nParticularly, the participatory approach has been highly appreciated\
    \ in order to obtain a structured and agreed picture of context speci\uFB01c climate\
    \ risks...Modelling such complex relationships requires a hybrid approach (quantitative/qualitative).\
    \ A challenge related to this hybrid approach is validation. While climate models\
    \ and some impact models can be validated for the current situation, indicator-based\
    \ and expert-based approaches are often more hypothesis driven. Options for validation\
    \ of hybrid and hypothesis driven methods are an interesting \uFB01eld for future\
    \ research. Data availability is often a bottleneck for the de\uFB01nition and\
    \ population of indicators, data availability should be discussed with them early\
    \ in the process. Impact chains have been perceived as a very useful tool for\
    \ analysis as well as for communication of complex cause-effect relationships\
    \ in climate change impacts and risks. In each risk assessment a discussion on\
    \ which effects of climate extremes and climate change would fundamentally threaten\
    \ a system (\u201Chigh risk\u201D) and which effects might be tolerable or are\
    \ within the coping capacity of a system (\u201Clow risk\u201D) should be conducted.\
    \ Every risk assessment is in the end a value-based approach. Risk depends on\
    \ priorities, values, targets and normative settings.\n"
  228: The purpose of this work is to present an operational approach to include consideration
    of global change drivers (climatic, economic, social, etc.) in support to the
    design of local policies or investment plans... Multi-criteria analysis coupled
    with uncertainty analysis can contribute with methodologically sound and operational
    solutions. This paper elaborates on a series of recent cases with the ambition
    to extract common elements for a general methodological framework...Models play
    a fundamental role in both cases, but they rarely cover the whole set of variables
    needed for decision making and the outcomes usually require integration of qualitative
    expert knowledge or simply subjective judgements.
