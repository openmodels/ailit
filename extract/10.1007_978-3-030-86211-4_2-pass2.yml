  142: 'Source material here.

    Modelling approaches are essential to help stakeholders to develop policies toward
    long-term actions for better food production systems, which are more resilient
    to climate change impacts and at the same time, contribute to halting climate
    change.

    Land-use modelling offers a unique chance to simulate the impacts of the adoption
    of land-based climate change mitigation measures, the role of the different actors
    along the food systems, the effect of the continuing globalization of trade in
    food products and increasing demand for agricultural goods.

    Here, we describe a coupled model system, the Land System Modular Model (LandSyMM)
    which aims to support future climate research by assessing the interplay between
    natural system dynamics and socio-economic processes related to supply and demand.
    The multiple scales represented allow interactions of bottom-up adaptation dynamics
    and top-down mitigation policies to be represented and explored.

    The resolution of the LandSyMM enables us to explore adaptation measures such
    as related to crop productivity variations from changes in management practices
    (e.g. fertilizer and irrigation rates), or management in forests.

    Existing models have highlighted key societal drivers and were applied to a wide
    range of scenarios. However, current model applications tend to focus on the climate
    change mitigation potential of land use rather than placing adaptation at their
    core.

    '
  143: "LandSyMM is currently being run at 0.5\xB0 spatial resolution. The dynamic\
    \ global vegetation model (DGVM) computes for example changes in crop yields at\
    \ a given location, in response to climate change, irrigation and fertilizer application\
    \ which can be adjusted \uFB02exibly as part of mitigation strategies. PLUM simulates\
    \ demand and trade of commodities...by adjusting commodity prices instead of assuming\
    \ market equilibrium, allowing short-term surplus and de\uFB01cits. This includes\
    \ also costs for irrigation, fertilizer use and management intensity (e.g., pesticide\
    \ and machinery use). LPJ-GUESS water runoff outputs are used by PLUM to constrain\
    \ irrigation use from water availability at the basin level. Therefore, changes\
    \ in water resources as well as plant requirement under future climates can drive\
    \ adaptation responses in land management."
  144: "Source material here.\n\"The LandSyMM approach offers the unique opportunity\
    \ to represent trade-offs, responses, and cross-scale and international interactions\
    \ within a dynamic system... Greenhouse gas emissions from land-use change and\
    \ land management feedback to simulated climate... From a consumption perspective,\
    \ LandSyMM captures dietary requirements and preferences at the country level...\
    \ In addition to the detailed representation of land management practices... assess\
    \ the effects of autonomous decisions from the food system\u2019s actors and their\
    \ interactions with mitigation policies.\"\n\"...study the interactions between\
    \ a country who might have suffered from shocks (e.g. \uFB02ood, drought, yield\
    \ shocks, price shocks, pandemic and cyber-attacks) and the rest of the world\
    \ under growing climate change pressure. The changing risk of some of these shocks,\
    \ such as drought and \uFB02ood risk, can be simulated by processes endogenous\
    \ to LandSyMM...\"\n\"...it is possible to implement policy levers such as international\
    \ trade tariff barriers and agricultural subsidies into the model to investigate\
    \ their impacts on the food systems, dietary requirement, land use, climate but\
    \ also their impacts on the potential bene\uFB01ces of certain climate adaptation\
    \ measures.\"\n"
  145: " \n\"Autonomous adaptation in land manager choices is likely to be substantially\
    \ driven by economic interests. As a result, land manager decisions are likely\
    \ to minimize impact to market-based outputs, i.e. food and timber production.\
    \ This means that the outcome for environmental externalities, including greenhouse\
    \ gas emissions, fresh-water use and biodiversity loss may be detrimental.\" \n\
    \n\"Expansion of agriculture to new areas is expected to lead to carbon losses\
    \ for soil and vegetation, while increases in food prices are likely to result\
    \ in increased intensification of agricultural production, with negative environmental\
    \ consequences.\"\n\n\"LandSyMM is an important new tool with the capacity to\
