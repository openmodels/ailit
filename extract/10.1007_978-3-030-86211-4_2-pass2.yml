    on multiple objectives.
  155: Integrates top-down (climate model chains) and bottom-up (stakeholder participatory
    process) approaches to select adaptation measures. Uses a hydro-economic model
    to select cost-effective adaptation combinations. Climate checks portfolios based
    on trade-offs between adaptation costs and reliability.
  156: Compares 'top-down' (TD) and 'bottom-up' (BU) approaches to climate change
    adaptation plans. TD uses downscaled climate projections from GCMs to estimate
    potential impacts and analyze adaptation measures. BU studies vulnerability thresholds
    and local responses to define locally suitable adaptation strategies.
  157: Describes a framework for robust adaptation decision-making integrating top-down
    and bottom-up approaches.
  158: Future urban water demand is estimated using an econometric model considering
    population, income, price, and climate.
  161: A top-down meets bottom-up approach is used to identify adaptation options
    at the basin scale by combining climate change impact assessment, vulnerability
    assessment, socioeconomic scenario definition, and participative methods.
  164: Bottom-up approach focusing on data-rich representations of infrastructure
    network attributes, resource flows, and socio-economic indicators.
  165: Discusses generalized methodologies supported by data-driven case studies to
    assess vulnerabilities, risks, and adaptation of infrastructure networks.
  166: The analysis involves a hybrid top-down and bottom-up approach, combining climate
    hazard information with spatial representations of network assets to evaluate
    exposures and vulnerabilities.
  167: "Cost\u2013benefit analysis is done to estimate network asset and location-specific\
    \ benefit\u2013cost ratios (BCR) that help identify for which options the avoided\
    \ asset risks would be worth implementing (BCR \u2265 1) and which options would\
    \ be more expensive than the avoided risks (BCR < 1). This methodology is intended\
    \ for high-level screening to compare adaptation options and identify locations\
    \ and assets with high/low adaptation benefits for further investigation. Includes\
    \ initial investment costs, routine maintenance costs and periodic maintenance\
    \ costs."
  168: Network analysis considering climate model sensitivities and scenarios with
    transport and economic growth forecasts to estimate risks from failures of key
    transport network links. BCR analysis of upgrading roads and bridges to higher
    climate resilience designs.
  170: Analysis uses GIS application with data layers for flood exposure and economic
    indicators specific to road networks.
  171: Focus on better data creation and sharing, empirical evidence of cascading
    mechanisms, data on indirect economic losses, empirical evidence on timelines
    and patterns of infrastructure recovery, and local knowledge on adaptation options.
  173: Longitudinal accounting and analysis of public transaction costs to navigate
    uncertainties.
  174: Proposes a new research agenda involving interdisciplinary integration of socio-hydrology
    and economics to evaluate the socio-economic and environmental implications of
    adaptation policies.
  176: The paper discusses conventional hydroeconomic models using external economic
    sub-models integrated with hydrologic models and criticizes them for not capturing
    two-way feedbacks. It also describes modular approaches where systems are represented
    as specialized mathematical elements and connected through protocols, allowing
    for non-linearities.
  177: The analysis uses a protocol-based modular framework to connect multiple systems
    through two-way feedbacks, leading to a large database of simulations representing
    different scenarios and modeling settings.
  183: "The paper discusses the use of Environmentally Extended Input\u2013Output\
    \ models and Process-based LCA inventory data to identify emission dense sectors\
    \ and increase decision-making tool resolution."
  186: Hybrid models are noted as a method to incorporate the strengths of both EEIO
    and LCA, minimizing aggregation and truncation errors.
  187: The page discusses the use of different models for assessing GHG emissions,
    including EEIO models, hybrid models, and process-based LCA, positioned along
    a continuum from macroscale to microscale.
  191: Insurers can contribute to climate change adaptation through underwriting and
    pricing practices; including risk reduction measures in insurance products can
    reduce avoidable damages.
  192: Insurers could incentivize adaptation by offering premium discounts for policyholders
    implementing flood prevention measures.
  193: Risk-based premium calculation involves implementing different vulnerability
    curves corresponding to risk reduction measures and assessing differences in estimated
    losses.
  195: No relevant information
  199: Suggests using a systems approach, the Nuffield Intervention Ladder, and the
    Behaviour Change Wheel to design cost-effective public health behavior change
    policies for climate change adaptation.
  203: 'The page discusses the Behaviour Change Wheel framework to develop, assess,
    and modify interventions targeting key influences on behavior, using criteria
    like APEASE: Acceptability, Practicability, Effectiveness, Affordability, Side-effects,
    and Equity.'
  205: Suggests a systems approach using policy options and the Behaviour Change Wheel
    for societal transformation actions.
  209: Adaptation modelling, which simplifies complexity to enable better management
    and decision under uncertainty.
  210: Solutions to the uncertainty challenge include the use of multi-criteria analysis
    coupled with uncertainty analysis.
  212: The paper discusses the use of model simulations to assess the performance
    of adaptation measures under future conditions.
  213: The paper aims to capture dynamics of risk by integrating climate hazard, exposure,
    and vulnerability for impact modeling.
  214: The integration of future dynamics of exposure and socio-economic scenarios
    into models to estimate possible future developments in population, economy, and
    asset values for projecting risk in conjunction with climatic hazard scenarios.
  216: 'The analysis considers two approaches for modeling impacts and adaptation:
    assuming autonomous reductions in vulnerability and assuming observable planned
    adaptation actions, using these to project future risks and adaptation baselines.'
  217: Argues that dynamics of autonomous risk processes are not sufficiently included
    in impact modelling. Recommends using past trends of exposure and vulnerability
    as a baseline, understanding vulnerability reductions, tailoring impact metrics
    to local situations, and using bottom-up studies to assess local capacities and
    governance.
  218: References include studies using a range of methodologies including risk analysis,
    empirical evidence analysis, and literature reviews to understand and project
    disaster losses and climate change impacts, and to attribute economic costs to
    climate change.
  220: Impact chains are used to select appropriate models and guide qualitative,
    expert-based assessments for operational risk assessment.
  221: Eurac Research created a conceptual framework called climate impact chains.
    Impact chains are conceptual models based on cause-effect chains that include
    all major factors and processes leading to specific climate risks in a specific
    context.
  222: The analysis uses a conceptual modeling approach involving impact chains, developed
    in a participatory manner with stakeholders and experts. It aims to integrate
    local data and knowledge to understand root causes of climate risks.
  223: The analysis uses the development of impact chains in participatory workshops,
    combined with field visits, to identify system vulnerabilities and exposure factors.
  224: The analysis includes narrative aggregation of data and information collected
    along the factors and elements of an impact chain.
  225: Impact chains are used as a qualitative tool to foster discussion on adaptation
    needs and identify vulnerabilities in early risk assessment stages.
  226: Data availability, particularly for exposure and vulnerability, is a bottleneck
    and should be discussed early in the process.
  228: The paper elaborates on recent cases to extract common elements for a general
    methodological framework.
  230: The paper discusses the implementation of Robust Decision-Making (RDM) to identify
    robust solutions for climate proofing.
  231: The analysis involves a structured decision-making process with six main steps,
    including problem identification, socio-ecosystem recognition, model development,
    stakeholder involvement, and scenario development.
  232: A five-step approach is presented, which includes defining a conceptual model,
    developing exploratory scenarios (using SSPs and RCPs), utilizing global models
    and expert knowledge (downscaling), performing multi-criteria analysis (MCA) with
    uncertainty analysis (UA), and generating MCA matrices to assess the performance
    of alternatives under different scenarios.
  233: The paper describes a decision support system that combines data mining techniques
    (specifically CART - Classification and Regression Trees) with expert knowledge
    and climate scenarios to help decision-makers mitigate the impacts of uncertainty
    and increase system adaptation to climate change. It identifies critical score
    values that can change final rankings of options.
  234: Suggests combining qualitative and quantitative modeling with multi-criteria
    analysis and data mining to improve modeling techniques. Recommends exploring
    conditions under which plausible solutions emerge and searching for robust options
    instead of seeking discrete, deterministic, or probabilistic values and optimal
    solutions.
  238: The JPI Climate and ERA4CS projects develop tools, methods, and standards to
    produce climate projections with impact and vulnerability assessments to support
    stakeholder decisions. AXIS aims to improve coherence, integration, and robustness
    of climate impact research.
