  97: "Source material here. Climate change may alter the precipitation scheme dramatically\
    \ in many areas, with more intense rainfall combined with more dry periods. The\
    \ need for combined efforts in local instrumentation and modelling development\
    \ is pronounced. This study on landslide modelling is focussed on addressing the\
    \ effects of vegetation on rainfall-induced landslides. However, climate change\
    \ may also increase the frequency of droughts, which lead to tree mortality and\
    \ forest \uFB01res. Possible extreme events like these, which still imply the\
    \ vegetation, need to be studied with regard to the initiation of extreme surface\
    \ runoff and \uFB02ash \uFB02oods due to heavy rainfall. In hazard-prone areas\
    \ is herein proposed, where the hydrological and mechanical reinforcement provided\
    \ by the vegetation on the soil properties are classified whether they are root-related\
    \ or canopy-related. Modelling the vegetation effects on slope stability needs\
    \ many parameters related to the vegetation features which are strongly time-dependent.\
    \ Moreover, vegetation features differ from species to species. There is a need\
    \ to understand how to consider the vegetation growth effects. Only one safety\
    \ factor is calculated as average. Small-scale effects of vegetation on slope\
    \ stability are not calculated. However, vegetation may not be distributed homogeneously,\
    \ thus there is a need to consider time-spatial variation of vegetation effects\
    \ on a slope (Stokes et al. 2014)."
