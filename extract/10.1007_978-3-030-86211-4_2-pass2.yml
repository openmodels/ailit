  68: "plaintext\nto assure ensemble quality as the ensemble composition representing\
    \ the spread of model projections and the use of medians instead of the mean as\
    \ an average descriptor. For situations of high uncertainty, the response surfaces\
    \ approach is used. An Impact Response Surface (IRS) consists of a plotted surface\
    \ that depicts the response of a studied variable (the so-called impact variable,\
    \ e.g., crop yield) to combined changes in two explanatory variables (e.g., P\
    \ and T). An Adaptation Response Surface (ARS) plots the difference between the\
    \ impact variable responses (e.g., yield) with and without adaptation being considered,\
    \ usually as a percentage of change. Finally, we develop an index of wide applicability\
    \ for reducing the uncertainty, the so-called Ensemble Outcome Agreement (EOA)\
    \ to assessing the confidence of the decisions taken regarding a threshold level,\
    \ such as recommended adaptation options that are projected to provide positive\
    \ adaptation values by the ensemble.\nAs application of the multi-model ensemble\
    \ modelling, AOCK and IRS and ARS, recommendations for adaptation of wheat in\
    \ Spain were produced as shown in Table 3 of Ruiz-Ramos et al. (2018). When EOA\
    \ was applied to this dataset, Fig. 3 of Rodr\xEDguez et al. (2019) was obtained.\
    \ The main added value of this further improvement was that by assigning an EOA\
    \ value to every adaptation option, those that are otherwise promising in terms\
    \ of adaptation response but show low confidence (i.e., low values of EOA) can\
    \ be discarded, in favour of those with more confidence.\nWhile most of the winter-wheat\
    \ based adaptations under rainfed conditions provided a very low value of EOA,\
    \ at least 1 adaptation option, mainly based on spring wheat, was found with a\
    \ high EOA value for every perturbation combination of P and T. This supports\
    \ the idea that adaptation would be possible under a wide range of future conditions.\n"
