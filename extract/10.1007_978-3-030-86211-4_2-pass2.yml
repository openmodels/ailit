    case studies, a key recommendation of this paper is to focus on, among others:
    (1) better data creation and sharing of asset locations, network connectivity,
    structural and conditions of assets, operational rules of networks; (2) empirical
    evidence of cascading mechanisms seen during network failures and their resulting
    disruptive impacts; (3) data on indirect economic losses that are less understood
    and validated in practice, as most risk assessments and investment decisions are
    being made based on direct damage losses; (4) empirical evidence on the timelines
    and patterns of infrastructure asset, network, and socio-economic recovery for
    disruptions; and (5) local knowledge on adaptation options and their costs. All
    the above requires multi-sectoral and multi-organizational commitment as it is
    a system-of-system problem. There is now a global call for integrating adaptation
    needs in the infrastructure decision-making process from the outset of national
    infrastructure planning and sustainable development (Global Commission of Adaptation
    2019; Hall et al. 2019), which shows that there would be increased uptake for
    such methodologies supported by better data analytics and tools to inform climate
    risk and adaptation decision-making.

