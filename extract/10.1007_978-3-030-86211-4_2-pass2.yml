    "Methods and models for water resource system simulation, risk analysis, and decision
    analysis provide powerful tools for dealing with the challenge of climate change
    in the water sector. These models enable learning about the complex behaviour
    of river basins, testing of alternative adaptation decisions, exploration of uncertainties,
    and navigation of trade-offs."


    "The essence of water resource system simulation is predicting the hydrologic,
    socioeconomic, and environmental consequences of water management, especially
    in the face of climate change. These are the variables, such as future water availability,
    the economic value of water, and the reliability of environmental flows, that
    are important to governments, industries, and the public as they adapt to climate
    change."


    "A water resources system is here defined as the whole made from connected hydrologic,
    infrastructure, ecologic, and human processes that involve water."

    '
  150: " \nSimulation modelling is at the core of the decision analysis methods described\
    \ above. Simulation modelling is particularly powerful because of the capacity\
    \ to test and explore shocks and scenarios that have never happened, by subjecting\
    \ a simulator of a water resource system to those conditions \u2018in silico\u2019\
    . System stress testing through computer simulation is one of the most important\
    \ tools for water resources planning in the face of climate change, especially\
    \ when that is combined with scenario exercises for the multiple stakeholders\
    \ responsible for a system. This approach, typically referred to as exploratory\
    \ modelling, uses simulation models to ask \u2018what if\u2019 questions, unravelling\
    \ the implications of different assumptions and hypotheses about future trends\
    \ on water-related outcomes of concern (e.g., the frequency of water shortages).\n\
    \nThe purpose of water resource system simulators is to test the performance of\
    \ the system under changing conditions of climate and demand. System performance\
    \ within a given future state can be quantified in multiple ways. Since the earlier\
    \ work of Hashimoto et al. (1982), who defined metrics of vulnerability, reliability,\
    \ and resiliency, a number of other metrics have been applied to measure the performance\
    \ of water resource systems. The recent emphasis on decision-making under uncertainty\
    \ means that metrics that can be related to the principles of flexibility and\
    \ robustness described above are increasingly being applied (e.g., maximin, optimism\u2013\
    pessimism, max regret). These metrics are typically quantified across large sets\
    \ of plausible future climate scenarios (e.g., thousands of scenarios), generated\
    \ either through downscaling of global climate model projections or through statistical\
    \ models for direct simulation of hydroclimatic variables (e.g., synthetic hydrology).\
    \ These metrics are often then traded-off against each other to identify acceptable\
    \ decisions.\n\nSimulating a water resource system involves coupling several different\
    \ models. Climatic boundary conditions: Information on climatic variables (rainfall,\
    \ temperature) is a first key input to simulate water resource system behaviour\
    \ under climate change. As described in Nazemi and Wheater (2014), this typically\
    \ involves choosing one or more scenarios for future greenhouse gas concentrations\
    \ to force one or more global climate models (GCMs) and then transferring the\
    \ GCM projections of climate variables to the river basin of interest using one\
    \ or more downscaling techniques. This process generates the climatic boundary\
    \ conditions. Using climate models as the \u2018upstream\u2019 boundary of a water\
    \ system simulator is attractive because (i) it enables simulations from climate\
    \ models to be used (if necessary after appropriate downscaling) to test possible\
    \ future climatic conditions and (ii) climate model outputs implicitly represent\
    \ spatial and temporal dependencies between the several climatic variables that\
    \ influence water resource systems\u2014most notably precipitation and the variables\
    \ that determine evapotranspiration. However, the reliability of GCM outputs for\
    \ adaptation planning in the water sector has been questioned because of...\n"
  151: " \n\"Direct simulation of climatic boundary conditions is based on sampling\
    \ and perturbation of the statistical distribution of historical observations.\"\
    \ \n\"Hydrological models transform climatic inputs (notably rainfall) into quantities\
    \ of water that may be withdrawn from rivers and/or groundwater, taking into account\
    \ topographical and land-use characteristics.\"\n\"Water resource system models\
    \ simulate the functioning of the water supply infrastructure, typically on daily\
    \ or monthly timescales. System simulation models can represent rules for withdrawal\
    \ of water from water bodies, operation of storage (e.g., dams), and allocation\
    \ of water to different users.\"\n\"A variety of methods exist for projecting\
    \ water demands from households, agriculture, and other economic sectors.\"\n"
