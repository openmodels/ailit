  91: "Source material: \"Landslide risk management in the context of climate change\
    \ has been a pro\uFB01led study for more than a decade. Many studies have shown\
    \ that a change in rainfall duration and intensity will cause an increase in natural\
    \ water-induced phenomena, such as \uFB02oods, soil erosion and landslides in\
    \ large parts of Europe... A premise for sound landslide risk management is modelling\
    \ of triggering and run-out phenomena, to determine location and extent of potential\
    \ landslides... The focus of the paper will be on modelling of slope stability\
    \ with the use of vegetation... One of the conclusions was that the thresholds\
    \ for landslide triggering are affected by long-term precipitations in areas that\
    \ are covered by deep deposits of \uFB01ne-grained soils, while they are controlled\
    \ by short-term precipitations in areas with shal- lower deposits with coarse-grained\
    \ soils. For shallow landslides, the soil\u2013atmosphere interaction is a major\
    \ factor in\uFB02uencing the slope stability... This paper presents the challenges\
    \ related to the use of NBS for landslide mitigation purposes. The question is\
    \ simply: how can we verify that the use of NBS is an effective measure for mitigating\
    \ a landslide problem for a detailed case, and simultaneously being not harmful\
    \ to the environment?"
  92: 'The landslide modelling normally implies two phases, one is the geotechnical
    static slope stability analysis and the other is the dynamic propagation analysis
    (run-out). Two main modelling principles are used for geotechnical static slope
    stability analyses: (i) the limit equilibrium methods (LEM) and (ii) the finite
    element methods (FEM). Rainfall-induced landslides... The use of vegetation is
    not yet sufficiently addressed in neither of them.'
  93: "yaml\n\"Drivers of Risk\": \"Climate change will cause a change of rainfall\
    \ patterns and intensity in large parts of Europe. This will lead to an increased\
    \ probability for rainfall-induced landslides with high destructive potential\
    \ for exposed infrastructure.\"\n\"Highlights\": \"In order to reduce the societal\
    \ risk associated with climate change and enhanced precipitation, NBS can represent\
    \ a sustainable, ef\uFB01cient and cost-effective approach.\"\n"
  94: "Source material here: The page discusses the use of vegetation for landslide\
    \ risk mitigation, focusing on its effects on slope stability. Several studies\
    \ have identified both positive and negative effects of using vegetation for landslide\
    \ protection. The major findings are that the use of vegetation for landslide\
    \ protection have two positive effects and one potential negative effect: (i)\
    \ the strength of the soil increases due to roots and binding of soil layers,\
    \ (ii) the pore water pressure is reduced due to plant\u2019s uptake and canopy\
    \ cover, (iii) vegetation may destabilize slopes in connection with strong winds\
    \ (this is valid only for trees). Landslide modelling when including the vegetation\
    \ contribution in slope stability analyses will be more complex, due to the coupled\
    \ effect that they provide to the soil: (i) hydrological, through the soil\u2013\
    vegetation\u2013atmosphere interaction and (ii) mechanical, through the root\u2013\
    soil interaction. The page highlights uncertainties in modeling due to variability\
    \ in factors like undrained shear strength of roots and effects of soil water\
    \ content. Examples of challenges with regard to modelling include the following:\
    \ The undrained shear strength depends on the type of roots, the position of the\
    \ main roots network and the season of the year. The effect of reduced soil water\
    \ content and induced soil suction is highly uncertain and can vary considerably\
    \ from case to case, also in relation to the distribution and vegetation density\
    \ along the slope."
  95: 'Source material here.

    The approach consists of two main parts: (i) hydrological modelling, to assess
    the pore water pressure regime and (ii) slope stability modelling, to assess the
    safety factor.

    Input data, hydrometeorological analysis implies the collection of current meteorological
    data ... or the analysis of potential future climate scenarios ...

    It is important to stress that precipitation events are often linked to the triggering
    of landslides, but it is the change in pore water pressures that leads a slope
    to fail.

    The hydraulic conductivity of the soil strongly depends on the type of roots ...
    Root tensile strength - additional cohesion ...

    Some preliminary functions were proposed to model the effect of roots on the change
    of soil hydraulic conductivity ...

    Figure 10.1 shows a methodological approach which takes into account the vegetation
    contribution in the slope stability modelling.

    '
