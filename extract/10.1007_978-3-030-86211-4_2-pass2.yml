  106: "yaml\nEvaluation overview: \"Effective \uFB02ood risk management is highly\
    \ relevant for advancing climate change adaptation, since \uFB02oods cause very\
    \ large amounts of material damage and casualties worldwide (Kundzewicz et al.\
    \ 2014).\"\nDrivers of Risk: \"In this regard, we review recent advancements in\
    \ understanding, quantifying and modelling changes in risk and its drivers.\"\n\
    Methodology: \"Advancements in this respect are (1) the compilation and analysis\
    \ of comprehensive qualitative and quantitative data on \uFB02ood risk changes\
    \ in case studies following the paired event concept; (2) the integration of qualitative\
    \ and quantitative data into socio-hydrological models using Bayesian inference;\
    \ and (3) the coupling of hydrological \uFB02ood risk models with behaviour models\
    \ in socio-hydrological modelling systems.\"\nHighlights: \"We recommend to further\
    \ develop these approaches and use more such process-based, dynamic modelling\
    \ also for large-scale \uFB02ood risk analyses.\"\nMore Notes: \"These approaches\
    \ are increasingly feasible due to signi\uFB01cant improvements in computational\
    \ power and data science.\"\n"
  107: "Source material here.\nDue to climate change and increasing exposure, e.g.\
