  130: 'Source material here.

    The paper mentions, "With the hydrological cycle expected to intensify due to
    climate change, better modelling of flood hazard is needed as a prerequisite to
    understanding how flood risk might change in the future with climate."


    It also discusses recent modeling advances: "The past decade has seen substantial
    advances in the modelling of flood inundation in data-scarce areas along with
    the emergence of global flood models that could form the foundation of global
    impact assessments."


    Finally, it outlines methodological themes: "In summarising these advances, four
    key themes emerge linked to topography, extreme flow estimation, river network
    parameterisation and numerical modelling of inundation."

    '
  132: "Source material: The ability of a GFM to estimate \uFB02ood hazard is broadly\
    \ contingent on four components, these are: The model of terrain elevations (DEM).\
    \ The method used to estimate extreme \uFB02ows. The de\uFB01nition of the river\
    \ network. The numerical model to simulate inundation. Below, recent advances\
    \ in each of these components are summarised... It is widely accepted that airborne\
    \ LiDAR data offer the most accurate terrain data for \uFB02ood mapping... However,\
    \ LiDAR data are absent in data sparse areas and global scale DEM data must be\
    \ used instead. For much of the last two decades, data obtained by the Shuttle\
    \ Radar Topography Mission (SRTM) has been the preeminent terrain data source\
    \ for \uFB02ood inundation mapping in data sparse regions... These data should\
    \ be superseded by more accurate elevation models in the near future. For example,\
    \ the TanDEM-X DEM at 90 m can in theory support more accurate \uFB02ood simulation\
    \ than SRTM-based DEMs. the latest revisions to these data seek to remove a multiple\
    \ sources of vertical errors including stripe noise, random errors, absolute bias,\
    \ vegetation bias and urban biases due to buildings (Yamazaki et al. 2017)...\
    \ An increased availability of such data at reduced costs is essential if global\
    \ terrain data are to drive substantial improvements in global \uFB02ood hazard\
    \ modelling in the near future.\""
  134: "Source material here.\nto understand the value of each approach and the potential\
    \ for multi-model ensemble prediction. Hydrography: River Location, Width and\
    \ Depth Open water is relatively simple to observe from satellite platforms, yet\
    \ only recently have comprehensive global data sets on river width and location\
    \ been developed. Prior to these studies, and still for many GFMs, the location\
    \ and size of rivers was based on digital terrain data, with the HydroSHEDS https://hydrosheds.org/\
    \ data sets by far the most widely used. For steep catchments, this approach can\
    \ be highly effective; however, in areas of low relief (e.g. deltas), the mapping\
    \ of river locations based on topography often places rivers in the wrong location.\
    \ River bifurcations and human alterations are also absent from such data sets.\
    \ River networks that merge terrain derived rivers, map data and surface water\
    \ observations have only recently begun to emerge, but should enable substantial\
    \ improvements to GFM hydrography (Yamazaki et al. 2019). Perhaps a more fundamental\
    \ issue for GFMs is the parameterisation of river conveyance capacity and specifically\
    \ river depth and friction. These are not observable from satellite platforms\
    \ and the conveyance capacity of rivers has been extensively altered via levy\
    \ construction and channel modification, for which data are often poor or not\
    \ openly available. Most GFMs make an assumption regarding the conveyance capacity\
    \ of the river system linked to discharge return period, which conveniently acts\
    \ as a form of bias correction for magnitude errors in the extreme flow generation\
    \ process (Sampson et al. 2015). Inversion of river bathymetry from surface water\
    \ dynamics perhaps offers the greatest potential for a paradigm shift in GFM hydrography,\
    \ with the upcoming surface water and ocean topography satellite mission providing\
    \ the necessary data for the world\u2019s larger rivers. Inundation Modelling\
    \ Numerical modelling of \uFB02oodplain inundation has a substantial development\
    \ history at the reach scale using computationally expensive hydrodynamic models\
    \ based on shallow water \uFB02ow theory. However, early GFMs tended to be extensions\
    \ to the simpler river routing models used for global hydrological and land surface\
    \ modelling, which estimate inundation by computing a volume excess given river\
    \ channel conveyance and distributing this volume across the lowest points in\
    \ the DEM (Winsemius et al. 2013). These methods are simple to implement, however,\
    \ the simulations are usually less accurate than those from hydrodynamic modelling\
    \ approaches. The development of more ef\uFB01cient hydrodynamic models and ongoing\
    \ reductions in computing costs have enabled global scale hydrodynamic models\
    \ to emerge (Sampson et al. 2015). Initially, these models were developed at relatively\
    \ coarse resolutions for inundation simulation (> = 1 km), however, recent models\n"
  135: "Source material here.\nhave simulated inundation over two-dimensional grids\
    \ at resolutions down to 30 m. These improvements to both process representation\
    \ and resolution have had substantial impacts on the estimation of \uFB02ood exposure\
    \ over large scales because resolution and process inaccuracy tend to bias simulations\
    \ towards greater exposure estimates.\n...\nA substantial challenge associated\
    \ with global \uFB02ood hazard simulation is that all the components listed above\
    \ are needed to estimate hazard and the necessary sophistication of each is contingent\
    \ on the others.\n...\nOnly limited intercomparison of GFMs has been possible\
    \ to date, but the few studies to be completed have identified substantial differences\
    \ between GFMs, to the extent that they disagree on where is at risk more often\
    \ than they agree.\n"
