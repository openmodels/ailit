  155: "\"The adaptation to the multiple facets of climate/global change challenges\
    \ the conventional means of water system planning. Numerous demand and supply\
    \ management options are often available, from which a portfolio of adaptation\
    \ measures needs to be selected in a context of high uncertainty about future\
    \ conditions. A framework is developed to integrate inputs from the two main approaches\
    \ commonly used to plan for adaptation. The proposed 'top\u2013down meets bottom\u2013\
    up' approach provides a systematic and practical method for supporting the selection\
    \ of adaptation measures at river basin level by comprehensively integrating the\
    \ goals of economic efficiency, social acceptability, environmental sustainability,\
    \ and adaptation robustness. The top-down approach relies on the use of a chain\
    \ of models to assess the impact of global change on water resources and its adaptive\
    \ management over a range of climate projections. Future demand scenarios and\
    \ locally prioritized adaptation measures are identified following a bottom-up\
    \ approach through a participatory process with the relevant stakeholders and\
    \ experts. Cost-effective combinations of adaptation measures are then selected\
    \ using a hydro-economic model at basin scale. The resulting adaptation portfolios\
    \ are climate checked to define a robust program of measures based on trade-offs\
    \ between adaptation costs and reliability. Valuable insights are obtained on\
    \ the use of uncertain climate information for selecting robust, reliable, and\
    \ resilient water management portfolios.\""
  156: "The challenge of adaptation in water resource systems (WRS) includes coping\
    \ with high/deep uncertainty about future resources (\u201Cend of stationarity\u201D\
    ) and demands. Water management problems, often classified as \u201Cwicked\u201D\
    \ management problems, involve dealing with multiple stakeholders with conflicting\
    \ interests in a context of great complexity and shifting dynamics.\n\nIn any\
    \ case, uncertainty cannot be an excuse for inaction. Flexible and dynamic adaption\
    \ policies are to be set. Effective adaptation should combine both structural\
    \ and non-structural measures, including regulatory and economic instruments.\
    \ Selected adaptation is expected to be economically efficient, environmentally\
    \ sustainable, socially acceptable, and robust.\n\nTwo main approaches are commonly\
    \ implemented in the design of climate change adaptation plans. The \u201Ctop-down\u201D\
    \ (TD) approach involves downscaling climate projections from General Circulation\
    \ Models (GCM) under a range of emission scenarios to provide inputs for hydrologic\
    \ and management models to estimate potential impacts and analyze adaptation measures.\n\
    \nAlternatively, in a \u201Cbottom-up\u201D (BU) approach, vulnerability thresholds\
    \ and local responses are empirically studied to define locally suitable adaptation\
    \ strategies.\n\nThe integration of these factors in the decision-making process\
    \ of the adaptation is a very complex issue still to be solved."
  157: "Describes a framework for robust adaptation decision-making integrating top-down\
    \ and bottom-up approaches: \"We, herein, describe a framework for robust adaptation\
    \ decision-making that departs from traditional methods, lying in the interface\
    \ between the two aforementioned approaches.\"\n\nFramework aims at selecting\
    \ portfolios of supply-demand measures for climate adaptation, balancing economic\
    \ efficiency, environmental sustainability, acceptability, and robustness at the\
    \ basin scale: \"The purpose is the selection of portfolios of supply\u2013demand\
    \ measures for adaptation to climate change integrating the objectives of economic\
    \ efficiency, environmental sustainability, acceptability, and robustness at basin\
    \ scale.\""
