    \ with a long life-span)...\"\n\"Cost\u2013Benefit Integrated Assessment Model\
    \ CB-IAM weighs mitigation costs against the benefits of reducing climate damages\
    \ within one model. POM = Policy-optimizing models or fully integrated IAMs (Toth\
    \ 2005)\"\n\"CE-IAM only assesses mitigation costs for a predefined mitigation\
    \ target. More specifically, it calculates the most cost-effective (i.e. least-cost)\
    \ way.\"\n"
  25: "Source material here.\n\u2022 Finally, the IPCC differentiates between adjustment\
    \ costs (short-term costs of adaptation) and macro-scale adaptation (long-term\
    \ restructuring of the economy). To correctly model the costs and bene\uFB01ts\
    \ of adaptation all those different forms of adaptation have to be taken into\
    \ account. A special dif\uFB01culty arises because adaptation costs can be seen\
    \ as indirect damage costs. IAMs thus often blur the difference between direct\
    \ damages (e.g. destructions caused by storms) and adaptation costs. In FUND,\
    \ for example, the increasing energy cost of air conditioning is major damage\
    \ sector, even though strictly speaking this is an adaptation measure. The corresponding\
    \ decrease in damages (improved health) is not considered in FUND, even though\
    \ a health sector exists. This obviously leads to an underestimation of the bene\uFB01\
    ts of adaptation.\nConclusions and Recommendation To summarize, IAMs include adaptation\
    \ explicitly (i.e. conducting a cost\u2013bene\uFB01t analysis of adaptation measures),\
    \ implicitly (i.e. damage function is net of adaptation) or occurring autonomously\
    \ (impacts fade at zero cost). In any case, these are highly aggregated approaches\
    \ that do not consider the variety of adaptation possibilities at the local, regional\
    \ and sectoral level. If at all, IAMs make very rough and ad-hoc assumptions on\
    \ adaptation costs and bene\uFB01ts and do not include technological details.\
    \ The understanding of (future) adaptive capacity, particularly in developing\
    \ countries, through IAMs is still limited (Watkiss 2011). The extent and success\
    \ of adaptation depends on the vulnerabilities and capabilities of regions and\
    \ societies. In the face of all these shortcomings our recommendation, however,\
    \ is not to give up on IAMs but to go through another phase of \u201Caging and\
    \ learning\u201D of adaptation models that better fit to the heterogeneity of\
    \ adaptation measures.\n"
