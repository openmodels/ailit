  71: 'Source material: Hazard, exposure and vulnerability are the three main determinants
    for risk. Though stemming from the disaster risk management community, this risk
    concept is now widely applied to climate change impact and adaptation analysis
    and further highlighted in the IPCC AR5 report, see Fig. 1. For (the modelling
    of) adaptation and climate change impacts the decomposition of risks into different
    components offers a helpful framework for both understanding Fig. 1 Components
    of climate risks and its key drivers'
  72: "plaintext\nThe main causes and guiding of action to tackle them. An example\
    \ of how different adaptation options can be explored under three categories,\
    \ hazard-, exposure- and vulnerability reducing measures, and what this requires\
    \ in terms of modelling efforts, is presented in Chap. 10 for coastal systems.\n\
    \nA main challenge is the representation of climate uncertainty in the analysis.\n\
    \nTraditionally a selection of down-scaled GCM projections is used to represent\
    \ a plausible input to hazard models.\n\nAn emerging group of scholars is applying\
    \ novel bottom-up approaches that apply stress tests to analyse plausible combinations\
    \ of stressors that lead to the highest vulnerability, potentially surpassing\
    \ critical system thresholds and leading to tipping point behaviour.\n\nIn Chap.\
    \ 11 the use is demonstrated of impact response surfaces to depict the modelled\
    \ sensitivity of indicators to climate and socioeconomic drivers across a plausible\
    \ range of perturbations, accounting for uncertainty where applicable.\n\nThis\
    \ allows the decision-maker to assess the evolving likelihood of exceeding stakeholder-defined\
    \ thresholds of impact and hence informs the urgency to act under certain evolution\
    \ of climate change.\n\nA similar approach for stress testing adaptation options\
    \ is presented in Chap. 7 by R. L. Wilby.\n\nIn Chap. 12 the need for better quantification\
    \ of the hazard reducing effect of nature-based solutions, in this case the mitigation\
    \ of land slide risks by vegetation, is stressed.\n\nAs vegetation behaviour is\
    \ dynamic in time and space, the effects on slope stability are difficult to model.\n\
    \nAnother example of challenges that are associated with biotic system components\
    \ in modelling is presented in Chap. 13. Here it is illustrated how to model the\
    \ sensitivity of crops changes in response to climate and soil-hydrology and how\
    \ crop rotation as an adaptation option requires insight from modelling on interactions\
    \ (carry over effect) over time from one rotation to another.\n\nAs there are\
    \ important dynamic interactions between abiotic and biotic components to consider\
    \ in adaptation modelling, also the dynamic interaction between hazards and human\
    \ behaviour (as part of the vulnerability component) is key to consider.\n\nThis\
    \ dynamic behaviour is systematically discussed in Chap. 14 for \uFB02ood risk\
    \ analyses for different river basins, assessing dynamic trends in hazard, exposure\
    \ and vulnerability indicators.\n\nIn Chaps. 15 and 16 its is nicely demonstrated\
    \ how high resolution and quality climate and hazard data are instrumental in\
    \ climate and weather services to serve different societal groups in urban areas\
    \ and agriculture (insurance) when smartly combined with user specific vulnerability\
    \ information.\n\nChapter 17 present a brief critical review of determining factors\
    \ for the quality of global \uFB02ood models that are increasingly used.\n\nIt\
    \ is highlighted that all components, the model of terrain elevations (DEM), the\
    \ method used to estimate extreme \uFB02ows, the de\uFB01nition of the river network\
    \ and the numerical model to simulate inundation determine overall quality of\
    \ outcomes.\n\nOften Lidar-based high quality DEM\u2019s are not available in\
    \ data-sparse regions requiring global satellite products (e.g. SRTM) to improve.\n"
  73: "Source material\nUnder climate change conditions (i.e. sea-level rise and increased\
    \ frequency of extreme sea levels) and increasing human occupation, the consequences\
    \ of coastal storms will be ampli\uFB01ed if no adaptation actions are implemented.\
    \ This work presents a generic approach to model disaster risk reduction measures\
    \ at coastal areas, including climate change effects. The proposed methodology\
    \ is adaptable to any coastal region and can be used to test (and improve) management\
    \ options at a broad number of coastal areas. It can also be used to de\uFB01\
    ne a timeframe for the implementation of the de\uFB01ned measures since not all\
    \ risk reduction measures, under a climate change scenario, need to be implemented\
    \ at the same time. This would help to optimise implementation costs while reducing\
    \ the risk to the occupation and people.\n"
  74: "Source material here.\n\"Vousdoukas et al. (2020a) estimate a total retreat\
    \ exceeding 100 m for almost half of the world\u2019s sandy beaches, by the end\
    \ of the century.\"\n\"With this view of the future, coastal authorities need\
    \ to assess the level of impact and the risk in their coastal zones and implement\
    \ tested and feasible Disaster Risk Reduction (DRR) and PMP measures (van Dongeren\
    \ et al. 2018).\"\n\"For that purpose it is paramount to first test and validate\
    \ those measures, analysing their effectiveness and choosing the optimal ones\
    \ (higher effectiveness for lower cost). That can be done by implementing such\
    \ measures at existing models and simulating their response and behaviour to coastal\
    \ storms under climate change scenarios.\"\n\"This paper presents and discusses\
    \ models and approaches to test DRR measures and their effectiveness in minimising\
    \ the impacts of coastal storms at occupied areas.\"\n\"Coastal retreat and \uFB02\
    ooding can be estimated by using simple formulations or models. For overwash assessment,\
    \ the most commonly used method is to estimate runup using empirical formulations\
    \ that require offshore wave conditions and beach slope. The computed runup can\
    \ be added to a given sea level and compared with the existing morphology to estimate\
    \ the overwash potential, depth and/or extension.\"\n"
