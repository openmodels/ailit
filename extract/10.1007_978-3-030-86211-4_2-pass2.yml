  191: "\nDrivers of Risk: According to the 2020 World Economic Forum, more common\
    \ extreme weather events could make insurance unaffordable or unavailable for\
    \ individuals and businesses.\nQuantitative material: Globally, the \u201Ccatastrophe\
    \ protection gap\u201D\u2014what should be insured but is not\u2014reached US$280\
    \ billion (EURe252 billion) in 2018. In Europe, only 35% of the losses from climate-related\
    \ events are insured (EIOPA 2019).\nMethodology: In this paper, we show three\
    \ examples of how insurers can contribute to climate change adaptation, through\
    \ insurers\u2019 underwriting and pricing practice. Including risk reduction measures\
    \ in an insurance product has the advantage of helping to better adapt to climate\
    \ change by not only transferring the risk but by directly reducing avoidable\
    \ damages when an event strikes, which as a result contributes to build a more\
    \ resilient society.\nHighlights: Including risk reduction measures in an insurance\
    \ product has the advantage of helping to better adapt to climate change by not\
    \ only transferring the risk but by directly reducing avoidable damages when an\
    \ event strikes, which as a result contributes to build a more resilient society.\n"
  192: "In this paper, we provide three examples where insurance could make a significant\
    \ contribution to climate change adaptation, through insurers\u2019 underwriting\
    \ and pricing practice. Through adaptation measures, insurers can contribute to\
    \ limiting the potentially systemic risks to society arising from climate change,\
    \ such as economic consequences, in terms of welfare, including damage to the\
    \ capital stock, sectoral productivity and changes in consumption. The first example\
    \ of how insurance could contribute to climate change adaptation is by providing\
    \ incentives for risk reduction through premium discounts to policyholders who\
    \ protect their property against natural catastrophes damages. A number of prevention\
    \ measures can be taken by policyholders to lower potential flood impacts, such\
    \ as limit the potential damage once the water has entered a building (known as\
    \ wet flood-proofing) or attempt to prevent water from entering a building (known\
    \ as dry flood-proofing)."
  193: "Source material here.\nDrivers of Risk: \"Grey line: implementation level\
    \ 0%; Dashed line: implementation level 100%; Light-blue area: reduced damage\
    \ as the effect of flood-resilience technologies\" \n\nQuantitative material:\
    \ \"Example A zone 1 (USD) Premium for a house 3 feet below BFE 4,000... Premium\
    \ 1 foot above BFE 520 (more than 80% premium reduction)\"\n\nMethodology: \"\
    In order to calculate the new premium based on different risk reduction measures,\
    \ nat cat models would need to implement different vulnerability curves as shown\
    \ in Fig. 22.1... and calculate the difference obtained in the estimated losses.\"\
    \n\nHighlights: \"Light-blue area: reduced damage as the effect of flood-resilience\
    \ technologies... Dashed line: implementation level 100%... Premium 1 foot above\
    \ BFE 520 (more than 80% premium reduction)\"\n"
  194: " \nMost insured losses caused by natural disasters come from property damage:\
    \ damage to structures and their contents. Losses from the interruption of business\
    \ activities, however, can make up a significant portion of total losses and insured\
    \ losses.\n\nBI losses can be the most important variable in the survival of a\
    \ business after a natural catastrophe.\n\nHurricane Katrina, for example, caused\
    \ about $25 billion in insured commercial losses, of which 6\u20139 billion dollars\
    \ has been attributed to BI (AIR 2008).\n"
  195: "   \n\"it depends greatly on public and private decisions during recovery\
    \ with respect to resilience tactics that dampen losses.\"\n\"BI insurance (for\
    \ both BI and NDBI) is a key aspect to build a resilient society especially in\
    \ the context of climate change adaptation.\"\n\"Creditworthiness, i.e. the ability\
    \ to pay off one\u2019s debt, is central to mortgage and trade credit insurance.\"\
    \n\"Economic costs from physical and transition risks caused by climate change\
    \ are ultimately borne by households and firms, affecting their cash flows and\
    \ wealth, which are key determinants of their creditworthiness.\"\n\"The impact\
    \ of climate (change)-related events on mortgage insurance is well illustrated\
    \ by the case study research by Corelogic on loan payment performance in Texas,\
    \ after Hurricane Harvey hit the end of August 2017 (Corelogic 2018). In Hurricane\
    \ Harvey FEMA (US Federal Emergency Management Agency) designated counties, properties\
    \ estimated to have damage saw a 205% increase in 90+ day\"\n"
  196: " \n\"mortgage delinquency, while properties estimated to have no damage saw\
    \ a 167% increase in 90+ day mortgage delinquency when compared to delinquency\
    \ rates just six months prior.\"\n\"The graph highlights the impact of hurricane-related\
    \ damages on mortgage delinquency rates, with FEMA-designated counties showing\
    \ higher increases, particularly for homes that sustained damage.\"\n"
  197: "Source material here: In this paper, we have shown how an insurer could contribute\
    \ to climate change adaptation, through insurers\u2019 underwriting and pricing\
    \ practice. ... Climate change strengthens the need to have adequate risk transfer\
    \ products, for example for business interruption as a signi\uFB01cant protection\
    \ gap exists for BI losses. ... Including adaptation measures in an insur- ance\
    \ product has the advantage to help to better adapt to climate change by not only\
    \ transferring the risk (transferring the risk does not reduce the actual damage\
    \ incurred) but by directly reducing avoidable damages when an event strikes.\
    \ ... Risk-based premiums are an important indicator of the evolving risk. Prevention\
    \ measures aimed to reduce the insured risk can only be properly quanti\uFB01\
    ed and thus re\uFB02ected in the premium if adequate models are available. ...\
    \ Going forward, if no adaptation measures are being taken, premia may become\
    \ unaffordable or insurers\u2019 \uFB01nancial capacity may be lacking to cover\
    \ for losses arising from climate change or other potentially systemic risks.\
    \ ... Innovative risk solutions require relevant public and private stakeholders\
    \ to share their data and exchange on different aspects of the risk assessment,\
    \ prevention and transfer to ensure that risks remain insurable."
  199: "  \nSource material: Behavioural change with societal transformation has been\
    \ the key processes whereby hand and respiratory hygiene, social distancing and\
    \ self-isolation that citizens across the world have been asked to implement to\
    \ respond to the global COVID-19 pandemic. Is it possible to use such societal\
    \ transformation approaches to change our behaviour for climate change adaptation?\
    \ ... This will provide an opportunity to build evidence-informed assessment and\
    \ design of interventions and should use a systems approach to determine and deploy\
    \ the most cost-effective mix of public health behaviour change policy options\
    \ according to the Nuffield Intervention Ladder and the Behaviour Change Wheel.\
    \ \u2026 The European Commission's Missions for Horizon Europe ... will mobilise\
    \ investment and EC\u2019s wide efforts to achieve measurable and time-bound goals\
    \ on issues that affect citizens\u2019 daily lives.\n"
  201: "Source material here.\n\"This paper addresses some of the considerations around\
    \ climate change drivers, recognises that societal transformation could limit\
    \ the global average temperature rise... Without a radical abatement of greenhouse\
    \ gases, global warming will reach and exceed 3\u20134\xB0 before the end of the\
    \ century... Placing health at the centre of this coming transition will yield\
    \ enormous dividends for the public and the economy, with cleaner air, safer cities\
    \ and healthier diets.\"\n\"Climate change has already made some weather and climate\
    \ extremes more frequent and severe.\"\n\"A second path\u2014which limits the\
    \ global average temperature rise to \u2018well below 2 \xBAC\u2019\u2014is possible\
    \ and would transform the health of a child born today for the better, throughout\
    \ their lives.\"\n\"This new era will come to define the health of people at every\
    \ stage of their lives... the COVID-19 pandemic has taught a lesson about how\
    \ closely environmental, societal and human health are connected.\"\n"
  203: "The Behaviour Change Wheel can help to address this by: Developing behaviour\
    \ change interventions from scratch, Building on or modifying existing interventions\
    \ and choosing from existing or planned interventions. Evaluating the appropriateness\
    \ of existing or proposed interventions in terms of the \u2018APEASE\u2019 criteria:\
    \ Acceptability, Practicability, Effectiveness, Affordability, Side-effects, and\
    \ Equity."
  204: "Selecting intervention types. Identifying the broad types of intervention\
    \ matched to the COM-B diagnosis: education, persuasion, incentivization, coercion,\
    \ training, environmental restructuring, modelling, and enablement. Formulating\
    \ an implementation strategy. Choosing how to deliver interventions using: legislation,\
    \ service provision, \uFB01scal measures, guidelines, environmental/social planning,\
    \ comms/marketing, and/or regulation. Constructing the intervention. Deciding\
    \ the details of the intervention content and delivery. The Behaviour Change Wheel\
    \ and associated frameworks can be used alongside checklists from behavioural\
    \ economics such as MINDSPACE (Annex 2) to ensure that we consider the key biases\
    \ and heuristics that affect people\u2019s behaviour and keep these insights in\
    \ mind when we design interventions and policy (Cabinet Of\uFB01ce 2014). How\
    \ Research Might Deliver Evidence for the Suggested Interventions To maximise\
    \ the chances of success, it will be important to adopt a research-focused and\
    \ systems-thinking approach such as the paper on building the case for systems\
    \ thinking about climate change and mental health (Berry et al. 2018). Systems\
    \ mapping with stakeholders and systematic reviews of the quantitative and qualitative\
    \ evidence will collate what we already know about the behaviours, their in\uFB02\
    uences and who performs them in each part of the complex climate change system.\
    \ It will also integrate the evidence of which interventions have worked, and\
    \ not, in the past, to what extent, for whom, to what cost, and in what context\
    \ (real-world and research interventions). Systems mapping and evaluation also\
    \ need to be applied to existing policies and interventions so that we develop\
    \ a comprehensive understanding of what we are already doing, where are the gaps\
    \ and opportunities and where to focus resources\u2014 as informed by the understanding\
    \ about the behaviours above. This can identify the need for new interventions\
    \ or the need to enhance the behaviour change content or delivery of existing\
    \ interventions. For each intervention, it will be critical to engage in detailed\
    \ monitoring and evaluation to assess the impact. For example, the Public Health\
    \ England Heatwave Plan and its annual reviews is an example of such monitoring\
    \ and evaluation (CCC 2018)."
  205: 'Source material: Is it possible to use such societal transformation approaches
    to change our behaviour for climate change adaptation? Environmental Changes:
    Illustrated with visuals of heavy waves, storms, and rising temperatures impacting
    health. Behavioural change with societal transformation has been the key processes
    whereby control measures of effective hand and respiratory hygiene, social distancing
    and self-isolation that have been implemented by citizens across the world have
    been asked to implement to respond to the global COVID-19 pandemic. Is it possible
    to use such societal transformation approaches to change our behaviour for climate
    change adaptation? By using a systems approach to determine and deploy the most
    cost-effective mix of policy options according to the intervention ladder and
    the Behaviour Change Wheel will assist in delivering societal transforma-tion
    actions through ambitious but realistic research and innovation activities.'
  209: "Source material here: \"the best available knowledge on the social and economic\
    \ consequences of climate change and the cost and effectiveness of adaptation\
    \ action.\" \"climate change\" \"Models are indeed tools that simplify complexity\
    \ enabling better management and decision under uncertainty.\" \"Many models still\
    \ provide information with a spatial\u2013temporal resolution which is too coarse\
    \ compared with that of many adaptation policy decisions, particularly those at\
    \ the urban, municipal level. \u2013 Climate change impact, vulnerability and\
    \ adaptation assessments can exceed the funding and technical capacity of smaller\
    \ administrations. Moreover, the time needed to release such analyses is often\
    \ too long compared to that of decision-making.\""
  210: " \n\u201CThere is not yet a common and consolidated practice in the communication\
    \ of uncertainty.\u201D \n\u201CCurrent assessments do not always enable to disentangle\
    \ uncertainty coming from the climate component, the social component, the models\
    \ used and the parameterisation used.\u201D\n\u201C...understanding local capacities,\
    \ governance and preference is the key to determine \u2018when\u2019, \u2018where\u2019\
    \ and \u2018what\u2019 adaptation is feasible. This strongly calls for integrating\
    \ top-down modelling analyses with bottom-up local experiences.\u201D\n\u201C\
    ...increase the availability, reliability and accessibility of climate information\
    \ with the \u2018right\u2019 spatial resolution.\u201D\n\u201C...systematic guidance\
    \ tools and case studies in the form of \u2018rapid and light touch\u2019 analyses\
    \ compared to what is currently available.\u201D\n\u201CIn the section, the contribution\
    \ by Lourens M. Bower emphasises...\u201D\n\u201CMarc Zebisch, Stefano Terzi,\
    \ Massimiliano Pittore, Kathrin Renner and Stefan Schneiderbauer address the starting\
    \ phases of the adaptation process. They present a conceptual framework for climate\
    \ risk assessment enabling a \u2018user-friendly\u2019 communication\u201D\n\u201C\
    Carlo Giupponi shows some possible solutions to the \u2018uncertainty\u2019 challenge.\
    \ Elaborating on a series of case studies, the contribution demonstrates the potential\
    \ of multi-criteria analysis coupled with uncertainty analysis to guide practical\
    \ adaptation action with sound and operational support.\u201D\n"
  212: 'yaml

    Methodology: "The assessment of adaptation measures is usually supported by model
    simulations on the performance of different measures under future conditions."

    More Notes: "Whether adaptation action is feasible is determined by technical
    and physical possibilities on the ground, as well as local capacities, governance
    and preference. Therefore, it is argued that the risk metrics outputs alone are
    not sufficient to predict adaptation outcomes, or predict where adaptation is
    feasible or not; they must be placed in the local context."

