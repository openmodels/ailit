  127: 'The paper mentions "Simulated demand for WII depending on perfect and imperfect
    forecast for weather index" and describes "a steady growth in number of insured
    farmers" in perfect forecast conditions, whereas "numbers might be very stable
    or even decreasing" with imperfect forecasts.


    It also discusses "a simple conceptual model for WII" and how "a simple power
    law was chosen to parameterize the dependence of crop yield on the weather index."


