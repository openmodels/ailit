    \ science. [Linked to Roadmap Challenge 3]. Longer term (century) climate simulations\
    \ suffer from a large dispersion of model results (e.g., future precipitation\
    \ in Africa) [Linked to Roadmap Challenge 3]. Climate models often have an insufficient\
    \ resolution to deliver relevant results for users. [Linked to Roadmap Challenge\
    \ 3]. On the communication side: CS still use terminology which is not understood\
    \ and often misinterpreted by most users\u2014need for standardised terminology\
    \ and quality assurance. [Linked to Roadmap Challenge 2]. Knowledge elements resulting\
    \ from research could provide the basis for future climate services; however,\
    \ realising this potential is challenging due to limits in translational capabilities,\
    \ including across disciplines [Linked to Roadmap Challenge 3]. There is a need\
    \ for a \u2018platform\u2019 (or a network of \u2018platforms\u2019) to facilitate\
    \ sharing experiences and lessons learnt and collaboration on mutually interesting\
    \ challenges (enhance complementarities and minimise conflicts and duplication)\
    \ [Linked to Roadmap Challenge 2]. Need to shift from a focus on supporting incremental\
    \ adaptation to also supporting transformational adaptation, including transitions.\
    \ [Linked to Roadmap Challenge 1\u2014understanding user needs]. Lacking an overarching\
    \ framework and metrics for evaluating climate services, including consideration\
