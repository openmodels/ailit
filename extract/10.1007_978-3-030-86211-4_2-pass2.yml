  120: "Source material here.\nProvides information on the sensitivity of a city\u2019\
    s bicycle traf\uFB01c volume towards variations in meteorological conditions and\
    \ on a city\u2019s current and future climatic attractiveness towards cycling,\
    \ including spatial and temporal variations.\nThe Urban Planning Service focuses\
    \ on the in\uFB02uence of the urban land use structure on the level and spatial\
    \ distribution of heat stress in urban areas.\nThe Bike Citizens Analytics platform\
    \ now additionally offers the possibility for climate-related analyses, i.e. (i)\
    \ the comparison of cycling intensities at different meteorological conditions\
    \ and (ii) the visual inspection of spatial variations in typical climatic conditions\
    \ (wet-bulb globe temperature, wind speeds) during daytime.\nBuilding Energy service\
    \ support buildings design/maintenance to be better adapted to the speci\uFB01\
    c urban climate and future climates (indoor comfort) and to lower energy consumption\
    \ for heating/cooling. Meteonorm software (https://meteonorm.com/) is upgraded\
    \ in the Climate-\uFB01t.City project to include urban and climate change effects.\n\
    Through modi\uFB01cation of the input\u2013land use layer, various city development\
    \ scenarios can be simulated and the corresponding distributions of the heat stress\
    \ levels in the area of interest are modelled/re-calculated. This scenario modelling\
    \ service is provided on two different spatial scales: (i) city level\u2014in\
    \ 100-m spatial resolution and (ii) local level\u2014in 1-m spatial resolution.\n\
    The service aims at supporting climate-inclusive bicycle traf\uFB01c planning.\n\
    With the incorporation of the Active Mobility Service in the Climate-\uFB01t.City\
    \ project, the Bike Citizens Analytics platform now additionally offers the possibility\
    \ for climate-related analyses.\nBuilding Energy service support buildings design/maintenance\
    \ to be better adapted to the speci\uFB01c urban climate and future climates (indoor\
    \ comfort) and to lower energy consumption for heating/cooling.\nOnline tool to\
    \ support the Zoo in the climate change management of their animal collections,\
    \ energy and water consumption and visitor marketing, taking detailed and state-of-the-art\
    \ climate data into account.\nFor the city level of modelling, an interactive\
    \ scenario modelling tool has been developed, enabling the user to interactively\
    \ model different scenarios of the city development online and then to run directly\
    \ the modi\uFB01cation of the resulting map, showing the distribution of the heat\
    \ stress levels in the city.\n"
