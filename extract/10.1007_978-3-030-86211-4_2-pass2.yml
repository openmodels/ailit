    \ had no bene\uFB01t when compared to the current situation, while 100% indicates\
    \ total risk prevention by the modelled DRR.\"\n"
  78: The applicability of the exposed models to define DRR measures, including climate
    change, will require a better determination of the vulnerability relationships
    between the indicators used to define damage or impact (e.g. water discharge,
    shoreline retreat) and the exposed elements (e.g. type of building). An extended
