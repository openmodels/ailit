Highlights:
  9: Need to shift focus from understanding the problem to developing solutions and
    move from planning to implementation. The strategy emphasizes smarter adaptation,
    systemic adaptation, and the need for robust data collection and sharing.
  11: A comprehensive review providing an up-to-date and forward-looking overview
    of models and tools for hazards, risks, impacts, vulnerability, and adaptation
    climate assessments.
  15: Highlights include the use of vegetation for landslide risk mitigation and innovations
    in flood hazard modeling.
  17: Adapting to climate risks involves decision-making for implementation, moving
    beyond theoretical approaches.
  19: Climate change impact models need to improve their analysis of local/regional
    implications to guide decision-makers. Adaptation options should be stress-tested
    to account for uncertainty in climate change projections. Addressing uncertainty
    in agricultural projections can increase adaptation effectiveness and avoid maladaptation.
  24: The table highlights different approaches to modeling adaptation in IAMs, differentiating
    between implicit and explicit (reactive or pro-active) adaptation, and considers
    geoengineering options.
  25: There is a recommendation to continue developing adaptation models to better
    address the heterogeneity of adaptation measures.
  29: The RCP4.5 pathway may be an optimal strategy due to its stabilization of climate
    change impacts in the long term, while the RCP8.5 pathway implies huge costs in
    all regions mainly after 2070.
  30: Adaptation efforts can positively impact the economic value added from forests,
    with more significant adaptation measures yielding higher positive impacts.
  31: The study highlights significant differences between macroeconomic assessments
    and micro-based household impacts, indicating the shortcomings of ignoring constraints
    such as farm size.
  32: Mechanization reduces the GDP decline by approximately 0.4 percentage points
    under RCP8.5 by 2100 compared to scenarios without mechanization.
  33: A better integration of proactive adaptation under uncertainties into macroeconomic
    models is needed.
  37: The main recommendations are on setting standards, legal and ethical considerations,
    having an authoritative voice, knowledge transfer, capacity building, mainstreaming
    climate services, balancing science with market growth, and ensuring sustainable
    climate data sources.
  38: The paper highlights the importance of cross-pollination between social and
    natural sciences to include the human dimension in climate services research,
    and standardizing climate services to generate trust.
  39: Identifies challenges in climate science and communication, such as insufficient
    predictions and lack of standardized terminology.
  41: No relevant information
  43: 'Credible predictions of future conditions are severely constrained by unknown
    drivers and imperfect foresight capabilities. Storylines are a necessary element
    in scenario frameworks, providing a compelling and consistent narrative. Two types
    of climate storylines are explored: climate scenario and climate risk storylines.'
  44: Focuses on tailoring climate scenarios to sectoral stakeholders, including impacts
    on temperature, precipitation, extreme weather events, and floods.
  45: Temperature will continue to rise, leading to milder winters and more frequent
    warm summers; precipitation is generally expected to increase; sea level will
    continue to rise; wind speed changes are minimal; fog and visibility will decrease,
    while solar radiation at the Earth's surface will increase; scenario changes exceeding
    natural variations for specific climate variables are identified.
  46: Storyline approaches are maturing to enrich the understanding of drivers, implications,
    and adaptation options for future climatic challenges.
  48: Comparison with historical observations alone is insufficient for validating
    climate change impact models; global sensitivity analysis provides additional
    possibilities for model evaluation.
  49: The paper highlights the importance of evaluating impact models adequately but
    notes the limitations of using historical data for future predictions. It also
    mentions the issue of performance gaps between models and observed behavior when
    models are run uncalibrated.
  50: A key outcome is that intervention strategies related to certain parameters,
    such as land use, may not exert the expected influence on model outputs, suggesting
    limitations in the model's capacity to assess those strategies.
  51: Wave setup uncertainty is often neglected in coastal hazard assessments studies,
    and failing to incorporate this uncertainty may invalidate conclusions and lead
    to an overestimation of the effects of other drivers, at least for short and mid-term
    planning periods.
  52: Key outcomes highlight the dominance of 'wave setup' as a factor up to 2050,
    and the increased influence of 'high-end scenarios' beyond 2100.
  53: Sensitivity of hydrological models to parameters changes along climatic gradients,
    indicating a shift in dominant processes with changing climate conditions.
  56: Robust decision-making frameworks are recommended for evaluating project performance
    under a range of credible scenarios. Stress-tests help establish conditions under
    which there may be trade-offs between or even failure of project deliverables.
    Model simulations overcome the limitations of field experiments regarding the
    severity of weather experienced.
  57: Avoiding 'climate exceptionalism' by considering integrated adaptation planning
    mindful of multiple environmental change drivers.
  60: "Under conditions where air temperatures reach 25 \xB0C, water temperature can\
    \ be 3 \xB0C cooler in shaded areas compared to less shaded areas."
  61: Modest but practically significant adaptation benefits can be achieved.
  62: Deep uncertainty about the future climate are not impediments to adaptation
    planning provided that decision-led frameworks are implemented. Stress-testing
    can reveal the efficacy of adaptations, vulnerabilities, and residual risks.
  65: This approach is effective in increasing the probability of avoiding maladaptation
    and improving the applicability and assimilation of scientific results by users.
  68: Spring wheat adaptations showed high EOA values under various perturbation combinations
    of P and T, indicating adaptation is possible under a wide range of future conditions.
  69: Recommends focusing on early and standard sowing dates combined with standard
    and longer cultivars for meeting adaptation and recovery targets under moderate
    perturbations with very high confidence. Short spring cultivars can be used with
    high confidence when the aim is just to adapt. Switching to spring cultivars with
    standard and longer cycle length, combined with early and standard sowing dates
    in autumn, may benefit winter wheat in NE Spain under future conditions.
  71: Emphasizes the decomposition of risk into hazard, exposure, and vulnerability
    as a framework for understanding climate change impacts.
  72: The importance of high-resolution climate and hazard data combined with user-specific
    vulnerability information for urban areas and agriculture is highlighted.
  73: The methodology can optimize implementation costs while reducing risk to people
    and occupation, allowing for a staggered implementation of risk reduction measures.
  74: Emphasizes the need for coastal authorities to assess risks and implement effective
    adaptive measures to mitigate future coastal damage.
  75: Process-based models like XBeach and LISFLOOD are recommended for determining
    the hazard associated with episodic erosion and flooding.
  77: A zero effectiveness index value means no benefit from DRR, while 100% indicates
    total risk prevention.
  78: Models have limitations due to lack of high-quality quantitative validation
    data. A better determination of vulnerability relationships between indicators
    and exposed elements is needed. Indirect impacts are often not accounted for but
    should be included in future impact assessments.
  82: The approach is designed to test the feasibility of applying impact models across
    sectors and assessing the effectiveness of adaptation and mitigation responses.
  83: 'Four key improvements for climate change adaptation models are highlighted:
    embracing scenario uncertainty, engaging stakeholders to understand adaptation
    triggers, including beneficial adaptations, and integrating adaptation with mitigation.'
  85: IRSs offer the potential to test model performance across a wide range of conditions,
    including outside conventional model applications.
  86: IRS analysis can be used to estimate regional risk.
  87: The paper highlights the increased risk of water scarcity in the Vale do Gaio
    reservoir in Portugal under future climate scenarios. It also highlights how switching
    to crops with smaller water demands can increase the area under irrigation but
    also enhances sensitivity to changes in rainfall.
  88: Conclusions emphasize ensuring the salience and credibility of modeling through
    stakeholder engagement, improving adaptation representation, and identifying critical
    thresholds for key impact indicators.
  90: The use of vegetation as a Nature-Based Solution (NBS) is increasingly being
    used for erosion protection and shallow landslide mitigation, but more efforts
    are needed to demonstrate its effectiveness in a quantifiable manner.
  91: "Thresholds for landslide triggering are affected by long-term precipitations\
    \ in areas covered by deep deposits of \uFB01ne-grained soils, while they are\
    \ controlled by short-term precipitations in areas with shallower deposits with\
    \ coarse-grained soils. For shallow landslides, the soil\u2013atmosphere interaction\
    \ is a major factor in\uFB02uencing the slope stability."
  93: NBS can provide sustainable, efficient, and cost-effective approaches to reduce
    societal risk associated with climate change and enhanced precipitation.
  94: 'The use of vegetation has two positive effects on landslide protection: increasing
    soil strength and reducing pore water pressure, along with a potential negative
    effect of destabilizing slopes due to strong winds.'
