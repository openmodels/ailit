  76: " \nWhen considering the impact of climate change at coastal areas, most of\
    \ the current approaches assume that the existing morphology and occupation will\
    \ be maintained and only the forcing conditions will change... To support and\
    \ aid to achieve the most informed and best possible decisions regarding risk\
    \ prevention, models can be used to simulate and evaluate the effectiveness of\
    \ current and potential future DRR measures under storm conditions and even climate\
    \ change... From these simulations, it is possible to obtain predictions of local\
    \ flooding and erosion, which combined with characteristics of the local population,\
    \ built environment and infrastructure, allow to compute storm impact and the\
    \ effectiveness of the measures... Models can also be used to evaluate how effective\
    \ a DRR measure or a combination of measures will be on the reduction of the impact\
    \ of storm events... This is achieved by simulating historical and climate change-related\
    \ storm scenarios with and without DRR measures in place... \u201CExposure-reducing\
    \ measures\u201D move receptors out of high-risk areas... \u201CPathway-obstructing\
    \ measures\u201D change the morphology and hence its interactions with waves and\
    \ water levels...\n"
  77: "yaml\n\"Evaluation overview\": \"The impact of predicted future climate scenarios\
    \ (e.g. sea-level rise and extreme sea levels), based on available projections\
