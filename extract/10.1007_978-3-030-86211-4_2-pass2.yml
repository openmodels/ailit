  57: "Source material here. How can we be con\uFB01dent that investments in adaptation\
    \ projects will deliver intended bene\uFB01ts despite deep uncertainty about climate\
    \ variability and change? This technical contribution discusses ways of evaluating\
    \ the performance of adap- tation measures. However, it is important to begin\
    \ by acknowledging that climate change is not the only risk faced by human and\
    \ natural systems. There are also concerns about resource depletion, biodiversity\
    \ loss, environmental degradation, and especially human health. These are being\
    \ driven by profound changes in demography, technology, global trade, public debt\
    \ and urbanisation. Agencies are grappling with all these \u2018megatrends\u2019\
    \ whilst at the same time striving to meet policy goals around social cohesion,\
    \ economic prosperity, national security and environmental sustain- ability. Hence,\
    \ this paper emphasizes the importance of adaptation planning that is integrated\
    \ and mindful of multiple drivers of environmental change\u2014we must avoid what\
    \ some term \u2018climate exceptionalism\u2019 in our thinking. The next section\
    \ describes a framework that emphasizes clarity about intended adaptation and/or\
    \ development outcomes from the start. Two ways of evaluating attendant adaptation\
    \ measures and investments are then discussed. By such \u2018stress-testing\u2019\
    \ we are seeking to better understand how various options might perform under\
    \ cred- ible climate and non-climate scenarios of system change. Fortunately,\
    \ new tools and techniques are being developed to enable this via dedicated \uFB01\
    eld experiments and systems modelling\u2014each will be discussed in turn."
  58: '

    Robust decision making frameworks for adaptation option appraisal typically comprise
    of four main elements. These are as follows: (1) portfolios of management options;
    (2) models of the system being managed (including inputs and drivers of change);
    (3) project performance metrics; and (4) options appraisal criteria. More-over,
    decision-centric frameworks are participatory and iterative in ways that enable
    managers and analysts to reach a shared understanding of key system vulnerabilities
    and adaptation goals (Fig. 1). Where addressing climate risks is the primary objective,
    or where there are long-lived investments, with risk of lock-in, high levels of
    precaution, or major economic consequences, detailed assessment is warranted (e.g.,
    coastal defences to protect infrastructure from rising sea levels).

    '
