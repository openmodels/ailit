  213: "yaml\nDrivers of Risk: \"Risk is determined not only by climate but to a very\
    \ large extent by socio-economic circumstances, which are location-speci\uFB01\
    c; Risk is dynamic because of variability and changes in climate, adding to the\
    \ (monotonous) changes and trends in socio-economic developments, and changes\
    \ in human behaviour and (autonomous) adaptive responses to climate risk.\"\n\
    Methodology: \"The risk concept has become the major basis for impact modelling\
    \ and an essential part of assessing the performance of adaptation measures. This\
    \ has been spurred by the developments of several vulnerability and impact models\
    \ and associated studies over the past two decades. The SREX report of the Intergovernmental\
    \ Panel on Climate Change (IPCC) underlined the need to integrate the three components\
    \ of climate risk, which are: climate hazard, exposure and vulnerability (sensitivity).\"\
    \nHighlights: \"The second topic concerns the hard and soft limits of adaptation\
    \ that need to be investigated in order to inform decision-making for both adaptation\
    \ and mitigation.\"\nMore Notes: \"These dynamics need to be considered, in order\
    \ to more reliably project how adaptation measures will perform over multi-decadal\
    \ time horizons.\"\n"
  214: " \nhave been dominant, and outweighed any climatic drivers. In the most comprehensive\
    \ review to date Pielke (2021), based on 54 studies into a wide variety of extreme\
    \ weather impacts, demonstrates that almost all studies show that losses have\
    \ risen because of an increase in exposure. Surprisingly, several studies attribute\
    \ past losses solely to climatic changes when obviously increasing exposure has\
    \ been the major driver of such costs (see, e.g., Coronese et al. 2019; Frame\
    \ et al. 2020). Such studies do not correctly interpret the risk concept as laid\
    \ out by IPCC. More importantly, they are not helpful for informing decision-making\
    \ on risk management and adaptation, as important drivers are overlooked. Socio-economic\
    \ developments amplify the impacts from changes in climate and are essential to\
    \ include. For the assessment of the performance of planned adaptation measures,\
    \ it is thus important to integrate the future dynamics of exposure. In many places,\
    \ especially urban centres, it is expected that population and wealth will increase,\
    \ leading to increasing losses from climate hazards if no adaptation measures\
    \ are taken (Bouwer 2013). Modellers have therefore resorted to integrate exposure\
    \ scenarios, whereby socio-economic information is used to estimate possible developments\
    \ in population, economy and resulting asset values. This enables the projection\
    \ of risk, in combination with scenarios for changes in climatic hazards. For\
    \ \uFB02ooding, this is an approach that has now found wide implementation, mostly\
    \ through (spatial) scenarios for population and economic growth in models for\
    \ future \uFB02ood risk (e.g. Vousdoukas et al. 2018; Dottori et al. 2018). For\
    \ many other climatic hazards, however, socio-economics are not included, and\
    \ risk is simply projected forward using the present socio-economic exposure and\
    \ \uFB01xed vulnerability. The resulting risk analysis, with potential underestimates\
    \ of future risk, is not a reliable basis for the evaluation of adaptation measures.\
    \ Several adaptation measures could have higher bene\uFB01ts when such changes\
    \ are considered. Vulnerability Change It has been argued that the temporal changes\
    \ in vulnerability, or sensitivity, due to extreme weather events have also shaped\
    \ past impacts, in addition to exposure changes. It is therefore important to\
    \ understand such past changes in vulnerability, and project possible future developments\
    \ out into the future in order to capture the range of possible future climate\
    \ change impacts, and the performance of adaptation actions (e.g. Mechler and\
    \ Bouwer 2015). However, there is less empirical evidence of changes in vulnerability,\
    \ as such changes are dif\uFB01cult to capture. It has therefore often remained\
    \ an underappreciated topic in climate impact modelling and projections (Bouwer\
    \ 2013) and also in the assessment of adaptation. Meanwhile, there are several\
    \ studies pointing to the importance of including such vulnerability reductions.\
    \ These include impacts from hydrological hazards, such as river \uFB02oods (Kreibich\
    \ et al. 2017), coastal \uFB02oods (Bouwer and Jonkman 2018), as well as drought\
    \ impacts (Kreibich et al. 2019).\n"
  215: "Source material: Fig. 24.1 Changes in average event mortality (number of deaths\
    \ per 100,000 exposed population) for storm surge \uFB02oods for different world\
    \ regions between 1900 and 2013. What is clear from Fig. 24.1, for instance, is\
    \ that for most world regions, mortality rates have substantially declined, despite\
    \ a strongly increasing coastal population and ongoing sea-level rise and land\
    \ subsidence. Also, for other hazards, such as extreme temperatures, it has been\
    \ shown that substantial reductions in risk can be achieved by adaptation and\
    \ preparedness actions, resulting in a reduction of vulnerability. The strong\
    \ decline is supposed to be the result of improved forecasting of cyclones, early\
    \ warning, evacuation and shelters. In addition, in many areas improved coastal\
    \ protection has resulted in less frequent \uFB02ooding."
  216: " \nMethodology: \"In principle, there are two approaches for impact and adaptation\
    \ modelling to account for such changes in vulnerability: one is to assume that\
    \ vulnerability reduction is autonomous... The other approach is to assume that\
    \ past adaptation actions are planned and can be directly observed.\"\nHighlights:\
    \ \"Adjustments of climate risk metrics according to household income or other\
    \ capacity information would help to highlight where the highest risks are located.\
    \ Particularly high risks may indicate the need for additional adaptation measures\
    \ to protect vulnerable populations and households.\"\nMore Notes: \"While in\
    \ many cases physical or technical options to reduce climate risks are available,\
    \ and no hard adaptation limit is reached there, economic, social and governance\
    \ constraints may lead to soft adaptation limits that are reached much earlier.\"\
    \n"
  217: The assessment of the performance of proposed climate adaptation measures is
    considered essential in climate risk modelling. The study argues that the dynamics
    of some autonomous risk processes are not yet sufficiently included in impact
    modelling. It emphasizes that there is currently insufficient interpretation and
    meaning of risk assessment results both from an equity standpoint and for assessing
    possible limits of adaptation and residual losses and damages, leading to climate
    risk products falling short in informing adaptation decision-making on the ground.
    The paper suggests acknowledging past trends in exposure and vulnerability as
    a baseline against which future risks should be compared, better understanding
    vulnerabilities and identifying high-risk areas, and using bottom-up studies to
    understand local capacities and preferences in adaptation measures. Bottom-up
    studies can show both hard limits (technical-physical) and soft limits (local
    capacities and preferences) for implementing adaptation measures, which can indicate
    when and where limits might be reached and what losses might occur beyond adaptation.
  218: "\n\"Evaluation overview\": \"References Bouwer LM (2013) Projections of future\
    \ extreme weather losses under changes in climate and exposure. Risk Anal 33(5):915\u2013\
    930; Bouwer LM, Jonkman SN (2018) Global mortality from storm surges is decreasing.\
    \ Environ Res Lett 13(1):014008; Markhvida M, Walsh B, Hallegatte S, Baker J (2020)\
