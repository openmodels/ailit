  82: "Source material: In this short note, we propose a systematic method of climate\
    \ change impact and adaptation assessment designed to be conducted at national\
    \ or sub-national scale within a risk framework. Speci\uFB01cally, we seek to\
    \ test the feasibility of applying impact models across sectors within a standard\
    \ analytical framework for representing three aspects of potential relevance for\
    \ policy: (i) sensitivity\u2014examining the sensitivity of the sectors to changing\
    \ climate for readily observable indicators; (ii) urgency\u2014estimating risks\
    \ of approaching or exceeding critical thresholds of impact under alternative\
    \ scenarios to help determine urgency of response and (iii) response\u2014determining\
    \ the effectiveness of potential adaptation and mitigation responses. By working\
    \ with observable indicators, the approach is also amenable to long-term monitoring\
    \ as well as evaluation of the success of adaptation, where this too can be simulated."
  83: "Source material here: Construct impact response surfaces (IRS\u2014see section\
    \ below) to depict the modelled sensitivity of indicators to climate and socioeconomic\
    \ drivers across a plausible range of perturbations in different geographical\
    \ regions, accounting for uncertainty where applicable. Four of these improvements\
    \ are of especial relevance in the approach outlined below: embracing scenario\
    \ uncertainty rather than seeking most likely futures for optimal solutions, working\
    \ with stakeholders and decision-makers to better understand the triggers and\
    \ goals of adaptation policies and measures, including adaptations that take advantage\
    \ of climate change rather than simply responding to adverse impacts, and considering\
    \ adaptation alongside mitigation within an integrated climate policy framework."
  85: "Source material: The method being applied for examining changing risk and the\
    \ urgency for adaptation across different sectors involves the construction of\
    \ impact response surfaces (IRSs) based on impact model simulations... IRSs depict\
    \ the response of an impact variable to changes in two explanatory variables as\
    \ a plotted surface... providing a systematic, \u201Cscenario-neutral\u201D analysis\
    \ of impacts... The IRS approach provides a systematic way to evaluate responses\
    \ to any scenario of the drivers that falls within the sensitivity range of the\
    \ plot... IRSs also provide an opportunity to test model performance across a\
    \ wide range of conditions, including those that may lie outside the conventional\
    \ application of many models."
