  99: "Source material: \"Diversi\uFB01cation of crop rotations is considered as an\
    \ option to increase the resilience of European crop production under climate\
    \ change... the long-term sustainability of adaptation and mitigation strategies\
    \ cannot be properly evaluated... Agriculture is among the most vulnerable sectors\
    \ affected by climate change. Additionally, it has strong interactions to other\
    \ sectors, e.g. water resource management and mitigation of greenhouse gas emissions...\
    \ Therefore, the integrated assessment of impacts, adaptation and mitigation options\
    \ under current and future climatic conditions requires a continuous long-term\
    \ analysis of crop sequences to take into account carry-over effects as in real\
    \ conditions... In conclusion, crop models require suitable experimental data\
    \ to parameterize additional crops, which were so far not suf\uFB01ciently investigated\
    \ to cope with multiple opportunities in crop rotations.\""
  100: "Source material here.\nincrease of land temperature by ~1.5 \xB0C compared\
    \ to pre-industrial level, an increase\nof the frequency, intensity and duration\
    \ of heat waves, while precipitation showed a\nspatially differentiated picture\
    \ across Europe. Warming has prolonged the thermal\ngrowing season and frost-free\
    \ period for crops across all of Europe since 1980s.\nExtended growing seasons\
    \ facilitate the introduction of new crops or the expansion\nto higher latitudes\
    \ and altitudes. However, the probability of multiple adverse climate\nevents\
    \ during a growing season including heavy rains and storms has increased and\n\
    cropping systems have already been affected by climate change in terms of higher\n\
    yield variability and crop loss risk but also in terms of adaptation, e.g. new\
    \ varieties,\ndiversification of crops or shifted cultivation dates.\n"
  101: "Source material: Agro-ecosystem models considering the complex interactions\
    \ in the atmosphere-plant\u2013soil system are essential tools to assess the impact\
    \ of projected climate change on various ecosystem services, including crop production,\
    \ environmental effects such as water use and pollution, GHG emissions, resource\
    \ use ef\uFB01ciency and long-term effects on soil properties, e.g. soil carbon\
    \ stocks and to evaluate potential adaptation options under these multiple aspects.\
    \ However, this approach has limitations, considering that crop growth and yield\
    \ are affected by the interactive impacts of multiple climate change factors and\
    \ biophysical processes. Model results for wheat yields differed by 5.5\u2013\
    11.6% among the three methods. Their main advantage is the opportunity to conduct\
    \ high number of simulations under various site conditions within a relatively\
    \ short time. Moreover, the ensemble of crop models showed a high variability\
    \ indicating the uncertainty related to the model or its user, respectively. However,\
    \ the interaction between heat and drought seems to be genotype dependent and\
    \ is still not suf\uFB01ciently understood (R\xF6tter et al. 2018). Diverse results\
    \ regarding the bene\uFB01cial effect of transpiration reduction through elevated\
