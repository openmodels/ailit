  116: "Source material here.\nThe socio-economic impact assessment performed in the\
    \ Climate-\uFB01t.City project has demonstrated that, in all the cases, there\
    \ are actual and potential added values in terms of public service effectiveness,\
    \ economic impacts, policy innovation and social impacts.\nUrban heat stress and\
    \ urban flooding are mentioned as key topics under 'Keywords'.\n...urban heat\
    \ island effect, cities experience twice as many heat wave days than their rural\
    \ surroundings. Moreover, towards the end of the century, the number of urban\
    \ heat wave days is expected to increase by a factor of 10, from approximately\
    \ 3 to 30 days per year at the end of the century under IPCC scenario RCP8.5.\n\
    The objective of the Climate-\uFB01t.City service was to establish a service that\
    \ translates the best available scienti\uFB01c urban climate data into relevant\
    \ information for public and private end users operating in cities.\nUrban areas\
    \ shape their own climate, amplifying climate extremes such as excessive heat\
    \ and flooding. In view of the ongoing and projected climate change, urban areas\
    \ need to set up adaption processes to become less sensitive to the negative impacts\
    \ of climate change.\n"
  117: "The Climate-fit.City project collaborates with cities to co-design climate\
    \ solutions using data from the 2017-2020 H2020 Climate-fit.City project. The\
    \ Climate-fit.City team helps cities through the process, supports stakeholder\
    \ engagement and has expertise in socio-economic impact assessments and policy\
    \ design including communicating of climate impacts to citizens. The Climate-fit.City\
    \ initiative offers expertise in urban sectors like active mobility, building\
    \ energy, emergency planning, heat and health, leisure and tourism, and urban\
    \ planning. We will use results created inside the H2020 Climate-fit.City project\
    \ (2017\u20132020) to demonstrate service components. The project's goal is to\
    \ enhance city resilience to climate impacts by engaging city officials and stakeholders\
    \ to develop tailored adaptation strategies."
  118: "yaml\nEvaluation overview: \"Climate-\uFB01t.City services are based on downscaled\
    \ large-scale climate information at the city scale which is used by sectorial\
    \ experts to create added value urban climate information (Fig. 13.2). Primary\
    \ urban climate data is delivered by VITO and KU Leuven. VITO focuses with its\
    \ urban climate model UrbClim (De Ridder et al. 2015) on heat stress and related\
    \ meteorological variables and indicators, while KU Leuven applies its rainfall\
    \ downscaling statistics methodology to focus on precipitation and \uFB02ooding.\
    \ Urban climate data (air temperature, humidity, wind speed) allows to derive\
    \ urban maps for climate hazards tailored to different sector needs such as heat\
    \ wave days, cooling/heating degree days, tropical nights, urban heat island intensities,\
    \ temperature statistics, etc.\"\nDrivers of Risk: \"VITO focuses with its urban\
    \ climate model UrbClim (De Ridder et al. 2015) on heat stress and related meteorological\
    \ variables and indicators, while KU Leuven applies its rainfall downscaling statistics\
    \ methodology to focus on precipitation and \uFB02ooding.\"\nMethodology: \"For\
    \ all simulations, the model is set up with a spatial resolution of 100 m. For\
    \ the historical (reference) simulations, the model is driven with meteorological\
    \ data from the Copernicus Climate Change Service. Model con\uFB01guration is\
    \ based on Copernicus land cover data combined with local urban datasets in case\
    \ end users have high-quality local data.\"\nHighlights: \"Urban climate data\
    \ (air temperature, humidity, wind speed) allows to derive urban maps for climate\
    \ hazards tailored to different sector needs such as heat wave days, cooling/heating\
    \ degree days, tropical nights, urban heat island intensities, temperature statistics,\
    \ etc.\"\n"
  119: '

    The source page describes impacts of heat waves, including "increasing human mortality,"
    affecting "labour productivity," and increasing "energy consumption for air conditioning."
    It notes drivers of risk as "an increase of the number, duration and intensity
    of heat waves." The methodology involves "statistical downscaling where all publicly
    available global and regional climate model outputs are considered and downscaled
    to the local scale of the city." Highlights include the indication that heat waves
    "cause direct impacts on human health due to increased mortality, discomfort and
    mental illnesses." It also mentions that "all services are co-designed with urban
    end users" to enhance urban climate resilience.

