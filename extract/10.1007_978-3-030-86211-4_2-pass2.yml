  37: " \nOver the past \uFB01ve years there have been some reviews and shared perspectives\
    \ on research and innovation gaps undertaken under various guises. The following\
    \ provides highlights of the results of three of these. Following a stakeholder\
    \ engagement workshop (November 2017) held at the request of the European Commission\
    \ (linked to the informal DG RTD European Climate Services Roadmap Implementation\
    \ Working Group), a position paper was prepared by Climateurope (2018) summarising\
    \ deliberations in the form of recommendations for climate services science, research\
    \ and innovation.\n\nThe main messages and advice were grouped under the following:\
    \ \x81\n\nSetting standards, quality control, quality assurance and evaluation\n\
    \nLegal and ethical considerations\n\nAuthoritative voice\n\nKnowledge transfer/brokering,\
    \ communication and user engagement\n\nCapacity building\n\nMainstreaming climate\
    \ services\n\nBalance between underpinning science, research, innovation and market\
    \ growth\n\nSustainable climate data sources\n\nAs indicated, the resulting stakeholder\
    \ assessment is consistent with aspects of the Roadmap challenges and activities.\
    \ The apparent focus of the identi\uFB01ed gaps suggests that at that stage in\
    \ time the engaged stakeholders (users, providers and researchers) believed there\
    \ was a need to continue efforts focusing on building the market framework and\
    \ also recognised the need to retain an appropriate balance in investments that\
    \ continued supporting the underpinning research and associated infrastructure,\
    \ in addition to supporting innovations. \n \nClimateurope (2019) provides recommendations\
    \ for the Horizon Europe (HEUR) framework programme on research needs for climate\
    \ modelling and climate services.\n"
