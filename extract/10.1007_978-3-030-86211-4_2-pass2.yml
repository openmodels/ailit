  173: "Source material here.\nDrivers of Risk: \"Climate change, population growth\
    \ and changing distributions of wealth will lead water demand to outstrip supply\
    \ by 40% in 2030, causing GDP growth to decline by as much as 6% in water-scarce\
    \ areas.\" \nDrivers of Risk: \"At the other extreme, floods represent the most\
    \ economically damaging risk, costing circa $100 billion annually, and their impact\
    \ is expected to rise.\"\nMethodology: \"In this context, standard decision-making\
    \ based on a complete probabilistic description of future conditions and optimization\
    \ of expected performance is no longer appropriate; instead, priority should be\
    \ given to robustness, through the identification of policies that are (i) insensitive\
    \ to foreseeable changes in future conditions (classical robustness that addresses\
    \ deep uncertainty type 1) and (ii) adaptive to unforeseen contingencies (adaptive\
    \ robustness that addresses deep uncertainty type 2).\"\nMethodology: \"To bridge\
    \ this gap, I will argue that science needs to further underpin the development\
    \ and integration of two pieces of ex-ante information: (1) a modeling hierarchy\
    \ of human\u2013water systems to assess policy performance under alternative scenarios\
    \ and model settings, so as to navigate deep uncertainty type 1 and (2) a longitudinal\
    \ accounting and analysis of public transaction costs to navigate deep uncertainty\
    \ type 2.\"\n"
  174: "yaml\nEvaluation overview: \"Critically, the dynamics of complex human\u2013\
    water systems of relevance for water policy design and implementation are characterized\
    \ by positive feedbacks, non-mechanistic dynamics and multiple equilibria leading\
    \ to Knightian or deep uncertainty...\"\nDrivers of Risk: \"The combined effects\
    \ of growing water scarcity and \uFB02ood risk increasingly constrain decision-makers\
    \ to adopt new approaches and policies to the management of the human-modi\uFB01\
    ed water cycle.\"\nMethodology: \"To bridge this gap, along these pages, I develop\
    \ a research agenda toward an interdisciplinary, replicable, and scalable research\
    \ framework integrating data and methods from (socio-)hydrology and economics\
    \ to quantify the broad socioeconomic and environmental implications of adaptation\
    \ policies in complex human\u2013 water systems, and the uncertainty involved\
    \ in the process, so to allow stakeholders to explicitly trade-off incremental\
    \ changes in robustness with expected policy performance (e.g. cost-effectiveness).\"\
    \nHighlights: \"Under deep uncertainty, standard decision-making based on a complete\
    \ probabilistic description of future conditions and optimization of expected\
    \ performance is no longer appropriate; instead, priority should be given to robustness...\
    \ ...To this end, I argue that science needs to further underpin the development\
    \ and integration of two pieces of ex-ante information: (1) a modeling hierarchy\
    \ of human\u2013water systems to assess policy performance under alternative scenarios\
    \ and models/model settings, so as to navigate deep uncertainty type 1 and (2)\
    \ a longitudinal accounting and analysis of public transaction costs from before\
    \ the project or policy commences.\"\nMore Notes: \"Note that the \uFB01rst piece\
    \ of information is only partially addressed in the scienti\uFB01c literature,\
    \ which appears biased toward consolidative modeling and standard decision-making\
    \ (Marchau et al. 2019); while empirical longitudinal assessments on public transaction\
    \ costs are \u201Cvirtually non-existent\u201D (Loch and Gregg 2018).\"\n"
  176: "yaml\nEvaluation overview: \"However, economics and hydrology have not been\
    \ successful at integrating human and water systems (Pande and Sivapalan 2017).\"\
    \nDrivers of Risk: \"As a result, the effects of policy- and climate-induced adaptation\
    \ and feedback responses between socioeconomic, land surface, and water systems\
    \ dynamics are still poorly understood.\" \"since shocks do not require to be\
    \ represented separately for each sub-model.\"\nMethodology: \"Where socioeconomic\
    \ and hydrologic models interact in hydroeconomic models, responses to policy\
    \ shocks or other stimuli are typically assessed using an external economic sub-model,\
    \ which is subsequently integrated with the architecture of the hydrologic model\
    \ through piecewise equations.\" \"These contributions run standard models at\
    \ each system level independently in modules, which are de\uFB01ned as specialized,\
    \ self-contained mathematical elements that process information and generate outputs\
    \ and connect them through sets of protocols, which are de\uFB01ned as rules designed\
    \ to manage interrelationships (e.g. two-way feedbacks) between systems\u2019\
    \ modules\"\nHighlights: \"There is a basic need to better understand the dynamics\
    \ of complex adaptive human\u2013water systems and to represent them in modeling\
    \ tools that can be used to effectively inform policymakers.\" \"To this end,\
    \ the transformative discipline of socio-hydrology has called for the development\
    \ of integrated approaches that \u201Cexplicitly account for the two-way feedbacks\
    \ between human and water systems\u201D (Sivapalan et al. 2014).\" \"Modularity\
    \ offers potentially higher detail in the representation of each system, which\
    \ can be independently developed and adjusted. This makes possible the addition\
    \ of non-linearity to each element of the system, so that surprises are not so\
    \ surprising and can be adequately understood, and their repercussions transferred\
    \ from one system to another.\" \"While holistic models that use differential\
    \ equations to capture as many systems as possible in comprehensive numerical\
    \ models have signi\uFB01cant practical value and continuing increases in computational\
    \ power means, they can be systematically upgraded and adjusted to more accurately\
    \ represent observed responses in human\u2013water systems\"\nMore Notes: \"It\
    \ is through hierarchies of systems of increasing complexity, amenable to experimental\
    \ manipulation that experimental sciences such as biology have made steady progress\
    \ in, e.g., deciphering the human genome. Recently, climate research has put a\
    \ stronger emphasis on model hierarchies as a means to link the complexity of\
    \ high-end holistic simulations with a deeper understanding of the processes at\
    \ work\"\n"
  177: 'Navigating Deep Uncertainty Type 2: Measuring and Understanding Transaction
    Costs to Avoid Techno-Institutional Lock-In...Each module within the hierarchy
    can be populated with multiple models (multi-model ensemble) and combined with
    scenario discovery techniques...This information can be used to identify futures
    where proposed policies meet or miss their objectives, explore potential tipping
    points, and inform the development of robust policies that show satisfactory performance
    under most conceivable futures.'
  183: "yaml\nMethodology: \"It is suggested that Environmentally Extended Input\u2013\
    Output models initially be used as a screening tool, in order to identify emission\
    \ dense sectors. Process-based LCA inventory data, collected through collaboration\
    \ and transparency throughout the value chain, can then be applied to increase\
    \ the resolution of the decision-making tool.\"\nHighlights: \"Adaptation to climate\
    \ change poses two recognized signi\uFB01cant types of risks to the private sector;\
    \ (1) physical risks and (2) transitional risks...In order to reach Paris Agreement\
    \ goals, science-based targets need to be adopted to measure and manage emissions,\
    \ speci\uFB01cally focussing on Scope 3 emissions embedded in the value chain\
    \ in the private sector.\"\n"
  186: "Source material here.\nScope 1 includes direct emissions resulting from the\
    \ company\u2019s operation ... Scope 2 includes indirect emissions associated\
    \ with purchase of electricity ... All other emissions are described as Scope\
    \ 3, which emphasizes emissions embedded in the value chain. ... Scope 3 emissions\
    \ can include purchased services such as business travels to waste management.\
    \ ... Scope 3 can be assessed and quantified using several different methods,\
    \ as illustrated in Fig. 21.3 ... Environmentally Extended Input-Output models\
    \ (EEIO) provide a top down assessment of all GHG emissions, including Scope 3\
    \ emissions. ... Alternatively, Life Cycle Assessments (LCA) provide an iterative,\
    \ bottom-up approach, whereby emissions are quantified per functional unit ...\
    \ Hybrid models incorporate the upstream coverage of EEIO and the downstream detail\
    \ of LCA data in order to minimize aggregation and truncation. ... the emissions\
    \ along the value chain often represent a company\u2019s biggest GHG impacts ...\
    \ It is clear that inclusion of value chain-related emissions in Scope 3 is needed\
    \ for an accurate and sound science-based target in compliance with the Paris\
    \ Agreement.\n"
  187: "yaml\nMethodology: \"Companies documenting their GHG emissions must choose\
    \ their approach along the assessment continuum (Fig. 21.2), depending on which\
    \ is most relevant to use as a tool for managing their emissions.\"\nMethodology:\
    \ \"There are guidance documents for conducting an EEIO analysis in various multi-regional\
    \ I/O tables, databases and models (Stadler et al. 2018; Yang et al. 2017), as\
    \ well as process based and LCA\u2014but there is still a lack of clear guidance\
    \ and harmonization among the approaches, or combination of approaches\"\nHighlights:\
    \ \"It is not easy to orientate and \uFB01nd the right balance between resolution\
    \ and do-ability, better accurate and pragmatic guidance is needed in this space.\"\
    \nHighlights: \"which hampers transparency in the reporting for investors.\"\n\
    Highlights: \"The International Organization for Standardization (ISO) has also\
    \ recently developed a series of standards for organizations to determine their\
    \ GHG inventories as shown in Fig. 21.3, below.\"\nHighlights: \"If the ISO standards\
    \ are made mandatory, most companies and organizations would need to signi\uFB01\
    cantly upgrade their inventorying efforts.\"\n"
