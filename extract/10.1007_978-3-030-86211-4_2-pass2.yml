sourcematerial:
  9: The European Commission adopted the new EU Strategy on adaptation to climate
    change on 24 February 2021, setting out the pathway to prepare for the unavoidable
    impacts of climate change. The climate crisis already affects every place in Europe.
    Climate change is happening today, so we have to build a more resilient tomorrow...
    The frequency and severity of climate and weather extremes is increasing. These
    extremes range from unprecedented forest fires and heatwaves above the Arctic
    Circle to devastating droughts in the Mediterranean region, and from hurricanes
    ravaging EU outermost regions to forests decimated by unprecedented bark beetle
    outbreaks in Central and Eastern Europe. Slow onset events, such as desertification,
    loss of biodiversity, land and ecosystem degradation, ocean acidification or sea
    level rise are similarly destructive over the long term... the aim of the new
    strategy is to shift the focus from understanding the problem to developing solutions
    and to move from planning to implementation. To inform adaptation action and decision-making,
    smarter adaptation requires more data collection and data sharing on a wider range
    of topics including climate-related risks and losses, and health. Adaptation actions
    must be informed by robust data and risk assessment tools that are available to
    all... More systemic adaptation includes the local level and vulnerable communities,
    promotion of nature-based solutions, and topics such as fiscal policies... The
    Commission will continue to incorporate climate resilience considerations.
  11: Source material here.
  14: '"Part I Challenges for Adaptation Modelling" and "1 Modelling the Cost and
    Benefits of Adaptation. A Targeted Review on Integrated Assessment Models with
    a Special Focus on Adaptation Modelling" indicate a focus on adaptation modeling
    methodologies. However, specific details on outcomes, shocks, quantitative data,
    or highlights are not provided on this page.'
  15: Source material here.
  17: Adaptation is moving from the theoretical to the applied, and this requires
    modelling that supports informed decision-making for implementation. Adaptation
    involves complex temporal dimensions, as it seeks to address impacts that vary
    dynamically and non-linearly over time. Adaptation does not involve a single quantitative
    objective and it cannot be assessed with a single common metric that applies to
    all risks and sectors. These temporal and uncertainty issues make modelling complex.
    Adaptation involves a range of actions, at different aggregation scales (from
    European level to local). The benefits of this adaptation are often difficult
    to model, in quantitative terms, because it involves reductions in impacts that
    are sector-, location- and context-specific.
