  8: " \njointly confirm the three hypotheses of the present paper. In particular,\
    \ an increase in inequality is a positive predictor of the number of people affected\
    \ by natural disasters... Further, the positive sign of HIT in the inequality\
    \ equation corroborates H2. In this case, an increase in the number of people\
    \ affected by disasters entails a substantial rise of inequality... Looking specifically\
    \ at the four main dimensions, our preferred measure of adaptation demand (GDP\
    \ per capita) is, as expected, negative but statistically significant only in\
    \ the first two specifications. On the other hand, the human development level\
    \ (NHDI) is a positive predictor of higher exposure to risk... when we control\
    \ for gender equality (GNHDI) in access to basic opportunities (i.e., education,\
    \ health, and access to the labour market) the quadratic form is negative and\
    \ significant (models 4\u20135), thus indicating an inverted U-shaped relation\
    \ between the development level and the magnitude of impacts... Looking at the\
    \ second group of variables that capture resilience supply, we observe that the\
    \ share of public consumption expenditure on GDP (Public exp) is positively associated\
    \ with a higher number of persons affected by damages... large projects aimed\
    \ at improving adaptation may simply transfer risk across individuals... To capture\
    \ the impact of the composition of public expenditure, we add a variable measuring\
    \ the investment expenditures in nonfinancial assets (Public inv), which turns\
    \ out to be significantly and negatively related to the magnitude of impacts.\n"
  9: " \nSource material here. \"countries with higher shares of rural population\
    \ are, ceteris paribus, more exposed to high impacts on human activities.\" \"\
    Tables 3a-3b contain the extension of the baseline analysis after the addition\
    \ of specific controls for geographic and climatic effects in the disaster equation\
    \ (models 1\u20133), by splitting the number of people hit between dry (models\
    \ 4\u20135) and wet disasters (models 6\u20137), and by including a dynamic endogenous\
    \ effect by lagging the variables of interest for wet events (models 8\u201310).\"\
    \ \"El Ni\u02DCno has no significant effect on the number of people hit by natural\
    \ disasters, while La Ni\u02DCna has a positive effect especially for wet disasters.\"\
    \ \"variable Gini i,t 0.003*** indicates significance in affecting disaster outcomes.\"\
    \ \n"
  10: "Source material here.\n1. Drivers of Risk: \"When distinguishing between typologies\
    \ of disasters, we find that the effect of inequality on the number of people\
    \ affected is slightly higher in the case of wet disasters relative to dry disasters\
    \ (Table 3a, models 4\u20137). ... Given that the livelihood of low-income households\
    \ in developing countries depends on agriculture, resilience is necessarily lower\
    \ in front of repeated shocks that destroy production capacity.\"\n2. Quantitative\
    \ material: \"Table 3b ... W_HIT i,t... 140.515*** 151.450*** 151.737*** 150.014***...\
    \ This implies that countries under strain from repeated floods and storms struggle\
    \ to escape the vulnerability-disaster trap as exposure, in terms of number of\
    \ persons hit by wet disasters, is on average higher.\"\n3. Methodology: \"To\
    \ check for non-linearities, we include an interaction term between income level\
    \ and cumulative frequency of disasters (model 9), which turns out to be negative\
    \ and statistically significant.\"\n4. Highlights: \"Further, when a higher number\
    \ of people are affected by wet disasters, the effect on income inequality is\
    \ much higher than in the case of dry disasters (Table 3b). This implies that\
    \ countries under strain from repeated floods and storms struggle to escape the\
    \ vulnerability-disaster trap.\"\n"
  11: "F. Cappelli et al. - The study of climate change-induced disasters is extremely\
    \ complex. Disasters stem out the interaction of climatological, environmental\
    \ and socioeconomic factors that our analysis shows to be highly interrelated\
    \ under specific circumstances. Countries suffer differently the effect of natural\
    \ disasters, and so do population and income groups within each country. - Fig.\
    \ 5. Predicted margins for W_HIT w.r.t. stock of wet disasters for different inequality\
    \ levels Source: authors\u2019 elaboration on estimates. - Our work adds to prior\
    \ research by exploring empirically these complex associations in relation to\
    \ natural disasters between 1992 and 2018. We find that countries with higher\
    \ levels of inequality that have been affected more frequently by extreme climatic\
    \ events may be trapped in a vicious cycle. - Rapidly changing climate conditions\
    \ are known to trigger extreme events, and are expected to become more frequent\
    \ in the near future. The risk is that recurrent climate-related disasters may\
    \ undermine the ability of a country to recover and to prepare for future events,\
    \ thus ultimately exacerbating the vulnerability of exposed populations."
