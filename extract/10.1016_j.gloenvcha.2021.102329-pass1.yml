    \ normalized by ith country\u2019s population of the previous year; Ginii,t is\
    \ Gini index;...we use two variables that represent the years in which El Ni\xF1\
    o or La Ni\xF1a prevail, respectively...splitting the dependent variable into\
    \ the number of people hit in consequence of dry disasters (D_HIT) or wet disasters\
