Drivers of Risk:
  1: Climate change-induced disasters and inequality are identified as drivers impacting
    the outcomes.
  2: Economic development stage, income inequality, and access to resources are identified
    as drivers of vulnerability to natural disasters.
  3: The shocks impacting outcomes are climate-related natural disasters, specifically
    floods, landslides, storms (wet disasters), droughts, extreme temperatures, and
    wildfires (dry disasters).
  4: The analysis highlights various natural disasters such as floods, storms, extreme
    temperatures, landslides, droughts, and wildfires as factors impacting outcomes.
  5: "Extreme climatic events are driven by natural phenomena such as El Ni\xF1o and\
    \ La Ni\xF1a, as indicated by the Oceanic Ni\xF1o Index (ONI)."
  6: Factors include socioeconomic variables, such as GDP per capita, public expenditure,
    and disaster frequency, potentially impacting natural disaster outcomes.
  7: "The paper discusses the number of disasters and their composition into dry and\
    \ wet disasters as drivers of risk. Geographic factors and climatic effects like\
    \ El Ni\xF1o, La Ni\xF1a are also considered."
  8: Number of people affected by disasters (HIT), GDP per capita, Human Development
    Index (HDI), Public expenditure, Institutional quality, Ethnic marginalization.
  9: "Factors such as inequality (Gini coefficient), GDP per capita, rural population\
    \ share, and atmospheric conditions like La Ni\xF1a are evaluated for their impact\
    \ on disaster outcomes."
  10: Shocks from different types of disasters, specifically dry and wet disasters,
    impact the outcome measures such as inequality.
  11: The analysis identifies recurrent climate-related disasters, such as floods
    and storms, as key drivers that undermine resilience and exacerbate vulnerability
    due to unequally distributed socioeconomic factors.
Evaluation overview:
  1: The paper evaluates the impact of climate change-induced disasters on income
    inequality and vulnerability, as well as the reverse causality.
  2: The page discusses the uneven impact of natural disasters across population segments
    and mentions both short and long-term socioeconomic impacts, including inequality.
  3: The paper evaluates the impact of natural disasters (death toll and people affected)
    and income inequality.
  4: The paper examines the impact of natural disasters, highlighting the number of
    people affected by different types, focusing on socioeconomic variables and inequality.
  6: "The page discusses the outcome measured as the death toll and affected population\
    \ normalized by the previous year\u2019s population."
  7: The outcome being evaluated includes the impact of natural disasters on inequality
    (Gini Index) and the number of people hit by disasters, normalized by population.
  8: Evaluates the Gini index (measure of inequality) and the number of people affected
    by natural disasters.
  9: The page evaluates the impact of various socio-economic and geographic factors
    on the number of persons affected by different types of disasters.
  11: The paper evaluates the mortality outcome due to wet disasters, specifically
    the number of people killed by such events, normalized.
Highlights:
  1: Countries with higher levels of income inequality suffer greater damages from
    natural disasters, and inequality increases the number of people affected by disasters.
  2: Natural disasters exacerbate poverty and inequality, and economic and institutional
    factors influence the degree of impact.
  3: The paper proposes that income inequality amplifies the magnitude of cumulative
    damages from repeated catastrophic events. It posits a self-reinforcing dynamic
    where inequality hinders reconstruction, further reducing access to basic services
    for the poorest. It also suggests that unequal societies suffer greater physical
    damages due to natural disasters.
  4: The data underscores floods as the most frequent and impactful natural disaster,
    affecting the most people, followed by droughts and storms.
  7: Key outcomes include robust positive and significant relationships between the
    Gini Index and the number of people affected by natural disasters across various
    model specifications.
  8: Inequality is a positive predictor of the number of people affected by natural
    disasters. An increase in the number of people affected by disasters entails a
    rise in inequality. The human development level is a positive predictor of higher
    exposure to risk, but this relationship becomes an inverted U-shape when controlling
    for gender equality. Public expenditure is positively associated with a higher
    number of persons affected by damages, whereas investment expenditures in nonfinancial
    assets are significantly and negatively related to the magnitude of impacts.
  9: "Main outcomes indicate La Ni\xF1a positively affects the number of people hit\
    \ by wet disasters, while no significant effect is found for El Ni\xF1o."
  10: Income inequality effects are more pronounced for wet disasters compared to
    dry ones, with ethnic marginalization showing increased impacts during frequent
    wet disasters.
  11: The key finding is that higher levels of inequality correlate with a greater
    impact of wet disasters on fatalities, highlighting a potential vicious cycle
    in unequal societies.
Methodology:
  1: A simultaneous equations approach is used on a panel of 149 countries from 1992
    to 2018 to assess the relationships.
  2: The page references case studies and longitudinal studies that assess the socioeconomic
    impacts of natural disasters.
  3: The analysis uses a panel database to test three hypotheses related to the relationship
    between natural disasters and income inequality, looking at the period 1992-2018.
    It employs data from EM-DAT and SWIID.
  4: The analysis uses data from EM-DAT and incorporates socioeconomic variables for
    regression, including wealth, adaptation deficit, and gender disparity, using
    indices like GDP, HDI, and GDI.
  5: The analysis includes control variables such as frequency of current and past
    disasters, geographical location, ethnic inequality, and institutional quality.
  6: The methodology involves the use of exogenous instruments and controlling for
    endogeneity using variables like distance from the equator and value added in
    agriculture.
  7: The analysis uses a system of equations with fixed effects, geographic and climatic
    controls, and instrumental variables like distance from the Equator; multicollinearity
    is tested with Variance Inflation Factor.
  8: Panel data analysis using various model specifications (1-8) with different combinations
    of independent variables. Standard errors are in parentheses, and significance
    levels are indicated by asterisks (* p < 0.1, ** p < 0.05, *** p < 0.01).
  9: The analysis uses regression models including geographic and climatic controls,
    splitting data into dry and wet disasters, and incorporating lagged effects of
    variables.
  10: Analysis distinguishes between types of disasters (dry and wet) and uses lagged
    variables and interaction terms to understand the impact on income inequality,
    measured by the Gini index.
  11: The analysis explores the association between inequality and fatalities from
    climate disasters empirically between 1992 and 2018, using scatter plots divided
    by Gini index quartiles.
More Notes:
  3: The paper frames the analysis of natural disasters in a climate change perspective,
    considering a wider array of disasters, locations, and time horizons. It distinguishes
    between wet and dry disasters and notes regional differences in exposure.
  6: The paper discusses potential endogeneity issues and employs a Sargan-test for
    endogenous variable testing.
Quantitative material:
  3: The analysis uses a panel database of 149 countries from 1992-2018. It computes
    a variable HIT as the sum of the death toll and the number of people affected
    by each disaster, standardized by the previous year's population.
  4: Quantitative data is presented, showing the number of people affected and the
    frequency of different natural disaster events.
  6: Descriptive statistics including means, standard deviations, and range values
    for variables like HIT i,t, GDP per capita, and public expenditure are provided.
  7: Includes quantitative results such as statistically significant coefficients
    for variables like Gini Index and GDP, with significance levels indicated as *
    p < 0.1, ** p < 0.05, *** p < 0.01.
  8: A 1% increase in the Gini index in a country at the 75th percentile corresponds
    to 3.7% more people hit by natural disasters than in a country at the 25th percentile.
  9: "The analysis provides statistically significant coefficients showing the relationship\
    \ of factors like Gini coefficient, GDP per capita, and La Ni\xF1a on the number\
    \ of affected persons."
  10: Quantitative results show significant coefficients for disaster variables in
    inequality equations; for example, W_HIT for wet disasters ranges from 140.515
    to 151.737 (models 1-10).
  11: The paper provides a qualitative description but no specific numeric quantitative
    information, implying a positive correlation between inequality (Gini Index) and
    fatalities from wet disasters.
sourcematerial:
  1: Natural disasters have devastating impacts on societies and impose exorbitant
    tolls in terms of casualties, material deprivation and altered power relations.
    Since the 1970 s the frequency of natural disasters worldwide has increased dramatically...
    The purpose of the present paper is to disentangle the mechanisms that connect
    climate change-induced disasters, inequality and vulnerability by accounting for
    both directions of causality... the empirical analysis reveals that countries
    with higher levels of income inequality suffer greater damages when hit by a natural
    disaster. At the same time, inequality is found to increase the number of people
    affected by disasters... We do so by means of a simultaneous equations approach
    on a panel of 149 countries from 1992 to 2018. The main finding is that higher
    levels of income inequality are associated with a greater number of people affected
    by natural disasters.
  2: "  \nEvaluation overview: \"Another issue of interest is that the impact of natural\
    \ disasters is uneven across segments of the population within a country... There\
    \ is plenty of literature on the short and long-term socioeconomic impacts, including\
    \ inequality, of specific extreme events.\"\n\nDrivers of Risk: \"The page discusses\
    \ how the risk of damage from disasters is correlated with the stage of economic\
    \ development. The risk is high at early stages due to less investment in preventive\
    \ measures. Furthermore, inequality is considered a factor for vulnerability to\
    \ disasters.\"\n\nMethodology: \"One strand of research consists of case studies\
    \ based on quasi-experimental methods to compare growth and inequality before\
    \ and after specific events. A second relevant strand of literature includes longitudinal\
    \ studies on the effect of multiple disasters on poverty, growth and inequality.\"\
    \n\nHighlights: \"While the occurrence of a catastrophic event is a purely natural\
    \ phenomenon, the resulting death toll is ascribable to economic, political and\
    \ institutional factors. Inequality therefore emerges from this literature as\
    \ a barrier to society\u2019s ability to achieve an agreeable distribution of\
    \ the collective effort to limit vulnerability.\"\n"
  3: "Source material: \"To test Hypothesis 1, the dependent variable HIT represents\
    \ the impacts of disasters as the sum of death toll and people affected by each\
    \ event.\" & \"As for Hypothesis 2, the measure of inequality is the Gini index\
    \ (hereafter Gini).\" & \"We focus on a subset of climate-related natural disasters,\
    \ namely: floods, landslides and storms (\u201Cwet disasters\u201D) and droughts,\
    \ extreme temperatures and wildfires (\u201Cdry disasters\u201D).\" & \"Our analysis\
    \ is based on a panel database of 149 countries over the period 1992\u20132018.\"\
    \ & \"We compute the dependent variable HIT as the sum of the death toll and the\
    \ number of people affected by each disaster, which is the dependent variable\
    \ in the disaster equation and one of the covariates in the inequality equation.\
    \ To allow for direct comparability of the entity of disasters across countries\
    \ and to prevention independently from population density, we standardize the\
    \ dependent variable by previous year\u2019s population (Klomp and Valckx, 2014).\"\
    \ & \"Our analysis is based on a panel database of 149 countries over the period\
    \ 1992\u20132018. To test Hypothesis 1, the dependent variable HIT represents\
    \ the impacts of disasters as the sum of death toll and people affected by each\
    \ event.\" & \"This is the most widely accepted measure of income distribution\
    \ also by virtue of the wide data availability. We collect data on the Gini index,\
    \ computed on disposable income (post-tax, posttransfer), from the Standardized\
    \ World Income Inequality Database (SWIID) developed by Solt (2019), which offers,\
    \ to the best of our knowledge, the widest coverage of income inequality across\
    \ countries and over time.\" & \"These variables are built using the Emergency\
    \ Events Database (EM-DAT), developed by the Centre for Research on the Epidemiology\
    \ of Disasters (CRED), the most comprehensive source on natural catastrophes (Wirtz\
    \ et al., 2014).\" & \"Such an exercise is articulated in three hypotheses.\"\
    \ & \"Further, we propose that a self-reinforcing dynamic may be at play whereby\
    \ income inequality amplifies the magnitude of cumulative damages in locations\
    \ that have suffered repeated catastrophic events.\" & \"Our conjecture is that\
    \ inequality hinders reconstruction and recovery thus further reducing access\
    \ to basic services to the poorest segments of the population.\" & \"Hypothesis\
    \ 1. Unequal societies suffer greater physical damages due to natural disasters.\"\
    \ & \"In this vein, we follow Groeschl and Noy\u2019s (2020) suggestion to frame\
    \ the analysis of natural disasters in a climate change perspective by widening\
    \ the array of disasters as well as the locations and time horizon.\" & \"We focus\
    \ on a subset of climate-related natural disasters, namely: floods, landslides\
    \ and storms (\u201Cwet disasters\u201D) and droughts, extreme temperatures and\
    \ wildfires (\u201Cdry disasters\u201D).\" & \"Figs. 3-4 show that some continents\
    \ exhibit higher exposure to some Thereby typologies of (and impacts from) natural\
    \ disasters. While Latin America and the Caribbean are the regions mostly hit\
    \ by (especially wet) disasters, Asia and Africa are the regions mostly affected\
    \ by dry disasters.\""
  4: "Socioeconomic variables have been selected to represent what Fankhauser and\
    \ McDermott (2014) define the \u201Cadaptation deficit\u201D, which we disentangle\
    \ in demand and supply effects. ... The image is a horizontal bar chart illustrating\
    \ the number of people affected by different types of natural disasters. The x-axis\
    \ represents the number of people hit, ranging from 0 to about 3.0e+09 (3 billion).\
    \ The y-axis lists the types of natural disasters: 1. Floods - The longest bar,\
    \ showing the highest number of people affected, close to 3 billion. 2. Droughts\
    \ - The second longest bar, indicating a significant impact, slightly above 1\
    \ billion people affected. 3. Storms - The third longest bar, affecting around\
    \ 1 billion people. ... The paper examines the impact of natural disasters, highlighting\
    \ the number of people affected by different types of disasters, focusing on socioeconomic\
    \ variables and inequality. ... The analysis uses data from EM-DAT and incorporates\
    \ socioeconomic variables ... the impact of variables like wealth, adaptation\
    \ deficit, and gender disparity is considered using indices such as GDP, HDI,\
    \ and GDI. ... The image is a horizontal bar chart illustrating the number of\
    \ different types of natural disaster events. The categories of disasters are\
    \ listed on the vertical axis, while the horizontal axis shows the number of events.\
    \ 1. Floods: The bar is the longest, indicating the highest number of events,\
    \ close to 4,000. 2. Storms: The second longest bar, showing around 3,000 events.\
    \ ... The data underscores floods as the most frequent and impactful natural disaster,\
    \ affecting the most people, followed by droughts and storms. ... The main explanatory\
    \ variables have been identified following prior empirical studies and can be\
    \ classified in four groups. The first three concern the analysis of disaster\
    \ magnitude and include socioeconomic variables; frequency of climate-related\
    \ disasters and other climate-sensitive geographical features; and other country-based\
    \ controls. Last set of explanatory variables concern the regression on inequality\
    \ and include proxies of social norms.\"\n"
  5: "Methodology: \"The analysis uses a system of simultaneous equations with a Three-Stage\
    \ Least Square (3SLS) estimator to evaluate the relationship between natural disaster\
    \ damages and inequality.\" \n\nSource material: \"We operationalise the empirical\
    \ estimation of these mutual effects by means of a system of simultaneous equations\
    \ in Hypothesis 3... Zellner and Theil (1962) posit that the adoption of a Three-Stage\
    \ Least Square (3SLS) estimator ensures that independence conditions are not violated.\"\
    \n\nDrivers of Risk: \"Extreme climatic events are driven by natural phenomena\
    \ such as El Ni\xF1o and La Ni\xF1a, as indicated by the Oceanic Ni\xF1o Index\
    \ (ONI).\"\n\nSource material: \"We include two dummy variables related to the\
    \ presence of Oceanic Ni\xF1o Index (ONI)... The ONI is based on variations of\
    \ sea surface temperatures from the average to predict the phenomenon of El Ni\xF1\
    o \u2013 Southern Oscillation (ENSO), which triggers extreme climatic events.\"\
    \n\nMethodology: \"The analysis includes control variables such as frequency of\
    \ current and past disasters, geographical location, ethnic inequality, and institutional\
    \ quality.\"\n\nSource material: \"include two controls specifically related to\
    \ the frequency of disasters... To proxy ethnic inequality, we rely on the Ethnic\
    \ Power Relations (EPR) database... as a final control, we introduce continent\
    \ dummies excluding Europe taken as the benchmark... First, countries with well-functioning\
    \ and democratic institutions generally exhibit lower income distribution inequality.\"\
    \n"
