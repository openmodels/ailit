  11: 'Source material here.

    Models were proposed and studied including the autoregressive and multivariate
    versions of LR, RF, and the LSTM neural network. To ensure comparability, all
    of them had access to the same data set, but for each of them, optimal configurations
    were chosen in terms of input and parameters considered.


    This helped to assess how well the models could predict PC concentration and the
    proposed alert level. For short forecast horizons (i.e., < 2 weeks), highly reactive
    models such as LR performed better according to the metrics, but they lacked anticipatory
    capability.


    For longer forecasting horizons (i.e., > 2 weeks), LSTM models provided the best
    performance in all the evaluations performed.


    Moreover, LSTM model provided outstanding results when using PC and TEMP variables
    as inputs showing consistent results across all forecasting horizons, achieving
    an R2 greater than 0.6 for PC concentration prediction, accuracies up to 0.9 for
    the alarm level prediction, and positive skills up to 25% for the longest horizons.

    '
