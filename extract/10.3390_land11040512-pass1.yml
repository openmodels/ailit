  4: "Source material here: Researchers believe that agricultural productivity growth\
    \ is the most effective long-term strategy to tackle the problems of poverty,\
    \ hunger, and malnutrition... the global spike in food prices during 2008\u2013\
    2009 was largely due to declining agricultural productivity... owing to increasing\
    \ anomalies in climate, weather events, and other factors... In this respect,\
    \ examination of TFP change is appropriate, because it allows decomposition of\
    \ total production growth into various components (technology, efficiency, and\
    \ scale changes)... Increased TFP has implications beyond national boundaries\
    \ and can help in achieving internationally set development targets, including\
    \ the sustainable development goal (SDG)... TFP growth will also help in achieving\
    \ sustainability related SDG targets, viz. SDG 12 (responsible consumption and\
    \ production)... SDG 13 (climate action) focusing on resilience and adaptive capacity\
    \ to climate-related hazards and natural disasters... SDG 15 (life on land), which\
    \ is aimed at ensuring conservation, restoration, and sustainable use of ecosystems.\"\
    \n"
  5: 'yaml

    Methodology: "To achieve these objectives, we used the TFP and efficiency estimates
    of Anik et al. [45], which are based on a panel data of 104 countries, to jointly
    identify the influences of climate change, natural production environment, and
    socio-economic factors on global agricultural productivity growth and its finer
    components (i.e., technical-, scale-, and mix-efficiency changes)."

    Highlights: "Given these backdrops, the main objectives of the present study were
    to (a) jointly identify the influences of climate change, natural production environment,
    and socio-economic factors on global agricultural productivity growth and its
    finer components (i.e., technical-, scale-, and mix-efficiency changes); and (b)
    predict the effect of future climate variabilities on global agricultural productivity."

    '
