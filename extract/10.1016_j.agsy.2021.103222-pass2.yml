Highlights:
  1: FEWCalc is accessible to non-technical stakeholders and identifies opportunities
    related to policy-making impacting food-energy-water systems.
  2: The only scenario considered commercially profitable is the Drier Future scenario
    due to reduced expenses for dryland farming, despite simulated income losses being
    offset partially by energy sector income and crop insurance.
  5: The study projects crop yields and income under different climate scenarios in
    Kansas using DSSAT and FEWCalc. The FEWCalc base period is 2008-2017, with three
    wet, three dry, and four average years.
  6: The simulated data from DSSAT is shown to align closely with historical data,
    suggesting the model's validity in tracking agricultural impacts.
  7: Discussion on financial incentives and modeling considerations for renewable
    energy installations using FEWCalc.
  8: Drier climate scenarios lead to earlier adoption of dryland farming due to groundwater
    depletion. Under RCP 8.5, irrigated corn's net income is projected to decrease
    over time, and dryland farming can lead to a net increase in income due to decreased
    expenses, but the reduced yield would be problematic for the global food system.
    Renewable energy development is important to continued viability.
  9: Scenario 1 shows stable outcomes analogous to historical trends; Scenario 2 suggests
    improved agricultural productivity and groundwater levels; Scenario 3 indicates
    reduced crop production, lower net income, and more significant groundwater depletion;
    Scenario 4 visualizes a range of outcomes due to climate variability.
  10: Key outcomes include the profitability of wind energy, the reduction in crop
    income under drier scenarios, and the importance of adapting to climate and market
    pressures.
  11: Renewable wind energy development can potentially balance farming difficulties,
    and solar energy could be a profitable alternative with tax incentives and depreciation
    or a slight reduction in price. FEWCalc helps stakeholders make better decisions
    by connecting local choices to climate impacts and informing policy debates.
Methodology:
  1: Uses FEWCalc, a freeware agent-based model, and DSSAT inputs to evaluate agricultural
    systems in Finney County, Kansas.
  2: The analysis is performed using the FEWCalc model, supported by DSSAT simulations,
    under four climate scenarios and economic projections from 2018-2067.
  5: The analysis uses the DSSAT biophysical model with climate data from 1950-2019,
    and four climate scenarios (Repeat Historical, Wetter/Drier Future, GCM-simulated
    RCP8.5). FEWCalc is used to analyze crop production using DSSAT outputs.
  6: The analysis uses the DSSAT model to simulate agricultural outcomes, comparing
    them with historical data from the Kansas State University and Kansas Department
    of Agriculture.
  7: Uses the FEWCalc model for simulating renewable energy capacity and DSSAT model
    for simulating irrigation impacts on groundwater and surface-water quality.
  8: DSSAT is used to simulate crop production and irrigation water use. FEWCalc is
    used to simulate farm economics under different climate scenarios, including repeating
    historical weather patterns, wetter/drier futures, and RCP 8.5 climate projections.
    Simulations cover a 60-year period.
  10: The analysis uses FEWCalc simulations to assess agricultural and energy performance
    under different climate scenarios in semi-arid Finney County, Kansas.
  11: The FEWCalc model integrates agriculture, energy, water supply/quality, climate
    change, and economics, using agent-based modeling with NetLogo and incorporating
    DSSAT for agricultural production. It can be applied to other regions with local
    data, DSSAT model development, and input variable adjustments.
More Notes:
  2: The FEWCalc model provides a holistic view of food, energy, and water system
    decisions, bridging gaps between global- and local-scale research communities.
  5: The study uses downscaled climate data and crop models to simulate crop production
    in Kansas. It recognizes the impact of global markets on crop prices, especially
    for corn and sorghum produced in the Midwest USA. Soil water content is adjusted
    in the DSSAT model to better reflect drier conditions in the study area.
  7: The page provides a framework for evaluating renewable energy installations impact
    on irrigation but does not directly address specific climate impacts or outcomes.
  11: The authors emphasize the importance of local expertise and historical data
    for accurate model results. FEWCalc is designed to be expandable for technology
    advances, behavioral/policy considerations, and human interaction aspects.
