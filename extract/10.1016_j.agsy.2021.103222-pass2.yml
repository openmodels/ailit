  4: 'text

    "it an ideal candidate for exploring opportunities to sustain farmers'' economic
    well-being under alternative agricultural and energy production choices using
    FEWCalc." "The region''s potential to develop renewable energy, its declining
    water resources, and its rich, 70-year-long time series of historical data makes
    it an ideal candidate for exploring opportunities to sustain farmers'' economic
    well-being... Scenarios 2 and 3 are dominated by wetter or drier years to create
    wetter and drier futures." "Daily weather data for air temperature, precipitation,
    and solar radiation are used as input to DSSAT (Tsuji et al., 1994) and acquired
    as described in Appendix A. A 10-year period from 2008 to 2017 is used as the
    historical base period for this work... Scenario 4 uses DSSAT results in which
    runs use projected air temperature, precipitation, and solar radiation from 20
    downscaled GCMs to represent years 2008 to 2067..." "The random sequence of moderate
    to wet years results in increased crop production with no significant loss of
    yield. Scenario 4 is based on 20 General Circulation Model projections out to
    2098 (Fig. A.5), though only the values through 2067 are used in the FEWCalc demonstration
    provided in this work."

