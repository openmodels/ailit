  10: "yaml\nEvaluation overview: \"This work shows how FEWCalc can provide scientific,\
    \ engineering, and economic analyses required by stakeholders and policy makers\
    \ using data from the semi-arid region around Garden City, Kansas...Overall, the\
    \ DSSAT results are expected to be adequate for the analysis of renewable energy\
    \ development and agricultural performance given potential future climate scenarios\
    \ for which FEWCalc was developed.\"\nDrivers of Risk: \"The scenarios do not\
    \ include technological, crop management, crop price, or energy production changes\
    \ that would be expected to occur. Thus, these results reflect the climate- and\
    \ market-related pressures to which such changes would need to respond to maintain\
    \ crop production and farm incomes.\" + Table 3 (Scenario descriptions and data\
    \ on yields, income, etc.)\nQuantitative material: Table 3 provides the specific\
    \ numerical values for all metrics mentioned.\nMethodology: \"Metrics from the\
    \ four scenarios for 60 years of FEWCalc simulation (2008\u2013 2067)...Overall,\
    \ the DSSAT results are expected to be adequate for the analysis of renewable\
    \ energy development and agricultural performance given potential future climate\
    \ scenarios for which FEWCalc was developed....The scenarios do not include technological,\
    \ crop management, crop price, or energy production changes that would be expected\
    \ to occur.\"\nHighlights: \"climate change predictions would need to be met with\
    \ effective technology changes to address crop production trends that slowly decline\
    \ for the future period. It appears that annual variability would make this trend\
    \ difficult to discern until reductions are substantial...\"\nMore Notes: \"The\
    \ FEWCalc results for Finney County, Kansas, illustrate many of the general challenges\
    \ of farming. The main crops are subject to considerable price uncertainty, weather\
    \ conditions can be harsh and unpredictable, and selected resources have limited\
    \ availability...Solar power makes money some years because of the simulated tax\
    \ credit, depreciation, and loan pay off. Wind power production, on the other\
    \ hand, is generally profitable, in part because of a high wind capacity factor\
    \ in the study area and the simulated 30-year capital lifespan that makes it easy\
    \ to cover installation costs.\"\n"
  11: "Source material here lies within the specified quotes: \"presented here, FEWCalc\
    \ is applicable directly to farmers in arid regions of the middle part of the\
    \ USA interested in alternative income sources. The design of FEWCalc has broad\
    \ applicability for agricultural-energy-water system decision support research\
    \ and education.\" \"In Kansas, the capital costs of solar energy (Fu et al.,\
    \ 2017) are challenging to recover given local solar radiance and electricity\
    \ prices. Renewable wind energy development in this area was shown to potentially\
    \ provide economic opportunities profitable enough to balance farming difficulties...\
    \ FEWCalc illustrates major input variables relevant to renewable energy development\
    \ and how local economic impact can be evaluated and projected.\" \"Agent-based\
    \ modeling using the freeware NetLogo is relatively simple yet flexible enough\
    \ to perform calculations related to energy, water, nitrate in soils and surface\
    \ water, crop insurance, and so on, and integrate results from a separate program\
    \ \u2014 in this case DSSAT for agricultural production, water demand, and fertilizer\
    \ application... Applicability to other regions requires local data, development\
    \ of a DSSAT model, and adjustment of the FEWCalc input variable values. Little\
    \ or no programming would be required.\" \"Renewable wind energy development in\
    \ this area was shown to potentially provide economic opportunities profitable\
    \ enough to balance farming difficulties and enable the persistence of agricultural\
    \ production in the region.\""
