  7: 'Source material here.

    Evaluation overview: FEWCalc results support an analysis of climate impacts on
    crop income in the context of potential farm energy capacity development.


    Drivers of Risk: "Nitrogen is moved to surface water in wet and extremely wet
    years as defined using PDSI," and "In southwest Kansas, where an average peak
    sun hour (PSH) is 5.6 h per day..."


    Quantitative material: "FEWCalc supports the installation of up to 2.4 MW of solar
    installed capacity, which would require 8000 solar panels with a combined area
    of 16.6 acres (6.7 ha) (Ong et al., 2013)," and "In the study area, about 10%
    of the applied nitrogen is thought to be retained for silt loam soil."


    Methodology: "The NetLogo interface (Fig. D.5) is divided into three main areas"
    and "A two-step process was developed using two linear regressions and reported
    Finney County data."


    Highlights: "FEWCalc provides the results needed for the user to produce such
    a comparison."


    More Notes: "The only water use represented in FEWCalc is irrigation to support
    the farm production simulated using DSSAT," and "The applicability of ITC and
    PTC has changed over time and differs with installed capacity and whether wind
    or solar equipment is installed. FEWCalc includes an adjustable range of options."

    '
  8: "Source material:\nCrop   production   and   irrigation   water   use   simulated\
    \   by   DSSAT   for 2008    to   2017 are compared to historical data in Fig.\
    \ 4...FEWCalc is designed to produce the same net income for all scenarios in\
    \ the base period...Six     ten-year     long     base     periods     of    \
    \ precipitation,     temperature,     and crop   prices   are   repeated   consecutively\
    \   to   create   the   60-year   FEWCalc simulation...The only change is when\
    \ groundwater is depleted toward the end of the simulation when dryland farming\
    \ begins...In     Fig.     5d,     the    first     10    years     of    crop\
    \    production    reflect     historical     (2008\u2013          2017)  climate\
    \  variability,  while  years  11  to  60  (2018   to  2067) show    GCM    results...Fig.\
    \ 4c (top figure) shows the effects of accounting for  the  plant  population\
    \  at  seeding  for  corn  under  dryland  farming.  In this  work,  a  plant\
    \  population  of  13,000  plants/acre  (3  plants/m2)  was used....Table 3 shows\
    \ that dry scenario 3 yields an annual average agricul- tural     sector     profit\
    \     of     US$6818...Scenario 4, in contrast, produces the worst average annual\
    \ total revenue of US$48,003, with an NPV of US $1.6 M...Crop   production   and\
    \   irrigation   water   use   simulated   by   DSSAT...Repeated historical irrigation\
    \ water use results in continuous groundwater    level    decline....For     \
    \ the     wetter      future,      FEWCalc      randomly      chooses      a \
    \    greater      per- centage (70% instead of the original 30%) of wet years....Table\
    \ 3 shows that dry scenario 3 yields an annual average agricul- tural     sector\
    \     profit     of     US$6818,     which     is     the     only     commercially\
    \     suc- cessful      scenario      for      agriculture      from      the\
    \      simulations...Renewable energy development is important to continued viability\
    \ and, hopefully, would allow new approaches and technologies to buffer the impacts\
    \ of climate change....average non-irrigated crop net incomes are higher than\
    \ irrigated net incomes because dryland farming expenses for all three crops are\
    \ low enough to make up for lost crop sales....In    FEWCalc,    insurance   \
    \ claims   (Fig.    6b)    start    during   any   period    of transition   to\
    \   dryland   farming   when   the   current   yield   drops   below   the actual\
    \ production history. There are other common situations in which crop insurance\
    \ is indemnified, such as hailstorms and floods, but these are not represented\
    \ in FEWCalc.\n"
