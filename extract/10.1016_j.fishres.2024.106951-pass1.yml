  16: 'Source material here.

    Evaluation overview: "Consistent with previous studies, our results indicate declines
    in biomass and catch for EBS Pacific cod, will increase with future levels of
    climate warming..."

    Drivers of Risk: "...declines in biomass and catch for EBS Pacific cod, will increase
    with future levels of climate warming..."

    Methodology: "The projections assume that the harvest in each year will exactly
    match the catch limit outcomes from the harvest control rules."

