Evaluation overview:
  4: The paper provides an overview of physical climate risks such as major heatwaves,
    agricultural drought, heat stress, and crop duration reductions by 2050, and transition
    risks like economy-wide mitigation costs and carbon price increases by 2030.
  6: Regional climate-related physical hazards and impacts
  8: Long-term temperature targets of 1.5oC, 2oC, 2.5oC, 3oC (NDC Pledges) and 4oC
    (No Policy) with median likelihoods; different scenario variants targeted at meeting
    a 2oC level of 2100 warming with 50% likelihood.
  9: The paper evaluates regional hazard and impact attributes related to climate
    change, considering both acute and chronic risks.
