  34: "Source material here. However, associated temperature changes of between 3\
    \ oC and 4oC by 2100 could result in significant physical risks. Associated temperature\
    \ changes of between 3 oC and 4oC by 2100. First, we explore variations around\
    \ underlying socio-economic trends. Whereas the NGFS scenarios are all driven\
    \ by \u201Cmiddle of the road\u201D assumptions on population and economic growth\
    \ (specifically, the \u201CSSP2\u201D socio-economics16), we include key variations\
    \ that explore very different socio-economic paradigms \u2013 a green growth paradigm\
    \ (SSP117), and a much more challenging paradigm with increasing nationalism,\
    \ higher material consumption and lower educational and technological development\
    \ (SSP318). However, associated temperature changes of between 3 oC and 4oC by\
    \ 2100 could result in significant physical risks. Here we complement and expand\
    \ the scope of the NGFS scenarios in four ways. First, we explore variations around\
    \ underlying socio-economic trends... Second, we explore disorderly scenarios\
    \ through regional fragmentation and staged accession to a long-term temperature\
    \ mitigation strategy."
  35: "Source material here: achieves this goal with immediate but divergent policy\
    \ implementation. Third, we explicitly explore what we deem plausible technology\
    \ variations in the transition pathway to 2oC \u2013 focusing on either a high\
    \ renewables pathway, or one with a greater role for non-renewables (nuclear and\
    \ carbon capture) technologies. Fourth, we explore plausible transition pathways\
    \ which, owing to their slower rate of mitigation, do not achieve the below 2\
    \ oC goal, but rather a higher (~2.5oC) level of warming, in line with several\
    \ experts\u2019 scepticism around the achievability of a 2oC or below temperature\
    \ goal even under a scenario where the Paris Agreement temperature goal is aimed\
    \ for, as well as reflecting a world somewhere between current pledged NDCs and\
    \ envisaged mid-century net-zero targets. We note that the updated NGFS NDC scenarios\
    \ in Phase II now show a similar temperature increase (around 2.5oC) resulting\
    \ from the assumption of increased climate policy commitments. We include a specific\
    \ 1.5oC scenario developed by ClimateWorks Foundation (in partnership with the\
    \ Pacific Northwest National Laboratory GCAM modelling team). This scenario, by\
    \ design, emphasises rapid electricity decarbonisation (with a focus on high non-bioenergy\
    \ renewables, low nuclear and CCS, and low bioenergy) and rapid electrification\
    \ of end use sectors. It also assumes lower industrial manufacture demand (e.g.\
    \ for cement), smaller and more efficient new buildings and a range of transport\
    \ behaviour changes including ridesharing and reduced aviation and shipping demand.\
    \ Land use and agricultural sector assumptions include limited meat consumption,\
    \ improved crop practices that enhance yields, and gradual afforestation. Full\
    \ details of this 1.5oC scenario are available in Ref19. Data availability The\
