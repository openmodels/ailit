  6: "yaml\nEvaluation overview: \"\u2026and a suite of impacts models to estimate\
    \ regional climate-related physical hazards and impacts deriving from the temperature\
    \ change pathways and their underlying socio-economics\"\nDrivers of Risk: \"\u2026\
    and a suite of impacts models to estimate regional climate-related physical hazards\
    \ and impacts deriving from the temperature change pathways and their underlying\
    \ socio-economics\"\nQuantitative material: \"\u2026stemming from scenarios spanning\
    \ 1.5-4oC temperatures\u2026\"\nMethodology: \"We combine a technology-rich, regionally\
    \ disaggregated IAM representing energy system, agricultural and land-based greenhouse\
    \ gas emissions, a reduced complexity climate model to simulate probabilistic\
    \ global temperature changes over the 21st century, and a suite of impacts models\u2026\
    \"\nHighlights: \"Here we present a fully integrated framework to undertake a\
    \ self-consistent analysis of physical and transition risks stemming from scenarios\
    \ spanning 1.5-4oC temperatures\u2026\"\nMore Notes: \"Our presentation of results\
    \ is focused on the world as a whole and four key regions (China, USA, EU+UK and\
    \ India), with additional results for additional major regions (Brazil, Japan,\
    \ Middle East, Russia and Sub-Saharan Africa) presented in Extended Data and Supplementary\
    \ Information\u2026\"\n"
  8: 'Source material: We show the emissions and associated temperature changes across
    the 21st century for two groups of the 11 scenarios (Figure 1): the first group
    of five scenarios span long- term temperature targets of 1.5oC, 2oC, 2.5oC, 3oC
    (NDC Pledges) and 4oC (No Policy) with median likelihoods; the second set shows
    the different scenario variants targeted at meeting a 2oC level of 2100 warming
    with 50% likelihood. The No Policy scenario, with coal, oil and gas demand growing
    by 72%, 58% and 143% respectively over the period 2020-2100, sees temperatures
    rise to 4.3oC by 2100. This results from a lack of land use policy, carbon and
    energy intensity improvements which are slower than recent historical rates, and
    supports other analysis on the challenges of meeting lower temperature targets
    in the SSP3 world. The NDC Pledges scenario, by contrast, presents a more realistic
    picture of current ambitions, with median temperature projections rising to 3.1oC
    by 2100. The 1.5C scenario peaks at 1.7oC around 2050, before returning to below
    1.5oC by 2080 and down to 1.3oC by 2100.'
  9: null
  10: 'Source material here: Of the physical risk indicators considered here, the
    chance of experiencing a major heatwave and the three agricultural indicators
    have the most highly non-linear relationships with temperature, so show the greatest
    difference between the temperature scenarios. For example, there would be a 30-40%
    greater chance of a major heatwave in 2050 with the NDC Pledges scenario than
    the 2C Central scenario in most regions. The metrics are all normalised by values
    in 2050 (physical risk) and 2030 (transition risk) with the 2C Central scenario.
    The greatest differences between the NDC Pledges and 2C Central scenarios in the
    chance of river flooding are in India (18% increase, compared to 12% globally),
    and the greatest differences in agricultural drought frequency are in India (around
    a 25% increase).'
  11: "SubSaharan Africa (25% increase) and Middle East (50% increase) \u2013 see\
    \ Extended Data Figure 2, for regions not shown in Figure 2. The frequency of\
    \ periods with heat stress for maize would increase by over 50% in Russia and\
    \ the EU+UK (slightly less in Brazil), and regional reductions in maize yield\
    \ (resulting from reduced growth durations) could be consistently 20-30% greater\
    \ with the NDC Pledges scenario than the 2C Central scenario. Differences between\
    \ the temperature scenarios in absolute terms are shown in Supplementary Figures\
    \ S4.1-S4.10. The ratios of physical risk in each scenario compared to the 2C\
    \ Central scenario, as shown in Figure 2, are calculated from median estimates\
    \ of the indicators. There is an uncertainty range around these ratios, determined\
    \ by uncertainty in the shape of the relationship between temperature and metric\
    \ (a version of Figure 2 using maximum ratios is shown in Extended Data Figure\
    \ 3)."
  12: "Global abatement costs in 2030, which affect overall macroeconomic performance\
    \ of each region and the world as a whole, are 1.6% of global GDP in the 1.5C\
    \ scenario, compared to 0.6% in the 2C Central scenario, whilst the 2C Central\
    \ scenario\u2019s abatement cost is about 40% higher than that of the NDC Pledges\
    \ scenario (at 0.4% of global GDP) ... Fossil fuel demand reductions and coal\
    \ plant reductions are also notable in their inter-scenario intensity variation\
    \ ... this result is model-specific to GCAM, with other models showing more stringent\
    \ 2oC pathways to 2030, compared to the NDC case, for the EU+UK and USA ... it\
    \ importantly highlights that there is no set low-carbon transition pathway \u2013\
    \ and therefore no set degree of risk - to a given temperature pathway in each\
    \ region ... The abatement cost alone does not capture all macro-economic consequences,\
    \ if for example it results in a net investment, innovation and growth stimulus\
    \ to the economy. Further macro-modelling analysis would be required to substantiate\
    \ this ..."
