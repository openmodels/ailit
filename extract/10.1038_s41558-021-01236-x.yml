Highlights:
  4: By 2050, physical risks are greatly temperature pathway-dependent; by 2030, transition
    risks are most sensitive to temperature pathways and also depend on technological,
    policy, and socio-economic factors.
  6: Presents a fully integrated framework to undertake a self-consistent analysis
    of physical and transition risks.
  8: Absent climate policy (No Policy scenario), temperatures rise to 4.3oC by 2100.
    Current ambitions (NDC Pledges) lead to 3.1oC warming by 2100.
  9: The study utilizes seven physical hazard indicators to assess regional climate
    risks, differentiating between acute (likelihoods) and chronic (annual averages
    of impact) risks.
  10: India would see an 18% increase in the chance of river flooding and around a
    25% increase in agricultural drought frequency compared to the 2C Central scenario.
  11: Comparison of physical risk ratios between temperature scenarios shows greater
    risk under the NDC Pledges scenario.
  12: "There is no set low-carbon transition pathway \u2013 and therefore no set degree\
    \ of risk - to a given temperature pathway in each region."
  13: Even scenarios aimed at the same temperature goal can have considerably different
    transition risks by 2030. The 2C SSP3 scenario shows the greatest energy system
    transition risks.
  14: "Single-model analysis reinforces the finding of inter-model diversity of results\
    \ from the NGFS scenarios; Illustrative 1.5oC pathway sits within the range of\
    \ the IPCC\u2019s SR1.5 database of 1.5oC-consistent scenarios; 2oC-targeted pathway\
    \ ensemble mostly overlaps with the possibility space as represented in the database"
  15: Scenarios with similar longer-term physical risks may have very different near-term
    transition risks.
  16: The framework provides a first step towards a scenario expansion for financial
    risk estimates involving both physical and transition risks, without explicitly
    accounting for adaptation measures.
  17: No relevant information
  18: "The key highlight is the range of potential climate futures based on different\
    \ mitigation pathways, with a focus on scenarios compliant with the Paris Agreement\
    \ (2\xB0C and 1.5\xB0C) and exploring the implications of different socio-economic\
    \ assumptions and technological choices."
  20: "The paper quantifies physical and transition risks for different regions under\
    \ various climate scenarios, focusing on a range of long-term temperature outcomes\
    \ (1.5-4\xB0C and scenarios targeted at 2\xB0C). The analysis incorporates uncertainty\
    \ ranges for temperature increases."
  22: No relevant information
  26: Fiedler et al. (2021) discuss business risk and the emergence of climate analytics;
    Bernstein et al. (2019) analyze the price effect of sea level rise; Battiston
    et al. (2017) perform a climate stress test of the financial system.
  28: The paper focuses on a subset of integrated assessment model (IAM) outputs to
    capture the most salient transition risk-related variables, drawing from indicators
    that track progress towards the Paris Agreement goals.
  29: Emissions intensity at sectoral levels is a central metric to benchmark company
    performance. IAM-based indicators of feasibility of transition emphasise the importance
    of abatement costs and carbon prices, as well as reaffirming the importance of
    coal plant idling and capacity reductions. Many metrics are directly useful for
    measuring transition risks and have been included in our transition indicator
    analysis (mitigation costs, emissions intensity; fuel shares).
  30: No relevant information
  33: Reduction in crop growth duration of at least 10 days corresponds to an approximate
    8% reduction in potential yield.
  34: Associated temperature changes of between 3 oC and 4oC by 2100 could result
    in significant physical risks.
  35: "Explores the achievability of 2\xB0C or below temperature goals; includes scenarios\
    \ between current pledged NDCs and mid-century net-zero targets."
Methodology:
  4: The framework explores near-term transition risks to 2030 and longer-term physical
    risks to 2050 for different emissions and temperature pathways.
  6: Combines a technology-rich, regionally disaggregated IAM, a reduced complexity
    climate model, and a suite of impacts models.
  8: Emissions scenarios and associated temperature changes across the 21st century
    were modeled.
  9: The indicators are calculated at the 0.5x0.5o resolution and averaged to the
    regional scale. Likelihoods are interpreted as acute risks, while the average
    annual change in crop growth duration is considered a chronic risk. Impacts are
    expressed as annual averages, characterizing chronic risks.
  10: Physical risk metrics are normalized by values in 2050, and transition risk
    metrics by 2030, with the 2C Central scenario used as a baseline.
  12: The result regarding transition risk metrics for the EU+UK and USA under the
    NDC Pledges scenario is model-specific to GCAM. The paper also uses different
    '2oC scenario variants'.
  13: "Analysis uses a range of 2\xB0C-targeted scenarios to assess transition dynamics\
    \ and risks up to 2030."
  14: Broad scenario sensitivity within a single model, analysis situated within the
    broader ensemble of mitigation pathways from recent years, consideration of uncertainty
    and more extreme values, futures analysis approaches beyond systems modelling
  15: Analysis serves as a framework for comparing physical and transition risks,
    with potential for wider scenarios and metrics.
  16: The framework involves downscaling sector-level and economy-wide outputs from
    IAMs to firm- and household-level financial risks.
  17: The study uses GCAM (run by H.M. and M.G.), MAGICC (run by D.B.), and climate
    impact models (run by N.W.A.) to analyze scenarios. S.Mi. conducted scenario data
    analysis and visualization.
  18: The analysis uses different climate scenarios based on various policy assumptions
    (No Policy, NDC Pledges, Paris Agreement compliant transitions) and socio-economic
    pathways (SSPs). The scenarios consider different start dates for mitigation efforts,
    technological preferences (renewables vs. nuclear/CCS), and levels of international
    cooperation.
  19: The analysis assesses physical hazard indicators in 2050 and transition risk
    indicators in 2030, relative to a No Policy scenario. Specific methodologies are
    not detailed on this page, but the examples provided reference external studies
    and databases.
  20: Integrated assessment and physical impacts models are used for scenario analysis.
    The analysis evaluates physical risks in 2050 and transition risks in 2030 under
    different temperature scenarios.
  22: No relevant information
  26: "K\xF5berle et al. (2021) provide a guide to building climate-financial scenarios\
    \ for financial institutions; Carlin et al. (2021) provide a practical guide to\
    \ climate transition scenarios for financial professionals; Battiston et al. (2017)\
    \ perform a climate stress-test of the financial system; Bank (2021) provides\
    \ a Financial Stability Review."
  27: CO2 prices to meet emission constraints are calculated in each model period,
    with land-use change emissions priced separately as an exogenously specified proportion
    of fossil emissions price.
  28: The paper uses the GCAM model, version 5.1, to track emissions of 24 GHGs, aerosols,
    and short-lived species based on energy, agriculture, and land systems activity.
  29: Utilizes Integrated Assessment Models (IAMs) and diagnostic exercises to compare
    IAM characteristics. The analysis focuses on metrics produced as outputs from
    IAMs. Useful for measuring transition risks and useful for diagnosing model.
  30: Temperature outputs from GCAM version 5.1 are used as input. Leading order uncertainties
    are included by running each emissions scenario through a probabilistic variant
    of the MAGICC4.2 simple climate model. Uncertainty is sampled by perturbing equilibrium
    climate sensitivity, the ocean mixing rate and a measure of climate-carbon cycle
    feedback strength. Unceratin parameter distributions are taken from the climate
    modelling literature.
  31: The study compares risk distributions under different scenarios by characterizing
    risks by the median ratio between scenarios and also shows the 90th percentile
    ratio as a 'worst case'.
  32: The study uses climate scenarios scaled to observed climate time series (1981-2010)
    at a 0.5x0.5 degree scale. River flows were simulated with the Mac-PDM.09 global
    hydrological model. Drought is assessed using the Standardized Runoff Index (SRI)
    calculated from 12-month accumulated runoff. Results are applicable to the scaled
    climate scenarios corresponding to specific increases in global mean surface temperature.
  33: Agricultural drought is calculated using the Standardised Precipitation Evaporation
    Index (SPEI), accumulated over 6 months.
  34: explore variations around underlying socio-economic trends... a green growth
    paradigm (SSP1), and a much more challenging paradigm with increasing nationalism,
    higher material consumption and lower educational and technological development
    (SSP3).
  35: Explores plausible technology variations and transition pathways to different
    temperature goals using GCAM modeling; GCAM data system available at https://gitbhub.com/JGCRI/gcamdata.
  37: Uses a standardized runoff index (Shukla & Wood, 2008)
More Notes:
  5: This page primarily discusses the need for integrated assessments of climate
    change pathways, considering both transition and physical risks. It highlights
    the gap in the literature and points to the NGFS scenarios as a valuable resource.
    It does not present original data or analysis of direct climate impacts.
  6: Results are focused on the world as a whole and four key regions (China, USA,
    EU+UK and India), with additional results for additional major regions (Brazil,
    Japan, Middle East, Russia and Sub-Saharan Africa).
  12: Abatement cost alone does not capture all macro-economic consequences, if for
    example it results in a net investment, innovation and growth stimulus to the
    economy. This would require further macro-modelling analysis.
  13: Technology and sector-specific dynamics governing any temperature pathway depend
    on particular scenario features, making it imperative to consider these nuances
    in risk assessments.
  14: The paper emphasizes the importance of considering uncertainty, extreme values,
    and futures analysis approaches beyond systems modelling for comprehensive risk
    assessments.
  17: "The study was funded by the ClimateWorks Foundation and the H2020 European\
    \ Commission Project \u201CPARIS REINFORCE\u201D. A.C.K. advised on financial\
    \ risk analysis and literature."
  18: The table outlines a scenario-based approach to explore climate change impacts,
    considering a range of policy and technological options. Several scenarios refer
    to the Shared Socioeconomic Pathways (SSPs), indicating an integrated assessment
    modeling framework.
  20: The paper considers both risks (negative impacts) and opportunities (e.g., low-carbon
    technologies). Building, Industry and Transport CO2 intensity is also considered.
  22: No relevant information
  26: No relevant information
  28: The paper focuses on transition risks from the shift to low-carbon energy, not
    direct climate impacts. It utilizes GCAM to model emissions, but subsequent climate
    and impact modeling are done separately.
  29: The analysis does not consider the potential stimulus effect of low-carbon investment
    on economic growth.
  30: The study does not attempt to convert metrics into value-at-risk or value losses.
  34: 'Complements and expands the scope of the NGFS scenarios in four ways: socio-economic
    trends (SSP1 and SSP3), disorderly scenarios through regional fragmentation, and
    staged accession to a long-term temperature mitigation strategy.'
  35: No relevant information
Quantitative material:
  6: Scenarios spanning 1.5-4oC temperatures
  8: No Policy scenario sees temperatures rise to 4.3oC by 2100; NDC Pledges scenario
    projects 3.1oC warming by 2100; 1.5C scenario peaks at 1.7oC around 2050, before
    returning to below 1.5oC by 2080 and down to 1.3oC by 2100.
  9: The paper calculates the annual likelihoods of heatwave, major heatwave, hydrological
    drought, river flooding, agricultural drought, and maize heat stress. It also
    calculates the annual change in maize crop duration.
  10: The chance of a major heatwave in 2050 with the NDC Pledges scenario is 30-40%
    greater than the 2C Central scenario.
  11: Regional reductions in maize yield could be consistently 20-30% greater with
    the NDC Pledges scenario than the 2C Central scenario.
  12: "Global abatement costs in 2030 are 1.6% of global GDP in the 1.5C scenario,\
    \ compared to 0.6% in the 2C Central scenario. The 2C Central scenario\u2019s\
    \ abatement cost is about 40% higher than that of the NDC Pledges scenario (at\
    \ 0.4% of global GDP)."
  13: Carbon prices are around twice as high in the 1.5C scenario than in the 2C Central
    scenario, but only a quarter as large in the 2.5C scenario.
  14: Range of 2030 transition indicator values
  17: No relevant information
  18: "The table provides quantitative information in terms of projected median warming\
    \ by 2100 for each scenario (e.g., ~4\xB0C for No Policy, ~3\xB0C for NDC Pledges,\
    \ 2.5\xB0C, 1.5\xB0C)."
  19: The paper includes annual likelihoods (in % chance) of heatwaves, major heatwaves,
    river floods, hydrological drought, agricultural drought, and heat stress for
    maize; change in maize crop growth duration (days); economy-wide abatement cost
    ($billion, % of GDP); carbon price ($/tCO2); GHG emissions intensity of GDP reductions
    (tCO2e/$000); fossil fuel demand reductions (EJ/year); coal plant capacity reductions
    (GW); electricity prices ($/kWh); and crop prices ($/Mcal).
  20: "Metrics are expressed as a ratio of each scenario\u2019s value and the value\
    \ for the 2C Central scenario.  Physical risk metrics are the median ratio across\
    \ the uncertainty range. Transition risk metrics are for 2030, physical risk metrics\
    \ are for 2050. Circle size indicates 2100 median temperature increase on pre-industrial\
    \ levels."
  22: No relevant information
  26: Bernstein et al. (2019) discuss the price effect of sea level rise; Carlin et
    al. (2021) is a 62 page document.
  28: No relevant information
  29: Relative abatement index (share of baseline emissions reduced), emissions reduction
    type index (share of abatement from supply-side measures), marginal abatement
    cost curves (emissions reductions vs. carbon prices), energy intensity, carbon
    intensity, fuel shares (fossil/non-fossil), mitigation costs, mitigation cost
    per unit of carbon pricing.
  30: No relevant information
  32: Heatwaves are defined as exceeding the 95th percentile (occurring in ~35% of
    years) or 99th percentile (occurring in <5% of years) of daily temperatures. A
    drought is defined as an SRI of less than -1.5, which occurs 6.8% of the time
    during the reference period.
  33: Global average likelihood of a significant drought is around 9-10%; experiencing
    at least five days with damaging temperatures during the maize reproductive phase
    has a global average likelihood of around 5%.
  34: temperature changes of between 3 oC and 4oC by 2100
  35: "Explores pathways to 2\xB0C and ~2.5\xB0C warming; includes a specific 1.5\xB0\
    C scenario."
  37: Assessment of the impact of climate change on water scarcity globally (Gosling
    & Arnell, 2016); Assessment of the impacts of climate change on river flood risk
    at the global scale (Arnell & Gosling, 2016); Standardized runoff index for characterizing
    hydrologic drought (Shukla & Wood, 2008)
