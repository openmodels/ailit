  31: "Source material here: Seven indicators of hazard and related impact across\
    \ different sectors were calculated for each emissions scenario. All are based\
    \ on spatially-explicit global- scale impacts models. The indicators represent\
    \ exposure to drought, river flooding, heatwaves, and reductions in potential\
    \ crop yield. All impacts are calculated over a 30-year period. Each indicator\
    \ is characterised by damage functions relating indicator to increase in global\
    \ mean surface temperature, calculated separately from climate scenarios constructed\
    \ from 23 CMIP5 climate models14. We compare the distributions of risk at a place\
    \ for a given scenario with the risks under the 2C Central scenario, and characterise\
    \ physical risks by the median ratio between the scenarios (and show also the\
    \ 90 th percentile ratio in Extended Data Figure 3 as a \u2018worst case\u2019\
    )."
