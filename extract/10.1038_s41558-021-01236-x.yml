  27: GCAM is an open-source, technology-rich model of the energy, economy, agriculture
    and land use, water, atmosphere, and climate systems55. GCAM is a five-year time
    step, dynamic-recursive market equilibrium model which represents the global economy
    by disaggregating the world into 32 geopolitical regions, 235 river basins and
    384 agro-ecological land-use regions. GCAM version 5.1, as used in this study,
    is calibrated to a historic base year (2010)...All emission constraints are assumed
    to begin in 2025 (except for the NDCs, which begin in 2020). GCAM uses assumptions
    about population growth and changes in labour productivity, along with representations
    of resources, technologies, and policies, and solves for the equilibrium prices
    and quantities of various energy, agricultural, and CO2/GHG markets in each five-year
    model period from 2010 (the calibration year) to 2100...GCAM calculates the CO2
    prices required to meet the emissions constraint imposed in each model period.
    Land-use change emissions are in addition to the constraint, and their price is
    determined as an exogenously specified proportion of the fossil emissions price.
  28: 'GCAM tracks emissions of 24 GHGs, aerosols, and short-lived species endogenously
    based on the resulting energy, agriculture, and land systems activity. Emissions
    can then be passed to the climate carbon-cycle module and converted to concentrations,
    radiative forcing, temperature, and other responses to the climate system, although
    in this study, a separate climate module and impacts models are used for these
    subsequent steps.


    Transition risks derive from the rapid shift from carbon-intensive to low-carbon
    energy sources and technologies, as well as associated structural changes in economies
    from carbon-intensive industries (such as industrial manufacturing using fossil
    fuel combustion for high temperature heat) to low-carbon sectors (such as digital
    services utilising low-carbon electricity).


    Here we focus on a subset of integrated assessment model (IAM) outputs to capture
    the most salient transition risk-related variables. We first draw from a set of
    indicators to track progress towards the Paris Agreement goals.'
