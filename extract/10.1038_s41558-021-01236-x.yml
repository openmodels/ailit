  15: 'yaml

    Drivers of Risk: "Significant near-term transition risks to specific business
    sectors could result from carbon prices, potential stranding of carbon-intensive
    assets such as coal-fired power stations, and demand reductions for fossil fuels
    and the technologies that use them, as well as changes to electricity and food
    prices resulting from the transitions."

    Drivers of Risk: "Higher economy-wide abatement costs could affect assets across
    the business and household sectors, depending on both the resource cost and investment
    stimulus consequences of these additional incurred costs."

    Highlights: "However, such scenarios result in lower physical climate hazards
    throughout the century...the more stringent the mitigation action, the higher
    the abatement costs and sector-specific transition risks."

    Highlights: "The multiple 2oC pathways explored demonstrate that scenarios with
    similar longer-term physical risks could have very different near-term transition
    risks."

    Methodology: "In sum, though not a comprehensive assessment of all future possibilities
    and uncertainties, this analysis serves as a critical framework for comparing
    physical and transition risks. It can viably be built upon to encompass a wider
    range of scenarios and metrics as desired."

    '
  16: "yaml\nMethodology: \"Our integrated scenario analysis framework can be built\
    \ upon by interested stakeholders across business, finance, household and government\
    \ sectors...the framework serves as a first step towards a full \u201C scenario\
    \ expansion\u201D towards financial risk estimates50, which would involve quantitatively\
    \ downscaling sector- level and economy-wide outputs from IAMs to firm- and household-level\
    \ financial risks.\"\nHighlights: \"Nevertheless, the insights gleaned from comparing\
    \ physical and transition risks in a consistent scenario framework provides a\
    \ clear basis for building such analysis, including identifying underlying drivers\
    \ of economic changes that result from them...In addition, we do not explicitly\
    \ account for adaptation measures in our analysis, but recognise that it is clearly\
    \ of critical importance that the translation of risks to economic impacts takes\
    \ into account the storyline of each region\u2019s adaptation and risk resilience\
    \ frameworks...In essence, we provide the first chapter in this storyline of global\
    \ and regional physical and transition consequences of different plausible emissions\
    \ pathways.\"\n"
  17: "The study was funded by ClimateWorks Foundation. A.K. and S.M. acknowledge\
    \ the H2020 European\nCommission Project \u201CPARIS REINFORCE\u201D under Grant\
    \ Agreement No. 820846. ...\nA.G. and S.Mo. conceived the study. A.G., D.B., J.L.,\
    \ H.M., J.R., M.G., N.W.A. and S.Mo. designed the\nscenarios and modelling protocol.\
    \ H.M. and M.G. ran GCAM. D.B. ran MAGICC. N.W.A. ran the\nclimate impact models.\
    \ S.Mi. undertook all scenario data analysis and visualisation. A.C.K. advised\
    \ on\nfinancial risk analysis and literature.\nCorrespondence to Ajay Gambhir.\n\
    Competing Interests The authors declare no competing interests."
  18: 'Source material: Table 1: Scenario details No. Name Details Rationale No Policy
    No new policies from 2010. This mirrors the NGFS9 and Bank of England (BoE) scenarios
    with no new policies, and reaches ~4oC of median warming by 2100. NDC Pledges
    NDCs to 2030. Assumes NDCs met under the Paris Agreement from 2015 to 2030 and
    then a continuing trend of reduction of regional GHG intensities, leading to ~3oC
    of median warming by 2100. 2C Central Paris Agreement compliant transition from
    2025. Socio-economics based on second shared socio-economic pathway (SSP2). Full
    technology portfolio. 2C Fragmented Different start dates of 2oC-consistent action,
    with some countries going early e.g. EU+UK, USA, and others going later e.g. China,
    Russia, Brazil, India. 2C SSP1 Alternative underlying socio-economics to 2C Central
    (i.e. scenario number 3), focusing on greater resource efficiency and energy efficiency,
    utilising the SSP1 dynamics. Lowest temperature scenario provides a critical contrast
    to others in terms of full-century physical risk. The table outlines a scenario-based
    approach to explore climate change impacts, considering a range of policy and
    technological options. Several scenarios refer to the Shared Socioeconomic Pathways
    (SSPs), indicating an integrated assessment modeling framework.'
  19: "Annual likelihood of a heatwave (% chance)) Heatwaves adversely impact upon\
    \ human health and wellbeing: the heatwave definition here currently occurs in\
    \ around 35% of years. Annual likelihood of a major heatwave (% chance) Heatwaves\
