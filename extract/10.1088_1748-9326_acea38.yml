Drivers of Risk:
  2: Flooding events (specifically Hurricane Sandy), flood insurance (NFIP participation),
    and community risk perception are drivers of risk for housing prices.
  3: Hurricane Sandy and community perceptions of flooding risk in New Jersey, New
    York, and Connecticut.
  4: "Drivers include storm surge, riverine, and pluvial flooding with tropical storms\
    \ and Nor\u2019easter cyclones impacting flood risk."
  5: The paper modifies the model to separate the effects of surge- and rainfall-driven
    flooding events on the study region.
  6: Flood events, particularly Hurricane Sandy and minor floods, impact housing prices.
  7: Flooding events, including intense rainfall, droughts, and coastal storm surge
    are identified as drivers of risk.
  8: Flooding events and perceptions of flood risk, as well as NFIP participation.
  9: Precipitation and storm surge flood hazard.
  10: The paper considers climate change and changes in flooding hazards along the
    U.S. coasts.
Evaluation overview:
  2: Home values and economic recovery for communities are evaluated in the context
