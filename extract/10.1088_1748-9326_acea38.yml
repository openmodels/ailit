    \ characterized by heavy tropical storms that bring both intense precipitation\
    \ and wind-driven storm surge. Nor\u2019easter cyclones are most common during\
    \ the winter season and can cause elevated storm surge and intense precipitation.\"\
    \n\nQuantitative material: \"From 1979 to 2021, the average annual number of flood\
    \ insurance claims submitted through NFIP in this region was 3,476 claims 1year\u2212\
    \ 1 with an average annual claim total of $112 million.\"\n\nMethodology: \"We\
    \ studied relationships between HP dynamics and community awareness of flooding\
    \ with a SE model...This model simulates annual economic losses (L), population\
    \ density (D), community flood awareness (A), and flood preparedness (P) based\
    \ on a time series of peak annual flood hazards...\"\n\nHighlights: \"Historical\
    \ NFIP flood losses were highest with 75247 claims in 2012, due to rainfall and\
    \ storm surge from Hurricane Sandy...\"\n"
  5: "markdown\nDrivers of Risk: \"For application to the study region, we modified\
