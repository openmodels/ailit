Methodology:
  2: A socio-environmental (SE) model and interrupted time series model were used
    to study the temporal impact of flooding on mean housing values. The modeling
    exercise demonstrated that the initial economic impact of Hurricane Sandy was
    largely absorbed by the National Flood Insurance Program (NFIP).
  3: Community perceptions of flooding were estimated using a socio-environmental
    (SE) model applied to census tracts, validated with socio-economic datasets.
  4: Analysis is performed using a SE model simulating community responses to peak
    annual flood hazards, examining economic losses, population density, community
    awareness, and flood preparedness.
  5: The analysis involved adapting the SE model to include sigmoid, interrupted time
    series, and K-shaped recovery models for temporal changes in housing patterns
    due to flooding impacts, and calibrating for each census tract using data from
    1970 to 2021.
  6: Uses ITS model calibrated with NFIP claims and housing market data to simulate
    housing price dynamics post-flooding.
  7: The paper develops and compares three models (Sigmoid recovery model, ITS model,
    and K-shaped recovery model) to simulate housing price responses to flooding events.
  8: Correlation analysis of calibrated SE model parameters (awareness, preparedness,
    and memory of floods) across census tracts, focusing on the relationship between
    these parameters and housing prices after flooding. Analysis is applicable to
    the study region and the states of New Jersey, New York and Connecticut over the
    time period that the data was collected on.
  9: 'Developed a SE model to assess the impact of floods on future HPs, which then
    feedbacks to the estimate of future flood loss. Includes four HP response scenarios:
    no impact, sigmoid recovery, ITS recovery, and K-shaped recovery. The ITS recovery
    model best captured flooding dynamics in the study region.'
