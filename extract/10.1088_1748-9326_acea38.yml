Highlights:
  2: The initial economic impact of Hurricane Sandy was largely absorbed by the NFIP,
    but the region then exhibited a long-term decline in home values. NFIP participation
    and the salience of past flooding events are important regional drivers of housing
    prices.
  3: Perceptions of risk have shaped home value recovery post-Hurricane Sandy, rather
    than actual hazard regimes.
  4: In 2012, the historical highest flood losses were due to Hurricane Sandy, with
    75,247 claims submitted.
  6: Hurricane Sandy resulted in a gradual rise in housing prices with a decline in
    the immediate impact of flooding; ITS model showed limited initial impact on housing
    prices followed by gradual decline.
  7: The SE model suggests the immediate negative consequences of an isolated intense
    flooding event may continue to be absorbed by NFIP.
  8: NFIP participation appears to have shielded the housing market from a substantial
    immediate economic loss, but may have unintentionally conditioned housing values
    on perceived risks. Increases in NFIP participation are correlated with short-term
    perceptions of increased risk and long-term decline in housing values. There is
    variation in correlations across the states, which may be due to differences in
    social vulnerability.
  9: The ITS recovery model best captured flooding dynamics in the study region. Census
    tracts with greater change in insurance uptake following floods witnessed larger
    decreases in mean home values compared to those with more stable NFIP participation.
