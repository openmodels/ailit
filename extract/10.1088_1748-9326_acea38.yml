sourcematerial:
  2: "Source material here.\nHow flooding affects home values can determine the path\
    \ of economic recovery for communities and have lasting impacts on national and\
    \ global financial systems.\nTo explore this, we used a socio-environmental (SE)\
    \ model and studied the temporal impacts of flooding on mean housing values across\
    \ 496 coastal census tracts of New York, Connecticut, and New Jersey, US, from\
    \ 1970 to 2021. The modeling exercise demonstrated that the initial economic impact\
    \ of Hurricane Sandy was largely absorbed by the National Flood Insurance Program\
    \ (NFIP); however, the region then exhibited a long-term decline in home values,\
    \ which was well described by an interrupted time series model. We found significant\
    \ correlations between SE model parameters describing HP change and those describing\
    \ tract-scale behaviors and perceptions, suggesting that the salience of past\
    \ flooding events and NFIP participation may be important regional drivers of\
    \ HPs.\nTracts with greater post-flood change in active insurance policies exhibited\
    \ larger decreases in mean home values than those with more stable NFIP participation.\n\
    An improved understanding of relationships between HPs, flood insurance, and community\
    \ perceptions could support more equitable distribution of resources and improved\
    \ policy interventions to reduce flooding risk. \n"
