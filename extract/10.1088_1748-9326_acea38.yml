    applied to 496 census tracts. Calibrationof an SE model to SE datasets allows
    for estimation of community flood perceptions (Barendrechtet al 2019 , Knighton
    et al 2021 ). The SE model-ing was validated with publicly available socioeco-nomic
    datasets of population density (US census),flood insurance claims and policies
    (US NFIP),and HP estimates (National Historical GeographicInformation System and
    Zillow). Across the northeastern US, there is evidencethat recent changes in coastal
    housing prices (HPs)have been driven more by perceptions of risk ratherthan actual
    hazard regimes (Bakkensen and Barrage2022 ).'
  4: "Source material here.\nEvaluation overview: \"This region has a documented history\
