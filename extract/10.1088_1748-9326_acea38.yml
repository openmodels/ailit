Quantitative material:
  2: The study examines the temporal impacts of flooding on mean housing values across
    496 coastal census tracts in New York, Connecticut, and New Jersey from 1970 to
    2021. Tracts with greater post-flood change in active insurance policies exhibited
    larger decreases in mean home values than those with more stable NFIP participation.
  3: Study focused on 496 coastal census tracts in New York, New Jersey, and Connecticut.
  4: The average annual number of flood insurance claims from 1979 to 2021 was 3,476,
    with an annual claim total average of $112 million.
  5: The Kling-Gupta Efficiency (KGE) is calculated between various metrics, such
    as simulated awareness and NFIP policies, as a quantitative measure.
  7: The paper presents annual time series of NFI reported flooding insurance claims.
  8: Correlations between SE model parameters (alertness, preparedness, decay rates
    of hope and precautionary measures) across census tracts in the study region and
    individual states (New Jersey, New York, and Connecticut), with indications of
    statistical significance (p < 0.05, p < 0.01, p < 0.001).
  9: Immediate impact of 2012 Hurricane Sandy on the housing market was largely absorbed
