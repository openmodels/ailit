    Drivers of Risk: "Large scale, discrete and recognizable events that may destroy
    a significantly large number of assets within any of the asset categories. Such
    events will generally be easy to identify. They include major earthquakes, volcanic
    eruptions, tidal waves, exceptionally severe hurricanes, drought and other natural
    disasters; acts of war, riots and other political events; and technological accidents
    such as major toxic spills or release of radioactive particles into the air."

    Highlights: "Included here are such major losses as deterioration in the quality
    of land caused by abnormal flooding or wind damage; destruction of cultivated
    assets by drought or outbreaks of disease; destruction of buildings, equipment
    or valuables in forest fires or earthquakes."

