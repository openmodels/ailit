Drivers of Risk:
  3: Global average temperature change for different scenarios (SSP1-2.6, SSP2-4.5,
    etc.)
  6: Extreme weather events are more frequent and likely to become more so
  7: Hurricanes Katrina and Rita
  8: Floods, storms, fires, droughts, heat waves (US weather and climate disasters)
  10: Billion-dollar weather and climate disasters are identified as key drivers impacting
    consumption of fixed capital.
  15: Large scale, discrete and recognizable events impacting asset categories include
    earthquakes, volcanic eruptions, tidal waves, severe hurricanes, droughts, natural
    disasters, acts of war, political events, and technological accidents.
Evaluation overview:
  3: Global aggregate economic impact estimates based on different levels of global
    warming.
  6: Asset damage from weather and climate disasters
  7: Full disaster costs (associated with events like Hurricanes Katrina and Rita)
  8: Asset costs of disasters; Costs of weather and climate disasters (floods, storms,
    fires, droughts, heat waves)
  9: The figure describes 'BEA and NOAA Costs,' suggesting an evaluation of economic
    costs related to climate or weather events tracked by these agencies.
  10: The paper provides an overview of economic impacts of billion-dollar weather
    and climate disasters on consumption of fixed capital and net domestic product
    (NDP).
Highlights:
  3: Captures diverse perspectives on economic impacts associated with varying degrees
    of global temperature increases, integrating multiple analytical approaches and
    future climate scenarios.
  6: Asset damage from weather and climate disasters should be included in consumption
    of capital
  7: Prior to the 2008 SNA, the US BEA included full disaster costs in CFC, leading
    to volatility in quarterly annualized CFC values.
  9: Real value increasing over time; Volatility of raw data is evident and substantial;
    Result is robust to different methods for calculating the trend
  10: Disaster costs as a percentage of NDP have increased from 0.12% in 1980 to 0.40%
    in 2023, while adjusted consumption of fixed capital rose from 0.67% in 1980 to
    1.95% in 2013.
  15: Catastrophic losses include deterioration in land quality due to abnormal flooding
    or wind, destruction of cultivated assets by drought or disease, and destruction
    of buildings and equipment in forest fires or earthquakes.
Methodology:
  3: Statistical modeling, structural modeling, meta-analyses, and methods used in
    AR5.
  6: Proposal to include asset damage from weather and climate disasters in consumption
    of capital rather than Other Changes in the Volume of Assets
  7: Comparing US BEA CFC calculations before and after the implementation of the
    2008 SNA (System of National Accounts).
  8: Uses NOAA data on weather and climate disasters since 1980 (costs > $1 billion,
    CPI deflated); Uses BEA data on disasters bigger than 0.1% of GDP; Extrapolates
    government and private insurance data to cover uninsured claims for NOAA data.
More Notes:
  3: The graphic is from IPCC's Sixth Assessment Report, 2022.
  7: The paper recommends including the trend of disaster costs rather than the full
    disaster costs directly, arguing this reduces volatility and could be a proxy
    for expected costs.
  8: NOAA data does not include mortality or morbidity, nor indirect costs such as
    downstream business interruption; BEA data does not include non-asset costs.
Quantitative material:
  3: Includes data points and trend estimates for economic impacts associated with
    different temperature increases above pre-industrial levels.
  7: Quarterly annualized CFC fell by 5.8% in Q2 2005 and rose by 18.9% in Q3 2005.
  8: Disasters with costs greater than $1 billion (CPI deflated); Disasters bigger
    than 0.1% of GDP; Roughly speaking, asset costs are 2/3 of NOAA data, double BEA
    data.
  9: The figure shows a trend of increasing real midpoint costs over time, reaching
    values above $200 billion (2023 US Dollars) in later years.
  10: Quantitative data includes trends and costs as percentages of NDP from 1980
    to 2023, showing growth over time.
