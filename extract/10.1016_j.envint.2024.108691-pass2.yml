sourcematerial:
  2: " \n\"Assessing the association between temperature frequency and mortality can\
    \ provide insights into human adaptation to local ambient temperatures.\"\n\n\"\
    The increase in frequency and intensity of hot days, as a consequence of global\
    \ warming, is anticipated to lead to a higher mortality rate.\"\n\n\"The average\
    \ increase in mortality risk comparing the 10th to 100th percentile of normalized\
    \ frequency was 13.03% (95% CI: 12.17\u201313.91).\"\n\n\"We collected daily time-series\
    \ data on mortality and temperature from 757 locations in 47 countries/regions\
    \ during 1979\u20132020. We used a two-stage time series design to assess the\
    \ association between temperature frequency and all-cause mortality.\"\n\n\"Our\
    \ findings suggest that populations can adapt to their local climate with frequent\
    \ exposure, with the adapting ability varying geographically.\"\n"
  3: "yaml\nEvaluation overview: \"Therefore, this study aimed to evaluate the association\
    \ between temperature frequency and mortality risk using temperature and mortality\
    \ data from 757 locations across 47 countries from Multi-Country Multi-City (MCC)\
    \ Collaborative Research Network.\"\nDrivers of Risk: \"To investigate the modification\
    \ effect of temperature on the frequency-mortality association, we separated temperatures\
    \ into moderate and extreme components by defining extreme cold as temperatures\
    \ lower than the 10th city-specific percentiles; moderate cold as the ranges fall\
    \ between the 10th and 50th; moderate hot as the ranges fall\"\nQuantitative material:\
    \ \"The relative risk (RR) was defined as the risk comparing the 10th percentile\
    \ to the 100th percentile of normalized frequency, quantifying the difference\
    \ in mortality risk between less frequent temperatures compared to the most frequent\
    \ temperatures. Results are presented as percentage change of mortality comparing\
    \ the 10th percentile to the 100th percentile of normalized frequency, which is\
    \ derived as follows: (RR-1) \xD7 100 %.\"\nMethodology: \"We utilized a standard\
    \ two-stage time-series quasi-Poisson regression design. In the first stage, we\
    \ applied a quasi-Poisson regression in each location to derive estimates of associations\
    \ between mortality and normalized frequency of temperature... In the second stage,\
    \ we pooled the location-specific overall cumulative exposure\u2013response associations\
    \ obtained in the first stage at the national, regional, and global levels, using\
    \ a multilevel meta-analytical model without predictors\"\nHighlights: \"However,\
    \ to our knowledge, no studies have investigated the relationship between mortality\
    \ risk and temperature frequency, which highlights the need to investigate this\
    \ relationship further.\"\n"
  4: "yaml\nEvaluation overview: \"Fig. 2 shows the overall and region-specific exposure\u2013\
    response curves, illustrating the cumulative mortality risk over a 21-d lag period\
    \ associated with normalized frequency of temperature.\"\nDrivers of Risk: \"\
    When separating temperatures into moderate and extreme components, we observed\
    \ distinct exposure\u2013response curves in the relationship between frequency\
    \ and mortality... resulting in an increase in mortality risk of 18.64 % (95 %\
    \ CI: 16.38, 20.94) for extreme cold, 8.51 % (95 % CI: 7.25, 9.79) for extreme\
    \ hot...\"\nQuantitative material: \"A significant and positive association was\
    \ observed, with an overall increase of 13.03 % (95 % CI 12.17, 13.91) in mortality\
    \ risk comparing the 10th percentile of normalized frequency to the 100th percentile\
    \ of normalized frequency.\"\nMethodology: \"Therefore, we repeated our analyses\
    \ using the K\xA8oppen-Geiger climate classification...and country income...as\
    \ the pooling criteria to examine whether the frequency-mortality association\
    \ would vary under different climatic zones and socio-economic levels... We conducted\
    \ several sensitivity analyses to check the robustness of our results.\"\nHighlights:\
    \ \"The curve shows a consistent decrease with no discernible thresholds, with\
    \ a steeper slope at lower frequency temperatures. The pattern of the decreasing\
    \ trend differs among regions.\"\n"
  6: 'Source: Fig. 4. Percentage change of mortality comparing the 10th percentile
    to the 100th percentile (the most frequent temperature) of normalized frequency
    of temperature. The image is a bar chart with a list of countries and regions
    on the left and corresponding percentage changes with confidence intervals on
    the right. The Overall row at the bottom shows a cumulative percentage change
    of 13.0% with a confidence interval of 12.7% to 13.3%.'
