    Evaluation overview: "In this multi-country, population-based study, we found
    a consistent decrease in the risk of mortality as the frequency of temperature
    increases."

    Drivers of Risk: "A higher increase in mortality risk was observed for the extreme
    cold component, followed by extreme hot, moderate cold, and moderate hot temperature
    components, comparing the 10th percentile of frequency to the 100th percentile
    of frequency of each temperature component."

    Quantitative material: "Percentage change of mortality comparing the 10th percentile
    to the 100th percentile of normalized frequency of temperature by socio-economic
    status and climatic zones."

    Methodology: "This study introduces temperature frequency as a valuable concept
    for understanding temperature-mortality relationships. Socio-economic status and
    climate characteristics were potential modifiers of the frequency-related mortality
    risk."

    Highlights: "Our findings suggest a linear relationship between temperature frequency
    and mortality risk, with the most frequent temperature having the minimum mortality
    risk."

