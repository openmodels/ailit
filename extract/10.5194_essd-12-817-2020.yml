  7: " \nNational total asset values were disaggregated proportional to the distribution\
    \ of Lit1Pop1 for 224 countries and areas. A total of 26 countries and areas without\
    \ data are left blank, including Libya, South Sudan, and Syria. The IQR is used\
    \ here as a measure of variability of the skill metrics, as it signifies the difference\
    \ between the 25th and the 75th percentiles of the resulting skill metric.\n\n\
    The general exposure value level in the metropolitan areas shown in Fig. 4 are\
    \ largest for Lit1Pop1 (Fig. 4c), highlighting a larger concentration of values\
    \ in urban areas with this approach. The value distribution based on Lit1 (Fig.\
    \ 4a) does not show many details within the urban area. This effect is partially\
    \ caused by saturation: the light radiation in the depicted areas is of such high\
    \ intensity that the nightlight data do not offer any way to distinguish different\
    \ levels of human activity.\n\nBased on the comparison of the disaggregation skill\
    \ with varying exponents m and n, there are two candidates for the most adequate\
    \ functionality: Lit1Pop1 (best \u03C1 and \u03B2) and Lit4 (best RMSF and best\
    \ performance for n=0). Prioritizing a better distribution of total values over\
    \ relative performance, we conclude that Lit1Pop1 can be considered the most adequate\
    \ combination of Lit and Pop for the subnational downscaling of GDP.\n"
  8: "Source material here: The example of Mexico is presented here to illustrate\
    \ limitations and uncertainties of the disaggregation approach. Figure 5 shows\
    \ the data behind the evaluation for Mexico, i.e., modeled and reference nGRP\
    \ for all 32 districts of Mexico...The disaggregation of GDP underestimates nGRP\
    \ for the Mexico City district while overestimating the value for M\xE9xico for\
    \ all evaluated combinations of m and n...Both districts combined sum up to modeled\
    \ nGRP values of 11.2% (m=1) to 17.6% (m=5) for Litm, 20.8% for Pop1, and 26.5%\
    \ for Lit1Pop1 (Table S2), the last agreeing well with a combined reference nGRP\
    \ of 26.1%. The LitPop methodology allows for the creation of globally consistent\
    \ and spatially highly resolved estimates of gridded asset exposure value...Based\
    \ on globally available input data, the LitPop methodology was applied across\
    \ countries from different continents and income groups...the evaluation of the\
    \ methodology\u2019s disaggregation skill presented here is limited to an assessment\
    \ of disaggregation skill for 14 OECD countries. The LitPop methodology allows\
    \ for the creation of globally consistent and spatially highly resolved estimates\
    \ of gridded asset exposure value...efforts towards improving exposure data should\
    \ aim at global consistency, continuous integration of new data and methods, and\
    \ a careful validation of models and data. The example of Mexico is presented\
    \ here to illustrate limitations and uncertainties of the disaggregation approach...While\
    \ the LitPop methodology performs well for most of the districts with relatively\
    \ low GRP, it fails to reproduce reference nGRP for the main (capital) metropolitan\
    \ region consisting of the districts M\xE9xico and Mexico City (Distrito Federal)."
  9: "Source material here\nMethodology: \"The LitPop methodology is used to disaggregate\
    \ total asset values based on nightlight intensity and population data.\"\n  \
    \  Evidence: For the gridded exposure dataset presented here, the LitPop methodology\
    \ is used to disaggregate total asset values.\nHighlights: \"The Lit1Pop1 dataset\
    \ generally performs well in disaggregating GDP to the subnational level, with\
    \ better performance than other combinations of nightlight and population data.\"\
    \n    Evidence: The skill metrics\u03C1 and\u03B2 showed that Lit1Pop1 distributes\
    \ GDP better to the subnational level than the other combinations of nightlight\
    \ and population data assessed.\nMethodology: \"Performance assessment of the\
    \ methodology focuses on GDP and GRP flow variables due to the absence of subnational\
    \ reference asset values.\"\n    Evidence: Due to a lack of subnational reference\
    \ asset values, the LitPop methodology\u2019s performance for the downscaling\
    \ of asset stock values could not be evaluated directly. The assessment of disaggregation\
    \ skill was instead based on the flow variables GDP and GRP.\nHighlights: \"The\
    \ dataset is considered reliable for risk assessments but should be validated\
    \ against local data when applied in low-income countries.\"\n    Evidence: duetolackofdatawewerenotabletoevaluatethemethod\u2019\
    s performance for low-income countries (World Bank income group 1). Therefore,\
    \ the application of the asset exposure data for local assessments in countries\
    \ within low-income groups should be treated with caution.\nMethodology: \"In\
    \ selecting Lit1Pop1 as the basis for the dataset, the authors prioritized absolute\
    \ deviation measures over relative deviation measures.\"\n    Evidence: This decision\
    \ is based on two considerations: (1) giving\u03C1and\u03B2 priority over RMSF\
    \ because they are measures of absolute deviation between variables (compared\
    \ to RMSF that is a measure of relative deviation per data point).\n"
  10: 'Source material here.

    Methodology: "Subject to data availability, the LitPop methodology can be used
    to estimate the distribution of physical asset values for any target year at a
    wide range of resolutions."

    Methodology: "The methodology includes a scaling of exposure data proportional
    to current GDP for years without any data available."

    Methodology: "The LitPop methodology does not account for differences in infrastructure
    types and vulnerability."

    Methodology: "Additionally, the asset exposure data could be further refined by
    including auxiliary data, such as road networks and land cover (Geiger et al.,
    2017; Murakami and Yamagata, 2019), or mobile phone cell antenna density."

    Highlights: "The open-source LitPop methodology was developed to provide a geographical
    distribution of physical asset exposure values that can be used to model first-order
    economic impacts of weather and climate events and other natural disasters."

    More Notes: "For a globally consistent approach, sectoral data should however
    be included with caution, as such datasets are prone to regional or national biases."

    More Notes: "For risk assessments with a local focus as well as in countries of
    low income, we would advise using more local approaches and bottom-up methods
    for identifying and analyzing the vulnerability component."

