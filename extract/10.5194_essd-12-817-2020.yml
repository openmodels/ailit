  13: Asset exposure data for global physical risk assessment
  14: The paper evaluates the fit between modeled and reference gridded gross regional
    product (nGRP) as a proxy for asset exposure.
Highlights:
  2: The LitPop methodology presents a globally consistent asset exposure dataset
    for 224 countries available on the ETH Research Repository.
  6: "Lit1Pop1 shows the best overall median of \u03C1(0.94) with the lowest interquartile\
    \ range (IQR) of 0.09."
  7: The general exposure value level in metropolitan areas is largest for Lit1Pop1,
    highlighting a larger concentration of values in urban areas with this approach.
    Disaggregation based on nightlights alone can misrepresent actual value distribution,
    especially in urban areas, due to saturation and blooming effects. Taking population
    density into account enhances contrast and detail in urban areas.
  8: The LitPop methodology allows for high-resolution, globally consistent estimates
    of gridded asset exposure; evaluated for skill in disaggregation for 14 OECD countries.
  9: The dataset is considered reliable for risk assessments but should be validated
    against local data when applied in low-income countries.
  10: The LitPop methodology was developed to provide a geographical distribution
    of physical asset exposure values for modeling first-order economic impacts of
    weather and climate events.
  11: The asset exposure data are not suitable for local or sector-specific applications
    without further validation.
  12: Lists data sources for Gross Regional Product (GRP) for 14 countries, including
    the USA (52 regions) with data from the US Bureau of Economic Analysis (2016).
  13: "The study compares different exponent combinations for estimating asset exposure,\
    \ using \u03C1, \u03B2, and RMSF as metrics. The closer \u03C1 and \u03B2 are\
    \ to 1, and RMSF is to 0, the better the fit of the given combination."
  14: The study presents maps of disaggregated asset exposure value using nightlight
    intensity and population data for Mexico City and New York. It also quantitatively
    compares the performance of various methods for estimating nGRP, indicating the
    best fit with observed data.
Methodology:
  2: The LitPop methodology is used for spatial disaggregation of national total asset
    values using gridded nightlight intensity and population data.
  3: 'Produced capital values are available for 140 countries and five time steps:
    1995, 2000, 2005, 2010, and 2014 from the World Bank wealth accounting.'
  5: Evaluation involves using GDP and GRP to indirectly assess the skill of the methodology
    in subnational asset value disaggregation due to the lack of direct reference
    asset valuation data.
  6: "The LitPop methodology with the exponents m=n=1 is applied to compute gridded\
    \ asset exposure data for 224 countries and areas worldwide. National GDP is disaggregated\
    \ to subnational regions using nightlight and population data. Skill metrics (Pearson\
    \ correlation coefficient \u03C1, slope \u03B2, and root-mean-squared fraction\
    \ RMSF) are computed to assess the disaggregation skill per country based on normalized\
    \ GRP. Ten combinations of m and n are assessed: Lit1Pop1, Lit1, Lit2, Lit3, Lit4,\
    \ Lit5, Pop1, Pop2, Lit2Pop1, and Lit3Pop1."
  7: National total asset values were disaggregated proportional to the distribution
    of Lit1Pop1 for 224 countries and areas. 26 countries and areas without data are
    left blank. The IQR is used as a measure of variability of skill metrics.
  8: "LitPop methodology used for GDP disaggregation by combining nightlight intensity\
    \ and population data across countries, evaluated using skill metrics \u03C1,\
    \ \u03B2, and RMSF."
  9: In selecting Lit1Pop1 as the basis for the dataset, the authors prioritized absolute
    deviation measures over relative deviation measures.
  10: The asset exposure data could be further refined by including auxiliary data,
    such as road networks and land cover, or mobile phone cell antenna density.
  11: The methodology evaluates asset exposure data for global physical risk assessment,
    offering global consistency, flexibility, and openness, with integration in the
    CLIMADA repository for economic disaster risk modeling.
  12: The table lists the countries used for evaluation, the number of regions on
    the administrative level 1, the World Bank income group (2016), and the GRP data
    source with URLs as accessed in January 2019.
  13: The analysis compares different exponent combinations (Lit1Pop1, Lit1, Lit2,
    Lit3, Lit4, Lit5, Pop1, Pop2, Lit2Pop1, Lit3Pop1) across 14 countries using linear
    correlation. Statistical significance is determined by a p-value < 0.05.
  14: The study compares different methods for disaggregating asset exposure values,
    using nightlight intensity and/or population counts to distribute the values spatially.
    Results are applicable to the year 2016 for nightlight data and 2015 for population
    data, used to estimate asset exposure values in 2014 US dollars.
More Notes:
  3: The workflow diagram illustrates the process of combining nightlight and population
    data to disaggregate asset value and GDP to a gridded level.
  6: The study evaluates the performance of the LitPop methodology for disaggregating
    GDP and asset exposure, using data from 14 countries with 507 regional GRP data
    points.
  7: "Lit1Pop1 (best \u03C1 and \u03B2) and Lit4 (best RMSF and best performance for\
    \ n=0) are candidates for the most adequate functionality. Prioritizing a better\
    \ distribution of total values over relative performance, the authors conclude\
    \ that Lit1Pop1 can be considered the most adequate combination of Lit and Pop\
    \ for the subnational downscaling of GDP."
  8: Example of Mexico illustrates limitations of the methodology for highly centralized
    metropolitan regions with significant under and overestimations observed in specific
    districts.
  10: The authors advise using more local approaches and bottom-up methods for identifying
    and analyzing vulnerability in risk assessments with a local focus, as well as
    in countries of low income.
  11: The evaluation based on GDP is limited to 14 OECD countries, and future research
    could focus on integrating more resolved population and ancillary data.
  12: The listed URLs were accessed in January/February 2019; data year varies by
    country.
  13: The specific asset type and physical risk being assessed are not explicitly
    stated on this page, but the paper aims to assess asset exposure to global physical
    risks.
  14: The paper focuses on asset exposure as a crucial component of risk assessment,
    not directly on climate impacts or climate-related outcomes like mortality or
    productivity loss.
Quantitative material:
  6: "Total physical asset values of 2014 were disaggregated proportionally to Lit1Pop1\
    \ to a grid with the spatial resolution of approximately 1km; Total asset values\
    \ in the dataset sum up to 2.51\xD710^14 (251 trillion) current US dollars in\
    \ 2014; The 140 countries with produced capital data used as total asset value\
    \ contribute USD 245 trillion (97.6%) to the total asset exposure; The remaining\
    \ 84 countries contribute the remaining USD 6 trillion; Lit1Pop1 shows the best\
    \ overall median of \u03C1(0.94) with the lowest interquartile range (IQR) of\
    \ 0.09."
  7: The map shows gridded asset exposure values scaled to a resolution of 600 arcsec,
    with an underlying resolution of 30 arcsec (~1km). The color map is logarithmic
    and limited to USD 100 (lower bound) and USD 1,000,000,000 (upper bound).
  8: "Comparison of modeled and reference GRP for Mexico's districts with a focus\
    \ on nGRP underestimation and overestimation in Mexico City and M\xE9xico districts."
  12: GRP data for 507 regions in 14 countries were used.
  13: "Linear correlation (\u03C1), slope (\u03B2), and root-mean-square fractional\
    \ difference (RMSF) are provided for various exponent combinations and countries,\
    \ including the USA."
  14: "The table provides median and interquartile range (IQR) values for three skill\
    \ metrics (\u03C1, \u03B2, and RMSF) comparing modeled and reference nGRP for\
    \ various modeling approaches (Lit1Pop1, Lit1, Lit2, Lit3, Lit4, Lit5, Pop1, Pop2,\
    \ Lit2Pop1, Lit3Pop1) across 14 countries. The exposure values in the figures\
    \ are in current US dollars in 2014."
sourcematerial:
  2: The core functionality of the LitPop methodology is the spatial disaggregation
    of national total asset values to obtain a gridded asset exposure product. Gridded
    nightlight intensity (Sect. 2.2) and gridded population data (Sect. 2.3) are combined
    to compute a digital number at grid cell level. [...] This paper presents global
    gridded asset exposure data and documents and evaluates the underlying LitPop
    methodology. The resulting asset exposure dataset for 224 countries is made available
    online at the ETH Research Repository (Eberenz et al., 2019).
  3: "The paper describes a methodology (LitPop) to downscale total asset value and\
    \ GDP per country to a gridded level using gridded nightlight and population data.\n\
    \nThe LitPop methodology combines gridded nightlights and population data to compute\
    \ a value (LitmPopn) per grid cell, which is then used to disaggregate total asset\
    \ value and GDP proportionally.\n\n\"The nightlight intensity products used here\
    \ are nighttime lightsoftheBlackMarble2016annualcompositeoftheVIIRS day\u2013\
    night band (DNB) at 15arcsec resolution (Rom\xE1n et al., 2018), downloaded from\
    \ the NASA Earth Observatory (2017).\"\n\n\"TheGriddedPopulationoftheWorld(GPW)datasetisaspatially\
    \ explicit representation of the world\u2019s population.\"\n\n\"Total asset value\
    \ per country is derived from the World Bank's produced capital stock, which includes\
    \ machinery, equipment, physical structures, and a fixed scale-up for built-up\
    \ land.\"\n\n\"Produced capital values are available for 140 countries and five\
    \ time steps: 1995, 2000, 2005, 2010, and 2014 from the World Bank wealth accounting.\"\
    \n\n\"The workflow diagram illustrates the process of combining nightlight and\
    \ population data to disaggregate asset value and GDP to a gridded level.\"\n"
