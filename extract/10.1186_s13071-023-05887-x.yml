sourcematerial:
  2: "Source material here.\nBiological invasions have increased significantly with\
    \ the tremendous growth of international trade and transport. Hematophagous arthropods\
    \ can be vectors of infectious and potentially lethal pathogens and parasites,\
    \ thus constituting a growing threat to humans\u2014especially when associated\
    \ with biological invasions. Today, several major vector-borne diseases, currently\
    \ described as emerging or re-emerging, are expanding in a world dominated by\
    \ climate change, land-use change and intensive transportation of humans and goods...\
    \ Burgeoning urbanization, climate change and the urban heat island effect are\
    \ likely to interact to favor invasive hematophagous arthropods and the diseases\
    \ they can vector. To mitigate future invasions of hematophagous arthropods and\
    \ novel disease outbreaks, stronger preventative monitoring and transboundary\
    \ surveillance measures are urgently required...\nOur capacities to manage invasive\
    \ hematophagous arthropods in a sustainable way for worldwide ecosystems can be\
    \ improved by promoting interactions among experts of the health sector, stakeholders\
    \ in environmental issues and policymakers (e.g. the One Health approach) while\
    \ considering wider social perceptions.\n"
  3: 'Climate change and human activities are highlighted as factors increasing the
    risks posed by invasive hematophagous arthropods, aiding their invasion and establishment
    beyond their native ranges. The page mentions that the economic cost of invasive
    species, including these arthropods, has been estimated at a minimum of US$ 2.168
    trillion over four decades. Source material: Ongoing climate change may assist
    the invasion rates of alien species in addition to facilitating range-shifting
    species expanding beyond their native range...the economic cost of invasive alien
    species reached at least US$ 2.168 trillion over the last 4 decades.'
  4: 'Source material here.

    Drivers of Risk: "assuming that ongoing globalization and climate change will
    drive and accelerate further proliferations in the future."


    Highlights: "In doing so, we construct a timeline of past disease vector invasions
    across hematophagous arthropod groups, considering individual species and socioeconomic
    drivers."


    More Notes: "our review provides a broader, overarching perspective that spans
    invasion dynamics, ecological and socioeconomic impacts, global change drivers
    and wider social and cultural dimensions in an integrative way across multiple
    taxa...highlight opportunities for collaboration among the health sector and environment
    researchers, alongside engagement with policymakers and citizens."

    '
  6: 'Both Ae. aegypti and the Cx. pipiens complex are associated with key historical
    events related to international trade and colonialism, such as the European colonization
    of the Americas and the slave trade. Accordingly, both of these hematophagous
    arthropods and their associated viruses likely arrived by ship during that period,
    though often the pathogen arrived after the mosquito [31]. Fig. 1 continued. a
    comprehensive review of the invasion history of this mosquito species and members
    of the Cx. pipiens complex (i.e. Cx. pipiens, Cx. quinquefasciatus) have been
    intensively studied and monitored. Human population movements, human trade, plane
    travel, ship/sea transport are drivers of introduction." '
  7: 'Source material here.

    Long distance transport and livestock trade facilitated tick translocations...
    the means of introduction of alien tick species differ from those of mosquitoes,
    which have a more complex aquatic life history stage... The translocation of several
    tick species... was associated with the global trade of livestock [48]. Most alien
    mosquitoes are highly adapted to synanthropic contexts and are highly efficient
    in exploiting human-made water containers for larval breeding sites... Ae. albopictus
    is able to produce drought- and freeze-resistant eggs... human-made microhabitats
    have amplified translocation rates and establishment possibilities for mosquito
    species with such adaptations. The worldwide development in the trade of used
    tires since the 1950s, and of certain ornamental plants, such as lucky bamboo...
    have become the principal points of entry within Europe and other continents...
    For ornamental plants, lucky bamboo was identified as an important introduction
    pathway in Belgium... Connectivity among cities, international trade and anthropogenic
    environmental disturbances are likely to increase in the future, providing novel
    opportunities and generating ecological conditions propitious for the expansion
    or new introduction of hematophagous arthropods that may vector disease... The
    Belt and Road Initiative proposed by China is a prominent example, as this unprecedented
    global development project may promote further invasions by hematophagous arthropods.

    '
  8: 'yaml

    Drivers of Risk: "Climate warming may have a major role in fostering hematophagous
    arthropod invasions by increasing the number of favorable thermal niches for their
    development, including towards formerly cold and restrictive environments, such
    as at higher latitudes and altitudes"

    Quantitative material: "For the highly invasive yellow fever mosquito Ae. aegypti,
    Iwamura et al. [9] suggested an increasing global suitability for life cycle completion
    of + 1.5% (in terms of periods suitable for mosquito development) per decade between
    1950 and 2000, with that trend predicted to accelerate and increase by + 3.2%
    per decade, and even up to + 4.4% per decade, by 2050."

    Methodology: "Recent data collection applications (e.g. Mosquito Alert, http://www.mosquitoalert.com;
    GLOBE Observer, https://observer.globe.gov/; Invasive Mosquito Project, http://www.citizenscience.us/imp/)
    involving cutting-edge technology have been implemented to monitor mosquitoes
    and models have been developed to partly automate invader identifications [73].
    Recently, the near-infrared spectroscopy (NIRS) technique has been successfully
    used to detect Zika and chikungunya infection in dead Ae. aegypti female mosquitoes
    [74], providing a rapid and cost-effective arbovirus surveillance tool with high
    accuracy levels (> 90%)."

    '
  9: "Source material here: \nSimilarly, we suggest that the lessening of thermal\
    \ barriers could permit Ae. aegypti and tick species, such as those from the Ixodes\
    \ genus, to expand their range into warming temperate regions, increasing disease\
    \ risks [89]. Furthermore, the increasing rates of sea level rise caused by global\
    \ warming will significantly increase the area of coastal marshes by incursions\
    \ inland [96]; those coastal marshes are historical habitats for mosquitoes [97]\
    \ and their expansion would thus foster their re-emergence alongside diseases.\
    \ In this context, the assessment of population dynamics and distributions of\
    \ hematophagous arthropods is key, as this then allows development of reliable\
    \ predictions for the effects of climate change on disease transmission, and thus\
    \ robust estimates of the populations that are at highest epidemiological risks.\
    \ This would mean that regions, including polar and high-altitude areas, and populations\
    \ at higher epidemiological risks can be better equipped, whilst currently there\
    \ is low awareness, unprepared medical systems and immune naivet\xE9 of the population\
    \ to the disease [95]."
  10: null
  11: "Cuthbert\_et\_al. Parasites & Vectors (2023) 16:291 Page 10 of 17 Rapid response\
    \ to eradicate invaders post-invasion as well as the implementation of effective\
    \ biosecurity control pre-invasion (i.e. biosurveillance and intensive monitoring)\
    \ are up to ten times cheaper for mosquito-borne diseases than waiting and paying\
    \ for accrued damages [120]. A recent modeling study using logistic response curves\
    \ to resemble impact dynamics showed that for the Aedes genus, current management\
    \ delays of 55 years have led to an additional cost of US$ 4.57 billion that could\
    \ have been avoided, showing the crucial importance of acting early against future\
    \ invasions and other global changes [68, 121]. With climate change projections\
    \ over the next 3 decades likely to increase the area occupied by current arthropod\
    \ invaders by 18%, the need for better biosecurity control to mitigate hematophagous\
    \ arthropod nuisance biting and disease has never been stronger [7]. Even aside\
    \ from direct health costs, invasions by hematophagous arthropods can cause substantial\
    \ impacts through nuisance biting that affects recreational and real estate values\
    \ which yield an economic return [123]."
  12: 'Source material here.

    Urbanization may have different effects on the distribution of mosquito species...
    The effects of light pollution, i.e. artificial light at night in urban areas,
    on the life cycle and physiology of mosquitoes... growing human population requiring
    increased agricultural productivity will lead to increased insecticide resistance
    and proliferation of mosquito populations.

    ...ongoing worldwide urbanization, and the increasing problem of water storage
    by households in areas exposed to light pollution at night, will further support
    mosquito proliferation.

    '
  13: 'Source material here.

    The worldwide invasion of hematophagous arthropods is a longstanding and pervasive
    problem, which is predicted to further increase with climate change. In addition
    to global climate change, our review highlights the importance of shipping and
    air traffic, the transport of vertebrates (i.e. livestock and pets) and worn tires
    as prominent factors and sources assisting the introduction of hematophagous arthropods
    that vector diseases.

    '
  14: 'Source material here.

    Given the focus on a few groups here (principally mosquitoes and ticks), future
    works should consider invasion dynamics and impacts of additional, understudied
    hematophagous arthropod taxa... The opportunistic development of populations in
    a large variety of human-made microhabitats is increasingly reported. Here, we
    alert decision-makers and politicians to the knowledge gaps and growing risks
    posed by accelerated worldwide urbanization and interconnectivity, which could
    further support mosquito proliferation and adaptations to human-modified environments.

    '
