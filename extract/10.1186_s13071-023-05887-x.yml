Highlights:
  2: The review discusses how invasive hematophagous arthropods and the diseases they
    vector are expanding due to globalization and climate change, and emphasizes the
    need for stronger preventative monitoring and transboundary surveillance measures.
  3: Economic cost of invasive alien species, including hematophagous arthropods,
    reached at least US$ 2.168 trillion over the last 4 decades.
  4: The review focuses on the historical contexts of invasive hematophagous arthropod
    invasions and develops a timeline of disease vector invasions, providing insights
    for future management strategies informed by historical trajectories.
  6: Ae. aegypti and the Cx. pipiens complex are associated with key historical events
    related to international trade and colonialism, and likely arrived by ship. Pathogens
    often arrived after the mosquito.
  9: "Public health systems currently unprepared with low awareness and immune naivet\xE9\
    \ in populations at high epidemiological risks."
  10: Climate change will likely increase the frequency of disease outbreaks and the
    economic costs associated with them, emphasizing the need for continuous monitoring
    and control.
  11: Need for better biosecurity control to mitigate impacts, importance of early
    action to avoid increasing costs.
  12: Urban environments can alter mosquito species distributions and foster evolutionary
    changes, with potential public health implications due to increased mosquito proliferation
    and insecticide resistance.
  13: Hematophagous arthropods are an increasing problem linked to climate change,
    with global invasions expected to rise.
  14: The review highlights potential invasion dynamics and impacts of hematophagous
    arthropods such as mosquitoes and ticks, and mentions ecological niche shifts
    and population development in human-made microhabitats.
