Drivers of Risk:
  2: Biological invasions, particularly of invasive hematophagous arthropods, driven
    by international trade, climate change, land-use change, and urbanization.
  3: Ongoing climate change may assist the invasion rates of alien species, causing
    range shifts and establishment beyond former geographical limits for invasive
    hematophagous arthropods.
  4: Ongoing globalization and climate change are expected to drive and accelerate
    the proliferations of invasive hematophagous arthropods, impacting ecological
    and socioeconomic conditions.
  6: Human population movements, human trade, plane travel, ship/sea transport are
    drivers of introduction of hematophagous arthropods.
  7: The Belt and Road Initiative proposed by China may promote further invasions
    by hematophagous arthropods.
  8: Climate change increases the number of favorable thermal niches for hematophagous
    arthropod invasions by warming formerly cold environments.
  9: Increasing rates of sea level rise potentially expanding coastal marsh habitats,
    fostering re-emergence of mosquitoes.
  10: Anthropogenic climate change is identified as a driver promoting geographic
    expansion of hematophagous arthropod species.
  11: Climate change projected to increase the area occupied by arthropod invaders,
    urbanization providing habitats for mosquitoes.
  12: Urbanization, agricultural practices, light pollution, and pesticide use affecting
    mosquito populations.
  13: The invasion of hematophagous arthropods is predicted to increase with climate
    change, along with factors such as shipping, air traffic, transport of livestock
    and pets, and worn tires.
  14: Accelerated worldwide urbanization and interconnectivity could support mosquito
    proliferation and adaptation to human-modified environments.
  15: No relevant information
