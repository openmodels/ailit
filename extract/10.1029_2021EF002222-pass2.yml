Drivers of Risk:
  1: Climate change (specifically, changes in climate models), socioeconomic changes
    (population growth), efficiency gains in household appliances, thermoelectric
    power generation, and agriculture irrigation
  2: Future pathways for carbon forcing and socioeconomic conditions, captured by
    SSPs and RCPs, are analyzed to examine the relative impacts of climate and socioeconomic
    forces.
  3: Projected decreases in precipitation and increases in potential evapotranspiration
    (PET) in the South region are drivers of decreased water yield.
  6: Changes in withdrawals per capita in the domestic sector due to climate change
    are influenced by changes in precipitation and potential evapotranspiration.
  7: "Changes in precipitation (\u0394P') and potential evapotranspiration (\u0394\
    ETp) impacting domestic and irrigation water withdrawals."
  8: Future growth in per-capita electricity demand; climate change impacts on space-cooling
    demand due to temperature increases.
  9: Change in annual temperature in degrees Celsius, and U.S. population growth.
  10: Climate change impacts on domestic water use increase due to offsetting decreases
    in precipitation with increased withdrawals for outdoor use.
  11: Projected increased GDP growth leads to varying levels of industrial and thermoelectric
    water use; decreased precipitation in certain regions contributes to water shortage
    risks.
  12: Warmer temperatures and climate change are impacting water use for thermoelectric
    power generation and irrigation, particularly in the West.
  13: Climate change (RCP 4.5 and RCP 8.5 scenarios) and socio-economic pathways (SSPs)
    drive changes in water demand.
  14: Future changes in water yield due to dry or wet climate models, population growth,
    and socioeconomic factors are major drivers.
  15: Changes in economic conditions and drought responses affected water use projections.
  16: Changes in spatial patterns of precipitation, water yield, and potential evapotranspiration
  17: Changes in annual precipitation due to future climate change under RCP 4.5 and
    RCP 8.5 scenarios.
  18: Projected climate changes across the United States under RCP 4.5 and RCP 8.5
    scenarios
  19: Spatial changes in 30-year average of annual potential evapotranspiration in
    response to future climate change under RCP 4.5 and RCP 8.5 scenarios.
Evaluation overview:
  1: Freshwater use in the United States.
  2: No relevant information
  3: The paper evaluates changes in water yield in various U.S. regions due to climate
    variability.
  8: Water consumption for thermoelectric generation.
  9: Change in thermoelectric energy production, and domestic water withdrawals.
  10: The page discusses domestic, industrial, and commercial water use, including
    changes and impacts due to climate factors.
  11: The paper evaluates changes in industrial water consumption and thermoelectric
    water use across different scenarios and regions in the U.S.
  12: Provides an overview of water use for thermoelectric power generation, irrigation,
    and livestock/aquaculture.
  13: The page evaluates consumptive water use across different sectors and regions
    of the U.S.
  14: The paper evaluates changes in water use across the U.S. under various dry and
    wet climate scenarios.
  15: Comparison of water withdrawal projections against reported USGS 2015 data.
  16: No relevant information
  18: No relevant information
  19: No relevant information
Highlights:
  1: Dry regions see largest increases in freshwater use, with 8% decreases under
    best-case scenarios but 235% increases under worst-case scenarios. Results depend
    on both climate and socioeconomic changes, but because agriculture is the dominant
    use of water in most regions, climate change impacts overwhelm all other factors
    under hot and dry futures.
  2: No relevant information
  3: Expected increases in precipitation and water yield in the western U.S.; decreases
    in water yield in the South region due to warmer temperatures and increased PET.
  7: The new USGS approach allows for more accurate estimates of thermoelectric water
    use by modeling the heat and water budgets of individual plants across the contiguous
    U.S.
  8: Projections will provide a baseline for future water use but will likely over-project
    future water use for thermoelectric generation due to decreases in nuclear power
    and shifts towards gas steam and renewable energy. The effect of temperature increase
    on per-capita electricity consumption is captured by a multiplier.
  9: Long-term effects on thermoelectric energy production are smallest in southern,
    hotter areas and rise progressively moving north (except WRR 17). Despite population
    increases, most regions of the U.S. are expected to see declines or only modest
    increases in domestic water use under low and moderate growth scenarios, except
    for the southern and western parts of the U.S.
  10: Declines in industrial water use are attributed to improvements in water efficiency
    and changes in the U.S. economy structure.
  11: Regions with significant water use changes include the northern and southern
    Great Plains for industrial use, and the South Atlantic-Gulf, Midwest, and Texas-Gulf
    for thermoelectric consumption.
  12: Warmer temperatures could increase thermoelectric water use by up to 6 billion
    gallons per day beyond population growth effects. Eastern U.S. irrigation may
    increase, with the Southeast experiencing significant growth due to population
    expansion.
  13: Consumptive water use is projected to change significantly under different climate
    and socio-economic scenarios. Agriculture is the dominant use of water in most
    regions, so results often vary by climate model more than they do by SSP, particularly
    under RCP 8.5. The Intermountain region sees significant increases in water use,
    especially under high-growth scenarios, driven by livestock and population growth.
  14: Water use efficiency has improved significantly, with withdrawals in 2015 the
    lowest since before 1970, yet future needs for efficiency and adaptation measures
    are critical.
  15: Largest overestimates were in the Great Lakes and Ohio regions; largest underestimates
    in Mid-Atlantic and Great Basin regions.
  16: Projections of US Population and GDP for five SSPs. Projections of changes in
    precipitation, water yield, and potential evapotranspiration
  17: The maps illustrate how different areas of the U.S. might experience changes
    in precipitation under different climate scenarios (RCP 4.5 and RCP 8.5) and timeframes
    (mid-century and end-century).
  18: No relevant information
  19: Under RCP 8.5, there is a noticeable trend towards more brown shading, especially
    in the end-century, indicating significant changes compared to RCP 4.5, which
    indicates potentially large increases in potential evapotranspiration.
Methodology:
  1: Projections are based on socioeconomic and climate scenarios from the Intergovernmental
    Panel on Climate Change Fifth Assessment Report paired with five climate models
    from the downscaled Multivariate Adaptive Constructed Analogs (MACA). The study
    examines recent trends in freshwater use and makes projections for future freshwater
    use over the next 50 years.
  2: The analysis uses projections based on extrapolating past trends of water withdrawal
    rates and applies these to projections of water-using units like population and
    irrigated acres. It incorporates different SSPs and RCPs using multiple climate
    models from the downscaled Multivariate Adaptive Constructed Analogs (MACA).
  3: VIC model using Penman-Monteith equation for potential evapotranspiration is
    employed; climate projections show variability from different models.
  5: Projected future water withdrawals are calculated at the county level, though
    factors are specified at larger spatial scales due to potential errors at smaller
    scales.
  6: Future water withdrawals for livestock and aquaculture are projected based on
    human population instead of animal numbers or fish farm area.
  7: Water use projections are made using regression-based estimates for domestic
    withdrawals and a new USGS approach for thermoelectric water use, utilizing EIA
    data for fuel consumption and electricity generation.
  8: Projects future growth in per-capita electricity demand, apportions demand to
    counties, and applies water consumption rates. Computes change in thermoelectric
    water use due to temperature increase using a multiplier representing the effect
    of temperature increase on per-capita electricity consumption. Uses state-specific
    nonlinear regression equations expressing the percent change in electricity consumption
    as a function of change in temperature.
  9: The impact on thermoelectric energy production is calculated using coefficients
    applied to changes in temperature, separated into short-term and long-term effects.
    Ratios of total to short-term residential electricity consumption changes from
    a previous study (Sailor and Pavlova, 2003) were extended to 18 WRRs. Domestic
    water use projections are based on population growth scenarios and historical
    trends in water use efficiency.
  11: Projections based on U.S. GDP growth and climate scenarios from 2015 to 2070,
    with regional variation analysis.
  15: Comparison of Brown et al. 2013 projections against USGS 2015 data across U.S.
    watersheds.
  16: "Climate and water yield projections are based on results from the Variable\
    \ Infiltration Capacity (VIC) hydrological model at the 4 \xD7 4 km spatial resolution."
  17: The analysis presents spatial changes in 30-year average of annual precipitation,
    comparing mid-century and end-century projections under RCP 4.5 and RCP 8.5 scenarios.
    Results are presented based on different climatic conditions categorized as 'Wet',
    'Warm', 'Mid', 'Hot', and 'Dry'.
  18: No relevant information
  19: Analysis uses RCP 4.5 and RCP 8.5 scenarios to project changes in potential
    evapotranspiration for mid-century and end-century.
More Notes:
  1: The paper mentions that in some regions decreases in surface water use were offset
    by increases in groundwater use. It also notes that between 2005 and 2015, 64%
    of counties in the United States saw net decreases in surface water withdrawals.
  2: No relevant information
  6: There is a spatial mismatch in livestock product production and consumption,
    accounted for by using WRR population for projections.
  8: 'Simplifying assumption: the share of thermoelectric plants is relatively constant
    into the future.'
  9: The coefficients in Table 3 allow for the estimation of proportional increase
    in electricity consumption due to temperature changes.
  16: The specific SSPs are not explicitly identified on this page but are referred
    to as SSPx and DS.x. Climate and water yield projections are based on MACA models
    and two RCPs.
  18: No relevant information
  19: Data will be archived in the US Forest Service Research Data Archive.
Quantitative material:
  1: Total consumptive water use will decrease by as much as 8% under the best-case
    scenario but increase by as much as 235% under the worst-case scenario.
  2: No relevant information
  3: There are percentage changes indicated in surface freshwater withdrawals between
    2005 and 2015 as shown in their associated map.
  7: "Constants \u03B7P (-1.415) and \u03B7ETp (0.778) represent changes in domestic\
    \ water withdrawals per cm change in effective precipitation and evapotranspiration."
  8: Estimates the percentage increase in residential and commercial electricity consumption
    for annual temperature increases for eight states using Sailor (2001).
  9: Coefficients (x1, x2, x3) for computing the change in thermoelectric energy production
    with climate change, broken down by Water Resource Region (WRR) and residential/commercial
    sectors. Projections of 24%-44% population growth by 2070 under moderate scenarios
    and 56% under high growth SSP5 scenario. Domestic water use decreased by 10% between
    2005 and 2015.
  10: Industrial water withdrawals have declined at an annualized rate of 1.8% since
    at least 1985, and 78% of counties are projected to see decreases in domestic
    water use.
  11: Industrial water use shows modest increases or declines in scenarios, with high
    growth leading to increases, particularly in the Great Plains. Thermoelectric
    water use is projected to increase, with consumptive use rising from 2.5 billion
    gallons/day in 2015 to 5-17 billion gallons/day by 2070.
  12: Thermoelectric water use could increase by 20%-60%; agricultural water use projected
    to increase from 116 billion gallons in 2015 to 134 billion gallons in 2070.
  14: Potential water use changes range from a decrease of 8% to an increase of 235%
    depending on climate and socioeconomic scenarios.
  15: Projections overestimated actual water withdrawals by 20% on average.
  16: "Population and GDP projections indexed to a value of 1 in 2015 for five socioeconomic\
    \ pathways (SSPs). Climate and water yield projections for mid-century (2041\u2013\
    2070) and end-of-century (2070\u20132099)."
  17: Spatial changes in 30-year average of annual precipitation with decreases below
    -40% (blue) and increases above 40% (brown).
  18: No relevant information
  19: Maps showing potential evapotranspiration changes with a color gradient where
    blue is less than -10 and brown is greater than 10.
sourcematerial:
  1: "  \nSource material here. \nWater use in the United States reached its lowest\
    \ level in 2015 in at least four decades...Water use could decrease by as much\
    \ as 8% under the best-case scenario but increase by as much as 235% under the\
    \ worst-case scenario....because agriculture is the dominant use of water in most\
    \ regions, climate change impacts overwhelm all other factors under hot and dry\
    \ futures...Because agriculture is the largest user of water in most regions,\
    \ impacts of climate change on water use are larger than impacts from non-climate\
    \ factors like population growth...Decreases were especially widespread throughout\
    \ the Great Plains. The decrease came despite population increases, in large part\
    \ due to structural changes in the U.S. economy that favored less water-intensive\
    \ industries and broad efficiency gains in household appliances, thermoelectric\
    \ power generation, and agriculture irrigation...Scenarios are paired with five\
    \ climate models from the downscaled Multivariate Adaptive Constructed Analogs\
    \ (MACA). The scenario approach uses plausible projections for future freshwater\
    \ use over the next 50\_years...National trends, however, mask local challenges\
    \ throughout the U.S. In some places, decreases in surface water use were more\
    \ than offset by increases in groundwater use.\n"
  2: 'Source material: future pathways for carbon forcing (Representative Concentration
    Pathways, also known as RCPs) and socioeconomic conditions (Shared Socioeconomic
    Pathways, also known as SSPs...examine the relative impacts of climate and socioeconomic
    forces...Our projections are based on extrapolating past trends of withdrawal
    rates (e.g., water use per capita, irrigation depth) and applying those rates
    to projections of water-using units (population, acres ir rigated)...Scenarios
    are paired with five climate models from the downscaled Multivariate Adaptive
    Constructed Analogs (MACA)...'
  3: The climate projections show high variability between models. In the South, Southeast,
    and Great Plains, the dry climate model shows a decrease in water yield. The wet
    and hot models show increases in water yield for these same regions. The most
    consistent results across models are increases in precipitation and yield for
    much of the western United States and decreases in water yield in the South. Warmer
    temperatures in the South are projected to increase potential evapotranspiration
    (PET) more than for any other region of the U.S. Higher rates of PET amplify the
    effects of decreased precipitation in the South, leading to further declines in
    water yield.
  5: "The analysis uses extrapolation of past trends in water withdrawal by applying\
    \ an annual growth rate and a decay rate, leading to a hypothesized equilibrium\
    \ level, with data spanning from 1985 to 2015. Projected future water withdrawals\
    \ are calculated at the county level, though factors are specified at larger spatial\
    \ scales due to potential errors at smaller scales. Extrapolation of past trends\
    \ in is accomplished by applying an annual growth rate (g), based on data from\
    \ recent years, along with corresponding decay in that growth rate (d). The decay\
    \ rate was chosen to attenuate the trend, leading gradually toward a hypothesized\
    \ equilibrium level (Brown et al., 2013). Given a 5-year time step for projecting\
    \ withdrawals reflecting the USGS water use reporting schedule, the extrapolation\
    \ procedure for a given future year t is as follows: ... Projected future water\
    \ withdrawal is calculated at the county level, but the factors used to produce\
    \ those estimates are specified at larger spatial scales because the data for\
    \ individual counties are sometimes erratic\u2014perhaps because of annual weather\
    \ f luctuations or errors in estimation\u2014so that they do not appear to support\
    \ estimation at the smaller spatial scale (Brown et al., 2013)."
  6: 'Source material: "For projecting future water withdrawals, the first fact (lack
    of data on-demand units) is accommodated by basing future withdrawals not on numbers
    of animals or area of fishponds but rather on the human population, as humans
    are the consumers of livestock products." "The change in withdrawals per capita
    in the domestic sector attributable to climate change...is computed as a combination
    of the effects of changes in precipitation and potential evapotranspiration."
    "The second fact (spatial mismatch between production and consumption) is accommodated
    by computing total livestock and aquaculture withdrawals at the WRR spatial scale
    and then apportioning that total to individual counties based on the location
    of past withdrawals."'
  7: "As with domestic withdrawals, the change in irrigation withdrawals per acre\
    \ attributable to climate change, , is computed as a combination of the effects\
    \ of change in precipitation and change in potential evapotranspiration. \u03B7\
    P is the change in DOM gallons per capita per day withdrawn for a 1 cm increase\
    \ in P\u2019 from t0 to a future year, a constant equal to \u22121.415 and \u03B7\
    ETp is the change in DOM gallons per capita per day withdrawn for a 1 cm increase\
    \ in ETp from t0 to a future year, a constant equal to 0.778. Recently released\
    \ USGS estimates of thermoelectric water use in 2010 and 2015 (Diehl & Harris,\
    \ 2014) allow for a new approach to projecting water use at thermoelectric plants\
    \ that solves much of this issue. The new USGS approach utilizes EIA-reported\
    \ data on fuel consumption and net electricity generation, in light of water availability,\
    \ to model the heat and water budgets of 1,274 individual thermoelectric utility\
    \ plants (those with a generating capacity of at least 1 MW) across the contiguous\
    \ U.S."
  8: 'Source material here.

    Water consumption for thermoelectric generation is projected by considering net
    electric energy produced at freshwater thermoelectric plants, assuming future
    growth in per-capita electricity demand, and climate change impacts on space-cooling
    demand due to temperature increases. The analysis is based on projecting per-capita
    electricity demand, combining residential and commercial uses, and applying these
    to county-level water consumption projections. Simplifying assumptions are noted,
    such as the constant share of thermoelectric plants into the future, while acknowledging
    shifts in energy sources toward renewables. The projection also includes the use
    of multipliers to represent temperature impacts on electricity consumption, with
    quantitative estimates from other studies, like Sailor (2001), used to estimate
    the percentage increase in electricity consumption due to temperature increases.

    '
  9: "`\nSource material here.\n\n\"Table 3 Coefficients for Computing the Change\
    \ in Thermoelectric Energy Production With Climate Change\"\n\n\"Sailor and Pavlova\
    \ (2003) estimated short-term and long-term residential electricity consumption\
    \ changes for 12 cities located in four different states: California, New York,\
    \ Ohio, and Texas. This information was used to estimate the ratio of the total\
    \ percent increase to a short-term percent increase. The ratios for the 12 cities\
    \ were extended to the 18 WRRs in the contiguous United States by selecting cities\
    \ or groups of cities that were considered most representative of the WRRs.\"\n\
    \n\"Applying these proportions across WRRs, the multiplier for change in due to\
    \ a temperature change is:\"\n\n\"As shown in Figure 4, the amount of water used\
    \ and the purpose for which it is used varies throughout the United States.\"\n\
    \n\"In 2015, domestic water use made up 9% of national withdrawals. Between 2005\
    \ and 2015, domestic water use decreased by 10%, even though U.S. population increased\
    \ by 7% (US Census Bureau, National Intercensal Tables), continuing a downward\
    \ trend going back to the 1990s in national domestic withdrawals per capita.\"\
    \n\n\"U.S. population, the principal driver of domestic water use, is projected\
    \ to increase by 24%\u201344% by 2070 under moderate growth scenarios and by 56%\
    \ under the high growth SSP5 scenario\"\n\n\"Despite these increases, for low\
    \ and moderate growth scenarios, most regions of the U.S. are expected to see\
    \ declines or only modest increases in domestic water use (Figure 5). The exception\
    \ is the southern and western parts of the U.S.\"\n"
  10: " \nClimate change compounds the effects of population, leading to more water\
    \ use as households offset decreases in precipitation with increases in water\
    \ withdrawals for outdoor use.\nIndustrial water withdrawals have been declining\
    \ at an annualized rate of 1.8% since at least 1985... 78% of counties are projected\
    \ to see decreases in domestic water use.\nDeclines in industrial water use are\
    \ due to improvements in water efficiency within factories and structural changes\
    \ throughout the U.S. economy.\n"
