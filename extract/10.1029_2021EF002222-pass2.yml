  12: " \n\"Warmer temperatures associated with climate change could increase water\
    \ use for power generation by 20%\u201360%, depending on the scenario. More drastic\
    \ weather changes will cause greater variation in year-to-year consumption levels\
    \ over time. Rising temperatures could increase thermoelectric water use by an\
    \ extra 6 billion gallons per day in extreme cases beyond what would occur based\
    \ on population growth alone.\"\n\n\"Irrigated agriculture accounts for 42% of\
    \ total freshwater withdrawals, making it the largest user of freshwater in the\
    \ U.S. Historically, agricultural water demand in the east has been smaller in\
    \ both areal extent per basin and irrigation depth than in the West. Over the\
    \ last couple of decades, however, eastern farmers have increased their irrigation\
    \ use to provide larger and more reliable yields. In most locations, water supplies\
    \ in the eastern U.S. are ample and increases in irrigation are not expected to\
    \ affect other uses.\"\n\n\"All told, this implies there may be a net increase\
    \ in water used for agriculture in parts of the West... Both withdrawal rates\
    \ and acres irrigated are projected to increase in the East, and total water used\
    \ for irrigation in the United States is projected to increase from 116 billion\
    \ gallons in 2015 to 134 billion gallons in 2070.\"\n"
  13: '"Nationally, total consumptive use is projected to decrease by as much as 8%
    in the RCP 4.5 - SSP1 scenario and increase by 235% in the RCP 8.5 - SSP 5 scenario."
    "Our projections of livestock water demand do not include climate effects, so
    only vary by SSP (Figure 9)." "Because agriculture is the dominant use of water
    in most regions, results often vary by climate model more than they do by SSP,
    particularly under RCP 8.5." "In the Intermountain region, where irrigated agriculture
    makes up roughly 90% of consumptive use, RCP 8.5 projections lead to total consumptive
    use nearly twice as high in the dry scenario as in the wet scenario." "The West
    and parts of the Southeast see relatively large increases in water use for many
    of the scenarios. Increases are significant in the intermountain region, which
    has the largest amount of use among regions." '
  14: Climate models show a wide range of futures for the United States. Under dry
    climate models, the South, Southeast, and Great Plains show decreases in water
    yield. Those same regions, however, see increases in water yield under wet scenarios.
    Models are relatively consistent in showing increases in water yield for much
    of the western United States and decreases in water yield for the South. Socioeconomic
    factors are the primary determinants of water use in the domestic sector. Despite
    significant gains in water use efficiency among households, population growth
    is expected to outpace efficiency gains in many parts of the United States, including
    in some of the driest regions of the country. These projections assume technology
    and the share of thermoelectric generation will remain near current levels. Projections
    here serve as a benchmark for potential water demand for a thermoelectric generation
    if the status quo continues. Aggregate impacts of climate and socioeconomic changes
    depend on which future the U.S. sees. For the wet and middle climate models, water
    use decreases even under with the highest emissions levels and highest population
    growth rates. Under the best-case scenario, water use decreases by 8%, but under
    the worst-case scenario water use increases by 235%. The good news is that water
    users have made considerable improvements in efficiency in recent decades, with
    withdrawals in 2015 the lowest they have been since before 1970. Necessity breeds
    invention, especially in the water sector. While these results capture recent
    efficiency gains, future innovation could be more rapid. Indeed, in many places,
    it will have to be, as these results assume water supply is not a limiting factor
    in water use. Constrained by water availability, significant adaptation measures
    will be needed.
