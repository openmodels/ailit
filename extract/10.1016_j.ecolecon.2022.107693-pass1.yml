sourcematerial:
  1: "The study evaluates the short-run, dynamic employment effects of hurricanes\
    \ in Puerto Rico. We study the short-run, dynamic employment effects of natural\
    \ disasters. Our exogenous measure of exposure to natural disasters is computed\
    \ using the maximum wind speed recorded in each county during each hurricane.\
    \ Using panel local projections, we find that after the \"average\" hurricane,\
    \ employment falls by 0.5% on average. Using geo-coded monthly data for 70 3-digits\
    \ NAICS industries and 78 counties over the period 1995\u20132019, we examine\
    \ outcomes up to two years post-hurricane. Across industries, we find substantial\
    \ heterogeneity in the employment responses. Employment increases in some industries\
    \ while in others employment decreases after a hurricane."
  2: '

    The paper evaluates the dynamic employment effects of hurricanes on different
    industries at the county level in the U.S., exploring the impact of hurricanes,
    specifically the wind speed during hurricanes, on economic outcomes. The study
    uses local projections by regressing the cumulative change of variables of interest
    on the disaster shock variable at each horizon, controlling for pre-trends and
    seasonal effects. Employment falls on average by about 0.5% after six months post-hurricane.
    The analysis finds heterogeneity in employment effects across industries post-hurricane:
    some ''strengthened industries'' like construction see an increase, while ''weakened
    industries'' like accommodation see a decrease. The paper proposes adaptability-driven
    employment resilience as a concept, driven by workers reallocating from contracting
    to expanding industries.

    '
  3: "\nOur study differs from these papers in several aspects. First and foremost,\
    \ we evaluate the average labor market response of directly affected jurisdictions.\
    \ [...] This paper seeks to be more general and is interested in the labor markets\
    \ effects associated with disaster damages, the direct need for rebuilding, and\
    \ the resulting changes in the industrial structure. [...] Relatedly, these studies\
    \ use migration as a proxy for the disaster shock, while we use a measure that\
    \ captures wind exposures and is exogenous by construction. [...] Closer to our\
    \ paper are Belasen and Polachek (2008,2009). Using quarterly data, they explore\
    \ the employment and wage effects of hurricanes across counties in Florida for\
    \ the period 1988\u20132005. [...] We use satellite data from the National Oceanic\
    \ and Atmospheric Administration (NOAA) Tropical Prediction Center. We look at\
    \ the storms\u2019 best tracks in the Caribbean Sea over the period 1995\u2013\
    2017 to construct the maximum wind speed associated with each hurricane \U0001D43B\
    \ hitting Puerto Rican county \U0001D450, i.e. \U0001D464\U0001D450\U0001D43B\
    . [...] Third, our empirical approach is different and uses local projections.\
    \ [...] While we share a similar methodology, we concentrate on a different type\
    \ of shock, i.e. hurricanes, using a continuous exposure index to examine employment\
    \ adjustments across industries. [...] First, we linearly interpolate the storms\u2019\
    \ best tracks at every kilometer. For each interpolated kilometer, we compute\
    \ the set of coordinates for the position of the eye (landmark \u210E) and the\
    \ wind speed at the eye, \U0001D449\u210E. For each county that falls in the vortex\
    \ associated with a landmark \u210E, we use the HURRECON model (see Boose et al.,\
    \ 1994, 2001, 2004) to compute the sustained wind velocity at the county\u2019\
    s centroid, \U0001D464\U0001D450\u210E. [...] By focusing on Puerto Rico, we provide\
    \ novel evidence on the short-run employment effects in a lower-income setting,\
    \ which has been understudied. [...] allows us to unveil the importance of input\u2013\
    output linkages as a driving mechanism of the employment effects of natural disasters.\n"
