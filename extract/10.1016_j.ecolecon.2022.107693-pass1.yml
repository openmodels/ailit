Highlights:
  1: There is substantial heterogeneity in employment responses across industries
    after hurricanes, with employment increasing in some industries and decreasing
    in others.
  2: 'The analysis finds heterogeneity in employment effects across industries post-hurricane:
    some ''strengthened industries'' like construction see an increase, while ''weakened
    industries'' like accommodation see a decrease.'
  3: The paper focuses on labor market effects associated with disaster damages, the
    direct need for rebuilding, and resulting changes in industrial structure in Puerto
    Rico, a lower-income setting that has been understudied.
  7: Employment effects of hurricanes are temporary, peaking after six months and
    disappearing after about 14 months; employment increases in 'strengthened' industries
    like construction, while 'weakened' industries like tourism see declines.
  8: Industries are categorized as 'strengthened', 'weakened', or 'neutral' based
    on their employment response to hurricanes.
  9: Truck transportation and support activities for transportation are affected differently
    compared to air and water transportation, and transit and ground passenger activities
    show weakened employment effects.
  10: A disaster shock generates a construction boom and negatively affects retail,
    transport, and accommodation industries. Input-output linkages play a key role
    in the transmission of disaster shocks to employment across different industries.
  12: Natural disasters lead to an average decline in employment but with heterogeneity
    at the industry level, partly explained by input-output linkages.
  13: Adaptability-driven employment resilience could be an important building block
    of post-disaster resilience. Vocational training programs can help workers reallocate
    across industries.
  15: Hurricanes Maria (2017) had the highest recorded damages and a large number
    of affected people.
  17: Presents labor force data and changes from 1995-2019 for various municipios
    in Puerto Rico, showing a general trend of labor force decrease in many municipios
    but also increases in others.
  26: Dynamic effects of hurricanes on economic variables at different time horizons
    are estimated.
  29: Shows dynamic effects of hurricanes on employment, average weekly wages, unemployed,
    and labor force at different horizons.
Methodology:
  1: "The analysis uses high-frequency, geo-coded monthly employment data from 70\
    \ 3-digits NAICS industries and 78 counties over the period 1995\u20132019, employing\
    \ panel local projections."
  2: The study uses local projections by regressing the cumulative change of variables
    of interest on the disaster shock variable at each horizon, controlling for pre-trends
    and seasonal effects.
  3: The study uses local projections to examine the economic impacts of hurricanes,
    analyzing county-level data for Puerto Rico from 1995-2017. Wind speed at the
    county level is calculated using satellite data and the HURRECON model.
  4: The paper constructs a population-weighted centroid for Puerto Rican counties
    to compute wind exposure and defines an exposure index based on maximum wind speeds
    adjusted for county population distribution.
  5: "Data spans from January 1995 to November 2019 for 78 counties, leveraging county\u2013\
    industry\u2013time variation."
  6: The paper uses a panel with data on 78 counties and 70 3-digit industries, utilizing
    linear interpolation for 8% of employment and wage zeros due to non-disclosure.
  7: "The analysis uses panel regressions with Newey\u2013West corrected standard\
    \ errors for industry regressions and impulse response functions over a two-year\
    \ horizon following disasters."
  8: "Dynamic effects of hurricanes are analyzed across different horizons using county\u2013\
    time and county\u2013industry\u2013time variation with and without linear interpolation."
  9: Utilizing industry-time variation to examine dynamic employment effects at different
    horizons.
  10: The analysis uses local projections to assess the employment response to hurricanes,
    with robustness checks involving different wind speed thresholds, wind speed calculation
    methods (Deppermann formula), and county centroid definitions. The study also
    analyzes input-output linkages to understand the transmission of disaster shocks
    to employment across industries, using the 2020 BEA Input-Output table.
  12: Analysis uses monthly data for 703-digits NAICS industries and 78 Puerto Rican
    counties over the period 1995-2019. Local projections are used to capture the
    effect of hurricanes on outcome variables.
  13: The paper uses the HURRECON model (Boose et al., 1994, 2001, 2004) to describe
    sustained wind velocity. It also uses statistical analysis of employment data
    and NAICS industry classification. The results are applicable to Puerto Rico.
  14: Exploiting industry-time variation.
  15: Data is presented in a table format, spanning from 1995-2017, but the data on
    People affected, Total fatalities, and Total damages come from the EM-DAT database.
  17: Analysis of labor force size and changes from 1995-2019 is performed for counties
    in the dataset.
  19: Analysis uses county-industry-time variation with alternative sets of fixed
    effects and linear interpolation.
  20: The analysis uses county-industry-time variation with and without linear interpolation,
    utilizing county*industry and industry*time fixed effects.
  23: "Exploiting industry\u2013time variation to assess employment impacts at different\
    \ horizons."
  24: The analysis examines dynamic effects over time using county-time and county-industry-time
    variation, with and without linear interpolation, focusing on hurricanes.
  26: "Panel results with distance from geographical centroids (Unweighted) exploiting\
    \ county\u2013time variation and county\u2013industry\u2013time variation; with\
    \ and without linear interpolation."
  27: "Dynamic effects of hurricanes at time \U0001D461on employment at different\
    \ horizons exploiting industry\u2013time variation. Analysis is conducted using\
    \ unweighted geographical centroids for selected industries. Results are applicable\
    \ from 1995-2017."
  28: "Exploits industry\u2013time variation; Industry-specific storm exposure measure"
  29: Panel results controlling for lags and leads of exposure measure. Exploits county-time
    variation and county-industry-time variation, with and without linear interpolation.
  30: "Industry results controlling for lags and leads of exposure measure (Different\
    \ Controls). Dynamic effects of hurricanes at time \U0001D461 on employment at\
    \ different horizons exploiting industry\u2013time variation. Average industry\
    \ employment over the period 1995\u20132017 is shown in parenthesis. Shaded areas\
    \ are confidence bands at 95%."
More Notes:
  2: The paper proposes adaptability-driven employment resilience as a concept, driven
    by workers reallocating from contracting to expanding industries.
  3: The study aims to unveil the importance of input-output linkages as a driving
    mechanism of the employment effects of natural disasters.
  10: The paper finds evidence of aggregation bias, suggesting that a sectoral analysis
    is crucial for understanding the employment effects of hurricanes. The analysis
    uses data from the NBER-CES Manufacturing Industry Database to control for industry-specific
    factors like labor share and skill composition.
  12: The paper introduces the concept of 'adaptability-driven employment resilience',
    referring to the potential for workers to reallocate from contracting to expanding
    industries after a disaster.
  15: The Saffir-Simpson wind scale is used to categorize the hurricanes.
  17: All municipios listed are in Puerto Rico.
  26: The analysis considers both county-time and county-industry-time variations.
    The use of linear interpolation is also explored.
  29: Results are presented with and without linear interpolation.
Quantitative material:
  1: After the average hurricane, employment falls by 0.5% on average.
  2: Employment falls on average by about 0.5% after six months post-hurricane.
  3: The study uses satellite data from NOAA to construct the maximum wind speed associated
    with each hurricane hitting a Puerto Rican county from 1995-2017.
  4: Summary statistics for hurricane exposures are provided, with mean, standard
    deviation, minimum, and maximum values for both monthly and quarterly data.
  5: Color shades on maps indicate hurricane exposure levels, with darker shades representing
    stronger exposures.
  6: The analysis includes data from 1995M1 to 2019M11, and removes zeros which make
    up 40% of the total observations, with a further 8% reflecting non-disclosure.
  7: "Employment falls by about 0.5% on average six months after a hurricane, and\
    \ industries such as construction experience employment growth of 2%\u20135%."
  8: The shock used to generate impulse response functions (IRFs) is the average hurricane
    with value 0.084.
  9: The shock used to generate the impulse response functions (IRFs) is based on
    an average hurricane with a value of 0.084.
  10: Construction employment recovers and rises sharply within one year after a disaster,
    reaching levels about 1.2% higher than in the absence of the disaster.
  12: Table 2 shows 12-month coefficients and standard errors for the impact of disasters
    on employment in specific industries (Amusements, gambling, and recreation; Accommodation;
    Personal and laundry services). For example, Accommodation has a coefficient of
    -2.39 with a standard error of 0.16.
  13: The paper includes a model (HURRECON) to compute sustained wind velocity at
    each population-weighted county centroid and reports statistics on employment
    and labor force.
  14: "Dynamic effects of hurricanes on employment at different horizons; Average\
    \ industry employment over the period 1995\u20132017; 95% confidence bands."
  15: Presents data on hurricane name, year, month, category, people affected, total
    fatalities, and total damages (in unspecified currency).
  16: The data includes statistical summaries such as mean, standard deviation, and
    range for employment growth, unemployment growth, labor force growth, and wage
    growth at various levels.
  17: Labor force in 1995, Labor force share, and change in labor force from 1995-2019
    are quantified for each county listed.
  18: "Labor force share and change data for several municipios, such as Florida Municipio\
    \ with a 25.70% increase from 1995 to 2019 and Maricao Municipio with a \u2212\
    9.44% change."
  24: Confidence bands at 95% for the impact horizons are provided.
  26: Dynamic effects of hurricanes on employment, average weekly wages, unemployed,
    and labor force at different horizons; confidence bands at 95%.
  27: "Dynamic effects of hurricanes at time \U0001D461 on employment at different\
    \ horizons exploiting industry\u2013time variation. Numbers in parenthesis represent\
