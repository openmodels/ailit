Drivers of Risk:
  1: Persistent changes in the temperature above or below historical norms adversely
    affect economic growth; changes in precipitation do not have statistically significant
    effects.
  2: The paper investigates the impact of deviations of temperature and precipitation
    from long-term historical norms on economic growth.
  3: The shocks impacting outcomes are annual increases in temperatures and climate
    variability.
  4: Increases in temperature are identified as the primary driver impacting GDP per
    capita.
  5: Persistent deviations of temperature from its historical norm, both above and
    below, impact long-run economic growth negatively.
  6: Changes in temperature and precipitation relative to historical norms are analyzed
    as drivers impacting per capita GDP growth.
  7: Focuses on temperature increases as the primary shock affecting economical growth.
  8: Persistent increases in annual temperatures above historical norms.
  9: The paper studies the impact of temperature deviations from historical norms
    on GDP growth.
  10: Temperature increases, degree of climate variability.
  11: Changes in average global temperature and climate variability are identified
    as impacts on long-term economic growth.
  12: Persistent increases in temperatures based on the RCP 2.6 and RCP 8.5 scenarios
Evaluation overview:
  1: The paper studies the long-term impact of climate change on economic activity
    across countries, focusing on per-capita real output growth.
  2: The paper evaluates the long-term macroeconomic effects of weather patterns transformed
    by climate change on per capita GDP growth.
  3: The outcome being evaluated is the impact of temperature changes on income growth
    and global GDP per capita by 2100.
  4: The analysis evaluates the GDP per capita losses arising from increases in temperature
    by 2100.
  5: The analysis evaluates the impact of temperature deviations from historical norms
    on long-run GDP per capita growth.
  6: "The paper evaluates the long-run effects of climate change on per capita real\
    \ GDP growth from 1960\u20132014."
  7: Discusses long-run growth effects of temperature increases on GDP.
  8: Focuses on the effects of climate change on long-run per capita real GDP growth
    in poor and hot countries.
  9: The paper evaluates the long-run effects of climate change on per capita real
    GDP growth from 1960 to 2014.
  10: Effects of climate change on per capita real GDP growth.
  11: The study provides an overview of the economic impact being evaluated, specifically
    the percent loss in GDP per capita by 2100 under different climate scenarios.
  12: Percent loss in GDP per capita
Highlights:
  1: A persistent temperature increase can have significant negative impacts on global
    GDP; the effects vary significantly based on climate and income groups.
  2: The results suggest that a series of positive or negative weather shocks has
    a long-term negative effect on per capita GDP growth.
  3: Key outcomes include significant long-term negative impacts on economic growth
    due to persistent temperature increases under high-emission scenarios.
  4: Economies are generally negatively impacted by temperature increases, with varying
    degrees of GDP per capita loss among different countries.
  5: Long-term deviations in temperature, rather than temporary shocks, are shown
    to impact economic growth negatively, suggesting significant implications for
    climate change policy.
  6: There is a statistically significant negative effect of temperature deviations
    on GDP growth, suggesting limited adaptation in the last five decades.
  7: No evidence of significant differential impacts of temperature changes on economic
    growth across different climate or income groups based on interactive terms.
  8: Negative GDP growth effects are more severe in hot countries than in cold ones,
    and poor countries are disproportionately affected.
  9: Significant negative effects on GDP growth are observed, particularly in temperate
    or hot countries and in low-income developing countries.
  10: Climate change leads to substantial output losses. The degree of climate variability
    significantly increases GDP per capita losses, almost doubling at the global level
    by 2100 under RCP 8.5 and m=30 to 13.11 percent.
  11: Major findings indicate significant differences in climate impact based on geographic
    and economic factors, with colder and richer countries having smaller marginal
    effects but still sizable impacts due to rapid warming. Abiding by the Paris Agreement
    limits economic losses.
  12: Under RCP 8.5, the United States could experience a 6.66%, 10.52%, or 14.32%
    loss in GDP per capita by 2100, depending on the 'm' value (20, 30, or 40 respectively).
Methodology:
  1: The analysis uses a stochastic growth model where productivity is affected by
    deviations of temperature and precipitation; it is based on a panel data set of
    174 countries from 1960 to 2014.
  2: The analysis uses a theoretical growth model linking deviations of weather from
    historical norms to per capita real output growth, and applies an empirical approach
    accounting for dynamics and feedback effects between climate and economic variables.
  3: "The analysis uses a heterogeneous panel estimation and counterfactual exercises\
    \ with temperature data from 1960\u20132014 to project impacts up to 2100."
  4: The analysis utilizes a panel ARDL model, accounting for temperature and precipitation
    changes relative to historical norms, and considers the asymmetrical effects based
    on different country groups.
  5: The analysis uses a panel ARDL approach with half-panel Jackknife Fixed Effects
    (HPJ-FE) estimator to assess the long-term impact of climate variables on GDP
    per capita growth, employing different lag orders and measuring deviations from
    time-varying historical norms.
  6: The analysis uses fixed effects (FE) and half-panel jackknife FE (HPJ-FE) to
    estimate long-run effects of climate variables on GDP growth.
  7: Uses rolling estimates and expanded panel data models with interactive terms
    to explore differential effects across income and climate.
  8: Utilizes HPJ-FE estimates based on an ARDL specification to conduct counterfactual
    analyses.
  9: The analysis uses a half-panel Jackknife mean-group estimator to estimate long-run
    growth effects considering historical temperature deviations and world GDP growth
    variables.
  10: Estimates are based on a specific equation (provided). The coefficients are
    estimated by the half-panel Jackknife FE (HPJ-FE) procedure. The analysis uses
    data on 174 countries over the period 1960 to 2014.
  11: The analysis involves counterfactual exercises based on temperature changes
    from 2015 to 2100, considering both mitigation (RCP 2.6) and unmitigated scenarios
    (RCP 8.5), and uses a heterogeneous panel data approach.
  12: Calculations are based on PPP GDP weighted averages with specific 'h' values
    (16, 36, 86 corresponding to 2030, 2050, 2100 respectively) and 'm' values (20,
    30, 40).
More Notes:
  5: The paper supports the significance of temperature deviations over precipitation
    in influencing long-term economic growth.
  10: Adaptation could reduce negative economic effects, but is highly unlikely to
    offset them entirely. Forceful mitigation policies are needed to limit the damage
    from climate change.
  12: Table 7 presents percent loss in GDP per capita under RCP 8.5 with climate variability
    considerations.
Quantitative material:
  1: "A persistent increase in average global temperature by 0.04\xB0C per year decreases\
    \ world real GDP per capita by over 7% by 2100; limiting the temperature increase\
    \ to 0.01\xB0C per annum reduces the loss to about 1%."
  3: Quantitative information includes a 7.22% reduction in global GDP per capita
    by 2100 under the RCP 8.5 scenario.
  4: Projected GDP per capita losses range up to 19% by 2100 due to temperature increases.
  5: "A 0.01\xB0C annual increase in temperature reduces real GDP per capita growth\
    \ by approximately 0.0586 percentage points, while a decrease of the same magnitude\
    \ causes a reduction of around 0.0520 percentage points per annum."
  6: "Quantitative estimates indicate negative impacts on GDP growth with coefficients\
    \ such as \u22120.373 and \u22120.566 in Specification 1."
  7: No significant differential effects found for temperature impacts between poor
    vs. rich or hot vs. cold countries.
  8: Quantitative evaluations of negative effects on GDP growth are provided, with
    specific numerical estimates for poor and hot countries.
  9: The page provides quantitative estimates of GDP growth losses with statistical
    significance under different scenarios and specifications.
  10: "Under RCP 8.5, a persistent above-norm increase in average global temperature\
    \ by 0.04 \u25E6C per year leads to substantial output losses, reducing real per\
    \ capita output by 0.80, 2.51 and 7.22 percent in 2030, 2050 and 2100, respectively.\
    \ Per-capita output losses are lower for m = 20 but significantly higher if it\
    \ takes longer to adapt to climate change ( m = 40 ). Under RCP 8.5 (with m =\
    \ 30), losses vary between 0.50 and 1.20 percent, 1.53 and 3.77 percent, and 4.35\
    \ and 10.52 percent in 2030, 2050 and 2100, respectively; with a relatively large\
    \ impact estimated for the United States in 2100."
  11: 'Quantitative data includes potential global income loss by 2100: a 7% reduction
    in real GDP per capita under RCP 8.5 and a projected reduction of 1% if the Paris
    Agreement targets are met (RCP 2.6).'
  12: Provides percent loss in GDP per capita by 2030, 2050, and 2100 under RCP 2.6
    and RCP 8.5 scenarios for the World, China, European Union, India, Russia, and
    the United States, with varying 'm' values (20, 30, 40)
sourcematerial:
  1: "Source material here: We study the long-term impact of climate change on economic\
    \ activity across countries, using a stochastic growth model where productivity\
    \ is affected by deviations of temperature and precipitation from their long-term\
    \ moving average historical norms. Using a panel data set of 174 countries over\
    \ the years 1960 to 2014, we find that per-capita real output growth is adversely\
    \ affected by persistent changes in the temperature above or below its historical\
    \ norm, but we do not obtain any statistically significant effects for changes\
    \ in precipitation. Our counterfactual analysis suggests that a persistent increase\
    \ in average global temperature by 0.04 \u25E6C per year, in the absence of mitigation\
    \ policies, reduces world real GDP per capita by more than 7 percent by 2100.\
    \ On the other hand, abiding by the Paris Agreement goals, thereby limiting the\
    \ temperature increase to 0.01 \u25E6C per annum, reduces the loss substantially\
    \ to about 1 percent. These effects vary significantly across countries depending\
    \ on the pace of temperature increases and variability of climate conditions."
  2: "yaml\nEvaluation overview: \"This paper investigates the long-term macroeconomic\
    \ effects of weather patterns transformed by climate change across 174 countries\
    \ over the period 1960 to 2014...climate change, by shifting the long-term average\
    \ and variability of weather, could impact an economy\u2019s ability to grow in\
    \ the long-term...We focus on both of these issues and develop a theoretical growth\
    \ model that links deviations of temperature and precipitation (weather) from\
    \ their long-term moving-average historical norms (climate) to per capita real\
    \ output growth (Appendix A.1).\"\nDrivers of Risk: \"We focus on both of these\
    \ issues and develop a theoretical growth model that links deviations of temperature\
    \ and precipitation (weather) from their long-term moving-average historical norms\
    \ (climate) to per capita real output growth (Appendix A.1).\"\nMethodology: \"\
    Inourempiricalapplication,weallowfordynamicsandfeedbackef- fects in the interconnections\
    \ of climatic and macroeconomic variables...Thirdly, we test the predictions of\
    \ our theoretical growth model using cross-country data on per-capita GDP growth\
    \ and deviations of temperature and precipitation from their moving average historical\
    \ norms over the past fifty-five years (1960\u20132014).\"\nHighlights: \"Our\
    \ results suggest that a series of positive (or negative) weather shocks has a\
    \ long-term negative effect on per capita GDP growth.\"\n"
  3: "Source material here.\nregressions,wecancautiouslylinkthemtoclimatechange.Specifically,\n\
    we show that if temperature rises (falls) above (below) its historical\nnorm by\
    \       0.01 \u25E6C annually for a long period of time, income growth\nwillbelowerby\
    \          0.0543    percentagepointsperyear... Furthermore, we show that our\
    \ empirical findings pertain\nto poor or rich, and hot or cold countries alike...We\
    \ estimate that the marginal effects of weather shocks are larger in\nlow-income\
    \ countries because they have lower capacity to deal with\nthe consequences of\
    \ climate change.\n\nTo contribute to climate change policy discussions, we perform\
    \ a\nnumber of counterfactual exercises where we investigate the cumu-\nlative\
    \ income effects of annual increases in temperatures over the\nperiod 2015\u2013\
    2100...We show that an increase in average global temperature\nof 0.04 \u25E6\
    C per year...reduces world\u2019s real GDP per capita by 7.22 percent by 2100...\n\
    \nSuppose that the pace of temperature increases was the same across\nhotandcoldclimates,thenourheterogeneouspanelestimationswould\n\
    suggest a smaller, but still negative, marginal weather effect in cold\ncountries.\n\
    \nOverall,while adaptation to climate change can reduce these negative\nlong-run\
    \ growth effects, it is highly unlikely to offset them entirely.\n"
