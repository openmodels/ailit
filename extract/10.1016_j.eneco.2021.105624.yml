    \ 1960\u20132014.\n\nEstimates are based on \U0001D6E5\U0001D466\U0001D456\U0001D461\
    = \U0001D44E\U0001D456+ \u2211  4\U0001D4C1=1 \U0001D711\U0001D4C1\U0001D6E5\U0001D466\
    \U0001D456,\U0001D461\u2212\U0001D4C1+ \u2211  4\U0001D4C1=0 \U0001D6FD\U0001D4C1\
    \U0001D6E5\U0001D465\U0001D456,\U0001D461\u2212\U0001D4C1(\U0001D45A)+ \U0001D700\
    \U0001D456\U0001D461,where \U0001D466\U0001D456\U0001D461is the log of real GDP\
    \ per capita of country \U0001D456in year \U0001D461,\U0001D465\U0001D456\U0001D461\
    (\U0001D45A) = |||\U0001D447\U0001D456\U0001D461\u2212\U0001D447\u2217\U0001D456\
    ,\U0001D461\u22121 (\U0001D45A)|||, \U0001D447\U0001D456\U0001D461is the population-weighted\
    \ average temperature of country \U0001D456in year \U0001D461, and \U0001D447\u2217\
    \U0001D456,\U0001D461\u22121 (\U0001D45A) is the historical temperature norm of\
    \ country \U0001D456(based on moving averages of the past 30 years).\n\nThe coefficients\
    \ are estimated by the half-panel Jackknife FE (HPJ-FE) procedure and the standard\
    \ errors are based on the estimator proposed in Proposition 4 of Chudik et al.(2018).\n\
    \nOverall we showed that economic growth is affected not only by higher temperatures\
    \ but also by the degree of climate variability.\n\nHowever, a persistent above-norm\
    \ increase in average global temperature by 0.04 \u25E6C per year (based on RCP\
    \ 8.5) leads to substantial output losses, reducing real per capita output by\
    \ 0.80, 2.51 and 7.22 percent in 2030, 2050 and 2100, respectively. The results\
    \ indicate that per-capita output losses are lower for m = 20 but significantly\
    \ higher if it takes longer to adapt to climate change (m = 40).\n\nTable 6 reports\
    \ the real GDP per capita losses for China, the European Union, India, Russia,\
    \ and the United States, over various time horizons.\n\nFocusing on the RCP 8.5\
    \ scenario (with m = 30) we observe that the losses vary between 0.50 and 1.20\
    \ percent, 1.53 and 3.77 percent, and 4.35 and 10.52 percent in 2030, 2050 and\
    \ 2100, respectively; with a relatively large impact estimated for the United\
    \ States in 2100 (reflecting IPCC\u2019s projections of a sharp increase in the\
    \ country\u2019s average temperature in the absence of mitigation efforts).\n\n\
    As expected, the estimated GDP per capita losses become significantly larger,\
    \ almost doubling at the global level by 2100 to 13.11 percent. Overall, we argue\
    \ that while climate change adaptation could reduce these negative economic effects,\
    \ it is highly unlikely to offset them entirely. More forceful mitigation policies\
    \ are needed to limit the damage from climate change. Using data on 174 countries\
    \ over the period 1960 to 2014."
