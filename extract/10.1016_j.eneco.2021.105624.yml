    Quantitative material: "The x-axis represents the temperature increase from 2014
    to 2099, ranging from 0 to 12 degrees Celsius. The y-axis represents the GDP per
    capita loss in percentage, ranging from 0% to 19%."

    Methodology: "Considering strong evidence of an upward trend in temperatures worldwide,
    and guided by the theoretical growth model with weather and climate variables
    in Appendix A.1, we base our empirical analysis on the following panel ARDL model."

    Highlights: "A general positive trend is observed, with GDP loss increasing as
    temperature rises. Some notable countries appear in different areas of the plot:
    IND, IDN, BRA, USA, CHN, and others, showing diverse impacts of temperature increase
