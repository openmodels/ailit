  5: " \nEvaluation overview: \"The FE and HPJ-FE estimated coefficients of the precipitation\
    \ variables, \u0302\U0001D703\U0001D6E5\u0303\U0001D443\U0001D456\U0001D461(\U0001D45A\
    )+ and \u0302\U0001D703\U0001D6E5\u0303\U0001D443\U0001D456\U0001D461(\U0001D45A\
    )\u2212, are not statistically significant. However, long-run economic growth\
    \ is adversely affected when temperature deviates from its time-varying historical\
    \ norm persistently.\"\nDrivers of Risk: \"Therefore, bias correction is important,\
    \ including for the counterfactual exercises in Section3; otherwise the cumulative\
    \ effects of climate change could be underestimated. [...] As expected, the FE\
    \ estimates [...] are smaller than their HPJ-FE counterparts in absolute values.\"\
    \nQuantitative material: \"The HPJ-FE estimates suggest that a 0.01 \u25E6C annual\
    \ increase in the temperature above its historical norm reduces real GDP per capita\
    \ growth by 0.0586 percentage points per annum [...] and a 0.01 \u25E6C annual\
    \ decrease in the temperature below its historical norm reduces real GDP per capita\
    \ growth by 0.0520 percentage points per year.\"\nMethodology: \"To deal with\
    \ these issues, we use the half-panel Jackknife FE (HPJ-FE) estimator of Chudik\
    \ et al.(2018) and report the results in columns (b) of Table1 alongside the estimated\
    \ coefficients of the error correction term ( \u0302\U0001D719). Specification\
    \ 1 of Table 1 for m = 30 reports the baseline results.\"\nHighlights: \"Our results\
    \ show that an increase in temperature above its historical norm for an extended\
    \ period of time is associated with lower economic growth in the long run \u2013\
    \ suggesting that a temporary temperature shock will only have short-term growth\
    \ effects but climate change \u2013 by shifting the long-term average and variability\
    \ of weather \u2013 could impact an economy\u2019s ability to grow in the long\
    \ term.\"\nMore Notes: \"Permanent deviations of precipitation from their historical\
    \ norms do not affect long-term growth, but permanent deviations of temperature\
    \ from their time-varying historical norms have a negative effect on long-run\
    \ GDP growth, with the magnitudes of the coefficient of ||\u0303\U0001D447\U0001D456\
    \U0001D461(\U0001D45A)|| being similar to those reported for \u0303\U0001D447\U0001D456\
    \U0001D461(\U0001D45A)+ and \u0303\U0001D447\U0001D456\U0001D461(\U0001D45A)\u2212\
    \ in Table1.\"\n"
  6: "Source material: \"The paper evaluates the long-run effects of climate change\
    \ on per capita real GDP growth from 1960\u20132014. Changes in temperature and\
    \ precipitation relative to historical norms are analyzed as drivers impacting\
    \ per capita GDP growth. Quantitative estimates indicate negative impacts on GDP\
    \ growth with coefficients such as \u22120.373 and \u22120.566 in Specification\
    \ 1. The analysis uses fixed effects (FE) and half-panel jackknife FE (HPJ-FE)\
    \ to estimate long-run effects of climate variables on GDP growth. There is a\
    \ statistically significant negative effect of temperature deviations on GDP growth,\
    \ suggesting limited adaptation in the last five decades.\"\n"
  7: "yaml\nEvaluation overview: \"Discusses long-run growth effects of temperature\
    \ increases on GDP.\"\nSource material: \"Fig. 4. Rolling Estimates of the Long-Run\
    \ Effects of Temperature Increases on per capita Real GDP Growth. Notes: Figure\
    \ shows the long-run effects (and their 95% standard error bands) of temperature\
    \ increases on per capita real GDP growth over different time windows, using the\
    \ ARDL specification in (1).\"\nDrivers of Risk: \"Focuses on temperature increases\
    \ as the primary shock affecting economical growth.\"\nSource material: \"The\
    \ literature provides evidence for uneven effects of temperature shocks, with\
    \ worse adverse consequences in economies with hot climates and/or in low-income\
    \ countries.\"\nQuantitative material: \"No significant differential effects found\
    \ for temperature impacts between poor vs. rich or hot vs. cold countries.\"\n\
    Source material: \"The results from estimating specifications (2) and (3) are\
    \ reported in Table 3 where the estimated coefficients of the interactive terms\
    \ are not statistically significant\u2014hence, we cannot reject the hypothesis\
    \ that there are no differential effects of climate change on poor versus rich\
    \ nations or hot versus cold countries.\"\nMethodology: \"Uses rolling estimates\
    \ and expanded panel data models with interactive terms to explore differential\
    \ effects across income and climate.\"\nSource material: \"Fig. 4. Rolling Estimates\
    \ of the Long-Run Effects of Temperature Increases... Table 2 ... we follow Dell\
    \ et al. (2012) and Burke et al. (2015) and augment Specification 2 with an interactive\
    \ term... The results from estimating specifications (2) and (3)...\"\nHighlights:\
    \ \"No evidence of significant differential impacts of temperature changes on\
    \ economic growth across different climate or income groups based on interactive\
    \ terms.\"\nSource material: \"The statistical insignificance of estimated coefficients\
    \ of the interactive terms in Table 3 may be due to lack of statistical power...\
    \ hence, we cannot reject the hypothesis that there are no differential effects\
    \ of climate change on poor versus rich nations or hot versus cold countries.\"\
    \n"
