  17: 'Source material here.

    Data on substrate temperature at 10 cm depth was obtained in this research to
    investigate the reasons behind the differences in plant performance between biochar
    and non-biochar GRs. The different biochar setups used in this study were effective
    in reducing GR substrate temperature during both hot and cold periods. However,
    the effects were more remarkable during the highest ambient temperature. Additionally,
    biochar-related parameters also significantly impacted the temperature of GR substrates,
    and they were associated with plant performance. The smallest reduction in substrate
    temperature was observed in GR-7.5M-M and GR-15M-M, with GR-7.5M-F following closely
    behind. This may have contributed to the improved plant performance by increasing
    substrate moisture in these test beds. In general, biochar applied using the bottom/top-dressed
    method did not alter the substrate pore structure at 10 cm depth where temperature
    data was measured. Future studies are recommended to collect temperature data
    at different substrate depths to completely understand the correlation between
    substrate temperature/moisture and plant performance. The better plant growth
    observed in some GRs, where biochar had no notable impact on substrate temperature
    or moisture, may be attributed to nutrient availability in the substrates.

    '
  18: "Results illustrated that different biochar setups failed to reduce nutrient\
    \ concentrations when compared to the non-biochar treatment. Nonetheless, the\
    \ significant potential of biochar for improving runoff quality was evident when\
    \ evaluating nutrient loads estimated by multiplying nutrient concentrations by\
    \ runoff volume. As a result, nutrient loss from biochar-amended GR substrates\
    \ into runoff was reduced, thereby helping to maintain a nutrient-rich growing\
    \ environment for plants. This paper focused on evaluating GR plant performance\
    \ under the impact of biochar addition within the context of building and construction,\
    \ including aspects like building energy saving and structural loading. The selection\
    \ of parameters, including substrate temperature and runoff quantity/quality,\
    \ was based on their direct impacts on GR plant performance. Results from a numerical\
    \ model named \u201CCHEMFLO-2000\u201D also supported the effectiveness of biochar.\
    \ The simulation results showed that GRs with 3 cm and 5 cm depth of biochar increased\
    \ runoff retention from 55.05\u201365.29% to 66.9 and 69.15%, respectively. Therefore,\
    \ data on substrate temperature was collected in this research to identify underlying\
    \ mechanisms of enhanced plant growth by biochar addition. The cooling effects\
    \ of GRs influence building heating and cooling demands, it is recommended that\
    \ future studies include a comprehensive investigation of the thermal performance\
    \ of biochar-amended GRs. Reduction in building temperature and energy consumption\
    \ is one of the most notable benefits of GRs, which has attracted significant\
    \ attention from researchers. For example, Cascone evaluated the energy efficiency\
    \ of an innovative and sustainable GR with a recycled drainage layer, locally\
    \ sourced materials, and high organic content in substrates. After analyzing the\
    \ thermo-physical parameters of GRs and the building (surface temperature, heat\
    \ flow, volumetric content) during the summer period in Mediterranean climate,\
    \ the studied GR alleviated the heat transfer to the building and the internal\
    \ surface temperature by 2 \xB0C relative to the reference concrete roof."
  19: "  \nSource material here: \"Vegetation is an important part of a GR system,\
    \ and it plays a major role in maintaining GR performance during its lifetime.\
    \ However, GR plants are subject to unfavorable growing conditions on rooftops,\
    \ such as extreme solar heat and strong wind. While drought-tolerant plants are\
    \ often chosen in GRs, there exist concerns regarding plant performance. Therefore,\
    \ attempts have been made to modify GR substrates for a better growing environment.\
    \ Biochar has been recently introduced in GRs and also in agriculture to enhance\
    \ plant performance by regulating substrate water/nutrient retention. While the\
    \ impacts of biochar on GR plants have been previously investigated, the understanding\
    \ of the long-term performance of GR plants in relation to biochar-related parameters\
    \ is still limited. Therefore, this research investigates the performance of plants\
    \ in six different 1 m2 biochar-amended GR test beds with varying biochar-related\
    \ parameters (amendment rates, particle sizes, and application methods). Key findings\
    \ obtained from this study are summarized as follows: (a) In this study, the addition\
    \ of biochar resulted in the improvement of plant performance in all biochar-amended\
    \ GRs. (b) The test bed modified by 15% v/v medium biochar particles had the best\
    \ plant performance in terms of plant height, plant dry weight, and plant coverage\
    \ area. (c) A 15% v/v amendment is recommended as the optimal biochar amendment\
    \ rate for plant growth.\"\n"
