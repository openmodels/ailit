  4: "Source material here.\nThis research aims to assess the long-term impacts of\
    \ biochar on different types of GR plants. Given that biochar offers multiple\
    \ benefits to increase the feasibility of widespread application of GRs on rooftops\
    \ of either existing or new buildings, this paper focuses on evaluating the effectiveness\
    \ of biochar in improving plant performance. The aim is to maintain GR serviceability,\
    \ maximize the benefits to the buildings where they are installed, and reduce\
    \ operational and maintenance costs, ultimately encouraging the broader adoption\
    \ of GRs. \n\n... the plants on a GR are often subjected to harsh growing conditions,\
    \ including extreme weather like intense solar radiation and strong winds, as\
    \ well as low moisture and nutrient availability in the thin substrates typical\
    \ of extensive GR systems...\n\nThe impacts of different biochar amendment rates\
    \ (5%, 10%, 15%, and 20% v/v) on GR plants were evaluated. \n\nResearch outcomes\
    \ are expected to obtain necessary information about the biochar benefit to plant\
    \ growth under an Australian climate...\n\nTherefore, this research aims to assess\
    \ the long-term impacts of biochar on different types of GR plants... This research\
    \ is a continuation of work presented in the studies by Nguyen, Chau and Muttil\
    \ [41] and Nguyen, et al. [54], which focused on runoff retention and runoff quality,\
    \ respectively. Additionally, this research also seeks to understand the impact\
    \ of various biochar-related parameters, which include biochar amendment rates,\
    \ particle sizes, and application methods, on plant performance.\n\n... ultimately\
    \ encouraging the broader adoption of GRs.\n"
