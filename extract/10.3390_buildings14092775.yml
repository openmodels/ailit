    Evaluation overview: "The paper discusses the performance and challenges of implementing
    green roofs (GRs), including building energy savings, life cycle cost analysis,
    and structural safety concerns. The performance of GRs has not been consistently
    reported and properly understood. Performance variance is linked to weather conditions,
    substrate composition, thickness, age, maintenance, and application of fertilizers."

    Drivers of Risk: "Structural safety concerns impact stakeholders'' willingness
    to implement GRs, especially on old buildings with weak structures. Concerns about
    structural safety impact the implementation of GRs among various stakeholders.
    The feasibility of implementing GRs is further limited on older buildings with
    weak structural capabilities."

    Highlights: "GRs integrated with photovoltaic systems improve indoor air temperatures
    and boost electricity production. GRs cooled indoor air temperatures while also
    boosting electricity production due to the cooler temperature of photovoltaic
    (PV) panels. Integration of GRs with PV systems has led to positive outcomes."

    Highlights: "Biochar is a promising additive for GR substrates, offering advantages
    like increased water retention and reduced substrate weight. Biochar possesses
    a highly porous structure and a large specific surface area, so it is able to
    retain more water and nutrients and improve soil fertility and plant growth. The
    serviceability of GRs could be maintained during their expected lifetime with
    less effort and reduced costs due to biochar."

