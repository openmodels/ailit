Highlights:
  1: No relevant information
  2: Biochar improves plant growth in green roofs; Medium biochar particles at 15%
    v/v had the best plant performance; Reduced substrate temperature reduces building
    energy consumption; Biochar-amended green roofs offer benefits like enhanced plant
    growth, reduced building energy costs, and a shorter payback period.
  3: Integration of GRs with photovoltaic systems and other technologies like radiant
    cooling systems and green walls enhances their efficacy.
  4: The research aims to assess the long-term impacts of biochar on different types
    of GR plants and to understand the impact of various biochar-related parameters
    (amendment rates, particle sizes, and application methods) on plant performance.
  5: The experiment is designed to mimic conventional built-in-place extensive GRs,
    providing long-lasting durability and long-term benefits, especially in areas
    prone to extreme weather conditions.
  6: The study uses drought-tolerant, native plants suited for thin, extensive green
    roof substrates.
  11: Mixing medium biochar particles at a dose of 15% v/v in the test beds resulted
    in the best plant performance.
  12: Biochar in green roofs can reduce substrate temperature and the effects are
    more pronounced at higher temperatures.
  13: "Green roofs reduced substrate temperature, with GR-7.5M-M showing the greatest\
    \ reduction (4\u25E6C) during the hottest periods. Reductions were 2\u25E6C during\
    \ cold days."
  14: GR-7.5 and ambient temperature often closely mirror each other. Ambient temperature
    fluctuates more with higher peaks and lower troughs than GR-Q/GR-0 and GR-7.5.
  15: Biochar has significant long-term effects on plant performance. Billy buttons
    had the poorest performance, especially in GR-0 and GR-7.5M-F, potentially due
    to the listed drivers of risk. Optimal plants for specific GR substrates need
    to be identified via pilot-scale experiments under different climatic conditions.
  17: Biochar reduces GR substrate temperature, especially during high ambient temperatures.
    The mixing method of applying 7.5% v/v fine biochar particles had the highest
    water retention performance.
  19: The addition of biochar resulted in the improvement of plant performance in
    all biochar-amended GRs.
  20: Biochar amendment offers solutions to improve plant performance, building energy
    savings, reduces structural loading, and shortens the payback period.
  23: Biochar amendments in green roofs can improve water retention, soil properties,
    stormwater management, and plant growth. Green roofs can contribute to energy
    savings and cooling in urban environments. Substrate depth, vegetation type, and
    irrigation regime influence green roof thermal performance.
Methodology:
  1: No relevant information
  2: One-year observational data of plant height, coverage area, and dry weight from
    six green roof test beds; Results applicable to wallaby grass, common everlasting,
    and billy buttons.
  4: The research assesses the long-term impacts of biochar on different types of
    green roof plants under an Australian climate. It evaluates the effectiveness
    of biochar in improving plant performance, aiming to maintain green roof serviceability
    and maximize benefits to buildings.
  5: "The study involves designing and constructing six 1 m\xB2 green roof test beds\
    \ with variations in biochar amendment rate, particle size, and application methods.\
    \ Three plant species suitable for extensive green roofs were selected. Data on\
    \ plant height, coverage area, dry weight, and substrate temperature were collected\
    \ over a one-year period."
  6: "Pre-grown plants of three common wallaby grasses, two common everlasting wildflowers,\
    \ and two Billy Buttons wildflowers were transferred to each test bed on 5 May\
    \ 2023. A 150-mm GR substrate, a mixture of light-expanded clay aggregate (LECA),\
    \ hardwood mulch, and coir chips (80%, 15%, and 5% v/v, respectively), was used.\
    \ Biochar derived from eucalyptus was added in different ways (mixing, top-dressing,\
    \ and bottom-applied) with particle sizes of 1\u20133 mm and less than 1 mm."
  11: The analysis measures plant height and dry weight across various green roof
    test beds with different biochar amendments.
  12: Temperature data were collected at 5-minute intervals from a thermal sensor
    installed at a 10cm depth in substrate testbeds.
  13: Monitored substrate temperature in six green roof test beds from June 2016 to
    July 2016, comparing different green roof compositions (GR-0, GR-7.5M-M, GR-15M-M,
    GR-7.5B-M, GR-7.5M-F, GR-7.5T-F) against ambient temperature.
  14: Measurements taken from green roof testbeds between June 2016 to July 2016 in
    the first image and November 2022 to May 2023 in the second image. Comparisons
    between GR-Q (or GR-0 in the first image), GR-7.5, and ambient temperature are
    made.
  15: Six 1 m2 green roof test beds were constructed to investigate the impacts of
    biochar on plant performance. Plant temperature data was collected at depth. Observations
    were made over a one-year study period. The study specifically used conventional
    built-in-place GR systems.
  17: Field experiments with different biochar setups (mixing, bottom-applied, top-dressed)
    in green roofs, measuring substrate temperature at 10 cm depth. Observation period
    is within the runoff quantity/quality experiments.
  19: Performance of plants was investigated in six different 1 m2 biochar-amended
    GR testbeds with varying biochar-related parameters (amendment rates, particle
    sizes, and application methods).
  20: The use of intermediate biochar particles is suggested for optimal plant performance.
  23: The page includes meta-analyses, experimental studies (small-scale, field),
    modeling approaches, and integrated fuzzy-based MCDM analysis related to green
    roof and biochar performance under various conditions.
