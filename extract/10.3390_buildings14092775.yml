sourcematerial:
  2: 'Source material here.

    Abstract: Green roofs (GRs) have been widely adopted as an effective Green Infrastructure
    (GI) practice in cities worldwide, offering ecosystem services such as stormwater
    management and reduction of the urban heat island effect. [...] The addition of
    biochar improves water/nutrient retention of GRs, thereby increasing substrate
    fertility and promoting plant performance. [...] Therefore, this research aims
    to assess the performance of GR plants with different biochar parameters, namely,
    amendment rates, application methods, and particle sizes. A one-year-long observational
    data of plant height, coverage area, and dry weight from six GR test beds was
    collected and analyzed. Results demonstrate the positive impacts of biochar on
    plant growth in different biochar-GR setups and types of plant species (wallabygrass,
    common everlasting, and billy buttons). The GR with medium biochar particles at
    the amendment rate of 15% v/v had the best plant performance. [...] The conclusions
    were further supported by observed data indicating reduced substrate temperature,
    which in turn reduces building energy consumption.

    '
