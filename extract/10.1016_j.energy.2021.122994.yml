  9: "plaintext\nEvaluation overview: \"The results presented in this paper aim to\
    \ show the potential role of technology and energy efficiency decisions in reducing\
    \ energy demand and emissions from residential heating and cooling.\"\nDrivers\
    \ of Risk: \"Furthermore, further stressors which may affect residential energy,\
    \ such as extreme weather events, or the heat island effect should be investigated.\
    \ These are important as they may provide significant risks of climate change\
    \ on energy demand.\"\nQuantitative material: \"Compared to today, in the 2\xB0\
    C scenario global heating demand is expected to decrease by 27% and 66% by 2050\
    \ and 2100 respectively. On the other hand, cooling demand is expected to increase\
    \ by 176% and 286% respectively, but lower than the projected increase in the\
    \ absence of climate policy.\"\nMethodology: \"The updated TIMER-REMG can act\
    \ as a basis for improved understanding of mitigation strategies and costs, as\
    \ well as a starting point for the analysis of the energy and material demand\
    \ of the residential sector.\"\nHighlights: \"Investments in insulation play an\
    \ important role in reducing energy demand from residential heating and cooling...\
    \ compared to today, in the 2\xB0C scenario global heating demand is expected\
    \ to decrease by 27% and 66% by 2050 and 2100 respectively. On the other hand,\
    \ cooling demand is expected to increase by 176% and 286% respectively, but lower\
    \ than the projected increase in the absence of climate policy.\"\nMore Notes:\
    \ \"This raises important concerns of equity, as rich households may be better\
    \ equipped to deal with rising energy costs... while poorer households are locked\
    \ into lower quality energy supply and demand structures.\"\n"
  10: "V. Daioglou, E. Mikropoulos, D. Gernaat et al. Energy 243 (2022) 122994\nrequired.\
    \ Heat pumps offer a particularly attractive solution, manuscript. E.M: Contributed\
    \ to the model, analysed the model projections, contributed to the manuscript.\
    \ D. G: Contributed to the model, contributed to the manuscript. D.P.v.V: Contributed\
    \ to the manuscript.\n\nDespite their high upfront investment costs, due to their\
    \ extremely high ef\uFB01 ciency. As such they both reduce total \uFB01 nal energy\
    \ demand and direct emissions.\nNeither ef\uFB01 ciency improvements nor fuel\
    \ switching are a silver bullet to reducing residential emissions, with households\
    \ meeting emission requirements for a 2/C14 C scenario by combining ef\uFB01 ciency\
    \ improvements and fuel switching e but neither to extreme levels. Investments\
    \ in further insulation approximately double aggregate building envelope ef\uFB01\
    \ ciency compared to today. The greatest improvements are projected to be in poorer\
    \ regions, while colder regions have the highest absolute ef\uFB01 ciency (see\
    \ Appendix A. Supplementary data\nFig. 1). However, even at very high emission\
    \ prices, extremely high building envelope ef\uFB01 ciency levels (leading to\
    \ U-values below 0.5 W/m2/K) are not extensively adopted. These investments take\
    \ place in-tandem with fuel switching and increased ef\uFB01 ciency in heating\
    \ and cooling technologies. The results show that an equilibrium is reached where\
    \ improved levels of both heating/cooling ef\uFB01 ciency and building envelope\
    \ ef\uFB01 ciency are applied, but neither to their maximum level. Households\
    \ bene\uFB01 t from a self-limiting feedback between these two, where improved\
    \ heating/cooling ef\uFB01 ciency reduces the need for increased insulation, and\
    \ vice versa. In this system, the applied emission price (which is calculated\
    \ on total energy and land use greenhouse gas emissions) acts as a pressure on\
    \ how far this equilibrium is pushed.\n\nRegions with greater space heating demand\
    \ bene\uFB01 t more from insulation and electri\uFB01 cation of heating. Accordingly,\
    \ they have the greatest potential to limit their energy demand and emissions\
    \ throughout the 21st century. Warmer regions are expected to have an increasing\
    \ \uFB01 nal energy demand as currently un-ful\uFB01 lled cooling demand is met,\
    \ driven by expected increases in household expenditures. Thus, while their energy\
    \ demand is expected to increase, they can still bene\uFB01 t from improvements\
    \ in cooling ef\uFB01 ciency and, to a lesser extent, building envelope ef\uFB01\
    \ ciency.\n\nThe energy use of the residential sector can become net-zero - or\
    \ the sector can even become a net producer e but the potential varies a lot across\
    \ demographics. The model projects that households produce 8 EJ/yr of electricity\
    \ in 2050, increasing to 40 EJ/yr in 2100 in the mitigation scenario. By combining\
    \ the electri\uFB01 cation of heating (and other energy services), energy ef\uFB01\
    \ ciency, and the adoption of rooftop PV, the model projections show that households\
    \ approach, and in some cases surpass, their own energy demand. It is shown that\
    \ the richest households bene\uFB01 t from this since they are most able to invest\
    \ in ef\uFB01 ciency measures and rooftop PV. Furthermore, they bene\uFB01 t from\
    \ their large \uFB02 oor-space, increasing their rooftop-PV potential. Warmer\
    \ regions reach net-zero status \uFB01 rst as they bene\uFB01 t from greater solar\
    \ irradiation and lower heating demand. The increased emergence of prosumer households\
    \ in the projected 2/C14 C scenario highlights the importance of power grids and\
    \ electricity storage technologies which would be able to manage the increased\
    \ mismatch and variability of supply and demand. However, poorer households may\
    \ face dif\uFB01 culties in investing in technologies and insulation with very\
    \ high upfront costs, thus keeping them in a low-ef\uFB01 ciency, high-demand,\
    \ high-emission situation e while richer households can lower the energy demand\
    \ and emissions and bene\uFB01 t from the potential prosumer status. This would\
    \ further exacerbate economic inequalities as richer households can invest their\
    \ way out of long-term energy and emission costs."
