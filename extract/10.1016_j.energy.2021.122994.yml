Drivers of Risk:
  1: Increasing demand for space heating and cooling; increasing affluence in warmer
    regions leading to increased cooling demand
  3: Climate policy scenarios with CO2 pricing impact heating and cooling fuel costs,
    influencing investment in insulation and energy technologies.
  4: Colder regions (OECD, Reforming Economies) are projected to have lower U-values
    due to significant heating demand.
  5: Projected increase in floorspace and changes in building envelope efficiency
    across regions are impacting heating and cooling demand.
  6: Emission prices and fuel switching impact residential heating and cooling energy
    demands.
  7: Increased residential floorspace in the Middle East and Africa, and Asia, leads
    to greater benefits from improved insulation in new buildings. Warmer regions
    benefit from more efficient air conditioning units. Local climate conditions influence
    the effectiveness of insulation.
  8: No relevant information
  9: Extreme weather events and the heat island effect may affect residential energy
    demand.
  10: The analysis considers the impact of emission prices, space heating/cooling
    demand, household expenditures, and solar irradiation on energy demand and emissions.
Evaluation overview:
  1: Residential energy use and corresponding greenhouse gas emissions
  4: This paper focuses on final energy use per year (EJ) and emissions (GtCO2/yr)
    in six aggregated regions.
  6: No relevant information
  7: No relevant information
  8: No relevant information
  9: The paper aims to show the potential role of technology and energy efficiency
    decisions in reducing energy demand and emissions from residential heating and
    cooling.
  10: This paper evaluates energy demand and emissions in the residential sector.
Highlights:
  1: Increased envelope efficiency and advanced heating technologies can synergistically
    reduce emissions; Combining these measures with rooftop PV can lead to net zero
    energy demand for many households; Residential sector strategies vary across local
    climate, socio-economic, and building stock characteristics.
  3: Rooftop PV investments benefit larger households with higher electricity demand
    and locations with high solar irradiation.
  4: Significant insulation investments already occur in Baseline scenario, especially
    in colder regions with older buildings.
  5: Floorspace is expected to increase globally and regionally; U-Values indicating
    thermal performance are projected to decrease, suggesting improvements in efficiency.
  6: "Emission pricing promotes energy efficiency, leading to reduced heating demand\
    \ and increased cooling demand in the 2\xB0C scenario."
  7: Neither insulation nor technology change dominates energy and emission mitigation
    efforts; an equilibrium is reached where improved heating/cooling efficiency and
    building envelope efficiency are applied. Electrification of heating in OECD,
    Reforming Economies, and Asia leads to steep declines in direct emissions. Increased
    insulation in new buildings accounts for most of the reduction in secondary energy
    demand globally.
  8: Heating and cooling energy demand can be reduced from current levels through
    the use of advanced technologies. Decarbonization of the residential sector depends
    on a synergistic use of both improvements in thermal insulation and technological
    improvements in heating and cooling.
  9: Investments in insulation are key in reducing residential energy demand and emissions,
    and cooling demand will significantly increase, but less than without climate
    policy.
  10: Efficiency improvements and fuel switching are not a silver bullet to reducing
    residential emissions; a combination is required. Regions with greater space heating
    demand benefit more from insulation and electrification of heating. Warmer regions
    are expected to have an increasing final energy demand. Richer households benefit
    more from energy efficiency measures and rooftop PV due to their ability to invest.
Methodology:
  1: Using a regional energy system model with an explicit representation of residential
    energy use and building stocks.
  3: Scenarios including a climate policy with a CO2 price are considered, affecting
    the costs and competitiveness of insulation and heating/cooling technologies.
  4: Scenarios consider carbon prices, technology choices, and levels of insulation
    to analyze energy demand.
  6: "Comparison of a baseline and a 2\xB0C scenario for final energy demand for residential\
    \ heating and cooling across various regions till 2050."
  7: Presents an updated version of the TIMER-REMG model, part of the IMAGE (IAM).
    It explicitly represents different residential energy services, income levels,
    local climate conditions, insulation levels, renovation and construction of building
    stocks, selection of heating and cooling technologies, and rooftop PV. The model
    uses a recursive system-dynamic formulation.
  8: TIMER-REMG was calibrated to reflect historic (1971-2018) data on final regional
    residential final energy demand, floorspace, household size, appliance and air-conditioning
    ownership, and heating fuel demand for each region and income level. Residential
    building stock and building envelope efficiency are calibrated to limited country-level
    data. Projections cover the period from 2020 to 2050.
  9: The updated TIMER-REMG model includes dynamics like building-stock turnover,
    climate characteristics, and economic decision-making; it serves as a basis for
    improved understanding of mitigation strategies and costs.
  10: "The analysis uses a model to project household energy production and consumption\
    \ under different scenarios, including a 2\xB0C scenario. The model considers\
    \ factors like emission prices, technology adoption (e.g., heat pumps, rooftop\
    \ PV), and building efficiency."
More Notes:
  6: "Direct emissions from residential heating are significantly reduced under the\
    \ 2\xB0C scenario due to electrification."
  7: The model highlights that richer urban households in Latin America become positive
    energy households as they benefit from a climate which limits their final energy
    demand. The paper acknowledges that advanced architectural techniques could further
    reduce heating and cooling demand.
  8: The extent of required insulation improvements depends a lot on local climate
    characteristics, with warmer regions not benefiting significantly from marginal
    improvements.
  9: The study emphasizes the importance of equitable energy transition policies,
    particularly focusing on the differentiation between poor and rich households
    in terms of energy demand and mitigation capacity.
  10: The paper highlights the importance of power grids and electricity storage technologies
    to manage the increased mismatch and variability of energy supply and demand from
    prosumer households. Poorer households may face difficulties in investing in technologies
    and insulation due to high upfront costs.
Quantitative material:
  1: "Global heating demand is expected to decrease from current levels by 27% and\
    \ 66% by 2050 and 2100, respectively. Cooling demand is expected to increase by\
    \ 176% and 286% respectively. Direct residential emissions are almost eliminated\
    \ by 2100 in a 2\xB0C scenario."
  4: Projected global renovation investments are 106.9 B$ in 2030 for Baseline and
    127.7 B$ in the 2/C14 C scenario.
  5: Contains projected annual investments in residential building envelope efficiency
    by region, depicted in billion dollars per year.
  6: "Heating demand projected to decrease by 18% in 2050 and 53% in 2100 in the 2\xB0\
    C scenario; cooling demand expected to increase by 176% and 286% respectively."
  8: Final energy and direct emissions for heating and cooling are decomposed for
    the mitigation effect of insulation in new buildings, insulation via renovations
    of existing buildings, and improvements in heating and cooling technologies, using
    baseline and 2/C14 C scenarios from 2020 to 2050. Quantitative data is presented
    in graphs showing energy usage in exajoules (EJ/yr) and emissions in gigatonnes
    of CO2 equivalent (GtCO2eq/yr) for different global regions.
  9: "Cooling demand is expected to increase by 176% and 286% by 2050 and 2100 respectively\
    \ in the 2\xB0C scenario."
  10: Households could produce 8 EJ/yr of electricity in 2050, increasing to 40 EJ/yr
    in 2100 in the mitigation scenario. Insulation investments approximately double
    aggregate building envelope efficiency compared to today.
