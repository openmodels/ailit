    Methodology: "using a multinomial logit function. Regional climate characteristics
    affect both the techno-economic parameters of insulation levels, as well as heating/cooling
    costs which were assumed to be a prime motivator for investing in insulation.
    [...] These supply curves allow for a household investment decision to either
    buy electricity from the grid or invest in a PV system. A multinomial logit equation
    was used to determine the share of residential electricity demand, which was met
    by rooftop PV, by comparing the marginal PV levelized cost with the cost of grid-based
    electricity."


    Methodology: "The scenarios used in this study are outlined in Table 1. The updated
    implementation of the SSP2 baseline from the IMAGE 3.2 model was used as the reference
    scenario... The 2/C14 C scenario follows an emission price projection... applied
    globally which results in a cost-effective pathway meeting an emission budget
    consistent with a 2/C14 C global mean temperature increase."


    Drivers of Risk: "Finally, in climate policy scenarios where a price was attached
    to the emitted CO2, the fuel costs for heating and cooling increases."


    Highlights: "Accordingly, these additional costs increase the competitiveness
    of higher insulation levels due to their lower heating/cooling demands. [...]
    Thus, investing in rooftop PV benefits from larger households, locations with
    higher irradiation, higher electricity demand, relatively higher costs of grid-based
    electricity, and lower discount rates enjoyed by wealthier households."

