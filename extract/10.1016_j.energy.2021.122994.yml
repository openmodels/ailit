    - "TIMER-REMG was ultimately calibrated to reflect historic (1971e2018) data on
    final regional residential final energy demand [43]. Additionally, floorspace,
    household size, appliance and air-conditioning ownership, and heating fuel demand
    are calibrated for each region and income level, subject to data availability
    [22]."

    - "Our reported results for current building stock age profile and thermal efficiency
    are in line with other similar studies [9,10]. Concerning the projections of heating
    and cooling demand, and the potential to reduce them, our results are broadly
    in line with other global modelling studies which show that this energy demand
    can be reduced from current levels through the use of advanced technologies."

    - "The conclusion that decarbonization of the residential sectors depends on a
    synergistic use of both improvements in thermal insulation and technological improvements
    in heating and cooling..."

    - "These studies also concur with our observation that the extent of required
    insulation improvements depends a lot on local climate characteristics, with warmer
    regions not benefiting significantly from marginal improvements."

