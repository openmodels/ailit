Methodology:
  1: Uses a regional energy system model with explicit representation of residential
    energy use and building stocks to explore long-term decarbonization pathways.
  2: The analysis uses an updated version of the TIMER energy system model, which
    is a recursive dynamic energy model representing the global energy system and
    projects energy supply, conversion, and demand with emphasis on socio-economic,
    building stock, and climatic factors.
  4: The study uses the IMAGE model and analyzes scenarios with different carbon prices
    and insulation choices.
  5: The study projects heating and cooling demand based on climate characteristics
    and socio-economic factors like income and floorspace, under Baseline and 2/C14
    C scenarios.
  6: Uses Baseline and 2/C14 C scenarios to project final energy demand for heating
    and cooling, and associated emissions, out to 2100.
  7: Uses an updated version of the TIMER-REMG model within the IMAGE Integrated Assessment
    Model (IAM) framework to simulate residential sector dynamics.
  8: Analysis is based on historic regional energy demand data calibrated in the TIMER-REMG
    model, integrating building stock, insulation, and technological change impacts.
  9: Utilizes TIMER-REMG model for understanding mitigation strategies and assessing
    energy and emissions implications. Analysis based on 'no policy' baseline and
    2/14C target scenario with globally uniform GHG pricing.
