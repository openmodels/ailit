Highlights:
  1: Direct residential emissions are almost eliminated by 2100 through increased
    envelope efficiency and advanced heating technologies.
  2: The study investigates the interplay between building envelope efficiency improvement,
    heating/cooling technology choice, and investment in rooftop PV within the residential
    sector, highlighting synergies and trade-offs in mitigation strategies.
  5: Cooling demand is projected to increase across all regions, particularly in Asia,
    the Middle East and Africa, and Latin America, due to increasing incomes and floorspace
    leading to increased air conditioning use.
  6: Emission prices significantly reduce heating and cooling demand through building
    efficiency improvements and fuel switching. Heating demand decreases significantly
    in the 2/C14 C scenario, while cooling demand increases, but less than it would
    without climate policy. Direct emissions drop to near zero in the 2/C14 C scenario
    due to electrification of heating.
  7: Investments in building envelope efficiency and heating/cooling technologies
    contribute to emission reductions and energy demand reduction, especially in certain
    global regions.
  8: Complete decarbonization of residential sectors is possible, driven by electrification
    and electricity supply decarbonization coupled with insulation and technology
    enhancements.
  9: Investments in building insulation and efficient building envelopes play a critical
    role in reducing energy demand and emissions for residential heating and cooling.
  10: Improved heating/cooling efficiency and building envelope efficiency are key
    to reducing emissions, with significant benefits in colder and poorer regions.
