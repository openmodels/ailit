  12: "We use the estimated MMTs, a measure for human heat adaptation in cities, as\
    \ a threshold to determine critical heat exposure that exceeds the MMTs and thus\
    \ also the long-term acquired heat adaptation among the city population. We count\
    \ the annual number of days that show a daily mean apparent temperature (ATmean)\
    \ exceeding the MMT as adaptation measure. We do so for each year and city within\
    \ the historic exposure reference period 1991\u20132000 and use the city-specific\
    \ MMTs that are valid around the year 2000 as threshold. We calculate the mean\
    \ number of exposure days (EXD) over the historic decade for each city. We repeat\
    \ the procedure likewise for each year within the future exposure period 2090\u2013\
    2099 and each city under each of the four RCPs. For the future evaluation of EXD\
    \ we employ the respective city-specific MMTs as thresholds that are valid around\
    \ the year 2100. The choice of MMT sets that could be used as thresholds was determined\
    \ by the RCP setting of the future decadal climate data. We derive the delta changes\
    \ in EXD (/Delta1EXD) for each city by subtracting the city-specific decadal mean\
    \ EXD in 1991\u20132000 from the city-specific mean EXD in 2090\u20132099 under\
    \ the 15 different RCP/SSP setups."
