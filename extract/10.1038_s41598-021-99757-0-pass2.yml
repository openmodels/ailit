Drivers of Risk:
  1: Future climate trajectories, socio-economic development, and scenarios like RCP8.5
    impact health risks due to heat exposure.
  2: The drivers of risk include changes in temperature (frequency and magnitude of
    exceedance of the Maximum Mortality Temperature (MMT)), and socio-economic pathways
    (SSPs) influencing adaptation.
  3: Focus is on changes in exceedance days and magnitude related to climate scenarios
    (RCP/SSP).
  4: The changes in adaptation and exposure are driven by variations in climate scenarios
    (e.g., RCPs) and socio-economic pathways (e.g., SSPs).
  5: Changes in climate variables (specifically 30-year mean temperature and 30-year
    mean amplitude) drive changes in /Delta1MMT, particularly under RCP8.5/SSP5. Socio-economic
    factors like GDP/capita also play a role, especially in a sustainable future (RCP2.6/SSP1).
  6: The drivers of risk are changes in climate variables under different scenarios
    (RCP2.6/SSP1 and RCP8.5/SSP5), specifically looking at extreme heat (EXD) and
    temperature magnitude (MAG).
  7: The drivers of risk are different climate change scenarios (RCP2.6/SSP1 and RCP8.5/SSP5)
    leading to changes in extreme degree days (EXD) and maximum average growth (MAG),
    two measures of heat exposure.
  8: Heat exposure magnitude changes in major cities worldwide.
  9: The drivers of risk are climate trajectories (RCPs) and socio-economic pathways
    (SSPs), specifically focusing on RCP2.6/SSP1 (minimum forcing, sustainable socio-economic)
    and RCP8.5/SSP5 (high forcing, rapid fossil-fuel based growth).
  10: Increased heat exposure due to climate change under scenarios such as RCP8.5/SSP5,
    and socio-economic development influences heat adaptation.
  11: Changes in daily mean apparent temperature (AT) and socio-economic factors like
    GDP/capita are used to estimate future MMTs and assess mortality risks.
  12: The primary driver of risk is daily mean apparent temperature (ATmean) exceeding
    the MMT, which is used as a threshold representing long-term heat adaptation.
    Future changes in temperature are modeled using RCP/SSP scenarios.
  13: The page refers to temperature-related mortality impacts in relation to climate
    change.
Evaluation overview:
  1: The paper evaluates future heat-related mortality using changes in Minimum Mortality
    Temperatures (MMT) across urban populations globally.
  2: This paper evaluates heat-related mortality outcomes in urban populations.
  3: No explicit overview of outcomes like mortality or productivity loss is provided.
  4: The paper provides an overview of adaptation and exposure changes in urban settings
    due to socio-economic pathways and climate scenarios from 1991-2000 to 2090-2099.
  6: This paper evaluates changes in adaptation until 2100, focusing on Excess Days
    (EXD) and Magnitude (MAG) changes as outcomes.
  7: This analysis evaluates changes in heat exposure frequency in major cities worldwide.
  9: This paper evaluates heat exposure in cities.
  10: The paper evaluates future heat-related mortality and heat adaptation in urban
    populations under different socio-economic and climate scenarios.
  11: The analysis estimates minimum mortality temperatures (MMTs) for historical
    and future periods to evaluate mortality risks due to temperature extremes.
  12: The study evaluates critical heat exposure in cities by counting the annual
    number of days that daily mean apparent temperature exceeds a measure of human
    heat adaptation (MMT). It also looks at the magnitude of exceedance.
  13: The page mentions the evolution of minimum mortality temperatures as an indicator
    of heat adaptation.
Highlights:
  1: "Adaptation can mitigate negative health effects, but is highly scenario-dependent;\
    \ high economic growth is needed for MMT increases under RCP8.5, whereas a 2\xB0\
    C-compatible trajectory requires less economic growth pressure for risk reductions."
  2: The study provides a spectrum of future adaptation and exposure outcomes depending
    on climate trajectories and socio-economic developments. It identifies the influences
    of adaptation change for beneficial (economic growth) but contrasting (climate
    trajectory) scenarios. Higher forcing levels amplify heat exposure frequency and
    magnitude, even with increased adaptation.
  3: "Includes data on mean exceedance days and magnitude for 2090\u20132099 and their\
    \ changes from 1991\u20132000."
  4: Key outcomes include contrasting projections for high socio-economic scenarios
    (SSP5 and SSP1) under different climate conditions, with significant adaptation
    gains in urban areas, particularly in the northern hemisphere.
  5: In a fossil-fuel-based future (RCP8.5/SSP5), physiological acclimatisation is
    a strong driver of adaptation to heat. In a sustainable future (RCP2.6/SSP1),
    wealth gain is the primary contributor to heat adaptation. RCP8.5/SSP5 yields
    more extreme EXD changes than the sustainable scenario.
  6: "Under RCP8.5/SSP5, many cities will experience increased EXD and MAG, while\
    \ under RCP2.6/SSP1, some cities may experience reductions in EXD. Cities in the\
    \ Sahel, the Middle East into Pakistan and India, in northern and southern Africa,\
    \ in the Southwestern USA and in northern Mexico show high increments in /Delta1MAG\
    \ (+ 2\_C to +6\_C) until 2090\u20132099."
  7: Higher forcing (RCP8.5/SSP5) leads to a substantial worsening of heat exposure
    compared to RCP2.6/SSP1. Cities in the Middle East, Pakistan, parts of the USA,
    and northern Mexico are projected to have high increases in heat exposure and
    small adaptation increments. Some Asian and African cities might be prone to increases
    in mortality until 2100 due to high heat exposure and low adaptation.
  8: The analysis covers 3820 cities worldwide, assessing changes in adaptation and
    heat exposure for scenarios RCP2.6/SSP1 and RCP8.5/SSP5 until 2100.
  9: RCP2.6/SSP1 is beneficial for urban populations' health, achieving moderate adaptation
    levels without amplifying climate change, outperforming RCP8.5/SSP5 in exposure
    decline until 2100. Cities in arid and semi-arid climates are particularly endangered
    in the RCP8.5/SSP5 scenario, with small adaptation gains and increased heat exposure.
  10: Heat adaptation and exposure must be jointly assessed; sustainable economic
    growth aids adaptation while high forcing increases heat-related mortality.
  12: "The study derives delta changes in EXD (/Delta1EXD) and MAG (/Delta1MAG) for\
    \ each city under 15 different RCP/SSP setups, by subtracting the city-specific\
    \ decadal mean EXD/MAG in 1991\u20132000 from the city-specific mean EXD/MAG in\
    \ 2090\u20132099."
  13: The study addresses temperature-related mortality impacts and the role of socioeconomic
    pathways in urban heat challenges.
Methodology:
  1: The analysis models changes in MMT as a function of climate change and socio-economic
    progress, considering physiological and socio-economic adaptation mechanisms.
  2: The analysis combines four Representative Concentration Pathways (RCPs) from
    Global Circulation Models (GCMs) with five socio-economic pathways (SSPs). It
    considers the long-term ensemble mean (ENSMEAN) of each RCP and SSP. The time
    horizon is until 2100, with exposure parameters (EXD and MAG) evaluated for the
    decades 1991-2000 and 2090-2099.
  3: "Analysis considers RCP/SSP combinations with results applicable for the periods\
    \ 1991\u20132000 and 2090\u20132099."
  4: The analysis uses combinations of climate scenarios (RCPs) and socio-economic
    pathways (SSPs) to assess adaptation and exposure across a sample of cities using
    GDP per capita and temperature change projections.
  5: The analysis uses RCP2.6/SSP1 and RCP8.5/SSP5 scenarios to project changes until
    2100 (or 2090-2099 for exposure parameters). The map in Figure 3 was created in
    R using the tmap package.
  6: The analysis uses RCP2.6/SSP1 and RCP8.5/SSP5 scenarios to project changes in
    EXD and MAG until 2100, with results presented for specific cities and regions.
    The map in Figure 4 was created in R (version 3.6.2) using the tmap package (version
    2.3-2).
  7: The analysis uses R (version 3.6.2) with the tmap package (version 2.3-2) to
    create maps of changes in heat exposure frequency. It projects changes in heat
    exposure until 2100, comparing the periods 1991-2000 to 2090-2099 under two different
    climate scenarios.
  9: "The approach presented here takes stock of urban populations\u2019 adaptation\
    \ and exposure to heat in 3820 cities across the globe for the full spectrum of\
    \ climate trajectories and socio-economic pathways. The analysis spans from 1991-2000\
    \ to 2090-2099."
  10: The analysis uses locally-extended SSPs and RCPs, CMIP5 GCM data, and proposes
    a functional relationship for changes in heat exposure and mortality.
  11: The analysis employs a generalized multivariate non-linear model calibrated
    with climate, topographic, and socio-economic data to estimate MMTs for cities
    across various climate zones, making projections for the years 2000 and 2100.
  12: The study uses estimated MMTs as thresholds to determine critical heat exposure
    in 3,820 cities. It counts the number of days ATmean exceeds the MMT. It compares
    EXD and MAG between a historical period (1991-2000) and a future period (2090-2099)
    under different RCP/SSP combinations. The MMT thresholds for the future are selected
    based on the RCP setting of the climate data. Calculations are performed in R.
  13: The paper utilizes concepts such as minimum mortality temperatures and shared
    socioeconomic pathways.
More Notes:
  2: The study uses MMT as a measure of adaptation to heat, with a positive change
    in MMT indicating a gain in adaptation. Exposure is measured as the frequency
    and magnitude of daily temperature exceeding MMT.
  4: The paper emphasizes the relationship between GDP growth and adaptation potential,
    with higher GDP/capita enabling better adaptation but not necessarily mitigating
    heat-related risks entirely.
  6: The paper emphasizes the disparity in future exposure between the two scenario
    combinations, highlighting which cities will be most affected under each scenario.
  10: The study assumes instantaneous heat adaptation enabled by socio-economic standards
    and suggests sustainable scenarios to limit future heat exposure.
  13: "The authors acknowledge support from the Potsdam Graduate School and discussions\
    \ with M.K.B. L\xFCdeke."
Quantitative material:
  1: By 2100, the risk to human health due to heat is expected to decline in 60% to
    80% of the evaluated cities compared to contemporary conditions.
  2: "Projected MMT changes from 2000-2100 (/Delta1MMT), changes in frequency of heat\
    \ exposure (/Delta1EXD), changes in exposure magnitude (/Delta1MAG) are quantified\
    \ for 3820 cities worldwide under different RCP/SSP combinations. The highest\
    \ change in mean adaptation is a mean /Delta1MMT of 7.9 \xB0C, reached by RCP8.5/SSP5,\
    \ yielding the highest absolute mean MMT for the city sample, 34.4 \xB0C. The\
    \ lowest mean /Delta1MMT (3.7 \xB0C) and the lowest absolute mean MMT (30.2 \xB0\
    C) are displayed for RCPs 4.5 with SSP3."
  3: Quantitative information presented regarding exceedance days and temperature
    magnitude changes under various scenarios.
  4: Quantitative information includes projections of GDP per capita for different
    SSPs by 2100, maximum mean monthly temperature (MMT) changes, and adaptation gains
    in degrees Celsius for specific cities.
  5: "EXD reductions until 2090-2099 are largest with -140 EXD in the Chilean city\
    \ Antofagasta, in Mossor\xF3 (Brazil, /Delta1EXD - 128), Coquimbo and La Serena\
    \ (Chile) with /Delta1EXD of -98 EXD in RCP2.6/SSP1. The maximum increase in EXD\
    \ is projected for Jhang Maghiana (Pakistan, /Delta1EXD + 40). In RCP8.5/SSP5,\
    \ the largest /Delta1EXDs reductions are \u2212 185 EXD in Antofagasta (Chile),\
    \ \u2212 149 EXD in Coquimbo and La Serena (Chile). The maximum EXD increase for\
    \ this scenario is a /Delta1EXD of + 92 EXD in Ciudad Obreg\xF3n (Mexico)."
  6: "The paper provides quantitative information on changes in EXD and MAG in various\
    \ cities under different scenarios, including specific values for Delta1EXD and\
    \ Delta1MAG. For example, in RCP8.5/SSP5, some cities will have to cope with 50\
    \ to 92 additional EXD until 2090\u20132099; Chishtian Mandi has a /Delta1MAG\
    \ + 1.9\_C."
  7: The paper projects that under RCP8.5/SSP5, 1150 (30%) cities will experience
    additional EXD, and 1459 (38%) a larger MAG. For RCP2.6/SSP1, only 224 (6%) cities
    will face additional EXD and 338 (9%) a higher MAG. It also states that 705 (18%)
    cities will face more than one fourth of the year being EXD and 185 (5%) cities
    half the year being EXD under RCP8.5/SSP5.
  8: Number and share of cities affected by changes in exposure; Table 1 provides
    data such as reduction in extreme heat days (EXD), increase in EXD, and temperature
    magnitude (MAG) changes under different RCP/SSP scenarios.
  9: In a RCP8.5/SSP5 future, 5.1 times as many cities will face more frequent heat
    exposures and 4.3 times as many will experience higher exposure magnitudes than
    in RCP2.6/SSP1.
  12: The study calculates the mean number of exposure days (EXD) over the historic
    (1991-2000) and future (2090-2099) periods, as well as the delta change in EXD
    (/Delta1EXD). It also computes the annual mean exceedance magnitude (MAG) and
    its delta change (/Delta1MAG).
sourcematerial:
  1: "yaml\nEvaluation overview: \"When inferring on the magnitude of future heat-related\
    \ mortality due to climate change, human adaptation to heat should be accounted\
    \ for. We model long-term changes in minimum mortality temperatures (MMT), a well-established\
    \ metric denoting the lowest risk of heat-related mortality, as a function of\
    \ climate change and socio-economic progress across 3820 cities.\"\nDrivers of\
    \ Risk: \"Depending on the combination of climate trajectories and socio-economic\
    \ pathways evaluated, by 2100 the risk to human health is expected to decline\
    \ in 60% to 80% of the cities against contemporary conditions. This is caused\
    \ by an average global increase in MMTs driven by long-term human acclimatisation\
    \ to future climatic conditions and economic development of countries.\"\nQuantitative\
    \ material: \"Depending on the combination of climate trajectories and socio-economic\
    \ pathways evaluated, by 2100 the risk to human health is expected to decline\
    \ in 60% to 80% of the cities against contemporary conditions.\"\nMethodology:\
    \ \"We model long-term changes in minimum mortality temperatures (MMT), a well-established\
    \ metric denoting the lowest risk of heat-related mortality, as a function of\
    \ climate change and socio-economic progress across 3820 cities...In our understanding,\
    \ both aspects, physiological acclimatisation and a socio-economic standard facilitating\
    \ the access to technological, social or behavioural measures to avoid heat exposure\
    \ are jointly considered in the MMT20.\"\nHighlights: \"While our adaptation model\
    \ suggests that negative effects on health from global warming can broadly be\
    \ kept in check, the trade-offs are highly contingent to the scenario path and\
    \ location-specific. For high-forcing climate scenarios (e.g. RCP8.5) the maintenance\
    \ of uninterrupted high economic growth by 2100 is a hard requirement to increase\
    \ MMTs and level-off the negative health effects from additional scenario-driven\
    \ heat exposure. Choosing a 2                         \xB0C-compatible climate\
    \ trajectory alleviates the dependence on fast growth, leaving room for a sustainable\
    \ economy, and leads to higher reductions of mortality risk.\"\n"
  2: "yaml\nEvaluation overview: \"This work shows which benefits and detriments these\
    \ futures have in store concerning heat-related mortality until 2100.\"\nDrivers\
    \ of Risk: \"The exposure is measured as (1)\_frequency of MMT exceedance by the\
    \ daily temperature and (2)\_magnitude of this exceedance. ... Our analysis considers\
    \ four possible Representative Concentration Pathways (RCPs)24 from four Global\
    \ Circulation Models (GCMs). We combine these different climate futures with five\
    \ pos-sible socio-economic pathways (SSPs) 25,26 leant on the Scenario Matrix26,27.\"\
    \nQuantitative material: \"The projected MMT and its 2000\u20132100 change, /Delta1MMT,\
    \ were contextualised with the change in two heat exposure parameters: (1)\_ the\
    \ frequency of heat exposure (EXD) and (2)\_ the exposure magnitude (MAG). ...\
    \ For the city sample, the highest change in mean adaptation across all scenario\
    \ combinations is a mean /Delta1MMT of 7.9 \_\xB0C, which is reached by RCP8.5/SSP5,\
    \ the highest forcing level and the most rapid unsustainable economic growth.\
    \ This also yields the highest absolute mean MMT for the city sample, 34.4 \_\xB0\
    C. ... The lowest mean /Delta1MMT (3.7 \_\xB0C) and the lowest absolute mean MMT\
    \ (30.2 \_\xB0C) are displayed for RCPs 4.5 with SSP3.\"\nMethodology: \"Our analysis\
    \ considers four possible Representative Concentration Pathways (RCPs)24 from\
    \ four Global Circulation Models (GCMs). We combine these different climate futures\
    \ with five pos-sible socio-economic pathways (SSPs) 25,26 leant on the Scenario\
    \ Matrix26,27. ... We considered feasible combinations of the long-term ensemble\
    \ mean (ENSMEAN) of each RCP and the SSPs. ... We used the 1991\u20132000 and\
    \ 2090\u20132099 decadal means of EXD and MAG.\"\nHighlights: \"For the first\
    \ time, we offer the full spectrum of future adaptation and exposure outcomes\
    \ and their future changes depending on the underlying climate trajectories and\
    \ socio-economic developments. ... It is our objective to determine the lesser\
    \ of two evils regarding the change in mortality against an ideal future in absence\
    \ of climate change and heat exposure. ... Even though increasing forcing levels\
    \ achieve higher adaptation and larger adaptation rates until 2100, they amplify\
    \ heat exposure frequency and magnitude.\"\nMore Notes: \"We understand a positive\
    \ change in MMT as gain in adaptation. The exposure is measured as (1)\_frequency\
    \ of MMT exceedance by the daily temperature and (2)\_magnitude of this exceedance.\"\
    \n"
