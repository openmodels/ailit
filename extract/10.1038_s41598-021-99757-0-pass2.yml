    \ multivariate non-linear model... This allows for spatially and temporally flexible\
    \ model application.\"\n\"The newly calibrated model and the new coefficients\
    \ were used to estimate the MMTs for the historic situation in 2000, employing\
    \ the computed ENSMEAN long-term climate variables for 1965\u20131995 for each\
