    Quantitative information includes projections of GDP per capita for different\
    \ SSPs by 2100, maximum mean monthly temperature (MMT) changes, and adaptation\
    \ gains in degrees Celsius for specific cities.\"\nMethodology: \"The analysis\
    \ uses combinations of climate scenarios (RCPs) and socio-economic pathways (SSPs)\
    \ to assess adaptation and exposure across a sample of cities using GDP per capita\
    \ and temperature change projections.\"\nHighlights: \"Key outcomes include contrasting\
    \ projections for high socio-economic scenarios (SSP5 and SSP1) under different\
    \ climate conditions, with significant adaptation gains in urban areas, particularly\
    \ in the northern hemisphere.\"\nMore Notes: \"The paper emphasizes the relationship\
