    \ better adaptation but not necessarily mitigating heat-related risks entirely.\"\
    \nSource material: \"Systematic over view of the change in adaptation and exposure\
    \ for the city sample according to each RCP/SSP combination and the future socio-economic\
    \ level per SSP. Lower panel: The 1991\u20132000 to 2090\u20132099/Delta1EXD (orange\
    \ boxes) in context of /Delta1MMT (in-graph text annotations) for all possible\
    \ RCP/SSP combinations. RCPs according to SSP1 SSP2 SSP3 SSP4 SSP5 Sustainability\
    \ Middle of the road Regional Rivalry Inequality Fossil fuel development Shared\
    \ Socioeconomic Pathwa ys Upper panel: Unique countr y-based GDP/capita per SSP\
    \ in 2100 (mean from IIASA and OECD data). Green line in upper panel denotes the\
    \ countr y-based GDP/capita as of 2000 [in 2011 int.$]. ... a /Delta1MMT of 13\
    \ \u25E6 C in R\xE2mnicu V\xE2lcea (Romania), followed by Ostrava (Czech Republic,\
    \ 12.9 \u25E6 C), Piatra Neamt and Olomouc (Romania and Czech Republic, 12.8\u25E6\
    \ C), and Kislovodsk and Uhta (Rus sia, 12.7 \u25E6 C). SSP5 combinations, excluding\
    \ that with RCP8.5, show high socio-economic levels across the cities and perform\
    \ well concerning exposure reductions and high future MMTs. Hence, a large projected\
    \ GDP/capita is an advantageous precondition for high adaptation. For our city\
    \ sample, SSP5 generates the highest future mean countr y-based GDP/capita (Int$\_\
    101\_205) compared to the beginning of the centur y (Int$\_9\_849). The 2100 GDP/\
    \ capita related to SSP1 is less, but still comparatively high (Int$\_63\_346).\
    \ This suggests a high GDP/capita does not automatically lead to a better bearable\
    \ situation regarding future heat and its related mortality for urban populations.\"\
    \n"
