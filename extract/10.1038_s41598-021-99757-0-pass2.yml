  6: "The global perspective on /Delta1EXD shows prominent differences between the\
    \ two highlighted scenario combinations in southern European, North American,\
    \ Subsaharan, Indian, and East Asian cities, (Fig.\_5). Here, in RCP2.6/SSP1,\
    \ the negative /Delta1EXDs cause reduced future EXD (\u2212 50 to 0 EXD) (Fig.\
    \ 5a). In RCP8.5/SSP5, the positive /Delta1EXDs will yield additional EXDs (0\u2013\
    50 EXD) in those cities until 2090\u20132099... In terms of /Delta1\u25E6MAG in\
    \ the sustainable scenario, the largest MAG decreases concern Copiap\xF3 (Chile)\
    \ with a \u25E6/Delta1MAG of \u2212 3.5\_C\_... Generally, for RCP2.6/SSP1 we\
    \ record a /Delta1MAG between \u2212 2 and 0\_\u25E6C\_for most cities... The\
    \ mean of the RCP8.5/SSP5 /Delta1MAG across the cities is still higher and positive...\
    \ Maximum /Delta1MAG increments are observed in Bechar (Algeria, /Delta1MAG +\
    \ 5.4\_C\_)... Mainly cities in the Sahel, the Middle East into Pakistan and India,\
    \ in northern and southern Africa, in the Southwestern USA and in northern Mexico\
    \ show high increments in /Delta1MAG (+ 2\_C\_to +6\_C\_) until 2090\u20132099.\
    \ Some severely exposed cities would profit from MAG reductions in RCP2.6/SSP1\
    \ instead (Fig. 6a,b)... In a RCP8.5/SSP5 future, a total of 2285 (60%) cities\
    \ in our sample will profit from an EXD reduction. Map created in R (version 3.6.2)\
    \ using the tmap package (version 2.3-2)."
  7: "Source material: Changes in future heat exposure frequency in major cities worldwide\
    \ until 2100. /Delta1EXD 1991\u20132000 to 2090\u20132099 in case of RCP2.6/SSP1\
    \ (a ) and in case of RCP8.5/SSP5 (b ). (Map created in R (version 3.6.2)28 using\
    \ the tmap package (version 2.3-2)29). Still, 1150 (30%) cities will experience\
    \ additional EXD and 1459 (38%) a larger MAG. Only 224 (6%) cities will face additional\
    \ EXD and 338 (9%) a higher MAG. 705 (18%) cities will face more than one fourth\
    \ of the year being EXD and 185 (5%) cities half the year being EXD. RCP8.5/SSP5\
    \ signifies a substantial worsening of prospects because positive wealth effects\
    \ on adaptation are likely annihilated. High increases in heat exposure also coincide\
    \ with small /Delta1MMTs in these regions (Fig.\_ 7). Such circumstances are obvious\
    \ in Asian cities at the tip of the distribution in RCP2.6/SSP1, and in Asian\
    \ and African cities in RCP8.5/SSP5 (Fig.\_ 7). This suggests these cities might\
    \ be prone to increases in mortality until 2100."
