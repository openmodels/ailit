  10: "Source material here.\nample, the US and China are no longer the most drought-affected\
    \ countries, while 100% of the population and GDP in the Mexico, southern Europe,\
    \ central and southern Africa, and Mediterranean regions (i.e., Turkey, Ukraine)\
    \ are projected to experience more severe drought, suggesting large policy challenges\
    \ there. To illustrate the consequences of limiting warming to 2.0\u25E6C above\
    \ the preindustrial levels, we also calculate the socioeconomic exposures under\
    \ three SSPs (Fig.10) and the differences in percentage between the 1.5 and 2.0\u25E6\
    C warming levels (Fig. S2). Most regions of the globe are projected to exhibit\
    \ a generally increasing fraction (relative to 1.5\u25E6C warming) in populations\
    \ and GDPs (except for central Africa and East Asia). To be specific, under the\
    \ extra half-degree warming, an additional 17 countries are projected to exhibit\
    \ a 100% fraction in socioeconomic exposure. More than 10 countries would experience\
    \ a 30% increase in population and GDP exposure if the global warming level increased\
    \ from 1.5 to 2.0\u25E6C. These increases illustrate the benefit of holding global\
    \ warming to 1.5\u25E6C instead of 2\u25E6C, particularly for the mitigation of\
    \ population and GDP exposure to drought. It should be noted that when climate\
    \ warming climbs from 1.5 to 2.0\u25E6C, there is some spatial heterogeneity with\
    \ regards to drought exposure variations. Specifically, drought exposures for\
    \ some countries (i.e., Canada) can be slightly decreased in the 2\u25E6C warming\
    \ level compared to the 1.5\u25E6C warming level. This decrease in population\
    \ and GDP exposure fraction can be attributed to the decreasing land fraction\
    \ exposure to more frequent droughts (Table S2). For example, the land fraction\
    \ suffering more frequent severe droughts in Canada will decrease (\u221212.77%)\
    \ in the 2.0\u25E6C warming level compared to 1.5\u25E6C warming under the SSP126\
    \ scenario. In other words, the additional 0.5\u25E6C warming will not lead to\
    \ drought risk deterioration globally, partly due to the increasing column-precipitable\
    \ water with a warming environment, although it holds for the majority of global\
    \ land masses. Anyway, the spatial heterogeneity should be given attention, especially\
    \ when assessing the climate change impacts on extreme events at regional or local\
    \ scales.\n"
  11: "Source material here.\nThe large spatial variability of drought risks and socioeconomic\
    \ exposures under climate warming motivates a more systematic and in-depth assessment\
    \ on national scales, particularly for the countries vulnerable to droughts.\n\
    \nThe land fractions of each grid cell are binned and plotted against the change\
    \ in drought return period (relative to historical 50-year drought) (Figs. 11\
    \ and 12). In a 1.5\u25E6C warming world (Fig. 11), these spatially aggregated\
    \ changes explicitly show a significant increase in drought risks over these hotspot\
    \ countries, with more than 90% of grid cells projected to suffer from more frequent\
    \ droughts.\n\nFor instance, in a 1.5\u25E6C warming world, more than 85% of the\
    \ grid cells (associated with around 65%\u201397% of the national populations\
    \ and GDPs) over Mexico and Brazil could be exposed to the historical 50-year\
    \ drought every 20 years. \n\nThis pronounced increase in drought risks over tropical\
    \ countries may be attributed to an oceanic forcing that favors the formation\
    \ of deep convection over the ocean and thus weakened the continental convergence\
    \ associated with the monsoon.\n"
  12: "Source material: Overall, increasing drought risks under warming climates can\
    \ cause major challenges for sustainable development and existing infrastructure\
    \ systems, while ambitiously limiting warming to 1.5\xB0C would substantially\
    \ mitigate future drought risks and corresponding socioeconomic exposures. More\
    \ than 90% of the grid cells (associated with around 90%\u2013100% of the national\
    \ population and GDP) across Brazil and Mexico will experience drought frequency\
    \ double that of the historical 50-year drought. The reference crop Penman\u2013\
    Monteith model is employed to calculate potential evapotranspiration (and thus\
    \ SPEI) in the current study. In this process, surface resistance (rs) is fixed\
    \ to 70 s m\u22121."
  13: "Source material: In the run theory, once the threshold (e.g.,\u22120.5) is\
    \ de- termined, drought events with different severity magnitudes are identi\uFB01\
    ed and constitute a sample for the selected time period... Though the impact of\
    \ rs on the drought assessments deserves further studies, it is beyond the scope\
    \ of this study. Therefore, the traditional \uFB01xed rs method is used to calculate\
    \ potential evapotranspiration. Figures 14 and 15 show comparisons of projected\
    \ changes in joint 50-year return periods of droughts between using\u22120.8 and\u2212\
    0.5 as the thresholds under different warming levels."
