Highlights:
  1: "Limiting global warming to 1.5\xB0C compared to 2\xB0C can significantly mitigate\
    \ drought impacts; the results anticipate additional adverse conditions affecting\
    \ more countries as warming approaches 2\xB0C."
  3: The study systematically investigates changes in the bivariate return period
    with global warming and assesses the drought exposures of populations and regional
    GDP under different SSPs globally.
  4: No relevant information
  5: Jointly models drought duration and severity using a copula function. Uses the
    most likely realization method to identify the most probable drought scenarios
    for a given return period.
  6: Drought conditions are projected to worsen with increased warming, particularly
    in areas like South America, Australia, and northern Africa; socioeconomic implications
    are recorded based on population and GDP exposure to increased drought risks.
  7: "The world will experience more severe drought conditions with a further increase\
    \ in drought severity accounting for 75% of the land surface and a persistent\
    \ lengthening in duration across 58% of the land areas when the global temperature\
    \ rises from 1.5 to 2.0\xB0C warming."
  8: Historical 50-year droughts are projected to occur more frequently with warming,
    with significant increases in recurrence frequency projected for large parts of
    Europe, the southern United States, central and western Asia, and Northwest China.
  9: Large percentages of population and GDP will be exposed to increasing drought
    risks globally.
  10: "Limiting warming to 1.5\xB0C instead of 2\xB0C has benefits for mitigating\
    \ population and GDP exposure to drought. Some countries (e.g., Canada) may experience\
    \ slightly decreased drought exposure at 2\xB0C compared to 1.5\xB0C. Under the\
    \ extra half-degree warming, an additional 17 countries are projected to exhibit\
    \ a 100% fraction in socioeconomic exposure"
  11: The analysis demonstrates significant increases in drought risks and socioeconomic
    exposure in hotspot countries under climate warming, with more severe impacts
    observed in tropical regions.
  12: "Ambitiously limiting warming to 1.5\xB0C would substantially mitigate future\
    \ drought risks and corresponding socioeconomic exposures."
  13: The traditional fixed rs method is used to calculate potential evapotranspiration,
    even though the impact of rs on drought assessments deserves further study.
  14: Visualizations of spatial variations in projected population and economic growth
    across different regions under different SSP scenarios.
  15: Aggravated drought risks are projected globally, with more significant increases
    over mid-latitudes and tropical regions. Regions like the Mediterranean, southern
    Africa, and southern North America are identified as having large projected changes.
    Tropical and mid-latitude regions, where the vast majority of the global population
    resides, would bear the greatest drought risks.
  16: Drought risks and population/GDP both contribute to exposure change. Using fixed
    population/GDP ignores dynamic socioeconomic impacts.
  17: "The affected population and GDP will soar with increasing global temperatures.\
    \ Controlling global warming at the 1.5\xB0C level is strengthened as important.\
    \ Model uncertainty is relatively large, particularly for South America and Africa."
  18: "There is a projected prolongation of drought duration across 78% of land surfaces\
    \ and a pronounced rise in drought severity globally in a 1.5\xB0C warming world,\
    \ with further deterioration in a 2.0\xB0C warming world."
Methodology:
  1: The analysis uses a bivariate framework combining the Standardized Precipitation
    Evapotranspiration Index (SPEI) with the run theory and coupled with outputs from
    13 CMIP5 global climate models under RCP 2.6, RCP 4.5, and RCP 8.5.
  3: "The study uses a bivariate framework, incorporating copula functions to model\
    \ drought severity and duration concurrently, and investigates changes in the\
    \ bivariate return period with global warming. It employs the spatially explicit\
    \ global shared SSPs with gridded population and GDP data under five SSPs, covering\
    \ the period 2010\u20132100 at a spatial resolution of 0.5\xB0\xD70.5\xB0."
  4: "The page details the calculation of potential evapotranspiration using the Penman\u2013\
    Monteith approach, considering variables like radiation, temperature, pressure,\
    \ and wind speed."
  5: Uses the run theory to identify drought events based on SPEI-3 falling below
    -0.5. Models drought duration and severity using a Gumbel copula with Gamma marginal
    distributions. Employs the most likely realization method to select drought scenarios
    with the highest likelihood for a given joint return period (Tor). The harmonic
    mean Newton method is applied for this estimation.
  6: "Analysis employs historical 50-year bivariate quantiles and joint occurrence\
    \ frequency under future 1.5 and 2.0\xB0C warming conditions using multi-model\
    \ ensemble means for six scenarios with different SSPs and RCPs."
  7: Analysis based on changes in the Standardized Precipitation Evapotranspiration
    Index (SPEI) under different RCP scenarios. Violin plots are used to display the
    probability distribution of drought characteristics.
  8: Copula-based approach used to assess changes in drought severity and duration
    within a bivariate framework under different warming levels.
  9: "Drought projection is combined with population and GDP information based on\
    \ SSPs to estimate exposures by droughts in the 1.5\u25E6C and 2.0\u25E6C warmer\
    \ worlds. Nation-wide population and GDP fractions are employed to avoid covering\
    \ up badly drought-affected countries with small national populations or GDPs.\
    \ The fraction of drought-affected population (or GDP) divided by total national\
    \ population (or total GDP) is used as the indicator."
  10: "Compares socioeconomic exposures under three SSPs and the differences in percentage\
    \ between the 1.5 and 2.0\u25E6C warming levels."
  12: "The Penman\u2013Monteith model is used to calculate potential evapotranspiration\
    \ and SPEI, fixing surface resistance to 70 s m\u22121."
  13: Drought events are identified using a threshold (e.g., -0.5 on some index).
    Run theory is applied to characterize the distribution of different levels of
    drought. Bivariate frequency analysis is used.
  14: Projections of population and GDP distribution under different Shared Socioeconomic
    Pathways (SSPs).
  15: The study projects drought risks using different SPEI thresholds and return
    periods. Socioeconomic exposures are calculated based on variations of drought
    risks using dynamic population and GDP pathways. The analysis examines model agreement
    to assess confidence in drought projections.
  16: "The study considers dynamic changes in population and GDP between fixed 30-year\
    \ 1.5 and 2.0\xB0C warming periods to define exposure. Bivariate drought risks\
    \ were calculated."
  17: "The analysis uses multi-model ensembles under three RCPs to quantify changes\
    \ in SPEI-3. Bivariate return periods of present 50-year drought conditions are\
    \ presented for each model under RCP4.5 in a 1.5\xB0C warming world and changes\
    \ under an additional 0.5\xB0C warming. The uncertainty induced by GCMs and RCP\
    \ scenarios is also measured."
  18: The drought characteristics are identified using the SPEI combined with run
    theory, utilizing multi-model ensemble means and incorporating RCP2.6, RCP4.5,
    and RCP8.5 scenarios.
  20: The paper uses hydrological science to project drought characteristics. The
    paper appeared in Hydrology and Earth System Sciences and Hydrological Sciences
    Journal.
More Notes:
  3: The SPEI with a 3-month timescale (SPEI-3) is used in this study.
  4: The page includes a table listing 13 global climate models used in the study,
    indicating institutions and resolutions.
  7: Drought-prone conditions are projected to be more severe in regions such as Mediterranean
    regions, South Africa, and South America. The drought frequency based on SPEI-3
    is projected to pronouncedly lengthen under three RCPs. Extreme drought conditions
    are projected to occur more frequently under warming climates.
  9: The two socioeconomic factors of GDP and population are highly correlated.
  10: The US and China are no longer the most drought-affected countries, while Mexico,
    southern Europe, central and southern Africa, and the Mediterranean regions (i.e.,
    Turkey, Ukraine) are projected to experience more severe drought.
  13: The threshold value of -0.5 for identifying droughts is employed, but the sensitivity
    of the results to this threshold is assessed by comparing to a threshold of -0.8.
    The inclusion of minor drought events can enlarge the sample size in bivariate
    frequency analysis.
  14: The paper uses color-coded maps to visualize the fraction of population and
    GDP change, providing a spatial representation of exposure to droughts.
  15: The study acknowledges substantial model uncertainty in drought projections,
    particularly for regions with small changing amplitudes. The consistency between
    results using different SPEI thresholds (-0.5 and -0.8) is noted.
