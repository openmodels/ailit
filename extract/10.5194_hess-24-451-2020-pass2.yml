Quantitative material:
  1: "In a 1.5\xB0C warmer world, historical 50-year droughts may double in frequency\
    \ across 58% of global landmasses, with further increase at 2\xB0C."
  3: "The baseline period of 1976\u20132005 is used, during which the observed global\
    \ average temperature was approximately 0.46\u20130.66\xB0C warmer than pre-industrial\
    \ conditions, defined as 0.51\xB0C warming. The 1.5 and 2.0\xB0C warming targets\
    \ are determined by additional warming of 0.99 and 1.49\xB0C, respectively."
  4: No relevant information
  6: The mean SPEI-3 decreases across 85% of land areas globally; drought severity
    increases by over 50% on 46% of global landmasses; drought duration increases
    on 78% of the land surface.
  7: "Drought severity to increase by >10% over 35% of land areas when warming goes\
    \ from 1.5 to 2.0\xB0C; Drought duration to increase by >10% over only 8% of the\
    \ land areas under the same warming increase; 90% uncertainty range of drought\
    \ duration increases from 2.2\u20136.5 to 1.8\u20137.8 months under the 2.0\u25E6\
    C warming climate relative to the historical period; 90% uncertainty range of\
    \ drought severity increases from 2.1\u20136.6 to 2.0\u201312 under the 2.0\u25E6\
    C warming climate relative to the historical period."
  8: "The frequency of the historical 50-year droughts would double across 67% of\
    \ the global landmasses under the 2.0\xB0C warming level."
  9: "In more than 67 (140) countries, 100% (50%) of both populations and GDPs are\
    \ exposed to more severe droughts under the 1.5\u25E6C warming target."
  10: "Projects changes in drought duration and severity between 1.5 and 2.0\u25E6\
    C warming targets, showing spatial heterogeneity. Additional 17 countries are\
    \ projected to exhibit a 100% fraction in socioeconomic exposure under the extra\
    \ half-degree warming. More than 10 countries would experience a 30% increase\
    \ in population and GDP exposure if the global warming level increased from 1.5\
    \ to 2.0\u25E6C. The land fraction suffering more frequent severe droughts in\
    \ Canada will decrease (\u221212.77%) in the 2.0\u25E6C warming level compared\
    \ to 1.5\u25E6C warming under the SSP126 scenario."
  11: "Data indicates that more than 90% of grid cells over hotspot countries are\
    \ projected to suffer more frequent droughts; over Mexico and Brazil, more than\
    \ 85% of grid cells (and large portions of populations and GDPs) could experience\
    \ historical 50-year droughts every 20 years at 1.5\xB0C warming."
  12: "More than 90% of the grid cells across Brazil and Mexico will experience drought\
    \ frequency double that of the historical 50-year drought under the 1.5\xB0C warming\
    \ target."
  13: "Projected changes in joint 50-year return periods of droughts between the 1.5\
    \ and 2.0\u25E6C warming targets are compared using different drought thresholds\
    \ in Figs. 14 and 15."
  14: Fraction of population and GDP exposed to more frequent severe droughts; Color-coded
    maps showing fraction of change in population and GDP under different SSPs (SSP126,
    SSP245, SSP585) in 2100.
  15: The analysis projects changes in drought risks based on 50-year joint return
    periods derived from SPEI thresholds of -0.5 and -0.8. It also examines drought
    risks for 20- and 100-year drought events. Results show that 100% of the population
    in tropical regions like Brazil and Mexico would be affected by increasing drought
    risks.
  16: "Around 88% of global landmasses are projected to be exposed to increasing drought\
    \ risks under the 1.5\xB0C warming climate."
  17: "Population exposed to drought at 2.0\xB0C warming: 1538.2 million. Global GDP\
    \ exposed to drought at 2.0\xB0C warming: USD 72852.2 billion. Drought risks will\
    \ double across around 58% of the global landmasses at the 1.5\u25E6C warming\
    \ level, while the same drought risks will occur over 67% of the global landmasses\
    \ at the 2.0\u25E6C warming level. Tables specify population and GDP at 1.5 and\
    \ 2.0 degree C warming levels for SSP126, SSP245, and SSP585 scenarios."
  18: The means of SPEI-3 are projected to descend at a global scale, and the standard
    deviation is expected to increase, suggesting a shift towards more severe drying
    conditions.
sourcematerial:
  1: " \nProjected increases in magnitude and socioeconomic exposure of global droughts\
    \ in 1.5 and 2\xB0C warmer climates... more frequently and trigger intensified\
    \ socioeconomic consequences with global warming.\n\n...historical 50-year droughts\
    \ may double across 58% of global landmasses in a 1.5\xB0C warmer world, while\
    \ when the warming climbs up to 2.0\xB0C, an additional 9% of world landmasses\
    \ would be exposed.\n\n...analysis...Standardized Precipitation Evapotranspiration\
    \ Index (SPEI) combined with the run theory, with the climate scenarios projected\
    \ by 13 Coupled Model Inter-comparison Project Phase 5 (CMIP5) global climate\
    \ models...\n\n...limiting global warming to 1.5\xB0C, compared with 2\xB0C warming,\
    \ can perceptibly mitigate the drought impacts over major regions of the world.\
    \ \n"
  3: " \n\"The drought characteristics are identified using the Standardized Precipitation\
    \ Evapotranspiration Index (SPEI) combined with the run theory and with climate\
    \ scenarios simulated by 13 CMIP5 global climate models (GCMs) under three RCPs\
    \ (RCP2.6, RCP4.5, and RCP8.5).\"\n\n\"In this study, under a bivariate framework,\
    \ we quantify changes in global drought conditions and socioeconomic exposure\
    \ with additional levels of 1.5 and 2.0 \xB0C warming... Finally, the drought\
    \ exposures of populations and regional gross domestic product (GDP) under different\
    \ SSPs are assessed globally.\"\n\n\"We first select a baseline period of 1976\u2013\
    2005, during which the observed global average temperature was approximately 0.46\u2013\
    0.66 \xB0C warmer than pre-industrial conditions... and we set the warming degree\
    \ during the baseline period as 0.51 \xB0C; hence the 1.5 and 2.0 \xB0C warming\
    \ targets are determined by additional warming of 0.99 and 1.49 \xB0C, respectively.\"\
    \n\n\"To assess the exposures of populations and assets to droughts, which will\
    \ eventually lead to higher drought losses in the future, instead of using a static\
    \ socioeconomic scenario as many studies have, we employ the spatially explicit\
    \ global shared SSPs. This dataset includes gridded population and GDP data under\
    \ five SSPs, covering the period 2010\u20132100 at a spatial resolution of 0.5\xB0\
    \xD70.5\xB0.\"\n\n\"The copula functions and most likely realization are incorporated\
    \ to model the drought severity and duration concurrently, and changes in the\
    \ bivariate return period with global warming are systematically investigated.\"\
    \n\n\"The sensitivity of annual global temperature to climate variability significantly\
    \ varies in models and RCPs.\"\n\n\"The drought condition is quantified with the\
    \ SPEI... The SPEI with a 3-month timescale (SPEI-3) is used in this study because\
    \ it captures well the shallow soil moisture available to crops and reflects seasonal\
    \ water loss processes.\"\n"
  4: "The page details the calculation of potential evapotranspiration using the Penman\u2013\
    Monteith approach, considering variables like radiation, temperature, pressure,\
    \ and wind speed: \"The PET is first calculated using the Penman\u2013Monteith\
    \ approach suggested by the Food and Agriculture Organization of the United Nations\
    \ (FAO) (Allen et al., 1998):PET=0.4081(Rn\u2212G)+\u03B3900tmean+273u2(es\u2212\
    ea)1+\u03B3(1+0.34u2)\".\nThe page includes a table listing 13 global climate\
    \ models used in the study, indicating institutions and resolutions: \"Table 1.\
    \ Information about the 13 GCMs used in this study.\""
  5: "Source material here: After calculating the SPEI-3 for global terrestrial grid\
    \ cells, we derive the drought duration, intensity, and severity using the run\
    \ theory for the reference and the 1.5 and 2\u25E6C warmer worlds. The run theory\
    \ proposed by Yevjevich. (1967) is a useful and objective method for drought event\
    \ identification, where a run represents a subset of time series, in which SPEI-3\
    \ is either beneath (i.e., negative run) or over (i.e., positive run) a fixed\
    \ threshold... The widely used log-logistic distribution is employed for fitting\
    \ the 3-month deficit of precipitation and PET (P\u2212PET)... The SPEI-3 can\
    \ then be derived by standardizing the F(x) into a standard normal function...\
    \ To calculate the socioeconomic exposures by droughts in different warming environments,\
    \ we evaluate the change in drought occurrence frequency in a bivariate context...\
    \ Uses the run theory to identify drought events based on SPEI-3 falling below\
    \ -0.5. Models drought duration and severity using a Gumbel copula with Gamma\
    \ marginal distributions. Employs the most likely realization method to select\
    \ drought scenarios with the highest likelihood for a given joint return period\
    \ (Tor). The harmonic mean Newton method is applied for this estimation... In\
    \ this paper, the most likely realization method is used to choose the drought\
    \ scenario with the highest likelihood along the Tor-level isoline..."
  6: "Source material here.\n\"...we adopt this level as a reference for assessing\
    \ possible drought implications.\"\n\"Projected increases in magnitude and socioeconomic\
    \ exposure of global droughts are assessed.\"\n\"This may be attributed to higher\
    \ evaporative demands and more frequent and persistent dry spells associated with\
    \ rising temperatures.\"\n\"...SPEI-3 decreases at the global scale (across 85%\
    \ of the land areas, excluding Antarctica)...\"\n\"...drought severity shows a\
    \ much more pronounced rise globally, with significant increases (exceeding 50%)\
    \ over 46% of global landmasses...\"\n\"...the drought duration is projected to\
    \ slowly prolong with warming across 78% of the land surface...\"\n\"...we input\
    \ the determined magnitudes of the 50-year drought events into the future joint\
    \ distribution functions...multi-model ensemble mean results.\"\n\"...To explicitly\
    \ assess the drought risk changes from 1.5 to 2.0\xB0C warming climates...\"\n\
    \"Areas with a JRP lower than 50 years are projected to suffer from more severe\
    \ drought conditions...\"\n\"...we estimate the ratio of the recalculated recurrence\
    \ frequency between these two warming periods.\"\n\"...we record the population\
    \ and GDP in those areas with more severe drought conditions and define them as\
    \ exposures by increasing drought risks.\"\n"
  7: "When the global temperature rises from additional 1.5 to 2.0\u25E6C warming,\
    \ the world will experience more severe drought conditions, with a further increase\
    \ in drought severity accounting for 75% of the land surface (differences in effects\
    \ between the 1.5 and 2.0\u25E6C warming levels) and a persistent lengthening\
    \ in duration across 58% of the land areas (Fig. 5). Apparently, the drought frequency\
    \ based on SPEI-3 is also projected to pronouncedly lengthen under three RCPs,\
    \ accompanied by large variability capturing by the kernel density estimation\
    \ in Fig. 6. This rapid increasing tendency also holds true for drought duration\
    \ and severity, and extreme conditions are projected to occur more frequently\
    \ under warming climates. For example, the 90% uncertainty range of drought duration\
    \ (severity) increases from 2.2\u20136.5 to 1.8\u20137.8 months (from 2.1\u2013\
    6.6 to 2.0\u201312) under the 2.0\u25E6C warming climate relative to the historical\
    \ period. Comparing the 2.0\u25E6C to the 1.5\u25E6C warming condition, the increase\
    \ in drought severity is greater than 10% over 35% of the land areas, while only\
    \ 8% of the land areas shows such an increase (> 10%) in drought duration. This\
    \ drought-prone condition is more severe in several regions such as Mediterranean\
    \ regions, South Africa and South America, posing large challenges for existing\
    \ socio-hydrological systems there. To explicitly investigate the changes in drought\
    \ characteristics under warming conditions, we also show statistics of drought\
    \ frequency, duration and severity in the historical period and future additional\
    \ warmer worlds in violin plots (Fig. 6), in which the distributions comprise\
    \ drought characteristics across all land pixels of the multi-model ensemble mean\
    \ results. The violin plots (Hintze and Nelson, 1998) consist of a box plot inside\
    \ and an outside violin shape which displays the probability distribution of drought\
    \ characteristics. The image displays a series of global maps and line graphs\
    \ illustrating changes in the Standardized Precipitation Evapotranspiration Index\
    \ (SPEI) under various Representative Concentration Pathway (RCP) scenarios. Similar\
    \ to the changing pattern from the baseline to a 1.5\u25E6C warming climate, the\
    \ drought severity shows a more rapidly increasing rate than drought duration\
    \ globally under the 2.0\u25E6C warming world. Overall, the image communicates\
    \ potential future hydroclimatic changes under different greenhouse gas concentration\
    \ pathways, illustrating both mean and variability aspects of drier or wetter\
    \ conditions worldwide. These maps and graphs depict changes in SPEI mean and\
    \ standard deviation, representing drying and increased variability under different\
    \ RCP scenarios, with SPEI maps showing mostly negative changes indicating drier\
    \ conditions, and line graphs show how changes vary across latitudes, with larger\
    \ impacts in certain regions under each scenario."
