  18: "Source material here.\nMotivated by the 2015 Paris Agreement proposal, we quantify\
    \ the changes in global drought bivariate magnitudes and socioeconomic consequences\
    \ in the 1.5 and 2.0\u25E6C warmer worlds, with climate projected by the multi-model\
    \ ensemble under three representative concentration pathways (RCP2.6, RCP4.5,\
    \ and RCP8.5).\nNevertheless, the complex circulation system can still result\
    \ in some differences in hydro-meteorological variables (e.g., precipitation,\
    \ wind speed and relative humidity) among RCP scenarios, even at the same warming\
    \ level, because they are not linearly related to the warming temperature. Since\
    \ drought conditions are evaluated by using such hydro-meteorologicalvariables,thosedifferencesatthesamewarming\
    \ level can lead to variations in drought evolutions.\n1.The means of SPEI-3 from\
    \ the historical period to the 1.5 and 2.0\u25E6C warmer worlds are projected\
    \ to descend at a global scale, while the standard deviation exhibits large increases.AstheSPEI-3followingthenormaldistribution,\
    \ these changes suggest that the distribution of SPEI-3wouldshifttowardsthenegativesidewitha\uFB02\
    attertendency,implyingamoreseveredryingconditionina future warming world.\nThe\
    \ drought characteristics are iden- ti\uFB01ed using the SPEI combined with the\
    \ run theory, and the changesinoccurrencearemeasuredbybothdroughtduration and\
    \ severity, with the incorporation of the copula functions andmostlikelyrealizationmethod.\n\
    2.The drought duration is projected to slowly prolong across78%ofthelandsurface,whilethedroughtseverity\
    \ shows a much more pronounced rise globally in the 1.5\u25E6C warming world.\
    \ Compared to the 1.5\u25E6C warmingcondition,therewillbeafurtherincreaseindrought\
    \ severity and a persistent lengthening in drought dura- tion under the additional\
    \ 2.0\u25E6C warming level.\n"
