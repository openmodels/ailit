Drivers of Risk:
  1: The risk drivers include increased frequency and persistence of droughts due
    to climate warming mainly caused by greenhouse gas emissions.
  3: Drought characteristics are identified using the Standardized Precipitation Evapotranspiration
    Index (SPEI) combined with the run theory and with climate scenarios simulated
    by 13 CMIP5 global climate models (GCMs) under three RCPs (RCP2.6, RCP4.5, and
    RCP8.5).
  4: No relevant information
  5: Changes in precipitation and potential evapotranspiration (P-PET), leading to
    changes in SPEI-3 (Standardized Precipitation-Evapotranspiration Index with a
    3-month window).
  6: Rising temperatures lead to higher evaporative demands and more frequent dry
    spells.
  7: "Global temperature rise (1.5\xB0C and 2.0\xB0C warming targets), Representative\
    \ Concentration Pathways (RCPs)"
  8: Changes in drought severity and duration, assessed via the Standardized Precipitation
    Evapotranspiration Index (SPEI).
  9: More frequent historical 50-year drought events
  10: "Climate warming (comparing 1.5\xB0C and 2.0\xB0C warming targets), drought\
    \ duration, drought severity"
  11: Climate warming is identified as a key driver increasing drought risks, particularly
    in tropical regions, impacting land fractions and their exposure to drought.
  12: Increasing drought risks under warming climates.
  13: Changes in evapotranspiration, specifically potential evapotranspiration calculated
    using a fixed stomatal resistance (rs), though they acknowledge rs may scale with
    CO2.
  14: "More frequent severe droughts under 1.5\xB0C and 2.0\xB0C warming targets."
  15: "The drivers of risk are changes in drought characteristics, assessed using\
    \ the Standardized Precipitation-Evapotranspiration Index (SPEI), and warming\
    \ scenarios (1.5\xB0C and 2.0\xB0C targets). Specific climate scenarios (SSP126,\
    \ SSP245, and SSP585) are used to project drought risk changes."
  16: "Increasing drought risks under different warming levels (1.5\xB0C and 2.0\xB0\
    C targets), using -0.5 and -0.8 thresholds for drought definition."
  17: The primary driver of risk is increasing drought risks due to climate warming,
    quantified using the SPEI-3 index. The role of dynamic population and GDP is also
    considered as a driver of exposure.
  18: Changes in hydro-meteorological variables such as precipitation, wind speed,
    and relative humidity can lead to variations in drought evolution.
  20: Droughts are the primary driver of risk.
Evaluation overview:
  1: "The paper provides an overview of the projected increases in magnitude and socioeconomic\
    \ exposure to global droughts in 1.5\xB0C and 2\xB0C warmer climates."
  3: "The study quantifies changes in global drought conditions and socioeconomic\
    \ exposure with additional levels of 1.5 and 2.0\xB0C warming, assessing the drought\
    \ exposures of populations and regional gross domestic product (GDP) under different\
    \ SSPs globally."
  4: No relevant information
  5: Drought characteristics (duration and severity) and socioeconomic exposures to
    droughts.
  6: Projected increases in magnitude and socioeconomic exposure of global droughts
    are assessed.
  7: Drought characteristics (frequency, duration, and severity)
  8: No relevant information
  9: "Socioeconomic in\uFB02uences induced by increasing drought risks, specifically\
    \ population and GDP exposure."
  10: Population and GDP exposure to drought
  11: This paper provides an overview of drought risks, focusing on their magnitude
    and socioeconomic exposure in several hotspot countries, including the United
    States.
  13: Drought risk changes
  14: National population and GDP fraction exposure to more frequent severe droughts.
  15: The study evaluates drought risks and socioeconomic exposure to droughts, focusing
    on changes in return periods of drought events.
  16: This study investigates socioeconomic exposure to drought under different warming
    levels, focusing on population and GDP.
  17: The paper evaluates the socioeconomic exposure to drought risks, specifically
    focusing on population and GDP.
  18: "The study evaluates changes in global drought magnitudes and socioeconomic\
    \ consequences under 1.5 and 2.0\xB0C warming scenarios."
  20: The paper evaluates drought impacts, particularly focusing on magnitude and
