    \ me dian proje c te d re duc tion in sub -national income p er c apit a across\
    \ emission scenar ios (S SP 2-RCP 2 .6 and S SP 2-RCP8 . 5);... in the ye ar in\
    \ which climate damage s diverge at the 5% level (20 49, as identif  ie d in Fig.\_\
    1).\"\nHighlights: \"accounting for daily temperature variability causes the largest\
    \ increase in overall damages...; the magnitude of the effect of average temperature\
    \ on economic growth is underestimated unless accounting for the impacts of other\
    \ correlated climate variables.\"\n"
  5: "Source material:\nEstimate s of the me dian proje c te d change in national\
    \ income per c apit a across emission scenarios (RCP 2 .6 and RCP8 .  5) as well\
    \ as climate model, empirical model and model parameter uncer tainty in the year\
