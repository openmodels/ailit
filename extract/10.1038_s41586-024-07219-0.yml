  8: "Historical climate data: Historical daily 2-m temperature and precipitation\
    \ totals (in mm) are obtained for the period 1979\u20132019 from the W5E5 database...\
    \ these historical data have been used to bias-adjust future climate projections\
    \ from CMIP-6. Future climate data: Daily 2-m temperature and precipitation totals\
    \ (in mm) are taken from 21 climate models participating in CMIP-6... have been\
    \ bias-adjusted and statistically downscaled using the trend-preserving method.\
    \ Historical economic data: Historical economic data come from the DOSE database\
    \ of sub-national economic output... first converting values from local currencies\
    \ to US dollars... Future socio-economic data: Baseline gridded gross domestic\
    \ product (GDP) and population data... from the middle-of-the-road scenario SSP2.\
    \ Climate variables: We calculate an array of climate variables for which substantial\
    \ impacts on macroeconomic output have been identified... independent impacts\
    \ on economic growth rates from annual average temperature, daily temperature\
    \ variability, total annual precipitation, the annual number of wet days and extreme\
    \ daily rainfall. Furthermore, these climate variables were identified as having\
    \ independent effects on economic output."
  9: "plaintext\nMethodology: \"The analysis uses fixed-effects distributed lag models\
    \ to evaluate the impacts of climate conditions on economic growth rates, incorporating\
    \ region and yearly fixed effects, as well as region-specific linear time trends.\"\
    \ Following a wide range of climate econometric literature 16,60, we use panel\
    \ regression models with a selection of fixed effects and time trends to isolate\
    \ plausibly exogenous variation with which to maximize confidence in a causal\
    \ interpretation of the effects of climate on economic growth rates. The use of\
    \ region fixed effects, \u03BCr, accounts for unobserved time-invariant differences\
    \ between regions, such as prevailing climatic norms and growth rates owing to\
    \ historical and geo-political factors. The use of yearly fixed effects, \u03B7\
    y, accounts for regionally invariant annual shocks to the global climate or economy\
    \ such as the El Ni\xF1o\u2013Southern Oscillation or global recessions. In our\
    \ baseline specification, we also include region-specific linear time trends,\
    \ kry, to exclude the possibility of spurious correlations resulting from common\
    \ slow-moving trends in climate and growth.\nMethodology: \"The analysis includes\
    \ lagged climate variables to evaluate the persistence of climate impacts on economic\
    \ growth rates.\" The persistence of climate impacts on economic growth rates\
    \ is a key determinant of the long-term magnitude of damages. Methods for inferring\
    \ the extent of persistence in impacts on growth rates have typically used lagged\
    \ climate variables to evaluate the presence of delayed effects or catch-up dynamics.\n\
    Methodology: \"Grid-cell-level historical and future climate measures are aggregated\
    \ to sub-national administrative units using area-weighting.\" We aggregate grid-cell-level\
    \ historical and future climate measures, as well as grid-cell-level future GDPpc\
    \ and population, to the level of the first administrative unit below the national\
    \ level of the GADM database, using an area-weighting algorithm that estimates\
    \ the portion of each grid cell falling within an administrative boundary.\nMethodology:\
    \ \"Includes interactions of climate variables with historical average climatic\
    \ conditions to reflect heterogeneous effects across regions.\" We allow the response\
    \ to climatic changes to vary across regions, using interactions of the climate\
    \ variables with historical average (1979\u20132019) climatic conditions reflecting\
    \ heterogeneous effects identified in previous work.\nHighlights: \"The persistence\
    \ of climate impacts on economic growth rates is considered a key determinant\
    \ of long-term damage magnitudes.\" The persistence of climate impacts on economic\
    \ growth rates is a key determinant of the long-term magnitude of damages.\nHighlights:\
    \ \"The framework is conservative regarding the persistence of impacts and the\
    \ magnitude of future damages.\" As such, this framework is conservative with\
    \ respect to the persistence of impacts and the magnitude of future damages.\n"
  10: "Source material here.\nMethodology: \"We construct projections of future climate\
    \ damages by applying the coefficients estimated in equation (10) and shown in\
    \ Supplementary Tables 2\u20134 [...] to projections of future climate change\
    \ from the CMIP-6 models.\"\nMethodology: \"Year-on-year changes in each primary\
    \ climate variable of interest are calculated to reflect the year-to-year variations\
    \ used in the empirical models. 30-year moving averages of the moderating variables\
    \ of the interaction terms are calculated to reflect the long-term average of\
    \ climatic conditions that were used for the moderating variables in the empirical\
    \ models.\"\nMethodology: \"For the construction of damage projections, we block-bootstrap\
    \ the regressions by region 1,000 times to provide a range of parameter estimates\
    \ with which to sample the projection uncertainty.\"\nMethodology: \"In Supplementary\
    \ Fig. 14, we present the results from a spatial-lag model that explores the potential\
    \ for climate impacts to \u2018spill over\u2019 into spatially neighbouring regions.\"\
    \nMethodology: \"For each emission scenario, this procedure is repeated 1,000\
    \ times while randomly sampling from the selection of climate models, the selection\
    \ of empirical models with different numbers of lags [...] and bootstrapped estimates\
    \ of the regression parameters.\"\nHighlights: \"However, we impose caps on these\
    \ moderating variables at the 95th percentile at which they were observed in the\
    \ historical data to prevent extrapolation of the marginal effects outside the\
    \ range in which the regressions were estimated. This is a conservative choice\
    \ that limits the magnitude of our damage projections.\"\n"
  11: 'Estimates of mitigation costs

    We obtain IPCC estimates of the aggregate costs of emission mitiga - tion from
    the AR6 Scenario Explorer and Database hosted by IIASA. Specifically, we search
    the AR6 Scenarios Database World v1.1 for IAMs that provided estimates ...We find
    five IAMs that provide data for these scenarios, namely, MESSAGE-GLOBIOM 1.0,
    REMIND-MAgPIE 1.5, AIM/GCE 2.0, GCAM 4.2 and WITCH-GLOBIOM 3.1. Of these five
    IAMs, we use the results only from the first three that passed the IPCC vetting
    procedure...

    We then estimate global mitigation costs as the percentage difference in global
    per capita GDP between the SSP2 baseline and the SSP2-RCP2.6 emission scenario...


    Data availability

    Processed climate and economic data, as well as all other necessar y data for
    reproduction of the results, are available at the public repositor y https://doi.org
    /10.5281/zenodo.10562951'
