Drivers of Risk:
  1: Drivers of risk include average temperature, daily temperature variability, total
    annual precipitation, the annual number of wet days, and extreme daily rainfall.
  2: Temperature and precipitation changes, using first-differenced climate variables.
  3: Committed damages primarily arise through changes in average temperature.
  4: "Changes in annual mean temperature, daily temperature variability, total annual\
    \ precipitation, the annual number of wet days (>1\u2009mm), and extreme daily\
    \ rainfall"
  5: Economic damages are driven by daily temperature variability, total annual precipitation
    changes, and extreme daily rainfall.
  6: The paper considers several climatic components, including average temperature,
    rainfall changes, and day-to-day temperature variability.
  7: Extreme precipitation, high-temperature extremes, extreme heat, climate tipping
    point, coastal flooding, cyclones, extreme weather, daily temperature variability.
  8: The drivers of risk considered are annual average temperature, daily temperature
    variability, total annual precipitation, the annual number of wet days, and extreme
    daily rainfall.
  9: The drivers of risk include daily temperature, monthly mean temperature, number
    of days in a given month or year, annual mean temperature, daily temperature variability,
    total annual precipitation, extreme daily precipitation, and number of wet days.
  10: Year-on-year changes in primary climate variables (unspecified on this page
    but implicitly including average temperature and precipitation) and moderating
    climate variables (unspecified) that interact with the primary climate variables.
  12: Annual mean temperature, daily temperature variability, total annual precipitation,
    number of wet days, and extreme daily precipitation
  13: Annual mean temperature, daily temperature variability, total annual precipitation,
    the number of wet days, and extreme annual precipitation are the climate variables
    impacting economic growth.
  15: Changes in mean temperature, temperature variability, total precipitation, wet
    days, and extreme precipitation.
  16: "Annual mean temperature (T\u0305), daily temperature variability (T'), total\
    \ annual precipitation (P), number of wet days (Pwd), and extreme daily precipitation\
    \ (Pext) are considered as drivers of risk."
  17: The analysis uses two extreme emission scenarios (RCP2.6 and RCP8.5) to project
    future climate impacts.
  18: Average annual temperature, daily temperature variability, total annual precipitation,
    number of wet days, extreme daily precipitation.
  19: Annual mean temperature, Daily temp. variability, Total annual precipitation,
    Annual no. wet days, Precipitation extremes.
  20: The information is not provided on this page, but likely future changes associated
