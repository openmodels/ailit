  17: 'The difference in committed damages between the upper and lower quartiles of
    countries when ranked by GDP and cumulative historical emissions. ... Quartiles
    are defined using a population weighting, as are the average committed damages
    across each quartile group.

    The violin plots indicate the distribution of differences between quartiles across
    the two extreme emission scenarios (RCP 2.6 and RCP8.5) and the uncertainty sampling
    procedure outlined in Methods ... reflecting the very likely and likely ranges
    following the likelihood classification adopted by the IPCC... The plots illustrate
    how committed damages vary between the two categories: GDP and cumulative emissions.
    The GDP plot shows a wider distribution, while the cumulative emissions plot is
    more condensed, especially around the zero line.'
  18: 'This summary is not intended to be an exhaustive list of all mechanisms or
    references. In the case of most climate variables, several plausible physical
    mechanisms supported by empirical evidence exist. The only exception here is the
    number of wet days, for which plausible mechanisms are listed but empirical evidence
    does not yet exist (as far as the authors are aware). The use of the number of
    wet days in the main empirical models is therefore guided primarily by the empirical
    evidence indicating robust impacts on economic growth. Extended Data Table 1 |
    A summary of several physical mechanisms that plausibly underlie the impact of
    the different climate variables on macroeconomic growth, with references to empirical
    evidence. 1. Average annual temperature - Physical mechanisms: Labor productivity
    and supply; agricultural productivity. 2. Daily temperature variability - Physical
    mechanisms: Agricultural productivity; physical health; mental health. 3. Total
    annual precipitation - Physical mechanisms: Agricultural productivity; metropolitan
    labor outcomes; conflict. 4. Number of wet days - Physical mechanisms: Labor productivity.
    5. Extreme daily precipitation - Physical mechanisms: Flood damages; disruption.
    Description of image: The image is a table titled "Climate variable." It consists
    of three columns: Climate variable, Physical mechanisms, and References. The table
    summarizes plausible physical mechanisms linking climate variables to macroeconomic
    growth and provides references to empirical evidence supporting these mechanisms.'
