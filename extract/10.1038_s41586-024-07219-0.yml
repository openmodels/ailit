  13: Starting from a panel-based fixed-effects distributed lag model estimating the
    effects of climate on economic growth using the real historical data (as in equation
    (4)) with ten lags for all climate variables... Incremental lag selection procedure
    using information criteria and within-region R^2... Information criteria show
    minima at approximately four lags for precipitation variables and ten to eight
    for temperature variables, indicating that including these numbers of lags does
    not lead to overfitting.
