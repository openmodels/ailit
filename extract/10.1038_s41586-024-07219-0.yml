Drivers of Risk:
  1: The shocks impacting outcomes include changes in average temperature, temperature
    variability, total annual precipitation, number of wet days, and extreme daily
    rainfall.
  2: Significance of delayed effects tested separately for temperature and precipitation
    as climate variables impacting economic growth.
  3: The primary driver of risk discussed is changes in average temperature, with
    potential damages arising from its variability and extremes.
  4: Changes in average temperatures, daily temperature variability, total annual
    precipitation, number of wet days, and extreme daily rainfall are identified as
    drivers of economic impacts.
  5: Shocks impacting outcomes include daily temperature variability, changes in total
    annual precipitation, and extreme daily rainfall.
  6: Projected changes in climatic conditions, particularly average temperature, are
    identified as significant drivers of risk.
  7: Climate change, extreme weather, greenhouse forcing, daily temperature variability,
    extreme precipitation, heavy-precipitation, high-temperature extremes, extreme
    heat, coastal flooding, cyclones, climate tipping points.
  8: Identified climate impact variables include annual average temperature, daily
    temperature variability, total annual precipitation, number of wet days, and extreme
    daily rainfall.
  12: Shocks or changes impacting outcomes include changes in mean temperature, daily
    temperature variability, total annual precipitation, number of wet days, and extreme
    daily precipitation.
  14: The analysis is driven by different empirical specifications of climate impacts,
    including pure growth effects and pure level effects, under the emission scenario
    RCP8.5.
  15: Changes in mean temperature, temperature variability, total precipitation, wet
    days, and extreme precipitation events from 1979-2019 to 2035-2065 under the SSP5-RCP8.5
    high-emission scenario.
  16: Drivers of risk include changes in annual mean temperature, daily temperature
    variability, total annual precipitation, the number of wet days, and extreme daily
    precipitation.
  17: The analysis evaluates differences in committed damages between countries based
    on GDP and cumulative historical emissions.
  18: Average annual temperature, Daily temperature variability, Total annual precipitation,
    Number of wet days, Extreme daily precipitation.
  19: Climate variables such as annual mean temperature, daily temperature variability,
    total annual precipitation, annual number of wet days, and precipitation extremes
    are drivers impacting sub-national economic growth rates.
  20: Unspecified climate variables; 'This study' uses five climate variables.
Evaluation overview:
  1: The paper provides an overview of macroeconomic climate-change damages, specifically
    focusing on sub-national economic growth impacts related to temperature and precipitation.
  2: Analysis provides an overview of projected macroeconomic damages from climate
    change based on empirical economic response functions.
  3: The paper provides a comparison of projected economic climate damages versus
    mitigation costs, focusing on changes in income per capita under different emission
    scenarios.
  4: The paper provides an overview of economic damages from climate changes across
    sub-national regions in typical climate variables and their impact on income per
    capita.
  5: The paper provides an overview of the economic damages resulting from climate
    change, particularly focusing on projected income changes relative to a baseline
    without climate impacts.
  6: The paper evaluates the economic damages resulting from climate change, projecting
    a decrease in income by 19% due to climatic conditions.
  7: Economic costs and impacts, food supply chains, mortality, economic growth, economic
    activity, economic output, values of natural capital.
  14: The page evaluates the persistence of climate impacts on economic growth and
    income per capita across different regions under various climate damage specifications
    and emission scenarios.
  15: Changes in climate variables are evaluated, but the outcomes (e.g., mortality,
    productivity loss) are not explicitly assessed on this page.
  16: The analysis evaluates the impact of climate variables and increases in annual
    mean temperature on economic outcomes by 2049 in terms of GDP per capita.
  18: Macroeconomic growth is the outcome being evaluated in relation to various climate
    variables.
  19: The analysis evaluates sub-national economic growth rates.
  20: Economic damage from future climate change.
Highlights:
  1: Committed damages are projected for all regions except those at very high latitudes,
    and these damages mainly arise through changes in average temperature, with further
    climatic components raising estimates by approximately 50%.
  2: Projected climate damages before 2049 are statistically indistinguishable across
    emission scenarios and constitute a permanent income reduction.
  3: The analysis demonstrates that damages from climate change are already greater
    than mitigation costs and that these damages diverge significantly across emission
    scenarios post-2049.
  4: Daily temperature variability is identified as a major contributor to higher
    economic damages; the inclusion of various climate-related components reveals
    stronger economic responses to average temperature changes.
  5: Countries least responsible for climate change are projected to face the greatest
    economic damages; these countries often have the least resources to adapt.
  6: "The paper highlights that economic damages from climate change outweigh mitigation\
    \ costs for the 2\xB0C target; adaptation may reduce some committed damages."
  7: Unequal climate impacts on global values of natural capital, impacts of climate
    change and extreme weather on food supply chains cascade across sectors and regions,
    economic welfare loss from weather extremes is amplified, long-term macroeconomic
    effects of climate change, economic cost of coastal flooding, causal effect of
    environmental catastrophe on long-run economic growth, shifts in national land
    use and food production after a climate tipping point, economic impacts of tipping
    points in the climate system, globally unequal effect of extreme heat on economic
    growth.
  8: Robust impacts of daily temperature variability, total annual precipitation,
    number of wet days, and extreme daily rainfall were identified on macroeconomic
    output.
  9: The framework is conservative regarding the persistence of impacts and the magnitude
    of future damages.
  10: A conservative approach limits the magnitude of damage projections by capping
    moderating variables at the 95th percentile historically observed value.
  14: The paper's preferred specification provides a robust lower bound on the persistence
    of climate impacts on economic growth rates.
  15: Mean temperature is projected to increase significantly worldwide. Precipitation
    is projected to decrease in the northern hemisphere and increase in some southern
    regions. The number of wet days is projected to decrease in northern areas and
    increase in some tropical and southern regions. Changes in temperature variability
    and extreme precipitation are mixed across regions.
  16: Important outcomes include varying impacts of different climate variables on
    economic factors, with all climate variables combined showing different results
    than temperature changes alone.
  17: Committed damages vary more widely by GDP than by cumulative emissions, with
    the GDP distribution being broader.
  18: The table summarizes plausible physical mechanisms linking climate variables
    to macroeconomic growth and provides references to empirical evidence supporting
    these mechanisms. The Number of wet days entry has plausible mechanisms listed,
    but empirical evidence does not yet exist, according to the authors. The use of
    the number of wet days in the main empirical models is therefore guided primarily
    by the empirical evidence indicating robust impacts on economic growth.
  19: The significance of the impacts requires evaluating both the coefficient of
    the climate variable and its interaction term.
  20: '''This study'' estimates significantly higher economic damages (61.6%) under
    RCP8.5 by 2100 compared to other studies referenced on this page.'
Methodology:
  1: The analysis uses fixed-effects panel regression models on data from more than
    1,600 regions worldwide over the past 40 years to project economic damage through
    mechanisms like daily temperature and precipitation variability.
  2: The analysis uses fixed-effects distributed lag models with first-differenced
    climate variables and includes a Monte Carlo procedure to estimate uncertainty.
  3: The analysis uses empirical models and historical interannual variability to
    estimate climate impacts on economic output, focusing on emission scenarios SSP2-RCP2.6
    and SSP5-RCP8.5 with uncertainties derived from a Monte Carlo procedure.
  4: The analysis examines impacts across different climate variables, using scenarios
    SSP2-RCP2.6 and SSP2-RCP8.5 for predicting economic damages by 2049.
  5: The analysis uses sub-national estimates, population weighting, empirical model
    uncertainty, and examines future income changes based on historic emissions.
  6: The analysis uses empirical models with moderating variables capped at the 95th
    percentile of historical data to limit out-of-sample extrapolation.
  7: Cross-country analysis, spatial analysis, national attribution of historical
    climate damages.
  8: Future socio-economic data based on SSP2 scenario, with population and GDP data
    downscaled and used for sub-national level aggregation.
  9: Includes interactions of climate variables with historical average climatic conditions
    to reflect heterogeneous effects across regions.
  10: The procedure involves randomly sampling from a selection of climate models
    and empirical models to create an ensemble of GRPpc trajectories reflecting uncertainty.
  11: The analysis uses estimates from the AR6 Scenarios Database hosted by IIASA,
    focusing on global GDP and population under SSP2 baseline and SSP2-RCP2.6 scenarios,
    using results from three vetted IAMs.
  12: The analysis uses a panel-based fixed-effects distributed lag model with climate
    variables in their first-differenced form, involving temperature and precipitation
    variables measured at different lags after an initial shock.
  13: The study starts with ten lags for all climate variables and incrementally removes
    lags to determine the optimal number.
  14: Three empirical specifications are used to assess climate impacts; the preferred
    specification avoids assumptions of infinite persistence, while the other two
    consider pure growth effects and pure level effects under the RCP8.5 emission
    scenario.
  15: Empirical models are used to project changes in climate variables. Historical
    interannual variability is accounted for by detrending data, and region-specific
    linear time trends are included. The analysis covers the periods 1979-2019 (historical)
    and 2035-2065 (future projections) under the SSP5-RCP8.5 scenario.
  16: The analysis is based on empirical models using block-bootstrap resampling,
    considering changes in various climate variables and annual mean temperature;
    results apply to projected impacts by 2049.
  17: Uses population weighting for quartiles and accounts for uncertainty from empirical
    model parameters and climate projections.
  18: The paper provides a summary of physical mechanisms that plausibly underlie
    the impact of different climate variables on macroeconomic growth, referencing
    other empirical studies.
  19: The analysis uses regression techniques with clustered standard errors by region,
    assessing impacts with time lags over the period 1979-2019.
  20: '''This study'' uses fixed-effects panel regressions with eight-ten-four lags,
    and five unspecified climate variables.'
More Notes:
  2: Empirical models are evaluated for robustness to autocorrelation and multicollinearity;
    lag selection effectively determined with information criteria.
  11: Data and code for reproduction are available via Zenodo, providing transparency
    and the ability for others to replicate the findings.
  15: The data is based on the SSP5-RCP8.5 high-emission scenario. Historical variability
    is defined as the standard deviation of detrended climate variables from 1979-2019.
    The maps provide a spatial representation of the projected changes, relative to
    historical variability.
  20: Baseline specification for 'This study' is not specified as growth or level
    effect.
Quantitative material:
  1: "The world economy is projected to face a committed income reduction of 19% within\
    \ the next 26 years, relative to a baseline without climate impacts, with a likely\
    \ range of 11\u201329% accounting for uncertainties."
  2: "Projected global damages comprise a permanent income reduction of 19% on average\
    \ with a range of 11\u201329%."
  3: The paper presents estimates showing that by 2050, the median committed climate
    damages are approximately six times larger than median mitigation costs.
  4: It provides estimated changes in sub-national income per capita, attributing
    4.9 percentage points increase in damages due to daily temperature variability
    and 0.34 percentage points from annual precipitation changes.
  5: Quantitative estimates include a higher projected income loss for countries in
    the lower-income quartile, which is 8.9 percentage points or 61% greater than
    the upper quartile.
  6: Quantitative projection of a 19% reduction in income due to climate change is
    provided.
  7: Examples include percent changes, temperature effects on economic activity, quantified
    climate change spillovers.
  11: Mitigation costs are estimated as the percentage difference in global per capita
    GDP between SSP2 baseline and SSP2-RCP2.6 scenarios.
  12: "The plots show specific temperature increases (11.0\xB0C, 21.0\xB0C, 3.8\xB0\
    C, 8.2\xB0C, 5.8\xB0C) and precipitation amounts (610.0 mm, 1600.0 mm, 70.7 days,\
    \ 110.0 days, 46.00 mm, 73.63 mm), indicating quantitative measures of changes."
  14: The analysis presents the percentage change in income per capita relative to
    a baseline without climate impacts for the period 2020 to 2100.
  15: Changes in climate variables are expressed as a percentage of historical variability
    (standard deviation of detrended climate variable from 1979-2019). The maps visually
    show increases and decreases across different regions. No hard numbers are listed
    on this page, but the maps illustrate the percentage changes.
  16: "Quantitative information includes the percentage reduction in damages in GDP\
    \ terms per capita by 2040 and cumulative marginal effects (percent per \xB0C)\
    \ relative to temperature."
  17: The page includes a violin plot with distributions reflecting the percentage-point
    difference in committed damages between upper and lower quartiles.
  19: The table provides regression coefficients, standard errors, and significance
    levels for the impact of climate variables on economic growth, including lagged
    effects from Lag 0 to Lag 10.
  20: 'Estimated damages by 2100 under RCP8.5: ''This study'' projects 61.6%.'
sourcematerial:
  1: "Source material here: Global projections of macroeconomic climate-change damages\
    \ typically consider impacts from average annual and national temperatures over\
    \ long time horizons...Here we use recent empirical findings from more than 1,600\
    \ regions worldwide over the past 40\u2009years to project sub-national damages\
    \ from temperature and precipitation, including daily variability and extremes.\
    \ Macroeconomic impacts have been identified from changing daily temperature variability,\
    \ total annual precipitation, the annual number of wet days and extreme daily\
    \ rainfall that occur in addition to those already identified from changing average\
    \ temperature. We find that the world economy is committed to an income reduction\
    \ of 19% within the next 26\u2009years independent of future emission choices\_\
    (relative to a baseline without climate impacts, likely range of 11\u201329% accounting\
    \ for physical climate and empirical uncertainty). Using fixed-effects panel regression\
    \ models to control for potential confounders, these studies exploit within-region\
    \ variation in local temperature and precipitation in a panel of more than 1,600\
    \ regions worldwide, comprising climate and income data over the past 40\u2009\
    years, to identify the plausibly causal effects of changes in several climate\
    \ variables on economic productivity. Committed losses are projected for all regions\
    \ except those at very high latitudes...Committed damages arise predominantly\
    \ through changes in average temperature, but accounting for further climatic\
    \ components raises estimates by approximately 50% and leads to stronger regional\
    \ heterogeneity."
  2: "\n\"Constraining the persistence of impacts. ... Following refs.\u20092,18,\
    \ we use climate variables in their first-differenced form following ref.\u2009\
    3, implying a dependence of the growth rate on a change in climate variables.\
    \ This choice means that a baseline specification without any lags constitutes\
    \ a model prior of purely level effects... By including lags, one can then test\
    \ whether any effects may persist further. ... We begin our empirical analysis\
    \ of the persistence of climate impacts on growth using ten lags of the first-differenced\
    \ climate variables in fixed-effects distributed lag models. We detect substantial\
    \ effects on economic growth at time lags of up to approximately 8\u201310 years\
    \ for the temperature terms and up to approximately 4\u2009years for the precipitation\
    \ terms (Extended Data Fig.\_1 and Extended Data Table\_2). ... Furthermore, evaluation\
    \ by means of information criteria indicates that the inclusion of all five climate\
    \ variables and the use of these numbers of lags provide a preferable trade-off\
    \ between best-fitting the data and including further terms that could cause overfitting\
    \ ... Further tests using Monte Carlo simulations demonstrate that the empirical\
    \ models are robust to autocorrelation in the lagged climate variables ... and\
    \ that including several climate variables is actually necessar y to isolate their\
    \ separate effects (Supplementar y Methods Section\_3 and Supplementar y Fig.\_\
    7). Committed damages until mid-centur y. We combine these empirical economic\
    \ response functions ... with an ensemble of 21 climate models ... to project\
    \ the macroeconomic damages from these components of physical climate change ...\
    \ A Monte Carlo procedure that samples from climate model projections, empirical\
    \ models with different numbers of lags and model parameter estimates ... is used\
    \ to estimate the combined uncertainty from these sources. Given these uncertainty\
    \ distributions, we find that projected global damages are statistically indistinguishable\
    \ across the two most extreme emission scenarios until 2049 ... These committed\
    \ damages comprise a permanent income reduction of 19% on average globally (population-weighted\
    \ average) in comparison with a baseline without climate-change impacts (with\
    \ a likely range of 11\u201329%...\"\n"
  3: "Source material here.\nEvaluation overview: \"E stimate s of the proje c te\
    \ d re duc tion in income p er c apit a from change s in all climate variable\
    \ s based on empiric al models of climate impac t s on economic output w ith a\
    \ robust lower bound on their p ersistence.\"\n\nDrivers of Risk: \"Committed\
    \ damages primarily arise through changes in average temperature (Fig.\_2). This\
    \ reflects the fact that projected changes in average temperature are larger than\
    \ those in other climate variables when expressed as a function of their historical\
    \ interannual variabil - ity.\"\n\nQuantitative material: \"We find that the median\
    \ committed climate damages are larger than the median mitigation costs in 2050\
    \ (six trillion in 2005 international dollars) by a factor of approximately six.\"\
    \n\nMethodology: \"Taking estimates of mitigation costs from the three integrated\
    \ assessment models (IAMs) in the IPCC AR6 database23 that provide results under\
    \ comparable scenarios (SSP2 baseline and SSP2-RCP2.6, in which RCP stands for\
    \ Representative Concentration Pathway), we find... This com - parison simply\
    \ aims to compare the magnitude of future damages against mitigation costs, rather\
    \ than to conduct a formal cost\u2013benefit analysis...\"\n\nHighlights: \"Damages\
    \ are actually already considerably larger than mitigation costs and the delayed\
    \ emergence of net mitigation benefits results primarily from the fact that damages\
    \ across different emission paths are indistinguishable until mid-centur y (Fig.\_\
    1).... we note that damage estimates diverge strongly across emission scenarios\
    \ after 2049, conveying the clear benefits of mitigation from a purely economic\
    \ point of view...\"\n"
  4: "Source material here.\nEvaluation overview: \"Estimate s of the me dian proje\
    \ c te d re duc tion in sub -national income p er c apit a across emission scenar\
    \ ios (S SP 2-RCP 2 .6 and S SP 2-RCP8 . 5) as well as climate model, empir ic\
    \ al model and model parameter.\"\nDrivers of Risk: \"arising separately from\
    \ change s in annual me an temperature (b), daily temperature variability (c),\
    \ total annual precipitation (d), the annual number of wet days (>1\u2009mm) (e)\
    \ and extreme daily rainfall (f).\"\nQuantitative material: \"accounting for daily\
    \ temperature variability causes the largest increase in overall damages relative\
