Evaluation overview:
  1: This study evaluates macroeconomic climate-change damages, specifically income
    reduction.
  2: Macroeconomic damages from physical climate change components.
  3: The analysis evaluates the projected economic climate damages in terms of percentage
    change in income per capita relative to a baseline without climate impacts.
  4: Economic damages of climate change by sub-national region
  5: The page evaluates the projected change in national income per capita across
    emission scenarios and climatic factors.
  6: The paper evaluates economic damages resulting from climate change.
  7: Economic damages, economic inequality, economic output, food supply chains, economic
    welfare loss, economic activity
  8: The paper evaluates impacts on macroeconomic output/economic growth rates.
  9: The paper evaluates the impact of climate change on economic growth rates (specifically,
    the logarithm of gross regional product).
  10: Economic damage from future climate change, specifically focusing on GRPpc (Gross
    Regional Product per capita) growth rate.
  11: Provides an overview of the costs of emission mitigation and the estimation
    of global mitigation costs.
  12: Impacts on sub-national economic growth rates
  13: Economic growth is the outcome being evaluated.
  15: No relevant information
  16: Climate damages in 2049, and cumulative marginal effects of temperature increases
    are evaluated using empirical models.
  18: Macroeconomic growth.
  19: "Sub-national economic growth rates in the period 1979\u20132019."
  20: Economic damage from future climate change.
Highlights:
  1: The world economy is committed to a substantial income reduction within the next
    26 years, regardless of future emissions. Committed losses are projected for all
    regions except those at very high latitudes. Largest losses are in lower latitudes,
    regions with lower cumulative historical emissions and lower present-day income.
  2: The world is already committed to a permanent income reduction of 19% on average
    globally by 2049 due to past emissions. Damages are statistically indistinguishable
    across the two most extreme emission scenarios until 2049.
  3: The analysis finds that climate damages are already larger than mitigation costs,
    highlighting economic benefits of mitigation after 2049.
  4: Accounting for components of the distribution of temperature and precipitation
    raises net damages by nearly 50%. Damages resulting from increasing annual mean
    temperature are negative almost everywhere globally, and larger at lower latitudes.
  5: Countries with lower historical emissions and current income are most affected
    by climate change impacts despite being least responsible.
  6: "Economic damages resulting from climate change until 2049 are already committed\
    \ and outweigh the costs of mitigating emissions to meet the Paris Agreement's\
    \ 2\xB0C target. Damages are indistinguishable across emissions scenarios until\
    \ mid-century. Not accounting for spatial spillovers conservatively estimates\
    \ damages."
  9: The paper investigates whether climate impacts on growth rates are persistent
    or only affect the level of output. It finds that including too few lags can lead
    to incorrect assumptions about the persistence of climate change impacts. They
    also allow for the response to climate changes to vary across regions using interaction
    terms.
  10: Provides a time series of annual GRPpc growth-rate reductions for a given emission
    scenario, climate model, and set of empirical model parameters. Calculates cumulative
    marginal effects to assess spatially dependent impacts of climate shocks.
  11: Focuses on the costs of emission mitigation and comparisons to climate damages
    beginning from 2020.
  12: Shows persistence of climate impacts on economic growth rates by moderating
    climate variables and lagged periods.
  13: Including approximately four lags for precipitation variables and ten to eight
    lags for temperature variables does not lead to overfitting.
  15: Mean temperature is projected to increase significantly. Temperature variability
    is projected to decrease in most regions, except for polar regions. Total precipitation
    and extreme precipitation are projected to increase in most regions. Wet days
    are projected to increase slightly in most land areas.
  16: The contribution of different climate variables to the overall effects of an
    increase in annual mean temperature is quantified, showing how much each variable
    contributes to damage reduction or marginal effects.
  18: Several plausible physical mechanisms supported by empirical evidence exist
    for most climate variables, except for the number of wet days, for which plausible
    mechanisms are listed but empirical evidence does not yet exist (as far as the
    authors are aware).
  19: Interpretation requires assessment of both the coefficient of the climate variable
    itself as well as its interaction term, which is shown in Extended Data Fig. 1.
  20: This study's predicted economic damage (61.6% by 2100 under RCP8.5) is significantly
    higher than other comparable panel-based empirical studies.
Methodology:
  1: The study uses empirical findings from more than 1,600 regions worldwide over
    the past 40 years, employing fixed-effects panel regression models to identify
    the causal effects of changes in climate variables on economic productivity. The
    results are applicable for the next 26 years.
  2: Fixed-effects distributed lag models with 8-10 lags for temperature and 4 for
    precipitation, using first-differenced climate variables. Climate model projections
    from CMIP-6 combined with empirical economic response functions. A Monte Carlo
    procedure is used to estimate uncertainty. Results applicable until 2049.
  3: Estimates are made using empirical models of climate impacts on economic output,
    considering uncertainties through a Monte Carlo procedure.
  4: Estimates based on emission scenarios (SSP2-RCP2.6 and SSP2-RCP8.5) as well as
    climate model, empirical model and model parameter uncertainty in the year in
    which climate damages diverge at the 5% level (2049, as identified in Fig. 1).
  5: The analysis uses sub-national estimates for temperature response, incorporates
    multiple climate variables, and applies fixed-effects distributed lag models for
    impact persistence.
  6: The paper uses empirical impact models based on observed data, capping moderating
    variables at the 95th percentile of the historical distribution to limit out-of-sample
    extrapolation. The analysis focuses on global damages and mitigation costs.
  7: Cross-country analysis of long-term macroeconomic effects of climate change;
    Spatial analysis of global temperature effects on economic activity and equity;
    Quantification of climate change spillovers in the European Union; Analysis of
    climate change and extreme weather impacts on food supply chains in Australia;
    Ripple resonance amplifies economic welfare loss from weather extremes; Attribution
    of historical climate damages; analysis of daily temperature and income in the
    United States.
  8: The analysis uses historical (1979-2019) daily temperature and precipitation
    data from the W5E5 database, and future climate data from 21 CMIP-6 climate models
    under RCP8.5 and RCP2.6 scenarios (2015-2100), bias-adjusted using the W5E5 dataset.
    Historical economic data come from the DOSE database. Future socio-economic data
    (GDP, population) are from SSP2 (2015-2100). Sub-national GDP estimates are derived
    from national-level GDPpc projections, assuming homogeneity within countries.
    They use an array of climate variables for which impacts on macroeconomic output
    have been identified.
  9: The analysis uses panel regression models with fixed effects and time trends.
    It also employs distributed lag models to assess the persistence of climate impacts
    on economic growth rates. The analysis aggregates grid-cell-level climate measures
    and socioeconomic data to the first administrative unit below the national level.
    They also estimate an equation in first-differenced form.
  10: Applies coefficients from statistical models to climate projections from CMIP-6
    models. Uses 30-year moving averages of moderating variables. Spatial lag models
    are also used to account for spillovers between regions. Regression results based
    on 1979-2019 data. Damage estimates begin in 2020.
  11: Uses IPCC estimates from the AR6 Scenario Explorer, using IAMs MESSAGE-GLOBIOM
    1.0, REMIND-MAgPIE 1.5, AIM/GCE 2.0 that passed IPCC vetting for historical emissions
    data.
  12: Panel-based fixed-effects distributed lag model with ten lags; climate variables
    are first-differenced.
  13: Panel-based fixed-effects distributed lag model estimating the effects of climate
    on economic growth using real historical data with ten lags for all climate variables.
    Lags are incrementally removed for one climate variable at a time, and Bayesian
    and Akaike information criteria are used to assess the best number of lags.
  15: "Empirical models were used to project changes in climate variables. Historical\
    \ variability is estimated as the standard deviation of each detrended climate\
    \ variable over the period 1979\u20132019."
  16: "Empirical models are used, with 1,000 block bootstrap resamples from three\
    \ different models using eight, nine, or ten lags of temperature terms. Results\
    \ are applicable to assessing the effects of a 1\xB0C increase in annual mean\
    \ temperature."
  17: The analysis uses an uncertainty sampling procedure to account for uncertainty
    arising from lag choices in empirical models, uncertainty in empirical model parameter
    estimates, and climate model projections. Quartiles are defined using population
    weighting.
  18: The table summarizes physical mechanisms that plausibly underlie the impact
    of different climate variables on macroeconomic growth and provides references
    to empirical evidence. The analysis' results are applicable when considering the
    impact of the listed climate variables on macroeconomic growth.
  19: Regression analysis using equation (4) with ten lags for each climate variable,
    clustered standard errors by region, period 1979-2019.
  20: Fixed-effects panel regressions, baseline specification of growth or level-effects,
    using eight to ten lags.
More Notes:
  2: The study uses a conservative approach by using first-differenced climate variables,
    implying a level-effects model prior.
  4: Data on national administrative boundaries are obtained from the GADM database
    version 3.6.
  6: The paper acknowledges missing impacts from heatwaves, sea-level rise, tropical
    cyclones, tipping points, non-market damages (ecosystems, human health), and spatial
    spillovers, which are likely to increase damage estimates. Adaptation may reduce
    committed damages. Strong divergence of damages after mid-century reemphasizes
    the clear benefits of mitigation.
  9: The paper aims to avoid assumptions of infinite persistence of climate impacts
    and interprets any identified persistence as a lower bound.
  10: Imposes caps on moderating variables at the 95th percentile of historical data
    to prevent extrapolation. Block-bootstraps regressions by region to provide a
    range of parameter estimates.
  12: The displayed effects are not cumulative; preferred specifications remove later
    lags based on statistical significance and information criteria (Extended Data
    Fig. 2 and Supplementary Figs. 1-3).
  13: Extended Data Figure 2 illustrates an incremental lag-selection procedure using
    information criteria and within-region R^2. The 4x4 grid of plots visualizes relationships
    between variables in line charts.
  15: Detrending is used because of the inclusion of region-specific linear time trends
    in the empirical models.
  16: The study uses both individual climate variables and combinations of variables
    to isolate the impact of each on climate damages. Uncertainty is represented with
    95% confidence intervals.
  18: The use of the number of wet days in the main empirical models is guided primarily
    by the empirical evidence indicating robust impacts on economic growth.
  19: "The table entries denote specific regression coefficient \u03B1X,L of the same\
    \ model as indicated in equation (4)."
  20: The study uses a high resolution (sub-national) and the largest number of climate
    variables and lags relative to the other studies considered in this table.
Quantitative material:
  1: "The world economy is committed to an income reduction of 19% within the next\
    \ 26 years independent of future emission choices (likely range of 11-29%). Committed\
    \ damages already outweigh the mitigation costs required to limit global warming\
    \ to 2 \xB0C by sixfold over this near-term time frame. Accounting for climatic\
    \ components besides average temperature raises damage estimates by approximately\
    \ 50%."
  2: "Projected global damages are statistically indistinguishable across the two\
    \ most extreme emission scenarios until 2049. Committed damages comprise a permanent\
    \ income reduction of 19% on average globally (population-weighted average) in\
    \ comparison with a baseline without climate-change impacts (with a likely range\
    \ of 11\u201329%). North America and Europe income reductions of approximately\
    \ 11%. South Asia and Africa median income reductions of approximately 22%. Global\
    \ annual damages in 2049 of 38 trillion in 2005 international dollars (likely\
    \ range of 19\u201359 trillion 2005 international dollars)."
  3: The analysis provides estimates of future damages, with income reductions of
    13% in 2049 based on changes in average temperature.
  4: "Median projected reduction in sub-national income per capita across emission\
    \ scenarios (SSP2-RCP2.6 and SSP2-RCP8.5); Accounting for daily temperature variability\
    \ causes the largest increase in overall damages relative to empirical frameworks\
    \ that only consider changes in annual average temperature (4.9 percentage points,\
    \ likely range 2.4\u20138.7 percentage points); Precipitation causes smaller increases\
    \ in overall damages, equivalent to approximately 1.2 trillion international dollars:\
    \ 0.01 percentage points (\u22120.37\u20130.33 percentage points), 0.34 percentage\
    \ points (0.07\u20130.90 percentage points) and 0.36 percentage points (0.13\u2013\
    0.65 percentage points) from total annual precipitation, the number of wet days\
