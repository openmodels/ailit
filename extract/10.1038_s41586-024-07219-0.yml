  5: National income loss for lower-income countries is 8.9 percentage points (or
    61%) greater than higher-income countries.
  6: The paper projects reductions in income of 19% due to climate change. Historically,
    empirical models only explained <5% of the variance.
  7: Potential reduction in economic damages under UN mitigation targets; Frequency
    of extreme precipitation increases with event rareness under global warming; Globally
    unequal effect of extreme heat on economic growth; National attribution of historical
    climate damages; Shifts in national land use and food production after a climate
    tipping point; Economic cost of coastal flooding; The causal effect of environmental
    catastrophe on long-run economic growth.
  8: The paper mentions calculating annual measures of daily temperature variability
    and the number of wet days, providing equations for each.
  9: "The paper uses the 99.9th percentile of historical (1979\u20132019) daily precipitation."
  10: Uses coefficients estimated from equation (10) and supplementary tables 2-4
    to project future climate damages. Reports percent changes through GRPpc growth
