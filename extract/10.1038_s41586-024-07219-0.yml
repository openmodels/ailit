    \ a likely range of 3.8\u201314.7 percentage points across the uncertainty sampling\
    \ of our damage projections... In e ach panel, the size of e ach sc at ter point\
    \ is weighted by the national population in 2020 (from the World Bank)...E stimate\
    \ s of the me dian proje c te d change in national income per c apit a across\
    \ emission scenarios (RCP 2 .6 and RCP8 . 5) as well as climate model, empirical\
    \ model and model parameter uncer tainty...sub-national estimates typically show\
    \ a steeper temperature response... This implies that those countries that will\
    \ suffer the most from the damages already committed are those that are least\
    \ responsible for climate change and which also have the least resources to adapt\
    \ to it."
  6: "Source material here.\nEvaluation overview: \"Compared with the fraction of\
    \ variance explained by the empirical models historically (<5%), the projection\
    \ of reductions in income of 19% may seem large.\"\nDrivers of Risk: \"This arises\
    \ owing to the fact that projected changes in climatic conditions are much larger\
    \ than those that were experienced historically, particularly for changes in average\
    \ temperature.\"\nQuantitative material: \"Compared with the fraction of variance\
    \ explained by the empirical models historically (<5%), the projection of reductions\
    \ in income of 19% may seem large.\"\nMethodology: \"Given the nonlinear response\
    \ of economic output to annual mean temperature, this is a conservative choice\
    \ that limits the magnitude of damages that we project.\"\nHighlights: \"We find\
    \ that the economic damages resulting from climate change until 2049 are those\
    \ to which the world economy is already committed and that these greatly outweigh\
    \ the costs required to mitigate emissions in line with the 2\u2009\xB0C target\
    \ of the Paris Climate Agreement.\"\n"
