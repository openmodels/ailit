    \ 3,500.\"\n\"Droughts follow, with slightly more than 2 billion people impacted.\"\
    \n\"The disasters listed on the y-axis include: ... Floods ... Droughts ... Storms\
    \ ...\"\n"
  5: "yaml\nEvaluation overview: According   to   the   framework   of   Section \
    \  2,   damages   due   to   natural disasters will be, ceteris paribus, harsher\
    \ in unequal societies relative to more equal ones.\nDrivers of Risk: The   first\
    \   is   the   sum   of   all   events   in   each   country/year   both   taken\
    \   all together and, in line with the distinction applied to the dependent var-\
    \ iable, disentangled into wet and dry typologies. The second is the cu- mulative\
    \ effect of the repeated exposure to extreme events in previous years. To  capture\
    \  the  geographical  dimension  of   climate,  we  include  two dummy  variables\
    \  related  to  the  presence  of  Oceanic  Ni \u02DCno  Index  (ONI) (Source:\
    \ National Oceanic and Atmospheric Administration, NOAA).\nQuantitative material:\
    \ For   the   purposes   of   the   analysis,   we   compute   a   measure   of\
    \   ethnic inequality representing the cumulative size of the discriminated ethnic\
    \ groups with respect to total population in a given country and year.\nMethodology:\
    \ Since the error terms of the two equations are correlated, a standard OLS estimator\
    \ does not satisfy the condition of independence of errors. Zellner and Theil\
    \ (1962) posit that the adoption of a Three-Stage Least Square (3SLS) estimator\
    \ ensures that independence conditions are not violated.\nHighlights: According\
    \   to   the   framework   of   Section   2,   damages   due   to   natural disasters\
    \ will be, ceteris paribus, harsher in unequal societies relative to more equal\
    \ ones. Further, damages due to a natural disaster lead, everything else being\
    \ equal, to increasing inequality.\nMore Notes: To account for disasters\u2019\
    \ patterns and geographical location, we include two controls specifically related\
    \ to the frequency of disasters... To capture the geographical dimension of climate,\
    \ we include two dummy variables... The third group of country-based control variables\
    \ in the disaster equation includes two factors to account for damage magnitude...\
    \ The fourth group of covariates captures social norms that influence income inequality\
    \ and that are also expected to indirectly influence vulnerability to disasters.\n"
