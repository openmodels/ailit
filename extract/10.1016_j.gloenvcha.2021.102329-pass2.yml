Drivers of Risk:
  1: Climate change-induced natural disasters are identified as the primary drivers
    impacting income inequality and vulnerability.
  2: Shocks such as natural disasters, including floods, windstorms, and landslides,
    are discussed as impacting outcomes.
  3: Natural disasters such as floods, landslides, storms, droughts, extreme temperatures,
    and wildfires are considered as drivers of risk.
  4: Natural disasters such as floods, storms, droughts, extreme temperatures, wildfires,
    and landslides are identified as significant drivers of risk.
  5: "Frequency of disasters (wet and dry typologies), cumulative effect of repeated\
    \ exposure to extreme events, Oceanic Ni\xF1o Index (El Ni\xF1o and La Ni\xF1\
    a conditions)."
  6: "The drivers of risk considered are disasters frequency (No. disasters, No. dry\
    \ disasters, No. wet disasters, Stock disasters, Stock dry disasters, Stock wet\
    \ disasters), El Ni\xF1o and La Ni\xF1a events."
  7: "The paper examines the impact of El Ni\xF1o and La Ni\xF1a as climatic factors.\
    \ It also explores the influence of the number of disasters experienced by a country,\
    \ both in the current and past years. Other risk factors include GDP per capita,\
    \ public expenditure, land area, and rural population."
  8: Increased inequality is identified as a driver of higher disaster impacts due
    to unequal access to precaution and prevention measures.
  9: "El Ni\u02DCno, La Ni\u02DCna, number of disasters, stock of disasters"
  10: The paper considers all disasters, dry disasters, and wet disasters as drivers
    of risk.  It also considers climate-related features and geographical features.
  11: The study identifies extreme climatic events (floods, storms, droughts) as drivers
    of risk, exacerbated by socioeconomic factors and inequality.
Evaluation overview:
  1: The paper evaluates the impact of climate change-induced natural disasters on
    income inequality and the number of people affected by these disasters.
  2: The paper discusses outcomes related to inequality, income, and poverty in the
    context of natural disasters.
  3: The analysis evaluates the impact of natural disasters in terms of death toll
    and number of affected individuals.
  4: The paper discusses the impact of natural disasters on societies, including the
    consequences for socioeconomic conditions and inequality.
  5: Damages due to natural disasters.
  6: The study evaluates the impact of natural disasters on mortality and affected
    populations, normalized by the previous year's population (HIT, D_HIT, W_HIT).
  7: The paper evaluates the number of people hit by natural disasters (normalized
    by country population) and the Gini index (inequality).
  8: The paper evaluates the relationship between inequality (Gini index) and the
    number of people affected by natural disasters.
  9: Number of persons hit by disasters, normalised.
  10: The paper evaluates the impact of different types of disasters on income inequality
    (Gini index).
  11: The study evaluates the impact of climate change-induced disasters, specifically
    wet disasters, on the vulnerability and recovery of countries.
Highlights:
  1: The study finds that higher levels of income inequality increase damages from
    natural disasters and the number of people affected, creating a disaster-inequality
    trap.
  2: The impact of natural disasters is uneven across different socio-economic groups,
    and higher income inequality is associated with higher death tolls from natural
    disasters.
  3: The main outcome of the analysis is that unequal societies suffer greater physical
    damages and increased income inequality due to natural disasters.
  4: Floods are the most common type of disaster and affect the largest number of
    people, while droughts, storms, extreme temperatures, and wildfires also have
    significant impacts.
  5: Damages due to natural disasters will be, ceteris paribus, harsher in unequal
    societies relative to more equal ones; damages due to a natural disaster lead,
    everything else being equal, to increasing inequality.
  7: The Gini index and the number of people hit by disasters are consistently significant
    in the models, suggesting a relationship between inequality and disaster impact.
  8: Higher inequality leads to more people being affected by natural disasters, and
    disasters subsequently increase inequality.
  9: "La Ni\u02DCna has a positive effect, especially for wet disasters. Countries\
    \ with higher shares of rural population are more exposed to high impacts on human\
    \ activities."
  10: Wet disasters have a much higher impact on income inequality than dry disasters.
    Marginalization in ethnic groups affects income distribution in the event of frequent
    and repeated wet disasters. The impact of past shocks is statistically significant
    only for wet events. Richer economies are more resilient to disasters, while the
    frequency of disasters disproportionately affects poorer societies with high-income
    inequality.
  11: Countries with higher levels of inequality are more likely to be trapped in
    a vicious cycle where recurrent climate-related disasters undermine their ability
    to recover and prepare for future events.
Methodology:
  1: A simultaneous equations approach is used to account for both directions of causality
    between natural disasters and income inequality.
  2: The page mentions the use of case studies based on quasi-experimental methods
    and counterfactual analysis of natural disasters.
  3: The analysis uses a panel database of 149 countries from 1992 to 2018 to understand
    the impacts on inequality and resilience.
  5: The paper uses a Three-Stage Least Square (3SLS) estimator to address the correlation
    between error terms in simultaneous equations modelling the mutual effects between
    damages due to natural disasters and inequality.
  6: The study uses panel data regression analysis with country fixed effects and
    exogenous instruments to address endogeneity issues, testing for endogeneity with
    a Sargan test. The analysis uses data from 4,023 observations.
  7: The paper uses a system of equations (equations 2 and 3) with country and year
    fixed effects. Instrumental variable approach using distance from the equator.
    They also use the Akaike Information Criterion (AIC) and the Bayesian Information
    Criterion (BIC) to control general estimation fit. Multicollinearity is tested
    with the Variance Inflation Factor (VIF).
  8: The analysis uses baseline models to test hypotheses regarding inequality and
    its effects on disaster impacts, utilizing a panel structure for intertemporal
    effects.
  9: Regression analysis with different model specifications (1-10) considering all
    disasters, dry disasters, and wet disasters; inclusion of continent and year dummies
    in some models.
  10: The analysis uses regression models to assess the relationship between disaster
    types, socioeconomic factors (GDP per capita, HDI, public expenditure, institutional
    quality, ethnic marginalization), and income inequality.  It uses data from 3419
    observations and analyzes these factors with one-year lags. The paper also computes
    marginal effects based on partial derivatives to capture a non-linear effect.
  11: The analysis explores empirical associations between natural disasters, inequality,
    and socioeconomic factors between 1992 and 2018.
More Notes:
  2: Discusses the relationship between economic development levels, income inequality,
    and the impact of natural disasters.
  3: The paper hypothesizes a self-reinforcing dynamic where inequality amplifies
    the magnitude of cumulative damages from repeated catastrophic events.
  5: The analysis controls for government propensity to increase resilience, ethnic
    marginalization, continent dummies, geographical dimensions of climate, surface
    area of country, share of population in rural areas, and social norms influencing
    income inequality.
  6: The paper addresses potential endogeneity issues with GDP, public expenditure,
    and other covariates by using instruments such as distance from the Equator and
    value added in agriculture.
  7: The study controls for geographic effects using continental dummies. It also
    splits the dependent variable (people hit) into dry and wet disasters.
  8: The results emphasize the role of gender equality in reducing disaster impacts,
    with an inverted U-shaped relationship between development level and damage magnitude.
  9: The analysis includes various socioeconomic factors (Gini coefficient, GDP per
    capita, GNHDI, public expenditure, public investment) as controls in the disaster
    equation.
  11: The authors emphasize the need to consider natural disasters as a combination
    of climatic and socioeconomic factors for effective climate change impact modeling
    and policy development.
Quantitative material:
  1: The analysis uses a panel of 149 countries from 1992 to 2018 to analyze the relationship
    between disasters and inequality.
  3: No quantitative information is provided on this page.
  4: The paper provides quantitative data on the number of natural disaster events
    by type and the number of people affected by these disasters.
  5: The paper computes a measure of ethnic inequality representing the cumulative
    size of the discriminated ethnic groups with respect to total population.
  6: Provides descriptive statistics (Mean, Std. Dev., Min, Max) for various variables
    including disaster-related variables, socioeconomic indicators, and geographic
    controls.
  7: The paper presents regression results (Table 2a) with coefficients and significance
    levels for various factors affecting the number of people hit by natural disasters.
    For example, the Gini index coefficient is reported as 0.004*** in model (1).
  8: A 1% increase in the Gini index corresponds to a 3.7% increase in the number
    of people affected by disasters for countries at the 75th percentile compared
    to the 25th percentile.
  9: Table 3a presents coefficient estimates from various regression models, indicating
    the impact of climatic and geographical factors on the number of persons affected
    by disasters. Statistical significance is indicated by asterisks (* p < 0.1, **
    p < 0.05, *** p < 0.01).
  10: The paper includes a table (Table 3b) showing the coefficients, standard errors,
    and significance levels for various climatic and geographical controls on the
    Gini index. It also shows AIC and BIC values, RMSE and mean VIF.
  11: The study presents predicted margins for 'W_HIT' (normalized number of flood
    affected people) with respect to the stock of wet disasters for different inequality
    levels (Gini index quartiles).
sourcematerial:
  1: 'Source material: "The purpose of the present paper is to disentangle the mechanisms
    that connect climate change-induced disasters, inequality and vulnerability by
    accounting for both directions of causality. We do so by means of a simultaneous
    equations approach on a panel of 149 countries from 1992 to 2018. The empirical
    analysis reveals that countries with higher levels of income inequality suffer
    greater damages when hit by a natural disaster. At the same time, inequality is
    found to increase the number of people affected by disasters."'
  2: 'Source material: Depending on geography. To. illustrate, countries in high latitudes
    have been found to benefit from global warming at the expense of countries in
    lower latitudes (Diffenbaugh and Burke, 2019). Kellenberg and Mobarak (2008) show
    that the relationship between economic development and disaster risk associated
    to flooding, landslides and windstorms has an inverted U shape. This implies that
    at early stages of development the risk of damage is high because investments
    in preventive measures may not suffice to preserve productive assets. As countries
    move to later stages of development, the risk of damage is lower due to greater
    affordability of precautionary measures... Another issue of interest is that the
    impact of natural disasters is uneven across segments of the population within
    a country (Benson et al., 2001; Deuchert and Felfe, 2015; Heijmans, 2001; Sakai
    et al., 2017). Empirical studies on this usually fall in one of two categories.
    One strand of research consists of case studies based on quasi- experimental methods
    to compare growth and inequality before and after specific events. Natural disasters
    are classic exogenous shocks that are amenable to natural experiments and counterfactual
    type of analysis... Kahn (2005) finds that the death toll is lower in richer countries,
    after controlling for population and number of disasters per year, due to availability
    of prevention measures and of stricter law enforcement. Furthermore, higher income
    inequality is associated with higher death tolls from natural catastrophes...'
  3: "Source material\nEvaluation overview: \"represents the impacts of disasters\
    \ as the sum of death toll and people affected by each event.\" Drivers of Risk:\
    \ \"We focus on a subset of climate-related natural disasters, namely: floods,\
    \ landslides and storms (\u201Cwet disasters\u201D) and droughts, extreme temperatures\
    \ and wildfires (\u201Cdry disasters\u201D).\" Quantitative material: \"No quantitative\
    \ information is provided on this page.\" Methodology: \"Our analysis is based\
    \ on a panel database of 149 countries over the period 1992\u20132018.\" Highlights:\
    \ \"Hypothesis 1. Unequal societies suffer greater physical damages due to natural\
    \ disasters. Hypothesis 2. Natural disasters increase income inequality.\" More\
    \ Notes: \"Further, we propose that a self-reinforcing dynamic may be at play\
    \ whereby income inequality amplifies the magnitude of cumulative damages in locations\
    \ that have suffered repeated catastrophic events.\"\n"
  4: " \n\"Fig. 3. Number of natural disasters by continent 1992\u20132018 (normalized\
    \ by land area) Source: authors\u2019 elaboration on EM-DAT and WDI.\"\n\"The\
    \ first three sets concern the analysis of disaster magnitude and include socioeconomic\
    \ variables; frequency of climate-related disasters and other climate-sensitive\
