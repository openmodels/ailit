Drivers of Risk:
  1: Climate tipping points such as thawing permafrost and dissociation of ocean methane
    hydrates are identified as drivers of increased economic losses.
  2: Tipping points impacting outcomes include dissociation of ocean methane hydrates,
    permafrost carbon feedback, disintegration of ice sheets, variability of the Indian
    summer monsoon, and dieback of the Amazon rainforest.
  3: Tipping points (TPs) in the climate system, such as Permafrost carbon release,
    Ocean methane hydrates dissociation, weakening of the Atlantic Meridional Overturning
    Circulation (AMOC), and changes in the Indian summer monsoon.
  4: Climate tipping points are the primary drivers of risk, affecting the SCC and
    consumption.
  5: Tipping points, specifically disintegration of the Greenland Ice Sheet (GIS)
    and West Antarctic Ice Sheet (WAIS), permafrost carbon feedback, dissociation
    of ocean methane hydrates, slowing of the Atlantic Meridional Overturning Circulation
    (AMOC), and weakening of the Southern Annular Mode (SAF).
  6: The evaluation considers climate tipping points, which affect additional warming,
    sea level rise, and glacier change.
  7: Climate tipping points such as permafrost carbon feedback, ocean sediments, AMOC
    slowdown, and the variability of the Indian Summer Monsoon are identified as drivers
    of risk.
  8: 'The paper considers the following tipping points: permafrost carbon feedback,
    dissociation of ocean methane hydrates, Arctic sea ice loss, dieback of the Amazon
    rainforest, disintegration of the Greenland Ice Sheet (GIS) and West Antarctic
    Ice Sheet (WAIS), slowdown of the Atlantic Meridional Overturning Circulation
    (AMOC), and variability of the Indian summer monsoon.'
Evaluation overview:
  1: The paper provides an overview of economic impacts of climate tipping points
    with an emphasis on the social cost of carbon.
  2: The economic impact is evaluated through the Social Cost of Carbon (SCC), which
    measures the economic cost of emitting one additional ton of CO2.
  3: The outcome being evaluated is the Social Cost of Carbon (SCC) in US dollars
    per ton of CO2.
  4: The study evaluates the impact of climate tipping points on the social cost of
    carbon (SCC) and global mean consumption per capita.
  5: Welfare changes, consumption losses, and social cost of carbon (SCC) are evaluated.
  6: The page evaluates the economic impacts of climate tipping points on global consumption
    per capita, focusing on additional warming, sea level rise, and damages.
  7: The analysis provides an overview of the economic impacts of climate tipping
    points, particularly their effect on the Social Cost of Carbon (SCC) and associated
    climate damages.
  8: The study estimates the Social Cost of Carbon (SCC).
Highlights:
  1: The study finds that climate tipping points increase global economic risk and
    contribute to significant economic losses almost everywhere.
  2: The dissociation of ocean methane hydrates and permafrost carbon feedback are
    major contributors to the increase in SCC, while the slowdown of the AMOC and
    SAF reduce the SCC.
  3: Tipping points collectively increase the expected SCC, with some individual tipping
    points having positive and others negative effects. The effect of all tipping
    points combined increases the expected SCC marginally to 26.9% when incorporating
    global nonmarket damages. The impact of tipping points on the SCC is sensitive
    to assumptions about risk aversion and the structure of climate damages (level
    vs. growth rate impacts).
  4: Tipping points increase the overall level of risk borne by the world economy
    and increase future consumption risk. Tipping points do not materially alter how
    climate change affects income inequality.
  5: "Tipping points generally increase warming and sea level rise. The effect of\
    \ tipping points is to reduce the temperature response to GHG emissions beyond\
    \ c. 7\u25E6C warming in the absence of tipping points. AMOC slowdown benefits\
    \ Europe, while parts of central Asia see increased climate damages.  Disintegration\
    \ of the GIS and WAIS primarily affects countries with low-lying coastal populations;\
    \ other tipping points primarily affect temperature, dependent on optimum temperature\
    \ and latitude."
  6: The scatter plots show the relationships between baseline conditions without
    tipping points and additional impacts from tipping points, suggesting significant
    economic impacts.
  7: Climate tipping points increase the Social Cost of Carbon and economic costs
    almost everywhere, while the associated risks impact financial markets and exacerbate
    existing economic challenges.
  8: The permafrost carbon feedback results in additional CO2 and CH4 emissions. Dissociation
    of ocean methane hydrates results in additional CH4 emissions. Arctic sea ice
    loss changes radiative forcing. Dieback of the Amazon rainforest releases CO2.
    Disintegration of the GIS and WAIS increases sea level rise (SLR). Slowdown of
    the AMOC modulates the relationship between global mean surface temperature and
    national mean surface temperature. Variability of the Indian summer monsoon directly
    affects GDP per capita in India.
Methodology:
  1: The analysis uses a meta-analytic integrated assessment model with a modular
    structure, incorporating detailed econometric evidence and simulation modeling.
  2: A meta-analytic IAM using Monte Carlo simulations combines replicas of various
    tipping point modules from the literature to estimate impacts on the SCC.
  3: The expected SCC is computed over 10,000 Monte Carlo draws. The analysis uses
    RCP4.5-SSP2 emissions and GDP/population growth scenarios. It incorporates models
    and data from Hope and Schaefer, Whiteman et al., and IPSL.
  4: The analysis uses a meta-analytic integrated assessment model (IAM) with country-level
    resolution and Monte Carlo simulations to estimate national SCCs and the impact
    of tipping points.
  5: Monte Carlo simulations (sample size 10,000 with 0.1% trimmed) using RCP4.5-SSP2
    emissions and GDP/population growth. Hope and Schaefer PCF, Whiteman et al. beta
    OMH, and IPSL AMOC hosing are used.
  6: The analysis uses 1,000 Monte Carlo simulations for each RCP4.5 and RCP8.5 emissions
    scenarios, sampling data at decadal intervals from 2020 to 2200.
  7: The analysis uses a meta-analytic Integrated Assessment Model (IAM) with exogenous
    greenhouse gas emissions projections from RCP/SSP databases, a carbon cycle model
    using FAIR, and nonlinear statistical downscaling for temperature damages.
  8: The SCC is estimated by running the model twice, once with and once without an
    additional pulse of emissions in 2020. The SCC is the scaled difference in welfare
    between the two runs per ton of CO2 emissions, based on Monte Carlo simulations
    with a sample size of 10,000. Savings rates are estimated using World Bank data
    from 2005 to 2015.
More Notes:
  3: Interactions between tipping points can offset each other. The study explores
    uncertainty analysis to explore robustness as well as tail risks.
  4: "The study considers uncertainty in parametric assumptions and scenarios, including\
    \ different emissions pathways and climate models. The study finds that the impact\
    \ of tipping points on the SCC is relatively robust to variations in the parameter\
    \ \u03D5 (representing the split between level and growth damages) across most\
    \ of its range."
  5: The reduced-form climate tipping point damage function could be integrated in
    other Integrated Assessment Models (IAMs).
  8: Model data is available on GitHub.
Quantitative material:
  1: Climate tipping points increase the social cost of carbon by approximately 25%
    in the main specification, with a 10% chance of more than doubling it.
  2: Combining all eight tipping points increases the expected SCC by 24.5%; specific
    contributions include a 13.1% increase from ocean methane hydrates and an 8.4%
    increase from permafrost carbon feedback.
  3: The SCC is estimated to be $52.03 US$/tCO2 without considering tipping points.
    The inclusion of all tipping points increases the expected SCC to $64.80 US$/tCO2,
    a 24.5% increase. Individual tipping points can increase or decrease the expected
    SCC (e.g., Permafrost carbon +8.4%, AMOC -1.4%). Considering only costly tipping
    points, the increase is 28.9%. A high risk aversion scenario leads to a 58.2%
    increase, though this is driven by a small number of high-impact runs.
  4: Expected increase in the SCC of 42.8% due to climate tipping points (95% CI of
    -0.3 to +186.0%). The Gini coefficient of national SCCs is 0.64 with tipping points
    and 0.66 without. Correlation between GDP per capita and national SCCs is -0.326
    without tipping points and -0.335 with tipping points. Tipping points increase
    the coefficient of variation in global mean consumption per capita by 79% in 2050
    and 34% in 2100.
  5: "Tipping points reduce global consumption per capita by around 1% upon 3\u25E6\
    C warming and by around 1.4% upon 6\u25E6C warming. In some runs, damages exceed\
    \ 4%. A linear fit of the SLR data implies 61% more SLR at any given level. 2\u25E6\
    C warming in the absence of tipping points corresponds to 2.3 \u25E6C warming\
    \ in the presence of tipping points."
  6: The analysis quantitatively investigates effects using equations derived from
    quadratic and linear fits for temperature, SLR, and glacier changes.
  8: The elasticity of marginal utility of consumption is triangularly distributed
    with a minimum of 0.5, mode of 1.5, and maximum of 2. The pure rate of time preference
    is triangularly distributed with a minimum of 0.1%, mode of 1%, and maximum of
    2%.
