  2: 'Source material: "Our main economic impact metric is the SCC, the economic cost
    of emitting one additional ton of CO2 (i.e., the marginal damage cost)." "The
    individual tipping points contributing most to the increase in the SCC are dissociation
    of ocean methane hydrates, which in itself increases the expected SCC by 13.1%,
    and the permafrost carbon feedback (+8.4%)." "Combining all eight tipping points
    increases the expected SCC by 24.5%." "These results derive from a Monte Carlo
    simulation with a sample size of 10,000." "Therefore, we developed a method to
    synthesize this literature: a meta-analytic IAM that includes replicas of each
    tipping point module in the literature and integrates them into one consistent
    framework."'
