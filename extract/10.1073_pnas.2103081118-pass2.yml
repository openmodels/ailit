  4: "Almost all countries (98%) see their SCC increase. While the size of the increase\
    \ varies from country to country, tipping points do not materially alter how climate\
    \ change affects income inequality. One way to measure this is by computing the\
    \ Gini coefficient of national SCCs. We calculate this to be 0.64 when tipping\
    \ points are included, compared with 0.66 without tipping points. Across all parametric\
    \ and scenario uncertainties, we estimate an expected increase in the SCC of 42.8%\
    \ due to climate tipping points. We estimate a 95% CI of -0.3 to +186.0%. The\
    \ correlation (population weighted) between national GDP per capita (2020; purchasing\
    \ power parity) and national SCCs is \u22120.326 in the absence of tipping points;\
    \ more developed countries experience a lower SCC, and the impacts of climate\
    \ change are thus regressive. Tipping points increase this negative correlation\
    \ only very slightly to \u22120.335. Tipping points increase the coefficient of\
    \ variation by 79% in 2050 and 34% in 2100. The analysis uses a meta-analytic\
    \ IAM with country-level resolution and Monte Carlo simulations to estimate national\
    \ SCCs. This suggests that tipping points have consequences for the overall level\
    \ of risk borne by the world economy in the future."
