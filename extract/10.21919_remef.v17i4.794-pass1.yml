Drivers of Risk:
  1: Rising temperatures, droughts, extreme rainfall, and rising sea levels.
  2: Extreme events (heat waves, drought, extreme precipitation, hurricanes, etc.)
    have increased since the 1950s and they are projected to continue to increase
    according to the level of future warming; compound extreme events (i.e. drought
    and heatwaves) have also increased in recent decades.
  3: Global warming, driven by continued growth of GHG emissions, is leading to climate-related
    disasters, threatening human life, the economy, and lifestyles.
  4: Climate change impacts include shifted rainfall patterns and warming in the Arctic.
  5: Climate change impacts such as sea level rise, wildfires, droughts, and extreme
    weather events are affecting North America.
  6: Increased average temperatures, extreme events (tropical storms, hurricanes,
    fires, heat waves, droughts, floods, wildfires), rising sea levels, and ocean
    acidification due to increased carbon dioxide.
  7: Key drivers of risk include increased storm surge and wind risk from tropical
    cyclones, urban sprawl exposing more assets to thunderstorms, and climate change
    leading to more frequent droughts and heat waves.
  8: Risks include heatwaves, drought, storms, extreme precipitation, and compound
    events impacting energy facilities in North America.
  9: Higher temperatures and heat waves impact productivity and investment; extreme
    weather affects businesses and tourism.
  10: The paper identifies changes in temperature and precipitation as drivers of
    water-borne diseases, acute respiratory tract infections, nutritional issues,
    dengue, and asthma. It also mentions extreme events (heatwaves or hurricanes)
    and indirect factors like malnutrition and anxiety about climate change.
  11: Mentions climate change-related occurrences like droughts, floods, rising temperatures,
    and ocean acidification impacting agriculture, fisheries, and infrastructure.
  14: The paper highlights climate impacts affecting key economic sectors, financial
    markets, government budgets, and household welfare, noting that high exposure
    or sensitivity to these impacts leads to larger losses and adaptation costs.
  15: Increasing global warming
Evaluation overview:
  1: Impacts of climate change; adaptation to climate change; risks; vulnerabilities;
    economic and financial dimensions.
  2: No relevant information
  3: Climate change is considered a threat to human wellbeing and planetary health,
    with impacts on ecosystems, biodiversity, and societies.
  4: No specific outcomes like mortality or productivity loss are discussed on this
    page.
  5: No explicit outcomes like mortality or productivity loss are discussed in this
    page.
  6: The page discusses impacts on ecosystems, biodiversity, society, agriculture,
    food security, and coastal urban areas in North America.
  7: The page discusses financial losses due to storms, tropical storms, thunderstorms,
    droughts, and heat waves, including the impact on infrastructure, economic sectors,
    social wellbeing, and security.
  8: No overview of specific outcomes like mortality or productivity loss is provided.
  9: Climate change impacts productivity and investment in GDP and tourism.
  10: The paper discusses the health implications of climate change in North America,
    noting a lack of comprehensive assessment at the national and subnation level
    in the three countries.
  11: Discusses impacts of climate change on food production, infrastructure, and
    agriculture in North America.
  14: The paper provides an overview of climate impacts on the economy, social wellbeing,
    and ecosystems in North America, noting differences across Canada, the USA, and
    Mexico.
  15: Declining yields in economic activities, aggravating conditions in social wellbeing,
    and increasing degradation of ecosystem caused by climate change
Highlights:
  1: Increasing frequency and severity of extreme events throughout North America;
    without immediate action, adaptation will be more difficult and costly; need to
    delve into impacts at the subnational level.
  2: Global warming is occurring faster than anticipated in recent years and it is
    a phenomenon without precedents in the last 2000 years; every increase in global
    warning will cause more changes in the mean temperature, precipitation, and soil
    humidity in regions of the world and every ton of CO2 emissions increases global
    warming.
  3: There is a small window (approximately 10 years) to enhance responses to climate
    change in both mitigation and adaptation, with emphasis on Climate Resilience
    Development (CRD).
  4: The region is a significant contributor to global GHG emissions, with the US
    historically being a major emitter.
  5: North America has seen severe damage from extreme weather, including floods,
    storms, droughts, heat waves, and wildfires.
  6: Extreme events in North America are becoming more intense and frequent, posing
    significant threats to climate change adaptation. Agriculture and food security
    are severely impacted by changes in temperature and precipitation. Rising sea
    levels and ocean acidification are also highlighted as major concerns.
  7: The paper highlights the significant vulnerability of coastal regions to tropical
    cyclones, the increasing losses due to thunderstorms, and the severe impacts of
    droughts and heat waves on various sectors.
  8: Observed climate impacts like heatwaves and extreme temperatures have affected
    electricity facilities, and projected impacts include further disruption to energy
    infrastructure and increased electricity demand.
  9: Climate change will have significant differentiated impacts in North America,
    with Mexico showing the highest vulnerability among examined countries.
  10: The paper emphasizes that mental health consequences of climate change have
    received little attention in Mexico.
  11: Climate change impacts agriculture, fisheries, livestock, and infrastructure
    in North America, potentially increasing costs and causing economic and social
    disruptions.
  14: The paper underscores the urgency for immediate adaptation actions in North
    America, noting challenges such as domestic political constraints, ideological
    positions, and the lack of attention to adaptation compared to mitigation.
  15: Attention to adaptation continue to be limited, short-term focused, fragmented
    or even inexistent in many cases. Scientific evidence seems to have had limited
    impact in decision making by significant parts of the public, private and social
    sector.
Methodology:
  1: Reflection on evidence produced by Working Group 2 of the IPCC in relation to
    the North American region (Canada, USA, Mexico), based on impacts and adaptation
    assessments revised in the available literature.
  2: Summarizes key messages of IPCC Sixth Assessment Reports; Presents selected data
    and information of North America as a context for the paper; Addresses scientific
    background of climate change in this region; Considers the challenge of climate
    change for economic growth in North America; Briefly discusses financial options
    for mitigation and adaptation.
  4: No specific methodology is described on this page.
  6: The page provides an overview of climate hazards affecting North America. It
    refers to the IPCC AR6 report (2022) and draws upon scientific evidence of extreme
    events.
  8: No specific methodology for analysis is detailed on this page.
  9: Uses a large dimensional intertemporal CGE trade model analyzing global warming
    effects on GDP growth for 139 countries.
More Notes:
  1: The article is a reflection based on the IPCC AR6 report, focusing on the North
    American region. It highlights the need to understand climate change impacts at
    a subnational level, particularly in Mexico. It also addresses the economic and
    financial dimensions.
  2: The paper frames its discussion using the IPCC Sixth Assessment Report and focuses
    on North America.
  4: North America has a diverse climate, encompassing a range of climate zones and
    experiencing the impacts of climate change.
  5: The paragraph mentions uncertainties in regional climate projections and outlines
    that Indigenous peoples and urban areas are particularly vulnerable.
  8: No other concrete notes are provided.
  10: The paper points out the emergence of infectious diseases spreading northward
    from the U.S. or introduced via air or sea transport into Canada, including tick-borne
    and mosquito-borne diseases, and increased foodborne illnesses. It also notes
    the public health response to climate change in the U.S. has been promising in
    assessment, mixed in policy development, and relatively weak in communication,
    workforce development, and evaluation.
  14: The paper emphasizes the uneven advancement of system transformations for adaptation
    across North America, with Canada having a more balanced approach compared to
    the US and Mexico.
  15: Highlights negative consequences of inaction, particularly for the most vulnerable
    groups.
Quantitative material:
  2: No relevant information
  3: GHG emissions grew to a historical level between 2010 and 2019; 3.3 to 3.6 billion
    people live in regions highly vulnerable to climate change.
  4: The region contributes to one-third of global GHG emissions.
  5: Northern Mexico could experience a temperature increase of 3 to 4 degrees Celsius
    by the end of the century.
  6: "Mentions that the intensity of tropical cyclones can affect 60% of the national\
    \ territory (Mexico). States such as Jalisco, the State of Mexico, Nayarit, Morelos,\
    \ Michoac\xE1n, Guerrero and Colima could lose between 30 and 40% of their seasonal\
