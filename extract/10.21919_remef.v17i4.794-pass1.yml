  2: 'Source material here.

    "Extreme events (heat waves, drouth, extreme precipitation, hurricanes, etc.)
    have increased since the 1950s and they are projected to continue to increase
    according to the level of future warming; compound extreme events (i.e. drought
    and heatwaves) have also increased in recent decades."

    "Summarizes key messages of IPCC Sixth Assessment Reports; Presents selected data
    and information of North America as a context for the paper; Addresses scientific
    background of climate change in this region; Considers the challenge of climate
    change for economic growth in North America; Briefly discusses financial options
    for mitigation and adaptation."

    "Global warming is occurring faster than anticipated in recent years and it is
    a phenomenon without precedents in the last 2000 years; every increase in global
    warning will cause more changes in the mean temperature, precipitation, and soil
    humidity in regions of the world and every ton of CO2 emissions increases global
    warming."

    "The repeated call for action from United Nations is now strongly supported by
    the recent publication of the International Panel on Climate Change (IPCC)."

    "The following key massages emerging from the IPCC Sixth Assessment Reports are
    essential to be included in the way societies manage growth in coming decades."

    "This article addresses some of the implications of climate change in North America
    and its economic dimension."

    '
  3: 'Source material here.

    "Global warming has already caused extensive and dangerous alteration to nature
    and affected the life of millions of people in all regions of the planet. Observed
    impacts and projected risks on ecosystems and biodiversity indicate the support
    they provide to main human life and the economy in the planet is at risk. The
    growing number of climate related disasters in all regions are also an indicator
    of the threat to human life, the economy, and our lifestyles."

    "Unfortunately, IPCC also reports that GHG emissions have continued to grow, and
    they achieved an historical level between 2010 a 2019."

    "IPCC estimates that between 3.3 and 3.6 billion people live currently in regions
    and places with high vulnerability to climate change."

    "IPCC considers there is a small window of opportunity (approximately 10 years)
    to strengthen and enhance responses to climate change both mitigation and adaptation."

    "WGII highlights Climate Resilience Development (CRD) as an operational concept
    that combines adaptation and mitigation actions to enhance opportunities for sustainable
    development in the short-term and long-term."

    '
  4: '

    In climate terms, the region        encompasses diverse climate zones and weather...
    Over the past decades, the region has been suffering, likewise many other world
    regions, the impacts of climate change. Climate change is already being observed
    in North America, including shifted rainfall patterns and dramatic warming in
    the Arctic. (IPCC, 2022, Ch. 14). The region is home to almost 515 million people,
    and it contributes to one third of the global GHG emissions. (WB, 2022). The region
    has produced a greater share of greenhouse gas emissions over time than any other
    continent and this is due mostly to the contribution of the US, historically the
    world''s largest single emitter of human-released greenhouse gases and now the
    second-largest emitter after China.

    '
  5: Climate change impacts such as sea level rise, wildfires, droughts, and extreme
    weather events are affecting North America. The growing season in the US and Canada
    has lengthened by around two days per decade since 1950. Northern Mexico could
    experience a temperature increase of 3 to 4 degrees Celsius by the end of the
    century. North America has seen severe damage from extreme weather, including
    floods, storms, droughts, heat waves, and wildfires. There are uncertainties in
    regional climate projections, and Indigenous peoples and urban areas are particularly
    vulnerable.
  6: "  \nThe latest IPCC report and its chapter on North America also consider vulnerability\
    \ to the impacts of climate change and its consequences for the well-being of\
    \ ecosystems, biodiversity, and society. Extreme events in Mexico have also increased\
    \ in the form of tropical storms, hurricanes, fires and heat waves... The intensity\
    \ of tropical cyclones can affect 60% of the national territory... At the end\
    \ of the century, states such as Jalisco, the State of Mexico, Nayarit, Morelos,\
    \ Michoac\xE1n, Guerrero and Colima could lose between 30 and 40% of their seasonal\
    \ corn production yields... The issue of rising sea levels is also highlighted\
    \ as an alarming phenomenon... In relation to the increase in the concentration\
    \ of carbon dioxide in the atmosphere, this has caused the acidification of the\
    \ oceans... There is mounting scientific evidence that climate change is already\
    \ making extreme events in North America more intense and frequent, and they pose\
    \ significant threats to future climate change adaptation agendas...\n"
  7: Storms are the primary cause of weather-related losses, accounting for 805 billion
    US dollars in total losses since 1980 and, thanks to strong insurance penetration,
    454 billion US dollars in insured losses. Nearly the whole East and Gulf Coasts
    of North America are susceptible to the effects of tropical cyclones, particularly
    if they intensify into hurricanes that combines increasing storm surge and high
    wind risk. The concentration of people and assets along the shore, coupled with
    high and likely increasing vulnerability, is a major loss driver. Thunderstorms
    represent the most significant severe weather danger for the region. Severe thunderstorms
    were responsible for 43% (or US$ 180 billion) of insured property windstorm damages
    between 1980 and 2011 only in the US. Over the past 40 years, losses brought on
    by thunderstorms have increased. Droughts and heat waves have a high potential
    for loss since they influence every sector, from agriculture to individual houses,
    infrastructure, and electricity supplies over a wide area, yet their effects are
    only gradually noticed. As climate change intensifies, crop insurance will become
    even more important but not sufficient. Changes in crops and agricultural practices
    are needed to adapt to new growing conditions in several part of North America.
  8: 'Source material here.

    - "Observed climate impacts (i.e., heatwaves, drought, storms, extreme precipitation)
    illustrate current vulnerability of energy facilities in several parts of North
    America."

    - "Projected impacts of extremes events will affect North America regions both
    in energy infrastructures as well as consumption."

    - "For example, the economic impact of climate change risks on power systems in
    the U.S. is estimated to reach $50 billion by 2050 (Jaglom et al., 2014)."

    - "Heat waves and extreme temperature have impacted electricity facilities in
    almost all subregions of North America."

    - "Drought is a major hazard, particularly in the case of compound events (heat
    waves and drought) has already significantly affected the snowpack and melting
    patterns in the West part of the U.S. creating water stress and limiting hydroelectric
    power generation."

    '
  9: '"Productivity and investment effects are two of the primary ways that climate
    change may impact GDP in the short and long terms in the region." "Literature
    used in IPCC assessment document that global warming has a detrimental effect
    on corporate investment and productivity since higher temperatures and heat waves
    cause workers to produce less overall." "Other economic activity vulnerable to
    climate change is Tourism." "Canada would experience minor negative effects on
    GDP percentage change per year (-0.218), the U.S. a higher effect (-0.622) and
    Mexico (2.277) in the long run." "A recent study using a large dimensional intertemporal
    CGE trade model to account for the various effects of global warming..." "Climate
    change has and it will continue to have significant differentiated impact in North
    America." "Mexico was the largest tourism economy in the high vulnerable group
    of countries." '
  10: " \nClimate change extensive consequences of climate change are on health...our\
    \ research found no comprehensive assessment of the health implications of climate\
    \ change at the national and subnation level in the three countries despite the\
    \ cascading effect of the health implications of climate change and the economic\
    \ and social consequences.\n\nClimatic exposure may be direct (extreme event i.e.,\
    \ heatwaves or hurricane) or indirect (i.e., malnutrition, anxiety about climate\
    \ change).\n\nA study on the effect of higher temperatures on suicide rate in\
    \ the U.S. and Mexico found that suicide rates rise 0.7% in U.S. counties and\
    \ 2.1% in Mexican municipalities for a 1oC increase in monthly average temperature.\
    \ \n\nIPCC provided broader attention to the mental health implications of climate\
    \ change in this assessment cycle. Much of the research in this research area\
    \ has been carried out in the U.S. and the U.K. but it has received little attention\
    \ in Mexico.\n\nA recent study on the health consequences of climate change in\
    \ Canada estimates the emergence of infectious diseases northward spread from\
    \ the U.S. or introduced from other parts of the world via air or sea transport.\
    \ A recent analysis of policy action on public health in the context of climate\
    \ change in the U.S. found that the public health response to climate change has\
    \ been promising in the area of assessment, mixed in the area of policy development,\
    \ and relative weak in communication, workforce development and evaluation.\n"
  11: "  \n\"Crop-based agriculture in North America is highly dependent on climate\
    \ conditions, and climate change is projected to have a large impact on the agriculture\
    \ industry. The frequency of some catastrophic climate change-related occurrences,\
    \ such as droughts or floods, can dramatically reduce crop yields and alter crop\
    \ growth, resulting in lower crop production overall.\"  \n\"Evidence of the importance\
    \ of extreme climate events on infrastructure is clear in all regions of the world...Data\
    \  available  for  North  America  indicates  that  total  annual  damages  from\
    \  temperature- and precipitation- related damages to paved roads in the U.S.\
    \ are estimated at up to $20 billion under RCP8.5 in 2090; inland flooding threatens\
    \ approximately 4,600 bridges across the U.S., also under RCP8.5, and it is anticipated\
    \ to create annual average damages of $1.2 to $1.4 billion each year by 2050.\"\
    \  \n\"Overall, climate change may make it more challenging to cultivate crops,\
    \ raise livestock, and catch fish in the same locations and ways as in the past...\
    \ These losses can be associated to disruption, repair or complete loss of infrastructure\
    \ and they can cause significant consequences on the economy, social wellbeing,\
    \ and people\u2019s health and safety.\"\n"
  14: "Source material: It is difficult to finish this paper on a positive note. IPCC\u2019\
    s assessment clearly states that North America is experiencing more frequent and\
    \ severe climate impacts. The article summarizes some of the relevant implications\
    \ for the economy, social wellbeing, and ecosystems in the region. Our assessment\
    \ of the IPPC report suggests that system transformation to adapt to climate change\
    \ are advancing slowly and unevenly in the region. Climate change implications\
    \ for the regional economy and social wellbeing in North America deserves and\
    \ requires a broader discussion, recognizing there are significant regional differences\
    \ among and within the three countries. Development levels, technical, financial,\
    \ and human resources available, and institutional strength create different options,\
    \ capacities to respond to climate change in Canada, the USA, and Mexico. IPCC\
    \ highlights that key economic sectors, financial markets, government budgets,\
    \ and household welfare are unevenly affected by climate impacts in North America\
    \ (IPCC, 2022 Ch. 14). High exposure or sensitivity to climate impacts in economic\
    \ sectors mentioned above have experienced larger losses and adaptation costs.\
    \ IPCC assesses with high confidence that extreme events have damaged economically\
    \ important supply-chain infrastructure and disrupted regional and international\
    \ trade, increased public expenditures on emergency and recovery response, and\
    \ affected property and financial market (IPCC, 2022 Ch. 14). We would like to\
    \ come back to the introduction of this paper and recall the importance of United\
    \ Nations call for immediate action to respond to climate change. The paper leaves\
    \ no doubt this is an essential step in North America. Unfortunately, immediate,\
    \ and comprehensive adaptation actions in the region faces significant challenges.\
    \ National administrations have had different approaches to climate change due\
    \ to domestic circumstances, political constraints, and ideological positions.\
    \ It is also important to recognize that adaptation has received less attention\
    \ than mitigation in national responses to climate change, particularly in the\
    \ U.S. and Mexico. National political support to expand and improve adaptation\
    \ actions is essential but it is currently difficult to envision a significant\
    \ change in the short-term. Adaptation actions at the subnational level face also\
    \ challenges. While Canada has a more balanced approach, subnational actions in\
    \ the US are contrasting, from states and cities very engaged and advanced in\
    \ planning and implementing adaptation to others where no action has been taken\
    \ also due to political and ideological positions. For instance, a recent survey\
    \ on local adaptation to climate change of 231 cities in the U.S. reported weak\
    \ leadership, lack of funding and staffing, and low political will (Fu, 2020).\
    \ Mexico is an interesting case. Climate change policy at the national and subnational\
    \ level has had ups and downs in recent administrations. A National Climate Change\
    \ legislation and Strategy have been in place since 2012, institutions have been\
    \ created, and most states in the country have a climate change legislation and\
    \ a State Climate Change Action Program. A recent independent evaluation of the\
    \ national and subnational climate change policies identified they have had limited\
    \ achievements in adaptation. The gap between adaptation planning and implementation\
    \ is particularly evident in the local States and the very small number of municipal\
    \ climate change action programs. The urgency to adapt to climate change has gone\
    \ unattended despite the increasing cost of observed impacts and projected risks\
    \ discussed in the paper."
