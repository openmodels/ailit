  7: Since 1980, storms have caused 805 billion US dollars in total losses and 454
    billion US dollars in insured losses; thunderstorms accounted for 43% (180 billion
    USD) of insured property windstorm damages in the US between 1980 and 2011, and
    there's a 15% increase (160 billion USD) in losses from severe weather events.
  8: The economic impact of climate change risks on power systems in the U.S. is estimated
    to reach $50 billion by 2050.
  9: Canada experiences minor GDP negative effect (-0.218%), U.S. higher effect (-0.622%),
