Methodology:
  1: The paper introduces LitPop, a methodology to disaggregate asset value data proportional
    to a combination of nightlight intensity and geographical population data. The
    method uses open-source software CLIMADA.
  2: The analysis involves spatial disaggregation of national total asset values using
    nightlight intensity and population data, leading to a gridded asset exposure
    product called LitPop.
  3: "The LitPop downscaling method combines gridded nightlights and population data\
    \ to disaggregate total asset value and GDP per country to gridded asset exposure\
    \ data. GPW data is used without incorporating nightlight satellite data or other\
    \ auxiliary data sources. The Black Marble 2016 annual composite of the VIIRS\
    \ day\u2013night band (DNB) at 15arcsec resolution is used for nightlight intensity.\
    \ The World Bank\u2019s produced capital stock is used as an estimate of manufactured\
    \ or built assets per country."
  4: This paper describes the creation of a gridded asset exposure dataset for 224
    countries, used for assessing direct impacts on tangible structures. It uses gridded
    nightlights and population data, along with GDP and GDP-to-wealth ratios, to estimate
    asset values. For countries with missing produced capital data, non-financial
    wealth is used as a conservative approximation, or an average GDP-to-wealth ratio
    is applied. The dataset is at 15 arcsec resolution for nightlights and 30 arcsec
    for population.
  5: Disaggregation skill is assessed by disaggregating national GDP to grid level,
    re-aggregating for subnational regions, and computing skill metrics based on normalized
    GRP values.
  7: "National total asset values were disaggregated proportional to the distribution\
    \ of Lit1Pop1 for 224 countries and areas; the actual resolution of the underlying\
    \ gridded data is 30arcsec (~1km), while the shown dataset is scaled to 600arcsec.\
    \ Uses nightlight and population data for disaggregation. Assesses disaggregation\
    \ skill using metrics such as \u03C1, \u03B2, and RMSF."
  8: The analysis uses the LitPop methodology to create globally consistent and spatially
    resolved estimates of asset exposure value.
  9: The approach assumes a correlation between stocks and flows to indirectly evaluate
    asset exposure downscaling.
  10: LitPop does not account for differences in infrastructure types and has limitations
    in local applications, especially in low-income countries.
  11: The study develops global asset exposure estimates using a flexible and open
    methodology integrated into the CLIMADA repository, suitable for economic disaster
    risk modeling and climate change adaptation studies.
  12: The paper uses GRP data from various sources (listed in the table) for different
    countries and years, accessed around January/February 2019.
  13: No relevant information
  14: Asset exposure values are spatially distributed using nightlight intensity and
    population data, with maps provided for Mexico City and New York City showing
    exposure values in US dollars (2014).
