sourcematerial:
  1: "The modeling of climate risks on a global scale requires globally consistent\
    \ data representing hazard, vulnerability, and exposure, as defined by the Intergovernmental\
    \ Panel on Climate Change (IPCC, 2012, 2014) among others. While natural hazard\
    \ data can be derived from general circulation models, there is a lack of consistent\
    \ exposure data on a global scale. Exposure is frequently defined as an inventory\
    \ of elements at risk from natural hazards (Cardona et al., 2012; UNISDR, 2009).\
    \ For the modeling of physical risk as the direct economic impacts of disasters,\
    \ exposure should specifically represent the spatial distribution of physical\
    \ asset stock, i.e., buildings and machinery. While aggregate estimates of asset\
    \ values are available at country level, open data on the spatial distribution\
    \ of asset values are scarce. Proprietary asset exposure data (e.g., owned by\
    \ insurance companies) are usually not publicly available. We introduce a global\
    \ high-resolution asset exposure dataset responding to this challenge. The data\
    \ are produced using \u201Clit population\u201D (LitPop), a globally consistent\
    \ methodology to disaggregate asset value data proportional to a combination of\
    \ nightlight intensity and geographical population data. By combining nightlight\
    \ and population data, unwanted artefacts such as blooming, saturation, and lack\
    \ of detail are mitigated. Thus, the combination of both data types improves the\
    \ spatial distribution of macroeconomic indicators. The open-source LitPop methodology\
    \ and the publicly available asset exposure data offer value for manifold use\
    \ cases, including globally consistent economic disaster risk assessments and\
    \ climate change adaptation studies, especially for larger regions, yet at considerably\
    \ high resolution. The code is published on GitHub as part of the open-source\
    \ software CLIMADA (CLIMate ADAptation) and archived in the ETH Data Archive with\
    \ the link https://doi.org/10.5905/ethz-1007-226 (Bresch et al., 2019b). The resulting\
    \ asset exposure dataset for 224 countries is archived in the ETH Research Repository\
    \ with the link https://doi.org/10.3929/ethz-b-000331316 (Eberenz et al., 2019).\
    \ The comparison for 14 industrialized and newly industrialized countries shows\
    \ that the disaggregation skill for GDP using nightlights or population data alone\
    \ is not as high as using a combination of both data types."
  2: The core functionality of the LitPop methodology is the spatial disaggregation
    of national total asset values to obtain a gridded asset exposure product. Gridded
    nightlight intensity (Sect. 2.2) and gridded population data (Sect. 2.3) are combined
    to compute a digital number at grid cell level. Physical asset stock values (i.e.,
    produced capital, Sect. 2.4.1) are then disaggregated proportionally to the digital
    number per grid cell (Sect. 2.5). This results in the gridded asset exposure dataset
    presented here. Instead of the physical asset stock, GDP (Sect. 2.4.2) or gross
    regional product (GRP, Sect. 2.4.3) can be distributed to obtain GDP per grid
    cell. The resulting asset exposure dataset for 224 countries is made available
    online at the ETH Research Repository (Eberenz et al., 2019). It is suitable to
    provide the globally consistent asset exposure base for modeling physical risks.
  3: "Source material here.\n1. Evaluation overview: \"GDP is disaggregated in the\
    \ same way and compared against reported GRP for the evaluation of the downscaling\
    \ approach.\"\n2. Drivers of Risk: \"It has been used as an indicator of exposure\
    \ to natural disaster...Produced capital accounts for machinery, equipment, and\
    \ physical structures.\"\n3. Quantitative material: \"For example, for Canada,\
    \ population data are available down to the fifth subnational administrative unit,\
    \ of which 493185 exist.\"\n4. Methodology: \n   - \"The Gridded Population of\
    \ the World (GPW) dataset is a spatially explicit representation of the world\u2019\
    s population...Using census data or population figures by the official national\
    \ statistics offices.\"\n   - \"This allows us to enhance nightlight data with\
    \ a completely independent dataset.\"\n   - \"The nightlight intensity products\
    \ used here are nighttime lights of the Black Marble 2016 annual composite of\
    \ the VIIRS day\u2013night band (DNB) at 15arcsec resolution.\"\n   - \"The World\
    \ Bank\u2019s produced capital stock (World Bank, 2018) is one of the most comprehensive\
    \ global estimates of the value of manufactured or built assets per country.\"\
    \ \n5. More Notes: \"It also includes a fixed scale-up of 24% to account for the\
    \ value of built-up land.\"\n"
  4: "Source material here.\nThis paper describes the creation of a gridded asset\
    \ exposure dataset for 224 countries, used for assessing direct impacts on tangible\
    \ structures. It uses gridded nightlights and population data, along with GDP\
    \ and GDP-to-wealth ratios, to estimate asset values. For countries with missing\
    \ produced capital data, non-financial wealth is used as a conservative approximation,\
    \ or an average GDP-to-wealth ratio is applied. The dataset is at 15 arcsec resolution\
    \ for nightlights and 30 arcsec for population. - exposure data for the purpose\
    \ of assessing direct impact on tangible structures.\n\nThe dataset covers 224\
    \ countries, ignoring 26 due to lack of data. For some countries with neither\
    \ produced capital nor non\uFB01nancial wealth data available, an average GDP-to-wealth\
    \ ratio of 1.247 was applied. - we considered for the production of this dataset,\
    \ produced capital numbers for 2014 are available for 140 countries. For 59 of\
    \ the 87 countries with neither produced capital nor non\uFB01nancial wealth data\
    \ available, an average GDP-to-wealth ratio of 1.247 was applied.\n"
  5: "yaml\nMethodology: \"To produce a high-resolution asset exposure map, the total\
    \ asset value per country is disaggregated proportional to a function of nightlight\
    \ luminosity and population count.\"\nMethodology: \"The LitPop approach\u2019\
    s skill in disaggregating asset exposure cannot be assessed directly due to the\
    \ lack of reference asset value data on a subnational level. Therefore, GDP and\
    \ GRP are used instead for an indirect evaluation of the methodology. GDP and\
    \ GRP are used to assess the subnational disaggregation skill, comparing varying\
    \ combinations of the exponents m and n in LitmPopn.\"\nMethodology: \"The disaggregation\
    \ skill is assessed as follows: (i) national GDP is disaggregated to the grid\
    \ level. (ii) The resulting gridded GDP is then re-aggregated for each subnational\
    \ region (i.e., district, state, or canton) to obtain modeled GRP. (iii) Based\
    \ on the comparison of normalized modeled and reported reference values of GRP,\
    \ skill metrics are computed\"\nMethodology: \"LitnPopmpix=(NLpix+\u03B4)n\xB7\
    Popmpix,\"\n"
  7: The actual resolution of the underlying gridded data is 30arcsec (~1km). To obtain
    this dataset, national total asset values were disaggregated proportional to the
    distribution of Lit1Pop1 for 224 countries and areas. Saturation and blooming
    in nightlight intensity data cause disaggregation based on nightlights alone to
    misrepresent actual value distribution, especially in urban areas. Lit1Pop1 is
    considered the most adequate combination of Lit and Pop for the subnational downscaling
    of GDP. Disaggregation proportional to Pop1 underestimates the asset values in
    urban agglomerations, while it is overestimated by Pop2. The M25 London Orbital
    Motorway around London clearly stands out, with some pixels even at the same value
    as in central London.
  8: "Source material here.\nEvaluation overview: \"The skill metrics for the subnational\
    \ disaggregation of GDP in the country Mexico show low values of \u03C1 compared\
    \ to most other countries...\"\nQuantitative material: \"...Distrito Federal (the\
    \ Mexico City district) with a reference nGRP of 17.4% and the M\xE9xico district\
    \ (8.7%)... sum up to modeled nGRP values of 11.2% (m=1) to 17.6% (m=5) for Litm,\
    \ 20.8% for Pop1, and 26.5% for Lit1Pop1...\"\nMethodology: \"The LitPop methodology\
    \ allows for the creation of globally consistent and spatially highly resolved\
    \ estimates of gridded asset exposure value.\"\nHighlights: \"While the LitPop\
    \ methodology performs well for most of the districts with relatively low GRP,\
    \ it fails to reproduce reference nGRP for the main (capital) metropolitan region\
    \ consisting of the districts M\xE9xico and Mexico City...\"\nMore Notes: \"The\
    \ example of Mexico is presented here to illustrate limitations and uncertainties\
    \ of the disaggregation approach. The overestimation of the M\xE9xico district\u2019\
    s nGRP indicates that the district has an overproportional nightlight intensity\
    \ and population count compared to a relatively low reference nGRP.\"\n"
  9: "yaml\nMethodology: \"The LitPop methodology is used to disaggregate total asset\
    \ values.\"\nMethodology: \"Due to a lack of subnational reference asset values,\
    \ the LitPop methodology\u2019s performance for the downscaling of asset stock\
    \ values could not be evaluated directly. The assessment of disaggregation skill\
    \ was instead based on the \uFB02ow variables GDP and GRP.\"\nMethodology: \"\
    Given a correlation between stocks and \uFB02ows within each country, this approach\
    \ represents an indirect evaluation of themethodologyforassetexposuredownscaling.\"\
    \nHighlights: \"Evaluating 14 countries, we found that the LitPop methodology\
    \ generally performs well in disaggregating GDP to the subnational level.\"\n\
    Highlights: \"The skill metrics\u03C1 and\u03B2 showed that Lit1Pop1 distributes\
    \ GDP better to the subnational level than the other combinations of nightlight\
    \ and population data assessed.\"\n"
  10: "Source material here.\n\"The LitPop methodology can be used to estimate the\
    \ distribution of physical asset values for any target year at a wide range of\
    \ resolutions. The data sources used here cater to resolutions up to 30arcsec.\"\
    \ \n\"The CLIMADA repository is developed open-source and makes use of open-access\
    \ data to enable unrestricted use for applications beyond academia.\"\n\"The LitPop\
    \ methodology was developed to provide globally consistent asset exposure data\
    \ for global-scale physical risk modeling.\"\n\"The LitPop methodology does not\
    \ account for differences in infrastructure types and vulnerability.\"\n\"The\
    \ use for local or sector-specific applications is limited without the addition\
    \ of sector-specific datasets.\"\n"
  11: 'Source material here.

    The global consistency, flexibility and openness, and the integration in the CLIMADA
    repository offer value for manifold use cases for economic disaster risk modeling
    and climate change adaptation studies. However, the methodology could not be evaluated
    directly against subnational asset data... Therefore, the asset exposure data
    are not suitable for applications with a local or sector-specific focus without
    further validation. Future research and development could focus on the integration
    of more highly resolved population data and other ancillary data sources... Validation
    against subnational asset value and empirical asset stock inventories yields the
    potential to evaluate and further improve the accuracy of asset exposure downscaling,
    for both global and regional applications. Regional validation could further inform
    the choice of the most appropriate downscaling functionality for different income
    groups and world regions.

    '
