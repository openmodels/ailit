Highlights:
  1: The LitPop methodology and asset exposure data offer value for economic disaster
    risk assessments and climate change adaptation studies, especially for larger
    regions. The advantages of LitPop are global consistency, scalability, openness,
    replicability, and low entry threshold.
  2: The paper presents a globally consistent methodology for asset exposure disaggregation
    with data available for 224 countries.
  7: Lit1Pop1 is considered the most adequate combination of nightlight and population
    data for subnational downscaling of GDP. Disaggregation proportional to Pop1 underestimates
    asset values in urban agglomerations, while Pop2 overestimates them.
  8: "The methodology performs poorly for GDP disaggregation in Mexico, particularly\
    \ in accurately representing the nGRP of key districts like Distrito Federal and\
    \ M\xE9xico."
  9: Lit1Pop1 outperforms other combinations of nightlight and population data in
    distributing GDP subnationally.
  10: LitPop is designed for global-scale physical risk modeling but is limited when
    applied to local risk assessments without additional sector-specific datasets.
  11: The asset exposure data are not suitable for applications with a local or sector-specific
    focus without further validation.
