    of dry spell days, is the number of abnormally dry days (defined below) in a country
    and year that were preceded by at least j-1 others. We consider alternatives of
    j=7, 14, 21, 28, and 35 days. ... To operationalize our dry spell variable, we
    begin with daily precipitation totals from the Climate Prediction Center (CPC)
    spanning 1979 to 2016, gridded to 0.5-degree latitude."

