  14: 'The analysis includes two weighting schemes for spatial aggregation: area of
    grid cell devoted to cereal crops and average production of cereal crops in a
    grid cell.'
  15: Bootstrapping is employed for inference in the sequential g-estimation to account
    for potential clustering at the panel unit level.
  16: The analysis uses a series of alternative specifications to examine the robustness
