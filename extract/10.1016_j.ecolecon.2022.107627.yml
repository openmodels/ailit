    \ and country-specific quadratic time trends. Country fixed effects \U0001D707\
    \U0001D456 and year effects \U0001D719\U0001D461 adjust for static cross-country\
    \ differences (including aridity) and global annual shocks to growth in food production,\
    \ respectively. Our primary interest in equation (1) is \U0001D6FD1, which captures\
    \ the marginal direct effect of an additional dry spell day (as defined earlier)\
    \ across all cropped areas in a country on growth in the FAO CPI in that country\
    \ and year. Any effects of dry spells on contemporaneous growth in the FAO CPI\
    \ may reflect both transitory impacts on levels of crop production in a single\
    \ year and effects that may persist across more than a single year (see, e.g.,\
    \ Dell et al., 2012). To help distinguish between these two possibilities, we\
    \ estimate distributed lag variants of equation (1) (see Appendix). Evidence from\
    \ those models (Appendix Table A2) suggest that the direct effects we estimate\
    \ are transitory, though it remains possible that dry spells may exert more persistent\
    \ influence via their exacerbation of drought."
  14: "Source material here.\nFinally, we examine a series of models that provide\
    \ suggestive evidence of how irrigation may dampen the impact of dry spells. We\
    \ first adopt the approach just described for drought and aridity, but where we\
    \ separately quantify dry spell days and heat wave days for cells in a country\
    \ classified as more irrigated (MI) or less irrigated (LI) (see Section 2.1).\n\
    \nTo begin to address these concerns, we consider two additional changes to our\
    \ model. First, we redefine our outcome to be growth in cereal yield in order\
    \ to focus on a set of crops that are more homogenous in value. Consistent with\
    \ this change, we adjust our spatial aggregation weights for environmental variables\
    \ to pertain to cereal crops. The first weighting scheme uses the area of a grid\
    \ cell devoted to cereal crops. The second is the average production of cereal\
    \ crops in a grid cell. \n\nThe resulting dry spell variables index the average\
    \ volume of cereals exposed to dry spells, so that differences across irrigated\
    \ and non-irrigated areas should come closer to capturing dry-spell-mitigating\
    \ effects of available irrigation.\n"
