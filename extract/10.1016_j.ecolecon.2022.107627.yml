  17: Using shorter minimum durations are not significant at conventional levels.
    We present baseline results for heat waves of at least 9 days, though our results
    are generally insensitive to that choice. Our results are organized as follows.
    We begin with the average marginal effect of dry spells assuming their effects
    are additively separable from other stressors. After presenting those baseline
    results, we briefly summarize their robustness to a variety of alternative assumptions,
    though we relegate the majority of the detailed robustness checks to the Appendix.
    Next, we examine heterogeneity in dry spell impacts, asking whether the effects
    of dry spells depend upon drought, aridity, and heat waves. Finally, we explore
    the potential role of irrigation in mitigating the effects of dry spells. Each
    additional dry spell day beyond 28 days that occurs during the historically hottest
    part of the year is associated with approximately 0.1 percentage point lower growth
    in the FAO CPI. Because we condition on drought, this effect is best interpreted
    as a direct effect of dry spells. Estimated effects of dry spell days defined
    using shorter minimum spell duration remain negative but are not distinguishable
    from zero. The signs, magnitudes, and significance of dry spell effects are similar
    when we consider alternate minimum durations used to define heat waves. Per the
    specifications outlined earlier, these estimates arise from models that adjust
    for annual precipitation. As a result, the effects we estimate reflect shifting.
