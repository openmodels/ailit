  7: 'plaintext

    We classify the day as abnormally dry if precipitation falls at or below a cell-
    and day-specific threshold defining an abnormally dry day. We define that threshold
    to be 1.5 standard deviations below mean precipitation for a grid cell and day
    of year (or zero if that threshold would be negative), with both the mean and
    standard deviation calculated using a 31-day window centered around the focal
    day across all years in the dataset. We then identify sequences of abnormally
    dry days and count how many abnormally dry days are preceded by at least j-1 others;
    we call such days dry spell days. In our main analysis, we only consider abnormally
    dry days that occur in the historically hottest 90 days in each grid cell. We
    construct weighted counts of dry spell days, where we weight dry spell days based
    on the fraction of the grid cell devoted to cropland in the month when the dry
    spell day occurs using the MIRCA2000 dataset (Portmann et al., 2010). Since we
    require a single value per country, we construct a spatially weighted average
    of these cell-specific dry spell variables. In our main analyses, we weight by
    the percent of area in each cell that was devoted to cropland in 2000 according
    to EARTHSTAT (Ramankutty et al., 2008).

    '
  8: 'Source material here. Both our heat wave variable and our metric capturing simultaneous
    dry spell and heat wave exposure are defined analogously...For joint exposure
    to dry spells and heat waves, we count days that are both abnormally dry and abnormally
    hot...For heat waves, we use daily temperature maxima from the CPC and count heat
    wave days: abnormally hot days preceded by at least k-1 others, focusing on k=3,
    6, 9, and 12 following Miller et al. (2021)....We summarize both heat waves and
    joint exposure across space using the same spatial averaging process we use for
    dry spells....When investigating effect heterogeneity, we construct two separate
    variables of each type (dry spell, heat wave, and joint exposure) for each effect
    modifier (drought, aridity, irrigation) in each country and year.

    '
  9: "Source material here.\nirrigation, we partition cells based on whether the fraction\
    \ of cropland within a cell that is equipped for irrigation is above or below\
    \ the median fraction among all cells with any area equipped for irrigation. The\
    \ former captures exposure in more irrigated areas, while the latter captures\
    \ exposure in less irrigated areas. We detail data sources for drought, aridity,\
    \ and irrigation along with those for other covariates next.\nTo complete our\
    \ dataset, we assemble data on longer-run water stress, average temperature, annual\
    \ precipitation, aridity, and irrigation. We include drought using the Standardized\
    \ Precipitation-Evaporation Index (SPEI; Vicente-Serrano et al., 2010), which\
    \ reflects a locally-standardized difference between monthly precipitation and\
    \ potential evapotranspiration, averaged across some number of months. For our\
    \ primary results, we use a 12-month SPEI which averages that standardized difference\
    \ across all months within the year. In supplementary analyses, we also consider\
    \ the SPEI averaged over only the months prior to the start of the hottest 90\
    \ days in a given location, which we term start-of-season drought. Average temperature\
    \ and total precipitation are derived from the same Climate Prediction Center\
    \ data underlying our dry spell and heat wave variables. We use the FAO\u2019\
    s aridity index (FAO, 2009), provided on a 10 arc-minute grid. That source defines\
    \ aridity as the ratio of precipitation and average annual potential evapotranspiration\
    \ calculated using a version of the Penman-Monteith Equation (Allen, 1998), with\
    \ both quantities derived from the Climate Research Unit\u2019s CL 2.0 Global\
    \ Climate Dataset. Irrigation data from FAO\u2019s AQUASTAT database provides\
    \ an estimated fraction of the area irrigated per pixel (circa 2005) on a gridded\
    \ global raster at 5 arc-minute resolution. In analyses where one of these variables\
    \ is required at the national scale, we construct national weighted exposure using\
    \ the same spatial weighting scheme as for the dry spell variable.\n"
