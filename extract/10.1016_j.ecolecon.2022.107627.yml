  22: "Source material here.\na handful of crops (e.g., Lesk et al., 2020; Luan et\
    \ al., 2021; Troy et al., 2015). A key contribution of our paper is that our global\
    \ scope and multi-crop focus speaks to the external validity of all of these studies.\
    \ Our estimates are also consistent with prior work on the effects of soil moisture\
    \ (e.g., Ortiz-Bobea et al., 2019; Rigden et al., 2020). A primary mechanism through\
    \ which dry spells likely affect crop production is through depressed soil moisture,\
    \ and so we should expect the sign of the marginal effect of dry spells to match\
    \ that for low soil moisture. We find exactly that. Similarly, the stronger effect\
    \ of low soil moisture (as proxied by \u2018green water\u2019) in arid locations\
    \ (Borgomeo et al., 2020) is consistent with our findings that dry spells have\
    \ larger effects when they occur in arid cells. At longer timescales, our findings\
    \ also extend a large body of prior work investigating effects of drought and\
    \ aridity (e.g., Hlavinka et al., 2009; Leng & Hall, 2019; Lesk et al., 2016;\
    \ Zipper et al., 2016), including potentially increasing drought sensitivity in\
    \ some agricultural systems (Lobell et al., 2014; Lobell et al., 2020). A subset\
    \ of these studies examine drought at different timescales (e.g., Zipper et al.,\
    \ 2016), but most stop short of examining interactive effects of water stress\
    \ across different timescales. Our estimates provide consistent evidence of the\
    \ negative relationship between drought (low SPEI) and crop production (Table\
    \ 3) but also go farther, suggesting short-term water stress (dry spells) is more\
    \ damaging when longer-term water stress (drought or aridity) is present. Perhaps\
    \ our most surprising result is the absence of an interactive effect of dry spell\
    \ days and heat wave days when they occur simultaneously. Both experiments (Siebert\
    \ et al., 2014; Breshears et al., 2021; Cohen et al., 2021) and statistical analyses\
    \ of farm data (Luan et al., 2021)\n"
  23: 'Source material: As with any analysis, ours has limitations, many of which
    present opportunities for future work. Analyzing aggregate crop production on
    an annual, national scale also presents challenges. Zhu et al., 2022) suggest
    that heat and water stress likely have non-additive effects on crops. While we
    too document interactive effects (Table 4), we only find strong evidence of non-additivity
    when dry spells and heat waves occur in the same year, and not necessarily simultaneously.
    It could be that the rarity of the shorter-term events we study (heat waves and
    dry spells) combined with the country scale of our analysis leave us with insufficient
    statistical power to detect effects of true joint exposure. Alternatively, our
    dry spell and heat wave variables may already embed some of the joint exposure
    effects we seek to identify. After all, heat waves often occur during dry periods,
    and we focus on dry spells occurring during the hottest part of the year. Weaker
    results from models in which we consider dry spells in other parts of the year
    (Appendix Table A5) suggest that heat may play an important role in our main dry
    spell estimates (Table 3), leaving little scope for detection of distinct joint
    exposure effects. The globally gridded temperature and precipitation data on which
    our analysis is based is only an approximation to conditions experienced on individual
    farms. Temperatures may vary from the air to the surface to the soil, and microclimates
    may result in substantial heterogeneity in both temperature and precipitation
    on farms within a grid cell. Increasing density and reliability of weather stations
    as well as improvements in remote sensing alternatives may enable refined estimates
    in the future. In particular, we hope those improvements would enable reliable
    estimates of the impacts of dry spells in Sub-Saharan Africa, where our dataset
    shows clear shortcomings. Crops likely have different tolerance for both temperature
    and precipitation extremes, while our analysis enforces a single threshold and
    minimum duration for each stressor.'
  24: "Source material here.\nand day-specific statistical thresholds we use to define\
    \ abnormally high temperature or abnormally low precipitation are based on an\
    \ assumption that crops are well             -adapted to local conditions. While\
    \ that assumption may hold for some crops and locations, it may not hold for all.\
    \ Further, because planting and harvest dates differ across crops, a single dry\
    \ spell exposure variable during the year will imperfectly capture the exposure\
    \ faced by any single crop. Beyond crop differences, our exposure variable must\
    \ also reflect exposure across a large number of locations, and ours is increasing\
    \ in the number of, duration of, and fraction of crop area affected by dry spells\
    \ within a given country and year. While those properties are sensible, our statistical\
    \ models imply an equivalence in impact among changes in any of those three aspects\
    \ of dry spell exposure, which may not hold in practice. Better-resolved outcomes\u2014\
    whether crop-specific production, finer spatial resolution or smaller spatial\
    \ extent, or sub-annual measures of crop growth\u2014could mitigate some of these\
    \ concerns, but at the potential expense of external validity. Finally, we emphasize\
    \ that our exploration of adaptation is preliminary only, though the smaller effects\
    \ of dry spells we identify in irrigated areas are consistent with findings in\
    \ studies of drought (Zipper et al., 2016). One constraint is that our irrigation\
    \ data only offer a static view of areas equipped for irrigation (extensive margin).\
    \ Data on within-season irrigation water use (intensive margin) would facilitate\
    \ improved analyses; to our knowledge, no such data exists on a global scale.\
    \ Even with improved data, the endogeneity of irrigation use presents statistical\
    \ challenges for identifying its effects. Instrumental variables employed in local\
    \ studies, such as subsidy programs or changes to crop insurance (Deryugina &\
    \ Konar, 2017; Pfeiffer & Lin, 2014), may present a promising entry point for\
    \ addressing the endogeneity of irrigation if such data can be collected on a\
    \ larger scale. Even if irrigation helps farmers stave off the worst impacts of\
    \ dry spells, many farms still lack adequate irrigation equipment, and the changing\
    \ availability of both\n"
