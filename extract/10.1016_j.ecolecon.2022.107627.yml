    Isolates country-specific dry spell exposure anomalies. Investigates whether irrigation
    availability moderates the effects of dry spells.
  6: A dry spell variable is used, counting abnormally dry days preceded by at least
    j-1 others with j being 7, 14, 21, 28, or 35 days. Data spans from 1979 to 2016,
    gridded to 0.5-degree latitude.
  7: A spatially weighted average of dry spell days per grid cell is calculated, weighted
    by cropland area in 2000 from EARTHSTAT.
  8: The analysis involves using daily temperature maxima to count heat wave days
