Drivers of Risk:
  1: Simultaneous soybean failures are driven mostly by changes in mean climate conditions
    rather than changes in climate variability.
  2: The paper identifies adverse weather conditions, particularly extreme weather
    and climate variability, as drivers of crop growth failures.
  4: The paper considers temperature and precipitation as drivers of soybean yield
    variability, focusing on a 3-month season around the soybean maturity date. Country-specific
    factors such as management practices are also considered.
  5: Trends in mean climate (temperature and precipitation) and in climate variability.
  6: Future climatic forcing conditions, particularly increasing CO2 concentrations
    and associated climate sensitivity, drive the risk of soybean yield losses.
  7: The driving climatic anomalies are drier conditions in the first and second months,
    wetter in the last month, warmer temperatures in the second and third months,
    and cooler in the first month, creating a scenario of hotter and drier-than-average
    conditions except for the third month, which has slightly wet conditions.
  8: The paper highlights climatic conditions, specifically precipitation and temperature
    anomalies, as key factors impacting the 2012 analog events.
  9: Shocks impacting outcomes include compounding hot and dry conditions during the
    soybean reproductive season.
  10: The study investigates simultaneous yield losses through crop yield anomalies
    in important growing regions under different climate scenarios.
  11: The analysis considers the omission of CO2 fertilization effects, uses three
    GCMs with different climate sensitivities, and evaluates scenarios reflecting
    extreme climate conditions to assess risk impacts.
  12: Long-term mean effects of climate change are the primary driver of increased
    risk of simultaneous extreme soybean losses. Climate variability is expected to
    increase regionally in all three countries, but not the joint occurance of extreme
    losses in the Americas.
Evaluation overview:
  1: The study evaluates the increase in simultaneous soybean failures due to climate
    change, focusing on yield losses and their impact on supply chains.
  2: The study evaluates the impact of climate change on extreme simultaneous soybean
    failures in the Americas.
  4: The paper evaluates soybean yield losses in South America.
  5: Weather-induced crop failures, specifically simultaneous soybean failures.
  6: Projected soybean yields are evaluated, focusing on the number and magnitude
    of events analogous to the 2012 drought-induced yield loss.
  7: This page evaluates soybean yield anomalies in an adaptation scenario, comparing
    losses with respect to historical climatology and the 2012 event.
  8: The outcome being evaluated includes the occurrence and frequency of country-level
    and aggregated 2012 analogs impacting soybean yields across the US, Brazil, and
    Argentina.
  9: The study provides an overview of the impact of climate conditions on soybean
    production, focusing on yield anomalies and crop failures in the US, Brazil, and
    Argentina.
  11: The paper focuses on the impacts on soybean yields and production in the US,
    Brazil, and Argentina under different scenarios without long-term trends in the
    adaptation scenario.
  12: Extreme soybean losses in the Americas, specifically focusing on simultaneous
    extreme losses.
Highlights:
  1: Adaptation of crop production practices to long-term mean climate trends can
    reduce future risk of simultaneous soybean losses across the Americas.
  2: The study explores the frequency and magnitude of extreme soybean failures in
    the Americas, evaluating both synchronized and localized yield declines.
  4: The paper investigates the risk of future soybean failures by identifying analogs
    to historical extreme events (specifically the 2012 yield loss event).
  5: The hybrid model outperforms other models for the three metrics considered (R^2,
    MAE, RMSE) when analyzed across three countries and individually. The hybrid model
    obtains the lowest sum of absolute errors for the 2012 event.
  6: Without adaptation, 2012-like yield losses become more frequent and severe, particularly
    under high-forcing scenarios (SSP5-8.5). Adaptation significantly reduces the
    frequency and magnitude of these analogs, making them approximately 11-16 times
    less likely. Trends in mean climate dominate the risk of 2012 analogs.
  7: Impact analogs in the adaptation scenario show increased damages for the US,
    Brazil, and Argentina compared to the 2012 event, demonstrating variability in
    climatic conditions.
  8: Key outcomes include increased frequency and losses of country-level analogs
    for soybean failures, with the US having the highest number of occurrences.
  9: Successful adaptation to changes in mean climate has the potential to minimize
    climate change-caused impacts on soybean failures, with increased losses expected
    under future conditions.
  10: The results suggest that the frequency of simultaneous crop yield failures in
    the US, Brazil, and Argentina is projected over the century, with certain scenarios
    highlighting different levels of future risks.
  11: Expansion of soybean areas contributes to deforestation in the Amazon, impacting
    precipitation and natural vegetation that offers resilience against weather extremes.
  12: The increase in risk of simultaneous extreme soybean losses is mainly driven
    by long-term mean climate change effects, not changes in climate variability concerning
    joint occurances in the Americas. Adaptation to mean climate change can minimize
    these risks.
Methodology:
  1: A hybrid crop model, combining a process-based model with machine learning, is
    used to simulate soybean production and assess risks under different future climate
    scenarios.
  2: The study uses a hybrid model combining process-based and statistical models
    to link weather conditions to crop yields, and examines future scenarios including
    trends in mean climate and climate variability.
  3: Yields from 1979 to 2015 are selected based on data availability from the U.S.,
    Brazil, and Argentina.
  4: A hybrid model is developed by combining simulated soybean yields from EPIC-IIASA
    and climate indices as predictors in a multilayer perceptron (MLP) model, which
    is calibrated to observed soybean yields. The MLP uses a grid-search algorithm
    for hyperparameter tuning. The paper uses impact analogs, identifying years with
    larger negative yield anomalies than observed in 2012, to assess future risk.
  5: 'Two hypothetical scenarios are applied: (a) ''no adaptation scenario'' where
    future yields are defined relative to present day, including trends in both mean
    climate and climate variability, and (b) ''adaptation scenario'' where future
    yields are expressed according to future baselines, excluding trends in mean climate.
    The hybrid model simulates crop yield variability and is applied to the ''adaptation
    scenario''. For the ''no adaptation'' scenario, mean trends from EPIC-IIASA model
    are added to hybrid model outputs.'
  6: The analysis uses a hybrid crop model to simulate soybean yields under different
    Shared Socioeconomic Pathways (SSPs) and adaptation scenarios, comparing future
    yields to the 2012 event. The results are based solely on the hybrid model outputs
    due to its success in simulating soybean yields and representing extreme weather.
    An 'analog event' is defined as an annual yield value at or below the 2012 yield.
  7: The analysis uses impact analogs in an adaptation scenario, evaluating how similar
    events to 2012 would affect country-level soybean yields.
  8: The analysis compares past climatological anomalies with a specific 2012 event
    to determine analog occurrences and simulate future conditions.
  9: The analysis uses climate model simulations driven by future emission scenarios
    and a hybrid model to simulate climate conditions on yields; results are particularly
    applicable at the local scale and during extreme weather years.
  10: "The analysis combines Global Gridded Crop Models (GFDL-esm4, IPSL-cm6a-lr,\
    \ UKESM1-0-ll) with different Shared Socioeconomic Pathways (SSPs 1\u20132.6,\
    \ 5\u20138.5) to project the frequency and probability of key events over the\
    \ century."
  11: Soybean harvest areas from 2012 are utilized without regard to expansion; the
    analysis includes rainfed areas and limitations due to omission of irrigation
    expansion effects; scenarios explore impacts from extreme climate conditions using
    a limited set of GCMs and SSPs.
  12: The study uses simulations to assess the impact of climate change (mean and
    variability) on soybean losses, and highlights the utility of historic events
    (like the 2012 crop failure) as a framework. Mentions the use of dedicated analysis
    techniques.
More Notes:
  5: "The hybrid model uses total monthly precipitation (prcptot, mm) and average\
    \ daily maximum temperature (txm, \xB0C) as inputs."
  6: The study acknowledges that the global gridded crop model (GGCM) ensemble members
    vary in their climate sensitivity to CO2, which influences the projected soybean
    yields.
  12: The data and code used in the experiment are publicly available at the provided
    DOIs.
No relevant information:
  14: No relevant information
Quantitative material:
  1: "Long-term trends in mean climate increase the frequency of 2012 analogs by 11\u2013\
    16 times and the magnitude by 4\u201315% depending on the global climate scenario."
  4: The paper uses coefficient of determination (R2), Mean Absolute Error (MAE),
    and Root Mean Squared Error (RMSE) to evaluate model performance. It also uses
    yield anomalies compared to a 2000-2015 climatology to identify impact analogs.
  5: Table 1 shows the Coefficient of Determination (R^2), Mean Absolute Error (MAE),
    and Root Mean Squared Error (RMSE) for different models (EPIC-IIASA, Stat-EPIC,
    Stat-clim, and Hybrid model).
  6: For SSP5-8.5 (no adaptation), 82 annual yield values are at or below the 2012
    yield, with mean losses 17% larger than the 2012 event. For SSP1-2.6 (no adaptation),
    43 analogs are observed, with mean production losses 6% larger than the original
    event. The adaptation scenario shows only nine analogs, with losses 2.3% (SSP5-8.5)
    and 2.2% (SSP1-2.6) larger than the 2012 event.
  7: "Quantitative data includes yield changes represented in ton/ha and production\
    \ losses for the US, Brazil, and Argentina, with average losses of \u22121.5 Mt,\
    \ \u22120.5 Mt, and \u22120.6 Mt compared to the 2012 event."
  8: "Quantitative information includes average losses increased by \u22122.7 Mt in\
    \ the US, \u22122.5 Mt in Brazil, and \u22122.4 Mt in Argentina with respect to\
    \ 2012 yields."
  9: The risk of 2012 analogs is substantially lower in an adaptation scenario, being
    roughly 11 and 16 times less frequent and 4% and 15% less intense for SSP1-2.6
    and SSP5-8.5, respectively.
  12: No specific quantitative information is provided on this page, beyond references
    to 'increase of risk'.
sourcematerial:
  1: "Source material here.\nEvaluation overview: While soybeans are among the most\
    \ consumed crops in the world, most of its production lies in the US, Brazil,\
    \ and Argentina...In this study, we explore climate change impacts on simultaneous\
    \ extreme crop failures as the one from 2012.\nDrivers of Risk: We find long-term\
    \ trends in mean climate increase the frequency of 2012 analogs by 11\u201316\
    \ times...Conversely, anomalies like the 2012 event due to changes in climate\
    \ variability show an increase in frequency in each country individually, but\
    \ not simultaneously across the Americas.\nQuantitative material: We find long-term\
    \ trends in mean climate increase the frequency of 2012 analogs by 11\u201316\
    \ times and the magnitude by 4\u201315% compared to changes in climate variability\
    \ only depending on the global climate scenario.\nMethodology: We develop a hybrid\
    \ model, coupling a process-based crop model with a machine learning model, to\
    \ improve the simulation of soybean production. We assess the frequency and magnitude\
    \ of events with similar or higher impacts than 2012 under different future scenarios...\n\
    Highlights: We deduce that adaptation of the crop production practice to the long-term\
    \ mean trends of climate change may considerably reduce the future risk of simultaneous\
    \ soybean losses across the Americas.\n"
  2: 'Source material here: In this study, we explore how climate change affects extreme
    simultaneous soybean failures in the Americas, such as the 2012 event. Specifically,
    we develop a hybrid model to link weather conditions to crops yields and then
    adopt the concept of impact analogs to identify events in the future with similar
    or larger impacts than the 2012 event. The paper identifies adverse weather conditions,
    particularly extreme weather and climate variability, as drivers of crop growth
    failures. Adverse weather conditions are common causes of crop failures. Climate
    change affects both long-term trends of mean climate and climate variability...extreme
    weather events, caused by climate variability, are not easily anticipated. We
    analyze potential changes in analog frequency and magnitude and the driving climatic
    conditions. Results are shown both for the combined production regions (US, Brazil,
    Argentina) and separately for each individual country, representing both synchronized
    and localized crop yield decline.'
  3: "Source material here.\n\"We limited our analysis to areas with rainfed soybeans\
    \ to better capture the interactions between climate and crops. We used the SPAM2010\
    \ data set... to select the rainfed harvest areas... We resampled the data set\
    \ a 0.5\xB0\xD70.5\xB0 grid to match the other data sets using the first order\
    \ conservative remapping scheme.\"\n\n\"To build the hybrid model, we used simulated\
    \ climate data, simulated yields, and observed yields. Historical and bias-corrected\
    \ projected climate data were obtained from the Intersectoral Impact Model Intercomparison\
    \ Project...\"\n\n\"The projections cover the 2016\u20132100 period and are based\
    \ on three global climate models (GCMs)... which are bias-corrected using GSWP3-W5E5\
    \ as described in Lange (2019).\"\n\n\"The future projections are forced by two\
    \ Shared Socioeconomic Pathways (SSPs) and Representative Concentration Pathway\
    \ (RCP) combinations: SSP1-2.6 (low-emission future) and SSP5-8.5 (high-emission\
    \ future).\"\n\n\"Simulated yields were sourced from the process-based GGCM EPIC-IIASA...\
    \ All crop model simulations considered CO2 fertilization effect on crop growth.\"\
    \n\n\"Observed yields from census data were used to train the hybrid model...\
    \ Observed crop data in Brazil required additional data cleansing... The observed\
    \ yield and harvest areas data sets for the three countries were resampled from\
    \ the county level to a 0.5\xB0\xD70.5\xB0 grid...\"\n\n\"We selected observed\
    \ data from 1979 to 2015 based on data availability for the three countries (later\
    \ also used to train and validate the hybrid model).\"\n"
  4: "  \n\"to assess the future risk of soybean failures.\" \n\"impact analogs to\
    \ assess the future risk of soybean failures.\"\n\"seasonal differences between\
    \ the regions\"\n\"temperature and precipitation...soybeans reach the maturity\
    \ date\"\n\"The hybrid model is built by combining the simulated soybean yields\
    \ from EPIC-IIASA and the climate indices obtained in the previous step as predictors\"\
    \n\"temperature and available water\"\n\"The statistical model used is a multilayer\
    \ perceptron (MLP)\"\n\"coefficient of determination (R2)...Mean Absolute Error\
    \ (MAE) and Root Mean Squared Error (RMSE)\" \n\"impact analogs to assess the\
    \ future risk of soybean failures...difference between the annual soybean production\
    \ aggregated across the three countries...and the mean aggregated production across\
    \ the three countries\"\n\"2012 analogs\"\n\"The weights of the neurons define\
    \ their importance in the network\"\n\"We adopted the concept of impact analogs\
    \ to assess the future risk of soybean failures\"\n"
  5: "Source material here.\nEvaluation overview: \"We explore separately the contribution\
    \ of trends in mean climate and in climate variability in the occurrence of simultaneous\
    \ soybean failures.\"\nDrivers of Risk: \"The contribution of trends in mean climate\
    \ and in climate variability... the addition of direct climatic information to\
    \ the process-based model output...\"\nQuantitative material: \"Table 1 Out of\
    \ Sample Performance of the Models for Three Metrics: Coefficient of Determination\
    \ (R^2, No Unit), Mean Absolute Error (MAE, (ton/ha)^2), and Root Mean Squared\
    \ Error (RMSE, ton/ha).\"\nMethodology: \"By applying two hypothetical scenarios:\
    \ (a) future yields are defined relative to a present day reference... refers\
    \ to it as 'no adaptation scenario'; (b) future yields are expressed according\
    \ to future baselines... refers to it as the 'adaptation scenario.' The hybrid\
    \ model was designed to simulate the variability of crop yields, and was applied\
    \ to the 'adaptation scenario.'\"\nHighlights: \"The hybrid model outperforms\
    \ the other models for each of the three metrics considered when the three countries\
    \ are analyzed together... the hybrid model obtains the lowest sum of absolute\
    \ errors for the 2012 event...\"\nMore Notes: \"We selected total monthly precipitation\
    \ (prcptot, mm) and average daily maximum temperature (txm, \xB0C) to be used\
    \ in the hybrid model.\"\n"
  6: " \nEvaluation overview: This evaluation is reflected in the passage discussing\
    \ projected soybean yields and the investigation of \"the total number of analog\
    \ events of the 2012 event for both adaptation and no adaptation scenarios.\"\n\
    Drivers of Risk: The document states that \"the occurrence of analogs is heavily\
    \ dependent on the future climatic forcing conditions.\" It also mentions \"differences\
    \ in climate sensitivity to increasing CO2 concentrations\" as a factor affecting\
    \ projections.\nQuantitative material: Quantitative information includes specifics\
    \ like \"a high occurrence of 2012 analogs (82 annual yield values at or below\
    \ the 2012 yield)\" and losses \"17% larger than the original event for the SSP5-8.5%,\
    \ and 6% for the SSP1-2.6.\" The adaptation scenario notes, \"mean losses 2.3%\
    \ and 2.2% larger than the 2012 event\" for SSP5-8.5 and SSP1-2.6, respectively.\n\
    Methodology: The document mentions, \"Therefore, the hybrid model is the most\
    \ successful model at simulating soybean yields\" and discusses the use of SSPs\
    \ and crops models to predict future outcomes.\nHighlights: Important outcomes\
    \ such as \"2012 analogs are approximately 11 and 16 times more likely to occur\
    \ in the no adaptation scenario than in the adaptation scenario\" highlight the\
    \ difference in risks between scenarios.\nMore Notes: The passage acknowledges\
    \ differences in \"Equilibrium Climate Sensitivity (ECS)\" of models used, such\
    \ as \"GFDL-esm4\" and \"UKESM1-0-II,\" impacting projections.\n"
  7: " \nEvaluation overview: \"We run a spatial analysis of the nine impact analogs\
    \ in the adaptation scenario to determine the losses in each country. On average,\
    \ the three countries show production losses with respect to the historical climatology\
    \ during analog years.\"\n\nDrivers of Risk: \"The average climatic conditions\
    \ of the analogs are drier than the 2012 event during the first and second months\
    \ of the season, but wetter in the last month of the season. The analogs are on\
    \ average warmer than the 2012 event during the second and third months, but colder\
    \ in the first month. With respect to the historical climatology, the 2012 analogs\
    \ climatic conditions are on average hotter and drier, except for average temperature\
    \ levels and slightly wet conditions in the third month of the season.\"\n\nQuantitative\
    \ material: \"When compared to the 2012 event, analogs losses in the US, Brazil\
    \ and Argentina increase on average (in brackets the 95% confidence interval)\
    \ by \u22121.5\_Mt (\u22124.1\_Mt, 1.0\_Mt), \u22120.5\_Mt (\u22125.9\_Mt, 4.8\_\
    Mt), \u22120.6\_Mt (\u22124.0\_Mt, 2.8\_Mt), respectively.\"\n\nMethodology: \"\
    We run a spatial analysis of the nine impact analogs in the adaptation scenario...\
    \ It demonstrates the different ways that extreme impacts result from anomalous\
    \ weather conditions, which highlights the usefulness of impact analogs.\"\n\n\
    Highlights: \"Thus, the expected damages associated with 2012 analogs are shown\
    \ to increase in the three countries when compared to the 2012 event.\"\n"
