  10: "The analysis combines Global Gridded Crop Models (GFDL-esm4, IPSL-cm6a-lr,\
    \ UKESM1-0-ll) with different Shared Socioeconomic Pathways (SSPs 1\u20132.6,\
    \ 5\u20138.5) to project the frequency and probability of key events over the\
    \ century. Previous studies show that La Ni\xF1a phases are negatively correlated\
    \ with soybean growing conditions in the US and southeast South America, but positively\
    \ correlated in the central Brazil region, potentially offsetting simultaneous\
    \ soybean failures in the three countries (Anderson et al., 2018). The image consists\
    \ of six bar graphs labeled from (a) to (f), representing projections for different\
    \ climate models and scenarios over time from 2020 to 2100. Each graph is a combination\
    \ of Global Gridded Crop Models (GGCMs) (GFDL-esm4, IPSL-cm6a-lr, UKESM1-0-ll)\
    \ and SSPs (1\u20132.6, 5\u20138.5). This, and also our results show, that the\
    \ joint analysis of crop yield anomalies in each of the important growing regions\
    \ is necessary to robustly assess future risk of simultaneous soybean failures."
  11: 'Source material here: We limit our analysis to soybean yields and production...
    As a consequence of the removal of long-term trends in the adaptation scenario,
    the effects of CO2 fertilization are also not considered, only for the no adaptation
    scenario. Furthermore, we selected three GCMs with different climate sensitivities
    and considered the two most extreme SSP scenarios to obtain a diverse set of future
    scenarios. While these scenarios show clear signals in mean climate, there is
    sampling uncertainty in the occurrence and magnitude of extreme events. We use
    soybean harvest areas documented for the year 2012 throughout all simulations,
    without regarding expansions of harvesting area... We focus on rainfed harvest
    areas based on data from 2010. Expansion of ir rigation areas in subsequent years
    could lead to changes in the sensitivity of the studied area to weather variability...
    However, the expansion of soybeans is a significant matter, as deforestation in
    the Amazon has been associated with soybean expansion...and preserving natural
    vegetation helps protecting soybeans from weather extremes.'
  12: 'Source material: In conclusion, we find that the increase of risk of simultaneous
    extreme soybean losses, such as the 2012 event, is primarily driven by the long-term
    mean effects of climate change. Extreme soybean losses due to changes in climate
    variability are expected to increase regionally in all three countries, but a
    change in the joint occurrence of extreme soybean losses in the Americas due to
    climate variability is not evident from our simulations. Therefore, successful
    adaptation measures to mean climate change can help minimize the increase of risk
    of simultaneous extreme soybean losses in the Americas. The use of historic events
    (such as the 2012 aggregated crop yield failure) provides a useful framework for
    these analyses. The observed soybean yield and harvested area data collected,
    combined and processed for this work and the future projections under different
    climate change levels are publicly available at https://doi.org/10.7910/DVN/Q8D85C,
    https://doi.org/10.7910/DVN/Q8D85C (Goulart, 2022). ISIMIP2a Simulation Data from
    Agricultural Sector, GFZ Data Services (Arneth et al., 2017, https://doi.org/10.5880/PIK.2017.006).
    The code used for this experiment is available at: https://doi.org/10.5281/zenodo.7746911
    (Goulart, 2023).'
