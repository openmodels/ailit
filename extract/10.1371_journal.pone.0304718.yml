Drivers of Risk:
  1: The outcomes are impacted by different CMIP6 Shared Socio-economic Pathways (SSPs)
    leading to variations in warming, sea ice concentration, and net primary production.
  2: Climate-driven changes in thermal and sea ice conditions, primary productivity
    fluctuations, and redistribution of marine biodiversity are impacting fisheries.
  3: Changes in distributions and abundances of commercially important species, future
    climate (WSIC, WSST, WSBT, and SSBT) and primary production (SNPP).
  4: Climate layers (WSIC, WSST, WSBT, and SSBT), SNPP, and bathymetry; ongoing and
    anticipated climate and productivity changes.
  5: Combined fluctuations in future climate and primary productivity
  7: No relevant information
  8: Climate change scenarios leading to physical and biogeochemical changes; specifically,
    sea bottom and surface temperatures, extent of the cold pool feature (SSBT), winter
    sea ice loss, and changes in primary production.
  9: Changes in summer and winter sea bottom temperature, winter sea surface temperature,
    and sea ice concentration due to climate change.
  11: Future redistributions of fishery resources under different shared socioeconomic
    pathways (SSPs).
  12: SSP585 scenario
  13: Changes in cumulative maximum catch potential (MCP) under different SSP scenarios
    (SSP126, SSP245, SSP370, SSP585) relative to the present (2000-2019).
  14: The primary driver of risk is climate change, specifically changes in sea surface
    and bottom temperatures, sea ice concentration, and primary production, all influenced
    by different Shared Socioeconomic Pathways (SSPs).
  15: Warming temperatures, sea ice loss, changes in catch composition, and shifts
    in marine resource distribution.
  16: Shifting fish abundance and loss of sea ice are key drivers impacting fisheries.
  17: Future climate change leading to shifts in abundance and distribution of marine
    species, reduced sea ice, and changing predator-prey dynamics in the Arctic marine
    ecosystems.
  18: Climate change is impacting fishery resources through projected changes in species
    abundance.
Evaluation overview:
  1: The analysis provides an overview of the future abundance and distribution changes
    of eight commercially important fish and crab species in the eastern Bering Sea
    and Chukchi Sea.
  2: The paper evaluates changes in abundance, catch, and revenue of commercially
    important fisheries resources in the Pacific Arctic (Bering and Chukchi Seas).
  3: Future redistribution of fishery resources suggests biological and economic trade-offs.
  4: Future redistribution of fishery resources suggests biological and economic trade-offs.
  5: Future redistribution of fishery resources suggests biological and economic trade-offs.
  7: No relevant information
  8: The paper evaluates bioeconomic changes due to future redistribution of fishery
    resources between present-day fishing grounds in the US and Russian waters of
    the Eastern Bering Sea.
  9: Visualizes projected changes in temperature, sea ice, and oceanographic variables
    in the Gulf of California under SSP585 scenario.
  11: This provides an overview of shifts in species-specific abundance-weighted center
    of gravity for fishery resources, indicating potential biological and economic
    trade-offs.
  12: Future redistribution of fishery resources suggests biological and economic
    trade-offs.
  13: Future redistribution of fishery resources suggests biological and economic
    trade-offs.
  14: This paper evaluates the potential changes in maximum catch potential (MCP),
    maximum revenue potential (MRP), and maximum profit potential (MPP) of fisheries
    under different climate scenarios.
  15: Evaluates the potential biological and economic impacts of future climate change
    on major commercial fisheries in the Eastern Bering Sea (EBS) and Chukchi Sea.
  16: The paper assesses biological and economic trade-offs in fishery resources due
    to climate change.
  17: This page discusses future redistribution of fishery resources and its potential
    biological and economic trade-offs, including impacts on fisheries conflicts and
    resource management.
  18: Potential impacts of climate-driven changes in species abundance on potential
    catch, revenue, and profit.
Highlights:
  1: Projected changes in species abundance and distribution could affect the productivity
    of commercial and subsistence fisheries, particularly under the extreme SSP585
    scenario.
  2: Climate change has resulted in ecological surprises such as the recent collapse
    of valuable fisheries resources (e.g., snow crab and Pacific cod).
  4: Machine learning algorithms outperform conventional regression models in predicting
    species distribution and abundance. Random forest and boosted regression trees
    were used to generate present predictions and future projections of species abundances.
  5: "Study assumes present-day (2000\u20132019) species abundances are at their carrying\
    \ capacity, and that changes in projected abundances (2021\u20132100) reflect\
    \ changes in fish biomass in response to combined fluctuations in future climate\
    \ and primary productivity."
  7: No relevant information
  8: Species abundance COGs are projected to shift northward and to shallower waters,
    particularly for walleye pollock and Pacific cod, under intermediate to high shared
    socioeconomic pathways.
  9: Increased temperatures and altered sea ice concentrations suggest climate impacts
    on marine conditions in the Gulf of California.
  11: Highest contrast in present and future abundances of species is observed under
    the SSP585 scenario, with abundance declines in EBS and increases in the Chukchi
    Sea for certain taxa.
  12: Changes in maximum catch, revenue, and profit potential show a tendency to increase
    with scenario severity and longer projected time horizons; Significant MCP increases
    in the Chukchi Sea were accounted for by increases in the abundance of high catch
    and low economic value taxa; abundance declines are compensated by the abundance
    increases of other flatfish species
  13: Significant drops in MRP (37%) and MPP (47%) due to reduction and shift in abundance
    of low-catch and high-eco-nomic value species. Differences in MCP trends with
    distance away from major landing ports in the EBS. Dutch Harbor shows minimal
    changes under SSP126 relative to SSP585, where MCP peaks were observed at 400
    km away from the port with declines between 2041 and 2100. Port of Nome generally
    shows higher future MCPs under SSP126 and SSP585, with high MCPs also observed
    at distances adjacent to the port.
  14: MRP and MPP are projected to decline significantly under most climate scenarios.
    Slight increases in MCP do not necessarily translate to increases in MRP and MPP.
    There is a contrast between low (SSP126) and high (SSP585) future climate scenarios,
    with steeper declines in MRPs and MPPs in the latter.
  15: "Projected increases in MCP in the NEBS and Chukchi Sea under extreme warming\
    \ and sea ice loss in 2081\u20132100 do not necessarily translate to significant\
    \ increases in MRP (Marginal Revenue Product) and MPP (Marginal Physical Product),\
    \ suggesting changes in catch composition can alter economic benefits from fisheries.\
    \ Future changes are likely to impact the future fishing fleet mobility."
  16: High emission scenarios could lead to serious economic impacts on fisheries,
    including loss of high-value taxa.
  17: Increased importance of northern ports for fishing communities, potential governance
    issues with US and Russian transboundary fish stocks, and impacts of species distribution
    shifts on ecological stability.
  18: Climate change can have limited economic impact in well-managed marine ecosystems
    in the near-term, but may require adaptation of conservation strategies as conditions
    worsen.
Methodology:
  1: "The analysis projects future changes using different CMIP6 Shared Socio-economic\
    \ Pathways (SSPs) for the period 2021\u20132100."
  2: The paper uses a bioeconomic model analysis to assess species-specific abundance
    changes under future climate scenarios (SSP from CMIP6 models). The analysis is
    applicable to future climate outcomes and their impacts on marine fisheries.
  3: Used climate data from 2000-2019, and projected climate data from 2015-2100 from
    CMIP6 Global Climate Models (CESM2-WACCM, CNRM-ESM2-1, IPSL-CM6ALR, and MPI-ESM1.2HR)
    under four SSP scenarios. Downscaling was performed using the delta method.
  4: Two machine-learning algorithms (random forest, RF; and boosted regression trees,
    BRT) were developed to predict present and projected future patterns of species
    abundance. Models were tuned using 2700 initial runs to optimize complexity and
    performance, evaluated using 80%/20% training/validation split, and built using
    ranger and gbm packages in R software.
  5: Species abundance projections were made for 2061-2080 and 2081-2100 under SSP126,
    SSP245, SSP370, and SSP585. Historical biological reference values of species-specific
    population growth rate and scaling parameter were applied to estimate the MSY
    of each species stock in the Bering Sea.
  6: The analysis uses ensemble models to predict species abundance and calculates
    maximum sustainable yield (MSY) and maximum catch potential (MCP) based on predicted
    abundance and reference exploitation rates.
  7: The analysis is performed using bioeconomic models evaluating future fishery
    resource distribution, factoring in species-specific parameters and conducting
    sensitivity analyses under scenarios of changing costs and prices.
  8: Analysis uses spatial distributions of physical/biogeochemical variables and
    aggregated fishing effort data from 2012 to 2020; species-specific models account
    for 55%-87% of variance in abundance from 2000-2019.
  9: "Projection and visualization of environmental changes from present (2000\u2013\
    2019) to future periods (2021\u20132100) under SSP585 scenario."
  12: "Spatial abundance distributions of four species types (high/low catch and value)\
    \ for present (2000\u20132019) and future (2041\u20132060; 2081\u20132100) under\
    \ the SSP585 scenario are analyzed; spatial distribution of differences in cumulative\
    \ maximum catch potential (MCP) between the present and future periods; basin-wide\
    \ percent differences in MCP, MRP, and maximum profit potential (MPP) relative\
    \ to the present-day period (2000\u20132019)"
  13: Analysis of MCP changes under different SSP scenarios relative to a baseline
    period (2000-2019).
  14: The analysis uses modeling to project changes in fisheries' potential under
    different climate scenarios (CMIP6 projections). The results are applicable for
    the study area and the time periods specified in the table.
  15: Uses bioeconomic analyses applied to spatio-temporal projections of species
    abundance. Compares future averaged MCPs (Minimum Convex Polygons) with distance
    from major fishing ports. Results applicable for 2021-2100 under SSP126 and SSP585
    scenarios.
  16: Analysis uses fishing mortality rates and projects future changes under SSP126
    and SSP585 scenarios.
  17: Scenario-based projections using machine learning models for species-specific
    abundance and biomass predictions.
  18: "Analysis uses best available data and assumes constant economic parameters\
    \ over time, results are applicable in the near-term (2021\u20132040) under low\
    \ to moderate levels of climate change."
More Notes:
  1: The analysis shows potential impacts on highly valuable fisheries based on projections
    of future changes in abundance and distribution.
  2: The paper aims to examine changes in the projected abundance of a subset of commercially-important
    marine fish and invertebrate species. The study uses four alternative Shared Socioeconomic
    Pathways (SSP) from the state-of-the-art climate models of the Coupled Model Intercomparison
    Project 6 (CMIP6).
  4: Data sources include NOAA Fisheries online repository (https://www.fisheries.noaa.gov/foss/)
    and the 2012 Arctic ecosystem integrated survey. Species data includes commercially
    important species in the eastern Bering Sea and US Chukchi Sea area.
  5: The study area is the US Exclusive Economic Zone (EEZ) of the eastern Bering
    Sea (EBS). Models do not incorporate population age or size structure.
  7: No relevant information
  8: Shifts in species abundance lead to increased overlap in areas of peak abundance
    within present-day fishing grounds in both US and Russian waters.
  12: US-Russia EEZ boundary and bathymetric contours are overlaid on the spatial
    abundance distribution maps.
  13: The study considers major fisheries and landing ports in the Eastern Bering
    Sea (EBS). The US-Russia EEZ boundary is also considered.
  15: The study focuses on the Eastern Bering Sea (EBS) and Chukchi Sea, specifically
    considering the impact on fishing ports like Dutch Harbor and Port of Nome. The
    study uses SSP126 and SSP585 scenarios. The figures present data on ice conditions
    as a function of distance from ports.
Quantitative material:
  1: The page mentions contrasting changes in species abundance and distribution under
    varying scenarios, specifically highlighting increases in Pacific cod abundance
    and decreases in snow crab abundance under the extreme SSP585 scenario.
  2: Alaska fisheries accounted for 60.26% of the total US commercial harvests and
    32.09% of the US ex-vessel value in 2020. Global capture fisheries production
    had an approximate value of 141 billion USD in 2020.
  4: "Species abundance data expressed as catch per unit effort (CPUE) in kg/km^2;\
    \ future projections of species abundances for periods 2021\u20132040 and 2041\u2013\
    2060."
  5: Ensemble model predictions/projections of species abundance were computed as
    the weighted average of RF and BRT, with the former models given higher weights
    based on lower RMSEs in predicted abundance for all species relative to the latter.
  6: Calculations involve species-specific population growth rates and reference exploitation
    rates to determine MCP, with economic assessments assuming constant prices and
    costs over time.
  7: This page discusses quantitative impacts, such as potential percent changes in
    total maximum catch potential, maximum revenue potential, and maximum profit potential
    relative to the present.
  8: Projected rates of shift in the center of gravity (COG) of species abundance,
    with the largest shift for Greenland halibut (>80 km/decade) and the smallest
    for walleye pollock (31.64 km/decade) under SSP585 scenario for late-century.
  11: Species-specific rates of shift in abundance-weighted center of gravity (COG)
    in km/decade across future time periods (2021-2100) are provided for different
    SSPs.
  12: "MCP decreased minimally by 4.22% under SSP585 during the late-century (2081\u2013\
    2100) period"
  13: "Predicted future (2041\u20132060; 2081\u20132100) percent changes in the cumulative\
    \ maximum catch potential (MCP)."
  14: The table provides percentage changes in MCP, MRP, and MPP relative to present
    (2000-2019) for different time periods (2021-2040, 2041-2060, 2061-2080, 2081-2100)
    under SSP126, SSP245, SSP370, and SSP585.  Generally, MRP and MPP are projected
    to decline, with variations across scenarios and time periods. MCP shows a mixed
    response, with initial increases in some scenarios followed by declines later
    in the century.
  15: Presents data on the average number of consecutive no-ice days (CNP) and consecutive
    ice-covered periods (ICP) for different future time periods (2020-2039, 2040-2059,
    2060-2079, 2080-2100) under SSP126 and SSP585 scenarios, relative to distances
    from Dutch Harbor and Port of Nome.
  16: Two scenarios (SSP126 and SSP585) show potential future impacts on maximum catch,
    revenue, and profit; graphs illustrate projected declines in marine productivity.
