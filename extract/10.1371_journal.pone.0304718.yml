  2: 'Source material here: Future redistributionof fisheryresource s suggestsbiological
    and economic trade-offs; A significant portion of the Pacific Arctic region is
    comprised of the wide continental shelves of the eastern Bering Sea and Chukchi
    Sea; Alaska fisheries harvests accounted for 60.26% of the total US commercial
    harvests and 32.09% of the US ex-vessel value in 2020 [11]; The groundfish fisher-
    ies in the Bering Sea-Aleutian Islands and Gulf of Alaska produce high levels
    of total catch (in metric ton, mt), ex-vessel revenues (US Dollar, USD); In 2020,
    the global capture fisheries production had an approximate value of 141 billion
    USD; climate change has resulted in ecological surprises such as the recent collapse
    of valuable fisheries resources (e.g. snow crab and Pacific cod) [13, 14]; In
    recent decades, the region has experienced pronounced climate-driven changes in
    thermal and sea ice conditions [15], primary productivity fluctuations [16, 17],
    and a redistribution of overall marine biodiversity [18, 19]; Given the large
    uncertainty about future climate outcomes and their impacts on marine fisheries
    [24], there is an urgent need for anticipating their potential bioeconomic conse-
    quences on marine resources using up-to-date climate scenarios [25]; Here, we
    adopt a bioeconomic model analysis to assess species-specific abundance changes
    of major fisheries resources in the Pacific Arctic and sub- sequent fluctuations
    in maximum catch, revenue, and abundance changes under future cli- mate scenarios;
    The main goal of this work is to examine changes in the projected abundance of
    a subset of commercially-important marine fish and invertebrate species in the
    eastern Bering Sea and Chukchi Sea using future climate and ocean productivity
    projections under four alternative Shared Socioeconomic Pathways (SSP) from the
    state-of-the-art climate models of the Cou- pled Model Intercomparison Project
    6 (CMIP6) [33].

    '
