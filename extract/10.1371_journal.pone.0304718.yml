  8: "yaml\nEvaluation overview: \"The paper evaluates bioeconomic changes due to\
    \ future redistribution of fishery resources between present-day fishing grounds\
    \ in the US and Russian waters of the Eastern Bering Sea.\"\n  Source: \"Future\
    \ redistributionof fisheryresource s suggestbiological and economic trade-offs...the\
    \ bioeconomic changes between the present-day fishing grounds within the US and\
    \ Russian waters of the Eastern Bering Sea...\"\nDrivers of Risk: \"Climate change\
    \ scenarios leading to physical and biogeochemical changes; specifically, sea\
    \ bottom and surface temperatures, extent of the cold pool feature (SSBT), winter\
    \ sea ice loss, and changes in primary production.\"\n  Source: \"Spatial distributions\
    \ of physical and biogeochemic al variables...Physical variables and primary production\
    \ showed remarkable changes between the present and future periods under the different\
    \ scenarios...the highest warming scenario (SSP585...)...warming of the winter\
    \ sea bottom and surface temperatures (Fig 1B and 1C), and the extensive loss\
    \ of the winter sea ice (Fig 1D). The future summer integrated primary production\
    \ also declined relative to the present (Fig 1E)...\"\nQuantitative material:\
    \ \"Projected rates of shift in the center of gravity (COG) of species abundance,\
    \ with the largest shift for Greenland halibut (>80 km/decade) and the smallest\
    \ for walleye pollock (31.64 km/decade) under SSP585 scenario for late-century.\"\
    \n  Source: \"the highest rates of shift in the COG of abundance relative to the\
    \ present (2000\u20132019) are projected for the late-century (2076\u20132100)\
    \ period under the SSP585 scenario for the Greenland halibut (> 80 km/decade),\
    \ and the lowest for the walleye pollock (31.64 km/decade; Table 1).\"\nMethodology:\
    \ \"Analysis uses spatial distributions of physical/biogeochemical variables and\
    \ aggregated fishing effort data from 2012 to 2020; species-specific models account\
    \ for 55%-87% of variance in abundance from 2000-2019.\"\n  Source: \"present-day\
    \ fishing grounds were identified as pixels of high aggregated fishing effort\
    \ over the last nine years ( 1000 fishing hrs) using annually aggregated fishing\
    \ effort (in total fishing hours) available from 2012 to 2020 from the global\
    \ fishing watch...Overall, species-specific models were able to account between\
    \ 55% and 87% of the variance in species abundance from 2000\u20132019 (S2, S3\
    \ Tables in S1 File).\"\nHighlights: \"Species abundance COGs are projected to\
    \ shift northward and to shallower waters, particularly for walleye pollock and\
    \ Pacific cod, under intermediate to high shared socioeconomic pathways.\"\n \
    \ Source: \"However, under the future conditions and at varying magni-tudes of\
    \ climate change, the COGs of abundance for all species are projected to shift\
    \ north-wards...particularly for the walleye pollock and Pacific cod...\"\nMore\
    \ Notes: \"Shifts in species abundance lead to increased overlap in areas of peak\
    \ abundance within present-day fishing grounds in both US and Russian waters.\"\
    \n  Source: \"Under different climate scenarios, the COG of abundance also showed\
    \ substantial spatial shifts across taxa resulting in an increasing overlap in\
    \ areas of peak abundance within the present-day fishing grounds in both countries\
    \ (S6, S7 Figs in S1 File).\"\n"
