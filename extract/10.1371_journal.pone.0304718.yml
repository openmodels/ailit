  14: "`\nFuture redistribution of fishery resources suggests biological and economic\
    \ trade-offs... Percentage of change in the maximum catch potential (MCP), maximum\
    \ revenue potential (MRP), and maximum profit potential (MPP) relative to present\
    \ (2000\u20132019) across different time periods (2021\u20132100) and contrasting\
    \ shared socioeconomic pathways (SSPs) throughout the study area.\n\nThe table\
    \ provides percentage changes in MCP, MRP, and MPP...\n\ndistinct contrast between\
    \ the low (SSP126) and high (SSP585) future climate scenarios (Fig 6B and 6C),\
    \ with significant and steep declines in the MRPs and MPPs in the latter... slight\
    \ increases in MCP in response to shifting species distributions in the US fishing\
    \ ground during 2021\u20132040 and 2041\u20132060 under contrasting climate scenarios\
    \ did not translate to increases in the MRP and MPP.\n\nProjected changes in the\
    \ global biomass of marine fauna are negatively related to the warming levels...\
    \ contrasting levels of changes in sea surface and bottom temperatures, sea ice\
    \ concentration, and primary production under future SSPs.\n\nOur results using\
    \ updated CMIP6 projections of climate and productivity...\n\nour findings support\
    \ mounting evidence of climate change impacts on species distributions and abundance\
    \ with intensities proportional to the level of greenhouse emissions. \n"
  15: "Source material here.\nThe implementation of simple bioeconomic analyses to\
    \ spatio-temporal projections of species abundance provide pertinent insight into\
    \ potential biological and economic impacts of future climate change on major\
    \ commercial fisheries in the area. Projected increases in MCP in the NEBS and\
    \ Chukchi Sea under the extreme warming and sea ice loss scenario in 2081\u2013\
    2100, did not result into significant increases in MRP and MPP. These findings\
    \ suggest that future changes in the catch composition can alter the potential\
    \ economic benefits from fisheries. ... shifting marine resources largely influences\
    \ the present and future revenue and profit potential from fisheries [2, 62].\
    \ Fig 5. (a) Locations of the major and northern fishing ports (red crosses) in\
    \ the Eastern Bering Sea and averaged MCP within the US EEZ (light blue polygon)\
    \ computed at each 100-km buffer zone from the (b-c) Dutch Harbor and (d-e) Port\
    \ of Nome for the present (2000\u20132019) and future periods (2021\u20132100)\
    \ under SSP126 and SSP585. Comparison of the future averaged MCPs with distance\
    \ away from major fishing and Arctic ports in the EBS under contrasting shared\
    \ socioeconomic pathways, revealed divergent patterns relative to the present.\
    \ ... computed at each 100-km buffer zone from the (b-c) Dutch Harbor and (d-e)\
    \ Port of Nome for the present (2000\u20132019) and future periods (2021\u2013\
    2100) under SSP126 and SSP585. These changes are likely to impact the future fishing\
