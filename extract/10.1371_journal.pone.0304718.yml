    \ and reanalysis data of similar spatial resolution [40]. cific abundance, climate\
    \ layers (WSIC, WSST, WSBT, and SSBT), SNPP, and bathymetry to develop two machine-learning\
    \ (random forest, RF; and boosted regression trees, BRT) models to predict the\
    \ present and projected future patterns of species abundance in response to ongoing\
    \ and anticipated climate and productivity changes. Abundance data (expressed\
    \ as catch per unit effort, CPUE, in kg/km2) of eight commercially-important species\
    \ in the eastern Bering Sea were downloaded from the US NOAA Fisheries online\
    \ repository (https://www.fisheries.noaa.gov/foss/; date accessed: 24 November\
    \ 2022). the US Chukchi Sea area from the 2012 Arctic ecosystem integrated survey\
    \ (August-September) were also compiled for the target taxa (Arctic Eis Program)\
    \ [41]. The tuning process resulted in a total of 2700 initial runs for each species\
    \ and obtained optimal hyperparameters based on the minimum Root-Mean-Squared\
    \ Error (RMSE) in the predicted species abundance (S2, S3 Tables in S1 File).\
    \ Using the optimal hyperparameter values, the final species-specific RF and BRT\
    \ models were then trained and evaluated using 80% and 20% of the species observations,\
    \ respectively. RF models were tuned and built using the \u2018ranger\u2019 package\
    \ version 0.14.1 [51] while BRT models were implemented using the \u2018gbm\u2019\
    \ package version 2.1.8.1 [52] in the R software version 4.2.2 [53]. The final\
    \ models were then used to generate present predictions and future projections\
    \ of species abundances using averaged climatic and productivity layers for present\
    \ (2000\u20132019) and future periods (i.e., 2021\u20132040, 2041\u20132060, Machine\
    \ learning algorithms often outperform conventional regression models in predicting\
    \ species distribution and abundance, as the former are able to better capture\
    \ complexity and are more flexible relative to the latter [42, 43]. develop two\
    \ machine-learning (random forest, RF; and boosted regression trees, BRT) models\
    \ to predict the present and projected present and projected future patterns of\
    \ species abundance. "
