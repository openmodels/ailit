  10: "Source material here.\nOur aim was to encompass a large range of possible mortality\
    \ rates (20\u201256%) in our models, while accounting for fragmentation as an\
    \ important part of the life history of A. palamta58. We also re-ran the carbonate\
    \ budgets to estimate reef-accretion potential using eight theoretical restoration\
    \ scenarios wherein the cover of A. palmata was increased by 5 to 30% at +5% intervals.\
    \ Because of the uncertainties in future storm climates11, we did not explicitly\
    \ incorporate storm-related fragmentation into our model; however, the potential\
    \ for increasing storm impacts is somewhat accounted for in our increasing mortality\
    \ scenario described below. We did, however, account for the high rate of asexual\
    \ fragmentation in this species, using the generalized (i.e., not size-speci\uFB01\
    c) annual fragmentation rate of 10% and fragment-mortality rate of 40% for A.\
    \ palmata suggested by Lirman58 projected over a decade to produce a decadal net\
    \ fragmentation rate of 55%. Change in population size in our model was parameterized\
    \ by combining the 3% survival rate suggested by Garrison and Ward74 with the\
    \ 55% fragmentation rate58 to produce population-level survival rate of 58%, which\
    \ we round to 60% for simplicity...increased climate-change impacts over time\
    \ for which mortality was increased by 5% each decade (44% net survival by 2100);\
    \ and 3) decreased climate-change impacts over time through increased resilience,\
    \ acclimatization, and/or adaptation of A. palmata for which mortality was decreased\
    \ by 5% each decade (80% net survival by 2100). A two-dimensional (2D) XBeach\
    \ surfbeat model of Buck Island Reef was constructed to simulate wave and water-level\
    \ transformation across the reef... The validated XBeach model was then forced\
    \ with a range of sea-level-rise scenarios (+0.0, +0.2, +0.5, +1.2, and +2.0 m;\
    \ cf.31)andwave and storm-surge conditions (10- and 50-year storms). We acknowledge\
    \ that these scenarios present a simpli\uFB01ed version of reality because of\
    \ the uncertainties in the most likely carbon-emission scenarios and in the capacity\
    \ of corals to acclimate/adapt to long-term climate impacts...whereas these simple,\
    \ conceptual models are intended to illustrate the potential of restoration to\
    \ increase coral cover and reef-accretion potential at BIRNM in theory, we acknowledge\
    \ that important uncertainties remain regarding the success of restoration outcomes\
    \ in practice.\n"
