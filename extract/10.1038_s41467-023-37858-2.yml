sourcematerial:
  1: "Source material here.\nThe ability of reefs to protect coastlines from storm-driven\
    \ flooding hinges on their capacity to keep pace with sea-level rise.\nHere, we\
    \ show how and whether coral restoration could achieve the often-cited goal of\
    \ reversing the impacts of coral-reef degradation to preserve this essential function.\n\
    Our results provide guidance on how restoration of Acropora palmata, if successful,\
    \ could mitigate the most extreme impacts of coastal flooding by reversing projected\
    \ trajectories of reef erosion and allowing reefs to keep pace with the ~0.5 m\
    \ of sea-level rise expected by 2100 with moderate carbon-emissions reductions.\n\
    We combined coral-growth measurements and carbonate-budget assessments of reef-accretion\
    \ potential at Buck Island Reef, U.S. Virgin Islands, with hydrodynamic modeling\
    \ to quantify future coastal \uFB02ooding under various coral-restoration, sea-level\
    \ rise, and storm scenarios.\nThis highlights the potential long-term benefits\
    \ of pursuing coral-reef restoration alongside climate-change mitigation to support\
    \ the persistence of essential coral-reef ecosystem services.\nThe shallow reef-crest\
    \ zone is responsible for the majority of wave dissipation over coral reefs and\
    \ is, therefore, the most important habitat for shoreline protection.\nFor coral-reef-lined\
    \ coasts, understanding the changing nature of the reef-building process, particularly\
    \ in reef-crest habitats, is essential for estimating future risks from coastal\
    \ hazards under sea-level rise.\nCoral reefs provide critical barriers that can\
    \ mitigate shoreline erosion and \uFB02ooding for tropical coastal communities\
    \ around the world; however, climate change is jeopardizing the ability of reefs\
    \ to continue to provide coastal protection by causing coral-reef degradation,\
    \ sea-level rise, and changes in waves and storms.\nWidespread losses of reef-building\
    \ corals as a result of climate change and other anthropogenic impacts have decreased\
    \ reef elevation, reduced topographic complexity, and diminshed the capacity for\
    \ reef accretion to keep pace with sea-level rise.\nHistorically, reef crests\
    \ in the western Atlantic were dominated by Acropora palmata, a species whose\
    \ robust morphology and rapid growth made it the most important reef-builder in\
    \ the region for hundreds of thousands of years.\nThe unprecedented loss of this\
    \ ecosystem engineer has fundamentally changed the structure and function of many\
    \ western Atlantic reefs.\nFocuses on the western Atlantic and the importance\
    \ of Acropora palmata.\n"
  3: "yaml\nEvaluation overview: \"During the coral-growth experiment we conducted\
    \ at BIRMN from 2019 to 2021, calcification rates of A. palmata ranged from 21.04\
    \ to 42.91 kg m\u22122 y\u22121, with an average of 29.07 kg m\u22122 y\u2212\
    1 (\xB11.26). The average rate of change in the height of A. palmata colonies\
    \ was 6.99 cm y\u22121 (\xB11.56; range = 4.19\u20139.25 cm y\u22121)... Survival\
    \ of Ps. strigosa was high throughout the experiment with only four colonies experiencing\
    \ complete mortality and an additional four experiencing partial mortality.\"\n\
    Drivers of Risk: \"Although 14 of the 30 A. palmata colonies included in the experiment\
    \ died within days of transplantation due to the occurrence of an early thermal-stress\
    \ event at BIRNM during the experimental set-up... Stony coral tissue-loss disease\
    \ (SCTLD) was just starting to impact some colonies during the last time interval.\"\
    \nQuantitative material: \"The page provides calcification rates: A. palmata ranged\
    \ from 21.04 to 42.91 kg m\u22122 y\u22121; Ps. strigosa ranged from 7.96 to 21.31\
    \ kg m\u22122 y\u22121. Projected increases in A. palmata cover by 8.5%, 21.2%,\
    \ and 42.4% under different scenarios with 100,000, 250,000, and 500,000 colonies,\
    \ respectively.\"\nMethodology: \"We first developed a simple population model\
    \ (assuming no reproduction) based on average, planar growth rates of A. palmata\
    \ from our study and literature-derived mortality and fragmentation rates to project\
    \ potential changes in A. palmata cover on the BIRNM reef crest under various\
    \ restoration and mortality scenarios.\"\nHighlights: \"Our models indicate that\
    \ a single, large-scale A. palmata outplanting effort before 2030 could result\
    \ in increases in coral cover on the reef crest at BIRNM for the next 20 years...\
    \ in the most optimistic scenario, a sustained increase of 30% A. palmata cover...\
    \ could allow reefs at BIRNM to maintain high levels of coral cover until around\
    \ 2050.\"\n"
  4: "Source material here.\nThese results indicate that if A. palmata cover could\
    \ be increased by ~30% (to total mean cover of 36 and 45% for the northern and\
    \ southern reef crest, respectively), the reef could keep pace with Low to Intermediate-Low\
    \ projections of relative sea-level (RSL) rise.\nModeled total water levels\u2014\
    which include the in\uFB02uence of tides, waves, and storm surge\u2014increase\
    \ non-linearly with rising sea level and more extreme wave conditions because\
    \ sea-level rise allows for larger waves to propagate across the reefs.\nMaximum\
    \ total water levels vary along the shoreline due to variability in nearshore\
    \ bathymetry and its subsequent effects on waves and wave-driven water levels;\
    \ however, the alongshore variation declines as sea level increases, because greater\
    \ water depth results in relatively lower bathymetric variability on the reef.\n\
    Because substantial coral-restoration efforts (i.e., increasing 30% A. palmata\
    \ cover to \u2265 36% total cover) could promote reef accretion and help narrow\
    \ the gap between reef elevation and sea level by more than 0.5 m on average by\
    \ 2100 (Fig. 3), restoration could substantially reduce total water levels during\
    \ future storms (Fig. 5b).\nRestoration therefore has the potential to negate\
    \ the wave-driven component associated with low-end sea-level-rise scenarios (i.e.,\
    \ by keeping pace with a rise of 0.2\u2012 0.5 m by 2100) and to substantially\
    \ reduce total water levels, by up to 0.81 m (\xB10.03) on average, under intermediate-to-high\
    \ sea-level rise scenarios (i.e., 1.2\u2012 2.0 m by 2100; Fig. 5b).\nWith present-day\
    \ bathymetry, this wave-driven component of the maximum total water levels averaged\
    \ 4.17 m (\xB10.03) under the 10-year storm scenario (i.e., a tropical storm or\
    \ Category-1 hurricane32:a \u201Cminor\u201D storm) and 4.94 m (\xB10.02) under\
    \ the 50-year storm scenario (i.e., a Category-5 hurricane32:a \u201Cmajor\u201D\
    \ storm).\nThe analysis uses carbonate-budget models to project reef elevation\
    \ change under different restoration scenarios and sea-level rise projections.\
    \ It also models total water levels during storms with and without reef restoration.\n"
  5: null
  6: " \nAlthough our results indicate that the southern reef crest at BIRNM was maintaining\
    \ its role as a coastal barrier at the time of our surveys in 2016, its future\
    \ role in providing coastal protection is precarious given the inevitability of\
    \ continuing coral loss from climate change and other episodic natural and human\
    \ impacts. Indeed, just one year after our surveys were completed, Hurricane Maria\
    \ passed ~60 km west of BIRNM as a Category-5 storm and caused significant damage\
    \ to southern reef habitats... This disturbance highlights the importance of physical\
    \ erosion from storms... SCTLD began to impact the reef at BIRNM... Together,\
    \ the omission of the important impacts of physical erosion from our carbonate\
    \ budgets and the recent declines in coral populations suggest that our estimates\
    \ of present-day reef-accretion potential are overly optimistic, and erosion is\
    \ likely already more significant than our study suggests... Overall, we found\
    \ that only one habitat\u2014the southern reef crest\u2014exhibited marginally\
    \ positive reef-accretion potential, as a result of the relatively high abundances\
    \ of A. palmata and Ps. strigosa there... Whereas most reef zones at BIRNM are\
    \ projected to lose 0.12\u20130.23 m of elevation on average by 2100, the southern\
    \ reef crest is predicted to more-or-less maintain its present-day elevation...\
    \ We found that although rising sea levels will be the dominant driver of future\
    \ coastal-flooding risk at BIRNM, the impacts of sea-level rise will be amplified\
    \ by the diverging patterns of geomorphic change... For coral-reef-lined coasts\
    \ fronted with wider shallow-water reefs than the bank-barrier reef at BIRNM,\
    \ reef erosion would have an even greater impact on the potential flooding resilience...\
    \ Many restoration programs also now cite maintenance of key reef functions, such\
    \ as shoreline protection, among their broader goals; however, ours is one of\
    \ the few studies to assess how and whether those functional impacts could be\
    \ achieved... our results indicate that individual outplanted A. palmata colonies\
    \ could grow as fast as sea-level rise even under the most pessimistic scenarios\
    \ predicted by 2100... beach area on the western side of the island, which supports\
    \ important cultural and ecological resources such as critical nesting habitat\
    \ for endangered sea turtles, has migrated to the south, and nearly 30% (0.88\
    \ ha) of the total beach area has been lost due to storm-driven erosion... our\
    \ study provides important guidance on what it would take for short-term restoration\
    \ efforts now to have a sustained impact on coastal protection in the long-term...\
    \ our results also support the conclusion that under a regime of continuing coral\
    \ mortality from disease outbreaks, bleaching, and various local stressors, maintaining\
    \ functional impacts of such one-off restoration activities will likely require\
    \ some increase in coral resilience, acclimatization, and/or adaptation... Restoration\
    \ could reduce total water levels by up to 0.81 m... \n"
