Drivers of Risk:
  1: Sea-level rise, storms, coral-reef degradation, climate change, other anthropogenic
    impacts
  3: The page identifies climate-related mortality, such as thermal-stress events
    and stony coral tissue-loss disease (SCTLD), as key drivers impacting coral survival
    and growth.
  4: Sea-level rise and storm surge are the main drivers of increased total water
    levels and coastal flooding.
  5: Sea-level rise, storm surge (10-year and 50-year storm scenarios), and reef erosion.
  6: The main drivers of risk identified are sea-level rise, storms (specifically
    mentioning Hurricane Maria), and coral diseases (specifically Stony Coral Tissue
    Loss Disease - SCTLD). Physical erosion from storms is also highlighted as an
    important factor not explicitly included in their carbonate budgets.
  7: Sea-level rise, storms (including Category-5 hurricanes), and climate change
    impacts on coral reefs are identified as key drivers of risk. Bioerosion and chemical
    dissolution are also mentioned as factors affecting reef accretion.
  8: Sea-level rise is a driver of risk, increasing water levels over the reef crest
    and leading to a projected increase in wave-driven water levels during storms.
    Erosion also amplifies the impacts of sea-level rise.
  9: Reef degradation impacts future total water levels at BIRNM.
  10: Increased storms and climate change impacts on mortality rates are considered,
    along with a high rate of asexual fragmentation in A. palmata.
