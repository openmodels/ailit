Evaluation overview:
  1: "Coastal \uFB02ooding"
  3: The page provides an overview of coral growth rates, survival, and restoration
    impacts, specifically focusing on A. palmata and Ps. strigosa corals at Buck Island
    Reef National Monument (BIRNM).
  4: This paper evaluates the potential for Acropora palmata restoration to improve
    reef elevation change and reduce coastal flooding during storms at Buck Island
    Reef National Monument (BIRNM).
  5: Coastal flooding potential due to sea-level rise and reef erosion.
  6: This paper evaluates the impact of reef degradation and restoration on coastal
    flood risk, specifically focusing on changes in water levels and reef accretion
    potential at Buck Island Reef National Monument (BIRNM).
  7: The paper evaluates the potential for coral reef restoration to mitigate coastal
    flooding under different sea-level rise scenarios, focusing on reef accretion
    and its impact on wave attenuation during storms.
  8: This paper evaluates carbonate production rates, parrotfish bioerosion, sea urchin
    bioerosion, endolithic macrobioerosion, microbioerosion, net carbonate production,
    and reef accretion potential.
  9: The paper evaluates potential impacts of reef-building coral restoration on reef-accretion
    potential at BIRNM.
  10: The paper evaluates the reef-accretion potential through models of A. palmata
    survival and fragmentation rates under different climate change scenarios.
  12: No relevant information
Highlights:
  1: Coral restoration alongside climate-change mitigation supports the persistence
    of essential coral-reef ecosystem services; reef-building process in reef-crest
    habitats is essential for estimating future risks from coastal hazards under sea-level
    rise
  3: The study highlights the potential for large-scale restoration efforts to significantly
    increase coral cover, supporting reef accretion to keep pace with sea-level rise
    under optimistic scenarios.
  4: A. palmata restoration can substantially reduce coastal flooding during future
    storms by promoting reef accretion and mitigating wave-driven increases in total
    water levels. Restoration could potentially negate the wave-driven component associated
    with low-end sea-level rise scenarios.
  5: Sea-level rise is the most significant driver of increases in total water levels
    and flooding potential. Higher total water levels are projected for the northern
    sector of Buck Island, corresponding to areas of greatest projected reef erosion.
  6: The southern reef crest is the only habitat at BIRNM exhibiting marginally positive
    reef-accretion potential. Rising sea levels will be the dominant driver of future
    coastal flooding risk at BIRNM, amplified by diverging patterns of geomorphic
    change. Restoration of A. palmata could lead to substantial and sustained increases
    in coral cover and reef-accretion potential.
  7: Restoration of A. palmata cover (+30%) could enable the BIRNM reef crest to keep
    pace with low-end sea-level rise scenarios (0.5m), reducing storm surge impacts.
    A hybrid restoration approach with engineered structures and coral restoration
    is suggested as a possibility for more pessimistic sea-level-rise scenarios.
  8: Reef restoration can keep water depths at the reef crest near the lowest predictions
    of sea-level rise (i.e., ~0.30 m), preventing wave-driven increases in coastal
    flooding during storms. Restoration has the potential to minimize climate-change
    impacts, while erosion would amplify them. Restoration can be an important component
    of the solutions to support coral reefs and their coastal protection function.
  9: Reef restoration could impact the potential of reefs at BIRNM to keep pace with
    future sea-level rise through changes in coral reef accretion potential.
  10: The study presents a model projecting large variability in future mortality
    rates and highlights uncertainties in restoration success.
  12: No relevant information
Methodology:
  1: "Combined coral-growth measurements and carbonate-budget assessments of reef-accretion\
    \ potential at Buck Island Reef, U.S. Virgin Islands, with hydrodynamic modeling\
    \ to quantify future coastal\uFB02ooding under various coral-restoration, sea-level\
    \ rise, and storm scenarios."
  3: The analysis uses a population model to project changes in coral cover based
    on growth and mortality rates, with scenarios considering different outplanting
    efforts and climate impacts.
  4: The analysis uses carbonate-budget models to project reef elevation change under
    different restoration scenarios and sea-level rise projections. It also models
    total water levels during storms with and without reef restoration. Results are
    applicable to BIRNM.
  5: Models are run with projected reef erosion and with present-day bathymetries;
    projections of maximum total water levels at 2100.
  6: The study uses models to predict total water levels under different sea-level
    rise, storm, and coral restoration scenarios. The results are applicable to Buck
    Island.
  7: The study uses carbonate-budget models and coral-growth models to project reef-accretion
    potential and its impact on coastal flooding. The specific projections are directly
    applicable to the baseline ecological and geomorphic setting of BIRNM (Buck Island
    Reef National Monument), but the overall conclusion about the importance of reef-building
    species restoration is relevant for coral reefs throughout the western Atlantic.
  8: The study calculated carbonate budgets at 54 sites using reef-census data collected
    in July 2016. It estimated carbonate production from benthic transect photographs
    and point-count analysis, and bioerosion from surveys of parrotfish, sea urchins,
    and estimates of endolithic and microbioerosion. Net carbonate production was
    estimated by subtracting bioerosion from gross carbonate production.
  9: The study used the ReefBudget v1 methodology for estimating carbonate budgets
    combined with USGS lidar bathymetry for hydrodynamic modeling at BIRNM.
  10: Hydrodynamic modeling using a 2D XBeach model with different scenarios for sea-level
    rise and storm impacts; scenarios assess the potential impact of coral restoration.
  12: No relevant information
More Notes:
  1: Focuses on the western Atlantic and the importance of Acropora palmata.
  5: "Study area is Buck Island Reef National Monument (BIRNM). Reef-accretion potential\
    \ averaging -1.56 mm y\u22121. Average carbonate production is 1.27 (\xB10.27)\
    \ kg CaCO3 m\u22122 y\u22121."
  6: The authors note that their estimates of present-day reef-accretion potential
    are likely overly optimistic, and erosion is likely already more significant than
    their study suggests due to the omission of physical erosion and recent declines
    in coral populations. The long-term success of restoration will depend on coral
    growth and the process of reef accretion. Maintaining the functional impacts of
    restoration will likely require increased coral resilience, acclimatization, and/or
    adaptation due to ongoing coral mortality from various stressors.
  7: "The paper acknowledges uncertainties in reef-accretion potential and the efficacy\
    \ of large-scale restoration. The high cost of coral restoration (e.g., ~$12.5\
    \ million USD to increase A. palmata cover by +30% on a reef the size of Buck\
    \ Island) is discussed, but the authors argue that the benefits of coastal protection\
    \ and tourism revenue may outweigh these costs. The authors followed the approach\
    \ of Toth et al. (2022) and calculated a lower uncertainty on reef-accretion potential\
    \ based on the difference between maximum Holocene reef accretion by A. palmata\
    \ in St. Croix of 13.4 mm y\u22121 and estimated historic reef-accretion potential\
    \ based on the maximum observed A. palmata cover there in the 1970s of 62%35."
  8: "The study provides guidance on the potential scale of restoration necessary\
    \ to revive reef accretion and maintain reefs\u2019 capacity for coastal protection."
  9: The ReefBudget v1 provides conservative estimates due to bioerosion calculations
    and newer methodology versions might suggest higher reef-accretion potential.
  12: No relevant information
Quantitative material:
  1: "Restoration of Acropora palmata could mitigate the most extreme impacts of coastal\
    \ \uFB02ooding by reversing projected trajectories of reef erosion and allowing\
    \ reefs to keep pace with the ~0.5 m of sea-level rise expected by 2100 with moderate\
    \ carbon-emissions reductions."
  3: Contains quantitative information about calcification rates, coral growth rates,
    mortality rates, projected coral cover increases, and reef-accretion potential
    under various scenarios.
  4: "A 30% increase in A. palmata cover could allow the reef to keep pace with Low\
    \ to Intermediate-Low sea-level rise projections. Restoration could reduce total\
    \ water levels during storms by up to 0.81 m (\xB10.03) under intermediate-to-high\
    \ sea-level rise scenarios. The modeled total water levels averaged 4.17 m (\xB1\
    0.03) under the 10-year storm scenario and 4.94 m (\xB10.02) under the 50-year\
    \ storm scenario with present-day bathymetry."
  5: Maximum total water levels under different sea-level-rise scenarios (+0.0 m to
    +2.0 m).
  6: "The southern reef crest at BIRNM is projected to more-or-less maintain its present-day\
    \ elevation by 2100, while most other reef zones are projected to lose 0.12-0.23\
    \ m of elevation. Restoration could reduce total water levels by up to 0.81 m.\
    \ A. palmata colonies at BIRNM have average vertical growth rates of ~70 mm y\u2212\
    1. Successful restoration could achieve coral cover of 1.5-3.0 individuals m\u2212\
    2 by 2030. Beach area on the western side of the island has lost nearly 30% (0.88\
    \ ha) due to storm-driven erosion since 1954."
  7: "Reef accretion potential at BIRNM could exceed 5 mm y\u22121 with a 30% increase\
    \ in A. palmata cover. A 40% offset is 3.08 mm y\u22121, and a restoration of\
    \ +30% A. palmata cover could allow the reef crest to keep pace with sea-level\
    \ rise of ~0.5 m. The outcome would reduce total water levels during storms by\
    \ >10% (0.81 m) under higher sea-level-rise scenarios."
  8: "The study estimates that relatively low rates of maximum erosion (0.45 m by\
    \ 2100) could almost double the realized water levels over the reef crest at BIRNM\
    \ by 2100 under SSP1-2.6 to SSP2-4.5 (~0.49 m) to a level comparable to the highest\
    \ sea-level rise predicted under SSP5-8.5 (0.96 m). It also projects a ~0.2 m\
    \ increase in wave-driven water levels during storms. Macrobioerosion rate is\
    \ 0.4 kg m\u22122 y\u22121 and microbioerosion rate is 0.27 kg m\u22122 y\u2212\
    1."
  9: The estimated rate of change in reef elevation for each site by 2100; reef-accretion
    potential; carbonate production rates; bioerosion rates.
  10: Survival rate after a decade is estimated at 58%, adjusted to 60%, and scenarios
    project net survival rates ranging from 20-80% by 2100.
