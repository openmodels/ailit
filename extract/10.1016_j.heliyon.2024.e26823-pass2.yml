More Notes:
  7: The paper discusses different types of hydroponic systems, including closed and
    open systems, and highlights the importance of managing nutrient solutions, particularly
    potassium, for potato cultivation. Wick hydroponics is presented as a straightforward
    indoor method, with details on optimizing wick number and orientation for potato
    seed production.
  8: Wick systems are limited by nutrient recycling, oxygen access, slower growth
    rates, and are prone to algal growth; suitable for small-scale crops. Drip systems
    can be modernized with Big Data and IoT for monitoring temperature and soil moisture.
  9: The paper focuses on comparing different hydroponic systems and their impacts
    on crop yields and water consumption.
  12: Asbestos and polyethylene film were components of the hydroponic system tested.
    Aeroponics started with complicated equipment and relatively low yields, but has
    improved.
  14: The technology is still in its infancy and has room for development. The system
    still requires a good environment and appropriate techniques, and hence more elaborative
    research is warranted.
  16: Mentions using sensors and AI to optimize hydroponics, which could be relevant
    for adaptation to climate change.
  27: The paper excerpt describes minituber seed production methods and their relative
    benefits, but it doesn't explicitly discuss climate impacts. The methods may have
    varying degrees of resilience to climate change but this is not mentioned on the
    page.
  34: Asterix cultivar had smaller mass than Agata cultivar when grown with aeroponics
  37: The authors declare they have no known competing financial interests or personal
