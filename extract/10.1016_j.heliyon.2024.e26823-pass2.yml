Methodology:
  5: The paper analyzes hydroponic systems and identifies prospects for their field
    use, considering recent findings and focusing on potato mini-tuber production.
    It interprets the roles of nutrients and substrates in soilless systems.
  6: Discusses soilless methods like hydroponics for potato mini tuber production
    as an alternative to clonal multiplication. Describes the use of sensors to monitor
    environmental parameters in hydroponic systems.
  7: Studies on potato mini-tuber cultivation using different hydroponic cultivation
    techniques (Wick system hydroponics). The wick method is described, where nutrient
    solution is transported via capillary action. Studies involved varying number/orientation
    of wicks and evaluation of seed potato (Dejima) development/yield.
  8: Discusses wick hydroponic systems using various growing media (Jeju scoria +
    cocopeat, Jeju scoria + perlite, perlite + cocopeat, perlite + peat moss) and
    drip system hydroponics with pipes, hoses, growing media, and automated timers.
  9: Compares different irrigation systems (drip, aeroponic, ebb and flow) for crop
    production, particularly potato mini-tubers, tomatoes, and peppers. Analyzes water
    usage, yield productivity, and mineral composition.
  10: Comparison of potato seed tuber production in aeroponic, aerohydroponic, and
    deep-water culture hydroponic systems. Deep water cultivation study on potato
    cultivation involving seedlings collected from certified white rose tubers and
    subjected to drying overnight before plantation 1 inch deep in flats containing
    alveolate given nutritional solution without potassium and then transplanting
    seedlings of uniform size outside in five-gallon pots containing twenty liters
    of solution. Studied the effect of potassium on plant development.
  11: Compares potato seed tuber production using NFT with traditional bed and pot
    methods. Examines yield of potatoes grown in polyvinyl chloride trays using continuous
    flow nutrition film. Compares minituber development in industrial substrates and
    hydroponic systems (Wilma and NFT).
  12: Compares NFT hydroponics and aeroponics against other (unspecified) methods
    of crop production. NFT uses nutrient recirculation and can be organized vertically.
    Aeroponics uses a nutrient-rich mist sprayed on hanging roots. The misting cycles
    need to be customized for plants since their roots are exposed to the air and
    will dry rapidly.
