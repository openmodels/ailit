sourcematerial:
  2: 'This page contains the title and authorship information for a paper on hydroponics:
    "Hydroponics: Exploring Innovative Sustainable Technologies and Applications Across
    Crop Production, with Emphasis on Potato Mini-Tuber Cultivation." Given its focus
    on hydroponics and potato mini-tuber cultivation, it doesn''t provide direct climate
    impact information relevant to the categories requested for the U.S. National
    Climate Assessment. The page features names and affiliations of the authors, but
    no specific content or analysis linked to climate impacts.'
  3: 'Source material here: There is an urgent need to explore climate-resilient alternative
    agriculture production systems that focus on resilience, resource efficiency,
    and disease management. Hydroponics, a soilless cultivation system, gaining interest
    as it reduces the dependency on agricultural land, and pesticides, and can be
    implemented in areas with poor soil quality, thus mitigating the negative effects
    of extreme weather events. Potato is an essential dietary staple crop grown throughout
    the world and is a major source of food security in underdeveloped countries.
    However, due to the climatic changes, it is predicted that a significant loss
    in the suitability of land for potato production would occur, thus leading to
    potato yield loss. Recently, many case studies have emerged to highlight the advancement
    of agricultural hydroponic systems that provide a promising solution to the massive
    production of potato mini tuber at high efficiency. This review paper evaluates
    popular hydroponic methods and demonstrates how hydroponic has emerged as the
    go-to, long-term, sustainable answer to the perennial problem of insufficient
    access to high-quality potato seed stock. Furthermore, it emphasizes that by enduring
    significant reforms in soilless food production systems (particularly for potatoes),
    the food supply of a rapidly growing population can be addressed. Since hydroponics
    systems are productive and easily automated without soil and optimal environmental
    conditions, future hydroponics farming is promising. In conclusion, the hydroponics
    system provides better yield and crop productivity by saving water, energy, and
    space.'
  4: 'Source material: Sustainable agricultural practices safeguard the food supply
    and the land, and ensure global food security by addressing the challenges posed
    by climate change. Hydroponic, is an alternative agriculture production system
    that focuses on climate resilience, efficient resource utilisation, and disease-free
    crop production [1]. This method has several advantages, including better control
    over nutrient levels, more efficient use of water, and the ability to grow plants
    in areas with poor soil quality [1-3]. Mini tuber production is the fundamental
    approach for potato seed production since it relates the rapid multiplication
    of in vitro plantlets by nodal cuttings to the field for the multiplication of
    potatoes [9].'
  5: 'Source material: Drought, unpredictable weather, contaminated water sources,
    and undernutrition crops compelled producers to look for alternatives to soil-based
    agriculture (Table 1). Accordingly, this review aims to analyze the quintessential
    questions surrounding hydroponic systems and identify prospects for their field
    use while considering what has recently been proved, keeping potato mini-tuber
    production in focus. From a scientific perspective, the paper interprets two factors
    (nutrients and substrate) that have been extensively studied but still need more
    investigation since this information is crucial for enhancing nutrient acquisition
    management in soilless systems. Additionally, smart agriculture may make it possible
    for farmers to use cutting-edge technologies like artificial intelligence (AI),
    nanoparticles (NPs), plant growth-promoting rhizobacteria (PGPR), and aeroponics
    [15]. Hydroponic systems, other than providing disease-free mini tubers, can provide
    multifold yield of seed potato as compared to the conventional methods [13, 14]....Soilless
    culture can help accurately control the root environment, improving production
    and quality (Table 1).'
  6: 'Source material: Hydroponics is a rapidly growing field in agriculture and could
    be the alternate choice for sustainable agriculture; the world''s population is
    growing faster than ever before, and this has led to the development of hydroponics;
    commercial firms have recently cantered their efforts on hydroponics, which has
    risen fivefold in the last decade and has a global market value of up to $8 billion
    US dollars; according to estimates, the global hydroponics sector is predicted
    to reach $17.9 billion by 2026; environmental parameters such as dissolved oxygen,
    nutrient concentration, pH, and temperature typically affect the growth of hydroponic
    culturing plants; sensors are necessary to monitor real-time measurements; electrical
    conductivity sensors may be used to monitor nutrient concentrations; hydroponics
    enables year-round production of pathogen-free micro tubers in large quantities.'
  7: "Source material: \"Closed hydroponic systems do not need a growth medium. However,\
    \ nutrient imbalances may occur in this system as time progresses if not maintained\
    \ appropriately.\" \"The investigation\u2019s primary objective was to compare\
    \ the growth of two types of wicks i.e., horizontal and vertical and also to determine\
    \ the optimum wick number best for producing \u2018Dejima\u2019 seed potatoes\
    \ (Solanum tuberosum L.).\" \"Two to ten wicks were placed horizontally via holes\
    \ in the polystyrene box\u2019s base and six wicks were placed vertically. However,\
    \ six horizontal wick generated more tubers per plant than the six vertical ones,\
    \ and the average tuber weight dropped. But, by increasing the wick count to eight,\
    \ the average tuber weight increased. The results suggested that eight wick per\
    \ box was optimum for the production of \u2018Dejima\u2019 seed potatoes.\""
  9: " \n1     evaluated the efficacy of a tangible way of repeated water delivery\
    \ by the drip irrigation system.\n2     Frequent watering with water ensured efficient\
    \ water usage and minimized system water loss. Leaf\n3     area and yield were\
    \ considerably more remarkable in this system.\n11              The significant\
    \ advantage of this method is less water consumption. A drip system can\n12  \
    \   survive equipment failures and short-term power. Moisture levels can be easily\
    \ controlled in a drip\n13     system. Enough oxygen transfer favors crop cultivation\
    \ in soil and hydroponic systems. Recirculation of excess nutrients is also possible\
    \ in this system.\n17     The major limitation of the drip system includes being\
    \ easily prone to algal growth and clogging,\n18     so regular cleaning is mandatory.\n\
    19     Ebb and flow (or Flood and drain) hydroponics system\n20              It\
    \ is considered a more popular system in which plants are kept in large grow beds,\
    \ usually\n21     filled with growing medium.\n23     The timer regulates the\
    \ flow of nutrient solutions in the environment. If the timer puts\n24     the\
    \ pump on, it allows the nutrient solution in the growth tray, and if it shuts\
    \ off, it pumps the\n25     nutrient solution back into the reservoir.\n7    \
    \  A drip hydroponic system designed by Kusnierek et al. [3] resulted in the production\
    \ of ~300% higher potato tuber than the\n8      conventional system.\n"
  10: "The deep water culture was observed producing the highest number of tubers\
    \ but the total tuber weight/plant was least among the three. The aerohydroponic\
    \ system was designed by maintaining the contact of the root to the nutrient solution\
    \ in lower bed part while spraying the upper root part intermittently. Chang et\
    \ al. [28] performed a comparison of potato seed tubers production in three different\
    \ hydroponic systems, i.e. aeroponic (discussed later), aerohydroponic and deep-water\
    \ culture. In their conclusion, it was stated that small tubers (1\u20135 g) for\
    \ plant propagation can be produced using the deep water culture. The deep-water\
    \ cultivation system showed a delayed tuberization in comparison to aeroponic\
    \ and aerohydroponic cultivation."
  11: "Source material here.\n1              The system is reliable and cheap, and\
    \ an air pump uninterruptedly supplies oxygen to the\n2     crop root zone. A\
    \ simple experimental setup in plastic boxes, glass basins, ice boxes, and fish\n\
    3     ponds is enough for crop cultivation. Deep water cultivation is best suited\
    \ for producing cherry\n4     tomatoes, cucumber, Chinese cabbage, lettuce, spinach,\
    \ and radish [49]. However, crop cultivation\n5     using this method has not\
    \ been commercialized extensively because of a few limitations, such as\n6   \
    \  contact  area  between  air  and  water  and  oxygen             transfer \
    \ efficiency     [50].  Moreover,  a  few\n7     parameters, such as concentration\
    \ of the nutrients and oxygen, salinity, and pH, must be critically\n8     monitored\
    \ to evade algal and mold growth in the reservoir [23].\n9     Nutrient film technique\
    \ (NFT) hydroponics system\n10              NFT technique requires only a thin\
    \ layer of solution at the bottom of a deep tank (a \"film\"\n11     in actuality;\
    \ Figure 2e). Consequently, the lower half of the roots will receive food and\
    \ water,\n12     while the upper half will be allowed to breathe [51]. This technique\
    \ is used when plants respond\n13     by producing roots that reach the film and\
    \ then extend horizontally when it is initially produced.\n14     This system\
    \ exposes the root surface to the air during nutrient solution circulation. The\
    \ pump is\n15     generally in mode to monitor the nutrient solution constantly\
    \ [47].\n16              In a study conducted by Corr\xEAa et al. [29], the researchers\
    \ compared the potato seed tuber\n17     production of Monalisa and Agata cultivars\
    \ in NFT with traditional beds and pots methods. In\n18     terms of tubers/plant\
    \ number in single and staggered harvest, the NFT system performed better\n19\
    \     statistically. In a single harvest the number of tubers in hydroponically\
    \ grown seed potato plants\n20     was 147% higher than the bed and pot systems.\
    \ Even in the staggered harvest, an increase of 286%\n21     in tubers was observed\
    \ in the hydroponic plants as compared to the ones grown in beds NFT was\n22 \
