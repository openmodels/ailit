    \  Tican  [30]                  compared  mini-tuber\n27     development in two\
    \ industrial substrates (perlite and expanded clay) and two hydroponic systems\n\
    28     (wilma and NFT). The NFT was observed having positive results in terms\
    \ of minituberization,\n29     mini-tuber number and weight.            Medeiros\
    \ et al. [53]        conducted an       experimental study using\n30     different\
    \ NFT systems to produce seed tubers and highlighted the significant advantages\
    \ and\n"
  14: "Source material here.\nAeroponics increased potato mini tuber output by 8.5\
    \ times than the conventional cultivation. [...] The selected cultivars responded\
    \ economically at 100 plants m-2. [...] Aeroponics farming requires less water\
    \ and no soil, so it is a prudent option for promoting mini tuber production in\
    \ challenging potato cultivation environments, such as deserts, cold steep terrains,\
    \ and coastal regions. [...] It produces more flavonoids, phenolics, and antioxidants\
    \ than soil cultivation and minimizes the amount of water potato plants need and\
    \ ensures they get enough oxygen. [...] Aeroponics systems don't need fertile\
    \ land to be installed, and closer plant spacing is possible. [...] the technique\
    \ can be utilized for crop production in hostile environments. [...] Both cultivars\
    \ had optimal ECs below 2.1 and 1.7 dS m-1, respectively. [...] The technology\
    \ is still in its infancy and has room for development. The system still requires\
    \ a good environment and appropriate techniques, and hence more elaborative research\
    \ is warranted. For example:\n\u2022    Optimizing nutrition solutions for various\
    \ potato cultivars.\n\u2022    Identifying the local nutrient source to reduce\
    \ input costs.\n"
