Highlights:
  3: Hydroponics is identified as a promising solution for sustainable potato production,
    providing better yields and crop productivity, and addressing future food security
    concerns.
  5: Soilless agriculture, specifically hydroponics, offers a way to overcome limitations
    of soil-based cultivation, potentially providing disease-free mini tubers and
    higher yields. Soilless culture can help accurately control the root environment,
    improving production and quality.
  6: Hydroponics is a rapidly growing field in agriculture and a potential method
    for sustainable agriculture and year-round production of pathogen-free mini tubers.
    It allows for controlled conditions and can be used in various agro-climatic zones.
  7: "Eight horizontal wicks per box was determined to be the optimum configuration\
    \ for producing \u2018Dejima\u2019 seed potatoes in a wick hydroponic system,\
    \ based on tuber count and average tuber weight."
  8: Perlite + peat moss (1:2) and Jeju scoria + peat moss (1:2) were the most suitable
    for seed tuber development and growth using a wick culture technique. Drip systems
    are gaining popularity in hot and dry locations for water conservation.
  9: Drip systems ensure efficient water usage, minimize water loss, and can survive
    equipment failures and short-term power outages. Drip hydroponics can significantly
    increase potato tuber production compared to conventional systems. Ebb and flow
    systems require continual observation to monitor water flow.
  10: "Deep water culture showed delayed tuberization compared to aeroponic and aerohydroponic\
    \ cultivation; Small tubers (1\u20135 g) for plant propagation can be produced\
    \ using the deep water culture."
  11: NFT system performed better statistically in terms of tubers/plant number in
    single and staggered harvests compared to bed and pot systems. NFT was observed
    having positive results in terms of minituberization, mini-tuber number and weight.
  12: NFT hydroponics enhances nutrient recirculation, oxygen supply, is economical,
    minimizes land usage, labor, and fertilizers, and is climate resistant with minimal
    water consumption. Aeroponics can increase yields of potato mini-tubers.
  13: Plant density plays a major role in tuber production in aeroponic systems; increasing
    plant density reduces the number of tubers per plant.
  14: Aeroponics farming requires less water and no soil, so it is a prudent option
    for promoting mini tuber production in challenging potato cultivation environments,
    such as deserts, cold steep terrains, and coastal regions.
  15: Special attention required for real-time monitoring of hydroponic systems to
    prevent plant death.
  16: Nanoparticles can be used to reduce the impacts of temperature, salt, and drought
    stress on plants by enhancing their tolerance to these stresses.
  32: Deep-water cultivation of Atlantic and Superior cultivars produced the highest
    number and weight of small tubers compared to other methods. Horizontal wicks
    were observed to show better seed potato growth than vertical wicks in wick systems.
    Aeroponic systems provided higher productivity and lower cost of tuber production
    per meter square.
  33: Aeroponics produced two to five times more tubers per plant than conventional
    systems.
  34: Agata and Monalisa cultivar observations were taken as an average in a hydroponic
    system with multiple harvests involved
  35: Aeroponic systems produced 4.08 and 1.29 times higher mini-tubers than substrate
    and combination system; Aeroponic production was observed producing 8.5 times
    the mini-tubers than the conventional system.
