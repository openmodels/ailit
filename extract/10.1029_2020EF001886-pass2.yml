Drivers of Risk:
  1: The outcomes are impacted by anthropogenic warming and population growth, leading
    to increased frequency, severity, and extent of extreme heat and humidity events.
  2: Changes in atmospheric dynamics and increases in heat and humidity, leading to
    more extreme heat events, are drivers of risk evaluated in this paper.
  3: Daily maximum air temperature (Tmax) and daily mean relative humidity (RH) data
    drive the heat index calculation. Climate change scenarios RCP4.5 and RCP8.5 are
    used to investigate changes in heat-stress impact.
  4: Impacts examined include the changes in high-end heat severity across different
    climate scenarios.
  7: Heat stress is impacted by climate change and population change, with projections
    indicating increased severity and frequency under scenarios RCP4.5 and RCP8.5.
  8: Increases in temperature and absolute humidity drive increases in heat stress,
    with HI exhibiting a nonlinear sensitivity to these changes. Specifically, increases
    in temperature for a fixed relative humidity result in even larger increases in
    HI. The study considers short, medium (3-day rolling average), and long (7-day
    rolling average) duration heat events.
  9: Changes in the weighted temperature severity (WTS) of daily summer heat stress,
    specifically looking at decadal trends.
  10: Shocks or changes impacting outcomes include climate change effects and population
    effects under considered scenarios.
  11: Shocks impacting outcomes include increased greenhouse gas emissions, climate
    change scenarios, and population dynamics.
  12: Global-mean warming increases risk in the Pacific Northwest, central California,
    and a major portion of the Midwest, while population growth exacerbates PI risk
    in the Northeast, Southeastern Piedmont, coastal Pacific Northwest, and parts
    of Texas, Utah, and California.
Evaluation overview:
  1: The analysis focuses on the projected increase in heat stress impact by the late
    21st century in the U.S., which could result in increased human morbidity and
    mortality due to severe heat stress events.
  2: The paper evaluates the potential impact (PI) of extreme heat events on mortality
    risk in the contiguous United States (CONUS) under current and future climate
    scenarios.
  3: Heat stress (HS) is quantified based on the U.S. National Weather Service recommended
    heat index (HI).
  4: The outcome being evaluated is the high-end heat severity (HS severity) measured
    by the 40 years return value of the heat index (HI).
  8: Extreme heat stress (HS) severity is evaluated using the daily maximum Heat Index
    (HI) to estimate the annual maximum magnitude of summer extreme HS severity.
  9: This paper analyzes changes in population exposure to extreme summer heat stress
    (HS) characteristics.
  10: The analysis evaluates perceived heat stress across different regions of the
    United States under various climate and population scenarios.
  11: Provides an overview of potential impacts on population exposure to heat stress
    characteristics and risk assessment for potential impacts of high-end summer heat
    stress (HS) events.
  12: The paper evaluates the risk of potential impacts (PI) from both short and long
    duration extreme heat stress (HS) across several parts of the contiguous United
    States (CONUS).
Highlights:
  1: Short-to-medium duration heat stress risk is likely to double in the U.S. coastal
    Pacific Northwest, central California, and Great Lakes, largely due to climate
    change, implying an increase in risk without aggressive mitigation.
  2: The study provides a composite indicator quantifying the potential impact (PI)
    of extreme heat events by integrating heat stress characteristics with population
    exposure.
  5: The study emphasizes the importance of understanding extreme heat events in areas
    with socioeconomic vulnerability.
  7: The projected impact of climate change indicates increased frequency and severity
    of heat stress events, especially under the RCP8.5 scenario.
  8: "Extreme heat stress severity is projected to increase significantly across CONUS\
    \ under RCP8.5, with HI values far exceeding air temperature increases. Areas\
    \ exceeding 40.6\xB0C will expand significantly, leading to potentially high mortality\
    \ rates. The spatial patterns of increase show that observed slower recent rates\
    \ of increases in extreme temperatures observed in the Midwest and South partially\
    \ disappear when the variable of interest is instead heat stress."
  9: The WTS increases across the Great Lakes in the RCP8.5 (far-future) scenario,
    indicating a greater potential for heat waves, and suggesting particular challenges
    for heat acclimation and adaptation in this region. Decrease in trends in WTS
    are likely in the far-future (relative to the near-future) in the RCP4.5 scenarios.
  10: A visual representation shows how perceived heat stress varies regionally across
    different climate and population scenarios.
  11: The RCP8.5-SSP5 scenario leads to significantly greater increases in the population
    exposed to severe heat stress indicators and amplified risk of potential impact.
  12: Key outcomes include substantial increase in risk from extreme heat exposure,
    driven predominantly by global warming and population growth, with significant
    variability across different regions of the CONUS.
Methodology:
  1: The study uses climate projections from the CMIP5 model ensemble and historical
    and future population estimates, applying the IPCC risk framework to assess heat
    stress potential impact.
  2: The analysis uses the heat index (HI) as a metric to quantify heat stress (HS)
    and employs nonstationary frequency analysis and generalized extreme value (GEV)
    approaches applied to CMIP5 climate projections and shared socioeconomic pathways
    (SSPs) to assess risk.
  3: "HI calculated using algorithm from Anderson G. Brooke et al., 2013, using Tmax\
    \ and RH. RH calculated using Magnus approximation (Alduchov & Eskridge, 1996)\
    \ or derived from specific humidity and surface pressure (Matthews et al., 2017)\
    \ for GCMs. Bias correction (Wang & Chen, 2014) applied to model-calculated HI\
    \ for historical period (1979\u20132005) to match reanalysis data."
  4: The analysis uses a non-stationary Generalized Extreme Value (GEV) framework
    to estimate high-end heat severity across historical and future climate scenarios.
  5: Non-stationary framework applied to assess health risks from extreme heat events
    as climate statistics change.
  6: A decision matrix is formed using three indicator variables for each grid location
    and each climate scenario, and a composite indicator is estimated using geometric
    aggregation of normalized variables.
  7: The analysis compares observed and CMIP5-modeled projections of heat stress severity
    and uses a relative risk (RR) concept to investigate changes in heat stress exposure
    due to climate and population changes.
  8: The analysis uses daily maximum HI to estimate annual maximum HS severity for
    short, medium, and long duration events. Historical data comes from a reanalysis
    dataset. Future projections are based on the model-ensemble average from 9 CMIP5
    global-climate models, bias-corrected using the method of Wang & Chen (2014).
    The study considers RCP4.5 and RCP8.5 emission scenarios and examines trends in
    WTS.
  9: The analysis uses climate scenarios to project changes in heat stress and population
    exposure. It evaluates the probability density function of 40YHI and population
    estimates. It uses spatial patterns of decadal trends in WTS. Results are applicable
    to near-future and far-future time horizons under RCP4.5 and RCP8.5, focusing
    on summer heat stress.
  11: Analysis performed using climate and population dynamics projections under different
    RCP-SSP scenario combinations, focusing on the contiguous United States (CONUS).
  12: The analysis uses a generalized extreme value (GEV) approach, which is flexible
    across a range of event types and durations, allowing the exploration of distribution
    positions and shapes.
More Notes:
  9: The spatial pattern of 40YHI matches closely that of 40YTx in the western CONUS,
    where the impact of humidity is negligible.
  12: The paper emphasizes the importance of considering additional vulnerability
    factors such as population density, age group, underlying health conditions, and
    socioeconomic status, which could aid in formulating adaptation and mitigation
    strategies.
Quantitative material:
  1: Potential heat stress impact is likely to more than triple in densely populated
    U.S. regions, including the Northeast, Southeast Piedmont, Midwest, and Desert
    Southwest, under the highest emissions scenario by 2060-2099.
  3: "Uses climate data from 1979-2019 for historical analysis. Projects to 2100 using\
    \ RCP4.5 and RCP8.5. Datasets regridded to 2\xB0 spatial resolution."
  4: The paper calculates the 40-year return value of the heat index (40YHI) with
    a probability of exceedance of 0.025 for 1-, 3-, and 7-day heat events.
  8: "Model projections based on RCP8.5 depict a steady increase resulting in HI values\
    \ up to 3.6\xB0C (2.5\xB0C for 7days-HS), and up to 6\xB0C (4.6\xB0C for 7days-HS)\
    \ warmer than the measured air temperature beyond mid-century. AM-HI exceeding\
    \ 40.6\xB0C are expected to intensify over the Gulf of Mexico and Southeast Atlantic\
    \ coastal regions and spread over the entire East, Midwest, and Great Plains under\
    \ the RCP8.5 emission scenario. Also includes '40YHI' values, which are 40-year\
    \ return levels for the annual maximum HI, and 40YTx, 40 year return levels for\
    \ annual max temp."
  9: The image shows projected changes in 40YHI and 30YHI, trends in WTS in degrees
    Celsius per decade, and CONUS population exposure to these trends under SSP2-4.5
    and SSP5-8.5 scenarios.
  10: Includes perceived heat stress changes in percentage terms and relative risk
    across different U.S. regions.
  11: Quantitative estimates include 3x likely increase in risk of potential impact
    in certain U.S. regions under RCP8.5-SSP5 and 2.5x increase in others.
  12: The risk of PI is projected to increase by more than two times due to population
    growth alone in specified regions.
sourcematerial:
  1: "Source material:\n1. Evaluation overview: \"Heat stress has led to massive human\
    \ morbidity and mortality in recent years...conditions expected to become more\
    \ common in the contiguous United States (CONUS) in future.\"\n2. Drivers of Risk:\
    \ \"Anthropogenic warming and population growth may double US heat stress by the\
    \ late 21st century...The HS is expected to become more severe due to an increase\
    \ in frequency, duration, severity, and spatiotemporal extent of extreme warmth\
    \ and moisture.\"\n3. Quantitative material: \"We find that the PI of short-to-medium\
    \ duration (1\u20137 days) HS events is likely to increase more than three-fold\
    \ across densely populated regions of the U.S. including the Northeast, Southeast\
    \ Piedmont, Midwest, and parts of the Desert Southwest by late this century (2060\u2013\
    2099) under the highest emissions scenario.\"\n4. Methodology: \"Using observations,\
    \ climate projections from the CMIP5 model ensemble, and historical and future\
    \ population estimates, we apply the IPCC risk framework to examine present and\
    \ projected future potential impact (PI) of summer heat stress for the contiguous\
    \ United States (CONUS)...\"\n5. Highlights: \"The contribution from climate change\
    \ alone more than doubles the impact in the coastal Pacific Northwest, central\
    \ California, and the Great Lakes region, implying a substantial increase in HS\
    \ risk without aggressive mitigation efforts.\"\n"
  2: "\nEvaluation overview: \"Drawing upon this concept, in this study, we perform\
    \ a climate change risk assessment on the extreme heat events in the CONUS by\
    \ focusing on the PI of the summer (JJA) annual most severe HS in the present\
    \ and several future climate scenarios.\" Drivers of Risk: \"The impact of climate\
    \ change on atmospheric dynamics such as mid-latitude planetary-wave behavior\
    \ may lead to more persistent weather extremes including extreme heat events...Recent\
    \ increases in HS have coincided with the locations of greatest socio-economic\
    \ vulnerability across many parts of the US (Spangler & Wellenius, 2020).\" Methodology:\
    \ \"The US National Weather Service (NWS) characterizes HS using a \u201Cfeels-like\u201D\
    \ apparent temperature that combines the effect of heat and humidity, called the\
    \ heat index (HI) (Anderson G. Brooke et al., 2013)...Generalized extreme value\
    \ (GEV) approaches have gained increasing popularity in this context (Ouarda &\
    \ Charron, 2018; Raymond et al., 2020)...We apply these characteristics of HS\
    \ to CMIP5 climate projections, in combination with projected changes in population\
    \ exposure under the shared socioeconomic pathways (SSPs), to create a composite\
    \ indicator quantifying the PI of HS (Cardona et al., 2012; Estoque et al., 2020).\"\
    \ Highlights: \"We argue that from a net-impacts point of view the PI of extreme\
    \ heat events is best informed through a metric that integrates HS characteristics\
    \ and the total population potentially impacted ('population exposure') (Cardona\
    \ et al., 2012; O\u2019Neill et al., 2017).\"\n"
  3: "Source material\nIn this study, HS is quantified based on the U.S. National\
    \ Weather Service recommended heat index (HI) (https://www.wpc.ncep.noaa.gov/html/heatindex_equation.shtml).\
    \ The HI was calculated based on the algorithm discussed in Anderson G. Brooke\
    \ et\_al.,\_        2013 using daily maximum air temperature (Tmax) and daily\
    \ mean relative humidity (RH) data. Changes in heat-stress impact were investigated\
    \ using bias-corrected model output for the RCP4.5 and RCP8.5 scenarios. For the\
    \ historical analysis (observed period, 1979\u20132019), the Tmax was obtained\
    \ directly from the Climate Prediction Center (CPC) (available at ftp://ftp.cdc.noaa.gov/Datasets/cpc_global_temp/).\
    \ These corrections were then applied to projected HI under RCP4.5 and RCP8.5\
    \ from 2006 to 2100. all datasets were regridded and extracted at 2\xB0 spatial\
    \ resolutions within the CONUS region. The HI was calculated based on the algorithm\
    \ discussed in Anderson G. Brooke et\_al.,\_        2013 using daily maximum air\
    \ temperature (Tmax) and daily mean relative humidity (RH) data. The RH was estimated\
    \ by using the Magnus approximation as (Alduchov & Eskridge,\_        1996), ...\
    \ whereas RH was derived from specific humidity (q) and surface pressure (Ps)\
    \ as (Matthews et\_al.,\_         2017)... To perform the bias correction, model-calculated\
    \ HI for the historical period (1979\u20132005) was adjusted to match that calculated\
    \ from reanalysis (CPC and ERA5) over the same period. A brief  description of\
    \  the bias correction technique (Wang & Chen,\_       2014) applied in this study\
    \ is provided in\_     A.2. of   the supporting information.\n"
  4: " \nEvaluation overview: \"Estimation of return values quantifies the risk associated\
    \ with a given climate extreme... we define the High-end HS severity as the magnitude\
    \ of the 40 years return value of the HI\" \n\nDrivers of Risk: \"The 40YHI is\
    \ estimated for the 1-, 3-, and 7 days-HS events, individually, by using a non-stationary\
    \ GEV framework. This framework is applied to the annual values of summer extreme\
    \ HS severity corresponding to the five different 40 years climate scenarios\"\
    \n\nQuantitative material: \"we define the High-end HS severity as the magnitude\
    \ of the 40 years return value of the HI... with an annual probability of exceedance\
    \ of only 0.025.\"\n\nMethodology: \"Our analysis is based on three time periods:\
    \ historical (1980\u20132019), near-future (2020\u20132059), and far-future (2060\u2013\
    2099). For each time period-scenario combination, the BM method was applied to\
    \ generate 40-years samples of AM-HI at each grid point location of the CONUS.\
    \ The GEV is a three-parameter distribution... the non-stationary climate information\
    \ in the GEV distribution... can be incorporated by revising the model parameters\
    \ to capture the shift in the mean and change in variability within the distribution\"\
    \n"
  5: 'Source material used: "The model parameters associated with the best GEV models
    are subsequently used to calculate the 40-years return values of annual extreme
    summer HS events." "More specifically, we applied an indicator-based assessment
    technique to determine a composite indicator for PI of HS. This indicator-based
    assessment technique is implemented in previous related studies." "We calculated
    population exposure for each duration category (short (1 day), medium (3 days),
    and long (7 days)) of HS events based on the mean of total population estimates
    for each of the five climate scenarios, separately." "Using a non-stationary framework
    aids in assessing the health risk from extreme heat events whose statistics change
    substantially with mean warming." "Recent observed WTS trends are greatest in
    areas of the US with large socioeconomic vulnerability, underscoring the importance
    of comprehensively understanding future changes."'
  6: 'The methodology involves forming a decision matrix based on three selected indicator
    variables for each grid location and climate scenario, and estimating a composite
    indicator using geometric aggregation of normalized variables. This is referenced
    in the following text: "A decision matrix was formed based on the three selected
    indicator variables for each grid location ... the composite indicator is estimated
    by a type of combining of indicators known as geometric aggregation of normalized
    variables based on the decision matrix."'
  7: "Source material: Historical and CMIP5-model projections of extreme heat stress\
    \ (a)-(c) Spatial average of historical observations and CMIP5 modeled projections\
    \ (period, 2020\u20132100; shading represents the interquartile range of inter-model\
    \ variability) of AM-HI representing the extreme HS severity for RCP8.5 (solid\
    \ brown line) and RCP4.5 (solid red line) ... We use the RR concept to investigate\
    \ the changes in PI of heat stress (i.e., heat-stress exposure) due to population\
    \ change; climate change; and their interaction. Figure 1. ... spatial maps showing\
    \ the temporal mean of AM-HI for the CONUS for (d) present (1980\u20132019), (e)\
    \ near-future (2020\u20132059), and (f) far-future (2060\u20132099) periods corresponding\
    \ to 1 day-HS for the RCP8.5 emission scenario; (g)-(i) same as in (d)-(f) but\
    \ for 3 days-HS events; (j)\u2013(l) same as in (g)-(i) but for 7 days-HS events."
  8: "For the evaluation overview, the document mentions: \"For this study, we use\
    \ the daily maximum HI (see Methods) to estimate the annual maximum magnitude\
    \ of summer extreme HS severity for short, medium and long duration events.\"\n\
    \nIn terms of drivers of risk, the text states: \"Like other heat-stress metrics,\
    \ HI exhibits a nonlinear sensitivity toward changes in temperature and absolute\
    \ humidity... As such, increases in temperature for a fixed relative humidity\
    \ result in even larger increases in the HI.\"\n\nRegarding quantitative material,\
    \ it notes: \"Beyond mid-century, the CONUS-mean 1day-HS (7days-HS) severity from\
    \ climate-model projections based on RCP8.5 depict a steady increase resulting\
    \ in HI values up to 3.6\xB0C (2.5\xB0C), and up to 6\xB0C (4.6\xB0C) warmer than\
    \ the measured air temperature.\"\n\nFor the methodology, it details: \"Historical\
    \ data comes from a reanalysis dataset. Future projections are based on the model-ensemble\
    \ average... bias-corrected using the method of Wang & Chen (2014).\"\n\nThe highlights\
    \ section is supported by: \"Projected increases in HS severity in excess of 40.6\xB0\
    C... Such spatial patterns of increase are in close agreement with historical\
    \ analyses and with climate-model projections of increases in maximum temperature.\""
  9: "yaml\nEvaluation overview: \"Changes in Population Exposure and Extreme Summer\
    \ HS Characteristics\"\nDrivers of Risk: \"examining the changes in the WTS (see\
    \ Methods) by investigating the spatial patterns of its decadal trends\"\nQuantitative\
    \ material: \"Figure 2. Changes in Population Exposure and Extreme Summer HS Characteristics:\
    \ (a)\u2013(c) Data ellipses (or envelops) representing the probability density\
    \ function evaluated from the bivariate distribution of 40YHI and population estimates\
    \ for the CONUS in the five climate scenarios, (d)\u2013(f ) probability density\
    \ for spatial distribution of decadal trends in WTS of daily summer HS severity\
    \ (summer annual maximum minus median) and bar plots indicating the total population\
    \ exposure to specific trend magnitudes.\"\nMethodology: \"Data ellipses (or envelops)\
    \ representing the probability density function evaluated from the bivariate distribution\
    \ of 40YHI and population estimates for the CONUS in the five climate scenarios...probability\
    \ density for spatial distribution of decadal trends in WTS of daily summer HS\
    \ severity\"...\"These trends show a relatively higher rate of increase in WTS\
    \ across the Great Lakes in the RCP8.5 (far-future) scenario...\"...\"On the other\
    \ hand, decrease in the trends in WTS are likely in the far-future (relative to\
    \ the near-future) in the RCP4.5 scenarios.\"\nHighlights: \"These trends show\
    \ a relatively higher rate of increase in WTS across the Great Lakes in the RCP8.5\
    \ (far-future) scenario...suggest particular challenges for heat acclimation and\
    \ adaptation in this region\"...\"decrease in the trends in WTS are likely in\
    \ the far-future (relative to the near-future) in the RCP4.5 scenarios.\"\nMore\
    \ Notes: \"to the Southeast, which is generally humid, the spatial pattern of\
    \ the 40YHI matches closely to that of the 40YTx in the western CONUS, where the\
    \ impact of humidity is negligible\"\n"
  10: 'Source material here: The overall image provides visual representation of perceived
    heat stress changes across the United States, segmented by counties and regional
    maps, under different climate change and population scenarios (RCP4.5-SSP2, RCP8.5-SSP5)
    for near-future (2025-2049) and far-future (2050-2074), illustrated through a
    color gradient key representing relative risk percentage changes and corresponding
    box plots showing effects on relative risk."

    '
  11: "Source material: To examine changes in population exposure, we used mean population\
    \ estimates... Future changes in risk of PI are investigated based on the RR.\
    \ These scenarios were selected based on the interaction of the moderate (RCP4.5)\
    \ and high (RCP8.5) levels of greenhouse gas emissions with the moderate (SSP2)\
    \ and the most unconstrained (SSP5) socio-economic pathways... Overall, the effect\
    \ of population dynamics (Figure\_ S11), and trends in WTS (Figures\_ S8\u2013\
    S10 ) is also reflected in the changes in the risk of PI of HS over the CONUS\
    \ in the four RCP-SSP combinations (Figure\_ 3 and Figure\_ S12). These indicate\
    \ more than 3x likely increase in risk of PI due to the total effect of climate\
    \ and population changes in the northern Midwest, coastal Pacific Northwest, central\
    \ California, and northern Utah under the RCP8.5-SSP5 emission scenario, and a\
    \ 2.5x increase in the Southeast Piedmont, northern Texas, and portions of the\
    \ Southwest. We investigate the changes in the likely exposed population counts\
    \ to each of the indicators for HS characteristics (40YHI, and WTS) in the future\
    \ climate scenarios... Future changes in risk of PI are investigated based on\
    \ the RR. Maps showing the RR for the 1 day-HS (3 days-HS, and 7 days-HS) events\
    \ are presented in Figures 3a\u20133l , (Figure S12) which are further summarized\
    \ by boxplots in Figures 3m\u20133o based on the census regions (Figure 3q) within\
    \ the CONUS. A considerably larger population is likely to be exposed to more\
    \ severe 40YHI in future decades, particularly under the RCP8.5-SSP5 scenario\
    \ (Figures\_ 2a\u20132c )... The likely increases in RR are greatest in the RCP8.5-SSP5\
    \ far-future scenario for 1 day- and 3 days-HS events..."
  12: 'Source material here: Our findings indicate a substantial increase in the risk
    of PI from both short and long duration extreme HS in several parts of the CONUS.
    The possible increases noted over the Pacific Northwest, central California, and
    a major portion of Mid-west will most likely be dominated by global-mean warming.
    On the contrary, the risk of PI is likely to increase by more than two times due
    to population growth alone in the Northeast, Southeastern Piedmont, coastal Pacific
    Northwest, and parts of Texas, Utah, and California. Being based on severity and
    temporal variability relative to local climate, as well as changing population
    patterns, the integrated indicator for PI that we derive applies equally well
    across the CONUS, adding a new element to a growing literature on extreme-heat
    exposure. The flexible of the GEV approach allows it to be applied across a range
    of event types and durations. The resultant projected changes in distribution
    positions and shapes that we find aid in quantifying increases in risks from extreme
    heat exposure according to best-available knowledge of the controlling factors
    of acclimation and adaptability. While our current analysis focuses entirely on
    the potential impact of HS, additional determinants of vulnerability such as population
    density by age group, underlying health conditions, and socioeconomic status are
    crucial and would help to translate these findings into tangible adaptation and
    mitigation agendas.'
