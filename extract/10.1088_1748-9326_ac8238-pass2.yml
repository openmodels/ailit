  2: "Source material here.\nClimateprojectionsareuncertain;thisuncertaintyiscostlyandimpedesprogressonclimate\
    \ policy. This uncertainty is primarily parametric (what numbers do we plug into\
    \ our equations?), structural (what equations do we use in the first place?),\
    \ and due to internal variability (natural variability intrinsic to the climate\
    \ system). The former and latter are straightforward to characterise in principle,\
    \ though maybe computationally intensive for complex climate models. The second\
    \ is more challenging to characterise and is therefore often ignored. We developed\
    \ a Bayesian approach to quantify structural uncertainty in climate projections,\
    \ using the idealised energy-balance model representations of climate physics\
    \ that underpin many economists\u2019 integrated assessment models (IAMs) (and\
    \ therefore their policy recommendations). We define a model selection parameter,\
    \ which switches on one of a suite of proposed climate nonlinearities and multidecadal\
    \ climate feedbacks. We find that a model with a temperature-dependent climate\
    \ feedback is most consistent with global mean surface temperature observations,\
    \ but that the sign of the temperature-dependence is opposite of what Earth system\
    \ models suggest. This difference of sign is likely due to the assumption that\
    \ recent pattern effect can be represented as a temperature dependence. Moreover,\
    \ models other than the most likely one contain a majority of the posterior probability,\
    \ indicating that structural uncertainty is important for climate projections.\
    \ Indeed, in projections using shared socioeconomic pathways similar to current\
    \ emissions reductions targets, structural uncertainty dwarfs parametric uncertainty\
    \ in temperature. Consequently, structural uncertainty dominates overall non-socioeconomic\
    \ uncertainty in economic projections of climate change damages, as estimated\
    \ from a simple temperature-to-damages calculation. These results indicate that\
    \ considering structural uncertainty is crucial for IAMs in particular, and for\
    \ climate projections in general.\n"
  3: 'yaml

    Methodology: "Here we present a means to quantify structural uncertainty in a
    simple EBM used by several IAMs, though our approach is generalisable to climate
    models with additional complexity...A computational Bayesian approach to this
    problem essentially (1) specifies a model that represents this process, (2) specifies
    prior distributions for the parameters of this model, (3) draws samples from these
    priors, (4) computes the relative likelihood of these draws according to how well
    or poorly they correspond to observations of this process, (5) weighs these samples
    according to this likelihood, and (6) uses this weighted ensemble (i.e. the posterior
    distribution) of samples to project into the future probabilistically."

    Highlights: "We show that structural uncertainty is much larger than parametric
    uncertainty for projections of T, and consequently for calculations of damages
    due to climate change."

