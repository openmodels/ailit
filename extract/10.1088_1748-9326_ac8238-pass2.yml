Drivers of Risk:
  2: Anthropogenic emissions increasing greenhouse gas concentrations, resulting in
    radiative forcing; Temperature dependence of climate feedback
  4: Radiative forcing under different emissions scenarios, temperature projections.
  5: The impacts from climate change warming patterns, especially in regions of tropical
    convection, affect radiative forcing and climate sensitivity which are drivers
    of temperature projections.
  6: "Structural uncertainty, including factors like El Ni\xF1o and ocean heat content,\
    \ affects projections of temperature and economic impacts."
Evaluation overview:
  2: Economic projection of climate change damages
  4: Economic damages due to climate change.
  5: The analysis explores structural and parametric uncertainties in temperature
    projections and their implications for economic damages due to climate change
    under different shared socioeconomic pathways.
  6: The paper examines the importance of structural uncertainty in projections of
    both physical climate impacts (e.g., global temperature change) and economic damages.
Highlights:
  2: A model with a temperature-dependent climate feedback is most consistent with
    global mean surface temperature observations, but the sign of the temperature-dependence
    is opposite of what Earth system models suggest. Structural uncertainty dominates
    overall non-socioeconomic uncertainty in economic projections of climate change
    damages.
  3: Structural uncertainty is larger than parametric uncertainty for projections
    of Earth's global mean surface temperature (T), impacting economic calculations
    of climate damages.
  4: A metric u(X) is defined to quantify the importance of structural uncertainty
    in climate projections.
  5: The temperature-dependent feedback model is identified as having a significant
    probability mass, but structural uncertainty is dominant, accounting for 55% of
    the posterior mass in model evaluations.
  6: Structural uncertainty has a significant influence on both physical and economic
    projections of climate impacts.
  7: Authors show that structural uncertainty significantly contributes to total uncertainty
    in reduced complexity climate models.
Methodology:
  2: A Bayesian approach to quantify structural uncertainty in climate projections
    using idealized energy-balance model representations of climate physics. Model
    selection parameter switches on one of a suite of proposed climate nonlinearities
    and multidecadal climate feedbacks.
  3: The analysis involves quantifying structural uncertainty in energy balance models
    (EBMs) used by integrated assessment models (IAMs), using a computational Bayesian
    approach.
  4: "Uses a climate model with multiple sub-models (linear, T-dependent heat capacity,\
    \ F-dependent heat capacity, T-dependent feedback, F-dependent feedback, and slow\
    \ feedback) and a model selection parameter \xB5. Prior distributions for parameters\
    \ are specified based on physical principles, ESMs, Bayesian climate modeling,\
    \ and observational products. The model is fit to observed temperature time series\
    \ from 1850-2020, and future projections are generated. A metric u(X) is defined\
    \ to quantify the importance of structural uncertainty, comparing the interquartile\
    \ range of the multi-model projection to the interquartile range of the preferred\
    \ model's projection."
  5: The analysis uses posterior distributions to evaluate model selection and structural
    uncertainty in climate projections, focusing on temperature dependency in feedback
    models and comparing outcomes with different nonlinear terms.
  6: The analysis uses a simple energy-balance model to characterize structural uncertainty
    and suggests similar approaches for more complex models.
  7: Structural uncertainty in reduced complexity climate models is emphasized, particularly
    how it should be accounted for in physical and socioeconomic projections.
More Notes:
  2: The difference in sign between the temperature dependence in this model and Earth
    system models is likely due to the assumption that recent pattern effect can be
    represented as a temperature dependence.
  4: The paper explores various model structures and drops some due to negligible
    posterior mass or parameters constrained to be small.
  7: The paper suggests considering mixtures or combinations of nonlinearities or
    a nonlinear term that increases and then decreases to account for the pattern
    effect.
Quantitative material:
  2: Structural uncertainty dwarfs parametric uncertainty in temperature projections
    under shared socioeconomic pathways similar to current emissions reduction targets.
  4: Uses discount rates of 4.255% and 2.955% to translate temperature projections
    into economic damages.
  5: The analysis provides quantitative measures of structural uncertainty dominance,
    indicating values like u(T(2100))=2.0 and u(T(2300))=2.7 for SSP4-6.0, and u(T(2100))=2.3
    and u(T(2300))=4.1 for SSP3-7.0.
  6: The paper provides u values indicating the dominance of structural uncertainty,
    with u=2.9 for SSP4-6.0 and u=4.6 for SSP3-7.0 for damages.
