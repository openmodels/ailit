Drivers of Risk:
  1: Floods are the primary drivers of risk being analyzed in the study.
  2: Floods are identified as the key environmental shock impacting economic outcomes.
  3: Flood conditions are the primary drivers of risk in this analysis.
  4: The analysis considers river discharge, inundation, and flood extent as factors
    impacting outcomes.
  7: The main driver of risk discussed on this page is flooding, specifically measured
    in terms of inundation period and depth.
  8: Floods are identified as the drivers of asset damage in each year.
  9: Heavy rainfalls leading to floods and breaching of flood control systems/irrigation
    reservoirs.
  10: Floods (in targeted river basins)
  11: Flood occurrences and prolonged inundation periods, especially in areas with
    shallow slopes, are drivers of business interruption (BI) loss.
  12: Impacts related to flood events and potentially climate change.
  13: Extreme climate conditions are identified as the drivers leading to BI losses
    across various regions.
  14: Floods are identified as the primary driver of business interruption loss in
    various regions.
  15: Flood events are identified as a shock impacting BI loss and asset damage outcomes.
  16: Floods, and the level of flood protection (FPL).
  17: Floods exceeding flood protection levels (FPL).
  18: Increase in the number of floods with large return periods; flood magnitudes;
    local Floodplain Population Level (FPL); Climate change.
  21: Flood events analyzed.
Evaluation overview:
  1: The paper assesses economic losses due to flood-related business interruption
    and asset damage globally.
  2: The study analyzes both global asset damage and business interruption (BI) loss
    due to floods, focusing more on BI loss for present and future scenarios.
  3: The study evaluates business interruption loss and asset damage due to flood
    inundation.
  7: The paper provides an overview of business interruption (BI) loss caused by inundation,
    focusing on the inability to perform work due to workplace destruction or inaccessibility.
  9: Economic losses due to floods, specifically Business Interruption (BI) loss and
    asset damage.
  10: Evaluates business interruption (BI) loss and asset damage.
  11: This page evaluates the economic impact of potential future BI loss (business
    interruption loss) and flood-related economic loss relative to GDP across various
    global regions.
  12: Projections of economic impacts related to GDP, specifically Business Interruption
    losses and asset damages due to floods are provided.
  13: The page provides an overview of Business Interruption (BI) losses due to climate
    impacts, comparing past and projected future BI losses globally.
  14: The page provides an overview of business interruption (BI) loss due to floods,
    focusing on the economic impacts relative to GDP.
  15: The page provides an overview of economic impacts related to BI loss and asset
    damage due to floods.
  16: Evaluates the ratio of business interruption (BI) loss to asset damage.
  17: Evaluates the ratio of business interruption (BI) loss to asset damage.
  18: Flooding-related Business Interruption (BI) loss and asset damage on a global
    scale.
  21: Assessing direct and indirect economic impacts of a flood event.
Highlights:
  1: "Future projections under RCP8.5 and SSP3 scenarios show an increase in BI loss\
    \ and asset damage per GDP by 0.32% and 1.78% for the 2061\u20132090 period compared\
    \ to 1971\u20132000."
  2: Findings suggest that BI loss can be greater than direct economic damage from
    asset damage in certain scenarios, emphasizing the importance of considering both
    aspects in flood risk assessments.
  3: A detailed methodology for assessing flood risk and economic damage is developed
    using high-resolution hydrodynamic simulations and economic data.
  7: One key outcome is the determination of a constant for BI period relative to
    inundation period. In this study, the constant is set at two, indicating that
    the BI period is assumed to be twice as long as the inundation period based on
    past surveys.
  8: The study focuses on flood damage specific to different regions and sectors,
    with results validated using external disaster databases.
  9: CaMa-Flood was able to reproduce the general trend of global flood risk. Estimated
    BI losses calculated for Namibia, Moldova, Pakistan (2011), Thailand, and Malawi
    were similar to World Bank values.
  10: "The method of calculating asset damage was sufficiently accurate for global\
    \ long-term averages. Spatial distribution of annual BI loss and BI loss per GDP\
    \ averaged from 1960 to 2013 according to river basin drainage area (\u226510,000\
    \ km2) is shown."
  11: Regions like America and Europe have high absolute BI losses but a lower BI
    loss to GDP ratio (<0.1%) compared to the global average, due to their high GDP.
  12: Both Business Interruption loss and asset damage exhibit a significant increase
    projected towards the end of the century due to floods.
  13: Significant increases in projected BI losses are noted, particularly in China,
    Thailand, and the Nile River region, with future losses projected to exceed USD
    5 billion in several regions and percentage losses relative to GDP exceeding 1.5%
    in certain areas.
  14: Regions like Africa and Europe have the highest ratio of BI loss to asset damage,
    while South America has the lowest.
  15: Flood protection significantly reduces BI loss and asset damage, with a greater
    effect on BI loss.
  16: Flood protection significantly reduces the ratio of business interruption loss
    to asset damage. Flood protection has a greater effect on BI loss than on asset
    damage.
  17: The ratio of BI loss to asset damage tends to be greater in river basins with
    low FPL. Future BI loss to asset damage ratios are projected to increase in regions
    with both low and high FPL, including the Mississippi River basin (increase of
    approximately 17.3%).
  18: BI loss is not negligible in the estimation of global flood risk; notably, the
    projected risk changes with local FPL and flood magnitude.
Methodology:
  1: The analysis uses a global river and inundation model driven by a bias-corrected
    meteorological forcing scheme to estimate flood-related economic losses.
  2: Utilizes the modeling framework of Tanoue et al. with bias-corrected meteorological
    forcing data (S14FD) to simulate daily inundation depth, expanding the approach
    to global river basins.
  3: The analysis uses simulated flood conditions and gridded GDP data to calculate
    BI loss and asset damage at a high spatial resolution.
  4: Geographical data uses current land use from GLCNMO v2 and national mask data
    from GRUMPv1 for asset damage assessment.
  6: Methodology involves using the correlation between gridded building height and
    GDP to estimate GDP distribution, with adjustments to ensure the total GDP ratio
    per country equals 1.
  7: The analysis uses a combination of datasets, including FLOPROS and high-resolution
    digital elevation models, to compute inundation periods and depths, and relates
    these to BI losses based on given proxies and assumptions.
  8: "Asset damage was calculated through the multiplication of asset value by the\
    \ fraction of assets affected by floods, using annual maximum flood depth and\
    \ a damage\u2013depth function."
  9: The study used reanalysis and GCM simulations to estimate past and future flood
    impacts on the economy. The reanalysis simulation used the S14FD-Reanalysis forcing
    dataset and past GDP data (1960-2013). The GCM simulation used S14FD-GCM datasets
    for historical (1961-2005) and future (2006-2098, RCP8.5, SSP3) periods.
  10: Calculates asset damage and BI loss based on river basin drainage area. Validation
    involved comparing calculated global asset damage with values obtained from previous
    studies.
  11: Projections of BI loss and asset damage were made using bias-corrected S14FD-GCM
    forcing data, S14FD-Reanalysis data, and CaMa-Flood model outputs, averaged from
    five global climate models to address uncertainty.
  12: "Analysis uses GCM and reanalysis simulations; results are validated by comparison\
    \ between historical GCM simulations (1961\u20132005) and reanalysis data."
  13: The analysis uses Global Climate Model (GCM) simulations to project BI losses
    and asset damages for different time periods.
  14: The analysis uses reanalysis simulation results to estimate BI losses and compares
    them with past data from the World Bank.
  15: The analysis compares annual average reanalysis simulation results with and
    without flood protection.
  16: Analysis uses annual averaged reanalysis simulation values. The number of floods
    is defined as the number of years in which the calculated annual maximum inundation
    depth exceeded the flood protection of the region at least once. Four river basins
    (Yangtze, St. Lawrence, Senegal, and Niger) are targeted to test the effect of
    flood protection levels on the relationship between the ratio of BI loss to asset
    damage and number of floods.
  17: Simulations are used to estimate future BI loss and asset damage ratios. Applicable
    for assessing future flood risk impacts on BI and asset damage.
  18: Developed a method to estimate flooding-related BI loss on a global scale; historical
    flood losses including BI loss showed magnitudes similar to losses reported by
    the World Bank; Future flood risk projection using the same framework under RCP8.5
    and SSP3 scenarios; First order estimation due to the uncertainties of model,
    dataset, and methods.
  21: Integration of spatial and computable general equilibrium modelling.
More Notes:
  2: The study relies on a newly available data product to enhance the accuracy of
    global flood risk assessments.
  10: Includes a comparison of simulated BI loss with World Bank values for several
    countries (Namibia, Moldova, Pakistan, Thailand, Malawi, Nigeria) and years, but
    the specific values are not listed within the text.
  12: The study presents a validation of model accuracy and suggests substantial increase
    in flood-related economic impacts in the future.
  17: The analysis suggests regional variations in the impact of floods on BI and
    asset damage, with some areas projected to experience increases in the ratio while
    others are projected to see decreases.
  18: Estimation values might remain the scope of first-order estimation due to the
    uncertainties of model, dataset, and methods; Further improvements are needed
    especially on the estimation method of business interruption period and spatial
    distribution of assets.
Quantitative material:
  1: The study estimates global business interruption (BI) loss as USD 26.9 billion
    and asset damage as USD 130.9 billion (2005 PPP) for the 1960-2013 average.
  2: Specifically quantifies flood-related global asset damage and BI loss for present
    and future scenarios.
  6: The analysis reports a high correlation coefficient of 0.91 for a building height
    limit of 6.0 m.
  7: Quantitative analysis includes BI loss calculated during inundation periods,
    using factors like gridded GDP and GDP ratio of secondary and tertiary industries.
  8: The table provides quantitative loss estimates (e.g., USD 2005 PPP) for specific
    flood events in different countries.
  9: Globally, annual total BI loss and asset damage averaged from 1960 to 2013 were
    estimated to be USD 26.9 and 130.9 billion (2005 PPP), respectively, in the reanalysis
    simulation. Specific losses for Thailand (2011, 13.3 billion), Malawi (2012, 0.60
    million), and Nigeria (2012, 1.65 billion) are also reported.
  10: Estimated annual global asset damage at USD 96 billion (2005 PPP) averaged from
    1960 to 1999; Estimated annual global asset damage in targeted river basins with
    drainage area > 5000 km2 at USD 56.7 billion (2005 PPP) averaged from 1976 to
    2005.
  11: BI loss as a percentage of GDP exceeds 0.3% in some river basins like the Amazon,
    Congo, Shebelle, Niger, Indus, Diamantina, and Chao Phraya.
  12: "Global annual BI loss and asset damage projected to increase by 34.6- and 34.7-fold,\
    \ respectively, from 1971\u20132000 to 2061\u20132090; projected to be 4.2-fold\
    \ greater per GDP during 2061\u20132090 than 1971\u20132000."
  13: "The page provides quantitative data on BI losses, with figures like USD 27.2\
    \ billion for 1971\u20132000, USD 435.5 billion for 2021\u20132050, and USD 940.4\
    \ billion for 2061\u20132090, alongside their percentages of GDP."
  14: Quantitative information includes the average global ratio of BI loss to asset
    damage from 1960 to 2013, and specific percentages for continents like Africa
    (22.1%) and Europe (26.9%).
  15: The document states specific BI loss estimates with and without flood protection
    for Malawi (USD 0.35 million with protection vs. USD 138 million without), and
    reductions in BI loss and asset damage due to flood protection globally by 98.6%
    and 96.5%, respectively.
  16: 'Without flood protection, the ratio of BI loss to asset damage is around 40%
    in Africa, Asia, North America, Oceania, and South America, and about 50% in Europe.
    With flood protection, the ratio drops to approximately 10-15% across continents.
    Specific examples: Niger''s ratio shifts from 143.2% to 121.8% with flood protection
    (FPL 2 years); Senegal''s ratio decreases from 120.6% to 36.1% (FPL 6 years);
    Yangtze basin''s ratio decreases from 131.3% to 33.0% (FPL 20 years).'
  17: Future BI loss to asset damage ratios exceeded 15% in most parts of Africa.
  18: "Estimated global BI loss and asset damage for the past study interval (1960\u2013\
    2013) were USD 26.9 and 130.9 billion (2005 PPP) per year, respectively; Future\
    \ flood risk projection using the same framework under RCP8.5 and SSP3 scenarios\
    \ showed increases in BI loss and asset damage per GDP by 0.32% and 1.78% (2061\u2013\
    2090 average), compared with values from the past interval (1971\u20132000 average),\
    \ respectively; BI loss is projected to exceed 1.5% of the local GDP in some river\
    \ basins with very flat terrains."
