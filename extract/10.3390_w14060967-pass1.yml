  12: "Source material here.\nGlobal annual BI loss and asset damage were projected\
    \ to increase by 34.6- and 34.7-fold, respectively, from 1971\u20132000 to 2061\u2013\
    2090. Global annual BI loss and asset damage per GDP during 2061\u20132090 are\
    \ projected to be 4.2- and 4.2-fold greater, respectively, than those values during\
    \ 1971\u20132000, indicating that increases in BI loss and asset damage are anticipated\
    \ because of climate change.\n\nNext, we estimated future BI loss and asset damage\
    \ for the future (near-term 2021\u20132050 and long-term 2061\u20132090) and compared\
    \ them with the estimates for the past period (1971\u20132000). The results are\
    \ summarized in Table 3. Among all GCMs, the maximum deviations from the average\
    \ BI loss and asset damage were 137.9% and 101.2%, respectively.\n\nFirst, to\
    \ validate the results from GCM simulation, we compared the calculation result\
    \ of BI loss and asset damage from historical GCM simulation (available for 1961\u2013\
    2005) against data from the reanalysis simulation. We assumed that the reanalysis\
    \ simulation was expected to have smaller uncertainty because its forcing data\
    \ was constrained by past meteorological observations, while GCM simulations were\
    \ based on model experiments.\n\nThe results from reanalysis simulation and GCM\
    \ simulation of BI loss and asset damage were similar between simulations. Therefore,\
    \ we concluded that averaged BI loss and asset damage from the GCM simulation\
    \ were sufficiently accurate for estimating future BI loss and asset damage.\n\
    \nBoth graphs illustrate projections of economic impacts (bill loss and asset\
    \ damage) related to GDP over an extended period.\n\nBoth lines generally show\
    \ an upward trend, with peaks and fluctuations, especially noticeable after 2025.\n\
    \nBoth lines show an upward trend, with notable increases towards the end of the\
    \ century.\n"
