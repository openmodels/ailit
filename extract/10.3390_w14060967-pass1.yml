  3: "Source material here.\nEvaluation overview: In this study, we calculated BI\
    \ loss and asset damage based on inundation period and inundation depth data derived\
    \ from flood simulations and a gridded GDP dataset. We defined BI loss as the\
    \ loss of opportunity because of interrupted business activity; we defined asset\
    \ damage as direct economic damage, such as the destruction of physical assets.\n\
    \nDrivers of Risk: In this study, we calculated BI loss and asset damage based\
    \ on inundation period and inundation depth data derived from flood simulations.\n\
    \nMethodology: In this study, we calculated BI loss and asset damage based on\
    \ inundation period and inundation depth data derived from flood simulations and\
    \ a gridded GDP dataset... BI loss and asset damage were estimated at a scale\
    \ of 30\u2033 \xD7 30\u2033 (ca. 1 km \xD7 1 km at the equator) and aggregated\
    \ to geographical units.\n\nHighlights: This flowchart depicts a comprehensive\
    \ flood risk and impact assessment model, incorporating meteorological data, hydrological\
    \ models, flood protection measures, and economic impact to assess and predict\
    \ flood risks and potential damages.\n"
  4: "Source material here.\nThe simulation is conducted at a coarse resolution (in\
    \ this study, 0.25\xB0, ca. 25 km at the equator) to achieve efficient global-scale\
    \ analysis; however, the simulated flood depth can be diagnostically downscaled\
    \ using high-resolution topography data in post-processing (in this study, 30\u2033\
    , ca. 1 km).\n\nRunoff input for CaMa-Flood was calculated using Minimal Advanced\
    \ Treatments of Surface Interaction and RunOff (MATSIRO) [25], which is a land\
    \ surface component of the Japanese climate model MIROC; it calculates water and\
    \ energy balance on the land surface (including runoff from land to river, which\
    \ is used as input for CaMa-Flood), using weather forcing as input.\n\nIn this\
    \ study, we used a reduced-bias meteorological forcing dataset obtained from the\
    \ S14FD reanalysis dataset (S14FD-Reanalysis) and bias-corrected global climate\
    \ model (GCM) output forcing dataset (S14FD-GCM) [22], which allowed the use of\
    \ daily model output values without bias correction.\n\nCaMa-Flood explicitly\
    \ calculates river discharge, water depth, and flood extent at each model time\
    \ step on a global scale by assuming complex floodplain inundation dynamics as\
    \ the sub-grid physics.\n\nTo determine asset damage in urban areas, we used current\
    \ land use data from the Global Land Cover by National Mapping Organizations (GLCNMO)\
    \ v2 product [35] to calculate the percentage of urban area of each grid.\n\n\
    We used national mask data derived from the Global Rural-Urban Mapping Project\
    \ v1 (GRUMPv1) [36] to aggregate asset damage or BI loss at the country scale.\n"
  6: In the absence of a relevant dataset for secondary and tertiary industries, their
    GDP ratios were derived by subtracting the percentage of primary industry GDP,
    derived from 2010 World Bank Open Data values, from 1. For countries with missing
    data, we used the global average. Using this relationship, we obtained a maximum
    correlation coefficient of 0.91 for a lower building height limit of 6.0 m. Next,
    we derived the ratio of gridded GDP to country GDP (gridded GDP ratio, g_GDPratio)
    from the ratio of gridded building height to total building height within the
    country (gridded building height ratio, g_bldratio) and the relationship between
    s_GDPratio and s_bldratio. For a building height of 0, we converted g_GDP to 0.
    Finally, we converted g_GDPratio such that the total GDP ratio per country was
    equal to 1.
  7: " \nEvaluation overview: \"BI loss was categorized into an indirect and consequential\
    \ effect [43] and defined as loss caused by the inability of people to perform\
    \ work due to workplace destruction or inaccessibility [44].\"\n\nDrivers of Risk:\
    \ \"BI loss was calculated from the inundation period, gridded GDP, and the GDP\
    \ ratio of secondary and tertiary industries.\"\n\nQuantitative material: \"BI\
    \ loss was calculated as the difference in secondary and tertiary industry production\
    \ between non-flood and flood periods.\"\n\nMethodology: \"We calculated inundation\
    \ period and annual maximum inundation depth at 30\u2033 \xD7 30\u2033 resolution\
    \ (ca. 1 km \xD7 1 km at the equator) from calculated daily water storage at 0.25\xB0\
    \ \xD7 0.25\xB0 ... using the FLOPROS dataset [17] and a high-resolution digital\
    \ elevation model.\"\n\nHighlights: \"The BI period was assumed to be proportional\
    \ to the inundation period (Equation (4)). The proportional constant \u03B1 is\
    \ difficult to obtain on a global scale because it varies regionally ... In this\
    \ study, we determined this constant as two based on the above surveys of past\
    \ floods.\"\n"
  8: "yaml\nDrivers of Risk: \"Floods are identified as the drivers of asset damage\
    \ in each year.\"\nMethodology: \"Asset damage was calculated through the multiplication\
    \ of asset value by the fraction of assets affected by floods, using annual maximum\
    \ flood depth and a damage\u2013depth function.\"\nHighlights: \"The study focuses\
    \ on flood damage specific to different regions and sectors, with results validated\
    \ using external disaster databases.\"\nQuantitative material: \"The table provides\
    \ quantitative loss estimates (e.g., USD 2005 PPP) for specific flood events in\
    \ different countries.\"\n"
  9: "Source material: Water 2022, 14, 967... We compared simulated asset damage and\
    \ BI loss to reported values, with the aim of confirming that CaMa-Flood was able\
    \ to reproduce the general trend of global flood risk. Heavy rainfalls overflowed\
    \ or breached 10 major flood control systems. Heavy rainfall caused flood twice.\
    \ Heavy rainfalls caused river flood which breached irrigation reservoirs. Globally,\
    \ annual total BI loss and asset damage averaged from 1960 to 2013 were estimated\
    \ to be USD 26.9 and 130.9 billion (2005 PPP), respectively, in the reanalysis\
    \ simulation. Thailand 2011 13.3 billion. Malawi 2012 0.60 million. Nigeria 2012\
    \ 1.65 billion. In this study, we validated the estimation method and analyzed\
    \ past floods by conducting a reanalysis simulation, then compared past and future\
    \ flood impacts on the economy by conducting a GCM simulation. For the reanalysis\
    \ simulation, we used the S14FD-Reanalysis forcing dataset and past GDP data for\
    \ 1960\u20132013. For the GCM simulation, we used a historical S14FD-GCM (1961\u2013\
    2005) dataset and GDP data to estimate past flood impacts on the economy; we used\
    \ a future S14FD-GCM dataset for Representative Concentration Pathways 8.5 (RCP8.5)\
    \ (2006\u20132098) and GDP data for Shared Socioeconomic Pathway 3 (SSP3) to estimate\
    \ future flood impacts on the economy. We compared our simulated past BI loss\
    \ to BI loss reported in the World Bank historical flood data described in Section\
    \ 2.6 (Figure 2). The comparison results include error related to BI loss without\
    \ considering flood protection in some countries. Estimated BI losses calculated\
    \ for Namibia, Moldova, Pakistan (2011), Thailand, and Malawi were similar to\
    \ the World Bank values."
  10: "To validate the methodology of asset damage estimation, we compared calculated\
    \ global asset damage with values obtained from previous studies [3,15]. The spatial\
    \ distribution of annual BI loss and BI loss per GDP averaged from 1960 to 2013\
    \ according to river basin drainage area (\u226510,000 km2) are shown in Figure\
    \ 3. Alfieri et al. [3] estimated that the annual global asset damage averaged\
    \ from 1976 to 2005 in targeted river basins with drainage area > 5000 km2 was\
    \ USD 65 billion (2005 PPP), whereas the annual global asset damage estimated\
    \ in this study was USD 56.7 billion (2005 PPP) for the same period and conditions.\
    \ Ward et al. [15] estimated annual global asset damage averaged from 1960 to\
    \ 1999 at USD 94 billion (2005 PPP), whereas the annual global asset damage estimated\
    \ in this study was USD 96 billion (2005 PPP) for the same period. Therefore,\
    \ we conclude that our method of calculating asset damage was sufficiently accurate,\
    \ at least for global long-term averages. The spatial distribution of annual BI\
    \ loss and BI loss per GDP averaged from 1960 to 2013 according to river basin\
    \ drainage area (\u226510,000 km2) are shown in Figure 3. Figure 2. Comparison\
    \ of simulated BI loss (red bars) with World Bank values (gray bars). Data are\
    \ shown on a logarithmic scale; error bars indicate uncertainties related to the\
    \ inclusion of BI loss data that do not consider flood protection."
