  18: "Source material here.\nThe BI loss to asset damage ratio is projected to increase\
    \ in river basins with high FPL [...] resulting in an increase in the BI loss\
    \ to asset damage ratio.\n\nIn this study, we developed a method to estimate flooding-related\
    \ BI loss on a global scale. Estimated historical flood losses including BI loss\
    \ showed magnitudes similar to losses reported by the World Bank. The estimated\
    \ global BI loss and asset damage for the past study interval (1960\u20132013)\
    \ were USD 26.9 and 130.9 billion (2005 PPP) per year, respectively.\n\nFuture\
    \ flood risk projection using the same framework under RCP8.5 and SSP3 scenarios\
    \ showed increases in BI loss and asset damage per GDP by 0.32% and 1.78% (2061\u2013\
    2090 average), compared with values from the past interval (1971\u20132000 average),\
    \ respectively. BI loss is projected to exceed 1.5% of the local GDP in some river\
    \ basins with very flat terrains [...] where floods will increase because of climate\
    \ change.\n\nOur results demonstrated that BI loss is not negligible in the estimation\
    \ of global flood risk; notably, the projected risk changes with local FPL and\
    \ flood magnitude.\n\nThe estimation values in this study might remain the scope\
    \ of first-order estimation due to the uncertainties of model, dataset, and methods.\
    \ To conduct more realistic estimation of economic losses due to flood hazard,\
    \ further improvements are needed especially on the estimation method of business\
    \ interruption period and spatial distribution of assets.\n"
