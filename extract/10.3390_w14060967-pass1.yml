  14: " \n4.1. Reanalysis Estimation vs. World Bank Estimation\nAs shown in Figure\
    \ 2, BI losses estimated in this study were smaller than BI loss reported by the\
    \ World Bank for historical floods in various countries.\nPrevious asset damage-focused\
    \ studies underestimated the economic impacts of floods, particularly in regions\
    \ where the percentage of BI loss relative to asset damage was high.\nWe compared\
    \ the relative impacts of BI loss and asset damage on regional economies using\
    \ reanalysis simulation results. Globally, the ratio of BI loss to asset damage\
    \ averaged from 1960 to 2013 was 20.6%.\nThis value was highest in African regions\
    \ (22.1%) and Europe (26.9%), while it was lowest in South America (6.1%).\n"
