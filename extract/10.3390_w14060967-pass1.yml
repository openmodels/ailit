    "We projected future BI loss and asset damage using bias-corrected S14FD-GCM forc-ing
    data, S14FD-Reanalysis data, and output from CaMa-Flood driven by S14FD-GCM. We
    used average values produced by five GCMs to compensate for uncertainties in each
    GCM."

    "In contrast, America and Europe had greater absolute BI loss than other regions
    (Figure 3a), but they showed a relative BI loss of <0.1% of GDP, which was smaller
    than the global average."

