  16: 'To test this hypothesis, we targeted four river basins whose ratios of BI loss
    to asset damage were similar without flood protection (ca. 130%) but different
    with flood protection. Figure 8 shows the relationship between the ratio of BI
    loss to asset damage and the number of floods in targeted river basins (Yangtze,
    St. Lawrence, Senegal, and Niger)... In Niger (FPL, 2 years), the number of floods
