  11: "Source material: Future redistribution of fishery resources suggests biological\
    \ and economic trade-offs. Table 1. Species-specific rates of the shift in the\
    \ abundance-weighted center of gravity (COG; km/decade) across future time periods\
    \ (2021\u20132100) relative to the present (2000\u20132019) under the different\
    \ shared socioeconomic pathways (SSPs). The spatial distributions of species-specific\
    \ abundance similarly reveal spatial changes proportional to time periods and\
    \ SSPs (Fig 3 and S8 Fig in S1 File). In particular, the highest contrast in the\
    \ present and future abundances for representative taxa, categorized based on\
    \ their reported catch and economic values was observed under the SSP585 scenario\
    \ (Fig 3A\u20133D). For abundant cod (walleye pollock and Pacific cod; Fig 3A)\
    \ and flatfish taxa (yellowfin sole; Fig 3B, top panel), apparent future abundance\
    \ declines were observed in the EBS and increases in the Chukchi Sea."
