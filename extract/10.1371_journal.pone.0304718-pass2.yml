Drivers of Risk:
  1: The study examines impacts from future climate change scenarios, specifically
    warming, sea ice concentration, and net primary production changes.
  3: The analysis highlights changes in temperature and sea ice in the Arctic and
    surrounding marine areas.
  4: Climate and productivity changes are impacting species abundance.
  5: Combined fluctuations in future climate and primary productivity
  6: Potential changes in subsidies to fishing sectors, global fuel prices, and aquaculture
    supply affecting costs and prices.
  7: Future species abundance fluctuations and availability, influenced by environmental
    changes, are assessed for economic impacts.
  8: Declining cold pool, warming winter sea bottom and surface temperatures, extensive
    loss of winter sea ice, decline in summer integrated primary production, depth,
    bottom temperatures (SSBT and WSBT), and summer net primary production (SNPP).
  9: Projected increases in sea surface temperature and changes in other physical
    oceanographic variables are identified as drivers of risk.
  10: Climate change scenarios (SSP126, SSP245, SSP370, SSP585) predicting shifts
    in fish distributions.
  11: The shifts in fishery species distributions are driven by future climate scenarios
    represented by different shared socioeconomic pathways (SSPs).
  12: Climate change scenarios (SSP126, SSP245, SSP370, SSP585).
  13: Shifts and reductions in fishery resource abundance due to differing climate
    pathways (SSPs).
  14: Future redistribution of fishery resources due to climate change and shifting
    species distributions.
  15: Future climate change, specifically warming and sea ice loss in the NEBS (Northeast
    Bering Sea) and Chukchi Sea, altered catch composition, and shifts in marine resources
    are drivers of risk.
  16: Potential climate change scenarios leading to shifting fish abundance and the
    loss of high-value taxa drive economic impacts on fisheries.
  17: The drivers of risk identified include shifts in fish stock distributions due
    to climate changes, increased predation pressures from groundfish predators due
    to changes in sea ice, and potential declines of cold-adapted species.
  18: Climate-driven changes in species abundance, warming, and sea ice loss.
Evaluation overview:
  1: The paper evaluates potential biological and economic trade-offs due to future
    redistribution of fishery resources under varying climate scenarios.
  3: The paper evaluates potential ecological and economic implications of changes
    in distributions and abundances of eight commercially important fish species in
    the Bering Sea-Aleutian Islands.
  4: Predicts present and future patterns of species abundance in response to climate
    and productivity changes.
  5: Future redistribution of fishery resources suggests biological and economic trade-offs
  6: Evaluates the maximum catch potential (MCP) as a proxy for maximum sustainable
    yield (MSY) to understand potential economic impacts on fisheries.
  7: The paper evaluates potential biological and economic trade-offs related to future
    redistribution of fishery resources.
  8: Future redistribution of fishery resources suggests biological and economic trade-offs.
  9: The analysis provides an overview of projected changes in oceanographic conditions
    and biological productivity, focusing on the Gulf of California and the Mexican
    Pacific under the SSP5-8.5 climate scenario.
  10: Depicts shifts in fishery resource distributions in the Bering Sea due to climate
    change under various scenarios.
  11: The paper evaluates the shifts in the abundance-weighted center of gravity for
    various fishery species under different SSPs, indicating potential future redistribution
    and trade-offs in biological and economic terms.
  12: Fishery resource redistribution and associated economic trade-offs, changes
    in maximum catch potential (MCP), revenue, and profit potential (MPP).
  13: The paper evaluates future changes in cumulative maximum catch potential (MCP)
    for major fishery resources under different climate scenarios.
  14: Evaluates changes in maximum catch potential (MCP), maximum revenue potential
    (MRP), and maximum profit potential (MPP) of fisheries.
  15: Economic benefits from fisheries, specifically revenue and profit potential,
    are evaluated.
  16: The paper provides an overview of the impacts of climate change on fish distribution
    and the associated economic trade-offs for fisheries.
  17: The paper provides an overview of the biological and economic trade-offs of
    future redistribution of fishery resources, focusing on the impact on traditional
    fishing grounds and economic implications for local fishing communities.
  18: Economic trade-offs in fisheries, specifically changes in maximum catch, revenue,
    and profit potential.
Highlights:
  1: Projected future shifts of fish species' centers of gravity imply declining catches
    for certain valuable fisheries if fishing locations remain the same.
  4: Machine learning algorithms may outperform conventional models in predicting
    species distribution and abundance.
  5: Maximum sustainable yield (MSY) calculated using model outputs of species-specific
    abundance within the US exclusive economic zone (EEZ) of the EBS.
  6: Future redistribution of fishery resources suggests biological and economic trade-offs.
  7: The findings suggest that the economic estimates are robust to different assumptions
    about prices and costs over time.
  8: COGs of abundance for all species are projected to shift northwards. Increasing
    overlap in areas of peak abundance within the present-day fishing grounds in both
    US and Russian waters.
  9: The analysis highlights potential future changes in oceanographic conditions
    and biological productivity under a high-emission scenario, emphasizing projected
    changes over different time periods up to 2100.
  10: Fish species such as arrowtooth flounder, northern rock sole, and walleye pollock
    are projected to shift their distribution over the next century.
  11: Key outcomes include significant shifts in species distributions, with potential
    abundance declines in economically important species like cod and flatfish in
    the EBS, but increases in the Chukchi Sea, particularly under SSP585.
  12: Future redistribution of fishery resources suggests biological and economic
    trade-offs; Projected changes in cumulative maximum catch potential were lowest
    under SSP126, moderate under SSP245 and SSP370, and highest under SSP585.
  13: Significant increases in MCP, especially under SSP370 and SSP585 scenarios,
    indicating drastic changes by 2081-2100.
  14: Significant declines in MRP and MPP are projected, especially under higher emissions
    scenarios (SSP585). Slight increases in MCP in the near term (2021-2040 and 2041-2060)
    do not translate to increases in MRP and MPP. The magnitude of abundance changes
    varied across species.
  15: "Projected increases in MCP in the NEBS and Chukchi Sea under the extreme warming\
    \ and sea ice loss scenario in 2081\u20132100 did not result in significant increases\
    \ in MRP (Marginal Revenue Product) and MPP (Marginal Profit Product), suggesting\
    \ changes in catch composition can alter economic benefits."
  16: High greenhouse gas emissions could lead to serious economic impacts on well-managed
    fisheries due to the loss of high-value species; potential for significant changes
    in port landings and increased transit times.
  17: Shifts in fish stocks could lead to potential increases in abundance near major
    Arctic ports, increased fishing ground overlaps, and higher risks of overexploitation
    and competitive harvesting.
  18: For well-managed marine ecosystems like the EBS, the effects of climate change
    may have limited economic impact in the near-term under low to moderate climate
    change. Mitigation and conservation efforts may need to change under more extreme
    conditions. There is a need for forward-looking and climate-smart solutions to
    manage fisheries.
Methodology:
  3: Future climate projections are based on CMIP6 Global Climate Models, and down-scaling
    of future climate layers employs the delta method.
  4: Uses machine learning algorithms (random forest and boosted regression trees)
    to predict species abundance; models optimized using hyperparameters; trained
    and evaluated with species observation data.
  5: Species abundance were computed as the weighted average of RF and BRT models;
    Historical biological reference values of species-specific population growth rate
    and scaling parameter (S4 Table in S1 File) to estimate the MSY of each species
    stock in the Bering
  6: The analysis computes MSY and MCP using species-specific population growth rates
    and model-derived biomass, with economic assessments assuming constant prices
    and costs.
  7: The analysis uses bioeconomic models, incorporating species-specific parameters
    and socioeconomic scenarios, to estimate future MCP, MRP, and MPP.
  8: Bioeconomic changes between US and Russian waters of the Eastern Bering Sea were
    explored. BSAI bioeconomic parameters were used at both fishing grounds. Present-day
    fishing grounds identified as pixels of high aggregated fishing effort (> 1000
    fishing hrs) from 2012 to 2020. Future conditions are evaluated under different
    climate change magnitudes.
  10: Analyzes shifts in the center of gravity of fish species distributions under
    different climate scenarios from present day to 2100.
  12: Spatial abundance distributions of different fish species were projected for
    present (2000-2019) and future (2041-2060; 2081-2100) periods under the SSP585
    scenario.
  13: Projections of MCP changes are carried out under different Shared Socioeconomic
    Pathways (SSPs) for the years 2041-2060 and 2081-2100.
  14: Uses modeling to project changes in fisheries outcomes based on CMIP6 climate
    projections and productivity, applicable to the study area.
  15: Simple bioeconomic analyses are applied to spatio-temporal projections of species
    abundance. MCP is computed at 100-km buffer zones from major fishing ports.
  16: The analysis is based on projections of fishing effort and catch potential from
    present to future scenarios (2021-2100), using existing fishing mortality rates
    at healthy levels.
  17: Scenario-based projections of climate changes in the availability of major commercially-exploited
    fisheries, using machine learning models for taxon-specific biomass prediction.
  18: The economic analysis is a simple first-cut attempt to elucidate potential impacts
    of climate-driven changes. Economic parameters are based on published regional
    values and assumed constant over time. The results are most applicable to the
    near-term (2021-2040) under low to moderate levels of climatic changes for well-managed
    marine ecosystems.
More Notes:
  4: Models applied to predict species abundance for different time periods (2000-2019,
    2021-2040, 2041-2060).
  5: Study area is the eastern Bering Sea (EBS), managed under a precautionary approach
  8: Global Fishing Watch online repository was used for fishing effort data.
  12: The study focuses on changes in the Eastern Bering Sea (EBS) and Chukchi Sea.
    The increase of low-value taxa like yellowfin sole and walleye pollock contribute
    to MCP increases in the Chukchi Sea. The basin-wide percent differences in MCP,
    MRP and MPP were highest during the late century under SSP585.
  15: The location of major fishing ports is a factor in future revenue, profits,
    and fishing fleet mobility.
  17: The analysis recognizes uncertainties due to simplifying biological and economic
    assumptions, and emphasizes the importance of devising climate-ready adaptation
    and conservation measures.
  18: The analysis acknowledges limitations including the difficulty in projecting
    biological parameters, dynamic economic parameters, and structural uncertainties
    from Earth System Model outputs. There are persistent regional uncertainties in
    projections of ocean net primary production (NPP).
Quantitative material:
  5: "Changes in projected abundances (2021\u20132100) reflect changes in fish biomass"
  7: Sensitivity analysis considers scenarios where prices and costs increase by 20%
    at a constant rate over time until 2100.
  8: "Species-specific models account for between 55% and 87% of the variance in species\
    \ abundance from 2000\u20132019; Greenland halibut shift at > 80 km/decade; Walleye\
    \ Pollock shift at 31.64 km/decade."
  11: Quantitative data is provided on species-specific rates of shifts in center
    of gravity (km/decade) for fishery species from 2021 to 2100 under different SSPs.
  12: MCP decreased minimally by 4.22% under SSP585 during the late-century (2081-2100)
    period.
  13: Predicted changes in MCP for fishery resources, including notable drops in Maximum
    Revenue Potential (MRP) and Maximum Profit Potential (MPP) by about 37% and 47%,
    respectively.
  14: 'Provides percentage changes in MCP, MRP, and MPP relative to 2000-2019 across
    different time periods (2021-2040, 2041-2060, 2061-2080, 2081-2100) under different
    Shared Socioeconomic Pathways (SSPs: SSP126, SSP245, SSP370, SSP585).'
  15: "Analysis presents averaged MCP (months) and WCP (months) at 100-km buffer zones\
    \ from Dutch Harbor and Port of Nome for present (2000\u20132019) and future periods\
    \ (2021\u20132100) under SSP126 and SSP585 scenarios."
  16: The line graphs depict percentage differences in maximum catch, revenue, and
    profit potential under SSP126 and SSP585 scenarios over different future time
    periods.
  18: The analysis projects future abundance under contrasting time periods and climate
    scenarios (details in Supporting Information S1 File).
sourcematerial:
  1: 'yaml

    Evaluation overview: "Future redistribution of fishery resources suggests biological
    and economic trade-offs according to the severity of the emission scenario."

    Drivers of Risk: "Our results revealed contrasting patterns of abundance and distribution
    changes across species, time periods and climate scenarios, highlighting potential
    winners and losers under future climate change."

    Highlights: "However, under the extreme scenario (SSP585), projected Pacific cod
    and snow crab abundances increased and decreased, respectively, with concurrent
    zonal and meridional future shifts in their centers of gravity."

    Highlights: "Importantly, projected changes in species abundance suggest that
    fishing at the same distance from the current major port in the Bering Sea (i.e.,
    Dutch Harbor) could yield declining catches for highly valuable fisheries (e.g.,
    Pacific cod and snow crab) under SSP585."

    '
  3: '"The paper evaluates potential ecological and economic implications of changes
    in distributions and abundances of eight commercially important fish species..."
    "...accounted for over 65% of the total landings in the Bering Sea-Aleutian Islands...";
    "This period exhibited record-breaking changes in temperature and sea ice in the
    Arctic and surrounding marine areas."; "Future climate... layers were calculated
    from the corresponding monthly averages of four down-scaled CMIP6 Global Climate
    Models..." "Finally, we implemented the delta method for spatial data down-scaling
    of future climate layers..."'
  4: "Source material here: to predict the present and projected future patterns of\
    \ species abundance in response to ongoing and anticipated climate and productivity\
    \ changes. Here, we used annually compiled species-specific abundance, climate\
    \ layers (WSIC, WSST, WSBT, and SSBT), SNPP, and bathymetry to develop two machine-learning\
    \ (random forest, RF; and boosted regression trees, BRT) models to predict...Species-specific\
    \ RF models were...BRT models were...The final models were then trained and evaluated\
    \ using 80% and 20% of the species observations, respectively. Machine learning\
    \ algorithms often outperform conventional regression models in predicting species\
    \ distribution and abundance, as the former are able to better capture complexity\
    \ and are more flexible relative to the latter [42, 43]. The final models were\
    \ then used to generate present predictions and future projections of species\
    \ abundances using averaged climatic and productivity layers for present (2000\u2013\
    2019) and future periods (i.e., 2021\u20132040, 2041\u20132060,\""
  5: "Source material here: Future redistribution of fishery resources suggests biological\
    \ and economic trade-offs; reflect changes in fish biomass in response to combined\
    \ fluctuations in future climate and primary productivity; that changes in projected\
    \ abundances (2021\u20132100) reflect changes in fish biomass; The ensemble model\
    \ predictions/projections of species abundance were subsequently computed as the\
    \ weighted average of RF and BRT; applied the historical biological reference\
    \ values of species-specific population growth rate and scaling parameter (S4\
    \ Table in S1 File) to estimate the MSY of each species stock in the Bering; maximum\
    \ sustainable yield (MSY) using model outputs of species-specific abundance within\
    \ the US exclusive economic zone (EEZ) of the EBS; The eastern Bering Sea (EBS)\
    \ is managed under a precautionary approach."
  6: "Source material here.\nEvaluation overview: \"We then computed the maximum catch\
    \ potential (MCP), which is also considered a proxy for the maximum sustainable\
    \ yield (MSY).\" \n\nDrivers of Risk: \"However, we recognized that these parameters\
    \ could vary in the future due to other factors unaccounted for such as the potential\
    \ changes in subsidies to fishing sectors and global fuel prices that can increase\
    \ fishing costs.\"\n\nMethodology: \"Our subsequent analyses assumed constant\
    \ prices and costs over time, as changes in their values are inherently difficult\
    \ to forecast... MCP for each species was computed using the predicted and projected\
    \ abundance (B) and reference U MSY extracted from Gaines et al. [58].\"\n\nHighlights:\
    \ \"Future redistribution of fishery resources suggests biological and economic\
    \ trade-offs.\"\n"
  7: 'Source material here.

    "The paper evaluates potential biological and economic trade-offs related to future
    redistribution of fishery resources."


    "Future species abundance fluctuations and availability, influenced by environmental
