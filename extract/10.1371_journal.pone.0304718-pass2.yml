    \                                                      This image is a series\
    \ of maps detailing projections of marine species distribution and abundance under\
    \ different scenarios. The maps are divided into four groups (a, b, c, d), each\
    \ representing different combinations of species categories (\"low catch - low\
    \ value\" and \"high catch - high value\") and time periods (2000-2019, 2041-2060,\
    \ 2081-2100).\n\nEach subgroup is further divided into two columns representing\
    \ different climate scenarios, SSP585 (a high greenhouse gas concentration pathway).\n\
    \nKey features of the maps:\n\n- **Geographical Focus**: The maps cover the coastal\
    \ regions of Alaska and the U.S. West Coast along the Pacific Ocean.\n\n- **Color\
    \ Gradients**:  \n  - Colors range from blue to red, indicating different levels\
    \ of species abundance (darker blue represents lower abundance, and red signifies\
    \ higher abundance).\n  - A marked gradient shows the change in species distribution\
    \ patterns over time under the SSP585 scenario.\n\n- **Hatching Patterns**: Areas\
    \ with striped hatching indicate regions of notable change or possibly areas with\
    \ data uncertainty.\n\n- **Data Overlay**: Each map includes the western coastline\
    \ outlines to give geographical context to the distribution patterns.\n\nThese\
    \ visualizations provide insights into how marine species' distribution and abundance\
    \ might shift in response to climate change impacts over the 21st century.\n\n\
