  13: "Source material here.\nEvaluation overview: This is based on the analysis of\
    \ \"predicted future...percent changes in the cumulative maximum catch potential\
    \ (MCP) under...SSP126, SSP245,...SSP585 for eight major fisheries relative to\
    \ the present...\"\n\nDrivers of Risk: The document notes \"this small abundance\
    \ decline translated to significant drops in MRP and MPP by about 37% and 47%,\
    \ respectively,\" as a result of changes in species abundance and distribution.\n\
    \nQuantitative material: \"small abundance decline translated to significant drops\
    \ in MRP and MPP by about 37% and 47%, respectively.\"\n\nMethodology: The analysis\
    \ uses \"predicted future (2041\u20132060; 2081\u20132100) percent changes...under\
    \ (a) SSP126, (b) SSP245, (c) SSP370, and (d) SSP585.\"\n\nHighlights: The image\
    \ annotations indicate \"notable increases in MCP, particularly in the latter\
    \ period...with deep red indicating significant MCP growth, especially by 2081-2100.\"\
    \n"
  14: "Source material here.\nEvaluation overview: \"future redistribution of fishery\
    \ resources suggests biological and economic trade-offs\"\nDrivers of Risk: \"\
    future redistribution of fishery resources suggests biological ... trade-offs\"\
    \ \nQuantitative material: \"Percentage of change in the maximum catch potential\
    \ (MCP), maximum revenue potential (MRP), and maximum profit potential (MPP) relative\
    \ to present (2000\u20132019) across different time periods (2021\u20132100) and\
    \ contrasting shared socioeconomic pathways (SSPs) throughout the study area.\"\
    \nMethodology: \"Projected changes in the global biomass of marine fauna are negatively\
    \ related to the warming levels\"\nHighlights: \"distinct contrast between the\
    \ low (SSP126) and high (SSP585) future climate scenarios ... significant and\
    \ steep declines in the MRPs and MPPs in the latter ... slight increases in MCP\
    \ in response to shifting species distributions ... did not translate to increases\
    \ in the MRP and MPP.\"\n"
  15: "Source material here.\nEvaluation overview: \"The implementation of simple\
    \ bioeconomic analyses to spatio-temporal projections of species abundance provide\
    \ pertinent insight into potential biological and economic impacts of future climate\
    \ change on major commercial fisheries in the area.\"\nDrivers of Risk: \"Projected\
    \ increases in MCP in the NEBS and Chukchi Sea under the extreme warming and sea\
    \ ice loss scenario in 2081\u20132100... These findings suggest that future changes\
    \ in the catch composition can alter the potential economic benefits from fisheries.\"\
    \nQuantitative material: \"Locations of the major fishing ports in the Eastern\
    \ Bering Sea and averaged MCP within the US EEZ computed at each 100-km buffer\
    \ zone from the Dutch Harbor and Port of Nome for the present (2000\u20132019)\
    \ and future periods (2021\u20132100) under SSP126 and SSP585.\"\nMethodology:\
    \ \"The implementation of simple bioeconomic analyses to spatio-temporal projections\
    \ of species abundance... Bathymetric contours and latitudinal domains of the\
    \ study area are shown.\"\nHighlights: \"Projected increases in MCP in the NEBS\
    \ and Chukchi Sea under the extreme warming and sea ice loss scenario in 2081\u2013\
    2100 did not result into significant increases in MRP and MPP. These findings\
    \ suggest that future changes in the catch composition can alter the potential\
    \ economic benefits from fisheries.\"\nMore Notes: \"Comparison of the future\
    \ averaged MCPs with distance away from major fishing and Arctic ports in the\
    \ EBS under contrasting shared socioeconomic pathways, revealed divergent patterns\
    \ relative to the present. These changes are likely to impact the future fishing\
    \ fleet mobility.\"\n"
  16: 'Source material: "Future redistribution of fishery resources suggests biological
    and economic trade-offs ... leading to potential losses and gains in port landings
    of target species ... a high greenhouse gas emission scenario could lead to serious
    economic impacts on fisheries, potentially from the loss of high-value taxa. Notably,
    even at the present-day magnitudes of warming and sea ice loss, we have already
    witnessed instances of population shifts and declines." The line graphs show percentage
    differences under SSP126 and SSP585 scenarios over time periods like 2021-2100.
    The map depicts fishing effort projections, with contour lines labeling thresholds
    and shading indicating present-day Pacific Fishing Grounds."'
