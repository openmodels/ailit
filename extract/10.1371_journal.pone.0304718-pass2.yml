  18: "yaml\n\"Evaluation overview\": \"Future redistribution of fishery resources\
    \ suggests biological and economic trade-offs with subsequent changes in maximum\
    \ catch, revenue, and profit potential\"\n\"Drivers of Risk\": \"potential impacts\
    \ of climate-driven changes in species abundance, as climate change approaches\
    \ extreme conditions of warming and sea ice loss\"\n\"Quantitative material\"\
    : \"Supplemetary materials for analyses on future abundance projections under\
    \ contrasting time periods and climate scenarios.\"\n\"Methodology\": \"our economic\
    \ analysis is intended only as a simple first-cut attempt to elucidate potential\
    \ impacts of climate-driven changes. Economic parameters are based on published\
    \ regional values and assumed constant over time. The results are most applicable\
    \ to the near-term (2021\u20132040) under low to moderate levels of climatic changes\
    \ for well-managed marine ecosystems.\"\n\"Highlights\": \"for well-managed marine\
    \ ecosystems such as the EBS, effects of climate change can, to some extent, have\
    \ limited economic impact in the near-term (2021\u20132040) under the low to moderate\
    \ levels of climatic changes. Nonetheless, as climate change approaches extreme\
    \ conditions of warming and sea ice loss, mitigation and conservation efforts\
    \ could demand changes of current conservation and management strategies. Thus,\
    \ the need for forward-looking and climate-smart solutions to manage, conserve,\
    \ and rebuild dwindling and shifting marine fisheries resources are necessary\
    \ to support future global food and nutritional security\"\n\"More Notes\": \"\
    the difficulty in projecting these biological parameters into the future, these\
    \ economic parameters are highly dynamic and are expected to change with consumer\
    \ behavior, market preferences, and fisheries subsidies, inherent structural uncertainties\
    \ from outputs of Earth System Models discussed in detail from previous work,\
    \ Notably, persistent regional uncertainties in projections of ocean net primary\
    \ production (NPP) of CMIP6 models remain a challenge\"\n"
