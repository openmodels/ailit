  9: 'Source material

    Evaluation overview: No relevant information

    Drivers of Risk: Exposure to sea level rise and hurricanes

    Quantitative material: Fig 3. The 6 feet SLR zone, the inland part of coastal
    Micro- and Metropolitan Statistical Areas (MSAs; without SLR zone), and all MSAs
    of the conterminous United States (CONUS) show over time: a) increasing density
    (structures per grid cell) of developed area; b) recent increases in densification
    (structures added relative to expansion; values greater than 1 mean that density
    is increasing faster than the addition of developed land grid cells); c) a steady
    increase in built-up percentage (percentage of grid cells developed within the
    MSA or SLR zone); and d) changing rates of expansion of developed area (increase
    in developed grid cells)

    Methodology: The two major drivers of urban development, measured in this paper
    are: 1) expansion (panel a to b), or the aerial growth of developed land, and
    2) structure density (panel f to g), or the addition of more or bigger structures
    to already developed areas. Densification (b) and expansion (d) were calculated
    over 10-year time increments.

    Highlights: Compared to all MSAs across CONUS, SLR zones and coastal MSAs are
    denser, more developed, and consistently have higher rates of expansion than MSAs
    across the country as a whole.

    More Notes: The study uses the built up properties (BUPL) data layer from HISDAC
    [39].

    '
  10: 'Source material: Exposure to sea level rise and hurricanes Fig 4. Regional
    trends in the 6 feet SLR zone tell a varied story about the timing and intensity
    of historical coastal development. Built environment characteristics are based
    on structure density (structures per developed grid cell); a); densification (structures
    added relative to expansion; values greater than 1 mean that density is increasing
    faster than the addition of developed land grid cells); b); proportion of the
    SLR zone developed (proportion of grid cells developed within the unit of measurement);
    c); and expansion (increase in developed grid cells); d). Colors denote coastal
    MSAs aggregated to Census Divisions. Densification (b) and expansion (d) were
    calculated over 10-year time increments. the Pacific U.S. had high rates of growth
    after 1950, mirroring sunbelt growth trends [51], closing the gap and converging
    to the already developed Northeast in built environment characteristics. Despite
    increases in density and percent built, the West South Central remains lower in
    density of structures and percent of SLR zone developed. Among those regions,
    we find different types of development. The Pacific division overtook New England
    in structure density within developed land yet remains low in percent of SLR.'
