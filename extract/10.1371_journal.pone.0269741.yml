    \ hits panel regression analysis from 1900\u20132015; Standard errors are clustered\
    \ at MSA scale and fixed effects include individual year, MSA and individual year\
    \ x census division. Thus, the variation in the interaction term primarily comes\
    \ from within-MSA differences over time.; hurricane activity is associated with\
    \ significantly higher rates of building in terms of the proportion built area\
    \ (Table 1, Col. 2) and structure density (Table 1, Col. 4).; the attenuation\
    \ of the main storm effect toward zero indicates that the impact of storms on\
    \ the built-up share of land is largely concentrated in the SLR zones of MSAs\
    \ (Table 1, Col. 2); storm activity is associated with fewer built structures\
    \ among hurricane-hit locations. Taken together with our findings on density and\
