  6: "Source material here.\nExposure to sea level rise and hurricanes defined as\
    \ adjacent counties or county equivalents that have one or more urban areas with\
    \ a population of at least 50,000 and any adjacent areas that have a high degree\
    \ of integration with the urban area, measured by commuting [44].\n...\nTo determine\
    \ which MSAs were affected by hurricanes, we intersect the MSAs with all hurricane\
    \ eye landfalls, and select any coastal MSA that was within 20 km of an eye\u2019\
    s landfall.\n...\nWe use MSAs as the unit of analysis because most of the coastline\
    \ is covered by Metropolitan and Micropolitan Statistical Areas (S1 Fig in S1\
    \ File).\n...\nWe also count the number of hurricane hits and their severity for\
    \ each MSA from 1900 to 2015.\n...\nTo account for areas of the SLR zones that\
    \ would not likely be developed, we exclude some areas from our analysis.\n...\n\
    Built Area Proportion (BAP) = Ap/AT ; where Ap is the number of built grid cells\
    \ and AT is the total number of grid cells in the unit of analysis.\n...\nZonal\
    \ statistics are used to determine the total number of structures, built interior\
    \ area (indoor square meters of buildings within the grid cell) and built grid\
    \ cells (grid cells with at least one property record) for each polygon in five\
    \ year increments from 1900 to 2015.\"\n"
