Highlights:
  2: First fine-scale nationwide analysis of the exposure of the coastal built environment
    to hazards over the twentieth century.
  4: No relevant information
  7: Developed area and housing stock dramatically increased along the coastline between
    1950 and 2000. Coastal SLR zones have higher structure density, are more developed,
    and have densified and expanded at higher rates than inland coastal areas. Expansion
    of coastal communities created SLR zones that are, on average, 35% developed in
    the 6-feet zone.
  8: Demonstrates trends in urbanization with both increased land expansion and building
    density near coastal areas from 1900 to 2015.
  9: SLR zones and coastal MSAs are denser, more developed, and have consistently
    higher rates of expansion than MSAs across CONUS.
  10: The Pacific U.S. had high rates of growth after 1950, mirroring sunbelt growth
    trends, closing the gap and converging to the already developed Northeast in built
    environment characteristics.
  11: The analysis finds Florida and the South Atlantic division have high exposure
    to SLR; despite decreased expansion, the built environment in these zones is more
    developed than inland areas.
  12: Absolute exposure to SLR increased across all divisions, though slowing between
    1970 and 1980. The South Atlantic surpassed the Northeast and Pacific in the total
    number of structures in the SLR zone. Areas at highest risk of hurricanes, the
    South Atlantic, have higher exposure across both sea level rise and hurricane
    measures.
  13: MSAs affected by hurricanes are found to be denser and more developed than those
    not affected, indicating a possible increase in building intensity in SLR zones
    following hurricanes.
  14: Hurricane activity is associated with significantly higher rates of building;
    The impact of storms on built-up share of land is largely concentrated in the
    SLR zones of MSAs; Storm activity is associated with fewer built structures among
    hurricane-hit locations, potentially producing more dense, compact urban landscapes.
  15: Increasing densification along coastlines may lead to increased exposure but
    potentially decreased vulnerability due to modern building codes.
  16: After hurricane events, there is an increase in development intensity and building
    sizes along the coasts.
  17: Older coastal areas, particularly in the Northeast, were developed with less
    adaptive building codes; adaptation priorities are needed in coastal communities.
  18: Protection of developable land and adaptation in densely developed coastal areas
    are critical to minimize exposure.
Methodology:
  2: "Analysis of built-up property records across coastal regions of the U.S. from\
    \ pre-1900 to 2015 using gridded historical settlement data layers derived from\
    \ Zillow\u2019s ZTRAX database (Historical Settlement Data Compilation of the\
    \ United States)."
  4: "Uses the ZTRAX database from Zillow Group, Inc. to create settlement data products\
    \ (HISDAC-US) covering the time period 1810\u20132010 at a spatial resolution\
    \ of 250 meters and a temporal resolution of 5 years. They resample the data to\
    \ a spatial resolution of 50 meters using a nearest neighbor technique to better\
    \ use the gridded datasets in combination with sea level rise zones."
  6: The analysis uses Metropolitan and Micropolitan Statistical Areas (MSAs) as the
    unit of analysis. Hurricane impacts are determined by intersecting MSA boundaries
    with hurricane eye landfall locations within a 20km buffer. Protected areas and
    wetlands are excluded from SLR zones. Zonal statistics are used to determine the
    total number of structures, built interior area, and built grid cells within each
    SLR zone and MSA polygon from 1900 to 2015.
  7: The study uses settlement layers data to analyze building trends along U.S. coastlines.
    Expansion is measured as the increase in the proportion of built grid cells over
    time. Densification is a ratio of added structures to added developed grid cells.
    Applies to the conterminous U.S.
  8: Depicts changes in urban expansion and density over time, using maps of coastal
    regions in 1900, 1950, and 2015 to illustrate urban boundary changes, sea level
    rise zones, and building units per region (BUPR) categories.
  9: Urban development is measured using expansion (aerial growth of developed land)
    and structure density (addition of structures to already developed areas). Expansion
    and densification were calculated over 10-year time increments.
  11: The analysis compares the total number of buildings to the percentage of buildings
    in SLR zones by region and over time.
  12: The analysis uses a regression model with fixed effects to predict building
    attributes in 2015 based on whether locations are in the 6-foot SLR zone and the
    historical severity of storms. A within-metropolitan analysis of historical building
    patterns and hurricane trends is performed.
  13: The analysis uses regressions on three dependent variables (share of built-up
    land, structure density, total structures) with hurricane hits and hurricane wind
    speed as independent variables, accounting for geographical and temporal heterogeneity
    with fixed effects and controls.
  14: "Panel regression analysis from 1900\u20132015; clustered standard errors at\
    \ MSA scale and fixed effects include individual year, MSA, and individual year\
    \ x census division."
  17: Analysis involves using HISDAC-US data to identify development patterns and
    age of neighborhoods; it focuses on identifying vulnerability based on building
    age.
  19: "Analysis was performed using S2 Table results from built environment and cumulative\
    \ storm hits regression from 1900\u20132015 with MSA-Year fixed effects."
More Notes:
  2: Focuses on the interactions between social drivers and environmental hazards,
    and links historical urban development patterns to long-term social outcomes.
  4: The ZTRAX database has limitations related to data quality, including spatial,
    temporal, and thematic uncertainties. Two types of error are commission errors
    (structures reported that do not exist) and omission errors (structures that exist
    but are not reported in the database).
  7: Median year of construction of buildings in the 6-feet SLR zone is 1975.
  9: The study uses the built up properties (BUPL) data layer from HISDAC [39].
  10: The study analyzes development characteristics within coastal MSAs aggregated
    to Census Divisions to understand regional trends in the 6-foot SLR zone. The
    West South Central remains lower in structure density and percent of SLR zone
    developed despite density increases.
  11: 'Two distinct growth patterns are identified: densification vs. sprawl-based
    development in coastal regions.'
  12: The paper suggests that development initially concentrates in coastal areas
    and then expands inland. It also finds that hurricane activity tends to be associated
    with more compact and dense building patterns.
  14: The analysis uses a sample of MSAs with coastal areas inside the 6-foot SLR
    zone. Some analysis is restricted to MSAs with at least one hurricane landfall
    in the data.
  15: Coastal convergence patterns are creating similar exposure conditions across
    regions, indicating temporary historical conditions for coastal development.
  17: The study emphasizes the importance of policy and investment in adaptation to
    reduce future risk on developed coastlines.
  18: High-density built environments and aging infrastructure increase vulnerability
    along U.S. coastlines.
  21: No relevant information specific to the direct analysis of this paper on this
    page.
Quantitative Material:
  2: Approximately $1.07 trillion dollars worth of National Wetlands Inventory database
    are at risk of disruptive flooding by 2100.
  6: The study calculates the number of hurricane hits and their severity for each
    MSA from 1900 to 2015. It also calculates the proportion of grid cells developed
    (Built Area Proportion or BAP).
Quantitative material:
  4: The database includes information from more than 374 million public records and
    assessor data for approximately 200 million parcels in over 3,100 counties in
    the U.S.
  7: 446% increase in structures and a 220% increase in developed land area along
    the U.S. coastline between 1950 and 2000.
  9: Increases in density, densification, and percentage of developed land are shown
    graphically from 1900-2000 for flood zones, inland coastal MSAs, and all CONUS
    MSAs
  10: Includes data and line graphs on structure density, densification, proportion
    of SLR zone developed, and expansion, each measured over time from 1900-2000.
  11: Data related to the absolute and relative exposure percentages of MSAs to SLR
    are provided.
  12: The South Atlantic division has the highest percentage of total MSA structures
    in the SLR zone. Since about 1970, the percentage of total MSA structures in the
    SLR has dropped in the South Atlantic due to increasing addition of structures
    in inland areas.
  13: The coefficient estimates in the scatter plots offer quantitative insights into
    the relationship between hurricane characteristics and structural development.
  14: SLR zone MSAs tend to be around 8 percentage points more built up than their
    respective interior areas; One-unit increase in accumulation of storms is associated
    with an increase of 2.3 percentage points in share of built up land.
  17: Map showing percentage of structures older than 1975 across MSAs in the contiguous
    United States, color-coded by age distribution.
