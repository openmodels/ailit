  15: "  \nCoastal development increases exposure to sea level rise and hurricanes:\
    \ \"Development along U.S. coastlines... increasing built environment exposure\
    \ along the coast.\"\n\nDevelopment changed from low-density expansion to densification\
    \ since 1980, increasing exposure to natural hazards in coastal areas: \"coastal\
    \ building tends to expand with low-density construction in the early phase of\
    \ development but has transitioned to densification from roughly 1980 on.\"\n\n\
    Increasing densification along coastlines may lead to increased exposure but potentially\
    \ decreased vulnerability due to modern building codes: \"Increasing exposure\
    \ through added structures... more modern building codes.\"\n\nCoastal convergence\
    \ patterns are creating similar exposure conditions across regions, indicating\
    \ temporary historical conditions for coastal development: \"increasing convergence\
    \ of the density and expansion characteristics... temporary.\"\n"
  16: 'Source material here: Exposure to sea level rise and hurricanes...communities
    of the Sunbelt...These trends suggest convergence in the profiles of more recently
    developed regions with the older Northeast. Coastal built environment exposure
    is highest in areas at elevated risk of natural disasters due to SLR...The number
    of structures in the SLR zone is a general indicator of the physical exposure
    of a community to impacts from coastal storms and flooding...For example, metropolitan
    areas such as Miami, New York, Boston, Houston, Los Angeles, and San Francisco
    contain high numbers of structures and high structure density in SLR zones and
    are thus highly exposed to coastal hazards. The South Atlantic and Florida continue
    to add structures at high rates and have a larger relative exposure than other
    divisions, despite being at high risk of natural hazards (i.e., hurricanes)...This
    result is particularly critical given that there is a high probability of hurricanes
    in southern Florida...Post-hurricane development is associated with increased
    built environment exposure to coastal hazards...The Sunbelt region rapidly developed
    after WWII. We find that areas within the Sunbelt are growing and becoming denser
    despite cumulative hurricane hits and high risk of natural hazards. Recent evidence
    points to the construction of larger structures after hurricane disasters along
    the East and Gulf Coasts...Our results complement this finding, as we identify
    increasingly dense SLR zones in areas affected by hurricanes in recent decades,
    despite the widespread recognition of coastal hazards...In short, areas at risk
    of hurricane impacts are more highly developed than those that are not at risk...Our
    findings imply that U.S. coastlines in 2015 look different if they have been hit
    by even one hurricane. These coastal communities look even more different if they
    accumulate more than one hurricane hit during the study period...Just as multiple
    hurricanes affect community processes, such as likelihood of hurricane evacuation
    or population growth...we find that these disasters also affect the physical structure
    of the built environment in hurricane-prone areas. This development effect could
    be the outcome of rebuilding and adaptation after impacted, older buildings are
    damaged or of the impetus for communities to build back after natural hazard...Other
    studies find that building footprints increase after hurricane events, increasing
    development intensity and building sizes along the coast...In Florida, residential
    exposure increased and development did not slow down after coastal development
    plans and restrictions were enacted...pointing to variations in the effectiveness
    of building restrictions along disaster-prone areas...This finding is relevant
    for future planning as not only are coastal hazards associated with increases
    in exposure, but the densified nature of this development will also constrain
    future adaptation efforts with respect to climate change. Knowledge of exposed
    built structures and their characteristics enables new forms of risk assessment
    of the built environment. Guided by an interest to identify measures that contribute
    to the exposure and vulnerability of the built environment...'
