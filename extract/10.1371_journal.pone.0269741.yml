  12: 'Source material here.

    - "Exposure to sea level rise and hurricanes...While relative exposure remained
    steady or began to decrease, the absolute number of structures in SLR zones increased
    across all divisions."

    - "We find that the South Atlantic division has the highest percentage of total
    MSA structures in the SLR zone (Fig 5B), with areas like Miami, FL and Hilton
    Head Island, SC driving this trend (Fig 5A). Since about 1970, the percentage
    of total MSA structures in the SLR has dropped in the South Atlantic because of
    increasing addition of structures in inland areas."

    - "Using a regression, we present estimates predicting 2015 building attributes
    across places characterized along two dimensions: 1) whether or not these locations
    are in the 6-foot SLR zone, and 2) the historical severity of the recorded storms."

    - "The South Atlantic, have higher exposure across both measures, showing that
    hurricane-affected areas may be more developed than unaffected areas."

    - "We now investigate the likelihood that the unique environmental conditions
    of coastlines have influenced local building patterns...This comparison between
    the SLR and interior zones of the same urban areas."

    - "These observations provide evidence for the development of coastal areas first
    and the subsequent expansion into more inland areas in the same MSAs."

