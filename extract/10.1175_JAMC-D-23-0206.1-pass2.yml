Highlights:
  1: The study projects statistically significant increases in extreme daily precipitation
    in the Midwest and Ohio Valley, and decreases in the southern Great Plains by
    the end of the twenty-first century under certain emissions scenarios.
  2: Potential changes in future extreme precipitation can inform stakeholders to
    develop mitigation and adaptation strategies
  4: Hist daily mean and extreme precipitation compare favorably to PRISM, with significant
    consistency in the Northern Hemisphere extratropics.
  5: "HIST admirably represented the mean and 99th percentile of daily precipitation\
    \ annually and seasonally compared to PRISM. HIST annual 99th percentile of daily\
    \ precipitation was significantly wetter for a large area of the Intermountain\
    \ West and smaller areas in the southern Great Plains and Midwest, while significantly\
    \ drier areas were mainly confined to the Northeast. Differences between HIST\
    \ and PRISM displayed a statistically significant ( p < 0.05) wet bias in regions\
    \ of Intermountain West during September\u2013February and in the northern Great\
    \ Plains and Midwest during December\u2013February."
  6: Decrease in the 99th percentile of daily precipitation in Southwest and Intermountain
    West; more sporadic regions of the northern Intermountain West showed significant
    increases in extreme precipitation.
  7: EOC8.5 simulations show statistically significant increases in precipitation
    in the Midwest and Ohio Valley in March-May, with robust statistically significant
    increases of up to 100% for the 99th percentile of daily precipitation during
    September-November.
  8: "MCS precipitation has increased in the Northeast into the Appalachian Mountains\
    \ (June\u2013August), Ohio Valley (December\u2013May), and Midwest (March\u2013\
    May and September\u2013November). The 99th percentile of daily precipitation is\
    \ projected to increase significantly (over 50% in many areas) by the end of the\
    \ 21st century across most seasons. There are statistically significant increases\
    \ in mean MCS precipitation in several regions."
  10: "Model estimates show reasonable estimation for most values with high Pearson\u2019\
    s r (>0.9) but indicate underestimation biases in extreme precipitation values."
  12: Cities like Albany, Minneapolis, Nashville, Phoenix, and Tallahassee show significant
    changes in precipitation extremes, with robust increases noted under the EOC8.5
    scenario for all return periods.
  13: Comparison of precipitation extremes between historical periods and future climate
    projections under different emission scenarios.
  14: Return periods of daily precipitation for eight cities are shown for different
    future climate scenarios.
  15: Significant increases in 100-yr return period precipitation values for EOC8.5
    in specific regions, with implications for infrastructure under current construction
    that assumes historical values.
  16: Extreme daily precipitation projected to rise through the end of the 21st century
    for both RCP scenarios, particularly in the CONUS.
  17: Extreme daily precipitation changes across various regions have potential societal
    impacts, influencing flood risks and infrastructure planning.
Methodology:
  1: The analysis uses a dynamically downscaled, convection-permitting regional climate
    model to investigate historical and future extreme daily precipitation in the
    contiguous United States.
  2: Used a novel dynamically downscaled convection-permitting simulation with WRF-ARW
    version 4.1.2 at 3.75 km horizontal grid spacing to examine future climatic scenarios
  3: The PRISM data are used to compare HIST daily extreme precipitation to observations
    with bilinear interpolation to match the WRF-ARW grid.
  4: The analysis uses block maxima (BM) technique to model extreme precipitation,
    fitting extreme values to a right-skewed Gumbel distribution evaluated using Akaike
    information criterion (AIC) and other model metrics.
  5: "Compared HIST and PRISM data for the 99th percentile of daily precipitation\
    \ annually and seasonally. Calculated raw and percent differences between the\
    \ two datasets. Used Pearson's r correlation and RMSE to assess the relationship\
    \ between PRISM and HIST. Employed a Mann\u2013Whitney U test to determine statistically\
    \ significant differences (p < 0.05) with a field significance false discovery\
    \ rate of a 5 0.1."
  7: The study uses a Mann-Whitney U test with a field significance false discovery
    rate of a=0.1 to determine statistically significant differences (p<0.05) between
    epochs.
  8: Compares HIST (historical) climate data to EOC4.5 and EOC8.5 (end-of-century)
    climate projections, analyzing changes in precipitation patterns and extremes.
    Analysis focused on MCS (Mesoscale Convective System) precipitation and the 99th
    percentile of daily precipitation.
  10: The analysis evaluates empirical relationships between modeled extreme value
    analysis (EVA) and input weather research and forecasting (WRF) distributions
    using metrics like RMSE, r, and R2.
  11: Comparison of modeled EVA daily precipitation with input WRF data for different
    epochs.
  12: The methodology involves comparing historical climate data (HIST) with future
    climate scenarios (EOC4.5 and EOC8.5) using metrics like PDFs and return periods
    to assess changes in extreme events.
  13: Simulation data from PRISM (historical) and HIST (historical) compared to future
    climate simulations (EOC4.5 and EOC8.5) for eight climatologically unique cities;
    analysis applicable to the specific time periods and climate scenarios mentioned.
  14: "Analysis uses 1990\u20132005 HIST, 2085\u20132100 EOC4.5, and 2085\u20132100\
    \ EOC8.5 epochs for eight climatologically unique cities. Solid lines denote the\
    \ median modeled return period. Dashed lines indicate the 95% confidence interval\
    \ (HIST is shaded) calculated using a 1000-iteration bootstrap sample."
  16: Analysis performed using a novel convection-permitting dynamically downscaled
    RCM dataset with end-of-century epochs under RCP4.5 and RCP8.5 pathways.
  17: The analysis involves Extreme Value Analysis (EVA) for precipitation extremes,
    focusing on changes projected by the end of the twenty-first century.
More Notes:
