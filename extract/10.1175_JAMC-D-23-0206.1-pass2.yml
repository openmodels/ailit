  12: "Source material here.\n1. Evaluation overview: \"Every climatologically unique\
    \ city displayed an increase... in the peak of the PDF curve in one or both EOC\
    \ scenarios.\" \n2. Drivers of Risk: \"The decrease in the peak probability density\
    \ indicates more variability and typically an increased ceiling for precipitation\
    \ extremes.\"\n3. Quantitative material: \"The percent change above HIST in the\
    \ EOC scenarios for the 100-yr return period of daily precipitation values varied\
    \ for each city but was generally 20% or greater, with very large (.50%) increases\
    \ shown in Albany, Minneapolis, and Nashville.\"\n4. Methodology: \"We used PDFs\
    \ to detect the variability of the extreme daily precipitation values in the epochs\
    \ from extreme precipitation values extracted for the EVA... using the Q\u2013\
    Q plots gives confidence in the reliability of the modeled EVA extremes.\"\n5.\
    \ Highlights: \"Albany, Minneapolis, Nashville, Phoenix, and Tallahassee displayed\
    \ the highest differences in the peak of the PDF curve in one or both EOC scenarios.\"\
    \n6. More Notes: \"R2 displays good model reliability with values greater than\
    \ 0.85, indicating that HIST explained at least 85% of the variance from the input\
    \ data for most epochs in each city.\"\n"
  13: "Source material here.\n\"The probability density (y axis) of daily precipitation\
