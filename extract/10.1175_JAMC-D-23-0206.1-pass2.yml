  13: The analysis focuses on eight climatologically unique cities.
  14: The downloaded timestamp and user are included on the page.
  17: The study suggests future adaptation and mitigation efforts should consider
    changes in extreme precipitation linked to urbanization and socioeconomically
    vulnerable areas.
