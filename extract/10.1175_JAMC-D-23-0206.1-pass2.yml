sourcematerial:
  1: "Source material: ABSTRACT: The potential for changes in extreme precipitation\
    \ events due to anthropogenic climate change may have signi\uFB01 cant societal\
    \ impacts (e.g., agricultural productivity, property loss, and mortality). This\
    \ project uses a dynamically downscaled, convection-permitting regional climate\
    \ model to investigate extreme daily precipitation in the CONUS, de\uFB01 ned\
    \ explicitly as the 99th percentile 24-h accumulated value. The simulation output\
    \ includes a historical (HIST) baseline (1990\u20132005) and two epochs at the\
    \ end of the twenty-\uFB01 rst century (EOC; 2085\u20132100) under intermediate\
    \ and pessimistic emissions scenarios. Comparisons between HIST and the two EOC\
    \ scenarios for the 99th percentile of daily precipitation show statistically\
    \ signi\uFB01 cant increases during December\u2013May across the Midwest and Ohio\
    \ Valley and statistically signi\uFB01 cant decreases for the southern Great Plains\
    \ during December\u2013February."
  2: "Source material here.\n\"we use a novel dynamically downscaled convection-permitting\
    \ simulation to examine projected changes in extreme daily precipitation throughout\
    \ the CONUS during the twenty-first century.\"\n\"North America could experience\
    \ an increase in mesoscale convective system (MCS) frequency and a 15%\u201340%\
    \ increase in maximum precipitation rates due to a deeper layer permitting more\
    \ collision and coalescence.\"\n\"The model used herein allows for representation\
    \ of regional climate change of precipitation extremes closer to the local scales\
    \ at which they occur (e.g., ,4-km horizontal grid spacing), which is of great\
    \ interest to stakeholders.\"\n\"Highlighting the potential changes in future\
    \ extreme precipitation can inform stakeholders so that they may develop effective\
    \ mitigation and adaptation strategies to reduce impacts.\"\n"
  3: "yaml\nMethodology: \"Daily precipitation amounts analyzed herein are derived\
    \ from the Air Force Weather Agency (AFWA...The AFWA total precipitation variable\
    \ is based on accumulation since the simulation start (Creighton et al. 2014).\
    \ Daily precipitation (1200\u20131200 UTC) climatologies are then aggregated from\
    \ the HIST, EOC4.5, and EOC8.5 15-min subdaily AFWA total precipitation data.\"\
    \nQuantitative material: \"Here, we de\uFB01ne extreme daily precipitation to\
    \ be the 99th percentile of daily precipitation over the entire epoch time series.\"\
    \nMethodology: \"Extreme value theory (EVT; Gumbel 1958) characterizes the frequency\
    \ and intensity of extremes...Here, we implement univariate EVA using the Fisher\u2013\
    Tippett\u2013Gnedenko (Fisher and Tippett 1928; Gnedenko 1943) theorem with the\
    \ daily precipitation time series for the PRISM, HIST, EOC4.5, and EOC8.5 epochs\
    \ and performed the analysis using the Python package pyextremes...using Pearson\u2019\
    \ s correlation coef \uFB01cient r, root-mean-square error (RMSE), and p value\
    \ (95% con\uFB01 dence level) from a Mann\u2013Whitney U test for the medians\
    \ using a \uFB01 eld signi\uFB01 cance false discovery rate of a 5 0.1.\"\nMethodology:\
    \ \"To compare HIST daily extreme precipitation to observa tions, we use the Parameter-Elevation\
    \ Regressions on Independent Slopes Model (PRISM; Daly et al. 1994)...PRISM data\
    \ from 1 October 1990 to 30 September 2005 (i.e., the HIST climate simulation\
    \ period) were bilinearly re gridded to match the WRF-ARW lambert conformal projec\
    \ tion and horizontal grid spacing of 3.75 km for comparison.\"\nDrivers of Risk:\
    \ \"Extreme precipitation changes over relatively short inter vals are particularly\
    \ important due to their potential societal impacts, and given the many options,\
    \ it was important to choose the optimal de\uFB01 nition that can be directly\
    \ compared to previous research and ensure relevance to those impacts.\"\n"
  4: null
  5: "The annual 99th percentiles of PRISM and HIST were also highly correlated with\
    \ Pearson\u2019s r correlation of 0.89, p \u2019 0, and RMSE 5 7.8 mm [...] Pearson\u2019\
    s r correlation between PRISM and HIST minimally dropped for the 99th percentile\
    \ seasonally [...] RMSE of 12.3 (December\u2013February), 7.9 (March\u2013May),\
    \ 9.2 (June\u2013August), and 8.9 (September\u2013November) mm. Differences between\
    \ HIST and PRISM displayed a statistically significant (p < 0.05) wet bias in\
    \ regions of Intermountain West during September\u2013February and in the northern\
    \ Great Plains and Midwest during December\u2013February [...] significant wetter\
    \ for a large area of the Intermountain West and smaller areas in the southern\
    \ Great Plains and Midwest, while significantly drier areas were mainly confined\
    \ to the Northeast [...] determined statistically significant differences (p <\
    \ 0.05) between the epochs with a field significance false discovery rate of a\
    \ 5 0.1 [...] The differences between the datasets are likely associated with\
    \ differing regridding and spatial clipping techniques [...] HIST admirably represented\
    \ the mean and 99th percentile of daily precipitation annually and seasonally\
    \ compared to PRISM."
  6: "yaml\nEvaluation overview: \"Therefore, changes in extreme precipitation in\
    \ these regions will have large implications for regional hydroclimate stability\
    \ and water scarcity in these climatologically arid regions.\"\nDrivers of Risk:\
    \ \"the potential change of a smaller fraction of precipitation falling as snow\
    \ could lead to an increased \uFB02ood risk during winter and spring and water\
    \ scarcity in summer due to decreased snowpack\"\nQuantitative material: \"Many\
    \ decreases in the 99th percentile of daily precipitation had large negative percent\
    \ differences of 50% \u2013150% in the Southwest and Intermountain West\"\nHighlights:\
    \ \"Results reveal the largest areas of statistically signi\uFB01cant decreases\
    \ in the 99th percentile of daily precipitation were in EOC8.5 in the Southwest\
    \ (March\u2013May; Fig. 3e) and Intermountain West (June\u2013August; Fig. 4e).\"\
    \n"
  7: "Source material: FIG.2.December\u2013February 99th percentile of daily precipitation\
    \ (mm) for (a) 1990\u2013 2005 HIST, with (b),(c) raw and (d),(e) percent differences\
    \ from HIST for 2085\u20132100 EOC4.5 and EOC8.5 epochs. Hatched areas on percent\
    \ difference panels indicate regions where a Mann\u2013Whitney U test determined\
    \ statistically signi\uFB01 cant differences ( p , 0.05) between the epochs with\
    \ a \uFB01 eld signi\uFB01 cance false discovery rate of a 5 0.1. HIST showed\
    \ a statistically si gn i\uFB01 cant dry bias for those regions during September\u2013\
    November (Fig. 1t), extreme precipitation caused by tropical cyclones may be underestimated\
    \ in the HIST and EOC simulations. EOC8.5 seasonal mean precipitation in the Midwest\
    \ and Ohio Valley had statistically signi\uFB01 cant increases in March\u2013\
    \ May (Gensini et al. 2023). These regions also displayed widespread robust statistically\
    \ signi\uFB01 cant increases of up to 100% for the 99th percentile of daily precipitation\
    \ during September\u2013November."
  8: "Source material here.\n- \"The most robust statistically significant increases\
