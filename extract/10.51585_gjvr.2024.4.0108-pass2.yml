  5: 'plaintext

    "Meat quality properties include water holding capacity, drip loss, shear force,
    cook loss, pH, shelf life, protein solubility, and fat content (Allen et al.,
    1998; Cartoni Mancinelli et al., 2023; Estevez, 2015; Liu et al., 2022; Lu et
    al., 2007; Zhang et al., 2012), all of which can be affected by HS. Some of the
    negative effects of HS on poultry meat quality include reduced water-holding capacity,
    pH, and increased drip loss, which in turn changes the normal taste, color, and
    texture of chicken meat (Goo et al., 2019; Nawaz et al., 2021; Sandercock et al.,
    2001). In a study by Teyssier and co-workers, HS reduced breast meat yield and
    increased fat content, indicating that broilers shift metabolism from protein
    to lipid synthesis (Teyssier et al., 2022). Nutritional supplementation of certain
    additives has been suggested to decrease some of the negative effects of HS on
    meat quality...Herbal adaptogens are supplements that can increase the ability
    of an organism to adapt to environmental stressors. These have been observed to
    increase meat pH at processing, reduce cooking loss, and improve meat color in
    heat-stressed birds (Greene et al., 2021). Heat stress triggers anaerobic glycolysis
    within the muscles during slaughter. Under HS, more pyruvate is produced, and
    this then converts into lactate. Thus, higher lactic acid concentration leads
    to lower pH and poorer meat quality (Wang et al., 2017; Zaboli et al., 2019)."

