Drivers of Risk:
  1: Climate warming mainly due to greenhouse gas emissions is altering the global
    hydrological cycle, leading to more frequent and persistent natural hazards such
    as droughts.
  2: Rising temperatures lead to more intense and frequent dry spells, worsening drought
    conditions.
  3: Projected increases in drought magnitude and socioeconomic exposure due to global
    warming, assessed using multiple RCPs.
  4: Increases in global mean temperatures under different Representative Concentration
    Pathways (RCPs) impacting drought conditions.
  5: Climate warming is indicated as a driver that impacts drought duration and severity.
  6: Rising temperatures lead to higher evaporative demands and more frequent/persistent
    dry spells.
  7: Projected increases in global temperature leading to more severe drought conditions
    globally, with specific impacts in Mediterranean regions, South Africa, and South
    America.
  9: Increasing drought risks (more frequent historical 50-year events).
  10: "Climate warming from 1.5 to 2.0\u25E6C is a driver of drought risk."
  11: "Climate warming (1.5\xB0C and 2.0\xB0C warming scenarios)."
  12: Warming climates leading to simultaneous increase in precipitation and evaporative
    demand; decreasing SPEI-3.
  13: Increasing leaf area and growing season due to CO2 are countered by potential
    evapotranspiration shifts in vegetated lands.
  14: "The changes in severe drought frequency associated with different levels of\
    \ global warming (1.5\xB0C and 2.0\xB0C) impact population and GDP exposure."
  16: Drought risks, population, and GDP
  18: Drought duration and severity, identified using the SPEI combined with the run
    theory
  20: No relevant information
Evaluation overview:
  1: "The paper provides an overview of projected increases in magnitude and socioeconomic\
    \ exposure of global droughts in 1.5 and 2\xB0C warmer climates."
  2: The paper focuses on drought risks and socioeconomic exposures, motivated by
    the potentially devastating impacts of severe droughts on society.
  3: The study assesses changes in global drought conditions and socioeconomic exposure
    due to additional warming.
  4: Projected increases in magnitude and socioeconomic exposure of global droughts
  5: The page does not specifically provide an overall evaluation outcome; it focuses
    on the modeling of drought characteristics.
  6: "The paper evaluates drought conditions and socioeconomic exposure under 1.5\xB0\
    C and 2.0\xB0C warming scenarios."
  7: No overview of specific outcomes like mortality or productivity loss is provided;
    the focus is on changes in drought characteristics.
  9: Population and GDP exposure from increasing drought risks.
  10: Evaluates changes in drought duration and severity and socioeconomic exposure
    to drought.
  11: Socioeconomic exposure to drought risks in Argentina, Australia, Canada, China,
    United States, South Africa, Brazil, and Mexico.
  12: Drought risks and corresponding socioeconomic exposures.
  14: "The page provides an overview of projected national population and GDP exposure\
    \ to more frequent severe droughts under two warming targets (1.5\xB0C and 2.0\xB0\
    C)."
  16: Socioeconomic exposure (population and GDP) to drought risks under different
    warming levels
  18: "Changes in global drought bivariate magnitudes and socioeconomic consequences\
    \ in the 1.5 and 2.0\u25E6C warmer worlds are quantified."
  20: No relevant information
Highlights:
  1: "Limiting global warming to 1.5\xB0C compared with 2\xB0C can mitigate drought\
    \ impacts significantly; more than 75 (73) countries' populations (GDP) will be\
    \ completely affected by increasing drought risks under 1.5\xB0C warming."
  2: The paper highlights the limitations of univariate drought analysis, which may
    underestimate drought risks. It advocates for joint modeling of multiple drought
    features using a multivariate framework (copula functions) and linking the high
    interdependence of drought characteristics to a global impact assessment under
    different warming levels. The paper also points out the questionable statistical
    and theoretical basis of the equal frequency assumption (EFC) method for variable
    combinations.
  4: "Projected global mean temperature increases under different RCPs reaching 1.5\xB0\
    C and 2.0\xB0C warming."
  5: The study focuses on jointly modeling drought duration and severity using a copula
    function and evaluates socioeconomic exposure changes under different warming
    conditions.
  6: Dryness will intensify in a future warming world. Several regions experience
    compound increases in both drought severity and duration.
  7: "Under 2.0\xB0C warming, drought duration and severity projected to increase,\
    \ with extreme conditions more frequent; greater impacts in Mediterranean, South\
    \ Africa, and South America."
  9: Three SSPs suggest a consistent projection that large percentages of population
    and GDP will be exposed to increasing drought risks.
  10: "An additional 0.5\u25E6C warming will not lead to drought risk deterioration\
    \ globally, partly due to increasing column-precipitable water, although it holds\
    \ for the majority of global land masses."
  11: "Drought risks increase significantly in hotspot countries under climate warming.\
    \ The tropics may confront more severe, frequent droughts and worse socioeconomic\
    \ influences under a warming climate. Drought conditions worsen overall in the\
    \ example countries as warming increases from 1.5\xB0C to 2.0\xB0C."
  12: "Ambitiously limiting warming to 1.5\u25E6C would substantially mitigate future\
    \ drought risks and corresponding socioeconomic exposures; climate warming to\
    \ lead to a general intensification of drought conditions."
  13: The page discusses how different threshold values can impact the assessment
    of drought risk and the robustness of results, showing a comparison between -0.8
    and -0.5 thresholds for drought identification.
  14: The key outcome is the increased fraction of national populations and GDP exposed
    to severe droughts under two warming scenarios, demonstrated through six global
    maps for different Shared Socioeconomic Pathways (SSPs).
  16: Drought risks and population (GDP) both contribute to the exposure change.
  18: "The means of SPEI-3 from the historical period to the 1.5 and 2.0\u25E6C warmer\
    \ worlds are projected to descend at a global scale, while the standard deviation\
    \ exhibits large increases."
  20: No relevant information
Methodology:
  1: The study uses a bivariate framework with the Standardized Precipitation Evapotranspiration
    Index (SPEI) and runs theory, incorporating 13 CMIP5 global climate models under
    three RCPs to evaluate drought characteristics and exposures.
  2: "The paper discusses the use of climate models (CESM, HAPPI, CMIP5) to project\
    \ drought conditions under different warming scenarios (1.5\xB0C, 2\xB0C above\
    \ pre-industrial levels). It also discusses the use of univariate and multivariate\
    \ (copula function) frequency analysis to assess drought severity and duration.\
    \ The authors introduce the concept of \u201Cmost likely design realization\u201D\
    \ to choose the point with the highest likelihood along the quantile curve in\
    \ frequency analysis."
  3: SPEI with a 3-month timescale is used to quantify drought conditions, capturing
    shallow soil moisture available to crops.
  4: The study uses 13 Global Climate Models (GCMs) and considers different RCP scenarios.
    PET is calculated using the Penman-Monteith approach.
  5: The analysis utilizes bivariate copula models to assess drought duration and
    severity; it employs methods like run theory and the most likely realization for
    identifying drought events.
  6: The study uses the Standardized Precipitation-Evapotranspiration Index (SPEI-3)
    to assess dryness, calculates joint recurrence frequencies of drought events under
    different warming scenarios, and estimates socioeconomic exposures using different
    SSPs and RCPs.
  7: Analysis uses SPEI to project changes in drought frequency, duration, and severity
    globally under different RCP scenarios.
  9: "Combines drought projection with population and GDP information based on SSPs\
    \ and estimates exposures by droughts in the 1.5 and 2.0\u25E6C warmer worlds;\
    \ fraction of drought-affected population (and GDP) divided by the total population\
    \ (and GDP) of each country is employed as the indicator."
  10: "Calculates socioeconomic exposures under three SSPs and the differences in\
    \ percentage between the 1.5 and 2.0\u25E6C warming levels."
  11: Spatially aggregating mean changes to assess national-scale drought risks. Land
    fractions of each grid cell are binned and plotted against the change in drought
    return period (relative to historical 50-year drought). Violin plots show distributions
    for drought characteristics under different time periods.
  12: "The reference crop Penman\u2013Monteith model is employed to calculate potential\
    \ evapotranspiration (and thus SPEI). Analysis is performed under different SSP\
    \ scenarios."
  13: The study fixed rs to calculate potential evapotranspiration and used threshold
    values (-0.5 and -0.8) to identify drought events varying in severity and duration.
  16: "Compares population and GDP between fixed 30-year 1.5 and 2.0\u25E6C warming\
    \ periods. Exposure is defined as the number of people (GDP) being exposed to\
    \ areas where bivariate drought risks increase under the warming climate."
  18: The drought characteristics are identified using the SPEI combined with the
    run theory, and the changes in occurrence are measured by both drought duration
    and severity, with the incorporation of the copula functions and most likely realization
    method.
  20: No relevant information
More Notes:
  4: The table provides information on the GCMs used in the study, including their
    resolution and the institution responsible.
  5: No additional notes are available from this page.
  7: Violin plots used to display distributions of drought characteristics across
    land pixels for multi-model ensemble mean results.
  9: Economically prosperous regions are associated with higher population and immigration,
    thus, the drought-affected GDP exposures usually exhibit similar changing patterns
    with the population; in regions with low GDP and population density, even when
    total socioeconomic exposures to droughts seem small, droughts can still cause
    fatal and destructive losses for those countries if their drought resilience is
    poor.
  10: "There is spatial heterogeneity in drought exposure variations when climate\
    \ warming climbs from 1.5 to 2.0\u25E6C. Drought exposures for some countries\
    \ (i.e., Canada) can be slightly decreased in the 2\u25E6C warming level compared\
    \ to the 1.5\u25E6C warming level."
  11: Oceanic forcing is suggested as a potential driver of increased drought risks
    in tropical regions. Figures 11 and 12 show land fractions affected by changes
    in drought return period. Figures S3 and S4 show socioeconomic exposure.
  12: Analysis seems to focus on drought frequency and severity, and its impacts on
    Brazil and Mexico are particularly highlighted.
  16: The study considers dynamic characteristics in population and GDP when investigating
    socioeconomic exposure, unlike some earlier studies that use population and GDP
    for a single year.
  18: The analysis considers climate projected by the multi-model ensemble under three
    representative concentration pathways (RCP2.6, RCP4.5, and RCP8.5).
  20: No relevant information
Quantitative material:
  1: "Historical 50-year droughts may double across 58% of global landmasses in a\
    \ 1.5\xB0C warmer world, and additional 9% of world landmasses would be affected\
    \ by catastrophic droughts if warming reaches 2.0\xB0C."
  4: "Projected global mean temperatures under RCP 2.6, 4.5, and 8.5 reaching 1.5\xB0\
    C and 2.0\xB0C warming from 2020 to 2100. The study also uses equations to calculate\
    \ Potential Evapotranspiration (PET) based on climatic variables."
  5: No specific quantitative material is presented on this page.
  6: "Mean SPEI-3 decreases across 85% of the land areas (excluding Antarctica) in\
    \ a 1.5\xB0C warmer world. Drought duration is projected to slowly prolong across\
    \ 78% of the land surface. Drought severity shows a pronounced rise globally,\
    \ with significant increases (exceeding 50%) over 46% of global landmasses."
  7: "Drought severity increases accounting for 75% of land surface with 1.5 to 2.0\xB0\
    C warming and drought frequency to increase under all RCP scenarios; severity\
    \ increase greater than 10% over 35% of land areas."
  9: "In more than 67 (140) countries, 100% (50%) of both populations and GDPs are\
    \ exposed to more severe droughts under the 1.5\u25E6C warming target."
  10: "Projects 100% of the population and GDP in Mexico, southern Europe, central\
    \ and southern Africa, and Mediterranean regions will experience more severe drought.\
    \ Projects an additional 17 countries exhibiting a 100% fraction in socioeconomic\
    \ exposure with an additional 0.5C warming. More than 10 countries would experience\
    \ a 30% increase in population and GDP exposure if global warming increased from\
    \ 1.5 to 2.0\u25E6C. Land fraction suffering more frequent severe droughts in\
    \ Canada will decrease (\u221212.77%) in the 2.0\u25E6C warming level compared\
    \ to 1.5\u25E6C warming under the SSP126 scenario."
  11: "More than 90% of grid cells projected to suffer from more frequent droughts\
    \ in some hotspot countries. >85% of grid cells (associated with around 65%\u2013\
    97% of the national populations and GDPs) over Mexico and Brazil could be exposed\
    \ to the historical 50-year drought every 20 years in a 1.5\xB0C warming world."
  12: "More than 90% of the grid cells (associated with around 90%\u2013100% of the\
