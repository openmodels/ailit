  12: "L. Gu et al.: Projected increases in magnitude and socioeconomic exposure of\
    \ global droughts; Overall, increasing drought risks under warming climates can\
    \ cause major challenges for sustainable development and existing infrastructure\
    \ systems, while ambitiously limiting warming to 1.5\u25E6C would substantially\
    \ mitigate future drought risks and corresponding socioeconomic exposures. Among\
    \ the warming-induced hydrological changes, one of the most definitive and detectable\
    \ changes is the simultaneous increase in precipitation and evaporative demand,\
    \ which are governed by the Clausius\u2013Clapeyron relationship (Scheff and Frierson,\
    \ 2014). Observations and model simulations have reported a variety of scaling\
    \ rates between precipitation and global temperature. For global average precipitation,\
    \ however, most climate models project an increase of 1%\u20133% per degree warming\
    \ (Liu et al., 2013). Potential evapotranspiration, on the other hand, is predicted\
    \ to increase by 1.5%\u20134% per degree warming (Scheff and Frierson, 2014; Naumann\
    \ et al., 2018). Therefore, we expect climate warming to lead to a general intensification\
    \ of drought conditions, as the drying of the surface is enhanced with water scarcity.\
    \ This is confirmed by the decreasing SPEI-3 and significantly increasing drought\
    \ severity and duration with warming globally found here. The reference crop Penman\u2013\
    Monteith model is employed to calculate potential evapotranspiration (and thus\
    \ SPEI) in the current study. More than 90% of the grid cells (associated with\
    \ around 90%\u2013100% of the national population and GDP) across Brazil and Mexico\
    \ will experience drought frequency double that of the historical 50-year drought."
