  10: "Projected changes in drought duration and severity between the 1.5 and 2.0\u25E6\
    C warming targets.ample, the US and China are no longer the most drought-affected\
    \ countries, while 100% of the population and GDP intheMexico, southernEurope,\
    \ centralandsouthernAfrica, and Mediterranean regions (i.e., Turkey, Ukraine)\
    \ are projected to experience more severe drought, suggesting large policy challenges\
    \ there. To illustrate the consequences of limiting warming to 2.0\u25E6C above\
    \ the preindustrial levels, we also calculate the socioeconomicexposuresunderthreeSSPs(Fig.10)\
    \ and the differences in percentagebetween the 1.5 and 2.0\u25E6C warming levels\
    \ (Fig. S2). Most regions of the globe are projected to exhibit a generally increasing\
    \ fraction (relative to 1.5\u25E6C warming)inpopulationsandGDPs (exceptforcentralAfrica\
    \ and East Asia). To be specific, under the extra half-degree warming, an additional\
    \ 17 countries are projected to exhibit a 100% fraction in socioeconomic exposure.\
    \ More than 10 countries would experience a 30% increase in population and GDP\
    \ exposure if the global warming level increased from 1.5 to 2.0\u25E6C. These\
    \ increases illustrate the benefit of holding global warming to 1.5\u25E6C instead\
    \ of 2\u25E6C, particularly for the mitigation of population and GDP exposure\
    \ to drought. It should be noted that when climate warming climbs from 1.5 to\
    \ 2.0\u25E6C, there is some spatial heterogeneity with regards to drought exposure\
    \ variations. Specifically, drought exposures for some countries (i.e., Canada)\
    \ can be slightly decreased in the 2\u25E6C warming level compared to the 1.5\u25E6\
    C warming level. This decrease in population and GDP exposure fraction can be\
