  16: "Source material here: When investigating socioeconomic exposure (i.e., population\
    \ and GDP) under different warming levels, we notice that drought risks and population\
    \ (GDP) both contribute to the exposure change. However, the use of population\
    \ and GDP for a single year (i.e., 2005 or 2100), which have been used by some\
    \ earlier studies, has ignored the role of dynamic socio-economic impacts. [\u2026\
    ] Accordingly, the exposure is defined as the number of people (GDP) being exposed\
    \ to areas where the bivariate drought risks increase under the warming climate.\
    \ Under the 1.5\u25E6C warming climate, there are around 88% of global landmasses\
    \ being exposed to increasing drought risks, which corresponds to the dynamic\
    \ characteristics considered differences in population (and GDP) between the fixed\
    \ 30-year 1.5 and 2.0\u25E6C warming periods."
