  3: "plaintext\nIn this study, under a bivariate framework, we quantify changes in\
    \ global drought conditions and socioeconomic exposure with additional levels\
    \ of 1.5 and 2.0\xB0C warming. The drought characteristics are identified using\
    \ the Standardized Precipitation Evapotranspiration Index (SPEI) combined with\
    \ the run theory and with climate scenarios simulated by 13 CMIP5 global climate\
    \ models (GCMs) under three RCPs (RCP2.6, RCP4.5, and RCP8.5).\n\nThe drought\
    \ condition is quantified with the SPEI developed by Vicente-Serrano et al. (2010),\
    \ which has been widely adopted in characterizing drought conditions (e.g., Ayantobo\
    \ et al., 2018; Wen et al., 2019). The SPEI with a 3-month timescale (SPEI-3)\
    \ is used in this study because it captures well the shallow soil moisture available\
    \ to crops and reflects seasonal water loss processes.\n\nIn this study, under\
    \ a bivariate framework, we quantify changes in global drought conditions and\
    \ socioeconomic exposure with additional levels of 1.5 and 2.0\xB0C warming.\n\
    \nFinally, the drought exposures of populations and regional gross domestic product\
    \ (GDP) under different SSPs are assessed globally.\n"
