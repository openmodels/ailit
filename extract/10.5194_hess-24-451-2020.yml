  2: 'Source material here.

    "The potentially devastating impacts of more severe drought conditions on society
    raise considerable concerns, motivating a number of global socioeconomic assessments
    of future drought change impact."

    "consensus that, with a higher saturation threshold and more intense and frequent
    dry spells driven by rising temperatures, drought conditions would considerably
    worsen in many regions."

    "One way is to employ a set of ensemble simulations produced by a single coupled
    climate model (e.g., Community Earth System Model, CESM)...Emerging modeling efforts
    such as the ''Half a degree Additional warming, Projections, Prognosis and Impacts''
    (HAPPI) model inter-comparison project...Current studies usually utilize CMIP5
    climate models to project climate scenarios under different representative concentration
    pathways (RCPs)...univariate frequency analysis is unable to describe the probability
    of occurrence for the drought events physically and may lead to underestimation
    of drought risks and societal hazards...Therefore, there is an urgent necessity
    to incorporate the joint modeling of multiple drought features into impact assessments...The
    copula function that shows good feasibility of marginal distributions in modeling
    intercorrelated variables has been introduced in multivariate analysis for droughts...to
    develop a more rational design for a multivariate approach, a novel concept of
    ''most likely design realization'' to choose the point with the highest likelihood
    along the quantile curve has been proposed in frequency analysis."

    "Despite the fact that the EFC method has low calculation complexity, the statistical
    and theoretical basis of the equal frequency assumption is questionable."

