  11: "yaml\nEvaluation overview: \"The page provides an evaluation of the productivity\
    \ of hydroponically grown crops, specifically focusing on potato seed tuber production\
    \ using the NFT hydroponics system. In a study conducted by Corr\xEAa et al. [29],\
    \ the researchers compared the potato seed tuber production of Monalisa and Agata\
    \ cultivars in NFT with traditional beds and pots methods.\"\nQuantitative material:\
    \ \"The hydroponic system resulted in a 147% increase in the number of tubers\
    \ in a single harvest and a 286% increase in staggered harvest compared to traditional\
    \ methods. In a single harvest the number of tubers in hydroponically grown seed\
    \ potato plants was 147% higher than the bed and pot systems. Even in the staggered\
    \ harvest, an increase of 286% in tubers was observed in the hydroponic plants\
    \ as compared to the ones grown in beds.\"\nHighlights: \"The NFT hydroponics\
    \ system demonstrated statistically better performance in tuber production compared\
    \ to traditional beds and pots. In terms of tubers/plant number in single and\
    \ staggered harvest, the NFT system performed better statistically.\"\n"
  12: 'Source material here.

    The study revealed that a greater multiplication rate was achieved by this technique
    when compared with other methods. The NFT hydroponic system enhances the recirculation
    of excess solution of nutrients and aids in the proper oxygen supply. Also, it
    is economical since it can be organized in multilevel, matrix farming, and vertical
    orientation. In addition, it minimizes land usage, labor and fertilizers compared
    to other systems. Water consumption is also very minimal, and it is climate resistant.
    It is most suitable for smaller and fast-growing plants such as lettuce [54] and
    is the most preferred technique for the cultivation of tomatoes. Blueberries,
    strawberries, and melons can be cultivated in NFT since it provides an ideal environment.
    Herbal plants like chives prone to drought stress can be cultivated better in
    NFT. Despite the fact that NFT is one of the most widely used hydroponics techniques,
    a lot of studies are concerned that exposing tuber roots to an excessive amount
    of salt from the nutrition may harm their periderm tissue. Thus, aeroponics has
    been promoted and applied in an effort to boost productivity. Aeroponics: A modified
    version of hydroponics to grow mini tubers Plants produced by aeroponics thrive
    in an air or thick fog environment. It involves spraying a nutrient-rich water
    solution onto the plant''s hanging roots. Lower stems occur in a closed or semi-closed
    environment using a high-pressure sprayer with a micro inject nozzle and an electronic
    timer. It provides highly oxygenated nutrients to the plants. However, it is essential
    to customize the misting cycles for plants since their roots are exposed to the
    air and will dry rapidly. In addition, outside temperatures can easily affect
    the mist and make the system more challenging to operate in frigid conditions.
    Several countries (including South Korea, New Zealand, China, Africa, Spain, and
    Latin America) have used aeroponics to grow mass amounts of potato mini-tubers.
    Aeroponics started with complicated equipment and relatively low yields, but by
    2006, the International Potato Center (CIP) had improved the yields and made aeroponics
    work in developing countries. Aeroponics is the future of soil-free agriculture."

