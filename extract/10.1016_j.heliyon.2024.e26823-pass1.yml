  13: Aeroponic systems can produce significantly higher numbers of mini-tubers compared
    to substrate systems.
  14: Aeroponics farming requires less water and no soil, making it suitable for challenging
    environments. Allows for closer plant spacing and potential use in space stations,
    sailing ships, and extraterrestrial colonies. Optimal ECs below 2.1 and 1.7 dS
    m-1 were found for two potato cultivars, with economic responses at 100 plants
    m-2.
  15: Hydroponic greenhouses are increasingly using waste heat from industry for energy
    efficiency.
