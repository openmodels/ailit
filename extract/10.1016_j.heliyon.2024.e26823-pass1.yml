Highlights:
  3: Hydroponics is highlighted as a sustainable solution to increase potato yield
    and address food security challenges by saving water, energy, and space.
  4: Hydroponics is presented as an alternative agriculture production system that
    focuses on climate resilience, efficient resource utilisation, and disease-free
    crop production. Mini tuber production is presented as fundamental to potato seed
    production.
  5: Soilless agriculture can overcome shortcomings faced by soil-based cultivation.
    Hydroponic systems can provide disease-free mini tubers and potentially multifold
    yields compared to conventional methods. Soilless culture can help accurately
    control the root environment, improving production and quality.
  7: "Eight horizontal wicks per box were found to be optimum for the production of\
