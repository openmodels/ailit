  5: The paper aims to analyze the quintessential questions surrounding hydroponic
    systems and identify prospects for their field use while considering what has
    recently been proved, keeping potato mini-tuber production in focus. Additionally,
    smart agriculture may make it possible for farmers to use cutting-edge technologies
    like artificial intelligence (AI), nanoparticles (NPs), plant growth-promoting
    rhizobacteria (PGPR), and aeroponics [15]. Drought, unpredictable weather, contaminated
    water sources, and undernutrition crops compelled producers to look for alternatives
    to soil-based agriculture. In response, soilless agriculture, a revolutionary
    crop cultivation method, has been adopted by growers for the past few decades
    to overcome the shortcomings faced by soil-based cultivation [16]. The paper interprets
    two factors (nutrients and substrate) that have been extensively studied but still
    need more investigation since this information is crucial for enhancing nutrient
    acquisition management in soilless systems. Hydroponics, a soilless system, has
    recently attracted researchers to overcome the limitations faced in traditional
    soil-based cultivation since it can be used for the production of crops irrespective
    of soil environment. Hydroponic systems, other than providing disease-free mini
    tubers, can provide multifold yield of seed potato as compared to the conventional
    methods.
