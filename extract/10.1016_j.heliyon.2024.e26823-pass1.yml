Methodology:
  3: The analysis reviews popular hydroponic methods and evaluates advancements and
    innovations that enhance potato production in soilless systems.
  4: The paper describes mini tuber production as a method for potato seed production,
    involving rapid multiplication of in vitro plantlets by nodal cuttings and subsequent
    field multiplication. Critical factors that can be modified during the mini tuber
    production phase include 1) the number of mini tubers per unit area, 2) the number
    of mini tubers per in vitro plantlet.
