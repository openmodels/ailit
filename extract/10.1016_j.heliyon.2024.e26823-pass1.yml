Highlights:
  3: Hydroponic systems are seen as a sustainable solution for efficient potato mini
    tuber production, mitigating dependency on land and managing potato seed stock
    quality.
  5: Hydroponic systems, other than providing disease-free mini tubers, can provide
    multifold yield of seed potato as compared to the conventional methods.
  9: Drip systems ensure efficient water usage, minimize water loss, and can survive
    equipment failures and short-term power outages. Drip hydroponics can significantly
    increase potato tuber yield compared to conventional systems. Ebb and flow systems
    require continual observation of water flow.
  11: The NFT hydroponics system demonstrated statistically better performance in
    tuber production compared to traditional beds and pots.
