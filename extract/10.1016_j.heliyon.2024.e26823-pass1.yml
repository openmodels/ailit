  14: "Source material here:\nAeroponics farming requires less water and no soil,\
    \ so it is a prudent option for promoting mini tuber production in challenging\
    \ potato cultivation environments, such as deserts, cold steep terrains, and coastal\
    \ regions. Mini potato tubers grown in an aeroponic system can either be transported\
    \ to an adjacent open field, or the technique can be utilized for crop production\
    \ in hostile environments. Aeroponics systems don't need fertile land to be installed,\
    \ and closer plant spacing is possible.\n\nTo follow tuber initiations, air temperature,\
    \ growth cycle, shoot development, and mini tuber output of both cultivars during\
    \ different seasons, electrical conductivities (1, 2, 3, and 4 dS m-1) and planting\
    \ densities (25, 44, 66, and 100 plants m-2) were evaluated.\n\nAeroponics farming\
    \ requires less water and no soil, so it is a prudent option for promoting mini\
    \ tuber production in challenging potato cultivation environments... Aeroponics\
    \ systems don't need fertile land to be installed, and closer plant spacing is\
    \ possible. This has led to the emergence of intriguing ideas about growing crops\
    \ on space stations, sailing ships, and extraterrestrial colonies... Both cultivars\
    \ had optimal ECs below 2.1 and 1.7 dS m-1, respectively. The selected cultivars\
    \ responded economically at 100 plants m-2.\n\nIt produces more flavonoids, phenolics,\
    \ and antioxidants than soil cultivation and minimizes the amount of water potato\
    \ plants need and ensures they get enough oxygen... However, the technology is\
    \ still in its infancy and has room for development. The system still requires\
    \ a good environment and appropriate techniques, and hence more elaborative research\
    \ is warranted. For example: \u2022 Optimizing nutrition solutions for various\
    \ potato cultivars. \u2022 Identifying the local nutrient source to reduce input\
    \ costs.\n"
  15: 'Source material here: As a result of hydroponics technology, it is possible
    to produce food crops in harsh environments such as hilly areas too high to cultivate,
    concrete school playgrounds, and arctic settlements. Beyond staple crops and vegetables,
    hydroponics may also produce specialty crops like salad leaves, spices, and ornamental
    plants in urban locations where land prices have replaced conventional farming
    [68]. Artificial lighting, agricultural plastics, and pest and disease-resistant
    cultivars will enhance crop yields and cut production unit costs. Since the hydroponics
    system utilizes only water and nutrient solution without the involvement of soil,
    any failure or problem in the nutrient distribution, water pump, or nozzle clogging
    will lead to rapid death of the growing plants. Waste heat from industry and power
    plants is now used in hydroponic greenhouses as an emerging trend to enhance energy
    efficiency [73].'
  16: '

    Drivers of Risk: It has been shown that nanoparticles can be used to reduce the
    impacts of temperature, salt, and drought stress on plants by enhancing their
    tolerance to these stresses [85].

    Methodology: Nanoparticles were utilized in hydroponics systems to accelerate
    the development of plants. The parameters of hydroponic solutions may be self-calibrated
    and managed using machine-learning algorithms based on sensor data [77]. The AI
    system directly delivers the nutrient solution, water, and light to plant roots
    using sensors.

    Highlights: It has been shown that nanoparticles can be used to reduce the impacts
    of temperature, salt, and drought stress on plants by enhancing their tolerance
    to these stresses [85]. Due to their large surface area and relevant reactivity,
    NPs offer the plant readily accessible nutrients by enhancing the soluble and
    available forms of nutrients [78]. Nutrient and light sensors are now used in
    artificial intelligence (AI)-assisted hydroponics [76].

    More Notes: Precision agriculture, a newer concept known as smart agriculture,
    uses cyber-physical techniques to combine information and communication technology
    (ICT) in all phases of the farm management cycle [74]. Benefits arising from this
    technology are relevant not only for soil but also for soilless systems.

