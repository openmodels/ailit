sourcematerial:
  1: Incremental improvements in reduction targets, even if achieved globally, are
    insufficient to align collective ambition with the goals of the Paris Agreement.
    [...] We find that incremental improvements in reduction targets [...] project
    a reduction in the gross domestic product (GDP) in tropical countries of around
    60% compared to a no-climate-change scenario and median long-term sea-level rise
    of close to 2m in 2300. [...] Our results underscore that a transformational increase
    in 2030 ambition is required to achieve the goals of the Paris Agreement and avoid
    the worst impacts of climate change.
  2: '

    Evaluation overview: '
  3: " \nQuantitative material: \n- \"2030 global emission levels based on the CAT\
    \ assessment of current pledges (53GtCO2eq., national emissions, excluding 'land\
    \ use, land-use change and forestry' (LULUCF), international aviation and shipping\
    \ emissions) and policies can be estimated.\"\n- \"2030 total GHG emission levels\
    \ implied by our reference scenario are 1.5GtCO2eq. lower than the 2018 CAT Pledges\
    \ & Targets pathway (Climate Action Tracker 2018).\"\n- \"Based on the pathway\
    \ extension, our 'current NDC' ambition reference scenario would lead to a median\
    \ global warming of 2.8\xB0C in 2100.\"\n- \"The 2018 CAT Pledges & Targets global\
    \ emission pathway (excluding international bunkers and LULUCF) would lead a temperature\
    \ increase of about 3\xB0C in 2100.\"\n- \"Specifically, we assume a 5%, 10%,\
    \ 25% and 33% reduction in global GHG emission levels below the current NDC reference\
    \ pathway by 2030.\"\n\nMethodology: \n- \"We modify the CAT scenario by assuming\
    \ for all countries that they will reach the lowest emissions level implied by\
    \ their current NDC targets.\"\n- \"This is done using the constant quantile extension\
    \ method (G\xFCtschow et al.,2018) that is based on the assumption that the relative\
    \ ambition level of climate policy is kept constant after the end of the NDC pathway.\"\
    \n- \"The constructed GHG emission pathways (following AR4 global warming potentials)\
    \ are then used to derive probabilistic projections for the global mean temperature\
    \ (GMT) with the reduced complexity carbon cycle and climate model MAGICC6 (Meinshausen\
    \ et al.,2011).\"\n\nHighlights: \n- \"A. Geiges et al.: Incremental improvements\
    \ of 2030 targets insufficient for Paris Agreement.\"\n  \nMore Notes: \n- \"\
    G20 countries sum up to 38.3GtCO2eq. and for CAT countries to 40.3GtCO2eq.(G\xFC\
    tschow et al.,2016).\"\n"
  4: 'Source material: It is important to stress that for this longer-term outlook,
    radiative forcing levels for the 22ndand23rdcenturies are held constant at 2100
    levels for all pathways, making the post-2100 model responses more stylised than
    for the 21st century. Global mean sea-level rise (GMSLR) projections are generatedwiththeMAGICCsea-levelmodel(Nauelsetal.,2017).
    For the period 1850 to 2300, the model emulates IPCC AR5 consistent process-based
    model projections for thermal expansion,glaciermassloss,GreenlandandAntarcticicesheet
    contributions,andalsoincludesalandwaterstorageestimate which is independent from
    the climate change signal. We present changes in hot extremes as land fraction
    distributions of changes in the intensity of the hottest day in a year(TXx),followingthemethodintroducedbyFischeretal.(2013).Thisanalysisisbasedonatime-slicingapproach:for
    each model, a 21-year time period is selected for which the averaged global warming
    corresponds to the end-of-century GMT increase given by the respective scenarios
    (see Table 1). Expressed in terms of the gross domestic product (GDP), economic
    damages are calculated based on the methodology byBurke et al.(2018). The method
    combines the estimatesobtainedfromthehistoricalrelationshipbetweenGDP growthandtemperaturevariabilityandprojectedfuturetemperaturechanges.
    However, to illustrate the relevance of these differences for a range of different
    climate impacts, we have chosen three exemplary impact indicators: a time-lagged
    response (long-term sea-level rise), an extreme event indicator (extreme hot days)
    and economic damages.'
  5: "\nEvaluation overview: \"Figure 3 shows the changes in the hottest day in a\
    \ year (TXx) with respect to 1986\u20132005 levels for each scenario globally\
    \ (lower left panel) and for regions used in IPCC reports...Figure 4 shows economic\
    \ damages for selected vulnerable regions, grouped into four categoriesbasedontheirgeographicalregionorlevelofdevelopment:LatinAmerica,SouthAsia,LeastDevelopedCountries(LDCs)\
    \ and Small Island Developing States (SIDS).\"\nDrivers of Risk: \"Figure 3 shows\
    \ the changes in the hottest day in a year...The global median increase of TXx\
    \ under this scenarioisprojectedtobe2.7\u25E6Cabovethe1986\u20132005level...most\
    \ countries and in particular those in tropical regions are projected to experience\
    \ economicdamagesfromtemperatureincreaseunderallemission scenarios.\"\nQuantitative\
    \ material: \"Under a 1.5\u25E6C scenario (around0.9\u25E6C abovethe 1986\u2013\
    2005 level),for 50%of the landarea TXx would increase by at least 1.1\u25E6C (compared\
    \ to current conditions).\"\nQuantitative material: \"For the BE33 scenario, half\
    \ of the land area would experience an increase in TXx of at least 1.8\u25E6C.\"\
    \nQuantitative material: \"The global median increase of TXx under this scenarioisprojectedtobe2.7\u25E6\
    Cabovethe1986\u20132005level.\"\nQuantitative material: \"Compared to a no-climate-change\
    \ scenario, the estimated medianreductioninGDPpercapitaaround2050forthefour countrygroupsrangesbetween11%and14%forthe1.5\u25E6\
    C pathway,between14%and17%fortheBE33scenario,and between17%and20%reductionforthebaselinepathwayof\
    \ thecurrentNDCs.\"\nQuantitative material: \"In 2100, the median projections\
    \ of damages to GDP per capita range between 29% and 34% for the 1.5\u25E6C pathway,\
    \ between 43% and 50% for the BE33 pathway...\"\nMethodology: \"Then we apply\
    \ the median downscaling factor of eachmodel(seeSupplementFig.S1)totheGMTdifferences\
    \ of the selected scenarios to get local changes in GMT...currentNDCreferencescenariosusedherewouldlead\
    \ to a warming reduction of about 0.2\u25E6C, implied by a reduction in 2030 GHG\
    \ emission levels of about 1.5GtCO2eq. compared to the 2018 CAT pathway.\"\nHighlights:\
    \ \"Under the NDC scenario, changes in TXx would be most pronounced...Compared\
    \ to a no-climate-change scenario, the estimated medianreductioninGDPpercapitaaround2050forthefour\
    \ countrygroupsrangesbetween11%and14%forthe1.5\u25E6C pathway,between14%and17%fortheBE33scenario,and\
    \ between17%and20%reductionforthebaselinepathwayof thecurrentNDCs.\"\n"
  6: "Source material: Figure 1. Historical and annual global greenhouse gas (GHG)\
    \ emission and global mean temperature (GMT) trajectories for the NDC reference\
    \ scenario and two NDC improvement scenarios... Table 1. Overview of the evaluated\
    \ scenarios, including details on projected global greenhouse gas emissions for\
    \ the year 2030 and the projected median increase in global mean temperature (GMT)\
    \ for the year 2100... All GHG estimates are provided relative to the 1850\u2013\
    1900 average... In line with the 1.5\u25E6C special report by Masson-Delmotte\
    \ et al.(2018), we find that such gradual improvements are insufficient to achieve\
    \ the 1.5\u25E6C limit, which would require 2030 GHG emission levels to be about\
    \ halved compared to current NDCs. As expected, more ambitious mitigation targets\
    \ for big emitters have the biggest effect on GMT and related impacts."
  7: "Table2.Selected climate impacts under different scenarios of mitigation ambition:\
    \ global mean sea-level rise, annual maximum temperature (TXx) increase and GDP\
    \ reductions for Least Developed Countries (LDCs). Differences in median sea-level\
    \ rise between a 1.5\u25E6C and NDC scenario in 2100 amount to about 20cm, as\
    \ much as the world has experienced over the observational period, which has already\
    \ contributed significantly to the occurrence of coastal flooding... For extreme\
    \ heat, we find a doubling in impacts between 1.5\u25E6C and NDC pathways. Median\
    \ global mean sea-level rise relative to 1986\u20132005; 2100: 64cm, 54cm, 45cm;\
    \ 2300: 190cm, 140cm, 100cm (for NDC, 33% ambition increase, 1.5\u25E6C scenarios\
    \ respectively). Median increase in annual maximum temperature (TXx) 2100: +2.7\u25E6\
    C, +1.8\u25E6C, +1.1\u25E6C (for NDC, 33% ambition increase, 1.5\u25E6C scenarios\
    \ respectively). Our findings are in line with other studies reporting substantial\
    \ impact reduction potential at 1.5\u25E6C compared to higher levels of warming...Even\
    \ if big emitters increase their ambition level by a third, this will only reduce\
    \ about half the inferred impacts including for sea-level rise, extreme temperatures,\
    \ and economic damages compared to what can be achieved by limiting warming to\
    \ 1.5\u25E6C."
