Quantitative material:
  1: 'The paper provides quantitative projections: GDP reduction in tropical countries
    around 60% compared to a no-climate-change scenario; median long-term sea-level
    rise close to 2m by 2300.'
  2: "The paper compares climate impacts under current NDCs and gradual reduction\
    \ pathways with a 1.5\xB0C pathway."
  3: Incremental NDC update scenarios assume 5%, 10%, 25% and 33% reduction in global
    GHG emission levels below the current NDC reference pathway by 2030.
  5: "In 2100, the median projections of damages to GDP per capita range between 29%\
    \ and 34% for the 1.5\xB0C pathway, between 43% and 50% for the BE33 pathway,\
    \ and no information is given for the NDC pathway."
  6: "Projects a median global mean temperature (GMT) increase for the year 2100 relative\
    \ to 1750 under various emission reduction scenarios, ranging from 1.75\xB0C to\
    \ 3.0\xB0C."
  7: "Projected median global mean sea-level rise by 2100 is 64 cm under NDC, 54 cm\
