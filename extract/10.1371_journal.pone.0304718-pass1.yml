  13: "Source material here. Future redistribution of fishery resources suggests biological\
    \ and economic trade-offs. Changes in abundance of species (e.g., snow crab, Greenland\
    \ halibut) due to reduction and shift in abundance of low-catch and high-economic\
    \ value species. Predicted future (2041\u20132060; 2081\u20132100) percent changes\
    \ in the cumulative maximum catch potential (MCP) under (a) SSP126, (b) SSP245,\
    \ and (c) SSP370, and (d) SSP585 for eight major fisheries relative to the present\
    \ (2000\u20132019). Analysis uses Shared Socioeconomic Pathways (SSPs) to predict\
    \ future changes in fisheries, comparing two time periods (2041-2060 and 2081-2100)\
    \ against a baseline (2000-2019); Overlain are the US-Russia EEZ boundary (dashed\
    \ line) and bathymetric contours (solid gray lines). Small abundance decline translated\
    \ to significant drops in MRP and MPP by about 37% and 47%, respectively; Differences\
    \ in MCP between major landing ports showed differences in abundance trends with\
    \ distance away from the ports; The contrasts between the averaged MCP relative\
    \ to the major landing ports in the EBS (Fig 5A), showed differences in abundance\
    \ trends with distance away from the ports (Fig 5B\u20135E). The US-Russia EEZ\
    \ boundary and bathymetric contours are displayed on the maps; SSP126 showed minimal\
    \ changes relative to SSP585 in Dutch Harbor; In Port of Nome, future MCPs were\
    \ generally higher than present-day under SSP126 and SSP585."
  14: "Source material: Percentage of change in the maximum catch potential (MCP),\
    \ maximum revenue potential (MRP), and maximum profit potential (MPP) relative\
    \ to present (2000\u20132019) across different time periods (2021\u20132100) and\
    \ contrasting shared socioeconomic pathways (SSPs) throughout the study area.\
    \ Projected changes in the global biomass of marine fauna are negatively related\
    \ to the warming levels, although, climate change and its impacts on species and\
    \ fisheries vary largely between regions and communities [66\u201368]. Our results\
    \ using updated CMIP6 projections of climate and productivity showed that fluctuations\
    \ in the abundance of our target species increased with the degree of future climate\
    \ change. A distinct contrast between the low (SSP126) and high (SSP585) future\
    \ climate scenarios, with significant and steep declines in the MRPs and MPPs\
    \ in the latter. Moreover, slight increases in MCP in response to shifting species\
    \ distributions in the US fishing ground during 2021\u20132040 and 2041\u2013\
    2060 under contrasting climate scenarios did not translate to increases in the\
    \ MRP and MPP. Between these fishing grounds, Russian waters further exhibited\
    \ higher declines in MCPs, MRPs, and MPPs relative to the US fishing ground under\
    \ SSP126 and SSP585."
  15: "plaintext\nFuture redistribution of fishery resources suggests biological and\
    \ economic trade-offs...The implementation of simple bioeconomic analyses to spatio-temporal\
    \ projections of species abundance provide pertinent insight into potential biological\
    \ and economic impacts of future climate change on major commercial fisheries\
    \ in the area. Projected increases in MCP in the NEBS and Chukchi Sea under the\
    \ extreme warming and sea ice loss scenario in 2081\u20132100, did not result\
    \ into significant increases in MRP and MPP. These findings suggest that future\
    \ changes in the catch composition can alter the potential economic benefits from\
    \ fisheries...Comparison of the future averaged MCPs with distance away from major\
    \ fishing and Arctic ports in the EBS under contrasting shared socioeconomic pathways,\
    \ revealed divergent patterns relative to the present. These changes are likely\
    \ to impact the future fishing fleet mobility.\n"
  16: "Source material here. Future redistribution of fishery resources suggests biological\
    \ and economic trade-offs [...] leading to potential losses and gains in port\
    \ landings of target species. [...] stresses the importance of fisheries management\
    \ in adapting to and mitigating the negative impacts of climate change. [...]\
    \ even for well-managed ecosystems such as the EBS, a high greenhouse gas emission\
    \ scenario could lead to serious economic impacts on fisheries, potentially from\
    \ the loss of high-value taxa. Notably, even at the present-day magnitudes of\
    \ warming and sea ice loss, we have already witnessed instances of population\
    \ shifts and declines.\nSpatial distribution of aggregated fishing effort from\
    \ 2012\u20132020, overlain with present-day fishing grounds (fishing hour \uFFFD\
    1000 hrs). [...] differences between present (2000\u20132019) and future (2021\u2013\
    2100) maximum catch (circles), revenue (triangles), and profit (squares) potential\
    \ for all species under [...] SSP126 and [...] SSP585 in the US (magenta shapes\
    \ and lines) and Russian (blue shapes and lines) fishing grounds, respectively.\n\
    It also raises the need for the fishing industry to consider the trade-offs of\
    \ longer transit times between fishing grounds and ports with processing facilities.\n"
  17: 'yaml

    "Evaluation overview": "Future redistribution of fishery resources suggests biological
    and economic trade-offs."

    "Drivers of Risk": "This raises potential issues for governance and management
    of transboundary fish stocks and elevated risks of fisheries conflicts under continuing
    climatic changes. For instance, the movement of fish stocks/populations out of
    their traditional fishing grounds can be challenging for resource managers and
    stakeholders."

    "Methodology": "Our scenario-based projections of climate changes in the potential
    availability of major commercially-exploited fisheries in the EBS and Chukchi
    Sea provided an outlook into future climate change impacts. Abundances predicted
    by machine learning models were taken to represent species-specific biomass used
    for deriving biological estimates of fishable biomass."

    "Highlights": "With projected MCP increases in NEBS and Chukchi Sea, future MRPs
    close to the major Arctic port showed potential increases above present levels.
    With anticipated increase in species abundance in the region, northern ports may
    become increasingly important for local fishing communities. Our analyses also
    highlight the future significance of shifting marine fisheries resources between
    the US and Russian EEZ. From an ecological perspective, this could lead to elevated
    resource and space competition, increased predation pressures, density-dependent
    population changes, overfishing of less productive taxa and increased by-catch
    of non-target species with increasing fishing ground overlaps."

