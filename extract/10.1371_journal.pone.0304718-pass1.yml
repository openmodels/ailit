sourcematerial:
  1: "Source material here: Climatechange is anticipated to have long-term and pervasive\
    \ effects on marine ecosystems, with cascading consequences to many ocean-reliant\
    \ sectors. For the marine fisheries sector, these impacts can be further influenced\
    \ by future socio-economic and political factors. This raises the need for robust\
    \ projections to capture the range of potential biological and economic risks\
    \ and opportunities posed by climate change to marine fisheries. Here, we project\
    \ future changes in the abundance of eight commercially important fish and crab\
    \ species in the eastern Bering Sea and Chukchi Sea under different CMIP6 Shared\
    \ Socio-economic Pathways (SSPs) leading to contrasting future (2021\u20132100)\
    \ scenarios of warming, sea ice concentration, and net primary production. Our\
    \ results revealed contrasting patterns of abundance and distribution changes\
    \ across species, time periods and climate scenarios, highlighting potential winners\
    \ and losers under future climate change. In particular, the least changes in\
    \ future species abundance and distribution were observed under SSP126. However,\
    \ under the extreme scenario (SSP585), projected Pacific cod and snow crab abundances\
    \ increased and decreased, respectively, with concurrent zonal and meridional\
    \ future shifts in their centers of gravity. Importantly, projected changes in\
    \ species abundance suggest that fishing at the same distance from the current\
    \ major port in the Bering Sea (i.e., Dutch Harbor) could yield declining catches\
    \ for highly valuable fisheries (e.g., Pacific cod and snow crab) under SSP585.\
    \ This is driven by strong decreases in future catches of highly valuable species\
    \ despite minimal declines in maximum catch potential, which are dominated by\
    \ less valuable taxa. Hence, our findings show that projected changes in abundance\
    \ and shifting distributions could have important biological and economic impacts\
    \ on the productivity of commercial and subsistence fisheries in the eastern Bering\
    \ and Chukchi seas, with potential implications for the effective management of\
    \ trans-boundary resources.\"\n"
  2: 'Source material here.

    - Evaluation overview: "The main goal of this work is to examine changes in the
    projected abundance of a subset of commercially-important marine fish and invertebrate
    species in the eastern Bering Sea and Chukchi Sea using future climate and ocean
    productivity projections under four alternative Shared Socioeconomic Pathways
    (SSP) from the state-of-the-art climate models of the Coupled Model Intercomparison
    Project 6 (CMIP6)."

    - Drivers of Risk: "These oceanographic changes contributed to fluctuations in
    the abundance and distribution of commercially-important fisheries in these waters."

    - Quantitative material: "In 2020, the global capture fisheries production had
    an approximate value of 141 billion USD and provided 390 million livelihoods depending,
    at least partially, on this fisheries sector."

    - Quantitative material: "Alaska fisheries harvests accounted for 60.26% of the
    total US commercial harvests and 32.09% of the US ex-vessel value in 2020."

    - Methodology: "Here, we adopt a bioeconomic model analysis to assess species-specific
    abundance changes of major fisheries resources in the Pacific Arctic..."

    - Methodology: "... using future climate and ocean productivity projections under
    four alternative Shared Socioeconomic Pathways (SSP) from the state-of-the-art
    climate models of the Coupled Model Intercomparison Project 6 (CMIP6)."

    - Highlights: "Despite the effective management and extensive monitoring that
    are currently in place for these waters, climate change has resulted in ecological
    surprises such as the recent collapse of valuable fisheries resources (e.g. snow
    crab and Pacific cod), resulting in significant loss of livelihoods and revenue
    streams."

