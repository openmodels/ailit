Drivers of Risk:
  1: Warming, sea ice concentration, and net primary production under different CMIP6
    Shared Socio-economic Pathways (SSPs).
  2: The drivers of risk are future climate and ocean productivity projections under
    four alternative Shared Socioeconomic Pathways (SSP) from the CMIP6 climate models,
    thermal and sea ice conditions, and primary productivity fluctuations.
  3: Changes in winter sea surface temperature (WSST), winter sea ice concentration
    (WSIC), winter sea bottom temperature (WSBT), summer sea bottom temperature (SSBT),
    and summer net primary production (SNPP) driven by climate change.
  4: Ongoing and anticipated climate and productivity changes are the key drivers
    impacting species abundance outcomes.
  5: Changes in fish biomass in response to future climate fluctuations and primary
    productivity are considered.
  6: The analysis uses projected abundance changes from ensemble models as a driver
    of risk in fisheries.
  7: Changes in fish distribution and abundance are assessed in relation to different
    Shared Socioeconomic Pathways (SSPs).
  8: Significant sea ice loss, warming of winter sea bottom and surface temperatures,
    and changes in primary production are identified as impactful changes.
  9: Summer sea bottom temperature (SSBT), winter sea bottom temperature (WSBT), winter
    sea surface temperature (WSST), winter sea ice concentration (WSIC), and summer
    net primary production (SNPP).
  10: SSP126, SSP245, SSP370, and SSP585 scenarios are used to model future abundance.
  11: Future redistribution of fishery resources driven by various socio-economic
    scenarios (SSPs) and climate change.
  12: Future distribution changes are influenced by climate scenario SSP585, implying
    increased marine temperatures and related ecological shifts.
  13: Changes in abundance of species (e.g., snow crab, Greenland halibut)
  14: The primary driver of risk is future climate change, specifically as represented
    by different Shared Socioeconomic Pathways (SSPs) and their impacts on biophysical
    variables like sea surface and bottom temperatures, sea ice concentration, and
    primary production. Shifting species distributions also contribute.
  15: Future climate change impacts such as extreme warming and sea ice loss affect
    the distribution and abundance of fishery resources.
  16: Shifting fish abundance in response to climate change; greenhouse gas emission
    scenario.
  17: Risks come from the redistribution of fish stocks due to climate changes, including
    temperature shifts and sea ice decline.
  18: Climate-driven changes in species abundance are a primary driver, influenced
    by future climate and socioeconomic pathways. Ocean net primary production (NPP)
    is a key factor, but projections have persistent regional uncertainties.
  20: Cold and warm stanzas (Lomas et al., 2020), future climate (Alabia et al., 2020),
    recent climate (Alabia et al., 2023), contemporary climate changes (Alabia et
    al., 2018)
  21: climate change
Evaluation overview:
  1: Changes in abundance of eight commercially important fish and crab species in
    the eastern Bering Sea and Chukchi Sea.
  2: This study evaluates changes in the abundance of commercially-important marine
    fish and invertebrate species, maximum catch, revenue, and abundance changes.
  3: Future redistribution of fishery resources suggesting biological and economic
    trade-offs in the Bering Sea-Aleutian Islands area.
  4: The paper focuses on predicting the present and projected future patterns of
    species abundance in response to ongoing and anticipated climate and productivity
    changes.
  5: The analysis evaluates changes in fish species abundance and maximum sustainable
    yield (MSY) due to climate-driven changes in biomass.
  6: The study evaluates the potential redistribution of fishery resources and assesses
    the economic impacts of abundance changes in fisheries.
  7: The paper evaluates potential biological and economic impacts of future redistribution
    of fishery resources.
  8: This page evaluates the redistribution of fishery resources in the Eastern Bering
    Sea between the US and Russian waters, exploring bioeconomic changes and their
    impacts on fishing fleet dynamics.
  9: Redistribution of fishery resources suggests biological and economic trade-offs.
  10: Future redistribution of fishery resources suggests biological and economic
    trade-offs.
  12: The paper evaluates changes in fish species abundance and potential catch distribution
    under future climate scenarios, focusing on productivity and economic implications.
  13: Future redistribution of fishery resources suggests biological and economic
    trade-offs.
  14: This paper evaluates changes in maximum catch potential (MCP), maximum revenue
    potential (MRP), and maximum profit potential (MPP) for fisheries.
  15: The paper evaluates future biological and economic impacts on major commercial
    fisheries in the Eastern Bering Sea and Chukchi Sea under different climate scenarios.
  16: Fishery resource redistribution suggests biological and economic trade-offs;
    evaluates changes in maximum catch, revenue, and profit potential for all species.
  17: The page discusses projected shifts in fishery resources and potential biological
    and economic trade-offs due to climate changes in the NEBS and Chukchi Sea.
  18: Future redistribution of fishery resources suggests biological and economic
    trade-offs, with changes in maximum catch, revenue, and profit potential.
  20: Future redistribution of fishery resources suggests biological and economic
    trade-offs.
  21: Future redistribution of fishery resources suggests biological and economic
    trade-offs
Highlights:
  1: Contrasting patterns of abundance and distribution changes across species, time
    periods, and climate scenarios, highlighting potential winners and losers.
  2: Climate change has resulted in ecological surprises such as the recent collapse
    of valuable fisheries resources (e.g. snow crab and Pacific cod), resulting in
    significant loss of livelihoods and revenue streams.
  4: Optimal hyperparameters are determined for RF and BRT models to enhance model
    complexity and performance in predicting species abundance.
  6: The study computes revenue and profit for each species and for all species combined
    to assess the economic impacts of potential abundance changes. It uses Maximum
    Catch Potential as a proxy for MSY.
  7: The sensitivity analysis suggests that findings are robust across different assumptions
    regarding costs and prices over time.
  8: The cold pool feature in the Bering Sea is projected to decline and disappear,
    with significant northward shifts in species COGs and increased overlap in peak
    abundance areas within present-day fishing grounds in both US and Russian waters.
  9: Visualization of potential impact of climate change on oceanographic factors
    in the northeast Pacific Ocean throughout the 21st century under a high-emission
    scenario.
  10: 'Maps visualize projected shifts in distribution for several fish species: Arrowtooth
    flounder, Atka mackerel, Flathead sole, Walleye pollock, Yellowfin sole across
    different emissions scenarios and time periods.'
  11: Significant spatial and abundance changes in fishery species across different
    SSPs, with the potential for abundance declines or shifts in high economic value
    species under SSP585.
  12: Significant projected increase in fish abundance in the Chukchi Sea; increases
    mainly involve low economic value species like yellowfin sole and walleye pollock.
  13: Small abundance decline translated to significant drops in MRP and MPP by about
    37% and 47%, respectively; Differences in MCP between major landing ports showed
    differences in abundance trends with distance away from the ports.
  14: Significant and steep declines in MRPs and MPPs are projected under high emission
    scenarios (SSP585). Slight increases in MCP in the near term (2021-2040 and 2041-2060)
    do not translate to increased MRP and MPP.
  15: Climate change may lead to alterations in catch composition and economic benefits
    from fisheries; projected increases in MCP did not result in significant increases
    in MRP and MPP.
  16: Even for well-managed ecosystems like the EBS, a high greenhouse gas emission
    scenario could lead to serious economic impacts on fisheries; Even at present-day
    magnitudes of warming and sea ice loss, instances of population shifts and declines
    have been witnessed.
  17: The projected increase in importance of northern ports for local fishing communities
    and the challenges of governing and managing transboundary fish stocks are highlighted;
    shifts in fish species may lead to increased competition and potential overfishing.
  18: "For well-managed marine ecosystems such as the EBS, the effects of climate\
    \ change can have limited economic impact in the near-term (2021\u20132040) under\
    \ low to moderate levels of climatic changes. Mitigation and conservation efforts\
    \ may require changes in current strategies to ameliorate negative impacts on\
    \ fisheries as climate change approaches extreme conditions."
  20: "Distributions shifts of marine taxa in the Pacific Arctic under contemporary\
    \ climate changes (Alabia et al., 2018); Marine biodiversity refugia in a climate-sensitive\
    \ subarctic shelf (Alabia et al., 2021); Bottom trawl surveys in the northern\
    \ Bering Sea indicate recent shifts in the distribution of marine species (Stevenson\
    \ & Lauth, 2019); Realistic fisheries management reforms could mitigate the impacts\
    \ of climate change in most countries (Free et al., 2020); Rebuilding fish biomass\
    \ for the world\u2019s marine ecoregions under climate change (Cheung et al.,\
    \ 2022)"
  21: Large-scale redistribution of maximum fisheries catch potential in the global
    ocean under climate change.
Methodology:
  1: Projections of future changes in abundance and distribution of species under
    different CMIP6 SSPs from 2021-2100.
  2: The study adopts a bioeconomic model analysis. It uses future climate and ocean
    productivity projections under four alternative Shared Socioeconomic Pathways
    (SSP) from the CMIP6 climate models.
  3: "Uses present-day climate data (2000-2019) at 0.25\u02DA x 0.25\u02DA spatial\
    \ resolution from online repositories. Future climate layers are calculated from\
    \ down-scaled CMIP6 Global Climate Models (GCMs; CESM2-WACCM, CNRM-ESM2-1, IPSL-CM6ALR,\
    \ and MPI-ESM1.2HR) under four Shared Socio-economic Pathways (SSP126, SSP245,\
    \ SSP370, and SSP585) for the time period 2021-2100. A delta method is implemented\
    \ for spatial data downscaling of future climate layers."
  4: The analysis uses machine learning algorithms, specifically random forest (RF)
    and boosted regression trees (BRT), to predict species abundance based on climate
    layers and other data. These models are trained and evaluated using species observations.
  5: The study uses ensemble model predictions for fish species abundance under four
    shared socio-economic pathways (SSP126, SSP245, SSP370, SSP585) for future projections
    (2021-2100).
  6: The study computes Maximum Sustainable Yield (MSY) using a Pella-Tomlinson yield
    curve and Maximum Catch Potential (MCP) using species biomass and reference exploitation
    rates. It assumes constant prices and costs over time, acknowledging this is a
    limitation. Data timeframes for species varied from 36-61 years (1949-2013).
  7: The analysis uses a bioeconomic model to derive potential changes in fishery
    profits and biomass, considering different price and cost scenarios over time.
  8: The analysis utilizes spatial distributions of physical and biogeochemical variables
    and species-specific abundance models to project changes under different climate
    scenarios, using data from 2000-2019.
  9: Future projections (2021-2100) are modeled under the SSP585 scenario.
  10: 'Trajectories of abundance-weighted center of gravity (COG) are computed throughout
    the basin separated by land masses. Species abundance is modeled. '
  11: "Analysis of species-specific rates of shifts in abundance-weighted center of\
    \ gravity relative to the present (2000\u20132019) under different shared socio-economic\
    \ pathways (SSPs)."
  12: "Analysis involves projecting spatial distributions of fish species abundance\
    \ for current (2000\u20132019) and future (2041\u20132060; 2081\u20132100) periods\
    \ under SSP scenarios."
  13: Analysis uses Shared Socioeconomic Pathways (SSPs) to predict future changes
    in fisheries, comparing two time periods (2041-2060 and 2081-2100) against a baseline
    (2000-2019).
  14: The analysis uses CMIP6 climate projections and productivity models to project
    future changes in fishery resources. The results are applicable to the study area
    specified in the larger paper (not included in this page).
  15: Spatio-temporal projections of species abundance and bioeconomic analyses provide
    insights into biological and economic impacts over future periods between 2021
    and 2100.
  16: Analyses used fishing mortality rates at healthy levels. Results are applicable
    to US and Russian fishing grounds, specifically in the Bering Sea. Assesses scenarios
    SSP126 and SSP585.
  17: Scenario-based projections using machine learning models predict changes in
    fish species abundance and distribution under future climate scenarios.
  20: Species distribution models (Laman et al., 2017), integrated species distribution
    models (Paradinas et al., 2023), Geostatistical delta-generalized linear mixed
    models (Thorson et al., 2015), Standardizing catch and effort data (Maunder &
    Punt, 2004)
  21: Global models
More Notes:
  1: Projected changes in species abundance and shifting distributions could have
    important biological and economic impacts on the productivity of commercial and
    subsistence fisheries.
  3: The analysis focuses on the Bering and Chukchi Seas.
  4: Species-specific models are tuned using specific packages such as the 'ranger'
    package for RF models and the 'gbm' package for BRT models in the R software environment.
  6: The analysis standardizes exploitation rates at MSY to a common baseline year
    (2012) and assumes these rates remain constant in the future.
  7: Projected changes are specifically evaluated within the US territorial waters
    of the Eastern Bering and Chukchi seas.
  9: "The cold pool feature (SSBT < 2\u02DAC) and bathymetric contours are overlaid\
    \ on the summer sea bottom temperature map."
  10: The study focuses on the Bering Sea, Alaska and Siberia.
  12: Maps visually support findings by showing abundance changes across different
    coasts and time periods under SSP585.
  13: The US-Russia EEZ boundary and bathymetric contours are displayed on the maps;
    SSP126 showed minimal changes relative to SSP585 in Dutch Harbor; In Port of Nome,
    future MCPs were generally higher than present-day under SSP126 and SSP585.
  14: The paper notes contrasting bioeconomic trends and patterns between US and Russian
    fishing grounds, with Russian waters exhibiting higher declines in MCPs, MRPs,
    and MPPs under SSP126 and SSP585.
  16: Longer transit times between fishing grounds and ports with processing facilities
    should be considered.
  18: The paper acknowledges limitations due to uncertainties in projecting biological
    parameters, inherent structural uncertainties in Earth System Model outputs, and
    the dynamic nature of economic parameters. It highlights the need for forward-looking
    and climate-smart solutions to manage and conserve fisheries resources.
Quantitative material:
  1: Projected changes in species abundance under different SSPs (SSP126 and SSP585
    specifically mentioned).
  2: Alaska fisheries harvests accounted for 60.26% of the total US commercial harvests
    and 32.09% of the US ex-vessel value in 2020. In 2020, the global capture fisheries
    production had an approximate value of 141 billion USD and provided 390 million
    livelihoods.
  3: Uses data on abundance of eight commercially-important species that account for
    over 65% of the total landings in the Bering Sea-Aleutian Islands between 2000
    and 2019.
  6: "The study calculates Maximum Catch Potential (MCP), revenue (R), and profit\
    \ (\u03C0) for different species, using equations provided in the text. It uses\
    \ a scaling parameter (\u03B3) of 0.188 for groundfish and -0.093 for snow crab\
    \ in the BSAI."
  7: The study computes future percent changes in total Maximum Catch Potential (MCP),
    Maximum Revenue Potential (MRP), and Maximum Profit Potential (MPP) relative to
    the present.
  8: Species centers of gravity (COGs) are projected to shift, with the highest shift
    rate (>80 km/decade) for Greenland halibut under SSP585 and lowest (31.64 km/decade)
    for walleye pollock.
  9: Maps depict projected changes in SST, heat content, salinity, oxygen, pH, nutrient
    concentration, and primary production between present (2000-2019) and future (2021-2100)
    periods.
  10: "Maps show abundance-weighted center of gravity for eight commercial species\
    \ from the present (2000\u20132019) to future periods (2021\u20132100)."
  11: "Species-specific rates of the shift in the abundance-weighted center of gravity\
    \ (COG) are provided for different time periods (2021\u20132100) across various\
    \ SSPs."
  12: Maximum catch potential shows scenario-dependent variations, with lowest increases
    under SSP126 and highest under SSP585; specific percentage increase or decrease
    is described, e.g., MCP decreases minimally by 4.22% during late-century under
    SSP585.
  13: "Predicted future (2041\u20132060; 2081\u20132100) percent changes in the cumulative\
    \ maximum catch potential (MCP) under (a) SSP126, (b) SSP245, and (c) SSP370,\
    \ and (d) SSP585 for eight major fisheries relative to the present (2000\u2013\
    2019)."
  14: The table shows the percentage of change in MCP, MRP, and MPP relative to present
    (2000-2019) across different time periods (2021-2040, 2041-2060, 2061-2080, 2081-2100)
    for SSP126, SSP245, SSP370, and SSP585. Generally, MRP and MPP decline over time
    under all scenarios, while MCP changes are more variable.
  15: Graphs show trends of Net Community Production (NCP) and Water Column Production
    (WCP) across different distances from major ports in Alaska under SSP126 and SSP585
    scenarios.
  16: "Spatial distribution of aggregated fishing effort from 2012\u20132020; differences\
    \ between present (2000\u20132019) and future (2021\u20132100) maximum catch,\
    \ revenue, and profit potential (%); fishing hour (log_10 change)."
  18: Mentions analyses on future abundance projections under contrasting time periods
    and climate scenarios (Supporting Information S1 File).
