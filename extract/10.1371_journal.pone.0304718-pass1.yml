    \ trade-offs...explored the bioeconomic changes between the present-day fishing\
    \ grounds within the US and Russian waters of the Eastern Bering Sea to examine\
    \ the potential impact of future shifts of marine resources to fishing fleet dynamics....\
    \ significant sea ice loss and warming in the EBS under the extreme shared socio-economic\
    \ pathway (SSP585; Fig 1 and S8 Table in S1 File).... the highest rates of shift\
    \ in the COG of abundance relative to the present (2000\u20132019) are projected\
    \ for the late-century (2076\u20132100) period under the SSP585 scenario for the\
    \ Greenland halibut (> 80 km/decade), and the lowest for the walleye pollock (31.64\
    \ km/decade; Table 1).... Spatial distributions of physical and biogeochemical\
