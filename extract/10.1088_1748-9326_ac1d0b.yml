  28: 'Drivers of Risk: "we find strongly positive changes over the tropics, especially
    over Amazonia, whilst we see little increases in variability over Europe." Quantitative
    material: "The local change between the two time periods is shown in percentages."
    Methodology: "To find the level of interannual variability per region, we apply
    a land-sea mask to the coarse HadCRUT4 grid, followed by multiplying with the
    cosine of the latitude... A 30-year running window is used for linear detrending
    to remove the global warming signal." Highlights: "we find strongly positive changes
    over the tropics, especially over Amazonia" Source material: Contrary to Huntingford
    et al (2013), we find strongly positive changes over the tropics, especially over
    Amazonia, whilst we see little increases in variability over Europe. To find the
    level of interannual variability per region, we apply a land-sea mask to the coarse
    HadCRUT4 grid, followed by multiplying with the cosine of the latitude. Consequently,
    annual mean temperatures are calculated for the PAGE-ICE regions by spatial aggregation.
    A 30-year running window is used for linear detrending to remove the global warming
    signal, before the standard deviation is calculated over that 30 year window.
    The local change between the two time periods is shown in percentages.'
