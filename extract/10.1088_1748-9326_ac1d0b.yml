Quantitative material:
  2: PAGE-ICE yields SCCO2 values about two times higher than PAGE09.
  3: The PAGE-ICE model quantifies the effect on the social cost of CO2 (SCCO2), extending
    the model to include long-term temperature growth feedback and permafrost carbon
    and surface albedo feedbacks.
  4: "The paper uses a 75Gt pulse size in the first time period of PAGE-ICE (mid-2017\u2013\
    2025), representing an annual pulse size of 10GtCO2. Equity weighting uses a mean\
    \ (minimum, maximum) elasticity of marginal utility of consumption of 1.17(0.1\u2013\
    2.0), and a pure time preference rate of 1.03%(0.5%, 2.0%). It relies on 50000\
    \ Monte Carlo draws."
  6: "The mean SCCO2 from PAGE09 is $158. Updating to AR5 parameters increases the\
    \ mean SCCO2 to $217. Applying a fat-tailed distribution to sea-level rise increases\
    \ mean SCCO2 to $228. The permafrost feedback increases it to $244. Modeling non-linear\
    \ transitions in the sea ice and land snow albedo feedback slightly reduces the\
    \ SCCO2 to $239. Reducing the size, threshold, and lag of discontinuity impacts\
    \ reduces the mean SCCO2 to $213. A longer simulation period (until 2300) increases\
    \ the mean SCCO2 to $239. Updating baseline income levels to those observed in\
    \ 2015 increases mean SCCO2 to $245. Adjusting regional vulnerability increases\
    \ the mean SCCO2 to $281. Changing damages to empirical estimates results in a\
    \ final mean SCCO2 for PAGE-ICE of $307 per tonne. Uncertainty range is $147\u2013\
    $349 (interquartile) and $82\u2013$831 (5%-95%). The SSP2-4.5 scenario increases\
    \ the SCCO2, with PAGE-ICE having a mean SCCO2 that is double the value for PAGE09."
  7: Mean global GDP in 2100 is 30% lower than the SSP2-4.5 growth path without persistence.
  9: Quantitative results on projected current damages in 2100 are expressed as a
    percentage of GDP, and SCCO2 values are generated from model simulations.
