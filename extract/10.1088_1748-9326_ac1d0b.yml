  32: "The study correlates model errors across regions using four different models:\
    \ Raw Temperatures, LOESS-only Model (regressing region temperatures on smoothed\
    \ GMST), AR-only Model (regressing region temperatures on delayed temperatures),\
    \ and Full AR Model (including both regressors). The correlation is measured using\
    \ the Pearson correlation of the residuals.\nEach subplot also reports the median\
    \ variance of the model errors (\u2018Var(e)\u2019) across regions, and the median\
    \ absolute value of the correlation of all off-diagonal correlations (\u2018|cor|\u2019\
    ).\nThe \u2018Raw Temperatures\u2019 subplot treats all variation in temperatures\
    \ as model error; the \u2018LOESS-only Model\u2019 subplot regresses region temperatures\
    \ on a smoothed GMST; the \u2018AR-only Model\u2019 subplot regressions region\
    \ temperatures on delayed temperatures; and the \u2018Full AR Model\u2019 includes\
    \ both regressors.\n"
