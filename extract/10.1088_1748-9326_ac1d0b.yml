sourcematerial:
  2: "The social cost of carbon dioxide under climate-economy feedbacks and temperature\
    \ variability Abstract A key statistic describing climate change impacts is the\
    \ \u2018social cost of carbon dioxide\u2019 (SCCO2), the projected cost to society\
    \ of releasing an additional tonne of CO2. Cost-benefit integrated assessment\
    \ models that estimate the SCCO2 lack robust representations of climate feedbacks,\
    \ economy feedbacks, and climate extremes. We compare the PAGE-ICE model with\
    \ the decade older PAGE09 and find that PAGE-ICE yields SCCO2 values about two\
    \ times higher, because of its climate and economic updates. Climate feedbacks\
    \ only account for a relatively minor increase compared to other updates. Extending\
    \ PAGE-ICE with economy feedbacks demonstrates a manifold increase in the SCCO2\
    \ resulting from an empirically derived estimate of partially persistent economic\
    \ damages. Both the economy feedbacks and other increases since PAGE09 are almost\
    \ entirely due to higher damages in the Global South. Including an estimate of\
    \ interannual temperature variability increases the width of the SCCO2 distribution,\
    \ with particularly strong effects in the tails and a slight increase in the mean\
    \ SCCO2. Our results highlight the large impacts of climate change if future adaptation\
    \ does not exceed historical trends."
  3: " \nEvaluation overview: \"How temperature rises affect long-run economic output\
    \ is an important open question.\"\n\nDrivers of Risk: \"Climatic extremes are\
    \ another particularly important driver of climate change-induced damages.\"\n\
    \nQuantitative material: \"In summary, we extend the PAGE-ICE CB-IAM (Yumashev\
    \ et al 2019) to quantify the effect on the SCCO2 of including possible long-term\
    \ temperature growth feedback on economic trajectories, mean annual temperature\
    \ anomalies, and the already modeled permafrost carbon and surface albedo feedbacks.\"\
    \n\nMethodology: \"The PAGE-ICE model (Yumashev et al 2019) simulates climatic\
    \ and economic developments between 2020 and 2300 in eight aggregated regions\
    \ and extends PAGE09, building on a decade of scientific progress through improved\
    \ representations of climatic processes and economic damages.\"\n\nHighlights:\
    \ \"Increasing the amount of uncertainty by adding variable elements naturally\
    \ leads to a less constrained estimate for climate-driven impacts.\"\n"
  4: "Source material here.\nThis paper evaluates the marginal damage of an additional\
    \ tonne of CO2 as the Social Cost of Carbon (SCCO2): \"To estimate the marginal\
    \ damage of an additional tonne of CO2, PAGE-ICE is run twice, with one run following\
    \ the exogenously specified emission pathway and the second run adding a CO2 pulse.\
    \ The SCCO2 is then calculated as the difference in global equity-weighted damages\
    \ between those two runs divided by the pulse size, discounted to the base year\
    \ (2015).\"\n\nDrivers of risk include greenhouse gas emissions and feedbacks:\
    \ \"PAGE-ICE models temperature responses and greenhouse gas cycles including\
    \ feedbacks for six emissions classes (CO2, CH4, N2O, linear gases, sulphates,\
    \ and a residual group for other greenhouse gas emissions).\"\n\nQuantitative\
    \ parameters in the analysis: \"Equity weighting of damages follows the approach\
    \ by Anthoff et al (2009a) using a mean (minimum, maximum) elasticity of marginal\
    \ utility of consumption of 1.17(0.1\u20132.0), and equity-weighted damages are\
    \ discounted using a pure time preference rate of 1.03%(0.5%,2.0%).\"\n\nMethodology\
    \ using Monte Carlo sampling and scenario analysis: \"Our setup recognizes that\
    \ deterministic assessments of the SCCO2 carry only very limited information.\
    \ PAGE-ICE uses Monte Carlo sampling of over 150 parameter distributions to provide\
    \ distributions of the results. All results presented use 50000 Monte Carlo draws...\"\
    \n\nHighlights of updates and additions to the PAGE-ICE model: \"PAGE-ICE includes\
    \ a more detailed representation of CO2 and CH4 sinks, permafrost carbon feedback,\
    \ the effect of sea ice and land snow decline on surface albedo, and a fat-tailed\
    \ distribution of sea level rise.\"\n\nSensitivity of SCCO2 to various factors:\
    \ \"In this setup, we found that the choice of pulse size can have an effect on\
    \ the SCCO2 estimates, and we explore these sensitivities in appendix A.2...\"\
    \n"
