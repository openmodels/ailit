Drivers of Risk:
  2: The paper examines the impacts of climate feedbacks, economy feedbacks, and climate
    extremes, and also includes an estimate of interannual temperature variability.
  3: Climatic extremes such as interannual climate variability, weather extremes including
    temperature minima and maxima, extreme rainfall, and floods are considered as
    drivers of climate change-induced damages.
  4: The primary drivers of risk are CO2, CH4, N2O, linear gases, sulphates, and a
    residual group of other greenhouse gas emissions, which influence global temperatures
    and subsequently lead to economic damages, sea-level rise, and other impacts.
    Permafrost feedback, sea ice and land snow decline affecting surface albedo, and
    temperature variability also contribute.
  6: Climate feedbacks (permafrost, sea ice and land snow albedo), sea-level rise,
