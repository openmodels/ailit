Evaluation overview:
  2: The paper evaluates the social cost of carbon dioxide (SCCO2), which represents
    the total welfare loss due to an extra emitted tonne of CO2.
  3: The paper evaluates how temperature rises affect long-term economic output, considering
    both increased productivity and inhibited growth.
  4: The paper evaluates the marginal damage of an additional tonne of CO2, expressed
    as the Social Cost of Carbon (SCCO2), and also examines economic damages due to
    rising temperatures.
  6: The page evaluates the Social Cost of Carbon Dioxide (SCCO2) in 2020, expressed
    in $2015 USD.
  7: Assesses economic impacts on global GDP and regional economies due to climate
    impact persistence.
  9: The paper evaluates how interannual temperature variability affects climate damages
    and the social cost of carbon (SCCO2) under different scenarios.
  10: Economic damages, GDP growth
  13: Impact of parameter changes on the 2020 Social Cost of CO2 (SCCO2) based on
    the PAGE-ICE model.
  16: The paper evaluates the Social Cost of Carbon Dioxide (SCCO2).
  20: This page evaluates GDP per capita growth in response to temperature change.
  24: The study evaluates GDP per capita growth with respect to temperature impacts
    in countries with GDP per capita below the median.
  25: The analysis evaluates GDP per capita growth in relation to temperature changes
    and damages.
  26: Effects of temperature and its squared value on GDP per capita growth are being
