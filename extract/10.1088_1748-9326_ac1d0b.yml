Highlights:
  2: Climate feedbacks account for a relatively minor increase in SCCO2 compared to
    other updates. Economy feedbacks demonstrate a manifold increase in the SCCO2.
    Higher damages in the Global South contribute significantly to the increases since
    PAGE09 and due to economy feedbacks. Interannual temperature variability increases
    the width of the SCCO2 distribution.
  3: Inclusion of interannual climate variability into models shows potential for
    less constrained estimates of climate-driven impacts.
  4: The PAGE-ICE model has been updated to include a more detailed representation
    of CO2 and CH4 sinks, permafrost carbon feedback, the effect of sea ice and land
    snow decline on surface albedo, and a fat-tailed distribution of sea-level rise.
    It also includes interannual temperature variability. Market damages are now calculated
    based on absolute temperature, and the model includes the possibility of persistent
    climate-induced damages.
  6: The mean SCCO2 in 2020 from the previous version of the model, PAGE09, is $158.
    The final mean SCCO2 for PAGE-ICE is calculated as $307 per tonne. Increased social
    costs are almost entirely attributable to the Global South. Introducing empirically
    derived levels of damage persistence affects both the size of global GDP and its
    regional distribution.
  7: High persistence levels result in economic contraction in Global South, and a
    fifteenfold increase in the mean social cost of carbon (SCCO2) with 10% persistence.
  9: Interannual temperature variability increases the tails of SCCO2 distributions,
    potentially leading to higher or lower SCCO2 values.
  10: 'Damage persistence is a critical factor in calculating the SCCO2, and current
    estimates may be underestimated. Temperature anomalies increase uncertainty about
    climate change risks. Consideration of temperature variability increases extremes
    on both ends of the distribution of outcomes and corrects likely values upward.
    Including an empirical estimate of damage persistence has major economic implications.
    For all scenarios, except SSP1-1.9, including the possibility of warm and cold
    years and periods disproportionately pushes the 75th percentile further from the
    median than it affects the 25th percentile, while the 5th and 95th percentile
    are affected more symmetrically. Economic uncertainty is larger than climate science
    uncertainty. '
  12: The PAGE with annual variability model variant yields higher SCCO2 estimates
    compared to other model variants, especially for larger pulses.
  13: Parameter changes can have significant impacts on the SC CO2, notably a one
    standard deviation decrease in tolerable temperature before discontinuity can
    trigger substantial SCCO2 increase.
  14: A one standard deviation decrease in the tolerable temperature before discontinuity
    results in a significant SCCO2 increase of $617.53.
  16: "The SCCO2 estimates vary significantly depending on the PAGE model version,\
    \ the SSP scenario, and the inclusion of variability and growth effects. Some\
    \ distributions include SCCO2 values of zero due to damages being outside of the\
    \ model's scope. Alternative emissions pathways aligned with staying below 1.5\xB0\
    C result in slightly higher SCCO2 estimates."
  17: The study discusses how equity-weighting can lead to discontinuous results and
    introduces boundaries to smooth these effects, preventing infinite values in damage
    estimates.
  19: The persistence estimate is upwardly biased or loses meaning with too many lags
    due to noise; persistence might be overestimated or affected by rebound.
  23: "Table B2 shows that persistence estimates \u03C1 vary greatly and are highly\
    \ uncertain, with estimates in the income-based subsamples highlighting differences\
    \ that are not conclusively regional."
  24: The analysis suggests variability in GDP growth response to temperature across
    different income levels, with poorer regions possibly more vulnerable to persistent
    impacts of temperature shocks.
  25: The analysis suggests that the effects of temperature on GDP per capita growth
    can vary significantly, with regions of lower GDP per capita showing more damage
    persistence.
  26: Temperature effects on GDP per capita growth differ based on median GDP per
    capita; statistically significant negative coefficients for temperature squared
    in certain scenarios.
  27: "Annual decay of 3% or higher greatly reduces the estimated marginal damages\
    \ of CO2 emissions; A decay rate of 4%\u20135% per year results in an SCCO2 virtually\
    \ identical to the default PAGE-ICE model with no persistence; A decay rate of\
    \ 1% or 2% counterintuitively increases the SCCO2 compared to the default."
  28: The analysis finds generally increased interannual temperature variability in
    tropical regions, especially Amazonia, post-1986, with little change over Europe.
  29: The analysis presents regional temperature variability estimates, demonstrating
    different levels of variability across regions.
  32: The study examines the correlation in model errors across regions for different
    temperature models. Each subplot in Figure C3 reports the median variance of model
    errors across regions ("Var(e)") and the median absolute value of the correlation
    of all off-diagonal correlations ("|cor|").
  33: Several studies are cited which analyze the economic effects of climate change,
    the social cost of carbon, and the impact of climate variability and extremes.
Methodology:
  2: The paper uses the PAGE-ICE model and compares it with the PAGE09 model. The
    applicability of the results is for cost-benefit integrated assessment models.
  3: The methodology involves using the PAGE-ICE model, which simulates climatic and
    economic developments from 2020 to 2300 in eight aggregated regions, improving
    on previous models with detailed Arctic feedbacks.
  4: The paper uses the PAGE-ICE model, which has been translated into the Mimi modeling
    framework. It employs Monte Carlo sampling of over 150 parameter distributions.
    The SCCO2 is calculated as the difference in global equity-weighted damages between
    runs with and without a CO2 pulse, discounted to the base year (2015). Market
    damages are based on absolute temperature and calibrated to an empirical estimate
    based on temperatures. Scenarios are based on the Tier 1 scenarios of ScenarioMIP
    (SSP1-1.9, SSP1-2.6, SSP5-8.5, and SSP2 with RCP4.5).
  6: The analysis uses the PAGE model and Monte Carlo simulations. Changes are introduced
    sequentially, and the differences in SCCO2 are calculated for each step. 50000
    Monte Carlo simulations were run. Panel regression analysis is used to estimate
    damage persistence.
  7: Uses PAGE-ICE model with Monte Carlo simulations to assess GDP impacts considering
    varying levels of damage persistence.
  9: The analysis uses PAGE model configurations with Monte Carlo simulation, taking
    into account interannual temperature variability and economic growth effects,
    to generate projections by the year 2100.
  10: Uses the PAGE (Policy Analysis of the Greenhouse Effect) integrated assessment
    model (IAM), including variations like PAGE-ICE; Analyzes different climate and
    socioeconomic scenarios (SSPs); Empirically estimates damage persistence; Considers
    annual temperature variability.
  12: SCCO2 values are derived from running 50,000 Monte Carlo simulations across
    different model variants.
  13: Analysis based on deterministic runs of the PAGE-ICE model in SSP2-4.5, evaluating
    mean and standard deviation shifts in parameters.
  16: The analysis uses Monte Carlo simulations to estimate SCCO2. It incorporates
    regional temperature variability, observational uncertainties, and alternative
    variability models. It also models persistence of damages and growth effects.
    Some models incorporate a subsistence bound at a per capita consumption level
    and limit equity-weighting to damages less than or equal to 99% of consumption.
  17: The analysis involves equity-weighting damages based on regional consumption
    levels and mitigates extreme results using convergence equations with predefined
    thresholds.
  18: A convergence system is used to illustrate its impact on the social cost of
    CO2 (SCCO2), showing a modest decrease compared to other model parameter settings.
  19: The analysis uses a regression model based on Burke et al. (2015) with one temperature
    lag to estimate damage persistence by the ratio of long-run to immediate marginal
    impacts.
  20: Uses baseline regression models with temperature and precipitation lags and
    low-pass filtering to analyze temperature shocks' impact on GDP growth.
  21: The analysis involves comparing unfiltered and filtered regression models and
    uses bootstrap samples from country clusters to understand persistence distribution.
  23: The study uses a low-pass filtering approach to explore persistence in GDP per
    capita growth influenced by temperature changes, with different filters applied
    such as 3-year, 5-year, and 10-year filters, and also involves analysis through
    subsampling based on income groups.
  24: The regression models include temperature and precipitation as well as country-specific
    fixed effects and time trends, analyzing various numbers of temperature lags.
  25: The analysis uses a baseline regression model containing temperature and precipitation
    lags, country and year fixed effects, and country-specific time trends.
  26: The analysis uses regression models with low-pass filtered climate variables
    with 3, 5, and 10-year filters on GDP per capita data.
  27: Monte Carlo simulations under different annual decay rates of damage persistence
    for SSP2-4.5; Interannual temperature variability is computed as the long-term
    average of the 11 year standard deviations after detrending the annual temperature
    anomaly data using a local 11 year running mean.
  28: A land-sea mask is applied to a coarse HadCRUT4 grid, and a 30-year running
    window is used for linear detrending to remove the global warming signal.
  29: The authors calculate regional temperatures using a model that includes a global
    temperature component, a regional amplification factor, and an autoregressive
    term. The model assumes that residual temperature variation is uncorrelated across
    regions after accounting for GMST and regional auto-regression. The model uses
    temperature data from 1986-2015.
  32: 'The study correlates model errors across regions using four different models:
    Raw Temperatures, LOESS-only Model (regressing region temperatures on smoothed
    GMST), AR-only Model (regressing region temperatures on delayed temperatures),
    and Full AR Model (including both regressors). The correlation is measured using
    the Pearson correlation of the residuals.'
  33: References integrated assessment models (IAMs) such as PAGE, panel data analysis,
    and other economic modeling techniques. Applicability varies depending on the
    specific study referenced.
More Notes:
  4: The paper acknowledges that deterministic assessments of the SCCO2 carry limited
    information and explores the sensitivity of SCCO2 estimates to pulse size.
  6: The AR5 updates are not represented as a difference, since these are calculated
    across modification of PAGE-ICE, and the AR5 updates bar represents the nearest
    equivalent to PAGE09. Due to interaction effects, changing the order in which
    changes are introduced can lead to minor changes in the values presented.
  10: The study uses a global model of damage persistence without regional disaggregation,
    which risks omitting inequalities caused by altered long-run growth pathways.
    Future research should focus on growth effects in the Global South.
  20: The analysis includes simulations using a low-pass filter to explore the persistence
    of temperature impacts on GDP growth over different time horizons.
  27: The study explores the theoretical possibility that damage persistence decays
    exponentially over time. The analysis implicitly assumes that future persistence
    will equal persistence levels observed over the past decades.
  29: The paper uses a PAGE model, and this section describes modifications made to
    the original to incorporate temperature variability and temporal structure.
