Highlights:
  1: Residential emissions are nearly eliminated by 2100 through increased envelope
    efficiency and advanced heating technologies. Combining these measures with rooftop
    PV can reduce net energy demand of households to nearly zero.
  3: Higher insulation is more competitive under scenarios with CO2 pricing, as they
    reduce heating/cooling demand. Richer households are more likely to invest in
    insulation due to varying heating/cooling demand and discount rates across income
    groups.
  4: The highest renovation rates are projected in the OECD and Reforming Economies
    due to older building stocks and colder climates, and substantial investments
    are indicated in building envelope efficiency in new constructions and renovations
    globally.
  5: Cooling demand is projected to increase across all regions, particularly in Asia,
    the Middle East and Africa, and Latin America, due to increased household expenditures
    enabling the adoption of air conditioning.
  6: "Under the 2\xB0C warming scenario with emission prices, heating demand significantly\
    \ decreases while cooling demand increases, though less than without climate policy.\
    \ Direct emissions from heating are projected to drop to near zero."
  7: Neither insulation nor technology change alone dominates energy and emission
    mitigation efforts, but rather an equilibrium is reached where improved heating/cooling
    efficiency and building envelope efficiency are applied.
  8: Energy demand and emissions can be reduced from current levels through the use
    of advanced technologies. Renovations lead to a modest improvement in total energy
    demand, particularly in the OECD. Required insulation improvements depend on local
    climate characteristics; warmer regions benefit less from improvements.
  9: "Investments in insulation reduce energy demand for heating and cooling and are\
    \ expected to increase even in scenarios with no additional climate policy. Fuel\
    \ switching accounts for more than half of emission reduction. The paper also\
    \ highlights the potential role of technology and energy efficiency decisions\
    \ in reducing energy demand and emissions from residential heating and cooling.\
    \ Regions which are projected to increase their residential floorspace are shown\
    \ to invest in inefficient new buildings in the 2\xB0C scenario, indicating that\
    \ they risk getting locked-in into poor infrastructure if these investments are\
    \ not made early on."
  10: Regions with more space heating demand benefit greatly from insulation and electrification.
    Rich households are able to lower energy demand and emissions, benefiting from
    investments in efficiency and rooftop PV, while poorer households face challenges
    in investing.
Methodology:
  1: A regional energy system model with explicit representation of residential energy
    use and building stocks is used to explore decarbonization pathways.
  3: Analysis uses a multinomial logit function to model the competitiveness of insulation
    investments based on costs and climate policy scenarios, and to determine the
    share of residential electricity demand met by rooftop PV.
  4: This analysis uses scenario protocols and estimates final energy demand and emissions
    by attaching emission factors to primary energy carriers. It discusses the interplay
    of carbon prices, technology choices, and local climate impacts across various
    regions.
  5: The study projects final energy demand for heating and cooling under Baseline
    and 2/C14 C scenarios. Also considers electricity available from residential rooftop
    PV and emissions arising from residential heating and cooling, excluding indirect
    emissions from electricity or district heat production. The analysis considers
    the impact of building envelope efficiency and shifts towards more efficient heating
    fuels.
  6: The analysis uses scenarios (Baseline and 2/C14 C) to project future energy demand
    and emissions for heating and cooling. The time horizon is up to 2100. The results
    are applicable to global and regional residential energy demand.
  7: The analysis uses an updated version of the TIMER-REMG model, part of the IMAGE
    integrated assessment model (IAM). It explicitly represents residential energy
    services, income levels, local climate conditions, insulation levels, renovation
    and construction of building stocks, selection of heating and cooling technologies,
    and rooftop PV.
  8: The TIMER-REMG model was calibrated to reflect historic (1971-2018) data on final
    regional residential final energy demand. Floorspace, household size, appliance
    and air-conditioning ownership, and heating fuel demand are calibrated for each
    region and income level. Building stock and envelope efficiency are calibrated
    to country level data. The model projects out to 2100.
