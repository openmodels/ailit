Drivers of Risk:
  1: Climate change impacts heating and cooling demand in residential energy use.
  2: No relevant information
  4: Building stock development influenced by regional climate conditions receiving
    energy efficiency investments.
  5: Increasing residential floorspace and changes in building envelope efficiency
    (U-Value) impact energy demand.
  6: Emission prices and building efficiency improvements are drivers impacting final
    energy demand in the scenarios.
  7: The paper examines how changes in climate (implicitly through cooling demand),
    technology, and policy (emission pricing) impact energy demand and emissions.
  8: The potential reduction in energy demand and emissions is driven by interventions
    like insulation, renovations, and advancements in heating and cooling technology.
  9: Price developments in PV and grid-electricity, tenant-landlord effect, and appropriate
    usage of technology impact energy demand and emissions.
  10: Energy demand and emissions are impacted by factors like space heating and cooling
    demand, building envelope efficiency, and electrification of heating.
Evaluation overview:
  1: The paper provides an overview of emission reductions in the residential sector
    via energy efficiency improvements.
  2: No relevant information
  4: The paper evaluates final energy use per year (EJ) and carbon dioxide emissions
    (GtCO2/yr) related to building stocks and energy efficiency improvements.
  6: "This page provides an overview of energy usage and emissions outcomes between\
    \ baseline and 2\xB0C scenarios for residential heating and cooling."
  7: This paper analyzes energy demand and emissions in the residential sector.
  8: The analysis evaluates the impact of insulation in new buildings, renovations,
    and improvements in heating and cooling technologies on energy use and emissions.
  9: Potential role of technology and energy efficiency decisions in reducing energy
    demand and emissions from residential heating and cooling.
  10: The paper evaluates how households can meet emission requirements by combining
    efficiency improvements and fuel switching.
Highlights:
  1: Direct residential emissions are projected to be almost eliminated by 2100 through
    increased efficiency and advanced technologies.
  2: The TIMER-REMG model allows for the study of the adoption and impact of key mitigation
    measures such as building envelope efficiency, heating/cooling technology choices,
    and investment in rooftop PV in the residential sector, in line with the Paris
    Agreement.
  3: The analysis evaluates the effect of insulation, renovations, and technology
    choices on energy and emission mitigation.
  4: OECD regions are projected to have the largest increase in renovation investments
    due to older building stocks and colder climates, while Asia and the Middle East
    & Africa show the greatest relative improvement in U-values due to initial inefficiencies
    and floorspace growth.
  5: Total heating and cooling demand is tied to local climate characteristics; increased
    demand, particularly for cooling, is driven by rising floorspace and improvements
    in household income allowing for transitions to more efficient cooling systems.
  6: "The most important outcomes are the significant reductions in energy demand\
    \ and emissions associated with the 2\xB0C scenario, with direct emissions from\
    \ heating nearly dropping to zero due to electrification."
  7: Increased insulation in new buildings accounts for most of the reduction in secondary
    energy demand. The model highlights that neither insulation nor technology change
    dominates energy and emission mitigation efforts; an equilibrium is reached between
    heating/cooling efficiency and building envelope efficiency. Electrification of
    heating in certain regions leads to steep declines in direct emissions, and more
    efficient air-conditioning in warmer regions plays a significant role.
  8: Decarbonization of the residential sector is possible through electrification
    and decarbonization of electricity supply.
  9: Investments in insulation and efficient building envelopes are crucial; fuel
    switching accounts for over half of emission reduction; heating demand expected
    to reduce significantly, while cooling demand increases under the 2/C14 scenario.
  10: Heat pumps offer a solution to reduce energy demand and emissions; richer households
    can benefit more from energy efficiency measures and renewable energy adoption;
    poorer households may struggle to adopt high-efficiency technologies.
Methodology:
  1: The analysis uses a regional energy system model to evaluate residential energy
    use and building stock concerning long-term decarbonization pathways.
  2: The analysis uses an updated version of the TIMER energy system model part of
    the IMAGE Integrated Assessment Model (IAM), which represents the global energy
    system and projects developments in energy supply, conversion, and demand across
    26 world regions.
  3: Scenarios are based on SSP2 baseline and RCP2.6 climate target to evaluate economic
    effects of climate policy on investment decisions.
  4: The paper models energy demand and investment scenarios with a focus on regional
    differences in building stocks and climate conditions, looking at outcomes under
    baseline and counterfactual scenarios like 2/C14 C.
  7: The analysis uses an updated version of the TIMER-REMG model, part of the IMAGE
    integrated assessment model (IAM). The model includes building stocks, dynamics
    driving changes in building energy efficiency, and the interaction between supply-side
    and demand-side energy and emission mitigation options. The model projects to
    2100.
  9: The updated TIMER-REMG model is used including building-stock turnover, regional
    climate characteristics, and economic decision making.
More Notes:
  1: Measures such as rooftop PV can potentially reduce net energy demand of households
    to near zero.
  2: No relevant information
  7: The model incorporates residential energy services, income levels, local climate
    conditions, insulation levels, renovation and construction of building stocks,
    selection of heating and cooling technologies, and rooftop PV. The richest households
    are projected to get closest to meeting their energy needs and may become positive
    energy households, especially in Latin America.
