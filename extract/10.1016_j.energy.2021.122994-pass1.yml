Quantitative material:
  1: In a 2-degree Celsius scenario, global heating demand is expected to decrease
    by 27% and 66% by 2050 and 2100 respectively. Cooling demand is expected to increase
    by 176% and 286% by the same years. Direct residential emissions are almost eliminated
    by 2100.
  3: No relevant information
  4: U-values are projected to reach below 0.5 W/m2/K by 2100 in colder regions; global
    renovation investments in the Baseline and 2/C14 C scenarios are projected to
    be 106.9 B$, 127.7 B$, 195.2 B$, and 320.3 B$ in 2030, 2050, and 2100, respectively.
  5: Table 2 provides annual investments in residential building envelope efficiency
    (renovations and new buildings) and average renovation rates for Baseline and
    2/C14 C scenarios across different regions (OECD, Reforming Economies, Asia, Middle
    East & Africa, Latin America) for the years 2030, 2050, and 2100, and average
    renovation rates for the periods 2020-2050 and 2020-2100.
  7: The use of electricity, district heating or hydrogen as heating fuels puts pressure
    on indirect emissions, with these being more than double the direct emission by
    2100 in the Baseline scenario. Investment in rooftop PV is promoted in the 2/C14
    C scenario as aggregate increases in the price of electricity make this investment
    worthwhile, leading to more rapid buildup in rooftop PV capacity compared to the
    Baseline, but overall lower electricity demand in the 2/C14 C scenario. The application
    of more insulation in new buildings accounts for most of the reduction in secondary
    energy demand globally, on a regional scale it can be seen that regions where
    older buildings make up most of the building stock or most of the final energy
    demand is for heating, renovations also contribute to reduced energy demand. For
    the OECD region, while renovation rates are amongst the highest, the improvement
    on final energy is limited because OECD households on aggregate start with higher
    quality buildings than in other regions, leading to lower marginal gains from
    renovation.
