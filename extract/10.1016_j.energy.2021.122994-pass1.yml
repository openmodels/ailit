  10: "Efficient heat pumps reduce energy demand and emissions: \"Heat pumps offer\
    \ a particularly attractive solution... they both reduce total final energy demand\
    \ and direct emissions.\"\n\nEvaluation of emissions and energy strategies: \"\
    Neither efficiency improvements nor fuel switching are a silver bullet to reducing\
    \ residential emissions... meeting emission requirements for a 2\xB0C scenario\
    \ by combining efficiency improvements and fuel switching.\"\n\nQuantitative projection\
    \ for electricity production: \"The model projects that households produce 8 EJ/yr\
    \ of electricity in 2050, increasing to 40 EJ/yr in 2100 in the mitigation scenario.\"\
    \n\nDrivers such as heating demand: \"Regions with greater space heating demand\
    \ benefit more from insulation and electrification of heating.\"\n\nStatus and\
    \ benefits for richer households: \"It is shown that the richest households benefit\
    \ from this since they are most able to invest in efficiency measures and rooftop\
    \ PV... Warmer regions reach net-zero status first as they benefit from greater\
    \ solar irradiation and lower heating demand.\"\n\nChallenges for poorer households:\
    \ \"However, poorer households may face difficulties in investing in technologies\
    \ and insulation with very high upfront costs, thus keeping them in a low-efficiency,\
    \ high-demand, high-emission situation.\"\n\nEnergy demand dynamics: \"Households\
    \ benefit from a self-limiting feedback between these two, where improved heating/cooling\
    \ efficiency reduces the need for increased insulation, and vice versa.\""
