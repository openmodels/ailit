  3: 'Source material here.

    - "investments in insulation are skewed towards richer households."

    - "scenarios where a price was attached to the emitted CO2... additional costs
    increase the competitiveness of higher insulation levels due to their lower heating/cooling
    demands."

    - "The model includes a dynamic representation of residential rooftop PV including
    their potential, investments, and dispatch."

    - "The scenarios used in this study are outlined in... the updated implementation
    of the SSP2 baseline from the IMAGE 3.2 model... results for the residential sector
    according to an RCP2.6 climate target... to isolate economic effects of climate
    policy on investment decisions and to allow for comparability between the Baseline
    and 2/C14 C scenarios."

    - "Projections of useful energy demand for space heating and cooling was based
    on the methodology developed... Space heating demand is modeled as a function
    of floorspace (m2/capita), population (capita), and heating degree days (HDD)...
    Cooling demand is also a function of population, cooling degree days (CDDs), and
    cooling intensity which is linked to improvements in building envelope efficiency."

    '
  4: "V. Daioglou, E. Mikropoulos, D. Gernaat et al. Energy 243 (2022) 122994\n\n\
    Evaluation overview: \"This paper focuses on results concerning \uFB01 nal energy\
    \ use per year (EJ) and emissions (GtCO2/yr).\"\n\nDrivers of Risk: \"The projections\
    \ also show the importance of local climate conditions. While there is some long-term\
    \ convergence of regional U-values, colder regions (OECD, Reforming Economies)\
    \ are projected to have lower values than warmer regions, as heating demand forms\
    \ a significant financial burden.\"\n\nQuantitative material: \"Global residential\
    \ \uFB02 oorspace is expected to approximately triple over the 21st century...\
    \ investments in renovation are projected to be 106.9 B$ in 2030 (i.e. a 19% increase\
    \ compared to the Baseline), increasing to 195.2 B$ in 2050 and 320.3 B$ in 2100.\"\
    \n\nHighlights: \"The OECD sees the highest renovation rate, as this region has\
    \ an older standing stock, as well as a colder climate. However, investments increase\
    \ signi\uFB01 cantly in other regions over time as they get richer. This is also\
    \ re\uFB02 ected in the higher renovation rates for the 2020e2100 period...Regions\
    \ also show the greatest relative improvement in their U-values in the Baseline,\
    \ relative to the current situation. This is largely because they start from very\
    \ inefficient building envelopes and they witness the greatest marginal growth\
    \ in \uFB02 oorspace.\"\n\nMethodology: \"This paper focuses on results... using\
    \ results across 26 regions available in the Supplementary Data...specifically,\
    \ for modern bio-energy the emission factor includes land-use change emissions\
    \ and requirement of non-renewable energy in the conversion of biomass into secondary\
    \ energy carriers.\"\n"
  5: " \n\"In the Baseline, while heating demand is expected to slightly increase\
    \ in the Middle East and Africa, and Latin America...due to increasing incomes\
    \ and overall floorspace...ded to plateau and decrease slightly. This is due to\
    \ increases in building envelope efficiency in colder regions (see Fig. 1)...Total\
    \ heating and cooling demand is tied to local climate characteristics; increased\
    \ demand, particularly for cooling, is driven by rising floorspace and improvements\
    \ in household income allowing for transitions to more efficient cooling systems...Floorspace\
    \ increases from approximately 20 billion m\xB2 to almost 40 billion m\xB2 from\
    \ 2025 to 2075. A decline in U-Value is noted, with Baseline and 2\xB0C scenarios\
    \ showing variations...projection shows floorspace generally increases while U-Values\
    \ decrease over time across global regions, with different scenarios presented:\
    \ Baseline and a 2\xB0C scenario...As expected, total heating and cooling demand\
    \ depends a lot on local climate characteristics...Combined with growing floorspace.\"\
    \n"
  6: "yaml\nEvaluation overview: \"Fig. 2. Final energy for residential heating and\
    \ cooling (coloured bars, left axis), and direct residential emissions (points,\
    \ right axis). Baseline and 2/C14 C scenarios.\"\nDrivers of Risk: \"The use of\
    \ emission prices in this scenario promotes increased building ef\uFB01 ciency\
    \ as shown in Fig. 1, which reduces the overall heating and cooling demand. Emission\
    \ prices also drive fuel switching towards cleaner and more ef\uFB01 cient heating\
    \ fuels, particularly electric resistance heaters and heat pumps, further driving\
    \ down \uFB01 nal energy demand.\"\nQuantitative material: \"Globally, compared\
    \ to the Baseline, in the 2/C14 C scenario total heating demand is projected to\
    \ fall by 18% and 53% in 2050 and 2100 respectively. For the cooling demand the\
    \ drop is 5% and 46% respectively. Compared to \uFB01 nal energy demand today,\
    \ in the 2/C14 C scenario global heating demand is expected to decrease by 27%\
    \ and 66% by 2050 and 2100 respectively. On the other hand, cooling demand is\
    \ expected to increase by 176% and 286% respectively, but lower than the projected\
    \ increase in the absence of climate policy.\"\nHighlights: \"Since in the 2/C14\
    \ C scenario long-term heating is almost completely electri\uFB01 ed (with some\
    \ use of district heat or hydrogen), direct emissions drop to near zero.\"\n"
  7: As stated in Section 3.3, the paper discusses how "decisions concerning investments
    in heating/cooling technologies as well as building envelope efficiency dictate
    the projected energy demand and emissions," providing an evaluation overview.
    It highlights that "application of insulation in new buildings accounts for most
    of the reduction in secondary energy demand," underscoring a key risk driver.
    The paper provides quantitative material by mentioning the "use of electricity,
    district heating falling to 77% of current levels." Methodologically, it utilizes
    "an updated version of the TIMER-REMG model, part of the IMAGE (IAM)," and projects
    results to the year "2100." One highlight is that "investment in rooftop PV makes
    households into so-called prosumers" and "neither insulation nor technology change
    dominates energy and emission mitigation efforts; that is, neither option is applied
    to its maximum." Additional notes mention that "richest households... may become
    zero-energy, or even positive-energy by becoming net exporters of final energy,"
    especially in regions like "Latin America."
  8: " \n\"Final energy (left) and direct emissions (right) for heating and cooling,\
    \ decomposed for the mitigation effect of (i) insulation in new buildings, (ii)\
    \ Insulation via renovations of existing buildings, and (iii) Improvements in\
    \ heating and cooling technologies.\" \n\n\"Residential building stock and building\
    \ envelope efficiency are calibrated to limited country level data, particularly\
    \ for the European context.\"\n\n\"These studies highlight that complete decarbonization\
    \ of the residential sector is possible through increased electrification - combined\
    \ with decarbonization of electricity supply to avoid indirect emissions.\"\n\n\
    \"Our reported results for current building stock age profile and thermal efficiency\
    \ are in line with other similar studies.\"\n\n\"This result concurs with a recent\
    \ detailed study for the Dutch building sector, which concluded that increasing\
    \ the insulation levels of the entire Dutch building stock would lead to a reduction\
    \ in heating demand between 7 and 27%.\"\n\n\"Decarbonization of the residential\
    \ sectors depends on a synergistic use of both improvements in thermal insulation\
    \ and technological improvements in heating and cooling.\"\n"
