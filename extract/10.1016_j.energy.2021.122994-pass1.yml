  10: Model projects households will produce 8 EJ/yr of electricity in 2050, increasing
    to 40 EJ/yr by 2100 in a mitigation scenario.
sourcematerial:
  1: "The residential sector currently accounts for one fifth of global energy use\
    \ and corresponding greenhouse gas emissions...Using a regional energy system\
    \ model with an explicit representation of residential energy use and building\
    \ stocks, the contribution of this sector in long-term decarbonization pathways\
    \ is explored...The projections show that in a 2\xB0C scenario, global heating\
    \ demand is expected to decrease from current levels by 27% and 66% by 2050 and\
    \ 2100, respectively. However, due to increasing affluence in warmer regions,\
    \ cooling demand is expected to increase by 176% and 286% respectively...direct\
    \ residential emissions are almost eliminated by 2100 by combining increased envelope\
    \ efficiency and advanced heating technologies in a synergistic manner...By combining\
    \ these measures with rooftop PV, the net energy demand of many household types\
    \ approaches zero."
