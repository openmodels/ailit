Drivers of Risk:
  1: Sea-level rise (SLR) and storm-related flooding are the primary shocks impacting
    coastal property values.
  2: Sea level rise, storm risk, beach erosion, increased frequency and intensity
    of storms, increased surge-related flood risk, increased erodibility of the shoreline,
    increased frequency of sunny-day flooding, groundwater threats, and total inundation.
  4: Sea level rise (SLR) beginning at year 50.
  5: Sea-level rise (SLR) and changes in beach nourishment subsidies.
  6: Rising outside market prices and sea level rise (SLR) are the primary shocks
    impacting outcomes.
  7: Sea level rise (SLR).
  8: Sea level rise (SLR) and subsidization policies affect coastal property values
    and population demographics.
  9: The paper discusses the impact of changes in the physical environment, such as
    shoreline stabilization, erosion, sea level rise, and storms, on coastal real
    estate values.
  10: The model considers the effects of storm risks on property values in coastal
    communities.
  11: The analysis includes risks from sea level rise (SLR) and storms, which impact
    property markets and agent willingness to pay.
  12: Demographic changes and sea level rise are driving changes in coastal property
    markets.
  15: Repetitive floods and sea level rise impacting coastal cities
Evaluation overview:
  1: The paper evaluates the effects of policy and market forces on coastal real estate
    prices in light of sea-level rise (SLR) and storm risks.
  2: Coastal and inland property values are evaluated in relation to sea level rise
    (SLR).
  4: Property value, beach width, share of housing owned by investors, expected rate
    of return on coastal real estate, marginal income tax rate of property owners,
    and risk premium for coastal real estate.
  5: Property values, beach width, income tax rate of property owners, and share of
    housing owned by investors.
  6: The paper evaluates the impact of rising coastal real estate prices, beach width
    changes, and the investor market share in coastal areas.
  7: Property value, beach width, share of housing owned by investors, expected rate
    of return on coastal real estate, marginal income tax rate of property owners,
    and risk premium for coastal real estate.
  9: No relevant overview of specific outcomes such as mortality or productivity loss
    provided.
  15: No relevant information
Highlights:
  1: The analysis finds that policy measures like subsidies for coastal management
    and tax advantages temporarily delay declines in property values despite increasing
    risks but cannot prevent eventual decreases as inundation progresses.
  2: Subsidies for coastal management, such as beach nourishment, tax advantages for
    high-income property owners, and stable or increasing property values outside
    the coastal zone dampen the impacts of SLR on coastal property markets. Prices
    would more accurately reflect SLR risks without subsidies.
  4: SLR leads to a modest initial decline in property values, followed by a more
    substantial decline over decades. High-income agents entering the market temporarily
    dampen the property value decline. If high-income agents are restricted from entering,
    an immediate decline in property value is observed.
  5: Reducing nourishment subsidies leads to volatility and a precipitous decline
    in property values, particularly for oceanfront properties. Beach width immediately
    declines. Median owner income tax rate increases. Investors own substantially
    less of the housing.
  6: Coastal real estate prices appreciate after the onset of SLR; rising prices drive
    investors out as high-income owners enter sooner.
  7: Outside markets play an important role in coastal real estate markets. When outside
    markets decline, property values plummet, risk increases, high-income owners leave,
    investors buy real estate, and rent it to lower-income occupants. The coupled
    human-natural system dampens environmental signals and delays the full capitalization
    of risk from SLR. Coastal gentrification occurs as natural amenities persist and
    policies subsidize beach nourishment.
  8: Subsidies, tax policies, and outside markets sustain high coastal real estate
    values despite climate risks, delaying market and demographic adjustments.
  9: Current incentives may not support adaptive coastal housing; building larger
    structures can lead to reinforcement of shoreline defenses rather than adaptation;
    public investments in shoreline stabilization may be better spent on adaptive
    technologies; agent-based models show nonlinearity and feedbacks in responses.
  15: Repetitive floods may lead to intensified outmigration and climate gentrification
    in coastal cities
Methodology:
  1: The analysis utilizes the Coastal Home Ownership Model (C-HOM) to study the long-term
    evolution of coastal real estate markets, incorporating changing physical attributes
    of the coast, economic values, and dynamic risks.
  2: A hedonic price function is used to estimate the natural log of property sales
    price, controlling for property characteristics using 23,184,659 observations
    of property sales in the United States between 1989 and 2016. Coupled human-natural
    systems modeling is used to understand the mechanisms driving empirical phenomena
    and what to expect in coastal communities as SLR progresses.
  4: A baseline model scenario is used to simulate the effects of SLR on oceanfront
    and non-oceanfront properties. Beach nourishment is subsidized at 90% of the cost.
    The model considers agent flux (migration of high-income agents).
  5: Numerical experiment involving model simulations comparing a baseline scenario
    with a scenario where the nourishment subsidy rate is cut to 50% at the onset
    of SLR (at t=50). The model simulates the effects of the subsidy cut over time
    on property values, beach width, tax rates, and investor behavior.
  6: The analysis involves a numerical experiment comparing baseline model scenarios
    with scenarios where outside market prices appreciate, alongside the onset of
    SLR.
  7: Model simulations of coastal real estate markets coupled to the physical environment
    are used to explore potential trajectories associated with coastal inundation.
    The model includes beach erosion dynamics, local public finance decisions, storm
    risk, and demographic changes.
  8: The study models a coupled human-natural system (C-HOM) to compare business-as-usual
    with potentially more efficient coastal management strategies.
  9: The analysis uses an agent-based model combining theoretical, numerical, and
    empirical frameworks, linking property prices to capitalized flows of amenities
    and risks, and accounting for heterogeneity in risk preferences, as well as feedbacks
    between human and natural systems.
  10: The supply of housing is modeled as fixed since coastal communities are built
    out and structures are typically rebuilt after storm destruction.
  11: The state equation for beach width and mean sea level (MSL) are modeled with
    linear erosion and a constant linear rate of increase.
  12: The analysis models coastal real estate markets over long time horizons, adjusting
    agent distributions based on demographic changes and interactions with external
    markets.
  13: Model coded in Matlab R2022b and analyzes a menu of nourishment options over
    a potential 30-year horizon.
  15: The study seems to involve modeling of economic and physical responses to climate
    risks such as sea level rise
More Notes:
  4: The model assumes a barrier island with an initial height of 1 m relative to
    sea level. The initial 50-year period characterizes the system without SLR.
  6: There is a delayed effect on beach width, and rising outside markets can offset
    the removal of subsidies in the long term.
  7: The study adds to the literature modeling coupled human-natural systems and applies
    a coupled systems framework to landscape change. Results are applicable to the
    US East and Gulf Coasts.
  8: Removing subsidies could improve market efficiency by reflecting risk but may
    impede equity by displacing lower-income households.
  13: The nourishment decision framework is based on existing models, but explicitly
    aims to integrate human and natural system interactions.
  15: The study focuses on the economic impacts of climate risks in coastal areas,
    involving strategies like managed retreat and property buyouts
Quantitative material:
  2: Figure 1 shows quality-adjusted baseline housing values reflected in estimated
    county-year fixed effects for coastal and inland counties in the United States
    from 1989 to 2016. Empirical evidence shows that properties vulnerable to SLR
    are discounted relative to comparable properties that are not vulnerable.
  4: Property values decline modestly after SLR begins; beach width and expected beach
    width are shown over 150 years; investor share of housing decreases to zero eventually;
    income tax rate and risk premium rate are shown over 150 years; SLR rises 1 m
    over 100 years
  5: Percent change in property value for oceanfront and non-oceanfront properties.
    Difference in beach width in meters. Difference in income tax rate. Difference
    in investor market share.
  6: The analysis includes percent changes in property value, changes in beach width,
    and investor market share differences.
  7: Shows model simulations of property value, beach width, investor share of housing,
    expected return rate, income tax rate, and risk premium rate over 150 years, with
    SLR beginning at year 50. Outside markets decline to 10% of initial levels over
    50 years after SLR onset. Property values plummet sharply when outside markets
    decline.
  9: There is no specific quantitative information or percent changes provided on
    this page.
  15: No relevant information
sourcematerial:
  1: 'Source material: "Despite increasing risks from sea-level rise (SLR) and storms,
    US coastal communities continue to attract relatively high-income residents, and
    coastal property values continue to rise... We develop the Coastal Home Ownership
    Model (C-HOM) and analyze the long-term evolution of coastal real estate markets.
    C-HOM incorporates changing physical attributes of the coast, economic values
    of these attributes, and dynamic risks associated with storms and flooding...
    In the coupled system, we find that subsidies for coastal management, such as
    beach nourishment, tax advantages for high-income property owners, and stable
    or increasing property values outside the coastal zone all dampen the effects
    of SLR on coastal property values. The effects, however, are temporary and only
    delay precipitous declines as total inundation approaches."'
