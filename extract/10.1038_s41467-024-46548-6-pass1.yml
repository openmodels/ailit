  6: 'Source material here: Results displayed are model simulation differences between
    the baseline model and the scenario in which outside markets appreciate. Outcomes
    include percent change in property value (a), change in beach width (b), change
    in marginal income tax rate of property owners (c), and change in the share of
    housing owned by investors (d). SLR begins at t = 50. Coastal real estate prices
    appreciate well after the onset of SLR and, after 100 years, remain above baseline
    prices even as barrier elevation approaches zero (Fig. 5a). There is a delayed
    effect on beach width (Fig. 5b). Rising prices drive investors out of the market
    quickly as relatively high-income owners enter sooner (Fig. 5c, d). We find that
    the effects of rising outside markets offset the removal of subsidies in the long
    run.'
