  13: "Source material here.\n\"The analysis uses a model to simulate beach nourishment\
    \ decisions, involving scheduled nourishments funded by municipal bonds and temporary\
    \ property tax increases over a ten-year horizon.\" - \"Previous models of beach\
    \ nourishment decisions show that the human and natural systems jointly determine\
    \ shoreline position and coastal property values... A nourishment plan is chosen\
    \ from a schedule of possible intervals... is funded locally through municipal\
    \ bonds that are paid for by the residents over the first 5 years of the plan\
    \ through a temporary (five-year) increase in property taxes (\u03C4 P).\"\n\n\
    \"Beach nourishment plans are evaluated by comparing property tax burden against\
    \ the increase in property value, with agents voting based on whether property\
    \ value increase exceeds the extra tax burden.\" - \"A ten-year nourishment plan\
    \ that will subsequently be voted on is chosen by comparing the property tax burden\
    \ (cost) against the increase in property value (benefit)... Each agent evaluates\
    \ whether the property value increase is greater than the extra tax burden.\"\n\
    \n\"Plans are chosen through a voting mechanism, where implementation occurs if\
    \ at least 50% of resident-owner agents vote to nourish.\" - \"The proposed nourishment\
    \ plan is implemented if at least 50% of resident-owner agents vote to nourish.\
    \ Importantly, institutional investors do not vote but are still taxed if nourishment\
    \ is approved.\"\n\n\"Quantitative analysis uses the user cost model incorporating\
    \ beach width and nourishment tax adjustments, simulating property value changes.\"\
    \ - \"The total benefit of each interval/option is estimated by forward simulating\
    \ property value via the user cost model... The forward simulation accounts for\
    \ the average beach width under the proposed nourishment scenario... enters into\
    \ the denominator of the user cost model.\"\n\n\"Model coded in Matlab R2022b\
    \ and analyzes a menu of nourishment options over a potential 30-year horizon.\"\
    \ - \"The model was coded and run in Matlab R2022b... Supplementary Table 1 summarizes\
    \ model parameters, provides details on how they were chosen, and motivates the\
    \ sensitivity analysis to explore alternative parameter values...\"\n  \n\"The\
    \ nourishment decision framework is based on existing models, but explicitly aims\
    \ to integrate human and natural system interactions.\" - \"Previous models of\
    \ beach nourishment decisions show that the human and natural systems jointly\
    \ determine shoreline position and coastal property values... The nourishment\
    \ decision framework is similar to the one used in Duck, NC and described in Mullin,\
    \ Smith, and McNamara.\"\n"
