  8: "\nDrivers of Risk: \"coastal areas vulnerable to SLR.\"; \"policies that arti\uFB01\
    cially increase the value of property (e.g., a beach nourishment subsidy) delay\
    \ the downward adjustment of prices in response to SLR.\"\nMethodology: \"modeling\
    \ the coupled human-natural system, C-HOM provides a foundation for comparing\
    \ business-as-usual with potentially more ef\uFB01cient approaches to coastal\
    \ management\"\nHighlights: \"subsidies, tax policy that privileges high-income\
    \ owners, and escalating outside markets all contribute to sustaining high values\
    \ of coastal real estate.\"; \"Subsidies also delay associated demographic shifts.\"\
    \nMore Notes: \"if subsidies are reduced, prices will adjust downward to climate\
    \ risk more rapidly. Subsidies also delay associated demographic shifts. Lower\
    \ subsidization leads to more rapid coastal gentri\uFB01cation but permits greater\
    \ capitalization of \uFB02ood risk in coastal property values. Thus, removing\
    \ subsidies for beach management can improve market ef\uFB01ciency (in that prices\
    \ re\uFB02ect risk), but can impede equity (in that lower income households are\
    \ pushed out).\"\n"
