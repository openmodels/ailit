  7: "Source material\nEvaluation overview: \"We advocate for the protection and restoration\
    \ of biologically diverse forests, because they can make a substantial contribution\
    \ to climate change mitigation16,19, helping to avoid irreversible change to the\
    \ Earth system1.\"\nDrivers of Risk: \"For example, if mitigation goals were achieved\
    \ by afforestation in formerly non-forested lands such as peatlands and grasslands,\
    \ then this could have unintended negative impacts on biodiversity and the productivity\
    \ of these ecosystems47.\"\nMethodology: \"In this study, we did not separate\
    \ the individual influences of different climate mitigation practices (e.g., reforestation,\
    \ bioenergy production, and low-carbon energy use) on biodiversity and primary\
    \ productivity...\"\nHighlights: \"We advocate for the protection and restoration\
    \ of biologically diverse forests, because they can make a substantial contribution\
    \ to climate change mitigation16,19, helping to avoid irreversible change to the\
    \ Earth system1.\"\nMore Notes: \"Another consideration is that the ability of\
    \ forests to increase the uptake of carbon in the short-term (e.g., over the next\
    \ decade) cannot be linearly translated into the ability of forests to halt climate\
    \ warming over a 50-100 year time horizon. This is because complex biogeochemical\
    \ and biophysical processes\u2014for instance, surface exchange of energy and\
    \ water vapor and sensible heat flux, resulting from compositional and structural\
    \ changes in forests\u2014might not directly parallel the effects of carbon uptake\
    \ rates on climate48,49.\"\n"
