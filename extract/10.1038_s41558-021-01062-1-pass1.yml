Methodology:
  3: "Combines ecological modeling to project species richness changes. Integrates\
    \ these changes with local estimates of productivity changes due to diversity.\
    \ Multiplies these with NPP to estimate changes in biomass production. Aggregates\
    \ local changes to larger scales. Uses five SSPs, comparing high-emission baseline\
    \ vs. mitigation scenarios (stabilizing warming to below 2\xB0C). Employs three\
    \ GCMs, considering two RCPs in each SSP. Analysis extends to woody species in\
    \ all terrestrial biomes. Regional focus is on IPBES subregions. "
  5: Aggregated regional heterogeneity into country-level estimates, related tree
    diversity effects on productivity to the economic value of avoiding carbon emissions,
    and compared these estimates with the country-level social cost of carbon (CSCC).
  6: Focuses on spatial distributions of woody species to model biodiversity-dependent
    productivity; Projections are based on well-documented species, likely underestimating
    the effects due to excluding poorly described species.
  7: The analysis did not separate the individual influences of various climate mitigation
    practices on biodiversity and productivity.
  9: No analysis methodology is specified on this page.
  10: Analysis of the relationship between forest diversity and productivity in a
    changing climate.
  13: Analysis is performed using ridge density plots and ensemble results across
    three GCMs for SSP scenarios from 2005 to the 2070s.
  14: The analysis uses biome-level projections calculated at a local scale (30 arcsecond
    resolution) using data from approximately 115 million grids across 14 biomes and
    various models including SSPs and GCMs.
  15: The analysis uses three General Circulation Models (GCMs) to assess the impact
    of five SSPs on biome-level productivity loss. Mean values across the three GCMs
    are shown. The order of biomes in each radar chart is based on the per-area productivity
    loss of each biome.
  16: Effect sizes calculated for local scale grids across 17 subregions based on
    IPBES; results are applicable from 2005 to 2070s.
  17: Generalized additive mixed model used to estimate relationships between terrestrial
    area, conservation of tree diversity-dependent productivity, and the social cost
    of carbon. Results shown for five SSPs and across three GCMs (Extended Data Figure
    8 shows GCM results).
  19: The analysis includes considering species dispersal traits to project future
    species habitat suitability under shifting climates.
  20: "Estimation of species richness changes uses \u03B1-diversity calculations and\
    \ considers species co-extinction and co-immigration."
  21: Used co-extinction and co-immigration simulations with extreme gradient boosting
    to predict species changes, and applied species distribution modeling for future
    projections.
  22: Changes in tree diversity and productivity were conducted for grids where tree
    species were observed in the present period (~115 million fine grids). The effect
    sizes of mitigation efforts are calculated as a log ratio scale. Mixed-effects
    meta-regression is used for biome-level analyses. Results are summarized at different
    spatial scales from local to global, including countries and biomes. GCMs are
    used as a random effect. The analysis is performed for different SSP scenarios.
  23: Used a generalized additive model (GAM) with the CSCC as an explanatory variable
    for each combination of SSPs and GCMs; used a generalized additive mixed model
    (GAMM) with the GCMs as a random effect and the CSCC as an explanatory variable
    to ensemble results across the GCMs; checked if results were affected by land
    area, using GAMMs; summed up the reduction in productivity loss across all countries,
    under each of SSPs and GCMs.
  27: "Uses five Shared Socioeconomic Pathways (SSPs) and three General Circulation\
    \ Models (GCMs) to project tree diversity changes. The analysis is performed on\
    \ coarse grids (n = 32,670 grids), showing proportional changes in mean \u03B1\
    -diversity (remaining species richness)."
  28: The analysis uses climate models (GFDL-CM3, HadGEM2-ES, MIROC-ESM) to project
    ecosystem changes and compares the effectiveness of different SSPs in mitigating
    species loss.
  29: Results are evaluated for five Shared Socioeconomic Pathways (SSPs) and three
    General Circulation Models (GCMs).
  30: Analysis uses biome-level projections and effect sizes are estimated at a local
    scale for different Shared Socioeconomic Pathways (SSPs) and General Circulation
    Models (GCMs).
  32: Analysis performed using different Shared Socioeconomic Pathways (SSPs) and
    General Circulation Models (GCMs) like MIROC-ESM-CHEM to assess changes from 2005
    to 2070s.
  33: Effect sizes are estimated at the local scale using three General Circulation
    Models across five Shared Socioeconomic Pathways.
  34: Utilizes a generalized additive mixed model to estimate relationships with 95%
    confidence intervals for different SSPs and GCMs.
  35: Analysis uses comparison of country-level social cost of carbon with productivity
    conservation in the context of Shared Socioeconomic Pathways and General Circulation
    Models.
  38: No relevant information
  39: Species distribution models were constructed using tree and shrub records from
    the Global Biodiversity Information Facility, filtered for native ranges and locations.
    Modeling was performed at both coarse (30 arcminutes) and fine (30 arcseconds)
    spatial resolutions. Models rely on bioclimatic variables (WorldClim 1.4) and
    land-use variables (MODIS Land Cover Type). Analysis was limited to tree species
    with 30 or more occurrence records, resulting in 1,755 and 934 target species
    at fine and coarse grids, respectively. Fine-scale modeling was only possible
    for the present period due to the availability of land-use data.
  40: Species distribution models use land-use type (cropland, pasture, forest, other
    natural lands, and settled land) as a categorical variable. Future climate variables
    are based on CMIP5 GCMs. Future land-use changes are based on the AIM/CGE model,
    downscaled using the AIM/PLUM model, and informed by the SSPs. The allocation
    of land by sector for 17 regions is formulated as a multinomial logit function.
  41: Model performance is assessed using 10-fold cross validation and the continuous
    Boyce index (CBI), which evaluates model quality for presence-only data.
  42: Species distributions are projected for 2005 and 2070s at 30 arcminutes resolution,
    and changes in species richness (alpha-diversity) are calculated at 30 arcseconds
    resolution from 2005 to 2070s. Species-area and endemics-area relationships (SARs
    and EARs) are constructed for the year 2005 to estimate changes in productivity
    at the fine-scale.
  43: Defined common species based on abundance rank, included in extinction and immigration
    simulations.
  44: "Analysis predicts \u03B3-diversity and \u03B1-diversity for the 2070s in each\
    \ of the coarse grids through regression models."
  45: "Analysis uses elasticity of substitution \u03B8 to estimate forest productivity;\
    \ based on MODIS imagery for NPP in 2005 and forest inventory dataset; results\
    \ are presented for different spatial scales and summarize estimates from local\
    \ to global levels."
  46: The analysis uses a meta-analytical approach with the 'metafor' R package to
    obtain global means and confidence intervals; also employs mixed-effects meta-regression
    for biome-level analyses, and generalized additive models for country-level analyses.
  47: Analysis is based on comparison between baseline and mitigation scenarios using
    GAMMs.
  48: "Parameter tuning for the MaxEnt model's regularization parameter was performed,\
    \ with \xDF values tested from 0 to 15 in 0.5 increments."
  49: Bias background approach used in MaxEnt to account for spatial sampling bias.
  50: The model performance was assessed using 10-fold cross-validation.
  51: Climatic data calculated using 'aggregate' and 'biovars' functions in R. Land-use
    changes estimated by the AIM/CGE model based on Fujimori, et al. 10, using five
    SSPs.
  52: Model quality evaluated using the continuous Boyce index on 10-fold cross-validation.
  53: MaxEnt is used to predict the probability of occurrence, which is then converted
    to a binary map using a threshold. Post-processing steps include discarding projected
    suitable habitats beyond native ranges or on unconnected landmasses since the
    last glacial maximum. Future habitats are constrained by buffered dispersal distances.
  55: The analysis uses narrative descriptions of plausible future socioeconomic developments.
  56: Describes the SSP5 Fossil-fueled Development scenario, which is relevant for
    climate modeling and impact assessment.
  57: The analysis includes machine learning regressions to determine species extinction
    and immigration, and uses scenarios from multiple climate models and socioeconomic
    pathways.
  58: Workflow to estimate changes by 2070s
  59: "Uses species-area and endemics-area relationships for downscaling species richness\
    \ changes from \u03B3-scale to \u03B1-scale."
  63: calculated across the three General Circulation Models (GCMs)
More Notes:
  3: The focus is on tree and shrub species. The analysis considers a wide range of
    future land allocation and climate conditions.
  4: Responses of tree diversity and associated productivity to climate change vary
    by region and are influenced by the dispersal ability of trees and land-use changes.
  5: The study emphasizes the connection between decarbonizing the economy and relying
    on nature for carbon storage. It also highlights the issue of reforestation programs
    and policies focusing on monocultures.
  6: The authors focus on tree species but recognize that plant, animal, and microbial
    biodiversity all contribute to ecosystem services; New combinations of species
    are likely to emerge under a changing climate, which may alter interactions between
    species.
  7: The ability of forests to increase carbon uptake may not directly translate to
    halting climate warming over longer time horizons due to complex processes.
  9: No additional notes; this page contains references only.
  12: The document visually contrasts pathways under baseline climate change versus
    those with mitigation efforts, focusing on biodiversity and carbon's roles.
  15: The image includes data for both a baseline scenario (without mitigation) and
    a mitigation scenario, allowing for a direct comparison of the effectiveness of
    mitigation efforts across different SSPs. Figure 2 and Extended Data Figure 6
    may have more relevant information.
  17: "The 'two scenarios' used to calculate \u0394P are not specified in the provided\
    \ text, making it difficult to assess the precise meaning of 'conservation of\
    \ tree diversity-dependent productivity'."
  22: The analysis includes non-forested biomes. The paper examines the relationship
    between the country-level social cost of carbon and the country-level reduction
    in forest productivity loss.
  27: 'The color coding on the maps (blue and red/pink) likely represents different
    data values or changes, possibly related to temperature, precipitation, or climate
    anomalies. The three maps are labeled with climate model names: GFDL-CM3, HadGEM2-ES,
    and MIROC-ESM-CHEM.'
  37: This page only contains references. There is no original analysis or information
    presented on this page.
  38: This page is a table of contents for supplementary materials related to a paper
    about biodiversity-productivity relationships and nature-based climate solutions.
    The supplementary materials include tables, figures, extended data figures, and
    supplementary data files.
  40: The study considers a mitigation scenario and a high-emission baseline scenario.
    It uses the Shared Socioeconomic Pathways (SSPs) framework, including SSP1, SSP2,
    SSP3, SSP4, and SSP5.
  42: 'Dispersal ability of species is considered based on life-history traits. The
    analysis relies on several R packages: vegan, mobsim, and xgboost.'
  43: Assumed non-random species extinction in reality and different consequences
    for ecosystem functioning compared to random.
  46: The analysis calculates country-level reduction in forest productivity loss
    using both baseline and mitigation scenarios.
  51: The SSPs consider changes in population, GDP, energy, emissions, and land use.
    SSPs are designed to span a range of futures in terms of the degree of difficulty
    for mitigation and adaptation to climate change.
  53: Conservative assumptions are made to minimize commission errors in identifying
    suitable habitats. Uncertainty exists in the estimation of species-specific dispersal
    distance and in the scenarios used (three GCMs for each of two RCPs).
  55: The descriptions focus on socioeconomic factors, with environmental changes
    being a consequence of those factors, not a primary driver in the narratives themselves.
    The SSPs can be linked to climate model projections to assess climate impacts
    under different socioeconomic futures.
  56: This page describes the SSP5 scenario, which is characterized by high fossil
    fuel use and faith in technological solutions. Local environmental problems like
    air pollution are successfully managed.
  63: Results are shown for the five Shared Socioeconomic Pathways (SSPs). Results
    of individual GCMs are shown in Extended Data Figure 5.
