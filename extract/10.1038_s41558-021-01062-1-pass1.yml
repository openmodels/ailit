Highlights:
  2: Conserving tree diversity presents a triple win for climate, biodiversity, and
    society.
  3: Climate change impacts tree diversity, which affects carbon storage in forests.
    Mitigation efforts can safeguard forest carbon storage by reducing climate impacts
    on tree diversity. The analysis provides large-scale estimates of productivity
    changes due to tree diversity changes resulting from climate change.
  4: Climate change mitigation conserves tree diversity and biodiversity-dependent
    productivity, particularly in colder and drier biomes.
  5: Countries with high CSCC tend to be those where climate change mitigation could
    greatly help maintain primary productivity by safeguarding tree diversity. The
    US and China could experience some of the biggest economic damages due to global
    warming. Brazil has the largest potential to benefit from climate mitigation efforts.
    Biodiversity conservation can be a significant part of the solution to the ongoing
    climate crisis.
  6: Diverse natural forests offer a 'triple win for nature, climate, and society'
    compared to monoculture plantations; quantity and quality of forests, especially
    species diversity, should be emphasized in climate stabilization efforts; most
    strategies to date have focused on avoiding further land conversion and expanding
    forested areas.
  7: The paper advocates for the protection and restoration of biologically diverse
    forests as a nature-based solution for climate change mitigation.
  9: No important outcomes of the analysis are specified on this page.
  10: The biodiversity of species and their rates of extinction, distribution, and
    protection.
  12: The page emphasizes the potential positive role of biodiversity conservation
    in mitigating climate change through stabilizing feedback loops.
