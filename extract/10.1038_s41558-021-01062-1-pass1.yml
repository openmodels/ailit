  21: "Source material here: We calculated proportional changes in \u03B1-diversity\
    \ from the year 2005 to the period of 2070s (%) and converted them into proportional\
    \ changes in forest productivity (%) based on parameters of the elasticity of\
    \ substitution (\u03B8), which we estimated for forest biomes worldwide17. By\
    \ comparing the number of widespread common species in each coarse grid between\
    \ the year of 2005 and 2070s, we obtained the number of common species extinct\
    \ or immigrated. This information was combined with our XGBoost regressions to\
    \ obtain the potential number of subordinate species co-extinct and co-immigrated\
    \ in each coarse grid. We applied these regressions to the results of species\
    \ distribution modelling (also see Fig. S2 for a schematic diagram). By comparing\
    \ the number of widespread common species in each coarse grid between the year\
    \ of 2005 and 2070s, we obtained the number of common species extinct or immigrated.\
    \ This information was combined with our XGBoost regressions to obtain the potential\
    \ number of subordinate species co-extinct and co-immigrated in each coarse grid.\
    \ We calculated proportional changes in \u03B1-diversity from the year 2005 to\
    \ the period of 2070s (%) and converted them into proportional changes in forest\
    \ productivity (%)."
  22: " \nobtained NPP values at the scale of fine grids. Here we assumed that all\
    \ fine grids in a given coarse grid showed the equivalent changes in productivity\
    \ [...] Based on these estimations, we have obtained absolute changes in forest\
    \ productivity (kg C m-2 yr-1) for different scenarios of climate/land-use changes\
    \ at the scale of fine grids. \n[...] To quantify the effect sizes of mitigation\
    \ efforts on conservation of species and productivity, we calculated the reductions\
    \ in local-scale loss of species (\u0394SR) and productivity (\u0394P) as a log\
    \ ratio scale [...]. Estimates based on the baseline and mitigation scenarios\
    \ were used for the denominator (control; \u0394SRbaseline and \u0394Pbaseline)\
    \ and numerator (treatment; \u0394SRmitigation and \u0394Pmitigation), respectively.\
    \ To facilitate interpretation, we multiplied -1 with the effect sizes and thereby\
    \ positive and negative values, respectively, indicate a more and less effective\
    \ climate change mitigation policy in reducing species loss and the associated\
    \ productivity loss [...] To ensemble results across the three GCMs, we obtained\
    \ global means and the associated 95% confidence intervals for each SSP scenario.\n\
    [...] For biome-level analyses, we used a mixed-effects meta-regression with the\
    \ effect size as a response variable, the GCMs as a random effect, and climate\
    \ conditions (mean annual temperature or precipitation of biomes) as a moderator.\n\
    [...] Here, the fine grids are defined as the local scale. We also focused on\
