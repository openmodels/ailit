  51: "Climatic data for coarse-scale were calculated by using the \u201Caggregate\u201D\
    \ function [raster R package50] and \u201Cbiovars\u201D function [dismo R package51].\
    \ Climate: We used climatic variables based on five of the General Circulation\
    \ Models (GCMs) included in the Fifth Coupled Model Inter-Comparison Project (CMIP5)\
    \ experiment: GFDL-CM39, HadGEM2-ES7, and MIROC-ESM-CHEM6, downloaded from the\
    \ WorldClim. Land-use: Changes in land use under the mitigation and baseline scenarios\
    \ were estimated by the AIM/CGE, a computable general equilibrium model representing\
    \ the entire global economy. we used future land-use variables generated by Fujimori,\
    \ et al. 10, which were based on five alternative socioeconomic conditions in\
    \ the Shared Socioeconomic Pathways (SSPs) framework. The SSPs are based on five\
    \ narratives describing how socioeconomic factors may change over the next century,\
    \ considering changes in population, GDP, energy, emissions, and land use. Two\
    \ of the SSPs describe futures in which challenges to adaptation and mitigation\
    \ are both weak (SSP1: sustainability) or both strong (SSP3: regional rivalry).\
    \ Two \u2018asymmetric cases\u2019 were designed, comprising a case in which strong\
    \ challenges to mitigation are combined with weak challenges to adaptation (SSP5:\
    \ fossil-fuelled development), and a case in which the opposite is true (SSP4:\
    \ inequality). Finally, a central case describes a world with intermediate challenges\
    \ for both adaptation and mitigation (SSP2: middle-of-the-road). The SSPs employ\
    \ a concept called scenario matrix architecture, which has a two-dimensional space\
    \ comprising socioeconomic patterns and climate mitigation levels defined by radiative\
    \ forcing levels (Representative Concentration Pathways; RCP). In this study,\
    \ we used a radiative forcing level of 2.6 W m\u22122 for the mitigation scenario\
    \ under SSP1, 2, 4, and 5."
  52: "yaml\nMethodology: \"First, by using the five land-use and 19 bioclimatic variables,\
    \ we generated all the possible combinations (224\u2009=\u200916,777,216) of these\
    \ variables. We then excluded explanatory variables showing collinearity: (1)\
    \ we excluded the set of explanatory variables that include pairs of highly correlated\
    \ variables (Pearson\u2019s product moment correlation coefficient\u2009\u2265\
    \u2009|0.70|), and (2) we excluded those explanatory variables for which the variance\
    \ inflation factor value, which indicates the degree of collinearity between two\
    \ or more predictor variables, was \u2265 5.\"\nMethodology: \"Temporal extent/time\
    \ period: 2050s and 2070s. For climatic data, we used the average of 2041-2060\
    \ for the 2050s and the average of 2061-2080 for 2070s.\"\nMethodology: \"Model\
    \ settings: We conducted parameter tuning for regularization parameters as we\
    \ described in the \u201CModel workflow\u201D section. We restricted the features\
    \ into two types (linear and quadratic) as described in the \u201CSDM algorithms\u201D\
    \ section. We used default settings for other parameters in MaxEnt.\"\nMethodology:\
    \ \"We used the continuous Boyce index (CBI)20 calculated on 10-fold cross- validation,\
    \ to evaluate model quality for predictions based on presence-only data.\"\nQuantitative\
    \ material: \"For the baseline scenario, we used the baseline condition in each\
    \ SSP corresponding to a radiative forcing level of 8.5 W m\u22122, which represents\
    \ the absence of additional climate policy.\"\n"
