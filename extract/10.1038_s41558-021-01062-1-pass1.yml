  55: "SSP1 Sustainability \u2013 Taking the Green Road (Low challenges to mitigation\
    \ and adaptation): The world shifts gradually, but pervasively, toward a more\
    \ sustainable path, emphasizing more inclusive development that respects perceived\
    \ environmental boundaries. Management of the global commons slowly improves,\
    \ educational and health investments accelerate the demographic transition, and\
    \ the emphasis on economic growth shifts toward a broader emphasis on human well-being.\n\
    \nSSP2 Middle of the Road (Medium challenges to mitigation and adaptation): The\
    \ world follows a path in which social, economic, and technological trends do\
    \ not shift markedly from historical patterns. Development and income growth proceeds\
    \ unevenly, with some countries making relatively good progress while others fall\
    \ short of expectations.\n\nSSP3 Regional Rivalry \u2013 A Rocky Road (High challenges\
    \ to mitigation and adaptation): A resurgent nationalism, concerns about competitiveness\
    \ and security, and regional conflicts push countries to increasingly focus on\
    \ domestic or, at most, regional issues. Policies shift over time to become increasingly\
    \ oriented toward national and regional security issues.\n\nSSP4 Inequality \u2013\
    \ A Road Divided (Low challenges to mitigation, high challenges to adaptation):\
    \ Highly unequal investments in human capital, combined with increasing disparities\
    \ in economic opportunity and political power, lead to increasing inequalities\
    \ and stratification both across and within countries.\n\nThe Shared Socioeconomic\
    \ Pathways (SSPs) provide narratives about different future societal development\
    \ paths. Each SSP is characterized by different challenges to mitigation and adaptation.\
    \ The analysis uses narrative descriptions of plausible future socioeconomic developments.\
    \ The SSPs can be linked to climate model projections to assess climate impacts\
    \ under different socioeconomic futures.\n"
