    changes. Uses net primary productivity (NPP) from MODIS imagery. Aggregates local
    productivity changes to biome, national, and regional scales.
  4: Climate change mitigation could curtail productivity losses by approximately
    9-39% compared to unabated warming.
  5: Conservation of biodiversity-dependent annual productivity by means of climate
    change mitigation corresponds to approximately 4.9-6.7% of the present total NPP
    in the terrestrial areas analysed.
  6: Estimated 45% of national-level commitments to restore forests propose monocultures
    of trees profitable for businesses.
