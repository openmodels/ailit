  42: "Source material: used models with CBI > 0 based on the 95  % confidence interval\
    \ for the subsequent analyses. To obtain a map of suitable habitat for each species\
    \ under the current conditions, the  average value of the relative probability\
    \ of occurrence calculated by the 10-fold cross-validation was converted into\
    \ a binary map. We applied the average of the 90   % sensitivity threshold to\
    \ minimize the false-negative fractions and to avoid underestimating the suitable\
    \ habitat  area21. For the future scenarios, a species\u2019 ability to disperse\
    \ and track the shifting climate, a crucial determinant of future potential for\
    \ range shifts22,23, was explicitly considered1. Because dispersal ability is\
    \ strongly related to life-history traits23, we collected information on life-history\
    \ traits for all target species and estimated dispersal distance for each species\
    \ by the 2070s. Here dispersal distance per generation was estimated from the\
    \ formula based on an earlier work23; we adopted \u2018group 5\u2019 formula in\
    \ dispeRsal function, which requires species-specific data for dispersal syndrome\
    \ and growth form. For dispersal syndrome, we compiled the database from various\
    \ sources (details are found in the Source Data of the earlier study1). For growth\
    \ form, we obtained the data from a database of The IUCN Red List of Threatened\
    \ Species (www.iucnredlist.org). Generation length was estimated according to\
    \ growth form24. Based on the above estimates, we obtained habitat maps for individual\
    \ species. The possible changes in areas hospitable to species under different\
    \ future scenarios are described in the earlier work1: briefly, the losses of\
    \ suitable habitats due to the combined effects of climate and land-use were estimated\
    \ to be smaller in the mitigation scenario than in the baseline scenario (e.g.,\
    \ approximately 17-28% and 22-36% for the mitigation and baseline scenario, respectively,\
    \ across a wide range of organism groups). Species richness and productivity estimation\
    \ For the calculations below, we have mainly relied on \u201Cvegan\u201D25, \u201C\
    mobsim\"26, and \u201Cxgboost\u201D27 package of the R software28. We projected\
    \ spatial distributions of individual species for the year 2005 and 2070s at the\
    \ spatial resolution of 30 arcminutes (coarse grids; n = 32,670). For both periods,\
    \ we obtained the total number of species present in each coarse grid (hereafter,\
    \ \u03B3-diversity). For the former year, we also projected spatial distributions\
    \ of individual species at the spatial resolution of 30 arcseconds (fine grids;\
    \ n = 115,426,714). Based on these projections, we calculated changes in species\
    \ richness at the scale of fine grids (hereafter, \u03B1-diversity) from 2005\
    \ to 2070s for different scenarios of climate and land-use changes. The reason\
    \ why we conducted this downscaling was that there could be a potential mismatch\
    \ due to scaling issues29,30. That is, changes in \u03B3-diversity are not universally\
    \ proportional to those in \u03B1-diversity across different coarse grains. Furthermore,\
    \ we relied on the values of the elasticity of substitution (\u03B8) of a previous\
    \ study31. Although assumed to be scale- independent, these estimates were developed\
    \ based on the forest inventory dataset collected at the local spatial scale.\
    \ We thus aimed to estimate the changes in productivity at this fine-scale. Here,\
    \ we first obtained species-area and endemics-area relationships (SARs and EARs,\
    \ respectively) for the year 2005 that were unique to each of the coarse grids;\
    \ 50 sub-grids were randomly chosen with 1 % intervals between the scales of the\
    \ fine and coarse grid to construct the curves26."
  43: "Source material here.\n\"To realize this, we first implemented two spatially\
    \ explicit simulations for species co-extinction and co-immigration.\"\n\"In an\
    \ artificial landscape with 3,600 homogeneous grids, we randomly draw between\
    \ 5 and 80 species with total occurrence between 500 and 180,000 individuals,\
    \ based on a lognormal species abundance distribution (SAD) with randomly assigned\
    \ parameters \u03BC and \u03C3 of SADs reported in different biomes.\"\n\"For\
    \ co-extinction simulation, we randomly made some of (up to half of) these common\
    \ species extinct from a meta-community. Other rare species that were present\
    \ in the same grid with these extinct common species were also forced to extinction.\"\
    \n\"For co-immigration simulation, we assumed that an artificial meta-community\
    \ resulted from additional immigration of both common and rare species.\"\n\"\
    We used large ranges of parameters (the number of species and individuals) because\
    \ of many possibilities in different biomes from tropics to northern woodlands.\"\
    \n\"Here we defined common species as abundant species that had an abundance rank\
    \ of 25 % or below.\"\n\"Note that, in reality, species extinction can occur spatially\
    \ in a non-random fashion and the consequences for ecosystem functioning may differ\
    \ between random and non-random loss of species.\"\n"
  44: "`\nSource material here.\n\nmeta-community. We also removed individuals of\
    \ other species that were present in the same grid with these common species,\
    \ assuming that these grids became newly hospitable in a post-immigration meta-community.\
    \ We repeated the above co-extinction and co-immigration simulations 25,000 times,\
    \ respectively. From that, we had an estimate of how many rare species could be\
    \ co-extinct or co-immigrated with common species in these simulated meta-communities.\
    \ Then we used a method of extreme gradient boosting (XGBoost)27 to obtain machine\
    \ learning regressions for predicting the number of species co-extinct and co-immigrated\
    \ based on other information described above (different diversity metrics explained\
    \ above, parameters of SAD, total frequency occurrence of existing species, and\
    \ the number of common species extinct or immigrated). We assigned 5,000 and 20,000\
    \ results of the simulation runs for evaluation and training, respectively. The\
    \ best regressions were obtained using a 10-fold cross validation (tested with\
    \ the root mean square error performance metric). Overall, the regressions for\
    \ predicting the number of species co-extinct/co-immigrated showed reasonable\
    \ goodness of fit (R2 = 0.802 and 0.593 for species co-extinction and co-immigration,\
    \ respectively). We applied these regressions to results of species distribution\
    \ modelling (also see Supplementary Fig. 2 for a schematic diagram). By comparing\
    \ the number of widespread common species in each coarse grid between the year\
    \ of 2005 and 2070s, we obtained the number of common species extinct or immigrated.\
    \ By combining this information with the same set of information required for\
    \ our XGBoost regressions, all of which were obtained from the 2005 data for each\
    \ of the 32,677 coarse grids, we regressed the potential number of subordinate\
    \ species co-extinct and co-immigrated. These regressions allowed us to predict\
    \ potential \u03B3-diversity for the period of 2070s in each of the coarse grids.\
    \ When we observed extinctions of some species for the 2070s in a given coarse\
    \ grid, we converted this total number of species lost into a proportion of habitats\
    \ that was required for losing these species based on the unique EAR40. When we\
    \ observed immigration by some species for the 2070s in a coarse grid, then we\
    \ converted this total number of species gained into a proportion of habitat that\
    \ was required to gain these species based on the unique SAR40. By multiplying\
    \ these proportional changes in the habitable areas for the period of 2070s with\
    \ species richness values at the scale of fine grids, which were expected from\
    \ the unique SARs in the year 2005, we obtained the values of \u03B1-diversity\
    \ in the 2070s. In some coarse grids, it was not possible to obtain unique SARs\
    \ or EARs for reasons such as low \u03B3-diversity in northern biomes. In such\
    \ a case, we assumed that proportional changes in the habitable areas between\
    \ the two periods were estimated by relying on an empirical SAR with the slope\
    \ value of 0.3 in log-log space41,42. Based on the changes in \u03B3-diversity,\
    \ we estimated the values of \u03B1-diversity in the 2070s. Note that, likewise\
    \ the year of 2005, each of the coarse grids in the period of 2070s also had a\
    \ single unique value of \u03B1-diversity (n = 32,670).\n\nWe calculated proportional\
    \ changes in \u03B1-diversity from the year of 2005 to the period of 2070s (%),\
    \ and converted them into proportional changes in forest productivity (%) based\
    \ on\n"
  45: "Source material here.\nEvaluation overview: \"the elasticity of substitution\
    \ can be used to estimate forest productivity based on proportional changes in\
    \ species richness of tree species (i.e., \u03B1-diversity).\" \nQuantitative\
    \ material: \"The \u03B8 values were estimated across the forested biomes worldwide31,\
    \ ranging between 0.198 and 0.299; a global mean was estimated as 0.26 with a\
    \ standard deviation of 0.09...the total NPP was approximately 43.78 Pg C yr-1...\"\
    \nMethodology: \"parameters of the elasticity of substitution (\u03B8), which\
    \ were estimated for forest biomes worldwide...calculated from the sum of individual\
    \ tree stem volume...We used a net primary productivity (NPP) dataset estimated\
    \ using the MODIS imagery43 for the year 2005...results are also shown for non-forested\
    \ biomes...We primarily relied on 'maptools'44, 'sf'45, and 'tidyverse'46 package\
    \ of the R software28 for summarizing our estimates.\"\n"
  46: "Source material here.\n                                                   \
    \                                                                            \
    \                                                   To quantify the effect sizes\
    \ of mitigation efforts on conservation of species and productivity, we calculated\
    \ the reductions in local-scale loss of species (\u0394SR) and productivity (\u0394\
    P) as a log ratio scale, which assumes that zero corresponds to the true absence\
    \ of the outcome (i.e., no difference between the two scenarios).\n  \nEstimates\
    \ based on the baseline and mitigation scenarios were used for the denominator\
    \ (control; \u0394SRbaseline and \u0394Pbaseline) and numerator (treatment; \u0394\
    SRmitigation and \u0394Pmitigation), respectively. We used \u201CARPobservation\u201D\
    47 package of the R software28 to obtain log-response ratios and the associated\
    \ 95% confidence intervals for each of the combinations of SSP scenarios and GCMs.\n\
    \nTo ensemble results across the three GCMs, we adopted a meta-analytical approach;\
    \ we used \u201Cmetafor\u201D48 package to obtain global means and the associated\
    \ 95% confidence intervals for each SSP scenario. We repeated the above calculations\
    \ at the biome- and IPBES subregion-, and country-scale. For biome-level analyses,\
    \ we used the same package for a mixed-effects meta-regression with the effect\
    \ size as a response variable, the GCMs as a random effect, and climate conditions\
    \ (mean annual temperature or precipitation of biomes) as a moderator.\n\nWe thus\
    \ summed up the differences between the \u0394Pbaseline and \u0394Pmitigation\
    \ within each country and multiplied these values by the area of each country\
    \ (Pg C yr-1). The country areas were obtained by summing up areas of the fine\
    \ grids analysed for the changes in biodiversity and productivity, by considering\
    \ the changes in fine grid area (m2) along a latitudinal gradient. \n"
  47: "Source material: Lastly, we summed up the reduction in productivity loss across\
    \ all countries, under each of SSPs and GCMs. This gave us the estimate of global\
    \ productivity conservation... these SSPs are based on contrasting assumptions\
    \ including those about deforestation and reforestation/afforestation10,13,14.\
    \ While substantial reforestation is expected in the SSP1 mitigation scenario,\
    \ the expansion of bioenergy crops at the expense of forest area is assumed to\
    \ occur in the SSP3 mitigation scenario. Also, little and large shrink of forest\
    \ areas is expected for the SSP1 and SSP3 baseline scenario, respectively. ...\
    \ results were affected by land area, using the GAMMs... Likely reflecting these\
    \ contrasts, global \u0394Pbaseline and \u0394Pmitigation were both relatively\
    \ small (SSP1) and both relatively large (SSP3), resulting in similar values of\
    \ productivity conservation."
  48: "Source material: For each of the target species, we developed a MaxEnt model\
    \ for predicting the distribution probability by iteratively using the prepared\
    \ possible combinations of explanatory variables without multicollinearity issues\
    \ (See Multicollinearity section for the details). To select the most parsimonious\
    \ combination of explanatory variables, corrected Akaike information criterion\
    \ (AICc) values were compared among the candidate models, and the model with the\
    \ minimum value was selected 17. Then, we performed parameter tuning for the regularization\
    \ parameter (beta) in MaxEnt models based on AICc. We tested \xDF values from\
    \ 0 to 15 (in increments of 0.5). Algorithms: We fitted MaxEnt15 to occurrence\
    \ data. MaxEnt was chosen due to competitive performance on a small sample size\
    \ and presence-only data \u2022 Model complexity: MaxEnt models were built with\
    \ linear and quadratic features only, to reduce the risk of the model overfitting.\
    \ Hypotheses: We used climate (annual trends, seasonality, and extreme or limiting\
    \ factors) and land-use as important environmental predictor variables for tree\
    \ and shrub species on the global scale."
