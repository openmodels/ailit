  12: Source material here. There is much emphasis on the undesirable feedbacks where
    climate change drives biodiversity loss (magenta arrows feedback). Here, we highlight
    the contribution of an underutilized positive feedback in which biodiversity-dependent
    productivity could contribute to climate change mitigation (blueish green arrows
    feedback). The conservation and restoration of tree diversity could enhance this
    feedback and promote the desirable pathway whereby forest biodiversity contributes
    to climate change mitigation. The diagram and text collectively emphasize the
    complex interactions and mutual influences among biodiversity, climate, and carbon.
