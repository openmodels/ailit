sourcematerial:
  2: 'yaml

    Evaluation overview: "Here, we quantify how tree and shrub species richness could
    affect biomass production at biome, national and regional scales. We find that
    greenhouse gas mitigation could help maintain tree diversity and thereby avoid
    a 9-39% reduction in terrestrial primary productivity across differ biomes, which
    cold otherwise occur over the next 50 years."

    Quantitative material: "We find that greenhouse gas mitigation could help maintain
    tree diversity and thereby avoid a 9-39% reduction in terrestrial primary productivity
    across differ biomes, which cold otherwise occur over the next 50 years."

