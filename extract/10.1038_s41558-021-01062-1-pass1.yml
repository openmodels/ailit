  19: "Source material here.\nAIM/CGE implements climate change mitigation in the\
    \ form of a global uniform carbon tax on GHG emissions from the agriculture, land-use,\
    \ and energy sectors. ... The SSPs employ a concept called scenario matrix architecture,\
    \ which has a two-dimensional space comprising combinations of socioeconomic patterns,\
    \ represented by the SSPs, and climate change mitigation levels, represented by\
    \ RCPs. ... Using these variables, we employed MaxEnt v3.3 for predicting the\
    \ current and future probability of occurrence of target species. First, by using\
    \ the five land-use and 19 bioclimatic variables, we generated all possible combinations\
    \ of these explanatory variables. ... We selected the most parsimonious combination\
    \ of explanatory variables based on corrected Akaike information criterion. Among\
    \ the final models developed for all species, we discarded those with poor performance\
    \ for subsequent analyses based on 10-fold cross validation, as follows. We used\
    \ models with Boyce index > 0 based on the 95 % confidence interval for the subsequent\
    \ analyses. ... For future scenarios, we explicitly included a species\u2019 ability\
    \ to disperse and track the shifting climate by considering dispersal traits.\n"
