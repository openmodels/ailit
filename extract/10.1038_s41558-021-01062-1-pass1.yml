  3: "Source material here: \"We assess how efforts to mitigate climate change can\
    \ reduce climate impacts on the diversity of woody plant species (hereafter, tree\
    \ diversity) which, in turn, can safeguard the ability of forests to store carbon\
    \ (Fig. 1). To assess this potential at the global scale, we quantified future\
    \ shifts in species richness at the local scale (i.e., 30 arcseconds, the total\
    \ number of grids ~ 115 million; Fig. 2) by combining multiple methods of ecological\
    \ modelling (See Methods for the details). We combined these local-scale estimates\
    \ of species richness changes with local-scale estimates of proportional changes\
    \ in primary productivity in response to richness changes17\u2014a parameter estimated\
    \ within forests, which reflects the strength of local tree diversity effects\
    \ on productivity after accounting for climate and soil covariates. Then, by further\
    \ multiplying these estimates by net primary productivity (NPP; Pg C year-1) derived\
    \ from MODIS (Moderate Resolution Imaging Spectroradiometer) imagery26, we quantified\
    \ how proportional changes in local species richness could affect changes in biomass\
    \ production (i.e., tree diversity-dependent productivity) at the local scale.\
    \ Finally, we aggregated these changes in local productivity to produce large-scale\
    \ estimates of changes in productivity (due to changes in tree diversity resulting\
    \ from climate change) at biome, national, and regional scales (Figs. 3-5). Note\
    \ that, among many primary producer species, we especially focused on tree and\
    \ shrub species (hereafter jointly referred to as trees) in different biomes.\
    \ As some of them are present also in non-forested biomes, our global analyses\
    \ extend to woody species in all terrestrial biomes (all 14 biomes defined by\
    \ the World Wildlife Fund: www.worldwildlife.org/biomes). At a regional scale,\
    \ we focused on the subregion categories of the Intergovernmental Science-Policy\
    \ Platform on Biodiversity and Ecosystem Services (IPBES: ipbes.net/regional-assessments)7.\
    \ Our analyses used five shared socioeconomic pathways (SSPs) reflecting different\
    \ plausible projections of land-use change27. The underlying allocation scheme,\
    \ based on an integrated assessment model, implements climate change mitigation\
    \ in the form of a globally uniform carbon tax on greenhouse gas emissions from\
    \ the agriculture, land-use, and energy sectors27. Using a scenario matrix architecture,\
    \ we compared two future scenarios: high-emission baseline versus mitigation scenario28.\
    \ The mitigation scenario assumes levels of greenhouse gas emissions will stabilize\
    \ the global mean temperature rise relative to preindustrial times to less than\
    \ 2 \xB0C by the end of the 21st century. The baseline scenario assumes a continued\
    \ increase in greenhouse gas emissions, and thus also the global mean surface\
    \ temperature continues to rise. We relied on three General Circulation Models\
    \ (GCMs) to consider two different representative concentration pathways (RCPs)\
    \ in each of the five SSPs27. Thus, we considered a wide range of future land\
    \ allocation and climate conditions28.\""
