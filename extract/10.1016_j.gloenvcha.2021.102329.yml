Evaluation overview:
  2: This provides an overview of economic development, disaster risk (associated
    with flooding, landslides, and windstorms), growth, inequality, poverty, and vulnerability
    to catastrophic events.
  3: The paper examines the impacts of disasters as the sum of death toll and people
    affected, using the Emergency Events Database (EM-DAT).
  4: The analysis includes the frequency and impact of climate-related natural disasters
    globally with focus on different typologies like floods, droughts, and storms.
  5: Damages due to natural disasters, and income inequality (Gini coefficient).
  6: The paper evaluates the impact of natural disasters on mortality and population
    affected, normalized by previous year's population.
  7: Evaluates the impact of natural disasters (measured by the number of people hit)
    and inequality (Gini index).
  8: The outcome being evaluated is the number of people affected by natural disasters,
    as measured by the HIT variable, and income inequality, as measured by the Gini
    index.
  9: The analysis evaluates the number of persons affected by different types of disasters,
    divided into dry and wet disasters.
  10: Evaluates the impact of different types of disasters (all, dry, wet) on income
    inequality, measured by the Gini index.
  11: The study examines the impact of climate change-induced disasters on countries,
    population groups, and income groups, focusing on their ability to recover and
    prepare for future events, specifically in relation to natural disasters between
    1992 and 2018.
  12: No relevant information
Highlights:
  2: The impact of natural disasters is uneven across segments of the population within
    a country. Income inequality exacerbates the impacts of catastrophic events. Lack
    of access to mitigation and prevention measures is important.
  3: The paper posits that unequal societies suffer greater physical damages and engage
    in a vulnerability-disaster trap where damages from natural disasters further
    widen income inequality.
  4: The data shows floods affect the most people globally, followed by droughts and
    storms.
  5: Damages due to natural disasters are hypothesized to be harsher in unequal societies
    and lead to increasing inequality. Institutional quality (adaptation deficit)
    can ensure a better resilience and adaptation capacity to disasters.
  7: Gini index is positively and significantly correlated with the number of people
    hit by natural disasters.
  8: "Increased inequality is a positive predictor of the number of people affected\
    \ by natural disasters. An increase in the number of people affected by disasters\
    \ leads to a substantial rise in inequality. The human development level (NHDI)\
    \ is initially a positive predictor of exposure to risk, but when controlled for\
    \ gender equality (GNHDI), the quadratic form is negative and significant (models\
    \ 4\u20135), indicating an inverted U-shaped relation between the development\
    \ level and the magnitude of impacts. The share of public consumption expenditure\
    \ on GDP (Public exp) is positively associated with a higher number of persons\
    \ affected by damages, while investment expenditures in nonfinancial assets (Public\
    \ inv) is significantly and negatively related to the magnitude of impacts."
  9: "La Ni\xF1a has a significant positive effect on the number of people affected\
    \ by wet disasters, while no significant effect of El Ni\xF1o is found."
  10: Wet disasters have a greater impact on income inequality than dry disasters.
    Ethnic marginalization exacerbates income inequality in the event of frequent
    wet disasters. The impact of past shocks is statistically significant only for
    wet events. There is a negative and statistically significant interaction between
    income level and cumulative frequency of disasters, indicating that wealthier
    countries are more resilient to disasters.
  11: Countries with higher levels of inequality that have been affected more frequently
    by extreme climatic events may be trapped in a vicious cycle, unable to restore
    a fair distribution of income and resources.
  12: No relevant information
Methodology:
  3: "The analysis is based on a panel database of 149 countries over the period 1992\u2013\
    2018, focusing on climate-related natural disasters, like floods, landslides,\
    \ storms, droughts, extreme temperatures, and wildfires."
  5: Uses a system of simultaneous equations and a Three-Stage Least Square (3SLS)
    estimator to analyze the relationship between damages due to natural disasters
    and income inequality. This approach addresses the potential correlation of error
    terms between equations, unlike standard OLS. The analysis controls for various
    factors including government resilience propensity, disaster patterns, geographical
    location, climate variables (ONI), and country-based control variables (surface
    area, rural population, institutional quality, ethnic inequality).
  6: The analysis uses exogenous instruments to address endogeneity, including distance
    from the Equator and value added in agriculture as percentage of GDP.
  7: "Uses a system of equations (2 and 3), instrumental variable approach (distance\
    \ from the equator), fixed effects, and controls for El Ni\xF1o/La Ni\xF1a. The\
    \ estimation is controlled using the Akaike Information Criterion (AIC) and the\
    \ Bayesian Information Criterion (BIC)."
  8: Panel data analysis is used to estimate the relationship between inequality (Gini
    index) and the number of people affected by natural disasters (HIT), controlling
    for various socioeconomic factors. Standard errors, p-values, AIC, BIC, RMSE,
    and VIF are reported to assess the statistical significance and robustness of
    the results. The analysis uses data from 3419-3544 observations.
  9: The analysis uses a regression model to evaluate the impact of various factors
    on the normalized number of persons affected by disasters, incorporating lagged
    variables and categorical division of disasters.
  10: Panel data regression analysis is used to assess the impact of disasters on
    income inequality. The models control for GDP per capita, HDI, public expenditure,
    institutional quality, and ethnic marginalization.
  11: The study empirically explores the relationship between natural disasters and
    socioeconomic factors, specifically inequality, using data from 1992 to 2018;
    relationships are shown by stratifying by the Gini index.
  12: No relevant information
More Notes:
  3: The paper includes three hypotheses linking natural disasters, inequality, and
    resilience, suggesting a self-reinforcing dynamic between these factors.
  5: The paper uses continent dummies to control for multi-collinearity, excluding
    Europe as the benchmark.
  6: The paper highlights the issue of endogeneity in studying the impact of disasters
    on socioeconomic factors, suggesting the use of lagged values as a common practice.
  7: The paper attempts to disentangle the effects of dry and wet disasters, and checks
    for multicollinearity using Variance Inflation Factor (VIF).
  8: The paper tests three hypotheses related to the relationship between inequality
    and natural disasters.
  10: The study finds evidence of a 'vulnerability-disaster trap' where the effects
    of disasters on income inequality are persistent and self-reinforcing.
  11: The authors emphasize the importance of understanding natural disasters as a
    combination of climatic and socioeconomic factors and advocate for adaptation
    mechanisms and equitable access to precautionary and recovery measures.
  12: This page contains declarations of competing interest and acknowledgements of
    funding. It also contains the start of a list of references, none of which belong
    to the primary paper.
