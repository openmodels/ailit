sourcematerial:
  2: "  \n\"The relationship between economic development and disaster risk associated\
    \ to flooding, landslides and windstorms has an inverted U shape.\" \n\n\"Another\
    \ issue of interest is that the impact of natural disasters is uneven across segments\
    \ of the population within a country.\"\n\n\"Research on the impact of natural\
    \ disasters had seldom considered inequality as a factor for vulnerability.\"\n\
    \n\"Lack of access to mitigation and prevention measures is to natural disasters\
    \ what \u2018entitlement relations\u2019 are to famines.\"\n\n\"Uneven distribution\
    \ of income, of power and of political representation across social groups leads\
    \ to unequal access to prevention and recovery measures, and to financial resources.\"\
    \n"
  3: "represents the impacts of disasters as the sum of death toll and people affected\
    \ by each event. These variables are built using the Emergency Events Database\
    \ (EM-DAT), developed by the Centre for Research on the Epidemiology of Disasters\
    \ (CRED), the most comprehensive source on natural catastrophes (Wirtz et al.,\
    \ 2014). Our conjecture is that inequality hinders reconstruction and recovery\
    \ thus further reducing access to basic services to the poorest segments of the\
    \ population. Our analysis is based on a panel database of 149 countries over\
    \ the period 1992\u20132018. To test Hypothesis 1, the dependent variable HIT\
    \ represents the impacts of disasters as the sum of death toll and people affected\
    \ by each event. Hypothesis 1. Unequal societies suffer greater physical damages\
    \ due to natural disasters. Hypothesis 3. Unequal societies suffer from a vulnerability-disaster\
    \ trap whereby damages due to natural disasters further widen income inequality\
    \ and further reduce resilience. Our conjecture is that inequality hinders reconstruction\
    \ and recovery thus further reducing access to basic services to the poorest segments\
    \ of the population. Accordingly, we test the simultaneous validity of the two\
    \ causal relations discussed in the literature: first, that natural disasters\
    \ affect inequality and, second, that income distribution affects resilience to\
    \ the damages caused by natural disasters. Such an exercise is articulated in\
    \ three hypotheses."
