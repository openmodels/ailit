  8: "The outcome being evaluated is the number of people affected by natural disasters,\
    \ as measured by the HIT variable, and income inequality, as measured by the Gini\
    \ index. An increase in inequality is a positive predictor of the number of people\
    \ affected by natural disasters. We interpret this as an outcome of unequal access\
    \ to precaution and prevention measures as well as to health services in the aftermath\
    \ of an event, as per H1. To quantify the effect, on average in the eight models\
    \ reported in Table 2a, a 1% increase in the Gini index in a country at the 75th\
    \ percentile corresponds to 3.7% more people hit by natural disasters than in\
    \ a country at the 25th percentile. Accordingly, inequality per se causes a relative\
    \ increase in impacts and damages provoked by disasters. Further, the positive\
    \ sign of HIT in the inequality equation corroborates H2. An increase in the number\
    \ of people affected by disasters entails a substantial rise of inequality, with\
    \ the coefficient of HIT ranging between 68.5 in model 6 to 95.3 in model 1 that\
    \ includes only base controls. The interquartile range on average is 17.5%, revealing\
    \ that people living in places with higher exposure risks to damages might also\
    \ suffer from further inequality. Looking specifically at the four main dimensions,\
    \ our preferred measure of adaptation demand (GDP per capita) is, as expected,\
    \ negative but statistically significant only in the first two specifications.\
    \ On the other hand, the human development level (NHDI) is a positive predictor\
    \ of higher exposure to risk. The addition of the quadratic term of the simple\
    \ Human Development Index (NHDI_sq) in model (3) does not affect our results.\
    \ Conversely, along with recent findings by Chowdhury et al. (2021) and Paudel\
    \ and Ryu (2018), when we control for gender equality (GNHDI) in access to basic\
    \ opportunities (i.e., education, health, and access to the labour market) the\
    \ quadratic form is negative and significant (models 4\u20135), thus indicating\
    \ an inverted U-shaped relation between the development level and the magnitude\
    \ of impacts. The share of public consumption expenditure on GDP (Public exp)\
    \ is positively associated with a higher number of persons affected by damages.\
    \ On average, such a threshold corresponds to a gender-corrected development index\
    \ of about 0.81, which is the score of all developed economies and of Azerbaijan,\
    \ Barbados, Bhutan, Fiji, Kyrgyzstan, Mongolia, Qatar, Tajikistan, Vietnam. Standard\
    \ errors in parentheses. * p < 0.1, ** p < 0.05, *** p < 0.01. No. Observations\
    \ 3544 3544 3544 3469 3419 3444 3419 3419."
