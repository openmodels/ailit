sourcematerial:
  1: "The practice of cover crops has gained popularity as a strategy to improve agricultural\
    \ sustainability, but its full potential is often limited by environmental trade-offs.\
    \ Using meta-analytic and data-driven quantifications of 2302 observations, we\
    \ optimized cover crop practices and evaluated their benefits for global agroecosystems.\
    \ [...] is the optimal portfolio. Such optimized practices are projected to increase\
    \ agroecosystem multiservices by 1.25%, equivalent to annual gains of 97.7 million\
    \ metric tons in crop production, 21.7 billion metric tons in carbon dioxide sequestration,\
    \ and 2.41 billion metric tons in soil erosion reduction. By 2100, the continued\
    \ implementation of optimized practices could mitigate climate-related yield losses\
    \ and contribute to climate neutrality and soil stabilization, especially in harsh\
    \ and underdeveloped areas. These findings underscore the promising potential\
    \ of optimized cover crop practices to achieve the synergy in food security and\
    \ environmental protection.\"\n\n[...] Between the growth cycles of two cash crops,\
    \ offering various benefits to agroecosystems through surface coverage and crop\
    \ diversification, including provision (e.g., food and feed supply), regulation\
    \ (e.g., carbon (C) storage and climate mitigation), and support (e.g., soil stabilization\
    \ and erosion control). [...]\n\nTherefore, achieving higher yields with lower\
    \ environmental costs\u2014i.e., to synchronously achieve the interlinked sustainable\
    \ development goals (SDGs)\u2014is an inevitable challenge. [...] Perceived as\
    \ one of climate solutions, cover crops (CCs) represent a potential strategy to\
    \ safeguard food production while reducing environmental impacts."
