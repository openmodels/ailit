    \ and greatly enhance MWD without yield penalty...these positive feedbacks constantly\
    \ intensify with time...\""
  10: "Source material here.\nThe analysis used data from 218 studies and 241 publications,\
    \ applying PRISMA methodology for screening. Quantified effect sizes using natural\
    \ log response ratio and calculated effect sizes with mixed-effects models in\
    \ R. Examined interactions between cover crops (CC) and agricultural management\
    \ using two-factor experiments. Effect size calculated as the percentage change\
    \ where 95% CI did not overlap with 0 indicating a substantial positive or negative\
    \ effect. Soil organic carbon (SOC) and cellulase activity from long-term CC experiments\
    \ analyzed, with data from 82 and 305 observations, respectively. Efforts include\
    \ simulations using APSIM model to project outcomes on SOC stocks and crop yields\
    \ under different CC scenarios. Used funnel plots and Egger\u2019s regressions\
    \ to assess publication bias; none was observed, supporting the robustness of\
    \ results.\n"
  11: "Source material here: for CC effects on \uFB01 ve agroecosystem services (ln\
    \ RRs). To explore whether optimizing CC practices can sustain bene\uFB01 ts to\
    \ global agroecosystems under future changing climate conditions, we projected\
    \ CC effects in two scenarios of Shared Socioeconomic Pathway (SSP) using \uFB01\
    \ ve bias-corrected climate model outputs provided by the ISIMIP3b simulation.\
    \ NGHGB (Pg CO2 yr\u2212 1) = 44/12 \xD7 SOCstock \u2212 273 \xD7 N2O \u2212 27\
    \ \xD7 CH4. We performed MF analyses using the R package metaforest75 to quan-tifytherelativeimportanceofenvironmentalandmanagementfactors\
    \ for CC effects on \uFB01 ve agroecosystem services (ln RRs)."
  12: "\nFurther information on research design is available in the Nature Portfolio\
    \ Reporting Summary linked to this article. Data used in this study has been deposited\
    \ in GitHub (https://github.com/TianyiQiu13/Cover-crop-multiservices). Climate\
    \ model outputs from ISIMIP3b are available at https://data.isimip.org. The global\
    \ soil micronutrient concentration and national SDG index data were obtained from\
    \ a public dataset (https://\uFB01gshare.com/s/8ff4083eb0ddb84ba056) and SDG transformation\
    \ center (https://sdgtransformationcenter.org), respectively. Other baseline data\
    \ can be found in Supplementary Information. Source data are provided as a Source\
    \ Data \uFB01le. Source data are provided with this paper. The code that supports\
    \ the \uFB01ndings of this study has been deposited in Zenodo (https://doi.org/10.5281/zenodo.14025624)(ref.\
    \ 84).\n"
