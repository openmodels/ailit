Drivers of Risk:
  1: The increased wildfire risk and severity in California are due to climate change,
    expansion of the wildland-urban interface, and fire suppression practices.
  2: Increased PM2.5 exposure from wildfires is identified as a key driver of mortality
    risk.
  3: Fire-only PM2.5 concentrations are the primary driver of increased mortality
    risk.
  4: Wildland fire smoke is identified as a significant driver of mortality impacts
    across California.
  5: Wildland fires are identified as the primary drivers of risk, impacting mortality
    and economic outcomes via PM2.5 exposure.
  6: Wildland fires, PM2.5 exposure
  7: Wildfire events leading to PM2.5 exposure.
  8: Wildfire PM2.5 concentrations separated from other PM2.5 sources.
  9: Wildland fire emissions including wildfires and prescribed burns (excluding agricultural
    burns) contribute to PM2.5 exposure.
  10: Exposure to PM2.5 due to wildfires
  11: The page identifies wildland fire smoke as a driver impacting PM2.5 concentrations
    and mortality.
Evaluation overview:
  1: The paper evaluates mortality attributable to PM2.5 exposure from wildland fires
    in California from 2008 to 2018.
  2: The paper evaluates premature deaths due to wildland fires over an 11-year period
    in California from 2008 to 2018, focusing on mortality impacts from PM2.5 exposure.
  3: Mortality and economic valuation impacts of wildland fires due to PM2.5 exposure
    in California are evaluated.
  4: The paper evaluates long-term mortality impacts attributable to wildfire-specific
    PM2.5 in California from 2008 to 2018.
  5: The paper provides an overview of outcomes related to mortality and economic
    valuation attributable to wildland fire PM2.5 exposure in California between 2008
    and 2018.
  6: Economic valuation of mortality impacts from wildland fires in California
  7: The study evaluates mortality impacts related to wildfire PM2.5 exposure.
  8: Mortality risk due to wildfire PM2.5 exposure.
  9: The analysis evaluates the mortality impacts of PM2.5 from wildland fire smoke
    on the health of the California population over the period of 2008 to 2018.
  10: This paper quantifies the total mortality burden for exposure to PM2.5 due to
    wildfires in California at the ZIP code level.
  11: The page discusses the assessment of mortality burden from exposure to PM2.5
    due to wildland fire smoke in California.
Highlights:
  1: The findings suggest that wildfires in California account for a greater mortality
    and economic burden than indicated by earlier studies.
  2: Wildfire management is emphasized as increasingly important due to intensifying
    aridification and susceptibility to fires, with the study estimating PM2.5-related
    premature deaths due to wildland fires in California.
  3: "Fire-only concentrations exceed 15 \u03BCg/m3 in several locations throughout\
    \ the state in the high-fire years."
  4: High population areas such as Los Angeles County, San Joaquin Valley, and the
    Bay Area experience widespread mortality impacts due to transported smoke.
  5: Key outcomes include premature deaths attributable to wildfire PM2.5 exposure
    and a significant economic valuation of $432 billion to $456 billion in losses
    (2015 dollars) for California.
  6: California is one of the states with the most notable mortality and respiratory
    morbidity impacts from PM2.5 over the period 2008-2012.
  7: The use of fire-only PM2.5 estimates from the CMAQ model and highly resolved
    health data at the ZIP code level are distinct strengths of the study. The study
    also applies a fire-specific dose-response coefficient.
  8: Wildfire PM2.5 may have unique physical-chemical components that amplify its
    toxicity and therefore are potentially more harmful to human respiratory health
    compared to undifferentiated PM2.5 from other sources.
  9: The substantial mortality and economic impacts from wildfires emphasize the importance
    of community resilience and protecting vulnerable populations.
  10: The application of an undifferentiated dose-response value to wildland fire-specific
    PM2.5 exposures may underestimate mortality impacts. The paper calculates a chronic
    dose-response value accounting for potential added toxicity of wildfire smoke,
    as suggested in California-specific analyses.
Methodology:
  1: The analysis uses Community Multiscale Air Quality modeling system wildland fire
    PM2.5 estimates and applies a ZIP code-level mortality data and estimated wildfire-specific
    dose-response coefficient.
  2: The analysis uses modeled wildland fire-associated PM2.5 concentrations, high-resolution
    mortality data, and a chronic dose-response coefficient for wildfire PM2.5 exposures.
  3: "A chronic wildfire-specific dose-response value (\u03B2WL) is derived to account\
    \ for the potential increased toxicity of wildfire smoke, and compared to an undifferentiated\
    \ PM2.5 dose-response value (\u03B2L)."
  4: Mortality impacts were estimated using both wildfire-specific and undifferentiated
    chronic dose-response values.
  5: The analysis uses a CMAQ model at a 12-km grid scale to estimate wildland fire
    PM2.5 exposure; it calculates premature mortality using a chronic dose-response
    value specific to wildfire exposure.
  6: The analysis uses a wildfire-specific dose-response value, a 3% discount rate,
    and a 2015 income year. They used wildfire-specific dose-response values as opposed
    to undifferentiated dose-response values which increased the magnitude of their
    findings.
  7: The study uses 11 years of CMAQ (Community Multiscale Air Quality) model data
    to estimate fire-only PM2.5 concentrations and assess mortality impacts in California.
    It applies a fire-specific dose-response coefficient accounting for increased
    toxicity of wildfire smoke. The analysis uses total mortality from all causes
    of death. The wildfire dose-response value was calculated using existing dose-response
    values.
  8: Modified existing estimates of long-term exposure to undifferentiated PM2.5 with
    adjustment for potentially different dose-response functions of wildfires compared
    to undifferentiated PM2.5, using a CTM for exposure assignment.
  9: Daily modeled PM2.5 concentrations for California from 2008 to 2018 are used,
    based on the U.S. EPA's CMAQ modeling system; these simulations isolate the contribution
    of fire to PM2.5.
  10: The analysis uses 11 years of CMAQ data (2008 to 2018) to develop estimates
    for each year and grid cell, then assigns exposures to each ZIP code in California
    using zonal statistics. The authors developed a wildfire-specific chronic dose-response
    coefficient, pooling dose-response values from a Washington state study and a
    global study with a U.S. estimate.
  11: The analysis involves calculating dose-response values, estimating the mortality
    burden using PM2.5 concentration changes, and applying economic valuation using
    the EPA's value of a statistical life.
More Notes:
  3: "The analysis was completed prior to the annual NAAQS update to 9 \xB5g/m3 announced\
    \ in February 2024."
  6: The use of more highly resolved health data can reduce potential misclassification
    of exposures. Capping fire-only concentrations at the 99.9th percentile results
    in fewer fire-only PM2.5 attributed deaths per year, but the overall magnitude
    of impacts remains substantial.
  7: The CMAQ model may overpredict PM2.5 during fire events. The model runs do not
    isolate wildfire emissions from prescribed burns, but the authors don't anticipate
    prescribed burning contributing substantially. The authors acknowledge uncertainties
    associated with the dose-response values, especially the wildfire-specific one.
  8: The actual degree of increased toxicity is not fully resolved and likely complicated
    by the large variability in the fuel type and wildfire emissions, weather patterns,
    combustion profiles, and resulting physical-chemical composition.
  10: 'A supplemental validation analysis comparing monthly average modeled concentrations
    to observed concentrations from ground station data is included in the Supplementary
    Materials. The paper conducted two mortality analyses: (i) base case, with no
    outliers removed, and (ii) mod cap, capping fire-only PM2.5 concentrations falling
    outside of the 99.9th percentile of modeled values.'
Quantitative material:
  1: The study estimates 52,480 to 55,710 premature deaths attributable to wildland
    fire PM2.5 over 11 years, with an economic impact of $432 to $456 billion.
  2: The analysis provides quantitative estimates of PM2.5 concentrations from wildfires,
    showing that fire-only PM2.5 contributed between 6.9% and 49% of total PM2.5 concentrations
    from all sources.
  3: 'Total mortality over the 11-year period (2008-2018) is estimated at ~55,710
    (95% CI: 4960 to 103,410) using the wildfire-specific dose-response value, and
    ~36,140 (95% CI: 24,740 to 44,320) using an undifferentiated PM2.5 dose-response
    value.'
  4: Total estimated deaths attributable to fire-only PM2.5 for the 11 years is 55,710
    using the primary results.
  5: 'The study estimates that 52,480 to 55,710 premature deaths (CI: 4610 to 103,410)
    are attributable to fire-only PM2.5 in California from 2008 to 2018.'
  6: Estimates of mortality impacts from wildland fires are presented alongside 95%
    confidence intervals for base case and modeled values capped scenarios.
  7: The study mentions that a sensitivity analysis using a global dose-response value
    resulted in approximately twice the mortality impact, with more than 100,000 deaths
    attributable to fire-PM2.5 over the 11-year period.
  8: Includes estimates of both adjusted (estimated wildfire-specific chronic dose-response
    value) and unadjusted (undifferentiated chronic dose-response value) long-term
    mortality associated with fire-only PM2.5 in Fig. 2, which shows the likely increases
    in mortality burden.
  9: The study estimates between 52,480 and 55,710 premature deaths attributable to
    fire-only PM2.5 exposures, valued economically at $432 billion to $456 billion.
  10: "The paper caps fire-only PM2.5 concentrations falling outside of the 99.9th\
    \ percentile of modeled values (at 143 \u03BCg/m3)."
  11: Quantitative information includes the use of a Monte Carlo distribution to estimate
    dose-response values and the application of the EPA's VSL at $8.7 million in 2015
    dollars.
sourcematerial:
  1: "Source material here.\nEvaluation overview: \"We estimate a total of 52,480\
    \ to 55,710 premature deaths are attributable to wildland fire PM2.5 over the\
    \ 11-year period...\"\nDrivers of Risk: \"In California, wildfire risk and severity\
    \ have grown substantially in the last several decades. Climate change... an expansion\
    \ of the wildland-urban interface... and questionable wildfire-management practices\
    \ emphasizing fire suppression have all contributed to this increased risk.\"\n\
    Quantitative material: \"...premature deaths are attributable to wildland fire\
    \ PM2.5... equating to an economic impact of $432 to $456 billion.\"\nMethodology:\
    \ \"we quantified the mortality burden for PM2.5 exposure from California fires\
    \ from 2008 to 2018 using Community Multiscale Air Quality modeling system wildland\
    \ fire PM2.5 estimates. We used a concentration-response function for PM2.5, applying\
    \ ZIP code\u2013level mortality data and an estimated wildfire-specific dose-response\
    \ coefficient accounting for the likely toxicity of wildfire smoke.\"\nHighlights:\
    \ \"These findings extend evidence on climate-related health impacts, suggesting\
    \ that wildfires account for a greater mortality and economic burden than indicated\
    \ by earlier studies.\"\n"
  2: "   \nSource material here. Here, we present a summary of the temporal, spatial,\
    \ and overall distribution of the Community Multiscale Air Quality (CMAQ) modeled\
    \ PM2.5 concentrations... we use modeled wildland fire-associated PM2.5 concentrations,\
    \ high-resolution California Department of Public Health (CDPH) mortality data,\
    \ and a calculated chronic dose-response coefficient for wildfire PM2.5 exposures\
    \ and mortality to estimate premature deaths due to wildland fires over an 11-year\
    \ period from 2008 to 2018. The importance of wildfire management will only grow\
    \ in the coming decades as aridification intensifies with climate change...\n"
  3: '

    '
  4: 'Source material here.

    The page provides information about the mortality impacts of wildland fire smoke
    in California. Specifically, it evaluates long-term mortality impacts due to fire-only
    PM2.5, highlighting that wildland fires are responsible for approximately 19%
    of PM2.5-associated deaths, escalating up to 42% during high-fire years. Quantitatively,
    it determines that a total of 290,540 deaths are attributable to undifferentiated
    PM2.5, while 55,710 deaths are estimated attributable to fire-only PM2.5 over
    11 years. Methodologically, the study employs both wildfire-specific and undifferentiated
    dose-response values to estimate these impacts. The study underscores widespread
    mortality impacts in urban centers like Los Angeles County and the Bay Area due
    to transported smoke from fires occurring in rural and forested regions.

    '
  5: "  \nHere, we report on modeled wildland fire PM2.5 estimates at the 12- km grid\
    \ scale for 2008 to 2018, estimate associated premature mortality using a chronic\
    \ dose- response value for wildfire exposure, and calculate the associated economic\
    \ valuation. We find that the modeled wildland fire- only PM2.5 estimates follow\
    \ anticipated spatial and temporal trends...\n\nAn estimated 52,480 (95% CI: 4610\
    \ to 98,340) to 55,710 (95% CI: 4960 to 103,410) premature deaths are attributable\
    \ to fire-only PM2.5 in California from 2008 to 2018 with respect to two exposure\
    \ scenarios, with an associated economic valuation of $432 billion and $456 billion...\n\
    \n...modeled wildland fire PM2.5 exposure, and uses highly resolved health data\
    \ in concert with a CTM (CMAQ) capable of isolating wildfire-related fine particle\
    \ concentrations.\n"
  6: "Source material: ***Economic valuation of mortality impacts from wildland fires***\
    \ \"Several studies quantify health impacts from exposure to PM2.5 during wildfires,\
    \ but few examine mortality in California specifically. A recent study by Wang\
    \ et al. (8) evaluating the economic footprint of the 2018 California wildfires\
    \ conducted a health impact assessment for one portion of the analysis. They estimated\
    \ 3652 premature deaths associated with wildfire PM2.5 exposure (8), which is\
    \ substantially lower than our estimates of 12,150 to 12,850 for 2018.\" ***Drivers\
    \ of Risk*** \"Our use of a wildfire-specific dose-response value (as opposed\
    \ to an undifferentiated dose-response value, which we also present as a sensitivity\
    \ analysis) results in an increase in the magnitude of our findings.\" ***Quantitative\
    \ material*** \"The scenario-specific analysis has several implications as well.\
    \ We find that capping fire-only concentrations at the 99.9th percentile (exceeding\
    \ 143 \u03BCg/m 3; see table S10) of values results in several hundreds to thousands\
    \ of fewer fire-only PM2.5 attributed deaths per year, but the overall magnitude\
    \ of impacts is still substantial with the peak concentrations capped.\" ***Methodology***\
    \ \"although results for California are not explicitly presented, the authors\
    \ reported that California is one of the several states in the country with the\
    \ most notable mortality and respiratory morbidity impacts over the 5- year period\
    \ (32). They estimated 14,000 premature deaths in the United States for the high-fire\
    \ year of 2008 as compared to our estimates of ~ 10,000 (for both scenarios) in\
    \ California alone. Again, our use of the wildfire-specific dose-response coefficient\
    \ has also increased the magnitude of our results.\" ***More Notes*** \"Our study\
    \ builds on this California-specific analysis by (i) using more highly resolved\
    \ health data, which can reduce potential misclassification of exposures associated\
    \ with using spatially coarse health data; (ii) extending the temporal period\
    \ of the health analysis (analyzing 11 years of data, instead of just 1); and\
    \ (iii) applying a chronic wildfire-specific dose-response value.\" "
  7: 'Source material here.

    Evaluation overview: "In addition, the CMAQ model runs do not isolate wildfire
    emissions from prescribed burns. Therefore, the results presented here include
    mortality associated with all wildland fires..."

    Drivers of Risk: "The use of 11 years of CMAQ data enabled us to report on a long-term
    period of wildfire impacts in California, with several high-fire years with substantial
    impacts."

    Quantitative material: "...with more than 100,000 deaths attributable to fire-PM2.5
    over the 11-year period."

    Methodology: "The use of 11 years of CMAQ data enabled us to report on a long-term
    period of wildfire impacts in California...The CMAQ modeled estimates applied
    in this study are subject to typical limitations associated with use of a CTM,
    but these values are based on actual all sources and nonsmoke modeled PM2.5 and
    do not involve the use of imputation."

    Highlights: "The use of fire-PM2.5 estimates from the CMAQ model is a distinct
    strength of this study...The use of highly resolved health data at the ZIP code
    level is another key contribution of this study."

    More Notes: "The CMAQ model is affected by typical challenges associated with
    the use of data inputs and procedures for modeling wildfire smoke using CTMs...we
    do not anticipate a substantial portion of the mortality impacts to be attributable
    to prescribed burning...the dose-response value was not established through primary
    research..."

    '
  8: 'Source material here.

    undifferentiated PM2.5. Although periodic and seasonal, wildfire smoke is now
    an ongoing exposure that affects much of the population on a regular basis (our
    analysis found that all ZIP codes in California are exposed to smoke each year)...
    We were able to separate annual wildfire PM2.5 concentrations from those generated
    by other sources such as traffic and industry by using a CTM for exposure assignment...
    This enabled us to estimate and compare the magnitude of effects attributable
    to wildfires and undifferentiated PM2.5... we have included estimates of both
    the adjusted (estimated wildfire- specific chronic dose-response value, Eq. 2,
    under the assumption of increased toxicity) and unadjusted (undifferentiated chronic
    dose-response value) long-term mortality associated with fire- only PM2.5 in Fig.
    2, which shows the likely increases in mortality burden... the actual degree of
    increased toxicity is not fully resolved and likely complicated by the large variability
    in the fuel type and wildfire emissions, weather patterns, combustion profiles,
    and resulting physical- chemical composition... Wildfire PM2.5 may have unique
    physical-chemical components that amplify its toxicity and therefore are potentially
    more harmful to human respiratory health compared to undifferentiated PM2.5 from
    other sources.

    '
  9: "Source material here.\n\"The analysis... applies CTM estimates of wildland fire\
    \ PM2.5 to estimate mortality outcomes... This analysis is also innovative with\
    \ respect to the long-term nature of the evaluation over an 11-year period.\"\n\
    \"These wildland fire emissions estimates [which include wildfires and prescribed\
    \ burns (but exclude agricultural burns)...\"\n\"We estimate that between 52,480\
    \ and 55,710 premature deaths are attributable to fire-only PM2.5 exposures, with\
    \ an associated economic valuation of $432 billion to $456 billion.\"\n\"We used\
    \ daily modeled PM2.5 concentrations for 2008 to 2018... estimated using the U.S.\
    \ EPA\u2019s CMAQ (version 5.0.1 to 5.3)... The calculated difference... isolates\
    \ the fire contribution, or fire-only PM2.5.\"\n\"These findings have direct implications\
    \ for California, a state at the forefront of climate policy development with\
    \ many fire-prone regions and a diverse population to protect. Growing the evidence\
    \ base on health impacts from wildfires... is critical in motivating future investments\
    \ to mitigate the impacts of climate change and protect vulnerable populations.\"\
    \n"
  10: " \nEvaluation overview: \"We quantified the total mortality burden for exposure\
    \ to PM2.5 due to wildfires in California at the ZIP code level, using 11 years\
    \ of CMAQ data (2008 to 2018).\"\n\nDrivers of Risk: \"long- term mortality impacts\
    \ from exposure to PM 2.5 from wildfire smoke\u2014including how these impacts\
    \ differ from exposure to ambient urban PM 2.5\u2014are not established and identified\
    \ as a substantial knowledge gap in the literature.\"\n\nQuantitative material:\
    \ \"where even the total number of deaths are suppressed, we conservatively assume\
    \ that the ZIP code contains one-half of the suppression threshold ... We compared\
    \ our final death count to the total reported deaths in the state (from the same\
    \ CDPH data source) as a metric of quality assurance, and the total estimates\
    \ varied by less than 0.35%.\"\n\nMethodology: \"we conducted two mortality analyses:\
    \ (i) base case, with no outliers removed, to characterize the potential impact\
    \ of extremely high wildfire concentrations on mortality ; and (ii) mod cap, capping\
    \ fire- only PM2.5 concentrations falling outside of the 99.9th percentile of\
    \ modeled values ...\"\n\nHighlights: \"Therefore, the application of an undifferentiated\
    \ dose-response value to wildland fire- specific PM 2.5 exposures may underestimate\
    \ mortality impacts. To address this concern ... we calculated a chronic dose-\
    \ response value us- ing Eqs. 1 and 2 below, which account for potential added\
    \ toxicity of wildfire smoke as is suggested in several California- specific analyses.\"\
    \n\nMore Notes: \"Therefore, we implemented substitution procedures to fill in\
    \ the missing deaths ... First, in Eq. 1, we pooled the two dose- response values:\
    \ one from the previously mentioned Washington- based study and the other from\
    \ the global study, which presented a U.S. estimate that was developed using data\
    \ from 210 cities.\"\n"
  11: "Source material here.\nEvaluation overview: \"Then, we calculated the mortality\
    \ burden from exposure to PM2.5 due to wildland fire smoke in the state of California\
    \ using Eq. 3 below (58)\"\nDrivers of Risk: \"where \u03B2 WL is the result of\
    \ Eq. 2 (dose-response value), \u0394PM 2.5ij represents the change in PM2.5 concentration\
    \ from wildland fire smoke\"\nQuantitative material: \"Last, we apply the EPA\u2019\
    s value of a statistical life (VSL) to these mortality impacts to estimate the\
    \ total valuation of the health burden, using Eq. 4 below where \u0394m ij is\
    \ the result of Eq. 3 (mortality burden from wildland fires) and V is the EPA\u2019\
    s VSL, which is $8.7 million in 2015 dollars\"\nMethodology: \"We used a Monte\
    \ Carlo distribution to estimate the final dose-response value used. We calculated\
    \ a 95% CI for the estimated dose-response value. Then, we calculated the mortality\
    \ burden from exposure to PM2.5 due to wildland fire smoke in the state of California\
    \ using Eq. 3 below (58)... Last, we apply the EPA\u2019s value of a statistical\
    \ life (VSL) to these mortality impacts to estimate the total valuation of the\
    \ health burden, using Eq. 4 below\"\n"
