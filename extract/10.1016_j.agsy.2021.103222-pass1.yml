Drivers of Risk:
  1: The shocks or changes impacting the outcomes include crop selection, irrigation
    practices, groundwater availability, renewable energy investment, and climate
    change.
  2: Climate scenarios (including RCP 8.5), groundwater-supported irrigation limitations
  3: Human activities like crop modifications, GHGs, and natural system changes such
    as aquifer depletion and climate alterations.
  4: Potential climate changes represented through wetter and drier future scenarios
    and depletion of groundwater resources impacting agricultural production are considered
    as drivers of risk.
  5: Temperature, precipitation, and solar radiation are key drivers impacting crop
    yields, simulated using DSSAT and GCM data. Wetter/Drier future scenarios are
    considered, reflecting conditions similar to the 1990s and 1950s, respectively.
  6: Drought severity, as indicated by the Palmer Drought Severity Index (PDSI), is
    a key driver affecting crop yield and water demand.
  8: The outcomes are impacted by scenarios of weather patterns (wet and dry years)
    and the RCP 8.5 scenario that includes elevated greenhouse gases and temperature
    conditions.
  9: The shocks or changes impacting the outcomes include variations in precipitation
    (wetter future, drier future) and climate model projections representing climate
    change.
  10: Climate- and market-related pressures, specifically drier and wetter future
    climate scenarios as well as GCM climate model scenarios (RCP 8.5), impact crop
    production and farm incomes.
  11: Increased electricity demand on hot summer days, requiring systems to balance
    wind and solar energy sources.
  13: No relevant information
  14: Groundwater use in Indian agriculture under climate change
Evaluation overview:
  1: The paper provides an overview of the potential impacts of agriculture, energy,
    and water decisions on farm incomes and climate projections through FEWCalc and
    DSSAT.
  2: Agricultural and renewable-energy production, farm income, and water availability
    and quality
  3: Focuses on the productivity and economics future of STAR communities under water
    scarcity and climate change.
  4: The paper evaluates the impact of different climate scenarios on crop production
    and groundwater levels in Finney County, Kansas using DSSAT and FEWCalc models.
  5: Crop income after variable costs is evaluated based on crop output and price
    per acre, considering variable production costs.
  6: This page provides an overview of the outcomes related to crop yields and irrigation
    demand using both simulated and historical data.
  8: The document evaluates scenarios with different climate futures and their impact
    on crop production, irrigation viability, and net income.
  9: This page provides an overview of the impact of different climate scenarios on
    agricultural outcomes, including crop production, agricultural net income, groundwater
    levels, crop groundwater irrigation, and energy consumption/production/net income.
  10: Agricultural performance and farm incomes are being evaluated, alongside renewable
    energy development.
  11: FEWCalc assesses opportunities for economic benefits from renewable energy in
    agricultural systems, highlighting input variables for renewable energy development
    and evaluating local economic impacts.
  12: FEWCalc enables users to envision both near-term impacts and long-term implications
    of choices made today on farms and communities.
  13: No relevant information
  14: No relevant information
Highlights:
  1: FEWCalc enables users to relate current choices to near- to long-term implications
    of agricultural, energy, and water decisions.
  2: Simulation suggests that only the Drier Future scenario is commercially profitable,
    and this is because of reduced expenses for dryland farming; the simulation under
    climate change still produces the worst annual total income.
  3: FEWCalc models interactions within STAR communities to guide decision-making
    around agriculture and renewable energy.
  4: Scenario 4 uses downscaled GCMs projections for years up to 2067, and FEWCalc
    shows increased crop production without significant yield loss in wetter years.
  5: Crop income is simulated under various climate scenarios (repeat historical,
    wetter/drier future, and GCM-simulated RCP8.5) for a 50-year projection period
    (2018-2067). The analysis incorporates the impact of climate on crop prices for
    corn and sorghum, but assumes wheat prices are independent of local climate. A
    base period of 2008-2017 is used.
  6: There is a comprehensive comparison of simulated versus historical data for irrigated
    and non-irrigated crop yields and irrigation demand across different crops.
  8: Scenario 4, RCP 8.5, predicts decreased crop production and profitability over
    time, signaling higher risks under elevated greenhouse gases and temperature.
    Renewable energy development aids viability in this scenario.
  9: The most important outcomes appear to be how different climate scenarios affect
    crop production, agricultural income, groundwater levels, and energy consumption,
    with a visual comparison of these impacts.
  10: Climate change predictions would need to be met with effective technology changes
    to address crop production trends that slowly decline for the future period. Variability
    makes these trends difficult to discern.
  11: Solar energy could become profitable with tax incentives or reduced solar panel
    prices; FEWCalc aids interdisciplinary discussions and stakeholder decision-making.
  13: No relevant information
  14: No relevant information
Methodology:
  1: The analysis is performed using two freeware programs, FEWCalc and DSSAT. FEWCalc
    is an agent-based model projecting farm incomes based on various factors and DSSAT
    models crop production and water use. Results apply to the systems of Finney County,
    Kansas.
  2: FEWCalc is used to simulate agricultural and energy production and farm income
    based on continuation of recent ranges of crop prices, farm expenses, and crop
    insurance; DSSAT with added arid-region dynamics is used to obtain simulated crop
    production and irrigation water demand for FEWCalc
  3: Utilizes the FEWCalc Agent-Based Model (ABM) to integrate real-world systems,
    focusing on agriculture, energy, and water.
  4: The analysis involves using historical weather data (2008-2017) and General Circulation
    Model projections, tested with DSSAT and FEWCalc models to simulate crop and water
    resource outcomes over 60-year scenarios.
  5: DSSAT simulations are used with a one-day time step, accumulating to annual results
    for FEWCalc. Scenarios use historical data, modified historical data, or GCM-simulated
    climate data for the projection period (2018-2067). DSSAT is initialized with
    soil water content at (SDUL + SLLL)/2.
  6: The analysis is performed using DSSAT simulations and historical data comparisons,
    applicable to trends from 2008 to 2017.
  7: The analysis uses the FEWCalc model, which incorporates the DSSAT model for simulating
    irrigation requirements and impacts on groundwater levels and surface-water quality,
    considering renewable energy installations.
  8: The analysis uses the FEWCalc model to simulate 60-year scenarios with repetitive
    10-year periods based on historical weather data, combined with changes such as
    increased temperature and GCM results.
  9: The analysis uses FEWCalc, with results presented in annual charts showing significant
    minimum and aquifer thickness. The scenarios are repeat historical, wetter future,
    drier future, and climate models.
  10: The FEWCalc model is used to simulate agricultural and energy systems under
    different climate scenarios (Repeat Historical, Wetter Future, Drier Future, and
    GCMs RCP 8.5) over a 60-year period (2008-2067) for Finney County, Kansas. The
    DSSAT model results are used within FEWCalc. The scenarios do not include technological,
    crop management, crop price, or energy production changes.
  11: FEWCalc uses a graphical interface and agent-based modeling in NetLogo to integrate
    agricultural production, water demand, and energy economics, with DSSAT providing
    specific agricultural data.
  12: FEWCalc can be used by farmers, laypeople, and policymakers to consider potential
    consequences of regulatory and policy decisions.
  13: No relevant information
  14: No relevant information
More Notes:
  1: The paper highlights the intuitive GUI of FEWCalc, making it accessible to non-technical
    stakeholders.
  2: FEWCalc is open-source freeware and addresses scientific, communication, and
    educational gaps between global- and local-scale FEW research communities and
    local stakeholders
  10: The study area is a semi-arid region around Garden City, Kansas. Installed solar
    capacity is initially set at about 9% of the total renewable energy. Capital costs
    are explicitly included for energy and depreciated over 10 years assuming a tax
    rate of 20%, for agriculture, capital costs are applied as listed in Table A.7.
  11: FEWCalc's use of open-source software facilitates extensions to include technology
    advances and policy changes, enhancing its adaptability.
  13: No relevant information
  14: No relevant information
Quantitative material:
  1: Quantitative information is produced through DSSAT providing agricultural yield,
    water usage, and fertilizer application data.
  2: 50-year (2018-2067) climate and groundwater availability projection; simulation
    suggests that only the Drier Future scenario is commercially profitable because
    of reduced expenses for dryland farming; worst annual total income under climate
    change
  5: 'Four climate scenarios are modeled: Repeat Historical (2008-2017), Wetter/Drier
    Future, and GCM-simulated RCP8.5 T, P, and S changes. The paper considers precipitation
    thresholds of less than 17 in. as a dry year and 20 in. or more as a wet year
    for price selection.'
  6: The page includes data on crop yields measured in bushels per acre and irrigation
    demand in inches, comparing simulated and historical outcomes over time.
  8: The paper provides quantitative projections for net income and NPV across scenarios,
    including specific figures for certain scenarios, e.g., an annual average agricultural
    sector profit of US$6818 in the dry scenario.
  10: Average annual crop yields (with and without irrigation) are provided in bushels/acre
    for different scenarios. Insurance claim frequency is given as number of years.
    Dryland farming start year and length in years are provided. Average annual net
    income from agriculture, energy, and total are given in US dollars. Net Present
    Value (NPV) from agriculture, energy, and total are provided in US dollars.
