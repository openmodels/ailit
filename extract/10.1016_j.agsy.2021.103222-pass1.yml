Drivers of Risk:
  1: Climate change scenarios, groundwater availability, and water quantity and quality
    impact farm incomes.
  2: Climate change (using GCM projections for RCP 8.5), groundwater availability
    limitations.
  4: Groundwater decline due to large-scale irrigation and climate variability in
    terms of wet, moderate, and dry years.
  5: Temperature, precipitation, and solar radiation changes; also, global market
    conditions and trade policies, although the latter are not projected in FEWCalc.
  6: Drought conditions, as measured by the Palmer Drought Severity Index (PDSI),
    are shown to impact crop yields and irrigation demands.
  9: Different climate scenarios, specifically 'Repeat Historical', 'Wetter Future',
    and 'Drier Future', are impacting agricultural productivity, groundwater levels,
    and energy production.
  10: Climate change scenarios (Repeat Historical, Wetter Future, Drier Future, and
    GCMs/RCP 8.5) impacting crop yields (with and without irrigation), and dryland
    farming feasibility, and energy production.
  11: Increases in electricity demand due to hot summer days; local advantages like
    wind resources; capital costs of solar energy.
Drivers of risk:
  8: Changes in precipitation patterns, temperature, and solar radiation are impacting
    crop production and groundwater depletion.
Evaluation overview:
  1: Farm incomes are evaluated based on crop selection, irrigation practices, groundwater
    availability, renewable energy investment, and historical/projected environmental
    conditions.
  2: Agricultural and renewable-energy production, farm income, and water availability
    and quality.
  4: The paper evaluates the sustainability of farmers' economic well-being under
    alternative agricultural and energy production choices using the FEWCalc model
    in Finney County, Kansas.
  5: Crop income after variable costs.
  6: The analysis provides an overview of crop yields and irrigation water demand,
    evaluating the comparison between DSSAT simulated results and historical data
    for corn, wheat, and grain sorghum.
  8: The paper evaluates agricultural productivity (crop yields) and irrigation water
    use under various climate scenarios.
  9: The paper evaluates outcomes in agriculture, water, and energy under different
    climate scenarios.
  10: Evaluates the impact of different climate scenarios on agricultural performance
    and income (both net and insurance-related) in Finney County, Kansas, considering
    crop yield, energy production, and related financial metrics.
  11: FEWCalc provides an overview of economic opportunities from renewable energy
    balancing farming difficulties in the USA's middle region.
  13: Consequences of climate change on food-energy-water systems in arid regions
    without agricultural adaptation.
Highlights:
  1: FEWCalc enables users to relate current choices to near- to long-term implications
    and is accessible to non-technical stakeholders via an intuitive GUI.
  2: Only the Drier Future scenario is commercially profitable, and this is because
    of reduced expenses for dryland farming; simulation under climate change produces
    the worst annual total income.
  3: FEWCalc supports carbon emission mitigation through enhancing local familiarity
    with renewable energy production and addressing local stakeholder challenges.
  4: Scenario 4 discusses potential outcomes from climate projections using GCM data
    up to the year 2067.
  5: Western Kansas corn and sorghum prices are affected by supplies during weather
    years (higher supplies depress prices). Local conditions do not affect global
    wheat crop prices.
  6: Simulated and historical data tracks similarly, indicating validation of the
    DSSAT model against historical records.
  8: The analysis suggests scenarios with significant differences in crop yields and
    groundwater levels under various climate futures, highlighting potential profitability
    of wind energy under certain scenarios.
  9: The most important outcomes are the agricultural productivity and net income
    changes across different scenarios, with the 'Drier Future' showing decreased
    productivity and income, and groundwater levels declining most steeply.
  10: Climate change predictions would need to be met with effective technology changes
    to address crop production trends that slowly decline for the future period. Wind
    power production is generally profitable due to a high wind capacity factor and
    a long lifespan.
  11: FEWCalc shows that wind energy can balance farming difficulties; solar profitable
    with tax incentives; links decisions to interdisciplinary outcomes.
  13: Coupled simulation evaluates the use of water and renewable energy in agricultural
    areas.
Methodology:
  1: The study uses DSSAT for crop production and water use, coupled with FEWCalc,
    an agent-based model, to relate agriculture, energy, and water decisions to farm
    incomes and climate projections. FEWCalc analyzes the food, energy, water, and
    climate systems of Finney County, Kansas.
  2: Uses publicly available data to support FEWCalc input values. DSSAT with added
    arid-region dynamics is used to obtain simulated crop production and irrigation
    water demand for FEWCalc. FEWCalc simulates agricultural and energy production
    and farm income based on recent ranges of crop prices, farm expenses, crop insurance,
    renewable-energy economics and government incentives, climate scenarios, and groundwater-supported
    irrigation and its limitations; Applicable to farmers, resource managers, and
    scientists focusing on food, energy, and water systems.
  3: FEWCalc is an agent-based model (ABM) constructed using NetLogo to integrate
    complex real-world systems and evaluate future policy decisions, focusing on agriculture,
    energy, and water under climate and economic conditions.
  4: FEWCalc uses DSSAT outputs based on historical and projected climate data, comparing
    scenarios under different future conditions over a 60-year simulation.
  5: FEWCalc uses DSSAT (Decision Support System for Agrotechnology Transfer) to simulate
    crop yields based on climate scenarios. Scenarios include repeating historical
    conditions (2008-2017), using wetter/drier years from the same period, and applying
    GCM-simulated climate changes. The DSSAT Seasonal Analysis is used, and simulations
    represent individual growing seasons with adjustments made for soil water content.
  6: The DSSAT model simulations are compared to historical data sets from Kansas
    State University and the Kansas Department of Agriculture to evaluate model validity.
  8: The analysis employs the FEWCalc simulation to assess agricultural and water
    use impacts over future 60-year scenarios based on historical data, repeating
    known conditions, and different climate futures.
  10: Uses the FEWCalc model to simulate agricultural and energy systems under different
    climate scenarios over a 60-year period (2008-2067). DSSAT results are also mentioned
    as adequate for the analysis of renewable energy development and agricultural
    performance.
  11: FEWCalc combines agricultural-energy-water decision support using DSSAT for
    regional agricultural modeling and NetLogo for agent-based modeling.
  13: Analyzed using FEWCalc and DSSAT for simulating food-energy-water systems.
More Notes:
  1: FEWCalc helps to identify barriers and opportunities related to policy-making
    where human and natural system linkages are significant.
  5: The Palmer Drought Severity Index (PDSI) and temperature and precipitation deviations
    from 1950-2019 are used to understand past climate variability.
  10: The scenarios do not include technological, crop management, crop price, or
    energy production changes, so the results reflect climate- and market-related
    pressures alone. The study emphasizes the challenges of farming due to price uncertainty,
    weather conditions, and limited resource availability.
  13: Study focuses on the implications of climate change without adaptation in arid
    areas.
More notes:
  8: The FEWCalc tool is used to project economic and environmental impacts associated
    with 60-year agricultural scenarios under varying climate conditions.
Quantitative material:
  1: FEWCalc outputs include Food Production, Crop/Energy Production, Crop Energy
    Intensity, and Water Use Efficiency. The graphical abstract shows data trends
    over time.
  2: A 50-year (2018-2067) climate and groundwater availability projection process
    indicates possible trends of future crop yield, water utility, and farm income;
    The simulations suggest that only the Drier Future scenario is commercially profitable
    because of reduced expenses for dryland farming; simulation under climate change
    produces the worst annual total income.
  5: Uses historical climate data (temperature and precipitation) from 2008-2017 and
    GCM-simulated climate data to project crop yield using DSSAT; also includes information
    about crop prices and gasoline prices in the USA from 1866 to 2019.
  6: The graphs present quantitative comparisons of crop yields in bushels per acre
    and irrigation water in inches.
  8: Table 3 provides quantitative data on annual average agricultural sector profit
    and net present value under different scenarios.
  9: The paper describes changes in groundwater levels, crop production, and energy
    production across different scenarios graphically, but no specific percentages
    or numeric values are extracted from this page.
  10: Average annual crop yield (bushels/acre) under different scenarios, insurance
    claims (number of years), dryland farming start year and length (years), average
    annual net income (US dollars) from agriculture and energy, Net Present Value
    (NPV) from agriculture and energy (US$M).
