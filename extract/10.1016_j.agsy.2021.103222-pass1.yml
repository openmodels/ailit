sourcematerial:
  1: 'Source material here.

    Evaluation overview: The larger scale perspective of Integrated Assessment (IA)
    and smaller scale perspective of Impacts, Adaptation, and Vulnerability (IAV)
    need to be bridged to design long-term solutions to agricultural problems that
    threaten agricultural production, rural economic viability, and global food supplies.
    FEWCalc is used to analyze the interrelated food, energy, water, and climate systems
    of Finney County, Kansas to evaluate consequences of choices currently available
    to farmers and resource managers.


    Drivers of Risk: FEWCalc is a new freeware, agent-based model with the novel ability
    to project farm incomes based on crop selection, irrigation practices, groundwater
    availability, renewable energy investment, and historical and projected environmental
    conditions.


    Quantitative material: DSSAT Inputs/Outputs: Inputs - Includes weather, soil,
    crops. Outputs - Provides agricultural yield data, water usage, and fertilizer
    application needs.


    Methodology: FEWCalc (Food-Energy-Water Calculator) is a new freeware, agent-based
    model... FEWCalc is used to analyze the interrelated food, energy, water, and
    climate systems of Finney County, Kansas...


    Highlights: FEWCalc enables users to relate current choices to near- to long-term
    implications.


    More Notes: Intuitive GUI makes FEWCalc accessible to non-technical stakeholders.

    '
  2: "  \n\"Metrics of the analysis include agricultural and renewable-energy production,\
    \ farm income, and water availability and quality.\"\n\"A 50-year (2018-2067)\
    \ climate and groundwater availability projection process indicates possible trends\
    \ of future crop yield, water utility, and farm income...surprisingly, the simulations\
    \ suggest that only the Drier Future scenario is commercially profitable, and\
    \ this is because of reduced expenses for dryland farming.\"\n\"FEWCalc is used\
    \ to simulate agricultural and energy production and farm income based on continuation\
    \ of recent ranges of crop prices, farm expenses, and crop insurance; continuation\
    \ of recent renewable-energy economics and government incentives; one of four\
    \ climate scenarios, including General Circulation Model projections for Representative\
    \ Concentration Pathway 8.5; and groundwater-supported irrigation and its limitations.\"\
    \n\"The simulation under climate change still produces the worst annual total\
    \ income.\"\n\"FEWCalc addresses scientific, communication, and educational gaps\
    \ between global- and local-scale FEW research communities and local stakeholders.\"\
    \ \n"
  3: 'Source material here.

    Evaluation overview: "The roles played by water scarcity and climate change in
    the productivity and economics future of a typical STAR community."

    Drivers of Risk: "Human to Natural System Coupling: Shows influences such as crop
    modifications, greenhouse gases (GHGs)... Natural to Human System Coupling: Displays
    effects like... aquifer depletion... and changes to climate due to GHGs."

    Methodology: "FEWCalc is an agent-based model (ABM) constructed using NetLogo...
    designed to integrate complex real-world systems... representing agriculture,
    energy, and water."

    Highlights: "The purpose of this study is to develop a scientific tool able to
    represent a real-world complex system composed of agriculture, energy production,
    and water use... and use it to reveal unexpected interactions."

    '
  4: " \nDSSAT is then executed to provide input needed for FEWCalc via files in a\
    \ comma-separated values format (CSV files). The final results are presented in\
    \ graphs as shown in Fig. A.1. Selected graphs are presented in the Results section\
    \ of this article... the impact of groundwater declines and energy production...\
    \ scenarios 2 and 3 are dominated by wetter or drier years to create wetter and\
    \ drier \u201Cfutures\u201D... random sequence of moderate to wet years results\
    \ in increased crop-reproduction with no significant loss of yield... Scenario\
    \ 4 is based on 20 General Circulation Model projections out to 2098... Scenario\
    \ 4 uses DSSAT results in which runs use projected air temperature, precipitation,\
    \ and solar radiation from 20 downscaled GCMs to represent years 2008 to 2067...\
    \ a 10-year period from 2008 to 2017 is used as the historical base period for\
    \ this work... This variability is used to create future climate scenarios.\n"
  5: "Source material here.\nEvaluation overview: \"Revenue from crop production is\
    \ the product of crop output and price per acre... net farm income from crop production\
    \ is the difference between gross revenue from crop production less total variable\
    \ costs.\"\n\nDrivers of Risk: \"Scenarios 2 & 3. Wetter/Drier Future... The Wetter\
    \ Future is similar to this area in the 1990s; the Drier Future is similar to\
    \ this area in the 1950s.\"\n\"T, temperature, in degrees Celsius; P, precipitation,\
    \ in inches per year; S, solar radiation, in watts per square meter.\"\n\nQuantitative\
    \ material: \"Simulation scenarios used to represent climate conditions in DSSAT\
    \ for the 50-year projection period (2018-2067)... Apply GCM-simulated climate\
    \ for the 50-year projection period.\"\n\"Less than 17 in. of precipitation is\
    \ considered a dry year... 20 in. or more is treated as a wet year.\"\n\nMethodology:\
    \ \"DSSAT simulations are conducted using a one-day time step. Results are accumulated\
    \ to produce annual results for FEWCalc.\"\n\"In this work, the DSSAT Seasonal\
    \ Analysis is used... DSSAT is started each year with soil water content equal\
    \ to (SDUL + SLLL)/2.\"\n\nHighlights: \"For corn and grain sorghum, the following\
    \ procedure is used. In Scenario 1, the base period prices along with the climate\
    \ data (temperature and precipitation) are repeated in sequence five times to\
    \ create the 50-year projections. For Scenarios 2 and 3, the base period is used\
    \ to define 10 sets of annual climate and crop-price data and selections are made\
    \ from this 10-member set (with replacement) to create wetter and drier futures.\"\
    \n\"The FEWCalc base period (2008\u20132017), has three wet, three dry, and four\
    \ average years, and is used to create projected climate conditions.\"\n"
  6: 'Source material here.

    Comparison of the DSSAT results (solid lines) and historical data (dashed lines)
    between 2008 and 2017 for corn, wheat, and grain sorghum. A color-coded background
    represents different drought severities based on the Palmer Drought Severity Index
    (PDSI). Yield is measured in bushels per acre...Demand is measured in inches.
    Overall, it is a comprehensive comparison of simulated versus historical data
    across different crops and conditions, with a focus on yield and water demand
    against drought indicators.

    '
  7: '

    Source material: "The only water use represented in FEWCalc is irrigation to support
    the farm production simulated using DSSAT...Simulation of crop production and
    irrigation demand...required modification of the distributed version of DSSAT...This
    is followed by a description of how DSSAT results are used in DSSAT to simulate
    impacts on groundwater levels and surface-water quality...FEWCalc supports the
    installation of up to 2.4 MW of solar installed capacity...needed to be compared
    with crop revenues as part of deciding whether to make the renewable energy investment."

    '
  8: "Source material here.\n\nEvaluation overview: \"Crop production and irrigation\
    \ water use simulated by DSSAT for 2008 to 2017 are compared to historical data\
    \ in Fig. 4...Six ten-year long base periods of precipitation, temperature, and\
    \ crop prices are repeated consecutively to create the 60-year FEWCalc simulation...Table\
    \ 3 shows that dry scenario 3 yields an annual average agricultural sector profit\
    \ of US$6818...\"\n\nDrivers of Risk: \"As in Fig. 3, colors based on PDSI are\
    \ used to identify dry and wet years...For the drier future, FEWCalc randomly\
    \ chooses a higher percentage of dry years (70% instead of the original 30%)...In\
    \ Fig. 5d, the first 10 years of crop production reflect historical (2008\u2013\
    \ 2017) climate variability, while years 11 to 60 (2018 to 2067) show GCM results\
    \ that tend to be smoother because results from 20 GCMs are averaged (Figs. B.1\
    \ and B.3).\"\n\nQuantitative material: \"Table 3 shows that dry scenario 3 yields\
    \ an annual average agricultural sector profit of US$6818...For Scenario 3, farm\
    \ income with energy sector profit is US $116,142, with an NPV of US$3.1 M. Scenario\
    \ 4, in contrast, produces the worst average annual total revenue of US$48,003,\
    \ with an NPV of US $1.6 M.\"\n\nMethodology: \"Crop production and irrigation\
    \ water use simulated by DSSAT for 2008 to 2017 are compared to historical data\
    \ in Fig. 4...Six ten-year long base periods of precipitation, temperature, and\
    \ crop prices are repeated consecutively to create the 60-year FEWCalc simulation...In\
    \ Fig. 5d, the first 10 years of crop production reflect historical (2008\u2013\
    \ 2017) climate variability, while years 11 to 60 (2018 to 2067) show GCM results\
    \ that tend to be smoother because results from 20 GCMs are averaged (Figs. B.1\
    \ and B.3).\"\n\nHighlights: \"The RCP 8.5 scenario 4 shows marked potential for\
    \ decreased crop production: With elevated greenhouse gases and temperature conditions\
    \ crop incomes are reduced...Renewable energy development is important to continued\
    \ viability and, hopefully, would allow new approaches and technologies to buffer\
    \ the impacts of climate change.\"\n"
  9: '

    This image presents a comparative analysis of four different scenarios related
    to agriculture, water, and energy, as well as their projected impacts over time.
    Each scenario is illustrated with graphs and corresponding data. (a) Scenario
    1: Repeat Historical - **Agriculture**: The graphs show crop production and agricultural
    net income fluctuating over a timeline. - **Water**: There are graphs for groundwater
    level and crop groundwater irrigation, with variations over time. (b) Scenario
    2: Wetter Future - **Agriculture**: Displays projected increases in crop production
    and agricultural net income due to wetter conditions. - **Water**: The water graphs
    suggest higher groundwater levels and changing irrigation patterns compared to
    historical data. (c) Scenario 3: Drier Future - **Agriculture**: Indicates decreased
    crop production and agricultural net income linked to drier conditions. - **Water**:
    Shows lower groundwater levels and increased reliance on irrigation throughout
    the period. (d) Scenario 4: Climate Models - **Agriculture**: This scenario analyses
    crop production and income based on climate model projections. - **Water**: Illustrates
    groundwater trends and irrigation needs aligned with climate change predictions.
    (e) Energy (for all 4 scenarios) - A graph shows the overall energy consumption,
    production, and net income impacts across the four scenarios. The data on each
    sub-panel includes numerical values for comparisons, with clear visual differentiation
    using color-coded graphs for each variable. quantitative information: numerical
    values for comparisons, cm, kg/ha, bu/ac, MWh, US$ methodology: FEWCalc, aquifer,
    scenarios analytical

    '
  10: 'Source material includes: "analysis of renewable energy development and agricultural
    performance given potential future climate scenarios," "respond to maintain crop
    production and farm incomes," "Thus, these results reflect the climate- and market-related
    pressures," "Wetter Future," "Drier Future," "GCMs, RCP 8.5," and metrics in Table
    3 such as "Average annual crop yield, bushels/acre," "Insurance claims, number
    of years," alongside methodology and commentary on economic pressures and conditions
    impacting the agricultural sector: "This work shows how FEWCalc can provide scientific,
    engineering, and economic analyses required by stakeholders and policy makers
    using data from the semi-arid region around Garden City, Kansas," "The scenarios
    do not include technological, crop management, crop price, or energy production
    changes that would be expected to occur," and, importantly, modeling that portrays
    potential futures: "climate change predictions would need to be met with effective
    technology changes to address crop production trends that slowly decline for the
    future period," and financial considerations such as capital costs and energy
    investments: "using data from the semi-arid region around Garden City, Kansas,"
    "For all scenarios, installed solar capacity is initially set at about 9% of the
    total renewable energy," and financial assumptions: "Discount rate is 3.25% (prime
    rate as of June 2020); FEWCalc agriculture and energy finances are combined; for
    energy, capital costs are explicitly included for energy and depreciated over
    10 years assuming a tax rate of 20%, for agriculture, capital costs are applied
    as listed in Table A.7."'
  11: " \npresented here, FEWCalc is applicable directly to farmers in arid regions\
    \ of the middle part of the USA interested in alternative income sources. The\
    \ design of FEWCalc has broad applicability for agricultural-energy-water system\
    \ decision support research and education. [...] FEWCalc illustrates major input\
    \ variables relevant to renewable energy development and how local economic impact\
    \ can be evaluated and projected.\n\nAs noted previously, an advantage of solar\
    \ is that it is plentiful on hot summer days when wind velocities are low and\
    \ electricity demand increases, largely due to increased use of air conditioning.\
    \ In some cases, this makes solar a very useful addition to a given system despite\
    \ the challenges of individual profitability.\n\nAgent-based modeling using the\
    \ freeware NetLogo is relatively simple yet flexible enough to perform calculations\
    \ related to energy, water, nitrate in soils and surface water, crop insurance,\
    \ and so on, and integrate results from a separate program \u2014 in this case\
    \ DSSAT for agricultural production, water demand, and fertilizer application.\n\
    \nFEWCalc results show that in this area, given current cost and electricity pricing,\
    \ solar is only profitable with tax incentives and depreciation [...] even a slight\
    \ reduction in the price of solar panels could make it a profitable alternative.\
    \ [...] FEWCalc's outputs (Fig. 5) show the connection between global changes\
    \ and local-stakeholder outcomes, while FEWCalc's intuitive interface allows local\
    \ stakeholders to explore how their options (e.g., choices about irrigation, crop\
    \ planting, and energy investment) and outcomes (e.g., farm income) are affected\
    \ by climate conditions, and local and national public policy.\n \nThe version\
    \ of FEWCalc discussed in this work is constructed of freely available and open-source\
    \ software that was chosen to facilitate future extensions of FEWCalc. In particular,\
    \ the use of agent-based modeling using NetLogo means that FEWCalc is well-positioned\
    \ for expansion to simulate technology advances, behavioral and policy considerations,\
    \ and the interplay between these important aspects of any natural-human system.\n"
  12: 'Source material here.

    FEWCalc enable users to envision both near-term impacts and long-term implications
    of choices made today. Thus, FEWCalc can be used by farmers considering the futures
    of their farms and communities, laypeople interested in how farms work, and policymakers
    as they consider potential consequences of regulatory and policy decisions.

    '
