  8: "Source material here: \"In terms of functional forms, the choice of linear or\
    \ non-linear models significantly impacts the magnitude of damage estimates...the\
    \ linear specification is suitable for estimating short-run weather impacts but\
    \ it would result in a biased estimation of economic losses as it doesn\u2019\
    t take long-term adaptations into consideration. For instance, using a temperature\
    \ variable that captures the deviations of temperature from respective historical\
    \ norms could further expand the long-term climate impacts. In contrast to the\
    \ linear specification, the estimation results from the non-linear panel model\
    \ can reflect both short- and long-term impacts. Therefore, future studies should\
    \ use more comprehensive data and integrate long-difference non-linear models\
    \ to identify climate adaptation patterns at a regional level over an extended\
    \ period of time. Based on new hybrid panel models including mixed characteristics\
    \ of the above model specifications, recent research trends have been distinguishing\
    \ the impacts of short-, medium- and long-run variations in weather and climate\
    \ to further capture the adaptation effects...The literature review reveals that\
    \ a substantial amount of empirical studies is available to update the parameters\
    \ of the damage functions and a meta-analysis approach could produce a damage\
    \ function that reflects the latest empirical findings more fully.\""
