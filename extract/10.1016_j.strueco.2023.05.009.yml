sourcematerial:
  1: "yaml\nEvaluation overview: \"Climate econometric analysis of the relationship\
    \ between temperature and gross domestic product (GDP) is increasingly being used\
    \ to evaluate climate risks and understand economic impacts caused by climate\
    \ change.\"\nDrivers of Risk: \"We review the literature on growth and level effects\
    \ (i.e., temperature rise respectively affects the growth and level of economic\
    \ output)\"\nMethodology: \"We review the literature on growth and level effects\
    \ (i.e., temperature rise respectively affects the growth and level of economic\
    \ output), the setting of temperature variables\u2019 forms and functional forms,\
    \ and the inherent model specification of climate econometrics. Additionally,\
    \ we introduce an approach for combining empirical findings with climate change\
    \ integrated assessment models (IAMs) to improve damage modelling. Diverse impact\
    \ mechanisms and adaptation effects can be revealed by changing the time resolution\
    \ of temperature variables, introducing non-linearity into econometrics functions,\
    \ and specifying temperature deviation. Combing the cross-sectional and panel\
    \ model would enable us to examine the economic impacts at different future times.\"\
    \nHighlights: \"Our findings show that estimates of damage through growth effects\
    \ are generally much larger than those through level effects. Diverse impact mechanisms\
    \ and adaptation effects can be revealed by changing the time resolution of temperature\
    \ variables, introducing non-linearity into econometrics functions, and specifying\
    \ temperature deviation. Combing the cross-sectional and panel model would enable\
    \ us to examine the economic impacts at different future times.\"\n"
