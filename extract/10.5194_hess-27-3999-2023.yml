Highlights:
  2: "The goal of this study is to determine the future climatic state of root zone\
    \ soil moisture for possible future climates (2021\u20132100)."
  3: Root zone soil moisture departures act as an early warning for regions that are
    projected to have a permanently different water cycle in the coming decades.
  4: The study emphasizes time of emergence as a critical point for permanent wet
    or dry departures in soil moisture.
  5: Regions in South America, southern Africa, and the Mediterranean expected to
    become drier; North/South America and Africa show varying trends of moisture departure
    in warming scenarios.
  6: Some regions show contrasting results between ensemble members (e.g., Asia, northern
    North America). Frequency of models with monthly permanent departures increases
    in warmer climate scenarios. Some climate regions tend to have either wet or dry
    permanent departures across all months.
  7: Global land area with wet or dry soil moisture departures increases from 2021
    to 2100. The land surface area with wet or dry departures is already higher than
    the expected percentage (5% for both wet and dry) in 2021.
  8: Larger land areas are projected to have permanent wet departures rather than
    dry departures across all SSPs, except SSP1-2.6.
  9: Higher SSP scenarios (3-7.0 and 5-8.5) show significant warming, particularly
    in the Northern Hemisphere, impacting soil moisture conditions.
  10: Certain regions exhibit permanent dry and wet departures regardless of the season,
    while high-latitude regions tend to become drier in summer and wetter in winter.
  11: Model independence can lead to wide projection ranges but is essential for robust
    hypotheses.
  12: Significant percentages of regions show conflicting departure signals; 33% of
    regions for SSP-3.70 and 37% for SSP-1.26, especially at higher northern latitudes.
  13: High ECS models potentially lead to more pronounced soil moisture departures;
    wet departures expected in dry regions like Sahara but with limited absolute changes.
  14: Remarkable drying trends are projected in the Mediterranean, southern Africa,
    southern North America, and South America; increases in both wet and dry departures
    are linked to global warming levels.
  15: Different regions experience varying soil moisture changes under SSP1-2.6 and
    SSP3-7.0 scenarios, with significant seasonal variations.
  16: Adaptation is essential as significant permanent changes to soil moisture are
    expected even with climate mitigation efforts; higher emission scenarios result
    in more serious transgressions.
