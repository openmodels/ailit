sourcematerial:
  2: "\"The goal of this study is to determine the future climatic state of root zone\
    \ soil moisture for possible future climates (2021\u20132100). Hereto we use a\
    \ CMIP6 multi-model ensemble of total soil moisture with the Pre-industrial Control\
    \ (Pi-Control) scenario as a baseline and four different future scenarios of shared\
    \ socioeconomic pathways (SSPs) combined with emission scenarios: SSP1\u20132.6,\
    \ SSP2\u20134.5, SSP3\u20137.0, and SSP5\u20138.5 (O\u2019Neill et al.,2016;Riahi\
    \ et al.,2017). We aggregate all data to the scale of the IPCC Working Group I\
    \ (WGI) climate reference regions (Iturbide et al.,2020a), which differs from\
    \ the scale and aggregation used inPorkka et al.(2023) but is justi\uFB01ed as\
    \ this study is more focused onhighlightingspeci\uFB01cregionsratherthanobtainingprecise\
    \ global numbers. For all the regions we determine departures fromthebaselineonmonthlyandyearlyscales.\
    \ Furthermore, we analyse whether the departures are permanent and determine the\
    \ \u201Ctime of emergence\u201D, which is the moment that soil moisturemovesbeyondanddoesnotfallbackwithintheenvelopeofbaselinevariabilitybefore2100.Feather,wequantify\
    \ theglo ballandareawithsoilmoisturecontentdepar-tures,whichprovidesscenariosforthefuturestatusofthe\
    \ green water planetary boundary.\""
