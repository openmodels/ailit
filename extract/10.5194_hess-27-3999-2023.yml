  12: 'The paper discusses how root zone soil moisture in certain regions is impacted
    by conflicting departure signals among different Earth System Models (ESMs) in
    various SSP scenarios: "ESMs have particularly high uncertainties in certain regions...with
    conflicting departure signals among ESMs in each SSP scenario." Graphs indicate
    changes in percentages of land area over time where soil moisture exceeds the
    95th percentile or goes below the 5th percentile in different SSP scenarios: "Figure
    10. (a, b) The monthly percentage of land area with soil moisture that exceeds
    the 95th percentile (a) or goes below the 5th percentile (b) of the PiControl
    baseline in the different SSP scenarios." The analysis examines projected changes
    in land area with extreme soil moisture conditions based on different SSP scenarios
    using ESMs, with specific focus on model uncertainties and conflicts: "The yearly
    percentage land area where there is permanent wet (c) or dry (d) departure from
    the PiControl baseline envelope in the different SSP scenarios...ESMs have particularly
    high uncertainties in certain regions." Significant percentages of regions show
    conflicting departure signals; 33% of regions for SSP-3.70 and 37% for SSP-1.26,
    especially at higher northern latitudes: "In total, the percentages of regions
    with conflicting departure signals globally are 33% for SSP-3.70 and 37% for SSP-1.26.
    Most of the regions in which signals conflict are at higher northern latitudes."
    The paper identifies model limitations and uncertainties in predicting soil moisture
    changes due to misrepresented land-atmosphere interactions and prescribed land
    cover changes: "Thus, given the ESM limitations in such regions and the lack of
    observational in situ data for validation, more research is needed...the land
    cover and its change in most ESMs are prescribed...hence, the root zone soil moisture
    may undergo dynamics due to land cover adaptation and land cover change...that
    may be better captured by more sophisticated vegetation models." '
