  14: "In this study, we analysed the future (2021\u20132100) changes in total soil\
    \ moisture in different IPCC reference regions with respect to the pre-industrial\
    \ baseline (1850-like conditions). Four different scenarios (SSP1\u20132.6, SSP2\u2013\
    4.5, SSP3\u20137.0, and SSP5\u20138.5) from 14 ESMs in CMIP6 were studied. We\
    \ evaluated different aspects: the deviation of total soil moisture from the PiControl\
    \ scenario, permanent departures beyond the PiControl variability and the time\
    \ of emergence of those permanent departures, on both yearly and monthly scales.\
    \ Despite some ESM disagreement, we found several clear and consistent signals."
