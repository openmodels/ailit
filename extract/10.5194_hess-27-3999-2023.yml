  5: "Source material here.\n\"In Fig. 3, it can be observed that, when going from\
    \ SSP1\u20132.6 to SSP5\u20138.5, the deviation of the total soil moisture content\
    \ from the baseline increases in most regions. In warmer scenarios there is also\
    \ more drying than wetting (Fig. 4). Most of the regions in North and South America\
    \ (excluding north-western North America, NWN, and south-eastern South America,\
    \ SES), southern Africa (western southern Africa, WSAF, and eastern southern Africa,\
    \ ESAF), and the Mediterranean become drier, while the regions in northern Africa\
    \ (Sahara, SAH, western Africa, WAF, central Africa, CAF, north-eastern Africa,\
    \ NEAF), eastern Europe (EEU), and Asia (excluding the Tibetan Plateau, TIB, and\
    \ East Asia, EAS) become wetter as warming intensi\uFB01es.\"\n\n\"Looking at\
    \ the percentage of models that show a permanent departure from the PiControl\
    \ baseline (Fig. 5), we can observe a similar trend to the deviation of total\
    \ soil moisture content in Fig. 3. The percentage of models showing a permanent\
    \ departure from the PiControl baseline is higher in warmer scenarios. The Mediterranean\
    \ (MED) has the highest percentage of models with a dry departure in SSP1\u2013\
    2.6 (approximately 70%), and the percentage of models continues to increase to\
    \ almost 100% as it approaches SSP5\u20138.5.\"\n\n\"Figures 8 and 9 show the\
    \ regional number of months with a permanent departure in selected climate reference\
    \ regions for each ESM in SSP1\u20132.6 and SSP3\u20137.0 respectively.\"\n\n\"\
    Some regions, such as SEA and the Russian Far East (RFE), experience a change\
    \ from dry departure to wet departure as the effects of global warming strengthen,\
    \ although the changes are minor.\"\n"
