  2: 'Source material here.

    Evaluation overview: "We empirically estimate the long-term response of economic
    growth rates to TC strikes for a sample of 41 TC-affected countries" and "Third,
    we derive event-based, and country-specific temperature-dependent damage functions
    that account for the persistence of damages in the economic system from the growth
    losses calculated along the different scenario combinations."

    Drivers of Risk: "We empirically estimate the long-term response of economic growth
    rates to TC strikes" and "Estimating temperature and TC impacts on growth in a
    single regression framework allows also to investigate potential interactions
    of both effects."

    Quantitative material: "Map of the set of 41 countries that are considered to
    be exposed to tropical cyclones in this analysis" and "Average historical responses
    of per-capita GDP growth to tropical cyclone exposure as a function of lag years
    for selected countries."

    Methodology: "First, we estimate the historical growth responses of countries
    to TC strikes accounting for the persistence of damages in the economic system"
    and "We add methodologically to this previous work in two regards. First, we additionally
    control for the impact of temperature on growth."

    Highlights: "The DAD is a measure for the additional TC-induced future economic
    burdens of countries induced by climate change" and "We focus on two complementary
    metrics of high policy relevance: i) the discounted annual damage (DAD) caused
    by TCs and ii) the contribution of TCs to the social cost of carbon (SCC)."

