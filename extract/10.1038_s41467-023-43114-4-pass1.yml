    \  \nSource material here.\nFuture greenhouse gas emissions, Socioeconomic development,\
    \ Normative assumptions on discounting, Changes of TC impacts (e.g., with respect\
    \ to their location, timing, intensity, and frequency distributions of landfall)\
    \ under future greenhouse gas (GHG) emissions, Response of temperature to a greenhouse\
    \ gas emission pulse (UD5) (RCPs32). Average annual growth losses for strongly\
    \ exposed countries such as Japan (1.63%) or the Philippines (2.62%) were in the\
    \ historical period on average 10 and 15 times higher than for the only partially\
    \ exposed USA (0.17%). Scenario analysis and probabilistic methods such as bootstrapping\
    \ are used to map out uncertainty dimensions.  A maximum entropy bootstrapping\
    \ method is used to express uncertainties associated with the historical growth\
    \ estimates.  A statistical TC emulator is used to generate probabilistic time\
    \ series of TCs based on the output from four different global climate models.\
    \  The response of global mean temperature to the emission of an additional ton\
    \ of CO2 over the course of 100 years. Uncertainty dimensions 4\u20136 are fully\
    \ propagated throughout the modeling chain. Discounted annual damage by tropical\
    \ cyclones. Tropical cyclone (TC) damages, Discounted annual damage by tropical\
    \ cyclones, TC-induced SCC (Social Cost of Carbon), historical growth response\
    \ of countries to TCs. TC impacts are an additional impact channel not captured\
    \ by population-weighted temperature over land alone.\nUniversity of Oklahoma.\n"
  4: "text\nEvaluation overview: \"shares of affected people into deviations of the\
    \ national GDP pathways as provided by the SSPs\"\nDrivers of Risk: \"Temperature\
    \ damage functions are then used to translate warming levels into economic damages\"\
    \nQuantitative material: \"The median global DAD averaged over the future period\
    \ 2010\u20132100 and across uncertainty dimensions 4 and 5 (cf. Table 1) is positive\
    \ across all RCP-SSP-discounting scenarios and ranges from 0.18% of global GDP\
    \ in 2021 for the main speci\uFB01 cation up to 1.13% for RCP8.5-SSP5 and Stern\u2019\
    s discounting choice (Fig. 2aand Tbl. S1).\"\nMethodology: \"contrast, we here\
    \ derive event-based, country-level temperature-dependent damage functions for\
    \ TCs that account for the persistence of damages in the economic system, and\
    \ employ them to assess the contribution of TCs to the SCC.\"\nHighlights: \"\
    This clearly illustrates that growth losses do not depend on the development level\
    \ but rather on country-speci\uFB01 c characteristics. Thus, also growth in high-income\
    \ countries is negatively affected by TCs suggesting that, even in this country\
    \ group, historically implemented adaptation measures may not suf\uFB01 ce to\
    \ compensate for climate change-induced loss increases in the future.\"\n"
  5: " \nThe paper evaluates discounted annual damage (DAD) from tropical cyclone\
    \ impacts over the period 2010\u22122100: \"Discounted annual damage by tropical\
    \ cyclones... global discounted annual damage (DAD) from tropical cyclone impacts\
    \ averaged over the period 2010\u22122100.\"\n\nTropical cyclone impacts are evaluated\
    \ as a significant driver of risk: \"Calculating the SCC once with and once without\
    \ TC impacts and subtracting the latter from the former allows us to estimate\
    \ the absolute TC-induced SCC.\"\n\nQuantitative information includes country-level\
    \ per-capita DAD, median global DAD from tropical cyclones, and uncertainties:\
    \ \"Median country-level per-capita DAD... in Trillion US$ (left y-axis) and relative\
    \ to global world product (GWP, right y-axis). Black horizontal lines, and bounds\
    \ of boxes indicate median losses and 66% confidence interval accounting for uncertainty\
    \ dimensions.\"\n\nAnalysis averages DAD over multiple pathways and discount rates\
    \ with 120,000 realizations per country: \"The analysis averages DAD... Representative\
    \ Concentration Pathways, Shared Socioeconomic Pathways, and discount rates, with\
    \ 120,000 realizations per country.\"\n\nEstimation of DAD relative to GWP, average\
    \ household income, and potential SCC increase due to TCs is provided: \"Median\
    \ average per-capita DAD for the main specification relative to 2019 average household\
    \ income; note log-scale on x-axis. Calculating the SCC once with and once without\
    \ TC impacts.\"\n"
  6: "Temperature-dependent damage functions for tropical cyclone induced growth losses.\
    \ Global mean temperature (GMT) change (relative to pre-industrial levels) across\
    \ Representative Concentration Pathways (RCPs) 2.6 (blue), 6.0 (orange), and 8.5\
    \ (red). Visualization of the quasi-universal scaling of global (country-averaged)\
    \ tropical cyclone-induced growth losses with global mean temperature (GMT) change\
    \ (relative to pre-industrial levels) across Representative Concentration Pathways\
    \ (RCPs) 2.6 (blue), 6.0 (orange), and 8.5 (red). Median SCC increases substantially\
    \ by 22% to US$/tCO2 212 (138\u2013318). We combine process-based modeling of\
    \ the population exposure to TCs with an empirical growth model into a transparent,\
    \ tractable, and openly accessible framework for assessing the future socioeconomic\
    \ impacts of these events. Since the average across countries is unweighted, the\
    \ \uFB01gure provides only a visualization of the relative RCP and SSP independence\
    \ of the damage functions. The global SCC is highest for the strongest emission\
    \ scenario RCP8.5. TC-SCC is subject to relatively large uncertainties, and there\
    \ are high tail risks. With DAD and TC-SCC, we employ two complementary metrics\
    \ to quantify the additional burdens that climate change imposes on national economies\
    \ and societies through TC impacts. We show the importance of empirically constraining\
    \ the persistence of growth losses in the economic system and accounting for."
  7: "Source material here.\nEvaluation overview: \"Our DAD analysis reveals that\
    \ differences in income among countries must not be neglected when estimating\
    \ and comparing the adaptation challenges of countries. In per-capita terms, absolute\
    \ DADs are highest for strongly exposed high-income countries such as Taiwan,\
    \ Japan, and the USA.\"\nDrivers of Risk: \"Since low- and middle-income countries\
    \ often have less financial means to support their domestic population and invest\
    \ in reconstruction efforts in the disaster aftermath, our estimates suggest that,\
    \ in relative terms, TC-prone low- and middle-income countries could face even\
    \ larger adaptation challenges than their high-income counterparts.\"\nQuantitative\
    \ material: \"A recent meta-analysis including 207 studies and more than 5,000\
    \ SCC estimates finds that median SCC estimates have quadrupled over the last\
    \ decade from US$/tCO2 48 in 2007\u20132012 to US$/tCO2 328 in 2018\u20132022\
    \ for Ricke\u2019s choice of the rate of pure time preference (\u03C1 = 2%, our\
    \ main specification). Our preferred estimate is with US$/tCO2 212 (66% CI: US$/tCO2\
    \ 138\u2013318) somewhat lower than the median estimate of the meta-analysis for\
    \ 2018\u20132022.\"\nMethodology: \"Our DAD analysis likely underestimates the\
    \ economic implications for lower-income populations that are often more exposed\
    \ to \u2013 and need longer to recover from \u2013 TC strikes. The analysis considers\
    \ uncertainty dimensions and uses 7,200,000 realizations per country. Parameters:\
    \ 8 lags, RCP6.0-SSP2, and Ricke\u2019s discounting choice (main specification),\
    \ except in a.\"\nHighlights: \"For an average household, these range from one\
    \ to more than 10 days of income lost per year, strongly depending upon assumptions\
    \ on discounting. While our approach may still account implicitly for other impact\
    \ channels such as health impacts, several lower-income countries often have less\
    \ financial means to support their domestic population and invest in reconstruction\
    \ efforts in the disaster aftermath.\"\n"
  8: "text\nOur modeling approach lacks the \uFB02exibility of fully-\uFB02edged climate\
    \ integrated assessment modeling frameworks64;climatedamages in terms of DAD and\
    \ SCC can be calculated along standard climate- and socio-economic scenarios but\
    \ the framework does not allow us to endogenously model mitigation responses to\
    \ climate damages (e.g., investment in renewable energies, carbon taxation, etc.)\
    \ as well as their impact on global warming and on the socioeconomic development\
    \ of countries. However, by deriving empirical country-level temperature dependent-damage\
    \ functions accounting for the persistence of damages in the economic system,\
    \ we pave the way for the integrated assessment modeling community to perform\
    \ such fully integrated analyses. Since the storm-surge risk increases with rising\
    \ sea levels, and also TC rainfall is projected to intensify under global warming11,63,our\
    \ damage projections should be considered as a lower bound of the overall expected\
    \ damage from TCs. Since DAD and SCC estimates are key for decision- and policymakers\
    \ at national and international levels charged with weighing the costs of mitigation\
    \ and adaptation measures with climate change impacts and empower them to soundly\
    \ design mitigation policies such as carbon taxation schemes37,our \uFB01ndings\
    \ underline the importance of adequately accounting for the contributions of all\
    \ major categories of extreme weather events in future damage estimates...Our\
    \ study suggests that the TC damages can be rather substantial already, driving\
    \ up the country-level SCC of China, the USA, and India by 68%, 53%, and 9%, respectively.\
    \ In our study, we assume that countries\u2019 growth response to future TCs mimics\
    \ their historical response...by deriving empirical country-level temperature\
    \ dependent-damage functions accounting for the persistence of damages in the\
    \ economic system, we pave the way for the integrated assessment modeling community\
    \ to perform such fully integrated analyses. The substantial increase in SCC by\
    \ 22.2% at the global level and by 44.4% in TC-affected countries that we observe\
    \ when explicitly accounting for TC impacts and their persistence in the economic\
    \ system, suggests that a more explicit representation of TCs could drive up previous\
    \ SCC estimates that do not, or only indirectly, account for TC impacts. and we\
    \ neglect TC-related rainfall17 and storm surge62 as drivers of TC damage...Since\
    \ the storm-surge risk increases with rising sea levels, and also TC rainfall\
    \ is projected to intensify under global warming11,63,our damage projections should\
    \ be considered as a lower bound of the overall expected damage from TCs.\n"
  9: "Source material here.\nEvaluation overview: \"The impact assessment tool CLIMADA71\
    \ is used to generate wind footprints for each TC track. The number of people\
    \ exposed to these 1-minute sustained winds of at least 34 knots is aggregated\
    \ by country and year. The population exposure for the future period is generated\
    \ by extending the historical HYDEv3.2.1 population data set68 for each SSP over\
    \ the period 2010\u2013210072.\"\n\nDrivers of Risk: \"For each GCM-RCP combination\
    \ and (sub-)basin, we generate 100 probabilistic time series of TC tracks for\
    \ the period 1980\u20132100.\"\n\nQuantitative material: \"For each GCM-RCP-region\
    \ combination, we then compute the mean frequency and intensity of landfalling\
    \ TCs in years where the global mean temperature falls within this interval...\
    \ In total, this amounts to 1200 artificial TC time series for each ocean basin.\"\
    \n\nMethodology: \"For each GCM-RCP-region combination, we then compute the mean\
    \ frequency and intensity of landfalling TCs in years where the global mean temperature\
    \ falls within this interval... The population exposure for the future period\
    \ is generated by extending the historical HYDEv3.2.1 population data set68 for\
    \ each SSP over the period 2010\u2013210072... To estimate the national GDPpc\
    \ growth responses over the period 1981\u20132015, we use a three-way \uFB01xed\
    \ effects panel model.\"\n"
  10: "`\nEvaluation overview: \"Projection of discounted annual damages... we project\
    \ a time series of TC-induced changes to the national GDPpc growth rates...\"\n\
    \nDrivers of Risk: \"...projection of discounted annual damages...evaluate the\
    \ impact of tropical cyclones... Estimation of temperature-dependent damage functions...\"\
    \n\nQuantitative material: \"...the hypotheses \u03B3_(e,r,b,li) = 0 and \u03C9\
    _(e,r,b,li) = 0 have to be rejected at the 5% level of significance for between\
    \ 58.5% and 86.5% of the samples across uncertainty dimensions 5 and 6 (r and\
    \ b), depending on the country i...\"\n\nMethodology: \"For each of the 41 TC-affected\
    \ countries...three different Representative Concentration Pathways (RCPs)...two\
    \ Shared Socioeconomic Pathways (SSPs)...four bias-corrected CMIP5-GCMs...\" and\
    \ \"We derive temperature-dependent damage functions by linearly regressing the\
    \ growth rate changes...\" and \"We then test for structural breaks in the intercept\
    \ and slope coefficients across SSPs and RCPs by running F-tests...\"\n\nHighlights:\
    \ \"Thus, the relationship between the exogenous and endogenous variables cannot\
    \ be explained by the RCP-independent coefficients \u03B3_(r,b,li) and \u03C9\
    _(r,b,li) alone, and we therefore account for the structural dependence on RCPs\
    \ by including the random variables \u03B3_(e,r,b,li) and \u03C9_(e,r,b,li)...\"\
    \ and \"the hypotheses \u03B3_(s,r,b,li) = 0 and \u03C9_(s,r,b,li) = 0 cannot\
    \ be rejected at the 10% level of significance (p\u22650.69) for any country i...\"\
    \n"
