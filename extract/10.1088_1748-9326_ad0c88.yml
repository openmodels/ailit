  8: Increases in sea surface temperature and anthropogenic warming affecting sockeye
    salmon catch anomalies.
  9: Increased North Pacific temperatures, particularly SST extremes, are driving
    changes in sockeye salmon productivity.
  10: The warming signal from high-frequency noise in North Pacific SST is estimated
    using Bayesian smoothed regression.
  11: The setup involves SST trends and anomalies, indicating changes in sea surface
    temperature as a driver of risk.
