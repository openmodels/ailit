  5: Human influence on climate change is identified as a risk impacting sea surface
    temperature anomalies.
  6: The shocks or changes impacting the outcomes include anthropogenic influence
    leading to increased frequency and intensity of SST anomalies.
  7: Changes in sea surface temperature, particularly the increase beginning from
