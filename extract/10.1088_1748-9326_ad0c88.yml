  11: "Based on the results of the perfect model setup, we adopted a value of \u03C3\
    S = 0.4 for all regions. Values of \u03C3D varied between 1.16 and 1.84 for the\
    \ different regions. All regions reached the desired threshold of 80% of \u2018\
    true\u2019 values falling between the 10th and 90th quantiles of weighted prediction\
    \ with these combinations except for the Southern California Current, which reached\
    \ 79.3% (figure A1). Combined weights (wi) calculated using these shape parameters\
    \ showed a stronger effect of skill weight than independence weight (figure A2).\
    \ Normalized values of model weights (where a weight of one corresponds to an\
    \ unweighted model) showed the most tendency towards model democracy for the North\
    \ Pacific and Southern California Current, and the strongest weighting for individual\
    \ models in the British Columbia Coast (figure A3). The relationship between SST\
    \ observations and modeled values by weight is plotted in figure A4.\n\nWe used\
    \ a separate round of model weighting for estimating the timing of different North\
    \ Pacific warming thresholds under SSP2-4.5 and SSP5-8.5 (figure 5(B) in the Main\
    \ Text). In this instance, we only weighted models by the trend in anomalies during\
    \ 1973\u20132022 (root mean square error for linear regression of observed anomalies\
    \ on modeled anomalies). This single weighting variable reflected the goal of\
    \ this part of the analysis, which was to project North Pacific warming.\n"
