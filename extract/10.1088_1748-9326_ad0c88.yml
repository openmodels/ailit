  9: "Source material here.\n\"Our results also show that the evidence for human influence\
    \ on North Pacific temperatures is consistently stronger for three-year running\
    \ mean SST than for annual SST values... But this result also suggests an important\
    \ ecological insight... fish populations are typically sensitive to climate at\
    \ multiple life history stages, suggesting they are more responsive to multi-year\
    \ perturbations than shorter events.\" \n\"At-sea distribution data suggest that\
    \ warming since 2014 may be approaching a tipping point at which the envelope\
    \ of preferred temperatures for sockeye salmon will no longer be available in\
    \ the Gulf of Alaska, particularly in winter.\"\n\"Our results indicate that deleterious\
    \ temperatures should be expected as often as not in the current climate, and\
    \ that temperatures that appear necessary for healthy catches will become rare\
    \ once North Pacific warming exceeds 1.5 \xB0C.\"\n\"In our case study, the system-breaking\
    \ event is the 1.4SD decline in log-transformed sockeye salmon catch at temperatures\
    \ corresponding to FAR \u2A7E 0.98.\"\n\"our estimates show negligible uncertainty\
    \ for regional FAR time series from roughly the 1990s onwards, indicating that\
    \ model uncertainty plays little role in our conclusions regarding anthropogenic\
    \ influence on SST in recent decades.\"\n\"We propose that using an attribution\
    \ statistic as an explanatory variable in an ecosystem services model, rather\
    \ than SST or a heatwave index, may provide valuable context for adaptation decision-making.\"\
    \n"
  10: "  \n\"The data that support the findings of this study...North Pacific SST\
    \ time series in order to isolate the warmingsignal from high-frequency noise.\"\
