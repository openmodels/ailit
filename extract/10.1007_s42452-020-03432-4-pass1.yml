sourcematerial:
  4: 'yaml

    Evaluation overview: "Our purpose is to examine the quantitative relationship
    between CO 2 and temperature on crop yields and to explore food security or insecurity
    in the presence of climate change."

    Drivers of Risk: "Crop yields are anticipated to decline if the earth continues
    to warm but increase as CO 2 concentration rises."

    Methodology: "To do so, we perform a historical analysis on the crop yield trends
    in 57 selected countries from 1961 to 2013 on a yearly basis employing a fixed-effects
    panel regression model. The model is based on CO2 levels measured at Mauna Loa,
    Hawaii, and weighted-average temperatures in each country in corresponding years.
    We also incorporate other socio-economic factors, including purchasing power parity
    adjusted gross domestic product (PPP GDP) and education levels measured by Human
    Capital Index (HCI),that might affect crop yields. In addition, we control for
    other factors such as technological changes that contribute to increased yields."

    Highlights: "We conclude that the threat of food insecurity is overstated."

    '
  5: '"Adverse weather is perhaps the greatest risk to crop production, which makes
    the agricultural sector particularly vulnerable to climate change." ". . . the
    atmospheric concentration of CO2 has been increasing. Based on continuous measurements
    at Mauna Loa, Hawaii (Rahmstorf et al. 2007; NOAA 2019), atmospheric CO2 has risen
    from 316.0 parts per million by volume (ppm) in 1959 to 408.5 ppm in 2018."

    '
  6: " \n\"Estimating a correct relationship between crop yields and climate variables\
    \ is a crucial first step in addressing questions about food security. ... Based\
    \ on our estimated relationship, we attempt to answer the question of whether\
    \ food insecurity is an imminent threat.\"\n\"We focus on six main cereal crops:\
    \ wheat, rice, maize, rapeseed (canola), soybean and sorghum. Wheat, rice and\
    \ maize are the most important crops accounting for some 60% of the globe\u2019\
    s production of cereals.\"\n\"Therefore, the purpose of the current study is to\
    \ examine the effect that changes in atmospheric CO2 and temperature have had\
    \ on crop yields in the past, and what this might imply for the future.\"\n"
  7: "\nSource material: \"The response of the yields of the six crops to projected\
    \ changes in atmospheric CO2 and temperature is indicative of potential future\
    \ food insecurit y. Using FAO crop yield data, we...Finally, sorghum is an important\
    \ crop, partly because it is uniquely adapted to Africa\u2019s climate \u2013\
    \ it is drought-resistant and able to withstand periods of waterlogging (Taylor\
    \ 2003). Because of its resilience, sorghum will continue to play an essential\
    \ role in the future as climate change continues.\"\n"
  10: 'Source material here.

    investigate the impact of CO2 and temperature on crop yields and develop statistical
    methods to determine how past yields have responded to increases in atmospheric
    CO2 and climate/weather variables. The estimated relationships are then used to
    determine the yield response to changes in projected CO2 and temperatures (heat).


    The current study takes the development level of each country across periods into
    account and controls for its effect. Consequently, the results will be useful
    for further an al ys i s of crop-planting choices, policymaking, et cetera, in
    countries with different backgrounds.

    '
  11: 'text

    Lobell and Field used first differences in yield, with minimum and maximum temperatures,
    and precipitation, as explanatory var iables. The use of first differences is
    to minimize the influence of slowly changing factors such as crop management.
    Lobell et al. (2011) examined the impact of climate change on crop yields at the
    country level for the period 1980 to 2008. They incorporated data on monthly temperature
    and precipitation, crop production, crop locations, and growing seasons and used
    panel analyses of maize, wheat, rice and soybean for all countries. Challinor
    et al. (2014) conducted a meta-anal ysis of 1,048 observations from 66 studies
    to determine the separate impacts of adaptation, change in temperature, change
    in CO2, and change in precipitation on crop yields in tropical and temperate regions.
    They concluded that, if farmers adapted to the changed climate conditions, wheat,
    maize, and rice yields in temperate regions would increase as a result of higher
    temperatures, ceteris paribus, but production of maize and wheat would be adversely
    affected by higher temperatures in the tropics. They found that climate impacts
    often exceeded 10% of the rate of yield change, which indicated that climate changes
    were already exerting a considerable drag on yield growth.

    '
  12: 'Source material here.

    the analysis showed that, while rice yields in the tropics would be unaffected
    by temperature increases between 0oC and 3oC, rice yields would increase by 10%
    or more if temperatures rose by upwards of 5oC, ceteris paribus. Indeed, temperature
    was the dominant explanatory factor explaining changes in crop yields, with precipitation
    and CO2 fertilization playing a minor albeit yield-enhancing role (contributing
    less than 15% of the overall change in crop yields)...The current study extends
    previous studies by considering temperature, CO2, technological advances, and
    other adaptations in our regression models, thus presenting a clearer picture
    of future food security...we examine the inferred impact of climate change on
    observed yield trends at the country level for the period 1961-2013...

    '
  13: "yaml\nEvaluation overview: \"A panel regression model is developed to observe\
    \ variations in crop yields within periods and between countries. Our database\
    \ consists of 57 countries for the period 1961 to 2013 and six crops (number of\
    \ observations in parentheses): wheat (2,096), rice (2,013), soybean (1,932),\
    \ maize (2,307), rapeseed (1,395), and sorghum (1,720).\"\nDrivers of Risk: \"\
    surface temperature and CO2 data\"\nQuantitative material: \"Tables 1 through\
    \ 3\"\nMethodology: \"A panel regression model is developed to observe variations\
    \ in crop yields within periods and between countries. Our database consists of\
    \ 57 countries for the period 1961 to 2013\"\nMore Notes: \"There is a lot of\
    \ overlap in the top twenty producing countries \u2013 countries that are top\
    \ producers of any given crop are likely to be a top producer of another crop\
    \ as well.\"\n"
  14: 'yaml

    Evaluation overview: "Yet we believe the model still provides useful insights
    regarding the inferred impact of climate change on crop yield trends."

    Drivers of Risk: "We employ the spatially-weighted, location-specific temperature
    data from the Berkeley Earth Surface Temperature series (Berkele y Earth 2019).
    ... The Mauna Loa annual CO2 data are from the Earth S ystem Research Laboratory
    of the National Oceanic and Atmospheric Administration (NOAA 2019)."

    Methodology: "We employ the spatially-weighted, location-specific temperature
    data from the Berkeley Earth Surface Temperature series (Berkele y Earth 2019).
    ... for larger countries such as Canada, China, the U.S. and Brazil, we employ
    production-weighted temperatures of the respective regions within which each crop
    is grown. ... Production maps provided by the United States Department of Agriculture
    (USDA 2019) are used to identify the proportion of production by area of each
    crop. ... The Mauna Loa annual CO2 data are from the Earth S ystem Research Laboratory
    of the National Oceanic and Atmospheric Administration (NOAA 2019). ... Finally,
    we make use of the Penn World Table (PWT) version 9.1 database from the University
    of Groningen (Feenstra et al. 2015)."

    More Notes: "We assume that atmospheric CO2 is uniformly distributed and does
    not vary across countries. This is a strong assumption that is the result of data
    limitations."

    '
  15: "Source material: From 1961 to 2013, political changes in countries such as\
    \ Sudan, the Soviet Union and Ethiopia have likely had negative effects on crop\
    \ yields. Several modifications were made to the data to capture these and other\
    \ extraneous factors that might have impacted yields: a) The USSR disintegrated\
    \ into fifteen separate states in 1991... Gross Domestic Product (PPP GDP) calculated\
    \ using the output-based approach to control for the development of countries.\
    \ The PPP GDP data are measured in millions of 2011 U.S. dollars. PWT\u2019s human\
    \ capital index (HCI) controls for education levels, which are indicative of technological\
    \ development; it is based on years of schooling and returns to education. ...\
    \ There are some challenges that could reduce the accuracy of our results. First,\
    \ the production map provided by the USDA is a rough approximation of crop production\
    \ and national average temperatures for most countries. Based on geographic area,\
    \ we determine which countries\u2019 regional data to use and which national average\
    \ data are based on whether the country exhibits a lot of variation in temperature.\
    \ Second, we use annual temperature data that do not adequately consider the actual\
    \ growing seasons for various crops. For example, in some countries two or more\
    \ crops can be grown annually on the same parcel of land, but not in other countries."
  16: "Third, there are different varieties (cultivars) of the same crop. Crops such\
    \ as wheat and rapeseed may be planted in fall (referred to as winter wheat/rapeseed)\
    \ or spring; fall plantings spread machine operations to save costs and provide\
    \ an impetus to plant growth in early spring, but run the risk that the crop is\
    \ killed over winter. Different cultivars and planting times can lead to dissimilar\
    \ responses to climate. Given lack of data, we are unable to account for these\
    \ factors. Finally, as indicated above, the assumption that levels of CO2 are\
    \ uniformly distributed across all global regions is rather strong. The CO2 data\
    \ are provided by NOAA\u2019s Carbon Cycle Group and uses measures of monthly\
    \ mean CO2 measured at the Mauna Loa Observatory in Hawaii. Our results depend\
    \ on how quickly and evenly CO2 spreads throughout the atmosphere. For each crop,\
    \ we employ the following regression model: Yit = \u03B20 + \u03B21 CO2 + \u03B2\
    2 Tit + \u03B23 CO2^2 + \u03B24 Tit^2 + \u03B25 CO2\xD7Tit +\u2211k \u03B1k Xk,it+\
    \ \u03B3t + \u03B6t + uit, where Yit refers to the yield in country i at time\
    \ t; CO2 refers to the average annual level of carbon dioxide in the atmosphere;\
    \ Tit is the annual temperature (\xB0C) in country i in year t; Xk,it refers to\
    \ one of K socio-demographic control variables; \u03B2j (j=1, \u2026, 5) and \u03B1\
    k (k=1, \u2026, K) are parameters to be estimated; \u03B3t and \u03B6t are the\
    \ time and country fixed effects, respectively; and uit is the error term that\
    \ accounts for any variation caused by omitted variables. Quadratic terms for\
    \ temperature and CO2, as well as an interaction term, reflect inherent and expected\
    \ nonlinearities, even though these are not statistically significant for all\
    \ crops. We utilize a fixed effects regression model to exploit variation across\
    \ time periods within countries and between countries. This allows us to examine\
    \ how crop yields have changed. The essence of fixed effects is that they control\
    \ for time-invariant regressors that are excluded from the model. In the current\
    \ context, this would include whether a country has a tropical or temperate climate."
  17: 'Source material here.

    "The fixed-effects model utilizes both within- and across-country differences
    in weather."

    "To estimate the regression equations, we developed statistical programs written
    in R (R Core Team 2019, version 1.1.463) and Stata (StataCorp 2019, version 15.1)."

    "In each of the regressions reported in the table, the signs on the coefficients
    on CO2 and temperature are positive and statistically significant, while those
    of the quadratic terms and interaction term are all negative and statistically
    significant."

    "Our interest is to uncover marginal effects, which we do by comparing our full
    model specification with two sets of controls to alternatives that have fewer
    control variables."

    '
