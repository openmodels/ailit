  19: null
  20: Finally consider the regression results for rice and sorghum in Table 6. Rice
    appears to be sensitive to increasing temperatures, but the CO2 terms are statistically
    significant (save for the interaction between CO2 and temperature) and the linear
    term for temperature is statistically insignificant. Surface air temperature may,
    however, be an inappropriate regressor in the determination of rice yields, perhaps
    because paddy rice grows partially submerged in water. Coupled with the country-invariant
    CO2 measure, we do not believe we can accurately measure this relationship for
    rice yields. As for sorghum, all coefficients reflect their expected signs and
    are similar to those found for other crops (except rice). The only statistically
    insignificant estimate is on the quadratic term for temperature; however, its
    magnitude is not dissimilar to previous regressions. All interaction effects in
    the sorghum regression are negative and statistically significant, suggesting
    that the CO2 fertilization is less effective at higher temperatures. Likewise,
    the effect of an increase in temperature also diminishes at higher levels of atmospheric
    CO2.
  21: "Source material: Variables CO2, Temperature, CO2-squared, Temp-squared, and\
    \ CO2 \xD7 Temp are used in regression analysis. The analysis includes regression\
    \ coefficients indicating the impact of CO2 and temperature on rice and sorghum\
    \ yields. Rice and Sorghum Regression Analysisa ... The equations of the marginal\
    \ effects for each of the fully -specified models (3) and (6) in Tables 4 through\
    \ 6 are provided in Table 7. These are then evaluated at the average levels of\
    \ CO2 and temperature so that we can isolate the main effects of these two climate\
    \ variables on each t ype of crop. The marginal effects of temperature on crop\
    \ yields have the a priori expected signs for each crop, with rice having the\
    \ most severe diminishing returns based on the interaction term. We then compute\
    \ tipping points by setting the first-order partial derivatives with respect to\
    \ both CO2 and temperature equal to zero and solve for CO2 and temperature, respectively.\
    \ This gives us the tipping points at which an increase in temperature or CO2\
    \ leads to falling crop yields."
  22: " \n\"Drivers of Risk\": \"Marginal effects are derived from the final specifications\
    \ of regression models... Parameters... indicate that these are statistically\
    \ insignificant at the 10% level or better. The marginal effect of CO2 (temperature)\
    \ can be evaluated at the average level of temperature (CO2) so as to isolate\
    \ the main effects.\"\n\"Quantitative material\": \"Table 7: Marginal Effects\
    \ for CO2 and Temperature by Crop... Wheat... Maize... Soybean... Rapeseed...\
    \ Rice... Sorghum... Marginal effects are derived from the final specifications\
    \ of regression models.\"\n\"Methodology\": \"The marginal effects for CO2 and\
    \ temperature are evaluated by computing tipping points using their averages computed\
    \ from regression models. The models involve linear and quadratic terms, as well\
    \ as interaction terms for CO2 and temperature.\"\n"
  23: "Lack of statistical significance in our tipping points is indicative of the\
    \ fact that we are not properly identifying this relationship by using surface\
    \ air temperatures. The tipping point for wheat is the only one calculated using\
    \ statistically significant parameters. We get CO2 tipping points that exhibit\
    \ statistical significance for wheat, soybean and sorghum at 396.2 ppm, 416.7\
    \ ppm, and 670.9 ppm, respectively, although these results need to be investigated\
    \ further. As for wheat, we are measuring a combination of winter and spring wheat;\
    \ although they are typically the same cultivar, there are clear differences in\
    \ the temperatures at which each crop is grown. The economic significance of 19.9\xB0\
    C is meaningless as this would imply that we should already be seeing negative\
    \ impacts on wheat yields; however, this is not the case."
  24: " \nFigure 4: Temperature Effects on Crop Yields at differing levels of CO2\n\
    The image is a line graph titled \"Rice,\" which illustrates the relationship\
    \ between temperature (\xB0C) and yield (ton/ha) for rice under different CO2\
    \ concentration levels...\nThe x-axis represents temperature, ranging from -20\xB0\
    C to 50\xB0C, while the y-axis represents yield, ranging from -5 to 10 ton/ha...\n\
    Each curve shows an increase in yield with temperature to a certain point, followed\
    \ by a decline. Higher CO2 concentrations tend to result in higher yields at optimal\
    \ temperatures...\n\nThis image is a line graph depicting the relationship between\
    \ temperature and yield for sorghum under different CO2 concentration levels...\n\
    The x-axis represents temperature in degrees Celsius, ranging from -20\xB0C to\
    \ 50\xB0C, and the y-axis represents yield in tons per hectare, ranging from 0\
    \ to 40...\nLines indicate how varying CO2 levels impact sorghum yield across\
    \ different temperatures...\n\nThe image is a plot showing the relationship between\
    \ temperature and maize yield under different CO2 levels...\nThe x-axis represents\
    \ temperature in degrees Celsius (\xB0C), ranging from -20 to 50. The y-axis represents\
    \ yield measured in tons per hectare (ton/ha), ranging approximately from -20\
    \ to 20...\nAt lower temperatures, the yield is higher, but it decreases as temperature\
    \ increases for all CO2 levels...\nHigher CO2 levels generally show higher yield\
