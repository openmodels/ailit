  16: "Regression model includes coefficients \u03B2j (j=1, \u2026, 5) and \u03B1\
    k (k=1, \u2026, K) to be estimated, reflecting the impact of CO2, temperature,\
    \ and socio-demographic variables on crop yield."
  18: The page provides regression coefficients showing the effects of CO2 and temperature
    on wheat and maize yields; for example, the CO2 coefficient for wheat is 0.2220
