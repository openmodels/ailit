  19: Regression analysis provides coefficients for CO2, temperature, and their interactions
    on soybean and rapeseed yields. Adjusted R2 values are provided to indicate model
    fit (0.314 to 0.342).
  20: "Regression models (R\u0305                2) for soybean and rapeseed are nearl\
