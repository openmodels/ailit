  11: 'Source material: "To estimate the marginal damage of an additional tonne of
    CO2, PAGE is run twice, with one run based on the exogenous emission scenario
    and the second run adding a CO2 pulse in the first model time step in 2020. JSK,
    JR, CMB conceived and implemented annual temperature variability in PAGE. The
    results displayed in figure A2 show that the SCCO2 is more stable for pulses that
    are not truly marginal. All our SCCO2 estimates are based on an annual pulse size
    of 10 Gt of CO2 in model year 2020, totalling a 75 GtCO2 pulse over the period
    modeled. The model postulates that the changes in growth rates are explained by
    a rate of convergence and a rate of decay. We use a two-step approach, fitting
    the model using Stan, a computational Bayes system. As SSP data are not available
    for every year, fitting the exact expression above requires a model with dynamics." '
