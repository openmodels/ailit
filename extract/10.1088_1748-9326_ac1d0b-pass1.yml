  28: 'Source material here.

    Interannual temperature variability, particularly in the tropics and northern
    regions, impacts outcomes: "we find strongly positive changes over the tropics,
    especially over Amazonia... There is a noticeable increase in variability in most
    land areas and some oceans, especially in the Northern Hemisphere."


    The paper presents quantitative data on the percentage change in temperature variability
    between pre- and post-1986 periods: "the local change between the two time periods
    is shown in percentages... Represents the percentage difference in temperature
    variability between the pre- and post-1986 periods."


    Applied a land-sea mask to HadCRUT4 grid, used cosine of latitude, spatial aggregation,
    and a 30-year running window for linear detrending: "To find the level of interannual
    variability per region, we apply a land-sea mask to the coarse HadCRUT4 grid,
    followed by multiplying with the cosine of the latitude... A 30-year running window
    is used for linear detrending."


    There is a noticeable increase in temperature variability in most land areas and
    some oceans, especially in the northern hemisphere, after 1986: "The data suggest
    increasing variability in temperature after 1986, particularly in the northern
    regions."

