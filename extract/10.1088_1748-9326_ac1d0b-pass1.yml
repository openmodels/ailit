    Drivers of Risk: "Climatic extremes are another particularly important driver
    of climate change-induced damages(Field et al 2012,Kotz et al 2021)....Omission
    of such features in climate-economy models risks underestimation of the SCCO2
    because if convex regional temperature damage functions (Burke et al 2015) and
    an expected earlier crossing of potential climate and social thresholds in the
    climate-economy system (Tol 2019, Glanemann et al 2020)....Here, we include climate
    variability by coupling the empirical temperature-damage function with variable,
    autoregressive interannual temperatures....together, these provide an indication
    of the magnitude and uncertainties of the contribution of climate and economy
    feedbacks and interannual variability to the SCCO2."

