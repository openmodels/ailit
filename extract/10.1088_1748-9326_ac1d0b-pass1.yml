  17: "Source material here.\nEvaluation overview: \"Damage persistence can have catastrophic\
    \ impacts on the welfare of regions, to the extent that some regions approach\
    \ zero consumption.\"\nDrivers of Risk: \"A temperature shock would result in\
    \ a minor decrease in population\" and \"marginal damages of CO2 will abruptly\
    \ decrease once a region reaches the subsistence level of per capita consumption.\"\
    \nQuantitative material: \"We therefore introduce two boundaries. First, we assume\
    \ that a region\u2019s per capita consumption cannot fall below the World Bank\u2019\
    s current threshold for extreme poverty of $1.90 (2011 PP) per day, converted\
    \ to $2015 (PAGE-ICE\u2019s monetary unit) using the World Development Indicators\u2019\
    \ GDP deflator time series. As a result, per capita consumption in the model cannot\
    \ drop below $740.65 (per year) which equals about 17% of the 2015 per capita\
    \ consumption for the poorest region in PAGE-ICE, India+.\" \nMethodology: \"\
    We introduce these boundaries as logistic paths such that the consumption and\
    \ equity-weighted damages converge against the threshold without fully reaching\
    \ it. This convergence system is expressed by the following equation... The SCCO2\
    \ Monte Carlo mean...\"; \"Monte Carlo simulations are used.\"\nHighlights: \"\
    Damage persistence can have catastrophic impacts on the welfare of regions, to\
    \ the extent that some regions approach zero consumption.\"; \"This system ensures\
    \ both that \u02DCy converges against \u03B8 as y goes to infinity and that the\
    \ derivative of \u02DCy with respect to y equals 1 at y = \u03F5, thus avoiding\
    \ breaks.\"\n"
  18: "  \ngi,t=  \u03B2Temperaturei,t+  \u03B3 \xB7Xi,t+  \u03B1  i+  \u03B4 t+ \
    \ \u03F5i,t  (B4)\nwhere gi,t denotes the growth rate of country i at time t and\
    \ Xi,t denotes a vector of additional independent variables with the vector of\
    \ coefficients \u03B3.\n\nIf damages are not fully persistent over time, then\
    \ signs of \u03B22 will be positive.\n\nThe long-run marginal impact of temperature\
    \ on growth (Dell et al 2012, Moore and Diaz 2015), which can identify damage\
    \ persistence \u03C1 based on its ratio to the immediate marginal impact.\n\n\
    In the case of pure level effects, all immediate impacts of temperature shocks\
    \ are compensated for over time and the numerator of \u03C1 = 0 becomes zero.\n\
    \nIf, however, after k years, the long-run marginal impact is only half the immediate\
    \ impact of a temperature shock, we can conclude that only 50% of economic damages\
    \ persist over time.\n\nThe introduction of the convergence system decreases the\
    \ SCCO2, but the effect is modest compared to other model parameter settings (see\
    \ for instance figure B1).\n"
  19: "The paper evaluates the persistence of climate-related damages, particularly\
    \ focusing on the ratio of long-run to immediate marginal impacts on temperature:\
    \ \"we estimate the damage persistence as the ratio of long-run to immediate marginal\
    \ impacts as the temperature goes to (minus) infinity, as indicated by the lagged\
    \ regression model by Burke et al (2015).\"\n\nChanges in temperature, particularly\
    \ temperature shocks, are the key drivers impacting economic outcomes: \"the economy\
    \ takes several years after a temperature shock to rebound, implying that our\
    \ persistence estimate has an upward bias.\"\n\nThe paper indicates that the damage\
    \ persistence is quantified at 52.8% of the immediate impact when using one temperature\
    \ lag: \"the resulting damage persistence equals only 52.8% of the immediate impact.\"\
    \n\nThe analysis is performed using a regression model with temperature lags,\
    \ and persistence estimates are assessed through Monte Carlo simulations. A different\
    \ approach using a low-pass filter is also explored for robustness: \"For this\
    \ reason, we rely on the specification with only one lag... we use this empirical\
    \ distribution of the persistence parameter (N = 1\xD7 1006) for Monte Carlo simulations\
    \ in PAGE... we explore the robustness of our approach by adopting another methodology.\"\
    \n\nThe damage persistence is significantly reduced when additional lags are included,\
    \ with estimates dropping to 27.8% with two lags and 10.3% with four lags: \"\
    including a second lag would strongly reduce a point estimate to 27.8%. A model\
    \ with four lag even suggests a persistence of only 10.3%.\"\n\nThe ratio of marginal\
    \ impacts varies with temperature, showing numerical instability around 13\xB0\
    C due to the denominator approaching zero: \"the immediate marginal impact, which\
    \ is the denominator of \u03C1, approaches zero around 13\xB0C for the coefficients\
    \ from Burke et al (2015), leading to a damage persistence of \xB1\u221E in the\
    \ proximity of this temperature.\"\n"
