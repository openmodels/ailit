Drivers of Risk:
  2: Climate feedbacks, economy feedbacks, climate extremes, interannual temperature
    variability
  3: Climatic extremes such as interannual climate variability and weather extremes
    including temperature anomalies, extreme rainfall, and floods are important drivers
    of climate change-induced damages.
  4: The model considers emissions of CO2, CH4, N2O, linear gases, sulfates, and a
    residual group of other greenhouse gas emissions; it also incorporates permafrost
    carbon feedback, the effect of sea ice and land snow decline on surface albedo,
    and a fat-tailed distribution of sea level rise; global temperatures are scaled
    to eight represented regions.
  5: Annual temperature anomalies, sea-level rise (dependent on global mean temperatures)
  6: Climate feedbacks (CO2 model, climate sensitivity, sea-level rise, permafrost
    feedback, sea ice and land snow albedo feedback), discontinuity impacts (Arctic
    feedbacks, catastrophic sea level rise), simulation period, baseline income levels,
    vulnerability of regions, empirical damage estimates
  7: Climate change impacts (unspecified) and damage persistence are the drivers of
    risk.
  8: The analysis considers temperature-induced economic damages and the lack of adaptation
    to climate impacts.
  9: The paper examines the impact of interannual temperature variability and its
    interaction with a convex empirical temperature-damage function on climate damages.
  10: Shocks such as annual temperature anomalies and persistence of economic damages
    greatly impact SCCO2 outcomes.
  11: The addition of a CO2 pulse in the first model time step in 2020 is a driver,
    as is the annual temperature variability incorporated into the PAGE model.
  12: The analysis considers different levels of CO2 emissions measured as a pulse
    in gigatons.
  13: No relevant information
  14: This page does not specifically mention shocks or changes directly impacting
    outcomes like temperatures or floods.
  17: Temperature shocks and the marginal damages of CO2 are drivers of risk.
  18: Temperature is the main driver of risk; temperature shocks also considered.
  19: Changes in temperature, particularly temperature shocks, are the key drivers
    impacting economic outcomes.
  20: Temperature and precipitation shocks are identified as drivers impacting GDP
    growth.
  22: No relevant information
  23: Temperature, Temperature squared
  24: Shocks considered include temperature changes and their lags.
  25: Temperature increases and the persistence of their effects on economic growth
    are the primary drivers of risk discussed in this section.
  27: Climate change-induced economic damages
  28: Interannual temperature variability, particularly in the tropics and northern
    regions, impacts outcomes.
  29: Annual spatially aggregated mean temperature variability
  31: No specific shocks or changes impacting the outcomes such as summer temperatures
    or floods are identified.
  33: Temperature variability, climate conditions, extreme events (floods), temperature
    and cyclones
Evaluation Overview:
  14: This page does not provide an overview of the specific outcomes, such as mortality
    or productivity loss, being evaluated.
Evaluation overview:
  2: The social cost of carbon dioxide (SCCO2), the projected cost to society of releasing
    an additional tonne of CO2.
  4: The study evaluates the social cost of carbon (SCCO2).
  5: GDP
  6: Social Cost of Carbon Dioxide (SCCO2) in 2020 (expressed in $2015 USD)
  7: Gross domestic product (GDP) and GDP growth rates are evaluated.
  8: The page evaluates the persistence of economic damages from temperature-induced
    impacts and the Social Cost of Carbon Dioxide (SCCO2).
  9: The page discusses the effects of interannual temperature variability on climate
    damages, expressed as a percentage of GDP in 2100, separately for three damage
    modules.
  10: The analysis discusses the determination of economic damage levels and adaptation
    capacity in relation to the social cost of carbon dioxide (SCCO2).
  11: The paper discusses the Social Cost of Carbon (SCCO2) and the marginal damage
    of an additional tonne of CO2.
  12: The paper reviews the Social Cost of Carbon Dioxide (SCCO2) as an evaluated
    outcome.
  13: No relevant information
  16: The text assesses SCCO2 (social cost of carbon dioxide) values in different
    scenarios involving climate damages using various models.
  17: The paper evaluates the economic impacts of climate change, focusing on GDP,
    consumption, and damages.
  18: Economic growth is the outcome being evaluated.
  19: The paper evaluates the persistence of climate-related damages, particularly
    focusing on the ratio of long-run to immediate marginal impacts on temperature.
  20: The paper evaluates the impact of temperature and precipitation on GDP per capita
    growth.
  22: No relevant information
  23: GDP per capita growth
  25: The paper discusses the impact of temperature and its lags on GDP per capita
    growth as an outcome of climate change.
  27: SCCO2 (Social Cost of Carbon Dioxide)
  29: No relevant information
  31: No relevant evaluation of specific outcomes like mortality or productivity loss
    is provided.
  33: Economic impacts of climate change, economic growth, social cost of carbon
Highlights:
  2: Climate feedbacks account for a relatively minor increase in SCCO2 compared to
    other updates. Both the economy feedbacks and other increases since PAGE09 are
    almost entirely due to higher damages in the Global South. Interannual temperature
    variability increases the width of the SCCO2 distribution.
  4: The PAGE-ICE model includes a more detailed representation of CO2 and CH4 sinks,
    permafrost carbon feedback, the effect of sea ice and land snow decline on surface
    albedo, a fat-tailed distribution of sea level rise, and interannual temperature
    variability with a temperature feedback through annual auto-correlation. The model
    also includes the possibility of persistent climate-induced damages, which in
    turn affect GDP pathways and scale emissions accordingly. Market damages are calculated
    based on absolute temperature.
  5: There is no strong evidence for increase or decrease in global annual temperature
    variability with global mean temperature increases.
  6: "The mean SCCO2 for PAGE-ICE is double the value for PAGE09. This increase is\
    \ almost entirely attributed to increased social costs in the Global South. The\
    \ mean SCCO2 attributed to the Global North sees no notable change. 50.1% (34.5%\u2013\
    69.0%, interquartile range) of GDP damages persists as impacts on growth."
  7: High levels of damage persistence can cause economic contraction in the Global
    South and lead to catastrophic climate change impacts.
  8: High persistence and low adaptation focus result in large SCCO2 estimates. Models
    suggest significant adaptation efforts are necessary to lower SCCO2.
  9: "The introduction of temperature variability broadens the tails of SCCO\u2082\
    \ distributions and affects projected damages expressed as a percentage of GDP\
    \ in 2100 under different damage modules."
  10: The persistence of economic damages determines SCCO2, highlighting the importance
    of adaptation capacity and economic uncertainty over climate science uncertainty.
  12: Different model variants of PAGE show various behaviors in SCCO2 predictions,
    indicating substantial uncertainty in estimating SCCO2 based on CO2 pulse sizes.
  13: Decrease in tolerable temperature triggers discontinuity increasing SCCO2.
  14: A one standard deviation decrease in the tolerable temperature before discontinuity
    occurs leads to a substantial increase in the SCCO2 ($617.53).
  16: SCCO2 values significantly differ based on scenarios and models, with examples
    showing higher estimates when growth effects are included.
  17: Damage persistence can have catastrophic impacts on the welfare of regions.
    The model incorporates boundaries to prevent consumption from falling below a
    subsistence level and to limit the equity-weighting of damages.
  18: The sign of the coefficient on lagged temperature indicates whether damages
    are compensated for over time (positive) or exacerbated over time (negative).
    The ratio of the long-run marginal impact to the immediate marginal impact indicates
    the percentage of economic damages that persist over time.
  19: The damage persistence is significantly reduced when additional lags are included,
    with estimates dropping to 27.8% with two lags and 10.3% with four lags.
  20: The regression model shows that temperature and its lags have significant effects
    on GDP per capita growth, with notable persistence results and variation in impacts
    based on model specifications.
  22: Low-pass filtering yields higher persistence levels; however, Monte Carlo mean
    SCCO2 decreases with low-pass filtering.
  23: Temperature and temperature squared are statistically significant predictors
    of GDP per capita growth when using unfiltered and 3-year filtered data, but not
    with 5-year or 10-year filtered data. The estimated persistence decreases as the
    filter length increases.
  24: The persistence of economic damage from temperature shocks is suggested to be
    more significant in poorer regions.
  25: "Results indicate variability in the persistence of temperature effects, with\
    \ some coefficients significantly impacting GDP per capita growth and the resulting\
    \ persistence parameter (\u03C1) ranging from 0.22% to 100.00%."
  27: Increased adaptation efforts could limit the vulnerability of capital stocks
    to climate change, potentially making assumptions of extrapolating previous persistence
    levels too pessimistic.
  28: There is a noticeable increase in temperature variability in most land areas
    and some oceans, especially in the northern hemisphere, after 1986.
  29: Table C1 shows the variability of median and mean local temperatures across
    different regions. The autoregressivity varies by region (see table C3). Controlling
    for a smoothed GMST predictor or an auto-regressive term reduces average correlation
    of the residuals across regions by half (figure C3).
  31: The analysis provides region-specific regression results, highlighting variations
    in temperature relationships across different areas.
  33: Paris climate agreement passes the cost-benefit test; Day-to-day temperature
    variability reduces economic growth
Methodology:
  2: Compares the PAGE-ICE model with the decade older PAGE09. Extends PAGE-ICE with
    economy feedbacks.
  3: The PAGE-ICE model simulates climatic and economic developments from 2020 to
    2300 in eight aggregated regions, incorporating Arctic feedbacks like permafrost
    thawing and surface albedo changes.
  4: "The PAGE-ICE model is run twice, once with the baseline emission pathway and\
    \ once with an added CO2 pulse; the SCCO2 is calculated as the difference in global\
    \ equity-weighted damages between the two runs, discounted to the base year (2015).\
    \ Equity weighting uses a mean (minimum, maximum) elasticity of marginal utility\
    \ of consumption of 1.17 (0.1\u20132.0), and a pure time preference rate of 1.03%\
    \ (0.5%, 2.0%). The PAGE-ICE model uses Monte Carlo sampling of over 150 parameter\
    \ distributions."
  5: Annualized temperatures are used for calculating damages on an annual basis.
    Temperature variability is modeled to be constant over time, based on Ilyas et
    al (2017). Parameters for temperature variability are fit to historical temperatures
    using least-squares regression and LOESS.
  6: Monte Carlo simulations (50000 runs) assuming the SSP2-4.5 scenario. The SCCO2
    estimates reflect the cost of emitting one ton of CO2 in 2020. Breakdown of changes
    from PAGE09 to PAGE-ICE into a series of key steps.
  7: The PAGE-ICE model is used with modifications to incorporate growth effects and
    damage persistence, under the SSP2-RCP4.5 scenario. Results are presented for
    fixed persistence levels (0-100%) and an empirically derived persistence distribution
    from Burke et al. (2015).
  8: Monte Carlo simulations and the PAGE-ICE model are used to assess SCCO2, considering
    persistent climate damages.
  9: The analysis employs Monte Carlo simulations with the PAGE model under the SSP2-4.5
    scenario, considering both variability and growth effects on temperature and damages.
  10: The analysis is based on PAGE models with a focus on annual variability and
    the persistence of climate-induced economic damages.
  11: The PAGE model is run twice, once with an exogenous emission scenario and once
    with the addition of a CO2 pulse. A two-step Bayesian approach is used to extrapolate
    population and income levels past 2100, fitting a model to available SSP data.
    Growth rates are modeled with a rate of convergence and a rate of decay. Stan,
    a computational Bayesian system, is used for model fitting.
  12: Analysis is done through modular frameworks using model variants with or without
    annual temperature variability, compared using 50,000 Monte Carlo simulations.
  13: Uses PAGE-ICE model for SSP2-4.5, deterministic run, with Monte Carlo distribution
    for parameter impacts.
  14: The analysis is based on the default PAGE-ICE model for SSP2-4.5 using deterministic
    runs to estimate changes in SCCO2 from one standard deviation changes in several
    parameters.
  16: The use of Monte Carlo simulations is mentioned for analyzing SCCO2 values with
    variability models; the methodology addresses economic growth effects and persistence
    of damages.
  17: The PAGE-ICE model is used. Equity-weighting is applied based on a region's
    consumption level relative to the EU in 2015. Logistic paths are introduced to
    smooth out discontinuities caused by boundaries for economic collapse and equity-weighting.
    Monte Carlo simulations are used.
  18: Fixed effects regressions of economic growth on temperature and other variables
    are used. Lagged temperature variables are included to assess the persistence
    of damages over time. The long-run marginal impact of temperature on growth is
    estimated. The analysis can identify damage persistence based on its ratio to
    the immediate marginal impact. The persistence of market damages is explored through
    setting persistence to a low, arbitrary value and also through empirical approaches.
  19: The analysis is performed using a regression model with temperature lags, and
    persistence estimates are assessed through Monte Carlo simulations. A different
    approach using a low-pass filter is also explored for robustness.
  20: A regression model is used with temperature and precipitation variables, including
    various lags, and low-pass filtering is applied to derive estimates of persistence.
  22: Analysis uses low-pass Butterworth filter on temperature and precipitation data
    and compares persistence across different filter settings.
  23: Regression analysis is performed on the Burke et al (2015) data with low-pass
    filtered climate variables (3-year, 5-year, and 10-year filters). Standard errors
    are clustered at the country level. Persistence is estimated via 5000 cluster
    bootstrap samples.
  24: The analysis uses a baseline regression model with temperature and precipitation
    lags, country and year fixed effects, and country-specific time trends.
  25: The analysis employs a baseline regression model by Burke et al. (2015), including
    multiple temperature and precipitation lags, country and year fixed effects, and
    country-specific time trends.
  27: Monte Carlo simulations under different annual decay rates of damage persistence
    for SSP2-4.5; Historical temperature data from Ilyas et al (2017) used to assess
    temperature variability; Interannual temperature variability computed as the long-term
    average of the 11 year standard deviations after detrending the annual temperature
    anomaly data using a local 11 year running mean.
  28: Applied a land-sea mask to HadCRUT4 grid, used cosine of latitude, spatial aggregation,
    and a 30-year running window for linear detrending.
  29: The analysis uses linearly detrended temperatures from 1986-2015 and a 10000-member
    ensemble to calculate the standard deviations of annual spatially aggregated mean
    temperature variability. Autocorrelated temperatures are added to PAGE-ICE.
  30: An additional temperature model is explored without auto-regression, instead
    incorporating observational uncertainties with simulations and a Monte Carlo approach.
  31: Uses an autoregressive model to analyze regional temperature changes and includes
    statistical metrics such as R-squared.
  33: Panel analysis, integrated assessment models, model intercomparison projects,
    scenarios towards limiting global mean temperature increase
More Notes:
  2: Robust quantification of climate-economy feedbacks and climate extremes are demonstrated
    to be essential for estimating the SCCO2 and its uncertainty.
  4: The PAGE-ICE model has been translated into the Mimi modeling framework, using
    the same validation process as for Mimi-PAGE. The model code and documentation
    are available from a GitHub repository. The study provides results for a selection
    of scenarios across climate outcomes and socioeconomic developments, based on
    the Tier 1 scenarios of ScenarioMIP (SSP1-1.9, SSP1-2.6, SSP5-8.5, and SSP2 combined
    with the emission pathway RCP4.5).
  6: Interaction effects between changes can lead to minor changes in the values presented.
  7: The Social Cost of Carbon (SCCO2) estimates are highly sensitive to equity weighting
    parameters and vary across methodologies.
  13: No relevant information
  14: Some parameters show significant impact on SCCO2 both for increases and decreases,
    indicating sensitivity to assumptions about these parameters.
  16: The text mentions incorporation of economic growth and persistence parameters
    to model climate impacts on GDP, emphasizing equity-weighting limitations for
    extreme damages.
  18: The paper discusses the convergence system and its impact on the SCCO2 results,
    noting that the introduction of the convergence system decreases the SCCO2, but
    the effect is modest compared to other model parameter settings (referencing Figure
    B3 and B1).
  19: "The ratio of marginal impacts varies with temperature, showing numerical instability\
    \ around 13\xB0C due to the denominator approaching zero."
  22: Method includes examining persistence across global vs. region-specific models,
    comparing rich and poor countries separately.
  23: The authors explore regional heterogeneity in persistence by splitting the data
    into income-based subsamples (above and below the sample median for purchasing
    power parity (PPP)). However, they find no clear evidence for applying heterogeneous
    persistence in their model using this approach. They also remove countries with
    less than 20 temperature-precipitation observations for the low-pass filtering.
  25: The findings suggest that regions with lower GDP per capita drive the primary
    effects of temperature persistence, with richer regions being less affected.
  27: "The analysis explores the theoretical possibility that damage persistence decays\
    \ exponentially over time. The study indicates no clear overall positive or negative\
    \ trend in interannual variability from the period 1986\u20132015 compared to\
    \ pre-1986 levels."
  29: The regions are chosen for economic coherence rather than climatological distinctness.
    The paper tests the assumption that residual temperature variation is uncorrelated
    across regions after accounting for GMST and regional auto-regression.
  31: No additional notes; the content primarily presents statistical results from
    regression analyses.
  33: This page is a list of references, with some title information giving the focus
    of the paper. Direct results are unlikely to be found.
Quantitative Material:
  14: Impact of various parameter changes on the Social Cost of Carbon (SCCO2) for
    2020 is quantitatively shown as differences in dollar amounts based on the PAGE-ICE
    model for SSP2-4.5.
Quantitative material:
  2: PAGE-ICE yields SCCO2 values about two times higher than PAGE09 due to climate
    and economic updates. Economy feedbacks demonstrate a manifold increase in the
    SCCO2.
  4: "The study uses a 75 Gt pulse size in the first time period of PAGE-ICE (mid-2017\u2013\
    2025), representing an annual pulse size of 10 GtCO2, to estimate the marginal\
    \ damage of an additional tonne of CO2."
  5: "Models global (1a) and regional (1b) temperature variability using equations\
    \ Tg,t+1\u223CN (\u03B1g+ \u03B2g\u0398gt+ \u03B3gTt,\u03C32g) and Tr,t+1\u223C\
    N (\u03B1r+ \u03B2rTrt+ \u03B3gTg,t+1,\u03C32r), respectively."
  6: "Mean SCCO2 in 2020 from PAGE09 is $158. Updating to AR5 increases it to $217.\
    \ Applying a fat-tailed distribution to sea-level rise increases it to $228. The\
    \ permafrost feedback increases it to $244. Surface albedo reduces it to $239.\
    \ Reducing the size, threshold, and lag of discontinuity impacts reduces it to\
    \ $213. A longer simulation period increases it to $239. Updating baseline income\
    \ levels increases it to $245. Adjusting vulnerability increases it to $281. Changing\
    \ damages to empirical estimates gives a final mean SCCO2 for PAGE-ICE of $307.\
    \ Interquartile range for PAGE-ICE is $147\u2013$349, and a 5%\u201395% range\
    \ of $82\u2013$831."
  7: A 10% persistence of economic damages leads to a fifteenfold increase in the
    mean SCCO2.
  8: Current persistence is around 50%, and reducing it by more than 2% per year is
    required to lower SCCO2 below $2500.
  9: "Quantitative results include SCCO\u2082 distributions, damage impacts as a percentage\
    \ of GDP in 2100, and temperature projections across several models and scenarios."
  10: The mean SCCO2 does not increase due to the damage cap and is influenced by
    various SSP scenarios, with SSP1-1.9 producing lower values compared to SSP2-4.5.
  11: The paper mentions using CO2 pulses ranging from mid-2017 to 2025, with the
    annual pulse size of 10 Gt of CO2 in model year 2020, totalling a 75 GtCO2 pulse
    over the period modeled.
  12: The SCCO2 values are plotted against different CO2 pulse sizes in a graph with
    error bars indicating uncertainty.
  13: SCCO2 impact calculated as difference between mean and mean increased by standard
    deviation, displayed only for impacts of at least $10.
  15: "Table provides \u03B4 and \u03B2 parameters for GDP per capita and population\
    \ under different SSP scenarios."
  16: The text includes specific SCCO2 values presented in different SSP (Shared Socioeconomic
    Pathways) scenarios, e.g., 129 mean SCCO2 for SSP2-4.5 in PAGE09 model.
  17: Subsistence level of per capita consumption is set at $740.65 per year. Damages
    are subject to equity-weighting up to 99% of per capita consumption. Uses a threshold
    for extreme poverty of $1.90 (2011 PPP) per day.
  18: Formulas (B4), (B5), (B6), and (B7) are provided.
  19: The paper indicates that the damage persistence is quantified at 52.8% of the
    immediate impact when using one temperature lag.
  20: The persistence of temperature impacts on GDP growth is quantified, showing
    persistence results and Monte Carlo percentiles.
  22: SCCO2 decreases from $3372 to $3025 when comparing lag-based approach to low-pass
    filtering.
  23: "The table presents regression coefficients for temperature and temperature\
    \ squared on GDP per capita growth, along with t-statistics, resulting persistence\
    \ (\u03C1), percentiles (5th and 95th), N, BIC, and ll. For example, with the\
    \ unfiltered temperature variable, the coefficient is 0.012933 with a t-statistic\
    \ of 3.41."
  24: Temperature coefficients and resulting impacts on GDP per capita growth are
    quantitatively presented, with percentage changes and Monte Carlo percentiles.
  25: The document provides coefficients for various temperature lags' effects on
    GDP per capita growth, such as 0.0085 for temperature growth in GDP per capita
    growth, and multiple Monte Carlo percentiles measuring the spread of potential
    outcomes.
  27: "An annual decay of 3% or higher greatly reduces the estimated marginal damages\
    \ of CO2 emissions; If damage persistence decreases by 4%\u20135% per year, the\
    \ SCCO2 equals $305\u2013312"
  28: The paper presents quantitative data on the percentage change in temperature
    variability between pre- and post-1986 periods.
  29: "Table C1 provides standard deviations (in \xB0C) of annual spatially aggregated\
    \ mean temperature variability for 1986-2015 for various regions (EU, Russia+,\
    \ USA, China+, India+, Africa and Middle East, Latin America, Other OECD, Global),\
    \ with uncertainties (1 standard deviation)."
  30: The residual standard error associated with the temperature models ranges between
    0.130 and 0.206.
  31: Contains regression coefficients for different regions indicating relationships
    in autoregressive models of temperature change.
  33: Mentions studies quantifying uncertainties in temperature change and impacts
    of extremes
