  10: 'yaml

    Evaluation overview: "Our results show that determining the level of persistence
    of economic damages is one of the most important factors in calculating the SCCO2,
    and our empirical estimate illustrates the urgency of increasing adaptive capacity,
    whilesuggesting that the mean estimate for the SCCO2 may have been strongly underestimated."

    Drivers of Risk: "It further indicates that considering annual temperature anomalies
    lead to large increases in uncertainty about the risks of climate change."

    Quantitative material: "Introducing the temperature anomalies to an annual version
    of PAGE with constant damage persistence does not result in an increase in the
    mean SCCO2 because of the damage cap...For the SSP1-1.9 scenario, all model specifications
    without growth effects produce lower values of the mean SCCO2 compared to SSP1-2.6
    and SSP2-4.5."

    Methodology: "For all the PAGE-ICE-based model specifications..."

    Highlights: "Our results show that determining the level of persistence of economic
    damages is one of the most important factors in calculating the SCCO2...Our findings
    corroborate that economic uncertainty is larger than climate science uncertainty
    in climate-economy system analysis (Van Vuuren et al  2020), and provide a strong
    argument that the assumption of zero persistence in CB-IAMs should be subject
    to increased scrutiny in order to avoid considerable bias in SCCO2 estimates."

