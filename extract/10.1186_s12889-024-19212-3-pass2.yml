  12: 'Source material here.

    "This systematic review provides a summary of evidence published to date regarding
    strategies to enhance occupational heat stress resilience, especially in hot outdoor
    workplaces... Broad findings from these studies indicate that exposure to heatwaves
    and global warming is linked to adverse health impacts on workers."

    "Resilience to climate change among outdoor workers can be reduced by various
    factors, categorized into personal risk factors, environmental risk factors, and
    occupational-related heat exposure risk factors during work."

    "Furthermore, several studies underscore the need for sentinel effects and leading
    indicators to facilitate surveillance of climate-related occupational heat stress
    effects, as well as strategies and interventions for preventing the impact of
    climate change on outdoor workers."

    "Of the 29 assessed papers, 18 (62.06%) directly investigated the effects of climate
    change and adaptation strategies for outdoor workers..."

    "Finally, the review identifies interventions and adaptation strategies for outdoor
    workers, including the provision of accessible cool drinking water, optimized
    work-rest schedules, the availability of proper resting shade, training and awareness
    programs, self-paced work, and the use of supportive protective equipment."

    "The environmental factors contributing to thermal stress include high air temperature,
    heatwaves, high humidity, solar radiation, and UV radiation."

