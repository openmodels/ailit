  19: 'The page describes a flowchart depicting the process of selecting studies for
    a systematic review or meta-analysis on strategies to increase occupational heat
    stress resilience among outdoor workers. It follows a standard PRISMA diagram
    structure. Quantitative details include: 1885 records identified, 116 additional
    records identified, 695 duplicates filtered out, 1306 records screened, 1251 records
    excluded, 55 full-text articles assessed for eligibility, 26 full texts excluded,
    and 29 studies included in qualitative synthesis.'
