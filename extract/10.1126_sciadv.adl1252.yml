  6: "Source material here:\nEvaluation overview: \"Economic valuation of mortality\
    \ impacts from wildland fires.\"\nDrivers of Risk: \"Health impacts from exposure\
    \ to PM2.5 during wildfires...\"\nQuantitative material: \"They estimated 3652\
    \ premature deaths associated with wildfire PM2.5 exposure (8), which is substantially\
    \ lower than our estimates of 12,150 to 12,850 for 2018.\"\nMethodology: \"Our\
    \ study builds on this California- specific analysis by (i) using more highly\
    \ resolved health data, which can reduce potential misclassification of exposures\
    \ associated with using spatially coarse health data; (ii) extending the temporal\
    \ period of the health analysis (analyzing 11 years of data, instead of just 1);\
    \ and (iii) applying a chronic wildfire- specific dose- response value.\"\nHighlights:\
    \ \"We find that capping fire- only concentrations at the 99.9th percentile (exceeding\
    \ 143 \u03BCg/m 3; see table S10) of values results in several hundreds to thousands\
    \ of fewer fire- only PM2.5 attributed deaths per year, but the overall magnitude\
    \ of impacts is still substantial with the peak concentrations capped.\"\n"
  7: "Source material here: This study has several strengths and presents a unique\
    \ contribution to the literature. The use of 11 years of CMAQ data enabled us\
    \ to report on a long-term period of wildfire impacts in California, with several\
    \ high-fire years with substantial impacts. Therefore, the results presented here\
    \ include mortality associated with all wildland fires (not including agricultural\
    \ burns, which are not in-corporated in the isolated fire-only fraction) and do\
    \ not solely represent wildfires. Prescribed burns in California, however, account\
    \ for a very small proportion of the total acres burned (61), although this may\
    \ change in the future with ambitious targets for increased land management practices\
    \ (62). For this study period, we do not anticipate a substantial portion of the\
    \ mortality impacts to be attributable to prescribed burning. The use of fire-only\
    \ PM2.5 estimates from the CMAQ model is a distinct strength of this study. We\
    \ also apply a fire-specific dose-response coefficient accounting for increased\
    \ toxicity of wildfire smoke, which gives a first estimate of chronic wildfire-specific\
    \ mortality impacts. In addition, the inclusion of two exposure scenarios enables\
    \ us to evaluate the sensitivity of the magnitude of health impacts to high PM2.5\
    \ concentrations from severe wildfire events. We also apply a fire-specific dose-response\
    \ coefficient accounting for increased toxicity of wildfire smoke, which gives\
    \ a first estimate of chronic wildfire-specific mortality impacts. The main dose-response\
    \ value presented in the global study, however, found mortality risk estimates\
    \ of a higher magnitude than the Washington study and its own United States\u2013\
    based estimate; results using this dose-response value are included as a sensitivity\
    \ analysis (table S6) and demonstrate approximately twice the mortality impact,\
    \ with more than 100,000 deaths attributable to fire-PM2.5 over the 11-year period\
    \ (38)."
  8: 'Source material here.

    Evaluation overview: "Following this and addressing the second question, we have
    thus modified existing estimates of long-term exposure to undifferentiated PM2.5
    with adjustment for potentially different dose-response functions of wildfires
    compared to undifferentiated PM2.5."

    Drivers of Risk: "Although periodic and seasonal, wildfire smoke is now an ongoing
    exposure that affects much of the population on a regular basis (our analysis
    found that all ZIP codes in California are exposed to smoke each year)."

    Quantitative material: "To overcome this limitation, we have included estimates
    of both the adjusted (estimated wildfire-specific chronic dose-response value,
    Eq. 2, under the assumption of increased toxicity) and unadjusted (undifferentiated
    chronic dose-response value) long-term mortality associated with fire-only PM2.5
    in Fig. 2, which shows the likely increases in mortality burden."

    Methodology: "We were able to separate annual wildfire PM2.5 concentrations from
    those generated by other sources such as traffic and industry by using a CTM for
    exposure assignment. This enabled us to estimate and compare the magnitude of
    effects attributable to wildfires and undifferentiated PM2.5."

    Highlights: "In sum, wildfire PM2.5 elicits many of the same sub-acute biological
    processes as undifferentiated PM2.5, with some studies suggesting heightened toxicity
    in the lung, possibly due to differences in the physical-chemical composition
    of the particles. In attempting to estimate the health burden of wildfire PM2.5,
    then, studies that rely solely on acute estimates from undifferentiated PM2.5
    may underestimate effects if wildfire PM2.5 exhibits heightened toxicity. These
    findings suggest that wildfire PM2.5 can generate long-term health effects capable
    of reducing survival chances, which would result in higher mortality for those
    living in areas with chronically higher wildfire PM2.5 than those in areas with
    lower levels."

    More Notes: "These studies provide valuable insights into the comparative toxicology
    of wildfire and undifferentiated PM2.5, but the actual degree of increased toxicity
    is not fully resolved and likely complicated by the large variability in the fuel
    type and wildfire emissions, weather patterns, combustion profiles, and resulting
    physical-chemical composition, among others."

