Drivers of Risk:
  1: Increased wildfire risk and severity due to climate change, expansion of the
    wildland-urban interface, and questionable wildfire management practices emphasizing
    fire suppression.
  2: Wildland fire-associated PM2.5 concentrations.
  3: Wildfires are the main driver of PM2.5 concentrations impacting air quality and
    mortality in California.
  4: Wildland fires are identified as a key driver impacting mortality through increased
    PM2.5 exposure.
  5: Wildfires impacting PM2.5 concentrations are the main drivers of risk discussed
    in the analysis.
  6: Wildland fires and their PM2.5 emissions are identified as drivers impacting
    mortality rates.
  7: Wildfire smoke is identified as a significant driver of health risks, with prescribed
    burns included but anticipated to be a minor factor.
  8: Wildfire smoke, particularly wildfire PM2.5 concentrations, is identified as
    a driver of increased mortality risk and other health effects.
  9: Increasing severity of wildfires and vulnerable populations in California present
    risks.
  11: Wildland fire smoke, specifically the change in PM2.5 concentration from it.
  13: Wildfires are a major driver of risk mentioned, specifically in relation to
    air pollution and health impacts.
Evaluation overview:
  1: Mortality attributable to PM2.5 from wildland fires is evaluated.
  2: Mortality impacts from wildland fire PM2.5 exposure in California.
  3: The page evaluates the mortality and economic impacts of PM2.5 exposure from
    wildfires in California over an 11-year period.
  4: The paper evaluates the mortality impacts of fire-specific PM2.5, focusing on
    premature deaths in California from 2008 to 2018.
  5: The paper evaluates mortality and economic impacts attributed to PM2.5 from wildland
    fires in California from 2008 to 2018.
  6: The study evaluates the economic valuation and mortality impacts from wildland
    fires, specifically wildland fire PM2.5 exposure.
  7: The evaluation focuses on the health impacts, particularly mortality, associated
    with wildfire-derived PM2.5 exposure over an 11-year period in California.
  8: Mortality risk and long-term health impacts are evaluated, specifically focusing
    on the effects of wildfire PM2.5 versus undifferentiated PM2.5.
  9: The analysis estimates mortality outcomes from PM2.5 exposure due to wildland
    fire smoke in California from 2008 to 2018.
  11: Mortality burden from exposure to PM2.5 due to wildland fire smoke in California,
    and the economic valuation of these health burdens.
  13: This page contains references to studies evaluating health outcomes related
    to air pollution and wildfires, including mortality, cardiovascular disease (CVD),
    diabetes, and respiratory issues.
Highlights:
  1: Wildfires account for a greater mortality and economic burden than indicated
    by earlier studies.
  2: Importance of wildfire management will only grow as aridification intensifies
    with climate change.
  3: The fire-only PM2.5 concentrations exceed NAAQS thresholds in rural northern
    regions; significantly higher mortality estimates when using wildfire-specific
    dose-response values.
  4: Notable findings include high mortality impacts from fires in California, especially
    in 2018, and significant impact areas such as Los Angeles County, the San Joaquin
    Valley, and the Bay Area.
  5: Wildfire PM2.5 accounts for nearly 19% of total PM2.5-related deaths in the state
    during the studied period, with significant mortality and economic burdens identified.
  6: Capping PM2.5 concentrations at the 99.9th percentile results in fewer attributed
    deaths, though the overall impacts remain substantial.
  7: The study presents a first estimate of chronic wildfire-specific mortality impacts
    and highlights disparities between global and U.S. dose-response estimates.
  8: Wildfire PM2.5 may have heightened toxicity compared to undifferentiated PM2.5
    and elicit many of the same sub-acute biological processes as undifferentiated
    PM2.5. Relying solely on acute estimates from undifferentiated PM2.5 may underestimate
    effects if wildfire PM2.5 exhibits heightened toxicity. Wildfire PM2.5 can generate
    long-term health effects capable of reducing survival chances.
  9: Long-term nature of the evaluation over an 11-year period with an innovative
    estimation and application of a chronic dose-response value for wildfire-specific
    PM2.5 exposure.
  11: Calculates the mortality burden from wildland fire smoke PM2.5 in California
    and its economic valuation, compares results using wildfire-specific and undifferentiated
    PM2.5 dose-response values.
  13: The unequal vulnerability of communities of color to wildfire is highlighted
    via reference to Davies et al. (2018).
Methodology:
  1: Uses Community Multiscale Air Quality modeling system wildland fire PM2.5 estimates,
    a concentration-response function for PM2.5, ZIP code-level mortality data, and
    a wildfire-specific dose-response coefficient.
  2: Uses modeled wildland fire-associated PM2.5 concentrations, high-resolution California
    Department of Public Health (CDPH) mortality data, and a calculated chronic dose-response
    coefficient for wildfire PM2.5 exposures and mortality to estimate premature deaths
    due to wildland fires over an 11-year period from 2008 to 2018.
  3: Uses CMAQ model to estimate fire-only PM2.5 concentrations and associated mortality
    using both wildfire-specific and undifferentiated dose-response values across
    an 11-year period.
  4: The analysis estimates mortality impacts using wildfire-specific and undifferentiated
    dose-response values for 2008 to 2018.
  5: The analysis models wildland fire PM2.5 estimates using CMAQ at the 12-km grid
    scale, applying a chronic dose-response value for wildfire exposure.
  6: The study uses a wildfire-specific chronic dose-response value and ZIP code-level
    health data, extending the analysis to 11 years.
  7: The analysis uses 11 years of CMAQ data to model PM2.5 concentrations specifically
    from wildfire smoke, incorporating two exposure scenarios and a fire-specific
    dose-response coefficient.
  8: The methodology involves modifying existing estimates of long-term exposure to
    undifferentiated PM2.5 with adjustment for potentially different dose-response
    functions of wildfires compared to undifferentiated PM2.5, using a CTM for exposure
    assignment. It compares the magnitude of effects attributable to wildfires and
    undifferentiated PM2.5. Both adjusted and unadjusted estimates of long-term mortality
    were used.
  9: "Daily modeled PM2.5 concentrations were used from 2008 to 2018, applying CTM\
    \ estimates and U.S. EPA\u2019s CMAQ modeling system at a 12-km grid spatial resolution."
  11: Uses a dose-response model to estimate mortality burden, incorporating a Monte
    Carlo distribution for the dose-response value; Applies EPA's VSL to estimate
    the economic valuation of health burdens; Accounts for income growth and applies
    a 3% discount rate over an 11-year period to estimate net present value.
  13: This page references studies using time-series analysis, cohort studies, systematic
    reviews, meta-analyses, and modeling (e.g., deep learning for PM2.5 estimation,
    BlueSky smoke modeling framework).
More Notes:
  4: The largest increases in mortality impacts were observed in 2008, 2017, and 2018
    due to more widespread fires reaching high population areas.
  5: The paper emphasizes the need for greater investment in wildfire prevention and
    management based on the identified impacts.
  8: The degree of increased toxicity of wildfire PM2.5 compared to undifferentiated
    PM2.5 is not fully resolved and is likely complicated by the large variability
    in fuel type, wildfire emissions, weather patterns, combustion profiles, and resulting
    physical-chemical composition.
  11: References supplementary materials including tables with dose-response values
    used in the analysis.
  13: The acknowledgment section indicates funding from the California Air Resources
    Board (CARB), NASA, DOE, and UCLA Center for Healthy Climate Solutions. The data
    availability section provides links to modeled air quality data, California mortality
    data, and states that all data needed to evaluate the conclusions are present
    in the paper and/or Supplementary Materials.
Quantitative material:
  1: Estimated 52,480 to 55,710 premature deaths attributable to wildland fire PM2.5
    in California from 2008 to 2018, equating to an economic impact of $432 to $456
    billion.
  2: Modeled PM2.5 values and acres burned by year (2008 to 2018) statewide in California.
  3: Estimated annual mortality due to fire-only PM2.5 exposure ranges from ~1,240
    to 12,850 deaths depending on the year.
  4: Wildland fires account for ~19% of PM2.5-associated deaths overall, with up to
    42% in high-fire years.
  5: The analysis estimates 52,480 to 55,710 premature deaths attributable to fire-only
    PM2.5 in California and an associated economic valuation of $432 billion and $456
    billion (2015 dollars).
  6: For the year 2018, the study estimates 12,150 to 12,850 premature deaths associated
    with wildfire PM2.5 exposure.
  8: The paper mentions adjusted and unadjusted long-term mortality associated with
    fire-only PM2.5 shown in Fig. 2, which illustrates likely increases in mortality
    burden.
  9: Estimates between 52,480 and 55,710 premature deaths attributable to fire-only
    PM2.5 exposures, with an economic valuation of $432 billion to $456 billion.
  11: Calculates a 95% CI for the estimated dose-response value; Uses EPA's value
    of a statistical life (VSL) of $8.7 million in 2015 dollars.
  13: This page does not present quantitative information produced by this study,
    but references studies that likely contain quantitative data on the impacts of
    air pollution and wildfires.
