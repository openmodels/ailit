  4: 'Source material: Summary of long-term mortality impacts across California due
    to fire-only PM2.5. This represents total deaths attributable to fire-only PM2.5
    for adults ages 25+. These were estimated using wildfire-specific and undifferentiated
    chronic dose-response values and are presented for 2008 to 2018. Fires throughout
    2008 contributed a higher percent of all sources PM2.5 than in 2017 and 2018 (Table
    1), the attributable deaths were higher for the later years because the fires
    and smoke exposure in those years expanded to more to high population areas. Wildland
    fires are still responsible for ~19% of PM2.5-associated deaths overall and up
    to 42% in high-fire years. In 2018, the highest fire year with the largest number
    of deaths attributable to fire-only PM2.5, almost 10% of ZIP codes experienced
    more than 15 deaths. The Rough Fire of 2015 burned more than 150,000 acres in
    a more rural area of Fresno County, but most mortality impacts are represented
    by dark blue on the map, are west of the fire in a more populated area of the
    county and throughout the San Joaquin Valley more broadly. Although fires throughout
    2008 contributed a higher percent of all sources PM2.5 than in 2017 and 2018 (Table
    1), the attributable deaths were higher for the later years because the fires
    and smoke exposure in those years expanded to more high population areas. Although
    the fires are in more rural, forested regions (fig. S4 and Fig. 1), the mortality
    impacts are more widespread throughout population centers such as Los Angeles
    County in southern California, the San Joaquin Valley in central California, and
    the Bay Area in northern California as smoke can be transported to these areas
    and fewer individuals live in forested regions.'
