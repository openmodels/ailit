  9: "  \nEvaluation overview: \"This analysis characterizes the harmful impacts of\
    \ PM2.5 from wildland fire smoke on the health of the California population during\
    \ the 11-year period of 2008 to 2018.\"\n\nDrivers of Risk: \"As wildfires increase\
    \ in severity and populations become more vulnerable to subsequent impacts.\"\n\
    \nQuantitative material: \"We estimate that between 52,480 and 55,710 premature\
    \ deaths are attributable to fire-only PM2.5 exposures, with an associated economic\
    \ valuation of $432 billion to $456 billion.\"\n\nMethodology: \"We used daily\
    \ modeled PM2.5 concentrations for 2008 to 2018 for the state of California at\
    \ a 12-km grid spatial resolution, estimated using the U.S. EPA\u2019s CMAQ modeling\
    \ system.\"\n\nHighlights: \"This health impact analysis applies CTM estimates\
    \ of wildland fire PM2.5 to estimate mortality outcomes... This analysis is also\
    \ innovative with respect to the long-term nature of the evaluation over an 11-year\
    \ period and estimation and application of a chronic dose-response value for wildfire-specific\
    \ PM2.5 exposure.\"\n"
