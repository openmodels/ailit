  15: "The PPP GDP data are measured in millions of 2011 U.S. dollars. From 1961 to\
    \ 2013, political changes in countries such as Sudan, the Soviet Union and Ethiopia\
    \ have likely had negative effects on crop yields. Several modifications were\
    \ made to the data to capture these and other extraneous factors that might have\
    \ impacted yields. Gross Domestic Product (PPP GDP) calculated using the output-based\
    \ approach to control for the development of countries. PWT\u2019s human capital\
    \ index (HCI) controls for education levels, which are indicative of technological\
    \ development; it is based on years of schooling and returns to education. There\
    \ are some challenges that could reduce the accuracy of our results. First, the\
    \ production map provided by the USDA is a rough approximation of crop production\
    \ and national average temperatures for most countries. Based on geographic area,\
    \ we determine which countries\u2019 regional data to use and which national average\
    \ data are based on whether the country exhibits a lot of variation in temperature.\
    \ Second, we use annual temperature data that do not adequately consider the actual\
    \ growing seasons for various crops. For example, in some countries two or more\
    \ crops can be grown annually on the same parcel of land, but not in other countries."
