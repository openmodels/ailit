sourcematerial:
  4: 'yaml

    Evaluation overview: "Our purpose is to examine the quantitative relationship
    between CO 2    and temperature on crop yields and to explore food security or
    insecurity in the presence of climate change."

    Drivers of Risk: "Projected climate change has stimulated increasing interest
    in the interactive effects between carbon dioxide (CO2) and temperature on crop
    yields."

    Quantitative material: "To do so, we perform a historical anal ysis on the crop
    yield trends in 57 selected countries from 1961 to 2013 on a yearl y basis employing
    a fixed-effects panel regression model."

    Methodology: "The model is based on CO2          levels measured at Mauna Loa,
    Hawaii, and weighted-average temperatures in each country in corresponding years.
    We also incorporate other socio-             economic factors, including purchasing
    power parity adjusted gross domestic product (PPP GDP) and education levels measured
    by Human Capital  Index (HCI),that might affe            ct crop yields."

    Highlights: "We conclude that the threat of food insecurit y is overstated."

    More Notes: "Crop yields are anticipated to decline if the earth continues to
    warm but increase as CO2 concentration rises. These two factors tend to work in
    opposite directions, and the interactive effect is not yet clear. In addition,
    we control for other factors such as technological changes that contribute to
    increased yields."

