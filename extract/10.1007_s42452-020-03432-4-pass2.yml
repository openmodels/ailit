Methodology:
  4: Fixed-effects panel regression model based on CO2 levels, weighted-average temperatures,
    purchasing power parity adjusted gross domestic product (PPP GDP), and education
    levels (Human Capital Index (HCI)).
  6: Focus is on wheat, rice, maize, rapeseed (canola), soybean, and sorghum to understand
    implications for food security.
  7: Yields and temperatures are analyzed using the Berkeley Earth Surface Temperature
    data, spatially weighted by continents' top twenty producing countries for each
    crop.
  9: No specific methodology is detailed for the analysis of the temperature data
    presented in the graphs.
  11: Panel analyses of maize, wheat, rice, and soybean for all countries using data
    on monthly temperature and precipitation, crop production, crop locations, and
    growing seasons.
  12: Historical data from FAO, examining temperature, CO2, technological advances,
    and adaptations using regression models for 1961-2013.
  13: A panel regression model is developed to observe variations in crop yields within
    periods and between countries. The database consists of 57 countries for the period
    1961 to 2013.
  14: Employs spatially-weighted, location-specific temperature data from Berkeley
    Earth. Uses production-weighted temperatures for large countries like Canada,
    China, the U.S. and Brazil. Uses USDA production maps to identify the proportion
    of production by area of each crop, adjusting production percentages to sum to
    100%. Assumes atmospheric CO2 is uniformly distributed. Uses Penn World Table
    (PWT) version 9.1 database for socio-demographic characteristics. Applicable for
    1950 through 2017.
  15: "Uses Gross Domestic Product (PPP GDP) calculated using the output-based approach\
    \ to control for the development of countries. Uses PWT\u2019s human capital index\
    \ (HCI) controls for education levels. Modifications were made to the data to\
    \ capture extraneous factors that might have impacted yields, including changes\
    \ to how certain countries are treated in the dataset to account for political\
    \ disintegration or formation."
  16: Fixed effects panel regression model is used to examine how crop yields have
    changed across time periods within countries and between countries, controlling
    for time-invariant regressors. The model includes quadratic terms for temperature
    and CO2, as well as an interaction term. CO2 data is from NOAA's Carbon Cycle
    Group, measured at the Mauna Loa Observatory.
  17: The fixed-effects approach helps overcome omitted variable bias related to fixed
    characteristics.
  18: Analysis is based on multiple regression models evaluating the impact of CO2
    and temperature, including variables for GDP per capita and human capital index.
  19: Regression analysis of soybean and rapeseed yields with CO2, temperature, and
    their interactions as independent variables; some models include controls for
    GDP/capita and human capital. Analysis uses data from 45 countries (soybeans)
    or 35 countries (rapeseed).
  20: Regression models used to assess the impact of temperature and CO2 on crop yields.
    Applicable when considering the statistical significance of temperature and CO2
    coefficients for the specific crops mentioned.
  21: Regression analysis using observations of rice and sorghum yields, CO2, temperature,
    GDP/capita, and human capital. Marginal effects are calculated from the fully-specified
    models and evaluated at average levels of CO2 and temperature. Tipping points
    are computed by setting first-order partial derivatives equal to zero.
  22: The analysis involves regression models to determine marginal effects and tipping
    points for CO2 and temperature.
  24: The analysis uses line graphs to depict the relationship between temperature
    and crop yield under different CO2 concentrations. The graphs show how yield changes
    with temperature for CO2 levels of 300, approximately 350 (average), 450, and
    550 ppm.
  26: The conclusions are based on historical, country-level crop yield data analysis.
More Notes:
  4: The study considers the interactive effects of CO2 and temperature, which have
    opposing influences on crop yields. It also controls for technological changes.
  9: The page shows historical temperature patterns for major crops, suggesting stable
    or slightly fluctuating trends over time for different continents.
  13: Real GDP per capita is measured in $U.S. 2011 millions adjusted for Purchasing
    Power Parity (PPP).
  14: The assumption that atmospheric CO2 is uniformly distributed is a strong assumption
