  26: Further research using regional CO2 data is an obvious next step, because, at
    face value, the above tipping points imply that CO2 is already having negative
    effects on wheat and soybean yields, which is not borne out by field trials and
    on-farm yields in many regions (McLachlan et al. 2020). This would not explain
    why industrial farming techniques include consistently pumping CO2 into greenhouses
    to amplify the yields of these crops, leading us to believe that global CO2 is
    simply not a good enough proxy for identifying crop-specific regional effects
    on crop yields. What can be gathered from the present analysis is the fact that
    the CO2-fertilization effect is prominent and is not being properly accounted
    for elsewhere. The negative impacts of global warming on food security is likely
    overstated as a result of overlooking CO2 as a determinant of crop yields. In
    the same sense that farmers pump CO2 into greenhouses to create an artificial
    environment, the globe will likely start to resemble these optimal environments
    as time progresses. Does climate change lead to greater food insecurity? This
    is a difficult question to answer. Food security might be compromised at the regional
    level, but not at the global level, or it might be compromised at both scales.
    Increasing concentrations of atmospheric CO2 can improve agricultural productivity,
    enabling crops to better utilize nutrients, including water. Higher levels of
    CO2 also make crops less susceptible to drought. While droughts might increase
    in some regions of the globe, overall a warmer atmosphere holds more moisture
    leading to increased rainfall. Nonetheless, there remains a fear that, as temperatures
    continue to rise with increasing CO2, the CO2-fertilization effect will be offset
    by too much heat. Indeed, using experimental data, Challinor et al. (2014) found
    temperature was the dominant explanatory factor explaining both positive and negative
    changes in crop yields, with precipitation and CO2 fertilization playing a minor
    albeit yield-enhancing role. Our results based on historical, country-level crop
    yield data provide similar conclusions. 24 | Page
