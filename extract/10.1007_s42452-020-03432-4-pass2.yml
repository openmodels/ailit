    \ models in columns (3) and (6) in each of Tables 4, 5 and 6. Parameters that\
    \ are underlined indicate that these are statistically insignificant at the 10%\
    \ level or better. The marginal effect of CO2 (temperature) can be evaluated at\
    \ the average level of temperature (CO2) so as to isolate the main effects. We\
    \ can compute tipping points as estimates of parameter values using their averages\
    \ computed from the regression models. For example, the tipping point for CO2\
    \ takes the following functional form: CO2 = -[a + c\xD7(T-T\u0305)] / b, where\
    \ a and b are the linear and quadratic terms associated with CO2, and c is the\
    \ coefficient for the interaction term between CO2 and temperature.\n"
