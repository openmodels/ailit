  28: 'Source material: examples of climate smart farming. These and other farm management
    technologies improve agricultural financial and environmental outcomes. The greatest
    potential of future technological changes will likely come from biology. Plant
    breeding and genetic engineering will lead to different crops and crop varieties
    that produce higher yields and are more resilient to weather extremes, such as
    droughts, and offer protection against pests, fungus, and disease. Likewise, research
    can be expected to provide chemicals or biological agents that target weeds and
    insect pests, while being more benign in their environmental impact. Higher yield
    crops currently grown in temperate latitudes are increasingly adapted to tropical
    conditions where hours of sunlight are shorter but temperatures higher. While
    it is difficult to predict what the future might hold in store for agriculture,
    one can be optimistic that technological changes will greatly improve the ability
    of agricultural producers to adapt to climate change. Only when the scope for
    technological improvements is ignored might global warming lead to famines and
    starvation in the future.'
