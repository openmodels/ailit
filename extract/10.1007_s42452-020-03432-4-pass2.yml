  11: 'Source material here.

    Lobell et al. (2011) examined the impact of climate change on crop yields at the
    country level for the period 1980 to 2008. They incorporated data on monthly temperature
    and precipitation, crop production, crop locations, and growing seasons and used
    panel analyses of maize, wheat, rice and soybean for all countries. They found
    that climate impacts often exceeded 10% of the rate of yield change, which indicated
    that climate changes were already exerting a considerable drag on yield growth.

