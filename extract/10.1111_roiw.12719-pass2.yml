Drivers of Risk:
  3: Global temperature change above pre-industrial levels.
  6: Extreme weather events are more frequent and likely to increase due to climate
    change.
  7: The page mentions Hurricanes Katrina and Rita as events impacting economic measures.
  8: Disasters such as floods, storms, fires, droughts, and heat waves are considered.
  9: Not explicitly stated, but implicitly related to climate and weather events captured
    by BEA and NOAA costs
  10: Billion-dollar weather and climate disasters are the primary drivers impacting
    the consumption of fixed capital and NDP.
  15: Events identified include major earthquakes, volcanic eruptions, tidal waves,
    severe hurricanes, drought, and other natural disasters; as well as acts of war,
    riots, technological accidents, and the destruction caused by these events.
Evaluation overview:
  3: Economic impact percentage.
  7: The page does not provide an overview of specific outcomes being evaluated such
    as mortality or productivity loss.
  9: BEA and NOAA Costs
  10: The analysis provides an overview of the financial impacts and trends of billion-dollar
    weather and climate disasters on the consumption of fixed capital and Net Domestic
    Product (NDP) from 1980 to 2023.
  15: No relevant information
Highlights:
  3: Presents a visual summary of studies and models predicting economic impacts based
    on different global warming scenarios.
  6: Scientific progress has made extreme weather events more predictable.
  7: The recommendation proposed avoids introducing volatility by using trend data
    instead of actual disaster costs.
  9: Real value (costs) increases over time. Raw data is volatile, necessitating the
    use of a trend.
  10: The portion of NDP affected by climate impacts is relatively small but has grown
    over the years, from 0.12% in 1980 to 0.40% in 2023, and the consumption of fixed
    capital impact increased from 0.67% in 1980 to 1.95% in 2013.
  15: No relevant information
Methodology:
  3: Statistical modeling, structural modeling, meta-analyses, methods used in the
    IPCC AR5 assessment, combining previous methods; Different Shared Socioeconomic
    Pathways (SSP) models (SSP1-1.9 to SSP5-8.5).
  5: Losses from major infrequent natural disasters are recorded in the other changes
    in the volume of assets account, not under consumption of fixed capital.
  6: Proposes including the trend for asset damage from weather and climate disasters
    in consumption of capital rather than Other Changes in the Volume of Assets.
  7: Discusses the methodology of including full disaster costs in CFC prior to 2008
    SNA and the recommendation to include the trend to avoid volatility.
  8: NOAA collects data on US weather and climate disasters with costs over $1 billion
    using mainly insurance data.
  9: Costs are deflated by CPI-U. A trend is calculated, and the result is robust
    to different methods for calculating the trend.
  15: No relevant information
More Notes:
  7: The discussion is related to economic metrics and how disaster costs could be
    included, with a focus on avoiding volatility in measures such as CFC.
  15: No relevant information
Quantitative material:
  3: Economic impact percentage related to temperature change scenarios; Time progression
    of emission scenarios to future years.
  7: Quarterly annualised CFC fell by 5.8% in Q2 2005 and rose by 18.9% in Q3, related
    to hurricanes.
  8: Approximately 2/3 of NOAA-reported costs are capital losses; NOAA estimates are
    roughly double BEA's.
  9: Figure 6 shows average annual midpoint of BEA and NOAA costs and trend in billions
    of 2023 US dollars. Raw data is volatile, but a trend line is calculated. Costs
    increase over time.
  10: Quantitative data includes the percent of NDP and adjusted Consumption of Fixed
    Capital attributed to disaster impacts, with specific percentages for various
    years such as 0.12% of NDP in 1980 and 0.40% in 2023.
  15: No relevant information
sourcematerial:
  3: 'Source material here.

    1. Evaluation overview: The scatter plots show the "Economic impact percentage"
    on the Y-axis.

    2. Drivers of Risk: The X-axis of the scatter plots is labeled "Global temperature
    change above pre-industrial levels."

    3. Quantitative material: The graphs include "Economic impact percentage related
    to temperature change scenarios; Time progression of emission scenarios to future
    years" as specified by the scatter plots (a to e) and the bar graph (f).

    4. Methodology: The description refers to "Statistical modeling, structural modeling,
    meta-analyses, methods used in the IPCC AR5 assessment, combining previous methods;
    Different Shared Socioeconomic Pathways (SSP) models (SSP1-1.9 to SSP5-8.5)."

    5. Highlights: The text mentions "presents a comprehensive visual summary of various
    studies and models predicting economic impacts based on different global warming
    scenarios."

    '
  5: Losses of fixed assets due to normal or expected levels of accidental damage
    are also included under consumption of fixed capital; that is, damage caused to
    assets used in production resulting from their exposure to the risk of fires,
    storms, accidents due to human error, etc. When these kinds of accidents occur
    with predictable regularity they are taken into account in calculating the average
    service lives of the goods in question... On the other hand, losses due to war
    or to major natural disasters that occur very infrequently, such as major earthquakes,
    volcanic eruptions, tidal waves or exceptionally severe hurricanes, are not included
    under consumption of fixed capital. There is no reason for such losses to be charged
    in the production account as costs of production. The values of the assets lost
    in these ways are recorded in the other changes in the volume of assets account.
  6: "Extreme weather events are more frequent (more \u201Cnormal\u201D) and likely\
    \ to become more so. Scientific progress has made these events more predictable.\
    \ Proposal: The trend for asset damage from weather and climate disasters should\
    \ be included in consumption of capital rather than Other Changes in the Volume\
    \ of Assets."
  7: " \nTheory\nBack to the Future?\n\u2022 Prior to implementing 2008 SNA the US\
    \ BEA included the full disaster costs\n  in CFC\n\u2022 This meant, e.g. quarterly\
    \ annualised CFC fell by 5.8% in Q2 2005, and\n  rose by 18.9% Q3 (associated\
    \ with Hurricanes Katrina and Rita)\n\u2022 Recommendation here is different;\
    \ proposal is to include the trend.\n  \u2022 Practical \u2018benefit\u2019 that\
    \ this doesn\u2019t introduce volatility\n  \u2022 Theoretically could be seen\
    \ as a good proxy for expected costs\n"
  8: 'yaml

    Methodology: "The National Oceanic and Atmospheric Administration (NOAA) has collected
    data back to 1980 on US weather and climate disasters ... They choose individual
    disasters with costs greater than $1 billion ... Based mainly on government and
    private insurance data"

    Drivers of Risk: "Disasters such as floods, storms, fires, droughts, heat waves."

    Quantitative material: "Perhaps 2/3 of these costs are capital losses; Roughly
    speaking 2/3 of NOAA, double BEA."

    '
  9: "Source material: \"Figure 6. Average Annual Midpoint of BEA and NOAA Costs and\
    \ Trend; (Billions of 2023 US Dollars, Deflated by CPI-U); As expected, real value\
    \ increasing over time; Volatility of raw data is evident and substantial \u2013\
    \ highlights the role of the use of the trend; This result is robust to different\
    \ methods for calculating the trend\""
