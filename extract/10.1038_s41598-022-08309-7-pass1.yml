    \ concrete relevant information. This page may have no relevant information, in\
    \ which case report 'No relevant information'. Samples for VFA analysis were acidified\
    \ by the addition of 4% orthophosphoric acid (final concentration)46 and analysed\
    \ by gas chromatography with 4 mM ethylbutyric acid as an internal standard47.\
    \ Ammonia was analysed from end point samples by acidifying with the addition\
    \ of concentrated hydrochloric acid (5% v/v final concentration)48. Aliquots of\
    \ incubation buffer and rumen inoculum were analysed by FTIR (Equinox 55 HTS-XT\
    \ FTIR Spectrophotometer, Bruker UK Ltd, Coventry, UK), where 10 \u03BCL of sample\
    \ was spotted onto a 96 well silicone plate dried to 40 \xB0C before scanning.\
    \ Remaining plant material was treated as with initial plant material prior to\
    \ in vitro batch fermentation. Analysis of VOC data. Initial deconvolution and\
    \ peak identification were carried out in AMDIS v2.72, using the NIST database\
    \ v2.2 (2014). Biological replicate number was included in the model to account\
    \ for non-independence between samples taken on the same date. It was also necessary\
    \ to include the starting mass of dry matter, as this inevitably varied slightly\
    \ between samples. The relationship between dry matter and gas production changes\
    \ over time, such that simply expressing the data as ml gas/g DM does not accurately\
    \ account for the correlation as fermentation progresses. Instead, using dry matter\
    \ as an independent variable allows the model to estimate and control for the\
    \ effect of dry matter at the time of sampling (48 h). Results Effect of growth\
    \ conditions on physiological characteristics of grass varieties at harvest. Overall,\
    \ the grass varieties were clearly affected by the climate scenarios imposed during\
    \ growth, indicating that the extent of the stress imposed was sufficient to elicit\
    \ a physiological response (Fig. S1). Mean biomass values for grasses in each\
    \ climate scenario (control 2020, control 2050, 2050 + flood, 2050 + drought and\
    \ 2050 + heat shock) were 14.4 g, 10.2 g, 8.6 g, 6.0 g and 5.8 g DM respectively\
    \ (SD = 3.61). However, there was a significant effect of grass variety on water-soluble\
    \ carbohydrate (WSC) (P = 0.030), with Aber Niche having a higher (P=0.031) WSC\
    \ compared to Aber Root, although there were no differences amongst any of the\
    \ other grass varieties."
