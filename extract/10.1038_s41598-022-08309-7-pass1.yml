Drivers of Risk:
  2: The outcomes are impacted by climate change factors like increased temperature,
    CO2 levels, precipitation, and extreme weather events such as drought and flooding.
  3: Abiotic and biotic stresses impacting forage grasses, such as high temperatures,
    drought, and flooding.
  5: Climate scenarios impacting grass growth include control 2020, control 2050,
    flood, drought, and heat shock.
  6: The paper examines climate scenarios including 2020 controls, 2050 projections,
    flood, drought, and heat shock, on grass characteristics.
  7: Climate scenarios including drought, flood, and heat shock are analyzed for their
    effects on gas production.
  9: Abiotic stresses like drought, heat stress, and floods impact plant physiology
    and forage quality in grasses.
  10: Climate scenarios like drought, flood, and heat shock are assessed for their
    impact on grass varieties.
  11: Shocks like flooding, drought, and heat shock impact outcomes by altering fermentation
    and methane production during rumen digestion.
  12: Shocks such as acute flood and drought, which are predicted to increase in frequency,
    are identified as drivers impacting forage digestibility and production efficiency.
Evaluation overview:
  2: The study investigates how climate change affects forage grass quality and subsequent
    rumen fermentation.
  3: Explores how forage adaptation to climate change may affect ruminant production
    systems.
  6: The paper evaluates the effects of different climate scenarios on grass characteristics
    such as crude protein, chlorophyll, and fermentation gas production.
  7: Effects of climate scenarios on gas and fermentation by-products during fermentation
    are evaluated.
  9: The paper discusses physiological changes in grasses under different climate
    scenarios, impacting forage quality and ruminant production.
  10: The study evaluates the impact of different climate conditions on grass growth
    and its subsequent effect on rumen fermentation.
  11: The paper evaluates the effect of pre-harvest climate scenarios on rumen fermentation
    and animal performance, particularly focusing on methanogenesis and dry matter
    digestibility (DMD).
  12: The paper investigates the impact of altered environmental conditions on forage
    growth, particularly under severe weather events like flood and drought, and their
    subsequent effects on rumen fermentation and digestibility.
Highlights:
  2: The study found varietal differences in fermentation; decreased digestibility
    and methane production were linked to drought or acute flood treatments in all
    varieties.
  3: The study investigates how 'stress memory' in forage plants can influence forage
    degradation in the rumen and the implications for ruminant feeding strategies
    in the context of climate change.
  5: Grass varieties show clear physiological responses to climate scenarios, affecting
    biomass and water-soluble carbohydrate levels.
  6: Flood scenarios resulted in less gas production compared to controls and heat
    shock; drought resulted in lower methane and CO2 production compared to heat shock
    and 2020 control.
  7: Climate scenarios significantly affect gas production, with specific treatments
    leading to different levels of CO2, CH4, and fermentation by-products.
  9: Sulphurous compounds were the most abundant in the future scenario, with significant
    changes in biomass allocation under drought and heat stress.
  10: Elevated CO2 with drought might mitigate negative effects on protein content;
    significant changes in chlorophyll and Fv/Fm in heat shock conditions indicate
    stress.
  11: Methane levels were lower from fermented grasses subjected to flood, drought,
    or heat shock compared to control, indicating stress conditions affect rumen fermentation.
  12: Acute flood and drought conditions decrease forage digestibility, which may
    have a limiting effect on production efficiency, suggesting the need to consider
    future climates in forage breeding strategies.
Methodology:
  2: The analysis was performed by screening ten forage grass varieties in five different
    climate scenarios, including current climate, future climate (2050), and future
    climate scenarios with added flooding, drought, or heat shock.
  3: Ten forage grass varieties were grown for three months under five different climate
    scenarios using growth chambers, with replication.
  5: Analysis performed using gas chromatography and FTIR for chemical analysis alongside
    PCA and multivariate linear models in R; results include physiological characteristics
    and gas production.
  6: The study uses discriminant functional analysis (DFA) of Fourier Transform infra-red
    spectroscopy (FTIR) and in vitro rumen fermentation experiments to evaluate changes.
  7: Analysis includes fermentation experiments with different climate change scenarios
    and evaluates gas and chemical by-product outputs with statistical comparison.
  9: Random forest classification was used to evaluate compound importance in climate
    scenarios based on mean relative abundance.
  10: The analysis involves FTIR data clustering and the comparison of VOC profiles
    under different climate scenarios.
  11: The analysis employs in vitro gas production technique, which studies fermentation
    of feeds by rumen microbial inoculum; it also uses FTIR profiles and VOC analysis
    for distinguishing effects of plant growth conditions.
More Notes:
  6: The paper finds no significant clustering by grass variety in FTIR spectra, but
    does find clustering by climate scenarios.
  9: Water-soluble carbohydrate levels were higher under drought and heat stress scenarios
    compared to flooding.
Quantitative material:
  5: 'Mean biomass values for grasses in different climate scenarios: 14.4 g, 10.2
    g, 8.6 g, 6.0 g, and 5.8 g of dry matter respectively.'
  6: The analysis provides quantitative measures of chlorophyll content, water-soluble
    carbohydrate, crude protein, and other nutritional metrics under various climate
    scenarios, as well as gas production levels during fermentation.
  7: There are quantitative results on gas (total, CO2, CH4) and fermentation by-product
    concentrations under climate scenarios with statistical significance indicated.
  9: Sulphurous compounds made up 33% of total area, alkenes 20%, acids and ketones
    each 11%. Quantitative data on compound abundance and ranking is provided.
  10: Chlorophyll levels are highest in the control scenario and lowest in heat shock
    and flood conditions, indicating photosynthesis is affected.
  11: Model-predicted acetate:propionate ratio is 3.26 and propionate:butyrate ratio
    is 1.54, closely matching expected values.
sourcematerial:
  2: "Here we investigated how the plant response to climate change affects forage\
    \ quality and subsequent rumen fermentation. Models of near future climate change\
    \ (2050) predict increases in temperature,  CO2, precipitation and altered weather\
    \ systems which will produce stress responses in field crops. This \u201Cstress\
    \ memory\u201D effect was investigated by screening ten forage grass varieties\
    \ in five differing climate scenarios, including current climate (2020), future\
    \ climate (2050), or future climate plus flooding, drought or heat shock. While\
    \ varietal differences in fermentation were detected in terms of gas production,\
    \ there was little effect of elevated temperature or CO2 compared with controls\
    \ (2020). All varieties consistently showed decreased digestibility linked to\
    \ decreased methane production as a result of drought or an acute flood treatment."
  3: "  \n\"relatively little research into how forage adaptation to climate change\
    \ will affect ruminant production systems\"  \n\"adverse environmental conditions\"\
    \  \n\"flooding scenarios where both root and shoot are submerged\"  \n\"five\
    \ different climate scenarios\"  \n\"understand how ruminant feeding strategies\
    \ might be affected by climate change\"  \n\"priming the cells such that the subsequent\
    \ response is altered\"  \n"
