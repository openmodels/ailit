  11: 'text

    The effects of pre-har vest climate scenarios on rumen fermentation are in agreement
    with previous work...The analysis of loss of dr y matter (DM) and amount of gas
    (CO2 and CH4) produced as a result of fermentation of the grass feed indicated
    that the growth conditions could affect how the grasses would be digested by the
    animal. ...The reduced in vitro DMD caused by future climate scenarios, especially
    periods of flooding or drought, would lead to reduced animal performance and would
    require higher intakes to maintain the level of production80,81. Interestingly,
    methane levels were lower from fermentative grasses that had been previously subjected
    to flood, drought or heat shock compared to the 2020 and 2050 controls, potentially
    due to physiological damage caused by flood, drought and heat shock. Based on
    the model-predicted data, the acetate: propionate ratio was 3.26 and the propionate:
    butyrate ratio was 1.54. This closely matched the expected values of 3.25 and
    1.33, respectively85. The in vitro gas production technique is a method for analysing
    fermentation of feeds by a rumen microbial inoculum...FTIR profiles after 48 h
    of digestion discriminated between plants grown in the flood climate scenario
    compared to the control 2020 but did not discriminate amongst the different grass
    varieties...This is one of the first experiments analyse VOCs in relation to plant
    material under simulated rumen conditions, and it showed that it is possible to
    distinguish an effect of plant growth conditions from rumen VOCs.

    '
  12: Here we have investigated the former, to explore whether forage growth under
    an altered climate would produce legacy effects in forage that would impact on
    rumen fermentation when ingested. Notably acute flood and drought caused decreased
    digestibility in those forages. As these conditions are predicted to increase
    in frequency over the next decades, unless addressed this will have a limiting
    effect on production efficiency. Together, these data indicate that forage breeding
    strategies should consider response to future as well as current climates to ensure
    economic and environmental sustainability of production.
