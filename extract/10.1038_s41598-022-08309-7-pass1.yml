Highlights:
  1: Forage grass growth under future climate change scenarios affects fermentation
    and ruminant efficiency.
  2: Little effect of elevated temperature or CO2 on fermentation compared to controls
    (2020). All varieties consistently showed decreased digestibility linked to decreased
    methane production as a result of drought or an acute flood treatment.
  3: Pre-exposure to environmental stresses can alter subsequent stress responses
    in forage plants after ingestion by ruminants. There has been relatively little
    research into how forage adaptation to climate change will affect ruminant production
    systems.
  5: Grass varieties were affected by the climate scenarios during growth. There was
    a significant effect of grass variety on water-soluble carbohydrate (WSC). The
    fibre values for NDF, ADF and ADL varied between grass varieties.
  6: Climate scenario had a significant effect on crude protein, WSC, chlorophyll,
    Fv/Fm ratio, NDF, ADF and ADL. Flooding treatment produced significantly less
    gas than the 2020 controls, 2050 controls and heat shock treatment. Drought resulted
    in the lowest CO2 and methane production.
  7: Climate change scenarios affect fermentation profiles, including DMD, VFA production,
    ammonia concentration, pH, acetate and propionate concentrations, butyrate concentration,
    and the acetate to propionate ratio. Drought, flood, and heat shock generally
    negatively impact fermentation compared to control conditions.
  8: Climate scenarios significantly predicted VOC profiles and fermentation products;
    random forest analysis achieved at least 66% correct classification of climate
    scenarios.
  9: Drought and heat shock scenarios show higher WSC and protein concentrations in
    grasses, while floods negatively affect these levels, increasing fiber proportion.
    The largest decrease in total biomass is observed under drought and heat conditions.
  10: Growth of grasses under different climate conditions impacts fermentation and
    alters nutrient provision affecting forage degradation.
  12: Acute flood and drought caused decreased digestibility in forages.
Methodology:
  1: The effects of climate change scenarios on forage grass growth and subsequent
    fermentation were analyzed.
  2: Models of near future climate change (2050) are used to predict climate conditions.
    Ten forage grass varieties screened in five climate scenarios (current, future,
    future + flooding, drought, heat shock). Fermentation assessed in terms of gas
    production.
  3: Ten different forage grass varieties were grown for 3 months in five different
    climate scenarios (present-day and future potential, based on Ref. 38) replicated
    three times. Climate conditions were simulated in growth chambers.
  4: Grasses were grown under different climate conditions for 3 months. Leaf samples
    were analyzed for photochemical efficiency (Fv/Fm), chlorophyll content, dry matter,
    crude protein, water-soluble carbohydrates (WSC), neutral detergent fiber (NDF),
    acid detergent fiber (ADF), and acid detergent lignin (ADL). In vitro batch fermentation
    was performed using rumen fluid from dairy cows, and gas production, CO2, methane,
    volatile fatty acids (VFA), ammonia levels, and volatile organic compounds (VOCs)
    were measured. Fourier transform infrared spectroscopy (FTIR) was used for non-targeted
    analysis of biochemical changes. Applicable to perennial ryegrass (L. perenne).
  5: Gas chromatography, mass spectrometry, FTIR, and various statistical analyses
    (ANOVA, general linear models, multivariate linear models, random forest) were
    used to analyze samples. Analysis was done on multiple grass varieties.
  6: The study uses discriminant functional analysis (DFA) of Fourier Transform infra-red
    spectroscopy (FTIR) spectra. In vitro rumen fermentation experiments were conducted.
    Results applicable for grass varieties grown under the specified climate scenarios.
  7: ''
  8: Uses random forest classification to differentiate VOC profiles under different
    climate scenarios with analyses of fermentation end products.
  9: The paper utilizes random forest classification to rank compounds by their importance
    in discriminating climate scenarios, with data collected at 24 hours post incubation.
  12: The study investigates the impact of altered environmental conditions on plant
    growth and legacy effects on rumen fermentation when ingested.
