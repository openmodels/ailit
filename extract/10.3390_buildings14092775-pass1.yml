  20: " \n\"Plant performance is strongly linked to substrate temperature, moisture\
    \ content, and nutrient availability. The observed data indicated reduced substrate\
    \ temperature, likely due to the higher moisture content in biochar-amended substrates.\"\
    \ \n\n\"In addition to improving plant performance, biochar amendment also offers\
    \ solutions to improve building energy savings, reduce structural loading, and\
    \ shorten the payback period.\"\n\n\"In accordance with previous studies, the\
    \ effects of biochar on plant performance varied among plant species and GR substrates.\
    \ Therefore, future local studies with long-term observations are necessary to\
    \ identify optimal GR systems tailored to specific climate conditions.\" \n\n\"\
    Future local studies with long-term observations are necessary to identify optimal\
