  18: "Source material here.\nThe paper evaluates the performance of green roof (GR)\
    \ plants under the impact of biochar addition within the context of building and\
    \ construction, including aspects like building energy saving and structural loading.\
    \ The selection of parameters, including substrate temperature and runoff quantity/quality\
    \ was based on their direct impacts on GR plant performance. The importance of\
    \ these parameters in explaining substrate moisture content and nutrient availability\
    \ for enhanced plant growth was also highlighted and taken into consideration\
    \ in previous studies on GR vegetation performance. \n\nResults illustrated that\
    \ different biochar setups failed to reduce nutrient concentrations when compared\
    \ to the non-biochar treatment. Nonetheless, the significant potential of biochar\
    \ for improving runoff quality was evident when evaluating nutrient loads estimated\
    \ by multiplying nutrient concentrations by runoff volume. As a result, nutrient\
    \ loss from biochar-amended GR substrates into runoff was reduced, thereby helping\
    \ to maintain a nutrient-rich growing environment for plants. \n\nIn the study\
    \ of Kuoppam\xE4ki, Hagner, Lehv\xE4virta and Set\xE4l\xE4 [34], results from\
    \ field experiments illustrate an increase of up to 10% in the water retention\
    \ capacity of biochar-amended GRs relative to traditional GRs in the summer. Findings\
    \ from a numerical model named \u201CCHEMFLO-2000\u201D also supported the effectiveness\
    \ of biochar. The simulation results showed that GRs with 3 cm and 5 cm depth\
    \ of biochar increased runoff retention from 55.05\u201365.29% to 66.9 and 69.15%,\
    \ respectively. Another experiment using soil test columns by Huang, Garg, Mei,\
    \ Huang, Chandra and Sadasiv [36] also found improved runoff retention from 45.5%\
    \ to 69.3%.\n\nReduction in building temperature and energy consumption is one\
    \ of the most notable benefits of GRs, which has attracted significant attention\
    \ from researchers. For example, Cascone [81] evaluated the energy efficiency\
    \ of an innovative and sustainable GR with a recycled drainage layer, locally\
    \ sourced materials, and high organic content in substrates. After analyzing the\
    \ thermo-physical parameters of GRs and the building during the summer period\
    \ in Mediterranean climate, the studied GR alleviated the heat transfer to the\
    \ building and the internal surface temperature by 2\xB0C relative to the reference\
    \ concrete roof.\n"
