  6: The study evaluates the effectiveness of different biochar application methods
    in green roofs (GRs) using drought-tolerant native plant species under conditions
    of infrequent irrigation, irregular maintenance, and low substrate nutrients,
    suggesting water scarcity and limited resources as drivers of risk.
  7: Differences in application methods and particle sizes of biochar can affect plant
