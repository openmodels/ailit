Highlights:
  2: Biochar addition enhances water/nutrient retention, increases substrate fertility,
    improves plant growth, reduces substrate temperature, which in turn reduces building
    energy consumption.
  3: Green roofs can cool indoor air temperatures and boost electricity production
    of PV panels; blue-green roofs are effective in alleviating runoff volume; biochar
    can improve soil fertility and plant growth and reduce the structural load of
    green roofs.
  4: The research seeks to understand the impact of various biochar-related parameters
    on plant performance, aiming to provide information about the biochar benefit
    to plant growth under an Australian climate.
  5: Investigates the impact of biochar amendment rate, particle size, and application
    methods on plant performance in green roofs.
  6: The study investigates the use of biochar in green roofs to improve the growth
    of drought-tolerant native plants under conditions of infrequent irrigation and
    low substrate nutrients.
  7: One test bed used 15% v/v biochar to explore effects of higher doses compared
    to typical 7.5% v/v.
  9: Biochar-amended GRs generally performed better than traditional GRs in terms
    of plant height, especially in the final observation.
  10: Wallaby Grass and Common Everlasting height varies over time and between the
    different green roof testbed conditions. Heights of both plant types generally
    increase over the duration of the study.
  11: Biochar generally had a positive impact on the dry weights of common everlasting
    and billy button plants. A mixing medium biochar particles at a dose of 15% v/v
    had the best performance.
  12: Biochar-amended substrates generally had lower temperatures than those without
    biochar, with the most pronounced effect at higher ambient temperatures. Biochar
    application method influences substrate temperature. Biochar impacts plant coverage
    area.
  13: Green roofs can reduce substrate temperature during both hot and cold days.
    Different types of green roofs (GR-7.5M-M and GR-15M-M) showed the largest temperature
    reductions during hot days compared to the control.
  15: Biochar has significant long-term effects on plant performance, with noticeable
    impacts by the end of the study period.
  16: 15% medium biochar particles with mixing method (GR-15M-M) show best plant growth
    performance across species.
  17: Biochar setups were effective in reducing GR substrate temperature during both
    hot and cold periods, especially during the highest ambient temperature. The smallest
    reduction in substrate temperature was observed in GR-7.5M-M and GR-15M-M, with
    GR-7.5M-F following closely behind. Bottom-applied biochar did not significantly
    alter substrate temperature at 10 cm depth compared to the mixing method, and
    top-dressed biochar even increased the temperature at 10 cm substrate depth. Biochar
    substantially enhanced the water retention capacity of all biochar-amended GRs.
    The application of 7.5% v/v fine biochar particles by either the mixing or top-dressed
    method (GR-7.5M-F and GR-7.5T-F) had the highest performance, followed by GR-7.5B-M.
  18: Biochar addition to green roofs improves nutrient retention and runoff quality,
    enhances plant performance, and contributes to energy savings by reducing heat
    transfer to buildings.
  19: Addition of biochar resulted in the improvement of plant performance in all
    biochar-amended GRs; 15% v/v medium biochar particles had the best plant performance
    in terms of plant height, plant dry weight, and plant coverage area; 15% v/v amendment
    is recommended as the optimal biochar amendment rate for plant growth
  20: Biochar amendment improves plant performance and potentially offers solutions
    to improve building energy savings, reduce structural loading, and shorten the
    payback period. The effect of biochar on plant performance varies among plant
    species and GR substrates.
Methodology:
  2: A one-year observational study of plant height, coverage area, and dry weight
    from six green roof test beds was conducted.
  3: Life Cycle Cost Analysis (LCCA), simulation tools, field studies on green roofs
    with different materials and configurations, observation of green roofs integrated
    with photovoltaic systems, radiant cooling systems, and green walls.
  4: The research aims to assess the long-term impacts of biochar on different types
    of GR plants under an Australian climate, continuing previous work on runoff retention
    and quality. The study will consider biochar amendment rates, particle sizes,
    and application methods.
  5: "Six 1 m\xB2 GR test beds were installed on a rooftop.  The trays followed a\
    \ typical extensive GR design with a 150-mm substrate thickness, non-woven geotextile\
    \ membrane as a filter layer, and a 50-cm drainage layer. Three biochar-related\
    \ parameters (amendment rate, particle size, and application methods) and three\
    \ plant species were investigated. Plant height was observed fortnightly; plant\
    \ coverage area, plant dry weight, and substrate temperature were measured at\
    \ the end of one-year operation."
  6: "Pre-grown drought-tolerant native plants (Rytidosperma caespitosum, Chrysocephalum\
    \ apiculatum, and Pycnosorus globosus) were planted in test beds on May 5, 2023.\
    \ A 150-mm GR substrate was used. Biochar derived from eucalyptus was pyrolyzed\
    \ at 500-550\xB0C and applied using mixing, top-dressed, and bottom-applied methods.\
    \ The observation period started after planting."
  7: The study investigates various biochar amendment rates (0%, 7.5% v/v, 15% v/v)
    and application methods (mixing, top-dressed, bottom-applied) on test beds with
    different particle sizes to assess impacts on plant performance.
  9: Observations were made over four periods from August 2023 to March 2024, recording
    plant height to assess biochar's impact.
  10: Observed height of Wallaby Grass and Common Everlasting over time in six green
    roof testbeds (GR 3.0, GR 7.5M, GR 7.5, GR 15M, GR 37.5M). Measurements taken
    at the time intervals displayed in the figures.
  11: Plant height was monitored over time. Dry weight was measured at the end of
    the study period. Plants were grown in different green roof test beds (GR-0, GR-7.5T-F,
    GR-15M-M, GR-7.5B-M, GR 7.5M-M, GR-7.5M, GR-15M, GR-75M, GR-7.5F) with varying
    biochar amendments.
  12: The study uses different biochar application methods (mixed, bottom-layered,
    top-dressed) in green roof testbeds. Plant dry weight was measured at the end
    of the monitoring period. Substrate temperature was measured at 5-minute intervals
    at 10cm depth. Data was collected during both hot and cold periods.
  13: Green roof test beds with different plant coverage were monitored for temperature
    changes in substrate and compared to a control (GR-0) over time. The monitoring
    period ended at the time the plant coverage area in Figure 10 was measured, which
    is unspecified.
  15: "The analysis was conducted using six 1 m\xB2 green roof test beds to evaluate\
    \ plant performance over a one-year period."
  16: Studies different biochar amendment rates and methods, such as mixing versus
    top-dressing, assessing their effects on plant growth.
  17: Field experiments on green roofs (GRs) with different biochar setups (different
    application methods and biochar particle sizes). Data collected on substrate temperature
    at 10 cm depth.
  18: The study uses experimental results and data to evaluate the impact of biochar
    addition on GR plant performance and building energy aspects.
  19: Plants were assessed in six different 1 m2 biochar-amended GR test beds with
    varying biochar-related parameters (amendment rates, particle sizes, and application
    methods)
  20: The analysis involves observation of plant growth in biochar-amended substrates.
    The applicability is limited by the need for local studies and long-term observations
    tailored to specific climate conditions and plant species.
More Notes:
  2: The study offers insights for green roof designers and urban planners to develop
    optimal biochar-amended green roof systems.
  5: The study aims to mimic conventional built-in-place extensive GRs that provide
    long-lasting durability and long-term benefits, especially in areas prone to extreme
    weather conditions.
  6: The paper describes the experimental setup for testing biochar's impact on green
    roof performance. It focuses on substrate composition, plant selection, and biochar
    application methods.
  10: The meaning of the different green roof testbed labels (GR 3.0, GR 7.5M, etc.)
    is not explained on this page, limiting interpretability. Similarly, graph titles
    in last description do not match graph descriptions.
  11: The page includes figures (Figure 8 and Figure 9) which are referenced in the
    text but the content is not directly presented, suggesting that visual information
    is important for understanding the findings. The GR abbreviations need further
    clarification.
  12: Plant growth tended to be vertical, and plant coverage area was lower in unmodified
    green roofs. GR-15M-M (biochar in GR-15M-M) had the greatest effects on plant
    coverage area.
  13: The designations GR-0, GR-7.5M-M, GR-15M-M, GR-7.5B-M, GR-7.5M-F, and GR-7.5T-F
    likely denote different green roof configurations or compositions, perhaps related
    to the plant coverage area shown in Figure 10. The line graphs in Figure 11 present
    a temporal comparison of ambient temperature and substrate temperature for different
    green roof configurations.
  20: Further studies are recommended to evaluate the benefits of biochar more adequately.
    Intermediate biochar particles are suggested for optimal plant performance.
Quantitative material:
  2: Results show that the green roof with medium biochar particles at an amendment
    rate of 15% v/v had the best plant performance.
  3: Average retention rate of 96.8% due to the use of an effective drainage layer;
    claims biochar-amended GRs are lighter than traditional GRs; runoff volume alleviation
    due to blue-green roofs.
  5: 7.5% v/v medium biochar particles at the bottom of the substrate
  6: The GR substrate consists of 80% light-expanded clay aggregate (LECA), 15% hardwood
    mulch, and 5% coir chips by volume. Biochar was applied at 7.5% v/v. LECA can
    absorb 18% of water by weight. Biochar particle sizes ranged from 1-3 mm (medium)
    and less than 1 mm (fine).
  9: Final plant height measurements recorded maximum wallaby grass height of 52 cm
    in GR-7.5M-M.
  10: Average height of Wallaby Grass and Common Everlasting plants in different green
    roof testbeds over specific time periods (3/5/2023 - 1/6/2024), with standard
    error provided.
  11: The study provides data on the average height of billy button plants in different
    green roof test beds over various time periods (specific values not provided in
    text). Dry weight measurements of the plants are also collected at the end of
    the study.
  12: The page provides quantitative data on average plant dry weight (Wallaby Grass,
    Common Everlasting, Billy Button, and total) across different biochar-amended
    green roof testbeds, as well as substrate temperature at a depth of 10cm at 5-min
    intervals during hot and cold periods.
  13: "Maximum reduction in substrate temperature during the hottest times of the\
    \ hot days was 4 \xB0C for GR-7.5M-M and 3.5 \xB0C for GR-15M-M compared to GR-0.\
    \ Temperature reductions were 2\xB0C during the cold days."
  16: Higher plant growth with biochar amendment from 7.5% to 15%; plant dry weight
    observed at 15% v/v biochar was 15.92 g/plant, compared to 11.5 g/plant with 5%
    v/v biochar.
  17: "Regression analysis showed a negative correlation between substrate moisture\
    \ and substrate temperature in hot summer (up to 45\u25E6C)."
  18: "A green roof alleviated heat transfer to the building and reduced the internal\
    \ surface temperature by 2\xB0C compared to a reference concrete roof."
  19: "20% v/v fine biochar particles decreased the external roof surface temperature\
    \ by 3\u20135 \u25E6C and lessened the heat absorbed by GRs by at least 0.06 MJ/m2\
    \ daily; scoria-based substrate with 40% v/v biochar was 1.5 cm/m2 thicker as\
    \ compared to the substrate with scoria only"
  20: No explicit quantitative information is present on this page.
sourcematerial:
  2: 'Source material here: "Therefore, this research aims to assess the performance
    of GR plants with different biochar parameters, namely, amendment rates, application
    methods, and particle sizes. However, their widespread implementation is still
    limited by a lack of local research and uncertain research findings. As a result,
    the potential benefits of GRs often cannot justify their high investment costs.
    The GR with medium biochar particles at the amendment rate of 15% v/v had the
    best plant performance. A one-year-long observational data of plant height, coverage
    area, and dry weight from six GR test beds was collected and analyzed. The addition
    of biochar improves water/nutrient retention of GRs, thereby increasing substrate
    fertility and promoting plant performance. The conclusions were further supported
    by observed data indicating reduced substrate temperature, which in turn reduces
    building energy consumption. This study will offer valuable insight to GR designers
    and urban planners for developing optimal biochar-amended GR systems."'
  3: "Source material here.\nThough GR have been significantly researched over the\
    \ past decades [1\u20133], the implementation of GRs has been limited due to numerous\
    \ constraints. One of the primary reasons is that the performance of GR has not\
    \ been consistently reported and properly understood. It is worth noting that\
    \ findings about GR are highly variable according to weather conditions, substrate\
    \ composition, substrate thickness, age of GR, maintenance, and fertilizer application\
    \ [4\u20136]. For example, a comprehensive review paper by Bevilacqua [7] found\
    \ that a generic conclusion could not be made about the performance of GRs in\
    \ terms of building energy savings. GR performed differently in different climate\
    \ characteristics and GR designs, such as plants and substrate thickness. Similar\
    \ findings about the contradictory impacts of GRs on building energy consumption\
    \ were reported by Alim, et al. [8]. Another challenge is the high capital costs\
    \ of GRs, which is a growing concern for building owners and GR investors. The\
    \ payback period for a GR system is challenging to determine because some benefits,\
    \ such as building aesthetics, recreational spaces, health benefits, and biodiversity,\
    \ are difficult to quantify in monetary terms [1,5,6]. Moreover, some GR systems\
    \ have been reported to be economically infeasible. For example, a 50-year Life\
    \ Cycle Cost Analysis (LCCA) by Yao, et al. [9] found that GRs have negative net\
    \ savings as compared to conventional white roofs. This challenge is contributed\
    \ to by inadequate local research information since the LCCA was mostly from the\
    \ USA, where the GR market is less mature and has higher costs of GR materials\
    \ and maintenance [8]. In addition to economic aspects, Zhang and He [10] highlighted\
    \ that concerns about structural safety impact the implementation of GRs among\
    \ various stakeholders, including designers, contractors, builders, building operators,\
    \ and owners. \nFor instance, the integration of GRs with photovoltaic (PV) systems\
    \ has led to positive results. GRs cooled indoor air temperatures while also boosting\
    \ electricity production due to the cooler temperature of photovoltaic (PV) panels\
    \ [15\u201317]. GRs were also more effective when they were integrated with radiant\
    \ and evaporative components (water pipes and sprinklers) of a radiant cooling\
    \ system [18\u201320]. Additionally, GRs have been also combined with green walls\
    \ to further improve HTC, which is followed by a decrease in building energy consumption\
    \ [21,22]. Moreover, a so-called \u201CBlue-green roof\u201D system by adding\
    \ another water storage layer to a GR system has been found effective in greatly\
    \ alleviating runoff volume [23\u201325]. In addition, new GR materials have also\
    \ been applied to achieve more effective GR functions. For example, Carpenter,\
    \ et al. [26] obtained a remarkable average retention rate of 96.8%, which was\
    \ higher than the frequently reported values due to the use of an effective drainage\
    \ layer. Biochar, a carbon-rich substrate additive, has been investigated in different\
    \ fields, including agriculture and geotechnical structures, due to its advantageous\
    \ physiochemical properties. Biochar is a product of the pyrolysis process, transforming\
    \ biomass into a stable form of carbon that cannot escape to the atmosphere for\
    \ a long period of time. Biochar possesses a highly porous structure and large\
    \ specific surface area, so it is able to retain more water and nutrients and\
    \ improve soil fertility and plant growth [27,28]. As a result, the serviceability\
    \ of GRs could be maintained during their expected lifetime with less effort and\
    \ reduced costs for operation and maintenance. Furthermore, biochar-amended GRs\
    \ are lighter relative to a traditional GR with the same substrate thickness due\
    \ to the reduced dry and saturated bulk density of substrates [29]. This implies\
    \ the installation of a thicker substrate layer without adding extra structural\
    \ loading.\n"
  4: "Source material here.\nThe paper focuses on evaluating the effectiveness of\
    \ biochar in improving plant performance. The aim is to maintain GR serviceability,\
    \ maximize the benefits to the buildings where they are installed, and reduce\
    \ operational and maintenance costs, ultimately encouraging the broader adoption\
    \ of GRs.\n...the plants on a GR are often subjected to harsh growing conditions,\
    \ including extreme weather like intense solar radiation and strong winds, as\
    \ well as low moisture and nutrient availability...\nThis research aims to assess\
    \ the long-term impacts of biochar on different types of GR plants. \nResearch\
    \ outcomes are expected to obtain necessary information about the biochar benefit\
    \ to plant growth under an Australian climate...\nThis research is a continuation\
    \ of work presented in the studies by Nguyen, Chau, and Muttil [41] and Nguyen,\
    \ et al. [54], which focused on runoff retention and runoff quality, respectively.\
    \ Additionally, this research also seeks to understand the impact of various biochar-related\
    \ parameters, which include biochar amendment rates, particle sizes, and application\
    \ methods, on plant performance.\n"
  5: "Source material: The study area is under the influence of the temperate oceanic\
    \ climate (K\xF6ppen climate classification Cfb), which is characterized by warm\
    \ summers and mild winters. Figure3presents a cross-section of the GR system used\
    \ in this study, featuring the application of 7.5% v/v medium biochar particles\
    \ at the bottom of the substrate. Six 1 m\xB2 GR test beds were installed on the\
    \ same rooftop (Figure2b). Six 1 m \xD7 1 m galvanized steel trays elevated 0.3m\
    \ from the roof tiles followed a typical extensive GR design with a 150-mm substrate\
    \ thickness, non-woven geotextile membrane as a filter layer, and a 50-cm drainage\
    \ layer... Based on a detailed literature review of biochar-GR research and the\
    \ identified knowledge gap, it was decided to investigate the impacts of three\
    \ biochar-related parameters, namely biochar amendment rate, particle size, and\
    \ application methods...different plant species suitable for extensive GRs were\
    \ considered... Step three consists of data collection and undertaking measurement\
    \ of selected parameters. Fortnightly observation of plant height. Observation\
    \ of plant coverage area, plant dry weight, and substrate temperature at the end\
    \ of one-year operation. However, the experimental setup in this study aimed to\
    \ utilize 1m\xB2 trays to mimic the conventional built-in-place extensive GRs\
    \ that provide long-lasting durability and long-term benefits, especially in areas\
    \ prone to extreme weather conditions."
  6: "   \nDrivers of Risk: \"Theseplants aredrought-tolerantandarewell-suitedforthethin,extensive\
    \ GR substrateusedinthis studyandcanwithstand infrequentirrigation,irregular maintenance,andlowsubstrate\
    \ nutrients.\"\nQuantitative material: \"Thechosen150-mmGRsubstrateisamixtureoflight-expanded\
    \ clayaggregate(LECA),hardwoodmulch,andcoirchips(80%,15%,and5%v/v,respectively).\
    \ LECA is commonly known as a lightweight material that can absorb 18% of water\
    \ by weight. The examined biochar particle size ranges were 1\u20133 mm and less\
    \ than 1 mm (hereinafter referred to as medium and fine particles, respectively).\"\
    \nMethodology: \"Pre-grown plants of three common wallaby grasses (Rytidosperma\
    \ caespitosum), two common everlasting wildflowers (Chrysocephalum apiculatum),\
    \ and two Billy Buttons wild- flowers (Pycnosorusglobosus) were transferred to\
    \ each test bed on 5 May 2023. The same substrate was used for all GR test beds.\
    \ However, the differences betweenthetreatmentsweretheapplicationmethodsandparticlesizesofbiochar.\
    \ Biochar applied inthis study usedwoody materials (eucalyptus)as feedstock withthe\
    \ pyrolysis target temperature of 500\u2013550 \u25E6C. Biochar was added in different\
    \ ways, including thoroughly mixing the biochar into the substrate (mixing method),\
    \ applying biochar to the top surface (top-dressed method), and applyingbiocharatthebottomofthesubstrate(bottom-appliedmethod).\"\
    \nHighlights: \"Theseplants aredrought-tolerantandarewell-suitedforthethin,extensive\
    \ GR substrateusedinthis studyandcanwithstand infrequentirrigation,irregular maintenance,andlowsubstrate\
    \ nutrients.\"\nMore Notes: \"Thesubsequentto this, the observationperiodstarted.\"\
    \n"
