Highlights:
  2: Biochar addition positively impacts green roof plant growth, enhances water/nutrient
    retention, reduces substrate temperature, and can increase building energy efficiency.
  3: Performance of GRs is highly variable, with contradictory impacts on building
    energy consumption. GRs cooled indoor air temperatures while also boosting electricity
    production due to the cooler temperature of photovoltaic (PV) panels. Biochar-amended
    GRs are lighter and retain more water.
  4: The research aims to assess the long-term impacts of biochar on different types
    of GR plants to improve plant performance, maintain GR serviceability, and encourage
    broader adoption of GRs. It aims to identify influential parameters of biochar
    to improve plant growth in GR systems.
  6: Drought-tolerant native plants are well-suited for thin, extensive green roof
    substrates and can withstand infrequent irrigation, irregular maintenance, and
    low substrate nutrients.
  7: Biochar has been applied by mixing in most studies. The effect of biochar applied
    at the bottom of GR substrates has been less studied. Fine to medium biochar particles
    are suggested to be used in coarse-textured substrates.
  9: Biochar amendments generally improved plant height, especially in wallaby grass
    and billy button plants, with mixed medium biochar particles performing best.
  10: GR.57.5IF and GR.57.5IF+ treatments generally resulted in higher average heights
    for Wallaby Grass. Plant heights for Common Everlasting varied by group and time
    period
  11: Biochar amendment generally had a positive impact on the dry weight of common
    everlasting and billy button plants. The test bed with 15% v/v medium biochar
    particles (GR-15M-M) generally showed the best performance in terms of plant dry
    weight.
  12: Biochar in GR-15M-M had the greatest effects on plant coverage area. Biochar-amended
    substrates (GR-7.5M-M, GR-15M-M, and GR-7.5M-F) had noticeably lower substrate
    temperatures than GR-0. Top-dressed biochar (GR-7.5T-F) increased substrate temperature
    during the day but cooled down faster at night. The effect of biochar in reducing
    substrate temperature was more pronounced at higher ambient temperatures.
  13: "Green roofs (GR-7.5M-M and GR-15M-M) can reduce substrate temperature by up\
    \ to 4 \u25E6C during the hottest times of hot days, compared to the control (GR-0)."
  14: Ambient temperature shows more fluctuation compared to substrate temperatures
    in test conditions.
  15: Biochar's impact on plant performance becomes more evident by the end of the
    one-year study, suggesting long-term effects. Billy buttons showed the poorest
    performance, potentially due to extreme heat, wind, and substrate incompatibility.
    Optimal plants for specific GR substrates should be identified through pilot-scale
    experiments under different climatic conditions.
  16: Biochar at a 15% amendment rate and medium particle size (1-3 mm) consistently
    showed the best performance in terms of plant height and dry weight; mixing method
    had greater effects compared to bottom-applied or top-dressed methods.
  17: Biochar enhances water retention capacity and potential plant growth benefits
    regardless of temperature reduction.
  18: Biochar addition improves nutrient retention and plant performance on GRs, enhances
    runoff retention, and contributes to building energy savings and temperature reduction.
  19: The addition of biochar resulted in the improvement of plant performance in
    all biochar-amended GRs.
  20: Biochar amendment can improve plant performance in green roofs, potentially
    offering solutions to improve building energy savings, reduce structural loading,
    and shorten the payback period, but further evaluation is needed. The effects
    of biochar on plant performance varied among plant species and GR substrates.
