Methodology:
  2: 'Observational study over one year involving six GR test beds to assess different
    biochar parameters: amendment rates, application methods, and particle sizes.'
  3: Lifecycle cost analysis (LCCA), integration of Green Roofs (GRs) with Photovoltaic
    (PV) systems and radiant cooling systems, combination of GRs with green walls,
    adding a water storage layer, and application of new GR materials like biochar.
  4: The research is a continuation of previous studies focusing on runoff retention
    and quality, and seeks to understand the impact of biochar amendment rates, particle
    sizes, and application methods on plant performance under an Australian climate.
  6: Pre-grown drought-tolerant native plants (Rytidosperma caespitosum, Chrysocephalum
    apiculatum, and Pycnosorus globosus) were transferred to test beds with a 150-mm
    GR substrate (LECA, hardwood mulch, and coir chips) with different applications
    of biochar (mixing, top-dressed, bottom-applied) with medium (1-3mm) and fine
    (<1mm) particles.
  7: Experiment comparing different biochar amendment rates, application methods,
    and particle sizes in green roof test beds. The effects of each parameter on plant
    growth (Wallaby Grass, Common Everlasting, Billy Buttons) is evaluated.
  9: Plant height measurements were recorded fortnightly across four observation periods;
    observations took place between August 2023 and March 2024.
  10: Measurements of average plant height were taken in six green roof test beds
    across several time periods in 2023 and 2024. Statistical error (standard error)
    is included in the graphical representation.
  11: Plant height was measured throughout the study period, and dry weight was measured
    at the end of the study. Different green roof test beds (GRs) were created with
    varying biochar amendments (different concentrations and particle sizes).
  12: Compares plant dry weight and coverage area in unmodified and biochar-modified
    green roof testbeds at the end of the monitoring period. Measures substrate temperature
    at 10 cm depth at 5-min intervals during hot and cold periods. Monitoring conducted
    until 2024.
  13: Comparison of substrate temperatures in different green roof test beds (GR-0,
    GR-7.5M-M, GR-15M-M, GR-7.5B-M, GR-7.5M-F, GR-7.5T-F) to ambient temperature,
    monitored from June to July 2016.
  14: Temperature at substrate depth of green roof test beds measured, graphs spanning
    from June 2016 to July 2016 and from November 2022 to May 2023.
  15: Six 1 m2 built-in-place GR test beds were constructed on a building rooftop.
    The study monitored temperature at 10cm substrate depth.
  16: The analysis uses different biochar application methods (mixing, bottom-applying,
    and top-dressing) and compares biochar particle sizes to evaluate their effects
    on plant growth.
  17: Substrate temperature at 10 cm depth was measured; impact of different biochar
    application methods (mixing, bottom-applied, top-dressed) was analyzed.
  20: The study involves plant growth experiments using biochar-amended substrates,
    with observations of plant performance, substrate temperature, moisture content,
    and nutrient availability. The study notes the importance of local studies with
    long-term observations tailored to specific climate conditions.
