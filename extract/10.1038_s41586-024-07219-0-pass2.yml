  2: "Source material: We begin our empirical analysis of the persistence of climate\
    \ impacts on growth using ten lags of the first-differenced climate variables\
    \ in fixed-effects distributed lag models. We detect substantial effects on economic\
    \ growth at time lags of up to approximately 8\u201310 years for the temperature\
    \ terms and up to approximately 4\u2009years for the precipitation terms. In summary,\
    \ this empirical approach to constrain the persistence of climate impacts on economic\
    \ growth rates is conservative by design in avoiding assumptions of infinite persistence,\
    \ but nevertheless provides a lower bound on the extent of impact persistence\
    \ that is robust to the numerous tests outlined above. A Monte Carlo procedure\
    \ that samples from climate model projections, empirical models with different\
    \ numbers of lags and model parameter estimates is used to estimate the combined\
    \ uncertainty from these sources. Given these uncertainty distributions, we find\
    \ that projected global damages are statistically indistinguishable across the\
    \ two most extreme emission scenarios until 2049. These committed damages comprise\
    \ a permanent income reduction of 19% on average globally (population-weighted\
    \ average) in comparison with a baseline without climate-change impacts. Even\
    \ though levels of income per capita generally still increase relative to those\
    \ of today, this constitutes a permanent income reduction for most regions, including\
    \ North America and Europe (each with median income reductions of approximately\
    \ 11%) and with South Asia and Africa being the most strongly affected."
