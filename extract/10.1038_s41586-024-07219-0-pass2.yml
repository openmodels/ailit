  11: 'Source material here.

    Estimates of mitigation costs

    We obtain IPCC estimates of the aggregate costs of emission mitigation from the
    AR6 Scenario Explorer and Database hosted by IIASA. Specifically, we search the
    AR6 Scenarios Database World v1.1 for IAMs that provided estimates of global GDP
    and population under both a SSP2 baseline and a SSP2-RCP2.6 scenario to maintain
    consistency with the socio-economic and emission scenarios of the climate damage
    projections. We find five IAMs that provide data for these scenarios, namely,
    MESSAGE-GLOBIOM 1.0, REMIND-MAgPIE 1.5, AIM/GCE 2.0, GCAM 4.2 and WITCH-GLOBIOM
    3.1. Of these five IAMs, we use the results only from the first three that passed
    the IPCC vetting procedure for reproducing historical emission and climate trajectories.
    We then estimate global mitigation costs as the percentage difference in global
    per capita GDP between the SSP2 baseline and the SSP2-RCP2.6 emission scenario.
    In the case of one of these IAMs, estimates of mitigation costs begin in 2020,
    whereas in the case of two others, mitigation costs begin in 2010. The mitigation
    cost estimates before 2020 in these two IAMs are mostly negligible, and our choice
    to begin comparison with damage estimates in 2020 is conservative with respect
    to the relative weight of climate damages compared with mitigation costs for these
    two IAMs.


    Data availability

    Data on economic production and ERA-5 climate data are publicly available at https://doi.org
    /10.5281/zenodo.4681306 ... Processed climate and economic data, as well as all
    other necessary data for reproduction of the results, are available at the public
    repository https://doi.org /10.5281/zenodo.10562951 ...


    Code availability

    All code necessary for reproduction of the results is available at the public
    repository https://doi.org /10.5281/zenodo.10562951 ...

