Evaluation overview:
  1: This paper provides an overview of projected sub-national economic damages from
    temperature and precipitation impacts, including daily variability and extremes.
  2: The analysis evaluates the extent to which climate impacts persist and affect
    economic growth rates, specifically providing an overview of the projected macroeconomic
    damages due to physical climate change components.
  3: The paper evaluates the economic climate damages versus mitigation costs, focusing
    on income per capita changes.
  4: The page examines the committed economic damages of climate change by sub-national
    regions, focusing on income per capita changes.
  5: Projected change in national income per capita is evaluated across emission scenarios
    (RCP 2.6 and RCP8.5).
  6: Economic damages resulting from climate change.
  8: Impacts on macroeconomic output are evaluated using climate variables.
  10: Projections of future climate damages focus on economic damage, specifically
    regional GRPpc growth rate reductions due to climate change.
  12: The analysis evaluates the impact of climate variables like temperature and
    precipitation on sub-national economic growth rates.
  13: No specific overview of the outcome being evaluated is provided on this page.
  14: Economic impacts of climate change on income per capita.
