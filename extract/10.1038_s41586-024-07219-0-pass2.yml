  17: No specific outcome like mortality or productivity loss is identified from this
    page.
  18: The table discusses the impact of climate variables on macroeconomic growth
    through various physical mechanisms, such as labour productivity and agricultural
    productivity.
  19: The outcome being evaluated is sub-national economic growth rates.
Highlights:
  1: "The study highlights significant economic damages already committed due to climate\
    \ change, estimated to outweigh mitigation costs for limiting warming to 2\xB0\
    C by sixfold over the near term."
  2: The projection indicates that climate damages until 2049 are statistically indistinguishable
    between the two most extreme emission scenarios, with significant income reductions
    observed in several regions.
  3: Climate damages already outweigh mitigation costs, with benefits of mitigation
    becoming clearer post-2049.
  4: Daily temperature variability contributes the largest increase to economic damages;
    accounting for all climate variables results in more significant overall damages.
  5: Committed damages are significantly larger in countries with smaller historical
    cumulative emissions and lower current income per capita, highlighting an injustice
    in climate impacts.
  6: "Economic damages until 2049 are committed and outweigh the costs required to\
    \ mitigate emissions in line with the 2\xB0C target of the Paris Climate Agreement.\
    \ Committed damages are much larger than mitigation costs. Damages after mid-century\
    \ diverge significantly. The projected damages are consistent with the magnitude\
    \ and patterns of historical economic development. Not accounting for spatial\
    \ spillovers may conservatively underestimate overall damage magnitude and heterogeneity."
  8: Daily temperature variability, total annual precipitation, the number of wet
    days, and extreme daily rainfall robustly impact macroeconomic output.
  10: Robustness of model outcomes and the importance of limiting extrapolation through
    conservative choices in modeling prevent potentially biased projections.
  12: The study illustrates persistence in the impact of climate variables on economic
    growth rates over a 10-year lag period.
  13: Including four lags for precipitation variables and eight to ten for temperature
    variables provides sufficient model fit without overfitting.
  14: The 'preferred specification' provides a robust lower bound on the persistence
    of climate impacts on economic growth. Mitigation shows potential reductions in
    economic impacts compared to other scenarios. Results are presented for global
    trends and specific regions (North America, Europe, Central Asia/Russia, Middle
    East/North Africa, South Asia, Southeast/East Asia, South America, Sub-Saharan
    Africa, Oceania).
  15: Significant regional differences are projected, with general warming and potential
    increased frequency of extreme precipitation events.
  16: "Contribution of different climate variables to overall effects of an increase\
    \ in annual mean temperature of 1 \xB0C at different baseline temperatures. Percentage\
    \ reduction in damages when accounting for different climate variables relative\
    \ to considering only mean annual temperature. The cumulative marginal effects\
    \ of temperature on damages, comparing models with all climate variables to those\
    \ with only mean temperature."
  17: No specific noteworthy outcomes from the analysis are highlighted on this page.
  18: The number of wet days lacks empirical evidence for impacts, and is guided primarily
    by existing empirical evidence indicating robust impacts on economic growth.
  19: The table outlines the significance and magnitude of climatic variables' effects
    on economic growth, with significance indicated by stars.
  20: '''This study'' projects the highest estimated economic damage at 61.6% by 2100
    under RCP8.5 compared to other studies summarized on the page.'
Methodology:
  1: The paper uses fixed-effects panel regression models on data from more than 1,600
    regions over the past 40 years to identify economic impacts from climate variables.
  2: The study uses fixed-effects distributed lag models with empirical economic response
    functions to estimate the persistence of climate impacts on growth, testing significance
    using various lagged terms and Monte Carlo simulations.
  3: The analysis uses integrated assessment models and scenarios compatible with
    the Paris Climate Agreement to estimate impacts and costs.
  4: The analysis considers multiple climate variables and uses Monte Carlo simulations
    to assess the impact on economic growth projections, with damages diverging notably
    by 2049.
  5: Spearman's rank correlation is used to assess the relationship between committed
    damages and historical emissions/income.
  6: Empirical impact models are used, with steps taken to limit out-of-sample extrapolation
    by capping moderating variables at the 95th percentile of the historical distribution.
    The analysis primarily explores the impacts of different climate conditions and
    their persistence. Spatial-lag model used to assess spillovers from neighboring
    regions.
  8: "Historical climate data from 1979-2019 (W5E5 database) is used to bias-adjust\
    \ future climate projections from CMIP-6. Daily 2-m temperature and precipitation\
    \ totals are taken from 21 climate models participating in CMIP-6 under RCP8.5\
    \ and RCP2.6 scenarios from 2015 to 2100. Historical economic data from the DOSE\
    \ database of sub-national economic output is used from 1960 to 2019. Future socio-economic\
    \ data are taken from the middle-of-the-road scenario SSP2 for 2015\u20132100."
  9: The modeling framework is conservative, reverts to baseline level effects if
    too few lags are included, and assumes no infinite persistence of climate impacts
    on growth rates.
  10: Analysis involves fixed-effects regressions using CMIP-6 climate change projections,
    spatial-lag models for spillovers, and bootstrap methods for uncertainty estimation
    applied since 2020.
  11: Starts mitigation cost estimates from 2020 for comparison with climate damage
    estimates.
  12: Analysis is conducted using a panel-based fixed-effects distributed lag model,
    evaluating lagged effects years after initial climate shocks.
  13: The analysis uses a fixed-effects distributed lag model with Bayesian and Akaike
    information criteria to select incrementally removed lags for climate variables,
    assessing historical data impacts on economic growth.
  14: 'Empirical specifications are used to estimate future damages under the RCP8.5
    emissions scenario. Three specifications are compared: a ''preferred'' specification
    providing a lower bound on the persistence of climate impacts on growth, a ''pure
    growth effects'' specification, and a ''pure level effects'' specification. Regional
    trends are also examined.'
  15: "Climate changes are evaluated using empirical models with linear time trends,\
    \ expressed as a percentage of historical variability calculated using detrended\
    \ climate variable data from 1979\u20132019."
  16: Empirical models are used, including all climate variables or annual mean temperature
    only. Estimates are obtained from 1,000 block-bootstrap resamples from empirical
    models using eight, nine, or ten lags of temperature terms.
  17: The evaluation considers differences in committed damages under two emission
    scenarios, RCP 2.6 and RCP 8.5, and accounts for uncertainty in lags, model estimates,
    and climate projections.
  19: The analysis utilizes regression models with climatic variables over ten time
    lags, including their interaction terms, and considers standard errors and significance
    through clustering by region.
  20: The studies discussed use fixed-effects panel regressions with varying numbers
    of climate variables and lags; specifics include geography and specification of
    growth versus level effects.
More Notes:
  1: The study indicates regional heterogeneity in projected damages, with regions
    at very high latitudes experiencing benefits from reduced temperature variability.
  2: A Monte Carlo procedure samples from climate model projections and empirical
    models to estimate combined uncertainty, suggesting committed damages due to past
    emissions.
  5: The study claims its estimates are larger than those of some previous studies
    due to the use of sub-national estimates and inclusion of more climate components,
    but conservative compared to ref. 2 in regard to the persistence of climate impacts
    on growth.
  6: The assessment does not consider non-market damages such as those to ecosystems
    and human health. Adaptation may provide an opportunity to reduce committed damages.
    Trade plays a substantial role in propagating spillover effects.
  13: The detailed matrix of graph descriptions suggests visualization of lag effects
    across multiple climate variables, aiding in the detection of variable impacts.
  14: Shaded areas likely represent uncertainty intervals. The analysis avoids assumptions
    of infinite persistence of climate impacts on economic growth rates.
  16: The analysis uses empirical models and block bootstrapping to estimate damages
    and uncertainty intervals. The effects are dependent on baseline temperatures
    and the inclusion of different climate variables in the models.
  17: The analysis uses population-weighted quartiles to compare damages, and the
    distributions are represented using violin plots with statistical indicators such
    as medians and quartiles.
Quantitative material:
  1: "The analysis finds a projected world economy income reduction of 19% within\
    \ the next 26 years due to committed climate change impacts, with a likely range\
    \ of 11\u201329%."
  2: Projected global damages constitute a permanent income reduction of 19% on average
    globally, with regions like North America and Europe experiencing median income
    reductions of approximately 11%.
  3: Estimates suggest the damages will be larger than mitigation costs by a factor
    of six (in 2050) under certain scenarios.
  4: Accounting for daily temperature variability increases overall damages by 4.9
    percentage points; precipitation increases damages by approximately 0.01 to 0.34
    percentage points.
  5: Spearman's rank correlations indicate that committed damages are significantly
    larger in countries with smaller historical cumulative emissions, as well as in
    regions with lower current income per capita.
  6: Projection of reductions in income of 19%; Historically, the fraction of variance
    explained by empirical models was <5%.
  8: Assessments of climate damages are assessed in terms of percentage change from
    the baseline; choice of socio-economic scenario is inconsequential for percentage
    change.
  10: Moving averages of climate variables are used in projections to account for
    long-term conditions; results are robust across models with limited spread (<3%).
  12: "Quantitative impacts are assessed based on changes like a 1\xB0C increase in\
    \ temperature or a deviation in precipitation at different quartiles over time."
  13: Information criteria indicate minimums at approximately four lags for precipitation
    variables and ten to eight for temperature variables, suggesting optimal lag inclusion
    for model fitting.
  14: Relative percentage change in income per capita from 2020 to 2100 under different
    scenarios (mitigation cost, preferred specification climate damages, pure growth
    climate damages, pure level climate damages).
  15: "Projected changes from 1979\u20132019 to 2035\u20132065 under the SSP5-RCP8.5\
    \ scenario are expressed as a percentage of historical variability."
  16: "Percentage reduction in damages by 2040 (ranging from 0 to 40 percent). Cumulative\
    \ marginal effect (USD/month per \xB0C) ranging from -30 to 10."
  17: The violin plot shows quantitative information on percentage point differences
    in committed damages between upper and lower quartiles based on GDP and cumulative
    emissions.
  19: Quantitative coefficients for climate variables are provided, indicating their
    impact on economic growth rates, accompanied by measures of statistical significance.
  20: 'The page provides estimated economic damages by 2100 under RCP8.5: Burke et
    al. (2015) at 25%, Kahn et al. (2019) at 7.2%, Kalkuhl & Wenz (2020) at 14.2%,
    and ''This study'' at 61.6%.'
