  4: " \nIn terms of the relative contributions of the different climatic compo\xAD\
    nents to overall damages, we find that accounting for daily temperature variability\
    \ causes the largest increase in overall damages relative to empirical frameworks\
    \ that only consider changes in annual average temperature (4.9 percentage points,\
    \ likely range 2.4\u20138.7 percentage points, equivalent to approximately 10\
    \ trillion international dollars). Accounting for precipitation causes smaller\
    \ increases in overall dam\xADages, which are\u2014nevertheless\u2014equivalent\
    \ to approximately 1.2 trillion international dollars: 0.01 percentage points\
    \ (\u22120.37\u20130.33 percentage points), 0.34 percentage points (0.07\u2013\
    0.90 percentage points) and 0.36 percentage points (0.13\u20130.65 percentage\
    \ points) from total annual precipitation, the number of wet days and extreme\
    \ daily precipitation, respectively. Moreover, climate models seem to underestimate\
    \ future changes in temperature variability...suggesting that the true impacts\
    \ from these variables may be larger.\n\n...we find that accounting for daily\
    \ temperature variability causes the largest increase in overall damages...Additional\
    \ context on committed damages is given as: \"The distribution of committed damages\
    \ The spatial distribution of committed damages (Fig. 2a) reflects a com\xADplex\
    \ interplay between the patterns of future change in several climatic components\
    \ and those of historical economic vulnerability to changes in those variables.\
    \ Damages resulting from increasing annual mean temperature (Fig. 2b) are negative\
    \ almost everywhere globally...\n\nEstimate s of the median projected reduction\
    \ in sub-national income per capita across emission scenarios relative to a baseline\
    \ without climate impacts In terms of the relative contributions of the different\
    \ climatic compo\xADnents to overall damages... suggesting that accounting for\
    \ the other components of the distribution of temperature and precipitation raises\
    \ net damages by nearly 50%...\n"
  5: "Economic damages owing to daily temperature variability (Fig. 2c) exhibit a\
    \ strong latitudinal polarisation. [...] Future changes in total annual precipitation\
    \ mainly bring economic benefits except in regions of drying, such as the Mediterranean\
    \ and central South America. [...] Changes in extreme daily rainfall produce damages\
    \ in all regions, reflecting the intensification of daily rainfall extremes over\
    \ global land areas. Spearman\u2019s rank correlations indicate that committed\
    \ damages are significantly larger in countries with smaller historical cumulative\
    \ emissions, as well as in regions with lower current income per capita (Fig.\
    \ 3). On average, the quartile of countries with lower income are committed to\
    \ an income loss that is 8.9 percentage points (or 61%) greater than the upper\
    \ quartile (Extended Data Fig. 6). The quartile of countries with lower historical\
    \ cumulative emissions are committed to an income loss that is 6.9 percentage\
    \ points (or 40%) greater than the upper quartile. Our estimates are larger than\
    \ those of ref. 2, primarily because of the facts that sub-national estimates\
    \ typically show a steeper temperature response. Spearman\u2019s rank correlation\
    \ \u03C1 and P-values for a hypothesis test whose null hypothesis is of no correlation\
    \ are provided. [...] Our empirical approach using first-differenced climate variables\
    \ is conservative compared with that of ref. 2 in regard to the persistence of\
    \ climate impacts on growth. Committed damages are significantly larger in countries\
    \ with smaller historical cumulative emissions, [...] which also have the least\
    \ resources to adapt to it."
  6: "Source material here.\n\"Compared with the fraction of variance explained by\
    \ the empirical models historically (<5%), the projection of reductions in income\
    \ of 19% may seem large.\"\n\n\"This arises owing to the fact that projected changes\
    \ in climatic conditions are much larger than those that were experienced historically,\
    \ particularly for changes in average temperature.\"\n\n\"Any assessment of future\
    \ climate-change impacts necessarily requires an extrapolation outside the range\
    \ of the historical data on which the empirical impact models were evaluated.\"\
    \n\n\"We take explicit steps to limit out-of-sample extrapolation by capping the\
    \ moderating variables of the interaction terms at the 95th percentile of the\
    \ historical distribution.\"\n\n\"Damages are indistinguishable across emissions\
    \ scenarios\u2014that is, committed\u2014until mid-century and that they are actually\
    \ already much larger than mitigation costs.\"\n\n\"This assessment of aggregate\
    \ climate damages should not be considered comprehensive. Important channels such\
    \ as impacts from heatwaves, sea-level rise, tropical cyclones, and tipping points,\
    \ as well as non-market damages such as those to ecosystems and human health,\
    \ are not considered in these estimates.\"\n\n\"Although these damages are committed\
    \ from a mitigation perspective, adaptation may provide an opportunity to reduce\
    \ them.\"\n\n\"Studies accounting for only spatially adjacent neighbours indicate\
    \ that negative impacts in one region induce further negative impacts in neighbouring\
    \ regions, suggesting that our projected damages are probably conservative by\
    \ excluding these effects.\"\n"
