    Methodology: "Following a wide range of climate econometric literature 16,60,
    we use panel regression models with a selection of fixed effects and time trends
    to isolate plausibly exogenous variation with which to maximize confidence in
    a causal interpretation of the effects of climate on economic growth rates."

    Methodology: "We aggregate grid-cell-level historical and future climate measures...
    using an area-weighting algorithm that estimates the portion of each grid cell
    falling within an administrative boundary."

    Methodology: "As such, this framework is conservative with respect to the persistence
    of impacts and the magnitude of future damages. It naturally avoids assumptions
    of infinite persistence and we are able to interpret any persistence that we identify...
    as a lower bound on the extent of climate impact persistence on growth rates."

