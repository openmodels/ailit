Highlights:
  4: Extreme weather events are increasing, and their impacts disproportionately affect
    vulnerable populations. 19% of the world's population faces substantial risk of
    a 1-in-100-year flooding event and a large portion are low-income.
  5: A significant increase in registered weather-related loss events from the period
    1980-1985 to 2013-2018, indicating changes in global weather patterns and possibly
    improved reporting and data collection methods.
  6: Growing private sector involvement in providing targeted weather and climate
    forecasts due to economic drivers.
  7: The paper aims to improve the understanding of ongoing R&D, identify technological
    trends, and identify possible impediments to progress in weather and climate forecasting.
  8: Major milestones in operational weather and climate forecasting are listed, starting
    from 1861 and going up to 2002, covering advancements in weather forecasting services,
    data sharing, numerical weather prediction, satellite observations, climate modeling,
    and global research programs.
  9: Remarkable advances in NEWP models, such as improved prediction accuracy for
    midlatitude 5-day weather forecasts.
  10: Improvements in NWP model resolution and data sharing have led to better weather
    and climate forecasting capabilities. The private sector is playing an increasing
    role in providing climate risk products.
  12: Operational weather forecasting has continuously improved. The usefulness of
    NEWP forecasts has been pushed beyond 10 days for some weather phenomena. Improved
    coordination and collaboration among the public and private sectors and academia
    is needed. Need for decision-support tools is growing rapidly, particularly in
    the commercial sector.
  13: Significant outstanding challenges remain in terms of weather and climate predictive
    skill including midlatitude weather regime transitions, teleconnections between
    tropical phenomena and midlatitude synoptic-scale weather patterns, seasonal-scale
    sea ice cover and thickness predictions, large-scale patterns of precipitation
    and midlatitude circulation changes in climate change projections, deep-ocean
    circulation and ice sheet sensitivity to change in climate models, convective
    precipitation beyond the short range, and closure of the water and energy cycle.
  14: Suggests that ML can lead to significant progress in modeling, data assimilation,
    and postprocessing for weather forecasting. Emphasizes the potential for collaboration
    between private, public, and academic sectors to advance these technologies. Highlights
    the importance of addressing funding challenges and fostering interdisciplinary
    collaboration.
  15: Collaboration between weather and climate communities, an integrated system-of-systems
    approach, and potential shifts in roles due to technological advancements
  18: Weather and climate extremes disproportionately impact the poor and those in
    low-income nations.
