  15: "Toward improved systems for forecasting\nImproved forecasts and better utilization\
    \ of forecast information will require investments in the global observing system,\
    \ especially for sparsely populated parts of the world and oceans where the boundary\
    \ layer and lower troposphere are often poorly sampled. [...] Investments will\
    \ also be needed in the supercomputing capability that is necessary to create\
    \ weather and climate information of high accuracy, resolution, and reliability\
    \ to address growing societal needs. [... ] These investment strategies must recognize\
    \ the critical role of the private sector in creating the instrumentation for\
    \ observational networks and the computational infrastructure. ... An integrated\
    \ system-of-systems approach should be used with considerations of scope, complementarity,\
    \ and cost\u2013benefit analysis across all space and time scales. The role of\
    \ the WMO will continue to be important for improved coordination of investments\
    \ and broadening the participation of the private and academic sectors. ... R&D\
    \ efforts to overcome fundamental limitations in physics parameterization are\
    \ accelerating and would benefit from collaboration between the weather and climate\
    \ communities. [...]\n\nChanging roles. There will be some notable shifts in roles,\
    \ functions, and performance requirements for the NEWP enterprise stemming from\
    \ the expected breakthroughs in technology and research developments. [...] R&D\
    \ efforts to overcome fundamental limitations in physics parameterization are\
    \ accelerating and would benefit from collaboration between the weather and climate\
    \ communities. [...] The ECMWF model of international cooperation may need to\
    \ be expanded and replicated to a certain extent to other regions, [...] This\
    \ approach is a task and challenge for WMO in cooperation with other relevant\
    \ international organizations, including development agencies. Private\u2013public\
    \ engagement could be a guiding principle to ensure partnerships, availability,\
    \ and usability of skilled regional/local products."
  18: " \nFinally, we note that a disproportionately large impact of weather and climate\
    \ extremes and other high-impact events fall on the poor and those living in the\
    \ low-income nations of the world.\nSuccess in this approach requires that the\
    \ societal needs and research findings be shared with and fed back to the primary\
    \ forecast centers to obtain improvements in new operational cycles.\nEstablished\
    \ frameworks and forums, such as the WMO Regional Climate Centres, Regional Climate\
    \ Outlook Forums, and the WWRP and WCRP should exploit their full potential in\
    \ this endeavor...\nIt has been emphasized that the only way to address these\
    \ challenges and enable the uptake of the technological and scientific achievements\
    \ is through inclusive public, private, and academic partnerships.\n"
