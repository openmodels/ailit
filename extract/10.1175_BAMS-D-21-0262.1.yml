  4: "Source material here.\nOas evidenced in daily news headlines is the increase\
    \ in extreme weather events with, for\nexample, in 2021, record-breaking cold\
    \ in the U.S. Southern Great Plains, heat in the Pacific\nNorthwest followed by\
    \ wildfires, devastating flooding in Europe, Canada, Australia, and China,\nand\
    \ rain-induced landslides in India. A statistical analysis from Munich Re\u2019\
    s NatCatService\n2019 database reveals that 1,383 weather-related natural disasters\
    \ took place across the globe\nfrom 1980 to 1985 and the number grew to 4,020\
    \ registered events from 2013 to 2018\n(Fig. 1).\n\nThe AR6 report concludes that\
    \ a warming climate plays a role in increasing extremes in heat,\ndrought, rainfall,\
    \ wildfire, tropical cyclone intensity, and flooding (IPCC 2021). The need for\n\
    improved weather and climate forecasts is also driven by this increase in extremes\
    \ occurring\nagainst a backdrop of nonclimatic global trends that include biodiversity\
    \ loss, unsustainable\nconsumption of natural resources, degradation of ecosystems,\
    \ human demographic shifts\nincluding rapid urbanization, social and economic\
    \ inequalities, and a pandemic (IPCC 2022).\n\nCurrently, 19% of the world\u2019\
    s population (1.47 billion people) face substantial risk of a\n1-in-100-yr flooding\
    \ event (Rentschler and Salhab 2020). While extremes in the climate\nsystem have\
    \ a devastating effect on populations across the\nworld, the impacts often fall\
    \ disproportionately on low-income\nnations and marginalized populations as ~587\
    \ million people\nwho face substantial risks from flooding are living on less\n\
    than $5.50 (U.S. dollars) per day (Rentschler and Salhab 2020).\n"
  5: 'The image consists of two world maps comparing geographical overviews of weather-related
    loss events from two different periods: 1980-1985 and 2013-2018. ### a) 1980-1985
    Map: - **Types of Events:** - Small, medium, and large loss events are marked
    with blue circles. - Hydrological events (flood, mass movement) are marked with
    orange circles. - Meteorological events (tropical storm, extratropical storm,
    convective storm, local storm) are marked with green circles. - Climatological
    events (extreme temperature, drought, forest fire) are marked with red circles.
    - Catastrophes are marked with black squares. - **Total Events:** - 1,383 registered
    events. ### b) 2013-2018 Map: - **Types of Events:** - The same color-coding scheme
    is used to represent different event types. - **Total Events:** - 4,020 registered
    events. - **Geographical Distribution:** - There is a notable increase in the
    number of events across the globe, with dense concentrations in similar regions
    as in the earlier period but showing increased frequency and spread. Overall,
    the comparison highlights a significant increase in registered weather-related
    loss events from the period 1980-1985 to 2013-2018, indicating changes in global
    weather patterns and possibly improved reporting and data collection methods.'
  6: "plaintext\nWeather and climate risk\u2013based decision-making is increasingly\
    \ important with population growth and demographic shifts, including urbanization\
    \ and movement to coastlines. ... The trends mean more people, assets, and essential\
    \ services are exposed and vulnerable to weather, climate, water, ocean, and even\
    \ space hazards.\n\nThese economic drivers have resulted in a growth in private\
    \ sector companies providing targeted forecasts of weather variations from the\
    \ time scale of minutes to climate risk and resiliency information spanning decades\
    \ into the future.\n"
  7: " \n\"This paper will cover these three components of the innovation cycle: infrastructure,\
    \ R&D, and operation. Stakeholders engaged in all three components will have to\
    \ make strategic choices in the coming years, and some will struggle to keep up\
    \ as technologies continue to combine and advance, and new ways of doing business\
    \ appear quickly.\" \n\"The important drivers of the innovation cycle are highly\
    \ qualified personnel, computational and observational infrastructures (in the\
    \ middle of the figure), and increasing stakeholder and customer demand and need\
    \ (on the circumference of the figure) for tailored and seamless weather and climate\
    \ forecasting (localized, timely, precise, and accurate).\"\n\"This paper summarizes\
    \ the views, knowledge, and expertise of a group of scientists and practitioners\
    \ from the public, private, and academic sectors that was produced under the leadership\
    \ of WMO (Brunet et al. 2021). In addition, our approach of including input across\
    \ these sectors allows us to go beyond the scientific vision described in Shapiro\
    \ et al. (2010) through increased knowledge of the needs of society and economy.\"\
    \n\"We do not attempt to dictate solutions to the many open questions on the future\
    \ of weather and climate forecasting. Instead, we strive to improve the understanding\
    \ of the ongoing R&D and to identify technological trends, and any possible impediments\
    \ to progress.\"\n\"Stakeholders and customers can push clockwise new initiatives\
    \ (Fig. 2) at different positions in the innovation cycle: R&D, operation, and\
    \ services. Note that each sector can make contributions to the various components\
    \ (i.e., research and development, operations, and service).\"\n"
