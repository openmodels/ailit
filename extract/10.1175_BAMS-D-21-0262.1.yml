  9: The ability of NEWP models to predict variations in the 500 hPa height field
    generally improves at a rate of a day per decade (e.g., Bauer et al. 2015) so
    that the midlatitude 5-day weather forecasts today are as accurate as 1-day forecasts
    40 years ago. The advances in Earth system modeling are another outstanding achievement
    that encompasses understanding and predicting the atmosphere and its chemical
    composition, the oceans, land/sea ice, and other cryosphere components as well
    as the land surface, including surface hydrology and wetlands, lakes, and human
    activities. Improved observational coverage, the advent of satellite observations,
    the steady growth of computer power, and breakthroughs in the theory of Earth
    system coupled processes all underpinned a successful story of weather forecasting
    in the NEWP era. Routine, real-time forecasting with NEWP started in the mid-1950s
    and was introduced in operation in the 1960s.
  10: The page discusses improvements in Numerical Weather Prediction (NWP) models,
    including increased horizontal and vertical resolution, which are indirectly related
    to predicting and understanding climate-related risks like extreme weather events.
    Horizontal resolution of global NWP models has increased from about 400 km in
    the early 1960s to less than 10 km in 2020; vertical resolution increased from
    one- and three-layered models to models utilizing more than 130 levels. The page
    describes advancements in NWP through improved model resolution, data sharing
    facilitated by the WMO, and the integration of diverse observational data sources.
    Climate risk products are obtained by combining historical observations of extremes
    with the output of ensemble-based climate models, downscaling with high-resolution
    models, and artificial intelligence approaches. Improvements in NWP model resolution
    and data sharing have led to better weather and climate forecasting capabilities.
    The private sector is playing an increasing role in providing climate risk products.
    The WMO's role in fostering data sharing and the evolution of the global observing
    system are highlighted. The challenges of data access limitations are noted.
  12: "Source material here.\n\nThe usefulness of NEWP forecasts has been pushed to\
    \ lead times beyond 10 days for some weather phenomena including for high-impact\
    \ events such as midlatitude snowstorms in North America. However, the steady\
    \ progress has been at a slower pace for some forecasted elements, like quantitative\
    \ precipitation...\n\nThis section highlights some key messages and recommendations\
    \ that were discussed in Brunet et al. (2021), although we note that the helpful\
    \ comments of the reviewers and additional discussions between the authors have\
    \ provided us with some new perspectives. As such guidance must account for uncertainties\
    \ and society\u2019s ability to use weather and climate forecasts...\n\nOperational\
    \ weather forecasting based on numerical prediction systems has continuously improved\
    \ over the past few decades. The usefulness of NEWP forecasts has been pushed\
    \ to lead times beyond 10 days for some weather phenomena...Improved coordination\
    \ and collaboration among the public and private sectors of the weather and climate\
    \ enterprise, with strong engagement of academia, will accelerate the achievement\
    \ of the vision for improving skill over the coming decade...The need and demand\
    \ for decision-support tools in our \u201Cjust in time economy\u201D is growing\
    \ rapidly.\n\nOn the policy side, prevailing free and open data sharing among\
    \ countries and institutions led by the WMO has facilitated progress including\
    \ the establishment of the Global Basic Observing Network (GBON)...However, in\
    \ some areas, policies implying commercial or other barriers to accessing important\
    \ datasets need to be removed to accelerate progress for detailed forecasts across\
    \ these time scales.\n"
  13: "Source material:\n- \"Defining this theoretical limit remains a challenge since\
    \ the Earth system contains both slowly varying components (i.e., sea surface\
    \ temperature, soil moisture, snow cover, sea ice) that can aid predictive skill\
    \ (Krishnamurthy 2019) and highly nonlinear, rapidly changing phenomena such as\
    \ convection...\"\n- \"Efforts to advance predictive skill include increasing\
    \ high-performance computing (HPC) capacity; improving observational instrumentation\
    \ providing more accurate data with higher temporal and spatial resolutions; advanced\
    \ dynamical cores and better representation of complex physical processes; better\
    \ model initialization through the utilization of expanding satellite observations\
    \ (e.g., both from government agencies and occultation and other observations\
    \ from commercial vendors), taking advantage of novel new measurement strategies\
    \ such as crowd-sourced data (e.g., Hintz et al. 2019), rainfall from cell phone\
    \ tower attenuation (e.g., Overeem et al. 2013), and the improved utilization\
    \ of polarimetric radar measurements as models move to kilometer scale (Zhang\
    \ et al. 2019), and more effective data assimilation methods; and use of ensembles\
    \ to represent uncertainty in the initial state and model processes.\"\n- \"Significant\
    \ outstanding challenges remain in terms of weather and climate predictive skill:\
    \ \u2022 Midlatitude weather regime transitions at the week 3 to week 4 time range\
    \ \u2022 Teleconnections between tropical phenomena (e.g., the Madden\u2013Julian\
    \ oscillation) and midlatitude synoptic-scale weather patterns at the monthly\
    \ range \u2022 Seasonal-scale sea ice cover and thickness predictions, and the\
    \ different trends observed in the Arctic and Antarctic \u2022 Large-scale patterns\
    \ of precipitation and midlatitude circulation changes in climate change projections\
    \ \u2022 Deep-ocean circulation and ice sheet sensitivity to change in climate\
    \ models \u2022 Convective precipitation beyond the short range \u2022 Closure\
    \ of the water and energy cycle.\"\n- \"Model and data assimilation shortcomings\
    \ include the following: \u2022 Major uncertainties associated with parameterizations\
    \ of key processes such as deep convection, orographic drag, cloud microphysics\
    \ (and aerosol interactions), thermodynamic and dynamic coupling with Earth surfaces,\
    \ including land, waves, snow, and sea ice, and their impact on global circulation\
    \ \u2022 Limited understanding of the possible feedbacks of atmospheric composition\
    \ on NEWP predictive skill and climate simulations \u2022 Mismatching fluxes at\
    \ the land\u2013atmosphere, ocean\u2013atmosphere, and ocean\u2013sea ice\u2013\
    atmosphere interfaces \u2022 Insufficient and incomplete treatment of systematic\
    \ and random errors in data assimilation and ensembles \u2022 Insufficient use\
    \ of diagnostic methods for tracing key sources of model error back to their roots\
    \ in weather and climate models.\"\n"
  14: 'Discusses using AI and ML techniques to improve weather and climate forecasting
    from nowcasting to climate resiliency: "Since these approaches could prove valuable
    to forecasting on time scales from nowcasting to climate resiliency with benefits
    to both the public and private sectors..."


    Mentions specific applications like improving observation system utilization,
    data assimilation, physical parameterizations, postprocessing, impact estimation,
    nowcasting, severe weather detection, and forecast failure detection: "Examples
    of topics relevant to NEWP... Current and future research topics and potential
    advantages of utilizing ML include the following: Improve the utilization of observing
    systems... Advance the ability to input information from complex observing systems
    into models'' data assimilation... Allow incorporation of further complex subgrid
    physical parameterizations... Advance postprocessing of numerical variables...
    Estimate impacts... Advance nowcasting and improve rainfall estimation... Use
    of ML approaches to detect and forecast severe weather... Detect regimes where
    forecast failures are more likely to occur..."


    Suggests that ML can lead to significant progress in modeling, data assimilation,
    and postprocessing for weather forecasting: "The use of ML will lead to significant
    progress over the whole range of ''classical'' modeling, data assimilation and
    postprocessing algorithms in the coming decade."


    Emphasizes the potential for collaboration between private, public, and academic
    sectors to advance these technologies: "collaboration across the private, public,
    and academic sectors would prove beneficial."


    Highlights the importance of addressing funding challenges and fostering interdisciplinary
    collaboration: "Reaching these goals must also include addressing the funding
    challenges often impeding R&D progress relevant to advancing weather and climate
    forecasting... developing and refining strategies to advance interdisciplinary
    collaboration relevant to NEWP."


    The paper also mentions open-source AI/ML frameworks and cloud infrastructures
    that facilitate the development of these applications and collaboration: "A wide
    range of open-source AI and ML frameworks (e.g., TensorFlow and PyTorch), together
    with well-known programming languages like Python or C++, can support the development
    of these applications... Cloud infrastructures provide easy access to accelerator
    hardware."

