  12: 'Source material here: Marginal effects of a 1 degree increase of day-to-day
    temperature variability on regional growth rates, estimated for regions with below-
    and above-median regional income. When partitioned based on regional-income, the
    difference between the response of high- and low-income regions is not significant,
    although above-median income regions generally experience smaller marginal losses.
    The results shown here are based on the partition shown in Extended Data Fig.
