Drivers of Risk:
  1: Deviations of daily temperature from seasonal expectations impact macro-economic
    growth.
  2: This paper identifies day-to-day temperature variability as a driver negatively
    impacting regional growth rates.
  3: Day-to-day temperature variability and seasonal temperature differences are identified
    as significant drivers impacting regional growth rates.
  4: The primary driver of risk identified is day-to-day temperature variability across
    different seasons.
  5: The main driver of risk identified is day-to-day temperature variability, particularly
    its interaction with the seasonal temperature difference.
  6: Day-to-day temperature variability is identified as a driver impacting macroeconomic
    growth.
  7: The paper discusses extreme temperatures and global floods as drivers of risk.
  9: Day-to-day temperature variability is impacting the outcomes.
  10: Increase in day-to-day temperature variability.
  11: No specific shocks or changes impacting outcomes are identified.
  12: Day-to-day temperature variability (1 degree increase)
Evaluation overview:
  1: Increases in day-to-day temperature variability reduce macro-economic growth.
  2: This paper evaluates the impact of day-to-day temperature variability on regional
    economic growth.
  3: The analysis evaluates the effect of climate variables, specifically temperature
    variability, on regional economic growth rates.
  4: The analysis provides an overview of the effect of day-to-day temperature variability
    on regional economic growth rates.
  5: The paper evaluates the impact of day-to-day temperature variability on economic
    growth, focusing on differences by income level.
  6: "The impact of day-to-day temperature variability on macroeconomic growth is\
    \ evaluated, suggesting it has significant effects on the climate\u2013economy\
    \ relationship."
  7: The analysis explores the impact of temperature on economic growth.
  9: Economic growth is the outcome being evaluated.
  10: Marginal effects of day-to-day temperature variability on regional economic
    growth rates.
  11: No relevant overview of specific outcomes like mortality or productivity loss.
  12: Regional growth rates
Highlights:
  1: Highest vulnerability to temperature variability is found in low-latitude, low-income
    regions with a twelve percentage-point reduction in growth.
  2: Regions with smaller seasonal temperature differences are more affected by day-to-day
    temperature variability, with low-latitude and coastal regions facing the largest
    marginal losses.
  3: Increased day-to-day temperature variability has a larger negative impact on
    regions with smaller seasonal temperature differences, suggesting a strong latitudinal
    dependence.
  4: Day-to-day temperature variability significantly affects growth rates in most
    seasons, with larger impacts in low GDP countries, and similar effects across
    agricultural, manufacturing, and services sectors.
  5: Lower-income regions are more vulnerable to day-to-day temperature variability,
    especially in lower-latitude and coastal areas; the impacts persist for at least
    two years with partial recovery by the third year.
  6: "Day-to-day temperature variability is a previously unidentified channel of impact\
    \ in the climate\u2013economy relationship that policymakers should consider."
  7: The importance of temperature impacts on economic growth is underscored, warranting
    stringent mitigation policies.
  10: Regions with smaller seasonal temperature differences suffer greater marginal
    losses from increased temperature variability.
  11: No important outcomes of the analysis are highlighted on this page.
  12: The difference between the response of high- and low-income regions is not significant,
    although above-median income regions generally experience smaller marginal losses.
Methodology:
  1: Analysis combines observed day-to-day temperature variability with subnational
    economic data for 1,537 regions worldwide over 40 years using fixed-effects panel
    models.
  2: "The analysis uses fixed-effects panel regression models based on data from ERA5\
    \ climate dataset (1979\u20132018) combined with regional economic data."
  3: "Panel regression models are applied with multiple specifications; Model 7 is\
    \ selected as the preferred specification based on adjusted R\xB2 and BIC criteria."
  4: The analysis involves regression models and robustness tests, including the use
    of climate re-analysis datasets and different weighting of climate data by population
    versus area.
  5: The analysis uses a distributed-lag model to assess the impact of day-to-day
    temperature variability on economic growth, with data spanning from 1979 to 2018.
  7: The analysis approaches the relationship between temperature and economic indicators
    like income and growth, as discussed in several studies.
  8: Marginal effects of temperature variability changes are calculated to estimate
    impacts on regional growth rates.
  9: Regression models were designed to analyze the impact of day-to-day temperature
    variability on economic growth using climate and economic data.
  11: The analysis involves partitioning data based on national and regional per-capita
    income, but specific applicability is unspecified.
  12: Based on partition shown in Extended Data Fig. 2b and models in Supplementary
    Table 9.
More Notes:
  2: The effect of day-to-day temperature variability on growth is independent from
    changes in annual average temperature.
  11: No additional relevant notes.
Quantitative material:
  1: An extra degree of day-to-day temperature variability results in a five percentage-point
    reduction in regional growth rates on average.
  2: An extra degree Celsius of day-to-day temperature variability reduces the regional
    growth rate by at least five percentage points.
  3: The analysis provides regression coefficients indicating the impact of one-unit
    changes in temperature variability and other climate variables on regional growth
    rates; notably, day-to-day temperature variability reduces growth by coefficients
    ranging from -0.0538 to -0.116.
  4: Quantitative analysis shows the marginal reduction in regional growth rates per
    extra degree of day-to-day temperature variability, especially in countries with
    lower GDP per capita.
  5: The analysis shows that marginal losses from an increase in day-to-day temperature
    variability are generally larger in low-income regions, with losses remaining
    statistically significant even with conservative error clustering.
  6: Economic growth effects from temperature variability are quantified at approximately
    one percentage point under the central econometric specification.
  10: "Marginal effects of a 1\xB0 Celsius increase of day-to-day temperature variability."
  11: No quantitative information produced by the analysis is provided on this page.
  12: Marginal effects on regional growth rates for regions with below- and above-median
    regional income.
sourcematerial:
  1: 'Source material here.

    Elevated annual average temperature has been found to impact macro-economic growth.
    However, various fundamental elements of the economy are affected by deviations
    of daily temperature from seasonal expectations which are not well reflected in
    annual averages. Here we show that increases in seasonally adjusted day-to-day
    temperature variability reduce macro-economic growth independent of and in addition
    to changes in annual average temperature.


    Combining observed day-to-day temperature variability with subnational economic
    data for 1,537 regions worldwide over 40 years in fixed-effects panel models,
    we find that an extra degree of variability results in a five percentage-point
    reduction in regional growth rates on average. The impact of day-to-day variability
    is modulated by seasonal temperature difference and income, resulting in highest
    vulnerability in low-latitude, low-income regions (12 percentage-point reduction).

    '
  2: "Source material here: We find that day-to-day temperature variability has a\
    \ negative linear effect on regional growth rates. An extra degree Celsius of\
    \ day-to-day temperature variability in a given year and region reduces the regional\
    \ growth rate by at least five percentage points, hereon referred to as the marginal\
    \ losses (Table 1: columns (1)\u2013(4), row 1). Following the most recent climate\u2013\
    econometric literature, we then apply fixed-effects panel regression models to\
    \ exploit within-region changes of day-to-day temperature variability and regional\
    \ growth from one year to the next (Methods) ... We calculate our measure from\
    \ the European Centre for Medium-Range Weather Forecasts (ECMWF) Reanalysis fifth\
    \ generation (ERA5) climate data for the years 1979\u20132018 and combine it with\
    \ a regional economic dataset... countries which experience smaller seasonal temperature\
    \ differences are affected more by a given change in day-to-day temperature variability\
    \ (Extended Data Fig. 1)... Marginal losses from an increase in day-to-day temperature\
    \ variability are largest in low-latitude and coastal regions as these regions\
    \ typically experience small seasonal temperature changes and are hence less resilient\
    \ to variability in daily temperature. Importantly, the effect of day-to-day temperature\
    \ variability on regional growth rates is unaffected by the inclusion of annual\
    \ average temperature under all specifications."
  3: "text\nCoefficients describe the estimated effect of a one-unit change in the\
    \ climatic variable on the regional growth rate. On the basis of the adjusted\
    \ R2 and BIC, we select model 7 as our preferred specification. The effect of\
    \ an extra degree of day-to-day temperature variability on regional growth rates\
    \ varies geographically. The reduction [in growth rates] is larger for regions\
    \ that experience small seasonal temperature differences, implying a strong latitudinal\
    \ dependence. T\u0303, day-to-day temperature variability; T\u0302, seasonal temperature\
    \ difference; Marginal changes are estimated from the model specification shown\
    \ in Table 1, column (7). It is of conceptual interest whether the observed effect\
    \ of day-to-day temperature variability predominantly reflects the inherently\
    \ damaging effects of greater variability in the realization of weather variables\
    \ or merely potential nonlinearities in the response to the impact mechanisms\
    \ and channels.\n"
  4: " \n\"The reduction in regional growth rates per extra degree of day-to-day temperature\
    \ variability (marginal change) is larger in countries with lower GDP per capita...\"\
    \ \n\n\"The effect of day-to-day temperature variability is unaltered by the inclusion\
    \ of these measures, suggesting that it predominantly reflects the inherently\
    \ damaging effects of greater variability in temperature realizations\u2026\"\
    \ \n\n\"We find that day-to-day temperature variability in spring, summer and\
    \ autumn has significant effects of similar magnitudes on annual regional growth\
    \ rates...\"\n\n\"We conduct a number of further robustness tests on the observed\
    \ effect of day-to-day temperature variability. The use of different climate re-analysis\
    \ datasets tests the consistency of the assimilation and interpolation techniques...\
    \ Weighting climate data by population rather than by area tests the sensitivity\
    \ of the results...\"\n\n\"This suggests that the effect of variability is independent\
    \ of the proximity of the underlying temperature level to heat-stress thresholds,\
    \ thereby providing further evidence that greater variability is inherently damaging\u2026\
    \"\n\n\"This suggests that a broad range of economic channels are sensitive to\
    \ changes in day-to-day temperature variability.\"\n"
  5: " \n\"The paper evaluates the impact of day-to-day temperature variability on\
    \ economic growth, focusing on differences by income level.\"\n- \"the greater\
    \ vulnerability of lower-income regions is not just driven by their location at\
    \ lower latitudes.\"\n- \"This heterogeneity by national income is consistent\
    \ with empirical evidence that the negative effects of variability...are smaller\
    \ in higher-income nations.\"\n\n\"The main driver of risk identified is day-to-day\
    \ temperature variability, particularly its interaction with the seasonal temperature\
    \ difference.\"\n- \"marginal losses from an increase in day-to-day temperature\
    \ variability are generally larger for regions in low-income nations compared\
    \ with those in higher-income nations\"\n- \"day-to-day temperature variability\
    \ has a significant impact on economic growth that is independent of both the\
    \ annual mean and the frequency of extreme temperature.\"\n\n\"The analysis shows\
    \ that marginal losses from an increase in day-to-day temperature variability\
    \ are generally larger in low-income regions, with losses remaining statistically\
    \ significant even with conservative error clustering.\"\n- \"marginal losses\
    \ are generally larger than in their higher-income counterparts. Moreover, in\
    \ higher-income regions the marginal losses show a stronger dependence on the\
    \ seasonal temperature difference\"\n- \"day-to-day temperature variability remains\
    \ statistically significant.\"\n\n\"The analysis uses a distributed-lag model\
    \ to assess the impact of day-to-day temperature variability on economic growth,\
    \ with data spanning from 1979 to 2018.\"\n- \"Following recent econometric literature,\
    \ we use a distributed-lag model to address this question with regard to the effect\
    \ of changes in day-to-day temperature variability on economic growth.\"\n- \"\
    Across our sample (1979\u20132018), historical deviations of day-to-day temperature\
    \ variability from regional means.\"\n\n\"Lower-income regions are more vulnerable\
    \ to day-to-day temperature variability, especially in lower-latitude and coastal\
    \ areas; the impacts persist for at least two years with partial recovery by the\
    \ third year.\"\n- \"marginal losses from an increase in day-to-day temperature\
    \ variability are largest in low-latitude and coastal regions.\"\n- \"the negative\
    \ impacts of day-to-day variability persist for at least two years following the\
    \ initial shock...\"\n"
  6: "Day-to-day temperature variability on macroeconomic growth points to a previously\
    \ unidentified impact channel.\" ; \"This translates to economic growth effects\
    \ of approximately one percentage point under our central econometric specification.\"\
    \ ; \"The effect of day-to-day temperature variability on macroeconomic growth\
    \ thus constitutes a previously unidentified impact channel of considerable magnitude\
    \ in the climate\u2013economy relationship.\""
  7: " \nEvaluation overview: The analysis explores the impact of temperature on economic\
    \ growth. \n- Evidence: \"Moore, F. C. & Diaz, D. B. Temperature impacts on economic\
    \ growth warrant stringent mitigation policy. Nat. Clim. Change 5, 127\u2013131\
    \ (2015).\"\n\nDrivers of Risk: The paper discusses extreme temperatures and global\
    \ floods as drivers of risk.\n- Evidence: \"Willner, S. N., Otto, C. & Levermann,\
    \ A. Global economic response to river floods. Nat. Clim. Change 8, 594\u2013\
    598 (2018).\"\n\nMethodology: The analysis approaches the relationship between\
    \ temperature and economic indicators like income and growth.\n- Evidence: \"\
    Dell, M., Jones, B. F. & Olken, B. A. Temperature and income: reconciling new\
    \ cross-sectional and panel estimates. Am. Econ. Rev. 99, 198\u2013204 (2009).\"\
    \n\nHighlights: The importance of temperature impacts on economic growth is underscored,\
    \ warranting stringent mitigation policies.\n- Evidence: \"Moore, F. C. & Diaz,\
    \ D. B. Temperature impacts on economic growth warrant stringent mitigation policy.\
    \ Nat. Clim. Change 5, 127\u2013131 (2015).\"\n"
