  9: "Source material: The invasive coconut mite is considered an economically important\
    \ pest of coconut wherever it occurs. In the present study, we used the MaxEnt\
    \ model to predict the current and future distributions of A. guerreronis. Predicted\
    \ future distribution of Aceria guerreronis in the shared socio-economic pathway\
    \ (SSP8.5) of climate conditions in 2040 and 2060. In our model, the environmental\
    \ variables that had the strongest influence on coconut mite habitat suitability...\
    \ Our model performance was high, with an AUC value of more than 0.9, suggesting\
    \ that the model\u2019s predictions are reliable. Therefore, the global potential\
    \ distribution maps of its expansion are essential for economic and quarantine\
    \ purposes worldwide...The maps are divided into five classifications: Unsuitable\
    \ (white), Low Suitability (red), Medium Suitability (yellow), High Suitability\
    \ (green). "
  10: 'Source material here: This suggests that thermal parameters much more than
    rainfall are the main factors driving the potential distribution and spread of
    the coconut mite. These findings are consistent with previous studies which indicated
    that temperature influenced the seasonal abundance of A. guerreronis (Lawson-Balagbo
    et al., 2008). This, however, confirms that the main distribution zones are affected
    by thermal parameters.'
  11: "Our model predicts that climate suitable areas for A. guerreronis, are primarily\
    \ centered on the west and east coasts of Africa, south coasts of Asia, north\
    \ and east coasts of South America, and coastal regions of Northern Oceania. Our\
    \ findings show an expansion of habitat suitability outside the known distribution\
    \ of the pest...These predictions are quite disturbing because the major coconut-producing\
    \ countries where A. guerreronis has been reported will continue to be threatened\
    \ by the pest. Earlier work has shown that the ideal temperature range for A.\
    \ guerreronis development is between 9.3 and 33.6/C14C (Ansaloni & Perring, 2002),\
    \ but it can live for at least 5 h of frost and for over a week below 5/C14C (Howard\
    \ et al., 1990; Navia et al., 2013). However, high temperatures above 40 are detrimental\
    \ to the development of the pest (Navia et al., 2013)...Rising global temperatures\
    \ will mean that regions that are at present unsuitable to coconut mites, especially\
    \ in Brazil, India, Australia, Nigeria, and Kenya, will become suitable habitats\
    \ from now until 2040. For the SSPs, the model predicts a contraction of suitable\
    \ areas from SSPs 2.6 to 8.5. Rising global temperatures will mean that regions\
    \ that are at present unsuitable to coconut mites, especially in Brazil, India,\
    \ Australia, Nigeria, and Kenya, will become suitable habitats from now until\
    \ 2040. In the present study, we used bioclimatic variables and elevation datasets...In\
    \ the present study, we used two socioeconomic pathways (SSPs 2.6 and 8.5). These\
    \ pathways have been used to predict the impact of climate change on species (e.g.,\
    \ Kriegler et al., 2012)...Climate change will have a significant impact on the\
    \ global distribution of A. guerreronis, based on the future model predictions\
    \ from the current time to 2060...Our findings show an expansion of habitat suitability\
    \ outside the known distribution of the pest, particularly in Indonesia, Vietnam,\
    \ Papua New Guinea, Mexico, Thailand, and Myanmar...Yet, global warming will also\
    \ cause the ecological range of A. guerreronis to shift inwards, notably in parts\
    \ of Kenya, Tanzania, Somalia, Cambodia, and Thailand. This will make areas that\
    \ are presently highly suitable less until 2060. But, there are several other\
    \ biotic and/or abiotic factors, which were not considered in the present study...Therefore,\
    \ A. guerreronis host plants...should be considered in future predictions...Using\
    \ all occurrences, without Ghana occurrences, and using only Ghana occurrences\
    \ data to run the models showed varying predictions...This also supports previous\
    \ studies that sample size affects predictions of species habitat suitability\
    \ (St\xF8a et al., 2019; Syfert et al., 2013)."
