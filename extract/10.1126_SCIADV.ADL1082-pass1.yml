    \ we develop a simple and parsimonious statistical model for predicting regional\
    \ GDPpc data in areas where it is not currently available.\" \n\n\"We find that\
    \ country GDPpc alone explains some 87% of variation in regional GDPpc in our\
    \ sample...\"\n\n\"The model with the smallest out-of-sample prediction error\
    \ includes only country-level GDPpc and regional nightlights, which is why we\
    \ use it as our main prediction model.\"\n\n\"The climate model analysis yields\
    \ a time series of the change in growth due to anthropogenic changes in Tx5d for\
    \ each region.\" \n\n\"To estimate and propagate sampling uncertainty in the parameters\
    \ for this downscaling procedure, we bootstrap the Eq. 2 regression 1000 times...\"\
    \n\n\"To the best of our knowledge, our analysis is the first to produce a global\
    \ sample of continuous GDPpc data at the regional level with an explicit treatment\
    \ of parametric and residual uncertainty.\" \n"
