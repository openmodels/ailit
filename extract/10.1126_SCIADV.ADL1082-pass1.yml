Drivers of Risk:
  1: Increased extreme heat/heat waves (measured by temperature of the hottest several
    days in each year, Tx5d, hottest 5-day period)
  2: The intensity of the most extreme heat wave each year is considered as a driver
    impacting economic growth.
  3: The shocks impacting the outcome are average temperatures, extreme heat (Tx5d
    - intensity of the hottest 5-day period), and daily-scale temperature variability.
  4: Anthropogenic increases in extreme heat (Tx5d, the hottest 5-day average temperature)
    and changes in average temperatures are the primary drivers of risk.
  5: Anthropogenic changes in extreme heat (Tx5d) are the primary drivers of risk
    being considered, measured as the hottest 5-day period.
  6: The primary driver of risk identified is anthropogenic increases in extreme heat
    intensity (Tx5d intensity).
  7: Anthropogenic climate change increasing the frequency and intensity of extreme
    heat events is identified as a driver of economic risk.
  8: Extreme heat, measured as the average daily maximum temperature of the hottest
    days.
  9: Extreme heat, represented by the hottest multiple-day period in a year (Tx5d),
    impacts economic growth, particularly in regions with high temperatures or greater
    seasonality.
  10: Anthropogenic changes in Tx5d (likely related to extreme temperatures)
Evaluation overview:
  1: Economic growth globally; also mentions labor productivity, crop damage, and
    mortality.
  2: The study evaluates the impact of extreme heat on economic growth across different
    regions.
  3: Economic growth is the outcome being evaluated.
  4: Economic production and income trajectories are evaluated based on extreme heat
    impacts.
  5: Economic growth (GDPpc) is the outcome being evaluated, specifically focusing
    on income changes.
  6: The analysis evaluates the unequal economic effects of anthropogenic changes
    to extreme heat intensity on GDP per capita across different regions.
  7: The paper evaluates the economic impacts of increased extreme heat intensity
    on economic growth, particularly in tropical and midlatitude regions.
  8: Economic damages from extreme heat, focusing on the impact on subnational economic
    growth (GDPpc).
  9: The analysis models economic growth as a function of extreme high temperatures,
    temperature variability, and mean temperature.
  10: Regional GDPpc (Gross Domestic Product per capita)
Highlights:
  1: Human-caused increases in heat waves have depressed economic output most in the
    poor tropical regions least culpable for warming; global inequality is both a
    cause and consequence of the unequal burden of climate change.
  2: Extreme heat decreases growth in warm regions, weakly affects temperate regions,
    and increases growth in cold regions.
  3: Extreme heat causes large damages in low-latitude regions but transitions to
    modest damages and benefits as latitude increases. Increases in average temperatures
    have weakly positive effects in cold regions and increasingly harmful effects
    in warmer regions. Temperature variability has a strong negative effect on growth.
    The interaction between mean temperature and Tx5d is significant, implying that
    increases in mean temperatures are harmful in warmer locations due to increased
    extreme heat intensity. The primary moderator of the effect of extreme heat is
    temperature exposure.
  4: Anthropogenic warming has increased the frequency and intensity of extreme heat
    events globally, with spatial patterns heterogeneous. Economic recovery from extreme
    heat is not immediate, exhibiting delayed effects. While individual heat extremes
    do not permanently affect economic growth, repeated extreme heat events might
    generate tangible long-term income changes. Tropical regions are particularly
    vulnerable to losses from human-caused heat extremes due to stronger economic
    effects of extreme heat and lower incomes.
  5: Anthropogenic changes to extreme heat have primarily harmed tropical regions.
    Regions with greater income per capita are more likely to experience benefits
    or limited damages from human-caused changes in heat extremes, while regions with
    lower income per capita experience greater relative damages.
  6: Poorer regions with high baseline temperatures suffer the most from increased
    extreme heat, while high-latitude regions show initial benefits but overall losses
    due to climate change.
  7: Key findings include that increased extreme heat intensity significantly decreases
    economic growth in warm regions, and that the economic costs of temperature extremes
    are distinct from those of average temperature changes.
  8: Targeting resources at heat resilience and early-warning capabilities for only
    a few days per year may yield disproportionate economic benefits; Expanded implementation
    of heat early warning systems could allow people to take measures to avoid blackouts
    and avoiding outdoor activities when possible; Warming has already increased the
    frequency and intensity of heat extremes and resulting in economic costs and unequal
    global distribution.
  9: Regions with greater seasonality are less harmed by temperature variability,
    and the analysis finds stronger effects for Tx5d when including region-specific
    linear trends.
  10: Developed a global sample of continuous GDPpc data at the regional level with
    explicit treatment of parametric and residual uncertainty.
Methodology:
  1: Using subnational economic data, extreme heat metrics, and an ensemble of climate
    models, they quantify the effect of extreme heat intensity on economic growth
    globally. Empirically estimate the effect of extreme heat intensity on observed
    economic growth using data from a global sample of subnational regions. Measure
    extreme heat using the temperature of the hottest 5-day period in each year (Tx5d).
  2: The analysis considers the effects of Tx5d, annual average temperature, their
    interaction, and temperature variability, using historical climate model simulations.
  3: The analysis uses a fixed effects model to estimate the impact of average temperature,
    extreme heat (Tx5d), and temperature variability on economic growth. The model
    controls for mean temperatures to assess how growth is differentially affected
    by average temperatures and extremes. Likelihood ratio tests were also used. The
    results are applicable at the regional level, purging time-invariant regional
    characteristics.
  4: "Historical and natural climate model experiments from CMIP6 are used to calculate\
    \ \u201Ccounterfactual\u201D Tx5d. A statistical model infers regional GDPpc time\
    \ series over 1992\u20132013 where they are not currently available. A distributed\
    \ lag model is used to track the persistence of the impacts of a heat wave. An\
    \ autoregressive distributed lag model with up to four autoregressive terms is\
    \ also used."
  5: The analysis uses climate model simulations to calculate changes in economic
    growth due to anthropogenic changes in extreme heat. A statistical model is used
    to downscale country-level GDPpc to regional GDPpc, using country-level GDPpc
    and regional nighttime luminosity as predictors. A Monte Carlo analysis is performed
    to quantify uncertainty.
  6: "The analysis uses Monte Carlo simulations to estimate the economic impact of\
    \ anthropogenic extreme heat on GDP, assessing changes over the period 1992\u2013\
    2013."
  7: The analysis focuses on the hottest 5-day heat waves per year, using a widely
    accepted heat intensity index, but acknowledges limitations due to missing data
    in very hot regions.
  8: Empirical regression methods at the subnational level to estimate the effect
    of extreme heat on growth; Climate model simulations (CMIP6) to calculate counterfactual
    extreme heat time series; Monte Carlo approach to estimate uncertainty.
  9: The analysis uses panel regression with fixed effects to model economic growth,
    focusing on extreme heat using the Tx5d metric, which measures the hottest 5-day
    period annually.
  10: Statistical model predicting log regional GDPpc using country-level GDPpc, regional
    average nighttime luminosity (nightlights), and their interaction, for the period
    1992-2013. Bootstrapping is used to estimate sampling uncertainty. A 10-fold cross-validation
    analysis is performed. Monte Carlo analysis (N=10,000) is used to incorporate
    and propagate uncertainty.
More Notes:
  2: Extrapolation to regions without economic data reveals latitudinal impacts, with
    tropical regions losing income and high-latitude regions gaining economically.
  3: The authors tested income and drought as additional moderators of the effect
    of extremes, but found that temperature was the primary driver. Current adaptations
    have not been successful in eliminating the negative effects of extreme heat.
  4: The study uses observed and counterfactual average temperatures, incorporating
    changes in both extreme heat and the underlying average temperatures that shape
    the marginal effect of extreme heat.
  5: The paper addresses missing regional GDPpc data using a statistical model. The
    study acknowledges substantial inequalities in the magnitude of damages at the
    regional level.
  6: The study visualizes the relationship between CO2 emissions and economic impacts,
    noting high-emitting countries are substantially responsible for income losses
    due to heat extremes.
  7: The analysis assumes that the underlying average temperature controls the marginal
    effect of extreme heat globally.
  8: Uses nighttime luminosity data to infer local economic production; Acknowledges
    data limitations but argues that analyzing economic damages from extreme heat
    in the world's hottest and poorest regions is crucial.
Quantitative material:
  1: "Cumulative 1992\u20132013 losses from anthropogenic extreme heat likely fall\
    \ between $5 trillion and $29.3 trillion globally; Losses amount to 6.7% of Gross\
    \ Domestic Product per capita per year for regions in the bottom income decile,\
    \ but only 1.5% for regions in the top income decile."
  2: A standard deviation increase in Tx5d intensity decreases growth by 0.63 percentage
    points in Brazil and increases growth by 0.62 percentage points in Norway.
  3: ~40% of the variation in raw Tx5d values is explained by annual average temperatures;
    ~13% of the variation in Tx5d anomalies is explained by annual average temperature
    anomalies when expressed as deviations from regional means; Temperature variability
    has a negative effect of -2.01 percentage points per standard deviation on growth,
    and this effect increases to -2.21 percentage points per standard deviation when
    Tx5d terms are removed.
  4: "Globally, regional Tx5d values average 0.77\xB0C more than they would have without\
    \ warming over 1992\u20132013, with increases of more than 1\xB0C in much of the\
    \ tropics but less than 0.5\xB0C in the United States and Europe. The probability\
    \ of extreme Tx5d values has substantially increased, with probabilities rising\
    \ by 13 p.p. across regions, on average."
  5: Cumulative global losses due to extreme heat average more than $16 trillion in
    2013. Regions in the lowest income decile have experienced losses of 6.7% of GDPpc
    per year, compared to 1.5% in the top income decile.
  6: The page provides quantitative information such as average annual GDP per capita
    change and cumulative GDP change in 2010 U.S. dollars due to extreme heat.
  7: Damages from extreme heat account for almost 10% of overall economic damages
    but are based on less than 2% of days in the year.
  8: The sample contains data from 1368 regions, each with between 4 and 38 years
    of data, for a total of 26,918 observations.
  10: Country GDPpc explains 87% of variation in regional GDPpc; Out-of-sample prediction
    errors less than 7% of the average regional log GDPpc; predicted data explain
    ~87% of variation in observed data (or ~90% when Uzbekistan and Kenya are dropped)
sourcematerial:
  1: "Increased extreme heat is among the clearest impacts of global warming, but\
    \ the economic effects of heat waves are poorly understood...Empirical research\
    \ has shown that extreme temperatures reduce labor productivity (21), damage crops\
    \ (22, 23), and increase mortality (9), among other effects. Using subnational\
    \ economic data, extreme heat metrics measuring the temperature of the hottest\
    \ several days in each year, and an ensemble of climate models, we quantify the\
    \ effect of extreme heat intensity on economic growth globally...We measure extreme\
    \ heat using the temperature of the hottest 5-day period in each year (\u201C\
    Tx5d\u201D). Cumulative 1992\u20132013 losses from anthropogenic extreme heat\
    \ likely fall between $5 trillion and $29.3 trillion globally. Losses amount to\
    \ 6.7% of Gross Domestic Product per capita per year for regions in the bottom\
    \ income decile, but only 1.5% for regions in the top income decile. Here, we\
    \ empirically estimate the effect of extreme heat intensity on observed economic\
    \ growth using data from a global sample of subnational regions. We measure extreme\
    \ heat using the temperature of the hottest 5-day period in each year (\u201C\
    Tx5d\u201D). We find that human-caused increases in heat waves have depressed\
    \ economic output most in the poor tropical regions least culpable for warming...Our\
    \ results have the potential to inform adaptation investments and demonstrate\
    \ how global inequality is both a cause and consequence of the unequal burden\
    \ of climate change."
  2: "yaml\nEvaluation overview: \"Economic effects of extreme heat; Extreme heat\
    \ significantly decreases economic growth in warm regions, weakly affects growth\
    \ in temperate regions, and increases growth in cold regions\"\nDrivers of Risk:\
    \ \"Tx5d does not explicitly measure the frequency of extreme heat nor variations\
    \ in its duration, so our identification strategy centers on measuring the effect\
    \ of the intensity of the most extreme heat wave in each year.\"\nQuantitative\
    \ material: \"For example, in Brazil, where the average temperature is a warm\
    \ 23.8\xB0C, an SD increase in Tx5d intensity depresses growth by 0.63 percentage\
    \ points (p.p.). In contrast, in Norway, where the temperature averages 4\xB0\
    C, an additional SD in Tx5d intensity enhances growth by 0.62 p.p. (Fig. 1A).\"\
    \nMethodology: \"Our empirical model includes the effects of both Tx5d and annual\
    \ average temperature, their interaction to allow the effect of extremes to vary\
    \ with average temperature, and temperature variability (see Materials and Methods).\
    \ This strategy allows us to identify the plausibly causal effect of extreme heat\
    \ intensity while allowing different regions to respond differently on the basis\
    \ of their annual average temperatures. It also allows us to consider how these\
    \ three moments of the temperature distribution independently and jointly shape\
    \ economic costs. We then combine these empirical results with historical climate\
    \ model simulations to assess the economic effects of anthropogenic changes in\
    \ extreme heat intensity to date (fig. S1).\"\nHighlights: \"Extreme heat significantly\
    \ decreases economic growth in warm reg i o n s , weakly affects growth in temperate\
    \ regions, and increases growth in cold regions (Fig. 1).\"\nMore Notes: \"Extrapolation\
    \ of our results to regions without economic data emphasizes the latitudinal structure\
    \ of the effect of extreme heat (Fig. 1B). Tropical regions lose income when extreme\
    \ heat increases, mid-latitude regions in the United States and southern Europe\
    \ lie in a weakly affected transition zone, and high-latitude regions gain economically\
    \ as their baseline temperatures are too cold for optimal growth.\"\n"
