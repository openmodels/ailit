    less than 13% of the variation in Tx5d anomalies ... it is possible to find an
    effect of temperature variability that is 10% too large because years with greater
    variability also imply more extreme temperatures in the hottest parts of the year."


    "Increases in average temperatures have weakly positive effects in cold regions
    and increasingly harmful effects in warmer regions. Temperature variability has
    a strong negative effect on growth. The interaction between mean temperature and
    Tx5d is significant, implying that increases in mean temperatures are harmful
    in warmer locations due to increased extreme heat intensity. The primary moderator
    of the effect of extreme heat is temperature exposure." "Our results show significant
    independent effects of both average and extreme temperatures. Increases in average
    temperatures, for example, have weakly positive effects in cold regions and increasingly
    harmful effects in warmer regions ... the interaction between mean temperature
    and Tx5d is significant ... This result implies that increases in mean temperatures
    are harmful in warmer locations, and this additional harm arises because of interactions
    between warmer mean temperatures and increased extreme heat intensity in the warmest
    part of the year."


    "The authors tested income and drought as additional moderators of the effect
    of extremes, but found that temperature was the primary driver. Current adaptations
    have not been successful in eliminating the negative effects of extreme heat."
    "To test these hypotheses, we estimate additional models with average income and
    the Palmer Drought Severity Index as the interaction terms ... neither of these
    variables have significant interactions with Tx5d. ... Our findings reinforce
    the fact that people are poorly adapted to extreme heat in the present day ...
    Our results demonstrate that current adaptations have not been successful in eliminating
    the negative effects of extreme heat and emphasize the need for further such adaptation
    investments alongside climate mitigation."

