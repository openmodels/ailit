Drivers of Risk:
  1: The increase in wet days and extreme daily rainfall are identified as key drivers
    impacting economic productivity.
  2: Shocks impacting the outcomes include total annual rainfall, monthly rainfall
    deviations, number of wet days, and extreme daily rainfall.
  3: Annual total rainfall, monthly rainfall deviations (negative shock), number of
    wet days, and extreme daily rainfall are the shocks impacting economic growth
    rates.
  4: Shocks impacting outcomes include extreme daily rainfall and the number of wet
    days, with effects particularly noted in winter and autumn.
  5: Changes in extreme daily rainfall and the number of wet days affecting economic
    growth.
  7: "The drivers of risk are rainfall measures, specifically extreme daily rainfall\
    \ (RD(1mm) and R\u02C6D(99.9%)) and monthly rainfall deviations (RA)."
  9: Variability in annual total rainfall, monthly rainfall deviations, number of
    wet days, and extreme daily rainfall events.
  10: The shocks impacting outcomes include total annual rainfall, monthly rainfall
    deviations, number of wet days, and extreme daily rainfall.
  11: Changes in rainfall (total annual rainfall, monthly rainfall deviations, number
    of wet days, and extreme daily rainfall) and annual mean temperature are the drivers
    of risk.
  12: Daily temperature variability (T_var), annual mean temperature (T_mean), annual
    rainfall, monthly rainfall deviations, number of wet days, extreme daily rainfall
Evaluation overview:
  1: The paper provides an overview of how changes in daily rainfall distribution
    impact economic growth rates, specifically quantifying the effect of increases
    in the number of wet days and extreme daily rainfall.
  2: The page provides an overview of how different aspects of daily rainfall distributions
    affect economic production.
  3: Economic growth rates are being evaluated.
  4: The analysis evaluates the impact of different rainfall measures on economic
    growth rates, particularly considering sector-specific economic output and income
    levels.
  5: Focuses on the economic output in response to changes in rainfall patterns.
  7: The study evaluates the impact of extreme daily rainfall on annual mean temperature.
  9: No relevant information
  10: The analysis evaluates the differentiated economic growth responses to changes
    in rainfall between rich and poor countries.
  11: Sectoral growth (agricultural, manufacturing, and service sectors) is the outcome
    being evaluated.
  12: Economic growth rates
Highlights:
  1: High-income nations and the services and manufacturing sectors are most strongly
    hindered by the increase in the number of wet days and extreme daily rainfall.
  2: 'The paper identifies four distinct effects on economic production: total annual
    rainfall, monthly deviations, wet days, and extreme daily rainfall, all impacting
    growth rates differently.'
  3: Greater rainfall may be beneficial only if it does not also cause increases in
    the number of wet days or in the extent of extreme daily rainfall. Measures of
    extreme daily rainfall may also provide helpful insights for assessments of the
    direct impact of fluvial floods on economic growth.
  4: Findings suggest strong seasonal economic vulnerabilities to rainfall, particularly
    in winter and autumn, with spatial heterogeneity indicating persistent impacts
    from the number of wet days and negative monthly rainfall deviations.
  5: Increases in extreme daily rainfall and wet days are adverse for economic growth,
    especially in high-income countries.
  7: The study finds that considering a nonlinear effect of wet days with income level
    considerably increases the statistical power of the model. They also assess the
    magnitude of historical effect sizes for rainfall measures.
  9: The maps highlight spatial variability in total rainfall, monthly deviations,
    wet days, and extreme rainfall, with darker red areas indicating higher variability.
  10: Key outcomes include differing economic growth responses to rainfall-related
    climate factors between rich and poor countries.
  11: Sectoral growth rates seem to increase with higher annual rainfall; growth rates
    fluctuate with deviations in monthly rainfall; growth rates vary with the number
    of wet days; growth rates decrease as annual mean temperature increases when considering
    extreme rainfall.
  12: The table presents regression coefficients showing the effect of temperature
    and rainfall variables (and their interactions) on economic growth rates, considering
    regional and national error clustering.
Methodology:
  1: The analysis uses a global panel of subnational economic output data from 1,554
    regions over 40 years, assessing the effects of rainfall distribution on economic
    output, and utilizing ERA-5 climate data for historical precipitation observations.
  2: The analysis uses fixed-effects panel regression models applied to data from
    the past 40 years, including over 30,000 observations at the subnational level.
  3: "The analysis is performed via the product of region-specific marginal effects\
    \ and the region-specific standard deviation for each rainfall measure from annual\
    \ variability over the historical period 1979\u20132019. The effects from rainfall\
    \ are separately identifiable when included as competing independent variables\
    \ on economic growth rates. Robustness tests accounting for spatial autocorrelation\
    \ and alternative precipitation datasets are conducted."
  4: Analysis includes stratifying data by national income per capita and sector,
    and considering seasonal variability with focus on number of wet days and extreme
    rainfall. Spatial heterogeneity is evaluated using historical regional estimates
    from 1979-2019.
  5: Assesses effects on sectoral economic output and differentiates impacts by income
    level using regression models.
  6: Subnational economic data is obtained from the Database of Subnational Economic
    Output with a focus on annual gross regional product from 1,554 regions across
    77 countries.
  7: The study uses regression analysis to assess the impact of rainfall on annual
    mean temperature. They control for day-to-day temperature variability and the
    function of annual mean temperature. They also partition data by income to assess
    heterogeneity. The analysis covers the period 1979-2019.
  9: The analysis calculates the standard deviation of annual values for different
    rainfall measures over the period 1979-2019, visualized on global maps.
  10: The analysis differentiates economic responses to rainfall changes between rich
    and poor countries, as shown in various graphical representations.
  11: The paper estimates economic responses to rainfall for the agricultural, manufacturing,
    and service sectors separately.
  12: 'Econometric specification using regression analysis, with error clustering
    performed both regionally and nationally. Analysis looks at first differences
    and one-year lags of temperature variables. Significance denoted by asterisks:
    *p<0.1, **p<0.05, ***p<0.01'
More Notes:
  2: Spatial variability for rainfall is larger than for temperature, and economies
    might be adapted to prevailing rainfall conditions; remaining analysis focuses
    on causality using fixed-effects models.
  3: The marginal effects of increases in extreme daily rainfall show a regional heterogeneity
    that is best described by the annual mean temperature. The effects of daily rainfall
    measures are decreased by the exclusion of the annual and monthly measures, suggesting
    they are complementary. The inclusion of all measures improves the description
    of the statistical model. The study explores the independence of different rainfall
    measures by sequentially excluding certain measures.
  7: The study acknowledges funding from the Volkswagen Foundation and the Horizon
    2020 Framework Programme of the European Union.
  9: The study period is limited to 1979-2019. The maps visually represent the historical
    variability of rainfall across the globe for the four measures.
  11: The plots show confidence intervals. The distributions of the different rainfall
    and temperature variables are also presented.
  12: 'The analysis includes interaction terms such as ''D.L.T_mean: L.T_mean'' and
    ''Extreme daily rainfall: T_mean'', indicating an attempt to capture non-linear
    or conditional effects.'
Quantitative material:
  2: Greater annual rainfall benefits economic growth, but these benefits diminish
    at higher rainfall totals; growth is concave with monthly deviations; increases
    in wet days and extreme rainfall reduce growth rates.
  3: The effect on economic growth rates of a 1-s.d. shock in each of the four rainfall
    measures is quantified as % points. Global and sample means of impacts across
    regions are given for each rainfall measure. For example, the global/sample mean
    impact of monthly rainfall deviations (negative shock) is -1.11/-1.01 % points.
  4: Provides estimates of the effect on economic growth rates of a 1-s.d. shock in
    various rainfall measures, partitioned by national income per capita and across
    sectors (agriculture, manufacturing, services).
  5: Poor countries show 62% greater sensitivity to annual total rainfall, rich countries
    47% greater sensitivity to wet days.
  7: "The regression coefficients (\u03B1x in equation 5) describe the percentage-point\
    \ effect on subnational growth rates of a one-unit increase in each rainfall measure.\
    \ The study multiplies marginal effects by within-region standard deviations to\
    \ assess historical effect sizes."
  9: "Historical variability (the standard deviation of annual values over the years\
    \ 1979\u20132019) for each measure of rainfall is quantified."
  10: Quantitative analysis includes marginal effects on growth rates and the differences
    in responses by rich and poor countries, depicted graphically.
  11: The analysis provides the marginal effect on growth rates (% point increase)
    in response to changes in rainfall and temperature.
  12: "Regression coefficients indicating the %-point effect on growth rates per unit\
    \ increase in each climate measure, Adjusted R\xB2 values of 0.29 and 0.17 for\
    \ regional and national error clustering, respectively, and Observation number\
    \ of 2,301"
