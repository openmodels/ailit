  1: "The ef fec  t of rainfall changes on economic produc tion ...Here, using a global\
    \ panel of subnational economic output for 1,554 regions worldwide over the past\
    \ 40 years, we show that economic growth rates are reduced by increases in the\
    \ number of wet days and in extreme daily rainfall...Furthermore, high-income\
    \ nations and the ser vices and manufacturing sectors\_are\_most strongly hindered\
    \ by both measures of daily rainfall...Our primar y source of climate data is\
    \ the surface precipitation rate from the European Centre for Medium-Range Weather\
    \ Forecasts Reanalysis 5 (ERA-5) of historical obser vations..."
  2: " \n\"Assessing the distribution of daily rainfall across a range of thresholds,\
    \ we identify four distinct effects on economic production.\" \n\n\"Shocks impacting\
    \ the outcomes include total annual rainfall, monthly rainfall deviations, the\
    \ number of wet days, and extreme daily rainfall.\"\n\n\"Greater annual rainfall\
    \ benefits economic growth, but these benefits diminish with greater climatological\
    \ rainfall totals...economic growth rates are strongly concave with monthly rainfall\
    \ deviations... increases in the number of days with rainfall exceeding 1\u2009\
    mm result in strong reductions in growth rates... increases in extreme daily rainfall\
    \ cause further reductions in growth rates.\"\n\n\"We then apply fixed-effects\
    \ panel regression models to estimate the effect of these aspects of the distribution\
    \ of daily rainfall on economic production.\" \n\n\"Confirming previous studies,\
    \ we identify quadratic effects of both total annual rainfall and monthly rainfall\
    \ deviations on economic growth rates...we identify two further effects...the\
    \ number of wet days... extreme daily rainfall.\"\n\n\"This approach uses within-region\
    \ changes in climate variables from one year to the next to assess their impact\
    \ on economic outcomes.\"\n"
