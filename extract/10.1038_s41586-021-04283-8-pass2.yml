  6: "Climate data\nWe use the surface precipitation rate and the 2-m air temperature\
    \ from the ERA-5 reanalysis of historical observations as our primary climate\
    \ data. The ERA-5 combines satellite and in situ observations with state-of-the-art\
    \ assimilation and modelling techniques to provide estimates of climate variables\
    \ with global coverage and at six-hourly resolution. Data are obtained at the\
    \ daily timescale and on a regular 0.25\xB0\u2009\xD7\u20090.25\xB0 grid for the\
    \ years 1979\u20132019.\n\nEconomic data\nSubnational economic data on macro-economic\
    \ output per capita are obtained from DoSE \u2014the Database of Subnational Economic\
    \ output made publicly available by the Mercator Research Institute on Global\
    \ Commons and Climate Change (MCC) and the Potsdam Institute for Climate Impact\
    \ Research (PIK). The dataset has been introduced by ref. 3 and comprises annual\
    \ gross regional product from 1,554 subnational regions across 77 countries with\
    \ varying temporal coverage from 1901 to 2014. The data have been assembled from\
    \ various sources, such as statistical agencies of central and federal governments\
    \ as well as yearbooks.\n\nMethodology\n(...) Grid-cell values of the annual and\
    \ monthly totals, and the annual threshold measures are aggregated to the regional\
    \ level using an area-weighted mean of grid cells that fall at least partially\
    \ within the administrative boundaries, obtained from the Database of Global Administrative\
    \ Areas (GADM). Weights are calculated using an algorithm that estimates the proportion\
    \ of each grid cell falling at least partially inside the administrative boundary.\
    \ In an alternative specification, a population-weighted mean is used for aggregation,\
    \ using population data from Hyde 3.1, the History database of the Global Environment.\n\
    \nEconometric models\nWe use fixed-effects panel regression models to estimate\
    \ relationships between changes in annual climate measures, and subnational per-capita\
    \ growth rates, g r,y. In our baseline estimations, we include regional, \u03BC\
    \ r, and yearly, \u03B7 y, fixed effects.''`\n"
