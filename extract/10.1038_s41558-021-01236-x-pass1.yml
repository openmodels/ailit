  16: Our integrated scenario analysis framework can be built upon by interested stakeholders
    across business, finance, household and government sectors...towards financial
    risk estimates, which would involve quantitatively downscaling sector-level and
    economy-wide outputs from IAMs to firm- and household-level financial risks. [...]
    Nevertheless, the insights gleaned from comparing physical and transition risks
    in a consistent scenario framework provides a clear basis for building such analysis,
    including identifying underlying drivers of economic changes that result from
    them.
  17: "Source material\nH. M. and M.G. ran GCAM. D.B. ran MAGICC. N.W. A. ran the\
    \ climate impact models. S.Mi. undertook all scenario data analysis and visualisation.\
    \ The study was funded by ClimateWorks Foundation. A.K. and S.M. acknowledge the\
    \ H2020 European Commission Project \u201CPARIS REINFORCE\u201D under Grant Agreement\
    \ No. 820846.\n"
  18: "Source material here: Table 1: Scenario details Details Rationale 1 No Policy\
    \ No new policies from 2010. This mirrors the NGFS9 and Bank of England (BoE)15\
    \ scenarios with no new policies, and reaches ~4oC of median warming by 2100.\
    \ 2 NDC Pledges NDCs to 2030. Assumes NDCs met under the Paris Agreement from\
    \ 2015 to 2030 and then a continuing trend of reduction of regional GHG intensities,\
    \ leading to ~3oC of median warming by 2100. 3 2C Central Paris Agreement compliant\
    \ transition from 2025. Socio-economics based on second shared socio-economic\
    \ pathway (SSP216). Full technology portfolio. 6 2C SSP1 Alternative underlying\
    \ socio-economics to 2C Central (i.e. scenario number 3), focusing on greater\
    \ resource efficiency and energy efficiency, utilising the SSP117 dynamics. 8\
    \ 2C RES As 2C Central (i.e. scenario number 3), but with higher renewables (wind\
    \ and solar). 9 2C NUC CCS As 2C Central (i.e. scenario number 3), but with higher\
    \ nuclear and CCS. 10 2.5C As 2C Central (i.e. scenario number 3), but orderly,\
    \ coordinated transition to higher temperature outcome (2.5oC). 11 1.5C As 2C\
    \ Central (i.e. scenario number 3), but orderly though ambitious coordinated transition\
    \ to lower long-term temperature (1.5oC). Results in peak in median warming of\
    \ ~1.7\xB0C around mid-century and a return to below 1.5\xB0C by 2100."
  19: "Source material here.\nEvaluation overview: This analysis evaluates direct\
    \ climate impacts such as human health, economic assets, water supplies, crop\
    \ yields, and food security. It also considers macro-economic risks affecting\
    \ production and consumption. \n  - \"Heatwaves adversely impact upon human health\
