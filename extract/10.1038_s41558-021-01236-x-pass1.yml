sourcematerial:
  1: The paper focuses on "Near-term transition and longer-term physical climate risks
    of greenhouse gas emissions pathways," indicating an evaluation of these outcomes.
    It lists authors who contributed to the paper, relevant ORCID identifiers, and
    it is published in Nature Climate Change, Volume 12, pages 88-96, reinforcing
    that it is a quantitative study on this topic. The study specifically mentions
    analyzing "greenhouse gas emissions pathways," serving as the primary driver of
    risk. Additionally, the methodology is implied through the paper's focus on "near-term
    transition and longer-term physical climate risks," suggesting analysis over different
    temporal scales based on emissions pathways. The article's availability at specified
    URLs ensures the traceability of the publication for further information.
  4: " \nPolicy, business, finance and civil society stakeholders are increasingly\
    \ looking to compare future emissions pathways across both their associated physical\
    \ climate risks stemming from increasing temperatures, and their transition climate\
    \ risks stemming from the shift to a low-carbon economy. Here we present an integrated\
    \ framework to explore near term (to 2030) transition risks and longer term (to\
    \ 2050) physical risks, globally and in specific regions, for a range of plausible\
    \ greenhouse gas emissions and associated temperature pathways, spanning 1.5-4oC\
    \ levels of long-term warming. By 2050, physical risks deriving from major heatwaves,\
    \ agricultural drought, heat stress and crop duration reductions depend greatly\
    \ on the temperature pathway. By 2030, transition risks most sensitive to temperature\
    \ pathways stem from economy-wide mitigation costs, carbon price increases, fossil\
    \ fuel demand reductions and coal plant capacity reductions. Considering several\
    \ pathways with a 2oC target demonstrates that transition risks also depend on\
    \ technological, policy and socio-economic factors.\n"
  6: 'Source material here.

    Here we present a fully integrated framework to undertake a self-consistent analysis
    of physical and transition risks stemming from scenarios spanning 1.5-4oC temperatures
    and encompassing a broad range of transition dynamics... We combine a technology-rich,
    regionally disaggregated IAM representing energy system, agricultural and land-based
    greenhouse gas emissions, a reduced complexity climate model to simulate probabilistic
    global temperature changes over the 21st century, and a suite of impacts models
    to estimate regional climate-related physical hazards and impacts deriving from
    the temperature change pathways... Our presentation of results is focused on the
    world as a whole and four key regions (China, USA, EU+UK and India), with additional
    results for additional major regions (Brazil, Japan, Middle East, Russia and Sub-Saharan
    Africa) presented in Extended Data and Supplementary Information...

    '
  8: "  \n\"We show the emissions and associated temperature changes across the 21st\
    \ century for two groups of the 11 scenarios...\"\n\"The No Policy scenario, with\
    \ coal, oil and gas demand growing by 72%, 58% and 143% respectively over the\
    \ period 2020-2100, sees temperatures rise to 4.3oC by 2100.\"\n\"The NDC Pledges\
    \ scenario, by contrast, presents a more realistic picture of current ambitions,\
    \ with median temperature projections rising to 3.1oC by 2100...\"\n\"The 2C Central\
    \ scenario keeps median warming below 2oC throughout the century, whilst the 2.5C\
    \ scenario peaks less than 0.1\xB0C above 2.5oC in 2090, before returning to just\
    \ below that level by 2100.\"\n\"The 1.5C scenario peaks at 1.7oC around 2050,\
    \ before returning to below 1.5oC by 2080 and down to 1.3oC by 2100.\"\n\"This\
    \ is a purely hypothetical reference scenario to represent a world absent climate\
    \ policy...\"\n\"The 2C SSP3 scenario does not achieve a long-term temperature\
    \ increase below 2 oC with median likelihood. This results from a lack of land\
    \ use policy, carbon and energy intensity improvements which are slower than recent\
    \ historical rates...\"\n"
  9: 'Source material here. Several metrics of physical risk have been presented in
    the climate change literature...We utilise regional hazard and impact attributes
    of seven physical hazard indicators, measuring: heatwave, major heatwave, hydrological
    drought and river flooding annual likelihoods; agricultural drought and maize
    heat stress annual likelihood; and change in maize crop duration...These indicators
    are calculated at the 0.5x0.5o resolution and averaged to the regional scale,
    and represent the regional average likelihood or change in duration at a point
    in the region. The indicators expressed as likelihoods can be interpreted as acute
    risks, since they characterise the chance of an extreme event happening each year,
    whilst the average annual change in crop growth duration is a chronic risk. Impacts
    deriving from these hazards, which we also report (Supplementary Figures S4.1-S4.10)
    are expressed as annual averages, so characterise chronic risks.'
  10: "Source material here: Our framework allows the identification of the physical\
    \ and transition risk metrics which vary most between the temperature scenarios...The\
    \ physical risk metrics mostly show the change in likelihood of the specified\
    \ acute event...The greatest differences between the NDC Pledges and 2C Central\
    \ scenarios in the chance of river flooding are in India (18% increase, compared\
    \ to 12% globally)...If the relationship between increase in temperature and physical\
    \ risk metric is linear, then the risk in 2050 in the No Policy scenario would\
    \ be 1.47 times the 2C Central scenario\u2019s risk...Of the physical risk indicators\
    \ considered here, the chance of experiencing a major heatwave and the three agricultural\
    \ indicators have the most highly non-linear relationships with temperature...For\
    \ example, there would be a 30-40% greater chance of a major heatwave in 2050\
    \ with the NDC Pledges scenario than the 2C Central scenario in most regions."
  11: 'Source material: The frequency of periods with heat stress for maize would
    increase by over 50% in Russia and the EU+UK...regional reductions in maize yield
    (resulting from reduced growth durations) could be consistently 20-30% greater
    with the NDC Pledges scenario than the 2C Central scenario. Differences between
    the temperature scenarios in absolute terms are shown...ratios of physical risk
    in each scenario compared to the 2C Central scenario, as shown in Figure 2, are
    calculated from median estimates of the indicators. There is an uncertainty range
    around these ratios, determined by uncertainty in the shape of the relationship
    between temperature and metric. SubSaharan Africa (25% increase) and Middle East
    (50% increase)...'
  12: Considering the transition risk indicators, at the global level the 1.5C scenario
    has notably higher values than the other scenarios for most metrics, with the
    exception being electricity and crop prices... For the EU+UK and USA, the NDC
    pathway to 2030, as assumed in the NDC Pledges scenario, is actually more stringent
    than the 2C Central scenario in terms of emissions reductions by 2030. This results
    in higher transition risk metrics by 2030... This result is model-specific to
    GCAM, with other models showing more stringent 2oC pathways to 2030, compared
    to the NDC case, for the EU+UK and USA... Global abatement costs in 2030, which
    affect overall macroeconomic performance of each region and the world as a whole,
    are 1.6% of global GDP in the 1.5C scenario, compared to 0.6% in the 2C Central
    scenario, whilst the 2C Central scenario's abatement cost is about 40% higher
    than that of the NDC Pledges scenario (at 0.4% of global GDP)... It is important
    to note that, whilst an insightful measure of the overall additional resource
    cost of decarbonising by 2030, the abatement cost alone does not capture all macro-economic
    consequences... Fossil fuel demand reductions and coal plant reductions are also
    notable in their inter-scenario intensity variation, indicating specific risks
    for fossil fuel supply and coal-dependent utility sectors.
  14: "  \nSource material here.  \n- \"the regionally uncoordinated socio-economics\
    \ of the 2C SSP3 scenario provides a source of significant 2030 transition risk\
    \ variation in our scenarios.\"\n- \"It is useful to be able to isolate these\
    \ differing socio-economics (as well as the different technological assumptions\
    \ around renewables and CCS and nuclear).\"\n- \"Our illustrative 1.5oC pathway\
    \ sits within the range of the IPCC\u2019s SR1.5 database of 1.5oC... whilst our\
    \ 2oC-targeted pathway ensemble mostly overlaps with the possibility space as\
    \ represented in the database.\"\n- \"this single-model analysis can be situated\
    \ within the broader ensemble of mitigation pathways from recent years.\"\n- \"\
    A consideration of uncertainty and more extreme values is likely to be critical\
    \ to comprehensive risk assessments.\"\n"
  15: 'yaml

    Evaluation overview: "In sum, though not a comprehensive asses            sment
    of all future possibilities and uncertainties, this analysis serves as a critical                                  framework
    for comparing physical and transition risks."

    Drivers of Risk: "Significant near-                                       term
    transition risks to specific business           sectors could result from carbon
