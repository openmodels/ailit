  27: GCAM is an open-source, technology-rich model of the energy, economy, agriculture
    and land use, water, atmosphere, and climate systems... GCAM is a five-year time
    step, dynamic-recursive market equilibrium model which represents the global economy
    by disaggregating the world into 32 geopolitical regions, 235 river basins and
    384 agro-ecological land-use regions... GCAM uses assumptions about population
    growth and changes in labour productivity, along with representations of resources,
    technologies, and policies, and solves for the equilibrium prices and quantities
    of various energy, agricultural, and CO2/GHG markets in each five-year model period
    from 2010 (the calibration year) to 2100... GCAM calculates the CO2 prices required
    to meet the emissions constraint imposed in each model period... All emission
    constraints are assumed to begin in 2025 (except for the NDCs, which begin in
    2020).
  28: GCAM tracks emissions of 24 GHGs, aerosols, and short-lived species endogenously
    based on the resulting energy, agriculture, and land systems activity. Emissions
    can then be passed to the climate carbon-cycle module and converted to concentrations,
    radiative forcing, temperature, and other responses to the climate system, although
    in this study, a separate climate module and impacts models are used for these
    subsequent steps [...] Transition risks derive from the rapid shift from carbon-intensive
    to low-carbon energy sources and technologies, as well as associated structural
    changes in economies from carbon-intensive industries to low-carbon sectors [...]
    Here we focus on a subset of integrated assessment model (IAM) outputs to capture
    the most salient transition risk-related variables. We first draw from a set of
    indicators to track progress towards the Paris Agreement goals.
  29: " \n\"Emissions intensity at sectoral levels has become a central metric to\
    \ benchmark company performance against transition scenarios, in for example the\
    \ Transition Pathways Initiative project34, so we extend our economy-wide intensity\
    \ metric to a sectoral intensity metric.\"\n\n\"We additionally draw from IAM-based\
    \ indicators of feasibility of the transition25 which emphasise the importance\
    \ of abatement costs and carbon prices, as well as reaffirming the importance\
    \ of coal plant idling and capacity reductions26. Carbon price levels are central\
    \ to considerations of energy portfolio default likelihoods64, whilst abatement\
    \ costs directly impact economic output.\"\n\n\"Finally, we include electricity\
    \ and food price indicators, as these relate directly to household energy costs\
    \ and therefore loan defaults, and (in the case of electricity prices) feature\
    \ as key indicators in assessments of energy system transitions in deep mitigation\
    \ scenarios 39.\"\n\n\"Whilst considering the different metrics that IAMs produce\
    \ as outputs, a key set stems from the diagnostic exercises that have been undertaken\
    \ to compare major IAM characteristics65 66. These include: a relative abatement\
    \ index (measuring the share of baseline emissions reduced in a policy case);\
    \ an emissions reduction type index (showing the share of the relative abatement\
    \ index that can be attributed to supply side measures); marginal abatement cost\
    \ curves showing emissions reductions against carbon prices; energy intensity\
    \ and carbon intensity; measures of fuel shares of major primary fuels such as\
    \ fossil and non-fossil sources; mitigation costs; and the mitigation cost achieved\
    \ per unit of carbon pricing.\"\n\n\"Critically however, we do not consider the\
    \ potential stimulus effect of low-carbon investment on economic growth.\"\n"
  30: 'The temperature outputs from GCAM version 5.1 are deterministic, without representation
    of climate system uncertainties. In this study we include leading order uncertainties
    into the climate simulations by running each emissions scenario through a probabilistic
    variant of the MAGICC4.2 simple climate model.


    In the configuration used here12, the uncertainty in temperature response is sampled
    by perturbing the equilibrium climate sensitivity, the ocean mixing rate (which
    determines how quickly the warming at the surface is diffused throughout the ocean)
    and a measure of the climate-carbon cycle feedback strength (regulating how much
    carbon is emitted and absorbed naturally in response to climate change).'
  31: 'Source material: "Seven indicators of hazard and related impact across different
    sectors were calculated for each emissions scenario. All are based on spatially-explicit
    global-scale impacts models. The indicators represent exposure to drought, river
    flooding, heatwaves, and reductions in potential crop yield. All impacts are calculated
    over a 30-year period. Each indicator is characterised by damage functions relating
    indicator to increase in global mean surface temperature, calculated separately
    from climate scenarios constructed from 23 CMIP5 climate models. ... Damage functions
    are constructed separately for five SSP socio-economic scenarios and at 10-year
    increments."'
  32: "Source material here.\nmodels operating at a scale of 0.5x0.5o 14. Each model\
    \ operates on a daily time step and applies climate scenarios corresponding to\
    \ specific increases in global mean surface temperature to observed climate time\
    \ series70 spanning the period 1981-2010: this period is used to define the current\
    \ reference climate. The scaled climate scenarios were constructed using pattern\
    \ -scaling71. It is assumed that each damage function is equally plausible. Two\
    \ heatwave indicators represent different magnitude heatwaves: one defines a heatwave\
    \ as occurring when at least two days exceed the 95 th percentile of daily temperatures\
    \ over the 3-month warm season during the 1981-2010 reference period (this occurs\
    \ in around 35% of years on average), and the other requires at least four days\
    \ exceeding the 99th percentile (this occurs in less than 5% of years). Hazard\
    \ is expressed as an annual likelihood (therefore acute risk), and regional average\
    \ likelihood at a point is calculated by averaging over all grid cells with more\
    \ than 1000 people. The average annual number of people exposed to heatwave (a\
    \ chronic risk) for a given year and SSP is determined by multiplying heatwave\
    \ frequency in a 0.5x0.5o grid cell by population. River flood and water resources\
    \ drought are both based on river flows simulated using the Mac- PDM.09 global\
    \ hydrological model72. River flood risk73 is characterised by the frequency of\
    \ the reference period 50-year flood (2% annual likelihood), and the average annual\
    \ number of people exposed to flooding is determined by multiplying frequency\
    \ by the number of people living in major river floodplains (estimated at approximately\
    \ 700 million in 2010). Note that this does not include the numbers living in\
    \ smaller floodplains, but the proportional change should be consistent. The regional\
    \ average likelihood at a place is averaged over all the floodplain grid cells.\
    \ Water resources drought risk is represented by the Standardised Runoff Index\
    \ (SRI)74, calculated here from runoff accumulated over 12 months. A drought is\
    \ defined as an SRI of less than - 1.5, which occurs by definition 6.8% of the\
    \ time during the 1981-2010 reference period, and a \u2018significant\u2019 drought\
    \ is a period with at least six months with an SRI12 of less than -1.5 (which\
    \ has a global average likelihood 30\n"
  33: "Source material here.\nImpact is characterised as the average annual number\
    \ of people affected by a \u2018significant\u2019 drought...Drought impact is\
