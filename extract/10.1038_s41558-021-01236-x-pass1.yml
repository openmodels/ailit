Highlights:
  1: Near-term transition and longer-term physical climate risks of greenhouse gas
    emissions pathways.
  4: Physical risks by 2050 depend greatly on temperature pathway; Transition risks
    by 2030 depend on economy-wide mitigation costs, carbon price increases, fossil
    fuel demand reductions, and coal plant capacity reductions; Transition risks for
    a 2oC target depend on technological, policy, and socio-economic factors.
  8: Under a 'No Policy' scenario, temperatures rise to 4.3oC by 2100, while the 'NDC
    Pledges' scenario projects 3.1oC by 2100. The 1.5C scenario achieves a return
    to below 1.5oC by 2080.
  9: Differentiates between acute (likelihood of extreme events) and chronic (average
    annual change in crop growth duration) risks related to climate hazards. Reports
    impacts deriving from these hazards (Supplementary Figures S4.1-S4.10) as annual
    averages characterizing chronic risks.
  10: The likelihood of experiencing major heatwaves and changes in agricultural indicators
    show highly non-linear relationships with temperature, resulting in significant
    differences between temperature scenarios.
  11: Heat stress for maize will increase significantly in Russia and the EU+UK. Reductions
    in maize yield will be consistently 20-30% greater under NDC Pledges compared
    to a 2C Central scenario.
  12: The NDC pathway to 2030 for EU+UK and USA, as assumed in the NDC Pledges scenario,
    is more stringent than the 2C Central scenario in terms of emissions reductions
    by 2030, leading to higher transition risk metrics by 2030. The global abatement
    costs in 2030 are different across scenarios (1.5C, 2C Central, and NDC Pledges).
    There is no set low-carbon transition pathway or set degree of risk to a given
    temperature pathway in each region.
  14: Single-model analysis reinforces inter-model diversity findings from NGFS scenarios;
    2oC-targeted scenarios overlap with NGFS scenarios; 1.5oC pathway sits within
    the range of IPCC SR1.5 scenarios.
  15: Stringent mitigation actions result in higher abatement costs and transition
    risks but lead to lower physical climate hazards throughout the century.
  16: The framework allows for comparison of physical and transition risks in a consistent
    scenario framework to build further analysis on economic changes.
  18: This page details scenarios for potential global temperature outcomes by 2100,
    based on varying levels of climate policy and technology focus
  19: The analysis highlights the potential for increased risks from physical hazards
    like heatwaves, floods, and droughts, as well as transition risks associated with
    decarbonization efforts.
  20: The main highlight is the comparison of risk metrics and temperature outcomes
    between different climate scenarios.
  28: The study focuses on a subset of integrated assessment model (IAM) outputs to
    capture the most salient transition risk-related variables, drawing from a set
    of indicators to track progress towards the Paris Agreement goals.
  29: Emissions intensity at sectoral levels is a central metric to benchmark company
    performance against transition scenarios. Coal plant idling and capacity reductions
    are important. Carbon price levels are central to considerations of energy portfolio
    default likelihoods. Electricity and food price indicators are important. The
    analysis does not consider the potential stimulus effect of low-carbon investment
    on economic growth.
  33: Shorter growing periods and significant droughts could reduce maize yields,
    and high temperatures during critical growth phases are a risk.
  34: Associated temperature changes of between 3 oC and 4oC by 2100 could result
    in significant physical risks.
  35: "Explores transition pathways which do not achieve the below 2 oC goal, but\
    \ rather a higher (~2.5oC) level of warming, in line with several experts\u2019\
    \ scepticism around the achievability of a 2oC or below temperature goal."
  37: No significant outcomes related to direct climate impacts are highlighted on
    this page.
Methodology:
  1: The paper analyzes near-term transition and longer-term physical climate risks
    based on different greenhouse gas emissions pathways.
  4: Integrated framework to explore near term (to 2030) transition risks and longer
    term (to 2050) physical risks, globally and in specific regions, for a range of
    plausible greenhouse gas emissions and associated temperature pathways.
  6: Results focus on global and key regions like China, USA, EU+UK, and India, with
    additional data for other regions.
  8: Scenarios project temperature changes based on different emissions pathways and
    policy assumptions.
  9: Calculates indicators at a 0.5x0.5o resolution and averages them to the regional
    scale. Likelihood indicators are interpreted as acute risks, while average annual
    change in crop growth duration is considered a chronic risk. Impacts are expressed
    as annual averages and characterize chronic risks.
  10: The analysis compares physical and transition risk metrics across different
    temperature scenarios normalized by values in 2050 for physical risk and 2030
    for transition risk.
  11: Ratios of physical risk are calculated from median estimates of the indicators,
    compared to the 2C Central scenario. There is an uncertainty range around these
    ratios, determined by uncertainty in the shape of the relationship between temperature
    and metric.
  12: The analysis uses the GCAM model, with the caveat that other models may show
    different results, specifically regarding the stringency of 2oC pathways compared
    to NDC cases for the EU+UK and USA.
  14: Broad scenario sensitivity analysis within a single model; comparison to NGFS
    scenarios and IPCC SR1.5 database.
  15: The analysis focuses on mid-century physical risks but is salient for current
    policy, corporate, household, and financing decisions.
  16: The analysis involves an integrated scenario framework that can be expanded
    for financial risk estimates by downscaling outputs from IAMs to firm- and household-level
    financial risks.
  17: GCAM was used for modelling. MAGICC was used for modelling. Climate impact models
    were used for modelling. Scenario data analysis and visualisation was undertaken.
  18: The analysis considers various scenarios from no new policies to multiple levels
    of compliance with the Paris Agreement, with differing socio-economic pathways
    and technology focuses
  20: It uses a model setup to produce risk-related indicators for various scenarios,
    with physical risks assessed for 2050 and transition risks for 2030.
  27: The model integrates aspects of energy, economy, agriculture/land use, water,
    atmosphere, and climate systems, using emission constraints beginning in 2025
    (except NDCs starting in 2020) and calculates CO2 prices needed for emissions
    constraints.
  28: GCAM tracks emissions of 24 GHGs, aerosols, and short-lived species endogenously
    based on energy, agriculture, and land systems activity, which are then passed
    to climate carbon-cycle module and converted to concentrations, radiative forcing
    and temperature.
  29: The analysis draws from Integrated Assessment Models (IAMs) and their diagnostic
    exercises comparing major IAM characteristics. The analysis uses IAM-based indicators
    of feasibility of the transition and metrics to benchmark company performance
    against transition scenarios. The analysis uses a sectoral intensity metric.
  30: Uncertainty is incorporated by perturbing parameters like equilibrium climate
    sensitivity, ocean mixing rates, and climate-carbon cycle feedback strength.
  31: Analysis performed using damage functions relating indicators to increases in
    global mean surface temperature, constructed from 23 CMIP5 climate models, and
    considering five SSP socio-economic scenarios at 10-year increments.
  32: Approach includes climate models operating at a 0.5x0.5 degree scale, using
    pattern-scaling to construct scenarios, and river flows simulated with a global
    hydrological model.
  33: Utilizes SPEI over six months, growing degree-days for maize, and frequency
    of high-temperature days during maize reproductive phase to assess drought and
    temperature impacts.
  34: expand the scope of the NGFS scenarios in four ways...explore variations around
    underlying socio-economic trends...explore disorderly scenarios through regional
    fragmentation and staged accession to a long-term temperature mitigation strategy.
  35: Explores plausible technology variations and transition pathways using the GCAM
    model. Specific 1.5oC scenario developed by ClimateWorks Foundation in partnership
    with the Pacific Northwest National Laboratory GCAM modelling team.
  37: No specific methodology related to the direct climate impacts is mentioned on
    this page.
