  2: "yaml\nEvaluation overview: \"Here, we summarize the scienti\uFB01c evidence\
    \ of the major health effects on developing fetuses and children to re\uFB02ect\
    \ the impacts of fossil fuel combustion (Fig. 1). This review discusses the current\
    \ understanding of children's health impacts from a life-course perspective in\
    \ terms of how air pollution and climate change may affect the development of\
    \ children.\"\nDrivers of Risk: \"Fossil fuels, the primary source of air pollution\
    \ and climate change, represent approximately eighty percent of the total primary\
    \ energy supply [15]. Fossil fuel combustion causes signi\uFB01cant health damage\
    \ to the child born today through air pollution and climate change.\"\nQuantitative\
    \ material: \"A recent systematic review of high temperatures and adverse birth\
    \ outcomes revealed that the relative risks due to high-temperature exposures\
    \ ranged from 1.05 to 1.16-fold [23].\"\nHighlights: \"Adverse birth outcomes,\
    \ including birth defects, preterm birth (PTB), low birth weight (LBW), small\
    \ for gestational age (SGA), and intrauterine growth restriction (IUGR), are known\
    \ risk factors for premature death and neurodevelopmental disorders in children\
    \ [16e18]. Maternal exposure to multiple air pollutants, particularly particulate\
    \ matter (PM), ozone (O3), and nitrogen dioxide (NO2), has been signi\uFB01cantly\
    \ associated with adverse birth outcomes, particularly PTB, LBW, and small for\
    \ gestational age (SGA) [4,19].\"\nMore Notes: \"The incomplete evaluations of\
    \ the impacts on children can severely underestimate the potential bene\uFB01\
    ts of relevant policies and actions and undermine the determination of clean energy\
    \ transition.\"\n"
  3: Source material here.
  4: 'First, extreme temperatures, including extreme heat, extreme cold, and temperature
    variations, were observed to increase hospital visits for asthma in childhood.
    In a recent cohort study, long-term heat and cold exposure from the second trimester
    until four weeks after birth was associated with newborn lung volumes. Further,
    the changed climate enhances the severity and frequency of air pollution episodes
    and thereby directly and indirectly causes many pulmonary diseases. Increased
    extreme weather events, including heatwaves, wildfires, and dust storms, can contribute
    to elevated levels of air pollutants such as PM, O3, and black carbon (BC)...
    Recently, global warming is worsening some extreme weather events, particularly
    hurricanes, and flooding, which could directly cause physical trauma or death
    for children. Climate change-related disaster worsen children''s physical health
    and cause chronic and severe mental health disorders. Children exposed to weather-related
    disasters and the ensuing family stress, social network disruptions and population
    displacement are at higher risks of developing sleep disorders, depression, post-traumatic
    stress disorder, and panic etal...This section summarizes the human capital effects
    due to climate change and air pollution, which are mainly mediated by children''s
    health damages, in terms of three dimensions: health (represented by mortality
    and morbidity), cognitive ability (measured by IQ and education outcomes), and
    non-cognitive/socio-emotional ability (including psychological characteristics
    and behavioral tendencies). '
  5: Source material here.
  6: 'Source material: "This paper provides a complete picture of the profound impacts
    of fossil fuel use on the current and future generations...Fossil fuel combustion
    can cause multiple health effects on children, which can further affect a range
    of health, cognitive and non-cognitive outcomes...We call for a holistic assessment
    of the full range of impacts of fossil fuel combustion borne by children; hence
    more concerted global efforts can be motivated to protect our environments and
    the health of the next generations...Second, we urge public health researchers
    to work across disciplines and beyond academia to understand a holistic life course
    assessment better...High-quality birth cohort studies are encouraged for such
    exploration..."'
