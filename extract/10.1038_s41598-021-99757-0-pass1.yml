Drivers of Risk:
  1: The drivers of risk are climate change (increasing temperatures, more frequent/intense/longer
    heat events) and socio-economic progress.
  2: The study considers the impact of varying climate trajectories and socio-economic
    pathways, such as fossil-fuel-driven economic growth, on heat exposure and adaptation
    levels.
  4: The primary drivers identified include changes in climate variables and GDP/capita,
    impacting Maximum Mean Temperature (MMT) and leading to varying levels of adaptation
    gains or risk exposure in different regions.
  5: Changes in climate variables until 2100, including 30-year mean temperature and
    socio-economic growth impacting heat adaptation.
  6: The main driver of risk discussed is the future scenario combinations RCP8.5/SSP5
    and RCP2.6/SSP1, which affect warming patterns and EXD in cities globally.
  7: The analysis focuses on changes in heat exposure frequency and magnitude under
    different climate scenarios, RCP2.6/SSP1 and RCP8.5/SSP5.
  8: The paper considers different climate trajectories and socio-economic pathways
    impacting heat exposure.
  9: RCP2.6/SSP1 (minimum forcing, sustainable socio-economic pathway) and RCP8.5/SSP5
    (high forcing, fossil-fuel based socio-economic growth).
  10: Increased heat exposure due to climate change and socio-economic development,
    particularly driven by high greenhouse gas forcing scenarios like RCP8.5/SSP5.
  13: No specific shocks or changes impacting outcomes are detailed on this page.
Evaluation overview:
  1: This paper evaluates heat-related mortality risk among urban populations.
  2: The paper assesses changes in adaptation to heat across 3820 cities worldwide
    from 2000 to 2100, focusing on heat-related mortality and adaptation as indicated
    by the change in minimum mortality temperature (MMT).
  4: The analysis evaluates changes in adaptation and exposure due to socio-economic
    and climatic changes, particularly focusing on Maximum Mean Temperature (MMT)
    changes and their implications by scenarios and geographical areas.
  6: The paper evaluates changes in exposure to extreme degree days (EXD) and maximum
    annual growth (MAG) under different climate scenarios.
  7: The paper provides an overview of heat exposure metrics (EXD and MAG) and the
    potential impact on mortality until 2100 based on climate scenarios.
  8: The paper assesses future adaptation and heat exposure for 3820 cities worldwide.
  9: Heat exposure in cities, including heat exposure magnitude and frequency.
  10: The paper evaluates future summer excess mortality due to heat exposure and
    the concept of habitability in various regions under different socio-economic
    pathways.
  13: The specific evaluation or outcome being discussed on the provided page is not
    explicitly mentioned or detailed.
Highlights:
  1: "Human adaptation to heat and socio-economic progress can potentially keep the\
    \ negative health effects of global warming in check, but this is contingent on\
    \ the climate trajectory and location. High economic growth is required under\
    \ high-forcing climate scenarios (e.g., RCP8.5) to maintain MMT increases and\
    \ level off negative health effects. A 2\xB0C-compatible climate trajectory alleviates\
    \ the dependence on fast growth."
  2: The study reveals that increasing forcing levels, particularly under RCP8.5/SSP5,
    lead to higher adaptation but also increase heat exposure frequency and magnitude.
  4: It was highlighted that GDP/capita growth under SSP5 offers high adaptation potential
    but does not necessarily result in a bearable situation for urban populations
    regarding heat-related impacts.
  5: "In RCP8.5/SSP5, climate effects are primary drivers of \u03941MMT with physiological\
    \ acclimatization outweighing economic growth in adaptation to heat."
  6: Under the RCP8.5/SSP5 scenario, cities in regions such as the Middle East, northern
    Mexico, and southwestern USA are expected to experience significant MAG increases,
    while some locations may see MAG reductions under RCP2.6/SSP1.
  7: RCP8.5/SSP5 leads to a substantial worsening of heat exposure, whereas RCP2.6/SSP1
    shows a reduction in exposure, with significant implications for mortality.
  8: RCP8.5/SSP5 scenario shows a higher percent of cities with increased heat exposure,
    whereas RCP2.6/SSP1 sees a reduction in exposure for most cities.
  9: RCP2.6/SSP1 is beneficial for urban populations' health, resulting in exposure
    decline until 2100 outperforming RCP8.5/SSP5. High socio-economic level driven
    by fossil-fuel exploitation (RCP8.5/SSP5) can only partly compensate for its own
    negative consequences. Cities in arid and semi-arid climates (e.g., southwestern
    USA, northern Mexico, Brazil, Sahel, Arabian Peninsula, Middle East, Pakistan,
    and India) are particularly endangered under RCP8.5/SSP5, with small adaptation
    gains but increased heat exposure.
  10: Socio-economic development based on sustainable growth, such as RCP2.6/SSP1,
    favors adaptation, whereas RCP8.5/SSP5 exacerbates heat exposure and risks. A
    sustainable economic pathway aligns with lower forcing and better adaptation.
  11: The analysis finds that the re-calibrated model preserves the relative importance
    of independent climate, topographic, and socio-economic variables.
  13: The page does not highlight specific outcomes of the analysis.
Methodology:
  1: The study models long-term changes in minimum mortality temperatures (MMT) as
    a function of climate change and socio-economic progress across 3820 cities. It
    considers physiological acclimatisation and socio-economic standard facilitating
    access to technological, social or behavioural measures to avoid heat exposure
    when modeling MMT.
  2: The analysis combines four Representative Concentration Pathways (RCPs) and five
    Socio-Economic Pathways (SSPs) using Global Circulation Models to understand future
    adaptation and exposure outcomes.
  4: The analysis involved calculating changes in climate and economic variables until
    2100 and assessing their isolated effects on MMT (Maximum Mean Temperature), evaluating
    adaptation gains driven by GDP/capita increases in specific regions.
  5: "Comparison of scenarios RCP2.6/SSP1 and RCP8.5/SSP5 analyzing changes in \u0394\
    1MMT and EXD across cities until 2100."
  7: Analysis uses climate scenario projections (RCP2.6/SSP1 and RCP8.5/SSP5) to assess
    changes in heat exposure metrics for 3820 cities worldwide.
  9: Analysis of urban populations' adaptation and exposure to heat in 3820 cities
    globally for the full spectrum of climate trajectories and socio-economic pathways,
    comparing changes from 1991-2000 to 2090-2099.
  10: The analysis involves integrating locally-extended Shared Socioeconomic Pathways
    (SSPs) with Representative Concentration Pathways (RCPs) using historical and
    projected climate data from CMIP5 and ISIMIP for different General Circulation
    Models (GCMs).
  11: Data calculations include daily apparent temperature (AT), incorporating climate
    parameters such as mean temperature, humidity, and wind speed.
  12: "The methodology includes the use of city-specific MMTs as thresholds for determining\
    \ critical heat exposure exceeding MMTs, calculated for historic (1991\u20132000)\
    \ and future (2090\u20132099) periods under different RCPs."
  13: The methodology section mentions roles of authors in conceptualization, methodology,
    and data curation, but doesn't detail the specific analysis method.
More Notes:
  7: Adaptation is considered in conjunction with heat exposure; RCP2.6/SSP1 minimizes
    heat exposure but RCP8.5/SSP5 may require faster adaptation.
  13: The page primarily includes a list of references and author contributions, with
    no direct analysis results or findings.
Quantitative material:
  1: By 2100, the risk to human health is expected to decline in 60% to 80% of cities
    against contemporary conditions.
  2: "The analysis includes specific changes such as a mean delta MMT of 7.9\xB0C\
    \ for RCP8.5/SSP5, the highest forcing level, and a decrease in EXD of -7.6 until\
    \ the 2090-2099 decade."
  4: Quantitative data includes projections of GDP/capita for different Shared Socioeconomic
    Pathways (SSPs), with SSP5 projecting GDP/capita at Int$ 101,205 and SSP1 at Int$
    63,346 by 2100, and noted changes in MMT driven by socio-economic and climatic
    variations across cities.
  5: "RCP2.6/SSP1 scenario projects largest EXD reductions in some cities, like \u2212\
    140 EXD in Antofagasta; RCP8.5/SSP5 scenario shows larger changes, with max EXD\
    \ increase of +92 in Ciudad Obreg\xF3n."
  6: "The paper presents quantitative changes in EXD and MAG for different cities,\
    \ with specific temperature change values ranging from +5.4\xB0C to -4.4\xB0C\
    \ under various scenarios."
  7: The paper provides quantitative estimates, such as 1150 cities experiencing additional
    EXD under RCP8.5/SSP5 and 224 under RCP2.6/SSP1.
  8: The analysis provides the number and share of cities affected by changes in exposure,
    with specific statistics for RCP2.6/SSP1 and RCP8.5/SSP5.
  9: Under RCP8.5/SSP5, 5.1 times as many cities will face more frequent heat exposures
    and 4.3 times as many will experience higher exposure magnitudes than in RCP2.6/SSP1.
  11: "The root mean square error (RMSE) of the re-calibrated model is 3.2\xB0C versus\
    \ 2.8\xB0C for the original model, indicating a minor penalty for using coarser\
    \ climate data."
  13: The page does not provide direct quantitative results or findings.
sourcematerial:
  1: "Source material here: \"When inferring on the magnitude of future heat-related\
    \ mortality due to climate change, human adaptation to heat should be accounted\
    \ for. Apart from an increasing temperature trend in a warming climate, heat events\
    \ will become more frequent, intense and longer lasting. Depending on the combination\
    \ of climate trajectories and socio-economic pathways evaluated, by 2100 the risk\
    \ to human health is expected to decline in 60% to 80% of the cities against contemporary\
    \ conditions. We model long-term changes in minimum mortality temperatures (MMT),\
    \ a well-established metric denoting the lowest risk of heat-related mortality,\
    \ as a function of climate change and socio-economic progress across 3820 cities.\
    \ In our understanding, both aspects, physiological acclimatisation and a socio-economic\
    \ standard facilitating the access to technological, social or behavioural measures\
    \ to avoid heat exposure are jointly considered in the MMT. While our adaptation\
    \ model suggests that negative effects on health from global warming can broadly\
    \ be kept in check, the trade-offs are highly contingent to the scenario path\
    \ and location-specific. For high-forcing climate scenarios (e.g. RCP8.5) the\
    \ maintenance of uninterrupted high economic growth by 2100 is a hard requirement\
    \ to increase MMTs and level-off the negative health effects from additional scenario-driven\
    \ heat exposure. Choosing a 2 \xB0C-compatible climate trajectory alleviates the\
    \ dependence on fast growth.\""
  2: "Source material here: \n\"Our research seeks to complement these previous efforts\
    \ by contributing the delta value by which the MMT changes for the world\u2019\
    s major cities... This work shows which benefits and detriments these futures\
    \ have in store concerning heat-related mortality until 2100. \nOur analysis considers\
    \ four possible Representative Concentration Pathways (RCPs)24 from four Global\
    \ Circulation Models (GCMs). We combine these different climate futures with five\
    \ possible socio-economic pathways (SSPs) ... We aim at demonstrating the disadvantage\
    \ for human health arising from high forcing levels driven by a rapid growth based\
    \ on fossil-fuels. \nFor the city sample, the highest change in mean adaptation\
    \ across all scenario combinations is a mean /Delta1MMT of 7.9  \xB0C, which is\
    \ reached by RCP8.5/SSP5... This combination shows a small /Delta1 EXD of \u2212\
    \ 7.6 until the decade 2090\u20132099... \nOur analysis considers four possible\
    \ Representative Concentration Pathways (RCPs)24 from four Global Circulation\
    \ Models (GCMs). We combine these different climate futures with five possible\
    \ socio-economic pathways (SSPs)  25,26 leant on the Scenario Matrix26,27. \n\
    Even though increasing forcing levels achieve higher adaptation and larger adaptation\
    \ rates until 2100, they amplify heat exposure frequency and magnitude.\" \n"
  4: "Source material here.\nEvaluation overview: \"Systematic overview of the change\
    \ in adaptation and exposure for the city sample according to each RCP/SSP combination.\"\
    \nDrivers of Risk: \"The resulting primary contributors to /Delta1MMT, either\
    \ a single variable's influence or the sum of two, are illustrated... large changes\
    \ in adaptation are solely driven by high gains in GDP/capita cities in Western\
    \ Europe, North America, East Asia, Oceania and coastal South America.\"\nQuantitative\
    \ material: \"SSP5 generates the highest future mean country-based GDP/capita\
    \ (Int$\_101\_205) compared to the beginning of the century (Int$\_9\_849). The\
    \ 2100 GDP/capita related to SSP1 is less, but still comparatively high (Int$\_\
    63\_346).\"\nMethodology: \"To shed light on the principal drivers behind /Delta1MMT\
    \ across cities around the globe, we calculated the changes in each variable (climate\
    \ variables and GDP/capita) until 2100 and their respective isolated effects on\
    \ /Delta1MMT.\"\nHighlights: \"This suggests a high GDP/capita does not automatically\
    \ lead to a better bearable situation regarding future heat and its related mortality\
    \ for urban populations.\"\n"
  5: "Source material here.\n\"Changes in climate variables until 2100 act as primary\
    \ contributors to \u03941MMT. Highest \u03941MMTs across Europe are driven by\
    \ the 30-year mean temperature in the east and additionally by the 30-year mean\
    \ amplitude in southern Europe.\"\n\"In a fossil-fuel-based future with rapid\
    \ socio-economic growth as in RCP8.5/SSP5, the adaptation to heat will largely\
    \ be driven by a strong physiological acclimatization until 2100 and outweigh\
    \ the already strong effect of economic growth.\"\n\"In RCP2.6/SSP1, EXD reductions\
    \ until 2090\u20132099 are largest with \u2212140 EXD in the Chilean city Antofagasta.\
    \ RCP8.5/SSP5 yields more extreme EXD changes than the sustainable scenario. The\
    \ maximum EXD increase for this scenario is a \u03941EXD of +92 EXD in Ciudad\
    \ Obreg\xF3n (Mexico).\"\n\"Comparing the two highlighted scenario combinations\
    \ regarding changes in exposure parameters until 2090\u20132099 across the cities.\"\
    \n"
  6: "Source material here.\nEvaluation overview: \"The global perspective on /Delta1EXD\
    \ shows prominent differences between the two highlighted scenario combinations\
    \ in southern European, North American, Subsaharan, Indian, and East Asian cities,\
    \ (Fig. 5).\"\nDrivers of Risk: \"Large scenario disparities are obvious in cities\
    \ in northwestern Mexico, Brazil, Pakistan, and India. In a fossil-fuel dependent\
    \ future, these cities will have to cope with 50 to 92 additional EXD until 2090\u2013\
    2099. In RCP2.6/SSP1 /Delta1EXD will be less in and even bring EXD reductions\
    \ in some of these cities (\u2212 50 to 0 EXD).\"\nQuantitative material: \"MAG\
    \ reductions in RCP8.5/SSP5 are more extreme compared to the sustainable future...Maximum\
    \ /Delta1MAG increments are observed in Bechar (Algeria, /Delta1MAG + 5.4\xB0\
    C), Karbala, al-Fallujah (Iraq), and Zambol (Iran) (/Delta1MAG +5\xB0C).\"\nHighlights:\
    \ \"Mainly cities in the Sahel, the Middle East into Pakistan and India, in northern\
    \ and southern Africa, in the Southwestern USA and in northern Mexico show high\
    \ increments in /Delta1MAG (+ 2\xB0C to +6\xB0C) until 2090\u20132099. Some severely\
    \ exposed cities would profit from MAG reductions in RCP2.6/SSP1 instead (Fig.\
    \ 6a,b).\"\n"
  7: "Still, 1150 (30%) cities will experience additional EXD and 1459 (38%) a larger\
    \ MAG... Against this ideal future, RCP2.6/SSP1 constitutes a slight impairment\
    \ leading to a higher mortality. RCP8.5/SSP5 signifies a substantial worsening\
    \ of prospects... Changes in future heat exposure frequency in major cities worldwide\
    \ until 2100. /Delta1EXD 1991\u20132000 to 2090\u20132099 in case of RCP2.6/SSP1\
    \ (a ) and in case of RCP8.5/SSP5 (b ). Still, 1150 (30%) cities will experience\
    \ additional EXD and 1459 (38%) a larger MAG. ... Only 224 (6%) cities will face\
    \ additional EXD and 338 (9%) a higher MAG. We aggregated the adaptation and exposure\
    \ parameters across our sample of 3\_820 cities and provide their out- comes (P05,\
    \ P95, Mean, Min and Max) in Supplementar y Table\_S2. RCP8.5/SSP5 signifies a\
    \ substantial worsening of prospects because positive wealth effects on adaptation\
    \ are likely annihilated... RCP2.6/ SSP1 in contrast is associated with less cities\
    \ experiencing aggravated exposure changes until 2090\u20132099. It is indispensable\
    \ to view adaptation and exposure jointly... However, a future according to RCP2.6/SSP1\
    \ is able to minimise heat exposure for our city sample in contrast to RCP8.5/SSP5.\
    \ This also requires a faster adaptation rate until 2100."
  8: "yaml\nEvaluation overview: \"For the first time, future adaptation and heat\
    \ exposure for 3820 cities worldwide have been assessed jointly.\"\nDrivers of\
    \ Risk: \"For the full spectrum of possible future climate trajectories (RCPs\
    \ 2.6, 4.5, 6.0 and 8.5) and socio-economic pathways (SSPs 1\u20135) this analysis\
    \ envisages potential adaptation and exposure changes until 2100.\"\nQuantitative\
    \ material: \"Table1. Number and share of cities affected by changes in exposure\
    \ from 1991\u20132000 to 2090\u20132099. Exposure outcomes by indicator across\
    \ the 3820 world cities comparing RCP2.6/SSP1 and RCP8.5/SSP5.\"\nHighlights:\
    \ \"Days reduction in EXD RCP2.6/SSP1 84 Percent (%); Days increase in EXD RCP8.5/SSP5\
    \ 30.1 Percent (%); Reduction in MAG [\xB0C] RCP2.6/SSP1 80.5 Percent (%); Increase\
    \ in MAG [\xB0C] RCP8.5/SSP5 38.2 Percent (%).\"\n"
  9: " \nSource material here.\n\n\"Heat exposure in the majority of cities until\
    \ the future decade (2090\u20132099)...\"\n\"A rapid socio-economic growth based\
    \ on fossil fuels along with high forcing (RCP8.5/SSP5) will reach higher adaptation\
    \ levels in 2100 for most cities against a sustainable future...\"\n\"You will\
    \ face more frequent heat exposures and 4.3 times as many will experience higher\
    \ exposure magnitudes...\"\n\"The approach presented here takes stock of urban\
    \ populations\u2019 adaptation and exposure to heat in 3820 cities across the\
    \ globe for the full spectrum of climate trajectories and socio-economic pathways.\"\
    \n\"RCP2.6/SSP1 has proven to be beneficial for urban populations\u2019 health...\"\
    \n\"A future according to RCP8.5/SSP5 would critically endanger cities in arid\
    \ and semi-arid climates, i.e. cities in the southwestern USA, northern Mexico,\
    \ in Brazil...\"\n"
  10: "Source material here: We found urban populations\u2019 heat adaptation is not\
    \ purely climate-driven. Locally-extended SSPs were employed jointly with RCPs\
    \ by a single study to estimate future summer excess mortality in Greater Houston\
    \ (USA)30. They confirm other influences related to socio-economy....For the Middle\
    \ East, future habitability was questioned based on future temperature and humidity\
    \ conditions regarding RCP8.5...Following a sustainable pathway avoids exposure\
    \ for most cities endangered in a RCP8.5/SSP5 future. ... A strong socio-economic\
    \ development based on fossil-fuel exploitation as in RCP8.5/SSP5 does not principally\
    \ drive adaptation but amplifies extreme heat exposures in a larger number of\
    \ cities that would not be impacted as severely in a sustainable future....We\
    \ demonstrated the necessity to integrate a socio-economic aspect to assess future\
    \ adaptation.... Climate data. Historical modelled data Historical climate data\
    \ from the Coupled Model Intercomparison Project 5 (CMIP5) experiments32 were\
    \ available from the Inter-Sectoral Impact Model Intercomparison Project (ISIMIP)33\
    \ for four General Circulation Models (GCMs): GFDL_ESM2M, HadGEM2_ES, IPSL_CM5A-LR,\
    \ and MIROC5. The gridded data were obtained with spatial resolution of 0.5\xB0\
    \ \xD7 0.5\xB0 and the ensemble mean (ENSMEAN) across the four GCMs was calculated.\
    \ Climate projections Climate projections for four greenhouse gas concentration\
    \ trajectories, the Representative Concentration Pathways (RCPS 2.6, 4.5, 6.0,\
    \ and 8.5) were available from the same source as the historical modelled data.\
    \ Data representing each RCP had been generated from four GCMs: GFDL_ESM2M, HadGEM2_ES,\
    \ IPSL_CM5A-LR, and MIROC5. We calculated the ENSMEAN across the GCMs...Especially\
    \ western European cities, North American, Central and Eastern Asian cities would\
    \ benefit from considerable and sustainable economic growth-driven adaptation\
    \ gains in a RCP2.6/SSP1 future. Sustainable and stable economic growth contributes\
    \ to adaptation and maintains low forcing....We conclude that it is most beneficial\
    \ to strive for a \u25E6 sustainable but prosperous future, which is compatible\
    \ with the 2\_ C\_ limit, as for instance the scenario variant RCP2.6/SSP1 to\
    \ avoid additional future heat exposure."
  11: "`\nMethodology: \"The methodology to estimate the future MMT grounds on our\
    \ previously established generalised multivariate non-linear model to approximate\
    \ the MMT for cities published in Krummenauer et al. Our approach estimates the\
    \ MMT for cities independently from daily mortality records on the basis of a\
    \ set of city-specific climatic, topographic and socio-economic variables.\"\n\
    \nMethodology: \"For model calibration, we use the ENSMEAN historic 30-year mean\
    \ of the daily temperature and the ENSMEAN 30-year mean of the annual amplitude\
    \ calculated from the historic gridded data for the reference periods in accordance\
    \ with the original work listed in the previous study.\"\n\nMethodology: \"The\
    \ final selection of independent variables used in this paper, the treatment of\
    \ co-linearity and the significance testing is discussed at lengths in Krummenauer\
    \ et al. A total of 13 independent variables reflecting the topography (e.g. distance\
    \ to coast, latitude) and socio-economy (e.g. health expenditure, share of population\
    \ above 65) were originally tested in their ability in reproducing the observed\
    \ MMT of the city.\"\n\nMethodology: \"We subsequently use tas and the newly derived\
    \ tdewp to calculate the daily ATmean according to Eq. (2) by Michelozzi (2007).\"\
    \n\nQuantitative material: \"The RMSE of the re-calibrated model ranked at 3.2\xB0\
    C while the RMSE of the original model was 2.8\xB0C, this indicates only a minor\
    \ penalty of using coarser gridded climate data.\"\n\nMethodology: \"The socio-economic\
    \ variables for the year 2000 and the topography remained the same as in the previous\
    \ study. The variable access to water and the topography remained constant. The\
    \ future MMT estimation was carried out for each of the 15 feasible RCP and SSP\
    \ combinations according to the Scenario Matrix. This excludes the combination\
    \ RCP 2.6. with SSP3.\"\n\nHighlights: \"We found that the re-calibrated model\
    \ using gridded climate data preserves the relative importance of all independent\
    \ variables as in Krummenauer et al.\"\n"
  12: "We determine the delta change in MMTs (\u0394MMT) between the end and the beginning\
    \ of the century for each city. We carry out this delta MMT calculation on the\
    \ basis of the historic MMTs for the cities and the 15 sets of projected MMTs\
    \ for the cities, each for one of the RCP/SSP combinations. Subsequently, we derive\
    \ the mean MMT and the mean \u0394MMT across the 3 820 cities for each of the\
    \ RCP/SSP combinations. All calculations have been performed in R (version 3.6.2),\
    \ maps have been produced with the tmap package (version 2.3-2). We use the estimated\
    \ MMTs, a measure for human heat adaptation in cities, as a threshold to determine\
    \ critical heat exposure that exceeds the MMTs and thus also the long-term acquired\
    \ heat adaptation among the city population. We count the annual number of days\
    \ that show a daily mean apparent temperature (ATmean) exceeding the MMT as adaptation\
    \ measure. We do so for each year and city within the historic exposure reference\
    \ period 1991\u20132000 and use the city-specific MMTs that are valid around the\
    \ year 2000 as threshold. We repeat the procedure likewise for each year within\
    \ the future exposure period 2090\u20132099 and each city under each of the four\
    \ RCPs. We derive the delta changes in EXD (\u0394EXD) for each city by subtracting\
    \ the city-specific decadal mean EXD in 1991\u20132000 from the city-specific\
    \ mean EXD in 2090\u20132099 under the 15 different RCP/SSP setups."
