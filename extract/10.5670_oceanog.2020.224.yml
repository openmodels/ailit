Drivers of Risk:
  2: Drivers of risk include ice volume changes, atmospheric CO2 levels, and tectonic
    processes, which affect past, present, and future sea levels.
  3: Changes in ocean temperature, changes in land ice volume, and changes in the
    volumes of ocean basins are drivers of sea level change.
  8: Anthropogenic warming, ocean warming, melting of ice sheets and mountain glaciers,
    and future emissions pathways.
Evaluation overview:
  2: The paper discusses the historical and current impacts of global mean sea level
    (GMSL) changes on coastal areas and their relevance in planning for future sea
    level rise.
  3: Sea level change
  8: Global mean sea level (GMSL) rise.
Highlights:
  2: A significant increase in GMSL is expected under higher emissions scenarios,
    with 21st-century projections exceeding 2 m and potentially tens of meters in
    the long term.
  3: 'Recognizes three pre-Anthropocene climate states: Hothouse (very warm, largely
    ice-free conditions), cool Greenhouse (Early to Middle Eocene) with small ice
    sheets (<25 m sea level equivalent), and Icehouse conditions with continental-
    scale ice sheets at one or both poles.'
  8: Modern GMSL rise is not a remnant of deglaciation but due to anthropogenic warming,
    beginning in the late nineteenth century. The rate of sea level rise has accelerated
    in the late twentieth and early twenty-first centuries.
Methodology:
  2: The analysis is informed by advances in data, imaging, and modeling to provide
    new constraints on ancient sea level changes. It also examines the geological
    history over the past 66 million years.
  3: Sea level change is determined by measuring time (age) and height of water with
    respect to datum levels. For reconstruction of ancient sea level, proxies (shorelines,
    fossils, sediment facies) are calibrated to time and MSL, with ages determined
    from radiometric data.
  8: Statistical analysis of satellite and tide gauge records and simple regression
    models are used to project GMSL rise.
More Notes:
  3: "The Anthropocene can be characterized by human-induced modifications of Earth\u2019\
    s climate state due to changes in atmospheric CO2 concentrations from 280 ppm\
    \ in ~1850 to 414 ppm in 2020 CE, with current trends projected to lead to 600\u2013\
    900 ppm in this century."
Quantitative material:
