sourcematerial:
  2: "Source material here: Studies of ancient sea levels provide insights into the\
    \ mechanisms and the record of past sea level changes...that are relevant to planning\
    \ for future rise. Global mean sea level (GMSL) changes since the Middle Eocene\
    \ (ca. 48 million years ago [Ma]) have been primarily driven by ice volume changes\
    \ paced on astronomical timescales...modulated by changes in atmospheric CO2.\
    \ Sea level reached its lowest point (~130 m below present) during the Last Glacial\
    \ Maximum (ca. 27\u201320 thousand years before 1950 [ka]), episodically rose\
    \ during the deglaciation (ca. 20\u201311 ka) at rates that at times were in excess\
    \ of 47 mm yr\u20131 (vs. modern rates of 3.2 mm yr \u20131 ). Recent advances\
    \ in data, imaging, and modeling provide fresh constraints and new insights into\
    \ timing, amplitudes, and rates of ancient sea level changes (Table 1). In this\
    \ overview, we briefly discuss the history of the timing, rates, and causes of\
    \ sea level changes (Figures 1\u20133) during the last 66 million years. Under\
    \ higher emissions scenarios, twenty-first century GMSL will rise greater than\
    \ 2 m, and in the long term, tens of meters cannot be excluded."
  3: '

    '
  8: "Sea level reached its highest points of the last 780 kyr in MIS 11 (9\xB13 m,\
    \ ~405 kyr) and MIS 5 (7.5\xB11.5 m above present, ca 125 kyr), with global mean\
    \ temperatures about 1\xB0C warmer than 1850 (Dutton et al., 2015). The modern\
    \ rise is not a remnant of deglaciation but rather due to anthropogenic warming.\
    \ The modern period of GMSL rise began in the late nineteenth century, and the\
    \ rate of rise over the twentieth century was the fastest in at least 3,000 years\
    \ (Kopp et al. 2016; Kemp et al., 2018). The acceleration of sea level rise continued\
    \ in the late twentieth and early twenty-first centuries. Statistical analysis\
    \ of satellite and tide gauge records by Dangendorf et al. (2019) shows a 1.6\
    \ \xB1 0.4 mm yr\u20131 of sea level rise between 1900 and 2015, with the current\
    \ acceleration beginning in the late 1960s. The rate of sea level rise increased\
    \ from 2.1 \xB1 0.1 mm yr\u20131 to 3.4 \xB1 0.3 mm yr\u20131 from 1993 to 2015\
    \ (Dangendorf et al., 2017). Using nearly 30 years of satellite data, a simple\
    \ regression model captures the late twentieth to twenty-first century acceleration\
    \ of sea level rise. GMSL today is driven primarily by ocean warming (~40%) and\
    \ the melting of ice sheets (~30%) and mountain glaciers (~20%) (Church et al.,\
    \ 2013; WCRP Global Sea Level Budget Group, 2018). Though future sea level rise\
    \ remains a subject of conjecture dependent on future emissions pathways, certain\
    \ limits can be placed on sea level rise during the twenty-first century and beyond."
