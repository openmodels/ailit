  2: 'yaml

    Methodology: "It is supported by non-site/species-specific models trained on data
    obtained from a multiparametric probe mounted on a water column profiler instead
    of relying solely on surface measurements, allowing for the monitoring of vertical
    distribution patterns and their temporal variability."

    Highlights: "The main aim of this paper is to propose an effective EWS for forecasting
    cyanobacterial blooms which overcomes the limitations of existing models. As previously
    mentioned, current forecasting models are often site/species-specific, rely on
    incomplete surface measurements, and primarily use CHLA as a proxy, which may
    not accurately represent cyanobacterial concentrations."

