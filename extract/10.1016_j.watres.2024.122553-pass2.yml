  9: "markdown\nIn this paper an effective alert system is proposed to forecast PC\
    \ concentrations between 4 and 28 days in advance. The autoregressive and multivariate\
    \ LR (LR-ar, LR-multi), RF (RF-ar, RF-multi), and LSTM neural network (LSTM-ar,\
    \ LSTM-multi). MSE generally increases with the forecasting horizon for most models.\
    \ As the forecasting horizon increases, R\xB2 decreases for most models, indicating\
    \ a reduction in explanatory power. MAPE generally increases as the forecasting\
    \ horizon extends, suggesting reduced accuracy. Skill (%) generally decreases\
    \ with longer forecasting horizons, reflecting diminishing forecast skill. Most\
    \ models show a decline in accuracy as the forecasting horizon increases. A similar\
    \ declining trend is observed with increasing days. The F1 Score decreases over\
    \ time for all models.\n"
  10: 'Source material:


    Evaluation overview: Forecasting PC concentration has great potential to enable
    timely action to minimize the impacts derived from cyanobacterial blooms.


    Drivers of Risk: These results support the hypothesis that the temperature throughout
    the water column is influenced by other variables that may affect cyanobacterial
    bloom development...Thus, TEMP may serve as an integrative variable that encapsulates
    the influence of various factors relevant to cyanobacterial bloom development,
    improving the forecasting capability of models.


    Quantitative material: Its performance is especially noteworthy in terms of the
    skill metric, the forecasting specific metric introduced in this paper, achieving
    almost a 25 % positive skill for the longest horizons, while none of the other
    models achieved even marginal positive skill.


    Methodology: In this paper, a hybrid evaluation system that combines regression
    and classification metrics with a critical discussion of the forecasts at different
    forecasting horizons was proposed. Testing different forecasting horizons assisted
    to clearly identify the perfor- mance, strength and weakness of each model as
    these became more prominent at extended forecasting horizons.


    Highlights: Starting with the 16th day mark, the multivariate LSTM model outperformed
    the rest of the studied models in all studied metrics. Its performance is especially
    noteworthy in terms of the skill metric...On the other hand, the LSTM model demonstrated
    high accuracy and robustness, but this performance came at the cost of high sensitivity
    to changes in its configuration.


    More Notes: Regarding model performances, LR models had the best results in terms
    of the studied metrics for short forecasting horizons until the 16th day mark...Some
    of these limitations could be counteracted by combining fluorometric readings
    of PC profilers with other tools such as remote sensing via satellites or drones
    providing surface spatial information...

    '
  11: 'Source material here: "Thus, six different models were proposed and studied
    including the autoregressive and multivariate versions of LR, RF, and the LSTM
    neural network. To ensure comparability, all of them had access to the same data
    set, but for each of them, optimal configurations were chosen in terms of input
    and parameters considered... LSTM model provided outstanding results when using
    PC and TEMP variables as inputs showing consistent results across all forecasting
    horizons, achieving an R-squared greater than 0.6 for PC concentration prediction,
    accuracies up to 0.9 for the alarm level prediction, and positive skills up to
    25% for the longest horizons."'
