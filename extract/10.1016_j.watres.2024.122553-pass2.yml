  4: 'C. Fournier et al. Water Research 267 (2024) 122553: "The autoregressive and
    multivariate versions of three types of time series forecasting models, ranging
    from classic to state-of-the-art models, were selected and compared in terms of
    interpretability and performance." "Each time series was divided into two identical
    portions (50/50, before and after the 1st of January 2013) in order to construct
    the training and test datasets." "A scaling encoder was applied to normalize all
    variables (scaled between 0 and 1), and randomness was set to 42 to ensure reproducibility
    across experiments." "Ultimately, spline interpolation was used for all parameters,
    except for CHLA which was interpolated linearly." "The main difference is the
    presence of loops within layers, so past information can be used for the inference
    of new one, providing capability to store information for higher numbers of time
    steps." '
  5: "\nEvaluation overview: \"Beyond the general fit of the predictions, this inspection\
    \ focused on the fit to the PC concentration peaks...Thus, the visual inspection\
    \ considered how well the magnitude, timing, and shape of the relevant peaks (blooms\
    \ in the context of this paper) were predicted in the time series forecasts.\"\
    \nDrivers of Risk: \"Acknowledging the qualitative nature inherent in the interpretation\
    \ of PC fluorescence measures and given their sensitivity to factors such as environmental\
    \ interferences and fluorescence measurement limitations (Bertone et al., 2018),\
    \ this selection supposes a rational and relatively flexible threshold within\
    \ a conservative alert level.\"\nQuantitative material: \"PC exhibited a skewed\
    \ right distribution, with an average of 5.5 \u03BC g/L, few maximum values exceeding\
    \ 50 \u03BC g/L, and occasional values over 20 and 40 \u03BC g/L. PC levels above\
    \ 10 \u03BC g/L were identified as extreme values, being 3.2 and 5\"\nMethodology:\
    \ \"Performance was evaluated in a two-step approach...Afterwards, the regression\
    \ and classification metrics, presented in the following subsections, were computed...The\
    \ evaluation was conducted using a rolling forecast approach (Liu et al., 2021)\
    \ where both past and present observations, along with the forecasting horizon,\
    \ were considered within a moving window to make predictions for the following\
    \ period.\"\n"
  6: "yaml\nDrivers of Risk: \"CHLA and PC levels tended to experience abrupt increases\
