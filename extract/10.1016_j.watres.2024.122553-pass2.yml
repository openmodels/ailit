Drivers of Risk:
  1: Anthropogenic activities and global warming enhance cyanobacterial blooms.
  3: TEMP (water temperature) is identified as a key variable influencing cyanobacterial
    blooms, integrating effects of other factors like residence time and precipitation.
  5: The analysis considers how environmental factors and interferences influence
    the performance of fluorescence measures for alert systems.
  6: Cyanobacteria blooming events associated with temperature increases during spring
    and autumn months.
  7: Temperature (TEMP), Chlorophyll a (CHLA), and Phycocyanin (PC) levels are drivers
    of risk.
  8: The study examines the impact of different forecasting horizons (4, 12, 20, and
    28 days ahead) on the accuracy of predicting PC levels, which are relevant to
    water quality.
  10: Temperature (TEMP) is highlighted as a key factor influencing cyanobacterial
    bloom development due to its integration of various environmental influences.
Evaluation overview:
  1: Threats to ecosystem function and water quality, especially when toxin-producing
    strains predominate.
  3: No relevant information
  5: The paper evaluates the performance of forecasting models predicting PC (phycocyanin)
    concentration peaks, considering the magnitude, timing, and shape of these peaks.
  7: No relevant information
  8: This study evaluates the accuracy of different forecasting models in predicting
    Phycocyanin (PC) levels in water.
  9: The paper evaluates the performance of forecasting models for predicting PC concentrations
    and alarm levels over a forecasting horizon of 4 to 28 days.
  10: The paper evaluates the performance of models in forecasting cyanobacterial
    blooms.
Highlights:
  1: The multivariate version of LSTM showed the best and most consistent results
    across all forecasting horizons and metrics.
  2: The paper proposes an effective early warning system (EWS) for forecasting cyanobacterial
    blooms, which addresses the limitations of current models related to site/species
    specificity, incomplete surface measurements, and reliance on chlorophyll-a as
    a proxy.
  3: Multiple cyanobacterial blooms were observed during the 6 years of sampling,
    mainly in September and October, with notable blooms in October 2010 and October
    2013 dominated by potentially toxic genera like Dolichospermum, Aphanizomenon,
    and Microcystis.
  7: The multivariate LSTM model demonstrated consistency, with stable MSE and MAPE
    across forecasting horizons, indicating robust behavior. The LSTM model with exogenous
    variables achieved a maximum of 25% skill respect to the displaced signal.
  8: The multivariate LSTM model demonstrated the highest accuracy in predicting PC
    levels across all forecasting horizons. Prediction accuracy generally decreases
    as the forecasting horizon increases.
  9: "The performance of models decreases as the forecasting horizon increases, with\
    \ increases in MSE and MAPE, and decreases in R\xB2 and Skill (%). Similarly,\
    \ for alarm predictions, accuracy, Cohen's Kappa, and F1 Score all decrease over\
    \ time."
  10: LSTM models show high accuracy and robustness for extended forecasting horizons,
    despite high sensitivity to configuration changes.
  11: LSTM models provided the best performance for longer forecasting horizons, showing
    outstanding results with PC and TEMP variables as inputs.
Methodology:
  1: An effective Early Warning System (EWS) for cyanobacterial bloom forecasting,
    which uses 6 years of incomplete high-frequency spatio-temporal data from multiparametric
    probes, including phycocyanin (PC) fluorescence. Six different non-site/species-specific
    predictive models were compared including the autoregressive and multivariate
    versionsof Linear Regression, RandomForest, and Long-TermShort-Term (LSTM) neural
    networks. Results were analyzed for seven forecasting time horizons ranging from
    4 to 28 days evaluated with a hybrid system.
  2: The analysis is performed using non-site/species-specific models trained on data
    from a multiparametric probe mounted on a water column profiler, which enhances
    the inclusion of vertical distribution data and temporal variability.
  3: The study uses descriptive statistics, Spearman correlations, and time series
    analysis to explore relationships between parameters and spatio-temporal patterns
    of cyanobacterial blooms.
  4: LSTM networks are used to capture complex temporal dependencies and long-term
    patterns in cyanobacterial blooms.
  5: The analysis involved regression metrics to evaluate models with a visual inspection
    and computed metrics like MSE, R2, MAPE, SS, Acc, F1, and Kappa; results are derived
    from rolling forecasts with a moving window approach.
  6: Temporal granularity set to a 4-day interval for generating cyanobacterial bloom
    forecasting time series, considering the maximum and mean values within each interval
    over the entire water column.
  7: "Autoregressive (LR, RF, LSTM) and multivariate models were used to predict PC\
    \ levels over different forecasting horizons (4\u201316 days). The performance\
    \ of the models was evaluated using regression metrics (MSE, MAPE, R2) and classification\
    \ metrics (accuracy) for predicting alarm levels of PC values. Time series of\
    \ integrated values were excluded from the subsequent analysis."
  8: The study uses autoregressive and multivariate Linear Regression (LR), Random
    Forest (RF), and LSTM neural network models to predict PC levels at different
    forecasting horizons. The models' performance is evaluated using metrics like
    F1 score and Kappa.
  9: The analysis uses different regression and classification models, including autoregressive
    and multivariate linear regression, random forest, and LSTM neural networks, to
    predict PC concentrations and alarm level predictions.
  10: The study uses regression and classification metrics, explores input time limits,
    and tests different forecasting horizons to evaluate performance of models including
    LR, RF, and LSTM.
  11: Six different models, including autoregressive and multivariate versions of
    LR, RF, and LSTM neural networks, are utilized for forecasting using the same
    data set with optimal configurations.
  12: The paper mentions various modeling approaches such as ARIMA, Random Forest,
    LSTM, and machine learning-based chlorophyll soft-sensors for predicting cyanobacterial
    blooms.
More Notes:
  1: The study proposes a probe agnostic and replicable method to pre-process the
    data and to generate time series specific for cyanobacterial bloom forecasting.
  3: The study focuses on developing an automated and replicable method for forecasting
    cyanobacterial blooms using data from probes in reservoirs.
  7: The LR model's functionality was more reactive than predictive. RF model performance
    improved when incorporating exogenous covariates like CHLA and TEMP. The models'
    capability to outperform the replication of the last observed value increased
    as the forecasting horizon extended.
  8: "The alert limit for Phycocyanin (PC) is 10 \u03BCg/L."
  10: LR models perform best for short horizons, but decline after 16 days. Combining
    fluorometric readings with remote sensing is proposed to counter data limitations.
Quantitative material:
  1: "LSTM achieved accuracies of up to 90% in predicting the proposed PC alarm level\
    \ (10\xB5gPC/L)."
  3: No relevant information
  5: "The average PC concentration observed was 5.5 \u03BCg/L with maximum observed\
    \ values exceeding 50 \u03BCg/L, and PC levels above 10 \u03BCg/L are identified\
    \ as extreme values."
  6: "CHLA average of 3.4 \u03BCg/L and maximum values above 30 \u03BCg/L; TEMP mean\
    \ of 12 \xBAC with minimum and maximum around 1 \xBAC and 25 \xBAC respectively."
  7: "Spearman correlation coefficients between integrated and maximum time series\
    \ range from 0.5 to 0.9. Overall accuracy of predictions ranged between 0.7 and\
    \ 0.9 for alarm predictions of PC values exceeding 10 \u03BCg/L."
  8: The multivariate version of LSTM was able to maintain accuracies around 90 %
    for all horizons. The multivariate version of all models maintained accuracies
    close to and above 80 %, even at long forecasting horizons.
  10: The skill metric introduced shows the LSTM model achieving almost 25% positive
    skill for the longest forecasting horizons.
  11: LSTM models achieved an R-squared greater than 0.6 for PC concentration prediction
    and accuracies up to 0.9 for alarm level prediction.
