  1: null
  2: "This paper develops a large-scale, multi-region, overlapping generations (OLG)\
    \ model to study climate change\u2019s cumulative damage to global and regional\
    \ output as well as carbon taxation\u2019s mitigation potential. Our equations\
    \ connect carbon emissions to atmospheric carbon concentration and, thereby, mean\
    \ global temperature in accordance with the latest climate science and projections.\
    \ For our high-damage calibration, an initial $87.5 carbon tax rising annually\
    \ at a 1.4 percent coupled with appropriate cohort- and region-specific transfers\
    \ limits global damages in 2100 by 38 percent. This paper develops a large-scale,\
    \ multi-region, overlapping generations (OLG) model to study climate change. Our\
    \ model features 18 regions inhabited by 80 overlapping generations. Each region\u2019\
    s demographic conditions and projections are closely calibrated to UN data. In\
    \ short, absent policy, climate change will, in general, materially undermine\
    \ economic growth, but do so differentially by region. Yet, carbon taxation, coupled\
    \ with the appropriate interregional and intergenerational redistribution, can\
    \ substantially limit the damage while making everyone, across space and time,\
    \ equally better off. We implement this policy for a range of damage functions,\
    \ but focus on a worst-case scenario."
  3: "Source material here.\nEvaluation overview: \"GDP level\": \"However, the remaining\
    \ 16 regions suffer, with India, the South Asian Pacific, Sub-Saharan Africa,\
    \ the Middle East and North Africa being hit the worst. Relative to a world with\
    \ no carbon-based damage, climate change lowers their 2100 GDP levels by 38.6,\
    \ 33.4, 33.0, and 30.9 percent, respectively.\" \"Consumption\": \"How large is\
    \ the optimal UWI gain? It is 4.3 percent, measured as a consumption compensating\
    \ variation. Thus, implementing UWI policy is equivalent to increasing the annual\
    \ consumption of each cohort, whether already born or yet to be born, by 4.3 percent\
    \ under BAU.\" \"Temperature increases\": \"PreviewofFindings. In our high-damage\
    \ baseline scenario, the increase in the planet\u2019s mean surface temperature\
    \ through 2100, absent policy, is approximately 3.1 degrees Celsius.\" \"Use of\
    \ dirty energy\": \"In our BAU scenario, dirty energy lasts through 2217 years.\
    \ In contrast, optimal UWI policy ends all dirty energy usage by 2103 and dramatically\
    \ reduces cumulative (2017 through fossil fuel\u2019s end date) oil, gas, and\
    \ coal consumption by 84.4 percent, 86.2 percent, and 98.1 percent, respectively.\"\
    \nDrivers of Risk: \"Drivers of Risk\": \"Our study also handles key feedbacks,\
    \ including the relationship between global and region-specific temperatures,\
    \ the impact of region-specific temperatures on region-specific damages, the impact\
    \ of region-specific damages on region-specific production, the impact of changing\
    \ region-specific production on region-specific emissions, and the sum of regional\
    \ emissions determining global emissions and, thus, global temperature.\"\nQuantitative\
    \ material: \"Quantitative information\": \"The rise in the global mean surface\
    \ temperature is limited to 2.1 degrees Celsius. Moreover, the peak global GDP\
    \ loss declines from 16.7 percent to 9.3 percent. Peak regional damages now range\
    \ from 0.5 percent to 27.8 percent of GDP compared with the range from 2.1 percent\
    \ to 43.9 under BAU. Optimal UWI gain is 4.3 percent, measured as a consumption\
    \ compensating variation. The largest positive net transfers, around 15 percent\
    \ of annual and, thus, lifetime consumption, are made to current and near-term\
    \ generations in three regions that will experience long-term negative consequences\
    \ from global warming.\"\nMethodology: \"Methodology\": \"Our study builds what\
    \ we believe is the first large-scale OLG integrated assessment model (IAM) with\
    \ region-specific emissions and damages. As in Krusell and Smith(2022) and several\
    \ other recent studies, our model determines region-specific temperatures \u2013\
    \ required to derive region-specific damages \u2013 based on a climate-science\
    \ technique called \u2018\u2018pattern scaling\u2019\u2019. The latter method\
    \ can be used to compute the local temperature at grid resolutions as fine as\
    \ 1-degree latitude by 1-degree longitude, given the global average temperature.\
    \ Our study also handles key feedbacks, including the relationship between global\
    \ and region-specific temperatures, the impact of region-specific temperatures\
    \ on region-specific damages, the impact of region-specific damages on region-specific\
    \ production, the impact of changing region-specific production on region-specific\
    \ emissions, and the sum of regional emissions determining global emissions and,\
    \ thus, global temperature. In determining region-specific damages, we rely on\
    \ Krusell and Smith(2022)\u2019s damage function (albeit based on our calibration),\
    \ which admits negative as well as positive damages while delivering approximately\
    \ the same aggregate damages as the DICE2016 (henceforth, simply DICE) model (Nordhaus,\
    \ 2017). Finally, we use Folini et al.(2024)\u2019s recent study that employs\
    \ state-of-the-art climate modeling to re-calibrate Nordhaus\u2019 DICE functions\
    \ governing the relationships between global emissions, carbon concentration,\
    \ and global mean temperature.\"\nHighlights: \"Highlights\": \"The striking messages\
    \ here are both encouraging \u2013 global carbon taxation can significantly mitigate\
    \ losses from climate change \u2013 and discouraging \u2014 atmospheric carbon\
    \ concentration is already so high that the optimal UWI carbon tax policy can\
    \ only limit peak global damages by 44.3 percent. How large is the optimal UWI\
    \ gain? It is 4.3 percent, measured as a consumption compensating variation. Thus,\
    \ implementing UWI policy is equivalent to increasing the annual consumption of\
    \ each cohort, whether already born or yet to be born, by 4.3 percent under BAU.\
    \ Implementing UWI policy requires substantial inter-generational and inter-regional\
    \ net transfers.\"\nMore Notes: \"More Notes\": \"As indicated, our model\u2019\
    s UWI policy has two components. First, it taxes carbon emissions at time-varying\
    \ rates equal to year \U0001D461\u2019s social cost of carbon (SCC)\u2013the present\
    \ value of the future global cost of an extra current ton of emissions produced\
    \ in \U0001D461. Second, it lump-sum redistributes (compensates) on a generation-\
    \ and region-specific basis to ensure that all cohorts in all regions experience\
    \ an identical welfare gain.\"\n"
