    \ on the so-called Global Gaidar Model (GGM; cf. Benzell et al. (2017)), but is\
    \ substantially extended by coupling it to a climate emulator (cf. Section 3.4)\
    \ and by adding an extra region. Table 1 lists the model\u2019s 18 regions and\
    \ their acronyms, and Fig. 1 displays them on a map of the globe. The World Bank\u2019\
    s Development Indicators (WDI) is a primary data source, providing, in particular,\
    \ 2017 GDP values. These are used to calibrate the 2017 levels of regional TFP.\
    \ Energy consumption/usage data come from the US Energy Information Administration\
    \ (EIA).\n"
