  28: "Source material here. Climate policy is generally viewed as a zero-sum game\
    \ pitting the future against current generations and regions that benefit from\
    \ climate change against regions that do not. Our study suggests that, absent\
    \ policy, potential losses to future generations are substantial. Indeed, absent\
    \ policy, climate change produces peak GDP regional losses under our \u2018\u2018\
    high damage scenario\u2019\u2019, ranging as high as 43.9 percent in the case\
    \ of India. They exceed 30 percent for SSA, SLA, MENA, BRA, and SAP. For the US,\
    \ losses peak at 17.1 percent. In contrast, for Russia and Canada, climate change\
    \ is good news. Under BAU, Russia\u2019s and Canada\u2019s peak output gains are\
    \ 3.9 percent and 2.6 percent, respectively. Fortunately, there is a simple, mutually\
    \ beneficial solution to this seemingly insurmountable problem. We show that a\
    \ compensatory carbon tax policy can achieve a win-win for all cohorts regardless\
    \ of their place or time of birth. Indeed, carbon taxation coupled with region-\
    \ and generation-specific positive or negative transfers can achieve a uniform\
    \ welfare gain, that is, an identical percentage improvement in economic well-being\
    \ for all. Our optimal UWI gain is 4.3 percent, measured as a consumption equivalent.\
    \ This policy is effected by (a) levying an annual global carbon tax equal to\
    \ the contemporaneous SCC, (b) making transfers to cohorts that would otherwise\
    \ gain less than 4.3 percent, and (c) taxing cohorts that would otherwise gain\
    \ more than 4.3 percent. For our high-damage case, the UWIL carbon tax starts\
    \ at $ 91.4 per ton of CO2, rising, in real terms, at roughly 1.5 percent per\
    \ year. This policy dramatically reduces global and region-specific climate damage.\
    \ It also materially shortens the duration of fossil fuel usage by approximately\
    \ 130 years. Rather than increasing by as much as 3.7 degrees Celsius under BAU,\
    \ the peak temperature rise under UWIL policy is 2.1 degrees. Peak global damages\
    \ under UWIL are 9.2 percent of the planet\u2019s GDP. Our optimal path of carbon\
    \ taxation, as well as the associated UWI gain, is little affected by assuming\
    \ less than perfect substitutability in the short- and medium-term of clean for\
    \ dirty energy."
