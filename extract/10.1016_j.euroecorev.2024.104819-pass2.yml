  33: 'Source material: The page contains a table titled "Social cost of carbon, $
    per ton of CO2, part 2," showing model-derived estimates of the social cost of
    carbon under different CO2 emissions scenarios (1x, 2x, 4x, 6x) under Business
    As Usual (BAU) and Uncertainty Weighted Integration (UWI) conditions, across various
    years (2017, 2025, 2050, 2100) for different regions (BRA, MEX, SAF, MENA, SLA,
    SSA, SOV, GBR, ANZ) and globally. The table indicates that the social cost of
    carbon increases over time and with higher CO2 emissions scenarios, with global
    values ranging from $22.41 to $118.62 in 2100 under the 1x scenarios and $182.00
    to $490.15 under the 6x scenarios, although it does not describe the underlying
    model. Regional impacts vary significantly, suggesting differences in potential
    local effects of carbon emissions. The UWI scenarios generally predict lower social
    costs compared to the BAU scenarios, suggesting different methodological approaches
    or assumptions.'
  34: "Source material here: \u2022  Step 3.1: Guess the time path of the optimal\
    \ carbon tax based on the time path of the SCC (social costs of carbon) in the\
    \ BAU scenario. \u2022  Step 3.2: For a given tax path, find the LSRA solution\
    \ (Steps 2.1\u20132.4). \u2022  Step 3.3: Calculate the new equilibrium SCC path.\
    \ Update the guessed path of the optimal carbon tax based on the new SCC path.\
    \ \u2022  Step 3.4: Iterate 3.2\u20133.3 until convergence."
  35: "Source: Fig. 15. Gas consumption ( \U0001D466-axis) in the 6x damage specification\
    \ (measured in quad Btu) as a function of years and our different policies; year\
    \ 0 on the \U0001D465-axis is 2017."
