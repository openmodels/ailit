Drivers of Risk:
  1: Absent policy, climate change may dramatically reduce GDP in most regions, with
    India, Brazil, and the South Asian Pacific suffering long-term catastrophic damages.
  2: The model connects carbon emissions to atmospheric carbon concentration and,
    thereby, mean global temperature.
  3: Region-specific temperatures impacting region-specific damages, region-specific
    damages impacting region-specific production, region-specific production impacting
    region-specific emissions, and the sum of regional emissions determining global
    emissions and, thus, global temperature.
  4: The use and taxation of fossil fuels and the availability of coal reserves are
    identified as drivers impacting the outcomes.
  5: Mentions global temperature rise impacting GDP declines for the U.S. and China
    through reduced TFP.
  6: No relevant information
  7: "Consumption of oil (\U0001D442\U0001D467,\U0001D461), gas (\U0001D43A\U0001D467\
    ,\U0001D461), and coal (\uE22F\U0001D467,\U0001D461); prices of oil (\U0001D45D\
    \U0001D442\U0001D461), gas (\U0001D45D\U0001D43A\U0001D461), and coal (\U0001D45D\
    \uE22F\U0001D461); cost of extracting dirty energy (\U0001D450\U0001D440\U0001D461\
    \ (\U0001D445\U0001D440\U0001D461 ))"
  9: The paper models climate change driven by carbon emissions (including land-based
    emissions) and radiative forcing. CO2 concentrations in the atmosphere, upper
    ocean, and lower ocean are key drivers. Global mean temperature change of the
    upper and lower atmosphere are also modeled.
  10: Changes in regional temperatures relative to an optimal temperature (T*) impact
    TFP, with cold regions potentially benefiting and hot regions being harmed as
    temperatures deviate from T*.
  12: No explicit shocks or changes impacting outcomes are discussed on this page.
  13: Regional productivity growth rates, regional temperature
  14: Global mean temperature increases relative to pre-industrial levels, regional
    temperature changes
  15: Damage scenarios based on multiples (1x, 2x, 4x, 6x) of a damage function, with
    associated maximal global temperature rises.
  16: Carbon emissions and the implementation of carbon taxes are the primary changes
    impacting global and regional damages.
  19: The potential impact of carbon emissions on global temperature rise and regional
    climate damages is a key driver of risk.
  20: The figure shows total CO2 emissions as a function of years under different
    policies.
  22: Reduction in the consumption of fossil fuels due to substantial carbon taxes.
  23: Climate change absent mitigation.
  24: 6x damage scenario (unspecified what is being multiplied by 6)
  27: The analysis considers the economic effects of imposing carbon taxes and how
    delayed policy implementation impacts emissions.
  28: The primary driver of risk identified is climate change, affecting output and
    welfare differentially across regions.
  32: extraction of oil, gas, and coal
  33: Different CO2 emissions scenarios (1x, 2x, 4x, 6x) under Business As Usual (BAU)
    and Uncertainty Weighted Integration (UWI) conditions, across various years (2017,
    2025, 2050, 2100).
Evaluation overview:
  1: Climate change will impact current and future generations in different regions
    very differently.
  2: The paper evaluates climate change's cumulative damage to global and regional
    output, as well as carbon taxation's mitigation potential.
  3: GDP levels, consumption, temperature increases, use of dirty energy
  4: The outcome being evaluated includes the impact of carbon taxation on future
    generations' net taxes, energy costs, and regional GDP shares.
  5: No specific overview of outcomes like mortality or productivity loss is provided.
  6: No relevant information
  7: No relevant information
  9: No relevant information
  10: The paper evaluates the impact of regional temperature changes on Total Factor
    Productivity (TFP) as a measure of climate damages.
  12: The page does not provide an overview of specific outcomes like mortality or
    productivity loss but focuses on energy consumption as a share of GDP.
  13: "Convergence of non-US regions\u2019 productivity Relative to US Productivity."
  14: Productivity loss/gain, measured as percentage of GDP
  15: Peak Business-As-Usual (BAU) losses and gains as a percentage of GDP per region,
    examining the economic impact of climate change.
  16: The paper evaluates carbon policies and their impact on global and regional
    damages, carbon taxes, and welfare gains.
  18: The analysis focuses on welfare gains for future generations in different regions.
  19: The paper evaluates the impact of UWIL and UWIF carbon tax policies on emissions,
    temperature rise, and climate damages across regions.
  20: No relevant information
  21: Welfare gains, measured as compensating consumption differentials in percentages.
  23: Regional damages measured as a percent of regional GDP.
  24: Regional GDP as a share of world GDP.
  26: The small impact of a large regional tax on emissions and warming indicates
    the challenges of partial participation in addressing climate impacts.
  27: The paper evaluates welfare gains for various coalitions imposing carbon taxes
    and explores the economic effects and emissions outcomes.
  28: The paper evaluates regional GDP losses due to climate change, highlighting
    peak losses under a 'high damage scenario'.
  31: Projected population of specified age groups
  32: global damages as a share of global GDP (measured in %)
  33: Social cost of carbon, measured in $ per ton of CO2.
  35: Gas consumption measured in quad Btu
Highlights:
  1: Carbon taxation and redistribution can correct the carbon externality and raise
    welfare, but uniform welfare gains require high compensatory payments for future
    generations.
  2: Absent policy, climate change will, in general, materially undermine economic
    growth, but do so differentially by region. Yet, carbon taxation, coupled with
    the appropriate interregional and intergenerational redistribution, can substantially
    limit the damage while making everyone, across space and time, equally better
    off.
  3: Global carbon taxation can significantly mitigate losses from climate change.
    Atmospheric carbon concentration is already so high that the optimal UWI carbon
    tax policy can only limit peak global damages by 44.3 percent. Implementing UWI
    policy is equivalent to increasing the annual consumption of each cohort, whether
    already born or yet to be born, by 4.3 percent under BAU. Implementing UWI policy
    requires substantial inter-generational and inter-regional net transfers.
  4: Important outcomes include the critical need for China's participation in carbon
    policy for effective climate change mitigation and the finding that carbon taxation
    does not materially affect the long-term global GDP shares of major economies
    like the U.S. and China.
  5: Labor-productivity catch-up growth is a dominant growth driver with or without
    climate damage.
  6: No relevant information
  7: When the cost of producing dirty energy exceeds the cost of producing clean energy,
    there is no demand for dirty energy and fossil fuel use ends. Extraction costs
    approach infinity as reserves approach zero.
  9: The model simulates the carbon cycle through three reservoirs, links emissions
    to carbon concentration and radiative forcing, and ultimately global and regional
    temperature changes.
  10: Regions have varying impacts from temperature changes; cold regions may benefit
    and hot regions may incur damages based on their deviation from the optimal temperature,
    T*.
  12: China is identified as a major consumer of fossil fuels with significant coal
    dependency, followed by the US and Western Europe; China's carbon emissions are
    notably higher relative to its GDP compared to the US and WEU.
  13: Table 4 presents productivity rates relative to the US productivity growth rate.
  14: Absent carbon policy, the planet's average temperature will rise by 3.7 to 4.4
    degrees Celsius over the next 200 years. Lower damages can lead to higher GDP
    and, thus, higher emissions. Damages can be extraordinarily large for the world
    as a whole, but particularly for specific regions (e.g., India). Russia and Canada
    may experience gains from climate change.
  15: Global peak GDP loss in the 6x case reaches close to 17 percent. Some regions
    experience extreme damages far larger than in the 1x case, even though emissions
    and temperature increases are lower in the 6x case.
  16: Carbon taxation substantially reduces maximal global and regional damages, achieving
    welfare gains for all humanity under the UWI policy.
  17: UWIL policy caps net taxes on future generations at 10%, leading to uniform
    welfare gains.
  18: There are large welfare gains for future generations, with future Indians experiencing
    significant peaks.
  19: Key outcomes include substantial reduction in emissions, maintaining temperature
    rise near the 2.0-degree limit per the Paris Agreement, and significant reduction
    in climate damages across most regions, with some regions like China and the US
    experiencing up to 50% damage reduction.
  20: The figure shows the impact of different policies on total CO2 emissions over
    time.
  22: Carbon taxes have significant economic implications and can require compensating
    current generations to prevent welfare losses.
  23: Under the UWI policy, future generations in regions like India, which are heavily
    impacted by climate change, may be required to transfer a significant portion
    of their consumption to service carbon-policy debt. This may appear unfair as
    poorer regions effectively subsidize richer regions that caused the externality.
    The analysis focuses on regional damage and intergenerational equity.
  24: China is projected to eclipse the US economically with or without a carbon policy.
    India stands to lose the most from climate change, but carbon policy has a significant
    impact on its share of global GDP.
  26: The regional SCC is significant only in China and the US, despite large projected
    damages in regions like India and Brazil.
  27: Carbon taxation needs to be global to be effective; delayed implementation reduces
    welfare gains and increases emissions, while local SCC-based tax coalitions can
    also produce welfare gains.
  28: The paper suggests a compensatory carbon tax policy that could achieve a uniform
    welfare improvement for all regions and generations.
  29: The indexes show that China has significantly higher energy consumption and
    CO2 emissions relative to its GDP compared to other regions listed.
  30: The social cost of carbon varies significantly across regions and increases
    over time, with the highest costs projected for future years under higher emissions
    scenarios.
  32: The paper compares global damages as a share of global GDP between two different
    models, DICE and Krusell-Smith.
  33: The social cost of carbon increases substantially over time and with higher
    CO2 emissions scenarios. The global social cost of carbon ranges from $22.41 to
    $118.62 per ton of CO2 in 2100 under the 1x emissions scenarios, and rises to
    $182.00 to $490.15 under the 6x scenarios.
Methodology:
  1: A large-scale, annually calibrated, multi-region, overlapping generations model
    with region-specific temperature and damage functions.
  2: "The paper develops a large-scale, multi-region, overlapping generations (OLG)\
    \ model to study climate change. The model features 18 regions inhabited by 80\
    \ overlapping generations. Each region\u2019s demographic conditions and projections\
    \ are closely calibrated to UN data."
  3: "Large-scale OLG integrated assessment model (IAM) with region-specific emissions\
    \ and damages. Model determines region-specific temperatures using \u2018\u2018\
    pattern scaling\u2019\u2019. It uses a damage function that admits negative as\
    \ well as positive damages while delivering approximately the same aggregate damages\
    \ as the DICE2016 model. The model also uses state-of-the-art climate modeling\
    \ to re-calibrate Nordhaus\u2019 DICE functions governing the relationships between\
    \ global emissions, carbon concentration, and global mean temperature."
  4: The analysis is performed using a model that assesses carbon taxation effects
    under different scenarios, including varying fossil fuel availabilities and substitutability
    between clean and dirty energy, and its applicability is tied to long-term carbon
    policy decisions.
  5: Analysis involves an OLG model considering labor-productivity catch-up growth
    and climate damage, with calibration similar to Krusell and Smith (2022).
  6: A dynamic economic assessment model is developed with region-specific technologies
    for producing output. A competitive equilibrium is defined and solved computationally,
    and a climate emulator is used in the computations. Firms maximize profits using
    capital, labor and energy to produce final output, and land, labor, and capital
    to produce clean energy.
  7: The paper presents a cost-minimization model of energy production and consumption.
    It formulates equations describing the demand for dirty energy sources, the price
    of dirty energy, and the interaction between clean and dirty energy. The model
    considers finite energy reserves and increasing extraction costs. It also models
    the maximization of market value by dirty energy firms. The results are applicable
    under the assumptions of the model.
  9: The paper uses a multi-region overlapping generations (OLG) model. It adopts
    the functional form of DICE (Nordhaus, 2017) but uses parameterization from Folini
    et al. (2024). Pattern scaling is used to infer regional temperatures from global
    temperatures.
  10: The analysis uses pattern scaling with the CCSM4 model under RCP8.5 to compute
    GDP-weighted regional average temperatures, and models regional TFP as a function
    of temperature deviations from an optimal temperature, T*.
  11: The analysis uses an 18-region OLG model coupled with a climate emulator, calibrated
    using data from the World Bank's Development Indicators and the US Energy Information
    Administration.
  12: The analysis normalizes the sum of energy share parameters and uses equations
    to calculate dirty-energy and clean-energy prices, consumption, and their contributions
    to GDP.
  13: "The authors rely on univariate, country-specific regressions provided by M\xFC\
    ller et al.(2019), aggregated to generate regional productivity growth rates,\
    \ and these differentials are applied through 2100. After 2100, productivity growth\
    \ in all regions equals the assumed fixed 1.56 percent US growth rate. Regional\
    \ damages follow Krusell and Smith(2022) in setting \U0001D447\u2217 = 11 .6 in\
    \ Eq.(43). "
  14: The paper uses a Krusell-Smith type productivity function calibrated with different
    damage scenarios (2x, 4x, 6x) to model the impact of temperature changes on productivity
    and GDP. It considers BAU (business as usual) scenarios and alternative carbon
    policies.
  15: The analysis uses a climate emulator calibrated according to the multi-model
    mean of CMIP5 simulations. The damage function is a key component, and different
    specifications lead to significantly different results. The study examines a BAU
    scenario projecting out 200 years.
  20: The figure presents results for the '6x damage specification'.
  21: The analysis considers different policies and their impact on welfare gains
    over time, starting from 2017. The x-axis references the year of birth for the
    6x damage specification.
  22: Analysis includes optimal carbon taxes illustrated in Fig. 5 and paths of net
    transfers in Fig. 4.
  24: The paper uses a model to project regional GDP shares under different carbon
    policy scenarios (BAU and Optimal) given a 6x damage scenario.
  27: The analysis models global coalitions imposing carbon taxes and assesses impacts
    on welfare and emissions under different damage scenarios.
  28: The analysis explores various policies like UWI, UWIF, and UWIL, incorporating
    the social cost of carbon (SCC) and redistributive taxation strategies to derive
    welfare outcomes.
  29: Uses a five-step algorithm to model economic dynamics, including solving a nonlinear
    system of equations to determine region-specific outputs and factor demands.
  32: "The authors use a model (Krusell\u2013Smith) and compare its global damages\
    \ as a share of global GDP with another model (DICE). They also solve the model\
    \ for a carbon tax path using a Lump-Sum Redistribution Authority (LSRA). The\
    \ process involves iterative steps to determine optimal global carbon tax rate\
    \ path numerically, adjusting parameters like Lambda (\u03BB) until the present\
    \ value of transfers approaches zero."
  33: The table presents model-derived estimates of the social cost of carbon under
    different CO2 emissions scenarios, but it does not describe the model itself.
    Results are applicable for the listed regions and years, conditional on the emissions
    scenarios.
  34: The analysis involves iterative steps to guess and update the time path of the
    optimal carbon tax based on the social costs of carbon (SCC) in a business-as-usual
    scenario, seeking convergence in equilibrium SCC path.
  35: Analysis uses a '6x damage specification'. Year 0 on the x-axis is 2017.
More Notes:
  2: The paper focuses on a 'worst-case scenario' for damage functions.
  3: "The UWI policy has two components. First, it taxes carbon emissions at time-varying\
    \ rates equal to year \U0001D461\u2019s social cost of carbon (SCC). Second, it\
    \ lump-sum redistributes (compensates) on a generation- and region-specific basis\
    \ to ensure that all cohorts in all regions experience an identical welfare gain."
  4: India and other regions likely hurt by climate change will lose some economic
    ground, irrespective of carbon policy, due to climate damages.
  5: The paper distinguishes itself by incorporating environmental damages outside
    of utility functions and explores transfers across generations affecting interest
    rates.
  6: The model includes finite-lived selfish agents, dirty energy and capital mobility.
    It focuses on Pareto efficiency.
  7: The parameter *u* represents the elasticity of substitution between different
    dirty energy sources. The model allows for gradual increase in the degree of clean
    and dirty energy substitutability. Dirty energy producers maximize market value
    subject to reserve constraints.
  12: The page discusses the region-specific contributions of energy to output and
    the striking variance in energy reliance across different regions.
  13: "The authors acknowledge the economic impact of climate change is a 'thorny\
    \ issue', noting that damages depend only on the product of the parameter \U0001D710\
    and \U0001D447\U0001D467\u2212\U0001D447\u2217, the regional temperatures in excess\
    \ of \U0001D447\u2217."
  14: "The damage scenarios are based on different values of the parameter \U0001D710\
    + , which affects the right side of the productivity function (i.e., losses from\
    \ global warming). The authors also consider several carbon policies with and\
    \ without welfare transfers between regions and generations."
  15: The BAU scenario shows that oil, gas, and coal production will definitively
    end worldwide in 200 years, though the timing varies by region (e.g., Brazil ends
    fossil fuel use in 2045, the US in 2105, and China in 2092). By 2100, China and
    India account for almost 40 percent of world GDP under the BAU scenario. The global
    interest rate falls to 2.9 percent by the end of the century under the BAU scenario
    from its initial 4.0 percent value.
  20: The policies compared are not specified on this page; the paper as a whole would
    need to be reviewed for this information.
  23: The '6x damage specification' is used, and the analysis starts in 2017 (year
    0).
  24: The paper acknowledges that the definition of the '6x damage scenario' is not
    given, and that the projections depend on assumptions about finite coal reserves
    and perfect substitutability between green and dirty energy.
  32: The analysis involves solving a system of 301 equations for 301 variables at
    each point in time. The model considers various factors such as regional productivity,
    land and labor supply, world capital supply, and reserves of oil, gas, and coal.
    The time frame for the analysis starts from 2017.
  33: Regional impacts vary significantly, with some regions experiencing a much higher
    social cost of carbon than others. UWI scenarios generally predict lower SCC than
    BAU scenarios.
Quantitative material:
  1: Region- and generation-specific transfers and carbon taxes can raise welfare
    by 4.3 percent, while a modified policy offers a 4.0 percent or higher welfare
    gain for all.
  2: An initial $87.5 carbon tax rising annually at 1.4 percent coupled with appropriate
    cohort- and region-specific transfers limits global damages in 2100 by 38 percent.
  3: "Under BAU, Sub-Saharan Africa will use dirty energy through the end of the next\
    \ century, whereas the US will stop much sooner. Increase in the planet\u2019\
    s mean surface temperature through 2100, absent policy, is approximately 3.1 degrees\
    \ Celsius. Canada and Russia whose GDP levels in 2100 are 2.5 percent and 3.6\
    \ percent higher, respectively, compared with no climate change. India, the South\
    \ Asian Pacific, Sub-Saharan Africa, the Middle East and North Africa being hit\
    \ the worst with climate change lowering their 2100 GDP levels by 38.6, 33.4,\
    \ 33.0, and 30.9 percent, respectively. Global GDP, its 2100 value is reduced\
    \ by 14.7 percent. In our BAU scenario, dirty energy lasts through 2217 years.\
    \ In contrast, optimal UWI policy ends all dirty energy usage by 2103 and dramatically\
    \ reduces cumulative (2017 through fossil fuel\u2019s end date) oil, gas, and\
    \ coal consumption by 84.4 percent, 86.2 percent, and 98.1 percent, respectively.\
    \ The rise in the global mean surface temperature is limited to 2.1 degrees Celsius.\
    \ Moreover, the peak global GDP loss declines from 16.7 percent to 9.3 percent.\
    \ Peak regional damages now range from 0.5 percent to 27.8 percent of GDP compared\
    \ with the range from 2.1 percent to 43.9 under BAU. Optimal UWI gain is 4.3 percent,\
    \ measured as a consumption compensating variation. The largest positive net transfers,\
    \ around 15 percent of annual and, thus, lifetime consumption, are made to current\
    \ and near-term generations in three regions that will experience long-term negative\
    \ consequences from global warming."
  4: Various quantitative impacts are reported, such as Indian generations facing
    40% net negative transfers, taxes equal to 15% of lifetime consumption for future
    U.S. generations, and a 35% reduction in the UWI gain if policy implementation
    is delayed by 20 years.
  5: No specific quantitative information such as percent changes are presented.
  6: No relevant information
  7: Equations for demand of oil (11), gas (12), coal (13), price of dirty energy
    composite (14), price of energy (15), and cost of extracting energy (19), and
    market value (20).
  9: "The paper presents equations for carbon cycle modeling (Eq. 37), land-based\
    \ carbon emissions (Eq. 38), radiative forcing (Eq. 39 and 40), and temperature\
    \ evolution (Eq. 41). It uses a 3x3 matrix of parameters (\u03A6J) for carbon\
    \ mass transfer and another matrix (\u03A6T) for temperature evolution."
  12: The page provides quantitative information on region-specific GDP and energy
    consumption in quad Btus, as well as energy consumption as a share of GDP.
  13: "Table 4 presents regional productivity growth rates relative to the US productivity\
    \ growth rate; for example, ANZ \u2212 0.11%, BRA 0.27%, CHI 2.54%. This continues\
    \ to 2100."
  14: Global mean temperature increases by 3.7 to 4.4 degrees Celsius over the next
    200 years under BAU. Global damages peak at almost 17% of world output in the
    6x damage scenario. India's damages reach over 40% of GDP by 2200 in the 6x damage
    scenario. US, China, and Japan/South Korea/Hong Kong damages exceed 16% of output
    by 2200 in the 6x damage scenario. Russia and Canada's climate gains peak above
    3.9% and 2.6% of GDP, respectively.
  15: Table 5 provides percentage of GDP losses/gains for different regions (US, WEU,
    JSHK, CHI, IND, RUS, CND, EEU, SAP, BRA, MEX, SAF, MENA, SLA, SSA, SOV, GBR, ANZ,
    GLOBAL) under 1x, 2x, 4x, and 6x damage scenarios. Max global temperature rise
    is also provided for each scenario.
  16: Initial carbon taxes range from $22.8 to $111.7 per ton CO2, and the UWI carbon
    policy leads to welfare gains of up to 4.3% for all generations in the 6x damage
    case.
  17: Max regional damages under BAU with the 6x damage specification are 2.9% of
    regional GDP, whereas they are 27.5% under UWIL policy.
  18: Welfare gains of 4.3 percent and 4.0 percent are noted for uniform and regional
    UWIL policies, respectively.
  19: Quantitative results include emissions reduction timelines and damages reduction,
    including examples like China's stop in fossil fuel use in 20 years versus 75
    years under Business As Usual (BAU), and up to 50% reduction in regional climate
    damage.
  20: The y-axis shows total CO2 emissions in GtCO2, and the x-axis shows years, with
    year 0 being 2017.
  21: Welfare gains are presented as percentages on the y-axis.
  23: Indians born in 200 years would be required under the UWI policy to surrender
    around 40 percent of their consumption to help service outstanding carbon-policy
    debt. Other regions with similarly large transfers include BRA, SAP, MENA, SLA,
    and SSA, whose future generations all need to transfer more than 20 percent of
    their consumption to other regions and generations.
  24: Table 7 provides quantitative projections of regional GDP as a share of world
    GDP for various regions (USA, WEU, JSHK, CHI, IND, RUS, CND, EEU, SAP, BRA, MEX,
    SAF, MENA, SLA, SSA, SOV, GBR, ANZ) under BAU and Optimal carbon policy scenarios
    for the years 2017, 2050, 2100, and 2150.
  26: The 2017 SCC for India is $10.58, for Brazil is $3.12, and the global SCC is
    $111.69.
  27: Quantitative information includes UWI gains and changes in CO2 emissions; e.g.,
    a $100 Chinese-only carbon tax leads to a 17% increase in emissions elsewhere,
    and delayed implementation reduces welfare gains.
  28: Quantitative impacts include peak GDP losses of 43.9% for India and 17.1% for
    the US, with a carbon tax starting at $91.4 per ton reducing peak global damages
    to 9.2% of GDP.
  29: Table 8 provides indices of GDP, energy consumption, and CO2 emissions by region
    relative to the US.
  30: Provides quantitative information on the social cost of carbon in dollars per
    ton of CO2 across various regions and time periods under different scenarios.
  31: Projected population in thousands as a function of years is displayed on the
    y-axis
  32: global damages as a share of global GDP (measured in %) by year (starting 2017)
  33: Estimated social cost of carbon in $ per ton of CO2 for different regions (BRA,
    MEX, SAF, MENA, SLA, SSA, SOV, GBR, ANZ, Global) under various scenarios and years.
  35: Gas consumption (y-axis) as a function of years and different policies
