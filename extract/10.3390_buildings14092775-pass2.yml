sourcematerial:
  2: 'Source material here: Green roofs (GRs) have been widely adopted as an effective
    Green Infrastructure (GI) practice in cities worldwide, offering ecosystem services
    such as stormwater management and reduction of the urban heat island effect. ...
    Although studies have examined the effects of biochar on GR plant growth, long-term
    observational studies focusing on the impacts of various biochar-related parameters
    remain necessary. Therefore, this research aims to assess the performance of GR
    plants with different biochar parameters, namely, amendment rates, application
    methods, and particle sizes. A one-year-long observational data of plant height,
    coverage area, and dry weight from six GR test beds was collected and analyzed.
    Results demonstrate the positive impacts of biochar on plant growth in different
    biochar-GR setups and types of plant species (wallaby grass, common everlasting,
    and billy buttons). The GR with medium biochar particles at the amendment rate
    of 15% v/v had the best plant performance. This contributes to increasing the
    feasibility of GRs by maximizing GR benefits to buildings where they are installed
    while reducing GR costs of irrigation and maintenance. The conclusions were further
    supported by observed data indicating reduced substrate temperature, which in
    turn reduces building energy consumption.'
  3: 'Source material here.

    Though GRs have been significantly researched over the past decades, the implementation
    of GRs has been limited due to numerous constraints. One of the primary reasons
    is that the performance of GRs has not been consistently reported and properly
    understood... Another challenge is the high capital costs of GRs, which is a growing
    concern for building owners and GR investors. The payback period for a GR system
    is challenging to determine... In addition to economic aspects, Zhang and He highlighted
    that concerns about structural safety impact the implementation of GRs among various
    stakeholders... The integration of GRs with photovoltaic (PV) systems has led
    to positive results. GRs cooled indoor air temperatures while also boosting electricity
    production due to the cooler temperature of photovoltaic panels... Moreover, a
    so-called ''Blue-green roof'' system by adding another water storage layer to
    a GR system has been found effective in greatly alleviating runoff volume... Biochar,
    a carbon-rich substrate additive, has been investigated... Biochar possesses a
    highly porous structure and large specific surface area, so it is able to retain
    more water and nutrients... Biochar-amended GRs are lighter relative to a traditional
    GR with the same substrate thickness due to the reduced dry and saturated bulk
    density of substrates."

    '
  4: '

    Given that biochar offers multiple benefits to increase the feasibility of widespread
    application of GRs on rooftops of either existing or new buildings, this paper
    focuses on evaluating the effectiveness of biochar in improving plant performance.
    The aim is to maintain GR serviceability, maximize the benefits to the buildings
    where they are installed, and reduce operational and maintenance costs, ultimately
    encouraging the broader adoption of GRs. However, the plants on a GR are often
    subjected to harsh growing conditions, including extreme weather like intense
    solar radiation and strong winds, as well as low moisture and nutrient availability
    in the thin substrates typical of extensive GR systems. Therefore, this research
    aims to assess the long-term impacts of biochar on different types of GR plants...Research
    outcomes are expected to obtain necessary information about the biochar benefit
    to plant growth under an Australian climate; consequently, a GR system can effectively
    provide ecosystem services during its lifetime...this research also seeks to understand
    the impact of various biochar-related parameters, which include biochar amendment
    rates, particle sizes, and application methods, on plant performance. This research
    is a continuation of work presented in the studies by Nguyen, Chau and Muttil
    [41] and Nguyen, et al. [54], which focused on runoff retention and runoff quality,
    respectively.

    '
