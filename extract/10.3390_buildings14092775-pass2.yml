  12: 'Source material here.

    Evaluation overview: "Most plants in this research tended to develop vertically
    instead of growing laterally; a further investigation into vegetation conditions
    through the plant coverage area was only reported at the end of the monitoring
    period... The plant coverage area in the unmodified GR was apparently lower than
    that in biochar-modified GRs."

    Drivers of Risk: "Regardless of the ambient rooftop temperature in hot and cold
    periods, a similar thermal pattern was identified in all testbeds... Although
    the substrate temperatures followed the same pattern during hot and cold days,
    the effects of biochar in reducing substrate temperature were more pronounced
    at higher ambient temperatures."

    Quantitative material: "Figure 9. Average dry weight of plants with standard error
    in six green roof testbeds at the end of the monitoring period... The image consists
    of four bar graphs, each displaying data on the dry weight of different plant
    species."

    Highlights: "The temperature of biochar-amended substrates of GR-7.5M-M, GR-15M-M,
    and GR-7.5M-F was noticeably lower than that of GR-0 with no biochar... the effects
    of biochar in reducing substrate temperature were more pronounced at higher ambient
    temperatures."

    Methodology: "Figures 11 and 12 illustrate temperature data at 5-min intervals
    collected from a thermal sensor installed at a 10 cm substrate depth in the center
    of each testbed."

