Highlights:
  2: Biochar improves plant growth in green roofs. Medium biochar particles at a 15%
    amendment rate performed best. Reduced substrate temperature observed, which reduces
    building energy consumption.
  3: Findings about GR are highly variable according to several factors. Some GR systems
    have been reported to be economically infeasible. Biochar-amended GRs are lighter.
  4: The paper focuses on evaluating the effectiveness of biochar in improving plant
    performance to maintain GR serviceability, maximize benefits to buildings, and
    reduce operational and maintenance costs. The goal is to obtain necessary information
    about the biochar benefit to plant growth under an Australian climate so a GR
    system can effectively provide ecosystem services during its lifetime.
  6: No relevant information
  7: The study investigates the performance of biochar at the bottom of GR substrates,
    which is missing in vegetation-related research. It also compares the impact of
    fine and medium biochar particle sizes on GR plant performance.
  8: Biochar increases Water Holding Capacity (WHC) and transpiration rate in substrates,
    which is more pronounced on hot days and effectively promotes plant performance
    due to increased Plant Available Water (PAW) and Permanent Wilting Point (PWP).
  9: Biochar generally improved plant height compared to traditional GRs, with medium
    biochar particles at 7.5% and 15% application rates having the highest performance.
  10: The average height of Wallaby Grass and Common Everlasting varies depending
    on the treatment (GR label) and time of year. Certain treatments (e.g., GR.57.5IF+
    for Wallaby Grass) consistently show higher average heights during specific periods.
  11: Biochar amendments generally had positive impacts on plant dry weights; particularly
    effective was a 15% volume/volume medium biochar mixture in the test beds.
  12: Biochar-modified green roofs showed lower temperatures and potentially greater
    plant coverage and growth.
  13: "Green roofs can reduce substrate temperature by up to 4\xB0C during hot days\
    \ and 2\xB0C during cold days, relative to a control (GR-0)."
  14: GR-Q and GR-7.5 show less temperature fluctuation than ambient temperature.
  15: Biochar has significant long-term effects on plant performance, becoming more
    evident by the end of the one-year study period. Billy buttons had the poorest
    performance due to exposure to solar heat, strong winds, limited nutrients, and
    incompatibility with LECA-based substrates.
  16: 15% biochar consistently resulted in best plant growth performance across different
    species; mixing method more effective than bottom-applied or top-dressed for biochar
    application.
  17: Biochar can be effective in reducing GR substrate temperature, particularly
    during hot periods. However, the effectiveness depends on the application method
    and biochar-related parameters. Biochar enhances the water retention capacity
    of GRs. Nutrient availability also plays a role in plant growth, even when biochar
    has no notable impact on substrate temperature or moisture.
  18: Biochar addition improved runoff retention, increased water retention capacity
    of green roofs by up to 10% in summer, and enhanced nutrient availability for
    plant growth.
  20: Biochar amendment in substrates improves plant performance, building energy
    savings, and reduces structural loading.
Methodology:
  2: One-year-long observational data of plant height, coverage area, and dry weight
    from six green roof test beds with varying biochar parameters (amendment rates,
    application methods, and particle sizes). The study observed wallaby grass, common
    everlasting, and billy buttons.
  3: The paper refers to simulation tools, integrated GR systems, new GR materials,
    and LCCA as methodologies. Results are applicable to GRs and their effects on
    buildings.
  4: The research aims to assess the long-term impacts of biochar on different types
    of GR plants under an Australian climate, considering biochar amendment rates,
    particle sizes, and application methods. This research is a continuation of work
    presented in the studies by Nguyen, Chau and Muttil [41] and Nguyen, et al. [54]
  5: "The study uses six 1m\xB2 green roof test beds to investigate the impact of\
    \ biochar amendment rate, particle size, and application methods on plant performance.\
    \ The experiment was conducted on the rooftop of Building M at Victoria University,\
    \ Australia, which has a temperate oceanic climate. Data collection included plant\
    \ height (fortnightly), coverage area, dry weight, and substrate temperature (end\
    \ of one year)."
  6: Study involves the implementation of green roofs with various biochar application
    methods including mixing with substrate, top-dressing, and bottom application
    of biochar.
  7: The study uses test beds with different biochar amendment rates (0%, 7.5%, 15%),
    application methods (mixing, bottom-applied, top-dressed), and particle sizes
    (fine, medium) to study the impact on plant performance.
  8: "Pre-grown plants were moved to green roofs on May 5, 2023, and observed until\
    \ May 16, 2024. Plant height was measured fortnightly. At the end of the observation\
    \ period, plant coverage area was photographed, and plant dry weight was measured\
    \ after drying at 60\xB0C for 48 h. Substrate temperature was continuously recorded\
    \ at 5 min intervals."
  9: Plant height was recorded fortnightly over four observation periods from August
    2023 to March 2024, with different conditions including the introduction of biochar
    and nitrogen-rich fertilizer.
  10: The analysis involves measuring the average height of plants in six green roof
    test beds over time and presenting the data in bar graphs with standard error
    bars. The monitoring period spans from 3/5/2023 to 1/6/2024.
  11: Plant height and dry weight were used as indicators of vegetation performance,
    with measurements taken at the end of the study period.
  12: Plants were grown in green roofs with biochar mixtures; substrate temperatures
    recorded every 5 minutes.
  13: Monitoring of six green roof test beds; temperature data collected from June
    2016 to July 2016
  14: Temperature at 10 cm substrate depth in six green roof testbeds measured from
    9:30 to 19:00 over three consecutive hot days (May 27-29, 2024). Data also collected
    for a period ranging from approximately November 22, 2022, to May 26, 2023.
  15: Six 1 m2 green roof test beds were constructed on a building rooftop to investigate
    the impacts of biochar on plant performance, replicating conventional built-in-place
    GR systems.
  16: Analysis of biochar's impact on plant growth using different amendment rates
    (7.5% and 15%) and application methods (mixing, top-dressed).
  17: Field experiments with green roofs (GRs) using different biochar setups (different
    percentages, mixing methods, and particle sizes). Substrate temperature was measured
    at 10 cm depth. Runoff quantity and quality were also collected and used to infer
    nutrient availability.
  18: The analysis is based on field experiments and numerical modeling using 'CHEMFLO-2000'
    to evaluate the impact of biochar on water retention and nutrient dynamics in
    green roofs.
  20: Use of biochar in green roof (GR) substrates is evaluated through observations
    of plant growth and substrate conditions.
