    steps and is presentedinFigure1...Step2 consists of theselection of biocharand
    biochar-relatedparameters... Step three consists of datacollection andundertaking
    measurement ofselected parameters."

    '
  9: 'Source material here.

    Evaluation overview: "These observations aim to represent different development
    periods of the plant species during one year of observations. There was no significant
    difference between the GRs in terms of the height of each plant species in the
    first few months. Plant heights developed slowly in the early stages as they adapted
    to the harsh roof environment."


    Drivers of Risk: "The plants experienced faster growth after the addition of nitrogen-rich
    fertilizer to each test bed on 3 October 2023. The third observation period occurred
    from 16 November 2023 till 15 February 2024, when the plants grew towards their
    maximum heights under warm and wet weather conditions (December 2023 and January
    2024). The final measurements of plant heights were carried out during a hot and
    dry period (February and March 2024)."


    Quantitative material: "The first observation period recorded a maximum wallaby
    grass height of 52 cm in GR-7.5M-M. For the common everlasting wildflowers, all
    plants kept growing taller, even after the hot and dry period, and reached up
    to 33 cm in GR-15M-M."


    Methodology: "The height of each plant was recorded fortnightly, and average heights
    from the four observation periods were reported in this research. These observations
    aim to represent different development periods of the plant species during one
    year of observations."


    Highlights: "In general, wallaby grass in biochar-amended GRs performed better
    than in traditional GRs in terms of plant height, and the most noticeable effects
    were recorded in the final observation. However, the positive impacts of biochar
    on the height of billy button plants became pronounced after the first two observation
    periods with the exception of GR-7.5M-F. Overall, medium biochar particles mixed
    at the application rates of 7.5% and 15% v/v had the highest performance."

    '
