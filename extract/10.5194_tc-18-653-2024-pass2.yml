  4: Source material here. Our ice-sheet simulations begin in the year 1950 CE to
    allow comparisons with observations over the satellite era. [...] Hindcasts of
    the behaviour of the AIS over the period 1950-2014 are produced using changes
    in oceanic and atmospheric boundary conditions derived from the CMIP5 climate
    model NorESM1-M [...] As of the year 2015, changes in atmospheric and oceanic
    properties derived from a subset of CMIP6 climate models [...] are used as forcing
    until the year 2300. After 2300, the climate is kept constant in time, allowing
    [...] Surface melt is calculated as a function of monthly air temperatures and
    precipitations by use of a positive degree-day (PDD) scheme [...] Surface runoff
    is then estimated by a simple thermodynamic parameterisation of the refreezing
    process [...] generating basal melt rates, we rely on physically-based parameterisations
    that approximate the local thermal forcing based on far-field ocean properties
    provided by the GCMs [...] The forcing applied is derived from both the Shared
    Socioeconomic Pathways (SSP) 5-8.5 and 1-2.6 scenarios [...] Atmospheric forcing
    is derived in the form of monthly-averaged air temperature and sublimation anomalies
    as well as precipitation ratios [...] On the other hand, oceanic forcing is derived
    in the form of yearly- averaged temperature and salinity anomalies compared with
    the 1995-2014 mean.
