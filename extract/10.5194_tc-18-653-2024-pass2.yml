  6: "\nStartingfromthepriorprobabilitydistributionoftheuncertaininputparameters(assumedtofollowauniformdistribution),\
    \ we determine the posterior probability distribution using Bayes\u2019 theorem.\
    \ As such, each ensemble member is assigned a likelihood score based on the differences\
    \ (discrepancies) between the model outputs and a series of spatially-aggregated\
    \ estimates of regional net mass balance from the IMBIE over the past decades.\
    \ In Bayes\u2019 theorem, we can assume a multivariate Gaussian likelihood function\
    \ between the observed and simulated mass balance estimates, whose mean values\
    \ are given by the observations and variances are given by the sum of the observational\
    \ and structural (approximating the \"model uncertainties\") errors. This likelihood\
    \ function assumes the discrepancies between the observed and simulated values\
    \ are (a) independent in both space and time and (b) normally distributed. Similar\
    \ to, e.g., Nias et al. (2019, 2023), we estimate the structural error by multiplying\
    \ the observational error, here by a factor of 10. This implies that our confidence\
    \ in our ability to model reality is far lower than the ability to measure it.\
    \ The choice in the magnitude of the structural error (and therefore discrepancy\
    \ variance) was essentially made to avoid the scores being heavily weighted to\
    \ a small number of ensemble members. In addition, given that the CMIP6 climate\
    \ models included in the parameter space have no influence on the calibration\
    \ (as the historical simulations were produced using the CMIP5 climate model NorESM1-M;\
    \ see section 2.1), we also aimed for a roughly equivalent distribution of the\
    \ weights across the four GCMs.\n"
