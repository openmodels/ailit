Highlights:
  1: "The ocean is the primary driver of short-term Antarctic mass loss; The atmosphere\
    \ initially plays a mitigating role through increased snowfall, but becomes an\
    \ amplifying driver under high-emission scenarios when near-surface warming exceeds\
    \ +7.5\xB0C; Under a very high-emission scenario, a complete collapse of the West\
    \ Antarctic ice sheet and significant grounding-line retreat in East Antarctica\
    \ are projected."
  2: There are large uncertainties in projections of future AIS evolution, and it's
    unclear whether the ice sheet will gain or lose mass by the end of the century,
    especially under very high-emission scenarios. The future balance between competing
    processes of ocean-induced sub-shelf melt, snow accumulation, and surface runoff
    is poorly known.
  3: The paper aims to quantify how uncertainties in ice-ocean and ice-atmosphere
    interactions translate into uncertainties in the projected behavior of the AIS.
  8: Calibrated ensemble effectively reduces uncertainty in model hindcasts and reproduces
    historical trends in ice-sheet mass change.
  10: Projected mass loss is much greater under the high-emission scenario SSP5-8.5
    compared to SSP1-2.6 by the year 2300 and beyond.
  11: Future sea-level rise contributions from the Antarctic ice sheet under various
    socio-economic pathways are explored.
  12: The paper projects the evolution of the main ice sheet mass balance components
    and surface mass balance components under SSP1-2.6 and SSP5-8.5, and provides
    a breakdown of these components for the West and East Antarctic ice sheets.
  13: Main highlights include that ocean-driven ice loss dominates up to the end of
    the 21st century, with increased surface runoff becoming significant in the 23rd
    century. East Antarctica contributes positively to sea-level rise after the 21st
    century under SSP5-8.5 due to combined oceanic and atmospheric effects.
  15: Contribution of atmospheric and oceanic forcing to projected Antarctic mass
    changes; Visualized through maps of mean ice thickness change.
  16: Projected Antarctic mass loss during the 21st century is mainly driven by oceanic
    forcing with earlier and higher contributions to global mean sea-level rise.
  17: Antarctic mass loss under SSP5-8.5 is mainly driven by the combined effects
    of oceanic forcing and the melt-elevation feedback; Oceanic forcing is the primary
    trigger of mass loss in both West and East Antarctica; Hydrofracturing of ice
    shelves leads to a significant increase in GMSLR contribution, especially in the
    long term.
  19: Surface runoff and snow accumulation trends in a warming climate can lead to
    reduced effectiveness of Antarctic SMB in mitigating ice discharge and sea-level
    rise.
  20: Emission scenario has limited influence on Antarctic ice loss by the end of
    the century, with higher ranges of Antarctic Ice Sheet contribution to sea-level
    rise projected.
  21: Ice-shelf collapse due to hydrofracturing could accelerate Antarctic mass loss,
    although the projections may overestimate this risk.
  22: "Freshwater input from ice shelves may create a positive feedback loop, increasing\
    \ melt rates. A threshold exists at +7.5\xB0C in near-surface warming that results\
    \ in reduced SMB. The PDD-based projections of surface runoff demonstrate good\
    \ agreement with climate models in terms of both pattern and magnitudes, though\
    \ the model tends to underestimate aggregated surface runoff rates compared with\
    \ climate models projections under high warming."
  23: The comparison of the Bayesian calibrated ensemble with other climate models
    provides insights into the range of possible surface runoff rates. The evolution
    of aggregated surface runoff is analyzed over the periods 2015-2100 and 2015-2300.
  24: Produced credible projections of future Antarctic mass balance by considering
    existing uncertainties and conditioning ensemble projections on relevant observations.
  25: Under a very high-emission scenario, both ocean and atmosphere interactions
    could lead to complete collapse of West Antarctica by the end of the millennium,
    with ocean initially triggering loss, accelerated by melt-elevation feedback.
    Under SSP1-2.6, mass loss might be limited to the Amundsen Sea Embayment.
  27: The initial ice sheet configurations are within the range of ISMIP6 models and
    well match observations in terms of ice geometry, grounding-line position, and
    ice dynamics.
  29: No relevant information.
  31: "Varies \u03B3 0 within specified ranges. Applies sector temperature corrections\
    \ derived for median \u03B3 0 values."
  33: Data used to qualitatively assess behavior of the calibrated ensemble over historical
    periods.
  38: Increased snowfall over the Antarctic Ice Sheet has partially mitigated twentieth-century
    sea-level rise.
  39: Antarctic snowmelt volume has not significantly changed since 1979.
  42: No relevant information
Methodology:
  1: Observationally-calibrated ice-sheet model forced by CMIP6 climate models. Results
    are applicable for short-term (up to 2100) and long-term (up to 3000) projections
    under different emission scenarios.
  2: Climate and ice sheet models.
  3: An ensemble of simulations is run using the ice-sheet model Kori-ULB, accounting
    for uncertainties in ice-ocean and ice-atmosphere interactions. Bayesian calibration
    is performed using the Ice Sheet Mass Balance Inter-comparison Exercise (IMBIE).
    Projections extend to the end of the millennium using atmospheric and oceanic
    projections from CMIP6 under low and very high emission scenarios. Simulations
    are performed at a spatial resolution of 16 km. A simplified melt-and-runoff model
    within the ice-sheet model is used to determine surface melt and runoff.
  4: Uses anomalies for atmospheric and oceanic forcing, compared to a baseline of
    the 1995-2014 average.
  5: The parameter space is designed to have ranges as wide as physically plausible
    for the simulations using CMIP6 climate models and historical hindcasts.
  6: The historical simulations are produced using the CMIP5 climate model NorESM1-M
    and not influenced by the CMIP6 climate models included in the parameter space.
  8: Bayesian calibration of an ensemble using observational constraints of Antarctic
    regional mass balance; qualitatively assessed with aggregated estimates from satellite
    and modeling studies.
  10: The paper uses a calibrated ensemble (posterior distributions) to project Antarctic
    mass loss and its contribution to GMSLR.
  11: Calibrated probabilistic projections using a Bayesian-calibrated mean of the
    ensemble; results projected until the year 3000.
  12: The analysis uses calibrated probabilistic projections of ice sheet mass balance
    components under different SSP scenarios. The results are applicable for the period
    2015-2300.
  14: Analysis conducted using a 100-member ensemble with experiments separating the
    influences of oceanic and atmospheric forcings.
  15: 100-member ensemble simulations under SSP5-8.5 with experiments considering
    oceanic and atmospheric drivers. Bayesian calibrated mean used for each experiment.
    Comparison provided to constant present-day conditions and SSP1-2.6.
  16: Sensitivity analyses considering different combinations of atmospheric and oceanic
    forcings on Antarctic ice sheets.
  17: Calibrated ensemble projections under the SSP5-8.5 scenario, with and without
    considering ice-shelf collapse through hydrofracturing (approximated following
    Pollard et al., 2015; DeConto and Pollard, 2016).
  19: The analysis examines the relationship between SMB components and regional near-surface
    warming from GCMs, focusing on warming impacts on both grounded ice and ice shelves.
  20: Observationally-calibrated projections accounting for key uncertainties in ice-climate
    interactions and considering committed long-term changes.
  21: Uses an initialization procedure to match ice sheet observations and a calibrated
    ensemble to investigate future Antarctic mass changes under different emissions
    scenarios.
  22: Uses a PDD-based (Positive Degree Day) melt-and-runoff scheme, comparing projections
    with regional (MAR) and general (CESM2-WACCM) polar-oriented climate models under
    SSP5-8.5. Examines the relationship between SMB and regional atmospheric warming.
    Results are applicable up to 2300 for some aspects.
  23: A Bayesian calibrated ensemble is used to project surface runoff rates. The
    study compares the Bayesian calibrated ensemble with outputs from climate models
    (MAR forced by CESM2, MAR forced by CNRM-CM6, and CESM2-WACCM). Results are applicable
    to the years 2100 and 2300 under SSP5-8.5.
  24: Ice-sheet model projections conditioned on relevant observations using a Bayesian
    calibration approach. Exploration of uncertainties in model parameters with a
    focus on ice-ocean-atmosphere interactions. Uses CMIP6 climate model projections
    to drive the ice-sheet model. Observational estimates used for calibration are
    spatially integrated.
  25: "The projections are based on an ensemble of simulations considering nine key\
    \ uncertainties in ice\u2013ocean\u2013atmosphere interactions."
  27: A 10-year relaxation run is performed after model initialization to mitigate
    transitional shocks in sub-shelf melt parameterization.
  28: The PICO model is used for sub-shelf melt parameterization, representing buoyancy-driven
    advection of ocean water into ice-shelf cavities.
  29: Analysis using the PICO and plume models to simulate ice-shelf basal melt rates
    based on buoyant meltwater plume behavior and heat exchange dynamics.
  30: The paper also describes ISMIP6 non-local quadratic parameterizations that consider
    both local and regional thermal forcing influences.
  31: "Uses quadratic non-local parameterizations (with and without local slope dependency)\
    \ to model melt rates. Applies sector temperature corrections derived for MeanAnt\
    \ median \u03B3 0 values. Applies these corrections when using present-day ocean\
    \ temperature and salinity fields."
  32: Simulations and data analysis were performed by VC, with the setup and design
    developed by VC and AKK.
  33: Satellite-based and modeling studies used to estimate changes, applicable over
    different historical periods.
  38: Observational data from satellite altimeter, gravity, and GPS data are mentioned
    in the context of Antarctic Ice Sheet mass trend studies.
  39: Sea-level response to melting of Antarctic ice shelves on multi-centennial timescales
    with the fast Elementary Thermomechanical Ice Sheet model (f.ETISh v1.0)
  42: No relevant information
More Notes:
  2: The Antarctic surface mass balance (SMB), via snow accumulation, is the only
    potential negative contributor to sea-level rise.
  8: The analysis notes substantial ice-shelf thinning is simulated in areas like
    the Amundsen Sea Sector, aligning with observations over past decades.
  11: No relevant information
  12: The net ice-sheet mass balance considers changes in volume above flotation and
    represents the rate of mass change contributing to sea-level rise.
  15: Figure S4 displays mean ice thickness changes under both constant present-day
    conditions and SSP1-2.6. Results are focused on ice thickness change, grounding
    line positions, and calving front positions.
  16: Both atmospheric and oceanic forcings can independently trigger a complete collapse
    of the West Antarctic Ice Sheet by the end of the millennium.
  20: Projections are consistent with previous estimates but indicate higher ranges
    of ice loss, attributed to wider range of warming and absence of melt-elevation
    feedback.
  22: SSP5-8.5 is considered unlikely on multi-century timescales, so projections
    should be seen as a maximum outcome. The melt-albedo feedback is omitted in the
    PDD approach which is a potential source of underestimation of runoff rates.
  23: The figures show spatial distributions of surface runoff and temporal trends
    of aggregated runoff. The use of different climate models (CESM2, CNRM-CM6, CESM2-WACCM)
    allows for comparison of different model projections. The study considers the
    grounding line and calving front positions when analyzing surface runoff.
  24: The study acknowledges limitations due to using a single ice-sheet model, potentially
    overlooking smaller bedrock irregularities and pinning points, and relying on
    observational estimates that only consider spatially-integrated quantities.
  25: Study emphasizes that future socio-economic pathways can delay or mitigate Antarctic
    mass loss.
  29: No relevant information.
  31: Applying the sector temperature corrections derived from Jourdain et al. (2020)'s
    ocean data with the Schmidtko et al. (2014) data leads to lower calibration scores.
  32: "Computational resources were provided by the Consortium des \xC9quipements\
    \ de Calcul Intensif (C\xC9CI) and funding by European Union\u2019s Horizon 2020\
    \ research and innovation programme."
  38: The text has citations of various studies, indicating a focus on Antarctic climate
    impacts.
  42: No relevant information
Quantitative material:
  1: Antarctic contribution to global mean sea-level rise by 2100 of 6 (-8 to 15)
    cm under a low-emission scenario and 5.5 (-10 to 16) cm under a very high-emission
    scenario; Median global mean sea-level rise of 2.75 (6.95) m by 2300 (3000) under
    a very high emission scenario; Median global mean sea-level rise of 0.62 (1.85)
    m by 2300 (3000) under a sustainable socio-economic pathway.
  2: Model predicts AIS mass loss in excess of one meter of global sea-level equivalent
    at the end of the 21st century.
  3: Mentions a range of -4 to +22 cm for the 5th to 95th percentiles of sea level
    rise from the East Antarctic ice sheet at 2100 (this is from Stokes et al., 2022,
    so not included).
  8: "Observational constraints for regional mass balance showing changes over various\
    \ time periods for different regions of Antarctica, including West Antarctic ice\
    \ sheet mass loss increasing from -37 Gtyr\u22121 in 1992-1996 to -129 Gtyr\u2212\
    1 in 2007-2011."
  10: 'End of century contributions: 6 cm under SSP1-2.6 and 5.5 cm under SSP5-8.5.'
  11: The analysis includes probabilistic projections with median and 5-95% probability
    intervals for AIS contribution to sea-level rise under SSP1-2.6 and SSP5-8.5 scenarios.
  12: The paper presents calibrated probabilistic projections with medians and 5-95%
    probability intervals for ice sheet mass balance components until 2300 under different
    SSP scenarios. It also includes [5,25,50,75,95] percentiles at year 2300.
  13: The paper mentions that median projected sub-shelf melt fluxes reach their maximum
    around 2150, while surface runoff reaches almost 6000 gigatons per year by 2300
    under SSP5-8.5.
  14: The page provides median contributions to GMSLR from Antarctica with percentile
    ranges noted up to the year 3000 under SSP5-8.5 scenario.
  15: Mean ice thickness change at different points in time throughout the millennium
  16: Projected mass loss in West Antarctica under both forcings reaches approximately
    10 mm per year by the end of the millennium.
  17: Median sea-level contribution increased by 60 cm at year 2300, and by 2.2 m
    at year 3000 with hydrofracturing compared to simulations without.
  19: "Antarctic near-surface warming of +2.5\xB0C, +7.5\xB0C, and +15\xB0C correspond\
    \ to pre-industrial global warming of approximately +3.0\xB0C, +7.2\xB0C, and\
    \ +12.2\xB0C, respectively."
  20: Projections of sea-level rise by 2300 range from -0.26 to 1.56 m under SSP1-2.6
    and from 0.46 to 4.52 m under SSP5-8.5, relative to 2015.
  21: "Projected sub-shelf melt fluxes of about 5000 Gt yr\u22121 by the end of the\
    \ 21st century."
  22: "Mentions a threshold at +7.5\xB0C in near-surface warming over Antarctica which\
    \ results in reduced SMB (Surface Mass Balance)."
  23: The analysis projects surface runoff rates for the years 2100 and 2300, including
    ensemble mean, grounding line and calving front positions. It provides probability
    intervals (5-95%) for surface runoff. The Y axis of one of the charts shows a
    range up to 6000 for Surface Fluxes.
  24: Uses a 16 km spatial resolution for ensembles on multi-centennial timescales.
  25: "If Antarctic near-surface warming exceeds +7.5\xB0C, surface runoff increase\
    \ outweighs snow accumulation, influencing mass balance."
  27: "The RMSE for ice thickness and ice surface velocity is within the range for\
    \ ISMIP6 models, with RMSE \u223C 50m for ice thickness and RMSE \u223C 100 myr\u2212\
    1 for ice surface velocity."
  29: "The effective heat exchange velocity \u03B3\u22C6T is varied within a specified\
    \ range of 0.1 \xD7 10\u22125 to 10 \xD7 10\u22125 ms\u22121."
  30: "The heat exchange velocity \u03B3T is varied within the range of 1\xD710^-4\
    \ to 10\xD710^-4 ms^-1."
  31: "Ranges of \u03B3 0: 1 x 10^4 - 4 x 10^4 myr^-1 and 1 x 10^6 - 4 x 10^6 myr^-1\
    \ for non-local quadratic parameterizations (without and with local slope dependency,\
    \ respectively)."
  33: Quantitative estimates of changes in mass balance provided, including uncertainties,
    across different time periods and from various studies.
  38: The text references studies with quantitative data on ice sheet mass trends
    and snowfall, but specific numerical values or percent changes are not included.
  39: Mass balance of the Greenland and Antarctic ice sheets from 1992 to 2020
