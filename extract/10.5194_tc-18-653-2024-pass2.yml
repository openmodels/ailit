sourcematerial:
  1: "  \nWe use an observationally-calibrated ice-sheet model to investigate the\
    \ future trajectory of the Antarctic ice sheet related to uncertainties in the\
    \ future balance between sub-shelf melting and ice discharge on the one hand,\
    \ and the surface mass balance on the other. Our ensemble of simulations, forced\
    \ by a panel of CMIP6 climate models, suggests that the ocean will be the primary\
    \ driver of short-term Antarctic mass loss... Under the very high-emission scenario,\
    \ oceanic and atmospheric drivers are projected to result in a complete collapse\
    \ of the West Antarctic ice sheet... We show that this transition occurs when\
    \ Antarctic near-surface warming exceeds a critical threshold of +7.5\xB0C...\
    \ Antarctic contribution to global mean sea-level rise by 2100 of 6 (-8 to 15)\
    \ cm under a low-emissions scenario and 5.5 (-10 to 16) cm under a very high-emissions\
    \ scenario... leading to a median global mean sea-level rise of 2.75 (6.95) m\
    \ by 2300 (3000)... under a more sustainable socio-economic pathway, we find that\
    \ the Antarctic ice sheet may still contribute to a median global mean sea-level\
    \ rise of 0.62 (1.85) m by 2300 (3000).\n"
  2: "Shepherd et al., 2018; Rignot et al., 2019) reveal that, since the early 2000s,\
    \ the AIS has been losing mass at an accelerating rate... The observed acceleration\
    \ of Antarctic outlet glaciers... is concentrated in areas close to warm and salty\
    \ circumpolar deep water (CDW), which induce strong sub-shelf melt rates. ...\
    \ raising sea level by increased ice discharge (F\xFCrst et al., 2016; Gudmundsson\
    \ et al., 2019; Reese et al., 2018b). ... This uncertainty may notably be explained\
    \ by the remaining unknowns in the long-term impacts of competing processes expected\
    \ to increase in a warming climate (i.e., ocean-induced sub-shelf melt, snow accumulation,\
    \ and surface runoff)... With rising atmospheric temperatures, future accumulation\
    \ is expected to increase as a result of enhanced snowfall associated with higher\
    \ saturated vapour pressure (Frieler et al., 2015). ... it is likely to significantly\
    \ compensate for mass gain through snowfall under very high-emission scenarios\
    \ (Kittel et al., 2021). ... This increase in surface runoff may be expected due\
    \ to the exponential relationship between the air temperature and the surface\
    \ melt (Trusel et al., 2015; Kittel et al., 2021; \u2026). ... Since the Antarctic\
    \ surface mass balance (SMB... the only potential negative contributor to sea-level\
    \ rise (Medley and Thomas, 2019)... it is important to underline the likely indirect\
    \ role of increased rainfall and surface melt in controlling the stability of\
    \ Antarctic ice shelves, and thereby the overall stability of the ice sheet (Lenaerts\
    \ et al., 2019; ...). ... increased rainfall may lead to ice-shelf thinning (Kittel\
    \ et al., 2021) or even trigger ice-shelf collapse due to hydrofracturing (Trusel\
    \ et al., 2015; ...). ... One model (that includes hydrofracturing and marine\
    \ ice cliff instability mechanisms; DeConto and Pollard, 2016; ...), while other\
    \ combinations of climate and ice sheet models suggest AIS mass gain (Seroussi\
    \ et al., 2020; ...). ... it varies widely among models, seems to agree on mass\
    \ loss in response to the predicted changes in oceanic..."
