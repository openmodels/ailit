Drivers of Risk:
  1: Sub-shelf melting, ice discharge, surface mass balance, ocean temperatures, atmospheric
    temperatures, snowfall, surface runoff.
  2: Increased glacier flow due to warm and salty circumpolar deep water (CDW) inducing
    sub-shelf melt; surface runoff due to rising atmospheric temperatures and enhanced
    snowfall; increased rainfall leading to ice-shelf thinning.
  3: Uncertainties in surface mass balance (SMB) and ocean-induced melt processes
    are considered drivers of risk. Future Antarctic SMB is computed based on GCM
    outputs, but drawbacks are noted related to coarse resolution and representation
    of polar processes. The melt-elevation feedback is also a key driver.
  8: Rapid grounded-ice mass losses around the margins of the ice sheet, especially
    in the Amundsen Sea Sector, presumably triggered by an increase in sub-shelf melting.
  10: The retreat of Thwaites Glacier and Amundsen Sea Embayment under both socio-economic
    pathways drive Antarctic mass loss.
  11: Projected changes in Antarctic ice sheet under different climate scenarios related
    to sea level change.
  12: The drivers of risk considered are climate scenarios SSP1-2.6 and SSP5-8.5,
    which influence surface mass balance (SMB), sub-shelf melt, and calving of the
    Antarctic ice sheet.
  13: The analysis identifies ocean-driven sub-shelf melting and surface mass balance
    (SMB) changes, including calving fluxes and surface runoff, as key drivers impacting
    ice loss.
  14: Oceanic and atmospheric forcings, melt-elevation feedback, and ice-shelf hydrofracturing
    impact the Antarctic contribution to sea-level rise.
  15: Oceanic forcing, atmospheric forcing, and melt-elevation feedback
  16: Oceanic forcing primarily drives Antarctic mass loss, while atmospheric forcing
    initially contributes to mass gain due to increased snow accumulation.
  17: Oceanic forcing, atmospheric forcing (through melt-elevation feedback), and
    ice-shelf collapse due to hydrofracturing.
  19: Increased surface runoff and near-surface warming are primary drivers of risk,
    reducing the mitigating impact of Antarctic SMB.
  20: Ocean-driven retreat of Thwaites Glacier and ongoing warming beyond 2100.
  21: Projection indicates a transition from ocean-driven to atmospheric-driven Antarctic
    mass loss due to increased atmospheric warming and surface runoff.
  22: Freshwater input from ice shelves, atmospheric warming, near-surface warming,
    surface melt and runoff, and the SSP5-8.5 scenario (high emissions)
  23: The high-emission pathway (SSP5-8.5) drives changes in surface runoff.
  24: Changes in ice-sheet elevation and area, ice-ocean-atmosphere interactions,
    sliding law determining basal shear stress, influence of basal hydrology, spatial
    variability in Antarctic viscoelastic properties, climate forcings from CMIP6
    models.
  25: The primary drivers of risk identified are oceanic and atmospheric forces impacting
    the West Antarctic ice sheet, with significant roles for ocean-driven mass loss
    and melt-elevation feedback.
  27: Changes in bedrock elevation due to changes in ice load and initial conditions
    impact the outcomes.
  29: Potential changes in basal melt rates of ice shelves due to variations in the
    heat exchange and salinity dynamics.
  31: "Thermal forcing averaged over ice shelves, parameterized through an effective\
    \ heat transfer coefficient (\u03B3 0) and sector-specific temperature corrections\
    \ (\u03B4T sector)."
  33: Changes are assessed in terms of Antarctic net mass, sub-shelf melt, iceberg
    calving, and surface mass balance.
  38: Melting of Antarctic ice and increased snowfall are discussed as factors affecting
    sea-level rise.
  39: Ocean Warming
  42: No relevant information
