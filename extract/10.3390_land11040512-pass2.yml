    "the descriptive statistics presented in Table3show that the arid and semiarid
    region was the worst performing."

    "the econometric analysis shows that, compared to the temperate zone, the likelihood
    of growth in TFP and its three efficiency components is significantly higher in
    the tropical and subtropical zone."

    "3.3. Predicting Impact of Future Climate Change on TFP: Sensitivity Analysis
    Table5presents predicted TFP based on parameter estimates of the MVTOBIT model
    up to 2033, under four different climatic scenarios."

    "For all four models, the predicted TFP in 2033 is significantly higher compared
    to the baseline year of 2013, but the TFP increases more in the counterfactual
    model, where no additional climate variabilities are assumed."

    "the mean-differences in TFP between the counterfactual and other three models
    show that with any additional climatic variabilities, the TFP reduces significantly
    from its natural rate of change, i.e., the counterfactual model."

    "Note: 1 changing at the same rate as observed from 1969 to 2013. 2 1% additional
    change in annual rainfall and temperature variabilities on top of the counterfactual
    model. 3 0.1% additional change in LTP and LTT annually, on top of the counterfactual
    model. 4 combined changes in Models 2 and 3, on top of the counterfactual model."

