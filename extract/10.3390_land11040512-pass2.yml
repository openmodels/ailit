Drivers of Risk:
  3: Long-term and short-term climatic factors, as well as the natural production
    environment, significantly reduce global agricultural productivity.
  4: The paper identifies increasing anomalies in climate and weather events as threats
    to agricultural sustainability.
  5: Climate change, natural production environment, and socio-economic factors.
  6: Future climate variabilities
  7: The study considers changes in climatic variables as potential drivers influencing
    TFP and its components.
  8: Increased rainfall and temperature variabilities, LTP (likely Long Term Precipitation),
    and LTT (likely Long Term Temperature)
  9: Long-term precipitation (LTP), rainfall variability, long-term mean temperature
    (LTT), and temperature variability are used as climate variables. Also included
    are regional dummies for Sub-Saharan Africa, South Asia, Latin America and Caribbean,
    East Asia and the Pacific, and Europe and Central Asia, as well as a time variable
    (Year).
  10: The paper discusses socio-economic factors such as crop diversification impacting
    TFP growth.
  11: Rainfall variability, Long-term temperature (LTT), Temperature variability,
    Land elevation, Arid and semiarid climates, Tropical and subtropical climates.
  12: Increases in long-term temperature (LTT) and annual total rainfall (LTP), as
    well as annual mean temperature and total rainfall variations, impact TFP and
    efficiency components.
  13: Climate variabilities (annual rainfall, temperature variability, long-term precipitation
    (LTP), and long-term temperature (LTT)).
  14: Temperature increase and rainfall variability are identified as growth-reducing
    factors for agricultural productivity.
  15: Shocks impacting outcomes include variations in annual mean temperature and
    total rainfall, which affect TFP growth.
  16: Increasing temperature and volatility in climatic variables.
  17: No relevant information
Evaluation overview:
  3: The paper evaluates the impact of various factors on global agricultural productivity
    growth.
  4: The page discusses the need for Total Factor Productivity (TFP) growth in agriculture
    to address issues like poverty, hunger, and malnutrition.
  5: Agricultural productivity (Total Factor Productivity - TFP) and its components
    (technical, scale, and mix-efficiency).
  6: Global agricultural productivity and its efficiency components
  8: No relevant information
  9: Global agricultural Total Factor Productivity (TFP) change and its components
    (technical, scale, and mix efficiency changes) are being evaluated.
  10: The paper evaluates Total Factor Productivity (TFP) growth and its components
    such as technical efficiency, scale efficiency, and mix-efficiency across different
    income classes, land elevations, weather regimes, and regions.
  11: Evaluates Total Factor Productivity (TFP) change and its components (technical
    efficiency, scale efficiency, mix-efficiency) in agriculture.
  12: This page provides an overview of the effects of climate change, agroecology,
    and weather regimes on total factor productivity (TFP) and its components in agriculture.
  13: TFP (Total Factor Productivity) in agriculture, and its components (technical,
    scale, and mix efficiency).
  14: The paper provides an overview of agricultural total factor productivity (TFP)
    changes and their relation to climatic variables and regional differences.
  15: The paper provides an overview of Total Factor Productivity (TFP) growth in
    agriculture, emphasizing technological progress, scale economies, and input-output
    mix adjustments.
  16: Increasing temperature and volatility in climatic variables are adversely affecting
    total factor productivity (TFP) growth in agriculture.
  17: No relevant information
Highlights:
  3: Projected increased climate variability will significantly reduce future agricultural
    productivity.
  4: TFP growth in agriculture is crucial to tackle poverty, hunger, and malnutrition
    effectively and to address the increasing risk of climate anomalies in agriculture.
  5: The study aims to (a) jointly identify the influences of climate change, natural
    production environment, and socio-economic factors on global agricultural productivity
    growth and its finer components and (b) predict the effect of future climate variabilities
    on global agricultural productivity.
  6: Established linkages, including magnitude and direction, amongst climate, production
    environment and socio-economic factors with global agricultural productivity and
    its efficiency components; identified synergies amongst agricultural productivity
    and various efficiency components; and provided the magnitude and direction of
    agricultural TFP change from future climate variabilities.
  8: No relevant information
  9: Global TFP grew annually at a rate of 0.44%. The geometric mean of the TFP change
    index for the last four and a half decades was 1.014.
  10: High-income countries exhibit the highest TFP change index except in mix-efficiency,
    while low-income countries show higher growth in TFP and its components compared
    to upper-middle-income countries.
  11: Rainfall variability and LTT have significant negative impacts on TFP change.
    Land elevation and climatic dummies (arid/semiarid, tropical/subtropical) have
    significant positive impacts on TFP change. Temperature variability has a significant
    negative impact on TFP change and its components.
  12: Climatic changes, particularly LTP and LTT, have a negative effect on agricultural
    efficiency, with significant implications attributed to temperature and rainfall
    variations.
  13: "Predicted TFP in 2033 is significantly higher than in 2013 under all scenarios.\
    \ Climate variabilities reduce TFP compared to a counterfactual scenario with\
    \ no additional climate changes. Arid and semiarid regions performed worse based\
    \ on weather regime. Likelihood of growth in TFP and its ef\uFB01ciency components\
    \ is signi\uFB01cantly higher in the tropical and subtropical zone."
  14: Climate variations contribute significantly to agricultural productivity risks,
    and adaptive strategies are needed.
  15: Future TFP projections indicate that increased variability in climatic variables
    will further reduce growth. The paper suggests strategic investment in technological
    progress, mix-efficiency improvements, crop diversification, and enhancing R&D
    investment.
  16: There is a strong emphasis on the need for country and region-specific research
    and policies to mitigate and adapt to climate change impacts on agriculture.
  17: No relevant information
Methodology:
  3: "The analysis uses a panel data of 104 countries covering a 45-year period (1969\u2013\
    2013) and employs a multivariate Tobit model."
  5: The study aims to jointly identify the influences of climate change, natural
    production environment, and socio-economic factors on global agricultural productivity
    growth and its finer components using the TFP and efficiency estimates of Anik
    et al. [45]. It also aims to predict the effect of future climate variabilities
    on global agricultural productivity. The analysis is based on a panel data of
    104 countries.
  6: "Utilized estimated values of TFP, technical-, scale-, and mix-efficiency indices\
    \ from Anik et al. [45], who applied O\u2019Donnell\u2019s [51] F\xE4re\u2013\
    Primont index (FPI) approach, covering a period of 45 years (1969\u20132013)."
  7: Predictions of future TFP changes are made using a model in STATA 16, based on
    historical data from 1969 to 2013 and forecasting explanatory variables up to
    2033.
  8: 'Counterfactual model with imposed changes to rainfall/temperature variabilities
    and LTP/LTT; Four models: Model 1 (natural growth rate), Model 2 (rainfall/temperature
    variability change), Model 3 (LTP/LTT change), Model 4 (combination of Models
    2 and 3)'
  9: A 30-year moving average (starting from 1901) is used to calculate long-term
    precipitation and long-term mean temperature. Annual temperature variability is
    estimated as the difference between monthly maximum and minimum average temperature.
    A Multivariate Tobit (MVTOBIT) model is used to estimate the determinants of TFP
    change and its efficiency components.
  10: Analysis involves categorizing countries by income level, production environment,
    and geographic location, using World Bank classification and ANOVA test to assess
    differences in TFP growth.
  11: Uses a Multivariate Tobit (MVTOBIT) model to estimate the determinants of TFP
    change and its components. Results are applicable to a dataset with N=4680 observations.
  12: The analysis uses four climate-related variables, including LTT, LTP, and annual
    variations, combining these with land elevation data to assess impact on agricultural
    efficiency.
  13: MVTOBIT model to predict TFP up to 2033 under four climate scenarios. The counterfactual
    model assumes no additional climate variabilities, Model 2 includes 1% additional
    change in annual rainfall and temperature variabilities, Model 3 includes 0.1%
    additional change in LTP and LTT annually, and Model 4 combines changes in Models
    2 and 3.
  14: An econometric analysis was conducted to examine the effects of land elevation,
    weather regimes, and regional differences on TFP and its efficiency components.
  17: No relevant information
More Notes:
  4: The paper emphasizes that increased TFP is vital for achieving Sustainable Development
    Goals (SDG) such as zero hunger and climate action.
  6: The estimation used eight outputs and five inputs for 104 countries where agriculture
    contributed at least 4% of the GDP and/or 4% of total employment.
  8: No relevant information
  11: The table presents marginal effects, meaning the changes in TFP or its components
    resulting from a unit change in the independent variable. Region/Geographic location
    is controlled for with dummy variables.
  14: The page highlights the importance of R&D investment in agriculture to enhance
    productivity and manage climatic impacts.
  16: Emphasis on the role of various stakeholders, including governments, international
    donors, development partners, private sectors, farmers, and farm managers in addressing
    climate change risks in agriculture.
  17: No relevant information
Quantitative material:
  3: Global agricultural productivity grew consistently at a rate of 0.44% per annum.
  6: Magnitude and direction of agricultural TFP change from future climate variabilities
  8: 1% additional change in total rainfall and mean temperature variabilities annually;
    0.1% additional change in LTP and LTT annually
  9: "Global TFP grew annually at a rate of 0.44%. Max-TFP level: Geometric Mean 0.75,\
    \ Growth Rate 0.23%. Technical efficiency level: Geometric Mean 0.91, Growth Rate\
    \ 0.05%. Scale efficiency level: Geometric Mean 0.97, Growth Rate 0.04%. Mix-efficiency\
    \ level: Geometric Mean 0.78, Growth Rate 0.32%. Residual scale efficiency level:\
    \ Geometric Mean 0.37, Growth Rate 0.19%. Scale\u2013mix efficiency level: Geometric\
    \ Mean 0.29, Growth Rate 0.55%. Total factor productivity level: Geometric Mean\
    \ 0.20, Growth Rate 0.44%. Geometric mean of TFP change index for the last four\
    \ and a half decades was 1.014."
  10: Table 3 provides quantitative indexes for TFP change and its components across
    different categories including income levels and geographic regions.
  11: Provides coefficients (marginal effects) indicating the impact of various factors
    (including climatic variables) on TFP change and its components. Significance
    levels (1%, 5%, 10%) are also indicated.
  12: A 1% increase in LTP is linked to a 0.021% reduction in technical efficiency
    and a 0.004% increase in scale efficiency; a 1% increase in LTT leads to a 0.056%
    drop in TFP, a 0.011% decrease in technical efficiency, and a 0.013% decline in
    mix efficiency.
  13: "Predicted TFP changes from 2013 to 2033 under different climate scenarios (Table\
    \ 5), including percentage changes and t-test statistics. The TFP in 2033 is signi\uFB01\
    cantly higher compared to the baseline year of 2013, but the TFP increases more\
    \ in the counterfactual model. With any additional climatic variabilities, the\
    \ TFP reduces signi\uFB01cantly from its natural rate of change. In Model 2 (1%\
    \ additional change in annual rainfall and temperature variabilities), the mean\
    \ difference with the counterfactual model is -0.431%, and in Model 4 (combined\
    \ changes in Models 2 and 3), it is -0.440%."
  14: The paper mentions differences in TFP change index values for countries at various
    elevation levels, but specific quantitative details are not provided on this page.
