  4: "yaml\nEvaluation overview: \"Researchers believe that agricultural productivity\
    \ growth is the most effective long-term strategy to tackle the problems of poverty,\
    \ hunger, and malnutrition [19]\"\nDrivers of Risk: \"Abbott etal. [21] noted\
    \ that the globalspike in food prices during 2008\u20132009 was largely due todeclining\
    \ agriculturalproductivityandcerealcropfailureinfoodexportingeconomies,whichare\
    \ likely to be repeated more frequently and with higher intensity in the future,\
    \ owing to increasing anomalies in climate, weather events, and other factors;\
    \ thereby, threatening agricultural sustainability [22,23].\"\nHighlights: \"\
    Researchers believe that agricultural productivity growth is the most effective\
    \ long-term strategy to tackle the problems of poverty, hunger, and malnutrition\
    \ [19]\"\nMore Notes: \"For instance, to attain SDG2 (zero hunger) there is a\
    \ target of doublingproductivityinsmallholderfarmsby2030. TFPgrowthwillalsohelpinachieving\
    \ sustainability related SGD targets, viz. SGD 13 (climate action) focusing on\
    \ resilience and adaptive capacity to climate-related hazards and natural disasters\
    \ (i.e., climate change adaptation in production)\"\n"
  5: "yaml\nEvaluation overview: \"Literatureisavailablewhichprovidesvaluableinsightsontheeffectsofclimatechange\
    \ on agricultural production (e.g., [18,24,30\u201332]) and productivity (e.g.,\
    \ [33,34]).\" ; \"Given these backdrops, the main objectives of the present study\
    \ were to (a) jointly identify the in\uFB02uences of climate change, natural production\
    \ environment, and socio- economic factors on global agricultural productivity\
    \ growth and its \uFB01ner components (i.e., technical-, scale-, and mix-ef\uFB01\
    ciency changes);\"\nDrivers of Risk: \"Given these backdrops, the main objectives\
    \ of the present study were to (a) jointly identify the in\uFB02uences of climate\
    \ change, natural production environment, and socio- economic factors on global\
    \ agricultural productivity growth and its \uFB01ner components (i.e., technical-,\
    \ scale-, and mix-ef\uFB01ciency changes);\"\nMethodology: \"Toachievetheseobjectives,weusedtheTFP\
    \ andef\uFB01ciencyestimatesofAniketal.[45],whicharebasedonapaneldataof104countries,\"\
    ; \"Given these backdrops, the main objectives of the present study were to (a)\
    \ jointly identify the in\uFB02uences of climate change, natural production environment,\
    \ and socio- economic factors on global agricultural productivity growth and its\
    \ \uFB01ner components (i.e., technical-, scale-, and mix-ef\uFB01ciency changes);\
    \ and (b) predict the effect of future climate variabilitiesonglobalagriculturalproductivity.\"\
    \nHighlights: \"Given these backdrops, the main objectives of the present study\
    \ were to (a) jointly identify the in\uFB02uences of climate change, natural production\
    \ environment, and socio- economic factors on global agricultural productivity\
    \ growth and its \uFB01ner components (i.e., technical-, scale-, and mix-ef\uFB01\
    ciency changes); and (b) predict the effect of future climate variabilitiesonglobalagriculturalproductivity.\"\
    \n"
  6: "Source material here.\nLand2022,11, 512   4 of 17\nOurstudyrevealedthreeimportantinsightsand/or\
    \ contributions to the existing literature: (i) established linkages, including\
    \ magnitude and direction, amongst climate, production environment and socio-economic\
    \ factors with global agricultural productivity and its efficiency components;\
    \ (ii) identified synergies amongst agricultural productivity andvarious efficiency\
    \ components; and (iii) provided the magnitude and direction of agricultural TFP\
    \ change from future climate variabilities.\n\nWeutilizedtheestimatedvaluesofTFP,technical-,scale-,andmix-efficiencyindices\
    \ fromAniketal.[45],whoappliedO\u2019Donnell\u2019s[51]F\xE4re\u2013Primontindex(FPI)approach,and\
    \ produced estimates of TFP and its six finer components (i.e., technical change,\
    \ technical efficiency change, scale efficiency change, mix efficiency change,\
    \ residual mix efficiency change, and residual scale efficiency change)... Anik\
    \ et al. [45] constructed all relevant input and output variables, using the FAOSTATdatabasetoestimateoutputorientedTFPandeficiencychangesfor104countries\
    \ where agriculture contributed at least 4% of the GDP and/or 4% of total employment,\
    \ covering a period of 45 years (1969\u20132013).\n"
  7: "Having the estimates of TFP and efficiency change indices in hand, which are\
    \ censored in nature, we applied a multivariate Tobit model (MVTOBIT) to identify\
    \ the determinants/drivers jointly influencing agricultural TFP and its efficiency\
    \ components. We developed four equations for TFP change index (dTFP) and its\
    \ output-oriented components: technical efficiency change index (dOTE), scale\
    \ efficiency change index (dOSE), and mix-efficiency change index (dOME). Using\
    \ the parameter estimates of the aforementioned MVTOBIT model, we predicted change\
    \ in global agricultural TFP up to 2033. The predict command available in STATA\
    \ 16 software enables both in-sample and out-of-sample forecasting. Therefore,\
    \ the projected values of the explanatory variables can be considered as the natural\
    \ change over the next 20 years (2014\u20132033) and provide us with the counterfactual\
    \ scenario. This is because, along with this natural growth rate of explanatory\
    \ variables, we assumed additional changes in climatic variables and developed\
    \ four different models."
  8: " \nmodel\u2019,whereweassumedthenaturalgrowthrateforalltheexplanatoryvariables,includ-\
    \ \ning climate variables. In the second model (Model 2), to capture the impact\
    \ of increased \nrainfall and temperature variabilities, we imposed a 1% additional\
    \ change in total rainfall \nand mean temperature variabilities annually on top\
    \ of the counterfactual model. In the \nthirdmodel(Model 3),weimposed a0.1%additional\
    \ changeinLTPandLTTannually, on \ntop ofthe counterfactual model. In the \uFB01\
    nalmodel (Model 4), we incorporated changes in \nModels2and3,simultaneously,ontopofthecounterfactualmodel.\
    \ Allotherremaining \nexplanatory variables followed the natural growth rate,\
    \ as explained previously.\n"
  9: At the global level, the geometric mean of the TFP change index for the last
    four and half decade was 1.014, meaning the output increased at a higher rate
    than inputs. The global TFP grew annually at a rate of 0.44%, and the estimated
    level was 0.20. The global technical efficiency level was estimated at 0.91, scale
    efficiency level at 0.97, mix-efficiency level at 0.78, residual-scale-efficiency
    level at 0.37, and residual-mix-efficiency level at 0.29, respectively. A 30-year
    moving average (starting from 1901) is used to calculate long-term precipitation
    and long-term mean temperature. Annual temperature variability is estimated as
    the difference between monthly maximum and minimum average temperature. A Multivariate
    Tobit (MVTOBIT) model is used to estimate the determinants of TFP change and its
    efficiency components. These are dummy for Sub-Saharan Africa (SSA) = 1 if the
    country belongs to SSA, 0 otherwise; dummy for South Asia (SA) = 1 if the country
    belongs to SA, 0 otherwise; dummy for Latin America and Caribbean (LAC) = 1 for
    LAC countries, 0 otherwise; dummy for East Asia and the Pacific (EAP) = 1 if the
    country belongs to EAP, 0 otherwise; and dummy for Europe and Central Asia (ECA)
    = 1 if the country belongs to ECA, 0 otherwise.
  10: "Source material: \"The paper evaluates Total Factor Productivity (TFP) growth\
    \ and its components such as technical efficiency, scale efficiency, and mix-efficiency\
    \ across different income classes, land elevations, weather regimes, and regions.\
    \ The paper discusses socio-economic factors such as crop diversification impacting\
    \ TFP growth... The negative signs on the coef\uFB01cient of the Her\uFB01ndahl\
    \ index of crop diversi\uFB01cation imply that crop diversification positively\
    \ contributed towards TFP growth, technical-, and mix-ef\uFB01ciency changes.\
    \ Table 3 provides quantitative indexes for TFP change and its components across\
    \ different categories including income levels and geographic regions. Analysis\
    \ involves categorizing countries by income level, production environment, and\
    \ geographic location, using World Bank classification and ANOVA test to assess\
    \ differences in TFP growth... To understand whether the growth in TFP and its\
    \ three components across countries belonging to different income classes is different,\
    \ countries were categorized into four income classes, following the World Bank\
    \ classification... Note: * We conducted a one-way ANOVA test and found that the\
    \ TFP change index across all the categories was significantly different at a\
    \ 1% level of significance. High-income countries exhibit the highest TFP change\
    \ index except in mix-efficiency, while low-income countries show higher growth\
    \ in TFP and its components compared to upper-middle-income countries... Except\
    \ for the mix-ef\uFB01ciency change index, high-income countries had the highest\
    \ index values compared to the other three income classes (Table3). However, the\
    \ econometric analysis revealed that, compared to the upper-middle income countries,\
    \ low-income countries attained signi\uFB01cantly higher growth in TFP and its\
    \ three components...\""
  11: "Source material\nEvaluation overview: \"Table 4. Joint estimation of the determinants\
    \ of TFP change and its components.\"\nDrivers of Risk: \"Climatic variables\\\
    n Rainfall variability\\n LTT\\n Temperature variability\\n Production environment\
    \ and\\n weather regime dummy\\n (base = temperate zone)\\n Land elevation\\n\
    \ Square of land elevation\\n Arid and semiarid\\n Tropical and subtropical\"\n\
    Quantitative material: \"MVTOBIT (Marginal Effects)\"\nMethodology: \"MVTOBIT\
    \ (Marginal Effects)\\n N 4680\\n Note: ***, ** and * indicate signi\uFB01cance\
    \ at 1%, 5% and 10% level respectively.\"\nHighlights: \"Rainfall variability\
    \ -0.139 ***\\nLTT -0.056 ***\\nLand elevation 0.046 ***\\nArid and semiarid 0.126\
    \ ***\\nTropical and subtropical 0.203 ***\\nTemperature variability -0.021 ***\"\
    \nMore Notes: \"MVTOBIT (Marginal Effects)\"\n"
  12: "  \n\"To capture the impact of economic openness on TFP and its associated\
    \ components, an explanatory variable, defined as the ratio of trade (sum of exports\
    \ and imports of goods and services) with GDP was included. The coefficient on\
    \ this variable has a positive sign in the scale efficiency change equation, but\
    \ negative sign in the technical efficiency change equation (Table 4). The implication\
    \ is that the likelihood of enhancing scale efficiency is significantly higher\
    \ in open economies.\"  \n\"We incorporated four variables to represent climate\
    \ change: two of these are to capture the long-term change in climate, i.e., a\
    \ 30-year moving average of annual mean temperature (LTT) and annual total rainfall\
    \ (LTP), whereas the remaining two capture annual variations in total rainfall\
    \ and mean temperature.\"  \n\"Among these four variables used to represent climate\
    \ change, except the LTP variable in the scale-efficiency equation, all coefficients\
    \ have negative signs, especially where the effect is significant.\"  \n\"The\
    \ estimated marginal effects with the variable LTP imply that a 1% increase in\
    \ LTP is associated with a likelihood of 0.021% reduction and 0.004% increase\
    \ in the technical- and scale-efficiency change indices, respectively.\"  \n\"\
    We also found that a 1% increase in LTT is associated with the likelihood of a\
    \ 0.056%, 0.011%, and 0.013% decrease in TFP, technical-, and mix-efficiency change\
    \ indices, respectively, which is in-line with Rahman and Anik's findings about\
    \ agriculture in Bangladesh.\"  \n\"Moreover, climatic vulnerability, in the form\
    \ of increasing LTP and LTT, creates risk and uncertainty, which can negatively\
    \ contribute to efficiency.\"  \n\"Annual mean temperature and total rainfall\
    \ variations have severe implications on agriculture, as expected.\"  \n"
