  22: "Evaluation overview: \"Figure 11 summarizes potential channels through which\
    \ global warming may affect obesity.\"\n\nDrivers of Risk: \"Positive temperature\
    \ shocks are defined as the months in each year with temperatures at least one\
    \ standard deviation above the long-run average for the same month.\"\n\nQuantitative\
    \ material: \"As months with positive temperature shocks increase, the obesity\
    \ rate also tends to increase, peaking between 8 and 9 months, and then slightly\
    \ tapering off.\"\n\nMethodology: \"This figure presents the response function\
    \ of obesity to positive temperature shocks, constructed based on the estimates\
    \ of \u03BBj from model (13).\"\n\nHighlights: \"Finding is as expected because\
    \ a greater number of months with positive temperature shocks corresponds to a\
    \ higher mean temperature.\"\n\nMore Notes: \"Global warming can influence calorie\
    \ intake by altering income (Burke et al. 2015), food prices (Wheeler and von\
    \ Braun 2013), and consumption preferences (Scheelbeek et al. 2020). Global warming\
    \ may also impact calorie expenditure by changing working hours (Graff Zivin and\
    \ Neidell 2014), levels of physical activity (Obradovich and Fowler 2017), and\
    \ minimum calorie requirements (Johnson and Kark 1947).\""
