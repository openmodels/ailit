    \ the country mean) have no signi\uFB01cant effect on the obesity rate.\"\n\n\
    Drivers of Risk: \"Conversely, the coef\uFB01cients in the 'high-temperature'\
    \ seasons (i.e., seasons 3 and 4) indicate that temperature increases in seasons\
    \ with high temperatures signi\uFB01cantly raise the obesity rate.\" and \"We\
    \ observe that the marginal effect of temperature variation on obesity first increases\
    \ with temperature variation and then levels off when the variation is very high.\"\
    \n\nMethodology: \"Firstly, the de\uFB01nition of the four seasons dictates that\
    \ temperatures increase from season 1 to season 4. Secondly, the model includes\
    \ country \uFB01xed effects to eliminate the mean temperature of the country.\"\
    \ and \"To more directly examine the effect of within-year temperature variation\
    \ on obesity, we follow the literature...and construct the following measure of\
    \ temperature variation.\"\n\nHighlights: \"The overall positive effect of warming\
    \ on obesity across the four seasons con\uFB01rms the baseline finding that the\
