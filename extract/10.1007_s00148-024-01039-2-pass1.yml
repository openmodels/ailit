Drivers of Risk:
  1: Year-to-year temperature fluctuations and increases in annual mean temperature
    are identified as drivers impacting obesity.
  2: Global warming, year-to-year temperature fluctuations
  3: Global warming, specifically changes in temperature
  4: Global warming (specifically, annual mean temperature) is the primary driver
    of risk.
  5: The key climate variable is annual mean temperature. Other temperature measures
    include temperature bins, seasonal mean temperature, temperature variation, and
    temperature shocks. Other climate variables used as controls include annual total
    precipitation, wet day frequency, frost day frequency, cloud cover percentage,
    and vapor pressure.
  6: 'Climate projections are based on three emissions scenarios: SSP1-1.9 (low),
    SSP2-4.5 (intermediate), and SSP5-8.5 (high).'
  7: The primary driver of risk is annual mean temperature, represented as a J-degree
    polynomial.
  8: Temperature fluctuations are examined as a shock impacting obesity outcomes.
  9: Temperature, specifically year-to-year temperature fluctuations and long-term
    temperature trends.
  10: The analysis considers long-term temperature trends and their potential impact
    on obesity rates.
  11: Annual mean temperature is the primary driver of risk.
  12: Increase in annual mean temperature.
  13: Temperature changes are examined as a potential driver impacting obesity rates.
  15: Temperature increases (warming)
  16: Warming temperatures are the driver impacting obesity outcomes.
  17: The change impacting the outcomes is global warming, which differentially affects
    obesity rates across geographic regions.
  18: Higher temperatures, particularly in higher-temperature seasons, increase obesity.
  19: Temperature bins and seasonal mean temperature are drivers of risk.
  20: Increases in temperature during high-temperature seasons (seasons 3 and 4);
    within-year temperature variation
  21: Positive temperature shocks, defined as months where temperature exceeds one
    standard deviation above the long-run average for that month.
  22: Positive temperature shocks (months with temperatures at least one standard
    deviation above the long-run average)
  24: Changes in annual mean temperature affect calorie demand, physical exercise,
    calorie intake, and fat intake.
  25: Explores the effect of long-term warming trends, specifically temperature increases
    over a 30-year period, on obesity rates.
  26: Projected temperature changes from 2016 to 2050 due to global warming under
    different emissions scenarios (SSP2-4.5, SSP1-1.9, and SSP5-8.5).
  27: Projected warming from 2016 to 2050, using the intermediate emissions scenario
    SSP2-4.5.
  28: The study examines the impact of warming temperatures on obesity rates.
  29: The study identifies global warming and year-to-year temperature fluctuations
    as drivers impacting obesity levels.
Evaluation overview:
  1: The study evaluates the impact of global warming on obesity rates across different
    countries.
  2: The study estimates the overall impact of global warming on adult obesity.
  3: Obesity rates
  4: The paper evaluates the impact of global warming on obesity.
  5: The study evaluates the impact of global warming on adult obesity rates, defined
    as the percentage of adults with a body mass index equal to or greater than 30.
  7: The outcome being evaluated is the adult obesity rate.
  8: The paper evaluates the causal effect of temperature on obesity.
  9: The impact of global warming on obesity.
  10: This page evaluates the impact of temperature on obesity.
  11: Evaluates the impact of global warming on obesity rates.
  12: Marginal effect of warming on the adult obesity rate.
  13: This page discusses the impact of global warming on obesity rates, exploring
    how temperature changes may influence obesity trends.
  15: Impact of global warming on obesity
  16: The paper evaluates the impact of warming on obesity rates.
  17: This page provides an evaluation of the impact of global warming on obesity
    rates, specifically noting an increase in the female obesity rate by 0.81 percentage
    points.
  18: The outcome being evaluated is the impact of temperature on obesity rates.
  19: The paper evaluates the impact of global warming on obesity.
  20: Obesity rate
  21: Obesity rates
  22: Obesity rate
  24: The page evaluates the impact of warming on obesity by examining factors like
    calorie demand, physical exercise, calorie intake, and fat intake.
  25: Focuses on the impact of global warming on obesity, providing insights into
    the outcomes of temperature changes on obesity rates.
  26: Impact of global warming on obesity at the country level.
  27: Impact of global warming on obesity.
  28: This study evaluates the impact of global warming on human obesity.
  29: This paper evaluates the impact of global warming on obesity and how it subsequently
    affects human capital and economic performance.
Highlights:
  1: Global warming significantly increased obesity rates in temperate countries,
    with little reduction observed in tropical countries.
  2: The study investigates the potential of adaptation in offsetting the impact of
    global warming on adult obesity.
  3: Global warming significantly increased obesity rates in temperate zones while
    reducing obesity in tropical countries.
  4: Obesity is an important pathway through which global warming can detrimentally
    affect human capital and economic outcomes.
  6: In 2016, countries show a broader range of GDP per capita and higher obesity
    rates, indicating a potential correlation between income and obesity over time.
  9: The baseline model captures short-run impacts, while the long-difference model
    captures long-run impacts and allows for adaptation.
  10: Warming is found to have a significantly positive impact on the adult obesity
    rate.
  11: "The effect of temperature on obesity is positive up to a threshold of 27\xB0\
    C, after which it becomes negative."
  12: "A 1\xB0C increase in annual mean temperature is estimated to result in 79.7\
    \ million more obese adults worldwide based on 2016 population data."
  13: Overall, the estimates suggest minor effects of within-country population migration
    and socio-demographic changes on obesity rates relative to temperature differences.
  15: The impact of warming on obesity is higher in poorer countries, countries with
    older populations, and countries with more educated populations.
  16: The impact of warming on male obesity is one-third larger than on female obesity.
  17: Males are more exposed to the impact of global warming due to higher exposure
    to high temperatures, whereas females see a greater increase in obesity rates.
  18: Warming of high-temperature seasons significantly increases obesity, while warming
    of low-temperature seasons has a negligible effect.
  19: There is a positive relationship between higher temperature bins and increased
    marginal effects on obesity rates. The marginal effect of temperature on obesity
    rate increases with higher seasonal mean temperatures.
  20: Warming of high-temperature seasons (seasons 3 and 4) can increase obesity rates.
    The effect of temperature variation on obesity first increases with temperature
    variation and then levels off when the variation is very high.
  21: Positive temperature shocks initially enhance and then reduce the adult obesity
    rate.
  22: Positive temperature shocks correspond to a higher mean temperature, and increasing
    months with positive temperature shocks lead to an increase in obesity rates.
  24: Higher temperatures tend to increase minimum calorie demand and decrease physical
    exercise; moderate temperatures increase calorie and fat intake.
  25: Both long-run and short-run models initially show an increase and then a decrease
    in obesity with increasing temperatures but differ in threshold temperatures.
  26: Short-run model suggests global warming is likely to increase obesity in most
    countries. Long-run model suggests that global warming is likely to increase obesity
    in most countries from temperate zones while reducing obesity in most countries
    from subtropical and tropical zones. Increase of 89.9 million obese individuals
    worldwide leading to $276.6 billion in economic loss.
  27: Global warming may increase obesity in temperate zones but decrease it in subtropical
    and tropical zones. Short-run and long-run models suggest adaptation effects.
  28: Long-term adaptation may not significantly mitigate the impact of global warming
    on obesity. The long-run model predicts a more positive impact (increased obesity)
    in temperate zones but a more negative impact (decreased obesity) in subtropical
    and tropical zones. The greater positive impact in temperate zones suggests the
    cumulative effect of warming outweighs adaptation, while the negative impact in
    subtropical/tropical zones likely reflects reduced income due to warming.
  29: Global warming significantly increased obesity in most countries, except a small
    number of tropical countries, and highlights substantial heterogeneity across
    regions, income levels, age structures, and education levels.
Methodology:
  1: Analysis uses data from 152 countries between 1975 and 2016 to study the impact
    of temperature changes on obesity rates.
  2: The study employs a panel model using data from 1975 to 2016 for 152 countries,
    relying on year-to-year temperature fluctuations to identify the causal effect
    of warming on obesity.
  3: The baseline model utilizes a third-degree temperature polynomial to account
    for the nonlinear impact of temperature on obesity; 'long-difference' model relies
    on long-term temperature trends to identify the impact.
  4: The study uses long-run global data and different model settings to identify
    short-run and long-run effects, and evaluates the potential of long-run adaptation.
  5: The study uses country-level climate measures calculated as the population-weighted
    average across all climate grids within each country, utilizing gridded population
    data from the year 2000 (LandScan Program). Robustness checks include using population
    in 2016 or each sample year as weights.
  6: Utilizes multi-model ensemble climate projections from CMIP6 for scenario analysis.
  7: 'The analysis uses a fixed effects panel model, comparing the same country over
    time to estimate the causal effect of warming. It relies on inter-annual temperature
    fluctuations being random. The baseline model uses eight control variables: log
    GDP per capita and its square, annual total precipitation and its square, wet
    day frequency, frost day frequency, cloud cover percentage, and vapor pressure.'
  8: The analysis uses a J-degree temperature polynomial and interaction effects with
    income to assess non-linear and variable impacts of temperature on obesity.
  9: The analysis uses a baseline model (1) to capture short-run impacts based on
    year-to-year temperature fluctuations. A 'long-difference' model (6) is used to
    capture long-run impacts using long-term temperature trends, allowing for adaptation.
  10: The analysis uses first- to fifth-degree temperature polynomials as explanatory
    variables and estimates the short-term and long-term impacts of temperature on
    obesity through models capturing year-to-year variations and 30-year trends.
  11: Uses regression models with temperature polynomials (up to the fifth degree)
    and interaction with log GDP per capita to estimate response functions of obesity
    to temperature; standard errors are clustered at the country level.
  12: Estimates are calculated based on a third-degree model with and without accounting
    for the interaction effect of income (GDP).
  13: 'The analysis includes robustness checks using different control conditions:
    excluding all controls, controlling for carbon emissions and crude death rates,
    including year fixed effects, and weighting temperature by population data from
    2016 and each year.'
  15: Linear regression model using country fixed effects, country-specific time trends,
    and control variables. Moderating variables (GDP per capita, average adult age,
    average adult years of schooling) are held at 1975 values. Applicable across models
    and countries.
  16: Marginal effects on obesity are estimated across variables such as GDP per capita,
    adult average age, and years of schooling, with analyses for adult male and female
    obesity rates.
  17: "The analysis examines the impact of warming on obesity using geographic region\
    \ exclusion and alternative temperature measures like 3\xB0C bins for country-level\
    \ analysis."
  18: The analysis uses a bins model to estimate the marginal effect of temperature
    on obesity, considering seasonal temperature variation across countries and using
    a polynomial model as a baseline.
  19: The analysis uses models (9) and (10) and clusters standard errors at the country
    level. Seasonal definitions are based on ranking of monthly mean temperatures.
  20: The paper uses a seasonal model with country fixed effects to analyze the effect
    of temperature increases in different seasons on obesity rates. They also examine
    the effect of within-year temperature variation on obesity, using a third-degree
    polynomial of temperature variation in a modified baseline model.
  21: The analysis uses a modified version of a baseline model (equation 13) to estimate
    the impact of positive temperature shocks on obesity, using a third-degree polynomial
    of the temperature shock variable. Temperature shock is measured by the count
    of months in each year that exceed one standard deviation from the average temperature
    for that month over the past 30 years.
  22: The response function of obesity to temperature shocks is constructed based
    on estimates from model (13).
  24: The analysis relies on modified versions of model (1) for short-run estimates
    and model (6) for long-run impacts, using a third-degree temperature polynomial
    and accounting for interaction effects with income.
  25: Analysis is based on a long-run model using a third-degree temperature polynomial
    over a 30-year period, showing effects with 95% confidence intervals and differences
    purely driven by temperature.
  26: 'Predictions are made in three steps: (1) estimate nonlinear marginal effects
    of temperature on obesity using a third-degree version of model (1); (2) combine
    the estimated nonlinear marginal effects with the mean temperature of each country
    to calculate the country-level marginal effect; (3) multiply the country-level
    marginal effects with the predicted warming in each country to determine the projected
    effect of global warming on obesity in each respective country.'
  27: Combines estimated marginal effects of temperature on obesity with projected
    warming under SSP2-4.5 scenario. Compares short-run and long-run models to infer
    adaptation.
  28: The analysis uses short-run and long-run models to estimate the effects of warming
    on obesity, considering country-specific marginal effects and predicted warming.
    The difference between the models is used to infer potential adaptation. The models
    account for income and cumulative effects over time.
  29: The study uses plausibly exogenous year-to-year temperature fluctuations to
    estimate the causal effect of global warming on obesity and compares baseline
    models with long-difference models to infer the effect of long-term adaptation.
More Notes:
  3: The study estimates that global warming will increase the number of obese adults
    worldwide by 89.9 million from 2016 to 2050, potentially leading to an economic
    loss of US $276.6 billion.
  4: The study is claimed to be the first to directly examine the overall impact of
    warming on obesity based on long-run global data and to evaluate the potential
    of long-run adaptation in offsetting this impact.
  7: The analysis focuses on climate change predictions from 2016 to 2050, based on
    gridded monthly projection data under the SSP5-8.5 scenario. Socioeconomic variables
    like GDP per capita, population size, crude death rate, average age, adult years
    of schooling, and total carbon emissions are used as control variables, mediators,
    or moderators.
  9: The paper explores alternative temperature measures including temperature bins,
    within-year temperature variation, seasonal mean temperature, and positive temperature
    shocks.
  11: The moderating effect of income (GDP per capita) on the relationship between
    temperature and obesity appears to be limited.
  12: "The robustness of the baseline estimates concerning omitted variables, \uFB01\
    xed effects, and population weights is examined, finding similar estimated effects\
    \ even when control variables are excluded."
  15: The analysis suggests that wealth may provide resilience to the impacts of warming
    on obesity, potentially through increased adaptation measures like air conditioning.
    The elderly may be more vulnerable due to lower adaptation abilities and increased
    susceptibility to obesity.
  18: The analysis differentiates seasons based on temperature rankings across the
    year rather than following traditional seasonal definitions to accommodate variations
    across regions and hemispheres.
  19: "The sixth temperature bin (12-15\xB0C) was excluded due to perfect collinearity."
  20: The seasonal model provides additional information on the timing of warming
    effects on obesity compared to a baseline model using annual average temperature.
    The seasonal model does not capture nonlinear effects observed when temperatures
    are very high.
  21: The study finds a pattern of the effect of positive temperature shocks on obesity
    consistent with the effect pattern of annual mean temperature found in the baseline
    model.
  22: The paper discusses potential mechanisms through which global warming may affect
    obesity, including impacts on calorie intake (via income, food prices, consumption
    preferences) and calorie expenditure (via working hours, physical activity, minimum
    calorie requirements), and macro-level population structure (birth rates, death
    rates, migration patterns).
  26: Appendix Figures A.3, A.4, and A.5 provide additional details regarding projected
    warming and predicted impacts under different emissions scenarios.
  27: The analysis distinguishes between short-run and long-run impacts and considers
    the potential for adaptation. The maps present percentage point changes in obesity.
  29: The study notes limitations due to the lack of long-term sub-country data on
    obesity and annual data on population BMI scales, which restricts the ability
    to analyze effects within countries and across different weight categories.
Quantitative material:
  1: "A 1\xB0C increase in annual mean temperature is estimated to result in a worldwide\
    \ increase in obese adults by 79.7 million, or 12.3%."
  2: "Using data from 1975 to 2016 for 152 countries accounting for 99.1% of the world\u2019\
    s population, the study employs a panel model to identify the causal effect of\
    \ warming on obesity."
  3: "A 1\xB0C increase in temperature ranged from -0.56 to 1.87% across the 152 countries,\
    \ with a population-weighted average of 1.06% marginal effect on obesity."
  4: The study examines the effect of global warming on obesity (defined as a BMI
    exceeding 30 kg/m2).
  5: "Uses data from 1975 to 2016 for 152 countries. These countries collectively\
    \ represented 99.1% of the world\u2019s population in 2000."
  6: "Annual mean temperature distribution illustrates that more countries have higher\
    \ annual mean temperatures, particularly in the 25-30\xB0C range."
  7: "The analysis aims to estimate coefficients (\u03B1j and \u03B4) that quantify\
    \ the relationship between temperature, control variables, and the adult obesity\
    \ rate."
  9: Equation (5) models the marginal effect of temperature on obesity as a function
    of temperature and average income. Equation (6) models the long-run impact of
    temperature on obesity as a function of long-term temperature trends and income,
    with controls for other variables.
  10: The baseline estimates indicate that warming has a significantly positive impact
    on the adult obesity rate.
  11: "Warming has a significantly positive impact on the adult obesity rate for most\
    \ countries, except for 21 tropical countries with an annual mean temperature\
    \ above 27 \xB0C, where it has a reducing effect."
  12: "A 1\u25E6C increase in temperature on obesity ranged from \u2212 0.56 to 1.87\
    \ percentage points across countries, with a population-weighted country average\
    \ of 1.06 percentage points. Based on an estimated global population of 7.49 billion\
    \ in 2016, this suggests that a 1\u25E6C increase in annual mean temperature results\
    \ in 79.7 million more obese adults worldwide."
  13: The analysis presents curves showing the relationship between obesity rates
    and temperature, with variations under different control conditions.
  15: A one-unit increase in log GDP per capita would reduce the impact of warming
    on obesity by 0.202 percentage points. A 1-year increase in the adult average
    age would raise the impact of warming on obesity by 0.026 percentage points. A
    1-year increase in the average schooling of adults would increase the impact of
    warming on obesity by 0.019 percentage points.
  16: "A 1\xB0C increase in annual mean temperature increases male obesity rate by\
    \ 1.28 percentage points."
  17: An increase in the female obesity rate by 0.81 percentage points is quantified.
  18: 'Estimated coefficients for season-associated temperature impacts on obesity
    are: season 1: -0.19, season 2: 0.04, season 3: 0.70, season 4: 0.82.'
  19: The paper presents marginal effects on obesity rate in percentage points (ppt)
    for different temperature bins and seasons.
  20: The paper doesn't give specific quantitative findings on this page but rather
    discusses model settings and estimated coefficients.
  21: The relationship between temperature variation (1-13 degrees Celsius) and obesity
    rate (0-30%) is illustrated in a graph. Positive temperature shocks initially
    enhance and then reduce adult obesity rate.
  22: The line graph shows that as months with positive temperature shocks increase,
    the obesity rate also tends to increase, peaking between 8 and 9 months.
  24: The page provides graphical data showing relationships between temperature and
    nutritional/physical factors, along with confidence intervals.
  25: "Presents threshold temperatures estimated by models: 18.5\xB0C for the long-run\
    \ model and 27.3\xB0C for the short-run model; also mentions temperature-related\
    \ increasing and decreasing trends in obesity."
  26: Short-run model indicates global warming is likely to increase obesity in the
    majority of countries. 77 countries are expected to experience an impact greater
    than 1 percentage point, 41 with an impact exceeding 2 percentage points, and
    7 with an impact surpassing 3 percentage points. Population-weighted average impact
    of warming on obesity across 152 sample countries is 1.2 percentage points compared
    to the global obesity rate of 17.8% in 2016. Global warming will increase the
    number of obese individuals worldwide by 89.9 million from 2016 to 2050. Economic
    loss of approximately $276.6 billion by increasing obesity worldwide.
  27: Global warming from 2016 to 2050 would result in 76.8 million more obese individuals
    in temperate zones and 106.9 million fewer obese individuals in subtropical and
    tropical zones.
  29: "The analysis estimates that a 1\xB0C rise in annual mean temperature would\
    \ increase the number of obese adults worldwide by 12.3%."
sourcematerial:
  1: "Source material: \"This study identifies obesity as an important channel through\
    \ which global warming affects human capital. By analyzing plausibly exogenous\
    \ year-to-year temperature fluctuations in 152 countries from 1975 to 2016, we\
    \ find that global warming has significantly increased obesity rates in countries\
    \ located in temperate zones, while only causing a reduction in a small number\
    \ of tropical countries. The estimates suggest that a 1\xB0C increase in the annual\
    \ mean temperature would result in a worldwide increase in obese adults of 79.7\
    \ million, or 12.3%.\""
  2: "Global warming is expected to have a substantial impact on human obesity...\
    \ This study estimates the overall impact of global warming on adult obesity and\
    \ investigates the potential of adaptation in offsetting this impact. Using data\
    \ from 1975 to 2016 for 152 countries, which collectively account for 99.1% of\
    \ the world\u2019s population, we employ a panel model that relies on plausibly\
    \ exogenous year-to-year temperature fluctuations to identify the causal effect\
    \ of warming on obesity."
  3: "The estimates suggest that global warming significantly increased obesity rates\
    \ in countries within temperate zones while reducing obesity only in 21 tropical\
    \ countries.\n\nThe marginal effect on obesity of a 1\xB0C increase in temperature\
    \ ranged from \u22120.56 to 1.87% across the 152 countries, with a population-weighted\
    \ average of 1.06%.\n\nCombining these estimates with global warming projections,\
    \ we estimate that global warming will increase the number of obese adults worldwide\
    \ by 89.9 million from 2016 to 2050. A simple back-of-the-envelope calculation\
    \ suggests that global warming could lead to an economic loss of US $276.6 billion\
    \ by contributing to the rise of obesity worldwide.\n\nThe baseline model utilizes\
    \ a third-degree temperature polynomial to account for the nonlinear impact of\
    \ temperature on obesity. To infer the effect of long-term adaptation, we also\
    \ estimate a 'long-difference' model that relies on long-term temperature trends\
    \ to identify the impact.\n\nThis study makes a significant contribution to the\
    \ literature on the impact of global warming on obesity."
  4: "Source material here.\n\"The paper evaluates the impact of global warming on\
    \ obesity...our study is the first to directly examine the overall impact of warming\
    \ on obesity based on long-run global data and to evaluate the potential of long-run\
    \ adaptation in offsetting this impact.\" \n\"Global warming...could contribute\
    \ to an increase in obesity.\"\n\"The study examines the effect of global warming\
    \ on obesity (defined as a BMI exceeding 30 kg/m2).\"\n\"Our findings suggest\
    \ that obesity is an important pathway through which global warming can detrimentally\
    \ affect human capital and economic outcomes.\"\n\"We examine the effect of global\
    \ warming on obesity (defined as a BMI exceeding 30 kg/m2)...our study additionally\
    \ evaluates the extent to which long-run adaptation could offset the impact of\
    \ global warming on obesity.\"\n"
  5: "Source material: The primary outcome variable in our analysis is the adult obesity\
    \ rate, defined as the percentage of adults with a body mass index equal to or\
    \ greater than 30. The key climate variable utilized in this study is the annual\
    \ mean temperature. In robustness checks, we also employ four other temperature\
    \ measures: temperature bins, seasonal mean temperature, temperature variation,\
    \ and temperature shocks. The climate data is obtained from the Climatic Research\
    \ Unit, one of the most widely used observed climate datasets. We calculate country-level\
    \ climate measures as the population-weighted average across all climate grids\
    \ within each country. Our primary analysis uses data from 1975 to 2016 for 152\
    \ countries (listed in Table A.1) with a population size larger than half a million\
    \ in 2000. These countries collectively represented 99.1% of the world\u2019s\
    \ population in 2000."
  6: "yaml\nDrivers of Risk: \"We utilize multi-model ensemble climate projections\
    \ from the Coupled Model Inter-Comparison Project Phase 6 (CMIP6) for three emissions\
    \ scenarios: a low emissions scenario (SSP1-1.9), an intermediate emissions scenario\
    \ (SSP2-4.5), and a high emis-\"\nQuantitative material: \"Distribution of the\
    \ annual mean temperature across the 152 sampled countries, averaged from 1975\
    \ to 2016\"\nMethodology: \"We utilize multi-model ensemble climate projections\
    \ from the Coupled Model Inter-Comparison Project Phase 6 (CMIP6) for three emissions\
    \ scenarios: a low emissions scenario (SSP1-1.9), an intermediate emissions scenario\
    \ (SSP2-4.5), and a high emis-\"\nHighlights: \"Each dot in the \uFB01gure represents\
    \ the obesity rate in one of the 152 sampled countries in 1975 (blue) or 2016\
    \ (red). [...] In 2016, red dots show a broader spread across the x-axis, suggesting\
    \ a wider range of GDP per capita, accompanied by higher obesity rates in many\
    \ cases.\"\n"
  7: null
  8: "The paper evaluates the causal effect of temperature on obesity with the statement:\
    \ \"to capture the causal effect of temperature on obesity.\" The examination\
    \ of temperature fluctuations as a shock impacting obesity outcomes is indicated\
    \ by: \"Temperature fluctuations, being random...allow the coefficient \u03B1\
    \ j to capture the causal effect of temperature on obesity.\" The methodology\
    \ is described as using \"a J-degree temperature polynomial to capture the well-documented\
    \ nonlinear effect of temperature\" and also incorporating \"the interaction between\
    \ income and the temperature polynomial\" to assess variations in the impact."
