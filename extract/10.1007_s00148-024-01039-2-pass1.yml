  28: 'Source material: Given that individuals are more likely to adapt to long-term
    trends than to short-term fluctuations, the difference between these two models
    reflects the effect of adaptation. Specifically, by combining the estimated country-specific
    marginal effects of warming based on the short-run model with the country-level
    predicted warming, panel A of Fig. 14 presents the estimated short-run impact
    of global warming. Likewise, by combining the estimated country-specific marginal
    effects of warming based on the long-run model with the country-level predicted
    warming, panel B of Fig. 14 presents the estimated long-run impact of global warming.
    Finally, the difference between the estimated long-run and short-run impacts,
    as reported in panel C of Fig. 14, captures the potential for adaptation. It reveals
    that the long-run model predicts a more positive impact in temperate zones but
    a more negative impact in subtropical and tropical zones. This finding suggests
    that long-term adaptation does not significantly reduce the impact of warming
    on obesity. The greater positive impact in temperate zones suggests that the cumulative
    effect over time outweighs the effect of adaptation. Conversely, the more negative
    impact in subtropical and tropical zones likely reflects that warming reduces
    income and, consequently, long-term consumption in these economically disadvantaged
    areas. While obesity represents one of the most significant challenges in modern
    society, and global warming is expected to have a substantial impact on human
    obesity, existing studies have not thoroughly examined this impact.'
  29: "Source material here. \"The impact of global warming on obesity, subsequently\
    \ impacting human capital and economic performance. Our study aims to address\
    \ this gap in the literature.\" \"We estimate the causal effect of global warming\
    \ on obesity using plausibly exoge- nous year-to-year temperature \uFB02uctuations.\"\
    \ \"The estimates suggest that global warming signi\uFB01cantly increased obesity\
    \ in most countries, with the exception of a small number of tropical countries.\"\
    \ \"We estimate that a 1\u25E6 C rise in annual mean temperature would increase\
    \ the number of obese adults worldwide by 12.3%.\" \"Moreover, we identify substantial\
    \ heterogeneity in the impact across countries in various regions and with differing\
    \ income levels, age structures, and education levels.\" \"Finally, we infer the\
    \ effect of long-term adaptation by comparing the baseline model with a long-difference\
    \ model.\" \"Our findings indicate that long-term adaptation may not significantly\
    \ mitigate the impact of global warming on obesity in temperate zones.\" \"First,\
    \ due to the lack of long-term sub-country data on obesity for most countries,\
    \ we are unable to provide a within-country analysis with a reasonably large sample\
    \ size.\" \"Second, due to the lack of annual data on the share of the population\
    \ with different BMI scales, this study focuses explicitly on the effect of global\
    \ warming on obesity.\" \"Therefore, this study only captures the country-average\
    \ effects of warming on obesity, and the effects on different regions of a large\
    \ country could be very different.\""
