  6: "This paper analyzes the trends in Sea Surface Temperature (SST), Vertical Wind\
    \ Shear (VWS), and Relative Humidity (RH) from 1979\u20132020. It provides specific\
    \ quantitative data for nearshore and offshore regions: nearshore VWS trend is\
    \ -0.026 ms\u207B\xB9 year\u207B\xB9, offshore VWS trend is -0.011 ms\u207B\xB9\
    \ year\u207B\xB9, and the nearshore RH trend is 0.057% year\u207B\xB9. The weakening\
    \ of global nearshore VWS, especially near the East Asian and Australian coasts,\
    \ and increases in RH near the US and Australian coasts are noted as drivers making\
    \ the environment more favorable for storm development in nearshore regions. The\
    \ data come from the UK Met Office's Hadley Center for SST and NCEP-DOE II reanalysis\
    \ for atmospheric conditions. Results are corroborated by substituting ERA5 reanalysis\
    \ data, indicating robustness to data sources."
