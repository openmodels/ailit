  8: "Source material here.\nDrivers of Risk: \"Probability distributions of TC intensification\
    \ rates based on HighResMIP suggest that in the nearshore region TCs will continue\
    \ to strengthen faster in the future climate.\"\nQuantitative material: \"The\
    \ mean intensification rate for the historical period of 1979\u20132014 is -0.07\
    \ kt/6-hr, and it increases to 0.03 kt/6-hr for the future period of 2015\u2013\
    2050.\"\nMethodology: \"TC track data are obtained from five fully coupled climate\
    \ models belonging to HighResMIP. The historical period covers the years 1979\u2013\
    2014, while the future period spans 2015\u20132050. The future climate is based\
    \ on the \u201CSSP585\u201D emissions scenario in which the radiative forcing\
    \ of greenhouse gases is expected to reach 8.5 Wm\u22122 by the end of 21st century.\
    \ TC track data is subsampled to ensure that the distributions of TC initial intensity\
    \ and translation speed are statistically similar for the two comparative periods\
    \ and that any two track locations are at least 18 hr apart for sample independence.\
    \ Throughout the study, we used a distance threshold of \u223C3\xB0 to identify\
    \ \u201Cnearshore\u201D regions.\"\nHighlights: \"Probability distributions of\
    \ TC intensification rates suggest that in the nearshore region TCs will continue\
    \ to strengthen faster in the future climate. Further, there are increases in\
    \ mean intensification rate in all coastal areas except near the west coast of\
    \ Mexico and the Australian coast.\"\nMore Notes: \"Note that the mean intensification\
    \ rate is weaker in HighResMIP relative to observations, likely because of limitations\
    \ simulating intense storms. Locations where the intensity of the TC is below\
    \ \u201CTropical Storm\u201D strength (34 kt) are excluded from our analysis.\
    \ Further sensitivity analysis with a varying distance threshold shows that our\
    \ results are not overly sensitive to the threshold used for nearshore regions.\"\
    \n"
  9: " \nProjected changes in the mean nearshore and offshore TC intensification rates\
    \ for major coastlines for the 72\u2010year period 1979-2050. Nearshore Intensification\
    \ rate (kt 6-hr-1) for US East and Gulf coasts is 0.11. TC track data are based\
    \ on 5 fully coupled climate models from HighResMIP. Data for the period 1979-2014\
    \ are from the \u201Chist-1950\u201D simulations, data for the period 2015-2050\
    \ are from the \u201Chighres-future\u201D simulations. A Student's t-test for\
    \ difference of means is used to determine statistical significance. The analysis\
    \ demonstrates that the most significant increase in TC intensification occurs\
    \ in proximity to the coastline. A stronger decrease in VWS and a larger increase\
    \ in RH near the coast relative to offshore regions are responsible for the greater\
    \ increase in nearshore TC intensification.\n"
  10: "Source material here.\nProjected changes in vertical wind shear (VWS) can impact\
    \ outcomes, as studied between the near-future (2015\u20132034) and late 21st\
    \ century (2081\u20132100) under the SSP585 emissions scenario. The study compares\
    \ changes in VWS using CMIP6 climate models and the Simplified Wind Model (SWM),\
    \ assessing contributions from diabatic heating, zonal-mean basic state, and transient\
    \ forcing. The page presents projected VWS changes as calculated by 15 CMIP6 models,\
    \ with color gradients indicating magnitudes from -5.0 to +5.0. The SWM shows\
    \ the ability to reproduce the overall spatial pattern of VWS changes, particularly\
    \ in coastal areas with decreasing VWS. \n"
  11: "  \n\"the shear response along the US coast and Mexican west coast is linked\
    \ to anomalous heating forced by anthropogenic warming\"\n\n\"the meridional dipole\u2010\
    like response of VWS over the Central and North American region is mainly excited\
    \ by enhanced heating over the tropical eastern Pacific, with a secondary contribution\
    \ from anomalous diabatic cooling over the tropical North Atlantic\"\n\n\"climate\
    \ change\u2010induced anomalous heating has contrasting effects on the VWS in\
    \ various regions of Asia\"\n"
