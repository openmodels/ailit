Drivers of Risk:
  1: Increases in relative humidity and decreases in vertical wind shear are impacting
    nearshore tropical cyclone intensification rates.
  2: Rapid intensification of tropical cyclones, SST, vertical wind shear (VWS), RH.
  4: The paper examines changes in nearshore tropical cyclone (TC) intensification
    rates over time.
  5: "Broad warming of the upper ocean observed over several regions, with La Ni\xF1\
    a-like cooling in the eastern tropical Pacific."
  6: Weakening of global nearshore vertical wind shear (VWS), particularly near the
    East Asian and Australian coasts; Positive trend in nearshore relative humidity
    (RH), dominated by increases near the US and Australian coasts; Changes in sea
    surface temperature (SST).
  7: Environmental changes such as increases in sea surface temperature, variations
    in wind speed, and relative humidity trends are impacting the intensification
    of nearshore tropical cyclones.
  8: Nearshore tropical cyclones (TCs) and their intensification rates are considered
    as drivers of risk.
  9: Nearshore SST trend, decreasing VWS trend in the nearshore region, increasing
    RH trend in the nearshore region.
  10: "Projected changes in vertical wind shear (VWS) can impact outcomes, as studied\
    \ between the near-future (2015\u20132034) and late 21st century (2081\u20132100)\
    \ under the SSP585 emissions scenario."
  11: Anthropogenic warming is linked to anomalous heating affecting vertical wind
    shear along the US coast and Mexican west coast.
  12: Faster warming in the tropical upper atmosphere expected during the late 21st
    century.
  13: No relevant information
Evaluation overview:
  2: TCs that undergo rapid intensification shortly before landfall pose a major threat
    to coastal communities.
  4: No relevant information
  6: No relevant information
  8: No relevant information
  9: TC intensification rate (kt 6-hr-1).
  12: Heightened nearshore intensification rate implies a potential strengthening
    of landfalling tropical cyclones' destructive capacity.
  13: No relevant information
Highlights:
  1: Nearshore tropical cyclone intensification has increased, mainly due to decreases
    in vertical wind shear; future increases in intensification rates are projected
    under global warming.
  4: There is a noticeable change in global 24-hr nearshore TC intensification rates
    from 1979 to 2020, with statistically significant differences observed.
  5: Statistically significant increase in nearshore TC intensification rate near
    the US East and Gulf coasts, Southeast African coast, and Australian coast compared
    to corresponding offshore regions.
  6: The large-scale environment has become more favorable for storm development in
    the nearshore region compared to the offshore region.
  7: "The key outcome is a significant rise in the average intensification rate of\
    \ nearshore tropical cyclones on a global scale during 1979\u20132020."
  8: Probability distributions of TC intensification rates suggest that nearshore
    TCs will strengthen faster in the future climate. There are increases in mean
    intensification rate in all coastal areas except near the west coast of Mexico
    and the Australian coast. The change in nearshore TC intensification is greater
    than in offshore regions where there is an increase.
  9: Increase in TC intensification occurs in proximity to the coastline. Stronger
    decrease in VWS and larger increase in RH near the coast relative to offshore
    regions are responsible for the greater increase in nearshore TC intensification.
  10: SWM shows the ability to reproduce the overall spatial pattern of VWS changes,
    particularly in coastal areas with decreasing VWS.
  11: Changes in vertical wind shear patterns are driven by anomalous heating over
    the tropical eastern Pacific and secondary contributions from cooling over the
    tropical North Atlantic, impacting regions such as Northeast Asia and the North
    Indian Ocean.
  12: Potential strengthening of landfalling tropical cyclones' destructive capacity
    primarily from maximum intensity and inner-core precipitation.
  13: No relevant information
Methodology:
  1: The analysis was performed using a suite of observations and high-resolution
    climate model simulations, including idealized numerical experiments with an intermediate
    complexity model.
  2: Examines observed changes in nearshore TC intensification and the large-scale
    environment over the historical period, projects changes into the future using
    climate model simulations, and delves into the responsible mechanisms using idealized
    numerical model experiments. Uses TC track data, SST, winds, relative humidity,
    sea-level pressure and air temperature data.
  3: TC intensification rate is estimated as the linear regression coefficient of
    the storm maximum wind speed over five successive 6-hour track locations.
  4: A Student's t-test is used to assess the statistical significance of changes
    in TC intensification rates, with probability distributions sub-sampled to ensure
    statistical similarity between periods.
  5: Analysis uses TC track data from IBTrACS; the study examines changes in mean
    intensification rates across different world coastlines.
  6: "Analysis of SST, VWS, and RH trends from 1979\u20132020, averaged over June-October\
    \ (Northern Hemisphere) and December-April (Southern Hemisphere). SST data from\
    \ UK Met Office's Hadley Center. Atmospheric winds and humidity from NCEP-DOE\
    \ II reanalysis. Statistical significance assessed at the 5% level."
  7: "The analysis is performed based on trends from Hadley SST data and NCEP\u2010\
    DOE II atmospheric reanalysis, along with qualitative assessments using HighResMIP\
    \ climate simulations."
  8: "TC track data are obtained from five fully coupled climate models belonging\
    \ to HighResMIP. The historical period covers 1979\u20132014, and the future period\
    \ spans 2015\u20132050 based on the SSP585 emissions scenario. TC track data is\
    \ subsampled to ensure statistically similar distributions of TC initial intensity\
    \ and translation speed. A distance threshold of \u223C3\xB0 is used to identify\
    \ \u201Cnearshore\u201D regions."
  9: "Analysis based on 5 fully coupled climate models from HighResMIP. Data for 1979-2014\
    \ from \u201Chist-1950\u201D simulations, data for 2015-2050 from \u201Chighres-future\u201D\
    \ simulations. Student's t-test used for statistical significance. SWM model used\
    \ to understand physical mechanisms driving changes in atmospheric circulation."
  10: The study compares changes in VWS using CMIP6 climate models and the Simplified
    Wind Model (SWM), assessing contributions from diabatic heating, zonal-mean basic
    state, and transient forcing.
  12: The study uses SWM experiments to identify factors responsible for reducing
    shear over Northeast Asia.
  13: This research utilized computational resources from the National Energy Research
    Scientific Computing Center, a U.S. DOE User Facility.
More Notes:
  4: No relevant information
  6: Substituting ERA5 reanalysis data leads to consistent conclusions, indicating
    findings are not sensitive to specific data sources.
  8: The mean intensification rate is weaker in HighResMIP relative to observations,
    likely because of limitations simulating intense storms. The study focuses on
    TC track locations near all major coastlines, excluding locations where TC intensity
    is below Tropical Storm strength (34 kt). Sensitivity analysis with varying distance
    thresholds shows the results are not overly sensitive to the threshold used for
    nearshore regions.
  12: SWM simulations are used to explore drivers of tropical cyclone intensification
    in relevant regions.
  13: No relevant information
Quantitative material:
  1: "Observations reveal a global mean tropical cyclone intensification rate increase\
    \ of about 3 kt per 24-hour in near-coastal regions over the period 1979\u2013\
    2020."
  2: Uses TC track data from 1979-2020 (IBTrACS), 1978-2017 (ADT-HURSAT), and model
    simulations from 1979-2050 and 2015-2100.
  4: "Probability distributions of 24-hr TC intensification rates for the periods\
    \ 1979\u20131999 and 2000\u20132020 are shown with a noted p-value of 0.04, indicating\
    \ statistical significance in the changes."
  5: "Nearshore SST and offshore SST have a warming rate of about 0.014\xB0C per year."
  6: "Nearshore VWS trend: -0.026 ms\u207B\xB9 year\u207B\xB9; Offshore VWS trend:\
    \ -0.011 ms\u207B\xB9 year\u207B\xB9; Nearshore RH trend: 0.057% year\u207B\xB9\
    ."
  7: "Quantitative trends reported include: Coastal SST increase of 0.014 \xB0C per\
    \ year, Offshore SST increase of 0.004 \xB0C per year, Coastal wind speed decrease\
    \ of 0.026 m/s per year, Offshore wind speed increase of 0.005 m/s per year, Coastal\
    \ RH increase of 0.057 % per year, Offshore RH increase of 0.011 % per year."
  8: "The mean TC intensification rate for the historical period of 1979\u20132014\
    \ is -0.07 kt/6-hr, and it increases to 0.03 kt/6-hr for the future period of\
    \ 2015\u20132050."
  9: "Projected changes in the mean nearshore and offshore TC intensification rates\
    \ for major coastlines for the 72\u2010year period 1979\u20132050. Nearshore intensification\
    \ rate change for US East and Gulf coasts is 0.11 kt 6-hr-1."
  10: The page presents projected VWS changes as calculated by 15 CMIP6 models, with
    color gradients indicating magnitudes from -5.0 to +5.0.
  13: No relevant information
sourcematerial:
  1: 'Source material here.Observations reveal a global mean TC intensification rate
    increase of about 3 kt per 24-hour in regions close to the coast. Analysis of
    the observed large-scale environment shows that stronger decreases in vertical
    wind shear and larger increases in relative humidity relative to the open oceans
    are responsible. Further, high-resolution climate model simulations suggest that
    nearshore TC intensification will continue to rise under global warming. Idealized
    numerical experiments with an intermediate complexity model reveal that decreasing
    shear near coastlines, driven by amplified warming in the upper troposphere and
    changes in heating patterns, is the major pathway for these projected increases
    in nearshore TC intensification.

    '
  2: "Source material: TCs that undergo rapid intensification shortly before landfall\
    \ pose a major threat to coastal communities, and theory suggests such events\
    \ are expected to become more frequent and severe as the climate continues to\
    \ warm... examine observed changes in nearshore TC intensification and the large\u2010\
    scale environment over the historical period, project changes into the future\
    \ using climate model simulations... TC track data obtained from the International\
    \ Best Track Archive for Climate Stewardship (IBTrACS) are used to estimate 24\u2010\
    hr TC intensification rates for the 42\u2010year period 1979\u20132020. Similarly,\
    \ TC track data based on the Advanced Dvorak Technique\u2010Hurricane Satellite\
    \ record (ADT\u2010HURSAT) are also used to compute TC intensification rates...\
    \ We also obtain monthly mean winds, relative humidity (RH), sea\u2010level pressure\
    \ and air temperature for the same period... tracks from the \u201Chist\u2010\
    1950\u201D simulations covering the 36\u2010year period 1979\u20132014, and tracks\
    \ from the \u201Chighres\u2010future\u201D simulations covering the 36\u2010year\
    \ period 2015\u20132050 are used... This data is assessed for the 86\u2010year\
    \ timeframe from 2015 to 2100, considering the \u201CSSP585\u201D emissions scenario."
  3: "Source material here.\nTo better understand projected VWS changes in the nearshore\
    \ regions of the Northern Hemisphere, we apply a time\u2010dependent, primitive\
    \ equation anomaly model to conduct numerical sensitivity experiments. The Stationary\
    \ Wave Model (SWM) (Ting & Yu, 1998) used in this study is the dry dynamical core\
    \ of the NOAA/GFDL spectral model, with R30 horizontal resolution (roughly 2.25\xB0\
    \ latitude \xD7 3.75\xB0 longitude) and 24 vertical sigma layers. Furthermore,\
    \ various damping terms including Rayleigh friction, Newtonian cooling, and biharmonic\
    \ diffusion are used in the SWM to prevent model\u2010generated baroclinic instability\
    \ and obtain a quasi\u2010steady solution... All SWM simulations are run for 100\
    \ days, and a quasi\u2010steady state is reached by day 30. The average from days\
    \ 31 to 100 is presented for the following results... Following a previously used\
    \ experimental design (Balaguru et al., 2023a), here we perform five independent\
    \ integrations using the SWM. Our control experiment (CTRL) solves deviations\
    \ in surface pressure, three\u2010dimensional temperature, and winds from the\
    \ zonally symmetric climate during the near\u2010future period of 2015\u20132034...\
    \ Additionally, we investigate the individual contributions of the anomalous basic\
    \ state, diabatic heating, and transient forcing to the projected response in\
    \ VWS through a series of sensitivity runs, labeled as: CTRL+\u0394BS, CTRL+\u0394\
    DH, and CTRL+\u0394TranF, respectively... The TC intensification rate is estimated\
    \ as the linear regression coefficient of the storm maximum wind speed over five\
    \ successive 6-hr track locations.\n"
