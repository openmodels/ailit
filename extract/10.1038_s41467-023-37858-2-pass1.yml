Drivers of Risk:
  1: Coral reef degradation, sea-level rise, and storm impact changes are impacting
    coastal flooding risks.
  2: Reef degradation and sea-level rise are identified as drivers that could impact
    coastal flooding.
  3: The study considers thermal-stress events, Stony Coral Tissue-Loss Disease (SCTLD),
    and climate-related mortality as risks impacting coral survival and restoration
    efforts.
  4: Sea-level rise and increased wave energy due to greater water depths, leading
    to larger wave propagation across reefs and higher coastal flooding potential.
  5: Sea-level rise and coral-reef bathymetry changes, including reef erosion, are
    significant drivers impacting total water levels and coastal flooding potential.
  6: Climate change, coral loss, episodic natural events like hurricanes, and the
    disease SCTLD are identified as key drivers of risk impacting coral reefs.
  7: Sea-level rise (specifically under different CO2 emission scenarios), increased
    frequency of severe storms due to climate change, high bioerosion rates, and the
    omission of non-biological erosion processes (physical erosion and chemical dissolution).
  8: Climate change-induced sea-level rise and extreme weather events such as storms
    are increasing coastal flooding and erosion.
  9: Physical erosion, chemical dissolution, and bioerosion by parrotfish impact reef
    accretion potential.
  10: Climate change impacts such as increased storm frequency and intensity could
    affect A. palmata populations.
  11: Sea-level rise and reef-building coral loss are impacting coral reef growth.
  12: No relevant information
  13: Coral reef degradation is identified as a risk factor affecting coastal hazard
    risk reduction.
Evaluation Overview:
  13: The paper rigorously values the role of U.S. coral reefs in coastal hazard risk
    reduction.
Evaluation overview:
  1: The paper evaluates the potential for coral reef restoration to mitigate coastal
    flooding as sea levels rise.
  2: The study evaluates the impacts of reef degradation on coastal flooding at Buck
    Island Reef National Monument.
  3: This paper evaluates the potential impacts of restoring reef-building corals,
    specifically Acropora palmata, on reef accretion and coral cover at Buck Island
    Reef National Monument (BIRNM).
  4: The evaluation focuses on how increased Acropora palmata cover through restoration
    can help reef-crest habitats keep pace with future sea-level rise and mitigate
    coastal flooding during storms.
  5: The study evaluates the capacity of coral reefs to keep pace with sea-level rise,
    which is central to their ability to provide shoreline protection to coastal communities.
  6: The study evaluates the reef-accretion potential and coastal protection role
    of the southern reef crest at BIRNM against risks from climate change and natural
    impacts.
  7: The paper evaluates the potential for coral reef restoration, specifically of
    *Acropora palmata*, to mitigate coastal flooding and maintain reef accretion in
    the face of sea-level rise.
  8: The study evaluates the potential of coral reef restoration to mitigate impacts
    of sea-level rise and coastal flooding by the end of the century.
  9: The analysis examines potential impacts of reef degradation on total water levels
    and explores the effects of restoring reef-building corals on reef accretion potential
    at BIRNM.
  10: The study evaluates population survival and reef-accretion potential of A. palmata.
  11: This page discusses reef-building loss and the emergence of novel coral-reef
    assemblages.
  12: No relevant information
Highlights:
  1: Successful restoration of Acropora palmata could reverse reef erosion and mitigate
    extreme impacts of coastal flooding.
  2: Reef erosion is identified as contributing to increased flooding potential, and
    only five sites had positive reef-accretion potential.
  3: "Restoration of A. palmata has the potential to increase coral cover and reef\
    \ accretion, potentially allowing the reef crest at BIRNM to keep pace with low\
    \ to intermediate-low sea-level rise predictions. However, the long-term success\
    \ of restoration depends on factors such as local management, global reduction\
    \ of carbon emissions, and recovery of ecological processes. A sustained increase\
    \ of 30% A. palmata cover could increase reef-accretion potential on the BIRNM\
    \ reef crest to 7.38 mm y\u22121 (\xB10.60) on average."
  4: Restoration can potentially allow reef-crest habitats to keep pace with lower
    sea-level-rise scenarios and reduce coastal flooding impacts from major hurricanes
    by reducing wave-driven increases in total water levels.
  5: Reef accretion potential at Buck Island Reef National Monument (BIRNM) is now
    substantially lower than historical rates, and erosion has become the dominant
    process.
  6: A significant effort to restore A. palmata populations at BIRNM could result
    in substantial and sustained increases in coral cover and reef-accretion potential
    till the end of the century.
  7: "Restoration of *A. palmata* cover to \u2265 36% total cover could allow reefs\
    \ to keep pace with lower sea-level rise projections and reduce storm surge impacts.\
    \  The benefits of coastal protection could offset the high upfront costs of reef\
    \ restoration."
  8: Coral restoration can minimize climate-change impacts, enhance reef accretion,
    reduce coastal flooding risks, and protect reef structure against erosion.
  9: Restoring A. palmata could significantly enhance reef accretion potential, which
    may improve coastal hazards protection.
  10: A. palmata survival could range from 20% to 80% by 2100; the study highlights
    the importance of fragmentation in population sustainability.
  12: No relevant information
  13: U.S. coral reefs play a significant role in coastal hazard risk reduction.
Methodology:
  1: The analysis combines coral-growth measurements, carbonate-budget assessments,
    and hydrodynamic modeling.
  2: Carbonate-budget models and hydrodynamic modeling are used to assess reef-accretion
    potential and coastal flooding impacts; results are projected to the year 2100.
  3: The analysis involves a coral-growth experiment conducted from 2019 to 2021 at
    BIRNM, measuring calcification rates and growth of A. palmata and Ps. strigosa.
    A population model based on growth, mortality, and fragmentation rates was developed
    to project potential changes in A. palmata cover under various restoration scenarios
    until 2100. Carbonate budget models are used to estimate reef accretion potential
    based on coral cover.
  4: Carbonate-budget models and storm water level projections are used to evaluate
    the potential of reef restoration to mitigate sea-level rise impacts.
  5: The analysis compares projections of maximum total water levels in 2100 with
    projected reef erosion against present-day bathymetries using models.
  7: Carbonate-budget and coral-growth models are used to project reef accretion potential
    under different sea-level-rise scenarios. The models present a simplified version
    of reality.
  8: The analysis involves stratified-random site carbonate budget calculations, reef-census
    data, and bioerosion rate measurements, collected through reef surveys and calculated
    using the ReefBudget methodology.
  9: The study uses carbonate budget models, hydrodynamic modeling, statistical analyses,
    and simulates future outcomes with a matrix model for reef-building coral restoration.
  10: The study uses a model combining survival and fragmentation rates and hydrodynamic
    modeling to estimate population changes and hydrodynamic impacts.
  11: Employs adjusted water levels and modeled predictions based on scenarios with
    USGS data availability.
  12: No relevant information
  13: The study utilizes numerical modeling of low-frequency wave dynamics over a
    fringing coral reef and nonhydrostatic and surfbeat model predictions of extreme
    wave run-up in fringing reef environments. It also employs a third-generation
    wave model for coastal regions.
More Notes:
  2: Estimated bioerosion was primarily driven by the parrotfish Sparisoma viride.
  3: The study acknowledges spatial and temporal variability in coral growth. The
    model assumes no reproduction for A. palmata.
  7: The specific projections are directly applicable to the ecological and geomorphic
    setting of BIRNM, but the overall conclusion is relevant for coral reefs throughout
    the western Atlantic.
  12: No relevant information
  13: The research was supported by the U.S. National Park Service and the U.S. Geological
    Survey. Fieldwork was performed under scientific collection permit BUIS-2019-SCI-0004.
Quantitative Material:
  13: The paper uses model parameter input files to compare the influence of coral
    reef carbonate budgets on alongshore variations in wave-driven total water levels.
Quantitative material:
  1: The study mentions ~0.5 meters of sea-level rise expected by 2100 with moderate
    carbon-emissions reductions.
  2: Reef-accretion potential varied between -5.31 and 6.21 mm per year, with an average
    of -1.56 mm per year across sites.
  4: Models indicate that increasing A. palmata cover to 36-45% could promote reef
    accretion by more than 0.5 m by 2100, and potentially reduce total water levels
    during storms by up to 0.81 m on average.
  5: "The study reports that average carbonate production by all species combined\
    \ is now approximately 1.27 kg CaCO3 m\u22122 y\u22121."
  6: "Predictions indicate that most reef zones at BIRNM will lose 0.12\u20130.23\
    \ m of elevation by 2100, while the southern reef crest is expected to maintain\
    \ its elevation."
  7: "Reef-accretion potential at Buck Island Reef National Monument (BIRNM) could\
    \ exceed 5 mm y\u22121 with a 30% increase in *A. palmata* cover.  A 40% reduction\
    \ in realized reef accretion doesn't change the conclusion that a sustained 30%\
    \ increase in *A. palmata* cover on the BIRNM reef crest could allow the reef\
    \ to keep pace with low-end sea-level rise projections (~0.5 m).  This outcome\
    \ would reduce total water levels during storms by >10% (0.81 m) under higher\
    \ sea-level-rise scenarios. The cost of restoration is estimated at ~$25 USD per\
    \ A. palmata fragment. Increasing *A. palmata* cover by 30% on a reef the size\
    \ of the one at Buck Island could cost ~$12.5 million USD."
  8: The study projects a possible ~0.2 m increase in wave-driven water levels during
    storms by 2100, and predicts sea-level rise from 0.49 m to 0.96 m depending on
    the emissions scenario.
  9: Estimated rate of change in A. palmata surface area and outplanting strategies
    are quantified using a matrix model for different numbers of colonies (100,000,
    250,000, 500,000) from 2020 to 2100.
  10: Survival rate is projected between 20-56% depending on climate impact scenarios;
    reef-accretion potential range provided, and different storm scenarios are analyzed.
  11: Mentions using USGS Data Releases and other data sources; specific quantitative
    results are not detailed on this page.
  12: No relevant information
sourcematerial:
  1: "yaml\nEvaluation overview: \"The potential for coral reef restoration to mitigate\
    \ coastal \uFB02ooding as sea levels rise\"\nDrivers of Risk: \"however, climate\
    \ change is jeopardizing the ability of reefs to continue to provide coastal protection\
    \ by causing coral-reef degradation4\u20136,sea-level rise7\u20139, and changes\
    \ in waves and storms10,11.\"\nQuantitative material: \"allowing reefs to keep\
    \ pace with the ~0.5 m of sea-level rise expected by 2100 with moderate carbon-emissions\
    \ reductions.\"\nMethodology: \"We combined coral-growth measurements and carbonate-budget\
    \ assessments of reef-accretion potential at Buck Island Reef, U.S. Virgin Islands,\
    \ with hydrodynamic modeling to quantify future coastal \uFB02ooding under various\
    \ coral-restoration, sea-level rise, and storm scenarios.\"\nHighlights: \"Our\
    \ results provide guidance on how restoration of Acropora palmata,if successful,\
    \ could mitigate the most extreme impacts of coastal \uFB02ooding by reversing\
    \ projected trajectories of reef erosion and allowing reefs to keep pace with\
    \ the ~0.5 m of sea-level rise expected by 2100 with moderate carbon-emissions\
    \ reductions.\"\n"
  2: "Source material: \"We present a real-world example of the impacts of reef degrada-tion\
    \ on coastal \uFB02ooding usi ng da ta co llected a t BI RNM...water depth, could\
    \ change in response to the combined impacts of reef degradation and sea-level\
    \ rise in the future16,21. Based on our carbonate budget reef census in 2016,\
    \ reef-accretion potential varied between -5.31 and 6.21 mm y\u22121 and averaged\
    \ -1.56 mm y\u22121 (\xB10.27 standard error [SE]) across 54 sites within shallow\
    \ fore-reef, reef-crest, and back-reef habitats... Here, we \uFB01rst quantify\
    \ spatial variability in reef-accretion potential...using census-based carbonate-budget\
    \ models. We then use carbonate-budget models and in situ measurements of A. palmata\
    \ growth in combination with hydrodynamic modeling to determine how projected\
    \ changes in bathymetry from both reef ero-sion and restoration, in combination\
    \ with sea-level rise, could impact coastal \uFB02ooding potential during storms\
    \ by 2100. reef erosion will result in a small, but measurable, increase in \uFB02\
    ooding potential by the end of the century. Only \uFB01ve sites had positive reef-accretion\
    \ potential... Estimated bioerosion, which was primarily driven by the parrot-\uFB01\
    sh Sparisoma viride (Table S3)...\""
  3: "Calcification rates of A. palmata ranged from 21.04 to 42.91 kg m\u22122 y\u2212\
    1, with an average of 29.07 kg m\u22122 y\u22121 (\xB11.26). The average rate\
    \ of change in the height of A. palmata colonies was 6.99 cm y\u22121 (\xB11.56).\
    \ The models indicate that a single, large-scale A. palmata outplanting effort\
    \ before 2030 could result in increases in coral cover on the reef crest at BIRNM\
    \ for the next 20 years. Restoration could increase reef-accretion potential on\
    \ the BIRNM reef crest to 7.38 mm y\u22121 (\xB10.60) on average (6.59 \xB1 0.70\
    \ in the northern and 8.16 \xB1 0.94 in the southern sectors). In this most optimistic\
    \ scenario, a sustained increase of 30% A. palmata cover above the 2016 baseline\
    \ coral cover of 6.14% \xB1 1.40 and 14.86% \xB1 4.03 would bring total coral\
    \ cover in those zones to ~36 and 45%."
  4: " \n\"These results indicate that if A. palmata cover could be increased by ~30%\
    \ ... the reef could keep pace with Low to Intermediate-Low projections of relative\
    \ sea-level (RSL) rise.\"\n\n\"Modeled total water levels\u2014which include the\
    \ influence of tides, waves, and storm surge\u2014increase non-linearly with rising\
    \ sea level and more extreme wave conditions because sea-level rise allows for\
    \ larger waves to propagate across the reefs.\"\n\n\"Restoration could substantially\
    \ reduce total water levels during future storms ... restoration therefore has\
    \ the potential to negate the wave-driven component associated with low-end sea-level-rise\
    \ scenarios.\"\n\n\"Maximum total water levels vary along the shoreline due to\
    \ variability in nearshore bathymetry ... the overall trends were similar when\
    \ projected changes in reef elevation were incorporated into the model.\"\n\n\"\
    Restoration can potentially allow reef-crest habitats to keep pace with lower\
    \ sea-level-rise scenarios and reduce coastal flooding impacts from major hurricanes\
    \ by reducing wave-driven increases in total water levels.\"\n"
  5: "Source material here.\nEvaluation overview: \"The capacity of coral reefs to\
    \ keep pace with sea-level rise is central to their ability to continue to provide\
    \ shoreline protection to coastal communities in the future.\"\nDrivers of Risk:\
    \ \"Maps displaying the impact of sea-level rise and coral-reef bathymetry on\
    \ alongshore variation in total water levels and thus coastal flooding potential.\"\
    \ and \"Sea-level will be the most significant driver of increases in total water\
    \ levels and thus flooding potential.\"\nQuantitative material: \"Our study indicates\
    \ that average production by all species combined is now an order of magnitude\
    \ lower at just 1.27 (\xB10.27) kg CaCO3 m\u22122 y\u22121.\"\nMethodology: \"\
    The top row (a, b) provides projections of maximum total water levels at 2100\
    \ with projected reef erosion from the carbonate-budget models under the equivalent\
    \ to a strong tropical storm or minor hurricane (10-year storm; Fig. 5b).\"\n\
    Highlights: \"We found that by the time of our surveys in 2016, not only was reef-accretion\
    \ potential at BIRNM well below the average regional Holocene baseline accretion\
    \ rate...erosion had become the dominant process.\"\n"
  6: "\nEvaluation overview: `Although our results indicate that the southern reef\
    \ crest at BIRNM was maintaining its role as a coastal barrier at the time of\
    \ our surveys in 2016, its future role in providing coastal protection is precarious\
    \ given the inevitability of continuing coral loss from climate change...the omission\
    \ of the important impacts of physical erosion from our carbonate budgets and\
    \ the recent declines in coral populations suggest that our estimates of present-day\
    \ reef-accretion potential are overly optimistic, and erosion is likely already\
    \ more signi\uFB01 cant than our study suggests.`\nDrivers of Risk: `continuing\
    \ coral loss from climate change and other episodic natural and human impacts...Hurricane\
    \ Maria passed ~60 km west of BIRNM as a Category-5 storm and caused signi\uFB01\
    \ cant damage to southern reef habitats...Most recently, in 2021, SCTLD began\
    \ to impact the reef at BIRNM`\nQuantitative material: `Whereas most reef zones\
    \ at BIRNM are projected to lose 0.12\u20130.23 m of elevation on average by 2100,\
    \ the southern reef crest is predicted to more-or-less maintain its present-day\
    \ elevation`\nHighlights: `that, if successful, a signi\uFB01 cant effort to restore\
    \ A. palmata populations at BIRNM in the near-term (1.5\u2012 3.0 individuals\
    \ m\u2212 2 by 2030) could result in substantial and sustained increases in coral\
    \ cover and, therefore, reef-accretion potential until the end of the century`\n"
  7: "If the most optimistic restoration scenario, in which A. palmata cover is increased\
    \ by ~30% (to \u2265 36% total cover), can be realized, our carbonate-budget models\
    \ indicate that reef-accretion potential of the reef crest at BIRNM could exceed\
    \ 5 mm y\u22121 (Fig. 3). ...The most probable magnitude of end-of-century sea-level\
    \ rise across all CO2-emission scenarios is between ~0.5 and 1 m...with a higher\
    \ probability of limiting sea-level rise to ~0.5 m if moderate mid-century reductions\
    \ of CO2 emissions are achieved (i.e., SSP1-2.6 or SSP2-4.5)...Our models indicate\
    \ that under that scenario significant and successful restoration...could allow\
    \ the BIRNM reef crest to keep pace with sea-level rise to 2100 (i.e., ~0.5 m;\
    \ Fig. 3). This outcome would reduce total water levels during storms by >10%\
    \ (0.81 m) under higher sea-level-rise scenarios (Fig. 5)...The specific projections\
    \ from our model are only directly applicable to the baseline ecological and geomorphic\
    \ setting of BIRNM; however, our overall conclusion\u2014that the worst effects\
    \ of sea-level rise on coastal flooding could be mitigated if restoration of reef-building\
    \ species like A. palmata can return reef-accretion rates to historic baselines\u2014\
    is relevant for coral reefs throughout the western Atlantic...Recent estimates\
    \ from nearby south Florida as part of NOAA\u2019s Mission: Iconic Reefs initiative\
    \ indicate that the cost of restoration per A. palmata fragment is ~$25 USD...Increasing\
    \ A. palmata cover on a reef the size of the one at Buck Island to a level that\
    \ could significantly impact shoreline protection (+30% or 500,000 outplants)\
    \ would cost ~$12.5 million USD."
  8: "Source material here.\nEvaluation overview: \"Put another way, whereas coral\
    \ restoration has the potential to minimize climate-change impacts, doing nothing\
    \ to combat erosion would amplify them ... restoration has the potential to be\
    \ more than a stop-gap measure: it can provide an important component of the portfolio\
    \ of solutions that communities and managers can draw from to support the persistence\
    \ of coral reefs and their function as coastal barriers into the future.\"\n\n\
    Drivers of Risk: \"Coastal \uFB02 ooding and erosion due to extreme weather events\
    \ have signi\uFB01 cant impacts on coastal communities globally, and those impacts\
    \ are projected to increase as sea-level rises over the coming century.\"\n\n\
    Quantitative material: \"By 2100 under SSP1-2.6 to SSP2-4.5 (~0.49 m) to a level\
    \ comparable to the highest sea-level rise predicted under SSP5-8.5 (0.96 m31)\
    \ ... projected ~0.2 m increase in wave-driven water levels during storms.\"\n\
    \nMethodology: \"Carbonate budgets ... were estimated by analyzing reef-census\
    \ data collected in July 2016 ... following a modi\uFB01cation of Hubbard et al.37\
    \ and the ReefBudget v1 methodology.\"\n\nHighlights: \"Reef restoration not only\
    \ contributes to positive accretion, but it also protects the reef structure with\
    \ a cap of living coral, staving off erosion ... helps to support that cost-bene\uFB01\
    t analysis by providing new guidance on the potential scale of restoration necessary\
    \ to revive reef accretion and maintain reefs\u2019 capacity for coastal protection.\"\
    \n"
  9: "yaml\nEvaluation overview: \"To predict how coral-reef degradation will change\
    \ the bathymetry of the BIRNM fringing reef in the future, we calculated the estimated\
    \ change...To assess the potential for restoring populations of reef-building\
    \ corals and, therefore, reef-accretion potential at BIRNM, we measured...\"\n\
    Drivers of Risk: \"reef-accretion potential quanti\uFB01ed in our study is likely\
    \ a maximum estimate of realized reef accretion, as carbonate budget models do\
    \ not incorporate the impacts of physical erosion or chemical dissolution16,48...estimated\
    \ bioerosion by those taxa...Overall, the relatively lower parrot\uFB01sh bioerosion\
    \ rates...\"\nQuantitative material: \"\u2026we \uFB01rst used the mean (\xB1\
    SE) rate of change in A. palmata surface area measured at BIRNM in this study30\
    \ to develop a simple matrix model projecting the potential change in percent\
    \ cover of A. palmata in reef-crest habitats of BIRNM for each decade from 2020\
    \ to 2100 following outplanting of 100,000, 250,000, and 500,000 colonies...\"\
    \nMethodology: \"For carbonate production, the largest change in ReefBudget v244,65\
    \ for our study is the increase in the suggested calci\uFB01cation rate for A.\
    \ palmata from 10.88 kg m\u22122 y\u22121 to 14.49 kg m\u22122 y\u22121...statistical\
    \ analyses of the were conducted in R Studio (v 4.0.4;...To predict how coral-reef\
    \ degradation will change the bathymetry...we calculated the estimated...\"\n\
    Highlights: \"Because A. palmata is the primary species responsible for con-structing\
    \ shallow reef-crest habitats in the western Atlantic13,18 and is, therefore,\
    \ the species for which restoration could have the most sig-ni\uFB01cant impact\
    \ on coastal-hazards protection, we assessed how the restoration of this species\
    \ in particular could impact the potential of reefs at BIRNM to keep pace with\
    \ future sea-level rise.\"\n"
  10: "Source material: Change in population size in our model was parameterized by\
    \ combining the 3% survival rate suggested by Garrison and Ward74 with the 55%\
    \ fragmentation rate58 to produce population-level survival rate of 58%, which\
    \ we round to 60% for simplicity. ... Reef-accretion potential quanti\uFB01ed\
    \ in our study should be considered an optimistic, maximum estimate of long-term\
    \ reef accretion16,48. ... We note that storms would result in a higher net fragmentation\
    \ rate, which could be either bene\uFB01cial or detrimental to A. palmata populations\
    \ depending on their frequency58. ... Because of the uncertainties in future storm\
    \ climates11, we did not explicitly incorporate storm-related fragmentation into\
    \ our model. ... increased climate-change impacts over time for which mortality\
    \ was increased by 5% each decade (44% net survival by 2100); ... We ran the model\
    \ with three theoretical scenarios of how mortality could change over time: 1)\
    \ a \uFB01xed, 60% population survival rate over time; 2) increased climate-change\
    \ impacts over time for which mortality was increased by 5% each decade (44% net\
    \ survival by 2100); and 3) decreased climate-change impacts over time through\
    \ increased resilience, acclimatization, and/or adaptation of A. palmata for which\
    \ mortality was decreased by 5% each decade (80% net survival by 2100). ... reef-accretion\
    \ potential using eight theoretical restoration scenarios wherein the cover of\
    \ A. palmata was increased by 5 to 30% at +5% intervals. ... The validated XBeach\
    \ model was then forced with a range of sea-level-rise scenarios (+0.0, +0.2,\
    \ +0.5, +1.2, and +2.0 m; cf.31) and wave and storm-surge conditions (10- and\
    \ 50-year storms). ... XBeach76,77 is a process-based numerical model that resolves\
    \ key hydrodynamic processes on coral-reef-lined coasts5,78,79."
