    \ pricing of $5 to $36 per ton CO2 equivalent (tCO2eq); Pre-tax cash flows ranging\
    \ from $230,000 to $16,380,000 across project time-series for 100,000 acres (40,469\
    \ hectares); Up to 5\xD7 revenue for contemporary voluntary offsets"
  2: Discount pricing for forest carbon (e.g., <$5 tCO2eq-1 in 2017, <$1 in 2018)
    and the decline of reforestation and conservation carbon market traction by ~72%
    from 2011 to 2016 are quantitative pieces of information.
  8: "Uncertainty for the corrected AP 30-minute NEE data was reported as 0.20 \xB5\
    \ mol m \u22122 s\u22121 or 6.7% of the daily means."
  9: NEE data over the period of record (e.g., 2000-2019) is used.
  10: No relevant information
  11: Presents annual NEE values for HF site ranging from -0.53 to -9.09 tCO2 acre-1yr-1
    over 24 years, and for AP site from -6.74 to -15.2 tCO2 acre-1yr-1 over 4 years;
    includes mean and SD.
  16: "\u223C20% annual uncertainty to NEE, \u223C\xB1 0.03 tCO2yr\u22121"
  19: Pre-tax cash flow ranges from $760,000 to $13,830,000 at Harvard Forest and
    from $2,140,000 to $4,860,000 at Ankasa Park based on sequestration rates.
  21: "Quantitative information presented includes a specific NEE value for AP (-15.2\
    \ tCO2 acre\u22121 yr\u22121), projected pre-tax revenue from mixed carbon products\
    \ up to $16,380,000 for the HF over a 24-year period, and population growth of\
    \ ~298% from 1970 to 2010 within the AP area."
  22: "The anomalously low NEE for HF year 2010 was \u22120.53 tCO2eq. Ecosystem respiration\
    \ accounts for up to \u223C82% of gross carbon flux from the soil to the atmosphere."
  26: "\u223C0.9 billion hectares of restorable landscapes offering a viable approach\
    \ to retain the Earth\u2019s natural protective capacity to sequester atmospheric\
    \ CO2."
