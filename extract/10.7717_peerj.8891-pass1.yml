  1: "Source material here.\nForestcarbonsequestrationoffsetsaremethodologicallyuncertain,compriseaminor\
    \ componentofcarbonmarketsanddonoteffectivelyslowdeforestation.Theobjective of\
    \ this study is to describe a commercial scale in situ measurement approach for\
    \ determination of net forest carbon sequestration projects, the Direct Measurement\
    \ Forest Carbon Protocol TM , to address forest carbon market uncertainties. In\
    \ contrast toprotocolsthatrelyonlimitedforestmensuration,growthsimulationandexclusionof\
    \ CO2 data,theDirectMeasurementForestCarbonProtocol TM isbasedonstandardized methodsfordirectdeterminationofnetecosystemexchange(NEE)ofCO2\
    \ employing eddy covariance, a meteorological approach integrating forest carbon\
    \ fluxes.\nNEE is used here as the basis for quantifying the first of its kind\
    \ carbon financial products.\nThe DMFCP differentiates physical, project and financial\
    \ carbon within a System-of-Systems TM (SoS) network architecture. SoS sensor\
    \ nodes, the Global Monitoring Platform TM (GMP), housing analyzers for CO2 isotopologues\
    \ (e.g., 12CO2, 13CO2, 14CO2) and greenhouse gases are deployed across the project\
    \ landscape. The SoS standardizes and automates GMP measurement, uncertainty and\
    \ reporting functions creating diverse forest carbon portfolios while reducing\
    \ cost and investment risk in alignment with modern portfolio theory.\nPublished\
    \ annual NEE data for a tropical (Ankasa Park, Ghana, Africa) and a deciduous\
    \ forest (Harvard Forest, Petersham, MA, USA) are used to forecast carbon revenue.\
    \ Carbon pricing scenarios are combined with historical in situ NEE annual time-series\
    \ to extrapolate pre-tax revenue for each project applied to 100,000 acres (40,469\
    \ hectares) of surrounding land. Based on carbon pricing of $5 to $36 per ton\
    \ CO2 equivalent (tCO2eq) and observed NEE sequestration rates of 0.48 to 15.60\
    \ tCO2eq acre \u22121 yr\u22121, pre-tax cash flows ranging from $230,000 to $16,380,000\
    \ across project time-seriesarecalculated,upto5\xD7revenueforcontemporaryvoluntaryoffsets,\
    \ demonstrating new economic incentives to reverse deforestation. The SoS conceptofoperationandarchitecture,withengineeringdevelopment,canbeextended\
    \ to diverse gas species across terrestrial, aquatic and oceanic ecosystems, harmonizing\
    \ voluntary and compliance market products worldwide to assist in the management\
    \ of global warming. The Direct Measurement Forest Carbon Protocol reduces risk\
    \ of\n"
