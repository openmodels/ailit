  26: "The DMFCP updates the UNFCCC and REDD+ methods to validate and monetize claims\
    \ of emission reduction and to determine GHG budgets across diverse ecological\
    \ landscapes at the national and sub-national levels fulfilling the Paris Agreement\
    \ (e.g., Article 10) and REDD goals and objectives. The DMFCP normalizes forest\
    \ emission reduction determinations for voluntary and compliance markets bridging\
    \ the gap between methods, project types and outcomes for stakeholders. The DMFCP\
    \ comprises a commercial standardized measurement-to-monetization system for the\
    \ determination of NEE. NEE enables creation of verified forest carbon financial\
    \ products contributing to the improvement of methods that underpin large-scale\
    \ forest conservation and reforestation, a global problem of high importance in\
    \ the management of anthropogenic climate change. The SoS and GMP components can\
    \ be applied to GHG\u2019s across large-scales and diverse locations, corrects\
    \ traditional carbon credit gaps in validation and recalibrates equivalent voluntary\
    \ and compliance programs that rely on them such as the CARB, CAR, ACR, VERRA\
    \ and CDM, as well as the REDD+ and Paris Agreement platforms. The DMFCP, coupled\
    \ with contributions of the forest carbon research community to commercialization\
    \ efforts, and updated policies, can address the \u223C0.9 billion hectares of\
    \ restorable landscapes, offering a viable approach to retain the Earth\u2019\
    s natural protective capacity to sequester atmospheric CO2 now and for future\
    \ generations. The authors received no funding for this work. Bruno D.V. Marino\
    \ is an Academic Editor for PeerJ. A competing interest is disclosed by Bruno\
    \ D.V Marino as the author of the patents cited. The data and scientific analyses,\
    \ while citing the patent literature as supportive of potential real-world applications,\
    \ was conducted independently of the work presented. Data presentation, analysis,\
    \ and interpretation are based on established scientific principles and reported\
    \ in an objective manner. Bruno D.V. Marino and Vinh Truong are unpaid associates\
    \ of Planetary Emissions Management Inc. Richard Gyimah is a paid employee of\
    \ the Forestry Commission of Ghana. J William Munger is a paid employee of Harvard\
    \ University."
