Highlights:
  3: Significant differences in water productivity exist between irrigated and rainfed
    sites due to yield variations, and soil water content has a notable impact on
    yield and water productivity in soybeans.
  4: Higher WP is hypothesized for irrigated sites due to increased yield from enhanced
    water and nutrient availability, while rainfed sites may exhibit more efficient
    water use but lower WP due to limited water conditions.
  5: Empirical data was collected on irrigation, fertilizer use, and planting densities
    across different cropping systems (irrigated continuous maize, irrigated maize-soybean
    rotation, and rainfed maize-soybean rotation) from 2001 to 2020.
  6: The study examines variations in means among cropping systems for maize and soybean
    years and compares different cropping treatments.
  7: ET and GPP are significantly correlated, with stronger correlations observed
    in irrigated conditions. Irrigated crops generally had higher yields, ET, and
    WP compared to rainfed crops. Crop rotation had a non-significant effect on yield,
    ET, and WP.
  8: Irrigated maize (US-Ne2) has higher yields, ET, and WP compared to rainfed maize
    (US-Ne3), indicating the benefits of irrigation.
  11: Irrigated maize in rotation had the highest WP. Climate variability and management
    are important in determining crop WP. Yield (Y), WI, VPD, and TA are primary factors
    affecting the temporal variability of maize WP in both irrigated and rainfed systems.
  12: Yield is the main driver of year-to-year variations in WP. Optimizing irrigation
    scheduling could enhance WP through increasing maize yield and maintaining minimum
    evaporation rates. Increasing fertilizer application may not necessarily lead
    to improved WP as it enhances crop transpiration, increasing ET.
Methodology:
  1: Analysis of long-term data to assess the response of croplands water productivity
    to management and climate.
  3: The study uses a 20-year data set (2001-2020) utilizing the Eddy Covariance technique
    to assess interannual variability in yield, evapotranspiration, and water productivity
    in Eastern Nebraska cropping systems.
  4: Data collected over a 20-year period from three monitored sites in Eastern Nebraska
    are used, focusing on evapotranspiration measurements and annual grain yield to
    evaluate WP and its variability under different cropping systems.
  5: The analysis is performed using Eddy Covariance (EC) flux measurements to estimate
    crop evapotranspiration (ET) during the growing period, with climate variables
    sourced from the AmeriFlux dataset.
  6: ANOVA and TukeyHSD tests were used for maize, a T-test was used for soybean.
    Pearson and Spearman correlation coefficients were used to study the effects of
    climate variability. Principal Component Analysis (PCA) was used to study the
    variance between cropping systems.
  7: The study analyzes data from three cropping systems (irrigated continuous maize,
    irrigated maize-soybean rotation, and rainfed maize-soybean rotation) over the
    period 2001-2020. Correlations between climatic variables, ET, and GPP are examined.
    Significance is tested at a 95% confidence interval.
  11: Field scale, long-term observational data from ENREEC sites in the Midwestern
    US were used to evaluate the three cropping systems. PCA model used to assess
    the impact of climate variability and management on WP. Analysis isolates management
    effects from climate variability.
  12: The study analyzes the relationship between WP, Y, and ET with management and
    climate variability in three major cropping systems in the midwestern U.S.
