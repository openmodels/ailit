  8: Quantitative data includes yield, ET, and WP statistics with percentage changes
    for different irrigation practices, specifically for irrigated continuous maize,
    irrigated maize-soybean rotation, and rainfed maize-soybean rotation.
  11: Irrigated maize in rotation had the highest WP (2.23 kg m-3) compared to irrigated
    continuous maize (2.08 kg m-3) and rainfed maize in rotation (1.82 kg m-3). Irrigated
    rotation soybean had higher WP (0.81 kg m-3) compared to rainfed rotation (0.75
    kg m-3).  WP increased by 18.4% under irrigated maize rotation compared to rainfed
    rotation. Increase in WP was only 7.2% when comparing irrigated continuous maize
    to irrigated maize in rotation. Correlations are reported between climatic variables
    and WP/Yield.
  12: Irrigated maize systems had the highest WP. Compared to rainfed systems, WP,
    Y, and ET were 18.4%, 27.6% and 11.8%, respectively, higher in irrigated maize
    rotation, and 7.4%, 12.9%, and 5.1%, respectively, higher in irrigated soybean
    rotation. VPD has a correlation of R=0.7 with maize Y. SWC showed the highest
    correlations with WP in irrigated (R=0.77) and rainfed (R=0.49) soybean systems.
