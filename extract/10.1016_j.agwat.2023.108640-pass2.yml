  3: "Source material here.\nThe study evaluates the long-term water productivity\
    \ (WP), crop yield (Y), and crop evapotranspiration (ET) in response to management\
    \ and climate in cropping systems of the Western US Corn Belt: \"Long-term croplands\
    \ water productivity in response to management and climate in the Western US Corn\
    \ Belt.\" \n\nVapor pressure deficit and soil water content are identified as\
    \ factors impacting crop yield and water productivity: \"Vapor pressure deficit\
    \ was negatively correlated with Y in rainfed maize (R=\00.72, p <0.05) and therefore\
    \ was considered a determinant in WP (R=\00.7, p <0.05). For soybean, soil water\
    \ content had the highest correlations with Y and WP (irrigated: R=\00.77; rainfed:\
    \ R=0.49, only significant in irrigated sites).\"\n\nWP was 18.4% higher in irrigated\
    \ maize in rotation relative to the rainfed site; various correlations between\
    \ management factors and WP/Y are given with statistical significance (e.g., water\
    \ input: R=0.67, p=0.05; vapor pressure deficit WP correlation: R=-0.7, p<0.05):\
    \ \"WP was 18.4% higher in irrigated maize in rotation relative to the rainfed\
    \ site. Water input (mm, sum of precipitation and irrigation) was the main management\
    \ factor in rainfed maize WP (R=0.67, p=0.05) and Y (R=0.79, p <0.05).\"\n\nThe\
    \ study is based on data collected over a 20-year period (2001\u20132020) using\
    \ the Eddy Covariance technique to assess interannual variability in crop yield,\
    \ evapotranspiration, and water productivity: \"In this study, we used data collected\
    \ over a 20-year period (2001\u20132020) to investigate the interannual variability\
    \ in yield (Y), crop evapotranspiration (ET), and water productivity (WP, ratio\
    \ of Y and ET), and their response to management and climate in three major cropping\
    \ systems located in Eastern Nebraska.\"\n\nSignificant differences in WP between\
    \ irrigated and rainfed sites were found, attributed mainly to variations in yield;\
    \ no significant effect of crop rotation on measured responses: \"Our results\
    \ showed significant differences (p <0.05) in WP between irrigated and rainfed\
    \ sites, mainly attributed to variations in Y rather than ET, while there was\
    \ no significant effect of crop rotation on measured responses.\"\n"
  4: The primary objective of this study was to quantify and assess the differences
    in WP, Y, and ET among three major cropping systems in the Eastern Nebraska US
    Corn Belt (Irrigated continuous maize, irrigated maize soybean rotation, and rainfed
    maize soybean rotation), and to investigate their response to management and interannual
    climate and water variability....In this study, we utilized data collected over
    a 20-year period (including annual dry Y and ET from EC measurements)....To accomplish
    this, we used data from three proximate monitored sites in Eastern Nebraska (US)
    with similar climate and edaphic properties....We hypothesized that higher WP
    will be observed in irrigated sites due to increased Y resulting from enhanced
    availability of water and nutrients through irrigation and crop rotation (Huynh
    et al., 2019; Agomoh et al., 2021). In contrast, the rainfed site is expected
    to exhibit more efficient water use under limited water conditions through stomatal
    closure (Serna, 2022), but this may reduce crop photosynthetic activity and ultimately
    Y, contributing to lower WP....Data for 2010, 2012 and 2015 were excluded for
    all three sites due to severe hail damage (2010), non-matching rotation (2012),
    and important percentage of flux data gaps (2015). To isolate the effect of management
    from that of climate variability, we solely considered years...
