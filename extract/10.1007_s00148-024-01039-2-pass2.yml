  12: "Source material: Fig. 4 Marginal effect of warming on the adult obesity rate.\
    \ Notes: This figure presents the marginal effect of warming on obesity in each\
    \ country, calculated based on estimates from the third-degree model and the mean\
    \ temperature of each country. Panel A is calculated based on the baseline model\
    \ (1), while panel B is calculated based on model (4), which takes into account\
    \ the interaction effect of income. Specifically, the marginal effects are calculated\
