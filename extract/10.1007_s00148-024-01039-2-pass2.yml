  2: "\nEvaluation overview: \"This study estimates the overall impact of global warming\
    \ on adult obesity and investigates the potential of adaptation in offsetting\
    \ this impact.\" Drivers of Risk: \"Global warming is expected to have a substantial\
    \ impact on human obesity. It could affect calorie intake by altering incomes\
    \ (Burke et al. 2015), food prices (Wheeler and von Braun 2013), and consumption\
    \ preferences (Scheelbeek et al. 2020). Additionally, it could impact calorie\
    \ expenditure by altering working hours (Graff Zivin et al. 2018), physical activity\
    \ levels (Obradovich and Fowler 2017), and the minimum calorie requirement (Johnson\
    \ and Kark 1947).\" Methodology: \"Using data from 1975 to 2016 for 152 countries,\
    \ which collectively account for 99.1% of the world\u2019s population, we employ\
    \ a panel model that relies on plausibly exogenous year-to-year temperature fluctuations\
    \ to identify the causal effect of warming on obesity.\"\n"
  3: "yaml\n\"The impact of global warming on obesity rates and the number of obese\
    \ adults worldwide.\": \"The impact of global warming on obesity\"\n\"Global warming,\
    \ measured by temperature increases.\": \"The marginal effect on obesity of a\
    \ 1\u25E6C increase in temperature\"\n\"Global warming significantly increased\
    \ obesity rates in temperate zones while reducing obesity in tropical countries.\"\
    : \"The estimates suggest that global warming signi\uFB01cantly increased obesity\
    \ rates in countries within temperate zones while reducing obesity only in 21\
    \ tropical countries.\"\n\"Employed four alternative model settings to validate\
    \ the estimated effect pattern of global warming on obesity, including temperature\
    \ polynomials, temperature bins, seasonal mean temperature, temperature variation,\
    \ and temperature shocks.\": \"We employ four alternative model settings to validate\
    \ the estimated effect pattern of global warming on obesity. The baseline model\
    \ utilizes a third-degree temperature polynomial to account for the nonlinear\
    \ impact of temperature on obesity. To relax the functional form assumption and\
    \ capture the effect of within-year temperature variation, we, alternatively,\
    \ measure temperature using temperature bins (Schlenker and Roberts 2009), seasonal\
    \ mean temperature, temperature variation (Ray et al. 2015), and temperature shocks\
    \ (Ashraf and Michalopoulos 2015).\"\n\"Global warming will increase the number\
    \ of obese adults worldwide by 89.9 million from 2016 to 2050, potentially leading\
    \ to an economic loss of US $276.6 billion.\": \"Combining these estimates with\
    \ global warming projections, we estimate that global warming will increase the\
    \ number of obese adults worldwide by 89.9 million from 2016 to 2050. A simple\
    \ back-of-the-envelope calculation suggests that global warming could lead to\
    \ an economic loss of US $276.6 billion by contributing to the rise of obesity\
    \ worldwide.\"\n\"The marginal effect on obesity of a 1\xB0C increase in temperature\
    \ ranged from -0.56 to 1.87% across the 152 countries, with a population-weighted\
    \ average of 1.06%.\": \"The marginal effect on obesity of a 1 \u25E6 C increase\
    \ in temperature ranged from \u22120.56 to 1.87% across the 152 countries, with\
    \ a population-weighted average of 1.06%.\"\n"
  4: " \n\"it is essential for policymakers and the general public to comprehend how\
    \ global warming could affect obesity\"\n\"our study is the first to directly\
    \ examine the overall impact of warming on obesity based on long-run global data\
    \ and to evaluate the potential of long-run adaptation in offsetting this impact\"\
    \n\"Our findings suggest that obesity is an important pathway through which global\
    \ warming can detrimentally affect human capital and economic outcomes.\"\n\"\
    Most of these studies were based on data from specific countries and indicated\
    \ that higher temperatures could contribute to an increase in obesity.\"\n\"Our\
    \ study differs from Trentinaglia et al. (2021) in at least four major aspects...we\
    \ examine the effect of global warming on obesity (defined as a BMI exceeding\
    \ 30 kg/m2)\" \n"
  5: "yaml\nEvaluation overview: \"The primary outcome variable in our analysis is\
    \ the adult obesity rate, de\uFB01ned as the percentage of adults with a body\
    \ mass index equal to or greater than 30.\"\nDrivers of Risk: \"The key climate\
    \ variable utilized in this study is the annual mean temperature...Additionally,\
    \ we incorporate \uFB01ve other climate variables as control variables: annual\
    \ total precipitation, wet day frequency, frost day frequency, cloud cover percentage,\
    \ and vapor pressure.\"\nMethodology: \"The climate data is obtained from the\
    \ Climatic Research Unit...We calculate country-level climate measures as the\
    \ population-weighted average across all climate grids within each country.\"\n"
  6: 'Utilize multi-model ensemble climate projections from the Coupled Model Inter-Comparison
    Project Phase 6 (CMIP6) for three emissions scenarios: a low emissions scenario
    (SSP1-1.9), an intermediate emissions scenario (SSP2-4.5), and a high emis-...

