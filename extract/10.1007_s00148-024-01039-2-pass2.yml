  9: " \nThe baseline model captures the nonlinear effect of temperature through the\
    \ temperature polynomial... Additionally, our baseline model does not account\
    \ for the effect of within-year temperature variation and shocks. In robustness\
    \ checks, we also measure temperature using temperature bins, within-year temperature\
