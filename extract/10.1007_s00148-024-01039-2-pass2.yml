Highlights:
  1: Global warming has significantly increased obesity rates in countries located
    in temperate zones, while only causing a reduction in a small number of tropical
    countries.
  3: Global warming will increase the number of obese adults worldwide by 89.9 million
    from 2016 to 2050, potentially leading to an economic loss of US $276.6 billion.
  4: Obesity is an important pathway through which global warming can detrimentally
    affect human capital and economic outcomes.
  6: No relevant information
  8: The study aims to capture the causal effect of temperature on obesity, considering
    nonlinear effects and variations across countries with different income levels.
    The effect pattern is robust even when year fixed effects are included.
  10: Warming has a significantly positive impact on the adult obesity rate.
  11: "Warming generally increases obesity rates except in tropical countries with\
    \ annual mean temperatures above 27\xB0C. The moderating effect of income (GDP\
    \ per capita) on this relationship appears limited."
  12: "A 1\xB0C increase in temperature could lead to 79.7 million more obese adults\
    \ worldwide based on the 2016 global population estimate."
  13: The estimated effect of temperature on obesity remains largely consistent across
    various robustness checks, although confidence intervals widen when year fixed
    effects are included.
  15: Significant findings include that wealthier countries experience less impact
    of warming on obesity, and increases in age and schooling correlate with greater
    obesity effects.
  16: Warming has a greater marginal effect on male obesity compared to female obesity,
    and this effect decreases with higher GDP per capita and education levels.
  17: Males are more exposed to the impact of global warming on obesity than females.
    The impacts on Africa and the Americas are smaller. The impact on the Eastern
    Mediterranean and Asia is larger. The impact on Europe is very similar to the
    global average.
  18: Warming in high-temperature seasons significantly increases obesity, while low-temperature
    seasons show negligible effects on obesity.
  19: Higher temperatures are associated with an increased marginal effect on obesity
    rates.
  20: Temperature increases in high-temperature seasons can increase obesity rates;
    temperature variation impacts socioeconomic outcomes like obesity.
  21: Positive temperature shocks initially increase and then reduce the adult obesity
    rate, consistent with the overall pattern observed in the response to annual mean
    temperature.
  22: An important outcome highlighted is the increase in obesity rates as the number
    of months with positive temperature shocks increases.
  23: Global warming can affect obesity through multiple pathways, including income,
    food prices, consumption preferences, working hours, physical activity, and minimum
    calorie requirements. The impact of warming on obesity through income and food
    prices varies across regions, with potentially opposite effects in temperate and
    tropical zones.
  24: Warming diminishes physical exercise and calorie requirement in cold and temperate
    regions, while increasing calorie and fat intake in tropical and temperate zones.
  25: Higher temperatures initially increase and then reduce obesity according to
    both long-run and short-run models, with different threshold temperatures.
  26: Global warming is predicted to increase obesity in the majority of countries,
    with a substantial impact on the global obese population and associated economic
    costs.
  27: Impacts of warming on obesity vary by climate zone, with temperate zones showing
    an increase in obesity rates while subtropical and tropical zones show a decrease.
  28: Long-term adaptation may not significantly mitigate the impact of global warming
    on obesity. Warming may reduce income in subtropical and tropical zones, leading
    to increased obesity. The cumulative effect of warming over time outweighs the
    effect of adaptation in temperate zones.
  29: Global warming significantly increased obesity in most countries, with exceptions
    in a small number of tropical countries.
Methodology:
  1: Analyzing year-to-year temperature fluctuations in 152 countries from 1975 to
    2016.
  2: The study uses a panel model relying on exogenous year-to-year temperature fluctuations
    to identify the causal effect of warming on obesity.
  3: Employed four alternative model settings to validate the estimated effect pattern
    of global warming on obesity, including temperature polynomials, temperature bins,
    seasonal mean temperature, temperature variation, and temperature shocks.
  4: Examines the overall impact of warming on obesity based on long-run global data.
    Evaluates the potential of long-run adaptation in offsetting this impact. Uses
    different model settings to identify both short-run and long-run effects of warming.
  5: The climate data is obtained from the Climatic Research Unit, and country-level
    climate measures are calculated as the population-weighted average across all
    climate grids within each country.
  6: 'Utilizes CMIP6 projections for three emissions scenarios: low (SSP1-1.9), intermediate
    (SSP2-4.5), and high emissions'
  7: The analysis uses a fixed effect panel model comparing the same country over
    time to estimate the effect of warming on obesity.
  8: The analysis uses country fixed effects to account for cross-country, long-run
    temperature differences and year-to-year temperature fluctuations to identify
    the causal effect of temperature on obesity. A J-degree temperature polynomial
    is used to capture the nonlinear effect of temperature. The effect of warming
    on obesity is also analyzed across countries with different incomes by incorporating
    the interaction between income and the temperature polynomial.
  9: The baseline model primarily captures short-run impacts through year-to-year
    temperature fluctuations, with a long-difference model used to estimate long-run
    impacts considering long-term temperature trends.
  10: Compares a short-run model (year-to-year temperature variations) with a long-run
    model (30-year temperature trends) to identify effects. Uses country fixed effects.
    Estimates models from 1975 to 2016 for 152 countries. Infer the effect of adaptation
    by comparing estimates from the two models.
  11: The analysis uses regression models with temperature polynomials (up to fifth
    degree) as explanatory variables. One model also includes an interaction term
    between a third-degree temperature polynomial and log GDP per capita. Standard
    errors are clustered at the country level. The models are estimated using data
    from multiple countries, but estimates are only presented for countries with mean
    temperatures above zero degrees Celsius, except in Figure 4.
  12: The analysis employs a third-degree polynomial model to assess the marginal
    effects of warming, with some models accounting for income interaction effects.
  13: The analysis uses regression models with different control variables (carbon
    emissions, crude death rate, year fixed effects) and population weighting methods
    (2016 population and population in each year) to assess the robustness of the
    relationship between temperature and obesity.
  15: The analysis is performed using a linear regression model, evaluating the moderating
    effects of GDP per capita, average age, and years of schooling, based on 1975
    values to avoid control problems.
  17: "Excludes one geographic region at a time (Africa, Americas, Eastern Mediterranean,\
    \ Asia, Europe) from the sample to assess the significance of each region in the\
    \ estimated impact of warming on obesity; Uses country-level monthly minimum and\
    \ maximum temperatures to create 3\xB0C bins ranging from 0\xB0C to 30\xB0C, and\
    \ estimates a modified version of a baseline model (equation provided)."
  18: "The paper uses a polynomial model to estimate temperature impacts on obesity,\
    \ accounting for multicollinearity by omitting a reference bin (12-15\xB0C), and\
    \ evaluates variations in impacts across four custom-defined temperature-based\
    \ seasons."
  20: Model includes country fixed effects and uses a seasonal approach to assess
    temperature's impact on obesity, involving a third-degree polynomial of temperature
    variation.
  21: The analysis is performed by constructing a response function of obesity to
    temperature variation and positive temperature shocks, with temperature shocks
    measured as months exceeding one standard deviation from the long-run average.
  23: The study infers channels through which warming impacts obesity based on existing
    literature. The analysis focuses on micro-level channels related to income, food
    prices, consumption preferences, working hours, physical activity, and minimum
    calorie requirements.
  24: Regression models using country-level and US state-level data; short-run and
    long-run models with a third-degree temperature polynomial; calculation of marginal
    effects accounting for temperature-income interaction.
  25: Analysis is based on a long-run model with a third-degree temperature polynomial
    as the primary explanatory variable, using 30-year temperature trends.
  26: The analysis combines estimated country-level marginal effects of temperature
    on obesity with projected temperature changes for each country from 2016 to 2050
    based on different climate models (CMIP6).  They estimate nonlinear marginal effects
    of temperature using a third-degree version of a model, combine these with mean
    temperature to calculate country-level marginal effects, and multiply the country-level
    marginal effects with predicted warming in each country.
  27: The analysis uses short-run and long-run marginal effects combined with projected
    warming under SSP2-4.5 emissions scenario from 2016 to 2050.
  28: Compares a short-run and long-run model to estimate the impact of global warming
    on obesity, considering factors like adaptation, income variation, and cumulative
    effects over time. The difference between the models reflects the effect of adaptation.
  29: Analysis is based on plausible exogenous year-to-year temperature fluctuations
    and compares baseline models with long-difference models for assessing long-term
    adaptation.
More Notes:
  1: The impact across countries varies with income levels, age structures, and education
    levels; Long-term adaptation may not significantly mitigate the impact of global
    warming on obesity in temperate zones.
  3: "The marginal effect on obesity of a 1\xB0C increase in temperature ranged from\
    \ -0.56 to 1.87% across the 152 countries, with a population-weighted average\
    \ of 1.06%."
  4: The study is claimed to be the first to directly examine the overall impact of
    warming on obesity based on long-run global data and to evaluate the potential
    of long-run adaptation in offsetting this impact.
  6: Focus is on correlating GDP and obesity rates, includes climate projections methodology
    but lacks direct climate impact outcomes
  10: The long difference for a given year is calculated as the difference between
    the 30-year period ending in that year and the 30-year period starting 30 years
    prior (e.g., the long difference for 1975 is calculated from 1945-1975)
  11: The confidence intervals are wide when temperatures are very low (below zero
    degrees Celsius), indicating uncertainty in the estimated effects at those temperatures.
    The analysis focuses on the marginal effect of temperature on obesity at the country
    level.
  13: The study considers potential confounding factors like reverse causality from
    carbon emissions to warming and omitted determinants of health by controlling
    for carbon emissions and crude death rate, respectively. The study also explores
    the effect of within-country population migration and differential population
    growth on the estimated effect.
  20: The seasonal model captures effects not seen in an annual average temperature
    approach, but it cannot capture nonlinear effects at very high temperatures.
  23: The flowchart illustrates a conceptual model of the pathways through which global
    warming may affect obesity, emphasizing the interconnectedness of various factors.
    The study acknowledges that identifying specific channels is beyond the scope
    of the present study.
  24: Appendix tables A.3 and A.7 contain definitions, summary statistics of variables,
    and point estimates.
  26: 'The paper presents predicted impacts under three different emissions scenarios:
    SSP2-4.5 (intermediate), SSP1-1.9 (low), and SSP5-8.5 (high). The long-run model
    predicts that global warming is likely to increase obesity in most countries from
    temperate zones while reducing obesity in most countries from subtropical and
    tropical zones.'
  28: The study suggests a more active role for the public sector in addressing the
    effect of global warming on obesity.
Quantitative material:
  1: A 1 degree C increase in annual mean temperature would result in a worldwide
    increase in obese adults of 79.7 million, or 12.3%.
  3: Global warming significantly increased obesity rates in temperate zones while
    reducing obesity in tropical countries.
  4: Finds that global warming generally increases obesity.
  6: No relevant information
  8: The paper presents equations (2), (3), and (4) to calculate marginal effects
    of temperature on obesity, incorporating a temperature polynomial and interaction
    effects with income (GDP per capita).
  10: Uses temperature data from 1945 to 2016 to calculate long differences from 1975
    to 2016.
  11: "The analysis quantifies the relationship between annual mean temperature and\
    \ obesity rate (in percent). It finds that warming has a significantly positive\
    \ impact on the adult obesity rate for most countries, except for the 21 tropical\
    \ countries with an annual mean temperature above 27 \xB0C, where it has a reducing\
    \ effect."
  12: "A 1\xB0C increase in temperature potentially results in an average increase\
    \ of 1.06 percentage points in obesity rates globally."
  13: The page presents robustness checks on the baseline estimates of the relationship
    between temperature and obesity, with confidence intervals.
  15: Quantitative estimates include a marginal effect of 1.13 percentage points on
    obesity outcomes and specific effects such as a reduction of 0.202 percentage
    points with a one-unit increase in log GDP per capita.
  16: "A 1\xB0C increase in annual mean temperature could increase male obesity rate\
    \ by 1.28 percentage points."
  17: Global warming increases the female obesity rate by 0.81 percentage points.
  18: 'Estimated coefficients for seasons show temperature-related obesity impacts:
    -0.19 (season 1), 0.04 (season 2), 0.70 (season 3), and 0.82 (season 4).'
  19: The graphs show a trend where higher temperature bins are associated with a
    positive marginal effect on obesity rates in percentage points.
  20: No specific quantitative percentage changes are provided on this page.
  21: Quantitative information includes the response function of obesity to temperature
    variation, where increased temperature variation correlates with higher obesity
    rates, reaching approximately 20%.
  22: The page includes a quantitative analysis showing a rising trend in obesity
    rates with increased months of positive temperature shocks, ranging from 0% to
    3% in obesity rate.
  23: The paper refers to Figure 12, which presents evidence supporting the impact
    of temperature on minimum calorie demand, physical exercise, calorie intake, and
    fat intake and which contains a modified version of model (1) to estimate these
    effects. The page text states consistent results with existing literature, observing
    that warming reduces minimum calorie demand, increases fat intake, etc. but this
    is not specifically quantified on this page.
  24: Graphs showing trends of minimum calorie demand, physical exercise index, per
    capita calorie intake, and per capita fat intake as a function of annual mean
    temperature.
  25: "The long-run model estimates a threshold temperature of 18.5\xB0C for obesity\
    \ impact, while the short-run model estimates 27.3\xB0C."
  26: Short-run model predicts global warming is likely to increase obesity in the
    majority of countries. Population-weighted average impact of warming on obesity
    across 152 sample countries is 1.2 percentage points, compared to a global obesity
    rate of 17.8% in 2016. This suggests global warming will increase the number of
    obese individuals worldwide by 89.9 million from 2016 to 2050, potentially resulting
    in an economic loss of approximately $276.6 billion.
  27: Predicted impact indicates 76.8 million more obese individuals in temperate
    zones and 106.9 million fewer obese individuals in subtropical and tropical zones
    from 2016 to 2050.
  28: Presents estimated short-run and long-run impacts of global warming on obesity
    using panels in Fig. 14.
  29: "A 1\xB0C rise in annual mean temperature is estimated to increase the number\
    \ of obese adults worldwide by 12.3%."
