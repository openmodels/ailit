  13: " \n\"49 million are on the brink of famine due to ongoing conflict, economic\
    \ consequences of the COVID-19 pandemic, and weather and climate shocks.\"\n\n\
    \"Effective early warning enables early action and weather and climate information\
    \ play crucial roles in supporting anticipatory humanitarian action that saves\
    \ lives and livelihoods, reduces losses and damages, and enhances food security.\"\
    \n\n\"Forecast-based financing is a form of humanitarian action that uses weather\
    \ and climate forecasts and detailed risk analyses to release financial resources\
    \ ahead of a disaster in order to enable early action.\"\n\n\"The impacts of weather\
    \ and climate on the food system not only jeopardize food security, but also threaten\
    \ to reverse sustainable development gains. These impacts are most prominent in\
    \ vulnerable communities, which are disproportionately affected and often rely\
    \ on rainfed agriculture for food and livelihoods.\"\n\n\"Without improvements\
    \ in food security, many SDGs will not be achieved.\"\n\n\"In the context of sustainable\
    \ development, a robust understanding of climate risk and uncertainty, integrated\
    \ with local, traditional, and Indigenous knowledge, is key to successful food\
    \ security interventions.\"\n\n\"The AMS community, in particular, can strengthen\
    \ humanitarian response and sustainable development through fostering and showing\
    \ the cobenefits of improved early warning of extreme events that have the potential\
    \ to impact food security.\"\n"
  14: 'Source material: The paper notes that "as human-induced emissions continue
    to rise, climate change will lead to potentially unprecedented impacts on the
    global food system, jeopardizing food security and disproportionately affecting
    vulnerable communities." It highlights that "actionable early warnings depend
    on reliable forecasts, yet predictability of precipitation, in particular, is
    low and there is a crucial need for further model development and research." The
    methodology is emphasized through a "systems-thinking approach that recognizes
    the risks to global food security are not independent, but are instead indivisible
    from socioeconomic and geopolitical challenges, often leading to cascading crises"
    and calls for "integration of the physical, economic, and behavioral sciences."
    The paper also notes that "the most food insecure regions of the world are also
    often the most data sparse, which presents a significant challenge in monitoring,
    forecasting, and food system vulnerability mapping to inform decision-making."'
