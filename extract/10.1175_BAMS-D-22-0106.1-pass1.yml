  7: "Observational data and monitoring tools commonly originate in conventionally\
    \ gathered meteorological data observed at stations or remotely from satellite\
    \ observations...In poorer, food-insecure countries, reanalyses and remotely sensed\
    \ data may mitigate the effects of unreliable observational networks and limited\
    \ cross-border data sharing...Food security outlooks are based on the monitored\
    \ and future states of key variables in the Earth system, which draw on the expert\
    \ interpretation of a variety of forecasts...for example, anomalously low soil\
    \ moisture prior to land preparation and planting may delay planting and crop\
    \ development, which can reduce yields...The predictability of slowly varying\
    \ modes of climate variability like El Ni\xF1o\u2013Southern Oscillation (ENSO;\
    \ FEWS NET 2020a,b) and the Indian Ocean dipole (FEWS NET 2021) and their known\
    \ effects on regional climates provide forecasts of opportunity...There is an\
    \ increasing realization that prediction skill on longer than weather time scales\
    \ (>2 weeks) can leverage specific climate phenomena...Converting data into knowledge\
    \ to support decision-making requires a robust forecasting infrastructure."
