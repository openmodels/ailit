  11: "Source material here: This section highlights opportunities for the AMS community\
    \ to engage across this science\u2013policy\u2013society interface to address\
    \ food security. Models\u2014including weather, climate, and agricultural models\u2014\
    are crucial for food security applications. While models have improved significantly\
    \ over the years, predictability of precipitation at S2S time scales is generally\
    \ low and there remains a need for improved process understanding and process\
    \ representation that could uncover additional sources of predictability. Models\
    \ should also be better connected to food-security applications... Additionally,\
    \ recent methodological advancements have dramatically improved the ability to\
    \ detect and attribute the signature of anthropogenic climate change in extreme\
    \ climate events (IPCC 2021a). There is tremendous potential in extending this\
    \ approach into agricultural impacts using combinations of crop models... Ruane\
    \ et al. (2021) demonstrated the use of crop models to capture agroclimatic vulnerability\
    \ with variations by country and system... The AMS plays a crucial role in supporting\
    \ the modeling and attribution of meteorological and climate impacts by creating\
    \ a space for discussion at conferences and engaging with committees that address\
    \ existing challenges. However, the AMS should better link these discussions to\
    \ food security applications and encourage greater collaboration across the weather,\
    \ water, climate, and agriculture sectors to ensure these advancements in science\
    \ are suitable for agricultural decision-making.\""
