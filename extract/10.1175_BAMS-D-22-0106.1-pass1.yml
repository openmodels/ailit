  2: " \nFood security lies at the heart of human well-being and prosperity and is\
    \ key to achieving many of the UN Sustainable Development Goals (SDGs) and those\
    \ of other global frameworks. \u2026 The food system\u2014including the production,\
    \ distribution, and consumption of food\u2014is highly vulnerable to extreme weather\
    \ and climate events. The interactions between weather, climate, and the food\
    \ system have a significant impact on food security by affecting the availability,\
    \ access, utilization, and stability of food. However, the global food system\
    \ is also a major driver of climate change, responsible for nearly one-third of\
    \ global greenhouse gas emissions (GHG) (Crippa et al. 2021).\n"
  3: "Source material here.\nFood security encompasses four dimensions, namely, the\
    \ physical availability of food, the economic and physical access to food of sufficient\
    \ nutritional quality, the utilization of food, and the stability of these dimensions\
    \ over time (FAO et al. 2021). These dimensions are com-\nmonly referred to as\
    \ \u201Cthe four pillars of food security\u201D and are impacted by the interactions\
    \ between weather, climate, and the food system.\n\nThe complex food system\u2014\
    conceptualized as three simplified components including the production, distribution,\
    \ and consumption of food\u2014is highly vulnerable to weather and climate phenomena\
    \ such as droughts, floods, heat waves, cold spells, and storm events (hail, snow,\
    \ ice, wind, etc.). \n\nAccording to local food banks in Florida, demand quadrupled\
    \ and vulnerable migrant communities were particularly hard hit (Feito 2022).\n\
    \nand the value of weather and climate research for risk management and fostering\
    \ resilience.\n\nFor those communities that are already food-insecure, climate\
    \ change is a \u201Cthreat multiplier,\u201D threatening crop yields and the food\
    \ supply while also raising prices and reducing growers\u2019 incomes. \n\nIt\
    \ discusses the crucial role AMS can play in addressing this challenge  starting\
    \ with monitoring and forecasting of weather and climate phenomena that interact\
    \ with food security, and developing and providing decision-makers the information\
    \ they need to take action across scales of time, space, and production.\n\nThe\
    \ article also highlights the importance of engaging with users and decision-makers\
    \ to enhance the exchange of knowledge and expertise and identifies some of the\
    \ many opportunities for meteorology and climate science to support global food\
    \ security that may be under recognized.\n"
  4: "  \n\"to human-induced climate change\u2014a feedback loop in which the global\
    \ food system drives the very climate shocks that threaten it. As a result, monitoring,\
    \ forecasting, and projecting these weather and climate phenomena is crucial to\
    \ understanding how they interact with the food system and their implications\
    \ for food security.\"\n\n\"Food production is highly dependent on climate drivers\
    \ including precipitation, temperature, evaporative demand, evapotranspiration,\
    \ and atmospheric carbon dioxide (CO2 ). Extreme weather events, in particular,\
    \ can have devastating impacts on crops and livestock and the effects of climate\
    \ change will increasingly strain food security. Rising global temperatures will\
    \ shift climate zones suitable for growing crops and increase health risks to\
    \ farm laborers.\"\n\n\"However, food production activities are also a major contributor\
    \ to global GHG emissions, particularly agricultural activities and land-use change,\
    \ which accounted for 71% of the GHG emissions that originated from the global\
    \ food system in 2015.\"\n\n\"Food distribution and supply networks are vulnerable\
    \ to weather- and climate-driven disruptions to the supply-chain infrastructure.\"\
    \n\n\"Food distribution also contributes to global GHG emissions, particularly\
    \ through supply chain activities (storage, processing, transport, etc.), which\
    \ account for approximately 5%\u201310% of the food system\u2019s total GHG emissions.\"\
    \n\n\"Food consumption is also affected by climate variables such as temperature\
    \ and CO2 concentrations, which influence biological processes that impact food\
    \ quality and nutrition... higher CO 2 levels have been shown to result in large\
    \ declines in vitamin content ...\"\n\n\"Consumption patterns are also closely\
    \ tied to food loss and waste, which accounted for 8%\u201310% of total, global\
    \ anthropogenic GHG emissions in 2010\u201316.\"\n\n\"Agroclimatic information\
    \ is derived from in situ observations or remotely sensed platforms. Retrospective\
    \ analyses (reanalyses), derived from assimilation of observations into modeling\
    \ frameworks, produce seamless spatial and temporal datasets that fill in observational\
    \ gaps.\"\n"
  5: "markdown\n\"The choice of states and fluxes to be observed, modeled, or forecasted\
    \ must strike a balance between the competing demands of physical relevance to\
    \ food security and the observability, predictability, and availability of data.\"\
    \n\n\"...evaporative demand...is therefore central to food-security monitoring...\"\
    \n\n\"...evaporative demand is often forecast at the same or longer lead times\
    \ with equal or better skill than precipitation, thereby permitting more accurate\
    \ monitoring and more skillful predictions of the demand side of food-security\
    \ water balances than of the supply side.\"\n\n\"Farmers employing precision agriculture\
    \ practices may operate on the scale of individual plants and rows within a field,\
    \ with management tailored to fine-scale soil\u2013hydrology interactions and\
    \ the thermodynamics of plant canopies and shading structures...\"\n"
