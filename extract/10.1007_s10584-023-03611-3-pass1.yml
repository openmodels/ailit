    \ effect...on global GDP...\"                  \n\"Fig.5 The climate-attributable\
    \ effect of RCP scenarios plus surpassing tipping points...\"\n\"The sensitivity\
    \ of the IFs-RCP model results to scenarios that exogenously changed the Gini\
    \ coefficient for income inequality was tested...\"\n\"In an RCP 2.6 world, global\
    \ income inequality would need to be improved by five percent through 2070 to\
