  13: The paper evaluates the impact of climate change on poverty across different
    countries and income thresholds using established macro-level relationships. Climate
    scenarios such as RCP 2.6, 4.5, 6.0, and 8.5, along with global income inequality
    reductions (e.g., one percent, five percent) are impacting poverty levels. The
    quantitative analysis shows these effects under various RCP scenarios, such as
    requiring a fifteen percent reduction in income inequality under RCP 8.5. The
    analysis is performed through established macro-level relationships and SSP-RCP
    scenario combinations; it shows results at the country level and across income
    thresholds, looking further into the future than previous studies. Significant
    uncertainty characterizes climate change's impact on human development, but mitigation
    efforts can reduce the climate-induced poverty burden. The long-term mitigation
    of climate-induced poverty can also be achieved through efforts to improve income
    distribution.
  14: Source material here.
  15: "The \u201Cmiddle-of-the-road\u201D scenario (SSP2-RCP 4.5) leads to an additional\
    \ 40 million people in extreme poverty by 2050 relative to a world without climate\
    \ change. Finding a balance will be crucial for the wellbeing of future generations."
