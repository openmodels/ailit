Quantitative material:
  1: 'Climate change-attributable extreme poverty will grow to 25 million people by
    2030 (range: 18 to 30), 40 million by 2050 (range: 9 to 78), and 32 million by
    2070 (range: 4 to 130).'
  4: The paper models the impact of climate tipping points on the social cost of carbon
    (SCC) and finds an increase by about 25% by 2100 if all tipping points are surpassed.
  5: "A 1% increase in temperature raises the Gini coefficient for income inequality\
    \ by 0.5 points on a 0\u2013100-point scale."
  7: "RCP 2.6 increases average global temperature to 20.6\xB0C by 2070; RCP 4.5 reaches\
    \ 21.4\xB0C; RCP 6.0 reaches 21.3\xB0C; RCP 8.5 reaches 22.4\xB0C by 2070."
  8: 'Reports GDP per capita growth by 2070 for different SSPs: $97.4k (SSP5), $69.7k
    (SSP1), $48.8k (SSP2), $39.6k (SSP4), $25.8k (SSP3), and $33.5k (IFs scenario);
    changes in Gini index with SSP1 and SSP5 showing 20% reduction.'
  9: 'Table 2: Effect of climate change on global economic growth (cumulative trillions
    of 2011 US$ and percentage change) for 2030, 2050, and 2070 under different climate
    scenarios (IFs-RCP 6.0, SSP1-RCP 2.6, SSP2-RCP 4.5, SSP3-RCP 6.0, SSP4-RCP 6.0,
    SSP5-RCP 8.5). Table 3: Effect of climate on global Gini coefficient (absolute
    terms on a 0-1 scale and percentage change) for 2030, 2050, and 2070 under different
    climate scenarios.'
  10: Projected increase in extreme poverty due to climate change ranges from 18-30
    million by 2030, 9-78 million by 2050, and 4-130 million by 2070 depending on
    assumptions about socio-economic development and emissions.
  11: Table 4 presents the effect of climate on poverty across thresholds measured
    in millions in 2030, 2050, and 2070, under different scenarios (IFs-RCP 6.0, SSP1-RCP
    2.6, SSP2-RCP 4.5, SSP3-RCP 6.0, SSP4-RCP 6.0, SSP5-RCP 8.5). By 2070, nearly
    40% of the population living on less than $1.90 per day will be attributable to
    climate change in an IFs-RCP 6.0 scenario; nearly 30% of the future population
    living on less than $3.20 per day will be there due to climate change; and at
    the $5.50 threshold, nearly 20% will be climate change attributable.
  12: Table 5 shows cumulative effect of tipping points on global GDP in trillions
    of 2011 US$ at market exchange rates for different RCP scenarios in 2030, 2050,
    and 2070. For example, under SSP5-RCP 8.5, the GDP loss is -$44.0 trillion in
    2030, -$529.3 trillion in 2050, and -$2,340.0 trillion in 2070. Fig. 5 shows the
    climate-attributable effect of RCP scenarios plus tipping points on global poverty
    (extreme, poverty, and moderate) measured in millions.
  13: Quantitative analysis shows effects of reductions in income inequality on global
    climate-attributable poverty under various RCP scenarios.
  15: An additional 40 million people are projected to be in extreme poverty by 2050
    under scenario SSP2-RCP 4.5.
sourcematerial:
  1: "Source material here.\nClimatic Change (2023) 176:137\nhttps://doi.org/10.1007/s10584-023-03611-3\n\
    How many people will live in\_pover ty because\_of\_climate\nchange? A\_macro\
    \ \u2011level projec tion analysis to\_2070\nJonathan\_D.\_Moyer1            \_\
    \xB7 Audrey\_Pirzadeh1\_\xB7 Mohammod\_Ir fan1\_\xB7 Jos\xE9\_Sol\xF3rzano1\_\xB7\
    \nBarbara\_Stone1\_\xB7 Yutang\_Xiong1\_\xB7 Taylor\_Hanna1\_\xB7 Barr y\_B.\_\
    Hughes1\nReceived: 18 April 2023 / Accepted: 8 September 2023 / Published online:\
    \ 2 October 2023\n\xA9 The Author(s) 2023\nAbstract\nFossil fuel-based economic\
    \ development both causes climate change and contributes to poverty\nalleviation,\
    \ creating tensions across societal efforts to maintain growth, limit climate\
    \ damage,\nand improve human development. While many studies explore key aspects\
    \ of this dilemma, few\ndirect attention to the pathways from climate change through\
    \ socioeconomic development to the\nfuture of poverty. We build on projections\
    \ of global temperature change (representative concen-\ntration pathways) and\
    \ country-specific economic development (economic growth and income\ndistribution\
    \ across the shared socioeconomic pathways) to model how climate change may affect\n\
    future poverty with the International Futures (IFs) model, projecting poverty\
    \ across income\nthresholds for 175 countries through 2070. Central tendency scenarios\
    \ with climate effects com-\npared with scenarios that do not model climate change\
    \ show that climate change-attributable\nextreme poverty will grow to 25 million\
    \ people by 2030 (range: 18 to 30), 40 million by 2050\n(range: 9 to 78), and\
    \ 32 million by 2070 (range: 4 to 130)\_though overall levels of global poverty\n\
    decline. If climatic tipping points are passed, the climate-attributable extreme\
    \ poverty grows to\n57 million people by 2030 (range: 40\u201372), 78 million\
    \ by 2050 (range: 18\u2013193), and 56 million\nby 2070 (range: 7\u2013306). To\
    \ mitigate baseline effects of climate change on extreme poverty, an\nimprovement\
    \ of global income inequality of 10% is required (range: 5\u201315%).\nKeywords\
    \                                             Climate change\_\xB7 Socioeconomic\
    \ development\_\xB7 SDG1\_\xB7 Poverty\_\xB7 Sustainable\ndevelopment\nHighlights\n\
    \u2022This paper introduces scenarios that combine RCPs with economic growth and\
    \ inequality series from\nthe SSPs, creating alternative climate-informed socioeconomic\
    \ projections.\n\u2022Forecasts of climate-driven poverty increases\_in this paper\
    \ are lower than estimates made using\nbottom-up approaches, suggesting that macro-level\
    \ approaches miss dynamics related to prices and\nconsumption power, though these\
    \ are difficult to project over very long-time horizons.\n\u2022Tipping points\
    \ are a significant threat to future socioeconomic development and drive significant\n\
    increases in poverty across scenarios.\n\u2022Productivity gains can directly\
    \ reduce poverty but also increase climate change on a fossil fuel energy system.\n\
    \u2022Long-term effects of climate change on poverty could be mitigated with a\
    \ sustained effort to improve\nincome distribution.\n*                       \
    \                          Jonathan D. Moyer\njmoyer@du.edu\nExtended author information\
    \ available on the last page of the articlew\n"
  3: 'The results of this analysis show that climate change will remain a significant
    challenge for future patterns of socioeconomic development, with tens of millions
    pushed into poverty because of climate change even in more optimistic scenario
    combinations. Hallegatte et al. (2016) focus on four pathways through which climate
    change impacts poverty: prices, assets, opportunities, and productivity. Climate
    change also has direct impacts on poverty via agricultural losses, reductions
    in yields, and destruction of assets from climate-related disasters and shocks,
    all of which contribute to the loss of income.'
  4: "Source material here.\n\"We capture the impact of climate change on productivity\
    \ via a damage function, which is a simplified approach to gauge the economic\
    \ losses from worsening climate conditions, such as a rise in mean temperature\
    \ (Wang and Teng 2022).\"\n\n\"Climate tipping points are \u201Ccritical thresholds\u201D\
    \ within natural systems that, once surpassed, will cause irreversible damage\
    \ characterized by feedback which is uncertain and non-linear (IPCC 2022).\"\n\
    \n\"A study by Dietz et\_al. (2021) models the impact of tipping points on the\
    \ social cost of carbon (SCC) for 180 countries, finding that if all tipping points\
    \ are surpassed, the SCC will increase by about 25% by 2100.\"\n"
  5: Source material here.
  7: The IFs model includes a six-sector general equilibrium model of the economy...which
    simulates production in each sector using Cobb-Douglas type production functions
    that incorporate sector-specific labor (LABS), capital (KS), total factor productivity
    (TEFF), and utilization factor (CAPUT). The model initializes inter-sectoral flows
    with GTAP sectoral-flow data and uses a set of input-output tables grouped by
    per capita income ranges to establish sector-flow pathways as economies become
    more developed...The poverty calculation in IFs is based on the assumption of
    a log-normal income distribution...This distribution is updated annually based
    on changes in projected consumption and the Gini index of inequality...RCP 2.6
    has an increase of average global temperature to 20.6 degrees centigrade by 2070.
    RCP 4.5 reaches a temperature of 21.4 degrees by 2070, while RCP 6.0 reaches a
    temperature of 21.3 degrees by 2070. RCP 8.5 has a steady increase of average
    global temperature which reaches 22.4 by 2070.
  8: "text\nEvaluation overview: Each graph shows global forecasts for all No Climate\
    \ scenarios in solid lines for a GDP per capita at PPP measured in 2011 USD, b\
    \ Gini index for income inequality measured on a 0\u20131 scale, c population\
    \ measured in millions, and d extreme poverty (less than $1.90 per day) measured\
    \ in millions. | Drivers of Risk: Future levels of average per capita GDP increase\
    \ most rapidly in SSP5, a world of high growth and investment and high challenges\
    \ to mitigation (Dellink et  al. 2017). ... Scenarios with greater challenges\
    \ to adaptation show lower long-term growth in per person economic production\
    \ and consumption, with SSP4 growing to $39.6 thousand USD and SSP3 growing to\
    \ $25.8 thousand USD by 2070. | Quantitative material: By 2070, per capita GDP\
    \ grows to $97.4 thousand USD...average income increasing to $69.7 thousand USD\
    \ by 2070...SSP4 growing to $39.6 thousand USD and SSP3 growing to $25.8 thousand\
    \ USD by 2070... SSP1 and SSP5, show much more equal distributions of resources,\
    \ with the Gini values falling by nearly 20% by the end of the time horizon. |\
    \ Highlights: Future levels of average per capita GDP increase most rapidly in\
    \ SSP5... Scenarios with fewer challenges to adaptation, such as SSP1 and SSP5,\
    \ show much more equal distributions of resources, with the Gini values falling\
    \ by nearly 20% by the end of the time horizon. SSP3 is the scenario with the\
    \ greatest population growth, increasing to 11.3 billion by 2070.\n"
  9: " \nThe paper provides evaluation by stating, \"According to the DICE model damage\
    \ function, the impact of climate change on global economic production is projected\
    \ to reduce GDP across all scenarios.\" Additionally, it mentions global inequality:\
    \ \"Table 3 presents the impact of changing temperature on future levels of inequality.\"\
    \n\nDrivers of risk are indicated as \"the impact of climate change on global\
    \ economic production\" and \"increase in global inequality driven by temperature.\"\
    \n\nQuantitative material is provided in Tables 2 and 3: \"Table 2: The effect\
    \ of climate change on global economic growth measured in cumulative trillions\
    \ of 2011 US$ and percentage change for 2030, 2050, and 2070,\" and \"Table 3:\
    \ The effect of climate on global Gini measured on a 0-1 scale in absolute terms\
    \ and in percent change for 2030, 2050, and 2070.\"\n\nMethodology details state,\
    \ \"According to the DICE model damage function,\" but specific methods are not\
    \ elaborated.\n\nThe highlights mention reductions in GDP: \"by 2070, the GDP\
    \ reduction ranges from -0.8 to -3.2%.\" On inequality, it notes, \"The increase\
    \ in global inequality driven by temperature is projected to range from 0.01 to\
    \ 0.016.\"\n\nAdditional notes are informed by the text: \"The impact on economic\
    \ growth is substantial, with potential losses of trillions of US dollars. The\
    \ study also projects increases in global inequality due to climate change.\"\n"
  10: "Source material: Figure 3 displays the number of people who are expected to\
    \ fall into extreme poverty due to climate change in each scenario. By 2030, the\
    \ projected number of people pushed into extreme poverty ranges from an additional\
    \ 18\u201330 million. In 2050, the range of uncertainty widens considerably, and\
    \ the SSP1-RCP 2.6 scenario, which assumes improved socioeconomic development\
    \ and low emissions, shows an increase of 9 million people in poverty, a reduction\
    \ from the level forecast for 2030. This scenario suggests that if socioeconomic\
    \ development and climate change mitigation efforts are effectively balanced,\
    \ the number of people pushed into poverty by climate change could be as low as\
    \ 4 million by 2070. On the other hand, the more pessimistic SSP3-RCP 6.0 scenario,\
    \ which models slow socioeconomic development and moderately high levels of emissions,\
    \ leads to an increase in the number of people in poverty by 30 million by 2030,\
    \ 78 million by 2050, and 130 million by 2070. The SSP5-RCP 8.5 scenario, which\
    \ assumes high socioeconomic development and high emissions, also results in an\
    \ increase in the number of people in poverty, albeit at much lower levels than\
    \ the scenarios with lower socioeconomic development. Specifically, the SSP5-RCP\
    \ 8.5 scenario pushes an additional 24 million people into poverty by 2030, 20\
    \ million into poverty by 2050, and 39 million into poverty by 2070. Fig.3 Each\
    \ graph shows the effect of climate on global poverty measured in millions: a\
    \ extreme poverty (less than $1.90 per day\u2014top left), b poverty (less than\
    \ $3.20 per day\u2014top right), and c moderate poverty (less than $5.50 per day\u2014\
    bottom left). The uncertainty treatment here does not use longitudinal error bands\
    \ and instead considers the broad assumptions made across SSP and RCP scenarios\
    \ to reflect a broad treatment of future uncertainty."
  11: '

    The full range of results for the population pushed into poverty under different
    income thresholds is provided in Fig. 3 and Table 4. Future patterns of climate
    change will also increase the share of the population living on lower income thresholds
    more than higher income thresholds, as demonstrated in Fig. 4. By 2070, nearly
    40% of the population living on less than $1.90 per day will be attributable to
    climate change in an IFs-RCP 6.0 scenario. As we climb the income ladder, nearly
    30% of the future population living on less than $3.20 per day will be there due
    to climate change. At the $5.50 threshold, nearly 20% will be climate change attributable.
    Table 4 presents the effect of climate on poverty across thresholds measured in
    millions in 2030, 2050, and 2070. These model results are lower than results from
    Hallegatte et al. (2016), which produces a poverty scenario using SSP4 and RCP
    8.5 showing 122 million pushed into poverty because of climate change from 2014
    to 2030. Model results are generated using different scenarios (IFs-RCP 6.0, SSP1-RCP
    2.6, SSP2-RCP 4.5, SSP3-RCP 6.0, SSP4-RCP 6.0, SSP5-RCP 8.5) for the years 2030,
    2050, and 2070. These tipping points are estimated to increase the number of people
    living in poverty across various income thresholds, as shown in Fig. 5. The analysis
    also considers the impact of tipping points on poverty, with results presented
    in Fig. 5 and Table 5 (not included on this page). Previous analyses in this manuscript
    did not consider the potential impact of tipping points, which could have catastrophic
    effects on socioeconomic development. By 2070, nearly 40% of the population living
    on less than $1.90 per day will be attributable to climate change in an IFs-RCP
    6.0 scenario. Table 4 presents the effect of climate on poverty across thresholds
    measured in millions in 2030, 2050, and 2070, under different scenarios (IFs-RCP
    6.0, SSP1-RCP 2.6, SSP2-RCP 4.5, SSP3-RCP 6.0, SSP4-RCP 6.0, SSP5-RCP 8.5). Using
    the same period of time and scenario assumptions, our SSP4-RCP 8.5 scenario without
    tipping points increases the number of people in poverty by 48 million, and including
    tipping points increases that number to 99 million. The effect of climate change
    on poverty across different income thresholds ($1.90, $3.20, $5.50 per day).

