Drivers of Risk:
  1: The drivers of risk are global temperature change (representative concentration
    pathways) and country-specific economic development (economic growth and income
    distribution across the shared socioeconomic pathways).
  3: The analysis identifies indirect impacts such as increased prices of food, housing,
    and healthcare, as well as direct impacts from agricultural losses and destruction
    of assets from climate-related disasters.
  4: The analysis examines the impact of climate change, particularly focusing on
    increasing temperatures and economic losses.
  5: Temperature and precipitation variation, climate change impacts on overall economic
    activity.
  8: The scenarios consider challenges to adaptation and mitigation as drivers affecting
    outcomes like GDP, income distribution, and population.
  9: Climate change, specifically temperature changes.
  10: Different scenarios (SSP-RCP combinations) involving socio-economic development
    and emissions levels drive the impact on poverty due to climate change.
  11: Climate change, tipping points (mentioned but not detailed on this page).
  12: Climate tipping points, RCP scenarios (various emission pathways), and income
    inequality.
  13: Exogenous shocks or changes such as climate scenarios (RCP 2.6, 4.5, 6.0, 8.5)
    and global income inequality reductions are impacting poverty levels.
  14: The page identifies climate change as a driver impacting temperature change,
    inequality, and poverty.
  15: The paper discusses climate change as a driver pushing additional people into
    extreme poverty.
Evaluation overview:
  1: The paper evaluates the impact of climate change on poverty levels, projecting
    the number of people living in poverty due to climate change.
  3: The analysis evaluates the impact of climate change on poverty and how it will
    challenge future socioeconomic development.
  4: The evaluation assesses the impact of climate change on productivity through
    a damage function approach.
  5: Income disparities, agricultural activity, economic production, income distribution,
    and population change
  8: The page provides an overview of socioeconomic outcomes under different SSP scenarios,
    including GDP per capita, income inequality (Gini index), population size, and
    extreme poverty levels by 2070.
  9: Global economic growth and global Gini coefficient (inequality).
  10: The paper provides an overview of the impact of climate change on global poverty,
    specifically extreme, poverty, and moderate poverty measured in millions of people.
  11: The effect of climate change on poverty across different income thresholds ($1.90,
    $3.20, $5.50 per day).
  12: Impact of climate tipping points on global GDP and poverty.
  13: The paper evaluates the impact of climate change on poverty across different
    countries and income thresholds.
  14: The page provides an overview of how climate change, driven by technology and
    carbon energy systems, impacts economic growth, inequality, and poverty.
  15: The paper provides an overview of the projected increase in extreme poverty
    due to climate change scenarios.
Highlights:
  1: Forecasts of climate-driven poverty increases are lower than estimates made using
    bottom-up approaches; Tipping points are a significant threat to future socioeconomic
    development and drive significant increases in poverty; Long-term effects of climate
    change on poverty could be mitigated with a sustained effort to improve income
    distribution.
  3: Climate change will continue to be a significant challenge, pushing tens of millions
    into poverty even under more optimistic scenarios. The analysis emphasizes the
    need to address multiple global challenges simultaneously.
  5: Climate change exacerbates inequality through agricultural activity, directly
    and indirectly. Depressed agricultural yields affect rural income and likely affect
    poor urban populations indirectly by jeopardizing their real income and consumption
    patterns via increased food prices.
  8: Under SSP5, GDP per capita grows most rapidly, reaching $97.4k by 2070; SSP1
    and SSP5 show most equal income distribution with significant Gini index reductions;
    SSP3 exhibits highest population growth, increasing to 11.3 billion by 2070.
  9: Climate change is projected to reduce global economic growth across all scenarios.
    By 2070, the GDP reduction ranges from -0.8 to -3.2%. The increase in global inequality
    driven by temperature is projected to range from 0.01 to 0.016 in 2030, 0.022
    to 0.042 in 2050 and 0.023 to 0.074 in 2070, depending on the scenario.
  10: In the SSP1-RCP 2.6 scenario, optimal socio-economic development and low emissions
    result in fewer people pushed into poverty, while SSP3-RCP 6.0 and SSP5-RCP 8.5
    scenarios result in much higher numbers of additional impoverished people.
  11: Climate change is projected to increase the number of people living in poverty,
    and the share of the population living on lower income thresholds will increase
    more than higher income thresholds.
  12: Climate tipping points can cause substantial losses in global GDP. Income inequality
    exacerbates climate-attributable poverty; improvements in income inequality can
    offset climate-induced poverty.
  13: Significant uncertainty characterizes climate change's impact on human development,
    and mitigation efforts can reduce the climate-induced poverty burden.
  14: The research highlights the dual role of technology, where productivity boosts
    fossil fuel emissions while renewable improvements mitigate them, and emphasizes
    policy solutions for reducing carbon intensity and human consumption.
  15: The paper highlights the need for policy focus on both socioeconomic development
    and its environmental consequences as essential to future human wellbeing.
Methodology:
  1: The analysis uses the International Futures (IFs) model to project poverty across
    income thresholds for 175 countries through 2070, combining RCPs with economic
    growth and inequality series from the SSPs.
  4: The study uses damage functions to capture the impact of climate change on economic
    productivity and also incorporates the impact of tipping points in various socio-economic
    and temperature change scenarios.
  5: Uses SSPs, RCPs, and IFs to model economic production, income distribution, and
    population change for 175 countries from 2017 to 2070. RCP temperature trajectories
    are used to measure median temperature change relative to pre-industrial levels.
    Damage functions and tipping points are introduced to capture the impacts of climate
    change on overall economic activity. Alternative versions of SSP scenarios are
    created to reflect the economic and inequality effects.
  7: Poverty calculation in IFs is based on log-normal income distribution, updated
    annually with changes in projected consumption and the Gini index.
  9: The analysis uses the DICE model damage function to project the impact of climate
    change on global economic production. The specific details of the methodology
    are not included in the text, only the results are.
  11: Model results are generated using different scenarios (IFs-RCP 6.0, SSP1-RCP
    2.6, SSP2-RCP 4.5, SSP3-RCP 6.0, SSP4-RCP 6.0, SSP5-RCP 8.5) for the years 2030,
    2050, and 2070.
  12: The IFs-RCP model is used to assess the impact of tipping points and climate
    scenarios. Sensitivity analysis is performed by exogenously changing the Gini
    coefficient for income inequality.
  13: Analysis is based on established macro-level relationships and presents findings
    using SSP-RCP scenario combinations.
  14: The analysis relies on modeling using damage functions, historical data, lack
    of sectored analysis, and other limitations but is intended to understand socioeconomic
    development amid climate change.
More Notes:
  1: The paper acknowledges the tension between fossil fuel-based economic development
    (which alleviates poverty but causes climate change) and efforts to limit climate
    damage and improve human development.
  5: Replication results are available online. The analysis uses a 10-year moving
    average for temperature change.
  9: The results are presented for specific climate scenarios (RCPs and SSPs) and
    time horizons (2030, 2050, 2070). The impact on economic growth is substantial,
    with potential losses of trillions of US dollars. The study also projects increases
    in global inequality due to climate change.
  11: The analysis also considers the impact of tipping points on poverty, with results
    presented in Fig. 5 and Table 5 (not included on this page). The results are compared
    to a previous study by Hallegatte et al. (2016).
  13: The manuscript emphasizes the long-term mitigation of climate-induced poverty
    through efforts to improve income distribution.
