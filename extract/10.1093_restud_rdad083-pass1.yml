Highlights:
  1: Increased demand for green firms would benefit long-term investors, banks, and
    passive investment advisors at the expense of hedge funds and small-active investment
    advisors.
  3: Identifies significant heterogeneity in demand curves both within and across
    institutional investor types.
  5: Foreign investors are suggested to help lower the cost of capital for green firms
    in the U.S., demonstrating which investors matter for the pricing of ESG scores.
  6: Investors and regulators are concerned about the impact of climate-related risks
    on asset prices and investor welfare.
  7: Long-term investors, banks, and passive investment advisors benefit from the
    transition, while active investment advisors and hedge funds experience a decline
    in AUM.
  8: Develops an instrumental variables shrinkage estimator, which allows us to estimate
    investor-sp ecific demand curves, even when an investor holds a concentrated p
    ortfolio.
  12: The valuation impact of an investor depends on its size, heterogeneity in demand
    elasticities, and differences in the investor's demand for characteristics and
    latent demand.
  14: No relevant information
  22: Estimates are robust to varying the window of time used to define the investment
    universe, both looking back and forward in time.
  23: Two sets of estimates excluding hedge funds are highly correlated; model extension
    to accommodate characteristics responding to prices.
  28: Small-active investment advisors and hedge funds have the largest impact on
    prices; Hedge funds play an outsized role in mispricing per dollar of AUM.
  30: Small-active investment advisors and hedge funds are important for the pricing
    of governance in US markets.
  32: "Latent demand and demand elasticities contribute equal amounts to the reduction\
    \ in the active share from 2007 to 2019, while portfolio tilts to characteristics\
    \ increased investors\u2019 active share during the same period."
  36: A broad shift in investor preferences (stakeholder risk) has a larger impact
    on asset prices than regulatory changes focused on long-term investors. Long-term
    investors, banks, and passive investors are the main beneficiaries of the transition,
    while hedge funds and active investors are exposed to climate-related transition
    risk.
  37: Develops a framework to quantitatively assess how much different investors contribute
    to incorporating information into prices and long-horizon expected returns. The
    framework allows economists to put numbers on narratives that explain patterns
    in prices and characteristics using different groups of investors such as retail
    investors, hedge funds, and patient long-term investors.
  38: Foreign investors are particularly important for the valuation of green firms,
    while small-active investment advisors for the valuation of well-governed firms.
  42: Climate risks are important for institutional investors and affect market efficiency
    and asset pricing.
  46: Table shows the largest investors by assets under management for each type (e.g.,
    households, large passive investment firms) in 2019 Q4.
  47: Environmental scores have a positive and statistically significant relationship
    with the log market-to-book ratio (mb) from 2010-2019 and 2000-2019.
  49: Repricing AUM scaled, calculated as total repricing divided by share of assets
    under management, varies significantly by investor type, ranging from 0.90 for
    Large Passive investors to 3.58 for Hedge Funds.
  52: The analysis suggests that increased investor focus on environmental scores
    impacts company valuations, specifically the market-to-book ratio. The magnitude
    of the impact varies depending on whether all institutions or only long-term investors
    increase their emphasis on environmental scores.
  56: The figure presents a summary of demand curves by investor type.
  57: Summary of demand curves by investor domicile, reporting weighted average of
    parameter estimates.
