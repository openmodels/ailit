  63: " \nWe build a panel of end-of-quarter equity holdings of US companies using\
    \ FactSet 13F holdings data. Our FactSet holdings data covers the period from\
    \ 2000 Q1 until 2019 Q4. We merge on prices from own sec prices eq and calculate\
    \ dollar values of holdings for holdings of each security. We construct the Household\
    \ sector so that total holdings of institutions and household are equal to each\
    \ firms market cap. The active share is defined as the sum of the absolute value\
    \ of the differences between the actual portfolio weights of an investor and a\
    \ market-weighted portfolio based on the stocks held by the same investor, divided\
    \ by two to avoid double-counting. We calculate firm-level market capitalization\
    \ using FactSet prices and shares outstanding data. Our construction of firm-level\
    \ fundamentals largely follows the procedure in Fama and French (2015). Accounting\
    \ data are from the Compustat Fundamentals Annual and Quarterly Databases. We\
    \ restrict our sample of companies to ordinary common shares (share codes 10,\
    \ 11) that trade on the New York Stock Exchange (NYSE), the American Stock Exchange,\
    \ and Nasdaq (exchange codes 1, 2, and 3).\n"
