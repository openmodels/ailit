sourcematerial:
  1: "Source material: We develop a new framework to quantitatively connect valuations,\
    \ expected returns, and characteristics to the demands of institutional investors\
    \ and households. Using investor-level holdings data, we estimate asset demand\
    \ as a function of prices and characteristics and quantify how portfolio tilts\
    \ across investors affects firm\u2019s valuation ratios. The characteristics include\
    \ environmental and governance measures... Second, we use our model to assess\
    \ climate-related risks and find that increased demand for green firms would benefit\
    \ long-term investors, banks, and passive investment advisors at the expense of\
    \ hedge funds and small-active investment advisors.\"\n"
  3: null
  5: 'Source material here: To understand how much different investors matter the
    pricing of firm characteristics, we re-estimate the cross-sectional valuation
    regression using the counterfactual prices and do cument how the regression co
    efficients and residuals change. We consider the pricing of the environmental
    index as an example. The baseline co efficient implies that a one standard deviation
    increase in the index leads to a 17% increase in valuations. This numb er would
    drop to 14% if we reallo cate assets from foreign investors, while it would increase
    to 21% if we reallo cate assets from small-active investment advisors to the other
    institutional investors. Thus, the estimates imply that foreign investors help
    to lower the cost of capital for green firms in the US, conditional on the other
    characteristics. This example illustrates how our metho dology contributes to
    the active ESG research agenda by showing which investors matter for the pricing
    of ESG scores in the cross section of sto cks.'
