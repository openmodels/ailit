Methodology:
  1: Asset demand estimation as a function of prices and characteristics; analysis
    of portfolio tilts across investors and their effect on firm valuation ratios
  3: Estimates an asset demand system with characteristics, prices, and latent demand
    using US quarterly data from 2000 to 2019.
  5: The analysis involves re-estimating cross-sectional valuation regressions using
    counterfactual prices to understand the impact of different investors on firm
    characteristics pricing.
  6: The paper uses a framework to analyze how firm valuations and investor welfare
    are affected by transitions, including a counterfactual analysis related to investment
    management trends.
  7: The analysis is performed by designing counterfactuals to capture regulatory
    and stakeholder risks for long-term investors and assessing changes in asset prices
    and AUM.
  8: Presents a simple mo del to illustrate how we can measure the imp ortance of
    various investors in the price formation pro cess.  Considers a two-p erio d mo
    del with time indexed by t = 0,1. There are N assets indexed by n = 1, . . . ,
    Nand I investors indexed by i = 1, . . . , I. The supply of each asset is normalized
    to one. Vectors and matrices are denoted in b old. Elements of vectors are indexed
    with parentheses. Investors have constant absolute risk aversion (CARA) preferences
    over wealth at time 1.
  9: The model includes extending investor preferences to add a 'taste' for firm characteristics
    related to environmental impact, though empirical determination of motivations
    remains unclear.
  12: The methodology involves modeling the impact of an investor's outflow of assets
    on valuation ratios, considering changes in investor weights and heterogeneity
    in preferences and demand elasticities. The analysis is applicable to understanding
    the price effects resulting from investor behavior.
  13: The model defines the top 90% of stocks by market capitalization as the universe
    of assets to focus on pricing the largest firms in the economy.
  14: The paper models investor portfolio allocation across stocks based on choice
    sets, demand curves, and market clearing conditions. The demand curve is motivated
    by a simple model in Section I and accounts for the observation that portfolio
    holdings are log-normally distributed. Latent demand is normalized to one to identify
    the intercept.
  19: The asset demand system is estimated using standardized characteristics with
    an assumption that these characteristics are exogenous to latent demand.
  21: Uses a ridge instrumental variables estimator to estimate asset demand curves,
    addressing the challenge of concentrated portfolios and limited data. Employs
    a GMM approach augmented with a ridge penalty. The model is estimated using quarterly
    data. A look-back period of three years is used and the robustness of the demand
    elasticity estimates to the choice of the window, by varying the look-back period
    and also expanding the window into the future.
  22: 'Estimates asset demand system using two identifying assumptions: existence
    of a measurable investment universe based on stock holdings over the last three
    years, and exogeneity of latent demand to stock characteristics.'
  23: Robustness check by excluding hedge funds in the construction of an instrument
    for market equity; model extension to relax assumptions about exogenous characteristics.
  28: The authors reallocate the assets of one group of investors to all others and
    measure the repricing impact to determine the importance of different investors
    for asset prices.
  30: Uses the valuation model of Cohen, Polk, and Vuolteenaho (2003) and Campbell,
    Polk, and Vuolteenaho (2009) to map changes in valuations and their connection
    to characteristics to expected returns; assumes expected growth rates and returns
    are random walks.
  32: "Portfolio weights are computed using a given combination of (\u03B20i, \u02C6\
    \u03B21i, \u03F5it (n)). The active share of a given investor in a given quarter\
    \ is decomposed into the contributions of latent demand, portfolio tilts to characteristics,\
    \ and elastic demand."
  36: Regressions are performed using actual log market-to-book ratios in 2019 and
    changes in log market-to-book ratios in counterfactual scenarios.
  38: An estimated asset demand system is used to analyze the impact of trends in
    the asset management industry.
  42: The methodologies include financial economics models, econometrics, and analysis
    of institutional investor behavior.
  45: Analysis based on firm-level fundamentals from CRSP and Compustat with annual
    data. Table reports data for 2000 Q1 and 2019 Q4. It appears to be looking at
    the concentration of sales and net income within different market cap deciles.
  46: Data is from FactSet and the analysis is for 2019 Q4.
  47: 'The analysis uses regression models to assess the relationship between firm-level
    characteristics and valuation ratios. Regressions include year fixed effects and
    t-statistics are clustered by year. The analysis is performed for two time periods:
    2010-2019 and 2000-2019. Characteristics are standardized cross-sectionally by
    year.'
  49: The analysis uses holdings data from FactSet and firm-level fundamentals from
    CRSP and Compustat. It calculates total repricing as the percent change in market
    cap if assets are reallocated to other institutional investors. The sample runs
    from 2000 to 2019, and the values are time series averages of quarterly values.
  52: The analysis uses regression models to assess the relationship between company
    characteristics, including ESG scores, and market-to-book ratios. The models are
    applied to data from 2019. Characteristics are standardized cross-sectionally
    by year.
  56: Each panel is a histogram of the time-series average of each institutions demand
    curve estimate. To average the coefficients, we first compute the AUM-share average
    for a given investor group and year. We then average these across years for a
    given investor group. Sample runs from 2000 to 2019. Governance and Environment
    data begins in 2010.
  57: Reports the weighted average of the parameter estimates for each investor in
    that group, computing AUM-share weighted averages for each investor group and
    year, then averaging across years for each group; Sample runs from 2000 to 2019;
    Governance and Environment data begins in 2010.
  58: Analysis performed using firm-level fundamentals from CRSP and Compustat and
    holdings data from FactSet, over a sample from 2000 to 2019.
  61: Analysis involves comparing AUM changes in a scenario with re-activated 2019
    demand curves to 2007 levels.
  63: The study builds a panel of end-of-quarter equity holdings of US companies using
    FactSet 13F holdings data from 2000 Q1 to 2019 Q4, merging with price data to
    calculate dollar values of holdings.
  66: The analysis uses a ridge penalty to estimate parameters by fitting a model
    with shrinkage applied for investors with fewer than 750 observations, using cross-validation
    to determine the shrinkage parameter.
