  2: "yaml\nMethodology: \"Using this accumulated experimental data on Aedes spp.\
    \ mosquitoes15,16,18, several studies have developed DENV suitability measures\
    \ that mechanistically model the interactions between climate and mosquito-viral\
    \ traits9,19\u201322.\"\nMethodology: \"a Average climate suitability for dengue\
    \ virus transmission between 1979 and 2022, presented on the Index P scale.\"\n\
    Drivers of Risk: \"Collectively, these climate-dependent variables have favored\
    \ dengue transmission in warm and humid tropical regions and limited expansion\
    \ into more temperate climates beyond the equatorial zone.\"\nQuantitative material:\
    \ \"b, c Mean yearly incidence (cases per 100,000 population; left panel) and\
    \ mean annual climate suitability for dengue virus transmission (right panel)\
    \ across municipalities in Brazil (n = 5570; 2000\u20132014) and Colombia (n =\
    \ 1119; 2007\u20132017), respectively.\"\nHighlights: \"Mechanistic dengue transmission\
    \ suitability measures thus offer an effective way of examining how climate modulates\
    \ the ecological constraints on dengue virus transmission at a higher spatial\
    \ and temporal resolution.\"\n"
  3: "yaml\nDrivers of Risk: \"In this study, we de\uFB01ne climate-based DENV transmission\
    \ suitability using Index P20,23,24,34. Index P is a mechanistic dengue suitability\
    \ measure for Ae. aegypti mosquitoes based on temperature and relative humidity\
    \ that has been shown to characterize the spatiotemporal dynamics of dengue transmission23.\"\
    \nQuantitative material: \"We quantify local and global changes in climate suitability\
    \ for DENV transmission over the last four decades at a monthly time resolution\
    \ and at a spatial resolution of 360 arcseconds (approximately 11 km at the equator).\"\
    \nMethodology: \"By leveraging publicly available estimates of Index P for 186\
    \ countries and territories from 1979 to 202235, we quantify local and global\
    \ changes in climate suitability for DENV transmission over the last four decades\
    \ at a monthly time resolution and at a spatial resolution of 360 arcseconds (approximately\
    \ 11 km at the equator).\"\nHighlights: \"Fig. 2 | Historical changes in climate\
    \ suitability for dengue virus transmission.\"\n"
  4: "  \nEvaluation overview: \"Estimated changes in land area and population with\
    \ high climate suitability from 1979\u20131983 (circle) to 2018\u20132022 (diamond)\"\
    \  \nDrivers of Risk: \"due to climate effects (red), population effects (blue)\
    \ and both climate and population effects (gray).\"  \nQuantitative material:\
    \ \"Mean (point), 50% (thick bar) and 90% (thin bar) credible intervals are shown.\"\
    \  \nMethodology: \"Changes in areas classi\uFB01ed as having high climate suitability\
    \ for dengue virus transmission (using a threshold of 0.5).\"  \nHighlights: \"\
    Climate suitability was highest within the tropical, subtropical and temperate\
    \ areas around the equator.\"\n"
  5: "yaml\nEvaluation overview: \"To quantify the effect of climate suitability on\
    \ dengue incidence, we\uFB01 ta censored linear regression model for each country\
    \ (except Thailand where all provinces had high climate suitability) with mean\
    \ annual incidence as the outcome, climate suitability as a binary independent\
    \ variable (high vs. low suitability), and population density and population size\
    \ as covariates (Supplementary Fig. 2).\"\nDrivers of Risk: \"We examined how\
    \ climate suitability for DENV transmission has changed from 1979 to 2022. First,\
    \ we de\uFB01 ned past climate suitability as the average suitability from 1979\
    \ to 1983 and present climate suitability as the average suitability from 2018\
    \ to 2022 (Supplementary Fig. 3).\"\nQuantitative material: \"We estimated that\
    \ the proportion of the global population living in high-risk areas increased\
    \ from 48.8% to 60.0% (\u0394 = 10.8 pp, 90% CI = 10.0\u201311.8) from 1979\u2013\
    1983 to 2018\u20132022, resulting in 2.5 billion more people living in areas with\
    \ high climate suitability for dengue transmission (Fig. 3d).\"\nMethodology:\
    \ \"To quantify the effect of climate suitability on dengue incidence, we\uFB01\
    \ ta censored linear regression model for each country (except Thailand where\
    \ all provinces had high climate suitability) with mean annual incidence as the\
    \ outcome, climate suitability as a binary independent variable (high vs. low\
    \ suitability), and population density and population size as covariates (Supplementary\
    \ Fig. 2)... To account for transient climate variability and identify areas where\
    \ climate suitability is exhibiting sustained changes over time, we quanti\uFB01\
    \ ed long-term trends in monthly time series of suitability per pixel using a\
    \ seasonal Mann\u2013Kendall test (Fig.2b\u2013d, Supplementary Fig. 7).\"\nHighlights:\
    \ \"Globally, we observed increases in climate suitability in the southern United\
    \ States (Supplementary Fig. 4), north-eastern Brazil, western and southern Africa,\
    \ the Indian subcontinent, Southeast Asia and coastal areas of continental Europe\
    \ (Supplementary Fig. 5).... We estimated that the proportion of the global population\
    \ living in high-risk areas increased from 48.8% to 60.0% (\u0394 = 10.8 pp, 90%\
    \ CI = 10.0\u201311.8) from 1979\u20131983 to 2018\u20132022, resulting in 2.5\
    \ billion more people living in areas with high climate suitability for dengue\
    \ transmission (Fig. 3d).\"\nMore Notes: \"Globally, we found that population\
    \ and climate effects independently contributed 2.16 billion and 182 million more\
    \ people in high-risk areas, respectively. This observation held across continents\
    \ (except Europe), with population growth responsible for at least 4-fold more\
    \ people living in high-risk areas than that estimated for the effects of climate\
    \ alone.\"\n"
  6: "Source material here.\nEvaluation overview: \"Shifts in the land area with high\
    \ climate suitability for dengue virus transmission.\" \"Toexaminehowtheidenti\
    \ \uFB01ed global shifts in climate suitability have been shared among different\
    \ economies, we strati\uFB01ed the changes in climate suitability according to\
    \ the World Bank income groups (Fig.4b).\"\n\nDrivers of Risk: \"Since Ae. aegypti\
    \ prospers within densely-populated urban environments, we examined how climate\
    \ suitability changed in areas with different human population density over the\
    \ past 40 years (Fig. 4a).\" \"Critically, we found that the relative contribution\
    \ of population growth and climate change to the share of the population living\
    \ in areas with climate conditions favorable to DENV transmission was different\
    \ in the Global South compared to the Global North.\"\n\nQuantitative material:\
    \ \"Globally, the proportion of high and very high density areas with high climate\
    \ suitability for DENV transmission increased from 58.5% to 66.2% (\u0394 = 7.7\
    \ pp, 90% CI = 4.7\u201313.0) and from 48.1% to 63.6% (\u0394 = 15.5 pp, 90% CI\
    \ = 14.1-\u201317.0), respectively.\"\n\nMethodology: \"In this study, we used\
    \ a dengue suitability measure that incorporates the effects of temperature and\
    \ relative humidity on mosquito-viral traits to evaluate changes in climate suitability\
    \ for DENV transmission at a global scale.\"\n\nHighlights: \"Temperate climate\
    \ zones had the largest net change, with an increase in the proportion of land\
    \ area with high climate suitability from 25.2% to 30.5% (\u0394 = 5.3 pp, 90%\
    \ CI = 3.2\u20136.2).\"\n"
  7: "Source material here.\nDrivers of Risk: \"Additionally, we found that population\
    \ growth has preferentially occurred in areas with historically high suitability,\
    \ resulting in substantial increases in the population living in favorable climatic\
    \ conditions.\"\nQuantitative material: \"Assuming favorable conditions for the\
    \ establishment of vector populations (e.g., suitable reproduction habitat), approximately\
    \ 70% of the populations in Africa and Asia are currently living in areas with\
    \ a high risk of infection\u2014a roughly 15% increase relative to four decades\
    \ earlier.\"\nMethodology: \"In this study, we directly addressed the question\
    \ of whether long-term changes in climate suitability from 1979 to 2022 were mediated\
    \ by observed and sustained incremental changes in underlying climate conditions.\"\
    \nHighlights: \"We found that recent increases in the global population living\
    \ in areas with high climate suitability have been concentrated in the Global\
    \ South.\"\nMore Notes: \"These links are likely to become increasingly important\
    \ as the Global South, particularly Africa and South America, continues to undergo\
    \ rapid urbanization and industrial development while facing higher climate suitability\
    \ for DENV transmission.\"\n"
  8: "Evaluation overview: \"highlight distinct climate and population effects that\
    \ are increasing DENV transmission suitability in both endemic and disease-free\
    \ areas.\" \nDrivers of Risk: \"It uses mathematical expressions for relationships\
    \ between DENV-Ae. aegypti traits and meteorological variables (i.e., temperature\
    \ (t) and relative humidity (u)).\"\nQuantitative material: \"The Index P dataset\
    \ used in this study was estimated based on average monthly surface air temperature\
    \ and relative humidity data from 1979 to 2022... The economy of each country\
    \ was categorized into income groups (low, low-middle, upper-middle and high)\
    \ according to 2024 World Bank criteria.\"\nMethodology: \"We estimated climate\
    \ suitability for DENV transmission using a previously published suitability measure\
    \ referred to as Index P... using the sampled parameter values to calculate P(u;t)\
    \ over time... The K\xF6ppen\u2013Geiger system was used to categorize pixels\
    \ into climate zones... resampled to the coarser spatial resolution of the suitability\
    \ index data... using yearly dengue case counts from Brazil (2000\u20132014),\
    \ Colombia (1998\u20132022), Costa Rica (2012\u20132013, 2015\u20132017), Taiwan\
    \ (1998\u20132020).\"\nMore Notes: \"The dataset used in this study was estimated...\
    \ obtained from Copernicus.eu... from the Socioeconomic Data and Applications\
    \ Center database, and the WorldPop database... Sch ussmed... to 2024 World Bank\
    \ criteria.\"\n"
  9: "Source material here.\nMethodology justification: \"We \uFB01t a separate tobit\
    \ model for each country with log-transformed mean annual incidence (cases per\
    \ 100,000 population) as the outcome and Index P as the binary independent variable\
    \ (low vs. high suitability) with log-transformed population density and log-transformed\
    \ population count as covariates. The Tobit model is a censored regression model\
    \ that estimates a linear relationship when there is censoring in the outcome.\"\
    \n\nDrivers of Risk justification: \"The independent effect of changes in climate\
    \ on the population living in areas with high suitability was estimated by holding\
    \ the global population in 1980 constant and then allowing the climate suitability\
    \ to change from 1979 to 2022. Similarly, the independent effect of changes in\
    \ population size was estimated by holding the climate suitability in 1979\u2013\
    1983 constant and then allowing the global population to change from 1980 to 2020.\"\
    \n\nQuantitative material justification: \"Long-term climate suitability trends\
    \ were estimated using the seasonal Mann\u2013Kendall (MK) test on the monthly\
    \ Index P time series from 1979 to 2022. We then used Sen\u2019s slope to estimate\
    \ the linear rate of change for each pixel.\"\n"
