Drivers of Risk:
  1: Climate changes, urbanization, and population growth are impacting dengue virus
    transmission.
  2: Climate variables such as temperature and humidity affect the potential for dengue
    transmission.
  3: Changes in climate suitability for dengue virus transmission are impacted by
    temperature and relative humidity.
  4: Climate change impacts, affecting climate suitability for dengue virus transmission.
  5: Climate suitability for dengue virus transmission is impacted by geographic and
    temporal changes, including past and present climate conditions.
  6: Climate change and population density changes impact the suitability for dengue
    transmission.
  7: Population growth in areas with historically high suitability for dengue transmission
    increases the risk of infection.
  8: "The drivers of risk are temperature and relative humidity, which affect mosquito\
    \ traits and DENV transmission potential. Climate zone classifications based on\
    \ the K\xF6ppen-Geiger system are also used."
  9: Changes in climate suitability and population size are identified as independent
    factors affecting the population living in areas with high suitability for DENV
    transmission.
Evaluation overview:
  1: No relevant information
  4: "The paper evaluates changes in land area and population with high climate suitability\
    \ for dengue virus transmission from 1979\u20131983 to 2018\u20132022."
  5: The paper examines changes in dengue incidence related to climate suitability
    across different regions and time periods.
  6: Focuses on the shifts in land area with high climate suitability for dengue virus
    transmission.
  8: This study evaluates dengue transmission suitability.
Highlights:
  1: Expansion in climate suitability for dengue in North America, East Asia, and
    the Mediterranean basin.
  2: Climate influences ecological constraints on dengue virus transmission, with
    higher suitability in warmer regions.
  3: Significant spatial and temporal changes in climate suitability for dengue virus
    transmission are depicted, showing increased suitability in many areas, particularly
    Asia.
  4: High climate suitability for dengue is notably expanding, mainly in tropical,
    subtropical, and temperate areas, impacting regions like western tropical Africa,
    Southeast Asia, and Latin America.
  5: There has been a significant increase in climate suitability for dengue virus
    transmission in the southern United States, parts of Asia, and Africa, with an
    estimated increase in the population living in high-risk areas.
  6: High suitability areas experienced marginal changes, but temperate zones showed
    significant increases in high suitability land area proportion.
  7: Recent increases in the global population living in areas with high climate suitability
    for DENV transmission have been concentrated in the Global South.
Methodology:
  1: Analysis based on historical temperature and humidity data to examine shifts
    in climatic variables impacting dengue transmission.
  2: The analysis uses climate suitability indices from 1979 to 2022 to evaluate the
    potential for dengue transmission.
  3: The study uses the Index P mechanistic model based on temperature and relative
    humidity to evaluate dengue virus transmission suitability across 186 countries
    and territories over the last four decades.
  4: "Uses climate suitability thresholds to classify areas and estimates changes\
    \ over periods 1979\u20131983 and 2018\u20132022 for dengue transmission."
  5: Climate suitability was defined using past and present averages, and changes
    were modeled using linear regression and Mann-Kendall tests to assess trends.
  6: Uses a dengue suitability measure considering temperature and relative humidity
    impacts on mosquito-viral traits.
  7: The study directly addresses climate suitability changes from 1979 to 2022, evaluating
    changes in climate conditions and their impact on dengue transmission suitability.
  8: "The study uses a mechanistic climate-based dengue transmission model to estimate\
    \ Index P, incorporating relationships between DENV-Ae. aegypti traits and meteorological\
    \ variables. It samples distributions of climate-dependent and climate-independent\
    \ parameters to calculate P(u;t) over time. The K\xF6ppen-Geiger climate data\
    \ was resampled to match the spatial resolution of the suitability index data\
    \ using a nearest neighbor technique. The technical validation of the suitability\
    \ index used yearly dengue case counts from Brazil (2000\u20132014), Colombia\
    \ (1998\u20132022), Costa Rica (2012\u20132013, 2015\u20132017), Taiwan (1998\u2013\
    2020)."
  9: The analysis is performed using a Tobit model to estimate the relationship between
    climate-indexed suitability and dengue virus (DENV) transmission, accounting for
    left censoring of dengue incidence data.
More Notes:
  1: The increase in high-suitability areas is due to population growth in historically
    favorable regions and climate changes in previously unfavorable regions.
  5: The paper highlights the combined contribution of climate change and population
    growth, noting regional differences in these factors' influences.
  7: The study emphasizes the potential impact of urbanization and industrial development
    in the Global South on dengue transmission risk, suggesting a need to focus vaccination
    efforts in these regions.
  8: The study uses data from various sources, including Copernicus.eu, Socioeconomic
    Data and Applications Center database, WorldPop database, and OpenDengue. Data
    are aggregated to match spatial resolutions. The study assumes population and
    climate classifications are consistent for certain time periods.
Quantitative material:
  1: The global population in areas with high climate suitability for dengue increased
    by approximately 2.5 billion from 1979 to 2022.
  2: Mean annual incidence data compared to climate suitability across Brazil, Colombia,
    Costa Rica, Vietnam, and Thailand.
  3: The study quantifies local and global changes in dengue virus transmission suitability
    at a high spatial resolution from 1979-2022.
  4: Estimated changes in land area and population with high climate suitability are
    provided, showing mean values and credible intervals.
  5: The paper provides quantitative data on changes in the percentage of human populations
    living in high-risk areas, with figures quoted for different regions and time
    periods.
  6: Proportion of high and very high-density areas with high climate suitability
    increased globally from 58.5% to 66.2% and from 48.1% to 63.6% over 40 years.
  7: Approximately 70% of populations in Africa and Asia are currently living in areas
    with a high risk of infection, a roughly 15% increase relative to four decades
    earlier.
  8: The study uses a previously published suitability measure referred to as Index
    P, which estimates climate suitability for DENV transmission. The index ranges
    from 1979-2022 at a spatial resolution of approximately 11 km. The economy of
    countries is classified into income groups according to 2024 World Bank criteria.
  9: "Long-term trends in climate suitability are estimated using the seasonal Mann\u2013\
    Kendall test and Sen's slope on the monthly Index P time series from 1979 to 2022."
sourcematerial:
  1: 'Source material here.

    Drivers of Risk: "Dengue virus transmission has increased over the last four decades
    seemingly due to changes in climate, urbanization and population growth."

    Quantitative material: "Globally, we estimated that the population in areas with
    high climate suitability has grown by approximately 2.5 billion."

    Methodology: "Using estimates of dengue transmission suitability based on historical
    temperature and humidity data, we examined how shifts in these climatic variables
    and human population growth have contributed to the change in the geographical
    distribution and size of the global population living in areas with high climate
    suitability from 1979 to 2022."

    Highlights: "We found an expansion in climate suitability in North America, East
    Asia and the Mediterranean basin, where with few exceptions, endemicity is not
    yet established."

    More Notes: "In the Global South, this increase was largely driven by population
    growth in areas with historically favorable climate suitability, while in the
    Global North this increase predominantly occurred in previously unfavorable areas
    with limited population growth."

