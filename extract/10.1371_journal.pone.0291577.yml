    \ CC, respectively, but 22% under IC.\"\nHighlights: \"Reducing import dependence\
    \ will reduce regions\u2019 domestic agriculture system sensitivity... However,\
    \ such changes increase the countries\u2019 susceptibility to domestic shocks...\
    \ negatively impact measures of economic well-being, including trade and producer\
    \ revenues as well as food expenditures.\"\nMore Notes: \"Changes in domestic\
    \ production due to import dependency constraints will also impact the level of\
    \ agricultural inputs, such as land and water, potentially accelerating the scarcity\
    \ in regional resources. Climate change impacts on agricultural yields will also\
    \ influence these measures.\"\n"
