sourcematerial:
  1: 'Source material here.

    Evaluation overview: "International trade increases connections and dependencies
    between countries, weaving a network of global supply chains. Agricultural commodity
    trade has implications for crop producers, consumers, crop prices, water and land
    uses, and other human systems."


    Drivers of Risk: "To better understand the interactions of non-linear and globally
    coupled agricultural-bioenergy-water systems under the broader economy, we introduce
    systematic perturbations in two dimensions, one human (restrictions on agricultural
    trade) and the other physical (climate impacts on crop yields)."


    Quantitative material: "In the scenario where all regions ensure an import dependency
    ratio of zero, the global trade of cereals decreases ~50% in 2050 compared to
    the baseline, with smaller decreases in cereal production and consumption (4%).
    ... Global irrigation water consumption increases 3% and corn ethanol production
    decreases 7% in 2050."


    Methodology: "We introduce systematic perturbations in two dimensions, one human
    (restrictions on agricultural trade) and the other physical (climate impacts on
    crop yields). We explore these independently and in combination to distinguish
    the consequences of individual perturbation and interactive effects in long-term
    projections."


    Highlights: "We show that most regions experience larger changes in cereal consumption
    due to cereal import dependency constraints than due to the impacts of climate
    change on agricultural yields."

    '
  2: "                                                                           \
    \                                                                            \
    \                                                                            \
    \                                                                            \
    \                                                                            \
    \                                                                            \
    \                    \"Evaluation overview\": \"We track a set of multi-sector\
    \ outcomes\u2014crop production and consumption, exports, imports, crop prices,\
    \ caloric consumption, agricultural revenue, net trade revenue, the food expenditure\
    \ share of income, irrigation water consumption, and crop-based ethanol production.\"\
    \n\"Drivers of Risk\": \"We find that decreased participation in global markets\
    \ due to all regions implementing a zero cereal import dependency strategy leads\
    \ to decreases in total cereal production and consumption at the global scale.\"\
    \n\"Methodology\": \"We introduce systematic perturbations to a global integrated\
    \ human-Earth system model in two dimensions. First we explore the role of international\
    \ trade patterns via cereal import dependency constraints, as a change in the\
    \ human system dimension. Second, we examine changes to the Earth system via climate\
    \ change impacts on crop yields...\"\n\"Highlights\": \"Decreased participation\
    \ in global markets due to all regions implementing a zero cereal import dependency\
    \ strategy leads to decreases in total cereal production and consumption at the\
    \ global scale. Although some regions show increases in production or consumption,\
    \ no region shows increases in both. The impact of reduced international trade\
    \ on production and consumption of cereals is stronger than climate change in\
    \ most regions. The influence of climate change on crop yields also has strong\
    \ impacts across regions, with rising domestic prices and declining consumption\
    \ of cereal crops in general.\"\n"
  3: "Source material here: The study uses GCAM version 5.3, a global-scale integrated\
    \ model capturing economic decisions and interactions between multiple systems,\
    \ employing a market equilibrium model with different geopolitical regions for\
    \ energy, economic systems, water, and land. GCAM version 5.3, available at https://github.com/JGCRI/gcam-core/releases,\
    \ is modified and employed in this study. GCAM is an open-source global-scale\
    \ integrated model that captures economic decisions and dynamic interactions between\
    \ multiple systems. It is a market equilibrium model, in which the prices for\
    \ all markets are solved simultaneously, such that supply equals demand. The experiment\
    \ involves a thought experiment on global zero cereal import dependency constraint,\
    \ using market equilibrium to explore trade restrictions impact on multi-sector\
    \ outcomes. We intentionally set the global zero cereal import dependency constraint\
    \ as a thought experiment to explore the impact of global trade restrictions on\
    \ multi-sector outcomes. The GCAM model uses a base year of 2015 with 5-year time\
    \ steps for projections through 2100. The model calibration periods span from\
    \ 1975 to 2015. The final calibration year, 2015, is also called the base year,\
    \ from which projections at 5-year time steps are made through 2100 to model long-term\
    \ trends of different system outcomes. The study uses 32 geopolitical regions\
    \ for modeling trade and economic systems overlaid with 235 water basins, resulting\
    \ in 384 regions for water and land analysis. The model operates at 32 geopolitical\
    \ regions for energy and economic systems overlayed with 235 water basins, resulting\
    \ in 384 regions for water and land. GCAM models 11 aggregate crop commodities,\
    \ including four cereal commodities, and explores demand based on neoclassical\
    \ economics, focusing on consumer utility and the evolution of demand in response\
    \ to income and price changes. GCAM v5.3 models 11 aggregate crop commodities,\
    \ including four cereal commodities (i.e., corn, rice, wheat, and other grains)\
    \ and seven other crop commodities... The food demand model is derived based on\
    \ neoclassical economics, which emphasizes the importance of consumers\u2019 utility\
    \ when economic decisions are made (e.g., purchasing food). The responses of food\
    \ demand in the model to changes of consumer income and commodity price (i.e.,\
    \ income and price elasticities) evolve as income varies. The global agricultural\
    \ trade is modeled with regionally differentiated markets and a single global\
    \ trading pool for trade flow analysis. International trade for agricultural commodities\
    \ (including crops) among the 32 geopolitical regions is modeled with regionally\
    \ differentiated markets... and Armington-style preferences... Regional exports\
    \ and imports are linked through one global trading pool, where regional trading\
    \ flows into and out of the pool... are traced for each agricultural commodity.\
    \ Potential trade restrictions, particularly on cereal imports, are the shocks\
    \ being analyzed. To introduce a perturbation to the human international trade\
    \ system, we enforce a net zero cereal import requirement in GCAM, measured by\
    \ the cereal import dependency ratio [CIDR; 27].\"\n"
  4: 'Source material here.

    Drivers of Risk: "Climate change impacts on crop yields are also considered in
    combination with global zero cereal import dependency."

    Methodology: "The cereal import constraint in GCAM allows us to analyze a range
    of outcomes...Climate change impacts on crop yields are also considered in combination
    with global zero cereal import dependency...We use the global gridded climate
    outputs from the Hadley Centre Global Environmental Model [HadGEM; 28, 29] under
    RCP8.5 and processed them through Persephone [30] to estimate the corresponding
    crop yield changes under the climate impact for all GCAM crops."

    Highlights: "A region can satisfy its needs from domestic production, which, when
    enforced in all regions, is expected to lead to decreased participation in global
    markets (i.e., reduced trade)...encourages domestic production to meet domestic
    consumption."

    '
  5: " \nAgriculture, bioenergy, and water implications of constrained cereal trade\
    \ and climate change impacts... In total, we explore four model scenarios considering\
    \ the impact of global zero cereal import dependency and climate change... GCAM\
    \ solves for all periods and all scenarios. That is, every market across different\
    \ scales... 3.1 Cereal Import Dependency Ratio (CIDR) Fig 1a shows the 2015 (base\
    \ year) global pattern of CIDR. The CIDR changes between 2015 and 2050 are within\
    \ \xB1 14 percentage points for all regions except Brazil and Australia_NZ...\
    \ Despite large decreases in cereal trade in ID, total cereal production and consumption\
    \ decrease only 3.1%-4.1% over the 2025\u20132050 period, while climate change\
    \ accelerates... In 2025, global total import of cereals in ID and IC decreases\
    \ to nearly half of the trade quantity in RF, with larger decreases in later periods...\n\
    \n"
  6: 'Source material here.

    Evaluation overview: "The combined impact of the import dependency constraint
    and climate change (IC) on global cereal consumption is roughly additive at 7.5%."

    Drivers of Risk: "Climate change impacts on yields are negative at a global level,
    resulting in increased land allocation to cereal crops in CC and IC, relative
    to RF and ID, respectively."

    Quantitative material: "In 2050 the decrease of global cereal consumption in CC
    is about 3.5% compared to RF, close to the impact of ID. The combined impact of
    the import dependency constraint and climate change (IC) on global cereal consumption
    is roughly additive at 7.5%."

    Highlights: "Climate change impacts on yields are negative at a global level,
    resulting in increased land allocation to cereal crops in CC and IC, relative
    to RF and ID, respectively... The import dependency constraint decreases global
    land allocated to cereal crops by 3.6% on average."

    '
  7: "Source material here. Global total import (equivalent to global total export)\
    \ of cereals, (b) global total consumption (equivalent to global total production)\
    \ of cereals, and (c) global total land allocation to cereal crops over 2015\u2013\
    2050 in 5-year time steps under four model scenarios. These regions also represent\
    \ a wide range of income levels. Climate change has a small effect on CIDR over\
    \ the projection periods in the four selected regions. In 2050, the CIDR is 2\
    \ percentage points higher in CC than RF for USA and Western Africa, and changes\
    \ minimally for Brazil and Middle East. For example, USA, Brazil, Argentina, and\
    \ Australia_NZ, which are the major cereal exporters in RF, show the largest decrease\
    \ in cereal export in ID due to global trade restrictions. The y-axis represents\
    \ import quantity in megatons. Four scenarios are shown with distinct lines: Solid\
    \ orange line (ID): Shows a sharp decrease from above 500 Mt in 2020 to around\
    \ 150 Mt in 2030, leveling off afterward. (b) Consumption (Mt): Y-axis indicates\
    \ consumption measured in megatons. (b) Solid orange line (ID): Rises from just\
    \ below 200 Mt in 2020 to approximately 300 Mt in 2050. (c) Land Allocation (thous\
    \ km\xB2): The y-axis measures land allocation in thousand square kilometers.\
    \ Solid black line (RF): Decreases from around 5750 in 2020 to about 5650 in 2050.\"\
    \n"
  8: 'plaintext

    Evaluation overview: "These effects are amplified...in domestic cereal production
    and consumption...Comparatively, the USA with a CIDR of -23% shows a -12% and
    +9% change in cereal production and consumption, respectively. However, both effects
    are non-linear (Fig 4a) and are influenced by factors such as the land availability,
    agricultural productivity..."

    Drivers of Risk: "While climate change can influence production and consumption
    changes in some regions, the impact of the trade perturbations is generally larger
    (Fig 4a and 4b). One exception is the USA, for which the changes for production
    and consumption in 2050 in CC, -10.6% and -9.0%, respectively, are comparable
    in magnitude to the production and consumption changes in ID, -11.8% and +8.9%,
    respectively."


    Quantitative material: "Comparatively, the USA with a CIDR of -23% shows a -12%
    and +9% change in cereal production and consumption, respectively."

    Highlights: "While climate change can influence production and consumption changes
    in some regions, the impact of the trade perturbations is generally larger...
    One exception is the USA...These changes are approximately additive in IC, where
    the increase in cereal consumption in ID is offset by the decrease in CC, resulting
    in a consumption change of -1.8% in IC (Fig 4c)."

    More Notes: "The image is a chord diagram displaying data on imports and exports
    across different regions...Arrows and segments within the circle illustrate the
    flow and magnitude of changes in trade between these regions."

    '
