  2: 'Source material here: evidence shows that properties vulnerable to SLR are discounted
    relative to comparable properties that are not vulnerable, suggesting that some
    buyers take climate risks into consideration. Sea level rise (SLR) and storm risks
    are the primary drivers affecting coastal property values. The analysis involves
    using hedonic price functions and coupled human-natural systems modeling to assess
    how real estate markets interact with physical coastal systems. Coastal property
    values are discounted for vulnerability to climate risks; communities tend to
    rebuild larger homes after storms, and subsidies can delay but not prevent price
    declines due to SLR.'
  3: "We study the evolution of coastal real estate markets, incomes of residents,\
    \ and shoreline management decisions in response to SLR over a 150-year time horizon...\
    \ and including SLR, storm risk, and the in\uFB02uence of competing property markets.\
    \ We study the evolution of coastal real estate markets, incomes of residents,\
    \ and shoreline management decisions in response to SLR over a 150-year time horizon\
    \ by developing the Coastal Home Ownership Model (C-HOM). Our results suggest\
    \ a policy trade-off between slowing demographic transitions in coastal communities\
    \ and allowing property markets to adjust smoothly to risks from climate change.\
    \ The model also considers exogenous forces that in\uFB02uence internal dynamics,\
    \ including SLR, storm risk, and the in\uFB02uence of competing property markets."
  4: "  \n\"the baseline case assumes that SLR begins at t = 50 (marked by a vertical\
    \ gray line) and continues throughout the remaining periods... property value\
    \ (a), beach width (b), share of housing owned by investors (c), expected rate\
    \ of return on coastal real estate (d), marginal income tax rate of property owners\
    \ (e), and risk premium for coastal real estate (f).\" \n\"SLR begins at year\
    \ 50 and rises 1 m over the remaining 100 years. By model year 150, the barrier\
    \ height relative to mean sea level is 0 m, i.e., the threshold of total inundation.\"\
    \ \n\"combined with stable outside property markets drives an influx of relatively\
    \ high-income owner agents whose bids reflect amenity values in outside markets\
    \ and consequently maintain property values despite SLR... Eventually, as property\
    \ values begin to decline more substantially... investor market share declines\
    \ to zero.\"\n\"In the baseline, over the first 50 years, the housing market is\
    \ in dynamic equilibrium with the physical environment (MSLt = MSL for t \u2264\
    \ 50) and with external economic conditions (P e).\" \n\"A substantial decline\
    \ in property value does not occur immediately, taking decades past the onset\
    \ of SLR to manifest... High-income agents have higher bid prices relative to\
    \ institutional investors... The collective impact of increasingly high-income\
    \ agents entering the market is to temporarily dampen the property value decline.\"\
    \n"
