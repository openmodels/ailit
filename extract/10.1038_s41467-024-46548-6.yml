  10: "The paper discusses the C-HOM model, which simulates coastal housing markets\
    \ under climate change by decomposing and endogenizing parts of the equations\
    \ governing user cost of housing.:\n\n\"In order to simulate coastal housing markets\
    \ confronted with climate change, C-HOM decomposes the numerator and denominator\
    \ in Eq. (1) and endogenizes a subset of the individual pieces.\"\n\nThe analysis\
    \ involves agents representing households making housing bid decisions based on\
    \ the user cost of housing and their willingness to pay for coastal amenities.:\n\
    \n\"Our model community is composed of a fixed population of economic agents representing\
    \ individual households. We only consider residential properties in the model.\
    \ Because the number of properties and the number of agents who could own or rent\
    \ those properties is fi xed, when a new agent enters the market, the agent necessarily\
    \ triggers the exit of another agent.... One can think of the investor agent as\
    \ a bank or a pension fund that owns coastal real estate as part of its investment\
    \ portfolio...\"\n\"Owner agent j\u2019s rental bid is composed of their willingness\
    \ to pay for coastal amenities, WTPj, and the annualized value of housing services,\
    \ HV:\"\n\nThe model assumes fixed housing supply due to the built-out nature\
    \ of many coastal communities, and it incorporates a self-financing mechanism\
    \ for beach nourishment projects.:\n\n\"To self-fi nance, the resident owners\
    \ vote on when and how often to nourish. Lastly, a coastal community is geographically\
    \ divided into two market segments.\"\n\n\"The supply of housing as fi xed because\
    \ most coastal communities along the East and Gulf Coasts are built out and, when\
    \ storms destroy structures, typically structures are built back.\"\n\n\"We model\
    \ the effects of storm risk on property values and not the episodic nature of\
    \ actual storm realizations and resulting damages.\"\n"
