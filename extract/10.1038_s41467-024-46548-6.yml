  8: "Source material here.\n- \"We speci\uFB01cally highlight three mechanisms that\
    \ contribute to the persistence of high property values in coastal areas vulnerable\
    \ to SLR.\"\n- \"The subsidy process resembles disasters studied in ref. 47, which\
    \ contrasts the effect of tornadoes on out-migration with the effect of \uFB02\
    ooding on in-migration in the 1920s and 1930s.\"\n- \"Although nourishment often\
    \ passes a bene\uFB01t-cost test18,39, previous studies do not consider the effects\
    \ of nourishment subsidies on stimulating housing demand in areas vulnerable to\
    \ SLR.\"\n- \"For example, if subsidies are reduced, prices will adjust downward\
    \ to climate risk more rapidly.\"\n- \"Cumulative federal expenditures on beach\
    \ nourishment projects have exceeded 12 billion USD in the past century (in 2022\
    \ dollars...)\"\n- \"Federal spending on nourishment in the US was USD 229 million\
    \ in 2022.\"\n- \"Our results show that the same community can experience both\
    \ coastal gentri\uFB01cation and climate gentri\uFB01cation, occurring during\
    \ distinct periods of time.\"\n"
