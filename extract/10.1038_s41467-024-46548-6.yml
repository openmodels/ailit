Drivers of Risk:
  1: Increasing risks from sea-level rise (SLR) and storms
  2: Sea level rise (SLR) and storm risks are the primary drivers affecting coastal
    property values.
  3: Sea level rise (SLR) and storm risk are identified as impacting the outcomes
    in coastal property markets.
  4: Sea level rise (SLR) starting at year 50 of the simulation period.
  6: Rising outside markets and sea level rise (SLR) are key drivers impacting property
    values and market dynamics.
  7: Sea level rise (SLR) is the primary driver of risk.
  8: Sea-level rise, outside market changes (climate risks, macroeconomic shocks,
    tax reform).
  9: Erosion, sea-level rise, storms, and flood hazards impact coastal real estate
    values.
  11: "Drivers of risk include beach erosion (\u03C8bw), sea level rise (\u03C8SL),\
    \ storms, and being an oceanfront property."
  12: Risk of oceanfront property, storms, sea level rise (SLR)
  13: Future climate change foresight captured in risk parameters affecting shoreline
    management decisions.
Evaluation overview:
  1: No relevant information
  2: The page discusses how coastal property values are impacted by SLR and storm
    risks, along with their implications on real estate markets.
  4: The analysis examines changes in property values, beach width, investor share
    of housing, expected return rates, income tax rates, and risk premium rates related
    to sea level rise (SLR).
  6: The analysis provides insights on the impact of rising outside markets and sea
    level rise (SLR) on coastal property values, beach width, income tax rates, and
    investor market share.
  7: Property value, beach width, share of housing owned by investors, expected rate
    of return on coastal real estate, marginal income tax rate of property owners,
    and risk premium for coastal real estate are evaluated.
  8: The paper evaluates the persistence of high property values and socioeconomic
    composition in coastal areas vulnerable to sea-level rise (SLR).
  9: Coastal housing markets, property values, and real estate bubbles are evaluated
    in the context of climate change.
  11: This paper models willingness to pay (WTP) for coastal housing as impacted by
    beach width and sea level rise.
  12: Property price
Highlights:
  1: "Subsidies for coastal management, such as beach nourishment, tax advantages\
    \ for high-income property owners, and stable or increasing property values outside\
    \ the coastal zone all dampen the effects of SLR on coastal property values. The\
    \ effects, however, are temporary and only delay precipitous declines as total\
    \ inundation approaches. By removing subsidies, prices would more accurately re\uFB02\
    ect risks from SLR but also trigger more coastal gentri\uFB01cation, as relatively\
    \ high-income owners enter the market and self-\uFB01nance nourishment. Our results\
    \ suggest a policy tradeoff between slowing demographic transitions in coastal\
    \ communities and allowing property markets to adjust smoothly to risks from climate\
    \ change."
  2: Coastal property values are discounted for vulnerability to climate risks; communities
    tend to rebuild larger homes after storms, and subsidies can delay but not prevent
    price declines due to SLR.
  3: The study examines the evolution of coastal real estate markets in response to
    SLR, predicting changes in coastal property markets and demographic shifts.
  4: High-income agent entry initially tempers property value declines; significant
    property value declines take decades to manifest post-SLR onset; investor market
    share decreases to zero over time.
  6: Rising outside markets lead to higher property values, increased beach nourishment
    and width, and crowding out of investors by high-income owners despite the challenges
    posed by SLR.
  7: When outside markets decline, property values plummet, risk increases, high-income
    owners leave the market, investors buy real estate, and rent it to lower-income
    occupants.
  8: High-income owners are tax advantaged, outside markets dampen climate signals,
    and beach nourishment subsidies delay downward adjustments in real estate markets.
    Subsidies for beach nourishment fail to promote adaptation in the long run and,
    at best, delay downward adjustments in real estate markets and demographic shifts.
    The same community can experience both coastal and climate gentrification during
    distinct periods.
  9: Public investments in adaptation and risk mitigation capitalize into real estate
    prices. Federal subsidies for beach nourishment can even create a bubble in coastal
    real estate markets. Climate beliefs and heterogeneity in risk preferences are
    important factors.
  11: Beach width influences an agent's willingness to pay to live at the beach. A
    risk premium term, based on sea level rise, storms, and location, affects property
    values.
  13: Nourishment projects involve municipal bonds funded by temporary property tax
    increases, evaluated by comparing tax burden against property value increase.
Methodology:
  1: "The Coastal Home Ownership Model (C-HOM) incorporates changing physical attributes\
    \ of the coast, economic values of these attributes, and dynamic risks associated\
    \ with storms and \uFB02ooding. Resident owners, renters, and non-resident investors\
    \ jointly determine coastal property values and the policy choices that in\uFB02\
    uence the physical evolution of the coast."
  2: The analysis involves using hedonic price functions and coupled human-natural
    systems modeling to assess how real estate markets interact with physical coastal
    systems.
  3: The analysis uses a Coastal Home Ownership Model (C-HOM) over a 150-year time
    horizon, incorporating factors like SLR, storms, and property market dynamics.
  4: Baseline model scenario comparing oceanfront and non-oceanfront properties with
    SLR beginning at year 50; incorporates dynamic equilibrium with external economic
    conditions and high-income agent entry.
  6: The analysis is based on a numerical experiment comparing a baseline scenario
    with one in which outside markets appreciate while accounting for SLR.
  7: The study uses model simulations to assess the impact of SLR on coastal real
    estate markets. The model includes beach nourishment, public finance decisions,
    storm risk, and local real estate market responses. The model is applicable as
    communities approach inundation.
  8: The paper uses a coupled human-natural system model (C-HOM) to compare business-as-usual
    with potentially more efficient approaches to coastal management. The results
    are applicable to understanding how policy interventions and the time paths of
    changes in the physical system and competing property markets influence coastal
    gentrification and climate gentrification.
  9: Agent-based modeling (C-HOM) is used, incorporating theoretical, numerical modeling,
    and empirical literature from economics, finance, nonlinear systems, and coastal
    processes. The model links property sales to the capitalized flow of housing market
    rent, modifying the user cost of housing model to parameterize variation in incentives.
  10: The model assumes fixed housing supply due to the built-out nature of many coastal
    communities, and it incorporates a self-financing mechanism for beach nourishment
    projects.
  11: The analysis uses a user cost framework to model housing prices, incorporating
    factors like income, risk, and preferences for coastal amenities. The model considers
    both owner-occupiers and investors, simulating market dynamics. The time period
    is not explicitly specified, but it uses annual time steps (t, t+1).
  12: The paper uses an agent-based model to simulate coastal real estate markets
    and how they respond to demographic changes and external market forces. The model
    incorporates risk factors such as SLR and storms. Agent parameter distributions
    are updated based on interactions with outside markets. Expected capital gains
    are formed based on past market returns.
  13: Shoreline management analysis performed through a user cost model that simulates
    property value under various beach nourishment scenarios.
More Notes:
  1: No relevant information
  7: The study suggests that coastal gentrification can occur as wealthier residents
    are attracted to coastal communities despite climate change risks.
  8: The paper suggests that subsidies can impede equity and that buyouts with rentbacks
    may be a more efficient approach to coastal management. It also raises questions
    about the causal impact of climate risk on property values.
  9: The model incorporates feedbacks in the coupled human-natural system and agent
    heterogeneity to capture nonlinearities. The paper proposes future investigation
    on including race as an indicator of gentrification and allowing costs to rise
    with cumulative sand use.
  11: "The model incorporates heterogeneous climate beliefs and risk tolerance through\
    \ a risk multiplier (\u03C0j,t)."
  12: The model includes both short-term positive feedback (herding) and long-term
    negative feedback (arbitrage) mechanisms that influence property values. The model
    considers agents with heterogeneous expectations of capital gains.
Quantitative material:
  1: No relevant information
  4: SLR begins at year 50 and rises 1 m over 100 years; property values decline modestly
    with the onset of SLR and substantially over time; investor market share eventually
    declines to zero.
  6: Figures 5a, 5b, 5c, and 5d provide percent change in property value, change in
    beach width, change in marginal income tax rate, and change in investor market
    share, respectively.
  7: The study models the decline of outside markets to 10% of their initial levels
    over 50 years after SLR begins.
  8: Mentions cumulative federal expenditures on beach nourishment projects exceeding
    $12 billion USD in the past century (in 2022 dollars). Also mentions USD 229 million
    spent on nourishment in 2022.
  9: No specific quantitative changes are mentioned, but the asset-price model relies
    on capitalization rate (i) and rent (R) to estimate property value.
  11: The paper includes equations (8-12) that model beach width, mean sea level,
    willingness to pay, expected beach width, and a risk premium term.
  12: Equations (13)-(21) provide quantitative relationships for risk parameters,
    agent distribution adjustments, and upper limits of willingness to pay and beach
    width scaling parameter.
  13: Nourishment plan options include costs, benefits, and expected beach width over
    a 30-year horizon.
