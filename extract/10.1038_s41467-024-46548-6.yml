  7: 'Source material here.

    Evaluation overview: "Outcomes include property value (a), beach width (b), share
    of housing owned by investors (c), expected rate of return on coastal real estate
    (d), marginal income tax rate of property owners (e), and risk premium for coastal
    real estate (f)."


    Drivers of Risk: "SLR begins in t = 50 (marked by a vertical gray line)..."


    Quantitative material: "outside markets decline to 10% of their initial levels
    over the following 50 years."


    Methodology: "By modeling coastal real estate markets that are coupled to the
    physical environment, exogenous climate forcing, and the effects of real estate
    markets in other locations, C-HOM sheds light on potential trajectories associated
    with this transformation as communities approach the point of inundation."


    Highlights: "When outside markets decline, however, expected returns and property
    values plummet sharply and risk continues to increase. This occurs despite continued
    nourishment and maintenance of actual and expected beach width...Eventually...high-income
    owners leave the market, investors buy all of the real estate, and rent it to
    lower-income occupants."


    More Notes: "In the present and near future, coastal communities attract wealthier
    residents despite growing risks from climate change. This demographic shift can
    be thought of as a form of coastal gentrification..."

