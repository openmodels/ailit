  10: "Source material here.\nNatural disasters, particularly hurricanes, impact employment\
    \ across various industries: \"As discussed above, our results highlight the importance\
    \ of analyzing the employment response to hurricanes across detailed industries.\"\
    \n\nConstruction employment increases by about 1.2% higher than in the absence\
    \ of a disaster: \"find that after a short decline at the time of the event, construction\
    \ employment recovers and rises sharply within one year, reaching levels about\
    \ 1.2% higher than in the absence of the disaster.\"\n\nThe analysis explores\
    \ employment responses across detailed industries and uses robustness checks with\
    \ different measures of exposure and specifications: \"This is particularly true\
    \ for the transport and the manufacturing sectors, which both account for a large\
    \ share of employment, and, as indicated in Table 2, exhibit differential responses\
    \ across industries. Hence, our results suggest that a sectoral analysis may lead\
    \ to an aggregation bias.\"\n\nConstruction employment rises sharply post-disaster\
    \ and input-output linkages play a key role in employment changes across industries:\
    \ \"A disaster shock generates a construction boom and negatively affects retail,\
    \ transport, and accommodation industries. To shed more lights on our results,\
    \ we investigate a potential transmission mechanism of natural disaster shocks\
    \ to employment at detailed industry level: input\u2013output linkages. The construction\
    \ boom, for instance, could trigger the increase in employment in some of its\
    \ important suppliers, such as the manufacturing of metals and of furniture ...\
    \ The relation is starkly positive and statistically significant.\"\n"
  11: "\n\"Evaluation overview\": \"The page provides industry classification into\
    \ strengths, neutral, and weaknesses over a 12-month horizon.\"\n\"Quantitative\
    \ material\": \"The table provides average coefficients, standard errors, and\
    \ employment figures for various industries, indicating their level of strength,\
    \ neutrality, or weakness.\"\n\"Highlights\": \"Industries like crop production\
    \ and miscellaneous store retailers are weakened, while construction of buildings\
    \ and couriers/messengers are strengthened.\"\nSource material: \"Industry results:\
    \ 12-months horizon... Strengthened industries... 12-months Average coefficient\
    \ standard error employment classification... Crop production \u2212 0.94... Miscellaneous\
    \ store retailers \u2212 2.54... Construction of buildings 3.67... Couriers and\
    \ messengers 2.19\"\n"
  12: "Source material here.\nEvaluation overview: \"In this paper, we study the short-run,\
    \ dynamic employment effects of natural disasters.\"\nDrivers of Risk: \"we find\
    \ an average decline in employment following a disaster shock\"\nQuantitative\
    \ material: \"Table 2 shows 12-month coefficients and standard errors... The relation\
    \ is positive and statistically significant, with an R2 = 0.61.\"\nMethodology:\
    \ \"Using monthly data for 703-digits NAICS industries and 78 Puerto Rican counties\
    \ over the period 1995\u20132019\"\nHighlights: \"an average decline in employment\
    \ following a disaster shock, which masks an extensive heterogeneity at the industry\
    \ level... suggests a new potential concept of resilience: adaptability-driven\
    \ employment resilience\"\nMore Notes: \"Figs.F.5andF.6inAppendixF report the\
    \ equivalent of the analysis presented inFigs.3and4. The results are again very\
    \ similar to those reported in the baseline.\"\n"
  13: " \nThe paper discusses the importance of adaptability-driven employment resilience\
    \ in the aftermath of hurricanes: \n- \"Adaptability-driven employment resilience\
    \ could be an important building block of the post-disaster (and social) resilience.\"\
    \n\nThe lack of skilled workers is identified as a major challenge during post-disaster\
    \ reconstruction efforts:\n- \"The lack of skilled workers was cited as the most\
    \ important challenge faced by these firms during the post-disaster reconstruction\
    \ efforts.\"\n\nThe paper uses the HURRECON model to compute sustained wind velocity\
    \ at population-weighted county centroids:\n- \"In the case of this paper, we\
