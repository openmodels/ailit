Evaluation overview:
  1: This paper studies the short-run, dynamic employment effects within detailed
    industries of natural disasters, specifically hurricanes, using data from Puerto
    Rico.
  2: Dynamic employment effects of hurricanes; also examines unemployment and wages.
  3: The study evaluates the average labor market response in Puerto Rican counties
    directly affected by hurricanes, focusing on employment adjustments across industries.
  5: Outcomes being evaluated include employment, unemployment, labor force, and average
    weekly wage at the county level.
  9: Employment effects of natural disasters in selected industries
  11: The page provides industry classification into strengths, neutral, and weaknesses
    over a 12-month horizon.
  12: Employment effects of natural disasters.
  13: The paper discusses the importance of adaptability-driven employment resilience
    in the aftermath of hurricanes.
  14: The page indicates that the outcome being evaluated is the employment effects
    of hurricanes on selected transport industries.
  15: Mortality (Total fatalities), economic damages (Total damages), and number of
    people affected (People affected) are the outcomes being evaluated.
  17: This page does not provide an overview of any specific outcome being evaluated.
  18: Labor force changes in Florida Municipios
  19: employment, average weekly wages
  20: Employment and average weekly wages.
  21: No relevant information
  23: Dynamic effects of hurricanes on employment in selected industries.
  24: employment, average weekly wages, unemployed, and labor force
  25: Employment in selected industries
  26: Dynamic effects of hurricanes on employment, average weekly wages, unemployment,
    and labor force.
  28: Dynamic effects of hurricanes on industry employment over time.
  29: Dynamic effects of hurricanes on employment, average weekly wages, unemployed
    and labor force.
Highlights:
  1: "Substantial heterogeneity in employment responses across industries following\
    \ hurricanes, with input\u2013output linkages affecting industrial adjustments."
  2: Hurricanes have heterogeneous effects across industries. Some industries ('strengthened
    industries' like Construction) see employment increases, while others ('weakened
    industries' like Accommodation and Scenic/Sightseeing Transportation) see decreases.
    Some industries are 'neutral'. Input-output linkages explain some industry-level
    results; specifically, employment increases in strengthened industries are positively
    correlated with the share of output sold to the construction sector.
  3: The paper provides evidence on short-run employment effects in Puerto Rico, revealing
    different employment dynamics across narrowly defined industries after hurricanes.
  4: The exposure index shows substantial variation in hurricane impact across counties
    and over time, specifically highlighting differences in exposures from hurricanes
    Jeanne, Irene, Maria, and Georges.
  5: The page highlights the general impact of hurricanes on counties through storm
    exposure and implies their potential economic impacts such as employment and wage
    outcomes.
  7: Employment declines are temporary and recover within 14 months; some industries
    experience employment growth post-hurricane, particularly construction and certain
    manufacturing industries.
  8: Industries are classified into 'strengthened', 'weakened', or 'neutral' categories
    based on their employment response to hurricanes.
  9: The study identifies industries that are strengthened, neutral, or weakened by
    hurricanes. Examples include Truck transportation (NAICS 484) and Support activities
    for transportation (NAICS 488) as strengthened; Air transportation (NAICS 481)
    and Water transportation (NAICS 483) as neutral; Transit and ground passenger
    transportation (NAICS 485) and Scenic and sightseeing transportation (NAICS 487)
    as weakened.
  10: Construction employment rises sharply post-disaster and input-output linkages
    play a key role in employment changes across industries.
  11: Industries like crop production and miscellaneous store retailers are weakened,
    while construction of buildings and couriers/messengers are strengthened.
  12: Natural disasters lead to an average decline in employment, but there's significant
    heterogeneity at the industry level. Some industries contract, while others expand
    following natural disasters. Adaptability-driven employment resilience, defined
    as the potential opportunity for workers to reallocate from the contracting industries
    to the expanding ones in the aftermath of a natural disaster, is identified as
    a new concept of resilience.
  15: Hurricane Maria (2017) had the highest reported damages at $71,798,241,000 and
    64 fatalities. Hurricane Luis (1995) affected 98,000 people.
  17: The table shows both positive and negative changes in labor force across various
    regions, with notable decreases in counties like Mayaguez Municipio and Aibonito
    Municipio and increases in Toa Alta Municipio and Gurabo Municipio.
  18: Labor force changes in specific Florida Municipios from 1995 to 2019, including
    percentage changes
  19: "dynamic effects of hurricanes at time \U0001D461 on employment, average weekly\
    \ wages, at different horizons"
  21: The table shows how different industries (identified by NAICS code) are classified
    based on their sensitivity to climate variations using different analytical methods.
    Some industries, like 'Crop production' and 'Animal production and aquaculture'
    are consistently classified as sensitive ('WWWWW') across all methods. Others,
    such as 'Utilities', have varying classifications depending on the method used.
  24: Presents dynamic effects of hurricanes on employment, wages, unemployment, and
    labor force at different time horizons.
  29: Shows dynamic effects of hurricanes on employment, average weekly wages, unemployed
    and labor force at different horizons.
Methodology:
  1: "The analysis utilizes geo-coded monthly data for 70 3-digit NAICS industries\
    \ and 78 Puerto Rican counties over 1995\u20132019, and uses panel local projections."
  2: "Uses local projections by regressing the cumulative change of variables of interest\
    \ on a disaster shock variable at each horizon, controlling for pre-trends and\
    \ seasonal effects. Exploits data at the county\u2013time, county\u2013industry\u2013\
    time, and industry\u2013time level."
  3: The study measures hurricane exposure using a continuous treatment based on wind
    speed data and employs local projections to analyze employment effects.
  4: The analysis constructs an index of hurricane exposure using population-weighted
    centroids and maximum wind speeds, with data from 1995-2017, while normalizing
    with respect to the highest observed wind speed.
  5: The analysis uses k-step ahead panel predictive regressions at the county, industry,
    and time levels; employing local projections to avoid dynamic restrictions and
    allow for treatment effect dynamics.
  6: Outliers in the data are handled by showing results with and without them.
  7: The analysis uses industry-level panel regressions with Newey-West corrected
    standard errors and reports impulse responses at two years' horizon.
  8: "The analysis involves evaluating dynamic effects of hurricanes on employment\
    \ and wages using county\u2013time and county\u2013industry\u2013time variations,\
    \ with and without linear interpolation."
  9: Industry-time variation is exploited to assess the dynamic effects of hurricanes
    on employment. Data from 1995-2019 is used. The analysis uses detailed industry
    data to gauge employment effects.
  10: The analysis explores employment responses across detailed industries and uses
    robustness checks with different measures of exposure and specifications.
  12: "Uses monthly data for 703-digit NAICS industries and 78 Puerto Rican counties\
    \ over the period 1995\u20132019 to study the short-run, dynamic employment effects\
    \ of natural disasters. Employs local projections."
  13: The paper uses the HURRECON model to compute sustained wind velocity at population-weighted
    county centroids.
  14: "The analysis exploits industry\u2013time variation to study the dynamic effects\
    \ on employment."
  15: The data is compiled from the EM-DAT database. Hurricane category is based on
    the maximum wind speed reached according to the Saffir-Simpson wind scale. The
    time period covered appears to be 1995-2017.
  19: "Panel results controlling for alternative sets of fixed effects exploiting\
    \ county\u2013industry\u2013time variation without and with linear interpolation\
    \ using county*industry and time fixed effects or county and industry*time fixed\
    \ effects. Shaded areas are confidence bands at 95%."
  20: Panel results exploiting county-industry-time variation with and without linear
    interpolation using county*industry and industry*time fixed effects.
  21: 'The table classifies industries based on their sensitivity to climate at different
    time horizons (3, 6, 12, 18, 24 months) using four different methods: ''Baseline
    model,'' ''64-Knots threshold,'' ''Deppe formula,'' and ''Non-weighted centroids''.
    The classification is represented by a series of ''W'', ''N'', and ''S'', potentially
    representing ''Winter'', ''Neutral'', and ''Summer'' sensitivity, or a similar
    seasonal or temperature-related designation.'
  23: "Analysis exploits industry\u2013time variation to evaluate impacts over different\
    \ horizons."
  24: "Panel results with a formula for the wind speed (Depperman) exploiting county\u2013\
    time variation and county\u2013industry\u2013time variation. Results are presented\
    \ with and without linear interpolation. Confidence bands at 95% are included."
  25: "Exploiting industry\u2013time variation"
  26: "Analysis uses county\u2013time and county\u2013industry\u2013time variation\
    \ to evaluate hurricane impacts at different horizons, with and without linear\
    \ interpolation."
  27: "Analysis of dynamic effects of hurricanes on employment over different time\
    \ horizons, using industry\u2013time variation with geographical centroids."
  28: Analysis exploits industry-time variation to measure hurricane impacts at different
    time horizons.
  29: Panel results controlling for lags and leads of exposure measure; exploiting
    county-time variation, or county-industry-time variation with or without linear
    interpolation; evaluating dynamic effects at different horizons.
  30: "Industry results controlling for lags and leads of exposure measure, using\
    \ industry\u2013time variation."
More Notes:
  1: The study highlights the importance of high-frequency, detailed employment data
    for understanding economic mechanisms post-disaster.
  2: Suggests 'adaptability-driven employment resilience' as a concept, where workers
    reallocate from contracting to expanding industries after a disaster.
  6: The analysis is performed at a very fine level of disaggregation, which presents
    challenges related to reported zeros due to non-disclosure.
  12: Appendix contains further results. Specifically, Figs. F.5, F.6, F.7, F.8, and
    F.9 in the appendix report robustness checks and alternative specifications. The
    analysis considers industry-specific measures of exposure to hurricanes.
  18: The term 'Municipio' is used, which refers to municipalities in Puerto Rico,
    not Florida. This may be a typo or mislabeling.
  21: The meaning of 'W', 'N', and 'S' is not explicitly defined on this page, but
    their arrangement indicates sensitivity to seasonal or temperature-related climate
    conditions. The 'month' reference suggests this captures short-term climate impacts.
  24: Analysis is performed using panel data techniques. Different panel structures
    (county-time and county-industry-time) are tested. The wind speed is calculated
    using a formula by Depperman.
  29: 'The results are presented across different specifications: county-time variation,
    county-industry-time variation with and without linear interpolation.'
Quantitative material:
  1: After the 'average' hurricane, employment falls by 0.5% on average.
  2: Employment falls on average by about 0.5% after about six months following an
    average hurricane.
  4: Summary statistics of hurricane exposures show that about 5% of observations
    have positive exposure to disaster shocks, with the average and maximum exposure
    values provided.
  5: No specific quantitative results are detailed on this page.
  7: Employment falls by about 0.5% after six months following the 'average' hurricane;
    employment in certain industries grows by 2-5% six months after a hurricane.
  8: The shock used to generate impulse response functions (IRFs) in the analysis
    is based on the value 0.084, representing the average hurricane over the sample.
  9: Dynamic effects of hurricanes on employment at different time horizons are shown
    using impulse response functions (IRFs) with 95% confidence bands. Classifications
    of industries (S, N, or W) are provided for different time horizons (3, 6, 12,
    18, 24 months).
  10: Construction employment increases by about 1.2% higher than in the absence of
    a disaster.
  11: The table provides average coefficients, standard errors, and employment figures
    for various industries, indicating their level of strength, neutrality, or weakness.
  12: Table 2 shows 12-month coefficients and standard errors for the impact of disasters
    on employment in specific industries. For example, Amusements, gambling, and recreation
    has a coefficient of -1.30 and a standard error of 0.27. Also, the relationship
    between the construction sector as a buyer and industry output following a disaster
    has an R2 = 0.61
  14: The analysis includes dynamic effects of hurricanes on employment at different
    horizons, although specific numbers are not provided on this page.
  15: The table provides quantitative data on the year, month, category, people affected,
    total fatalities, and total damages (in unspecified currency) for a list of hurricanes.
  17: The table provides percentage changes in labor force by county from 1995 to
    2019.
  18: "Labor force 1995, Labor force share, \U0001D6E5labor force 1995\u20132019"
  19: "dynamic effects of hurricanes at time \U0001D461 on employment, average weekly\
    \ wages, at different horizons"
  20: Dynamic effects of hurricanes on employment and average weekly wages at different
    horizons, confidence bands at 95%.
  21: No relevant information
  23: "Analysis includes average industry employment data from 1995\u20132017."
  24: dynamic effects of hurricanes at time t on employment, average weekly wages,
