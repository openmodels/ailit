  29: Confidence bands at 95% are shown as shaded areas.
sourcematerial:
  1: " \nEvaluation overview: \"this paper studies the short-run, dynamic employment\
    \ effects within detailed industries of a specific type of natural disasters \u2013\
    \ i.e. hurricanes \u2013 using an ideal laboratory: Puerto Rico.\"\nDrivers of\
    \ Risk: \"We exploit a unique feature of Puerto Rico: a frequent and spatially\
    \ dispersed exposure to hurricanes...\"\nQuantitative material: \"...find that\
    \ after the \u2018\u2018average\u2019\u2019 hurricane, employment falls by 0.5%\
    \ on average.\"\nMethodology: \"We exploit monthly data for 70 3-digits NAICS\
    \ industries and 78 Puerto Rican counties over the period 1995\u20132019. Using\
    \ panel local projections...\"\nHighlights: \"Across industries, we find substantial\
    \ heterogeneity in the employment responses. ... This heterogeneity can be partly\
    \ explained by input\u2013output linkages.\"\nMore Notes: \"...the availability\
    \ of high frequency, detailed employment data. ... This combination allows us\
    \ to propose the first estimates of the short-run, dynamic employment effects\
    \ of hurricanes.\"\n"
  2: "`\nEvaluation overview: \"Our main results are threefold. First, after the 'average'\
    \ hurricane, employment falls on average by about 0.5% after about six months.\
    \ We also find an average increase in the number of unemployed, with no significant\
    \ changes to the labor force. Average weekly wages increase after six months,\
    \ but the increase is not statistically significant.\"\n\nDrivers of Risk: \"\
    Rico\u2019s counties by using the maximum wind speed recorded in each county cell\
    \ during each hurricane.\"\n\nQuantitative material: \"First, after the 'average'\
    \ hurricane, employment falls on average by about 0.5% after about six months.\"\
    \n\nMethodology: \"Exploiting information on wind speed guarantees the absence\
    \ of any potential endogeneity of our measure with respect to economic outcomes,\
    \ which can lead to biased results... Operatively, we regress the cumulative change\
    \ of our variables of interest (for instance, employment) on our disaster shock\
    \ variable at each horizon. The coefficients obtained trace the dynamic responses\
    \ to a disaster shock. The richness of our data allows us to explore variation\
    \ at the county\u2013time, county\u2013industry\u2013time, and industry\u2013\
    time level. In our regressions, we control for pre-trends and seasonal effects.\"\
    \n\nHighlights: \"Second, we find heterogeneous effects across industries. In\
    \ some industries, which we call the 'strengthened industries', employment increases\
    \ following a natural disaster. Examples of these industries include NAICS 236\
    \ ('Construction of Buildings') and NAICS 238 ('Specialty trade contractors').\
    \ In other industries, which we call 'weakened' industries, employment decreases.\
    \ Examples of weakened industries are NAICS 721 ('Accommodation') and NAICS 487\
    \ ('Scenic and Sightseeing Transportation'). In a third group of industries, employment\
    \ does not seem to be directly affected by natural disasters. We call them 'neutral'\
    \ industries. Third, we uncover a potential mechanism that can explain some of\
    \ the results at the industry level: input\u2013output linkages. For the 'strengthened\
    \ industries', we find a positive and statistically significant relationship between\
    \ the size of the employment increase 12 months after a disaster shock and the\
    \ share of output sold to the construction sector.\"\n\nMore Notes: \"Finally,\
    \ while we do not test this formally, the heterogeneous responses of employment\
    \ to hurricanes across different industries suggest a new concept of resilience:\
    \ adaptability-driven employment resilience, defined as the potential opportunity\
    \ for workers to reallocate from the contracting industries to the expanding ones\
    \ in the aftermath of a natural disaster. This could be an important building\
    \ block of 'post-disaster resilience', which was included as one of the three\
    \ pillars of the 'disaster resilience strategy' framework proposed by the IMF\
    \ (2019).\"\n"
  3: "Source material here.\nEvaluation overview: \"Our study differs from these papers\
    \ in several aspects...we evaluate the average labor market response of directly\
    \ affected jurisdictions...this paper seeks to be more general and is interested\
    \ in the labor markets effects associated with disaster damages, the direct need\
    \ for rebuilding, and the resulting changes in the industrial structure.\"\nDrivers\
    \ of Risk: \"This paper seeks to be more general and is interested in the labor\
    \ markets effects associated with disaster damages, the direct need for rebuilding,\
    \ and the resulting changes in the industrial structure...Finally, we consider\
    \ all of the counties in Puerto Rico and all of the hurricanes that occurred over\
    \ the sample period.\"\nMethodology: \"Instead, we propose a continuous treatment\
    \ that allows to account for differences in storm exposure even within categories\
    \ of the Saffir\u2013Simpson scale...Third, our empirical approach is different\
    \ and uses local projections.\"\nHighlights: \"The contribution of our work relative\
    \ to these papers is threefold...By focusing on Puerto Rico, we provide novel\
    \ evidence on the short-run employment effects in a lower-income setting, which\
    \ has been understudied...our results highlight that even within narrowly defined\
    \ sectors, different industries experience different employment dynamics in the\
    \ aftermath of a natural disaster.\"\n"
  4: "\nWe construct a population-weighted centroid for each of the 78 counties of\
    \ Puerto Rico... Finally, we obtain one measure of windspeed per county and hurricane\
    \ by retaining the maximum windspeed to which a county was exposed: \U0001D464\
    \U0001D450\U0001D43B = max\u210E\u2208\U0001D43B{\U0001D464\U0001D450\u210E}.\
    \ Table 1 presents summary statistics of the exposure index, \U0001D446\U0001D450\
    \U0001D461... Roughly 5% of our observations have positive exposures to the disaster\
    \ shock. Using population data from the 2010 Census at the block level... we construct\
    \ a population-weighted centroid for each of the 78 counties... \U0001D446\U0001D450\
    \U0001D461= \u2211 \U0001D465\U0001D450\U0001D43B\U0001D461 where \U0001D465\U0001D450\
    \U0001D43B\U0001D461... if \U0001D464\U0001D450\U0001D43B\U0001D461> 33. Fig.1\
    \ shows examples of our measure of exposure, \U0001D446\U0001D450\U0001D461, for\
    \ four major hurricanes that hit Puerto Rico... Hurricane Jeanne, for instance,\
    \ mostly hit the western part of Puerto Rico... On the contrary, hurricanes Irene\
    \ and Maria hit the eastern part of the island much more severely.\n"
  5: "Evaluation overview: \"\U0001D44B\U0001D450 represents employment, unemployment,\
    \ the labor force (for each county \U0001D450 at monthly frequency) or the average\
    \ weekly wage (for each county \U0001D450 at quarterly frequency).\"\n\nDrivers\
    \ of Risk: \"Note however that making landfall is not a necessary condition for\
    \ the island to be impacted, as some areas further away from the eye of the hurricane\
    \ may experience strong winds and thus have positive exposures.\"\n\nQuantitative\
    \ material: \"Our sample period runs from 1995M1 to 2019M11. We have data for\
    \ a panel for 78 counties (GEO).\"\n\nMethodology: \"First, we run the following\
    \ \U0001D458-step ahead panel predictive regressions: ... \U0001D44B\U0001D450\
    \ represents employment, ... \U0001D446\U0001D450\U0001D461 is our measure of\
    \ disaster shocks, varying at county level for each month (or quarter).\"\n\n\
    Highlights: \"The right panels zoom in on the island and show, for each county,\
    \ the values taken by the storm index \U0001D446\U0001D450\U0001D461 during the\
    \ month the hurricane stroke. Color shades indicate positive exposures, with darker\
    \ shades displaying stronger exposures.\""
  6: "Source material here.\n\"The top and the bottom panel show disaster shock exposure\
    \ by county over the period 1995\u20132017.\"\n\"We have data for a panel for\
    \ 78 counties (GEO) and 70 3-digits industries (NAICS). The advantage of using\
    \ these more detailed data is the possibility to control for a richer set of fixed\
    \ effects.\"\n\"1995M1 to 2019M11.\"\n\"There is a further 8% of observations\
    \ where the reported zeros reflect non-disclosure due to anonymity concerns at\
    \ this very fine level of disaggregation.\"\n\"Note: The top and the bottom panel\
    \ show disaster shock exposure by county over the period 1995\u20132017. The top\
    \ (bottom) panels include (exclude) outliers.\"\n"
  7: "Source material: ...aggregate measure of exposure to disaster, computed as a\
    \ population-weighted average of \U0001D446\U0001D450\U0001D461. Our object of\
    \ interest is \U0001D6FE\U0001D458\U0001D456, representing the response of \U0001D44B\
    \U0001D456 at horizon \U0001D458 to a disaster shock at time \U0001D461. As the\
    \ Figure shows, after the \u2018\u2018average\u2019\u2019 hurricane, employment\
    \ falls on average by about 0.5% after about six months...in industries NAICS\
    \ 236 (\u2018\u2018Construction of buildings\u2019\u2019), NAICS 237 (\u2018\u2018\
    Heavy and civil engineering constructions\u2019\u2019) and NAICS 238(\u2018\u2018\
    Special trade contractors\u2019\u2019),employment grows by 2%\u20135%after 6 months\
    \ following the \u2018\u2018average\u2019\u2019 hurricane. We consider a two years\
    \ horizon. In this case, we do not exploit the variation at the county level,\
    \ but only at the industry level...For the industry-level regressions, we use\
    \ Newey\u2013West corrected standard errors to account for the potential presence\
    \ of autocorrelation and heteroskedasticity. We consider a two years horizon.\
    \ the result that employment effects are temporary is consistent with Roth Tran\
    \ and Wilson(2021)\u2019s findings on damages of different kind of disasters.\
    \ The authors find that, after a sharp decline and a recovery period of up to\
    \ one year out, employment gradually reverts to the no-disaster counterfactual,\
    \ within approximately 14 months...industries can be divided into three main groups.\
    \ A first group of industries, which we call \u2018\u2018strengthened\u2019\u2019\
    , are the industries that experience an increase in employment following a disaster\
    \ shock."
