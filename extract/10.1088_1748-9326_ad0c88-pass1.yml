  8: Temporal evolution of climate change is discussed with the context of adaptation
    and mitigation planning. The study presents an analysis of human impacts on temperature
    changes, influencing the Gulf of Alaska sockeye salmon fishery. Bayesian regression
    methods are used to analyze the relationship between SST, FAR, and catch anomalies.
    The study covers data from 1960-2019, revealing trends in human influence since
    the 1970s or early 1980s. The study finds that post-2014 marine heatwaves in the
    North Pacific are linked to increased anthropogenic warming, with high FAR values
    impacting fishery production. The 'shifting baseline' syndrome is highlighted
    as a challenge for adaptation due to persistent, increasing human influence on
    North Pacific climate. Recent temperatures reaching certain levels indicate overwhelming
    human influence, affecting North Pacific SST and, by extension, sockeye salmon
    catch. A specific SST threshold above 2.08 is identified, beyond which sockeye
    catch is negatively affected.
  9: "Source material\nEvaluation overview: \"We conclude that the question of attribution\
    \ has already become obsolete at the scale of the entire North Pacific. ... how\
    \ has the performance of this fishery changed during higher temperatures ... overwhelming\
    \ likely to be the result of anthropogenic forcing? ... This case study is made\
    \ possible by the long history of research establishing a causal link between\
    \ SST and sockeye salmon productivity.\"\nDrivers of Risk: \"tens of thousands\
    \ of times more likely to occur due to human activities ... North Pacific warming\
    \ exceeds 1.5 \u25E6C.\"\nMethodology: \"evidence for human influence on North\
    \ Pacific temperatures is consistently stronger for three-year running mean SST\
    \ than for annual SST values\" and \"our estimates show negligible uncertainty\
    \ for regional FAR time series from roughly the 1990s onwards.\"\nHighlights:\
    \ \"Our results indicate that deleterious temperatures should be expected as often\
    \ as not in the current climate, and that temperatures that appear necessary for\
    \ healthy catches will become rare once North Pacific warming exceeds 1.5 \u25E6\
    C.\"\nMore Notes: \"warming since 2014 may be approaching a tipping point at which\
    \ the envelope of preferred temperatures for sockeye salmon will no longer be\
    \ available in the Gulf of Alaska\" and \"non-linearities can produce surprising\
    \ outcomes at regional scales that may be poorly predicted by global models.\"\
    \n"
  10: " \n\"We began estimating the relevant amount of warming by fitting a Bayesian\
    \ smoothed regression to the observed mean North Pacific SST time series in order\
    \ to isolate the warming signal from high-frequency noise... Similar regression\
    \ models were fit to North Pacific SST outputs for each CMIP6 run, and a span\
    \ of warming values identical to the warming in the 15 year window centered on\
    \ the observation of interest was used to define \u2018present\u2019 conditions...\
    \ The probability of a given anomaly for \u2018present\u2019 conditions was then\
    \ calculated as the proportion of anomalies equal to or greater than the observed\
    \ anomaly within the relevant span of North Pacific warming that corresponded\
    \ with the 15 year window centered on the observation year.\"\n\n\"CMIP6 model\
    \ outputs for calculating FAR and RR values were weighted with an approach that\
    \ rewards model skill and independence.... Model weighting was based on skill\
    \ and independence for bias in climatology, and variability, autocorrelation,\
    \ and the trend in SST.\"\n\n\"Warming of the entire North Pacific expected for\
    \ the 15 year window centered on the year of interest (i.e. the year of the observed\
    \ ERSST anomaly for which we are evaluating probability).\"\n\n\"Climate attribution\
    \ time series track the evolution of human influence on North Pacific sea surface\
    \ temperature.\"\n"
  11: "yaml\nMethodology: \"We used a perfect model setup to tune the values of \u03C3\
    \ D and \u03C3 S to achieve the desired precision in weighted model estimates.\
    \ In this setup, each of the 23 CMIP6 models is in turn treated as the \u2018\
    truth\u2019.\"\nQuantitative material: \"All regions reached the desired threshold\
    \ of 80% of \u2018true\u2019 values falling between the 10th and 90th quantiles\
    \ of weighted prediction with these combinations of except for the Southern California\
    \ Current, which reached 79.3% (figure A1).\"\nHighlights: \"All regions reached\
    \ the desired threshold of 80% of \u2018true\u2019 values falling between the\
    \ 10th and 90th quantiles of weighted prediction with these combinations of except\
    \ for the Southern California Current, which reached 79.3% (figure A1).\"\n"
  12: "We only considered a value of \u03C3S = 0.4, and the resulting plot indicated\
    \ selection of a value of \u03C3D = 0.82 (figure A5). Weights calculated with\
    \ these two values of the shape parameters resulted in a greater influence of\
    \ independence skill than was observed in the model weights that were used throughout\
    \ the rest of the study (figure A6). 1.3. Sockeye salmon catch analysis Historical\
    \ commercial harvests of sockeye salmon were obtained for the Chignik, Kodiak,\
    \ Cook Inlet, Prince William Sound, and Southeast Alaska Management Areas from\
    \ the Alaska Department of Fish and Game [32]. The South Alaska Peninsula was\
    \ excluded from analysis because the majority of sockeye salmon harvests from\
    \ that Management Area are for fish returning to Bering Sea natal streams. Sockeye\
    \ salmon spend varying number of years in the oceans (typically 1\u20135), which\
    \ results in catches in a single year being comprised of fish that entered the\
    \ ocean across multiple years. To calculate a single SST value for each catch\
    \ year, we used a weighted average of SST values across the range of ocean entry\
    \ years comprising the catch year, where the weights were the mean proportion\
    \ of sockeye entering the ocean in a particular year. The sockeye salmon ocean\
    \ entry proportions were calculated from age-structured data. Environ. Res. Lett.19(2024)014014\
    \ MALitzow et al Figure A2. Skill weight, independence weight, and combined weight\
    \ for 23 CMIP6 models in the six study regions. Models are sorted independently\
    \ by combined weight in each region. Figure A3. Combined model weights, scaled\
    \ by the mean weight for each region, such that a weight of 1(dashed horizontal\
    \ line) is equal to the unweighted case. Models are sorted independently by weight\
    \ for each region. This image displays a series of six line graphs arranged in\
    \ a 2x3 grid format. Each graph compares three different datasets (denoted by\
    \ their colors) across 20 model numbers on the x-axis. The y-axis of each graph\
    \ is labeled \"Value\" and ranges from 0 to 1. Here's a detailed breakdown: 1.\
    \ North Pacific: - Displays three lines: skill weight (green), independence weight\
