  2: "Ocean warming has profound consequences for fisheries production and other critical\
    \ ecosystem services globally ... Here, we apply EEA techniques to time series\
    \ of sea surface temperature (SST) observations for the North Pacific basin and\
    \ five regional ecosystems during 1950\u20132022 ... Our overall objective is\
    \ to use attribution time series to measure changes in human influence on marine\
    \ climate over time as an approach for recognizing and understanding the impacts\
    \ of human-induced climate change on ecosystem services. Our specific goals are\
    \ to: (1) build attribution time series to document the evolution of human influence\
    \ on North Pacific and regional SST ...\nThepreindustrialprobabilityisthelikelihoodthat\
    \ a given event might occur in a counterfactual world without human influence\
    \ on the climate, while the current probability is the likelihood for the same\
    \ event in the factual world with human influences ... A RR value of 10, for example,\
    \ is evidence that a given class of event is ten times more likely to occur due\
    \ to human influence on the climate ...\nFor each SST observation, preindustrial\
    \ probabilities were estimated for each CMIP6 model as the proportion of SST anomalies\
    \ from preindustrial runs producing anomalies as large as or greater than the\
    \ observed SST anomaly. Present-day probabilities were calculated for each model\
    \ using combined historical and SSP5-8.5 runs ...\nOur overall objective is to\
    \ use attribution time series to measure changes in human influence on marine\
    \ climate over time ... and by providing estimates of climate risk to that service\
    \ during historical, current, and next-decade climate states.\n... document the\
    \ evolution of human influence on North Pacific and regional SST; (2) evaluate\
    \ changes in the expected return time for extreme SST events ... and (3) demonstrate\
    \ the potential of attribution statistics for contextualizing climate change and\
    \ informing adaptation decision-making ... FAR and RR values for ERSSTv5 SST observations\
    \ from 1950\u20132022 averaged over six areas: the North Pacific basin poleward\
    \ of 20 \u25E6 N, and five northeast Pacific regional ecosystems.\nOur regional\
    \ focus is motivated by the scale over which fisheries are typically managed.\
    \ We calculated FAR and RR from individual ensemble members for 23 Coupled Model\
    \ Intercomparison Project Phase 6 (CMIP6) models ... using normalized SST anomalies\
    \ relative to the pre-1950 time series."
