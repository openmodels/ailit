  4: "yaml\nEvaluation overview: \"Gulf of Alaska commercial sockeye salmon (Oncorhynchus\
    \ nerka) fishery as a case study to show how attribution time series can contextualize\
    \ the human role in observed climate change impacts on ecosystem services.\"\n\
    Drivers of Risk: \"Productivity in this species...shows strong response to ocean\
    \ temperature...such that three-year running mean SST is a better predictor of\
    \ productivity than annual SST.\"\nQuantitative material: \"All five regions,\
    \ plus the overall North Pacific, have reached temperatures that can be attributed\
    \ to human activities with high confidence (i.e. FAR > 0.98).\"\nMethodology:\
    \ \"Bayesian regression model relating catch to three-year running mean SST...fitting\
    \ a second Bayesian regression model to FAR values corresponding to three-year\
    \ SST...multi-model probability of extreme events was estimated with a weighted\
    \ Bayesian regression.\"\nHighlights: \"North Pacific SST has effectively become\
    \ fixed in an anthropogenic state, with FAR \u2A7E 0.99 for three-year running\
    \ mean SST since 2003...The last years when regional SST was at levels equally\
    \ likely with or without human influence...are clustered in the years following\
    \ the well-described 1976/77 shift.\"\nMore Notes: \"We then defined the probability\
    \ density by resampling the multi-model population of anomalies from each warming\
    \ increment, weighting each model based on the weighting criteria described above.\"\
    \n"
