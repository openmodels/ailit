Drivers of Risk:
  1: Sea surface temperature (SST) changes in the North Pacific, attributed to human
    influence.
  2: The paper investigates the impact of human influence on sea surface temperature
    (SST) anomalies in the North Pacific basin and regional ecosystems.
  3: Sea surface temperature (SST) climatology, interannual SST variability, and interannual
    SST autocorrelation
  4: Ocean warming and changes in sea surface temperature (SST) are identified as
    key drivers impacting sockeye salmon productivity.
  5: Human-induced climate change is a driver of increased sea surface temperature
    (SST) anomalies in the North Pacific and regional ecosystems.
  6: Anthropogenic influence leading to extreme sea surface temperature (SST) anomalies
    in regions like the Eastern Bering Sea and Gulf of Alaska.
  7: Annual and three-year running mean sea surface temperature (SST)
  8: Warming sea surface temperatures (SST) driven by human influence are identified
    as a key driver affecting sockeye salmon catch.
  9: Human-induced warming of the North Pacific is significantly increasing SST, making
    extreme warming events tens of thousands of times more likely.
  10: Warming of the entire North Pacific expected for the 15 year window centered
    on the year of interest (i.e. the year of the observed ERSST anomaly for which
    we are evaluating probability)
  12: Sea surface temperature (SST) during ocean entry years is used as a factor.
  13: Projected sea surface temperature (SST) increases across various regions such
    as North Pacific, Eastern Bering Sea, and Gulf of Alaska.
  14: No relevant information
  15: "Changes in PDO-climate and PDO-salmon relationships (Litzow et al. 2020 [27]);\
    \ marine heatwaves (Laufk\xF6tter et al. 2020 [31], Barbeaux et al. 2020 [53]);\
    \ record-breaking low sea-ice extent (Stabeno and Bell 2019 [59]); extreme ocean\
    \ temperatures (Jacox et al. 2018 [43])"
Evaluation overview:
  1: Impacts of human-induced ocean warming on ecosystem services, specifically sockeye
    salmon fisheries in the Gulf of Alaska.
  2: The evaluation explores the changing human influence on marine climate over time
    to understand impacts on ecosystem services, such as fisheries.
  3: No relevant information
  4: The paper focuses on the impact of climate change on the Gulf of Alaska sockeye
    salmon fishery, particularly productivity loss due to ocean warming.
  5: No relevant information
  7: No relevant information
  8: Evaluates the impact of warming sea surface temperatures on the Gulf of Alaska
    sockeye salmon commercial fishery, specifically looking at log commercial catch
    anomalies.
  9: The paper evaluates the impact of climate change on North Pacific sea surface
    temperatures (SST) and the subsequent effects on sockeye salmon fishery productivity.
  10: No relevant information
  12: Sockeye salmon catch analysis is performed using historical commercial harvests.
  14: No relevant information
  15: No relevant information
Highlights:
  1: Human influence on regional ocean temperatures could first be detected in the
    1970s and grew until 2014-2020; Temperatures have reached levels that were likely
    impossible in the preindustrial climate at the basin scale; Strongest evidence
    for human influence is in the northernmost ecosystems (Eastern Bering Sea and
    Gulf of Alaska).
  2: A key finding is the use of attribution statistics to contextualize climate change
    and support adaptation decision-making by understanding human influence on marine
    climate.
  3: "Evaluates the relationship between observations and CMIP6 output by plotting\
    \ ERSST anomalies against weighted mean CMIP6 anomalies, with the range of most\
    \ likely outcomes plotted as \xB1 twice the weighted SD."
  4: "North Pacific SST is firmly attributed to human activities with FAR \u2265 0.99\
    \ for three-year running mean SST since 2003. The last years without human influence\
    \ were post-1976/77."
  5: Modelled and observed temperature changes show increasing SST anomalies in the
    North Pacific basin and five regional ecosystems. The study finds a north-south
    gradient in reaching high levels of attributable risk, with northern ecosystems
    showing earlier and higher FAR values.
  6: Largest annual SST anomaly recorded in the Eastern Bering Sea with anomalies
    now expected every ~40 years; Gulf of Alaska FAR values show frequent large anomalies
    due to human influence.
  7: "Temperatures at or above the threshold were rare to uncommon events in historical\
    \ climates but the critical threshold is close to the median value in the current\
    \ climate and is projected to represent cooler-than-normal conditions at 1.5 \
    \ \u25E6 C\u20132.0   \u25E6 C warming."
  8: Human influence on North Pacific climate extends to the 1970s or early 1980s.
    Recent temperatures for the entire North Pacific have reached levels attributed
    to human activities. There is a relationship between increased anthropogenic warming
    effects at ocean entry (high FAR values) and changes to fishery production (log
    catch anomaly). A SST value above 2.08 has been observed to negatively affect
    Sockeye catch.
  9: "Deleterious temperatures for sockeye salmon are now expected as often as not,\
    \ and economically viable catches will become rare as warming exceeds 1.5\xB0\
    C, suggesting immediate adaptation actions are necessary."
  10: No relevant information
  11: The Southern California Current slightly underperforms with 79.3% precision
    as opposed to the target of 80% for weighted prediction.
  12: Combined model weights, scaled by the mean weight for each region, are compared.
  14: No relevant information
  15: Ecosystem response persists after a prolonged marine heatwave (Suryan et al.
    2021 [39]); evidence suggests potential transformation of the Pacific Arctic ecosystem
    is underway (Huntington et al. 2020 [61])
Methodology:
  1: Climate attribution techniques (Bayesian estimates of Fraction of Attributable
    Risk (FAR) and Risk Ratio (RR)) applied to sea surface temperature time series
    (1950-2022) from five regional North Pacific ecosystems, using 23 global climate
    models.
  2: The analysis uses attribution time series and calculated FAR and RR based on
    SST anomalies from CMIP6 models, comparing preindustrial and current probabilities.
  3: "Uses 23 CMIP6 models under historical, SSP2-4.5, and SSP5-8.5 runs; applies\
    \ a weighting approach based on bias and trend in SST climatology, interannual\
    \ SST variability, and interannual SST autocorrelation; uses a binomial Bayesian\
    \ regression model to generate multi-model estimates for preindustrial and \u2018\
    present\u2019 conditions, weighting probabilities from each CMIP6 model."
  4: The analysis uses Bayesian regression models for assessing the relationship between
    SST and productivity and FAR values; CMIP6 models provide warming projections.
  5: The study uses CMIP6 runs (Historical, SSP2-4.5, SSP5-8.5) to model SST anomalies
    and calculates the Fraction of Attributable Risk (FAR) for annual and three-year
    running mean SST from 1950-2022.
  6: Bayesian posteriors were used with a 95% credible interval to determine when
    FAR values for SST could not be distinguished from zero.
  7: "Multi-model estimates of the Risk Ratio (RR) for annual and three-year running\
    \ mean sea surface temperature (SST) with 95% credible intervals, 1950\u20132022."
  8: Bayesian regression is used to analyze the relationship between SST, FAR, and
    log commercial catch anomalies. The analysis considers catch years from fish experiencing
    moderate anthropogenic temperature effects to those experiencing more pronounced
    anthropogenic warming. The study looks at data from 1960-2019.
  9: The analysis uses observational time series and attribution statistics to assess
    the influence of anthropogenic forcing on multi-year scale SST changes rather
    than focusing solely on extreme events.
  10: Calculates Fraction of Attributable Risk (FAR) and Risk Ratio (RR) values using
    CMIP6 model outputs, weighted by model skill and independence in representing
    climatology, variability, autocorrelation, and trends in Sea Surface Temperature
    (SST). Uses Bayesian smoothed regression to isolate the warming signal from high-frequency
    noise in observed mean North Pacific SST time series.
  11: The analysis uses model weighting based on bias, trend, standard deviation,
    and autocorrelation; optimized using a perfect model setup.
  12: Historical commercial harvest data from Alaska Department of Fish and Game is
    analyzed.  SST values are weighted by the mean proportion of sockeye entering
    the ocean in a particular year, calculated from age-structured data.  CMIP6 model
    weights are calculated based on skill and independence.
  13: Normalized combined model weightings for CMIP6 models are used for hindcasting
    and projecting North Pacific warming rates, utilizing weakly informative priors
    for model parameters.
  14: The analysis involves weighting of North Pacific warming hindcasts and projections,
    using skill weight, independence weight, and combined weight.
  15: Quantifying climate through changes in PDO-climate and PDO-salmon relationships
    (Litzow et al. 2020 [27]); attribution timeseries track the evolution of human
    influence on North Pacific sea surface temperature (Litzow et al. 2023 [62])
More Notes:
  1: Attribution time series may be helpful indicators for better defining the human
    role in observed climate change impacts and may thus help researchers, managers,
    and stakeholders to better understand and plan for the effects of climate change.
  3: 'The study area is the North Pacific basin and five regional ecosystems: Eastern
    Bering Sea (EBS), Gulf of Alaska (GOA), British Columbia Coast (BCC), Northern
    California Current (NCC), Southern California Current (SCC).'
  4: The study evaluates climate risks to fisheries by estimating probabilities through
    resampling CMIP6 model data at different warming increments.
  5: The trend and pattern in reaching these high levels of attributable risk varied
    among regions.
  6: Reduction in return times for extreme SST values; documented decline in sockeye
    salmon catches related to recent warming.
  7: The study uses CMIP6 emissions scenarios to project future SST events.
  8: "The paper uses climate attribution time series to document the \u2018shifting\
    \ baseline\u2019 syndrome regarding human influence on North Pacific climate.\
    \ The proportion of risk ascribed to human activities has grown from detectable\
    \ to overwhelming. "
  9: The paper identifies potential tipping points for sockeye salmon's preferred
    temperature range and emphasizes uncertainties in model projections due to non-linear
    regional climate responses.
  10: The study focuses on tracking the evolution of human influence on North Pacific
    sea surface temperature from 1950-2022.
  12: 'The study considers six regions: North Pacific, Eastern Bering Sea, Gulf of
    Alaska, British Columbia Coast, Northern California Current, and Southern California
    Current.'
  14: The page includes a graph showing the variation of skill weight, independence
    weight, and combined weight across different model numbers.
  15: This page contains a list of citations, mostly related to climate change impacts
    on marine ecosystems, particularly in the North Pacific and Bering Sea, with a
    focus on salmon, marine heatwaves, and sea ice extent. Litzow et al. features
    prominently as an author
Quantitative material:
  1: FAR > 0.98 for at least one year in all regions studied; Extreme regional SST
    values expected every 1000-10000 years in the preindustrial climate are expected
    every 5-40 years in the current climate; Sockeye salmon migrating to sea in years
    with FAR >= 0.98 produce catches 1.4 standard deviations below the long-term logmean.
  2: The study calculates the Fraction of Attributable Risk (FAR) and Risk Ratio (RR)
    to quantify the human influence on climate-related events.
  3: "SST anomalies (in \u02DAC) with respect to the pre-1950 mean"
  4: Probabilities derived for SST critical thresholds and FAR values are greater
    than 0.98, indicating strong anthropogenic impact on SST.
  5: FAR > 0.5 (anomalies twice as likely due to human influence) for three-year running
    mean SST in every year since 1984 (Eastern Bering Sea) and 1984 (British Columbia
    Coast).
  6: Annual SST FAR values in Gulf of Alaska and British Columbia Coast exceeded 0.98
    since 2015; Eastern Bering Sea experienced a 5.08 SD SST anomaly.
  7: "FAR values in the high-anthropogenic state (FAR  \u2A7E 0.98) correspond with\
    \ a critical threshold of three-year running mean SST 2.08 SD above the pre-1950\
    \ climatology."
  8: The paper presents data on the fraction of attributable risk (FAR) and its relationship
    to log commercial catch anomalies, as well as probability densities for three-year
    running mean SST values at different levels of North Pacific warming.
  10: "The probability of a given anomaly for \u2018present\u2019 conditions was then\
    \ calculated as the proportion of anomalies equal to or greater than the observed\
    \ anomaly within the relevant span of North Pacific warming that corresponded\
    \ with the 15 year window centered on the observation year."
  11: Model weights calculated vary with regions and parameters, achieving desired
    precision with 80% of true values between 10th and 90th quantiles.
  12: Uses a weighted average of SST values across the range of ocean entry years.
    Model weights are calculated.
  13: Graphs show increasing SST trend from 1950 to 2100 with colored line weights
    indicating different model weights.
  14: The line graph provides quantitative information on skill weight, independence
    weight, and combined weight for North Pacific warming hindcasts and projections.
  15: No relevant information
