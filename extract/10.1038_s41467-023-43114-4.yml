  4: "Source material here.\nEvaluation overview: \"To this end, we\uFB01 rst calculate\
    \ the wind \uFB01 eld along each synthetic TC track and superimpose it with gridded\
    \ population projections of the SSPs, to obtain time series of national shares\
    \ of affected people... Propagating all uncertainty dimensions to the very end,\
    \ this amounts to 2,880,000 perturbed GDP time series for each of the 41 TC-affected\
    \ countries...\"\n\nDrivers of Risk: \"First, while GMT is closely related to\
    \ other variables, such as boundary layer moisture content or sea level rise,\
    \ changes in the frequency and intensity of TCs with landfall also depend upon\
    \ changes in other meteorological variables such as atmospheric circulation changes...\"\
    \n\nQuantitative material: \"The median global DAD averaged over the future period\
    \ 2010\u20132100... ranges from 0.18% of global GDP in 2021 for the main speci\uFB01\
    \ cation up to 1.13% for RCP8.5-SSP5 and Stern\u2019s discounting choice... the\
    \ days of income lost per year for an average household in the Philippines increase\
    \ from 3.39 to 12.21 under RCP6.0-SSP2 and Stern\u2019s low choice of the discount\
    \ rate.\"\n\nMethodology: \"We use the 'no further climate change' baseline scenario\
    \ as a reference... we here derive event-based, country-level temperature-dependent\
    \ damage functions for TCs that account for the persistence of damages... using\
    \ a mixed-effects modeling approach (Methods).\"\n\nHighlights: \"For 37 out of\
    \ the 41 TC-affected countries considered, we \uFB01 nd growth losses to robustly\
    \ increase with GMT (Fig. 3b... This clearly illustrates that growth losses do\
    \ not depend on the development level but rather on country-speci\uFB01 c characteristics.\
    \ Thus, also growth in high-income countries is negatively affected by TCs suggesting\
    \ that, even in this country group, historically implemented adaptation measures\
    \ may not suf\uFB01 ce to compensate for climate change-induced loss increases\
    \ in the future.\"\n\nMore Notes: \"Discounting represents the primary source\
    \ of uncertainty... Uncertainties with regard to changes of the predictor (national\
    \ shares of affected people) along the RCP pathways...\"\n"
  5: "Source material here.\n\"Median global discounted annual damage (DAD) from tropical\
    \ cyclone impacts averaged over the period 2010\u22122100 for three Representative\
    \ Concentration Pathways (RCP2.6, 6.0, 8.5), two Shared Socioeconomic Pathways\
    \ (SSP2 and SSP5), and three different values of the growth adjusted discount\
    \ rates used in the Stern review47, for the standard calibration of Nordhaus\u2019\
    s DICE model46, and by Ricke et al.40 (color code, Table 1) in Trillion US$ (left\
    \ y-axis) and relative to global world product (GWP, right y-axis).\"\n\"Country-level\
    \ per-capita DAD averaged over the period 2010\u20132100 for the 20 most impacted\
    \ countries and the main specification (RCP6.0-SSP2, and Ricke\u2019s discounting\
    \ choice). Black whiskers indicate the 66% confidence interval (17\u201383%) accounting\
    \ for the uncertainty dimensions 4 and 5 (n = 120, 000 realizations per country\
    \ (Table 1)).\"\n\"The right y-axis shows median per-capita DAD in terms of days\
    \ of average household income lost.\"\n\"The quadrants classify countries by above\
    \ (high) and below (low) median income and per-capita DAD across the exposed countries\
    \ for which income data is available.\"\n\"The analysis is based on multiple scenarios\
    \ including RCP and SSP pathways and uses models like the Stern review's discount\
    \ rates, Nordhaus\u2019s DICE model, and Ricke et al.'s approach.\"\n\"Calculating\
    \ the SCC once with and once without TC impacts and subtracting the latter from\
    \ the former allows us to estimate the absolute TC-induced SCC (TC-SCC) as well\
    \ as the relative increase in SCC due to TCs.\"\n"
  6: "Source material here.\nEvaluation overview: \"a Visualization of the quasi-universal\
    \ scaling of global (country-averaged) tropical cyclone-induced growth losses\
    \ with global mean temperature (GMT) change... across Representative Concentration\
    \ Pathways (RCPs) 2.6, 6.0, and 8.5.\"\nDrivers of Risk: \"The TC-SCC of a country\
    \ is determined by its exposure and economic vulnerability to TCs.\"\nQuantitative\
    \ material: \"SCC increases substantially by 22% to US$/tCO2 212 (138\u2013318).\
    \ In absolute terms, the USA perceives the largest increase in median SCC through\
    \ TCs from US$/tCO2 13 to 20.\"\nMethodology: \"We combine process-based modeling\
    \ of the population exposure to TCs with an empirical growth model into a transparent,\
    \ tractable, and openly accessible framework.\"\nHighlights: \"The USA perceives\
    \ the largest increase in median SCC through TCs... the discount rate has the\
    \ largest impact on the SCC estimates across all six RCP-SSP scenario combinations.\"\
    \n"
  7: "Source material\nEvaluation overview: Fig. 4 | Tropical cyclone-induced social\
