Drivers of Risk:
  1: Tropical cyclones are identified as a major driver of economic loss and reduced
    growth in affected countries.
  2: The drivers of risk are different emission scenarios (RCPs), socioeconomic development
    (SSPs), economic discounting scenario combinations, temperature, and changes in
    TC climatology with global warming.
  3: The paper identifies tropical cyclones (TCs) as an additional impact channel
    not captured solely by population-weighted temperature.
  4: The primary factors impacting outcomes are tropical cyclones, changes in global
    mean temperature (GMT), atmospheric circulation changes, and socioeconomic variables
    such as population development.
  5: The primary risk driver identified is tropical cyclone impacts.
  6: Tropical cyclones (TCs) are identified as a driver of growth losses in countries,
    with these impacts further compounded by global mean temperature changes.
  7: Tropical cyclones (TCs).
  8: Tropical cyclones, floods, and droughts are discussed as major drivers impacting
    economic outcomes.
  9: Changes in frequency and intensity of landfalling tropical cyclones are impacting
    economic outcomes.
  10: The analysis examines the impact of tropical cyclones and temperature changes
    on national GDP growth rates.
  13: No relevant information
Evaluation overview:
  1: The paper reviews the impact of tropical cyclones on economic development and
    their contribution to the social cost of carbon (SCC).
  2: The paper evaluates future tropical cyclone (TC) damages, discounted annual damage
    (DAD) caused by TCs, and the contribution of TCs to the social cost of carbon
    (SCC).
  3: The paper evaluates projections of tropical cyclone (TC) damages in terms of
    discounted annual damage (DAD) and TC-induced social cost of carbon (SCC).
  4: The article assesses the direct economic impacts of tropical cyclones (TCs) in
    terms of deviations in national GDP trajectories, and the social cost of carbon
    (SCC) induced by these events.
  5: "This page evaluates the discounted annual damage (DAD) by tropical cyclones\
    \ over the period 2010\u20132100."
  6: The paper provides an overview of tropical cyclone (TC) induced growth losses
    and their scaling with global mean temperature changes across various Representative
    Concentration Pathways (RCPs).
  7: Social cost of carbon (SCC) and Damage as a percentage of average daily household
    income (DAD).
  8: The page discusses the contributions of tropical cyclones (TCs) to the social
    cost of carbon (SCC) and their direct economic impacts.
  9: Impact of tropical cyclones (TCs) on national GDP per capita growth is evaluated.
  10: The page discusses the projection of discounted annual damages on national GDP
    per capita growth rates for 41 countries due to tropical cyclones (TC) under various
    climate scenarios.
  13: No relevant information
Highlights:
  1: Accounting for tropical cyclone impacts in policy evaluations reveals potential
    underestimations of climate policy benefits.
  2: Including TC effects does not affect the temperature impact on growth.
  3: The analysis highlights that TCs reduce growth in the short-, mid-, and long-term,
    and emphasizes the importance of accounting for persistent growth impacts in future
    damage projections.
  4: Significant growth losses due to TCs are found across all income levels, including
    high-income countries, suggesting existing adaptation measures may be insufficient.
    The study establishes that climate change-induced growth losses strongly correlate
    with GMT.
  5: The study calculates both the absolute TC-induced Social Cost of Carbon (SCC)
    and the relative increase in SCC due to tropical cyclones.
  6: The USA perceives the largest increase in median SCC through TCs, and the discount
    rate significantly affects SCC estimates across RCP-SSP scenarios.
  7: Tropical cyclones increase the social cost of carbon. Lower- and middle-income
    countries face larger adaptation challenges in relative terms due to TC impacts.
    Differences in income among countries must not be neglected when estimating adaptation
    challenges of countries.
  8: The study highlights that TC damages are substantial and could significantly
    increase the SCC when explicitly accounted for.
  10: The study finds structural dependencies of growth losses on RCPs, but not SSPs,
    through mixed-effects modeling and OLS regression.
  13: No relevant information
Methodology:
  1: Derives temperature-dependent damage functions for 41 tropical cyclone-affected
    countries to quantify SCC.
  2: 'A modeling framework is presented with three components: historical growth responses
    to TC strikes, probabilistic event-based projections of TC damages, and country-specific
    temperature-dependent damage functions. A three-way fixed effects panel model
    is used with annual national shares of people exposed to TCs for different lag-years
    as exogenous predictors.'
  3: The paper employs scenario and probabilistic analysis, using methods like maximum
    entropy bootstrapping and TC impact emulators, covering six uncertainty dimensions
    including future emissions, socioeconomic development, and discount rate assumptions.
  4: The study uses event-based, country-level temperature-dependent damage functions
    for tropical cyclones, employing empirical growth models and mixed-effects modeling
    approach to derive GDP deviations and SCC.
  5: "The analysis is based on multiple scenarios including RCP and SSP pathways and\
    \ uses models like the Stern review's discount rates, Nordhaus\u2019s DICE model,\
    \ and Ricke et al.'s approach."
  6: The analysis combines process-based modeling of population exposure to TCs with
    an empirical growth model, applied across multiple scenarios to assess future
    impacts.
  7: The analysis uses the DICE model and considers different RCPs, SSPs, and discount
    rates. A Damage as a percentage of average daily household income analysis is
    performed.
  8: The analysis is based on deriving empirical country-level temperature dependent-damage
    functions that account for the persistence of TC damages in the economic system.
  9: Uses a three-way fixed effects panel model to estimate GDP per capita growth
    responses to TCs.
  10: The page describes a mixed-effects model to derive temperature-dependent damage
    functions and tests for structural dependencies of TC-induced growth losses using
    OLS regressions.
  13: No relevant information
More Notes:
  2: The analysis accounts for the persistence of damages in the economic system.
  3: The paper discusses the heterogeneous exposure of countries to TCs, leading to
    substantially different induced growth losses.
  4: Discounting rates and socio-economic pathways are significant sources of uncertainty
    in estimating damages, and the results apply globally but differ in sensitivity
    across countries.
  7: "The paper acknowledges its SCC estimate of US$/tCO2 212 (66% CI: US$/tCO2 138\u2013\
    318) is somewhat lower than the median estimate of a meta-analysis for 2018\u2013\
    2022, because their approach explicitly only resolves the impacts from annual\
    \ temperatures and TCs, implicitly accounting for other impacts."
  13: No relevant information
Quantitative material:
  1: Increases the global SCC by more than 20%, from US$ 173 to US$ 212 per tonne
    of CO2.
  2: The paper estimates long-term response of economic growth rates to TC strikes
    for 41 TC-affected countries over the period 1981-2015.
  3: The paper discusses cumulative growth losses due to TC strikes, indicating average
    annual growth losses for countries; for instance, Japan has a 1.63% loss and the
    Philippines a 2.62% loss historically, compared to the USA's 0.17%.
  4: The analysis estimates national GDP impacts and SCC, determining a median global
    DAD (direct aggregate damage) ranging from 0.18% to 1.13% of global GDP depending
    on scenarios, and variations in days of income lost for household across several
    countries.
  5: The analysis quantifies per-capita DAD relative to 2019 average household income,
    including expressing it in terms of days of income lost.
  6: "The median social cost of carbon (SCC) increases significantly due to TCs, for\
    \ instance, by 22% to US$/tCO2 212 (138\u2013318) with notable increases in the\
    \ USA from US$/tCO2 13 to 20."
  7: "Global median social cost of carbon (SCC) for the period 2010\u20132100 with\
    \ and without TC effects for three Representative Concentration Pathways (RCP2.6,\
    \ 6.0, 8.5), two Shared Socioeconomic Pathways (SSPs 2 and 5), and three different\
    \ values of the growth-adjusted discount rates used in the Stern review, for the\
    \ standard calibration of Nordhaus\u2019s DICE model, and by Ricke et al. Error\
    \ bars indicate the 66% confidence interval (17\u201383%). Median country-level\
    \ SCC across uncertainty dimensions. Damage as a percentage of average daily household\
    \ income ranges from one to more than 10 days of income lost per year."
  8: 'The page provides percentages indicating how TCs drive up the SCC: 68% for China,
    53% for the USA, and 9% for India.'
  9: Impacts assessed include the number of people exposed to 1-minute sustained winds
    of at least 34 knots.
  10: Rejects hypotheses regarding structural dependence at the 5% significance level
    for 58.5% to 86.5% of samples but fails to reject hypotheses related to SSP dependence
    at the 10% level.
  13: No relevant information
sourcematerial:
  1: "Source material here.\nEvaluation overview: \"Tropical cyclones (TCs) can adversely\
    \ affect economic development for more than a decade... Yet, these long-term effects\
    \ are not accounted for in current estimates of the social cost of carbon (SCC)...derive\
    \ temperature-dependent damage functions...to quantify the country-level SCC...\"\
    \nDrivers of Risk: \"Tropical cyclones (TCs) are among the most harmful extreme\
    \ weather events. They affect on average 20.4 million people annually, and they\
    \ caused mean direct annual economic losses of US$ 51.5 billion averaged over\
    \ the last decade.\"\nQuantitative material: \"We \uFB01nd that accounting for\
    \ TC impacts substantially increases the global SCC by more than 20%; median global\
    \ SCC increases from US$ 173 to US$ 212 per tonne of CO2 under a middle-of-the-road\
    \ future emission and socioeconomic development scenario.\"\nMethodology: \"We\
    \ here derive temperature-dependent damage functions for 41 TC-affected countries\
    \ to quantify the country-level SCC induced by the persistent growth effects of\
    \ damaging TCs.\"\nHighlights: \"This suggests that the bene\uFB01ts of climate\
    \ policies could currently be substantially underestimated...Adequately accounting\
    \ for the damages of extreme weather events in policy evaluation may therefore\
    \ help to prevent a critical lack of climate action.\"\n"
  2: "Evaluation overview: \"In our analyses, we focus on two complementary metrics\
    \ of high policy relevance: i) the discounted annual damage (DAD) caused by TCs\
    \ and ii) the contribution of TCs to the social cost of carbon (SCC).\"\n\nDrivers\
    \ of Risk: \"Accounting for different emission (Representative Concentration Pathways\
    \ (RCPs)), socioeconomic development (Shared Socioeconomic Pathways (SSPs)), and\
    \ economic discounting scenario combinations thereby allows for a systematic assessment\
    \ of compounding uncertainties.\"\n\nQuantitative material: \"We empirically estimate\
    \ the long-term response of economic growth rates to TC strikes for a sample of\
    \ 41 TC-affected countries over the historical period 1981\u20132015.\"\n\nMethodology:\
    \ \"We here present a modeling framework to quantify future TC damages that comprises\
    \ three components. First, we estimate the historical growth responses of countries\
    \ to TC strikes accounting for the persistence of damages in the economic system.\
    \ Second, we generate probabilistic, event-based projections of TC damages by\
    \ projecting the historical growth losses along a large set of synthetic time\
    \ series of TCs with landfalls generated with a TC emulator. Third, we derive\
    \ event-based, and country-specific temperature-dependent damage functions that\
    \ account for the persistence of damages in the economic system from the growth\
    \ losses calculated along the different scenario combinations.\"\n\nMethodology:\
    \ \"We employ a three-way fixed effects panel model with annual national shares\
    \ of people exposed to TCs for different lag-years as exogenous predictors introduced\
    \ in ref. 2.\"\n\nHighlights: \"We fi nd that including TC effects does not affect\
    \ the obtained from 1200 bootstraps (uncertainty dimension 1 in Table 1; n = 42,\
    \ 000 data points per country (Methods)).\"\n\nMore Notes: \"In addition, we here\
    \ account for the persistence of damages in the economic system, building on earlier\
    \ works.\""
