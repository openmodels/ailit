  8: "Source material here.\nEvaluation overview: \"the economic growth of the affected\
    \ countries in the long term2,65. Thus, their contributions to i) the global SCC\
    \ and ii) the SCCs of major emitters such as China, the USA, and India \u2013\
    \ the 1st, 2nd, 3rd largest emitters \u2013 that are not only prone to TCs but\
    \ also to \uFB02uvial \uFB02oods or droughts may be comparable to those of TCs.\"\
    \n\nDrivers of Risk: \"\uFB02oods and droughts cause direct damages that are comparable\
    \ to TC damages globally... \"\n\nQuantitative material: \"driving up the country-level\
    \ SCC of China, the USA, and India by 68%, 53%, and 9%, respectively.\"\n\nMethodology:\
    \ \"by deriving empirical country-level temperature dependent-damage functions\
    \ accounting for the persistence of damages in the economic system...\"\n\nHighlights:\
    \ \"The substantial increase in SCC by 22.2% at the global level and by 44.4%\
    \ in TC-affected countries that we observe when explicitly accounting for TC impacts\
    \ and their persistence in the economic system, suggests that a more explicit\
    \ representation of TCs could drive up previous SCC estimates...\"\n"
