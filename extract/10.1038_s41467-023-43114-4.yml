  10: "Source material here.\nThe page discusses the projection of discounted annual\
    \ damages on national GDP per capita growth rates for 41 countries due to tropical\
    \ cyclones (TC) under various climate scenarios: \"...we project a time series\
    \ of TC-induced changes to the national GDPpc growth rates over the period t \u2208\
    \ [[2010, 2100]],...\"\n\nThe analysis examines the impact of tropical cyclones\
    \ and temperature changes on national GDP growth rates: \"Estimation of temperature-dependent\
    \ damage functions...regressing the growth rate changes...relative to the baseline\
    \ with the change in GMT in year t, \u0394Te,m,t.\"\n\nRejects hypotheses regarding\
    \ structural dependence at the 5% significance level for 58.5% to 86.5% of samples\
    \ but fails to reject hypotheses related to SSP dependence at the 10% level: \"\
    ...the hypotheses \u03B3e,r,b,l,i =0 and \u03C9e,r,b,l,i = 0 have to be rejected\
    \ at the 5% level of significance for between 58.5% and 86.5% of the samples across\
    \ uncertainty dimensions 5 and 6...the hypotheses \u03B3s,r,b,l,i =0 and \u03C9\
    s,r,b,l,i = 0 cannot be rejected at the 10% level of significance (p\u2265 0.69)...\"\
    \n\nThe page describes a mixed-effects model to derive temperature-dependent damage\
    \ functions and tests for structural dependencies of TC-induced growth losses\
    \ using OLS regressions: \"...using the mixed-effects model...we run two OLS regressions,\
    \ where the first regression includes a coefficient that does not depend on the\
    \ SSPs...\"\n\nThe study finds structural dependencies of growth losses on RCPs,\
    \ but not SSPs, through mixed-effects modeling and OLS regression: \"...the relationship\
    \ between the exogenous and endogenous variables cannot be explained by the RCP-independent\
    \ coefficients...we therefore account for the structural dependence on RCPs...\"\
    \n"
