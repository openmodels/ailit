  15: The volume changes recorded as catastrophic losses in the other changes in the
    volume of assets account are the result of large scale, discrete and recognizable
    events that may destroy a significantly large number of assets within any of the
    asset categories. Such events will generally be easy to identify. They include
    major earthquakes, volcanic eruptions, tidal waves, exceptionally severe hurricanes,
    drought and other natural disasters; acts of war, riots and other political events;
    and technological accidents such as major toxic spills or release of radioactive
    particles into the air.
