  5: 'Source material here.

    6.243 Losses of fixed assets due to normal or expected levels of accidental damage
    are also included under consumption of fixed capital; that is, damage caused to
    assets used in production resulting from their exposure to the risk of fires,
    storms, accidents due to human error, etc. When these kinds of accidents occur
    with predictable regularity they are taken into account in calculating the average
    service lives of the goods in question. For an individual unit, or group of units,
    any difference between the average and the actual normal accidental damage within
    a given period is recorded in the other changes in the volume of assets account.
    However, at the level of the economy as a whole, the actual normal accidental
    damage within a given accounting period may be expected to be equal, or close,
    to the average.

    6.244 On the other hand, losses due to war or to major natural disasters that
    occur very infrequently, such as major earthquakes, volcanic eruptions, tidal
    waves or exceptionally severe hurricanes, are not included under consumption of
    fixed capital. There is no reason for such losses to be charged in the production
    account as costs of production. The values of the assets lost in these ways are
    recorded in the other changes in the volume of assets account. Similarly, although
    consumption of fixed capital includes reductions in the value of fixed assets
    resulting from normal, expected rates of obsolescence, it should not include losses
    due to unexpected technological developments that may significantly shorten the
    service lives of a group of existing fixed assets. Such losses are treated in
    the same way as losses due to above average rates of normal accidental damage.

    '
  6: "The world has changed since SNA08: Extreme weather events are more frequent\
    \ (more \u201Cnormal\u201D) and likely to become more so. Scientific progress\
    \ has made these events more predictable. Proposal: The trend for asset damage\
    \ from weather and climate disasters should be included in consumption of capital\
    \ rather than Other Changes in the Volume of Assets."
  7: "Source material: This meant, e.g. quarterly annualised CFC fell by 5.8% in Q2\
    \ 2005, and rose by 18.9% Q3 (associated with Hurricanes Katrina and Rita). Recommendation\
    \ here is different; proposal is to include the trend. \u2022 Practical \u2018\
    benefit\u2019 that this doesn\u2019t introduction volatility \u2022 Theoretically\
    \ could be seen as a good proxy for expected costs."
