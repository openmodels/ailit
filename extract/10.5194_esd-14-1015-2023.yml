    \ [...], damages attributable to changes in rail [...] and road systems [...],\
    \ health damages from changes in southwestern dust exposure [...], and the health\
    \ burden of change in Valley fever incidence [...]\"\nQuantitative material: \"\
    Table 1. The 95% con\uFB01dence interval (CI) and mean annual US climate-driven\
    \ damages in 2090 for the six categories shown in Fig. 2. All values are in 2020\
    \ USD. [...] Category Mean(billions) 95%CI(billions) Health USD2600 USD350\u2013\
    USD11000 Infrastructure USD220 USD140\u2013USD360 Labor USD51 USD6.7\u2013USD220\
    \ Electricity USD22 USD9.3\u2013USD35 Agriculture USD6.1 USD0.42\u2013USD19 Ecosystems+recreation\
    \ USD4.0 USD1.6\u2013USD7.5\"\nMethodology: \"Damages are average values in billions\
    \ of dollars (2020 USD)calculatedfromthe10000RFF-SPs. [...] Figure4showsthatnationaltotaldamagesin2090areprimarily\
    \ drivenbythevaluationofprematuremortalityattributableto climate-driven changes\
    \ [...]The large distribution of damages in each individual sector is driven by\
    \ a large range of RFF-SP emissions, population, and GDP projections and the dependence\
