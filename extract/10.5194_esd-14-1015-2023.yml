  15: 'Evaluation overview: Provides an overview of climate-driven impacts on various
    sectors, expressed as economic damages in billions of 2020 USD. Evidence: "Timeseries
    of sectoral damages in billions of 2020 USD across all 10000 projections through
    2100..." Drivers of Risk: Underlying temperature (or sea level rise), binned damage
    functions, and sector-specific scalars (e.g., per capita income-dependent VSL).
    Evidence: "Temporal trends are a function of the underlying temperature (or sea
    level rise) binned damage functions and sector-specific scalars (e.g., per capita
    income-dependent VSL)." Quantitative material: Projects sector-specific damages
    in billions of 2020 USD through 2100, showing annual mean (dashed) and median
    (solid) damages with 95% confidence intervals (shaded areas). Evidence: "Total
    damages (trillions) from all sectors are given... Lines show annual mean (dashed)
    and median (solid) damages. Shaded areas show the 95% CI." Methodology: Analysis
    projects damages based on temperature/sea level rise, damage functions, and sector-specific
    scalars, resulting in annual estimates. Results are applicable from 2010 to 2100.
    Evidence: "Timeseries of sectoral damages... through 2100... Temporal trends are
    a function of the underlying temperature (or sea level rise) binned damage functions
    and sector-specific scalars." Highlights: Coastal properties show drastically
    increasing damage trends. Many sectors exhibit consistent upward trends, indicating
    worsening impacts of climate change. Some sectors show discontinuities at temperature
    bin boundaries or thresholds (e.g., coastal properties after sea levels breach
    100cm). Evidence: "The sharp increase in damages in the coastal property damage
    sector after 2080 correspond to a sharp increase in damages that occur after sea
    levels breach 100cm... The consistent upward trends across most graphs indicate
    worsening impacts of climate change across diverse sectors." More Notes: Discontinuities
    in some sectors can occur at the boundary between temperature bins or due to thresholds
    in underlying studies. Evidence: "Slight discontinuities in some of these sectors
    (e.g., agriculture) can occur either at the boundary between temperature bins...
    or due to thresholds in the underlying studies."'
  16: " \nEvaluation overview: \"Table A2 shows different socially vulnerable groups\
    \ considered in this analysis (income, age, race and ethnicity, and education).\"\
    \nDrivers of Risk: \"For infrastructure sectors (i.e., rail, roads, electricity\
    \ transmission and distribution infrastructure; coastal properties; and transportation\
    \ impacts from high-tide flooding), a no additional adaptation approach to infrastructure\
    \ management does not incorporate climate change risks.\"\nQuantitative material:\
    \ \"Table A3 shows that climate damages are sensitive to assumptions in the adaptation\
    \ scenarios with mean 2090 annual damages.\"\nMethodology: \"Following Melvin\
    \ et al. (2017): reactive adaptation, where decision makers respond to climate\
    \ change impacts by repairing damaged infrastructure but do not take actions to\
    \ prevent or mitigate future climate change impacts ... and proactive adaptation,\
    \ where decision makers take adaptive action with the goal of preventing infrastructure\
    \ repair costs associated with future climate change impacts.\"\nHighlights: \"\
    This illustrates adaptation has the capacity to both exacerbate and ameliorate\
    \ future climate-driven damages.\"\n"
