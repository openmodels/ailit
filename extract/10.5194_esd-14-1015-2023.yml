    USD220 Electricity USD22 USD9.3\u2013USD35 Agriculture USD6.1 USD0.42\u2013USD19\
    \ Ecosystems+recreation USD4.0 USD1.6\u2013USD7.5\"\nDrivers of Risk: \"drivenbythevaluationofprematuremortalityattributableto\
    \ climate-driven changes in temperature [...], premature mortality attributable\
    \ to changes in air quality [...], transportation impacts associated with changes\
    \ in high-tide flooding [...], national labor hours lost [...], and health damages\
