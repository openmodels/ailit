Drivers of Risk:
  1: Climate-driven changes in temperature and air pollution (O3 and PM2.5) exposure
    are identified as factors contributing to human health impacts such as mortality.
  3: Shocks or changes impacting the outcomes include changes in global mean surface
    temperature and global mean sea level rise.
  4: Impacts are driven by changes in CONUS temperature and global mean sea level
    rise.
  6: The damages are linked to climate-driven changes in temperature, air quality,
    Valley fever, dust, wildfire smoke, and crime incidents.
  7: The key drivers of risk identified include climate-driven changes in temperature,
    air quality, tropical storm frequency and wind strength, high-tide flooding, wildfire
    smoke exposure, southwestern dust exposure, and Valley fever incidence.
  8: Impacts driven by factors like temperature increase, air quality deterioration,
    and increased incidents of wildfires.
  9: Key drivers of risk include changes in temperature, climate-driven air quality
    changes, high-tide flooding, and wildfires.
  10: Shocks impacting outcomes include temperature, wildfire, agriculture, labor,
    air quality, wind damage, and transportation & high tide flooding.
  11: Changes in air quality impact mortality rates and labor hours lost.
  12: Primary driver of risk evaluated is temperature changes which lead to premature
    mortality.
  14: Changes in crop yields (wheat, cotton, soybean, maize), coastal property value,
    power sector costs, transmission/distribution infrastructure damage, hot and cold
    temperatures, high-tide flooding, riverine flooding, work hours lost, thermally
    available habitat for commercial fish species, ozone and fine particulate matter
    exposure, property and violent crimes, temperature-induced track buckling, road
    surface quality, fine and coarse dust particle exposure, hurricane wind damage,
    urban drainage infrastructure needs, water quality changes, wildfire emissions,
    alpine recreation revenue, and Valley Fever.
  15: Underlying temperature (or sea level rise), binned damage functions, and sector-specific
    scalars (e.g., per capita income-dependent VSL).
  16: Climate-driven damages are influenced by factors like wildfires, air quality,
    temperature extremes, and infrastructure conditions.
  19: Population and/or GDP per capita scalability, and year-specific adjustment factors
    for extending impacts to 2300.
  20: Summer temperatures, floods, high tide flooding, dust, wind, changes in electricity
    demand and supply, and other climate-related factors are identified as drivers
    impacting outcomes.
  22: Mentions various climate change factors, including sea-level rise and temperature
    variations.
Evaluation overview:
  1: The paper provides an overview of economic and physical impacts of climate change
    on sectors, regions, and populations within the contiguous United States.
  3: The page provides an overview of the outcome being evaluated, which is the estimation
    of climate-driven damages across 20 impact sectors in the U.S.
  4: The paper provides an overview of sectoral climate impacts in the US, such as
    those on agriculture, water, economy, and health.
  6: The analysis evaluates the economic climate-driven damages across 20 sectors
    in the contiguous US for the years 2050, 2070, and 2090.
  7: The page provides an overview of climate-driven economic damages in various U.S.
    sectors by 2090, including health, infrastructure, labor, electricity, agriculture,
    and ecosystems/recreation.
  8: Overview of physical impacts in 2090 across sectors such as temperature-related
    mortality, air quality, wildfires, dust, valley fever, crime, and labor productivity.
  9: The analysis provides an overview of annual U.S. damages in 2090 by sector, particularly
    focusing on premature mortality associated with temperature changes.
  10: The page provides an overview of climate-driven damages in the U.S., including
    per capita impacts across several sectors.
  11: The analysis evaluates the risk of air-quality-attributable mortality and labor
    hours lost among different social-vulnerability and demographic groups projected
    for 2090.
  12: The study evaluates the economic damages of climate change in the US, focusing
    on monetized damages such as premature mortality due to temperature changes.
  14: Provides an overview of the national annual damage statistics for various sectors,
    including agriculture, coastal property, electricity, health, transportation,
    labor, ecosystems, and infrastructure.
  15: Provides an overview of climate-driven impacts on various sectors, expressed
    as economic damages in billions of 2020 USD.
  16: Climate damages across various sectors and regions in the US are evaluated,
    focusing on socially vulnerable groups.
  18: Provides an estimation of future climate-driven damages specifically focusing
    on premature mortality from temperature changes in 2090.
  19: Includes mortality, morbidity, lost wages, acute myocardial infarction, respiratory
    impacts, asthma ER, skiing, snowmobiling, and response costs in evaluation.
  20: Provides an overview of climate-driven impacts across various sectors, including
    mortality, air quality, labor productivity, wildfires, coastal properties, infrastructure,
    and recreation.
  21: Estimation of future net present damages from one tonne of CO2 using different
    discount rates.
  22: Discusses various climate impacts, such as economic damage or temperature-related
    mortality.
Highlights:
  1: Majority of long-term damages are associated with impacts to human health; the
    Southeast is projected to experience the largest annual damages per capita.
  3: The approach outlines a probabilistic modeling framework that captures uncertainties
    in climate sensitivity and its impact on socioeconomic variables.
  4: FrEDI calculates sectoral damages as functions of CONUS temperature or sea level
    rise, GDP, and population.
  5: FrEDI can evaluate climate-driven damages across different populations by using
    demographic data and projected climate impacts.
  6: Climate-driven damages are largest in the health category, primarily due to premature
    mortality from temperature and air quality changes.
  7: By 2090, changes in temperature are expected to result in the largest economic
    damage, specifically in premature mortality valued at a mean of USD 2.3 trillion
    annually, with other significant damage factors including air quality, flood impacts
    on transportation, and wildfire-related health issues.
  8: Southeast expected to experience the largest annual damages per capita; different
    adaptation options drastically affect coastal property sector damages.
  9: Premature mortality from temperature changes leads to the highest damages, with
    significant regional differences; overall, negative climate impacts lead to net
    losses across all regions.
  10: Key outcomes include regional per capita damages in the U.S. in 2090, with the
    Southeast having the highest per capita damages.
  11: Significant disparities in climate-driven impacts are observed among different
    racial and socioeconomic groups, with BIPOC and those with less education or lower
    income facing higher risks.
  12: The largest sector impact is from temperature-related premature mortality, indicating
    significant benefits from greenhouse gas mitigation for the US.
  14: Temperature-related mortality has the highest estimated damage (mean of USD
    2300 billion), followed by labor allocation (USD 51 billion) and wildfire air
    quality health effects (USD 51 billion). Marine fisheries have the potential for
    benefits rather than damages.
  15: Coastal properties show drastically increasing damage trends. Many sectors exhibit
    consistent upward trends, indicating worsening impacts of climate change. Some
    sectors show discontinuities at temperature bin boundaries or thresholds (e.g.,
    coastal properties after sea levels breach 100cm).
  16: Proactive adaptation can significantly reduce future climate-driven damages
    compared to no adaptation.
  18: Future temperature increases could lead to significant financial damages due
    to premature mortality in the U.S. by 2090.
  19: Strategy for extending future climate impacts to 2300 horizon across various
    sectors including air quality, labor, wildfire, and electricity supply.
  20: Mortality, air quality impacts, wildfire impacts and damages to coastal properties
    are projected to increase sharply. Labor productivity and marine fisheries are
    projected to decline. There are sector specific damages to a range of human and
    environmental systems.
  21: Net present values per tonne of CO2 vary, with 3% CDR median at $28 and 1.5%
    Ramsey median at $51.
  22: No explicit highlights specified; general impacts and methodologies are discussed.
Methodology:
  1: The study utilizes the reduced-complexity model, the Framework for Evaluating
    Damages and Impacts (FrEDI), to project impacts across 10000 future scenarios
    through 2300.
  3: The analysis is performed using the FrEDI model, which calculates climate-driven
    damages by integrating randomly sampled scenarios of emissions, population, and
    GDP over time from the RFF-SPs.
  4: The analysis uses FaIR and FrEDI models to estimate climate impacts using emissions,
    GDP, and population trajectories.
  5: FrEDI computes differential impacts based on demographics at the census tract
    level, using current demographic data and projected climate-driven damages.
  6: Net present value is calculated using Ramsey discounting with time-varying, state-specific
    discount rates based on per capita economic growth adjusted for climate damages.
  7: The analysis utilizes 10,000 RFF-SPs to project future damages from climate-driven
    changes across multiple sectors in the U.S. from 2020 to 2100, with specific consideration
    given to future emissions, GDP, and population scenarios.
  8: Uses RFF-SP projections and FrEDI framework to estimate future climate impacts
    without accounting for future adaptation.
  9: The analysis uses the FrEDI module with Monte Carlo simulations over 10,000 RFF-SP
    scenarios, accounting for various uncertainties including emission and socioeconomic
    projections and damage function parameters.
  10: The analysis compares damages using Shared Socioeconomic Pathways (SSPs) scenarios
    and incorporates varying discount rates to estimate net present damages for emissions.
  11: The analysis uses projections of socioeconomic input scenarios to estimate future
    climate impacts, focusing on the FrEDI model constrained to the 48 contiguous
    United States.
  12: The analysis uses the FrEDI framework to quantify climate change damages in
    the US, factoring in global mean surface temperature changes, US GDP, and population
    assumptions, with limited adaptation modeling.
  13: Adaptation in some sectors is incorporated based on historically practiced actions,
    but future enhanced adaptation or technologies are not considered.
  14: The analysis projects damages for the year 2090, considering different adaptation
    scenarios (e.g., no additional adaptation, reactive adaptation, reasonably anticipated
    adaptation, proactive adaptation) and one precursor emmissions scenario.
  15: Analysis projects damages based on temperature/sea level rise, damage functions,
    and sector-specific scalars, resulting in annual estimates. Results are applicable
    from 2010 to 2100.
  16: "Analysis uses adaptation scenarios\u2014proactive and reactive\u2014to assess\
    \ future climate impact costs on infrastructure."
  18: Socioeconomic conditions are factored into damage estimates through population
    and GDP scaling, and year-specific adjustment factors for 2090 through 2300.
  19: Utilizes multiple adjustment strategies based on population growth, GDP per
    capita, with adjustments like Adjustment1 and Adjustment2a, 2b extending past
    2090.
  20: The analysis projects impacts from 2010 to 2100 and shows 10000 projections
    from 2100 to 2300. The results are presented as time series graphs with uncertainty
    ranges. The paper cited on the page was published in 2023.
  21: Analysis navigates through 2300 using Framework for Evaluating Damages and Impacts
    (FrEDI) comparing net present damages via different discounting approaches.
  22: References models and meta-regression analysis but does not specify methodologies
    in detail on this page.
More Notes:
  5: The model's adaptation assumptions reflect historical or current adaptation levels,
    not enhanced adaptation or new technologies.
  7: Sectoral damages exhibit significant sensitivity to assumptions in adaptation
    scenarios, highlighting uncertainty in projections.
  14: The table lists the sectors alphabetically and provides information on the impact
    type, adaptation scenario, and confidence intervals for the damage estimates.
  15: Discontinuities in some sectors can occur at the boundary between temperature
    bins or due to thresholds in underlying studies.
  22: Various studies and approaches discussed, with emphasis on evaluating climate
    change impacts.
Quantitative material:
  1: "Mean climate-driven damages are projected to reach USD2.9 trillion annually\
    \ by 2090; regional per capita damages range from USD1800\u2013USD37000 in the\
    \ Southeast to USD840\u2013USD27000 in the Southwest."
  3: "The page mentions projections of global mean surface temperature, with an average\
    \ change of 1.9\xB0C (95% confidence interval: 0.8 to 3.5\xB0C) by 2100 and 3.1\xB0\
    C (95% CI: -0.2 to 7.8\xB0C) by 2300."
  4: US population and GDP projections are provided with confidence intervals for
    2100 and 2300.
  6: By 2090, annual climate-driven damages are estimated to reach USD 2.9 trillion,
    approximately 3% of US GDP.
  7: Quantitative information includes projected monetary damages in billions or trillions
    of 2020 USD for various sectors by 2090, with specific confidence intervals provided
    for each category.
  8: "2090 impact estimates include temperature-related premature mortality (19,000\u2013\
    91,000 deaths), air quality impacts (2,100\u201310,000), wildfires (460\u2013\
    1,700), and labor hours lost (170\u2013830 million hours)."
  9: Projected damages in 2090 include USD 4500 to 6500 per person for premature mortality
    due to temperature changes, and sector damages are presented in billions of 2020
    USD.
  10: Quantitative information includes per capita damage estimates in 2020 USD for
    various U.S. regions and top sectors contributing to damage.
  11: The page includes quantitative data, such as the differences in risk percentages
    for BIPOC and other groups, and additional mortality and labor hours lost for
    various racial and ethnic groups.
  12: The box plot chart provides quantitative estimates of the cost per ton of CO2
    emissions under different discount rates.
  14: Presents quantitative estimates of national annual damages (mean and 95% confidence
    intervals) for the year 2090, in billions of 2020 USD, for various sectors.
  15: Projects sector-specific damages in billions of 2020 USD through 2100, showing
    annual mean (dashed) and median (solid) damages with 95% confidence intervals
    (shaded areas).
  16: Regional climate-driven damages by 2090 range from $45 million to $810 million
    in specific sectors across US regions.
  17: Provides estimated monetary damages in billions of 2020 USD for various sectors
    in 2090 with different adaptation options.
  18: "Annual mean climate-driven damages in 2090 for premature mortality from temperature\
    \ are presented as USD2300 billion (90th% confidence interval: USD330\u2013USD4200)\
    \ based on Cromar et al. (2022)."
  20: Annual damages are in units of billions of 2020 USD (trillions for total damages).
    Time series of sectoral damages across all 10000 projections from 2100 to 2300
    are used to illustrate the range of outcomes.  95% confidence intervals are shown
    as shaded areas in the figures.
  21: Box plot graph compares dollar costs per ton of CO2 under various discount rates.
  22: No specific quantitative results detailed on this page.
sourcematerial:
  1: " \nSource material here.\n"
  3: " \nEvaluation overview:  \"annual long-term climate damages across 20 impact\
    \ sectors, seven CONUS regions, multiple adaptation scenarios, and socially vulnerable\
    \ populations (Fig. 1, Output 2).\"\n\nDrivers of Risk: \"relationships between\
    \ climate-driven changes in CONUS temperature or global mean sea level rise and\
    \ the resulting physical and economic damages across 20 sectors\"\n\nQuantitative\
    \ material: \"average change in global mean surface temperature relative to 1986\u2013\
    2005 (FrEDI baseline) is 1.9\u25E6C (95% con\uFB01dence interval: 0.8 to 3.5\u25E6\
    C) by 2100 and increases to 3.1\u25E6C (95% con\uFB01dence interval (CI):\u2212\
    0.2 to 7.8\u25E6C) by 2300\"\n\nMethodology: \"The resulting 10000 global mean\
    \ surface temperature projections, along with corresponding population and GDP\
    \ projections from the RFF-SPs, are then passed to FrEDI (v3.0) to calculate the\
    \ physical and economic climate-driven damages.\"\n\nHighlights: \"A unique feature\
    \ of using probabilistic projections with a simple climate model in this approach\
    \ is the rich range of uncertainty parameters that can be assessed.\"\n"
  4: "markdown\nEvaluation overview: \"FrEDI currently includes 20 impact sectors\
    \ for which damages are modeled as functions of a climate driver (CONUS temperature\
    \ or sea level rise), US GDP, and regional population.\"\n\nDrivers of Risk: \"\
    damages in FrEDI are calculated as functions of CONUS degrees of warming ... and\
    \ sea level rise; these values are calculated within FrEDI ... to calculate the\
    \ impacts to the subset of FrEDI sectors that are impacted by sea level rise.\"\
    \n\nQuantitative material: \"mean and 95th confidence intervals for US population\
    \ and time-averaged US GDP per capita growth rates are USD390 million (95% CI:\
    \ USD260 million\u2013USD520 million) and 1.5% (95% CI: \u22120.4% to 4.0%), respectively,\
    \ in 2100.\"\n\nMethodology: \"RFF-SPs trajectories are passed as inputs into\
    \ FaIR to calculate global mean surface temperature. Global mean surface temperature,\
    \ population, and GDP are then passed as inputs to FrEDI to calculate sectoral\
    \ climate impacts in the US.\"\n\nHighlights: \"Sectoral Impacts: Various sectors\
    \ affected by temperature changes. Includes icons for agriculture, water, economy,\
    \ health, and more.\"\n"
  5: "Source material here.\nFrEDI, sea-level-driven damages are calculated for a\
    \ given year by interpolating between modeled damages at different sea level heights\
    \ at that same point in time; this enables FrEDI to account for interactions between\
    \ adaptation costs, increased coastal property values, and sea level rise over\
    \ time (EPA, 2021b).\n\nThis analysis groups mean damages from each of 20 FrEDI\
    \ sectors into six topical categories and uses the default FrEDI adaptation assumptions\
    \ of \u201Creactive\u201D, \u201Creasonably anticipated adaptation\u201D, or \u201C\
    no additional adaptation\u201D (see Table A3) for each sector.\n\n...FrEDI is\
    \ extended by linearly extrapolating its sector-specific, temperature-binned damage\
    \ functions to account for the full range of temperature scenarios derived from\
    \ the RFF-SP emission scenarios run through FaIR (some of which have degrees of\
    \ warming above 10\u25E6C).\n\nExceptions include FrEDI\u2019s coastal property\
    \ and select other infrastructure sectors (e.g., roads, rail), where adaptation\
    \ options and scenarios from the underlying studies have been incorporated into\
    \ FrEDI. Total damages in these sectors are sensitive to adaptation assumptions,\
    \ indicating that adaptation has the capacity to both exacerbate and ameliorate\
    \ future climate-driven damages, with the latter being more common.\n\nIn addition\
    \ to quantifying differential climate-driven damages across impact sectors, geographic\
    \ regions, and adaptation options, FrEDI can also compare climate-driven damages\
    \ across different populations within the US.\n\nFrEDI also has the capability\
    \ to investigate adaptation options in select sectors. Available adaptation options\
    \ reflect the treatment of adaptation in the underlying sectoral studies. For\
    \ most of these studies, because the implicit or explicit impact response functions\
    \ are calibrated to historical or current data, historically practiced adaptation\
    \ or hazard avoidance actions are \u201Cbaked in\u201D, while enhanced adaptation\
    \ action or new (currently unknown) technologies are not considered.\n"
  6: "  \n\"FrEDI was developed to quantify the physical and economic damages from\
    \ climate change over the 21st century within contiguous US borders. Figure 2\
    \ shows the net annual economic climate-driven damages across 20 sectors in the\
    \ US in the years 2050, 2070, and 2090...\"  \n\n\"Climate-driven damages from\
    \ FrEDI are largest for the health category. The majority of damages in this category\
    \ are from the estimated valuation of premature mortality attributable to climate-driven\
    \ changes in temperature and air quality...\"\n\n\"Figure 2 shows that net national\
    \ damages increase overtime, with mean climate-driven damages estimated to reach\
    \ USD 2.9 trillion (95% CI: USD 510 billion to USD 12 trillion), or \u223C3% of\
    \ US GDP, annually by 2090 for a subset of total climate impacts.\"\n\n\"The net\
    \ present value for a Ramsey discounting approach is calculated using a time-varying\
    \ and state-specific discount rate... and where this time-varying rate is then\
    \ used in the net present value calculation such that...\"\n"
