  18: "Source material here.\nAnnual mean (90th% confidence interval) climate-driven\
    \ damages in 2090 for premature mortality from temperature across three separate\
    \ studies. Damages are in billions of dollars (2020 USD). Cromar et al. (2022)\
    \ is used for temperature-related mortality throughout the analysis presented\
    \ in the main text.\n\n2090 Temperature-related premature mortality \u2013 billions\
    \ 2020 USD\nUnderlying study 90th CI Mean Cromar et al. (2022) USD330\u2013USD4200\
    \ USD2300\n\nabove the calibration regime, FrEDI assumes a linear rate of change\
    \ in damages equal to the change in damages from 5 to 6\u25E6.\n\nDamage estimates\
    \ in FrEDI reflect year-specific socioeconomic conditions. There are several ways\
    \ these conditions are defined through 2090 and linked to the damage estimates\
    \ for temperature-based damages.\n\n1. Impacts scale with population and/or GDP\
    \ per capita. For sectors with explicit links to population and GDP, temperature-based\
    \ damage estimates are scaled based on the population and GDP trajectory for a\
    \ defined run.\n2. Year-specific adjustment factors. In sectors where population\
    \ and/or GDP per capita enter the impact function in complex ways that cannot\
    \ be extracted and replicated within the FrEDI framework, a series of year-specific\
    \ adjustment factors defined based on the underlying study are used to adjust\
    \ damage over time and/or space.\n"
