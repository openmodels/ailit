    \ drivenbythevaluationofprematuremortalityattributableto climate-driven changes\
    \ in temperature (mean: USD2.3 trillionperyear;95%CI:USD0.31\u2013USD9.9trillionperyear).\
    \ The next four sectors with the largest monetary climate- driven damages include\
    \ premature mortality attributable to changes in air quality (mean: USD240 billion\
    \ per year; 95% CI: USD32\u2013USD1000 billion per year), transportation impacts\
    \ associated with changes in high-tide flooding (mean: USD140 billion per year;\
    \ 95% CI: USD110\u2013 USD200 billion per year), national labor hours lost (mean:\
    \ USD51 billion per year; 95% CI: USD6.7\u2013USD210 bil- lion per year), and\
    \ health damages from wild\uFB01re smoke ex- posure and response costs from wild\uFB01\
    re suppression (mean: USD51 billion per year; 95% CI: USD8.1\u2013USD220 bil-\
    \ lion per year).\"\nMore Notes: \"Thesesectoraldamagesaresensitivetoassumptionsinthe\
    \ adaptation scenarios (see Sect. A3 for more detail).\"\n"
  8: "Source material here: The range of 2090 physical impact results across the 10000\
    \ RFF-SP projections, including the 95% CI and mean. Sectors such as temperature-related\
    \ mortality, air quality, wildfires, dust, valley fever, crime, and labor productivity\
    \ are assessed. One potential exception could be temperature-related mortality\
    \ and the climate\u2013air quality linkage. Based on the climate impacts included\
    \ in FrEDI, Fig. 5 shows that the Southeast will experience the largest annual\
    \ damages per capita. Premature mortality (deaths) 19000\u201391000. Air quality\
    \ 2100\u201310000. Labor Work hours lost (millions of hours) 170\u2013830. Historical\
    \ data suggest that most of our response to sea level rise thus far is in between\
    \ reactive adaptation and no adaptation. While the primary underlying study (Cromar\
    \ et al., 2022) is a well-regarded meta-analysis...it does not explicitly consider\
    \ future adaptive measures. Notably, the largest impact sector in this study,\
    \ temperature-related mortality, does not include assumptions about future adaptation.\
    \ Results from FrEDI also show that climate-driven damages across the national\
    \ population vary by geographical region."
  9: "Source material here.\n\"Figure 4. Annual US damages in the year 2090 by sector,\
    \ in order of decreasing mean damages, colored by six sector category groupings.\"\
    \n\"In each region, the largest monetary damages in 2090 are expected from premature\
    \ mortality associated with changes in temperature, ranging from USD4500 per person\
    \ in the Southwest to USD6500 per person in the Southeast.\"\n\"Damages from transportation\
    \ impacts from high-tide \uFB02ooding and premature mortality attributable to\
    \ climate-driven change in air quality are the second and third largest in the\
    \ coastal Southeast and Northeast regions.\"\n\"In the Northwest and Southwest,\
    \ the sectors with the second- and third-largest climate-driven monetized damages\
    \ are air quality and wildfires.\"\n\"Con\uFB01dence intervals presented throughout\
    \ this analysis account for uncertainty associated with the range of future emission\
    \ and socioeconomic projections across the 10000 RFF-SP scenarios. These also\
    \ incorporate climate parameter uncertainty as a Monte Carlo approach was used\
    \ to sample the calibrated parameter set when running FaIR with the 10000 RFF-SP\
    \ emissions scenarios.\"\n\"Overall, however, the negative impacts of climate\
    \ change outweigh the positives such that net losses are projected in each region.\"\
    \n"
  10: "yaml\nEvaluation overview: \"The page provides an overview of climate-driven\
    \ damages in the U.S., including per capita impacts across several sectors.\"\n\
    \  - Evidence: \"Mean per capita annual climate-driven damages across the seven\
    \ regions in 2090 for the subset of climate impacts included in FrEDI.\"\n\nDrivers\
    \ of Risk: \"Shocks impacting outcomes include temperature, wildfire, agriculture,\
    \ labor, air quality, wind damage, and transportation & high tide flooding.\"\n\
    \  - Evidence: \"Donut charts show...the top four sectors with the largest damages\
    \ in each region.\"\n  - Example: \"Temperature\" (Northern Plains, Northeast,\
    \ Southwest, Southeast); \"Wildfire\" (Northern Plains, Southwest); \"Agriculture\"\
    \ (Midwest); \"Labor\" (Midwest, Southern Plains, Southeast); \"Air Quality\"\
    \ (Northeast, Southeast); \"Wind damage\" (Southern Plains); \"Transportation\
    \ & HTF\" (Northeast, Southern Plains).\n\nQuantitative material: \"Quantitative\
    \ information includes per capita damage estimates in 2020 USD for various U.S.\
    \ regions and top sectors contributing to damage.\"\n  - Evidence: \"Donut charts\
    \ show the annual per capita damages (2020 USD per person annually)...in each\
    \ region.\"\n\nMethodology: \"The analysis compares damages using Shared Socioeconomic\
    \ Pathways (SSPs) scenarios and incorporates varying discount rates to estimate\
    \ net present damages for emissions.\"\n  - Evidence: \"Comparison of annual national\
    \ climate-driven damages in the US in the year 2090 from a subset of four Shared\
    \ Socioeconomic Pathways (SSPs).\"\n  - Explanation: \"Net present damages per\
    \ tonne of GHG emissions...using Ramsey discounting calibrated to near-term target\
    \ rates of 1.5%, 2.0%, and 2.5%.\"\n\nHighlights: \"Key outcomes include regional\
    \ per capita damages in the U.S. in 2090, with the Southeast having the highest\
    \ per capita damages.\"\n  - Evidence: \"Southeast: Per Capita Damages: $9300\"\
    \n"
  11: "  \nEvaluation overview: \"Vulnerability to climate-driven changes in air-quality-attributable\
    \ mortality and labor hours lost, by race and vulnerable groups in 2090.\"\n\n\
    Drivers of Risk: \"Vulnerability to climate-driven changes in air quality...\"\
    \n\nQuantitative material: \"...the values from highest to lowest are: Black or\
    \ African American (126), American Indian or Alaska Native (92), Pacific Islander\
    \ (80), Two or more races (72), Other race (67), White, non-Hispanic (67), Hispanic\
    \ or Latino (62), Asian (53).\"\n\nMethodology: \"Comparison of FrEDI damages\
    \ from SSP and RFF socioeconomic input scenarios in 2090 (billions 2020 USD).\"\
    \n\nHighlights: \"Differences...by race and vulnerable groups in 2090.\"\n"
  12: "  \n\"The mortality approach used in this paper is based on a well-regarded\
    \ systematic review and meta-analysis of temperature-related mortality studies.\"\
    \  \n\"The largest sector, premature mortality from temperature changes, dominates\
    \ the monetized damages across all regions.\"  \n\"Figure 7. Net present value\
    \ of future damages from 1t of CO2 for damages occurring only within the CONUS.\"\
    \  \n\"The FrEDI framework is dynamic, with new sectors being added to the framework\
    \ on a continuous basis.\"  \n\"This study presents an evolving framework to quantify\
    \ the damages of climate change to the US economy, relying on more than a decade\
    \ of research exploring individual sectoral impacts within the contiguous US.\"\
    \  \n\"These results imply that there can be significant benefits to the US from\
