  1: 'yaml

    Evaluation overview: "ranging from changes in organism physiology and population
    dynamics to altered communities and ecosystems."

    Drivers of Risk: "Rising atmospheric carbon dioxide (CO2) levels, from fossil
    fuel combustion and deforestation, along with agriculture and land-use practices
    are causing wholesale increases in seawater CO2 and inorganic carbon levels; reductions
    in pH; and alterations in acid-base chemistry of estuarine, coastal, and surface
    open-ocean waters."

    Highlights: "potentially puts at risk many of the valuable ecosystem services
    that the ocean provides to society, such as fisheries, aquaculture, and shoreline
