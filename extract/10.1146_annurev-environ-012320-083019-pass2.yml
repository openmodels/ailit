  3: "yaml\nEvaluation overview: \"The      implications      for      human     \
    \ society\u2014for      fishery     and      resource     management,     marine\
    \      conser-vation,     and     impacts     on     communities     reliant \
    \    on     the     ocean\u2014are     just     now     coming     into     focus.\"\
    \nDrivers of Risk: \"Atmospheric    CO2     and    the    concurrent    ocean\
    \    acidification    are    projected    to    continue    to    rise    throughmid-century,\
    \   if    not    longer,   without    deliberate    and    decisive    international\
    \    action    on    climate    mitigation    and    emissions    reductions.\"\
    \ and \"acidification    impacts    on    seawaterchemistry     from     rising\
    \     atmospheric     CO2      and     coastal     land     use     and     pollution\
    \     (Section     2)\"\nMethodology: \"Knowledge     about     organismal   \
    \  responses     leverages     awealth     of     data     from     laboratory\
    \     manipulative     experiments.    More     limited     information     is\
    \     availableon    community    and    ecosystem    responses    from    mesocosm\
