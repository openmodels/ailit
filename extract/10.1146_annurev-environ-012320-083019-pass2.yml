Drivers of Risk:
  1: Rising atmospheric CO2 levels due to fossil fuel combustion, deforestation, agriculture,
    and land-use practices are causing increases in seawater CO2 and inorganic carbon
    levels, reductions in pH, and alterations in acid-base chemistry of marine environments.
  3: Ocean acidification driven by increased atmospheric CO2 and coastal pollution
    is a primary driver of risk affecting seawater chemistry.
  4: Natural processes and local human impacts exacerbate ocean acidification, with
    elevated CO2 and low O2 levels in coastal upwelling systems.
  6: Exposure to high CO2 conditions, low dissolved oxygen, and elevated temperature
    are key factors affecting species sensitivity to acidification.
  7: Ocean acidification and CO2 levels influence marine life responses and adaptation.
  8: High CO2 conditions, low oxygen/hypoxia, multiple changing ocean conditions (temperature,
    pH), and ocean acidification.
  9: Ocean acidification, increased pCO2 levels, and changes in competitive interactions
    are identified as drivers impacting marine community structures.
  10: Ocean acidification.
  11: Ocean acidification, warming, increased stratification, nutrient availability,
    salinity, temperature regime, toxic algal blooms, and bioerosion are impacting
    these organisms.
  12: Drivers include increased CO2 levels leading to ocean acidification, which affects
    coral recruitment, community structure, and indirectly impacts associated marine
    species.
  13: Ocean acidification (elevated CO2, high pCO2) is a primary driver, impacting
    plankton dynamics, water quality, and light levels. Enhanced coastal acidification
    is worsening conditions for oyster aquaculture.
  14: Increased atmospheric CO2 leading to ocean acidification is impacting bivalve
    reproduction, survival, and maturation, affecting ecosystem services and fisheries.
  15: Climate change, ocean acidification, harvest, fishery management, social-economic
    factors.
  16: Ocean acidification, coastal disturbances (trampling, sedimentation, dredging,
    pollutants), loss of biodiversity.
  17: Ocean acidification, ocean warming, oxygen loss, pollution, freshwater runoff,
    and coastal plankton blooms are drivers impacting marine systems.
  18: The drivers of risk include human CO2 emissions and nutrient pollution leading
    to ocean acidification, as well as extreme ocean events like harmful algal blooms
    and marine heat waves.
  19: Human CO2 emissions drive ocean acidification; warming and oxygen loss are overlapping
    global-scale changes.
  25: Ocean acidification is identified as a key driver of risk, impacting marine
    food webs, coral calcification, and biodiversity shifts.
  26: Ocean acidification and ocean warming are identified as major drivers impacting
    marine ecosystems and related economic activities.
  32: Climate change, Urban Climates
Evaluation overview:
  1: The paper discusses the biological impacts of human-driven ocean acidification
    ranging from changes in organism physiology and population dynamics to altered
    communities and ecosystems.
  3: The paper discusses acidification impacts on seawater chemistry and organismal
    responses, but does not provide specific evaluation outcomes on this page.
  6: Discussion on species' sensitivity to ocean acidification, including impacts
    on survival, growth, and development under high CO2 conditions.
  8: The page discusses organismal responses to seawater inorganic carbon chemistry,
    detection of changes in marine species attributed to ocean acidification, and
    impacts on the epigenome, gene expression, and phenotype.
  9: This page discusses the impact of ocean acidification on marine species, communities,
    and ecosystem functions.
  10: Evaluates changes in key community and ecosystem properties/processes in response
    to ocean acidification in seagrass meadows, coral reefs, other carbonate reef
    ecosystems, and pelagic food webs.
  11: This page discusses impacts on phytoplankton, zooplankton, fish larvae, coral
    reefs.
  12: This page provides an overview of the potential shifts in coral reef community
    structures and their impact on associated invertebrate and fish communities due
    to ocean acidification.
  13: Discusses ocean acidification impacts on seagrass beds, fisheries, and human
    communities, focusing on productivity, ecosystem services, and revenue loss.
  14: The paper provides an overview of ocean acidification's impact on marine mollusks
    and associated economic activities, including potential losses in shellfish harvests
    and economic value.
  15: Exploration of the combined impacts of climate change, acidification, and socio-economic
    factors on commercial fisheries and coral reefs.
  16: Focuses on the impact of ocean acidification on coastal systems, submerged aquatic
    vegetation, and biodiversity, assessing its effects on ecosystem services like
    shoreline stabilization, habitat creation, water filtration, carbon storage, and
    overall ecosystem resilience.
  17: The document discusses the impacts of ocean acidification on marine biodiversity
    and related cultural services.
  18: The paper provides an overview of the impacts of rising CO2 levels on seawater
    chemistry, marine life sensitivity, and risks to human communities.
  19: Acidification will impact aquaculture, fisheries, shoreline protection, and
    other valuable marine ecosystem services, resulting in vulnerabilities and risks
    to human communities.
  25: Studies the impact of ocean acidification on various marine ecosystems including
    coral reefs, fish populations, and bivalve larvae.
  26: The papers listed generally discuss the impacts of ocean acidification, ocean
    warming, and related changes on marine ecosystems and industries such as fisheries.
  32: Urban climates and climate change
Highlights:
  1: Ocean acidification potentially puts at risk many valuable ecosystem services
    that the ocean provides to society, such as fisheries, aquaculture, and shoreline
    protection.
  3: The paper emphasizes the need for improved understanding of ocean acidification
    impacts from a scientific, management, policy, and socioeconomic perspective to
    develop adequate adaptation strategies.
  6: Variation in species sensitivity to acidification influenced by life stage, species,
    population, co-stressors, and exposure to other climate change aspects.
  7: Some species show sensitivity to high-CO2 conditions while others may show signs
    of potential adaptation.
  8: Adaption to high-CO2 conditions is possible. Considering one factor alone can
    yield incorrect information related to how a species might fare in a future ocean
    because the response of species to various aspects of ocean change can be additive,
    synergistic, or antagonistic.
  9: Ocean acidification is linked to increased primary producer biomass and decreased
    taxonomic diversity, leading to potential homogenization of community structures.
    It also mentions that while increased primary production could boost production
    across trophic levels, there's uncertainty about how consumer consumption rates
    can adapt to high-CO2 conditions.
  10: 'Ocean acidification leads to various changes across ecosystems: bioerosion
    and macroalgal overgrowth in coral reefs; altered calcification and recruitment
    in various reef types; shifts in primary and secondary productivity, community
    structure, and harmful algal blooms in pelagic food webs; changes in grazing and
    macroalgal competition in seagrass meadows. Altered marine consumer behavior due
    to ocean acidification can weaken predator-prey links, causing cascading effects.'
  11: Ocean acidification can disrupt pelagic food webs, increase toxicity or abundance
    of toxic algae, and lead to declines in net calcification of coral reefs. Bioerosion
    may be more sensitive to changes in carbonate chemistry than carbonate production.
    Coral reefs have already suffered declines in net calcification associated with
    ocean acidification.
  12: Key outcomes include shifts in coral species composition and community structure,
    adaptation potential in naturally acidic environments, and implications for reef-associated
    biodiversity.
  13: Ocean acidification poses present-day risks to the Pacific oyster industry and
    coastal communities. Fleshy epiphytic algae are expected to benefit from high
    pCO2. Ocean acidification is very likely to decrease harvests of several bivalve
    shellfish species.
  14: Ocean acidification is expected to cause significant economic impacts, potentially
    on the same order as increased hurricane damages in the US by the end of the century.
  15: Poleward movement of temperate fisheries may increase Arctic fishery revenues
    despite calcifier mortality; risk from lowered seafloor around carbonate platform
    environments endangering human safety and property.
  16: Ocean acidification negatively impacts vermetid and shellfish reefs, coastal
    systems with submerged aquatic vegetation (seagrass beds, kelp forests), and overall
    biodiversity, compromising ecosystem resilience and regulating services. Submerged
    aquatic vegetation and coastal systems may help mitigate ocean acidification through
    phytoremediation and carbon sequestration, though local details strongly influence
    the amount of carbon captured. Loss of biodiversity decreases ecosystem resilience,
    productivity, stability, and functional redundancy, raising the risk of large-scale
    ecosystem shifts.
  17: The foremost solution identified is cutting atmospheric CO2 emissions; there
    is promise in multi-stakeholder ocean planning and adaptive management; interventions
    such as shellfish aquaculture, selective breeding, and water quality management
    are outlined as adaptation methods.
  18: The paper emphasizes the importance of considering multiple stressors in adaptation
    strategies, and highlights risks to human communities such as loss of shellfish
    harvests and coral reef decline.
  19: The ultimate solution to ocean acidification involves global-scale reductions
    in human CO2 emissions, with local adaptation strategies also needed.
  25: Ocean acidification affects coral growth and recruitment, modifies fish populations
    indirectly, alters early successional coral reef communities, and has multiple
    modes of action on bivalve larvae.
  26: The text suggests ocean acidification and warming have notable impacts on marine
    organism recruitment, ecosystem services, seagrass and shellfish industries, with
    some showing resilience or unexpected shifts.
Methodology:
  3: The paper mentions manipulative experiments, mesocosm and field studies, natural
    high-CO2 environments, and modeling exercises, but does not provide specific details
    of the methodology on this page.
  6: Use of a variety of experimental strategies and complementary approaches to characterize
    species sensitivity to acidification.
  7: Studies involve experimentation on populations living in naturally high-CO2 environments
    to explore sensitivity and potential adaptation.
  8: The page discusses laboratory and field experiments, sensitivity studies, multigenerational
    experimental evolution studies, reductionist and scenario-based approaches to
    research design.
  9: The paper discusses how experiments and studies using natural gradients in carbonate
    chemistry are utilized to analyze community and ecosystem effects of ocean acidification.
  10: Trends are derived from multiple-species experiments or observational studies
    in naturally acidified ecosystems, not direct observations of anthropogenically
    driven change. Literature cited represents key studies highlighting community
    and ecosystem effects in critical habitats.
  11: Whole-community mesocosm studies and field studies across upwelling gradients
    are referenced. Manipulative alkalinity enrichment experiments at the scale of
    a reef flat are also mentioned.
  13: Discusses real-world and laboratory evidence, multidisciplinary studies focused
    on social-ecological risks, and research on interventions to decrease vulnerability.
    Focuses on present-day concerns and long-term driver attribution.
  15: Integrated assessment models (IAMs) and ecosystem models examining interaction
    of ocean acidification with other drivers.
  19: The paper discusses the need for enhanced monitoring, targeted observing systems,
    process studies, modeling efforts, and experimental studies to evaluate acidification
    impacts across biological scales and in varying environmental contexts.
  26: Various methodologies are likely used including experimental studies, economic
    assessments, and ecosystem modeling.
  32: The page is a table of contents; the methodology would be within the paper.
More Notes:
  6: Recent reviews emphasize the influence of climate change aspects on species sensitivity
    to CO2 conditions, and the importance of predictive models considering phenotypic
    plasticity and natural selection.
  10: The figure caption specifically notes that the observed trends are NOT direct
    observations of anthropogenically driven change, indicating a focus on the effects
    of acidification under specific experimental conditions, not necessarily broad,
    real-world, long-term climate change impacts.
  11: The impacts on upper trophic-level species are likely to be complex and species-specific.
  15: Ocean acidification impacts on marine species linked to vulnerabilities in regional
    and community contexts.
  18: The paper discusses planned, end-to-end structures to support communities affected
    by ocean change, and the need for nimble governance to handle local and global
    changes.
  19: Interventions designed to address other issues (e.g., biodiversity loss, water
    quality, governance) may also help address harm from ocean acidification. Adaptive
    management systems need to accommodate geographic and temporal shifts in living
    marine resources and address extreme events.
Quantitative material:
  4: Surface ocean pH has dropped on average globally by approximately 0.1 units from
    the preindustrial era to present.
  10: Provides trends (increase, decrease, change, neutral) but no specific quantitative
    data or percent changes.
  11: This page does not include specific quantitative results, but references studies
    that do.
  13: Mentions decreased harvests of bivalve shellfish species, leading to lost revenue,
    but provides no specific percent changes.
  14: Projected losses due to ocean acidification include 10-28% annual losses for
    US and UK mollusk harvests, US welfare losses of $400 million USD by 2100, and
    global losses of $6 billion to $100 billion USD annually.
  15: Projected decrease in Alaska-based Tanner crab fishery catch and profits by
    more than 50% in the next 20 years.
  16: "Oyster reefs provide an estimated value of $5,500\u2013$99,000 per hectare\
    \ per year via shoreline stabilization, habitat creation, and water filtration."
  26: Some papers mentioned evaluate the economic impacts on industries like shellfish
    and fisheries but specific percent changes or quantitative outcomes are not provided
    in this text.
