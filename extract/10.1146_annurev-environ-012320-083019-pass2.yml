    \  from     scientific,    management,    policy,    and     socioeconomic   \
    \  perspectives     to     developadequate    adaptation    strategies.\"\n"
  4: "yaml\nDrivers of Risk: \"Driven primarily by fossil fuel combustion, contemporary\
    \ human CO2 emissions to the atmosphere of approximately 10 billion metric tons\
    \ of carbon per year result in an increase in atmospheric CO2 of roughly 2 ppm/year\
    \ or 0.5% per year.\"\nQuantitative material: \"Present-day CO2 levels (\u223C\
    410 ppm) have not been experienced by life on Earth for several million years,\
    \ and the human-induced CO2 growth rate is nearly two orders of magnitude faster\
    \ than what occurred during the large glacial-interglacial transitions (11).\"\
    \nQuantitative material: \"As a result, surface pH and CO2\u2212 3 are declining\
    \ (Figure 1), and surface ocean pH is estimated to have dropped on average globally\
    \ by approximately 0.1 units from the preindustrial era to present, which is an\
    \ \u223C30% increase in hydrogen ion concentration.\"\nDrivers of Risk: \"More\
    \ acidified ocean conditions, found regionally due to natural processes and local\
    \ human impacts, are exacerbated by the global acidification signal driven by\
    \ CO2 emissions. Coastal upwelling systems typically have elevated CO2 and low\
    \ O2 levels because of the marine biological pump\"\n"
  6: 'yaml

    "Evaluation overview": "A trend toward lower survival, slower growth, and development
    is also evident with simultaneous exposure to high CO2 and elevated temperature
    (45)."

    "Drivers of Risk": "Negative additive effects typically occur with simultaneous
    exposure to high CO2 and low dissolved oxygen (44). A trend toward lower survival,
    slower growth, and development is also evident with simultaneous exposure to high
    CO2 and elevated temperature (45)."

    "Methodology": "As Figure 2 shows, a variety of experimental strategies are being
    used to characterize the sensitivity of species to acidification now and in the
    future (46, 47). Complementary approaches are needed because any one technique
    is limited by issues related to drawing inferences from short-term experiments
    or small-scale spatial range, choices about treatment conditions and study subjects,
    logistics related to engineering and animal husbandry, and other factors (35)."

    "Highlights": "For example, copepod sensitivity currently defies simple characterization,
    as it is higher in earlier life stages than in the adult life stage, variable
    between species and within different populations of the same species, and dependent
    on co-stressors and processes of acclimatization and adaptation (41)."

    "More Notes": "Recent reviews emphasize how species sensitivity to various CO2
    conditions is influenced by exposure to other aspects of climate change. Predicting
    how marine populations will evolve in response to climate change and ocean acidification
    requires consideration of the flexibility of individuals in each generation to
    adjust to new environmental conditions (i.e., phenotypic plasticity) and natural
    selection across environments (50)."

    '
  7: 'Source material here.

    Various types of studies generate information about how ocean global change will
    influence marine life. Studying populations living in naturally high-CO2 environments
    is another way to explore whether long-term exposure to high CO2 can confer resistance
    to ocean acidification. Field collections show that some species express sensitivity
    to the high-CO2 conditions already observed along the western coast of the United
    States, whereas others express signs of potential adaptation.

