  9: 'Source material here.

    Evaluation overview: "Studies examining how individual organismal effects of ocean
    acidification will affect communities and functioning ecosystems have received
    increasing recent attention...In general, there is a trend toward the homogenization
    of community structure in space and time, which has been attributed to altered
    competitive interactions (e.g., for food or space)."

    Drivers of Risk: "Studies examining how individual organismal effects of ocean
    acidification will affect communities and functioning ecosystems have received
    increasing recent attention...In general, there is a trend toward the homogenization
    of community structure in space and time, which has been attributed to altered
    competitive interactions (e.g., for food or space)."

    Methodology: "Results from both experiments and studies using natural gradients
    in carbonate chemistry strongly suggest that ocean acidification increases primary
    producer biomass and decreases taxonomic diversity."

    Highlights: "Ocean acidification increases primary producer biomass and decreases
    taxonomic diversity, although many species are able to survive (or even thrive)
    in high-CO2 conditions...Increased primary production associated with high pCO2
    can boost production across multiple trophic levels, if consumers are able to
    increase their consumption rates."

    '
  10: "  \n\"General trends in key community and ecosystem properties and processes\
    \ in response to ocean acidification in seagrass meadows, coral reefs, other carbonate\
    \ reef ecosystems, and pelagic food webs.\" \n\n\"Trends are primarily derived\
    \ from studies of multiple-species experiments or observational studies in naturally\
    \ acidified ecosystems. That is, these are not direct observations of anthropogenically\
    \ driven change in nature.\" \n\n\"Below, we review the expanding literature on\
    \ community and ecosystem effects of acidification on four critical habitats especially\
    \ relevant for resource managers: pelagic food webs; coral reefs; oyster and other\
    \ biogenic, carbonate reefs; and seagrass beds.\" \n\n\"Altered behavior in marine\
    \ consumers (e.g., predator avoidance) caused by exposure to conditions of ocean\
    \ acidification can also weaken predator-prey links in marine food webs, causing\
    \ cascading effects on community structure and function.\"\n"
  11: "Source material here.\nto    consider,    however,    is    that    the   \
    \ responses    of    phytoplankton    will    likely    depend    on    other\
    \    environ-\nmental   conditions   and   factors,  such   as   the   nutrient\
    \   availability,  salinity,  and   the   temperature   regime\n(108),    and\
    \    these    interactions    have    yet    to    be    fully    incorporated\
    \    into    whole-community    mesocosm                                     \
    \                   Carbonate    saturation\nstudies. Modeling work suggests that\
    \ ocean acidification, warming, and increased stratification will drive changes\
    \ in marine microbial community makeup (42), but it is not yet known whether microbial\
    \ changes will alter global ecosystem functions such as net primary production\
    \ and export or air-sea gas exchange.\nWhole-community mesocosm studies have demonstrated\
    \ increased productivity at the base of pelagic (water-column) food webs (106),\
    \ leading to increased productivity of higher trophic levels (109), including\
    \ enhanced survival and biomass of larval fish that are directly negatively impacted\
    \ by acidification (110). However, not all zooplankton are expected to benefit\
    \ from increased primary productivity. For example, some zooplankton taxa appear\
    \ to be vulnerable directly to ocean acidification, regardless of the resources\
    \ available (60). Field studies across upwelling gradients indicate that pteropods\
    \ may already be experiencing shell dissolution in low-pH waters along the California\
    \ Current (60). In addition, the nutritional quality of some zooplankton may suffer\
    \ with ocean acidification, despite increased production or abundance (111). As\
    \ such, models of pelagic food webs with ocean acidification have indicated that\
    \ the effects on upper trophic\u2013level species are likely to be complex and\
    \ species specific, based on the specific food-web linkages in the ecosystem.\n\
    Ocean acidification could also disrupt pelagic food webs via the proliferation\
    \ of toxic algal blooms (112). Ocean acidification can either increase the toxicity\
    \ of the harmful algae (113) or increase the abundance of toxic bloom-forming\
    \ species through altered competitive interactions (112). Again, it is less well\
    \ understood how ocean acidification may interact with other factors, including\
    \ changing ocean temperatures and nutrient concentrations to affect harmful algal\
    \ blooms, but it is clear that increases in the toxicity or abundance of bloom-forming\
    \ species could severely disrupt food webs.\nThe persistence of coral reefs depends\
    \ on the balance of net accretion (carbonate production minus dissolution) and\
    \ bioerosion by boring and scraping organisms at each reef. Numerous studies document\
    \ declines in net calcification of different coral species and coral reef assemblages\
    \ with lower carbonate saturation states. Moreover, retrospective studies from\
    \ the Great Barrier Reef have highlighted large declines in the net calcification\
    \ of corals over time (114). However, it has been difficult to attribute the declines\
    \ in net accretion to ocean acidification due to the concurrent trends in ocean\
    \ warming and coral bleaching. Using manipulative alkalinity enrichment at the\
    \ scale of a reef flat, Albright et al. (115) recently demonstrated that net community\
    \ calcification increases when the seawater carbonate saturation states are raised\
    \ to preindustrial levels. This suggests that coral reefs have already suffered\
    \ declines in net calcification associated with ocean acidification (115). There\
    \ is growing evidence that bioerosion may be more sensitive to changes in carbonate\
    \ chemistry than carbonate production (116). This is potentially due to changes\
    \ in the density or structural integrity of the coral skeletons produced in lower\
    \ carbonate saturation states (117). Indeed, increased bioerosion has been demonstrated\
    \ in naturally more acidic locations (95, 118, 119), which suggests minor shifts\
    \ in biological species interactions may further tip the balance from net accretion\
    \ to net erosion of coral reefs in future conditions.\n"
  12: Source material here.
  13: "  \nEvaluation overview: \"The emergence of ocean acidification impacts on\
    \ the Pacific oyster industry in the Pacific Northwest United States in the mid-2000s\
    \ immediately framed ocean acidification as a present-day concern with direct\
    \ implications for small and large businesses and coastal communities.\"\n\"Both\
    \ real-world and laboratory evidence suggest that ocean acidification is very\
    \ likely to decrease harvests of several bivalve shellfish species, with lost\
    \ revenue and cultural disruption to follow.\"\n\nDrivers of Risk: \"Seagrasses\
    \ may benefit from acidification based on the argument that elevated CO2 will\
    \ reduce energetic costs of carbon uptake for photosynthesis.\"\n\"In contrast,\
    \ fleshy epiphytic algae are largely expected to benefit from high pCO2.\"\n\"\
    ...the Pacific oyster aquaculture industry in the Pacific Northwest, which is\
    \ increasingly at risk from acute ocean acidification worsened by enhanced coastal\
    \ conditions.\"\n\nQuantitative material: \"Both real-world and laboratory evidence\
    \ suggest that ocean acidification is very likely to decrease harvests of several\
    \ bivalve shellfish species, with lost revenue and cultural disruption to follow.\"\
    \n\nMethodology: \"Detecting changes in ecosystem services can be challenging,\
    \ and attributing those changes to one long-term driver, such as ocean acidification,\
    \ is even more difficult.\"\n\"Multidisciplinary studies focused on social-ecological\
    \ risks from ocean acidification are exploring economics, ecosystem services,\
    \ and cultural and societal institutions.\"\n\"Researchers are also studying interventions\
    \ that decrease vulnerability by either decreasing social-ecological systems\u2019\
    \ exposure to ocean acidification or increasing their adaptive capacity.\"\n\n\
    Highlights: \"The emergence of ocean acidification impacts on the Pacific oyster\
    \ industry in the Pacific Northwest United States in the mid-2000s (144) immediately\
    \ framed ocean acidification as a present-day concern with direct implications\
    \ for small and large businesses and coastal communities.\"\n\"...fleshy epiphytic\
    \ algae are largely expected to benefit from high pCO2.\"\n\"Both real-world and\
    \ laboratory evidence suggest that ocean acidification is very likely to decrease\
    \ harvests of several bivalve shellfish species, with lost revenue and cultural\
    \ disruption to follow.\"\n"
  14: "\"Ocean acidification causes decreases in bivalve reproduction, survival of\
    \ juvenile bivalves, or delayed maturation of adults and can alter recruitment,\
    \ harvestable biomass, maximum sustainable yield, and economic value of shellfish\
    \ fisheries. Models with simple CO2-damage relationships for all bivalves and\
    \ time discounting have projected losses of approximately 10\u201328% losses for\
    \ both US and UK mollusk harvests annually. US losses toward 2100 are estimated\
    \ at $400 million USD and global losses, dominated by China, from $6 billion to\
    \ $100 billion USD annually. United States economic damages by the end of the\
    \ century for mollusk fishery losses are on the same order as those for increased\
    \ hurricane damages.\""
  15: "Source material here.\nIntegrated assessment models (IAMs) are now being utilized\
    \ to explore the possible combined impacts of climate change, acidification, harvest,\
    \ fishery management, and social-economic factors on specific commercial fisheries.\
    \ Cooley et al. (149) found a substantial decline in US northeast sea scallop\
    \ harvests by 2050 under high CO2 emission scenarios and contemporary harvest\
    \ rules, if ocean acidification decreases recruitment and slows growth, although\
    \ adjustments to management can help increase biomass somewhat (157). Another\
    \ IAM projected a decrease in the Alaska-based southern Tanner crab fishery catch\
    \ and profits by more than 50% in the next 20 years (158). A dynamic bioclimate\
    \ envelope model examining ocean acidification and temperature effects together\
    \ found that total fisheries revenue in the Arctic region may increase by 39%\
    \ from 2000 to 2050 under SRES A2, because poleward movement of temperate fisheries\
    \ will increase Arctic fishery revenues more than calcifier mortality will drive\
    \ losses (159).\nEcosystem models and vulnerability assessments have also evaluated\
    \ the interaction of ocean acidification with other drivers and fisheries. In\
    \ the California Current, decreased pH is expected to most impact crabs, shrimps,\
    \ benthic grazers, and bivalves, with indirect effects on specific demersal species\
    \ that prey on these groups (160) and different consequences for port-based economies\
    \ in the region (161). Using a suite of regional ecosystem models from around\
    \ the world, Olsen et al. (162) explored the interaction of ocean acidification,\
    \ marine protection, and fishing pressure, finding that marine protection and\
    \ ocean acidification have greater overall effects on the ecosystem than adjusting\
    \ fishing pressure. Seijo et al. (163) recommend considering possible ocean acidification\
    \ effects when defining fisheries management strategies, and Olsen et al. (162)\
    \ and Talloni-\xC1lvarez et al. (164) suggest that ocean acidification should\
    \ also be considered when developing protection strategies and ecosystem-based\
    \ management. Regional vulnerability to potential losses in shellfish harvests\
    \ from ocean acidification is greater for indigenous groups and rural communities\
    \ in the United States (165, 166) and developing nations with artisanal fishing\
    \ fleets in the Mediterranean (167). Minimizing overall community vulnerability\
    \ to losses from ocean acidification requires addressing community and environmental\
    \ factors such as overall economic well-being, access to job alternatives, coastal\
    \ hypoxic events, and more as well as ocean acidification impacts on marine species.\n\
    5.2. Coral Reefs\nPotential economic and cultural losses of coral reef\u2013provided\
    \ ecosystem services\u2014coastal protection, habitat and biodiversity, fisheries,\
    \ recreational and tourism opportunities, and existence and amenity values\u2014\
    have been considered since the earliest days of ocean acidification research.\
    \ Approximately 500 million people derive food, income, coastal protection, and\
    \ other services from coral reefs (168). The worldwide value of coral reefs, however,\
    \ is difficult to pin down; published estimates range from $29.8 billion/year\
    \ (169) to $376 billion/year (170), although Pendleton et al. (171) find that\
    \ data are insufficient to allow rigorous evaluation. Ocean acidification combined\
    \ with erosion and other disturbances have lowered the seafloor around carbonate\
    \ platform environments in the Florida Keys, Caribbean, and near Hawai\u2018i,\
    \ accelerating the rate of relative sea-level rise (172) and endangering human\
    \ safety and property (173). Without coastal protection from reefs, specifically,\
    \ flood damages from 100-year storm events would nearly double, rising to $272\
    \ billion (173). Brander et al. (174) examined the economic impact of ocean acidification\
    \ on coral reefs, concluding that economic effects of reef scarcity and increasing\
    \ global wealth would keep tourism and economic value of reefs strong, despite\
    \ net loss of coral reefs from acidification. Other analyses use noneconomic methods\
    \ to evaluate risks posed by changes in coral reef health or coverage. Pendleton\
    \ et al. (171) showed that overlapping risk of reef loss from warming and acidification\
    \ and social and economic vulnerability puts Southeast Asia at particular combined\n"
  16: "Source material here.\n\"Vermetid and shellfish reefs suffer from ocean acidification\
    \ as well as coastal disturbances such as trampling, sedimentation, dredging,\
    \ and pollutants or poisons. Both types of reefs are 'ecosystem engineers' that\
    \ stabilize sediments, provide habitat for benthic ecosystems, and store organic\
    \ carbon. Oyster reefs provide an estimated value of $5,500\u2013$99,000 per hectare\
    \ per year via shoreline stabilization, habitat creation, and water filtration.\"\
    \n\"Submerged aquatic vegetation\u2019s ability to create habitat and slow water\
    \ flow in coastal regions is better established than its ability to consistently\
    \ capture and sequester CO2 or modulate local pH swings, where evidence is mixed.\
    \ Nevertheless, restoring and preserving submerged aquatic vegetation is increasingly\
    \ seen as a widely useful marine conservation step that will help sustain marine\
    \ provisioning and regulating services and may help mitigate ocean acidification\
    \ in localized areas.\"\n\"All healthy ocean and coastal systems, including the\
    \ environments mentioned above, sustain biodiversity. The reduced biodiversity\
    \ associated with acidified conditions observed in many coastal systems decreases\
    \ ecosystem resilience and compromises regulating services, including habitat\
    \ provision, nutrient cycling, and carbon storage. For example, slower growth\
    \ and survival of a widespread mussel species (Mytilus edulis) under ocean acidification\
    \ could substantially decrease its ability to regulate coastal water quality by\
    \ filtering water.\"\n\"Gascuel & Cheung caution that loss of ocean biodiversity\
    \ that decreases regulating functions and functional redundancy can decrease not\
    \ only system productivity, but also stability and resiliency; additionally, it\
    \ can raise the risk of large-scale ecosystem shifts in ecosystem structure and\
    \ decrease resilience.\"\n"
  17: 'Source material: Losses of marine biodiversity from ocean acidification impacts
    on marine systems can also affect cultural services. There is broad agreement
    that the actual effects and modes of action of ocean acidification and other ocean
    changes on cultural services are insufficiently understood. Nearly every study
    that identifies potential harm from ocean acidification to ecosystem services
    also identifies possible interventions. There is consensus across the scientific
    community that the foremost solution to ocean acidification is to cut atmospheric
    CO2 emissions. Adaptive management of marine systems, where management interventions
    are implemented to achieve particular ecosystem function goals, is often cited
    as a possible intervention. In coastal zones, ocean acidification interacts with
    other anthropogenic and natural drivers such as pollution, freshwater runoff,
    and coastal plankton blooms. Encouraging shellfish aquaculture industry growth
    has been proposed as an adaptation to ocean acidification and warming.'
