  19: '

    Acidification likely will impact aquaculture, fisheries, shoreline protection,
    and other valuable marine ecosystem services, resulting in vulnerabilities and
    risks to human communities. The ultimate solution to ocean acidification involves
    global-scale reductions in human CO2 emissions...Marine management strategies
    need updating to balance protection and sustainable human uses in the face of
    overlapping global-scale changes like acidification, warming, and oxygen loss...Enhanced
    monitoring of ocean acidification is possible by leveraging improved autonomous
    ocean platform and sensor, remote sensing, data analysis, and modeling technologies...Targeted
    observing systems, process studies, and modeling efforts are needed to evaluate
    acidification impacts in the marine environment across biological scales from
    populations to ecosystems...Experimental studies of ecological effects of ocean
    acidification that explicitly incorporate environmental context (e.g., temporal
    variability in pCO2/pH and concurrent exposure to multiple, relevant drivers)
    are needed to improve forecasts of emergent ecological effects....interventions
    designed to address other issues (e.g., biodiversity loss, water quality, governance)
    may also help address harm from ocean acidification...Adaptive management systems
    must be developed to move beyond the assumption of steady-state environmental
    conditions, to accommodate geographic and temporal shifts in living marine resources,
    and to nimbly address extreme events in ways that minimize harm to both marine
    systems and ocean-dependent human communities.

