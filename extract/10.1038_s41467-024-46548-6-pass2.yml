  12: "Source material here.\nEvaluation overview: \"An important driver in real estate\
    \ markets is demographic change, and because our model represents coastal real\
    \ estate markets over long time horizons, we account for demographic changes by\
    \ updating agent parameter distributions.\"\n\nDrivers of Risk: \"To account for\
    \ risk of SLR, we parameterize r_SLt to be a function of property elevation relative\
    \ to sea level.\" \"We parameterize r_St to reflect the episodic nature of storms,\
    \ r_St = a1/\u03BBt, where \u03BBt is the average storm return interval over the\
    \ past 30 years.\"\n\nQuantitative material: \"r_SLt = a2(1\u200B/C0(helev /C0\
    \ MSLt))\" \"At = At/C0 [1 + \u03D5 (W t (P t /C0 - P et) + (1 /C0 - W t )(P et\
    \ /C0 - P t ))]\"\n\nMethodology: \"An important driver in real estate markets\
    \ is demographic change, and because our model represents coastal real estate\
    \ markets over long time horizons, we account for demographic changes by updating\
    \ agent parameter distributions. ...We fix one shape parameter and allow the other\
    \ parameter to adjust based on these arbitrage opportunities ... and control the\
    \ concentration of probability mass along the [0,1] interval.\"\n\nHighlights:\
    \ \"This allows for the possibility that an agent could have a very high WTP for\
    \ the experience of coastal living (in the numerator of the user cost equation)\
    \ despite growing risks from SLR (in the denominator of the user cost equation).\"\
    \n"
  13: "Source material here.\nEvaluation overview: A ten-year nourishment plan that\
    \ will subsequently be voted on is chosen by comparing the property tax burden\
    \ (cost) against the increase in property value (benefit).\n\nDrivers of Risk:\
    \ We assume that foresight about future climate change is captured in the risk\
    \ parameters.\n\nQuantitative material: Plan costs and benefits are tabulated\
    \ each step for a range of nourishment intervals (ranging from every other year\
    \ to every five years) leading to a menu of nourishment options on which agents\
    \ vote.\n\nMethodology: For each proposed plan option, an average expected beach\
    \ width over a 30-year time horizon is calculated based on the estimated shoreline\
    \ retreat rate (from the previous 30 years), and the quantity of sand needed for\
    \ each nourishment event is tracked with the cost of anticipated nourishment costs\
    \ occurring later in the plan discounted at a rate \u03B4.\n\nHighlights: If the\
    \ benefits minus the costs are negative, then no nourishment plan is chosen -\
    \ in this case the nourishment plans are re-evaluated every time step until a\
    \ nourishment plan is chosen.\n"
