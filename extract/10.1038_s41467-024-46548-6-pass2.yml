Drivers of Risk:
  1: Sea-level rise (SLR) and storms are identified as main risks impacting coastal
    real estate values.
  2: Sea level rise (SLR), beach erosion, storm risk, frequency and intensity of storms,
    sunny-day flooding, groundwater threats.
  3: Sea level rise (SLR), storm risk, and the influence of competing property markets.
  4: Sea level rise (SLR) beginning at year 50 and rising 1 meter over 100 years.
    Beach erosion and nourishment.
  6: The shocks impacting outcomes include rising outside markets, sea level rise
    (SLR), and the onset of SLR after 50 years.
  7: Sea Level Rise (SLR).
  8: Sea level rise (SLR) and its impact on coastal areas' real estate values.
  9: Changes in the physical environment, such as erosion, sea level rise, storms,
    and alterations in risk and values of coastal real estate, serve as drivers of
    risk.
  10: The model accounts for coastal housing markets being confronted with climate
    change.
  11: Sea level rise (SLR), storms, and long-term beach erosion are identified as
    risks affecting property values and decisions.
  12: Storms (parameterized by average storm return interval over past 30 years),
    Sea Level Rise (SLR, parameterized as a function of property elevation relative
    to sea level).
  13: Future climate change foresight is captured in risk parameters affecting shoreline
    nourishment decisions.
Evaluation overview:
  1: The analysis evaluates coastal real estate price trends and demographic shifts
    in the face of climate-induced risks like sea-level rise.
  2: Coastal and inland property values are evaluated in relation to sea level rise
    (SLR).
  3: The evolution of coastal real estate markets, incomes of residents, and shoreline
    management decisions.
  4: Property value, beach width, investor share of housing, expected rate of return
    on coastal real estate, marginal income tax rate of property owners, and risk
    premium for coastal real estate.
  6: The page provides an overview of property value changes, beach width changes,
    income tax rate differences, and investor market share changes as outcomes of
    the evaluation.
  7: Property value, beach width, share of housing owned by investors, expected rate
    of return on coastal real estate, marginal income tax rate of property owners,
    and risk premium for coastal real estate.
  8: The paper evaluates the persistence of high property values in coastal areas
    vulnerable to sea level rise (SLR) and explores mechanisms that contribute to
    this despite the risks.
  12: Oceanfront and non-oceanfront property values, demographic changes in coastal
    real estate markets, agent parameter distributions (income, willingness to pay).
  13: The paper evaluates shoreline management through beach nourishment plans based
    on property tax burden versus property value increase.
Highlights:
  1: Subsidies delay real estate price declines despite increasing risks from SLR;
    removal of subsidies would allow prices to reflect risks but could lead to gentrification.
  2: Subsidies for coastal management (beach nourishment), tax advantages for high-income
    property owners, and stable/increasing property values outside the coastal zone
    dampen the impacts of SLR on coastal property markets, but only delay price declines
    as total inundation approaches. The modeling showed that incorporating human behavior
    with a geophysical model of coastal evolution and coupling simplified dynamics
    of coastal change with detailed economic decision-making can generate new insights
    and emergent patterns in the coupled system.
  3: The paper explores mechanisms that allow a coastal community to delay the inevitable
    collapse of a coastal real estate market and how interventions to defend the coast
    influence demographic changes.
  4: SLR translates into only a modest decline in property values initially, taking
    decades to manifest, which results from an initially mild impact of SLR on housing
    risk. An influx of relatively high-income owner agents dampens the property value
    decline. If agents are not allowed to flux in, SLR translates into an immediate
    decline in property value. Eventually, the investor market share declines to zero.
  6: Key outcomes include coastal real estate prices remaining above baseline 100
    years post-SLR onset, delayed beach width effects, high-income agents driving
    investors out, and nourishment frequency changes with real estate appreciation.
  7: SLR drives local real estate market responses and demographic changes. The model
    indicates that features of the coupled human-natural system dampen environmental
    signals and delay the full capitalization of risk from SLR. Coastal gentrification
    occurs as wealthier residents are attracted to coastal communities despite growing
    risks, which anchors high income distributions.
  8: Subsidies such as beach nourishment and tax policies contribute to maintaining
    high property values despite climate risks; without these, prices might adjust
    more rapidly to reflect climate risks.
  9: Coastal housing markets are influenced by public investments in adaptation and
    risk mitigation, which capitalize into real estate prices and can create bubbles
    when subsidies are involved.
  12: Coastal property values are influenced by a combination of physical risks (storms,
    SLR), demographic changes, and interactions with external real estate markets.
    Agent behavior is modeled with arbitrage and herding to explain price dynamics.
    Risk from SLR is modeled as a function of the difference between property elevation
    and mean sea level.
  13: Beach nourishment decisions are influenced by property value changes and tax
    burdens evaluated over a ten-year nourishment plan.
Methodology:
  1: The Coastal Home Ownership Model (C-HOM) is used to analyze long-term trends
    in coastal real estate, incorporating changes in coastal attributes and economic
    values.
  2: A coupled human-natural systems model is used to link real estate markets, coastal
    amenities, coastal hazards, and policies responding to coastal change. The methodology
    includes modeling nonlinear feedbacks between physical processes and human responses
    across space and time.
  3: An agent-based model called Coastal Home Ownership Model (C-HOM) is used. The
    model simulates coastal property markets and physical processes as a coupled system
    with feedbacks. The simulation runs for 150 years, including an initial 50-year
    period without SLR to understand internal mechanisms.
  4: Agent-based model simulation. Baseline case assumes SLR begins at t=50 and continues
    throughout the remaining periods. Outside property prices are constant, and agent
    flux is turned on. Initial barrier height relative to sea level is 1 meter for
    the first 50 years, then SLR begins. The initial 50-year period characterizes
    the system without SLR. Model simulates outcomes for oceanfront and non-oceanfront
    properties.
  6: The analysis involves a model simulation comparing a baseline to scenarios of
    rising outside markets at the onset of SLR, simulating changes over 100 years.
    Results are compared for scenarios with and without subsidy removal at SLR onset.
  7: The paper uses a coupled human-natural system model (C-HOM) that integrates coastal
    real estate markets with the physical environment, exogenous climate forcing (SLR),
    and the effects of real estate markets in other locations. The model incorporates
    beach nourishment, local public finance decisions, and storm risk.
  8: The analysis is performed using a model for the coupled human-natural system
    named C-HOM, which compares business-as-usual scenarios with potentially more
    efficient coastal management strategies.
  9: The analysis uses an asset-price model and agent-based modeling to evaluate coastal
    real estate dynamics impacted by climate change, incorporating factors like housing
    services, opportunity cost, climate risks, and amenities.
  10: The model simulates the user cost of housing for agents considering factors
    such as interest rates, tax deductions, property taxation, and depreciation.
  11: The analysis uses economic models to evaluate willingness to pay (WTP) for coastal
    properties, incorporating factors like beach width, income, and risk premiums
    related to SLR and storms.
  12: Agent-based model of coastal real estate markets, incorporating demographic
    changes, outside market influences, and heterogeneous expectations of capital
    gains. Agents have different income and willingness to pay. The model uses Beta
    distributions to represent agent parameters, which are adjusted based on arbitrage
    opportunities. It accounts for both short-term (herding) and long-term (arbitrage)
    feedbacks in the market. The model is applicable to long time horizons.
  13: The analysis involves calculating the costs and benefits of nourishment plans
    over a 30-year time horizon using models that account for beach width and property
    tax adjustments.
More Notes:
  1: High real estate prices and demographic trends towards high-income owners in
    coastal areas seem paradoxical given the risks.
  2: The paper discusses the importance of modeling coupled human-natural systems
    to understand the interaction between real estate markets and the physical coastal
    system over a long time horizon.
  4: Justifications for the scenarios are in the Supplemental Materials. Fluctuations
    are more pronounced in oceanfront property values because beach width has more
    effect on property value for oceanfront homes.
  8: The paper discusses policy implications such as the potential for managed retreat
    or buyouts with rentbacks as strategies for adaptation to climate changes impacting
    coastal property values.
  12: The model assumes fixed risk from oceanfront property. Agent parameter distributions
    (income, willingness to pay, risk tolerance, beach width scaling parameter) are
    adjusted based on outside market conditions.
Quantitative material:
  2: Fig. 1 shows quality-adjusted baseline housing values for coastal and inland
    counties in the United States between 2000 and 2015. The hedonic regression was
    run in Stata/SE 18.0 using 23,184,659 observations of property sales in the United
    States between 1989 and 2016.
  3: Model explores impacts of internal/external dynamics using constant shoreline
    erosion rate, storm probability, and 1 meter of SLR over 100 years. The baseline
    scenario uses 90% beach nourishment subsidies and constant outside markets. Subsequent
    scenarios modify the subsidy and allow for appreciation/depreciation of outside
    market values.
  4: Property values decline modestly when SLR begins. The barrier height relative
    to mean sea level is 1 m for the first 50 years and 0 m by year 150. Beach nourishment
    is subsidized at 90% of the cost.
  6: The quantitative information includes percent change in property value, change
    in beach width, change in marginal income tax rate, and change in the share of
    housing owned by investors.
  7: Model simulations show declines in property value, beach width, and investor
    share of housing after SLR begins. Outside markets declining to 10% of initial
    levels after 50 years leads to plummeting property values and increasing risk.
    The model shows how these effects vary for oceanfront vs non-oceanfront properties.
  11: Equations detail the state of beach width and mean sea level as linear functions
    of time, with specific parameters for oceanfront and non-oceanfront properties,
    as well as risk assessment formulas.
  12: 'Equations are provided for: risk from SLR (r_SLt), adjustment of agent parameters
    (At) based on arbitrage opportunities, switching speed between positive and negative
    feedback loops (Wt), and adjustments to upper limits of willingness to pay (WTPbase,U)
    and beach width scaling parameter (alpha_U) based on outside markets.'
  13: Quantitative information on nourishment costs, tax adjustments, and property
    value changes are considered.
sourcematerial:
  1: 'Source material here.

    Evaluation overview: "the long-term evolution of coastal real estate markets"
    and "a policy tradeoff between slowing demographic transitions in coastal communities
    and allowing property markets to adjust smoothly to risks from climate change."

    Drivers of Risk: "Despite increasing risks from sea-level rise (SLR) and storms,
    US coastal communities continue to attract relatively high-income residents, and
    coastal property values continue to rise."

    Methodology: "we develop the Coastal Home Ownership Model (C-HOM) and analyze
    the long-term evolution of coastal real estate markets. C-HOM incorporates changing
    physical attributes of the coast, economic values of these attributes, and dynamic
    risks associated with storms and flooding."

    Highlights: "subsidies for coastal management, such as beach nourishment, tax
    advantages for high-income property owners, and stable or increasing property
    values outside the coastal zone all dampen the effects of SLR on coastal property
    values. The effects, however, are temporary and only delay precipitous declines
    as total inundation approaches. By removing subsidies, prices would more accurately
    reflect risks from SLR but also trigger more coastal gentrification, as relatively
    high-income owners enter the market and self-finance nourishment."

    More Notes: "Growing risks in coastal areas and high real estate prices seem paradoxical.
    If inundation is inevitable in the long run, why do high prices for coastal real
    estate persist with a demographic trend toward high-income owners?"

    '
  2: "\n\"Coastal and inland property values.\" \"beach erosion, storm risk, the effects\
    \ of beach width on property value...increased frequency and intensity of storms\
    \ as well as impacts from SLR, which can intensify surge-related \uFB02ood risk,\
    \ increase erodibility of the shoreline, increase the frequency of sunny-day \uFB02\
    ooding, threaten groundwater.\" \"Fig. 1 | Coastal and inland property values.\
    \ Quality-adjusted baseline housing values are re\uFB02 ected in estimated county-year\
    \ \uFB01 xed effects for coastal (blue) and inland (black) counties in the United\
    \ States...using 23,184,659 observa- tions of property sales in the United States\
    \ between 1989 and 2016. The \uFB01 rst-stage hedonic regression was run in Stata/SE\
    \ 18.0.\" \"...model is needed that links real estate markets, coastal amenities,\
    \ coastal hazards, and poli- cies that respond to coastal change...modeling nonlinear\
    \ feedbacks between physical processes and human responses across space and time.\"\
    \ \"Here, we show that subsidies for coastal management, such as beach nourishment,\
    \ tax advantages for high-income property owners, and stable or increasing property\
    \ values outside the coastal zone all dampen the impacts of SLR on coastal property\
    \ markets. The effects are transitory and only delay precipitous price declines\
    \ as total inundation approaches...incorporating relatively simple models of human\
    \ behavior with a detailed geophysical model of coastal evolution and coupling\
    \ simpli\uFB01 ed dynamics of coastal change with detailed economic decision-\
    \ making33,34 can generate new insights and emergent patterns in the coupled system35.\"\
    \ \"To understand the mechanisms driving these empirical phe- nomena and what\
    \ to expect in coastal communities as SLR progresses, it is necessary to model\
    \ how real estate markets interact with the physical coastal system over a long\
    \ time horizon.\"\n"
  3: "  \nWe study the evolution of coastal real estate markets, incomes of residents,\
    \ and shoreline management decisions in response to SLR over a 150-year time horizon\
    \ by developing the Coastal Home Ownership Model (C-HOM). \n\nThe model also considers\
    \ exogenous forces that in\uFB02uence internal dynamics, including SLR, storm\
    \ risk, and the in\uFB02uence of competing property markets...\n\nResults...the\
    \ physical environment has a constant rate of shoreline erosion, constant storm\
    \ probability, and one meter of SLR over a 100-year period...In the baseline scenario,\
    \ 90% of beach nourishment costs are subsidized, and outside markets are held\
    \ constant...In the final scenario, nourishment is subsidized at 90%; outside\
    \ property markets remain constant 50 years after the onset of SLR, but outside\
    \ values depreciate over the subsequent 50-year period...\n\nThe 150-year simulation\
    \ length allows us to consider longer horizons than a typical 30-year mortgage;\
    \ run the model for 50 years without SLR as an initial period to understand internal\
    \ mechanisms in the model...\n\nThe model probes previously unanswered questions.\
    \ What mechanisms allow a coastal community to delay the inevitable collapse of\
    \ a coastal real estate market?...\n"
  4: "When SLR begins in year 50, property values decline modestly, and socioeconomic\
    \ characteristics of the community change. A substantial decline in property value\
    \ does not occur immediately, taking decades past the onset of SLR to manifest...High-income\
    \ agents have higher bid prices relative to institutional investors... Eventually,\
    \ as property values begin to decline more substantially, the investor market\
    \ share declines to zero (Fig. 3c). This crowds out investors and lower income\
    \ renters...Indeed, property values decline immediately if relatively high-income\
    \ agents are not allowed to enter... Outcomes include property value (a), beach\
    \ width (b), share of housing owned by investors (c), expected rate of return\
    \ on coastal real estate (d), marginal income tax rate of property owners (e),\
    \ and risk premium for coastal real estate (f)...SLR begins at year 50 and rises\
    \ 1 m over the remaining 100 years. Beach nourishment is subsidized at 90% of\
    \ the cost...initial barrier height, i.e. elevation of the barrier island, relative\
    \ to sea level is 1 m for the \uFB01rst 50 years. SLR begins at year 50 and rises\
    \ 1 m over the remaining 100 years...The baseline case assumes that SLR begins\
    \ at t = 50 ... and agent \uFB02 ux is turned on...model simulation outcomes for\
    \ oceanfront properties (blue), non-oceanfront properties (orange)...justi\uFB01\
    \ cations for the scenarios are in the Supplemental Materials...Fluctuations are\
    \ more pronounced in oceanfront property values because beach width has more effect\
    \ on property value for oceanfront homes."
  6: 'Source material here.

    The page provides an overview of property value changes, beach width changes,
    income tax rate differences, and investor market share changes as outcomes. Results
    displayed are model simulation differences between the baseline model and the
    scenario where outside markets appreciate. Important outcomes include percent
    change in property value (a), change in beach width (b), change in marginal income
    tax rate of property owners (c), and change in the share of housing owned by investors
    (d). The shocks impacting outcomes include rising outside markets and the onset
    of SLR after 50 years. SLR begins at t = 50. Quantitative information includes
    percent change in property value, change in beach width, change in marginal income
    tax rate, and change in the share of housing owned by investors. The analysis
    involves a model simulation comparing a baseline scenario to one with rising outside
    markets and SLR onset, simulating changes over 100 years. In this case, rising
    outside markets initially contribute to higher prices despite SLR. Key outcomes
    include coastal real estate prices remaining above baseline 100 years after SLR
    onset, a delayed effect on beach width, higher-income owners driving out investors
    quickly, and nourishment frequency changes as housing prices rise along with the
    associated value of beach width.

    '
  7: "  \nSource material here. Coastal real estate markets along the US East and\
    \ Gulf Coasts are tightly coupled to the physical environment...the baseline scenario\
    \ with constant outside markets spans the first 50 years after the onset of SLR,\
    \ and then outside markets decline to 10% of their initial levels over the following\
    \ 50 years...Depicts outcomes for oceanfront properties (blue), non-oceanfront\
    \ properties (orange), beach width (solid black), and expected beach width (dashed\
    \ black)... Eventually (after roughly 30 years), relatively high-income owners\
    \ leave the market, investors buy all of the real estate, and rent it to lower-income\
    \ occupants... SLR drives local real estate market responses and demographic changes...\
    \ We include all of these model features and add how SLR drives local real estate\
    \ market responses and demographic changes... When outside markets decline, however,\
    \ expected returns and property values plummet sharply and risk continues to increase.\
    \ This occurs despite continued nourishment and maintenance... In the present\
    \ and near future, coastal communities attract wealthier residents despite growing\
    \ risks from climate change... This demographic shift can be thought of as a form\
    \ of coastal gentrification... \n"
  8: "Source material here. We speci\uFB01 cally highlight three mechanisms that contribute\
    \ to the persistence of high property values in coastal areas vulnerable to SLR.\
    \ By modeling the coupled human-natural system, C-HOM provides a foundation for\
    \ comparing business-as-usual with potentially more ef\uFB01 cient approaches\
    \ to coastal management and the equity implications of different policy approaches.\
    \ Third, policies that arti\uFB01 cially increase the value of property (e.g.,\
    \ a beach nourishment subsidy) delay the downward adjustment of prices in response\
    \ to SLR. For example, managed retreat aims to smooth the transition to uninhabitable\
    \ more deliberately50,51. On a speci\uFB01 c approach worthy of further investigation\
    \ is buyouts with rentbacks, which potentially maintains community composition\
    \ without in\uFB02 ating property values and without encouraging further development\
    \ in vulnerable coastal areas52."
  9: 'The analysis uses an asset-price model and agent-based modeling to evaluate
    coastal real estate dynamics impacted by climate change, incorporating factors
    like housing services, opportunity cost, climate risks, and amenities: "First,
    we adopt an asset-price approach...By linking housing purchases to the flow of
    coastal amenities and risks, the user-cost approach introduces dynamics that result
    from different incentives faced by owners, institutional investors, and renters...Second,
    we model feedbacks in the coupled human-natural coastal system...Third, we use
    agent-based modeling to capture nonlinearities and heterogeneity in the coupled
    human-natural system."


    Coastal housing markets are influenced by public investments in adaptation and
    risk mitigation, which capitalize into real estate prices and can create bubbles
    when subsidies are involved: "Fifth, C-HOM reflects findings that public investments
    in adaptation and risk mitigation capitalize into real estate prices...Federal
    subsidies for beach nourishment can even create a bubble in coastal real estate
    markets such that removing subsidies would substantially decrease coastal property
    values."


    Changes in the physical environment, such as erosion, sea level rise, storms,
    and alterations in risk and values of coastal real estate, serve as drivers of
    risk: "Second, we model feedbacks in the coupled human-natural coastal system...Specifically,
    the physical environment changes with erosion, SLR, and storms. These changes
    affect risks and values of coastal real estate."'
  10: "yaml\nMethodology: \"In order to simulate coastal housing markets confronted\
    \ with climate change, C-HOM decomposes the numerator and denominator in Eq. (1)\
    \ and endogenizes a subset of the individual pieces.\"\nDrivers of Risk: \"In\
    \ order to simulate coastal housing markets confronted with climate change, C-HOM\
    \ decomposes the numerator and denominator in Eq. (1) and endogenizes a subset\
    \ of the individual pieces.\"\nMethodology: \"The model includes a fixed supply\
    \ of housing, a pool of agents generating bid prices for housing, and an investor\
    \ agent determining market equilibrium.\"\nMethodology: \"Equation (3) is the\
    \ basis for C-HOM. The model consists of a \uFB01xed number of properties (i.e.,\
    \ the supply of housing is \uFB01xed), a pool of agents who generate bid prices\
    \ for one unit of housing based on Eq. (3), and an investor agent who can purchase\
    \ multiple units of housing based on the current schedule of agent bid prices\
    \ and an investor user cost equation similar to Eq. (3).\"\nMethodology: \"We\
    \ adapted the user cost of housing model for a household in Eq. (3) to simulate\
    \ a coastal property market comprised of a population of agents seeking to reside\
    \ at the coast as either a resident renter or resident owner.\"\n"
