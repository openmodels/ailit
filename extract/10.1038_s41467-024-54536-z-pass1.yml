Drivers of Risk:
  1: Environmental impacts such as climate change, biodiversity loss, and nitrogen
    pollution associated with agricultural expansion and intensification.
  2: Cover crop implementation competing for soil moisture and nutrients; stimulating
    nitrous oxide (N2O) and methane (CH4) emissions.
  3: The application of CCs can lead to increased N2O emissions due to residue decomposition,
    which is influenced by nitrogen dynamics in soil.
  4: Climate zones like arid regions and soil factors such as texture, fertility,
    and pH affect the outcomes of CC interventions.
  5: Climate change (CC) effects; agricultural managements (organic fertilizer application,
    tillage, irrigation); soil texture (clay content); soil bulk density; soil initial
    SOC concentration and pH.
  6: Climate factors such as water availability (precipitation and evapotranspiration)
    influence AMS by controlling soil conditions and are crucial in uplands and paddies.
  7: Agricultural management practices (N rate, organic fertilizer, tillage, irrigation),
    climate (MAT, MAP, Aridity index), soil characteristics (BD, Sand, Clay, Initial
    SOC, C:N, pH), and microbe characteristics (soil biodiversity, microbial biomass,
    F/B ratio) influence agroecosystem multiservices in upland and paddy systems.
  8: The analysis considers the impact of climate change practices on crop yields
    and soil health, noting regional inequalities related to climate, soil types,
    and socio-economic conditions.
  9: Climate change, socio-economic factors, and duration of CC implementation are
    identified as influencing factors impacting agricultural sustainability.
  12: No relevant information
Evaluation overview:
  1: The paper evaluates the benefits of optimized cover crop practices for global
    agroecosystems, focusing on improvements in crop yields, soil carbon storage,
    and stability, with an emphasis on environmental sustainability.
  2: Effects of cover crop (CC) practices on agroecosystem services, focusing on food
    supply, C storage, climate mitigation, and soil stabilization (measured by mean
    weight diameter of soil aggregation, MWD).
  3: The paper evaluates the effects of cover crops (CCs) on agroecosystem services
    such as crop yield, SOC stock, N2O emissions, CH4 emissions, and MWD (mean weight
    diameter).
  4: The paper evaluates the impact of cover crops (CC) on various environmental and
    agricultural factors like crop yields, soil organic carbon (SOC) stock, nitrous
    oxide (N2O) emissions, and methane (CH4) emissions.
  5: Agroecosystem services (yield, SOC stock, N2O, CH4, MWD)
  6: Assessing the impact of different cover crop (CC) practices and their interactions
    with environmental factors on agroecosystem multi-services (AMS), including yields
    and greenhouse gas (GHG) emissions.
  7: Agroecosystem multiservices, including crop yield, soil organic carbon (SOC)
    stock, methane (CH4) emissions, nitrous oxide (N2O) emissions, and mean weight
    diameter (MWD) of soil aggregates.
  8: The page provides an overview of changes in agroecosystem multiservices on a
    global scale, highlighting changes over time and under different SSP scenarios.
  9: The paper evaluates the benefits and impacts of cover crop (CC) practices on
    agricultural sustainability, carbon sequestration, and soil management.
  10: The study evaluates the effects of cover crops (CC) on agroecosystem services,
    specifically focusing on soil organic carbon (SOC) stocks and root biomass.
  12: No relevant information
Highlights:
  1: Optimized cover crop practices can mitigate climate-related yield losses and
    contribute to climate neutrality and soil stabilization, particularly in harsh
    and underdeveloped areas.
  2: Cover crops can promote soil C storage, erosion control, and subsequent crop
    yields. However, N2O and CH4 emissions are also greatly stimulated.
  3: "Long-term CC rotation (\u22655 years) has the potential to mitigate additional\
    \ N2O emissions without sacrificing crop yields and enhance soil stability and\
    \ C storage, potentially acting as net sinks of GHGs."
  4: Soil biodiversity is identified as the critical determinant for CC effects; arid
    regions show the largest yield increase; CC enhances water retention.
  5: Climate-smart agricultural practices like organic fertilizer, conservation tillage,
    and appropriate irrigation can mitigate the negative impacts of climate change
    on agroecosystem services. Soil texture and initial conditions play a significant
    role in determining the effectiveness of these practices. Long-term implementation
    of cover crops enhances soil stabilization and erosion control.
  6: Optimizing CC practices, such as mulching CC residues and adopting intermittent
    irrigation, can lead to improved soil fertility, increased crop yields, reduced
    N2O and CH4 emissions, and enhanced AMS.
  7: Climate-smart practices impact agroecosystem multiservices differently in upland
    and paddy systems. The analysis identifies key drivers and their relative importance
    in influencing these services using SEM.
  8: CC practices are expected to improve crop yields and soil health, especially
    in paddy fields across Southeast Asia, while also posing risks in North America
    and Europe due to reduced MWD and modest yield gains.
  9: Long-term CC practices enhance soil carbon sequestration, reduce N2O emissions,
    improve farm yield resilience, and offer sustainable benefits for agroecosystems.
  10: The study finds no publication bias in all target variables, supporting the
    robustness of conclusions regarding the effects of CCs.
  12: No relevant information
Methodology:
  1: The analysis uses meta-analytic and data-driven quantifications of 2302 observations
    to optimize cover crop practices.
  2: Meta-analytic techniques, additional long-term field data on soil health, simulations
    from the Agricultural Production Systems sIMulator (APSIM), and a machine-learning
    approach.
  3: Effect sizes (lnRRs) are used to determine the impact of various CC characteristics,
    including type, residue management, and duration on agroecosystem services.
  4: A meta-forest approach is used to analyze the interaction between CC practices
    and environmental management factors.
  5: Meta-analysis of the effects of climate change and agricultural management practices
    on agroecosystem services. Applicability dependent on specific soil conditions,
    climate, and management practices.
  6: The analysis employs structural equation modeling (SEM) to determine the influence
    of climate and soil variables on AMS.
  7: The analysis uses structural equation modeling (SEM) to assess associations among
    climate-smart (CC) effects on five agroecosystem services in upland and paddy
    systems. The study includes 2049 data points for upland and 253 for paddy. Network
    analysis is used to determine the strengths of individual services and their drivers.
  9: The paper conducts a meta-analysis and modeling assessments using five services
    related to food supply, carbon storage, climate mitigation, and soil stabilization.
  10: The analysis involves a meta-analysis using data from 218 studies following
    the PRISMA methodology, with effect sizes calculated using the R package metafor.
    The study includes a compilation of 2302 field observations.
  12: No relevant information
More Notes:
  2: The study aims to optimize cover crop practices to achieve both food security
    and environment-friendly services, considering trade-offs and synergies among
    different agroecosystem services.
  7: Fisher's C, P-values, and AIC values are reported for agroecosystem multiservices.
    The total effect is the sum of standardized direct and indirect effects. Red and
    blue pathways refer to negative and positive effects.
  12: No relevant information
Quantitative material:
  1: Projected annual gains include 97.7 million metric tons in crop production, 21.7
    billion metric tons in carbon dioxide sequestration, and 2.41 billion metric tons
    in soil erosion reduction.
  2: CCs significantly increase yields by 2.33% and SOC stocks by 6.46%, alongside
    an enhancement of 14.3% in MWD. N2O emissions are also greatly stimulated by 29.5%
    and CH4 emissions by 42.3%.
  3: 'The paper reports percentage changes in agroecosystem services with specific
    data: 29.5% increase in SOC stock, 42.3% increase in N2O emissions, 14.3% increase
    in MWD, 6.46% increase in CH4 emissions, and 2.33% increase in yield.'
  4: Effects of CC practices on yield, SOC stock, N2O, CH4, and mean weight diameter
    (MWD) are quantified in percentage changes.
  5: CC effect on yield (%), CC effect on SOCstock (%), CC effect on N2O (%), CC effect
    on CH4 (%), CC effect on MWD (%), Interactive effects of CCs and three climate-smart
    managements (%). Yield gain of 7.86% in sandy soils. MWD increases by 61.1% with
    CCs
  6: Cover crops are anticipated to enhance AMS by 1.67% in uplands and experience
    no significant promotion in rice paddies due to high CH4 influence.
  7: The study quantifies the changes of agroecosystem multiservices (%) under climate-smart
    (CC) practices, providing confidence intervals for significant and non-significant
    changes. Standardized path coefficients from structural equation modeling (SEM)
    are provided, along with marginal and conditional R-squared values (R 2Marginal,
    R 2Conditional) indicating the explained proportion of variance. Standardized
    total effects from SEM for environmental and management factors are also presented.
  8: Quantitative data includes changes in agroecosystem multiservices (%) between
    2091-2100 and current (2020) under SSP126 and SSP370 scenarios.
  9: Paddy fields show a higher proportion of synergies (69.7%) compared to uplands
    (64.9%). Crop yields increase by 3.22% and topsoil carbon stocks by 0.87% per
    year through global application of CC practices.
  10: Effect sizes of CCs on agroecosystem services are quantified using the natural
    log response ratio (lnRR) and presented with 95% confidence intervals using mixed-effects
    models.
  12: No relevant information
sourcematerial:
  1: " \n\"The practice of cover crops has gained popularity as a strategy to improve\
    \ agricultural sustainability, but its full potential is often limited by environmental\
    \ trade-offs... Cover crops have historically boosted crop yields, soil carbon\
    \ storage, and stability... A biculture of legume and non-legume cover crops,\
    \ terminated 25 days before planting the next crop and followed by residue mulching,\
    \ is the optimal portfolio... increase agroecosystem multiservices by 1.25%, equivalent\
    \ to annual gains of 97.7 million metric tons in crop production, 21.7 billion\
    \ metric tons in carbon dioxide sequestration, and 2.41 billion metric tons in\
    \ soil erosion reduction... By 2100, the continued implementation of optimized\
    \ practices could mitigate climate-related yield losses and contribute to climate\
    \ neutrality and soil stabilization, especially in harsh and underdeveloped areas...\
    \ the globally unprecedented cropland expansion and agricultural intensification\
    \ have caused a myriad of negative environmental impacts, such as climate change,\
    \ biodiversity loss, and nitrogen (N) pollution.\"\n"
  2: "Source material: Here, we conducted a preliminary examination of the critical\
    \ effects of CC practices on agroecosystem services using meta-analytic techniques,\
    \ with a primary focus on food supply, C storage, climate mitigation, and soil\
    \ stabilization (as measured by the mean weight diameter of soil aggregation,\
    \ MWD). Implementation may interfere with the yield of subsequent crops by competing\
    \ for soil moisture and nutrients, and stimulate nitrous oxide (N2O) and methane\
    \ (CH4) emissions through activated microbial metabolism, leading to an uncertain\
    \ greenhouse gas (GHG) budget. Overall, CCs significantly increase yields by 2.33%\
    \ and SOC stocks by 6.46%, alongside an enhancement of 14.3% in MWD, illuminating\
    \ their notable effectiveness in promoting soil C storage, erosion control, and\
    \ subsequent crop yields. Nevertheless, N2O and CH4 emissions are also greatly\
    \ stimulated by 29.5% and 42.3%, respectively. The optimization of CC portfolio\
    \ was complemented by additional long-term field data on soil health and simulations\
    \ from the Agricultural Production Systems sIMulator (APSIM). We further introduced\
    \ an \u201Cagroecosystem multiservices\u201D index to offer a holistic evaluation\
    \ of the capability of CCs to simultaneously provide multiple benefits. Finally,\
    \ we employed a machine-learning approach. These variable outcomes highlight the\
    \ need to optimize CC practices to achieve both food security and environment-friendly\
    \ services. Given the critical need for synergistic agroecosystem services, it\
    \ becomes imperative to globally explore and implement the most effective CC practices,\
    \ leveraging ubiquitous data and emerging methodologies."
  3: "Source material: \"Effect of CCs on agroecosystem services and its dependence\
    \ on practice characteristics. a Overall effects of CCs on five agroecosystem\
    \ services (yield, SOC stock, N2O, CH4, and MWD). Dots represent the independent\
    \ effect sizes (lnRRs) of individual observations and their 95% confidence intervals.\
    \ Diamonds and figures above them denote the weighted effect sizes and the corresponding\
    \ changes of agroecosystem services (%), respectively. *P < 0.05 and ***P <0.001.\
    \ b Control of CC practice characteristics including CC type, residue management,\
    \ and duration. ... Our findings indicate a context-dependent response of N2O\
    \ emissions to CCs, which can be attributed to the disproportionate contribution\
    \ of nitrite and ammonium (primary products of CC residue decomposition)... encouragingly,\
    \ the implementation of long-term CC rotation (\u2265 5 years) has shown potential\
    \ to mitigate additional N2O emissions without sacrificing crop yields.\" "
  4: "text\n\"Varied CC effects among environments with different biophysical properties\
    \ according to the classi\uFB01 cations of cropland type, climate zone, soil texture,\
    \ soil fertility, and pH...MWD, mean weight diameter.\";\"classi\uFB01 cations\
    \ of cropland type, climate zone, soil texture, soil fertility, and pH.\";\"CC\
    \ effect on yield (%), CC effect on SOCstock (%), CC effect on N2O (%), CC effect\
    \ on CH4 (%), CC effect on MWD (%)\";\"We adopted a meta-forest (MF) approach\
    \ to capture the complex interactions of CC practices with environmental and management\
    \ factors\";\"soil biodiversity is identi\uFB01 ed as the most critical determinant\
    \ of the CC effect\"; \"climate, with arid regions experiencing the largest yield\
    \ increase\"; \"capacity of CCs to enhance soil water retention\"\n"
  5: "Fig. 4 | CC effects determined by agricultural managements and their interactions.\
    \ a\u2012 e Control of CC effects by diverse agricultural managements, including\
    \ organic fertilizer application, tillage, and irrigation. Dots represent the\
    \ overall effect sizes and their 95% confidence intervals. Solid and empty dots\
    \ indicate significant and non-significant changes, respectively. Figures on the\
    \ right side refer to the number of observations. f Interactive effects of CCs\
    \ and three climate-smart moderators are initial SOC concentration and pH (Supplementary\
    \ Fig. 6b), with their interactive effects varying across different soil depths\
    \ (P < 0.001; Supplementary Table 1). This depth-dependent control limits C storage\
    \ in surface and mid soil layers (Supplementary Fig. 4), probably due to microbial\
    \ and enzymatic reactions sensitive to C concentration or pH. For instance, glucosaminidase\
    \ and polyphenol oxidase activities were reported to correlate negatively with\
    \ subsoil C stocks. The greater, long-term stimulation of cellulase activity by\
    \ CCs in surface and midsoil layers than in the topsoil (0 \u2012 10 cm) supports\
    \ this point (Supplementary Fig. 7a,b). Soil texture, particularly clay content,\
    \ dictates the CC effects on yields and SOC stocks as well. The negative relationship\
    \ between SOC change and clay content (P < 0.001) suggests a heightened C sequestration\
    \ potential and thus a notable yield gain of 7.86% in sandy soils. This relationship\
    \ also appears in SOC fractions, that is, their higher improvements occur in the\
    \ soil texture with less clay and SOC, but not in the finest clay soils, especially\
    \ for mineral-associated organic C. Similarly, the positive relationship between\
    \ yield gains and soil bulk density reveals that CCs can favor crop growth in\
    \ highly compacted soils by fostering root penetration. In humid tropical climates,\
    \ CCs can significantly increase MWD by 61.1%, reinforcing their role in mitigating\
    \ soil hydraulic erosion, largely through the contribution of high fungal-to-bacterial\
    \ ratios. The dominance of fungi in these systems leads to the substantial production\
    \ of glomalin and other extracellular polysaccharides, as well as the formation\
    \ of extensive hyphal networks, which physically bind soil particles into macroaggregates.\
    \ This also highlights the supplementary benefits of CC residues beyond biomass\
    \ input, as they act as organic binding agents that promote soil aggregation and\
    \ erosion control. More importantly, the duration of CC implementation emerges\
    \ as the primary factor for enhancing MWD, with long-term application leading\
    \ to sustained soil stabilization and erosion control (P < 0.001). These insights\
    \ demonstrate the higher benefits of CC practices into harsher environments and\
    \ spotlight the intrinsic role of manipulating functional microbiota to strengthen\
    \ the synergies among agroecosystem services in a changing environment."
  6: "Source material here.\n\nEvaluation overview: \"CCs are anticipated to enhance\
    \ agroecosystem multi-services (AMS) by 1.67% in uplands (Fig. 5c)... climate-smart\
    \ management practices, including reducing N fertilizer rate, organic amendments,\
    \ and mulching CC residues, has a definitely positive effect on AMS (Supplementary\
    \ Table 2).\"\n\nDrivers of Risk: \"Structural equation modelling (SEM) show that\
    \ climate is the dominant factor influencing AMS indirectly and directly in uplands\
    \ and paddies, respectively (Fig. 5e\u2012h), mainly by controlling water availability\
    \ (precipitation and evapotranspiration; Supplementary Table 2).\"\n\nQuantitative\
    \ material: \"Owing to the positive effects on food supply, C storage, and soil\
    \ stabilization, CCs are anticipated to enhance agroecosystem multi-services (AMS)\
    \ by 1.67% in uplands (Fig. 5c) ... A life cycle assessment also revealed ...\
    \ reduction and energy savings by 51.7%.\"\n\nMethodology: \"Structural equation\
    \ modelling (SEM) show that climate is the dominant factor influencing AMS indirectly\
    \ and directly in uplands and paddies, respectively (Fig. 5e\u2012h).\"\n\nHighlights:\
    \ \"the co-implementation of CCs and intermittent irrigation facilitates both\
    \ rice production and climate mitigation, chiefly through alleviated soil N limitation\
    \ and improved aeration by drainage.\"\n"
  7: " \n\"Associations among CC effects on five agroecosystem services with their\
    \ strengths from network analysis in upland (a) and paddy (b). Red and blue edges\
    \ indicate negative and positive cor-relations, and edge width is proportional\
    \ to correlation coefficient.\" \n\n\"Climate Agricultural management (N rate,\
    \ Organic fertilizer, Tillage, Irrigation) CC practice characteristics (Type,\
    \ Residue management, Diversity, Duration, Growth days, Termination time).\"\n\
    \ \n\"The conditional and marginal R2 indicate the explained proportion of variance\
    \ without and with random effects of 'study', respectively.\"\n\n\"Standardized\
    \ total effect from SEM. Dots represent the bootstrapped strengths of individual\
    \ services and their 95% confidence intervals.\"\n\n\"Direct and indirect effects\
    \ of environmental and management factors on agroecosystem multiservices.\"\n\n\
    \"Red and blue pathways refer to negative and positive effects at a significant\
    \ level (P < 0.05), with figures on them representing the standardized path coefficients\
    \ from structural equation modelling (SEM).\"\n\n\"Quanti\uFB01 cation of the\
    \ changes of agroecosystem multiservices (%) under CC practices. Red and gray\
    \ dots indicate significant and non-significant changes alongside with their 95%\
    \ con\uFB01 dence intervals, respectively.\"\n\n\"n = 2049 and 253 data points\
    \ for upland and paddy, respectively.\"\n\n\"Fisher's C = 1.60, P = 0.45, df =\
    \ 2, AIC = 41.60 for upland multiservices.\"\n"
  8: "Source material: Maps of CC effects on agroecosystem multiservices (%) for upland\
    \ (a) and paddy (b). g, h Changes of CC effects on agroecosystem multiservices\
    \ (%) between 2091\u2012 2100 and current (2020) under SSP126. j, k Changes of\
    \ CC effects on agroecosystem multiservices (%) between 2091\u2012 2100 and current\
    \ (2020) under SSP370. Such regional inequality is related to the different climate,\
    \ soil types, cropping systems, and even socio-economic conditions29,52, but in\
    \ general, CC practices offer potential to narrow it by delivering greater bene\uFB01\
    \ ts to those countries with low crop production and high population density53.\
    \ Implementation of CC practices is expected to signi\uFB01 cantly improve crop\
    \ yields and soil health in paddy \uFB01 elds across Southeast Asia (Fig. 6a).\
    \ However, CC implementation also carries risks caused by reduced MWD and modest\
    \ yield gains in North America, Europe, and temperate West Asia (Supplementary\
    \ Figs. 14, 15)."
  9: "Source material: Climate change impacts on AMS vary among cropland types and\
    \ emission scenarios, but the larger positive changes always exist in warmer regions,\
    \ even under the mid-high climate emission scenario of Shared Socioeconomic Pathway\
    \ 370. To surmount this obstacle and achieve the common SDGs, international assistance\
    \ and incentive policies (e.g., N Credit System and Green Manure Planting Program)\
    \ are urgently needed. Paddy fields show a higher proportion of synergies compared\
    \ to uplands (69.7% vs. 64.9%), likely due to their larger background C stocks\
    \ and actual returns in mitigating NGHG. In this study, five services related\
    \ to food supply, C storage, climate mitigation, and soil stabilization have been\
    \ applied to assess CC effects. In line with our meta-analysis, long-term CC practices\
    \ (\u2265 5 years) will further increase SOC stocks, reduce N2O emissions, and\
    \ greatly enhance MWD without yield penalty."
  10: "Source material here.\nEvaluation overview: \"The natural log response ratio\
    \ (lnRR) was calculated to quantify the effect sizes of CCs on agroecosystem services.\"\
    \nQuantitative material: \"The natural log response ratio (lnRR) was calculated\
    \ to quantify the effect sizes of CCs on agroecosystem services: lnRR = ln(Xt/Xc),\
    \ where Xt and Xc are the mean values of CC treatment and control groups, respectively.\"\
    \nMethodology: \"Finally, 218 studies from 241 publications were included. These\
    \ screening procedures follow the PRISMA methodology (Supplementary Fig. 26)...\
    \ Based on the above steps, we eventually compiled a big dataset of 2302 field\
    \ observations for meta-analysis and scaling up (Supplementary Data 1).\"\nHighlights:\
    \ \"Moreover, we examined the presence or absence of publication bias using the\
    \ funnel plots combined with Egger\u2019s regressions (Supplementary Fig. 28).\
    \ Desirably, no publication bias was found in all target variables, which supports\
    \ the robustness of subsequent conclusions.\"\n"
