sourcematerial:
  1: "Source material\nAs climatic changes occur, these benefits or ecosystem services\
    \ may be significantly reduced. This article is part of a Special Issue on \u201C\
    National Indicators of Climate Changes, Impacts, and Vulnerabilitys\u201D edited\
    \ by Anthony C. Janetos and Melissa A. Kenney.\n"
  2: 'Source material here.

    - For "Evaluation overview": "Tracking the impacts via indicators will be essential
    to ensure long-term health of the marine environment and sustain the benefits
    to stakeholders who depend on marine ecosystem services."

    - For "Drivers of Risk": "The effects of climate-related changes such as ocean
    warming, deoxygenation, acidification, coastal flooding, droughts, rising seas,
    and extreme weather can be far-reaching and unpredictable given the complex relationships
    between physical, chemical, biological, and human variables within ocean and coastal
    ecosystems."

    - For "Quantitative material": "The US exclusive economic zone (EEZ) encompasses
    approximately 3.4 million square nautical miles of ocean and a coastline of over
    12,300 miles. Along with the Great Lakes, this vast area generates ~US$370 billion
    of US gross domestic product, $617 billion in sales, and 2.6 million jobs each
    year (NOAA 2019)."

    - For "Methodology": "Here, we discuss a set of indicators designed in close collaboration
    with the U.S. National Climate Indicators System."

    '
  3: This paper describes a system of indicators designed to track changes in US ocean
    and coastal ecosystems that may be correlated with climate change as part of the
    larger NCIS. These pressures occur simultaneously in synergistic, multiplicative,
    or antagonistic ways and result in direct and indirect impacts that are often
    unpredictable across spatial (e.g., ocean basins to local habitats) and temporal
    (e.g., centuries to hours) scales. Indicators are frequently used as decision-support
    tools for monitoring or tracking large-scale systemic changes, particularly when
    the object of interest (e.g., ocean health) cannot be measured directly or completely.
    Unfortunately, indicator systems for oceans and coasts are still nascent in many
    regions. The goal of the NCIS is to create a system of physical, natural, and
    societal indicators that communicate and inform decisions about key aspects of
    the physical climate, climate impacts, vulnerabilities, and preparedness. Its
    primary purpose is to support the sustained US NCA process by providing long-term,
    regularly updated information about key impacts in US systems and sectors, including
    oceans and coasts.
