    Evaluation overview: "Tracking shifts in ecosystem services related to climate
    change and the impact of specific interventions is difficult."

    Drivers of Risk: "For example, human activities resulting in greenhouse gas (GHG)
    emissions influence the global climate system and exert substantial pressures
    on the ocean and coastal environment, including a rise in ocean temperatures."

    Methodology: "The goal of the NCIS is to identify key points along the ecosystem
    services pathway...Therefore, based on this conceptual model, the Team attempted
    to identify representative indicators...The process and decision criteria for
    the NCIS, as well as the scientific integrity and utility aspects, were provided
    by the Indicator Working Group..."

    Highlights: "Thus, climate change may require updating fishery management practices
    as well as initiating activities designed to mitigate and/or adapt to climate
    stressors..."

