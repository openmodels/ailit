    Evaluation overview: "These indicators are designed to be used in conjunction
    with the community social vulnerability indicators to assess the vulnerability
    of communities more broadly."

    Drivers of Risk: "For example, a community with social well-being vulnerabilities
    that is traditionally dependent on climate-vulnerable species may be more affected
    by fishery species range shifts due to climate change (e.g., increasing sea surface
    temperature, ocean acidification)."

    Methodology: "Each of these indicators is composed of a set of indices (see Table
    1) which are themselves created from NMFS landings data, NMFS recreational fishing
    effort data, and/or publicly available US Census data."

    Highlights: "Communities with high social vulnerability, gentrification pressure
    vulnerability, and fishing dependence may be less resilient to the effects of
    climate change."

    More Notes: "The community social well-being indicators identify vulnerable populations
    that may be less able to withstand and recover from climate change and socioeconomic
    impacts."

