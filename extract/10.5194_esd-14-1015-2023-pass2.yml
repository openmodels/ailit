Highlights:
  1: The majority of annual long-term (e.g., 2090) damages are associated with climate
    change impacts to human health, including mortality attributable to climate-driven
    changes in temperature and air pollution (O3 and PM2.5) exposure. The Southeast
    is projected to experience the largest annual damages per capita, and climate
    change impacts may broaden existing societal inequalities, with, for example,
    Black or African Americans being disproportionately affected by additional premature
    mortality from changes in air quality.
  2: FrEDI provides an efficient and transparent damage estimation approach to explore
    a variety of future baseline trajectories or emission reduction policies. The
    framework allows investigation of the potential range of projected long-term annual
    climate change impacts associated with uncertainty in climate model parameters,
    emissions, socioeconomic conditions, and structural uncertainty in select damage
    functions.
  3: A unique feature of using probabilistic projections with a simple climate model
    in this approach is the rich range of uncertainty parameters that can be assessed.
  4: FrEDI provides fast estimation of US climate-driven economic impacts across 20
    sectors.
  5: Adaptation has the potential to both exacerbate and ameliorate future climate-driven
    damages, with amelioration being more common according to FrEDI.
  6: Climate-driven damages are largest for the health category, primarily due to
    premature mortality attributable to climate-driven changes in temperature and
    air quality. Lost labor represents the third largest source of damages in 2090.
  7: Health sector damages are the largest contributor to overall climate-driven damages.
  8: The Southeast is projected to experience the largest annual damages per capita,
    while the Southwest is expected to experience the smallest. Temperature-related
    mortality is the largest impact sector in this study.
  9: Temperature-related mortality damages are the most significant, and overall negative
    impacts of climate change outweigh any potential benefits.
  10: Regional per capita damages vary significantly across the US, with the Northern
    Plains facing the highest damages and the Southwest the lowest. The most affected
    sectors vary by region. Damages per tonne of CO2 are also estimated.
  11: Significant disparities are shown in air quality-related mortality and labor
    impacts across races and socially vulnerable groups.
  12: The work advances the understanding of climate change impacts on the US, highlighting
    significant benefits from greenhouse gas mitigation and identifying regions and
    population groups most affected by climate change.
  14: Key outcomes include significant estimated damages across several sectors, such
    as temperature-related mortality, electricity demand and supply increases, labor
    allocation impacts, and damages from tropical storm winds.
  15: Projects increasing damages across various sectors due to climate change, including
    temperature-related mortality, air quality, coastal property damage (especially
    after 2080 due to sea level rise exceeding 100cm), and agriculture. Total damages
    show a significant overall increase.
  17: Proactive adaptation significantly reduces damages compared to no adaptation
    or reactive adaptation across multiple sectors (Electricity, Rail, Roads, Coastal
    properties, Transportation impacts from high-tide flooding).
  18: Cromar et al. (2022) is used for temperature-related mortality throughout the
    analysis presented in the main text.
  19: The paper extends impact estimates to 2300 using various scaling methods based
    on population, GDP, and sea level rise projections, differing by sector and impact
    type.
  20: Climate-driven impacts are projected to increase across a variety of sectors
    from 2010 to 2090.
  21: Lower discount rates result in higher estimated costs of CO2 emissions, with
    the 1.5% Ramsey scenario showing the highest median cost at $51.
Methodology:
  1: Utilizes the reduced-complexity model, the Framework for Evaluating Damages and
    Impacts (FrEDI), to rapidly project economic and physical impacts of climate change
    across 10000 future scenarios.
  2: Uses the Framework for Evaluating Damages and Impacts (FrEDI) which draws upon
    information from detailed sectoral impact studies to rapidly assess US economic
    and physical impacts of climate change. It uses 10000 probabilistic emissions
    and socioeconomic projections, in combination with temperature projections from
    a simple climate model, as inputs to FrEDI. Results are applicable through the
    end of the 21st century and extends to the year 2300.
  3: "Uses 10000 randomly sampled scenarios of global greenhouse gas emissions, US\
    \ population, and US GDP from the Resources for the Future\u2013Socioeconomic\
    \ Projections (RFF-SPs). Emission trajectories are input to the Finite Amplitude\
    \ Impulse Response (FaIR) model (v1.6.2) to relate emissions to changes in global\
    \ mean surface temperature. The resulting temperature projections, along with\
    \ population and GDP projections, are passed to FrEDI (v3.0) to calculate climate-driven\
    \ damages. Applicable from 2020 to 2300."
  4: Uses FaIR model to calculate global temperature changes and FrEDI to assess sectoral
    impacts.
  5: The net present damages from additional GHG emissions are estimated by comparing
    baseline emissions scenarios with perturbed scenarios, and discounting future
    damages to present value using a 3% social rate of time preference.
  6: "Uses the FrEDI model with 10,000 baseline RFF-SP scenarios (emission, population,\
    \ and GDP trajectories) to calculate damages. Uses Ramsey discounting with \u03C1\
    =0.2% and \u03B7=1.24 to calculate the net present value."
  7: Sectoral damages are sensitive to assumptions in the adaptation scenarios.
  8: The analysis uses the FrEDI framework and RFF-SP projections. The results are
    applicable to the year 2090. The study considers different adaptation options
    in some sectors.
  9: The analysis uses 10,000 projections to account for uncertainty, using a Monte
    Carlo approach to sample climate parameters, and assesses scenarios from RFF-SP.
  10: FrEDI (Framework for Risk and Economic Damage Integration) is used to project
    climate damages. Net present value is calculated as the discounted sum of future
    damages from an emissions pulse in 2020 over the 2020-2300 time period. SSP trajectories
    of emissions, US GDP, and US population are used.
  11: Advanced estimation techniques are used, constrained to the contiguous United
    States, with FrEDI damages compared across different socioeconomic scenarios for
    2090.
  12: The study uses the FrEDI framework to quantify climate damages to the US, based
    on more than a decade of research exploring sectoral impacts within the contiguous
    US.
  15: The analysis uses underlying temperature (or sea level rise) data and binned
    damage functions with sector-specific scalars to project future damages. Slight
    discontinuities in some sectors can occur at temperature bin boundaries or due
    to thresholds in underlying studies.
  17: "The FrEDI model is used, with extrapolation methods applied for temperatures\
    \ above 6\xB0C relative to 1986-2005 and sea level rise above 21st-century trajectory\
    \ bounds."
  18: "FrEDI assumes a linear rate of change in damages equal to the change in damages\
    \ from 5 to 6\u25E6 above the calibration regime."
  19: The methodology involves scaling impacts with population and/or GDP per capita,
    applying year-specific adjustment factors developed from constant population scenarios,
    and using comparisons of with-and-without population growth scenarios. Different
    approaches are used for different sectors.
  20: The analysis uses 10,000 projections from 2100 to 2300; results applicable to
    the period 2010-2090.
  21: The analysis uses constant and Ramsey discounting approaches to calculate net
    present damages for CO2 emissions up to the year 2300.
More Notes:
  1: FrEDI projections are extended through 2300 to estimate the net present climate-driven
    damages within US borders from marginal changes in greenhouse gas emissions. Results
    are for the contiguous United States.
  3: The study uses the SSP2-4.5 scenario for gases and aerosols not included in the
    RFF-SP projections.
  5: FrEDI considers interaction of adaptation costs, increased coastal property values,
    and sea level rise over time in its damage calculations.
  6: Damages are shown in 2020 US dollars. Confidence intervals include uncertainty
    in GDP, population, and climate parameters but do not account for additional sectoral
    parametric or structural uncertainty.  A correction is made to account for the
    relationship between sectoral damages and GDP per capita.
  8: The sectors assessed are independent and additive. The study acknowledges potential
    double counting between temperature-related mortality and air quality impacts
    and compounding effects that are not accounted for. Damages vary by geographical
    region.
  9: The analysis also considers social vulnerability, identifying disproportionate
    impacts on populations like Black or African Americans and Hispanic or Latino
    Americans.
  10: The analysis focuses on direct CONUS impacts. The study explores the sensitivity
    of estimates to discounting assumptions.
  17: The default adaptation assumption in FrEDI is reactive or reasonably anticipated
    adaptation.
  19: The paper distinguishes between morbidity/mortality related to air quality impacts
    and fire suppression response costs within the wildfire sector due to their different
    extension strategies.
  20: Shaded areas in the graphs represent uncertainty or confidence intervals in
    the projections.
Quantitative material:
  1: "Net national damages increase overtime, with mean climate-driven damages estimated\
    \ to reach USD2.9 trillion (95% con\uFB01dence interval (CI): USD510 billion to\
    \ USD12 trillion) annually by 2090. Southeast is projected to experience the largest\
    \ annual damages per capita (mean: USD9300 per person annually; 95%CI: USD1800\u2013\
    USD37000 per person annually), whereas the smallest damages per capita are expected\
    \ in the Southwest (mean: USD6300 per person annually; 95% CI: USD840\u2013USD27000\
    \ per person annually)."
  2: Annual damages in some impact sectors (e.g., labor, temperature-related mortality,
    and coastal property) estimated to range in the hundreds of billions of US dollars
    by the end of the century.
  3: "Average change in global mean surface temperature relative to 1986\u20132005\
    \ is 1.9\xB0C (95% confidence interval: 0.8 to 3.5\xB0C) by 2100 and increases\
    \ to 3.1\xB0C (95% confidence interval: -0.2 to 7.8\xB0C) by 2300"
  4: Mean US GDP per capita growth rate projected at 1.5% by 2100, with 95% CI of
    -0.4% to 4.0%.
  6: 'Net national damages increase over time, reaching USD 2.9 trillion (95% CI:
    USD 510 billion to USD 12 trillion), or ~3% of US GDP, annually by 2090 for a
    subset of total climate impacts.'
  7: Share of US GDP lost to climate damages may increase from around 2.0% in 2020
    to over 3.5% by 2100.
  8: The table provides a range (95% CI) and mean estimate for each impact sector
    in 2090. For example, temperature-related mortality is estimated to cause 19,000-91,000
    premature deaths, with a mean of 50,000 deaths.
  9: Damages in sectors like temperature-related mortality are projected to have a
    median of around 8,000 billion dollars by 2090, with other sectors like air quality
    and transportation impacts ranging up to 600 billion dollars.
  10: Mean per capita annual climate-driven damages in 2090 are presented for seven
    regions, ranging from $6300 in the Southwest to $9900 in the Northern Plains (2020
    USD per person annually). Also mentioned are annual national climate-driven damages
    with context to alternative future storylines up to 2100 and quantification of
    the net present damages within the US resulting from an additional tonne of CO2,
    CH4, or N2O emissions.
  11: Quantitative data include percent increases in risk for socially vulnerable
    groups by 2090 and additional mortality and labor hours lost per race/ethnicity.
  12: 'A box plot chart shows the social cost of carbon dioxide in dollars per ton,
    varying under different discount rates: $15 for 3.0% Ramsey, $21 for 2.5% Ramsey,
    $32 for 2.0% Ramsey, and $51 for 1.5% Ramsey.'
  14: The page provides quantitative estimates of yearly financial impacts in billions
    of 2020 USD for each sector, with mean values and 95% confidence intervals.
  15: Shows timeseries of sectoral damages in billions of 2020 USD across 10000 projections
    through 2100. Total damages in trillions are also provided. Presents annual mean,
    median, and 95% CI for damages.
  17: Table A3 provides annual mean damages (and 95% confidence interval) in 2090
    in billions of 2020 USD for various sectors under different adaptation options
    (No adaptation, Reactive adaptation, Proactive adaptation, Reasonably anticipated
    adaptation, Direct adaptation).
  18: Annual mean (90th % confidence interval) climate-driven damages in 2090 for
    premature mortality from temperature across three separate studies are presented
    in billions of 2020 USD.
  20: Annual damages are in units of billions of 2020 USD (trillions for the total
    panel); x-axis ranges from 2010 to 2090.
  21: Predicted dollar costs per ton of CO2 are presented under different discount
    rate scenarios, ranging from $10 to $78.
sourcematerial:
  1: "Source material here. ``Evidence of the physical and economic impacts of climate\
    \ change is a critical input to policy development and decision-making. In addition\
    \ to the magnitude of potential impacts, detailed estimates of where, when, and\
    \ to whom those damages may occur; the types of impacts that will be most damaging;\
    \ uncertainties in these damages; and the ability of adaptation to reduce potential\
    \ risks are all interconnected and important considerations. This study utilizes\
    \ the reduced-complexity model, the Framework for Evaluating Damages and Impacts\
    \ (FrEDI), to rapidly project economic and physical impacts of climate change\
    \ across 10000 future scenarios for multiple impact sectors, regions, and populations\
    \ within the contiguous United States (US). Results from FrEDI show that net national\
    \ damages increase overtime, with mean climate-driven damages estimated to reach\
    \ USD2.9 trillion (95% con\uFB01dence interval (CI): USD510 billion to USD12 trillion)\
    \ annually by 2090. Detailed FrEDI results show that for the analyzed sectors\
    \ the majority of annual long-term (e.g., 2090) damages are associated with climate\
    \ change impacts to human health, including mortality attributable to climate-driven\
    \ changes in temperature and air pollution (O3 and PM2.5) exposure. Regional results\
    \ also show that annual long-term climate-driven damages vary geographically.\
    \ The Southeast (all regions as defined in Fig.5) is projected toexperience the\
    \ largest annual damages per capita (mean: USD9300 per person annually;95%CI:USD1800\u2013\
    USD37000 per person annually), whereas the smallest damages per capita are expected\
    \ in the Southwest (mean: USD6300 per person annually; 95% CI: USD840\u2013USD27000\
    \ per person annually). Climate change impacts may also broaden existing societal\
    \ inequalities, with, for example, Black or African Americans being disproportionately\
    \ affected by additional premature mortality from changes in air quality. Lastly,\
    \ FrEDI projections are extended through 2300 to estimate the net present climate-driven\
    \ damages within US borders from marginal changes in greenhouse gas emissions.\
    \ Combined, this analysis provides the most detailed illustration to date of the\
    \ distribution of climate change impacts within US borders.''"
  2: " \nEvidence of the physical and economic impacts of climate change is a critical\
    \ input to policy development and decision-making. Information on the potential\
    \ magnitude of climate change damages; where, when, and to whom those damages\
    \ may occur; the types of impacts that will be most damaging; and the potential\
    \ for adaptation to reduce potential risks are all important and interconnected.\
    \ Understanding this rich set of information can help federal decision makers\
    \ identify significant climate risks. Specifically in the US, results of recent\
    \ multi-sector impact analyses show complex patterns of projected climate-driven\
    \ changes across the country, with annual damages in some impact sectors (for\
    \ example, labor, temperature-related mortality, and coastal property) estimated\
    \ to range in the hundreds of billions of US dollars by the end of the century.\
    \ Typically, these resource-intensive, bottom-up impact studies rely on a select\
    \ number of large-scale global emission and warming scenarios. As an alternative\
    \ approach, the Framework for Evaluating Damages and Impacts (FrEDI) draws upon\
    \ information from these detailed sectoral impact studies to rapidly assess US\
    \ economic and physical impacts of climate change within a common framework. FrEDI\
    \ was developed using a transparent process and peer-reviewed methodologies and\
    \ is designed to be a flexible framework that is continually refined to incorporate\
    \ advances in peer-reviewed economic damage functions, including the incorporation\
    \ of new sectors and adaptation options. In this analysis, FrEDI draws upon over\
    \ 30 climate change impact models from peer-reviewed studies to develop relationships\
    \ between mean surface temperature change and climate-driven impacts across 20\
    \ sectors within US borders through the end of the 21st century. FrEDI has the\
    \ flexibility to use any custom warming scenario and couple it with accompanying\
    \ socioeconomic projections. Due to this level of detail and flexibility, FrEDI\
    \ provides an efficient and transparent damage estimation approach to explore\
    \ a variety of future baseline trajectories or emission reduction policies and\
    \ thereby can provide policy-relevant information and complement the types of\
    \ analyses and outputs provided by existing integrated assessment models. Lastly,\
    \ we extend our methodology out to the year 2300 to assess the net present damage\
    \ in the US resulting from an additional tonne of CO2, CH4, or N2O emissions.\
    \ Aggregating net present damages across all sectors and regions within FrEDI\
    \ provides a traceable estimate of the economic damages within US borders from\
    \ a marginal change in greenhouse gas emissions.\n"
  3: " \nEvaluation overview: passed to FrEDI (Fig. 1, Input 2) alongside the paired\
    \ projections of US population and GDP (Fig. 1, Input 1) to model annual long-term\
    \ climate damages across 20 impact sectors, seven CONUS regions, multiple adaptation\
    \ scenarios, and socially vulnerable populations (Fig. 1, Output 2). \nDrivers\
    \ of Risk: Speci\uFB01cally, we use 10000 randomly sampled scenarios of global\
    \ greenhouse gas emissions (CO2, CH4, and N2O)...FrEDI uses a temperature-binning\
    \ approach and data from previously published climate impact studies (Saro\uFB01\
    m et al., 2021) to develop relationships between climate-driven changes in CONUS\
    \ temperature or global mean sea level rise and the resulting physical and economic\
    \ damages across 20 sectors (Table A1) in seven US regions. \nQuantitative material:\
    \ From the 10000 model simulations, the average change in global mean surface\
    \ temperature relative to 1986\u20132005 (FrEDI baseline) is 1.9\u25E6C (95% con\uFB01\
    dence interval: 0.8 to 3.5\u25E6C) by 2100 and increases to 3.1\u25E6C (95% con\uFB01\
    dence interval (CI):\u22120.2 to 7.8\u25E6C) by 2300 (Fig. A1 in the Appendix).\
    \ \nMethodology: Speci\uFB01cally, we use 10000 randomly sampled scenarios of\
    \ global greenhouse gas emissions (CO2, CH4, and N2O), US population, and US GDP\
    \ from the Resources for the Future\u2013Socioeconomic Projections (RFF-SPs) (Rennert\
    \ et al., 2021) (Sect. 2.1). Emission trajectories are input to the Finite Amplitude\
    \ Impulse Response (FaIR) model, a simple emissions-based climate model (v1.6.2)\
    \ that relates emissions to changes in global mean surface temperature (relative\
    \ to 1850\u20131900 average) (Smith et al., 2018a)....The resulting 10000 global\
    \ mean surface temperature projections, along with corresponding population and\
    \ GDP projections from the RFF-SPs, are then passed to FrEDI (v3.0) to calculate\
    \ the physical and economic climate-driven damages....Socioeconomic and emissions\
    \ projections from 2020 to 2300 were recently developed under the Resources for\
    \ the Future Social Cost of Carbon Initiative (Rennert et al., 2021). \nHighlights:\
    \ A unique feature of using probabilistic projections with a simple climate model\
    \ in this approach is the rich range of uncertainty parameters that can be assessed.\
    \ \nMore Notes: Emissions of the other gases and aerosols (e.g., hydro\uFB02uorocarbons\
    \ (HFCs), black carbon (BC), organic carbon (OC)) not included in the RFF-SP projections\
    \ were set to the associated emissions in the SSP2-4.5 (Meinshausen et al., 2020)\
    \ scenario, which most closely matches the median of the RFF-SP emission trajectories\
    \ (Rennert et al., 2022b).\n"
  4: Source material is from distinct parts of the text, and cannot be cohesively
    combined into a single continuous quote without losing clarity.
  5: "yaml\nMethodology: \"FrEDI, sea-level-driven damages are calculated for a given\
    \ year by interpolating between modeled damages at differ- ent sea level heights\
    \ at that same point in time; this enables FrEDI to account for interactions between\
    \ adaptation costs, increased coastalpropertyvalues,andsealevelriseovertime\"\n\
    Methodology: \"While FrEDI was initially built to project damages through 2090\
    \ for temperature scenarios with a maximum value of 10\u25E6C of warming, it was\
    \ extended in this work to project climate damages out to 2300 to quantify the\
    \ net present damages in the US resulting from an additional tonne of CO2, CH4,\
    \ or N2O emissions.\"\nMethodology: \"These differential impacts are calculated\
    \ in FrEDI at the census tract level as a function of current population demographic\
    \ patterns (i.e., percent of each group living in each census tract)(USCensus),\
    \ projectionsof CONUSpopulation (U.S. EPA, 2017), and projections of where climate-\
    \ driven damages are projected to occur\"\nHighlights: \"Total damages in these\
    \ sectors are sensitive to adaptation assumptions, indicating that adapta- tionhasthecapacitytobothexacerbateandamelioratefuture\
    \ climate-drivendamages,withthelatterbeingmorecommon.\"\nHighlight: \"Weconsider\
    \ fourcategoriesforwhichthereisevidenceofdifferentialvul- nerability (Table A2),\
    \ including low income, ethnicity, and race4, educational attainment, and age.\"\
    \nMethodology: \"The annual marginal climate-driven damages are calculated as\
    \ the dif- ference between the damages in the baseline and perturbed cases, summed\
    \ across all sectors and all regions for each year. Lastly, these marginal annual\
    \ damages are discounted to the year of emissions and then aggregated across the\
    \ time series into a single net present-damage estimate.\"\nMethodology: \"Circular\
    \ A-4 (White House, 2003) recom- mends a constant value of 3% for the \u201Csocial\
    \ rate of time preference\u201D\"\n"
  6: "text\nEvaluation overview: FrEDI was developed to quantify the physical and\
    \ economic damages from climate change over the 21st century within contiguous\
    \ US borders. Figure 2 shows the net annual economic climate-driven damages across\
    \ 20 sectors in the US in the years 2050, 2070, and 2090, as calculated by the\
    \ mean from the 10000 baseline RFF-SP scenarios (i.e., emission, population, and\
    \ GDP trajectories). Drivers of Risk: Climate-driven damages from FrEDI are largest\
    \ for the health category. The majority of damages in this category are from the\
    \ estimated valuation of premature mortality attributable to climate-driven changes\
    \ in temperature and air quality (O3 and PM2.5) but also include monetized health\
    \ damages attributable to Valley fever, Southwest dust, wildfire smoke exposure\
    \ and suppression costs, and crime incidents. Quantitative material: Figure 2\
    \ shows that net national damages increase overtime, with mean climate-driven\
    \ damages estimated to reach USD 2.9 trillion (95% CI: USD 510 billion to USD\
    \ 12 trillion), or\u223C3% of US GDP, annually by 2090 for asubsetoftotalclimateimpacts.\
    \ Methodology: Figure 2 shows the net annual economic climate-driven damages across\
    \ 20 sectors in the US in the years 2050, 2070, and 2090, as calculated by the\
    \ meanfromthe10000baselineRFF-SPscenarios (i.e., emission, population, and GDP\
    \ trajectories). HereweusethisRamseydiscountingapproachto calculate the net present\
    \ value. Highlights: Climate-driven damages from FrEDI are largest for the health\
    \ category. The majority of damages in this category are from the estimated valuation\
    \ of premature mortality attributable to climate-driven changes in temperature\
    \ and air quality (O3 and PM2.5)... Another FrEDI category that includes the monetized\
    \ value of directly estimated physical impacts (rather than a direct modeled relationship\
    \ between temperature and monetized damages) is labor, which is the third-largest\
    \ category in 2090 and represents the damages resulting from lost. More Notes:\
    \ Total annual damages throughout this analysis are shown in 2020 US dollars...\
    \ Con\uFB01dence intervals presented throughout this section include uncertainty\
    \ in GDP, population, and climate parameters but do not account for additional\
    \ sectoral parametric or structural uncertainty... a correction can be made to\
    \ account for this relationship (Nordhaus, 2017).\n"
  7: "markdown\nC. Hartin et al.: Advancing the estimation of future climate impacts\n\
    Annual mean US climate-driven damages in 2050, 2070, and 2090. Damages are average\
    \ values in billions of dollars (2020 USD) calculated from the 10000 RFF-SPs.\
    \ Sectors are grouped into six categories for visual purposes.\nTo further illustrate\
    \ the distribution of monetized damages across sectors, Fig. 4 shows the range\
    \ of 2090 annual climate-driven damages in each of the 20 sectors in FrEDI, across\
    \ all 10000 RFF-SP emission, GDP, and population scenarios, in decreasing order\
    \ of sectoral mean damages.\nThe 95% confidence interval (CI) and mean annual\
    \ US climate-driven damages in 2090 for the six categories shown in Fig. 2. All\
    \ values are in 2020 USD. Totals may not sum due to rounding. \nDamages are average\
    \ values in billions of dollars (2020 USD) calculated from the 10000 RFF-SPs.Sectors\
    \ are grouped into six categories for visual purposes.\nTable 1. The 95% confidence\
    \ interval (CI) and mean annual US climate-driven damages in 2090 for the six\
