  21: "   \nThe paper evaluates the net present value of future damages within the\
    \ continental U.S. from one ton of CO2 emissions: \"Net present value of future\
    \ damages from one tonne of CO2 for damages occurring only within the CONUS.\"\
    \n\nPredicted dollar costs per ton of CO2 are presented under different discount\
    \ rate scenarios, ranging from $10 to $78: \"The image is a horizontal box plot\
    \ chart displaying the predicted dollar cost per ton of CO2 under different discount\
    \ rates... median marked at $15... range from about $10 to $19... median marked\
    \ at $51... range from about $39 to $78.\"\n\nThe analysis uses constant and Ramsey\
    \ discounting approaches to calculate net present damages for CO2 emissions up\
    \ to the year 2300: \"As described in the main text, FrEDI is run through 2300...\
    \ a constant discount rate of 3%.\"\n\nLower discount rates result in higher estimated\
    \ costs of CO2 emissions, with the 1.5% Ramsey scenario showing the highest median\
    \ cost at $51: \"Lower discount rates suggest higher costs, as observed in the\
    \ rising medians from the green to the pink boxes... 1.5% Ramsey: Light pink color.\
    \ Approximate median marked at $51.\"\n"
