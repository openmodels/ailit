  9: "The largest monetary damages in 2090 are expected from premature mortality associated\
    \ with changes in temperature, ranging from USD4500 per person in the Southwest\
    \ to USD6500 per person in the Southeast. Damages from transportation impacts\
    \ from high-tide \uFB02ooding and premature mortality attributable to climate-driven\
    \ change in air quality are the second and third largest in the coastal Southeast\
    \ and Northeast regions. Boxes and whiskers show the 2.5th, 25th, 50th, 75th,\
    \ and 97.5th percentiles and mean damages (diamonds) across all 10000 projections.\
    \ Damages are in billions of 2020 USD. Con\uFB01dence intervals presented throughout\
    \ this analysis account for uncertainty associated with the range of future emission\
    \ and socioeconomic projections across the 10000 RFF-SP scenarios. These also\
    \ incorporate climate parameter uncertainty as a Monte Carlo approach was used\
    \ to sample the calibrated parameter set when running FaIR with the 10000 RFF-SP\
    \ emissions scenarios. Overall, however, the negative impacts of climate change\
    \ outweigh the positives such that net losses are projected in each region. For\
    \ example, results from this module show that Black or African Americans are more\
    \ likely to be affected by additional premature mortality from climate-driven\
    \ changes in air quality, while Hispanic or Latino Americans are more likely to\
    \ experience lost labor hours."
  10: "Figure 5. Mean per capita annual climate-driven damages across the seven regions\
    \ in 2090 for the subset of climate impacts included in FrEDI. Donut charts show\
    \ the annual per capita damages (2020 USD per person annually) and the top four\
    \ sectors with the largest damages in each region. Table 3 shows a comparison\
    \ of annual national climate-driven damages in the US in the year 2090 from a\
    \ subset of four Shared Socioeconomic Pathways (SSPs). WeextendFrEDItoprojectclimatedamagesthroughto2300\
    \ (Sect. A4, Table A5) to quantify the net present damages within the US resulting\
    \ from an additional tonne of CO2, CH4, or N2O emissions. As described in Sect.\
    \ 2.4, the net present value is the discounted sum of a stream of future damages\
    \ produced by an emissions pulse in 2020 over the entire 2020\u20132300 time period.\
    \ Annual damages in Table 3 are calculated following the same approach as outlined\
    \ in Fig. 1 but using SSP trajectories of emissions, US GDP, and US populationfromtheSSPPublicDatabase(v2.0).\
    \ These results show that even considering only the direct CONUS impacts as estimated\
    \ by FrEDI, damages per tonne of CO2 are almost 20% of a recently estimated global\
    \ value. We explore the sensitivity of the remaining estimates to discounting\
    \ assumptions by using Ramsey discounting calibrated to near-term target rates\
    \ of 1.5%, 2.0%, and 2.5%."
