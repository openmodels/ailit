Drivers of Risk:
  1: Climate-driven changes in temperature and air pollution (O3 and PM2.5) exposure.
  2: Changes in global mean surface temperature.
  3: Global greenhouse gas emissions (CO2, CH4, and N2O), changes in CONUS temperature
    or global mean sea level rise
  4: Global mean temperature change and sea level rise impact various sectors.
  6: Climate-driven changes in temperature and air quality (O3 and PM2.5), Valley
    fever, Southwest dust, wildfire smoke exposure, and crime incidents.
  7: The drivers of risk include climate-driven changes in temperature, air quality,
    high-tide flooding, tropical storm frequency and wind strength, and southwestern
    dust exposure.
  8: The drivers of risk include temperature, air quality, and climate-related factors
    affecting wildfire, dust, and Valley fever.
  9: The primary drivers include changes in temperature, high-tide flooding, and climate-driven
    air quality changes.
  10: The shocks driving risk include changes in temperature, increased wildfire risk,
    high tide flooding, and impacts on labor productivity and infrastructure (rail,
    roads).
  11: The analysis examines vulnerabilities in air quality risks and labor impacts
    among socially vulnerable groups.
  12: Impacts depend on changes in global mean surface temperature, US GDP, and US
    population, with adaptation as a relevant factor.
  14: The page identifies multiple drivers of risk, including changes in crop yields,
    coastal property damage, increased power sector costs, temperature changes, flooding,
    dust particles, air quality, storm winds, and wildfire emissions.
  15: Underlying temperature (or sea level rise), binned damage functions, and sector-specific
    scalars (e.g., per capita income-dependent VSL).
  17: Climate change impacts on various sectors.
  18: Temperature
  19: Drivers of risk include air quality (Ozone, PM2.5), temperature, sea level rise,
    wildfires, and high-tide flooding.
  20: The shocks or changes impacting the outcomes include temperature increases,
    flooding, high tides, wind, and changes affecting dust and valley fever.
Evaluation overview:
  1: Economic and physical impacts of climate change across multiple impact sectors,
    regions, and populations within the contiguous United States (US).
  2: Physical and economic impacts of climate change within the US across 20 sectors.
  3: Annual long-term climate damages across 20 impact sectors, seven CONUS regions,
    and socially vulnerable populations
  4: Evaluates economic damages within the US from various sectoral impacts.
  6: Quantifies the physical and economic damages from climate change over the 21st
    century within contiguous US borders across 20 sectors.
  7: This paper evaluates climate-driven damages across various sectors including
    health, infrastructure, labor, electricity, agriculture, and ecosystems/recreation.
  8: The paper evaluates the impact of climate change on premature mortality, air
    quality, wildfire, Southwest dust, Valley fever, crime, and labor (work hours
    lost).
  9: The page provides an overview of climate-driven damages expected in 2090, covering
    sectors like mortality related to temperature, air quality, transportation, labor,
    and wildfires.
  10: The paper evaluates climate-driven damages across various sectors, including
    rail, wildfire, roads, labor, agriculture, temperature-related mortality, air
    quality, and high tide flooding.
  11: The paper evaluates climate-driven changes in air quality-attributable mortality
    and labor hours lost, focusing on disparities among different races and vulnerable
    groups by 2090.
  12: The paper provides an overview of sectoral damages to the US economy due to
    climate change, with a focus on quantifying the economic impacts resulting from
    temperature changes, especially in mortality.
  14: The page provides an overview of various sector-specific outcomes being evaluated,
    such as mortality, infrastructure damage, revenue loss, and impacts on ecosystems
    and recreation.
  15: Provides an overview of climate-driven impacts across multiple sectors, including
    mortality, air quality, flooding, labor productivity, wildfire, and more.
  17: Annual mean climate-driven damages in 2090 for various sectors.
  18: Premature mortality from temperature
  19: This paper extends FrEDI sectoral results from 2090 to 2300, focusing on impacts
    like mortality, morbidity, lost wages, and response costs across various sectors.
  20: The graphs provide an overview of climate change impacts on sectors such as
    temperature-related mortality, air quality, labor, wildfire, coastal properties,
    and others.
  21: The paper evaluates the net present value of future damages within the continental
    U.S. from one ton of CO2 emissions.
