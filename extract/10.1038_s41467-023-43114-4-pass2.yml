    Evaluation overview: "We focus on two complementary metrics of high policy relevance:
    i) the discounted annual damage (DAD) caused by TCs and ii) the contribution of
    TCs to the social cost of carbon (SCC)."

    Drivers of Risk: "We present a modeling framework to quantify future TC damages
    that comprises three components."

    Methodology: "We present a modeling framework to quantify future TC damages that
    comprises three components... generate probabilistic, event-based projections
    of TC damages by projecting the historical growth losses along a large set of
    synthetic time series of TCs with landfalls generated with a TC emulator."

    Highlights: "It reveals adaptation needs and allows the development of tailored
    evidence-based National Adaptation Plans (NAPs)."

