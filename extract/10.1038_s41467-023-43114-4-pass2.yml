  7: "Source material here.\nEvaluation overview: \"In per-capita terms, absolute\
    \ DADs are highest for strongly exposed high-income countries such as Taiwan,\
    \ Japan, and the USA. However, when DAD is measured relative to average household\
    \ income, the damages for the strongly exposed, upper-middle-income island states\
    \ of Mauritius and Jamaica but also for the lower-middle-income countries of the\
    \ Philippines and Vietnam become comparable to those of the USA.\"\nDrivers of\
    \ Risk: \"Our DAD analysis reveals that differences in income among countries\
    \ must not be neglected when estimating and comparing the adaptation challenges\
    \ of countries.\"\nQuantitative material: \"A recent meta-analysis including 207\
    \ studies and more than 5,000 SCC estimates finds that median SCC estimates have\
    \ quadrupled over the last decade from US$/tCO2 48 in 2007\u20132012 to US$/tCO2\
    \ 328 in 2018\u20132022 for Ricke\u2019s choice of the rate of pure time preference\
    \ (\u03C1 = 2%, our main specification).\"\nMethodology: \"Global median social\
    \ cost of carbon (SCC) for the period 2010\u20132100 with and without TC effects,\
    \ for three Representative Concentration Pathways (RCP2.6, 6.0, 8.5), two Shared\
    \ Socioeconomic Pathways (SSPs 2 and 5), and three different values of the growth-adjusted\
    \ discount rates used in the Stern review for the standard calibration of Nordhaus\u2019\
    s DICE model.\"\nHighlights: \"For an average household, these range from one\
    \ to more than 10 days of income lost per year, strongly depending upon assumptions\
    \ on discounting.\"\n"
