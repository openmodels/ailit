Drivers of Risk:
  1: Temperature changes are identified as impacting productivity levels.
  3: Annual temperature shocks, long-run temperature levels (climate), and precipitation
    (though the evidence is less robust for precipitation).
  4: Annual mean temperature levels and annual total precipitation values, as well
    as changes in these weather variables.
  5: Changes in average temperature and precipitation are considered as drivers impacting
    economic productivity.
  8: "The main drivers are annual mean temperature (T), annual total precipitation\
    \ (P), and their changes (\u0394T, \u0394P)."
  9: "Drivers of risk include contemporaneous and lagged temperature changes (\u0394\
    T), as well as changes in precipitation."
  10: Temperature change is the driver impacting regional economic growth.
  11: Changes in temperature and precipitation are construed as shocks impacting economic
    outcomes.
  12: Temperature (T) and Precipitation (P) are considered as climate drivers. Other
    drivers include cumulative oil and gas production (Cum Oil Gas), distance to coast
    (Distance coast), distance to river (Distance river), and altitude.
  13: "Temperature increases from 2015\u20132019 to 2099 under the RCP 8.5 warming\
    \ scenario are noted as a driver of GRP reductions."
  14: The impact on GRP is driven by warming scenarios with a specific focus on increases
    in average temperature.
  15: Prolonged temperature increases in regions with already low baseline GRP levels
    are key drivers of risk.
  16: The paper identifies a one-time temperature increase as a driver that impacts
    GDP levels.
  17: The analysis considers short-term weather shocks as potentially having a larger
    effect on economic output compared to long-term climate changes.
  18: Temperature changes affecting economic output, particularly in cold and hot
    regions.
Evaluation overview:
  1: The paper evaluates the impact of climate conditions on economic production,
    specifically focusing on productivity levels.
  3: Economic growth, specifically Gross Regional Product (GRP) and per-capita GDP.
  4: Evaluates the impact of temperature and precipitation changes on per-capita growth
    rate of gross regional product (GRP).
  8: The paper evaluates the effect of annual weather changes on annual changes in
    log Gross Regional Product (GRP).
  9: The paper evaluates the impact of temperature and precipitation changes on Gross
    Regional Product (GRP).
  10: The outcome being evaluated is the impact of temperature change on regional
    economic growth.
  11: The paper evaluates the effect of changes in 10-year average weather on economic
    growth, specifically changes in Gross Regional Product (GRP).
  12: The study evaluates the effect of changes in long-term climate conditions on
    the log of Gross Regional Product (GRP).
  13: The page discusses the reduction in global Gross Regional Product (GRP) due
    to global warming, with a focus on how these impacts vary regionally.
  14: The study evaluates losses in Gross Regional Product (GRP) by 2099 under a business-as-usual
    warming scenario (RCP-8.5).
  15: Estimates potential GDP losses in 2099 due to climate warming under a business-as-usual
    scenario.
  16: The paper evaluates the impact of global mean surface temperature increases
    on global GDP.
  17: "The paper evaluates GRP losses due to a 1\xB0C temperature increase, focusing\
    \ on labor productivity, land productivity, and capital depreciation."
  18: The paper provides an overview of economic productivity loss due to temperature
    changes.
Highlights:
  1: The findings suggest no permanent growth rate impacts but robust evidence that
    temperature affects productivity levels considerably.
  3: GRP responds to annual temperature shocks as well as long-run temperature levels.
    Hot regions are more strongly affected by further warming than cooler regions.
  4: Differentiates between temperature effects and temperature change effects as
    crucial for understanding growth dynamics. The paper aims to test for different
    impact channels, including immediate effects of weather shocks, and transitory/long-run
    growth effects of prevailing climate conditions.
  8: Temperature shocks have strong direct productivity effects, and there are no
    significant long-run growth effects visible in the models with interaction terms.
  9: The preferred model reports higher marginal effects of temperature increases
    on GRP than previous studies, suggesting that hot years may harm local economies
    more than previously thought. Long-difference regressions do not provide evidence
    for long-run growth effects of climate conditions.
  10: "The temperature coefficient is stable across decades, significant at the 10%-level\
    \ except for 1955\u20131964; results are robust except when omitting altitude,\
    \ which biases the temperature coefficient downward."
  11: The study identifies a non-linear relationship between climate and GRP, where
    regions with hot climates tend to have lower GRP, and a u-shaped relationship
    with precipitation indicating high GRP in very dry and very wet regions.
  12: Temperature has a statistically significant negative impact on GRP in several
    models. Projected GRP losses due to future warming are estimated to be between
    6-14% by the end of the century.
  13: Panel model shows larger damages globally compared to the cross-sectional model;
    cold regions may benefit while hot regions suffer disproportionately.
  14: Regions like Africa, the Middle East, India, and parts of Latin America are
    projected to suffer significant economic losses by 2099.
  15: Predicts that poorer regions will suffer higher percentage GRP losses, and the
    social cost of carbon is significantly underestimated in current models by factors
    of up to four.
  16: The study finds that while output levels are permanently affected by a permanent
    temperature increase, the long-run growth rate is not affected.
  17: Panel estimates suggest TFP impacts without savings adjustments; long-run GRP
    impacts are likely larger due to reduced productivity decreasing savings and output.
  18: The social cost of carbon more than triples in the DICE-2016 model when using
    the damage function from this analysis.
Methodology:
  1: The analysis uses a novel data set of subnational economic output and employs
    annual panel models, long-difference regressions, and cross-sectional regressions.
  2: The approach addresses previous shortcomings by considering regional scope, temporal
    scale, and technical issues with spatially and temporally resolved datasets.
  3: The paper uses panel, long-difference, and cross-sectional estimates to assess
    economic climate damages. It develops a stylized Ramsey-type growth model to illustrate
    the economic impacts of climate change on different time scales, focusing on the
    productivity channel. The model decomposes growth effects into immediate climate
    effects, transitory effects, and a 'BGP effect'.
  4: Uses an annual panel model with region and year fixed effects, and region-specific
    polynomial time trends. It considers linear and quadratic functional forms to
    capture non-linear dynamics, and tests different model specifications by including
    or excluding weather changes and levels.
  5: Cross-sectional model analyzes how average climate conditions affect regional
    per capita GDP without distinguishing between growth rate effects and productivity
    level effects.
  6: Annual Gross Regional Product data used as a measure of economic activity, converted
    to USD to account for inflation.
  8: The analysis uses panel regression models to assess the impacts, with variants
    considering contemporaneous and lagged weather effects, over the period 1900-2014
    across 77 countries.
  9: The paper uses annual panel models, long-difference models (10-year periods),
    and cross-sectional models to investigate the impact of climate on GRP. The annual
    panel model includes contemporaneous and lagged temperature changes.
  10: "Analysis uses temperature and GRP data aggregated to 10-year intervals, with\
    \ the largest data coverage from 2005\u20132014."
  11: The analysis is performed using long-difference regression models comparing
    different time periods, with temperature and precipitation as independent variables.
  12: The study uses cross-sectional regression analysis with climate and GRP data
    aggregated to 10-year intervals. Country fixed effects are included, and standard
    errors are clustered at the country level. Future economic losses are projected
    based on historical GRP-climate relationships under a business-as-usual warming
    scenario. The time period spans from 1955-1964 to 2005-2014 depending on the regression.
  13: Analysis involves cross-sectional and panel regression models with binning of
    climate variables to capture non-linearities, and the aggregation of region-specific
    outcomes to the global level.
  14: The analysis uses cross-sectional and panel regression models to estimate GRP
    changes under warming scenarios, with different implications based on regional
    temperature data.
  15: Uses panel and cross-sectional estimates to evaluate changes in log GRP, employing
    a quadratic temperature-damage function.
  16: The analysis is based on both panel and cross-sectional regression models to
    determine temperature impacts on GDP.
  17: Analysis uses both panel and cross-sectional models; emphasizes on impact pathways
    like labor productivity without considering savings dynamics.
  18: A stylized growth model is used; results apply to sub-national level economic
    activity with cross-sectional and panel models.
More Notes:
  1: "The study provides estimated social cost of carbon due to temperature-induced\
    \ productivity losses between 73\u2013142$/tCO2 in 2020, rising to 92\u2013181$/tCO2\
    \ in 2030."
  4: The paper acknowledges potential collinearity issues between temperature levels
    and changes, and the difficulty of unequivocally testing different impact channels
    when including region-fixed effects and various lags in temperature.
  6: Large spatial variability in temperature and rainfall noted; inter-annual temperature
    variation within regions is lower compared to spatial variability.
  9: The authors tested various model specifications, lag structures, and robustness
    checks, including fixed effects, time periods, and climate data sources. Adaptation
    may explain the insignificance of temperature changes in the long-difference model.
  12: The analysis disregards the effect of precipitation due to mostly insignificant
    coefficients and high uncertainties in regional precipitation projections.
  17: Estimates focus on historic temperature and precipitation variability, excluding
    non-market damages and sea level rise impacts.
No relevant information:
  13: The image described is completely black with no contents, thus it provides no
    relevant information.
Quantitative material:
  1: "An increase in global mean surface temperature by about 3.5\xB0C could reduce\
    \ global output by 7\u201314% in 2100."
  3: Marginal effects of temperature increase are much higher than assumed in most
    Integrated Assessment Models (IAMs).
  4: Presents a regression model (Eq. 6) to quantify the impact of weather changes
    and levels on economic growth, with coefficients representing immediate, transitory,
    and long-run growth effects. No specific values are presented on this page, only
    the structure of the model.
  6: Average annual per-capita growth in USD is 7%, variability attributed to regional
    and time factors.
  8: "A temperature increase of 1\xB0C in a hot region decreases GRP by about 3%,\
    \ with significant effects at 25\xB0C ranging from 2.6% to 3.7%."
  9: Adding one-year lagged weather changes increases R2-adjusted and BIC considerably.
    Temperature increased by only 0.46 degrees C on average between 1985-1994 and
    2005-2014.
  10: "A 1\xB0C increase in temperature reduces GRP by 2\u20134%."
  11: "Coefficients on temperature and precipitation changes are given, with marginal\
    \ effects at different baseline temperatures (e.g., at 10\xB0C and 25\xB0C)."
  12: Cross-sectional regression results show the impact of temperature, precipitation,
    and other factors on GRP. For example, the coefficient for temperature (T) ranges
    from -0.0201 to -0.0427 across different periods, indicating a negative impact
    on GRP. The models project GRP losses of about 6-8% at the end of the century
    and according to panel estimates regions annual GRP is reduced by around 11-14%
    in 2099.
  13: Global GRP reductions in 2099 range from 6.6% to 14.2% depending on the estimate
    method (cross-sectional or panel) and weighting scheme.
  14: Loss of more than 20% in GRP in certain regions is indicated by darker red colors
    on the map.
  15: Each plot predicts changes in log GRP by end of century, with left showing a
    slight positive slope in panel estimates and right in cross-sectional estimates.
  16: The social cost of carbon is quantified, with estimates ranging from $37/tCO2
    in 2020 to $780/tCO2 in 2100 depending on the damage function used.
  17: "The study reports GRP losses for a 1\xB0C temperature increase as: 0.8% at\
    \ 10\xB0C and 3.5% at 25\xB0C using a preferred model; different percentages for\
    \ other models are also provided."
  18: "Projected production losses in a high-warming scenario are around 7\u201314%\
    \ by 2099, and up to 20% in tropical regions."
sourcematerial:
  1: "yaml\nEvaluation overview: \"The impact of climate conditions on economic production.\
    \ Evidence from a global panel of regions\u2606 ...we identify e ffects on productivity\
    \ levels and productivity growth.\"\n\nDrivers of Risk: \"We do not \uFB01nd evidence\
    \ for permanent growth rate impacts but we \uFB01nd robust evi- dence that temperature\
    \ affects productivity levels considerably.\"\n\nQuantitative material: \"An increase\
    \ in global mean surface temperature by about 3.5 \u25E6 C until the end of the\
    \ century would reduce global output by 7\u201314% in 2100, with even higher damages\
    \ in tro pical and poor regions.\"\n\nMethodology: \"We present a novel data set\
    \ of subnational economic output, Gross Regional Product (GRP), for more than\
    \ 1500 regions in 77 countries that allows us to empirically estimate historic\
    \ climate impacts at different time scales. Employing annual panel models, long-difference\
    \ regressions and cross-sectional regressions...\"\n\nHighlights: \"We do not\
    \ \uFB01nd evidence for permanent growth rate impacts but we \uFB01nd robust evi-\
    \ dence that temperature affects productivity levels considerably.\"\n\nMore Notes:\
    \ \"Updating the DICE damage function with our estimates suggests that the social\
    \ cost of carbon from temperature- induced productivity losses is on the order\
    \ of 73\u2013142$/tCO 2 in 2020, rising to 92\u2013181$/tCO 2 in 2030.\"\n"
  2: "  \n\"The paper aims to fill these research gaps by using a panel of subnational\
    \ GDP data \u2013 Gross Regional Product (GRP) \u2013 that allows the depiction\
    \ of local weather as well as climate conditions on various time scales across\
    \ the globe (covering more than 1500 regions).\"\n\n\"...our spatially and temporally\
    \ highly resolved dataset allows us to address several of the shortcomings of\
    \ previous analyses with respect to regional scope, temporal scale and specific\
    \ technical issues.\"\n"
  3: "\nEvaluation overview: \"We \uFB01nd strong and robust evidence that GRP responds\
    \ to annual temperatureshocksaswellaslong-runtemperaturelevels (climate).\" and\
    \ \"Let economic output Y (GDP) be de\uFB01ned by...\" and \"gy = d ln(y)dt =\
    \ dt = d ln(Y )dt \u2212 gL\"\nDrivers of Risk: \"to explicitly differentiate\
    \ between short-term weather shocks (i.e. deviations from a region\u2019s average\
    \ climate conditions) and long-term climatic changes... With respect to precipitation,\
    \ the evidence is less robust.\"\nQuantitative material: \"We provide further\
    \ evidence that marginal effects of temperature increase are much higher than\
    \ assumed in most Integrated Assessment Models (IAMs).\"\nMethodology: \"The empirical\
    \ strategy and the data are explained in Sections 3 and 4, respectively. Section\
    \ 5 provides the key results for panel, long-difference and cross-sectional estimates\
    \ of economic climate damages.\" and \"To illustrate economic impacts of climate\
    \ change on different time scales, we consider a stylized Ramsey-type growth model\
    \ where changes in weather variables affect the productivity level of the entire\
    \ economy and the growth rate of labor productivity.\" and \"gy = \u0398 \u2032\
    (T )\u0398( T ) \u0307T+\u03A6s YK \u2212 \U0001D6FF \u2212 gL \u2212 gA (T )+\
    \ gA (T ).\"\nHighlights: \"We \uFB01nd strong and robust evidence that GRP responds\
    \ to annual temperatureshocksaswellaslong-runtemperaturelevels (climate).\" and\
    \ \"In particular, hot regions are more strongly affected by further warming than\
    \ cooler regions.\"\n"
  4: "This stylized model provides a clear framework for specifying a growth regression\
    \ equation, reflecting the key terms of Eq. (4) in a time-discrete notion. [...]\
    \ An empirical model should therefore test for the following hypotheses: (1) a\
    \ sudden change in climate conditions, \u0394T, affects contemporaneous growth\
    \ rates; (2) the impact is conditional on the prevailing (historic) climate conditions\
    \ T (via G(T)); (3) additionally, prevailing climate conditions T affect transitory\
    \ and long-run growth (via F(T)). [...] differentiating between temperature effects\
    \ and temperature change effects can be crucial for understanding growth dynamics.\
    \ We take on the previous notation but define Ti,t =(Ti,t , Pi,t ) as a vector\
    \ of annual mean temperature levels (in \xB0C) and annual total precipitation\
    \ values (in m) within year t at region i (referred to as annual weather hereafter).\
    \ [...] gi,t = \u03B1 \u0394Ti,t + \u03B2 Ti,t\u0394Ti,t + \u03B31 Ti,t + \u03B3\
    2 T2i,t + pi(t)+ \u03B4i + \u03BC t + \u03B5i,t ; [...] Region-specific polynomial\
    \ time trends which control for various possible slow-moving regional changes\
    \ that affect growth [...]  \u03B1 and \u03B2 capture the immediate effect of\
    \ weather shocks. [...] contrary, \u03B31 and \u03B32 capture transitory and long-run\
    \ growth effects. [...] Only fluctuations in T can be used for identifying growth-effects.\
    \ [...] growth rates depend also on the capital stock K, which is affected by\
    \ past climate events. "
  5: "Source material here.\nWe consider various lags for Ti,t and \u0394 Ti,t...In\
    \ the annual panel model, the transitory growth impact and the balanced growth\
    \ path impact in Eq. (4) are estimated jointly...One way to overcome these limitations\
    \ is to use cross-sectional regressions in growth rates over longer time intervals\
    \ (long-difference model)... Eq. (7) allows to detect how climate conditions (Ti)\
    \ and their change (\u0394 Ti ) affect growth rates...We \uFB01rst determine average\
    \ temperature and precipitation levels for the decades 2005\u20132014, 1995\u2013\
    2004 and 1985\u20131994...We then analyze the differences between 2005-2014 and\
    \ 1995\u20132004 and between 2005-2014 and 1985\u20131994, respectively...Contrary\
    \ to the annual panel model, transitory growth effects in the long-difference\
    \ model can be expected to be rather small because of the longer time-periods\
    \ considered. We therefore interpret \U0001D6FE1 and \U0001D6FE2 as coe\uFB03\
    cients that capture how long-run growth rates of the economy (i.e. balanced growth\
    \ paths) are affected by climate conditions...This regression exploits cross-sectional\
    \ heterogeneity in climate conditions to estimate the impact on economic output.\
    \ It does not allow to differentiate between long-run growth rate effects (gA)\
    \ and productivity level effects of climate conditions as both are captured in\
    \ yi...\u0394 Ti denotes changes in average temperature and precipitation levels\
    \ and gi logarithmic changes in average economic output over a longer period.\n"
  6: "We use climate and economic data at the subnational level for the years 1900\u2013\
    2014. Aggregated these gridded data to the region level by computing area-weighted\
    \ averages. Annual mean temperature and annual total precipitation values per\
    \ region. Temperature projections for 2015\u20132099 in accordance with RCP 8.5\
    \ derived from ISIMIP. Uses annual Gross Regional Product as a measure of economic\
    \ activity. Average annual per-capita growth in USD is 7%. The high variability\
    \ of growth is mainly driven by the large volatility of economic growth over time.\
    \ Temperature and precipitation are more stable over time, but show large spatial\
    \ variability. Inter-annual temperature variation within a region over the observed\
    \ time period is rather low compared to spatial variability."
  8: "Source material here.\nEvaluation overview: \"Panel model results for the effect\
    \ of annual weather (changes) on annual changes of log Gross Regional Product.\"\
    \n\nDrivers of Risk: \"Annual mean temperature and annual total precipitation\
