  17: "The paper evaluates GRP losses due to a 1\xB0C temperature increase, focusing\
    \ on labor productivity, land productivity, and capital depreciation. Hence, it\
    \ is important to keep in mind that our cost estimates do not cover the full spectrum\
    \ of potential climate damages but contribute to a better understanding and quantification\
    \ of several specific impact channels, i.e., labor productivity, land productivity,\
    \ and capital depreciation.\n\nThe analysis considers short-term weather shocks\
    \ as potentially having a larger effect on economic output compared to long-term\
    \ climate changes. When looking at globally aggregated GRP losses, we find that\
    \ projected losses are about twice as large when computed based on the panel regression\
    \ estimates instead of on their cross-sectional equivalent. This suggests that\
    \ short-term weather shocks have a larger effect on economic output than long-term\
    \ climate changes, possibly due to adaptation.\n\nThe study reports GRP losses\
    \ for a 1\xB0C temperature increase as: 0.8% at 10\xB0C and 3.5% at 25\xB0C using\
    \ a preferred model; different percentages for other models are also provided.\
    \ Our study: temperature change (preferred; 1 lag) 0.8% at 10\xB0C and 3.5% at\
    \ 25\xB0C temperature.\n\nAnalysis uses both panel and cross-sectional models;\
    \ emphasizes on impact pathways like labor productivity without considering savings\
    \ dynamics. Against this background, our panel estimates can be considered as\
    \ actual TFP impacts that occur without any adjustments in saving dynamics.\n\n\
    Panel estimates suggest TFP impacts without savings adjustments; long-run GRP\
    \ impacts are likely larger due to reduced productivity decreasing savings and\
    \ output. In the long-run, GRP impacts of weather shocks are likely to be larger\
    \ because reduced productivity decreases savings and, thus, output further.\n\n\
    Estimates focus on historic temperature and precipitation variability, excluding\
    \ non-market damages and sea level rise impacts. Contrary to damage functions\
    \ in IAMs, our estimates only refer to the effect of (historic) temperature and\
    \ precipitation variability on GDP. That is, they primarily cover impacts on labor\
    \ productivity, land productivity (agricultural yields), and depreciation of capital.\
    \ Non-market damages such as loss of life, conflicts and violence, biodiversity\
    \ and ecosystem damages are not captured. Damages due to sea level rise are also\
    \ excluded from our regression model."
  18: "Source material here.\n- \"We find strong evidence that changes in annual mean\
    \ temperatures affect economic output in a non-linear way.\" (\"Evaluation overview\"\
    , \"Drivers of Risk\")\n- \"A 1\xB0C temperature increase in a region with an\
    \ annual mean temperature of 25\xB0C, reduces GRP by about 3.5% in that region.\"\
    \ (\"Quantitative material\")\n- \"Applying the panel and cross-sectional results\
    \ to projected warming levels for a high-warming scenario, we project considerable\
    \ production losses, around 7\u201314% in the year 2099 compared to a scenario\
    \ of no further warming. In tropical regions, output losses of up to 20% are possible.\"\
    \ (\"Quantitative material\")\n- \"Using a stylized growth model... we empirically\
    \ analyze the climate\u2013growth nexus at various time scales... using a comprehensive\
    \ data set of economic activity at the subnational level.\" (\"Methodology\")\n\
    - \"Consistent with existing evidence... we find strong evidence that changes\
    \ in annual mean temperatures affect economic output in a non-linear way.\" (\"\
    Highlights\")\n- \"Our panel specification suggests that a permanent increase\
    \ in temperature will lead to a permanent loss in economic output in hot regions.\"\
    \ (\"Highlights\")\n- \"By incorporating our damage function from the panel regression\
    \ model in the DICE-2016 model, we find that the social cost of carbon more than\
    \ triple compared to what the original DICE-2016 damage function suggests.\" (\"\
    Highlights\")\n"
