  14: " \n\"The study evaluates losses in Gross Regional Product (GRP) by 2099 under\
    \ a business-as-usual warming scenario (RCP-8.5). . . . Countries are colored\
    \ according to the percentage change by which GRP would be reduced in 2099 if\
    \ average warming from now until then was in the order of 3.5\xB0C compared to\
    \ a scenario with no additional warming from 2015 to 2019 on. Red denotes highest\
    \ losses (more than 20% reduction in GRP) whereas blue indicates that regions\
    \ benefit.\" \n\n\"The impact on GRP is driven by warming scenarios with a specific\
    \ focus on increases in average temperature.\" \n\n\"Loss of more than 20% in\
    \ GRP in certain regions is indicated by darker red colors on the map.\" \n\n\"\
    The analysis uses cross-sectional and panel regression models to estimate GRP\
    \ changes under warming scenarios, with different implications based on regional\
    \ temperature data. . . . The cross-sectional regression model implies a log-linear\
    \ damage function, giving a change in GRP. . . . Deriving a global GDP-damage\
    \ function from the panel-based estimate is less straight-forward.\"\n\n\"Regions\
    \ like Africa, the Middle East, India, and parts of Latin America are projected\
    \ to suffer significant economic losses by 2099. . . . Regions in dark red represent\
    \ severe losses, particularly visible in Africa and the Middle East.\"\n"
