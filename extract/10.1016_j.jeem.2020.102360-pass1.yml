  9: "In variants (3)\u2013(6) we consider contemporaneous and one-year lagged \u0394\
    \ T...This suggests that transitory effects comprise up to two years and that\
    \ they become weaker over time...Even though we do not find evidence for persistent\
    \ growth effects...higher marginal effects of temperature increases on GRP than\
