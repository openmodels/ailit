  39: 'Source material here: Spatially-explicit observations of tree species were
    from the previous study1. ... Briefly, we obtained all records of trees and shrubs
    (hereafter, referred to as trees) from the Global Biodiversity Information Facility
    (doi.org/10.15468/dl.8u65om; as of July 22nd 2015), and then filtered out records
    with geographic location by referring to the database of Global Administrative
    Areas (www.gadm.org; as of August 3rd 2015)3. ... Here we extended the modelling
    to a resolution of 30 arcseconds (hereafter, fine grids) to improve our approximation
    of biodiversity-dependent productivity (see the section, Species richness and
    productivity estimation). However, the modelling for species distributions at
    the fine-scale was only possible for the present period, because our models relied
    on land-use and climatic variables and future land-use variables were only available
    at the scale of coarse grids. We sampled one occurrence record per grid for all
    species at both spatial resolutions. To avoid the effect of model inaccuracy from
    a small sample size, we limited our analysis to species that had 30 and more refined
    occurrence records4. These resulted in 1,755 and 934 target tree species at a
    spatial resolution of fine and coarse grids, respectively. ... F o r the present
    period, we obtained a dataset of 19 bioclimatic variables, calculated from the
    monthly minimum temperature, maximum temperature, and precipitation at a resolution
    of fine grids downloaded from the WorldClim 1.4 (www.worldclim.org)5. Then, we
    obtained land-use variables at a resolution of fine grids from the MODIS (Moderate
    resolution Imaging Spectroradiometer) Land Cover Type for the year 2005 (glcf.umd.edu/data/lc).
    Note that we coped with uncertainties due to the difference in the number of target
    species between the two periods by combining spatially explicit simulations and
    machine learning regressions (described later). Supplementary Figure 1 and 2 are
    the schematic diagrams for workflow how we estimated proportional changes in species
    richness and forest productivity and absolute changes in net primary productivity
    at the local scale."

