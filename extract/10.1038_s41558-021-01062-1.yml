  18: 'Source material here.

    Our workflow of how to estimate proportional changes in species richness and forest
    productivity as well as absolute changes in net primary productivity at the local
    scale is visualized in Figures S1 and S2.


    Spatially-explicit observations of tree and shrub species (hereafter, referred
    to as trees) were available from a previous study28. Also see Supplementary Table
    1 for the protocol of our species distribution modelling, which relied on climate
    and land-use variables. Note that the modelling was previously conducted at a
    spatial resolution of 30 arcminutes (hereafter, coarse grids). Here we extended
    the modelling to a resolution of 30 arcseconds (hereafter, fine grids) to improve
    our approximation of biodiversity-dependent productivity (see below). However,
    the modelling for species distributions at the fine scale was only possible for
    the present period, because future land-use variables were only available at the
    scale of coarse grids.


    For the present period, we obtained a dataset of 19 bioclimatic variables, calculated
    from monthly minimum temperature, maximum temperature, and precipitation at the
    resolution of fine grids downloaded from the WorldClim 1.4 (www.worldclim.org)54.
    Then, we obtained land-use variables at a resolution of fine grids from the MODIS
    (Moderate resolution Imaging Spectroradiometer) Land Cover Type for the year 2005
    (glcf.umd.edu/data/lc).


    For future scenarios, we focused on a mitigation scenario and a high-emission
    baseline scenario based on the Representative Concentration Pathways (RCPs): the
    mitigation scenario aimed to stabilize climate change by the end of the 21st century,
    whereas the baseline scenario assumed increasing greenhouse gas (GHG) emissions
    and thus climate change over time28. We set the target period for analyses as
    the 2070s. We used future climatic variables based on three General Circulation
    Models (GCMs) included in the Fifth Coupled Model Inter-Comparison Project experiment:
    MIROC-ESM-CHEM55, HadGEM2-ES56,57, and GFDL-CM358, downloaded from the WorldClim
    1.4 (www.worldclim.org)54.

    '
  19: "Source material here.\nEvaluation overview: \"Using these variables, we employed\
    \ MaxEnt v3.362 for predicting the current and future probability of occurrence\
    \ of target species.\"\nDrivers of Risk: \"Given that land-use scenarios explicitly\
    \ incorporated areas for bioenergy crops and afforestation for GHG mitigation\
    \ activity...bioenergy crops and afforestation were merged into cropland and forests,\
    \ respectively.\" \"we employed MaxEnt v3.362 for predicting the current and future\
    \ probability of occurrence of target species...by using the five land-use and\
    \ 19 bioclimatic variables.\"\nQuantitative material: \"We used models with Boyce\
    \ index64 > 0 based on the 95 % confidence interval for the subsequent analyses...We\
    \ applied the average of the 90 % sensitivity threshold to minimize the false-negative\
    \ fractions and to avoid underestimating the suitable habitat area65.\"\nMethodology:\
    \ \"AIM/CGE implements climate change mitigation in the form of a global uniform\
    \ carbon tax on GHG emissions...T h e a l l ocation of land by sector for 17 regions\
    \ is formulated as a multinomial logit function...regional land-use is further\
    \ downscaled...we relied on t h e Shared Socioeconomic Pathways (S S P s) framework...Using\
    \ these variables, we employed MaxEnt v3.362 for predicting...We then excluded\
    \ explanatory variables showing collinearity...We selected the most parsimonious\
    \ combination of explanatory variables based on corrected Akaike information criterion...we\
    \ discarded t h o s e w i t h poor performance for subsequent analyses based on\
    \ 10-fold cross validation...for future scenarios, we explicitly included a species\u2019\
    \ ability to disperse and track the shifting climate.\"\nMore Notes: \"bioenergy\
    \ crops and afforestation were merged into cropland and forests, respectively.\"\
    \n"
  20: "Source material here.\n- Evaluation overview: \"We projected spatial distributions\
    \ of individual species for the year 2005 and the 2070s at a spatial resolution\
    \ of 30 arcminutes (coarse grids; n = 32,670). For both estimates, we obtained\
    \ the total number of species present in each coarse grid (hereafter, \u03B3-diversity).\
    \ Based on these projections, we calculated changes in species richness at the\
    \ scale of fine grids (hereafter, \u03B1-diversity) from 2005 to 2070s for different\
    \ scenarios of climate and land-use changes.\"\n- Drivers of Risk: \"The losses\
    \ of suitable habitats due to the combined effects of climate and land-use were\
    \ estimated...\"\n- Quantitative material: \"...the losses of suitable habitats\
    \ due to the combined effects of climate and land-use were estimated to be smaller\
    \ in the mitigation scenario than in the baseline scenario (e.g., approximately\
    \ 17-28% and 22-36% for the mitigation and baseline scenario, respectively, across\
    \ a wide range of organism groups).\"\n- Methodology: \"We projected spatial distributions\
    \ of individual species for the year 2005 and the 2070s at a spatial resolution\
    \ of 30 arcminutes (coarse grids; n = 32,670). For the former year, we also projected\
    \ spatial distributions of individual species at the spatial resolution of 30\
    \ arcseconds (fine grids; n = 115,426,714). Based on these projections, we calculated\
    \ changes in species richness at the scale of fine grids...Species-area and endemics-area\
    \ relationships (SARs and EARs, respectively) for the year 2005 were unique to\
    \ each of the coarse grids...two spatially explicit simulations for species co-extinction\
    \ and co-immigration...\"\n- Highlights: \"...estimated to be smaller in the mitigation\
    \ scenario than in the baseline scenario...across a wide range of organism groups.\"\
    \n"
  21: "yaml\nEvaluation overview: \"Forest productivity (%) based on parameters of\
    \ the elasticity of substitution (\u03B8), which we estimated for forest biomes\
    \ worldwide17. The  elasticity of substitution can be used to estimate forest\
    \ productivity based on proportional changes in tree species richness (i.e., \u03B1\
    -diversity).\"\nDrivers of Risk: \"By comparing the number of widespread common\
    \ species in each coarse grid between the year of 2005 and 2070s, we obtained\
    \ the number of common species extinct or immigrated.\"\nQuantitative material:\
    \ \"We calculated proportional changes in \u03B1-diversity from the year 2005\
    \ to the period of 2070s (%) and converted them into proportional changes in forest\
    \ productivity (%)....total NPP was approximately 43.78 Pg C yr-1.\"\nMethodology:\
    \ \"We used extreme gradient boosting (XGBoost)70 to obtain machine learning regressions\
    \ for predicting the number of species co-extinct and co-immigrated...By comparing\
    \ the number of widespread common species in each coarse grid between the year\
    \ of 2005 and 2070s, we obtained the number of common species extinct or immigrated...This\
    \ information was combined with our XGBoost regressions to obtain the potential\
    \ number of subordinate species co-extinct and co-immigrated in each coarse grid....When\
    \ we observed extinctions of some species for the 2070s in a given coarse grid,\
    \ we converted this total number of species lost into a proportion of habitats\
    \ that was required for losing these species based on the unique EAR71....When\
    \ we observed immigration by some species for the 2070s in a coarse grid, then\
    \ we converted this total number of species gained into a proportion of habitat\
    \ that was required to gain these species based on the unique SAR71....We calculated\
    \ proportional changes in \u03B1-diversity from the year 2005 to the period of\
    \ 2070s (%) and converted them into proportional changes in forest productivity\
    \ (%) based on parameters of the elasticity of substitution\"\n"
