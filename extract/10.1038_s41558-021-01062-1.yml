Methodology:
  3: Combined ecological modelling, estimates of proportional changes in primary productivity
    due to richness changes, and MODIS-derived net primary productivity (NPP) to estimate
    changes in biomass production. Used five shared socioeconomic pathways (SSPs)
    with mitigation and baseline scenarios, relying on three General Circulation Models
    (GCMs) with two representative concentration pathways (RCPs) in each SSP.
  4: Analysis is conducted through quantifying effects as log ratios and covering
    various biomes.
  7: The study explicitly considers the dispersal ability of each tree species. The
    paper mentions that they did not separate the individual influences of different
    climate mitigation practices, and did not fully account for management and opportunity
    costs in their estimates of the change in social cost from conserving species
    and productivity.
  13: The analysis uses ridge density plots to assess species loss under different
    shared socio-economic pathways (SSPs) and ensembles results across three general
    circulation models (GCMs).
  14: Effect sizes calculated at the local scale (30 arcseconds) for 14 biomes with
    results shown for five SSPs and three GCMs.
  15: Biome-level sums of the effect of climate change mitigation are shown using
    radar charts, comparing mitigation and baseline scenarios across five SSPs. Mean
    values across three GCMs are used. Order of biomes in radar charts based on per-area
    productivity loss.
  16: "The effect sizes of \u0394P were calculated at the local scale (30 arcseconds\
    \ cells). Results are ensembled across three GCMs. The analysis projects from\
    \ 2005 to the 2070s. Subregions are based on IPBES7."
  17: Generalized additive mixed model used to estimate relationships and 95% confidence
    intervals; results are shown for five SSPs across three GCMs.
  18: Future climate scenarios were based on two Representative Concentration Pathways
    (RCPs), with targets set for the 2070s using data from three General Circulation
    Models.
  19: Uses AIM/CGE model for land-use scenarios under different SSPs and RCPs. Then,
    it uses MaxEnt v3.3 to predict species occurrence probability. It considers dispersal
    traits for future scenarios. Collinearity among explanatory variables is considered,
    and model selection is based on corrected Akaike information criterion. It also
    uses 10-fold cross-validation. The analysis is applicable to current and future
    conditions under different SSP and RCP scenarios.
  20: "Projected spatial distributions of individual species for the year 2005 and\
    \ the 2070s at a spatial resolution of 30 arcminutes. Also projected spatial distributions\
    \ of individual species at the spatial resolution of 30 arcseconds for the year\
    \ 2005. Species-area and endemics-area relationships (SARs and EARs, respectively)\
    \ were used to estimate \u03B1-diversity in the year 2005. Spatially explicit\
    \ simulations for species co-extinction and co-immigration were run."
  21: "Species distribution modelling is used to predict species extinctions and immigrations.\
    \ Extreme gradient boosting (XGBoost) is used to predict the number of species\
    \ co-extinct and co-immigrated. Proportional changes in habitable area are estimated\
    \ based on species extinction/area relationships (EARs) and species-area relationships\
    \ (SARs). The elasticity of substitution is used to estimate forest productivity\
    \ based on proportional changes in \u03B1-diversity. Analysis applies to the period\
    \ of 2070s relative to 2005."
  22: "Analysis was done using fine grid data for ~115 million grids; it involved\
    \ comparing baseline and mitigation scenarios to calculate reductions in species\
    \ loss (\u0394SR) and productivity (\u0394P)."
  23: Generalized additive model (GAM) with the CSCC as an explanatory variable; Generalized
