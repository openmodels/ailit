  53: "\nMethodology: \"The analysis is performed using MaxEnt to convert the probability\
    \ of occurrence into a binary map and calculate the area of potentially suitable\
    \ habitat. `The probability of occurrence was converted into the binary map by\
    \ using the threshold (see section Threshold selection), then we calculated the\
    \ area of potentially suitable habitat.`\"\nMethodology: \"Post-processing involves\
    \ discarding predicted suitable habitats beyond current native ranges and on unconnected\
    \ landmasses since the last glacial maximum. `Current: Predicted suitable habitats\
    \ may appear beyond the species\u2019 native ranges. For each species, we discarded\
    \ projected suitable habitats if (1) they were beyond the current native regions\
    \ recorded in the IUCN species database, or (2) if they are on a landmass that\
    \ has not been connected to other landmasses with occurrence points since the\
    \ last glacial maximum period.`\"\nMethodology: \"Future habitat predictions consider\
    \ species-specific dispersal distances, using a conservatively estimated buffer\
    \ based on dispersal syndrome and growth form. `Future: To identify potential\
    \ future habitats constrained by dispersal distance, the estimated dispersal distance\
    \ for each species was buffered. Dispersal distance per generation was estimated\
    \ from the formula based on Tamme, et al. 23. We adopted the group 5 formula in\
    \ the \u201CdispeRsal()\u201D function, which requires species-specific data for\
    \ the dispersal syndrome and growth form.`\"\nUncertainty quantification: \"Uncertainty\
    \ arises from potential disequilibrium between climate change and species dispersal,\
    \ and limitations in considering exceptional long dispersal events. `Disequilibrium\
    \ between climate change and species dispersal is often reported52; generally\
    \ limited dispersal ability of trees as a sessile organism and habitat fragmentation\
    \ make it difficult for species to track climate change. Also, events such as\
    \ an exceptional long dispersal53 were not considered in this study.`\"\nUncertainty\
    \ quantification: \"Uncertainty also exists due to the use of three GCMs for each\
    \ of two RCP scenarios. `Uncertainty in scenarios: We used the three GCMs for\
    \ each of the two RCP.`\"\n"
