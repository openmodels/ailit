  37: No relevant information
  39: Species distribution modelling was performed using tree and shrub records from
    the Global Biodiversity Information Facility (GBIF), filtered by native ranges
    using the IUCN Red List. The modeling was conducted at both 30 arcminute (coarse)
    and 30 arcsecond (fine) spatial resolutions. Land-use and climatic variables were
    used in the models, but future land-use variables were only available at the coarse
    grid scale, limiting fine-scale modeling to the present period. Occurrence records
    were limited to one per grid, and only species with 30 or more records were included,
    resulting in 1,755 and 934 target tree species for fine and coarse grids, respectively.
    Bioclimatic variables were obtained from WorldClim 1.4, and land-use variables
    were obtained from the MODIS Land Cover Type for the year 2005.
  40: Land-use changes are modeled using AIM/CGE, which applies a global carbon tax
    and considers socioeconomic factors via the SSPs framework.
  41: Uses MaxEnt v3.3 to predict the current and future probability of occurrence
    of target species, incorporating sampling bias with the bias background approach;
    selects explanatory variables based on the corrected Akaike information criterion
    (AICc); tests regularization coefficients; assesses model performance using the
    continuous Boyce index (CBI)
  42: Uses species distribution models (SDMs) to project future habitat suitability
    based on climate and land-use scenarios for the 2070s. Dispersal ability is considered,
    estimated from life-history traits. Species richness is calculated at coarse (30
    arcminutes) and fine (30 arcseconds) spatial resolutions. Species-area and endemics-area
    relationships (SARs and EARs) are used to estimate productivity changes at the
    fine scale.
  44: Analysis uses machine learning regressions (XGBoost) and species distribution
    modeling, with results applicable to the period between 2005 and the 2070s.
  45: The analysis uses elasticity of substitution and NPP datasets, estimated from
    MODIS imagery, at a fine grid scale while assuming proportional changes from coarse
    grid scales.
  46: The study uses mixed-effects meta-regression at the biome level, and generalized
    additive mixed models (GAMMs) to analyze the relationship between social cost
    of carbon and productivity loss reduction.
  47: Summed up the reduction in productivity loss across all countries, under each
    of SSPs and GCMs. Compared baseline and mitigation scenarios.
  48: MaxEnt model for predicting the distribution probability of woody vascular plant
    species, iteratively using combinations of explanatory variables, selecting the
    most parsimonious combination based on AICc, and tuning the regularization parameter
    (beta).
  50: The model performance was assessed using 10-fold cross-validation with predictor
    variables from WorldClim 1.4 and MODIS Land Cover Type data.
  51: "Climatic data for coarse-scale were calculated by using the \u201Caggregate\u201D\
