  23: " \nthus summed up the differences between the \u0394Pbaseline and \u0394Pmitigation\
    \ within each country and multiplied these values by the area of each country\
    \ (Pg C yr-1). For each of the individual combinations of SSPs and GCMs, we relied\
    \ on a generalized additive model (GAM) with the CSCC as an explanatory variable.\
    \ To ensemble results across the GCMs, we used a generalized additive mixed model\
    \ (GAMM) with the GCMs as a random effect and the CSCC as an explanatory variable.\
    \ We additionally checked if the results were affected by land area, using the\
    \ GAMMs. Lastly, we summed up the reduction in productivity loss across all countries,\
    \ under each of SSPs and GCMs. This gave us the estimate of global productivity\
    \ conservation, corresponding to the value, global \u2211 (\u0394Pbaseline \u2013\
    \u0394Pmitigation).\n"
