Quantitative material:
  2: Greenhouse gas mitigation could avoid a 9-39% reduction in terrestrial primary
    productivity over the next 50 years.
  3: Quantified future shifts in species richness at the local scale (30 arcseconds,
    ~115 million grids), and assessed proportional changes in primary productivity
    in response to richness changes. Also quantified changes in biomass production
    due to tree diversity changes, aggregated to biome, national, and regional scales.
  4: Mitigation is estimated to reduce productivity losses by 9-39% compared to a
    baseline of unabated warming.
  5: The conservation of biodiversity-dependent annual productivity could correspond
    to 4.9-6.7% of the present total NPP in the terrestrial areas analyzed.
  13: The study provides percentage changes in local tree species loss, indicating
    reductions between approximately 3.0% and 61.3% due to mitigation efforts.
  14: Mitigation efforts lead to approximately 8.8-38.9% reductions in productivity
    loss compared to the baseline scenario.
  15: Shows the proportional contribution of productivity loss resulting from species
    loss in each biome to global productivity loss under mitigation and baseline scenarios
    (%). Percentages range from 0% to 40% in the radar charts.
  16: "Effect sizes of \u0394P are calculated at a local scale, with results presented\
    \ for 17 subregions and five SSPs. The effect sizes range from approximately -0.3\
    \ to 0.3, with means and 95% confidence intervals provided."
  17: Productivity conservation corresponds to 4.9-6.7% of total net primary productivity
    in the terrestrial areas analyzed.
  19: Mentions using a 90% sensitivity threshold. It also uses Boyce index > 0 (based
    on 95% confidence interval) as a threshold for model selection.
  20: Losses of suitable habitats due to the combined effects of climate and land-use
    were estimated to be smaller in the mitigation scenario than in the baseline scenario
