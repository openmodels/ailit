  1: null
  2: Greenhouse gas mitigation could help maintain tree diversity and thereby avoid
    a 9-39% reduction in terrestrial primary productivity across differ biomes, which
    cold otherwise occur over the next 50 years. Countries that will incur the greatest
    economic damages from climate change stand to benefit the most from conservation
    of tree diversity and primary productivity, which contributes to climate change
    mitigation. Our results emphasize an opportunity for a triple win for climate,
    biodiversity and society. Forest productivity is often higher in species-rich
    forests, consequently absorbing more carbon than species-poor forests. Thus, conserving
    biodiversity, and particularly the diversity of tree species may have a previously
    unquantified contribution to global climate change mitigation.
  3: null
  4: "  \nWe quantified how efforts to mitigate climate change could alleviate species\
    \ loss (\u0394SR) and thereby avoid biodiversity-dependent productivity loss (\u0394\
    P) at the local-scale as log ratios...\n          \nWe found that, in many biomes,\
    \ climate change mitigation could substantially reduce the global loss of tree\
    \ diversity...\nThis, in turn, is expected to reduce the loss of productivity\
    \ that would otherwise be expected to result from biodiversity loss...\n\nClimate\
    \ change mitigation is estimated to curtail productivity losses by approximately\
    \ 9-39% compared to the baseline scenario of unabated warming...\n\nThe alleviated\
    \ loss of tree diversity and the resultant conservation of biodiversity-dependent\
    \ productivity are especially substantial in colder and drier biomes compared\
    \ to warmer and wetter biomes... the poor dispersal ability of trees (coupled\
    \ with the pace of climate change and land-use change) generally makes it difficult\
    \ for species to track their environmental optimum under anthropogenic warming...\n\
    \nOverall, climate change mitigation efforts conserve the diversity of woody plant\
    \ species and primary productivity, which contributes to carbon storage in terrestrial\
    \ ecosystems.   \n"
  5: This page discusses how countries with high country-level social costs of carbon
    also benefit from maintaining primary productivity by safeguarding tree diversity.
    It mentions that the conservation of biodiversity-dependent annual productivity
    could correspond to approximately 4.9-6.7% of the present total NPP in the terrestrial
    areas analyzed. The page highlights the significant potential of ambitious climate
    change mitigation efforts to reduce the externalized cost of carbon. The analysis
    considers the impact of tree diversity on productivity and economic damages linked
    to climate change mitigation efforts.
