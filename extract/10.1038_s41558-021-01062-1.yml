  7: "Source material here: In our estimates of the change in social cost from conserving\
    \ species and productivity (Fig. 6), we did not fully account for management and\
    \ opportunity costs. Nonetheless, our estimates provide a first global assessment\
    \ of the contribution of biodiversity in forests to climate change mitigation\
    \ on which future refinements can build upon. In this study, we did not separate\
    \ the individual influences of different climate mitigation practices (e.g., reforestation,\
    \ bioenergy production, and low-carbon energy use) on biodiversity and primary\
    \ productivity, but doing so could help identify drivers underlying such inconsistent\
    \ responses in the future. Although the dispersal ability of each tree species\
    \ is explicitly considered in our analysis, it is highly likely that novel combinations\
    \ of species will emerge in the future, resulting from idiosyncratic events (e.g.,\
    \ exceptional long-distance dispersal46) and human influences (e.g., climate-suitable\
    \ planting and assisted migration12,31). We advocate for the protection and restoration\
    \ of biologically diverse forests, because they can make a substantial contribution\
    \ to climate change mitigation16,19, helping to avoid irreversible change to the\
    \ Earth system1. Carbon storage in deadwood and soil\u2014significant drivers\
    \ of terrestrial carbon dynamics19,50\u2014was also not considered in this study.\
    \ Finally, in our estimates of the change in social cost from conserving species\
    \ and productivity (Fig. 6), we did not fully account for management and opportunity\
    \ costs. Although the dispersal ability of each tree species is explicitly considered\
    \ in our analysis... In this study, we did not separate the individual influences\
    \ of different climate mitigation practices... Carbon storage in deadwood and\
    \ soil\u2014significant drivers of terrestrial carbon dynamics19,50\u2014was also\
    \ not considered in this study."
