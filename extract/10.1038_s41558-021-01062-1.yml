    \ the average of the 90   % sensitivity threshold to minimize the false-negative\
    \ fractions and to avoid underestimating the suitable habitat  area. For the future\
    \ scenarios, a species\u2019 ability to disperse and track the shifting climate,\
    \ a crucial determinant of future potential for range shifts, was explicitly considered.\
    \ Because dispersal ability is strongly related to life-history traits, we collected\
    \ information on life-history traits for all target species and estimated dispersal\
    \ distance for each species by the 2070s. Here dispersal distance per generation\
    \ was estimated from the formula based on an earlier work; we adopted \u2018group\
