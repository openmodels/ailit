  55: "Source material here: Supplementary Table 2. Narratives of t  h e  Shared Socioeconomic\
    \ Pathways (S  S  P ) . See Riahi, et al. 13 for further details. SSP1 Sustainability\
    \ \u2013 Taking the Green Road (Low challenges to mitigation and adaptation):\
    \ The world shifts gradually, but pervasively, toward a more sustainable path,\
    \ emphasizing more inclusive development that respects perceived environmental\
    \ boundaries. Management of the global commons slowly improves, educational and\
    \ health investments accelerate the demographic transition, and the emphasis on\
    \ economic growth shifts toward a broader emphasis on human well-being. Driven\
    \ by an increasing commitment to achieving development goals, inequality is reduced\
    \ both across and within countries. Consumption is oriented toward low material\
    \ growth and lower resource and energy intensity. SSP2 Middle of the Road (Medium\
    \ challenges to mitigation and adaptation): The world follows a path in which\
    \ social, economic, and technological trends do not shift markedly from historical\
    \ patterns. Development and income growth proceeds unevenly, with some countries\
    \ making relatively good progress while others fall short of expectations. Global\
    \ and national institutions work toward but make slow progress in achieving sustainable\
    \ development goals. Environmental systems experience degradation, although there\
    \ are some improvements and overall, the intensity of resource and energy use\
    \ declines. Global population growth is moderate and levels off in the second\
    \ half of the century. Income inequality persists or improves only slowly and\
    \ challenges to reducing vulnerability to societal and environmental changes remain.\
    \ SSP3 Regional Rivalry \u2013 A Rocky Road (High challenges to mitigation and\
    \ adaptation): A resurgent nationalism, concerns about competitiveness and security,\
    \ and regional conflicts push countries to increasingly focus on domestic or,\
    \ at most, regional issues. Policies shift over time to become increasingly oriented\
    \ toward national and regional security issues. Countries focus on achieving energy\
    \ and food security goals within their own regions at the expense of broader-based\
    \ development. Investments in education and technological development decline.\
    \ Economic development is slow, consumption is material-intensive, and inequalities\
    \ persist or worsen over time. Population growth is low in industrialized and\
    \ high in developing countries. A low international priority for addressing environmental\
    \ concerns leads to strong environmental degradation in some regions. SSP4 Inequality\
    \ \u2013 A Road Divided (Low challenges to mitigation, high challenges to adaptation):\
    \ Highly unequal investments in human capital, combined with increasing disparities\
    \ in economic opportunity and political power, lead to increasing inequalities\
    \ and stratification both across and within countries. Over time, a gap widens\
    \ between an internationally connected society that contributes to knowledge-\
    \ and capital-intensive sectors of the global economy, and a fragmented collection\
    \ of lower-income, poorly educated societies that work in a labor intensive, low-tech\
    \ economy. Social cohesion degrades and conflict and unrest become increasingly\
    \ common. Technology development is high in the high-tech economy and sectors."
