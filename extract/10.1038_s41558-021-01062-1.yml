Highlights:
  2: Conserving tree diversity can lead to a triple win for climate mitigation, biodiversity,
    and societal benefits, emphasizing the role of reforestation programs.
  3: Efforts to mitigate climate change can reduce climate impacts on tree diversity,
    safeguarding the ability of forests to store carbon. Examines how changes in tree
    diversity resulting from climate change can influence productivity at various
    scales.
  4: Climate change mitigation preserves tree diversity and productivity, benefiting
    colder and drier biomes more.
  5: Ambitious climate change mitigation efforts, including biodiversity conservation,
    have significant potential to reduce the externalized cost of carbon.
