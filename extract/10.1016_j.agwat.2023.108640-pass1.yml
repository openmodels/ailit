  10: "yaml\nEvaluation overview: \"To study the possible effects of climate variability\
    \ on Y, ET, and WP and evaluate the functioning of the different cropping systems,\
    \ we used a principal component analysis (PCA) including five climate variables\
    \ (Fig. 5).\"\nDrivers of Risk: \"The first component PC1 explained 49.8% of the\
    \ variance and had Y and WI as main negative drivers and VPD and TA as main positive\
    \ factors...The variation along the first component was explained by TA and PPFD\
    \ in the positive side of the axes and WI and SWC on the negative side while,\
    \ along the second component, Y and WP explained most of the variation.\"\nQuantitative\
    \ material: \"Pearson\u2019 s correlation between WP, Y and ET independent of\
    \ cropping system (Supplementary Figure 4), showed that WP was significantly correlated\
    \ with Y but not with ET. The correlation coefficient between WP and Y was 0.9\
    \ for maize and 0.83 for soybean...WI showed the highest correlations with WP\
    \ (R=0.67, p  = 0.05, rainfed site) and Y (R=0.79,  p   <  0.05, rainfed site)\
    \ among the three management parameters.\"\nMethodology: \"To study the possible\
    \ effects of climate variability on Y, ET, and WP and evaluate the functioning\
    \ of the different cropping systems, we used a principal component analysis (PCA)\
    \ including five climate variables (Fig. 5)...To study the net effect of climate\
    \ on each of the cropping systems, we performed a correlation analysis including\
    \ the five previously defined climate variables (Fig. 6).\"\nHighlights: \"Pearson\u2019\
    \ s correlation between WP, Y and ET independent of cropping system (Supplementary\
    \ Figure 4), showed that WP was significantly correlated with Y but not with ET...For\
    \ maize, the first two components of the PCA explained 73.1% of the variance.\
    \ There was a clear separation between the irrigated and rainfed sites. For soybean,\
    \ the PCA analysis did not show any significant separation between irrigated and\
    \ rainfed sites.\"\n"
  11: Source material here. Our results indicated that irrigated maize in rotation
    had the highest WP (2.23 kg m-3) compared to irrigated continuous maize (2.08
    kg m-3) and rainfed maize in rotation (1.82 kg m-3), with significant differences
    only observed between irrigated and rainfed systems. ... This study highlights
    the importance of climate variability and management in determining crops WP.
    The results of the PCA model showed that the five inter-related climatic variables,
    along with Y and ET explained most (up to 73.1%) of the variance under the different
    cropping systems analyzed. In rainfed maize systems, the positive correlation
    between Y and WI suggests that increasing water availability can improve crop
    productivity, while higher VPD and TA increase the atmospheric water demand and
    can result in stomatal closure, reducing plant carbon uptake through photosynthesis
    and Y. ... For soybean, the irrigated rotation had higher WP (0.81 kg m-3), though
    differences were non-significant, compared to the rainfed rotation (0.75 kg m-3).
    In this study, we found that WP increased by18.4% under irrigated maize rotation
    compared to rainfed rotation. In contrast, the increase in WP was only 7.2% when
    comparing irrigated continuous maize to irrigated maize in rotation. ... Despite
    the complexity of interpreting results attributed to the absence of replicates
    within years which is mainly due to the elevated cost of maintaining such experiment
    and the complexity of the used techniques, the dataset allowed us to isolate the
    effects of management (cropping system) from those of climate variability to understand
    changes in WP... The separation between irrigated and rainfed soybean was less
    apparent than that of maize... The results suggest that Y is more determinant
    in the year-to-year changes to WP than ET.
  12: "Source material here.\nEvaluation overview: \"The findings of this study provide\
    \ valuable insights into the relationship between WP, Y, and ET with management\
    \ and climate variability in three major cropping systems in the midwestern U.S.\"\
    \nDrivers of Risk: \"VPD was the most important determinant of maize WP, with\
    \ the highest effect on Y (correlation R=\00.7, p   <          0.05), ... SWC\
    \ was determinant in soybean\u2019s Y in both irrigated and rainfed systems.\"\
    \nQuantitative material: \"Compared to rainfed systems, WP, Y, and ET were 18.4%,\
    \ 27.6% and 11.8%, respectively, higher in irrigated maize rotation and 7.4%,\
    \ 12.9%, and 5.1%, respectively, higher in irrigated soybean rotation.\"\nMethodology:\
    \ \"The year-to-year changes in WP were mainly related to changes in Y rather\
    \ than ET and were mainly due to differences in crops GPP as result of differences\
    \ in management and particularly WI.\"\nHighlights: \"We found that irrigated\
    \ maize systems had the highest WP among the studied cropping systems ... increasing\
    \ the maize Y and maintaining minimum evaporation rates ... enhancing soil water\
    \ holding capacity ... could be crucial to enhance soybean\u2019s WP.\"\n"
