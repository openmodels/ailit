Drivers of Risk:
  3: Variations in water input (precipitation and irrigation) are drivers of rainfed
    maize WP and Y. Vapor pressure deficit is negatively correlated with Y in rainfed
    maize, and therefore a determinant in WP. Soil water content is correlated with
    Y and WP for soybean.
  4: The study examines the impact of management practices and interannual climate
    and water variability on WP.
  5: The study focuses on differences in irrigation methods and crop rotations, which
    could impact water use and vulnerability to drought or water scarcity.
  6: The study examines the impact of climate variability on cropping systems through
    variations in gross primary production (GPP) and ecosystem carbon exchange.
  7: Water input (WI), air temperature (TA), vapor pressure deficit (VPD), photosynthetic
    photon flux density (PPFD) and soil water content (SWC) are impacting crop outcomes.
    Irrigation leads to significantly higher SWC in irrigated sites. Precipitation
    is a main driver in the rainfed site.
  8: Irrigation (yes/no) is a key factor impacting yield, evapotranspiration, and
    water productivity.
  10: Climate variability, including air temperature (TA), vapor pressure deficit
    (VPD), and photosynthetic photon flux density (PPFD), impacts yield and water
    productivity.
  11: Climate variability, including VPD, TA, PPFD, SWC, and WI, affect WP and Y.
    WI is a limiting factor for Y in rainfed systems, while VPD and TA increase atmospheric
    water demand, potentially reducing carbon uptake and Y.
  12: Climate variability significantly affects WP, with vapor pressure deficit (VPD)
    reducing maize yield and soil water content (SWC) being crucial for soybean yield.
Evaluation overview:
  1: Long-term croplands water productivity in response to management and climate
    in the Western US Corn Belt.
  3: Crop yield (Y), crop evapotranspiration (ET), and water productivity (WP, ratio
    of Y and ET) are evaluated.
  4: The paper evaluates the differences in Water Productivity (WP), yield (Y), and
    evapotranspiration (ET) among three major cropping systems in the Eastern Nebraska
    US Corn Belt.
  5: No direct outcomes like mortality or productivity loss are discussed on this
    page.
  6: "The analysis evaluates differences in agricultural productivity using gross\
    \ primary production (GPP) among cropping systems and crops over the period 2001\u2013\
    2014."
  7: Evaluates the impact of different cropping systems (irrigated continuous maize,
    irrigated maize-soybean rotation, and rainfed maize-soybean rotation) on crop
    yield (Y), evapotranspiration (ET), and water productivity (WP) for maize and
    soybean.
  8: Yield (Y), evapotranspiration (ET), and water productivity (WP) are evaluated
    for maize and soybean crops.
  9: Temporal pattern of yield, evapotranspiration, and water productivity for selected
    growth seasons in different cropping systems.
  10: The paper evaluates yield (Y), evapotranspiration (ET), and water productivity
    (WP) for maize and soybean cropping systems.
  11: Water productivity (WP) of maize and soybean crops is evaluated, along with
    yield (Y).
  12: The study evaluates water productivity (WP) in maize and soybean cropping systems
    in the midwestern U.S., focusing on yield (Y) as the main variable.
Highlights:
  3: Significant differences in WP were found between irrigated and rainfed sites,
    mainly due to variations in Y rather than ET. No significant effect of crop rotation
    on measured responses was detected.
  4: The primary objective is to assess WP, Y, and ET differences among cropping systems,
    hypothesizing higher WP in irrigated sites due to enhanced water and nutrient
    availability compared to rainfed sites.
  7: Irrigated crops generally had higher annual yield, ET, and WP compared to rainfed
    crops. Crop rotation had a non-significant effect. ET was significantly correlated
    with GPP. Correlations with SWC were mostly non-significant, indicating a lag
    effect. PPFD, TA and VPD showed significant association with GPP in the irrigated
    site.
  8: Irrigated maize generally has higher yield, evapotranspiration, and water productivity
    compared to rainfed maize. Quantifies the percentage reduction in yield, ET, and
    WP when maize and soybean are rainfed vs. irrigated. Continuous irrigated maize
    vs. rotation-based irrigated maize does not substantially change yield, evapotranspiration,
    and water productivity.
  10: Water productivity is more significantly correlated with yield than evapotranspiration;
    irrigation impacts maize differently than soybean.
  11: Irrigated maize in rotation showed the highest WP. Climate variability and management
    practices are both important in determining WP. Yield is more determinant in the
    year-to-year changes to WP than ET.
  12: Irrigated systems showed higher WP and yield compared to rainfed systems, with
    irrigation scheduling and soil water capacity being crucial factors.
Methodology:
  3: "Data collected over a 20-year period (2001\u20132020) was used to investigate\
    \ interannual variability in Y, ET, and WP in three major cropping systems in\
    \ Eastern Nebraska: irrigated continuous maize, irrigated maize-soybean rotation,\
    \ and rainfed maize-soybean rotation."
  4: The analysis is performed using data from three monitored sites in Eastern Nebraska,
    which share similar climate and edaphic properties and are part of the AmeriFlux
    and Long Term Agro-Ecosystem Research networks.
  5: Eddy Covariance flux measurements are used to estimate crop evapotranspiration
    (ET) by measuring latent and sensible heat fluxes and other variables.
  6: "The analysis is performed using statistical methods including ANOVA, Tukey's\
    \ HSD test, T-test, Pearson and Spearman\u2019s correlation coefficients, and\
    \ Principal Component Analysis (PCA) to evaluate and compare variations and impacts\
    \ on cropping systems across maize and soybean years."
  7: The study examines correlations between climatic variables and gross primary
    productivity (GPP) using data from three cropping systems over the period 2001-2020.
    Statistical significance is tested using a 95% confidence interval. The study
    looks at temporal patterns of ET and GPP both hourly and daily. Correlation analysis
    conducted on daily values between 12h and 13h.
  8: The analysis compares irrigated continuous maize (US-Ne1), irrigated maize-soybean
    rotation (US-Ne2), and rainfed maize-soybean rotation (US-Ne3) across multiple
    years (2001-2020). Statistical significance is assessed, indicated by different
    letters.
  9: Principal component analysis (PCA) results grouped by site with analysis of photosynthetic
    photon flux density, air temperature, vapor pressure deficit, water input, and
    soil water content.
  10: Principal component analysis (PCA) used with five climate variables to evaluate
    the impact on maize and soybean cropping systems, along with correlation analyses.
  11: Field scale and long-term observational data were used from ENREEC sites in
    the midwestern US. PCA model was used to evaluate the effects of management (cropping
    system) and climate variability on water productivity of different cropping systems.
  12: The analysis focuses on the relationship between WP, yield, and evapotranspiration
    (ET) within different management and climate variability contexts.
More Notes:
  3: The study focuses on the Western US Corn Belt.
  7: The three sites are located within 1.6 km of each other. Differences in ET and
    GPP between maize and soybean were most significant during the first half of the
    growing season (June and July). A supplementary figure shows the temporal daily
    pattern averaged over the growing season for PPFD, TA, VPD, WI, and SWC in the
    three sites.
  8: The study focuses on three specific sites (US-Ne1, US-Ne2, US-Ne3). The percentages
    in parentheses represent changes relative to specific baselines (irrigated continuous
    maize or irrigated maize in rotation).
  11: The absence of replicates within years is mentioned as a limitation. Separations
    between irrigated and rainfed soybean were less apparent than for maize.
Quantitative material:
  3: WP was 18.4% higher in irrigated maize in rotation relative to the rainfed site.
    Water input and rainfed maize WP have R=0.67, p=0.05. Water input and Y have R=0.79,
    p<0.05. Vapor pressure deficit and Y in rainfed maize have R=-0.72, p<0.05. Vapor
    pressure deficit and WP have R=-0.7, p<0.05. Soil water content and Y and WP (irrigated)
    have R=0.77. Soil water content and Y and WP (rainfed) have R=0.49, only significant
    in irrigated sites.
  4: The study utilizes long-term experimental data collected over a 20-year period,
    including annual dry grain yield and ET measurements.
  5: The page provides average irrigation, N fertilizer, and planting densities for
    three sites with different agricultural practices.
  6: The paper provides estimates of yearly crop water productivity (WP) calculated
    using a specific equation, indicating differences across the studied cropping
    systems.
  7: 'Maize yield in irrigated continuous site: 1.11 kg m-2, irrigated rotation: 1.17
    kg m-2, rainfed rotation: 0.85 kg m-2. Soybean yield in irrigated rotation: 0.38
    kg m-2, rainfed site: 0.33 kg m-2. Correlations between ET and GPP reaching R=
    0.76 for maize and R= 0.83 for soybean at US-Ne2. Average seasonal ET was 534
    mm for irrigated continuous maize, 527 mm for irrigated rotation, and 465 mm for
    rainfed rotation.'
  8: Provides annual means and standard deviations for yield (kg m-2), evapotranspiration
    (ET) (mm), and water productivity (WP) (kg m-3) from 2001 to 2020. Includes percentage
    changes in yield, ET, and WP comparing rainfed maize/soybean to irrigated maize/soybean.
  9: Includes yield, evapotranspiration, and water productivity data for selected
    growth seasons.
  10: Pearson's correlation coefficient between WP and Y is 0.9 for maize and 0.83
    for soybean; WI correlated with WP (R=0.67) and Y (R=0.79) at rainfed sites.
  11: Irrigated maize in rotation had the highest WP (2.23 kg m-3) compared to irrigated
    continuous maize (2.08 kg m-3) and rainfed maize in rotation (1.82 kg m-3). Irrigated
    soybean had higher WP (0.81 kg m-3) compared to rainfed rotation (0.75 kg m-3),
    though differences were non-significant. WP increased by 18.4% under irrigated
    maize rotation compared to rainfed rotation. WP increased only 7.2% when comparing
    irrigated continuous maize to irrigated maize in rotation.
  12: Compared to rainfed systems, irrigated maize rotation had WP, Y, and ET values
    higher by 18.4%, 27.6%, and 11.8% respectively, and irrigated soybean rotation
    showed increases of 7.4%, 12.9%, and 5.1% respectively.
sourcematerial:
  1: Long-term croplands water productivity in response to management and climate
    in the Western US Corn Belt
  3: null
  4: 'Source material here. Evaluation overview: "The primary objective of this study
    was to quantify and assess the differences in WP, Y, and ET among three major
    cropping systems in the Eastern Nebraska US Corn Belt (Irrigated continuous maize,
    irrigated maize soybean rotation, and rainfed maize soybean rotation), and to
    investigate their response to management and interannual climate and water variability."
    Drivers of Risk: "The primary objective of this study was to quantify and assess
    the differences in WP, Y, and ET among three major cropping systems in the Eastern
    Nebraska US Corn Belt (Irrigated continuous maize, irrigated maize soybean rotation,
    and rainfed maize soybean rotation), and to investigate their response to management
    and interannual climate and water variability." Quantitative material: "In this
    study, we utilized data collected over a 20-year period (including annual dry
    Y and ET from EC measurements)." Methodology: "To accomplish this, we used data
    from three proximate monitored sites in Eastern Nebraska (US) with similar climate
    and edaphic properties...With a long-term monitoring record spanning over 20 years,
    encompassing management history, climate, and flux data, and with the sites sharing
    similar climate, topographic, and soil characteristics, these locations offer
    a unique opportunity to investigate the impact of management practices and climate
    variability on crop production and water utilization." Highlights: "We hypothesized
    that higher WP will be observed in irrigated sites due to increased Y resulting
    from enhanced availability of water and nutrients through irrigation and crop
    rotation...To accomplish this, we used data from three proximate monitored sites
    in Eastern Nebraska (US) with similar climate and edaphic properties."'
  5: null
  6: "GPP is estimated from (Eq. 4): GPP = NEE - Re. To understand differences between\
    \ cropping systems and crops we obtained data on gross primary production (GPP)\
    \ for the period 2001\u20132014. [...] We examined the variations in means among\
    \ cropping systems across various variables. In the case of maize years, the ANOVA\
    \ was performed using the three sites as groups, with year as the repeated effect.\
    \ The Tukey\u2019s Honestly Significant Difference test (Tukey, 1949) was also\
    \ employed to determine the differences between groups where ANOVA indicated significant\
    \ differences. For soybean years, a T-test was utilized to compare the two soybean\
    \ treatments. To study the effects of climate variability on the three studied\
    \ variables, Pearson and Spearman\u2019s correlation coefficients were implemented\
    \ in the analysis (normality of the data was visually assessed to select the used\
    \ parametric or non-parametric tests). To study the variance between the three\
    \ cropping systems including all the studied variables we applied the Principal\
    \ Component Analysis (PCA) on the sets of maize and soybean years."
  7: '

    Evaluation overview: Annual average Y, ET, and WP for the different cropping systems
    are reported in Table 3.

    Drivers of Risk: Maize and soybean had an average growing season of approximately
    165 and 138 days, respectively. PPFD, TA, and VPD did not vary significantly among
    the three sites...In the irrigated sites, the total WI applied to the crops, including
    precipitation and irrigation, ranged from 630 to 646 mm for maize and 586 mm for
    soybean. In the rainfed site, the average cumulative precipitation was 450 mm
    during maize years and 490 mm during soybean years...As a result of irrigation,
    SWC was significantly higher in the irrigated sites (~ 32%) than in the rainfed
    sites (~27%) for both crop types.

    Quantitative material: For maize, the average annual Y was 1.11 kg m-2 in the
    irrigated continuous site and increased to 1.17 kg m-2 (5.6%) under irrigated
    rotation, compared to 0.85 kg m-2 (decline by 23.5%) in rain-fed rotation. For
    soybean, average annual Y was 0.38 kg m-2 for irrigated soybean in rotation and
    0.33 kg m-2 for the rainfed site...ET was significantly correlated with GPP with
    correlation reaching R= 0.76 for maize and R= 0.83 for soybean at US-Ne2....Average
    seasonal ET was 534 mm for irrigated continuous maize, 527 mm for irrigated rotation,
    and 465 mm for rainfed rotation.

    Methodology: A 95% confidence interval was selected to test the significance of
    p-value under the different statistical tests...To further understand these similarities
    between ET and GPP and study the effect of climatic variables on GPP, we examined
    the correlations between their daily values over a narrow temporal window between
    12 h and 13 h, where hourly GPP and ET values were maximum and nearly constant
    (Supplementary Figure 2 and 3).

    Highlights: Significant differences were observed between irrigated and rainfed
    sites, while the rotation effect was non-significant. In general, irrigated crops
    had a higher annual Y, ET, and WP compared to rainfed crops...Additionally, for
    maize, among the climatic variables, TA, VPD, and PPFD were significantly correlated
    with GPP with PPFD exhibiting the highest correlation exceeding R= 0.6, particularly
    at the end of July and beginning of August. On the other hand, correlations with
    SWC were mostly non-significant pointing to a lag effect between the two variables.

    More Notes: Maize and soybean had an average growing season of approximately 165
    and 138 days, respectively. PPFD, TA, and VPD did not vary significantly among
    the three sites, as they were all located within 1.6 km...Differences in ET and
    GPP between maize and soybean were most significant during the first half of the
    growing season (June and July). Supplementary Figure 1 displays the temporal daily
    pattern averaged over the growing season for PPFD, TA, VPD, WI, and SWC in the
    three sites.

    '
