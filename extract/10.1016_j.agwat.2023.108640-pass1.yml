Evaluation overview:
  1: Long-term croplands water productivity in the Western US Corn Belt
  3: Water productivity (WP), defined as the ratio of crop production to water use,
    is evaluated.
  4: This study evaluates the differences in Water Productivity (WP), Yield (Y), and
    Evapotranspiration (ET) among three major cropping systems (irrigated continuous
    maize, irrigated maize-soybean rotation, and rainfed maize-soybean rotation) in
    the Eastern Nebraska US Corn Belt.
  6: No relevant information
  7: Evaluates the impacts of different cropping systems (irrigated continuous maize,
    irrigated maize-soybean rotation, rainfed maize-soybean rotation) and climate
    variables on crop yield (Y), evapotranspiration (ET), and water productivity (WP)
    for maize and soybean.
  8: This provides an overview of yield (Y), evapotranspiration (ET), and water productivity
    (WP) for maize and soybean crops under different irrigation conditions.
  9: The paper discusses the temporal pattern of yield, evapotranspiration, and water
    productivity for different growth seasons in maize and soybean rotations.
  10: The analysis evaluates yield (Y), evapotranspiration (ET), and water productivity
    (WP) for irrigated and rainfed cropping systems of maize and soybean.
  11: Water productivity (WP) of maize and soybean crops in irrigated and rainfed
    systems.
  12: The study provides insights into the year-to-year variations in Water Productivity
    (WP) in maize and soybean cropping systems in the midwestern U.S.
Highlights:
  3: Significant differences in WP were observed between irrigated and rainfed sites,
    mainly attributed to variations in Y rather than ET. No significant effect of
    crop rotation on measured responses was found. Water input is the main management
    factor in rainfed maize WP and Y. Vapor pressure deficit was a determinant in
    WP. Soil water content had the highest correlations with Y and WP for soybean.
  4: The primary objective is to quantify and assess the differences in WP, Y, and
    ET among the three cropping systems and investigate their response to management
    and interannual climate/water variability. A hypothesis is that higher WP will
    be observed in irrigated sites due to increased Y from enhanced water and nutrient
    availability.
  6: No relevant information
  7: Irrigated crops generally had higher annual yield, ET, and WP compared to rainfed
    crops. Crop rotation had a non-significant effect on yield, ET, and WP. ET was
    significantly correlated with GPP with correlation reaching R= 0.76 for maize
    and R= 0.83 for soybean at US-Ne2.
  8: Rainfed maize has a significantly lower yield, ET, and WP compared to irrigated
    maize. Rainfed soybean also shows a reduction in yield, ET and WP compared to
    irrigated soybean, but these reductions are not statistically significant.
  10: Water input showed significant positive correlation with yield and water productivity
    in maize rainfed sites; no significant separation between irrigated and rainfed
    sites for soybean was observed in PCA.
  11: Irrigated maize in rotation has the highest water productivity. Climate variability
    and management practices are important in determining crop water productivity.
    Yield is more determinant in year-to-year changes to WP than ET.
  12: VPD is a major determinant of maize WP. Soil water content is crucial for soybean
    yield and WP. Efficient water management practices enhance WP. Substantial WP
    improvement requires optimization of irrigation and reducing atmospheric evaporative
    demand.
Methodology:
  1: Analysis of long-term croplands water productivity in the Western US Corn Belt
  3: "Data collected over a 20-year period (2001\u20132020) were used to investigate\
    \ the interannual variability in yield (Y), crop evapotranspiration (ET), and\
    \ water productivity (WP) using Eddy Covariance technique."
  4: The study uses data collected over a 20-year period (2001-2020) from three proximate
    monitored sites in Eastern Nebraska, including annual dry yield and ET from Eddy
    Covariance (EC) measurements. Data from 2010, 2012, and 2015 were excluded due
    to hail damage, non-matching rotation, and flux data gaps. Correlations between
    Y, ET, WP and climatic/water-related variables were analyzed to investigate the
    effect of inter-annual climate variability.
  5: The study covered nine years for maize and eight years for soybean, analyzing
    from emergence to harvest each year.
  6: ANOVA and TukeyHSD tests were used to compare maize yields across three sites
    (US-Ne1, US-Ne2, US-Ne3) with year as a repeated effect; T-tests were used to
    compare soybean yields between two treatments; Pearson and Spearman correlation
    coefficients were used to study the effect of climate variability; Principal Component
    Analysis (PCA) was performed to study the variance between the three cropping
    systems.
  7: The study analyzes data from 2001-2020 at ENREEC (location not specified, but
    likely in the US based on the National Climate Assessment context). It uses correlation
    analyses to examine relationships between climate variables, ET, and GPP (Gross
    Primary Productivity). Statistical significance is tested using a 95% confidence
    interval.
  8: The analysis is based on data from 2001 to 2020 at three sites (ENREEC, US-Ne1,
    US-Ne2, US-Ne3) and considers irrigated continuous maize, irrigated maize-soybean
    rotation, and rainfed maize-soybean rotation. Significance testing is used to
    compare values across sites.
  9: Principal component analysis is used to evaluate and group the results by site,
    specifically looking at irrigated and rainfed maize and soybean rotations.
  10: Principal component analysis (PCA) and correlation analyses were used to evaluate
    the effects of climate variables and management parameters on yield and water
    productivity.
  11: Analysis of long-term field scale observational data from ENREEC sites in the
    midwestern US, focusing on irrigated continuous maize, irrigated maize-soybean
    rotation, and rainfed maize-soybean rotation. PCA model used to assess the influence
    of climatic variables on WP.
  12: The study evaluates the relationship between WP, Y, and ET with management and
    climate variability in cropping systems.
More Notes:
  1: The paper is accessible through a University of Nebraska - Lincoln repository.
  3: 'The study focuses on three major cropping systems located in Eastern Nebraska:
    irrigated continuous maize, irrigated maize-soybean rotation, and rainfed maize-soybean
    rotation.'
  4: The three monitored sites are part of the AmeriFlux and LTAR-USDA networks and
    are equipped with Eddy Covariance Flux towers since 2001. The study focuses on
    minimizing uncertainties associated with estimating plant biomass and complex
    ET partitioning.
  6: The study uses data from Ameriflux dataset at an hourly time scale converted
    to daily time series.
  7: The study focuses on maize and soybean in the US Midwest region, and the results
    are specific to the environmental conditions and cropping practices at the study
    sites. The study notes a potential lag effect between SWC and GPP.
  8: The percentage changes in parentheses compare rainfed crops to their respective
    irrigated counterparts, providing a measure of the impact of irrigation on crop
    performance. The study focuses on a specific region (Nebraska, US) and crop types
    (maize, soybean).
  12: Expected decline in maize WP could reach 150% in irrigated systems and 54% in
    rainfed systems due to climate change.
Quantitative material:
  3: 'WP was 18.4% higher in irrigated maize in rotation relative to the rainfed site;
    Water input was correlated with rainfed maize WP (R=0.67, p =0.05) and Y (R=0.79,
    p <0.05); Vapor pressure deficit was negatively correlated with Y in rainfed maize
    (R=-0.72, p <0.05) and WP (R=-0.7, p <0.05); Soil water content correlations with
    Y and WP (irrigated: R=-0.77; rainfed: R=0.49, only significant in irrigated sites).'
  4: The study reports WP in kg m-3 as the amount of dry grain yield per unit of water
    loss through crop ET. Table 1 mentions average total irrigation, N rates, and
    planting densities during the study period (2001-2020).
  5: "Reported planting densities with US-Ne1 continuous maize at 78700 \xB1 4694\
    \ plants ha-1."
  6: Yearly crop Water Productivity (WP) was estimated using equation 3.
  7: 'Maize average annual yield: 1.11 kg m-2 (irrigated continuous), 1.17 kg m-2
    (irrigated rotation), 0.85 kg m-2 (rainfed rotation). Soybean average annual yield:
    0.38 kg m-2 (irrigated rotation), 0.33 kg m-2 (rainfed). ET and WP values provided
    for different cropping systems.'
  8: The table provides annual means and standard deviations for yield (Y), evapotranspiration
    (ET), and water productivity (WP) for different crops and irrigation scenarios.
    It also includes percentage changes in these variables comparing rainfed conditions
    to irrigated conditions.
  10: PCA results show that for maize, the first two components explain 73.1% of the
    variance, and for soybean, 70.4% of the variance.
  11: Irrigated maize in rotation had the highest WP (2.23 kg m-3) compared to irrigated
    continuous maize (2.08 kg m-3) and rainfed maize in rotation (1.82 kg m-3), with
    significant differences only observed between irrigated and rainfed systems. For
    soybean, the irrigated rotation had higher WP (0.81 kg m-3) compared to the rainfed
    rotation (0.75 kg m-3). WP increased by 18.4% under irrigated maize rotation compared
    to rainfed rotation. In contrast, the increase in WP was only 7.2% when comparing
    irrigated continuous maize to irrigated maize in rotation.
  12: Irrigated maize systems had 18.4% higher WP, 27.6% higher yields (Y), and 11.8%
    higher evapotranspiration (ET) compared to rainfed systems. Irrigated soybean
    rotations showed 7.4% higher WP, 12.9% higher Y, and 5.1% higher ET.
