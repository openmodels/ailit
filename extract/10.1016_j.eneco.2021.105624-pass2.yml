Drivers of Risk:
  1: Deviations of temperature and precipitation from their long-term moving average
    historical norms.
  2: Deviations in temperature and precipitation from historical norms and the resulting
    weather shocks are identified as drivers impacting economic outcomes.
  3: Persistent deviations of temperature from historical norms (both positive and
    negative), the pace with which temperatures are rising, and the degree of climate
    variability.
  4: Increases in temperature impact economic growth, as analyzed in the paper.
  5: Persistent deviations of temperature from historical norms negatively impact
    long-run economic growth.
  6: Changes in temperature and precipitation relative to historical norms are impacting
    GDP growth.
  7: Temperature increases are the main shock impacting GDP growth outcomes, with
    a focus on differential effects across income and climate categories.
  8: Persistent increases in annual temperatures above their historical norms impact
    long-run per capita GDP growth.
  9: "The analysis focuses on changes in temperature relative to historical norms\
    \ (\u0303\U0001D447\U0001D456\U0001D461(\U0001D45A)) as the primary driver of\
    \ risk."
  10: Temperature increases, climate variability (volatility of temperature shocks).
  11: Persistent changes in temperature above time-varying norms and increased climate
    variability are the primary drivers of economic impacts.
  12: Persistent increases in temperatures based on the RCP 2.6 and RCP 8.5 scenarios
Evaluation overview:
  1: Impact of climate change on economic activity across countries.
  2: This paper discusses the long-term macroeconomic effects of weather patterns
    transformed by climate change, with a focus on the impact on per capita GDP growth.
  3: Income growth/GDP per capita.
  4: The paper provides an overview of GDP per capita losses as an outcome of temperature
    increases.
  5: The analysis evaluates the long-run impact of temperature deviations from historical
    norms on GDP per capita growth.
  6: The paper evaluates the long-run effects of climate change on per capita real
    GDP growth.
  7: The page evaluates the long-run effects of temperature increases on per capita
    real GDP growth.
  8: The paper evaluates the long-run effects of climate change on per capita real
    GDP growth in poor and hot countries.
  9: The paper evaluates the long-run effects of climate change on per capita real
    GDP growth.
  10: Effects of climate change on per capita real GDP growth.
  11: The outcome being evaluated is the percent loss in GDP per capita by 2100 under
    different climate scenarios.
  12: Percent loss in GDP per capita
Highlights:
  1: Marginal effects of temperature shocks vary across climates and income groups.
  2: The study finds that a series of positive or negative weather shocks has a long-term
    negative effect on per capita GDP growth.
  3: Persistent temperature deviations from historical norms negatively impact income
    growth. Income losses are projected to be significant under high-emission scenarios,
    but can be substantially reduced by adhering to the Paris Agreement objectives.
    Climate variability exacerbates income losses. Adaptation to climate change is
    unlikely to fully offset the negative long-run growth effects.
  4: Countries show varying economic vulnerabilities to temperature increases, with
    some experiencing significant GDP losses while others have minimal impacts.
  5: Long-run economic growth is negatively affected when temperature deviates persistently
    from its historical norm, with significant impacts on GDP per capita growth.
  6: The estimated negative impacts of temperature deviations on GDP growth are consistently
    significant across multiple specifications and methods.
  7: There are no statistically significant differential effects of temperature changes
    on GDP growth for poor versus rich countries or hot versus cold countries, according
    to the models estimated.
  8: Negative growth effects are more severe in hot countries compared to cold ones,
    and poorer countries are disproportionately affected by these weather shocks.
  9: The estimated impact of climate change on per capita real GDP growth is generally
    negative across different country groups (all countries, cold, temperate/hot,
    poor, rich). The magnitude of the impact varies depending on the historical norm
    used (m=20, 30, 40), whether lagged world GDP growth is included, and the country
    group considered. Poor countries tend to experience larger negative impacts. They
    acknowledge potential underestimation due to conservative volatility assumptions
    and international spillover effects, which are not comprehensively accounted for
    in the model.
  10: Climate change leads to substantial output losses, with larger losses under
    unmitigated warming (RCP 8.5). Climate change adaptation could reduce negative
    economic effects, but it is unlikely to offset them entirely. The degree of climate
    variability significantly impacts GDP per capita losses, almost doubling them
    at the global level by 2100 under RCP 8.5.
  11: Abiding by the Paris Agreement would limit economic losses; without policies,
    GDP per capita loss could reach 13% by 2100; income losses are sizeable even in
    cold climates due to faster warming.
  12: Table 6 shows substantial variation in projected GDP per capita losses across
    countries and scenarios. For example, under RCP 8.5 in 2100, the US could experience
    a 6.66-14.32% loss depending on the value of 'm'. Table 7 highlights impact under
    RCP 8.5 scenario with a different assumption for temperature sensitivity.
Methodology:
  1: Uses a stochastic growth model where productivity is affected by deviations of
    temperature and precipitation from historical norms and a panel data set of 174
    countries over the years 1960 to 2014.
  2: The analysis uses a theoretical growth model and employs an econometric approach,
    specifically the half-panel Jackknife FE estimator, to estimate the long-term
    macroeconomic impact of persistent temperature changes.
  3: Panel regressions using annual population-weighted climate data and real GDP
    per capita from 1900 to 2014; counterfactual exercises projecting cumulative income
    effects of annual temperature increases from 2015-2100 based on different RCP
    scenarios and historical trends (1960-2014).
  4: Analysis is conducted using panel ARDL growth regressions based on long-term
    impacts of climate change, with data from 174 countries.
  5: The analysis uses a panel ARDL regression with a fixed effects and half-panel
    Jackknife FE estimator to study the long-run impact of temperature and precipitation
    deviations on GDP growth.
  6: Analysis is performed using fixed effects and half-panel Jackknife fixed effects
    to estimate real GDP growth impacts due to climate change from 1960 to 2014, focusing
    on temperature and precipitation deviations.
  7: The analysis uses panel data models to estimate the impact of temperature shocks,
    specifying interactive terms for rich/poor and hot/cold countries. Mean Group
    (MG) estimators and half-panel Jackknife Mean Group (HPJ-MG) methods are used
    for heterogeneous panel data models.
  8: The analysis uses counterfactual exercises with the HPJ-FE estimation method
    and ARDL specification relying on temperature deviations from historical norms
    and interactions with dummies for poor and hot countries.
  9: "The analysis uses a half-panel Jackknife mean-group estimator. It considers\
    \ two specifications: one excluding and one including lagged world GDP growth.\
    \ The models estimate the impact of temperature changes on GDP growth based on\
    \ historical data (1960-2014) and future projections (RCP 2.6 and RCP 8.5 scenarios\
    \ up to 2099). It incorporates the volatility of temperature around its trend\
    \ (\U0001D70E\U0001D447\U0001D456). Results are applicable to the period 1960-2099\
    \ under specified climate scenarios and assumptions."
  10: Estimates are based on a specific ARDL equation with temperature deviations
    from historical norms as the climate variable. The coefficients are estimated
    by the half-panel Jackknife FE (HPJ-FE) procedure using data from 174 countries
    from 1960-2014. Temperature norms are based on moving averages of the past 30
    years. Future projections compare RCP2.6 and RCP8.5 scenarios to a baseline of
    historical temperature trends (1960-2014).
  11: "Analysis involves heterogeneous panel data estimates and counterfactual exercises\
    \ using RCP 8.5 and RCP 2.6 scenarios during 2015\u20132100."
  12: "The analysis considers persistent increases in temperatures and calculates\
    \ PPP GDP weighted averages (\U0001D451\U0001D456) with \u210E = 16, 36, and 86\
    \ (corresponding to the year 2030, 2050, and 2100, respectively)."
More Notes:
  3: Cold countries are affected by the faster pace of temperature rise compared to
    hot countries. The study uses deviations of temperature and precipitation from
    their historical norms, which are not trended. The paper includes appendices detailing
    a multi-country stochastic growth model, regression analysis, historical climate
    patterns, and additional empirical results.
  6: There is a discussion on the efficacy of adaptation efforts and their geographical
    and sectoral concentration or deficiency.
  9: The paper considers different historical norms for temperature (m = 20, 30, 40
    years). The specifications also includes country-fixed effects, lagged GDP growth
    and a measure of temperature relative to its historical norm. They assume temperature
    shocks are serially uncorrelated and Gaussian random variables. The trend temperature
    rise is calculated using IPCC projections for RCP 2.6 and RCP 8.5 scenarios.
  10: The paper considers the role of adaptation by varying the number of years used
    to calculate the historical temperature norm (m). The shorter the m, the faster
    agents treat higher temperatures as the new norm. The paper finds that the economic
    effects are somewhat larger than those obtained in existing studies in the literature.
  12: The variable 'm' is considered an important parameter in their GDP loss estimate.
    The paper provides access to data and supplementary material through Mendeley
    Data and a link to online supplementary material.
Quantitative material:
  1: "Estimated losses would increase to 13 percent globally if country-specific variability\
    \ of climate conditions were to rise commensurate with annual temperature increases\
    \ of 0.04 \u25E6C."
  3: "A 0.01\xB0C annual rise above historical temperature norm leads to a 0.0543\
    \ percentage point decrease in annual income growth. Under RCP 8.5 scenario, the\
    \ world's real GDP per capita is reduced by 7.22 percent by 2100; with increased\
    \ climate variability, the loss increases to 13.11 percent. Under the Paris Agreement\
    \ (0.01\xB0C per annum increase), the output loss is 1.07 percent. US GDP loss\
    \ under RCP 8.5 in 2100 is estimated at 10.52 percent."
  4: GDP per capita losses range up to 21% by 2100 due to temperature increases, as
    per the counterfactual exercise.
  5: "A persistent 0.01\xB0C increase in temperature above its historical norm reduces\
    \ real GDP per capita growth by approximately 0.0586 percentage points per annum."
  6: The analysis includes estimates of the effects of temperature and precipitation
    changes on GDP growth, such as -0.373*** to -1.105*** for temperature deviations
    and -0.072 to -0.595 for precipitation deviations.
  8: Estimates show that persistent temperature deviations have a statistically significant
    negative effect on GDP growth, with coefficients ranging from -0.551 to -1.029
    depending on the specification.
  9: "The table presents mean group estimates of the long-run effects of climate change\
    \ on per capita real GDP growth, expressed as percentage changes. For example,\
    \ for all 130 countries, excluding the lagged world GDP growth (\U0001D6E5\u0304\
    \U0001D466\U0001D464,\U0001D461\u22121) and using a historical norm of m=20, the\
    \ estimated impact is -0.447% (statistically significant at the 10% level)."
  10: "Under RCP 8.5, a persistent increase in global temperature by 0.04 \xB0C per\
    \ year leads to real per capita output losses of 0.80%, 2.51%, and 7.22% in 2030,\
    \ 2050, and 2100, respectively. Under RCP 8.5 (m=30), losses vary between 0.50\
    \ and 1.20 percent, 1.53 and 3.77 percent, and 4.35 and 10.52 percent in 2030,\
    \ 2050 and 2100, respectively. For the United States, the losses are likely to\
    \ be 70 percent higher if you include climate variability."
  11: Global temperature increase under RCP 8.5 scenario is associated with a 7% reduction
    in GDP per capita by 2100; if climate variability increases, losses could double
    to 13%.
  12: Provides percent loss in GDP per capita by 2030, 2050, and 2100 for the World,
    China, European Union, India, Russia, and the United States under RCP 2.6 and
    RCP 8.5 scenarios for different values of m (20, 30, and 40).
