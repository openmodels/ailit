    Projected GDP impact is for some future year, typically 2100. The shaded area
    represents the GDP per capita losses from our counterfactual exercise in Section
    3. Considering strong evidence of an upward trend in temperatures worldwide, and
    guided by the theoretical growth model with weather and climate variables in Appendix
    A.1, we base our empirical analysis on the following panel ARDL model. The axes
    show temperature increase ranging from 0 to 12 degrees Celsius and GDP per capita
    loss ranging from 0 to 21%. The plot suggests that certain countries may face
    more severe economic impacts from temperature increases, while others may experience
    lesser impacts. We find that at the 5% significance level, output growth is upward
    in only 21 countries out of 174 under consideration.

