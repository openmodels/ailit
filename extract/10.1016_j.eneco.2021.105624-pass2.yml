    \ losses would increase to 13 percent globally if country-specific variability\
    \ of climate conditions were to rise commensurate with annual temperature increases\
    \ of 0.04 \u25E6C.\"\nMethodology: \"Using a panel data set of 174 countries over\
    \ the years 1960 to 2014, we find that per-capita real output growth is adversely\
    \ affected by persistent changes in the temperature...\" \"...using a stochastic\
    \ growth model...\"\nHighlights: \"...per-capita real output growth is adversely\
    \ affected by persistent changes in the temperature above or below its historical\
    \ norm, but we do not obtain any statistically significant effects for changes\
    \ in precipitation.\"\nHighlights: \"We also show that the marginal effects of\
    \ temperature shocks vary across climates and income groups.\"\n"
  2: "yaml\nEvaluation overview: \"This  paper  investigates  the                \
    \ long-term       macroeconomic  effects  of weather patterns transformed by climate\
    \ change across 174 countries over the period 1960 to 2014...We focus on both\
    \ of these issues and develop a theoretical growth model that links deviations\
    \ of temperature and precipitation (weather) from their long-term moving-average\
    \ historical norms (climate) to per capita real output growth (Appendix A.1).\"\
    \nDrivers of Risk: \"We test the predictions of our theoretical growth model using\
    \ cross-country data on per-capita GDP growth and deviations of temperature and\
    \ precipitation from their moving average historical norms over the past fifty-five\
    \ years (1960\u20132014). Our focus on \u2018\u2018deviations\u2019\u2019 is a\
    \ departure from the literature, as changes in the distribution of weather patterns\
    \ (not only averages of temperature and precipitation but also their variability)\
    \ are modelled explicitly; an implicit model of adaptation is introduced; and\
    \ the econometric pitfalls of including trended variables (that is, \U0001D447\
    \U0001D456\U0001D461) in growth regressions are avoided (see Appendix A.2 for\
    \ details).\"\nMethodology: \"Inourempiricalapplication,weallowfordynamicsandfeedbackef-fects\
    \ in the interconnections of climatic and macroeconomic variables...Secondly,\
    \ we use the half-panel Jackknife FE (HPJ-FE) estimator proposed inChudik et al.(2018)\
    \ to deal with the possible bias and size distortion of the commonly-used FE estimator\
    \ (given that       \U0001D447\U0001D456\U0001D461is weakly exogenous).\"\nHighlights:\
    \ \"Our results suggest that a series of positive (or negative) weather shocks\
    \ has a long-term negative effect on per capita GDP growth.\"\n"
  3: "Source: \"Specifically, we show that if temperature rises (falls) above (below)\
