  15: 'Evaluation overview: The analysis evaluates the impact of flood protection
    on BI (Business Interruption) loss and asset damage, comparing global and regional
    scales.


    Drivers of Risk: The analysis examines the impacts of floods and the mitigating
    effects of flood protection on economic outcomes.


    Quantitative material: Flood protection reduced BI loss and asset damage by 98.6%
    and 96.5%, respectively, from 1960 to 2013; without flood protection, BI loss
    was USD 1864 billion, and asset damage was USD 3771 billion (2005 PPP).


    Methodology: The analysis uses reanalysis simulation values from 1960 to 2013
    to evaluate BI loss and asset damage with and without flood protection.


    Highlights: Flood protection significantly reduces BI loss more than asset damage
    globally, with reductions consistent in regions like North America and greater
    effect observed in BI loss reduction.


    Source material here: As shown in Figure 2, flood protection had a great effect
    on estimated BI loss. ... The global annual total BI loss and asset damage averaged
    from 1960 to 2013 without flood protection were USD 1864 and 3771 billion (2005
    PPP), respectively. Flood protection led to BI loss and asset damage reductions
    of 98.6% and 96.5%, respectively. ... On all continents, the ratio of BI loss
    to asset damage decreased by an average of 30% with and without flood protection;
    Australia and North America were consistent with the global average, whereas South
    America showed a 20% decrease. These results suggest that flood protection has
    a greater effect in reducing BI loss than in reducing asset damage.

    '
  16: 'Source material here: Water 2022, 14, 967 Figure 7. Ratio of BI loss to asset
    damage for each continent, with and without flood protection. Data are derived
    from annual averaged reanalysis simulation values. To test this hypothesis, we
    targeted four river basins whose ratios of BI loss to asset damage were similar
    without flood protection (ca. 130%) but different with flood protection. Figure
    8 shows the relationship between the ratio of BI loss to asset damage and the
    number of floods in targeted river basins (Yangtze, St. Lawrence, Senegal, and
    Niger). We defined the number of floods as the number of years in which the calculated
    annual maximum inundation depth exceeded the flood protection of the region at
    least once. The number of floods and the ratio of BI loss to asset damage were
    slightly lower in river basins with low flood protection level (FPL). For example,
    in Niger (FPL, 2 years), the number of floods slightly decreased from 54 to 40
    with flood protection, while the ratio of BI loss to asset damage remained nearly
    constant, shifting from 143.2% to 121.8%. In Senegal (FPL, 6 years), the reduction
    in the number of floods with flood protection was the same as the reduction in
    Niger, but the ratio of BI loss to asset damage decreased from 120.6% to 36.1%.
    In Senegal, FPL was sufficiently high to delay the day at which inundation depth
    exceeded FPL, although it did not prevent inundation, resulting in a decrease
    only in the ratio of BI loss to asset damage. Both the number of floods and the
    ratio of BI loss to asset damage decreased in basins with high FPL. In the Yangtze
    basin (FPL, 20 years), the number of floods significantly decreased from 54 to
    4, while the ratio of BI loss to asset damage decreased from 131.3% to 33.0%.
    These results demonstrate that flood protection has a greater effect on BI loss
    than on asset damage; moreover, flood protection is important in the estimation
    of BI loss. The image is a bar chart comparing business interruption (BI) loss
