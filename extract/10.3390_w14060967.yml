  17: The ratio of BI loss to asset damage tends to be greater in river basins with
    low FPL. However, our simulations showed that future ratios of BI loss to asset
    damage will be high even in large river basins with high FPL. Future BI loss to
    asset damage ratios exceeded 15% in most parts of Africa, where FPL is generally
    low. The BI loss to asset damage ratio is also expected to increase in most parts
    of China, India, and central Africa, as well as regions of Europe and America
    with high FPL. For example, the Mississippi River basin has an FPL of >50 years,
    but the BI loss to asset damage ratio is projected to increase by approximately
    17.3% relative to past values. In contrast, the BI loss to asset damage ratio
    is projected to decrease in most parts of South America and Australia. The plot
    highlights how the frequency of floods correlates with economic losses across
    different geographic locations, with variations based on flood protection levels.
  18: "The BI loss to asset damage ratio is projected to increase in river basins\
