Drivers of Risk:
  1: Floods and their propagation effects on global trade networks are identified
    as key drivers of economic losses.
  2: Floods are highlighted as a major driver of economic risk, particularly in terms
    of asset damage and BI loss.
  3: Floods, particularly their inundation period and depth, are the main drivers
    of risk impacting the outcomes.
  5: Flood damage estimation is impacted by insufficient resolution in global GDP
    data.
  7: Flooding and related inundation periods are the primary shocks impacting the
    outcomes.
  8: Annual maximum inundation depth
  10: Natural disasters such as floods and droughts are causing fluctuations in business
    interruption (BI) losses.
  11: Floods and prolonged inundation periods due to mild slopes are major drivers
    impacting BI loss.
  12: Floods are the primary driver of risk impacting BI loss and asset damage, exacerbated
    by climate change.
  13: Drought conditions are identified as the primary shocks impacting business interruption
    losses.
  14: Floods are identified as a driver of BI loss.
  15: The analysis examines the impacts of floods and the mitigating effects of flood
    protection on economic outcomes.
  16: Floods are the primary shocks impacting BI loss and asset damage outcomes.
  17: Floods, flood protection levels (FPL).
  18: The analysis identifies increased flood return periods and longer inundation
    periods as contributors to rising BI loss, along with climate change impacts under
    RCP8.5 and SSP3 scenarios.
Evaluation overview:
  1: The article provides an overview of economic losses caused by flood-related business
    interruption, detailing direct asset damage and opportunity losses.
  2: The paper evaluates the importance of business interruption (BI) loss relative
    to asset damage in the context of global flood risk impact.
  3: This page provides an overview of the evaluation of business interruption (BI)
    loss and asset damage due to floods.
  7: The page provides an overview of Business Interruption (BI) loss, specifically
    related to productivity loss due to workplace destruction or inaccessibility caused
    by flooding.
  8: Asset damage was defined as the damage caused by the most severe flood in each
    year.
  10: The paper evaluates business interruption (BI) loss due to natural disasters
    across various countries and years, comparing the study's estimates with those
    of the World Bank.
  11: The page evaluates BI loss as a percentage of GDP in various global river basins,
    linked to climate change impacts on flood-related economic loss.
  12: This paper evaluates flood-related global annual Business Interruption (BI)
    loss and asset damage.
  13: The paper provides an overview of business interruption (BI) losses due to drought
    conditions and their impact on GDP in various regions.
  14: The paper evaluates business interruption (BI) loss relative to GDP due to floods.
  15: The analysis evaluates the impact of flood protection on BI (Business Interruption)
    loss and asset damage, comparing global and regional scales.
  16: The analysis evaluates the ratio of business interruption (BI) loss to asset
    damage across different continents and river basins, both with and without flood
    protection.
  17: BI loss (Business Interruption loss) relative to asset damage, a measure of
    economic impact.
  18: The study provides an overview of the economic impacts of flooding, specifically
    focusing on the ratio of Business Interruption (BI) loss to asset damage on a
    global scale.
Highlights:
  1: "Projected increases in BI loss and asset damage per GDP by 0.32% and 1.78% (2061\u2013\
    2090 average) under RCP8.5 and SSP3 scenarios."
  2: BI loss can be greater than direct economic damage from floods, as observed in
    the 2011 Thailand flood case study.
  7: The BI period is determined to be two times the inundation period based on surveys
    of past floods in Japan, USA, and Thailand.
  10: Significant discrepancies between this study and World Bank estimations, notably
    for Thailand 2011 and Nigeria 2012, where the study's estimations are substantially
    higher.
  11: High absolute BI loss is observed in America and Europe, but low relative BI
    loss (<0.1% of GDP) due to high GDP.
  12: Flood-related BI loss and asset damage are projected to increase significantly
    by the end of the century due to climate change.
  13: Future BI loss in many regions such as China and the Nile River is expected
    to exceed historical values, with asset damage and BI loss substantially increasing
    over time.
  14: Africa and South Asia are projected to have significant GDP losses due to BI,
    while South America shows lower losses.
  15: Flood protection significantly reduces BI loss more than asset damage globally,
    with reductions consistent in regions like North America and greater effect observed
    in BI loss reduction.
  16: Flood protection significantly reduces BI loss more than asset damage; Europe
    shows the greatest reduction in BI loss/asset damage percentage with flood protection.
  17: The ratio of BI loss to asset damage tends to be greater in river basins with
    low FPL. Future ratios of BI loss to asset damage will be high even in large river
    basins with high FPL in some regions. BI loss to asset damage ratio is also expected
    to increase in most parts of China, India, and central Africa, as well as regions
    of Europe and America with high FPL. BI loss to asset damage ratio is projected
    to decrease in most parts of South America and Australia.
  18: The analysis projects that BI loss is not negligible in global flood risk estimation
    and will increase in areas with high FPL, affecting regions such as the Mississippi
    River basin.
Methodology:
  1: Analysis uses a global river and inundation model driven by a bias-corrected
    meteorological forcing scheme.
  2: The analysis uses bias-corrected meteorological forcing data (S14FD) to simulate
    daily inundation depth and estimate flood-related economic impacts for global
    river basins.
  3: The analysis is performed using bias-corrected meteorological forcing data applied
    to calculate BI loss and asset damage based on flood simulations and GDP data.
  4: Urban area damage is assessed using land use data from GLCNMO v2 product and
    GRUMPv1 for aggregating damage at the country level.
  5: A linear equation relates subnational GDP ratios to subnational building ratios.
  6: Assumes assets are 2.8 times GDP in urban areas and equal to GDP in other areas.
  7: BI loss is calculated from the inundation period, gridded GDP, and the GDP ratio
    of secondary and tertiary industries; BI period is assumed proportional to the
    inundation period.
  8: "Asset damage is calculated by multiplying asset value (calculated from GDP and\
    \ an asset coefficient) by the fraction of assets with flood-related damage. The\
    \ damage fraction is derived using a damage\u2013depth function proposed by Huizinga\
    \ et al. [46], considering different continents and sectors. Validation is performed\
    \ using EM-DAT and World Bank data."
  10: The analysis uses comparison with World Bank estimations of BI loss over several
    countries and time periods, providing comparisons on a simulated and observed
    basis.
  11: Future BI loss and asset damage projections use bias-corrected S14FD-GCM forcing
    data, S14FD-Reanalysis data, and CaMa-Flood outputs.
  12: "The study uses Global Climate Model (GCM) simulations and compares them against\
    \ reanalysis simulations (S14FD-Reanalysis) constrained by past meteorological\
    \ observations to validate the GCM results. Future BI loss and asset damage are\
    \ estimated for near-term (2021\u20132050) and long-term (2061\u20132090) periods\
    \ and compared to the past period (1971\u20132000)."
  13: "The analysis uses GCM simulations to project BI losses for past and future\
    \ time periods (1971\u20132000, 2021\u20132050, 2061\u20132090)."
  14: "BI loss is defined and estimated through reanalysis simulation for regions\
    \ with river basins area \u226510,000 km2."
  15: The analysis uses reanalysis simulation values from 1960 to 2013 to evaluate
    BI loss and asset damage with and without flood protection.
  16: Analysis uses annual averaged reanalysis simulation values and examines river
    basins based on floods defined by maximum inundation depth exceeding flood protection
    levels.
  17: Simulations are used to estimate future BI loss and asset damage. The paper
    compares river basins with different FPL.
  18: The method estimates flooding-related BI loss globally, using historical flood
    data, and utilizes RCP8.5 and SSP3 scenarios for future projections with attention
    to local FPL (Flood Protection Level) and flood magnitudes.
More Notes:
  12: The reanalysis simulation is assumed to have smaller uncertainty due to being
    constrained by past meteorological observations. The GCM simulation results were
    considered sufficiently accurate for estimating future BI loss and asset damage
    after validation against the reanalysis simulation.
  18: The study emphasizes that improvements are necessary for more accurate estimations
    of BI loss, particularly regarding business interruption periods and spatial distribution
    of assets.
Quantitative material:
  1: "Global business interruption (BI) loss and asset damage are estimated at USD\
    \ 26.9 and 130.9 billion (2005 PPP) on 1960\u20132013 average."
  2: The analysis provides estimates of flood-related global asset damage and BI loss
    for present and future scenarios.
  8: 'Examples of loss for specific flood events in 2005 USD PPP: Namibia (2009) -
    56 million, Moldova (2010) - 5.34 million, Pakistan (2010) - 1.21 billion, Pakistan
