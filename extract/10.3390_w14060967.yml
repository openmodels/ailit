  12: "Global annual BI loss and asset damage are projected to increase by 34.6- and\
    \ 34.7-fold, respectively, from 1971\u20132000 to 2061\u20132090. Global annual\
    \ BI loss and asset damage per GDP during 2061\u20132090 are projected to be 4.2-\
    \ and 4.2-fold greater, respectively, than those values during 1971\u20132000.\
    \ Global total annual BI loss from reanalysis simulation averaged through 1961\
    \ to 2005 was USD 23.1 billion (2005 PPP), whereas average total annual BI loss\
    \ from the GCM simulation was USD 25.8 billion (2005 PPP). The maximum variation\
