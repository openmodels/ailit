sourcematerial:
  1: " \n\"Estimating river flood risk helps us to develop strategies for reducing\
    \ the economic losses and making a resilient society. Flood-related economic losses\
    \ can be categorized as direct asset damage, opportunity losses because of business\
    \ interruption (BI loss), and high-order propagation effects on global trade networks.\"\
    \n\n\"In this study, we estimated BI loss and asset damage using a global river\
    \ and inundation model driven by a recently developed bias-corrected meteorological\
    \ forcing scheme. The results from the bias-corrected forcing scheme showed an\
    \ estimated global BI loss and asset damage of USD 26.9 and 130.9 billion (2005\
    \ purchase power party, PPP) (1960-2013 average), respectively.\"\n\n\"Future\
    \ flood risk projection using the same framework under Representative Concentration\
    \ Pathway 8.5 (RCP8.5) and Shared Socioeconomic Pathway 3 (SSP3) scenarios showed\
    \ increases in BI loss and asset damage per GDP by 0.32% and 1.78% (2061\u2013\
    2090 average) compared with a past period (1971\u20132000 average), respectively.\"\
    \n"
  2: 'Source material here.

    Evaluation overview: "it is essential to estimate both asset damage and BI loss
    because of flood hazard to improve global-scale flood risk assessments."

    Drivers of Risk: "Greater numbers of people will be affected by floods... potentially
    causing economic impacts due to asset damage and business interruption."

    Quantitative material: "flood-related global asset damage and BI loss for present
    and future scenarios to explore potential changes in flood risk impact."

    Methodology: "The recent release of the bias-corrected meteorological forcing
    data product S14FD [22] has enabled direct simulation of daily inundation depth."

    Highlights: "Tanoue et al. [19] also demonstrated that BI loss for the 2011 Thailand
    flood was greater than direct economic damage caused by the flood."

    '
  3: 'yaml

    Evaluation overview: "We defined BI loss as the loss of opportunity because of
    interrupted business activity; we de-fined asset damage as direct economic damage,
    such as the destruction of physical assets."

    Drivers of Risk: "In this study, we calculated BI loss and asset damage based
    on inundation period and inundation depth data derived from flood simulations
    and a gridded GDP dataset."

    Methodology: "In this study, we used bias-corrected meteorological forcing data.
    The calculation of inundation period and BI loss requires daily inundation extent
    and depth data..."

    '
  4: "Source material here.\nThe methods and models used for flood simulation in this\
    \ study were described in detail by Tanoue et al. [19]. Briefly, we used CaMa-Flood\
    \ [24] to calculate daily total water storage and inundation depth. CaMa-Flood\
    \ explicitly calculates river discharge, water depth, and flood extent at each\
    \ model time step on a global scale by assuming complex floodplain inundation\
    \ dynamics as the sub-grid physics... Runoff input for CaMa-Flood was calculated\
    \ using Minimal Advanced Treatments of Surface Interaction and RunOff (MATSIRO)\
    \ [25]...\nThe simulation is conducted at a coarse resolution (in this study,\
    \ 0.25\xB0, ca. 25 km at the equator) to achieve efficient global-scale analysis;\
    \ however, the simulated flood depth can be diagnostically downscaled using high-resolution\
    \ topography data in post-processing (in this study, 30\u2033, ca. 1 km).\n...In\
    \ this study, we used a reduced-bias meteorological forcing dataset obtained from\
    \ the S14FD reanalysis dataset (S14FD-Reanalysis) and bias-corrected global climate\
    \ model (GCM) output forcing dataset (S14FD-GCM) [22], which allowed the use of\
    \ daily model output values without bias correction.\n... Results from CaMa-Flood\
    \ and MATSIRO have been used for global flood risk analysis in many studies [1,2,4,18,25\u2013\
    31].\n...To determine asset damage in urban areas, we used current land use data\
    \ from the Global Land Cover by National Mapping Organizations (GLCNMO) v2 product\
    \ [35] to calculate the percentage of urban area of each grid. We used national\
    \ mask data derived from the Global Rural-Urban Mapping Project v1 (GRUMPv1) [36]\
    \ to aggregate asset damage or BI loss at the country scale.\n"
  5: "Source material here.\nFlood damage estimation is impacted by insufficient resolution\
    \ in global GDP data: \"Although the National Institute for Environmental Studies\
    \ publishes global GDP data [37], their horizontal resolution is 0.5\xB0 \xD7\
    \ 0.5\xB0, which is insufficient for flood damage estimation.\"\n\nGridded GDP\
    \ values are derived using national GDP data and building height data under the\
    \ assumption that building height correlates with GDP per capita: \"Therefore,\
    \ in this study, we assumed that building height within each grid was proportional\
    \ to GDP per capita [39,40]; we derived gridded GDP according to the weighted\
    \ distribution of country GDP with respect to building height data at finer resolution,\
    \ as previous studies showed that building height is proportional to GDP per capita\
    \ in European cities [33,34].\"\n\nBuilding height data were prepared at a 30\u2033\
    \ \xD7 30\u2033 resolution using a global digital elevation model: \"Building\
    \ height data [41] were prepared at 30\u2033 \xD7 30\u2033 resolution using the\
    \ Advanced Spaceborne Thermal Emission and Reflection Radiometer global digital\
    \ elevation model.\"\n\nA linear equation relates subnational GDP ratios to subnational\
    \ building ratios: \"The equation for the relationship between building height\
    \ and gridded GDP was developed as follows. First, we estimated the relationship\
    \ between the ratio of subnational GDP to country GDP (the subnational GDP ratio,\
    \ s_GDPratio) and the total building height within each subnational region to\
    \ the total building height within the country (subnational building ratio, s_bldratio)\
    \ under the assumption that this relationship was linear: s_GDPratio = 0.9634\
    \ \xD7 s_bldratio + 0.0011\"\n"
  6: "yaml\nMethodology: \"The analysis derives the ratio of gridded GDP to country\
    \ GDP (gridded GDP ratio, g_GDPratio) from the ratio of gridded building height\
    \ to total building height within the country (gridded building height ratio,\
    \ g_bldratio) and the relationship between s_GDPratio and s_bldratio.\"\nMethodology:\
    \ \"Using this relationship, we obtained a maximum correlation coefficient of\
    \ 0.91 for a lower building height limit of 6.0 m.\"\nMethodology: \"Finally,\
    \ we converted g_GDPratio such that the total GDP ratio per country was equal\
    \ to 1.\"\nMethodology: \"In the absence of a relevant dataset for secondary and\
    \ tertiary industries, their GDP ratios were derived by subtracting the percentage\
    \ of primary industry GDP, derived from 2010 World Bank Open Data values, from\
    \ 1.\"\nMethodology: \"We assumed that assets would be 2.8 \xD7 GDP in urban areas\
    \ [42] and equal to GDP in other areas [16].\"\n"
  7: 'yaml

    Evaluation overview: "BI loss was categorized into an indirect and consequential
