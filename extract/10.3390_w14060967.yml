  12: " \nFirst,  to  validate  the  results  from  GCM  simulation,  we  compared\
    \  the  calculation  result of BI loss and asset damage from historical GCM simulation\
    \ (available for 1961\u20132005) against data from the reanalysis simulation.\
    \ We assumed that the reanalysis simulation was expected to have smaller uncertainty\
    \ because its forcing data was constrained by past meteorological observations,\
    \ while GCM simulations were based on model experiments. Global total annual BI\
    \ loss from reanalysis simulation averaged through 1961 to 2005 was USD 23.1 billion\
    \ (2005 PPP), whereas average total annual BI loss from the GCM simulation was\
    \ USD 25.8 billion (2005 PPP). The maximum variation of each GCM from the average\
    \ value was 33.0%. In contrast, global total annual asset damage and asset damage\
    \ per GDP from S14FD-Reanalysis was USD 109.7 billion (2005 PPP), whereas the\
    \ average global total annual asset damage and asset damage per GDP from the GCM\
    \ simulation was USD 142.5 billion (2005 PPP). The maximum variation of each GCM\
    \ from the average value was 43.2%. \n\nNext, we estimated future BI loss and\
    \ asset damage for the future (near-term 2021\u20132050 and long-term 2061\u2013\
    2090) and compared them with the estimates for the past period (1971\u20132000).\
    \ The results are summarized in Table 3. Among all GCMs, the maximum deviations\
    \ from the average BI loss and asset damage were 137.9% and 101.2%, respectively.\
    \ Global annual BI loss and asset damage were projected to increase by 34.6- and\
    \ 34.7-fold, respectively, from 1971\u20132000 to 2061\u20132090. Global annual\
    \ BI loss and asset damage per GDP during 2061\u20132090 are projected to be 4.2-\
    \ and 4.2-fold greater, respectively, than those values during 1971\u20132000,\
    \ indicating that increases in BI loss and asset damage are anticipated because\
    \ of climate change.\n\nBoth graphs depict trends over time, with the red and\
    \ blue shaded areas showing variability or uncertainty in the data. The solid\
    \ lines represent specific modeled outputs alongside the historical reanalysis\
    \ data.\n"
