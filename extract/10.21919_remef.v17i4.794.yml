  7: "Storms are the primary cause of weather-related losses, accounting for 805 billion\
    \ US dollars in total losses since 1980 and, thanks to strong insurance penetration,\
    \ 454 billion US dollars in insured losses... Thunderstorms represent the most\
    \ significant severe weather danger for the region. Severe thunderstorms were\
    \ responsible for 43% (or US$ 180 billion) of insured property windstorm damages\
    \ between 1980 and 2011 only in the US... The total losses from severe weather\
    \ events increased by 15% (US$ 160 billion), with heat waves, droughts, and wildfires\
    \ accounting for more than half of this... 2012, with a mean temperature 3.8\xB0\
    F (2.1\xB0C) above the norm for the 20th century, has been the warmest year in\
    \ the US thus far... Nearly the whole East and Gulf Coasts of North America are\
    \ susceptible to the effects of tropical cyclones, particularly if they intensify\
    \ into hurricanes that combines increasing storm surge and high wind risk. The\
    \ concentration of people and assets along the shore, coupled with high and likely\
    \ increasing vulnerability, is a major loss driver... Thunderstorms have increased.\
    \ As pointed in the WG2 IPCC report, urban sprawl exposes higher destructible\
    \ values to the forces of thunderstorms, which is one contributing reason... Droughts\
    \ and heat waves have a high potential for loss since they influence every sector,\
    \ from agriculture to individual houses, infrastructure, and electricity supplies\
    \ over a wide area, yet their effects are only gradually noticed."
  8: " \n\"By reducing snow and ice cover and increasing extreme weather, climate\
    \ change threatens North American aquatic ecology, water quality, water availability\
    \ for human uses, and flood exposure. Adaptation will be difficult if water supplies\
    \ in North America are still being impacted by ongoing effects of global warming...\"\
    \ \n\n\"In this section we focus on the challenges of observed climate change\
    \ impacts and projected risks to maintain and improve economic growth and open\
    \ opportunities for sustainable development in the North American region. Our\
    \ attention is centered in key sectors highlighted in IPCC reports: energy, industry,\
    \ food system, health, and key infrastructure and cities.\"\n\n\"Observed climate\
    \ impacts (i.e., heatwaves, drought, storms, extreme precipitation) illustrate\
    \ current vulnerability of energy facilities in several parts of North America.\"\
    \n\n\"...the economic impact of climate change risks on power systems in the U.S.\
    \ is estimated to reach $50 billion by 2050.\"\n\n\"Projected impacts of extremes\
    \ events will affect North America regions both in energy infrastructures as well\
    \ as consumption.\"\n\n\"Past experiences show that heatwaves have increased spot\
    \ market prices affecting disproportionately the most vulnerable social groups\
    \ (Cronin et al., 2018). ... Electricity outages can have significant consequences\
    \ in economic.\"\n"
  9: 'Source material here.

    The performance of renewable energy can also be affected by changes in climate.
    Higher temperatures improve the efficiency of solar heating but decreases the
    efficiency of photovoltaic panels (Patt et al., 2013; IPCC, 2022 Ch.6).

    Productivity and investment effects are two of the primary ways that climate change
    may impact GDP in the short and long terms in the region. Long-term economic growth
    is heavily influenced by productivity because as it rises, countries can produce
    more products and services with the same number of resources, which in turn tends
    to raise well-being and income...

    Due to its link to long-term economic growth, the impact of climate change on
    investments is of special importance...

    Other economic activity vulnerable to climate change is Tourism. Attention has
    been centered on the impact of climate change on ski resorts in Canada and the
    U.S. (Steiger et al., 2019; IPCC, 2022 Ch. 14)...

    In general terms, impacts are expected to increase for the frequency and intensity
    of extreme weather, both in the U.S., Canada and Mexico...

    A final aspect we would like to mention is a recent study using a large dimensional
    intertemporal CGE trade model to account for the various effects of global warming
    (e.g., loss in agricultural productivity, sea level rise, health effects) on Gross
    Domestic Product growth for 139 countries by decade and over the long run (Kompas,
    et al., 2018). Its results show significant differences among Canada, the United
    States and Mexico, particularly on the long run. Canada would experience minor
    negative effects on GDP percentage change per year (-0.218), the U.S. a higher
    effect (-0.622) and Mexico (2.277) in the long run.

    Climate change has and it will continue to have significant differentiated impact
    in North America.

    '
  10: "Source material here.\nClimate change extensive consequences of climate change\
    \ are on health. IPCC (2022 Ch.7) assesses a wide range of climate-sensitive diseases:\
    \ cardiovascular; respiratory tract infections; non-communicable respiratory illness,\
    \ vector-borne (mosquito, rodent, and tick), waterborne, and food-borne; mental\
    \ health. All of them are relevant in North America. However, our research found\
    \ no comprehensive assessment of the health implications of climate change at\
    \ the national and subnation level in the three countries despite the cascading\
    \ effect of the health implications of climate change and the economic and social\
    \ consequences.\n\nA recent study on the health consequences of climate change\
    \ in Canada estimates the emergence of infectious diseases northward spread from\
    \ the U.S. or introduced from other parts of the world via air or sea transport.\
    \ These include emergence of tick-borne diseases in addition to Lyme disease,\
    \ the possible introduction of mosquito-borne diseases (dengue, West Nile virus),\
    \ and increased incidence of foodborne illnesses (Odgen and Gachon, 2019).\n\n\
    IPCC assesses that financial support for health adaptation is currently less than\
    \ 0.5% of overall dispersed multilateral climate finance projects and considers\
    \ it insufficient to protect human health and health systems from most climate-sensitive\
    \ health risks (IPCC, 2022 Ch. 6 and 7).\n\nIPCC provided broader attention to\
    \ the mental health implications of climate change in this assessment cycle. Some\
    \ of the studies so far show an observable association between high temperatures\
    \ and mental health decrements, extreme events (heatwaves, wildfires, drought,\
    \ hurricanes6) have significant consequences for mental health, and mental health\
    \ can also emerge as result of climate impacts on economic, social, and food systems.\n\
    \nA study on the effect of higher temperatures on suicide rate in the U.S. and\
    \ Mexico found that suicide rates rise 0.7% in U.S. counties and 2.1% in Mexican\
    \ municipalities for a 1oC increase in monthly average temperature. \n"
  11: " \nCrop-based agriculture in North America is highly dependent on climate conditions,\
    \ and climate change is projected to have a large impact on the agriculture industry...Overall,\
    \ climate change may make it more challenging to cultivate crops, raise livestock,\
    \ and catch fish in the same locations and ways as in the past. \n\nInfrastructure\
    \ is vital to economic health and social wellbeing...Data available for North\
    \ America indicates that total annual damages from temperature- and precipitation-related\
    \ damages to paved roads in the U.S. are estimated at up to $20 billion under\
    \ RCP8.5 in 2090; inland flooding threatens approximately 4,600 bridges across\
    \ the U.S., also under RCP8.5, and it is anticipated to create annual average\
    \ damages of $1.2 to $1.4 billion each year by 2050. \n\nThe frequency of some\
    \ catastrophic climate change-related occurrences, such as droughts or floods...Fish\
    \ and aquatic ecosystems could be negatively impacted by changes in  water temperature\
    \ and acidification brought on by rising atmospheric carbon dioxide.\n"
  12: 'The page provides an overview of the economic costs of climate-related disasters
    in North America, highlighting the direct economic costs of all extreme events
    reaching 210-268 billion USD in 2020: "Evidence of the consequences of climate
    related disasters in cities of North America is extensive. For example, the direct
    economic costs of all extreme events reached 210-268 billion USD in 2020 (Smith,
    2021)." Climate-related disasters such as hurricanes are highlighted as a primary
    driver of economic damage in North America: "Just Hurricane Sandy had over $60
    billion in reported economic damage in New York and the East coast in 2012 and
    a recent study estimates that approximately $8.1 billion of those damages are
    attributable to climate-mediated anthropogenic sea level rise (Rosenzweig and
    Solecki, 2014; Strass et al., 2021)." The paper provides quantitative data on
    economic damages from extreme events, citing $60 billion in damages from Hurricane
    Sandy and an estimated $8.1 billion attributed to climate-mediated anthropogenic
    sea level rise: "Just Hurricane Sandy had over $60 billion in reported economic
    damage in New York and the East coast in 2012 and a recent study estimates that
    approximately $8.1 billion of those damages are attributable to climate-mediated
    anthropogenic sea level rise (Rosenzweig and Solecki, 2014; Strass et al., 2021)."
    The page emphasizes the extensive evidence of climate-related disaster consequences
    in North American cities and the significant investment needed for low-carbon
    and resilient urban development, with a gap in financial resources reported globally:
    "Evidence of the consequences of climate related disasters in cities of North
    America is extensive...There is no specific data available for North America but
    IPCC reports that globally $384 billion of climate finance has been invested in
    urban areas per year in recent years, but this remains at about 10% of financial
    resources needed for low-carbon and resilient urban development (IPCC, 2022 Ch.
    6)." Sea level rise, especially in the past 20 years, is linked with increased
    flooding, causing more frequent and severe tidal flooding in the U.S.: "Even though
    the sea level has increased by 20 cm. since 1950, only the previous 20 years account
    for roughly half of that (almost 8 cm.). In the United States, tidal flooding
    has increased by 233% on average as a result of this little sea level rise."'
  13: "  \n\"Significant developments and improvements are taking place in North America\
    \ related to financial resources to deal with climate change...\" \n\n\"The rising\
    \ understanding that climate change is a source of financial (and pricing) instability\
    \ since it is likely to produce physical changes in the environment should be\
    \ stressed.\"\n\n\"Global financing for climate-related activities remained a\
    \ small part of development finance (over 7%) from 2010 to 2018. Only 33% of those\
    \ funds were committed to adaptation and only about 1.6% of adaptation finance\
    \ came from private sources7.\"\n\n\"Multilateral development banks (MDBs) collectively\
    \ committed $61.5 in climate finance in 2019, 76% for mitigation and 24% for adaptation...\"\
    \n\n\"It is worth noting that financial sector interest in climate change is small\
    \ and it is mainly concentrated on mitigation not adaptation. Public sources of\
    \ adaptation finance are relatively small and cannot bridge the investment gap.\"\
    \n"
  14: 'Source material here: The article summarizes some of the relevant implications
    for the economy, social wellbeing, and ecosystems in the region. IPCC highlights
    that key economic sectors, financial markets, government budgets, and household
    welfare are unevenly affected by climate impacts in North America (IPCC, 2022
    Ch. 14). High exposure or sensitivity to climate impacts in economic sectors mentioned
    above have experienced larger losses and adaptation costs. IPCC assesses with
    high confidence that extreme events have damaged economically important supply-chain
    infrastructure and disrupted regional and international trade, increased public
    expenditures on emergency and recovery response, and affected property and financial
    market (IPCC, 2022 Ch. 14). Our assessment of the IPPC report suggests that system
    transformation to adapt to climate change are advancing slowly and unevenly in
    the region. It is also important to recognize that adaptation has received less
    attention than mitigation in national responses to climate change, particularly
    in the U.S. and Mexico. Adaptation actions at the subnational level face also
    challenges. National administrations have had different approaches to climate
    change due to domestic circumstances, political constraints, and ideological positions.'
  15: 'Source material here.

    We conclude this paper highlighting societies currently face a critical moment
    in North America. Despite declining yields in economic activities, aggravating
    conditions in social wellbeing, and increasing degradation of the ecosystem caused
    by climate change, attention to adaptation continues to be limited, short-term
    focused, fragmented or even inexistent in many cases. Scientific evidence seems
    to have had limited impact in decision making by significant parts of the public,
    private and social sector... One final point, IPCC stresses that current trends
    and increasing global warming will continue to limit options to adapt to climate
    change and increase their cost. We believe it is important to highlight those
    negative consequences of inaction because they are already high in the region,
    and they will continue to increase, particularly for the most vulnerable groups.
    Evidence shows early adaptation actions have significant economic benefits for
    societies. The World Bank found that every $1 invested in resilient infrastructure
    in low- and middle-income countries yields $4 in net benefits... Responding to
    climate change will require significant behavioral changes in society, but a new
    approach to decision-making mainstreaming adaptation to climate change in development
    policies is an essential step.

    '
