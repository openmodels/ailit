sourcematerial:
  3: 'Source material here.

    IPCC Working Group II (WGII) report assesses these impacts, societies and ecosystems
    vulnerability to them, and action taken so far to adapt. One of the key messages
    in this report is that scientific evidence is inequivalve, climate change is a
    threat to human wellbeing and planetary health. Global warming has already caused
    extensive and dangerous alteration to nature and affected the life of millions
    of people in all regions of the planet. Observed impacts and projected risks on
    ecosystems and biodiversity indicate the support they provide to main human life
    and the economy in the planet is at risk. The growing number of climate related
    disasters in all regions are also an indicator of the threat to human life, the
    economy, and our lifestyles.

    IPCC estimates that between 3.3 and 3.6 billion people live currently in regions
    and places with high vulnerability to climate change.

    However, one the key messages in WG III report is that GHG emissions should begin
    to decline in 2025 to limit global warming between 1.5oC and 2oC.

    WGII highlights Climate Resilience Development (CRD) as an operational concept
    that combines adaptation and mitigation actions to enhance opportunities for sustainable
    development in the short-term and long-term. Combining adaptation and mitigation
    simultaneously reduces conflicts and enhances synergies among them.

    Despite progress made so far in adaptation efforts, IPCC clearly highlights actions
    are not as comprehensive as needed, particularly in the most vulnerable regions
    where most developing countries are located. Additional problems with observed
    adaptation are actions that are short-term oriented in specific sectors and without
    considering middle-term and long-tern needs; there is a growing gap between adaptation
    planned and adaptation implemented; there is little monitoring and evaluation
    of adaptation actions implemented.

    '
  4: "North America encompasses diverse climate zones and weather. Cold in the winter\
    \ and warm in the summer, with moderate to severe precipitations, [\u2026]. Climate\
    \ change is already being observed in North America, including shifted rainfall\
    \ patterns and dramatic warming in the Arctic. (IPCC, 2022, Ch. 14). [\u2026]\
    \ The region has produced a greater share of greenhouse gas emissions over time\
    \ than any other continent and this is due mostly to the contribution of the US,\
    \ historically the world's largest single emitter of human-released greenhouse\
    \ gases and now the second-largest emitter after China. The region will not only\
    \ receive impacts from climate change but is having a large impact on climate\
    \ change too. [\u2026]\n"
