Drivers of Risk:
  1: Climate-driven changes in temperature and air pollution (O3 and PM2.5) exposure.
  3: Global mean surface temperature changes, US population, and US GDP; climate-driven
    changes in CONUS temperature or global mean sea level rise
  4: The primary drivers of risk include changes in global mean surface temperature
    and global mean sea level rise.
  5: Sea level rise, temperature changes.
  6: Climate-driven changes in temperature and air quality (O3 and PM2.5), Valley
    fever, Southwest dust, wildfire smoke exposure, crime incidents.
  8: The drivers of risk include climate change impacts leading to changes in temperature,
    air quality, wildfire risk, dust levels, and Valley fever incidence.
  9: Changes in temperature, high-tide flooding, climate-driven changes in air quality,
    wildfires.
  11: The analysis focuses on the vulnerability due to climate-driven changes in air
    quality.
  12: Future climate change impacts, including consequences from temperature-related
    mortality, are identified as key drivers of risk.
  13: Temperature changes are a key driver of risk, influencing sectoral damage functions
    within FrEDI. Coastal flooding, driven by sea level rise, is also considered.
  14: Changes in crop yields, coastal property value, power sector costs, transmission
    infrastructure, hot and cold temperatures, high-tide flooding, riverine flooding,
    work hours lost, thermally available habitat for commercial fish species, ozone
    and fine particulate matter exposure, property and violent crimes, temperature-induced
    track buckling, road surface quality, fine and coarse dust particle exposure,
    hurricane wind damage, urban drainage infrastructure, water quality changes, wildfire
    emissions, alpine recreation, and Valley Fever.
  15: Underlying temperature (or sea level rise), binned damage functions, and sector-specific
    scalars (e.g., per capita income-dependent VSL).
  18: The primary driver of risk discussed is temperature-related changes impacting
    premature mortality.
  20: The drivers of risk include rising temperatures, increased flooding, changes
    in precipitation patterns, and extreme weather events.
  21: The analysis considers the impact of CO2 emissions through factors such as sea-level
    rise, with adjustments for real property price appreciation.
Evaluation overview:
  1: Economic and physical impacts of climate change across multiple impact sectors,
    regions, and populations within the contiguous United States.
  3: Annual long-term climate damages across 20 impact sectors, seven CONUS regions,
    multiple adaptation scenarios, and socially vulnerable populations in the US.
  4: The analysis evaluates sectoral climate impacts in the US, including damages
    in agriculture, water supply, energy, and health, among other sectors.
  5: FrEDI calculates damages from climate change across 20 sectors in six topical
    categories. Also estimates the net present value of future damages in the US resulting
    from an additional tonne of CO2, CH4, or N2O emissions.
  6: Quantifies physical and economic damages from climate change over the 21st century
    within contiguous US borders, covering 20 sectors.
  8: The paper evaluates the impact of climate change on various sectors including
    temperature-related mortality, air quality, wildfire, Southwest dust, Valley fever,
    crime, and labor.
  9: Evaluates annual U.S. damages in the year 2090 by sector.
  11: The page evaluates climate-driven changes in air quality-related mortality and
    labor hours lost, with a focus on different demographic groups such as BIPOC,
    and those with different education and income levels for the year 2090.
  12: The page discusses the estimation of future climate impacts within the contiguous
    US, particularly focusing on sectoral damages like premature mortality due to
    temperature changes.
  13: The paper discusses a tool called FrEDI that estimates climate impacts on various
    sectors, potentially including differential impacts on socially vulnerable groups
    in 2090.
  14: Provides national annual damage statistics for various sectors, including agriculture,
    coastal property, electricity, health, transportation, labor, ecosystems, and
    infrastructure.
  15: Provides an overview of sectoral damages in billions of 2020 USD across various
    sectors, including temperature-related mortality, air quality, high tide flooding
    and traffic, labor, wildfire, wind damage, rail, southwest dust, roads, valley
    fever, coastal properties, electricity demand and supply, electricity infrastructure,
    agriculture, urban drainage, water quality, winter recreation, marine fisheries,
    and inland flooding.
  18: The page provides an overview of temperature-related premature mortality in
    2090 and the associated damages in billions of dollars.
  19: Various sectors like air quality, temperature-related mortality, labor, valley
    fever, wildfire, winter recreation, Southwest dust, electricity supply and demand,
    coastal properties, transportation impacts from high-tide flooding, and more are
    discussed, focusing on specific impacts within each sector.
  20: This paper evaluates climate-driven damages across various sectors, including
    temperature-related mortality, air quality, labor, wildfire, coastal properties,
    and others.
  21: The page provides an evaluation of the net present value of future damages from
    one tonne of CO2 emissions, focusing on damages within the contiguous United States.
  23: Advancing the estimation of future climate impacts
Highlights:
  1: Majority of annual long-term (e.g., 2090) damages are associated with climate
    change impacts to human health, including mortality attributable to climate-driven
    changes in temperature and air pollution.
  2: FrEDI extends its analysis to 2300 to assess net present damage from greenhouse
    gas emissions in the U.S.
  3: A unique feature of using probabilistic projections with a simple climate model
    in this approach is the rich range of uncertainty parameters that can be assessed.
  4: FrEDI is able to model climate-driven impacts in the US across different warming,
    emission, and socioeconomic scenarios in a short computational time frame.
  5: FrEDI can compare climate-driven damages across different populations within
    the US. Adaptation has the capacity to both exacerbate and ameliorate future climate-driven
    damages.
  6: Climate-driven damages are largest for the health category, primarily from premature
    mortality.
  8: Temperature-related mortality is the largest impact sector in this study and
    does not include assumptions about future adaptation. The Southeast is projected
    to experience the largest annual damages per capita.
  9: Largest monetary damages in 2090 are expected from premature mortality associated
    with changes in temperature. The negative impacts of climate change outweigh the
    positives, such that net losses are projected in each region.
  11: In 2090, Black or African American populations face an additional mortality
    rate of 133 per 100,000, and American Indian or Alaska Native groups face the
    largest additional labor hours lost, with 82 hours per capita.
  12: Damages from greenhouse gas emissions are significant, with substantial potential
    benefits from mitigation identified; the framework advances understanding of sectoral
    and regional impacts, despite limitations.
  13: FrEDI has the capability to investigate adaptation options in select sectors
    and assess differential climate-driven impacts on socially vulnerable groups.
    A key feature is the flexible framework allowing for continuous updates as new
    studies emerge.
  14: Temperature-related mortality shows the highest mean damage at USD 2300 billion
    per year, with a wide confidence interval (USD 310-USD 9900 billion). Labor allocation
    shows a high level of damage with a mean of USD 51 billion and a very wide confidence
    interval (USD 6.7 - USD 220 billion).
  15: Projected damages show increasing trends across most sectors, with significant
    increases in coastal properties, wildfire, temperature-related mortality, and
    high tide flooding, particularly towards the end of the century. Uncertainty generally
    increases over time. Total damages, aggregating all sectors, show significant
    increases.
  18: Key outcome includes the range of monetary damages associated with temperature-related
    premature mortality by 2090 across different studies.
  20: Most sectors show increasing costs/damages over time, with particularly sharp
    increases projected for wildfire and coastal properties; Winter recreation is
    projected to decline.
  21: The page highlights the variability in costs per ton of CO2 under different
    discount rates, indicating that lower discount rates result in higher estimated
    damages.
Methodology:
  1: Utilizes the reduced-complexity model, the Framework for Evaluating Damages and
    Impacts (FrEDI), to rapidly project economic and physical impacts of climate change
    across 10000 future scenarios.
  2: FrEDI captures uncertainty by allowing the use of custom warming scenarios and
    socioeconomic projections.
  3: "Uses 10000 randomly sampled scenarios of global greenhouse gas emissions (CO2,\
    \ CH4, and N2O), US population, and US GDP from the Resources for the Future\u2013\
    Socioeconomic Projections (RFF-SPs). Emission trajectories are input to the Finite\
    \ Amplitude Impulse Response (FaIR) model (v1.6.2) to project global mean surface\
    \ temperature. The temperature projections, along with population and GDP projections,\
    \ are then passed to FrEDI (v3.0) to calculate climate-driven damages.  FrEDI\
    \ uses a temperature-binning approach and data from previously published climate\
    \ impact studies to develop relationships between climate-driven changes in CONUS\
    \ temperature or global mean sea level rise and the resulting physical and economic\
    \ damages."
  4: The analysis uses FrEDI to calculate sectoral climate impacts based on inputs
    from the FaIR climate model, which takes emissions, GDP, and population trajectories
    to estimate global mean temperature changes and subsequent sectoral damages.
  5: FrEDI interpolates between modeled damages at different sea level heights. FrEDI
    is extended by linearly extrapolating its sector-specific, temperature-binned
    damage functions.  Marginal annual climate-driven damages are calculated as the
    difference between the damages in a baseline and perturbed case. Future monetary
    impacts are discounted. Analysis is performed at the census tract level.
  6: Uses the FrEDI model with 10000 baseline RFF-SP scenarios (emission, population,
    and GDP trajectories). Net present value calculated using both constant and Ramsey
    discounting approaches.
  8: The analysis uses the FrEDI (Framework for Risk and Economic Assessment of Damages)
    framework. Results are for the year 2090 under the RFF-SP projections. The sectors
    assessed are independent and damages are additive.
  9: Analysis uses 10000 RFF-SP scenarios and incorporates climate parameter uncertainty
    using a Monte Carlo approach. FrEDI (Framework for Risk and Uncertainty in Environmental
    Decisions) is used, and damage estimates are sensitive to uncertainties in the
    underlying damage functions.
  12: Analysis is performed using the FrEDI framework, which quantifies US climate
    impacts based on changes in global temperature, GDP, and population, with some
    consideration of adaptation.
  13: FrEDI incorporates information from sectoral studies and allows for updates
    as new information becomes available. It includes both reactive and proactive
    adaptation scenarios for coastal flooding. The results are applicable up to 2300
    for temperature, population and GDP figures. Analysis for socially vulnerable
    groups is performed for 2090.
  14: "The analysis estimates damages for the year 2090, considering different adaptation\
    \ scenarios. The specific methodology is not detailed on this page, but the study\
    \ uses Earth Syst. Dynam., 14, 1015\u20131037, 2023. https://doi.org/10.5194/esd-14-1015-2023"
  15: The analysis uses underlying temperature (or sea level rise), binned damage
    functions, and sector-specific scalars to project damages. Temporal trends are
    a function of these inputs. Discontinuities can occur at temperature bin boundaries
    or due to thresholds in underlying studies (e.g., sharp increase in coastal property
    damage after 2080 when sea levels breach 100cm).
  18: The analysis scales damage estimates based on population and GDP trajectories,
    and uses a range of methods for sensitivity to socioeconomic drivers and adjustment
    factors through 2300.
  19: Different extension strategies are employed for extending estimates of impacts
    from 2090 to the 2300 modeling horizon; strategies vary by sector and impact,
    such as scaling with population or GDP per capita and using year-specific adjustment
    factors developed from constant population scenarios.
  20: The analysis uses 10,000 projections from 2100 to 2300 to estimate future climate
    impacts; the lower right panel shows total damages summed across all sectors.
  21: The analysis calculates net present damages using different discount rates,
    including a constant 3% rate and various Ramsey rates, with future damages projected
    through 2300.
  23: The paper itself appears to be an overview or discussion piece ("Advancing the
    estimation...") and not a primary research article presenting new quantitative
    results. It references other studies that contain the actual impact estimations.
More Notes:
  1: Black or African Americans being disproportionately affected by additional premature
    mortality from changes in air quality.
  4: FrEDI includes modules for regional adaptation scenarios and socially vulnerable
    populations, with a regional analysis disaggregated from national projections.
  5: Adaptation assumptions are reactive, reasonably anticipated adaptation, or no
    additional adaptation. Considers differential vulnerability based on low income,
    ethnicity, race, educational attainment, and age.
  6: Damages are calculated in 2020 US dollars.
  8: The paper acknowledges potential double counting between temperature-related
    mortality and air quality impacts, and the lack of accounting for compounding
    effects. Damages are sensitive to adaptation options.
  9: Climate change may also broaden existing societal inequalities. Black or African
    Americans are more likely to be affected by additional premature mortality from
    climate-driven changes in air quality, while Hispanic or Latino Americans are
    more likely to experience lost labor hours.
  12: The FrEDI framework continues to evolve, adding more sectors to accommodate
    broader coverage of climate impacts, though still excludes some areas such as
    biodiversity and global interaction effects.
  13: The analysis recognizes that cost-effective adaptation measures are often not
    adopted due to short-term investment costs and uncertain future benefits, affecting
    the choice of default adaptation scenarios.
  15: The graphs illustrate the range of potential future climate impacts, emphasizing
    the increasing uncertainty associated with long-term projections.
  20: The paper includes time series of sectoral damages ordered by decreasing mean
    damages in the year 2300.
Quantitative material:
  1: "Net national damages increase overtime, with mean climate-driven damages estimated\
    \ to reach USD2.9 trillion (95% con\uFB01dence interval (CI): USD510 billion to\
    \ USD12 trillion) annually by 2090."
  3: "Average change in global mean surface temperature relative to 1986\u20132005\
    \ is 1.9\u25E6C (95% confidence interval: 0.8 to 3.5\u25E6C) by 2100 and increases\
    \ to 3.1\u25E6C (95% confidence interval: \u22120.2 to 7.8\u25E6C) by 2300."
  4: "By 2100, mean US GDP per capita growth rate is projected at 1.5% (95% CI: -0.4%\
    \ to 4.0%), with a population of USD 390 million (95% CI: USD 260 million\u2013\
    USD 520 million)."
  5: "Mentions extending FrEDI to project climate damages out to 2300, projecting\
    \ damages for temperature scenarios with a maximum value of 10\xB0C of warming\
    \ and using 10000 RFF-SP-derived temperature and socioeconomic scenarios. Mentions\
    \ a 1GtC pulse of CO2 (or CH4 or N2O) is added to each of the RFF-SP emissions\
    \ scenarios in the year 2020. Results are reported in 2020 US dollars."
  6: 'Net national damages increase over time, reaching USD 2.9 trillion (95% CI:
    USD 510 billion to USD 12 trillion), or ~3% of US GDP, annually by 2090.'
  9: Annual US damages in the year 2090 by sector are presented, with damages in billions
    of 2020 USD. Premature mortality associated with changes in temperature ranges
    from USD4500 per person in the Southwest to USD6500 per person in the Southeast.
    Box plots show the 2.5th, 25th, 50th, 75th, and 97.5th percentiles and mean damages
    across 10000 projections.
  11: Quantitative data includes differences in risk related to air quality (e.g.,
    5% for BIPOC) and metrics for additional mortality and labor hours lost per demographic
    group in 2090.
  12: The page presents a box plot chart showing the net present value of future damages
    per ton of CO2, ranging from a median of $15 at a 3.0% discount rate to $51 at
    a 1.5% discount rate.
  13: The page contains a figure showing time series of global mean temperature change,
    US population, and average US GDP per capita growth rate, spanning from 2020 to
    2300.
  14: Presents mean and 95% confidence intervals for damages in billions of 2020 USD
    per year for the year 2090 for various sectors.
  15: Sectoral damages are presented in billions of 2020 USD from 2010 to 2100, with
    total damages in trillions. Annual mean and median damages are shown, along with
    95% confidence intervals.
  18: The page lists estimates of temperature-related premature mortality damages
    in 2090, ranging from USD 34.0 billion to USD 4200 billion depending on the underlying
    study.
  20: The graphs show projected annual damages in billions of 2020 USD for individual
    sectors and trillions of 2020 USD for total damages, with 95% confidence intervals.
  21: The page includes a box plot with quantitative information, showing the net
    present value of future damages per tonne of CO2 ranging from approximately $0
    to $120, depending on the discount rate used.
sourcematerial:
  1: "This study utilizes the reduced-complexity model, the Framework for Evaluating\
    \ Damages and Impacts (FrEDI), to rapidly project economic and physical impacts\
    \ of climate change across 10000 future scenarios for multiple impact sectors,\
    \ regions, and populations within the contiguous United States (US). Results from\
    \ FrEDI show that net national damages increase overtime, with mean climate-driven\
    \ damages estimated to reach USD2.9 trillion (95% con\uFB01dence interval (CI):\
    \ USD510 billion to USD12 trillion) annually by 2090. Detailed FrEDI results show\
    \ that for the analyzed sectors the majority of annual long-term (e.g., 2090)\
    \ damages are associated with climate change impacts to human health, including\
    \ mortality attributable to climate-driven changes in temperature and air pollution\
    \ (O3 and PM2.5) exposure. Climate change impacts may also broaden existing societal\
    \ inequalities, with, for example, Black or African Americans being disproportionately\
    \ affected by additional premature mortality from changes in air quality."
  2: "plaintext\n\"the Framework for Evaluating Damages and Impacts (FrEDI) draws\
    \ upon information from these detailed sectoral impact studies to rapidly assess\
    \ US economic and physical impacts of climate change within a common framework.\
    \ FrEDI was developed using a transparent process and peer-reviewed methodologies\
    \ and is designed to be a flexible framework that is continually refined to incorporate\
    \ advances in peer-reviewed economic damage functions\" \n\n\"FrEDI has the flexibility\
    \ to use any custom warming scenario (which can be derived from a climate model,\
    \ e.g., Fig. 1) and couple it with accompanying socioeconomic projections (e.g.,\
    \ gross domestic product (GDP) and population).\"\n\n\"FrEDI provides an efficient\
    \ and transparent damage estimation approach to explore a variety of future baseline\
    \ trajectories or emission reduction policies and thereby can provide policy-relevant\
    \ information and complement the types of analyses and outputs provided by existing\
    \ integrated assessment models.\"\n\n\"...we extend our methodology out to the\
    \ year 2300 to assess the net present damage in the US resulting from an additional\
    \ tonne of CO2, CH4, or N2O emissions. Aggregating net present damages across\
    \ all sectors and regions within FrEDI provides a traceable estimate of the economic\
    \ damages within US borders from a marginal change in greenhouse gas emissions.\"\
    \n"
  3: "Source material: Speci\uFB01cally, we use 10000 randomly sampled scenarios of\
    \ global greenhouse gas emissions (CO2, CH4, and N2O), US population, and US GDP\
    \ from the Resources for the Future\u2013Socioeconomic Projections (RFF-SPs)(Rennertetal.,\
    \ 2021) (Sect. 2.1)...passed to FrEDI (v3.0) to calculate the physical and economic\
    \ climate-driven damages across 20 impact sectors, seven CONUS regions, multiple\
    \ adaptation scenarios, and socially vulnerable populations (Fig. 1, Output 2).\
    \ Emission trajectories are input to the Fi-nite Amplitude Impulse Response (FaIR)\
    \ model, a simple emissions-based climate model (v1.6.2) that relates emis-sionstochangesinglobalmeansurfacetemperature.\
    \ From  the  10000  model  simulations,  the  average  change in global mean surface\
    \ temperature relative to 1986\u20132005 (FrEDI baseline) is 1.9\u25E6C (95% con\uFB01\
    dence interval: 0.8 to 3.5\u25E6C) by 2100 and increases to 3.1\u25E6C (95% con\uFB01\
    dence interval  (CI):\u22120.2  to  7.8\u25E6C)  by  2300  (Fig.  A1  in  the\
    \ Appendix). The resulting 10000 global mean surface temperature pro-jections,alongwithcorrespondingpopulationandGDPpro-jections\
    \ from the RFF-SPs, are then passed to FrEDI (v3.0) to calculate the physical\
    \ and economic climate-driven dam-ages...FrEDIusesatemperature-binningapproachanddata\
    \ from previously published climate impact studies (Saro\uFB01m et al., 2021)\
    \ to develop relationships between climate-driven changesinCONUStemperatureorglobalmeansealevelrise.\
    \ Auniquefeatureofusingprobabilisticprojectionswith a simple climate model in\
    \ this approach is the rich range of uncertainty parameters that can be assessed."
  4: "Source material here.\nEvaluation overview: \"FrEDI currently includes 20 impacts\
    \ sectors for which damages are modeled as functions of a climate driver (CONUS\
    \ temperature or sea level rise), US GDP, and regional population.\"\nDrivers\
    \ of Risk: \"For sectoral impacts driven by temperature change, damages in FrEDI\
    \ are calculated as functions of CONUS degrees of warming over time... For sectoral\
    \ impacts driven by sea level rise (i.e., coastal properties and transportation\
    \ impacts from high-tide flooding)...\"\nQuantitative material: \"By 2100, mean\
    \ and 95th confidence intervals for US population and time-averaged US GDP per\
    \ capita growth rates are USD390 million (95% CI: USD260 million\u2013USD520 million)\
    \ and 1.5% (95% CI: \u22120.4% to 4.0%), respectively...\"\nMethodology: \"For\
    \ the analysis, we disaggregate national populations from the RFF-SPs to populations\
    \ for each of the seven FrEDI regions based on the percentage of regional to total\
    \ US population... FrEDI was designed to fill the current need of monetizing a\
    \ broad range of climate-driven impacts in the US across various warming, emission,\
    \ and socioeconomic trajectories, while doing so in a significantly shorter computational\
    \ time frame (e.g., seconds)... damages in FrEDI are calculated as functions of\
    \ CONUS degrees of warming over time relative to a 1986\u20132005 average temperature\
    \ baseline.\"\nHighlights: \"FrEDI was designed to fill the current need of monetizing\
    \ a broad range of climate-driven impacts in the US across various warming, emission,\
    \ and socioeconomic trajectories, while doing so in a significantly shorter computational\
    \ time frame.\"\nMore Notes: \"FrEDI also provides insight into differences in\
    \ impacts under various adaptation scenarios and contains a module that can be\
    \ used to quantify impacts to socially vulnerable populations. Sub-national differences\
    \ in warming are also explored within FrEDI using results derived from a consistent\
    \ set of GCMs that were also used within the underlying studies.\"\n"
  5: 'FrEDI calculates damages across 20 sectors in six topical categories using "the
    default FrEDI adaptation assumptions of ''reactive'', ''reasonably anticipated
    adaptation'', or ''no additional adaptation''" and "quantifying differential climate-driven
    damages across impact sectors, geographic regions, and adaptation options." FrEDI
    extends to project damages out to 2300, "quantify the net present damages in the
    US resulting from an additional tonne of CO2, CH4, or N2O emissions" using "linearly
    extrapolating its sector-specific, temperature-binned damage functions" based
    on "all 10000 RFF-SP-derived temperature and socioeconomic scenarios" and a "1GtC
    pulse of CO2 (or CH4 or N2O) is added to each of the RFF-SP emissions scenarios
    in the year 2020." This results in "annual marginal climate-driven damages" which
    are "discounted to the year of emissions...in 2020 US dollars." Adaptation is
    explored with the capability to "compare climate-driven damages across different
    populations" and "adaptation has the capacity to both exacerbate and ameliorate
    future climate-driven damages." Analysis includes attributes like "sea level rise,
    temperature changes," and considers "differential vulnerability (Table A2), including
    low income, ethnicity, and race4, educational attainment, and age." '
  6: " \n\"FrEDI was developed to quantify the physical and economic damages from\
    \ climate change over the 21st century within contiguous US borders. Figure 2\
    \ shows the net annual economic climate-driven damages across 20 sectors in the\
    \ US in the years 2050, 2070, and 2090\" \n\n\"Climate-driven damages from FrEDI\
    \ are largest for the health category. The majority of damages in this category\
    \ are from the estimated valuation of premature mortality attributable to climate-driven\
    \ changes in temperature and air quality (O3 and PM2.5) but also include monetized\
    \ health damages attributable to Valley fever, Southwest dust, wildfire smoke\
    \ exposure and suppression costs, and crime incidents.\"\n\n\"Figure 2 shows that\
    \ net national damages increase over time, with mean climate-driven damages estimated\
    \ to reach USD 2.9 trillion (95% CI: USD 510 billion to USD 12 trillion), or ~3%\
    \ of US GDP, annually by 2090\"\n\n\"uses a Ramsey approach calibrated to a near-term\
    \ target discount rate of 2%, with\u03C1=0.2% and\u03B7=1.24 ... uses the equation\
    \ ... to calculate the net present value\"\n\n\"Total annual damages throughout\
    \ this analysis are shown in 2020 US dollars, converted from FrEDI\u2019s base\
    \ units of 2015 USD using annual GDP implicit price deflators\"\n"
  8: "The sectors assessed in this study are independent and therefore damages are\
    \ additive across these sectors. Results from FrEDI also show that climate-driven\
    \ damages across the national population vary by geographical region. Table 2.\
    \ The range of 2090 physical impact results across the 10000 RFF-SP projections,\
    \ including the 95% CI and mean. Totals may not sum due to rounding. [...] One\
    \ potential exception could be temperature-related mortality and the climate\u2013\
    air quality linkage, as most approaches to estimating temperature-related mortality\
    \ are statistical rather than mechanistic, which could lead to double counting\
    \ of some health effects between these two sectors. Notably, the largest impact\
    \ sector in this study, temperature-related mortality, does not include assumptions\
    \ about future adaptation. While the primary underlying study (Cromar et al.,\
    \ 2022) is a well-regarded meta-analysis of existing global temperature-related\
    \ mortality studies, it does not explicitly consider future adaptive measures.\
    \ Exploring projected 2090 damages from one alternative damage function that assesses\
    \ impacts of extreme temperature on mortality in 49 US cities (Mills et al., 2014)\
    \ suggests that damages will be reduced (Table A4) in the event that US cities\
    \ can gradually adapt to hotter temperatures, for example, through physical acclimatization,\
    \ increased air conditioning penetration, and behavioral changes. Based on the\
    \ climate impacts included in FrEDI, Fig.5 shows that the Southeast will experience\
    \ the largest annual damages per capita (mean: USD9300 per person annually; 95%\
    \ CI: USD1800\u2013USD37000 per person annually), whereas the smallest damages\
    \ per capita are expected in the Southwest region (mean: USD6300 per person annually;\
    \ 95% CI: USD840\u2013USD27000 per person annually)."
  9: null
  11: " \n\"Figure6.Vulnerability toclimate-driven changes inair-quality-attributable\
    \ mortalityand labor hourslost, by raceand vulnerable groupsin 2090.\"\n\"Table3.\
    \ Comparison of FrEDI damages from SSP and RFF socioeconomic input scenarios in\
    \ 2090\"\n\"The image consists of four bar charts related to air quality, mortality\
    \ rates, and labor hours lost, with a focus on different demographic groups\"\n\
    \"### (a) Air Quality: Mean Difference in Risk Relative to the National Population\
    \ in 2090\"\n\"### (b) Air Quality: Mean Difference in Risk Relative to the National\
    \ Population in 2090\"\n\"### (c) Additional Mortality in 2090\"\n\"### (d) Labor:\
    \ Additional Hours Lost Per Capita in 2090\"\n\"Each chart visually represents\
    \ disparities in different demographic groups in terms of air quality impact,\
    \ mortality, and labor hours affected in the year 2090.\"\n\"Categories and Mortality\
    \ Rate per 100,000: Black or African American: 133\"\n\"Categories and Labor Hours\
    \ Lost: American Indian or Alaska Native: 82\"\n"
  12: 'Source material here.

    1. Evaluation overview: "For example, the largest sector, premature mortality
    from temperature changes, dominates the monetized damages across all regions."

    2. Drivers of Risk: "The mortality approach used in this paper is based on a well-regarded
    systematic review and meta-analysis of temperature-related mortality studies..."

    3. Quantitative material: "Figure 7. Net present value of future damages from
    1t of CO2 for damages occurring only within the CONUS. Units are in dollars (2020
    USD) per tonne of CO2 emitted. Whiskers represent the 2.5th and 97.5th percentiles,
    while boxes span the 25th to 75th percentiles. Mean values (stars and text) and
    median values (vertical lines) are also shown."

    4. Methodology: "This study presents an evolving framework to quantify the damages
    of climate change to the US economy, relying on more than a decade of research
    exploring individual sectoral impacts within the contiguous US... Impacts are
    dependent upon a change in global mean surface temperature, US GDP, and US population
    and assumptions about adaptation."

    5. Highlights: "...the channels through which climate change can affect US citizens
    and residents and their relative magnitudes beyond what is currently possible
    in many global models yet remain a partial estimate of the total damages from
    greenhouse gas emissions."

    6. More Notes: "The FrEDI framework is dynamic, with new sectors being added to
    the framework on a continuous basis... the framework still omits coverage of many
    non-market sectors such as biodiversity..."

    '
  13: " \nFrEDI\u2019s flexible framework allows for the model to be continually updated\
    \ as studies of impacts on new sectors or updates to outdated sectoral studies\
    \ become available. FrEDI also has a module to incorporate information from the\
    \ recent EPA Report of Climate Change and Social Vulnerability in the United States\
    \ to assess the differential climate-driven impacts in 2090 across different socially\
