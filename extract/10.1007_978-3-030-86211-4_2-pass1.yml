    \ transfer/brokering, communication and user engagement [Linked to Roadmap Challenge\
    \ 2]. Capacity building [Linked to Roadmap Challenge 2]. Mainstreaming climate\
    \ services [Linked to Roadmap Challenge 2 and Challenge 1]. Balance between underpinning\
