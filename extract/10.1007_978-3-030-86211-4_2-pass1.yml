    \ introduces adaption for certain sectors explicitly.\"\n\"Highlights\": \"AD-DICE\
    \ (de Bruin et al. 2009a, b) is an extension to DICE that explicitly considers\
    \ adaptation. It disaggregates the damage function into adapta-\\ntion costs and\
    \ residual damages and selects a preferred combination of mitigation and adaptation.\"\
    \n"
