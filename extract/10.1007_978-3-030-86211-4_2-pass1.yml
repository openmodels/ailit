  137: 'Source material here.

    This section describes a variety of models addressing the impacts of climate change
    and performance of adaptation measures on various economic sectors, productive
    assets or services, business operation and continuity and the environment.


    Maire et al. describes a framework which couples and unifies climate, vegetation,
    land management and commodity trade models. Climate emulator simulates effects
    of climate change which are used by dynamic vegetation models to assess the impacts
    on crop yields. A socio-economic land-use model simulates demand and trade of
    agricultural commodities, while adjusting commodity prices rather than assuming
    market equilibrium conditions. The estimated short-term surplus and deficits along
    with environmental constraints drive adaptation responses in land management.


    Borgomeo reviews advances in decision analysis and simulation used to inform climate
    adaptation in water sector. Water Resource System models are forced by climatic
    boundary conditions to simulate river and groundwater discharge. System simulation
    models represent rules for water withdrawal, storage and allocation of water across
    various users. Water use models project water demands from households, agriculture
    and other economic sectors. Water resource system simulators test the performance
    of the system under changing conditions of climate and demand.


    Pulido-Velazquez et al. review the progress made in advances describe a combination
    of top-down and bottom-up approaches to assess climate change impacts at the local
    scale with vulnerability assessment and definition of socioeconomic scenarios.


    The resulting modelling framework represents trade-offs, responses and cross-scale
    and international interactions within a dynamic system.

    '
  138: "Pant reviews challenges and advancements in modelling vulnerability of large-scale\
    \ infrastructure networks. Impacts of weather and climate risk on interdependent\
    \ infrastructure networks are complex, non-linear and often propagating across\
    \ a part or the entire network. Contemporary climate risk models do not take into\
    \ account adequately the sensitivities of cascading failure mechanisms across\
    \ infrastructure networks. Better models need to take into account the probabilities,\
    \ often correlated, and the intensities of weather- and climate-related extremes,\
    \ networks\u2019 exposure and vulnerability to these events, network connectivity\
    \ through which the cascading effects are propagated and effects of networks\u2019\
    \ disruption on society and economy. Climate proofing of infrastructure systems\
    \ includes revising design standards, incorporating backup options to substitute\
    \ for disrupted services, increasing network redundancy, rerouting options and\
    \ speeding up the recovery of damaged assets. P\xE9rez-Blanco describes an interdisciplinary,\
    \ replicable and scalable framework which combines methods developed in (socio-)hydrology\
    \ and economics to assess implications of adaptation policies in complex human-water\
    \ systems and control trade-offs between robustness of adaptation choices and\
    \ their performance. Whereas microeconomic models can represent the behaviour\
    \ of individuals or \uFB01rms and macroeconomic models can replicate interrelations\
    \ among sectors, hydrologic models study the movement, distribution and quality\
    \ of water. Despite the recent progress made, conventional hydroeconomic models\
    \ are not able to capture reciprocal feedbacks between human and water systems.\
    \ Socio-hydrological models help to overcome this gap by designing modular architectures\
    \ that connect the underlying economic and hydrological models through protocols\
    \ describing the rules governing the exchange of information between the independent\
    \ modules. Sanderson and Stridsland address transitional risks as defined by the\
    \ Task Force on Climate-Related Risk Disclosure (TCFD) and which include risks\
    \ associated with market and technology shifts, loss of reputation and policy\
    \ and legal challenges. While many companies assess and report the greenhouse\
    \ gas (GHG) emission using GHG Protocol, they concentrate on emissions resulting\
    \ from their own operations and emissions associated with consumption of energy\
    \ or water. The emissions from upstream and downstream activities are often neglected.\
    \ For the latter can be addressed by Environmentally Extended Input Output models,\
    \ Life Cycle Assessments or a combination of both (hybrid models). The authors\
    \ describe the advantages and disadvantages of the various model types and argue\
    \ that only the entire value chain related emission analysis and methods foster\
    \ the much needed transparency of emissions accounting. Insurance and risk transfer\
    \ instruments can not only be used to provide protection against climate-related\
    \ damage and losses, they can be designed to reward individual or collective risk\
    \ reduction and adaptation to climate change. Scholer and Schuermans offer several\
    \ examples in which insurance can play an important role."
