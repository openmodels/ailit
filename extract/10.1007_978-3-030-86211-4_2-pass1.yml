  43: "Guided by a number of ongoing climate research programs we explore and contrast\
    \ two types of climate storylines: climate scenario and climate risk storylines,\
    \ both designed to condense the wide range of potential climate change projections\
    \ into a compelling range that is relevant for impact assessment retaining as\
    \ much as possible a link to the real world\u2019s experience with societal climate\
    \ change impacts. The climate scenario storylines are used to aggregate a large\
    \ volume of global climate change projections into a discrete set of stakeholder-oriented\
    \ national scenarios. Climate risk storylines are mapping climate-related shocks\
