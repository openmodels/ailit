    \n"
  174: "Source material here. \"The combined effects of growing water scarcity and\
    \ flood risk increasingly constrain decision-makers to adopt new approaches and\
    \ policies to the management of the human-modified water cycle.\" \"This research\
    \ surveys recent advances in (socio-)hydrology and (institutional) economics that\
    \ contribute toward uncertainty sampling and robust decision-making... develop\
    \ a research agenda toward an interdisciplinary, replicable, and scalable research\
    \ framework integrating data and methods from (socio-)hydrology and economics\
    \ to quantify the broad socio-economic and environmental implications of adaptation\
    \ policies in complex human\u2013water systems...\" \"I will argue that despite\
    \ significant progress, integration among disciplines remains weak and allows\
    \ only for fractioned understanding and partial representation of uncertainty.\"\
    \ \"To this end, I argue that science needs to further underpin the development\
    \ and integration of two pieces of ex-ante information... a modeling hierarchy\
    \ of human\u2013water systems to assess policy performance under alternative scenarios\
    \ and models/model settings, so as to navigate deep uncertainty type 1 and (2)\
    \ a longitudinal accounting and analysis of public transaction costs from before\
