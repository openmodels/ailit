  226: "Source material here.\nIn real-world applications, impact chains have been\
    \ perceived as a very useful tool for analysis as well as for communication of\
    \ complex cause-effect relationships in climate change impacts and risks. ...\
    \ For a successful participatory process, it is important to gather relevant regional/local\
    \ expertise for the selected climate risks and sectors ... Amongst the main advantages\
    \ of impact chains is the possibility to highlight and describe relevant impacting\
    \ mechanisms related to different hazards on complex and heterogeneous socio-ecological\
    \ systems. ... Modelling such complex relationships requires a hybrid approach\
    \ (quantitative/qualitative). ... data availability should be discussed with them\
    \ early in the process. ... A challenge related to this hybrid approach is validation.\
    \ ... Options for validation of hybrid and hypothesis driven methods are an interesting\
    \ field for future research. ... every risk assessment is in the end a value-based\
    \ approach. Risk depends on priorities, values, targets and normative settings.\
    \ ... in each risk assessment a discussion on which effects of climate extremes\
    \ and climate change would fundamentally threaten a system (\u201Chigh risk\u201D\
    ) and which effects might be tolerable or are within the coping capacity of a\
    \ system (\u201Clow risk\u201D) should be conducted.\n"
  228: "The purpose of this work is to present an operational approach to include\
    \ consideration of global change drivers (climatic, economic, social, etc.) in\
    \ support to the design of local policies or investment plans; sources of uncertainty\
    \ (both aleatory and epistemic). Common to most decision contexts in a medium\
    \ term perspective typical of both investment decisions and adaptation policies\
    \ is the prevalence of economic signals in the shorter term and of climatic signals\
    \ in the longer term; The ambition is to identify the preferable solution(s) (in\
    \ terms of technical performances, acceptance by stakeholders, cost\u2013bene\uFB01\
    t ratio, etc.) in a medium term perspective, (e.g., 10\u201340 years), with current\
    \ knowledge; Multi-criteria analysis coupled with uncertainty analysis can contribute\
    \ with methodologically sound and operational solutions; Models play a fundamental\
    \ role in both cases, but they rarely cover the whole set of variables needed\
    \ for decision making and the outcomes usually require integration of qualitative\
    \ expert knowledge or simply subjective judgements."
  229: " \nDrivers of Risk: \"Altered frequencies and magnitude of climate related\
    \ phenomena (e.g., droughts, storms, floods) affect socio-ecosystems and decision\
    \ makers have become aware of the importance to include climate risks in medium\
    \ to long term decisions, both in the policy sector in general and in the financial\
    \ and economic activities in particular.\" \n\nMethodology: \"The three central\
    \ steps are strongly related to modelling activities... it is only through integrated\
    \ modelling that the expected performances of alternative adaptation options can\
    \ be assessed and thus final decisions about strategies can be taken.\" \n\nHighlights:\
    \ \"Altered frequencies and magnitude of climate related phenomena (e.g., droughts,\
    \ storms, floods) affect socio-ecosystems and decision makers have become aware\
    \ of the importance to include climate risks in medium to long term decisions,\
    \ both in the policy sector in general and in the financial and economic activities\
    \ in particular.\"\n"
  230: " \nOperationalizing the available knowledge deriving from climate change integrated\
    \ modelling and bring it to the decision making process... The high level of uncertainty\
    \ about future evolutions of multiple drivers makes the assessment of risk and\
    \ resilience a challenging task... need emerges to assist decision-makers not\
    \ by providing them with an optimal solution based on past trends or a few plausible\
    \ scenarios, but rather with an analysis able to provide ranges of possible future\
    \ outcomes under wide sets of plausible scenarios in order to identify robust\
    \ solutions... Robust Decision-Making or RDM has been implemented in several different\
    \ contexts, such as agriculture, resource management and strategic infrastructure...\
    \ Public and private investments in maintenance, in protection and in the development\
    \ of critical infrastructures... are essential to the functioning of society as\
    \ a whole... propose here a methodological framework that could be used to integrate\
    \ modelling efforts into operational decision making for climate proofing... The\
    \ purpose of this work is to present an operational approach to include consideration\
    \ of global change drivers (climatic, economic, social, etc.) in support to the\
    \ design of local policies or investment plans.\n"
  231: "Source material here.\nThe            proposed            approach       \
    \     is            aimed            in            general            at     \
    \       analysing            alternative            options            (plans,\n\
    policies,           projects)           affected           by           climate\
    \           risks           or           related           to           climate\
    \           change           adaptation.\nSuch          investments          are\
    \          usually          characterized          by          considerable  \
    \        initial          and          maintenance\ncosts      and      must \
    \     therefore      be      carefully      chosen      by      assessing    \
    \  potential      bene\uFB01ts,      trade-offs\nand          interactions   \
    \       with          the          existing          settings.\n          Six\
    \      main      steps      are      foreseen\u2014developed      upon      the\
    \      framework      of      the      EU      Guidelines\nshown           in\
    \           Fig.           26.1\u2014with           possible           iterations\
    \           and           are           depicted           in           the  \
    \         block           diagram\nof          Fig.          26.2.\n         \
    \ The              \uFB01rst              step              consist          \
    \    in              the              identi\uFB01cation              of     \
    \         the              objectives              of              the       \
    \       actions              to              be\nimplemented            and  \
    \          of            the            socio-ecosystem            (SES)     \
    \       involved,            in            order            to,            e.g.,\
    \            identify\nthe               boundaries               of         \
    \      the               system,               exogenous               and   \
    \            endogenous               variable,               and            \
    \   the               main\ninteracting          elements.\n          In     \
    \  the       second       step,       stakeholders       are       involved  \
    \     to       develop       a       shared       conceptual       model\nof \
    \        the         SES         and         the         main         cause-effect\
    \         relationships         between         its         social,         economic\
    \         and\nenvironmental              elements,              to          \
    \   de\uFB01ne              the             needs              for           \
    \  simulation              models              and              other        \
    \      data\nprocessing            tools,            such            as      \
    \      spatial            analysis            ones,            together      \
    \      with            the            required            inputs            in\n\
    terms          of          information          to          be          acquired.\n\
    ...\nThis image is a flowchart designed for decision-making or analysis processes,\
    \ specifically dealing with socio-eco-systems. It uses connected boxes and arrows\
    \ to demonstrate a structured sequence of steps. Here's a detailed description:\n\
    1. **Initial Identification:**\n   - **1a:** \"Identification of the problem and\
    \ of the objectives.\"\n   - **1b:** \"Identification of Socio-Eco-System.\"\n\
    2. **Conceptualization and Adaptation:**\n   - **2a:** \"Conceptual model.\"\n\
    \   - **2b:** \"Adaptation options.\"\n3. **Stakeholder and Scenario Development:**\n\
    \   - **3a:** \"Stakeholders' involvement.\"\n   - **3b:** \"Future scenarios.\"\
    \n   - **3a (parallel):** \"Past climate.\"\n4. **Integration and Modeling:**\n\
    \   - **3c:** \"Expert knowledge.\"\n   - **4a:** \"Integrated model(s).\"\n5.\
    \ **Analysis:**\n   - **4b:** \"Multi-Criteria Analysis.\"\n   - **5a:** \"Uncertainty\
    \ Analysis.\"\n6. **Solution Development:**\n   - **6:** \"Preferable solution(s).\"\
    \nArrows connect these steps, indicating the flow of the process, and some steps\
    \ have parallel or branching paths. The design implies a systematic approach to\
    \ addressing complex socio-ecological challenges.\n"
  232: "The de\uFB01nition of the conceptual model allows\u2014in a third step\u2014\
    to identify a set of plausible solutions to the given problem... Scenario development\
    \ should be done by referring to the most important exogenous variables... Participatory\
    \ qualitative scenarios are used to create new ideas and strategies... In the\
    \ following\u2014forth\u2014step, models are utilised, together with expert knowledge...\
    \ In the fifth step a classical multi-criteria analysis (MCA) is combined with\
    \ uncertainty analysis (UA)... a DSS software was used in our experiences..."
  233: "Source material: The combination of the various components of the proposed\
    \ methodology results in a comprehensive and intuitive decision support system\
    \ that helps the decision-maker to mitigate the impacts of uncertainty and to\
    \ increase the system\u2019s adaptation and resilience to scenario changes, by\
    \ identifying the most robust solution... Moreover, climate change drivers must\
    \ be considered jointly with others and in particular with socio-economic ones.\
    \ ... applications were in the \uFB01eld of climate proo\uFB01ng of hydraulic\
    \ safeguarding of infrastructures, decarbonisation and renewable energies, and\
    \ other economic activities, such as tourism and electric power distribution,\
    \ all with the involvement of the main local stakeholders (local administration,\
    \ SMEs, big farm, port authority) in the assessment of strategies under the effect\
    \ of future climatic scenarios of normative and market evolutions. The CART (Classi\uFB01\
    cation and Regression Trees) algorithm here allows for an identi\uFB01cation of\
    \ critical score values able to overturn the \uFB01nal ranking (step 6) to be\
    \ shared with the involved actors. The combination of the various components of\
    \ the proposed methodology results in a comprehensive and intuitive decision support\
    \ system that helps the decision-maker to mitigate the impacts of uncertainty\
    \ and to increase the system\u2019s adaptation and resilience to scenario changes,\
    \ by identifying the most robust solution... Decision making for climate change\
    \ adaptation is affected by deep uncertainty, i.e., by the lack of agreement about\
    \ how the future will look like, about probability distributions and about parameter\
    \ values. ... Outputs of modelling exercises cannot be immediately used by decision/policy\
    \ makers; instead, they have to be integrated with other sources of knowledge\
    \ (local, collective, subjective, qualitative,\u2026) and jointly implemented\
    \ within an integrated platform for decision support. ... sets of measures in\
    \ consideration for the future Rural Development Plan were analysed through a\
    \ sequence of expert workshops, vis a vis the alternative scenarios deriving from\
    \ downscaling of IPCC SSP\u2019s at regional level."
  234: Hence, instead of following the traditional path of assessing discrete and
    deterministic, or in some cases probabilistic, values and searching for optimal
    solutions, decision-making for climate change adaptation requires lying out all
    the conditions under which plausible solutions may emerge and search for more
    robust options. A combination of qualitative and quantitative modelling, with
    multi-criteria analysis and data mining techniques, can significantly improve
    the potentials of modelling techniques alone.
