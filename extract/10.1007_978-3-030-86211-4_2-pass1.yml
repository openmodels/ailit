  142: Land System Modular Model (LandSyMM) which aims to support future climate research
    by assessing the interplay between natural system dynamics and socio-economic
    processes related to supply and demand. The multiple scales represented allow
    interactions of bottom-up adaptation dynamics and top-down mitigation policies
    to be represented and explored.
  143: " \nLandSyMM couples a dynamic global vegetation model (LPJ-GUESS; Smith et\
    \ al. 2014), a climate system emulator (IMOGEN; Huntingford et al. 2010) and a\
    \ socio-economic land-use model (PLUMv2; Rounsevell et al. 2014; Engstr\xF6m et\
    \ al. 2016; Alexander et al., 2018) (Fig. 16.1).  \nThe dynamic global vegetation\
    \ model (DGVM) computes for example changes in crop yields at a given location,\
    \ in response to climate change, irrigation and fertilizer application which can\
    \ be adjusted \uFB02exibly as part of mitigation strategies.\n"
  144: "Source material here.\nMethodology: \"From a consumption perspective, LandSyMM\
