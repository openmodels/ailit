  106: "Source material: Effective \uFB02ood risk management is highly relevant for\
    \ advancing climate change adaptation, since \uFB02oods cause very large amounts\
    \ of material damage and casualties worldwide (Kundzewicz et al. 2014). From all\
    \ natural hazards, they affected the largest number of people (>2 billion) globally\
    \ in the period 1998\u20132017. In this regard, we review recent advancements\
    \ in understanding, quantifying and modelling changes in risk and its drivers.\
    \ A challenge for integrating human behaviour in dynamic risk assessments and\
    \ modelling is the combined consideration of qualitative and quantitative data.\
    \ Advancements in this respect are (1) the compilation and analysis of comprehensive\
    \ qualitative and quantitative data on \uFB02ood risk changes in case studies\
    \ following the paired event concept; (2) the integration of qualitative and quantitative\
    \ data into socio-hydrological models using Bayesian inference; and (3) the coupling\
    \ of hydrological \uFB02ood risk models with behaviour models in socio-hydrological\
    \ modelling systems."
