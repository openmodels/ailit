  239: 'The paper discusses the establishment of Knowledge Hubs (KH) by JPI Climate
    to address climate neutrality and sea level rise. These will address issues that
    are central to the science-policy interface and to practical responses in addressing
    climate change, from local to global scales. The long-term ambition of the KH
    on sea level rise is to provide periodic assessments of knowledge on sea level
    rise drivers, impacts and policy options for each of the major ocean basins around
    Europe. To address this gap, JPI Climate has decided to establish and progress
    the development of two pilot Knowledge Hubs (KH): one on climate neutrality; and
    another one on sea level rise. The objectives of the KH on climate neutrality
    are to provide regular authoritative analysis of the scientific understanding
    of climate neutrality, to progress on pathways towards achievement of such goal,
    to provide updates on the potential contribution of technologies and innovative
    socio-economic and transdisciplinary approaches to advance this process, and to
    identify knowledge gaps and research needs.'
