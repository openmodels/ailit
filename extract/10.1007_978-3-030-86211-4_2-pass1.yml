  102: "Source material here.\n\"Although yield reductions due to lodging were reported\
    \ to be 31\u201380% in wheat, 4\u201365% in barley, 37\u201340% in oats, 5\u2013\
    20% in maize and 5\u201384% in rice, lodging is usually not considered in commonly\
    \ used crop models. Moreover, efforts on the effects of extremes were focussed\
    \ mainly on the three main staple crops wheat, maize and rice, while studies on\
    \ other crops are rare (R\xF6tter et al. 2018). Although crop rotation design\
    \ and management has been identified as an important measure to adapt to and mitigate\
    \ climate change, most studies on climate change impact or adaptation so far use\
    \ single-year simulations and/or single crop assessments (Webber et al. 2018a).\
    \ However, if simulations neglect to include year-to-year changes in initial soil\
    \ conditions of water and nutrient availability related to agronomic management,\
    \ adaptation and mitigation strategies cannot be properly evaluated. Therefore,\
    \ the integrated assessment of impacts, adaptation and mitigation options under\
    \ current and future climatic conditions requires continuous long-term simulations\
    \ of crop sequences (e.g. Kollas et al. 2015) to take into account carry-over\
    \ effects as in real conditions.\"\n"
