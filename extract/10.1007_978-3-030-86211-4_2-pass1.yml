  195: " \n\"Creditworthiness, i.e., the ability to pay off one's debt, is central\
    \ to mortgage and trade credit insurance. ... Climate (change)-related costs are\
    \ a source of credit risk: economic costs from physical and transition risks caused\
    \ by climate change are ultimately borne by households and firms, affecting their\
    \ cash flows and wealth, which are key determinants of their creditworthiness.\"\
    \n\n\"The impact of climate (change)-related events on mortgage insurance is well\
    \ illustrated by the case study research by Corelogic on loan payment performance\
    \ in Texas, after Hurricane Harvey hit the end of August 2017... properties estimated\
    \ to have damage saw a 205% increase in 90+ day delinquencies.\"\n\n\"BI insurance...\
    \ is a key aspect to build a resilient society especially in the context of climate\
    \ change adaptation... Insurers also have a clear role to promote the pro-active\
    \ management of BI risks... Creditworthiness... is central to mortgage and trade\
    \ credit insurance... Additional adaptation measures from credit insurers can\
    \ further contribute to climate change adaptation.\"\n"
  196: The page describes "90+ day mortgage delinquency" as a key outcome, with the
