  132: "Source material: The ability of a GFM to estimate \uFB02ood hazard is broadly\
    \ contingent on four components, these are: The model of terrain elevations (DEM).\
    \ The method used to estimate extreme \uFB02ows. The de\uFB01nition of the river\
    \ network. The numerical model to simulate inundation. Below, recent advances\
    \ in each of these components are summarised, sometimes with a focus on the GFM\
    \ developed by the University of Bristol to keep the discussion brief. Ongoing\
    \ data needs and key modelling uncertainties are identi\uFB01ed along with some\
    \ opportunities to improve the models over the next 5\u201310 years. ... Floods\
    \ are shallow waves with long wavelength and low amplitudes. As such, they are\
    \ highly sensitive to the terrain over which they \uFB02ow, which can both alter\
    \ and block \uFB02ow pathways. It is widely accepted that airborne LiDAR data\
    \ offer the most accurate terrain data for \uFB02ood mapping, with sub-metre resolution\
    \ and vertical errors in the low decimetres. However, LiDAR data are absent in\
    \ data sparse areas and global scale DEM data must be used instead. For much of\
    \ the last two decades, data obtained by the Shuttle Radar Topography Mission\
    \ (SRTM) has been the preeminent terrain data source for \uFB02ood inundation\
    \ mapping in data sparse regions, and the latest revisions to these data seek\
    \ to remove a multiple sources of vertical errors including stripe noise, random\
    \ errors, absolute bias, vegetation bias and urban biases due to buildings (Yamazaki\
    \ et al. 2017). The impact of these error removal processes on the DEM can be\
    \ substantial, ... Further advances in terrain data are most likely to come from\
    \ very higher resolution proprietary datasets such as satellite photogrammetry\
    \ (<2 m) and the 12.5 m version of the TanDEM-X DEM. An increased availability\
    \ of such data at reduced costs is essential if global terrain data are to drive\
    \ substantial improvements in global \uFB02ood hazard modelling in the near future."
