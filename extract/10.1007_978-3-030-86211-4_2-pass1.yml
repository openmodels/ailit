  90: "Modelling of climate-induced landslides include both the analysis of the triggering\
    \ process, i.e. static slope stability analysis and dynamic propagation (run-out)\
    \ analysis. [...] With the prospect of increasing rainfall duration and intensity\
    \ in parts of Europe, the need for further development of modelling tools is evident.\
    \ [...] The use of vegetation as NBS is increasingly being used for erosion protection\
    \ and shallow landslide mitigation. [...] For slope stability analyses, the use\
    \ of vegetation makes the modelling more complex for a number of reasons, mostly\
    \ linked to the influence of vegetation on both the soil\u2013atmosphere interaction\
    \ (i.e. rainfall interception, evapotranspiration) and the soil hydro-mechanical\
    \ properties. [...] Even though there is an increasing activity in the geotechnical\
    \ environment to incorporate the effects of vegetation in the modelling for quantifying\
    \ the change in slope stability (i.e. calculate slope safety factor), the status\
    \ is far from being at the level of traditional landslide modelling tools."
  91: 'The source material mentions, "Many studies have shown that a change in rainfall
