  110: 'Source material here.

    Modelling Approaches

    SYMs capture system characteristics based on a set of processes, which are simplified
    into a set of differential equations (Viglione et al. 2014). These models are
    examples of a top-down approach, and are relatively straightforward to implement...
    The use of Bayesian inferencing in the SYM allows hydrologists and social scientists
    to introduce their degree of belief in certain processes as priors.

    The SSMs are developed by coupling relevant detailed individual models that capture
    different processes within the system. These models are spatially explicit and
    as such capable of producing risk scenarios that are most relevant to the regional/local
    scale.

    ABMs capture the characteristics of individual components in the system (agents),
    their interactions and feedbacks. The overall system characteristics may be inferred
    based on this. This is an example of a bottom-up approach. The ABMs may be process-oriented
    where the behaviour of each agent is modelled based on behavioural theories such
    as protection motivation theory, expected utility theory or prospect theory.

    '
