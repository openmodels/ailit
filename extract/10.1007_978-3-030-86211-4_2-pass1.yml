  81: 'A Model-Based Response Surface Approach for Evaluating Climate Change Risks
    and Adaptation Urgency" focuses on impacts in climate-sensitive sectors, such
    as water resources, forestry, agriculture or human health. The approach involves
    the construction of impact response surfaces (IRSs) based on impact model simulations,
    using sectoral impact models that are also capable of simulating some adaptation
    measures. By working with observable indicators, the approach is also amenable
    to long-term monitoring as well as evaluation of the success of adaptation. Specific
    attention is given to three aspects: sensitivity, urgency, and response. Challenges
    identified include ensuring the salience and credibility of the impact modeling
    conducted, co-exploration of the capabilities of current impact models and the
    need for improved representation of adaptation, and co-identification of critical
    thresholds for key impact indicators and effective representation of uncertainties.
    The approach is currently being tested for five sectors in Finland.'
