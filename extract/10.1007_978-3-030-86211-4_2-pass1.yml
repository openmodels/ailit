  56: "Stress-tests help to establish conditions under which there may be trade-offs\
    \ between or even failure of project deliverables. Stress-tests may be undertaken\
    \ for specified portfolios of management options, using models of the system being\
    \ managed (including inputs and drivers of change), and then assessed against\
    \ decision-relevant performance indicators with agreed options appraisal criteria.\
    \ Field experiments and model simulations can be designed to test costs and benefits\
    \ of adaptation measures. Simple rules may help to operationalize the findings\
    \ of trials\u2014such as \u2018plant 1 km of trees along a headwater stream to\
    \ cool summer water temperatures by 1 \xB0C\u2019. However, insights gained from\
    \ field-based adaptation stress-testing are limited by the conditions experienced\
    \ during the observation period. These may not be severe enough to represent extreme\
    \ weather in the future. Model simulations overcome this constraint by applying\
    \ credible climate changes within the virtual worlds of system models. Nonetheless,\
    \ care must be taken to select meaningful change metrics and to represent plausible\
    \ changes in boundary conditions for climate and non-climate pressures. All stress-testing\
    \ should be accompanied by monitoring, evaluation and learning to benchmark benefits\
    \ and confirm that expected outcomes are achieved."
  57: "Source material here.\nEvaluation overview: \"How can we be confident that\
    \ investments in adaptation projects will deliver intended benefits despite deep\
    \ uncertainty about climate variability and change? This technical contribution\
    \ discusses ways of evaluating the performance of adaptation measures.\"\nDrivers\
    \ of Risk: \"There are also concerns about resource depletion, biodiversity loss,\
    \ environmental degradation, and especially human health. These are being driven\
    \ by profound changes in demography, technology, global trade, public debt, and\
    \ urbanisation.\"\nMethodology: \"The next section describes a framework that\
    \ emphasizes clarity about intended adaptation and/or development outcomes from\
    \ the start... By such 'stress-testing' we are seeking to better understand how\
    \ various options might perform under credible climate and non-climate scenarios\
    \ of system change. Fortunately, new tools and techniques are being developed\
    \ to enable this via dedicated field experiments and systems modelling.\"\nHighlights:\
    \ \"Hence, this paper emphasizes the importance of adaptation planning that is\
    \ integrated and mindful of multiple drivers of environmental change\u2014we must\
    \ avoid what some term 'climate exceptionalism' in our thinking.\"\n"
  58: "Faced by wide ranges of uncertainty in outcomes, decision-makers may be forgiven\
    \ for taking no action, delaying investments, or calling for further information.\
    \ A more fruitful strategy is to \uFB01rst accept that uncertainty is a fact of\
    \ life\u2014it may be better characterized by more research but is seldom reduced\
    \ to a point where there is certainty about the consequences of a future action.\
    \ By embracing the uncertainty, we are satis\uFB01cing rather than optimising\
    \ investments: some say we are seeking to minimize regret or maximize resilience\
    \ through robust decision making... Robust decision making frameworks for adaptation\
    \ option appraisal typically comprise of four main elements. These are as follows:\
    \ (1) portfolios of management options; (2) models of the system being managed\
    \ (including inputs and drivers of change); (3) project performance metrics; and\
    \ (4) options appraisal criteria. Moreover, decision-centric frameworks are participatory\
    \ and iterative in ways that enable managers and analysts to reach a shared understanding\
    \ of key system vulnerabilities and adaptation goals... By concentrating on project\
    \ goals and understanding key vulnerabilities, it is possible to target time and\
    \ resources in more productive ways... Where addressing climate risks is the primary\
    \ objective, or where there are long-lived investments, with risk of lock-in,\
    \ high levels of precaution, or major economic consequences, detailed assessment\
    \ is warranted (e.g., coastal defences to protect infrastructure from rising sea\
    \ levels)."
  59: "Physical experiments or system models can then be used to evaluate (i.e., stress\
    \ test) how such measures or combinations of measures perform under specified\
    \ scenarios of change. ... In other words, the stress-testing may need to be multi-dimensional\
    \ to gain a more comprehensive view of direct and indirect climate risks, as well\
    \ as non-climate threats... control experiments or counterfactual simulations\
    \ are needed to benchmark outcomes \u2018with\u2019 versus \u2018without\u2019\
    \ adaptation. ... This presupposes a commitment to long-term monitoring of relevant\
    \ drivers, well-defined trigger points for decisions, with monitoring of adaptation\
    \ outcomes. ... so the whole adaptation framework must be dynamic and open-ended."
