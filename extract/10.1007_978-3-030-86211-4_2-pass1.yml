  150: " \nSimulation modelling is at the core of the decision analysis methods described\
    \ above. Simulation modelling is particularly powerful because of the capacity\
    \ to test and explore shocks and scenarios that have never happened, by subjecting\
    \ a simulator of a water resource system to those conditions \u2018in silico\u2019\
    . System stress testing through computer simulation is one of the most important\
    \ tools for water resources planning in the face of climate change... The purpose\
    \ of water resource system simulators is to test the performance of the system\
    \ under changing conditions of climate and demand... System performance within\
    \ a given future state can be quantified in multiple ways... The recent emphasis\
    \ on decision-making under uncertainty means that metrics that can be related\
    \ to the principles of flexibility and robustness described above are increasingly\
    \ being applied... These metrics are typically quantified across large sets of\
    \ plausible future climate scenarios...This process generates the climatic boundary\
    \ conditions... Simulating a water resource system involves coupling several different\
    \ models...Climatic boundary conditions: Information on climatic variables (rainfall,\
    \ temperature) is a first key input to simulate water resource system behaviour\
    \ under climate change... The reliability of GCM outputs for adaptation planning\
    \ in the water sector has been questioned...\n"
  151: E. Borgomeo discusses the methodologies for simulating climatic boundary conditions
    through direct simulation of weather or hydrological variables. Hydrological models
    transform climatic inputs into water quantities considering spatial-temporal processes.
    Recent advances in smart metering technology and economic analysis improve modeling
    of water demand and user response. The process has been applied in London to adapt
    the city's water supply system to the expected impacts of climate change and population
    growth.
  152: "Simulators of London\u2019s water systems show that if no action is taken,\
    \ London is indeed set to experience more frequent and severe water shortages\
    \ in the future as early as 2030 (Borgomeo et al. 2018). This is mainly down to\
    \ population growth, but climate change complicates things further as it will\
    \ mean more frequent and intense droughts.\n\nThrough the use of simulators, water\
    \ managers in London have identi\uFB01ed aggressive demand management to reduce\
    \ consumption and losses in the distribution system (called leakage) is a priority\
    \ to be implemented immediately (Water 2019). However, they have also identified\
    \ options to augment supplies in the long-term. These include recycling wastewater\
    \ and transferring water from other parts of Southern England (Borgomeo et al.\
    \ 2018; Water 2019). These options have been identified through the application\
    \ of water resource system simulators designed to optimize system performance\
    \ along four objectives: (1) least cost, (2) least environmental impact, (3) robustness,\
    \ and (4) least emissions. London\u2019s approach to climate adaptation required\
    \ water managers and regulators to move away from a decision model focused on\
    \ identifying the least cost solution to close the water supply\u2013demand gap.\
    \ Instead, they expanded their decision objectives to incorporate other aspects\
    \ such as sustainability and robustness which are key to adapt to climate change\
    \ and which can be modeled through water system simulators."
  155: "Source material: A framework is developed to integrate inputs from the two\
    \ main approaches commonly used to plan for adaptation. The proposed \u201Ctop\u2013\
    down meets bottom\u2013up\u201D approach provides a systematic and practical method\
    \ for supporting the selection of adaptation measures at river basin level by\
    \ comprehensively integrating the goals of economic ef\uFB01ciency, social acceptability,\
    \ environmental sustainability, and adaptation robustness. The top-down approach\
    \ relies on the use of a chain of models to assess the impact of global change\
    \ on water resources and its adaptive management over a range of climate projections.\
    \ Future demand scenarios and locally prioritized adaptation measures are identi\uFB01\
    ed following a bottom-up approach through a participatory process with the relevant\
    \ stakeholders and experts. Cost-effective combinations of adaptation measures\
    \ are then selected using a hydro-economic model at basin scale. The resulting\
    \ adaptation portfolios are climate checked to de\uFB01ne a robust program of\
    \ measures based on trade-offs between adaptation costs and reliability. Valuable\
    \ insights are obtained on the use of uncertain climate information for selecting\
    \ robust, reliable, and resilient water management portfolios."
  156: " \nUncertainty and Adaptation in Water Resource Systems: \"Two main approaches\
    \ are commonly implemented in the design of climate change adaptation plans. The\
    \ 'top-down' (TD) approach involves downscaling climate projections from General\
    \ Circulation Models (GCM) under a range of emission scenarios to provide inputs\
    \ for hydrologic and management models... Alternatively, in a 'bottom-up' (BU)\
    \ approach, vulnerability thresholds and local responses are empirically studied\
    \ to define locally suitable adaptation strategies.\"\n\n\"...Effective adaptation\
    \ should combine both structural and non-structural measures, including regulatory\
    \ and economic instruments. Selected adaptation is expected to be economically\
    \ efficient, environmentally sustainable, socially acceptable, and robust.\"\n"
  157: " \nEvaluation overview: \"The framework focuses on selecting portfolios of\
