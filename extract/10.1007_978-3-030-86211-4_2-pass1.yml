  191: Insurance can contribute to limiting the impact (i.e. losses) of a catastrophic
    event, based on its knowledge and expertise in assessing (modelling, pricing)
    and pooling. Including risk reduction measures in an insurance product has the
    advantage of helping to better adapt to climate change by not only transferring
    the risk but by directly reducing avoidable damages when an event strikes, which
    as a result contributes to build a more resilient society. According to the 2020
    World Economic Forum, more common extreme weather events could make insurance
    unaffordable or unavailable.
  192: "Source material: Through adaptation measures, insurers can contribute to limiting\
    \ the potentially systemic risks to society arising from climate change, such\
    \ as economic consequences, in terms of welfare, including damage to the capital\
    \ stock, sectoral productivity and changes in consumption (JRC 2020). A number\
    \ of prevention measures can be taken by policyholders to lower potential \uFB02\
    ood impacts (Hudson et al. 2016), such as limit the potential damage once the\
    \ water has entered a building (known as wet \uFB02ood-proo\uFB01ng) or attempt\
    \ to prevent water from entering a building (known as dry \uFB02ood-proo\uFB01\
    ng). One way insurers could incentivise risk reduction could be by giving premium\
    \ discounts to policyholders, which would implement adaptation measures to minimise\
    \ the risk."
