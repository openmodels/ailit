  63: Field experimentation is most informative when adaptation outcomes are observable
    under extreme weather or controlled laboratory conditions. Likewise, systems modelling
    credibility depends on plausible narratives of change with which to bound simulation
    inputs and model parameters. In either case, strong counterfactuals are needed
    to assess outcomes, especially where there are potentially confounding signals
    from non-climatic pressures. Stress-testing also requires long-term monitoring,
    evaluation and learning to benchmark performance metrics and to confirm that expected
    project outcomes are achieved. Additionally, further work will be needed to monetize
    climate risks and adaptation benefits.
  65: "Source material here.\n\"Abstract There are many challenges that adaptation\
    \ science faces for an effective application of the results and recommendations\
    \ found. Among the most important are the estimation, management and interpretation\
    \ of uncertainty. In this article, we present our approach to managing uncertainty\
    \ in agricultural projections using a combination of techniques to identify uncertainties,\
    \ exclude unviable outcomes, consider possible futures probabilistically, and\
    \ select the most robust projections for adaptation. Through an example of the\
    \ adaptation of winter wheat in Spain, we show how this approach is effective\
    \ in increasing the probability of avoiding maladaptation and improving the applicability\
    \ and assimilation of scienti\uFB01c results by users.\"\n\n\"Introduction According\
    \ to the 2019 report of the World Economic Forum (WEF 2019), extreme weather events\
    \ and failure on climate-change mitigation and adaptation are the two risks with\
    \ the highest probability and the highest impact among the analysed in the report,\
    \ with other issues such as water crises following them closely.\"\n"
  66: null
  67: " \n\"Adaptation consisted of a combination of changes of sowing dates, cultivar\
    \ and water management.\"  \n\"These adaptations were simulated separately and\
    \ combined, by an ensemble of 17 members made up of 14 crop models and 17 modelling\
    \ groups from MACSUR project.\"\n\"The CERES-wheat crop model within DSSAT platform...was\
    \ used for simulating wheat responses to climate change.\"\n\"Ensemble modelling...combining\
    \ outputs from several climate models and crop models allow estimating the joint\
    \ uncertainty from climate and crop modelling.\"\n\"Application of the AOCK approach...prevents\
    \ for including inconsistencies that affect ensemble results...improve ensemble\
    \ effectiveness.\"\n\"Another option was supplementary irrigation, consisting\
    \ of a single application of 40 mm at flowering.\"\n"
  68: " \n\"Impact Response Surface (IRS) consists of a plotted surface that depicts\
    \ the response of a studied variable (e.g., crop yield) to combined changes in\
    \ two explanatory variables (e.g., P and T). An Adaptation Response Surface (ARS)\
    \ plots the difference between the impact variable responses (e.g., yield) with\
    \ and without adaptation being considered, usually as a percentage of change.\"\
    \n\n\"Another metric called 'recovery value' refers to the difference between\
    \ the yield response including an adaptation option and the baseline yield response\
    \ (i.e., for an unperturbed simulation, 360 ppm of [CO2] and un-adapted management).\
    \ The 'recovery value' measures the capacity of an adaptation option to maintain\
    \ the yields of the baseline simulation under unperturbed conditions.\"\n\n\"\
    Finally, we develop an index of wide applicability for reducing the uncertainty,\
    \ the so-called Ensemble Outcome Agreement (EOA) to assessing the confidence of\
    \ the decisions taken regarding a threshold level, such as recommended adaptation\
    \ options that are projected to provide positive adaptation values by the ensemble.\"\
    \n\n\"The main added value of this further improvement was that by assigning an\
    \ EOA value to every adaptation option, those that are otherwise promising in\
    \ terms of adaptation response but show low confidence (i.e., low values of EOA)\
    \ can be discarded, in favour of those with more confidence.\"\n"
  69: "Source material: \"Adaptation of winter wheat in Spain relies on \uFB01nding\
    \ local optimal combinations of cultivars and management. Revised recommendations\
    \ would be to focus on early and standard sowing dates combined with standard\
    \ and longer cultivars for meeting both adaptation and recovery targets under\
    \ moderate perturbations with very high con\uFB01dence, while there would be chances\
    \ of achieving only adaptation bene\uFB01t (impact reduction) with these options\
    \ for severe perturbations. The study demonstrates how omitting this analysis\
    \ would result at least in a number of misleading recommendations under certain\
    \ perturbations, resulting in maladaptation. In NE Spain, winter wheat under future\
    \ conditions would bene\uFB01t from switching to spring cultivars (i.e., no vernalisation\
    \ requirements) with standard and longer cycle length, combined with early and\
    \ standard sowing dates in autumn. EOA analysis supports the recommendations done\
    \ Ruiz-Ramos et al. (2018) for adaptation, while for recovery the main difference\
    \ was lower con\uFB01dence reported by EOA for many cases. The confidence level\
    \ for shorter cultivars of both winter and spring wheat was lower than for the\
    \ other cultivars, including some adaptation options previously recommended that\
    \ now should be excluded.\""
