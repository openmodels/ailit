  29: "Source material: \"The GRACE model confirms that without mitigation policies,\
    \ the impacts of climate change on economies can be large, which implies high\
    \ costs of adaptation. For instance, Aaheim et al. (2017b) addressed the economic\
    \ consequences of mitigating climate change by reducing emissions from a high-emission\
    \ pathway that leads to an increase in global mean temperature between 5.0 and\
    \ 6.0 \xB0C (RCP8.5) to approximately 3.0 \xB0C in a moderate emission pathway\
    \ (RCP4.5) in 2100. The mitigation alternative (i.e., RCP4.5) gives moderate costs\
    \ in some regions and small benefits in others. A high-emission pathway (i.e.,\
    \ RCP8.5), on the other hand, implies huge costs in all regions, occurring mainly\
    \ after 2070. The explanation to the moderate impacts in both alternatives in\
    \ the coming decades is adaptation among economic agents with resulting price\
    \ effects with impacts on sector composites and trade. The potential for this\
    \ adaptation is limited, however, as becomes apparent under stronger impacts associated\
    \ with high emissions. The study shows that RCP4.5 may represent an optimal, global\
    \ strategy, as it leads to a stabilization of climate change impacts in the long\
    \ term. At the same time, it illustrates the challenges in achieving the \u201C\
    best solution for future generations\u201D, as the policy needed to achieve a\
    \ 3.0 \xB0C target implies an increase in the cost of emitting a ton of CO2 at\
    \ 12\u201415 percent per year from 2010 to 2075, according to this study.\""
  30: "Source material: Impacts of climate change (in Bill US$) expected in 2100 on\
