  53: 'Source material here.

    Evaluation overview: The page does not provide a specific overview of outcomes
    like mortality or productivity loss. It focuses instead on model performance and
    parameter sensitivity across climatic gradients.

    Drivers of Risk: The analysis examines how model parameter sensitivities change
    along a climatic gradient defined by aridity. "Sensitivity indices (SI) for the
    model parameters... show a strong correlation with the aridity index in relation
    to both high flows (RMSE) and low flows (TRMSE)."

    Quantitative material: Provides correlation values indicating relationships between
    sensitivity indices and aridity index; e.g., R=0.74, R=-0.92, R=0.77, R=-0.96.
    "Positive correlation indicated by R=0.74 for UZFWM SI and negative correlation
    R=-0.92 for LZTWM SI.... Positive correlation shown by R=0.77 for LZPK SI and
    negative correlation R=-0.96 for PFREE SI."

    Methodology: The study uses global sensitivity analysis on rainfall-runoff model
    SAC-SMA to assess parameter impact on model output across climatic gradients.
    "van Werkhoven et al. (2008) showed that the sensitivity of the output of a widely
    used rainfall-runoff model (SAC-SMA) with respect to its parameters, changes strongly
    along a climatic gradient."

    Highlights: The analysis shows that dominant modelled processes change along climatic
    gradients, with implications for evaluating impacts under future scenarios. "This
    result suggests that dominant modelled processes change along a climatic gradient."

    More Notes: Sensitivity analysis is shown to be a flexible tool for validating
    model behavior even without historical observations. "Sensitivity analysis can
    be applied regardless of whether observations of the system response are available...
    making it very suitable for understanding the behaviour of models under potential
    future conditions."

