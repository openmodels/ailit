sourcematerial:
  7: " \nPreface In the last 20 years, the study on climate change adaptation has\
    \ shown important progress in the knowledge of climate change impacts, in the\
    \ methodologies and modelling tools used for adaptation assessment and in the\
    \ mainstreaming and implementation of adaptation decisions in policy planning.\
    \ The vast majority of the monographic literature on adaptation divides into a\
    \ more technical-sectoral stream, analyzing the main features of adaptation action\
    \ in specific contexts (e.g. water sector, disaster risk reduction, agriculture,\
    \ developing countries, etc.) and suggesting guidelines for its implementation,\
    \ and a more theoretical-conceptual one, describing the multidimensional challenges\
    \ for adaptation assessment and the methodologies to address them. This book focuses\
    \ on an issue only marginally tackled by this literature: the still existing gap\
    \ between adaptation science and modelling and the possibility to effectively\
    \ access and exploit the information produced by policy making at different levels:\
    \ international, national and local. To do so, the book presents the proceedings\
    \ of a high-level expert workshop on adaptation modelling, integrated with main\
    \ results from the \u201CStudy on Adaptation Modelling\u201D (SAM-PS) commissioned\
    \ by the European Commission\u2019s Directorate-General for Climate Action (DG-CLIMA)\
    \ and implemented by the CMCC Foundation\u2014Euro-Mediterranean Centre on Climate\
    \ Change, in collaboration with the Institute for Environmental Studies (IVM),\
    \ Deltares, and Paul Watkiss Associates (PWA). More specifically, the book presents:\
    \ results of an up-to-date overview of the technical, financial, economic and\
    \ non-monetary models and tools for climate change hazards, exposure, vulnerability,\
    \ and adaptation assessments, highlighting main research gaps with emphasis on\
    \ the interaction with and usability by the policy community. Building on selected\
    \ use-cases and representative case studies, it also proposes practical approaches\
    \ to conduct adaptation assessments as guidelines for decision makers at different\
    \ levels of governance. All issues are enriched by the contributions of the high-level\
    \ expert workshop, where authoritative experts in the field of adaptation, from\
    \ the academia and public agencies, discuss the interconnections between the science\
    \ and policy of adaptation, identify challenges and latest development from adaptation\
    \ modelling and offer suggestions to overcome the gaps. vii\n"
  11: "The book describes all the activities carried out during the project in the\
    \ frame of each project task. In detail, one of the main outcomes of the project\
    \ is represented by a comprehensive review, which provided an up-to-date and forward-looking\
    \ overview of the range of technical, financial, economic and non-monetary models\
    \ and tools for hazards, risks, impacts, vulnerability and adaptation climate\
    \ assessments. This overview was aimed at addressing the EU Commissions\u2019\
    \ requirement to support greater-informed decision-making on climate adaptation\
    \ at multiple governance levels. The overview provided not only the state of the\
    \ art of the current knowledge on climate adaptation assessment methodologies,\
    \ but it has also allowed highlighting the main research and policy gaps. Based\
    \ on the results of the desk review and accounting for a number of use case and\
    \ specific case studies, the project team has worked at the proposal of a number\
    \ of recommended approaches for modelling the climate-related risks and impacts\
    \ and for analysing the effectiveness of suitable adaptation strategies in order\
    \ to better inform decision-making on climate adaptation at various levels of\
    \ governance."
  17: '`

    Adaptation seeks to address impacts that vary dynamically and non-linearly over
    time against a background of high uncertainty. This uncertainty relates to future
    emission scenarios, climate model projections, socio-economic scenarios, and the
    physical impacts of climate change. These temporal and uncertainty issues make
    modelling complex.

    Adaptation modelling is moving from theoretical to applied, supporting informed
    decision-making for implementation. The prioritisation of adaptation options requires
    extended decision support methods, which include consideration of risk and uncertainty.

    Adaptation does not involve a single quantitative objective and it cannot be assessed
    with a single common metric. The benefits of adaptation are often difficult to
    model in quantitative terms because it involves reductions in impacts that are
    sector-, location-, and context-specific. Adaptation involves a mix of interventions,
    including non-technical options such as capacity building that are more difficult
    to model, but which are critical for effective adaptation.

    This paper is focused on the challenges of adaptation modelling, and identifies
    temporal dimensions, uncertainty, aggregation scales, and the diverse nature of
    interventions as key challenges.

    '
  18: Adaptation modelling is evolving rapidly, with studies recognizing challenges
    and seeking solutions. Papers discuss challenges and propose solutions, with Schwarze
    et al. focusing on global integrated assessment models and Aaheim et al. examining
    multi-region, multi-sector computable general equilibrium models, suggesting interdisciplinary
    studies and stakeholder discussions to improve models.
  21: "plaintext\nIntegrated Assessment Models (IAMs) can be roughly distinguished\
    \ according to their objective as cross-sectoral optimization models (POMs) and\
    \ economic assessment of climate policies (PEMs) according to Toth (2005). This\
    \ paper gives a targeted review on Integrated Assessment Models (IAMs) with a\
    \ focus on damage functions and adaptation modelling. An evolutionary \u201Cfamily\
    \ research\u201D of IAMs helps to identify \u201Cgenerations\u201D of models,\
    \ where each generation enhanced the scientific understanding of climate change\
    \ and influenced the economic recommendations for climate policy based on these\
    \ models.\n"
  23: "yaml\n\"Methodology\": \"Different IAMs incorporate adaptation in various ways\
