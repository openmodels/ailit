  36: "For the purposes of the Roadmap, climate services were defined as follows:\
    \ \u2018\u2026covering the transformation of climate-related data\u2014together\
    \ with other relevant information\u2014into customised products such as projections,\
    \ forecasts, information, trends, economic analyses, assessments (including technology\
    \ assessments), counselling on best practices, development and evaluation of solutions\
    \ and any other service in relation to climate that may be of use for the society\
    \ at large.\u2019 As such, these services were seen as including data and information,\
    \ reflect knowledge that support adaptation, mitigation and disaster risk management\
    \ and, as such, could be described as comprised of four interrelated components\
    \ as follows: Guidance informing climate adaptation and resilience journeys, often\
    \ outlined in terms of informing risk assessment or risk management and adaptation\
    \ planning and implementation frameworks; Data and information to support these\
    \ assessments and processes (including climate and socio-economic data and information);\
    \ Tools and resources to support these assessments and processes; and Enablers\
    \ including knowledge brokering, capability development, use journeys, case studies,\
    \ training/capacity development, communication activities and communities of practice.\
    \ The Roadmap identified three research and innovation challenges comprised of\
    \ nine main activities and 25 specific actions, addressing that which could facilitate\
    \ the development of a climate service market capable of enabling and empowering\
    \ climate action\u2019'. "
