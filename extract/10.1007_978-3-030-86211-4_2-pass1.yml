  140: "Climate change, growing populations and economic shocks are adding pressure\
    \ on the global agricultural system\u2019s ability to feed the world. In addition\
    \ to curbing the emissions from fossil fuel use, land-based actions are seen as\
    \ essential in the effort to mitigate climate change, but these tend to reduce\
    \ areas available for food production, thereby further increasing this pressure.\
    \ The food system actors may respond autonomously based on economic drivers and\
    \ other factors to adapt to climate change, whereas policy measures are usually\
    \ needed for mitigation actions to be implemented. Here, we present an approach\
    \ to better understand and plan these interactions through modelling."
