  224: "Source material here.\n\"\u2026impact chains can serve as a backbone for the\
    \ integration of various methods such as models, indicators or participatory data\
    \ collection\u2026\"\n\"\u2026the risk assessment should not be driven by data\
    \ availability only. While for some components of a risk\u2026quantitative data\
    \ is widely available\u2026for other elements\u2026an assessment can only be based\
    \ on proxy indicators or expert assessments.\"\n\"A typical final result is a\
    \ report with detailed description of each single climate risk consisting of a\
    \ mix of narrative information, graphs and maps\u2026\"\n\"This approach is particularly\
    \ important within the context of adaptation planning, where a qualitative understanding\
    \ of specific vulnerabilities is often more important than quantitative, sometimes\
    \ pseudo-precise, information\u2026\"  \n\"We strongly recommend not to leave\
    \ out any relevant risk or underlying process or factor just because respective\
    \ data is not available.\"\n\"The original approach of the Vulnerability Sourcebook\u2026\
    proposes an indicator-based approach to quantify each risk component and finally\
    \ the resulting risk.\"\n\"Often, a more comprehensive, narrative aggregation\
    \ of data and information collected along the factors and elements of an impact\
    \ chain is a valid alternative.\"\n"
  225: 'Source material here: "Flooding is the central impact shown, leading to flood
