  164: As the adverse effects of climate change are increasingly becoming unavoidable,
    calls for improving climate adaptation assessments have gathered interest at the
    global scale. Infrastructure policymakers and practitioners are now interested
    in understanding climate vulnerabilities and risks that capture the systemic nature
    of failure propagation seen across interconnected networks...There is increasing
    evidence that climate change will increase variability of weather patterns, magnifying
    the severity of short-term shock events such as flooding, storms, heatwaves, while
    also extending long-term shock events such as droughts...This paper presents recent
    technical methodological and tool-based advances made in climate vulnerability,
    risk, and adaptation modeling of large-scale infrastructure networks. These methodologies
    adopt a bottom-up approach that focuses on creating data-rich representations
    of infrastructure network attributes, resource flows, and socio-economic indicators
    that are all used for quantifying direct and indirect risks to network assets
    exposed to extreme climate hazards at multiple scales.
  165: "The focus of this paper is on building data-driven decision-making models\
    \ and tools for evaluating the costs and bene\uFB01ts of climate adaptation of\
    \ infrastructure networks at different spatial scales. [...] These methodologies\
    \ and case studies are all from the experiences and examples of work done in the\
    \ Infrastructure Transition Research Consortium (ITRC 2020), which aims to build\
    \ data-driven models for the identification of spatial network vulnerabilities\
    \ and risks to support decision-making."
  166: 'The methodological steps toward a hybrid top-down and bottom-up climate vulnerability,
    risk, and adaptation assessment of infrastructure networks involve combining (Hall
    et al. 2019; Pant et al. 2020): (1) Climate hazard information that includes spatially
    correlated probabilities, magnitudes, and extents of hazard events under current
    and future climate scenarios; (2) spatial representations of network point and
    line assets to evaluate their exposures to various climate hazards; (3) direct
    vulnerability measures of the exposed network assets that quantifies the sensitivity
    of the assets to be damaged by varying severities of climate hazards; (4) network
    connectivity effects that capture how failures cascade from the directly damaged
    assets toward other assets either physically or through the flow of resources
    (goods, information, etc.); (5) indirect vulnerability measures that quantify
    the socio-economic effects resulting from disruptions of infrastructure network
    services in terms of numbers and monetary values attached to household and business
    customers; (6) further indirect vulnerability measures of impacts to the regional
    economic flows that quantify the effects of production and labour disruptions
    on the outputs of macroeconomic sectors; (7) measurements of risks as the product
    of the probabilities, exposures and direct and indirect vulnerabilities summed
    over all possible hazard and network failure and disruption scenarios; (8) quantifiable
    options for building resilience (to climate or any shock event) of individual
    assets and the networks that include, but are not limited to, upgrading existing
    design standards of assets to withstand more extreme shocks, incorporating backup
    options to substitute for disruptions of services provided from one network to
    another (e.g. electricity backup generators at railway stations), increasing network
    redundancy and rerouting.'
  167: "Source material here.\n\"The effectiveness of different resilience options\
    \ (mentioned in Step 8 above) is evaluated in terms of their costs and the benefits\
    \ of avoiding direct and indirect risks of failures.\" \n\n\"Climate adaptation\
    \ assessment involves the consideration of changing costs and benefits (avoided\
    \ risks) over the life cycle of asset and network management.\"\n\n\"To inform\
    \ decision-makers on how to prioritize investment decisions for adaptation planning,\
    \ a cost\u2013benefit analysis is done to estimate network asset and location-specific\
    \ benefit\u2013cost ratios (BCR) that help identify for which options the avoided\
    \ asset risks would be worth implementing (BCR \u2265 1) and which options would\
    \ be more expensive than the avoided risks (BCR < 1).\"\n\n\"The purpose of the\
    \ methodology outlined above is to create an effective high-level screening whereby\
    \ the efficacy of different types of adaptation options can be compared and locations\
    \ and assets with high (or low) adaptation benefits can be narrowed down for further\
    \ investigation. At a country scale, where it is not possible to invest in every\
    \ asset to make it climate resilient, such information is useful for narrowing\
    \ down the locations of risks, which should be followed by detailed site-specific\
    \ investigations of, among others, local conditions of hazards and assets risks.\"\
    \n\n\"A few case study examples are presented next to highlight how the described\
    \ methodology has been implemented in practice to inform decision-makers about\
    \ quantifiable vulnerabilities and risks to infrastructure networks at the national\
    \ scale.\"\n"
