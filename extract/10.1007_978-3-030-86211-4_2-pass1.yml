  213: "Source material here. The \uFB01rst topic concerns the issue of capturing\
    \ the dynamics of risk, with changes in climate, exposure and vulnerability, with\
    \ the uncertainty of the latter two being at least of similar magnitude as the\
    \ change in climatic hazards. Risk is determined not only by climate but to a\
    \ very large extent by socio-economic circumstances, which are location-speci\uFB01\
    c. Risk is dynamic because of variability and changes in climate, adding to the\
    \ (monotonous) changes and trends in socio-economic developments, and changes\
    \ in human behaviour and (autonomous) adaptive responses to climate risk. These\
    \ dynamics need to be considered, in order to more reliably project how adaptation\
    \ measures will perform over multi-decadal time horizons."
