  197: "\nIn this paper, we have shown how an insurer could contribute to climate\
    \ change adaptation, through insurers\u2019 underwriting and pricing practice.\
    \ Systematic consideration of how to integrate prevention measures to mitigate\
    \ the insured risk should be the way forward. Climate change strengthens the need\
    \ to have adequate risk transfer products, for example for business interruption\
    \ as a significant protection gap exists for BI losses. Innovative risk solutions\
    \ require relevant public and private stakeholders to share their data and exchange\
    \ on different aspects of the risk assessment, prevention, and transfer to ensure\
    \ that risks remain insurable.\n"
  201: "yaml\nEvaluation overview: \"This page does not focus on evaluating a specific\
    \ outcome but rather on outlining the broader context of climate change and its\
    \ effects.\"\nDrivers of Risk: \"Climate change has already made some weather\
    \ and climate extremes more frequent and severe. In 2019, the Lancet Countdown\
    \ reports that the life of every child born today will be profoundly affected\
    \ by climate change, with populations around the world increasingly facing extremes\
    \ of weather, food and water insecurity, changing patterns of infectious disease\
    \ and a less certain future.\"\nQuantitative material: \"Without a radical abatement\
    \ of greenhouse gases, global warming will reach and exceed 3\u20134\xB0 before\
    \ the end of the century (European Commission 2020).\"\nMethodology: \"The page\
    \ presents an overview and recommendations without detailing a specific analytical\
    \ methodology.\"\nHighlights: \"A second path\u2014which limits the global average\
    \ temperature rise to \u2018well below 2 \xBAC\u2019\u2014is possible and would\
    \ transform the health of a child born today for the better, throughout their\
    \ lives. Placing health at the centre of this coming transition will yield enormous\
    \ dividends for the public and the economy, with cleaner air, safer cities and\
    \ healthier diets.\"\nMore Notes: \"The COVID-19 pandemic has taught a lesson\
    \ about how closely environmental, societal and human health are connected. Bold\
    \ new approaches to policymaking, research and business are needed to change course.\"\
    \n"
  203: "The Behaviour Change Wheel can help to address this by: Developing behaviour\
    \ change interventions from scratch, Building on or modify existing interventions\
    \ and choosing from existing or planned interventions (Fig. 23.1). The Behaviour\
    \ Change Wheel involves a number of processes to achieve and these include: Assessment.\
    \ Evaluating the appropriateness of existing or proposed interventions in terms\
    \ of the \u2018APEASE\u2019 criteria: Acceptability, Practicability, Effectiveness,\
    \ Affordability, Side-effects, and Equity (Annex 1). Behaviour selection. Identifying\
    \ and selecting key behaviours to focus on in order to achieve policy objectives.\
    \ Capability, opportunity and/or motivation (COM-B) diagnosis. What will most\
    \ likely bring about the desired behaviour\u2014in terms of changes in the target\
    \ group\u2019s capability, opportunity and/or motivation to engage in/stop the\
    \ behaviour. Central Circle: - Green Segment: Represents \"Capability,\" further\
    \ divided into \"Psychological\" and \"Physical.\" - Blue Segment: Represents\
    \ \"Motivation,\" which includes \"Reflective\" and \"Automatic.\" - Yellow Segment:\
    \ Represents \"Opportunity,\" comprising \"Social\" and \"Physical.\""
