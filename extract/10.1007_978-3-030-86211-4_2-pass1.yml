  31: "The paper evaluates the economic impacts of climate change on smallholders\
    \ and the macroeconomic system in Nepal, focusing on productivity loss in agriculture\
    \ and work. The reduction in land productivity and health effects impacting the\
    \ productivity of work are the main drivers of risk. Land productivity is projected\
    \ to decline by 2% and work productivity by 2.4%. GDP and consumption are expected\
    \ to decrease by approximately 0.25% at the macroeconomic level, while smallholder\
    \ livelihoods may reduce by more than 2%. The analysis combines macroeconomic\
    \ assessments using the GRACE model with micro-based household studies in a community\
    \ in the Khotang district. The study highlights a significant discrepancy between\
    \ macroeconomic and micro-based assessments, emphasizing that constraints related\
    \ to farm size limit adaptation options for smallholders. First, the output is\
    \ constrained by the size of the farm. Second, there is a division between food\
    \ products sold in markets and food for the farmers\u2019 own consumption. Third,\
    \ farmers can work outside the farm to gain monetary income. Hence, their consumption\
    \ is partly based on market transactions. While GDP and consumption are reduced\
    \ by approximately 0.25 percent in Nepal according to the macroeconomic analysis,\
    \ sources of livelihood for most of the smallholders are reduced by more than\
    \ two percent, depending on the size of the farm, according to the household study.\
    \ There are possible explanations to this, which need to be confirmed by further\
    \ studies."
  32: "Source material here.\nbetter understanding of how climate change affect parts\
    \ of societies, and the most vulnerable, to coordinate targeted adaptation strategies\
    \ across levels. Adaptation to Heat Stress Orlov et al. (2020) conducted an economic\
    \ impact assessment of heat-induced impacts on worker productivity under RCP2.6\
    \ and RCP8.5. The authors implement autonomous adaptation in the GRACE model,\
    \ such as penetration of air conditioners and mechanization of outdoor work in\
    \ agriculture and construction, which were linked to different SSPs. Projections\
    \ of mechanization for different SSPs were extrapolated based on a regression\
    \ analysis, where the number of tractors per hectare was used as a proxy for mechanization\
    \ and GDP per capita as an explanatory variable. Results from model simulations\
    \ showed that under RCP8.5 by 2100, heat-induced reductions in worker productivity\
    \ lead to an average decline of 1.4% in GDP relative to the reference scenario\
    \ with no climate change (see Fig. 2.2). This is approximately 0.4 percentage\
    \ points less than when no autonomous mechanization is assumed. Fig. 2.2 Changes\
    \ in global GDP under RCP2.6 and RCP8.5 compared to the reference scenario with\
    \ no climate change. The solid and dashed lines show the mean values and the shaded\
    \ areas indicate uncertainties in the estimated impacts. In the plot legend, \u201C\
    mechanization\u201D (solid lines) stands for decreasing work intensity due to\
    \ mechanization driven by an economic growth, while \u201Cno mechanization\u201D\
    \ (dashed lines) implies a constant work intensity. \u201CHothaps\u201D stands\
    \ for the epidemiological exposure\u2013response function, while \u201CISO\u201D\
    \ implies that ISO: 7243:1989 standards are used to assess heat stress impacts\
    \ on worker productivity.\n"
