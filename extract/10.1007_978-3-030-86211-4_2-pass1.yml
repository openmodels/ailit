  84: 'Approach Operationalising the IPCC Risk Framework The approach builds on the
    premise that the IPCC Risk Framework can be operationalised by modelling impacts
    of climate change for key indicators co-selected with stakeholders across a range
    of sectors, relating these impacts to impact thresholds and simulating the effectiveness
    of adaptation and mitigation in ameliorating key risks. Protocols can then be
    agreed that modellers can use to carry out the model simulations needed for addressing
    the major research questions, which include (in relation to the above objectives):
    Collective decisions to be agreed at an early stage of an assessment through a
    process of co-design across sectors and between researchers and stakeholders.'
  85: "The approach focuses on impacts in climate-sensitive sectors (e.g. water resources,\
    \ forestry, agriculture, human health and winter recreation). The method being\
    \ applied for examining changing risk and the urgency for adaptation across different\
    \ sectors involves the construction of impact response surfaces (IRSs) based on\
    \ impact model simulations. They can be used to evaluate responses to any scenario\
    \ of the drivers that falls within the sensitivity range of the plot, hence providing\
    \ a systematic, \u201Cscenario-neutral\u201D analysis of impacts. Impact response\
    \ surfaces (IRSs) also provide an opportunity to test model performance across\
    \ a wide range of conditions. The IRS method has been increasingly applied during\
    \ the past decade for illustrating impact model sensitivity to climate variables\
    \ (e.g. temperature and precipitation)."
  86: "Source material here. Fig. 9.1 Features of impact response surfaces (IRSs)\
    \ and their potential application in estimating climate change risks (see text\
    \ for explanation) probabilistic representations of future climate (e.g. R\xE4\
    is\xE4nen and Ruokolainen 2006) enabling estimates of the likelihood of certain\
    \ pre-speci\uFB01ed impact thresholds being crossed (Pirttioja et al. 2019). They\
    \ have also been used to model responses to adaptation measures (e.g. Ruiz-Ramos\
    \ et al. 2018). Illustrative Results: Risk Assessment Combining the IRS method\
    \ with probabilistic projections of driving variables to estimate future climate-related\
    \ risks is a novel approach with, as yet, limited uptake. Most applications have\
    \ been in water resource management or agriculture, and we illustrate two such\
    \ cases below using recent examples from Finland and Portugal. However, its practical\
    \ merits have yet to be demonstrated for other sectors and are the subject of\
    \ ongoing research. Risks of Crop Yield Shortfall in Finland In this example,\
    \ results from a published site-based modelling study (Pirttioja et al. 2019)\
    \ are schematised and extended to illustrate (hypothetically) how an IRS analysis\
    \ can be used to estimate regional risk (Fig. 9.1). In A, yield sensitivity to\
    \ temperature and precipitation perturbations relative to a reference climate\
    \ (black dot) is shown as contours, with a threshold yield level indicated in\
    \ red. Such a threshold yield could be determined with stakeholders. A probabilistic\
    \ representation of projected climate at some time in the future is superimposed\
    \ on the IRS (darker shades indicate higher probability). The image consists of\
    \ multiple graphs and maps related to climate change and adaptation: 1. Graph\
    \ A: Displays contour lines representing impact thresholds under current conditions\
    \ and probabilistic climate projections for the year 2060. It illustrates the\
    \ relationship between temperature change and precipitation change. 2. Graph B:\
    \ Shows a probability density function (PDF) for impact with respect to temperature\
    \ change. Arrows highlight the likelihood of a threshold being exceeded by 2060\
    \ without adaptation. 3. Graph C: Similar to Graph B but includes the effects\
    \ of adaptation. Arrows point to the adjusted likelihood of threshold exceedance\
    \ after implementing adaptation measures. 4. Graph D: A time series chart illustrating\
    \ the percentage of area affected over time, comparing scenarios with and without\
    \ adaptation. The lines depict trajectories from 1960 to 2060. 5. Map E: Two maps\
    \ of Finland highlight past and projected future impacts. The colors range from\
    \ green to red, indicating varying levels of risk or impact. Overall, the image\
    \ emphasizes the importance and potential benefits of adaptation in response to\
    \ climate changes in Finland."
