  73: "Storms impacting sandy coastal areas produce hazards such as erosion and inundation\
    \ that, in turn, promote risk to life and property damage in occupied areas, and\
    \ the alteration and/or fragmentation of habitats ... risks are expected to increase\
    \ in the near future not only in association with climate change (e.g. sea-level\
    \ rise (SLR), change in frequency and magnitude of storms) but also due to increasing\
    \ human occupation in coastal areas. In the next decades, SLR will likely become\
    \ the dominant driver in erosion/\uFB02ooding risk at coastal areas and may escalate\
    \ that risk by up to 300% over the next 3 decades (Wahl and Plant 2015). This\
    \ work presents a generic approach to model disaster risk reduction measures at\
    \ coastal areas, including climate change effects. The proposed methodology is\
    \ adaptable to any coastal region and can be used to test (and improve) management\
    \ options at a broad number of coastal areas. It can also be used to de\uFB01\
    ne a timeframe for the implementation of the de\uFB01ned measures since not all\
    \ risk reduction measures, under a climate change scenario, need to be implemented\
    \ at the same time. This would help to optimise implementation costs while reducing\
    \ the risk to the occupation and people."
  74: "In the U.S. National Climate Assessment, there is a focus on evaluating impacts\
    \ on coastal areas. Here are relevant quotes and evidence from the source page\
    \ that support the extracted information:\n\nFor \"Evaluation overview\": \n\u201C\
    This paper presents and discusses models and approaches to test DRR measures and\
