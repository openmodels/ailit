  221: " \nThe paper outlines the use of climate impact chains for risk assessments,\
    \ noting: \"The terminology and concepts of impact chains are referring to the\
    \ most recent climate risk concept of the IPCC...According to the IPCC, climate\
    \ risks are potential adverse consequences for human or ecological systems caused\
    \ by climate extremes and climate change. A climate risk...results from the interactions\
    \ between climate-related hazards...with exposure...and vulnerability...of the\
    \ social-ecological systems.\"\n\nIt further mentions applications: \"In the meanwhile,\
    \ this framework has been applied in almost twenty national climate risk assessments\
    \ worldwide (e.g., Burundi, Bangladesh, Thailand, Vietnam, Madagascar).\"\n\n\
    For adaptation strategies, the impacts are discussed: \"Adaptation strategies\
    \ can reduce climate risks, mainly by reducing vulnerabilities, but also by reducing\
    \ exposure or the climate-hazard itself.\"\n\nThe methodology and framework descriptions\
    \ are supported by: \"Responding to the current lack of frameworks and guidelines\
    \ for climate risk assessments, Eurac Research has created a conceptual framework\
    \ called climate impact chains together with various partners. Impact chains were\
    \ first developed for climate risk assessments in the European Alps...In the meanwhile,\
    \ this framework has been applied in almost twenty national climate risk assessments\
    \ worldwide...\"\n\nAlignment with standards is indicated by: \"...and is proposed\
    \ by the new ISO 14091 as one of the concepts for climate risk assessments in\
    \ the context of adaptation planning.\"\n"
