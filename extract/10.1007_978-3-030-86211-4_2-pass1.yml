    \ of technological and institutional co-evolution that creates barriers to the\
    \ diffusion of new, transformational policies. The development of a flexible and\
    \ interdisciplinary modular hierarchy for the development of multi-system ensembles\
    \ that incorporates and assesses the \u201Ctwo-way feedbacks\u201D among modules,\
    \ so to represent and understand the adaptive behavior of complex human\u2013\
    water systems. The integration of stakeholders in the generation of methods and\
    \ results, so to underpin the emergence of valuable science-policy synergies that\
    \ strengthen research quality and help identify statically/dynamically and adaptively\
    \ robust policies with higher expected economic and environmental performance."
  181: "plaintext\nBeyond its scienti\uFB01c merit, the research agenda above have\
    \ the potential to comprehensively test and demonstrate the performance of alternative\
    \ solutions to water-related challenges and support decision-making toward the\
    \ adoption of robust adaptation policies with potential to contribute to water\
    \ policy objectives. Understanding the implications of adaptation in terms of\
    \ water reallocation and rationing, and related uncertainties, is relevant for\
    \ policymakers who have committed to the good ecological status of water bodies,\
    \ and also in terms of policy planning of related economic sectors (e.g. agriculture,\
    \ agro-industry, tourism) and overall sustainable development, as substantiated\
    \ in SDG 6 (UN 2015). Policymakers in these spheres need to be aware of trade-offs\
    \ and distributive implications of adaptation policies in the water sector and\
    \ below and will bene\uFB01t from the methodological and empirical insights provided\
    \ by the research agenda above. Application of the research framework above will\
    \ provide new insights for water policy as well as for the broader sphere of sustainable\
    \ development.\n"
  183: "Adaptation to climate change poses two recognized significant types of risks\
    \ to the private sector; (1) physical risks and (2) transitional risks. [...]\
    \ It is suggested that Environmentally Extended Input\u2013Output models initially\
    \ be used as a screening tool, in order to identify emission dense sectors. Process-based\
    \ LCA inventory data, collected through collaboration and transparency throughout\
    \ the value chain, can then be applied to increase the resolution of the decision-making\
    \ tool."
  184: "Source: Transitional risks are systemic societal responses to climate change\
    \ induced by, e.g. governments, such as increasing CO2 pricing and taxes, but\
    \ also novel demands from, e.g. investors, customers and the marketplace. The\
    \ Task Force on Climate-Related Risk Disclosure (TCFD) (2020) has outline three\
    \ different types of transitional risks companies need to assess as part of their\
    \ analysis to comply with the TCFD recommendations (Table 21.1). It is important\
    \ to note that transitional risks are not only negative. To the diligent and responsible\
    \ company, transitional risks represent opportunities in the market, they can\
    \ exploit via new market developments, improved reputation and branding. From\
    \ a corporate point of view, the transitional risk climate change represents a\
    \ signi\uFB01cant disruption of the market, and they have to adapt their business\
    \ model to the new paradigm. Table 21.1 TCFD identi\uFB01ed transitional risks\
    \ Market and Technology Shifts Policies and investments to deliver a low carbon\
    \ emissions economy: Reduced market demand for higher carbon products and commodities\
    \ Increased demand for energy ef\uFB01cient, lower carbon products and services\
    \ New technologies that disrupt markets Reputation Growing expectations for responsible\
    \ conduct from stakeholders, including investors, lenders and consumers: Opportunity\
    \ to enhance reputation and brand value Risk of loss of trust and con\uFB01dence\
    \ in management Policy and Legal An evolving patchwork of requirements at international,\
    \ national and state level: Increased input/operating costs for high carbon activities\
    \ Threats to securing license to operate for high-carbon activities Emerging concern\
    \ about liabilities."
  187: 'Source material here: Companies documenting their GHG emissions must choose
    their approach along the assessment continuum ... balance between resolution and
    do-ability, better accurate and pragmatic guidance is needed in this space. The
    International Organization for Standardization (ISO) has also recently developed
    a series of standards for organizations to determine their GHG inventories ...
    The standards include quantification of value chain-related emissions in addition
    to the direct and indirect emissions (ISO 14064-1) and also quantification of
    GHG removal and sinks the organization may have (ISO 14064-2). As companies and
    organizations redefine their business models in compliance with their science-based
    target and the Paris Agreement, the broadening discussion on GHG emissions in
    the value chain becomes increasingly important. Up and down the value chain, collaboration
    is key, for these efforts to come together as a positive feedback mechanism.'
  188: Crucial to this step is accurately assessing emissions such that innovation
    and development can occur. Process-based approaches, however, provide the greatest
    resolution, which can act as a valuable tool for incorporating science-based targets
    and aligning with the Paris Agreement goals. ... While the disruption of climate-related
    transitional risks and associated complexities create challenges to companies
    addressing their Scope 3 emissions, it also creates huge opportunities for collaboration
    and innovation.
