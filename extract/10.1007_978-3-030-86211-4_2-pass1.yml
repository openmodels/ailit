  75: "  \nProcess-based models, like XBeach (Roelvink et al. 2009), can be employed\
    \ to determine both coastal erosion and \uFB02ooding, \u2026 , providing con\uFB01\
    dence in their application (Ferreira et al. 2018). Process-based models reproduce\
    \ the processes occurring on coastal areas during a storm, containing the essential\
    \ physics of dune erosion, overwash, avalanching, swash, infragravity waves and\
    \ wave groups. Thus, the recommended models to determine the hazard associated\
    \ with episodic erosion and/or \uFB02ooding are open-source process-based nearshore\
    \ storm impact models such as XBeach (for erosion and overwash) or XBeach coupled\
    \ with the LISFLOOD (for marine \uFB02ooding). Process-based models make use of\
    \ complex-modelling techniques and require a high amount of data. For the mentioned\
    \ scheme, model trains are often developed (see example at Ferreira et al. 2018),\
    \ starting from the incorporation of available data from other operational systems\
    \ and downscaling storm conditions to local hazards. In the case of modelling\
    \ climate change, they must also take into consideration the existence of adequate\
    \ regional or local climate change predictions to be incorporated as input values.\n"
