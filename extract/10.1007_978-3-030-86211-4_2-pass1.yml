    \ can be estimated by using simple formulations or models.\u201D\n\nFor \"Quantitative\
    \ material\":\n\u201CConsidering existing trends in shoreline dynamics, combined\
    \ with coastal recession driven by sea-level rise, Vousdoukas et al. (2020a) estimate\
