  93: " \nNature-Based Solutions (NBS) is a collective term for solutions that are\
    \ based on natural processes and ecosystems to solve different types of societal\
    \ challenges. Of particular interest is mitigation and adaptation strategies to\
    \ address climate-related challenges... Climate change will cause a change of\
    \ rainfall patterns and intensity in large parts of Europe. This will lead to\
    \ an increased probability for rainfall-induced landslides with high destructive\
    \ potential for exposed infrastructure... NBS have been increasingly applied to\
    \ design new resilient landscapes and cities with beneficial outcomes for the\
    \ environment, the society and human well-being.\n"
  94: "yaml\nDrivers of Risk: vegetation may destabilize slopes in connection with\
    \ strong winds (this is valid only for trees).\nMethodology: Several studies have\
    \ identi\uFB01ed both positive and negative effects of using vegetation for landslide\
    \ protection (Stokes et al. 2014; NVE/NGI 2015;Krzeminskaetal. 2019). The major\
    \ \uFB01ndings are that the use of vegetation for landslide protection have two\
    \ positive effects and one potential negative effect: (i) the strength of the\
    \ soil increases due to roots and binding of soil layers, (ii) the pore water\
    \ pressure is reduced due to plant\u2019s uptake and canopy cover, (iii) vegetation\
    \ may destabilize slopes in connection with strong winds (this is valid only for\
    \ trees). These are all effects that may be modelled, but as the studies show\
    \ there are a lot of uncertainties related to this aspect. Examples of challenges\
    \ with regard to modelling include the following: \x81 The undrained shear strength\
    \ depends on the type of roots, the position of the main roots network and the\
    \ season of the year. \x81 The effect of reduced soil water content and induced\
    \ soil suction is highly uncertain and can vary considerably from case to case,\
    \ also in relation to the distribution and vegetation density along the slope.\n\
    Highlights: Several studies have identi\uFB01ed both positive and negative effects\
    \ of using vegetation for landslide protection... The major \uFB01ndings are that\
    \ the use of vegetation for landslide protection have two positive effects and\
    \ one potential negative effect...These are all effects that may be modelled,\
    \ but as the studies show there are a lot of uncertainties related to this aspect.\n\
    More Notes: There is a need for further research, both related to a most suitable\
    \ selection of vegetation species in different forest ecosystems and biogeographical\
    \ regions, which is essential for a successful mitigation, and to the potential\
    \ negative effects of vegetation as a shallow landslide triggering factor.\n"
  95: 'Precipitation events are often linked to the triggering of landslides, but
    it is the change in pore water pressures that leads a slope to fail... some challenges
    related to the definition of these relationships are as follows:... For the hydrological
    modelling and the evaluation of the pore water pressure regime in the ground,
    the hourly rainfall is an essential input to the water flux, while both the roots
    and the aboveground vegetation features influence the processes and the soil parameters...
    The approach consists of two main parts: (i) hydrological modelling, to assess
    the pore water pressure regime and (ii) slope stability modelling, to assess the
