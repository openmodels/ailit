  175: Source material here.
  176: " \n\"economics and hydrology have not been successful at integrating human\
    \ and water systems... conventional hydrologic (economic) models perceive pressures\
    \ from human (water) systems, if considered at all, as external forcings.\"\n\"\
    This offers the advantage of a more straightforward and effective representation\
    \ of causal relationships and interdependencies... Yet, such holistic models do\
    \ not capture the interrelationships or two-way feedbacks between human and water\
    \ systems that shape adaptive responses.\"\n\"There is a basic need to better\
    \ understand the dynamics of complex adaptive human\u2013water systems and to\
    \ represent them in modeling tools that can be used to effectively inform policymakers.\"\
    \n\"Socio-hydrology has called for the development of integrated approaches that\
    \ 'explicitly account for the two-way feedbacks between human and water systems'...\
    \ Recent socio-hydrology-inspired science has explored feedback responses between\
    \ human (typically water users) and water systems.\"\n\"Modular models... are\
    \ defined as specialized, self-contained mathematical elements that process information\
    \ and generate outputs and connect them through sets of protocols, which are defined\
    \ as rules designed to manage interrelationships (e.g. two-way feedbacks) between\
    \ systems\u2019 modules.\"\n\"The page highlights... the transformative discipline\
    \ of socio-hydrology... to better simulate adaptive responses.\"\n"
  177: " \nSource material here. \n\" I argue that recent advances in the construction\
    \ of protocol-based modular frameworks provide the backbone for the development\
    \ of interdisciplinary modeling hierarchies that connect multiple systems through\
    \ two-way feedbacks (multi-system hierarchy). Each module within the hierarchy\
    \ can be populated with multiple models (multi-model ensemble) and combined with\
    \ scenario discovery techniques that explore scenario uncertainty through varying\
    \ initial states and forcings (e.g. climate change scenarios, policy scenarios).\"\
    \n\n\"The result is a large database of simulations in which each simulation represents\
    \ the economic and environmental performance under one specific scenario and modeling\
    \ setting. This information can be used to identify futures where proposed policies\
    \ meet or miss their objectives, explore potential tipping points, and inform\
    \ the development of robust policies that show a satisfactory performance under\
    \ most conceivable futures.\"\n\n\"In coupled modeling frameworks, the second\
    \ model or group of models in the hierarchy will then begin searching the repercussions\
    \ of the feasible set in a related system B and assess relevant feedbacks.\"\n\
    \n\"We can explore ways to limit the impact of \u03B5 1 by adding and better representing\
    \ models and scenarios across systems. This is indeed the objective of combining\
    \ modular hierarchies with exploratory modeling and ensemble experiments.\"\n"
  178: "Deep uncertainty type 2 is the consequence of \u201Climits in the knowledge\
    \ base, chaotic dynamics, future actions by decision-makers, inherent randomness,\
    \ non-stationarity and changes in societal perspectives and preferences over time\u201D\
    ... Adaptive robustness involves the removal of techno-institutional barriers\
    \ that constrain our ability to take corrective action... Measuring and understanding\
    \ techno-institutional barriers require information on public transaction costs...\
    \ Adaptive efficiency measures the capacity of institutions to achieve economic\
    \ efficiency over the long term... Adaptively efficient institutions are those\
    \ showing \u201Ccapacity to solve evolving and complex dilemmas over long periods\
