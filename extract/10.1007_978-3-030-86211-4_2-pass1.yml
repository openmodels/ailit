  99: "  \nDiversification of crop rotations is considered as an option to increase\
    \ the resilience of European crop production under climate change. Although crop\
    \ rotation design and management has been identified as an important measure to\
    \ adapt to and mitigate climate change, most studies on climate change impact\
    \ or adaptation so far use single-year simulations and/or single crop assessments...\
    \ The integrated assessment of impacts, adaptation, and mitigation options under\
    \ current and future climatic conditions requires a continuous long-term analysis\
    \ of crop sequences to take into account carry-over effects as in real conditions...\
    \ Agriculture is among the most vulnerable sectors affected by climate change...\
    \ In conclusion, crop models require suitable experimental data to parameterize\
    \ additional crops, which were so far not sufficiently investigated to cope with\
    \ multiple opportunities in crop rotations.\n"
  101: "Source material here: Agro-ecosystem models considering the complex interactions\
