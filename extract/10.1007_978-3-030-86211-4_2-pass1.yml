    The importance of adaptive efficiency is summed up as: "Garrick (2015) associates
    adaptive efficiency with three performance indicators: (1) how well the objective(s)
    have been met (i.e. effectiveness); (2) the average public transaction costs per
    unit of the met objective(s); and (3) total program budgets."'
  180: "Source material here. Along these pages, I have surveyed recent advances in\
    \ (socio-)hydrology and (institu-tional) economics toward robust decision-making;\
    \ ... so to deliver a research framework that informs the adoption of robust water\
    \ policies with higher expected economic and environmental performance. The endogenous\
