    ."
  179: 'The text discusses adaptively efficient institutions, stating: "it is reasonable
    to expect that institutions that have proven to be adaptively efficient over long
    periods of time are more likely to be adaptively robust in the future." The discussion
    of drivers of risk highlights "Existing technologies and institutions can constrain
    the range of policies that can be adopted in the coming years or decades through
