  116: Urban areas are very vulnerable to climate change impacts, because of the high
    concentration of people, infrastructure and economic activity... The socio-economic
    impact assessment performed in the Climate-fit.City project has demonstrated that,
    in all the cases, there are actual and potential added values in terms of public
    service effectiveness, economic impacts, policy innovation and social impacts.
    Urban areas shape their own climate, amplifying climate extremes such as excessive
    heat and flooding. Lauwaet et al. (2015) demonstrated that, because of the urban
    heat island effect, cities experience twice as many heat wave days than their
    rural surroundings. Moreover, towards the end of the century, the number of urban
    heat wave days is expected to increase by a factor of 10, from approximately 3
    to 30 days per year at the end of the century under IPCC scenario RCP8.5."
