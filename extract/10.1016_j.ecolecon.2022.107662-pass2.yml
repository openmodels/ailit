  5: " \nEvaluation overview: \"The model does not suffer from such econometric issues...\
    \ weather variations on beef production.\"\n\nDrivers of Risk: \"Our main covariates,\
    \ T ct and P ct , are matrices of annual average temperature (in \u25E6C) and\
    \ yearly total precipitation (in mm/year), respectively, in country c and year\
    \ t.\"\n\nQuantitative material: \"Panel B shows the summary of the ACESSS SSP3.70\
    \ predicted changes in climate in the mid-future (2041\u20132060)... Panel C summarizes\
    \ the predicted state of climate by the end of the century (2061\u20132100).\"\
    \n\nMethodology: \"In this sub-section, we construct a panel data model at country/year\
    \ level... using the approach described in Hsiang (2010) with an arbitrary distance\
    \ of 1000 km and time lag of 3 years.\"\n\nHighlights: \"The model predicts a\
    \ 2.2 \u25E6C rise in global temperature with North America and MENA as the leading\
    \ regions to experience more warming.\"\n\nMore Notes: \"We understand that some\
    \ measurement errors may occur... but these errors are exogenous to our explanatory\
    \ variables, hence such errors might only result in imprecise rather than biased\
    \ estimates.\"\n"
  6: "Source material: \"On aggregate, Table 2 shows that temperature has a negative\
    \ and statistically significant relationship with beef production. Specifically,\
    \ a 1\xB0C increase in temperature will lead to a 9.7% reduction in beef production.\
    \ However, an in-depth look at a more disaggregated level reveals that the impact\
    \ of temperature is higher in tropical regions than in temperate regions, implying\
    \ that the overall negative estimate is driven by weather happenings in certain\
    \ regions of the world. While a 1\xB0C increase in temperature will result in\
    \ about a 20% fall in cattle production in tropical countries, there is no significant\
    \ effect of such a rise in temperature regions. We show in the supplementary section\
    \ (Table A5) that using a live animal indicator (cattle stock) as outcome variable\
    \ produces similar qualitative results.\" \"The weather and climate entries are\
    \ cattle population adjusted. Figures in bracket are percentage changes from historical\
    \ figures. errors adjusted for spatial (1000 km) and serial (3-years) correlation.\"\
    \ \"On the other hand, the adverse effect of a marginal rise in temperature is\
    \ evidenced in both rich and poor countries; however, the impact is stronger in\
    \ the latter. We find that a 1\xB0C increase in temperature will reduce animal\
    \ production by 27% in poor countries and 4% in rich ones.\""
  7: "  \nSource material here.\n\ntemperature on cattle production also depends on\
    \ whether a country is agriculture-dependent or not. We find that the more agriculture-dependent\
    \ a country is, the greater the impact of temperature changes. On average, the\
    \ adverse effect of a 1\xB0C increase in temperature is four times larger in agricultural\
    \ economies than in non-agricultural ones. Our results imply that beef production\
    \ is most seriously at risk of global warming in hot, poor, and agriculture-dependent\
    \ countries.\n\ngoing back to Table 2, we explain the effect of precipitation\
    \ changes on beef production. On aggregate, precipitation has a positive but insignificant\
    \ effect on beef production: however, there are significant differences in results\
    \ when heterogeneity is considered. For example, while a marginal rise in precipitation\
    \ is beneficial to beef production in tropical countries, it is harmful in temperate\
    \ economies. Specifically, where a 1 mm increase in annual precipitation would\
    \ lead to a 2.1% increase in beef production in tropical countries, a similar\
    \ increase in precipitation is associated with a 1.9% decline in beef production\
    \ in temperate regions. Along national income lines, we find that rainfall changes\
    \ have no significant effect on beef output in rich countries but positively affect\
    \ beef production in poor countries. This heterogeneous effect is also duplicated\
    \ when considering whether a country is agriculture-dependent or not. We find\
    \ that an extra mm of annual precipitation would generate a 3% improvement in\
    \ beef production in agriculture-dependent countries, with no significant effect\
    \ in a non-agricultural country. Overall, we find that the impacts of temperature\
    \ changes are more severe in certain regions\u2014hot, poor, and agriculture-dependent\
    \ countries, as shown in Figure A4 in the supplementary section. However, the\
    \ positive effect of precipitation changes in these regions means that more rainfall\
    \ will attenuate the negative impact of temperature rise on beef production.\n\
    \nEach coefficient is estimated from a separate(1)with country FE and region-specific\
    \ trends. Standard errors are in brackets, adjusted for both spatial (1,000km)\
    \ and serial (3-years) correlation. A country is defined as tropical if its median\
    \ temperature is above the global median; otherwise, it is temperate. A country\
    \ is rich if it is higher income or upper-middle income by World Bank classification,\
    \ else it is poor. A country is agriculture-dependent if it has above median share\
    \ of GDP in agriculture in 2000. Temperature is in degrees Celsius and precipitation\
    \ is in mm units per year. Sample period is 1961\u20132017 for all specifications.\n\
    \nThe quadratic term of temperature is significant across all spec- ifications,\
    \ unlike precipitation, which indicates a potential nonlinear (convex by nature)\
    \ relationship between temperature and beef produc- tion. Such nonlinearity means\
    \ there is a minimally beneficial level from which the effects start rising, significantly\
    \ or insignificantly, in both directions.  \n"
  8: "Summarily, the results from the various sensitivity tests show that our baseline\
    \ estimates that measure the impact of annual weather fluctuations on beef production\
    \ are robust. Therefore, large deviations from the main estimates are unexpected.\
    \ The channel through which weather changes affect global beef production is investigated\
    \ with a focus on how weather changes affect beef production vis-\xE0-vis its\
    \ impact on crop production. Weather fluctuations may influence beef output if\
    \ they affect crop production via changes in the quantity and quality of feed\
    \ available for cattle. Table 4 shows the impact of temperature and precipitation\
    \ changes on two indices of crop production \u2014 cereal yields (ton/ha) and\
    \ cereal production (kg). As expected, there is a negative impact of temperature\
    \ on both yields and cereals production, although this impact is more substantial\
    \ in hot countries. Specifically, a 1\xB0C increase in temperature is associated\
    \ with a 3.7% drop in cereal yields. The impact is about 3.4 percentage points\
    \ higher in tropical countries. The impact is greater in hot, poor, and agriculture-dependent\
    \ countries. These results corroborate similar findings from Lobell et al. (2011),\
    \ who report a 3.8\u20135.5% global net loss of maize and wheat from a marginal\
    \ rise in temperature. Table 4 also shows the usual positive relationship between\
    \ precipitation changes and crop outcomes. A marginal increase in annual rainfall\
    \ is associated with a 1.5% increase in global cereal yield. The notes section\
    \ in the paper specifies that the analysis covers the sample period from 1961\u2013\
    2017 for all specifications and uses country fixed effects with region-specific\
    \ trends."
