  3: Source material here. This paper sheds more light on the effects of weather shocks
    on livestock. ...the effects of short-term weather shocks on livestock production.
    Our results show a robust negative effect of temperature changes on global livestock
    production... climate change will reduce animal output by a further 20% in the
    mid-century and an additional 40% by the end of the century. Unlike the Ricardian
    model, panel data analysis uses group fixed effect (FE) to account for omitted
    variables that correlate with climatic and response variables... This paper achieves
    this objective using a panel of national livestock production and local weather
    fluctuations from 187 countries. Our results show a robust negative effect of
    temperature changes on global livestock production and a positive impact of rainfall
    fluctuations...
