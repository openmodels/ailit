    \ from a separate(1)with country FE and region-specific trends... Sample period\
    \ is 1961\u20132017 for all specifications.\"\nHighlights: \"The impacts on cereal\
    \ output could also serve to explain why and how weather affects beef production...\
    \ this reduction in food could affect the quantity... and quality... of herds.\"\
    \nMore Notes: \"Not using seasonal weather measures makes our estimates overly\
    \ optimistic as we do not account for seasons that are germane to crop production...\
    \ we do not account for the beneficial effect of CO2 on crop fertilization...\"\
    \n"
  10: "Source material here.\n  - Evaluation overview: \"The following defines the\
    \ differenced averages: 15-year diff. (1961\u20131975 and 2003\u20132017), 10-year\
    \ diff. (1961\u20131970 and 2008\u20132017), 20-year diff. (1961\u20131980 and\
    \ 1998\u20132017), and 29-year diff. (1961\u20131990 and 1991\u20132017) divides\
    \ the entire sample into two halves. A country is defined as \u2018\u2018tropical\u2019\
    \u2019 if its median temperature is above the global median, \u2018\u2018poor\u2019\
    \u2019 if it is classed as a lower income or lower-middle income by World Bank\
    \ classification.\"\n  - Drivers of Risk: \"A 1 \u25E6C increase in temperature\
    \ will lead to a 9.7% reduction in beef production on average, with most of this\
    \ effect centered in tropical countries. Poorer countries would also experience\
    \ a 27% reduction as opposed to 4% in countries with higher income levels. On\
    \ the other hand, an additional mm increase in annual precipitation would lead\
    \ to a 2.1% increase in production in tropical countries but a 1.9% decrease in\
    \ temperate ones.\"\n  - Quantitative material: \"Another observation worth noting\
    \ is that the effect of global warming stochastically dominates that of rainfall\
    \ changes... An important message from this study is that climate change affects\
    \ livestock production and, consequently, food security, which will be even more\
    \ important in the future. Global production of livestock and livestock products\
    \ will be negatively impacted (due to diseases, water availability, etc.), especially\
    \ in poor and tropical regions.\"\n  - Methodology: \"This paper measures the\
    \ impact of weather fluctuations on global livestock production using panel data\
    \ from 1961 to 2017... The projections indicate that the effects of climate change\
    \ by 2070 would range from 11% in temperate regions to 36% in tropical areas,\
    \ with global warming playing a more significant role in determining livestock\
    \ output than predicted changes in rainfall patterns in the longer term.\"\n \
    \ - Highlights: \"The spatial distribution of the cumulative impact of climate\
    \ change under the mid-term and long-term scenarios. Important information from\
    \ Fig. 1 is that the overall adverse effect of climate change on beef production\
    \ is almost completely centered in tropical countries.\"\n  - More Notes: \"Some\
    \ limitations to the study are as follow. The panel data method do not account\
    \ for inter-annual tradeoffs farmers make that may be affecting the contemporaneous\
    \ estimates presented in the paper. Consequent to this methodological shortcoming,\
    \ this study is picking up short-run changes in inventory in the cattle herd that\
    \ may not be indicative of long-run changes associated with climate change.\"\n"
