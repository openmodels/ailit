Highlights:
  1: ACC has reduced global agricultural TFP by about 21% since 1961, equivalent to
    losing the last 7 years of productivity growth.
  2: Average agricultural TFP has more than doubled since 1961, but there is wide
    cross-country variation.
  3: A robust relationship is found between agricultural TFP growth and weather changes,
    with notable slower growth in some countries like Sub-Saharan Africa.
  4: Higher temperatures have become more damaging to TFP growth over time; the impact
    of ACC equates to a loss of about 7 years of productivity growth; and the temperature
    response is steeper in recent decades (1989-2015) compared to earlier ones (1962-1988).
  5: ACC has a negative impact on global average TFP. Impacts vary by region, with
    warmer regions being more affected. Agriculture is growing increasingly sensitive
    to ongoing climate change. Analyzing output rather than TFP makes global impacts
    of ACC appear more severe. Ignoring input responses leads to an overestimation
    of the negative impacts.
  6: The study suggests that ACC is increasingly reducing agricultural output, with
    a detectable and sizeable impact as of 2020. The findings raise questions about
    the sufficiency of current investments in agricultural research to sustain productivity
    growth rates.
  8: The paper aims to derive a response function that relates agricultural TFP to
    weather variables. The estimates are then used to simulate the effect of climate
    change on global agricultural TFP. Placebo checks are used to evaluate whether
    the estimated relationships are spurious.
  9: Most model variations have relatively little bearing on the baseline result.
    Revenue regression weights and the 'green season' for weather aggregation represent
    the two most consequential modeling choices, pointing to slightly larger damage.
    The impact distributions for FAO regions are based on 10,000 draws from the universe
    of cumulative ACC impacts computed for all 288 model specifications, weighted
    by the reciprocal of their out-of-sample MSE.
  13: Response functions show how agricultural productivity changes with temperature
    and precipitation; Placebo tests validate the significance of T and P coefficients.
  17: Shows the response of agricultural productivity to weather changes for 1962-1988,
    including the distribution of green-season average temperature and precipitation
    across countries. Shows placebo checks using random mismatched data.
  21: The response of agricultural productivity to weather is analyzed. Placebo checks
    are performed to test the robustness of the results.
  23: Shows response functions of TFP to temperature and precipitation, and results
    of placebo checks.
  25: Presents response functions showing the relationship between TFP changes and
    green-season temperature and precipitation. Includes placebo checks to assess
    the robustness of the findings.
  27: Response functions show the relationship between temperature/precipitation and
    agricultural productivity; Placebo checks suggest the observed relationships are
    not due to random chance.
  28: Higher bars indicate better model fit (reduction in out-of-sample MSE of a 10-fold
    cross-validation relative to a model that excludes weather variables).
Methodology:
  1: Econometric model linking country-level TFP growth with weather change, using
    a quadratic function of average temperature and total precipitation over the green
    season; uses country-fixed and year-fixed effects.
  2: Analysis uses Global Meteorological Forcing Dataset (GMFD) observations and CMIP6
    (seven GCMs) modelled variables.
  3: The analysis involves assessing TFP growth response functions to weather changes
    and performing placebo checks by randomly mismatching or reshuffling weather data
    by years or countries.
  4: The study estimates the effects of temperature and precipitation on TFP growth
    using econometric models and counterfactual weather trajectories from the CMIP6
    climate models.
  5: Econometric models with 96 variations are used. Models consider different functional
    forms (Quadratic, Cubic), regression weights (Equal, Revenue), aggregation weights
    (Cropland, Cropland and pasture), growing seasons (Calendar year, Green season),
    and heterogeneity (Pooled, By latitude (3)). Tenfold cross-validation is used.
    Analysis primarily based on TFP, but also considers output. Some analysis restricted
    to 1989-2015 period. Regional impacts are constructed by weighting econometric
    models based on how well they fit the data.
  6: The analysis uses econometric models to estimate the impact of climate uncertainty
    (from GCMs), econometric uncertainty (from the estimation), and specification
    uncertainty (from the choice of the econometric model). The analysis does not
    remove the direct effect of rising CO2 concentrations on agricultural production.
    TFP estimates are used to measure agricultural output.
  8: The analysis uses an econometric model regressing changes in TFP on first differences
    of green-season average temperature and precipitation, controlling for country
    and year fixed effects. It uses a bias-corrected spatial disaggregation (BCSD)
    approach to downscale climate model data.
  9: Uses econometric models with variations in functional form (quadratic or cubic),
    weighting (equal or revenue), data aggregation (cropland or cropland & pasture,
    calendar year vs. green season vs. green/brown seasons), and regional response
    functions (global vs. latitudinal regions). Compares weather trajectories with
    and without ACC from various GCMs in CMIP6. Models are bootstrapped and results
    averaged across GCMs. Also employs 'reshuffled' datasets to test significance.
  13: Panel data analysis with country-level TFP and weather data. Placebo checks
    are performed by randomly mismatching or reshuffling TFP and weather data by years
    and by country.
  15: Uses response functions and placebo checks with bootstrapped datasets to evaluate
    the impacts of temperature and precipitation changes on TFP.
  17: "Analysis based on data from 1962\u20131988. Response functions are centered\
    \ vertically so that the exposure-weighted marginal effect is zero. Bootstrapping\
    \ is used to generate confidence bands. Placebo checks are performed by randomly\
    \ reshuffling TFP and weather data by years and by country."
  19: The response functions of agricultural productivity changes are analyzed against
    weather changes from 1989 to 2015, and data is reshuffled for placebo checks.
  21: Analysis performed on data from 1962-1988, excluding 10% of coldest countries.
    The response functions are centered vertically so that the exposure-weighted marginal
    effect is zero. Placebo checks are performed by randomly mismatching TFP and weather
    data by years and by country.
  23: Regression analysis of country-level TFP changes against green-season average
    T and P for 1989-2015, using year-by-region block bootstraps. Includes placebo
    checks with reshuffled datasets by year and country.
  25: "Analysis of agricultural productivity response to weather for 1962\u20131988,\
    \ excluding 10% of hottest countries. Uses year-by-region block bootstraps to\
    \ generate confidence bands. Includes placebo checks with reshuffled data by years\
    \ and by country."
  27: Regression analysis of country-level TFP on green-season temperature and precipitation
    from 1989-2015; Placebo checks using reshuffled data to test the robustness of
    the relationships; Year-by-region and country block bootstrapping to estimate
    confidence intervals
  28: Econometric models, 10-fold cross-validation (whereby years of data are sampled
    together).
More Notes:
  2: Small countries are over-represented in the simple averages of country-level
    variables.
  5: The estimates should not be interpreted as the effect of a world without fossil
    fuels on global agricultural production; rather, the counterfactual removes the
    effect that fossil fuels and other anthropogenic influences have on climate.
  8: The analysis focuses on the 'green season', a 5-month period centered around
    the greenest month of the year, or two seasons (green and brown) based on NDVI
    data. Measurement error in TFP growth is unlikely to be correlated with year-to-year
    weather changes and would not bias the result. Classical measurement error in
    temperature or precipitation would induce attenuation bias.
  9: Measurement error in weather variables might bias results, but comparisons across
    datasets show minimal discrepancies. Data and code are available at a permanent
    online repository.
  13: Country-level distribution of green-season average T over the sample period
    is provided.
  15: Includes analyses excluding the hottest countries to assess the generalizability
    of the response function.
