    90% and 95% confidence bands based on 500 year-by-region block bootstraps. The
    distribution represents the linear and quadratic T (c,d) or P (e,f) coefficients
    based on 10,000 reshuffled datasets.
  4: "Source material:\nThe temperature response function is roughly linear and downward-sloping\
    \ (Fig. 2a), indicating that warmer temperatures over the green season are detrimental\
    \ to TFP growth. ... We demonstrate that this relationship is not likely spurious\
    \ ...\nA critical question for climate change adaptation is whether agriculture\
    \ is becoming more or less sensitive to climatic extremes. ... and find that the\
    \ temperature response function is noticeably steeper for the latter half (Supplementary\
    \ Figs. 4 and 5). This indicates that higher temperatures have become more damaging.\
    \ ...\nThe cumulative impact of ACC on global agricultural TFP growth over the\
    \ 1961\u20132020 period is about \u221220.8% with a 90% confidence interval between\
    \ \u221239.1% and \u221210.1% (Fig. 3a). ...\nOur baseline global finding of the\
    \ impact of ACC on global agricultural productivity is robust to a wide range\
    \ of specifications of the econometric model. ...\nSpecifically, we find that\
    \ the global TFP level projected to be reached in 2020 in our world with ACC would\
    \ have been reached in 2013 in a world without ACC, ...\n"
  5: "Source material: Impact estimates for 96 model variations, where lines indicate\
    \ 90% (dark) and 95% (light) confidence intervals around the ensemble mean estimate\
    \ for a particular model for the baseline model (Fig. 3a, blue) and alternative\
    \ models (grey). ... Overall, the 288 models that do not exclude obser vations\
    \ point to an average mean impact of \u221216.9% with a standard deviation of\
    \ 5.9% ... A potential concern is that certain countries may overinfluence our\
    \ estimates ... However, basing our analysis on the latter part of the sample\
    \ (1989\u2013 2015) points to even larger damage ... Our global results conceal\
    \ sizeable regional and cross-country disparities ... Impact is greater for warm\
    \ regions such as Africa (\u221234.0%), ... Near East and North Africa (\u2212\
    30.0%) ... analysing output rather than TFP, makes global impacts of ACC appear\
    \ more severe. The temperature response function is steeper for output than for\
    \ TFP ... Our estimates should not be interpreted as the effect of a world without\
    \ fossil fuels on global agricultural production. Agriculture has benefitted tremendously\
    \ from agricultural research and carbon-intensive inputs that would not have been\
    \ as available without fossil fuels. The counterfactual in our study only removes\
    \ the effect that fossil fuels and other anthropogenic influences have on climate."
  6: "  \nSource material here.\nthe climate system. For instance, our estimates do\
    \ not remove the direct effect that rising CO2 concentrations have on agricultural\
    \ production or the presence of agricultural research or carbon-intensive inputs.\
    \ In addition, the reader may be rightfully concerned about measurement error\
    \ of our TFP metric. TFP estimates are notoriously difficult to construct and\
    \ require considerable background work, sometimes using imperfect data sources.\
    \ However, as long as the measurement error remains uncorrelated with year-to-year\
    \ changes in TFP growth, which seems plausible, such errors do not bias our econometric\
    \ estimates but simply render them more imprecise. Moreover, the TFP metric we\
    \ rely upon likely mismeasures certain inputs, such as irrigation water use. Our\
    \ own analysis shows that ignoring all measured inputs overstates ACC impacts,\
    \ so the present analysis is a first step while more detailed international TFP\
    \ statistics are produced. In conclusion, our study suggests that ACC is increasingly\
    \ reducing agricultural output as we drift away from a climate system without\
    \ human influences, cumulating into a detectable and sizeable impact as of 2020.\
    \ Given recent localized productivity slowdowns, the long lags in agricultural\
    \ research and the rapid pace of ACC, our findings raise the question of whether\
    \ current levels of investments in agricultural research are sufficient to sustain\
    \ twentieth-century rates of productivity growth in the twenty-first century.\n"
