    (Fig. 2 and Supplementary Table 1). Response functions are centred vertically
    so that the exposure-weighted marginal effect is zero. a substantial range of
    variation in /uni0394ln TFPit across countries for any given year. We also observe
    that TFP has grown much more slowly in certain countries, particularly in Sub-Saharan
    Africa (Fig. 1c). Response function of TFP growth to changes in green-season average
    T (a) and P (b). Results of placebo checks whereby TFP and weather data are randomly
