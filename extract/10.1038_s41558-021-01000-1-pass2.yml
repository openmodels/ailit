sourcematerial:
  1: " \nEvaluation overview: \"We quantify the impact of ACC on global agricultural\
    \ productivity since 1961 (ref. 34). Instead of focusing on crop yield or agricultural\
    \ output, we rely on a measure of agricultural TFP.\"\n\nDrivers of Risk: \"This\
    \ increase affects the global weather patterns that are essential to agriculture17,18.\
    \ However, the impacts of this ACC on the agricultural sector have not yet been\
    \ quantified, as most research has focused on future impacts\u2026\"\n\nQuantitative\
    \ material: \"Our baseline model indicates that ACC has reduced global agricultural\
    \ TFP by about 21% since 1961, a slowdown that is equivalent to losing the last\
    \ 7 years of productivity growth.\"\n\nMethodology: \"We develop a robust econometric\
    \ model of weather effects on global agricultural total factor productivity (TFP)\
    \ and combine this model with counterfactual climate scenarios\u2026 estimating\
    \ an econometric model linking country-level TFP growth with weather change. Our\
    \ model characterizes f as a quadratic function of average temperature (T) and\
    \ total precipitation (P) over the 5-month period centred around the greenest\
    \ month of the year of each country or \u2018green season\u2019.\"\n\nHighlights:\
    \ \"Our baseline model indicates that ACC has reduced global agricultural TFP\
    \ by about 21% since 1961, a slowdown that is equivalent to losing the last 7\
    \ years of productivity growth.\"\n"
