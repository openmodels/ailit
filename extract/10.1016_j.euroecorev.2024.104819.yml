  32: "Next, consider solving the model for a given carbon tax path (the zero-tax\
    \ scenario is equivalent to the BAU scenario)... we solve a system of 301 equations\
    \ for 301 variables. \nFig. 13. Comparing the \u2018\u2018DICE\u2019\u2019 and\
    \ \u2018\u2018Krusell\u2013Smith\u2019\u2019(cf. Eq.(44)) global damages as a\
    \ share of global GDP (measured in %) by year (starting 2017).\nFrom the paths\
    \ of oil, gas, and coal extraction, we also determine the global time paths of\
    \ dirty energy reserves, climate variables, damages, and region-specific productivity.\n\
    We determine the optimal global carbon tax rate path numerically as follows:\n\
    \u2022 Step 2.1: Guess  \U0001D706.\n\u2022 Step 2.2: Given the guessed  \U0001D706\
    , iterate on steps 1.2\u20131.4, including updating transfers to ensure uniform\
    \ welfare gains increase.\n\u2022 Step 2.3: Calculate a present value of the transfers.\
    \ If it is positive, decrease  \U0001D706. If it is negative, increase  \U0001D706\
