sourcematerial:
  1: "Source material here.\nClimate change will impact current and future generations\
    \ in different regions very differently. This paper develops the first large-scale,\
    \ annually calibrated, multi-region, overlapping generations model of climate\
    \ change and carbon policy. It features region-specific temperature and damage\
    \ functions with the phased impact of emissions on global and regional temperature\
    \ calibrated to the latest scientific evidence. Absent policy, climate change\
    \ may, under high-damage scenarios, dramatically reduce GDP in most regions, with\
    \ India, Brazil, and the South Asian Pacific suffering long-term catastrophic\
    \ damages. Carbon taxation, coupled with region- and generation-specific transfers,\
    \ can both correct the carbon externality and raise the welfare of all current\
    \ and future agents across all regions by 4.3 percent. However, achieving completely\
    \ uniform welfare gains leaves future generations in particular regions facing\
    \ exceptionally high compensatory payments. Fortunately, a carbon tax-cum redistribution\
    \ policy that limits this burden for any generation in any region to less than\
    \ 10 percent, measured on a consumption-equivalent basis, can deliver a 4.0 percent\
    \ or higher welfare gain for all peoplekind \u2014 present and future.\n"
  2: "Source material here.\nEvaluation overview: \"Our model features 18 regions\
    \ inhabited by 80 overlapping, selfish generations... For the U.S., the reduction\
    \ in 2100 GDP is 13.9 percent without the UWI policy and 8.0 percent with it.\
    \ China\u2019s respective values are 13.7 percent without policy and 7.8 percent\
    \ with policy.\"\n\nDrivers of Risk: \"Our problems are man-made; therefore, they\
    \ can be solved by man... apply in full measure to anthropogenic climate change\
    \ with its massive projected damages.\"\n\nQuantitative material: \"For our high-damage\
    \ calibration, an initial $87.5 carbon tax rising annually at a 1.4 percent coupled\
    \ with appropriate cohort- and region-specific transfers limits global damages\
    \ in 2100 by 38 percent... global output is only about 9 percent smaller.\"\n\n\
    Methodology: \"This paper develops a large-scale, multi-region, overlapping generations\
    \ (OLG) model to study climate change\u2019s cumulative damage to global and regional\
    \ output... Output is produced with capital, labor, and a time-varying combination\
    \ of dirty and clean energy.\"\n\nHighlights: \"The UWI policy reduces Canada\u2019\
    s 2100 GDP by 0.6 percent relative to its no climate-change level. In short, absent\
    \ policy, climate change will, in general, materially undermine economic growth,\
    \ but do so differentially by region.\"\n"
  3: "Source material here.\nEvaluation overview: \"As for global GDP, its 2100 value\
    \ is reduced by 14.7 percent.\"\nDrivers of Risk: \"In our high-damage baseline\
    \ scenario, the increase in the planet\u2019s mean surface temperature through\
    \ 2100, absent policy, is approximately 3.1 degrees Celsius.\"\nQuantitative material:\
    \ \"In our high-damage baseline scenario, the increase in the planet\u2019s mean\
    \ surface temperature through 2100, absent policy, is approximately 3.1 degrees\
    \ Celsius.\"\nQuantitative material: \"... climate change lowers their 2100 GDP\
    \ levels by 38.6 percent.\"\nQuantitative material: \"In contrast, optimal UWI\
    \ policy ends all dirty energy usage by 2103 and dramatically reduces cumulative\
    \ (2017 through fossil fuel\u2019s end date) oil, gas, and coal consumption by\
    \ 84.4 percent, 86.2 percent, and 98.1 percent, respectively.\"\nQuantitative\
    \ material: \"These major impacts limit the rise in the global mean surface temperature\
    \ to 2.1 degrees Celsius.\"\nQuantitative material: \"Moreover, the peak global\
    \ GDP loss declines from 16.7 percent to 9.3 percent.\"\nQuantitative material:\
    \ \"How large is the optimal UWI gain? It is 4.3 percent, measured as a consumption\
    \ compensating variation.\"\nMethodology: \"Our study builds what we believe is\
    \ the first large-scale OLG integrated assessment model (IAM) with region-specific\
    \ emissions and damages.\"\nHighlights: \"In contrast, optimal UWI policy ends\
    \ all dirty energy usage by 2103.\"\nHighlights: \"The striking messages here\
    \ are both encouraging \u2013 global carbon taxation can significantly mitigate\
    \ losses from climate change \u2013 and discouraging \u2013 atmospheric carbon\
    \ concentration is already so high that the optimal UWI carbon tax policy can\
    \ only limit peak global damages by 44.3 percent.\"\n"
  4: "Source material here: The climate-relevant question is whether a carbon tax\
    \ policy will impact growth rates enough to materially change shares of world\
    \ GDP in, for example, 2100...Generations born in the long run in the Middle East,\
    \ Latin America excluding Mexico and Brazil, Sub-Saharan Africa, Brazil, and the\
    \ South Asian Pacific face net taxes equal to roughly 30 percent of their lifetime\
    \ consumption. These regions experience particularly large increases in energy\
    \ costs, not due to their ownership or production of fossil fuels...no region\
    \ can materially improve climate change if it operates solely on its own...China\u2019\
    s participation in carbon policy is a sine qua non for real progress against climate\
    \ change. Indian generations born after the year 2200 face the largest net negative\
    \ transfers, i.e., positive net taxes \u2014 roughly 40 percent of lifetime consumption...China\
    \ will become the world\u2019s dominant economy by the century\u2019s end, accounting\
    \ for almost one-third of world GDP compared with roughly 16 percent today. We\
    \ first assume, following Golosov et al.(2014), that coal reserves are infinite\
    \ and that any amount of coal can be obtained at a fixed cost...One of our model\u2019\
    s key advantages is the ability to assess carbon taxation enacted by only a subset\
    \ of regions. no region can materially improve climate change if it operates solely\
    \ on its own...the size of the UWI gain is still reduced by 35 percent \u2013\
    \ to 2.8 percentage points \u2013 if the policy\u2019s implementation is delayed\
    \ for 20 years."
  6: 'L. Kotlikoff et al.: Our model includes finite-lived selfish agents, dirty energy
    and capital mobility, and region-specific technologies for producing output. In
    addition, we focus on Pareto efficiency rather than social welfare.'
  7: "Oil, gas, and coal trade freely on the world market at prices \U0001D45D\U0001D442\
    \U0001D461,\U0001D45D\U0001D43A\U0001D461, and \U0001D45D\uE22F\U0001D461. Clean\
    \ energy is non-tradeable. Cost minimization in producing a unit of dirty energy\
    \ implies the following demands for alternative dirty energies... Decreasing returns\
    \ to scale in the clean-energy production sector ensures nonzero production of\
    \ clean energy in each region regardless of the price of energy... the optimal\
    \ paths of carbon taxation and UWI welfare gains are barely changed... Although\
    \ short- and medium-term use of dirty energy, particularly coal, is greater the\
    \ slower the transition to full substitutability... One can question, per Hassler\
    \ et al. (2012), at least the short-run realism of perfectly clean and dirty energy\
    \ substitutability. One way to handle this issue is to assume a gradual increase\
    \ in the degree of clean and dirty energy substitutability, with the two forms\
    \ of energy ultimately becoming perfect substitutes."
  9: 'In the provided text, the methodological details are discussed as follows:

    1. "To describe the evolution of the climate in our multi-region OLG model, we
    adopt the functional form of DICE (Nordhaus, 2017), which relates output to emissions,
    emissions to carbon concentration, and carbon concentration to global temperature,
    but use a parameterization proposed by Folini et al. (2024)..."

    2. "DICE mimics the carbon cycle via three carbon reservoirs: the atmosphere (A),
    the upper ocean (U), and the lower ocean (L)..."

    3. "CO2 in the atmosphere impacts radiative forcing, Ft, according to..."

    4. "In DICE, the temperature evolves according to a two-layer energy balance model..."

    5. "We infer regional from global temperature using a popular technique from climate
    sciences called ''pattern scaling''..."

