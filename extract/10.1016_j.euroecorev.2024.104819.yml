    \ damages, percent of regional GDP\u2019\u2019 inTable6).\n\nAbsent transfers,\
    \ they range from $22 .8 per ton CO2 with the 1x damage specification up to $111\
    \ .7 per ton with 6x calibration (cf.\nthe row called \u2018\u2018Initial optimal\
    \ tax, $ per ton of CO2\u2019\u2019 inTable6).\n\nother things equal, a lower\
    \ SCC and, thus, lower carbon taxes. As indicated inTable6\u2019s row\ncalled\
    \ \u2018\u2018Welfare gains\u2019\u2019, the UWI carbon policy can achieve a major\
    \ win-win for all humanity. In the 6x UWI case, all generations,\npresent and\
    \ future, across all regions gain 4.3 percent. Even in the 4x case, arguably an\
    \ optimistic damage scenario, the UWI gain\nis almost 3.0 percent.\n\nIn the 6x\
    \ case, Indians born in 200 years would be required under UWI policy to surrender\
