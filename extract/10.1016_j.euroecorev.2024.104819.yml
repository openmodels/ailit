  10: "yaml\nEvaluation overview: \"We model regional TFP, \U0001D434\U0001D467,\U0001D461\
    , as the product of a region-specific exogenous trend, \u0303\U0001D434\U0001D467\
    ,\U0001D461, and a regional function, \U0001D44D\U0001D467,\U0001D461, which incorporates\
    \ productivity differences due to differences in temperature. \u2026 Regional\
    \ climate damages are given by \U0001D437\U0001D467,\U0001D461= 1\u2212 \U0001D44D\
    \U0001D467,\U0001D461\u2215\U0001D44D\U0001D467,1900.\"\nDrivers of Risk: \"Eq.(43)\
    \ models regional climate-specific TFP as peaking at \U0001D447\u2217 (cf. Krusell\
    \ and Smith(2022)). Thus, cold regions with temperatures below \U0001D447\u2217\
    \ will benefit from global warming as their temperature approaches \U0001D447\u2217\
    . Similarly, hot regions will be harmed as their temperature moves farther away\
    \ from \U0001D447\u2217.\"\nMethodology: \"In computing the regional average surface\
    \ temperatures, \U0001D447\U0001D467,\U0001D461, we apply pattern scaling as follows...\
    \ The \u2018\u2018handshake\u2019\u2019 of the climate emulator and the economics\
    \ block of the model is done at the level of temperature-dependent damages to\
    \ TFP... Our solution method uses a variant of the Gauss\u2013Seidel iteration\
    \ technique... It begins with guesses... It then uses a recursion to solve the\
    \ model backward from its steady state... These recursively calculated values\
    \ are used to update the time paths of our guessed global aggregates, regional\
    \ temperatures, regional damages, regional productivities, and the carbon tax...\"\
    \nHighlights: \"Eq.(43) models regional climate-specific TFP as peaking at \U0001D447\
    \u2217 (cf. Krusell and Smith(2022)). Thus, cold regions with temperatures below\
    \ \U0001D447\u2217 will benefit from global warming as their temperature approaches\
    \ \U0001D447\u2217. Similarly, hot regions will be harmed as their temperature\
    \ moves farther away from \U0001D447\u2217.\"\n"
  11: "\"Our 18-region OLG model builds on the so-called Global Gaidar Model (GGM),\
    \ but is substantially extended by coupling it to a climate emulator... Table\
    \ 1 lists the model\u2019s 18 regions and their acronyms. Energy consumption/usage\
    \ data come from the US Energy Information Administration (EIA)... We aggregate\
    \ energy sources into four composites: coal, gas, oil, and clean energy. As in\
    \ Hillebrand and Hillebrand (2020), we assume an elasticity of substitution between\
    \ oil, coal, and gas of \U0001D462= 2.\""
  12: "  \n\"This table presents region-specific GDP and energy-consumption data.\
    \ Each row presents the 2017 GDP (in trillions of 2017 USD) and energy consumption\
    \ (in quad Btus) of coal, natural gas, petroleum and other liquids, nuclear, renewables,\
    \ and others per individual region.\"  \n\n\"This table presents the region-specific\
    \ energy consumption of coal, natural gas, petroleum and other liquids, nuclear,\
    \ renewables, and others per individual region as a share of GDP.\"  \n\n\"The\
    \ major consumers of fossil fuels are China, at 122.14 quad Btus, the US at 80.01\
    \ quad Btus, and Western Europe at 49.26.\"  \n\n\"Even though China\u2019s 2017\
    \ GDP is less than two-thirds that of the US and only three-fourths that of the\
    \ WEU, its carbon emissions are twice that of the US and three times that of the\
    \ WEU. This reflects its overwhelming dependence on coal, which arises from its\
