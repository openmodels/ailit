  23: The document discusses regional damages as a percent of regional GDP due to
    climate policies, with emphasis on the net UWI transfers. Indians born in 200
    years would be required under the UWI policy to surrender around 40 percent of
    their consumption; other regions like BRA, SAP, MENA, SLA, and SSA have future
