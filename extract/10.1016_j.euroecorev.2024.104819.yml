Highlights:
  1: A carbon tax-cum redistribution policy could potentially deliver significant
    welfare gains while limiting burdens to within 10 percent for any generation in
    any region.
  2: Important outcomes include the projection that climate change will significantly
    impact GDP differently across regions, but carbon taxation coupled with redistribution
    can mitigate these damages considerably.
  3: Global carbon taxation can reduce peak global damages by 44.3 percent.
  4: Key findings suggest that no single region can significantly affect climate change
    alone; participation of China is crucial, and delays in policy implementation
    can reduce the effectiveness of carbon taxation by 35% over 20 years.
  7: The transition speed to clean energy affects dirty energy use, but optimal carbon
    tax paths and welfare gains are minimally affected by the transition speed.
  10: The integration of temperature effects on productivity shows how regional economies
    might be differently impacted by changes in temperature, potentially benefiting
    colder regions and harming hotter ones.
  12: US GDP is one-fifth larger than that of Western Europe, but its emissions are
    three-fifths larger.
  13: It highlights potential underestimation of climate damage impacts by standard
    models like DICE, suggesting larger damages than previously assumed.
  14: BAU scenarios suggest potential severe regional economic damages, with India
    facing over 40% GDP loss and the US, China, and Japan/South Korea/Hong Kong seeing
    over 16% output loss by 2200.
  15: In the 6x damage scenario, peak global GDP loss is approximately 17 percent,
    and some regions face much larger damages.
  16: Optimal initial carbon taxes are highly sensitive to the damage function. Redistribution
    policies can help achieve welfare gains despite large initial costs.
  17: Key findings include optimal taxes growing over time, high welfare gains with
    UWIL policy capping net taxes, significant reductions in emissions with varying
    carbon tax rates, and varied regional impacts based on tax-transfer schemes.
  18: Regions that never hit the 10 percent limit show a closeness in welfare gains
    between different policy lines, with a 4.0 percent gain under UWIL for generations
    in such regions.
  19: Carbon taxation lowers global temperature paths and significantly reduces economic
    damages in most regions, with US damages dropping from above 16% to around 8%
    of GDP.
  20: The paper examines total CO2 emissions under a 6x damage specification in relation
    to different policies.
  21: Welfare gains are presented as a function of years and different policies.
  22: Optimal carbon taxes can lead to a marked reduction in the consumption of fossil
    fuels, yielding long-term benefits for future generations. Carbon taxes can require
    compensating current generations to ensure that they do not incur welfare losses.
  23: The UWI policy results in significant consumption transfers from poorer regions
    like India to richer regions like the US, which appears onerous and potentially
    unfair.
  24: WEU's global GDP share expected to surpass U.S. by century's end, with India
    being significantly impacted by carbon policy.
  25: The analysis finds that higher substitutability and infinite coal reserves increase
    gains from climate policy, whereas imperfect substitutability reduces them. It
    also explores scenarios with partial international participation in carbon tax
    policy.
  26: The regional SCC is only significant in China and the US. Despite the fact that
    damages are projected to be very large in regions like India and Brazil, the 2017
    SCC for India is only about $ 10.58, and for Brazil, only $ 3.12. The global SCC,
    in this case, is $111.69.
  27: Carbon taxation needs to be global for effectiveness; delayed implementation
    of carbon taxes reduces welfare gains and increases emissions.
  28: Absent policy, climate change produces substantial GDP losses, particularly
    in India (43.9% peak). Compensatory carbon tax policies (UWI, UWIF, UWIL) can
    achieve welfare gains and reduce climate damage. UWIL policy provides a significant
    welfare gain and reduces temperature rise to 2.1 degrees Celsius.
  29: Table 8 indicates that China has significantly higher relative indices for GDP,
    energy consumption, and CO2 emissions compared to the US.
  30: Social cost of carbon values increase over time and are highly variable across
    different regions and scenarios.
  33: The global social cost of carbon is projected to increase significantly from
    22.84 dollars per ton in 2017 to 490.15 dollars per ton in 2100 under the 6x case,
    BAU scenario.
  35: The figure presents gas consumption changes under different policies over time
    from 2017 onward, providing insight into the impact of these policies.
Methodology:
  1: The analysis is based on a large-scale, annually calibrated, multi-region, overlapping
    generations model of climate change and carbon policy.
  2: The analysis is performed using a large-scale, multi-region, overlapping generations
    (OLG) model calibrated to UN demographic data, and considers carbon taxation and
    regional climate impacts.
  3: The study uses a large-scale OLG IAM, with region-specific emissions and damages
    determined using pattern scaling.
  4: The analysis evaluates carbon taxation policies using a model that assumes varying
    assumptions about coal supply, energy substitutability, and regional coalition
    impacts on emissions.
  6: The paper describes a model with region-specific agents focusing on Pareto efficiency,
    involving finite-lived selfish agents, dirty energy, capital mobility, and region-specific
    technologies.
  7: The paper models energy consumption and substitution and includes equations for
    cost minimization and demand for dirty energy; decreasing returns ensure clean
    energy production.
  9: Regional climate damages are inferred from global temperatures using a technique
    called 'pattern scaling'.
  10: The analysis uses pattern scaling to estimate regional temperatures, modeling
    TFP with a climate emulator integrated with an economic model, iterating on guessed
    paths for variables until convergence is achieved.
  11: Energy consumption data from the US Energy Information Administration are used
    to calibrate CES production functions.
  12: The analysis uses coefficients to construct the price of the dirty-energy composite
    and determines the 2017 price of clean and dirty energy consumption by region.
  13: Productivity growth is projected using country-specific regression models, and
    climate impacts are assessed using the DICE model re-calibrated with CMIP5 data.
  14: "The analysis uses calibrated Krusell\u2013Smith-type productivity functions\
    \ varying by temperature, exploring multiple damage scenarios with carbon policy\
    \ implications."
  15: Analysis is based on a climate emulator calibrated to CMIP5 simulations with
    different damage scenarios applied.
  16: Analysis includes scenarios with and without transfers, examining impacts on
    interest rates, SCC, and welfare.
  17: The analysis uses a simulation approach with different damage scenarios (1x,
    2x, 4x, 6x) and tax-transfer schemes (No Transfers, UWI, UWIF, UWIL) to evaluate
    impacts over 50 and 100-year periods.
  21: The analysis calculates welfare gains as compensating consumption differentials
    for different policies, projecting them over time. Year 0 on the x-axis is 2017.
    The x-axis references the year of birth for the 6x damage specification.
  22: The analysis presents results for '6x case' regional temperatures under different
    policies, starting from the year 2017.
  25: The analysis employs a model incorporating assumptions about coal supply, substitutability
    of energy sources, and optimal tax trajectories over a 100 to 300-year horizon.
  27: The analysis is conducted by modeling different coalition scenarios with carbon
    taxes, examining general equilibrium effects and the impact of delayed taxation.
  28: Computational general equilibrium model projecting regional economic impacts
    to 2200 under different policy scenarios (BAU, UWI, UWIF, UWIL). Considers perfect
    substitutability of clean for dirty energy in the long run.
  29: The analysis uses a recursive solution algorithm that solves one-period problems
    and iterative procedures for optimal carbon tax paths.
  32: The model is solved for a given carbon tax path, and the Auerbach and Kotlikoff
    Lump-Sum Redistribution Authority (LSRA) is used to implement pre-specified Pareto-efficient
    outcomes. The optimal global carbon tax rate path is determined numerically through
    an iterative process involving guessing welfare changes, updating transfers, and
    calculating the present value of transfers until it approaches zero.
  34: The analysis involves iteratively calculating the optimal carbon tax path based
    on the SCC under different policy scenarios.
  35: The analysis uses a '6x damage specification' and examines the impact of 'different
    policies' on gas consumption over time.
