  24: "Source material here.\n\"This section considers whether carbon tax policy matters\
    \ for the evolution of global economic power.Table7examines this questionforthe6xdamagescenario.Theansweris,perhaps.First,ChinaisprojectedtoeclipsetheUSeconomicallywithorwithout\
    \ a carbon policy. In 2100, the US accounts for only 15.5 percent of global output\
    \ compared with 25.0 percent in 2017. In contrast, China\u2019s share of world\
    \ output grows from 15.6 percent in 2017 to 32.6 percent in 2100. However, the\
    \ end of the US economic hegemony and the path to that end is essentially independent\
    \ of carbon damage and carbon policy. This reflects the roughly equal proportionate\
    \ climate damages, as a share of GDP, experienced through time by both the US\
    \ and China (cf.Table5). By 2100, the US is in third place in terms of the share\
    \ of global GDP with only 15.5 percent of world output. This share is less than\
    \ the 19.5 percent combined WEU and UK global GDP share. Absent carbon policy,\
    \ WEU\u2019s global GDP share, which is 3 percentage points less than the US share\
    \ in 2017, surpasses the US share by almost 1.5 percentage points by the century\u2019\
    s end. This gap drops to roughly half with carbon policy and reflects the relative\
    \ importance of carbon policy to the US compared to Western Europe, indicated\
    \ inTable7. India, which stands to lose the mostfromclimatechange,isanotherexampleofcarbonpolicy\u2019\
    spotentiallysignificant,ifhardlyoverwhelming,impactontheshare of global GDP. In\
    \ 2100, India\u2019s share of world output is 6.43 percent with UWI policy, but\
    \ 5.38 percent without.\"\n"
  25: "Source material here: As expected, the BAU infinite coal reserves scenario\
    \ shows significantly higher coal usage, particularly during years 50 through\
    \ 100. This increases carbon damages between years 75 and 300 by an additional\
    \ 2.8% of global GDP. However, optimal policy is not invariant to assumptions\
    \ about coal\u2019s supply. Optimal policy simply adjusts to our alternative conditions\
    \ effecting a sharp reduction in coal use notwithstanding its perfectly elastic\
    \ supply. Indeed, the use of coal under optimal UWI policy differs little in the\
    \ two cases. Interestingly, the UWI gain in the infinite reserve scenario is 5.5%\
    \ versus 4.3% in the baseline scenario. Since damages under BAU are higher when\
    \ coal supply is in infinite supply, the carbon externality is larger. This implies\
    \ a larger proportional payoff from mitigating carbon emissions. Optimal tax trajectories\
    \ are very close to one another in the medium term and diverge substantially in\
    \ the long term. Surprisingly, in scenarios with high emissions and larger long-run\
    \ damages, the optimal tax is lower because the marginal damage from an additional\
    \ unit of emissions is lower. The optimal tax in the first period is reduced to\
    \ $83.6 per ton of CO2 compared to $87.5 per ton in the baseline specification,\
    \ and over the 100-year horizon, the optimal tax decreases to $448 per ton compared\
    \ to $543 per ton in the baseline. A different sensitivity question concerns the\
    \ substitutability of clean for dirty energy. Recall that our baseline model assumes\
    \ the two types of energy are perfect substitutes. However, commercial jets cannot\
    \ yet fly on batteries and will not likely do so in the near term. On the other\
    \ hand, within a few decades, hydrogen or other clean jet fuel may be ubiquitous.\
    \ Moreover, increasing the substitutability of clean for dirty energy can proceed\
    \ through a different channel, namely carbon removal. Improvement in such technology\
    \ could render all dirty energy clean (see, e.g., Fuss et al. (2020) for an analysis\
    \ of the role of carbon capture in achieving net-zero emissions). In this case,\
    \ substitutability would obviously be perfect. How sensitive are our results to\
    \ assuming that clean energy can immediately perfectly substitute for dirty energy?\
    \ As indicated, we address by considering gradual transitions from imperfect to\
    \ perfect substitutability. Specifically, we assume that the final energy input\
    \ used to produce output is, as indicated in Eq. (46), CES in clean and dirty\
    \ energy with their elasticity of substitution, rising at different rates over\
    \ the next three centuries. After year 300, we set substitutability to infinity,\
    \ i.e., we assume perfect substitutability. We consider three cases, each under\
    \ the assumption that coal is in infinitely elastic supply. In the first, labeled\
    \ high substitution, we let substitutability rise linearly from 2 to 31.9 in 0.1\
    \ increments over 300 years. This case is denoted by blue dashed lines in Fig.\
    \ 10. In the second case, medium substitution, referenced by green dashed lines,\
    \ substitutability equals 2 for 50 years and then rises linearly from 2 to 27\
    \ over the next 250 years. In the third case, low substitution \u2014 the red\
    \ lines, substitutability equals 2 during the first 100 years and rises linearly\
    \ from 2 to 22 over the next 200 years. As expected, slower green-for-dirty substitutability\
    \ leads to significantly higher dirty energy usage in the short and medium terms.\
    \ This is particularly true for coal. Slower substitutability entails larger carbon\
    \ damages. In the low-substitution case, they are roughly 12 percent greater at\
    \ the end of this century and for several centuries thereafter. Interestingly,\
    \ in all scenarios with imperfect substitution between clean and dirty energy\
    \ sources, the UWI gain is roughly 4.8 percent of GDP. Thus, the assumption of\
    \ infinite coal reserves increases the gains from climate policy, while imperfect\
    \ substitutability reduces them. The trajectory of the optimal tax in the case\
    \ of low substitutability turns out to be the lowest. The optimal tax in the first\
    \ period turns out to be $81.5 per ton in the first period and $272 per ton after\
    \ 100 years. Pareto-optimal taxes require large inter-regional and intergenerational\
    \ transfers. But absent the transfers required to effect a Pareto improvement,\
    \ initial generations will suffer significant losses. Unfortunately, it is far\
    \ from clear how to enforce such transfers, which require redistributing across\
    \ regions through time (see, e.g., Hassler et al. (2020)). Climate change action\
    \ is, after all, a classic free-rider problem. If, say, a few relatively small\
    \ regions choose not to participate in collective carbon tax policy, the overall\
    \ reduction in CO2 emissions and future damages will be largely unaffected. Therefore,\
    \ the region has no incentive to participate even if it expects significant future\
    \ damages in the BAU scenario."
