    \ carbon but not compensating losers.\n\nFinally, the table shows that the UWI\
    \ case entails extremely\nlarge transfers from future generations in regions hardest\
    \ hit by climate change\n"
  17: "Source material here.\n\"The analysis evaluates the impact of optimal carbon\
    \ taxation strategies on welfare gains, temperature rise, and economic damages.\"\
    \n\"Quantitative data includes the initial optimal carbon tax rate, average growth\
    \ rate of the tax, welfare gains in percentage terms, and maximum global temperature\
    \ rise and damages as a percent of GDP.\"\n\"As shown inTable6in the cells \u2018\
    \u2018Average growth rate of optimal tax over the next 50 years\u2019\u2019, the\
    \ average annual carbon tax real growth rate of the 6x damage specification ranges\
    \ from 1.4 to 1.5 percent.\"\n\"In all four cases, SCC-based carbon taxes grow\
    \ at time-varying rates, with the tax accelerating after 60 years.\"\n\"Optimal\
    \ taxes 100 years from now are very high \u2014 above $700 in the no-transfer\
    \ case.\"\n\"The welfare gains from setting a time-varying rather than a fixed\
    \ growth rate are small, that is, a simple, time-invariant growth in the carbon\
    \ tax suffices to produce the vast majority of any policy\u2019s welfare impacts.\"\
    \n\"UWI makes everyone better off but comes at a very high net tax cost to India\
    \ and other low-income regions that are most vulnerable to climate change.\"\n\
    \"For the 6x case with UWI policy, an initially $97 carbon tax growing at 1.5\
