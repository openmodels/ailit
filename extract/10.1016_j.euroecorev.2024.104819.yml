  28: "plaintext\nClimate change produces peak GDP regional losses under our \u2018\
    \u2018high damage scenario\u2019\u2019 ... For the US, losses peak at 17.1 percent.\
    \ In contrast, for Russia and Canada, climate change is good news. Under BAU,\
    \ Russia\u2019s and Canada\u2019s peak output gains are 3.9 percent and 2.6 percent,\
    \ respectively.\n\nOur optimal UWI gain is 4.3 percent, measured as a consumption\
    \ equivalent.\n\nIndia\u2019s peak loss of over two-fifths of its output occurs\
    \ in 2200.\n\nFortunately, there is a simple, mutually beneficial solution ...\
    \ Our optimal UWI gain is 4.3 percent, measured as a consumption equivalent.\n\
    \nThe redistributive aspect of UWI policy may be unenforceable due to the very\
    \ high taxes required of future cohorts in many regions.\n\nWe explored a UWIF\
    \ policy, that is, a UWI policy, but with the uniform welfare gain restricted\
    \ to future generations. Current generations are left with their BAU levels of\
    \ utility. The UWIF policy provides all future generations with a 7.7 percent\
    \ welfare gain.\n\nFor example, Indians born in the long run experience a 35.6\
    \ percent welfare gain, which is dramatically higher than the gains under UWI\
    \ or UWIF policy.\n\nFor our high-damage case, the UWIL carbon tax starts at $\
    \ 91.4 per ton of CO2, rising, in real terms, at roughly 1.5 percent per year.\
    \ ... Rather than increasing by as much as 3.7 degrees Celsius under BAU, the\
    \ peak temperature rise under UWIL policy is 2.1 degrees. Peak global damages\
    \ under UWIL are 9.2 percent of the planet\u2019s GDP. For India, the worst-hit\
    \ region under BAU, damages peak at 27.5 percent of GDP under UWIL versus 43.9\
    \ percent under BAU.\n\n... a nine-decade transformation of technology to the\
    \ point that clean and dirty energy are perfect substitutes does lead to significantly\
    \ greater use of dirty energy, ... But the dirty-energy end dates, beyond which\
    \ neither coal, oil, or gas are used, are little affected.\n\nCompensatory carbon\
    \ tax policy can achieve a win-win for all cohorts regardless of their place or\
    \ time of birth.\n\nIt also materially shortens the duration of fossil fuel usage\
    \ by approximately 130 years.\n"
