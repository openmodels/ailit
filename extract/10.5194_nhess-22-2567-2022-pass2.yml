  15: Traditional hard-engineering flood defenses are becoming financially unsustainable
    in Asian coastal megacities. A wider package of measures, including non-structural
    approaches and social strategies, is needed to address flood risk. Asian coastal
    megacities need to move towards SFRM. Current flood protections are not enough
