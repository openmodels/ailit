  12: Currently, many Asian coastal megacities are operating predominantly within
    the flood control and defence paradigms, including Guangzhou, Shenzhen, and Hong
    Kong (Chan et al., 2013a; Yang et al., 2018); Shanghai; Bangkok (Keokhumchengetal.,2012);HoChiMinhCity(Storchand
    Downes, 2011; Nguyen et al., 2021); Jakarta (Texier, 2008; Wannewitz and Garschagen,
    2021); and Singapore (Chan et al., 2018, 2021, 2022). These cities all feature
    in the top coastal cities at risk by the 2050s (Hallegatte et al., 2013) because
    of not only their rapidly growing populations and economies and developmental
    pressure but also rising flood hazards from climate change (i.e. more frequent
    storms, intensive rainfall, etc.).
