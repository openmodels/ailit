sourcematerial:
  2: "Source material here: Flood hazard is increasing as climate change raises sea\
    \ surface temperature, driving oceanic thermal expansion and increasing the intensity\
    \ and frequency of precipitation events and natural land subsidence. The assets\
    \ exposed to \uFB02ood hazards, including people and property, are growing through\
    \ rapid land-use change, urbanisation, and economic expansion."
  4: "Source: \"In England and Wales, more than 4 million people and property valued\
    \ at more than GBP200 billion are currently located in areas at risk of a 1-in-100-year\
    \ flood...Forecast flood damage is currently GBP1.4 billion annually but is expected\
    \ to rise to as much as GBP27 billion by 2100...Innovations in flood and coastal\
    \ erosion risk management included the \u201CMaking Space for Water\u201D (MSW)\
    \ strategy (Defra, 2007) and Planning Policy Statement 25 (PPS25) (DCLG, 2007),\
    \ which sought to implement elements of that strategy via the land-use planning\
    \ system in different types of flood...PPS25 and the 2014 National Planning Policy\
    \ Framework that superseded it adopt a broader sustainability appraisal (SA) of\
    \ flood management, considering economic, social, and environmental impacts...Whilst\
    \ this may be an example of good practice in strategic and sustainable FRM, the\
    \ UK still has room to improve in aspects such as cost-effectiveness and time\
    \ effectiveness and in its complex governance structure such as the fragmented\
    \ responsibilities across institutions and stakeholders in UK flood management.\""
  5: "  \n\"The 1953 North Sea flood, which caused 1836 deaths, spurred the Netherlands\
    \ on to develop a high coastal flood safety protection standard. The country has\
    \ the highest flood protection standards in the world, with 1-in-4000-year to\
    \ 1-in-10000-year flood return period infrastructure (i.e. coastal dike rings),\
    \ protecting populations and economic activities, especially in the west coast\
    \ cities of Rotterdam, The Hague, and Amsterdam (Klijn et al., 2004; Gerritsen,\
    \ 2005).\"\n\n\"According to the US National Weather Service (NWS), there was\
    \ an average of 87 deaths per year from flooding between 1989 and 2018 (National\
    \ Weather Service, 2018) and 29 flood events during the same period that resulted\
    \ in over USD 1 billion in economic losses, with an average event cost of USD\
    \ 4.3 million.\"\n\n\"Tropical cyclones are low-pressure systems that form over\
    \ warm tropical waters. [...] Tropical cyclones are varied in their wind speed\
    \ (storms, cyclones, and hurricanes listed in ascending order), and 'typhoon'\
    \ is a term that indicates the same features as a hurricane.\"\n\n\"The most disastrous\
    \ events in this period were hurricanes Katrina in 2005; Sandy in 2012; Harvey,\
    \ Irma, and Maria in 2018; and Florence in 2019, along with flooding in the Midwest\
    \ in 1993, 2008, and 2019, as these events significantly occurred as coastal floods\
    \ or combined floods with coastal and pluvial floods.\"\n\n\"Lately, the intense\
    \ rainfall in July 2021 (13\u201315 July) resulted in approximately 125\u2013\
    150 mm d\u22121 accumulated precipitation over 24h for each of the individual\
    \ days, particularly located in Limburg (E Netherlands) and neighbouring countries\
    \ (e.g. Luxembourg, Germany, and Belgium), and this event caused 184 casualties\
    \ in the Ahr catchment, Germany and 38 casualties in Belgium. The German Insurance\
    \ Association (GDV) estimated the economic losses to exceed EUR 350 million (Kreienkamp\
    \ et al., 2021; Kotz et al., 2022).\"\n"
  6: "\nDemand for development land remains high and, along with climate change, is\
    \ likely to increase \uFB02ood risk, especially in coastal areas...the US census\
    \ projects an additional 82 million residents by 2030, an increase of 29% of the\
    \ current population in coastal areas...Even as more funds were committed to \uFB02\
    ood control works, there was no decline in \uFB02ood losses, leading to calls\
    \ for \uFB02ood management rather than \uFB02ood control...\n"
  7: "A significant section of the text describes the impacts and response to the\
    \ 1993 Mississippi River flood, highlighting the economic damage: \"the river\
    \ flooding over 1200km of the river\u2019s length and about 840000km2 in area\
    \ (Fig. 2), resulting in over USD15 billion in economic damage.\"\n\nThe Drivers\
    \ of Risk are identified as the flooding event itself, as noted: \"an impetus\
    \ to review the approach was seen in the 1993 Mississippi River flood.\"\n\nQuantitative\
    \ material is reflected in the numbers related to the scope of the flood: \"flooding\
    \ over 1200 km of the river\u2019s length and about 840000 km2 in area.\"\n\n\
    Methodology applied involves improved practices discussed: \"use of geographical\
    \ information system (GIS), remote sensing, and GPS to identify and understand\
    \ flood hazards in various locations,\" and the development of \"hydrologic models\
    \ for more precise flood monitoring and prediction.\"\n\nThe overview and highlights\
    \ regarding management strategies reveal an important insight: \"these practices\
    \ encouraged sharing of flood risk information with the public and improved awareness\"\
    \ and mention the inadequacy of relying solely on engineering solutions: \"whilst\
    \ embankments and levees are important in protecting urban areas, they are insufficient\
    \ on their own... Floodplains should be managed as part of the natural ecosystem.\"\
    \n"
  8: "Source material here.\ngovernment, against losses from \uFB02ooding and requires\
    \ \uFB02ood insurance on all properties in the designated 100-year \uFB02ood-plain\
    \ as shown on \u201C\uFB02ood insurance risk maps\u201D. Despite the requirement\
    \ for \uFB02ood insurance and the potential sanctions for not having it if \uFB02\
    ooded (ineligibility for other federal disaster assistance), only approximately\
    \ 50% of properties in the designated 100-year \uFB02oodplain have \uFB02ood insurance\
    \ (National Association of Insurance Commissioners and the Center for Insurance\
    \ Policy and Research, 2017). This may re\uFB02ect several factors, including\
    \ a misunderstanding by property owners of their \uFB02ood risk and an expectation\
    \ that disaster relief will be forthcoming despite the requirement.\n\nThe NFIP\
    \ aims to provide \uFB02ood protection for property owners and discourage development\
    \ in substantial risk areas by limiting access to insurance. The NFIP is sponsored\
    \ by the federal government, which also provides insured residents with access\
    \ to emergency \uFB01nancial relief aid should they suffer \uFB02ood damage (Longenecker,\
    \ 2008). The programme was designed to be \uFB01nancially self-supporting, but\
    \ the US Government Accountability Of\uFB01ce reports that losses cost the taxpayers\
    \ about USD200 million annually and that since 1978, the NFIP has paid more than\
    \ USD51 billion in \uFB02ood claims (Bagstad et al., 2007). \n\nFurther, suf\uFB01\
    cient funding from Congress for \uFB02ood insurance risk map updates has not been\
    \ forthcoming even though many of the maps were created in the 1980s and thus\
    \ do not re\uFB02ect \uFB02oodplain changes over time, whether from upstream development\
    \ or climate change. Insurance is one means to mitigate \uFB02ood risk, but designing\
    \ and delivering successful schemes are dif\uFB01cult, with issues arising relating\
    \ not just to affordability but also to cost sharing, the sacri\uFB01ce of very\
    \ high risk areas, and insurance industry returns and expertise (Ball et al.,\
    \ 2013; Crichton, 2008; Michel-Kerjan and Kunreuther, 2011). \n\nIn fact, the\
    \ UK similarly introduced \uFB02ood insurance in the early 2000s as a \uFB02ood\
    \ risk mitigation approach and established \uFB02ood risk mapping based on postal\
    \ codes of households and locations for riverine and coastal \uFB02oods as a planning\
    \ instrument for informing the stakeholders (planners), investors (developers),\
    \ and communities about \uFB02ood risk (Lamond and Penning-Rowsell, 2014).\n\n\
    While \uFB02ood management in the USA has historically been a federal responsibility,\
    \ the NFIP is only successful as a shared responsibility. However, with this change,\
    \ insuf\uFB01cient attention has been given to who bears the cost of \uFB02ooding.\
    \ In Houston\u2019s case, the residents and federal government have borne the\
    \ costs, while the bene\uFB01ts of development have gone to the city\u2019s tax\
    \ base and private developers (Berke, 2017). Thus, while the USA has made important\
    \ and successful strides towards SFRM, more is needed to achieve its goals.\n"
  9: "Source material here.\n- \"Inthe2000s,theMLITissuedtheir\u201CEffectiveFloodManagement\
    \ including Basin Responses\u201D policy, which emphasised that \uFB02ooding was\
    \ unavoidable and accepted the ability of \uFB02ooding in water-prone areas (e.g.\
    \ wetland) to enhance ecological value (Ikeda et al., 2008).\"\n- \"The Japanese\
    \ authorities understood \uFB02ood protection measures and practices should necessarily\
    \ consider \uFB02ood consequences in Japanese cities because of their substantial\
    \ populations and af\uFB01liated economic assets.\"\n- \"More recently, towards\
    \ the 2010s, the Japanese authorities has further addressed \uFB02ood resilience\
    \ approaches.\"\n- \"'Flood Resilience' refers to the ability of communities and\
    \ sectors to withstand a \uFB02ood event and the ability to recover from the disruption\
    \ of \uFB02oods (Environmental Protection Agency, 2014). In Japan lately, the\
    \ government especially tackled the perception via issuing \uFB02ood hazard maps\
    \ (MILT,2008).\"\n- \"The MILT was further concerned about the intensive rainstorms\
    \ that enhanced urban \uFB02oods and legislated speci\uFB01c measures to reduce\
    \ \uFB02ood risk during heavy rainstorms (MILT, 2013).\"\n- \"After the tsunami\
    \ and coastal \uFB02oods in the early 2010s, the MILT further implemented the\
    \ Act on Special Measures concerning Urban Reconstruction in 2018 to strengthen\
    \ \uFB02ood resilience, particularly tackling the prevention, emergency response,\
    \ and recovery processes.\"\n"
