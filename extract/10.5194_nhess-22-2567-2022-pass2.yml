    Evaluation overview: "In Asian coastal megacities, flood risk is high and rising,
    and defending against flooding effectively using traditional approaches is becoming
    financially unsustainable."


    Drivers of Risk: "confronted with climate change, the existing levels of protection
    are not enough... frequency, intensity, and magnitude of storms (typhoons), intense
    rainfall events, and sea surges... natural resource extraction is also increasing
    flood hazard through the land subsidence it causes."


    Quantitative material: "the major urban drainage systems in Singapore have been
    improved from 1 in 50 years to 1 in 100 years, whilst Guangzhou and Shenzhen only
    have a 1-in-20-year return period protection against typhoon and sea surges."


    Methodology: "We have been using other global lessons and experiences (from four
    countries) that have indicated ways forward on flood management. A key impetus
    of the shift in practice from flood protection and defence paradigms to SFRM."


    Highlights: "Traditional hard-engineering flood defenses are becoming financially
    unsustainable. Coping with flood risk... is increasingly considered a necessary
    and more sustainable alternative to hard-engineering defences alone."

