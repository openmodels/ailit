Drivers of Risk:
  1: Increases in temperature affecting weight-at-age (positive) and recruitment (negative).
  2: Environmental variables (e.g., temperature, ocean pH) are considered as drivers
    affecting the length of age-1.5 animals (L1.5) and mean recruitment of Pacific
    cod.
  3: Environmental variables are a key source of uncertainty when making projections.
    The paper identifies Earth Systems Models and emission scenarios to use, focusing
    on those that performed well with respect to sea ice in the Bering Sea, but also
    bracketed the range of historical conditions (warm, moderate, and cool running).
  4: Environmental variables are linked to time-varying parameters in the assessment
    model, influencing future recruitment deviations.
  5: Sea surface temperature (SST) in summer, sea surface or bottom temperature during
    the spawning season, ocean pH (surface and bottom) during the spawning season.
  6: The focus is on economic and fishery management factors, as well as the productivity
    of the Pacific cod stock.
  7: Summer sea surface temperature (SST) is identified as a key environmental variable
    affecting growth and recruitment.
  8: Summer sea surface temperatures are identified as significant environmental drivers
    affecting recruitment and spawning biomass.
  9: Sea surface temperature (SST) is identified as a driver impacting growth and
    recruitment, potentially leading to reduced biomass and fishery sustainability.
  10: Increased temperature impacts recruitment negatively and influences weight-at-age
    positively.
  11: Uncertainty in recruitment due to lack of integration with environmental variables.
  13: Assumes stationarity in environmental conditions which can impact spawning biomass.
  14: The study explores the effects of temperature and pH on growth and recruitment
    of Pacific cod. Increased temperature is associated with increased metabolic demand
    and mortality, and decreased availability and energy content of prey.
  15: Environmental variables are considered as proxies for the actual mechanisms
    driving population dynamics.
  16: Future levels of climate warming and the associated scenarios, such as MIROC
    ssp126 and GFDL ssp585, impact the outcomes.
Evaluation overview:
  1: Impacts on Pacific Cod (Gadus macrocephalus) populations and fishery economics
    in the eastern Bering Sea, considering biomass, catch, and profits.
  2: The paper extends the stock assessment for Eastern Bering Sea (EBS) Pacific cod,
    focusing on the effects of environmental variables on biological parameters and
    future catch.
  3: No relevant information
  4: No relevant information
  5: Analysis of population parameters for Pacific cod in the eastern Bering Sea.
  6: The paper evaluates harvest control rules for EBS Pacific cod, focusing on sustainable
    yields and economic factors.
  7: The analysis evaluates outcomes such as spawning biomass decline and economic
    metrics like catch averages and profit ratios.
  8: Analysis focuses on the impact of environmental drivers on the spawning biomass
    of Pacific cod in the eastern Bering Sea.
  9: The paper examines climate impacts on fish stock outcomes such as growth, recruitment,
    and spawning biomass under different environmental scenarios.
  10: The analysis evaluates the impact of environmental scenarios on Pacific cod
    stock outcomes, focusing on spawning biomass and catch.
  11: Focuses on the assessment of model uncertainties related to EBS Pacific cod
    projections and environmental scenarios.
  13: No specific overview of an outcome like mortality or productivity loss is provided.
  14: The paper evaluates the probability of spawning biomass dropping below four
    threshold levels and relative profit.
  15: Thermal stress on groundfish populations
  16: The paper evaluates biomass and catch declines for EBS Pacific cod under future
    climate warming levels.
Highlights:
  1: Temperature increases increase weight-at-age but reduce recruitment, with the
    negative effects on recruitment outweighing the positive effects on weight-at-age.
    Current harvest control rules may not conserve the stock under climate change.
    Basing future catches on the environmental scenario that leads to the poorest
    outcomes (GFDL ssp585) generally keeps the stock above the threshold of 20 % of
    unfished spawning biomass under most climate scenarios and also achieves long-term
    profits.
  2: The framework considers uncertainty related to model choice, environmental variable
    relationships, Earth System Models and emissions scenarios, parameter uncertainty,
    and process error. The projected catch series are used to evaluate the consequences
    of setting catch limits based on potentially incorrect model configurations, Earth
    System Models, and harvest control rules.
  3: "Catch time-series reflect \u201Cperfect information\u201D given a model configuration,\
    \ set of environmental variables, and harvest control rule. Additional risk arises\
    \ if management is based on one catch time-series when the true population model\
    \ differs from that used to construct the catch series."
  4: Focuses on projecting future catch series based on different assessment model
    configurations and environmental scenarios. Aims to capture parameter and model
    uncertainty. Parameters related to future recruitment and L1.5's link to environmental
    variables are highlighted as particularly influential.
  5: Larval Pacific cod sensitivity to CO2 levels, potential impacts of temperature
    on yolk sac absorption, feeding conditions, growth rates, hatch rates, and recruitment.
  6: Discusses a new harvest control rule aiming to maximize net revenue as an alternative
    to the NPFMC Tier 3 rule.
  7: Summer SST is the most significant environmental driver impacting growth and
    recruitment, reducing expected recruitment despite faster growth.
  8: Projected declines in Pacific cod biomass are more severe under higher emissions
    scenarios (e.g., GFDL ssp585) and when no threshold harvest strategy is applied.
  9: Environmental scenarios indicate the need for adaptive catch limits to manage
    risk, as unfished spawning biomass can fall significantly with unchanged catch
    limits and high SST.
  10: Current harvest control rules may lead to declines in biomass and catch if continued;
    sloped harvest control rules benefit conservation and utilization.
  11: Model uncertainty for EBS Pacific cod is significant and not fully reflected
    in the four models used.
  13: Projecting potential changes in EBS Pacific cod spawning area due to climate
    change.
  14: The paper suggests updating projections based on climate-enhanced stock assessments
    and reviewing consistency of relationships between environmental variables and
    population parameters. There are differences in post-predictive loss (PPL) amongst
    the evaluated models.
  16: Climate effects with the highest warming rates may exceed the benefit of harvest
    control rules by the end of the century under certain scenarios.
Methodology:
  1: Framework for projections includes structural model uncertainty (population dynamics
    model, Earth System Models, emission scenarios), process error in future recruitment,
    and uncertainty in the parameter estimates of the population dynamics model. Applied
    to Pacific cod in the eastern Bering Sea using a harvest control rule that maximizes
    the difference between revenue and variable costs.
  2: The paper uses multiple assessment model configurations and Earth System Models/emission
    scenarios to project future catch series, accounting for uncertainty related to
    model configuration and future climate conditions. It outlines a best practices
    framework for conducting projections for extended, or "climate-enhanced", single-species
    models.
  3: The analysis unifies multiple stock assessment configurations and the uncertainty
    of the parameters of an assessment given a model configuration. Parameter vectors
    are sampled from a Bayesian posterior distribution to quantify uncertainty. Downscaled
    historical and future climate scenarios are used, bias-corrected to a high-resolution
    hindcast. Projections of climate-enhanced stock assessments are conducted for
    harvest control rules setting fishing mortality based on stock status relative
    to reference points. Time variation of parameters are considered either additively
    or multiplicatively as a function of environmental variables with added noise.
  4: "Uses a Bayesian assessment framework with NUTS MCMC sampling (Monnahan et al.,\
    \ 2016) for model projections, accounting for uncertainty in model structure and\
    \ environmental variables. Employs AIC for model selection. Projections are based\
    \ on 1000 draws from posterior distributions with convergence defined as all effective\
    \ sample sizes above 500 and \u0302R values less than 1.022 (Vehtari et al., 2021)."
  5: Uses a high-resolution oceanographic model (Bering10K ROMSNPZ) to hindcast physical
    and lower trophic level conditions. Bias correction using delta-corrected timeseries.
    CMIP6 Earth System Models (GFDL-ESM4, CESM-CAM6, and MIROC-ES2L) are downscaled.
    Future emission scenarios are SSP126 and SSP585.
  6: Evaluates harvest rules using Bayesian analyses fixing base values or annual
    deviations; considers past data up to 2020 and projections up to 2099.
  7: Projections explore structural uncertainty, structural error, and process/parameter
    uncertainty through deterministic and probabilistic approaches involving multiple
    model configurations and environmental scenarios.
  8: The analysis involves multiple assessment model configurations and environmental
    scenarios, utilizing projections like CESM and GFDL for different SSP emissions
    scenarios.
  9: The analysis is performed using posterior distribution sampling and projections
    based on maximum likelihood estimates across environmental and fishing scenarios.
  10: Utilizes environmental scenarios and different assessment model configurations
    to project future spawning biomass and catch; results pertain to the 40-5 control
    rule.
  11: Projections assume future recruitment without stock-recruitment relationship
    and consider a hypothesis on environmental variables for growth and recruitment.
  13: Accounts for parameter uncertainty and process error in spawning biomass projections.
  15: Alternative models with assumptions that reflect other processes should be explored.
    An alternative approach is to not link an environmental variable to a population
    parameter directly, but instead allow for annual parameter deviations and add
    a component to the likelihood function to reflect that environmental variables
    may provide indices of these deviations.
  16: The analysis involves projecting catch and biomass declines using harvest control
    rules and environmental models, considering null environmental models and scenarios
    like GFDL and MIROC ssp.
More Notes:
  3: The eastern Bering Sea Pacific cod stock assessment is used as an example, modeled
    with an age-structured population dynamics model. The assessment model configurations
    differ in terms of which parameters are time-varying and the data used for parameter
    estimation.
  4: Some parameters were fixed to their maximum likelihood estimates due to poorly
    informed posterior distributions.
  5: Data availability for Pacific cod assessment includes retained catch, index (survey
    and CPUE), length-composition (fishery and survey), and ages (survey) from 1980-2020
  6: The economic value of the cod fishery is assessed through analysis of decomposition
    of profits for trawl catcher/processors.
  11: The page emphasizes the need for expanded model configurations to better assess
    environmental impacts and uncertainties.
  13: Potential for changes in relationships between environmental variables and recruitment
    is acknowledged.
  15: The analysis assumes environmental variables are measured without error. Cumulative
    impacts of environmental variables on biological processes should be considered
    by future analyses.
Quantitative material:
  1: Decline in biomass and catch are expected if current harvest control rules continue
    to be used, which also lead to lower profits for the fishery.
  2: The paper mentions that the inclusion of environmental variables does not markedly
    impact the main outputs of the assessment (e.g., time-trajectories of spawning
    biomass and recruitment) because these are determined primarily by the monitoring
    data.
  3: No relevant information
  4: No relevant information
  5: Uses dynamically downscaled hindcasts, historical runs, and projections from
    Earth System Models to generate environmental time series.
  6: Specific parameters such as unfished recruitment, fishing mortality, and catchability
    are estimated quantitatively.
  7: "The paper provides \u0394AIC values and AIC weights for environmental models,\
    \ indicating the influence of different environmental variables on fishery stock\
    \ projections."
  8: Projections predict Pacific cod spawning biomass will decline, falling below
    40% of unfished levels by 2040, with some scenarios predicting stocks below 20%.
  9: Projections show probability distributions for spawning biomass, with high probability
    of declining below 20% of unfished biomass depending on catch limits and environmental
    scenarios.
  10: The analysis provides estimated and projected trajectories for spawning biomass
    and catch from 1977 to 2099 under various scenarios.
  13: References probability of being below 20% of unfished spawning biomass.
  14: The paper presents probabilities of spawning biomass dropping below threshold
    levels, distributions for relative profit (medians, 50% intervals, and 90% intervals),
    and post-predictive loss values across different models.
  15: The bar charts have a y-axis ranging from 0 to 20. The line chart has a y-axis
    ranging from -0.5 to 0.5.
  16: Projections show basing catch limits on MIROC ssp126 may lead to population
    crash, while GFDL ssp585 may keep stock above the threshold of 20% unfished spawning
    biomass.
