  2: "Source material here: This paper extends the stock assessment for EBS cod by\
    \ allowing environmental variables to capture variation in two biological parameters\
    \ driving the population dynamics (the length of age-1.5 animals, L1.5, and the\
    \ mean recruitment). Several alternative (yet) plausible environmental variables\
    \ are considered to assess the extent to which including environmental drivers\
    \ in the assessment leads to better fits to the available data. The inclusion\
    \ of environmental variables does not markedly impact the main outputs of the\
    \ assessment (e.g., time-trajectories of spawning biomass and recruitment) because\
    \ these are determined primarily by the monitoring data. Future catch series are\
    \ developed based on projections from multiple assessment model configurations\
    \ and Earth System Models/emission scenarios to account for the range of uncertainty\
    \ described above. This paper therefore outlines a best practices framework for\
    \ conducting projections for extended, or \u201Cclima-process uncertainty and\
    \ parameter/estimation uncertainty. This framework considers uncertainty related\
    \ to which model of the population dynamics is correct, which parameters are related\
    \ to the environmental variables (such as temperature and ocean pH), and which\
    \ Earth System Models and emissions scenarios should be used to determine future\
    \ values for the environmental variables, as well as parameter uncertainty, and\
    \ past and future process error in population parameters (such as recruitment\
    \ and growth). Consequently, the resulting projected catch series reflect the\
    \ uncertainty related to the assessment model configuration as well as future\
    \ climate conditions. The projected catch series are then used to evaluate the\
    \ consequences of setting catch limits based on one assessment model configuration,\
    \ one Earth System Model/emission scenario and one harvest control rule when that\
    \ assessment model configuration and Earth System Model/emission scenario may\
    \ not be correct."
