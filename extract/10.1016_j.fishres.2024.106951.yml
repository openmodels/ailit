  5: "Source material here.\nThe analyses consider models related to possible environmental\
    \ drivers of the population parameters for Pacific cod (environmental models hereafter),\
    \ as well as a null environmental model (0) without environmental drivers: L1.5\
    \ is related to sea surface temperature (SST) in summer (June-August) in the southern\
    \ Bering Sea... deviations in recruitment about mean recruitment are related to\
    \ sea surface or bottom temperature during the spawning season of March and April...\
    \ deviations in recruitment about mean recruitment are related to ocean pH (surface\
    \ and bottom) during the spawning season (March and April) in the southern Bering\
    \ Sea. We use environmental time-series based on dynamically downscaled hindcasts\
    \ (boundary conditions forced by CORE-CFS), historical runs (unique to each Earth\
    \ System Model), and projections from the output of a high-resolution oceanographic\
    \ model... a high-resolution oceanographic model for the eastern Bering Sea at\
    \ 10 km horizontal resolution (Bering10K ROMSNPZ), which includes hindcasts of\
    \ the physical and lower trophic level conditions in the region during 1970\u2013\
    2022, historical timeseries for each Earth System Model (1980 - 2015), and projected\
    \ conditions under future emission scenarios from 2022 to 2100... based on this\
    \ analysis we used the delta-corrected timeseries... The CMIP6 Earth System Models\
    \ (i) downscaled through the ROMSNPZ Bering Sea model were GFDL-ESM4, CESM-CAM6,\
    \ and MIROC-ES2L... The future CMIP6 emission scenarios (k) were Shared Socioeconomic\
    \ Pathways 1\u20132.6. (ssp126) and 5\u20138.5 (ssp585)... Hurst et al. (2019)\
    \ found some sensitivity of behaviour, growth, and lipid composition of larval\
    \ Pacific cod to CO2 levels... higher temperatures may lead to high yolk sac absorption\
    \ and poor feeding conditions (Shotwell et al., 2022)... laboratory studies on\
    \ larval cod have shown a relationship between the growth rates and temperature\
    \ (Laurel et al., 2008), and temperature impacts on cod hatch rates and recruitment\
    \ have also been documented (Laurel and Rogers, 2020; Litzow et al., 2022). Fig.\
    \ 3. Data available for the assessment of eastern Bering Sea Pacific cod. Note\
    \ that only one of the models (4) makes use of the fishery CPUE data.' and based\
    \ on the data categories in the figure.\n"
  6: "The evaluation of harvest control rules is mentioned in: \"The management advice\
    \ for EBS Pacific cod is based on the North Pacific Fishery Management Council\
    \ Tier 3 40\u20135 harvest control rule ... does not explicitly account for the\
    \ economic factors associated with fishing ... We thus considered a different\
    \ harvest control rule that aimed to set the target fishing mortality to that\
    \ predicted to maximize net revenue.\"\n\nEconomic and productivity factors as\
    \ drivers of risk are highlighted here: \"This harvest control rule relates to\
    \ achieving sustainable yields but does not explicitly account for the economic\
    \ factors associated with fishing that can be related to optimum yield (OY) under\
    \ the USA Magnuson-Stevens Act.\"\n\nQuantitative estimates are drawn from the\
    \ specification of models and parameters: \"The specifications of the four assessment\
    \ model configurations ... The parameters indicated by asterisks are fixed at\
    \ their MLEs for the Bayesian analyses ... Total estimated parameters 504.\"\n\
    \nMethodology is referenced through the applied Bayesian analyses: \"For the Bayesian\
    \ analyses, the base value is estimated but the annual deviations are set to the\
    \ MLEs ... Recruitment deviations (future) Estimated (2021-2099).\"\n\nThe highlight\
    \ on the alternative harvest control rule for EBS Pacific cod and its focus on\
    \ net revenue is found in: \"We thus considered a different harvest control rule\
    \ that aimed to set the target fishing mortality to that predicted to maximize\
    \ net revenue.\"\n\nThe analysis of the economic value of the cod fishery is described\
    \ with: \"A decomposition of profits for these vessels, by area, species, and\
    \ gear, forms the empirical basis for evaluating the economic value of the cod\
    \ fishery in the eastern Bering Sea.\"\n"
  7: "yaml\nEvaluation overview: \"The conservation-related performance metrics used\
    \ to summarize the outcomes of the analyses were the probability of the spawning\
    \ biomass dropping below 20 % of the unfished spawning biomass... while the economic\
    \ performance metrics were the average catch over the first 20 and last 20 years\
    \ of the projection period and the ratio of the average profit over the last 20\
    \ years (2080\u20132099) of the projection period relative to the average profit\
    \ over the first 10 years of the projection period (2023\u20132032) and the annual\
    \ average variation in catch during the first 20 and last 20 years of the projection\
    \ period.\"\nDrivers of Risk: \"Of the models including environmental drivers,\
    \ that which assumes that summer SST is related to the annual deviations in L1.5\
    \ and those in recruitment about mean recruitment leads to the lowest value for\
    \ AIC (Model 2; Table 2). Summer SST is the \u201Cbest\u201D environmental variable\
    \ for both of these population parameters.\"\nQuantitative material: \"Values\
    \ for \u0394 AIC and the AIC weights for the models with different selections\
    \ related to environmental drivers of growth and recruitment. (a) \u0394 AIC...\
    \ (b) AIC weights.\"\nMethodology: \"The first set of projections involved exploring\
    \ structural uncertainty in the climate coupling by projecting the four assessment\
    \ model configurations (Table 1) based on the maximum likelihood estimates (MLEs)\
    \ of their parameters for the six environmental scenarios...The second set of\
    \ projections was focused on exploring the effects of structural error through\
    \ projecting the 56 catch series for the MLE estimates of the parameters for 24\
    \ models...The third set of projections was focused on quantifying process and\
    \ parameter uncertainty by sampling the posterior distributions for the 24 future\
    \ states.\"\nHighlights: \"Of the models including environmental drivers...Summer\
    \ SST is the \u201Cbest\u201D environmental variable for both of these population\
    \ parameters...The best fit model with environmental drivers implies that increasing\
    \ sea surface temperature in summer...will lead to faster growth (larger L1.5)\
    \ but lower expected recruitment. The effect of temperature on recruitment is\
    \ stronger than that of temperature on growth.\"\n"
  8: 'The paper discusses the projected decline in Pacific cod in the eastern Bering
    Sea, noting that "the catches and spawning biomass of Pacific cod in the eastern
    Bering Sea will decline over time, particularly after about 2040." It identifies
    "summer sea surface temperatures" as a key environmental driver affecting Pacific
    cod recruitment, as noted in the scatter plot descriptions and the relationship
    between recruitment and SST. Quantitatively, it is mentioned that "even the more
    optimistic ones (i.e., ssp126), result in a spawning biomass below the target
    level of 40% of the unfished level by the end of the projection period," with
    some scenarios projecting it to "drop below 20% of unfished spawning biomass."
    The methodology is described as involving "the impact of assessment model configuration
    on the performance metrics...based on the output of MIROC for the ssp126 emission
    scenario." The highlights include that "projections based on CESM ssp585 and GFDL
    ssp585" are particularly pessimistic, and the scenario outcomes depend heavily
    on whether a "threshold harvest strategy is...applied."

