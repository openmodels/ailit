Quantitative material:
  2: Vegetation fires burn an annual global average of 400-500 million hectares.
  3: From 1979 to 2013, an 18.7% average increase in fire-weather-season length was
    documented across global burnable lands.
  4: Annual average burned area in Canada has almost tripled since 1959 from 1 million
    ha to 2.8 million ha.
  5: Linear trends showing the number of days per year where the FWI exceeded the
    local 95th percentile over the period from 1979 to 2019.
  6: "Mentions a 58% increase in global burned area by the end of the twenty-first\
    \ century under stronger warming scenarios in some models. Also mentions that\
    \ the number of days exceeding the 95th percentile of the Fire Weather Index is\
    \ projected to increase almost 130% for the Mediterranean and just under 40% for\
    \ Alaska when global mean temperatures reach 2\xB0C above pre-industrial levels."
  7: The page provides quantitative information on projected changes, such as a +10.2%
    (55.9% increase) in burned area for Western USA and increases in fire weather
    for various regions.
  9: Mentions a figure (Fig. 5) illustrating the conversion of infrequently burned
    forest to a frequently burned, treeless state, associated with declines in carbon
