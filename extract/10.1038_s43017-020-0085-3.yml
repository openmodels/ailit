  12: "Source material here.\nEvaluation overview: \"Development of these fire-management\
    \ interventions requires transdisciplinary research that combines insights from\
    \ natural and social sciences, engineering and technology, and humanities. Such\
    \ research is also prerequisite for improving global and regional fire models\
    \ of future fire activity, which are needed to explore the fire\u2013vegetation\u2013\
    atmosphere feedbacks on terrestrial carbon dynamics (Fig. 4). However, achieving\
    \ better fire management requires addressing a number of key research challenges.\"\
    \n\nDrivers of Risk: \"The flammability of many landscapes is increasing because\
    \ of the combined effects of changing climate and land-use patterns. The increased\
    \ risk of economically and ecologically destructive fires can be reduced using\
    \ planning and urban-design principles, combined with fuel management and fire\
    \ management.\"\n\nQuantitative material: \"For instance, application of this\
    \ approach to 28,000 km2 of Eucalyptus savannah in Arnhem Land has been estimated\
    \ to have reduced accountable non-CO2 emissions by 37.7% relative to emissions\
    \ in the decade prior to the intervention.\"\n\nHighlights: \"Careful monitoring\
    \ and evaluation are required, though, to ensure that managed fire regimes do\
    \ not have unwanted socio-ecological side effects such as harming biodiversity,\
    \ promoting a grass-fire cycle with declines in above-ground carbon storage due\
    \ to increased tree mortality or disempowering indigenous communities. ... Large-scale\
    \ tree planting and natural-forest restoration has recently been suggested as\
    \ pivotal to drawing down atmospheric CO2, but there are substantial caveats to\
    \ this idea. Critically, any large-scale reforestation programme to store carbon\
    \ must have effective and sustainable fire management, as large expanses of young\
    \ trees are particularly vulnerable to high-severity fires.\"\n"
