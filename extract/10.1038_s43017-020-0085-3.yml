  3: Extreme fire events are characterized by a combination of factors such as anomalous
    fire behavior, high energy releases, rapid spread rates, massive smoke emissions,
    and prolonged duration.
  4: Warmer, drier summers and earlier spring snowmelt increase the area burned from
    vegetation fires.
  5: Linear trends in vegetation-fire activity, specifically the increase in the number
