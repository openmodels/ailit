sourcematerial:
  2: "Source material here.\nVegetation fires are an ancient and essential component\
    \ of the Earth system, and have shaped the evolution of plants, animals and biogeochemical\
    \ processes.... Such fires have major economic impacts, affecting life, property\
    \ and human health, thus, it is important to consider contemporary and future\
    \ trends in fire activity to inform adaptation and mitigation policies.... Currently,\
    \ anthropogenic climate change is altering precipitation patterns and increasing\
    \ temperatures, resulting in more frequent extreme vegetation-fire events....\
    \ The human settlement and infrastructure embedded in flammable vegetation contributes\
    \ to economically disastrous fires.... Vegetation fires burn an annual global\
    \ average of 400\u2013500 million hectares (Mha).... Large and frequent fires\
    \ in boreal and tropical forests have the potential to cause terrestrial carbon\
    \ stores to become major greenhouse gas sources, amplifying climate change....\
    \ In recent years, for example, there have been increasing media reports of major\
    \ fire disasters: the wildfires in Chile in 2017, Portugal in 2018, California\
    \ in 2018 and Australia in 2019\u20132020 are prominent examples.\n"
  3: "Source material here. From 1979 to 2013, an average increase of 18.7% in fire-weather-season\
    \ length has been documented across global burnable lands, with a doubling by\
    \ long fire-weather seasons across most of the Earth\u2019s flammable biomes67\
    \ (Fig. 3). Extreme fire events are characterized by some combination of the following:\
    \ anomalous fire behaviour, involving extremely high energy releases, very rapid\
    \ rate of spread, very large flame heights; massive emission of smoke and greenhouse\
    \ gas pollution; prolonged duration of fires, enormous geographical scale of burned\
    \ areas, or both; fires causing unusually adverse biological, atmospheric or geomorphological\
    \ effects. However, the MODIS burned area record68 indicates that, between 1998\
    \ and 2015, the area burned by vegetation fires globally declined by around 25%,\
    \ from over 500 Mha to less than 400 Mha annually69. Despite these observational\
    \ limitations, there is an emerging picture of changes in global fire activity,\
    \ which emphasizes the importance of regional-scale variation, climate change\
    \ and anthropogenic drivers. The largest decreases in area burned occurred in\
    \ African and South American tropical savannahs and Asian semi-arid grasslands\
    \ (Fig. 3a,b), and were caused by ongoing land-cover conversion, leading to a\
    \ more fragmented and less flammable landscape69."
