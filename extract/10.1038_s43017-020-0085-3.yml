  15: 'Source material here: The page mentions several studies related to climate
    change impacts on fire activity, such as "Impacts of climate change on fire activity
    and fire management," and references potential shifts in fire behavior and resilience,
    as well as modeling studies like "Response of simulated burned area to historical
    changes" and "Historical and future fire occurrence (1850 to 2100) simulated in
    CMIP5 Earth System Models," indicating methodology based on historical data and
    projections. It also discusses increased lightning strikes in the U.S. due to
    global warming, presenting a quantitative aspect, while mentioning transformations
    in fire regimes and forest resilience under climate change.'
