  6: "In many regions, it is apparent that fire seasons are lengthening and becoming\
    \ more extreme, and lightning ignitions are increasing, contributing to economically\
    \ destructive fire events. Yet, simple attribution of these increases to climate\
    \ change is challenging because there are specific factors, including anthropogenic\
    \ ones, that shape regional fire activity. These factors can increase the risk\
    \ of extreme events in some cases, and, in other cases, cause a decline in area\
    \ burned, highlighting the need to consider and to record more indices than simply\
    \ area burned. Over the last 40 years, a variety of modelling approaches have\
    \ been applied both globally and regionally to discern likely changes in fire\
    \ activity owing to anthropogenic climate change. TAble 1 summarizes the rapid-response\
    \ review on projected changes in fire activity by geographical region based on\
    \ papers published since the Fifth Assessment Report of the Intergovernmental\
    \ Panel on Climate Change. suggests there will be a large increase in the occurrence\
    \ of extreme fire weather for much of the globe, with some of the largest increases\
    \ regionally in Table 1, suggests there will be a large increase in the occurrence\
    \ of extreme fire weather for much of the globe, with some of the largest increases\
    \ regionally. the number of days exceeding the 95th percentile of the Fire Weather\
    \ Index is projected to increase almost 130% for the Mediterranean to just under\
    \ 40% for Alaska when global mean temperatures reach 2\xB0C above pre-industrial\
    \ levels relative to contemporary conditions. The models generally showed increases\
    \ in global burned area, albeit with substantial uncertainty, with some models\
    \ showing a 58% increase by the end of the twenty-first century under stronger\
    \ warming scenarios. For instance, the spread of Bromus tectorum (cheatgrass)\
    \ across the semi-intermountain western USA has facilitated the replacement of\
    \ a low-frequency, mixed-severity shrubland fire regime with a high-frequency,\
    \ high-severity grassland fire regime."
