    combinations of climate events and human agency.
  10: Challenges include conductive heat, direct flames, radiant heat, convective
    heat, embers, and smoke.
  11: Climate change impacts, shrinking safe weather windows, ineffective urban planning,
    and socio-ecological factors amplify wildfire risk, especially in the WUI.
  12: Increasing landscape flammability due to changing climate and land-use patterns,
    and specific fire behaviors like pyro-tornadoes.
  13: Anthropogenic fire regimes are influenced by human activity; Climate change
    and numerous other anthropogenic effects on fire regimes present a new, urgent
    challenge.
  14: Climate change, human activities, and invasive grasses are highlighted as significant
