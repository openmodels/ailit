  9: "Source material: There is also uncertainty in fire- regime predictions due to\
    \ the complexity of climate\u2013fire\u2013vegetation inter - actions and feedbacks120.\
    \ Regardless, comparative analyses of different model out- puts and obser ved\
    \ patterns in area burned show that one of the greatest barriers to modelling\
    \ future fire regimes concerns anthropogenic factors125. For example, in some\
    \ regions, climate change could increase the abundance of plants with low flammability...\
    \ However, climate- change- enhance d woody tree and shrub expansion135. Thus,\
    \ regional- scale models are likely to have higher veracity than global models\
    \ because biophysical and socio- ecological controls of fire activity have distinct\
    \ geographic patterns37,109. The paucity of projections is partially due to the\
    \ substantial challenges and uncertainties inherent in coupling interdisciplinar\
    \ y models, as well as the increased level of uncertainty and error at the extremes90,137,138.\
    \ Ecosystems currently located on the fringe of a bioclimatic niche (such as lower\
    \ tree line forests) and vegetation persisting in climate refugia or fire refugia\
    \ are particularly vulnerable to transforma - tive fire regimes 92,131,132. Landscape-\
    \ wide conversions from slow- growing, infrequently burned forests to fre- quently\
    \ burned grassland and shrublands are possible... Thus, predicting \u2018black\
    \ swan\u2019 extreme fire events \u2014 which, by definition, have no his - torical\
    \ precedent, such as the protracted, enormous and severe Australian 2019\u2013\
    2020 fires \u2014 seriously challenge the capacity of Earth- system- model projections.\
    \ The Australian fires represented a unique constellation of historically anomalous\
    \ prolonged drought...that resulted in a prolonged fire weather, localized lightning\
    \ storms and human ignitions than ignited the fires... Another key area of uncertainty\
    \ in future fire-regime predictions is the range of variability and frequency\
    \ of extreme fire events... (Fig. 5) | Conversion of infrequently burned forest\
    \ to a frequently burned, treeless state. Conversion is associated with declines\
    \ in carbon storage (sequestered C, top panel) and annual global fire- induced\
    \ emissions (emission rate, middle panel), assuming that both above- ground and\
    \ below- ground carbon are altered."
