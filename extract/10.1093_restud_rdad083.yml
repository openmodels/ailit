Methodology:
  1: The paper develops a framework using investor-level holdings data and estimates
    asset demand as a function of prices and characteristics, focusing on trends in
    active to passive management.
  3: Estimates a cross-sectional valuation regression and an asset demand system using
    quarterly US data from 2000 to 2019.
  5: This paper employs a counterfactual approach, reassessing valuation regressions
    by modifying asset distributions among institutional investors and observing resulting
    changes in regression coefficients and residuals.
  6: Analysis involves estimating demand systems to understand shifts towards more
    passive investment strategies.
  8: The paper presents a simple model of asset prices to illustrate how the importance
    of various investors in price formation can be measured. It uses a two-period
    model with constant absolute risk aversion (CARA) preferences. They develop an
    instrumental variables shrinkage estimator to estimate investor-specific demand
    curves. This methodology is applicable for analyzing questions with policy relevance,
    such as the transition from active to passive management and the pricing of climate-related
    risks.
  12: The paper quantifies the importance of an investor in the price formation process
    by considering an experiment where an investor k receives an outflow equal to
    its assets, which then flow to other investors in proportion to their assets;
    new prices are then derived based on modified weights.
  16: The study uses Sustainalytics environmental ratings and an entrenchment index
    for governance. The analysis uses a quarterly sample from 2000 to 2019 and a subsample
    from 2010 to 2019 due to data availability.
  19: The analysis involves estimating a demand curve for an investor by assuming
    standardized characteristics are exogenous to latent demand and involves a decomposition
    of market-to-book ratio combined with a model of expected earnings to yield expected
    returns.
  20: An assumption is made that any stock held by an investor during the current
    year or the previous two years is part of the choice set for constructing instruments.
  21: "A ridge estimator shrinks the estimated coefficients of an investor\u2019s\
    \ demand curve towards a target by adding a quadratic penalty to the objective\
    \ that is minimized by the estimator."
  22: Estimates asset demand system using investor holdings over a three-year window.
    Determines shrinkage parameter using cross-validation, splitting holdings randomly
    in half for each investor by year, estimating the model on one sample, and computing
    the mean-squared error on the left-out sample. Considers windows looking back
    as far as 5 years and ahead as far as 5 years to test robustness.
  23: The analysis involves modeling investor demand elasticity while making assumptions
    about exogenous characteristics and latent demand, adjusting the model to relax
    these assumptions, and using instruments possibly excluding hedge funds.
  24: Uses estimated residuals as instruments to estimate the demand curve
  25: "The asset demand estimation results are in Figure 5, Figure 6, and Table 4.\
    \ To summarize each investor\u2019s demand curve, we compute the time-series average\
    \ of co efficients."
  30: Uses the valuation model of Cohen, Polk, and Vuolteenaho (2003) and Campbell,
    Polk, and Vuolteenaho (2009) to map changes in valuations to expected returns.
    The analysis links changes in valuation ratios to changes in expected returns,
    assuming expected growth rates and returns are random walks.
  31: Uses an estimated asset demand system to analyze the impact of the transition
    from active to passive management and the growing concern about the pricing of
    climate-related risks by investors, focuses on the cross-section of valuations
    and the welfare of investors.
  32: "The analysis involves decomposing an investor's portfolio active share into\
    \ components of latent demand, portfolio tilts to characteristics, and elastic\
    \ demand using the metric \u03B4it(n)."
  35: 'The paper uses a framework to quantify two key dimensions of climate-related
    risks: regulatory risk and stakeholder risk. The analysis considers counterfactual
    scenarios, one where the environmental score increases by 0.1 for long-term investors
    and another to capture stakeholder risk.'
  36: The analysis uses regressions with changes in log market-to-book ratios to assess
    the impact of increased demand for green firms on firm valuations. The benchmark
    results are using actual log market-to-book ratios in 2019.
  37: "The paper develops a framework to quantitatively assess how different investors\
    \ contribute to incorporating information into prices and long-horizon expected\
    \ returns. It uses an asset demand system to measure how investors\u2019 demands\
    \ respond to characteristics. The paper also proposes constructing counterfactuals\
    \ to assess changes in investors\u2019 risk perception."
  38: Uses an estimated asset demand system to analyze the impact of trends in asset
    management and climate-related risks on firm valuations and investors' welfare;
    can be adopted to other characteristics, and can be applied to individual institutional
    investors as well as groups of institutions.
  48: The methodology involves panel regressions, potentially examining the impact
    of various factors (environmental, governance, sales) on certain outcomes. It
    mentions using Compustat and CRSP data. Applicable timeframes appear to be around
    2000-2019, based on mentioned variables.
  49: Analysis is performed on quarterly data from 2000 to 2019 using holdings data
    from FactSet and firm-level fundamentals from CRSP and Compustat. It examines
    how asset reallocation among investor types impacts market capitalization.
  50: Uses regression analysis with data from CRSP, Compustat, Sustainalytics and
    other sources to analyze relationships between firm characteristics (governance,
    environmental factors, sales, dividends) and market valuation.
  51: The analysis involves regression of log market-to-book ratios on characteristics
    and changes therein, using 2019 institutional demand curves re-activated to 2007
    conditions.
  52: Regression analysis of log market-to-book ratios on firm characteristics. Changes
    in market-to-book ratios are calculated in scenarios where institutions place
    more value on environmental scores. Characteristics are standardized cross-sectionally
    by year. Data is from the end of the year 2019.
  53: Equity holdings data are from FactSet. Share of ownership is the annual average
    by institution type. Holdings data are quarterly from FactSet from 2000 to 2019.
  54: Investment universes are computed for varying backward and forward windows.
    The first number measures the trailing window in years, and the second number
    the forward window in years. Baseline estimates are 3 years back and 0 years forward.
  57: Summary of demand curves by investor domicile, reporting weighted average of
    parameter estimates for each investor in that group. AUM-share weighted averages
    are computed for a given investor group and year, then averaged across years for
    a given investor group.
  60: Aggregate active share is calculated as the AUM weighted active share across
    all institutional investors. Active share is one-half times the sum of the absolute
    value of active weights. Active weights are portfolio weights minus market weights
    within the set of stocks held for each manager. Decomposition of the total change
    in active share is attributed to changes in latent demand, characteristics demand,
    and demand elasticities.
  61: Institutional demand curves in 2019 are re-activated so components of active
    share are the same as in 2007, using AUM share weighted log change for institutions.
  64: The analysis uses rolling regressions (60-month) of excess returns and merges
    data from CRSP, Compustat, FactSet, and Sustainalytics. The methodology also involves
    winsorizing data at certain levels.
  66: "The paper implements a shrinkage estimator by adding a ridge penalty to moment\
    \ conditions for investor behavior. It uses cross-validation to choose the shrinkage\
    \ parameter \u03BB, finding optimal values of 0.2 in the US and 0.3 in GB. Investors\
    \ with more than 750 observations do not receive shrinkage."
