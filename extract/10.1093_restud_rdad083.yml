Highlights:
  1: The analysis finds that increased demand for green firms benefits long-term investors,
    banks, and passive investment advisors at the expense of hedge funds and small-active
    investment advisors.
  3: Identifies characteristics important for valuation ratios and estimates an asset
    demand system revealing substantial heterogeneity in demand curves of institutional
    investors.
  5: Foreign investors lower the cost of capital for green firms in the US; different
    types of institutional investors have varying impact on ESG pricing across stocks.
  6: The trend towards passive investment management may lead hedge funds and small
    active advisors to underperform and strengthen the relationship between valuations
    and characteristics.
  8: The paper analyzes questions with policy relevance, such as the transition from
    active to passive management and the pricing of climate-related risks. It also
    improves upon earlier data through new information on institutional types, specifically
    identifying hedge funds.
  12: "The valuation impact of an investor depends on its size, heterogeneity in demand\
    \ elasticities, and differences in the investor\u2019s demand for characteristics\
    \ and latent demand."
  16: A few large firms account for a large portion of the total market capitalization.
    Profits are highly concentrated.
  22: Estimates are robust to varying the window used to determine the investment
    universe.
  23: Estimates of demand elasticity are robust to excluding hedge funds, and sets
    of estimates are highly correlated.
  24: "Firms\u2019 dividend policy responds to valuation ratios, but the estimate\
    \ of h1,k is relatively small, indicating that ignoring the endogeneity of a firm\u2019\
    s payout policy does not significantly affect the estimate of \u03B20,i."
  25: There is significant heterogeneity across investors, beyond institutional typ
    e.
  30: Small-active investment advisors and hedge funds are important for the pricing
    of governance in US markets.
  31: 'Small-active investment advisors: a one standard deviation change in the environmental
    index changes valuation ratios by 4%, which translates to 20bp per annum. The
    impact on expected returns would be larger if expected returns are persistent
    but not a random walk.'
  32: Latent demand and demand elasticities equally contribute to the reduction in
    the active share from 2007 to 2019, while portfolio tilts to characteristics increased
    the active share.
  36: A broad shift in investor preferences towards green firms has a larger impact
    on asset prices than a shift by only long-term investors (insurance companies
    and pension funds). Long-term investors, banks, and passive investors are the
    main beneficiaries of the transition, while hedge funds and active investors are
    exposed to climate-related transition risk.
  37: The paper develops a framework to conduct climate stress tests that could be
    useful for bank and insurance supervisors.
  38: "Foreign investors are particularly important for the valuation of green firms,\
    \ while small-active investment advisors for the valuation of well-governed firms;\
    \ hedge funds, per dollar of assets that they manage, have the largest impact\
    \ on prices; application can be used to develop \u201Cclimate-risk stress tests\u201D\
    \ for a broader set of climate-related risks."
