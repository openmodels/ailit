  34: "Source material here.\nAs demand becomes more elastic, investors allocate more\
    \ capital to stocks with low market capitalization relative to stocks with a high\
    \ market capitalization, all else equal. Taken together, these results imply that\
    \ if the trend from active to passive management continues, characteristics play\
    \ an increasingly important role in explaining valuation ratios. While a one-standard\
    \ deviation change in the environmental index increases valuation ratios by 23%\
    \ in 2019, this would reduce by 14% if investors are as active as in 2007. For\
    \ the entrenchment index, the response would reduce toward zero from -14% to -5=-14%+9%\
    \ per one standard deviation increase in the entrenchment index. If we re-activate\
    \ investors, the largest beneficiaries are small-active investment advisors, who\
    \ experience a 6.9% increase... and hedge funds, who experience a 14.1% increase.\
    \ In Table 7, we report the impact on firm valuations by regressing mbt(n), in\
    \ the first column, and the change, mbCFt (n) \u2212mbt (n), in the second column,\
    \ on firm characteristics in the last quarter of 2019. We find that re-activating\
    \ investors shifts the coefficients on both the environmental and governance characteristics\
    \ closer to zero. Taken together, these results imply that if the trend from active\
    \ to passive management continues, characteristics play an increasingly important\
    \ role in explaining valuation ratios. This implies that if the trend of the last\
    \ four decades continues, and the activeness of institutional investors declines\
    \ even further, hedge funds and small-active investment advisors would underperform\
    \ relative to the other investors.\n"
  35: Source material here.
  36: "Source material: In Table 8, we show the impact on firm valuations. The first\
    \ column shows the benchmark results using the actual log market-to-book ratios\
    \ in 2019. In the second and third columns we report results from regressions\
    \ with changes in log market-to-book, mbCFt (n)\u2212mbt (n) in each of the two\
    \ counterfactuals. The second column reports the stakeholder risk counterfactual\
    \ in which all investors increase their demand for green firms. The third column\
    \ reports the regulatory risk counterfactual in which insurance companies and\
    \ pension funds only increase their demand for green firms. In the stakeholder\
    \ risk counterfactual, the coefficient increases by 0.57 from its original value\
    \ of 0.23, which is a large effect. If only long-term investors shift their demand,\
    \ and thus a smaller group of investors is impacted, the effect is much smaller\
    \ and the coefficient increases by 0.03 from 0.23. These calculations imply that\
    \ one could potentially regulate insurance companies without much of an impact\
    \ on asset prices, yet it may have important financial stability advantages in\
    \ the insurance sector. The two counterfactuals are essentially scaled versions\
    \ of each other, where the regulatory risk of long-term investors is much less\
    \ consequential compared to a broad shift in preferences. The main beneficiaries\
    \ of the transition are long-term investors, banks, and passive investors. Those\
    \ exposed to climate-related transition risk are hedge funds and active investors."
  37: "VIII.C. We have thus far focused on a particular form of regulatory risk and\
    \ on stakeholder risk. Another extension could be to model the expected impact\
    \ of physical damages and the uncertainty surrounding it. In the presence of a\
    \ carbon tax, the regulatory framework of banks and insurance companies may also\
    \ be adjusted to align with the tax incentives. This would amplify the impact\
    \ of a carbon tax.\n\nOne interesting extension is to model the impact of a carbon\
    \ tax on firm valuations and investors. As detailed data on carbon emissions are\
    \ available for a large number of firms, we can adjust profits for a given carbon\
    \ tax policy.\n\nBy simultaneously adjusting characteristics and asset demand,\
    \ we can develop a comprehensive framework to conduct \u201Cclimate stress tests\u201D\
    \ that could be useful for, for instance, bank and insurance supervisors across\
    \ the world who are currently exploring such questions.\n\nIX. Conclusion We develop\
    \ a framework to quantitatively assess how much different investors contribute\
    \ to incorporating information into prices and long-horizon expected returns.\
    \ Our framework allows economists to put numbers on narratives that explain patterns\
    \ in prices and characteristics using different groups of investors.\n\nWe show\
    \ that a small set of characteristics explains more than half of the cross-sectional\
    \ variation in valuation ratios in a panel of countries. The same characteristics\
    \ also predict future profitability with comparable coefficients. To measure how\
    \ investors\u2019 demands respond to the characteristics, we estimate an asset\
    \ demand system."
  38: "We find that hedge funds, per dollar of assets that they manage, have the largest\
    \ impact on prices. For the pricing of characteristics, we focus on how investors\
    \ price environmental and governance characteristics. We find that foreign investors\
    \ are particularly important for the valuation of green firms, while small-active\
    \ investment advisors for the valuation of well-governed firms. Our methodology\
    \ can easily be adopted to other characteristics, and can be applied to individual\
    \ institutional investors as well as groups of institutions. We use the estimated\
    \ asset demand system to analyze the impact of two key trends in the asset management\
    \ industry on firm valuations and investors\u2019 welfare. First, we study the\
    \ transition from active to passive management. Second, we analyze how climate-related\
    \ risks, either due to changes in regulation or changes stakeholders\u2019 preferences,\
    \ affect asset prices and investors\u2019 welfare. We discuss how the second application\
    \ can be used to develop \u201Cclimate-risk stress tests\u201D for a broader set\
    \ of climate-related risks."
