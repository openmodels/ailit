sourcematerial:
  1: "yaml\n\"Evaluation overview\": \"We develop a new framework to quantitatively\
    \ connect valuations, exp ected returns, and characteristics to the demands of\
    \ institutional investors and households.\"\n\"Drivers of Risk\": \"Second, we\
    \ use our mo del to assess climate-related risks and find that increased demand\
    \ for green firms would b enefit long- term investors, banks, and passive investment\
    \ advisors at the exp ense of hedge funds and small-active investment advisors.\"\
    \n\"Methodology\": \"Using investor-level holdings data, we estimate asset demand\
    \ as a function of prices and characteristics and quantify how p ortfolio tilts\
    \ across investors affects firm\u2019s valuation ratios. The characteristics include\
    \ environmental and governance measures, as well as traditional risk and return\
    \ characteristics.\"\n\"Highlights\": \"climate-related risks and find that increased\
    \ demand for green firms would b enefit long- term investors, banks, and passive\
    \ investment advisors at the exp ense of hedge funds and small-active investment\
    \ advisors.\"\n"
  3: "Source material here: We first estimate a cross-sectional valuation regression\
    \ and show that eight characteristics related to risk, pro ductivity, profitability,\
    \ and ESG measures2 explain over half of the cross-sectional variation in valuation\
    \ ratios. We estimate the mo del using quarterly US data from 2000 to 2019. Having\
    \ identified characteristics that are imp ortant for valuation ratios, we estimate\
    \ an asset demand system in which investors\u2019 demand curves are a function\
    \ of prices, character- istics, and latent demand... our estimates reveal substantial\
    \ heterogeneity in demand curves of institutional investors b oth within and across\
    \ groups (e.g. hedge funds, mutual funds, and broker dealers), with significant\
    \ deviations from the market. We use the environmental score from Sustainalytics\
    \ and an entrenchment index from Bebchuk, Cohen, and Ferrell (2009) as our environmental\
    \ and governance measures."
  5: " \nscaled by the initial value of the aggregate stock market. ... we ask by\
    \ what percent does the average stock price move if we take BlackRock\u2019s assets\
    \ and redistribute these assets to all other institutional investors.\n\nTo understand\
    \ how much different investors matter the pricing of firm characteristics, we\
    \ re-estimate the cross-sectional valuation regression using the counterfactual\
    \ prices and document how the regression coefficients and residuals change. We\
    \ consider the pricing of the environmental index as an example. The baseline\
    \ coefficient implies that a one standard deviation increase in the index leads\
    \ to a 17% increase in valuations. This number would drop to 14% if we reallocate\
    \ assets from foreign investors, while it would increase to 21% if we reallocate\
    \ assets from small-active investment advisors to the other institutional investors.\n\
    \nThus, the estimates imply that foreign investors help to lower the cost of capital\
    \ for green firms in the US, conditional on the other characteristics. This example\
    \ illustrates how our methodology contributes to the active ESG research agenda\
    \ by showing which investors matter for the pricing of ESG scores in the cross\
    \ section of stocks.\n"
  6: "yaml\nEvaluation overview: \"We then use our framework to address two broader\
    \ questions that relate to p olicy. First, we analyze how firm valuations and\
    \ investors\u2019 welfare are affected by the transition from active to passive\
    \ management... Our second application is motivated by the observation that investors\
    \ and regulators are increasingly concerned ab out the impact of climate-related\
    \ risks on asset prices, investors\u2019 welfare, and overall financial stability.\"\
    \nDrivers of Risk: \"Our second application is motivated by the observation that\
    \ investors and regulators are increasingly concerned ab out the impact of climate-related\
    \ risks on asset prices, investors\u2019 welfare, and overall financial stability.\
    \ Quantifying such effects is challenging, in part b ecause of the different dimensions\
    \ of risk such as physical damages, p olicy and regulatory risks, and shifts in\
    \ preferences, among others.\"\nQuantitative material: \"First, the aggregate\
    \ active share across insti- tutional investors drops from 45% in the early 1980s\
    \ to a little over 25% at the end of our sample in 2019.\"\nMethodology: \"Second,\
    \ we use the estimated demand system to understand how investors b ecame more\
    \ passive.\"\nHighlights: \"These calculations imply that if the trend from active\
    \ to passive management continues, hedge funds and small active investment advisors\
    \ would underp erform relative to other institutions. In addition, it would strengthen\
    \ the relation b etween valuations and characteristics.\"\nMore Notes: \"While\
    \ a comprehensive analysis of all risks is b eyond the scop e of this pap er,\
    \ we can use our framework to quantify two key dimensions of climate-...\"\n"
  8: 'We present a simple model to illustrate how we can measure the importance of
    various investors in the price formation process. [...] The model also motivates
    the empirical strategy that we follow in subsequent sections.


    We consider a two-period model with time indexed by t = 0,1. [...] Investors have
    constant absolute risk aversion (CARA) preferences over wealth at time 1, [...]


    Third, we use our methodology to analyze questions with policy relevance, such
    as the transition from active to passive management and the pricing of climate-related
    risks.


    Lastly, we improve upon the earlier data through new information on institutional
    types. In particular, our classification identifies hedge funds who play an important
    role in the analysis.'
  9: "Source material here: The optimization is subject to the intra-period budget\
    \ constraint... We could extend the model of investor preferences to directly\
    \ add a \u201Ctaste\u201D for characteristics...This model extension can be particularly\
    \ fitting for characteristics that capture a firm\u2019s impact on the environment...Empirically,\
    \ however, we cannot tell using holdings data whether investors\u2019 demand for\
