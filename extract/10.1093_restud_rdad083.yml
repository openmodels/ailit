  21: "Source material here.\nThe paper proposes an alternative econometric strategy\
    \ by augmenting the standard GMM moment conditions derived from (15) with a ridge\
    \ penalty (Hoerl and Kennard 1970). We provide the main intuition here and leave\
    \ the details of the estimation procedure, including a fast numerical procedure\
    \ to implement the estimator, for Appendix C. To estimate the model, we use quarterly\
    \ data.\nA ridge estimator shrinks the estimated coefficients of an investor\u2019\
    s demand curve towards a target by adding a quadratic penalty to the objective\
    \ that is minimized by the estimator. 16 We therefore need to choose a shrinkage\
    \ target and how much shrinkage to apply.\n"
  22: "\nQuantitative material: The cross-validation pro cedure selects \u03BB = 120\
    \ and \u03BE = 0.7.\nMethodology: First, we assume the existence of an investment\
    \ universe that can b e measured using the sto cks an investor holds at any p\
    \ oint during the last three years. ... We determine the shrinkage parameter using\
    \ cross-validation, as is common practice in the machine learning literature.\
    \ We split the holdings randomly in half for each investor by year. We then estimate\
    \ the mo del on one sample for each investor and compute the mean-squared error\
    \ on the left out sample. ... More precisely, we consider a window [ tB , tF ],\
    \ where tB is the numb er of years back, including the current year, and tF are\
    \ the numb er of years forward. ... In Figure 3, we consider windows lo oking\
    \ back as far as 5 years and ahead as far as 5 years.\nHighlights: We now show\
    \ that our estimates are robust to varying the window, b oth back in time and\
    \ into the future.\nMore Notes: We make two imp ortant identifying assumptions\
    \ in estimating the asset demand system. First, we assume the existence of an\
    \ investment universe that can b e measured using the sto cks an investor holds\
    \ at any p oint during the last three years. Second, we assume that latent demand\
    \ is exogenous to the characteristics, which rules out that characteristics de-\
    \ p end on prices. We now explore the robustness of our demand elasticity estimates\
    \ to those assumptions and discuss p otential threats to identification.\n"
