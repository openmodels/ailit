  11: "Source material here.\nEvaluation overview: \"FEWCalc results show that in\
    \ this area, given current cost and electricity pricing, solar is only profitable\
    \ with tax incentives and depreciation. In Kansas, the capital costs of solar\
    \ energy... challenging to recover given local solar radiance and electricity\
    \ prices... In some cases, this makes solar a very useful addition to a given\
    \ system despite the challenges of individual profitability.\"\n\nDrivers of Risk:\
    \ \"As noted previously, an advantage of solar is that it is plentiful on hot\
    \ summer days when wind velocities are low and electricity demand increases, largely\
    \ due to increased use of air conditioning.\"\n\nMethodology: \"FEWCalc illustrates\
    \ how complicated and interacting systems, as they face new opportunities and\
    \ challenges \u2014 in this case renewable energy, water scarcity, evolving technical\
    \ innovations, can be assembled into a reasonably realistic, interesting to manipulate,\
    \ and educational graphical interface. Agent-based modeling using the freeware\
    \ NetLogo is relatively simple yet flexible enough to perform calculations...\
    \ and integrate results from a separate program \u2014 in this case DSSAT for\
    \ agricultural production, water demand, and fertilizer application.\"\n\nHighlights:\
    \ \"Renewable wind energy development in this area was shown to potentially provide\
    \ economic opportunities profitable enough to balance farming difficulties and\
    \ enable the persistence of agricultural production in the region... Solar is\
    \ included in FEWCalc to provide this logistical advantage of solar energy and\
    \ because tax incentives and even a slight reduction in the price of solar panels\
    \ could make it a profitable alternative.\"\n\nMore Notes: \"FEWCalc's interface\
    \ shows the clear connection between current decisions and long-term, interdependent,\
    \ and interdisciplinary consequences... This presentation of information can facilitate\
    \ discussion across disciplinary boundaries and between scientists and non-technical\
    \ stakeholders... Studies of how local stakeholders use FEWCalc can help researchers\
    \ gain insight into local values, which will give local stakeholders an implicit\
    \ voice in scenario development.\"\n"
