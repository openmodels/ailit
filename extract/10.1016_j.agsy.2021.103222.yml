Evaluation overview:
  1: Farm incomes
  5: The page provides an overview of crop production and income, focusing on the
    impact of projected climate conditions on these outcomes.
  6: This paper evaluates crop yields and irrigation water demand for corn, wheat,
    and grain sorghum under both irrigated and non-irrigated conditions.
  8: The paper evaluates the impact of different climate scenarios on crop production
    and farm income over time, with a focus on dryland versus irrigated farming.
  10: The study evaluates the impact of climate change scenarios on agricultural performance
    (crop yield and farm income) and renewable energy development in Finney County,
    Kansas.
  11: Crop production, farm income, groundwater-level change, and nutrient loading
    of surface-water bodies.
Highlights:
  1: FEWCalc projects farm incomes based on crop selection, irrigation practices,
    groundwater availability, renewable energy investment, and environmental conditions;
    FEWCalc enables users to relate current choices to near- to long-term implications;
    FEWCalc bridges the gap between Integrated Assessment (IA) and Impacts, Adaptation,
    and Vulnerability (IAV).
  5: The analysis emphasizes the use of historical and GCM-simulated scenarios to
    assess potential future climate impacts on crop yields and income.
  6: Historical and simulated data appear to track similarly across most graphs, suggesting
    the model has some validation. Crop yields and irrigation demands are correlated
    to drought. Crop insurance can help mitigate losses.
  8: Scenario 3, the drier future scenario, is the only one resulting in commercially
    successful agriculture. Renewable energy contributes significantly to farm income
    in all scenarios.
  10: Climate change predictions necessitate technology changes to maintain crop production.
    Annual variability makes discerning long-term trends difficult. Wind power is
    generally profitable due to high wind capacity and a 30-year lifespan. Without
    climate change mitigation, some scenarios lead to transitions from irrigated to
    dryland farming. Energy production from renewable energy sources partially offsets
    losses from agriculture.
  11: FEWCalc illustrates major input variables relevant to renewable energy development
    and how local economic impact can be evaluated and projected; renewable wind energy
    development was shown to potentially provide economic opportunities; solar is
    only profitable with tax incentives and depreciation; FEWCalc can facilitate discussion
    across disciplinary boundaries.
  13: Consequences of climate change on food-energy-water systems in arid regions
    are analyzed without agricultural adaptation using FEWCalc and DSSAT.
Methodology:
  1: Uses the FEWCalc freeware agent-based model which integrates DSSAT model outputs
    with user-defined parameters (energy, water) to project farm incomes. Applied
    to Finney County, Kansas.
  5: Analysis uses DSSAT simulations based on climate scenarios ranging from historical
    patterns to GCM-simulated RCP8.5 projections, focusing on crop production and
    income.
  6: The analysis compares DSSAT simulations with historical data from Kansas State
    University and the Kansas Department of Agriculture between 2008 and 2017. The
    FEWCalc model is also used to calculate the effects of renewable energy production,
    crop insurance and energy net income on farmer income.
  8: The analysis is performed using simulations of repeated historical weather patterns
    and scenario-based climate projections using the FEWCalc tool.
  10: The analysis uses FEWCalc, a model developed to assess the impact of climate
    scenarios on food, energy, and water (FEW) systems. DSSAT is used for agricultural
    simulations. The scenarios cover a 60-year period (2008-2067). The discount rate
    used for NPV calculation is 3.25%.
  11: FEWCalc (a decision support tool) integrates information from agriculture, energy,
    water supply, water quality, climate change, and economics using agent-based modeling
    with NetLogo and DSSAT for agricultural production.
  13: The analysis is conducted using a coupled simulation of DSSAT and agent-based
    modeling to evaluate the use of water and renewable energy in agricultural areas.
More Notes:
  1: The study analyzes the interrelated food, energy, water, and climate systems
    to evaluate consequences of choices currently available to farmers and resource
    managers.
  6: The paper considers farmer-owned renewable energy production and its effect on
    income and electricity sales.
  10: The scenarios do not include changes in technology, crop management, crop prices,
    or energy production, focusing solely on climate and market-related pressures.
    The study region is the semi-arid region around Garden City, Kansas.
  11: FEWCalc is applicable directly to farmers in arid regions of the middle part
    of the USA interested in alternative income sources; applicability to other regions
    requires local data, development of a DSSAT model, and adjustment of the FEWCalc
    input variable values.
Quantitative material:
  1: Farm incomes are projected based on crop selection, irrigation practices, groundwater
