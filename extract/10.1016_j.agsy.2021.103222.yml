Drivers of Risk:
  1: Climate change influencing farm economics and agricultural productivity
  2: The study identifies climate change and water resource limitations as key drivers
    impacting agricultural production and farm income.
  3: Climate, weather, hydrology, politics, energy, and economics interact and impact
    outcomes across multiple scales, including aquifer depletion, water degradation,
    and changes to climate due to GHG.
  4: Changes in air temperature, precipitation, and solar radiation impacting agricultural
    outputs under various scenarios including historical wet and dry periods and future
    climate projections.
  5: Weather and climate variability, such as temperature and precipitation changes,
    impact crop productivity and associated economic outcomes.
  6: Shocks impacting outcomes include climate variability, specifically drought conditions
    as indicated by the Palmer Drought Severity Index (PDSI).
  8: Shifts in precipitation patterns, groundwater depletion, and increasing temperatures
    are key drivers of changes in agricultural productivity and viability.
  9: Scenarios include changes in precipitation patterns with conditions of increased
    rainfall and decreased precipitation impacting water and agriculture.
  10: Differences in climate scenarios such as wetter or drier future conditions are
    impacting agricultural productivity and income.
  11: Summer temperatures increase electricity demand due to air conditioning, impacting
    the viability of solar energy.
Evaluation overview:
  1: No relevant information
  2: The paper evaluates local farmer choices of crops and renewable energy investments
    considering water resource limitations and climate change, focusing on agricultural
    and renewable-energy production, farm income, and water availability and quality.
  3: The study focuses on farm income and productivity in STAR communities influenced
    by national initiatives and policies in the food, energy, and water nexus.
  4: The paper evaluates the impact of different climate scenarios on crop production
    and economic well-being of farmers using the FEWCalc model in Finney County, Kansas.
  5: The paper evaluates agricultural crop production, specifically examining crop
    income after variable costs for various crops in Kansas over projected climate
    conditions.
  6: The paper evaluates the impact of different irrigation practices on crop yields
    of maize, wheat, and grain sorghum in Kansas from 2008 to 2017.
  8: The analysis evaluates agricultural productivity and net income under various
    climate scenarios, examining both irrigated and dryland farming.
  9: The paper provides an overview of agricultural productivity, net income, groundwater
    irrigation, and energy production across different climate scenarios.
  10: The page provides an overview of outcomes related to agricultural productivity
    and income under different climate scenarios, focusing on net income variations
    and crop insurance claims.
  11: FEWCalc provides a framework to evaluate economic opportunities from renewable
    energy development and its interplay with agricultural production, particularly
    in arid regions.
Highlights:
  1: FEWCalc bridges Integrated Assessment and Impact, Adaptation, and Vulnerability
    perspectives for evaluating agricultural systems
  2: Notably, only the 'Drier Future' scenario was found to be commercially profitable
    due to reduced expenses from dryland farming, despite the income loss from low
    crop production being offset by the energy sector income and crop insurance.
  3: FEWCalc aims to bridge research themes of Integrated Assessment and Impacts,
    Adaptation, and Vulnerability to support carbon emission mitigation and address
    needs like engaging diverse stakeholders and developing system-wide measures.
  4: Scenario 4 uses projected climate data from 20 downscaled General Circulation
    Models for future projections with resulting impacts on crop productivity under
    RCP 4.5 and 8.5.
  5: Scenario analysis predicts varying outcomes for crop income and productivity
    based on different projected climate conditions, including historical repetition
    and changes based on GCM outputs.
  6: The detailed visualization illustrates the relationship between drought conditions,
    irrigation practices, and crop yields.
  8: Scenario 3, with a drier future, is the only commercially successful scenario
    for agriculture. Scenario 4, representing RCP 8.5, shows decreased crop production
    and reduced net income.
  9: Scenarios show differentiated impacts on agriculture and water resources, highlighting
    sensitivity to changes in rainfall and environmental conditions.
  10: Under dryland farming, net income varies significantly with climate scenarios,
    showing potential losses in drier futures and gains in scenarios incorporating
    climate model predictions.
  11: FEWCalc identifies wind and solar energy's potential economic benefits for agricultural
    persistence, and how tax incentives can aid solar energy profitability.
Methodology:
  1: Analysis using FEWCalc freeware, projecting farm income based on crop selection,
    irrigation, groundwater, renewable energy, and climate conditions
  2: The analysis uses DSSAT with added arid region dynamics to simulate crop production
    and irrigation demand, with FEWCalc simulating agricultural and energy production,
    based on climate scenarios and groundwater-supported irrigation.
  3: The FEWCalc model uses an agent-based approach via NetLogo to simulate complex
    real-world systems and explore future policy decisions, especially in agriculture,
    energy, and water contexts.
  4: Utilizes DSSAT and FEWCalc models with historical and projected climate data
    to simulate and evaluate agricultural outcomes over 60-year periods.
  5: The DSSAT model is used for simulating climate conditions and crop production
    over a 50-year projection period following a historical base period from 2008
    to 2017.
  6: The analysis uses DSSAT simulations and historical data comparison for evaluating
    crop yields and irrigation demand, applicable to the time period 2008 to 2017.
  8: The analysis is performed using FEWCalc and DSSAT models, simulating crop production
    and economic outcomes under repeated historical weather patterns and future climate
    scenarios.
  9: Analysis conducted through climate scenarios including historical repeats, wetter
    futures, drier futures, and climate model projections.
  10: FEWCalc simulation is used to analyze impacts over a 60-year period from 2008
    to 2067, considering renewable energy development and agricultural performance
    under potential future climate scenarios.
  11: FEWCalc uses agent-based modeling with NetLogo to integrate data on energy,
    water, agriculture, and climate; specific to the middle USA with local data and
    the DSSAT model.
More Notes:
  1: No relevant information
  4: The page discusses the use of historical data from 2008 to 2017 and its integration
    into future scenario development to evaluate agricultural impacts.
  5: Crops evaluated include corn, winter wheat, soybeans, and grain sorghum, using
    the base period to define wet, dry, and average climate years for future projections.
  10: The analysis assumes no changes in technology, crop management, price, or energy
    production beyond current scenarios.
  11: The tool facilitates interdisciplinary dialogue, helps local stakeholders with
    decision-making, and is adaptable to other regions with sufficient data.
Quantitative material:
  1: No relevant information
  4: Water-level declines in the High Plains Aquifer, particularly in Finney County,
    range from 25 to more than 150 feet between 1950 and 2013.
  5: "The analysis involves simulations considering different scenarios, such as repeat\
    \ historical conditions, wetter/drier futures, and GCM-simulated scenarios for\
    \ the 2018\u20132067 period."
  6: Quantitative data includes crop yield for irrigated and non-irrigated practices,
    and trends in irrigation water demand, with historical and simulated results compared
    using DSSAT.
  8: Quantitative information includes specific farm net income figures, such as an
    annual average of US$6818 for the drier scenario and US$48,003 for the RCP 8.5
    scenario.
  9: Graphs illustrate variability in crop production, net income, and groundwater
    levels across scenarios, but specific quantitative results like percent changes
    are not detailed in the text.
  10: The page includes quantitative information in tabular format, such as average
    annual crop yield and net income under different scenarios, notably Scenario 1
    (Repeat Historical) to Scenario 4 (Climate Models).
sourcematerial:
  1: "Relating agriculture, energy, and water decisions to farm incomes and climate\
    \ projections using two freeware programs, FEWCalc and DSSAT\n\nCONTEXT: The larger\
    \ scale perspective of Integrated Assessment (IA) and smaller scale perspective\
    \ of Impacts, Adaptation, and Vulnerability (IAV) need to be bridged to design\
    \ long-term solutions to agricultural problems that threaten agricultural production...\
    \ FEWCalc...is used to analyze the interrelated food, energy, water, and climate\
    \ systems of Finney County, Kansas to evaluate consequences of choices currently\
    \ available to farmers and resource managers. \n\nABSTRACT:...FEWCalc...has the\
    \ novel ability to project farm incomes based on crop selection, irrigation practices,\
    \ groundwater availability, renewable energy investment, and historical and projected\
    \ environmental conditions. \n\nHIGHLIGHTS:\n- ABM adds renewable-energy, water\
    \ quantity and quality, climate change, and farm economics. \n- FEWCalc enables\
    \ users to relate current choices to near- to long-term implications. \n\nFrom\
    \ the infographic detailing the FEWCalc tool:\n- FEWCalc Calculation: Conversion\
    \ to resources: food, energy, and water (FEW). \n- FEWCalc addresses complex resource\
    \ connections and interactions, aiding in informed decision-making for policymakers.\
    \ \n"
  2: 'Source material: OBJECTIVE: This article aims to evaluate local farmer choices
    of crops and renewable energy investment in the face of water resource limitations
    and global climate change. Metrics of the analysis include agricultural and renewable-energy
    production, farm income, and water availability and quality. Climate change is
    apparent through surface rising temperatures and historically extreme weather
    conditions that are becoming more frequent (Campbell, 2020; Lesk et al., 2016).
    Climate-change driven increases in water and food insecurity pose emerging and
    long-term challenges. METHODS: Data derived from publicly available sources are
    used to support user-specified FEWCalc input values. DSSAT (Decision Support System
    for Agrotechnology Transfer) with added arid-region dynamics is used to obtain
    simulated crop production and irrigation water demand for FEWCalc. Here, FEWCalc
    is used to simulate agricultural and energy production and farm income based on
    continuation of recent ranges of crop prices, farm expenses, and crop insurance;
    continuation of recent renewable-energy economics and government incentives; one
    of four climate scenarios, including General Circulation Model projections for
    Representative Concentration Pathway 8.5; and groundwater-supported irrigation
    and its limitations. RESULTS AND CONCLUSIONS: A 50-year (2018-2067) climate and
    groundwater availability projection process indicates possible trends of future
    crop yield, water utility, and farm income. ... However, surprisingly, the simulations
    suggest that only the Drier Future scenario is commercially profitable, and this
    is because of reduced expenses for dryland farming. Although simulated income
    losses due to low crop production are ameliorated by the energy sector income
    and crop insurance, the simulation under climate change still produces the worst
    annual total income.'
  3: 'Source material here.

    - "Farm income, as a major income in STAR communities, can be affected by these
    policies."

    - "Climate, weather, hydrology, politics, energy, and economics are all important
    and interact across multiple societal scales, including jurisdictional, institutional,
    and managerial ones..."

    - "The FEWCalc model can be thought of as addressing three key needs identified
    by Vervoort et al. (2014): (1) engage diverse stakeholders across multiple levels;
    (2) move beyond analysis of single interventions toward system-wide measures ...
    (3) develop long-term capacity for collaborative decision making."

    - "FEWCalc is an agent-based model (ABM) constructed using NetLogo... designed
    to integrate complex real-world systems and evaluate future policy decisions."

    '
  4: 'Source material here.

    1. Evaluation overview: "The region''s potential to develop renewable energy,
    its declining water resources, and its rich, 70-year-long time series of historical
    data makes it an ideal candidate for exploring opportunities to sustain farmers''
    economic well-being under alternative agricultural and energy production choices
    using FEWCalc."

    2. Drivers of Risk: "Scenario 4 uses DSSAT results in which runs use projected
    air temperature, precipitation, and solar radiation from 20 downscaled GCMs to
    represent years 2008 to 2067."

    3. Quantitative material: "The High Plains aquifer (HPA) consists of the Ogallala
    aquifer and its overlying aquifer units. The area''s water problems are typical
    of arid agricultural regions around the world: Large-scale irrigation over many
    decades has depleted groundwater resources and produced now dry irrigation wells."

    4. Methodology: "DSSAT is then executed to provide input needed for FEWCalc via
    files in a comma-separated values format (CSV files)... The four 60-year long
    scenarios used to demonstrate FEWCalc are Fig. 2. Scenario 4 uses DSSAT results
    in which runs use projected air temperature, precipitation, and solar radiation
    from 20 downscaled GCMs to represent years 2008 to 2067."

    5. Highlights: "FEWCalc results using the RCP 4.5 and 8.5 scenarios are compared
    in Phetheet et al. (2021). Results from the more severe RCP 8.5 are presented
    in this article."

    6. More Notes: "A 10-year period from 2008 to 2017 is used as the historical base
    period for this work. This variability is used to create future climate scenarios."

    '
  5: "Source material here.\nRevenue from crop production is the product of crop output\
    \ and price per acre...Therefore, net farm income from crop production is the\
    \ difference between gross revenue from crop production less total variable costs.\n\
    While production variability may be attributed to weather and other production\
    \ vicissitudes, price variability is driven by global market conditions and trade\
    \ and other policies (USDA, 2020).\nSimulation scenarios used to represent climate\
    \ conditions in DSSAT for the 50-year projection period (2018-2067) that follows\
    \ the 2008\u20132017 historical base period in the FEWCalc simulations.\nDSSAT\
    \ simulations are conducted using a one-day time step. Results are accumulated\
    \ to produce annual results for FEWCalc.\nFor Scenarios 2 and 3, the base period\
    \ is used to define 10 sets of annual climate and crop-price data and selections\
    \ are made from this 10-member set (with replacement) to create wetter and drier\
    \ futures.\nThe crops commonly produced in Kansas are corn, winter wheat, soybeans,\
    \ and grain sorghum, all of which FEWCalc incorporates into the simulations (Table\
    \ A.2). The FEWCalc base period (2008\u20132017), has three wet, three dry, and\
    \ four average years, and is used to create projected climate conditions...\n"
