  8: 'Source material here.

    Evaluation overview: "In Scenario 1, simulated crop yields for corn and sorghum
    decline during dry periods (Fig. 4). However, wheat yield remains stable for most
    simulation years." "All scenarios, in turn, have projected positive net incomes
    and post positive net present value (NPV) using a discount rate of 3.25% for the
    total farm investment (Table 3)."

    Drivers of Risk: "Crop yields decline after switching from irrigated to dryland
    cultivation." "The increased irrigation required in drier years accelerates the
    decline in groundwater levels, and FEWCalc resorts to dryland DSSAT simulations
    in year 46 (2053)."

    Quantitative material: "Potential crop price increases caused by reduced production
    in a drier future are not simulated, and could affect farm profitability and food
    availability." "In Scenario 4, farm income with energy sector profit is US $116,142,
    with an NPV of US$3.1 M. Scenario 4, in contrast, produces the worst average annual
    total revenue of US$48,003, with an NPV of US $1.6 M."

    Methodology: "Six ten-year long base periods of precipitation, temperature, and
    crop prices are repeated consecutively to create the 60-year FEWCalc simulation."
    "Results show a large increase in net income for all three crops after shifting
    to dryland farming as costs decline more than income."

    Highlights: "In Scenario 3, the Drier Future, irrigated corn performed better
    than other crops, whereas wheat production is low and remains stable." "All scenarios,
    in turn, have projected positive net incomes and post positive net present value
    (NPV) using a discount rate of 3.25% for the total farm investment (Table 3)."

    '
