  5: "yaml\nEvaluation overview: \"Compared to a no-climate-change scenario, the estimated\
    \ median reduction in GDP per capita around 2050 for the four country groups ranges\
    \ between 11% and 14% for the 1.5\u25E6C pathway, between 14% and 17% for the\
    \ BE33 scenario, and between 17% and 20% reduction for the baseline pathway of\
    \ the current NDCs.\"\nDrivers of Risk: \"2100 GMSLR projections under the NDC\
    \ reference scenario yield a median of around 64 cm...The increase in the high-end\
    \ tail is most pronounced under this [NDC] scenario with 10% of the land area\
    \ experiencing increases in TXx of over 4\xB0C above the 1986\u20132005 levels.\"\
    \nQuantitative material: \"Figure 3 shows the changes in the hottest day in a\
    \ year (TXx) with respect to 1986\u20132005 levels for each scenario...In 2100,\
    \ the median projections of damages to GDP per capita range between 29% and 34%\
    \ for the 1.5\xB0C pathway, between 43% and 50%...If major emitters increased\
    \ their NDC ambition by 33% (BE33), 2100 GMSLR would be around 10 cm lower.\"\n\
    Methodology: \"Scenarios in which emission reductions are limited to big emitters\
    \ only lead to higher warming levels...Then we apply the median downscaling factor\
    \ of each model (see Supplement Fig. S1) to the GMT differences of the selected\
    \ scenarios to get local changes in GMT.\"\nHighlights: \"None of the increased\
    \ ambition pathways considered here limit median warming to 1.5\xB0C by 2100...When\
    \ looking beyond 2100, the sea-level rise implications of these selected scenarios\
    \ become more pronounced.\"\n"
