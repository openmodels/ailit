    \ et al.: Incremental improvements of 2030 targets insuf\uFB01cient for Paris\
    \ Agreement\nFigure 3. Changes in hot extremes (TXx) in the period 2081\u2013\
    2100 relative to 1986\u20132006 for the NDC scenario (red), the BE33 scenario\n\
    (yellow) and the 1.5\u25E6C scenario (cyan). Changes are presented as land area\
    \ fraction (y  axis) affected by changes in TXx (x  axis) for 26\nworld regions\
    \ and globally. Cumulative distributions are based on an area-weighted aggregation\
    \ of all TXx change values projected at grid\ncells within a region and across\
    \ climate models. A vertical dashed grey line indicates TXx changes of 2\u25E6\
    C. The asterisks and the horizontal\nlines going from the 2\u25E6C line to the\
    \ lefty  axis show the land fraction that is affected by an increase in TXx of\
    \ at least 2\u25E6C.\nFigure 4. Economic damages under different scenarios of\
    \ GMT increase. The boxplots contain estimates for different GCMs, and show the\n\
