    a33%changeinNDCsofbigemittersanda1.5\u25E6Cpathway)andGDPpercapitaunderano-climate-changescenario.Thelowerandupper\n\
    hinges correspond to the \uFB01rst and third quartiles (the 25th and 75th percentiles).\
    \ The upper whisker extends from the hinge to the highest\nvalue that is within\
    \ 1.5 times the interquartile range of the hinge. Estimates are given for mid\
    \ century (2046\u20132065) and end of century\n(2081\u20132100).Countriesaregroupedbyeithergeographicalregions(SouthAsiaandLatinAmerica)orpoliticalgroupingsfollowingtheUN\n\
    classi\uFB01cations (Small Island Development States, SIDS, and Least Developed\
    \ Countries, LDCs).\nEarth Syst. Dynam., 11, 697\u2013708, 2020              \
    \                                                 https://doi.org/10.5194/esd-11-697-2020\n\
    ===\nThe image is a global map highlighting various regions, each overlaid with\
    \ a small graph. These graphs illustrate the probability of occurrence related\
    \ to temperature changes (\u0394Txx) in Kelvin (K).\n\nHere's a detailed breakdown:\n\
    \n1. **Global Regions**: The world map is divided into several distinctive regions,\
    \ each shaded in different colors for easy distinction. Each region is labeled\
    \ with an abbreviation representing the area, such as ALA, NEU, CEU, MED, WAF,\
    \ etc.\n\n2. **Graphs**: Each region contains a small graph with three different\
    \ colored curves:\n   - **Red Curve**: Indicates observations under \"NDC\" (Nationally\
    \ Determined Contributions).\n   - **Blue Curve**: Represents \"1.5\xB0C\" scenario\
    \ impacts.\n   - **Orange Curve**: Denotes \"BECCS\" (Bioenergy with Carbon Capture\
    \ and Storage) scenario effects.\n\n3. **Axes**:\n   - **X-Axis**: Represents\
    \ temperature change (\u0394Txx) in Kelvin, ranging from -2K to 3K.\n   - **Y-Axis**:\
    \ Shows the probability of occurrence in percentage from 0% to 5%.\n\n4. **Global\
    \ Graph**: At the bottom, there is an overarching global graph summarizing the\
    \ data across all regions. It follows the same color scheme and structure.\n\n\
    5. **Color Coding**: The map uses different shades of color to highlight the regions\
    \ and statistical differences or characteristics.\n\nThis visualization compares\
    \ how temperature extremes are projected to change under different climate scenarios\
    \ across various regions worldwide.\n===\nThe image is a series of box plots illustrating\
    \ the impact of climate change on GDP per capita in different regions over time.\
    \ The regions include Latin America, LDCs (Least Developed Countries), SIDS (Small\
    \ Island Developing States), and South Asia. The x-axis represents the year (2050\
    \ and 2100), while the y-axis shows the percentage of change in GDP per capita.\n\
    \nEach box plot displays the projected change in GDP for different temperature\
    \ pathways, indicated by color:\n\n- Blue for the ~1.5\xB0C scenario\n- Yellow\
    \ for BE33\n- Red for NDC\n\nKey observations:\n\n- Across all regions, the GDP\
    \ per capita is projected to decrease as temperature pathways become less favorable,\
    \ with more dramatic declines by 2100.\n- The negative impact is generally more\
    \ severe in 2100 compared to 2050.\n- Least Developed Countries (LDCs) and SIDS\
    \ show more significant declines compared to Latin America and South Asia.\n-\
    \ The ~1.5\xB0C pathway consistently shows the least negative impact on GDP per\
    \ capita across all regions and years.\n===\n"
