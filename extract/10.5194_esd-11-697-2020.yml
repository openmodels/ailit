Drivers of Risk:
  1: "The key drivers of risk include insufficient global mitigation ambition and\
    \ failure to meet the 1.5\xB0C long-term temperature limit of the Paris Agreement."
  2: "Current NDCs are leading to projected global warming of about 3\xB0C, implying\
    \ insufficient mitigation efforts to prevent severe climate impacts."
  3: The potential inadequacy of current Nationally Determined Contributions (NDCs)
    and differing levels of emission reductions by countries are identified as drivers
    impacting future temperature increases.
  5: Temperature increase and sea-level rise are identified as key drivers of risk.
  6: Current NDC ambition levels and their incremental improvements are drivers impacting
    late-21st-century global temperature outcomes.
  7: Sea-level rise and extreme heat (annual maximum temperature) are drivers of risk
    considered.
  8: "Impacts are driven by changes in hot extremes (TXx) and global mean temperature\
    \ increases under scenarios like NDC, BE33, and 1.5\xB0C."
  11: No relevant information
Evaluation overview:
  1: The paper evaluates the potential climate impacts by 2100, focusing on temperature
    rise, long-term sea-level rise, and economic damages, particularly in vulnerable
    countries.
  2: "The paper assesses the implications of incremental improvements in global NDCs\
    \ on various climate impacts such as sea-level rise, extreme temperatures, and\
    \ economic damages relative to a pathway limiting warming to 1.5\xB0C."
  3: The paper evaluates global warming outcomes based on current NDC ambition and
    incremental improvements, resulting in different temperature projections for 2100.
  5: Economic damages are evaluated through projections of GDP per capita loss for
    different emission scenarios.
  6: The paper evaluates the impact of various GHG emissions reduction scenarios on
    global mean temperature projections.
  7: Global mean sea-level rise, annual maximum temperature increase, and GDP reductions
    for Least Developed Countries (LDCs) are evaluated.
  8: The paper evaluates the impact of climate change on hot extremes and GDP per
    capita under different temperature scenarios.
  11: No relevant information
Highlights:
  1: Incremental improvements in reduction targets are insufficient to meet the Paris
    Agreement goals, highlighting the need for transformational increases in 2030
    ambition.
  2: Incremental improvements in NDCs are insufficient for achieving required emission
    reductions and avoiding severe climate impacts by 2100.
  3: "Current NDC ambition levels are deemed insufficient as they would lead to an\
    \ estimated global warming of 2.8\xB0C by 2100."
  4: Provides projections for long-term sea-level rise, extreme temperature changes,
    and economic damages based on different NDC pathways.
  5: The current NDC scenario could lead to 64 cm of sea-level rise and significant
    economic damages, especially under a high emissions scenario. A 33% increase in
    NDC ambition reduces sea-level rise and economic damages moderately.
  6: "Incremental improvements in NDCs up to 33% reduction of 2030 emissions are insufficient\
    \ to limit warming to 1.5\xB0C."
  7: "Even if big emitters increase their ambition level by a third, this will only\
    \ reduce about half the inferred impacts including for sea-level rise, extreme\
    \ temperatures and economic damages compared to what can be achieved by limiting\
    \ warming to 1.5\xB0C."
  8: "GDP per capita decline is most severe for LDCs and SIDS by 2100, with least\
    \ impact under the 1.5\xB0C pathway; hot extremes under different scenarios affect\
    \ large land fractions."
  11: No relevant information
Methodology:
  2: The analysis uses Climate Action Tracker's methodology to estimate collective
    results of current NDCs in global emissions and to project global temperatures
    assuming continued post-2030 efforts.
  3: The analysis uses a modified version of the CAT Pledges & Targets pathway, extending
    to 2100 using the constant quantile extension method and MAGICC6 climate model
    for global temperature projections.
  4: Economic damages are calculated as the difference in GDP growth due to temperature
    changes using historical relationships between GDP growth and temperature variability.
  5: The analysis uses scenarios reflecting different levels of Nationally Determined
    Contributions (NDCs) ambition and employs median downscaling factors to project
    outcomes.
  11: No relevant information
More Notes:
  11: No relevant information
Quantitative material:
  1: The analysis projects a reduction in GDP by around 60% for tropical countries
    by 2100 under current NDCs, and estimates a median long-term sea-level rise of
    close to 2m by 2300.
  2: "Under current NDCs, greenhouse gas emission levels are projected to be 52\u2013\
    58 GtCO2eq.yr\u22121 by 2030, which contrasts with 25\u201330 GtCO2eq.yr\u2212\
    1 required to limit warming to 1.5\xB0C."
  3: "Without intervention, current pledges lead to a temperature increase of about\
    \ 3\xB0C by 2100, while 2030 emission levels under current NDCs imply a 1.5 GtCO2eq.\
    \ lower total than previous pathway estimates."
  5: The page provides quantitative projections of sea-level rise, economic damages
    in GDP per capita, and changes in extreme temperature (TXx) for different emission
    scenarios.
  6: Includes quantitative projections of GHG emissions in GtCO2eq and the associated
    median increases in GMT by 2100 for different emissions scenarios.
  7: "Median global mean sea-level rise relative to 1986\u20132005 in 2100: NDC scenario\
    \ (64cm), 33% ambition increase for big emitters (54cm), 1.5\xB0C scenario (45cm).\
    \ In 2300: NDC scenario (190cm), 33% ambition increase for big emitters (140cm),\
    \ 1.5\xB0C scenario (100cm). Median increase in annual maximum temperature (TXx)\
    \ relative to 1986\u20132005 in 2100: NDC (+2.7\xB0C), 33% ambition increase (+1.8\xB0\
    C), 1.5\xB0C scenario (+1.1\xB0C). Median GDP reductions for LDCs relative to\
    \ a no-climate-change scenario in 2050: NDC (-20%), 33% ambition increase (-17%),\
    \ 1.5\xB0C scenario (-14%). In 2100: NDC (-66%), 33% ambition increase (-50%),\
    \ 1.5\xB0C scenario (-34%)."
  8: Quantitative data includes the percentage difference in GDP per capita across
    scenarios and regions, and land area fraction affected by changes in TXx.
  11: No relevant information
sourcematerial:
  1: "  \nCurrent global mitigation ambition up to 2030 under the Paris Agreement,\
    \ reflected in the National Determined Contributions (NDCs), is insufficient to\
    \ achieve the agreement\u2019s 1.5\xB0C long-term temperature limit. ... We provide\
    \ estimates for global mean temperature increase by 2100 for different incremental\
    \ NDC update scenarios and illustrate climate impacts under those median scenarios\
    \ for extreme temperature, long-term sea-level rise and economic damages for the\
    \ most vulnerable countries. Under the assumption of maintaining ambition as reflected\
    \ in current NDCs up to 2100 and beyond, we project a reduction in the gross domestic\
    \ product (GDP) in tropical countries of around 60% compared to a no-climate-change\
    \ scenario and median long-term sea-level rise of close to 2m in 2300.\nIncremental\
    \ improvements in reduction targets, even if achieved globally, are insufficient\
    \ to align collective ambition with the goals of the Paris Agreement... An increase\
    \ in aggregated NDC ambition of big emitters by 33% in 2030 does not reduce presented\
    \ climate impacts by more than about half compared to limiting warming to 1.5\xB0\
    C. Our results underscore that a transformational increase in 2030 ambition is\
    \ required to achieve the goals of the Paris Agreement and avoid the worst impacts\
    \ of climate change.\n"
  2: "The paper evaluates the implications of incremental global NDC updates for 2030\
    \ on climate impacts: \"We provide projections for selected climate impacts (sea-level\
    \ rise, extreme temperatures and economic damages) for current NDCs and gradual\
    \ reduction pathways in comparison with a 1.5\u25E6C pathway.\" Drivers of risk\
    \ are discussed as: \"Despite scientific evidence for the need of profound increases\
    \ in near-term emission reductions, it is far from certain that these reductions\
    \ will happen...those improvements fall short to deliver the emission reductions\
    \ required on the global scale.\" Quantitative material mentioned: \"Pathways\
    \ that achieve limiting warming to 1.5\u25E6C...require total greenhouse gas emission\
    \ levels of 25\u201330 GtCO2eq.yr\u22121 in 2030, about half of the 52\u201358\
    \ GtCO2eq.yr\u22121 implied by current NDCs.\" Methodology insights: \"The analysis\
    \ of emission pathways builds on the methodology of the Climate Action Tracker\
    \ (CAT), which estimates the collective result of current NDCs in global emissions.\"\
    \ Highlights of insufficient improvements are emphasized: \"Incremental improvements\
    \ to collective emission reduction efforts in 2030...fall short to deliver the\
    \ emission reductions required on the global scale.\""
  3: "Source material here: Based on this analysis, 2030 global emission levels based\
    \ on the CAT assessment of current pledges ... would lead a temperature increase\
    \ of about 3\xB0C in 2100. To create a current NDC ambition reference scenario\
    \ ... 2030 total GHG emission levels implied by our reference scenario are 1.5GtCO2eq.\
    \ lower than the 2018 CAT Pledges & Targets pathway ... Based on the pathway extension,\
    \ our \"current NDC\" ambition reference scenario would lead to a median global\
    \ warming of 2.8\xB0C in 2100. ... assuming that the relative ambition level of\
    \ climate policy is kept constant after the end of the NDC pathway. ... The constructed\
    \ GHG emission pathways ... are then used to derive probabilistic projections\
    \ for the global mean temperature (GMT) with the reduced complexity carbon cycle\
    \ and climate model MAGICC6. ... Several studies have shown that model version\
    \ 6 is able to capture both CMIP3 model ... and CMIP5 model ... responses well.\
    \ Starting from this current NDC ambition baseline ... we create a number of NDC\
    \ update scenarios, which are meant to represent different increments of improvement\
    \ in ambition."
  4: 'Source material

    Methodology: "The analysis uses the MAGICC6 model to project global mean temperature
    (GMT) responses and climate impacts for different Nationally Determined Contribution
    (NDC) pathways."

    Methodology: "However, to illustrate the relevance of these differences for a
    range of different climate impacts, we have chosen three exemplary impact indicators:
    a time-lagged response (long-term sea-level rise), an extreme event indicator
    (extreme hot days) and economic damages."

    Methodology: "Sea-level rise projections are generated with the MAGICC sea-level
    model and are considered conservative estimates due to excluding marine ice cliff
    instability."

    Methodology: "Global mean sea-level rise (GMSLR) projections are generatedwiththeMAGICCsea-levelmodel(Nauelsetal.,2017)....
    To this end, the provided sea-level projections can be interpreted as conservative
    estimates for the longer-term sea-level response."

    Methodology: "Changes in extreme temperatures are analyzed using a time-slicing
    approach to average the hottest days over a selected 21-year period for different
    scenarios."

    Methodology: "We present changes in hot extremes as land fraction distributions
    of changes in the intensity of the hottest day in a year(TXx),followingthemethodintroducedbyFischeretal.(2013)....
    At each grid cell, the hottest days of a year (TXx) are averaged over the selected
    21-year period..."

    Methodology: "Economic damages are calculated as the difference in GDP growth
    due to temperature changes using historical relationships between GDP growth and
    temperature variability."

    Methodology: "Expressed in terms of the gross domestic product (GDP), economic
    damages are calculated based on the methodology byBurke et al.(2018). The method
    combines the estimatesobtainedfromthehistoricalrelationshipbetweenGDP growthandtemperaturevariabilityandprojectedfuturetemperaturechanges."

    Highlights: "Provides projections for long-term sea-level rise, extreme temperature
    changes, and economic damages based on different NDC pathways."

    Highlights: "However, to illustrate the relevance of these differences for a range
    of different climate impacts, we have chosen three exemplary impact indicators:
    a time-lagged response (long-term sea-level rise), an extreme event indicator
    (extreme hot days) and economic damages."

