  18: " \n\"Efforts to understand the sensitivity of marine species to projected future\
    \ ocean acidification are delving into detailed characterization and mechanisms\
    \ of species sensitivity, consideration of acclimation and adaptation, greater\
    \ ecological relevance including consideration of multiple stressors, and detection\
    \ and attribution of the impacts for ocean ecosystems.\" \n\n\"Human CO2 emissions\
    \ alter surface seawater acid-base chemistry globally, with additional coastal\
    \ acidification from nutrient pollution and other factors.\"\n\n\"Extreme ocean\
    \ events including harmful algal blooms, hypoxia, and marine heat waves have recently\
    \ tested management systems and stressed marine-dependent socioeconomic systems.\"\
    \n\n\"Biological impacts reflect multiple, simultaneous chemical changes\u2014\
    increasing CO2(aq), HCO\u22123 ,andH+ and decreasing CO2\u22123 and carbonate\
    \ saturation state.\"\n\n\"Current management practices must be adjusted, however,\
    \ to allow marine governance to remain nimble in the face of both global-scale\
    \ changes such as acidification and climate change and local-scale concerns.\"\
    \n\n\"Many adaptive actions used to address other issues, such as strengthening\
    \ the shellfish aquaculture industry overall, can have cobenefits in addressing\
    \ acidification.\"\n"
  19: "Source material here.\n1. \"Acidification likely will impact aquaculture, fisheries,\
    \ shoreline protection, and other valuable marine ecosystem services, resulting\
    \ in vulnerabilities and risks to human communities.\" \n2. \"The ultimate solution\
    \ to ocean acidification involves global-scale reductions in human CO2 emissions,\
    \ with local adaptation strategies also needed to minimize harm from the impacts\
    \ that are inevitable.\"\n3. \"Marine management strategies need updating to balance\
    \ protection and sustainable human uses in the face of overlapping global-scale\
    \ changes like acidification, warming, and oxygen loss.\"\n4. \"Interventions\
    \ designed to address other issues (e.g., biodiversity loss, water quality, governance)\
    \ may also help address harm from ocean acidification.\"\n5. \"Experimental studies\
    \ of ecological effects of ocean acidification that explicitly incorporate environmental\
    \ context (e.g., temporal variability in pCO2/pH and concurrent exposure to multiple,\
    \ relevant drivers) are needed to improve forecasts of emergent ecological effects.\"\
    \n6. \"Increased monitoring and data synthesis efforts aimed at detecting species\
    \ and ecosystem change and understanding what portion of the change can be attributed\
    \ to ocean acidification will help guide living marine resource management and\
    \ the scientific efforts that support it.\"\n7. \"Adaptive management systems\
    \ must be developed to move beyond the assumption of steady-state environmental\
    \ conditions, to accommodate geographic and temporal shifts in living marine resources,\
    \ and to nimbly address extreme events in ways that minimize harm to both marine\
    \ systems and ocean-dependent human communities.\"\n"
