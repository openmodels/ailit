    \ microevolution studies; \u25CF5 multiple driver studies; and \u25CF6 sites of\
    \ CO2 natural enrichment such as CO2 seeps.\"\nHighlights: \"Some populations\
    \ living in naturally high-CO2 environments express less sensitivity to high-CO2\
    \ experimental treatments...Field collections show that some species express sensitivity\
    \ to the high-CO2 conditions already observed along the western coast of the United\
    \ States, whereas others express signs of potential adaptation.\"\n"
  9: 'Source material: "pteropod shell condition with anthropogenic CO2 increase and
