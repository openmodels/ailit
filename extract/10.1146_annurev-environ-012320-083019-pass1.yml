    CO2 and ocean acidification.
  3: Atmospheric CO2 and the concurrent ocean acidification... coastal land use and
    pollution.
  4: Increased atmospheric CO2 due to fossil fuel combustion; Coastal upwelling systems;
    Excess nutrient and organic carbon inputs from land sources; Low-alkalinity freshwater
