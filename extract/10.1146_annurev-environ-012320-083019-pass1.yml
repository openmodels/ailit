Evaluation overview:
  1: The paper discusses the biological impacts of ocean acidification on marine ecosystems
    and the ecosystem services they provide to human communities.
  3: Acidification effects span from changes in cellular metabolism, organism physiology,
    and sensory perception to population and community, biogeochemical, and ecosystem-level
    dynamics; impacts on human society for fishery and resource management, marine
    conservation, and impacts on communities reliant on the ocean.
  4: Discusses the impact of ocean acidification on marine organisms that use calcium
    carbonate for shell and skeleton formation.
  7: The paper examines how ocean global change, specifically ocean acidification,
    influences marine life and ecosystem services.
  9: This paper discusses impacts on pteropod shell condition, survival, and distribution.
    It also covers community and ecosystem effects, including primary producer biomass,
    taxonomic diversity, and ecosystem function.
  10: The page provides a general overview of observed trends in key community and
    ecosystem properties and processes in response to ocean acidification.
  11: The paper evaluates ocean acidification's impact on marine ecosystems, including
    productivity changes, survival of larval fish, and the disruption of pelagic food
    webs.
  12: The page discusses shifts in coral community structures due to ocean acidification
    and their indirect effects on associated invertebrate and fish communities.
  13: Discusses the potential impacts of ocean acidification on seagrass productivity,
    marine epiphytes, macroalgae, invertebrate grazers, the Pacific oyster industry,
    and broader ecosystem services.
  16: The paper discusses the impact of ocean acidification on various coastal ecosystems,
    affecting biodiversity, ecosystem resilience, and regulating services such as
    habitat provision, nutrient cycling, and carbon storage.
  17: The page discusses interventions and adaptations to address the impacts of ocean
    acidification on marine systems and cultural services.
  18: The paper provides an overview of the impacts of ocean acidification on marine
    species, biological communities, ecosystems, and dependent human communities.
  19: Impacts on aquaculture, fisheries, shoreline protection, and other valuable
    marine ecosystem services are evaluated, resulting in vulnerabilities and risks
    to human communities.
  21: Ecological theory, population- and community-level effects of ocean acidification.
  22: Studies the direct effect of seawater pH on survival rate of species groups
    in the California Current ecosystem; shell condition and survival of Puget Sound
    pteropods; and development of Euphausia pacifica larvae under varying pH conditions.
  24: The page focuses on the impacts of ocean acidification and other climate-related
    stressors on marine ecosystems, including coral reefs, phytoplankton, and various
    marine organisms. It considers shifts in community structure, biodiversity loss,
    and changes in trophic interactions.
  25: Studies on this page evaluate impacts on food webs, coral calcification, bioerosion,
    skeletal density, reef communities, algal communities, coral recruitment, benthic
    community composition, fish behavior, and oyster shell dissolution/bivalve larvae.
  30: No direct evaluation of outcomes is provided within this specific page's content.
  32: Urban Climates and Climate Change
Highlights:
  1: Human-driven ocean acidification could alter organism physiology, population
    dynamics, communities, and ecosystems, potentially putting at risk services like
    fisheries and shoreline protection.
  3: Improved understanding is urgently needed on ocean acidification impacts from
    scientific, management, policy, and socioeconomic perspectives to develop adequate
    adaptation strategies.
  4: "Ocean surface waters exchange CO2 with the atmosphere. Ocean acidification is\
    \ occurring due to the rapid rise in atmospheric CO2. Present-day CO2 levels (\u223C\
    410 ppm) have not been experienced by life on Earth for several million years,\
    \ and the human-induced CO2 growth rate is nearly two orders of magnitude faster\
    \ than what occurred during the large glacial-interglacial transitions."
  5: Fish exhibit unexpected sensitivity to current and near-future CO2 levels, affecting
    various physiological and behavioral processes. Acidification effects disrupt
    systems related to the neurotransmitter GABAA. Substantial variation in sensitivity
    exists within and between fish species.
  7: Some marine populations adapt to high-CO2 environments, but others show sensitivity,
    revealing varied responses based on biogeographic and carbonate chemistry influences.
  9: Ocean acidification increases primary producer biomass and decreases taxonomic
    diversity. There is a trend toward homogenization of community structure. Increased
    primary production can boost production across multiple trophic levels. The ability
    of consumers to compensate for increased primary producer biomass varies.
  10: Altered behavior in marine consumers due to ocean acidification can weaken predator-prey
    links, causing cascading effects on ecosystems.
  11: Ocean acidification may lead to changes in marine microbial community composition,
    increased productivity at the base of pelagic food webs, the proliferation of
    toxic algal blooms, reduced net calcification and increased bioerosion in coral
    reefs.
  12: The analysis highlights the shifts from structurally complex corals to massive
    corals, potential adaptation of corals to acidified conditions, and the impact
    on associated invertebrate and fish communities.
  13: Ocean acidification is likely to decrease bivalve shellfish harvests, with associated
    economic and cultural impacts for the Pacific oyster industry in the Pacific Northwest.
  16: The paper highlights the potential economic and environmental impacts of ocean
    acidification on vermetid and shellfish reefs, the role of submerged aquatic vegetation
    in addressing ocean acidification, and the importance of maintaining biodiversity
    for ecosystem resilience.
  17: The page highlights both adaptive management of marine systems and interventions
    like shellfish aquaculture as strategies to mitigate negative impacts of ocean
    acidification and support marine biodiversity.
  18: Adaptive actions addressing issues like shellfish aquaculture have cobenefits
    for addressing acidification.
  19: Ocean acidification impacts aquaculture, fisheries, shoreline protection, and
    other marine ecosystem services; Local adaptation strategies are needed to minimize
    harm from inevitable impacts; Global-scale CO2 emissions reductions are the ultimate
    solution; Marine management strategies need updating to balance protection and
    sustainable human uses.
  21: Synthesis covering marine fish respiratory acid-base, early-life, metabolic,
    reproductive, and neurosensory physiological impacts of ocean acidification (Esbaugh
    2018).
  22: Impaired shell condition and survival of pteropods due to ocean acidification;
    developmental impairment of krill larvae under current pCO2 levels in the Northeast
    Pacific.
  24: Ocean acidification can lead to shifts in competitive interactions, ecosystem
    shifts, biodiversity loss, changes in trophic links, and altered phytoplankton
    community structure. Some species may benefit from elevated CO2 via indirect food
    web effects.
  25: Ocean acidification impacts food webs, coral reefs, and fish behavior. It can
    lead to shifts in species composition, reduced calcification, increased bioerosion,
    altered habitat complexity, and impaired fish behavior.
  30: No significant outcomes are directly mentioned within this specific page's content.
Methodology:
  4: Describes the relationship between CO2, pH, DIC, and alkalinity, and how these
    are measured and standardized. Mentions best practices for measurement of seawater
    carbonate chemistry.
  5: "Analysis is based on observations obtained at the Hawai\u2018i Ocean Time-series\
    \ (HOT) Program in the North Pacific from 1988-2015. CO32\u2013 concentration\
    \ and seawater pH are calculated from discrete water samples."
  7: The analysis uses various study techniques, including mesocosms, FOCE experiments,
    competition experiments, acclimated species studies, long-term microevolution
    studies, and natural CO2 enrichment sites.
  9: The paper discusses both experimental studies and studies using natural gradients
    in carbonate chemistry. It highlights the use of molecular markers of stress,
    immune system changes, and shell state as indicators of ocean acidification impacts.
  10: Findings are derived from studies of multiple-species experiments or observational
    studies in naturally acidified ecosystems.
  19: Experimental studies incorporating environmental context are needed to improve
    forecasts of emergent ecological effects; Increased monitoring and data synthesis
    are needed to attribute change to ocean acidification to guide living marine resource
    management.
  21: Meta-analysis of fish responses to ocean acidification (Cattano et al. 2018).
  24: Studies use various methods, including field observations along natural environmental
    gradients (e.g., volcanic CO2 vents), laboratory experiments, autonomous buoy
    data, and imaging approaches to study plankton communities. Time scales vary across
    studies from short-term experiments to longer-term trends observed over decades.
  25: "Studies use a variety of methods including field studies in naturally acidified\
    \ waters, manipulative experiments, and \u03BCCT analysis."
  30: No description of methodology is given within this specific page's content.
  32: This paper is part of the Annual Review of Environment and Resources.
More Notes:
  3: Focuses on the rapidly expanding body of knowledge on ocean acidification in
    the scientific literature over the past decade.
  9: Disentangling ocean acidification impacts from other stressors is a challenge.
    The effects of anthropogenic ocean acidification on coral reefs have not yet been
    confidently isolated. Detecting and attributing change to ocean acidification
    will likely increase as the chemical signature of ocean acidification emerges
    from natural variation. Functional redundancy within trophic groups can limit
    community shifts.
  12: Ocean acidification poses threats to the structure and ecosystem services of
    oyster and vermetid reefs, as well as maerl beds.
  19: Interventions for biodiversity loss, water quality, and governance may help
    address harm from ocean acidification; Adaptive management systems must be developed
    to accommodate geographic and temporal shifts in living marine resources and extreme
    events.
  25: The references cover a range of marine organisms and ecosystems, indicating
    the widespread impacts of ocean acidification.
  30: This page primarily lists references and related resources concerning ocean
    acidification and does not present new empirical research or findings by itself.
  32: This page is a table of contents, listing articles related to management and
    governance of resources and the environment, methods and indicators, and indexes.
