sourcematerial:
  1: "Source material: Rising atmospheric carbon dioxide (CO2) levels, from fossil\
    \ fuel combustion and deforestation, along with agriculture and land-use practices\
    \ are caus-ing wholesale increases in seawater CO2 and inorganic carbon levels;\
    \ re-ductions in pH; and alterations in acid-base chemistry of estuarine, coastal,\
    \ and surface open-ocean waters...widespread biological impacts of human-driven\
    \ ocean acidification have been posited, ranging from changes in organism physiology\
    \ and population dynamics to altered communities and ecosystems. Acidification,\
    \ in conjunction with other climate change\u2013related environmental stresses,\
    \ particularly under fu-ture climate change and further elevated atmospheric CO2\
    \ levels, poten-tially puts at risk many of the valuable ecosystem services that\
    \ the ocean pro-vides to society, such as fisheries, aquaculture, and shoreline\
    \ protection."
  3: "Source material here.\nReported acidification effects span from changes in cellular\
    \ metabolism, organism physiology, and sensory perception to population and community,\
    \ biogeochemical, and ecosystem-level dynamics. The implications for human society\u2014\
    for fishery and resource management, marine conservation, and impacts on communities\
    \ reliant on the ocean\u2014are just now coming into focus. Atmospheric CO2 and\
    \ the concurrent ocean acidification are projected to continue to rise through\
    \ mid-century, if not longer, without deliberate and decisive international action\
    \ on climate mitigation and emissions reductions. Improved understanding is urgently\
    \ needed on ocean acidification impacts from scientific, management, policy, and\
    \ socioeconomic perspectives to develop adequate adaptation strategies. This review\
    \ focuses on the rapidly expanding body of knowledge on ocean acidification in\
    \ the scientific literature over the past decade since a previous Annual Reviews\
    \ article on the topic.\n"
  4: "yaml\nEvaluation overview: 'Calcite: a less soluble mineral form of calcium\
    \ carbonate used by marine organisms in shell and skeleton formation via biomineralization...A\
    \ value of /Omega1<1 indicates undersaturation with respect to thermodynamic equilibrium,\
    \ and under those seawater conditions, unprotected carbonate materials will dissolve.'\n\
    Drivers of Risk: 'Driven primarily by fossil fuel combustion, contemporary human\
    \ CO2 emissions to the atmosphere of approximately 10 billion metric tons of carbon\
    \ per year result in an increase in atmospheric CO2 of roughly 2 ppm/year or 0.5%\
    \ per year (2). Coastal upwelling systems typically have elevated CO2 and low\
    \ O2 levels because of the marine biological pump...Similar high CO2\u2013low\
    \ O2 conditions are found in many coastal and estuarine systems associated with\
    \ excess nutrient and organic carbon inputs from land sources (29, 30). Coastal\
    \ acidification can also occur because of low-alkalinity freshwater fluxes from\
    \ rivers, groundwater, and ice melt (31\u201333).'\nQuantitative material: 'Driven\
    \ primarily by fossil fuel combustion, contemporary human CO2 emissions to the\
    \ atmosphere of approximately 10 billion metric tons of carbon per year result\
    \ in an increase in atmospheric CO2 of roughly 2 ppm/year or 0.5% per year (2).\
    \ surface ocean pH is estimated to have dropped on average globally by approximately\
    \ 0.1 units from the preindustrial era to present, which is an \u223C30% increase\
    \ in hydrogen ion concentration.'\nMethodology: 'The inorganic carbon acid-base\
    \ reactions and carbonate mineral solubility are controlled by well-characterized,\
    \ equilibrium thermodynamic relationships as a function of temperature, salinity,\
    \ and pressure. The system is characterized fully from the physical state and\
    \ any two of four chemical properties: pCO2, pH, DIC, and alkalinity. The scientific\
    \ community has developed best practices for the measurement of seawater carbonate\
    \ chemistry in field and lab samples (24) as well as standardized approaches for\
    \ mimicking acidification chemical changes in biological manipulation studies\
    \ (25).'\nHighlights: 'On a global scale, acidification of the surface ocean is\
    \ occurring because of the rapid rise in atmospheric CO2. Present-day CO2 levels\
    \ (\u223C410 ppm) have not been experienced by life on Earth for several million\
    \ years, and the human-induced CO2 growth rate is nearly two orders of magnitude\
    \ faster than what occurred during the large glacial-interglacial transitions\
    \ (11). Ocean surface waters exchange CO2 with the overlying atmosphere via physical\
    \ gas transfer...'\n"
  5: "Source material here.\n\"Research on how high-CO2 conditions influence fishes\
    \ exemplifies this trend. Although some fish appear able to compensate for disturbance\
    \ to acid-base balance under high-CO2 conditions, they express unexpected sensitivity\
    \ to current and near future CO2 levels in the growth of otoliths\u2014calcium\
    \ carbonate structures in fish ears that aid in balance\u2014mitochondrial function,\
    \ metabolic rate, larval yolk consumption, activity, neurosensory processes, and\
    \ behavior, including settlement into specific habitat at the end of the early\
    \ life stages.\"\n\n\"The upper panel shows the linked increase in carbon dioxide\
    \ (CO2) in the atmosphere (red points) and surface ocean (blue points), both presented\
    \ in terms of CO2 concentration in air (ppm). The bottom panel shows a decline\
    \ in seawater pH (light blue points, primary y-axis) and carbonate ion (CO32\u2013\
    ) concentration (green points, secondary y-axis).\"\n\n\"Trends in surface (<50\
    \ m) ocean carbonate chemistry calculated from observations obtained at the Hawai\u2018\
    i Ocean Time-series (HOT) Program in the North Pacific during 1988\u20132015.\"\
    \n\n\"Altered fish physiology in high-CO2 conditions may disrupt systems related\
    \ to the neurotransmitter GABAA. GABAA is involved in a wide variety of sensory\
    \ and behavioral pathways in the nervous systems of animals; the consequences\
    \ of GABAA signaling disruption in fishes due to ocean acidification are still\
    \ being determined. Substantial variation in sensitivity exists within and between\
    \ fish species.\"\n"
  7: "yaml\nEvaluation overview: \"The cube...represents different scales of space\
    \ and biological organization, time, and drivers of environmental change. It depicts\
    \ schematically where information on ecosystem services that could inform policy\
    \ would emerge and where currently pursued types of research are located in time/space\
    \ dimensions...\"\nDrivers of Risk: \"Studying populations living in naturally\
    \ high-CO2 environments is another way to explore whether long-term exposure to\
    \ high CO2 can confer resistance to ocean acidification...Field collections show\
    \ that some species express sensitivity to the high-CO2 conditions already observed\
    \ along the western coast of the United States, whereas others express signs of\
    \ potential adaptation (59\u201362, 229).\"\nMethodology: \"Various types of studies\
