    Evaluation overview: "Modeling work suggests that ocean acidification, warming,
    and increased stratification will drive changes in marine microbial community
    makeup (42), but it is not yet known whether microbial changes will alter global
    ecosystem functions such as net primary production and export or air-sea gas exchange.
    ... Whole-community mesocosm studies have demonstrated increased productivity
    at the base of pelagic (water-column) food webs (106), leading to increased productivity
    of higher trophic levels (109), including enhanced survival and biomass of larval
    fish that are directly negatively impacted by acidification (110). ... Ocean acidification
    could also disrupt pelagic food webs via the proliferation of toxic algal blooms
    (112). ... The persistence of coral reefs depends on the balance of net accretion
    (carbonate production minus dissolution) and bioerosion by boring and scraping
    organisms at each reef."

    Drivers of Risk: "Modeling work suggests that ocean acidification, warming, and
    increased stratification will drive changes in marine microbial community makeup
    (42), but it is not yet known whether microbial changes will alter global ecosystem
    functions such as net primary production and export or air-sea gas exchange."

    Highlights: "Modeling work suggests that ocean acidification, warming, and increased
    stratification will drive changes in marine microbial community makeup (42), ...
    Whole-community mesocosm studies have demonstrated increased productivity at the
    base of pelagic (water-column) food webs (106), ... Ocean acidification could
    also disrupt pelagic food webs via the proliferation of toxic algal blooms (112).
    ... Numerous studies document declines in net calcification of different coral
    species and coral reef assemblages with lower carbonate saturation states. ...
    There is growing evidence that bioerosion may be more sensitive to changes in
    carbonate chemistry than carbonate production (116)."

    '
  12: 'Source material here: Shifts in coral community structure associated with acidification
    can have indirect effects on reef-associated invertebrate and fish communities
    (127). Similar to coral reefs, ocean acidification is expected to increase dissolution
    rates of oyster shells that make up the structure of oyster reefs (131), and high-CO2
    impacts on oyster larvae may negatively influence oyster recruitment (132). In
    several studies, the coral community shifts from relatively faster-growing, structurally
    complex corals to slower-growing, mounding corals (94, 95) or even soft corals
    (125) in conditions comparable to end of the century projections. ... Thus, the
    potential adaptive capacity of corals to projected future warming and acidification
    remains an important frontier that needs to be resolved better for understanding
    emergent community shifts. Ocean acidification threatens the structure and ecosystem
    services provided by vermetid reefs, which are built in warm, subtropical waters
    by vermetid gastropods and cemented together by crustose coralline algae, because
    of reduced gastropod recruitment and enhanced shell dissolution (133). Maerl beds
    (also called rhodolith beds), a habitat formed by unattached, branching crustose
    coralline algae in the Mediterranean and along the Atlantic coast of Europe to
    the North Sea, are also threatened by acidification.'
