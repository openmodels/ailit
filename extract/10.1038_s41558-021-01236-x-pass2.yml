  13: 'plaintext

    "Even scenarios aimed at the same temperature goal (thus resulting in similar
    mid-century physical climate risks) can have considerably different transition
    risks by 2030. For example, at both the global and regional level, the 2C SSP1
    and 2C RES scenarios have higher solar and wind capacity than the other scenarios,
    owing to the emphasis on these technologies as per their design. By contrast,
    the less renewables-focused 2C SSP3 and 2C NUC CCS scenarios have a greater role
    for nuclear and a smaller role for solar and wind." "The key point unifying all
    of these observations is that the technology and sector-specific dynamics governing
    any 2oC- targeted pathway (and indeed any other given temperature pathway) are
    by no means a given, but rather depend on the particular scenario features. It
    will therefore be imperative for any risk assessment to consider these nuances."

    '
  14: "Source material here.\npoint has already been demonstrated to some extent through\
    \ inter -model diversity of results from the NGFS scenarios...the regionally uncoordinated\
    \ socio-economics of the 2C SSP3 scenario provides a source of significant 2030\
    \ transition risk variation in our scenarios. It is useful to be able to isolate\
    \ these differing socio-economics (as well as the different technological assumptions\
    \ around renewables and CCS and nuclear) to uncertainties in future outcomes,\
    \ over and above the inter -model variations around the same socio-economics (in\
    \ this case SSP2) as used in the NGFS scenarios.\n\nIn addition, and as shown\
    \ in Supplementary Figures S2.1, S2.2 and Supplementary Table S2.1, the range\
    \ of 2030 transition indicator values represented by our non-delayed action 2oC-targeted\
    \ scenarios (2C Central, 2C SSP1, 2C SSP3, 2C RES, 2C NUC CCS) also overlaps with\
    \ the NGFS scenarios targeting a below 2oC long term temperature outcome, with\
    \ for most indicators comparable median values.\n\nIndeed, this single-model analysis\
    \ can be situated within the broader ensemble of mitigation pathways from recent\
    \ years. Our illustrative 1.5oC pathway sits within the range of the IPCC\u2019\
    s SR1.5 database of 1.5oC-consistent scenarios (considering no-, low- and high-overshoot\
    \ scenarios) across a number of transition indicators (Supplementary Figure S2.1),\
    \ whilst our 2oC-targeted pathway ensemble mostly overlaps with the possibility\
    \ space as represented in the database (Supplementary Figure S2.2).\n\nA consideration\
    \ of uncertainty and more extreme values is likely to be critical to comprehensive\
    \ risk assessments. Furthermore, it could be highly beneficial to consider futures\
    \ analysis approaches beyond systems modelling such as that undertaken here, to\
    \ better populate the future possibility space44, as well as considering extremes\
    \ and traditionally under-represented disruptions45.\n"
