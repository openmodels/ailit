    abatement costs and carbon prices, as well as reaffirming the importance of coal
    plant idling and capacity reductions. Carbon price levels are central to considerations
    of energy portfolio default likelihoods, whilst abatement costs directly impact
    economic output. Critically however, we do not consider the potential stimulus
    effect of low-carbon investment on economic growth. Finally, we include electricity
    and food price indicators, as these relate directly to household energy costs
    and therefore loan defaults, and (in the case of electricity prices) feature as
    key indicators in assessments of energy system transitions in deep mitigation
    scenarios... a key set stems from the diagnostic exercises that have been undertaken
    to compare major IAM characteristics. These include: a relative abatement index
    (measuring the share of baseline emissions reduced in a policy case); an emissions
    reduction type index (showing the share of the relative abatement index that can
    be attributed to supply side measures); marginal abatement cost curves showing
    emissions reductions against carbon prices; energy intensity and carbon intensity;
    measures of fuel shares of major primary fuels such as fossil and non-fossil sources;
    mitigation costs; and the mitigation cost achieved per unit of carbon pricing.
    Many of these metrics are directly useful for measuring transition risks and have
    been included in our transition indicator analysis (mitigation costs, emissions
    intensity; fuel shares).

