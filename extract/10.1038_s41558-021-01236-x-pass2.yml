Highlights:
  4: Physical risks by 2050 and transition risks by 2030 are greatly dependent on
    temperature pathways.
  8: The No Policy scenario projects a 4.3oC rise by 2100, the NDC Pledges scenario
    results in 3.1oC rise by 2100, and a 1.5C scenario aligns temperature below 1.5oC
    by 2080.
  9: The paper uses regional average likelihood or change in duration at a point in
    the region to represent the risk.
  10: The chance of a major heatwave and agricultural indicators show the most non-linear
    relationships with temperature increase, impacting risk significantly.
  11: Heat stress on maize is projected to increase significantly in Russia and the
    EU+UK. Maize yield reductions could be significantly greater under NDC Pledges
    scenario compared to a 2C warming scenario.
  12: Higher transition risk metrics in the USA and EU+UK for the NDC pathway by 2030
    compared to the 2C Central scenario.
  13: Differences in technology and sector-specific dynamics reflect varying pathways
    toward meeting temperature targets, emphasizing the importance of considering
    scenario-specific features in risk assessments.
  14: Inter-model diversity impacts results; Single-model analysis can be situated
    within the broader ensemble of mitigation pathways; Regionally uncoordinated socio-economics
    provides a source of significant 2030 transition risk variation.
  15: Long-term physical climate-related damages influence present-term asset devaluations.
  16: Provides a framework for comparing physical and transition risks in a consistent
    manner and identifying underlying drivers of economic changes. Serves as a first
    chapter in understanding global and regional physical and transition consequences
    of different plausible emissions pathways.
