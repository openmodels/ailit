Methodology:
  4: "The analysis explores near-term transition risks up to 2030 and longer-term\
    \ physical risks to 2050 under various greenhouse gas emissions and temperature\
    \ pathways ranging from 1.5-4\xB0C."
  6: Additional data for more regions and detailed scenario descriptions are available
    in the Methods and Extended Data sections.
  9: The paper uses regional hazard and impact attributes of seven physical hazard
    indicators. Likelihoods are calculated annually and impacts are expressed as annual
    averages. Transition risks are evaluated using metrics from IAMs.
  10: The analysis uses normalized physical and transition risk metrics, comparing
    values to the 2C Central scenario in 2050 for physical risk and 2030 for transition
    risk.
  11: Comparison of risk ratios between temperature scenarios, using median estimates
    of indicators. Uncertainty ranges are determined by uncertainty in the relationship
    between temperature and the metric.
  12: Analysis is based on model-specific results from GCAM and comparisons across
    scenarios.
  14: "Broad scenario sensitivity analysis within a single model; illustrative 1.5oC\
    \ pathway sits within the range of the IPCC\u2019s SR1.5 database of 1.5oC-consistent\
    \ scenarios; 2oC-targeted pathway ensemble mostly overlaps with the possibility\
    \ space as represented in the database. Applicable to transition indicators."
  15: The analysis compares physical and transition risks and focuses on mid-century,
    with implications for policy, corporate, household, and financing decisions today.
  16: Integrated scenario analysis framework that can be expanded to financial risk
    estimates by downscaling sector-level and economy-wide outputs from IAMs to firm-
    and household-level financial risks. The analysis does not explicitly account
    for adaptation measures.
  18: "The analysis compares climate transitions under different policy and socio-economic\
    \ pathways, such as the Paris Agreement compliance (2\xB0C Central) and a variety\
    \ of SSP-based scenarios."
  19: The analysis is based on projecting physical hazard indicators by 2050 and transition
    risk indicators by 2030, though specific methodologies are not detailed in this
    excerpt.
  25: No relevant information
  26: Climate analytics, building climate-financial scenarios, climate-related financial
    risk assessments, climate transition scenarios, climate stress-test.
  27: Land-use change emissions are priced as an exogenously specified proportion
    of fossil emissions price due to regulatory frameworks.
  29: Draws from Integrated Assessment Model (IAM)-based indicators of feasibility
    of the transition. Diagnostic exercises compare major IAM characteristics.
  30: The analysis uses a probabilistic variant of the MAGICC4.2 climate model to
    incorporate leading order uncertainties into climate simulations, using emissions
    scenarios and perturbing variables such as equilibrium climate sensitivity and
    ocean mixing rate.
  31: Damage functions relating indicator to increase in global mean surface temperature,
    calculated separately from climate scenarios constructed from 23 CMIP5 climate
    models. The damage functions are combined with the probability distributions of
    change in temperature for a given emissions scenario to produce distributions
    of hazard and impact indicator in each year. Damage functions are constructed
    separately for five SSP socio-economic scenarios and at 10-year increments.
  32: Climate scenarios apply specific increases in global mean surface temperature
    to observed climate time series from 1981-2010, using pattern-scaling.
  33: Agricultural drought is assessed using the Standardised Precipitation Evaporation
    Index (SPEI), and crop yield potential is evaluated by changes in the time taken
    for maize to accumulate specific growing degree-days.
  34: The analysis includes exploring variations around socio-economic trends and
    disorderly scenarios through regional fragmentation and staged accession to a
    long-term temperature mitigation strategy.
  35: "explores plausible technology variations in the transition pathway to 2oC \u2013\
    \ focusing on either a high renewables pathway, or one with a greater role for\
    \ non-renewables (nuclear and carbon capture) technologies"
