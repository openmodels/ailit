  27: GCAM (Global Change Analysis Model), an Integrated Assessment Model (IAM) developed
    by the Joint Global Change Research Institute (JGCRI) of the University of Maryland
    and the Pacific Northwest National Laboratory. GCAM is an open-source, technology-rich
    model of the energy, economy, agriculture and land use, water, atmosphere, and
    climate systems. GCAM is a five-year time step, dynamic-recursive market equilibrium
    model which represents the global economy by disaggregating the world into 32
    geopolitical regions, 235 river basins and 384 agro-ecological land-use regions.
    GCAM version 5.1, as used in this study, is calibrated to a historic base year
    (2010), with trajectories to different temperatures in these scenarios specified
    using fossil fuel and industry CO2 constraints (and GHG constraints, in case of
    the NDCs). All emission constraints are assumed to begin in 2025 (except for the
    NDCs, which begin in 2020). GCAM uses assumptions about population growth and
    changes in labour productivity, along with representations of resources, technologies,
    and policies, and solves for the equilibrium prices and quantities of various
    energy, agricultural, and CO2/GHG markets in each five-year model period from
    2010 (the calibration year) to 2100 at different spatial resolutions. GCAM calculates
    the CO2 prices required to meet the emissions constraint imposed in each model
    period. Land-use change emissions are in addition to the constraint, and their
    price is determined as an exogenously specified proportion of the fossil emissions
    price. This is done because, whereas fossil fuels are largely a market commodity,
    much of the land use and agriculture occurs outside of regulatory frameworks in
    many countries.
