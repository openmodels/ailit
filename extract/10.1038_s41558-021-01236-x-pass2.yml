  32: "Source material here.\nmodels operating at a scale of 0.5x0.5o 14. Each model\
    \ operates on a daily time step and applies\nclimate scenarios corresponding to\
    \ specific increases in global mean surface temperature to\nobserved climate time\
    \ series70 spanning the period 1981-2010: this period is used to define the\n\
    current reference climate. The scaled climate scenarios were constructed using\
    \ pattern  -scaling71. It is\nassumed that each damage function is equally plausible.\n\
    Two heatwave indicators represent different magnitude heatwaves: one defines a\
    \ heatwave as\noccurring when at least two days exceed the 95 th percentile of\
    \ daily temperatures over the 3-month\nwarm season during the 1981-2010 reference\
    \ period (this occurs in around 35% of years on\naverage), and the other requires\
    \ at least four days exceeding the 99th percentile (this occurs in less\nthan\
    \ 5% of years). Hazard is expressed as an annual likelihood (therefore acute risk),\
    \ and regional\naverage likelihood at a point is calculated by averaging over\
    \ all grid cells with more than 1000\npeople. The average annual number of people\
    \ exposed to heatwave (a chronic risk) for a given year\nand SSP is determined\
    \ by multiplying heatwave frequency in a 0.5x0.5o grid cell by population.\nRiver\
    \ flood and water resources drought are both based on river flows simulated using\
    \ the Mac-\nPDM.09 global hydrological model72. River flood risk73 is characterised\
    \ by the frequency of the\nreference period 50-year flood (2% annual likelihood),\
    \ and the average annual number of people\nexposed to flooding is determined by\
    \ multiplying frequency by the number of people living in major\nriver floodplains\
    \ (estimated at approximately 700 million in 2010). Note that this does not include\n\
    the numbers living in smaller floodplains, but the proportional change should\
    \ be consistent. The\nregional average likelihood at a place is averaged over\
    \ all the floodplain grid cells. Water resources\ndrought risk is represented\
    \ by the Standardised Runoff Index (SRI)74, calculated here from runoff\naccumulated\
    \ over 12 months. A drought is defined as an SRI of less than -         1.5, which\
    \ occurs by\ndefinition 6.8% of the time during the 1981-2010 reference period,\
    \ and a \u2018significant\u2019 drought is a\nperiod with at least six months\
    \ with an SRI12 of less than -1.5 (which has a global average likelihood\n30\n"
  33: "Source material here.\nThe regional average annual likelihood of a \u2018significant\u2019\
    \ drought at a place is averaged over all the cells with more than 1000 people.\
    \ Impact is characterised as the average annual number of people affected by a\
    \ \u2018significant\u2019 drought. Agricultural impacts are represented by three\
    \ indicators. Agricultural drought is calculated using the Standardised Precipitation\
    \ Evaporation Index (SPEI)75, accumulated over 6 months. A \u2018significant\u2019\
    \ drought occurs when there are at least three months with an SPEI6 of less than\
    \ -1.5, and drought likelihood is the annual chance of experiencing such an event.\
    \ The regional average likelihood at a point is averaged over cells with cropland\
    \ (the global average likelihood is around 9-10%). Drought impact is characterised\
    \ as the average annual area of cropland affected by \u2018significant\u2019 drought.\
    \ Change in crop yield potential is represented by change in the time taken for\
    \ maize to accumulate a specific number of growing degree-days (actually the reference\
    \ period (1981-2010) mean). A shorter growing period means less time for grain\
    \ to fill and, as a first approximation, potential yield reduces in proportion\
    \ to the percentage reduction in growing period (note that in water-limited regions\
    \ the effects of changes in drought are likely to be more significant for yields\
    \ than the effect of higher temperatures on potential yield) . The impact indicator\
    \ here is the average annual area of maize cropland with a reduction in crop growth\
    \ duration of at least 10 days, which corresponds to a reduction in potential\
    \ yield of approximately 8%. The third agricultural indicator is the likelihood\
    \ of experiencing at least five days with damaging temperatures (above 36 oC)\
    \ during the maize reproductive phase. The regional average likelihood at a point\
    \ is calculated by weighting by maize cropland area (the global average likelihood\
    \ is around 5%, but there is considerable variability between regions), and impact\
    \ is calculated as the regional annual average area of maize cropland affected.\n"
