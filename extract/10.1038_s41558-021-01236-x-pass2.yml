  5: 'Source material here.

    "A truly integrated assessment of pathways is therefore warranted. Surprisingly,
    there is relatively little literature which simultaneously assesses both the transition
    and physical risks of different emissions pathways."

    "This sequencing, whilst logical, nevertheless separates analysis around physical
    implications of increased warming from the economic and societal implications
    of limiting warming. This makes it difficult for policy makers, corporations,
    financial institutions and other users to interpret in a holistic way the implications
    and risks of different pathways."

    '
  6: "Source material here.\nunderlying socio-economics, technological options, timing\
    \ of mitigation action, policy implementation in different world regions and the\
    \ resulting temperature change and physical risk outcomes. Here we present a fully\
    \ integrated framework to undertake a self-consistent analysis of physical and\
    \ transition risks stemming from scenarios spanning 1.5-4\xB0C temperatures and\
    \ encompassing a broad range of transition dynamics, that complements and expands\
    \ on the NGFS scenarios (See Methods). We combine a technology-rich, regionally\
    \ disaggregated IAM representing energy system, agricultural and land-based greenhouse\
    \ gas emissions, a reduced complexity climate model to simulate probabilistic\
    \ global temperature changes over the 21st century, and a suite of impacts models\
    \ to estimate regional climate-related physical hazards and impacts deriving from\
    \ the temperature change pathways and their underlying socio-economics (See Methods\
    \ and Extended Data Figure 1). Our scenarios and their presentation of both physical\
    \ and transition risk in a concise, integrated framework should be of significant\
    \ utility to multiple stakeholders. Our presentation of results is focused on\
    \ the world as a whole and four key regions (China, USA, EU+UK and India), with\
    \ additional results for additional major regions (Brazil, Japan, Middle East,\
    \ Russia and Sub-Saharan Africa) presented in Extended Data and Supplementary\
    \ Information (and referenced in the main manuscript where appropriate).\n"
  8: 'The page provides an overview of temperature changes associated with different
    emissions scenarios across the 21st century for two groups of the 11 scenarios:
    the first group spans long-term temperature targets of 1.5oC, 2oC, 2.5oC, 3oC
    (NDC Pledges) and 4oC (No Policy); the second set is targeted at meeting a 2oC
    level of 2100 warming with 50% likelihood. The No Policy scenario, with coal,
    oil and gas demand growing by 72%, 58% and 143% respectively over the period 2020-2100,
    sees temperatures rise to 4.3oC by 2100. The NDC Pledges scenario presents a more
    realistic picture of current ambitions, with median temperature projections rising
    to 3.1oC by 2100, on the basis of initial Paris pledges and maintaining a similar
    level of mitigation after 2030. The 1.5C scenario peaks at 1.7oC around 2050,
    before returning to below 1.5oC by 2080 and down to 1.3oC by 2100.'
  9: 'Source material here.

    Several metrics of physical risk have been presented in the climate change literature,
    relating to major impacts from climate change, categorised as either gradual3
    and chronic23, or acute3 and extreme event-driven23. We utilise regional hazard
    and impact attributes of seven physical hazard indicators, measuring: heatwave,
    major heatwave, hydrological drought and river flooding annual likelihoods; agricultural
    drought and maize heat stress annual likelihood; and change in maize crop duration
    (see Methods and Table 2 for details and rationale). These indicators are calculated
    at the 0.5x0.5o resolution and averaged to the regional scale, and represent the
    regional average likelihood or change in duration at a point in the region. The
    indicators expressed as likelihoods can be interpreted as acute risks, since they
    characterise the chance of an extreme event happening each year, whilst the average
    annual change in crop growth duration is a chronic risk. Impacts deriving from
    these hazards, which we also report (Supplementary Figures S4.1-S4.10) are expressed
    as annual averages, so characterise chronic risks. For transition risks, we utilise
    readily-available metrics from IAMs to capture the most salient transition risk-related
    variables.

    '
