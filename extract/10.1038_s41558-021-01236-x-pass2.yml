  30: 'yaml

    Methodology: "The temperature outputs from GCAM version 5.1 are deterministic,
    without representation of climate system uncertainties. In this study we include
    leading order uncertainties into the climate simulations by running each emissions
    scenario through a probabilistic variant of the MAGICC4.2 simple climate model.
    This is an upwelling-diffusion ocean coupled to an atmosphere layer and a globally
    averaged carbon cycle model which has demonstrated skill in reproducing the surface
    temperature response of a wide range of more complex models. In the configuration
    used here12, the uncertainty in temperature response is sampled by perturbing
    the equilibrium climate sensitivity, the ocean mixing rate (which determines how
    quickly the warming at the surface is diffused throughout the ocean) and a measure
    of the climate-carbon cycle feedback strength (regulating how much carbon is emitted
    and absorbed naturally in response to climate change)."

