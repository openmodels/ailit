  26: "Source material here: \nDoes climate change lead to greater food insecurity?\
    \ This is a difficult question to answer. Food security might be compromised at\
    \ the regional level, but not at the global level, or it might be compromised\
    \ at both scales. Increasing concentrations of atmospheric CO2 can improve agricultural\
    \ productivity, enabling crops to better utilize nutrients, including water. Higher\
    \ levels of CO2 also make crops less susceptible to drought. While droughts might\
    \ increase in some regions of the globe, overall a warmer atmosphere holds more\
    \ moisture leading to increased rainfall. Nonetheless, there remains a fear that,\
    \ as temperatures continue to rise with increasing CO2, the CO2-fertilization\
    \ effect will be offset by too much heat. What can be gathered from the present\
    \ analysis is the fact that the CO2-fertilization effect is prominent and is not\
    \ being properly accounted for elsewhere. The negative impacts of global warming\
    \ on food security is likely overstated as a result of overlooking CO2 as a determinant\
    \ of crop yields. In the same sense that farmers pump CO2 into greenhouses to\
    \ create an artificial environment, the globe will likely start to resemble these\
    \ optimal environments as time progresses. This would not explain why industrial\
    \ farming techniques include consistently pumping CO2 into greenhouses to amplify\
    \ the yields of these crops, leading us to believe that global CO2 is simply not\
    \ a good enough proxy for identifying crop-specific regional effects on crop yields.\n"
  27: "Source material here: \"Notice that the report does not suggest that crop yields\
    \ will fall; rather, U.S. crop yields are expected to continue trending upwards,\
    \ but productivity growth will be below what it would be in the absence of climate\
    \ change. The U.S. National Climate Assessment report (USGCRP 2018) projects that,\
    \ by mid- century (2036- 2065), crop yields will decline by \u201C5% to over 25%\
    \ below extrapolated trends broadly across the region for corn, and more than\
    \ 25% for soybeans in the southern half of the region.\u201D Yet, the majority\
    \ of scientists believe that at higher temperatures, the adverse effect of heat\
    \ on crop yields will eventually offset the benefits of CO2 fertilization. New\
    \ weather-indexed insurance products are increasingly becoming available, which\
    \ will incentivize farmers to adapt to climate change by taking risks pertaining\
    \ to new crops and cropping methods (Kramer and Ceballos 2018). Global positioning\
    \ satellites (GPS) can be used to guide equipment movement, while drones can be\
    \ used to identify fungal and other pest invasions during the growing season,\
    \ thereby enabling swift and effective targeting of chemical and fertilizer applications\
    \ and optimal timing of harvests. New irrigation technologies that rely on swift\
    \ and timely computer analyses, and water harvesting from early-morning fog (which\
    \ occurs in some arid regions), are further.\""
