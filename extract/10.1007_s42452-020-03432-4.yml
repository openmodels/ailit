Highlights:
  4: The threat of food insecurity is overstated.
  7: Temperatures in Africa are on average higher than those elsewhere. The annual
    variation in temperatures exceeds the overall increase in temperatures over the
    period.
  8: The analysis highlights an overall increasing trend in crop yields, with Europe
    showing the highest increase in rapeseed yields, and all crops showing a general
    upward trend in yields over the period.
  10: Developed countries are better able to adapt agricultural output to climate
    change than developing countries, due to more intensive use of inputs and better
    adaptation technologies.
  11: Climate change was already exerting a considerable drag on yield growth, with
    impacts often exceeding 10% of the rate of yield change.
  12: The study extends previous studies by considering temperature, CO2, technological
    advances, and other adaptations in regression models, presenting a clearer picture
    of future food security.
  17: The coefficients on CO2 and temperature are positive and statistically significant
    for wheat, while the quadratic and interaction terms are negative and statistically
    significant.
  18: Finds that CO2 and temperature have diminishing returns on wheat yields, and
    CO2 impact on maize yields is weak with no significant linear or quadratic terms,
    but yields increase with higher temperatures.
  19: Soybean yields show positive response to CO2 but diminishing returns are observed,
    while rapeseed yields improve with temperature but have ambiguous responses to
    CO2.
  20: Rice's response to temperature and CO2 is difficult to measure accurately with
    this methodology, possibly due to being submerged in water. Sorghum's response
    to temperature and CO2 is similar to other crops (except rice), with interaction
    effects indicating that CO2 fertilization is less effective at higher temperatures
    and vice versa.
  21: Temperature has the expected impact on crop yields; rice has the most severe
    diminishing returns based on the interaction term. Tipping points represent the
    levels of CO2 and temperature at which further increases lead to falling crop
    yields.
  22: Provides marginal effects of CO2 and temperature on crop yields and a methodology
    to calculate tipping points for CO2 and temperature.
  24: Higher CO2 concentrations generally lead to higher yields, up to a point, and
    yields generally increase with temperature up to an optimum before declining.
    The optimum temperature is shifted to higher temperatures with increased CO2 concentration.
  25: As CO2 levels increase, there is an initial increase in crop yields, with different
    optimal temperatures for maximum yield, varying by crop. However, beyond certain
    CO2 concentrations, yield response diminishes or plateaus, also dependent on temperature.
  26: The CO2-fertilization effect is prominent and may be overlooked. The negative
    impacts of global warming on food security is likely overstated as a result of
    overlooking CO2 as a determinant of crop yields. Higher levels of CO2 also make
    crops less susceptible to drought. A warmer atmosphere holds more moisture leading
    to increased rainfall.
  27: U.S. crop yields are expected to continue trending upwards, but the rate of
    productivity growth will be below potential due to climate change.
Methodology:
  4: Fixed-effects panel regression model based on CO2 levels measured at Mauna Loa,
    Hawaii, and weighted-average temperatures in each country.
  6: 'The study examines the effect of changes in atmospheric CO2 and temperature
    on crop yields in the past and attempts to predict future impacts. It focuses
    on six main cereal crops: wheat, rice, maize, rapeseed (canola), soybean, and
    sorghum.'
  7: "Uses FAO crop yield data and Berkeley Earth Surface Temperature (BEST) data\
    \ series (1961-2018) to construct historical annual temperatures by crop and continent,\
    \ spatially-weighted by a continent\u2019s countries that are in the global top-twenty\
    \ producing countries of the crop in question."
  10: Statistical methods are used to determine past yield responses to increases
    in atmospheric CO2 and climate/weather variables, and these relationships are
    used to project yield responses to future changes.
  11: The analysis used first differences in yield, with temperature and precipitation
    as explanatory variables, and performed panel analyses of maize, wheat, rice,
    and soybean at the country level.
  12: Regression models considering temperature, CO2, technological advances, and
    other adaptations are used to examine the inferred impact of climate change on
    observed yield trends at the country level for the period 1961-2013. Spatially-weighted
    temperatures and interaction effects between CO2 and temperature are included.
  14: Uses spatially-weighted, location-specific temperature data for large countries
    and national average temperature for smaller countries. Production-weighted temperatures
    are used for crops within regions. CO2 data is assumed to be uniformly distributed.
    Uses the Penn World Table database for socio-demographic characteristics. USDA
    production maps are used to identify the proportion of production by area of each
    crop. The total production percentages are adjusted to 100% if the initial sum
    is less than 100%.
  15: Challenges in data accuracy include rough approximations of crop production
    and national average temperatures as well as the use of annual temperature data
    disregarding actual growing seasons.
  16: Fixed effects panel regression model. Exploits variation across time periods
    within countries and between countries. Controls for time-invariant regressors
    that are excluded from the model.
  17: The model includes linear and quadratic terms to utilize within- and across-country
    differences in weather.
  18: Utilizes regression analysis with different control variables to assess the
    impact of CO2 and temperature on wheat and maize yields.
  19: Regression analysis is performed to evaluate the influence of CO2 and temperature
    on soybean and rapeseed yields, with controls for GDP/capita and human capital.
  20: Regression models are used to analyze the relationship between temperature,
    CO2, and crop yields. The applicability and limitations depend on the crop. The
    CO2 measure is country-invariant.
  21: Regression analysis is used to model the relationship between CO2, temperature,
    and crop yields for rice and sorghum. Marginal effects are then calculated and
    evaluated at average CO2 and temperature levels. Tipping points are computed by
    setting first-order partial derivatives to zero.
  22: Marginal effects are derived from regression models (columns (3) and (6) in
    Tables 4, 5, and 6). Tipping points are estimated using averages computed from
    the regression models. Equations for calculating tipping points for CO2 and temperature
    are provided.
  24: The analysis involves plotting crop yields against temperature for different
    CO2 concentrations to observe the relationship between these variables.
More Notes:
  4: The study aims to examine the quantitative relationship between CO2 and temperature
    on crop yields.
  7: The countries comprising the spatially-weighted continental averages changes
    from one crop to the next and perhaps even from one year to the next.
  12: Uses crop yield data from the top twenty producers of each crop from the Food
    and Agriculture Organization (FAO) of the United Nations.
  14: The assumption of uniformly distributed CO2 is acknowledged as a strong assumption
    due to data limitations.
  16: Acknowledges limitations due to lack of data on different crop cultivars and
    planting times. Acknowledges the assumption that CO2 levels are uniformly distributed
    is strong and that results depend on how quickly and evenly CO2 spreads throughout
    the atmosphere.
  20: "The relatively low R\u0305 2 values for soybean and rapeseed suggest missing\
    \ variables in their models."
  21: The analysis includes squared terms for CO2 and temperature, as well as an interaction
    term, suggesting non-linear relationships. Models (3) and (6) in Tables 4-6 are
    'fully-specified,' but the parameters are not all provided on this page, instead
    a reference to Table 7 is provided. The models control for GDP/capita and human
    capital in some specifications.
  22: Underlined parameters indicate statistical insignificance at the 10% level.
    The effect of CO2 (temperature) can be evaluated at the average level of temperature
    (CO2) to isolate the main effects.
  24: 'The text notes an inconsistency: a calculated ''tipping point'' for wheat yields
    does not align with observed real-world crop yield increases.'
  26: The paper suggests that global CO2 concentration is not a good proxy for identifying
    crop-specific regional effects on crop yields.
  27: There is a focus on the potential role of technology in mitigating the impacts
    of climate change on agriculture.
