  20: "Source material: \"impact on the value of the estimated linear CO 2 parameter.\
    \ Finall y, the statistical fits of the overall regression models (R\u0305   \
    \             2) for soybean and rapeseed are nearl y half those of wheat and\
    \ maize, further implying that there may be excluded variables that affect soybean\
    \ and rapeseed yields. Finally consider the regression results for rice and sorghum\
    \ in Table 6. Rice appears to be sensitive to increasing temperatures, but the\
    \ CO2   terms are statistically significant (save for the interaction between\
    \ CO2      and temperature) and the linear term for temperature is statistically\
    \ insignificant. Surface air temperature may, however, be an inappropriate regressor\
    \ in the determination of rice yields, perhaps because paddy rice grows partially\
    \ submerged in water. Coupled with the country-invariant CO2   measure, we do\
    \ not believe we can accurately measure this relationship for rice yields. As\
    \ for sorghum, all coefficients reflect their expected signs and are similar to\
    \ those found for other crops (except rice). The only statistically insignificant\
    \ estimate is on the quad  ratic term for temperature; however, its magnitude\
    \ is not dissimilar to previous regressions. All interaction effects in the sorghum\
    \ regression are negative and statistically significant, suggesting that the CO\
    \   2 fertilization is less effective at higher temperatures. Likewise, the effect\
    \ of an increase in temperature also diminishes at higher levels of atmospheric\
    \ CO 2.\""
