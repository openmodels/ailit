  10: 'yaml

    Evaluation overview: "investigate the impact of CO2 and temperature on crop yields
    and develop statistical methods to determine how past yields have responded to
    increases in atmospheric CO2 and climate/weather variables."

    Drivers of Risk: "increases in atmospheric CO2 and climate/weather variables"

    Methodology: "develop statistical methods to determine how past yields have responded
    to increases in atmospheric CO2 and climate/weather variables. The estimated relationships
    are then used to determine the yield response to changes in projected CO2 and
    temperatures (heat)."

    Highlights: "Developing countries are the least able to adapt to climate change
    and the agricultural sector in those countries is expected to be impacted more
    than that in developed countries. Developed countries are simply better able to
    adjust agricultural output in response to climate change through the use of irrigation,
    new crops or enhanced crop varieties (including geneticall y-modified varieties),
    information technology (e.g., drones that target specific weed infestations as
    opposed to broadcasting herbicides), improved farm management techniques, et cetera.
    Developed countries simply employ more inputs, more intensively than can farmers
    in developing countries."

    '
  11: Lobell and Field used first differences in yield, with minimum and maximum temperatures,
    and precipitation, as explanatory variables. They found that at least 29% of the
    variance in year-to-year yield changes was explained by the predictors for all
    crops. Subsequently, Lobell et al. (2011) examined the impact of climate change
    on crop yields at the country level for the period 1980 to 2008. [...] They found
    that climate impacts often exceeded 10% of the rate of yield change, which indicated
    that climate changes were already exerting a considerable drag on yield growth.
    Like the earlier study, Lobell et al. (2011) did not consider the impact of CO2
    fertilization and other factors such as technological advances in their statistical
    models.
  12: The current study extends previous studies by considering temperature, CO2,
    technological advances, and other adaptations in our regression models, thus presenting
    a clearer picture of future food security. In particular, we examine the inferred
    impact of climate change on observed yield trends at the country level for the
    period 1961-2013 (the latest year for which complete FAO data were available).
    We also include spatially-weighted temperatures at country levels, and the interaction
    effects between CO2 and temperature. Historical data on crop yields from the Food
    and Agriculture Organization (FAO) of the United Nations are used to examine the
    impact of CO2 and temperature on crop yields across countries. We employ crop
    yield data from the top twenty producers of each crop along with...
