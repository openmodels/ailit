  15: "Source material here.\n\"Several modifications were made to the data to capture\
    \ these and other extraneous factors that might have impacted yields: a) The USSR\
    \ disintegrated into fifteen separate states in 1991. We employ data for the USSR\
    \ for the period 1961-1991, and data for the Russian Federation for 1992-2017,\
    \ both under the rubric of Russia. b) Ethiopia data consist of information for\
    \ the Ethiopian PDR for 1961-1992, and Ethiopia for 1993-2017. c) China is treated\
    \ as a single entity referring to the mainland only, and ignoring data for Taiwan.\
    \ d) South Sudan is ignored completely. e) Serbia and Montenegro are removed as\
    \ a combined country and treated as separate entities. f) Yugoslav SFR is ignored\
    \ as it no longer exists.\"\n\"There are some challenges that could reduce the\
    \ accuracy of our results. First, the production map provided by the USDA is a\
    \ rough approximation of crop production and national average temperatures for\
    \ most countries. Based on geographic area, we determine which countries\u2019\
    \ regional data to use and which national average data are based on whether the\
    \ country exhibits a lot of variation in temperature. Second, we use annual temperature\
    \ data that do not adequately consider the actual growing seasons for various\
    \ crops. For example, in some countries two or more crops can be grown annually\
    \ on the same parcel of land, but not in other countries.\"\n"
  16: "Third, there are different varieties (cultivars) of the same crop. Crops such\
    \ as wheat and rapeseed may be planted in fall (referred to as winter wheat/rapeseed)\
    \ or spring; fall plantings spread machine operations to save costs and provide\
    \ an impetus to plant growth in early spring, but run the risk that the crop is\
    \ killed over winter. Different cultivars and planting times can lead to dissimilar\
    \ responses to climate. Given lack of data, we are unable to account for these\
    \ factors. Finally, as indicated above, the assumption that levels of CO2 are\
    \ uniformly distributed across all global regions is rather strong. The CO2 data\
    \ are provided by NOAA\u2019s Carbon Cycle Group and uses measures of monthly\
    \ mean CO2 measured at the Mauna Loa Observatory in Hawaii. Our results depend\
    \ on how quickly and evenly CO2 spreads throughout the atmosphere. 2.3 Fixed Effects\
    \ Panel Regression Model For each crop, we employ the following regression model:\
    \ Yit = \u03B2 0 + \u03B2 1 CO2 + \u03B2 2 Tit + \u03B2 3 CO 22 + \u03B2 4 Tit2\
    \ + \u03B2 5 CO 2\xD7Tit +\u2211k X ,kit+ \u03B3 t + \u03B6 t + u it, k= \u03B1\
    1 where Y it refers to the yield in country i at time t ; CO2 refers to the average\
    \ annual level of carbon dioxide in the atmosphere; Tit is the annual temperature\
    \ (\xB0C) in country i in year t; Xk,it refers to one of K socio-demographic control\
    \ variables; \u03B2j (j=1, \u2026, 5) and \u03B1 k (k=1, \u2026, K ) are parameters\
    \ to be estimated; \u03B3 t and \u03B6t are the time and country fixed effects,\
    \ respectively; and u it is the error term that accounts for any variation caused\
    \ by omitted variables. Quadratic terms for temperature and CO2, as well as an\
    \ interaction term, reflect inherent and expected nonlinearities, even though\
    \ these are not statistically significant for all crops. We utilize a fixed effects\
    \ regression model to exploit variation across time periods within countries and\
    \ between countries. This allows us to examine how crop yields have changed. The\
    \ essence of fixed effects is that they control for time -invariant regressors\
    \ that are excluded from the model. In the current context, this would include\
    \ whether a country has a tropical or temperate"
  17: "Source material here.\n\"To estimate the regression equations, we developed\
    \ statistical programs written in R (R Core Team 2019, version 1.1.463) and Stata\
    \ (StataCorp 2019, version 15.1).\" \n\n\"...the fixed-effects model utilizes\
    \ both within- and across-country differences in weather (Lobell et al. 2011).\"\
    \n\n\"In each of the regressions reported in the table, the signs on the coefficients\
    \ on CO2 and temperature are positive and statistically significant, while those\
