sourcematerial:
  4: "Source material here: \n\"Our purpose is to examine the quantitative relationship\
    \ between CO2 2 and temperature on crop yields and to explore food security or\
    \ insecurity in the presence of climate change.\" \n\"The model is based on CO2\
    \ levels measured at Mauna Loa, Hawaii, and weighted-average temperatures in each\
    \ country in corresponding years. We also incorporate other socio- economic factors,\
    \ including purchasing power parity adjusted gross domestic product (PPP GDP)\
    \ and education levels measured by Human Capital Index (HCI),that might affect\
    \ crop yields. In addition, we control for other factors such as technological\
    \ changes that contribute to increased yields.\" \n\"To do so, we perform a historical\
    \ analysis on the crop yield trends in 57 selected countries from 1961 to 2013\
    \ on a yearly basis employing a fixed-effects panel regression model.\" \n\"To\
    \ do so, we perform a historical analysis on the crop yield trends in 57 selected\
    \ countries from 1961 to 2013 on a yearly basis employing a fixed-effects panel\
    \ regression model. The model is based on CO2 levels measured at Mauna Loa, Hawaii,\
    \ and weighted-average temperatures in each country.\" \n\"We conclude that the\
    \ threat of food insecurity is overstated.\"\n"
  5: "  \n\"Is climate change a threat to food security?\"  \n\"It is generally agreed\
    \ that a greater concentration of atmospheric CO2 can result in a fertilization\
    \ effect that increases crop yields, but it is also the case that, while more\
    \ heat (higher temperatures) can benefit plant growth, yields will eventually\
    \ fall as temperatures continue to rise.\"\n\"Based on continuous measurements\
    \ at Muana Loa, Hawaii, atmospheric CO2 has risen from 316.0 parts per million\
    \ by volume (ppm) in 1959 to 408.5 ppm in 2018. Projections indicate that the\
    \ CO2 concentration could increase to some 500 to 1,300 ppm by 2100.\"\n"
  6: 'Source material here.

    Estimating a correct relationship between crop yields and climate variables is
    a crucial first step in addressing questions about food security. Therefore, the
    purpose of the current study is to examine the effect that changes in atmospheric
    CO2 and temperature have had on crop yields in the past, and what this might imply
    for the future. Based on our estimated relationship, we attempt to answer the
    question of whether food insecurity is an imminent threat. We focus on six main
    cereal crops: wheat, rice, maize, rapeseed (canola), soybean and sorghum.

    '
  7: "Source material here.\nThe response of the yields of the six crops to projected\
    \ changes in atmospheric CO2 and temperature is indicative of potential future\
    \ food insecurity. Using FAO crop yield data, we...\n\nIn Figure 2, we plot the\
    \ average of the annual yields of the top twenty producers of each crop; the data\
    \ indicate that yields of all six crops in the major producing countries have\
    \ increased significantly since 1961...\n\nThen, we use the Berkeley Earth Surface\
    \ Temperature (BEST) data series (Berkeley Earth 2019) to construct historical\
    \ annual temperatures by crop and continent, spatially-weighted by a continent\u2019\
    s countries that are in the global top-twenty producing countries of the crop\
    \ in question...\n\nTemperatures are provided on a continent basis for each crop\
    \ in Figure 3 for the period 1961-2018. Notice that temperatures in Africa are\
    \ on average higher than those elsewhere. Further, the annual variation in temperatures\
    \ exceeds the overall increase in temperatures over the period...\n\nThis is an\
    \ artefact of the method used to calculate the temperatures: the average surface\
    \ temperatures of the top 20 producing countries of each crop are employed. This\
    \ implies that the countries comprising the spatially-weighted continental averages\
    \ changes from one crop to the next and perhaps even from one year to the next.\n"
