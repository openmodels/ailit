  4: "Almost all countries (98%) see their SCC increase. [...] The SCC is at least\
    \ doubled in roughly 10% of sample runs. This suggests that tipping points have\
    \ consequences for the overall level of risk borne by the world economy in the\
    \ future [...] While the size of the increase varies from country to country,\
    \ tipping points do not materially alter how climate change affects income inequality.\
    \ One way to measure this is by computing the Gini coefficient of national SCCs.\
    \ We calculate this to be 0.64 when tipping points are included, compared with\
    \ 0.66 without tipping points. Another way to measure this is the correlation\
    \ (population weighted) between national GDP per capita [...] and national SCCs.\
    \ This correlation is \u22120.326 in the absence of tipping points; more developed\
    \ countries experience a lower SCC, and the impacts of climate change are thus\
    \ regressive. Tipping points increase this negative correlation only very slightly\
    \ to\u22120.335. SI Appendix, section 3.3 plots the effect on national SCCs of\
    \ each individual tipping point. Fig. 3... compares the distribution of global\
    \ mean consumption per capita in 2050 and 2100 with and without tipping points.\
    \ The eight tipping points not only reduce global mean consumption per capita,\
    \ but also, they significantly increase the dispersion. Therefore, tipping points\
    \ increase future consumption risk. Across all parametric and scenario uncertainties,\
    \ we estimate an expected increase in the SCC of 42.8% due to climate tipping\
    \ points. We estimate a 95% CI of \u22120.3 to +186.0%. The distribution is positively\
    \ skewed. [...] Fig. 4... The SCC... tends to be higher in hotter, poorer regions,\
    \ such as Southeast Asia and sub-Saharan Africa. Some colder, high-latitude countries\
    \ in the Northern Hemisphere see a negative SCC (i.e., net benefits from climate\
    \ change). This is consistent with econometric evidence on temperature; however,\
    \ note that our results also include damages from SLR, increasing relative costs\
    \ in some countries. [...] production and productivity and what output is actually\
    \ achieved. This has been the traditional approach in climate economics. The second\
    \ interpretation is that temperatures entirely impact the growth rate of income\
    \ by directly impacting the accumulation of factors of production and/or by impacting\
    \ productivity growth. Our main specification is an intermediate value of \u03D5\
    \ =0  .5. In addition to aggregate economic risk, tipping points might affect\
    \ the distribution of climate impacts. We exploit the country-level resolution\
    \ of our meta-analytic IAM to analyze this, estimating national SCCs. Across all\
    \ parametric and scenario uncertainties, we measure this by computing the Gini\
    \ coefficient of national SCCs."
