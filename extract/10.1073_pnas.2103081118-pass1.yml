    10% chance of climate tipping points more than doubling the SCC.\"  \nMethodology:\
    \ \"We provide unified estimates of the economic impacts of all eight climate\
    \ tipping points covered in the economic literature so far using a meta-analytic\
    \ integrated assessment model (IAM) with a modular structure.\"  \nHighlights:\
    \ \"The tipping points with the largest effects are dissociation of ocean methane\
    \ hydrates and thawing permafrost.\"  \n"
