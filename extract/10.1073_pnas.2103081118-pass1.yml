Correlation (population weighted) between national GDP per capita and national SCCs:
  4: -0.326 without tipping points, -0.335 with
Drivers of Risk:
  1: Climate tipping points such as thawing permafrost, ice sheet disintegration,
    changes in atmospheric circulation, and dissociation of ocean methane hydrates.
  3: Tipping points affecting the SCC include permafrost carbon feedback, ocean methane
    hydrates, sea ice and snow area changes, and abrupt changes in major ice sheets
    and ocean currents.
  4: Climate tipping points, temperature, sea level rise (SLR).
  5: Tipping points including disintegration of the Greenland and West Antarctic Ice
    Sheets (GIS and WAIS), permafrost carbon feedback, dissociation of ocean methane
    hydrates, and slowdown of the Atlantic Meridional Overturning Circulation (AMOC).
    Also, sea-level rise (SLR) and temperature increases driven by greenhouse gas
    emissions (GHG).
  7: Climate tipping points such as the AMOC slowdown, SAF weakening, permafrost and
    ocean methane release, and SLR driven by temperature increases are discussed as
    risk drivers.
Evaluation overview:
  1: Provides an overview of the economic impacts of climate tipping points, particularly
    their effect on the social cost of carbon.
  3: This page evaluates the impact of various climate tipping points on the Social
    Cost of Carbon (SCC), including changes in economic activity due to these tipping
    points.
  4: This paper evaluates the economic impacts of climate tipping points, particularly
    on the Social Cost of Carbon (SCC) and global consumption.
  5: Welfare changes normalized to global mean consumption per capita and the Social
    Cost of Carbon (SCC) at the country level.
  7: The paper evaluates the economic impacts of climate tipping points on the social
    cost of carbon (SCC) and introduces a method of augmenting the damage function
    in integrated assessment models (IAMs).
Expected increase in SCC due to climate tipping points:
  4: 42.8% (95% CI of -0.3 to +186.0%)
Gini coefficient of national SCCs:
  4: 0.64 with tipping points, 0.66 without
Highlights:
  1: Tipping points with the largest effects are dissociation of ocean methane hydrates
    and thawing permafrost; climate tipping points increase global economic risk.
  3: Collectively, tipping points increase the expected SCC by 24.5%; positive interactions
    among costly tipping points further increase the SCC by an additional 1.3 percentage
    points.
  4: ''
  5: Tipping points increase temperature and SLR. The initially greater temperature
    response is primarily due to dissociation of ocean methane hydrates and to a lesser
    extent, the permafrost carbon feedback.
  7: Climate tipping points increase overall economic costs and risk in the global
    economy, leading to a higher expected social cost of carbon (SCC).
Increase in coefficient of variation of global mean consumption per capita due to tipping points:
  4: 79% in 2050, 34% in 2100
Methodology:
  1: Analysis is performed using a meta-analytic integrated assessment model (IAM)
    with a modular structure, incorporating climate damages at the national level
    for 180 countries.
  3: The evaluation uses a meta-analytic Integrated Assessment Model (IAM) with 10,000
    Monte Carlo simulations and variability analysis for parametric uncertainty and
    risk aversion.
  4: ''
  5: Monte Carlo simulations with a sample size of 10,000 and 0.1% trimmed. Uses RCP4.5-SSP2
    emissions and GDP/population growth, Hope and Schaefer PCF, Whiteman et al. beta
    OMH, and IPSL AMOC hosing. A reduced-form climate tipping points damage function
    is developed and fit with a second-order polynomial.
  7: The analysis uses a meta-analytic Integrated Assessment Model (IAM) with scenarios
    from RCP/SSP databases extended beyond 2100 and employs the FAIR model for atmospheric
    chemistry and warming.
  8: Uncertainty quantification is performed using triangular distributions for elasticity
    of marginal utility of consumption and pure rate of time preference.
More Notes:
  4: The study acknowledges uncertainty surrounding the parameters and scenarios,
    and explores the sensitivity of results to different assumptions.
  5: Country-level impacts for temperature-related tipping points depend on whether
    a country is above or below its optimum temperature, and for the permafrost carbon
    feedback and slowdown of the Atlantic Meridional Overturning Circulation (SAF),
    there is a clear association with latitude. AMOC slowdown benefits Europe, while
    parts of central Asia see increased climate damages.
  7: The analysis includes national-level damage functions and explores the interaction
    between temperature and economic damages, highlighting uncertainties and missing
    impacts.
Quantitative material:
  1: Climate tipping points increase the social cost of carbon (SCC) by approximately
    25% in the main specification and there is an estimated 10% chance they more than
    double the SCC.
  3: The analysis provides percentage increases in the SCC due to individual tipping
    points, ranging from -1.7% (SAF) to 13.1% (ocean methane hydrates), and collectively
    resulting in a 24.5% increase.
  4: ''
  5: "Tipping points reduce global consumption per capita by around 1% upon 3\u25E6\
    C warming and by around 1.4% upon 6\u25E6C warming, based on a second-order polynomial\
    \ \uFB01t of the data.  In some runs, damages exceed 4%. 2\u25E6C warming in the\
    \ absence of tipping points corresponds to 2.3 \u25E6C warming in the presence\
    \ of tipping points. Some model runs add as much as 1.5 \u25E6C additional warming."
  7: No specific quantitative results are reported on this page.
