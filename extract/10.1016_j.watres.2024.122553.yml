  4: 'Source material here.

    Methodology: "The analysis uses time series forecasting models, including Linear
    Regression (LR), Random Forest (RF), and Long Short-Term Memory (LSTM) networks,
    to predict future values based on past observations and additional variables such
    as CHLA and TEMP."

    - "The autoregressive and multivariate versions of three types of time series
    forecasting models, ranging from classic to state-of-the-art models, were selected
    and compared in terms of interpretability and performance."


    Methodology: "Data was split into training and test sets to include periods of
    significant data patterns, specifically cyanobacterial blooming periods."

    - "Each time series was divided into two identical portions (50/50, before and
    after the 1st of January 2013) in order to construct the training and test datasets.
    While it is a good practice to split the data around 60/40 or 70/30 for training
    and testing, respectively, the 50/50 split was chosen to include, within the testing
    set, the blooming period of October 2013..."


    Methodology: "The Random Forest algorithm was used for its robustness in handling
    noisy data and outliers, and it was trained on data from the previous 12 days."

    - "On the other hand, the RF algorithm was chosen due to its outstanding performance
    in previous forecasting tasks in literature...algorithm is designed to work with
    noisy data and outliers..."


    Methodology: "LSTM networks were used for capturing complex temporal dependencies,
    useful for forecasting cyanobacterial blooms."

    - "Finally, the LSTM Networks...which belong to the group of Recurrent Neural
    Networks...were selected as a method to introduce the most recent advances of
    time series forecasting using deep learning...capability to store information
    for higher numbers of time steps."

