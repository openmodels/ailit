    gPC/L,andaforecasting-specificmetrictomeasurepredictionimprovementoverthedisplacedsignal(skill).ThemultivariateversionofLSTMshowedthebestandmostconsistentresultsacrossallforecastinghorizonsandmetrics,achievingaccuraciesofupto90%inpredictingtheproposedPCalarmlevel.Additionally,positiveskillvaluesindicateditsoutstandingeffectivenesstoforecastcyanobacterialbloomsfrom16to28daysinadvance.\n"
  2: "Source material here.\nThe main aim of this paper is to propose an effective\
    \ EWS for forecasting cyanobacterial blooms which overcomes the limitations of\
    \ existing models. As previously mentioned, current forecasting models are often\
    \ site/species-specific, rely on incomplete surface measurements, and primarily\
    \ use CHLA as a proxy, which may not accurately represent cyanobacterial concentrations.\
    \ [...] In this context, the presented approach introduces several novel elements:\n\
    \n\u2022It is supported by non-site/species-specific models trained on data obtained\
    \ from a multiparametric probe mounted on a water column profiler instead of relying\
    \ solely on surface measurements, allowing for the monitoring of vertical distribution\
    \ patterns and their temporal variability.\n...\n\u2022It is evaluated through\
    \ a hybrid method, which combines traditional quantitative metrics with a qualitative\
    \ alert level system and a holistic skill metric, applied over multiple temporal\
    \ forecasting horizons. This approach allows for the assessment of the models\
    \ under varying environmental conditions, enhancing their interpretability and\
    \ applicability in real-world scenarios.\n"
  3: 'Source material here.

    - "TEMP represented one of the most remarkable variables influencing cyanobacterial
    blooms... integrate information on how other variables affect the water regime
    (e.g., residence time and precipitation can affect mixing regimes or stratification
    patterns)."

    - "In this way, CHLA and PC represented the variables automatically collected
    with the highest correlation to phytoplanktonic and cyanobacterial biomass."

    - "To enhance the effectiveness of PC concentration forecasting in the context
    of cyanobacterial blooms, the initial step involved an in-depth data exploration...
    descriptive statistical techniques (such as the mean, standard deviation, quantiles)
    and graphical representations (like histograms and box plots)... multivariate
    analysis, focused on Spearman correlations and time series graphical representations..."

    - "multiple cyanobacterial blooms were found (see Fig. S1 in supplementary material)
    taking place mainly in the months of September and October... October 2010 and
    October 2013... unusually high levels of PC fluorescence and being dominated by
    potentially toxic and bloom-forming cyanobacterial genera, such as Dolichospermum,
    Aphanizomenon, and Microcystis."

    - "The objectives were twofold. The first one was to construct different time
    series for each parameter using information regarding maximum values (across the
    entire water column, not limited to the photic zone) and integrated values (averaging
    all data points within the water column). The second objective was to make this
    process easily automated and replicable with data from other probes."

    - "Location of Cuerda del Pozo reservoir (Soria, Spain) and the floating platform
    probes..."

