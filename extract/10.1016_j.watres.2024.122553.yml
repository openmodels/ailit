  5: "Source material here: \"Bloom forecasting literature introduces traditional\
    \ regression evaluation metrics to evaluate the performance of the proposed models...An\
    \ alert system, built upon the regression models, was established to determine\
    \ alert levels at PC concentrations equal to or above 10 \xB5g/L. The univariate\
    \ exploration of the depth, TEMP, CHLA and PC, without their temporal context,\
    \ can be consulted in the supplementary material S4. These metrics include Mean\
    \ Absolute Percentage Error (MAPE), Mean Squared Error (MSE), and the coefficient\
    \ of determination R2...Accuracy (Acc), F1 score (F1), and Cohen\u2019s Kappa\
    \ coefficient (Kappa) were analyzed and computed, as stated in Table 1. The evaluation\
    \ was conducted using a rolling forecast approach (Liu et al., 2021) where both\
    \ past and present observations, along with the forecasting horizon, were considered\
    \ within a moving window to make predictions for the following period...All analyses\
    \ were conducted using in-house Python scripts (v3.9.2) executed within the Jupyter\
    \ Notebook environment (Perkel, 2018). Accuracy (Acc), F1 score (F1), and Cohen\u2019\
    s Kappa coefficient (Kappa) were analyzed...to assess the capability of the models\
    \ to effectively forecast the established alert level...a visual inspection of\
    \ the displayed predictions provided a qualitative assessment...we propose the\
    \ introduction of the forecast Skill Score (SS, Prado-Rujas et al., 2021), a specific\
    \ forecasting metric that measures the performance of a forecast comparing it\
    \ to a basic historical baseline of past observations. The threshold of 10 \xB5\
    g/L was chosen as a best practice to maintain dataset balance allowing for an\
    \ accurate evaluation of the forecast capability of the models...From a biological\
    \ standpoint, the chosen threshold aligns with a rational midpoint of Alert Level\
    \ 1 from the World Health Organization (Chorus and Welker, 2021; Chorus and Bartram,\
    \ 1999).\""
  6: "Source material: \"Values started increasing in spring until the end of summer,\
    \ when maximum TEMP gradient is observed. CHLA and PC levels tended to experience\
    \ abrupt increases during the spring and autumn months, respectively, associated\
    \ to blooming events. CHLA followed a similar pattern with an average of 3.4 \u03BC\
    \ g/L and maximum values above 30 \u03BC g/L. TEMP displayed a particular distribution\
    \ with three predominant ranges, a mean of 12 \xBAC, and a minimum and maximum\
    \ around 1 \xBAC and 25 \xBAC, respectively. Spearman correlation coefficients\
    \ among parameters were low (< 0.27) (Fig. S5 in supplementary material). In brief,\
    \ the final time series of maximum values consisted of the maximum values within\
    \ each 4-day interval considering data from the entire water column (Fig. 3),\
    \ while the time series of integrated values consisted of mean values within each\
    \ 4-day interval considering depths up to 24 m (Fig. 2). The temporal granularity\
    \ was finally set to a 4-day interval for both the maximum and integrated dataset.\
    \ The following section presents the results of the exploration into the best\
    \ temporal and spatial granularity, as well as the selection of the best statistical\
    \ measure for generating effective time series for cyanobacterial bloom forecasting.\""
