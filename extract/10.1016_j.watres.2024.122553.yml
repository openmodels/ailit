Drivers of Risk:
  1: Anthropogenic activities and global warming enhance cyanobacterial blooms.
  3: TEMP (water temperature) is considered a key variable influencing cyanobacterial
    blooms, integrating information on water regime factors like residence time and
    precipitation.
  5: The models predict PC concentrations, which are influenced by factors affecting
    algal bloom formation. The paper doesn't explicitly identify specific drivers
    on this page, but refers to depth, TEMP, CHLA, and PC as variables.
  6: Temperature, Chlorophyll a (CHLA), and phycocyanin (PC) levels are identified
    as parameters affecting cyanobacterial bloom forecasting.
  7: The paper discusses the impact of incorporating exogenous covariates like Chlorophyll
    a (CHLA) and Temperature (TEMP) on prediction models for timing and magnitude
    accuracy.
  8: The analysis focuses on forecasting horizons (4, 12, 20, and 28 days ahead) as
    drivers impacting the accuracy of PC concentration predictions.
  9: The driver of risk is substantial increases in phycocyanin (PC) levels.
Evaluation overview:
  1: Cyanobacterial blooms threaten ecosystem function and water quality, especially
    when toxin-producing strains predominate.
  3: No relevant information
  5: The paper evaluates the performance of models forecasting phycocyanin (PC) concentrations
    and associated alert levels related to harmful algal blooms.
  6: No relevant information
  7: The study evaluates model predictions related to Phycocyanin (PC) levels and
    their correlations with other variables such as temperature and Chlorophyll a
    (CHLA).
  8: The paper evaluates the accuracy of different machine learning models in predicting
    Phycocyanin (PC) concentrations in water.
  9: The paper proposes and evaluates an alert system to forecast phycocyanin (PC)
    concentrations, which are related to harmful algal blooms.
Highlights:
  1: The multivariate version of LSTM showed the best and most consistent results
    across all forecasting horizons and metrics, achieving accuracies of up to 90%
    in predicting the proposed PC alarm level. Positiveskill values indicated its
    outstanding effectivenessto forecast cyanobacterial blooms from 16 to 28 days
    in advance.
  2: The paper proposes an effective early warning system (EWS) for forecasting cyanobacterial
    blooms that overcomes limitations of site-specific models and reliance on incomplete
    surface measurements.
  3: Multiple cyanobacterial blooms occurred during the 6-year study, mainly in September
    and October; blooms in October 2010 and 2013 were particularly high in PC fluorescence
    and dominated by potentially toxic genera like Dolichospermum, Aphanizomenon,
    and Microcystis.
  5: The models' ability to forecast the established alert level is assessed using
    Accuracy, F1 score, and Kappa coefficient. A visual inspection of displayed predictions
    provides a qualitative assessment, focusing on the fit to PC concentration peaks.
    The forecast Skill Score (SS) measures the performance of a forecast by comparing
    it to replicating the last observed value.
  6: CHLA and PC levels tended to experience abrupt increases during the spring and
    autumn months, respectively, associated to blooming events. The temporal granularity
    was set to a 4-day interval for both maximum and integrated datasets.
  7: The multivariate LSTM model shows consistent performance across forecasting horizons,
    maintaining stable accuracy and skill, whereas LR and RF models have declines
    in performance over time.
  8: Multivariate LSTM models showed the best performance in predicting Phycocyanin
    concentrations across different forecasting horizons. Prediction accuracy generally
    decreases as the forecasting horizon increases.
  9: An alert system is proposed to forecast PC concentrations between 4 and 28 days
    in advance, and the best statistical measurement and granularity were defined
    using a biologically guided exploration.
  11: LSTM models proved to be the most effective for longer forecasting horizons,
    achieving an R2 greater than 0.6 for PC concentration prediction.
Methodology:
  1: Uses 6 years of incomplete high-frequency spatio-temporal data from multiparametric
    probes, including phycocyanin (PC) fluorescence as a proxy for cyanobacteria.
    Six different non-site/species-specific predictive models were compared including
    the autoregressive and multivariate versionsof Linear Regression, RandomForest,
    and Long-Term Short-Term (LSTM) neural networks. Results were analyzed for seven
    forecasting time horizons ranging from 4 to 28 days.
  2: The analysis uses non-site/species-specific models trained on data from a multiparametric
    probe on a water column profiler instead of relying solely on surface measurements;
    the evaluation uses a hybrid approach combining quantitative metrics with a qualitative
    alert system and a holistic skill metric.
  3: Data exploration involves statistical techniques (mean, standard deviation, quantiles,
    histograms, box plots) and multivariate analysis (Spearman correlations, time
    series) to analyze parameter distributions and relationships; pre-processing constructs
    time series for parameters using maximum and integrated water column values; the
    goal is automated, replicable bloom forecasting.
  4: LSTM networks were used for capturing complex temporal dependencies, useful for
    forecasting cyanobacterial blooms.
  5: "Models are evaluated using a rolling forecast approach with horizons from less\
    \ than one week to one month. Both regression and classification metrics are used.\
    \ An alert system is established based on PC concentrations equal to or above\
    \ 10 \xB5g/L. Analyses were conducted using in-house Python scripts within the\
    \ Jupyter Notebook environment."
  6: Time series of maximum values were defined using the maximum value of each 4-day
    interval, considering data from the entire water column. Time series of integrated
    values consisted of mean values within each 4-day interval considering depths
    up to 24 m.
  7: Analysis involves model predictions using autoregressive and multivariate models
    for PC peaks, considering both visual inspection of performance and regression
    metrics over different forecasting horizons.
  8: Autoregressive and multivariate versions of Linear Regression (LR), Random Forest
    (RF), and LSTM neural network models were used to predict Phycocyanin concentrations.
    The models were evaluated based on accuracy, F1 score, and Kappa.
  9: The analysis uses autoregressive and multivariate Linear Regression (LR), Random
    Forest (RF), and LSTM neural network models to forecast PC concentrations 4 to
    28 days in advance. Data exploration and pre-processing are important steps.
  11: The analysis uses six different models, including autoregressive and multivariate
    versions of LR, RF, and LSTM neural network, to predict PC concentration.
More Notes:
  3: The study focuses on forecasting cyanobacterial blooms in the Cuerda del Pozo
    reservoir (Soria, Spain) using data from a floating platform; phycocyanin (CHLA
    and PC) and temperature are key measured variables.
  5: "The threshold of 10 \xB5g/L for the alert system was chosen based on both biological\
    \ and data-driven considerations."
  6: The study explores the best temporal and spatial granularity and statistical
    measure for generating effective time series for cyanobacterial bloom forecasting.
  8: "The alert limit of Phycocyanin at 10 \u03BCg/L is used as a threshold. Supplementary\
    \ material S9 contains predictions for 8, 16, and 24 days ahead."
  9: The approach is flexible and replicable, and users can adapt it to their specific
    datasets and objectives.
Quantitative material:
  1: LSTM showed the best and most consistent results across all forecasting horizons
    and metrics, achieving accuracies of up to 90% in predicting the proposed PC alarm
    level.
  3: No relevant information
  5: The paper uses metrics like MSE, R2, MAPE, SS (Skill Score), Accuracy, F1 score,
    and Kappa coefficient to quantitatively evaluate model performance, and states
    the range of values for each, where appropriate.
  6: "CHLA: average of 3.4 \u03BCg/L, maximum values above 30 \u03BCg/L; TEMP: mean\
    \ of 12 \xBAC, minimum around 1 \xBAC, maximum around 25 \xBAC; Spearman correlation\
    \ coefficients among parameters were low (< 0.27)."
  7: Correlation coefficients between time series and model forecasts are provided,
    ranging from 0.5 to 0.9 for various parameters, with regression metrics like MSE
    and MAPE indicating prediction errors.
  8: Multivariate LSTM models maintained accuracies around 90% for all forecasting
    horizons; multivariate versions of all models maintained accuracies close to and
    above 80% even at long forecasting horizons. All models experienced substantial
    decreases in F1 score and Kappa as forecasting horizons increased.
  9: "The paper includes performance metrics like MSE, R\xB2, MAPE, Skill (%), Accuracy,\
    \ Cohen's Kappa, and F1 Score for PC concentration forecasts at different forecasting\
    \ horizons (4-28 days)."
  11: The model achieved accuracies up to 0.9 for alarm level prediction and positive
    skills up to 25% for the longest horizons.
