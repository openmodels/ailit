  12: 'Source material here.

    Our findings indicate a substantial increase in the risk of PI from both short
    and long duration extreme HS in several parts of the CONUS. The possible increases
    noted over the Pacific Northwest, central California, and a major portion of Mid-west
    will most likely be dominated by global-mean warming. On the contrary, the risk
    of PI is likely to increase by more than two times due to population growth alone
    in the Northeast, Southeastern Piedmont, coastal Pacific Northwest, and parts
    of Texas, Utah, and California. Being based on severity and temporal variability
    relative to local climate, as well as changing population patterns, the integrated
    indicator for PI that we derive applies equally well across the CONUS... The flexible
    of the GEV approach allows it to be applied across a range of event types and
    durations... While our current analysis focuses entirely on the potential impact
    of HS, additional determinants of vulnerability such as population density by
    age group, underlying health conditions, and socioeconomic status are crucial...
    and would help to translate these findings into tangible adaptation and mitigation
    agendas.

    '
