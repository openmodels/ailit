    \nMethodology: \"We are interested in making projections of Earth\u2019s global\
    \ mean surface temperature T due to radiative forcing F resulting from greenhouse\
    \ gases, aerosols, ozone precursors, land use change, and other anthropogenic\
    \ influences.\"\nHighlights: \"We show that structural uncertainty is much larger\
    \ than parametric uncertainty for projections of T, and consequently for calculations\
    \ of damages due to climate change.\"\nHighlights: \"These results underscore\
    \ that physical structural uncertainty is substantial in climate economics calculations,\
    \ and in climate projections in general.\"\nHighlights: \"They also imply that\
    \ reported uncertainties of such projections may be appreciably underestimated,\
    \ as is often the case with complex physical phenomena[11       ].\"\n"
