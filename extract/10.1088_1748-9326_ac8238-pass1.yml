    \ i.e. p(\u03BD > 0|\xB5 = 4)= 0.98. This is a dampening nonlinearity, i.e. the\
    \ warmer the Earth gets, more radiative forcing is required to warm it, or equivalently\
    \ the lower its climate sensitivity... 55% of the posterior mass is in the remaining\
    \ models, i.e. p(\xB5 \u0338= 4)= 0.55. This strongly indicates an important role\
    \ for structural uncertainty... Figure 2 shows that indeed structural uncertainty\
    \ is dominant for temperature projections under shared socioeconomic pathway SSP4-6.0;\
    \ in this case u(T(2100))= 2.0 and u(T(2300))= 2.7, indicating that structural\
    \ uncertainty is far larger than parametric uncertainty... This dampening nonlinearity\
    \ is likely due to a pattern effect, as warming in recent decades has been more\
    \ focused in regions of tropical convection... the existence of a pattern effect\
    \ analogous to observations is a robust feature of ESMs... the temperature-dependent\
