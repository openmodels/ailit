Drivers of Risk:
  5: Pattern effect causing warming focused in regions of tropical convection, impacting
    climate sensitivity and feedback.
  6: The evaluation considers structural uncertainty and its impact on economic projections,
    specifically related to temperature-dependent feedbacks and socioeconomic pathways.
Evaluation overview:
  6: The paper evaluates economic damages under different socioeconomic pathways (SSP4-6.0
    and SSP3-7.0) and structural uncertainties in climate models.
Highlights:
  2: Structural uncertainty is crucial for integrated assessment models and dominates
    overall non-socioeconomic uncertainty in economic projections of climate change
    damages.
  3: The results suggest that structural uncertainty may lead to an underestimation
    of uncertainties reported in broader climate projections.
  5: Structural uncertainty in climate models is significant for temperature projections
    and economic damage estimates.
  6: The results highlight the dominance of structural uncertainty in projections
    of temperature and economic damages, particularly with temperature-dependent feedback
    models.
  7: The paper suggests that structural uncertainties should be considered, especially
    in socio-economic projections using simple climate physics representations.
Methodology:
  2: A Bayesian approach was developed to quantify structural uncertainty in climate
    projections using idealized energy-balance model representations.
  3: The analysis uses a computational Bayesian approach to quantify structural uncertainty
    in a simple Earth Balance Model (EBM) used by integrated assessment models (IAMs).
  4: The importance of structural uncertainty in projections is quantified using a
    metric based on the interquartile range.
  5: The analysis involves posterior distribution comparisons for different climate
    models with a focus on temperature-dependent feedback models.
  6: The analysis uses a single-equation energy-balance model to characterize structural
    uncertainty, comparing marginal utility of consumption with a default 4.255% discount
    rate and alternative damage functions.
  7: The analysis focuses on reduced complexity climate models and their structural
    uncertainty.
Quantitative material:
  5: u(T(2100)) is 2.0 and u(T(2300)) is 2.7 for SSP4-6.0; u(T(2100)) is 2.3 and u(T(2300))
    is 4.1 for SSP3-7.0, indicating structural uncertainty's dominance.
  6: "The page presents quantitative evaluations of damages in trillions of 2019 USD,\
    \ with an emphasis on the period 2020\u20132300 and different discount rates."
