  7: "The page evaluates the impacts of 2022 summer heat extremes on inflation in\
    \ Europe, specifically focusing on food and headline inflation: \"The cumulative\
    \ annual impacts on food (a) and headline (b)inflation from the observed temperatures\
    \ of June, July and August of 2022 across Europe.\"\n\nThe primary driver of risk\
    \ is the extreme summer temperatures, which have a direct impact on inflation\
    \ rates: \"These highlight the short-term risks to inflation posed by unpredictable\
    \ heat extremes which are already occurring under present climatic conditions,\
    \ and which will be amplified by future warming.\"\n\nThe analysis provides quantitative\
    \ impacts on inflation, estimating a 1.0 percentage-point increase in food inflation\
    \ in Europe by 2035 under a high-emission scenario and a 0.9 percentage-point\
    \ increase under a low-emission scenario: \"Impacts on food inflation in Europe\
    \ of 1.0 percentage-points (0.6\u20131.6, uncertainty range across climate models)\
    \ in 2035 under a high-emission scenario, or of 0.9 percentage-points (0.5\u2013\
    1.4) under a low-emission scenario (Fig. 4c).\"\n\nThe analysis uses CMIP-6 climate\
    \ models to project impacts under future emission scenarios specified by the SSPs,\
    \ with point estimates and error bars showing mean and standard deviation across\
    \ climate models: \"Regionally aggregated (using a population weighting) impacts\
    \ from the historical 2022 summer temperatures, as well as those impacts which\
    \ would result from an equivalent summer if amplified by future warming as projected\
    \ by CMIP-6 climate models (see methods) under future emission scenarios specified\
    \ by the SSPs. Point estimates and error bars show the mean and standard deviation\
    \ of impacts across climate models.\"\n\nKey outcomes highlight a 30\u201350%\
    \ amplification of the impact of extreme heat on inflation by 2035 due to climate\
    \ change, with potential amplification of up to 200% by 2060 under different emission\
    \ scenarios: \"These constitute an amplification of the impacts of extreme heat\
    \ on inflation in Europe by 30\u201350% due to climate change already by 2035.\
    \ By 2060, the amplification of such extreme impacts would diverge under different\
    \ emission scenarios, remaining at 1.1 percentage-points under the most optimistic\
    \ scenario compared to 1.8 percentage-points under the most pessimistic scenario\
    \ of emission mitigation, an amplification of nearly 200%.\"\n"
  8: "plaintext\nEvaluation overview: \"The implications of our empirical results\
    \ under future temperature conditions are considerable regarding societal welfare\
    \ in general and price stability in particular: our results suggest that climate\
    \ change is likely to alter inflation seasonality, increase inflation volatility,\
    \ inflation heterogeneity and place persistent pressures on inflation levels.\"\
    \n\nDrivers of Risk: \"In our empirical results we find upward pressures on food\
    \ and headline inflation from higher-than-normal temperatures, especially when\
    \ occurring in hot months and countries.\"\n\nQuantitative material: \"Evaluating\
    \ the regression coefficients pertaining to average temperatures in our central\
    \ model...given a 1.5\xB0 C temperature increase, indicates an impact of 0.17%-points.\
    \ ... evaluating our empirical results under future temperature conditions suggests\
    \ that \u2013 ceteris paribus - persistent upward pressures on annual food inflation\
    \ of 1-3 percentage-points per-year could result from temperatures projected for\
    \ 2035.\"\n\nMethodology: \"Evaluating the regression coefficients pertaining\
    \ to average temperatures in our central model (shown in Column 1 of Supplementary\
    \ Table S2) at the baseline temperature observed in our dataset on the three hottest\
    \ months of the year on average across countries...our data are monthly.\"\n\n\
    Highlights: \"Temperature shocks under future climate change would both amplify\
    \ inflation heterogeneity and alter the seasonality of inflation within individual\
    \ countries. Inflation heterogeneity poses challenges in monetary union areas\
    \ such as the euro area...altered inflation seasonality could pose additional\
    \ challenges to inflation forecasting.\"\n"
