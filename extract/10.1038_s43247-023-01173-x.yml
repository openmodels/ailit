Drivers of Risk:
  1: Higher temperatures, daily temperature variability, extreme precipitation
  2: Fluctuations in average monthly temperatures, daily temperature variability,
    and precipitation extremes.
  3: Temperature shocks, particularly increases in monthly average temperatures, are
    the primary drivers impacting inflation.
  4: The drivers of risk are average temperature increases due to anthropogenic greenhouse
    gas emissions, analyzed through future climate projections from CMIP-6 under different
    SSP scenarios.
  5: The primary driver of risk is increasing average temperatures under different
    climate change scenarios (SSP126 and SSP585). Seasonality of temperature and differential
    warming also contribute.
  6: Increasing average temperatures, summer heat extremes.
  7: The primary driver of risk is the extreme summer temperatures, which have a direct
    impact on inflation rates.
  8: Higher-than-normal temperatures, especially during hot months and in certain
    regions, are identified as key drivers impacting inflation.
  9: Monthly average temperature, temperature variability, daily precipitation extremes,
    Standardized Precipitation Evapotranspiration Indices (SPEI)
  10: The drivers of risk are deviations from normal seasonal conditions of weather
    variables, including temperature (average temperature, hot days) and precipitation
    (SPEI drought index).
  11: Projected warmer summers and temperature extremes under climate change influence
    inflationary pressures.
  12: No relevant information
Evaluation overview:
  1: Impacts of climate conditions on inflation
  2: Inflation risks under future climate change.
  3: The page evaluates the impact of temperature shocks on food and headline inflation.
  4: This paper evaluates the impact of future warming on inflation, specifically
    food and headline inflation.
  5: The paper evaluates the pressure on annual inflation rates from average temperature
    conditions projected under future climate change, focusing on food and headline
    price aggregates.
  6: Impacts on monthly food inflation are evaluated.
  7: The page evaluates the impacts of 2022 summer heat extremes on inflation in Europe,
    specifically focusing on food and headline inflation.
  8: The paper evaluates the impact of temperature shocks on inflation, assessing
    the potential implications for societal welfare and price stability under future
    climate conditions.
  9: National level inflation
  10: The outcome being evaluated is month-on-month inflation rates.
  11: The paper evaluates the hypothetical impact on inflation caused by future weather
    conditions under projected climate change.
  12: No relevant information
Highlights:
  1: Higher temperatures increase food and headline inflation persistently over 12
    months in both higher- and lower-income countries; Pressures are largest at low
    latitudes and show strong seasonality at high latitudes, peaking in summer.
  2: Temperature increases cause nonlinear, persistent increases in food and headline
    inflation. Impacts of temperature increases at high latitudes cause upwards inflationary
    pressures when occurring in the hottest month of the year. The response to average
    temperature is strongly non-linear, such that increases in hotter months and regions
    cause larger inflationary impacts.
  3: Temperature fluctuations affect inflation equivalently in high- and low-income
    countries, suggesting limited historical adaptation; statistically significant
    impacts of excess wet conditions on food and headline prices are observed.
  4: Projected global warming is likely to cause persistent upward exogenous pressures
    on inflation, particularly food inflation, with considerable magnitudes in the
    next few decades. These pressures are generally larger in the global south.
  5: Projected temperature increases are expected to put pressure on food and headline
    inflation, particularly in vulnerable regions. The pressure is fairly constant
    across seasons at low latitudes, but varies considerably across seasons in Northern
    mid-latitudes. Seasonality is impacted by baseline temperature rather than differential
    warming.
  6: There is amplification of seasonal variability across most of the global south
    and the USA, and reductions in seasonal variability across most of Europe (excluding
    Spain) and the higher northern latitudes.
  7: "Key outcomes highlight a 30\u201350% amplification of the impact of extreme\
    \ heat on inflation by 2035 due to climate change, with potential amplification\
    \ of up to 200% by 2060 under different emission scenarios."
  8: Temperature shocks under future climate change are likely to increase inflation
    volatility, alter inflation seasonality, and pose challenges for monetary policy
    and inflation forecasting.
  9: Deviations of monthly climate conditions from their historical seasonal patterns
    impact the economy. Impacts on inflation are larger in hotter seasons, and larger
    impacts on different economic factors in hotter regions.
  10: Accounting for linear time trends enhances the magnitude of estimated effects
    of weather on inflation.
  12: No relevant information
Methodology:
  1: Fixed-effects regressions applied to over 27,000 observations of monthly consumer
    price indices worldwide; evaluating results under temperature increases projected
    for 2035
  2: Combines measures of national exposure to different weather conditions with a
    dataset of monthly price indices for different aggregates of goods and services
    across 121 countries over the period 1996-2021, using fixed-effects panel regression
    models. Includes country-month fixed effects to account for country-specific seasonality
    and lagged weather variables. Combines results with projections from physical
    climate models.
  3: The analysis uses fixed-effects panel regressions on over 27,000 global observations
    from 1996-2021; results are robust across model specifications and control for
    auto-correlations and errors.
  4: The analysis uses empirical models based on historical impacts of weather shocks
    on inflation and applies them to future climate projections. This assumes no unprecedented
    adaptation, no targeted monetary policy response, and abstracts from interactions
    with macroeconomic developments. Results are applicable up to 2060, with a focus
    on 2035.
  5: The analysis uses projections from CMIP-6 climate models to estimate the impact
    of average temperature increases on inflation, accounting only for increasing
    average temperatures, using a baseline empirical specification. The analysis abstracts
    from adaptation, policy response, and macroeconomic interactions. The results
    are applicable to the specified scenarios and time periods (2035 and 2060).
  6: The analysis projects temperature conditions by 2035 under a high-emission scenario
    using CMIP-6 climate models to estimate pressures on monthly food inflation, accounting
    only for increasing average temperatures. Future summer warming projections from
    2022 onwards in the CMIP-6 are added to historical temperatures realised in 2022,
    and re-evaluated using empirical response functions.
  7: The analysis uses CMIP-6 climate models to project impacts under future emission
    scenarios specified by the SSPs, with point estimates and error bars showing mean
    and standard deviation across climate models.
  8: The analysis relies on empirical models using monthly climate data and regression
    coefficients pertaining to average temperatures, focusing on temperature shocks
    during the hottest months.
  9: Fixed-effects panel regression models are used to identify the causal effects
    of changes in weather variables on national level inflation. Climate data is from
    ERA-5 reanalysis (1990-2021) and CRU TS v4.05 (1901-2021). Spatial aggregation
    uses population estimates from the History database of the Global Environment
    (HYDE).
  10: The analysis uses a regression model with country, date, and country-month fixed
    effects, country-specific linear time trends, and lags of weather variables to
    assess delayed effects. Robustness tests include lagged inflation rates, Driscoll
    Kraay errors, and controls for monetary policy. The models are estimated using
    data from 21 climate models participating in CMIP-6 under SSP585 and SSP126 scenarios.
  11: The analysis estimates impacts on inflation by applying temperature projections
    from CMIP-6 models to empirical models of inflation, assuming various future warming
    scenarios.
  12: No relevant information
More Notes:
  2: The impacts on inflation are stronger and more consistent from fluctuations in
    average monthly temperatures than from other weather variables. The strongest
    impacts are on the food price component. There is limited evidence for impacts
    on other price sub-components besides weak evidence in the electricity sector.
  4: The paper explores the potential of adaptation via adjustment to changing temperatures
    using empirical models and notes that this adaptation could substantially reduce
    future impacts.
  5: The analysis uses monthly CPI data to assess the distribution of inflation pressures
    across the year. The study acknowledges that the estimates reflect exogenous pressure
    in the absence of adaptation or policy responses. The paper is from 2024.
  6: The estimates reflect the exogenous pressure on inflation arising from future
    weather conditions in the absence of historically un-precedented adaptation or
    policy response.
  9: Imputed rents in inflation data can significantly bias estimates. The magnitude
    of the temperature seasonal cycle is estimated as the difference between the maximum
    and minimum national monthly temperatures within a given year, then averaged over
    the historical period (1990-2021).
  12: The page primarily contains references and acknowledgments.
  13: This page contains supplemental information regarding the article, including
    the Creative Commons license, contact information, peer review information, and
    publisher's note. It does not contain any information about the study's methodology,
    results, or conclusions.
Quantitative material:
  1: Upwards pressures on food and headline inflation of 0.92-3.23 and 0.32-1.18 percentage-points
    per-year respectively on average globally for 2035 projections; The 2022 extreme
    summer heat increased food inflation in Europe by 0.43-0.93 percentage-points
    which warming projected for 2035 would amplify by 30-50%.
  2: "A 1\xB0C increase in monthly temperature on the price level persist across the\
    \ entire 12 months following the initial shock, causing a cumulative effect on\
    \ food inflation of 0.17 percentage points over the following year."
  3: "The analysis provides cumulative marginal effects of a one-off 1\xB0C increase\
    \ in temperature on monthly inflation rates, indicating persistent impacts on\
    \ food and headline prices."
  4: "Projected temperature increases for 2035 imply upwards pressures on food inflation\
    \ of 1.49\xB10.45 or 1.79\xB10.54 percentage-points per year (p.p.p.y.) in best-\
    \ (SSP126) or worst-case (SSP585) emission scenarios, respectively. Pressures\
    \ on headline inflation are approximately half as large, 0.76\xB10.23 or 0.91\xB1\
    0.28 p.p.p.y. under a best- or worst-case emission scenario. By 2060, the difference\
    \ in the average global pressures on food inflation between the highest and lowest\
    \ emission scenarios is 2.1 p.p.p.y. with a range of 1.6-3.8."
  5: The paper provides maps and graphs showing the projected annual pressure on food
    and headline inflation in 2035 and 2060 under different emission scenarios, including
    point estimates and standard deviations across climate models. Inflation pressures
    are quantified regionally, and across the year by season.
  6: Percentage change in the seasonal variability of food inflation is estimated.
  7: The analysis provides quantitative impacts on inflation, estimating a 1.0 percentage-point
    increase in food inflation in Europe by 2035 under a high-emission scenario and
    a 0.9 percentage-point increase under a low-emission scenario.
  8: "The paper estimates a 0.17%-points impact on inflation from a 1.5\xB0C temperature\
    \ increase and the potential for 1-3 percentage-points annual increase in food\
    \ inflation by 2035."
  9: The combination of price and climate data results in 27,340 country-month observations
    across 121 countries.
  10: The analysis produces cumulative marginal effects, reflecting the theoretical
    cumulative impact on prices from a 1-unit climate shock, calculated by summing
    lagged coefficients.
  11: The analysis uses mean and standard deviation of projections across 21 climate
    models to present central estimates and errors.
  12: No relevant information
sourcematerial:
  1: Higher temperatures increase food and headline inflation persistently over 12
    months in both higher- and lower-income countries. Effects vary across seasons
    and regions depending on climatic norms, with further impacts from daily temperature
    variability and extreme precipitation. Evaluating these results under temperature
    increases projected for 2035 implies upwards pressures on food and headline inflation
    of 0.92-3.23 and 0.32-1.18 percentage-points per-year respectively on average
    globally (uncertainty range across emission scenarios, climate models and empirical
    specifications). Pressures are largest at low latitudes and show strong seasonality
    at high latitudes, peaking in summer. Finally, the 2022 extreme summer heat increased
    food inflation in Europe by 0.43-0.93 percentage-points which warming projected
    for 2035 would amplify by 30-50%. Here we apply fixed-effects regressions to over
    27,000 observations of monthly consumer price indices worldwide to quantify the
    impacts of climate conditions on inflation.
  2: "The effects of climate change on the economy are becoming increasingly well\
    \ understood. [...] Despite these advances, weather impacts on inflation and,\
    \ in particular, the implications for inflation risks under future climate change,\
    \ remain understudied.\n\nTemperature increases cause nonlinear, persistent increases\
    \ in food and headline inflation. [...] The strongest and most consistent signal\
    \ arises from fluctuations in average monthly temperatures. [...]\n\nWe find that\
    \ the impacts of a 1\xB0C increase in monthly temperature on the price level persist\
    \ across the entire 12 months following the initial shock [...] causing a cumulative\
    \ effect on food inflation of 0.17 percentage points over the following year.\n\
    \nOur empirical framework quantifies the plausibly causal effects of fluctuations\
    \ in historical weather conditions on national, month-on-month inflation rates\
    \ [...] by exploiting within-country variation using fixed-effects panel regression\
    \ models. [...] We combine our results with projections from physical climate\
    \ models.\n\n[...] impacts are strongest in the food price component, indicative\
    \ of a supply-side productivity shock. [...]\n\nThe response to average temperature\
    \ is strongly non-linear, such that increases in hotter months and regions cause\
    \ larger inflationary impacts. Consequently, increases in average temperatures\
    \ at high latitudes cause upwards inflationary pressures when occurring in the\
    \ hottest month of the year. [...]\n\nWe further find that the impacts of a 1\xB0\
    C increase in monthly temperature on the price level persist across the entire\
    \ 12 months following the initial shock. [...] By using lagged weather variables,\
    \ we further find that the impacts of a 1\xB0C increase in monthly temperature\
    \ on the price level persist across the entire 12 months following the initial\
    \ shock, causing a cumulative effect on food inflation of 0.17 percentage points\
    \ over the following year. [...]\n\n[...] more consistent from fluctuations in\
    \ average monthly temperatures than from other weather variables. [...] largest\
    \ in food prices, these impacts also translate into considerable effects on headline\
    \ inflation (Fig. 1c). We find limited evidence for impacts on other price sub-components\
    \ asides from weak evidence in the electricity sector. [...]\"\n"
  3: "\nEvaluation overview: \"The cumulative marginal effect of temperature shocks\
    \ on food and headline in\uFB02ation.\"\nDrivers of Risk: \"demonstrate persistent\
    \ impacts on food (b) and headline (c) prices from a one-off increase in monthly\
    \ average temperature.\"\nQuantitative material: \"Lines indicate the cumulative\
    \ marginal effects of a one-off 1 C increase in monthly temperature on month-on-month\
    \ in\uFB02ation rates\"\nMethodology: \"The results of \uFB01xed-effects panel\
    \ regressions from over 27,000 observations of monthly price indices and weather\
    \ \uFB02uctuations worldwide over the period 1996-2021...These effects are robust\
    \ to a number of tests and alternative speci\uFB01cations\"\nHighlights: \"The\
    \ fact that \uFB02uctuations of average temperature cause equivalent impacts on\
    \ in\uFB02ation in high- and low-income countries suggests that historical adaptation\
    \ to temperature increases via socioeconomic development has been limited...Excess\
    \ wet conditions cause upwards impacts on food and headline prices which persist\
    \ over twelve months, independent of baseline climate conditions\"\n"
  4: "yaml\nEvaluation overview: \"To assess these consequences, we evaluate the empirical\
    \ responses identi\uFB01ed above for temperatures under projected future climate\
    \ conditions... Future projections are taken from an ensemble of 21 bias-adjusted\
    \ climate models...We focus on the role of average temperature...We consider the\
    \ impacts we estimate using future climate projections as the effects of future\
    \ weather conditions on in\uFB02ation...\"\nDrivers of Risk: \"empirical evidence\
    \ for the historical impacts of weather shocks on in\uFB02ation suggests that\
    \ the ongoing warming and intensi\uFB01cation of weather extremes and variability\
    \ due to anthropogenic greenhouse gas emissions40 may have consequences for future\
    \ in\uFB02a- tion...Future projections are taken from an ensemble of 21 bias-adjusted\
    \ climate models from the Coupled Model Intercomparison Project Phase 6 (CMIP-6)\
    \ under different emission forcing scenarios from the Shared Socioeconomic Pathways\
    \ (SSP)41...\"\nQuantitative material: \"In the global average, these effects\
    \ constitute persistent upwards pressures on food in\uFB02ation of 1.49\xB10.45\
    \ or 1.79\xB10.54 percentage-points per year (p.p.p.y.) respectively in a best-\
    \ (SSP126) or worst-case (SSP585) emission scenario...Pressures on headline in\uFB02\
    ation are approximately half as large, 0.76\xB10.23 or 0.91\xB10.28 p.p.p.y. under\
    \ a best- or worst-case emission scenario (Fig. 2a, c)... By 2060, there is a\
    \ strong and robust difference in the average global pressures on food in\uFB02\
    ation between the highest and lowest emission scenarios: 2.1 p.p.p.y. in our central\
    \ estimate with a range of 1.6-3.8 across empirical speci\uFB01cations and climate\
    \ models (Row 6 of Supplementary Tables S4 & S5).\"\nMethodology: \"We consider\
    \ the impacts we estimate using future climate projections as the effects of future\
    \ weather conditions on in\uFB02ation, which would occur (i) in the absence of\
    \ historically un-precedented adaptation... (ii) without a targeted monetary policy\
    \ response, and (iii) abstracting from any possible interactions with macroeconomic\
    \ developments...We provide an assessment of the potential future exogenous pressure\
    \ on in\uFB02ation from future climate conditions, based on the causal relationships\
    \ inferred with the empirical models, and assuming other socioeconomic factors\
    \ such as demographic developments and changes in the consumption basket remain\
    \ constant (principle of ceteris paribus)...projected for 2035 under future warming...\"\
    \nHighlights: \"These results therefore provide robust evidence that projected\
    \ global warming would cause persistent upward exogenous pressures on in\uFB02\
    ation of considerable magnitudes already during the next few decades, independent\
    \ of future emission trajectories and assuming ceteris paribus...Exogenous pressures\
    \ on in\uFB02ation from projected future temperature conditions are generally\
    \ larger in the global south...\"\nMore Notes: \"Although the empirical evidence\
    \ indicates that adaptation to temperature shocks has been limited historically,\
    \ we explore the potential of adaptation via adjustment to changing temperatures...\
    \ This method indicates that adaptation via adjustment could substantially reduce\
    \ future impacts (Supplementary Fig. S14).\"\n"
