    \ guidance noted the challenge of uncertainty and recommended i) the splitting\
    \ of the technical lifespan into an \u2018analysis period\u2019 and a \u2018residual\
    \ period,\u2019 and, ii) scenario and sensitivity analysis.\"\n"
