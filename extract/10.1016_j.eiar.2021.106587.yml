Highlights:
  2: Environmental applications of CBA to policy and project evaluation have become
    some of the most important and controversial.
  3: Key highlights include the trend towards lower discount rates, the importance
    of valuing environmental externalities and co-benefits, the limitations of TEV,
    and the need to consider equity in CBA. The time horizon of the analysis is identified
    as a defining issue, as it can truncate the inclusion of long-term environmental
    costs and benefits.
  5: Best practices for long-term analysis include the use of different time horizons
    based on project nature and the necessity to incorporate long-term impacts on
    emissions and climate change.
  6: The discounted net benefits are significantly affected by changes in discount
    rates. Moving from a 7% discount rate to a 3% rate increases net benefits by 48.84%
    over a 25-year period. Moving to a 1.4% or 0% discount rate increases discounted
    net benefits by 79.07% and 93.92%, respectively, from the 7% rate over 25 years.
  7: Extending the time horizon in Cost-Benefit Analysis (CBA) can have a greater
    impact on the results than reducing the discount rate. Shorter time horizons can
    lead to a 'pessimism bias' for environmentally beneficial projects and an 'optimism
    bias' for those that are environmentally damaging.
Methodology:
  2: This paper provides a brief review of key developments in Cost-Benefit Analysis
    (CBA), particularly changes in applied practice, and focusses on the time horizon
    of analysis.
  3: The page discusses the use of ecosystem services, Total Economic Value (TEV),
    and co-benefits in CBA. It also mentions the importance of considering equity
    and distributional impacts.
  4: The choice of time horizons in CBA is influenced by forecast uncertainty and
    the discount rate, with considerations for extending the timeline to adequately
    capture long-term impacts.
  5: Different countries adopt varying time horizons in cost-benefit analysis (CBA)
    to capture long-term environmental costs, applying declining discount rates to
    account for uncertainty and long-term impacts.
  6: Constant discount rates are applied to a constant annual benefit flow over different
    time horizons to calculate the present value. The discount rates used are 3%,
    5%, and 7% (similar to the Congressional Budget Office), as well as 1.4% (as applied
    to climate change by Stern (2007)), and 0%.
  7: Cost-Benefit Analysis (CBA) with varying time horizons and discount rates; residual
    calculation to capture long-term externalities. The analysis uses a constant flow
    of benefits under different constant discount rates.
More Notes:
  2: The paper argues that addressing 'the environment in CBA' is not simply about
    appraising 'environmental projects', but requires consideration of environmental
    impacts in all public investment analysis because the environment provides often
    non-substitutable ecosystem services.
  3: The page emphasizes the importance of 'mainstreaming' sustainability within government
    institutions. It also notes that environmental and social capital are not fully
    substitutable with financial capital.
  5: Various international guidance documents recommend different time horizons for
    cost-benefit analysis, acknowledging the challenges of uncertainty and the need
    for scenario and sensitivity analysis.
  6: The paper discusses the importance of time horizons and discount rates in cost-benefit
    analysis (CBA), particularly in the context of environmental costs and benefits.
    It critiques financially defined time horizons used in European Commission guidance
    and advocates for considering longer-term impacts on welfare.
  7: Longer time horizons are needed for economic analysis of environmental benefits,
    avoided damages, and projects with long-term environmental impacts. Early consideration
    during scoping and screening is required to identify and quantify environmental
    impacts.
Quantitative material:
  2: No relevant information
  3: Table 1 provides discount rate guidance for selected OECD countries, including
    the US, with short to medium-term rates (3-7%) and long-term rates (declining
    to 1% after 300 years in the UK).
  6: A constant annual benefit flow of $1000 USD is used as an example, and the impact
    of different discount rates (7%, 5%, 3%, 1.4%, and 0%) and time horizons (25,
    50, 100, and 120 years) on the present value of this flow is quantified.
  7: A constant 3% discount rate extended from 25 to 50 years has more impact than
    moving from 3% to 1.4% or even to a zero discount rate (when remaining on a shorter
    25 year analysis period). It is recommended to consider time horizons of 100+
    years, dependent on the type of environmental damage that a project leads to.
