  5: "yaml\nMethodology: \"The theoretical background is clear in the requirement\
    \ for long-term time horizons to capture long-term environmental costs and benefits...The\
    \ French and UK CBA guidance both refer to long-term uncertainty in society, particularly\
    \ the impact on welfare of environmental challenges, that require use of declining\
    \ discount rates, and also long-time horizons.\"\nHighlights: \"Best practices\
    \ that have emerged internationally offer examples of how this can be achieved...DECC\
    \ highlight that emissions must be accounted for on a timescale that is further\
    \ into the long term than 2050...The residual period intends to capture long term\
    \ effects based on the evolution of costs and benefits during the analysis period.\"\
    \nMore Notes: \"Best practices that have emerged internationally offer examples\
