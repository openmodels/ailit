  2: " \nThis paper provides a brief review of key developments, particularly changes\
    \ in applied practice, and focusses on an issue that receives scant attention\
    \ -the time horizon of analysis.\n...\nIn practice, the environmental applications\
    \ of CBA to policy and project evaluation have become some of the most important\
    \ and controversial.\n...\nThe environment provides ecosystem services to human\
    \ systems that are often not substitutable, therefore development itself must\
    \ be sustainable if collapse is to be avoided. \n...\nThe environment is fundamental\
    \ to appropriate framing of analysis of public investment in general.\n"
  3: " \nThe page discusses Cost-Benefit Analysis (CBA) and its application to environmental\
    \ and sustainability issues: \"The OECD (2018) have noted key changes that are\
    \ relevant to CBA guidance and practice, including; the implications of sustainability\
    \ and the limits of CBA...\"\n\nTable 1 provides discount rate guidance for selected\
    \ OECD countries, including the US, with short to medium-term rates (3-7%) and\
    \ long-term rates (declining to 1% after 300 years in the UK): \"Table 1 illustrates\
    \ some of the declining discount rates and longer time horizons for selected OECD\
    \ countries...\"\n\nThe trend towards lower discount rates, the importance of\
    \ valuing environmental externalities and co-benefits, the limitations of TEV,\
    \ and the need to consider equity in CBA: \"...noted a general trend towards lower\
    \ discount rates...\" and \"co-benefits, sometimes termed 'complementary benefits'\
    \ or 'ancillary benefits' in CBA literature, can have significant impacts on the\
    \ outcome of analysis.\"\n\nThe importance of 'mainstreaming' sustainability within\
    \ government institutions: \"This \u2018mainstreaming\u2019 of sustainability\
    \ within government institutions is necessary to support sustainability transition...\"\
    \n\nEnvironmental and social capital are not fully substitutable with financial\
    \ capital: \"...environmental and social capital are not fully substitutable with\
    \ other forms (EEA, 2015), so financial capital cannot compensate.\"\n"
