Highlights:
  2: Key influences on PV output include solar irradiance, module temperature, atmospheric
    conditions, terrain effects, extreme weather, and long-term irradiance changes,
    highlighting the need for tailored strategies to maintain PV performance.
  3: Key findings include the centrality of solar PV in the global electricity transition
    and the impacts of environmental factors on power production.
  4: Increased solar irradiance reduces parasitic resistance losses. Irradiance has
    a linear effect on current and log-linear effect on voltage.
  5: Thin-film PV systems are particularly sensitive to daily and seasonal changes
    in spectral distribution.
  6: Irradiance has a stronger effect on current, temperature predominantly affects
    voltage. Solar modules at high temperature experience more rapid degradation and
    lower lifetimes.
  7: Temperature has a stronger effect on open-circuit voltage than on short-circuit
    current. Power output decreases nearly linearly with temperature.
  8: "PV module efficiency decreases with higher temperatures and degradation rate\
    \ doubles for every 10\xB0C increase."
  9: Dust and atmospheric aerosols are significant factors affecting solar PV efficiency,
    reducing power generation.
  10: The global distribution of aerosol levels from 2019 to 2023 is depicted, showing
    higher concentrations in specific regions that could contribute to dust emissions
    and aridity.
  11: Electrostatic cleaning provides dust removal without water or labor; humidity
    lowers light intensity but can improve module efficiency by lowering temperature.
  12: Wind can increase PV module efficiency by cooling and reduce soiling by blowing
    away dust and snow, but extreme winds can compromise structural security.
  13: Snow cover reduces solar PV performance, with the extent of reduction varying
    by region and module tilt. Wildfires reduce solar PV performance by blocking sunlight
    with aerosols. Climate change is increasing the frequency/scale of wildfires and
    severity of hailstorms.
  15: Solar eclipses significantly affect regions with high solar PV capacity, such
    as Western Australia, where capacity factors dropped during the eclipse.
  16: Higher temperatures reduce PV efficiency and dust accumulation can significantly
    affect efficiency in desert regions.
  19: The accumulation of dust on PV panels reduces their efficiency and energy output.
