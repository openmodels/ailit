  5: "Source material here.\n\"PV modules are sensitive to the spectral distribution\
    \ of solar irradiance [42]. The Average Photon Energy (APE) metric assesses the\
    \ effect of solar spectrum distribution on outdoor PV module performance [42].\
    \ It represents the average energy of photons in the spectrum and is the ratio\
    \ of integrated irradiance to photon flux density [43]. APE incorporates environmental\
    \ factors like air mass, cloud cover, and water content [44]. APE values vary\
    \ with location and season and indicate the spectral shift: higher values suggest\
    \ a blue-shift, while lower values indicate a red-shift [45,46]. APE influences\
    \ the open-circuit current even under constant solar irradiance [43]. Fig. 7 shows\
    \ spectral irradiances with different APE values in three wavelength ranges [47].\"\
    \n \n\"A typical PV module converts 6\u201320% of incident sunlight into electricity\
    \ [63], and incoming solar irradiance that is not converted or reflected generates\
    \ heat, increasing the PV module\u2019s temperature [64]. This heating effect\
    \ means cell temperatures correlate more strongly with irradiation than ambient\
    \ air temperature [65,66], although higher ambient temperatures hinder cooling\
    \ and thus increase cell temperatures.\"\n \n\"Thin-film PV systems are particularly\
    \ sensitive to daily and seasonal changes in spectral distribution [49,51]. Amorphous\
    \ silicon (a-Si) cells, with narrow blue-rich absorption bands, are particularly\
    \ affected [52, 53]. Seasonal variations have a large impact on a-Si cells [54],\
    \ and crystalline silicon (c-Si), copper indium diselenide, gallium arsenide (GaAs),\
    \ and cadmium telluride (CdTe) devices also show distinct spectral responses,\
    \ making them more sensitive to fluctuations [55\u2013 58]. This sensitivity is\
    \ more pronounced for a-Si and GaAs devices outside mid-latitudes [56]. Despite\
    \ its importance, spectral distribution, as reflected in APE, is often overlooked\
    \ in PV modules\u2019 performance assessment [59,60].\"\n"
