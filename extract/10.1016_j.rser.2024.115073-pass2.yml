sourcematerial:
  2: "Source material here: \"This review examines six key influences: solar irradiance,\
    \ ambient temperature, atmospheric conditions, terrain effects, extreme weather\
    \ events, and long-term irradiance changes...Optimizing PV systems for diverse\
    \ climates and mitigating environmental impacts on productivity is important to\
    \ the continued success of solar photovoltaics. First, solar irradiance has strong\
    \ geographic and temporal variability, making it the most significant factor.\
    \ Second, raising module temperature reduces efficiency by 0.4\u20130.5 % per\
    \ degree Celsius, limiting productivity in hotter climates. Third, atmospheric\
    \ conditions (clouds, aerosols, pollutants, and dust) can reduce electricity output\
    \ by up to 60 %, especially in desert regions. Fourth, terrain factors like albedo\
    \ and snow present mixed effects, with increased reflection boosting output but\
    \ snow obstructing panels. Fifth, extreme weather like wildfires and hailstorms\
    \ cause substantial damage, while solar eclipses lead to large but short-lived\
    \ output losses. Finally, long-term changes in solar irradiance, driven by climate\
    \ change and air pollutants, present future challenges for maintaining PV efficiency.\
    \ This review highlights the need for tailored strategies to maintain performance\
    \ in varied and evolving environmental contexts.\""
