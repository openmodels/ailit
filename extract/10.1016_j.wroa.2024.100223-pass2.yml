Drivers of Risk:
  1: Climate change-driven water scarcity impacting sectors like agriculture, food,
    and electricity.
  2: Water scarcity events in May and August are the shocks impacting the economy.
  3: The primary driver of risk is temporal water scarcity events, causing economic
    and resource use impacts.
  4: The outcomes are impacted by water scarcity, particularly in the agriculture,
    food, and electricity sectors.
  5: Temporal water scarcity events.
  6: Assumes water scarcity events in May and August with varying severities to assess
    economic resilience.
  7: Temporal water scarcity events
  8: The analysis concerns a temporal water scarcity event impacting sectors such
    as agriculture, forestry, and fishing.
  9: The key driver of risk mentioned is temporal water scarcity, impacting sectors
    reliant on freshwater.
Evaluation overview:
  1: No specific overview of evaluation outcomes like mortality or productivity loss
    is provided on this page.
  2: The analysis investigates the macro-level socio-economic impacts of water scarcity,
    focusing on investment behaviours and resilience during water scarcity periods.
  3: The paper evaluates the impacts on GDP, investment, employment, and water use
    during temporal water scarcity events.
  4: The analysis evaluates the economic resilience to water scarcity, focusing on
    GDP, employment, and sectoral effects.
  5: The paper evaluates the impact of different investment behavior models (Myopic,
    Imperfect Foresight, Perfect Foresight) on sector effects of GDP, investment,
    and water use during temporal water scarcity events.
  7: Impacts on GDP, employment, and water use during temporal water scarcity events
  9: The paper provides an overview of the economic impacts, particularly on GDP,
    employment, and water usage, across various sectors due to water scarcity.
Highlights:
  1: Firms' foresight impacts economic response to water scarcity; resilience-building
    measures are crucial.
  2: Proactive investment strategies can mitigate the negative impacts of water scarcity,
    highlighting the importance of foresight models.
  3: Scenario 1 results in a 0.38% fall in GDP, 0.37% fall in employment, 0.45% fall
    in investment, and 0.60% reduction in water use; Scenario 2 results in a 0.89%
    fall in GDP, 0.86% fall in employment, 1.04% fall in investment, and 1.39% reduction
    in water use.
  4: Firms with perfect foresight show greater resilience to water scarcity; sectors
    like motor vehicles benefit from competitiveness effects despite overall negative
    impacts.
  5: Agriculture, forestry, & fishing and Crude petroleum & Natural Gas sectors show
    negative impacts on GDP, investment, and water use during water scarcity events.
    Recreational and some service sectors show neutral to positive impacts.
  7: Increased economic openness tends to have a positive effect on GDP and water
    usage, but a negative impact on employment during water scarcity. Firms with perfect
    foresight mitigate negative impacts better than myopic or imperfect foresight.
  8: Significant impacts include a 14.3% reduction in GDP for agriculture under myopic
    and imperfect foresight scenarios, and a 15.7% reduction in water use in the same
    sector.
  9: Agriculture is the most heavily affected sector by water scarcity due to its
    high reliance on freshwater consumption. Other affected sectors include chemical
    and pharmaceutical manufacturing, and electricity generation. Some sectors, like
    electrical manufacturing and vehicle manufacturing, experience positive impacts
    due to decreased prices attracting more consumers.
Methodology:
  1: Custom-built dynamic multisectoral model incorporating behavioural and resilience
    aspects; macro-level analysis.
  2: 'The analysis uses the DEMACRO-ESS general equilibrium model with three distinct
    investment model specifications: perfect foresight, myopic expectations, and imperfect
    foresight.'
  3: Analysis is performed using the DEMACRO-ESS simulation model with different investment
    behavior specifications (Myopic, Imperfect foresight, Perfect foresight).
  4: Analysis is based on a dynamic multi-sectoral CGE model, DEMACRO-ESS, using a
    2020 Social Accounting Matrix for Germany.
  5: The analysis uses the DEMACRO-ESS model, an extension of the DEMACRO model, which
    incorporates water and land as natural capital in a multi-level production function
    with constant elasticity of substitution (CES). The model simulates the German
    economy, considering production, demand, and trade. Production takes place in
    perfectly competitive industries. The model is applicable to analyzing the impact
    of water scarcity on the German economy.
  6: The paper employs simulations using three investment behavior models to assess
    economic resilience to water scarcity.
  7: DEMARCO-ESS model simulations with varying Armington trade elasticities to assess
    the sensitivity of results to economic openness.
  8: 'DEMACRO-ESS simulation results using different investment behavior model specifications:
    Myopic (MY), Imperfect foresight (IM), and Perfect foresight (PE).'
  9: The analysis uses the DEMACRO-ESS simulation model to evaluate sectoral effects
    under different investment behavior scenarios (myopic, imperfect foresight, and
    perfect foresight).
More Notes:
  1: Policy emphasis on anticipation and preparedness; certain sectors may benefit
    from competitiveness effects.
  5: The model incorporates two types of water (green and blue) and three types of
    land (crops, pastures, and other). Financial flows are not explicitly modelled.
    Government expenditure is held constant in real terms.
  7: The analysis assumes business-as-usual conditions for Germany's trade partners,
    which may not be valid if they also experience water scarcity.
Quantitative material:
  2: The myopic expectations model results in a decrease of 0.14% in GDP and a 0.17%
    decline in employment.
  3: Quantitative information includes percentage changes from the base year for GDP,
    investment, employment, and water use during two different scenarios.
  5: The heatmap (Fig. 2) visually represents the quantitative impact on GDP, investment,
    and water use, with more precise results available in Appendices B and C. Substitution
    elasticities are also provided, e.g., 2.7 for trade and 0.3 for input substitution.
  6: A 30% decrease in water efficiency during May is assumed in the first scenario;
    30% in May and 35% in August for the second.
  7: Percentage change impacts on GDP, employment, and water use under different economic
    openness scenarios (Armington elasticities of 1.7, 2.7, and 3.7)
  8: The page provides cumulative percentage change impacts on GDP, employment, and
    water use across different sectoral categories during a temporal water scarcity
    event.
  9: Quantitative data is provided on cumulative percentage change impacts during
    a water scarcity event for different sectors in terms of GDP, employment, and
    water use.
sourcematerial:
  1: "\nClimate change will exacerbate water stress and water scarcity (IPCC, 2023).\
    \ Water scarcity refers to periods of reduced water availability, often caused\
    \ by factors such as insufficient rainfall or drought. The consequences of water\
    \ scarcity are particularly detrimental to economic sectors that heavily rely\
    \ on water. Agriculture, for instance, suffers from lower crop yields due to insufficient\
    \ soil moisture. Furthermore, lowered river discharges not only affect electricity\
    \ production in thermal, nuclear, and hydropower plants but can also impact inland\
    \ shipping by reducing water depth in rivers (EEA, 2021). These consequences,\
    \ in turn, affect all other sectors of the economy. This paper utilises a custom-built\
    \ dynamic multisectoral model to assess the socio-economic impacts at a macro-level\
    \ of temporary water scarcity. The focus of the analysis is to identify the effects\
    \ that varying levels of investment foresight may have on economic resilience.\
    \ Specifically, the model incorporates often overlooked factors such as behavioural\
    \ and resilience aspects. The analysis shows how firms\u2019 foresight, or lack\
    \ thereof, impacts their response to water scarcity and the subsequent impact\
    \ on the economy. Sector-specific analyses shed light on the potential negative\
    \ impacts of water scarcity on sectors like agriculture, food, and electricity\
    \ production and distribution. Yet, the analysis also reveals that certain sectors\
    \ can benefit from competitiveness effects, which can mitigate the adverse economic\
    \ implications of water scarcity. However, it should be noted that these sectors\
    \ may contribute to a catch-up effect on water use. The policy recommendations\
    \ arising from this research emphasise the promotion of anticipation and preparedness\
    \ among firms. It is crucial to prioritise resilience-building measures in all\
    \ sectors, whether they directly rely on water or not.\n"
